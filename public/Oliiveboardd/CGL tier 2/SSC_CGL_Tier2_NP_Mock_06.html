        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A sells a Television to B at 20% profit B sells it to C for Rs. 27000 at 10% loss. Find the price at which C sells it to D if he sells at 25% above the cost price of A.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2325;&#2379; &#2319;&#2325; &#2335;&#2375;&#2354;&#2368;&#2357;&#2367;&#2332;&#2364;&#2344; 20% &#2354;&#2366;&#2349; &#2346;&#2352; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; B &#2311;&#2360;&#2375; C &#2325;&#2379; 10% &#2361;&#2366;&#2344;&#2367; &#2346;&#2352; 27000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; C &#2311;&#2360;&#2375; A &#2325;&#2375; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2375; 25% &#2309;&#2343;&#2367;&#2325; &#2346;&#2352; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; C &#2311;&#2360;&#2375; D &#2325;&#2379; &#2325;&#2367;&#2360; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 32400</span><span class=\"hqt\" style=\"display:none\">32400 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 30600</span><span class=\"hqt\" style=\"display:none\">30600 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 31250</span><span class=\"hqt\" style=\"display:none\">31250 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 32500</span><span class=\"hqt\" style=\"display:none\">32500 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the price at which A purchased the Television = X</p><p>According to question,</p><p>X * 120/100 * 90/100 = 27000</p><p>=> X = (27000 * 100 * 100)/(120 * 90)</p><p>=> X = (27000 * 5 * 10)/(6 * 9)</p><p>=> X = Rs. 25000</p><p>Selling price of C = 25000 * 125/100 = Rs. 31250</p><p><b>Express Method: </b></p><p>A &rarr; B &rarr; C &rarr; D</p><p>Suppose:</p><p>A = 100</p><p>B = 120 [A sold to B at 20% profit]</p><p>C = 108 [B sold to C at 10% loss]</p><p>D = 125 [C sold to D at 25% above CP of A.]</p><p>Given: 108 = 27000</p><p>1 = 27000/108</p><p>Price at which C sells to D = 125 = (27000/108) * 125</p><p>= Rs.31250</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If m&radic;5 +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">m&radic;5</span></div>&nbsp;= 9, then find the value of 5m<sup>2</sup> +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">5m<sup>2</sup></span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; m&radic;5 + <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">m&radic;5</span></div> = 9, &#2340;&#2379; 5m<sup>2</sup> + <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">5m<sup>2</sup></span></div> &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;</div></p></span>",
    "options": [
      "<span class=\"eqt\">79</span><span class=\"hqt\" style=\"display:none\">79</span>",
      "<span class=\"eqt\">83</span><span class=\"hqt\" style=\"display:none\">83</span>",
      "<span class=\"eqt\">91</span><span class=\"hqt\" style=\"display:none\">91</span>",
      "<span class=\"eqt\">100</span><span class=\"hqt\" style=\"display:none\">100</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&radic;5m + 1/&radic;5m = 9</p><p>(&radic;5m + 1/&radic;5m)<sup>2</sup> = 81</p><p>5m<sup>2</sup> + 1/5m<sup>2</sup> + 2 = 81</p><p>5m<sup>2</sup> + 1/5m<sup>2</sup> = 79</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The mean of 30 observation is 25. Mean of first 12 observation is 22 and mean of last 17 observation is 18. Find the value of remaining observation.</p></span><span class=\"hqt\" style=\"display:none\"><p>30 &#2309;&#2357;&#2354;&#2379;&#2325;&#2344;&#2379;&#2306; &#2325;&#2366; &#2350;&#2366;&#2343;&#2381;&#2351; 25 &#2361;&#2376;&#2404; &#2346;&#2361;&#2354;&#2375; 12 &#2309;&#2357;&#2354;&#2379;&#2325;&#2344;&#2379;&#2306; &#2325;&#2366; &#2350;&#2366;&#2343;&#2381;&#2351; 22 &#2361;&#2376; &#2324;&#2352; &#2309;&#2306;&#2340;&#2367;&#2350; 17 &#2309;&#2357;&#2354;&#2379;&#2325;&#2344;&#2379;&#2306; &#2325;&#2366; &#2350;&#2366;&#2343;&#2381;&#2351; 18 &#2361;&#2376;&#2404; &#2358;&#2375;&#2359; &#2309;&#2357;&#2354;&#2379;&#2325;&#2344;&#2379;&#2306; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">140</span><span class=\"hqt\" style=\"display:none\">140</span>",
      "<span class=\"eqt\">210</span><span class=\"hqt\" style=\"display:none\">210</span>",
      "<span class=\"eqt\">180</span><span class=\"hqt\" style=\"display:none\">180</span>",
      "<span class=\"eqt\">200</span><span class=\"hqt\" style=\"display:none\">200</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Total of 30 observations = 25 * 30 = 750</p><p>Total of first 12 observation = 12 * 22 = 264</p><p>Total of last 17 observation = 17 * 18 = 306</p><p>Remaining observation = 750  -  (264 + 306) = 180</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The price of petrol has increased by 40%. What should be the reduction in consumption so that expenditure exceeds only by 5%?</span></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2375;&#2335;&#2381;&#2352;&#2379;&#2354; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2350;&#2375;&#2306; 40% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; &#2313;&#2346;&#2349;&#2379;&#2327; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2325;&#2335;&#2380;&#2340;&#2368; &#2325;&#2368; &#2332;&#2366;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319; &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; 5% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;?</p></span>",
    "options": [
      "<span class=\"eqt\">28.56%</span><span class=\"hqt\" style=\"display:none\">28.56%</span>",
      "<span class=\"eqt\">25%</span><span class=\"hqt\" style=\"display:none\">25%</span>",
      "<span class=\"eqt\">12%</span><span class=\"hqt\" style=\"display:none\">12%</span>",
      "<span class=\"eqt\">27%</span><span class=\"hqt\" style=\"display:none\">27%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the initial price of petrol = Rs. 100</p><p><span><span><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/a4c9525d7237cfb8caa0298887df7473.png\">&nbsp;&nbsp;</span></span></p><p><span>% decrease = (35/140) * 100 = 25%</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The length and width of a rectangle are 160 cm and 25 cm respectively. The area of square is 10% less than the area of rectangle. Diagonal of the square will be -</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2351;&#2340; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 160cm &#2324;&#2352; 25cm &#2361;&#2376;&#2404; &#2357;&#2352;&#2381;&#2327; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2310;&#2351;&#2340; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2360;&#2375; 10% &#2325;&#2350; &#2361;&#2376;&#2404; &#2357;&#2352;&#2381;&#2327; &#2325;&#2366; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; &#2361;&#2379;&#2327;&#2366; -</p></span>",
    "options": [
      "<span class=\"eqt\">60&radic;2 cm</span><span class=\"hqt\" style=\"display:none\">60&radic;2cm</span>",
      "<span class=\"eqt\">50 cm</span><span class=\"hqt\" style=\"display:none\">50cm</span>",
      "<span class=\"eqt\">48 cm</span><span class=\"hqt\" style=\"display:none\">48cm</span>",
      "<span class=\"eqt\">30&radic;2 cm</span><span class=\"hqt\" style=\"display:none\">30&radic;2cm</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Length of a rectangle = 160 cm </p><p>Width of a rectangle = 25 cm</p><p>Area of the rectangle = 160 * 25</p><p>Area of square = 160 * 25 * 90/100</p><p>a<sup>2</sup> = 16*25*9 </p><p>a = 60cm</p><p>Diagonal of the square = 60&radic;2cm</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If HCF and LCM of two numbers are (3 * 11) and (3<sup>2</sup> * 5<sup>3</sup> * 11<sup>2</sup>), then which of the following can be one of those numbers?</p><p>I: 3<sup>3</sup> * 5<sup>3</sup> * 11<sup>3</sup></p><p>II: 3 * 5 * 11</p><p>III: 3<sup>2</sup> * 5<sup>2</sup> * 11<sup>2</sup></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; &#2324;&#2352; &#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; (3 * 11) &#2324;&#2352; (3<sup>2</sup> * 5<sup>3</sup> * 11<sup>2</sup>) &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2313;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2361;&#2379; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;?</p><p>I: 3<sup>3</sup> * 5<sup>3</sup> * 11<sup>3</sup></p><p>II: 3 * 5 * 11</p><p>III: 3<sup>2</sup> * 5<sup>2</sup> * 11<sup>2</sup></p></span>",
    "options": [
      "<span class=\"eqt\">I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III</span><span class=\"hqt\" style=\"display:none\">II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">None</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>HCF = 3 * 11</p><p>LCM = 3<sup>2</sup> * 5<sup>3</sup> * 11<sup>2</sup></p><p>HCF means highest common factor that can divide two or more numbers.</p><p>LCM means lowest common multiple that can be divided by two or more numbers.</p><p>Numbers must contain power of 3 from 1 to 2, power of 5 from 0 to 3 and power of 11 from 1 to 2.</p><p>Hence, possible numbers can be (3 * 5 * 11) and (3<sup>2</sup> * 5<sup>2</sup> * 11<sup>2</sup>)</p><p>Statements II and III are TRUE.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following number is divisible by 11?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 11 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">954125</span><span class=\"hqt\" style=\"display:none\">954125</span>",
      "<span class=\"eqt\">898431</span><span class=\"hqt\" style=\"display:none\">898431</span>",
      "<span class=\"eqt\">843215</span><span class=\"hqt\" style=\"display:none\">843215</span>",
      "<span class=\"eqt\">352649</span><span class=\"hqt\" style=\"display:none\">352649</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A number is completely divisible by 11 when the difference between sum of digits in even places and odd places is 0 or divisible by 11.</p><p>Option a : 954125</p><p>(2 + 4 + 9)  -  (5 + 1 + 5) = 4</p><p>Option b : 898431</p><p>(3 + 8 + 8)  -  (1 + 4 + 9) = 5</p><p>Option c : 843215</p><p>(1 + 3 + 8)  -  (5 + 2 + 4) = 1</p><p>Option d : 352649</p><p>(9 + 6 + 5)  -  (4 + 2 + 3) = 11</p><p>Option d is correct.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What is the equation of the line through (4, 9) with slope 2?</p></span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2306;&#2342;&#2369; (4, 9) &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2324;&#2352; &#2338;&#2354;&#2366;&#2344; 2 &#2357;&#2366;&#2354;&#2368; &#2352;&#2375;&#2326;&#2366; &#2325;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">y = 2x + 1</span><span class=\"hqt\" style=\"display:none\">y = 2x + 1</span>",
      "<span class=\"eqt\">y = 3x - 1</span><span class=\"hqt\" style=\"display:none\">y = 3x - 1</span>",
      "<span class=\"eqt\">9y = 4x + 2</span><span class=\"hqt\" style=\"display:none\">9y = 4x + 2</span>",
      "<span class=\"eqt\">y = 2x + 5</span><span class=\"hqt\" style=\"display:none\">y = 2x + 5</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>x = 4, y = 9</p><p>Slope = m = 2</p><p>Equation of line =&gt;</p><p>=&gt; y = mx + c</p><p>9 = 2*4 + c</p><p>9 = 8 + c</p><p>c = 1</p><p>Equation of line =&gt; y = 2x + 1</p>",
    "question_index": 7

    "question": "<span class=\"eqt\"><p>A person invested a certain amount in a simple interest at a 16% rate of interest per annum. If the interest received after 2 years is Rs. 8160 less than the amount invested, then find the principal amount.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; 16% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2360;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368;&#2404; &#2351;&#2342;&#2367; 2 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2348;&#2381;&#2351;&#2366;&#2332; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2360;&#2375; 8160 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2350; &#2361;&#2376;, &#2340;&#2379; &#2350;&#2370;&#2354;&#2343;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Each interior angle of a regular polygon is 150&deg;. How many sides does the polygon have?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339; &#2325;&#2366; &#2350;&#2366;&#2346; 150&deg; &#2361;&#2376;&#2404; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</span>",

    "question": "<span class=\"eqt\"><p>Naved travels 60 km at a speed of 20 km/hr and next 30 km at a speed of 25 km/hr and there after travels 90 km at 10 km/hr. His average speed is: (Up to one correct decimal) </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2366;&#2357;&#2375;&#2342; 60 km &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; 20 km/hr &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2327;&#2354;&#2375; 30 km &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; 25 km/hr &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; 90 km &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; 10 km/hr &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2368; &#2324;&#2360;&#2340; &#2327;&#2340;&#2367; &#2361;&#2376;: (&#2319;&#2325; &#2360;&#2361;&#2368; &#2342;&#2358;&#2350;&#2354;&#2357; &#2340;&#2325;)</p></span>",

    "question": "<span class=\"eqt\"><p>Ram and Laxman, each can do a work in 30 days without rest. But Ram takes rest of one day after every 3 days and Laxman takes rest of one day after every 6 days. If both starts working together, then work will be completed on which day.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2350; &#2324;&#2352; &#2354;&#2325;&#2381;&#2359;&#2381;&#2350;&#2339; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325;, &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2348;&#2367;&#2344;&#2366; &#2352;&#2369;&#2325;&#2375; 30 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2354;&#2375;&#2325;&#2367;&#2344; &#2352;&#2366;&#2350; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; 3 &#2342;&#2367;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2319;&#2325; &#2342;&#2367;&#2344; &#2357;&#2367;&#2358;&#2381;&#2352;&#2366;&#2350; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2354;&#2325;&#2381;&#2359;&#2381;&#2350;&#2339; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; 6 &#2342;&#2367;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2319;&#2325; &#2342;&#2367;&#2344; &#2357;&#2367;&#2358;&#2381;&#2352;&#2366;&#2350; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; &#2342;&#2379;&#2344;&#2379;&#2306; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2350; &#2325;&#2352;&#2344;&#2366; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2360; &#2342;&#2367;&#2344; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">15th day</span><span class=\"hqt\" style=\"display:none\">15&#2357;&#2375;&#2306; &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">19th day</span><span class=\"hqt\" style=\"display:none\">19&#2357;&#2375;&#2306; &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">16th day</span><span class=\"hqt\" style=\"display:none\">16&#2357;&#2375;&#2306; &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">18th day</span><span class=\"hqt\" style=\"display:none\">18&#2357;&#2375;&#2306; &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>\"</p><p>Work Ram can do in 1 day = 1/30</p><p>But Ram work for 3 days and take rest for 1 day</p><p>So, Actual work done by Ram in 4 days = 3/30 = 1/10</p><p>Actual work done by Ram in 1 day = 1/40</p><p>Actual work done by Laxman in 7 days = 6/30 = 1/5</p><p>Actual work done by Laxman in 1 days = 1/35</p><p>Actual work done together in 1 day = (1/40) + (1/35) = 3/56</p><p>Actual work done together in 18 days = (3/56) * 18 = 54/56</p><p>Actual work done together in 19 days = (3/56) * 19 = 57/56 Which means work was completed in 19th day.\"</p>",
    "question_index": 28

    "question": "<span class=\"eqt\"><p>Read the given question and decide which of the following information is sufficient to answer the question.</p><p>Find the total number of blocks in a box.</p><p>Statements:</p><p>I. The box contains 12 red, 15 green and 8 blue blocks.</p><p>II. The box contains only red, green and blue blocks.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2340;&#2351; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2404;</p><p>&#2319;&#2325; &#2337;&#2367;&#2348;&#2381;&#2348;&#2375; &#2350;&#2375;&#2306; &#2348;&#2381;&#2354;&#2377;&#2325;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>I. &#2337;&#2367;&#2348;&#2381;&#2348;&#2375; &#2350;&#2375;&#2306; 12 &#2354;&#2366;&#2354;, 15 &#2361;&#2352;&#2375; &#2324;&#2352; 8 &#2344;&#2368;&#2354;&#2375; &#2348;&#2381;&#2354;&#2377;&#2325; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2337;&#2367;&#2348;&#2381;&#2348;&#2375; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2354;&#2366;&#2354;, &#2361;&#2352;&#2375; &#2324;&#2352; &#2344;&#2368;&#2354;&#2375; &#2348;&#2381;&#2354;&#2377;&#2325; &#2361;&#2376;&#2306;&#2404;</p></span>",

      "<span class=\"eqt\">Only statement I is sufficient</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I &#2361;&#2368; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;</span>",

      "<span class=\"eqt\">Both statements I and II are sufficient</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2368; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Neither statement alone nor together is sufficient</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2351;&#2361; &#2325;&#2341;&#2344; &#2309;&#2325;&#2375;&#2354;&#2366; &#2361;&#2376; &#2324;&#2352; &#2344; &#2361;&#2368; &#2351;&#2361; &#2360;&#2349;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2404;</span>"

    "question": "<span class=\"eqt\"><p>Each item describes a situation and is followed by four possible responses. Indicate the response you find most appropriate. Choose only one response for each item. The responses will be evaluated based on the level of appropriateness for the given situation.</p><p>A student realizes after starting an exam that one section is much harder than expected and time is limited. What should be the best strategy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2330;&#2366;&#2352; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2332;&#2379; &#2313;&#2340;&#2381;&#2340;&#2352; &#2360;&#2348;&#2360;&#2375; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2354;&#2327;&#2375;, &#2313;&#2360;&#2375; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404; &#2313;&#2340;&#2381;&#2340;&#2352;&#2379;&#2306; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2342;&#2368; &#2327;&#2312; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2344;&#2325;&#2368; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340;&#2340;&#2366; &#2325;&#2375; &#2360;&#2381;&#2340;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404;</p><p> &#2319;&#2325; &#2331;&#2366;&#2340;&#2381;&#2352; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2350;&#2361;&#2360;&#2370;&#2360; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2319;&#2325; &#2349;&#2366;&#2327; &#2309;&#2346;&#2375;&#2325;&#2381;&#2359;&#2366; &#2360;&#2375; &#2325;&#2361;&#2368;&#2306; &#2309;&#2343;&#2367;&#2325; &#2325;&#2336;&#2367;&#2344; &#2361;&#2376; &#2324;&#2352; &#2360;&#2350;&#2351; &#2360;&#2368;&#2350;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2368; &#2352;&#2339;&#2344;&#2368;&#2340;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",

      "<span class=\"eqt\">Skip the difficult questions first and attempt easier ones</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2336;&#2367;&#2344; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2361;&#2354;&#2375; &#2331;&#2379;&#2337;&#2364; &#2342;&#2375;&#2306; &#2324;&#2352; &#2310;&#2360;&#2366;&#2344; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2361;&#2354; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Stop attempting the paper due to lack of confidence</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2340;&#2381;&#2350;&#2357;&#2367;&#2358;&#2381;&#2357;&#2366;&#2360; &#2325;&#2368; &#2325;&#2350;&#2368; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2346;&#2375;&#2346;&#2352; &#2354;&#2367;&#2326;&#2344;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2331;&#2379;&#2337;&#2364; &#2342;&#2375;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In a time-bound exam, time management is crucial. If one section is very difficult, spending too much time on it can reduce the overall score.</p><p>Attempting easier and familiar questions first helps in securing marks quickly and builds confidence. Difficult questions can be attempted later if time permits.</p><p>The other options are inappropriate because:</p><p>Focusing only on the difficult section may waste time with little return.</p><p>Panic leads to careless mistakes.</p><p>Leaving the paper incomplete guarantees poor performance.</p>",

    "question": "<span class=\"eqt\"><p>The question given below consists of two statements, one labelled as 'Assertion (A)' and the other labelled as the 'Reason (R)'. You have to examine these two statements carefully and decide if the Assertion (A) and the Reason (R) are individually true and if so, whether the Reason (R) is a correct explanation of the Assertion (A).</p><p>Assertion (A): As the diameter of woody plants increases, a new layer of wood is formed each year, which is known as a growth ring. </p><p>Reason (R): A cross-section of a tree trunk shows alternate light and dark growth rings.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2342;&#2379; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2351;&#2375; &#2361;&#2376;&#2306;, &#2319;&#2325; &#2325;&#2379; '&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A)' &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; '&#2325;&#2366;&#2352;&#2339; (R)' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2375;&#2348;&#2354; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2310;&#2346;&#2325;&#2379; &#2311;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2332;&#2366;&#2305;&#2330; &#2325;&#2352;&#2344;&#2368; &#2361;&#2376; &#2324;&#2352; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A) &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; (R) &#2319;&#2325;&#2354; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2324;&#2352; &#2351;&#2342;&#2367; &#2360;&#2340;&#2381;&#2351; &#2361;&#2     "comp": "<p><b>Directions :</b> Read the given passage and answer the questions that follow.</p><p>Nature versus nurture is a longstanding debate in psychology, sociology, and biology, focusing on the relative importance of genetic inheritance and environmental factors in shaping human behaviour and traits. This dichotomy has intrigued researchers for centuries, leading to a nuanced understanding that acknowledges the complex interplay between our genetic makeup and the environments in which we are raised. At the heart of the nature versus nurture debate lies the question of which exerts a stronger influence on individual development: genetics or environment?</p><p>Proponents of the \"nature\" perspective argue that our traits and behaviours are primarily determined by our genetic inheritance. They point to evidence from studies of twins and adoptees, which suggests that traits such as intelligence, personality, and even susceptibility to certain diseases have a significant genetic component. From this viewpoint, our genetic makeup acts as a blueprint that largely predetermines our cognitive abilities, temperament, and predispositions. On the other hand, advocates of the \"nurture\" perspective emphasise the role of environmental factors in shaping who we are. They argue that experiences, upbringing, and social interactions play a crucial role in moulding our behaviours and attitudes. According to this view, even individuals with identical genetic backgrounds can develop different traits depending on the environments in which they are raised. From infancy through adulthood, our interactions with family, peers, education systems, and societal norms continuously shape our personalities and beliefs.</p><p>However, contemporary research suggests that the nature versus nurture debate is not simply a matter of \"either-or\" but rather a complex interaction between genes and the environment. The field of epigenetics, for instance, explores how environmental factors can modify gene expression without altering the underlying DNA sequence. This dynamic interplay between nature and nurture underscores the importance of both factors in shaping human development. Moreover, advancements in neuroscience have revealed the intricate ways in which our genes and environment interact to influence brain development and functioning. Neuroplasticity, the brain's ability to adapt in response to experiences, highlights the profound impact of environmental stimuli on neural circuits and behaviour.</p>",

    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>The cake is to be baked by you. The candles are also to be lit by you.</p>",

    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" verb [here 'be'] and the preposition \"by\" is necessary while changing the voice of the sentence from Passive to Active.</p><p>In the active voice, the sentence should be in the infinitive form (to + V1).</p><p>The format in Passive voice is: Object of the Active voice (Subjective case) + am/is/are/was/were + to + be + V3 + by + Subject of the Active voice (Objective case).</p><p>Thus, the format in the active voice is: Subject + am/is/are/was/were + to + V1 + Object.</p><p>For example:</p><p>She is to be helped by you. (Passive)</p><p>You are to help her (Active)</p><p>The options except (c) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is: You are to bake the cake. You are also to light the candles.</p><p>Hence, option (c) is the correct answer.</p>",

    "question": "<span class=\"eqt\"><p>Read the two statements and choose the correct option:</p><p>Statement 1: Security of tenure is an institutional design that supports the independence of the judiciary.</p><p>Statement 2: Judges of the Supreme Court and High Courts are appointed by the President of India.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2325;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2319;&#2325; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2327;&#2340; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2361;&#2376; &#2332;&#2379; &#2344;&#2381;&#2351;&#2366;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2325;&#2368; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",

    "solution": "<p> </p> <h4 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt'>Statement 1: Security of Tenure (True)</h4><p>Security of tenure means that once a judge is appointed, they stay in office until they reach the age of retirement. They cannot be removed easily by the government (the Executive) just because their rulings are unpopular or against the state.</p><p>&#183; <b>Why it supports independence:</b> If a judge feared losing their job for a controversial ruling, they might be biased toward the government.</p><p>&#183; <b>Removal Process:</b> In India, removing a judge requires a special process called <b>Impeachment</b>, which involves a motion passed by a special majority in both Houses of Parliament. This high threshold ensures the judiciary remains independent of political pressure.</p> <h4 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt'>Statement 2: Appointment by the President (True)</h4><p>Under the Constitution of India (Articles 124 and 217), the <b>President of India</b> is the formal appointing authority for judges of the Supreme Court and the High Courts.</p><p>&#183; <b>The Process:</b> While the President signs the warrant of appointment, the names are recommended through the <b>Collegium System</b> (a group comprising the Chief Justice of India and the most senior judges).</p><p>&#183; <b>Retirement Age:</b> Supreme Court judges serve until <b>65 years</b>, while High Court judges serve until <b>62 years</b>.</p><p><b>Further Insights:</b></p><p>- Judges of the SC and HCs can be removed only by a special parliamentary procedure on grounds of proved misbehaviour or incapacity.</p><p>- Salaries and allowances of judges are charged on the Consolidated Fund (not voted).</p><p>- Article 141: Law declared by the Supreme Court is binding on all courts within India.</p><p>- Independence of judiciary is part of the basic structure (Kesavananda Bharati, 1973).</p><p>- Article 50 (DPSP) urges separation of the judiciary from the executive in the public services of the State.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following organelles is absent in prokaryotic cells but present in eukaryotic cells and is directly involved in modification and packaging of proteins?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2306;&#2327; &#2346;&#2381;&#2352;&#2379;&#2325;&#2376;&#2352;&#2367;&#2351;&#2379;&#2335;&#2367;&#2325; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2351;&#2370;&#2325;&#2375;&#2352;&#2367;&#2351;&#2379;&#2335;&#2367;&#2325; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2325;&#2375; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2324;&#2352; &#2346;&#2376;&#2325;&#2375;&#2332;&#2367;&#2306;&#2327; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Ribosome</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2311;&#2348;&#2379;&#2360;&#2379;&#2350;</span>",
      "<span class=\"eqt\">Golgi apparatus</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2377;&#2354;&#2381;&#2332;&#2368;&#2325;&#2366;&#2351;</span>",
      "<span class=\"eqt\">Plasma membrane</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;&#2366; &#2333;&#2367;&#2354;&#2381;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Cell wall</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2358;&#2367;&#2325;&#2366; &#2349;&#2367;&#2340;&#2381;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Absence in Prokaryotes vs. Presence in Eukaryotes</b></p><p>Prokaryotic cells (like bacteria) are simpler and lack membrane-bound organelles. They do not have a nucleus, mitochondria, endoplasmic reticulum, or Golgi apparatus.</p><p>Eukaryotic cells (found in plants, animals, and fungi) are compartmentalized by various membrane-bound organelles that allow for specialized functions.</p><p><b>Modification and Packaging of Proteins</b></p><p>Golgi apparatus (The \"Post Office\"): This is the primary organelle responsible for receiving proteins from the Endoplasmic Reticulum (ER). Once inside the Golgi, these proteins undergo modification (such as glycosylation, where sugars are added). The Golgi then packages them into membrane-bound vesicles to be sent to their final destination - either inside the cell (like lysosomes) or outside the cell (secretion).</p>",

    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option.</p><p>Assertion (A): Under the National Food Security Act (NFSA), priority households are entitled to 5 kg of subsidized foodgrains per person per month.</p><p>Reason (R): Antyodaya Anna Yojana (AAY) households are entitled to 35 kg per family per month under the Act.</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2325;&#2341;&#2344; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2326;&#2366;&#2342;&#2381;&#2351; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (NFSA) &#2325;&#2375; &#2340;&#2361;&#2340;, &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2366;&#2361; 5 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2352;&#2367;&#2351;&#2366;&#2351;&#2340;&#2368; &#2326;&#2366;&#2342;&#2381;&#2351;&#2366;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2361;&#2376;&#2404; &#2325;&#2366;&#2352;&#2339; (R): &#2309;&#2306;&#2340;&#2381;&#2351;&#2379;&#2342;&#2351; &#2309;&#2344;&#2381;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; (AAY) &#2325;&#2375; &#2340;&#2361;&#2340; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2366;&#2361; 35 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2326;&#2366;&#2342;&#2381;&#2351;&#2366;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Assertion is true: NFSA provides 5 kg per person per month to priority households at subsidized rates.</p><p>Reason is true: AAY households receive 35 kg per family per month under NFSA.</p><p>R states a separate entitlement for AAY and does not explain the 5 kg rule for priority households; hence both true but not explanatory.</p><p>Further Insights:</p><p>- NFSA coverage: up to 75% of rural and 50% of urban population are eligible (state-wise ceilings).</p><p>- Central issue prices under NFSA were historically Rs 3/2/1 per kg for rice/wheat/coarse grains for beneficiaries (policy revisions may temporarily alter beneficiary charges).</p><p>- One Nation One Ration Card (ONORC) enables nationwide portability using Aadhaar seeding and ePoS authentication.</p><p>- AAY targets the \"poorest of the poor\" identified by states as per guidelines.</p><p>- The Act mandates nutritional support for pregnant women/lactating mothers and children via ICDS and Mid-Day Meal systems.</p>",
    "question_index": 107
  },
  {
    "question": "<span class=\"eqt\"><p>Which activity best reflects NABARD's core function?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367; NABARD &#2325;&#2375; &#2350;&#2370;&#2354; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Refinance for micro-irrigation given by a regional rural bank to small farmers.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2368;&#2351; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2348;&#2376;&#2306;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2331;&#2379;&#2335;&#2375; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350; &#2360;&#2367;&#2306;&#2330;&#2366;&#2312; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2369;&#2344;&#2352;&#2381;&#2357;&#2367;&#2340;&#2381;&#2340; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Overnight liquidity to commercial banks against G-secs.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;-&#2360;&#2375;&#2325; &#2325;&#2375; &#2348;&#2342;&#2354;&#2375; &#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2352;&#2366;&#2340;&#2381;&#2352;&#2367;&#2325;&#2366;&#2354;&#2368;&#2344; &#2340;&#2352;&#2354;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Venture equity for a fintech startup in Bengaluru.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2306;&#2327;&#2354;&#2369;&#2352;&#2369; &#2350;&#2375;&#2306; &#2319;&#2325; &#2347;&#2367;&#2344;&#2335;&#2375;&#2325; &#2360;&#2381;&#2335;&#2366;&#2352;&#2381;&#2335;&#2309;&#2346; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2375;&#2306;&#2330;&#2352; &#2311;&#2325;&#2381;&#2357;&#2367;&#2335;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Re-insurance for crop insurance pooled by insurers.</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2360;&#2354; &#2348;&#2368;&#2350;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2369;&#2344;&#2352;&#2381;&#2348;&#2368;&#2350;&#2366;, &#2348;&#2368;&#2350;&#2366;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2366;&#2350;&#2370;&#2361;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>NABARD is the apex development finance institution for agriculture and rural development; refinance to rural credit institutions is core.</p><p>Micro-irrigation loans by an RRB are classic NABARD refinance candidates.</p><p>Further Insights:</p><p>- NABARD was established in 1982 based on CRAFICARD recommendations.</p><p>- RBI divested its share in NABARD; Government of India is now the owner.</p><p>- NABARD manages the Rural Infrastructure Development Fund (RIDF).</p><p>- SHG - Bank Linkage and Producer Organizations receive support via NABARD programs.</p>",
    "question_index": 108
  },

    "question": "<span class=\"eqt\"><p>Consider the following about Himalayan river confluences:</p><p>1) Alaknanda and Bhagirathi meet at Devprayag to form the Ganga.</p><p>2) Mandakini joins the Bhagirathi at Rudraprayag.</p><p>3) Pindar is a tributary of the Alaknanda.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2367;&#2350;&#2366;&#2354;&#2351;&#2368; &#2344;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2327;&#2350; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2309;&#2354;&#2325;&#2344;&#2306;&#2342;&#2366; &#2324;&#2352; &#2349;&#2366;&#2327;&#2368;&#2352;&#2341;&#2368; &#2342;&#2375;&#2357;&#2346;&#2381;&#2352;&#2351;&#2366;&#2327; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2325;&#2352; &#2327;&#2306;&#2327;&#2366; &#2344;&#2342;&#2368; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2350;&#2306;&#2342;&#2366;&#2325;&#2367;&#2344;&#2368; &#2352;&#2369;&#2342;&#2381;&#2352;&#2346;&#2381;&#2352;&#2351;&#2366;&#2327; &#2350;&#2375;&#2306; &#2349;&#2366;&#2327;&#2368;&#2352;&#2341;&#2368; &#2360;&#2375; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3) &#2346;&#2367;&#2306;&#2337;&#2352; &#2309;&#2354;&#2325;&#2344;&#2306;&#2342;&#2366; &#2325;&#2368; &#2319;&#2325; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statements 1 and 3 are correct. Devprayag is the Ganga's formation point; Pindar meets Alaknanda near Karnaprayag.</p><p>Statement 2 is incorrect. Mandakini joins the Alaknanda at Rudraprayag.</p><p>Further Insights:</p><p>- Panch Prayag (five confluences of Alaknanda): Vishnuprayag (with Dhauliganga), Nandaprayag (with Nandakini), Karnaprayag (with Pindar), Rudraprayag (with Mandakini), Devprayag (with Bhagirathi).</p><p>- Bhagirathi originates near Gaumukh (Gangotri Glacier).</p>",
    "question_index": 109
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Forty-Fourth Constitutional Amendment (1978): </p><p>1) Inserted Article 300A, making the right to property a legal right.</p><p>2) Replaced \"internal disturbance\" with \"armed rebellion\" as a ground for National Emergency.</p><p>3) Required that a Proclamation of National Emergency be based on a written decision of the Union Council of Ministers communicated to the President.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>1978 &#2325;&#2375; &#2330;&#2380;&#2357;&#2366;&#2354;&#2368;&#2360;&#2357;&#2375;&#2306; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 300&#2319; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2366; &#2327;&#2351;&#2366;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2319;&#2325; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2348;&#2344; &#2327;&#2351;&#2366;&#2404;</p><p>2) &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; \"&#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2309;&#2358;&#2366;&#2306;&#2340;&#2367;\" &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; \"&#2360;&#2358;&#2360;&#2381;&#2340;&#2381;&#2352; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;\" &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>3) &#2351;&#2361; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2367; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2360;&#2370;&#2330;&#2367;&#2340; &#2325;&#2367;&#2319; &#2327;&#2319; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2375; &#2354;&#2367;&#2326;&#2367;&#2340; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2361;&#2379;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only 1</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">Only 1 and 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">All 1, 2 and 3 are correct</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3 &#2340;&#2368;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only 2 and 3</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>All three statements are correct features of the 44th Amendment.</p><p>Further Insights:</p><p>- The 44th Amendment restored certain checks diluted by the 42nd Amendment.</p><p>- Articles 20 and 21 cannot be suspended even during an Emergency (post-44th).</p><p>- The amendment provided for periodic parliamentary review/approval timelines of Emergency proclamations.</p><p>- It protected civil liberties by tightening the Emergency provisions and ensuring cabinet accountability.</p><p>- Right to property remains protected under Article 300A against deprivation without authority of law.</p>",
    "question_index": 110
  },

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true about Mauryan policy and sources?</p><p>I. Major Rock Edict XIII records Ashoka's remorse after the Kalinga war.</p><p>II. Most Ashokan inscriptions are in Prakrit and Brahmi; some in Kharoshthi/Greek/Aramaic in the northwest.</p><p>III. The Arthashastra was authored by Megasthenes at Chandragupta's court.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2350;&#2380;&#2352;&#2381;&#2351; &#2344;&#2368;&#2340;&#2367; &#2324;&#2352; &#2360;&#2381;&#2352;&#2379;&#2340;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326; XIII &#2350;&#2375;&#2306; &#2325;&#2354;&#2367;&#2306;&#2327; &#2351;&#2369;&#2342;&#2381;&#2343; &#2325;&#2375; &#2348;&#2366;&#2342; &#2309;&#2358;&#2379;&#2325; &#2325;&#2375; &#2346;&#2358;&#2381;&#2330;&#2366;&#2340;&#2366;&#2346; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2361;&#2376;&#2404;</p><p>II. &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2309;&#2358;&#2379;&#2325; &#2358;&#2367;&#2354;&#2366;&#2354;&#2375;&#2326; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340; &#2324;&#2352; &#2348;&#2381;&#2352;&#2366;&#2361;&#2381;&#2350;&#2368; &#2354;&#2367;&#2346;&#2367; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;; &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2326;&#2352;&#2379;&#2359;&#2381;&#2336;&#2368;/&#2327;&#2381;&#2352;&#2368;&#2325;/&#2309;&#2352;&#2366;&#2350;&#2368; &#2354;&#2367;&#2346;&#2367; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404;</p><p>III. &#2309;&#2352;&#2381;&#2341;&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352; &#2325;&#2368; &#2352;&#2330;&#2344;&#2366; &#2330;&#2306;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2325;&#2375; &#2342;&#2352;&#2348;&#2366;&#2352; &#2350;&#2375;&#2306; &#2350;&#2375;&#2327;&#2366;&#2360;&#2381;&#2341;&#2344;&#2368;&#2332; &#2344;&#2375; &#2325;&#2368; &#2341;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>I is correct: RE XIII is the key source for the Kalinga war's aftermath.</p><p>II is correct: linguistic and script diversity appears regionally.</p><p>III is incorrect: Arthashastra is attributed to Kautilya/Chanakya; Megasthenes wrote Indica.</p><p>Further Insights:</p><p>- Dhamma Mahamatras were officials appointed by Ashoka for moral administration.</p><p>- Separate Kalinga Edicts emphasize humane governance of conquered peoples.</p><p>- Pillar Edicts include instructions on humane treatment of prisoners and animals.</p><p>- The Lion Capital of Sarnath is the National Emblem of India.</p><p>- Ashoka's conversion followed the Kalinga war (c. 261 BCE).</p>",
    "question_index": 111
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about the formation of the Congress and early associations.</p><p>I. The Indian National Congress (1885) had A.O. Hume as its General Secretary and W.C. Bonnerjee as its first President.</p><p>II. The Indian Association (1876) founded by Surendranath Banerjee and Ananda Mohan Bose sought to mobilize the educated middle class.</p><p>Which of the above statement is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2324;&#2352; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2360;&#2306;&#2327;&#2336;&#2344;&#2379;&#2306; &#2325;&#2375; &#2327;&#2336;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; (1885) &#2325;&#2375; &#2350;&#2361;&#2366;&#2360;&#2330;&#2367;&#2357; &#2319;.&#2323;. &#2361;&#2381;&#2351;&#2370;&#2350; &#2324;&#2352; &#2346;&#2381;&#2352;&#2341;&#2350; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2337;&#2348;&#2381;&#2354;&#2381;&#2351;&#2370;.&#2360;&#2368;. &#2348;&#2344;&#2352;&#2381;&#2332;&#2368; &#2341;&#2375;&#2404;</p><p>II. &#2360;&#2369;&#2352;&#2375;&#2306;&#2342;&#2381;&#2352;&#2344;&#2366;&#2341; &#2348;&#2344;&#2352;&#2381;&#2332;&#2368; &#2324;&#2352; &#2310;&#2344;&#2306;&#2342; &#2350;&#2379;&#2361;&#2344; &#2348;&#2379;&#2360; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2327;&#2336;&#2344; (1876) &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2358;&#2367;&#2325;&#2381;&#2359;&#2367;&#2340; &#2350;&#2343;&#2381;&#2351;&#2350; &#2357;&#2352;&#2381;&#2327; &#2325;&#2379; &#2360;&#2306;&#2327;&#2336;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2341;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2350;&#2376;&#2306; &#2324;&#2352; &#2344; &#2361;&#2368; &#2342;&#2370;&#2360;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p></p> <h4 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt'>Statement I: Formation of the INC (True)</h4><p>The <b>Indian National Congress</b> was founded in December 1885. It was the result of efforts to create a platform for civic and political dialogue between educated Indians and the British Raj.</p><p>&#183; <b>A.O. Hume:</b> A retired British officer of the Imperial Civil Service, he is known as the \"father\" or founder of the INC and served as its <b>General Secretary</b>.</p><p>&#183; <b>W.C. Bonnerjee:</b> A prominent barrister from Calcutta, he was elected as the <b>first President</b> of the Congress.</p><p>&#183; <b>First Session:</b> Held at Gokuldas Tejpal Sanskrit College in <b>Bombay</b>, attended by 72 delegates.</p> <h4 style='margin-top:0cm;margin-right:5.65pt;margin-bottom:0cm;margin-left: 41.65pt;line-height:12.0pt'>Statement II: The Indian Association (True)</h4><p>Before the Congress was formed, several regional associations paved the way for nationalistic movements.</p><p>&#183; <b>Founders:</b> The <b>Indian Association of Calcutta</b> was established in <b>1876</b> by <b>Surendranath Banerjee</b> and <b>Ananda Mohan Bose</b>.</p><p>&#183; <b>Objectives:</b> It was the first avowed nationalist organization founded in British India. Its goal was to unify the people on a common political program and <b>mobilize the educated middle class</b>.</p><p>&#183; <b>Legacy:</b> It protested against the reduction of the age limit for the Civil Service examinations and the Vernacular Press Act. It eventually merged with the INC in 1886.</p><p>Further Insights:</p><p>- The first INC session was held at Bombay in December 1885.</p><p>- Early moderate leaders included Dadabhai Naoroji, Pherozeshah Mehta, Surendranath Banerjee.</p><p>- The Indian Association organized the Anti-Partition agitation in Bengal later (1905).</p><p>- Dadabhai Naoroji propounded the \"Drain of Wealth\" theory.</p><p>- The Surat split (1907) divided moderates and extremists.</p>",
    "question_index": 112
  },

    "question": "<span class=\"eqt\"><p>In November 2025, who among the following clinched the men's 10-meter air pistol gold at the ISSF World Championship in Cairo, becoming the first Indian to win an individual air pistol world title?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2357;&#2306;&#2348;&#2352; 2025 &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; &#2325;&#2366;&#2361;&#2367;&#2352;&#2366; &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2310;&#2312;&#2319;&#2360;&#2319;&#2360;&#2319;&#2347; &#2357;&#2367;&#2358;&#2381;&#2357; &#2330;&#2376;&#2306;&#2346;&#2367;&#2351;&#2344;&#2358;&#2367;&#2346; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; 10 &#2350;&#2368;&#2335;&#2352; &#2319;&#2351;&#2352; &#2346;&#2367;&#2360;&#2381;&#2335;&#2354; &#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2346;&#2342;&#2325; &#2332;&#2368;&#2340;&#2366; &#2324;&#2352; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2319;&#2351;&#2352; &#2346;&#2367;&#2360;&#2381;&#2335;&#2354; &#2357;&#2367;&#2358;&#2381;&#2357; &#2326;&#2367;&#2340;&#2366;&#2348; &#2332;&#2368;&#2340;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2361;&#2354;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2344;&#2375;?</span>",
    "options": [
      "<span class=\"eqt\">Saurabh Chaudhary</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2380;&#2352;&#2349; &#2330;&#2380;&#2343;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Abhishek Verma</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2349;&#2367;&#2359;&#2375;&#2325; &#2357;&#2352;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Varun Tomar</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2369;&#2339; &#2340;&#2379;&#2350;&#2352;</span>",
      "<span class=\"eqt\">Samrat Rana</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2381;&#2352;&#2366;&#2335; &#2352;&#2366;&#2339;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In shooting, Samrat Rana clinched the men's 10-meter air pistol gold at the ISSF World Championship in Cairo, becoming the first Indian to win an individual air pistol world title.</p><p>Rana won the men's 10 meter air pistol gold with a score of 243.7, edging out China's Hu Kai by just 0.4 points. His compatriot Varun Tomar claimed bronze, completing a double podium for India.</p>",

    "question": "<span class=\"eqt\"><p>ISRO's Chandrayaan-3 rover identified elements like sulfur on the Moon by firing laser pulses to create a micro-plasma and reading emitted light lines. This technique is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2312;&#2319;&#2360;&#2310;&#2352;&#2323; &#2325;&#2375; &#2330;&#2306;&#2342;&#2381;&#2352;&#2351;&#2366;&#2344;-3 &#2352;&#2379;&#2357;&#2352; &#2344;&#2375; &#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350; &#2346;&#2381;&#2354;&#2366;&#2332;&#2381;&#2350;&#2366; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2354;&#2375;&#2332;&#2352; &#2346;&#2354;&#2381;&#2360; &#2342;&#2366;&#2327;&#2325;&#2352; &#2324;&#2352; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2367;&#2340; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2352;&#2375;&#2326;&#2366;&#2323;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2325;&#2352; &#2330;&#2306;&#2342;&#2381;&#2352;&#2350;&#2366; &#2346;&#2352; &#2360;&#2354;&#2381;&#2347;&#2352; &#2332;&#2376;&#2360;&#2375; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2404; &#2351;&#2361; &#2340;&#2325;&#2344;&#2368;&#2325; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">NMR spectroscopy</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2319;&#2350;&#2310;&#2352; &#2360;&#2381;&#2346;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2360;&#2381;&#2325;&#2379;&#2346;&#2368;</span>",
      "<span class=\"eqt\">X-ray crystallography</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2381;&#2360;-&#2352;&#2375; &#2325;&#2381;&#2352;&#2367;&#2360;&#2381;&#2335;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347;&#2368;</span>",
      "<span class=\"eqt\">LIBS (Laser-Induced Breakdown Spectroscopy)</span><span class=\"hqt\" style=\"display:none\">LIBS (&#2354;&#2375;&#2332;&#2352;-&#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2348;&#2381;&#2352;&#2375;&#2325;&#2337;&#2366;&#2313;&#2344; &#2360;&#2381;&#2346;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2360;&#2381;&#2325;&#2379;&#2346;&#2368;)</span>",
      "<span class=\"eqt\">PCR</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2360;&#2368;&#2310;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>LIBS uses focused laser pulses to ablate the surface, forming plasma; emitted spectral lines identify elements.</p><p>NMR and X-ray crystallography are bulk/structural techniques; PCR is a DNA amplification method.</p><p>Further Insights:</p><p>- Chandrayaan-3's Pragyan rover carried LIBS and APXS; LIBS confirmed sulfur near the south polar region.</p><p>- LIBS is rapid, in situ, requires minimal sample prep, and works in vacuum.</p><p>- APXS (Alpha Particle X-ray Spectrometer) complements LIBS by elemental analysis via X-ray.</p><p>- ISRO's lunar missions: Chandrayaan-1 discovered lunar water molecules; Chandrayaan-2 orbiter continues remote sensing; Chandrayaan-3 achieved soft landing near lunar south pole.</p>",
    "question_index": 114
  },

    "question": "<span class=\"eqt\"><p>A small conducting ring is held coaxial and close to the open end of a long solenoid. The solenoid's current initially produces magnetic field lines emerging out of its open end toward the ring. The solenoid current is now steadily reduced to zero. As seen from the solenoid side, the induced current in the ring will be</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2331;&#2379;&#2335;&#2368; &#2330;&#2366;&#2354;&#2325; &#2352;&#2367;&#2306;&#2327; &#2325;&#2379; &#2319;&#2325; &#2354;&#2306;&#2348;&#2368; &#2360;&#2379;&#2354;&#2375;&#2344;&#2379;&#2311;&#2337; &#2325;&#2375; &#2326;&#2369;&#2354;&#2375; &#2360;&#2367;&#2352;&#2375; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2324;&#2352; &#2344;&#2367;&#2325;&#2335; &#2352;&#2326;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2360;&#2379;&#2354;&#2375;&#2344;&#2379;&#2311;&#2337; &#2325;&#2368; &#2343;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349; &#2350;&#2375;&#2306; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2332;&#2379; &#2311;&#2360;&#2325;&#2375; &#2326;&#2369;&#2354;&#2375; &#2360;&#2367;&#2352;&#2375; &#2360;&#2375; &#2352;&#2367;&#2306;&#2327; &#2325;&#2368; &#2323;&#2352; &#2344;&#2367;&#2325;&#2354;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2309;&#2348; &#2360;&#2379;&#2354;&#2375;&#2344;&#2379;&#2311;&#2337; &#2325;&#2368; &#2343;&#2366;&#2352;&#2366; &#2343;&#2368;&#2352;&#2375;-&#2343;&#2368;&#2352;&#2375; &#2358;&#2370;&#2344;&#2381;&#2351; &#2340;&#2325; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2379;&#2354;&#2375;&#2344;&#2379;&#2311;&#2337; &#2325;&#2368; &#2323;&#2352; &#2360;&#2375; &#2342;&#2375;&#2326;&#2344;&#2375; &#2346;&#2352;, &#2352;&#2367;&#2306;&#2327; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2343;&#2366;&#2352;&#2366; &#2361;&#2379;&#2327;&#2368;</p></span>",
    "options": [
      "<span class=\"eqt\">Clockwise</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2366;&#2357;&#2352;&#2381;&#2340;</span>",
      "<span class=\"eqt\">No current</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Alternating</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2342;&#2354;-&#2348;&#2342;&#2354; &#2325;&#2352;</span>",
      "<span class=\"eqt\">Anticlockwise</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2350;&#2366; &#2357;&#2381;&#2352;&#2340;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The outward flux through the ring is decreasing; by Lenz's law, the ring's current must produce an outward field to oppose the decrease.</p><p>An outward field corresponds to anticlockwise current when viewed from the solenoid side (right-hand rule).</p><p>Further Insights:</p><p>- If the solenoid current increased, the induced current would be clockwise (producing inward field to oppose increase).</p><p>- Induced current flows only while flux changes; it stops once current is steady.</p><p>- Right-hand rule: curl fingers along current, thumb gives loop's magnetic moment direction.</p><p>- In transformer action, secondary current direction always opposes the primary's flux change.</p>",
    "question_index": 115
  },

    "question": "<span class=\"eqt\"><p>If GDP at market prices is Rs 270 lakh crore and net factor income from abroad (NFIA) is &#8722;2% of GDP, what is GNP at market prices?</p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2332;&#2368;&#2337;&#2368;&#2346;&#2368;) 270 &#2354;&#2366;&#2326; &#2325;&#2352;&#2379;&#2337;&#2364; &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376; &#2324;&#2352; &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2358;&#2369;&#2342;&#2381;&#2343; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351; (&#2319;&#2344;&#2319;&#2347;&#2310;&#2312;&#2319;) &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2325;&#2366; &#8364;2% &#2361;&#2376;, &#2340;&#2379; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2360;&#2325;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2332;&#2368;&#2319;&#2344;&#2346;&#2368;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Rs 264.6 lakh crore</span><span class=\"hqt\" style=\"display:none\">264.6 &#2354;&#2366;&#2326; &#2325;&#2352;&#2379;&#2337;&#2364; &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs 270 lakh crore</span><span class=\"hqt\" style=\"display:none\">270 &#2354;&#2366;&#2326; &#2325;&#2352;&#2379;&#2337;&#2364; &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs 275.4 lakh crore</span><span class=\"hqt\" style=\"display:none\">275.4 &#2354;&#2366;&#2326; &#2325;&#2352;&#2379;&#2337;&#2364; &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs 284.4 lakh crore</span><span class=\"hqt\" style=\"display:none\">284.4 &#2354;&#2366;&#2326; &#2325;&#2352;&#2379;&#2337;&#2364; &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>NFIA = &#8722;0.02  X  270 = &#8722;5.4; GNP = GDP + NFIA = 270 &#8722; 5.4 = 264.6 lakh crore.</p><p>Hence, Rs 264.6 lakh crore.</p><p>Further Insights:</p><p>- GNP (or GNI) adjusts GDP for net factor income from abroad: wages, interest, profits.</p><p>- NNP = GNP &#8722; depreciation; NNI is at factor cost (or basic prices, in newer terminology).</p><p>- India commonly uses GDP at market prices and GVA at basic prices for reporting.</p><p>- NFIA is often negative for India due to net outflows of investment income.</p>",
    "question_index": 116
  },
