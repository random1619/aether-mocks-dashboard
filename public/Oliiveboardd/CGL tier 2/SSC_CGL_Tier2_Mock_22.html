    "question": "<p>Choose the correct indirect speech form of the following sentence.</p><p>The manager said to his team, \"We will be presenting the quarterly results to the board members at 10 a.m. tomorrow.\"</p>",
    "options": [
      "The manager said to his team that they would be presenting the quarterly results to the board members at 10 a.m. the next day.",
      "The manager told his team that they will be presenting the quarterly results to the board members at 10 a.m. the next day.",
      "The manager requested his team that they would be presenting the quarterly results to the board members at 10 a.m. tomorrow.",
      "The manager said to his team that they are presenting the quarterly results to the board members at 10 a.m. the next day."
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence in the Direct Speech is in Future Continuous Tense. Therefore, the sentence in the Indirect Speech should be in Conditional Continuous.</p><p>Future Continuous: Subject + will/shall + be + V1 + ing + Object</p><p>Conditional Continuous: Subject + would/should + be + V1 + ing + Object</p><p>For example:</p><p>He said, \"I will be using the book next Friday.\" (Direct Speech)</p><p>He said that he would be using the book the following Friday. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct Speech to Indirect Speech:</p><p>The reporting verb \"said\" is retained.</p><p>\"Will\" changes to \"would\".</p><p>Time expressions are adjusted (tomorrow &rarr; the next day).</p><p>Pronouns are adjusted appropriately (we &rarr; they).</p><p>Inverted commas are removed, and \"that\" is added.</p><p>Therefore, the correct answer is:</p><p>The manager said to his team that they would be presenting the quarterly results to the board members at 10 a.m. the next day.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 103
  },

    "question": "<p>Choose the correct indirect speech form of the following sentence.</p><p>The project coordinator said to the team, \"Has everyone completed their sections of the research report and submitted them to the quality assurance department before the deadline?\"</p>",
    "options": [
      "The project coordinator asked the team whether everyone has completed their sections of the research report and submitted them to the quality assurance department before the deadline.",

      "The project coordinator asked the team if everyone had completed their sections of the research report and submitted them to the quality assurance department before the deadline.",
      "The project coordinator enquired the team that everyone had completed their sections of the research report and submitted them to the quality assurance department before the deadline."
    ],
    "correct_option_id": 2,
    "solution": "<p>In the case of Interrogative sentences like this, \"said (to)\" in Direct Speech is changed into \"enquired (of)\", \"wanted to know\", \"asked\", etc.</p><p>In Indirect Speech, the verb is always placed after the subject, unlike in Direct Speech.</p><p>If there is a question in Direct Speech whose answer can come as \"Yes\" or \"No,\" we should use the conjunctions \"if\" or \"whether.\"</p><p>For example:</p><p>Ravi said to me, \"Is she studying?\" (Direct Speech)</p><p>Ravi asked me if she was studying. (Indirect Speech)</p><p>Also, the sentence in the Direct Speech is in the Present Perfect tense. So, the tense in the Indirect Speech should be in the Past Perfect tense.</p><p>The following things in the sentence should change when changed from Direct Speech to Indirect Speech:</p><p>The reporting verb \"said to\" changes to \"asked\".</p><p>The question structure is converted into a statement using \"if\" (Has everyone completed &rarr; if everyone had completed).</p><p>Inverted commas are removed.</p><p>Therefore, the correct answer is:</p><p>The project coordinator asked the team if everyone had completed their sections of the research report and submitted them to the quality assurance department before the deadline.</p><p>Hence, option (c) is correct.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following about soil formation.</p><p>I. Soils don't contain the organic matter at all.</p><p>II. Dissimilar bedrocks may have similar soils.</p><p>Which of the above statements is/are <b>incorrect</b>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2371;&#2342;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2348;&#2367;&#2354;&#2381;&#2325;&#2369;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2309;&#2360;&#2350;&#2366;&#2344; &#2310;&#2343;&#2366;&#2352;&#2358;&#2367;&#2354;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2361;&#2379; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; <b>&#2327;&#2354;&#2340;</b> &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Biodiversity Hotspots in India:</p><p>a. India has a total of four biodiversity hotspots.</p><p>b. The Eastern Himalaya and Western Ghats are included among them.</p><p>c. The Indo-Gangetic plains and Thar Desert are also classified as biodiversity hotspots.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2332;&#2376;&#2357; &#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366; &#2361;&#2377;&#2335;&#2360;&#2381;&#2346;&#2377;&#2335; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2330;&#2366;&#2352; &#2332;&#2376;&#2357; &#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366; &#2361;&#2377;&#2335;&#2360;&#2381;&#2346;&#2377;&#2335; &#2361;&#2376;&#2306;&#2404;</p><p>b. &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2361;&#2367;&#2350;&#2366;&#2354;&#2351; &#2324;&#2352; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; &#2313;&#2344;&#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</p><p>c. &#2360;&#2367;&#2306;&#2343;&#2369;-&#2327;&#2306;&#2327;&#2366; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344; &#2324;&#2352; &#2341;&#2366;&#2352; &#2352;&#2375;&#2327;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344; &#2325;&#2379; &#2349;&#2368; &#2332;&#2376;&#2357; &#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366; &#2361;&#2377;&#2335;&#2360;&#2381;&#2346;&#2377;&#2335; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">a, b and c</span><span class=\"hqt\" style=\"display:none\">a, b, c</span>",
      "<span class=\"eqt\">a and b only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">b and c only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">a and c only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statements a and b are correct, while statement c is incorrect.</p><p>India is home to four global biodiversity hotspots, which include the Eastern Himalaya and the Western Ghats.</p><p>The Indo-Gangetic plains and the Thar Desert, while being important ecological regions, do not meet the specific criteria to be classified as biodiversity hotspots.</p><p>Explanation of Statements:</p><p>Statement a is correct. India is a mega-diverse country and is home to parts of four of the 36 globally recognized biodiversity hotspots. These are:</p><p>The Himalayas</p><p>The Western Ghats</p><p>The Indo-Burma region</p><p>Sundaland</p><p>Statement b is correct. The Eastern Himalaya and the Western Ghats are two of the most well-known and significant biodiversity hotspots in India, renowned for their high levels of species richness and endemism.</p><p>Statement c is incorrect. To be classified as a biodiversity hotspot, a region must meet two strict criteria: it must contain at least 1,500 species of vascular plants as endemics (found nowhere else), and it has to have lost at least 70% of its original habitat. The Indo-Gangetic plains and the Thar Desert do not meet the criterion of exceptionally high plant endemism required for this classification.</p><p>Further insights:</p><p>The Indo-Burma Hotspot: This region includes most of North-East India (excluding Assam and the Andaman Islands), Myanmar, Thailand, Vietnam, Laos, Cambodia, and southern China.</p><p>The Sundaland Hotspot: In India, this hotspot is represented by the Nicobar Islands. The region also includes parts of Indonesia, Malaysia, Singapore, Brunei, and the Philippines.</p><p>The concept of biodiversity hotspots was first developed by scientist Norman Myers in 1988 and was later adopted and refined by Conservation International. This concept helps prioritize conservation efforts by focusing on regions that are both incredibly rich in life and under severe threat.</p><p></p>",

      "<span class=\"eqt\">To discuss India's independence</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2346;&#2352; &#2330;&#2352;&#2381;&#2330;&#2366; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To review the implementation of reforms</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2343;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2351;&#2344; &#2325;&#2368; &#2360;&#2350;&#2368;&#2325;&#2381;&#2359;&#2366; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To inquire about the Jallianwala Bagh massacre</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354;&#2367;&#2351;&#2366;&#2306;&#2357;&#2366;&#2354;&#2366; &#2348;&#2366;&#2327; &#2361;&#2340;&#2381;&#2351;&#2366;&#2325;&#2366;&#2306;&#2337; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2346;&#2370;&#2331;&#2340;&#2366;&#2331; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">To implement religious rules</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2344;&#2367;&#2351;&#2350;&#2379;&#2306; &#2325;&#2379; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Simon Commission, officially known as the Indian Statutory Commission, was appointed by the British government in 1927 to assess the progress of constitutional reforms in India as mandated by the Government of India Act 1919. The purpose was to review the effectiveness and impact of the reforms introduced in the Act. However, the Commission faced significant controversy and opposition in India for several reasons.</p><p><u>Lack of Indian Representation</u></p><p>The Simon Commission consisted entirely of British members and did not include any Indian representatives. This omission was deeply resented by the Indian political leaders and the public, as it was seen as an affront to Indian aspirations for self-governance and a denial of their right to be involved in the decision-making process regarding their own future.</p><p><u>Popular Protes</u><u>t</u></p><p>The arrival of the Simon Commission in India led to widespread protests and demonstrations across the country. People from all walks of life, led by prominent leaders of the Indian National Congress and other political parties, actively protested against the Commission's composition.</p><p><u>Impact on Indian Nationalism</u></p><p>The Simon Commission and the protests against it played a significant role in galvanizing the Indian independence movement. It united various sections of Indian society against British colonial rule and intensified the demand for full self-government and independence.</p>",
    "question_index": 108
  },

    "question": "<span class=\"eqt\"><p>Match the column.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List-I (Parts of a Flower)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List-II (Consisting of)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Calyx</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Consisting of petals</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Corolla</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Consisting of Stamens</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Androecium</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Consisting of carpels</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Gynoecium</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Consisting of sepals</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2377;&#2354;&#2350; &#2325;&#2379; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368;-I (&#2347;&#2370;&#2354; &#2325;&#2375; &#2349;&#2366;&#2327;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368;-II (&#2350;&#2367;&#2354;&#2325;&#2352; &#2348;&#2344;&#2366; &#2361;&#2369;&#2310;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2348;&#2366;&#2361;&#2381;&#2351;&#2342;&#2354;&#2346;&#2369;&#2306;&#2332;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2342;&#2354; (&#2346;&#2306;&#2326;&#2369;&#2396;&#2368;) &#2360;&#2375; &#2350;&#2367;&#2354;&#2325;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2342;&#2354;&#2346;&#2369;&#2306;&#2332;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2346;&#2369;&#2306;&#2325;&#2375;&#2360;&#2352; &#2360;&#2375; &#2350;&#2367;&#2354;&#2325;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2346;&#2369;&#2350;&#2306;&#2327;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2325;&#2366;&#2352;&#2381;&#2346;&#2375;&#2354; &#2360;&#2375; &#2350;&#2367;&#2354;&#2325;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2332;&#2366;&#2351;&#2366;&#2306;&#2327;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2348;&#2366;&#2361;&#2381;&#2351;&#2342;&#2354;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2325;&#2352;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">(i)-c, (ii)-a, (iii)-b, (iv)- d</span><span class=\"hqt\" style=\"display:none\">(i)-c, (ii)-a, (iii)-b, (iv)- d</span>",
      "<span class=\"eqt\">(i)-d, (ii)-a, (iii)-b, (iv)- c</span><span class=\"hqt\" style=\"display:none\">(i)-d, (ii)-a, (iii)-b, (iv)- c</span>",
      "<span class=\"eqt\">(i)-c, (ii)-d, (iii)-a, (iv)- b</span><span class=\"hqt\" style=\"display:none\">(i)-c, (ii)-d, (iii)-a, (iv)- b</span>",
      "<span class=\"eqt\">(i)-b, (ii)-a, (iii)-d, (iv)- c</span><span class=\"hqt\" style=\"display:none\">(i)-b, (ii)-a, (iii)-d, (iv)- c</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct matching is:</p><p>i. Calyx  d. Consisting of sepals: The calyx is the outermost whorl of a flower, typically green and leaf-like, composed of individual units called sepals. Its main function is to protect the flower bud.</p><p>ii. Corolla  a. Consisting of petals: The corolla is the whorl located inside the calyx, composed of individual units called petals. Petals are often brightly colored to attract pollinators.</p><p>iii. Androecium  b. Consisting of Stamens: The androecium is the male reproductive part of a flower, located inside the corolla. It consists of one or more stamens. Each stamen typically has a filament and an anther (which produces pollen).</p><p>iv. Gynoecium  c. Consisting of carpels: The gynoecium (also called pistil) is the female reproductive part of a flower, usually located in the center. It consists of one or more carpels. Each carpel (or a fused structure of carpels) typically comprises an ovary (containing ovules), a style, and a stigma.</p><p>Therefore, the correct option is (b) (i)-d, (ii)-a, (iii)-b, (iv)- c.</p><p>Further insights:</p><p>These four whorls (calyx, corolla, androecium, gynoecium) represent the typical structure of a complete flower.</p><p>The calyx and corolla are considered non-essential (or accessory) whorls as they are not directly involved in reproduction, while the androecium and gynoecium are essential whorls.</p>",
    "question_index": 109
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about functions of Adrenaline hormone.</p><p>I. Increase in heartbeat rate.</p><p>II. Supply of more oxygen to muscles</p><p>III. Increased blood supply to the digestive system.</p><p>Which among the above statements is /are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2337;&#2381;&#2352;&#2375;&#2344;&#2366;&#2354;&#2366;&#2312;&#2344; &#2361;&#2366;&#2352;&#2381;&#2350;&#2379;&#2344; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2361;&#2371;&#2342;&#2351; &#2325;&#2368; &#2343;&#2337;&#2364;&#2325;&#2344; &#2325;&#2368; &#2342;&#2352; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;&#2404;</p><p>II. &#2350;&#2366;&#2306;&#2360;&#2346;&#2375;&#2358;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2309;&#2343;&#2367;&#2325; &#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344; &#2325;&#2368; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367;&#2404;</p><p>III. &#2346;&#2366;&#2330;&#2344; &#2340;&#2306;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2352;&#2325;&#2381;&#2340; &#2325;&#2368; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Adrenal glands secrete <b> adrenaline hormone that regulates body under abnormal conditions like anxiety, fear etc. </b></p><p>Statement I and II is correct: Adrenaline is secreted directly into the blood and carried to different parts of the body. The target organs or the specific issues on which it acts include the heart. As a result, the heart beats faster, resulting in the supply of more oxygen to our muscles. The breathing rate also increases because of the contractions of the diaphragm and the rib muscles. All these responses together enable the animal body to be ready to deal with the situation.</p><p>Statement III is incorrect: The blood to the digestive system and skin is <b>reduced due to contraction of muscles </b> around small arteries in these organs. This diverts the blood to our skeletal muscles.</p><p><b> The breathing rate also increases </b> because of the contractions of the diaphragm and the rib muscles. All these responses together enable the animal body to be ready to deal with the situation.</p><p>Source: NCERT- X</p>",
    "question_index": 110
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding acids and bases:</p><p>i. Strong acids completely ionize in aqueous solutions, whereas weak acids partially ionize.</p><p>ii. The pH value of a strong acid is higher than that of a weak acid of the same concentration.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2350;&#2381;&#2354; &#2324;&#2352; &#2325;&#2381;&#2359;&#2366;&#2352; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. &#2346;&#2381;&#2352;&#2348;&#2354; &#2309;&#2350;&#2381;&#2354; &#2332;&#2354;&#2368;&#2351; &#2357;&#2367;&#2354;&#2351;&#2344; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2310;&#2351;&#2344;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2342;&#2369;&#2352;&#2381;&#2348;&#2354; &#2309;&#2350;&#2381;&#2354; &#2310;&#2306;&#2358;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2310;&#2351;&#2344;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>ii. &#2346;&#2381;&#2352;&#2348;&#2354; &#2309;&#2350;&#2381;&#2354; &#2325;&#2366; pH &#2350;&#2366;&#2344; &#2360;&#2350;&#2366;&#2344; &#2360;&#2366;&#2306;&#2342;&#2381;&#2352;&#2340;&#2366; &#2357;&#2366;&#2354;&#2375; &#2342;&#2369;&#2352;&#2381;&#2348;&#2354; &#2309;&#2350;&#2381;&#2354; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Both i and ii</span><span class=\"hqt\" style=\"display:none\">i &#2324;&#2352; ii &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither i nor ii</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii</span>",
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">ii &#2325;&#2375;&#2357;&#2354;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement i is a correct definition of the difference between strong and weak acids.</p><p>Statement ii is incorrect because a stronger acid produces a higher concentration of hydrogen ions, resulting in a lower pH value, not a higher one. Therefore, only the first statement is correct.</p><p>Explanation of Statements:</p><p>Statement i is correct. The strength of an acid is determined by its degree of ionization (or dissociation) in water. A strong acid, such as hydrochloric acid (HCl), dissociates completely into its constituent ions (H&#8314; and Cl&#8315;) when dissolved in water. A weak acid, such as acetic acid (CH&#8323;COOH), only partially dissociates, meaning that in solution, it exists in an equilibrium containing both the ionized form (H&#8314; and CH&#8323;COO&#8315;) and the undissociated molecule (CH&#8323;COOH).</p><p>Statement ii is incorrect. The pH scale is a logarithmic measure of hydrogen ion (H&#8314;) concentration, where pH = -log[H&#8314;]. A lower pH indicates a higher concentration of H&#8314; ions and thus a stronger acidity. Since a strong acid completely ionizes, it produces a much higher concentration of H&#8314; ions than a weak acid of the same molar concentration. Consequently, a strong acid will have a significantly lower pH value than a weak acid of the same concentration.</p><p>Further insights:</p><p>The strength of a weak acid is quantified by its acid dissociation constant (Ka). A smaller Ka value indicates a weaker acid.</p><p>Examples of strong acids include Hydrochloric acid (HCl), Sulfuric acid (H&#8322;SO&#8324;), and Nitric acid (HNO&#8323;).</p><p>Examples of weak acids include Acetic acid (CH&#8323;COOH), Carbonic acid (H&#8322;CO&#8323;), and Formic acid (HCOOH).</p><p>A similar principle applies to bases: strong bases (like NaOH) dissociate completely, while weak bases (like NH&#8323;) react with water only partially to produce hydroxide ions (OH&#8315;).</p><p></p>",
    "question_index": 111
  },

    "question": "<span class=\"eqt\"><p>Which of the following articles of the Constitution of India prohibits the Consumption of intoxicating drinks and drugs that are harmful to health.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2361;&#2366;&#2344;&#2367;&#2325;&#2366;&#2352;&#2325; &#2350;&#2366;&#2342;&#2325; &#2346;&#2375;&#2351; &#2324;&#2352; &#2342;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2375;&#2357;&#2344; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2306;&#2343; &#2354;&#2327;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 50</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 50</span>",
      "<span class=\"eqt\">Article 39A</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 39A</span>",
      "<span class=\"eqt\">Article 47</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 47</span>",
      "<span class=\"eqt\">Article 45</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 45</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Article 47 under DPSPs of the Constitution of India prohibits the consumption of intoxicating drinks and drugs that are harmful to health, except for medicinal purposes.</p><p>Further Insight:</p><p>&bull; DPSPs</p><p>&#9675; Article 36-37: Defines DPSPs and states they are not enforceable by law.</p><p>&#9675; Article 38: Directs the state to promote the welfare of the people.</p><p>&#9675; Article 39: Focuses on equal right to adequate livelihood and fair distribution of resources.</p><p>&#9675; Article 39A: Promotes equal justice and free legal aid.</p><p>&#9675; Article 40: Advocates for the organization of village panchayats.</p><p>&#9675; Article 41: Right to work, education, and public assistance in certain cases.</p><p>&#9675; Article 42: Just and humane conditions of work, maternity relief.</p><p>&#9675; Article 43: Living wage for workers.</p><p>&#9675; Article 44: Uniform Civil Code for citizens.</p><p>&#9675; Article 45: Free and compulsory education for children.</p><p>&#9675; Article 46: Promotion of educational and economic interests of Scheduled Castes, Scheduled Tribes, and other weaker sections.</p><p>&#9675; Article 47: Duty of the state to raise the nutrition level and standard of living. And prohibit consumption of toxicant substance including alcohol and drugs</p><p>&#9675; Article 48: Agriculture and animal husbandry organization.</p><p>&#9675; Article 48A: Protection of the environment.</p><p>&#9675; Article 49: Protection of monuments and places of historical interest.</p><p>&#9675; Article 50: Separation of judiciary from the executive.</p><p>&#9675; Article 51: Promotion of international peace and security.</p>",
    "question_index": 112
  },

    "solution": "<p>Subhasish Bose and Soumya Guguloth were named the AIFF Best Men's and Women's Players of the Year 2024-25 on the AIFF Awards Day in Bhubaneswar, May 2, 2025.</p><p>The award function was held in the Odisha capital on the Kalinga Super Cup 2025 final.</p><p>Soumya Guguloth became the first player from Telangana to win the AIFF Women's Player of the Year Award. Vishal Kaith was named the Best Men's Goalkeeper after a historic and record-breaking campaign between the sticks for Mohun Bagan SG.</p><p>He won his second ISL Golden Glove after amassing 15 clean sheets this season, and also became the first goalkeeper to reach a half-century of clean sheets in ISL history.</p><p>List of all AIFF Award Winners for 2024-25:</p><p></p><p>Men's Player of the Year:'Subhasish Bose</p><p>Women's Player of the Year:'Soumya Guguloth</p><p>Promising Men's Player of the Year:'Brison Fernandes</p><p>Promising Women's Player of the Year:'Toijam Thoibisana Chanu</p><p>Best Men's Goalkeeper:'Vishal Kaith</p><p>Best Women's Goalkeeper:'Elangbam Panthoi Chanu</p><p>Men's Coach of the Year:'Khalid Jamil</p><p>Women's Coach of the Year:'Sujata Kar</p><p>Male Referee of the Year:'Venkatesh R</p><p>Male Assistant Referee of the Year:'Vairamuthu P</p><p>Female Referee of the Year:'Tekcham Ranjita Devi</p><p>Female Assistant Referee of the Year:'Riiohlang Dhar</p><p>President's special honour for coaching excellence:'Ranjan Chowdhury</p><p>Most Successful MA (Club Competitions):'Indian Football Association (West Bengal)</p><p>Most Successful MA (NFC Competitions):'All Manipur Football Association and Indian Football Association (West Bengal)</p><p>Best MA for hosting most AIFF competitions:'Assam Football Association, Indian Football Association (West Bengal) and Karnataka State Football Association</p><p>MA with most player registrations (men's):'Western India Football Association (Maharashtra)</p><p>MA with most player registrations (women's):'Western India Football Association (Maharashtra)</p><p>Special Award for MA launching new projects:'Kerala Football Association and Nagaland Football Association</p><p>MA with most Grassroots activities:'Western India Football Association (Maharashtra)</p><p>MA with most Coaching courses:'Punjab Football Association</p><p>MA with most Refereeing courses:'Kerala Football Association</p>",

    "question": "<span class=\"eqt\"><p>Which web-based platform was launched by the Union Minister of Jal Shakti to automate reservoir storage data analysis, provide real-time updates, and issue weekly bulletins on the live storage capacity of 161 major reservoirs across India, in April 2025?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2332;&#2354; &#2358;&#2325;&#2381;&#2340;&#2367; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2344;&#2375; &#2332;&#2354;&#2366;&#2358;&#2351; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2337;&#2375;&#2335;&#2366; &#2357;&#2367;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2325;&#2379; &#2360;&#2381;&#2357;&#2330;&#2366;&#2354;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375;, &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2350;&#2351; &#2309;&#2346;&#2337;&#2375;&#2335; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2309;&#2346;&#2381;&#2352;&#2376;&#2354; 2025 &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2349;&#2352; &#2350;&#2375;&#2306; 161 &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2332;&#2354;&#2366;&#2358;&#2351;&#2379;&#2306; &#2325;&#2368; &#2354;&#2366;&#2311;&#2357; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2346;&#2352; &#2360;&#2366;&#2346;&#2381;&#2340;&#2366;&#2361;&#2367;&#2325; &#2348;&#2369;&#2354;&#2375;&#2335;&#2367;&#2344; &#2332;&#2366;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2375;&#2348;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2346;&#2381;&#2354;&#2375;&#2335;&#2347;&#2377;&#2352;&#2381;&#2350; &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">National Water Storage Management System</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2332;&#2354; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Reservoir Data Analysis and Monitoring Portal</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354;&#2366;&#2358;&#2351; &#2337;&#2375;&#2335;&#2366; &#2357;&#2367;&#2358;&#2381;&#2354;&#2375;&#2359;&#2339; &#2324;&#2352; &#2344;&#2367;&#2327;&#2352;&#2366;&#2344;&#2368; &#2346;&#2379;&#2352;&#2381;&#2335;&#2354;</span>",
      "<span class=\"eqt\">Web-based Reservoir Storage Monitoring System</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2348;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2332;&#2354;&#2366;&#2358;&#2351; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2344;&#2367;&#2327;&#2352;&#2366;&#2344;&#2368; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Central Water Resource Information Platform</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2332;&#2354; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344; &#2360;&#2370;&#2330;&#2344;&#2366; &#2350;&#2306;&#2330;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Union Minister of Jal Shakti Shri C.R. Patil launched Web based Reservoir Storage Monitoring System (RSMS) Portal at New Delhi.</p><p>Central Water Commission monitors Live Storage Capacity of 161 important reservoirs of country an issues weekly bulletin on every Thursday.</p><p>The total live storage capacity of these reservoirs at FRL is 182.375 BCM which is about 70.74% of the total live storage capacity estimated to have been created in the country.</p><p>This Bulletin is sent to PMO, Niti Aayog, MoJS, MOP, MOA&FW, IMD, Disaster Management Authorities and all concerned states as well as uploaded on CWC web site.</p><p>The present system involves manual generation of various Graphs, Charts and Tables etc. for inclusion in the bulletin. However, in the new portal all required data analysis and generating maps, tables, graphs etc. including issuing the final bulletin shall be done automatically by clicking the button(s) once the data is entered in the portal. If required, any person can also download the bulletin from the portal.</p><p>On 3.4.2025, first bulletin of Financial Year 2025-26 has been issued with the launch of Web based Reservoir Storage Monitoring System (RSMS) Portal by Union Minister of Jal Shakti.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about Pardoning powers of the President:</p><p>I. It is independent of the Judiciary.</p><p>II. It is executive power.</p><p>III. The President acts as a court of appeal while exercising this power.</p><p>Select the INCORRECT statements using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2366;&#2342;&#2366;&#2344; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2351;&#2361; &#2344;&#2381;&#2351;&#2366;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2360;&#2375; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2361; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2361;&#2376;&#2404;</p><p>III. &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2311;&#2360; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2375; &#2360;&#2350;&#2351; &#2309;&#2346;&#2368;&#2354; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2370;&#2335; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2327;&#2354;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>A Statement I and II are correct. Statement III is NOT correct.</b></p><p>The pardoning power of the President is <b>independent of the Judiciary</b>. It is an <b>executive power</b>.</p><p>But the President while exercising this power, <b>does not act as a court of appeal.</b></p><p>The object of conferring this power on the President is two-fold:</p><p>(a) To keep door open for correcting any judicial errors in the operation of law.</p><p>(b) To afford relief from a sentence, which the President regards as unduly harsh.</p><p></p>",

    "question": "<span class=\"eqt\"><p>Which of the following quantities is correctly matched with its SI unit?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2352;&#2366;&#2358;&#2367; &#2309;&#2346;&#2344;&#2368; SI &#2350;&#2366;&#2340;&#2381;&#2352;&#2325; &#2360;&#2375; &#2360;&#2361;&#2368; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2361;&#2376;?</p></span>",

    "solution": "<p>&bull; <b>Kilogram</b> is the SI unit for mass.</p><p>&bull; <b>Electric current</b> is measured in amperes, not <b>volt</b> (1).</p><p>&bull; <b>Time</b> is measured in seconds, not <b>minute</b> (2).</p><p>&bull; <b>Length</b> is measured in <b>metres</b>, not <b>centimetres</b> (4).</p><p><b>Further Insight:</b></p><p>&bull; <b>Fundamental Quantities and Their SI Units</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Quantity</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>SI Unit</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Symbol</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Length</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Metre</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">m</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mass</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Kilogram</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">kg</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Time</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Second</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">s</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Electric current</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ampere</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Thermodynamic temperature</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Kelvin</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">K</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Amount of substance</td><td align=\"le     ],
    "correct_option_id": 0,
    "solution": "<p>Koppen's scheme of climatic classification uses letter symbols to denote climatic types.</p><p>Each type is further sub-divided into sub-types on the basis of seasonal variations in the distributional pattern of rainfall and temperature.</p><p>It uses S for semi-arid and W for arid and the following small letters to define sub-types: f (sufficient precipitation), m (rain forest despite a dry monsoon season), w (dry season in winter), h (dry and hot), c (less than four months with mean temperature over 10&deg;C), and g (Gangetic plain).</p><p>Based on this classification Indian climate can be divided into following types:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Type of Climate</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Areas</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Amw Monsoon with short dry season</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">West coast of India south of Go.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>As  -  Monsoon with dry summer</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Coromandel coast of Tamil Nadu</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Aw  -  Tropical savannah</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Most of the Peninsular plateaus, south of the Tropic of Cancer<b>. (Statement II is correct)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Bwhw  -  Semi-arid steppe climate</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">North-western Gujarat, some parts of western Rajasthan and Punjab<b>. <i>(Statement I is correct)</i></b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Bwhw  -  Hot desert</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Extreme western Rajasthan</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Cwg  -  Monsoon with dry winter</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ganga plain, eastern Rajasthan, northern Madhya Pradesh, most of North-east India</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Dfc  -  Cold humid winter with short summer</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Arunachal Pradesh</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>E  -  Polar type</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Jammu and Kashmir, Himachal Pradesh and Uttarakhand. (<b>Statement III is incorrect)</b></td></tr></table><p><img width=432 height=541 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p7842/image003.jpg\" ></p><p>Map Source: NCERT</p><p>Source: NCERT</p>",
    "question_index": 118
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Devaluation of currency:</p><p>I. It is a decrease in the value of the domestic currency as determined by the market forces of demand and supply.</p><p>II. It helps in increasing the import of goods by the country.</p><p>Which of the above statements is/are INCORRECT?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2325;&#2375; &#2309;&#2357;&#2350;&#2370;&#2354;&#2381;&#2351;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2351;&#2361; &#2350;&#2366;&#2306;&#2327; &#2324;&#2352; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2368; &#2348;&#2366;&#2332;&#2366;&#2352; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2328;&#2352;&#2375;&#2354;&#2370; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2325;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2361; &#2342;&#2375;&#2358; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2310;&#2351;&#2366;&#2340; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Statement I is incorrect:</b> In foreign exchange market, when exchange rate of a domestic currency is cut down by its government against any foreign currency, it is called devaluation.</p><p>Depreciation is when domestic currency loses its value in front of a foreign currency if it is <b>market driven</b>.</p><p><b>Statement II is incorrect:</b> Devaluation increases the exports from the country as the currency becomes cheaper and reduces imports as more money is needed than before to import goods from other countries.</p>",
    "question_index": 119
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about 'Mahalanobis Model'.</p><p>I. It emphasized on heavy industries.</p><p>II. It is associated with the First five-year plan.</p><p>Which of the following statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2350;&#2361;&#2366;&#2354;&#2344;&#2379;&#2348;&#2367;&#2360; &#2350;&#2377;&#2337;&#2354;' &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2311;&#2360;&#2344;&#2375; &#2349;&#2366;&#2352;&#2368; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2346;&#2352; &#2332;&#2379;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>II. &#2351;&#2361; &#2346;&#2361;&#2354;&#2368; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II.</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II.</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b> Mahalanobis Model is also known as 'heavy industry' strategy </b>. The economy is divided into two sectors, one producing capital/investment good and the other producing consumer goods. The argument is that, for long-run sustained growth of consumer goods, the initial buildup of the investment goods sector is essential. So, the statement I is correct.</p><p><b> Second Five Year Plan </b> is associated with this type of model.</p><p><b> First five-year plan was based on Harrold-Domer model </b>. It suggests that there is no natural reason for an economy to have balanced growth. So, statement II is incorrect.</p><p></p>",
    "question_index": 120
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about the division of powers between Union and States:</p><p>i. Education and forests were originally in the State List but later shifted to the Concurrent List by the 42nd Amendment.</p><p>ii. Police and public order remain under the Union List.</p><p>iii. Communications, banking, and currency are under the Union List.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2328; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2324;&#2352; &#2357;&#2344; &#2350;&#2370;&#2354; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2341;&#2375;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2348;&#2366;&#2342; &#2350;&#2375;&#2306; 42&#2357;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2350;&#2357;&#2352;&#2381;&#2340;&#2368; &#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319;&#2404;</p><p>ii. &#2346;&#2369;&#2354;&#2367;&#2360; &#2324;&#2352; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2360;&#2306;&#2328; &#2360;&#2370;&#2330;&#2368; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2348;&#2344;&#2368; &#2361;&#2369;&#2312; &#2361;&#2376;&#2404;</p><p>iii. &#2360;&#2306;&#2330;&#2366;&#2352;, &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2324;&#2352; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2360;&#2306;&#2328; &#2360;&#2370;&#2330;&#2368; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; iii</span>",
      "<span class=\"eqt\">i and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statements i and iii are correct, while statement ii is incorrect.</p><p>Police and public order are fundamental responsibilities of state governments and are therefore placed under the State List.</p><p>The other two statements accurately describe the placement of key subjects within the constitutional framework.</p><p>Explanation of Statements:</p><p>Statement i is correct. The 42nd Constitutional Amendment Act of 1976 was a significant restructuring of the division of powers. It transferred five subjects from the State List to the Concurrent List: (a) Education, (b) Forests, (c) Protection of wild animals and birds, (d) Weights and measures, and (e) Administration of justice. This allows both the central and state governments to legislate on these subjects.</p><p>Statement ii is incorrect. \"Police\" and \"Public order\" are exclusively under the State List (List II of the Seventh Schedule). This makes law and order a primary responsibility of the state governments. The Union government maintains central forces like the CRPF and BSF, which can be deployed to assist states, but general policing falls under state jurisdiction.</p><p>Statement iii is correct. Subjects of national importance that require uniform policy across the country are placed in the Union List (List I). Communications, banking, and currency are prime examples of such subjects, over which only the Parliament has the power to legislate.</p><p>Further insights:</p><p>The Seventh Schedule to the Constitution of India specifies the allocation of powers and functions between the Union and the States. It contains three lists:</p><p>List I (Union List): Contains subjects of national importance like defence, foreign affairs, currency, banking, and communications. The Union Parliament has exclusive power to make laws on these subjects.</p><p>List II (State List): Contains subjects of state and local importance such as police, public order, public health, agriculture, and local government. State Legislatures have exclusive power to make laws on these subjects.</p><p>List III (Concurrent List): Contains subjects where uniformity of legislation is desirable but not essential. Both Parliament and State Legislatures can make laws. Examples include education, forests, marriage, and criminal law. In case of a conflict between a central law and a state law on a concurrent subject, the central law prevails.</p><p></p>",
    "question_index": 121
  },
  {
    "question": "<span class=\"eqt\"><p>According to the Census of India 2011, most people had out-migrated from _____ to other states in India.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; 2011 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2354;&#2379;&#2327; _____ &#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2309;&#2344;&#2381;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2354;&#2366;&#2351;&#2344; &#2325;&#2352; &#2327;&#2319; &#2341;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rajasthan and Gujarat</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344; &#2324;&#2352; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340;</span>",
      "<span class=\"eqt\">Uttar Pradesh and Madhya Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2324;&#2352; &#2350;&#2343;&#2381;&#2351; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Maharashtra and Gujarat</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2324;&#2352; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340;</span>",
      "<span class=\"eqt\">Uttar Pradesh and Bihar</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2324;&#2352; &#2348;&#2367;&#2361;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Uttar Pradesh and Bihar had the highest number of people out-migrating to other states in India according to the Census of India 2011. This means a significant number of people from these states moved to other parts of the country. 20.9 million people migrated outside the state from the two states. This is 37% of the total number of people who were inter-state migrants.</p><p>Several factors contributed to this large-scale migration:</p><p>Economic disparities: These states have historically faced economic challenges, leading many people to seek better job opportunities and livelihoods in other regions.</p><p>Educational opportunities: The perception of better educational facilities in other states has driven many students to migrate for higher studies.</p><p>Demographic factors: High population growth rates in these states have put pressure on resources, leading to increased outmigration.</p><p>Social factors: Family and social networks often influence migration decisions, with people following relatives or friends to established destinations.</p><p></p><p></p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about species diversity of the earth.</p><p>I. Among vertebrates, fishes have the highest species diversity.</p><p>II. Plants have more species diversity than animals.</p><p>III. Fungi species have more diversity than all fauna species.</p><p>Which among the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2325;&#2368; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2325;&#2358;&#2375;&#2352;&#2369;&#2325;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2350;&#2331;&#2354;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2346;&#2380;&#2343;&#2379;&#2306; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2357;&#2352;&#2379;&#2306; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>III. &#2325;&#2357;&#2325; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2332;&#2368;&#2357; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325; &#2357;&#2367;&#2357;&#2367;&#2343;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I is correct: Among vertebrates fishes comprises for around 50% of total diversity of vertebrates.</p><p>Statement II is incorrect: More than 70 per cent of all the species recorded are animals, while plants (including algae, fungi, bryophytes, gymnosperms and angiosperms) comprise no more than 22 per cent of the total. Among animals, insects are the most species-rich taxonomic group, making up more than 70 per cent of the total.</p><p>Statement III is correct: The number of fungi species in the world is more than the combined total of the species of fishes, amphibians, reptiles and mammals.</p><p></p><p>Source: XIIth Biology NCERT</p>",
    "question_index": 123
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding <b>Gross National Product</b> of an economy:</p><p>I. It indicates both quantitative and qualitative aspects of the economy.</p><p>II. India's GNP has been always higher than its Gross Domestic Product (GDP).</p><p>Which of the above statements is/are <b>incorrect</b>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; <b>&#2360;&#2325;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</b> &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2351;&#2361; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2324;&#2352; &#2327;&#2369;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2361;&#2354;&#2369;&#2323;&#2306; &#2325;&#2379; &#2311;&#2306;&#2327;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2332;&#2368;&#2319;&#2344;&#2346;&#2368; &#2361;&#2350;&#2375;&#2358;&#2366; &#2313;&#2360;&#2325;&#2375; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (&#2332;&#2368;&#2337;&#2368;&#2346;&#2368;) &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; <b>&#2327;&#2354;&#2340;</b> &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"

    "correct_option_id": 1,
    "solution": "<p>GNP is the GDP added with its 'income from abroad'. In this, the contribution of nationals of a country from all over the world which includes private remittances, interest on external loans, external grants are added. Income from abroad can be positive or negative.</p><p>In India's case, it has been negative due to the heavy outflows on account of trade deficit and interest payments on foreign loans.</p><p>This means that India's GNP is always lesser than its GDP. <b>Hence statement 2 is incorrect</b>. As it indicates both the internal and external aspects of the economy, it is both quantitative and qualitative. <b>Hence statement 1 is correct.</b></p>",
    "question_index": 124
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about the PM KUSUM Scheme:</p><p>i. It aims to promote the use of solar energy among farmers by providing financial assistance for solar pumps.</p><p>ii. The scheme is implemented by the Ministry of New and Renewable Energy (MNRE).</p><p>iii. Under this scheme, only large-scale commercial farmers are eligible for the subsidy component.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2368;&#2319;&#2350; &#2325;&#2369;&#2360;&#2369;&#2350; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. &#2311;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2360;&#2380;&#2352; &#2346;&#2306;&#2346;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2325;&#2375; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2380;&#2352; &#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>ii. &#2351;&#2361; &#2351;&#2379;&#2332;&#2344;&#2366; &#2344;&#2357;&#2368;&#2344; &#2324;&#2352; &#2344;&#2357;&#2368;&#2325;&#2352;&#2339;&#2368;&#2351; &#2314;&#2352;&#2381;&#2332;&#2366; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; (&#2319;&#2350;&#2319;&#2344;&#2310;&#2352;&#2312;) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2367;&#2340; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>iii. &#2311;&#2360; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2340;&#2361;&#2340;, &#2325;&#2375;&#2357;&#2354; &#2348;&#2337;&#2364;&#2375; &#2346;&#2376;&#2350;&#2366;&#2344;&#2375; &#2346;&#2352; &#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351;&#2367;&#2325; &#2325;&#2367;&#2360;&#2366;&#2344; &#2361;&#2368; &#2360;&#2348;&#2381;&#2360;&#2367;&#2337;&#2368; &#2328;&#2335;&#2325; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2366;&#2340;&#2381;&#2352; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; iii</span>",
      "<span class=\"eqt\">i and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statements i and ii are correct descriptions of the PM KUSUM scheme's objectives and implementation. Statement iii is incorrect because the scheme is designed to be inclusive, benefiting all categories of farmers, not just large-scale commercial ones.</p><p>Explanation of Statements:</p><p>Statement i is correct. The Pradhan Mantri Kisan Urja Suraksha evam Utthaan Mahabhiyan (PM KUSUM) scheme's primary objective is to enhance farmers' income, provide a reliable source of water, and de-dieselise the agriculture sector. It achieves this by providing financial support for the installation of standalone solar-powered agricultural pumps and the solarization of existing grid-connected agricultural pumps.</p><p>Statement ii is correct. The PM KUSUM scheme is a flagship initiative of the Ministry of New and Renewable Energy (MNRE), Government of India. The MNRE is the nodal agency responsible for the overall policy framework, coordination, and implementation of the scheme across the country through state-level agencies.</p><p>Statement iii is incorrect. The scheme is not restricted to large-scale commercial farmers. It is open to individual farmers, groups of farmers, farmer producer organisations (FPOs), cooperatives, and panchayats. The scheme's aim is broad-based rural development and energy security, with a particular focus on benefiting small and marginal farmers as well.</p><p>Further insights:</p><p>The PM KUSUM scheme has three main components:</p><p>Component-A: Setting up of 10,000 MW of decentralized grid-connected renewable energy power plants of 500 KW to 2 MW on barren/fallow land.</p><p>Component-B: Installation of 20 lakh standalone solar-powered agriculture pumps.</p><p>Component-C: Solarization of 15 lakh existing grid-connected agriculture pumps.</p><p>The scheme provides a dual benefit to farmers: it reduces their dependence on costly diesel for irrigation and provides them with an opportunity to earn additional income by selling surplus solar power to the electricity distribution companies (DISCOMs).</p><p></p>",
    "question_index": 125
  },

    "question": "<span class=\"eqt\"><p>Match the following</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List I (Book)</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List II (Author)</th></p><p></tr></p><p><tr></p><p></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Train to Pakistan</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. R.K. Narayan</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. The Guide</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Khushwant Singh</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. The Private Life of an Indian Prince</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Mulk Raj Anand</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. A Bend in the Ganges</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Manohar Malgonkar</td></p><p></tr></p><p></table></p><p>Select the correct match:</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;</p><p><table style=\"border-collapse:collapse;\"><tr></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2335;&#2381;&#2352;&#2375;&#2344; &#2335;&#2370; &#2346;&#2366;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2310;&#2352;.&#2325;&#2375;. &#2344;&#2366;&#2352;&#2366;&#2351;&#2339;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2342; &#2327;&#2366;&#2311;&#2337;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2326;&#2369;&#2358;&#2357;&#2306;&#2340; &#2360;&#2367;&#2306;&#2361;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2342; &#2346;&#2381;&#2352;&#2366;&#2311;&#2357;&#2375;&#2335; &#2354;&#2366;&#2311;&#2347; &#2321;&#2347;&#2364; &#2319;&#2344; &#2311;&#2306;&#2337;&#2367;&#2351;&#2344; &#2346;&#2381;&#2352;&#2367;&#2306;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2350;&#2369;&#2354;&#2381;&#2325; &#2352;&#2366;&#2332; &#2310;&#2344;&#2306;&#2342;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2319; &#2348;&#2375;&#2306;&#2337; &#2311;&#2344; &#2342; &#2327;&#2306;&#2327;&#2366;&#2332;&#2364;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2350;&#2344;&#2379;&#2361;&#2352; &#2350;&#2366;&#2354;&#2327;&#2379;&#2344;&#2325;&#2352;</td></tr></table></p><p>&#2360;&#2361;&#2368; &#2350;&#2367;&#2354;&#2366;&#2344; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",

    "correct_option_id": 0,
    "solution": "<p>Train to Pakistan - Khushwant Singh: Published in 1956, this is one of the most poignant and powerful novels depicting the human tragedy of the Partition of India in 1947. Khushwant Singh's narrative focuses on the social and personal impact of the violence on a small, fictional village, Mano Majra, rather than the political events.</p><p>The Guide - R.K. Narayan: This celebrated 1958 novel by R.K. Narayan won him the Sahitya Akademi Award. Set in his famous fictional town of Malgudi, it tells the story of Raju, a tour guide who transforms into a spiritual guru. The book explores themes of identity, illusion, and redemption and was famously adapted into a film.</p><p>The Private Life of an Indian Prince - Mulk Raj Anand: Published in 1953, this novel by Mulk Raj Anand is a psychological exploration of the decline of the Indian princely order following the country's independence. It provides a sharp critique of the feudal system and the personal turmoil of a prince unable to cope with the changing political landscape.</p><p>A Bend in the Ganges - Manohar Malgonkar: This 1964 novel is an epic that chronicles India's journey to independence, the violence of the Partition, and its aftermath. Manohar Malgonkar's narrative follows two protagonists who represent contrasting ideologies-one Gandhian non-violence and the other revolutionary action.</p>",
