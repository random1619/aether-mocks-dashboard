    "question": "<span class=\"eqt\"><p>In January 2025, NITI Aayog launched the 'Fiscal Health Index (FHI) 2025' in New Delhi. Which of the following statements regarding the Fiscal Health Index 2025 is/are correct?</p><p>I. Odisha ranks first in fiscal health with a composite score of 67.8, followed by Chhattisgarh and Goa.</p><p>II. The index is based on five key sub-indices.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2357;&#2352;&#2368; 2025 &#2350;&#2375;&#2306;, &#2344;&#2368;&#2340;&#2367; &#2310;&#2351;&#2379;&#2327; &#2344;&#2375; &#2344;&#2312; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2350;&#2375;&#2306; '&#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; (FHI) 2025' &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366;&#2404; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; 2025 &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2323;&#2337;&#2367;&#2358;&#2366; 67.8 &#2325;&#2375; &#2360;&#2350;&#2327;&#2381;&#2352; &#2360;&#2381;&#2325;&#2379;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2361;&#2376;, &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2331;&#2340;&#2381;&#2340;&#2368;&#2360;&#2327;&#2338;&#2364; &#2324;&#2352; &#2327;&#2379;&#2357;&#2366; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2351;&#2361; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; &#2346;&#2366;&#2305;&#2330; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2313;&#2346;-&#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325;&#2379;&#2306; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Hon'ble Chairman of the 16th Finance Commission, Dr. Arvind Panagariya, launched the inaugural issue of NITI Aayog's report titled 'Fiscal Health Index (FHI) 2025' on 24th January 2025 in New Delhi.</p><p>The report provides a comprehensive assessment of the fiscal health of 18 major States, based on <b>five key sub-indices:</b> Quality of Expenditure, Revenue Mobilisation, The FHI aims to throw light on the fiscal status at the sub-national level and guide policy reforms for sustainable and resilient economic growth.</p><p>The report ranks States on the basis of composite fiscal index, which is based on five major sub-indices viz, quality of expenditure, revenue mobilisation, fiscal prudence, debt index, and debt sustainability.</p><p>With a cumulative score of <b>67.8, Odisha tops the ranking in fiscal health among 18 major States, followed by Chhattisgarh and Goa with scores of 55.2 and 53.6, respectively.</b> The achiever States display strong fiscal health, excelling in revenue mobilization, expenditure management, and debt sustainability.</p><p>Improvements are seen in states like Jharkhand, which has strengthened fiscal prudence and debt sustainability, while Karnataka faces a decline due to weaker performance in expenditure quality and debt management.</p><p>These interstate disparities highlight the need for targeted reforms to address specific fiscal challenges and ensure sustainable growth.</p>",

  },

    "question": "<span class=\"eqt\"><p>Which tide is caused when the sun, moon and earth are in straight line?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2360;&#2370;&#2352;&#2381;&#2351;, &#2330;&#2306;&#2342;&#2381;&#2352;&#2350;&#2366; &#2324;&#2352; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2319;&#2325; &#2360;&#2368;&#2343;&#2368; &#2352;&#2375;&#2326;&#2366; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2379; &#2325;&#2380;&#2344; &#2360;&#2366; &#2332;&#2381;&#2357;&#2366;&#2352; &#2310;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Neap tides</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344; &#2332;&#2381;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Diurnal tides</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2376;&#2344;&#2367;&#2325; &#2332;&#2381;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Spring tides</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2360;&#2306;&#2340; &#2332;&#2381;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Spring Tides:</b> When the sun, the moon and the earth are in a straight line, the height of the tide will be higher. These are called spring tides and they occur twice a month, one on full moon period and another during the new moon period.</p><p><b>Neap Tides</b>: Occurs between two spring tides, when sun and moon are in right angle.</p><p><b>Diurnal tides</b>: Some tides occur daily which are known as diurnal tides. There are only one high tide and one low tide each day. The successive high and low tides are approximate of the same height.</p><p><img width=490 height=277 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p7318/image007.png\" ></p><p>Source: NCERT</p>",
    "question_index": 128
  },

    "question": "<span class=\"eqt\"><p>The behaviour of lithium is similar to that of magnesium. This sort of similarity is commonly referred to as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2367;&#2341;&#2367;&#2351;&#2350; &#2325;&#2366; &#2357;&#2381;&#2351;&#2357;&#2361;&#2366;&#2352; &#2350;&#2376;&#2327;&#2381;&#2344;&#2368;&#2358;&#2367;&#2351;&#2350; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2360;&#2350;&#2366;&#2344;&#2340;&#2366; &#2325;&#2379; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; _____ &#2360;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">inert pair effect</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2381;&#2352;&#2367;&#2351; &#2351;&#2369;&#2327;&#2354; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;</span>",
      "<span class=\"eqt\">diagonal relationship</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2325;&#2352;&#2381;&#2339; &#2360;&#2306;&#2348;&#2306;&#2343;</span>",
      "<span class=\"eqt\">same Zeff</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2366;&#2344; &#2332;&#2364;&#2375;&#2347;&#2364;</span>",
      "<span class=\"eqt\">isoelectronic species</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2367;&#2325; &#2360;&#2381;&#2346;&#2368;&#2358;&#2368;&#2332;&#2364;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Diagonal Relationship refers to the similarity in the chemical and physical properties of elements that are located diagonally from each other in the periodic table. In this case, lithium (Li) is in Group 1, Period 2, and magnesium (Mg) is in Group 2, Period 3. The diagonal relationship between these two elements arises because they share similar size, charge density, and electronegativity, which results in similar chemical behavior. This effect is commonly observed in elements from Group 1 and Group 2 when they are diagonally adjacent in the periodic table, such as lithium and magnesium, or beryllium and aluminum.</p><p></p><p></p><p>Inert Pair Effect:</p><p>The inert pair effect refers to the tendency of heavier elements, particularly in Group 13-18, to show a lower oxidation state than expected due to the reluctance of their s-electrons to participate in bonding. This is not related to the similarity between lithium and magnesium, which is based on their diagonal relationship.</p><p></p><p>Same Zeff (Effective Nuclear Charge):</p><p>Zeff refers to the effective nuclear charge experienced by an electron in an atom, which takes into account the shielding effect of inner electrons. While lithium and magnesium do have similar Zeff values, this concept does not explain their similar behavior. The diagonal relationship better explains the similarity in their chemical properties.</p><p></p><p>Isoelectronic Species:</p><p>Isoelectronic species are atoms, ions, or molecules that have the same number of electrons. Lithium and magnesium are not isoelectronic, as lithium has 3 electrons and magnesium has 12 electrons. Therefore, this option is not applicable to the similarity between lithium and magnesium.</p>",
    "question_index": 129
  },

    ],
    "correct_option_id": 3,
    "solution": "<p>The two most important chips on the motherboard are known as the northbridge and the southbridge. These two chips have most of the important communications and control functions provided by the motherboard. </p><p>The northbridge, also known as the memory controller hub, is connected directly to the processor via the front-side bus to system memory via the memory bus, and to the southbridge via an internal bus. </p><p>The <b>southbridge</b> also known as the I/O controller hub connects to the processor indirectly via the northbridge and controls slower devices such as the hard drive, USB, audio, video, LAN, PCI, I/O controller, and integrated device hardware, such as, sound card, video card, USB, PCI, Ethernet, IDE, ISA, Bios. If there is one chip, then everything is controlled by that chip. The PCI bus connects the southbridge to the northbridge. </p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>Concentrators are used in LANs to combine transmissions from a cluster of nodes. It is often called __________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2379;&#2337; &#2325;&#2375; &#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2360;&#2375; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352;&#2339; &#2325;&#2379; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; LAN &#2350;&#2375;&#2306; &#2325;&#2306;&#2360;&#2306;&#2335;&#2381;&#2352;&#2375;&#2335;&#2352; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360;&#2375; &#2309;&#2325;&#2381;&#2360;&#2352; __________ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Router</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2314;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Switch</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2367;&#2330;</span>",
      "<span class=\"eqt\">Hub</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2348;</span>",
      "<span class=\"eqt\">Bridge</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2367;&#2332;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Concentrators are also used in local-area networks (LANs) to combine transmissions from a cluster of nodes. In this case, the concentrator is often called a hub.</p><p>Concentrator is a type of multiplexor that combines multiple channels onto a single transmission medium in such a way that all the individual channels can be simultaneously active.</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>A former employee of a company misuses the access to sensitive information of the organization. Such a threat is known as _______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2366; &#2319;&#2325; &#2346;&#2370;&#2352;&#2381;&#2357; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2368; &#2360;&#2306;&#2327;&#2336;&#2344; &#2325;&#2368; &#2360;&#2306;&#2357;&#2375;&#2342;&#2344;&#2358;&#2368;&#2354; &#2360;&#2370;&#2330;&#2344;&#2366; &#2325;&#2375; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2325;&#2366; &#2342;&#2369;&#2352;&#2369;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360; &#2340;&#2352;&#2361; &#2325;&#2375; &#2326;&#2340;&#2352;&#2375; &#2325;&#2379; _______ &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Man-in-the-middle Threat</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2344;-&#2311;&#2344;-&#2342;-&#2350;&#2367;&#2337;&#2367;&#2354; &#2341;&#2381;&#2352;&#2375;&#2335;</span>",
      "<span class=\"eqt\">Denial of Service Threat</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2344;&#2366;&#2351;&#2354; &#2321;&#2398; &#2360;&#2352;&#2381;&#2357;&#2367;&#2360; &#2341;&#2381;&#2352;&#2375;&#2335;</span>",
      "<span class=\"eqt\">Phishing</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2367;&#2358;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Insider Threat</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2360;&#2366;&#2311;&#2337;&#2352; &#2341;&#2381;&#2352;&#2375;&#2335;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>An insider threat</b> is a security risk that originates from within the targeted organization. </p><p>It typically involves a current or former employee or business associate who has access to sensitive information or privileged accounts within the network of an organization, and who misuses this access.</p>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is correct about secondary memory?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2375;&#2325;&#2375;&#2306;&#2337;&#2352;&#2368; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Computers may run without secondary memory.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350;&#2381;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2375;&#2325;&#2375;&#2306;&#2337;&#2352;&#2368; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366; &#2349;&#2368; &#2330;&#2354; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">It is a volatile memory</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2319;&#2325; &#2357;&#2379;&#2354;&#2375;&#2335;&#2366;&#2311;&#2354; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Data is not permanently stored if power is switched OFF.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2348;&#2367;&#2332;&#2354;&#2368; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2368; &#2332;&#2366;&#2319; &#2340;&#2379; &#2337;&#2375;&#2335;&#2366; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366;&#2404;</span>",
      "<span class=\"eqt\">It is known as main memory</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Computers may run without secondary memory: While a computer can function with limited capabilities using only primary memory (RAM), secondary memory is essential for storing the operating system, applications, and user data.</p><p>Secondary memory is designed for long-term storage of data and programs. It is non-volatile, meaning the data remains intact even when the power supply to the computer is turned off.</p><p>Data is permanently stored if power is switched off.</p><p>Examples of secondary memory include hard disk drives (HDDs), solid-state drives (SSDs), optical discs (CDs, DVDs), and flash drives.</p><p>Main memory refers to primary memory (RAM), which is volatile and loses its contents when the power is turned off.</p><p></p><p>Further Insight:</p><p>&bull; Primary Memory</p><p>&#9675; Primary memory is the main memory of a computer, directly accessible by the CPU.</p><p>&#9675; It is a volatile memory (data is lost when power is turned off).</p><p>&#9675; It is faster than secondary memory</p><p>&#9675; It temporarily stores data and instructions currently in use by the CPU</p><p>&#9675; It has limited storage capacity</p><p>&#9675; It is essential for the execution of programs</p><p>&#9675; For example: Random Access Memory (RAM), Read-Only Memory (ROM), and cache memory.</p><p></p>",
    "question_index": 133
  },
  {
    "question": "<span class=\"eqt\"><p>You have completed working on your project on a Word File. You want to print it and you realise the mouse is not working. Which of the following keyboard command will help you?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2346;&#2344;&#2375; &#2319;&#2325; &#2357;&#2352;&#2381;&#2337; &#2347;&#2366;&#2311;&#2354; &#2346;&#2352; &#2309;&#2346;&#2344;&#2368; &#2346;&#2352;&#2367;&#2351;&#2379;&#2332;&#2344;&#2366; &#2346;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2354;&#2367;&#2351;&#2366; &#2361;&#2376;&#2404; &#2310;&#2346; &#2311;&#2360;&#2375; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2310;&#2346;&#2325;&#2379; &#2346;&#2340;&#2366; &#2330;&#2354;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2350;&#2366;&#2313;&#2360; &#2325;&#2366;&#2352;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337; &#2325;&#2350;&#2366;&#2306;&#2337; &#2310;&#2346;&#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ctrl + Home</span><span class=\"hqt\" style=\"display:none\">Ctrl + Home</span>",
      "<span class=\"eqt\">Ctrl + F2</span><span class=\"hqt\" style=\"display:none\">Ctrl + F2</span>",
      "<span class=\"eqt\">Ctrl + P</span><span class=\"hqt\" style=\"display:none\">Ctrl + P</span>",
      "<span class=\"eqt\">Home</span><span class=\"hqt\" style=\"display:none\">Home</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The keyboard command '<b>Ctrl + P</b>' prints the current page or the entire document.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ctrl + Home</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Goes to the beginning of the document</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ctrl + F2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Opens the Print Preview of the document</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Home</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Goes to the beginning of the current line</td></tr></table>",
    "question_index": 134
  },
  {
    "question": "<span class=\"eqt\"><p>Which tab in Windows Explorer (File Explorer) allows you to access and manage network resources, such as other computers and shared folders?</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332;&#2364; &#2319;&#2325;&#2381;&#2360;&#2346;&#2381;&#2354;&#2379;&#2352;&#2352; (&#2347;&#2364;&#2366;&#2311;&#2354; &#2319;&#2325;&#2381;&#2360;&#2346;&#2381;&#2354;&#2379;&#2352;&#2352;) &#2350;&#2375;&#2306; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2335;&#2376;&#2348; &#2310;&#2346;&#2325;&#2379; &#2309;&#2344;&#2381;&#2351; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2324;&#2352; &#2358;&#2375;&#2351;&#2352;&#2381;&#2337; &#2347;&#2364;&#2379;&#2354;&#2381;&#2337;&#2352;&#2379;&#2306; &#2332;&#2376;&#2360;&#2375; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2352;&#2367;&#2360;&#2379;&#2352;&#2381;&#2360;&#2375; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2344;&#2375; (&#2319;&#2325;&#2381;&#2360;&#2375;&#2360;) &#2324;&#2352; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2367;&#2340; (&#2350;&#2376;&#2344;&#2375;&#2332;) &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</b></p></span>",
    "options": [
      "<span class=\"eqt\">Home</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2379;&#2350;</span>",
      "<span class=\"eqt\">View</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2370;</span>",
      "<span class=\"eqt\">Share</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Network</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The tab in Windows Explorer (File Explorer) that allows you to access and manage network resources, such as other computers and shared folders, is the <b>\"Network\"</b> tab. This tab provides access to the devices and resources available on the local network, allowing users to browse shared folders, printers, and other network resources that are visible and accessible within the local network environment.</p>",
    "question_index": 135
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about text functions in MS Excel:</p><p>I. The CONCATENATE or CONCAT function is used to join multiple text strings.</p><p>II. The LEN function returns the number of words in a text string.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>MS Excel &#2350;&#2375;&#2306; &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. CONCATENATE &#2351;&#2366; CONCAT &#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2312; &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2360;&#2381;&#2335;&#2381;&#2352;&#2367;&#2306;&#2327;&#2381;&#2360; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. LEN &#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2344; &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2360;&#2381;&#2335;&#2381;&#2352;&#2367;&#2306;&#2327; &#2350;&#2375;&#2306; &#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2354;&#2380;&#2335;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is a correct description of the CONCATENATE/CONCAT function.</p><p>Statement II is incorrect because the LEN function counts the number of characters in a text string, not the number of words. Therefore, only the first statement is correct.</p><p>Explanation of Statements:</p><p>Statement I is correct. The CONCATENATE function (or CONCAT in newer versions of Excel, and the & operator) is used to combine two or more text strings into one single string. For example, using the formula =CONCATENATE(\"Good\", \" \", \"Morning\") would result in the single text string \"Good Morning\".</p><p>Statement II is incorrect. The LEN (Length) function returns the total number of characters in a specified text string, including letters, numbers, symbols, and spaces. For instance, =LEN(\"Hello World\") would return the value 11 (5 for \"Hello\", 1 for the space, and 5 for \"World\"). It does not count the number of words.</p><p>Further insights:</p><p>To count the number of words in a cell (e.g., cell A1), a more complex formula is needed, such as =LEN(TRIM(A1))-LEN(SUBSTITUTE(A1,\" \",\"\"))+1. This formula works by counting the number of space characters in a cleaned-up version of the text and adding one.</p><p>Other common text functions include:</p><p>- TRIM: Removes leading, trailing, and extra spaces between words.</p><p>- LEFT, RIGHT, MID: Extract a specific number of characters from the beginning, end, or middle of a text string.</p><p>- UPPER, LOWER, PROPER: Convert text to all uppercase, all lowercase, or proper case (first letter of each word capitalized).</p>",
    "question_index": 136
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about Hard Disk Drives (HDDs):</p><p>i. HDDs store data magnetically on spinning disks called platters.</p><p>ii. They have mechanical parts, making them more prone to damage.</p><p>iii. They provide faster data access speeds than SSDs.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2366;&#2352;&#2381;&#2337; &#2337;&#2367;&#2360;&#2381;&#2325; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357; (HDD) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. HDD, &#2346;&#2381;&#2354;&#2376;&#2335;&#2352; &#2344;&#2366;&#2350;&#2325; &#2328;&#2370;&#2350;&#2340;&#2368; &#2361;&#2369;&#2312; &#2337;&#2367;&#2360;&#2381;&#2325; &#2346;&#2352; &#2330;&#2369;&#2306;&#2348;&#2325;&#2368;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2337;&#2375;&#2335;&#2366; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>ii. &#2311;&#2344;&#2350;&#2375;&#2306; &#2351;&#2366;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325; &#2349;&#2366;&#2327; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2311;&#2344;&#2381;&#2361;&#2375;&#2306; &#2325;&#2381;&#2359;&#2340;&#2367; &#2325;&#2366; &#2326;&#2340;&#2352;&#2366; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>iii. &#2351;&#2375; SSD &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2340;&#2375;&#2332;&#2364; &#2337;&#2375;&#2335;&#2366; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2327;&#2340;&#2367; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">ii and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statements i and ii are correct descriptions of Hard Disk Drives. Statement iii is incorrect because HDDs are significantly slower than Solid-State Drives (SSDs) due to their mechanical nature.</p><p>Explanation of Statements:</p><p>Statement i is correct. This is the fundamental working principle of an HDD. Data is encoded as magnetic patterns (representing bits of 1s and 0s) onto the surfaces of one or more rigid, rapidly rotating disks known as platters, which are coated with a magnetic material. A read/write head on a moving arm accesses the data.</p><p>Statement ii is correct. HDDs are electromechanical devices. They contain a motor to spin the platters and an actuator arm that moves the read/write heads across the disk surfaces. These moving parts are sensitive and make HDDs vulnerable to damage from physical shock, such as being dropped, which can lead to mechanical failure.</p><p>Statement iii is incorrect. This statement is false. Solid-State Drives (SSDs), which use non-volatile flash memory and have no moving parts, offer substantially faster data access times (lower latency) and higher overall read/write speeds. The mechanical operation of an HDD, which requires physically locating data on a spinning platter (involving seek time and rotational latency), makes it inherently slower than an SSD.</p><p>Further insights:</p><p>HDD vs. SSD: The primary trade-off between HDDs and SSDs is performance versus cost/capacity. HDDs offer a much lower cost per gigabyte, making them an excellent choice for storing large amounts of data where speed is not the top priority (e.g., media libraries, backups). SSDs are preferred for installing the operating system and applications because their speed dramatically improves boot times and program loading.</p><p>Hybrid Drives (SSHDs): A third type of drive, the Solid-State Hybrid Drive (SSHD), attempts to offer a compromise by combining a large-capacity HDD with a small amount of fast SSD cache. The drive's firmware learns which files are used most frequently and keeps them on the SSD portion for faster access.</p><p></p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>Which among the following devices is used to capture an image so that it can be stored in your computer?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2311;&#2350;&#2375;&#2332; &#2325;&#2376;&#2346;&#2381;&#2330;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2366;&#2325;&#2367; &#2311;&#2360;&#2375; &#2310;&#2346;&#2325;&#2375; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2335;&#2379;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Scanner</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2325;&#2376;&#2344;&#2352;</span>",
      "<span class=\"eqt\">Plotter</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2377;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Image viewer</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2350;&#2375;&#2332; &#2357;&#2381;&#2351;&#2370;&#2309;&#2352;</span>",
      "<span class=\"eqt\">Image Capturer</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2350;&#2375;&#2332; &#2325;&#2376;&#2346;&#2381;&#2330;&#2352;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A scanner is a device that captures images from photographic prints, posters, magazine pages, and similar sources for computer editing and display.</p><p>Scanners come in hand-held, feed-in and flatbed types and for scanning black-and-white only, or color. Very high resolution scanners are used for scanning for high-resolution printing, but lower resolution scanners are adequate for capturing images for computer display.</p><p>Scanners usually come with software, such as Adobe's Photoshop product, that lets you resize and otherwise modify a captured image.</p>",
    "question_index": 138
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about session cookies:</p><p>I. Session cookies are typically deleted when the user closes the browser.</p><p>II. Session cookies always contain user passwords in plaintext.</p><p>Which of the above statement is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2340;&#2381;&#2352; &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2360;&#2340;&#2381;&#2352; &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2340;&#2348; &#2361;&#2335;&#2366; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306; &#2332;&#2348; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2352; &#2348;&#2306;&#2342; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2360;&#2340;&#2381;&#2352; &#2325;&#2369;&#2325;&#2368;&#2332;&#2364; &#2350;&#2375;&#2306; &#2361;&#2350;&#2375;&#2358;&#2366; &#2360;&#2366;&#2342;&#2375; &#2346;&#2366;&#2336; &#2350;&#2375;&#2306; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2346;&#2366;&#2360;&#2357;&#2352;&#2381;&#2337; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is a correct description of the primary characteristic of a session cookie.</p><p>Statement II is incorrect, as storing plaintext passwords in cookies is a major security vulnerability and is not standard practice. Therefore, only the first statement is correct.</p><p>Explanation of Statements:</p><p>Statement I is correct. Session cookies, also known as transient or in-memory cookies, are temporary. They are stored in the computer's memory only for the duration of a user's browsing session. Once the web browser is closed, the session ends, and the cookie is automatically deleted. This is their defining feature, distinguishing them from persistent cookies.</p><p>Statement II is incorrect. Storing user passwords in plaintext in any type of cookie is a severe security risk. Secure web applications do not do this. Instead, after a user logs in, the server creates a unique, random, and meaningless string of characters called a \"session identifier\" and stores it in the session cookie. This identifier allows the server to recognize the user's browser on subsequent requests during the same session without needing the password again. The actual session data, including the user's authentication status, is kept securely on the server.</p><p>Further insights:</p><p>Session Cookies vs. Persistent Cookies: The main difference is their lifespan. Session cookies are deleted when the browser closes. Persistent cookies are stored on the user's hard drive and have an expiration date set by the website. They remain on the device until they expire or are manually deleted, allowing a site to remember a user across multiple sessions (e.g., \"Remember me\" functionality).</p><p>Purpose: Session cookies are essential for the functionality of modern websites. Since the HTTP protocol is stateless, session cookies help websites maintain state, for example, by keeping a user logged in or by remembering items in an online shopping cart as the user navigates the site.</p><p>Security: To enhance security, cookies can have attributes like HttpOnly (prevents access from client-side scripts, mitigating Cross-Site Scripting attacks) and Secure (ensures the cookie is only sent over an encrypted HTTPS connection).</p>",
    "question_index": 139
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about the \"References\" tab in MS Word:</p><p>a. It is used to insert tables, charts, and shapes.</p><p>b. It includes tools for creating citations, bibliographies, and a table of contents.</p><p>Which of the above is/are true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2357;&#2352;&#2381;&#2337; &#2350;&#2375;&#2306; \"&#2360;&#2306;&#2342;&#2352;&#2381;&#2349;\" &#2335;&#2376;&#2348; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a. &#2311;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366;&#2323;&#2306;, &#2330;&#2366;&#2352;&#2381;&#2335; &#2324;&#2352; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2360;&#2350;&#2381;&#2350;&#2367;&#2354;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>b. &#2311;&#2360;&#2350;&#2375;&#2306; &#2313;&#2342;&#2381;&#2343;&#2352;&#2339;, &#2327;&#2381;&#2352;&#2306;&#2341; &#2360;&#2370;&#2330;&#2368; &#2324;&#2352; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2368; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2325;&#2352;&#2339; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither a nor b</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; a &#2324;&#2352; &#2344; &#2361;&#2368; b</span>",
      "<span class=\"eqt\">Only b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statement (b) is true, while statement (a) is false. The \"References\" tab is dedicated to tools for academic and long-form document writing, such as citations and tables of contents. The features mentioned in statement (a) are found on the \"Insert\" tab.</p><p>Explanation of Statements:</p><p>Statement a is incorrect. The tools for inserting objects like tables, charts, and shapes are located on the \"Insert\" tab in Microsoft Word. The Insert tab is used to add various types of external content and objects into the document.</p><p>Statement b is correct. The \"References\" tab contains groups of tools specifically designed for managing sources and creating structured navigational elements in a document. Key features on this tab include:</p><p>Table of Contents: To automatically generate a table of contents based on the headings in your document.</p><p>Footnotes: To insert and manage footnotes and endnotes.</p><p>Citations & Bibliography: To manage sources, insert in-text citations, and automatically generate a bibliography in various styles (e.g., APA, MLA, Chicago).</p><p>Captions: To add captions to figures, tables, and equations and create a table of figures.</p><p>Further insights:</p><p>The References tab is an invaluable tool for students, researchers, and professionals who need to write structured reports or academic papers. Using the built-in citation manager saves significant time and helps ensure consistency and accuracy in formatting, as it can automatically update the bibliography when new sources are added.</p>",
    "question_index": 140
  },

    "question": "<span class=\"eqt\"><p>Choose the correct option based on following statements.</p><p>Statement 1: A type of memory which is non-volatile and retains data even when the power is turned off.</p><p>Statement 2: It often contains the computer's firmware and BIOS.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p><b>&#2325;&#2341;&#2344; 1:</b> &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2332;&#2379; &#2344;&#2377;&#2344;-&#2357;&#2379;&#2354;&#2375;&#2335;&#2366;&#2311;&#2354; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2348;&#2367;&#2332;&#2354;&#2368; &#2348;&#2306;&#2342; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2349;&#2368; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2348;&#2352;&#2325;&#2352;&#2366;&#2352; &#2352;&#2326;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p><b>&#2325;&#2341;&#2344; 2:</b> &#2311;&#2360;&#2350;&#2375;&#2306; &#2309;&#2325;&#2381;&#2360;&#2352; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2325;&#2366; &#2347;&#2352;&#2381;&#2350;&#2357;&#2375;&#2351;&#2352; &#2324;&#2352; BIOS &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Cache Memory</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2358; &#2350;&#2376;&#2350;&#2379;&#2352;&#2368;</span>",
      "<span class=\"eqt\">RAM</span><span class=\"hqt\" style=\"display:none\">RAM</span>",
      "<span class=\"eqt\">Hard Disk Drive (HDD)</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2352;&#2381;&#2337; &#2337;&#2367;&#2360;&#2381;&#2325; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357; (HDD)</span>",
      "<span class=\"eqt\">ROM</span><span class=\"hqt\" style=\"display:none\">ROM</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>ROM (Read-Only Memory) is non-volatile memory that retains data even when the power is turned off. It typically contains firmware, including the computer's BIOS (Basic Input/Output System).</p><p>Types of ROM:</p><p>Mask ROM: The most basic type, programmed during manufacturing. </p><p>PROM (Programmable ROM): Can be programmed once by the user. </p><p>EPROM (Erasable Programmable ROM): Can be erased with ultraviolet light and reprogrammed. </p><p>EEPROM (Electrically Erasable Programmable ROM): Can be erased and reprogrammed electrically. </p><p>Flash Memory: A type of EEPROM that is widely used in modern devices due to its faster programming and erasing speeds.</p>",
    "question_index": 141
  },

    "question": "<span class=\"eqt\"><p>What is the primary advantage of using FTPS (FTP Secure) over standard FTP? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2325; FTP &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; FTPS (FTP &#2360;&#2367;&#2325;&#2381;&#2351;&#2379;&#2352;) &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2354;&#2366;&#2349; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Faster file transfers</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2366; &#2340;&#2375;&#2332; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2339;</span>",

      "<span class=\"eqt\">Enhanced security through encryption</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2358;&#2344; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2348;&#2338;&#2364;&#2368; &#2361;&#2369;&#2312; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366;</span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>The primary advantage of using FTPS (FTP Secure) over standard FTP is enhanced security through encryption. FTPS adds a layer of security to FTP by encrypting the data being transferred between the client and the server, making it more resistant to eavesdropping and data interception. This encryption helps protect sensitive information, such as login credentials and the content of files, during the transfer process.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following is not one of the predefined margin options found in MS Word?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2319;&#2350;&#2319;&#2360; &#2357;&#2352;&#2381;&#2337; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357;&#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2350;&#2366;&#2352;&#2381;&#2332;&#2367;&#2344; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [

    "correct_option_id": 0,
    "solution": "<p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er250106st21.png\"></p><p>Margins define the empty space around the edges of your document. They provide a visual frame for your text and ensure readability.</p><p>Slanted is not a standard margin option. It's not a term used to describe how text is positioned on the page in relation to the edges.</p><p>Margins is found under the \"Layout\" tab.</p><p>Predefined Margins: Select from common options like \"Normal,\" \"Narrow,\" \"Wide,\", \"Mirrored\", etc.</p><p>Custom Margins: This allows you to set specific values for top, bottom, left, and right margins</p>",
    "question_index": 147

    "question": "<span class=\"eqt\"><p>To open items from your desktop which of the following action would you have to perform?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2346;&#2344;&#2375; &#2337;&#2375;&#2360;&#2381;&#2325;&#2335;&#2377;&#2346; &#2360;&#2375; &#2310;&#2311;&#2335;&#2350; &#2326;&#2379;&#2354;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2346;&#2325;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2319;&#2325;&#2381;&#2358;&#2344; &#2325;&#2352;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    ],
    "correct_option_id": 2,
    "solution": "<p><b>A double-click</b> is a special type of left-mouse-button click which is getting used less and less. A double-click is usually used for opening files on your computer, where a single-click is used for navigating web pages.</p><p>If the left mouse button directly interacts with an object, the right mouse button often allows you to indirectly interact.</p><p>Right-clicking a file gives you a list of things to do with the file, or the option to see its properties. Right-clicking your desktop background allows you to modify the desktop. Right-clicking a link allows you to do other things with that link besides visiting it.</p>",

    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Overwrite viruses</b> are extremely dangerous as they can delete data and replace it with their own file content or code. </p><p>&#183; Once files get infected, they cannot be replaced, and the virus can affect Windows, DOS, Linux, and Apple systems. </p><p>&#183; The only way this virus can be removed is by deleting all of the files it has infected, which could be devastating. </p><p>&#183; The best way to protect against the overwrite virus is to use a trusted antivirus solution and keep it updated.</p>",
