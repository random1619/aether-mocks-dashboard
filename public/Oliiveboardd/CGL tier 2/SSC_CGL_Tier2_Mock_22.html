    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Find the equation of a line passing through the point (0, 5) and parallel to the line y = -2x + 3.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2367;&#2306;&#2342;&#2369; (0, 5) &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2324;&#2352; &#2352;&#2375;&#2326;&#2366; y = -2x + 3 &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2381;&#2340;&#2352; &#2352;&#2375;&#2326;&#2366; &#2325;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">y = -2x + 5</span><span class=\"hqt\" style=\"display:none\">y = -2x + 5</span>",
      "<span class=\"eqt\">y = 2x  -  5</span><span class=\"hqt\" style=\"display:none\">y = 2x - 5</span>",
      "<span class=\"eqt\">y = 2x + 5</span><span class=\"hqt\" style=\"display:none\">y = 2x + 5</span>",
      "<span class=\"eqt\">y = -2x  -  5</span><span class=\"hqt\" style=\"display:none\">y = -2x - 5</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Slope of given line: m = -2</p><p>Slope of parallel line: same, m = -2</p><p>Using point-slope form:</p><p>y  -  y<sub>1</sub> = m (x  -  x<sub>1</sub>)</p><p>y - 5 = -2(x - 0)</p><p>y - 5 = -2x</p><p>y = -2x + 5</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A card is drawn from a standard deck of 52 cards. Find the probability that it is an Ace given that it is either red or a face card.</p></span><span class=\"hqt\" style=\"display:none\"><p>52 &#2346;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2350;&#2366;&#2344;&#2325; &#2327;&#2337;&#2381;&#2337;&#2368; &#2360;&#2375; &#2319;&#2325; &#2346;&#2340;&#2381;&#2340;&#2366; &#2344;&#2367;&#2325;&#2366;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360; &#2348;&#2366;&#2340; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2351;&#2361; &#2351;&#2366; &#2340;&#2379; &#2354;&#2366;&#2354; &#2346;&#2340;&#2381;&#2340;&#2366; &#2361;&#2376; &#2351;&#2366; &#2347;&#2367;&#2352; &#2319;&#2325; &#2309;&#2306;&#2325;&#2367;&#2340; &#2346;&#2340;&#2381;&#2340;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3/32</span><span class=\"hqt\" style=\"display:none\">3/32</span>",
      "<span class=\"eqt\">1/8</span><span class=\"hqt\" style=\"display:none\">1/8</span>",
      "<span class=\"eqt\">1/16</span><span class=\"hqt\" style=\"display:none\">1/16</span>",
      "<span class=\"eqt\">1/13</span><span class=\"hqt\" style=\"display:none\">1/13</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Total cards in the deck = 52</p><p>Red cards = 26</p><p>Face cards = 12</p><p>Red face cards = 6</p><p>So, cards that are either red or face cards = 26 + 12  -  6 = 32</p><p>Aces in the deck = 4</p><p>Red aces = 2</p><p>No ace is a face card.</p><p>So, favorable outcomes (aces that are red or face cards) = 2</p><p>Required probability = 2/32 = 1/16</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A man standing on level ground sees the top of a tree at an angle of elevation of 45 degrees. He walks 10 m towards the tree, and now the angle of elevation becomes 60 degrees. Find the height of the tree.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2340;&#2354; &#2332;&#2364;&#2350;&#2368;&#2344; &#2346;&#2352; &#2326;&#2337;&#2364;&#2366; &#2319;&#2325; &#2310;&#2342;&#2350;&#2368; &#2319;&#2325; &#2346;&#2375;&#2337;&#2364; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2379; 45 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2325;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; &#2346;&#2352; &#2342;&#2375;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2361; &#2346;&#2375;&#2337;&#2364; &#2325;&#2368; &#2323;&#2352; 10 &#2350;&#2368;&#2335;&#2352; &#2330;&#2354;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2309;&#2348; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 60 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2375;&#2337;&#2364; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5&#8730;3 (&#8730;3 - 1)</span><span class=\"hqt\" style=\"display:none\">5&#8730;3 (&#8730;3 - 1)</span>",
      "<span class=\"eqt\">5&#8730;3 (&#8730;3 + 1)</span><span class=\"hqt\" style=\"display:none\">5&#8730;3 (&#8730;3 + 1)</span>",
      "<span class=\"eqt\">5(&#8730;3 + 1)</span><span class=\"hqt\" style=\"display:none\">5(&#8730;3 + 1)</span>",
      "<span class=\"eqt\">(5&#8730;3 + 1)</span><span class=\"hqt\" style=\"display:none\">(5&#8730;3 + 1)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=344 height=237 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er251024im001.png\"></p><p>Let the height of the tree be h meters and the initial distance of the man from the tree be x meters.</p><p>From the first position,</p><p>tan 45&deg; = h / x</p><p>h = x ... (1)</p><p>From the second position,</p><p>tan 60&deg; = h / (x - 10)</p><p>&radic;3 = h / (x  -  10)</p><p>h = (x  -  10) * &radic;3 .. (2)</p><p>From eq(1) and eq(2),</p><p>x = &radic;3x - 10&radic;3</p><p>&radic;3x  -  x = 10&radic;3</p><p>x (&radic;3  -  1) = 10&radic;3</p><p>x = 10&radic;3 / (&radic;3  -  1)</p><p>x = 5&radic;3 (&radic;3 + 1) cm</p><p>From eq (1),</p><p>h = 5&radic;3 (&radic;3 + 1) cm</p><p></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>&nbsp;The average of 7 consecutive odd numbers is A. If the series is extended to the either sides by adding 3 more numbers prior to its first number and next 4 to its last making it a series of 14 consecutive odd number, then what is the new&nbsp;average of these 14 consecutive odd numbers?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>7 &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2357;&#2367;&#2359;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; A &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2311;&#2360; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2379; &#2311;&#2360;&#2325;&#2368; &#2346;&#2361;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; 3 &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2309;&#2306;&#2340;&#2367;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2310;&#2327;&#2375; 4 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2379;&#2337;&#2364;&#2325;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2340;&#2352;&#2347; &#2348;&#2338;&#2364;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2351;&#2361; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; 14 &#2357;&#2367;&#2359;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2368; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2348;&#2344; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2344; 14 &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2357;&#2367;&#2359;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2344;&#2351;&#2366; &#2324;&#2360;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A + 3</span><span class=\"hqt\" style=\"display:none\">A + 3</span>",
      "<span class=\"eqt\">A + 4</span><span class=\"hqt\" style=\"display:none\">A + 4</span>",
      "<span class=\"eqt\">A + 2</span><span class=\"hqt\" style=\"display:none\">A + 2</span>",
      "<span class=\"eqt\">A + 1</span><span class=\"hqt\" style=\"display:none\">A + 1</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Average of 7 consecutive odd numbers = A</p><p>So, 4th number = A</p><p>Now,</p><p>After adding 7 more numbers, there will be a total of 14 odd numbers. And the value of 7th number will become 'A'. And value of 8th number will be (A + 2).</p><p>Average of 14 odd consecutive numbers = [(14/2)th term + [(14/2) + 1]th term]/2</p><p>= (7th term + 8th term)/2</p><p>= (A + A + 2)/2</p><p>= A + 1</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The mean of 15 observations is 52, and one of the observations, 68, is repeated the most times. What is the median of the data set?</p></span><span class=\"hqt\" style=\"display:none\"><p>15 &#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;&#2379;&#2306; &#2325;&#2366; &#2350;&#2366;&#2343;&#2381;&#2351; 52 &#2361;&#2376; &#2340;&#2341;&#2366; &#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;, 68, &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2348;&#2366;&#2352; &#2342;&#2379;&#2361;&#2352;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2310;&#2305;&#2325;&#2337;&#2364;&#2366; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; &#2325;&#2368; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">57.33</span><span class=\"hqt\" style=\"display:none\">57.33</span>",
      "<span class=\"eqt\">61.22</span><span class=\"hqt\" style=\"display:none\">61.22</span>",
      "<span class=\"eqt\">68</span><span class=\"hqt\" style=\"display:none\">68</span>",
      "<span class=\"eqt\">55</span><span class=\"hqt\" style=\"display:none\">55</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>We know that,</p><p>Mode = 3 Median  -  2 Mean</p><p>68 = 3 x Median  -  2 x 52</p><p>3 x Median = 68 + 104</p><p>Median = 172/3 = 57.33</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In the following figure, &#8736;A = 40&deg; and AC =BC . Find the value of &#8736;ACD, if ratio of &#8736; BCD to &#8736;CDB is 3:1.</p><p><img width=348 height=174 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3789/image002.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; &#8736;A = 40&deg; &#2324;&#2352; AC =BC &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736; BCD &#2324;&#2352; &#8736;CDB &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3:1 &#2361;&#2376;, &#2340;&#2379; &#8736;ACD &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"348\" height=\"174\" id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3789/image002.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">130&deg;</span><span class=\"hqt\" style=\"display:none\">130&deg;</span>",
      "<span class=\"eqt\">95&deg;</span><span class=\"hqt\" style=\"display:none\">95&deg;</span>",
      "<span class=\"eqt\">85&deg;</span><span class=\"hqt\" style=\"display:none\">85&deg;</span>",
      "<span class=\"eqt\">115&deg;</span><span class=\"hqt\" style=\"display:none\">115&deg;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#8736;A = 40&deg;</p><p>as AC=BC so,</p><p>=&gt; &#8736;ABC = 40&deg;</p><p>=&gt;now in triangle ABC</p><p>&#8736;ACB = 180- 40-40 =100</p><p>&#8736;CBD = &#8736;ACB+&#8736;BAC ( exterior angle is equal to sum of two interior angle)</p><p>&#8736;CBD= 100 + 40 = 140&deg;</p><p>Now,</p><p>In triangle BCD</p><p>Ratio of &#8736;C to &#8736;D is 3:1</p><p>So &#8736; BCD= 40/4*3=30&deg;</p><p>Now, &#8736;ACD= &#8736;ACB+&#8736;BCD = 100 + 30 = 130&deg;</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The length, breadth and height of a cuboid are in the ratio 21:17:19. If length is 40 cm more than height what is the volume (in cm<sup>3</sup>) of this cuboid?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344;&#2366;&#2349; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312;, &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 21:17:19 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2354;&#2306;&#2348;&#2366;&#2312;, &#2314;&#2305;&#2330;&#2366;&#2312; &#2360;&#2375; 40 cm &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360; &#2328;&#2344;&#2366;&#2349; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; (cm<sup>3</sup> &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">52454000</span><span class=\"hqt\" style=\"display:none\">52454000</span>",
      "<span class=\"eqt\">54254000</span><span class=\"hqt\" style=\"display:none\">54254000</span>",
      "<span class=\"eqt\">54264000</span><span class=\"hqt\" style=\"display:none\">54264000</span>",
      "<span class=\"eqt\">52145000</span><span class=\"hqt\" style=\"display:none\">52145000</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Length  -  height = 40</p><p>21-19=2</p><p>2u=40</p><p>1u= 20</p><p>&#8756; volume = 21*17*19*8000</p><p>= 54264000</p>",
    "question_index": 6

    "question": "<span class=\"eqt\"><p>A bag contains 3 red balls, 5 green balls and 2 blue balls. If three balls are drawn from the bag, what is the probability that 2 of them are green and 1 is red?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2376;&#2327; &#2350;&#2375;&#2306; 3 &#2354;&#2366;&#2354; &#2352;&#2306;&#2327; &#2325;&#2368; &#2327;&#2375;&#2306;&#2342;&#2375;&#2306;, 5 &#2361;&#2352;&#2375; &#2325;&#2368; &#2327;&#2375;&#2306;&#2342;&#2375;&#2306; &#2324;&#2352; 2 &#2344;&#2368;&#2354;&#2375; &#2352;&#2306;&#2327; &#2325;&#2368; &#2327;&#2375;&#2306;&#2342;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2348;&#2376;&#2327; &#2360;&#2375; &#2340;&#2368;&#2344; &#2327;&#2375;&#2306;&#2342;&#2375;&#2306; &#2344;&#2367;&#2325;&#2366;&#2354;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; 2 &#2325;&#2375; &#2361;&#2352;&#2375; &#2352;&#2306;&#2327; &#2324;&#2352; 1 &#2325;&#2375; &#2354;&#2366;&#2354; &#2352;&#2306;&#2327; &#2325;&#2375; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Three cyclists start together on a 420 m circular track, all in the same direction, with speeds 6 m/s, 7 m/s, and 10 m/s. After how many minutes will they next meet simultaneously at the starting point? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2360;&#2366;&#2311;&#2325;&#2367;&#2354; &#2330;&#2366;&#2354;&#2325; 420 &#2350;&#2368;&#2335;&#2352; &#2354;&#2306;&#2348;&#2375; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2335;&#2381;&#2352;&#2376;&#2325; &#2346;&#2352; &#2319;&#2325; &#2361;&#2368; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306;, &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 6 &#2350;&#2368;&#2335;&#2352;/&#2360;&#2375;&#2325;&#2306;&#2337;, 7 &#2350;&#2368;&#2335;&#2352;/&#2360;&#2375;&#2325;&#2306;&#2337; &#2324;&#2352; 10 &#2350;&#2368;&#2335;&#2352;/&#2360;&#2375;&#2325;&#2306;&#2337; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2330;&#2354;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2367;&#2344;&#2335; &#2348;&#2366;&#2342; &#2357;&#2375; &#2309;&#2327;&#2354;&#2368; &#2348;&#2366;&#2352; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340;&#2368; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2319;&#2325; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2375;&#2306;&#2327;&#2375;? </p></span>",
    "options": [

      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>"

    "correct_option_id": 3,
    "solution": "<p>Lap times = L / speed: </p><p>t<sub>1 </sub>= 420 / 6 = 70 s </p><p>t<sub>2</sub> = 420 / 7 = 60 s </p><p>t<sub>3</sub> = 420 / 10 = 42 s </p><p>Required time = LCM(70, 60, 42) = 420 s = 7 min </p>",

    "question": "<span class=\"eqt\"><p>A&#8217;s income is Rs. 180 more than B&#8217;s income and C&#8217;s income is Rs. 60 more than D&#8217;s. If the ratio of A&#8217;s and C&#8217;s incomes is 8 : 7 and the ratio of B&#8217;s and D&#8217;s incomes is 5 : 6, then find the ratio of incomes of A, B and C to the incomes of B, C and D.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2325;&#2368; &#2310;&#2351;, B &#2325;&#2368; &#2310;&#2351; &#2360;&#2375; 180 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376; &#2324;&#2352; C &#2325;&#2368; &#2310;&#2351;, D &#2325;&#2368; &#2310;&#2351; &#2360;&#2375; 60 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; A &#2340;&#2341;&#2366; C &#2325;&#2368; &#2310;&#2351; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 8 : 7 &#2361;&#2376; &#2324;&#2352; B &#2340;&#2341;&#2366; D &#2325;&#2368; &#2310;&#2351; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 5 : 6 &#2361;&#2376;, &#2340;&#2379; A, B &#2340;&#2341;&#2366; C &#2325;&#2368; &#2310;&#2351; &#2324;&#2352; B, C &#2340;&#2341;&#2366; D &#2325;&#2368; &#2310;&#2351; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">9 : 10</span><span class=\"hqt\" style=\"display:none\">9 : 10</span>",
      "<span class=\"eqt\">10 : 9</span><span class=\"hqt\" style=\"display:none\">10 : 9</span>",
      "<span class=\"eqt\">12 : 11</span><span class=\"hqt\" style=\"display:none\">12 : 11</span>",
      "<span class=\"eqt\">11 : 12</span><span class=\"hqt\" style=\"display:none\">11 : 12</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Given:</p><p>A&#8217;s income is Rs. 180 more than B&#8217;s income</p><p>C&#8217;s income is Rs. 60 more than D&#8217;s income</p><p>The ratio of A&#8217;s and C&#8217;s incomes is 8 : 7</p><p>And the ratio of B&#8217;s and D&#8217;s incomes is 5 : 6</p><p>Let the incomes of B and D are x and y.</p><p>So, the incomes of A and C are (x + 180) and (y + 60).</p><p>According to question,</p><p><span>(x</span>&nbsp;<span>+</span>&nbsp;<span>180)</span><span>/</span><span>(y</span>&nbsp;<span>+</span>&nbsp;<span>60)</span>&nbsp;<span>=</span>&nbsp;<span>8</span><span>/</span><span>7</span><span>-----(i)</span></p><p><span>And&#160;</span><span>x</span><span>/</span><span>y</span>&nbsp;<span>=</span>&nbsp;<span>5</span><span>/</span><span>6</span><span>-----(ii)</span></p><p>From (ii), we get</p><p>y = 6x/5</p><p>From (i), we get</p><p>7 (x + 180) = 8 (6x/5 + 60)</p><p><span>&#8658;</span><span>&nbsp;7x + 1260 = 48x/5 + 480</span></p><p><span>&#8658;</span><span>&nbsp;48x/5 &#8211; 7x = 1260 &#8211; 480</span></p><p><span>&#8658;</span><span>&nbsp;13x/5 = 780</span></p><p>So, x = 300</p><p>And y = 300 &#215; 6/5 = 360</p><p>So, the income of B = 300</p><p>Income of A = 300 + 180 = 480</p><p>So, the income of D = 360</p><p>Income of C = 360 + 60 = 420</p><p><span>&#8756;</span><span>&nbsp;The required ratio = (480 + 300 + 420) : (300 + 420 + 360) =&#160;10 : 9</span></p>",
    "question_index": 11
  },

    "question": "<span class=\"eqt\"><p>A leak was found in a ship when it was 77 km from the shore. It was found that the leak admits 2.25 tonnes of water in 5.5 minutes and 92 tonnes of water will be sufficient to sink the ship. But the pumps can throw out 12 tonnes of water an hour. Find the average rate of sailing at which the ship may reach the shore before it sinks.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2332;&#2361;&#2366;&#2332; &#2332;&#2348; &#2325;&#2367;&#2344;&#2366;&#2352;&#2375; &#2360;&#2375; 77 &#2325;&#2367;&#2350;&#2368; &#2342;&#2370;&#2352; &#2341;&#2366; &#2340;&#2348; &#2313;&#2360;&#2350;&#2375;&#2306; &#2352;&#2367;&#2360;&#2366;&#2357; &#2346;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; &#2351;&#2361; &#2346;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2367; &#2352;&#2367;&#2360;&#2366;&#2357; 5.5 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; 2.25 &#2335;&#2344; &#2346;&#2366;&#2344;&#2368; &#2346;&#2381;&#2352;&#2357;&#2367;&#2359;&#2381;&#2335; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2332;&#2361;&#2366;&#2332; &#2325;&#2379; &#2337;&#2369;&#2348;&#2379;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 92 &#2335;&#2344; &#2346;&#2366;&#2344;&#2368; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2327;&#2366;&#2404; &#2354;&#2375;&#2325;&#2367;&#2344; &#2346;&#2306;&#2346; &#2319;&#2325; &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 12 &#2335;&#2344; &#2346;&#2366;&#2344;&#2368; &#2348;&#2366;&#2361;&#2352; &#2344;&#2367;&#2325;&#2366;&#2354; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2340;&#2379;, &#2344;&#2380;&#2325;&#2366;&#2351;&#2344; &#2325;&#2368; &#2324;&#2360;&#2340; &#2342;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360; &#2346;&#2352; &#2332;&#2361;&#2366;&#2332; &#2337;&#2370;&#2348;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2325;&#2367;&#2344;&#2366;&#2352;&#2375; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Nishu bought some items on Sunday, generating a bill of &#8377;4420, but he didn't pay immediately as the shop owner was his friend. On Wednesday, he purchased more items, and the bill amounted to &#8377;8280. He decided to settle both bills together on Wednesday, paying the total in cash. His friend offered him a 5% discount on Sunday's bill and 15% discount for paying in cash at the time of purchases. Calculate the total amount Nishu paid on Wednesday.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2358;&#2369; &#2344;&#2375; &#2352;&#2357;&#2367;&#2357;&#2366;&#2352; &#2325;&#2379; &#2325;&#2369;&#2331; &#2360;&#2366;&#2350;&#2366;&#2344; &#2326;&#2352;&#2368;&#2342;&#2366;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2348;&#2367;&#2354; &#8377;4420 &#2348;&#2344;&#2366;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2313;&#2360;&#2344;&#2375; &#2340;&#2369;&#2352;&#2306;&#2340; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2342;&#2369;&#2325;&#2366;&#2344; &#2325;&#2366; &#2350;&#2366;&#2354;&#2367;&#2325; &#2313;&#2360;&#2325;&#2366; &#2342;&#2379;&#2360;&#2381;&#2340; &#2341;&#2366;&#2404; &#2348;&#2369;&#2343;&#2357;&#2366;&#2352; &#2325;&#2379; &#2313;&#2360;&#2344;&#2375; &#2324;&#2352; &#2360;&#2366;&#2350;&#2366;&#2344; &#2326;&#2352;&#2368;&#2342;&#2366; &#2324;&#2352; &#2348;&#2367;&#2354; 8280 &#2352;&#2369;&#2346;&#2351;&#2375; &#2348;&#2344;&#2366;&#2404; &#2313;&#2360;&#2344;&#2375; &#2348;&#2369;&#2343;&#2357;&#2366;&#2352; &#2325;&#2379; &#2342;&#2379;&#2344;&#2379;&#2306; &#2348;&#2367;&#2354;&#2379;&#2306; &#2325;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2347;&#2376;&#2360;&#2354;&#2366; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2325;&#2369;&#2354; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#232     "question": "<span class=\"eqt\"><p>Even after reducing the marked price of a Table by Rs.576, a shopkeeper makes a profit of 20%. If the cost price of table is Rs.3840, what % of profit would he have made if he had sold the Table at the marked price? </p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2350;&#2375;&#2332; &#2325;&#2375; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2350;&#2375;&#2306; &#2352;&#2369;.576 &#2325;&#2368; &#2325;&#2350;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2349;&#2368; &#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; 20% &#2325;&#2366; &#2354;&#2366;&#2349; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360; &#2350;&#2375;&#2332; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2352;&#2369;.3840 &#2361;&#2376; &#2324;&#2352; &#2351;&#2342;&#2367; &#2313;&#2360;&#2344;&#2375; &#2350;&#2375;&#2332; &#2325;&#2379; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2348;&#2375;&#2330;&#2366; &#2361;&#2379;&#2340;&#2366;, &#2340;&#2379; &#2313;&#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; % &#2354;&#2366;&#2349; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>A team of 5 members is to be chosen from a group of 6 male employees and 5 female employees. In how many ways 3 male employees and 2 female employees of the team can be choose?</p></span><span class=\"hqt\" style=\"display:none\"><p>6 &#2346;&#2369;&#2352;&#2369;&#2359; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; 5 &#2350;&#2361;&#2367;&#2354;&#2366; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2360;&#2375; 5 &#2360;&#2342;&#2360;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2335;&#2368;&#2350; &#2330;&#2369;&#2344;&#2368; &#2332;&#2366;&#2344;&#2368; &#2361;&#2376;&#2404; &#2335;&#2368;&#2350; &#2350;&#2375;&#2306; &#2360;&#2375; 3 &#2346;&#2369;&#2352;&#2369;&#2359; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; 2 &#2350;&#2361;&#2367;&#2354;&#2366; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2340;&#2352;&#2368;&#2325;&#2379;&#2306; &#2360;&#2375; &#2330;&#2369;&#2344;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Prakash's 5 day's work is equal to Suresh's 3 day's work and ratio of efficiency of Suresh to Krishna is 4: 3. Suresh and Krishna started working together and worked for 4 days. After that Krishna left the work and Prakash joined Suresh and they together worked for next 5 days. Now Suresh left the work and Prakash alone finished the remaining work in 5 more day. Find that in how many days Suresh can finish the work alone?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2366; 5 &#2342;&#2367;&#2344; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;, &#2360;&#2369;&#2352;&#2375;&#2358; &#2325;&#2375; 3 &#2342;&#2367;&#2344; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376; &#2340;&#2341;&#2366; &#2360;&#2369;&#2352;&#2375;&#2358; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2324;&#2352; &#2325;&#2371;&#2359;&#2381;&#2339;&#2366; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4: 3 &#2361;&#2376;&#2404; &#2360;&#2369;&#2352;&#2375;&#2358; &#2324;&#2352; &#2325;&#2371;&#2359;&#2381;&#2339;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; 4 &#2342;&#2367;&#2344;&#2379;&#2306; &#2340;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2371;&#2359;&#2381;&#2339;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2331;&#2379;&#2337;&#2364; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;, &#2360;&#2369;&#2352;&#2375;&#2358; &#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2357;&#2375; &#2309;&#2327;&#2354;&#2375; 5 &#2342;&#2367;&#2344;&#2379;&#2306; &#2340;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2309;&#2348; &#2360;&#2369;&#2352;&#2375;&#2358; &#2325;&#2366;&#2352;&#2381;&#2351; &#2331;&#2379;&#2337;&#2364; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2309;&#2325;&#2375;&#2354;&#2375; &#2358;&#2375;&#2359; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; 5 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2309;&#2325;&#2375;&#2354;&#2375; &#2360;&#2369;&#2352;&#2375;&#2358; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">28 days</span><span class=\"hqt\" style=\"display:none\">28 &#2342;&#2367;&#2344;</span>"

    "correct_option_id": 1,
    "solution": "<p>Prakash's 5 day's work is equal to Suresh's 3 day's work. So ratio of their efficiency = 1/5 &#8758;1/3 = 3 : 5</p><p>Ratio of efficiency of Suresh to Krishna = 4 : 3</p><p>The ratio of efficiency of Prakash, Suresh and Krishna = 12 : 20 : 15</p><p>Let 1 day of work of Prakash, Suresh and Krishan is 12x, 20x and 15x respectively.</p><p>Total work = (20x + 15x) * 4 + (12x + 20x) * 5 + 12x * 5 = 360x</p><p>Time taken by Suresh alone to finish the work = 360x/20x = 18 days</p>",

    "question": "<span class=\"eqt\"><p>A solid cone whose height is 48 cm and radius of the base is 21 cm is melted and recast into a regular pyramid of equilateral triangle. If the height of the pyramid is 154&radic;3 cm, then what is side of the base of triangular base of the pyramid?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2336;&#2379;&#2360; &#2358;&#2306;&#2325;&#2369; &#2332;&#2367;&#2360;&#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; 48 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 21 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2313;&#2344;&#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2375; &#2319;&#2325; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2350;&#2375;&#2306; &#2338;&#2366;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; 154&radic;3 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2375; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332;&#2366;&#2325;&#2366;&#2352; &#2310;&#2343;&#2366;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">21 cm</span><span class=\"hqt\" style=\"display:none\">21 &#2360;&#2375;&#2350;&#2368;</span>",

    "solution": "<p>Volume of the cone = 1/3 * &#960;r<sup>2</sup>h = 1/3 * 22/7 * 21 * 21 * 48 = 22176 cm<sup>3</sup> = Volume of the pyramid</p><p>=&gt; Volume of the pyramid = 1/3 * (Area of the base) * height</p><p>=&gt; 22176 = 1/3 * (&radic;3/4 * a<sup>2</sup> ) * 154&radic;3</p><p>=&gt; a<sup>2</sup> = 22176 * 4/154</p><p>=&gt; a<sup>2</sup> = 576</p><p>=&gt; a = 24 cm</p>",

    "question": "<span class=\"eqt\"><p>A train takes 6 seconds to pass a pole and 24 seconds to pass a platform 360 meters long. What is the length of the train? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2352;&#2375;&#2354;&#2327;&#2366;&#2337;&#2364;&#2368; &#2319;&#2325; &#2326;&#2306;&#2349;&#2375; &#2325;&#2379; &#2346;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 6 &#2360;&#2375;&#2325;&#2306;&#2337; &#2324;&#2352; 360 &#2350;&#2368;&#2335;&#2352; &#2354;&#2306;&#2348;&#2375; &#2346;&#2381;&#2354;&#2375;&#2335;&#2347;&#2366;&#2352;&#2381;&#2350; &#2325;&#2379; &#2346;&#2366;&#2352; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 24 &#2360;&#2375;&#2325;&#2306;&#2337; &#2354;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404; &#2352;&#2375;&#2354;&#2327;&#2366;&#2337;&#2364;&#2368; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">120 m</span><span class=\"hqt\" style=\"display:none\">120 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">140 m</span><span class=\"hqt\" style=\"display:none\">140 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">100 m</span><span class=\"hqt\" style=\"display:none\">100 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">80 m</span><span class=\"hqt\" style=\"display:none\">80 &#2350;&#2368;&#2335;&#2352;</span>"

    "correct_option_id": 0,

    "question": "<span class=\"eqt\"><p>One side of a rectangular sheet is 40% of the side of square sheet. Area of rectangular sheet and area of square sheet are equal. What is the respective ratio of perimeter of rectangular sheet to the perimeter of square sheet?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2358;&#2368;&#2335; &#2325;&#2368; &#2319;&#2325; &#2349;&#2369;&#2332;&#2366; &#2357;&#2352;&#2381;&#2327;&#2366;&#2325;&#2366;&#2352; &#2358;&#2368;&#2335; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2325;&#2366; 40% &#2361;&#2376;&#2404; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2358;&#2368;&#2335; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2324;&#2352; &#2357;&#2352;&#2381;&#2327;&#2366;&#2325;&#2366;&#2352; &#2358;&#2368;&#2335; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2358;&#2368;&#2335; &#2325;&#2375; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; &#2324;&#2352; &#2357;&#2352;&#2381;&#2327;&#2366;&#2325;&#2366;&#2352; &#2358;&#2368;&#2335; &#2325;&#2375; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; &#2325;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">29: 20</span><span class=\"hqt\" style=\"display:none\">29 : 20</span>",
      "<span class=\"eqt\">5: 4</span><span class=\"hqt\" style=\"display:none\">5 : 4</span>",
      "<span class=\"eqt\">11: 7</span><span class=\"hqt\" style=\"display:none\">11 : 7</span>",
      "<span class=\"eqt\">43: 40</span><span class=\"hqt\" style=\"display:none\">43 : 40</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the side of square sheet = a</p><p>Then, one side of rectangular sheet = 40% of a = 0.4a</p><p>Now, area of rectangular sheet = area of square sheet</p><p>(0.4a * other side of rectangular sheet) = (a * a)</p><p>Other side of rectangular sheet = 2.5a</p><p>Now, perimeter of rectangular sheet = 2 * (0.4a + 2.5a) = 5.8a</p><p>And, perimeter of square sheet = 4a</p><p>Therefore, ratio = (5.8a): (4a) = <b>29: 20</b></p>",

    "question": "<span class=\"eqt\"><p>Rahul sold certain units of an article, a part of it he sold at 40% profit and remaining at 24% loss. Overall, he earned a profit percent of 16% and sold 15 units at 24% loss, then find the total units of the article sold by him.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2361;&#2369;&#2354; &#2344;&#2375; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2368; &#2325;&#2369;&#2331; &#2351;&#2370;&#2344;&#2367;&#2335; &#2348;&#2375;&#2330;&#2368;&#2306;, &#2311;&#2360;&#2325;&#2366; &#2319;&#2325; &#2349;&#2366;&#2327; &#2313;&#2360;&#2344;&#2375; 40% &#2354;&#2366;&#2349; &#2346;&#2352; &#2324;&#2352; &#2358;&#2375;&#2359; 24% &#2361;&#2366;&#2344;&#2367; &#2346;&#2352; &#2348;&#2375;&#2330;&#2366;&#2404; &#2325;&#2369;&#2354; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352;, &#2313;&#2360;&#2344;&#2375; 16% &#2325;&#2366; &#2354;&#2366;&#2349; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; 15 &#2351;&#2370;&#2344;&#2367;&#2335; &#2325;&#2379; 24% &#2361;&#2366;&#2344;&#2367; &#2346;&#2352; &#2348;&#2375;&#2330;&#2366;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2368; &#2325;&#2369;&#2354; &#2351;&#2370;&#2344;&#2367;&#2335; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "solution": "<p>Let the weights of Mitesh, Nitesh, Om and Pratik be 6x kg, 8x kg, 6x kg and 5x kg respectively.</p><p>Mitesh's new weight = 1.2*6x = 7.2x kg</p><p>Nitesh's new weight = 0.75*8x = 6x kg</p><p>Om's new weight = 1.1*6x = 6.6x kg</p><p>Pratik new weight = 1.2*5x = 6x kg</p><p>Given, 7.2x + 6.6x  -  (6x + 6x) = 16.2</p><p>=&gt; 1.8x = 16.2</p><p>=&gt; x = 9</p><p>Mitesh's original weight = 6x = 54 kg</p>",

    "question": "<span class=\"eqt\"><p>There are two types of machines that can carry packages from ground floor to first floor of a factory. The first type of machine takes 50 seconds to move one package while the second type takes 30 seconds to move one package. If there are a total of 84 packages out of which 36 packages were moved by the first type of machine and the rest were moved by the second type of machine, then what is the total time taken to move all the 84 packages?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2366;&#2352;&#2326;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2349;&#2370;&#2340;&#2354; &#2360;&#2375; &#2346;&#2361;&#2354;&#2368; &#2350;&#2306;&#2332;&#2367;&#2354; &#2340;&#2325; &#2360;&#2366;&#2350;&#2366;&#2344; &#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2342;&#2379; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2350;&#2358;&#2368;&#2344;&#2375;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2346;&#2361;&#2354;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2350;&#2358;&#2368;&#2344; &#2319;&#2325; &#2360;&#2366;&#2350;&#2366;&#2344; &#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; 50 &#2360;&#2375;&#2325;&#2306;&#2337; &#2325;&#2366; &#2360;&#2350;&#2351; &#2354;&#2375;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2342;&#2370;&#2360;&#2352;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2350;&#2358;&#2368;&#2344; &#2319;&#2325; &#2360;&#2366;&#2350;&#2366;&#2344; &#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; 30 &#2360;&#2375;&#2325;&#2306;&#2337; &#2325;&#2366; &#2360;&#2350;&#2351; &#2354;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2369;&#2354; 84 &#2360;&#2366;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; 36 &#2360;&#2366;&#2350;&#2366;&#2344; &#2346;&#2361;&#2354;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2350;&#2358;&#2368;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2324;&#2352; &#2358;&#2375;&#2359; &#2360;&#2366;&#2350;&#2366;&#2344; &#2342;&#2370;&#2360;&#2352;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2350;&#2358;&#2368;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2375; &#2332;&#2366;&#2319; &#2327;&#2319;, &#2340;&#2379; &#2360;&#2349;&#2368; 84 &#2360;&#2366;&#2350;&#2366;&#2344; &#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">32 minutes</span><span class=\"hqt\" style=\"display:none\">32 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">54 minutes</span><span class=\"hqt\" style=\"display:none\">54 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">45 minutes</span><span class=\"hqt\" style=\"display:none\">45 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">60 minutes</span><span class=\"hqt\" style=\"display:none\">60 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Number of packages moved by second machine = 84  -  36 = 48</p><p>Total time taken by first machine to move 36 packages = 36 * 50 sec = 1800 sec = (1800/60) min = 30 min</p><p>Again, total time taken by second machine to move 48 packages = 48 * 30 sec = 1440 sec = (1440/60) min = 24 min</p><p>Hence, total time taken = 30 + 24 = 54 min</p>",

    "question": "<span class=\"eqt\"><p>P~Q: P is the daughter of Q</p><p>P^Q: P is the son of Q</p><p>P&amp;Q: P is the husband of Q</p><p>P$Q: P is the wife of Q</p><p>P@Q: P is the brother of Q</p><p>P*Q: P is the sister of Q</p><p>Based on the above information, find out which of the given statement can be the reason/s behind the assertion made below if it is given that \"E^B&amp;D~A$C@F\".</p><p>Assertion: F is the grandfather's sister of E?</p><p>Reason A: F*C</p><p>Reason B: F*A</p></span><span class=\"hqt\" style=\"display:none\"><p>P~Q: P, Q &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2361;&#2376;</p><p>P^Q: P, Q &#2325;&#2366; &#2348;&#2375;&#2335;&#2366; &#2361;&#2376;</p><p>P&amp;Q: P, Q &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;</p><p>P$Q: P, Q &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;</p><p>P@Q: P, Q &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;</p><p>P*Q: P, Q &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2319;&#2305; &#2325;&#2367; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344; &#2325;&#2375; &#2346;&#2368;&#2331;&#2375; &#2325;&#2366;&#2352;&#2339;/&#2325;&#2366;&#2352;&#2339; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2351;&#2342;&#2367; &#2351;&#2361; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; \"E^B&amp;D~A$C@F\"&#2404;</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344;: F, E &#2325;&#2375; &#2342;&#2366;&#2342;&#2366; &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;?</p><p>&#2325;&#2366;&#2352;&#2339; A: F*C</p><p>&#2325;&#2366;&#2352;&#2339; B: F*A</p></span>",

      "<span class=\"eqt\">Neither A nor B is the reason behind the assertion</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B &#2325;&#2341;&#2344; &#2325;&#2375; &#2346;&#2368;&#2331;&#2375; &#2325;&#2366;&#2352;&#2339; &#2361;&#2376;</span>",

      "<span class=\"eqt\">Both A and B are reasons behind the assertion</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2325;&#2375; &#2346;&#2368;&#2331;&#2375; &#2325;&#2366;&#2352;&#2339; &#2361;&#2376;&#2306;</span>"

    "correct_option_id": 0,
    "solution": "<p>E^B:E is the son of B;B&amp;D:B is the husband of D;D~A:D is the daughter of A;</p><p><img width=516 height=229 id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p29178/image005.png\" ></p><p>A$C:A is the wife of C;C@F: C is the brother of F.</p><p><img width=596 height=227 id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p29178/image006.png\" ></p><p>Reason A: F*C: F is the sister of C</p><p><img width=608 height=221 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p29178/image007.png\" ></p><p>F is the grandfather's sister of E.</p><p>Reason B: F*A: F is the sister of A</p><p><img width=626 height=209 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p29178/image008.png\"></p><p>F is not the grandfather's sister of E.</p><p>Only A is the reason behind the assertion.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following actions shows the best judgment when your lab partner proposes discarding three inconvenient readings to make the graph align with the expected trend?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2310;&#2346;&#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327;&#2358;&#2366;&#2354;&#2366; &#2360;&#2366;&#2341;&#2368; &#2327;&#2381;&#2352;&#2366;&#2347; &#2325;&#2379; &#2309;&#2346;&#2375;&#2325;&#2381;&#2359;&#2367;&#2340; &#2346;&#2381;&#2352;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2306;&#2352;&#2375;&#2326;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2340;&#2368;&#2344; &#2309;&#2360;&#2369;&#2357;&#2367;&#2343;&#2366;&#2332;&#2344;&#2325; &#2352;&#2368;&#2337;&#2367;&#2306;&#2327; &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2344;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2352;&#2357;&#2366;&#2312; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2342;&#2367;&#2326;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Discard the readings as \"outliers\" because they look unusual</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2368;&#2337;&#2367;&#2306;&#2327; &#2325;&#2379; \"&#2310;&#2313;&#2335;&#2354;&#2366;&#2351;&#2352;&#2381;&#2360;\" &#2350;&#2366;&#2344;&#2325;&#2352; &#2326;&#2366;&#2352;&#2367;&#2332; &#2325;&#2352; &#2342;&#2375;&#2306; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2357;&#2375; &#2309;&#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Record all data, mark the suspect readings clearly with reasons, and consult the supervisor on whether a controlled re-run is needed</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2337;&#2375;&#2335;&#2366; &#2352;&#2367;&#2325;&#2377;&#2352;&#2381;&#2337; &#2325;&#2352;&#2375;&#2306;, &#2360;&#2306;&#2342;&#2367;&#2327;&#2381;&#2343; &#2352;&#2368;&#2337;&#2367;&#2306;&#2327; &#2325;&#2379; &#2325;&#2366;&#2352;&#2339;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;, &#2324;&#2352; &#2346;&#2352;&#2381;&#2351;&#2357;&#2375;&#2325;&#2381;&#2359;&#2325; &#2360;&#2375; &#2346;&#2352;&#2366;&#2350;&#2352;&#2381;&#2358; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2325;&#2381;&#2351;&#2366; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2346;&#2369;&#2344;&#2307;-&#2352;&#2344; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Average the readings with the rest so they have \"less effect\"</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2325;&#2368; &#2325;&#2375; &#2360;&#2366;&#2341; &#2352;&#2368;&#2337;&#2367;&#2306;&#2327; &#2325;&#2366; &#2324;&#2360;&#2340; &#2344;&#2367;&#2325;&#2366;&#2354;&#2375;&#2306; &#2340;&#2366;&#2325;&#2367; &#2313;&#2344;&#2325;&#2366; \"&#2325;&#2350; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;\" &#2361;&#2379;</span>",
      "<span class=\"eqt\">Change the measurement scale to compress the anomalies</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2360;&#2306;&#2327;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2366;&#2346; &#2346;&#2376;&#2350;&#2366;&#2344;&#2375; &#2325;&#2379; &#2348;&#2342;&#2354;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Transparent handling of anomalous data with supervisor review preserves integrity and allows a method-based decision (instrument error, procedural slip, or true variability). Pre-deciding outliers or masking them with scaling manipulates results.</p>",
    "question_index": 37

    "question": "<span class=\"eqt\"><p>A question is given, followed by two statements labelled I and II. Identify which of the statements is/are sufficient to answer the question.</p><p><b>Question:</b></p><p>Eight persons- A, B, C, D, E, F, G and H are sitting in a linear row facing the north direction. How many persons sit between B and E?</p><p><b>Statements:</b></p><p>(I) Four persons sit between B and F. Two persons sit between H and A. B sits third to the left H.</p><p>(II) Only one person sits between C and D. A does not sits adjacent to E. C sits second to the left of H.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; I &#2324;&#2352; II &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2375;&#2348;&#2354; &#2325;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;&#2404;</p><p><b>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;:</b></p><p>&#2310;&#2336; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;- A, B, C, D, E, F, G &#2324;&#2352; H &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2367;&#2358;&#2366; &#2325;&#2368; &#2323;&#2352; &#2350;&#2369;&#2326;&#2352;&#2367;&#2340; &#2361;&#2379;&#2325;&#2352; &#2319;&#2325; &#2352;&#2376;&#2326;&#2367;&#2325; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; B &#2324;&#2352; E &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2340;&#2344;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;?</p><p><b>&#2325;&#2341;&#2344;:</b></p><p>(I) B &#2324;&#2352; F &#2325;&#2375; &#2348;&#2368;&#2330; &#2330;&#2366;&#2352; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; H &#2324;&#2352; A &#2325;&#2375; &#2348;&#2368;&#2330; &#2342;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; B, H &#2325;&#2375; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404;</p><p>(II) C &#2324;&#2352; D &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; A, E &#2325;&#2375; &#2310;&#2360;&#2344;&#2381;&#2344; &#2344;&#2361;&#2368;&#2306; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; C, H &#2325;&#2375; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Statement I and II together are not sufficient to answer the question.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2341;&#2344; I &#2324;&#2352; II &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Statement II alone is sufficient to answer the question while statement I is not</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; II &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2325;&#2341;&#2344; I &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Statement I and II together are sufficient to answer the question</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2341;&#2344; I &#2324;&#2352; II &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Statement I alone is sufficient to answer the question while statement II is not</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2325;&#2341;&#2344; II &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Eight persons- A, B, C, D, E, F, G and H are sitting in a linear row facing the north direction. </p><p><b>Statement (I):</b> Four persons sit between B and F. Two persons sit between H and A. B sits third to the left H. </p><p><img width=652 height=161 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25562/image004.png\"></p><p>There is no information of E.</p><p>So, statement I alone is not sufficient.</p><p><b>Statement (II): </b>Only one person sits between C and D. A does not sits adjacent to E. C sits second to the left of H.</p><p><img width=659 height=355 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25562/image005.png\"></p><p>There is no information of E and B.</p><p>So, statement II alone is not sufficient.</p><p>Combining statements I and II:</p><p><b>Statement (I):</b> Four persons sit between B and F. Two persons sit between H and A. B sits third to the left H. </p><p><b>Statement (II): </b>Only one person sits between C and D. A does not sits adjacent to E. C sits second to the left of H.</p><p><img width=662 height=168 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25562/image006.png\"></p><p>There is either one or three persons sit between E and A.</p><p>Hence, Statement I and II together are not sufficient to answer the question.</p>",
    "question_index": 47
  },

    "question": "<span class=\"eqt\"><p>By interchanging the given two numbers (not digits), which of the following equations will be correct?</p><p>16 and 47</p><p>I. 25 x 47 + 94 &div; 16  -  96 = 25</p><p>II. 14 x 25 &div; 7 + 16  -  47 = 81</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; (&#2309;&#2306;&#2325; &#2344;&#2361;&#2368;&#2306;) &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2375; &#2346;&#2352;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379;&#2327;&#2366;/&#2361;&#2379;&#2306;&#2327;&#2375;?</p><p>16 &#2324;&#2352; 47</p><p>I. 25 x 47 + 94 &div; 16 - 96 = 25</p><p>II. 14 x 25 &div; 7 + 16 - 47 = 81</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>If two numbers 16 and 47 are interchanged, then the equations will be: </p><p>Equation I: 25 x 16 + 94 &div; 47  -  96 = 25</p><p>So, 400 + 2  -  96 = 25</p><p>So, 402  -  96 = 25</p><p>So, 306 &#8800; 25</p><p>So, the equation is incorrect. </p><p>Equation II: 14 x 25 &div; 7 + 47  -  16 = 81</p><p>So, 50 + 47  -  16 = 81</p><p>So, 97  -  16 = 81</p><p>So, 81 = 81</p><p>So, the equation is correct. </p>",
    "question_index": 48
  },

    "question": "<span class=\"eqt\"><p>A number has been denoted to each of the given letters. Select the option from the following four possible arrangements of these numbers that forms a meaningful word. </p><p>G = 1, U = 2, N = 3, M = 4, J = 5, E = 6, T = 7, D = 8, E = 9</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2344;&#2367;&#2352;&#2381;&#2342;&#2367;&#2359;&#2381;&#2335; &#2325;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404; &#2311;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2368; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2330;&#2366;&#2352; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2319;&#2325; &#2309;&#2352;&#2381;&#2341;&#2346;&#2370;&#2352;&#2381;&#2339; &#2358;&#2348;&#2381;&#2342; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>G = 1, U = 2, N = 3, M = 4, J = 5, E = 6, T = 7, D = 8, E = 9</p></span>",

    "question": "<span class=\"eqt\"><p>In order to assist those suffering from depression and malnutrition in rural areas, the dean of AIIMS has to form a committee of doctors. The doctor should be:</p><p>1) Holding a BAMS or MBBS degree with a minimum of 60% and is a nutrition specialist.</p><p>2) Be ready to sign a bond of 4 years to work as a government servant in rural areas. </p><p>3) Have good communication skills and a passion for social work.</p><p>4) Have a minimum of 2 years of experience in full-time practice in a government or private hospital.</p><p>The following exceptions apply:</p><p>A. If a doctor satisfies all criteria except 4, the doctor will be referred to the Chief Medical Officer and will be opted as a general physician in urban areas. </p><p>B. If a doctor is not a nutrition specialist, the doctor will be referred to Nutrition department for training. </p><p>Dr. Payal obtained 89% and stood at third rank in BAMS. She has also passed a diploma in nutrition with distinction and practiced as a Nutritional specialist for 3 years before joining AIIMS. She is working at AIIMS since four years. She belongs to a rural area and has a good knowledge of local languages. She has a desire to go back to her home town and serve people there for lifetime.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2311;&#2354;&#2366;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2357;&#2360;&#2366;&#2342; &#2324;&#2352; &#2325;&#2369;&#2346;&#2379;&#2359;&#2339; &#2360;&#2375; &#2346;&#2368;&#2337;&#2364;&#2367;&#2340; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2350;&#2342;&#2342; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2350;&#2381;&#2360; (AIIMS) &#2325;&#2375; &#2337;&#2368;&#2344; &#2325;&#2379; &#2337;&#2377;&#2325;&#2381;&#2335;&#2352;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2325;&#2350;&#2375;&#2335;&#2368; &#2348;&#2344;&#2366;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368;&#2404     "question": "<p>Convert the sentence provided below from its passive voice structure to an active voice structure:</p><p>The mysterious case of the missing diamond necklace was being looked into by the famous detective from Scotland Yard.</p>",
    "options": [
      "The famous detective from Scotland Yard was looking into the mysterious case of the missing diamond necklace.",
      "The famous detective from Scotland Yard looked into the mysterious case of the missing diamond necklace.",
      "The famous detective from Scotland Yard has been looking into the mysterious case of the missing diamond.",
      "The mysterious case of the missing diamond necklace was looked into by the famous detective from Scotland."
    ],
    "correct_option_id": 0,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" verb ['being'] and the preposition \"by\" is necessary while changing the voice of the sentence from Passive to Active.</p><p>In questions like this, the preposition is kept intact with the verb while transforming the sentence in Active Voice.</p><p>The sentence in the Passive voice is in <b>Past Continuous </b>[was being looked into]. So, the sentence in the Active voice should be in <b>Past Continuous </b>[was looking into].</p><p>The Passive form of the sentence is: Object of the Active voice (Subjective case) + was + being + V3 + Preposition + by + Object.</p><p>Some verbs that have their prepositions intact are: Look at, look into, laugh at, smile at, enquired into.</p><p>For example:</p><p>The case was being looked into by the detective. (Passive)</p><p>The detective was looking into the case. (Active)</p><p>The options except (a) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is option (a): The famous detective from Scotland Yard was looking into the mysterious case of the missing diamond necklace.</p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 60
  },

    "question": "<p>Some sentences are given below. While the first and the last sentences (S1 and S6) are in the correct order, the four sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p><b>S1.</b> The Doppler effect describes the change in frequency of a wave in relation to an observer who is moving.</p><p><b>A.</b> As the source approaches the observer, the sound waves are compressed, leading to a higher perceived pitch.</p><p><b>B.</b> Conversely, as the source moves away, the waves are stretched out, resulting in a lower perceived pitch.</p><p><b>C.</b> This phenomenon is why the siren of an approaching ambulance sounds higher in pitch than when it is moving away.</p><p><b>D.</b> It is most commonly demonstrated with sound waves, but it applies to all types of waves, including light.</p><p><b>S6.</b> In astronomy, this same effect is used to measure the speed at which stars and galaxies are moving toward or away from Earth.</p>",

    "correct_option_id": 0,
    "solution": "<p>The paragraph explains the Doppler effect using a common example.</p><p><b>S1</b> provides a general definition of the Doppler effect.</p><p><b>D</b> specifies the types of waves the effect applies to, mentioning sound waves as the most common demonstration. This sets the stage for the example.</p><p><b>A</b> describes the first part of the sound wave demonstration. It explains what happens \"As the source approaches the observer.\"</p><p><b>C</b> provides a real-world example of the approaching sound described in <b>A</b>. It mentions an \"approaching ambulance\" to make the concept tangible. The sentence also introduces the 'moving away' part.</p><p><b>B</b> explains the second part of the phenomenon. The word \"Conversely\" signals a contrast to the approaching source (<b>A</b>), detailing what happens \"as the source moves away.\" This completes the explanation started in C.</p><p><b>S6</b> concludes by extending the application of the effect from sound to light waves in the context of astronomy.</p><p>Therefore, the correct sequence is <b>DACB</b>.</p><p>Hence, option (a) is the correct answer. </p>",

    "comp": "<p><b>Directions :</b>Read the following passage and answer the questions based on the passage:</p><p>The common conception of human memory as a faithful archive, a mental library where past experiences are perfectly preserved and retrieved, is a profoundly misleading one. Far from being a static recording device, memory is a dynamic and deeply reconstructive process. Each act of remembrance is not a simple retrieval but an act of creation, where the brain reassembles fragments of the past, often weaving them together with our current beliefs, emotions, and even information acquired long after the event itself. This inherent malleability means our memories are perpetually vulnerable to distortion, contamination, and even outright fabrication.</p><p>Pioneering research by cognitive psychologists like Elizabeth Loftus has dramatically illustrated this fallibility. In her landmark studies on the \"misinformation effect,\" Loftus demonstrated how subtle suggestions could alter recollections. For instance, participants who watched a video of a car accident and were later asked how fast the cars were going when they \"smashed\" into each other reported higher speeds and were more likely to falsely remember seeing broken glass than those asked about the cars \"hitting\" each other. Even more startling is the research on false memory implantation, where subjects were led to \"remember\" entire events that never happened, such as being lost in a shopping mall as a child, complete with rich, emotionally resonant, but entirely fabricated details.</p><p>The implications of this plasticity are nowhere more critical than in the realm of eyewitness testimony. Once considered irrefutable evidence in legal proceedings, witness accounts are now understood to be highly susceptible to error. The stress of a traumatic event, leading questions from investigators, or exposure to media reports can unconsciously reshape a person's recollection. An individual can become convinced of seeing a particular face or detail simply through the power of post-event suggestion, a fragile foundation upon which a person's liberty may rest. This understanding transforms our view of the past; our memories are not pristine relics but living narratives, constantly edited with each recall, revealing that our personal histories are far more fluid than we intuitively believe.</p>",

    "comp": "<p><b>Directions :</b>Read the following passage and answer the questions based on the passage:</p><p>Within the vast landscape of aesthetic experience, not all that moves us is gentle or pleasing. While we find delight in the harmony of a well-composed painting or the delicate symmetry of a flower, there exists another, more potent category of experience that inspires not calm pleasure, but awe, terror, and a sense of being utterly overwhelmed. This is the crucial distinction between the beautiful and the sublime, a dichotomy explored by philosophers Edmund Burke and Immanuel Kant that profoundly enriched aesthetic theory.</p><p>For Edmund Burke, writing in the mid-18th century, the beautiful is characterized by qualities like smallness, smoothness, and gentle curves, inducing feelings of affection and tenderness. It is an art of comprehensible form and social pleasure. The sublime, in contrast, is rooted in whatever is \"fitted in any sort to excite the ideas of pain and danger.\" Burke argued that vastness, infinity, power, and obscurity, like a raging sea, a towering, jagged mountain range, the darkness of a deep chasm, trigger a feeling of \"delightful horror.\" When we witness such immense power from a position of safety, our sense of self-preservation is activated, resulting in a thrilling astonishment that is the most powerful emotion the mind can feel.</p><p>Immanuel Kant later internalized this concept, shifting the focus from the external object to the inner workings of the human mind. For Kant, the sublime occurs in a two-part movement. First, we encounter something in nature so boundless or powerful, like the infinite starry cosmos, that our faculty of imagination fails to grasp it. This initial failure is a moment of displeasure, a feeling of our own sensory and imaginative limits. But this is immediately followed by a second movement: our faculty of reason triumphs. We recognize that even though we cannot picture infinity, we can <i>conceive</i> of it. This realization of the superiority of our own reason over the sensible world produces a feeling of awe and respect for our own rational and moral nature. Thus, for Kant, the sublime is not a property of nature, but an experience that reveals the grandeur of the human spirit.</p>",

    "comp": "<p><b>Directions :</b>Read the following passage and answer the questions based on the passage:</p><p>Within the vast landscape of aesthetic experience, not all that moves us is gentle or pleasing. While we find delight in the harmony of a well-composed painting or the delicate symmetry of a flower, there exists another, more potent category of experience that inspires not calm pleasure, but awe, terror, and a sense of being utterly overwhelmed. This is the crucial distinction between the beautiful and the sublime, a dichotomy explored by philosophers Edmund Burke and Immanuel Kant that profoundly enriched aesthetic theory.</p><p>For Edmund Burke, writing in the mid-18th century, the beautiful is characterized by qualities like smallness, smoothness, and gentle curves, inducing feelings of affection and tenderness. It is an art of comprehensible form and social pleasure. The sublime, in contrast, is rooted in whatever is \"fitted in any sort to excite the ideas of pain and danger.\" Burke argued that vastness, infinity, power, and obscurity, like a raging sea, a towering, jagged mountain range, the darkness of a deep chasm, trigger a feeling of \"delightful horror.\" When we witness such immense power from a position of safety, our sense of self-preservation is activated, resulting in a thrilling astonishment that is the most powerful emotion the mind can feel.</p><p>Immanuel Kant later internalized this concept, shifting the focus from the external object to the inner workings of the human mind. For Kant, the sublime occurs in a two-part movement. First, we encounter something in nature so boundless or powerful, like the infinite starry cosmos, that our faculty of imagination fails to grasp it. This initial failure is a moment of displeasure, a feeling of our own sensory and imaginative limits. But this is immediately followed by a second movement: our faculty of reason triumphs. We recognize that even though we cannot picture infinity, we can <i>conceive</i> of it. This realization of the superiority of our own reason over the sensible world produces a feeling of awe and respect for our own rational and moral nature. Thus, for Kant, the sublime is not a property of nature, but an experience that reveals the grandeur of the human spirit.</p>",
    "question": "<p>Identify the type of sentence used in the line: \"While we find delight in the harmony of a well-composed painting or the delicate symmetry of a flower, there exists another, more potent category of experience that inspires not calm pleasure, but awe, terror, and a sense of being utterly overwhelmed\".</p>",
    "options": [
      "Compound-complex",
      "Compound",
      "Simple",
      "Complex"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct answer is <b>option d)</b>.</p><p>Clause 1: \"While we find delight in the harmony of a well-composed painting or the delicate symmetry of a flower\"</p><p>This clause has a subject (\"we\") and a verb (\"find\"), but it begins with the word \"While.\" \"While\" is a subordinating conjunction, which means this clause cannot stand on its own as a complete thought. This makes it a dependent clause.</p><p>Clause 2: \"there exists another, more potent category of experience that inspires not calm pleasure, but awe, terror, and a sense of being utterly overwhelmed\"</p><p>This clause has a subject (\"category\") and a verb (\"exists\") and expresses a complete thought. It can stand on its own. This makes it an independent clause.</p><p>Since the given sentence contains one independent clause and one dependent clause, it is a <b>complex sentence</b>.</p><p>Option a): A compound-complex sentence has two or more independent clauses and at least one dependent clause.</p><p>Option b): A compound sentence has two or more independent clauses.</p><p>Option c): A simple sentence has one independent clause.</p>",

ive</i> of it. This realization of the superiority of our own reason over the sensible world produces a feeling of awe and respect for our own rational and moral nature. Thus, for Kant, the sublime is not a property of nature, but an experience that reveals the grandeur of the human spirit.</p>",

    "question": "<p>Select the correct passive form of the given sentence.</p><p>The research team will have completed the comprehensive survey of all endangered species in the national park by the end of this month.</p>",
    "options": [
      "The comprehensive survey of all endangered species in the national park is completed by the research team by the end of this month.",
      "The comprehensive survey of all endangered species in the national park will be completed by the research team by the end of this month.",
      "The comprehensive survey of all endangered species in the national park will have been completed by the research team by the end of this month.",
      "The research team will have been completed by the comprehensive survey of all endangered species in the national park by the end of this month."
    ],
    "correct_option_id": 2,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of verb [here \"been\"] is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in Future Perfect. Thus, the Passive voice will also be in Future Perfect.</p><p>The format of Active Voice is:</p><p>Subject + will/shall + have + V3 + Object.</p><p>Thus, in Passive Voice, the format will be:</p><p>Object of the active voice (Subjective case) + will/shall + have been + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>Active: She will have bought the gold.</p><p>Passive: The gold will have been bought by her.</p><p>1) Incorrect  -  Changes tense to Present Indefinite.</p><p>2) Incorrect  -  Changes tense to Future Indefinite.</p><p>3) Correct  -  Maintains Future Perfect tense and correct passive structure.</p><p>4) Incorrect  -  Illogical sentence structure; the subject and object are reversed.</p><p>Therefore, the correct answer is: (c).</p>",
    "question_index": 102
  },
