    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I is correct.</b></p><p><b>Statement II is incorrect because Supreme Court judges can only be removed by a special majority of Parliament.</b></p><p><b>Explanation of Statements:</b></p><p><b>I. is Correct.</b> Article 124 is the foundational article for the Union Judiciary, stating that there shall be a Supreme Court of India consisting of a Chief Justice and other judges.</p><p><b>II. is Incorrect.</b> The removal of a Supreme Court judge (impeachment) requires a special majority: a majority of the total membership of each House and a majority of not less than two-thirds of the members of that House present and voting. A simple majority is insufficient.</p><p><b>Further Insights:</b></p><p>A judge can be removed only on the grounds of \"proved misbehaviour or incapacity\" under the Judges (Inquiry) Act, 1968.</p><p>No judge of the Supreme Court has been removed through this process in India to date.</p>",
    "question_index": 120
  },
  {
    "question": "<span class=\"eqt\"><p>In the photoelectric effect, the kinetic energy of emitted electrons depends on:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2350;&#2375;&#2306;, &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2367;&#2340; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2368; &#2327;&#2340;&#2367;&#2332; &#2314;&#2352;&#2381;&#2332;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344; &#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2349;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Intensity of incident radiation</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2346;&#2340;&#2367;&#2340; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339; &#2325;&#2368; &#2340;&#2368;&#2357;&#2381;&#2352;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Frequency of incident radiation</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2346;&#2340;&#2367;&#2340; &#2357;&#2367;&#2325;&#2367;&#2352;&#2339; &#2325;&#2368; &#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Surface area of the metal</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2340;&#2369; &#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;</span>",
      "<span class=\"eqt\">Distance between source and metal</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2352;&#2379;&#2340; &#2324;&#2352; &#2343;&#2366;&#2340;&#2369; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The kinetic energy of emitted electrons depends on the <b>frequency of the incident radiation</b>.</p><p>According to Einstein's photoelectric equation ( E=h&#957;&#8722;&#934;), the maximum kinetic energy of an electron is directly proportional to the frequency (&#957;) of the light.</p><p>The Intensity of light determines the \"number\" of electrons emitted (current), but not their energy.</p><p><b>Further Insights:</b></p><p>If the frequency is below a certain \"threshold frequency,\" no electrons are emitted regardless of the light's intensity.</p>",
    "question_index": 121
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding chromosomes:</p><p>Statement I: Chromosomes are composed of DNA and proteins.</p><p>Statement II: Chromosome number remains constant in somatic cells of a species.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2339;&#2360;&#2370;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2327;&#2369;&#2339;&#2360;&#2370;&#2340;&#2381;&#2352; &#2337;&#2368;&#2319;&#2344;&#2319; &#2324;&#2352; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2360;&#2375; &#2348;&#2344;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2325;&#2368; &#2342;&#2376;&#2361;&#2367;&#2325; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2327;&#2369;&#2339;&#2360;&#2370;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2381;&#2341;&#2367;&#2352; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>I. is Correct.</b> Chromosomes are made of chromatin, which consists of DNA (genetic material) wrapped around \"histone\" proteins.</p><p><b>II. is Correct.</b> Every species has a fixed number of chromosomes in its somatic (body) cells. For humans, this number is 46 (23 pairs).</p><p><b>Further Insights:</b></p><p>During cell division, the number remains constant in mitosis but is halved in meiosis (gamete formation).</p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>India's major bauxite deposits are primarily found in which of the following regions?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2348;&#2377;&#2325;&#2381;&#2360;&#2366;&#2311;&#2335; &#2349;&#2306;&#2337;&#2366;&#2352; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</span>",
    "options": [
      "<span class=\"eqt\">Amarkantak Plateau, Maikal Hills and Bilaspur-Katni Plateau</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2352;&#2325;&#2306;&#2335;&#2325; &#2346;&#2336;&#2366;&#2352;, &#2350;&#2376;&#2325;&#2354; &#2346;&#2361;&#2366;&#2337;&#2364;&#2367;&#2351;&#2366;&#2305; &#2324;&#2352; &#2348;&#2367;&#2354;&#2366;&#2360;&#2346;&#2369;&#2352;-&#2325;&#2335;&#2344;&#2368; &#2346;&#2336;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Chota Nagpur Plateau</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2379;&#2335;&#2366; &#2344;&#2366;&#2327;&#2346;&#2369;&#2352; &#2346;&#2336;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Aravalli Range and Malwa Plateau</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2366;&#2357;&#2354;&#2368; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366; &#2324;&#2352; &#2350;&#2366;&#2354;&#2357;&#2366; &#2346;&#2336;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Eastern Ghats and Deccan Plateau</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2328;&#2366;&#2335; &#2324;&#2352; &#2342;&#2325;&#2381;&#2325;&#2344; &#2346;&#2336;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Bauxite is the principal ore of aluminium and in India it is predominantly associated with lateritic soils developed over plateau regions under conditions of high rainfall and prolonged weathering.</p><p>The Amarkantak Plateau and Maikal Hills form part of the Central Indian highlands, where intense chemical weathering has led to the accumulation of laterite and bauxite deposits.</p><p>The Bilaspur-Katni plateau region also exhibits similar geological conditions, making it one of the important bauxite-bearing areas in central India.</p><p>These regions provide the ideal combination of relief, climate, and parent rock required for bauxite formation.</p><p></p><p>Chota Nagpur Plateau is better known for coal, iron ore, mica, and manganese rather than being a primary bauxite belt as per the given information.</p><p></p>",
    "question_index": 123
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding PM-Fasal Bima Yojana:</p><p>1. It provides insurance coverage to farmers against crop loss.</p><p>2. It is voluntary for loanee farmers.</p><p>3. It is administered by the Ministry of Agriculture.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2368;&#2319;&#2350;-&#2347;&#2360;&#2354; &#2348;&#2368;&#2350;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2351;&#2361; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2347;&#2360;&#2354; &#2361;&#2366;&#2344;&#2367; &#2325;&#2375; &#2357;&#2367;&#2352;&#2369;&#2342;&#2381;&#2343; &#2348;&#2368;&#2350;&#2366; &#2325;&#2357;&#2352;&#2375;&#2332; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2. &#2351;&#2361; &#2315;&#2339; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2381;&#2357;&#2376;&#2330;&#2381;&#2331;&#2367;&#2325; &#2361;&#2376;&#2404;</p><p>3. &#2311;&#2360;&#2325;&#2366; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2371;&#2359;&#2367; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements 1 and 3 are correct.</b></p><p><b>Statement 2 is incorrect because the scheme was made voluntary for all farmers in 2020.</b></p><p><b>Explanation of Statements:</b></p><p><b>1) is Correct.</b> It is a crop insurance scheme that protects farmers against financial loss due to natural calamities, pests, or diseases.</p><p><b>2) is Incorrect.</b> Originally, the scheme was mandatory for loanee farmers. However, the government revamped it in February 2020, making it voluntary for all farmers (loanee and non-loanee).</p><p><b>3) is Correct.</b> It is the flagship scheme administered by the Ministry of Agriculture &amp; Farmers Welfare.</p><p><b>Further Insights:</b></p><p>The premium for farmers is capped at 2% for Kharif crops, 1.5% for Rabi crops, and 5% for commercial/horticultural crops.</p>",
    "question_index": 124
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Swadeshi Movement:</p><p>Statement I: It emphasized boycott of foreign goods.</p><p>Statement II: It was limited only to Bengal Presidency.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2311;&#2360;&#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2361;&#2367;&#2359;&#2381;&#2325;&#2366;&#2352; &#2346;&#2352; &#2332;&#2379;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2351;&#2361; &#2325;&#2375;&#2357;&#2354; &#2348;&#2306;&#2327;&#2366;&#2354; &#2346;&#2381;&#2352;&#2375;&#2360;&#2368;&#2337;&#2375;&#2306;&#2360;&#2368; &#2340;&#2325; &#2361;&#2368; &#2360;&#2368;&#2350;&#2367;&#2340; &#2341;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I is correct.</b></p><p><b>Statement II is incorrect because the movement spread beyond Bengal to other parts of India.</b>.</p><p><b>Explanation of Statements:</b></p><p><b>I. is Correct.</b> The movement was a direct reaction to the Partition of Bengal (1905) and used the boycott of British goods and the promotion of Indian-made goods as a political tool.</p><p><b>II. is Incorrect.</b> While it started in Bengal, leaders like Bal Gangadhar Tilak (in Maharashtra), Lala Lajpat Rai (in Punjab), and Chidambaram Pillai (in Madras) took the movement to other provinces.</p><p><b>Further Insights:</b></p><p>The Swadeshi movement led to the establishment of \"National Schools\" and indigenous textile mills and soap factories.</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following Ramsar Sites declared in 2025 with their respective States:</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List- I (Ramsar Site)</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List - II (State)</th></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Gokul Jalashay</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Rajasthan</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Menar Wetland Complex</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Chhattisgarh</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Kopra Jalashay</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Bihar</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Therthangal Bird Sanctuary</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Tamil Nadu</td></p><p></tr></p><p></table></p></span><span class=\"hqt\" style=\"display:none\"><p>2025 &#2350;&#2375;&#2306; &#2328;&#2379;&#2359;&#2367;&#2340; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2366;&#2350;&#2360;&#2352; &#2360;&#2381;&#2341;&#2354;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><p><table style=\"border-collapse:collapse;\"><tr></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2327;&#2379;&#2325;&#2369;&#2354; &#2332;&#2354;&#2358;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2350;&#2375;&#2344;&#2366;&#2352; &#2310;&#2352;&#2381;&#2342;&#2381;&#2352;&#2349;&#2370;&#2350;&#2367; &#2346;&#2352;&#2367;&#2360;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2331;&#2340;&#2381;&#2340;&#2368;&#2360;&#2327;&#2338;&#2364;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2325;&#2379;&#2346;&#2352;&#2366; &#2332;&#2354;&#2358;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2348;&#2367;&#2361;&#2366;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2341;&#2375;&#2352;&#2341;&#2306;&#2327;&#2354; &#2346;&#2325;&#2381;&#2359;&#2368; &#2309;&#2349;&#2351;&#2366;&#2352;&#2339;&#2381;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</td></tr></table></p></span>",
    "options": [
      "<span class=\"eqt\">A-4, B-3, C-1, D-2</span><span class=\"hqt\" style=\"display:none\">A-4, B-3, C-1, D-2</span>",
      "<span class=\"eqt\">A-3, B-2, C-4, D-1</span><span class=\"hqt\" style=\"display:none\">A-3, B-2, C-4, D-1</span>",
      "<span class=\"eqt\">A-3, B-1, C-2, D-4</span><span class=\"hqt\" style=\"display:none\">A-3, B-1, C-2, D-4</span>",
      "<span class=\"eqt\">A-1, B-4, C-3, D-2</span><span class=\"hqt\" style=\"display:none\">A-1, B-4, C-3, D-2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>As of December 2025, India has a total of 96 Ramsar Sites.</p><p>Gokul Jalashay, a designated Ramsar Site (September 2025) in Buxar district, Bihar, India, is an important oxbow lake of the Ganges River known for migratory birds, blackbuck habitat, and serving as a natural flood buffer, bringing India's total to 93 Ramsar sites. This freshwater wetland supports local livelihoods through fishing and farming and highlights Bihar's growing commitment to wetland conservation alongside Udaipur Jheel.</p><p>On June 4, 2025 a day before World Environment Day, the Union Environment Ministry announced the designation of two new Ramsar sites in India-Khichan in Phalodi and Menar in Udaipur, Rajasthan.</p><p>The Kopra Reservoir in Chhattisgarh's Bilaspur district is a significant man-made wetland recently designated(Decemeber 2025) as India's 95th Ramsar Site and the state's first.</p><p>In January 2025, Tamil Nadu further strengthened its position as India's leading state in wetland conservation with the declaration of two new Ramsar sites - Sakkarakottai Bird Sanctuary and Therthangal Bird Sanctuary, both located in Ramanathapuram district. These additions bring the total number of Ramsar sites in the state to 20, the highest in the country.</p><p></p><p>Ramsar Sites Declared in 2025</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">State</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">Wetland Site</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">Date of Designation</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">Date/Year of Declaration</th></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bihar</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Gokul Jalashay</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">13.05.2025</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">26.09.2025</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bihar</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Udaipur Jheel</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">13.05.2025</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">26.09.2025</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bihar</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Gogabil Lake</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">13.05.2025</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30.10.2025</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Chhattisgarh</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Kopra Jalashay</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">08.08.2025</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">12.12.2025</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Jharkhand</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Udhwa Lake Bird Sanctuary</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">08-01-2024</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30.01.2025</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rajasthan</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Menar Wetland Complex</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">19-02-2025</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">04.06.2025</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rajasthan</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Khichan wetland</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">19-02-2025</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">04.06.2025</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rajasthan</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Siliserh Lake</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">07.07.2025</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">12.12.2025</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sikkim</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Khachoedpalri wetland</td></p><p><td align=\"left\" style=\"border:1-px solid black;padding:5px;\">15-07-2024</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30.01.2025</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tamil Nadu</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sakkarakottai Bird Sanctuary</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15-07-2024</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30.01.2025</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tamil Nadu</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Therthangal Bird Sanctuary</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15-07-2024</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30.01.2025</td></p><p></tr></p><p></table></p><p></p><p></p><p></p><p></p>",

  },

    "question": "<span class=\"eqt\"><p>Which of the following best describes the concept of \"allelopathy\"?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; \"&#2319;&#2354;&#2375;&#2354;&#2379;&#2346;&#2376;&#2341;&#2368;\" &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Mutual interaction between two species for survival</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2360;&#2381;&#2340;&#2367;&#2340;&#2381;&#2357; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2366;&#2352;&#2360;&#2381;&#2346;&#2352;&#2367;&#2325; &#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Chemical inhibition of one species by another</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2370;&#2360;&#2352;&#2368; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2325;&#2366; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2309;&#2357;&#2352;&#2379;&#2343;</span>",
      "<span class=\"eqt\">Seasonal migration of organisms</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2357;&#2379;&#2306; &#2325;&#2366; &#2350;&#2380;&#2360;&#2350;&#2368; &#2346;&#2381;&#2352;&#2357;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Adaptation to extreme environmental conditions</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2352;&#2350; &#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339;&#2368;&#2351; &#2346;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Allelopathy refers to the chemical inhibition of one species by another.</b></p><p><b>Explanation:</b></p><p><b>Allelopathy</b> is a biological phenomenon where an organism produces biochemicals (allelochemicals) that influence the growth, survival, and reproduction of other organisms. Often, these chemicals are released to suppress the growth of competing plants nearby.</p><p><b>Further Insights:</b></p><p>A common example is the Black Walnut tree, which releases \"juglone,\" a chemical that inhibits the growth of many other plants under its canopy.</p>",
    "question_index": 127
  },
  {
    "question": "<span class=\"eqt\"><p>Which part of the human brain regulates heartbeat and breathing?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2357; &#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2349;&#2366;&#2327; &#2361;&#2371;&#2342;&#2351; &#2327;&#2340;&#2367; &#2324;&#2352; &#2358;&#2381;&#2357;&#2360;&#2344; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cerebrum</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325;</span>",
      "<span class=\"eqt\">Cerebellum</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2352;&#2367;&#2348;&#2375;&#2354;&#2350;</span>",
      "<span class=\"eqt\">Medulla oblongata</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2337;&#2369;&#2354;&#2366; &#2321;&#2348;&#2354;&#2379;&#2306;&#2327;&#2366;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Hypothalamus</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2346;&#2379;&#2341;&#2375;&#2354;&#2375;&#2350;&#2360;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>The Medulla oblongata regulates involuntary functions like heartbeat and breathing.</b></p><p><b>Explanation:</b></p><p>The <b>Medulla oblongata</b>, located in the brainstem, contains the vital centers that control autonomic (involuntary) functions such as breathing, heart rate, blood pressure, and swallowing.</p><p><b>Further Insights:</b></p><p>The <b>Cerebellum</b> is responsible for balance and coordination, while the <b>Cerebrum</b> handles higher-level thinking and voluntary actions.</p>",
    "question_index": 128
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Consumer Price Index (CPI):</p><p>Statement I: CPI measures changes in retail prices faced by consumers.</p><p>Statement II: CPI is the sole inflation index used by the Reserve Bank of India for policy decisions.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; (&#2360;&#2368;&#2346;&#2368;&#2310;&#2312;) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; I: &#2360;&#2368;&#2346;&#2368;&#2310;&#2312; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2366;&#2350;&#2344;&#2366; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2326;&#2369;&#2342;&#2352;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2360;&#2368;&#2346;&#2368;&#2310;&#2312; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2367;&#2332;&#2352;&#2381;&#2357; &#2348;&#2376;&#2306;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2368;&#2340;&#2367;&#2327;&#2340; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I is correct.</b></p><p><b>Statement II is incorrect because while the RBI uses CPI as its primary anchor, it is not the \"sole\" index used for all economic decisions.</b></p><p><b>Explanation of Statements:</b></p><p><b>I. is Correct.</b> CPI measures the weighted average of prices of a basket of consumer goods and services, reflecting the inflation experienced by the end-user.</p><p><b>II. is Incorrect.</b> Although the RBI adopted the CPI (Combined) as its primary anchor for monetary policy in 2014, the government and other agencies still use various other indices like the Wholesale Price Index (WPI) and Index of Industrial Production (IIP) for broader economic analysis.</p><p><b>Further Insights:</b></p><p>The National Statistical Office (NSO) releases CPI data monthly in India.</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>Which Windows Explorer feature allows quick access to frequently used folders?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2319;&#2325;&#2381;&#2360;&#2346;&#2381;&#2354;&#2379;&#2352;&#2352; &#2325;&#2368; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2348;&#2366;&#2352;-&#2348;&#2366;&#2352; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2347;&#2364;&#2379;&#2354;&#2381;&#2337;&#2352;&#2379;&#2306; &#2340;&#2325; &#2340;&#2381;&#2357;&#2352;&#2367;&#2340; &#2346;&#2361;&#2369;&#2306;&#2330; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Libraries</span><span class=\"hqt\" style=\"display:none\">Libraries</span>",
      "<span class=\"eqt\">This PC</span><span class=\"hqt\" style=\"display:none\">This PC</span>",
      "<span class=\"eqt\">Quick Access</span><span class=\"hqt\" style=\"display:none\">Quick Access</span>",
      "<span class=\"eqt\">File History</span><span class=\"hqt\" style=\"display:none\">File History</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Quick Access allows users to pin and view frequently used folders and recent files.</b></p><p><b>Explanation:</b></p><p><b>Quick Access:</b> Located at the top of the Navigation Pane in Windows Explorer, it automatically shows folders you use often and files you've opened recently, allowing for faster navigation without digging through directories.</p><p><b>Libraries:</b> Group folders from different locations into a single view.</p><p><b>This PC:</b> Shows the hardware drives and basic system folders.</p><p><b>Further Insights:</b></p><p>Users can \"Pin\" any specific folder to Quick Access permanently by right-clicking it.</p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>The protocol that encrypts data between a server and a user using SSL/TLS is _____</p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2357;&#2352; &#2324;&#2352; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; SSL/TLS &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; _____ &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">FTP</span><span class=\"hqt\" style=\"display:none\">FTP</span>",
      "<span class=\"eqt\">HTTP</span><span class=\"hqt\" style=\"display:none\">HTTP</span>",
      "<span class=\"eqt\">HTTPS</span><span class=\"hqt\" style=\"display:none\">HTTPS</span>",
      "<span class=\"eqt\">SMTP</span><span class=\"hqt\" style=\"display:none\">SMTP</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The protocol that encrypts data between a server and a user using SSL/TLS is <b>HTTPS (Hypertext Transfer Protocol Secure).</b></p><p>HTTPS uses SSL (Secure Sockets Layer) or its successor, TLS (Transport Layer Security), to establish a secure, encrypted connection, ensuring that all data exchanged remains private and protected from eavesdropping and tampering</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct statement(s).</p><p>1) Registers are faster than cache memory.</p><p>2) Registers store intermediate results.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306;&#2404;</p><p>1) &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352; &#2325;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2360;&#2375; &#2340;&#2375;&#2332;&#2364; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352; &#2350;&#2343;&#2381;&#2351;&#2357;&#2352;&#2381;&#2340;&#2368; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>1) is Correct.</b> Registers are located directly inside the CPU core. They are the fastest memory in the entire computer hierarchy, even faster than L1 Cache.</p><p><b>2) is Correct.</b> Registers are used to hold the specific pieces of data the CPU is currently working on, such as operands for an addition or the intermediate result of a long calculation.</p><p><b>Further Insights:</b></p><p>Common registers include the Accumulator, Instruction Register, and Memory Address Register (MAR).</p>",
    "question_index": 132
  },
  {
    "question": "<span class=\"eqt\"><p>Which unit represents 1024 kilobytes?</p></span><span class=\"hqt\" style=\"display:none\"><p>1024 &#2325;&#2367;&#2354;&#2379;&#2348;&#2366;&#2311;&#2335; &#2325;&#2379; &#2325;&#2380;&#2344; &#2360;&#2368; &#2311;&#2325;&#2366;&#2312; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Megabyte</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2327;&#2366;&#2348;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">Gigabyte</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2368;&#2327;&#2366;&#2348;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">Terabyte</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2352;&#2366;&#2348;&#2366;&#2311;&#2335;</span>",
      "<span class=\"eqt\">Petabyte</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2335;&#2366;&#2348;&#2366;&#2311;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>1024 Kilobytes is equal to 1 Megabyte.</b></p><p><b>Explanation:</b></p><p>Computers use binary logic, so units increase by powers of 2 (2<sup>10</sup>=1024).</p><p>1024 Bytes = 1 Kilobyte (KB).</p><p><b>1024 Kilobytes = 1 Megabyte (MB).</b></p><p>1024 Megabytes = 1 Gigabyte (GB).</p><p><b>Further Insights:</b></p><p>In the context of storage manufacturers, sometimes 1000 is used for simplicity, but in computing (binary), 1024 is the correct standard.</p>",
    "question_index": 133
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Following:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Hub</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Uses IP</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Switch</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Broadcasts</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Router</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. MAC based</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Modem</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Signal conversion</td></tr></table><p>Correct option:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; II</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2361;&#2348;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. IP &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2360;&#2381;&#2357;&#2367;&#2330;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2348;&#2381;&#2352;&#2377;&#2337;&#2325;&#2366;&#2360;&#2381;&#2335;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2352;&#2366;&#2313;&#2335;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2350;&#2376;&#2325; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2350;&#2377;&#2337;&#2375;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2360;&#2367;&#2327;&#2381;&#2344;&#2354; &#2352;&#2370;&#2346;&#2366;&#2306;&#2340;&#2352;&#2339;</td></tr></table><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</p></span>",
    "options": [
      "<span class=\"eqt\">A-2, B-3, C-1, D-4</span><span class=\"hqt\" style=\"display:none\">A-2, B-3, C-1, D-4</span>",
      "<span class=\"eqt\">A-3, B-2, C-4, D-1</span><span class=\"hqt\" style=\"display:none\">A-3, B-2, C-4, D-1</span>",
      "<span class=\"eqt\">A-1, B-3, C-2, D-4</span><span class=\"hqt\" style=\"display:none\">A-1, B-3, C-2, D-4</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p><b>A-2 (Hub):</b> A basic device that broadcasts incoming data to all connected devices.</p><p><b>B-3 (Switch):</b> Uses MAC addresses to send data only to the specific destination device.</p><p><b>C-1 (Router):</b> Connects different networks and uses IP addresses to route traffic.</p><p><b>D-4 (Modem):</b> Performs \"Modulation/Demodulation\" to convert digital signals to analog and vice versa.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about IMAP:</p><p>1) IMAP stores emails on the server.</p><p>2) IMAP allows access from multiple devices.</p><p>3) IMAP deletes emails from server after download.</p><p>Correct statements are:</p></span><span class=\"hqt\" style=\"display:none\"><p>IMAP &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) IMAP &#2312;&#2350;&#2375;&#2354; &#2325;&#2379; &#2360;&#2352;&#2381;&#2357;&#2352; &#2346;&#2352; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) IMAP &#2325;&#2312; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2360;&#2375; &#2346;&#2361;&#2369;&#2305;&#2330; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3) IMAP &#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2360;&#2352;&#2381;&#2357;&#2352; &#2360;&#2375; &#2312;&#2350;&#2375;&#2354; &#2361;&#2335;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements 1 and 2 are correct.</b></p><p><b>Statement 3 is incorrect because IMAP synchronizes with the server rather than deleting emails after download.</b></p><p><b>Explanation of Statements:</b></p><p><b>1) is Correct.</b> IMAP (Internet Message Access Protocol) leaves the original email on the mail server.</p><p><b>2) is Correct.</b> Because mail stays on the server, you can see the same folders and read/unread status on your phone, laptop, and tablet simultaneously.</p><p><b>3) is Incorrect.</b> Deleting from the server after download is a characteristic of the older <b>POP3</b> protocol. IMAP only deletes an email if the user specifically chooses to delete it.</p><p><b>Further Insights:</b></p><p>IMAP is better for the modern era of multiple devices, whereas POP3 was designed for a time when users had only one computer and limited server storage.</p>",
    "question_index": 135
  },

    "question": "<span class=\"eqt\"><p>Which view displays files with detailed attributes like size and date?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2381;&#2351;&#2370; &#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2379; &#2310;&#2325;&#2366;&#2352; &#2324;&#2352; &#2340;&#2367;&#2341;&#2367; &#2332;&#2376;&#2360;&#2375; &#2357;&#2367;&#2360;&#2381;&#2340;&#2371;&#2340; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Large icons</span><span class=\"hqt\" style=\"display:none\">Large icons</span>",
      "<span class=\"eqt\">List</span><span class=\"hqt\" style=\"display:none\">List</span>",
      "<span class=\"eqt\">Details</span><span class=\"hqt\" style=\"display:none\">Details</span>",
      "<span class=\"eqt\">Tiles</span><span class=\"hqt\" style=\"display:none\">Tiles</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>The Details view provides the most comprehensive information about files.</b></p><p><b>Explanation:</b></p><p><b>Details View:</b> This view organizes files into a list with multiple columns, showing the name, date modified, file type, and size. You can also sort files by clicking on these column headers.</p><p><b>List View:</b> Simply shows file names in columns without extra data.</p><p><b>Tiles/Icons:</b> Focus more on visual representation/thumbnails.</p><p><b>Further Insights:</b></p><p>In \"Details\" view, you can right-click the column headers to add even more attributes, like \"Authors\" or \"Dimensions.\"</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about HDMI ports:</p><p>1) HDMI supports both audio and video signals.</p><p>2) HDMI can transmit analog signals.</p><p>Which of the above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2330;&#2337;&#2368;&#2319;&#2350;&#2310;&#2312;&#2335;&#2368; &#2346;&#2379;&#2352;&#2381;&#2335; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2319;&#2330;&#2337;&#2368;&#2319;&#2350;&#2310;&#2312; &#2321;&#2337;&#2367;&#2351;&#2379; &#2324;&#2352; &#2357;&#2368;&#2337;&#2367;&#2351;&#2379; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2367;&#2327;&#2381;&#2344;&#2354; &#2325;&#2379; &#2360;&#2346;&#2379;&#2352;&#2381;&#2335; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2319;&#2330;&#2337;&#2368;&#2319;&#2350;&#2310;&#2312; &#2319;&#2344;&#2366;&#2354;&#2377;&#2327; &#2360;&#2367;&#2327;&#2381;&#2344;&#2354; &#2325;&#2379; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2350;&#2367;&#2335; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement 1 is correct. Statement 2 is incorrect because HDMI is a purely digital interface.</b></p><p><b>Explanation of Statements:</b></p><p><b>1) is Correct.</b> High-Definition Multimedia Interface (HDMI) was designed to replace older cables by carrying both high-quality digital video and multi-channel digital audio through a single cable.</p><p><b>2) is Incorrect.</b> HDMI does not transmit analog signals. If you need to connect an HDMI device to an older analog VGA monitor, an active digital-to-analog converter is required.</p><p><b>Further Insights:</b></p><p>Modern HDMI versions (like 2.1) support 8K resolution and features like eARC (Enhanced Audio Return Channel).</p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about cache memory:</p><p>1) Cache memory reduces average memory access time.</p><p>2) Cache memory is larger in size than RAM.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2325;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2324;&#2360;&#2340; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2360;&#2350;&#2351; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2325;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2352;&#2376;&#2350; &#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement 1 is correct.</b></p><p><b>Statement 2 is incorrect because cache memory is significantly smaller in capacity compared to RAM.</b></p><p><b>Explanation of Statements:</b></p><p><b>1) is Correct.</b> Cache is a high-speed memory placed between the CPU and RAM. It stores frequently used data so the CPU doesn't have to wait for the slower RAM, thus reducing average access time.</p><p><b>2) is Incorrect.</b> Due to its high cost and the complexity of its hardware (SRAM), cache is kept very small (usually in Megabytes), whereas RAM is much larger (usually in Gigabytes).</p><p><b>Further Insights:</b></p><p>Cache is categorized into levels: L1 (fastest/smallest), L2, and L3 (slowest/largest cache level).</p><p>It operates on the principle of \"Locality of Reference.\"</p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Which technology is primarily used for two-factor authentication in online banking?</p></span><span class=\"hqt\" style=\"display:none\">&#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2348;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2350;&#2375;&#2306; &#2342;&#2379;-&#2325;&#2366;&#2352;&#2325; &#2346;&#2381;&#2352;&#2350;&#2366;&#2339;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2367;&#2360; &#2340;&#2325;&#2344;&#2368;&#2325; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">CAPTCHA</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2373;&#2346;&#2381;&#2330;&#2366;</span>",
      "<span class=\"eqt\">OTP</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2335;&#2368;&#2346;&#2368;</span>",
      "<span class=\"eqt\">Firewall</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2366;&#2351;&#2352;&#2357;&#2377;&#2354;</span>",
      "<span class=\"eqt\">Cookies</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2325;&#2368;&#2332;&#2364;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>OTP is the primary technology used for the second layer of authentication in banking.</b></p><p><b>Explanation:</b></p><p><b>OTP (One-Time Password):</b> This provides Two-Factor Authentication (2FA). Even if a hacker knows your password (Factor 1), they cannot access your account without the unique code sent to your registered mobile/email (Factor 2).</p><p><b>CAPTCHA:</b> Used to distinguish humans from bots.</p><p><b>Firewall:</b> Used to block unauthorized network traffic.</p><p><b>Further Insights:</b></p><p>OTP is a \"dynamic\" password that expires within a few minutes, making it highly secure against replay attacks.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>Which backup method stores only data changed since the last full backup?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2348;&#2376;&#2325;&#2309;&#2346; &#2357;&#2367;&#2343;&#2367; &#2325;&#2375;&#2357;&#2354; &#2309;&#2306;&#2340;&#2367;&#2350; &#2346;&#2370;&#2352;&#2381;&#2339; &#2348;&#2376;&#2325;&#2309;&#2346; &#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2361;&#2368; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Differential</span><span class=\"hqt\" style=\"display:none\">Differential</span>",
      "<span class=\"eqt\">Incremental</span><span class=\"hqt\" style=\"display:none\">Incremental</span>",
      "<span class=\"eqt\">Mirror</span><span class=\"hqt\" style=\"display:none\">Mirror</span>",
      "<span class=\"eqt\">Full</span><span class=\"hqt\" style=\"display:none\">Full</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>The Incremental backup method stores data changed since the last backup of any type.</b></p><p><b>Explanation:</b></p><p><b>Incremental Backup:</b> This method only backs up files that have changed since the <i>most recent</i> backup (whether full or incremental). This saves time and storage space.</p><p><b>Differential Backup:</b> This stores all data changed since the last <i>Full</i> backup. It grows in size until the next full backup is performed.</p><p><b>Mirror Backup:</b> An exact real-time clone of the data.</p><p><b>Further Insights:</b></p><p>While incremental backups are fastest to perform, they are the slowest to restore because you need the last full backup plus <i>every</i> incremental piece in the chain.</p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true?</p><p>1) Windows supports multitasking.</p><p>2) Windows is a command-line OS only.</p><p>3) Windows manages hardware resources.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>1) &#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2350;&#2354;&#2381;&#2335;&#2368;&#2335;&#2366;&#2360;&#2381;&#2325;&#2367;&#2306;&#2327; &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2325;&#2375;&#2357;&#2354; &#2325;&#2350;&#2366;&#2306;&#2337;-&#2354;&#2366;&#2311;&#2344; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2361;&#2376;&#2404;</p><p>3) &#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2361;&#2366;&#2352;&#2381;&#2337;&#2357;&#2375;&#2351;&#2352; &#2360;&#2306;&#2360;&#2366;&#2343;&#2344;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">All</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements 1 and 3 are correct.</b></p><p><b>Statement 2 is incorrect because Windows is primarily a Graphical User Interface (GUI) OS.</b></p><p><b>Explanation of Statements:</b></p><p><b>1) is Correct.</b> Windows supports \"Pre-emptive Multitasking,\" allowing users to run multiple applications (like a browser, Word, and music player) at the same time.</p><p><b>2) is Incorrect.</b> Windows is famous for its GUI (icons, windows, mouse). While it <i>has</i> a command line (CMD/PowerShell), it is not a \"command-line only\" OS like early MS-DOS.</p><p><b>3) is Correct.</b> As an operating system, it acts as the interface between the software and the hardware, managing the CPU, RAM, and storage.</p><p><b>Further Insights:</b></p><p>Windows was first introduced in 1985 as a graphical shell for MS-DOS.</p>",
    "question_index": 141
  },
