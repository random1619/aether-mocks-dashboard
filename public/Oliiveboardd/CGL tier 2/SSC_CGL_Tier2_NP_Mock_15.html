  {
    "question": "<span class=\"eqt\"><p>If sec 41 = p/q, what is the value of tan 41 sec 49?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; sec 41 = p/q, tan 41 sec 49 &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">p/q</span><span class=\"hqt\" style=\"display:none\">p/q</span>",
      "<span class=\"eqt\">p<sup>2</sup>/q<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">p<sup>2</sup>/q<sup>2</sup></span>",
      "<span class=\"eqt\">q/p</span><span class=\"hqt\" style=\"display:none\">q/p</span>",
      "<span class=\"eqt\">q<sup>2</sup>/p<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">q<sup>2</sup>/p<sup>2</sup></span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>sec 41 = p/q</p><p>=&gt; 1 + tan<sup>2</sup>41 = p<sup>2</sup>/q<sup>2</sup></p><p>=&gt; tan<sup>2</sup>41 = p<sup>2</sup>/q<sup>2</sup>  -  1</p><p>=&gt; tan 41 = &radic;(p<sup>2</sup>  -  q<sup>2</sup>)/q</p><p>sec 41 = p/q</p><p>=&gt; sec(90  -  49) = p/q</p><p>=&gt; cosec 49 = p/q</p><p>=&gt; sin 49 = q/p</p><p>=&gt; 1  -  sin<sup>2</sup>49 = 1  -  q<sup>2</sup>/p<sup>2</sup></p><p>=&gt; cos<sup>2</sup>49 = (p<sup>2</sup>  -  q<sup>2</sup>)/p<sup>2</sup></p><p>=&gt; cos 49 = &radic;(p<sup>2</sup>  -  q<sup>2</sup>)/p</p><p>=&gt; sec 49 = p/&radic;(p<sup>2</sup>  -  q<sup>2</sup>)</p><p>&#8756; tan 41 sec 49 = &radic;(p<sup>2</sup>  -  q<sup>2</sup>)/q * p/&radic;(p<sup>2</sup>  -  q<sup>2</sup>) = p/q</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Each exterior angle of a regular polygon is 140&#730; less than its interior angle, then find its number of sides.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2348;&#2361;&#2367;&#2325;&#2379;&#2339; &#2311;&#2360;&#2325;&#2375; &#2309;&#2306;&#2340;&#2307;&#2325;&#2379;&#2339; &#2360;&#2375; 140&#730; &#2325;&#2350; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2368; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>As we know,</p><p>Interior angle + exterior angle = 180&#730;</p><p>Here, interior angle = 140&#730; + exterior angle</p><p>Now, interior angle = (180 + 140)/2 = 160&#730;</p><p>Let given regular polygon has 'n' sides. Then,</p><p>160 = ((2n  -  4)/n) * 90</p><p><b>n = 18</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A box contains 6 black color and 5 blue color socks. A man takes out two socks. The probability that they are of the same color is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2337;&#2367;&#2348;&#2381;&#2348;&#2375; &#2350;&#2375;&#2306; 6 &#2325;&#2366;&#2354;&#2375; &#2352;&#2306;&#2327; &#2324;&#2352; 5 &#2344;&#2368;&#2354;&#2375; &#2352;&#2306;&#2327; &#2325;&#2375; &#2350;&#2379;&#2332;&#2364;&#2375; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2342;&#2379; &#2350;&#2379;&#2332;&#2364;&#2375; &#2344;&#2367;&#2325;&#2366;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2344;&#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2352;&#2306;&#2327; &#2325;&#2375; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">5/12</span><span class=\"hqt\" style=\"display:none\">5/12</span>",
      "<span class=\"eqt\">1/12</span><span class=\"hqt\" style=\"display:none\">1/12</span>",
      "<span class=\"eqt\">4/11</span><span class=\"hqt\" style=\"display:none\">4/11</span>",

    ],
    "correct_option_id": 3,
    "solution": "<p>Total number of socks = 6 + 5 = 11</p><p>Probability that both socks will of black color = (6/11) * (5/10) = 3/11</p><p>Probability that both socks will of blue color = (5/11) * (4/10) = 2/11</p><p>Required probability = (3/11) + (2/11) = 5/11</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Find the value of &radic;(9 + &radic;(250 + &radic;(33 + &radic;(2<sup>3</sup> + 1))))?</p></span><span class=\"hqt\" style=\"display:none\"><p>&radic;(9 + &radic;(250 + &radic;(33 + &radic;(2<sup>3</sup> + 1)))) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",

      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, &radic;(9 + &radic;(250 + &radic;(33 + &radic;(2<sup>3</sup> + 1))))</p><p>= &radic;(9 + &radic;(250 + &radic;(33 + 3)))</p><p>= &radic;(9 + &radic;(250 + 6))</p><p>= &radic;(9 + 16)</p><p>= <b>5</b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are false?</p><p>(a) Circles are congruent to each other if they have equal radii.</p><p>(b) Radius is the longest chord of a circle</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>(a) &#2351;&#2342;&#2367; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2319;&#2305; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2306;, &#2340;&#2379; &#2357;&#2375; &#2319;&#2325;-&#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2375; &#2360;&#2352;&#2381;&#2357;&#2366;&#2306;&#2327;&#2360;&#2350; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>(b) &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2354;&#2306;&#2348;&#2368; &#2332;&#2368;&#2357;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement A is true.</p><p>Circles are congruent to each other if they have equal radii.</p><p>Statement B is false as longest chord of a circle is diameter.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A solid cone of radius 42 cm and height 60 cm is melted and converted into some small cuboids of dimension 40*28*11. Find the number of small cuboids.</p></span><span class=\"hqt\" style=\"display:none\"><p>42 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; 60 cm &#2314;&#2306;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2336;&#2379;&#2360; &#2358;&#2306;&#2325;&#2369; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 40*28*11 &#2357;&#2367;&#2350;&#2366;&#2323;&#2306; &#2357;&#2366;&#2354;&#2375; &#2325;&#2369;&#2331; &#2331;&#2379;&#2335;&#2375; &#2328;&#2344;&#2366;&#2349;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2331;&#2379;&#2335;&#2375; &#2328;&#2344;&#2366;&#2349;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the number of small cuboids = n</p><p>Volume of the cone = n * Volume of the cuboid</p><p>1/3 * &#960;r<sup>2</sup>h = n * 40 * 28 * 11</p><p>1/3 * 22/7 * 42 * 42 * 60 = 40 * 28 * 11n</p><p>n = 9</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The marked price of a product is 35% above its manufacturing cost. The product is sold through a retailer, who earns 25% profit by selling the product to the customer. The retailer gives 10% discount on the marked price. What is the profit/loss percentage for the manufacturer who sells his product to the retailer?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2325;&#2366; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2313;&#2360;&#2325;&#2368; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2375; 35% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2319;&#2325; &#2326;&#2369;&#2342;&#2352;&#2366; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325; &#2325;&#2379; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2348;&#2375;&#2330;&#2325;&#2352; 25% &#2354;&#2366;&#2349; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2326;&#2369;&#2342;&#2352;&#2366; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366;, &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 10% &#2325;&#2368; &#2331;&#2370;&#2335; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2326;&#2369;&#2342;&#2352;&#2366; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2325;&#2379; &#2309;&#2346;&#2344;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2348;&#2375;&#2330;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2340;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2354;&#2366;&#2349;/&#2361;&#2366;&#2344;&#2367; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3.5% profit</span><span class=\"hqt\" style=\"display:none\">3.5% &#2354;&#2366;&#2349;</span>",
      "<span class=\"eqt\">2% profit</span><span class=\"hqt\" style=\"display:none\">2% &#2354;&#2366;&#2349;</span>",

      "<span class=\"eqt\">2.8% loss</span><span class=\"hqt\" style=\"display:none\">2.8% &#2361;&#2366;&#2344;&#2367;</span>"

  {
    "question": "<span class=\"eqt\"><p>If sec &#946; = &radic;(p + 1), then what is the value of tan &#946;?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; sec &#946; = &radic;(p + 1) &#2361;&#2376;, &#2340;&#2379; tan &#946; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;p</span><span class=\"hqt\" style=\"display:none\">&radic;p</span>",
      "<span class=\"eqt\">p</span><span class=\"hqt\" style=\"display:none\">p</span>",
      "<span class=\"eqt\">1/&radic;p</span><span class=\"hqt\" style=\"display:none\">1/&radic;p</span>",
      "<span class=\"eqt\">1/p</span><span class=\"hqt\" style=\"display:none\">1/p</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>sec &#946; = &radic;(p + 1),</p><p>=&gt; cos &#946; = 1/&radic;(p + 1)</p><p>=&gt; cos<sup>2</sup> &#946; = 1/(p + 1)</p><p>=&gt; sin<sup>2</sup> &#946; = 1  -  1/(p + 1)</p><p>=&gt; sin<sup>2</sup> &#946; = (p + 1  -  1)/(p + 1)</p><p>=&gt; sin<sup>2</sup> &#946; = p/(p + 1)</p><p>=&gt; sin &#946; = &radic;p/&radic;(p + 1)</p><p>Hence, tan &#946; = sin &#946;/cos &#946; = &radic;p/&radic;(p + 1) * &radic;(p + 1) = &radic;p</p>",
    "question_index": 7
  },

    "question": "<span class=\"eqt\"><p>Find the remainder when the L.C.M of 15, 24, 36, and 30 is divided by 28.</p></span><span class=\"hqt\" style=\"display:none\"><p>15, 24, 36 &#2324;&#2352; 30 &#2325;&#2375; &#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2351; &#2325;&#2379; 28 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",

    "question": "<span class=\"eqt\"><p>The slopes of two straight lines are 2 and &#8730;3. Find the angle between the two lines.</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2360;&#2368;&#2343;&#2368; &#2352;&#2375;&#2326;&#2366;&#2323;&#2306; &#2325;&#2368; &#2338;&#2354;&#2366;&#2344;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 2 &#2324;&#2352; &radic;3 &#2361;&#2376;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2352;&#2375;&#2326;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2325;&#2379;&#2339; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">45&deg;</span><span class=\"hqt\" style=\"display:none\">45&deg;</span>",
      "<span class=\"eqt\">30&deg;</span><span class=\"hqt\" style=\"display:none\">30&deg;</span>",
      "<span class=\"eqt\">90&deg;</span><span class=\"hqt\" style=\"display:none\">90&deg;</span>",
      "<span class=\"eqt\">60&deg;</span><span class=\"hqt\" style=\"display:none\">60&deg;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The slopes be m&#8321; = 2 and m&#8322; = &#8730;3</p><p>The formula for the angle &#952; between two lines is: tan &#952; = |(m&#8321; &#8722; m&#8322;) / (1 + m&#8321;m&#8322;)|</p><p>Substitute the values:</p><p>tan &#952; = |(2 &#8722; &#8730;3) / (1 + 2&#8730;3)|</p><p>Rationalizing and simplifying:</p><p>tan &#952; = 1 / &#8730;3</p><p>Therefore, &#952; = 30</p>",

    "question": "<span class=\"eqt\"><p>A mixture of milk and water measures 60 liters. It contains 10% water. How much water should be added to it, so that the water may be 25%?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2375; &#2319;&#2325; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2366; &#2350;&#2366;&#2346; 60 &#2354;&#2368;&#2335;&#2352; &#2361;&#2376;&#2404; &#2311;&#2360;&#2350;&#2375;&#2306; 10% &#2346;&#2366;&#2344;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360;&#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2366;&#2344;&#2368; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2319; &#2325;&#2367; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; 25% &#2361;&#2379; &#2332;&#2366;&#2319;?</p></span>",

    "solution": "<p>Ratio of amount of money of Harish and Nupur = 3: 2</p><p>Let Sima, Harish, Nupur, and Kesha have Rs. (3600 + 3x), Rs. 3x, Rs. 2x, and Rs. (4000 + 3x) respectively</p><p>So, 3600 + 3x + 3x + 2x + 4000 + 3x = 16400</p><p>=&gt; 11x = 16400 - 7600</p><p>=&gt; x = 8800/11</p><p>=&gt; x = 800</p><p>The amount of money Kesha and Nupur together have = (4000 + 3 * 800) + 2 * 800 = Rs. 8000</p><p>The amount of money Sima and Harish together have = (3600 + 3 * 800) + 3 * 800 = Rs. 8400</p><p>So, required difference = 8400  -  8000 = Rs. 400</p>",

;&#2404; &#2351;&#2342;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; 142000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2341;&#2366;, &#2340;&#2379; &#2325;&#2348;&#2368;&#2352; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2341;&#2366;?</span>",

    "question": "<span class=\"eqt\"><p>7 men and 5 women together can finish a work in 12 days while 4 men and 8 women together can finish it in 15 days. If time taken by 6 men together to do the work is equal to that taken by 'x' women together to do it, then what is the value of 'x'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; 7 &#2346;&#2369;&#2352;&#2369;&#2359; &#2324;&#2352; 5 &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2305; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 12 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306; &#2332;&#2348;&#2325;&#2367; &#2319;&#2325; &#2360;&#2366;&#2341; 4 &#2346;&#2369;&#2352;&#2369;&#2359; 8 &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2305; &#2311;&#2360;&#2375; 15 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2366;&#2341; 6 &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351;, &#2319;&#2325; &#2360;&#2366;&#2341; 'x' &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2351; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;, &#2340;&#2379; 'x' &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>A card is drawn at random from a well-shuffled deck of 52 playing cards. If it is known that the card drawn is a red card, what is the probability that the card is a heart?</p></span><span class=\"hqt\" style=\"display:none\">52 &#2340;&#2366;&#2358; &#2325;&#2375; &#2346;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2309;&#2330;&#2381;&#2331;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2347;&#2375;&#2352;&#2348;&#2342;&#2354; &#2325;&#2367;&#2319; &#2327;&#2319; &#2337;&#2375;&#2325; &#2360;&#2375; &#2319;&#2325; &#2346;&#2340;&#2381;&#2340;&#2366; &#2351;&#2366;&#2342;&#2371;&#2330;&#2381;&#2331;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2325;&#2366;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2351;&#2361; &#2332;&#2381;&#2334;&#2366;&#2340; &#2361;&#2379; &#2325;&#2367; &#2344;&#2367;&#2325;&#2366;&#2354;&#2366; &#2327;&#2351;&#2366; &#2346;&#2340;&#2381;&#2340;&#2366; &#2354;&#2366;&#2354; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360; &#2348;&#2366;&#2340; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; &#2346;&#2340;&#2381;&#2340;&#2366; &#2361;&#2366;&#2352;&#2381;&#2335; (&#2342;&#2367;&#2354;) &#2325;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">1/3</span><span class=\"hqt\" style=\"display:none\">1/3</span>",
      "<span class=\"eqt\">2/3</span><span class=\"hqt\" style=\"display:none\">2/3</span>",
      "<span class=\"eqt\">1/4</span><span class=\"hqt\" style=\"display:none\">1/4</span>",
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Total cards in a deck = 52</p><p>Total red cards = 26 (Red cards are hearts and diamonds)</p><p>Number of hearts = 13</p><p>Let A = card drawn is a heart, B = card drawn is a red card</p><p>We are given that the card is red, so we find: P(A | B)</p><p>Using the formula of conditional probability: P(A | B) = P(A &#8745; B) / P(B)</p><p>Since every heart is a red card,</p><p>A &#8745; B = number of hearts = 13</p><p>P(B) = number of red cards / total cards = 26 / 52</p><p>P(A &#8745; B) = number of hearts / total cards = 13 / 52</p><p>Now,</p><p>P(A | B) = (13 / 52)  (26 / 52) = 13 / 26 = 1 / 2</p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>In the following question, the symbols @, #, $, &copy; and % are used with the following meaning as illustrated below:</p><p>P @ Q =&gt; P &ge; Q</p><p>P # Q =&gt; P &le; Q</p><p>P $ Q =&gt; P &lt; Q</p><p>P &copy; Q =&gt; P &gt; Q</p><p>P % Q =&gt; P = Q</p><p>Assuming the given statements to be true, find which of the conclusion(s) is/are definitely true.</p><p>Statements:</p><p>S % T</p><p>T $ U</p><p>U @ V</p><p>Conclusions:</p><p>I. S $ U</p><p>II. V &copy; S</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, @, #, $, &copy; &#2324;&#2352; % &#2346;&#2381;&#2352;&#2340;&#2368;&#2325;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2352;&#2381;&#2341;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;:</p><p>P @ Q = > P &ge; Q</p><p>P # Q = > P &le; Q</p><p>P $ Q = > P &lt; Q</p><p>P &copy; Q = > P &gt; Q</p><p>P % Q = > P = Q</p><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>S % T</p><p>T $ U</p><p>U @ V</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>I. S $ U</p><p>II. V &copy; S</p></span>",
    "options": [
      "<span class=\"eqt\">Only conclusion I follows</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2306; &#2325;&#2375;&#2357;&#2354; &#2311;&#2360;&#2368; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2346;&#2352; &#2346;&#2361;&#2369;&#2306;&#2330;&#2366; &#2361;&#2370;&#2305;&#2404;</span>",
      "<span class=\"eqt\">Both conclusions I and II follow</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2368; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Either conclusion I or II follows</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2351;&#2366; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2319;&#2325; &#2360;&#2361;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Only conclusion II follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2361;&#2368; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>From S % T, we get S = T.</p><p>From T $ U, we get T &lt; U.</p><p>So S = T &lt; U, which gives S &lt; U.</p><p>From U @ V means U &ge; V.</p><p>So the chain is S = T &lt; U &ge; V.</p><p>Check conclusion I: S $ U means S &lt; U.</p><p>We have already derived S &lt; U directly from S = T and T &lt; U.</p><p>So conclusion I definitely follows.</p><p>Check conclusion II: V &copy; S means V &gt; S.</p><p>We know U &ge; V and S &lt; U, but V could be less than S, equal to S, or greater than S depending on the values chosen (for example, V could be much smaller than S while still &le; U).</p><p>Therefore, V &gt; S is not guaranteed.</p><p>Hence, only conclusion I follows.</p>",

  },

    "solution": "<p>Modal verbs are followed by the base form of the verb, whereas 'heard' is the past simple and past participle form of the base verb 'hear'.</p><p>So, 'heard' should be replaced with 'hear'.</p><p>Hence, option (c) is the correct answer.</p><p><b>Note:-</b></p><p><b>Modal verb: </b>A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",

    "comp": "<p><b>Directions :</b> Read the following passage and answer the questions based on the passage:</p><p>In an era dominated by instant notifications, one-click purchases, and on-demand entertainment, the psychology of delayed gratification has become both more challenging and more significant. Delayed gratification refers to the ability to resist immediate pleasure in favour of a larger or more meaningful reward in the future. Classic psychological experiments, such as the marshmallow test, highlighted how this capacity is linked to self-control, long-term planning, and emotional regulation. However, the contemporary digital environment increasingly tests this ability by constantly offering quick and effortless rewards. The age of instant rewards conditions the human brain to seek rapid dopamine stimulation. Social media likes, short-form videos, and instant feedback loops reinforce impulsive behaviour, reducing tolerance for waiting or sustained effort. As a result, individuals may struggle with persistence, deep focus, and long-term goal commitment. This shift has implications for education, work culture, and personal relationships, where meaningful outcomes often require patience and sustained investment. Yet, delayed gratification has not lost its relevance; rather, it has become a crucial psychological skill. Research suggests that individuals who can postpone immediate pleasure tend to exhibit better academic performance, financial discipline, and emotional resilience. In a fast-paced environment, practising delayed gratification involves consciously setting boundaries - limiting digital distractions, breaking long-term goals into manageable steps, and redefining success beyond instant validation. Importantly, the concept must be understood with nuance. The modern world does not eliminate the value of instant rewards; instead, it demands a balance between immediacy and restraint. Instant rewards can motivate and provide feedback, but overreliance o     "solution": "<p><b>Statements 1 and 2 are correct.</b></p><p><b>Statement 3 is incorrect because Karst topography requires water for the chemical weathering process.</b>.</p><p><b>Explanation of Statements:</b></p><p><b>1) is Correct.</b> Karst landforms are produced by the chemical action (carbonation) of water on soluble rocks, primarily limestone and dolomite.</p><p><b>2) is Correct.</b> Typical features include sinkholes, dolines, lapies, and intricate underground cave systems with stalactites and stalagmites.</p><p><b>3) is Incorrect.</b> Karst processes depend on groundwater and precipitation. Arid desert regions lack the necessary water to create significant Karst features.</p><p><b>Further Insights:</b></p><p>In India, Karst features can be observed in the Gupteswar caves (Odisha), Borra caves (Andhra Pradesh), and parts of the Himalayas.</p>",
    "question_index": 107
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about Indian Railways-zones and headquarters:</p><p>1) South Western Railway has its headquarters at Hubballi (Karnataka).</p><p>2) North Central Railway has its headquarters at Prayagraj (Allahabad).</p><p>3) South East Central Railway has its headquarters at Bilaspur (Chhattisgarh).</p><p>Which of the above is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2375;&#2354;&#2357;&#2375; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2324;&#2352; &#2350;&#2369;&#2326;&#2381;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2352;&#2375;&#2354;&#2357;&#2375; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351;&#2366;&#2354;&#2351; &#2361;&#2369;&#2348;&#2354;&#2368; (&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;) &#2350;&#2375;&#2306; &#2361;&#2376;&#2404;</p><p>2) &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2343;&#2381;&#2351; &#2352;&#2375;&#2354;&#2357;&#2375; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351;&#2366;&#2354;&#2351; &#2346;&#2381;&#2352;&#2351;&#2366;&#2327;&#2352;&#2366;&#2332; (&#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342;) &#2350;&#2375;&#2306; &#2361;&#2376;&#2404;</p><p>3) &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2343;&#2381;&#2351; &#2352;&#2375;&#2354;&#2357;&#2375; &#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351;&#2366;&#2354;&#2351; &#2348;&#2367;&#2354;&#2366;&#2360;&#2346;&#2369;&#2352; (&#2331;&#2340;&#2381;&#2340;&#2368;&#2360;&#2327;&#2338;&#2364;) &#2350;&#2375;&#2306; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All three statements are factually correct regarding zonal HQ locations.</p><p>Further Insights:</p><p>- Northern Railway HQ: New Delhi; Western Railway HQ: Mumbai (Churchgate).</p><p>- South Central Railway HQ: Secunderabad; East Central Railway HQ: Hajipur.</p><p>- West Central Railway HQ: Jabalpur; East Coast Railway HQ: Bhubaneswar.</p><p>- Kolkata Metro functions as a separate zone under Indian Railways.</p><p></p>",
    "question_index": 108
  },

    "question": "<span class=\"eqt\"><p>Which of the following gases is used in the manufacture of urea?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2327;&#2376;&#2360; &#2351;&#2370;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2350;&#2375;&#2306; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Oxygen</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Nitrogen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Hydrogen</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2312;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Carbon dioxide is one of the key gases used in the production of urea.</b></p><p><b>Explanation:</b></p><p>Urea (NH<sub>2</sub>CONH<sub>2</sub>) is produced commercially by the reaction of <b>Ammonia(</b><b>NH<sub>3</sub>) </b>and <b>Carbon dioxide (</b><b>CO<sub>2</sub></b><b>)</b> under high pressure and temperature. The process is known as the Bosch-Meiser urea process.</p><p><b>Further Insights:</b></p><p>Urea is the most important nitrogenous fertilizer used globally because of its high nitrogen content.</p>",
    "question_index": 109
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the book 'Gita Rahasya':</p><p>Statement I: Gita Rahasya was written by Bal Gangadhar Tilak.</p><p>Statement II: The book interprets the Bhagavad Gita as a philosophy of renunciation rather than action.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2368;&#2340;&#2366; &#2352;&#2361;&#2360;&#2381;&#2351; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>&#2325;&#2341;&#2344; 1: &#2327;&#2368;&#2340;&#2366; &#2352;&#2361;&#2360;&#2381;&#2351; &#2348;&#2366;&#2354; &#2327;&#2306;&#2327;&#2366;&#2343;&#2352; &#2340;&#2367;&#2354;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2326;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2351;&#2361; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2349;&#2327;&#2357;&#2342;&#2381; &#2327;&#2368;&#2340;&#2366; &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2352;&#2381;&#2350; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2340;&#2381;&#2351;&#2366;&#2327; &#2325;&#2375; &#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statement I is correct.</b></p><p><b>Statement II is incorrect because the book emphasizes \"Karma Yoga\" (Action) over renunciation.</b></p><p><b>Explanation of Statements:</b></p><p><b>I. is Correct.</b> Bal Gangadhar Tilak wrote <i>Srimad Bhagavad Gita Rahasya</i> while he was imprisoned in Mandalay, Burma.</p><p><b>II. is Incorrect.</b> Tilak's central thesis was that the Gita does not preach renunciation (<i>Sanyasa</i>) as the ultimate path, but rather selfless action (<i>Karma Yoga</i>) in the service of humanity and the nation.</p><p><b>Further Insights:</b></p><p>Tilak used the Gita to provide a spiritual and moral foundation for the Indian freedom struggle.</p>",
    "question_index": 110
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding capital expenditure:</p><p>1. It leads to the creation of durable assets.</p><p>2. It has a direct impact on fiscal deficit.</p><p>3. It includes interest payments on government debt.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2311;&#2360;&#2360;&#2375; &#2335;&#2367;&#2325;&#2366;&#2314; &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2311;&#2360;&#2325;&#2366; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2375; &#2346;&#2352; &#2360;&#2368;&#2343;&#2366; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2346;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>3. &#2311;&#2360;&#2350;&#2375;&#2306; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2315;&#2339; &#2346;&#2352; &#2348;&#2381;&#2351;&#2366;&#2332; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Statements 1 and 2 are correct.</b></p><p><b>Statement 3 is incorrect because interest payments are categorized as revenue expenditure.</b></p><p><b>Explanation of Statements:</b></p><p><b>1) is Correct.</b> Capital expenditure (CapEx) involves spending on the creation of physical assets like roads, bridges, and machinery, or the acquisition of land.</p><p><b>2) is Correct.</b> Since CapEx is a part of total expenditure, it directly impacts the fiscal deficit (the gap between total expenditure and non-debt receipts).</p><p><b>3) is Incorrect.</b> Interest payments do not create assets or reduce liabilities; they are recurring \"maintenance\" costs of debt and are thus classified as <b>Revenue Expenditure</b>.</p><p><b>Further Insights:</b></p><p>High CapEx is generally viewed positively for long-term growth because of its high \"multiplier effect\" on the economy.</p>",
    "question_index": 111
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following Articles with their provisions:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List I (Article)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>List II (Provision)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Article 148</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Comptroller and Auditor General</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Article 76</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Attorney General of India</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Article 112</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Annual Financial Statement</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Article 324</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Election Commission</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2305;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; I (&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342;)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2370;&#2330;&#2368; II (&#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344;)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 148</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2325; &#2319;&#2357;&#2306; &#2350;&#2361;&#2366;&#2354;&#2375;&#2326;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2325;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 76</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2309;&#2335;&#2377;&#2352;&#2381;&#2344;&#2368; &#2332;&#2344;&#2352;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 112</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2357;&#2367;&#2357;&#2352;&#2339;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 324</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2330;&#2369;&#2344;&#2366;&#2357; &#2310;&#2351;&#2379;&#2327;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">1-a, 2-b, 3-c, 4-d</span><span class=\"hqt\" style=\"display:none\">1-a, 2-b, 3-c, 4-d</span>",
      "<span class=\"eqt\">1-b, 2-a, 3-d, 4-c</span><span class=\"hqt\" style=\"display:none\">1-b, 2-a, 3-d, 4-c</span>",
      "<span class=\"eqt\">1-c, 2-d, 3-a, 4-b</span><span class=\"hqt\" style=\"display:none\">1-c, 2-d, 3-a, 4-b</span>",
      "<span class=\"eqt\">1-d, 2-c, 3-b, 4-a</span><span class=\"hqt\" style=\"display:none\">1-d, 2-c, 3-b, 4-a</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>1-a (Article 148):</b> Provides for the Comptroller and Auditor General (CAG) of India, who acts as the guardian of the public purse.</p><p><b>2-b (Article 76):</b> Provides for the Attorney General for India, the highest law officer in the country.</p><p><b>3-c (Article 112):</b> Refers to the \"Annual Financial Statement,\" commonly known as the Union Budget.</p><p><b>4-d (Article 324):</b> Vests the superintendence, direction, and control of elections in the Election Commission.</p><p><b>Further Insights:</b></p><p>Articles 76 and 148 are critical for ensuring executive accountability to the law and the legislature, respectively.</p>",
    "question_index": 112
  },
  {
    "question": "<span class=\"eqt\"><p>'Niveshak Didi' refers to which of the following initiatives?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2344;&#2367;&#2357;&#2375;&#2358;&#2325; &#2342;&#2368;&#2342;&#2368;' &#2360;&#2375; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2361;&#2354; &#2360;&#2375; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A digital investment platform launched by SEBI for retail investors</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2369;&#2342;&#2352;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2360;&#2312;&#2348;&#2368;&#2310;&#2312; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2319;&#2325; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2344;&#2367;&#2357;&#2375;&#2358; &#2350;&#2306;&#2330;</span>",
      "<span class=\"eqt\">A scheme to provide venture capital funding to women entrepreneurs</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2367;&#2354;&#2366; &#2313;&#2342;&#2381;&#2351;&#2350;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2313;&#2342;&#2381;&#2351;&#2350; &#2346;&#2370;&#2306;&#2332;&#2368; &#2357;&#2367;&#2340;&#2381;&#2340;&#2346;&#2379;&#2359;&#2339; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2319;&#2325; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">A savings-linked insurance scheme for rural women launched by LIC</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2354;&#2310;&#2312;&#2360;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2348;&#2330;&#2340;-&#2354;&#2367;&#2306;&#2325;&#2381;&#2337; &#2348;&#2368;&#2350;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">A financial literacy initiative that trains women postal workers to educate communities on responsible investing</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2366;&#2325;&#2381;&#2359;&#2352;&#2340;&#2366; &#2346;&#2361;&#2354; &#2332;&#2367;&#2360;&#2325;&#2375; &#2340;&#2361;&#2340; &#2350;&#2361;&#2367;&#2354;&#2366; &#2337;&#2366;&#2325; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2360;&#2350;&#2369;&#2342;&#2366;&#2351;&#2379;&#2306; &#2325;&#2379; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2358;&#2367;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2358;&#2367;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Investor Education and Protection Fund Authority (IEPFA), under the aegis of the Ministry of Corporate Affairs, and India Post Payments Bank (IPPB), operating under the Department of Posts, have signed a Memorandum of Agreement (MoA) to jointly launch Phase 2 of the 'Niveshak Didi' initiative.</p><p>This strategic collaboration aims to scale financial literacy among women in rural, semi-urban, and underserved areas through grassroots mobilization and community-driven education.</p><p>'Niveshak Didi' is a unique initiative that trains women postal workers and community leaders to act as financial educators within their local regions. During Phase 1, more than 55,000 beneficiaries participated in IPPB Financial Literacy Camps across India, with approx. 60% female beneficiaries mostly in the youth & economically active age group. Every 2 out of 3 such beneficiaries belonged to deep rural locations ensuring maximum penetration at the grassroots levels. Building on the success of Phase 1, this new phase will see the deployment of over 4,000 financial literacy camps across India. These camps will be led by almost 40,000 women postal workers trained as Niveshak Didis, who will conduct sessions on responsible investing, fraud awareness, savings habits, and digital banking tools.</p><p>About Investor Education And Protection Fund Authority The Investor Education and Protection Fund Authority (IEPFA) is a statutory body functioning under the Ministry of Corporate Affairs, Government of India. It was established with a key objective to ensure that investors across the country are both informed and protected. In today's dynamic financial landscape, where products and services are constantly evolving, the role of IEPFA becomes even more significant. About India Post Payments Bank India Post Payments Bank (IPPB) has been established under the Department of Posts, Ministry of Communication with 100% equity owned by the Government of India. IPPB was launched on September 1, 2018.</p><p>The bank has been set up with the vision to build the most accessible, affordable and trusted bank for the common man in India. The fundamental mandate of India Post Payments Bank is to remove barriers for the unbanked & underbanked and reach the last mile leveraging the Postal network comprising ~1,65,000 Post Offices (~140,000 in rural areas) and ~3,00,000 Postal employees.</p>",
    "question_index": 113
  },

    "correct_option_id": 3,
    "solution": "<p>Indian Junior Men's Hockey Team scripted history, securing their first ever bronze medal at the FIH Hockey Men's Junior World Cup Tamil Nadu 2025 in Chennai.</p><p>The hosts recorded a sensational 4-2 comeback win against Argentina, scoring four goals in eleven minutes to secure third place in the tournament. With four goals in eleven minutes, India completed a sensational comeback to secure the bronze medal at the FIH Hockey Men's Junior World Cup Tamil Nadu 2025. Following this historic win, Hockey India announced INR 5 lakh each to players and INR 2.5 lakh to the support staff.</p>",

    "question": "<span class=\"eqt\"><p>According to Census 2011, the sex ratio in the economically active age group (15-59 years) was ______________.</p></span><span class=\"hqt\" style=\"display:none\">2011 &#2325;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2310;&#2351;&#2369; &#2357;&#2352;&#2381;&#2327; (15-59 &#2357;&#2352;&#2381;&#2359;) &#2350;&#2375;&#2306; &#2354;&#2367;&#2306;&#2327; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; ______________ &#2341;&#2366;&#2404;</span>",

      "<span class=\"eqt\">929</span><span class=\"hqt\" style=\"display:none\">929</span>"

    "correct_option_id": 1,
    "solution": "<p>In 2011, the sex ratio (number of females per 1000 males) at all India level was 943 and the same for rural and urban areas are 949 and 929 respectively.</p><p>The sex ratio for 0-19 age group was 908 while that of 60+ age group was 1033. The <b>sex ratio in the economically active age group (15-59 years) was 944.</b></p><p>The sex ratio was highest in Kerala (1084) followed by Puducherry (1037) and lowest in Daman &amp; Diu (618) followed by Dadar &amp; Nagar Haveli (774) and then Chandigarh (818).</p><p>Over the last 60 years (Post Independence) considerable improvement in sex ratio was observed in Andaman &amp; Nicobar Islands (40.16%), Delhi (13.02%), Assam (10.34%) and West Bengal (9.82%). However, the situation has worsened in the major States of Bihar (-8.21%) and Odisha (-4.23).</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Special Powers of the Rajya Sabha under Article 249:</p><p>1)A resolution under Article 249 allows Parliament to legislate on a State List subject.</p><p>2)Such a resolution must be supported by not less than two-thirds of the members present and voting.</p><p>3)A law made under Article 249 remains in force permanently unless repealed.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 249 &#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 249 &#2325;&#2375; &#2340;&#2361;&#2340; &#2346;&#2366;&#2352;&#2367;&#2340; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2360;&#2306;&#2360;&#2342; &#2325;&#2379; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2370;&#2330;&#2368; &#2325;&#2375; &#2357;&#2367;&#2359;&#2351; &#2346;&#2352; &#2325;&#2366;&#2344;&#2370;&#2344; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2320;&#2360;&#2375; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2325;&#2379; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2324;&#2352; &#2350;&#2340;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2342;&#2379;-&#2340;&#2367;&#2361;&#2366;&#2312; &#2348;&#2361;&#2369;&#2350;&#2340; &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p>3) &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 249 &#2325;&#2375; &#2340;&#2361;&#2340; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2344;&#2370;&#2344; &#2344;&#2367;&#2352;&#2360;&#2381;&#2340; &#2344; &#2361;&#2379;&#2344;&#2375; &#2340;&#2325; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2354;&#2366;&#2327;&#2370; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements 1 and 2 are correct.</b></p><p><b>Statement 3 is incorrect because a resolution under Article 249 is temporary and remains in force for a period not exceeding one year.</b></p><p><b>Explanation of Statements:</b></p><p><b>1) is Correct.</b> Article 249 empowers the Rajya Sabha to declare that it is necessary or expedient in the national interest for Parliament to make laws with respect to any matter enumerated in the State List.</p><p><b>2) is Correct.</b> For such a resolution to be valid, it must be passed by the Rajya Sabha with a majority of not less than two-thirds of the members present and voting.</p><p><b>3) is Incorrect.</b> A resolution passed under Article 249 remains in force for one year at a time. It can be extended for another year by passing a fresh resolution, but the laws made under it cease to have effect six months after the resolution expires.</p><p><b>Further Insights:</b></p><p>This is one of the \"exclusive powers\" of the Rajya Sabha, highlighting its role as a representative of the States.</p>",
    "question_index": 116
  },

    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option.</p><p><b>Assertion (A): </b>The Second Five Year Plan laid greater emphasis on the development of heavy industries in India.</p><p><b>Reason (R): </b>The strategy was influenced by the Mahalanobis model, which prioritised capital goods industries to achieve long-term growth.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2325;&#2341;&#2344; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p><b>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A):</b>&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2368; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2325;&#2375; &#2357;&#2367;&#2325;&#2366;&#2360; &#2346;&#2352; &#2309;&#2343;&#2367;&#2325; &#2332;&#2379;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p><b>&#2325;&#2366;&#2352;&#2339; (R):</b>&#2351;&#2361; &#2352;&#2339;&#2344;&#2368;&#2340;&#2367; &#2350;&#2361;&#2366;&#2354;&#2344;&#2379;&#2348;&#2367;&#2360; &#2350;&#2377;&#2337;&#2354; &#2360;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2341;&#2368;, &#2332;&#2367;&#2360;&#2344;&#2375; &#2342;&#2368;&#2352;&#2381;&#2328;&#2325;&#2366;&#2354;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2357;&#2360;&#2381;&#2340;&#2369; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366; &#2342;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is false but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>"

    "solution": "<p><b>Assertion (A) is Correct.</b> The Second Plan (1956 - 1961) shifted focus from agriculture to \"rapid industrialization with particular emphasis on the development of basic and heavy industries.\"</p><p><b>Reason (R) is Correct.</b> P.C. Mahalanobis developed the model which argued that to achieve long-term growth, the economy must build its own capacity to produce capital goods (machines that make machines).</p><p><b>Further Insights:</b></p><p>This period saw the setting up of major steel plants in Bhilai, Durgapur, and Rourkela with foreign collaboration.</p>",

    "correct_option_id": 1,
    "solution": "<p>The Roaring Forties are the strong westerly winds found in the Southern Hemisphere. Therefore, the correct option is <b>Westerlies in the Southern Hemisphere</b>.</p><p>The \"Roaring Forties\" occur between latitudes 40<sup>&#8728;</sup> and 50<sup>&#8728;</sup> South. In the Southern Hemisphere, there is very little landmass to break the wind's speed, causing the Westerlies to become extremely powerful and loud (hence \"Roaring\").</p><p><b>Further Insights:</b></p><p>Further south, these winds are known as the \"Furious Fifties\" and \"Shrieking Sixties.\"</p>",

    "solution": "<p><b>Jawaharlal Nehru presided over the historic Lahore Session.</b></p><p><b>Explanation:</b></p><p>The Lahore Session of 1929 is monumental because the Indian National Congress passed the \"Purna Swaraj\" (Complete Independence) resolution. It was here that the Tricolour was hoisted on the banks of the Ravi River.</p><p><b>Further Insights:</b></p><p>Following this session, January 26, 1930, was celebrated as the first Independence Day across India.</p>",
