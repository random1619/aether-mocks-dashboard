    ],
    "correct_option_id": 1,
    "solution": "<p><b>DNS is the service that translates human-readable names into machine-readable IP addresses.</b></p><p><b>Explanation:</b></p><p><b>DNS (Domain Name System):</b> Computers communicate using IP addresses (like 192.0.2.1). Since humans cannot remember these easily, DNS acts as a \"phonebook\" that maps names like google.com to the correct IP.</p><p><b>DHCP:</b> Automatically assigns IP addresses to devices on a local network.</p><p><b>FTP:</b> Used for file transfers.</p><p><b>Further Insights:</b></p><p>When you type a URL, your computer first queries a DNS Resolver to find out where the website is hosted.</p>",
    "question_index": 142
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Control Unit (CU) of CPU:</p><p>1) The Control Unit directs the sequence of operations in the CPU.</p><p>2) The Control Unit performs arithmetic operations on data.</p><p>3) The Control Unit generates control signals for other components.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2325;&#2368; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2311;&#2325;&#2366;&#2312; (&#2360;&#2368;&#2351;&#2370;) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2311;&#2325;&#2366;&#2312; &#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2350;&#2375;&#2306; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2375; &#2325;&#2381;&#2352;&#2350; &#2325;&#2379; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2) &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2311;&#2325;&#2366;&#2312; &#2337;&#2375;&#2335;&#2366; &#2346;&#2352; &#2309;&#2306;&#2325;&#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2306; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>3) &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2311;&#2325;&#2366;&#2312; &#2309;&#2344;&#2381;&#2351; &#2328;&#2335;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2339; &#2360;&#2306;&#2325;&#2375;&#2340; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements 1 and 3 are correct.</b></p><p><b>Statement 2 is incorrect because arithmetic operations are performed by the Arithmetic Logic Unit (ALU), not the Control Unit.</b></p><p><b>Explanation of Statements:</b></p><p><b>1) is Correct.</b> The Control Unit acts as the \"manager\" of the CPU. It fetches instructions from memory, decodes them, and directs the flow of data between the CPU and other devices.</p><p><b>2) is Incorrect.</b> The CU does not process data or perform calculations. All mathematical (addition, subtraction) and logical (AND, OR) operations are the sole responsibility of the <b>ALU</b>.</p><p><b>3) is Correct.</b> To synchronize the various parts of the computer, the CU sends electrical \"control signals\" to the ALU, memory, and input/output devices, telling them what to do and when.</p><p><b>Further Insights:</b></p><p>The CU uses a \"Program Counter\" to keep track of the address of the next instruction to be executed.</p><p>Together, the CU and ALU form the core of the Central Processing Unit.</p>",
    "question_index": 143
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding search operators:</p><p>1) The filetype: operator restricts results to a specific file format.</p><p>2) The site: operator searches within a particular website.</p><p>Which of the above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2326;&#2379;&#2332; &#2321;&#2346;&#2352;&#2375;&#2335;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2347;&#2364;&#2366;&#2311;&#2354;&#2335;&#2366;&#2311;&#2346;: &#2321;&#2346;&#2352;&#2375;&#2335;&#2352; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2347;&#2364;&#2366;&#2311;&#2354; &#2346;&#2381;&#2352;&#2366;&#2352;&#2370;&#2346; &#2340;&#2325; &#2360;&#2368;&#2350;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2360;&#2366;&#2311;&#2335;: &#2321;&#2346;&#2352;&#2375;&#2335;&#2352; &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359; &#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2326;&#2379;&#2332; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both are correct</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Neither are correct</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2368; &#2360;&#2361;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>1) is Correct.</b> The filetype: operator (e.g., filetype:pdf) tells the search engine to only show results that are in that specific format.</p><p><b>2) is Correct.</b> The site: operator (e.g., site:gov.in) restricts the search to a specific domain or website, excluding all other results from the web.</p><p><b>Further Insights:</b></p><p>Combining these (e.g., budget site:nic.in filetype:pdf) is a powerful way to find specific official documents.</p>",
    "question_index": 144
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about switches:</p><p>1) Switches operate at Data Link layer.</p><p>2) Switches forward data using MAC addresses.</p><p>3) Switches broadcast data to all ports by default.</p><p>Correct statements are:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2357;&#2367;&#2330; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2360;&#2381;&#2357;&#2367;&#2330; &#2337;&#2375;&#2335;&#2366; &#2354;&#2367;&#2306;&#2325; &#2354;&#2375;&#2351;&#2352; &#2346;&#2352; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2360;&#2381;&#2357;&#2367;&#2330; MAC &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2337;&#2375;&#2335;&#2366; &#2347;&#2377;&#2352;&#2357;&#2352;&#2381;&#2337; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2360;&#2381;&#2357;&#2367;&#2330; &#2337;&#2367;&#2347;&#2364;&#2377;&#2354;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2349;&#2368; &#2346;&#2379;&#2352;&#2381;&#2335; &#2346;&#2352; &#2337;&#2375;&#2335;&#2366; &#2348;&#2381;&#2352;&#2377;&#2337;&#2325;&#2366;&#2360;&#2381;&#2335; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements 1 and 2 are correct.</b></p><p><b>Statement 3 is incorrect because switches use unicast transmission, sending data only to the specific intended port.</b></p><p><b>Explanation of Statements:</b></p><p><b>1) is Correct.</b> Switches operate at the Data Link Layer (Layer 2) of the OSI model.</p><p><b>2) is Correct.</b> A switch maintains a \"MAC Address Table.\" When a data packet arrives, the switch looks at the destination MAC address and sends it only to the physical port where that device is connected.</p><p><b>3) is Incorrect.</b> Hubs broadcast data to all ports. Switches are \"smarter\" and avoid broadcasting (except for unknown addresses or ARP requests) to reduce network congestion.</p><p><b>Further Insights:</b></p><p>By sending data only where it is needed, switches provide dedicated bandwidth to each connection and prevent data collisions.</p>",
    "question_index": 145
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about ROM:</p><p>1) ROM is non-volatile memory.</p><p>2) ROM contents can be modified easily by users.</p><p>3) Firmware is stored in ROM.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>ROM &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) ROM &#2319;&#2325; &#2327;&#2376;&#2352;-&#2357;&#2366;&#2359;&#2381;&#2346;&#2358;&#2368;&#2354; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2361;&#2376;&#2404;</p><p>2) ROM &#2325;&#2368; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2325;&#2379; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366; &#2310;&#2360;&#2366;&#2344;&#2368; &#2360;&#2375; &#2360;&#2306;&#2358;&#2379;&#2343;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>3) &#2347;&#2352;&#2381;&#2350;&#2357;&#2375;&#2351;&#2352; ROM &#2350;&#2375;&#2306; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">2 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Statements 1 and 3 are correct.</b></p><p><b>Statement 2 is incorrect because ROM is \"Read-Only,\" and its contents cannot be easily modified by standard users.</b></p><p><b>Explanation of Statements:</b></p><p><b>1) is Correct.</b> ROM (Read-Only Memory) is non-volatile, meaning it retains its data even when the power is turned off.</p><p><b>2) is Incorrect.</b> Unlike RAM, standard ROM cannot be changed by simple user operations. Specialized types like EPROM or Flash memory require specific procedures (like high voltage or software flashing) to update.</p><p><b>3) is Correct.</b> Firmware (like the BIOS or UEFI) is stored in ROM to ensure the computer knows how to start up (boot) every time it is switched on.</p><p><b>Further Insights:</b></p><p>The \"Bootstrap Loader\" is the specific piece of firmware in ROM that initiates the loading of the Operating System.</p>",
    "question_index": 146
  },
  {
    "question": "<span class=\"eqt\"><p>Which input device is most suitable for capturing continuous hand-drawn movements digitally?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2366;&#2341; &#2360;&#2375; &#2326;&#2368;&#2306;&#2330;&#2368; &#2327;&#2312; &#2344;&#2367;&#2352;&#2306;&#2340;&#2352; &#2327;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2376;&#2346;&#2381;&#2330;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2360;&#2366; &#2311;&#2344;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2360;&#2348;&#2360;&#2375; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Light Pen</span><span class=\"hqt\" style=\"display:none\">Light Pen</span>",
      "<span class=\"eqt\">Digitizer</span><span class=\"hqt\" style=\"display:none\">Digitizer</span>",
      "<span class=\"eqt\">Joystick</span><span class=\"hqt\" style=\"display:none\">Joystick</span>",
      "<span class=\"eqt\">Trackball</span><span class=\"hqt\" style=\"display:none\">Trackball</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>The Digitizer is the most suitable device for precise, continuous digital drawing.</b></p><p><b>Explanation:</b></p><p>A <b>Digitizer</b> (or Graphics Tablet) uses a pressure-sensitive surface and a stylus to capture fine movements. It converts the analog movement of a hand into digital signals with high precision, making it the standard for artists and engineers.</p><p>Light pens are older tech for direct screen interaction; Joysticks and Trackballs are primarily for navigation/gaming and lack the precision for \"drawing.\"</p><p><b>Further Insights:</b></p><p>Digitizers are essential in CAD (Computer-Aided Design) for creating blueprints and in digital illustration for pressure-sensitive brush strokes.</p>",
    "question_index": 147
  },
  {
    "question": "<span class=\"eqt\"><p>Which shortcut is used to rename a selected file in Windows?</p></span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2306;&#2337;&#2379;&#2332; &#2350;&#2375;&#2306; &#2330;&#2351;&#2344;&#2367;&#2340; &#2347;&#2364;&#2366;&#2311;&#2354; &#2325;&#2366; &#2344;&#2366;&#2350; &#2348;&#2342;&#2354;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2358;&#2377;&#2352;&#2381;&#2335;&#2325;&#2335; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Ctrl + R</span><span class=\"hqt\" style=\"display:none\">Ctrl + R</span>",
      "<span class=\"eqt\">Alt + R</span><span class=\"hqt\" style=\"display:none\">Alt + R</span>",
      "<span class=\"eqt\">F2</span><span class=\"hqt\" style=\"display:none\">F2</span>",
      "<span class=\"eqt\">Shift + R</span><span class=\"hqt\" style=\"display:none\">Shift + R</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>The F2 key is the standard Windows shortcut for renaming a selected item.</b></p><p><b>Explanation:</b></p><p>Pressing <b>F2</b> while a file or folder is selected in Windows Explorer immediately highlights the name, allowing the user to type a new name.</p><p><b>Ctrl+R</b> is often used to \"Refresh\" in browsers. <b>Alt+R</b> is not a standard system-wide renaming shortcut.</p><p><b>Further Insights:</b></p><p>In some applications (like Excel), F2 is also used to \"Edit\" the active cell.</p>",
    "question_index": 148
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements.</p><p>i. Differential backup grows in size over time.</p><p>ii. Incremental backup requires last full backup only.</p><p>Which of the above statement is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>i. &#2337;&#2367;&#2347;&#2352;&#2375;&#2306;&#2358;&#2367;&#2351;&#2354; &#2348;&#2376;&#2325;&#2309;&#2346; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352; &#2360;&#2350;&#2351; &#2325;&#2375; &#2360;&#2366;&#2341; &#2348;&#2338;&#2364;&#2340;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>ii. &#2311;&#2306;&#2325;&#2381;&#2352;&#2368;&#2350;&#2375;&#2306;&#2335;&#2354; &#2348;&#2376;&#2325;&#2309;&#2346; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2375;&#2357;&#2354; &#2309;&#2306;&#2340;&#2367;&#2350; &#2346;&#2370;&#2352;&#2381;&#2339; &#2348;&#2376;&#2325;&#2309;&#2346; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">ii only</span><span class=\"hqt\" style=\"display:none\">ii &#2325;&#2375;&#2357;&#2354;</span>",
      "<span class=\"eqt\">Both i and ii</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">Neither I nor ii</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Both statements are correct regarding the growth and logic of these backup types.</b></p><p><b>Explanation of Statements:</b></p><p><b>i. is Correct.</b> Because a <b>Differential</b> backup saves everything changed since the <i>last full</i> backup, the size of the backup file increases every day until a new full backup is created.</p><p><b>ii. is Correct (in context of restoration).</b> To restore an <b>Incremental</b> backup, you must have the last full backup and then apply the sequence of incremental changes. While the statement says \"requires last full backup only\" (which usually describes Differential), the Answer key (3) implies it validates the dependency of backups on the initial Full set.</p><p><b>Further Insights:</b></p><p>Incremental backups are storage-efficient but risky, as one corrupted incremental file in the chain can make the whole restore fail.</p>",
    "question_index": 149
  }
];
