        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In a shooting competition, probability of Nilam hitting bulls' eye is 1/4. She shoots at the target 9 times. Find the probability that she hits at least once.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2358;&#2370;&#2335;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2340;&#2367;&#2351;&#2379;&#2327;&#2367;&#2340;&#2366; &#2350;&#2375;&#2306;, &#2344;&#2368;&#2354;&#2350; &#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2346;&#2352; &#2344;&#2367;&#2358;&#2366;&#2344;&#2366; &#2354;&#2327;&#2366;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; 1/4 &#2361;&#2376;&#2404; &#2357;&#2361; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2346;&#2352; 9 &#2348;&#2366;&#2352; &#2344;&#2367;&#2358;&#2366;&#2344;&#2366; &#2354;&#2327;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2319;&#2325; &#2348;&#2366;&#2352; &#2344;&#2367;&#2358;&#2366;&#2344;&#2366; &#2354;&#2327;&#2366;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1- (3/4)<sup>8</sup></span><span class=\"hqt\" style=\"display:none\">1- (3/4)<sup>8</sup></span>",
      "<span class=\"eqt\">1- (3/4)<sup>9</sup></span><span class=\"hqt\" style=\"display:none\">1- (3/4)<sup>9</sup></span>",
      "<span class=\"eqt\">1- (1/4)<sup>8</sup></span><span class=\"hqt\" style=\"display:none\">1- (1/4)<sup>8</sup></span>",
      "<span class=\"eqt\">1- (1/4)<sup>9</sup></span><span class=\"hqt\" style=\"display:none\">1- (1/4)<sup>9</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Probability of success = 1/4</p><p>Probability of failure = 1  -  (1/4) = 3/4</p><p>Total number of trials (n) = 9</p><p>Number of successes required (r) &ge; 1.</p><p>Using binomial probability,</p><p>P (r &ge; 1) = 1  -  P (r = 0)</p><p>= 1  -  nC<sub>r</sub> (Probability of success)<sup>r</sup> (probability of failure)<sup>n-r</sup></p><p>= 1  -  (9C<sub>0</sub>) * (1/4)<sup>0</sup> (3/4)<sup>9-0</sup></p><p>= 1  -  (3/4)<sup>9</sup></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>X attempts 94 questions and gets 141 marks. If for every correct answer 4 marks is given, and for every wrong answer 1 mark is deducted, then the number of questions wrongly answered by X is ____.</p></span><span class=\"hqt\" style=\"display:none\"><p>X 94 &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2361;&#2354; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2375; 141 &#2309;&#2306;&#2325; &#2350;&#2367;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; 4 &#2309;&#2306;&#2325; &#2342;&#2367;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2327;&#2354;&#2340; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; 1 &#2309;&#2306;&#2325; &#2325;&#2366;&#2335;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; X &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2327;&#2354;&#2340; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; ____ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">47</span><span class=\"hqt\" style=\"display:none\">47</span>",
      "<span class=\"eqt\">57</span><span class=\"hqt\" style=\"display:none\">57</span>",
      "<span class=\"eqt\">40</span><span class=\"hqt\" style=\"display:none\">40</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let number of questions wrongly answered by X is 'n'.</p><p>Number of questions correctly answered by X = 94  -  n</p><p>Total marks = 141</p><p>4(94  -  n)  -  1*n = 141</p><p>376  -  4n  -  n = 141</p><p>5n = 235</p><p>n = 47</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A solid sphere of radius 3.5 cm is melted and recast into small hemispheres of radius 1 cm. How many hemispheres can be made? (correct to the nearest whole number)</p></span><span class=\"hqt\" style=\"display:none\"><p>3.5 &#2360;&#2375;&#2350;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2336;&#2379;&#2360; &#2327;&#2379;&#2354;&#2375; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352; 1 &#2360;&#2375;&#2350;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2331;&#2379;&#2335;&#2375; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;? (&#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2340;&#2325; &#2360;&#2361;&#2368;)</p></span>",
    "options": [
      "<span class=\"eqt\">55</span><span class=\"hqt\" style=\"display:none\">55</span>",
      "<span class=\"eqt\">86</span><span class=\"hqt\" style=\"display:none\">86</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">98</span><span class=\"hqt\" style=\"display:none\">98</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Volume of sphere = 4/3 * &#960; r<sup>3</sup></p><p>Volume of hemisphere = 2/3 * &#960; r<sup>3</sup></p><p>Let the number of hemispheres made be x</p><p>Radius of sphere = 3.5 cm</p><p>Radius of hemisphere = 1 cm</p><p>4/3 * &#960; r<sup>3</sup> = n * 2/3 * &#960; r<sup>3</sup></p><p>4/3 * &#960; * 3.5 * 3.5 * 3.5 = n * 2/3 * &#960; * 1 * 1 * 1</p><p>n = 4/3 * 3.5 * 3.5 * 3.5 * 3/2</p><p>n = 85.75 = 86</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If a + b + c = 3, and ab + bc + ca = abc = -12, then what is the value of a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a + b + c = 3 &#2324;&#2352; ab + bc + ca = abc = -12 &#2361;&#2376;, &#2340;&#2379; a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup> &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">98</span><span class=\"hqt\" style=\"display:none\">98</span>",
      "<span class=\"eqt\">99</span><span class=\"hqt\" style=\"display:none\">99</span>",
      "<span class=\"eqt\">101</span><span class=\"hqt\" style=\"display:none\">101</span>",
      "<span class=\"eqt\">105</span><span class=\"hqt\" style=\"display:none\">105</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Given,</p><p>(a + b + c) = 3</p><p>Square both sides,</p><p>a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup> + 2(ab + bc + ca) = 9</p><p>a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup> + 2 * (-12) = 9</p><p>a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup> = 9 + 24 = 33...(1)</p><p>We know that,</p><p>a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup>  -  3abc = (a + b + c)(a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup>  -  (ab + bc + ca))</p><p>a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup>  -  3 * (-12) = 3 * (33  -  (-12)) [from eq.(1)]</p><p>a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup> + 36 = 3 * 45</p><p>a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup> = 135  -  36</p><p>a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup> = 99.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If the radius of the cone is doubled and the height is halved, then what is the ratio between the regular volume to the new volume?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2325;&#2352; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2340;&#2367;&#2352;&#2381;&#2351;&#2325; &#2314;&#2305;&#2330;&#2366;&#2312; &#2310;&#2343;&#2368; &#2325;&#2352; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2310;&#2351;&#2340;&#2344; &#2324;&#2352; &#2344;&#2319; &#2310;&#2351;&#2340;&#2344; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">6:1</span><span class=\"hqt\" style=\"display:none\">6:1</span>",
      "<span class=\"eqt\">1:2</span><span class=\"hqt\" style=\"display:none\">1:2</span>",
      "<span class=\"eqt\">3:1</span><span class=\"hqt\" style=\"display:none\">3:1</span>",
      "<span class=\"eqt\">2:3</span><span class=\"hqt\" style=\"display:none\">2:3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Volume of a cone = (1/3) * (22/7) *  r<sup>2</sup> * h = Regular volume</p><p>New Radius = 2r</p><p>New height = h/2</p><p>New volume = (1/3) * (22/7) * (2r)<sup>2</sup> * (h/2)</p><p>Ratio of regular to new volume = (1/3) * (22/7) * r<sup>2</sup> * h : (1/3) * (22/7) * (2r)<sup>2</sup> * (h/2)</p><p>=> Ratio of regular to new volume = 1 : 2</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In a donation box, there are &#8377;1, &#8377;2, and &#8377;5 coins. The number of &#8377;1 coins is equal to the number of &#8377;5 coins, and the number of &#8377;2 coins is twice that of &#8377;5 coins. If the total value is &#8377;320, find the number of coins of &#8377;2 coins.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2366;&#2344; &#2346;&#2375;&#2335;&#2368; &#2350;&#2375;&#2306;, &#8377;1, &#8377;2, &#2324;&#2352; &#8377;5 &#2360;&#2367;&#2325;&#2381;&#2325;&#2375; &#2361;&#2376;&#2306;&#2404; &#8377;1 &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#8377;5 &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;, &#2324;&#2352; &#8377;2 &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#8377;5 &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2369;&#2354; &#2350;&#2370;&#2354;&#2381;&#2351; &#8377;320 &#2361;&#2376;, &#2340;&#2379; &#8377;2 &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2375; &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">64</span><span class=\"hqt\" style=\"display:none\">64</span>",
      "<span class=\"eqt\">72</span><span class=\"hqt\" style=\"display:none\">72</span>",
      "<span class=\"eqt\">75</span><span class=\"hqt\" style=\"display:none\">75</span>",
      "<span class=\"eqt\">68</span><span class=\"hqt\" style=\"display:none\">68</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the number of &#8377;1 and &#8377;5 coins be x</p><p>Number of &#8377;2 coins = 2x</p><p>x * 1 + x * 5 + 2x * 2 = 320</p><p>x + 5x + 4x = 320</p><p>10x = 320</p><p>x = 32</p><p>number of &#8377;2 coins = 2 * 32 = 64</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In an election, 14% of the voters in the voter list did not cast their votes, whereas 90 votes cast their ballot paper blank. There were only two candidates: A and B. The winner, A was supported by 60% of all the voters in the list. He got 4340 more votes than his rival, B. Find the total number of voters in the list.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2330;&#2369;&#2344;&#2366;&#2357; &#2350;&#2375;&#2306;, &#2350;&#2340;&#2342;&#2366;&#2340;&#2366; &#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; 14% &#2350;&#2340;&#2342;&#2366;&#2340;&#2366;&#2323;&#2306; &#2344;&#2375; &#2309;&#2346;&#2344;&#2366; &#2350;&#2340; &#2344;&#2361;&#2368;&#2306; &#2337;&#2366;&#2354;&#2366;, &#2332;&#2348;&#2325;&#2367; 90 &#2350;&#2340;&#2342;&#2366;&#2340;&#2366;&#2323;&#2306; &#2344;&#2375; &#2309;&#2346;&#2344;&#2366; &#2350;&#2340;&#2346;&#2340;&#2381;&#2352; &#2326;&#2366;&#2354;&#2368; &#2337;&#2366;&#2354;&#2366;&#2404; &#2330;&#2369;&#2344;&#2366;&#2357; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2342;&#2379; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352; : A &#2324;&#2352; B &#2341;&#2375;&#2404; &#2357;&#2367;&#2332;&#2375;&#2340;&#2366; A &#2325;&#2379; &#2360;&#2370;&#2330;&#2368; &#2325;&#2375; &#2360;&#2349;&#2368; &#2350;&#2340;&#2342;&#2366;&#2340;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; 60% &#2325;&#2366; &#2360;&#2350;&#2352;&#2381;&#2341;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2341;&#2366;&#2404; &#2313;&#2360;&#2375; &#2309;&#2346;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2342;&#2381;&#2357;&#2306;&#2342;&#2381;&#2357;&#2368; B &#2360;&#2375; 4340 &#2309;&#2343;&#2367;&#2325; &#2350;&#2340; &#2350;&#2367;&#2354;&#2375;&#2404; &#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2350;&#2340;&#2342;&#2366;&#2340;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">15600</span><span class=\"hqt\" style=\"display:none\">15600</span>",
      "<span class=\"eqt\">9600</span><span class=\"hqt\" style=\"display:none\">9600</span>",

    "question": "<span class=\"eqt\"><p>The angles of elevation of a light house from two boats are 30&deg; and 45&deg;. If the distance between the boats is 24 m and the boats are on same side of the light house, then find the height of the light house.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2344;&#2366;&#2357;&#2379;&#2306; &#2360;&#2375; &#2319;&#2325; &#2354;&#2366;&#2311;&#2335; &#2361;&#2366;&#2313;&#2360; &#2325;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 30&deg; &#2324;&#2352; 45&deg; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2344;&#2366;&#2357;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 24 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376; &#2324;&#2352; &#2344;&#2366;&#2357;&#2375;&#2306; &#2354;&#2366;&#2311;&#2335; &#2361;&#2366;&#2313;&#2360; &#2325;&#2375; &#2319;&#2325; &#2361;&#2368; &#2323;&#2352; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2354;&#2366;&#2311;&#2335; &#2361;&#2366;&#2313;&#2360; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

    "solution": "<p><img width=270 height=189 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p29324/image006.png\"></p><p>In &#8710;BCD,</p><p>tan45&#730; = CD/BC</p><p>BC = CD</p><p>In &#8710;ACD,</p><p>tan30&#730; = CD/AC</p><p>1/&radic;3 = BC/(BC + 24)</p><p>BC + 24 = &radic;3BC</p><p>BC = 24/(&radic;3  -  1) = 12(&radic;3 + 1) m</p><p>CD = 12(&radic;3 + 1) m</p>",

    "question": "<span class=\"eqt\"><p>P and Q are mean and median of a data respectively and mode of the data is 28. If P is 4 less than Q, then find the mean of the data.</p></span><span class=\"hqt\" style=\"display:none\"><p>P &#2324;&#2352; Q &#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;&#2379;&#2306; &#2325;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2350;&#2366;&#2343;&#2381;&#2351; &#2324;&#2352; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;&#2379;&#2306; &#2325;&#2366; &#2348;&#2361;&#2369;&#2354;&#2325; 28 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; P, Q &#2360;&#2375; 4 &#2325;&#2350; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;&#2379;&#2306; &#2325;&#2366; &#2350;&#2366;&#2343;&#2381;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A shopkeeper gains 51% in place of 29% loss if the selling price of an article is increased by Rs.2700. The cost of the article is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; 2700 &#2352;&#2369;&#2346;&#2351;&#2375; &#2348;&#2338;&#2364;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2379; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2325;&#2379; 29% &#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; 51% &#2325;&#2366; &#2354;&#2366;&#2349; &#2361;&#2379;&#2327;&#2366;&#2404; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351; &#2361;&#2376;:</p></span>",

    "question": "<span class=\"eqt\"><p>Which of the following has more area?</p><p>(I) An equilateral triangle of side length 6&radic;3 cm.</p><p>(II) A square whose length of diagonal is 3&radic;6 cm.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;?</p><p>(I) &#2349;&#2369;&#2332;&#2366; &#2354;&#2306;&#2348;&#2366;&#2312; 6&radic;3 cm &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332;&#2404;</p><p>(II) &#2319;&#2325; &#2357;&#2352;&#2381;&#2327; &#2332;&#2367;&#2360;&#2325;&#2375; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 3&radic;6 cm &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Triangle has more area.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Square has more area.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2327; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both has equal areas.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Cannot be determined.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>From statement I:</p><p>Side length of equilateral triangle = 6&radic;3 cm</p><p>Area of triangle = (&radic;3/4) * (6&radic;3)<sup>2</sup></p><p>= (&radic;3/4) * 36 * 3</p><p>= 27&radic;3 sq. cm</p><p>From Statement II:</p><p>Length of diagonal of square = 3&radic;6 cm</p><p>Side * &radic;2 = 3 * &radic;3 * &radic;2</p><p>Side of square = 3&radic;3 cm</p><p>Area of square = (3&radic;3)<sup>2</sup> = 27 sq. cm</p><p>So, triangle has more area.</p>",
    "question_index": 11
  },

    "question": "<span class=\"eqt\"><p>Find the coordinates of the point which divides the join of (4, -1) and (-2, -3) in the ratio 1 : 3? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2344; &#2348;&#2367;&#2344;&#2381;&#2342;&#2369;&#2323;&#2306; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2366;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2379; (4, -1) &#2324;&#2352; (-2, -3) &#2325;&#2375; &#2360;&#2306;&#2343;&#2367; &#2325;&#2379; 1 : 3 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; ?</p></span>",

    "solution": "<p>The concept of cyclicity is used to identify the last digit of the number.</p><p>Cyclicity chart:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\" rowspan=\"2\">Number</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\" rowspan=\"2\">Cyclicity</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\" colspan=\"4\">Unit digit values</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 4</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">0</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">0</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table></p><p>(Note: when remainder is 0, power = cyclicity)</p><p>In 521<sup>111</sup>:</p><p>Unit digit of 521 is 1.</p><p>From the cyclicity chart, cyclicity of 1 is 1.</p><p>So, we have to divide the power of 521 i.e.111 by 1.</p><p>After dividing 111 by 1, remainder = 0. So, power = cyclicity = 1</p><p>Unit digit of 1<sup>1</sup>=1</p><p>In 422<sup>36</sup>:</p><p>Unit digit of 422 is 2.</p><p>From the cyclicity chart, cyclicity of 2 is 4.</p><p>So, we have to divide the power of 422 i.e.36 by 4.</p><p>After dividing 36 by 4, remainder = 0. So, power = cyclicity = 4</p><p>Unit digit of 2<sup>4</sup>=6</p><p>So, unit digit of the product of 521<sup>111</sup> and 422<sup>36</sup></p><p>= (1 x 6) = 6</p>",

    "question": "<span class=\"eqt\"><p>M alone can complete the whole work in 72 days, N alone can complete the same work in 80 days, and P alone can complete the same work in 96 days. They work in the following manner:</p><p>Day 1: M and N work.</p><p>Day 2: P alone work.</p><p>Day 3: M and P work.</p><p>Day 4: N alone work.</p><p>Day 5: M and N work and so on.</p><p>In how many days will the work be completed?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2325;&#2375;&#2354;&#2375; M &#2360;&#2306;&#2346;&#2370;&#2352;&#2381;&#2339; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 72 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2309;&#2325;&#2375;&#2354;&#2375; N &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 80 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2325;&#2375;&#2354;&#2375; P &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 96 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2340;&#2352;&#2368;&#2325;&#2375; &#2360;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;:</p><p>&#2342;&#2367;&#2344; 1: M &#2324;&#2352; N &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2342;&#2367;&#2344; 2: P &#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2342;&#2367;&#2344; 3: M &#2324;&#2352; P &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2342;&#2367;&#2344; 4: N &#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2342;&#2367;&#2344; 5: M &#2324;&#2352; N &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2311;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2310;&#2327;&#2375; &#2349;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2381;&#2339; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">54(11/35) days</span><span class=\"hqt\" style=\"display:none\">54(11/35) &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">52(9/14) days</span><span class=\"hqt\" style=\"display:none\">52(9/14) &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">54(9/35) days</span><span class=\"hqt\" style=\"display:none\">54(9/35) &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">52(11/35) days</span><span class=\"hqt\" style=\"display:none\">52(11/35) &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let total work = LCM of 72, 80, 96 = 1440 units</p><p>Efficiency of M = 1440/72 = 20 Units per day</p><p>Efficiency of N = 1440/80 = 18 Units per day</p><p>Efficiency of P = 1440/96 = 15 Units per day</p><p>Work done in 4 days as stated in the question = (20 + 18) + (15) + (20 + 15) + 18 = 106 units</p><p>Work done in 52 days = 106 x 13 = 1378 units</p><p>Remaining units = 62</p><p>Work done on 53rd day = 20 + 18 = 38 units</p><p>Work done on 54th day = 15 units</p><p>Remaining work = 62 - 53 = 9 units</p><p>These 9 units will be done by M and P in 9/35 days.</p><p>Total number of days taken to complete the work = 54 + (9/35) = 54(9/35) days</p>",

    "question": "<span class=\"eqt\"><p>In a match, average runs scored by 5 batsman is 51. If the runs scored by four players are 60, 22, 34, and 18 respectively, then how many runs did the fifth player score?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2350;&#2376;&#2330; &#2350;&#2375;&#2306; 5 &#2348;&#2354;&#2381;&#2354;&#2375;&#2348;&#2366;&#2332;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2319; &#2327;&#2319; &#2324;&#2360;&#2340; &#2352;&#2344; 51 &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2330;&#2366;&#2352; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2319; &#2327;&#2319; &#2352;&#2344; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 60, 22, 34 &#2324;&#2352; 18 &#2361;&#2376;&#2306;, &#2340;&#2379; &#2346;&#2366;&#2305;&#2330;&#2357;&#2375;&#2306; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2368; &#2344;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2352;&#2344; &#2348;&#2344;&#2366;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">121</span><span class=\"hqt\" style=\"display:none\">121</span>",
      "<span class=\"eqt\">106</span><span class=\"hqt\" style=\"display:none\">106</span>",
      "<span class=\"eqt\">99</span><span class=\"hqt\" style=\"display:none\">99</span>",

    "correct_option_id": 0,
    "solution": "<p>Total runs scored by 5 batsmen = 51 * 5 = 255</p><p>Total runs scored by four batsmen = 60 + 22 + 34 + 18 = 134</p><p>Runs scored by fifth batsman = 255  -  134 = 121</p>",

    "question": "<span class=\"eqt\"><p>There are two mixtures of wine and water, A and B. Mixtures A and B contains respectively 40% and 20% wine. If 'x' L of mixture A is mixed with 50 L of mixture B and ratio of wine to water in new mixture is 1: 2, then find the value of 'x'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2352;&#2366;&#2348; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2375; &#2342;&#2379; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; A &#2324;&#2352; B &#2361;&#2376;&#2306;&#2404; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; A &#2324;&#2352; B &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 40% &#2324;&#2352; 20% &#2358;&#2352;&#2366;&#2348; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; A &#2325;&#2366; 'x' &#2354;&#2368;&#2335;&#2352;, &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; B &#2325;&#2375; 50 &#2354;&#2368;&#2335;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2344;&#2319; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2358;&#2352;&#2366;&#2348; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 1: 2 &#2361;&#2376;, &#2340;&#2379; 'x' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">150</span><span class=\"hqt\" style=\"display:none\">150</span>",
      "<span class=\"eqt\">75</span><span class=\"hqt\" style=\"display:none\">75</span>",
      "<span class=\"eqt\">100</span><span class=\"hqt\" style=\"display:none\">100</span>",
      "<span class=\"eqt\">125</span><span class=\"hqt\" style=\"display:none\">125</span>"

    "solution": "<p>Quantity of wine in 'x' L of mixture A = 40% of 'x' = 0.4x L</p><p>Quantity of water in 'x' L of mixture A = x  -  0.4x = 0.6x L</p><p>Quantity of wine in 50 L of mixture B = 20% of 50 = 10 L</p><p>Quantity of water in 50 L of mixture B = 50  -  10 = 40 L</p><p>From the question:</p><p>(0.4x + 10)/(0.6x + 40) = 1/2</p><p>0.8x + 20 = 0.6x + 40</p><p>x = 100</p>",

    "question": "<span class=\"eqt\"><p>The age of P after two years will be 1.4 times the age of Q four years ago. The sum of present ages of P and Q is 62 years. What is the present age of Q?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; P &#2325;&#2368; &#2310;&#2351;&#2369;, Q &#2325;&#2368; &#2330;&#2366;&#2352; &#2357;&#2352;&#2381;&#2359; &#2346;&#2361;&#2354;&#2375; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2368; 1.4 &#2327;&#2369;&#2344;&#2366; &#2361;&#2379;&#2327;&#2368;&#2404; P &#2324;&#2352; Q &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; 62 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;&#2404; Q &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">30 years</span><span class=\"hqt\" style=\"display:none\">30 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">29 years</span><span class=\"hqt\" style=\"display:none\">29 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">33 years</span><span class=\"hqt\" style=\"display:none\">33 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">28 years</span><span class=\"hqt\" style=\"display:none\">28 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let present age of P and Q be 'p' years and '62  -  p' years respectively.</p><p>Now,</p><p>(p + 2) = 1.4(62  -  p  -  4)</p><p>=&gt; p + 2 = 81.2  -  1.4p</p><p>=&gt; 2.4p = 79.2</p><p>=&gt; p = 33</p><p>Hence, the present age of Q = 62  -  33 = 29 years</p>",
    "question_index": 22

    "question": "<span class=\"eqt\"><p>If 4*3 = 16 and 6*2 = 18, then what is the value of 5*4?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 4*3 = 16 &#2324;&#2352; 6*2 = 18, &#2340;&#2379; 5*4 &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>"

    "question": "<span class=\"eqt\"><p>A statement is given followed by two inferences I and II. You have to consider the statement to be true even if it seems to be at variance with commonly known facts. You have to decide which of the given inferences, if any, follow from the given statement.</p><p><b>Statement:</b></p><p>A balanced and nutritious diet plays a critical role in maintaining good health and preventing chronic diseases. However, many people prefer fast food, which is high in calories and low in essential nutrients.</p><p><b>Inference:</b></p><p><b>I.</b> Consuming fast food regularly can lead to health issues.</p><p><b>II. </b>Only people with unhealthy diets are prone to chronic diseases.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2341;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2311;&#2360; &#2325;&#2341;&#2344; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#8203;&#8203;&#2361;&#2376;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2351;&#2361; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2379;&#2404; &#2310;&#2346;&#2325;&#2379; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2342;&#2367;&#2319; &#2327;&#2319; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;, &#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2361;&#2376;,       "<span class=\"eqt\">If only II follows</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2325;&#2375;&#2357;&#2354; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"

    "comp": "<p><b>Directions :</b><b> </b>Read the given passage and answer the questions that follow. </p><p>In the valley of Gulmarg, amidst the Himalayan mountains of Kashmir, the Ahmed family waited eagerly for the season's first snowfall. Their home, a traditional Kashmiri cottage with sloping roofs and carved wooden windows, stood at the edge of a vast meadow. The meadow, usually vibrant with wildflowers in summer, now lay bare, its grass frosted and brittle under the chill of late November. Inside the cosy living room, a crackling fire in the kangri, the traditional Kashmiri firepot, warmed the air. Eight-year-old Aisha sat cross-legged on a plush rug, her small fingers deftly shaping snowflakes out of white paper. Beside her, her elder brother Sameer adjusted a telescope aimed through the window, eager to spot the first flurries in the sky. Their mother, Nargis, stirred a pot of <i>noon chai</i> in the kitchen. The fragrant pink tea with a hint of salt filled the room with warmth. Their father, Bilal, wrapped in a <i>pheran</i>, the traditional Kashmiri woollen cloak, leaned back in his chair, reading an old book about Himalayan wildlife.</p><p>\"Baba, when will it snow?\" Aisha asked, looking up from her paper snowflakes. Bilal closed his book and smiled. \"Patience, my little snowflake. The sky will tell us when it's time.\" Sameer chimed in, \"The weather forecast said it might start tonight!\" \"But the sky looks clear,\" Aisha pouted, glancing out the window at the fading daylight. Nargis walked in, carrying a tray of steaming tea and plates of <i>sheermal</i>, the sweet saffron bread. She placed them on the low wooden table, known as a <i>chakri</i>, and sat down. \"The first snow always comes when we least expect it,\" she said. </p><p>Tiny white specks began to drift down, shimmering in the moonlight. \"It's snowing!\" Aisha squealed, jumping up and down. The family rushed outside, their laughter breaking the serene stillness of the night. The snowf     "solution": "<p><b>Phrasal verb: </b>A phrase that consists of a verb with a preposition or adverb or both, the meaning of which is different from the meaning of its separate parts. Example: She has always looked down on me. Here, the phrasal verb 'to look down on someone' doesn't mean that you are looking down from a higher place at someone who is below you; it means that you think that you are better than someone.</p><p>back up- provide support for someone or something.</p><p>back and forth- to and fro.</p><p>back onto- (of a building or other structure) have its back facing or adjacent to something.</p><p>back out- withdraw from a commitment.</p><p>The sentence is about the judgment that prevents Indiana officials from taking a certain step in times of pandemic. So, as per the context of the sentence and the usage of given phrasal verbs, 'back out' is apt to use which will convey the meaning that Indiana officials cannot withdraw from organising the program for jobless workers as per the judgment.</p><p>Hence, option (d) is correct.</p>",

    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>It is an undeniable fact which everyone would agree to that the mountains look beautiful _______ a distance.</p>",
    "options": [
      "to",
      "out",
      "from",
      "near"
    ],
    "correct_option_id": 2,
    "solution": "<p>Such a preposition is to be used that can connect 'beautiful mountains' and 'distance'.</p><p>So, <b>'from'</b> is the apt choice as it is used to indicate the distance between a particular place and another place used as a point of reference and it would convey that the mountains look beautiful when viewed at some distance away.</p><p><b>'To'</b> is used to express the motion in the direction of (a particular location), <b>'out'</b> is used to express 'indicating the source or derivation of something; from' and <b>'near'</b> is used to express 'at or to a short distance away from (a place)'.</p><p>Hence, option (c) is correct.</p><p><b>Note:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>1) The teacher scolded the child <b>for </b><u>being</u> late.</p><p>2) We're going <b>to</b> a <u>party</u>.</p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 92
  },

    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>We all know it is an accepted truth- if the blind lead the blind, ______ shall fall into the ditch.</p>",

      "either",
      "both",
      "any"
    ],
    "correct_option_id": 2,
    "solution": "<p>Such a determiner is to be used that can refer to the two blind people that the sentence talks about.</p><p>So, <b>'both'</b> is the apt choice as it is used for emphasis to refer to two people or things, regarded and identified together and it would convey that both of them will fall into the drain if one blind leads the other blind.</p><p>Since the sentence talks about both of them falling into the drain, <b>'one'</b>, <b>'either'</b> and <b>'any'</b> are all contextually incorrect.</p><p>Hence, option (c) is correct.</p><p><b>Note:</b></p><p><b>Determiners</b> are words that are used before nouns.</p><p>Determiners include the following common types:</p><p>Articles: <i>a/an, the</i></p><p>Demonstratives: <i>this, that, these, those</i></p><p>Possessives: <i>my, your, his, her, its, our, their, x's</i> (possessive <i>'s</i>)</p><p>Quantifiers: <i>(a) few, fewer, (a) little, many, much, more, most, some, any</i>, etc.</p><p>Numbers: <i>one, two, three</i>, etc.</p><p>Determiners have two main functions: referring and quantifying.</p>",

    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>Sansa and Arya have been asked by John Snow to keep his identity of being a Targaryen a secret from everyone and especially Daenerys.</p>",
    "options": [
      "John Snow have asked Sansa and Arya to keep his identity of being a Targaryen a secret from everyone and especially Daenerys.",
      "John Snow has asked Sansa and Arya to keep his identity of being a Targaryen a secret from everyone and especially Daenerys.",
      "John Snow had asked Sansa and Arya to keep his identity of being a Targaryen a secret from everyone and especially Daenerys.",
      "John Snow asked Sansa and Arya to keep his identity of being a Targaryen a secret from everyone and especially Daenerys."
    ],
    "correct_option_id": 1,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the helping verb and the preposition 'by' is necessary while changing the voice of the sentence from Passive to Active.</p><p>The Passive voice in this question is in <b>Present Perfect</b>. Thus, the Active voice will also be in <b>Present Perfect</b>.</p><p>In Passive voice, the format is: <b>Subject (Objective case) + has/have + been + V3 + by + Object (Subjective case)</b>.</p><p>Thus, the format of Active voice is: <b>Subject + has/have + V3 + Object</b>.</p><p>For example:</p><p>A new horse has been bought by Arya. (Passive Voice)</p><p>Arya has bought a new horse. (Active Voice)</p><p>Note: 'John Snow' is a singular noun. So, the verb that must agree to it must also be singular (has). Thus, option (a) is incorrect.</p><p>The options except (b) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is: <b>(b) John Snow has asked Sansa and Arya to keep his identity of being a Targaryen a secret from everyone and especially Daenerys</b>.</p>",
    "question_index": 97
  },

    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The teacher said that the students had completed all the assignments on time and had submitted their reports to the department office.</p>",
    "options": [
      "The teacher said, \"The students have completed all the assignments on time and have submitted their reports to the department office.\"",
      "The teacher says, \"The students had completed all the assignments on time and had submitted their reports to the department office.\"",
      "The teacher told, \"The students had completed all the assignments on time and had submitted their reports to the department office.\"",
      "The teacher said, \"The students complete all the assignments on time and submit their reports to the department office.\""
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence in Indirect Speech is in Past Perfect Tense. There are three common ways to handle Past Perfect when converting to Direct Speech:</p><p></p><p>Case 1: Past Perfect remains unchanged.</p><p></p><p>Example: Indirect: He said that he had finished the work.</p><p>Direct: He said, \"I had finished the work.\"</p><p></p><p>Case 2: Past Perfect is converted into Present Perfect.</p><p></p><p>Example: Indirect: He said that he had got a new job.</p><p>Direct: He said, \"I have got a new job.\"</p><p></p><p>Case 3: Past Perfect is converted into Past Simple.</p><p></p><p>Example: Indirect: He said that Arya had sent him a book.</p><p>Direct: He said, \"Arya sent me a book.\"</p><p></p><p>In this sentence, Case 2 is applicable because the reporting verb is in the past and the action has relevance to the present.</p><p></p><p>Past Perfect to Present Perfect: \"had completed...\" to \"have completed...\"</p><p></p><p>The reporting verb 'said' remains unchanged.</p><p></p><p>Inverted commas \"...\" are added.</p><p></p><p>(a) is correct: correctly converts Past Perfect to Present Perfect while keeping the reporting verb and sequence of actions.</p><p></p><p>(b) is incorrect: changes reporting verb to \"says\".</p><p></p><p>(c) is incorrect: uses 'told' without an object.</p><p></p><p>(d) is incorrect: changes tense to Present Simple.</p><p></p><p>Therefore, the correct answer is: (a).</p>",
    "question_index": 98
  },

    "question": "<span class=\"eqt\"><p>Consider the Judicial writs and answer which of the following is/are correct?</p><p>i) Writs power is mention in Article 32 for High Court and Article 226 for Supreme Court</p><p>ii) There are Six writs which can issued by Supreme Court and High courts</p><p>iii) Writs power of High Court is broader than Supreme Court.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2352;&#2367;&#2335; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306; &#2325;&#2367; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>i) &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2367;&#2335; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32 &#2350;&#2375;&#2306; &#2324;&#2352; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 226 &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;</p><p>ii) &#2331;&#2361; &#2352;&#2367;&#2335; &#2361;&#2376;&#2306; &#2332;&#2379; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2332;&#2366;&#2352;&#2368; &#2325;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;</p><p>iii) &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2352;&#2367;&#2335; &#2358;&#2325;&#2381;&#2340;&#2367; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only i</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i</span>",
      "<span class=\"eqt\">Only iii</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; iii</span>",
      "<span class=\"eqt\">Only i and ii</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Writs power is in hand of court to safe guard the Fundamental Rights of the Citizens</p><p>&bull; Writ power of Supreme court mention in Article 32 and for High Court in Article 226</p><p>&bull; There are 5 types of Writs</p><p>o Habeas Corpus(to have the body) against illegal detention by state or private person.</p><p>o Mandamus (We command): To the public officials to do their duties{against judiciary as well as administrative authorities}</p><p>o Prohibition: By Supreme Court or High Court to the inferior court forbidding to stop proceeding of the case which is outside of its Jurisdiction</p><p>o Certiorari: It is used to quash the order or decision of courts or Tribunal</p><p>o Quo Warranto: It used to check the if the Person legally occupied the public office.</p><p>&bull; The scope of the writ power of the High Court is broader than Supreme Court.</p>",
    "question_index": 108
  },
  {
    "question": "<span class=\"eqt\"><p>Which Article of the Indian Constitution empower President to promulgate Ordinances during recess of Parliament?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2309;&#2357;&#2325;&#2366;&#2358; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2309;&#2343;&#2381;&#2351;&#2366;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2379; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2360;&#2358;&#2325;&#2381;&#2340; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 105</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 105</span>",
      "<span class=\"eqt\">Article 110</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 110</span>",
      "<span class=\"eqt\">Article 112</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 112</span>",
      "<span class=\"eqt\">Article 123</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 123</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Article <b>123</b> of the Constitution empower the President to promulgate Ordinances during recess of Parliament. These Ordinances have the same force and effect as an act of Parliament, but are in the nature of temporary laws.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Article</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Subject Matter</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">105</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Powers, privileges, etc., of the Houses of Parliament and of the members and committees thereof.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">110</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Definition of \"Money Bills\".</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">112</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Annual financial statement.</td></tr></table>",
    "question_index": 109
  },
  {
    "question": "<span class=\"eqt\"><p>The Pradhan Mantri Kisan Urja Suraksha evam Utthaan Mahabhiyan (PM-KUSUM) is implemented by the Ministry of ______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2367;&#2360;&#2366;&#2344; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2319;&#2357;&#2306; &#2313;&#2340;&#2381;&#2341;&#2366;&#2344; &#2350;&#2361;&#2366;&#2349;&#2367;&#2351;&#2366;&#2344; (&#2346;&#2368;&#2319;&#2350;-&#2325;&#2369;&#2360;&#2369;&#2350;) ______ &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Agriculture and Farmers' Welfare</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2319;&#2357;&#2306; &#2325;&#2367;&#2360;&#2366;&#2344; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339;</span>",
      "<span class=\"eqt\">New and Renewable Energy</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2357;&#2368;&#2344; &#2324;&#2352; &#2344;&#2357;&#2368;&#2325;&#2352;&#2339;&#2368;&#2351; &#2314;&#2352;&#2381;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Power</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2325;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Heavy Industries</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2368; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>\"Ministry of New and Renewable Energy (MNRE)\" implements PM-KUSUM to promote decentralized solar power and solar pumps for agriculture through components: A (decentralized solar plants), B (standalone solar pumps), and C (solarization of grid-connected pumps), with financial assistance to farmers.</p><p>- \"Agriculture and Farmers' Welfare\": Not the implementing ministry, though the scheme benefits farmers.</p><p>- \"Power\": Not the nodal ministry; inter-ministerial coordination is common for grid matters.</p><p>- \"Heavy Industries\": No direct implementation role in PM-KUSUM.</p><p>Further Insights:</p><p>- Original targets included 10 GW under Component A, 20 lakh standalone pumps (B), and solarization of 15 lakh pumps (C).</p><p>- Central Financial Assistance generally around 30% (with similar state share) plus beneficiary contribution.</p><p>- PM-KUSUM supports feeder-level solarization and reduces DISCOM subsidy burden in agriculture.</p>",
    "question_index": 110
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements: </p><p>I.Acceleration is the rate of change of velocity with time.</p><p>II.Velocity is the rate of change of position with time.</p><p>Which of the above statements is / are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><p>I.&#2340;&#2381;&#2357;&#2352;&#2339; &#2360;&#2350;&#2351; &#2325;&#2375; &#2360;&#2366;&#2341; &#2357;&#2375;&#2327; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2368; &#2342;&#2352; &#2361;&#2376;&#2404;</p><p>II.&#2357;&#2375;&#2327; &#2360;&#2350;&#2351; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2368; &#2342;&#2352; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I &amp; II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are correct. </p><p>The rate of change of your position with time defines your velocity. In everyday language, velocity means the same thing as speed. </p><p>Acceleration is the rate of change of velocity with time. Like velocity, this is a vector quantity that has a direction as well as a magnitude. An increase in velocity is commonly called acceleration while a decrease in velocity is sometimes termed deceleration. </p><p>Source: Sciencing. </p>",
    "question_index": 111
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are <b>INCORRECT</b>?</p><p>A. The changes which occur at adolescence are controlled by hormones.</p><p>B. Hormones are chemical substances. These are secretions from endocrine glands, or endocrine system.</p><p>C. The male hormone or estrogen begins to be released by the testes at the onset of puberty. This causes changes in boys during adolescence.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; <b>&#2327;&#2354;&#2340;</b> &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A. &#2325;&#2367;&#2358;&#2379;&#2352;&#2366;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2361;&#2366;&#2352;&#2381;&#2350;&#2379;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>B. &#2361;&#2366;&#2352;&#2381;&#2350;&#2379;&#2344; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2375; &#2309;&#2306;&#2340;&#2307;&#2360;&#2381;&#2352;&#2366;&#2357;&#2368; &#2327;&#2381;&#2352;&#2306;&#2341;&#2367;&#2351;&#2379;&#2306; &#2351;&#2366; &#2309;&#2306;&#2340;&#2307;&#2360;&#2381;&#2352;&#2366;&#2357;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2360;&#2375; &#2360;&#2381;&#2352;&#2366;&#2357; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>C. &#2351;&#2380;&#2357;&#2344;&#2366;&#2352;&#2350;&#2381;&#2349; (puberty) &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2350;&#2375;&#2306; &#2357;&#2371;&#2359;&#2339; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2369;&#2352;&#2369;&#2359; &#2361;&#2366;&#2352;&#2381;&#2350;&#2379;&#2344; &#2351;&#2366; &#2319;&#2360;&#2381;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2325;&#2366; &#2360;&#2381;&#2352;&#2366;&#2357; &#2361;&#2379;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360;&#2360;&#2375; &#2325;&#2367;&#2358;&#2379;&#2352;&#2366;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2366;&#2357; &#2310;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">A only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">C only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; C</span>",
      "<span class=\"eqt\">A, B, and C</span><span class=\"hqt\" style=\"display:none\">A, B &#2324;&#2352; C</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The period of life, when the body undergoes changes, leading to reproductive maturity, is called adolescence. Adolescence begins around the age of 11 and lasts up to 18 or 19 years of age. Since this period covers the 'teens' (13 to 18 or 19 years of age), adolescents are also called 'teenagers'. In girls, adolescence may begin a year or two earlier than in boys. Also, the period of adolescence varies from person to person.</p><p>&#183; The changes which occur at adolescence are controlled by hormones. Hormones are chemical substances. </p><p>&#183; These are secretions from endocrine glands, or endocrine system. The male hormone or testosterone begins to be released by the testes at the onset of puberty. </p><p>&#183; This causes changes in boys about which you have just learnt, for example, the growth of facial hair. Once puberty is reached in girls, ovaries begin to produce the <b>female hormone or estrogen </b>which makes the breasts develop.</p>",
    "question_index": 112
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following are the second largest animal phylum and whose body is covered by a calcareous shell and is unsegmented with a distinct head, muscular foot and visceral hump?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2370;&#2360;&#2352;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2332;&#2306;&#2340;&#2369; &#2360;&#2306;&#2328; &#2361;&#2376; &#2324;&#2352; &#2332;&#2367;&#2360;&#2325;&#2366; &#2358;&#2352;&#2368;&#2352; &#2319;&#2325; &#2330;&#2370;&#2344;&#2375;&#2342;&#2366;&#2352; &#2326;&#2379;&#2354; &#2360;&#2375; &#2338;&#2325;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376; &#2324;&#2352; &#2319;&#2325; &#2309;&#2354;&#2327; &#2360;&#2367;&#2352;, &#2346;&#2375;&#2358;&#2368;&#2351; &#2346;&#2376;&#2352; &#2324;&#2352; &#2310;&#2306;&#2340; &#2325;&#2375; &#2325;&#2370;&#2348;&#2337;&#2364; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Porifera</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2352;&#2367;&#2347;&#2375;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Annelida</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2375;&#2354;&#2367;&#2337;&#2366;</span>",
      "<span class=\"eqt\">Echinodermata</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2366;&#2311;&#2344;&#2379;&#2337;&#2352;&#2381;&#2350;&#2375;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Mollusca</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2354;&#2360;&#2381;&#2325;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Mollusca</b> is the second largest animal phylum. Molluscs are terrestrial or aquatic (marine or freshwater) having an organ-system level of organisation.</p><p>They are bilaterally symmetrical, triploblastic and coelomate animals.</p><p>Body is covered by a calcareous shell and is unsegmented with a distinct head, muscular foot and visceral hump.</p><p>A soft and spongy layer of skin forms a mantle over the visceral hump.</p><p></p><p>Further insights:</p><p>Porifera:</p><p>Common Name: Sponges</p><p>Characteristics: Simple, mostly marine animals. Lack true tissues and organs. Filter feeders that pump water through their bodies.</p><p></p><p>Annelida:</p><p>Common Name: Segmented Worms (e.g., earthworms, leeches)</p><p>Characteristics: Bodies divided into segments. Possess a true coelom (body cavity). Many have bristles (setae) for movement.</p><p></p><p>Echinodermata:</p><p>Common Name: Starfish, sea urchins, sea cucumbers</p><p>Characteristics: Spiny-skinned animals. Radial symmetry (body parts arranged around a central point). Marine organisms.</p>",
    "question_index": 113
  },

    "question": "<span class=\"eqt\"><p>Prime Minister Narendra Modi, who was sworn in as prime minister for the third consecutive term along with his 71 ministers, allocated portfolios to the newly elected ministers in his cabinet on June 10, 2024. Which of the following ministries and minister is correctly matched?</p><p>I. HD Kumaraswamy: Minister of Heavy Industries</p><p>II. Piyush Goyal: Minister of Education</p><p>III. Dharmendra Pradhan: Minister of Commerce and Industry</p><p>IV. Jitan Ram Manjhi: Minister of Micro, Small and Medium Enterprises</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2344;&#2352;&#2375;&#2306;&#2342;&#2381;&#2352; &#2350;&#2379;&#2342;&#2368; &#2344;&#2375; &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; &#2340;&#2368;&#2360;&#2352;&#2368; &#2348;&#2366;&#2352; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2358;&#2346;&#2341; &#2354;&#2368; &#2324;&#2352; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2309;&#2346;&#2344;&#2375; 71 &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; 10 &#2332;&#2370;&#2344; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2350;&#2306;&#2337;&#2354; &#2350;&#2375;&#2306; &#2344;&#2357;&#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2330;&#2367;&#2340; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2357;&#2367;&#2349;&#2366;&#2327;&#2379;&#2306; &#2325;&#2366; &#2310;&#2357;&#2306;&#2335;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2324;&#2352; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2360;&#2361;&#2368; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2361;&#2376;&#2306;?</p><p>I. &#2319;&#2330;.&#2337;&#2368;. &#2325;&#2369;&#2350;&#2366;&#2352;&#2360;&#2381;&#2357;&#2366;&#2350;&#2368;: &#2349;&#2366;&#2352;&#2368; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</p><p>II. &#2346;&#2368;&#2351;&#2370;&#2359; &#2327;&#2379;&#2351;&#2354;: &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</p><p>III. &#2343;&#2352;&#2381;&#2350;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;: &#2357;&#2366;&#2339;&#2367;&#2332;&#2381;&#2351; &#2324;&#2352; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</p><p>IV. &#2332;&#2368;&#2340;&#2344; &#2352;&#2366;&#2350; &#2350;&#2366;&#2306;&#2333;&#2368;: &#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350;, &#2354;&#2328;&#2369; &#2324;&#2352; &#2350;&#2343;&#2381;&#2351;&#2350; &#2313;&#2342;&#2381;&#2351;&#2350; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</p></span>",

    "question": "<span class=\"eqt\"><p>Which of the following can reduce the supply of money in an economy?</p><p>I. Increasing the cash reserve ratio</p><p>II. Selling of government securities through Open market operations by RBI</p><p>III. Decreasing the bank rates at which banks borrow from RBI</p><p>Select the correct answer using the code:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2343;&#2344; &#2325;&#2368; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p><p>I. &#2344;&#2325;&#2342; &#2310;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</p><p>II. RBI &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2326;&#2369;&#2354;&#2375; &#2348;&#2366;&#2332;&#2366;&#2352; &#2346;&#2352;&#2367;&#2330;&#2366;&#2354;&#2344; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2349;&#2370;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368;</p><p>III. &#2348;&#2376;&#2306;&#2325; &#2342;&#2352;&#2379;&#2306; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2366; &#2332;&#2367;&#2360; &#2346;&#2352; &#2348;&#2376;&#2306;&#2325; RBI &#2360;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;</p><p>&#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>RBI purchases (or sells) government securities to the general public in a bid to increase (or decrease) the stock of high-powered money in the economy.</p><p>RBI can reduce the supply of money by increasing the REPO rates Reverse REPO rates, Cash Reserve Ration (CRR), Bank rates and conducting open market operation. <b>Hence, Statement 3 is incorrect</b>.</p><p>Open market operations (OMO) refer to a central bank's buying and selling of government securities in the open market in order to expand or contract the amount of money in the banking system.</p><p>Repo rate refers to the rate at which commercial banks borrow money from the Reserve Bank of India (RBI) in case of shortage of funds.</p><p>Reverse repo rate is the rate at which the Reserve Bank of India borrows money from commercial banks.</p>",
    "question_index": 115
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>I. The Lucknow pact of 1916 is important in the evolution of the two-nation theory.</p><p>II. The 1916 Lucknow session of the Indian National Congress was presided over by Annie Beasant.</p><p>Which of the above statement s) is / are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2357;&#2352;&#2381;&#2359; 1916 &#2325;&#2366; &#2354;&#2326;&#2344;&#2314; &#2360;&#2350;&#2333;&#2380;&#2340;&#2366; &#2342;&#2381;&#2357;&#2367;-&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2375; &#2357;&#2367;&#2325;&#2366;&#2360; &#2350;&#2375;&#2306; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2361;&#2376;&#2404;</p><p>II. &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2375; &#2357;&#2352;&#2381;&#2359; 1916 &#2325;&#2375; &#2354;&#2326;&#2344;&#2314; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344; &#2325;&#2368; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;&#2340;&#2366; &#2319;&#2344;&#2368; &#2348;&#2368;&#2360;&#2375;&#2306;&#2335; &#2344;&#2375; &#2325;&#2368; &#2341;&#2368;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I &amp; II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II.</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is correct. While the effort of the Congress and the Muslim League to put up a united front was a far-sighted one, the acceptance of the principle of separate electorates by the Congress implied that the Congress and the League came together as separate political entities. This was a major landmark in the evolution of the two-nation theory by the Muslim League. Secondly, while the leaders of the two groups came together, efforts to bring together the masses from the two communities were not considered. However, the controversial decision to accept the principle of separate electorates (during the Lucknow session of the congress) represented a serious desire on the part of the Congress to allay minority fears of majority domination.</p><p></p><p>Statement II is Incorrect. The Lucknow Pact was an agreement reached between the Indian National Congress and the Muslim League at a joint session of both the parties held in Lucknow in December 1916.The Lucknow session was presided over by Ambica Charan Mazumdar</p><p></p>",
    "question_index": 116
  },
