    "question": "<span class=\"eqt\"><p>In July 2024, which of the following country secured their first Women's Asia Cup 2024 title win, beating India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2369;&#2354;&#2366;&#2312; 2024 &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2325;&#2379; &#2361;&#2352;&#2366;&#2325;&#2352; &#2309;&#2346;&#2344;&#2366; &#2346;&#2361;&#2354;&#2366; &#2350;&#2361;&#2367;&#2354;&#2366; &#2319;&#2358;&#2367;&#2351;&#2366; &#2325;&#2346; 2024 &#2326;&#2367;&#2340;&#2366;&#2348; &#2332;&#2368;&#2340;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bangladesh</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2306;&#2327;&#2381;&#2354;&#2366;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Sri Lanka</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2368;&#2354;&#2306;&#2325;&#2366;</span>",
      "<span class=\"eqt\">West Indies</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2368;&#2332;</span>",
      "<span class=\"eqt\">Nepal</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2346;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Sri Lanka secured their first Women's Asia Cup 2024 title win, beating India with a clinical run-chase in front of home fans.</p><p>This was also just the second time in their nine final appearances that India failed to win the Women's Asia Cup.</p><p>The previous such instance was in 2018 when Bangladesh beat India by three wickets. Samarawickrama was the Player of the Match in the Final, while Chamari Athapaththu was the Player of the Tournament for her 304 runs and three wickets in the event.</p><p>This win is another feather in the cap for Athapaththu's Sri Lanka. They won the Women's T20 World Cup Qualifier earlier in the year to qualify for the Women's T20 World Cup in Bangladesh.</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>Arrange the following in correct chronological order:</p><p>1) Arab conquest of Sind</p><p>2) Raids of Mahmud of Ghazni</p><p>3) Second Battle of Tarain</p><p>4) Establishment of the Delhi Sultanate (Mamluk)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2379; &#2360;&#2361;&#2368; &#2325;&#2366;&#2354;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2360;&#2367;&#2306;&#2343; &#2346;&#2352; &#2309;&#2352;&#2348; &#2357;&#2367;&#2332;&#2351;</p><p>2) &#2350;&#2361;&#2350;&#2370;&#2342; &#2327;&#2332;&#2344;&#2357;&#2368; &#2325;&#2375; &#2331;&#2366;&#2346;&#2375;</p><p>3) &#2340;&#2352;&#2366;&#2311;&#2344; &#2325;&#2366; &#2342;&#2370;&#2360;&#2352;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343;</p><p>4) &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; (&#2350;&#2366;&#2350;&#2354;&#2369;&#2325;) &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</p></span>",
    "options": [
      "<span class=\"eqt\">2  -  1  -  3  -  4</span><span class=\"hqt\" style=\"display:none\">2  -  1  -  3  -  4</span>",
      "<span class=\"eqt\">1  -  2  -  3  -  4</span><span class=\"hqt\" style=\"display:none\">1  -  2  -  3  -  4</span>",
      "<span class=\"eqt\">2  -  3  -  1  -  4</span><span class=\"hqt\" style=\"display:none\">2  -  3  -  1  -  4</span>",
      "<span class=\"eqt\">1  -  3  -  2  -  4</span><span class=\"hqt\" style=\"display:none\">1  -  3  -  2  -  4</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct sequence is: (1) Arab conquest of \"Sind\" (711 CE) &rarr; (2) \"Mahmud of Ghazni\"'s raids (1000 - 1027) &rarr; (3) Second Battle of \"Tarain\" (1192; Ghori defeats Prithviraja III) &rarr; (4) Establishment of the \"Delhi Sultanate\" (1206; Qutb-ud-Din Aibak).</p><p>Further Insights:</p><p>- The First Battle of Tarain (1191) saw \"Prithviraja III\" defeat \"Ghori\"; the second (1192) reversed the outcome.</p><p>- Aibak (1206 - 1210) founded the \"Mamluk (Slave) dynasty\"; \"Iltutmish\" consolidated it.</p><p>- Arab rule in Sind was short-lived but opened maritime-commercial links and cultural conduits.</p>",
    "question_index": 118
  },

    "question": "<span class=\"eqt\"><p>Which of the following cannot be considered at a joint sitting of Parliament under Article 108?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 108 &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2306;&#2360;&#2342; &#2325;&#2368; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2348;&#2376;&#2336;&#2325; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A Bill to create an All-India Judicial Service</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2326;&#2367;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2360;&#2375;&#2357;&#2366; &#2325;&#2375; &#2327;&#2336;&#2344; &#2361;&#2375;&#2340;&#2369; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;</span>",
      "<span class=\"eqt\">A Money Bill to levy a surcharge on income tax</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2325;&#2352; &#2346;&#2352; &#2309;&#2343;&#2367;&#2349;&#2366;&#2352; &#2354;&#2327;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2343;&#2344; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;</span>",
      "<span class=\"eqt\">A Bill to reorganize the territories of a State</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2366; &#2346;&#2369;&#2344;&#2352;&#2381;&#2327;&#2336;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;</span>",
      "<span class=\"eqt\">A Bill to increase the sanctioned strength of Supreme Court judges</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2368; &#2360;&#2381;&#2357;&#2368;&#2325;&#2371;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Joint sitting under Article 108 applies only to ordinary bills; Money Bills are outside its scope because their passage is governed by special procedures (Article 109) where the Rajya Sabha has only a recommendatory role. Therefore, a Money Bill cannot be referred to a joint sitting.</p><p>- \"A\": Ordinary bill; joint sitting is possible if conditions of deadlock are met (rejection, six-month delay, or final disagreement on amendments).</p><p>- \"C\": Reorganization is done via an ordinary bill under Articles 3 - 4; joint sitting is possible if deadlock conditions arise.</p><p>- \"D\": An ordinary bill; may go to joint sitting if deadlock criteria are satisfied.</p><p>Further Insights:</p><p>- Constitutional Amendment Bills (Article 368) cannot be referred to a joint sitting.</p><p>- Quorum at a joint sitting is one-tenth of the total number of members of both Houses.</p><p>- At a joint sitting, decisions are by a simple majority of members present and voting.</p><p>- The Speaker of the Lok Sabha presides over a joint sitting; in their absence, the Deputy Speaker, and failing that, the Deputy Chairman of the Rajya Sabha.</p>",
    "question_index": 119

    "question": "<span class=\"eqt\"><p>Which of the following statements about Pradhan Mantri Mudra Yojana is/are NOT true?</p><p>I. The scheme facilitates micro credit/Loan up to Rs. 50 lakhs to income generating micro enterprises engaged in the non farm sector.</p><p>II. The loans under Pradhan Mantri Mudra Yojana can be availed through both Public sector and Private Sector banks.</p><p>III. The scheme has been classified under three categories as 'SHISHU', 'KISHORE' and 'TARUN' to signify the stage of growth / development and funding needs of the beneficiary micro unit/ entrepreneur.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2351;&#2361; &#2351;&#2379;&#2332;&#2344;&#2366; &#2327;&#2376;&#2352;-&#2325;&#2371;&#2359;&#2367; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2354;&#2327;&#2375; &#2310;&#2351; &#2360;&#2371;&#2332;&#2344; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350; &#2313;&#2342;&#2381;&#2351;&#2350;&#2379;&#2306; &#2325;&#2379; 50 &#2354;&#2366;&#2326; &#2352;&#2369;&#2346;&#2351;&#2375; &#2340;&#2325; &#2325;&#2375; &#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350; &#2315;&#2339;/&#2354;&#2379;&#2344; &#2325;&#2368; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2315;&#2339; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2324;&#2352; &#2344;&#2367;&#2332;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2319; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>III. &#2354;&#2366;&#2349;&#2366;&#2352;&#2381;&#2341;&#2368; &#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350; &#2311;&#2325;&#2366;&#2312;/&#2313;&#2342;&#2381;&#2351;&#2350;&#2368; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;/&#2357;&#2367;&#2325;&#2366;&#2360; &#2324;&#2352; &#2357;&#2367;&#2340;&#2381;&#2340;&#2346;&#2379;&#2359;&#2339; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2330;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2311;&#2360; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2379; '&#2358;&#2367;&#2358;&#2369;', '&#2325;&#2367;&#2358;&#2379;&#2352;' &#2324;&#2352; '&#2340;&#2352;&#2369;&#2339;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2358;&#2381;&#2352;&#2375;&#2339;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"

    "correct_option_id": 2,
    "solution": "<p>Pradhan Mantri Mudra Yojana (PMMY) is a flagship scheme of the Government of India. The scheme facilitates micro credit/Loan up to Rs. 10 lakhs to income generating micro enterprises engaged in the non farm sector in manufacturing, trading or service sectors including activities allied to agriculture such as poultry, dairy, beekeeping, etc.</p><p>The loans under Pradhan Mantri Mudra Yojana can be availed through eligible Member Lending Institutions (MLIs), which include: Public Sector Banks Private Sector Banks State operated cooperative banks Rural banks from regional sector Micro Finance Institution Non-Banking Finance Company Small Finance Banks (SFBs) Other financial intermediary approved by Mudra Ltd.</p><p>The scheme has been classified under three categories as 'SHISHU', 'KISHORE' and 'TARUN' to signify the stage of growth / development and funding needs of the beneficiary micro unit/ entrepreneur. Shishu: Covering loans upto Rs.50,000/-. Kishore: Covering loans above Rs.50,000/- and upto Rs. 5 lakhs. Tarun: Covering loans above Rs. 5 lakhs and upto Rs. 10 lakhs.</p><p>In news:</p><p>Small business loans under the Pradhan Mantri Mudra Yojana witnessed record growth in disbursals in FY24 and also crossed the milestone of Rs.5 lakh crore, according to latest Government data. Loan disbursal under PMMY reached a record high of Rs 5.20 lakh crore in the year ended March 2024, marking a significant increase from Rs 4.40 lakh crore in previous financial year.</p>",
    "question_index": 120
  },

    "question": "<span class=\"eqt\"><p>Which of the following is/are characteristic of the image formed by the Plane mirror?</p><p>i) Virtual and Erect</p><p>ii) Size of the image is bigger than size of object</p><p>iii) Image is formed as far behind the mirror as the object is in front of it.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2360;&#2350;&#2340;&#2354; &#2342;&#2352;&#2381;&#2346;&#2339; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>i) &#2310;&#2349;&#2366;&#2360;&#2368; &#2324;&#2352; &#2360;&#2368;&#2343;&#2366;</p><p>ii) &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2350;&#2381;&#2348; &#2325;&#2366; &#2310;&#2325;&#2366;&#2352;, &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</p><p>iii) &#2357;&#2360;&#2381;&#2340;&#2369; &#2342;&#2352;&#2381;&#2346;&#2339; &#2325;&#2375; &#2332;&#2367;&#2340;&#2344;&#2366; &#2360;&#2366;&#2350;&#2344;&#2375; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348; &#2313;&#2340;&#2344;&#2366; &#2361;&#2368; &#2346;&#2368;&#2331;&#2375; &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only i and ii</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">Only ii and iii</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">Only i and iii</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Image</b></p><p>&bull; Image is the point where atleast two light rays actually meet or appear to meet. </p><p><b>These are two types of images</b></p><p><b>Real image</b>:</p><p>&bull; Image formed light rays actually meet. </p><p>&bull; It can be obtained on screen</p><p>&bull; Image formed is inverted image</p><p>&bull; E.g., image formed on cinema screen</p><p><b>Virtual Image</b></p><p>&bull; Image formed when light rays appear to meet.</p><p>&bull; Can't obtained on screen</p><p>&bull; Image formed is Erect</p><p>&bull; E.g., image formed by Plane mirror</p><p><b>Characteristics of Image formed by Plane Mirror</b></p><p>&bull; It always formed virtual and erect image</p><p>&bull; Size of image is equal to the size of the object.</p><p>&bull; Image formed is formed as far behind the mirror as the object is in front of it. </p><p>&bull; Image formed is laterally inverted.</p><p><img width=473 height=265 id=image3.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25697/image002.png\" ></p><p>Image source ncert</p>",

    "question": "<span class=\"eqt\"><p>Which two groups of the periodic table does carbon resemble in its properties?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2309;&#2346;&#2344;&#2375; &#2327;&#2369;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2375; &#2325;&#2367;&#2344; &#2342;&#2379; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2340;&#2366; &#2332;&#2369;&#2354;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Group 1 (Alkali Metals) and Group 2 (Alkaline Earth Metals)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 1 (&#2325;&#2381;&#2359;&#2366;&#2352;&#2368;&#2351; &#2343;&#2366;&#2340;&#2369;) &#2324;&#2352; &#2360;&#2350;&#2370;&#2361; 2 (&#2325;&#2381;&#2359;&#2366;&#2352;&#2368;&#2351; &#2350;&#2371;&#2342;&#2366; &#2343;&#2366;&#2340;&#2369;)</span>",
      "<span class=\"eqt\">Group 14 (Carbon Group) and Group 16 (Chalcogens)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 14 (&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2360;&#2350;&#2370;&#2361;) &#2324;&#2352; &#2360;&#2350;&#2370;&#2361; 16 (&#2330;&#2366;&#2354;&#2381;&#2325;&#2379;&#2332;&#2344;)</span>",
      "<span class=\"eqt\">Group 15 (Nitrogen Group) and Group 17 (Halogens)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 15 (&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2360;&#2350;&#2370;&#2361;) &#2324;&#2352; &#2360;&#2350;&#2370;&#2361; 17 (&#2361;&#2376;&#2354;&#2379;&#2332;&#2344;)</span>",
      "<span class=\"eqt\">Group 13 (Boron Group) and Group 18 (Noble Gases)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 13 (&#2348;&#2379;&#2352;&#2379;&#2344; &#2360;&#2350;&#2370;&#2361;) &#2324;&#2352; &#2360;&#2350;&#2370;&#2361; 18 (&#2313;&#2340;&#2381;&#2325;&#2371;&#2359;&#2381;&#2335; &#2327;&#2376;&#2360;&#2375;&#2306;)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Group 14 (Carbon Group) and Group 16 (Chalcogens) is the correct answer.</p><p>While carbon is in Group 14, it can also form compounds similar to those of Group 16 elements.</p><p>Group 14 (Carbon Group)</p><p>Position: Carbon is in Group 14, which includes elements like silicon (Si), germanium (Ge), tin (Sn), and lead (Pb).</p><p>Similarities:</p><p>Tetravalency: Carbon has four valence electrons and typically forms four covalent bonds, allowing it to create a vast array of organic compounds. Other Group 14 elements also share similar bonding characteristics, though their reactivity varies.</p><p>Allotropes: Carbon has several allotropes (e.g., graphite, diamond, graphene), and its behavior in forming different structures is mirrored in silicon and other Group 14 elements.</p><p>Group 16 (Chalcogens)</p><p>Position: This group includes oxygen (O), sulfur (S), selenium (Se), tellurium (Te), and polonium (Po).</p><p>Similarities:</p><p>Covalent Compounds: Carbon can form covalent compounds with elements from Group 16, such as carbon dioxide (CO&#8322;) and carbon disulfide (CS&#8322;).</p><p>Functional Groups: In organic chemistry, carbon often forms functional groups with oxygen (like alcohols and carboxylic acids) and sulfur (like thiols), demonstrating reactivity that parallels Group 16 elements.</p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>The inner transition elements are found in which block of the periodic table?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339; &#2340;&#2340;&#2381;&#2357; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2375; &#2325;&#2367;&#2360; &#2348;&#2381;&#2354;&#2377;&#2325; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">f-block</span><span class=\"hqt\" style=\"display:none\">f-&#2348;&#2381;&#2354;&#2377;&#2325;</span>",
      "<span class=\"eqt\">d-block</span><span class=\"hqt\" style=\"display:none\">d-&#2348;&#2381;&#2354;&#2377;&#2325;</span>",
      "<span class=\"eqt\">s-block</span><span class=\"hqt\" style=\"display:none\">s-&#2348;&#2381;&#2354;&#2377;&#2325;</span>",
      "<span class=\"eqt\">p-block</span><span class=\"hqt\" style=\"display:none\">p-&#2348;&#2381;&#2354;&#2377;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The inner transition elements are found in the <b>f-block</b> of the periodic table. These elements are characterized by the filling of electrons in the f-orbitals of the ante-penultimate energy level (the (n-2)f shell, where n is the principal quantum number of the outermost shell).</p><p>Explanation of Other Options:</p><p>(b) d-block: These are the transition elements, where the differentiating electron enters the d-orbitals of the penultimate shell. They are located between the s-block and p-block in the main body of the periodic table.</p><p>(c) s-block: These are the alkali metals (Group 1) and alkaline earth metals (Group 2), where the valence electron(s) are in the s-orbital.</p><p>(d) p-block: These are elements in Groups 13 to 18, where the valence electrons fill the p-orbitals.</p><p>Further insights:</p><p>The f-block elements consist of two series:</p><p>Lanthanides (or Lanthanoids): The series of 14 elements following Lanthanum (atomic numbers 58 to 71), where the 4f subshell is progressively filled.</p><p>Actinides (or Actinoids): The series of 14 elements following Actinium (atomic numbers 90 to 103), where the 5f subshell is progressively filled.</p><p>The inner transition elements are placed separately at the bottom of the main periodic table to avoid making the table excessively wide and to maintain a more organized structure.</p><p>Many of these elements, particularly the actinides, are radioactive.</p>",
    "question_index": 123
  },

    "question": "<span class=\"eqt\"><p>As per Census 2011, which Indian state had the highest proportion of urban population?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2327;&#2339;&#2344;&#2366; 2011 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2325;&#2367;&#2360; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2358;&#2361;&#2352;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Goa</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2357;&#2366;</span>",
      "<span class=\"eqt\">Maharashtra</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>",
      "<span class=\"eqt\">Mizoram</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2332;&#2379;&#2352;&#2350;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>\"Goa\" recorded the highest urbanization among Indian states in Census 2011, with about 62.2% of its population living in urban areas. This exceeded other highly urbanized states such as Tamil Nadu and Maharashtra.</p><p>Incorrect options:</p><p>- \"Maharashtra\": Urban population share ~45.2% (2011); large absolute urban population due to Mumbai - Pune region.</p><p>- \"Tamil Nadu\": Urban population share ~48.5% (2011); one of the most urbanized large states.</p><p>- \"Mizoram\": Urban population share ~51.5% (2011); highest in the Northeast but below Goa.</p><p>Further Insights:</p><p>- All-India level urbanization in 2011 was ~31.2%; rural ~68.8%.</p><p>- Among UTs, Chandigarh and NCT of Delhi exceeded 97% urban in 2011.</p><p>- States with the lowest urbanization (2011): Himachal Pradesh (~10.0%) and Bihar (~11.3%).</p><p>- \"Census Towns\" (statutorily rural but urban by characteristics) rose sharply between 2001 and 2011, contributing to measured urbanization.</p><p>- Census 2011 \"urban\" definition includes statutory towns and census towns meeting population, density, and non-agricultural workforce thresholds.</p>",
    "question_index": 124
  },

    "question": "<span class=\"eqt\"><p>Gross National Product is obtained by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2325;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (GNP) &#2325;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; :</p></span>",
    "options": [
      "<span class=\"eqt\">Adding net factor income from abroad to the Gross Domestic Product.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (GDP) &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2375;&#2358;&#2379;&#2306; &#2360;&#2375; &#2344;&#2367;&#2357;&#2354; &#2360;&#2366;&#2343;&#2344; &#2310;&#2351; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2325;&#2352;&#2404;</span>",
      "<span class=\"eqt\">Subtracting net factor income from abroad from the Gross Domestic Product.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (GDP) &#2350;&#2375;&#2306; &#2360;&#2375; &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2344;&#2367;&#2357;&#2354; &#2360;&#2366;&#2343;&#2344; &#2310;&#2351; &#2328;&#2335;&#2366;&#2325;&#2352;&#2404;</span>",
      "<span class=\"eqt\">Adding income from borrowings to the Gross Domestic Product.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (GDP) &#2350;&#2375;&#2306; &#2313;&#2343;&#2366;&#2352; &#2360;&#2375; &#2310;&#2351; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2325;&#2352;&#2404;</span>",
      "<span class=\"eqt\">Subtracting depreciation from the Gross Domestic Product.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; (GDP) &#2350;&#2375;&#2306; &#2360;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351;&#2361;&#2381;&#2352;&#2366;&#2360; &#2328;&#2335;&#2366;&#2325;&#2352;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Gross National Product (GNP) is Gross Domestic Product (GDP) plus net factor income from abroad. It measures the monetary value of all the finished goods and services produced by the country's factors of production irrespective of their location.</p>",
    "question_index": 125
  },

    "question": "<span class=\"eqt\"><p>Read the following statements about Alluvial Soils and Choose the correct option.</p><p>I. Alluvial Soil covers about 40 per cent of the total area of the country.</p><p>II. Alluvial Soils are generally rich in potash but poor in phosphorous.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2354;&#2379;&#2338;&#2364; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>I. &#2332;&#2354;&#2379;&#2338;&#2364; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2342;&#2375;&#2358; &#2325;&#2375; &#2325;&#2369;&#2354; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2366; &#2354;&#2327;&#2349;&#2327; 40 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;&#2404;</p><p>II. &#2332;&#2354;&#2379;&#2338;&#2364; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2346;&#2379;&#2335;&#2366;&#2358; &#2360;&#2375; &#2360;&#2350;&#2371;&#2342;&#2381;&#2343; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2347;&#2377;&#2360;&#2381;&#2347;&#2379;&#2352;&#2360; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2313;&#2360;&#2350;&#2375;&#2306; &#2325;&#2350; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Alluvial soils are widespread in the northern plains and the river valleys. These soils cover about 40 per cent of the total area of the country. They are depositional soils, transported and deposited by rivers and streams. The alluvial soils vary in nature from sandy loam to clay. They are generally rich in potash but poor in phosphorous. In the Upper and Middle Ganga plain, two different types of alluvial soils have developed, viz. Khadar and Bhangar. Khadar is the new alluvium and is deposited by floods annually, which enriches the soil by depositing fine silts. Bhangar represents a system of older alluvium, deposited away from the flood plains.</p>",
    "question_index": 127
  },

    "question": "<span class=\"eqt\"><p>Match List I with List II and select the answer from the codes given below.<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List I(2024 Ramon Magsaysay Award Winners) </td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List II(Nationality) </td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a . Hayao Miyazaki</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Bhutan</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Phuntsho Karma </td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Vietnam</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Nguyen Thi Ngoc Phuong </td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Japan </td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Rural Doctors Movement</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv.Thailand.</td></tr></table></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2330;&#2368; I &#2325;&#2379; &#2360;&#2370;&#2330;&#2368; II &#2360;&#2375; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2360;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2367;&#2319;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; I(2024 &#2352;&#2375;&#2350;&#2344; &#2350;&#2376;&#2327;&#2381;&#2360;&#2375;&#2360;&#2375; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2357;&#2367;&#2332;&#2375;&#2340;&#2366;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2330;&#2368; II(&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351;&#2340;&#2366;)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a . &#2361;&#2351;&#2366;&#2323; &#2350;&#2367;&#2351;&#2366;&#2332;&#2364;&#2366;&#2325;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2349;&#2370;&#2335;&#2366;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2347;&#2369;&#2306;&#2335;&#2358;&#2379; &#2325;&#2352;&#2381;&#2350;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2357;&#2367;&#2351;&#2340;&#2344;&#2366;&#2350;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2327;&#2369;&#2351;&#2375;&#2344; &#2341;&#2368; &#2344;&#2379;&#2325; &#2347;&#2369;&#2323;&#2306;&#2327;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2332;&#2366;&#2346;&#2366;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2330;&#2367;&#2325;&#2367;&#2340;&#2381;&#2360;&#2325; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2341;&#2366;&#2312;&#2354;&#2376;&#2306;&#2337;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">a-iii, b-i, c-ii, d-iv</span><span class=\"hqt\" style=\"display:none\">a-iii, b-i, c-ii, d-iv</span>",
      "<span class=\"eqt\">a-ii, b-iii, c-iv, d-i</span><span class=\"hqt\" style=\"display:none\">a-ii, b-iii, c-iv, d-i</span>",
      "<span class=\"eqt\">a-i, b-iv, c-ii, d-iii</span><span class=\"hqt\" style=\"display:none\">a-i, b-iv, c-ii, d-iii</span>",
      "<span class=\"eqt\">a-i, b-ii, c-iii, d-iv</span><span class=\"hqt\" style=\"display:none\">a-i, b-ii, c-iii, d-iv</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Since its inception in 1957, more than 300 people and 26 organisations hailing from 22 Asian nations have won the Ramon Magsaysay Award. The honorees this year are: Japanese animator Hayao Miyazaki, Bhutanese scholar and social worker Phuntsho Karma, Vietnamese doctor Nguyen Thi Ngoc Phuong, who works for victims of Agent Orange used during the Vietnam War, Indonesian conservationist Farhan Farwiza, founder of Yayasan Hutan Alam dan Lingkungan Aceh (HAkA), dedicated to preserving the Leuser ecosystem, and the Rural Doctors Movement from Thailand.</p><p></p><p>About the award:</p><p>Often called Asia's Nobel Prize, the Ramon Magsaysay Award was instituted in 1957 in the memory of the late Ramon Magsaysay, the former President of Philippines who died in March that year in a plane crash Mr. Magsaysay was known for leading the charge against the communist Hukbahalap or Huk movement and was popular among his people. The first awards were given out in 1958, in five categories. Winning the first award for Community Leadership was Indian freedom fighter Acharya Vinoba Bhave, who led the Bhoodan movement. In 2008, these five categories were discontinued. But a new category, the Ramon Magsaysay Award for Emergent Leadership, has been introduced since 2009.</p><p></p><p></p><p></p><p></p><p></p><p></p>",
    "question_index": 128
  },

    "question": "<span class=\"eqt\"><p>In the reference to the wind system, when the South-east wind crosses the equator its direction changes to _______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2357;&#2344; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2332;&#2348; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2346;&#2357;&#2344; &#2349;&#2370;&#2350;&#2343;&#2381;&#2351; &#2352;&#2375;&#2326;&#2366; &#2325;&#2379; &#2346;&#2366;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2368; &#2342;&#2367;&#2358;&#2366; _______ &#2350;&#2375;&#2306; &#2348;&#2342;&#2354; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Northwest wind</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2346;&#2357;&#2344;</span>",
      "<span class=\"eqt\">Southwest wind</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2346;&#2357;&#2344;</span>",
      "<span class=\"eqt\">Northeast wind</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2346;&#2357;&#2344;</span>",
      "<span class=\"eqt\">Southern wind</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2368; &#2346;&#2357;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; When the Southeast wind crosses the equator its direction changes to Southwest wind which is primarily responsible for bringing monsoon to India.</p><p>Further Insight:</p><p>&bull; Southwest Monsoon</p><p>&#9675; Occurs from June to September, primarily affecting the western coast and northeastern India.</p><p>&#9675; Driven by the southwest winds from the Arabian Sea, bringing heavy rainfall.</p><p>&#9675; Responsible for approximately 75% of India's annual rainfall, crucial for agriculture.</p><p>&#9675; Characterized by a sudden onset, with intense rainfall in June and tapering off in September.</p><p>&#9675; Key regions affected include Kerala, Karnataka, Maharashtra, and parts of North India.</p><p>&bull; Northeast Monsoon</p><p>&#9675; Occurs from October to December, mainly affecting southeastern India, particularly Tamil Nadu.</p><p>&#9675; Results from the northeast trade winds, bringing moisture from the Bay of Bengal.</p><p>&#9675; Provides vital rainfall after the southwest monsoon, especially for rabi crops.</p><p>&#9675; Characterized by continuous rainfall over several days, with a peak in November.</p><p>&#9675; Regions most impacted include Tamil Nadu, parts of Andhra Pradesh, and Kerala.</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following types of firewall operates at the Network layer to examine incoming and outgoing packets?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2347;&#2364;&#2366;&#2351;&#2352;&#2357;&#2377;&#2354; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2311;&#2344;&#2325;&#2350;&#2367;&#2306;&#2327; &#2324;&#2352; &#2310;&#2313;&#2335;&#2327;&#2379;&#2311;&#2306;&#2327; &#2346;&#2376;&#2325;&#2375;&#2335;&#2381;&#2360; &#2325;&#2368; &#2332;&#2366;&#2306;&#2330; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2354;&#2375;&#2351;&#2352; &#2346;&#2352; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Circuit - level gateway</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2325;&#2367;&#2335;-&#2354;&#2375;&#2357;&#2354; &#2327;&#2375;&#2335;&#2357;&#2375;</span>",
      "<span class=\"eqt\">Application - level gateway</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2346;&#2381;&#2354;&#2368;&#2325;&#2375;&#2358;&#2344;-&#2354;&#2375;&#2357;&#2354; &#2327;&#2375;&#2335;&#2357;&#2375;</span>",
      "<span class=\"eqt\">Packet filtering</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2376;&#2325;&#2375;&#2335; &#2347;&#2364;&#2367;&#2354;&#2381;&#2335;&#2352;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Network filtering</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2347;&#2364;&#2367;&#2354;&#2381;&#2335;&#2352;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The type of firewall that operates at the Network layer and examines incoming and outgoing packets is a Packet Filtering firewall.</p><p></p><p>Circuit-level gateway: Operates at the session layer and monitors the TCP handshake to determine if a connection should be allowed.</p><p>Application-level gateway: Operates at the application layer, inspecting traffic specific to application protocols (like HTTP, FTP) and often acting as a proxy.</p><p>Packet filtering: Operates at the network layer (Layer 3) and inspects packets based on rules such as source/destination IP address, port number, and protocol. It doesn't examine the contents of the packets, only the headers.</p><p>Network filtering: This term is not commonly used to describe a specific firewall type. It might refer to a more general concept of filtering network traffic but isn't a recognized firewall category in itself.</p><p></p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>What is the primary role of the Control Unit (CU) in a CPU? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2350;&#2375;&#2306; &#2325;&#2306;&#2335;&#2381;&#2352;&#2379;&#2354; &#2351;&#2370;&#2344;&#2367;&#2335; (CU) &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2349;&#2370;&#2350;&#2367;&#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Perform arithmetic calculations</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2325;&#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Control sequential instruction execution</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Store intermediate results</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351;&#2357;&#2352;&#2381;&#2340;&#2368; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Generate clock pulses</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2337;&#2364;&#2368; &#2346;&#2354;&#2381;&#2360; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The primary role of the Control Unit (CU) in a CPU is <b>Control sequential instruction execution</b>.</p><p>The Control Unit is like the \"brain\" of the CPU. It fetches instructions from memory, decodes them, and then directs other components of the CPU, such as the Arithmetic Logic Unit (ALU), to perform the necessary actions in the correct sequence. It essentially manages the flow of data and instructions within the CPU. </p><p>Further insights:</p><p>&#183; <b>Perform arithmetic calculations:</b> This is the job of the Arithmetic Logic Unit (ALU). </p><p>&#183; <b>Store intermediate results:</b> This is typically done by registers within the CPU or by main memory.</p><p>&#183; <b>Generate clock pulses:</b> While the Control Unit relies on clock pulses for timing, the generation of these pulses is usually handled by a separate clock generator circuit.</p>",
    "question_index": 131
  },
  {
    "question": "<span class=\"eqt\"><p>Which one of the following statements regarding cache memory is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It is faster than Random Access Memory.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2352;&#2376;&#2306;&#2337;&#2350; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2360;&#2375; &#2340;&#2375;&#2332; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is placed between the CPU and the primary memory.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; CPU &#2324;&#2352; &#2346;&#2381;&#2352;&#2366;&#2311;&#2350;&#2352;&#2368; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It reduces the data access time.</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2337;&#2375;&#2335;&#2366; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2360;&#2350;&#2351; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>RAM is faster than secondary storage, but not as fast as a computer processor. So, because of RAM, a CPU may have to slow down. To speed up the operations of the CPU, a very high speed memory is placed between the CPU and the primary memory known as cache. It stores the copies of the data from frequently accessed primary memory locations, thus, reducing the average time required to access data from primary memory. When the CPU needs some data, it first examines the cache. In case the requirement is met, it is read from the cache, otherwise the primary memory is accessed.</p>",
    "question_index": 132
  },
  {

    "solution": "<p>Shift+F7: <b>Open the thesaurus</b>. If you have a word selected, Shift+F7 looks up that word in the thesaurus.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ctrl + F</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Searches the document</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">F7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Runs a spelling and Grammar Check</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ctrl + Z</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Undo an Action</td></tr></table>",
    "question_index": 133

  {
    "question": "<span class=\"eqt\"><p>Content Access Software, and Educational Software are examples of:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2335;&#2375;&#2306;&#2335; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2324;&#2352; &#2319;&#2332;&#2369;&#2325;&#2375;&#2358;&#2344;&#2354; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2325;&#2367;&#2360;&#2325;&#2375; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Application Software</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2346;&#2381;&#2354;&#2368;&#2325;&#2375;&#2358;&#2344; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Utility Software</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2335;&#2367;&#2354;&#2367;&#2335;&#2368; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">System Software</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Application software is a program or group of programs designed for end users. </p><p>While system software consists of low-level programs that interact with computers at a basic level, application software resides above system software and includes applications such as database programs, word processors and spreadsheets</p><p>Different types of application software include:</p><p>i. Application Suite: Has multiple applications bundled together. Related functions, features and user interfaces interact with each other.</p><p>ii. Enterprise Software: Addresses an organization's needs and data flow in a huge distributed environment</p><p>iii. Enterprise Infrastructure Software: Provides capabilities required to support enterprise software systems</p><p>iv. Information Worker Software: Addresses individual needs required to manage and create information for individual projects within departments</p><p>v. Content Access Software: Used to access content and addresses a desire for published digital content and entertainment</p><p>vi. Educational Software: Provides content intended for use by students</p><p>vii. Media Development Software: Addresses individual needs to generate and print electronic media for others to consume.</p>",
    "question_index": 134
  },
  {
    "question": "<span class=\"eqt\"><p>The process of causing the CPU to step through a series of micro-operations is called as _______________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2368;&#2346;&#2368;&#2351;&#2370; &#2325;&#2379; &#2360;&#2370;&#2325;&#2381;&#2359;&#2381;&#2350;-&#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2368; &#2319;&#2325; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; _______________ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Sequencing</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2325;&#2381;&#2357;&#2375;&#2306;&#2360;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Pipelining</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2346;&#2354;&#2366;&#2311;&#2344;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Runtime</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2344;&#2335;&#2366;&#2311;&#2350;</span>",
      "<span class=\"eqt\">Execution</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2327;&#2381;&#2332;&#2368;&#2325;&#2381;&#2351;&#2370;&#2358;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Sequencing is the process of causing the CPU to step through a series of micro-operations. Execution causes the performance of each micro-operation. Runtime is a system used primarily in software development to describe the period of time during which a program is running. Pipelining is the process of storing and prioritizing computer instructions that the processor executes.</p>",
    "question_index": 135
  },
  {

48; &#2348;&#2381;&#2352;&#2366;&#2313;&#2332;&#2364;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. MS DOS</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2360;&#2347;&#2366;&#2352;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2319;&#2346;&#2381;&#2354;&#2368;&#2325;&#2375;&#2358;&#2344; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2348;&#2367;&#2306;&#2327;</td></tr></table></span>",

      "<span class=\"eqt\">(A, iii), (B, iv), (C, i), (D, ii)</span><span class=\"hqt\" style=\"display:none\">(A, iii), (B, iv), (C, i), (D, ii)</span>"

    "correct_option_id": 0,
    "solution": "<p>The correct pair of computer utilities and their examples are given below.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Search Engine</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bing</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Web Browser</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Safari</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. System Software</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">MS DOS</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Application Software</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Spreadsheet</td></tr></table>",

  {
    "question": "<span class=\"eqt\"><p>Which protocol is commonly used for secure file transfer and is often utilized for downloading and uploading files to a remote server?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344;-&#2360;&#2366; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2347;&#2364;&#2366;&#2311;&#2354; &#2335;&#2381;&#2352;&#2366;&#2306;&#2360;&#2347;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2325;&#2381;&#2360;&#2352; &#2352;&#2367;&#2350;&#2379;&#2335; &#2360;&#2352;&#2381;&#2357;&#2352; &#2346;&#2352; &#2347;&#2364;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2379; &#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2309;&#2346;&#2354;&#2379;&#2337; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">HTTP</span><span class=\"hqt\" style=\"display:none\">HTTP</span>",
      "<span class=\"eqt\">SMTP</span><span class=\"hqt\" style=\"display:none\">SMTP</span>",
      "<span class=\"eqt\">FTPS</span><span class=\"hqt\" style=\"display:none\">FTPS</span>",
      "<span class=\"eqt\">IMAP</span><span class=\"hqt\" style=\"display:none\">IMAP</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>FTPS (File Transfer Protocol Secure) is a secure protocol used for file transfer, ensuring the confidentiality and integrity of data during uploading and downloading.</p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>___________is an input device used to enter motion data into computers or other electronic devices.</p></span><span class=\"hqt\" style=\"display:none\"><p>___________&#2319;&#2325; &#2311;&#2344;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2351;&#2366; &#2309;&#2344;&#2381;&#2351; &#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2367;&#2325; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2379;&#2358;&#2344; &#2337;&#2375;&#2335;&#2366; &#2342;&#2352;&#2381;&#2332; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Touch Screen</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2330; &#2360;&#2381;&#2325;&#2381;&#2352;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Trackball</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2376;&#2325;&#2348;&#2377;&#2354;</span>",
      "<span class=\"eqt\">Light Pen</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2311;&#2335; &#2346;&#2375;&#2344;</span>",
      "<span class=\"eqt\">Plotter</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2377;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A trackball is an input device used to enter motion data into computers or other electronic devices. It serves the same purpose as a mouse, but is designed with a moveable ball on the top, which can be rolled in any direction.</p><p></p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>______________ is a kind of memory that retains data in the absence of a power supply.</p></span><span class=\"hqt\" style=\"display:none\"><p>______________ &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2361;&#2376; &#2332;&#2379; &#2348;&#2367;&#2332;&#2354;&#2368; &#2325;&#2368; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2368; &#2309;&#2344;&#2369;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2367;&#2340; &#2352;&#2326;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Register Memory</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Cache Memory</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2358; &#2350;&#2376;&#2350;&#2379;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Flash memory</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2354;&#2376;&#2358; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Virtual memory</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2330;&#2369;&#2309;&#2354; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Flash memory is a type of non-volatile computer storage that retains data even when the power supply is disconnected. It is commonly used in a wide range of electronic devices, including USB drives, solid-state drives (SSDs), memory cards, smartphones, digital cameras, and more. </p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following activities can result in a Trojan horse virus infected computer?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2361;&#2377;&#2352;&#2381;&#2360; &#2357;&#2366;&#2351;&#2352;&#2360; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2367;&#2340; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Downloading a paid programme from a site which claims to offer it for free</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2320;&#2360;&#2375; &#2360;&#2366;&#2311;&#2335; &#2360;&#2375; &#2319;&#2325; &#2346;&#2375;&#2337; &#2346;&#2381;&#2352;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337; &#2325;&#2352;&#2344;&#2366; &#2332;&#2379; &#2311;&#2360;&#2375; &#2344;&#2367;&#2358;&#2369;&#2354;&#2381;&#2325; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2342;&#2366;&#2357;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Downloading a pirated game</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2366;&#2351;&#2352;&#2375;&#2335;&#2375;&#2337; &#2327;&#2375;&#2350; &#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Downloading a screensaver from an infected screensaver website</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2367;&#2340; &#2360;&#2381;&#2325;&#2381;&#2352;&#2368;&#2344;&#2360;&#2375;&#2357;&#2352; &#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335; &#2360;&#2375; &#2360;&#2381;&#2325;&#2381;&#2352;&#2368;&#2344;&#2360;&#2375;&#2357;&#2352; &#2337;&#2366;&#2313;&#2344;&#2354;&#2379;&#2337; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A trojan horse is a program appearing to be something safe, but is performing malicious tasks, such as giving access to your computer or sending personal information to other computers. </p><p>Trojan horses are one of the most common methods a computer criminal uses to infect your computer and collect personal information from your computer.</p><p><b><i><u>Instances of how your computer could become infected with a Trojan horse:</u></i></b></p><p>&#216; A site offers a free download to a program or game that normally costs money. Downloading the pirated program or game allows you to illegally use or play, however, during the install, it also installs a Trojan horse on the computer.</p><p>&#216; A popular screen saver website has become infected or uploaded infected screen savers. Downloading the screen saver to your computer also installs a Trojan horse onto the computer.</p><p>&#216; You receive an e-mail that appears to be from a friend asking you to view this fantastic new program or look at a file. Opening the file infects your computer with a Trojan horse.</p><p>&#216; A friends Facebook account is hacked and has sent out personalized messages telling all their friends to see this exciting new video. Opening the video requests a download with a hidden Trojan horse that infects your computer.</p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a function of the modem in computer networks?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2350;&#2377;&#2337;&#2375;&#2350; &#2325;&#2366; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">It converts the digital signal from the computer into an analogue signal</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2360;&#2367;&#2327;&#2381;&#2344;&#2354; &#2325;&#2379; &#2319;&#2344;&#2366;&#2354;&#2377;&#2327; &#2360;&#2367;&#2327;&#2381;&#2344;&#2354; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It converts the digital signal from the telephone line into an analogue signal</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2335;&#2375;&#2354;&#2368;&#2347;&#2379;&#2344; &#2354;&#2366;&#2311;&#2344; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2360;&#2367;&#2327;&#2381;&#2344;&#2354; &#2325;&#2379; &#2319;&#2344;&#2366;&#2354;&#2377;&#2327; &#2360;&#2367;&#2327;&#2381;&#2344;&#2354; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It assigns a specific address associated with a website</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2319;&#2325; &#2357;&#2375;&#2348;&#2360;&#2366;&#2311;&#2335; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2319;&#2325; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">It is a hypermedia-based software technology allowing consolidation of hypertext, graphics, audio, video and multimedia</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2319;&#2325; &#2361;&#2366;&#2311;&#2346;&#2352;&#2350;&#2368;&#2337;&#2367;&#2351;&#2366; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2360;&#2377;&#2347;&#2381;&#2335;&#2357;&#2375;&#2351;&#2352; &#2340;&#2325;&#2344;&#2368;&#2325; &#2361;&#2376; &#2332;&#2379; &#2361;&#2366;&#2311;&#2346;&#2352;&#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335;, &#2327;&#2381;&#2352;&#2366;&#2347;&#2367;&#2325;&#2381;&#2360;, &#2321;&#2337;&#2367;&#2351;&#2379;, &#2357;&#2368;&#2337;&#2367;&#2351;&#2379; &#2324;&#2352; &#2350;&#2354;&#2381;&#2335;&#2368;&#2350;&#2368;&#2337;&#2367;&#2351;&#2366; &#2325;&#2375; &#2319;&#2325;&#2368;&#2325;&#2352;&#2339; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Modem is short for \"Modulator-Demodulator.\" Modem converts the <b>digital signal from the computer into an analogue signal</b> that can travel through the telephone line. On the other end, this analogue signal is again converted back to digital form by the modem at the destination end. Some computer systems have internal modems (built-in within the motherboard) while in some systems there might be a need to have an external modem to have an internet connection.</p>",
    "question_index": 141
  },
  {
    "question": "<span class=\"eqt\"><p>The _____________ feature in Gmail allows users to send emails at a specific time in the future.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2368;&#2350;&#2375;&#2354; &#2350;&#2375;&#2306; _____________ &#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327;&#2325;&#2352;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2379; &#2349;&#2357;&#2367;&#2359;&#2381;&#2351; &#2350;&#2375;&#2306; &#2319;&#2325; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2360;&#2350;&#2351; &#2346;&#2352; &#2312;&#2350;&#2375;&#2354; &#2349;&#2375;&#2332;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Delay Send</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2354;&#2375; &#2360;&#2375;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Schedule Send</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2375;&#2337;&#2381;&#2351;&#2370;&#2354; &#2360;&#2375;&#2306;&#2337;</span>",

    "correct_option_id": 1,
    "solution": "<p>The \"Schedule Send\" feature in Gmail allows users to send emails at a specific time in the future.</p><p>Scheduled emails are sent based on the timezone you schedule them in and may be sent a few minutes after the scheduled time. One can schedule up to 100 emails.</p><p></p><p></p><p>To schedule an email in Gmail, one can:</p><p>a.Open Gmail</p><p>b.Click Compose</p><p>c.Create your email</p><p>d.Click the Down arrow next to Send</p><p>e.Click Schedule send</p><p></p>",

    "question": "<span class=\"eqt\"><p>Which technology has revolutionized computer memory by providing faster access times, higher capacity, and lower power consumption?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2340;&#2325;&#2344;&#2368;&#2325; &#2344;&#2375; &#2340;&#2375;&#2332; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2335;&#2366;&#2311;&#2350;, &#2313;&#2330;&#2381;&#2330; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2324;&#2352; &#2325;&#2350; &#2348;&#2367;&#2332;&#2354;&#2368; &#2325;&#2368; &#2326;&#2346;&#2340; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2325;&#2375; &#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; &#2354;&#2366; &#2342;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Solid State Drive (SSD)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2377;&#2354;&#2367;&#2337; &#2360;&#2381;&#2335;&#2375;&#2335; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357; (SSD)</span>",
      "<span class=\"eqt\">Hard Disk Drive (HDD)</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2352;&#2381;&#2337; &#2337;&#2367;&#2360;&#2381;&#2325; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357; (HDD)</span>",
      "<span class=\"eqt\">Random Access Memory (RAM)</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2376;&#2306;&#2337;&#2350; &#2319;&#2325;&#2381;&#2360;&#2375;&#2360; &#2350;&#2375;&#2350;&#2379;&#2352;&#2368; (RAM)</span>",
      "<span class=\"eqt\">Magnetic Tape Storage</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2327;&#2381;&#2344;&#2375;&#2335;&#2367;&#2325; &#2335;&#2375;&#2346; &#2360;&#2381;&#2335;&#2379;&#2352;&#2375;&#2332;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In recent years, the evolution of computer memory has been greatly influenced by the introduction of Solid State Drives (SSDs). Unlike traditional Hard Disk Drives (HDDs) that use spinning disks and magnetic heads to store data, SSDs utilize flash memory technology. This advancement has led to significant improvements in computer performance.</p><p>&#61623; SSDs offer faster access times compared to HDDs since there are no moving parts involved in data retrieval. They also provide higher capacity options, allowing for larger storage capabilities in a compact form factor. Additionally, SSDs consume less power, contributing to improved energy efficiency in computer systems.</p><p>&#61623; RAM (Random Access Memory) is a different type of memory used for temporary data storage while the computer is running. It provides fast access to data that the processor needs to perform tasks. However, RAM is volatile and loses its data when the computer is powered off.</p><p>&#61623; Magnetic Tape Storage, although still used in some specialized scenarios, is not a primary technology for computer memory in modern systems. It offers high-capacity storage but has relatively slower access times compared to SSDs and HDDs.</p>",
    "question_index": 146
  },
