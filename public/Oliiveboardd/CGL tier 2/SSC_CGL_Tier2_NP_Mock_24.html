    "question": "<span class=\"eqt\"><p>Identify the correct statement(s) regarding ISRO Missions.</p><p>1) Aditya-L1 studies the Sun from a halo orbit around the Sun - Earth L1 point.</p><p>2) NISAR (NASA - ISRO) is planned for a Sun - Earth L2 orbit.</p><p>3) The Chandrayaan-2 orbiter continues to operate after the lander's crash.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2312;&#2319;&#2360;&#2310;&#2352;&#2323; &#2350;&#2367;&#2358;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>1) &#2310;&#2342;&#2367;&#2340;&#2381;&#2351;-&#2319;&#2354;1 &#2360;&#2370;&#2352;&#2381;&#2351;-&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2319;&#2354;1 &#2348;&#2367;&#2306;&#2342;&#2369; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2319;&#2325; &#2346;&#2381;&#2352;&#2349;&#2366;&#2350;&#2306;&#2337;&#2354; &#2325;&#2325;&#2381;&#2359;&#2366; &#2360;&#2375; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2) &#2319;&#2344;&#2310;&#2312;&#2319;&#2360;&#2319;&#2310;&#2352; (&#2344;&#2366;&#2360;&#2366;-&#2310;&#2312;&#2319;&#2360;&#2310;&#2352;&#2323;) &#2325;&#2379; &#2360;&#2370;&#2352;&#2381;&#2351;-&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2319;&#2354;2 &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2351;&#2379;&#2332;&#2344;&#2366;&#2348;&#2342;&#2381;&#2343; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2330;&#2306;&#2342;&#2381;&#2352;&#2351;&#2366;&#2344;-2 &#2321;&#2352;&#2381;&#2348;&#2367;&#2335;&#2352; &#2354;&#2376;&#2306;&#2337;&#2352; &#2325;&#2375; &#2342;&#2369;&#2352;&#2381;&#2328;&#2335;&#2344;&#2366;&#2327;&#2381;&#2352;&#2360;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2349;&#2368; &#2325;&#2366;&#2350; &#2325;&#2352;&#2344;&#2366; &#2332;&#2366;&#2352;&#2368; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">1, 2 and 3</span><span class=\"hqt\" style=\"display:none\">1, 2 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement 1 is correct: Aditya-L1 operates around L1 for continuous solar observations.</p><p>Statement 2 is incorrect: NISAR is a low Earth orbit (near-polar/Sun-synchronous) mission.</p><p>Statement 3 is correct: The Chandrayaan-2 orbiter remains operational.</p><p>Further Insights:</p><p>- Chandrayaan-3 achieved a soft landing near the lunar south polar region in 2023.</p><p>- LVM3 (GSLV Mk III) is ISRO's heaviest operational launcher.</p><p>- NavIC (IRNSS) provides regional navigation over India and ~1,500 km beyond.</p><p>- Gaganyaan targets human spaceflight in LEO with uncrewed test flights preceding crewed missions.</p>",
    "question_index": 121
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct statement(s).</p><p>I. Static friction increases with the applied force up to its maximum limit.</p><p>II. When motion begins, the friction drops to kinetic friction, usually less than maximum static friction.</p><p>III. Kinetic friction is independent of the normal reaction.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2360;&#2381;&#2341;&#2376;&#2340;&#2367;&#2325; &#2328;&#2352;&#2381;&#2359;&#2339; &#2354;&#2327;&#2366;&#2319; &#2327;&#2319; &#2348;&#2354; &#2325;&#2375; &#2360;&#2366;&#2341; &#2309;&#2346;&#2344;&#2368; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2360;&#2368;&#2350;&#2366; &#2340;&#2325; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2332;&#2348; &#2327;&#2340;&#2367; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2328;&#2352;&#2381;&#2359;&#2339; &#2327;&#2340;&#2367;&#2332; &#2328;&#2352;&#2381;&#2359;&#2339; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2360;&#2381;&#2341;&#2376;&#2340;&#2367;&#2325; &#2328;&#2352;&#2381;&#2359;&#2339; &#2360;&#2375; &#2325;&#2350; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2327;&#2340;&#2367;&#2332; &#2328;&#2352;&#2381;&#2359;&#2339; &#2309;&#2349;&#2367;&#2354;&#2306;&#2348; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2360;&#2375; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">All I, II and III</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Statement I is correct: Static friction (f<sub>s</sub>) is a self-adjusting force. As you apply more force to an object to make it move, the static friction increases equally in the opposite direction to keep the object at rest. This continues until it reaches its maximum value, known as Limiting Friction.</p><p>&#183; Statement II is correct: Once the applied force exceeds the limiting friction, the object begins to move. At this point, the frictional force typically drops slightly and becomes Kinetic Friction (f<sub>k</sub>). Kinetic friction is generally less than the maximum static friction because it takes more force to break the initial molecular bonds between surfaces than it does to keep them sliding.</p><p>&#183; Statement III is incorrect: Kinetic friction is directly proportional to the normal reaction (N). The formula for kinetic friction is f<sub>k</sub>&#8203;=&#956;<sub>k</sub>N, where &#956;<sub>k</sub> is the coefficient of kinetic friction. Therefore, it is highly dependent on the normal reaction.</p>",
    "question_index": 122
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are true?</p><p>Statement I: The Indian Association (1876) organized all-India conferences that influenced the birth of the INC.</p><p>Statement II: Surendranath Banerjee and Ananda Mohan Bose led the Indian Association.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344; 1: &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2328; (1876) &#2344;&#2375; &#2309;&#2326;&#2367;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2350;&#2381;&#2350;&#2375;&#2354;&#2344;&#2379;&#2306; &#2325;&#2366; &#2310;&#2351;&#2379;&#2332;&#2344; &#2325;&#2367;&#2351;&#2366;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2328; &#2325;&#2375; &#2332;&#2344;&#2381;&#2350; &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2360;&#2369;&#2352;&#2375;&#2306;&#2342;&#2381;&#2352;&#2344;&#2366;&#2341; &#2348;&#2344;&#2352;&#2381;&#2332;&#2368; &#2324;&#2352; &#2310;&#2344;&#2306;&#2342; &#2350;&#2379;&#2361;&#2344; &#2348;&#2379;&#2360; &#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2328; &#2325;&#2366; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2325;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Both statements are true; the Indian National Conference sessions (1883, 1885) were precursors to INC.</p><p>Statement II is not an explanation of I; it names leaders rather than explaining the causal link.</p><p>Further Insights:</p><p>- INC's first session: Bombay, 1885; President W. C. Bonnerjee; convened with A. O. Hume's initiative.</p><p>- Precursor bodies: Poona Sarvajanik Sabha, Madras Mahajana Sabha, Bombay Presidency Association.</p><p>- Early INC agenda: constitutional reforms, civil rights, administrative transparency.</p><p>- Dadabhai Naoroji, Pherozeshah Mehta, and Gopal Krishna Gokhale were prominent early leaders.</p><p>- Surendranath Banerjee later joined the moderate camp within the national movement.</p>",
    "question_index": 123
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the true statement(s).</p><p>Statement I: India's decadal population growth rate declined from 1991 - 2001 to 2001 - 2011.</p><p>Statement II: A fall in Total Fertility Rate and rising female literacy were major factors behind this slowdown.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2342;&#2358;&#2325;&#2368;&#2351; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2342;&#2352; 1991-2001 &#2360;&#2375; 2001-2011 &#2325;&#2368; &#2309;&#2357;&#2343;&#2367; &#2350;&#2375;&#2306; &#2328;&#2335;&#2368;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2325;&#2369;&#2354; &#2346;&#2381;&#2352;&#2332;&#2344;&#2344; &#2342;&#2352; &#2350;&#2375;&#2306; &#2327;&#2367;&#2352;&#2366;&#2357;&#2335; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366; &#2360;&#2366;&#2325;&#2381;&#2359;&#2352;&#2340;&#2366; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2311;&#2360; &#2350;&#2306;&#2342;&#2368; &#2325;&#2375; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2325;&#2366;&#2352;&#2325; &#2341;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I is true: decadal growth fell from about 21.54% (1991 - 2001) to about 17.64% (2001 - 2011).</p><p>Statement II is true and gives the key demographic reasons: declining TFR, rising female literacy, delayed marriages, and better spacing/contraception.</p><p>Further Insights:</p><p>- Urbanization increased from ~27.8% (2001) to ~31.2% (2011).</p><p>- States with lowest decadal growth (2011): Kerala; highest included Bihar.</p><p>- TFR has declined nationally over decades; many states at or below replacement level by late 2010s.</p><p>- Rising female education correlates with lower fertility and better child health.</p>",
    "question_index": 124
  },
  {
    "question": "<span class=\"eqt\"><p>The Government of India announced that the four Labour Codes - the Code on Wages, 2019, the Industrial Relations Code, 2020, the Code on Social Security, 2020 and the Occupational Safety, Health and Working Conditions Code, 2020 are being made effective from 21st November 2025, rationalising how many existing labour laws?</p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2368; &#2361;&#2376; &#2325;&#2367; &#2330;&#2366;&#2352; &#2358;&#2381;&#2352;&#2350; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;&#2319;&#2306; - &#2350;&#2332;&#2342;&#2370;&#2352;&#2368; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;, 2019, &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2360;&#2306;&#2348;&#2306;&#2343; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;, 2020, &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;, 2020 &#2324;&#2352; &#2357;&#2381;&#2351;&#2366;&#2357;&#2360;&#2366;&#2351;&#2367;&#2325; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366;, &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;, 2020 - 21 &#2344;&#2357;&#2306;&#2348;&#2352; 2025 &#2360;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2361;&#2379; &#2352;&#2361;&#2368; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2350;&#2380;&#2332;&#2370;&#2342;&#2366; &#2358;&#2381;&#2352;&#2350; &#2325;&#2366;&#2344;&#2370;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2325;&#2366;&#2344;&#2370;&#2344;&#2379;&#2306; &#2325;&#2366; &#2351;&#2369;&#2325;&#2381;&#2340;&#2367;&#2325;&#2352;&#2339; &#2361;&#2379;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">34</span><span class=\"hqt\" style=\"display:none\">34</span>",
      "<span class=\"eqt\">29</span><span class=\"hqt\" style=\"display:none\">29</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">31</span><span class=\"hqt\" style=\"display:none\">31</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In a historic decision, the Government of India has announced that the four Labour Codes - the Code on Wages, 2019, the Industrial Relations Code, 2020, the Code on Social Security, 2020 and the Occupational Safety, Health and Working Conditions Code, 2020 are being made effective from 21st November 2025, <b>rationalising 29 existing labour laws.</b> </p><p>By modernising labour regulations, enhancing workers' welfare and aligning the labour ecosystem with the evolving world of work, this landmark move lays the foundation for a future-ready workforce and stronger, resilient industries driving labour reforms for Aatmanirbhar Bharat. </p><p>In line with the wide-ranging consultations carried out during the drafting of the Labour Codes, the Government will likewise engage the public and stakeholders in the framing of the corresponding rules, regulations, schemes, etc. under the Codes.</p>",
    "question_index": 125
  },
  {
    "question": "<span class=\"eqt\"><p>Examine the statements about Union Public Service Commission(UPSC).</p><p>Statement I: The advice of the UPSC is not binding on the Government, and non-consultation does not by itself invalidate an administrative action.</p><p>Statement II: The Chairman of the UPSC is ineligible for any further employment under the Government of India or of a State.</p><p>Which of the above statement is/are incorrect?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2328; &#2354;&#2379;&#2325; &#2360;&#2375;&#2357;&#2366; &#2310;&#2351;&#2379;&#2327; (&#2351;&#2370;&#2346;&#2368;&#2319;&#2360;&#2360;&#2368;) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2332;&#2366;&#2306;&#2330; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2351;&#2370;&#2346;&#2368;&#2319;&#2360;&#2360;&#2368; &#2325;&#2368; &#2360;&#2354;&#2366;&#2361; &#2360;&#2352;&#2325;&#2366;&#2352; &#2346;&#2352; &#2348;&#2366;&#2343;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;, &#2324;&#2352; &#2346;&#2352;&#2366;&#2350;&#2352;&#2381;&#2358; &#2344; &#2325;&#2352;&#2344;&#2375; &#2360;&#2375; &#2325;&#2379;&#2312; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2352;&#2357;&#2366;&#2312; &#2360;&#2381;&#2357;&#2340;&#2307; &#2309;&#2350;&#2366;&#2344;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368;&#2404;</p><p>&#2325;&#2341;&#2344; II: &#2351;&#2370;&#2346;&#2368;&#2319;&#2360;&#2360;&#2368; &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2351;&#2366; &#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2309;&#2343;&#2368;&#2344; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2309;&#2344;&#2381;&#2351; &#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2346;&#2366;&#2340;&#2381;&#2352; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statement I is correct; courts have held Article 320 to be largely directory, not mandatory.</p><p>Statement II is correct; Article 319 bars the UPSC Chair from further government employment.</p><p>II does not explain I; it is a separate safeguard.</p><p>Further Insights:</p><p>- UPSC members are appointed by the President; term: 6 years or until 65 years, whichever earlier.</p><p>- Removal grounds include misbehavior (after Supreme Court inquiry), insolvency, paid employment outside duties, or infirmity of mind/body.</p><p>- UPSC conducts exams for All-India Services and Central Services Group A and B.</p><p>- UPSC's annual report is submitted to the President, who lays it before Parliament.</p><p>- State Public Service Commissions have analogous provisions under the Constitution.</p>",
    "question_index": 126
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct regarding Economic sectors' classification?</p><p>1) Mining and quarrying belong to the primary sector.</p><p>2) Construction is part of the tertiary (services) sector.</p><p>3) Financial services are counted in the secondary sector.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>1) &#2326;&#2344;&#2344; &#2324;&#2352; &#2313;&#2340;&#2381;&#2326;&#2344;&#2344; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2310;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>2) &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2340;&#2371;&#2340;&#2368;&#2351;&#2325; (&#2360;&#2375;&#2357;&#2366;) &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;&#2404;</p><p>3) &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2375;&#2357;&#2366;&#2319;&#2306; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2310;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only 1</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">Only 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Only 3</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is correct: mining is primary.</p><p>Statements 2 and 3 are incorrect: construction is secondary; financial services are tertiary.</p><p>Further Insights:</p><p>- Secondary sector includes manufacturing, electricity, gas, water supply, and construction.</p><p>- Tertiary sector includes trade, hotels, transport, communication, finance, real estate, public admin, and other services.</p><p>- Primary sector includes agriculture, forestry, fishing, and mining.</p><p>- Structural transformation involves a shift from primary to secondary and then to services.</p>",
    "question_index": 127
  },

    "question": "<span class=\"eqt\"><p>Which of the following does NOT secure the independence of the judiciary in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2366;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2325;&#2368; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Judges' salaries and pensions are charged on the Consolidated Fund</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2375; &#2357;&#2375;&#2340;&#2344; &#2324;&#2352; &#2346;&#2375;&#2306;&#2358;&#2344; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2360;&#2350;&#2375;&#2325;&#2367;&#2340; &#2344;&#2367;&#2343;&#2367; &#2360;&#2375; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Security of tenure; removal only by a special parliamentary process</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2325;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366;; &#2346;&#2342; &#2360;&#2375; &#2361;&#2335;&#2366;&#2344;&#2375; &#2325;&#2366; &#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2340;&#2352;&#2368;&#2325;&#2366; &#2357;&#2367;&#2358;&#2375;&#2359; &#2360;&#2306;&#2360;&#2342;&#2368;&#2351; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Prohibition on practice after retirement for Supreme Court judges</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2375;&#2357;&#2366;&#2344;&#2367;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2325;&#2375; &#2348;&#2366;&#2342; &#2357;&#2325;&#2366;&#2354;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2306;&#2343;</span>",
      "<span class=\"eqt\">Executive having unilateral final say in judicial appointments without judicial consultation</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2346;&#2352;&#2366;&#2350;&#2352;&#2381;&#2358; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366; &#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2325;&#2366; &#2319;&#2325;&#2340;&#2352;&#2347;&#2366; &#2309;&#2306;&#2340;&#2367;&#2350; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Executive having unilateral authority would undermine independence and is not a protective feature.</p><p>The other options reflect safeguards like financial security, tenure, and post-retirement restrictions.</p><p>Further Insights:</p><p>- Article 124(7): A retired Supreme Court judge cannot plead or act in any court or before any authority in India.</p><p>- Judges' salaries are fixed by law and are not subject to annual vote.</p><p>- Transfer of High Court judges is by the President after consultation, a matter linked to independence.</p><p>- The basic structure doctrine protects judicial review and independence of the judiciary.</p>",
    "question_index": 128
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements correctly describes bryophytes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2348;&#2381;&#2352;&#2366;&#2351;&#2379;&#2347;&#2366;&#2311;&#2335;&#2381;&#2360; &#2325;&#2366; &#2360;&#2361;&#2368; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">They have well-developed vascular tissues for conduction</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2306;&#2357;&#2361;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2330;&#2381;&#2331;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2360;&#2306;&#2357;&#2361;&#2344;&#2368; &#2314;&#2340;&#2325; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The sporophyte is dominant and independent</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2379;&#2352;&#2379;&#2347;&#2366;&#2311;&#2335; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2324;&#2352; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">They require water for fertilization</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2344;&#2367;&#2359;&#2375;&#2330;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Seeds are formed after fertilization</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2375;&#2330;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2348;&#2368;&#2332; &#2348;&#2344;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Bryophytes</b> (which include mosses, liverworts, and hornworts) are often referred to as the <b>\"Amphibians of the Plant Kingdom\"</b> because although they live on land, they are critically dependent on an external film of water to complete their life cycle.</p><p><b>Requirement for Water (Statement c):</b> The male gametes (antherozoids) are flagellated and motile. They must swim through a thin film of water to reach the female reproductive organ (archegonium) to fertilize the egg. Without water, fertilization cannot occur.</p><p><b>Further Insights:</b></p><p>&#183; <b>Root-like structures:</b> Instead of true roots, they have <b>rhizoids</b> (unicellular or multicellular) that help in anchorage and absorption.</p><p>&#183; <b>Body structure:</b> Their body is more differentiated than algae but lacks true roots, stems, or leaves (possessing root-like, leaf-like, or stem-like structures instead).</p>",
    "question_index": 129
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a type of Operating system?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350; &#2325;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; <b>&#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Batch Operating System</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2376;&#2330; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">Time-Sharing Operating Systems</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2366;&#2311;&#2350;-&#2358;&#2375;&#2351;&#2352;&#2367;&#2306;&#2327; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">Processed Operating Systems</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2360;&#2375;&#2360;&#2381;&#2337; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">Network Operating System</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2321;&#2346;&#2352;&#2375;&#2335;&#2367;&#2306;&#2327; &#2360;&#2367;&#2360;&#2381;&#2335;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>An Operating System performs all the basic tasks like managing file, process, and memory. Types of Operating Systems: <b>Batch Operating System, Time-Sharing Operating Systems, Network Operating System</b>, Distributed Operating System, &amp; Real-Time Operating System.</p>",
    "question_index": 130
  },
  {
    "question": "<span class=\"eqt\"><p>____________ is a type of Database partitioning in which a large Database is divided into smaller data.</p></span><span class=\"hqt\" style=\"display:none\"><p>__________ &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366; &#2337;&#2375;&#2335;&#2366;&#2348;&#2375;&#2360; &#2346;&#2366;&#2352;&#2381;&#2335;&#2367;&#2358;&#2344;&#2367;&#2306;&#2327; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2319;&#2325; &#2348;&#2337;&#2364;&#2375; &#2337;&#2375;&#2335;&#2366;&#2348;&#2375;&#2360; &#2325;&#2379; &#2331;&#2379;&#2335;&#2375; &#2337;&#2375;&#2335;&#2366; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Replication</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2346;&#2381;&#2354;&#2367;&#2325;&#2375;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Clustering</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2360;&#2381;&#2335;&#2352;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Partitioning</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2381;&#2335;&#2367;&#2358;&#2344;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Sharding</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2381;&#2337;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In DBMS, Sharding is a type of Database partitioning in which a large Database is divided or partitioned into smaller data, also known as shards. These shards are not only smaller, but also faster and hence easily manageable.</p>",
    "question_index": 131
  },
  {

    "solution": "<p>In MS Word, <b>Format Painter</b> is used to quickly apply the same formatting, such as color, font style and size, or border style, to multiple pieces of text or graphics. With format painter, you can copy all of the formatting from one object and apply it to another one - think of it as copying and pasting for formatting.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>1. The Accumulator register temporarily stores intermediate results of arithmetic and logical operations.</p><p>2. The Accumulator stores the address of the next instruction to be executed.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1. &#2319;&#2325;&#2381;&#2351;&#2370;&#2350;&#2369;&#2354;&#2375;&#2335;&#2352; &#2352;&#2332;&#2367;&#2360;&#2381;&#2335;&#2352; &#2309;&#2306;&#2325;&#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2350;&#2343;&#2381;&#2351;&#2357;&#2352;&#2381;&#2340;&#2368; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2379;&#2306; &#2325;&#2379; &#2309;&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2. &#2319;&#2325;&#2381;&#2351;&#2370;&#2350;&#2369;&#2354;&#2375;&#2335;&#2352; &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2327;&#2354;&#2375; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; &#2325;&#2366; &#2346;&#2340;&#2366; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361;&#2368;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither 1 nor 2</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; 1 &#2324;&#2352; &#2344; &#2361;&#2368; 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement 1 is Correct:</p><p>The Accumulator is a CPU register used to hold intermediate results produced by the ALU during arithmetic and logical operations.</p><p></p><p>Statement 2 is Incorrect:</p><p>The Program Counter (PC) stores the address of the next instruction to be executed, not the Accumulator.</p>",
    "question_index": 134
  },
  {
    "question": "<span class=\"eqt\"><p>The OSI Layer divides the process of communication into how many layers?</p></span><span class=\"hqt\" style=\"display:none\"><p>OSI &#2354;&#2375;&#2351;&#2352; &#2360;&#2306;&#2330;&#2366;&#2352; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2354;&#2375;&#2351;&#2352; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Five</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2305;&#2330;</span>",
      "<span class=\"eqt\">Six</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2361;</span>",
      "<span class=\"eqt\">Seven</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2340;</span>",
      "<span class=\"eqt\">Nine</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2380;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>OSI stands for <b>Open Systems Interconnection</b>. It enables the provides a standard for different computer systems to be able to communicate with each other. </p><p>It is a <b>7 layer architecture</b> with each layer having specific functionality to perform. All these 7 layers work collaboratively to transmit the data from one person to another across the globe.</p>",
    "question_index": 135
  },
  {
    "question": "<span class=\"eqt\"><p>In MS Word, which of the following are colored formatting tabs that appear on the ribbon when certain items, such as pictures, are selected and they disappear when the item is deselected?</p></span><span class=\"hqt\" style=\"display:none\"><p>MS &#2357;&#2352;&#2381;&#2337; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2354;&#2352;&#2381;&#2337; &#2347;&#2364;&#2377;&#2352;&#2381;&#2350;&#2375;&#2335;&#2367;&#2306;&#2327; &#2335;&#2376;&#2348; &#2361;&#2376;&#2306; &#2332;&#2379; &#2352;&#2367;&#2348;&#2344; &#2346;&#2352; &#2340;&#2348; &#2342;&#2367;&#2326;&#2366;&#2312; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2348; &#2325;&#2369;&#2331; &#2310;&#2311;&#2335;&#2350;, &#2332;&#2376;&#2360;&#2375; &#2325;&#2367; &#2330;&#2367;&#2340;&#2381;&#2352; (&#2346;&#2367;&#2325;&#2381;&#2330;&#2352;) &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2310;&#2311;&#2335;&#2350; &#2325;&#2379; &#2309;&#2330;&#2351;&#2344;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2357;&#2375; &#2327;&#2366;&#2351;&#2348; &#2361;&#2379; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",

      "<span class=\"eqt\">Reference tab</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2347;&#2352;&#2375;&#2344;&#2381;&#2360; &#2335;&#2376;&#2348;</span>",

    "correct_option_id": 0,
    "solution": "<p>In MS Word, <b>Contextual tabs</b> are colored formatting tabs that appear on the ribbon when certain items, such as pictures, are selected. They disappear when the item is deselected.</p><p><img width=278 height=146 id=image2.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19462/image004.png\" alt=22114.png></p>",

  },
  {
    "question": "<span class=\"eqt\"><p>Which backup device offers high storage capacity and is often used for backing up large amounts of data, such as server backups?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344;-&#2360;&#2366; &#2348;&#2376;&#2325;&#2309;&#2346; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2313;&#2330;&#2381;&#2330; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2325;&#2381;&#2360;&#2352; &#2360;&#2352;&#2381;&#2357;&#2352; &#2348;&#2376;&#2325;&#2309;&#2346; &#2332;&#2376;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2337;&#2375;&#2335;&#2366; &#2325;&#2366; &#2348;&#2376;&#2325;&#2309;&#2346; &#2354;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">USB Flash Drive</span><span class=\"hqt\" style=\"display:none\">USB &#2347;&#2381;&#2354;&#2376;&#2358; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;</span>",
      "<span class=\"eqt\">Floppy Drive</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2354;&#2377;&#2346;&#2368; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;</span>",
      "<span class=\"eqt\">Tape Drive</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2346; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;</span>",
      "<span class=\"eqt\">Solid-State Drive</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2377;&#2354;&#2367;&#2337;-&#2360;&#2381;&#2335;&#2375;&#2335; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A tape drive is a backup storage device that uses magnetic tape as a medium to store data. It is known for its high capacity, reliability, and cost-effectiveness, especially when dealing with large-scale data backups. Tape drives have been widely used in enterprise environments and data centers for many years due to their ability to handle massive volumes of data efficiently.</p>",
    "question_index": 137
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not an Output Device?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2319;&#2325; &#2310;&#2313;&#2335;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Printer</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Lightpen</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2311;&#2335;&#2346;&#2375;&#2344;</span>",
      "<span class=\"eqt\">Monitor</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2377;&#2344;&#2367;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Speaker</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2346;&#2368;&#2325;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>An output device allows data to be transmitted by the computer in a human-friendly form, for example, sound being played through a <b>speaker</b>. <b>Monitor</b> - The main output device of a computer. It forms images by converting electrical energy into light in the form of tiny dots on the screen called pixels.</p><p><b>Lightpen is an input device.</b></p>",
    "question_index": 138
  },
  {
    "question": "<span class=\"eqt\"><p>Which output device is commonly used to produce high-quality printed documents and images? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2330;&#2381;&#2330; &#2327;&#2369;&#2339;&#2357;&#2340;&#2381;&#2340;&#2366; &#2357;&#2366;&#2354;&#2375; &#2350;&#2369;&#2342;&#2381;&#2352;&#2367;&#2340; &#2342;&#2360;&#2381;&#2340;&#2366;&#2357;&#2375;&#2332;&#2364; (&#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2375;&#2337; &#2337;&#2377;&#2325;&#2381;&#2351;&#2370;&#2350;&#2375;&#2306;&#2335;) &#2324;&#2352; &#2330;&#2367;&#2340;&#2381;&#2352; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2367;&#2360; &#2310;&#2313;&#2335;&#2346;&#2369;&#2335; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Inkjet printer</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2325;&#2332;&#2375;&#2335; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Laser printer</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2375;&#2332;&#2364;&#2352; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Dot matrix printer</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2377;&#2335; &#2350;&#2376;&#2335;&#2381;&#2352;&#2367;&#2325;&#2381;&#2360; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Plotter</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2377;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A <b>laser printer</b> is commonly used to produce high-quality printed documents and images. It works by using a laser to create an electrostatic image on a photosensitive drum, and then toner (dry ink) is fused onto the paper to create the final print. Laser printers are known for their sharp and precise output, making them suitable for tasks that require high-quality text and graphics. Inkjet printers (Option a) can also produce high-quality prints, but laser printers are often preferred for professional and high-volume printing.</p>",
    "question_index": 139
  },
  {
    "question": "<span class=\"eqt\"><p>Cold Boot in a computer is also called as?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2381;&#2351;&#2370;&#2335;&#2352; &#2350;&#2375;&#2306; &#2325;&#2379;&#2354;&#2381;&#2337; &#2348;&#2370;&#2335; &#2325;&#2379; __________ &#2349;&#2368; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Freeze Boot</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2381;&#2352;&#2368;&#2332; &#2348;&#2370;&#2335;</span>",
      "<span class=\"eqt\">Hard Boot</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2352;&#2381;&#2337; &#2348;&#2370;&#2335;</span>",
      "<span class=\"eqt\">Chill Boot</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2367;&#2354; &#2348;&#2370;&#2335;</span>",
      "<span class=\"eqt\">Solid Boot</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2377;&#2354;&#2367;&#2337; &#2348;&#2370;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Cold boot is also called as <b>Hard Boot</b>.Cold boot is often used in contrast to a warm boot, which refers to restarting a computer once it has been turned on. A cold boot is typically performed by pressing the power button on the computer.</p><p>Both a cold boot and warm boot clear the system RAM and perform the boot sequence from scratch. However, unlike a cold boot, a warm boot may not clear all system caches, which store temporary information. </p>",
    "question_index": 140
  },
  {
    "question": "<span class=\"eqt\"><p>Match the Following OSI Layers & its Functions</p><p><table style=\"border-collapse:collapse;\"></p><p><tr></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List-I (OSI Layer)</th></p><p><th align=\"left\" style=\"border:1px solid black;padding:5px;\">List-II (Function)</th></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Network Layer</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Data encryption and compression</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Transport Layer</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Routing and logical addressing</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Presentation Layer</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. End-to-end delivery and flow control</td></p><p></tr></p><p><tr></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Data Link Layer</td></p><p><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Error detection using frames</td></p><p></tr></p><p></table></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; OSI &#2346;&#2352;&#2340;&#2379;&#2306; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2325;&#2366; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;</p><p><table style=\"border-collapse:collapse;\"><tr></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2346;&#2352;&#2340;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2337;&#2375;&#2335;&#2366; &#2319;&#2344;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2358;&#2344; &#2324;&#2352; &#2360;&#2306;&#2346;&#2368;&#2337;&#2364;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2346;&#2352;&#2367;&#2357;&#2361;&#2344; &#2346;&#2352;&#2340;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2352;&#2370;&#2335;&#2367;&#2306;&#2327; &#2324;&#2352; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2346;&#2340;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340;&#2367; &#2346;&#2352;&#2340;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2319;&#2306;&#2337;-&#2335;&#2370;-&#2319;&#2306;&#2337; &#2337;&#2367;&#2354;&#2368;&#2357;&#2352;&#2368; &#2324;&#2352; &#2347;&#2381;&#2354;&#2379; &#2325;&#2306;&#2335;&#2381;&#2352;&#2379;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2337;&#2375;&#2335;&#2366; &#2354;&#2367;&#2306;&#2325; &#2354;&#2375;&#2351;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2347;&#2381;&#2352;&#2375;&#2350;&#2381;&#2360; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2340;&#2381;&#2352;&#2369;&#2335;&#2367; &#2325;&#2366; &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2344;&#2366;</td></tr></table></p></span>",
    "options": [
      "<span class=\"eqt\">A-1, B-2, C-3, D-4</span><span class=\"hqt\" style=\"display:none\">A-1, B-2, C-3, D-4</span>",
      "<span class=\"eqt\">A-3, B-1, C-4, D-2</span><span class=\"hqt\" style=\"display:none\">A-3, B-1, C-4, D-2</span>",
      "<span class=\"eqt\">A-2, B-3, C-1, D-4</span><span class=\"hqt\" style=\"display:none\">A-2, B-3, C-1, D-4</span>",

    "correct_option_id": 2,
    "solution": "<p>Network Layer: Handles routing and IP addressing.</p><p>Transport Layer: Ensures reliable end-to-end delivery (TCP/UDP).</p><p>Presentation Layer: Manages data format, encryption, compression.</p><p>Data Link Layer: Responsible for framing and error detection.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Excel lookup functions:</p><p>I. VLOOKUP() cannot return a value from a column to the left of the lookup column.</p><p>II. VLOOKUP() performs case-sensitive lookups by default.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>Excel &#2354;&#2369;&#2325;&#2309;&#2346; &#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2306;&#2360; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. VLOOKUP() &#2354;&#2369;&#2325;&#2309;&#2346; &#2325;&#2377;&#2354;&#2350; &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2377;&#2354;&#2350; &#2360;&#2375; &#2350;&#2366;&#2344; &#2344;&#2361;&#2368;&#2306; &#2354;&#2380;&#2335;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. VLOOKUP() &#2337;&#2367;&#2347;&#2364;&#2377;&#2354;&#2381;&#2335; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2375;&#2360;-&#2360;&#2375;&#2306;&#2360;&#2367;&#2335;&#2367;&#2357; &#2354;&#2369;&#2325;&#2309;&#2346; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is Correct: VLOOKUP() searches in the first (leftmost) column of the table array and can return values only from columns to its right.</p><p></p><p>Statement II is Incorrect: VLOOKUP() is not case-sensitive; it treats uppercase and lowercase text as the same.</p>",
    "question_index": 142
  },

    "question": "<span class=\"eqt\"><p>Which of the following refers to any type of file sent along with an email message?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2312;&#2350;&#2375;&#2354; &#2350;&#2376;&#2360;&#2375;&#2332; &#2325;&#2375; &#2360;&#2366;&#2341; &#2349;&#2375;&#2332;&#2368; &#2327;&#2312; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2347;&#2364;&#2366;&#2311;&#2354; &#2325;&#2379; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p><b>An email attachment</b> is any type of file sent along with an email message. Including an attachment in an email is a simple way to share documents and images. </p><p>One or more files can be attached and sent to over to an email recipient. Attachments can include anything from photos and documents to zipped files, folders, mp3s, and more.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following device stores the IP Addresses?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2337;&#2367;&#2357;&#2366;&#2311;&#2360; IP &#2319;&#2337;&#2381;&#2352;&#2375;&#2360; &#2360;&#2306;&#2330;&#2367;&#2340; (&#2360;&#2381;&#2335;&#2379;&#2352;) &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p><b>Router</b> does store information about your computer when you connect to it. Typically, it will save a routing table that consists of your computer's MAC address, the IP address that was assigned to your computer, and the lease time of your computer's IP address. Of course, it also stores all the user-configurable stuff in the router.</p>",

  {
    "question": "<span class=\"eqt\"><p>Port 22 is typically used for which network protocol? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2379;&#2352;&#2381;&#2335; 22 &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2367;&#2360; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">FTP</span><span class=\"hqt\" style=\"display:none\">FTP</span>",
      "<span class=\"eqt\">SSH</span><span class=\"hqt\" style=\"display:none\">SSH</span>",
      "<span class=\"eqt\">Telnet</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2354;&#2344;&#2375;&#2335;</span>",
      "<span class=\"eqt\">HTTP</span><span class=\"hqt\" style=\"display:none\">HTTP</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Port 22</b> is typically used for the SSH (Secure Shell) network protocol. SSH is a cryptographic network protocol that provides secure, encrypted communication over a network. It is commonly used for remote login to servers and other network devices, allowing users to access and manage systems securely over an unsecured network, such as the internet. SSH replaces less secure remote access methods like Telnet (port 23), providing a more secure way to interact with remote systems. FTP (port 21) is used for file transfer, and HTTP (port 80) is used for web communication.</p>",
    "question_index": 145
  },

    "question": "<span class=\"eqt\"><p>Which network communication protocol ensures that the data reaches its destination on time without any duplications?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344;-&#2360;&#2366; &#2344;&#2375;&#2335;&#2357;&#2352;&#2381;&#2325; &#2360;&#2306;&#2330;&#2366;&#2352; &#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2325;&#2377;&#2354; &#2351;&#2361; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2337;&#2375;&#2335;&#2366; &#2348;&#2367;&#2344;&#2366; &#2325;&#2367;&#2360;&#2368; &#2342;&#2381;&#2357;&#2367;&#2352;&#2366;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2325;&#2375; &#2360;&#2350;&#2351; &#2346;&#2352; &#2309;&#2346;&#2344;&#2375; &#2327;&#2306;&#2340;&#2357;&#2381;&#2351; &#2340;&#2325; &#2346;&#2361;&#2369;&#2306;&#2330; &#2332;&#2366;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">TCP</span><span class=\"hqt\" style=\"display:none\">TCP</span>",
      "<span class=\"eqt\">UDP</span><span class=\"hqt\" style=\"display:none\">UDP</span>",
      "<span class=\"eqt\">FTP</span><span class=\"hqt\" style=\"display:none\">FTP</span>",
      "<span class=\"eqt\">HTTP</span><span class=\"hqt\" style=\"display:none\">HTTP</span>"
    ],
    "correct_option_id": 0,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Network Communication Protocols</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Description</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Transmission Control Protocol (TCP)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A reliable, connection-oriented protocol that helps in the sequential transmission of data packets to ensure data reaches the destination on time without duplication.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">User Datagram Protocol (UDP)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A connectionless protocol that doesn't ensure a connection between the application and server before transmitting a message. It's effective for use cases such as broadcasts or multicast connections.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">File Transfer Protocol (FTP)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Allows file sharing between servers by establishing two TCP connections, one for data transfer and the other for control. The data transfer connection transfers the actual files while the control connection transfers control information such as passwords to ensure data retrieval in case of data loss.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hyper-Text Transfer Protocol (HTTP)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Commonly referred to as the protocol of the internet that allows communication between a server and browser.</td></tr></table>",
    "question_index": 147
  },
  {

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Microsoft PowerPoint:</p><p>i. PowerPoint allows insertion of multimedia elements such as audio and video into slides.</p><p>ii. Animations in PowerPoint can only be applied to text objects.</p><p>iii. Slide transitions control how one slide changes to the next during a presentation.</p><p>Which of the above statements are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2311;&#2325;&#2381;&#2352;&#2379;&#2360;&#2377;&#2347;&#2381;&#2335; &#2346;&#2377;&#2357;&#2352;&#2346;&#2377;&#2311;&#2306;&#2335; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>i. &#2346;&#2377;&#2357;&#2352;&#2346;&#2377;&#2311;&#2306;&#2335; &#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2350;&#2375;&#2306; &#2321;&#2337;&#2367;&#2351;&#2379; &#2324;&#2352; &#2357;&#2368;&#2337;&#2367;&#2351;&#2379; &#2332;&#2376;&#2360;&#2375; &#2350;&#2354;&#2381;&#2335;&#2368;&#2350;&#2368;&#2337;&#2367;&#2351;&#2366; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2379; &#2360;&#2350;&#2381;&#2350;&#2367;&#2354;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>ii. &#2346;&#2377;&#2357;&#2352;&#2346;&#2377;&#2311;&#2306;&#2335; &#2350;&#2375;&#2306; &#2319;&#2344;&#2367;&#2350;&#2375;&#2358;&#2344; &#2325;&#2375;&#2357;&#2354; &#2335;&#2375;&#2325;&#2381;&#2360;&#2381;&#2335; &#2321;&#2348;&#2381;&#2332;&#2375;&#2325;&#2381;&#2335; &#2346;&#2352; &#2361;&#2368; &#2354;&#2366;&#2327;&#2370; &#2325;&#2367;&#2319; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>iii. &#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2335;&#2381;&#2352;&#2366;&#2306;&#2332;&#2364;&#2367;&#2358;&#2344; &#2351;&#2361; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340;&#2367; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2319;&#2325; &#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2381;&#2354;&#2366;&#2311;&#2337; &#2350;&#2375;&#2306; &#2325;&#2376;&#2360;&#2375; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">i and ii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; ii</span>",
      "<span class=\"eqt\">ii and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i and iii only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">i, ii and iii</span><span class=\"hqt\" style=\"display:none\">i, ii &#2324;&#2352; iii</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement i is Correct: PowerPoint supports audio, video, images, charts, and other multimedia elements.</p><p>Statement ii is Incorrect: Animations can be applied to text, images, shapes, charts, and other objects, not just text.</p><p>Statement iii is Correct: Transitions define the visual effect when moving from one slide to another.</p>",
    "question_index": 149
  }
