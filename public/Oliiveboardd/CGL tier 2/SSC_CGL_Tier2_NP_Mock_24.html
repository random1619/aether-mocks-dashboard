  {
    "question": "<span class=\"eqt\"><p>A right circular cylinder has a total surface area of 80&#960; cm<sup>2</sup> and a height 6 cm. What is its volume (in terms of &#960;, cm<sup>3</sup>)?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 80&pi; cm&#178; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; 6 cm &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2366; &#2310;&#2351;&#2340;&#2344; (cm<sup>3</sup> &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">72&#960;</span><span class=\"hqt\" style=\"display:none\">72&#960;</span>",
      "<span class=\"eqt\">128&#960;</span><span class=\"hqt\" style=\"display:none\">128&#960;</span>",
      "<span class=\"eqt\">96&#960;</span><span class=\"hqt\" style=\"display:none\">96&#960;</span>",
      "<span class=\"eqt\">112&#960;</span><span class=\"hqt\" style=\"display:none\">112&#960;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Total surface area of cylinder = 2&#960;r (r + h)</p><p>80&#960; = 2&#960;r(r + 6)</p><p>r(r + 6) = 40</p><p>r<sup>2</sup> + 6r &#8722; 40 = 0</p><p>r<sup>2</sup> + 10r  -  4r  -  40 = 0</p><p>r (r + 10)  -  4 (r + 10) = 0</p><p>(r + 10) (r &#8722; 4) = 0</p><p>r = 4 cm</p><p>Hence, required volume = &#960; X 4<sup>2</sup> X 6 = 96&#960; cm<sup>3</sup></p><p><b> Express Method </b></p><p>Volume = &pi; R<sup>2</sup>h = 6&pi; R<sup>2</sup></p><p>We can say, answer will be a mulitple of 6 and after divided by 6&pi; there should be a perfect square.</p><p>Option a: 72&pi; = 6&pi; x 12 [12 is not a perfect square]</p><p>Option b: 128&pi; [Not a multiple of 6]</p><p>Option c: 96&pi; = 6&pi; x 16 [16 is a perfect square]</p><p>Option d: 112&pi; [Not a multiple of 6]</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>&nbsp;If 5cosec &#952; + 6 = 19, and 0 &lt; &#952; &lt; 90, then what is the value of cos&#952;?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 5cosec &#952; + 6 = 19 &#2324;&#2352; 0 &lt; &#952; &lt; 90 &#2361;&#2376;, &#2340;&#2379; cos&#952; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">5/7</span><span class=\"hqt\" style=\"display:none\">5/7</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">12/13</span><span class=\"hqt\" style=\"display:none\">12/13</span>",
      "<span class=\"eqt\">7/12</span><span class=\"hqt\" style=\"display:none\">7/12</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>5cosec &#952; + 6 = 19</p><p>=&gt; 5cosec &#952; = 13</p><p>=&gt; cosec &#952; = 13/5</p><p>So, sin &#952; = 5/13</p><p>Thus, cos &#952; = &radic;(1  -  25/169) = &radic;144/169 = 12/13</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The angle of elevation from a point A to the top of tower is 30&#730; if the distance between point A and foot of the tower is 30m then find the height of tower.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; A &#2360;&#2375; &#2335;&#2366;&#2357;&#2352; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 30&#730; &#2361;&#2376; &#2351;&#2342;&#2367; &#2348;&#2367;&#2306;&#2342;&#2369; A &#2324;&#2352; &#2335;&#2366;&#2357;&#2352; &#2325;&#2375; &#2340;&#2354; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 30 m &#2361;&#2376;, &#2340;&#2379; &#2335;&#2366;&#2357;&#2352; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">60 m</span><span class=\"hqt\" style=\"display:none\">60 m</span>",
      "<span class=\"eqt\">30&radic;3 m</span><span class=\"hqt\" style=\"display:none\">30&radic;3 m</span>",
      "<span class=\"eqt\">10&radic;3 m</span><span class=\"hqt\" style=\"display:none\">10&radic;3 m</span>",
      "<span class=\"eqt\">20&radic;3 m</span><span class=\"hqt\" style=\"display:none\">20&radic;3 m</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=144 height=145 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20967/image006.jpg\"></p><p>tan 30&#730; = BC/AB</p><p>BC = AB * tan30&#730;</p><p>BC = 30*1/&radic;3 m</p><p>BC = 10&radic;3</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A boat can travel 80 km upstream in 2 hours and 50 km downstream in 1 hour. Find the speed of the boat in still water:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 80 km &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; 2 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376; &#2340;&#2341;&#2366; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 50 km &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; 1 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2330;&#2366;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">45 km/hr</span><span class=\"hqt\" style=\"display:none\">45 km/hr</span>",
      "<span class=\"eqt\">50 km/hr</span><span class=\"hqt\" style=\"display:none\">50 km/hr</span>",
      "<span class=\"eqt\">40 km/hr</span><span class=\"hqt\" style=\"display:none\">40 km/hr</span>",
      "<span class=\"eqt\">55 km/hr</span><span class=\"hqt\" style=\"display:none\">55 km/hr</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let speed of boat and speed of stream b km/hr and s km/hr respectively.</p><p>(b+s) = 80/2 = 40 km/hr</p><p>(b-s) = 50/1 = 50 km/hr</p><p>Speed of boat in still water = (40+50)/2 = 45 km/hr</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The coefficient of skewness of a distribution is &#8722;0.40, the mean is 50, and the mode is 56. Find the variance.</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2366; &#2357;&#2367;&#2359;&#2350;&#2340;&#2366; &#2327;&#2369;&#2339;&#2366;&#2306;&#2325; -0.40 &#2361;&#2376;, &#2350;&#2366;&#2343;&#2381;&#2351; 50 &#2361;&#2376; &#2324;&#2352; &#2348;&#2361;&#2369;&#2354;&#2325; 56 &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2360;&#2352;&#2339; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">225</span><span class=\"hqt\" style=\"display:none\">225</span>",
      "<span class=\"eqt\">256</span><span class=\"hqt\" style=\"display:none\">256</span>",
      "<span class=\"eqt\">144</span><span class=\"hqt\" style=\"display:none\">144</span>",
      "<span class=\"eqt\">196</span><span class=\"hqt\" style=\"display:none\">196</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Given: Sk = &#8722;0.40, Mean = 50, Mode = 56.</p><p>Pearson's first relation: Sk = (Mean &#8722; Mode)/&#963;.</p><p>Rearranging: &#963; = (Mean &#8722; Mode)/Sk.</p><p>Substitution: &#963; = (50 &#8722; 56)/(&#8722;0.40) =&gt; (&#8722;6)/(&#8722;0.40) = 15.</p><p>Variance = &#963;<sup>2</sup> = 15<sup>2</sup> = 225.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If 4 men or 8 women can do a piece of work in 42 days, then find in how many days 3 men and 15 women together can do the same piece of work.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 4 &#2346;&#2369;&#2352;&#2369;&#2359; &#2351;&#2366; 8 &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2305; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 42 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; 3 &#2346;&#2369;&#2352;&#2369;&#2359; &#2324;&#2352; 15 &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2305; &#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the time taken by 3 men and 15 women is 'a'.</p><p>Total work = 4 * 42 or 8 *42</p><p>4 men = 8 women </p><p>1 man = 2 women</p><p>3 men = 6 women</p><p>Total worker = 3 men + 15 women = 6 women + 15 women = 21 women</p><p>Total work = 8 * 42 = 21 * a </p><p>a = 16 days</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The average age of 25 students and the principal is 15 years. When the principal's age is excluded, the average age decreases by 1 year. What is the age of principal?</p></span><span class=\"hqt\" style=\"display:none\"><p>25 &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2346;&#2381;&#2352;&#2366;&#2330;&#2366;&#2352;&#2381;&#2351; &#2325;&#2368; &#2324;&#2360;&#2340; &#2310;&#2351;&#2369; 15 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;| &#2332;&#2348; &#2346;&#2381;&#2352;&#2366;&#2330;&#2366;&#2352;&#2381;&#2351; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2379; &#2361;&#2335;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2324;&#2360;&#2340; &#2310;&#2351;&#2369; &#2350;&#2375;&#2306; 1 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2325;&#2350;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;| &#2346;&#2381;&#2352;&#2366;&#2330;&#2366;&#2352;&#2381;&#2351; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">38 years</span><span class=\"hqt\" style=\"display:none\">38 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">40 years</span><span class=\"hqt\" style=\"display:none\">40 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">39 years</span><span class=\"hqt\" style=\"display:none\">39 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">Data inadequate</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2310;&#2305;&#2325;&#2396;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total decrease in average = 25 x 1 = 25 years</p><p>Age of Principal = 25 + 15 = 40 years</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A sum of Rs.7200 is deposited and received simple interest Rs.1296. If the value of rate of interest be R% and number of years be R/2 years, then find the value of R.</p></span><span class=\"hqt\" style=\"display:none\"><p>7200 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2350;&#2366; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360; &#2346;&#2352; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; 1296 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; R% &#2361;&#2376; &#2324;&#2352; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; R/2 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;, &#2340;&#2379; R &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4%</span><span class=\"hqt\" style=\"display:none\">4%</span>",
      "<span class=\"eqt\">6%</span><span class=\"hqt\" style=\"display:none\">6%</span>",
      "<span class=\"eqt\">8%</span><span class=\"hqt\" style=\"display:none\">8%</span>",
      "<span class=\"eqt\">3%</span><span class=\"hqt\" style=\"display:none\">3%</span>"

    "correct_option_id": 1,
    "solution": "<p>According to question,</p><p>7200 * R * (R/2) = 1296 * 100</p><p>R<sup>2</sup> = 1296 * 2/72</p><p>R<sup>2</sup> = 36</p><p>R = 6%</p>",

  {
    "question": "<span class=\"eqt\"><p> What is the area of an equilateral triangle having altitude equal to 2&radic;3 cm?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 2&radic;3 &#2360;&#2375;&#2350;&#2368; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;3 square cm</span><span class=\"hqt\" style=\"display:none\">&radic;3 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">2&radic;3 square cm</span><span class=\"hqt\" style=\"display:none\">2&radic;3 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2350;&#2368;</span>",

    "question": "<span class=\"eqt\"><p>Kavya has two ways to prepare for an exam. Plan X is a 6-hour study stretch only on weekends. Plan Y is 90 minutes daily with one short revision slot at night. Kavya often gets unexpected household tasks on weekends and wants steady progress without stress. Which plan is most appropriate?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2357;&#2381;&#2351;&#2366; &#2325;&#2375; &#2346;&#2366;&#2360; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2325;&#2368; &#2340;&#2376;&#2351;&#2366;&#2352;&#2368; &#2325;&#2375; &#2342;&#2379; &#2340;&#2352;&#2368;&#2325;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2379;&#2332;&#2344;&#2366; X &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361;&#2366;&#2306;&#2340; &#2346;&#2352; 6 &#2328;&#2306;&#2335;&#2375; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404; &#2351;&#2379;&#2332;&#2344;&#2366; Y &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2342;&#2367;&#2344; 90 &#2350;&#2367;&#2344;&#2335; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2324;&#2352; &#2352;&#2366;&#2340; &#2350;&#2375;&#2306; &#2319;&#2325; &#2331;&#2379;&#2335;&#2366; &#2346;&#2369;&#2344;&#2352;&#2366;&#2357;&#2354;&#2379;&#2325;&#2344; &#2360;&#2340;&#2381;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404; &#2325;&#2366;&#2357;&#2381;&#2351;&#2366; &#2325;&#2379; &#2309;&#2325;&#2381;&#2360;&#2352; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361;&#2366;&#2306;&#2340; &#2346;&#2352; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2366;&#2358;&#2367;&#2340; &#2328;&#2352;&#2375;&#2354;&#2370; &#2325;&#2366;&#2350; &#2350;&#2367;&#2354; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2357;&#2361; &#2340;&#2344;&#2366;&#2357;&#2350;&#2369;&#2325;&#2381;&#2340; &#2361;&#2379;&#2325;&#2352; &#2344;&#2367;&#2352;&#2306;&#2340;&#2352; &#2     "options": [

      "<span class=\"eqt\">Mix both plans without fixing any routine</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2344;&#2366; &#2325;&#2379;&#2312; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2342;&#2367;&#2344;&#2330;&#2352;&#2381;&#2351;&#2366; &#2340;&#2351; &#2325;&#2367;&#2319; &#2342;&#2379;&#2344;&#2379;&#2306; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2325;&#2379; &#2350;&#2367;&#2354;&#2366; &#2354;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Follow Plan Y with a fixed daily timetable</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2376;&#2344;&#2367;&#2325; &#2360;&#2350;&#2351; &#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2381;&#2354;&#2366;&#2344; &#2357;&#2366;&#2312; &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Postpone study until weekends become free</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2348; &#2340;&#2325; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361;&#2366;&#2306;&#2340; &#2326;&#2366;&#2354;&#2368; &#2344; &#2361;&#2379; &#2332;&#2366;&#2319;&#2306;, &#2340;&#2348; &#2340;&#2325; &#2346;&#2338;&#2364;&#2366;&#2312; &#2360;&#2381;&#2341;&#2327;&#2367;&#2340; &#2325;&#2352; &#2342;&#2375;&#2306;&#2404;</span>"

    "question": "<span class=\"eqt\"><p>In a leaderboard of 90 players, J is at 46th rank from the top. If exactly 15 players are ranked between J and K, what is the sum of K's possible ranks from the top?</p></span><span class=\"hqt\" style=\"display:none\">90 &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2354;&#2368;&#2337;&#2352;&#2348;&#2379;&#2352;&#2381;&#2337; &#2350;&#2375;&#2306;, J &#2358;&#2368;&#2352;&#2381;&#2359; &#2360;&#2375; 46&#2357;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; J &#2324;&#2352; K &#2325;&#2375; &#2348;&#2368;&#2330; &#2336;&#2368;&#2325; 15 &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2368; &#2352;&#2376;&#2306;&#2325; &#2325;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2358;&#2368;&#2352;&#2381;&#2359; &#2360;&#2375; K &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2352;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",

    "solution": "<p>A, B, C, D and E have different ages. A is younger than atmost one person. </p><p><b>Statement I:</b> B is younger than A and older than C. E is older than A. D is younger than C. </p><p>So, E &gt; A &gt; B &gt; C &gt; D.</p><p>Thus, B is the third youngest person. </p><p>So, statement I alone is sufficient. </p><p><b>Statement II:</b> C and E are older than D. A is younger than B. </p><p>So, B &gt; A &gt; C/E &gt; D.</p><p>So, either C or E is third youngest person. </p><p>Thus, statement II alone is not sufficient. </p>",
    "question_index": 52
  },

    "correct_option_id": 0,
    "solution": "<p>It is given that: </p><p>Six lake facing buildings- A, B, C, D, E and F are constructed around a circular lake. </p><p><b>From statement I alone:</b></p><p>C is adjacent to A. Neither D nor B is adjacent to F. </p><p>So, no definite arrangement can be established.</p><p>So, statement I alone is not sufficient. </p><p><b>From statement II alone:</b></p><p>E is adjacent to buildings A and B. There are two buildings between B and F. </p><p><img width=334 height=181 id=\"Picture 11\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23033/image010.jpg\"></p><p>So, statement II alone is not sufficient. </p><p><b>From statements I and II together:</b></p><p>C is adjacent to A. </p><p>Here, this condition can never be satisfied. </p><p>So, statements I and II together are not sufficient. </p>",

    "question": "<span class=\"eqt\"><p>Each letter which is immediately followed by a vowel is dropped in the word ACCESSORIES. How many letter(s) is/are there in the English alphabetical series between the letter which is second from the left and the one which is second from the right in the new letter-cluster thus formed?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2348;&#2381;&#2342; ACCESSORIES &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2325;&#2381;&#2359;&#2352; &#2332;&#2367;&#2360;&#2325;&#2375; &#2336;&#2368;&#2325; &#2348;&#2366;&#2342; &#2360;&#2381;&#2357;&#2352; &#2310;&#2340;&#2366; &#2361;&#2376;, &#2313;&#2360;&#2375; &#2361;&#2335;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2348;&#2344;&#2375; &#2344;&#2319; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2324;&#2352; &#2342;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2364;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2361;&#2379;&#2306;&#2327;&#2375;?</p></span>",

    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>Carol said that Jeremy had arrived on Friday.</p>",
    "options": [
      "Carol said, \"Jeremy arrived on Friday\".",
      "Carol said, \"Jeremy have arrived on Friday\".",
      "Carol said, \"Jeremy arrives on Friday\".",
      "Carol said, \"Jeremy had been arrived on Friday\"."
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence in the Indirect Speech is in Past Perfect Tense.</p><p>There are three cases when the Indirect Speech is in Past Perfect Tense.</p><p>Tense remains same</p><p>Past perfect changes to Present Perfect</p><p>Past perfect changes to Simple Past</p><p></p><p></p><p>Case 1: Past Perfect (Subject + had + V3 + Object) tense will be kept intact.</p><p>For example:</p><p>He said that he had just finished the movie. (Indirect Speech)</p><p>He said, I had just finished the movie (Direct Speech)</p><p></p><p>Case 2: Past Perfect (Subject + had + V3 +Object) will be converted into Present Perfect (Subject + has/have + V3 +Object).</p><p>For example:</p><p>He said that he had got a new job. (Indirect Speech)</p><p>He said, I have got a new job. (Direct Speech)</p><p></p><p>Case 3: Past Perfect (Subject + had + V3 + Object) will be converted into Past Simple (Subject + V2 + Object).</p><p>For example:</p><p>He said that Arya had sent him a book. (Indirect Speech)</p><p>He said, Arya sent me a book (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>The changes made are displayed in the table:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>INDIRECT SPEECH</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>DIRECT SPEECH</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Had arrived</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Arrived</td></tr></table></p><p>Hence, option (a) is correct.</p>",
    "question_index": 60

    "question": "<p>  Select the option that expresses the given sentence in passive voice.</p><p>Did Raj enjoy the game?</p>",

      "Was Raj enjoyed by the game?",
      "Had the game been enjoyed by Raj?"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct answer is option (a)</p><p>The subject of the Active Voice is changed into the object of the Passive voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a 'to be' form of verb is necessary while changing the voice of the sentence from Active to Passive.</p><p>The preposition \"by\" is used before the object made in Passive Voice. However, it is optional in some cases.</p><p>The question in Active voice is an interrogative sentence. The answer to this question will be either \"yes\" or \"no\".</p><p>These types of sentences usually begin with a helping verb like \"Did\".</p><p>The format of the sentence which begins with \"Did\" in Active voice is: Did + Subject + V1 + Object?</p><p>Therefore, in Passive voice, the format will be: Was/Were + Object of the active voice (Subjective case) + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>Did he beat you? (Active)</p><p>Were you beaten by him? (Passive)</p><p>The options except (a) don't follow the correct grammatical format of the Passive Voice.</p><p>Thus, the correct answer is: <b>Was the game enjoyed by Raj?</b></p>",
    "question_index": 66

    "solution": "<p>The correct answer is (b) met.</p><p>This is a second conditional sentence for unreal or hypothetical present situations, using the past simple (\"met\") in the if-clause to describe an imagined condition, followed by \"might\" in the main clause. It follows the structure: if + past simple, might/would/could + base verb.</p><p>(a) meets is incorrect because \"meets\" is the present simple, used in zero or first conditionals for real habits or future possibilities (e.g., \"If she meets it, she will succeed\"), not hypotheticals.</p><p>(c) will meet is incorrect because future tenses (\"will meet\") are not used in if-clauses for conditions; it would create a tense mismatch.</p><p>(d) would meet is incorrect because \"would meet\" is the conditional form for the main clause in second conditionals, not the if-clause, which requires past simple.</p><p>Complete sentence: If she met the deadline, the editor might forgive the delay.</p>",

    "question": "<span class=\"eqt\"><p>Given below are two statements marked as Assertion and Reason. Choose the correct option.</p><p>Assertion (A): Myelinated nerve fibres conduct nerve impulses faster than non-myelinated fibres.</p><p>Reason (R): In myelinated fibres, the nerve impulse jumps from one node of Ranvier to the next.</p><p>Choose the correct answer:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2379; &#2360;&#2381;&#2335;&#2375;&#2335;&#2350;&#2375;&#2306;&#2335; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2309;&#2349;&#2367;&#2325;&#2341;&#2344; &#2324;&#2352; &#2325;&#2366;&#2352;&#2339; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2366;&#2352;&#2381;&#2325; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2360;&#2361;&#2368; &#2321;&#2346;&#2381;&#2358;&#2344; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A): &#2350;&#2366;&#2351;&#2354;&#2367;&#2344;&#2375;&#2335;&#2375;&#2337; &#2344;&#2352;&#2381;&#2357; &#2347;&#2366;&#2311;&#2348;&#2352; &#2344;&#2377;&#2344;-&#2350;&#2366;&#2351;&#2354;&#2367;&#2344;&#2375;&#2335;&#2375;&#2337; &#2347;&#2366;&#2311;&#2348;&#2352; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2344;&#2352;&#2381;&#2357; &#2311;&#2306;&#2346;&#2354;&#2381;&#2360; &#2325;&#2379; &#2340;&#2375;&#2332;&#2364;&#2368; &#2360;&#2375; &#2325;&#2306;&#2337;&#2325;&#2381;&#2335; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2366;&#2352;&#2339; (R): &#2350;&#2366;&#2351;&#2354;&#2367;&#2344;&#2375;&#2335;&#2375;&#2337; &#2347;&#2366;&#2311;&#2348;&#2352; &#2350;&#2375;&#2306;, &#2344;&#2352;&#2381;&#2357; &#2311;&#2306;&#2346;&#2354;&#2381;&#2360; &#2352;&#2376;&#2344;&#2357;&#2367;&#2351;&#2352; &#2325;&#2375; &#2319;&#2325; &#2344;&#2379;&#2337; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2344;&#2379;&#2337; &#2340;&#2325; &#2325;&#2370;&#2342;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true, and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2324;&#2352; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Both A and R are true, but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2368; &#2360;&#2361;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is true, but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is false, but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Assertion (A) is true:</b> Nerve impulses (action potentials) travel significantly faster in myelinated nerve fibres compared to non-myelinated ones. In non-myelinated fibres, the impulse travels at about <b>1 to 2 meters per second</b>, whereas in myelinated fibres, it can reach speeds of over <b>100 meters per second</b>.</p><p><b>Reason (R) is true:</b> The myelin sheath, produced by <b>Schwann cells</b>, acts as an electrical insulator. This sheath is interrupted at regular intervals by gaps called <b>Nodes of Ranvier</b>. Because the myelin prevents ion flow across the membrane, the action potential cannot travel continuously along the membrane. Instead, it \"jumps\" from one node to the next.</p><p><b>Why R explains A:</b></p><p>The \"jumping\" mechanism described in the reason is known as <b>Saltatory Conduction</b> (from the Latin <i>saltare</i>, meaning \"to leap\").</p><p>By skipping the insulated sections of the axon and only depolarizing the membrane at the nodes, the impulse covers the distance much more rapidly than if it had to move step-by-step along the entire length of the axon (continuous conduction). This drastically increases the conduction velocity, directly explaining why myelinated fibres are faster.</p>",
    "question_index": 107
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct regarding Peninsular India's physiography?</p><p>I. The Deccan's black soil cover chiefly comes from weathering of granite and gneiss.</p><p>II. The Eastern Ghats are lower and more discontinuous compared to the Western Ghats.</p><p>III. The Aravalli range trends SW - NE from Gujarat through Rajasthan to Delhi and is among India's oldest fold belts.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2366;&#2351;&#2342;&#2381;&#2357;&#2368;&#2346;&#2368;&#2351; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2349;&#2370;-&#2310;&#2325;&#2371;&#2340;&#2367; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2342;&#2325;&#2381;&#2325;&#2344; &#2325;&#2368; &#2325;&#2366;&#2354;&#2368; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2327;&#2381;&#2352;&#2375;&#2344;&#2366;&#2311;&#2335; &#2324;&#2352; &#2344;&#2368;&#2360; &#2325;&#2375; &#2309;&#2346;&#2325;&#2381;&#2359;&#2351; &#2360;&#2375; &#2348;&#2344;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2328;&#2366;&#2335; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2325;&#2350; &#2314;&#2306;&#2330;&#2375; &#2324;&#2352; &#2309;&#2343;&#2367;&#2325; &#2309;&#2360;&#2306;&#2340;&#2340; &#2361;&#2376;&#2306;&#2404;</p><p>III. &#2309;&#2352;&#2366;&#2357;&#2354;&#2368; &#2346;&#2352;&#2381;&#2357;&#2340;&#2350;&#2366;&#2354;&#2366; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2360;&#2375; &#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2369;&#2319; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2340;&#2325; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2360;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2370;&#2352;&#2381;&#2357; &#2325;&#2368; &#2323;&#2352; &#2347;&#2376;&#2354;&#2368; &#2361;&#2369;&#2312; &#2361;&#2376; &#2324;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2346;&#2369;&#2352;&#2366;&#2344;&#2368; &#2357;&#2354;&#2344;-&#2357;&#2354;&#2351; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>I is incorrect: The classic black soils (regur/vertisols) largely derive from Deccan Trap basalts.</p><p>II is correct: Eastern Ghats are broken by river valleys; Western Ghats are higher and more continuous.</p><p>III is correct: Aravallis are ancient; the trend is SW - NE.</p><p>Further Insights:</p><p>- The Deccan Trap is a vast basaltic plateau from fissure volcanism c. 65 million years ago.</p><p>- Western Ghats' highest peak is Anamudi (2695 m) in Kerala.</p><p>- Plateaus include Malwa, Deccan, Chota Nagpur; each with distinct drainage patterns.</p><p>- Rift valleys in the peninsula host west-flowing rivers like Narmada and Tapi.</p>",
    "question_index": 108
  },

    "question": "<span class=\"eqt\"><p>Identify the correct statement regarding the book 'The Mammaries of the Welfare State'.</p><p>I. This was a sequel to Upamanyu Chatterjee's debut novel, English, August.</p><p>II. It won the Sahitya Akademi Award (English) in 2004.</p><p>III. It regained popularity during COVID-19 pandemic as the novel deals with bureaucratic and political responses to the epidemic-hit fictional district of Madna.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2369;&#2360;&#2381;&#2340;&#2325; '&#2342; &#2350;&#2376;&#2350;&#2352;&#2368;&#2332;&#2364; &#2321;&#2347;&#2364; &#2342; &#2357;&#2375;&#2354;&#2347;&#2375;&#2351;&#2352; &#2360;&#2381;&#2335;&#2375;&#2335;' &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>I. &#2351;&#2361; &#2313;&#2346;&#2350;&#2344;&#2381;&#2351;&#2369; &#2330;&#2335;&#2352;&#2381;&#2332;&#2368; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360;, '&#2311;&#2306;&#2327;&#2381;&#2354;&#2367;&#2358;, &#2309;&#2327;&#2360;&#2381;&#2340;' &#2325;&#2366; &#2360;&#2368;&#2325;&#2381;&#2357;&#2354; &#2341;&#2366;&#2404;</p><p>II. &#2311;&#2360;&#2375; 2004 &#2350;&#2375;&#2306; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351; &#2309;&#2325;&#2366;&#2342;&#2350;&#2368; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; (&#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368;) &#2350;&#2367;&#2354;&#2366;&#2404;</p><p>III. &#2325;&#2379;&#2357;&#2367;&#2337;-19 &#2350;&#2361;&#2366;&#2350;&#2366;&#2352;&#2368; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2311;&#2360;&#2325;&#2368; &#2354;&#2379;&#2325;&#2346;&#2381;&#2352;&#2367;&#2351;&#2340;&#2366; &#2347;&#2367;&#2352; &#2360;&#2375; &#2348;&#2338;&#2364;&#2368; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; &#2351;&#2361; &#2313;&#2346;&#2344;&#2381;&#2351;&#2366;&#2360; &#2350;&#2361;&#2366;&#2350;&#2366;&#2352;&#2368; &#2360;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2366;&#2354;&#2381;&#2346;&#2344;&#2367;&#2325; &#2332;&#2367;&#2354;&#2375; &#2350;&#2342;&#2344;&#2366; &#2350;&#2375;&#2306; &#2344;&#2380;&#2325;&#2352;&#2358;&#2366;&#2361;&#2368; &#2324;&#2352; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I and II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Only III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>'The Mammaries of the Welfare State' was published at the end of 2000 as an enchanting sequel to 'English, August' and continues the story of Agastya Sen, an Indian civil servant. The novel is essentially a searing, vicious and occasional witty satire on the Indian government, with Chatterjee outlining the corruption, incompetence, laziness and malice of those who govern India. </p><p>Agastya, in spite of being one of them, is the outsider whose airiness of attitude is a cultivated mockery of the weightiness of his own conscience. </p><p>The novel is more a collection of loose episodes, lingering over various politician's sagas and descriptions of futile attempts.</p><p>It won the Sahitya Akademi Award (English) in 2004.</p><p>Two decades later, the imperative of wide state intervention in the wake of the coronavirus pandemic ensured the sequel gained renewed currency. </p><p>It can be read in a different, and immediately familiar, light for its satirical portrayal of the whims, rituals and time-hardened attitudes seen in the bureaucratic and political responses to the epidemic-hit fictional district of Madna.</p>",
    "question_index": 109
  },

    "question": "<span class=\"eqt\"><p>Assess the statements regarding National Emergency (Article 352):</p><p>I. A Proclamation must be approved by both Houses within one month by a special majority.</p><p>II. If the Lok Sabha disapproves the Proclamation by a simple majority, it ceases to operate.</p><p>III. Grounds for National Emergency include war, external aggression, or armed rebellion.</p><p>Which of the above statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; (&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 352) &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><p>I. &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2379; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2342;&#2344;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2357;&#2367;&#2358;&#2375;&#2359; &#2348;&#2361;&#2369;&#2350;&#2340; &#2360;&#2375; &#2309;&#2344;&#2369;&#2350;&#2379;&#2342;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p>II. &#2351;&#2342;&#2367; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2361;&#2369;&#2350;&#2340; &#2360;&#2375; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2379; &#2309;&#2360;&#2381;&#2357;&#2368;&#2325;&#2371;&#2340; &#2325;&#2352; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379;&#2344;&#2366; &#2348;&#2306;&#2342; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>III. &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2351;&#2369;&#2342;&#2381;&#2343;, &#2348;&#2366;&#2361;&#2352;&#2368; &#2310;&#2325;&#2381;&#2352;&#2350;&#2339; &#2351;&#2366; &#2360;&#2358;&#2360;&#2381;&#2340;&#2381;&#2352; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I and II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; I</span>",
      "<span class=\"eqt\">Only I and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only II and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">All three I, II and III are correct</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;&#2379;&#2306; I, II &#2324;&#2352; III &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>I is correct. Post-44th Amendment, approval within one month by special majority is required.</p><p>II is correct. LS can revoke it by simple majority; a special sitting can be requisitioned by one-tenth of LS members.</p><p>III is correct. \"Internal disturbance\" was replaced by \"armed rebellion\" by the 44th Amendment.</p><p>Further Insights:</p><p>- Extension requires parliamentary approval every 6 months with special majority.</p><p>- The Cabinet must communicate a written recommendation to the President for proclamation (44th Amendment safeguard).</p><p>- Rights under Article 20 and 21 remain enforceable even during National Emergency.</p>",
    "question_index": 110

;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2309;&#2352;&#2381;&#2343;&#2330;&#2306;&#2342;&#2381;&#2352;&#2366;&#2325;&#2366;&#2352; &#2352;&#2375;&#2340; &#2325;&#2375; &#2335;&#2368;&#2354;&#2375;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2348;&#2352;&#2330;&#2366;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2361;&#2367;&#2350;&#2344;&#2342; &#2344;&#2367;&#2325;&#2381;&#2359;&#2375;&#2346;&#2339; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2354;&#2350;&#2381;&#2348;&#2368; &#2346;&#2361;&#2366;&#2337;&#2364;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2352;&#2367;&#2347;&#2381;&#2335; &#2328;&#2366;&#2335;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2349;&#2381;&#2352;&#2306;&#2358; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2352;&#2375;&#2326;&#2368;&#2351; &#2309;&#2357;&#2360;&#2366;&#2342;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2319;&#2335;&#2379;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2354;&#2376;&#2327;&#2370;&#2344; &#2325;&#2379; &#2328;&#2375;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2357;&#2354;&#2351; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2325;&#2368; &#2346;&#2381;&#2352;&#2357;&#2366;&#2354; &#2349;&#2367;&#2340;&#2381;&#2340;&#2367;</td></tr></table></p></span>",
    "options": [
      "<span class=\"eqt\">A-1,B-2,C-3,D-4</span><span class=\"hqt\" style=\"display:none\">A-1,B-2,C-3,D-4</span>",
      "<span class=\"eqt\">A-2,B-3,C-1,D-4</span><span class=\"hqt\" style=\"display:none\">A-2,B-3,C-1,D-4</span>",
      "<span class=\"eqt\">A-2,B-1,C-3,D-4</span><span class=\"hqt\" style=\"display:none\">A-2,B-1,C-3,D-4</span>",
      "<span class=\"eqt\">A-3,B-1,C-2,D-4</span><span class=\"hqt\" style=\"display:none\">A-3,B-1,C-2,D-4</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A. Drumlin (Glacial Landform)</p><p>Characteristic: An elongated, teardrop-shaped hill consisting of glacial till (unsorted sediment).</p><p>Formation: They are formed by the streamlined movement of glacial ice sheets over previously deposited till. The \"blunt\" end faces the direction from which the ice advanced, while the \"tapered\" end points in the direction of ice flow.</p><p>Context: A collection of these is often referred to as a \"basket of eggs\" topography.</p><p></p><p>B. Barchan (Aeolian Landform)</p><p>Characteristic: A crescent-shaped sand dune with the \"horns\" or tips pointing downwind.</p><p>Formation: These form in areas with a constant wind direction and a limited supply of sand. The windward side is a gentle slope, while the leeward side (the slip face) is steep.</p><p></p><p>C. Rift Valley (Tectonic Landform)</p><p>Characteristic: A linear-shaped lowland or depression created by the pulling apart of the Earth's lithosphere.</p><p>Formation: It is formed by the process of faulting, specifically where a central block (graben) sinks between two parallel faults.</p><p>Example: The East African Rift and the Narmada Rift Valley in India.</p><p></p><p>D. Atoll (Marine Landform)</p><p>Characteristic: A ring-shaped coral reef, island, or series of islets that nearly or entirely encloses a shallow lagoon.</p><p>Formation: According to Darwin's theory, an atoll begins as a fringing reef around an island; as the island slowly subsides or the sea level rises, the coral continues to grow upward, eventually leaving only the ring-like reef.</p><p>Example: Lakshadweep in India is primarily composed of atolls.</p>",
    "question_index": 111
  },

    "question": "<span class=\"eqt\"><p>Which statement about the biosphere is most accurate?</p></span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2357;&#2350;&#2306;&#2337;&#2354; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2348;&#2360;&#2375; &#2360;&#2335;&#2368;&#2325; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Both energy and matter cycle within the biosphere without any loss.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2357;&#2350;&#2306;&#2337;&#2354; &#2325;&#2375; &#2349;&#2368;&#2340;&#2352; &#2314;&#2352;&#2381;&#2332;&#2366; &#2324;&#2352; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2366; &#2330;&#2325;&#2381;&#2352;&#2339; &#2348;&#2367;&#2344;&#2366; &#2325;&#2367;&#2360;&#2368; &#2361;&#2366;&#2344;&#2367; &#2325;&#2375; &#2361;&#2379;&#2340;&#2366; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Energy enters mainly from the Sun and is lost as heat; matter is mostly recycled.</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2352;&#2381;&#2332;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2370;&#2352;&#2381;&#2351; &#2360;&#2375; &#2310;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2344;&#2359;&#2381;&#2335; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2340;&#2352; &#2346;&#2369;&#2344;&#2352;&#2381;&#2330;&#2325;&#2381;&#2352;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Energy and matter both flow in only one direction and do not cycle.</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2352;&#2381;&#2332;&#2366; &#2324;&#2352; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2325;&#2375;&#2357;&#2354; A &#2361;&#2368; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2357;&#2375; &#2330;&#2325;&#2381;&#2352;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">The biosphere neither gains nor loses energy from outside.</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2357;&#2350;&#2306;&#2337;&#2354; &#2348;&#2366;&#2361;&#2352; &#2360;&#2375; &#2344; &#2340;&#2379; &#2314;&#2352;&#2381;&#2332;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2344; &#2361;&#2368; &#2314;&#2352;&#2381;&#2332;&#2366; &#2326;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The biosphere is an open system for energy: it receives solar energy and loses it as heat to space.</p><p>Matter is largely conserved and recycled through biogeochemical cycles (carbon, nitrogen, water).</p><p>Further Insights:</p><p>- Only a small fraction (roughly 1 - 2%) of incoming solar energy is fixed by photosynthesis into chemical energy.</p><p>- The energy pyramid is always upright due to the second law of thermodynamics.</p><p>- Matter cycles involve reservoirs and fluxes; human activity alters fluxes (e.g., anthropogenic CO2).</p><p>- The hydrologic cycle connects oceans, atmosphere, land and biota.</p><p>- Ecological efficiency between trophic levels is often around 10%, but varies widely.</p>",
    "question_index": 112
  },

    "question": "<span class=\"eqt\"><p>Identify the correct statement(s).</p><p>Statement I: Most Lakshadweep islands are low coral atolls built on the rims of submerged volcanic platforms.</p><p>Statement II: The administrative capital of the union territory is Kavaratti.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2354;&#2325;&#2381;&#2359;&#2342;&#2381;&#2357;&#2368;&#2346; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2342;&#2381;&#2357;&#2368;&#2346; &#2332;&#2354;&#2350;&#2327;&#2381;&#2344; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366;&#2350;&#2369;&#2326;&#2368;&#2351; &#2346;&#2336;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2325;&#2367;&#2344;&#2366;&#2352;&#2379;&#2306; &#2346;&#2352; &#2348;&#2344;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344; &#2346;&#2381;&#2352;&#2357;&#2366;&#2354; &#2319;&#2335;&#2379;&#2354; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2358;&#2366;&#2360;&#2367;&#2340; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2325;&#2368; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344;&#2367;&#2325; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2325;&#2357;&#2352;&#2340;&#2381;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Lakshadweep islands are chiefly coral atolls with lagoons (true).</p><p>Kavaratti is the UT headquarters (true), but this fact does not explain their atoll origin.</p><p>Further Insights:</p><p>- Lakshadweep comprises 36 islands; notable inhabited ones include Kavaratti, Agatti, Amini, and Minicoy.</p><p>- Minicoy (Maliku) lies south of the Nine Degree Channel, distinct linguistically and culturally.</p><p>- Coral reefs require warm, clear, shallow waters and sunlight; turbidity inhibits growth.</p><p>- Lakshadweep lies off the Malabar Coast in the Arabian Sea.</p>",
    "question_index": 113
  },

    "question": "<span class=\"eqt\"><p>Consider the statements regarding Bhakti and Sufi traditions:</p><p>1) Nayanars (Shaiva) and Alvars (Vaishnava) promoted personal devotion through Tamil hymns.</p><p>2) The Chishti order in India stressed sama (musical assemblies) and langar, and kept distance from royal power.</p><p>3) The Suhrawardi order mainly thrived in the Deccan and shunned state patronage.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2325;&#2381;&#2340;&#2367; &#2324;&#2352; &#2360;&#2370;&#2347;&#2368; &#2346;&#2352;&#2306;&#2346;&#2352;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>1) &#2344;&#2351;&#2344;&#2366;&#2352; (&#2358;&#2376;&#2357;) &#2324;&#2352; &#2309;&#2354;&#2357;&#2366;&#2352; (&#2357;&#2376;&#2359;&#2381;&#2339;&#2357;) &#2360;&#2306;&#2346;&#2381;&#2352;&#2342;&#2366;&#2351;&#2379;&#2306; &#2344;&#2375; &#2340;&#2350;&#2367;&#2354; &#2349;&#2332;&#2344;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2349;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>2) &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2330;&#2367;&#2358;&#2381;&#2340;&#2368; &#2360;&#2306;&#2346;&#2381;&#2352;&#2342;&#2366;&#2351; &#2344;&#2375; &#2360;&#2350;&#2366; (&#2360;&#2306;&#2327;&#2368;&#2340; &#2360;&#2349;&#2366;&#2323;&#2306;) &#2324;&#2352; &#2354;&#2306;&#2327;&#2352; &#2346;&#2352; &#2332;&#2379;&#2352; &#2342;&#2367;&#2351;&#2366; &#2324;&#2352; &#2352;&#2366;&#2332;&#2358;&#2366;&#2361;&#2368; &#2360;&#2375; &#2342;&#2370;&#2352;&#2368; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2368;&#2404;</p><p>3) &#2360;&#2369;&#2361;&#2352;&#2366;&#2357;&#2352;&#2381;&#2342;&#2368; &#2360;&#2306;&#2346;&#2381;&#2352;&#2342;&#2366;&#2351; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2342;&#2325;&#2381;&#2325;&#2344; &#2350;&#2375;&#2306; &#2347;&#2354;&#2366;-&#2347;&#2370;&#2354;&#2366; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2360;&#2375; &#2342;&#2370;&#2352; &#2352;&#2361;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">1 and 3 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">1 and 2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1 &#2324;&#2352; 2</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statement 1 is correct: Nayanar and Alvar saints were central to early bhakti in the south.</p><p>Statement 2 is correct: Chishtis emphasized poverty, hospitality, and non-involvement in court politics.</p><p>Statement 3 is incorrect: Suhrawardis were active in Multan and Bengal and were more open to state associations.</p><p>Further Insights:</p><p>- Key Chishti saints: Moinuddin Chishti (Ajmer), Nizamuddin Auliya (Delhi).</p><p>- Suhrawardi figure: Baha-ud-din Zakariya (Multan).</p><p>- North Indian Bhakti leaders: Kabir, Ravidas, Surdas, Tulsidas, Mirabai.</p><p>- Veerashaiva (Lingayat) movement in Karnataka critiqued caste and ritualism.</p>",
    "question_index": 114
  },

    "question": "<span class=\"eqt\"><p>In national income accounting, per capita income is calculated as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; &#2354;&#2375;&#2326;&#2366;&#2306;&#2325;&#2344; &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2310;&#2351; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">GDP divided by total population</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2325;&#2379; &#2325;&#2369;&#2354; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">National income divided by total population</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; &#2325;&#2379; &#2325;&#2369;&#2354; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Net national product divided by labour force</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2350; &#2348;&#2354; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2358;&#2369;&#2342;&#2381;&#2343; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Gross national income divided by number of households</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; &#2325;&#2379; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2349;&#2366;&#2327; &#2342;&#2375;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2350;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Per Capita Income (PCI)</b>, also known as average income, measures the average income earned per person in a given area (usually a country) in a specified year.</p><p>It is calculated by taking the National Income (often expressed as Net National Product at factor cost) and dividing it by the total population of the country.</p><p>Per Capita Income = National Income/ Total Population</p><p><b>Why the other options are incorrect:</b></p><p><b>GDP divided by total population:</b> This calculates <b>GDP per capita</b>. While similar, GDP measures the value of production within a country's borders, whereas National Income accounts for net income from abroad and excludes depreciation.</p><p><b>Net national product divided by labour force:</b> Dividing an economic indicator by the \"labour force\" (people working or looking for work) measures <b>productivity</b> or income per worker, not the average for the entire population (which includes children and the elderly).</p><p><b>Gross national income divided by number of households:</b> This would calculate the <b>Average Household Income</b>, which is different from per capita income because a single household typically consists of multiple people.</p>",
    "question_index": 115
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the true statement(s). </p><p>I. In perfect competition, each firm can influence the market price through its individual output decisions.</p><p>II. A monopolist faces the entire market demand curve and is a price maker.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2347;&#2352;&#2381;&#2350; &#2309;&#2346;&#2344;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2327;&#2340; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2319;&#2325;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;&#2357;&#2366;&#2342;&#2368; &#2325;&#2379; &#2360;&#2306;&#2346;&#2370;&#2352;&#2381;&#2339; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2366;&#2306;&#2327; &#2357;&#2325;&#2381;&#2352; &#2325;&#2366; &#2360;&#2366;&#2350;&#2344;&#2366; &#2325;&#2352;&#2344;&#2366; &#2346;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2357;&#2361; &#2350;&#2370;&#2354;&#2381;&#2351; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Perfectly competitive firms are price takers; an individual firm cannot influence the market price. Statement I is false.</p><p>A monopolist is the sole seller and is a price maker, constrained by the downward-sloping market demand curve. Statement II is true.</p><p>Further Insights:</p><p>- In perfect competition, P = MR = AR for the firm; profit-maximizing output where P = MC (in the short run).</p><p>- In monopoly, MR &lt; P; the monopolist sets MR = MC and then charges the price from the demand curve.</p><p>- Deadweight loss occurs under monopoly due to output restriction below the competitive level.</p><p>- Natural monopolies arise with high fixed costs and declining average costs (e.g., utilities).</p>",
    "question_index": 116
  },

      "<span class=\"eqt\">Jan Kalyan Mission</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2350;&#2367;&#2358;&#2344;</span>",

      "<span class=\"eqt\">Tribal Vikas Sankalp</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2342;&#2367;&#2357;&#2366;&#2360;&#2368; &#2357;&#2367;&#2325;&#2366;&#2360; &#2360;&#2306;&#2325;&#2354;&#2381;&#2346;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Government of India has launched the <b>DhartiAaba Janbhagidari Abhiyan</b>, a massive nationwide benefit saturation campaign. In a message Shri Jual Oram, Union Minister of Tribal Affairs, stated that this Abhiyan is a historic step in realizing the dream of Prime Minister for Antyodaya. </p><p>Our tribal brothers and sisters are the custodians of India's ancient heritage. Through this campaign, not just delivering schemes government led by Shri Narendra Modi is delivering dignity, self-respect, and a shared stake in Viksit Bharat. </p><p>In another message Shri Durga DasUikey, Minister of State, Tribal Affairs, said that the sheer scale, planning, and community-led model of this campaign is unprecedented. With synchronized efforts across 549 tribal dominated districts, 207 PVTG dominated districts, and support from multiple ministries and stakeholders, this Abhiyan stands as a model for convergence-based, inclusive governance. </p><p>During the second fortnight of this month from 15th to 30th June, flagship campaign is being rolled out across an unparalleled geographical footprint'549 tribal-dominated districts and 207 Particularly Vulnerable Tribal Groups (PVTG)-dominated districts covering about 100,000 Villages &amp; Habitations in total.</p>",
    "question_index": 117
  },

    "question": "<span class=\"eqt\"><p>In the Travel Leisure World's Best Awards 2025, Chhatrapati Shivaji Maharaj International Airport (CSMIA) in Mumbai earned a place among the world's top 10 international airports and became only Indian airport to feature in the list. What was its rank globally?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2335;&#2381;&#2352;&#2376;&#2357;&#2354; &#2354;&#2368;&#2332;&#2352; &#2357;&#2352;&#2381;&#2354;&#2381;&#2337;&#2381;&#2360; &#2348;&#2375;&#2360;&#2381;&#2335; &#2309;&#2357;&#2366;&#2352;&#2381;&#2337;&#2381;&#2360; 2025 &#2350;&#2375;&#2306;, &#2350;&#2369;&#2306;&#2348;&#2312; &#2360;&#2381;&#2341;&#2367;&#2340; &#2331;&#2340;&#2381;&#2352;&#2346;&#2340;&#2367; &#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2350;&#2361;&#2366;&#2352;&#2366;&#2332; &#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2361;&#2357;&#2366;&#2312; &#2309;&#2337;&#2381;&#2337;&#2375; (&#2360;&#2368;&#2319;&#2360;&#2319;&#2350;&#2310;&#2312;&#2319;) &#2344;&#2375; &#2357;&#2367;&#2358;&#2381;&#2357; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; 10 &#2309;&#2306;&#2340;&#2352;&#2381;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2361;&#2357;&#2366;&#2312; &#2309;&#2337;&#2381;&#2337;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2311;&#2360; &#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2361;&#2357;&#2366;&#2312; &#2309;&#2337;&#2381;&#2337;&#2366; &#2348;&#2344; &#2327;&#2351;&#2366;&#2404; &#2357;&#2376;&#2358;&#2381;&#2357;&#2367;&#2325; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2311;&#2360;&#2325;&#2368; &#2352;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2325;&#2381;&#2351;&#2366; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">6th</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">8th</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">9th</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">10th</span><span class=\"hqt\" style=\"display:none\">10 &#2357;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Chhatrapati Shivaji Maharaj International Airport (CSMIA) in Mumbai has been named one of the world's top 10 international airports in the Travel Leisure World's Best Awards 2025. With a reader score of <b>84.23</b>, CSMIA is the only Indian airport to feature in this year's list, for the third consecutive year. </p><p>2025's rankings were once again dominated by airports in Asia and the Middle East. Istanbul Airport in Turkey retained its top position with a reader score of 98.57, followed by Singapore's Changi Airport and Hamad International Airport in Doha, Qatar. </p><p>Zayed International Airport in Abu Dhabi and Dubai International Airport rounded out the top five. Also featured were Hong Kong International Airport, Helsinki-Vantaa Airport in Finland, Tokyo's Haneda Airport, and Incheon International Airport in South Korea, with <b>CSMIA placed ninth globally.</b> </p><p>The rankings are based on a global survey conducted by Travel Leisure, with the participation of nearly 180,000 readers casting over 650,000 votes. </p><p>The survey recognises airports that go beyond efficiency and logistics, offering thoughtful design, memorable dining, and seamless travel experiences. CSMIA, spread across 1,900 acres, is the world's busiest single-runway airport and the second busiest in India, handling 55.12 million passengers and nearly 1,000 air traffic movements daily in FY 2024-25. </p><p>The airport provides direct connectivity to 54 international and 67 domestic destinations. Recent upgrades at CSMIA include the expansion of DigiYatra and FTI-TTP for biometric, paperless travel, the launch of a new Airport Operations Control Centre (AOCC), installation of 68 electronic gates, and the implementation of self-service check-in kiosks and digital payment systems across its facilities. CSMIA was also the first airport in India and third in the world to receive Level 5 Airport Customer Experience accreditation from Airports Council International (ACI). </p><p>In March, it was once again voted the Best Airport Over 40 Million Passengers in Asia-Pacific, marking its eight consecutive years of recognition in that category. </p><p>The airport is operated by Mumbai International Airport Limited (MIAL), a joint venture between Adani Airport Holdings Limited (74%) and the Airports Authority of India (26%). The Adani Group is currently India's largest private airport operator.</p>",
    "question_index": 118
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct statement(s).</p><p>Statement I: The Indus Valley people were the earliest in India to smelt iron. </p><p>Statement II: The Indus Valley Civilization is usually placed in the Bronze Age.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2325;&#2375; &#2354;&#2379;&#2327; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2354;&#2379;&#2361;&#2375; &#2325;&#2379; &#2327;&#2354;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2361;&#2354;&#2375; &#2354;&#2379;&#2327; &#2341;&#2375;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2360;&#2367;&#2306;&#2343;&#2369; &#2328;&#2366;&#2335;&#2368; &#2360;&#2349;&#2381;&#2351;&#2340;&#2366; &#2325;&#2379; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; &#2325;&#2366;&#2306;&#2360;&#2381;&#2351; &#2351;&#2369;&#2327; &#2350;&#2375;&#2306; &#2352;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement I is false because iron technology in the subcontinent becomes widespread only in the early 1st millennium BCE, long after the mature Harappan phase (c. 2600 - 1900 BCE).</p><p>Statement II is true; Harappan culture is characterized by copper-bronze metallurgy, not iron.</p><p>Further Insights:</p><p>- Mature Harappan urban centers include Mohenjo-daro, Harappa, Dholavira, and Rakhigarhi.</p><p>- Standard baked bricks with 1:2:4 ratio are common in Harappan architecture.</p><p>- Seals with animal motifs and an undeciphered script are a hallmark of Harappan trade and administration.</p><p>- Harappan weights are often in binary series (1, 2, 4, 8, 16..).</p><p>- Dholavira shows a unique water management system with reservoirs and stepped wells.</p>",
    "question_index": 119
  },

    "question": "<span class=\"eqt\"><p>The Pranhita, a major tributary of the Godavari, is formed by the confluence of:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2366;&#2339;&#2361;&#2367;&#2340;&#2366;, &#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368; &#2325;&#2368; &#2319;&#2325; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2368; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2344;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2327;&#2350; &#2360;&#2375; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Pench and Manjira</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2306;&#2330; &#2324;&#2352; &#2350;&#2306;&#2332;&#2368;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Wardha and Wainganga</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2343;&#2366; &#2324;&#2352; &#2357;&#2366;&#2311;&#2344;&#2327;&#2306;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Indravati and Sabari</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2342;&#2381;&#2352;&#2366;&#2357;&#2340;&#2368; &#2324;&#2352; &#2360;&#2348;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Purna and Pravara</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2339;&#2366; &#2324;&#2352; &#2346;&#2381;&#2352;&#2357;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Pranhita forms at the confluence of Wardha and Wainganga and contributes a large catchment to the Godavari.</p><p>Indravati and Sabari separately join the Godavari downstream; Pench is a Kanhan/Wainganga tributary; Purna and Pravara are other Godavari tributaries.</p><p>Further Insights:</p><p>- The Pranhita meets the Godavari near Kaleshwar (Telangana - Maharashtra border stretch).</p><p>- Indravati joins near Bhadrachalam; Sabari near Kunavaram (Andhra - Chhattisgarh border zone).</p><p>- Godavari is India's second-longest river, originating at Trimbak (Maharashtra).</p><p>- Manjira is a right-bank tributary of the Godavari; Penganga joins Wardha.</p><p>- The Godavari forms a large delta in Andhra Pradesh with extensive irrigation networks.</p>",
    "question_index": 120
  },
