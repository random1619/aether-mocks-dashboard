<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Find the missing term (?) in the following series-</p><p>?, 8, 12, 30, 105</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2354;&#2369;&#2346;&#2381;&#2340; &#2346;&#2342; (?) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; -</p><p>?, 8, 12, 30, 105</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Logic for the given series-</p><p>16 * 0.5 = 8</p><p>8 * 1.5 = 12</p><p>12 * 2.5 = 30</p><p>30 * 3.5 = 105</p><p>Hence, missing term = 16</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Select the number from among the given options that can replace the question mark (?) in the following series.</p><p>15, 16, 13, 18, 11, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>15, 16, 13, 18, 11, ?</p></span>",
    "options": [
      "<span class=\"eqt\">28</span><span class=\"hqt\" style=\"display:none\">28</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">27</span><span class=\"hqt\" style=\"display:none\">27</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, the pattern is:</p><p>15 + 1 = 16</p><p>16 - 3 = 13</p><p>13 + 5 = 18</p><p>18 - 7 = 11</p><p><b>11 + 9 = 20</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following numbers will replace the question mark (?) in the given series?</p><p>39, 40, 49, 74, 123, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2375;&#2327;&#2368;?</p><p>39, 40, 49, 74, 123, ?</p></span>",
    "options": [
      "<span class=\"eqt\">186</span><span class=\"hqt\" style=\"display:none\">186</span>",
      "<span class=\"eqt\">246</span><span class=\"hqt\" style=\"display:none\">246</span>",
      "<span class=\"eqt\">198</span><span class=\"hqt\" style=\"display:none\">198</span>",
      "<span class=\"eqt\">204</span><span class=\"hqt\" style=\"display:none\">204</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Logic for the given series  - </p><p>39 + 1<sup>2</sup> = 40</p><p>40 + 3<sup>2</sup> = 49</p><p>49 + 5<sup>2</sup> = 74</p><p>74 + 7<sup>2</sup> = 123</p><p>123 + 9<sup>2</sup> = <b>204</b></p><p>Hence, Missing term = 204</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In the following question, select the missing number from the given series.</p><p><b>2, 18, 36, 358, 716, ?</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2360;&#2375; &#2354;&#2369;&#2346;&#2381;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;|</p><p><b>2, 18, 36, 358, 716, ?</b></p></span>",
    "options": [
      "<span class=\"eqt\">7158</span><span class=\"hqt\" style=\"display:none\">7158</span>",
      "<span class=\"eqt\">1432</span><span class=\"hqt\" style=\"display:none\">1432</span>",
      "<span class=\"eqt\">7168</span><span class=\"hqt\" style=\"display:none\">7168</span>",
      "<span class=\"eqt\">1430</span><span class=\"hqt\" style=\"display:none\">1430</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>2*10  -  2 = 18</p><p>18*2 = 36</p><p>36*10  -  2 = 358</p><p>358*2 = 716</p><p><b>716*10  -  2 = 7158</b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following numbers will replace the question mark (?) in the given series? </p><p>144, ?, 119, 94, 58</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2375;&#2327;&#2368;?</p><p>144, ?, 119, 94, 58</p></span>",
    "options": [
      "<span class=\"eqt\">123</span><span class=\"hqt\" style=\"display:none\">123</span>",
      "<span class=\"eqt\">135</span><span class=\"hqt\" style=\"display:none\">135</span>",
      "<span class=\"eqt\">137</span><span class=\"hqt\" style=\"display:none\">137</span>",
      "<span class=\"eqt\">122</span><span class=\"hqt\" style=\"display:none\">122</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, the pattern is:</p><p>144  -  3<sup>2</sup> = 135</p><p>135  -  4<sup>2</sup> = 119</p><p>119  -  5<sup>2</sup> = 94</p><p>94  -  6<sup>2</sup> = 58</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In the question given below, select the option which can replace the question mark (?) in the given series. </p><p><b>33, 63, 48, 49, 63, ?, 78, 21</b> </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><b>33, 63, 48, 49, 63, ?, 78, 21</b></p></span>",
    "options": [
      "<span class=\"eqt\">64</span><span class=\"hqt\" style=\"display:none\">64</span>",
      "<span class=\"eqt\">71</span><span class=\"hqt\" style=\"display:none\">71</span>",
      "<span class=\"eqt\">54</span><span class=\"hqt\" style=\"display:none\">54</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>"

    "correct_option_id": 3,
    "solution": "<p>This is an alternating series. </p><p>33 + 15 = 48, 48 + 15 = 63, 63 + 15 = 78.</p><p>63 - 14 = 49, 49 - 14 = <b>35</b>, 35 - 14 = 21</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find the missing term (?) in the following series.</p><p>23, 46, 138, 276, 828, 1656, ? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2354;&#2369;&#2346;&#2381;&#2340; &#2346;&#2342; (?) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>23, 46, 138, 276, 828, 1656, ?</p></span>",
    "options": [
      "<span class=\"eqt\">4960</span><span class=\"hqt\" style=\"display:none\">4960</span>",
      "<span class=\"eqt\">4968</span><span class=\"hqt\" style=\"display:none\">4968</span>",
      "<span class=\"eqt\">4868</span><span class=\"hqt\" style=\"display:none\">4868</span>",
      "<span class=\"eqt\">4868</span><span class=\"hqt\" style=\"display:none\">4860</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Logic the above series is:</p><p>23 * 2 = 46</p><p>46 * 3 = 138 </p><p>138 * 2 = 276 </p><p>276 * 3 = 828 </p><p>828 * 2 = 1656</p><p>1656 * 3 = <b>4968</b></p><p>Hence, the missing term is. 4968</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What should come in place of '?' in the given series?</p><p>1, 2, 6, 15, 31, 56, 92, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; '?' &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2310;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>1, 2, 6, 15, 31, 56, 92, ?</p></span>",
    "options": [
      "<span class=\"eqt\">141</span><span class=\"hqt\" style=\"display:none\">141</span>",
      "<span class=\"eqt\">136<b> </b></span><span class=\"hqt\" style=\"display:none\">136<b> </b></span>",
      "<span class=\"eqt\">145</span><span class=\"hqt\" style=\"display:none\">145</span>",
      "<span class=\"eqt\">121</span><span class=\"hqt\" style=\"display:none\">121</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The pattern here is as follows:</p><p>1 + 1<sup>2</sup> = 2</p><p>2 + 2<sup>2</sup> = 6</p><p>6 + 3<sup>2</sup> = 15</p><p>15 + 4<sup>2</sup> = 31</p><p>31 + 5<sup>2</sup> = 56</p><p>56 + 6<sup>2 </sup>= 92</p><p>So, 92 + 7<sup>2</sup> = 141</p><p>Thus, Option (a) is the correct answer. </p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following numbers will replace the question mark (?) in the given series?</p><p>2024, 1974, 1874, 1674, 1274, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2375;&#2327;&#2368;?</p><p>2024, 1974, 1874, 1674, 1274, ?</p></span>",
    "options": [
      "<span class=\"eqt\">674</span><span class=\"hqt\" style=\"display:none\">674</span>",
      "<span class=\"eqt\">1124</span><span class=\"hqt\" style=\"display:none\">1124</span>",
      "<span class=\"eqt\">474</span><span class=\"hqt\" style=\"display:none\">474</span>",
      "<span class=\"eqt\">1074</span><span class=\"hqt\" style=\"display:none\">1074</span>"

    "correct_option_id": 2,
    "solution": "<p>2024  -  50 = 1974</p><p>1974  -  100 = 1874</p><p>1874  -  200 = 1674</p><p>1674  -  400 = 1274</p><p>1274  -  800 = <b>474</b></p><p>Thus, the answer is option (c).</p>",
    "question_index": 8

  {
    "question": "<span class=\"eqt\"><p>What should come in place of '?' in the given series?</p><p>9, 5, 14, 19, 33, 52, 85, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; '?' &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2310;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>9, 5, 14, 19, 33, 52, 85, ?</p></span>",
    "options": [
      "<span class=\"eqt\">64</span><span class=\"hqt\" style=\"display:none\">64</span>",
      "<span class=\"eqt\">121<b> </b></span><span class=\"hqt\" style=\"display:none\">121<b> </b></span>",
      "<span class=\"eqt\">137</span><span class=\"hqt\" style=\"display:none\">137</span>",
      "<span class=\"eqt\">167</span><span class=\"hqt\" style=\"display:none\">167</span>"

    "correct_option_id": 2,

  {
    "question": "<span class=\"eqt\"><p>In the question given below, select the option which can replace the question mark (?) in the given series. </p><p><b>65, 132, 269, 548, ?</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><b>65, 132, 269, 548, ?</b></p></span>",
    "options": [
      "<span class=\"eqt\">1645</span><span class=\"hqt\" style=\"display:none\">1645</span>",
      "<span class=\"eqt\">1161</span><span class=\"hqt\" style=\"display:none\">1161</span>",
      "<span class=\"eqt\">1246</span><span class=\"hqt\" style=\"display:none\">1246</span>",
      "<span class=\"eqt\">1113</span><span class=\"hqt\" style=\"display:none\">1113</span>"

    "correct_option_id": 3,
    "solution": "<p>65 x 2 + 1 + (1x1) = 132, 132 x 2 + 1 + (2x2) = 269, 269 x 2 + 1 + (3x3) = 548, 548 x 2 + 1 + (4x4) = <b>1113</b></p>",
    "question_index": 10
