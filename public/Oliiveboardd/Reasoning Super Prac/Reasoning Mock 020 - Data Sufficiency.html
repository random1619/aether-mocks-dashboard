    "question": "<span class=\"eqt\"><p>A question is given, followed by two statements labelled I and II. Identify which of the statements is/are sufficient to answer the question.</p><p>Question:</p><p>A, B, C, D, E and F are sitting around a circular table. Each of them faces either the center of the table or outside (i.e., opposite to the center). In which direction is D facing?</p><p>Statements:</p><p>(I) B sits second to the right of F and both are facing the center. Only two people are sitting between A and E from the either side. Both A and E are facing the same direction. A is not an immediate neighbor of B.</p><p>(II) C is facing the opposite direction of B. D is sitting to the second left of C.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2325;&#2341;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2306;&#2325;&#2367;&#2340; I &#2324;&#2352; II &#2342;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2325;&#2367; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p><b>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;:</b></p><p>A, B, C, D, E &#2324;&#2352; F &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2350;&#2375;&#2332; &#2325;&#2375; &#2311;&#2352;&#2381;&#2342;-&#2327;&#2367;&#2352;&#2381;&#2342; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; &#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2     "solution": "<p>Five houses of five different colours (blue, green, yellow, red and violet), with equal space between every two adjacent houses, are constructed in a row facing north. </p><p>Only statement I:</p><p>(I) Green and yellow coloured houses are constructed at the extreme ends of the row.</p><p><img width=255 height=172 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27838/image009.png\" ></p><p>So, which coloured house is exactly in the middle of the row is unknown. </p><p>Only statement II:</p><p>(II) Violet and blue coloured houses are immediate neighbouring houses of green and yellow coloured houses, respectively.</p><p>So, which coloured house is exactly in the middle of the row is unknown.</p><p>Both statement I and II:</p><p>(I) Green and yellow coloured houses are constructed at the extreme ends of the row</p><p>(II) Violet and blue coloured houses are immediate neighbouring houses of green and yellow coloured houses, respectively</p><p><img width=271 height=164 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27838/image010.png\" ></p><p>So, Red coloured house is exactly in the middle of the row.</p><p>Thus, Data in Statements I and II together is sufficient to answer the question.</p>",
