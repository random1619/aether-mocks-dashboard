<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Select the numbers from among the given options that can replace the question marks (?) in the following series.</p><p>2, 8, 3, 27, 4, 64, 5, 125, 6, 216, 7, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>2, 8, 3, 27, 4, 64, 5, 125, 6, 216, 7, ?</p></span>",
    "options": [
      "<span class=\"eqt\">323</span><span class=\"hqt\" style=\"display:none\">323</span>",
      "<span class=\"eqt\">343</span><span class=\"hqt\" style=\"display:none\">343</span>",
      "<span class=\"eqt\">327</span><span class=\"hqt\" style=\"display:none\">327</span>",
      "<span class=\"eqt\">347</span><span class=\"hqt\" style=\"display:none\">347</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, the 2<sup>nd</sup> number from the left end is the cube of the 1<sup>st</sup> number from the left end.</p><p>The 4<sup>th</sup> number from the left end is the cube of the 3<sup>rd</sup> number from the left end.</p><p>The 6<sup>th</sup> number from the left end is the cube of the 5<sup>th</sup> number from the left end.</p><p>The 8<sup>th</sup> number from the left end is the cube of the 7<sup>th</sup> number from the left end.</p><p>The 10<sup>th</sup> number from the left end is the cube of the 9<sup>th</sup> number from the left end.</p><p>The 12<sup>th</sup> number from the left end is the cube of the 11<sup>th</sup> number from the left end.</p><p>Thus, the cube of 7 is 343.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Select the number from among the given options that can replace the question mark (?) in the following series.</p><p>258, 516, 2064, ? , 99072, 990720</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>258, 516, 2064, ? , 99072, 990720</p></span>",
    "options": [
      "<span class=\"eqt\">12486</span><span class=\"hqt\" style=\"display:none\">12486</span>",
      "<span class=\"eqt\">12384</span><span class=\"hqt\" style=\"display:none\">12384</span>",
      "<span class=\"eqt\">22384</span><span class=\"hqt\" style=\"display:none\">22384</span>",
      "<span class=\"eqt\">22486</span><span class=\"hqt\" style=\"display:none\">22486</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>258 x 2 = 516</p><p>516 x 4 = 2064</p><p><b>2064 x 6 = 12384</b></p><p>12384 x 8 = 99072</p><p>99072 x 10 = 990720</p><p>\"12384\" will replace the question mark (?) in the following series.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Select the number from among the given options that can replace the question mark (?) in the following series.</p><p>21.12, 32.23, 43.34, 54.45, 65.56, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>21.12, 32.23, 43.34, 54.45, 65.56, ?</p></span>",
    "options": [
      "<span class=\"eqt\">58.05</span><span class=\"hqt\" style=\"display:none\">58.05</span>",
      "<span class=\"eqt\">70.31</span><span class=\"hqt\" style=\"display:none\">70.31</span>",
      "<span class=\"eqt\">87.78</span><span class=\"hqt\" style=\"display:none\">87.78</span>",
      "<span class=\"eqt\">76.67</span><span class=\"hqt\" style=\"display:none\">76.67</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Here, the digits after the decimal is the reverse of the digits present before the decimal.</p><p>Also, the numbers start from 2, 3, 4, 5, 6. Thus, the next term will start from 7.</p><p><b>Alternate</b></p><p>21.12  + 11.11 = 32.23</p><p>32.23 + 11.11 = 43.34</p><p>43.34 + 11.11 = 54.45</p><p>54.45 + 11.11 = 65.56</p><p>65.56 + 11.11 = 76.67</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option which can replace the question mark (?) in the given series. </p><p><b>0.023</b>, <b>0.223, 0.133, ?, 0.243, 0.443, 0.353</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><b>0.023</b>, <b>0.223, 0.133, ?, 0.243, 0.443, 0.353</b></p></span>",
    "options": [
      "<span class=\"eqt\">0.033</span><span class=\"hqt\" style=\"display:none\">0.033</span>",
      "<span class=\"eqt\">0.434</span><span class=\"hqt\" style=\"display:none\">0.434</span>",
      "<span class=\"eqt\">0.333</span><span class=\"hqt\" style=\"display:none\">0.333</span>",
      "<span class=\"eqt\">0.043</span><span class=\"hqt\" style=\"display:none\">0.043</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>0.023 + 0.2 = 0.223; 0.223 - 0.09 = 0.133; 0.133 + 0.2 = <b>0.333</b>; 0.333 - 0.09 = 0.243; 0.243 + 0.2 = 0.443; 0.443 - 0.09 = 0.353</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Study the given pattern carefully and select the number that can replace the question mark(?) in it.</p><p>(40,30,30),(16,?,9),(25,11,42)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2313;&#2360;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>(40,30,30),(16,?,9),(25,11,42)</p></span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The third number is thrice the difference of the first two numbers, So:</p><p>16-13= 3</p><p>3x3= 9</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option corresponding to the number which can replace the question mark (?) in the given series.</p><p><b>12, 22, 63, 248, ?, 7404</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2358;&#2381;&#2352;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2344;&#2381;&#2361; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2352;&#2370;&#2346; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p><b>12, 22, 63, 248, ?, 7404</b></p></span>",
    "options": [
      "<span class=\"eqt\">1235</span><span class=\"hqt\" style=\"display:none\">1235</span>",
      "<span class=\"eqt\">496</span><span class=\"hqt\" style=\"display:none\">496</span>",
      "<span class=\"eqt\">1470</span><span class=\"hqt\" style=\"display:none\">1470</span>",
      "<span class=\"eqt\">992</span><span class=\"hqt\" style=\"display:none\">992</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>(12 x 2) - 2 = 24 - 2 = 22; (22 x 3) - 3 = 66 - 3= 63; (63 x 4) - 4 = 252 - 4 = 248; (248 x 5) - 5 = 1240 - 5 = 1235; (1235 x 6) - 6 = 7410 - 6 = 7404.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>What should come in place of question mark (?) in the following series?</p><p>11, 36, (?), 178, 364, 734</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2344;&#2381;&#2361; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2350;&#2366;&#2344; &#2310;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>11, 36, (?), 178, 364, 734</p></span>",
    "options": [
      "<span class=\"eqt\">72</span><span class=\"hqt\" style=\"display:none\">72</span>",
      "<span class=\"eqt\">64</span><span class=\"hqt\" style=\"display:none\">64</span>",
      "<span class=\"eqt\">96</span><span class=\"hqt\" style=\"display:none\">96</span>",
      "<span class=\"eqt\">84</span><span class=\"hqt\" style=\"display:none\">84</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>11 * 2 + 14 = 36</p><p>36 * 2 + 12 = <b>84</b></p><p>84 * 2 + 10 = 178</p><p>178 * 2 + 8 = 364</p><p>364 * 2 + 6 = 734</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Complete the series:</p><p>21, 22, 26, 35, 51, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2379; &#2346;&#2370;&#2352;&#2381;&#2339; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><p>21, 22, 26, 35, 51, ?</p></span>",
    "options": [
      "<span class=\"eqt\">74</span><span class=\"hqt\" style=\"display:none\">74</span>",
      "<span class=\"eqt\">76</span><span class=\"hqt\" style=\"display:none\">76</span>",
      "<span class=\"eqt\">78</span><span class=\"hqt\" style=\"display:none\">78</span>",
      "<span class=\"eqt\">81</span><span class=\"hqt\" style=\"display:none\">81</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>21+1<sup>2</sup>=22</p><p>22+2<sup>2</sup>=26</p><p>26+3<sup>2</sup>=35</p><p>35+4<sup>2</sup>=51</p><p>51+5<sup>2</sup>=76</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Study the given pattern carefully and select the number that can replace the question mark (?) in it.</p><p>109 (94) 37; 36 (25) 41; 17 (?) 88</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2313;&#2360;&#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>109 (94) 37; 36 (25) 41; 17 (?) 88</p></span>",
    "options": [
      "<span class=\"eqt\">52</span><span class=\"hqt\" style=\"display:none\">52</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">53</span><span class=\"hqt\" style=\"display:none\">53</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>"

    "correct_option_id": 2,
    "solution": "<p>109 + 37  -  94 = 52</p><p>36 + 41  -  25 = 52</p><p>17 + 88  -  53 = 52</p><p>So, the missing number is 53.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Study the given pattern carefully and select the number that can replace the question mark(?) in it.</p><p>(12,134),(14,186),(17,?)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>(12,134), (14,186), (17,?)</p></span>",
