<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'planes get going' is coded as 'pn lm pg', and 'hard work get' is coded as 'kt rk lm'. 'hard is you' is coded as 'ab rk fg'. What can be the code for 'work' in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'planes get going' &#2325;&#2379; 'pn lm pg' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; 'hard work get' &#2325;&#2379; 'kt rk lm' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; 'hard is you' &#2325;&#2379; 'ab rk fg' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'work' &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2379;&#2337; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">kn</span><span class=\"hqt\" style=\"display:none\">kn</span>",
      "<span class=\"eqt\">lm</span><span class=\"hqt\" style=\"display:none\">lm</span>",
      "<span class=\"eqt\">pg</span><span class=\"hqt\" style=\"display:none\">pg</span>",
      "<span class=\"eqt\">kt</span><span class=\"hqt\" style=\"display:none\">kt</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img border=0 width=468 height=193 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21526/image006.jpg\" ></p><p>So,</p><p>Planes/going == pn/pg</p><p>get == lm</p><p>hard == rk</p><p>work == kt</p><p>is/you == ab/fg</p><p>So, 'work' is coded as 'kt'.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'tour hill peak valley' is written as 'cd jb mv kl', 'sand sea shore' is written as 'tr xz qw', 'peak sea tour' is written as 'mv tr kl' and 'sea sand valley' is written as 'jb tr qw'. What is the code for 'hill sea' in the same language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'tour hill peak valley' &#2325;&#2379; 'cd jb mv kl', 'sand seashore' &#2325;&#2379; 'tr xz qw', 'peak sea tour' &#2325;&#2379; 'mv tr kl' &#2324;&#2352; 'sea sand valley' &#2325;&#2379; 'jb tr qw' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2368; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'hill sea' &#2325;&#2366; &#2325;&#2379;&#2337; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">cd tr</span><span class=\"hqt\" style=\"display:none\">cd tr</span>",
      "<span class=\"eqt\">jb xz</span><span class=\"hqt\" style=\"display:none\">jb xz</span>",
      "<span class=\"eqt\">wq kl</span><span class=\"hqt\" style=\"display:none\">wq kl</span>",
      "<span class=\"eqt\">tr jb</span><span class=\"hqt\" style=\"display:none\">tr jb</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>It is given that,</p><p>'tour hill peak valley' is written as 'cd jb mv kl'------(I)</p><p>'sand sea shore' is written as 'tr xz qw'-----(II)</p><p>'peak sea tour' is written as 'mv tr kl' -----(III)</p><p>'sea sand valley' is written as 'jb tr qw' -----(IV)</p><p>From (II) and (III), the code for 'sea' is tr.</p><p>From (I) and (III), the code for 'tour peak' is kl mv (in any order).</p><p>From (I) and (IV), the code for 'valley' is jb.</p><p>So, the remaining code i.e., 'cd' will be the code for hill. </p><p>Thus, 'hill sea' is coded as 'cd tr' (in any order).</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'trip around a lake' is written as 'T R Q M' and 'view from the lake' is written as 'S V M P' and 'location from trip' is written as 'V G Q' and 'view like a world' is written as 'O S T Z'. How is 'around' written in the given language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'trip around a lake' &#2325;&#2379; 'T R Q M' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'view from the lake' &#2325;&#2379; 'S V M P' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'location from trip' &#2325;&#2379; 'V G Q' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'view like a world' &#2325;&#2379; 'O S T Z' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2368; &#2327;&#2312; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'around' &#2325;&#2379; &#2325;&#2376;&#2360;&#2375; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Q</span><span class=\"hqt\" style=\"display:none\">Q</span>",
      "<span class=\"eqt\">R</span><span class=\"hqt\" style=\"display:none\">R</span>",
      "<span class=\"eqt\">M</span><span class=\"hqt\" style=\"display:none\">M</span>",
      "<span class=\"eqt\">T</span><span class=\"hqt\" style=\"display:none\">T</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>It is given that,</p><p>'trip around a lake' is written as 'T R Q M' ------(I)</p><p>'view from the lake' is written as 'S V M P' ------(II)</p><p>'location from trip' is written as 'V G Q' -------(III)</p><p>'view like a world' is written as 'O S T Z' ------(IV)</p><p>From I and III, 'trip' is coded as Q</p><p>From I and IV, 'a' is coded as T</p><p>From I and II, 'lake' is coded as M.</p><p>Thus, the word 'around' is coded as R.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'junior elder older' is written as 'bim aim kim' and 'younger senior elder' is written as 'dim bim him' and 'older smaller younger larger' is written as 'kim fim dim gim'. How is 'larger' written in the given language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'junior elder older' &#2325;&#2379; 'bim aim kim' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'younger senior elder' &#2325;&#2379; 'dim bim him' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'older small young bigger' &#2325;&#2379; 'kim fim dim gim' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2368; &#2327;&#2312; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'larger' &#2325;&#2379; &#2325;&#2376;&#2360;&#2375; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">dim</span><span class=\"hqt\" style=\"display:none\">dim</span>",
      "<span class=\"eqt\">either fim or gim</span><span class=\"hqt\" style=\"display:none\">either fim or gim</span>",
      "<span class=\"eqt\">kim</span><span class=\"hqt\" style=\"display:none\">kim</span>",
      "<span class=\"eqt\">fim</span><span class=\"hqt\" style=\"display:none\">fim</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>It is given that,</p><p>'junior elder older' is written as 'bim aim kim' --------(I)</p><p>'younger senior elder' is written as 'dim bim him' ------(II)</p><p>'older smaller younger larger' is written as 'kim fim dim gim' ------(III)</p><p>From I and III, 'older' is coded as kim</p><p>From II and III, younger is coded as dim</p><p>Thus, 'smaller/larger' will be coded as 'fim/gim' (in any order).</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'Everyday is fun day' is written as 'gh qw rg ds', and 'Today is sunny day' is written as 'sb ds xf qw'. How may be 'Today fun everyday' be coded in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'Everyday is fun day' &#2325;&#2379; 'gh qw rg ds' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; 'Today is sunny day' &#2325;&#2379; 'sb ds xf qw' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'Today fun everyday' &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">sb gh rg</span><span class=\"hqt\" style=\"display:none\">sb gh rg</span>",
      "<span class=\"eqt\">xf qw gh</span><span class=\"hqt\" style=\"display:none\">xf qw gh</span>",
      "<span class=\"eqt\">ds gh rg</span><span class=\"hqt\" style=\"display:none\">ds gh rg</span>",
      "<span class=\"eqt\">ds sb rg</span><span class=\"hqt\" style=\"display:none\">ds sb rg</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Everyday is fun day' is written as 'gh qw rg ds' ------(I)</p><p>'Today is sunny day' is written as 'sb ds xf qw' -------(II)</p><p>From I and II, is/day coded as qw/ds (in any order)</p><p>Thus, Today/Sunny coded as sb/xf (in any order)</p><p>Everyday/fun coded as gh/rg</p><p>Therefore, Today fun everyday coded as sb gh rg or xf gh rg. </p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'please submit feedback' is written as 'one three five', and 'feedback is necessary' is written as 'seven five nine'. How will 'feedback' be coded in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, '&#2325;&#2371;&#2346;&#2351;&#2366; &#2347;&#2364;&#2368;&#2337;&#2348;&#2376;&#2325; &#2360;&#2348;&#2350;&#2367;&#2335; &#2325;&#2352;&#2375;&#2306;' &#2325;&#2379; '&#2319;&#2325; &#2340;&#2368;&#2344; &#2346;&#2366;&#2305;&#2330;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; '&#2347;&#2364;&#2368;&#2337;&#2348;&#2376;&#2325; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;' &#2325;&#2379; '&#2360;&#2366;&#2340; &#2346;&#2366;&#2305;&#2330; &#2344;&#2380;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; '&#2347;&#2364;&#2368;&#2337;&#2348;&#2376;&#2325;' &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">one</span><span class=\"hqt\" style=\"display:none\">one</span>",
      "<span class=\"eqt\">three</span><span class=\"hqt\" style=\"display:none\">three</span>",
      "<span class=\"eqt\">five</span><span class=\"hqt\" style=\"display:none\">five</span>",
      "<span class=\"eqt\">seven</span><span class=\"hqt\" style=\"display:none\">seven</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>'please submit feedback' is written as 'one three five' ------(I)</p><p>'feedback is necessary' is written as 'seven five nine' -------(II)</p><p>From (I) and (II), 'feedback is common in both equations and 'five' is common in both codes. </p><p>So, feedback is written as five. </p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'Going back to home' is written as 'hu gr wa rc', and 'home work is back' is written as 'gr rc hn xz'. How will 'work going' be coded in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'Going back to home' &#2325;&#2379; 'hu gr wa rc' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2341;&#2366; 'home work is back' &#2325;&#2379; 'gr rc hn xz' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'work going' &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">hu hn</span><span class=\"hqt\" style=\"display:none\">hu hn</span>",
      "<span class=\"eqt\">wa xz</span><span class=\"hqt\" style=\"display:none\">wa xz</span>",
      "<span class=\"eqt\">hu xz</span><span class=\"hqt\" style=\"display:none\">hu xz</span>",
      "<span class=\"eqt\">Cannot be determined</span><span class=\"hqt\" style=\"display:none\">Cannot be determined</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Going back to home' is written as 'hu gr wa rc' ------(I)</p><p>'home work is back' is written as 'gr rc hn xz' -------(II)</p><p>Thus, back/home is coded as gr/rc (in any order)</p><p>Thus, going/to is coded as hu/wa (in any order)</p><p>Thus, work/is coded as hn/xz (in any order)</p><p>So, going/work is coded as hu hn OR hu xz OR wa hn OR wa xz (in any order). </p>",
    "question_index": 6
