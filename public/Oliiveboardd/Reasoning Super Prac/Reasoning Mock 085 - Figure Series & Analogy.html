<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Select the figure that will come next in the following series.</p><p><img width=430 height=561 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p7566/image005.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2305;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2309;&#2327;&#2354;&#2368; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"430\" height=\"561\" id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p7566/image005.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The number of sides of the polygon at the top left corner keeps on increasing by 1 in step by step and, simultaneously, the number of sides of the polygon at the bottom right corner keeps on decreasing by 1 in step by step.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Select the figure from among the given options that can replace the question mark (?) in the following series.</p><p><img width=335 height=105 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19993/image008.jpg\"></p><p><img width=339 height=107 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19993/image009.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p><img width=\"335\" height=\"105\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19993/image008.jpg\"></p><p><img width=\"339\" height=\"107\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19993/image009.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Every symbol follows a particular pattern and figure <b>(I)</b> is the right option.</p><p>Star  -  Middle centre followed by Top right followed by bottom centre and then finally, <b>top left.</b></p><p>Triangle  -  Bottom centre followed by top left followed by middle centre and then finally, <b>top right.</b></p><p>Hexagon  -  Top right followed by bottom centre followed by top left and then finally, <b>middle centre.</b></p><p>Diamond  -  Top left followed by middle centre followed by top right and then finally, <b>bottom centre.</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Figure A is related to figure B in a certain pattern. Following the same pattern, figure C is related to figure D. Study the pattern and select the figure which should be placed in place of D. </p><p><img width=551 height=133 id=\"Picture 45\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23148/image043.jpg\"></p><p><img width=537 height=133 id=\"Picture 46\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23148/image044.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2325;&#2371;&#2340;&#2367; A &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2350;&#2375;&#2306; &#2310;&#2325;&#2371;&#2340;&#2367; B &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2310;&#2325;&#2371;&#2340;&#2367; C, &#2310;&#2325;&#2371;&#2340;&#2367; D &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2360;&#2375; D &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2352;&#2326;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p><img width=\"551\" height=\"133\" id=\"Picture 45\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23148/image043.jpg\"></p><p><img width=\"537\" height=\"133\" id=\"Picture 46\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23148/image044.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Here, the pattern is:</p><p>For symbols: </p><p>The upper two symbols are interchanged and then placed downwards. </p><p>The bottom two symbols are interchanged and then placed upwards. </p><p>The positions of the symbols present at the left and the right side are interchanged. </p><p>For numbers:</p><p>The given numbers are multiplied. </p><p>So, 1*9*2*6 = 108.</p><p>By following the same pattern, option figure I is correct. </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Select the figure from among the given options that can replace the question mark (?) in the following series.</p><p><img width=597 height=269 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23457/image017.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p><img width=\"597\" height=\"269\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23457/image017.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Middle figure is rotating 45<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23457/image018.png\"> anti-clockwise direction in each step.</p><p>Star and Heart figures are drawn alternately in each step.</p><p>Line is shifting its position in each step.</p><p>Arrow figure is rotating 90<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23457/image018.png\"> anti-clockwise direction in each step and shifting its position in anti-clockwise direction.</p><p>Thus, option figure (III) can replace the question mark  - </p><p><img width=139 height=159 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23457/image019.jpg\"></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Select the figure that will replace the question mark (?) in the following series. </p><p><img width=561 height=126 id=\"Picture 64\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23522/image063.jpg\"></p><p><img width=624 height=127 id=\"Picture 65\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23522/image064.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2375;&#2327;&#2368;&#2404;</p><p><img width=\"561\" height=\"126\" id=\"Picture 64\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23522/image063.jpg\"></p><p><img width=\"624\" height=\"127\" id=\"Picture 65\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23522/image064.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Here, the pattern is:</p><p>For number of edge: Step 1 has even number of edges, step 2 has odd number of edges (in each polygon), step 3 has even number of edges (in each polygon), step 4 gas odd number of edges (in each polygon). So, next step has even number of edges (in each polygon).</p><p>For number of figures: In each step the total number of figures increases by one and all the figures are similar in shape but different in sizes.</p><p>Also, in each step, the smallest figure (in size) is darkened.</p><p>So, in the next step, the figure will consists of hexagons.</p><p>So, option figure I will replace the question mark.</p><p>Option figure II is incorrect because the arrow has seven edges.</p><p>Option figure III is incorrect because the arrow has four edges and the two figures are overlapped.</p><p>Option figure IV is incorrect because the smallest figure is not darkened.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Out of the following four figures, three are alike in a certain manner and one differs from these in that manner. Select the odd figure.</p><p><img width=448 height=139 id=\"Picture 73\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23522/image074.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2330;&#2366;&#2352; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2340;&#2368;&#2344; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2352;&#2368;&#2325;&#2375; &#2360;&#2375; &#2319;&#2325; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306; &#2324;&#2352; &#2319;&#2325; &#2313;&#2360; &#2340;&#2352;&#2368;&#2325;&#2375; &#2360;&#2375; &#2311;&#2344;&#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2376;&#2404; &#2309;&#2360;&#2306;&#2327;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"448\" height=\"139\" id=\"Picture 73\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23522/image074.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In figures I, II and III, the polygon (inside the circle) touches the circle at certain points/point. </p><p>In figure IV, the polygon (inside the circle) does not touch the circle. </p><p>So, figure IV is odd. </p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Figure A is related to B in a certain pattern. Following the same pattern, figure C is related to D. Study the pattern and select the figure which should be placed in place of D.</p><p><img width=532 height=265 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image053.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2325;&#2371;&#2340;&#2367; A, B &#2360;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2310;&#2325;&#2371;&#2340;&#2367; C, D &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2360;&#2375; D &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2352;&#2326;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p><img width=\"532\" height=\"265\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image053.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Water image of figure (A) is written in figure (B).</p><p>Similarly,</p><p>Water image of figure (C) is written in figure (D).</p><p>R(18) + 4 = V(22)</p><p>Similarly,</p><p>E(5) + 4 = I(9).</p><p>So, the option figure (II) is related figure (C).</p><p><img width=164 height=178 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image054.png\"></p>",
    "question_index": 6

  {
