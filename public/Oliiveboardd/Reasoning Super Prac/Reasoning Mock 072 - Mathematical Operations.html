<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In the following question, different letters stand for various symbols as indicated below:</p><p>A : Addition</p><p>B : Subtraction</p><p>C : Multiplication</p><p>D : Division</p><p>E : Equal To</p><p>Fill in the blanks.</p><p>(365 D 5 C 10 B 510) D 44 A 124 E _____</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2344;&#2368;&#2330;&#2375; &#2342;&#2352;&#2381;&#2358;&#2366;&#2319; &#2327;&#2319; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2309;&#2325;&#2381;&#2359;&#2352; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;:</p><p>A : &#2332;&#2379;&#2396;</p><p>B : &#2328;&#2335;&#2366;&#2357;</p><p>C : &#2327;&#2369;&#2339;&#2366;</p><p>D : &#2349;&#2366;&#2327;</p><p>E : &#2348;&#2352;&#2366;&#2348;&#2352;</p><p>&#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2368; &#2346;&#2370;&#2352;&#2381;&#2340;&#2368; &#2325;&#2367;&#2332;&#2367;&#2319;&#2404;</p><p>(365 D 5 C 10 B 510) D 44 A 124 E _____</p></span>",
    "options": [
      "<span class=\"eqt\">129</span><span class=\"hqt\" style=\"display:none\">129</span>",
      "<span class=\"eqt\">435</span><span class=\"hqt\" style=\"display:none\">435</span>",
      "<span class=\"eqt\">320</span><span class=\"hqt\" style=\"display:none\">320</span>",
      "<span class=\"eqt\">225</span><span class=\"hqt\" style=\"display:none\">225</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>It is given that,</p><p>(365 D 5 C 10 B 510) D 44 A 124 E _____</p><p>(365 &div; 5 x 10 - 510) &div; 44 + 124 = (73 x 10 - 510) &div; 44 + 124 = (730 - 510) &div; 44 + 124</p><p>= 220 &div; 44 + 124 = 5 + 124 = 129.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If <b>64 $ 8 % 2 = 10</b> and <b>126 $ 7 % 22 = 40</b>, then the value of expression <b>16 $ 2 % 10 is:</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; <b>64 $ 8 % 2 = 10 &#2361;&#2376; </b>&#2324;&#2352; <b>126 $ 7 % 22 = 40 </b>&#2361;&#2376;, &#2340;&#2379; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; <b>16 $ 2 % 10</b> &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Here, $ denotes division and % denotes addition.</p><p>Therefore,</p><p>16/2 + 10 = 8 + 10 = 18</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Select the correct combination of mathematical signs that can sequentially replace the * signs and balance the given equation.</p><p>255 * 5 * 10 * 3 * 12 = 33</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2344; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2361;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; * &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>255 * 5 * 10 * 3 * 12 = 33</p></span>",
    "options": [
      "<span class=\"eqt\">x + - &div;</span><span class=\"hqt\" style=\"display:none\">x + - &div;</span>",
      "<span class=\"eqt\">&div; x - +</span><span class=\"hqt\" style=\"display:none\">&div; x - +</span>",
      "<span class=\"eqt\">x &div; + -</span><span class=\"hqt\" style=\"display:none\">x &div; + -</span>",
      "<span class=\"eqt\">&div; - x +</span><span class=\"hqt\" style=\"display:none\">&div; - x +</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>By checking the options,</p><p>from option d,</p><p>255 &div; 5 &#8722; 10 x 3 + 12 = 33</p><p>51 - 30 + 12 = 33</p><p>51 - 18 = 33</p><p>33 = 33</p><p>LHS = RHS</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which two numbers(not digits) and two signs should be interchanged to make the given equation correct?</p><p>16 &div; 8 + 24 x 6  -  12 = 87</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2360;&#2367;&#2342;&#2381;&#2343; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; (&#2313;&#2344;&#2325;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2344;&#2361;&#2368;&#2306;) &#2324;&#2352; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>16 &div; 8 + 24 x 6 - 12 = 87</p></span>",
    "options": [
      "<span class=\"eqt\">16 and 12; + and -</span><span class=\"hqt\" style=\"display:none\">16 &#2324;&#2352; 12; + &#2324;&#2352; -</span>",
      "<span class=\"eqt\">8 and 6; &div; and x<b> </b></span><span class=\"hqt\" style=\"display:none\">8 &#2324;&#2352; 6; &div; &#2324;&#2352; x<b> </b></span>",
      "<span class=\"eqt\">6 and 12; &div; and x</span><span class=\"hqt\" style=\"display:none\">6 &#2324;&#2352; 12; &div; &#2324;&#2352; x</span>",
      "<span class=\"eqt\">8 and 6; + and -</span><span class=\"hqt\" style=\"display:none\">8 &#2324;&#2352; 6; + &#2324;&#2352; -</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Option (a):</p><p>16 &div; 8 + 24 x 6  -  12 = 87</p><p>After interchanging:</p><p>12 &div; 8 - 24 x 6 + 16 = 87</p><p>1.5  -  144 + 16 = 87</p><p>-126.5 is not equal to 87</p><p>Thus, this option is incorrect. </p><p>Option (b):</p><p>16 &div; 8 + 24 x 6  -  12 = 87</p><p>After interchanging:</p><p>16 x 6 + 24 &div; 8  -  12 = 87</p><p>96 + 3  -  12 = 87</p><p>99  -  12 = 87</p><p>87 = 87</p><p>Thus, this option is correct. </p><p>Option (c):</p><p>16 &div; 8 + 24 x 6  -  12 = 87</p><p>After interchanging:</p><p>16 x 8 + 24 &div; 12  -  6 = 87</p><p>128 + 2  -  6 = 87</p><p>128  -  4 = 87</p><p>124 is not equal to 87</p><p>Thus, this option is incorrect. </p><p>Option (d):</p><p>16 &div; 8 + 24 x 6  -  12 = 87</p><p>After interchanging:</p><p>16 &div; 6 - 24 x 8 + 12 = 87</p><p>2.66  -  192 + 12 = 87</p><p>-177.34 is not equal to 87</p><p>Thus, this option is incorrect. </p><p>So, option (b) is the correct answer. </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which two signs should be interchanged to make the below equation mathematically correct?</p><p>136 &div; 8  -  6 + 14 x 2 = 114</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>136 &div; 8 - 6 + 14 x 2 = 114</p></span>",
    "options": [
      "<span class=\"eqt\">+ and -</span><span class=\"hqt\" style=\"display:none\">+ &#2324;&#2352; -</span>",
      "<span class=\"eqt\">+ and x<b> </b></span><span class=\"hqt\" style=\"display:none\">+ &#2324;&#2352; x<b> </b></span>",
      "<span class=\"eqt\">-  and x</span><span class=\"hqt\" style=\"display:none\">- &#2324;&#2352; x</span>",
      "<span class=\"eqt\">x and &div;</span><span class=\"hqt\" style=\"display:none\">x &#2324;&#2352; &div;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Option (a):</p><p>136 &div; 8  -  6 + 14 x 2 = 114</p><p>After interchanging:</p><p>136 &div; 8 + 6 - 14 x 2 = 114</p><p>17 + 6  -  28 = 114</p><p>23  -  28 = 114</p><p>-5 is not equal to 114.</p><p>Thus, this option is incorrect.</p><p>Option (b):</p><p>136 &div; 8  -  6 + 14 x 2 = 114</p><p>After interchanging:</p><p>136 &div; 8  -  6 x 14 + 2 = 114</p><p>17  -  84 + 2 = 114</p><p>-65 is not equal to 114.</p><p>Thus, this option is incorrect.</p><p>Option (c):</p><p>136 &div; 8  -  6 + 14 x 2 = 114</p><p>After interchanging:</p><p>136 &div; 8 x 6 + 14 - 2 = 114</p><p>17 x 6 + 12 = 114</p><p>102 + 12 = 114</p><p>114 is equal to 114.</p><p>Thus, this option is correct.</p><p>Option (d):</p><p>136 &div; 8  -  6 + 14 x 2 = 114</p><p>After interchanging:</p><p>136 x 8  -  6 + 14 &div; 2 = 114</p><p>1088  -  6 + 7 = 114</p><p>1089 is not equal to 114.</p><p>Thus, this option is incorrect.</p><p>So, option (c) is the correct answer.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which two signs should be interchanged to make the below equation mathematically correct?</p><p>32 x 6 + 14  -  28 &div; 7 = 182</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>32 x 6 + 14 - 28 &div; 7 = 182</p></span>",
    "options": [
      "<span class=\"eqt\">+ and x</span><span class=\"hqt\" style=\"display:none\">+ &#2324;&#2352; x</span>",
      "<span class=\"eqt\">+ and -<b> </b></span><span class=\"hqt\" style=\"display:none\">+ &#2324;&#2352; -<b> </b></span>",
      "<span class=\"eqt\">-  and x</span><span class=\"hqt\" style=\"display:none\">- &#2324;&#2352; x</span>",
      "<span class=\"eqt\">x and &div;</span><span class=\"hqt\" style=\"display:none\">x &#2324;&#2352; &div;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Option (a):</p><p>32 x 6 + 14  -  28 &div; 7 = 182</p><p>After interchanging:</p><p>32 + 6 x 14  -  28 &div; 7 = 182</p><p>32 + 84  -  4 = 182</p><p>32+80 = 182</p><p>112 is not equal to 182</p><p>Thus, this option is incorrect.</p><p>Option (b):</p><p>32 x 6 + 14  -  28 &div; 7 = 182</p><p>After interchanging:</p><p>32 x 6 - 14 + 28 &div; 7 = 182</p><p>192  -  14 + 4 = 182</p><p>192-10 = 182</p><p>182 is equal to 182</p><p>Thus, this option is correct.</p><p>Option (c):</p><p>32 x 6 + 14  -  28 &div; 7 = 182</p><p>After interchanging:</p><p>32 - 6 + 14 x 28 &div; 7 = 182</p><p>26 + 14 x 4 = 182</p><p>26 + 56 = 182</p><p>82 is not equal to 182</p><p>Thus, this option is incorrect. </p><p>Option (d):</p><p>32 x 6 + 14  -  28 &div; 7 = 182</p><p>After interchanging:</p><p>32 &div; 6 + 14  -  28 x 7 = 182</p><p>5.33 + 14  -  196 = 182</p><p>-176.67 is not equal to 182</p><p>Thus, this option is incorrect.</p><p>So, option (b) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>By interchanging the given two numbers (not digits), which of the following equations will be correct? </p><p>22 and 121</p><p>I. 22 + 594 &div; 121  -  16 x 9 = 4</p><p>II. 16 x 90 + 22  -  121 &div; 9 = 11</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; (&#2309;&#2306;&#2325;&#2379; &#2325;&#2379; &#2344;&#2361;&#2368;&#2306;) &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354;&#2344;&#2375; &#2346;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2379;&#2327;&#2366;/&#2361;&#2379;&#2306;&#2327;&#2375;?</p><p>22 &#2324;&#2352; 121</p><p>I. 22 + 594 &div; 121 - 16 x 9 = 4</p><p>II. 16 x 90 + 22 - 121 &div; 9 = 11</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>If the numbers 22 and 121 are interchanged, then the equations will be:</p><p>Equation I: 121 + 594 &div; 22  -  16 x 9 = 4</p><p>= 121 + 27  -  144</p><p>= 148  -  144</p><p>= 4</p><p>So, equation I is correct. </p><p>Equation II: 16 x 90 + 121  -  22 &div; 9 = 11</p><p>= 1440 + 121  -  2.4</p><p>= 1561  -  2.4</p><p>= 1558.6</p><p>So, equation II is incorrect.</p>",
    "question_index": 6
