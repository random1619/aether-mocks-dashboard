<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In this question, the statement is followed by three conclusions. Which of the two conclusion(s) is/are true?</p><p>Statement:</p><p>d &gt; h = s &ge; m = n &ge; x &gt; c = v</p><p>Conclusions:</p><p>I: m &gt; v</p><p>II: x &le; d</p><p>III: c &gt; h</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2325;&#2341;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2340;&#2368;&#2344; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344;:</p><p>d &gt; h = s &ge; m = n &ge; x &gt; c = v</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>I: m &gt; v</p><p>II: x &le; d</p><p>III: c &gt; h</p></span>",
    "options": [
      "<span class=\"eqt\">Only conclusion II is true</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only conclusion I is true<b> </b></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only conclusion III is true</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; III &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>I: m &gt; v: m = n &ge; x &gt; c = v, true</p><p>II: x &le; d: d &gt; h = s &ge; m = n &ge; x, possibility so false</p><p>III: c &gt; h: h = s &ge; m = n &ge; x &gt; c, false</p><p>So, the only conclusion I is true.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In this question, the statement is followed by three conclusions. Which of the two conclusion(s) is/are true?</p><p>Statement:</p><p>S &ge; K = B &gt; N &lt; H = G &lt; F &lt; R &ge; T = Y</p><p>Conclusions:</p><p>I: K &gt; R</p><p>II: S &lt; T</p><p>III: N &lt; R</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2325;&#2341;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2340;&#2368;&#2344; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344;:</p><p>S &ge; K = B &gt; N &lt; H = G &lt; F &lt; R &ge; T = Y</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>I: K &gt; R</p><p>II: S &lt; T</p><p>III: N &lt; R</p></span>",
    "options": [
      "<span class=\"eqt\">Only conclusion I is true</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only conclusion III is true<b> </b></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; III &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only conclusion II is true</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"

    "correct_option_id": 1,
    "solution": "<p>I: K &gt; R: K = B &gt; N &lt; H = G &lt; F &lt; R, False</p><p>II: S &lt; T: S &ge; K = B &gt; N &lt; H = G &lt; F &lt; R &ge; T, false</p><p>III: N &lt; R: N &lt; H = G &lt; F &lt; R, True</p><p>So, only conclusion III is true.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In this question, there are two statements showing the relation, followed by two conclusions i and ii. Assuming that the given story is true, find out which conclusion is definitely true. </p><p>Statement:</p><p>N &gt; W &ge; O = F &gt; H &lt; S &le; L = A</p><p>Conclusion:</p><p>i) H &lt; N</p><p>ii) A &gt; F</p><p>Select one of the following options</p><p>(A) Only conclusion i is logical</p><p>(B) Only conclusion ii is logical</p><p>(C) i or ii is either logical</p><p>(D) i nor ii none of the rational</p><p>(E) i and ii are both logical</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2360;&#2306;&#2348;&#2306;&#2343; &#2342;&#2367;&#2326;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2325;&#2341;&#2344; &#2361;&#2376;&#2306;, &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; i &#2324;&#2352; ii &#2361;&#2376;&#2306;&#2404; &#2351;&#2361; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2367; &#2342;&#2368; &#2327;&#2312; &#2325;&#2361;&#2366;&#2344;&#2368; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2319;&#2306; &#2325;&#2367; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>N &gt; W &ge; O = F &gt; H &lt; S &le; L = A</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>i) H &lt; N</p><p>ii) A &gt; F</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;</p><p>(A) &#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; i &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2361;&#2376;</p><p>(B) &#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; ii &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2361;&#2376;</p><p>(C) &#2351;&#2366; &#2340;&#2379; i &#2351;&#2366; ii &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2361;&#2376;</p><p>(D) &#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii &#2325;&#2379;&#2312; &#2349;&#2368; &#2340;&#2352;&#2381;&#2325;&#2360;&#2306;&#2327;&#2340; &#2344;&#2361;&#2368;&#2306;</p><p>(E) i &#2324;&#2352; ii &#2342;&#2379;&#2344;&#2379;&#2306; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2361;&#2376;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">E</span><span class=\"hqt\" style=\"display:none\">E</span>",
      "<span class=\"eqt\">A</span><span class=\"hqt\" style=\"display:none\">A</span>",
      "<span class=\"eqt\">D</span><span class=\"hqt\" style=\"display:none\">D</span>",
      "<span class=\"eqt\">B</span><span class=\"hqt\" style=\"display:none\">B</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, </p><p>Rational means do not follow and logical means follow.</p><p>N &gt; W &ge; O = F &gt; H &lt; S &le; L = A</p><p>Conclusion:</p><p>i) H &lt; N; N &gt; W &ge; O = F &gt; H ----- Logical</p><p>ii) A &gt; F; F &gt; H &lt; S &le; L = A ----- Rational</p><p>So, only conclusion i is logical. </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In this question, there are two statements showing the relation, followed by three conclusions i, ii and iii. Assuming that the given story is true, find out which conclusion is definitely true. </p><p>Statement:</p><p>Z &le; V = J; T &ge; L = P &ge; J; R &gt; T</p><p>Conclusion:</p><p>i) T &ge; Z</p><p>ii) R &ge; V</p><p>iii) Z &lt; P</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2360;&#2306;&#2348;&#2306;&#2343; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2340;&#2368;&#2344; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; i, ii &#2324;&#2352; iii &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2351;&#2361; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2367; &#2342;&#2368; &#2327;&#2312; &#2325;&#2361;&#2366;&#2344;&#2368; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2319;&#2305; &#2325;&#2367; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>Z &le; V = J; T &ge; L = P &ge; J; R &gt; T</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>i) T &ge; Z</p><p>ii) R &ge; V</p><p>iii) Z &lt; P</p></span>",
    "options": [
      "<span class=\"eqt\">Only i and iii</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">Only i and iii</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">Only i</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">All follow</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Z &le; V = J; T &ge; L = P &ge; J; R &gt; T Which is Z &le; V = J &le; P = L &le; T &lt; R</p><p>Conclusion:</p><p>i) T &ge; Z; Z &le; V = J &le; P = L &le; T ----- Follow</p><p>ii) R &ge; V; V = J &le; P = L &le; T &lt; R ----- does not follow</p><p>iii) Z &lt; P; Z &le; V = J &le; P ----- does not follow</p><p>So, only i follow. </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In this question, there are two statements showing the relation, followed by two conclusions i and ii. Assuming that the given story is true, find out which conclusion is definitely true. </p><p>Statement:</p><p>w &gt; k = a &ge; x = n &lt; v &le; b = h</p><p>Conclusion:</p><p>i) h &gt; x</p><p>ii) n &lt; w</p><p>Select one of the following options</p><p>(A) Only conclusion i is logical</p><p>(B) Only conclusion ii is logical</p><p>(C) i or ii is either logical</p><p>(D) i nor ii none of the rational</p><p>(E) i and ii are both logical</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2360;&#2306;&#2348;&#2306;&#2343; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2325;&#2341;&#2344; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; i &#2324;&#2352; ii &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2351;&#2361; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2367; &#2342;&#2368; &#2327;&#2312; &#2325;&#2361;&#2366;&#2344;&#2368; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>w &gt; k = a &ge; x = n &lt; v &le; b = h</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>i) h &gt; x</p><p>ii) n &lt; w</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;</p><p>(A) &#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; i &#2340;&#2352;&#2381;&#2325;&#2360;&#2306;&#2327;&#2340; &#2361;&#2376;</p><p>(B) &#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; ii &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2361;&#2376;</p><p>(C) &#2351;&#2366; &#2340;&#2379; i &#2351;&#2366; ii &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2361;&#2376;</p><p>(D) &#2344; &#2340;&#2379; i &#2324;&#2352; &#2344; &#2361;&#2368; ii &#2325;&#2379;&#2312; &#2349;&#2368; &#2340;&#2352;&#2381;&#2325;&#2360;&#2306;&#2327;&#2340; &#2344;&#2361;&#2368;&#2306;</p><p>(E) i &#2324;&#2352; ii &#2342;&#2379;&#2344;&#2379;&#2306; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2361;&#2376;&#2306;</p></span>",
    "options": [
