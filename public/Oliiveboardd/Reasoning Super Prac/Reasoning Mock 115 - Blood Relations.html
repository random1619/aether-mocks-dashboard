<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In this question, a question is followed by two statements numbered (i) and (ii). You have to decide whether the data provided in the statements are sufficient to answer the question. Read both the statements and decide the appropriate answer.</p><p>Question: How is Tani related to Riya?</p><p>(i) Yash is the husband of Riya. Kamal is the Father of Riya.</p><p>(ii) Namita is the wife of Kamal. Tani is the daughter of Namita.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2325;&#2341;&#2344; (i) &#2324;&#2352; (ii) &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2351;&#2361; &#2340;&#2351; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2327;&#2319; &#2337;&#2375;&#2335;&#2366; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2306; &#2351;&#2366; &#2344;&#2361;&#2368;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2313;&#2330;&#2367;&#2340; &#2313;&#2340;&#2381;&#2340;&#2352; &#2340;&#2351; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;: &#2340;&#2366;&#2344;&#2368; &#2325;&#2366; &#2352;&#2367;&#2351;&#2366; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343; &#2361;&#2376;?</p><p>(i) &#2351;&#2358; &#2352;&#2367;&#2351;&#2366; &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;&#2404; &#2325;&#2350;&#2354; &#2352;&#2367;&#2351;&#2366; &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>(ii) &#2344;&#2350;&#2367;&#2340;&#2366; &#2325;&#2350;&#2354; &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;&#2404; &#2340;&#2366;&#2344;&#2368; &#2344;&#2350;&#2367;&#2340;&#2366; &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">(i) alone is sufficient while (ii) alone is not sufficient</span><span class=\"hqt\" style=\"display:none\">(i) &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; (ii) &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both (i) and (ii) together are needed</span><span class=\"hqt\" style=\"display:none\">(i) &#2324;&#2352; (ii) &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Either (i) alone or (ii) alone is sufficient</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2366; &#2340;&#2379; (i) &#2309;&#2325;&#2375;&#2354;&#2375; &#2351;&#2366; (ii) &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;</span>",
      "<span class=\"eqt\">(ii) alone is sufficient while (i) alone is not sufficient</span><span class=\"hqt\" style=\"display:none\">(ii) &#2309;&#2325;&#2375;&#2354;&#2366; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; (i) &#2309;&#2325;&#2375;&#2354;&#2366; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement (i): Yash is the husband of Riya. Kamal is the Father of Riya.</p><p><img width=270 height=97 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25323/image029.png\"></p><p>There is no information about Tani. So, statement (i) alone is not sufficient.</p><p>Statement (ii): Namita is the wife of Kamal. Tani is the daughter of Namita.</p><p><img width=290 height=83 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25323/image030.png\"></p><p>There is no information about Yash. So, statement (ii) alone is not sufficient.</p><p>Combining statements (i) and (ii)  - </p><p>Statement (i): Yash is the husband of Riya. Kamal is the Father of Riya.</p><p>Statement (ii): Namita is the wife of Kamal. Tani is the daughter of Namita.</p><p><img width=468 height=92 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25323/image031.png\"></p><p>Tani is the sister-in-law of Yash.</p><p>Hence, Both (i) and (ii) together are needed.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language,</p><p>'A + B' means 'A is the mother of B'</p><p>'A  -  B' means 'A is the father of B'</p><p>'A $ B' means 'A is the son of B'</p><p>'A % B' means 'A is the sister of B'</p><p>'A &amp; B' means 'A is the wife of B'</p><p>'A &div; B' means 'A is the brother of B'</p><p>Which of the following coded chains means N is the aunt of P?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>'A + B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;'</p><p>'A - B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'</p><p>'A $ B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;'</p><p>'A % B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;'</p><p>'A &amp; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;'</p><p>'A &div; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;'</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2325;&#2379;&#2337;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; N, P &#2325;&#2368; &#2310;&#2306;&#2335;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">N % G &amp; H  -  I + P</span><span class=\"hqt\" style=\"display:none\">N % G &amp; H  -  I + P</span>",
      "<span class=\"eqt\">N &div; J % K + L $ P</span><span class=\"hqt\" style=\"display:none\">N &div; J % K + L $ P</span>",
      "<span class=\"eqt\">N  -  D + E % F $ P</span><span class=\"hqt\" style=\"display:none\">N  -  D + E % F $ P</span>",
      "<span class=\"eqt\">N % C &amp; A  -  B &div; P</span><span class=\"hqt\" style=\"display:none\">N % C &amp; A  -  B &div; P</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Option (a) N % G &amp; H  -  I + P</b></p><p>N % G &rarr; N is sister of G</p><p>G &amp; H &rarr; G is wife of H =&gt; H is brother-in-law of N</p><p>H  -  I &rarr; H is father of I =&gt; I is child of H</p><p>I + P &rarr; I is mother of P =&gt; I is parent of P</p><p><img width=181 height=127 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28180/image001.jpg\"></p><p>Here, N is the sister of P's grandmother.</p><p><b>Option (b) N &div; J % K + L $ P</b></p><p>N &div; J &rarr; N is brother of J</p><p>J % K &rarr; J is sister of K =&gt; K is sibling of N</p><p>K + L &rarr; K is mother of L =&gt; L is niece/nephew of N</p><p>L $ P &rarr; L is son of P =&gt; P is parent of L. L is male member. </p><p><img width=239 height=83 id=\"Picture 43\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28180/image002.jpg\"></p><p>Here, N is the brother-in-law of P. </p><p><b>Option (c) N  -  D + E % F $ P</b></p><p>N  -  D &rarr; N is father of D</p><p>D + E &rarr; D is mother of E =&gt; E is grandchild of N</p><p>E % F &rarr; E is sister of F =&gt; F is grandchild of N</p><p>F $ P &rarr; F is son of P =&gt; P is parent of F</p><p><img width=110 height=129 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28180/image003.jpg\"></p><p>Here, N is the father-in-law of P. </p><p><b>Option (d) N % C &amp; A  -  B &div; P</b></p><p>N % C &rarr; N is sister of C. </p><p>C &amp; A &rarr; C is wife of A. </p><p>A  -  B &rarr; A is father of B. </p><p>B &div; P &rarr; B is brother of P. </p><p><img width=165 height=62 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28180/image004.jpg\"></p><p>Here, N is the aunt of P. </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language,</p><p>P &#948; Q means 'P is the husband of Q'</p><p>P &#937; Q means 'P is the daughter's father-in-law of Q'</p><p>P &#952; Q means 'P is the wife of Q'</p><p>P &lt; Q means 'Q is the only child of P'</p><p>Based on the above, how is C related to E if 'A &#937; B &#948; C &lt; D &#952; E'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>P &#948; Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;'</p><p>P &#937; Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2325;&#2366; &#2360;&#2360;&#2369;&#2352; &#2361;&#2376;'</p><p>P &#952; Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;'</p><p>P &lt; Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'Q, P &#2325;&#2368; &#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2360;&#2306;&#2340;&#2366;&#2344; &#2361;&#2376;'</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, C, E &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2351;&#2342;&#2367; 'A &#937; B &#948; C &lt; D &#952; E'?</p></span>",
    "options": [
      "<span class=\"eqt\">Aunt</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2330;&#2368;</span>",
      "<span class=\"eqt\">Sister-in-law</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2349;&#2368;</span>",
      "<span class=\"eqt\">Wife's mother</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2381;&#2344;&#2368; &#2325;&#2368; &#2350;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Grandson</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A &#937; B &#948; C &lt; D &#952; E</p><p>A &#937; B means 'A is the daughter's father-in-law of B'</p><p>B &#948; C means 'B is the husband of C'</p><p>C &lt; D means 'D is the only child of C'</p><p>D &#952; E means 'D is the wife of E'</p><p><img width=320 height=121 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25323/image007.png\"></p><p>C is E's wife's mother.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language,</p><p>A - B means A is the only son of B</p><p>A + B means A is the mother-in-law of B</p><p>A  X  B means A is the sister of B</p><p>A &div; B means A is the husband of B</p><p>Based on the above, how is T related to U if 'S  X  T  -  R &div; Q + P  X  U'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>A - B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2366; &#2311;&#2325;&#2354;&#2380;&#2340;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;</p><p>A + B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2368; &#2360;&#2366;&#2360; &#2361;&#2376;</p><p>A X B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;</p><p>A &div; B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, &#2351;&#2342;&#2367; 'S X T - R &div; Q + P X U' &#2361;&#2376;, &#2340;&#2379; T, U &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sister's husband</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2344; &#2325;&#2366; &#2346;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Wife's brother</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2381;&#2344;&#2368; &#2325;&#2366; &#2349;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Father's sister</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2340;&#2366; &#2325;&#2368; &#2348;&#2361;&#2344;</span>",
      "<span class=\"eqt\">Mother's father'</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2305; &#2325;&#2375; &#2346;&#2367;&#2340;&#2366;'</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>S  X  T  -  R &div; Q + P  X  U</p><p>S  X  T means S is the sister of T</p><p>T - R means T is the only son of R</p><p>R &div; Q means R is the husband of Q</p><p>Q + P means Q is the mother-in-law of P</p><p>P  X  U means P is the sister of U</p><p><img width=300 height=99 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25323/image010.png\"></p><p>T is the Sister's Husband of U.</p>",
    "question_index": 3

    "question": "<span class=\"eqt\"><p>W is the wife of O. O has only one brother. K is the sister of T. T is married to L. K is unmarried. L is the only sister of U. U is not the brother of L or O. Which of the following pairs are siblings?</p></span><span class=\"hqt\" style=\"display:none\"><p>W, O &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;&#2404; O &#2325;&#2366; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2349;&#2366;&#2312; &#2361;&#2376;&#2404; K, T &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;&#2404; T &#2325;&#2366; &#2357;&#2367;&#2357;&#2366;&#2361; L &#2360;&#2375; &#2361;&#2369;&#2310; &#2361;&#2376;&#2404; K &#2309;&#2357;&#2367;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404; L, U &#2325;&#2368; &#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2348;&#2361;&#2344; &#2361;&#2376;&#2404; U, L &#2351;&#2366; O &#2325;&#2366; &#2349;&#2366;&#2312; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2332;&#2379;&#2337;&#2364;&#2368; &#2349;&#2366;&#2312;-&#2348;&#2361;&#2344; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>In this question, a question is followed by two statements numbered (I) and (II). You have to decide whether the data provided in the statements/s are sufficient to answer the question. Read both the statements and choose your answer carefully.</p><p><b>Question: </b>There are six members in a family viz., G, M, P, Q, R and T. P and Q are sisters and M is unmarried. Is M a brother of P?</p><p><b>Statements:</b></p><p>(I) P is the daughter of R. M is the brother-in-law of G.</p><p>(II) M is the son of R. G is the son-in-law of T and brother-in-law of M. R is the spouse of T.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; (I) &#2324;&#2352; (II) &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; &#2342;&#2379; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376; &#2351;&#2366; &#2344;&#2361;&#2368;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2367;&#2319; &#2324;&#2352; &#2309;&#2346;&#2344;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2330;&#2369;&#2344;&#2367;&#2319;&#2404;</p><p><b>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344;:</b>&#2319;&#2325; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2350;&#2375;&#2306; &#2331;&#2361; &#2360;&#2342;&#2360;&#2381;&#2351; &#2361;&#2376;&#2306;, G, M, P, Q, R &#2324;&#2352; T&#2404; P &#2324;&#2352; Q &#2348;&#2361;&#2344;&#2375;&#2306; &#2361;&#2376;&#2306; &#2324;&#2352; M &#2309;&#2357;&#2367;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404; &#2325;&#2381;&#2351;&#2366; M, P &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;?</p><p><b>&#2325;&#2341;&#2344;:</b></p><p>(I) P, R &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2361;&#2376;&#2404; M, G &#2325;&#2366; &#2360;&#2366;&#2354;&#2366; &#2361;&#2376;&#2404;</p><p>(II) M, R &#2325;&#2366; &#2348;&#2375;&#2335;&#2366; &#2361;&#2376;&#2404; G, T &#2325;&#2366; &#2342;&#2366;&#2350;&#2366;&#2342; &#2324;&#2352; M &#2325;&#2366; &#2360;&#2366;&#2354;&#2366; &#2361;&#2376;&#2404; R, T &#2325;&#2366; &#2332;&#2368;&#2357;&#2344;&#2360;&#2366;&#2341;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">The data in both Statements (I) and (II) together are NOT sufficient to answer the question.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; (I) &#2324;&#2352; (II) &#2342;&#2379;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The data in both the Statements (I) and (II) together are sufficient to answer the question.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; (I) &#2324;&#2352; (II) &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The data in Statement (II) alone is sufficient to answer the question, while the data in Statement (I) alone is not sufficient to answer the question.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; (II) &#2350;&#2375;&#2306; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2337;&#2366;&#2335;&#2366; &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2325;&#2341;&#2344; (I) &#2350;&#2375;&#2306; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2337;&#2366;&#2335;&#2366; &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">The data in Statement (I) alone is sufficient to answer the question, while the data in Statement (II) alone is not sufficient to answer the question.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; (I) &#2350;&#2375;&#2306; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2337;&#2366;&#2335;&#2366; &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2325;&#2341;&#2344; (II) &#2350;&#2375;&#2306; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2337;&#2366;&#2335;&#2366; &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>It is given that:</p><p>There are six members in a family viz., G, M, P, Q, R and T.</p><p>P and Q are sisters.</p><p><b>From statement I alone: </b></p><p>P is the daughter of R.</p><p><img width=130 height=79 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25406/image004.jpg\"></p><p>M is the brother-in-law of G. M is unmarried.</p><p>Here, the relation of M with respect to R, P and S cannot be determined.</p><p>So, statement I alone is not sufficient to answer the question.</p><p><b>From statement II alone: </b></p><p>M is the son of R. R is the spouse of T.</p><p>M is unmarried.</p><p>G is the son-in-law of T and brother-in-law of M.</p><p><img width=222 height=96 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25406/image005.jpg\"></p><p>P and S are sisters and there are only six members in a family. So, we get:</p><p><img width=295 height=92 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25406/image006.jpg\"></p><p>Here, M is the brother of P. So, statement II alone is sufficient to answer the question.</p>",
    "question_index": 5
  },

    "question": "<span class=\"eqt\"><p>In a certain code language,</p><p>'A + B' means 'A is the mother of B'</p><p>'A  -  B' means 'A is the father of B'</p><p>'A $ B' means 'A is the son of B'</p><p>'A % B' means 'A is the sister of B'</p><p>'A &amp; B' means 'A is the wife of B'</p><p>'A &div; B' means 'A is the brother of B'</p><p>Which of the following coded chains means G is the great-grandmother of K?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>'A + B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;'</p><p>'A - B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'</p><p>'A $ B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;'</p><p>'A % B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;'</p><p>'A &amp; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;'</p><p>'A &div; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;'</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2325;&#2379;&#2337;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; G, K &#2325;&#2368; &#2346;&#2352;&#2342;&#2366;&#2342;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">G  -  M + N % O $ K</span><span class=\"hqt\" style=\"display:none\">G  -  M + N % O $ K</span>",
      "<span class=\"eqt\">G &div; S % T + U $ K</span><span class=\"hqt\" style=\"display:none\">G &div; S % T + U $ K</span>",
      "<span class=\"eqt\">G + H  -  T + J &div; K</span><span class=\"hqt\" style=\"display:none\">G + H  -  T + J &div; K</span>",
      "<span class=\"eqt\">G + P  -  Q $ R % K</span><span class=\"hqt\" style=\"display:none\">G + P  -  Q $ R % K</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Option (a) G  -  M + N % O $ K</b></p><p>G  -  M &rarr; G is father of M</p><p>M + N &rarr; M is mother of N =&gt; N is grandchild of G</p><p>N % O &rarr; N is sister of O =&gt; O is grandchild of G</p><p>O $ K &rarr; O is son of K =&gt; K is parent of O</p><p><img width=131 height=150 id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28180/image013.jpg\"></p><p><b>=&gt;</b> G is father-in-law of K</p><p><b>Option (b) G &div; S % T + U $ K</b></p><p>G &div; S &rarr; G is brother of S</p><p>S % T &rarr; S is sister of T =&gt; T is sibling of G</p><p>T + U &rarr; T is mother of U =&gt; U is child of T</p><p>U $ K &rarr; U is son of K =&gt; K is parent of U</p><p><img width=246 height=110 id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28180/image014.jpg\"></p><p>=&gt; G is brother-in-law of K</p><p><b>Option (c) G + H  -  T + J &div; K</b></p><p>G + H &rarr; G is mother of H</p><p>H  -  T &rarr; H is father of T =&gt; T is grandchild of G</p><p>T + J &rarr; T is mother of J =&gt; J is great-grandchild of G</p><p>J &div; K &rarr; J is brother of K =&gt; K is great-grandchild of G</p><p><img width=99 height=208 id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28180/image015.jpg\"></p><p>=&gt; G is great-grandmother of K</p><p><b>Option (d) G + P  -  Q $ R % K</b></p><p>G + P &rarr; G is mother of P</p><p>P  -  Q &rarr; P is father of Q =&gt; Q is grandchild of G</p><p>Q $ R &rarr; Q is son of R =&gt; R is wife of P</p><p>R % K &rarr; R is sister of K </p><p><img width=197 height=158 id=\"Picture 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p28180/image016.jpg\"></p><p>=&gt; G is mother-in-law of the sister of K</p>",
    "question_index": 6
  },

    "question": "<span class=\"eqt\"><p>If A ! B means 'A is the only child of B', A @ B means 'A is the father of B', A # B means 'A is the maternal grandmother of B', A % B means 'A is the daughter of B' and A &amp; B means 'A is the sister of B', then in the expression <b>T @ Y ! K # G &amp; R % L</b>, which of the following statement is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A ! B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2360;&#2306;&#2340;&#2366;&#2344; &#2361;&#2376;', A @ B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;', A # B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2344;&#2366;&#2344;&#2368; &#2361;&#2376;', A % B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2361;&#2376;' &#2324;&#2352; A & B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;', &#2340;&#2379; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; <b>T @ Y ! K # G & R % L</b> &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">R is the sister of Y.</span><span class=\"hqt\" style=\"display:none\">R, Y &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">L is the son of K.</span><span class=\"hqt\" style=\"display:none\">L, K &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">G is the granddaughter of T.</span><span class=\"hqt\" style=\"display:none\">G, T &#2325;&#2368; &#2346;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Y is the son of T.</span><span class=\"hqt\" style=\"display:none\">Y, T &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>It is given that:</p><p>A ! B means 'A is the only child of B'.</p><p>A @ B means 'A is the father of B'.</p><p>A # B means 'A is the maternal grandmother of B'.</p><p>A % B means 'A is the daughter of B'.</p><p>A &amp; B means 'A is the sister of B'.</p><p>After decoding the given expression, <b>T @ Y ! K # G &amp; R % L</b> we get:</p><p>T is the father of Y. Y is the only child of K. K is the maternal grandmother of G. G is the sister of R. R is the daughter of L.</p><p><img width=158 height=138 id=\"Picture 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21108/image016.jpg\"></p><p>Thus, only option (c) is correct.</p>",
    "question_index": 15
  },
