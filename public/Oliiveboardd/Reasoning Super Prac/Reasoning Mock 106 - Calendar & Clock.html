  {
    "question": "<span class=\"eqt\"><p>If a clock shows 3 hours 23 minutes, how much angle does the minute and hour hand make?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2328;&#2337;&#2364;&#2368; 3 &#2328;&#2306;&#2335;&#2375; 23 &#2350;&#2367;&#2344;&#2335; &#2342;&#2367;&#2326;&#2366; &#2352;&#2361;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2360;&#2369;&#2312; &#2325;&#2367;&#2340;&#2344;&#2366; &#2325;&#2379;&#2339; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",

    "solution": "<p>The angle between hour hand and minute hand when the clock show 3 hours 23 minutes is given by:</p><p>Angle = [(11/2)*M  -  30*H]</p><p>Where, M = minutes and H = hour</p><p>So,</p><p>Angle = [(11/2)*23  -  30*3]</p><p>Angle = [126.5  -  90]</p><p>Angle = 36.5<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24978/image005.png\"></p>",

  {
    "question": "<span class=\"eqt\"><p>Find the mirror image of the clock when the time is 15:45.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2360;&#2350;&#2351; 15:45 &#2361;&#2379; &#2340;&#2379; &#2328;&#2337;&#2364;&#2368; &#2325;&#2366; &#2342;&#2352;&#2381;&#2346;&#2339; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

  {
    "question": "<span class=\"eqt\"><p>At what time between 8 O'Clock and 9 O'Clock, will the minute hand and hour hand of the clock make right angles?</p></span><span class=\"hqt\" style=\"display:none\"><p>8 &#2348;&#2332;&#2375; &#2324;&#2352; 9 &#2348;&#2332;&#2375; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2360; &#2360;&#2350;&#2351; &#2328;&#2337;&#2364;&#2368; &#2325;&#2368; &#2350;&#2367;&#2344;&#2335; &#2325;&#2368; &#2360;&#2369;&#2312; &#2324;&#2352; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2360;&#2369;&#2312; &#2360;&#2350;&#2325;&#2379;&#2339; &#2348;&#2344;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">8:40:20</span><span class=\"hqt\" style=\"display:none\">8:40:20</span>",
      "<span class=\"eqt\">8:27:16</span><span class=\"hqt\" style=\"display:none\">8:27:16</span>",
      "<span class=\"eqt\">8:25:00</span><span class=\"hqt\" style=\"display:none\">8:25:00</span>",
      "<span class=\"eqt\">8:55:17</span><span class=\"hqt\" style=\"display:none\">8:55:17</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>To determine when the minute hand and hour hand of a clock will form right angles between 8:00 and 9:00, we can use the following approach:</p><p><b>Position of the hour hand</b>: At 8:00, the hour hand is at 240 degrees (each hour represents 30 degrees, so 8 X 30=240). The hour hand moves at a rate of 0.5 degrees per minute (since it moves 30 degrees in 60 minutes).</p><p>Therefore, after m minutes past 8:00, the position of the hour hand will be:</p><p>Hour hand position= 240+0.5m</p><p><b>Position of the minute hand</b>: The minute hand starts at 0 degrees at 8:00 and moves at a rate of 6 degrees per minute (since it moves 360 degrees in 60 minutes).</p><p>After m minutes past 8:00, the position of the minute hand will be:</p><p>Minute hand position=6m</p><p><b>Finding right angles</b>: The minute hand and hour hand will be at right angles (90 degrees apart) if:</p><p>&#8739;Minute hand position&#8722;Hour hand position&#8739;=90</p><p>This gives us two cases to solve:</p><p>Case 1:</p><p>6m&#8722;(240+0.5m)=90</p><p>6m - 240 - 0.5m=90</p><p>5.5m=90+240</p><p>5.5m=330</p><p>m=60 minutes, which is not possible as it exceed 60 minutes.</p><p>So, case 1 gets cancelled.</p><p>Case 2:</p><p>6m - (240+0.5m)=-90</p><p>6m - 240 - 0.5m=-90</p><p>5.5m=-90+240</p><p>5.5m=150</p><p>m=27.27</p><p>8 hours 27.27 minutes</p><p>Seconds = 0.27 X 60 seconds = 16.2 <img width=12 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image013.png\"> 16</p><p>Thus, the hands of the clock will make right angles at <b>8:27:16</b>.</p><p><b>Alternative method:</b></p><p><b>By using formulae:</b></p><p>Case 1:</p><p>Right angle = 90<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image014.png\"></p><p>Angle between two hands = <img width=23 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image015.png\">M  -  30H</p><p>Where H is Hours and M is Minutes</p><p>Here Hour = 8 and Angle = 90<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image014.png\"></p><p>90 = <img width=23 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image015.png\">M  -  30  X  8</p><p>90 = <img width=23 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image015.png\">M  -  240</p><p><img width=28 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image016.png\">M = 330</p><p>M = <img width=32 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image017.png\"></p><p>M = 60</p><p>Hence, the required time = 8:60, which is not possible as it exceed 60 minutes.</p><p>Case 2:</p><p>Right angle = -90<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image014.png\"></p><p>Angle between two hands = <img width=23 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image015.png\">M  -  30H</p><p>Where H is Hours and M is Minutes</p><p>Here Hour = 8 and Angle =- - 90<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image014.png\"></p><p>-90 = <img width=23 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image015.png\">M  -  30  X  8</p><p>-90 = <img width=23 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image015.png\">M  -  240</p><p><img width=23 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image015.png\">M = 150</p><p>M = <img width=32 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image018.png\"></p><p>M=27.27</p><p>8 hours 27.27 minutes</p><p>Seconds = 0.27 X 60 seconds = 16.2 <img width=12 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25941/image019.png\"> 16</p><p>Thus, the hands of the clock will make right angles at <b>8:27:16</b>.</p>",
    "question_index": 3
  },

  },

    "correct_option_id": 0,
    "solution": "<p><b>Odd days in a month:</b></p><p>We get the number of odd days in a month when the number of days of a month is divided by 7.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Month</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Odd no of Days</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Months having 31 days (Jan, March, May, July, Aug, Oct, Dec)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Months having 30 days (April, June, Sept, Nov)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">February (if ordinary year/If leap year)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">0/1</td></tr></table><p>Here, in the given question, consider the time from 8<sup>th</sup> April 2024 to 31<sup>st</sup> December 2024.</p><p>No. of odd days till 31<sup>st</sup> December 2024 = 22 + 3 + 2 + 3 + 3 + 2 + 3 + 2 + 3 = 43 (1 odd days)</p><p>Hence, the number of odd days from 8<sup>th</sup> April 2024 to 31<sup>st</sup> December 2024= <b>1.</b> -------- (1)</p><p>Additionally, the number of days between 1<sup>st</sup> January, 2025 to 20<sup>th</sup> August 2025.</p><p>No. of odd days till 20<sup>th</sup> August 2025= 3+0(2025 being a non-leap year)+3+2+3+2+3 + 20 = 36(5 weeks 1 days)</p><p>Hence, the number of odd days till 20<sup>th</sup> August 2025= <b>1.</b> -------- (2)</p><p>Adding (1) and (2) we get,</p><p>Total odd days = 1 + 1 = 2 (2 day)</p><p>Hence, we get 2 odd days.</p><p>Tuesday + 2 = Thursday</p><p>Hence, it was <b>Thursday</b> on 20<sup>th</sup> August 2025.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following years will have the same calendar exactly as the year 2022?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2325;&#2366; &#2346;&#2306;&#2330;&#2366;&#2306;&#2327; (&#2325;&#2376;&#2354;&#2375;&#2306;&#2337;&#2352;) &#2336;&#2368;&#2325; &#2357;&#2352;&#2381;&#2359; 2022 &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2327;&#2366;?</p></span>",

      "<span class=\"eqt\">2041</span><span class=\"hqt\" style=\"display:none\">2041</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>If the total number of odd days between any two years is zero or a multiple of seven, then the two years will have the exact same calendar.</p><p>No. of odd days in each leap year = 2 and in each other year = 1</p><p>So, for each of 2022, 2023, 2025, 2026, 2027, 2029, 2030, 2031, 2033 we will get 1 odd day, hence, total = 9 odd days.</p><p>For each of 2024, 2028 and 2032, we will get 2 odd days, hence, total =6</p><p>Thus 2022 to 2033 has 15 odd days, i.e., 14 + 1 odd days</p><p>We need 6 more odd days to have the same calendar.</p><p>Again, for 2034, 2035, we have 2 odd days. So, 2035 will not have the same calendar. Till 2035, we have 3 odd days, we need 4 more to have the same calendar.</p><p>For 2036, 2037, we get 3 odd days as 2036 is a leap year. So, till 2037, we get 6 odd days.</p><p>For 2038, we have one more odd day and the total becomes 7 odd days. So, 2039 will have the have the same calendar. (2041 will not as 3 more odd days will add up).</p>",
