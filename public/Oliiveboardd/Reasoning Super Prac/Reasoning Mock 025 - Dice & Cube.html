<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>

                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Three different positions of the same dice are shown. Find the number on the face opposite the face showing '1'.</p><p><img width=304 height=131 id=\"Picture 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22005/image027.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2340;&#2368;&#2344; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2306; &#2342;&#2352;&#2381;&#2358;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; '1' &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"304\" height=\"131\" id=\"Picture 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22005/image027.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>From figure 1 and figure 3 we can see that number adjacent to '4' and '6' are '1' and '2'.</p><p>Which means the numbers '1' and '2' will be on the opposite side of the dice.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Three different positions of the same dice are shown. Find the number on the face opposite the face showing '2'.</p><p><img width=506 height=224 id=\"Picture 26\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24204/image007.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2340;&#2368;&#2344; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; '2' &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"506\" height=\"224\" id=\"Picture 26\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24204/image007.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>From the 1<sup>st</sup> and 2<sup>nd</sup> figure, opposite faces are 1 and 6.</p><p>From the 2<sup>nd</sup> and 3<sup>rd</sup> figure, opposite faces are 3 and 4.</p><p>Which means the face opposite to the face showing 2 will be 5. </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Three different positions of the same dice are shown. Select the symbol that will be on the face opposite to the face having 'N '.</p><p><img width=343 height=104 id=\"Picture 54\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19586/image012.png\" alt=1.png></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2340;&#2368;&#2344; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2313;&#2360; &#2330;&#2367;&#2361;&#2381;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; 'N' &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2361;&#2379;&#2327;&#2366;&#2404;</p><p><img width=\"343\" height=\"104\" id=\"Picture 54\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19586/image012.png\" alt=\"1.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">#</span><span class=\"hqt\" style=\"display:none\">#</span>",
      "<span class=\"eqt\">&amp;</span><span class=\"hqt\" style=\"display:none\">&amp;</span>",
      "<span class=\"eqt\">%</span><span class=\"hqt\" style=\"display:none\">%</span>",
      "<span class=\"eqt\">@</span><span class=\"hqt\" style=\"display:none\">@</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=115 height=113 id=\"Picture 55\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19586/image013.png\" alt=1.png></p><p>The symbol that will be on the face opposite to the face having 'N ' will be '#'.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Three different positions of the same dice are shown. Find the number on the face opposite the face showing '3'.</p><p><img width=355 height=154 id=\"Picture 21\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24442/image029.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2340;&#2368;&#2344; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; '3' &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"355\" height=\"154\" id=\"Picture 21\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24442/image029.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The numbers adjacent to number '5' are '3', '4', '1', and '2'. Also, numbers '3' and '4' are adjacent to each other which means either '1' or '2' will be opposite to number '3'. </p><p>From the figure 3 we can observe that the number '1' and '4' are adjacent to each other. Which means numbers '3' and '1' must be opposite to each other.</p><p>Hence, the number on the face opposite the face showing '3' will be '1'.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Three different positions of the same dice are shown. Find the number on the face opposite the face showing '1'.</p><p><img width=386 height=172 id=\"Picture 20\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23217/image021.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2340;&#2368;&#2344; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; '1' &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"386\" height=\"172\" id=\"Picture 20\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23217/image021.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In all the 3 figures, we can see '1' at the top and number '3' is not visible. Only the face opposite to face bearing number '1' will not be visible.</p><p>Hence, the face opposite to face showing '1' will be '3'.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Three different positions of the same dice are shown. Select the symbol that will be on the face opposite to the one showing '@'.</p><p><img width=415 height=144 id=\"Picture 58\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19259/image031.png\" alt=1.png></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2340;&#2368;&#2344; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; '@' &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2361;&#2379;&#2327;&#2366;&#2404;</p><p><img width=\"415\" height=\"144\" id=\"Picture 58\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19259/image031.png\" alt=\"1.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">!</span><span class=\"hqt\" style=\"display:none\">!</span>",
      "<span class=\"eqt\">&lt;</span><span class=\"hqt\" style=\"display:none\">&lt;</span>",
      "<span class=\"eqt\">&amp;</span><span class=\"hqt\" style=\"display:none\">&amp;</span>",
      "<span class=\"eqt\">#</span><span class=\"hqt\" style=\"display:none\">#</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=169 height=162 id=\"Picture 60\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19259/image032.png\" alt=1.png></p><p>The symbol that will be on the face opposite to the one showing '@' is '#'.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Six letters M, N, O, P, Q and R are written on different faces of a dice. Two positions of this dice are shown in the figure. Find the letter on the face opposite to a vowel.</p><p><img width=187 height=93 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24212/image001.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2366;&#2360;&#2375; &#2325;&#2375; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2347;&#2354;&#2325;&#2379;&#2306; &#2346;&#2352; &#2331;&#2361; &#2309;&#2325;&#2381;&#2359;&#2352; - M, N, O, P, Q &#2324;&#2352; R &#2354;&#2367;&#2326;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; &#2311;&#2360; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2342;&#2379; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2360;&#2381;&#2357;&#2352; &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2325;&#2381;&#2359;&#2352; &#2310;&#2319;&#2327;&#2366;&#2404;</p><p><img width=\"187\" height=\"93\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24212/image001.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">M</span><span class=\"hqt\" style=\"display:none\">M</span>",
      "<span class=\"eqt\">N</span><span class=\"hqt\" style=\"display:none\">N</span>",
      "<span class=\"eqt\">P</span><span class=\"hqt\" style=\"display:none\">P</span>",
      "<span class=\"eqt\">R</span><span class=\"hqt\" style=\"display:none\">R</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>After opening both the dices: </p><p><img width=78 height=74 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24212/image002.png\"></p><p>And, </p><p><img width=76 height=72 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24212/image003.png\"></p><p>After merging both the images: </p><p><img width=112 height=139 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24212/image004.png\"></p><p>Hence, the face opposite to O will be R. </p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A cube is made by folding the given sheet. In the cube so formed, which of the following pairs of numbers would be opposite to each other?</p><p><img width=157 height=119 id=\"Picture 35\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19954/image009.jpg\" ></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2358;&#2368;&#2335; &#2325;&#2379; &#2350;&#2379;&#2337;&#2364;&#2325;&#2352; &#2319;&#2325; &#2328;&#2344; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2348;&#2344;&#2375; &#2328;&#2344; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2319;&#2325;-&#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2361;&#2379;&#2327;&#2366;?</p><p><img width=\"157\" height=\"119\" id=\"Picture 35\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19954/image009.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">1 and 6</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 6</span>",
      "<span class=\"eqt\">4 and 5</span><span class=\"hqt\" style=\"display:none\">4 &#2324;&#2352; 5</span>",
      "<span class=\"eqt\">3 and 4</span><span class=\"hqt\" style=\"display:none\">3 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">6 and 3</span><span class=\"hqt\" style=\"display:none\">6 &#2324;&#2352; 3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Here, faces 1 and 2, 6 and 5, <b>3 and 4</b> would be opposite to each other.</p>",
    "question_index": 7

      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",

    "solution": "<p>From 1<sup>st</sup> and 3<sup>rd</sup> dice, we can see that numbers '1' and '4' are adjacent to numbers '6' and '3'. Which means, '1' and '4' will be opposite to each other.</p><p>Hence, number which will be opposite to '4' on the dice will be '1'.</p>",
