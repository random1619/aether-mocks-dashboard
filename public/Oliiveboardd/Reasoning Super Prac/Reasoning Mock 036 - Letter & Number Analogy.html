<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Select the option that is related to the third term in the same way as the second term is related to the first term and the sixth term is related to the fifth term.</p><p>I3M : K27O :: U7E : ? :: O2R : Q8T</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2340;&#2368;&#2360;&#2352;&#2375; &#2346;&#2342; &#2360;&#2375; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2370;&#2360;&#2352;&#2366; &#2346;&#2342;, &#2346;&#2361;&#2354;&#2375; &#2346;&#2342; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2331;&#2336;&#2366; &#2346;&#2342;, &#2346;&#2366;&#2305;&#2330;&#2357;&#2375;&#2306; &#2346;&#2342; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>I3M : K27O :: U7E : ? :: O2R : Q8T</p></span>",
    "options": [
      "<span class=\"eqt\">S49H</span><span class=\"hqt\" style=\"display:none\">S49H</span>",
      "<span class=\"eqt\">W343G</span><span class=\"hqt\" style=\"display:none\">W343G</span>",
      "<span class=\"eqt\">T81F</span><span class=\"hqt\" style=\"display:none\">T81F</span>",
      "<span class=\"eqt\">R63I</span><span class=\"hqt\" style=\"display:none\">R63I</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, the pattern is: </p><p>I+2=K; M+2=O. Also, 3*3*3=27.</p><p>O+2=Q; R+2=T. Also, 2*2*2=8.</p><p>Similarly, </p><p>U+2=W; E+2=G. Also, 7*7*7=343.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option that is related to the fifth number cluster in the same way as the second number cluster is related to the first number cluster and the fourth number cluster is related to the third number cluster.</p><p><b>&radic;441 : &radic;144 :: &radic;961 : &radic;169 :: &radic;529 : ?</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2346;&#2366;&#2305;&#2330;&#2357;&#2368;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;-&#2360;&#2350;&#2370;&#2361; &#2360;&#2375; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;-&#2360;&#2350;&#2370;&#2361;, &#2346;&#2361;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;-&#2360;&#2350;&#2370;&#2361; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2330;&#2380;&#2341;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;-&#2360;&#2350;&#2370;&#2361;, &#2340;&#2368;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;-&#2360;&#2350;&#2370;&#2361; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p><b>&radic;441 : &radic;144 :: &radic;961 : &radic;169 :: &radic;529 : ?</b></p></span>",
    "options": [
      "<span class=\"eqt\">&radic;576</span><span class=\"hqt\" style=\"display:none\">&radic;576</span>",
      "<span class=\"eqt\">&radic;1076</span><span class=\"hqt\" style=\"display:none\">&radic;1076</span>",
      "<span class=\"eqt\">&radic;1024</span><span class=\"hqt\" style=\"display:none\">&radic;1024</span>",
      "<span class=\"eqt\">&radic;1156</span><span class=\"hqt\" style=\"display:none\">&radic;1156</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The resultant is  -  reverse of the square root of the given number.</p><p>&radic;441 == &radic;144, 21 == 12</p><p>&radic;961== &radic;169, 31 == 13</p><p>Similarly, </p><p>&radic;529 = 23 == 32 == <b>&radic;1024.</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of this following letter-clusters should replace # and % so that the pattern and relationship followed between the letter-cluster pair on the left side of :: is the same as that on the right of :: ?</p><p># : DKR :: HVN : %</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; # &#2324;&#2352; % &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367; :: &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2357;&#2366;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343; :: &#2325;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2357;&#2366;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2367;&#2351;&#2375; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;?</p><p># : DKR :: HVN : %</p></span>",
    "options": [
      "<span class=\"eqt\"># = BPN, % = LQT</span><span class=\"hqt\" style=\"display:none\"># = BPN, % = LQT</span>",
      "<span class=\"eqt\"># = AOM, % = KRS</span><span class=\"hqt\" style=\"display:none\"># = AOM, % = KRS</span>",
      "<span class=\"eqt\"># = BNM, % = LRS</span><span class=\"hqt\" style=\"display:none\"># = BNM, % = LRS</span>",
      "<span class=\"eqt\"># = ZOM, % = KSS</span><span class=\"hqt\" style=\"display:none\"># = ZOM, % = KSS</span>"
    ],
    "correct_option_id": 1,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A (1)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B (2)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C (3)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D (4)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E (5)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">F (6)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">G (7)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">H (8)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I (9)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">J (10)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">K (11)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">L (12)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">M (13)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Z (26)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Y (25)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">X (24)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">W (23)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">V (22)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">U (21)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T (20)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S (19)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R (18)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Q (17)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P (16)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O (15)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N (14)</td></tr></table><p>Option (a): # = BPN, % = LQT</p><p>B + 2 = D</p><p>P  -  5 = K</p><p>N + 4 = R</p><p>BPN = DKR</p><p>Similarly,</p><p>H + 4 = L</p><p>V  -  5 = Q</p><p>N + 6 = T</p><p>HVN = LQT</p><p>As there is no same pattern between right side and left side. So, option (a) is incorrect.</p><p>Option (b): # = AOM, % = KRS</p><p>A + 3 = D</p><p>O  -  4 = K</p><p>M + 5 = R</p><p><b>AOM</b> = DKR</p><p>Similarly,</p><p>H + 3 = K</p><p>V  -  4 = R</p><p>N + 5 = S</p><p>HVN = <b>KRS</b></p><p>As there is same pattern between right side and left side. So, option (b) is correct.</p><p>Option (c): # = BNM, % = LRS</p><p>B + 2 = D</p><p>N  -  3 = K</p><p>M + 5 = R</p><p>BNM = DKR</p><p>Similarly,</p><p>H + 4 = L</p><p>V  -  4 = R</p><p>N + 5 = S</p><p>HVN = KRS</p><p>As there is no same pattern between right side and left side. So, option (c) is incorrect.</p><p>Option (d): # = ZOM, % = KSS</p><p>Z + 4 = D</p><p>O  -  4 = K</p><p>M + 5 = R</p><p>ZOM = DKR</p><p>Similarly,</p><p>H + 3 = K</p><p>V  -  3 = S</p><p>N + 5 = S</p><p>HVN = KSS</p><p>As there is no same pattern between right side and left side. So, option (d) is incorrect.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following letter-cluster should replace &amp; and $ so that the pattern and the relationship followed between the letter-cluster pair on the left side of :: is the same as that on the right side of ::? </p><p>&amp; : NES :: DOJ : $</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2325;&#2379; &amp; &#2324;&#2352; $ &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367; :: &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2325;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2375; &#2348;&#2368;&#2330; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343; :: &#2325;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;?</p><p>&amp; : NES :: DOJ : $</p></span>",
    "options": [
      "<span class=\"eqt\">&amp; = MDR, $ = EPI</span><span class=\"hqt\" style=\"display:none\">&amp; = MDR, $ = EPI</span>",
      "<span class=\"eqt\">&amp; = KBW, $ = GRF</span><span class=\"hqt\" style=\"display:none\">&amp; = KBW, $ = GRF</span>",
      "<span class=\"eqt\">&amp; = MFU, $ = ENL</span><span class=\"hqt\" style=\"display:none\">&amp; = MFU, $ = ENL</span>",
      "<span class=\"eqt\">&amp; = KFV, $ = GNN</span><span class=\"hqt\" style=\"display:none\">&amp; = KFV, $ = GNN</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>If we replace &amp; and $ in the expression &amp; : NES :: DOJ : $, we get:</p><p>Option (a) MDR : NES :: DOJ : EPI</p><p>M+1=N; D+1=E; R+1=S.</p><p>D+1=E; O+1=P; J-1=I. </p><p>So, option (a) is incorrect. </p><p>Option (b) KBW : NES :: DOJ : GRF</p><p>K+3=N; B+3=E; W-4=S.</p><p>D+3=G; O+3=R; J-4=F. </p><p>So, option (b) is correct. </p><p>Option (c) MFU : NES :: DOJ : ENL</p><p>M+1=N; F-1=E; U-2=S.</p><p>D+1=E; O-1=N; J+2=L. </p><p>So, option (c) is incorrect. </p><p>Option (d) KFV : NES :: DOJ : GNN</p><p>K+3=N; F-1=E; V-3=S. </p><p>D+3=G; O-1=N; J+4=N. </p><p>So, option (d) is incorrect. </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option that is related to the third letter cluster in the same way as the second letter cluster is related to the first letter cluster and the fifth letter cluster is related to the sixth letter cluster. </p><p>PC: SG :: FU:? :: KT: NX</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2340;&#2368;&#2360;&#2352;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2360;&#2375; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2370;&#2360;&#2352;&#2366; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361;, &#2346;&#2361;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2340;&#2341;&#2366; &#2346;&#2366;&#2305;&#2330;&#2357;&#2366;&#2306; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361;, &#2331;&#2336;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>PC: SG :: FU:? :: KT: NX</p></span>",
    "options": [
      "<span class=\"eqt\">JY</span><span class=\"hqt\" style=\"display:none\">JY</span>",
      "<span class=\"eqt\">IY</span><span class=\"hqt\" style=\"display:none\">IY</span>",
      "<span class=\"eqt\">JX</span><span class=\"hqt\" style=\"display:none\">JX</span>",
      "<span class=\"eqt\">KY</span><span class=\"hqt\" style=\"display:none\">KY</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>P+3= S, C+4= G</p><p>F+3= <b>I</b>, U+4= <b>Y</b></p><p>K+3= N, T+4= X</p>",
    "question_index": 4
