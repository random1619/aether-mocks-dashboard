    "question": "<span class=\"eqt\"><p>In a family of eight members, K has two daughters A and B. D and E are the sons of M. The daughter of J is the child of A. M is the father-in-law of J. Neither the sons of K are married nor O is married. How is O related to E?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2336; &#2360;&#2342;&#2360;&#2381;&#2351;&#2379;&#2306; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2350;&#2375;&#2306;, K &#2325;&#2368; &#2342;&#2379; &#2346;&#2369;&#2340;&#2381;&#2352;&#2367;&#2351;&#2366;&#2305; A &#2324;&#2352; B &#2361;&#2376;&#2306;&#2404; D &#2324;&#2352; E, M &#2325;&#2375; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;&#2306;&#2404; J &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368;, A &#2325;&#2368; &#2360;&#2306;&#2340;&#2366;&#2344; &#2361;&#2376;&#2404; M, J &#2325;&#2366; &#2360;&#2360;&#2369;&#2352; &#2361;&#2376;&#2404; &#2344; &#2340;&#2379; K &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2357;&#2367;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2344; &#2361;&#2368; O &#2357;&#2367;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404; O, E &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",

    "solution": "<p>In a family of eight members, K has two daughters A and B.</p><p>D and E are the sons of M.</p><p><img width=249 height=66 id=\"Picture 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19334/image016.jpg\"></p><p>The daughter of J is the child of A. M is the father-in-law of J.</p><p><img width=313 height=125 id=\"Picture 18\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19334/image017.jpg\"></p><p>Neither the sons of K are married nor O is married.</p><p>Therefore, O will be the daughter of A.</p><p>So, O is the niece of E.</p>",

    "question": "<span class=\"eqt\"><p>In a certain code language,</p><p>A 8 B means A is the daughter of B</p><p>A 5 B means A is the husband of B</p><p>A 2 B means A is the wife of B</p><p>A 9 B means A is the son of B</p><p>On the basis of above codes, which of the following expressions means that W is the granddaughter of K?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>A 8 B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;</p><p>A 5 B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;</p><p>A 2 B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;</p><p>A 9 B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2379;&#2337;&#2379;&#2306; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; W, K &#2325;&#2368; &#2346;&#2379;&#2340;&#2368;/&#2344;&#2366;&#2340;&#2367;&#2344; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">W 8 E 2 Q 9 L 2 K</span><span class=\"hqt\" style=\"display:none\">W 8 E 2 Q 9 L 2 K</span>",
      "<span class=\"eqt\">W 8 E 2 L 5 Q 2 K</span><span class=\"hqt\" style=\"display:none\">W 8 E 2 L 5 Q 2 K</span>",
      "<span class=\"eqt\">W 5 L 8 Q 5 E 2 K</span><span class=\"hqt\" style=\"display:none\">W 5 L 8 Q 5 E 2 K</span>",
      "<span class=\"eqt\">W 8 E 2 K 9 L 8 Q</span><span class=\"hqt\" style=\"display:none\">W 8 E 2 K 9 L 8 Q</span>"

    "correct_option_id": 0,
    "solution": "<p>From option a:</p><p>W 8 E 2 Q 9 L 2 K</p><p><img width=274 height=195 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15653/image004.jpg\"></p><p>From option b:</p><p>W 8 E 2 L 5 Q 2 K</p><p>This implies that L is the husband of Q and Q is the wife of K which is contradictory. Hence this option is invalid.</p><p>From option c:</p><p>W 5 L 8 Q 5 E 2 K</p><p>This implies that Q is the husband of E who is the wife of K. Hence this option is invalid.</p><p>From option d:</p><p>W 8 E 2 K 9 L 8 Q</p><p>This implies that W is the daughter of E who is the wife of K. Hence this option is invalid.</p>",
    "question_index": 4
  },

    "question": "<span class=\"eqt\"><p>If A#B means A is the father of B; A%B means B is the brother of A; A*B means A is the husband of B and A&amp;B means A is the sister of B. In the expression Rugwed # Ved * Priyal &amp; Priya % Tanu, how Priya is related to Ved? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A#B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; A, B &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;; A%B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; B, A &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;; A*B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; A, B &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376; &#2324;&#2352; A&amp;B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; A, B &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;&#2404; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2352;&#2369;&#2327;&#2381;&#2357;&#2375;&#2342; # &#2357;&#2375;&#2342;* &#2346;&#2381;&#2352;&#2367;&#2351;&#2354; &amp; &#2346;&#2381;&#2352;&#2367;&#2351;&#2366; % &#2340;&#2344;&#2369; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2367;&#2351;&#2366;, &#2357;&#2375;&#2342; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sister-in-law</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2360;&#2381;&#2335;&#2352;-&#2311;&#2344;-&#2354;&#2377;</span>",
      "<span class=\"eqt\">Brother-in-law</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2342;&#2352;-&#2311;&#2344;-&#2354;&#2377;</span>",
      "<span class=\"eqt\">Either sister-in-law or brother-in-law</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2366; &#2340;&#2379; &#2360;&#2367;&#2360;&#2381;&#2335;&#2352;-&#2311;&#2344;-&#2354;&#2377; &#2351;&#2366; &#2348;&#2381;&#2352;&#2342;&#2352;-&#2311;&#2344;-&#2354;&#2377;</span>",
      "<span class=\"eqt\">Sister</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A#B means A is the father of B</p><p>A%B means B is the brother of A</p><p>A*B means A is the husband of B </p><p>A&amp;B means A is the sister of B</p><p>Rugwed # Ved * Priyal &amp; Priya % Tanu</p><p>So, it can be concluded that Rugwed is father of Ved. </p><p>Ved is husband of Priyal. </p><p>Priyal is sister of Priya. </p><p>Tanu is brother of Priya. </p><p><img width=338 height=114 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15655/image003.jpg\"></p>",

    "question": "<span class=\"eqt\"><p>There are six members in a family. Jasmine's only son, Gaurav, has only one son. Ishika is the daughter of Ulhas. Priyanka is the only daughter-in-law of Jasmine and has one sister. Nakul is the nephew of Ishika. How is Nakul related to Priyanka?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2350;&#2375;&#2306; &#2331;&#2361; &#2360;&#2342;&#2360;&#2381;&#2351; &#2361;&#2376;&#2306;&#2404; &#2332;&#2376;&#2360;&#2350;&#2367;&#2344; &#2325;&#2375; &#2311;&#2325;&#2354;&#2380;&#2340;&#2375; &#2346;&#2369;&#2340;&#2381;&#2352; &#2327;&#2380;&#2352;&#2357; &#2325;&#2366; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2361;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;&#2404; &#2311;&#2358;&#2367;&#2325;&#2366;, &#2313;&#2354;&#2361;&#2366;&#2360; &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2367;&#2351;&#2306;&#2325;&#2366;, &#2332;&#2376;&#2360;&#2350;&#2367;&#2344; &#2325;&#2368; &#2311;&#2325;&#2354;&#2380;&#2340;&#2368; &#2348;&#2361;&#2370; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2325;&#2368; &#2319;&#2325; &#2348;&#2361;&#2344; &#2361;&#2376;&#2404; &#2344;&#2325;&#2369;&#2354;, &#2311;&#2358;&#2367;&#2325;&#2366; &#2325;&#2366; &#2349;&#2366;&#2306;&#2332;&#2366;/&#2349;&#2340;&#2368;&#2332;&#2366; &#2361;&#2376;&#2404; &#2344;&#2325;&#2369;&#2354;, &#2346;&#2381;&#2352;&#2367;&#2351;&#2306;&#2325;&#2366; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Niece</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2306;&#2332;&#2368;/&#2349;&#2340;&#2368;&#2332;&#2368;</span>",

      "<span class=\"eqt\">Nephew</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2306;&#2332;&#2366;/&#2349;&#2340;&#2368;&#2332;&#2366;</span>"

    "solution": "<p>Jasmine's only son, Gaurav, has only one son. </p><p>Priyanka is the only daughter-in-law of Jasmine and has one sister.</p><p><img width=288 height=144 id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19334/image014.jpg\"></p><p>Ishika is daughter of Ulhas. Nakul is the nephew of Ishika. </p><p><img width=308 height=138 id=\"Picture 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19334/image015.jpg\"></p><p>Thus, Nakul is the son of Priyanka. </p>",

    "question": "<span class=\"eqt\"><p>Anchal is the daughter of Arun who is the husband of Aman. Aman has three children i.e. 2 male and 1 female. Priya is married to Deepak who has three children. Ashu is the husband of Ashita, who has three children. Ashu and Deepak are the brothers of Anchal. Vishal is the only son of Priya. Then how is Vishal related to Aman?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2305;&#2330;&#2354;, &#2309;&#2352;&#2369;&#2339; &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376; &#2340;&#2341;&#2366; &#2309;&#2352;&#2369;&#2339;, &#2309;&#2350;&#2344; &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;&#2404; &#2309;&#2350;&#2344; &#2325;&#2375; &#2340;&#2368;&#2344; &#2360;&#2306;&#2340;&#2366;&#2344;&#2375; &#2309;&#2352;&#2381;&#2341;&#2366;&#2340; 2 &#2346;&#2369;&#2340;&#2381;&#2352; &#2324;&#2352; 1 &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;&#2306;&#2404; &#2346;&#2381;&#2352;&#2367;&#2351;&#2366;, &#2342;&#2368;&#2346;&#2325; &#2360;&#2375; &#2357;&#2367;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2376; &#2340;&#2341;&#2366; &#2342;&#2368;&#2346;&#2325; &#2325;&#2375; &#2340;&#2368;&#2344; &#2360;&#2306;&#2340;&#2366;&#2344;&#2375; &#2361;&#2376;&#2306;&#2404; &#2310;&#2358;&#2369;, &#2309;&#2358;&#2367;&#2340;&#2366; &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376; &#2340;&#2341;&#2366; &#2309;&#2358;&#2367;&#2340;&#2366; &#2325;&#2368; &#2340;&#2368;&#2344; &#2360;&#2306;&#2340;&#2366;&#2344;&#2375; &#2361;&#2376;&#2306;&#2404; &#2310;&#2358;&#2369; &#2324;&#2352; &#2342;&#2368;&#2346;&#2325;, &#2310;&#2305;&#2330;&#2354; &#2325;&#2375; &#2349;&#2366;&#2312; &#2361;&#2376;&#2306;&#2404; &#2357;&#2367;&#2358;&#2366;&#2354;, &#2346;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2366; &#2311;&#2325;&#2354;&#2380;&#2340;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2367;&#2358;&#2366;&#2354;, &#2309;&#2350;&#2344; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",

    "solution": "<p>&#183;Anchal is the daughter of Arun who is the husband of Aman. </p><p>&#183;Aman has three children i.e. 2 male and 1 female. </p><p><img width=261 height=132 id=\"Picture 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19498/image004.png\" alt=1.png></p><p>&#183;Priya is married to Deepak who has three children. </p><p>&#183;Ashu is the husband of Ashita, who has three children. </p><p>&#183;Ashu and Deepak are the brothers of Anchal. </p><p>&#183;Vishal is the only son of Priya.</p><p><img width=619 height=191 id=\"Picture 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19498/image005.png\" alt=1.png></p><p>So, Vishal is the grandson of Aman. </p>",

    "question": "<span class=\"eqt\"><p>If A*B means A is the mother of B; A@B means A is the father of B; A!B means A is the son of B; A~B means A is the daughter of B; A^B means A is the brother of B; A:B means A is the sister of B; A/B means A is the wife of B. In the given expression, S@T!U:V?W, if T is grandson of W then which of the following symbol will replace the question mark? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A*B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;; A@B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;; A!B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;; A~B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;; A^B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;; A:B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;; A/B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;&#2404; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325;, S@T!U:V?W &#2350;&#2375;&#2306;, &#2351;&#2342;&#2367; T, W &#2325;&#2366; &#2346;&#2379;&#2340;&#2366;/&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2375;&#2327;&#2366;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p>A*B means A is the mother of B.</p><p>A@B means A is the father of B.</p><p>A!B means A is the son of B.</p><p>A~B means A is the daughter of B.</p><p>A^B means A is the brother of B.</p><p>A:B means A is the sister of B. </p><p>A/B means A is the wife of B.</p><p>S@T!U:V?W</p><p>S is the father of T. </p><p>T is the son of U. </p><p>U is the sister of V. </p><p><img width=172 height=89 id=\"Picture 38\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15655/image035.jpg\"></p><p>T is grandson of W. </p><p>So, V should be son/daughter of W. </p><p>Therefore, V!W or V~W. </p>",

  },

    "solution": "<p>X is the sister of J. K is the brother of W's husband. U, the father of L, is the grandfather of J.</p><p><img width=222 height=128 id=\"Picture 33\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15655/image030.jpg\"></p><p>A belongs to the first generation.</p><p>None of the children has a single parent.</p><p>The family has three brothers, two fathers and two mothers.</p><p><img width=221 height=131 id=\"Picture 34\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15655/image031.jpg\"></p><p>A is the paternal grandmother of J.</p>",

    "question": "<span class=\"eqt\"><p>In a family of eight members, Gautam is the son-in-law of Ram, who is married to Amisha. Amisha is the mother of two daughters. Hatim is the brother-in-law of Yami. Disha is the mother of Manu and Nano. Hatim is a father. If there are five female members in a family, then who is married to Yami? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2336; &#2360;&#2342;&#2360;&#2381;&#2351;&#2379;&#2306; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2350;&#2375;&#2306; &#2327;&#2380;&#2340;&#2350;, &#2352;&#2366;&#2350; &#2325;&#2366; &#2342;&#2366;&#2350;&#2366;&#2342; &#2361;&#2376; &#2324;&#2352; &#2352;&#2366;&#2350;, &#2309;&#2350;&#2368;&#2359;&#2366; &#2360;&#2375; &#2357;&#2367;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404; &#2309;&#2350;&#2368;&#2359;&#2366; &#2342;&#2379; &#2346;&#2369;&#2340;&#2381;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2361;&#2366;&#2340;&#2367;&#2350;, &#2351;&#2366;&#2350;&#2368; &#2325;&#2366; &#2348;&#2381;&#2352;&#2342;&#2352;-&#2311;&#2344;-&#2354;&#2377; &#2361;&#2376;&#2404; &#2342;&#2367;&#2358;&#2366;, &#2350;&#2344;&#2369; &#2324;&#2352; &#2344;&#2376;&#2344;&#2379; &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2361;&#2366;&#2340;&#2367;&#2350; &#2319;&#2325; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2350;&#2375;&#2306; &#2346;&#2366;&#2305;&#2330; &#2350;&#2361;&#2367;&#2354;&#2366; &#2360;&#2342;&#2360;&#2381;&#2351; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2351;&#2366;&#2350;&#2368; &#2325;&#2367;&#2360;&#2360;&#2375; &#2357;&#2367;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Hatim</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2340;&#2367;&#2350;</span>",

    "correct_option_id": 0,
    "solution": "<p>Gautam is the son-in-law of Ram, who is married to Amisha. Amisha is the mother of two daughters. Hatim is the brother-in-law of Yami. Disha is the mother of Manu and Nano. Hatim is a father. </p><p><img width=362 height=166 id=\"Picture 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15655/image015.jpg\"></p><p>Yami is married to Gautam. </p>",
    "question_index": 10

    "question": "<span class=\"eqt\"><p>In a certain code language  - </p><p>'M &div; N' means 'M is the mother of N'</p><p>'M &gt; N' means 'M is the husband of N'</p><p>'M + N' means 'M is the daughter-in-law of N'</p><p>'M = N' means 'M is the son of N'</p><p>If E &gt; A + I &div; Q = X = F &gt; Y, then which of the following statement is true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; -</p><p>'M &div; N' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; 'M, N &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;'</p><p>'M &gt; N' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; 'M, N &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;'</p><p>'M + N' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; 'M, N &#2325;&#2368; &#2348;&#2361;&#2370; &#2361;&#2376;'</p><p>'M = N' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; 'M, N &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;'</p><p>&#2351;&#2342;&#2367; E &gt; A + I &div; Q = X = F &gt; Y &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Y is the grandmother of Q.</span><span class=\"hqt\" style=\"display:none\">Y, Q &#2325;&#2368; &#2342;&#2366;&#2342;&#2368;/&#2344;&#2366;&#2344;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">A is the niece of X.</span><span class=\"hqt\" style=\"display:none\">A, X &#2325;&#2368; &#2349;&#2340;&#2368;&#2332;&#2368;/&#2349;&#2366;&#2306;&#2332;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">E is son-in-law of F.</span><span class=\"hqt\" style=\"display:none\">E, F &#2325;&#2366; &#2342;&#2366;&#2350;&#2366;&#2342; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">None of them</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>E &gt; A + I &div; Q = X = F &gt; Y</p><p>E &gt; A means 'E is the husband of A'</p><p>A + I means 'A is the daughter-in-law of I'</p><p>I &div; Q means 'I is the mother of Q'</p><p>Q = X means 'Q is the son of X'</p><p>X = F means 'X is the son of F'</p><p>F &gt; Y means 'F is the husband of Y'</p><p><img width=245 height=164 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21316/image003.png\"></p><p>Y is the grandmother of Q.</p>",
    "question_index": 11
  },

      "<span class=\"eqt\">Husband</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2367;</span>",

      "<span class=\"eqt\">Cannot be determined</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;</span>"

    "correct_option_id": 3,
    "solution": "<p>Abhay said to Kiara, \"Rita is the paternal grandmother of your son and the wife of my sister's father\".</p><p><img width=680 height=133 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22226/image036.jpg\"></p><p>Abhay is either husband or brother-in-law of Kiara.</p><p>Thus, the answer is cannot be determined.</p>",

    "question": "<span class=\"eqt\"><p>If P @ Q means that P is mother-in-law of Q, P % Q means that P is mother of Q, P * Q means P is the daughter of Q and P $ Q means that P is the son of Q, then which of the following expression shows that A is the granddaughter of G? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; P @ Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; P, Q &#2325;&#2368; &#2360;&#2366;&#2360; &#2361;&#2376;, P % Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; P, Q &#2325;&#2368; &#2350;&#2366;&#2305; &#2361;&#2376;, P * Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; P, Q &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376; &#2324;&#2352; P $ Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; P, Q &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; A, G &#2325;&#2368; &#2346;&#2379;&#2340;&#2368;/&#2344;&#2366;&#2340;&#2367;&#2344; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A @ D $ F $ G</span><span class=\"hqt\" style=\"display:none\">A @ D $ F $ G</span>",
      "<span class=\"eqt\">A * R $ G</span><span class=\"hqt\" style=\"display:none\">A * R $ G</span>",
      "<span class=\"eqt\">A % S @ G</span><span class=\"hqt\" style=\"display:none\">A % S @ G</span>",
      "<span class=\"eqt\">A * J % G</span><span class=\"hqt\" style=\"display:none\">A * J % G</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>It is given that, </p><p>P @ Q means that P is mother-in-law of Q, </p><p>P % Q means that P is mother of Q,</p><p>P * Q means P is the daughter of Q,</p><p>P $ Q means that P is the son of Q.</p><p>Option (a) A @ D $ F $ G</p><p>A is the mother-in-law of D. D is the son of F and F is the son of G.</p><p><img width=146 height=149 id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21798/image014.jpg\"></p><p>Here, A is not the granddaughter of G.</p><p>Option (b) A * R $ G</p><p>A is the daughter of R and R is the son of G.</p><p><img width=63 height=139 id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21798/image015.jpg\"></p><p>Here, A is the granddaughter of G.</p><p>Option (c) A % S @ G </p><p>A is the mother of S and S is the mother-in-law of G.</p><p><img width=107 height=128 id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21798/image016.jpg\"></p><p>Here, A is not the granddaughter of G. </p><p>Option (d) A * J % G</p><p>A is the daughter of J and J is the mother of G.</p><p><img width=121 height=95 id=\"Picture 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21798/image017.jpg\"></p><p>Here, A is not the granddaughter of G. </p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language-</p><p>'P + Q' means 'P is the wife of Q'.</p><p>'P  -  Q' means 'P is the father of Q'.</p><p>'P  X  Q' means 'P is the daughter-in-law of Q'.</p><p>'P &div; Q' means 'P is the brother of Q'.</p><p>If A  X  D + N  -  B &div; G + S, then which of the following statement is true?</p><p>I) S is the son-in-law of D.</p><p>II) B is the son of N.</p><p>III) G is the sister-in-law of A.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2370;&#2335; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;-</p><p>'P + Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;'&#2404;</p><p>'P - Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'&#2404;</p><p>'P X Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2368; &#2337;&#2377;&#2335;&#2352;-&#2311;&#2344;-&#2354;&#2377; &#2361;&#2376;'&#2404;</p><p>'P &div; Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;'&#2404;</p><p>&#2351;&#2342;&#2367; A X D + N - B &div; G + S, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p><p>I) S, D &#2325;&#2366; &#2360;&#2344;-&#2311;&#2344;-&#2354;&#2377; &#2361;&#2376;&#2404;</p><p>II) B, N &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;&#2404;</p><p>III) G, A &#2325;&#2368; &#2360;&#2367;&#2360;&#2381;&#2335;&#2352;-&#2311;&#2344;-&#2354;&#2377; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I and II are true</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only I is true</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only II and III are true</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">All are true</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A  X  D + N  -  B &div; G + S</p><p>A  X  D means 'A is the daughter-in-law of D'.</p><p>D + N means 'D is the wife of N'.</p><p>N  -  B means 'N is the father of B'.</p><p>B &div; G means 'B is the brother of G'.</p><p>G + S means 'G is the wife of S'.</p><p><img width=374 height=112 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21858/image002.png\"></p><p>S is the son-in-law of D.</p><p>B is the son of N.</p><p>G is the sister-in-law of A.</p><p>All these statements are true.</p>",
    "question_index": 14
  },

    "question": "<span class=\"eqt\"><p>Anisha told her friend, \"My mother is going to visit my grandmother day after tomorrow while my aunt visited my grandmother day before yesterday, which was Tuesday.\" On which day will Anisha's mother visit her grandmother?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2368;&#2358;&#2366; &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2360;&#2361;&#2375;&#2354;&#2368; &#2360;&#2375; &#2325;&#2361;&#2366;, \"&#2350;&#2375;&#2352;&#2368; &#2350;&#2366;&#2340;&#2366; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2325;&#2354; &#2325;&#2375; &#2309;&#2327;&#2354;&#2375; &#2342;&#2367;&#2344; (&#2337;&#2375; &#2310;&#2347;&#2381;&#2335;&#2352; &#2335;&#2369;&#2350;&#2366;&#2352;&#2379;) &#2350;&#2375;&#2352;&#2368; &#2342;&#2366;&#2342;&#2368;/&#2344;&#2366;&#2344;&#2368; &#2360;&#2375; &#2350;&#2367;&#2354;&#2344;&#2375; &#2332;&#2366; &#2352;&#2361;&#2368; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2350;&#2375;&#2352;&#2368; &#2310;&#2306;&#2335;&#2368; &#2348;&#2368;&#2340;&#2375; &#2325;&#2354; &#2360;&#2375; &#2319;&#2325; &#2342;&#2367;&#2344; &#2346;&#2361;&#2354;&#2375; (&#2337;&#2375; &#2348;&#2367;&#2347;&#2379;&#2352; &#2351;&#2360;&#2381;&#2335;&#2352;&#2337;&#2375;) &#2350;&#2375;&#2352;&#2368; &#2342;&#2366;&#2342;&#2368;/&#2344;&#2366;&#2344;&#2368; &#2360;&#2375; &#2350;&#2367;&#2354;&#2344;&#2375; &#2327;&#2312; &#2341;&#2368;, &#2332;&#2379; &#2325;&#2367; &#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352; &#2341;&#2366;&#2404;\" &#2309;&#2344;&#2368;&#2358;&#2366; &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2325;&#2367;&#2360; &#2342;&#2367;&#2344; &#2313;&#2360;&#2325;&#2368; &#2342;&#2366;&#2342;&#2368;/&#2344;&#2366;&#2344;&#2368; &#2360;&#2375; &#2350;&#2367;&#2354;&#2344;&#2375; &#2332;&#2366;&#2319;&#2305;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Saturday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2344;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Thursday</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2370;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Day before yesterday was Tuesday.</p><p>So, today is Thursday.</p><p>Hence, day after tomorrow will be Saturday.</p><p>Anisha's mother will visit her grandmother on Saturday.</p>",
    "question_index": 15
  },

    "question": "<span class=\"eqt\"><p>Amit said to Krish, \"That person who is giving speech is the son of the only daughter of your sibling's mother.\" How the person who is giving speech is related to Krish? [Consider Krish as a female]</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2350;&#2367;&#2340; &#2344;&#2375; &#2325;&#2381;&#2352;&#2367;&#2358; &#2360;&#2375; &#2325;&#2361;&#2366; &#2325;&#2367;, \"&#2357;&#2361; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2332;&#2379; &#2349;&#2366;&#2359;&#2339; &#2342;&#2375; &#2352;&#2361;&#2366; &#2361;&#2376; &#2357;&#2361; &#2340;&#2369;&#2350;&#2381;&#2361;&#2366;&#2352;&#2375; &#2360;&#2361;&#2379;&#2342;&#2352; &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2325;&#2368; &#2311;&#2325;&#2354;&#2380;&#2340;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;&#2404;\" &#2349;&#2366;&#2359;&#2339; &#2342;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2381;&#2352;&#2367;&#2358; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;? [&#2325;&#2381;&#2352;&#2367;&#2358; &#2325;&#2379; &#2350;&#2361;&#2367;&#2354;&#2366; &#2350;&#2366;&#2344;&#2375;&#2306;]</p></span>",
    "options": [
      "<span class=\"eqt\">Son</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Grandson</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2340;&#2366;/&#2344;&#2366;&#2340;&#2368;</span>",
      "<span class=\"eqt\">Husband</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Father</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>It is given that, Amit said to Krish, \"That person who is giving speech is the son of the only daughter of your sibling's mother.\"</p><p>Given that Krish is a female.</p><p>So her sibling's mother's only daughter is Krish.</p><p>So, the person is the son of Krish.</p>",

    "question": "<span class=\"eqt\"><p>Person A said to Person B, \"Your daughter is the daughter-in-law of Sam, who is my husband.\" How is Person A related to Person B's daughter? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; A &#2344;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; B &#2360;&#2375; &#2325;&#2361;&#2366;, \"&#2310;&#2346;&#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368;, &#2360;&#2376;&#2350; &#2325;&#2368; &#2348;&#2361;&#2370; &#2361;&#2376; &#2324;&#2352; &#2360;&#2376;&#2350;, &#2350;&#2375;&#2352;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;&#2404;\" &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; A, &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; B &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
