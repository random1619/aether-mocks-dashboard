    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Weight of five bags C1, C2, C3, C4 and C5 is compared. Weight of C4 is more than C1 and less than C2, Weight of C5 is more than C3. Weight of C2 is less than C3. Weight of how many bags is less than C2?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2305;&#2330; &#2348;&#2376;&#2327; C1, C2, C3, C4 &#2324;&#2352; C5 &#2325;&#2375; &#2357;&#2332;&#2344; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; C4 &#2325;&#2366; &#2357;&#2332;&#2344;, C1 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2324;&#2352; C2 &#2360;&#2375; &#2325;&#2350; &#2361;&#2376;, C5 &#2325;&#2366; &#2357;&#2332;&#2344; C3 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; C2 &#2325;&#2366; &#2357;&#2332;&#2344;, C3 &#2360;&#2375; &#2325;&#2350; &#2361;&#2376;&#2404; &#2325;&#2367;&#2340;&#2344;&#2375; &#2348;&#2376;&#2327; &#2325;&#2366; &#2357;&#2332;&#2344; C2 &#2360;&#2375; &#2325;&#2350; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Weight of C4 is more than C1 and less than C2.</p><p>C2 &gt; C4 &gt; C1 .......... (1)</p><p>Weight of C2 is less than C3.</p><p>C3 &gt; C2 ....... (2)</p><p>Weight of C5 is more than C3.</p><p>C5 &gt; C3 ........ (3)</p><p>After combining all the 3 questions:</p><p>C5 &gt; C3 &gt; C2 &gt; C4 &gt; C1</p><p>Hence, weight of 2 bags C4 and C1 is less than the weight of bag C2.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Five friends Mahi, Mili, Milan, Manas, and Monika sit on a bench facing north. Only Mahi is sitting between Mili and Monika. Manas sits to the immediate left of Mili. Manas is not at the end. Who sits to the immediate right of Milan?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2305;&#2330; &#2342;&#2379;&#2360;&#2381;&#2340; &#2350;&#2366;&#2361;&#2368;, &#2350;&#2367;&#2354;&#2368;, &#2350;&#2367;&#2354;&#2344;, &#2350;&#2366;&#2344;&#2360; &#2324;&#2352; &#2350;&#2379;&#2344;&#2367;&#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2368; &#2323;&#2352; &#2350;&#2369;&#2326;&#2352;&#2367;&#2340; &#2361;&#2379;&#2325;&#2352; &#2319;&#2325; &#2348;&#2375;&#2306;&#2330; &#2346;&#2352; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; &#2350;&#2367;&#2354;&#2368; &#2324;&#2352; &#2350;&#2379;&#2344;&#2367;&#2325;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2350;&#2366;&#2361;&#2368; &#2348;&#2376;&#2336;&#2368; &#2361;&#2376;&#2404; &#2350;&#2366;&#2344;&#2360;, &#2350;&#2367;&#2354;&#2368; &#2325;&#2375; &#2336;&#2368;&#2325; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; &#2350;&#2366;&#2344;&#2360; &#2331;&#2379;&#2352; &#2346;&#2352; &#2344;&#2361;&#2368;&#2306; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2350;&#2367;&#2354;&#2344; &#2325;&#2375; &#2336;&#2368;&#2325; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2325;&#2380;&#2344; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Manas</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2344;&#2360;</span>",
      "<span class=\"eqt\">Monika</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2344;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Mahi</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2361;&#2368;</span>",
      "<span class=\"eqt\">Mili</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Manas sits to the immediate left of Mili.</p><p><img width=173 height=28 id=\"Picture 52\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22519/image036.png\"></p><p>Only Mahi is sitting between Mili and Monika.</p><p><img width=401 height=31 id=\"Picture 53\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22519/image037.png\"></p><p>Manas is not at the end. Which means there is only one place for Milan to Sit.</p><p><img width=516 height=35 id=\"Picture 54\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22519/image038.png\"></p><p>Hence, the person who is sitting to the immediate right of Milan is Manas.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Eight friends A, B, C, D, E, F, G and H are sitting in a straight line, all facing the North. F is sitting between D and G. B is sitting between H and A. E is third to the left of G, who is sitting at one of the corners. H is third to the left of C. Who is sitting between A and E?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2336; &#2350;&#2367;&#2340;&#2381;&#2352; A, B, C, D, E, F, G &#2324;&#2352; H &#2319;&#2325; &#2360;&#2368;&#2343;&#2368; &#2352;&#2375;&#2326;&#2366; &#2350;&#2375;&#2306; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;, &#2360;&#2349;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2368; &#2323;&#2352; &#2360;&#2350;&#2381;&#2350;&#2369;&#2326; &#2361;&#2376;&#2306;&#2404; F, D &#2324;&#2352; G &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; B, H &#2324;&#2352; A &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; E, G &#2325;&#2375; &#2348;&#2366;&#2319;&#2306; &#2360;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2361;&#2376;, &#2332;&#2379; &#2325;&#2367;&#2360;&#2368; &#2319;&#2325; &#2325;&#2379;&#2344;&#2375; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; H, C &#2325;&#2375; &#2348;&#2366;&#2319;&#2306; &#2360;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2361;&#2376;&#2404; A &#2324;&#2352; E &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2380;&#2344; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">B</span><span class=\"hqt\" style=\"display:none\">B</span>",
      "<span class=\"eqt\">G</span><span class=\"hqt\" style=\"display:none\">G</span>",
      "<span class=\"eqt\">H</span><span class=\"hqt\" style=\"display:none\">H</span>",
      "<span class=\"eqt\">C</span><span class=\"hqt\" style=\"display:none\">C</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>G is sitting at one of the corners and E is third to the left of G which means G will sit at the right corner of the row. F is sitting between D and G.</p><p><img width=520 height=40 id=\"Picture 45\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22634/image021.png\"></p><p>H is third to the left of C. B is sitting between H and A.</p><p><img width=520 height=43 id=\"Picture 46\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22634/image022.png\"></p><p>Hence, the person sitting between A and E is C.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Pradeep, Nikku, Rinku, Sohail and Tannu are sitting on a bench facing north, Pradeep is immediate neighbour of Nikku. Sohail is immediate neighbour of Tannu, Pradeep is not sitting with Rinku who sits on the right end of the bench. Pradeep sits to the right of Sohail and Tannu. Sohail sits to the right of Tannu. In which position Pradeep is sitting?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2342;&#2368;&#2346;, &#2344;&#2367;&#2325;&#2381;&#2325;&#2369;, &#2352;&#2367;&#2306;&#2325;&#2370;, &#2360;&#2379;&#2361;&#2375;&#2354; &#2324;&#2352; &#2340;&#2344;&#2381;&#2344;&#2370; &#2319;&#2325; &#2348;&#2375;&#2306;&#2330; &#2346;&#2352; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2367;&#2358;&#2366; &#2325;&#2368; &#2323;&#2352; &#2350;&#2369;&#2326;&#2352;&#2367;&#2340; &#2361;&#2379;&#2325;&#2352; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2381;&#2352;&#2342;&#2368;&#2346;, &#2344;&#2367;&#2325;&#2381;&#2325;&#2369; &#2325;&#2366; &#2344;&#2367;&#2325;&#2335;&#2360;&#2381;&#2341; &#2346;&#2337;&#2364;&#2379;&#2360;&#2368; &#2361;&#2376;&#2404; &#2360;&#2379;&#2361;&#2375;&#2354;, &#2340;&#2344;&#2381;&#2344;&#2370; &#2325;&#2366; &#2344;&#2367;&#2325;&#2335;&#2360;&#2381;&#2341; &#2346;&#2337;&#2364;&#2379;&#2360;&#2368; &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2342;&#2368;&#2346;, &#2352;&#2367;&#2306;&#2325;&#2370; &#2325;&#2375; &#2360;&#2366;&#2341; &#2344;&#2361;&#2368;&#2306; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2352;&#2367;&#2306;&#2325;&#2370; &#2348;&#2375;&#2306;&#2330; &#2325;&#2375; &#2342;&#2366;&#2319;&#2305; &#2331;&#2379;&#2352; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2342;&#2368;&#2346;, &#2360;&#2379;&#2361;&#2375;&#2354; &#2324;&#2352; &#2340;&#2344;&#2381;&#2344;&#2370; &#2325;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; &#2360;&#2379;&#2361;&#2375;&#2354;, &#2340;&#2344;&#2381;&#2344;&#2370; &#2325;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2342;&#2368;&#2346; &#2325;&#2367;&#2360; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Second from right</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352;</span>",
      "<span class=\"eqt\">Fourth from left</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2360;&#2375; &#2330;&#2380;&#2341;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352;</span>",
      "<span class=\"eqt\">Third from left</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2360;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352;</span>",
      "<span class=\"eqt\">Second from left</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Pradeep is not sitting with Rinku who sits on the right end of the bench. Pradeep sits to the right of Sohail and Tannu.</p><p><img width=398 height=74 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22496/image033.png\"></p><p>Pradeep is immediate neighbour of Nikku. Sohail is immediate neighbour of Tannu. Sohail sits to the right of Tannu. So, case 1 is eliminated.</p><p><img width=337 height=28 id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22496/image034.png\"></p><p>Hence, Pradeep is sitting <b>third from the left</b> and also third from the right end of the row.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Seven friends M, N, O, P, Q, R and S having different heights are standing in ascending order of their heights. The tallest person stands on the right and the shortest on the left. Only three friends are taller than O. R is shorter than only Q. N is taller than both P and M but shorter than S. Who is the third tallest?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2325;&#2342; &#2357;&#2366;&#2354;&#2375; &#2360;&#2366;&#2340; &#2350;&#2367;&#2340;&#2381;&#2352; M, N, O, P, Q, R &#2324;&#2352; S &#2309;&#2346;&#2344;&#2375; &#2325;&#2342; &#2325;&#2375; &#2310;&#2352;&#2379;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2326;&#2337;&#2364;&#2375; &#2361;&#2376;&#2306;&#2404; &#2360;&#2348;&#2360;&#2375; &#2354;&#2350;&#2381;&#2348;&#2366; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2324;&#2352; &#2360;&#2348;&#2360;&#2375; &#2344;&#2366;&#2335;&#2366; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2326;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404; &#2325;&#2375;&#2357;&#2354; &#2340;&#2368;&#2344; &#2350;&#2367;&#2340;&#2381;&#2352; O &#2360;&#2375; &#2354;&#2350;&#2381;&#2348;&#2375; &#2361;&#2376;&#2306;&#2404; R &#2325;&#2375;&#2357;&#2354; Q &#2360;&#2375; &#2344;&#2366;&#2335;&#2366; &#2361;&#2376;&#2404; N, P &#2324;&#2352; M &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2375; &#2354;&#2350;&#2381;&#2348;&#2366; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; S &#2360;&#2375; &#2344;&#2366;&#2335;&#2366; &#2361;&#2376;&#2404; &#2340;&#2368;&#2360;&#2352;&#2366; &#2360;&#2348;&#2360;&#2375; &#2354;&#2350;&#2381;&#2348;&#2366; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2380;&#2344; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">P</span><span class=\"hqt\" style=\"display:none\">P</span>",
      "<span class=\"eqt\">N</span><span class=\"hqt\" style=\"display:none\">N</span>",
      "<span class=\"eqt\">S</span><span class=\"hqt\" style=\"display:none\">S</span>",
      "<span class=\"eqt\">O</span><span class=\"hqt\" style=\"display:none\">O</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Only three friends are taller than O. Which means O is the 4<sup>th</sup> tallest person.</p><p><img width=375 height=24 id=\"Picture 68\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22343/image035.png\"></p><p>R is shorter than only Q. Which means Q is the tallest person.</p><p><img width=376 height=34 id=\"Picture 69\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22343/image036.png\"></p><p>N is taller than both P and M but shorter than S.</p><p><img width=378 height=31 id=\"Picture 70\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22343/image037.png\"></p><p>Hence, third tallest person is <b>S</b>.</p>",
    "question_index": 4
