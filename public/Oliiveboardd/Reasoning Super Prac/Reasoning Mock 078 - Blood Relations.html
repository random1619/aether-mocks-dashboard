  {
    "question": "<span class=\"eqt\"><p>'L :: M' means 'L is the brother of M.'</p><p>'L () M' means 'L is the daughter of M.'</p><p>'L @ M' means 'L is the mother of M.'</p><p>'L ~ M' means 'L is the father-in-law of M.' </p><p>If S has only one child, then which of the following statements is true in the expression: F @ G ~ Q () S ~ V :: Y ?</p></span><span class=\"hqt\" style=\"display:none\"><p>'L :: M' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; 'L, M &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;'</p><p>'L () M' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; 'L, M &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;'</p><p>'L @ M' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; 'L, M &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;'</p><p>'L ~ M' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; 'L, M &#2325;&#2366; &#2360;&#2360;&#2369;&#2352; &#2361;&#2376;'</p><p>&#2351;&#2342;&#2367; S &#2325;&#2368; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2360;&#2306;&#2340;&#2366;&#2344; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; 'F @ G ~ Q () S ~ V :: Y' &#2350;&#2375;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Y is the brother of Q</span><span class=\"hqt\" style=\"display:none\">Y, Q &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;</span>",

      "<span class=\"eqt\">V is the son of G.</span><span class=\"hqt\" style=\"display:none\">V, G &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;</span>",
      "<span class=\"eqt\">S is the father of Y.</span><span class=\"hqt\" style=\"display:none\">S, Y &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>It is given that, </p><p>'L :: M' means 'L is the brother of M.'</p><p>'L () M' means 'L is the daughter of M.'</p><p>'L @ M' means 'L is the mother of M.'</p><p>'L ~ M' means 'L is the father-in-law of M.' </p><p>S has only one child. </p><p>After decoding the expression: F @ G ~ Q () S ~ V :: Y, we get:</p><p>F is the mother of G. </p><p>G is the father-in-law of Q. </p><p>Q is the daughter of S. </p><p>S is the father-in-law of V. </p><p>V is the brother of Y. </p><p><img width=193 height=139 id=\"Picture 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22416/image016.jpg\"></p><p>Thus, only option (c) is correct. </p>",
    "question_index": 0
  },
  {

      "<span class=\"eqt\">B is the mother-in-law of Z.</span><span class=\"hqt\" style=\"display:none\">B, Z &#2325;&#2368; &#2360;&#2366;&#2360; &#2361;&#2376;&#2404;</span>",

      "<span class=\"eqt\">All statements are true</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;&#2404;</span>"

    "correct_option_id": 3,
    "solution": "<p><b>A</b> 717 <b>D</b> 616 <b>B</b> 919 <b>K</b> 212 <b>N</b> 616 <b>Y</b> 919 <b>Z</b></p><p>A 717 D means 'A is the mother of D'</p><p>D 616 B means 'D is the sister of B'</p><p>B 919 K means 'B is the wife of K'</p><p>K 212 N means 'K is the father of N'</p><p>N 616 Y means 'N is the sister of Y'</p><p>Y 919 Z means 'Y is the wife of Z'</p><p><b><img width=419 height=177 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22027/image025.png\"></b></p><p>A is the grandmother of Y.</p><p>B is the mother-in-law of Z.</p><p>N is the niece of D.</p><p>All these statements are true.</p>",
    "question_index": 1

  {
    "question": "<span class=\"eqt\"><p>T is married to Y, who is the daughter of P. F is the son of U. L is the son-in-law of T. If P is the husband of U, then how is F related to the wife of L? </p></span><span class=\"hqt\" style=\"display:none\"><p>T, Y &#2360;&#2375; &#2357;&#2367;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; Y, P &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;&#2404; F, U &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;&#2404; L, T &#2325;&#2366; &#2342;&#2366;&#2350;&#2366;&#2342; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; P, U &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;, &#2340;&#2379; F, L &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Father</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Father-in-law</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2360;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Uncle</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2325;&#2354;</span>"

    "correct_option_id": 3,
    "solution": "<p>T is married to Y, who is the daughter of P. </p><p>L is the son-in-law of T.</p><p>P is the husband of U.</p><p><img width=199 height=151 id=\"Picture 35\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20645/image034.jpg\"></p><p>F is the son of U. </p><p><img width=211 height=136 id=\"Picture 36\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20645/image035.jpg\"></p><p>So, F is the uncle of the lady who is the wife of L. </p>",

    "question": "<span class=\"eqt\"><p>V is the son of F. R is married to F and is the grandmother of B. N has two children i.e., B and M. B is the brother of M. M is the daughter of N. N is married to V. Then how is R related to M?</p></span><span class=\"hqt\" style=\"display:none\"><p>V, F &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;&#2404; R, F &#2360;&#2375; &#2357;&#2367;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2357;&#2361; B &#2325;&#2368; &#2342;&#2366;&#2342;&#2368;/&#2344;&#2366;&#2344;&#2368; &#2361;&#2376;&#2404; N &#2325;&#2368; &#2342;&#2379; &#2360;&#2306;&#2340;&#2366;&#2344;&#2375;&#2306; &#2309;&#2352;&#2381;&#2341;&#2366;&#2340; B &#2324;&#2352; M &#2361;&#2376;&#2306;&#2404; B, M &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;&#2404; M, N &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;&#2404; N, V &#2360;&#2375; &#2357;&#2367;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2376;, &#2340;&#2379; R, M &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",

    "solution": "<p>&#183; V is the son of F. </p><p>&#183; R is married to F and is the grandmother of B. </p><p>&#183; N has two children i.e., B and M. </p><p>&#183; B is the brother of M. </p><p>&#183; M is the daughter of N. </p><p>&#183; N is married to V.</p><p><img width=213 height=198 id=\"Picture 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22529/image008.png\" ></p><p>So, R is the grandmother of M. </p>",

  {
