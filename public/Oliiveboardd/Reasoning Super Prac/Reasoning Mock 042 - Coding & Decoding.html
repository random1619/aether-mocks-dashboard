<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In a certain language, 'AE PJ RE' means 'go to school'; 'RE HI WO' means 'school is good'; and, 'TP RE HI AE WO' means 'good school is nearby to'. How is 'go' coded in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'AE PJ RE' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'go to school' &#2361;&#2376;; 'RE HI WO' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'school is good' &#2361;&#2376;; &#2324;&#2352; 'TP RE HI AE WO' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'good school is nearby to' &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'go' &#2325;&#2379; &#2325;&#2376;&#2360;&#2375; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cannot be determined</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">AE</span><span class=\"hqt\" style=\"display:none\">AE</span>",
      "<span class=\"eqt\">PJ</span><span class=\"hqt\" style=\"display:none\">PJ</span>",
      "<span class=\"eqt\">RE</span><span class=\"hqt\" style=\"display:none\">RE</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>'AE PJ RE' means 'go to school' ....... (i)</p><p>'RE HI WO' means 'school is good' ....... (ii)</p><p>'TP RE HI AE WO' means 'good school is nearby to' ....... (iii)</p><p>From (i) and (ii) we get,</p><p>School  -  RE</p><p>From (ii) and (iii) we get,</p><p>Good/is  -  HI/WO</p><p>From (i) and (iii) we get,</p><p>To  -  AE</p><p>Go  -  PJ</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language,\"Make your life sweet as honey\" means \"ae ou ei ee a eo\" and \"Your life has meaning\" means \"ou ei a aei\". Which of the following is the code for \"Life is sweet more than sugar\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; \"Make your life sweet as honey\" &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; \"ae ou ei ee a eo\" &#2361;&#2376; &#2324;&#2352; \"Your life has meaning\" &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; \"ou ei a aei\" &#2361;&#2376; ,&#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2379;&#2337; \"Life is sweet more than sugar\" &#2325;&#2375; &#2354;&#2367;&#2319; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">ei i ee oe e au</span><span class=\"hqt\" style=\"display:none\">ei i ee oe e au</span>",
      "<span class=\"eqt\">ei i ee oe a au</span><span class=\"hqt\" style=\"display:none\">ei i ee oe a au</span>",
      "<span class=\"eqt\">ei i ee eo a au</span><span class=\"hqt\" style=\"display:none\">ei i ee eo a au</span>",
      "<span class=\"eqt\">ei i ee eo e au</span><span class=\"hqt\" style=\"display:none\">ei i ee eo e au</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In this code:</p><p>Step 1: we consider the vowels in each word.</p><p>Step 2: Arrange the vowels according to the alphabetical order. </p><p>So, the code for this \"Life is sweet more than sugar\" will be \"ei i ee eo a au\".</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 27634 means 'Honesty is the best policy' and 84365 means 'Ginger prevents cold and cough'. Which of the following is the code for 'Reading is a good habit'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 27634 &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'Honesty is the best policy' &#2361;&#2376; &#2324;&#2352; 84365 &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'Ginger prevents cold and cough' &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; 'Reading is a good habit' &#2325;&#2366; &#2325;&#2379;&#2337; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">56712</span><span class=\"hqt\" style=\"display:none\">56712</span>",
      "<span class=\"eqt\">12754</span><span class=\"hqt\" style=\"display:none\">12754</span>",
      "<span class=\"eqt\">64321</span><span class=\"hqt\" style=\"display:none\">64321</span>",
      "<span class=\"eqt\">78541</span><span class=\"hqt\" style=\"display:none\">78541</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The words are replaced by the total number of letters present in it (in any order).</p><p>Reading is a good habit = 72145 (in any order)</p><p>So, option (b) is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In a coded language, <b>GOAT, CAST, </b>and <b>PALM</b> are coded as <b>SDOP, JRDW, </b>and <b>FDVW </b>not necessarily in the similar order then what will be the code for <b>BEST</b>? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2379;&#2337;&#2367;&#2340; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; <b>GOAT, CAST &#2324;&#2352;</b> <b>PALM</b> &#2325;&#2379; <b>SDOP, JRDW </b>&#2324;&#2352; <b>FDVW </b>&#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;<b> </b>&#2344;&#2361;&#2368;&#2306; &#2361;&#2376; &#2325;&#2367; &#2360;&#2350;&#2366;&#2344; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2361;&#2379;&#2306;, &#2340;&#2379; <b>BEST </b>&#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2379;&#2337; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">ESVO</span><span class=\"hqt\" style=\"display:none\">ESVO</span>",
      "<span class=\"eqt\">HSOE</span><span class=\"hqt\" style=\"display:none\">HSOE</span>",
      "<span class=\"eqt\">GJWX</span><span class=\"hqt\" style=\"display:none\">GJWX</span>",
      "<span class=\"eqt\">EHVW</span><span class=\"hqt\" style=\"display:none\">EHVW</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Here, the only possible combinations of the words and their codes is, </p><p>GOAT == JRDW. G (HI) J, O (PQ) R, A (BC) D, T (UV) W</p><p>CAST == FDVW. C (DE) F, A (BC) D, S (TU) V, T (UV) W</p><p>PALM == SDOP. P (QR) S, A (BC) D, L (MN) O, M (NO) P</p><p>Hence, BEST == <b>EHVW. </b>B (CD) E, E (FG) H, S (TU) V, T (UV) W</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In a coded language, <b>zebra panda tiger</b> is coded as <b>BNC RKL BEC, tiger lion monkey </b>is coded as<b> RKL WSX OPL, </b>and <b>cat giraffe panda </b>is coded as<b> BEC LPM NRT </b>then what will be the code for <b>zebra</b>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2379;&#2337;&#2367;&#2340; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; <b>zebra panda tiger</b> &#2325;&#2379; <b>BNC RKL BEC</b><b> </b>&#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;,<b> </b><b>tiger lion monkey</b><b> </b>&#2325;&#2379;<b> </b><b>RKL WSX OPL</b><b> </b>&#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;<b> </b>&#2340;&#2341;&#2366; <b>cat giraffe panda</b><b> </b>&#2325;&#2379;<b> </b><b>BEC LPM NRT</b><b> </b>&#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; <b>zebra</b><b> </b>&#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2379;&#2337; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">BNC</span><span class=\"hqt\" style=\"display:none\">BNC</span>",
      "<span class=\"eqt\">BEC</span><span class=\"hqt\" style=\"display:none\">BEC</span>",
      "<span class=\"eqt\">RKL</span><span class=\"hqt\" style=\"display:none\">RKL</span>",
      "<span class=\"eqt\">LPM</span><span class=\"hqt\" style=\"display:none\">LPM</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>It is given that, </p><p><b>zebra panda tiger</b> is coded as <b>BNC RKL BEC ...........(1)</b></p><p><b>tiger lion monkey </b>is coded as<b> RKL WSX OPL ........(2)</b></p><p><b>cat giraffe panda </b>is coded as<b> BEC LPM NRT .............(3)</b></p><p>From (1) and (2), </p><p>tiger == RKL</p><p>From (1) and (3),</p><p>panda == BEC</p><p>From (1), </p><p>zebra == <b>BNC</b></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language,<b> \"GRAPE PEAR ORANGE\" </b>means<b> \"E D F\", \"FIG RASPBERRY\" </b>means<b> \"C I\". </b>Which of the following code is for<b> \"PUMPKIN JACKFRUIT KIWI APPLE\" ?</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;<b> \"</b><b>GRAPE PEAR ORANGE</b><b>\" </b>&#2325;&#2366; &#2309;&#2352;&#2381;&#2341;<b> \"E D F\" </b>&#2361;&#2376; &#2324;&#2352;<b> \"</b><b>FIG RASPBERRY</b><b>\" </b>&#2325;&#2366; &#2309;&#2352;&#2381;&#2341;<b> \"C I\" </b>&#2361;&#2376;, &#2340;&#2379;<b> </b>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; <b>\"</b><b>PUMPKIN JACKFRUIT KIWI APPLE</b><b>\"</b> &#2325;&#2366; &#2325;&#2379;&#2337; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">I F C H</span><span class=\"hqt\" style=\"display:none\">I F C H</span>",
      "<span class=\"eqt\">G I D E</span><span class=\"hqt\" style=\"display:none\">G I D E</span>",
      "<span class=\"eqt\">I G D H</span><span class=\"hqt\" style=\"display:none\">I G D H</span>",
      "<span class=\"eqt\">I F D H</span><span class=\"hqt\" style=\"display:none\">I F D H</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, the number of letters in a word is associated with a particular letter. The letter is defined by the logic, A = 1, B = 2, C = 3, D = 4, E = 5, F = 6, G = 7, H = 8, and I = 9, considering the place values of letters in alphabetical order. </p><p>PUMPKIN = 7 = G, JACKFRUIT = 9 = I, KIWI = 4 = D, APPLE = 5 = E. </p><p>Hence, the code is <b>G I D E. </b></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 425 means 'Time is money' and 8845 means 'Students required time table'. Which of the following is the code for 'Online classes have video lectures '?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 425 &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'Time is money' &#2361;&#2376; &#2324;&#2352; 8845 &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'Students required time table' &#2361;&#2376;&#2404; 'Online classes have video lectures' &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2379;&#2337; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">76458</span><span class=\"hqt\" style=\"display:none\">76458</span>",
      "<span class=\"eqt\">74658</span><span class=\"hqt\" style=\"display:none\">74658</span>",
      "<span class=\"eqt\">67548</span><span class=\"hqt\" style=\"display:none\">67548</span>",
      "<span class=\"eqt\">67458</span><span class=\"hqt\" style=\"display:none\">67458</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The words are replaced by the total number of letters present in it in the same order.</p><p>Online classes have video lectures = 67458. </p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain language, 'Stay always beautiful' is written as 'wy fy ty', 'You are beautiful' is written as 'af fy uf' and 'stay blessed' is written as 'ty lf'. How will 'are' be written in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'Stay always beautiful' &#2325;&#2379; 'wy fy ty' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, 'You are beautiful' &#2325;&#2379; 'af fy uf' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; 'stay blessed' &#2325;&#2379; 'ty lf' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2344; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'are' &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">uf</span><span class=\"hqt\" style=\"display:none\">uf</span>",
      "<span class=\"eqt\">af</span><span class=\"hqt\" style=\"display:none\">af</span>",
      "<span class=\"eqt\">ty</span><span class=\"hqt\" style=\"display:none\">ty</span>",
      "<span class=\"eqt\">Can't be determined</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366;</span>"
