<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following figures among I, II, III and IV is odd?</p><p><img width=602 height=172 id=\"Picture 32\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8430/image025.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; I, II, III &#2324;&#2352; IV &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2310;&#2325;&#2371;&#2340;&#2367; &#2309;&#2360;&#2306;&#2327;&#2340; &#2361;&#2376;?</p><p><img width=\"602\" height=\"172\" id=\"Picture 32\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8430/image025.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>II is the odd one out, as in all the figures except II, along the x-axis (horizontal partition of the box) the shapes/figures are symmetrical.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Find the odd figure among the following figures:</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/sc-19-m18-001eximage.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2309;&#2360;&#2306;&#2327;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; :</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/sc-19-m18-001eximage.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The number of lines added on the sides of the figure is two less than the number of sides in the figure.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In the following question, five figures marked 1 to 5 are called the problem figures and the four figures marked (I) to (IV) are called the answer figures. Select a figure from amongst the answer figures which will continue the same series as establish.</p><p><img width=496 height=166 id=\"Picture 45\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p10246/image038.jpg\"></p><p><img width=407 height=168 id=\"Picture 46\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p10246/image039.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; 1 &#2360;&#2375; 5 &#2340;&#2325; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2346;&#2366;&#2305;&#2330; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2366;&#2305; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2366;&#2305; &#2325;&#2361;&#2354;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306; &#2324;&#2352; (I) &#2360;&#2375; (IV) &#2340;&#2325; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2330;&#2366;&#2352; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2366;&#2305; &#2313;&#2340;&#2381;&#2340;&#2352; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2366;&#2305; &#2325;&#2361;&#2354;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2313;&#2340;&#2381;&#2340;&#2352; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2320;&#2360;&#2368; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2368; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2379; &#2332;&#2366;&#2352;&#2368; &#2352;&#2326;&#2375;&#2327;&#2368;&#2404;</p><p><img width=\"496\" height=\"166\" id=\"Picture 45\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p10246/image038.jpg\"></p><p><img width=\"407\" height=\"168\" id=\"Picture 46\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p10246/image039.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A shape is added in each step until all four corners are full. Each shape shifts one position (along the corners) clockwise and also rotates 90&deg; to the right in each step. A shape replaced by a new shape in every fifth box of its appearance. So, (IV) is correct as the diamond will be replaced by a new shape this time and all the other three shapes will shift one position clockwise and rotate 90&deg; to the right.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Four figures are given in the following question. All figures have something in common except one. Find the odd figure out.</p><p><img width=602 height=168 id=\"Picture 27\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p14000/image024.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2330;&#2366;&#2352; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2375; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2344; &#2325;&#2369;&#2331; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2404; &#2309;&#2360;&#2306;&#2327;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"602\" height=\"168\" id=\"Picture 27\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p14000/image024.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>",
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The number of symbols present outside the figure is twice the number of symbols present inside the figure, except in figure IV.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Select the figure from among the given options that can replace the question mark (?) in the following series.</p><p><img width=680 height=315 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23128/image032.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p><img width=\"680\" height=\"315\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23128/image032.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The above figure is rotating 45<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23128/image033.png\"> anticlockwise in each step.</p><p>Thus, option figure (II) can replace the question mark  - </p><p><img width=175 height=200 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23128/image034.png\"></p><p>Thus, the answer is option (b).</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Select the figure from among the given options that can replace the question mark (?) in the following series.</p><p><img width=568 height=257 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23206/image027.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2375;&#2404;</p><p><img width=\"568\" height=\"257\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23206/image027.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The figures transfers alternately in in each step.</p><p><img width=182 height=198 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23206/image028.png\"></p><p>Thus, the answer is option (a).</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Three of the given four figures are similar in a certain manner while one is different. Pick the odd one out.</p><p><img width=1027 height=253 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23336/image011.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2330;&#2366;&#2352; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2340;&#2368;&#2344; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2352;&#2368;&#2325;&#2375; &#2360;&#2375; &#2319;&#2325; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2319;&#2325; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2376;&#2404; &#2309;&#2360;&#2306;&#2327;&#2340; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p><img width=\"1027\" height=\"253\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23336/image011.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Except for figure (III), the figure in the top-left corner of 1<sup>st</sup> part is rotated in 45<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23336/image012.png\"> clockwise direction and drawn in the bottom-right corner of 2<sup>nd</sup> part. The opposite of the alphabet inside the top-left corner is written to the bottom-left corner of 2<sup>nd</sup> part. Also, the figure which is at the bottom -right corner of 1<sup>st</sup> part is rotated 90<img width=11 height=16 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23336/image013.png\">anti-clockwise and drawn in the top-left corner in the second part. And 7 is get added to the number inside the bottom-right corner of part 1<sup>st</sup> and written at the top-right corner of 2<sup>nd</sup> part.</p><p><img width=202 height=240 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23336/image014.png\"></p><p>Thus, the answer is option (c).</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Figure A is related to B in a certain pattern. Following the same pattern, figure C is related to D. Study the pattern and select the figure which should be placed in place of D.</p><p><img width=681 height=335 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23336/image026.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2325;&#2371;&#2340;&#2367; A &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2350;&#2375;&#2306; B &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2310;&#2325;&#2371;&#2340;&#2367; C, D &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2360;&#2375; D &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2352;&#2326;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p><img width=\"681\" height=\"335\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23336/image026.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
