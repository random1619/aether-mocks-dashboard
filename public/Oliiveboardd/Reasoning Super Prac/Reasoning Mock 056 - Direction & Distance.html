  {
    "question": "<span class=\"eqt\"><p>The vertical distance between City A and City B is 10000km. The horizontal distance between City D and City F is 5000km. City D is 2000km towards the north of City A. Then the total distance between City B and City D is____.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2361;&#2352; A &#2324;&#2352; &#2358;&#2361;&#2352; B &#2325;&#2375; &#2348;&#2368;&#2330; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2342;&#2370;&#2352;&#2368; 10000 &#2325;&#2367;&#2350;&#2368; &#2361;&#2376;&#2404; &#2358;&#2361;&#2352; D &#2324;&#2352; &#2358;&#2361;&#2352; F &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2381;&#2359;&#2376;&#2340;&#2367;&#2332; &#2342;&#2370;&#2352;&#2368; 5000 &#2325;&#2367;&#2350;&#2368; &#2361;&#2376;&#2404; &#2358;&#2361;&#2352; D, &#2358;&#2361;&#2352; A &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; 2000 &#2325;&#2367;&#2350;&#2368; &#2342;&#2370;&#2352; &#2361;&#2376;&#2404; &#2340;&#2379; &#2358;&#2361;&#2352; B &#2324;&#2352; &#2358;&#2361;&#2352; D &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2369;&#2354; &#2342;&#2370;&#2352;&#2368; ____ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">The total distance between City B and City D &gt; 14000km</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2361;&#2352; B &#2324;&#2352; &#2358;&#2361;&#2352; D &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2369;&#2354; &#2342;&#2370;&#2352;&#2368; > 14000 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">The total distance between City B and City D &lt; 12000km</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2361;&#2352; B &#2324;&#2352; &#2358;&#2361;&#2352; D &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2369;&#2354; &#2342;&#2370;&#2352;&#2368; &lt; 12000km</span>",
      "<span class=\"eqt\">7000km &lt; The total distance between City B and City D &lt; 13000km</span><span class=\"hqt\" style=\"display:none\">7000 &#2325;&#2367;&#2350;&#2368; &lt; &#2358;&#2361;&#2352; B &#2324;&#2352; &#2358;&#2361;&#2352; D &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2369;&#2354; &#2342;&#2370;&#2352;&#2368; &lt; 13000 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">The total distance between City B and City D is equal to 10000km</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2361;&#2352; B &#2324;&#2352; &#2358;&#2361;&#2352; D &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2369;&#2354; &#2342;&#2370;&#2352;&#2368; 10000 &#2325;&#2367;&#2350;&#2368; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The vertical distance between City A and City B is 10000km.</p><p>The horizontal distance between City D and City F is 5000km.</p><p>City D is 2000km towards the north of City A.</p><p><img width=624 height=295 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15824/image004.jpg\"></p><p>The total distance between City B and City D is either 12000km or 8000km.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>One morning at 8 o'clock, Srinath started walking with his back towards the Sun. Then, he turned towards right and walked straight. Then, he again turned left and walked straight. Finally, he turned towards right. Now which direction is he facing?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2369;&#2348;&#2361; 8 &#2348;&#2332;&#2375; &#2358;&#2381;&#2352;&#2368;&#2344;&#2366;&#2341; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2368; &#2323;&#2352; &#2346;&#2368;&#2336; &#2325;&#2352;&#2325;&#2375; &#2330;&#2354;&#2344;&#2375; &#2354;&#2327;&#2375;&#2404; &#2347;&#2367;&#2352;, &#2357;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2350;&#2369;&#2337;&#2364;&#2375; &#2324;&#2352; &#2360;&#2368;&#2343;&#2375; &#2330;&#2354;&#2344;&#2375; &#2354;&#2327;&#2375;&#2404; &#2347;&#2367;&#2352;, &#2357;&#2375; &#2347;&#2367;&#2352; &#2360;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2350;&#2369;&#2337;&#2364;&#2375; &#2324;&#2352; &#2360;&#2368;&#2343;&#2375; &#2330;&#2354;&#2344;&#2375; &#2354;&#2327;&#2375;&#2404; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306;, &#2357;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2350;&#2369;&#2337;&#2364;&#2375;&#2404; &#2309;&#2348; &#2313;&#2344;&#2325;&#2366; &#2350;&#2369;&#2326; &#2325;&#2367;&#2360; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">West</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;</span>",
      "<span class=\"eqt\">South</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;</span>",
      "<span class=\"eqt\">East</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;</span>",
      "<span class=\"eqt\">North</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>One morning at 8 o'clock, Srinath started walking with his back towards the Sun. Then, he turned towards right and walked straight. Then, he again turned left and walked straight. Finally, he turned towards right.</p><p>Sun rises in the morning from the east direction. Thus, Srinath started walking in the west direction.</p><p><img width=598 height=270 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24620/image021.png\"></p><p>Srinath is facing the North direction.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>One evening, Divya started to walk towards the sun. After walking a while, she turned to her right and walked for some distance and again turned right. After walking a while she again turned right. Which direction is she facing finally?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2358;&#2366;&#2350; &#2342;&#2367;&#2357;&#2381;&#2351;&#2366; &#2360;&#2370;&#2352;&#2332; &#2325;&#2368; &#2323;&#2352; &#2330;&#2354;&#2344;&#2375; &#2354;&#2327;&#2368;&#2404; &#2325;&#2369;&#2331; &#2342;&#2370;&#2352; &#2330;&#2354;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2357;&#2361; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2350;&#2369;&#2337;&#2364;&#2368; &#2324;&#2352; &#2325;&#2369;&#2331; &#2342;&#2370;&#2352; &#2340;&#2325; &#2330;&#2354;&#2368; &#2324;&#2352; &#2347;&#2367;&#2352; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2350;&#2369;&#2337;&#2364; &#2327;&#2312;&#2404; &#2325;&#2369;&#2331; &#2342;&#2370;&#2352; &#2330;&#2354;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2357;&#2361; &#2347;&#2367;&#2352; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2350;&#2369;&#2337;&#2364; &#2327;&#2312;&#2404; &#2309;&#2348; &#2357;&#2361; &#2325;&#2367;&#2360; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2332;&#2366; &#2352;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">North</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;</span>",
      "<span class=\"eqt\">East<b> </b></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;</span>",
      "<span class=\"eqt\">West</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;</span>",
      "<span class=\"eqt\">South</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>One evening, Divya started to walk towards the sun.</p><p>In the evening the sun is in the west direction.</p><p>After walking a while, she turned to her right and again turned right.</p><p>After walking a while she again turned right.</p><p><b><img width=373 height=132 id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24682/image008.png\" ></b></p><p>So, she is facing the south direction.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Study the given directions and answer the question.</p><p>P1%Q2%R means 'P is 2m to the north of Q. Q is 4m to the north of R'.</p><p>P2^Q3^R means 'P is 4m to the east of Q. Q is 6m to the east of R'.</p><p>P4@Q1@R means 'P is 8m to the south of Q. Q is 2m to the south of R'.</p><p>P5&amp;Q3&amp;R means 'P is 10m to the west of Q. Q is 6m to the west of R'.</p><p>What is the direction of A with respect to Z in the given expression?</p><p><b>A2%O3%K; V2&amp;O6&amp;S; F4^K5^Z</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>P1%Q2%R &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; 2m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;&#2404; Q, R &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; 4m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;'&#2404;</p><p>P2^Q3^R &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2375;&#2306; 4m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;&#2404; Q, R &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2375;&#2306; 6m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;'&#2404;</p><p>P4@Q1@R &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306; 8m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;&#2404; Q, R &#2325;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306; 2m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;'&#2404;</p><p>P5&amp;Q3&amp;R &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2375; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2375;&#2306; 10m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;&#2404; Q, R &#2325;&#2375; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2375;&#2306; 6m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;'&#2404;</p><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2350;&#2375;&#2306; Z &#2325;&#2375; &#2360;&#2344;&#2381;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; A &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p><b>A2%O3%K; V2&amp;O6&amp;S; F4^K5^Z</b></p></span>",
    "options": [
      "<span class=\"eqt\">South-east</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2370;&#2352;&#2381;&#2357;</span>",
      "<span class=\"eqt\">North-west</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;</span>",
      "<span class=\"eqt\">South</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;</span>",
      "<span class=\"eqt\">North-east</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2370;&#2352;&#2381;&#2357;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A2%O3%K; V2&amp;O6&amp;S; F4^K5^Z.</p><p>A2%O means A is 4m to the north of O</p><p>O3%K means O is 6m to the north of K</p><p>V2&amp;O means V is 4m to the west of O</p><p>O6&amp;S means O is 12m to the west of S</p><p>F4^K means F is 8m to the east of K</p><p>K5^Z means K is 10m to the east of Z</p><p><img width=680 height=362 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19676/image008.jpg\"></p><p>A is to the northeast of Z.</p>",
    "question_index": 3
  },

    "question": "<span class=\"eqt\"><p>Study the given directions and answer the question.</p><p>'A(1+1)B' means 'A stands 2m to the north of B'</p><p>'A(2@2)B' means 'A stands 4m to the west of B'</p><p>'A(7=1)B' means 'A stands 8m to the east of B'</p><p>'A(5-5)B' means 'A stands 10m to the south of B'</p><p>'A^B^C' means 'Persons A, B and C form an isosceles right angled triangle'</p><p>Find the sum of the shortest distance between D and J and the shortest distance between P and Z in the given expression P(10+10)D(4-1)W(4=4)Z(10@3)J^W^D?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>'A(1+1)B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'A, B &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; 2m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2326;&#2337;&#2364;&#2366; &#2361;&#2376;'</p><p>'A(2@2)B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'A, B &#2325;&#2375; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2375;&#2306; 4m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2326;&#2337;&#2364;&#2366; &#2361;&#2376;'</p><p>'A(7=1)B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'A, B &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2375;&#2306; 8m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2326;&#2337;&#2364;&#2366; &#2361;&#2376;'</p><p>'A(5-5)B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'A, B &#2325;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306; 10m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2326;&#2337;&#2364;&#2366; &#2361;&#2376;'</p><p>'A^B^C' &#2325;&#2366; &#2309;&#2352;&#2381;     "question": "<span class=\"eqt\"><p>Sterling starts cycling from his home towards South at 6 am. At every interval of 15 minutes he takes a left turn and continues to cycle in the new direction, for the next 15 minutes. What direction would he be cycling in at 10:50 a.m. that day?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2335;&#2352;&#2381;&#2354;&#2367;&#2306;&#2327; &#2309;&#2346;&#2344;&#2375; &#2328;&#2352; &#2360;&#2375; 6 &#2348;&#2332;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2344; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2325;&#2368; &#2323;&#2352; &#2360;&#2366;&#2311;&#2325;&#2367;&#2354; &#2330;&#2354;&#2366;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; 15 &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2366;&#2354; &#2346;&#2352; &#2357;&#2361; &#2348;&#2366;&#2351;&#2368;&#2306; &#2323;&#2352; &#2350;&#2369;&#2396; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2344;&#2312; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; &#2309;&#2327;&#2354;&#2375; 15 &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2346;&#2344;&#2366; &#2330;&#2325;&#2381;&#2325;&#2352; &#2332;&#2366;&#2352;&#2368; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2361; &#2313;&#2360;&#2368; &#2342;&#2367;&#2344; 10:50 &#2348;&#2332;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2344; &#2346;&#2352; &#2325;&#2367;&#2360; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2360;&#2366;&#2311;&#2325;&#2367;&#2354; &#2330;&#2354;&#2366; &#2352;&#2361;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    "solution": "<p>Time interval between 6 a.m. and 10:45 a.m. = 4 hours 45 minutes = 285 minutes.</p><p>Since Sterling took left turns at intervals of 15 minutes in all he must have taken 19 left turns in total, the last one being at 10:45 a.m.</p><p>Now, we know that 4 successive left turns leads to Sterling cycling in the same direction, so after the 16<sup>th</sup> left turn he must have still been cycling South-wards.</p><p>Thus after the 19<sup>th</sup> turn, at 10:45 a.m., Sterling must be cycling West-wards. So, at 10:50 am, he will Sterling will be facing West-wards</p>",
