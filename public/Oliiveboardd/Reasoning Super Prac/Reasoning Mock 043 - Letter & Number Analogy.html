<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Select the option that is related to the fourth term in the same way as the first term is related to the second term and the fifth term is related to the sixth term.</p><p>14 : 190 :: ? : 318 :: 12 : 138</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2330;&#2380;&#2341;&#2375; &#2346;&#2342; &#2360;&#2375; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2332;&#2376;&#2360;&#2375; &#2346;&#2361;&#2354;&#2366; &#2346;&#2342; &#2342;&#2370;&#2360;&#2352;&#2375; &#2346;&#2342; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2306;&#2330;&#2357;&#2366;&#2306; &#2346;&#2342; &#2331;&#2336;&#2375; &#2346;&#2342; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>14 : 190 :: ? : 318 :: 12 : 138</p></span>",
    "options": [
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Here, the pattern is:</p><p>14*14 = 196 and 196  -  6 = 190.</p><p>12*12= 144 and 144- 6 = 138.</p><p>So, 318 + 6= 324 and 18*18= 324.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of this following letter-clusters should replace # and % so that the pattern and relationship followed between the letter-cluster pair on the left side of :: is the same as that on the right of :: ?</p><p>#: COZ :: JMS : %</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2325;&#2379; # &#2324;&#2352; % &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; :: &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2332;&#2379;&#2337;&#2364;&#2368; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343; &#2357;&#2376;&#2360;&#2366; &#2361;&#2368; &#2361;&#2379; &#2332;&#2376;&#2360;&#2366; &#2325;&#2367; :: &#2325;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2361;&#2376;?</p><p>#: COZ :: JMS : %</p></span>",
    "options": [
      "<span class=\"eqt\"># = FPC, % = GKQ</span><span class=\"hqt\" style=\"display:none\"># = FPC, % = GKQ</span>",
      "<span class=\"eqt\"># = HPA, % = ILP</span><span class=\"hqt\" style=\"display:none\"># = HPA, % = ILP</span>",
      "<span class=\"eqt\"># = EQB, % = HKQ</span><span class=\"hqt\" style=\"display:none\"># = EQB, % = HKQ</span>",
      "<span class=\"eqt\"># = FMB, % = HKO</span><span class=\"hqt\" style=\"display:none\"># = FMB, % = HKO</span>"
    ],
    "correct_option_id": 2,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A (1)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B (2)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C (3)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D (4)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E (5)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">F (6)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">G (7)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">H (8)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I (9)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">J (10)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">K (11)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">L (12)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">M (13)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Z (26)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Y (25)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">X (24)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">W (23)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">V (22)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">U (21)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T (20)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S (19)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R (18)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Q (17)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P (16)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O (15)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N (14)</td></tr></table><p>Option (a): # = FPC, % = GKQ</p><p>F  -  2 = D</p><p>P  -  2 = N</p><p>C  -  2 = A</p><p>Similarly,</p><p>J  -  2 = H</p><p>M  -  2 = K</p><p>S  -  2 = Q</p><p>As there is no same pattern between the right side and left side. So, option (a) is incorrect.</p><p>Option (b): # = HPA, % = ILP</p><p>H  -  2 = F</p><p>P  -  2 = N</p><p>A  -  2 = Y</p><p>Similarly,</p><p>J  -  2 = H</p><p>M  -  2 = K</p><p>S  -  2 = Q</p><p>As there is no same pattern between right side and left side. So, option (b) is incorrect.</p><p>Option (c): # = EQB, % = HKQ</p><p>E  -  2 = C</p><p>Q  -  2 = O</p><p>B  -  2 = Z</p><p>Similarly,</p><p>J  -  2 = H</p><p>M  -  2 = K</p><p>S  -  2 = Q</p><p>As there is same pattern between right side and left side. So, option (c) is correct.</p><p>Option (d): # = FMB, % = HKO</p><p>F  -  2 = D</p><p>M  -  2 = K</p><p>B  -  2 = Z</p><p>Similarly,</p><p>J  -  2 = H</p><p>M  -  2 = K</p><p>S  -  2 = Q</p><p>As there is no same pattern between right side and left side. So, option (d) is incorrect.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option that is related to the third cluster in the same way as the second letter cluster is related to the first letter-cluster.</p><p>SPIT : KRUV :: DONKEY : ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2340;&#2368;&#2360;&#2352;&#2375; &#2360;&#2350;&#2370;&#2361; &#2360;&#2375; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2370;&#2360;&#2352;&#2366; &#2309;&#2325;&#2381;&#2359;&#2352; &#2360;&#2350;&#2370;&#2361;, &#2346;&#2361;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2360;&#2350;&#2370;&#2361; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>SPIT : KRUV :: DONKEY : ?</p></span>",
    "options": [
      "<span class=\"eqt\">MPQFGA</span><span class=\"hqt\" style=\"display:none\">MPQFGA</span>",
      "<span class=\"eqt\">SWECTP</span><span class=\"hqt\" style=\"display:none\">SWECTP</span>",
      "<span class=\"eqt\">CTPSEW</span><span class=\"hqt\" style=\"display:none\">CTPSEW</span>",
      "<span class=\"eqt\">FGMPQA</span><span class=\"hqt\" style=\"display:none\">FGMPQA</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>SPIT</p><p>The letters of the word are first arranged in alphabetical order: IPST</p><p>I + 2 = K, P + 2 = R, S + 2 = U, T + 2 = V</p><p>DONKEY &rarr; DEKNOY = FGMPQA</p><p>So, the required letter cluster is FGMPQA.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following letter-clusters should replace # and % so that the pattern and relationship followed between the letter-cluster pair on the left side of :: is he same as that on the right side of ::?</p><p>#: OCX:: OKN : %</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2325;&#2379; # &#2324;&#2352; % &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367; :: &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343; :: &#2325;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;?</p><p>#: OCX:: OKN : %</p></span>",
    "options": [
      "<span class=\"eqt\">#=QAZ, %=MML</span><span class=\"hqt\" style=\"display:none\">#=QAZ, %=MML</span>",
      "<span class=\"eqt\">#=QAY, %=MML</span><span class=\"hqt\" style=\"display:none\">#=QAY, %=MML</span>",
      "<span class=\"eqt\">#=QAZ, %=MNL</span><span class=\"hqt\" style=\"display:none\">#=QAZ, %=MNL</span>",
      "<span class=\"eqt\">#=QBY, %=MNL</span><span class=\"hqt\" style=\"display:none\">#=QBY, %=MNL</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Option I:</p><p>#=QAZ, %=MML</p><p>So, </p><p>QAZ: OCX:: OKN : MML</p><p>Q  -  2 = O</p><p>A + 2 = C</p><p>Z  -  2 = X</p><p>Similarly, </p><p>O  -  2 = M</p><p>K + 2 = M</p><p>N  -  2 = L </p><p>As there is same pattern between right side and left side. So, option (a) is correct.</p><p>Option II:</p><p>#=QAY, %=MML </p><p>So, </p><p>QAY: OCX:: OKN : MML</p><p>Q  -  2 = O</p><p>A + 2 = C</p><p>Y  -  1 = X</p><p>Similarly, </p><p>O  -  2 = M</p><p>K + 2 = M</p><p>N  -  2 = L </p><p>As there is not same pattern between right side and left side. So, option (b) is incorrect. </p><p>Option III:</p><p>#=QAZ, %=MNL</p><p>So, </p><p>QAZ: OCX:: OKN : MNL</p><p>Q  -  2 = O</p><p>A + 2 = C</p><p>Z  -  2 = X</p><p>Similarly, </p><p>O  -  2 = M</p><p>K + 3 = N</p><p>N  -  2 = L </p><p>As there is not same pattern between right side and left side. So, option (c) is incorrect.</p><p>Option IV:</p><p>#=QBY, %=MNL</p><p>So, </p><p>QBY: OCX:: OKN : MNL </p><p>Q  -  2 = O</p><p>B + 1 = C</p><p>Y  -  1 = X</p><p>Similarly, </p><p>O  -  2 = M</p><p>K + 3 = N</p><p>N  -  2 = L </p><p>As there is not same pattern between right side and left side. So, option (d) is incorrect.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option that is related to the third term in the same way as the second term is related to the first term and the sixth term is related to the fifth term.</p><p>14 : 118 :: 26 : ? :: 21 : 174</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2340;&#2368;&#2360;&#2352;&#2375; &#2346;&#2342; &#2360;&#2375; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2370;&#2360;&#2352;&#2366; &#2346;&#2342;, &#2346;&#2361;&#2354;&#2375; &#2346;&#2342; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2331;&#2336;&#2366; &#2346;&#2342;, &#2346;&#2366;&#2305;&#2330;&#2357;&#2375;&#2306; &#2346;&#2342; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>14 : 118 :: 26 : ? :: 21 : 174</p></span>",
    "options": [
      "<span class=\"eqt\">218</span><span class=\"hqt\" style=\"display:none\">218</span>",
      "<span class=\"eqt\">220</span><span class=\"hqt\" style=\"display:none\">220</span>",
      "<span class=\"eqt\">214</span><span class=\"hqt\" style=\"display:none\">214</span>",
      "<span class=\"eqt\">210</span><span class=\"hqt\" style=\"display:none\">210</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>14 X 8 + 6 = 112 + 6 = 118</p><p>21 X 8 + 6 = 168 + 6 = 174</p><p>Similarly,</p><p>26 X 8 + 6 = 208 + 6 = <b>214</b></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Select the related letters/words/numbers from the given alternatives.</p><p>DOUBLE : WQFGND : : KEYBOARD :</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2325;&#2381;&#2359;&#2352;/&#2358;&#2348;&#2381;&#2342;/&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p>DOUBLE : WQFGND : : KEYBOARD :</p></span>",
    "options": [
      "<span class=\"eqt\">MGADFTCQ</span><span class=\"hqt\" style=\"display:none\">MGADFTCQ</span>",
      "<span class=\"eqt\">MTCOMGCQ</span><span class=\"hqt\" style=\"display:none\">MTCOMGCQ</span>",
      "<span class=\"eqt\">DAGMFTCQ</span><span class=\"hqt\" style=\"display:none\">DAGMFTCQ</span>",
      "<span class=\"eqt\">DGAMFTCQ</span><span class=\"hqt\" style=\"display:none\">DGAMFTCQ</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>DOU BLE</p> <p>By reversing the letters</p> <p>UOD ELB</p> <p>Now increasing each letter by 2</p> <p>WQF GND</p> <p>Similarly, KEYB OARD =&gt; BYEK DRAO =&gt; DAGM FTCQ</p>",
    "question_index": 5
