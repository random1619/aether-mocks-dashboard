    "question": "<span class=\"eqt\"><p>M, N, O, P, Q and R are sitting around a circular table facing inside, but not necessarily in the same order. Two people sit between P and M. One person sits between M and N. Q sits immediate left of N. P sits second to the left of R. Then who among the following sits immediate right of R?</p></span><span class=\"hqt\" style=\"display:none\"><p>M, N, O, P, Q &#2324;&#2352; R &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2350;&#2375;&#2332; &#2325;&#2375; &#2311;&#2352;&#2381;&#2342;-&#2327;&#2367;&#2352;&#2381;&#2342; &#2309;&#2306;&#2342;&#2352; &#2325;&#2368; &#2323;&#2352; &#2350;&#2369;&#2326;&#2352;&#2367;&#2340; &#2361;&#2379;&#2325;&#2352; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376; &#2325;&#2367; &#2360;&#2350;&#2366;&#2344; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2361;&#2379;&#2306;&#2404; P &#2324;&#2352; M &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2342;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; M &#2324;&#2352; N &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; Q, N &#2325;&#2375; &#2344;&#2367;&#2325;&#2335;&#2360;&#2381;&#2341; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; P, R &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; R &#2325;&#2375; &#2344;&#2367;&#2325;&#2335;&#2360;&#2     "correct_option_id": 1,
    "solution": "<p>&#183; M, N, O, P, Q and R are sitting around a circular table facing inside, but not necessarily in the same order. </p><p>&#183; Two people sit between P and M. </p><p>&#183; One person sits between M and N. </p><p>&#183; So, there are two cases possible i.e. Case 1 and Case 2.</p><p><img width=504 height=232 id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21393/image029.png\" alt=1.png></p><p>&#183; Q sits immediate left of N. </p><p>&#183; P sits second to the left of R.</p><p>&#183; So, Case 1 will be invalid. Remaining, O sits immediate right of P.</p><p><img width=495 height=252 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21393/image030.png\" alt=1.png></p><p>Finally, we get, </p><p><img width=220 height=199 id=\"Picture 62\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21393/image031.png\" alt=1.png></p><p>So, M sits immediate right of R</p>",

  {
    "question": "<span class=\"eqt\"><p><b>Directions:</b> Six people - P, Q, R, S, T & U are seated around a circular table facing inwards. P is seated to the immediate left of R. U is seated fourth to the right of R. Q is seated second to the right of S.</p><p>Who is seated opposite to T?</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;:</b> &#2331;&#2361; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; - P, Q, R, S, T &#2324;&#2352; U &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2350;&#2375;&#2332; &#2325;&#2375; &#2311;&#2352;&#2381;&#2342;-&#2327;&#2367;&#2352;&#2381;&#2342; &#2309;&#2306;&#2342;&#2352; &#2325;&#2368; &#2323;&#2352; &#2350;&#2369;&#2326;&#2352;&#2367;&#2340; &#2361;&#2379;&#2325;&#2352; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; P, R &#2325;&#2375; &#2344;&#2367;&#2325;&#2335;&#2360;&#2381;&#2341; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; U, R &#2325;&#2375; &#2342;&#2366;&#2319;&#2305; &#2360;&#2375; &#2330;&#2380;&#2341;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; Q, S &#2325;&#2375; &#2342;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404;</p><p>T &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2325;&#2380;&#2344; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 2,
    "solution": "<p>&#183;Four persons namely Mia, Lia, Kia, Ria are sitting at the corners of a square table facing towards center, but not necessarily in the same order.</p><p>&#183;Mia is sitting the immediate right of Ria. </p><p>&#183;Lia is sitting opposite to Ria.</p><p><b><img width=211 height=181 id=\"Picture 18\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21393/image010.png\" alt=1.png></b></p><p>&#183; Remaining, Kia sits immediate right of Lia. </p><p><img width=198 height=179 id=\"Picture 19\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21393/image011.png\" alt=1.png></p><p>So, Ria sits immediate right of Kia.</p>",

2340;&#2366;&#2352;&#2325;, &#2309;&#2352;&#2381;&#2332;&#2369;&#2344; &#2325;&#2375; &#2344;&#2367;&#2325;&#2335;&#2360;&#2381;&#2341; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404; &#2325;&#2352;&#2339; &#2325;&#2375; &#2360;&#2344;&#2381;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2309;&#2352;&#2381;&#2332;&#2369;&#2344; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 3,
    "solution": "<p>Five persons- Arjun, Karan, Tarak, Anjali and Tina are standing around the circular ground and facing away from the centre (not necessarily in the same order).</p><p>Anjali is neighbour of Karan.</p><p><img width=431 height=188 id=\"Picture 38\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22744/image038.jpg\"></p><p>One person is standing between Arjun and Tina.</p><p>Anjali is not neighbour of Tina.</p><p><img width=487 height=215 id=\"Picture 39\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22744/image039.jpg\"></p><p>Tarak is not to the immediate right of Arjun. Thus, case 2 is invalid.</p><p>Therefore, the final arrangement is:</p><p><img width=229 height=191 id=\"Picture 40\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22744/image040.jpg\"></p><p>So, Arjun is second to the left and third to the right of Karan.</p>",
