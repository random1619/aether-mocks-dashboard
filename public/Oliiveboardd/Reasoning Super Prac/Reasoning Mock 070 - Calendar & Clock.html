<body>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A clock is set at 3 pm today. It gains 'p' minutes in every 1 hour. If it will show 9 hours 40 minutes pm at 7 pm tomorrow, then find the value of 'p'.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2332; &#2319;&#2325; &#2328;&#2337;&#2364;&#2368; &#2342;&#2379;&#2346;&#2361;&#2352; 3 &#2348;&#2332;&#2375; &#2360;&#2375;&#2335; &#2325;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404; &#2351;&#2361; &#2361;&#2352; 1 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 'p' &#2350;&#2367;&#2344;&#2335; &#2310;&#2327;&#2375; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2351;&#2361; &#2325;&#2354; &#2358;&#2366;&#2350; 7 &#2348;&#2332;&#2375; 9 &#2328;&#2306;&#2335;&#2375; 40 &#2350;&#2367;&#2344;&#2335; &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; &#2342;&#2367;&#2326;&#2366;&#2319;&#2327;&#2368;, &#2340;&#2379; 'p' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4(2/7)</span><span class=\"hqt\" style=\"display:none\">4(2/7)</span>",
      "<span class=\"eqt\">5(5/7)</span><span class=\"hqt\" style=\"display:none\">5(5/7)</span>",
      "<span class=\"eqt\">3(1/3)</span><span class=\"hqt\" style=\"display:none\">3(1/3)</span>",
      "<span class=\"eqt\">6(2/3)</span><span class=\"hqt\" style=\"display:none\">6(2/3)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Time gain by the clock in every one hour = p minutes</p><p>Total hours from 3 pm today to 7 pm tomorrow = 24 + 4 = 28 hours</p><p>Time gain by the clock in 28 hours = 28p minutes</p><p>Also, time gain by the clock = (9 hours 40 minutes pm)  -  7pm = 2 hours + 40 minutes</p><p>2 hours + 40 minutes = 28p minutes</p><p>=> 2 * 60 + 40 = 28p</p><p>=> p = 160/28</p><p>=> <b>p = 5(5/7)</b></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A clock which moves continuously fast, it lags 10 minutes on Tuesday 10 AM, it is ahead 14 minutes on Friday 10 AM. Find when the clock showed the right time.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2337;&#2364;&#2368; &#2332;&#2379; &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; &#2340;&#2375;&#2332; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;, &#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352; &#2360;&#2369;&#2348;&#2361; 10 &#2348;&#2332;&#2375; &#2351;&#2361; 10 &#2350;&#2367;&#2344;&#2335; &#2346;&#2368;&#2331;&#2375; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;, &#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352; &#2360;&#2369;&#2348;&#2361; 10 &#2348;&#2332;&#2375; &#2351;&#2361; 14 &#2350;&#2367;&#2344;&#2335; &#2310;&#2327;&#2375; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404; &#2348;&#2340;&#2366;&#2311;&#2319; &#2328;&#2337;&#2364;&#2368; &#2344;&#2375; &#2360;&#2361;&#2368; &#2360;&#2350;&#2351; &#2325;&#2348; &#2342;&#2367;&#2326;&#2366;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Wednesday 12 PM</span><span class=\"hqt\" style=\"display:none\">Wednesday 12 PM</span>",
      "<span class=\"eqt\">Thursday 2 PM</span><span class=\"hqt\" style=\"display:none\">Thursday 2 PM</span>",
      "<span class=\"eqt\">Wednesday 4 PM</span><span class=\"hqt\" style=\"display:none\">Wednesday 4 PM</span>",
      "<span class=\"eqt\">Friday 6 AM</span><span class=\"hqt\" style=\"display:none\">Friday 6 AM</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Time between Tuesday 10 AM to Friday 10 AM = 72 hour</p><p>Formula: <img width=80 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24841/image005.png\">  X  Total = <img width=53 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24841/image006.png\">  X  72 = <img width=23 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24841/image007.png\">  X  72 = 30 hour</p><p>Tuesday 10 AM + 30 hour = Wednesday 4 PM</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Fill in the blanks with an appropriate option:</p><p>If 25<sup>th</sup> January 1963 was Monday, then Wednesday and Friday will fall after ______ and _____ days, respectively after 25<sup>th</sup> January 1963. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344; &#2350;&#2375;&#2306; &#2313;&#2330;&#2367;&#2340; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2349;&#2352;&#2375;&#2306;:</p><p>&#2351;&#2342;&#2367; 25 &#2332;&#2344;&#2357;&#2352;&#2368; 1963 &#2325;&#2379; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2341;&#2366;, &#2340;&#2379; &#2348;&#2369;&#2343;&#2357;&#2366;&#2352; &#2324;&#2352; &#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352; 25 &#2332;&#2344;&#2357;&#2352;&#2368; 1963 &#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; ______ &#2324;&#2352; _____ &#2342;&#2367;&#2344; &#2348;&#2366;&#2342; &#2346;&#2337;&#2364;&#2375;&#2306;&#2327;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">15<sup>th</sup>, 25<sup>th</sup></span><span class=\"hqt\" style=\"display:none\">15<sup>&#2357;&#2375;&#2306;</sup>, 25<sup>&#2357;&#2375;&#2306;</sup></span>",
      "<span class=\"eqt\">58<sup>th</sup>, 67<sup>th</sup></span><span class=\"hqt\" style=\"display:none\">58<sup>&#2357;&#2375;&#2306;</sup>, 67<sup>&#2357;&#2375;&#2306;</sup></span>",
      "<span class=\"eqt\">17<sup>th</sup>, 41<sup>st</sup></span><span class=\"hqt\" style=\"display:none\">17<sup>&#2357;&#2375;&#2306;</sup>, 41<sup>&#2357;&#2375;&#2306;</sup></span>",
      "<span class=\"eqt\">All of these</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344; &#2360;&#2348;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>25<sup>th</sup> January 1963 was Monday. </p><p><b>Option (a) 15<sup>th</sup>, 25<sup>th</sup> </b></p><p>If we divide 15 by 7, then the remainder will be 1. Thus, the total number of odd days = 01</p><p>So, 15<sup>th</sup> day after Monday = Monday + 1 day = Tuesday. </p><p>If we divide 25 by 7, then the remainder will be 4. Thus, the total number of odd days = 04</p><p>So, 25<sup>th</sup> day after Monday = Monday + 4 days = Friday </p><p>So, option (a) is incorrect. </p><p><b>Option (b) 58<sup>th</sup>, 67<sup>th</sup> </b></p><p>If we divide 58 by 7, then the remainder will be 2. Thus, the total number of odd days = 02</p><p>So, 58<sup>th</sup> day after Monday = Monday + 2 days= Wednesday. </p><p>If we divide 67 by 7, then the remainder will be 4. Thus, the total number of odd days = 04</p><p>So, 67<sup>th</sup> day after Monday = Monday + 4 days = Friday </p><p>So, option (b) is correct. </p><p><b>Option (c) 17<sup>th</sup>, 41<sup>st</sup> </b></p><p>If we divide 17 by 7, then the remainder will be 3. Thus, the total number of odd days = 03</p><p>So, 17<sup>th</sup> day after Monday = Monday + 3 days= Thursday. </p><p>If we divide 41 by 7, then the remainder will be 6. Thus, the total number of odd days = 06</p><p>So, 41<sup>th</sup> day after Monday = Monday + 6 days = Sunday </p><p>So, option (c) is incorrect. </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What will be the acute angle between the hour-hand and the minute-hand at 6:41 am?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2369;&#2348;&#2361; 6:41 &#2348;&#2332;&#2375; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2360;&#2369;&#2312; &#2324;&#2352; &#2350;&#2367;&#2344;&#2335; &#2325;&#2368; &#2360;&#2369;&#2312; &#2325;&#2375; &#2348;&#2368;&#2330; &#2344;&#2381;&#2351;&#2370;&#2344; &#2325;&#2379;&#2339; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">76</span><span class=\"hqt\" style=\"display:none\">76°</span>",
      "<span class=\"eqt\">45.5</span><span class=\"hqt\" style=\"display:none\">45.5°</span>",
      "<span class=\"eqt\">60</span><span class=\"hqt\" style=\"display:none\">60°</span>",
      "<span class=\"eqt\">81.5</span><span class=\"hqt\" style=\"display:none\">81.5°</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The acute angle between the hour-hand and the minute-hand at 6:41 am can be calculated using this formula  -</p><p>Angle = |<img width=23 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25010/image010.png\">M  -  30H|</p><p>Where, M = Minutes, H = Hours</p><p>M = 41, H = 6</p><p>Angle = |<img width=23 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25010/image010.png\">  X  41  -  30  X  6|</p><p>= |<img width=32 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25010/image011.png\">  -  180|</p><p><b>= </b>|225.5  -  180|</p><p>= |45.5|</p><p>Angle = 45.5</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the mirror image of the clock when the time is 10:28.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2360;&#2350;&#2351; 10:28 &#2361;&#2379; &#2340;&#2379; &#2328;&#2337;&#2364;&#2368; &#2325;&#2366; &#2342;&#2352;&#2381;&#2346;&#2339; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1:46</span><span class=\"hqt\" style=\"display:none\">1:46</span>",
      "<span class=\"eqt\">2:30</span><span class=\"hqt\" style=\"display:none\">2:30</span>",
      "<span class=\"eqt\">2:15</span><span class=\"hqt\" style=\"display:none\">2:15</span>",
      "<span class=\"eqt\">1:32</span><span class=\"hqt\" style=\"display:none\">1:32</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>To find the mirror image of 10:28 we need to subtract it from 11:60</p><p>11:60  -  10:28 = 1:32</p><p>Thus, mirror image of 10:28 is 1:32.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If the hour hand of a clock moves by 21, then by how many degrees does the minute hand move during the same time?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2328;&#2337;&#2364;&#2368; &#2325;&#2368; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2360;&#2369;&#2312; 21 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2368; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2350;&#2367;&#2344;&#2335; &#2325;&#2368; &#2360;&#2369;&#2312; &#2325;&#2367;&#2340;&#2344;&#2375; &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">180</span><span class=\"hqt\" style=\"display:none\">180°</span>",
      "<span class=\"eqt\">252</span><span class=\"hqt\" style=\"display:none\">252°</span>",
      "<span class=\"eqt\">144</span><span class=\"hqt\" style=\"display:none\">144°</span>",
      "<span class=\"eqt\">276</span><span class=\"hqt\" style=\"display:none\">276°</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The hour hand of a clock moves by 30 when the minute hand moves through 360.</p><p>Hence if the hour hand moves 21, then the minute hand moves by  -</p><p><img width=32 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25010/image016.png\">  X  21 = 12  X  21 = 252</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find the angle between the hour hand and the minute hand of a clock when the time is 36 minutes past 2.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2337;&#2364;&#2368; &#2325;&#2368; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2360;&#2369;&#2312; &#2324;&#2352; &#2350;&#2367;&#2344;&#2335; &#2325;&#2368; &#2360;&#2369;&#2312; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2325;&#2379;&#2339; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2348; &#2360;&#2350;&#2351; 2 &#2348;&#2332;&#2325;&#2352; 36 &#2350;&#2367;&#2344;&#2335; &#2361;&#2379;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">84<sup>o</sup></span><span class=\"hqt\" style=\"display:none\">84<sup>o</sup></span>",
      "<span class=\"eqt\">125<sup>o</sup></span><span class=\"hqt\" style=\"display:none\">125<sup>o</sup></span>",
      "<span class=\"eqt\">90<sup>o</sup></span><span class=\"hqt\" style=\"display:none\">90<sup>o</sup></span>",
      "<span class=\"eqt\">138<sup>o</sup></span><span class=\"hqt\" style=\"display:none\">138<sup>o</sup></span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>36 minutes past 2 means 2:36</p><p>The angle between the hour hand and the minute hand of a clock when the time is 2:36 can be calculated by using the formula  -</p><p>Angle = |<img width=23 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25010/image017.png\">M  -  30H|</p><p>Where, M = Minutes, H = Hours</p><p>M = 36, H = 2</p><p>Angle = |<img width=23 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25010/image017.png\">  X  36  -  30  X  2|</p><p>= |198  -  60|</p><p>= |138|</p><p>Angle = 138</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Today is Siara's birthday which falls on Saturday, Geetika's birthday falls after 60 days after Siara's birthday and 41 days before Fatima's birthday. On which day Fatima's birthday falls?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2332; &#2360;&#2367;&#2351;&#2366;&#2352;&#2366; &#2325;&#2366; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; &#2361;&#2376; &#2332;&#2379; &#2358;&#2344;&#2367;&#2357;&#2366;&#2352; &#2325;&#2379; &#2346;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;, &#2327;&#2368;&#2340;&#2367;&#2325;&#2366; &#2325;&#2366; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; &#2360;&#2367;&#2351;&#2366;&#2352;&#2366; &#2325;&#2375; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; &#2325;&#2375; 60 &#2342;&#2367;&#2344; &#2348;&#2366;&#2342; &#2324;&#2352; &#2347;&#2366;&#2340;&#2367;&#2350;&#2366; &#2325;&#2375; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; &#2360;&#2375; 41 &#2342;&#2367;&#2344; &#2346;&#2361;&#2354;&#2375; &#2346;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404; &#2347;&#2366;&#2340;&#2367;&#2350;&#2366; &#2325;&#2366; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; &#2325;&#2367;&#2360; &#2342;&#2367;&#2344; &#2346;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Tuesday</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Siara's birthday falls on Saturday</p><p>To find the day after 60 days</p><p>Nearest multiple of 7 = 56</p><p>So, after 56 there will be Saturday</p><p>60  -  56 = 4</p><p>Saturday + 4 = Wednesday</p><p>Geetika birthday will be on Wednesday</p><p>Geetika's birthday falls 41 days before Fatima's birthday</p><p>So, after 35 days there will be Wednesday</p><p>41  -  35 = 6</p><p>Wednesday + 6 = Tuesday</p><p>Hence, Fatima's birthday will fall on Tuesday.</p>",

    "question": "<span class=\"eqt\"><p>If 12<sup>th</sup> February 1932 was Friday, then what day of a week will fall on 12<sup>th</sup> February 2025? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 12 &#2347;&#2352;&#2357;&#2352;&#2368; 1932 &#2325;&#2379; &#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352; &#2341;&#2366;, &#2340;&#2379; 12 &#2347;&#2352;&#2357;&#2352;&#2368; 2025 &#2325;&#2379; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2342;&#2367;&#2344; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    "correct_option_id": 3,
    "solution": "<p>12<sup>th</sup> February 1932 was Friday. </p><p>Period starting from 12<sup>th</sup> February 1932 to 12<sup>th</sup> February 2025, there were 94 years. </p><p>If we divide 94 by 4 (because leap year occurs in every 4 years), then the quotient will be 23.</p><p>So, from period of 12<sup>th</sup> February 1932 to 12<sup>th</sup> February 2025, there were 23 leap years and 71 normal years. </p><p>We know that, there are 2 odd days in a leap year and 1 odd day in a normal year. Thus, 23 * 2 + 71 * 1 = 46 + 71 = 117 odd days. </p><p>If we divide, 117 by 7, then remainder will be 5. So, 5 odd days. </p><p>So, 12<sup>th</sup> February 2025 = Friday + 5 days = Wednesday. </p>",

    "question": "<span class=\"eqt\"><p>Find the angle traced by the hour hand of a clock between 5 pm and 9:30pm of the same day? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2361;&#2368; &#2342;&#2367;&#2344; &#2358;&#2366;&#2350; 5 &#2348;&#2332;&#2375; &#2360;&#2375; &#2352;&#2366;&#2340; 9:30 &#2348;&#2332;&#2375; &#2325;&#2375; &#2348;&#2368;&#2330; &#2328;&#2337;&#2364;&#2368; &#2325;&#2368; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2360;&#2369;&#2312; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2379;&#2339; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",

      "<span class=\"eqt\">135&deg;</span><span class=\"hqt\" style=\"display:none\">135&deg;</span>",
      "<span class=\"eqt\">145&deg;</span><span class=\"hqt\" style=\"display:none\">145&deg;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>We know that, each clock is composed on 360&deg; that is divided into 12 equal regions. So, the angle between the consecutive divisions is obtained by dividing the total angle of clock 360&deg; by the number of divisions i.e. 12. Thus, the<b> </b>angle between any two consecutive divisions = (360&deg;)/12= 30&deg;.</p><p>In other words, the angle formed by an hour hand in 1 hour = 30&deg; and the angle formed by an hour hand in 30 minutes = 30&deg;/2 = 15&deg;. </p><p>From 5pm to 9:30 pm, total number of hours = 4 hours 30 minutes. </p><p>So, angle = 4*30&deg; + 15&deg; = 120&deg; + 15&deg; = 135&deg;. </p><p> </p>",
