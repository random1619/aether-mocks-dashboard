    "question": "<span class=\"eqt\"><p>In this question, a statement is followed by two courses of action, numbered I and II. You must assume everything in the statement to be true and on the basis of the information given in the statement, decide which of the course of action/s logically follows for pursuing.</p><p>Statement: Many people have complained to the Finance Ministry regarding a delay in receiving refunds of their Income Tax returns.</p><p>Courses of action:</p><p>I. The Finance Ministry must institute an enquiry into the complaints received regarding delay in income tax refunds. </p><p>II: The Finance Ministry must compensate the income tax payees by paying interest on their refunds for the duration of the delay.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2325;&#2341;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368; &#2325;&#2375; &#2340;&#2352;&#2368;&#2325;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; I &#2324;&#2352; II &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2310;&#2346;&#2325;&#2379; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2360;&#2349;&#2368; &#2348;&#2366;&#2340;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#8203;&#8203;&#2330;&#2366;&#2361;&#2367;&#2319; &#2324;&#2352; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2340;&#2351; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2325;&#2367; &#2325;&#2380;&#2344; &#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;
