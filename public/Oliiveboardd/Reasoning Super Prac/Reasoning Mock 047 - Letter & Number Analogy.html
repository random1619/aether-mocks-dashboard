<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Select the triad which follows the same pattern as that followed by the two triads given below. Both triads follow the same pattern.</p><p>BG  -  38 -  LQ</p><p>JO  -  70  -  TY</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2340;&#2381;&#2352;&#2367;&#2325; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2340;&#2381;&#2352;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2340;&#2381;&#2352;&#2367;&#2325; &#2360;&#2350;&#2366;&#2344; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>BG - 38 - LQ</p><p>JO - 70 - TY</p></span>",
    "options": [
      "<span class=\"eqt\">MR  -  60  -  WB</span><span class=\"hqt\" style=\"display:none\">MR  -  60  -  WB</span>",
      "<span class=\"eqt\">CI  -  42  -  NS</span><span class=\"hqt\" style=\"display:none\">CI  -  42  -  NS</span>",
      "<span class=\"eqt\">FK  -  54  -  PU</span><span class=\"hqt\" style=\"display:none\">FK  -  54  -  PU</span>",
      "<span class=\"eqt\">SX  -  71  -  YZ</span><span class=\"hqt\" style=\"display:none\">SX  -  71  -  YZ</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>BG  -  36  -  LQ</p><p>JO  -  70  -  TY</p><p>Here, the pattern is:</p><p>B+5= G; G+5= L; L+5= Q. Also, B+G+L+Q = 38.</p><p>J+5=O; O+5= T; T+5= Y. Also, J+O+T+Y = 70.</p><p>Option (a) MR  -  60  -  WB</p><p>M+5= R; R+5= W; W+5= B. Also, M+R+W+B = 56.</p><p>So, option (a) is incorrect.</p><p>Option (b) CI  -  42  -  NS</p><p>C+6=I; I+5= N; N+5= S. Also, C+I+N+S = 45.</p><p>So, option (b) is incorrect.</p><p>Option (c) FK  -  54  -  PU </p><p>F+5= K; K+5= P; P+5=U. Also, F+K+P+U = 54.</p><p>So, option (c) is correct.</p><p>Option (d) SX  -  71  -  YZ</p><p>S+5= X; X+1= Y; Y+1=Z. Also, S+X+Y+Z = 94.</p><p>So, option (d) is incorrect.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In the given letter-cluster pairs, the first letter-cluster is related to the second letter-cluster following a certain logic. Study the given pairs carefully, and from the given options, select the pair that follows the same logic.</p><p>KGCB : PTXY</p><p>DSJQ : WHQJ </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2346;&#2361;&#2354;&#2366; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2342;&#2367;&#2319; &#2327;&#2319; &#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;, &#2340;&#2341;&#2366; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2360;&#2350;&#2366;&#2344; &#2340;&#2352;&#2381;&#2325; &#2325;&#2366; &#2346;&#2366;&#2354;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>KGCB : PTXY</p><p>DSJQ : WHQJ </p></span>",
    "options": [
      "<span class=\"eqt\">YUFG : BVHL</span><span class=\"hqt\" style=\"display:none\">YUFG : BVHL</span>",
      "<span class=\"eqt\">MKSA : NPZH</span><span class=\"hqt\" style=\"display:none\">MKSA : NPZH</span>",
      "<span class=\"eqt\">BVSE : YWHV</span><span class=\"hqt\" style=\"display:none\">BVSE : YWHV</span>",
      "<span class=\"eqt\">EINO : VRML</span><span class=\"hqt\" style=\"display:none\">EINO : VRML</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Here, each letter is replaced by its reverse alphabet as per the English alphabetical series. </p><p>The reverse pairs are A-Z; B-Y; C-X; D-W; E-V; F-U; G-T; H-S; I-R; J-Q; K-P; L-O; M-N. </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option in which the terms are related in the same way as the terms given are related to each other.</p><p><b>FGHI : PQRS : BCDE</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2346;&#2342; &#2313;&#2360;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;, &#2332;&#2376;&#2360;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2342; &#2319;&#2325;-&#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</p><p><b>FGHI : PQRS : BCDE</b></p></span>",
    "options": [
      "<span class=\"eqt\">GHIJ : PQRS : TUVW</span><span class=\"hqt\" style=\"display:none\">GHIJ : PQRS : TUVW</span>",
      "<span class=\"eqt\">EFGH : IJKL : MNOP</span><span class=\"hqt\" style=\"display:none\">EFGH : IJKL : MNOP</span>",
      "<span class=\"eqt\">QRSU : WTXY : CDEF</span><span class=\"hqt\" style=\"display:none\">QRSU : WTXY : CDEF</span>",
      "<span class=\"eqt\">LMNO : VWXY : HIJK</span><span class=\"hqt\" style=\"display:none\">LMNO : VWXY : HIJK</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>FGHI</b> (J K L M N O) <b>PQRS</b> (T U V W X Y Z A) <b>BCDE</b></p><p>Similarly,</p><p><b>LMNO</b> (P Q R S T U) <b>VWXY</b> (Z A B C D E F G) <b>HIJK</b></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Select the related letter from the given alternatives.</p><p>BF: HX :: ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;|</p><p>BF: HX :: ?</p></span>",
    "options": [
      "<span class=\"eqt\">EO: AC</span><span class=\"hqt\" style=\"display:none\">EO: AC</span>",
      "<span class=\"eqt\">CI: DK</span><span class=\"hqt\" style=\"display:none\">CI: DK</span>",
      "<span class=\"eqt\">GT: EO</span><span class=\"hqt\" style=\"display:none\">GT: EO</span>",
      "<span class=\"eqt\">IV: DN</span><span class=\"hqt\" style=\"display:none\">IV: DN</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The position values of the alphabets are used where A=1, B=2, C=3 and so on.</p><p>B(2) F(2x3): H(8) X(3x8)</p><p>E(5) O(3x5): A(1) C(3x1)</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option in which the two numbers are related in the same way as are the numbers in the given number pair.</p><p>32 : 85</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306; &#2332;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</p><p>32 : 85</p></span>",
    "options": [
      "<span class=\"eqt\">42 : 75</span><span class=\"hqt\" style=\"display:none\">42 : 75</span>",
      "<span class=\"eqt\">28 : 91</span><span class=\"hqt\" style=\"display:none\">28 : 91</span>",
      "<span class=\"eqt\">38 : 77</span><span class=\"hqt\" style=\"display:none\">38 : 77</span>",
      "<span class=\"eqt\">24 : 77</span><span class=\"hqt\" style=\"display:none\">24 : 77</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>32 : 85 = 32 : (32 + 53 =) 85</p><p>Option a:</p><p>42 : 75 = 42 : (42 + 53 =) 95 which is not equal to 75</p><p>Option b:</p><p>28 : 91 = 28 : (28 + 53 =) 81 which is not equal to 91</p><p>Option c:</p><p>38 : 77 = 38 : (38 + 53 =) 91 which is not equal to 77</p><p>Option d:</p><p>24 : 77 = 24 : (24 + 53 =) 77 which is equal to 77</p><p>So, Option (d) is the correct answer.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option in which the pair of letter-clusters share the same relationship as that shared by the given pair of letter-clusters.</p><p>MOB : KMZ :: ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2325;&#2375; &#2351;&#2369;&#2327;&#2381;&#2350; &#2357;&#2361;&#2368; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2348;&#2306;&#2343; &#2360;&#2366;&#2333;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2351;&#2369;&#2327;&#2381;&#2350; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2366;&#2333;&#2366; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>MOB : KMZ :: ?</p></span>",
    "options": [
      "<span class=\"eqt\">AJK : YHN</span><span class=\"hqt\" style=\"display:none\">AJK : YHN</span>",
      "<span class=\"eqt\">LOP : JMN</span><span class=\"hqt\" style=\"display:none\">LOP : JMN</span>",
      "<span class=\"eqt\">BND : DLB</span><span class=\"hqt\" style=\"display:none\">BND : DLB</span>",
      "<span class=\"eqt\">STB : PRZ</span><span class=\"hqt\" style=\"display:none\">STB : PRZ</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>MOB:KMZ</p><p>M  -  2 = K</p><p>O  -  2 = M</p><p>B  -  2 = Z</p><p>Option 1:</p><p>AJK : YHN</p><p>A  -  2 = Y</p><p>J  -  2 = H</p><p>K + 3 = N</p><p>So, AJK : YHN is not same as the given pair of letter-clusters.</p><p>Option 2:</p><p>LOP : JMN</p><p>L  -  2 = J</p><p>O  -  2 = M</p><p>P  -  2 = N</p><p>So, LOP : JMN is same as the given pair of letter-clusters.</p><p>Option 3:</p><p>BND : DLB</p><p>B + 2 = D</p><p>N - 2 = L</p><p>D - 2 = B</p><p>So, BND : DLB is not same as the given pair of letter-clusters.</p><p>Option 4:</p><p>STB : PRZ</p><p>S - 3 = P</p><p>T - 2 = R</p><p>B - 2 = Z</p><p>So, STB : PRZ is not same as the given pair of letter-clusters.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option in which the terms are related in the same way as the terms given are related to each other.</p><p><b>DCU : SAB : TBC</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2358;&#2348;&#2381;&#2342; &#2313;&#2360;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306; &#2332;&#2376;&#2360;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2358;&#2348;&#2381;&#2342; &#2319;&#2325;-&#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</p><p><b>DCU : SAB : TBC</b></p></span>",
    "options": [
      "<span class=\"eqt\">FKV : TID : UJE</span><span class=\"hqt\" style=\"display:none\">FKV : TID : UJE</span>",
      "<span class=\"eqt\">FWI : GXJ : HYK</span><span class=\"hqt\" style=\"display:none\">FWI : GXJ : HYK</span>",
      "<span class=\"eqt\">HIO : GHN : IJP</span><span class=\"hqt\" style=\"display:none\">HIO : GHN : IJP</span>",
      "<span class=\"eqt\">MQZ : JRW : KSX</span><span class=\"hqt\" style=\"display:none\">MQZ : JRW : KSX</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>DCU to SAB, letters are replaced by letters at a gap of one letter and the word is reversed. SAB to TBC, letters are replaced by immediate next letters in the alphabetical order.</p><p>Similarly, FKV to TID, letters are replaced by letters at a gap of one letter and the word is reversed. TID to UJE, letters are replaced by immediate next letters in the alphabetical order.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Select the set of numbers that is <b>not similar</b> to the following set of numbers.</p><p>(32, 5, 7)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2313;&#2360; &#2360;&#2350;&#2370;&#2361; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p>(32, 5, 7)</p></span>",
    "options": [
      "<span class=\"eqt\">(16, 9, 7)</span><span class=\"hqt\" style=\"display:none\">(16, 9, 7)</span>",
      "<span class=\"eqt\">(45, 6, 9)</span><span class=\"hqt\" style=\"display:none\">(45, 6, 9)</span>",
      "<span class=\"eqt\">(28, 4, 12)</span><span class=\"hqt\" style=\"display:none\">(28, 4, 12)</span>",
      "<span class=\"eqt\">(52, 7, 3)</span><span class=\"hqt\" style=\"display:none\">(52, 7, 3)</span>"
