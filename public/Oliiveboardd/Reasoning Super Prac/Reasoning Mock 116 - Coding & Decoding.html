<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Study the following information carefully and answer the question given below:</p><p>In a certain code language:</p><p>&#183; 'all systems go now' is written as 'sy go nw al'</p><p>&#183; 'check all launch parameters' is written as 'al la pa ch'</p><p>&#183; 'launch systems online' is written as 'la sy on'</p><p>&#183; 'go for online check' is written as 'go fr on ch'</p><p><b>What is the code for 'systems launch now' in the given code language?</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;:</p><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;:</p><p>&#183; 'all systems go now' &#2325;&#2379; 'sy go nw al' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>&#183; 'check all launch parameters' &#2325;&#2379; 'al la pa ch' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>&#183; 'launch systems online' &#2325;&#2379; 'la sy on' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>&#183; 'go for online check' &#2325;&#2379; 'go fr on ch' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p><b>&#2342;&#2368; &#2327;&#2312; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'systems launch now' &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2379;&#2337; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</b></p></span>",
    "options": [
      "<span class=\"eqt\">go on nw</span><span class=\"hqt\" style=\"display:none\">go on nw</span>",
      "<span class=\"eqt\">sy la ch</span><span class=\"hqt\" style=\"display:none\">sy la ch</span>",
      "<span class=\"eqt\">sy la nw</span><span class=\"hqt\" style=\"display:none\">sy la nw</span>",
      "<span class=\"eqt\">al pa fr</span><span class=\"hqt\" style=\"display:none\">al pa fr</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>1) From statements 1 and 3, 'systems' is common, and the common code is 'sy'. So, <b>systems = sy</b>.</p><p>2) From statements 2 and 3, 'launch' is common, and the common code is 'la'. So, <b>launch = la</b>.</p><p>3) From statements 1, 3, and 4, we can deduce codes for other words: all=al, go=go, check=ch, online=on.</p><p>4) In statement 1, the only remaining word is 'now' and the only remaining code is 'nw'. So, <b>now = nw</b>.</p><p>Therefore, the code for 'systems launch now' is a combination of the codes for each word: <b>sy la nw</b>.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Study the following information carefully and answer the question given below:</p><p>In a certain code language:</p><p>&#183; 'save money for future' is written as 'sa mo fo fu'</p><p>&#183; 'invest plan money wisely' is written as 'in pl mo wi'</p><p>&#183; 'future plan for growth' is written as 'fu pl fo gr'</p><p>&#183; 'save for wisely growth' is written as 'sa fo wi gr'</p><p><b>What is the code for 'invest future plan' in the given code language?</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;:</p><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;:</p><p>&#183; 'save money for future' &#2325;&#2379; 'sa mo fo fu' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>&#183; 'invest plan money wisely' &#2325;&#2379; 'in pl mo wi' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>&#183; 'future plan for growth' &#2325;&#2379; 'fu pl fo gr' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>&#183; 'save for wisely growth' &#2325;&#2379; 'sa fo wi gr' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p><b>&#2342;&#2368; &#2327;&#2351;&#2368; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'invest future plan' &#2325;&#2366; &#2325;&#2379;&#2337; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</b></p></span>",
    "options": [
      "<span class=\"eqt\">mo sa gr</span><span class=\"hqt\" style=\"display:none\">mo sa gr</span>",
      "<span class=\"eqt\">in fu pl</span><span class=\"hqt\" style=\"display:none\">in fu pl</span>",
      "<span class=\"eqt\">wi fo fu</span><span class=\"hqt\" style=\"display:none\">wi fo fu</span>",
      "<span class=\"eqt\">in pl sa</span><span class=\"hqt\" style=\"display:none\">in pl sa</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>1) From statements 1 and 2, 'money' is common, and the code is 'mo'. So, <b>money = mo</b>.</p><p>2) From statements 1 and 3, 'for' and 'future' are common, with codes 'fo' and 'fu'.</p><p>3) From statements 1 and 4, 'save' and 'for' are common, with codes 'sa' and 'fo'. This confirms <b>for = fo</b> and <b>save = sa</b>. Therefore, from step 2, <b>future = fu</b>.</p><p>4) From statements 2 and 3, 'plan' is common, and the code is 'pl'. So, <b>plan = pl</b>.</p><p>5) From statements 2 and 4, 'wisely' is common, and the code is 'wi'.</p><p>6) In statement 2, the only remaining word is 'invest' and the code is 'in'. So, <b>invest = in</b>.</p><p>Therefore, the code for 'invest future plan' is <b>in fu pl</b>.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code BRIDGE is coded as 879425, RIDGE &rarr; 79425, and GRIDE &rarr; 27945. How will 'GIRDER' be coded in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2350;&#2375;&#2306; BRIDGE &#2325;&#2379; 879425, RIDGE &rarr; 79425, &#2324;&#2352; GRIDE &rarr; 27945 &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'GIRDER' &#2325;&#2379; &#2325;&#2376;&#2360;&#2375; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">297457</span><span class=\"hqt\" style=\"display:none\">297457</span>",
      "<span class=\"eqt\">279457</span><span class=\"hqt\" style=\"display:none\">279457</span>",
      "<span class=\"eqt\">297547</span><span class=\"hqt\" style=\"display:none\">297547</span>",
      "<span class=\"eqt\">927457</span><span class=\"hqt\" style=\"display:none\">927457</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Here, the codes are:</p><p>BRIDGE=8 7 9 4 2 5</p><p>RIDGE=7 9 4 2 5</p><p>GRIDE=2 7 9 4 5</p><p>B=8, R=7, I=9, D=4, G=2, E=5</p><p>So, the code of GIRDER &rarr; G(2) I(9) R(7) D(4) E(5) R(7) = 297457</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'RAP' is coded as 'r 4 @', 'RAD' is coded as 'r 4 1' and 'RAM' is coded as 'r 4 x'. What is the code for 'P' in the given code language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'RAP' &#2325;&#2379; 'r 4 @' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, 'RAD' &#2325;&#2379; 'r 4 1' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'RAM' &#2325;&#2379; 'r 4 x' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2368; &#2327;&#2312; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'P' &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2379;&#2337; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">r</span><span class=\"hqt\" style=\"display:none\">r</span>",
      "<span class=\"eqt\">@</span><span class=\"hqt\" style=\"display:none\">@</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">x</span><span class=\"hqt\" style=\"display:none\">x</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>'RAP' is coded as 'r 4 @'</p><p>'RAD' is coded as 'r 4 1'</p><p>'RAM' is coded as 'r 4 x'</p><p>The code for 'RA' = r 4</p><p>Thus, the code for 'P' = <b>@</b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'prepare study table' is written as 'cde opq stu' and 'follow time table' is written as 'stu mno jkl' and 'do study on time' is written as 'ghi vwx cde mno'. How can 'do follow time' be written in the given language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'prepare study table' &#2325;&#2379; 'cde opq stu' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'follow time table' &#2325;&#2379; 'stu mno jkl' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'do study on time' &#2325;&#2379; 'ghi vwx cde mno' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2368; &#2327;&#2312; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'do follow time' &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">ghi jkl mno</span><span class=\"hqt\" style=\"display:none\">ghi jkl mno</span>",
      "<span class=\"eqt\">stu cde vwx</span><span class=\"hqt\" style=\"display:none\">stu cde vwx</span>",
      "<span class=\"eqt\">vwx jkl opq</span><span class=\"hqt\" style=\"display:none\">vwx jkl opq</span>",
      "<span class=\"eqt\">stu ghi vwx</span><span class=\"hqt\" style=\"display:none\">stu ghi vwx</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>It is given that, </p><p>'prepare study table' is written as 'cde opq stu' ------(I)</p><p>'follow time table' is written as 'stu mno jkl' ------(II)</p><p>'do study on time' is written as 'ghi vwx cde mno'------(III)</p><p>From I and III, 'study' is coded as cde.</p><p>From I and II, 'table' is coded as stu.</p><p>So, 'prepare' is coded as opq.</p><p>From II and III, 'time' is coded as mno.</p><p>So, 'follow' is coded as jkl.</p><p>So, from III, 'do/on' is coded as ghi/vwx (in any order)</p><p>Therefore, 'do follow time' is written as 'ghi jkl mno' or 'vwx jkl mno' (in any order). </p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Study the following information carefully and answer the question given below:</p><p>In a certain code language:</p><p>&#183; 'fast network process data' is written as 'n5 d1 p9 f2'</p><p>&#183; 'secure data cloud access' is written as 'c7 s4 d1 a3'</p><p>&#183; 'fast system process secure' is written as 'f2 s4 p9 y6'</p><p>&#183; 'secure cloud network' is written as 's4 c7 n5'</p><p><b>What is the code for 'process cloud data' in the given code language?</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;:</p><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;:</p><p>&#183; 'fast network process data' &#2325;&#2379; 'n5 d1 p9 f2' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>&#183; 'secure data cloud access' &#2325;&#2379; 'c7 s4 d1 a3' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>&#183; 'fast system process secure' &#2325;&#2379; 'f2 s4 p9 y6' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>&#183; 'secure cloud network' &#2325;&#2379; 's4 c7 n5' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p><b>&#2342;&#2368; &#2327;&#2312; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'process cloud data' &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2379;&#2337; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</b></p></span>",
    "options": [
      "<span class=\"eqt\">y6 a3 n5</span><span class=\"hqt\" style=\"display:none\">y6 a3 n5</span>",
