    "solution": "<p>First number + Product of individual digits of first number = second number</p><p>Second number + Product of individual digits of second number = third number</p><p>16 + (6 x 1) = 22 ; 22 + (2 x 2) = 26</p><p>Similarly</p><p>38 + (3 x 8) = 62 ; 62 + (6 x 2) = 74</p><p>Hence the correct answer is '(38, 62, 74)'.</p>",

  {

    "solution": "<p>Here, the pattern is:</p><p>(13, 31, 49): 13+18= 31; 31+18= 49.</p><p>(75, 93, 111): 75+18= 93; 93+18=111.</p><p>Option (a) (12, 26, 39): 12+14=26; 26+13=39. So, option (a) is incorrect.</p><p>Option (b) (18, 36, 57):18+18=36; 36+21=57. So, option (b) is incorrect.</p><p>Option (c) (40, 58, 64): 40+18=58; 58+6=64. So, option (c) is incorrect.</p><p>Option (d) (56, 74, 92): 56+18= 74; 74+18=92. So, option (d) is correct.</p>",
