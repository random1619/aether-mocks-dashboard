    "question": "<span class=\"eqt\"><p>Among seven buildings B, O, P, S, T, X and W:</p><p>(i) W is two and half times as tall as X and O is three-fourth as tall as W.</p><p>(ii) T and X together are as tall as W.</p><p>(iii)P is taller than O</p><p>(iv) S is half as tall as X and B and S together are as tall as P.</p><p>(v) X and S together are taller than B.</p><p>If the buildings are arranged in descending order of their heights from left to right, then which building will be fourth from the right end?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2340; &#2349;&#2357;&#2344;&#2379;&#2306; B, O, P, S, T, X &#2324;&#2352; W &#2350;&#2375;&#2306; &#2360;&#2375;:</p><p>(i) W, X &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2338;&#2366;&#2312; &#2327;&#2369;&#2344;&#2366; &#2354;&#2350;&#2381;&#2348;&#2366; &#2361;&#2376; &#2324;&#2352; O, W &#2360;&#2375; &#2340;&#2368;&#2344;-&#2330;&#2380;&#2341;&#2366;&#2312; &#2354;&#2350;&#2381;&#2348;&#2366; &#2361;&#2376;&#2404;</p><p>(ii) &#2319;&#2325; &#2360;&#2366;&#2341; T &#2324;&#2352; X, W &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2354;&#2350;&#2381;&#2348;&#2375; &#2361;&#2376;&#2306;</p><p>(iii) P, O &#2360;&#2375; &#2354;&#2350;&#2381;&#2348;&#2366; &#2361;&#2376;</p><p>(iv) S, X &#2360;&#2375; &#2310;&#2343;&#2366; &#2354;&#2350;&#2381;&#2348;&#2366; &#2361;&#2376; &#2324;&#2352; &#2319;&#2325; &#2360;&#2366;&#2341; B &#2340;&#2341;&#2366; S, P &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2354;&#2350;&#2381;&#2348;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>(v) &#2319;&#2325; &#2360;&#2366;&#2341; X &#2324;&#2352; S, B &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2354;&#2350;&#2381;&#2348;&#2375; &#2361;&#2376;&#2306;</p><p>&#2351;&#2342;&#2367; &#2349;&#2357;&#2344;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2309;&#2357;&#2352;&#2379;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2366;&#2319;&#2305; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2349;&#2357;&#2344; &#2342;&#2366;&#2319;&#2305; &#2331;&#2379;&#2352; &#2360;&#2375; &#2330;&#2380;&#2341;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",

      "<span class=\"eqt\">B</span><span class=\"hqt\" style=\"display:none\">B</span>",
      "<span class=\"eqt\">T</span><span class=\"hqt\" style=\"display:none\">T</span>",

    "correct_option_id": 2,
    "solution": "<p>W is two and half times as tall as X and O is three-fourth as tall as W.</p><p><b>W = 2.5X</b>, <b>O = 3W/4 = 0.75W</b> .. (i)</p><p>T and X together are as tall as W.</p><p>T + X = W .. (ii)</p><p>S is half as tall as X and B and S together are as tall as P.</p><p>S = X/2, B + S = P .. (iii)</p><p>X and S together are taller than B.</p><p>X + S &gt; B .. (iv)</p><p>From (i) and (ii),</p><p>T = 2.5X  -  X = 1.5X</p><p>So, <b>T = 0.6W</b></p><p>From (iii),</p><p><b>S = X/2 = 0.2W</b></p><p>From (iv),</p><p>X + S = X + X/2 = 3X/2 = <b>0.6W &gt; B</b>, i.e., <b>T &gt; B</b></p><p>Also, from (iii),</p><p>B + S = P</p><p>B + 0.2W = P</p><p>As B &lt; 0.6W, so 0.6W + 0.2W &gt;P</p><p>0.8W &gt; P,and P is taller than O,so P &gt; O</p><p>Hence, we get: W &gt;P&gt; O &gt; T &gt; X &gt; S</p><p>and as B &lt; 0.6W, so B &lt; T</p><p>O < P = B + S</p><p>3W/4 < B + X/2</p><p>3/4 * 2.5X < B + 0.5X</p><p>B > 1.375X</p><p>Hence,</p><p>W&gt; P &gt; O &gt; T &gt; B &gt; X &gt; S</p><p>So, in any case, in ascending order of their heights, T will be fourth from the bottom.</p>",
    "question_index": 4
  },

 &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; A &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2368; &#2323;&#2352; &#2350;&#2369;&#2326;&#2352;&#2367;&#2340; &#2361;&#2376;&#2404; M &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404; A, R &#2325;&#2366; &#2344;&#2367;&#2325;&#2335;&#2360;&#2381;&#2341; &#2346;&#2337;&#2379;&#2360;&#2368; &#2361;&#2376;&#2404; H, U &#2325;&#2375; &#2336;&#2368;&#2325; &#2342;&#2366;&#2319;&#2305; &#2323;&#2352; &#2348;&#2376;&#2336;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2368; &#2323;&#2352; &#2350;&#2369;&#2326;&#2352;&#2367;&#2340; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2352;&#2361;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">P, R and U</span><span class=\"hqt\" style=\"display:none\">P, R &#2324;&#2352; U</span>",

    "question": "<span class=\"eqt\"><p>Eight women Bhawna, Divya, Ekta, Hima, Riya, Shakti, Tara and Viki are sitting on a bench facing south. Each of them is holding a card that has a number written on it among 30, 25, 24, 18, 13, 11, 9 and 7 but not necessarily in the same order.</p><p>Hima is sitting at the corner and two persons are sitting in between Hima and the one who has the card numbered 25. The card number of Riya is 1 less than that of Viki and Riya is sitting third to the right of Viki. Ekta is sitting to the immediate right of the one whose card number is 25. Three persons are sitting in between Ekta and the one who has the card numbered 13. Shakti has the card numbered 18. Divya, who is sitting second to the right of Shakti, has the card whose number is 7 less than Shakti's card. Viki is sitting to the immediate left of the one whose card is numbered 7. Bhawna is sitting second to the left of Viki. Bhawna does not have the card numbered 9.</p><p>Who is sitting third to the right of Tara?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2336; &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2305; &#2349;&#2366;&#2357;&#2344;&#2366;, &#2342;&#2367;&#2357;&#2381;&#2351;&#2366;, &#2319;&#2325;&#2340;&#2366;, &#2361;&#2367;&#2350;&#2366;, &#2352;&#2367;&#2351;&#2366;, &#2358;&#2325;&#2381;&#2340;&#2367;, &#2340;&#2366;&#2352;&#2366; &#2324;&#2352; &#2357;&#2367;&#2325;&#2368; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2325;&#2368; &#2323;&#2352; &#2350;&#2369;&#2326;&#2352;&#2367;&#2340; &#2361;&#2379;&#2325;&#2352; &#2319;&#2325; &#2348;&#2375;&#2306;&#2330; &#2346;&#2352; &#2348;&#2376;&#2336;&#2368; &#2361;&#2376;&#2306;&#2404; &#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2375; &#2346;&#2366;&#2360; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2337; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2352; 30, 25, 24, 18, 13, 11, 9 &#2324;&#2352; 7 &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2354;&#2367;&#2326;&#2368; &#2361;&#2369;&#2312; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367; &#2360;&#2350;&#2366;&#2344; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2361;&#2379;&#2404;</p><p>&#2361;&#2367;&#2350;&#2366; &#2319;&#2325; &#2325;&#2379;&#2344;&#2375; &#2346;&#2352; &#2348;&#2376;&#2336;&#2368; &#2361;&#2376; &#2340;&#2341;&#2366; &#2361;&#2367;&#2350;&#2366; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2337; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 25 &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2342;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; &#2352;&#2367;&#2351;&#2366; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2337; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2357;&#2367;&#2325;&#2368; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2337; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 1 &#2325;&#2350; &#2361;&#2376; &#2324;&#2352; &#2352;&#2367;&#2351;&#2366;, &#2357;&#2367;&#2325;&#2368; &#2325;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2360;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2368; &#2361;&#2376;&#2404; &#2319;&#2325;&#2340;&#2366;, &#2325;&#2366;&#2352;&#2381;&#2337; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 25 &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2344;&#2367;&#2325;&#2335;&#2360;&#2381;&#2341; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2376;&#2336;&#2368; &#2361;&#2376;&#2404; &#2319;&#2325;&#2340;&#2366; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2337; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 13 &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2337; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 18 &#2361;&#2376;&#2404; &#2342;&#2367;&#2357;&#2381;&#2351;&#2366;, &#2332;&#2379; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2368; &#2361;&#2376;, &#2313;&#2360;&#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2337; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2337; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 7 &#2325;&#2350; &#2361;&#2376;&#2404; &#2357;&#2367;&#2325;&#2368;, &#2325;&#2366;&#2352;&#2381;&#2337; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 7 &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2344;&#2367;&#2325;&#2335;&#2360;&#2381;&#2341; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2376;&#2336;&#2368; &#2361;&#2376;&#2404; &#2349;&#2366;&#2357;&#2344;&#2366;, &#2357;&#2367;&#2325;&#2368; &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2368; &#2361;&#2376; &#2404; &#2349;&#2366;&#2357;&#2344;&#2366; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2337; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 9 &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p>&#2340;&#2366;&#2352;&#2366; &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2360;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2325;&#2380;&#2344; &#2348;&#2376;&#2336;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Shakti</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2325;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Hima</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Ekta</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Riya</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2351;&#2366;</span>"

    "correct_option_id": 0,
    "solution": "<p>Let us denote the persons by the first letter of their names (in the figures).</p><p>Hima is sitting at the corner and two persons are sitting in between Hima and the one who has the card numbered 25. </p><p><img width=355 height=284 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16897/image002.jpg\"></p><p>Ekta is sitting to the immediate right of the one whose card number is 25. Three persons are sitting in between Ekta and the one who has the card numbered 13. </p><p><img width=355 height=277 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16897/image003.jpg\"></p><p>The card number of Riya is 1 less than that of Viki and Riya is sitting third to the right of Viki. The card numbers are 30, 25, 24, 18, 13, 11, 9 and 7. So, the only consecutive numbers are 24 and 25. Hence, Riya = 24, Viki = 25. Also, case 2 becomes invalid.</p><p><img width=330 height=118 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16897/image004.jpg\"></p><p>Shakti has the card numbered 18. Divya, who is sitting second to the right of Shakti, has the card whose number is 7 less than Shakti's card, i.e., 11.</p><p><img width=347 height=119 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16897/image005.jpg\"></p><p>Viki is sitting to the immediate left of the one whose card is numbered 7. Bhawna is sitting second to the left of Viki. </p><p><img width=342 height=125 id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16897/image006.jpg\"></p><p>Bhawna does not have the card numbered 9. So, Tara must have 9 and Bhawna has 30.</p><p><img width=347 height=117 id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16897/image007.jpg\"></p><p>Shakti is sitting third to the right of Tara.</p>",
    "question_index": 19
  }
