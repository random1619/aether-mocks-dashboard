<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Three of the following four terms are alike in some way while one is different. Choose the odd one out.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2330;&#2366;&#2352; &#2346;&#2342;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2340;&#2368;&#2344; &#2325;&#2367;&#2360;&#2368; &#2344; &#2325;&#2367;&#2360;&#2368; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2319;&#2325; &#2332;&#2376;&#2360;&#2375; &#2361;&#2376;&#2306; &#2332;&#2348;&#2325;&#2367; &#2319;&#2325; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2376;&#2404; &#2309;&#2360;&#2306;&#2327;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">746</span><span class=\"hqt\" style=\"display:none\">746</span>",
      "<span class=\"eqt\">908</span><span class=\"hqt\" style=\"display:none\">908</span>",
      "<span class=\"eqt\">566</span><span class=\"hqt\" style=\"display:none\">566</span>",
      "<span class=\"eqt\">474</span><span class=\"hqt\" style=\"display:none\">474</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>7 + 4 + 6 = 9 + 0 + 8 = 5 + 6 + 6 = 17 but 4 + 7 + 4 = 15</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In the following question, select the odd letters from the given alternatives.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2357;&#2367;&#2359;&#2350; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">URMF</span><span class=\"hqt\" style=\"display:none\">URMF</span>",
      "<span class=\"eqt\">YUND</span><span class=\"hqt\" style=\"display:none\">YUND</span>",
      "<span class=\"eqt\">VQHA</span><span class=\"hqt\" style=\"display:none\">VQHA</span>",
      "<span class=\"eqt\">MKHD</span><span class=\"hqt\" style=\"display:none\">MKHD</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The number of letters (taken in alphabetical series written in Z to A i.e. reverse order) between subsequent letters starting from left to right letter in any option, are consecutive multiples of any number.</p><p>Option (a): <b>F </b><u>G H I J K L</u><b> M </b><u>N O P Q</u><b> R </b><u>S T</u><b> U</b> (for URMF, between U and R, there are 2 letters, then between R and M, there are 4, and between M and F, there are 6)</p><p>Option (b):<b> D</b> <u>E F G H I J K L M</u> <b>N</b> <u>O P Q R S T</u> <b>U</b> <u>V W X</u> <b>Y</b> (for YUND, between Y and U, there are 3 letters, then between U and N, there are 6, and between N and D, there are 9)</p><p>Option (d): <b>D</b> <u>E F G</u> <b>H</b> <u>I J</u> <b>K</b> <u>L</u> <b>M</b> (for MKHD, between M and K, there is 1 letter, then between K and H, there are 2, and between H and D, there are 3)</p><p>In option (c): this doesn't follow hence, odd. Between V and Q, it is 4 letters, between Q and H it is 8 letters, so it should be 12 letters between H and last letter, which shouldn't be A)</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In the following question, four number pairs are given, out of which three pairs are alike in some manner. Select the option which shows the odd pair. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2330;&#2366;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2340;&#2368;&#2344; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2367;&#2360;&#2368; &#2344; &#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2375; &#2319;&#2325; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306;&#2404; &#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2309;&#2360;&#2306;&#2327;&#2340; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">7, 19</span><span class=\"hqt\" style=\"display:none\">7, 19</span>",
      "<span class=\"eqt\">14, 174</span><span class=\"hqt\" style=\"display:none\">14, 174</span>",
      "<span class=\"eqt\">13, 139</span><span class=\"hqt\" style=\"display:none\">13, 139</span>",
      "<span class=\"eqt\">10, 70</span><span class=\"hqt\" style=\"display:none\">10, 70</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, option <b>(b)</b> is odd.</p><p>a) 7x7 - 30 = 19</p><p><b>b) 14 x 14 - 30 = 166, not 174 (that is given)</b></p><p>c) 13x13 - 30 = 139</p><p>d) 10 x 10 - 30 = 70</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In the following question, four number pairs are given, out of which three pairs are alike in some manner. Select the option which shows the odd pair. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2330;&#2366;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2340;&#2368;&#2344; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2367;&#2360;&#2368; &#2344; &#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2375; &#2319;&#2325; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306;&#2404; &#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2309;&#2360;&#2306;&#2327;&#2340; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">29, 69</span><span class=\"hqt\" style=\"display:none\">29, 69</span>",
      "<span class=\"eqt\">46, 93</span><span class=\"hqt\" style=\"display:none\">46, 93</span>",
      "<span class=\"eqt\">37, 75</span><span class=\"hqt\" style=\"display:none\">37, 75</span>",
      "<span class=\"eqt\">39, 79</span><span class=\"hqt\" style=\"display:none\">39, 79</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Here, option <b>(a) </b>is odd.</p><p>(a) 29 + (29 + 1) = 29 + 30 = 59</p><p>(b) 46 + (46 + 1) = 46 + 47 = 93</p><p>(c) 37 + (37 + 1) = 37 + 38 = 75</p><p>(d) 39 + (39 + 1) = 39 + 40 = 79</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In the given question, three letter clusters are alike in some manner. Spot the odd one out. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2309;&#2325;&#2381;&#2359;&#2352; &#2360;&#2350;&#2370;&#2361; &#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2375; &#2319;&#2325; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306;&#2404; &#2309;&#2360;&#2306;&#2327;&#2340; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">YTQO</span><span class=\"hqt\" style=\"display:none\">YTQO</span>",
      "<span class=\"eqt\">VQNL</span><span class=\"hqt\" style=\"display:none\">VQNL</span>",
      "<span class=\"eqt\">XTPN</span><span class=\"hqt\" style=\"display:none\">XTPN</span>",
      "<span class=\"eqt\">WROM</span><span class=\"hqt\" style=\"display:none\">WROM</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Here, option <b>(c)</b> is odd. </p><p>a) YTQO == Y (XWVU) T (SR) Q (P) O</p><p>b) VQNL == V (UTSR) Q (PO) N (M) L</p><p>c) WSPN == <b>X (WVU) T (SRQ) P (O) N</b></p><p>d) WROM == W (VUTS) R (QP) O (N) M </p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Three of the following four number pairs are alike in a certain way and one is different. Pick the odd one out.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2330;&#2366;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2340;&#2368;&#2344; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2352;&#2368;&#2325;&#2375; &#2360;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306; &#2324;&#2352; &#2319;&#2325; &#2309;&#2354;&#2327; &#2361;&#2376;&#2404; &#2309;&#2360;&#2306;&#2327;&#2340; &#2325;&#2379; &#2330;&#2369;&#2344;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">7 : 158</span><span class=\"hqt\" style=\"display:none\">7 : 158</span>",
      "<span class=\"eqt\">12 : 468</span><span class=\"hqt\" style=\"display:none\">12 : 468</span>",
      "<span class=\"eqt\">16 : 816</span><span class=\"hqt\" style=\"display:none\">16 : 816</span>",
      "<span class=\"eqt\">8 : 216</span><span class=\"hqt\" style=\"display:none\">8 : 216</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>7 x 8 = 56; 56 x 3 = 168</p><p>12 x 13 = 156; 156 x 3 = 468</p><p>16 x 17 = 272; 272 x 3 = 816</p><p>8 x 9 = 72; 72 x 3 = 216</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Four number pairs have been given out of which three are alike in some manner and one is different. Select the number pair that is different. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2366;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2340;&#2368;&#2344; &#2325;&#2367;&#2360;&#2368; &#2344; &#2325;&#2367;&#2360;&#2368; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306; &#2324;&#2352; &#2319;&#2325; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2376;&#2404; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">12 : 84</span><span class=\"hqt\" style=\"display:none\">12 : 84</span>",
      "<span class=\"eqt\">8 : 40</span><span class=\"hqt\" style=\"display:none\">8 : 40</span>",
      "<span class=\"eqt\">10 : 60</span><span class=\"hqt\" style=\"display:none\">10 : 60</span>",

    "correct_option_id": 3,
    "solution": "<p>12<sup>2</sup> = 144, 144/2 = 72; 72 + 12 = 84</p><p>8<sup>2</sup> = 64, 64/2 = 32; 32 + 8 = 40</p><p>10<sup>2</sup> = 100, 100/2 = 50, 50 + 10 = 60</p><p>6<sup>2</sup> = 36, 36/2 = 18, 18 + 6 = 24</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>In the given question, three-letter clusters are alike in some manner. Spot the odd one out. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2309;&#2325;&#2381;&#2359;&#2352; &#2360;&#2350;&#2370;&#2361; &#2325;&#2367;&#2360;&#2368; &#2344; &#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2375; &#2319;&#2325; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306;&#2404; &#2309;&#2360;&#2306;&#2327;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">JV</span><span class=\"hqt\" style=\"display:none\">JV</span>",

    "correct_option_id": 0,
    "solution": "<p>Here, option <b>(a)</b> is odd. </p><p>a) JV -- <b>J (KLMNOPQRSTU) V</b></p><p>b) AK -- A (BCDEFGHIJ) K </p><p>c) FP -- F (GHIJKLMNO) P</p><p>d) DN -- D (EFGHIJKLM) N</p>",
    "question_index": 7

  {
    "question": "<span class=\"eqt\"><p>Four letter pairs have been given, out of which three are alike in some manner and one is different. Select the different letter pair.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2366;&#2352; &#2309;&#2325;&#2381;&#2359;&#2352; &#2351;&#2369;&#2327;&#2381;&#2350; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2340;&#2368;&#2344; &#2325;&#2367;&#2360;&#2368; &#2344; &#2325;&#2367;&#2360;&#2368; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306; &#2324;&#2352; &#2319;&#2325; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2376;&#2404; &#2349;&#2367;&#2344;&#2381;&#2344; &#2309;&#2325;&#2381;&#2359;&#2352; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">PS</span><span class=\"hqt\" style=\"display:none\">PS</span>",

  {
