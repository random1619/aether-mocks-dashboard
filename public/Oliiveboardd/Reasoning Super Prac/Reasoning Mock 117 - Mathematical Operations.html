<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If &div; is interchanged with + and x is interchanged with  - , then which of the following expression is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &div; &#2325;&#2379; + &#2360;&#2375; &#2340;&#2341;&#2366; x &#2325;&#2379; - &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">15  -  45 + 9 &div; 18 x 3 = 60</span><span class=\"hqt\" style=\"display:none\">15  -  45 + 9 &div; 18 x 3 = 60</span>",
      "<span class=\"eqt\">22 x 11 &div; 2 + 13  -  4 = 173</span><span class=\"hqt\" style=\"display:none\">22 x 11 &div; 2 + 13  -  4 = 173</span>",
      "<span class=\"eqt\">73 &div; 89 x 54 + 6 - 12 = 54</span><span class=\"hqt\" style=\"display:none\">73 &div; 89 x 54 + 6 - 12 = 54</span>",
      "<span class=\"eqt\">42 + 19  -  26 &div; 2 x 4 = 29</span><span class=\"hqt\" style=\"display:none\">42 + 19  -  26 &div; 2 x 4 = 29</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>If &div; is interchanged with + and x is interchanged with  - , then the equations will be:</p><p>Option (a) 15 x 45 &div; 9 + 18  -  3 = 60</p><p>= 75 + 18  -  3 </p><p>= 93  -  3</p><p>= 90. So, option (a) is incorrect. </p><p>Option (b) 22  -  11 + 2 &div; 13 x 4 = 173</p><p>= 22  -  11 + 0.615</p><p>= 22.615  -  11</p><p>= 11.615</p><p>So, option (b) is incorrect.</p><p>Option (c) 73 + 89  -  54 &div; 6 x 12 = 54</p><p>= 73 + 89  -  108</p><p>= 162  -  108</p><p>= 54. So, option (c) is correct.</p><p>Option (d) 42 &div; 19 x 26 + 2  -  4 = 29</p><p>= 57.47 + 2  -  4 </p><p>= 59.47  -  4</p><p>= 55.47</p><p>So, option (d) is incorrect.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If A denotes '+', B denotes 'x', C denotes '&div;', D denotes '=' and E denotes ' - ', then which of the following equations will be correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '+' &#2361;&#2376;, B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'x' &#2361;&#2376;, C &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&div;' &#2361;&#2376;, D &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '=' &#2361;&#2376; &#2324;&#2352; E &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '-' &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">69 E 23 B 12 D 18 C 3 A 45</span><span class=\"hqt\" style=\"display:none\">69 E 23 B 12 D 18 C 3 A 45</span>",
      "<span class=\"eqt\">69 A 23 E 12 D 18 B 3 C 45</span><span class=\"hqt\" style=\"display:none\">69 A 23 E 12 D 18 B 3 C 45</span>",
      "<span class=\"eqt\">69 C 23 E 12 A 18 B 3 D 45</span><span class=\"hqt\" style=\"display:none\">69 C 23 E 12 A 18 B 3 D 45</span>",
      "<span class=\"eqt\">69 C 23 B 12 A 18 E 3 D 45</span><span class=\"hqt\" style=\"display:none\">69 C 23 B 12 A 18 E 3 D 45</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>If A denotes '+', B denotes 'x', C denotes '&div;', D denotes '=' and E denotes ' - ', then the equations will be: </p><p><b>Option (a)</b> 69  -  23 x 12 = 18 &div; 3 + 45</p><p>So, 69  -  276 = 6 + 45</p><p>So, 69  -  276 = 51</p><p>So, -207 &#8800; 51</p><p>So, the equation is incorrect. </p><p><b>Option (b)</b> 69 + 23  -  12 = 18 x 3 &div; 45</p><p>So, 69 + 23  -  12 = 1.2</p><p>So, 69 + 23  -  12 = 1.2</p><p>So, 92  -  12 = 1.2</p><p>So, 80 &#8800; 1.2</p><p>So, the equation is incorrect. </p><p><b>Option (c)</b> 69 &div; 23  -  12 + 18 x 3 = 45</p><p>So, 3  -  12 + 18 x 3 = 45</p><p>So, 3  -  12 + 54 = 45</p><p>So, 57  -  12 = 45</p><p>So, 45 = 45</p><p>So, the equation is correct. </p><p><b>Option (d)</b> 69 &div; 23 x 12 + 18  -  3 = 45</p><p>So, 3 x 12 + 18  -  3 = 45</p><p>So, 36 + 18  -  3 = 45</p><p>So, 54  -  3 = 45</p><p>So, 51 &#8800; 45</p><p>So, the equation is incorrect. </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Select the correct combination of mathematical signs to sequentially replace the * signs and balance the given equation.</p><p>150 * 75 * 25 * 5 * 100 = 65</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; * &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>150 * 75 * 25 * 5 * 100 = 65</p></span>",
    "options": [
      "<span class=\"eqt\">- , +,  X , &div;</span><span class=\"hqt\" style=\"display:none\">- , +,  X , &div;</span>",
      "<span class=\"eqt\">&div;,  X ,  - , +</span><span class=\"hqt\" style=\"display:none\">&div;,  X ,  - , +</span>",
      "<span class=\"eqt\">+, &div;,  X ,  -</span><span class=\"hqt\" style=\"display:none\">+, &div;,  X ,  -</span>",
      "<span class=\"eqt\">X , &div;,  - , +</span><span class=\"hqt\" style=\"display:none\">X , &div;,  - , +</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Option (a):  - , +,  X , &div;</p><p>150  -  75 + 25  X  5 &div; 100 = 65</p><p>150  -  75 + 1.25 = 65</p><p>150  -  73.75 = 65</p><p>76.25 &#8800; 65</p><p>LHS is not equal to RHS.</p><p>Thus, option (a) is incorrect.</p><p>Option (b): &div;,  X ,  - , +</p><p>150 &div; 75  X  25  -  5 + 100 = 65</p><p>50  -  5 + 100 = 65</p><p>50 + 95 = 65</p><p>145 &#8800; 65</p><p>LHS is not equal to RHS.</p><p>Thus, option (b) is incorrect.</p><p>Option (c): +, &div;,  X ,  - </p><p>150 + 75 &div; 25  X  5  -  100 = 65</p><p>150 + 15  -  100 = 65</p><p>165  -  100 = 65</p><p><b>65 = 65</b></p><p>LHS is equal to RHS.</p><p>Thus, option (c) is correct.</p><p>Option (d):  X , &div;,  - , +</p><p>150  X  75 &div; 25  -  5 + 100 = 65</p><p>450  -  5 + 100 = 65</p><p>450 + 95 = 65</p><p>545 &#8800; 65</p><p>LHS is not equal to RHS.</p><p>Thus, option (d) is incorrect.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which two numbers and signs should be interchanged to make the given equation correct?</p><p>24 + 72  -  6  X  30 &div; 15 = 177</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2324;&#2352; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379; &#2332;&#2366;&#2319;?</p><p>24 + 72 - 6 X 30 &div; 15 = 177</p></span>",
    "options": [
      "<span class=\"eqt\">24 and 72,  -  and &div;</span><span class=\"hqt\" style=\"display:none\">24 &#2324;&#2352; 72, - &#2324;&#2352; &div;</span>",
      "<span class=\"eqt\">177 and 24, + and  -</span><span class=\"hqt\" style=\"display:none\">177 &#2324;&#2352; 24, + &#2324;&#2352; -</span>",
      "<span class=\"eqt\">15 and 6, &div; and  X</span><span class=\"hqt\" style=\"display:none\">15 &#2324;&#2352; 6, &div; &#2324;&#2352; X</span>",
      "<span class=\"eqt\">72 and 30,  X  and +</span><span class=\"hqt\" style=\"display:none\">72 &#2324;&#2352; 30, &#2319;&#2325;&#2381;&#2360; &#2324;&#2352; +</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Option (a): 24 and 72,  -  and &div;</p><p>After interchanging  - </p><p>72 + 24 &div; 6  X  30  -  15 = 177</p><p>72 + 120  -  15 = 177</p><p><b>177 = 177</b></p><p>LHS is equal to RHS</p><p>Thus, option (a) is correct.</p><p>Option (b): 177 and 24, + and  - </p><p>177  -  72 + 6  X  30 &div; 15 = 24</p><p>177  -  72 + 12 = 24</p><p>117 &#8800; 24</p><p>LHS is not equal to RHS.</p><p>Thus, option (b) is incorrect.</p><p>Option (c): 15 and 6, &div; and  X </p><p>24 + 72  -  15 &div; 30  X  6 = 177</p><p>24 + 72  -  3 = 177</p><p>93 &#8800; 177</p><p>LHS is not equal to RHS.</p><p>Thus, option (c) is incorrect.</p><p>Option (d): 72 and 30,  X  and +</p><p>24  X  30  -  6 + 72 &div; 15 = 177</p><p>720  -  6 + 4.8 = 177</p><p>718.8 &#8800; 177</p><p>LHS is not equal to RHS.</p><p>Thus, option (d) is incorrect.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If 'add' means addition, 'sub' means subtraction, 'mul' means multiplication and 'div' means division, then what is the value of</p><p>8 add 5 sub 3 mul 4 div 2 add 7?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 'add' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2332;&#2379;&#2337;&#2364;&#2344;&#2366;, 'sub' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2328;&#2335;&#2366;&#2344;&#2366;, 'mul' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2327;&#2369;&#2339;&#2366; &#2324;&#2352; 'div' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2349;&#2366;&#2327;, &#2340;&#2379; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p>8 add 5 sub 3 mul 4 div 2 add 7?</p></span>",
    "options": [
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>",
      "<span class=\"eqt\">31</span><span class=\"hqt\" style=\"display:none\">31</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>8 + 5 &#8722; 3  X  4 &div; 2 + 7</p><p>= 13  -  3  X  2 + 7</p><p>= 13  -  6 + 7</p><p>= 20  -  6</p><p>= 14</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Select the correct combination of mathematical signs to sequentially replace the * signs and balance the given equation.</p><p>76 * 152 * 38 * 19 * 20 * 20</p></span><span class=\"hqt\" style=\"display:none\"><p>* &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>76 * 152 * 38 * 19 * 20 * 20</p></span>",
    "options": [
      "<span class=\"eqt\">&div;,  X , +, =  -</span><span class=\"hqt\" style=\"display:none\">&div;, X , +, = -</span>",
      "<span class=\"eqt\">X , &div;, +,  - , =</span><span class=\"hqt\" style=\"display:none\">X , &div;, +, - , =</span>",
      "<span class=\"eqt\">=, +, &div;,  - ,  X</span><span class=\"hqt\" style=\"display:none\">=, +, &div;, - , X</span>",
      "<span class=\"eqt\">- , &div;,  X , +, =</span><span class=\"hqt\" style=\"display:none\">- , &div;, X , +, =</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option (a): &div;,  X , +, =,  - </p><p>76 &div; 152  X  38 + 19 = 20  -  20</p><p>19 + 19 = 20  -  20</p><p>38 &#8800; 0</p><p>LHS is not equal to RHS.</p><p>Thus, option (a) is incorrect.</p><p>Option (b):  X , &div;, +,  - , =</p><p>76  X  152 &div; 38 + 19  -  20 = 20</p><p>304 + 19  -  20 = 20</p><p>323  -  20 = 20</p><p>303 &#8800; 20</p><p>LHS is not equal to RHS.</p><p>Thus, option (b) is incorrect.</p><p>Option (c): =, +, &div;,  - ,  X  </p><p>76 = 152 + 38 &div; 19  -  20  X  20</p><p>76 = 152 + 2  -  400</p><p>76 = 154  -  400</p><p>76 &#8800; -246</p><p>LHS is not equal to RHS.</p><p>Thus, option (c) is incorrect.</p><p>Option (d):  - , &div;,  X , +, =</p><p>76  -  152 &div; 38  X  19 + 20 = 20</p><p>76  -  76 + 20 = 20</p><p><b>20 = 20</b></p><p>LHS is equal to RHS.</p><p>Thus, <b>option (d) is</b> correct.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>By Interchanging the given two numbers which of the following equations will be correct?</p><p>4 and 12</p><p>I. 120  -  96 &div; 4  X  24 + 12 = 50</p><p>II. 88 + 72 &div; 4  -  12  X  16 = 30</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354;&#2344;&#2375; &#2346;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2379;&#2327;&#2366;/&#2361;&#2379;&#2306;&#2327;&#2375;?</p><p>4 &#2324;&#2352; 12</p><p>I. 120 - 96 &div; 4 X 24 + 12 = 50</p><p>II. 88 + 72 &div; 4 - 12 X 16 = 30</p></span>",
    "options": [

    "solution": "<p>We have the original equation as:-</p><p>500 - 400 + 20 &div; 15  X  3 = 200</p><p>On checking each option one by one, after interchanging we get:-</p><p>Option (a):  X  and &div;</p><p>500  -  400 + 20  X  15 &div; 3 = 200</p><p>500  -  400 + 100</p><p>600  -  400</p><p><b>200 = 200</b></p><p>LHS is equal to RHS.</p><p>Thus, <b>option (a)</b> is correct</p><p>Option (b):  X  and -</p><p>500  X  400 + 20 &div; 15  -  3 = 200</p><p>500  X  400 + 1.33  -  3</p><p>200000 + 1.33  -  3</p><p>200001.33  -  3</p><p>199998.33 &#8800; 200</p><p>LHS is not equal to RHS.</p><p>Thus, option (b) is incorrect</p><p>Option (c): &div; and -</p><p>500 &div; 400 + 20  -  15  X  3 = 200</p><p>1.25 + 20  -  15  X  3</p><p>1.25 + 20  -  45</p><p>21.25  -  45</p><p>-23.75 &#8800; 200</p><p>LHS is not equal to RHS.</p><p>Thus, option (c) is incorrect</p><p>Option (d): + and  - </p><p>500 + 400  -  20 &div; 15  X  3 = 200</p><p>500 + 400  -  4</p><p>900  -  4</p><p>896 &#8800; 200</p><p>LHS is not equal to RHS.</p><p>Thus, option (d) is incorrect</p>",
