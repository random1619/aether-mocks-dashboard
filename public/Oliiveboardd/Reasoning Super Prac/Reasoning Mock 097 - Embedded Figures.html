<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following option figures when rotated 180&#730; clockwise and then 90&#730; Anti-clockwise will result in the given question figure?</p><p><img width=680 height=352 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20159/image001.png\" alt=2.png></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2379; 180&#730; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2366;&#2357;&#2352;&#2381;&#2340; &#2324;&#2352; &#2347;&#2367;&#2352; 90&#730; &#2357;&#2366;&#2350;&#2366;&#2357;&#2352;&#2381;&#2340; &#2328;&#2369;&#2350;&#2366;&#2344;&#2375; &#2346;&#2352; &#2342;&#2368; &#2327;&#2312; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2310;&#2325;&#2371;&#2340;&#2367; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2327;&#2368;?</p><p><img width=\"680\" height=\"352\" id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20159/image001.png\" alt=\"2.png\"></p></span>",

  {

    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",

  },
  {

      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>",
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>Option I:</p><p><img width=322 height=257 id=\"Picture 44\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20159/image038.png\" alt=2.png></p><p>So, this option is embedded in the given figure (X) (rotation is NOT allowed).</p><p>Option II:</p><p><img width=302 height=245 id=\"Picture 45\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20159/image039.png\" alt=2.png></p><p>So, this option is embedded in the given figure (X) (rotation is NOT allowed).</p><p>Option III:</p><p><img width=307 height=253 id=\"Picture 46\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20159/image040.png\" alt=2.png></p><p>So, this option is embedded in the given figure (X) (rotation is NOT allowed).</p><p>Option IV:</p><p>This option is NOT embedded in the given figure (X) (rotation is NOT allowed).</p>",
    "question_index": 2

  {

    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"

    "correct_option_id": 1,
    "solution": "<p>When option figure (II) is rotated 45<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20215/image075.png\"> anticlockwise, the figure will be:</p><p><img width=144 height=144 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20215/image082.png\"></p><p>And then rotated 315<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20215/image059.png\"> clockwise directions, we get:</p><p><img width=130 height=130 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20215/image083.png\"></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following option figure when rotated 135<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image032.png\"> clockwise and then 270<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image032.png\"> anticlockwise will result in the given figure.</p><p><img width=175 height=149 id=\"Picture 38\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image039.jpg\"></p><p><img width=677 height=195 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image040.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2379; 135 &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2366;&#2357;&#2352;&#2381;&#2340; &#2324;&#2352; &#2347;&#2367;&#2352; 270 &#2357;&#2366;&#2350;&#2366;&#2357;&#2352;&#2381;&#2340; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2328;&#2370;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2327;&#2368;&#2404;</p><p><img width=\"175\" height=\"149\" id=\"Picture 38\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image039.jpg\"></p><p><img width=\"677\" height=\"195\" id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image040.png\"></p></span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>When the option figure (I) is rotated 135<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image032.png\"> clockwise, we get:</p><p><img width=139 height=154 id=\"Picture 37\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image041.jpg\"></p><p>Then, rotated 270<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image032.png\"> anticlockwise , the figure will be:</p><p><img width=199 height=180 id=\"Picture 26\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image042.jpg\"></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>When the figure (X) is rotated 225<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20215/image059.png\"> anticlockwise and 270<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20215/image059.png\"> clockwise directions will give which of the following option figure?</p><p><img width=133 height=130 id=\"Picture 67\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20215/image064.jpg\"></p><p><img width=501 height=139 id=\"Picture 68\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20215/image065.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2310;&#2325;&#2371;&#2340;&#2367; (X) &#2325;&#2379; 225&deg; &#2357;&#2366;&#2350;&#2366;&#2357;&#2352;&#2381;&#2340; &#2324;&#2352; 270&deg; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2366;&#2357;&#2352;&#2381;&#2340; &#2342;&#2367;&#2358;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2328;&#2369;&#2350;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2310;&#2325;&#2371;&#2340;&#2367; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2327;&#2366;?</p><p><img width=\"133\" height=\"130\" id=\"Picture 67\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20215/image064.jpg\"></p><p><img width=\"501\" height=\"139\" id=\"Picture 68\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20215/image065.jpg\"></p></span>",

    "correct_option_id": 1,
    "solution": "<p>When figure (X) is rotated 225<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20215/image059.png\"> anticlockwise, the figure will be:</p><p><img width=96 height=88 id=\"Picture 65\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20215/image066.jpg\"></p><p>And then rotated 270<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20215/image059.png\"> clockwise directions, we get:</p><p><img width=83 height=94 id=\"Picture 66\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20215/image067.jpg\"></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following option figure when rotated 270<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image045.png\"> anticlockwise and then 135<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image045.png\"> clockwise will result in the given figure.</p><p><img width=136 height=128 id=\"Picture 50\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image052.jpg\"></p><p><img width=531 height=148 id=\"Picture 51\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image053.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2379; 270&deg; &#2357;&#2366;&#2350;&#2366;&#2357;&#2352;&#2381;&#2340; &#2324;&#2352; &#2347;&#2367;&#2352; 135&deg; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2366;&#2357;&#2352;&#2381;&#2340; &#2328;&#2369;&#2350;&#2366;&#2344;&#2375; &#2346;&#2352; &#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2327;&#2368;&#2404;</p><p><img width=\"136\" height=\"128\" id=\"Picture 50\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image052.jpg\"></p><p><img width=\"531\" height=\"148\" id=\"Picture 51\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20142/image053.jpg\"></p></span>",
