<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">2 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">64 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Which of the following numbers will replace the question marks (?) in the given series?</p><p>16, 36, 64, ?, ?, 196, 256, 324</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2368; &#2327;&#2312; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2319;&#2327;&#2368;?</p><p>16, 36, 64, ?, ?, 196, 256, 324</span>",
    "options": [
      "<span class=\"eqt\">81, 121</span><span class=\"hqt\" style=\"display:none\">81, 121</span>",
      "<span class=\"eqt\">100, 121</span><span class=\"hqt\" style=\"display:none\">100, 121</span>",
      "<span class=\"eqt\">100, 144</span><span class=\"hqt\" style=\"display:none\">100, 144</span>",
      "<span class=\"eqt\">81, 100</span><span class=\"hqt\" style=\"display:none\">81, 100</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>16 + 20 = 36</p><p>36 + (20+8) = 36 + 28 = 64</p><p>64 + (28+8) = 64 + 36 = <b>100</b></p><p>100 + (36+8) = 100 + 44 = <b>144</b></p><p>144 + (44+8) = 144 + 52 = 196</p><p>196 + (52+8) = 196 + 60 = 256</p><p>256 + (60+8) = 256 + 68 = 324</p>",
    "question_index": 0
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">7 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Select the number from among the given options that can replace the question mark (?) in the following series.</p><p>66, 75, 86, 99, 114, ?</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2357;&#2361; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2330;&#2369;&#2344;&#2367;&#2319; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2319;&#2327;&#2368;&#2404;</p><p>66, 75, 86, 99, 114, ?</span>",
    "options": [
      "<span class=\"eqt\">140</span><span class=\"hqt\" style=\"display:none\">140</span>",
      "<span class=\"eqt\">135</span><span class=\"hqt\" style=\"display:none\">135</span>",
      "<span class=\"eqt\">139</span><span class=\"hqt\" style=\"display:none\">139</span>",
      "<span class=\"eqt\">131</span><span class=\"hqt\" style=\"display:none\">131</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>We have the series as:-</p><p>66, 75, 86, 99, 114, ?</p><p>66 + 9 = 75,</p><p>75 + 11 =86,</p><p>86 + 13 = 99,</p><p>99 + 15 = 114</p><p>And, 114+17=131</p><p>Option (d) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">6 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Select the number from among the given options that can replace the question mark (?) in the following series.</p><p>672, 677, 686, 699, 716, ?</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2357;&#2361; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2330;&#2369;&#2344;&#2367;&#2319; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2319;&#2327;&#2368;&#2404;</p><p>672, 677, 686, 699, 716, ?</span>",
    "options": [
      "<span class=\"eqt\">747</span><span class=\"hqt\" style=\"display:none\">747</span>",
      "<span class=\"eqt\">749</span><span class=\"hqt\" style=\"display:none\">749</span>",
      "<span class=\"eqt\">757</span><span class=\"hqt\" style=\"display:none\">757</span>",
      "<span class=\"eqt\">737</span><span class=\"hqt\" style=\"display:none\">737</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Find the differences between successive terms:</p><p>&#8226; 677  -  672 = 5</p><p>&#8226; 686  -  677 = 9</p><p>&#8226; 699  -  686 = 13</p><p>&#8226; 716  -  699 = 17</p><p>The differences increase by 4 each time. The next difference should be 17 + 4 = 21. Therefore, the next term = 716 + 21 = 737.</p><p>Option (d) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">58 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Select the number from among the given options that can replace the question mark (?) in the following series.</p><p>9, 5, 6, 10.5, 23, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2357;&#2361; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2330;&#2369;&#2344;&#2367;&#2319; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2319;&#2327;&#2368;&#2404;</p><p>9, 5, 6, 10.5, 23, ?</p></span>",
    "options": [
      "<span class=\"eqt\">80</span><span class=\"hqt\" style=\"display:none\">80</span>",
      "<span class=\"eqt\">90</span><span class=\"hqt\" style=\"display:none\">90</span>",
      "<span class=\"eqt\">60</span><span class=\"hqt\" style=\"display:none\">60</span>",
      "<span class=\"eqt\">50</span><span class=\"hqt\" style=\"display:none\">50</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>9 x 0.5 + 0.5 = 4.5 + 0.5 = 5</p><p>5 x 1 + 1 = 5 + 1 = 6</p><p>6 x 1.5 + 1.5 = 9 + 1.5 = 10.5</p><p>10)5 x 2 + 2 = 21 + 2 = 23</p><p>23 x 2.5 + 2.5 = 57.5 + 2.5 = 60</p><p>So, option 3 is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">52 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Select the number from among the given options that can replace the question mark (?) in the following series.</p><p>98, 50, 26, 14, ?, 5</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2357;&#2361; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2330;&#2369;&#2344;&#2367;&#2319; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2319;&#2327;&#2368;&#2404;</p><p>98, 50, 26, 14, ?, 5</p></span>",
    "options": [
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>98 &div; 2 + 1 = 49 + 1 = 50</p><p>50 &div; 2 + 1 = 25 + 1 = 26</p><p>26 &div; 2 + 1 = 13 + 1 = 14</p><p><b>14 &div; 2 + 1 = 7 + 1 = 8</b></p><p>8 &div; 2 + 1 = 4 + 1 = 5</p><p>So, option (4) is the correct answer. </p>",
    "question_index": 4
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">18 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Select the number from among the given options that can replace the question mark (?) in the following series.</p><p>58, 179, ?, 492, 688</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>58, 179, ?, 492, 688</p></span>",
    "options": [
      "<span class=\"eqt\">300</span><span class=\"hqt\" style=\"display:none\">300</span>",
      "<span class=\"eqt\">269</span><span class=\"hqt\" style=\"display:none\">269</span>",
      "<span class=\"eqt\">313</span><span class=\"hqt\" style=\"display:none\">313</span>",
      "<span class=\"eqt\">323</span><span class=\"hqt\" style=\"display:none\">323</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>58, 179, ?, 492, 688</p><p><img width=298 height=107 id=\"Picture 54\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21334/image022.png\" alt=1.png></p><p>58 + (11)&#178; = 58 + 121= 179</p><p><b>179 + (12)&#178; = 179 + 144 = 323</b></p><p>323 + (13)&#178; = 323 + 169 = 492</p><p>492 + (14)&#178; = 492 + 196 = 688</p><p>So, '323' will replace the question mark (?) in the following series.</p>",
    "question_index": 5
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">29 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Select the number from among the given options that can replace the question mark (?) in the following series.</p><p>189, 532, 316, ?, 377</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>189, 532, 316, ?, 377</p></span>",
    "options": [
      "<span class=\"eqt\">384</span><span class=\"hqt\" style=\"display:none\">384</span>",
      "<span class=\"eqt\">291</span><span class=\"hqt\" style=\"display:none\">291</span>",
      "<span class=\"eqt\">441</span><span class=\"hqt\" style=\"display:none\">441</span>",
      "<span class=\"eqt\">405</span><span class=\"hqt\" style=\"display:none\">405</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=270 height=100 id=\"Picture 70\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21347/image054.png\" alt=1.png></p><p>189 + (7)&ge; = 189 + 343 = 532</p><p>532  -  (6)&ge; = 532  -  216 = 316</p><p>316 + (5)&ge; = 316 + 125 = 441</p><p>441  -  (4)&ge; = 441  -  64 = 377</p><p>So, '441' will replace the question mark (?) in the following series.</p>",
    "question_index": 6
