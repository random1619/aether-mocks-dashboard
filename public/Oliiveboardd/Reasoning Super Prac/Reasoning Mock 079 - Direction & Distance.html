    "question": "<span class=\"eqt\"><p>'A@B' means 'A is to the north of B'.</p><p>'A#B' means 'A is to the east of B'.</p><p>'A$B' means 'A is to the west of B'.</p><p>'A&amp;B' means 'A is to the south of B'.</p><p>'A*BC' means 'A stands exactly in the middle of horizontal line BC'.</p><p>'A!BC' means 'A stands exactly in the middle of vertical line BC'.</p><p>Note: 'A5m@B' means 'A is 5 metre north of B' and so on.</p><p>Find the shortest distance between T and W in the following expression.</p><p><b>P4m@T9m$U5m@V5m#W</b></p></span><span class=\"hqt\" style=\"display:none\"><p>'A@B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; &#2361;&#2376;'&#2404;</p><p>'A#B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2375;&#2306; &#2361;&#2376;'&#2404;</p><p>'A$B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2375; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2375;&#2306; &#2361;&#2376;'&#2404;</p><p>'A&amp;B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306; &#2361;&#2376;'&#2404;</p><p>'A*BC' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A &#2325;&#2381;&#2359;&#2376;&#2340;&#2367;&#2332; &#2352;&#2375;&#2326;&#2366; BC &#2325;&#2375; &#2336;&#2368;&#2325; &#2350;&#2343;&#2381;&#2351; &#2350;&#2375;&#2306; &#2326;&#2337;&#2364;&#2366; &#2361;&#2376;'&#2404;</p><p>'A!BC' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2352;&#2375;&#2326;&#2366; BC &#2325;&#2375; &#2336;&#2368;&#2325; &#2350;&#2343;&#2381;&#2351; &#2350;&#2375;&#2306; &#2326;&#2337;&#2364;&#2366; &#2361;&#2376;'&#2404;</p><p>&#2344;&#2379;&#2335;: 'A5m@B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A,     "options": [

    "solution": "<p>The shortest distance between T and W is &radic;41m. Hence, 'b' is the correct option.</p><p>We know-</p><p><b>P4m@T9m$U5m@V5m#W</b></p><p><b><img width=336 height=295 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20275/image003.jpg\"></b></p><p>By Pythagoras theorem,</p><p>X<sup>2 </sup>= 4<sup>2</sup> + 5<sup>2</sup></p><p>Or, X = &radic; (16+25)</p><p>Or, X = &radic;41m</p>",

    "question": "<span class=\"eqt\"><p>'A%B' means 'B is to the south of A'</p><p>'A||B' means 'A is to the east of B'</p><p>'A@B' means 'B is to the west of A'</p><p>'A&gt;B' means 'A is to the north of B'</p><p>'A~YZ' means 'A stands exactly between Y and Z where A, Y and Z are in a vertical line'</p><p>'A*YZ' means 'A stands exactly between Y and Z where A, Y and Z are in a horizontal line'</p><p>'A1%B' means 'B is 1m to the south of A' and so on.</p><p>What is the direction of O with respect to N in the expression <b>N13&gt;J3%K7||L10@M*KO</b> ?</p></span><span class=\"hqt\" style=\"display:none\"><p>'A%B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'B, A &#2325;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306; &#2361;&#2376;'</p><p>'A||B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'A, B &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2375;&#2306; &#2361;&#2376;'</p><p>'A@B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'B, A &#2325;&#2375; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2375;&#2306; &#2361;&#2376;'</p><p>'A&gt;B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'A, B &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; &#2361;&#2376;'</p><p>'A~YZ' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; 'A, Y &#2324;&#2352; Z &#2325;&#2375; &#2336;&#2368;&#2325; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2326;&#2337;&#2364;&#2366; &#2361;&#2376; &#2332;&#2361;&#2366;&#2306; A, Y &#2324;&#2352; Z &#2319;&#2325; &#2354;&#2306;&#2348;&#2357;&#2340; &#2352;&#2375;&#2326;&#2366; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;'</p><p>'A*YZ' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; 'A, Y &#2324;&#2352; Z &#2325;&#2375; &#2336;&#2368;&#2325; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2326;&#2337;&#2364;&#2366; &#2361;&#2376; &#2332;&#2361;&#2366;&#2306; A, Y &#2324;&#2352; Z &#2319;&#2325; &#2325;&#2381;&#2359;&#2376;&#2340;&#2367;&#2332; &#2352;&#2375;&#2326;&#2366; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;'</p><p>'A1%B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; 'B, A &#2325;&#2375; 1m &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306; &#2361;&#2376;' &#2324;&#2352; &#2310;&#2327;&#2375; &#2349;&#2368; &#2311;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2375;&#2404;</p><p>&#2357;&#2381;&#2351;&#2306;&#2332;&#2325; <b>N13&gt;J3%K7||L10@M*KO</b> &#2350;&#2375;&#2306; N &#2325;&#2375; &#2360;&#2344;&#2381;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; O &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Southwest</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;</span>",

    "correct_option_id": 1,
    "solution": "<p>It is given that,</p><p>'A%B' means 'B is to the south of A'</p><p>'A||B' means 'A is to the east of B'</p><p>'A@B' means 'B is to the west of A'</p><p>'A&gt;B' means 'A is to the north of B'</p><p>'A~YZ' means 'A stands exactly between Y and Z where A, Y and Z are in a vertical line'</p><p>'A*YZ' means 'A stands exactly between Y and Z where A, Y and Z are in a horizontal line'</p><p>'A1%B' means 'B is 1m to the south of A' and so on.</p><p>Thus, we have N13&gt;J3%K7||L10@M*KO</p><p>N is 13m to the north of J.</p><p>K is 3m to the south of J.</p><p>K is 7m to the east of L.</p><p>M is 10m to the west of L.</p><p>M stands exactly between K and O where K, O and M are in a horizontal line.</p><p><img width=414 height=230 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19215/image028.jpg\"></p><p>Thus, O is towards the southwest of N.</p>",
