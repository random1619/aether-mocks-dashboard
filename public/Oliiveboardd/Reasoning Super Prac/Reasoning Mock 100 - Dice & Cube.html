<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Two different positions of the same dice are shown, the six faces of which have different number of dots 1, 2, 3, 4, 5 and 6. Select the number of dots that will be on the opposite to one having 4 dots. </p><p><img width=217 height=109 id=\"Picture 42\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23148/image040.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2342;&#2379; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2306; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2325;&#2375; &#2331;&#2307; &#2347;&#2354;&#2325;&#2379;&#2306; &#2346;&#2352; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;- 1, 2, 3, 4, 5 &#2324;&#2352; 6 &#2350;&#2375;&#2306; &#2348;&#2367;&#2306;&#2342;&#2369; &#2361;&#2376;&#2306;&#2404; 4 &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p><img width=\"217\" height=\"109\" id=\"Picture 42\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23148/image040.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">1 dot</span><span class=\"hqt\" style=\"display:none\">1 &#2348;&#2367;&#2306;&#2342;&#2369;</span>",
      "<span class=\"eqt\">5 dots</span><span class=\"hqt\" style=\"display:none\">5 &#2348;&#2367;&#2306;&#2342;&#2369;</span>",
      "<span class=\"eqt\">6 dots</span><span class=\"hqt\" style=\"display:none\">6 &#2348;&#2367;&#2306;&#2342;&#2369;</span>",
      "<span class=\"eqt\">3 dots</span><span class=\"hqt\" style=\"display:none\">3 &#2348;&#2367;&#2306;&#2342;&#2369;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>From the first and second figure, if the second figure is rotated in the clockwise direction, such that the faces having 5 dots will appear in front and the faces having 2 dots will appear at the right side, then the face having 4 dots will be opposite to the face having 6 dots. </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Three different positions of the same dice are shown, the six faces of which have different symbols &#8734;, &#8486;, , , e and &#8721;. Select the symbol that will be on the opposite to one having symbol ''. </p><p><img width=363 height=116 id=\"Picture 38\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23148/image037.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2340;&#2368;&#2344; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2367;&#2326;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2325;&#2375; &#2331;&#2361; &#2347;&#2354;&#2325;&#2379;&#2306; &#2346;&#2352; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#8734;, &#937;, &#165;, &#174;, e &#2324;&#2352; &#8721; &#2361;&#2376;&#2306;&#2404; &#2313;&#2360; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; '&#165;' &#2357;&#2366;&#2354;&#2375; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2361;&#2379;&#2327;&#2366;&#2404;</p><p><img width=\"363\" height=\"116\" id=\"Picture 38\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23148/image037.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">&#8721;</span><span class=\"hqt\" style=\"display:none\">&#8721;</span>",
      "<span class=\"eqt\">&#8486;</span><span class=\"hqt\" style=\"display:none\">&#8486;</span>",
      "<span class=\"eqt\">&#8734;</span><span class=\"hqt\" style=\"display:none\">&#8734;</span>",
      "<span class=\"eqt\">e</span><span class=\"hqt\" style=\"display:none\">e</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The face having '&#8721;' is adjacent to the faces having , &#8734;, &#8486; and e. </p><p>So, the face having '&#8721;' is not opposite to the face having , &#8734;, &#8486; and e.</p><p>Thus, the face having '&#8721;' is opposite to the face having ''. </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Three orientations of the same cube are shown. How will this cube look when unfolded?</p><p><img width=489 height=303 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image030.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2328;&#2344; &#2325;&#2368; &#2340;&#2368;&#2344; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2306; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2368; &#2327;&#2351;&#2368; &#2361;&#2376;&#2306;&#2404; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2351;&#2361; &#2328;&#2344; &#2325;&#2376;&#2360;&#2366; &#2342;&#2367;&#2326;&#2375;&#2327;&#2366;?</p><p><img width=\"489\" height=\"303\" id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image030.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In this type of format,</p><p><img width=118 height=147 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image031.png\"></p><p>! lies opposite *; + lies opposite to ^ and 0 lies opposite to =.</p><p><b>Figure I</b>: w lies opposite to z; q lies opposite to m and y lies opposite to x.</p><p>Thus, w is not adjacent to z, q is not adjacent to m and y is not adjacent to x.</p><p>So, figure I is incorrect.</p><p><b>Figure II:</b> x lies opposite to q; z lies opposite to y and w lies opposite to m.</p><p>Thus, x is not adjacent to q, z is not adjacent to y and w is not adjacent to m.</p><p>So, figure II is incorrect.</p><p><b>Figure III:</b> q lies opposite to w; m lies opposite to y and x lies opposite to z.</p><p>Thus, q is not adjacent to w, m is not adjacent to y and x is not adjacent to z.</p><p>So, figure III is incorrect.</p><p><b>Figure IV:</b> w lies opposite to m; x lies opposite to y and q lies opposite to z.</p><p>Thus, w is not adjacent to m, x is not adjacent to y and q is not adjacent to z.</p><p>So, figure IV is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>How many stars are there on the dice face opposite the one with four stars?</p><p><img width=679 height=285 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23259/image015.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2366;&#2360;&#2375; &#2325;&#2375; &#2330;&#2366;&#2352; &#2360;&#2381;&#2335;&#2366;&#2352; &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2381;&#2335;&#2366;&#2352; &#2361;&#2376;&#2306;?</p><p><img width=\"679\" height=\"285\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23259/image015.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Four stars are adjacent to 5 stars and 6 stars in Figure (II), 6 stars and 3 stars in Figure (III) and 1 star and 3 stars in Figure (I). Thus, four stars cannot be opposite to 5, 6, 1 and 3 stars.</p><p>Hence, four stars are opposite to 2 stars.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Three positions of the cube are given. What will come opposite to the face that contains \"6\"?</p><p><img width=602 height=152 id=\"Picture 267\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p4131/image035.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2328;&#2344; &#2325;&#2375; &#2340;&#2368;&#2344; &#2347;&#2354;&#2325; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;| &#2332;&#2367;&#2360; &#2347;&#2354;&#2325; &#2350;&#2375;&#2306; \"6\" &#2361;&#2376; &#2313;&#2360;&#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2325;&#2375; &#2347;&#2354;&#2325; &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2366; &#2310;&#2319;&#2327;&#2366;?</p><p><img width=\"602\" height=\"152\" id=\"Picture 267\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p4131/image035.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">Cannot be determined</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>After combining first 2 positions of the cube;</p><p><img width=216 height=185 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p4131/image036.png\"></p><p>By using 1<sup>rd</sup> and 3<sup>rd</sup> position of the cube;</p><p>Taking 2 as common and moving clockwise in each cube then in cube 1 it has digit 1 and cube 3 it has digit 3 as next digits in clockwise direction which means 1 is opposite to 3 and moving further in both cubes clockwise 6 is opposite to 5.</p><p></p><p></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Three different positions of a same cube are given below. What will appear on a face which is opposite to the 'Green' colour face?</p><p><img width=381 height=147 id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20461/image022.jpg\" ></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2360;&#2350;&#2366;&#2344; &#2328;&#2344; &#2325;&#2368; &#2340;&#2368;&#2344; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; 'Green' &#2352;&#2306;&#2327; &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2310;&#2319;&#2327;&#2366;?</p><p><img width=\"381\" height=\"147\" id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20461/image022.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">Yellow</span><span class=\"hqt\" style=\"display:none\">Yellow</span>",
      "<span class=\"eqt\">Pink</span><span class=\"hqt\" style=\"display:none\">Pink</span>",
      "<span class=\"eqt\">Either Red or Yellow</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2366; &#2340;&#2379; Red &#2351;&#2366; Yellow</span>",
      "<span class=\"eqt\">Violet</span><span class=\"hqt\" style=\"display:none\">Violet</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>From the given figures, we can conclude that 'Red' is adjacent to face Green, Blue, Yellow and Pink. Thus, 'Red' is opposite to 'Violet'. Whereas 'Blue' is adjacent to Green, Red, Violet and Pink. So, Blue is opposite to 'Yellow'. And 'Green' is adjacent to Blue and Red. It means that 'Green' is opposite to the 'Pink' colour face.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following figures among I,II,III and IV depict the correct cube obtained on folding the given unfolded hollow cube?</p><p><img width=176 height=233 id=\"Picture 45\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8399/image037.jpg\"></p><p><img width=546 height=181 id=\"Picture 26\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8399/image038.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; I, II, III &#2324;&#2352; IV &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2310;&#2325;&#2371;&#2340;&#2367; &#2342;&#2367;&#2319; &#2327;&#2319; &#2326;&#2369;&#2354;&#2375; &#2326;&#2379;&#2326;&#2354;&#2375; &#2328;&#2344; &#2325;&#2379; &#2350;&#2379;&#2337;&#2364;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2328;&#2344; &#2325;&#2375; &#2360;&#2361;&#2368; &#2310;&#2325;&#2366;&#2352; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;?</p><p><img width=\"176\" height=\"233\" id=\"Picture 45\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8399/image037.jpg\"></p><p><img width=\"546\" height=\"181\" id=\"Picture 26\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8399/image038.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>1 is opposite to 4</p><p>2 is opposite to 3</p><p>5 is opposite to 6.</p><p><img width=355 height=160 id=\"Picture 21\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8399/image039.png\"></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The following question is based on the figures given below which represent different positions of the same dice:</p><p><img width=545 height=171 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8450/image006.png\"></p><p>Which of the following number is opposite to 1?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2361;&#2376; &#2332;&#2379; &#2360;&#2350;&#2366;&#2344; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;:</p><p><img width=\"545\" height=\"171\" id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8450/image006.png\"></p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 1 &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2361;&#2376;?</p></span>",
    "options": [

    "question": "<span class=\"eqt\"><p>Two different position of the same dice are shown, the six faces of which are marked with the numbers 1 to 6. Select the number that will be on the face opposite the face showing '3'.</p><p><img width=282 height=179 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23916/image035.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2342;&#2379; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2331;&#2361; &#2347;&#2354;&#2325;&#2379;&#2306; &#2346;&#2352; 1 &#2360;&#2375; 6 &#2340;&#2325; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2309;&#2306;&#2325;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; '3' &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2361;&#2379;&#2327;&#2368;&#2404;<img width=\"282\" height=\"179\" id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23916/image035.png\"></p></span>",

      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Face '2' is adjacent to faces '3', '4' and '5'. Thus, face '2' cannot be opposite to faces '3', '4' and '5'.</p><p>So, face '2' is opposite to either face '1' or face '6'.</p><p>Face '4' is adjacent to faces '2', '3' and '5'. Thus, face '4' cannot be opposite to faces '2', '3' and '5'.</p><p>So, face '4' is opposite to either face '1' or face '6'.</p><p>Face '3' is adjacent to faces '2' and '4'. Thus, face '3' cannot be adjacent to faces '2' and '4'.</p><p>Also, face '3' cannot be opposite to faces '1' and '6' as face '2' or face '4' is opposite to either face '1' or face '6'.</p><p>So, face '3' is opposite to face '5'.</p>",
