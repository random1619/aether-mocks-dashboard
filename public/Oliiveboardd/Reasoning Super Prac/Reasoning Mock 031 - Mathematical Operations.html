<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If P means &div;, Q means  X , R means +, S means  - , what is the value of:</p><p>168 P 7 Q 3 R 23 S 5 = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; P &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &div; &#2361;&#2376;, Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; X &#2361;&#2376;, R &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; + &#2361;&#2376;, S &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; - &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;:</p><p>168 P 7 Q 3 R 23 S 5 = ?</p></span>",
    "options": [
      "<span class=\"eqt\">88</span><span class=\"hqt\" style=\"display:none\">88</span>",
      "<span class=\"eqt\">90</span><span class=\"hqt\" style=\"display:none\">90</span>",
      "<span class=\"eqt\">92</span><span class=\"hqt\" style=\"display:none\">92</span>",
      "<span class=\"eqt\">94</span><span class=\"hqt\" style=\"display:none\">94</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>P means &div;, Q means  X , R means +, S means  - , then the equation will be: </p><p>168 &div; 7 x 3 + 23  -  5 = ?</p><p>24 x 3 + 23  -  5 = ?</p><p>72 + 23  -  5 = ?</p><p>95  -  5 = ? </p><p>So, ? = 90</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If P means &div;, Q means  X , R means +, S means  - , what is the value of:</p><p>391 Q 11 P 23 R 17 S 13 = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; P &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &div; &#2361;&#2376;, Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; X &#2361;&#2376;, R &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; + &#2361;&#2376;, S &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; - &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;:</p><p>391 Q 11 P 23 R 17 S 13 = ?</p></span>",
    "options": [
      "<span class=\"eqt\">189</span><span class=\"hqt\" style=\"display:none\">189</span>",
      "<span class=\"eqt\">191</span><span class=\"hqt\" style=\"display:none\">191</span>",
      "<span class=\"eqt\">193</span><span class=\"hqt\" style=\"display:none\">193</span>",
      "<span class=\"eqt\">195</span><span class=\"hqt\" style=\"display:none\">195</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>P means &div;, Q means  X , R means +, S means  - , then the equation will be:</p><p>391 x 11 &div; 23 + 17  -  13 = ?</p><p>4301 &div; 23 + 17  -  13 = ?</p><p>187 + 17  -  13 = ?</p><p>204  -  13 = ?</p><p>So, ? = 191</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If P means &div;, Q means  X , R means +, S means  - , what is the value of:</p><p>525 P 21 Q 2 S 7 R 31 = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; P &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &div; &#2361;&#2376;, Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; X &#2361;&#2376;, R &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; + &#2361;&#2376;, S &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; - &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;:</p><p>525 P 21 Q 2 S 7 R 31 = ?</p></span>",
    "options": [
      "<span class=\"eqt\">72</span><span class=\"hqt\" style=\"display:none\">72</span>",
      "<span class=\"eqt\">74</span><span class=\"hqt\" style=\"display:none\">74</span>",
      "<span class=\"eqt\">76</span><span class=\"hqt\" style=\"display:none\">76</span>",
      "<span class=\"eqt\">78</span><span class=\"hqt\" style=\"display:none\">78</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>P means &div;, Q means  X , R means +, S means  - , then the equation will be:</p><p>525 &div; 21 x 2  -  7 + 31 = ?</p><p>25 x 2  -  7 + 31 = ?</p><p>50  -  7 + 31 = ? </p><p>81  -  7 = ?</p><p>So, ? = 74</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If P means &div;, Q means  X , R means +, S means  - , what is the value of:</p><p>182 P 14 Q 3 R 13 S 5 = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; P &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &div; &#2361;&#2376;, Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; X &#2361;&#2376;, R &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; + &#2361;&#2376;, S &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; - &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;:</p><p>182 P 14 Q 3 R 13 S 5 = ?</p></span>",
    "options": [
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">47</span><span class=\"hqt\" style=\"display:none\">47</span>",
      "<span class=\"eqt\">49</span><span class=\"hqt\" style=\"display:none\">49</span>",
      "<span class=\"eqt\">51</span><span class=\"hqt\" style=\"display:none\">51</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>P means &div;, Q means  X , R means +, S means  - , then the equation will be: </p><p>182 &div; 14 x 3 + 13  -  5 = ?</p><p>13 x 3 + 13  -  5 = ?</p><p>39 + 13  -  5 = ?</p><p>52  -  5 = ?</p><p>So, ? = 47</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which two signs should be interchanged to make the equation correct?</p><p>120 &div; 20 + 10  X  5 - 40 = 90</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>120 &div; 20 + 10 X 5 - 40 = 90</p></span>",
    "options": [
      "<span class=\"eqt\">+ and &div;</span><span class=\"hqt\" style=\"display:none\">+ and &div;</span>",
      "<span class=\"eqt\">X  and -</span><span class=\"hqt\" style=\"display:none\">X  and -</span>",
      "<span class=\"eqt\">&div; and  X</span><span class=\"hqt\" style=\"display:none\">&div; and  X</span>",
      "<span class=\"eqt\">+ and -</span><span class=\"hqt\" style=\"display:none\">+ and -</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>We have the original equation as:-</p><p>120 &div; 20 + 10  X  5 - 40 = 90</p><p>On checking each option one by one, after interchanging we get:-</p><p>Option (a): + and &div;</p><p>120 + 20 &div; 10  X  5 - 40 = 90</p><p>120 + 10  -  40</p><p>130  -  40</p><p><b>90 = 90</b></p><p>LHS is equal to RHS.</p><p>Thus, <b>option (a)</b> is correct.</p><p>Option (b):  X  and  - </p><p>120 &div; 20 + 10 - 5  X  40 = 90</p><p>6 + 10  -  5  X  40</p><p>6 + 10  -  200</p><p>16  -  200</p><p>-184 &#8800; 90</p><p>LHS is not equal to RHS.</p><p>Thus, option (b) is incorrect.</p><p>Option (c): &div; and  X </p><p>120 &#1093; 20 + 10 - 5 &div; 40 = 90</p><p>120 &#1093; 20 + 10  -  0.125</p><p>2400 + 10  -  0.125</p><p>2410  -  0.125</p><p>2409.875 &#8800; 90</p><p>LHS is not equal to RHS.</p><p>Thus, option (c) is incorrect.</p><p>Option (d): + and  - </p><p>120 &div; 20 - 10  X  5 + 40 = 90</p><p>6 - 10  X  5 + 40</p><p>6  -  50 + 40</p><p>-4 &#8800; 90</p><p>LHS is not equal to RHS.</p><p>Thus, option (d) is incorrect.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which two signs should be interchanged to make the equation correct?</p><p>45 - 4  X  100 + 210 &div; 3 = 150</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>45 - 4 X 100 + 210 &div; 3 = 150</p></span>",
    "options": [
      "<span class=\"eqt\">X  and +</span><span class=\"hqt\" style=\"display:none\">X  and +</span>",
      "<span class=\"eqt\">X  and -</span><span class=\"hqt\" style=\"display:none\">X  and -</span>",
      "<span class=\"eqt\">&div; and +</span><span class=\"hqt\" style=\"display:none\">&div; and +</span>",
      "<span class=\"eqt\">+ and -</span><span class=\"hqt\" style=\"display:none\">+ and -</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>We have the original equation as:-</p><p>45 - 4  X  100 + 210 &div; 3 = 150</p><p>On checking each option one by one, after interchanging we get:-</p><p>Option (a):  X  and +</p><p>45 - 4 + 100  X  210 &div; 3</p><p>45  -  4 + 7000</p><p>7041 &#8800; 150</p><p>LHS is not equal to RHS.</p><p>Thus, option (a) is incorrect.</p><p>Option (b):  X  and -</p><p>45  X  4 - 100 + 210 &div; 3</p><p>45  X  4 - 100 + 70</p><p>180  -  100 + 70</p><p><b>150 = 150</b></p><p>LHS is equal to RHS.</p><p>Thus, <b>option (b)</b> is correct.</p><p>Option (c): &div; and +</p><p>45 - 4  X  100 &div; 210 + 3</p><p>45  -  1.9047 + 3</p><p>48  -  1.9047</p><p>46.0952 &#8800; 150</p><p>LHS is not equal to RHS.</p><p>Thus, option (c) is incorrect</p><p>Option (d): + and -</p><p>45 + 4  X  100 - 210 &div; 3</p><p>45 + 4  X  100 - 70</p><p>45 + 400  -  70</p><p>445 - 70</p><p>375 &#8800; 150</p><p>LHS is not equal to RHS.</p><p>Thus, option (d) is incorrect</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which two signs should be interchanged to make the equation correct?</p><p>250 - 100 + 25 &div; 15  X  5 = 321</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>250 - 100 + 25 &div; 15 X 5 = 321</p></span>",
    "options": [
      "<span class=\"eqt\">&div; and +</span><span class=\"hqt\" style=\"display:none\">&div; and +</span>",
      "<span class=\"eqt\">X  and -</span><span class=\"hqt\" style=\"display:none\">X  and -</span>",
      "<span class=\"eqt\">&div; and -</span><span class=\"hqt\" style=\"display:none\">&div; and -</span>",
      "<span class=\"eqt\">+ and -</span><span class=\"hqt\" style=\"display:none\">+ and -</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>We have the original equation as:-</p><p>250 - 100 + 25 &div; 15  X  5 = 321</p><p>On checking each option one by one, after interchanging we get:-</p><p>Option (a): &div; and +</p><p>250 - 100 &div; 25 + 15  X  5 = 321</p><p>250  -  4 + 75</p><p>325  -  4</p><p><b>321 = 321</b></p><p>LHS is equal to RHS.</p><p>Thus, <b>option (a)</b> is correct.</p><p>Option (b):  X  and  - </p><p>250 &#1093; 100 + 25 &div; 15 - 5 = 321</p><p>25000 + 25/15  -  5</p><p>24996.67 &#8800; 321</p><p>LHS is not equal to RHS.</p><p>Thus, option (b) is incorrect</p><p>Option (c): &div; and -</p><p>250 &div; 100 + 25  -  15  X  5 = 321</p><p>2.5 + 25  -  15  X  5</p><p>2.5 + 25  -  75</p><p>27.5  -  75</p><p>-47.5 &#8800; 75</p><p>LHS is not equal to RHS.</p><p>Thus, option (c) is incorrect</p><p>Option (d): + and -</p><p>250 + 100  -  25 &div; 15  X  5 = 321</p><p>250 + 100  -  8.33</p><p>350  -  8.33</p><p>341.67 &#8800; 321</p><p>LHS is not equal to RHS.</p><p>Thus, option (d) is incorrect</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which two signs should be interchanged to make the equation correct?</p><p>88 - 22  X  5 + 120 &div; 10 = 186</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>88 - 22 X 5 + 120 &div; 10 = 186</p></span>",
    "options": [
      "<span class=\"eqt\">&div; and  X</span><span class=\"hqt\" style=\"display:none\">&div; and  X</span>",
      "<span class=\"eqt\">+ and  X</span><span class=\"hqt\" style=\"display:none\">+ and  X</span>",
      "<span class=\"eqt\">+ and -</span><span class=\"hqt\" style=\"display:none\">+ and -</span>",
      "<span class=\"eqt\">&div; and -</span><span class=\"hqt\" style=\"display:none\">&div; and -</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>We have the original equation as:-</p><p>88 - 22  X  5 + 120 &div; 10 = 186</p><p>On checking each option one by one, after interchanging we get:-</p><p>Option (a): &div; and  X </p><p>88 - 22 &div; 5 + 120 &#1093; 10 = 186</p><p>88  -  4.4 + 1200</p><p>1288  -  4.4</p><p>1283.6 &#8800; 186</p><p>LHS is not equal to RHS.</p><p>Thus, option (a) is incorrect</p><p>Option (b): + and  X </p><p>88  -  22 + 5 &#1093; 120 &div; 10 = 186</p><p>88  -  22 + 60</p><p>148  -  22</p><p>126 &#8800; 186</p><p>LHS is not equal to RHS.</p><p>Thus, option (b) is incorrect</p><p>Option (c): + and  - </p><p>88 + 22  X  5 - 120 &div; 10 = 186</p><p>88 + 22  X  5  -  12</p><p>88 + 110  -  12</p><p>198  -  12</p><p><b>186 = 186</b></p><p>LHS is equal to RHS.</p><p>Thus, <b>option (c)</b> is correct</p><p>Option (d): &div; and  - </p><p>88 &div; 22  X  5 + 120 - 10 = 186</p><p>20 + 120  -  10</p><p>140  -  10</p><p>130 &#8800; 186</p><p>LHS is not equal to RHS.</p><p>Thus, option (d) is incorrect</p>",
    "question_index": 7
