    "question": "<span class=\"eqt\"><p>Three statements are followed by three conclusions numbered I, II and III. Assuming the statements to be true even if they seem to be at variance with commonly known facts, decide which of the conclusions logically follow(s) from the statements.</p><p><b>Statements: </b></p><p>All pots are vase.</p><p>Some cans are pots.</p><p>Some mugs are cans.</p><p><b>Conclusions: </b></p><p>I. No mug is vase is a possibility.</p><p>II. Some cans are vase.</p><p>III. No vase is can.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342; &#2340;&#2368;&#2344; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2306;&#2325;&#2367;&#2340; I, II &#2324;&#2352; III &#2342;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2361;&#2376;&#2306;&#2404; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2357;&#2375; &#2360;&#2352;&#2381;&#2357; &#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2379;&#2306;, &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2325;&#2367; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;/&#2361;&#2376;&#2306;&#2404;</p><p><b>&#2325;&#2341;&#2344;:</b></p><p>&#2360;&#2349;&#2368; pots, vase &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2369;&#2331; cans, pots &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2369;&#2331; mugs, cans &#2361;&#2376;&#2306;&#2404;</p><p><b>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</b></p><p>I. &#2325;&#2367;&#2360;&#2368; mug &#2325;&#2375; vase &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p>II. &#2325;&#2369;&#2331; cans, vase &#2361;&#2376;&#2306;&#2404;</p><p>III. &#2325;&#2379;&#2312; vase, can &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404;</p></span>",

      "<span class=\"eqt\">Only conclusion III follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; III &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">All conclusions I, II and III follow</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I, II &#2324;&#2352; III &#2360;&#2349;&#2368; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"

    "correct_option_id": 1,
    "solution": "<p>From the given statements, the Venn diagram is: </p><p><img width=256 height=104 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21894/image005.jpg\"></p><p>No mug is vase is a possibility: Here, some cans are vase and some cans are mugs. Thus, some mug is vase is a possibility. Also, no mug is vase is a possibility. So, conclusion I is true. </p><p>Some cans are vase: Here, all pots are vase and some pots are cans. So, conclusion II is true and conclusion III is false. </p>",

    "question": "<span class=\"eqt\"><p>Read the given statements and conclusions carefully. Assuming that the information given in the statements is true, even if it appears to be at variance with the commonly known facts, decide which of the given conclusions logically follow(s) from the statements. </p><p><b>Statements:</b></p><p>No heaters are coolers.</p><p>Some coolers are steamers.</p><p>Some fans are steamers. </p><p><b>Conclusions:</b></p><p>I. Some steamers are heaters.</p><p>II. All fans can be heaters.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2325;&#2341;&#2344;&#2379;&#2306; &#2324;&#2352; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2346;&#2397;&#2367;&#2351;&#2375;&#2404; &#2351;&#2361; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2367; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2351;&#2361; &#2360;&#2352;&#2381;&#2357;&#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2379;&#2306;, &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2325;&#2367; &#2342;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2309;&#23       "<span class=\"eqt\">Neither I nor II follows</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only conclusion I follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",

    "correct_option_id": 3,
    "solution": "<p>From the given statements, the Venn diagram is:</p><p><img width=338 height=103 id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23369/image013.jpg\"></p><p>I. Some steamers are heaters: Here, some steamers which are coolers are not heaters. Thus, the steamers which are not coolers can be heaters. So, conclusion I is false.</p><p>II. All fans can be heaters: Here, there is a possibility that some/all fans are heaters. So, conclusion II is true.</p>",

    "question": "<span class=\"eqt\"><p>In the question given below, four statements are given followed by three conclusions. You have to take the given statements to be true even if they seem to be at variance from commonly known facts. Read the conclusions and decide which of the given conclusions logically follows from the given statements disregarding the commonly known facts. </p><p>Statements: </p><p>Some work is time. </p><p>All time is efficiency. </p><p>No time is day.</p><p>Some day is rest. </p><p>Conclusion: </p><p>I. All rest are days is a possibility. </p><p>II. Some work are efficiency. </p><p>III. All work are time is a possibility.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2330;&#2366;&#2352; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2340;&#2368;&#2344; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#8203;&#8203;&#2361;&#2376;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2357;&#2375; &#2360;&#2352;&#2381;&#2357;&#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;&#2306;&#2404; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2379; &#2346;&#2397;&#2367;&#2319; &#2324;&#2352; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2342;&#2367;&#2319; &#2327;&#2319; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2309;&#2357;&#2361;&#2375;&#2354;&#2344;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>&#2325;&#2369;&#2331; work, time &#2361;&#2376;&#2404;</p><p>&#2360;&#2349;&#2368; time, efficiency &#2361;&#2376;&#2404;</p><p>&#2325;&#2379;&#2312; time, day &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p>&#2325;&#2369;&#2331; day, rest &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>I. &#2360;&#2349;&#2368; rest &#2325;&#2375; days &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2325;&#2369;&#2331; work, efficiency &#2361;&#2376;&#2306;&#2404;</p><p>III. &#2360;&#2349;&#2368; work &#2325;&#2375; time &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2361;&#2376;&#2404;</p></span>",
