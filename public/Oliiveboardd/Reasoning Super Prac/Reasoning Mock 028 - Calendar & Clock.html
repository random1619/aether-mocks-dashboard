    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If the seventh day of a month is three days earlier than Friday, then what day will it be on the 20th day of the month?</p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2366; &#2360;&#2366;&#2340;&#2357;&#2366;&#2305; &#2342;&#2367;&#2344; &#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352; &#2360;&#2375; &#2340;&#2368;&#2344; &#2342;&#2367;&#2344; &#2346;&#2361;&#2354;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; 20&#2357;&#2375;&#2306; &#2342;&#2367;&#2344; &#2325;&#2380;&#2344; &#2360;&#2366; &#2342;&#2367;&#2344; &#2361;&#2379;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Thursday</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Tuesday</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>7th is Tuesday (3 days before Friday). </p><p>20th is 13 days later (7th + 13 = 20th). </p><p>13 days = 1 week (7 days, still Tuesday) + 6 days (Wednesday, Thursday, Friday, Saturday, Sunday, Monday). </p><p>So,</p><p>20th is Monday.</p><p>Option (c) is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>What will be the day on 31 December 2006 if 1 January 2006 is a Wednesday?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 1 &#2332;&#2344;&#2357;&#2352;&#2368; 2006 &#2325;&#2379; &#2348;&#2369;&#2343;&#2357;&#2366;&#2352; &#2361;&#2376; &#2340;&#2379; 31 &#2342;&#2367;&#2360;&#2306;&#2348;&#2352; 2006 &#2325;&#2379; &#2325;&#2380;&#2344; &#2360;&#2366; &#2342;&#2367;&#2344; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Thursday</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Friday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>If 1 January 2006 is a Wednesday, then:</p><p>2006 is not a leap year, so it has 365 days in total.</p><p>Since 1 January is already known to be Wednesday, we are concerned with the remaining days of the year.</p><p>Now,</p><p>(365  -  1) &div; 7 = 364 &div; 7 = 52 weeks. (which means 0 odd days)</p><p>So, 31 December 2006 will be Wednesday.</p><p>So, option (c) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If 3 March 2020 was Tuesday, then what was the day of the week on 3 February 2019?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 3 &#2350;&#2366;&#2352;&#2381;&#2330; 2020 &#2325;&#2379; &#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352; &#2341;&#2366;, &#2340;&#2379; 3 &#2347;&#2352;&#2357;&#2352;&#2368; 2019 &#2325;&#2379; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Friday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Time period from 4<sup>th</sup> February 2019 to 3<sup>rd</sup> March 2020 =</p><p>25 days of February +</p><p>31 days of March +</p><p>30 days of April +</p><p>31 days of May +</p><p>30 days of June +</p><p>31 days of July +</p><p>31 days of August +</p><p>30 days of September +</p><p>31 days of October +</p><p>30 days of November +</p><p>31 days of December +</p><p>31 days of January +</p><p>29 days of February +</p><p>3 days of March</p><p>= 394 days</p><p>So, from 394/7, the remainder will be 2.</p><p>Thus, Tuesday  -  2 days = Sunday</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If 29 January 2003 is a Wednesday, then what day of the week will be 26 February 2005?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 29 &#2332;&#2344;&#2357;&#2352;&#2368; 2003 &#2325;&#2379; &#2348;&#2369;&#2343;&#2357;&#2366;&#2352; &#2361;&#2376;, &#2340;&#2379; 26 &#2347;&#2352;&#2357;&#2352;&#2368; 2005 &#2325;&#2379; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2344; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Thursday</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2370;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Friday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Saturday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2344;&#2367;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>It is given that,</p><p>29 January 2003 is a Wednesday.</p><p>26 February 2005 is the 759<sup>th</sup> day after 29 January 2003.</p><p>Each day of the week is repeated after 7 days.</p><p>Hence, on the 759<sup>th</sup> day (108 weeks and 3 days) it will be a <b>Saturday</b>.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If 11 July 2020 was Monday, what will be 14 October 2028?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 11 &#2332;&#2369;&#2354;&#2366;&#2312; 2020 &#2325;&#2379; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2341;&#2366;, &#2340;&#2379; 14 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2028 &#2325;&#2379; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2344; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Saturday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2344;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Tuesday</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Years: 2028  -  2020 = 8 in which there are two leap years.</p><p>Year + leap year = 8+2 = 10; (10&div;7) remainder = 3</p><p>Months: July has 3 odd days, August has 3 odd days, September has 2 odd days (October will not be counted)</p><p>Total months odd days = 3+3+2 = 8 remainder will be 1 (8&div;7)</p><p>Date: 14-11 = 3, odd days = 3</p><p>Total odd days = 3+1+3 = 7</p><p>Odd day will be 0</p><p>So, it will be Monday on 14 October 2028.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What day of the week was 31 January 2007?</p></span><span class=\"hqt\" style=\"display:none\"><p>31 &#2332;&#2344;&#2357;&#2352;&#2368; 2007 &#2325;&#2379; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Tuesday</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Thursday</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2370;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Number of odd days in 2007 = number of non-leap years from 2000 to 2007 i.e. 7 (There is only one leap year i.e. 2004).</p><p>Odd days in 31 January = 31</p><p>Total odd days = (31+7) = 38</p><p>Odd days = 38 / 7 = 3 as remainder</p><p>The day of the week was Wednesday.</p><p>So, Option (d) is correct.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If 15 January 1997 is Wednesday, then what will be the day of the week on 5 January 2000?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 15 &#2332;&#2344;&#2357;&#2352;&#2368; 1997 &#2325;&#2379; &#2348;&#2369;&#2343;&#2357;&#2366;&#2352; &#2361;&#2376;, &#2340;&#2379; 5 &#2332;&#2344;&#2357;&#2352;&#2368; 2000 &#2325;&#2379; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2344; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Friday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Thursday</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2370;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>15 January 1997 was Wednesday. </p><p>Total number of days from 15 January 1997 to 15 January 2000 = 3 years = 3 * 365 = 1095 days</p><p>Total number of days from 15 January 1997 to 5 January 2000 = 1095  -  10 = 1085 days</p><p>1085 days = 155 weeks</p><p>Which means the day on 15 January 1997 and 5 January 2000 will be same and it is Wednesday. </p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If 17 April 1992 is Friday, then what will be the day of the week on 10 October 1993?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 17 &#2309;&#2346;&#2381;&#2352;&#2376;&#2354; 1992 &#2325;&#2379; &#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352; &#2361;&#2376;, &#2340;&#2379; 10 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 1993 &#2325;&#2379; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2344; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Tuesday</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Total number of days from 17 April 1992 to 17 April 1993 = 365 days</p><p>Total number of days from 17 April 1993 to 17 September 1993 = 30 + 31 + 30 + 31 + 31 = 153 days</p><p>Total number of days from 17 September 1993 to 10 October 1993 = 23 days</p><p>Total days = 365 + 153 + 23 = 541 days = 77 weeks 2 days</p><p>Hence, the day on 10 October 1993 will be Sunday. </p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>If the year is NOT a leap year, then how is the last day of the year and first day of the same year related?</p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2357;&#2352;&#2381;&#2359; &#2354;&#2368;&#2346; &#2357;&#2352;&#2381;&#2359; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2352;&#2381;&#2359; &#2325;&#2366; &#2309;&#2306;&#2340;&#2367;&#2350; &#2342;&#2367;&#2344; &#2324;&#2352; &#2313;&#2360;&#2368; &#2357;&#2352;&#2381;&#2359; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2342;&#2367;&#2344; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">First day is Sunday, last day is Friday</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2361;&#2354;&#2366; &#2342;&#2367;&#2344; &#2352;&#2357;&#2367;&#2357;&#2366;&#2352; &#2361;&#2376;, &#2309;&#2306;&#2340;&#2367;&#2350; &#2342;&#2367;&#2344; &#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352; &#2361;&#2376;</span>",
      "<span class=\"eqt\">First day is Sunday, last day is Saturday</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2361;&#2354;&#2366; &#2342;&#2367;&#2344; &#2352;&#2357;&#2367;&#2357;&#2366;&#2352; &#2361;&#2376;, &#2309;&#2306;&#2340;&#2367;&#2350; &#2342;&#2367;&#2344; &#2358;&#2344;&#2367;&#2357;&#2366;&#2352; &#2361;&#2376;</span>",
      "<span class=\"eqt\">First day is Tuesday, last day is Saturday</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2361;&#2354;&#2366; &#2342;&#2367;&#2344; &#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352; &#2361;&#2376;, &#2309;&#2306;&#2340;&#2367;&#2350; &#2342;&#2367;&#2344; &#2358;&#2344;&#2367;&#2357;&#2366;&#2352; &#2361;&#2376;</span>",
      "<span class=\"eqt\">They are the same.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2319;&#2325; &#2361;&#2368; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A non - leap year has 365 days, which equals 52 weeks plus 1 day. This means the weekday of January 1 and December 31 will be the same.</p><p>Option (d) is the correct answer.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>If 31 January 2009 was a Saturday, then what was the day of the week on 30 January 2013?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 31 &#2332;&#2344;&#2357;&#2352;&#2368; 2009 &#2325;&#2379; &#2358;&#2344;&#2367;&#2357;&#2366;&#2352; &#2341;&#2366;, &#2340;&#2379; 30 &#2332;&#2344;&#2357;&#2352;&#2368; 2013 &#2325;&#2379; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tuesday</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Friday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</span>"

    "correct_option_id": 1,
