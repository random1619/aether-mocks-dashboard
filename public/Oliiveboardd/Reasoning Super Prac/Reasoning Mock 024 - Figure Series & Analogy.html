  {
    "question": "<span class=\"eqt\"><p>Figure A is related to B in a certain pattern. Following the same pattern figure, figure C is related to D. Study the pattern and select the figure which should be placed in place of D.<img width=568 height=145 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23683/image037.png\"></p><p>(I) <img width=115 height=115 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23683/image038.png\"></p><p>(II) <img width=116 height=117 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23683/image039.png\"></p><p>(III) <img width=117 height=116 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23683/image040.png\"></p><p>(IV) <img width=117 height=116 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23683/image041.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2310;&#2325;&#2371;&#2340;&#2367; A, B &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2310;&#2325;&#2371;&#2340;&#2367; C, D &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2324;&#2352; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2367;&#2360;&#2375; D &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2352;&#2326;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2351;&#2375;&#2404;</p><p><img width=\"568\" height=\"145\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23683/image037.png\"></p><p>(I) <img width=\"115\" height=\"115\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23683/image038.png\"></p><p>(II) <img width=\"116\" height=\"117\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23683/image039.png\"></p><p>(III) <img width=\"117\" height=\"116\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23683/image040.png\"></p><p>(IV) <img width=\"117\" height=\"116\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23683/image041.png\"></p></span>",

      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",

    "correct_option_id": 3,
    "solution": "<p>The logic is: 2<sup>nd</sup> image is obtained after rotating 1<sup>st</sup> image by 180&deg;. Similarly, 4<sup>th</sup> image can be obtained by rotating the 3<sup>rd</sup> image by 180&deg;.</p><p>So, the missing image will be: <img width=117 height=116 id=\"Picture 1898078081\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23683/image041.png\" ></p><p>Hence, option (d) is correct.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Figure A is related to B following a certain pattern. Following the same pattern, figure C is related to D. Study the pattern and select the figure which should be placed in plce of D.</p><p><img width=585 height=279 id=\"Picture 42\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21425/image017.png\" alt=1.png></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2325;&#2371;&#2340;&#2367; A &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; B &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2310;&#2325;&#2371;&#2340;&#2367; C, D &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2375; D &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2352;&#2326;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p><img width=\"585\" height=\"279\" id=\"Picture 42\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21425/image017.png\" alt=\"1.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>As the in figure A and B, the top left picture has been driven downward in a diagonal orientation, while the bottom right image has been shifted upward in the top left corner. The picture in the top right corner is swapped with the image in the bottom left corner.</p><p>Similarly,</p><p>In figure C and D, the top left picture has been driven downward in a diagonal orientation, while the bottom right image has been shifted upward in the top left corner. The picture in the top right corner is swapped with the image in the bottom left corner.</p><p>So, option figure (II) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the figure given in the options which when put in place of the question mark (?) will logically complete the series.</p><p><b><img width=569 height=135 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27837/image006.png\" ></b></p><p><b><img width=227 height=584 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27837/image007.png\" ></b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2379; &#2346;&#2361;&#2330;&#2366;&#2344;&#2367;&#2319; &#2332;&#2367;&#2360;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2357;&#2366;&#2330;&#2325; &#2330;&#2367;&#2344;&#2381;&#2361; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2352;&#2326;&#2344;&#2375; &#2346;&#2352; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2346;&#2370;&#2352;&#2368; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;&#2404;</p><p><b><img width=569 height=135 id=\"&#2330;&#2367;&#2340;&#2381;&#2352; 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27837/image006.png\" ></b></p><p><b><img width=227 height=584 id=\"&#2330;&#2367;&#2340;&#2381;&#2352; 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27837/image007.png\" ></b></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"

    "correct_option_id": 3,
    "solution": "<p><b><img width=583 height=133 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27837/image008.png\" ></b></p><p>So, option 4 is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Figure A is related to B in a certain pattern. Following the same pattern, figure C is related to D. Study the pattern and select the figure which should be placed in place of D.</p><p><img width=629 height=346 id=\"Picture 65\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21334/image034.png\" alt=1.png></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2325;&#2371;&#2340;&#2367; A &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2350;&#2375;&#2306; B &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2310;&#2325;&#2371;&#2340;&#2367; C, D &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2360;&#2375; D &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2352;&#2326;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p><img width=\"629\" height=\"346\" id=\"Picture 65\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21334/image034.png\" alt=\"1.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"

    "correct_option_id": 1,
    "solution": "<p>As in the A and B, P moves 2 positions in anti-clockwise direction and flips horizontally. P is also placed inside the middle figure. S takes the P position.</p><p>Similarly,</p><p>K moves 2 positions in anti-clockwise direction and flips horizontally. K is also placed inside the middle figure. D takes the K position.</p><p><img width=144 height=129 id=\"Picture 67\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21334/image035.png\" alt=1.png></p><p>So, Option figure (II) is correct.</p>",
    "question_index": 4

  {
    "question": "<span class=\"eqt\"><p>Figure A is related to B in a certain pattern. Following the same pattern, figure C is related to D. Study the pattern and select the figure which should be placed in place of D.</p><p><img width=641 height=335 id=\"Picture 62\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21347/image065.png\" alt=1.png></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2325;&#2371;&#2340;&#2367; A &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2350;&#2375;&#2306; B &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2310;&#2325;&#2371;&#2340;&#2367; C, D &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2375; D &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2352;&#2326;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p><img width=\"641\" height=\"335\" id=\"Picture 62\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21347/image065.png\" alt=\"1.png\"></p></span>",

    "correct_option_id": 1,
    "solution": "<p>The top left image is turned 90&#8304; anti-clockwise and bottom right image is turned 90&#8304; clockwise, the centre one image will double itself and the bottom left image will shift to top right by flipping the symbol.</p><p>So, Option figure (II) will be the correct answer.</p>",
