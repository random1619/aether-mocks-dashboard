    "solution": "<p>From option (a);</p><p>F 34 E 52 H 25 D 43 G</p><p>It means that,</p><p>F is the father of E. E is the sister of H. H is the husband of D. D is the mother of G.</p><p>We get,</p><p><img width=287 height=200 id=\"Drawing 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15424/image004.png\"></p><p>Here, <b>F is the grandfather of G. </b></p><p>From option (b);</p><p>E 25 H 43 G 34 D 52 F</p><p>It means that,</p><p>E is the husband of H. H is the mother of G. G is the father of D. D is the sister of F.</p><p>We get,</p><p><img width=168 height=206 id=\"Drawing 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15424/image005.png\"></p><p>Here, G is the father of F.</p><p>Hence, option (b) is not correct.</p><p>From option (c);</p><p>D 34 G 25 F 43 E 52 H</p><p>It means that,</p><p>D is the father of G. G is the husband of F. F is the mother of E. E is the sister of H.</p><p>Hence, option (c) is not correct.</p>",

    "question": "<span class=\"eqt\"><p>'P &amp; Q' means 'P is the father of Q'.</p><p>'P $ Q' means 'P is the daughter of Q'. </p><p>'P % Q' means 'P is the daughter-in-law of Q'.</p><p>'P @ Q' means 'P is the uncle of Q'. </p><p>In the expression S % D $ F &amp; G @ H, if G is unmarried, then how is S related to H? </p></span><span class=\"hqt\" style=\"display:none\"><p>'P &amp; Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'&#2404;</p><p>'P $ Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;'&#2404;</p><p>'P % Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2368; &#2348;&#2361;&#2370; &#2361;&#2376;'&#2404;</p><p>'P @ Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2366; &#2309;&#2306;&#2325;&#2354; &#2361;&#2376;'&#2404;</p><p>&#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; S % D $ F &amp; G @ H &#2350;&#2375;&#2306; &#2351;&#2342;&#2367; G &#2309;&#2357;&#2367;&#2357;&#2366;&#2361;&#2367;&#2340; &#2361;&#2376;, &#2340;&#2379; S, H &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
