    "question": "<span class=\"eqt\"><p>P, Q, R, S, T and U live in a building which has three floors. The ground floor is numbered Floor 1 and the topmost floor is numbered Floor 3. Each floor has two flats, namely Flat A and Flat B. Flat A is to the west of Flat B. No two people live on the same floor of the same flat. There is one floor between S and R, where S and R do not live in the same flat. T's floor is immediately above R's floor. T and R live in the same flat. P lives to the west of T and below Q's flat. Then who among the following lives in Flat A on Floor 1?</p></span><span class=\"hqt\" style=\"display:none\"><p>P, Q, R, S, T &#2324;&#2352; U &#2319;&#2325; &#2311;&#2350;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2350;&#2306;&#2332;&#2367;&#2354;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2349;&#2370;&#2340;&#2354; &#2325;&#2379; &#2350;&#2306;&#2332;&#2367;&#2354; 1 &#2324;&#2352; &#2360;&#2348;&#2360;&#2375; &#2314;&#2346;&#2352;&#2368; &#2350;&#2306;&#2332;&#2367;&#2354; &#2325;&#2379; &#2350;&#2306;&#2332;&#2367;&#2354; 3 &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2350;&#2306;&#2332;&#2367;&#2354; &#2350;&#2375;&#2306; &#2342;&#2379; &#2347;&#2381;&#2354;&#2376;&#2335; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2325;&#2366; &#2344;&#2366;&#2350; &#2347;&#2381;&#2354;&#2376;&#2335; A &#2324;&#2352; &#2347;&#2381;&#2354;&#2376;&#2335; B &#2361;&#2376;&#2404; &#2347;&#2381;&#2354;&#2376;&#2335; A, &#2347;&#2381;&#2354;&#2376;&#2335; B &#2325;&#2375; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404; &#2319;&#2325; &#2361;&#2368; &#2347;&#2381;&#2354;&#2376;&#2335; &#2325;&#2368; &#2319;&#2325; &#2361;&#2368; &#2350;&#2306;&#2332;&#2367;&#2354; &#2346;&#2352; &#2325;&#2379;&#2312; &#2342;&#2379; &#2354;&#237 :1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Floor 2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Floor 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td></tr></table></p><p><b> </b>Case 2:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Flat A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Flat B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Floor 3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Floor 2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Floor 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table></p><p>&bull; P lives to the west of T and below Q's flat.</p><p>&bull; So, Case 2 will be invalid.</p><p>&bull; Remaining, U lives on Floor 1 of Flat A.</p><p>Case 1:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Flat A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Flat B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">F
