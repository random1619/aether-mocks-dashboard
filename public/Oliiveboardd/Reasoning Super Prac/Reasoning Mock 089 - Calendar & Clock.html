<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If today is Wednesday, then the 97th day after today will be? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2310;&#2332; &#2348;&#2369;&#2343;&#2357;&#2366;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2310;&#2332; &#2325;&#2375; &#2348;&#2366;&#2342; 97&#2357;&#2375;&#2306; &#2342;&#2367;&#2344; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2344; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tuesday</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>It is given that today is Wednesday. </p><p>Each day of the week is repeated after 7 days. </p><p>So, on the 97th day, which is 13 weeks and 6 days after today, it will be a <b>Tuesday</b>. </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If 5<sup>th</sup> October, 2011 was a Thursday, then 5<sup>th</sup> October, 2013 was a:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 5 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;, 2011 &#2325;&#2379; &#2327;&#2369;&#2352;&#2369;&#2357;&#2366;&#2352; &#2341;&#2366;, &#2340;&#2379; 5 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;, 2013 &#2325;&#2379; _______ &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Friday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Saturday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2344;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>2012 is a leap year but 2013 is not.</p><p>So, no. of odd days = 2 + 1 = 3</p><p>Thursday + 3 = Sunday</p><p>Hence, 5<sup>th</sup> October, 2013 was a Sunday.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Mihir's birthday is on 16<sup>th</sup> February. In the year 2013, his birthday was on a Saturday. In 2015, his birthday was on a:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2367;&#2361;&#2367;&#2352; &#2325;&#2366; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; 16 &#2347;&#2352;&#2357;&#2352;&#2368; &#2325;&#2379; &#2310;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2352;&#2381;&#2359; 2013 &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2366; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; &#2358;&#2344;&#2367;&#2357;&#2366;&#2352; &#2325;&#2379; &#2341;&#2366;&#2404; &#2357;&#2352;&#2381;&#2359; 2015 &#2350;&#2375;&#2306;, &#2313;&#2344;&#2325;&#2366; &#2332;&#2344;&#2381;&#2350;&#2342;&#2367;&#2344; &#2325;&#2367;&#2360; &#2342;&#2367;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Saturday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2344;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Tuesday</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>2014 and 2015 are not leap years.</p><p>So, no. of odd days = 2</p><p>Hence, Saturday + 2 = Monday</p><p>His birthday in 2015 was on a Monday.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Today is a Friday. After 51 days, it will be:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2332; &#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352; &#2361;&#2376;&#2404; 51 &#2342;&#2367;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342; _____ &#2361;&#2379;&#2327;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Tuesday</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Thursday</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2370;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Today is a Friday.</p><p>Each day of the week is repeated after 7 days.</p><p>So, after 49 days, it will be a Friday again.</p><p>After 51 days, it will be Friday + 2 = Sunday.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>January 1, 1977 was Thursday. What day of the week was January 1, 1978?</p></span><span class=\"hqt\" style=\"display:none\"><p>1 &#2332;&#2344;&#2357;&#2352;&#2368; 1977 &#2325;&#2379; &#2327;&#2369;&#2352;&#2369;&#2357;&#2366;&#2352; &#2341;&#2366;&#2404; 1 &#2332;&#2344;&#2357;&#2352;&#2368; 1978 &#2325;&#2379; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Saturday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2344;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Thursday</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2370;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Friday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The year 1977 was not a leap year. So, it had 1 odd day.</p><p>It is given that 1st day of the year 1977 is Thursday.</p><p>So, 1st day of the year 1978 is = Thursday + 1 day = Friday</p><p>Hence, it will be Friday.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A clock is started at midnight. By 15 minutes past 7, the hour hand has turned through:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2337;&#2364;&#2368; &#2309;&#2352;&#2381;&#2343;&#2352;&#2366;&#2340;&#2381;&#2352;&#2367; &#2325;&#2379; &#2358;&#2369;&#2352;&#2369; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; 7 &#2348;&#2332;&#2325;&#2352; 15 &#2350;&#2367;&#2344;&#2335; &#2360;&#2350;&#2351; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2360;&#2370;&#2312; &#2325;&#2367;&#2340;&#2344;&#2375; &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2328;&#2370;&#2350;&#2368; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">217.5&deg;</span><span class=\"hqt\" style=\"display:none\">217.5&deg;</span>",
      "<span class=\"eqt\">198.5&deg;</span><span class=\"hqt\" style=\"display:none\">198.5&deg;</span>",
      "<span class=\"eqt\">271&deg;</span><span class=\"hqt\" style=\"display:none\">271&deg;</span>",
      "<span class=\"eqt\">195&deg;</span><span class=\"hqt\" style=\"display:none\">195&deg;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Angle traced by hour hand in 12 hrs = 360&deg;.</p><p>Angle traced by hour hand in 7 hrs 15 min. i.e., 29/4 hrs = (360/12) * (29/4) = 217.5&deg;</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>What was the day of the week on 3<sup>rd</sup> Jan 1801?</p></span><span class=\"hqt\" style=\"display:none\"><p>3 &#2332;&#2344;&#2357;&#2352;&#2368; 1801 &#2325;&#2379; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Thursday</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">None of these</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Till 1600 we have 0 odd days.</p><p>In 200 years we have = 3 odd days.</p><p>So till 3<sup>rd</sup> jan 1801 , number of odd days = 6</p><p>So, it was Saturday on 3<sup>rd</sup> Jan 1801.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Find the day name of 24 March 2006?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2361; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; 24 &#2350;&#2366;&#2352;&#2381;&#2330; 2006 &#2325;&#2379; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Friday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; As we know that the year which are multiples of 4 are the leap year. Among the century years, only the multiples of 400 are leap years.</p><p>&#183; 24 March 2006 means 2005 years and days from January 1, 2006 to March 24, 2006.</p><p>&#183; Odd no. of days in first 1600 years is 0.</p><p>&#183; Odd number days in 400 years is 0</p><p>&#183; From 2001 to 2005 there are five ordinary years and 1 leap year.</p><p>&#183; Hence, Odd no. of Days = 4 + (1 X 2) = 4 + 2 = 6 (1 week) = 6 odd days.</p><p>&#183; No. of days from January 1, 2006 to March 24, 2006= 31+28+24 = 83 days (which is 11 weeks and 6 day) = 6 odd day.</p><p>&#183; Total odd days = 0+6+6 = 12(which 5 odd day)</p><p>&#183; 5 odd day means Friday.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The time duration that would elapse between 12:46 p.m. of 15<sup>th</sup> July 2019 and 12:38 p.m. of 16<sup>th</sup> July 2020 is</p></span><span class=\"hqt\" style=\"display:none\"><p>15 &#2332;&#2369;&#2354;&#2366;&#2312; 2019 &#2325;&#2375; &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 12:46 &#2348;&#2332;&#2375; &#2324;&#2352; 16 &#2332;&#2369;&#2354;&#2366;&#2312; 2020 &#2325;&#2375; &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 12:38 &#2348;&#2332;&#2375; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2350;&#2351; &#2309;&#2357;&#2343;&#2367; &#2361;&#2376;-</p></span>",
    "options": [
      "<span class=\"eqt\">365 days 23 hours 52 mins</span><span class=\"hqt\" style=\"display:none\">365 &#2342;&#2367;&#2344; 23 &#2328;&#2306;&#2335;&#2375; 52 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">367 days 8 mins</span><span class=\"hqt\" style=\"display:none\">367 &#2342;&#2367;&#2344; 8 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">366 days 23 hours 52 mins</span><span class=\"hqt\" style=\"display:none\">366 &#2342;&#2367;&#2344; 23 &#2328;&#2306;&#2335;&#2375; 52 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">366 days 8 min</span><span class=\"hqt\" style=\"display:none\">366 &#2342;&#2367;&#2344; 8 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The time duration that would elapse between 12:46 p.m. of 15<sup>th</sup> July 2019 and 12:38 p.m. of 16<sup>th</sup> July 2020 is:</p><p>15<sup>th</sup> July 2019 - 16<sup>th</sup> July 2020 = 366 days</p><p>12:46 pm  -  12: 38 pm = 23 hours 52 minutes</p><p>So, Option (3) will be the correct option.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>What is the measure of the smaller of the two angles formed between the hour hand and the minute hand of a clock when it is 6:51 p.m.?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2328;&#2337;&#2364;&#2368; &#2325;&#2375; &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 6:51 &#2348;&#2332;&#2375; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2360;&#2369;&#2312; &#2324;&#2352; &#2350;&#2367;&#2344;&#2335; &#2325;&#2368; &#2360;&#2369;&#2312; &#2325;&#2375; &#2348;&#2368;&#2330; &#2348;&#2344;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2325;&#2379;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2331;&#2379;&#2335;&#2375; &#2325;&#2379;&#2339; &#2325;&#2366; &#2350;&#2366;&#2346; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">100<sup>o</sup></span><span class=\"hqt\" style=\"display:none\">100<sup>o</sup></span>",
      "<span class=\"eqt\">100.5<sup>o</sup></span><span class=\"hqt\" style=\"display:none\">100.5<sup>o</sup></span>",
      "<span class=\"eqt\">101.5<sup>o</sup></span><span class=\"hqt\" style=\"display:none\">101.5<sup>o</sup></span>",
      "<span class=\"eqt\">101<sup>o</sup></span><span class=\"hqt\" style=\"display:none\">101<sup>o</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Formula to calculate angle(N) between minutes hand and Hour hand is:</p><p>N = {(11/2)xM}  -  30 x H</p><p>N= {(11/2)x51}  -  30 x 6</p><p>N= 280.5  -  180</p><p>N = 100.5</p><p>So, the measure of the smaller of the two angles formed between the hour hand and the minute hand of a clock when it is 6:51 p.m is 100.5&#8304;.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>What day would it be on 1 October 2020?</p></span><span class=\"hqt\" style=\"display:none\"><p>1 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2020 &#2325;&#2379; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Thursday</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Friday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</span>",

    "correct_option_id": 0,
    "solution": "<p>&bull; As we know that the year which are multiples of 4 are the leap year. Among the century years, only the multiples of 400 are leap years.</p><p>&bull; 1 October 2020 means 2019 years and days from January 1, 2020 to October 1, 2020.</p><p>&bull; Odd no. of days in first 1600 years is 0.</p><p>&bull; Odd number days in 400 years is 0</p><p>&bull; From 2001 to 2019 there are fifteen ordinary years and 4 leap years.</p><p>&bull; Hence, Odd no. of Days = 15 + (4 X 2) = 15 + 8 = 23 (3 weeks and 2 days) = 2 odd days.</p><p>&bull; No. of days from January 1, 2020 to October 1, 2020= 31+29+31+30+31+30+31+31+30+1 = 275 days (which is 39 weeks and 2 days) = 2 odd days.</p><p>&bull; Total odd days = 0+2+2 = 4</p><p>&bull; 4 odd days means Thursday.</p>",

    "question": "<span class=\"eqt\"><p>A clock is set right at 7 p.m. The clock gains 12 minutes in every 3 hours. If, later the day, the actual time is 10: 15 p.m., then what will be the time shown in the watch?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2337;&#2364;&#2368; &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 7 &#2348;&#2332;&#2375; &#2360;&#2361;&#2368; &#2325;&#2352; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2328;&#2337;&#2364;&#2368; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; 3 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 12 &#2350;&#2367;&#2344;&#2335; &#2310;&#2327;&#2375; &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367;, &#2325;&#2369;&#2331; &#2360;&#2350;&#2351; &#2348;&#2366;&#2342;, &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2360;&#2350;&#2351; &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 10:15 &#2348;&#2332;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2328;&#2337;&#2364;&#2368; &#2350;&#2375;&#2306; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
