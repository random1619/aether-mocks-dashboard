    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Three orientations of the same cube are shown. How will this cube look when unfolded?</p><p><img width=312 height=150 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image027.png\"></p><p><img width=564 height=71 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image028.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2361;&#2368; &#2328;&#2344; &#2325;&#2375; &#2340;&#2368;&#2344; &#2309;&#2349;&#2367;&#2357;&#2367;&#2344;&#2381;&#2351;&#2366;&#2360; &#2342;&#2367;&#2326;&#2366;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2332;&#2348; &#2351;&#2361; &#2328;&#2344; &#2326;&#2369;&#2354;&#2375;&#2327;&#2366; &#2340;&#2379; &#2325;&#2376;&#2360;&#2366; &#2342;&#2367;&#2326;&#2375;&#2327;&#2366;?</p><p><img width=312 height=150 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image027.png\"></p><p><img width=564 height=71 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image028.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In this type of format,</p><p><img width=279 height=109 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image029.png\"></p><p>1 lies opposite 6; 4 lies opposite to 5 and 3 lies opposite to 2.</p><p><b>Figure I</b>: K lies opposite to D; Y lies opposite to O and V lies opposite to S.</p><p>Thus, K is not adjacent to D, Y is not adjacent to O and V is not adjacent to S.</p><p>So, figure I is incorrect.</p><p><b>Figure II:</b> V lies opposite to K; D lies opposite to Y and O lies opposite to S.</p><p>Thus, V is not adjacent to K, D is not adjacent to Y and O is not adjacent to S.</p><p>So, figure II is correct.</p><p><b>Figure III:</b> S lies opposite to O; D lies opposite to V and Y lies opposite to K.</p><p>Thus, S is not adjacent to O, D is not adjacent to V and Y is not adjacent to K.</p><p>So, figure III is incorrect.</p><p><b>Figure IV:</b> D lies opposite to S; Y lies opposite to O and K lies opposite to V.</p><p>Thus, D is not adjacent to S, Y is not adjacent to O and K is not adjacent to V.</p><p>So, figure IV is incorrect.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Select from the alternatives, the boxes that can be formed by folding the sheet shown in figure (X).</p><p><img width=107 height=226 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24648/image035.jpg\"></p><p><img width=638 height=156 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24648/image036.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2367;&#2340;&#2381;&#2352; (X) &#2350;&#2375;&#2306; &#2342;&#2367;&#2326;&#2366;&#2319; &#2327;&#2319; &#2358;&#2368;&#2335; &#2325;&#2379; &#2350;&#2379;&#2337;&#2364;&#2325;&#2352; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366; &#2360;&#2325;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p><img width=107 height=226 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24648/image035.jpg\"></p><p><img width=638 height=156 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24648/image036.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">Only I and II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Only I, II and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only IV</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; IV</span>",
      "<span class=\"eqt\">Only II and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=125 height=246 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24648/image037.png\"></p><p>Here in this figure  - </p><p>Face having 1 is opposite to the face having 3.</p><p>Face having 4 is opposite to the face having 6.</p><p>Face having 2 is opposite to the face having 5.</p><p><img width=140 height=295 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24648/image038.jpg\"></p><p>'Circle' figure is opposite to the 'Star' figure.</p><p>Thus, Circle figure is not adjacent to Star figure. So, option figure (I) is incorrect.</p><p>'Kite' figure is opposite to 'Square' figure.</p><p>Thus, Kite figure is not adjacent to Square figure. So, option figure (IV) is incorrect.</p><p>'Triangle' figure is opposite to 'Hexagon' figure.</p><p>Hence, the answer is only (II) and (III).</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Amongst the following figures, find the correct one, if it is known that the total number of triangles on opposite faces of the cube shown is always 7.</p><p><img width=609 height=143 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24648/image039.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2361;&#2368; &#2310;&#2325;&#2371;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;, &#2351;&#2342;&#2367; &#2351;&#2361; &#2332;&#2381;&#2334;&#2366;&#2340; &#2361;&#2379; &#2325;&#2367; &#2342;&#2352;&#2381;&#2358;&#2366;&#2319; &#2327;&#2319; &#2328;&#2344; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325;&#2379;&#2306; &#2346;&#2352; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2342;&#2376;&#2357; 7 &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p><img width=609 height=143 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24648/image039.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Since the total number of triangles on opposite faces is always 7, therefore 1 triangle must lie opposite 6 triangles, 2 triangles must lie opposite 5 triangles and 3 triangles must lie opposite 4 triangles. In each of the two figures (I) and (IV), 2 triangles appear adjacent to 5 triangles and in figure (II) 3 triangles appear adjacent to 4 triangles. Hence, these figures are incorrect. </p><p>Therefore, only figure (III) is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Two positions of a dice are shown below. When three hearts is at the top what number will be at the bottom?</p><p><img width=338 height=154 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25677/image001.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2319;&#2325; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2342;&#2379; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2332;&#2348; &#2340;&#2368;&#2344; &#2342;&#2367;&#2354; &#2360;&#2348;&#2360;&#2375; &#2314;&#2346;&#2352; &#2361;&#2379;&#2306; &#2340;&#2379; &#2360;&#2348;&#2360;&#2375; &#2344;&#2368;&#2330;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2368;?</p><p><img width=338 height=154 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25677/image001.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>From the two positions of dice it is clear that,</p><p>Face with '6' hearts is adjacent to face with '1', '3', '4' and '5'.</p><p>Thus, face with '6' hearts is opposite to face with '2' hearts.</p><p>Rotating the dice from first position along face having '6' hearts twice.</p><p>We get second position of the dice.</p><p>So, face with '1' heart is opposite to face with '4' hearts.</p><p>Thus, face with '3' hearts must be opposite to face with '<b>5'</b> hearts.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Three different positions of the same dice are shown, the six faces of which have numbers 10, 20, 30, 40, 50 and 60. Which of the following statement is true?</p><p><img width=546 height=206 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25677/image006.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2361;&#2368; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2340;&#2368;&#2344; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2367;&#2326;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2325;&#2375; &#2331;&#2361; &#2330;&#2375;&#2361;&#2352;&#2379;&#2306; &#2346;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; 10, 20, 30, 40, 50 &#2324;&#2352; 60 &#2361;&#2376;&#2306;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p><p><img width=546 height=206 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25677/image006.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">Face having number '20' is opposite to face having number '10'.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; '20' &#2357;&#2366;&#2354;&#2366; &#2347;&#2354;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; '10' &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Face having number '50' is opposite to face having number '30'.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; '50' &#2357;&#2366;&#2354;&#2366; &#2347;&#2354;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; '30' &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Face having number '10' is opposite to face having number '60'.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; '10' &#2357;&#2366;&#2354;&#2366; &#2347;&#2354;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; '60' &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Face having number '40' is opposite to face having number '20'.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; '40' &#2357;&#2366;&#2354;&#2366; &#2347;&#2354;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; '20' &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>From the above given three different positions of the same dice, it can be concluded that,</p><p>&#183; Face having number '50' is not opposite to the face with numbers 10, 20, 30 and 40 because these numbers are adjacent to the face with number '50'.</p><p>So, the face having number '50' is opposite to the face having number '60'.</p><p>&#183; Face having number '10' is not opposite to the face with numbers 20, 50, and 40 because these numbers are adjacent to the face with number '10'.</p><p>So, the face having number '10' is opposite to the face having number '30'.</p><p>&#183; Face having number '40' is not opposite to the face with numbers 10, 50, and 30 because these numbers are adjacent to the face with number '40'.</p><p>So, the face having number '40' is opposite to the face having number '20'.</p><p>Thus, the answer is option (d).</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A cube is made by folding the given sheet. Which of the following cubes <b>CANNOT</b> be formed by using the given sheet?</p><p><img width=158 height=120 id=\"Picture 22\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25709/image018.jpg\"></p><p><img width=156 height=440 id=\"Picture 24\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25709/image019.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2358;&#2368;&#2335; &#2325;&#2379; &#2350;&#2379;&#2337;&#2364;&#2325;&#2352; &#2319;&#2325; &#2328;&#2344; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2328;&#2344; &#2342;&#2368; &#2327;&#2312; &#2358;&#2368;&#2335; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2344;&#2361;&#2368;&#2306; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p><p><img width=158 height=120 id=\"Picture 22\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25709/image018.jpg\"></p><p><img width=156 height=440 id=\"Picture 24\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25709/image019.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>According to this pattern,</p><p><img width=150 height=114 id=\"Picture 21\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25709/image020.jpg\"></p><p>Face having number 1 lies opposite to the face having number 3.</p><p>Face having number 2 lies opposite to the face having number 4.</p><p>Face having number 5 lies opposite to the face having number 6.</p><p>Thus, the face having &#931; lies opposite to the face having &#937;; the face having &#968; lies opposite to the face having &le; and the face having &#8734; lies opposite to the face having $.</p><p>Figure (I): The face having &#931; lies opposite to the face having &#937;. So, faces having &#931; and &#937; should not be adjacent to each other. So, this cube cannot be formed.</p><p>Figure (II): This cube can be formed by folding the sheet.</p><p>Figure (III): This cube can be formed by folding the sheet.</p><p>Figure (IV): This cube can be formed by folding the sheet.</p>",
    "question_index": 5

    "question": "<span class=\"eqt\"><p>Four different positions of the same dice are shown, the six faces of which have numbers 12, 32, 52, 72, 92 and 42. Select the number that will be on the face opposite to the one having number '92'.</p><p><img width=334 height=144 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22688/image031.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2330;&#2366;&#2352; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;, &#2311;&#2360; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2331;&#2361; &#2347;&#2354;&#2325;&#2379;&#2306; &#2346;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; 12, 32, 52, 72, 92 &#2324;&#2352; 42 &#2309;&#2306;&#2325;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; '92' &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2361;&#2379;&#2327;&#2368;&#2404;</p><p><img width=\"334\" height=\"144\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22688/image031.jpg\"></p></span>",
