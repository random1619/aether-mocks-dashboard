<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">2 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">124 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>What will come in place of the question mark (?) in the following equation if '+' and '&#8722;' are interchanged and ' X ' and '&div;' are interchanged?</p><p>16 &div; 4 + 8  X  8 &#8722; 4 = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2310;&#2319;&#2327;&#2366; &#2351;&#2342;&#2367; '+' &#2324;&#2352; '&#8722;' &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2341;&#2366; 'X' &#2324;&#2352; '&div;' &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;?</p><p>16 &div; 4 + 8 X 8 &#8722; 4 = ?</p></span>",
    "options": [
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">67</span><span class=\"hqt\" style=\"display:none\">67</span>",
      "<span class=\"eqt\">42</span><span class=\"hqt\" style=\"display:none\">42</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>16 &div; 4 + 8  X  8 &#8722; 4 = ?</p><p>After interchanging '+' and '&#8722;' and ' X ' and '&div;'</p><p>16  X  4  -  8 &div; 8 + 4 = ?</p><p>16  X  4  -  1 + 4 = ?</p><p>64  -  1 + 4 = ?</p><p>64 + 3 = ?</p><p>? = <b>67</b></p>",
    "question_index": 0
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">8 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Which of the following operations should be interchanged to make the following equation correct?</p><p>12 + 12 &#8722; 4  X  4 &div; 2 = 22</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>12 + 12 &#8722; 4  X  4 &div; 2 = 22</p></span>",
    "options": [
      "<span class=\"eqt\">+ and &div;</span><span class=\"hqt\" style=\"display:none\">+ and &div;</span>",
      "<span class=\"eqt\">&div; and  -</span><span class=\"hqt\" style=\"display:none\">&div; and  -</span>",
      "<span class=\"eqt\">&#8722; and +</span><span class=\"hqt\" style=\"display:none\">&#8722; and +</span>",
      "<span class=\"eqt\">X  and  -</span><span class=\"hqt\" style=\"display:none\">X  and  -</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Option (a): + and &div;</p><p>12 + 12 &#8722; 4  X  4 &div; 2 = 22</p><p>After interchanging + and &div;</p><p>12 &div; 12 &#8722; 4  X  4 + 2 = 22</p><p>1  -  4  X  4 + 2 = 22</p><p>1  -  16 + 12 = 22</p><p>1  -  4 = 22</p><p>-3 &#8800; 22</p><p>LHS is not equal to RHS.</p><p>So, option (a) is incorrect.</p><p>Option (b): &div; and  - </p><p>12 + 12 &#8722; 4  X  4 &div; 2 = 22</p><p>After interchanging &div; and  - </p><p>12 + 12 &div; 4  X  4  -  2 = 22</p><p>12 + 12  -  2 = 22</p><p>24  -  2 = 22</p><p><b>22 = 22</b></p><p>LHS is equal to RHS.</p><p>So, <b>option (b)</b> is correct.</p><p>Option (c): &#8722; and +</p><p>12 + 12 &#8722; 4  X  4 &div; 2 = 22</p><p>After interchanging &#8722; and +</p><p>12  -  12 + 4  X  4 &div; 2 = 22</p><p>12  -  12 + 8 = 22</p><p>12  -  4 = 22</p><p>8 &#8800; 22</p><p>LHS is not equal to RHS.</p><p>So, option (c) is incorrect.</p><p>Option (d):  X  and  - </p><p>12 + 12 &#8722; 4  X  4 &div; 2 = 22</p><p>After interchanging  X  and  - </p><p>12 + 12  X  4  -  4 &div; 2 = 22</p><p>12 + 12  X  4  -  2 = 22</p><p>12 + 48  -  2 = 22</p><p>60  -  2 = 22</p><p>58 &#8800; 22</p><p>LHS is not equal to RHS.</p><p>So, option (d) is incorrect.</p>",
    "question_index": 1
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">5 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Which two numbers (not digits) should be interchanged to make the given equation correct?</p><p>15 + 5  X  8  -  72 &div; 4 + 16  X  3 = 101</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; (&#2309;&#2306;&#2325; &#2344;&#2361;&#2368;&#2306;) &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379; &#2332;&#2366;&#2319;?</p><p>15 + 5 x 8 - 72 &div; 4 + 16 x 3 = 101</p></span>",
    "options": [
      "<span class=\"eqt\">5 and 4</span><span class=\"hqt\" style=\"display:none\">5 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">15 and 16</span><span class=\"hqt\" style=\"display:none\">15 &#2324;&#2352; 16</span>",
      "<span class=\"eqt\">5 and 3</span><span class=\"hqt\" style=\"display:none\">5 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">8 and 4</span><span class=\"hqt\" style=\"display:none\">8 &#2324;&#2352; 4</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>We have the equation as:-</p><p>15 + 5  X  8  -  72 &div; 4 + 16  X  3 = 101</p><p>On checking each option one by one we get:-</p><p>I. 5 and 4</p><p>15 + 4  X  8  -  72 &div; 5 + 16  X  3 = 101</p><p>15 + 32  -  14.4 + 48 = 101</p><p>95  -  14.4 = 101</p><p>80.6 &#8800; 101</p><p>II. 15 and 16</p><p>16 + 5  X  8  -  72 &div; 4 + 15  X  3 = 101</p><p>16 + 5  X  8  -  18 + 15  X  3 = 101</p><p>16 + 40  -  18 + 45 = 101</p><p>101  -  18 = 101</p><p>83 &#8800; 101</p><p>III. 5 and 3</p><p>15 + 3  X  8  -  72 &div; 4 + 16  X  5 = 101</p><p>15 + 3  X  8  -  18 + 16  X  5 = 101</p><p>15 + 24  -  18 + 80 = 101</p><p>119  -  18 = 101</p><p>IV. 8 and 4</p><p>15 + 5  X  4  -  72 &div; 8 + 16  X  3 = 101</p><p>15 + 5  X  4  -  9 + 16  X  3 = 101</p><p>15 + 20  -  9 + 48 = 101</p><p>83  -  9 = 101</p><p>74 &#8800; 101</p><p>Option (c) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">7 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Which two signs should be interchanged to make the following equation correct?</p><p>139 + 40 &div; 5  -  168  X  3 = 283</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2360;&#2375; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>139 + 40 &div; 5 - 168 X 3 = 283</p></span>",
    "options": [
      "<span class=\"eqt\">-  and +</span><span class=\"hqt\" style=\"display:none\">-  and +</span>",
      "<span class=\"eqt\">-  and  X</span><span class=\"hqt\" style=\"display:none\">-  and  X</span>",
      "<span class=\"eqt\">&div; and  X</span><span class=\"hqt\" style=\"display:none\">&div; and  X</span>",
      "<span class=\"eqt\">+ and &div;</span><span class=\"hqt\" style=\"display:none\">+ and &div;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>We have the equation as:-</p><p>139 + 40 &div; 5 &#8722; 168  X  3 = 283</p><p>On checking each option by interchanging signs , we get:-</p><p>I. &#8722; and +</p><p>139 - 40 &div; 5 + 168  X  3 = 283</p><p>139 - 8 + 504 = 283</p><p>643 - 8 = 283 </p><p>635 &#8800; 283</p><p>II. &#8722; and  X </p><p>139 + 40 &div; 5  X  168 - 3 = 283</p><p>139 + 8  X  168 - 3 = 283</p><p>139 + 1344 - 3 = 283</p><p>1480 &#8800; 283</p><p>III. &div; and  X </p><p>139 + 40  X  5 &#8722; 168 &div; 3 = 283</p><p>139 + 40  X  5 &#8722; 56 = 283</p><p>139 + 200 &#8722; 56 = 283</p><p>339 &#8722; 56 = 283</p><p>283 = 283</p><p>IV. + and &div;</p><p>139 &div; 40 + 5 &#8722; 168  X  3 = 283</p><p>3.475 + 5 &#8722; 168  X  3 = 283</p><p>3.475 + 5 &#8722; 504 = 283</p><p>8.475 &#8722; 504 = 283</p><p>-495.525 &#8800; 283</p><p>Option (c) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">19 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>What will come in the place of the question mark (?) in the following equation if '+' and ' X ' are interchanged and '&#8722;' and '&div;' are interchanged?</p><p>95  -  19  X  4 + 6 &div; 16 = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2310;&#2319;&#2327;&#2366; &#2351;&#2342;&#2367; '+' &#2324;&#2352; 'X' &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2341;&#2366; '&#8722;' &#2324;&#2352; '&div;' &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;?</p><p>95 - 19 X 4 + 6 &div; 16 = ?</p></span>",
    "options": [
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Replace each operator as follows:</p><p>&#8226; \" - \" becomes \"&div;\"</p><p>&#8226; \" X \" becomes \"+\"</p><p>&#8226; \"+\" becomes \" X \"</p><p>&#8226; \"&div;\" becomes \"&#8722;\"</p><p>Thus, the expression becomes:</p><p>&#8195;95 &div; 19 + 4  X  6 &#8722; 16</p><p>Now compute step by step:</p><p>&#8226; 95 &div; 19 = 5</p><p>&#8226; 4  X  6 = 24</p><p>Then, 5 + 24 = 29 and finally 29 &#8722; 16 = 13.</p><p>Option (a) is the correct answer.</p>",
    "question_index": 4
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">133 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>What will come in place of the question mark (?) in the following equation, if '+' and ' - ' are interchanged and ' X ' and '&div;' are Interchanged?</p><p>2736  X  8  -  55 + 105 &div; 2 = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2310;&#2319;&#2327;&#2366;, &#2351;&#2342;&#2367; '+' &#2324;&#2352; '-' &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2341;&#2366; 'X' &#2324;&#2352; '&div;' &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;?</p><p>2736 X 8 - 55 + 105 &div; 2 = ?</p></span>",
