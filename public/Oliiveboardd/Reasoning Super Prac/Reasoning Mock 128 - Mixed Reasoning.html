<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In this question, the statement is followed by three conclusions. Which of the two conclusion(s) is/are true?</p><p>Statement:</p><p>d &gt; h = s &ge; m = n &ge; x &gt; c = v</p><p>Conclusions:</p><p>I: m &gt; v</p><p>II: x &le; d</p><p>III: c &gt; h</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2325;&#2341;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2340;&#2368;&#2344; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344;:</p><p>d &gt; h = s &ge; m = n &ge; x &gt; c = v</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>I: m &gt; v</p><p>II: x &le; d</p><p>III: c &gt; h</p></span>",
    "options": [
      "<span class=\"eqt\">Only conclusion II is true</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only conclusion I is true<b> </b></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;<b> </b></span>",
      "<span class=\"eqt\">Only conclusion III is true</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; III &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>I: m &gt; v: m = n &ge; x &gt; c = v, true</p><p>II: x &le; d: d &gt; h = s &ge; m = n &ge; x, possibility so false</p><p>III: c &gt; h: h = s &ge; m = n &ge; x &gt; c, false</p><p>So, the only conclusion I is true.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In this question, there are two statements showing the relation, followed by two conclusions I and II. Assuming that the given statements are true, find out which conclusion is/are definitely true.</p><p><b>Statement: </b>F &ge; T = R; H &le; R &lt; S</p><p><b>Conclusions: </b></p><p>I. S &gt; F</p><p>II. F &ge; H</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2360;&#2306;&#2348;&#2306;&#2343; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2325;&#2341;&#2344; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;&#2404;</p><p><b>&#2325;&#2341;&#2344;: </b>F &ge; T = R; H &le; R &lt; S</p><p><b>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;: </b></p><p>I. S &gt; F</p><p>II. F &ge; H</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given statement is F &ge; T = R; H &le; R &lt; S. </p><p>F &ge; T = R &lt; S. Here, the definite relationship between S and F cannot be determined. So, S &gt; F is false.</p><p>F &ge; T = R &ge; H. Here, F &ge; H is true. </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following expressions will be true if the given expression 'R &gt; F = V &le; C &lt; D = E &gt; W' is definitely true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2360;&#2340;&#2381;&#2351; &#2361;&#2379;&#2327;&#2366; &#2351;&#2342;&#2367; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; 'R &gt; F = V &le; C &lt; D = E &gt; W' &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">R &gt; E</span><span class=\"hqt\" style=\"display:none\">R &gt; E</span>",
      "<span class=\"eqt\">E &gt; F<b> </b></span><span class=\"hqt\" style=\"display:none\">E &gt; F<b> </b></span>",
      "<span class=\"eqt\">W &lt; R</span><span class=\"hqt\" style=\"display:none\">W &lt; R</span>",
      "<span class=\"eqt\">V &lt; W</span><span class=\"hqt\" style=\"display:none\">V &lt; W</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Option (a): R &gt; E; R &gt; F = V &le; C &lt; D = E. So, this is false as all the signs are not in the same direction.</p><p>Option (b): E &gt; F; F = V &le; C &lt; D = E. So, this is true. </p><p>Option (c): W &lt; R; R &gt; F = V &le; C &lt; D = E &gt; W. So, this is false as all the signs are not in the same direction.</p><p>Option (d): V &lt; W; V &le; C &lt; D = E &gt; W. So, this is false as all the signs are not in the same direction.</p><p>So, option (b) is the correct answer. </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In the question below, a statement is followed by two conclusions based on the statement. Study the conclusions and select the correct option as the answer.</p><p>Statements:</p><p>C &gt; J &lt; L &le; P &gt;R &lt; T; X &ge; P &ge; U &lt; Y</p><p>Conclusions:</p><p>I. J &lt; X</p><p>II. T &lt; X</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2325;&#2341;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2313;&#2360; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2342;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2379; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2369;&#2344;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>C &gt; J &lt; L &le; P &gt;R &lt; T; X &ge; P &ge; U &lt; Y</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>I. J &lt; X</p><p>II. T &lt; X</p></span>",
    "options": [
      "<span class=\"eqt\">Only Conclusion I follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only Conclusion II follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Neither Conclusion I nor II follows</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; &#2344; &#2361;&#2368; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both Conclusion I and II follow</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>As, J &lt; L &le; P &le; X =&gt; J &lt; X.</p><p>T and X have no direct link.</p><p>Hence, Only Conclusion I follows.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In the question below, a statement is followed by two conclusions based on the statement. Study the conclusions and select the correct option as the answer.</p><p>Statements:</p><p>T &ge; U &gt; V &le; X; S &gt; K &le; Q&lt; B &ge; D</p><p>Conclusions:</p><p>I. D &lt; U</p><p>II. Q &lt; B</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2325;&#2341;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2313;&#2360; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2342;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2379; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2369;&#2344;&#2367;&#2319;&#2404;</p><p>&#2325;&#2341;&#2344;:</p><p>T &ge; U &gt; V &le; X; S &gt; K &le; Q &lt; B &ge; D</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>I. D &lt; U</p><p>II. Q &lt; B</p></span>",
    "options": [
      "<span class=\"eqt\">Only Conclusion I follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only Conclusion II follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Neither Conclusion I nor II follows</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; &#2344; &#2361;&#2368; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both Conclusion I and II follow</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>No link fixes D vs. U =&gt; I false.</p><p>From S &gt; K &le; Q &lt; B =&gt; Q &lt; B =&gt; II true.</p><p>&#8756; Only II follows.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In the following question, the statement is followed by three conclusions. Which of the two conclusions is/are true?</p><p>Statement: H = B &ge; I &gt; Q ; X &le; I = S</p><p>Conclusions:</p><p>I. H &ge; S</p><p>II. B &ge; X</p><p>III. S &lt; Q</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2325;&#2341;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2340;&#2368;&#2344; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344;: H = B &ge; I &gt; Q ; X &le; I = S</p><p>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</p><p>I. H &ge; S</p><p>II. B &ge; X</p><p>III. S &lt; Q</p></span>",
    "options": [
      "<span class=\"eqt\">Only conclusion I is true</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
