  {

    "solution": "<p>We have the relation as:-</p><p>61 is related to 18, and</p><p>213 is related to 38,</p><p>The pattern it follows is:-</p><p>For (61,18)</p><p>4<sup>3</sup>  -  3= 61 , 4<sup>2</sup> + 2=18</p><p>Similarly for :- (213,38)</p><p>6<sup>3</sup> -3= 213, 6<sup>2</sup>+ 2= 38</p><p>Following same pattern for :- 509, we get:-</p><p>8<sup>3</sup>  -  3= 509 and <b>8<sup>2</sup> + 2= 66</b></p><p>Option (a) is the correct answer.</p>",

  {

  {
