<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If + means - , &div; means  X , - means &div; and  X  means +, then find the value of the following expression:</p><p>40 + 4  X  7 &div; 9 - 3</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; + &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; - , &div; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; X , - &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &div; &#2324;&#2352; X &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; + &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><p>40 + 4 X 7 &div; 9 - 3</p></span>",
    "options": [
      "<span class=\"eqt\">31</span><span class=\"hqt\" style=\"display:none\">31</span>",
      "<span class=\"eqt\">68</span><span class=\"hqt\" style=\"display:none\">68</span>",
      "<span class=\"eqt\">74</span><span class=\"hqt\" style=\"display:none\">74</span>",
      "<span class=\"eqt\">57</span><span class=\"hqt\" style=\"display:none\">57</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>40 + 4  X  7 &div; 9 - 3</p><p>After interchanging of sign: (Using BODMAS)</p><p>= 40 - 4 + 7  X  9 &div; 3</p><p>= 40  -  4 + 7  X  3</p><p>= 40  -  4 + 21</p><p>= 36 + 21</p><p>= 57</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which two signs should be interchanged to make the given equation correct?</p><p>42  X  7 + 6  -  5 &div; 2 = 2</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>42 X 7 + 6 - 5 &div; 2 = 2</p></span>",
    "options": [
      "<span class=\"eqt\">X  , &div;</span><span class=\"hqt\" style=\"display:none\">X , &div;</span>",
      "<span class=\"eqt\">X  , +</span><span class=\"hqt\" style=\"display:none\">X , +</span>",
      "<span class=\"eqt\">- ,  X</span><span class=\"hqt\" style=\"display:none\">- , X</span>",
      "<span class=\"eqt\">- , +</span><span class=\"hqt\" style=\"display:none\">- , +</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>From (a):</p><p>42  X  7 + 6  -  5 &div; 2 = 2</p><p>After interchange of sign:</p><p>42 &div; 7 + 6  -  5  X  2 = 2</p><p>6 + 6  -  10 = 2</p><p>12  -  10 = 2</p><p>2 = 2</p><p>LHS = RHS</p><p>From (b):</p><p>42  X  7 + 6  -  5 &div; 2 = 2</p><p>After interchange of sign:</p><p>42 + 7  X  6  -  5 &div; 2 = 2</p><p>42 + 42  -  2.5 = 2</p><p>So, LHS is not equal to RHS.</p><p>From (c):</p><p>42  X  7 + 6  -  5 &div; 2 = 2</p><p>After interchange of sign:</p><p>42 - 7 + 6  X  5 &div; 2 = 2</p><p>42  -  7 + 15 = 2</p><p>35 + 15 = 2</p><p>So, LHS is not equal to RHS.</p><p>From (d):</p><p>42  X  7 + 6  -  5 &div; 2 = 2</p><p>After interchange of sign:</p><p>42  X  7 - 6 + 5 &div; 2 = 2</p><p>294  -  6 + 2.5 = 2</p><p>294  -  3.5 = 2</p><p>So, LHS is not equal to RHS.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If &div; means +,  X  means -, - means &div; and + means  X , then find the value of the following expression.</p><p>7 + 8 &div; 5  X  36 - 9</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &div; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; + &#2361;&#2376; , X &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; - &#2361;&#2376;, - &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &div; &#2361;&#2376; &#2324;&#2352; + &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; X &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>7 + 8 &div; 5 X 36 - 9</p></span>",
    "options": [
      "<span class=\"eqt\">99</span><span class=\"hqt\" style=\"display:none\">99</span>",
      "<span class=\"eqt\">57</span><span class=\"hqt\" style=\"display:none\">57</span>",
      "<span class=\"eqt\">41</span><span class=\"hqt\" style=\"display:none\">41</span>",
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>7 + 8 &div; 5  X  36 - 9</p><p>After interchange of sign: (Using BODMAS)</p><p>= 7  X  8 + 5 - 36 &div; 9</p><p>= 56 + 5  -  4</p><p>= 57</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Select the correct combination of mathematical signs that can sequentially replace the * signs and balance the given equation.</p><p>35 * 12 * 4 * 15 * 2 * 8</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2360; &#2360;&#2361;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; * &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>35 * 12 * 4 * 15 * 2 * 8</p></span>",
    "options": [
      "<span class=\"eqt\">+, &div;, -, x, =</span><span class=\"hqt\" style=\"display:none\">+, &div;, -, x, =</span>",
      "<span class=\"eqt\">-, &div;, +, x, =</span><span class=\"hqt\" style=\"display:none\">-, &div;, +, x, =</span>",
      "<span class=\"eqt\">+, &div;, -, -, =</span><span class=\"hqt\" style=\"display:none\">+, &div;, -, -, =</span>",
      "<span class=\"eqt\">-, &div;, -, +, =</span><span class=\"hqt\" style=\"display:none\">-, &div;, -, +, =</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>From option a:</p><p>35 + 12 &div; 4  -  15 x 2 = 8</p><p>35 + 3  -  30 = 8</p><p>5 +3 = 8</p><p>8 = 8</p><p>LHS = RHS</p><p>From option b:</p><p>35 - 12 &div; 4 + 15 x 2 = 8</p><p>35 - 3 + 30 = 8</p><p>LHS is not equal to RHS</p><p>From option c:</p><p>35 + 12 &div; 4 - 15 - 2 = 8</p><p>35 + 3  -  15 -2 = 8</p><p>LHS is not equal to RHS</p><p>From option d:</p><p>35 - 12 &div; 4 - 15 + 2 = 8</p><p>35  -  3  -  15 + 2 = 8</p><p>LHS is not equal to RHS</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If 'x' means 'minus', '+' means 'divided by', '&div;' means 'multiplied by' and ' - ' means 'add', then find the value of the expression given below.</p><p>7  -  13 &div; 4 x [{(24 &div; 2 x 16) &div; 3} + 16] + 2</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 'x' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&#2328;&#2335;&#2366;&#2357;' &#2361;&#2376;, '+' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&#2349;&#2366;&#2327;' &#2361;&#2376;, '&div;' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&#2327;&#2369;&#2339;&#2366;' &#2361;&#2376; &#2324;&#2352; ' - ' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&#2332;&#2379;&#2396;' &#2361;&#2376;, &#2340;&#2379; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>7 - 13 &div; 4 x [{(24 &div; 2 x 16) &div; 3} + 16] + 2</p></span>",
    "options": [
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">56</span><span class=\"hqt\" style=\"display:none\">56</span>",
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, x means  -</p><p>+ means &div;</p><p>&div; means x</p><p>And,  -  means +</p><p>7  -  13 &div; 4 x [{(24 &div; 2 x 16) &div; 3} + 16] + 2</p><p>= 7 + 13 x 4  -  [{(24 x 2  -  16) x 3} &div; 16] &div; 2</p><p>= 7 + 52  -  [{(48  -  16) x 3} &div; 16] &div; 2</p><p>= 59  -  [{32 x 3} &div; 16] &div; 2</p><p>= 59  -  [96 &div; 16] &div; 2</p><p>= 59  -  6 &div; 2</p><p>= 59  -  3</p><p>= <b>56</b></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If L is coded as '&div;', M is coded as '+', N is coded as ' X ' and K is coded as '-', then what is the value of 65M128L8N16K92?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; L &#2325;&#2379; '&div;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, M &#2325;&#2379; '+' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, N &#2325;&#2379; ' X ' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; K &#2325;&#2379; '-' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2340;&#2379; 65M128L8N16K92 &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">229</span><span class=\"hqt\" style=\"display:none\">229</span>",
      "<span class=\"eqt\">332</span><span class=\"hqt\" style=\"display:none\">332</span>",
      "<span class=\"eqt\">216</span><span class=\"hqt\" style=\"display:none\">216</span>",
      "<span class=\"eqt\">321</span><span class=\"hqt\" style=\"display:none\">321</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>It becomes,</p><p>65 + 128 &div; 8  X  16  -  92 = 65 + 16 X  16  -  92 = 65 + 256  -  92 = 229</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which two symbols need to be interchanged to make the given equation correct?</p><p>90 &div; 45 + 15  -  60  X  30 = 0</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2375; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2376;?</p><p>90 &div; 45 + 15 - 60 X 30 = 0</p></span>",
    "options": [
      "<span class=\"eqt\">+ and  X</span><span class=\"hqt\" style=\"display:none\">+ &#2324;&#2352; X</span>",
      "<span class=\"eqt\">&div; and  -</span><span class=\"hqt\" style=\"display:none\">&div; &#2324;&#2352; -</span>",
      "<span class=\"eqt\">X  and &div;</span><span class=\"hqt\" style=\"display:none\">X &#2324;&#2352; &div;</span>",
      "<span class=\"eqt\">+ and  -</span><span class=\"hqt\" style=\"display:none\">+ &#2324;&#2352; -</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Option (a): Interchange + and  X </p><p>90 &div; 45  X  15  -  60 + 30 = 0</p><p>30  -  60 + 30 = 0</p><p>-30 + 30 = 0</p><p><b>0 = 0</b></p><p>LHS is equal to RHS.</p><p>Thus, option (a) is correct.</p><p>Option (b): Interchange &div; and  - </p><p>90  -  45 + 15 &div; 60  X  30 = 0</p><p>90  -  45 + 7.5 = 0</p><p>90  -  37.5 = 0</p><p>52.5 &#8800; 0</p><p>LHS is not equal to RHS.</p><p>Thus, option (b) is incorrect.</p><p>Option (c): Interchange  X  and &div;</p><p>90  X  45 + 15  -  60 &div; 30 = 0</p><p>4050 + 15  -  2 = 0</p><p>4063 &#8800; 0</p><p>LHS is not equal to RHS.</p><p>Thus, option (c) is incorrect.</p><p>Option (d): Interchange + and  - </p><p>90 &div; 45  -  15 + 60  X  30 = 0</p><p>2  -  15 + 1800 = 0</p><p>1787 &#8800; 0</p><p>LHS is not equal to RHS.</p><p>Thus, option (d) is incorrect.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which two numbers should be interchanged to make the given equation correct? </p><p>69 &div; 15 + 12 &div; 2  X  3  -  47 = 66</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>69 &div; 15 + 12 &div; 2 X 3 - 47 = 66</p></span>",
    "options": [
      "<span class=\"eqt\">12 and 15</span><span class=\"hqt\" style=\"display:none\">12 &#2324;&#2352; 15</span>",
      "<span class=\"eqt\">3 and 12</span><span class=\"hqt\" style=\"display:none\">3 &#2324;&#2352; 12</span>",
      "<span class=\"eqt\">15 and 3</span><span class=\"hqt\" style=\"display:none\">15 &#2324;&#2352; 3</span>",
      "<span class=\"eqt\">47 and 69</span><span class=\"hqt\" style=\"display:none\">47 &#2324;&#2352; 69</span>"
