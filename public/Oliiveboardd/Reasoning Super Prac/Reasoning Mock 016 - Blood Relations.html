    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">2 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">101 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>In a certain code language,</p><p>A + B means 'A is the son of B',</p><p>A &#8722; B means 'A is the wife of B',</p><p>A  X  B means 'A is the brother of B' and</p><p>A &div; B means 'A is the daughter of B'.</p><p>Based on the above, how is P related to R if 'P  X  S &div; M &#8722; T + R'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>A + B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;',</p><p>A &#8722; B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;',</p><p>A X B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;' &#2324;&#2352;</p><p>A &div; B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;'&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, &#2351;&#2342;&#2367; 'P X S &div; M &#8722; T + R' &#2361;&#2376;, &#2340;&#2379; P &#2325;&#2366; R &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Brother</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Son's son</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2335;&#2375; &#2325;&#2366; &#2348;&#2375;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Father's mother</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2340;&#2366; &#2325;&#2368; &#2350;&#2366;&#2306;</span>",
      "<span class=\"eqt\">Daughter</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2335;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>P  X  S &div; M &#8722; T + R</p><p>P  X  S means 'P is the brother of S'</p><p>S &div; M means 'S is the daughter of M'</p><p>M  -  T means 'M is the wife of T'</p><p>T + R means 'T is the son of R'</p><p><img width=156 height=156 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27004/image004.png\" ></p><p>P is the son's son of R.</p>",
    "question_index": 0
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">25 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>In a certain code language,</p><p>A + B means 'A is the son of B',</p><p>A  -  B means 'A is the wife of B',</p><p>A  X  B means 'A is the brother of B' and</p><p>A &div; B means 'A is the mother of B'.</p><p>Based on the above, how is T related to P if 'P  -  M + R &div; T  X  S'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>A + B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;',</p><p>A - B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;',</p><p>A X B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;' &#2324;&#2352;</p><p>A &div; B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;'&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, &#2351;&#2342;&#2367; 'P - M + R &div; T X S' &#2361;&#2376;, &#2340;&#2379; T, P &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Brother's wife</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2312; &#2325;&#2368; &#2348;&#2368;&#2357;&#2368;</span>",
      "<span class=\"eqt\">Brother</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Husband's brother</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2367; &#2325;&#2366; &#2349;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Sister</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Here we have,</p><p>A + B means 'A is the son of B',</p><p>A  -  B means 'A is the wife of B',</p><p>A  X  B means 'A is the brother of B' and</p><p>A &div; B means 'A is the mother of B'.</p><p>So on decoding, P  -  M + R &div; T  X  S'</p><p>P  -  M means P is the wife of M</p><p>M + R means M is the son of R</p><p>R &div; T means R is the mother of T</p><p>T &#1093; S means T is the brother of S</p><p>In the given family tree , '+' is represented as male and ' - ' is represented as female</p><p><img width=283 height=107 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27408/image017.jpg\"></p><p>So T is brother in law of P</p><p>Option (c) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">11 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>In a certain code language,</p><p>'A + B' means 'A is the mother of B';</p><p>'A  -  B' means 'A is the brother of B';</p><p>'A  X  B' means 'A is the wife of B' and</p><p>'A &div; B' means 'A is the father of B'.</p><p>Based on the above, how is 4 related to 1 if '4  X  3  -  2  -  1'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>'A + B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;';</p><p>'A - B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;';</p><p>'A X B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;' &#2324;&#2352;</p><p>'A &div; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, &#2351;&#2342;&#2367; '4 X 3 - 2 - 1' &#2361;&#2376;, &#2340;&#2379; 4 &#2325;&#2366; 1 &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mother</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Father's sister</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2340;&#2366; &#2325;&#2368; &#2348;&#2361;&#2344;</span>",
      "<span class=\"eqt\">Sister</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2344;</span>",
      "<span class=\"eqt\">Brother's wife</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2312; &#2325;&#2368; &#2348;&#2368;&#2357;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>On decoding we get:-</p><p>&#8226; 4  X  3: \"4 is the wife of 3\" (so 4 is female).</p><p>&#8226; 3  -  2: \"3 is the brother of 2\" (so 3 is male).</p><p>&#8226; 2  -  1: \"2 is the brother of 1\" (2 is male).</p><p>Since 4 is the wife of 3 and 3 is the brother of 1, 4 is the wife of 1's brother  -  i.e. the brother's wife.</p><p><img width=302 height=70 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27412/image003.png\"></p><p>Option (d) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">71 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>In a certain code language,</p><p>A + B means 'A is the mother of B',</p><p>A  -  B means 'A is the brother of B',</p><p>A x B means 'A is the wife of B' and</p><p>A &div; B means 'A is the father of B'.</p><p>Based on the above, how is U related to Z if 'U + V &div; W  -  Y x Z'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>A + B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;',</p><p>A - B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;',</p><p>A x B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;' &#2324;&#2352;</p><p>A &div; B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, &#2351;&#2342;&#2367; 'U + V &div; W - Y x Z' &#2361;&#2376;, &#2340;&#2379; U, Z &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Wife's father's Sister</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2381;&#2344;&#2368; &#2325;&#2375; &#2346;&#2367;&#2340;&#2366; &#2325;&#2368; &#2348;&#2361;&#2344;</span>",
      "<span class=\"eqt\">Wife's Mother's Mother</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2381;&#2344;&#2368; &#2325;&#2368; &#2350;&#2366;&#2305; &#2325;&#2368; &#2350;&#2366;&#2305;</span>",
      "<span class=\"eqt\">Wife's Mother's Sister</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2381;&#2344;&#2368; &#2325;&#2368; &#2350;&#2366;&#2305; &#2325;&#2368; &#2348;&#2361;&#2344;</span>",
      "<span class=\"eqt\">Wife's Father's Mother</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2381;&#2344;&#2368; &#2325;&#2375; &#2346;&#2367;&#2340;&#2366; &#2325;&#2368; &#2350;&#2366;&#2305;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>U + V: U is the mother of V</p><p>V &div; W: V is the father of W</p><p>W  -  Y: W is the brother of Y</p><p>Y x Z: Y is the wife of Z</p><p><b><img width=613 height=229 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27837/image013.png\" ></b></p><p>So, U is the Wife's Father's Mother of Z.</p><p>Thus, option 4 is the correct answer.</p>",
    "question_index": 3
  },
  {

    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">17 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>In a certain code language,</p><p>R + T means 'R is the sister of T'.</p><p>R  -  T means 'R is the father of T'.</p><p>R * T means 'R is the wife of T'.</p><p>R &div; T means 'R is the mother of T'.</p><p>Based on the above, how is M related to Q if</p><p>'M * N  -  P + Q &div; R +T'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>R + T &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'R, T &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;'&#2404;</p><p>R - T &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'R, T &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'&#2404;</p><p>R * T &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'R, T &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;'&#2404;</p><p>R &div; T &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'R, T &#2325;&#2368; &#2350;&#2366;&#2305; &#2361;&#2376;'&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, M, Q &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2351;&#2342;&#2367;</p><p>'M * N - P + Q &div; R +T'?</p></span>",

    "solution": "<p>M&#8727;N&#8722;P+Q&div;R+T</p><p>Code meanings:</p><p>1) R+T: R is the sister of T.</p><p>2) R&#8722;T: RRR is the father of TTT.</p><p>3) R&#8727;T: R is the wife of T.</p><p>4) R&div;T: R is the mother of T.</p><p>Decode the expression:</p><p>1) M&#8727;N: M is the wife of N.</p><p>o This means M is female, and M is N's spouse.</p><p>2) N&#8722;P: N is the father of P.</p><p>o This means N is male, and P is N's child. M, being N's wife, is P's mother.</p><p>3) P+Q: P is the sister of Q.</p><p>o This means P and Q are siblings, and P is female.</p><p>4) Q&div;R: Q is the mother of R.</p><p>o This means Q is female, and R is Q's child.</p><p>5) R+T: R is the sister of T.</p><p>o This means R and T are siblings, and R is female.</p><p>Determine M's relationship to Q:</p><p>&#183; M is the wife of N, who is the father of P.</p><p>&#183; P is the sister of Q, so M is Q's mother.</p><p>Correct Option is  (b). Mother</p>",

    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">95 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>In a certain code language,</p><p>A + B means 'A is the son of B',</p><p>A &#8722; B means 'A is the wife of B',</p><p>A  X  B means 'A is the brother of B' and</p><p>A &div; B means 'A is the mother of B'.</p><p>Based on the above, if 'P + Q &div; R &#8722; T  X  M', which of the following is true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>A + B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;',</p><p>A &#8722; B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;',</p><p>A X B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;' &#2340;&#2341;&#2366;</p><p>A &div; B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;'&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, &#2351;&#2342;&#2367; 'P + Q &div; R &#8722; T X M', &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p>Let's break down the expression <b>P + Q &div; R &#8722; T  X  M</b> step by step, based on the given relationships:</p><p>&#183; <b>P + Q</b> means <b>P is the son of Q</b>.</p><p>&#183; <b>Q &div; R</b> means <b>Q is the mother of R</b>.</p><p>&#183; <b>R &#8722; T</b> means <b>R is the wife of T</b>.</p><p>&#183; <b>T  X  M</b> means <b>T is the brother of M</b>.</p><p>Now, let's build the relationships:</p><p>1) <b>P is the son of Q</b> (P + Q).</p><p>2) <b>Q is the mother of R</b> (Q &div; R), so <b>R</b> is the child of <b>Q</b>.</p><p>3) <b>R is the wife of T</b> (R &#8722; T), so <b>T</b> is the husband of <b>R</b>.</p><p>4) <b>T is the brother of M</b> (T  X  M), so <b>M</b> is the sibling of <b>T</b>.</p><p>From this, we can deduce the following family structure:</p><p>&#183; <b>P</b> is the son of <b>Q</b>.</p><p>&#183; <b>Q</b> is the mother of <b>R</b>, and <b>R</b> is married to <b>T</b>.</p><p>&#183; <b>T</b> is the brother of <b>M</b>.</p><p>Now, let's look at the options:</p><p>1) <b>M is the sister of T</b>  -  This is <b>false</b> because gender of M is not known.</p><p>2) <b>P is the brother of R</b>  -  This is <b>true</b> because <b>P</b> is the son of <b>Q</b>, and <b>R</b> is the child of <b>Q</b> ,so P is the brother of R.</p><p>3) <b>Q is the mother of M</b>  -  This is <b>false</b> because <b>Q</b> is the mother of <b>P</b> and <b>R</b>, not <b>M</b>.</p><p>4) <b>T is the brother of P</b>  -  This is <b>false</b> because <b>T</b> is brother of M.</p><p>Thus, the correct answer is <b>Option (b): P is the brother of R</b>.</p>",

    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">8 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>In a certain code language, </p><p>A + B means 'A is the Brother's Wife of B' </p><p>A - B means 'A is the Sister of B' </p><p>A &#1093; B means 'A is the Wife of B' </p><p>A &div; B means 'A is the Daughter of B' </p><p>Based on the above, how is G related to Q if 'G + K - L &div; M  X  Q'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>A + B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2375; &#2349;&#2366;&#2312; &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;'</p><p>A - B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;'</p><p>A &#1093; B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;'</p><p>A &div; B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2361;&#2376;'</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, G, Q &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2351;&#2342;&#2367; 'G + K - L &div; M X Q'?</p></span>",

  {
