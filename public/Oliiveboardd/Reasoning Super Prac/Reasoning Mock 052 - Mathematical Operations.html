<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following pairs of numbers and signs, when their positions are interchanged, will correctly solve the given mathematical equation?</p><p>61x 186-3 + 84&div;12= 10</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2360;&#2306;&#2325;&#2375;&#2340; &#2325;&#2375; &#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2366;&#2325;&#2367; &#2342;&#2367;&#2319; &#2327;&#2319; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2361;&#2354; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;?</p><p>61x 186-3 + 84&div;12= 10</p></span>",
    "options": [
      "<span class=\"eqt\">84 and 186, + and &div;</span><span class=\"hqt\" style=\"display:none\">84 &#2324;&#2352; 186, + &#2324;&#2352; &div;</span>",
      "<span class=\"eqt\">186 and 61, x and  -</span><span class=\"hqt\" style=\"display:none\">186 &#2324;&#2352; 61, x &#2324;&#2352; -</span>",
      "<span class=\"eqt\">3 and 12, + and x</span><span class=\"hqt\" style=\"display:none\">3 &#2324;&#2352;12, + &#2324;&#2352; x</span>",
      "<span class=\"eqt\">61 and 84, &div; and  -</span><span class=\"hqt\" style=\"display:none\">61 &#2324;&#2352; 84, &div; &#2324;&#2352; -</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>We have:</p><p>61x 186-3 + 84&div;12= 10</p><p>After interchanging, we get:</p><p>186- 61x3 + 84&div;12= 10</p><p>186- 183+7= 10</p><p>LHS= RHS.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following pairs of numbers and signs, when their positions are interchanged, will correctly solve the given mathematical equation?</p><p>49  -  7+4x 385 &div;19 = 28</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2332;&#2379;&#2337;&#2364;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348; &#2313;&#2344;&#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2361;&#2354; &#2325;&#2352;&#2375;&#2306;&#2327;&#2375;?</p><p>49 - 7+4x 385 &div;19 = 28</p></span>",
    "options": [
      "<span class=\"eqt\">19 and 7; + and x</span><span class=\"hqt\" style=\"display:none\">19 &#2324;&#2352; 7; + &#2324;&#2352; x</span>",
      "<span class=\"eqt\">385 and 49; &div; and x</span><span class=\"hqt\" style=\"display:none\">385 &#2324;&#2352; 49; &div; &#2324;&#2352; x</span>",
      "<span class=\"eqt\">49 and 19; - and +</span><span class=\"hqt\" style=\"display:none\">49 &#2324;&#2352; 19; - &#2324;&#2352; +</span>",
      "<span class=\"eqt\">7 and 4; x and  -</span><span class=\"hqt\" style=\"display:none\">7 &#2324;&#2352; 4; x &#2324;&#2352; -</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>We have:</p><p>49  -  7+4x 385 &div; 19 = 28</p><p>After interchanging, we get:</p><p>49  -  19x4+ 385 &div; 7 = 28</p><p>49- 76+ 55= 28</p><p>LHS= RHS.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If the two signs '&div;' and '-' are interchanged, then which of the following equations will be correct:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344; '&div;' &#2324;&#2352; '-' &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354; &#2342;&#2367;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379;&#2327;&#2366; :</p></span>",
    "options": [
      "<span class=\"eqt\">56 &div; 7  X  4  -  8 + 6 = 40</span><span class=\"hqt\" style=\"display:none\">56 &div; 7 X 4 - 8 + 6 = 40</span>",
      "<span class=\"eqt\">3  X  12- 18 &div; 2 + 20= 35</span><span class=\"hqt\" style=\"display:none\">3 X 12- 18 &div; 2 + 20= 35</span>",
      "<span class=\"eqt\">64 &div; 8  X  12 - 10 + 7 =32</span><span class=\"hqt\" style=\"display:none\">64 &div; 8 X 12 - 10 + 7 =32</span>",
      "<span class=\"eqt\">24 + 84 - 12 &div; 5  X  3 =16</span><span class=\"hqt\" style=\"display:none\">24 + 84 - 12 &div; 5 X 3 =16</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>After interchanging the signs, we get:</p><p>56 - 7  X  4 &div; 8 + 6 = 40</p><p>4 is not divisible by 8, so we cannot get 40 as the final value.</p><p>3  X  12 &div; 18 - 2 + 20 = 35</p><p>LHS = 3  X  2/3  -  2 +20</p><p>=20. So LHS&#8800; RHS.</p><p>64 - 8  X  12 &div; 10 + 7 =32</p><p>12 is not divisible by 10 and hence cannot give final value as 32.</p><p>24 + 84 &div; 12 - 5  X  3 =16</p><p>LHS= 24+7-5 X  3</p><p>=24+7-15</p><p>=16=RHS. Hence this equation is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which two signs and two numbers should be interchanged in the following equation to make it correct?</p><p>78 + 14 &div; 2 x 16 - 4 = 72</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2324;&#2352; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>78 + 14 &div; 2 x 16 - 4 = 72</p></span>",
    "options": [
      "<span class=\"eqt\">+ and &div;, 78 and 16</span><span class=\"hqt\" style=\"display:none\">+ &#2324;&#2352; &div;, 78 &#2324;&#2352; 16</span>",
      "<span class=\"eqt\">&div; and -, 72 and 78</span><span class=\"hqt\" style=\"display:none\">&div; &#2324;&#2352; -, 72 &#2324;&#2352; 78</span>",
      "<span class=\"eqt\">x and +, 14 and 4</span><span class=\"hqt\" style=\"display:none\">x &#2324;&#2352; +, 14 &#2324;&#2352; 4</span>",
      "<span class=\"eqt\">+ and -, 16 and 14</span><span class=\"hqt\" style=\"display:none\">+ &#2324;&#2352; -, 16 &#2324;&#2352; 14</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>After interchanging, we get:</p><p>72 + 14  -  2 x 16 &div; 4 = 78</p><p>LHS= 72+ 14- 8</p><p>=78= RHS</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>By interchanging the give numbers, which of the following equations will be correct?</p><p>7 and 9</p><p>I. 14 - 7 + 4 &div; 2 - 2 x 9 + 10 = 5</p><p>II. (2 x 3) + (12 &div; 3) - 7 + 9 = 10</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2375; &#2346;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379;&#2327;&#2366;?</p><p>7 &#2324;&#2352; 9</p><p>I. 14 - 7 + 4 &div; 2 - 2 x 9 + 10 = 5</p><p>II. (2 x 3) + (12 &div; 3) - 7 + 9 = 10</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>From I, </p><p>14 - 9 + 4 &div; 2 - 2 x 7 + 10 = 5 + 2 - 14 + 10 = 3 &#8800; 5</p><p>From II, </p><p>(2 x 3) + (12 &div; 3) - 9 + 7 = 6 + 4 - 9 + 7 = 8 &#8800; 10</p><p>Hence, option<b> (d)</b> is correct. </p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>By interchanging the given two numbers (not digits), which of the following equations will be correct?</p><p>31 and 8</p><p>I. 216 &div; 6 + 31 - 7 x 8 = 36</p><p>II. 8 - 54 + 216 &div; 6 x 31 + 17 = 282</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; (&#2313;&#2360;&#2325;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2344;&#2361;&#2368;&#2306;) &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354;&#2344;&#2375; &#2346;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2379;&#2327;&#2366;/&#2361;&#2379;&#2306;&#2327;&#2375;?</p><p>31 &#2324;&#2352; 8</p><p>I. 216 &div; 6 + 31 - 7 x 8 = 36</p><p>II. 8 - 54 + 216 &div; 6 x 31 + 17 = 282</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>It is given that, </p><p>I. 216 &div; 6 + 31 - 7 x 8 = 36</p><p>II. 8 - 54 + 216 &div; 6 x 31 + 17 = 282</p><p>After interchanging 31 and 8 we get, </p><p>216 &div; 6 + 8 - 7 x 31 = 36 + 8 - 217 = -173</p><p>Hence, the equation I will not be correct. </p><p>After interchanging 31 and 8 we get, </p><p>31- 54 + 216 &div; 6 x 8 + 17 = 31 - 54 + 288 + 17 = 282</p><p>Hence, equation II will be correct. </p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>After interchanging the two numbers 3 and 6, what will be the value of the given expression?</p><p>12  X  3 &div; 6 + 8  -  2</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; 3 &#2324;&#2352; 6 &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p><p>12 X 3 &div; 6 + 8 - 2</p></span>",
    "options": [
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>12  X  3 &div; 6 + 8  -  2</p><p>After interchanging the two numbers 3 and 6, we get -</p><p>12  X  6 &div; 3 + 8  -  2</p><p>= 12 x 2 + 8 - 2</p><p>= 24 + 6</p><p>= 30</p><p>So, '30' will be the value of the given expression.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which two numbers from amongst the given options should be interchanged to make the given equation correct? </p><p>7 + 15 x 11  -  (98 &div; 9) = 160</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2344; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>7 + 15 x 11 - (98 &div; 9) = 160</p></span>",
    "options": [
      "<span class=\"eqt\">15 and 9</span><span class=\"hqt\" style=\"display:none\">15 &#2324;&#2352; 9</span>",
      "<span class=\"eqt\">9 and 11</span><span class=\"hqt\" style=\"display:none\">9 &#2324;&#2352; 11</span>",
      "<span class=\"eqt\">7 and 15</span><span class=\"hqt\" style=\"display:none\">7 &#2324;&#2352; 15</span>",
      "<span class=\"eqt\">7 and 9</span><span class=\"hqt\" style=\"display:none\">7 &#2324;&#2352; 9</span>"
