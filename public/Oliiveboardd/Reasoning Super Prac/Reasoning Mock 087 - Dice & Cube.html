<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">

                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->

                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">

                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Two orientations of the same box are shown. How will this box look when unfolded?</p><p><img width=200 height=146 id=\"Picture 45\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19250/image005.jpg\"></p><p><img width=624 height=227 id=\"Picture 48\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19250/image006.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2368; &#2342;&#2379; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2351;&#2361; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2367;&#2326;&#2366;&#2312; &#2342;&#2375;&#2327;&#2366;?</p><p><img width=\"200\" height=\"146\" id=\"Picture 45\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19250/image005.jpg\"></p><p><img width=\"624\" height=\"227\" id=\"Picture 48\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19250/image006.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only IV</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In this type of format,</p><p><img width=156 height=200 id=\"Picture 32\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19250/image007.jpg\"></p><p>@ lies opposite $; * lies opposite to + and ! lies opposite to &amp;.</p><p><b>Figure I:</b> A lies opposite R, C lies opposite to B and P lies opposite to Q.</p><p>Thus, A is not adjacent to R, C is not adjacent to B and P is not adjacent to Q which are similar to the box images.</p><p>So, figure I is correct.</p><p><b>Figure II:</b> P lies opposite Q, C lies opposite to B and A lies opposite to R.</p><p>Thus, P is not adjacent to Q, C is not adjacent to B and A is not adjacent to R which are similar to the box images.</p><p>So, figure II is correct.</p><p><b>Figure III:</b> C lies opposite B, Q lies opposite to P and A lies opposite to R.</p><p>Thus, C is not adjacent to B, Q is not adjacent to P and A is not adjacent to R which are similar to the box images.</p><p>So, figure III is correct.</p><p><b>Figure IV:</b> P lies opposite C, Q lies opposite to B and A lies opposite to R.</p><p>Thus, A is not adjacent to R. Q is adjacent to B and P is adjacent to C according to the box images.</p><p>So, figure IV is incorrect.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Two orientations of the same box are shown. How will this box look when unfolded?</p><p><img width=198 height=167 id=\"Picture 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19369/image006.jpg\"></p><p><img width=614 height=229 id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19369/image007.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2368; &#2342;&#2379; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2368; &#2327;&#2351;&#2368; &#2361;&#2376;&#2306;&#2404; &#2326;&#2369;&#2354;&#2344;&#2375; &#2346;&#2352; &#2351;&#2361; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2376;&#2360;&#2366; &#2342;&#2367;&#2326;&#2375;&#2327;&#2366;?</p><p><img width=\"198\" height=\"167\" id=\"Picture 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19369/image006.jpg\"></p><p><img width=\"614\" height=\"229\" id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19369/image007.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In this type of format,</p><p><img width=155 height=212 id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19369/image008.jpg\"></p><p>1 lies opposite to 6; 2 lies opposite to 4 and 3 lies opposite to 5.</p><p><b>Figure I:</b> C lies opposite to A; E lies opposite to B and F lies opposite to D.</p><p>Thus, C is not adjacent to A, E is not adjacent to B and F is not adjacent to D.</p><p>So, figure I is incorrect.</p><p><b>Figure II:</b> A lies opposite to B; E lies opposite to D and F lies opposite to C.</p><p>Thus, A is not adjacent to B, E is not adjacent to D and F is not adjacent to C.</p><p>So, figure II is correct.</p><p><b>Figure III:</b> B lies opposite to E; F lies opposite to D and A lies opposite to C.</p><p>Thus, B is not adjacent to E, F is not adjacent to D and A is not adjacent to C.</p><p>So, figure III is incorrect.</p><p><b>Figure IV:</b> D lies opposite to B; A lies opposite to C and F lies opposite to E.</p><p>Thus, D is not adjacent to B, A is not adjacent to C and F is not adjacent to E.</p><p>So, figure IV is incorrect.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>When the following flattened-out figure is folded to form a cube, which of the following options cannot be the folded cube? </p><p><img width=624 height=326 id=\"Drawing 11\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20041/image012.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2346;&#2366;&#2335; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2379; &#2319;&#2325; &#2328;&#2344; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2379;&#2337;&#2364;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2350;&#2369;&#2337;&#2364;&#2366; &#2361;&#2369;&#2310; &#2328;&#2344; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p><p><img width=\"624\" height=\"326\" id=\"Drawing 11\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20041/image012.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In the given flattened-out figure, faces s and v, faces t and f, and faces h and r are opposite to each other. In figure III, faces s and v are adjacent to each other.</p><p>Hence, figure <b>III</b> cannot be the folded cube.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Two orientations of the same box are shown. How will this box look when unfolded?</p><p><img width=302 height=192 id=\"Picture 21\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19872/image019.png\" alt=2.png></p><p>I:<img width=321 height=257 id=\"Picture 27\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19872/image020.png\" alt=2.png></p><p>II:<img width=334 height=267 id=\"Picture 26\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19872/image021.png\" alt=1.png></p><p>III:<img width=319 height=280 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19872/image022.png\" alt=1.png></p><p>IV:<img width=335 height=264 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19872/image023.png\" alt=2.png></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2337;&#2367;&#2348;&#2381;&#2348;&#2375; &#2325;&#2375; &#2342;&#2379; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; (&#2323;&#2352;&#2367;&#2319;&#2306;&#2335;&#2375;&#2358;&#2344;) &#2342;&#2352;&#2381;&#2358;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2337;&#2367;&#2348;&#2381;&#2348;&#2375; &#2325;&#2379; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2351;&#2361; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2367;&#2326;&#2366;&#2312; &#2342;&#2375;&#2327;&#2366;?</p><p><img width=\"302\" height=\"192\" id=\"Picture 21\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19872/image019.png\" alt=\"2.png\"></p><p>I:<img width=\"321\" height=\"257\" id=\"Picture 27\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19872/image020.png\" alt=\"2.png\"></p><p>II:<img width=\"334\" height=\"267\" id=\"Picture 26\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19872/image021.png\" alt=\"1.png\"></p><p>III:<img width=\"319\" height=\"280\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19872/image022.png\" alt=\"1.png\"></p><p>IV:<img width=\"335\" height=\"264\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19872/image023.png\" alt=\"2.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>",
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>This box will look when unfolded:</p><p><img width=335 height=264 id=\"Picture 22\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19872/image023.png\" alt=2.png></p><p>1 lies opposite to 4; 3 lies opposite to 5 and 6 lies opposite to 2.</p><p>Figure I: 5 lies opposite to 6; 2 lies opposite to 1; 4 lies opposite to 3. Thus 3 is not adjacent to 4. So, figure I is incorrect.</p><p>Figure II: 3 lies opposite to 4; 5 lies opposite to 2; 6 lies opposite to 1. Thus 2 is not adjacent to 5. So, figure II is incorrect.</p><p>Figure III: 2 lies opposite to 5; 4 lies opposite 1; 3 lies opposite to 6. Thus 3 is not adjacent to 6. So, figure III is incorrect.</p><p>Figure IV: 1 lies opposite to 4; 3 lies opposite to 5; 6 lies opposite to 2. Thus, figure IV is correct.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Two orientations of the same box are shown. How will this box look when unfolded?</p><p><img width=241 height=107 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20759/image009.png\"></p><p>I.<img width=198 height=220 id=\"Picture 11\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20759/image010.png\"></p><p>II.<img width=189 height=218 id=\"Picture 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20759/image011.png\"></p><p>III.<img width=185 height=219 id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20759/image012.png\"></p><p>IV.<img width=193 height=220 id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20759/image013.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2337;&#2367;&#2348;&#2381;&#2348;&#2375; &#2325;&#2368; &#2342;&#2379; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2337;&#2367;&#2348;&#2381;&#2348;&#2375; &#2325;&#2379; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2351;&#2361; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2367;&#2326;&#2366;&#2312; &#2342;&#2375;&#2327;&#2366;?</p><p><img width=\"241\" height=\"107\" id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20759/image009.png\"></p><p>I.<img width=\"198\" height=\"220\" id=\"Picture 11\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20759/image010.png\"></p><p>II.<img width=\"189\" height=\"218\" id=\"Picture 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20759/image011.png\"></p><p>III.<img width=\"185\" height=\"219\" id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20759/image012.png\"></p><p>IV.<img width=\"193\" height=\"220\" id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20759/image013.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In this type of format,</p><p><img width=196 height=224 id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20759/image008.png\"></p><p>A lies opposite to E, B lies opposite to D and C lies opposite to F.</p><p><b>Figure a: </b>% lies opposite to $, # lies opposite to &amp; and @ lies opposite to +.</p><p>Thus, % is not adjacent to $, # is not adjacent to &amp; and @ is not adjacent to +.</p><p>So, figure a is incorrect.</p><p><b>Figure b:</b> @ lies opposite to &amp;, + lies opposite to % and $ lies opposite to #.</p><p>Thus, @ is not adjacent to &amp;, + is not adjacent to % and $ is not adjacent to #.</p><p>So, figure b is incorrect.</p><p><b>Figure c: </b>% lies opposite to #, @ lies opposite to + and &amp; lies opposite to $.</p><p>Thus, % is not adjacent to #, @ is not adjacent to + and &amp; is not adjacent to $.</p><p>So, figure c is incorrect.</p><p><b>Figure d: </b># lies opposite to %, + lies opposite to $ and &amp; lies opposite to @.</p><p>Thus, # is not adjacent to %, + is not adjacent to $ and &amp; is not adjacent to @.</p><p>So, figure d is correct.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Two orientation of the same box are shown, How will this box look when unfolded? </p><p><img width=203 height=151 id=\"Picture 37\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20778/image028.jpg\"></p><p><img width=640 height=244 id=\"Picture 21\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20778/image029.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2368; &#2342;&#2379; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2351;&#2361; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2376;&#2360;&#2366; &#2342;&#2367;&#2326;&#2375;&#2327;&#2366;?</p><p><img width=\"203\" height=\"151\" id=\"Picture 37\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20778/image028.jpg\"></p><p><img width=\"640\" height=\"244\" id=\"Picture 21\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20778/image029.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">Both I and III</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; III &#2342;&#2379;&#2344;&#2379;&#2306;</span>",

    "correct_option_id": 2,
    "solution": "<p>In this type of format, </p><p><img width=165 height=201 id=\"Picture 29\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20778/image030.jpg\"></p><p>@ lies opposite to $; ! lies to &amp; and * lies opposite to +. </p><p><b>Figure I:</b> 1 lies opposite to 3; @ lies opposite to 2; ? lies opposite to #. </p><p>Thus, 1 is not adjacent to 3, @ is not adjacent to 2 and ? is not adjacent to #. </p><p>So, figure I is correct. </p><p><b>Figure II:</b> 3 lies opposite to 2; # lies opposite to 1; ? lies opposite to @. </p><p>Thus, 3 is not adjacent to 2, # is not adjacent to 1 and ? is not adjacent to @. </p><p>So, figure II is incorrect. </p><p><b>Figure III:</b> @ lies opposite to #; 1 lies opposite to ?; 2 lies opposite to 3. </p><p>Thus, @ is not adjacent to #, 1 is not adjacent to ? and 2 is not adjacent to 3. </p><p>So, figure III is incorrect. </p><p><b>Figure IV:</b> 2 lies opposite to 1; 3 lies opposite to ?; @ lies opposite to #. </p><p>Thus, 2 is not adjacent to 1, 3 is not adjacent to ? and @ is not adjacent to #. </p><p>So, figure IV is incorrect.</p>",

    "question": "<span class=\"eqt\"><p>A cube is made by folding the given sheet. Which of the following cubes can be formed by using the given sheet? </p><p><img width=128 height=168 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21127/image051.jpg\"></p><p><img width=467 height=135 id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21127/image052.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2358;&#2368;&#2335; &#2325;&#2379; &#2350;&#2379;&#2337;&#2364;&#2325;&#2352; &#2319;&#2325; &#2328;&#2344; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2368; &#2327;&#2312; &#2358;&#2368;&#2335; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2328;&#2344; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p><p><img width=\"128\" height=\"168\" id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21127/image051.jpg\"></p><p><img width=\"467\" height=\"135\" id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21127/image052.jpg\"></p></span>",
