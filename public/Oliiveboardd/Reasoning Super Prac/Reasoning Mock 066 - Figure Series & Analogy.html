<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Select the figure that will come next in the following figure series. </p><p><img width=624 height=332 id=\"Drawing 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16919/image015.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2310;&#2327;&#2375; &#2310;&#2319;&#2327;&#2368;&#2404;<img width=\"624\" height=\"332\" id=\"Drawing 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16919/image015.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The symbols X, O and # follow a similar sequence when they move. The shaded rectangle just changes its position in an alternate manner. </p><p>Hence, figure <b>II</b> will come next in the given figure series. </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Select a suitable figure from the option figures (I), (II), (III) and (IV) that will follow the same series as established in the given figures below.</p><p><img width=526 height=157 id=\"Picture 56\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18529/image065.jpg\"></p><p><img width=591 height=167 id=\"Picture 57\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18529/image066.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; (I), (II), (III) &#2324;&#2352; (IV) &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2344;&#2368;&#2330;&#2375; &#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2360;&#2350;&#2366;&#2344; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2375;&#2327;&#2368;&#2404;</p><p><img width=\"526\" height=\"157\" id=\"Picture 56\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18529/image065.jpg\"></p><p><img width=\"591\" height=\"167\" id=\"Picture 57\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18529/image066.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Figure A, B and C consist of two figures- the outer figure and inner figure. In each step, the outer figure rotates 90 degrees in the clockwise direction and the inner figure rotates 90 degrees in an anticlockwise direction.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Select the figure from among the given options that can replace the question mark (?) in the following series.</p><p><img width=564 height=265 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22688/image040.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p><img width=\"564\" height=\"265\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22688/image040.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In each step  - </p><p>'@' is shifting its position in an anti-clockwise direction, with an alternate gap of 1, 2 and so on.</p><p>'+' is shifting its position in an anti-clockwise direction.</p><p>'%' is shifting its position in opposite direction.</p><p>Arrow figure is rotating 90<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22688/image041.png\"> clockwise direction.</p><p>Thus, the answer is option figure (IV)  - </p><p><img width=169 height=183 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22688/image042.png\"></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Four figures are given in the following question. All figures have something in common except one. Find the odd figure out. </p><p><img width=624 height=193 id=\"Drawing 0\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p17556/image001.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2330;&#2366;&#2352; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352; &#2360;&#2349;&#2368; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2344; &#2325;&#2369;&#2331; &#2360;&#2350;&#2366;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404; &#2309;&#2360;&#2306;&#2327;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"624\" height=\"193\" id=\"Drawing 0\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p17556/image001.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Figures (I), (III) and (IV) are clockwise rotations of the same figure and in figure (II) the positions of the rectangle and the shaded region are different from the other three figures. Hence, figure <b>(II)</b> is the odd one out here.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Out of the following four figures, three are alike in same manner and one differs from these in that manner. Select the odd figure.</p><p><img width=402 height=127 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22325/image021.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2330;&#2366;&#2352; &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2340;&#2368;&#2344; &#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306; &#2324;&#2352; &#2360;&#2350;&#2366;&#2344; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2376;&#2404; &#2357;&#2367;&#2359;&#2350; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p><img width=\"402\" height=\"127\" id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22325/image021.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Except figure II, in all other figures, the vertical arrows are pointing downwards while the horizontal arrows are pointing in the left direction. </p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Figure A is related to B in a certain pattern. Following the same pattern, figure C is related to D. Study the pattern and select the figure which should be placed in place of D.</p><p><img width=575 height=286 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image055.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2325;&#2371;&#2340;&#2367; A &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2350;&#2375;&#2306; B &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2313;&#2360;&#2368; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2310;&#2325;&#2371;&#2340;&#2367; C, D &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2360;&#2375; D &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2352;&#2326;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p><img width=\"575\" height=\"286\" id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image055.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Heart figure is rotating 90<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image056.png\"> anti-clockwise direction.</p><p>Mirror image of 'L' of figure A is written in figure B.</p><p>Triangle of figure A and then one side is get added which becomes a square in figure B.</p><p>Similarly,</p><p>Star figure is rotating 90<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image057.png\"> anti-clockwise direction.</p><p>Mirror image of 'J' of figure C is written in figure D.</p><p>Pentagon of figure C and then one side is get added which becomes Hexagon in figure D.</p><p>So, the option figure (IV) is related figure (C).</p><p><img width=166 height=136 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image058.png\"></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Select the figure from among the following given options that can replace the question mark(?) in the following series. </p><p><img width=614 height=148 id=\"Picture 66\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15868/image066.png\"></p><p><img width=416 height=122 id=\"Picture 55\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15868/image067.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"614\" height=\"148\" id=\"Picture 66\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15868/image066.png\"></p><p><img width=\"416\" height=\"122\" id=\"Picture 55\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15868/image067.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Figure B is a representation of Venn diagram of Medicine, Cream, Capsule and Gel. </p><p>Figure D is a representation of Venn diagram of Metal, Copper, Platinum and Bromine. </p><p>So, the Venn diagram of Male, Father, Uncle and Brother is given in option figure I. </p>",
    "question_index": 6
  },
  {
