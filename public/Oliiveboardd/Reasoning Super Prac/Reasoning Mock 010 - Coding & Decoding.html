<body>

        </div>
    </div>

  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">2 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">71 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>In a certain code language, 'make some noise' is written as 'ja sp ko' and 'noise is painful' is written as 'la ma sp'. How will 'noise' be written in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'make some noise' &#2325;&#2379; 'ja sp ko' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'noise is painful' &#2325;&#2379; 'la ma sp' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'noise' &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",

    "correct_option_id": 3,

    "question_index": 0

  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">17 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>In a certain code language, 'good bright boy' is coded as 'xd yf vj' and 'boy is lazy' is coded as 'sb xd ql'. How is 'boy' coded in the given language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'good bright boy' &#2325;&#2379; 'xd yf vj' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'boy is lazy' &#2325;&#2379; 'sb xd ql' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2368; &#2327;&#2312; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'boy' &#2325;&#2379; &#2325;&#2376;&#2360;&#2375; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",

    "question_index": 1
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">15 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>In a certain code language, 'health is wealth' is coded as '626', 'exercise regularly' is coded as '89' and 'bring good food' is coded as '544'. How will 'balanced diet is key' be coded in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'health is wealth' &#2325;&#2379; '626' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, 'exercise regularly' &#2325;&#2379; '89' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; 'bring good food' &#2325;&#2379; '544' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2344; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'balanced diet is key' &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>It is given that,</p><p>'health is wealth' is coded as '626' ........(I)</p><p>'exercise regularly' is coded as '89' ........(II)</p><p>'bring good food' is coded as '544'..........(III)</p><p>From I, II, and III, we can deduce that the words are replaced by the number of letters in each word.</p><p>Hence, the code for 'balanced diet is key' would be<b> '8423'.</b></p>",
    "question_index": 2

  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">24 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>In a certain code language, 'He is my nephew' is coded as 'Co Pv Zs Mn'. 'That is my car' is coded as 'Zs Pt Pv Ga'. 'He is your uncle' is coded as 'Co Pv Ex Yz'. What is the code for 'nephew' in this code language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'He is my nephew' &#2325;&#2379; 'Co Pv Zs Mn' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; 'That is my car' &#2325;&#2379; 'Zs Pt Pv Ga' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; 'He is your uncle' &#2325;&#2379; 'Co Pv Ex Yz' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'nephew' &#2325;&#2366; &#2325;&#2379;&#2337; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "question_index": 3

  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">26 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>In a certain code language, 'will make you' is written as 'ft fy fd' and 'you see what' is written as 'fi fo ft'. How will 'you' be written in the given language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'will make you' &#2325;&#2379; 'ft fy fd' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'you see what' &#2325;&#2379; 'fi fo ft' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2368; &#2327;&#2312; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'you' &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",

    "solution": "<p>In this code language, </p><p>Will/make is coded as fy/fd</p><p>See/what is coded as fi/fo</p><p>You is coded as ft</p><p>So, option (d) is the correct answer. </p>",

  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">38 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>In a certain code language, 'bring hot food' is coded as 'ud lp sj' and 'food is tasty' is coded as 'sj xk jt'. How is 'food' coded in the given language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'bring hot food' &#2325;&#2379; 'ud lp sj' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'food is delicious' &#2325;&#2379; 'sj xk jt' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2368; &#2327;&#2312; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'food' &#2325;&#2379; &#2325;&#2376;&#2360;&#2375; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",

  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">45 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>In a certain code language, 'Do you follow' is coded as 'MP TQ IX' and 'How are you' is coded as 'TQ LV IJ'. How is 'you' coded in that code language? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'Do you follow' &#2325;&#2379; 'MP TQ IX' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; 'How are you' &#2325;&#2379; 'TQ LV IJ' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'you' &#2325;&#2379; &#2325;&#2376;&#2360;&#2375; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;? </p></span>",
