    "question": "<span class=\"eqt\"><p>Six stones have different sizes. Stone A is bigger than stones D and E. Stone B is smaller than stone E. Stone C is bigger than stone A but not the biggest. Stone B is smaller than stone F but not the smallest. Which of the stones is the fourth biggest among all?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2331;&#2361; &#2346;&#2340;&#2381;&#2341;&#2352;&#2379;&#2306; &#2325;&#2375; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2310;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306;&#2404; &#2346;&#2340;&#2381;&#2341;&#2352; A, &#2346;&#2340;&#2381;&#2341;&#2352; D &#2324;&#2352; E &#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404; &#2346;&#2340;&#2381;&#2341;&#2352; B, &#2346;&#2340;&#2381;&#2341;&#2352; E &#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2361;&#2376;&#2404; &#2346;&#2340;&#2381;&#2341;&#2352; C, &#2346;&#2340;&#2381;&#2341;&#2352; A &#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404; &#2346;&#2340;&#2381;&#2341;&#2352; B, &#2346;&#2340;&#2381;&#2341;&#2352; F &#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404; &#2360;&#2349;&#2368; &#2346;&#2340;&#2381;&#2341;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2330;&#2380;&#2341;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2346;&#2340;&#2381;&#2341;&#2352; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">E</span><span class=\"hqt\" style=\"display:none\">E</span>",
      "<span class=\"eqt\">D</span><span class=\"hqt\" style=\"display:none\">D</span>",
      "<span class=\"eqt\">F</span><span class=\"hqt\" style=\"display:none\">F</span>",
      "<span class=\"eqt\">A</span><span class=\"hqt\" style=\"display:none\">A</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Six stones have different sizes.</p><p>Stone A is bigger than stones D and E. Stone B is smaller than stone E.</p><p>Case 1: A &gt; D &gt; E &gt; B</p><p>Case 2: A &gt; E &gt; D &gt; B</p><p>Case 2a: A &gt; E &gt; B &gt; D</p><p>Stone C is bigger than stone A but not the biggest.</p><p>Case 1: __&gt; C &gt; A &gt; D &gt; E &gt; B</p><p>Case 2: __&gt; C &gt; A &gt; E &gt; D &gt; B</p><p>Case 2a: __&gt; C &gt; A &gt; E &gt; B &gt; D</p><p>Stone B is smaller than stone F but not the smallest. Thus, case 1 and case 2 are invalid.</p><p>Therefore, we get:</p><p>F &gt; C &gt; A &gt; E &gt; B &gt; D</p><p>Thus, stone E is the fourth biggest among all.</p>",
    "question_index": 8

    "question": "<span class=\"eqt\"><p>Six books namely Book 1, Book 2, Book 3, Book 4, Book 5 and Book 6 are placed one above the other in a stack. Three books are placed between Book 3 and Book 2. Book 5 is placed immediately below Book 3. Book 1 is placed immediately below Book 4 and immediately above Book 6. Then how many books are placed between Book 1 and Book 5?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2331;&#2361; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2309;&#2352;&#2381;&#2341;&#2366;&#2340;&#2381; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 1, &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 2, &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 3, &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 4, &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 5 &#2324;&#2352; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 6 &#2325;&#2379; &#2319;&#2325; &#2360;&#2381;&#2335;&#2376;&#2325; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2375; &#2314;&#2346;&#2352; &#2319;&#2325; &#2325;&#2375; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2352;&#2326;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 3 &#2324;&#2352; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 2 &#2325;&#2375; &#2348;&#2368;&#2330; &#2340;&#2368;&#2344; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2375;&#2306; &#2352;&#2326;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 5, &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 3 &#2325;&#2375; &#2336;&#2368;&#2325; &#2344;&#2368;&#2330;&#2375; &#2352;&#2326;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 1 &#8203;&#8203;&#2325;&#2379; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 4 &#2325;&#2375; &#2336;&#2368;&#2325; &#2344;&#2368;&#2330;&#2375; &#2324;&#2352; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 6 &#2325;&#2375; &#2336;&#2368;&#2325; &#2314;&#2346;&#2352; &#2352;&#2326;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 1 &#8203;&#8203;&#2324;&#2352; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; 5 &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2340;&#2344;&#2368; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2375;&#2306; &#2352;&#2326;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;?</p></span>",

    "correct_option_id": 3,
    "solution": "<p>Six books namely Book 1, Book 2, Book 3, Book 4, Book 5 and Book 6 are placed one above the other in a stack.</p><p>Three books are placed between Book 3 and Book 2.</p><p>Book 5 is placed immediately below Book 3.</p><p>So, there are two cases possible i.e., Case 1 and Case 2.</p><p>Case 1:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 2</td></tr></table></p><p>Case 2:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 5</td></tr></table></p><p>Book 1 is placed immediately below Book 4 and immediately above Book 6.</p><p>So, Case 1 will be invalid.</p><p>Case 1: (Invalid)<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 2</td></tr></table></p><p>Case 2:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 4</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 6</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 5</td></tr></table></p><p>Finally, we get,<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 4</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 6</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Book 5</td></tr></table></p><p>So, there are two books placed between Book 1 and Book 5.</p>",

40;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2404; K &#2325;&#2375; &#2309;&#2306;&#2325; J &#2360;&#2375; &#2325;&#2350; &#2361;&#2376;&#2306;&#2404; S, J &#2360;&#2375; &#2336;&#2368;&#2325; &#2314;&#2346;&#2352; &#2352;&#2376;&#2306;&#2325; &#2346;&#2352; &#2361;&#2376;&#2404; D &#2325;&#2375; &#2309;&#2306;&#2325; T &#2360;&#2375; &#2325;&#2350; &#2361;&#2376;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; Q &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2306; &#2324;&#2352; Q, S &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2352;&#2376;&#2306;&#2325; &#2346;&#2352; &#2361;&#2376;&#2404; N &#2325;&#2375; &#2309;&#2306;&#2325; J &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2306;&#2404; N &#2325;&#2368; &#2352;&#2376;&#2306;&#2325; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
