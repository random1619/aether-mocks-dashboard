<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which letter cluster will replace the question mark (?) in the following series?</p><p><b>BALL, YFNR, ?, SPRD, PUTJ</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2325;&#2381;&#2359;&#2352; &#2360;&#2350;&#2370;&#2361; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2375;&#2327;&#2366;?</p><p><b>BALL, YFNR, ?, SPRD, PUTJ</b></p></span>",
    "options": [
      "<span class=\"eqt\">CLQY</span><span class=\"hqt\" style=\"display:none\">CLQY</span>",
      "<span class=\"eqt\">VKPX</span><span class=\"hqt\" style=\"display:none\">VKPX</span>",
      "<span class=\"eqt\">XLPY</span><span class=\"hqt\" style=\"display:none\">XLPY</span>",
      "<span class=\"eqt\">DLRX</span><span class=\"hqt\" style=\"display:none\">DLRX</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>B (AZ) Y (XW) <b>V</b> (UT) S (RQ) P</p><p>A (BCDE) F (GHIJ) <b>K </b>(LMNO) P (QRST) U</p><p>L (M) N (O) <b>P</b> (Q) R (S) T</p><p>L (MNOPQ) R (STUVW) <b>X</b> (YZABC) D (EFGHI) J</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Find the missing term of the given series which can replace the (?) sign.</p><p>T31G, R35J, P44M, N60P,L85S, ? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2366; &#2354;&#2369;&#2346;&#2381;&#2340; &#2346;&#2342; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; (?) &#2330;&#2367;&#2361;&#2381;&#2344; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>T31G, R35J, P44M, N60P,L85S, ?</p></span>",
    "options": [
      "<span class=\"eqt\">K121U</span><span class=\"hqt\" style=\"display:none\">K121U</span>",
      "<span class=\"eqt\">J121V</span><span class=\"hqt\" style=\"display:none\">J121V</span>",
      "<span class=\"eqt\">J118U</span><span class=\"hqt\" style=\"display:none\">J118U</span>",
      "<span class=\"eqt\">K124V</span><span class=\"hqt\" style=\"display:none\">K124V</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>T  -  2 = R, R  -  2 = P, P  -  2 = N, N  -  2 = L, L  -  2 = <b>J</b></p><p>31 + (2<sup>2</sup> = 4) = 35</p><p>35 + (3<sup>2</sup> = 9) = 44</p><p>44 + (4<sup>2</sup> = 16) = 60</p><p>60 + (5<sup>2</sup> = 25) = 85</p><p>85 + (6<sup>2</sup> = 36) = <b>121</b></p><p>G + 3 = J, J + 3 = M, M + 3 = P, P + 3 = S, S + 3 = <b>V</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Select the term that will come next in the following series:</p><p>d, ef, hij, mnop, _____ </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2310;&#2327;&#2375; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2342; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><p>d, ef, hij, mnop, _____</p></span>",
    "options": [
      "<span class=\"eqt\">tuvw</span><span class=\"hqt\" style=\"display:none\">tuvw</span>",
      "<span class=\"eqt\">stuvw</span><span class=\"hqt\" style=\"display:none\">stuvw</span>",
      "<span class=\"eqt\">stuvwxy</span><span class=\"hqt\" style=\"display:none\">stuvwxy</span>",
      "<span class=\"eqt\">tuvwx</span><span class=\"hqt\" style=\"display:none\">tuvwx</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>d + 1 = e</p><p>two terms written together and leave a gap of 1</p><p>ef + 2= h</p><p>three terms written together and leave a gap of 2</p><p>hij + 3 = m</p><p>four terms written together and leave a gap of 3</p><p>mnop +4= t</p><p>five terms written together and leave a gap of 4</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option that represents the elements that when placed from left to right in the blanks below will complete the series. </p><p><b>7 H _ 3 0 _ _ 4 7 H C _ 0 M N _ _ H C _ 0 M _ _ 7 H _ _ 0 M _ 4</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2366;&#2312;&#2306; &#2360;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2352;&#2326;&#2375; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><b>7 H _ 3 0 _ _ 4 7 H C _ 0 M N _ _ H C _ 0 M _ _ 7 H _ _ 0 M _ 4</b></p></span>",
    "options": [
      "<span class=\"eqt\">C N M 3 4 7 3 M 4 C 3 N</span><span class=\"hqt\" style=\"display:none\">C N M 3 4 7 3 M 4 C 3 N</span>",
      "<span class=\"eqt\">C M N 3 4 7 3 N 4 C 3 N</span><span class=\"hqt\" style=\"display:none\">C M N 3 4 7 3 N 4 C 3 N</span>",
      "<span class=\"eqt\">C M N 3 4 7 3 M C 4 3 N</span><span class=\"hqt\" style=\"display:none\">C M N 3 4 7 3 M C 4 3 N</span>",
      "<span class=\"eqt\">C M N 3 3 7 4 M 4 C 3 N</span><span class=\"hqt\" style=\"display:none\">C M N 3 3 7 4 M 4 C 3 N</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, the combination <b>'7HC30MN4'</b> is repeated four times to get the series. Hence, the complete series is, </p><p><b>7 H <u>C</u> 3 0 <u>M N</u> 4 7 H C <u>3</u> 0 M N <u>4 7</u> H C <u>3</u> 0 M <u>N 4</u> 7 H <u>C 3</u> 0 M <u>N</u> 4</b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option that represents the letters that when placed from left to right in the blanks below will complete the series. </p><p><b>N __ C __ M R __ __ M __ R M __ Z __ __ C R M __ Z N M __ R M __ __ </b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2313;&#2344; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2366;&#2319;&#2305; &#2352;&#2326;&#2344;&#2375; &#2346;&#2352; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2346;&#2370;&#2352;&#2368; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;&#2404;</p><p><b>N __ C __ M R __ __ M __ R M __ Z __ __ C R M __ Z N M __ R M __ __ </b></p></span>",
    "options": [
      "<span class=\"eqt\">M R Z N C R N M R C R Z</span><span class=\"hqt\" style=\"display:none\">M R Z N C R N M R C R Z</span>",
      "<span class=\"eqt\">M R Z M R Z C M R C R Z</span><span class=\"hqt\" style=\"display:none\">M R Z M R Z C M R C R Z</span>",
      "<span class=\"eqt\">M R R C C Z N M R C R Z</span><span class=\"hqt\" style=\"display:none\">M R R C C Z N M R C R Z</span>",
      "<span class=\"eqt\">M R Z N C R M N C C R Z</span><span class=\"hqt\" style=\"display:none\">M R Z N C R M N C C R Z</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Here, the letter combination <b>'NMCRMRZ'</b> is repeated four times to get the series. Hence, the complete series is, </p><p><b>N <u>M</u> C <u>R</u> M R <u>Z N</u> M <u>C</u> R M <u>R</u> Z <u>N M</u> C R M <u>R</u> Z N M <u>C</u> R M <u>R Z</u> </b></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the pattern and complete the following string of letters. </p><p><b>Y __ E D 9 3 S __ 4 E D 9 __ S Y 4 __ D 9 3 S Y 4 __ D 9 3 __</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2379; &#2346;&#2361;&#2330;&#2366;&#2344;&#2367;&#2319; &#2324;&#2352; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2368; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><b>Y __ E D 9 3 S __ 4 E D 9 __ S Y 4 __ D 9 3 S Y 4 __ D 9 3 __</b></p></span>",
    "options": [
      "<span class=\"eqt\">3 Y 3 D S S</span><span class=\"hqt\" style=\"display:none\">3 Y 3 D S S</span>",
      "<span class=\"eqt\">S E 4 3 E Y</span><span class=\"hqt\" style=\"display:none\">S E 4 3 E Y</span>",
      "<span class=\"eqt\">4 Y 3 E E S</span><span class=\"hqt\" style=\"display:none\">4 Y 3 E E S</span>",
      "<span class=\"eqt\">Y E D D 3 9</span><span class=\"hqt\" style=\"display:none\">Y E D D 3 9</span>"

    "correct_option_id": 2,
    "solution": "<p>Here, the pattern in <b>'Y 4 E D 9 3 S'</b> and the pattern is repeated to create the string of letters. </p><p>The complete string of letters is, </p><p><b>Y <u>4</u> E D 9 3 S <u>Y</u> 4 E D 9 <u>3</u> S Y 4 <u>E</u> D 9 3 S Y 4 <u>E</u> D 9 3 <u>S</u></b></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Select the combination of letters and numbers that when sequentially placed in the blanks of the given series will complete the series.</p><p>D _ H _ 5 _ 7 _ U 5 D _ H U _</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2324;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2313;&#2360; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2319; &#2332;&#2367;&#2360;&#2375; &#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2375; &#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2326;&#2344;&#2375; &#2346;&#2352; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2346;&#2370;&#2352;&#2381;&#2339; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;&#2404;</p><p>D _ H _ 5 _ 7 _ U 5 D _ H U _</p></span>",
    "options": [
      "<span class=\"eqt\">7UH57D</span><span class=\"hqt\" style=\"display:none\">7UH57D</span>",

      "<span class=\"eqt\">7U5U75</span><span class=\"hqt\" style=\"display:none\">7U5U75</span>"

    "solution": "<p>The series is as :</p><p>D7HU5 D7HU5 D7HU5</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option corresponding to the letter cluster which can replace the question mark (?) in the given series.</p><p><b>MNO, VWX, EFG, NOP, WXY, ?</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2309;&#2344;&#2369;&#2352;&#2370;&#2346; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p><b>MNO, VWX, EFG, NOP, WXY, ?</b></p></span>",

      "<span class=\"eqt\">BCD</span><span class=\"hqt\" style=\"display:none\">BCD</span>",

      "<span class=\"eqt\">HIJ</span><span class=\"hqt\" style=\"display:none\">HIJ</span>"

    "correct_option_id": 1,
    "solution": "<p><b>MNO</b> (P Q R S T U) <b>VWX</b> (Y Z A B C D) <b>EFG</b> (H I J K L M) <b>NOP</b> (Q R S T U V) <b>WXY</b> (Z A B C D E) <b>FGH</b></p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Select the letter cluster from among the given options that can replace the question mark (?) in the following series.</p><p>QUIT, LUDT, ?, GYYX, GCYB, BCTB</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2309;&#2325;&#2381;&#2359;&#2352; &#2360;&#2350;&#2370;&#2361; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>QUIT, LUDT, ?, GYYX, GCYB, BCTB</p></span>",

      "<span class=\"eqt\">LUYW</span><span class=\"hqt\" style=\"display:none\">LUYW</span>",

      "<span class=\"eqt\">LYDX</span><span class=\"hqt\" style=\"display:none\">LYDX</span>"
