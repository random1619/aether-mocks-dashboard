<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>

                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>

                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following diagram best depicts the relationship between circle, triangle and square, where circle means 'Mangoes', triangle means 'Sweet dishes' and square means 'Yellow colour'. </p><p><img width=195 height=426 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25017/image002.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2310;&#2352;&#2375;&#2326; &#2357;&#2371;&#2340;&#2381;&#2340;, &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2324;&#2352; &#2357;&#2352;&#2381;&#2327; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2325;&#2379; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2375; &#2338;&#2306;&#2327; &#2360;&#2375; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2361;&#2366;&#2305; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; '&#2310;&#2350;', &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; '&#2350;&#2368;&#2336;&#2375; &#2357;&#2381;&#2351;&#2306;&#2332;&#2344;' &#2324;&#2352; &#2357;&#2352;&#2381;&#2327; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; '&#2346;&#2368;&#2354;&#2366; &#2352;&#2306;&#2327;'&#2404;</p><p><img width=195 height=426 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25017/image002.jpg\"></p></span>",

      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",

    "question_index": 0

  {
    "question": "<span class=\"eqt\"><p>In the given diagram, the shapes indicate the categories of persons. The numbers given in the different segments represent the number of employees in that category.</p><p><img width=338 height=174 id=\"Picture 24\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25776/image023.png\" ></p><p>Then. How many employees are working in Delhi and Indore but not Bhopal?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2310;&#2352;&#2375;&#2326; &#2350;&#2375;&#2306;, &#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2366;&#2305; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2358;&#2381;&#2352;&#2375;&#2339;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2326;&#2306;&#2337;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2313;&#2360; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2350;&#2375;&#2306; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p><img width=338 height=174 id=\"Picture 24\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25776/image023.png\" ></p><p>&#2340;&#2379;&#2404; &#2325;&#2367;&#2340;&#2344;&#2375; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2368; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2324;&#2352; &#2311;&#2306;&#2342;&#2380;&#2352; &#2350;&#2375;&#2306; &#2325;&#2366;&#2350; &#2325;&#2352; &#2352;&#2361;&#2375; &#2361;&#2376;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; &#2349;&#2379;&#2346;&#2366;&#2354; &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306;?</p></span>",

    "solution": "<p><b><img width=354 height=183 id=\"Picture 25\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25776/image024.png\" ></b></p><p>So, eight employees are working in Delhi and Indore but not Bhopal.</p>",

  {
    "question": "<span class=\"eqt\"><p>In the Venn diagram given below, the circle represents loan amount deducted for vehicle, the triangle represents the loan amount deducted for home loan, the square represents the loan amount deducted for education loan and the trapezium represents the other expenditures. If the income of Raju is 50T, then what will be the total saving of Raju? </p><p>(T means amount in Thousands.)</p><p><img width=248 height=148 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25788/image002.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2375;&#2344; &#2310;&#2352;&#2375;&#2326; &#2350;&#2375;&#2306;, &#2357;&#2371;&#2340;&#2381;&#2340; &#2357;&#2366;&#2361;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2366;&#2335;&#2375; &#2327;&#2319; &#2315;&#2339; &#2352;&#2366;&#2358;&#2367; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2327;&#2371;&#2361; &#2315;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2366;&#2335;&#2375; &#2327;&#2319; &#2315;&#2339; &#2352;&#2366;&#2358;&#2367; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2357;&#2352;&#2381;&#2327; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2315;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2366;&#2335;&#2375; &#2327;&#2319; &#2315;&#2339; &#2352;&#2366;&#2358;&#2367; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2360;&#2350;&#2354;&#2350;&#2381;&#2348; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2309;&#2344;&#2381;&#2351; &#2357;&#2381;&#2351;&#2351; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2352;&#2366;&#2332;&#2370; &#2325;&#2368; &#2310;&#2351; 50T &#2361;&#2376;, &#2340;&#2379; &#2352;&#2366;&#2332;     "options": [
      "<span class=\"eqt\">15T</span><span class=\"hqt\" style=\"display:none\">15T</span>",
      "<span class=\"eqt\">11T</span><span class=\"hqt\" style=\"display:none\">11T</span>",
      "<span class=\"eqt\">13T</span><span class=\"hqt\" style=\"display:none\">13T</span>",
      "<span class=\"eqt\">18T</span><span class=\"hqt\" style=\"display:none\">18T</span>"

    "correct_option_id": 1,
    "solution": "<p>In the Venn diagram given below, the circle represents loan amount deducted for vehicle, the triangle represents the loan amount deducted for home loan, the square represents the loan amount deducted for education loan and the trapezium represents the other expenditures. </p><p><img width=461 height=150 id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25788/image003.jpg\"></p><p>So, Saving = Income  -  (loan + expenditure)</p><p>So, saving = 50T  -  39T = 11T. </p>",

  {
