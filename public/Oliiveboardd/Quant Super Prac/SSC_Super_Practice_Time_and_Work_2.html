<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Pipe A and pipe B can fill a tank in 4 hours and 5 hours respectively. There is an outlet pipe C when all three pipes are opened together the tank got filled in 2 (6/7) hours. Find the time taken by C alone to empty the fully filled tank.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 4 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2310;&#2313;&#2335;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; C &#2361;&#2376; &#2332;&#2348; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; 2 (6/7) &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2349;&#2352;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2325;&#2375;&#2354;&#2375; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">14 hours</span><span class=\"hqt\" style=\"display:none\">14 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">13 hours</span><span class=\"hqt\" style=\"display:none\">13 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">12 hours</span><span class=\"hqt\" style=\"display:none\">12 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">10 hours</span><span class=\"hqt\" style=\"display:none\">10 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let pipe C can empty the tank in x hours.</p><p>Part of tank filled by pipe A in 1 hour = 1/4 </p><p>Part of tank filled by pipe B in 1 hour = 1/5</p><p>Part of the tank filled when all pipes are opened together = 1/(20/7) = 7/20</p><p>According to question,</p><p>1/4 + 1/5  -  1/x = 7/20</p><p>1/4 + 1/5  -  7/20 = 1/x</p><p>(5 + 4  -  7)/20 = 1/x</p><p>2/20 = 1/x</p><p>x = 10 hours </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe A can fill a tank in 30 hours and pipe B can fill the same tank in 45 hours. If pipe C can empty the full tank in 25 hours, then find the time taken by all three pipes together to fill 70% of the tank. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 30 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2313;&#2360;&#2368; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 45 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; C &#2346;&#2370;&#2352;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 25 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; 70% &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">35 hours</span><span class=\"hqt\" style=\"display:none\">35 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">45 hours</span><span class=\"hqt\" style=\"display:none\">45 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">32 hours</span><span class=\"hqt\" style=\"display:none\">32 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">42 hours</span><span class=\"hqt\" style=\"display:none\">42 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The capacity of tank = L.C.M of 25, 45, and 30 = 450</p><p>Efficiency = The capacity of a tank/ time taken</p><p>Efficiency of A = 450/30 = 15</p><p>Efficiency of B = 450/45 = 10</p><p>Efficiency of C = 450/25 = 18</p><p>The total efficiency of A, B, and C = (15 + 10  -  18) = 7</p><p>Hence, the required time = (450 * 70/100)/7 = 45 hours</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe P, Q and R can fill a tank in 12 minutes, 24 minutes and 96 minutes respectively. Find the time taken to fill the tank when pipes are opened alternately for 1 minutes each starting from P.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; P, Q &#2324;&#2352; R &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 12 &#2350;&#2367;&#2344;&#2335;, 24 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 96 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2332;&#2348; &#2346;&#2366;&#2311;&#2346; P &#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2325;&#2375; 1 &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2366;&#2352;&#2368;-&#2348;&#2366;&#2352;&#2368; &#2360;&#2375; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">173/8 minutes</span><span class=\"hqt\" style=\"display:none\">173/8 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">179/8 minutes</span><span class=\"hqt\" style=\"display:none\">179/8 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">163/7 minutes</span><span class=\"hqt\" style=\"display:none\">163/7 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">172/9 minutes</span><span class=\"hqt\" style=\"display:none\">172/9 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Capacity of tank = LCM of 12, 24 and 96 = 96 unit </p><p>Efficiency of pipe P = 96/12 = 8 unit/minute</p><p>Efficiency of pipe Q = 96/24 = 4 unit/minutes</p><p>Efficiency of pipe R = 96/96 = 1 unit/minute</p><p>Part of tank filled in first 3 minutes = 8 + 4 + 1 = 13 unit</p><p>Part of tank filled in 21 minutes = 91 unit</p><p>Remaining unit = 96  -  91 = 5 unit</p><p>Time taken to fill the remaining tank = 5/8 </p><p>Total time = 21 (5/8) or 173/8 minutes</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe A can fill a tank in 300 minutes while pipe B can empty the tank in 800 minutes. If pipe A opened for 120 minutes after that pipe B joined him for 80 minutes, then in how many hours the tank will be filled completely?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 300 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2311;&#2346; B &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 800 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; A &#2325;&#2379; 120 &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2366;&#2311;&#2346; B &#2325;&#2379; 80 &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2379;&#2337;&#2364;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2335;&#2376;&#2306;&#2325; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">4.5 hours</span><span class=\"hqt\" style=\"display:none\">4.5 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">5.5 hours</span><span class=\"hqt\" style=\"display:none\">5.5 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">7.2 hours</span><span class=\"hqt\" style=\"display:none\">7.2 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">4.8 hours</span><span class=\"hqt\" style=\"display:none\">4.8 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total capacity = LCM of 300 and 800 = 2400 units</p><p>Efficiency of pipe A = 2400/300 = 8 units/minutes</p><p>Efficiency of pipe B = 2400/800 = 3 units/minutes</p><p>Part filled by pipe A in 120 minutes = 120*8 = 960 units</p><p>Remaining units = 2400  -  960 = 1440 units</p><p>Part filled by pipe A and B together in 80 minutes = (8  -  3)*80 = 400 units</p><p>Remaining units = 1440  -  400 = 1040 units</p><p>Time taken by pipe A = 1040/8 = 130 minutes</p><p>Total time taken = 120 + 80 + 130 = 5.5 hours</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><div>&nbsp;Pipe A alone can fill a tank in 1 hour 4 minutes, while pipe B alone can empty the tank in 2(&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">10</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">11</span></div>&nbsp;) hours. If both pipes opened together for 48 minutes, then how much percentage of the tank will remain to be filled &quest;&nbsp;</div></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 1 &#2328;&#2306;&#2335;&#2375; 4 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2366;&#2311;&#2346; B &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 2(10/11) &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2360;&#2366;&#2341; 48 &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2349;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2375;&#2359; &#2352;&#2361;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">31.5%</span><span class=\"hqt\" style=\"display:none\">31.5%</span>",
      "<span class=\"eqt\">52.5%</span><span class=\"hqt\" style=\"display:none\">52.5%</span>",
      "<span class=\"eqt\">46.5%</span><span class=\"hqt\" style=\"display:none\">46.5%</span>",
      "<span class=\"eqt\">68.5%</span><span class=\"hqt\" style=\"display:none\">68.5%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Pipe A can fill a tank in 1 hour 4 minutes = 64 minutes</p><p>And pipe B can empty the tank in 2(10/11) hours = 32/11 * 60 = 1920/11</p><p>Part of tank will be filled in 1 minute when both pipes are opened = 1/64  -  11/1920 = 19/1920</p><p>So, in 48 minutes part of tank filled = 48 * 19/1920 = 19/40</p><p>Hence, remaining part = 1  -  19/40 = 21/40 part</p><p>Remaining percentage of the tank = 21/40 * 100 = 52.5%</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Pipes M, N and P alone can fill a tank in 45 minutes, 72 minutes, and 54 minutes, respectively while a tap alone can empty the tank in 180 minutes. If pipe P and the tap opened together and after 30 minutes pipe P is closed and M and N is opened, then in how many minutes will the tank filled completely?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; M, N &#2324;&#2352; P &#2309;&#2325;&#2375;&#2354;&#2375; &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 45 &#2350;&#2367;&#2344;&#2335;, 72 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 54 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2319;&#2325; &#2344;&#2354; &#2309;&#2325;&#2375;&#2354;&#2375; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 180 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; P &#2324;&#2352; &#2344;&#2354; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 30 &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2366;&#2311;&#2346; P &#2325;&#2379; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; M &#2324;&#2352; N &#2325;&#2379; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">40 minutes</span><span class=\"hqt\" style=\"display:none\">40 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">50 minutes</span><span class=\"hqt\" style=\"display:none\">50 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">60 minutes</span><span class=\"hqt\" style=\"display:none\">60 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">70 minutes</span><span class=\"hqt\" style=\"display:none\">70 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Pipe M alone can fill the tank in 45 minutes</p><p>Pipe N alone can fill the tank in 72 minutes</p><p>The tap alone can empty the tank in 180 minutes.</p><p>Let tank will be filled in T minutes.</p><p>A.T.Q</p><p>30(1/54  -  1/180) + (T  -  30)(1/45 + 1/72  -  1/180) = 1</p><p>=&gt; 30 * 7/540 + (T  -  30) * 11/360 = 1</p><p>=&gt; T = 50 minutes</p>",

    "question": "<span class=\"eqt\"><p>A tank has a leak which would empty the completely filled tank in 10 hours. If the tank is full of water and a tap is opened which admits 4 litres of water per minute in the tank , the leak takes 15 hours to empty the tank. How many litres of water does the tank hold ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2350;&#2375;&#2306; &#2319;&#2325; &#2331;&#2367;&#2342;&#2381;&#2352; &#2361;&#2376; &#2332;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2349;&#2352;&#2375; &#2361;&#2369;&#2319; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 10 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2342;&#2375;&#2327;&#2366;&#2404; &#2351;&#2342;&#2367; &#2335;&#2376;&#2306;&#2325; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2346;&#2370;&#2352;&#2366; &#2349;&#2352;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376; &#2324;&#2352; &#2319;&#2325; &#2344;&#2354; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2335;&#2376;&#2306;&#2325; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2367;&#2344;&#2335; 4 &#2354;&#2368;&#2335;&#2352; &#2346;&#2366;&#2344;&#2368; &#2349;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2331;&#2367;&#2342;&#2381;&#2352; &#2325;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 15 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2335;&#2376;&#2306;&#2325; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2354;&#2368;&#2335;&#2352; &#2346;&#2366;&#2344;&#2368; &#2310; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Two pipes A and B can fill a cistern in 95 minutes and 76 minutes respectively. If pipe B opened first and both the pipes opened in alternate minutes, then in how much time the cistern will be completely filled?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; B &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;: 95 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 76 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; B &#2346;&#2361;&#2354;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325;&#2366;&#2306;&#2340;&#2352; &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">84.5 minutes</span><span class=\"hqt\" style=\"display:none\">84.5 &#2350;&#2367;&#2344;&#2335;</span>",

    "correct_option_id": 0,
    "solution": "<p>A = 95 minutes, B = 76 minutes</p><p>Since, pipe B opened first and both the pipes opened in alternate minutes. Then,</p><p>Part of the tank filled in 2 minutes = 1/95 + 1/76 = 9/380</p><p>Now, part of the tank filled in (2 * 42 = 84 minutes) = 42 * 9/380 = 189/190</p><p>Remaining part to be filled = 1  -  189/190 = 1/190</p><p>Time taken by pipe A to fill (1/190) part of the tank = 95 * 1/190 = 0.5 minute</p><p>Therefore, total time taken = 84 + 0.5 = <b>84.5 minutes</b></p>",
    "question_index": 7

    "question": "<span class=\"eqt\"><p>Three taps A, B and C can fill a tank in 3.6 hours, 7.2 hours and 12 hours respectively. Taps A and B together opened at 3: 30 pm and then closed at 4: 45 pm. In how much time, the remaining part of the tank will be filled by tap C alone?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2344;&#2354; A, B &#2324;&#2352; C &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3.6 &#2328;&#2306;&#2335;&#2375;, 7.2 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 12 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; &#2344;&#2354; A &#2324;&#2352; B 3:30 &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; &#2346;&#2352; &#2326;&#2369;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2347;&#2367;&#2352; 4:45 &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; &#2346;&#2352; &#2348;&#2306;&#2342; &#2361;&#2379; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2335;&#2306;&#2325;&#2368; &#2325;&#2366; &#2358;&#2375;&#2359; &#2349;&#2366;&#2327; &#2309;&#2325;&#2375;&#2354;&#2375; &#2344;&#2354; C &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2349;&#2352;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [

    "correct_option_id": 3,
    "solution": "<p>A = 3.6 hours, B = 7.2 hours, C = 12 hours</p><p>Time taken from 3: 30 pm to 4: 45 pm = 1 hour 15 minutes = 1.25 hours</p><p>Part of the tank filled by taps A and B together in 1.25 hours</p><p>= 1.25 * (1/3.6 + 1/7.2)</p><p>= 25/48</p><p>Then, remaining part to be filled = 1  -  25/48 = 23/48</p><p>Therefore, time taken by tap C to fill 23/48 part of the tank = (23/48) * 12 = <b>5.75 hours</b></p>",
    "question_index": 8
  },

    "question": "<span class=\"eqt\"><p>Three pipes A, B and C can fill a tank at 6 liters/minute, 3 liters/minute and 4 liters/minute respectively. When all three the pipes are opened together, they can fill 52% of the tank in 9.6 minutes. What is the capacity of the tank (in liters)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2346;&#2366;&#2311;&#2346; A, B &#2324;&#2352; C &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 6 &#2354;&#2368;&#2335;&#2352;/&#2350;&#2367;&#2344;&#2335;, 3 &#2354;&#2368;&#2335;&#2352;/&#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 4 &#2354;&#2368;&#2335;&#2352;/&#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2332;&#2348; &#2319;&#2325; &#2360;&#2366;&#2341; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2375; 9.6 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; 52% &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2335;&#2376;&#2306;&#2325; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; (&#2354;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">240</span><span class=\"hqt\" style=\"display:none\">240</span>",
      "<span class=\"eqt\">300</span><span class=\"hqt\" style=\"display:none\">300</span>",
      "<span class=\"eqt\">200</span><span class=\"hqt\" style=\"display:none\">200</span>",

    "solution": "<p>Let the capacity of the tank = x liters</p><p>Then, time taken by pipe A alone to fill the tank = x/6 minutes</p><p>Time taken by pipe B alone to fill the tank = x/3 minutes</p><p>Time taken by pipe C alone to fill the tank = x/4 minutes</p><p>Part of the tank filled by all three pipes together in one minute</p><p>= (6/x + 3/x + 4/x)</p><p>= 13/x</p><p>When all three the pipes are opened together, they can fill 52% of the tank in 9.6 minutes. Then,</p><p>9.6 = (52/100) * (x/13)</p><p><b>x = 240</b></p>",

    "question": "<span class=\"eqt\"><p>Tap A can fill 3/4<sup>th</sup> part of a tank in 15 minutes while tap B can empty the full tank in 0.5 hours. Both the pipes were opened together for 't' minutes and then tap A was closed. The tank was then emptied by tap B in 10 minutes. What is the value of 't'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2354; A &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2375; 3/4 &#2349;&#2366;&#2327; &#2325;&#2379; 15 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2344;&#2354; B, 0.5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2325;&#2379; 't' &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2366; &#2327;&#2351;&#2366; &#2324;&#2352; &#2347;&#2367;&#2352; &#2344;&#2354; A &#2325;&#2379; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; &#2347;&#2367;&#2352; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2344;&#2354; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 10 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; 'T' &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",

    "solution": "<p>Time taken by tap A to fill the tank = 15 * 4/3 = 20 minutes</p><p>Time taken by tap B to empty the tank = 0.5 * 60 = 30 minutes</p><p>Since filling rate is more than emptying rate. Then,</p><p>when both the taps are opened together, part of the tank filled in t minutes = t * (1/20  -  1/30) = t/60</p><p>Now, t/60 part of the tank is emptied by pipe B in 10 minutes. Then,</p><p>10 = (t/60) * 30</p><p><b>t = 20</b></p>",

    "question": "<span class=\"eqt\"><p><div>&nbsp;Two taps A and B can fill a cistern together in 3&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">11</span></div>&nbsp;hours while tap A alone can fill it in 10 hours. When tap A opened at 3: 00 am and then tap B opened at 7: 30 am, then the cistern will be filled by  -&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2379; &#2344;&#2354; A &#2324;&#2352; B &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 3 2/11 &#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2348;&#2325;&#2367; &#2309;&#2325;&#2375;&#2354;&#2375; &#2344;&#2354; A &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 10 &#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; &#2344;&#2354; A &#2325;&#2379; &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 3 : 00 &#2348;&#2332;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; &#2344;&#2354; B &#2325;&#2379; &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 7 : 30 &#2348;&#2332;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; ________ &#2348;&#2332;&#2375; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">10: 15 am</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 10 : 15</span>",
      "<span class=\"eqt\">9: 15 am</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 9 : 15</span>",

    "correct_option_id": 1,
    "solution": "<p>3(2/11) means (3 + 2/11) or (35/11).</p><p>Now, A = 10 hours</p><p>(1/A) + (1/B) = 11/35</p><p>1/10 + 1/B = 11/35</p><p>B = 14/3</p><p>Time from 3: 00 am to 7: 30 am = 4 hours 30 minutes = 4.5 hours</p><p>Part of cistern filled by pipe A in 4.5 hours = 4.5/10 = 9/20</p><p>Remaining part = 1  -  9/20 = 11/20</p><p>Then, time taken by pipe A and B to fill remaining part of the cistern = (11/20) * 35/11 = 7/4 = 1 hour 45 minutes</p><p>Therefore, 1 hour 45 minutes after 7: 30 am = 7: 30 am + 1 hour + 45 minutes</p><p>= <b>9: 15 am</b></p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe A and B can fill a large tub of water in 2.5 min and 3 min respectively and C can carry away 7 liters per min. If all the pipes are open when the tub is full, it is emptied in 45 min, what is the capacity of the tub?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2319;&#2325; &#2346;&#2366;&#2344;&#2368; &#2325;&#2375; &#2348;&#2396;&#2375; &#2335;&#2348; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 2.5 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 3 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; C &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2367;&#2344;&#2335; 7 &#2354;&#2368;&#2335;&#2352; &#2346;&#2366;&#2344;&#2368; &#2348;&#2361;&#2366; &#2354;&#2375; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;| &#2351;&#2342;&#2367; &#2360;&#2349;&#2368; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348; &#2335;&#2348; &#2349;&#2352;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;, &#2340;&#2379; &#2351;&#2361; 45 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2348; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">9.25 liters</span><span class=\"hqt\" style=\"display:none\">9.25 &#2354;&#2368;&#2335;&#2352;</span>",

      "<span class=\"eqt\">9.50 liters</span><span class=\"hqt\" style=\"display:none\">9.50 &#2354;&#2368;&#2335;&#2352;</span>"

    "correct_option_id": 1,
    "solution": "<p>If X is the capacity of the tub, then in 45 min</p> <p>A will pour 45x/2.5 = 18x</p> <p>B will pour 45x/3 = 15x </p> <p>C will take out 7*45 liters </p> <p>Now x + 18x + 15x = 7*45 or x = 9.25 liters</p>",

    "question": "<span class=\"eqt\"><p>Two inlet pipes A and B and one outlet pipe C are attached to a tank. Pipes A and B can fill the tank in 8(1/3) minutes and 11(2/3) minutes, respectively while pipe C can empty the tank in 5 minutes. In how much time 14(2/7) % of the tank will be filled, if all three pipes opened together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2311;&#2344;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; B &#2324;&#2352; &#2319;&#2325; &#2310;&#2313;&#2335;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; C &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; B &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 8 (1/3) &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 11 (2/3) &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2311;&#2346; C &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 5 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325;-&#2360;&#2366;&#2341; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; 14 (2/7)% &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>A cistern is filled with water by taps A and B together in 42 minutes. If tap B was stopped after 18 min, the cistern is filled in 45 min. The cistern can alone be filled by tap B in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2344;&#2354; A &#2324;&#2352; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 42 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2360;&#2375; &#2349;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2344;&#2354; B &#2325;&#2379; 18 &#2350;&#2367;&#2344;&#2335; &#2348;&#2366;&#2342; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; 45 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2309;&#2325;&#2375;&#2354;&#2375; &#2344;&#2354; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2349;&#2352;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">378 min</span><span class=\"hqt\" style=\"display:none\">378 &#2350;&#2367;&#2344;&#2335;</span>",

      "<span class=\"eqt\">387 min</span><span class=\"hqt\" style=\"display:none\">387 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let total capacity of cistern = 42 units</p><p>Efficiency of taps A and B together = 42/42 = 1 unit per min</p><p>Part of cistern filled by A and B together in 18 min = 18 * 1 = 18 units</p><p>Remaining capacity of cistern = 42  -  18 = 24 units</p><p>These 24 units is filled by tap A in 45  -  18 = 27 min.</p><p>Efficiency of tap A = 24/27 = 8/9 units per min </p><p>Efficiency of tap B = 1  -  (8/9) = 1/9 units per min</p><p>Time taken by B alone to fill the cistern = 42/ (1/9) = 378 min.</p>",

    "question": "<span class=\"eqt\"><p>Two pipes X and Y can fill a tank in 20hrs and 30hrs respectively while a third pipe Z can empty the full tank in 40hrs. All the 3 pipes are opened in beginning and after 10 hrs Z is closed. Then find, in total how much time will the tank be full?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2346;&#2366;&#2311;&#2346; X &#2324;&#2352; Y &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 20 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 30 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2348;&#2325;&#2367; &#2319;&#2325; &#2340;&#2368;&#2360;&#2352;&#2366; &#2346;&#2366;&#2311;&#2346; Z &#2346;&#2370;&#2352;&#2375; &#2349;&#2352;&#2375; &#2361;&#2369;&#2319; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 40 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;| &#2358;&#2369;&#2352;&#2370; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; 3 &#2346;&#2366;&#2311;&#2346;&#2379; &#2325;&#2379; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 10 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2366;&#2311;&#2346; Z &#2325;&#2379; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;| &#2346;&#2370;&#2352;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2375; &#2332;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">10 hrs 30 min</span><span class=\"hqt\" style=\"display:none\">10 &#2328;&#2306;&#2335;&#2375; 30 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">12 hrs</span><span class=\"hqt\" style=\"display:none\">12 &#2328;&#2306;&#2335;&#2375;</span>",

      "<span class=\"eqt\">14 hrs 45 min</span><span class=\"hqt\" style=\"display:none\">14 &#2328;&#2306;&#2335;&#2375; 45 &#2350;&#2367;&#2344;&#2335;</span>"

    "solution": "<p>Tank filled in 10hrs=10*(1/20+1/30-1/40)=7/12</p> <p>Remaining part=1-(7/12)=5/12</p> <p>Work done by (X+Y) in 1 hour=(1/20+1/30)=1/12.</p> <p>Now 1/12 part is filled by (X+Y) in 1 hour.</p> <p>5/12 part will be filled by (X+Y) in =(5/12)*12=5hours</p> <p>Therefore total time in which the tank is full=10+5=15hrs.</p>",
    "question_index": 15

  {
    "question": "<span class=\"eqt\"><p>Pipes K, and L together can fill a tank in 48 minutes, while pipe M alone can empty the tank in 64 minutes. If all three pipes opened together for 48 minutes, then how much part of the tank will be remained to fill?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2346;&#2366;&#2311;&#2346; K &#2324;&#2352; L &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 48 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2311;&#2346; M &#2309;&#2325;&#2375;&#2354;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 64 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; 48 &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2366;&#2327; &#2349;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2330;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1/4 part</span><span class=\"hqt\" style=\"display:none\">1/4 &#2349;&#2366;&#2327;</span>",
      "<span class=\"eqt\">1/3 part</span><span class=\"hqt\" style=\"display:none\">1/3 &#2349;&#2366;&#2327;</span>",
      "<span class=\"eqt\">1/2 part</span><span class=\"hqt\" style=\"display:none\">1/2 &#2349;&#2366;&#2327;</span>",
      "<span class=\"eqt\">3/4 part</span><span class=\"hqt\" style=\"display:none\">3/4 &#2349;&#2366;&#2327;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Pipes K and L together can fill a tank in 48 minutes,</p><p>And pipe M alone can empty the tank in 64 minutes.</p><p>Part of tank will be filled in 1 minute when all three pipes are opened = 1/K + 1/L  -  1/M = 1/48  -  1/64 = 1/192</p><p>So, in 48 minutes part of tank filled = 48 * 1/192 = &#188; </p><p>Hence, remaining part = 1  -  1/4 = 3/4 part</p>",
    "question_index": 16

    "question": "<span class=\"eqt\"><p>Two pipes P and Q can fill a tank in 52 minutes and 156 minutes, respectively. If pipe P is opened at 7:30 am and pipe Q is opened at 8:00 am, then the tank will be filled in how much time (in minutes)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2346;&#2366;&#2311;&#2346; P &#2324;&#2352; Q &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 52 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 156 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; P &#2325;&#2379; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344; 7:30 &#2348;&#2332;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; Q &#2325;&#2379; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344; 8:00 &#2348;&#2332;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; (&#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306;) &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">41.5 minutes</span><span class=\"hqt\" style=\"display:none\">41.5 &#2350;&#2367;&#2344;&#2335;</span>",

      "<span class=\"eqt\">46.5 minutes</span><span class=\"hqt\" style=\"display:none\">46.5 &#2350;&#2367;&#2344;&#2335;</span>",

    "solution": "<p>Two pipes P and Q can fill a tank in 52 minutes and 156 minutes, respectively.</p><p>Part of tank is filled by P in 30 minutes = 30/52 = 15/26</p><p>So, remaining part = 1  -  15/26 = 11/26</p><p>So, 11/26 part of tank filled by P and Q together in = 11/26 * 1/(1/52 + 1/156) = 11/26 * 39 = 16.5 minutes</p><p>So, time = 30 + 16.5 = 46.5 minutes</p>",

    "question": "<span class=\"eqt\"><p>Pipe A can fill a tank in 50 minutes, while pipe B alone can fill it in 75 minutes and pipe C can empty the full tank in 1 hour. If all the pipes are opened together and the pipe B is closed 12 minutes before the tank is filled, then how much time will be needed to make the tank full?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 50 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2311;&#2346; B &#2309;&#2325;&#2375;&#2354;&#2375; &#2311;&#2360;&#2375; 75 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; C &#2346;&#2370;&#2352;&#2368; &#2349;&#2352;&#2368; &#2361;&#2369;&#2312; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 1 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2349;&#2368; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2325;&#2379; &#2335;&#2306;&#2325;&#2368; &#2349;&#2352;&#2344;&#2375; &#2360;&#2375; 12 &#2350;&#2367;&#2344;&#2335; &#2346;&#2361;&#2354;&#2375; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">68 minutes</span><span class=\"hqt\" style=\"display:none\">68 &#2350;&#2367;&#2344;&#2335;</span>",

      "<span class=\"eqt\">72 minutes</span><span class=\"hqt\" style=\"display:none\">72 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">78 minutes</span><span class=\"hqt\" style=\"display:none\">78 &#2350;&#2367;&#2344;&#2335;</span>"

    "correct_option_id": 1,
    "solution": "<p>Suppose the tank is filled in T minutes.</p><p>According to the question, pipes A and C are open for T minutes and pipe B for (T-12) minutes.</p><p>T/50 + (T-12)/75 - T/60 = 1</p><p>(6T+4T-48-5T)/300 = 1</p><p>(5T-48)/300 = 1</p><p>5T = 348</p><p>T =  69.6 minutes</p><p>Hence, the tank is filled in 69.6 minutes</p>",

    "question": "<span class=\"eqt\"><p>Two inlet pipes P and Q together can fill a tank in 10 minutes. If pipe P alone can fill the tank in 22.5 minutes, then in how many minutes pipe Q alone can fill the tank completely?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2311;&#2344;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; P &#2324;&#2352; Q &#2319;&#2325; &#2360;&#2366;&#2341; &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 10 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; P &#2309;&#2325;&#2375;&#2354;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 22.5 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2366;&#2311;&#2346; Q &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2370;&#2352;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
