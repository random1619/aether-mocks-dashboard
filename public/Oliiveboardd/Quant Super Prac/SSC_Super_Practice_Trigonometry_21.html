<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In a playground, every two children play chess between them, every four children play carrom among them, and every five children play basketball among them. If the total number of chess boards, carrom boards, and basketballs together is 114 and all children play each game, then find the total number of children.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2326;&#2375;&#2354; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344; &#2350;&#2375;&#2306;, &#2361;&#2352; &#2342;&#2379; &#2348;&#2330;&#2381;&#2330;&#2375; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2358;&#2340;&#2352;&#2306;&#2332; &#2326;&#2375;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2361;&#2352; &#2330;&#2366;&#2352; &#2348;&#2330;&#2381;&#2330;&#2375; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2325;&#2376;&#2352;&#2350; &#2326;&#2375;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2324;&#2352; &#2361;&#2352; &#2346;&#2366;&#2305;&#2330; &#2348;&#2330;&#2381;&#2330;&#2375; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2366;&#2360;&#2381;&#2325;&#2375;&#2335;&#2348;&#2377;&#2354; &#2326;&#2375;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2358;&#2340;&#2352;&#2306;&#2332; &#2348;&#2379;&#2352;&#2381;&#2337;, &#2325;&#2376;&#2352;&#2350; &#2348;&#2379;&#2352;&#2381;&#2337; &#2324;&#2352; &#2348;&#2366;&#2360;&#2381;&#2325;&#2375;&#2335;&#2348;&#2377;&#2354; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 114 &#2361;&#2376; &#2324;&#2352; &#2360;&#2349;&#2368; &#2348;&#2330;&#2381;&#2330;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2326;&#2375;&#2354; &#2326;&#2375;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">180</span><span class=\"hqt\" style=\"display:none\">180</span>",
      "<span class=\"eqt\">140</span><span class=\"hqt\" style=\"display:none\">140</span>",
      "<span class=\"eqt\">120</span><span class=\"hqt\" style=\"display:none\">120</span>",
      "<span class=\"eqt\">160</span><span class=\"hqt\" style=\"display:none\">160</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the total number of children be 'X'.</p><p>Therefore,</p><p>The total number of children who play chess = X/2</p><p>The total number of children who play carrom = X/4</p><p>The total number of children who play basketball = X/5</p><p>A/Q</p><p>X/2 + X/4 + X/5 = 114</p><p>(10X + 5X + 4X)/20 = 114</p><p>19X/20 = 114</p><p>X = 114 * 20/19</p><p>X = 120</p><p>Hence, the total number of children is 120.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>What is the remainder of function 20a<sup>3</sup> -7a<sup>2</sup> + 4a + 7 when it is divided by 5a + 2? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2344; 20a<sup>3</sup> -7a<sup>2</sup> + 4a + 7 &#2325;&#2379; 5a + 2 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=226 height=141 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26465/image008.png\" ></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>An exam has 60 questions, each question carries +4 marks and a penalty of &#8722;1 marks while there is no penalty for not attempting a question. Wasim and Shoaib attempted all the questions and got 130 and 145 marks respectively. Find the total number of questions they answered correctly.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; 60 &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2361;&#2376;&#2306;, &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; +4 &#2309;&#2306;&#2325; &#2361;&#2376;&#2306; &#2324;&#2352; &#8377;1 &#2325;&#2366; &#2342;&#2306;&#2337; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2344; &#2342;&#2375;&#2344;&#2375; &#2346;&#2352; &#2325;&#2379;&#2312; &#2342;&#2306;&#2337; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404; &#2357;&#2360;&#2368;&#2350; &#2324;&#2352; &#2358;&#2379;&#2319;&#2348; &#2344;&#2375; &#2360;&#2349;&#2368; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2367;&#2351;&#2366; &#2324;&#2352; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 130 &#2324;&#2352; 145 &#2309;&#2306;&#2325; &#2350;&#2367;&#2354;&#2375;&#2404; &#2313;&#2344;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2369;&#2354; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">75</span><span class=\"hqt\" style=\"display:none\">75</span>",
      "<span class=\"eqt\">67</span><span class=\"hqt\" style=\"display:none\">67</span>",
      "<span class=\"eqt\">82</span><span class=\"hqt\" style=\"display:none\">82</span>",
      "<span class=\"eqt\">79</span><span class=\"hqt\" style=\"display:none\">79</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>They both attempted all the questions</p><p>Total marks = 60 * 4 = 240</p><p>Each incorrect question will cause a decrease of 5 marks </p><p>Total decrease = (240  -  130 + 240  -  145) = 205</p><p>Total number of incorrect questions = 205/5 = 41</p><p>Total number of questions they answered correctly = 2 * 60  -  41 = 79</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The sum of the two numbers P and Q is 146. If the sum of 8 times the value of P and 3 times the value of Q is 838, find the value of Q.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; P &#2324;&#2352; Q &#2325;&#2366; &#2351;&#2379;&#2327; 146 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; P &#2325;&#2375; &#2350;&#2366;&#2344; &#2325;&#2375; 8 &#2327;&#2369;&#2344;&#2366; &#2324;&#2352; Q &#2325;&#2375; &#2350;&#2366;&#2344; &#2325;&#2375; 3 &#2327;&#2369;&#2344;&#2366; &#2325;&#2366; &#2351;&#2379;&#2327; 838 &#2361;&#2376;, &#2340;&#2379; Q &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">66</span><span class=\"hqt\" style=\"display:none\">66</span>",
      "<span class=\"eqt\">72</span><span class=\"hqt\" style=\"display:none\">72</span>",
      "<span class=\"eqt\">78</span><span class=\"hqt\" style=\"display:none\">78</span>",
      "<span class=\"eqt\">60</span><span class=\"hqt\" style=\"display:none\">60</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>P + Q = 146 ...........(i)</p><p>8P + 3Q = 838 .........(ii)</p><p>Eq(ii)  -  3 * eq(i), we get -</p><p>8P + 3Q  -  3P  -  3Q = 838  -  3 * 146</p><p>5 P = 838  -  438</p><p>5 P = 400</p><p>P = 80</p><p>Q = 146  -  80 = 66</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The cost of 10 shirts and 8 pants together is &#8377;14060. If the cost of 11 pants is &#8377;9020, then find the cost of 3 shirts.</p></span><span class=\"hqt\" style=\"display:none\"><p>10 &#2358;&#2352;&#2381;&#2335; &#2324;&#2352; 8 &#2346;&#2376;&#2306;&#2335; &#2325;&#2366; &#2325;&#2369;&#2354; &#2350;&#2370;&#2354;&#2381;&#2351; &#8377;14060 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 11 &#2346;&#2376;&#2306;&#2335; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351; &#8377;9020 &#2361;&#2376;, &#2340;&#2379; 3 &#2358;&#2352;&#2381;&#2335; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;2250</span><span class=\"hqt\" style=\"display:none\">&#8377;2250</span>",
      "<span class=\"eqt\">&#8377;2370</span><span class=\"hqt\" style=\"display:none\">&#8377;2370</span>",
      "<span class=\"eqt\">&#8377;1800</span><span class=\"hqt\" style=\"display:none\">&#8377;1800</span>",
      "<span class=\"eqt\">&#8377;1950</span><span class=\"hqt\" style=\"display:none\">&#8377;1950</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Cost of 11 pants = &#8377;9020</p><p>Cost of 8 pants = 9020 * 8/11 = &#8377;6560</p><p>Cost of 10 shirts = 14060  -  6560 = &#8377;7500</p><p>Cost of 3 shirts = 7500 * 3/10 = &#8377;2250</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The present age of Reeta is twice the age of Ravi five years hence. After three years, the ratio of the age of Reeta and Ravi is 3:1 respectively. What is the present age of Reeta?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2368;&#2340;&#2366; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2346;&#2366;&#2305;&#2330; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2352;&#2357;&#2367; &#2325;&#2368; &#2310;&#2351;&#2369; &#2360;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2361;&#2376;&#2404; &#2340;&#2368;&#2344; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342;, &#2352;&#2368;&#2340;&#2366; &#2324;&#2352; &#2352;&#2357;&#2367; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3:1 &#2361;&#2376;&#2404; &#2352;&#2368;&#2340;&#2366; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12 years</span><span class=\"hqt\" style=\"display:none\">12 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">18 years</span><span class=\"hqt\" style=\"display:none\">18 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">16 years</span><span class=\"hqt\" style=\"display:none\">16 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">20 years</span><span class=\"hqt\" style=\"display:none\">20 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the present age of Reeta = '2y' years</p><p>Present age of Ravi = 'y  -  5' years</p><p>According to question,</p><p>(2y + 3)/(y  -  5 + 3) = 3/1</p><p>2y + 3 = 3y  -  6</p><p>y = 9</p><p>Present age of Reeta = 2*9 = 18 years</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The present age of Tanya is 3/8 times of Meenu's age. Four years ago, Tanya's age was 2/7 times Meenu's age at that time. What was the age of Jiya six years ago if Jiya is four years younger than Meenu?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2366;&#2344;&#2381;&#2351;&#2366; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2350;&#2368;&#2344;&#2370; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2368; 3/8 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2330;&#2366;&#2352; &#2360;&#2366;&#2354; &#2346;&#2361;&#2354;&#2375;, &#2340;&#2366;&#2344;&#2381;&#2351;&#2366; &#2325;&#2368; &#2310;&#2351;&#2369; &#2313;&#2360; &#2360;&#2350;&#2351; &#2350;&#2368;&#2344;&#2370; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2368; 2/7 &#2327;&#2369;&#2344;&#2366; &#2341;&#2368;&#2404; &#2351;&#2342;&#2367; &#2332;&#2367;&#2351;&#2366; &#2350;&#2368;&#2344;&#2370; &#2360;&#2375; &#2330;&#2366;&#2352; &#2360;&#2366;&#2354; &#2331;&#2379;&#2335;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2331;&#2361; &#2360;&#2366;&#2354; &#2346;&#2361;&#2354;&#2375; &#2332;&#2367;&#2351;&#2366; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2381;&#2351;&#2366; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">26 years</span><span class=\"hqt\" style=\"display:none\">26 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">24 years</span><span class=\"hqt\" style=\"display:none\">24 &#2360;&#2366;&#2354;</span>",
      "<span class=\"eqt\">21 years</span><span class=\"hqt\" style=\"display:none\">21 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">22 years</span><span class=\"hqt\" style=\"display:none\">22 &#2360;&#2366;&#2354; &#2325;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let present age of Tanya = 3x years and present age of Meenu = 8x years</p><p>Four years ago, Tanya's age was 2/7 times Meenu's age at that time.</p><p>=&gt; (3x  -  4)/ (8x  -  4) = 2/7</p><p>=&gt; x = 4</p><p>So, the age of Jiya 6 years ago = 8 * 4  -  4 - 6 = 22 years</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Salaries of A and B are in the ratio of 8 : 9 respectively. If salary of A increased by Rs. 8000 and B increased by Rs. 6000, then ratio becomes 20 : 21. Find salary of B.</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2325;&#2375; &#2357;&#2375;&#2340;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 8 : 9 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; A &#2325;&#2375; &#2357;&#2375;&#2340;&#2344; &#2350;&#2375;&#2306; 8000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2369;&#2312; &#2324;&#2352; B &#2325;&#2375; &#2357;&#2375;&#2340;&#2344; &#2350;&#2375;&#2306; 6000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2369;&#2312;, &#2340;&#2379; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 20 : 21 &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; B &#2325;&#2366; &#2357;&#2375;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>At a charity event, Rina donates Rs.264 using a total of 50 coins consisting of Rs.2, Rs.5, and Rs.10 denominations. If the number of Rs.2 coins to Rs.5 coins is in the ratio 3: 7, how many Rs.10 coins did she donate?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2330;&#2376;&#2352;&#2367;&#2335;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306;, &#2352;&#2368;&#2344;&#2366; &#2344;&#2375; 2 &#2352;&#2369;&#2346;&#2351;&#2375;, 5 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; 10 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2325;&#2369;&#2354; 50 &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; 264 &#2352;&#2369;&#2346;&#2351;&#2375; &#2342;&#2366;&#2344; &#2325;&#2367;&#2319;&#2404; &#2351;&#2342;&#2367; 2 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; 5 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2360;&#2367;&#2325;&#2381;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3: 7 &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2344;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; 10 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2360;&#2367;&#2325;&#2381;&#2325;&#2375; &#2342;&#2366;&#2344; &#2325;&#2367;&#2319;?</p></span>",

    "solution": "<p>Let the number of Rs.2 coins and Rs.5 coins be 3x and 7x respectively.</p><p>Then,</p><p>Number of Rs.10 coins used = 50  -  10x</p><p>Total amount donated = 264</p><p>10 * (50  -  10x) + 2 * 3x + 5 * 7x = 264</p><p>500  -  100x + 6x + 35x = 264</p><p>500  -  59x = 264</p><p>59x = 236</p><p>x = 4</p><p>Number of Rs.10 coins she donated = 50  -  10 * 4 = 10</p>",

    "question": "<span class=\"eqt\"><p>The cost of a ball, football and a bat is in the ratio of 3:5:9 respectively and the cost of ball is 2/5 of the cost of gloves. If the cost of gloves and bat is &#8377;1320, then find the cost of ball and football.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2375;&#2306;&#2342;, &#2347;&#2369;&#2335;&#2348;&#2377;&#2354; &#2324;&#2352; &#2319;&#2325; &#2348;&#2354;&#2381;&#2354;&#2375; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3:5:9 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376; &#2340;&#2341;&#2366; &#2327;&#2375;&#2306;&#2342; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340;, &#2342;&#2360;&#2381;&#2340;&#2366;&#2344;&#2375; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2325;&#2366; 2/5 &#2349;&#2366;&#2327; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2360;&#2381;&#2340;&#2366;&#2344;&#2375; &#2324;&#2352; &#2348;&#2354;&#2381;&#2354;&#2375; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#8377;1320 &#2361;&#2376;, &#2340;&#2379; &#2327;&#2375;&#2306;&#2342; &#2324;&#2352; &#2347;&#2369;&#2335;&#2348;&#2377;&#2354; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
