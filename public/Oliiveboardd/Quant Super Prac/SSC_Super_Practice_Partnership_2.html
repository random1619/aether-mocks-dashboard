        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Ramesh and Manyata entered into a partnership with investment in the ratio 5:4 respectively. After one year Manyata invested Rs.15000 more. After one more year, Ramesh invested Rs.20000 more. At the end of three years, they earned a certain amount of profit and ratio of the shares of Ramesh and Manyata in the profit is 17:15. Find the difference between the initial amounts invested by Ramesh and Manyata.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2350;&#2375;&#2358; &#2324;&#2352; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2344;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 5:4 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2325;&#2368;&#2404; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2344;&#2375; 15000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2319;&#2404; &#2319;&#2325; &#2324;&#2352; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2352;&#2350;&#2375;&#2358; &#2344;&#2375; 20000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2319;&#2404; &#2340;&#2368;&#2344; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306;, &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2354;&#2366;&#2349; &#2325;&#2350;&#2366;&#2351;&#2366; &#2324;&#2352; &#2354;&#2366;&#2349; &#2350;&#2375;&#2306; &#2352;&#2350;&#2375;&#2358; &#2324;&#2352; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2325;&#2375; &#2358;&#2375;&#2351;&#2352;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 17:15 &#2361;&#2376;&#2404; &#2352;&#2350;&#2375;&#2358; &#2324;&#2352; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2352;&#2366;&#2358;&#2367; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.12000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.12000</span>",
      "<span class=\"eqt\">Rs.10000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.10000</span>",
      "<span class=\"eqt\">Rs.15000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.15000</span>",
      "<span class=\"eqt\">Rs.18000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.18000</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let, initial amounts invested by Ramesh and Manyata be Rs.5k and Rs.4k respectively.</p><p>Ramesh : Manyata = [5k x 2 + (5k + 20000)] : [4k + (4k + 15000) x 2]</p><p>= (10k + 5k + 20000) : (4k + 8k + 30000)</p><p>= (15k + 20000) : (12k + 30000)</p><p>According to the question</p><p>(15k + 20000)/(12k + 30000) = 17/15</p><p>=&gt; 15 x (15k + 20000) = 17 x (12k + 30000)</p><p>=&gt; 225k + 300000 = 204k + 510000</p><p>=&gt; 225k  -  204k = 510000  -  300000</p><p>=&gt; 21k = 210000</p><p>=&gt; k = 210000/21</p><p>=&gt; k = 10000</p><p>Required difference = 5k  -  4k = k = Rs.10000</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Rakesh and Vijay entered into a partnership with investment in the ratio 9:4 respectively. Vijay is the working partner and Rakesh is the sleeping partner. After one year, Vijay doubled his investment. At the end of two years, they earned a profit of Rs.80000. Vijay being the working partner, one fifth of the profit goes to him for his work and rest of the profit is divided among them as per the ratio of their shares in the profit. Find the share of Rakesh in the profit.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2325;&#2375;&#2358; &#2324;&#2352; &#2357;&#2367;&#2332;&#2351; &#2344;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 9:4 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2325;&#2368;&#2404; &#2357;&#2367;&#2332;&#2351; &#2325;&#2366;&#2352;&#2381;&#2351;&#2352;&#2340; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352; &#2361;&#2376; &#2324;&#2352; &#2352;&#2366;&#2325;&#2375;&#2358; &#2344;&#2367;&#2359;&#2381;&#2325;&#2381;&#2352;&#2367;&#2351; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352; &#2361;&#2376;&#2404; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342;, &#2357;&#2367;&#2332;&#2351; &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2379; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404; &#2342;&#2379; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306;, &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; 80000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2354;&#2366;&#2349; &#2325;&#2350;&#2366;&#2351;&#2366;&#2404; &#2357;&#2367;&#2332;&#2351; &#2325;&#2366;&#2352;&#2381;&#2351;&#2352;&#2340; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352; &#2361;&#2376;, &#2354;&#2366;&#2349; &#2325;&#2366; &#2346;&#2366;&#2305;&#2330;&#2357;&#2366;&#2305; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2313;&#2360;&#2325;&#2375; &#2325;&#2366;&#2350; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2358;&#2375;&#2359; &#2354;&#2366;&#2349; &#2325;&#2379; &#2354;&#2366;&#2349; &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2375; &#2358;&#2375;&#2351;&#2352;&#2379;&#2306; &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2313;&#2344;&#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2354;&#2366;&#2349; &#2350;&#2375;&#2306; &#2352;&#2366;&#2325;&#2375;&#2358; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.36600</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.36600</span>",
      "<span class=\"eqt\">Rs.30660</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.30660</span>",
      "<span class=\"eqt\">Rs.38400</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.38400</span>",
      "<span class=\"eqt\">Rs.42200</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.42200</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let, initial amounts invested by Rakesh and Vijay be Rs.9k and Rs.4k respectively.</p><p>Ratio of shares in the profit:</p><p>Rakesh : Vijay = (9k x 2) : (4k + 8k)</p><p>= 18k : 12k</p><p>= 3:2</p><p>Share of Rakesh in the profit = 3/(3 + 2) x (1  -  1/5) x 80000</p><p>= 3/5 x 4/5 x 80000</p><p>= Rs.38400</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Prateek and Qumar entered into a partnership and invested Rs 3000 and Rs 4000 respectively. After 'x' months, Prateek invested Rs 1,000 more. If the profit at the end of the year was Rs 46,000 and the share of Prateek was Rs 2,000 less than Qumar, what is the value of x?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2324;&#2352; &#2325;&#2369;&#2350;&#2366;&#2352; &#2344;&#2375; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2325;&#2368; &#2324;&#2352; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; 4000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; 'x' &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342;, &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2344;&#2375; 1,000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2319;&#2404; &#2351;&#2342;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2354;&#2366;&#2349; 46,000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2341;&#2366; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2369;&#2350;&#2366;&#2352; &#2360;&#2375; 2,000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2350; &#2341;&#2366;, &#2340;&#2379; x &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Profit will be distributed in the ratio</p><p>(3000*x + 4000*(12  -  x)):(4000*12)</p><p>= (48000  -  1000x):48000</p><p>= (48  -  x):48</p><p>Sum of parts of the ratio = 96  -  x</p><p>Given, 48/(96  -  x)  -  (48  -  x)/(96  -  x) = 2000/46000</p><p>=&gt; x/(96  -  x) = 1/23</p><p>=&gt; 96  -  x = 23x</p><p>=&gt; x = 4</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Ram started a business with Rs. 60,000. After 9 months, Rahim joined him with a capital of Rs. 90,000. At the end of one year, they decided to donate 12% of their total profit to charity and divide the remaining in the ratio of their investment. If the share of Ram was Rs. 12000 more than that of Rahim, how much (in Rs.) have they donated to charity?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2350; &#2344;&#2375; 60,000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2360;&#2375; &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;&#2404; 9 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342;, &#2352;&#2361;&#2368;&#2350; 90,000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; &#2325;&#2375; &#2360;&#2366;&#2341; &#2313;&#2360;&#2325;&#2375; &#2360;&#2366;&#2341; &#2332;&#2369;&#2337;&#2364; &#2327;&#2351;&#2366;&#2404; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306;, &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; &#2325;&#2366; 12% &#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2358;&#2375;&#2359; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2352;&#2366;&#2350; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2352;&#2361;&#2368;&#2350; &#2325;&#2375; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375; &#2360;&#2375; 12000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2343;&#2367;&#2325; &#2341;&#2366;, &#2340;&#2379; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2342;&#2366;&#2344; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; (&#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306;) &#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">3000</span><span class=\"hqt\" style=\"display:none\">3000</span>",
      "<span class=\"eqt\">3200</span><span class=\"hqt\" style=\"display:none\">3200</span>",
      "<span class=\"eqt\">4000</span><span class=\"hqt\" style=\"display:none\">4000</span>",
      "<span class=\"eqt\">3600</span><span class=\"hqt\" style=\"display:none\">3600</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The ratio of their investment = 60000*12: 90000*3 = 8: 3 = Ratio of share</p><p>88% of total profit = (8 + 3)*12000/(8  -  3)= 11*2400</p><p>Total profit = 11*2400*100/88 = 30000</p><p>Total money they have donated in charity = 12% of 30000 = 3600</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Radha and Maya started a business with initial investment Rs. 18000, and Rs. 28000, respectively and after 8 months, Anu join them with Rs. 40000. At the end of the year, they earned Rs. 17800, then what is the share of profit of Maya?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2343;&#2366; &#2324;&#2352; &#2350;&#2366;&#2351;&#2366; &#2344;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 18000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; 28000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340;&#2368; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2360;&#2366;&#2341; &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; 8 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342; &#2309;&#2344;&#2369; 40000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2360;&#2366;&#2341; &#2313;&#2344;&#2325;&#2375; &#2360;&#2366;&#2341; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379; &#2327;&#2312;&#2404; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; 17800 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2350;&#2366;&#2319;, &#2340;&#2379; &#2350;&#2366;&#2351;&#2366; &#2325;&#2366; &#2354;&#2366;&#2349; &#2350;&#2375;&#2306; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">7200</span><span class=\"hqt\" style=\"display:none\">7200</span>",
      "<span class=\"eqt\">9600</span><span class=\"hqt\" style=\"display:none\">9600</span>",
      "<span class=\"eqt\">8400</span><span class=\"hqt\" style=\"display:none\">8400</span>",
      "<span class=\"eqt\">8000</span><span class=\"hqt\" style=\"display:none\">8000</span>"
    ],
    "correct_option_id": 2,
