<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>

                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>

                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>

            <div class="welcome-actions">

                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>P got married 15 years ago. Today her age is 1(3/5) times her age at the time of her marriage. At present her son's age is 1/5 of her age. What was her son's age 4 years ago as a fraction of P's age at that time?</p></span><span class=\"hqt\" style=\"display:none\"><p>P &#2325;&#2368; &#2358;&#2366;&#2342;&#2368; 15 &#2360;&#2366;&#2354; &#2346;&#2361;&#2354;&#2375; &#2361;&#2369;&#2312; &#2341;&#2368;&#2404; &#2310;&#2332; &#2313;&#2360;&#2325;&#2368; &#2313;&#2350;&#2381;&#2352; &#2313;&#2360;&#2325;&#2368; &#2358;&#2366;&#2342;&#2368; &#2325;&#2375; &#2360;&#2350;&#2351; &#2325;&#2368; &#2313;&#2350;&#2381;&#2352; &#2360;&#2375; 1(3/5) &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2313;&#2360;&#2325;&#2375; &#2348;&#2375;&#2335;&#2375; &#2325;&#2368; &#2313;&#2350;&#2381;&#2352; &#2313;&#2360;&#2325;&#2368; &#2313;&#2350;&#2381;&#2352; &#2325;&#2368; 1/5 &#2361;&#2376;&#2404; 4 &#2360;&#2366;&#2354; &#2346;&#2361;&#2354;&#2375; &#2313;&#2360;&#2325;&#2375; &#2348;&#2375;&#2335;&#2375; &#2325;&#2368; &#2313;&#2350;&#2381;&#2352; P &#2325;&#2368; &#2313;&#2360; &#2360;&#2350;&#2351; &#2325;&#2368; &#2313;&#2350;&#2381;&#2352; &#2325;&#2375; &#2309;&#2306;&#2358; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2366; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">1/9</span><span class=\"hqt\" style=\"display:none\">1/9</span>",
      "<span class=\"eqt\">1/8</span><span class=\"hqt\" style=\"display:none\">1/8</span>",
      "<span class=\"eqt\">5/9</span><span class=\"hqt\" style=\"display:none\">5/9</span>",
      "<span class=\"eqt\">1/10</span><span class=\"hqt\" style=\"display:none\">1/10</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>P's current age = p</p><p>Age at marriage = p - 15</p><p>p = (8/5)  X  (p - 15)</p><p>p = (8/5)p - 24</p><p>(3/5)p = 24</p><p>p = 40 years</p><p>Son's current age = (1/5)  X  40 = 8 years</p><p>4 years ago: Son = 8 - 4 = 4, P = 40 - 4 = 36</p><p>Fraction = 4 / 36 = 1/9</p><p>Option 1 is the correct answer</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>There are 160 multiple choice questions in a test. 4 marks are allotted for a correct answer and 1 mark is deducted for a wrong answer or un-attempted question from the total score of correct answers. If a candidate scored 400 marks in the test, how many questions did he answer correctly?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2335;&#2375;&#2360;&#2381;&#2335; &#2350;&#2375;&#2306; 160 &#2348;&#2361;&#2369;&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2368;&#2351; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; 4 &#2309;&#2306;&#2325; &#2310;&#2357;&#2306;&#2335;&#2367;&#2340; &#2325;&#2367;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2319;&#2325; &#2327;&#2354;&#2340; &#2313;&#2340;&#2381;&#2340;&#2352; &#2351;&#2366; &#2348;&#2367;&#2344;&#2366; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2325;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352;&#2379;&#2306; &#2325;&#2375; &#2325;&#2369;&#2354; &#2360;&#2381;&#2325;&#2379;&#2352; &#2360;&#2375; 1 &#2309;&#2306;&#2325; &#2325;&#2366;&#2335;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352; &#2344;&#2375; &#2335;&#2375;&#2360;&#2381;&#2335; &#2350;&#2375;&#2306; 400 &#2309;&#2306;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2319;, &#2340;&#2379; &#2313;&#2360;&#2344;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2367;&#2319;?</span>",
    "options": [
      "<span class=\"eqt\">110</span><span class=\"hqt\" style=\"display:none\">110</span>",
      "<span class=\"eqt\">115</span><span class=\"hqt\" style=\"display:none\">115</span>",
      "<span class=\"eqt\">112</span><span class=\"hqt\" style=\"display:none\">112</span>",
      "<span class=\"eqt\">120</span><span class=\"hqt\" style=\"display:none\">120</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let c = correct answers, w = wrong or unattempted.</p><p>Total questions: c + w = 160.</p><p>Score: 4c - w = 400.</p><p>Solve: c + w = 160 </p><p>w = 160 - c.</p><p>Substitute: 4c - (160 - c) = 400 </p><p>4c - 160 + c = 400 </p><p>5c - 160 = 400 </p><p>5c = 560 </p><p>c = 560 / 5 = <b>112</b>.</p><p>w = 160 - 112 = 48.</p><p>Option (c) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The number of heads on the farm, as determined by the farmer, was 60. When he counted, he discovered there were 150 legs. If all that was present were pigeons or horses, and every horse on the property had four legs while every pigeon had two, how many horses were there on the property?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2366;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2326;&#2375;&#2340; &#2346;&#2352; &#2360;&#2367;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 60 &#2341;&#2368;&#2404; &#2332;&#2348; &#2313;&#2360;&#2344;&#2375; &#2327;&#2367;&#2344;&#2340;&#2368; &#2325;&#2368;, &#2340;&#2379; &#2313;&#2360;&#2344;&#2375; &#2346;&#2366;&#2351;&#2366; &#2325;&#2367; 150 &#2346;&#2376;&#2352; &#2341;&#2375;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361;&#2366;&#2305; &#2325;&#2375;&#2357;&#2354; &#2325;&#2348;&#2370;&#2340;&#2352; &#2351;&#2366; &#2328;&#2379;&#2337;&#2364;&#2375; &#2341;&#2375;, &#2324;&#2352; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2328;&#2379;&#2337;&#2364;&#2375; &#2325;&#2375; &#2330;&#2366;&#2352; &#2346;&#2376;&#2352; &#2341;&#2375; &#2332;&#2348;&#2325;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2348;&#2370;&#2340;&#2352; &#2325;&#2375; &#2342;&#2379; &#2346;&#2376;&#2352; &#2341;&#2375;, &#2340;&#2379; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2346;&#2352; &#2325;&#2367;&#2340;&#2344;&#2375; &#2328;&#2379;&#2337;&#2364;&#2375; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let h = number of horses, p = number of pigeons</p><p>h + p = 60 (heads)</p><p>4h + 2p = 150 (legs)</p><p>Simplify legs: 2h + p = 75</p><p>Subtract heads equation: (2h + p) - (h + p) = 75 - 60</p><p>h = <b>15</b></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In a garden, there are 6 daisy plants the first year. Each year, a gardener adds 3 new daisy plants. He has 26 jasmine plants the first year and loses 2 each year. When will the number of daisy plants equal to the number of jasmine plants after the first year?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2348;&#2327;&#2368;&#2330;&#2375; &#2350;&#2375;&#2306;, &#2346;&#2361;&#2354;&#2375; &#2360;&#2366;&#2354; 6 &#2337;&#2375;&#2332;&#2364;&#2368; &#2346;&#2380;&#2343;&#2375; &#2361;&#2376;&#2306;&#2404; &#2361;&#2352; &#2360;&#2366;&#2354;, &#2319;&#2325; &#2350;&#2366;&#2354;&#2368; 3 &#2344;&#2319; &#2337;&#2375;&#2332;&#2364;&#2368; &#2346;&#2380;&#2343;&#2375; &#2354;&#2327;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2361;&#2354;&#2375; &#2360;&#2366;&#2354; &#2313;&#2360;&#2325;&#2375; &#2346;&#2366;&#2360; 26 &#2330;&#2350;&#2375;&#2354;&#2368; &#2325;&#2375; &#2346;&#2380;&#2343;&#2375; &#2341;&#2375; &#2324;&#2352; &#2361;&#2352; &#2360;&#2366;&#2354; 2 &#2346;&#2380;&#2343;&#2375; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2361;&#2354;&#2375; &#2360;&#2366;&#2354; &#2325;&#2375; &#2348;&#2366;&#2342; &#2337;&#2375;&#2332;&#2364;&#2368; &#2325;&#2375; &#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2330;&#2350;&#2375;&#2354;&#2368; &#2325;&#2375; &#2346;&#2380;&#2343;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2325;&#2348; &#2361;&#2379;&#2327;&#2368;?</span>",
    "options": [
      "<span class=\"eqt\">5 years</span><span class=\"hqt\" style=\"display:none\">5 &#2360;&#2366;&#2354;</span>",
      "<span class=\"eqt\">4 years</span><span class=\"hqt\" style=\"display:none\">4 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">2 years</span><span class=\"hqt\" style=\"display:none\">2 &#2360;&#2366;&#2354;</span>",
      "<span class=\"eqt\">6 years</span><span class=\"hqt\" style=\"display:none\">6 &#2360;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the number of years after the first year be n .</p><p>Number of daisy plants after n years = 6 + 3n</p><p>Number of jasmine plants after n years = 26 - 2n</p><p>We need to find when the number of daisy plants equals the number of jasmine plants:</p><p>6 + 3n = 26 - 2n</p><p>=&gt; 6 + 3n = 26 - 2n</p><p>=&gt; 3n + 2n = 26 - 6</p><p>=&gt; 5n = 20</p><p>=&gt; n = 4</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A and B each have a certain number of oranges. A says to B, \"If you give me 10 of your oranges, I will have twice the number of oranges left with you.\" B replies, \"If you give me 10 of your oranges, I will have the same number of oranges left with you.\" How many oranges does A have?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2375; &#2346;&#2366;&#2360; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2360;&#2306;&#2340;&#2352;&#2375; &#2361;&#2376;&#2306;&#2404; A, B &#2360;&#2375; &#2325;&#2361;&#2340;&#2366; &#2361;&#2376;, \"&#2351;&#2342;&#2367; &#2340;&#2369;&#2350; &#2350;&#2369;&#2333;&#2375; &#2309;&#2346;&#2344;&#2375; 10 &#2360;&#2306;&#2340;&#2352;&#2375; &#2342;&#2375; &#2342;&#2379;&#2327;&#2375;, &#2340;&#2379; &#2350;&#2375;&#2352;&#2375; &#2346;&#2366;&#2360; &#2340;&#2369;&#2350;&#2381;&#2361;&#2366;&#2352;&#2375; &#2346;&#2366;&#2360; &#2348;&#2330;&#2375; &#2360;&#2306;&#2340;&#2352;&#2375; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2342;&#2369;&#2327;&#2369;&#2344;&#2375; &#2360;&#2306;&#2340;&#2352;&#2375; &#2348;&#2330;&#2375;&#2306;&#2327;&#2375;&#2404;\" B &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, \"&#2351;&#2342;&#2367; &#2340;&#2369;&#2350; &#2350;&#2369;&#2333;&#2375; &#2309;&#2346;&#2344;&#2375; 10 &#2360;&#2306;&#2340;&#2352;&#2375; &#2342;&#2375; &#2342;&#2379;&#2327;&#2375;, &#2340;&#2379; &#2350;&#2375;&#2352;&#2375; &#2346;&#2366;&#2360; &#2340;&#2369;&#2350;&#2381;&#2361;&#2366;&#2352;&#2375; &#2346;&#2366;&#2360; &#2348;&#2330;&#2375; &#2360;&#2306;&#2340;&#2352;&#2375; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2360;&#2306;&#2340;&#2352;&#2375; &#2348;&#2330;&#2375;&#2306;&#2327;&#2375;&#2404;\" A &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2306;&#2340;&#2352;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">70</span><span class=\"hqt\" style=\"display:none\">70</span>",
      "<span class=\"eqt\">50</span><span class=\"hqt\" style=\"display:none\">50</span>",
      "<span class=\"eqt\">55</span><span class=\"hqt\" style=\"display:none\">55</span>",
      "<span class=\"eqt\">65</span><span class=\"hqt\" style=\"display:none\">65</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let number of oranges A and B have 'a' and 'b' respectively.</p><p>By A's statement:</p><p>a + 10 = 2(b  -  10)</p><p>a - 2b = -30 ---(1)</p><p>By B's statement:</p><p>b + 10 = a - 10</p><p>a - b = 20 ----(2)</p><p>Eqn(1)  -  2*eqn(2):</p><p>(a - 2b)  -  2(a  -  b) = -30  -  2*20</p><p>a = 70</p><p>Hence, number of oranges A have = 70</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Ten refrigerators and four mobile phones together cost &#8377; 2,10,000 while six refrigerators and two mobile phones together cost &#8377; 1,22,000. The cost (in &#8377;) of one refrigerator and two mobile phones is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2360; &#2352;&#2375;&#2347;&#2381;&#2352;&#2367;&#2332;&#2352;&#2375;&#2335;&#2352; &#2324;&#2352; &#2330;&#2366;&#2352; &#2350;&#2379;&#2348;&#2366;&#2311;&#2354; &#2347;&#2379;&#2344; &#2325;&#2368; &#2325;&#2369;&#2354; &#2325;&#2368;&#2350;&#2340; &#8377; 2,10,000 &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2331;&#2361; &#2352;&#2375;&#2347;&#2381;&#2352;&#2367;&#2332;&#2352;&#2375;&#2335;&#2352; &#2324;&#2352; &#2342;&#2379; &#2350;&#2379;&#2348;&#2366;&#2311;&#2354; &#2347;&#2379;&#2344; &#2325;&#2368; &#2325;&#2369;&#2354; &#2325;&#2368;&#2350;&#2340; &#8377; 1,22,000 &#2361;&#2376;&#2404; &#2319;&#2325; &#2352;&#2375;&#2347;&#2381;&#2352;&#2367;&#2332;&#2352;&#2375;&#2335;&#2352; &#2324;&#2352; &#2342;&#2379; &#2350;&#2379;&#2348;&#2366;&#2311;&#2354; &#2347;&#2379;&#2344; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; (&#8377; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">37000</span><span class=\"hqt\" style=\"display:none\">37000</span>",
      "<span class=\"eqt\">35200</span><span class=\"hqt\" style=\"display:none\">35200</span>",
      "<span class=\"eqt\">34500</span><span class=\"hqt\" style=\"display:none\">34500</span>",
      "<span class=\"eqt\">36000</span><span class=\"hqt\" style=\"display:none\">36000</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let cost of a refrigerator and a mobile is &#8377;R and &#8377;M respectively. </p><p>10R + 4M = 210000 ----(1)</p><p>6R + 2M = 122000 ----(2)</p><p>Eqn(1)  -  2*(eqn(2):</p><p>10R + 4M  -  2*(6R + 2M) = 210000  -  2*122000</p><p>2R = 34000</p><p>R = 17000</p><p>=&gt; 6*17000 + 2M = 122000</p><p>M = 10000</p><p>R + 2M = 17000 + 2*10000 = &#8377;37000 </p><p>Hence, cost of one refrigerator and two mobile phones = &#8377;37000 </p>",

    "question": "<span class=\"eqt\"><p>Anna and Ben each have a collection of marbles. If Anna gives one marble to Ben, they will both have an equal number of marbles. Conversely, if Ben gives one marble to Anna, she will end up with three times the number of marbles that Ben has. What is the total number of marbles they both have?</p></span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2381;&#2344;&#2366; &#2324;&#2352; &#2348;&#2375;&#2344; &#2325;&#2375; &#2346;&#2366;&#2360; &#2350;&#2366;&#2352;&#2381;&#2348;&#2354;&#2381;&#2360; &#2325;&#2366; &#2319;&#2325; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361; &#2361;&#2376;&#2404; &#2309;&#2327;&#2352; &#2309;&#2344;&#2381;&#2344;&#2366; &#2348;&#2375;&#2344; &#2325;&#2379; &#2319;&#2325; &#2350;&#2366;&#2352;&#2381;&#2348;&#2354; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2375; &#2346;&#2366;&#2360; &#2348;&#2352;&#2366;&#2348;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2350;&#2366;&#2352;&#2381;&#2348;&#2354;&#2381;&#2360; &#2361;&#2379;&#2306;&#2327;&#2375;&#2404; &#2311;&#2360;&#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340;, &#2309;&#2327;&#2352; &#2348;&#2375;&#2344; &#2309;&#2344;&#2381;&#2344;&#2366; &#2325;&#2379; &#2319;&#2325; &#2350;&#2366;&#2352;&#2381;&#2348;&#2354; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2375; &#2346;&#2366;&#2360; &#2348;&#2375;&#2344; &#2325;&#2375; &#2346;&#2366;&#2360; &#2350;&#2380;&#2332;&#2370;&#2342; &#2350;&#2366;&#2352;&#2381;&#2348;&#2354;&#2381;&#2360; &#2360;&#2375; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2350;&#2366;&#2352;&#2381;&#2348;&#2354;&#2381;&#2360; &#2361;&#2379;&#2306;&#2327;&#2375;&#2404; &#2313;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2366;&#2352;&#2381;&#2348;&#2354;&#2381;&#2360; &#2361;&#2376;&#2306;?</span>",

    "correct_option_id": 1,
    "solution": "<p>Let Anna have A marbles and Ben have B marbles.</p><p>According to question,</p><p>A - 1 = B + 1.......(i)</p><p>A + 1 = 3(B - 1)........(ii)</p><p>From (i) :</p><p>A - 1 = B + 1</p><p>=&gt; A = B + 2</p><p>From (ii) :</p><p>A + 1 = 3(B - 1)</p><p>Substitute A = B + 2 in the (ii):</p><p>(B + 2) + 1 = 3(B - 1)</p><p>=&gt; B + 3 = 3B - 3</p><p>=&gt; 6 = 2B</p><p>=&gt; B = 3</p><p>Substitute B = 3 in A = B + 2:</p><p>A = 3 + 2</p><p>=&gt; A = 5</p><p>Total number of marbles = A + B</p><p>Total number of marbles = 5 + 3</p><p>=&gt; Total number of marbles = 8</p>",

    "question": "<span class=\"eqt\"><p>Naman bought few apples for &#8377;720 from a shop. He negotiated the price and the shopkeeper reduced it by &#8377;2 per apple. Due to this Naman could buy four more apples than what he had bought earlier. How many apples did he originally buy?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2350;&#2344; &#2344;&#2375; &#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344; &#2360;&#2375; 720 &#2337;&#2377;&#2354;&#2352; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2360;&#2375;&#2348; &#2326;&#2352;&#2368;&#2342;&#2375;&#2404; &#2313;&#2360;&#2344;&#2375; &#2350;&#2379;&#2354;-&#2340;&#2379;&#2354; &#2325;&#2352;&#2325;&#2375; &#2325;&#2368;&#2350;&#2340; &#2340;&#2351; &#2325;&#2368; &#2324;&#2352; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2360;&#2375;&#2348; 2 &#2337;&#2377;&#2354;&#2352; &#2325;&#2350; &#2325;&#2352; &#2342;&#2367;&#2319;&#2404; &#2311;&#2360; &#2357;&#2332;&#2361; &#2360;&#2375; &#2344;&#2350;&#2344; &#2346;&#2361;&#2354;&#2375; &#2326;&#2352;&#2368;&#2342;&#2375; &#2327;&#2319; &#2360;&#2375;&#2348; &#2360;&#2375; &#2330;&#2366;&#2352; &#2332;&#2364;&#2381;&#2351;&#2366;&#2342;&#2366; &#2360;&#2375;&#2348; &#2326;&#2352;&#2368;&#2342; &#2360;&#2325;&#2366;&#2404; &#2313;&#2360;&#2344;&#2375; &#2358;&#2369;&#2352;&#2370; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2375;&#2348; &#2326;&#2352;&#2368;&#2342;&#2375; &#2341;&#2375;?</span>",

      "<span class=\"eqt\">Purchased 35 apples and 28 oranges and paid a sum of &#8377;1,029</span><span class=\"hqt\" style=\"display:none\">35 &#2360;&#2375;&#2348; &#2324;&#2352; 28 &#2360;&#2306;&#2340;&#2352;&#2375; &#2326;&#2352;&#2368;&#2342;&#2375; &#2324;&#2352; 1,029 &#2337;&#2377;&#2354;&#2352; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the price of an apple be &#8377;x and the price of an orange be &#8377;y.</p><p>According to question,</p><p>15x + 12y = 447........(i)</p><p><b>From a:</b> </p><p>25x + 20y = 745............(ii)</p><p>Multiply (i) by 5:</p><p>=&gt; 75x + 60y = 2235</p><p>Multiply (ii) by 3:</p><p>=&gt; 75x + 60y = 2235</p><p>Both equations are consistent.</p><p><b>From b:</b> </p><p>10x + 13y = 353........(iii)</p><p>Multiply (i) by 10:</p><p>=&gt; 150x + 120y = 4470</p><p>Multiply (iii) by 15:</p><p>=&gt; 150x + 195y = 5295</p><p>Subtract the equations:</p><p>=&gt; 75y = 825</p><p>=&gt; y = 11</p><p>Substitute y = 11 in (i):</p><p>=&gt; 15x + 12(11) = 447</p><p>=&gt; 15x = 315</p><p>=&gt; x = 21</p><p>Both equations are consistent.</p><p><b>From c:</b> </p><p>12x + 8y = 340........(iv)</p><p>15x + 12y = 447........(i)</p><p>Multiply (i) by 4:</p><p>=&gt; 60x + 48y = 1788</p><p>Multiply (iv) by 5:</p><p>=&gt; 60a + 40y = 1700</p><p>Subtract the equations:</p><p>=&gt; 8y = 88</p><p>=&gt; y = 11</p><p>Substitute o = 11 in (ii):</p><p>=&gt; 12x + 8(11) = 340</p><p>=&gt; 12x + 88 = 340</p><p>=&gt; 12x = 252</p><p>=&gt; x = 21</p><p>Both equations are consistent.</p><p><b>From d:</b> </p><p>35x + 28y = 1029.........(v)</p><p>15x + 12y = 447</p><p>Multiply (i) by 7:</p><p>=&gt; 105x + 84y = 3129</p><p>Multiply (v) by 3:</p><p>=&gt; 105x + 84y = 3087</p><p>Subtract the equations:</p><p>=&gt; y = 42</p><p>This is inconsistent</p>",
    "question_index": 14

    "question": "<span class=\"eqt\"><p>Rewa has some hens and some goats. If the total number of animal heads is 100 and the total number of animal feet is 348, then what is the total number of goats with Rewa?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2368;&#2357;&#2366; &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2369;&#2331; &#2350;&#2369;&#2352;&#2381;&#2327;&#2367;&#2351;&#2366;&#2305; &#2324;&#2352; &#2325;&#2369;&#2331; &#2348;&#2325;&#2352;&#2367;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2358;&#2369;&#2323;&#2306; &#2325;&#2375; &#2360;&#2367;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 100 &#2361;&#2376; &#2324;&#2352; &#2346;&#2358;&#2369;&#2323;&#2306; &#2325;&#2375; &#2346;&#2376;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 348 &#2361;&#2376;, &#2340;&#2379; &#2352;&#2368;&#2357;&#2366; &#2325;&#2375; &#2346;&#2366;&#2360; &#2350;&#2380;&#2332;&#2370;&#2342; &#2348;&#2325;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
