<body>

            <div class="welcome-actions">

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If the digit in unit's place of a number 363422<sup>2</sup>+773543 is A and the digit in unit's place of a number 32430<sup>2</sup>+83722 is B, then unit digit in (A+B)<sup>2</sup> is?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 363422<sup>2 </sup>+ 773543 &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2360;&#2381;&#2341;&#2366;&#2344; &#2357;&#2366;&#2354;&#2366; &#2309;&#2306;&#2325; A &#2361;&#2376; &#2324;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 32430<sup>2 </sup>+ 83722 &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2360;&#2381;&#2341;&#2366;&#2344; &#2357;&#2366;&#2354;&#2366; &#2309;&#2306;&#2325; B &#2361;&#2376;, &#2340;&#2379; (A+B)<sup>2</sup> &#2350;&#2375;&#2306; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2361;&#2376; -</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to the Question,</p><p>Number = 363422<sup>2</sup>+773543</p><p>Unit's digit in 363422<sup>2</sup>= 4</p><p>Unit's digit in 773543 =3</p><p>A= Unit's digit in 363422<sup>2</sup>+773543 = 4+3 = 7</p><p>Number = 32430<sup>2</sup>+83722</p><p>Unit's digit in 32430<sup>2</sup>= 0</p><p>Unit's digit in 83722 =2</p><p>B= Unit's digit in 32430<sup>2</sup>+83722 = 0+2 = 2</p><p>Now, (A+B)<sup>2 </sup>= (7+2)<sup>2</sup>=9<sup>2</sup>=81</p><p>Unit's digit in 81 = 1 Ans.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If (2x<sup>2</sup> + 5x  -  3) is completely divisible by (x + 3), then find the value of 'a' if (x  -  a) also divides the given equation completely. (a &#8800; 3)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (2x<sup>2</sup> + 5x - 3), (x + 3) &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376; &#2324;&#2352; &#2351;&#2342;&#2367; (x - a) &#2349;&#2368; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2346;&#2370;&#2352;&#2381;&#2339; &#2352;&#2370;&#2346; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; 'a' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; (a &#8800; 3)</p></span>",
    "options": [
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>",
      "<span class=\"eqt\">2/3</span><span class=\"hqt\" style=\"display:none\">2/3</span>",
      "<span class=\"eqt\">1/4</span><span class=\"hqt\" style=\"display:none\">1/4</span>",
      "<span class=\"eqt\">2/5</span><span class=\"hqt\" style=\"display:none\">2/5</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Since (x + 3) and (x  -  a) both divides the equation completely.</p><p>So, (x + 3)(x  -  a) = 2x<sup>2</sup> + 5x  -  3</p><p>=&gt; (x<sup>2</sup>  -  ax + 3x  -  3a) = (2x<sup>2</sup> + 5x  -  3)</p><p>=&gt; (x<sup>2</sup> + (3  -  a)x  -  3a) = (2x<sup>2</sup> + 5x  -  3)</p><p>=&gt; 2x<sup>2</sup> + (6  -  2a)x  -  6a = 2x<sup>2</sup> + 5x  -  3</p><p>After comparing-</p><p>=&gt; 6a = 3</p><p>=&gt; a = 3/6 = 1/2</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If (3x  -  2) is a factor of (4x<sup>2</sup> + 12Kx  -  10K), then what is the value of K?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (3x - 2), (4x<sup>2</sup> + 12Kx - 10K) &#2325;&#2366; &#2319;&#2325; &#2327;&#2369;&#2339;&#2344;&#2326;&#2306;&#2337; &#2361;&#2376;, &#2340;&#2379; K &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">7/5</span><span class=\"hqt\" style=\"display:none\">7/5</span>",
      "<span class=\"eqt\">8/9</span><span class=\"hqt\" style=\"display:none\">8/9</span>",
      "<span class=\"eqt\">5/8</span><span class=\"hqt\" style=\"display:none\">5/8</span>",
      "<span class=\"eqt\">3/7</span><span class=\"hqt\" style=\"display:none\">3/7</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Take,</p><p>3x  -  2 = 0</p><p>x = 2/3</p><p>Given that (3x  -  2) is a factor of 4x<sup>2</sup> + 12Kx  -  10K, so by putting x = 2/3, the value of equation should be 0.</p><p><img width=143 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22970/image009.png\"></p><p><img width=164 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22970/image010.png\"></p><p><img width=119 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22970/image011.png\"></p><p><img width=56 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22970/image012.png\"></p><p><img width=40 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22970/image013.png\"></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is the unit digit of 6</span><span><sup>199</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; 6<sup>199</sup> &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>We know that any power of 6 gives a number with unit digit as 6.</p><p>Hence required answer will be 6.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What is the sum of unit digit of 403<sup>21</sup> and 309<sup>43</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>403<sup>21</sup> &#2324;&#2352; 309<sup>43</sup> &#2325;&#2375; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325;&#2379; &#2325;&#2366; &#2351;&#2379;&#2327; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The concept of cyclicity is used to identify the last digit of the number.</p><p>Cyclicity chart:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\" rowspan=\"2\">Number</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\" rowspan=\"2\">Cyclicity</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\" colspan=\"4\">Unit digit values</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 4</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">0</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">0</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table><p>(Note: when remainder is 0, power = cyclicity)</p><p>In 403<sup>21</sup>:</p><p>Unit digit of 403 is 3.</p><p>From the cyclicity chart, cyclicity of 3 is 4.</p><p>So, we have to divide the power of 403 i.e.21 by 4.</p><p>After dividing 21 by 4, remainder = 1. So, power &#8800; cyclicity</p><p>Unit digit of 3<sup>1</sup> = 3</p><p>In 309<sup>43</sup>:</p><p>Unit digit of 309 is 9.</p><p>From the cyclicity chart, cyclicity of 9 is 2.</p><p>So, we have to divide the power of 309 i.e. 43 by 2.</p><p>After dividing 43 by 2, remainder = 1. So, power &#8800; cyclicity</p><p>In this case, unit digit of 9<sup>1</sup> = 9</p><p>Therefore, sum of unit digit of 403<sup>21</sup> and 309<sup>43</sup> = 3 + 9 = <b>12</b></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Find the unit digit of the given expression: (9<sup>125</sup>  -  2<sup>250</sup>)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; :</p><p>(9<sup>125</sup> - 2<sup>250</sup>)</p></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>We know that when the power of 9 is an odd number than the unit digit will 9.</p><p>So, unit digit of 9<sup>125</sup> = 9</p><p>And, cyclicity of 2 is 4.</p><p>E.g. 2<sup>1</sup> = 2, 2<sup>2</sup> = 4, 2<sup>3</sup> = 8, 2<sup>4</sup> = 16, 2<sup>5</sup> = 32, here we see that after 4 terms unit digit started repeating again.</p><p>After dividing the power of 2 by 4 remainder will be 2.</p><p>So, 2<sup>2 </sup>= 4</p><p>Hence, unit digit = 9  -  4 = 5</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find the unit digit of the given sum: 1 + 11 + 222 + 2222 + 55555 + 666666</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2351;&#2379;&#2327; &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;: 1 + 11 + 222 + 2222 + 55555 + 666666</p></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>To find the unit digit, we need to add the unit digit of the given sum.</p><p>1 + 1 + 2 + 2 + 5 + 6 = 17</p><p>The unit digit of 17 is 7.</p>",
    "question_index": 6
  },
  {

    "solution": "<p>8<sup>th</sup> term of the series will be 3<sup>28</sup>.</p><p>The cyclicity of the numbers is given below in the table:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Numbers</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Cyclicity</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1, 5, 6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4, 9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2, 3, 7, 8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td></tr></table><p>The unit digit of the series will be the unit digits of sum of unit digits of individual terms of the series.</p><p>Unit digit of 3<sup>21</sup> = 3<sup>1</sup> = 3</p><p>Unit digit of 3<sup>22</sup> = 3<sup>2</sup> = 9</p><p>Unit digit of 3<sup>23</sup> = 3<sup>3</sup> = 7</p><p>Unit digit of 3<sup>24</sup> = 3<sup>0</sup> = 1</p><p>Sum of unit digits of all terms = 2 * (3 + 9 + 7 + 1) = 40</p><p>Unit digit of the series = 0</p>",

ding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table></p><p>(Note: when remainder is 0, power = cyclicity)</p><p>In 456<sup>33</sup>:</p><p>Unit digit of 436 is 6.</p><p>From the cyclicity chart, cyclicity of 6 is 1.</p><p>So, we have to divide the power of 436 i.e.33 by 1.</p><p>After dividing 33 by 1, remainder = 0. So, power = cyclicity = 1</p><p>Unit digit of 6<sup>1</sup> = 6</p><p>In 425<sup>29</sup>:</p><p>Unit digit of 425 is 5.</p><p>From the cyclicity chart, cyclicity of 5 is 1.</p><p>So, we have to divide the power of 425 i.e. 29 by 1.</p><p>After dividing 29 by 1, remainder = 0. So, power = cyclicity = 1</p><p>In this case, unit digit of 5<sup>1</sup> = 5</p><p>In 448<sup>22</sup>:</p><p>Unit digit of 448 is 8.</p><p>From the cyclicity chart, cyclicity of 8 is 4.</p><p>So, we have to divide the power of 448 i.e. 22 by 4.</p><p>After dividing 22 by 4, remainder = 2. So, power &#8800; cyclicity</p><p>In this case, unit digit of 8<sup>2</sup> = 4</p><p>Therefore, sum of unit digits of 456<sup>33</sup>, 425<sup>29</sup> and 448<sup>22</sup>  = <b>15</b></p>",

  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are true?</p><p>Statement A: The unit digit of (13<sup>41</sup>  X  17<sup>18</sup>  X  18<sup>82</sup>) is 8.</p><p>Statement B: The unit digit of (25<sup>11!</sup> + 23<sup>12!</sup>) is 4.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;- &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>&#2325;&#2341;&#2344; A: (13<sup>41</sup> X 17<sup>18</sup> X 18<sup>82</sup>) &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; 8 &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; B: (25<sup>11!</sup> + 23<sup>12!</sup>) &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; 4 &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The concept of cyclicity is used to identify the last digit of the number.</p><p>For example:</p><p>2<sup>1</sup> = 2</p><p>2<sup>2</sup> = 4</p><p>2<sup>3</sup> = 8</p><p>2<sup>4</sup> = 16</p><p>2<sup>5</sup> = 32</p><p>After four consecutive powers, unit digit is repeated.</p><p>Hence, cyclicity of 2 is 4.</p><p>Similarly, we can calculate cyclicity of all the numbers as in the following table</p><p>Cyclicity Chart:</p><p><img width=386 height=333 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8063/image001.png\"></p><p>[Note: When, remainder is 0, power = cyclicity]</p><p>Statement A:</p><p>Unit digit of 13<sup>41</sup> = unit digit of 3<sup>41</sup> = unit digit of 3<sup>1</sup> = 3</p><p>Unit digit of 17<sup>18</sup> = Unit digit of 7<sup>18</sup> = Unit digit of 7<sup>2</sup> = 9</p><p>And, Unit digit of 18<sup>82</sup> = Unit digit of 8<sup>82</sup> = Unit digit of 8<sup>2</sup> = 4</p><p>So, unit digit (13<sup>41</sup>  X  17<sup>18</sup>  X  18<sup>82</sup>) = unit digit of (3  X  9  X  4) = 8</p><p>Hence, statement A is true.</p><p>Statement B:</p><p>Unit digit of 25<sup>11! </sup>= 5</p><p>And, unit digit of 23<sup>12! </sup>= unit digit of 3<sup>12!</sup> = unit digit of 3<sup>4</sup> = 1</p><p>So, unit digit of (25<sup>11!</sup> + 23<sup>12!</sup>) = 5 + 1 = 6</p><p>Hence, statement B is false.</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>In a two-digit number, 3 times the tens digit is equal to the 4 times the unit digit. If difference between original number and number obtained after reversing its digits is 9, then find the sum of digits.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379;-&#2309;&#2306;&#2325;&#2379; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2342;&#2361;&#2366;&#2312; &#2360;&#2381;&#2341;&#2366;&#2344; &#2357;&#2366;&#2354;&#2375; &#2309;&#2306;&#2325; &#2325;&#2366; 3 &#2327;&#2369;&#2344;&#2366;, &#2311;&#2325;&#2366;&#2312; &#2360;&#2381;&#2341;&#2366;&#2344; &#2357;&#2366;&#2354;&#2375; &#2309;&#2306;&#2325; &#2325;&#2375; 4 &#2327;&#2369;&#2344;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2350;&#2370;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2313;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 9 &#2361;&#2376;, &#2340;&#2379; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Since, 3 times the tens digit is equal to the 4 times the unit digit which means ratio of tens digit to unit digit of the number = 4: 3.</p><p>Let tens digit and unit digit of the two-digits number is '4x' and '3x' respectively.</p><p>Original number = 4x * 10 + 3x = 43x</p><p>Number obtained after reversing the digits = 3x * 10 + 4x = 34x</p><p>According to the question:</p><p>43x  -  34x = 9</p><p>9x = 9</p><p>x = 1</p><p>Sum of digits = 4x + 3x</p><p>= 7x</p><p>= 7 * 1 = 7</p>",
    "question_index": 14

    "question": "<span class=\"eqt\"><p>Sum of the digits of a two-digit number is 11 and number obtained after reversing its digit becomes 27 less than the original number, then find the original number.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2309;&#2306;&#2325;&#2368;&#2351; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; 11 &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2375; &#2309;&#2306;&#2325; &#2325;&#2379; &#2313;&#2354;&#2335;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2370;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 27 &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2350;&#2370;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "solution": "<p>Since sum of the digits of a two-digit number is 11.</p><p>Let tens digit and unit digit of the two-digits number is 'x' and '11  -  x' respectively.</p><p>Original number = x * 10 + (11  -  x) = 10x + 11  -  x = (9x + 11)</p><p>Number obtained after reversing the digits = 10 (11  -  x) + x = 110  -  10x + x = (110  -  9x)</p><p>According to the question:</p><p>(9x + 11)  -  (110  -  9x) = 27</p><p>18x = 27 + 110  -  11</p><p>18x = 126</p><p>x = 7</p><p>Original number = 9x + 11</p><p>= 63 + 11</p><p>= 74</p>",
