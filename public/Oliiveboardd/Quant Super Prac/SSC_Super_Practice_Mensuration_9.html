<body>

        </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A solid toy is in the form of a hemisphere surmounted by a right circular cone. Height of the cone is 2cm and the diameter of the base is 4cm. If a right circular cylinder circumscribes the solid, find how much more space it will cover.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2336;&#2379;&#2360; &#2326;&#2367;&#2354;&#2380;&#2344;&#2366; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2314;&#2346;&#2352;&#2368; &#2349;&#2366;&#2327; &#2319;&#2325; &#2354;&#2306;&#2348; &#2357;&#2352;&#2381;&#2340;&#2369;&#2354; &#2358;&#2306;&#2325;&#2369; &#2360;&#2375; &#2328;&#2367;&#2352;&#2366; &#2361;&#2376;| &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 2 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; &#2310;&#2343;&#2366;&#2352; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; 4 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;| &#2351;&#2342;&#2367; &#2319;&#2325; &#2354;&#2306;&#2348; &#2357;&#2352;&#2381;&#2340;&#2369;&#2354; &#2348;&#2375;&#2354;&#2344; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2336;&#2379;&#2360; &#2361;&#2376;, &#2340;&#2379; &#2351;&#2361; &#2325;&#2367;&#2340;&#2344;&#2366; &#2309;&#2343;&#2367;&#2325; &#2360;&#2381;&#2341;&#2366;&#2344; &#2328;&#2375;&#2352;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">4&pi; cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">4&#960; &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">2&pi; cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">2&#960; &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">16&pi; cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">16&#960; &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">8&pi; cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">8&#960; &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=141 height=160 id=\"Picture 65\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p664/image005.png\"></p><p>Let BPC be the hemisphere and ABC be the cone standing on the base of the hemisphere.</p><p>Radius BO of the hemisphere (as well as of the cone) = &frac12; * 4 = 2 cm</p><p>Now, let right circular cylinder EFGH circumscribe the given solid, radius of the base of the right circular cylinder = HP = BO = 2 cm</p><p>Height of the cylinder = AP = AO + OP</p><p>= 2cm + 2cm = 4 cm</p><p>Now, Volume of the right circular cylinder  -  Volume of the solid</p><p>= (&pi; * 2<sup>2</sup> * 4  -  (2/3 * &pi; * 2<sup>3</sup> + 1/3* &pi; * 2<sup>2</sup> * 2)) cm<sup>3</sup></p><p>= (16&pi;  -  8&pi;) cm<sup>3</sup></p><p>= 8&pi; cm<sup>3</sup></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A ball of lead 4 cm in diameter is covered with gold. If the volume of the gold and lead are equal, then the thickness of gold[given <img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-005811.png\"/> = 1. 259] is approximately</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>4 &#2360;&#2375;&#2350;&#2368; &#2357;&#2381;&#2351;&#2366;&#2360; &#2325;&#2368; &#2360;&#2368;&#2360;&#2375; &#2325;&#2368; &#2319;&#2325; &#2327;&#2375;&#2306;&#2342; &#2360;&#2379;&#2344;&#2375; &#2360;&#2375; &#2310;&#2357;&#2371;&#2340; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2379;&#2344;&#2375; &#2324;&#2352; &#2360;&#2368;&#2360;&#2375; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2379;&#2344;&#2375; &#2325;&#2368; &#2350;&#2379;&#2335;&#2366;&#2312; [&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; <img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-005811.png\"> = 1. 259] &#2354;&#2327;&#2349;&#2327; &#2361;&#2376;-</p></span>",
    "options": [
      "<span class=\"eqt\">5.038 cm</span><span class=\"hqt\" style=\"display:none\">5.038 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">5.190 cm</span><span class=\"hqt\" style=\"display:none\">5.190 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">1.038 cm</span><span class=\"hqt\" style=\"display:none\">1. 038 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">0.518 cm</span><span class=\"hqt\" style=\"display:none\">0.518 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "\"<p> Let the thickness of gold be r. </p><p> <img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/fdfe4de571ff6b836ad6271695ecd967.png\" /> </p><p>Then volume of gold = volume of ball &#8211; volume of lead ball</p><p>Volume of gold </p><p> \r<img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-005532.png\"/>\r </p><p>Now, it is given that volume of gold </p><p>= Volume of lead ball </p><p> <img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/487c938190880ae26b2d22405e864919.png\" /> </p><p></p>\"",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The radius of a sphere is &radic;5 times the radius of another sphere. What is the ratio of surface area of bigger sphere to that of smaller sphere?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2379;&#2354;&#2375; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;, &#2342;&#2370;&#2360;&#2352;&#2375; &#2327;&#2379;&#2354;&#2375; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2366; &radic;5 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2348;&#2337;&#2364;&#2375; &#2327;&#2379;&#2354;&#2375; &#2325;&#2375; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2324;&#2352; &#2331;&#2379;&#2335;&#2375; &#2327;&#2379;&#2354;&#2375; &#2325;&#2375; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">25: 1</span><span class=\"hqt\" style=\"display:none\">25: 1</span>",
      "<span class=\"eqt\">1: 25</span><span class=\"hqt\" style=\"display:none\">1: 25</span>",
      "<span class=\"eqt\">5: 1</span><span class=\"hqt\" style=\"display:none\">5: 1</span>",
      "<span class=\"eqt\">1: 5</span><span class=\"hqt\" style=\"display:none\">1: 5</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Radius of smaller sphere * &radic;5 = Radius of bigger sphere</p><p>Required ratio = 4&#960; * (radius of bigger sphere)<sup>2</sup>/ 4&#960; * (radius of smaller sphere)<sup>2</sup></p><p>= (&radic;5/1)<sup>2</sup> = 5: 1</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The thickness of a spherical metallic shell is 3 cm and external radius of the shell is 9 cm. The density of the shell is 14/11 mg/cubic cm. Find the mass of the shell.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2343;&#2366;&#2340;&#2381;&#2357;&#2367;&#2325; &#2326;&#2379;&#2354; &#2325;&#2368; &#2350;&#2379;&#2335;&#2366;&#2312; 3 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; &#2326;&#2379;&#2354; &#2325;&#2368; &#2348;&#2366;&#2361;&#2381;&#2351; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 9 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2326;&#2379;&#2354; &#2325;&#2366; &#2328;&#2344;&#2340;&#2381;&#2357; 14/11 &#2350;&#2367;&#2327;&#2381;&#2352;&#2366;/&#2328;&#2344; &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2326;&#2379;&#2354; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2376 mg</span><span class=\"hqt\" style=\"display:none\">2376 &#2350;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">2736 mg</span><span class=\"hqt\" style=\"display:none\">2736 &#2350;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">2763 mg</span><span class=\"hqt\" style=\"display:none\">2763 &#2350;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">2733 mg</span><span class=\"hqt\" style=\"display:none\">2733 &#2350;&#2367;&#2327;&#2381;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>External radius of shell= 9 cm</p><p>Thickness of shell = 3 cm</p><p>Internal radius of shell = 9  -  3 = 6 cm</p><p>Volume of shell = 4/3* &#960;* (9<sup>3 </sup> -  6<sup>3</sup>) =4/3* &#960;* 513 = 684&#960; cubic cm</p><p>Density of the shell = 14/11 mg/cm<sup>3</sup></p><p>Mass of the shell = volume * density</p><p>= 684* 22/7* 14/11 = 684* 4 = 2736 mg.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Out of a solid cube of side 26cm the largest possible sphere is carved out. Find the volume of the sphere to the first place of decimal?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>26 &#2360;&#2375;&#2350;&#2368; &#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2336;&#2379;&#2360; &#2328;&#2344; &#2360;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2327;&#2379;&#2354;&#2375; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2342;&#2358;&#2350;&#2354;&#2357; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2340;&#2325; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">8829.7</span><span class=\"hqt\" style=\"display:none\">8829.7</span>",
      "<span class=\"eqt\">9225.9</span><span class=\"hqt\" style=\"display:none\">9225.9</span>",
      "<span class=\"eqt\">7227.6</span><span class=\"hqt\" style=\"display:none\">7227.6</span>",
      "<span class=\"eqt\">9206.4</span><span class=\"hqt\" style=\"display:none\">9206.4</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>For the largest possible sphere r = (1/2) * edge of solid cube</p><p>= (1/2) * 26 = 13 cm</p><p>the volume of sphere = (4/3) * &pi; * r<sup>3</sup></p><p>= (4/3) * (22/7) * 13 * 13 * 13</p><p>= 9206.4 cm<sup>3</sup></p><p></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Three hemispheres of radius 14 cm are cut out from a sphere of radius 21 cm. Find the volume of remaining sphere.</p></span><span class=\"hqt\" style=\"display:none\"><p>21 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2327;&#2379;&#2354;&#2375; &#2360;&#2375; 14 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2340;&#2368;&#2344; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2366;&#2335;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2358;&#2375;&#2359; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">36652 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">36652 cm<sup>3</sup></span>",
      "<span class=\"eqt\">21560 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">21560 cm<sup>3</sup></span>",
      "<span class=\"eqt\">28748 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">28748 cm<sup>3</sup></span>",
      "<span class=\"eqt\">25580 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">25580 cm<sup>3</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The volume of the remaining sphere = Volume of the sphere  -  3*Volume of the hemisphere</p><p>= (4/3) * (22/7) * 21<sup>3</sup>  -  3 * (2/3) * (22/7) * 14<sup>3</sup></p><p>= 4*22 (441 - 196)</p><p>= 88 * 245</p><p>= 21560 cm<sup>3</sup></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find the volume of a sphere whose radius is 7/8 times of the side of a cube whose volume is 1728 cm<sup>3</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2319;&#2325; &#2328;&#2344; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2325;&#2366; 7/8 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2328;&#2344; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 1728 cm<sup>3</sup> &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3630 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">3630 cm<sup>3</sup></span>",
      "<span class=\"eqt\">3960 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">3960 cm<sup>3</sup></span>",
      "<span class=\"eqt\">4851 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">4851 cm<sup>3</sup></span>",
      "<span class=\"eqt\">5472 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">5472 cm<sup>3</sup></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Volume of a cube = 1728 cm<sup>3</sup></p><p>a = 12 cm</p><p>Radius of the sphere = 7/8 * 12 = 21/2 cm</p><p>Volume of the sphere = 4/3 * &#960;r<sup>3</sup> = 4/3 * 22/7 * 21/2 * 21/2 * 21/2 = 4851 cm<sup>3</sup></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Find the surface area (in sq. cm) of a sphere whose volume is 310464 cubic cm. Use &#960; = 22/7</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (sq. cm &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2367;&#2360;&#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 310464 &#2328;&#2344; &#2360;&#2375;&#2350;&#2368; (cm) &#2361;&#2376;&#2404; (&#960; = 22/7 &#2354;&#2368;&#2332;&#2367;&#2351;&#2375;)</p></span>",
    "options": [
      "<span class=\"eqt\">22176 sq. cm</span><span class=\"hqt\" style=\"display:none\">22176 sq. cm</span>",

  {

  {
    "question": "<span class=\"eqt\"><p>A spherical iron ball with 4 m external radius has mass of 3564 kg. What is the thickness of the shell if the density of iron ball is 13.5 kg/m<sup>3</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>4 m &#2348;&#2366;&#2361;&#2352;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2354;&#2379;&#2361;&#2375; &#2325;&#2368; &#2327;&#2375;&#2306;&#2342; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; 3564 kg &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2354;&#2379;&#2361;&#2375; &#2325;&#2375; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2328;&#2344;&#2340;&#2381;&#2357; 13.5 kg/m<sup>3</sup> &#2361;&#2379; &#2340;&#2379; &#2338;&#2366;&#2305;&#2330;&#2375; &#2325;&#2368; &#2350;&#2379;&#2335;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [

    "correct_option_id": 2,
    "solution": "<p>External radius r<sub>2 </sub>= 4 m</p><p>Mass = 3564 kg</p><p>Density = 13.5 kg/m<sup>3</sup></p><p>Internal radius = r<sub>1</sub></p><p>Volume = 4/3 &#960; (r<sub>2</sub><sup>3 </sup>- r<sub>1</sub><sup>3</sup>)</p><p>= 4/3  X  22/7 (4<sup>3 </sup>- r<sub>1</sub><sup>3</sup>)</p><p>Density = mass/volume</p><p>13.5 = 3564  X  21 / {88 X (4<sup>3</sup>  -  r<sub>1</sub><sup>3</sup>)}</p><p>(4<sup>3</sup>  -  r<sub>1</sub><sup>3</sup>) = 3564  X  21 / (88  X  13.5) = 63</p><p>r<sub>1</sub><sup>3</sup> = 64  -  63 = 1</p><p>r<sub>1 </sub>= 1 m</p><p>Thickness of iron ball = 4  -  1 = 3 m</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>The diameter of a spherical ball is 12 cm. If the spherical ball is melted into a wire and the diameter of wire is half the diameter of the sphere, then find the length of the wire. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2327;&#2375;&#2306;&#2342; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; 12 cm &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2327;&#2375;&#2306;&#2342; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352; &#2340;&#2366;&#2352; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2340;&#2366;&#2352; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360;, &#2327;&#2379;&#2354;&#2375; &#2325;&#2375; &#2357;&#2381;&#2351;&#2366;&#2360; &#2325;&#2366; &#2310;&#2343;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2340;&#2366;&#2352; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",

    "correct_option_id": 3,
    "solution": "<p>Radius of sphere = 12/2 = 6 cm </p><p>Radius of wire = 6/2 cm = 3 cm</p><p>The volume of the sphere = The volume of the cylinder</p><p>4/3 * &#960; * R<sup>3</sup> = &#960; * r<sup>2</sup> * h</p><p>4/3 * 6 * 6 * 6 = 3 * 3 * h</p><p>h = 32 cm </p>",

    "question": "<span class=\"eqt\"><p>Two metallic balls X and Y are such that the diameter of X is R, and the diameter of ball Y is P. If R: P = 15: 7, find the ratio of volumes of ball X to that of ball Y.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2343;&#2366;&#2340;&#2369; &#2325;&#2368; &#2342;&#2379; &#2327;&#2375;&#2306;&#2342;&#2375;&#2306; X &#2324;&#2352; Y &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306; &#2325;&#2367; X &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; R &#2361;&#2376; &#2324;&#2352; &#2327;&#2375;&#2306;&#2342; Y &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; P &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; R: P = 15: 7 &#2361;&#2376;, &#2340;&#2379; &#2327;&#2375;&#2306;&#2342; X &#2324;&#2352; &#2327;&#2375;&#2306;&#2342; Y &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A solid circular sphere of radius 21cm is melted to form right circular cones. What number of right circular cones of radius 8.4cm and height 5 cm can be formed by melting the given sphere?</p></span><span class=\"hqt\" style=\"display:none\"><p>21 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2336;&#2379;&#2360; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2327;&#2379;&#2354;&#2375; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352; &#2354;&#2306;&#2348; &#2357;&#2352;&#2381;&#2340;&#2381;&#2340;&#2369;&#2354; &#2358;&#2306;&#2325;&#2369; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2367;&#2319; &#2327;&#2319; &#2327;&#2379;&#2354;&#2375; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352; 8.4 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; 5 cm &#2314;&#2306;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2354;&#2306;&#2348; &#2357;&#2352;&#2381;&#2340;&#2381;&#2340;&#2369;&#2354; &#2358;&#2306;&#2325;&#2369; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",

  {

    "correct_option_id": 0,
    "solution": "<p>Volume of sphere = 4/3 &#960;r<sup>3</sup></p><p>Volume of cylinder = &#960;r<sup>2</sup> h</p><p>As given, &#960;r<sup>2</sup> h= 4/3 &#960;r<sup>3</sup></p><p>=&gt; h = 4/3 r</p><p>=&gt; h/r = 4/3</p><p>=&gt; h/2r = 4/(3 X 2) = 2/3</p><p>=&gt; d/h = 3/2 [where d = 2r]</p>",

    "question": "<span class=\"eqt\"><p>Two hemispheres of radius 14 cm and 7 cm are melted to form a cuboidal box of length and breadth 49 cm and 12 cm respectively. Find the height of the cuboid.</p></span><span class=\"hqt\" style=\"display:none\"><p>14 cm &#2324;&#2352; 7 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2379;&#2306; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 49 cm &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; 12 cm &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2328;&#2344;&#2366;&#2349;&#2366;&#2325;&#2366;&#2352; &#2348;&#2377;&#2325;&#2381;&#2360; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2328;&#2344;&#2366;&#2349; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

      "<span class=\"eqt\">7 cm</span><span class=\"hqt\" style=\"display:none\">7 cm</span>",

    "solution": "<p>Volume of the hemispheres = Volume of the cuboid</p><p>2/3 * 22/7 * (14<sup>3</sup> + 7<sup>3</sup>) = 49*12*h</p><p>6468 = 49*12*h</p><p>h = 11 cm</p>",

    "question": "<span class=\"eqt\"><p>Find the total surface area of a hemisphere if the lateral surface area of the hemisphere is 196 sq. cm.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2309;&#2352;&#2381;&#2343;-&#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 196 sq. cm &#2361;&#2376;, &#2340;&#2379; &#2309;&#2352;&#2381;&#2343;-&#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
