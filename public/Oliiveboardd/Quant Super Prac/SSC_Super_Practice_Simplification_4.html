<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Find the sum of <img width=81 height=27 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p5108/image005.png\"> and &radic;(1215 + 9<sup>2</sup>).</p></span><span class=\"hqt\" style=\"display:none\"><p><img width=\"81\" height=\"27\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p5108/image005.png\"> &#2324;&#2352; &radic;(1215 + 9<sup>2</sup>) &#2325;&#2366; &#2351;&#2379;&#2327; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">43</span><span class=\"hqt\" style=\"display:none\">43</span>",
      "<span class=\"eqt\">47</span><span class=\"hqt\" style=\"display:none\">47</span>",
      "<span class=\"eqt\">55</span><span class=\"hqt\" style=\"display:none\">55</span>",
      "<span class=\"eqt\">65</span><span class=\"hqt\" style=\"display:none\">65</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let a = <img width=81 height=27 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p5108/image005.png\"> and b = &radic;(1215 + 9<sup>2</sup>)</p><p>a = <img width=81 height=27 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p5108/image005.png\"></p><p>a = &radic;(832 + 9)</p><p>a = &radic;(841)</p><p>a = 29</p><p>b = &radic;(1215 + 9<sup>2</sup>)</p><p>b = &radic;(1215 + 81)</p><p>b = &radic;(1296)</p><p>b = 36</p><p>a + b = 29 + 36 = 65</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is true?</p><p>I. 29<sup>56</sup>+67<sup>87</sup> is a prime number.</p><p>II. 146<sup>61</sup> - 88<sup>41</sup> is a prime number.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p><p>I. 29<sup>56</sup>+67<sup>87</sup> &#2319;&#2325; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;|</p><p>II. 146<sup>61</sup> - 88<sup>41</sup> &#2319;&#2325; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;|</p></span>",
    "options": [
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>I. When an odd number is multiplied by itself multiple times, then solution gives an odd value. So, 29<sup>56</sup> and 67<sup>87</sup> are odd.</p><p>Addition of two odd number always gives an even value. So, 29<sup>56</sup>+67<sup>87</sup> is even and an even number cannot be a prime number.(except 2, which is not possible in this case)</p><p>Hence, statement I is wrong.</p><p>II. When an even number is multiplied by itself multiple times, then solution gives an even value. So, 146<sup>61</sup> and 88<sup>41</sup> are even.(except 2, which is not possible in this case)</p><p>Addition of two even number always gives an even value. So, 146<sup>61</sup> - 88<sup>41</sup> is even and an even number cannot be a prime number.</p><p>Hence, statement II is wrong.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is not a prime number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2319;&#2325; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>",
      "<span class=\"eqt\">29</span><span class=\"hqt\" style=\"display:none\">29</span>",
      "<span class=\"eqt\">69</span><span class=\"hqt\" style=\"display:none\">69</span>",
      "<span class=\"eqt\">97</span><span class=\"hqt\" style=\"display:none\">97</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Since 69 is divisible by 3, hence it is not a prime number.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What is the square root of [2896  -  (45 x 60)]? </p></span><span class=\"hqt\" style=\"display:none\"><p>[2896 - (45 x 60)] &#2325;&#2366; &#2357;&#2352;&#2381;&#2327;&#2350;&#2370;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Square root of [2896  -  (45 x 60)]</p><p>= square root of [2896  -  2700]</p><p>= square root of 196</p><p>= <b>14</b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If one number is 13/15 times of another number and difference between the two numbers is 12, then what is sum of both numbers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; 13/15 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 12 &#2361;&#2376;, &#2340;&#2379; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">134</span><span class=\"hqt\" style=\"display:none\">134</span>",
      "<span class=\"eqt\">128</span><span class=\"hqt\" style=\"display:none\">128</span>",
      "<span class=\"eqt\">168</span><span class=\"hqt\" style=\"display:none\">168</span>",
      "<span class=\"eqt\">132</span><span class=\"hqt\" style=\"display:none\">132</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let one number is a and another number be b.</p><p>a/b= 13/15</p><p>Let a = 13k and b = 15k</p><p>So, b - a = 12</p><p>=&gt; 15k  -  13k = 12</p><p>=&gt; k = 6</p><p>Hence, sum of both numbers = 13 * 6 + 15 * 6 = 168</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>How can Two-Third of 15% be written in decimal form?</p></span><span class=\"hqt\" style=\"display:none\"><p>15% &#2325;&#2366; &#2342;&#2379;-&#2340;&#2368;&#2361;&#2366;&#2312; &#2342;&#2358;&#2350;&#2354;&#2357; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">0.1</span><span class=\"hqt\" style=\"display:none\">0.1</span>",
      "<span class=\"eqt\">0.01</span><span class=\"hqt\" style=\"display:none\">0.01</span>",
      "<span class=\"eqt\">1.0</span><span class=\"hqt\" style=\"display:none\">1.0</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>According to Question,</p><p>Two-Third of 15%= 2/3<sup>rd</sup> of 15%</p><p>=2/3 x 15/100</p><p>=10/100</p><p>=1/10</p><p>=0.1 Ans.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find the square of number of odd numbers between 5 and 33.</p></span><span class=\"hqt\" style=\"display:none\"><p>5 &#2324;&#2352; 33 &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2357;&#2367;&#2359;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2357;&#2352;&#2381;&#2327; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">121</span><span class=\"hqt\" style=\"display:none\">121</span>",
      "<span class=\"eqt\">225</span><span class=\"hqt\" style=\"display:none\">225</span>",
      "<span class=\"eqt\">169</span><span class=\"hqt\" style=\"display:none\">169</span>",
      "<span class=\"eqt\">196</span><span class=\"hqt\" style=\"display:none\">196</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>According to Question,</p><p>Single digits odd number between 5 and 33 are 2</p><p>And, double digit odd numbers between 5 and 33 are 11</p><p>Total odd Numbers = 2+11=13</p><p>Square of the number of digits = 13 *13 = 169 Ans.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If x is an odd number and y is an even number, then which of the following is an odd number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; x &#2319;&#2325; &#2357;&#2367;&#2359;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; y &#2319;&#2325; &#2360;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2319;&#2325; &#2357;&#2367;&#2359;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">x + y + 1</span><span class=\"hqt\" style=\"display:none\">x + y + 1</span>",
      "<span class=\"eqt\">xy</span><span class=\"hqt\" style=\"display:none\">xy</span>",
      "<span class=\"eqt\">xy + y</span><span class=\"hqt\" style=\"display:none\">xy + y</span>",
      "<span class=\"eqt\">x + y + 2</span><span class=\"hqt\" style=\"display:none\">x + y + 2</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>x = odd, so let x = 2n + 1, where n is any positive integer</p><p>y = even, so let y = 2m, where m is any positive integer</p><p>x + y + 1 = 2n + 1 + 2m + 1 = 2n + 2m + 2 = 2(n + m + 1), which is even</p><p>xy = (2n + 1)2m = 2m(2n + 1), which is even</p><p>xy + y = 2m(2n + 1) + 2m = 2m(2n + 2), which is even</p><p>x + y + 2 = 2n + 1 + 2m + 2 = 2n + 2m + 3 = 2(n + m + 1) + 1, so it is odd.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which is the largest fraction among 4/13, 7/11, 8/15 and 4/9?</p></span><span class=\"hqt\" style=\"display:none\"><p>4/13, 7/11, 8/15 &#2324;&#2352; 4/9 &#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">7/11</span><span class=\"hqt\" style=\"display:none\">7/11</span>",
      "<span class=\"eqt\">4/13</span><span class=\"hqt\" style=\"display:none\">4/13</span>",
      "<span class=\"eqt\">8/15</span><span class=\"hqt\" style=\"display:none\">8/15</span>",
      "<span class=\"eqt\">4/9</span><span class=\"hqt\" style=\"display:none\">4/9</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>4/13, 7/11, 8/15 and 4/9</p><p>= 1980/6435, 4095/6435, 3432/6435, and 2860/6435</p><p>Largest = 4095/6435 = 7/11</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Express the decimal number 9.825 in fraction.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 9.825 &#2325;&#2379; &#2349;&#2367;&#2344;&#2381;&#2344; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">89/25</span><span class=\"hqt\" style=\"display:none\">89/25</span>",
      "<span class=\"eqt\">393/40</span><span class=\"hqt\" style=\"display:none\">393/40</span>",
      "<span class=\"eqt\">72/23</span><span class=\"hqt\" style=\"display:none\">72/23</span>",
      "<span class=\"eqt\">43/7</span><span class=\"hqt\" style=\"display:none\">43/7</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>To express 9.825 in fraction, we have to remove the decimal</p><p>So, 9.825 = 9825/1000</p><p>Deducing it to lowest fraction, we get;</p><p>9.825 = 393/40 Ans.</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>How many prime numbers are there from 200 to 267?</p></span><span class=\"hqt\" style=\"display:none\"><p>200 &#2360;&#2375; 267 &#2340;&#2325; &#2325;&#2367;&#2340;&#2344;&#2368; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",

    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is smaller than 1/5?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2349;&#2367;&#2344;&#2381;&#2344; 1/5 &#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2/7</span><span class=\"hqt\" style=\"display:none\">2/7</span>",
      "<span class=\"eqt\">1/4</span><span class=\"hqt\" style=\"display:none\">1/4</span>",
      "<span class=\"eqt\">1/6</span><span class=\"hqt\" style=\"display:none\">1/6</span>",
      "<span class=\"eqt\">1/3</span><span class=\"hqt\" style=\"display:none\">1/3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>1/5 = 0.2</p><p>2/7 = 0.28, 1/4 = 0.25, 1/6 = 0.166, 1/3= 0.333</p><p>So, 1/6 &lt; 1/5</p><p>Also, if a fraction has numerator = 1 and denominator &gt; 5, it will be smaller than 1/5.</p>",
    "question_index": 11
