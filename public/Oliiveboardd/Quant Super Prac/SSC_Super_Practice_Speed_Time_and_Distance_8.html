<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In an intergalactic hover-race covering a distance of 4000 meters, Commander Samar's cruiser finishes the race while Pilot Ashutosh is still 360 meters behind. If Samar's cruising speed is 72 km/h, what is the speed of Ashutosh's hovercraft?</p></span><span class=\"hqt\" style=\"display:none\"><p>4000 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2309;&#2306;&#2340;&#2352;-&#2327;&#2376;&#2354;&#2375;&#2325;&#2381;&#2335;&#2367;&#2325; &#2361;&#2379;&#2357;&#2352;-&#2352;&#2375;&#2360; &#2350;&#2375;&#2306;, &#2325;&#2350;&#2366;&#2306;&#2337;&#2352; &#2360;&#2350;&#2352; &#2325;&#2366; &#2325;&#2381;&#2352;&#2370;&#2332;&#2352; &#2352;&#2375;&#2360; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2351;&#2354;&#2335; &#2310;&#2358;&#2369;&#2340;&#2379;&#2359; &#2309;&#2349;&#2368; &#2349;&#2368; 360 &#2350;&#2368;&#2335;&#2352; &#2346;&#2368;&#2331;&#2375; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2350;&#2352; &#2325;&#2368; &#2325;&#2381;&#2352;&#2370;&#2332;&#2364;&#2367;&#2306;&#2327; &#2327;&#2340;&#2367; 72 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2310;&#2358;&#2369;&#2340;&#2379;&#2359; &#2325;&#2375; &#2361;&#2379;&#2357;&#2352;&#2325;&#2381;&#2352;&#2366;&#2347;&#2381;&#2335; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">65.52 km/h</span><span class=\"hqt\" style=\"display:none\">65.52 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">60.24 km/h</span><span class=\"hqt\" style=\"display:none\">60.24 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">68.28 km/h</span><span class=\"hqt\" style=\"display:none\">68.28 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">64.12 km/h</span><span class=\"hqt\" style=\"display:none\">64.12 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Samar beats Ashutosh by 360 m in a 4000 m race, which means Ashutosh runs 3640 m in the time Samar runs 4000 m. </p><p>So, we can find Ashutosh's speed by proportionality. </p><p>The speed of Ashutosh = (4000  -  360) * 72/4000</p><p>= 65.52 km/h</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In a race of 5000 m, Tiya beats Payal by 420 m. If the speed of Tiya is 48 km/h, then the time taken by Payal to cover 43.968 km at the same speed is:</p></span><span class=\"hqt\" style=\"display:none\"><p>5000 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2380;&#2337;&#2364; &#2350;&#2375;&#2306;, &#2335;&#2367;&#2351;&#2366; &#2346;&#2366;&#2351;&#2354; &#2325;&#2379; 420 &#2350;&#2368;&#2335;&#2352; &#2360;&#2375; &#2361;&#2352;&#2366; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2335;&#2367;&#2351;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; 48 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2366;&#2351;&#2354; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2350;&#2366;&#2344; &#2327;&#2340;&#2367; &#2360;&#2375; 43.968 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">30 min</span><span class=\"hqt\" style=\"display:none\">30 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">1 hr</span><span class=\"hqt\" style=\"display:none\">1 &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">90 min</span><span class=\"hqt\" style=\"display:none\">90 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">25 min</span><span class=\"hqt\" style=\"display:none\">25 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Tiya beats Payal by 420 m in a 5000 m race, which means Payal runs 4580 m in the time Tiya runs 5000 m.</p><p>So, we can find Payal's speed by proportionality.</p><p>The speed of Payala = (5000  -  420) * 48/5000</p><p>= 43.968 km/h</p><p>Time taken by Payal to cover 43.968 km is 1 hr.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In a 12 km jungle trail race, explorer P allows explorer Q to start 4 km ahead as a friendly gesture. Surprisingly, they both reach the campsite finish line at the same moment. If Q's hiking speed is 16 km/h, what is P's actual speed?</p></span><span class=\"hqt\" style=\"display:none\"><p>12 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2332;&#2306;&#2327;&#2354; &#2335;&#2381;&#2352;&#2375;&#2354; &#2352;&#2375;&#2360; &#2350;&#2375;&#2306;, &#2326;&#2379;&#2332;&#2325;&#2352;&#2381;&#2340;&#2366; P, &#2326;&#2379;&#2332;&#2325;&#2352;&#2381;&#2340;&#2366; Q &#2325;&#2379; &#2350;&#2367;&#2340;&#2381;&#2352;&#2340;&#2366;&#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2381;&#2351;&#2357;&#2361;&#2366;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; 4 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352; &#2310;&#2327;&#2375; &#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2310;&#2358;&#2381;&#2330;&#2352;&#2381;&#2351;&#2332;&#2344;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375;, &#2357;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2319;&#2325; &#2361;&#2368; &#2360;&#2350;&#2351; &#2346;&#2352; &#2325;&#2376;&#2306;&#2346;&#2360;&#2366;&#2311;&#2335; &#2347;&#2367;&#2344;&#2367;&#2358; &#2354;&#2366;&#2311;&#2344; &#2346;&#2352; &#2346;&#2361;&#2369;&#2305;&#2330;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; Q &#2325;&#2368; &#2361;&#2366;&#2311;&#2325;&#2367;&#2306;&#2327; &#2327;&#2340;&#2367; 16 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;, &#2340;&#2379; P &#2325;&#2368; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2327;&#2340;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">28 km/h</span><span class=\"hqt\" style=\"display:none\">28 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">20 km/h</span><span class=\"hqt\" style=\"display:none\">20 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">24 km/h</span><span class=\"hqt\" style=\"display:none\">24 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">26 km/h</span><span class=\"hqt\" style=\"display:none\">26 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>When P moves 12 km, then Q moves = 12  -  4000/1000 = 8 km</p><p>Time taken by Q to move 8 km = 8/16 = 8 * 60/16 = 30 minutes </p><p>Speed of P = 12/ (30/60) = 24 km/h </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The length of a track is 1.4 km, the speeds of A and B are in the ratio of 7: 5 and A wins by 10 seconds. What is the approximate percentage of distance B covers when A finishes the race?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2335;&#2381;&#2352;&#2376;&#2325; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 1.4 &#2325;&#2367;&#2350;&#2368; &#2361;&#2376;, A &#2324;&#2352; B &#2325;&#2368; &#2327;&#2340;&#2367; 7: 5 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376; &#2324;&#2352; A 10 &#2360;&#2375;&#2325;&#2306;&#2337; &#2360;&#2375; &#2332;&#2368;&#2340;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; A &#2342;&#2380;&#2337;&#2364; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2351; &#2325;&#2368; &#2327;&#2312; &#2342;&#2370;&#2352;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">80%</span><span class=\"hqt\" style=\"display:none\">80%</span>",
      "<span class=\"eqt\">65%</span><span class=\"hqt\" style=\"display:none\">65%</span>",
      "<span class=\"eqt\">90%</span><span class=\"hqt\" style=\"display:none\">90%</span>",
      "<span class=\"eqt\">71%</span><span class=\"hqt\" style=\"display:none\">71%</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A wins a 7 m race by 2 m.</p><p>So, in a 1.4 km race, A wins by 1400 x 2/7 = 400 m.</p><p>So, when A finishes the race, B covers = 1000 m</p><p>Required% = 1000 x 100/1400 = 71% (approximately.)</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In a 1250 m race, P runs at 25 km/h. P gives Q a head start of 50 m and still beats him by 12 seconds. Find the speed of Q. </p></span><span class=\"hqt\" style=\"display:none\"><p>1250 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2380;&#2337;&#2364; &#2350;&#2375;&#2306;, P, 25 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2342;&#2380;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404; P, Q &#2360;&#2375; 50 &#2350;&#2368;&#2335;&#2352; &#2310;&#2327;&#2375; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; &#2349;&#2368; &#2313;&#2360;&#2375; 12 &#2360;&#2375;&#2325;&#2306;&#2337; &#2360;&#2375; &#2361;&#2352;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; Q &#2325;&#2368; &#2327;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">19.6 km/h</span><span class=\"hqt\" style=\"display:none\">19.6 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">22.4 km/h</span><span class=\"hqt\" style=\"display:none\">22.4 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">22.5 km/h</span><span class=\"hqt\" style=\"display:none\">22.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">18.4 km/h</span><span class=\"hqt\" style=\"display:none\">18.4 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>[To convert km/h in m/s, multiply with 5/18] </b></p><p>25 km/h = 125/18 m/s</p><p>Time taken by P to cover 1250 m = 1250/(125/18) = 180 seconds </p><p>Distance covered by Q = 1250  -  50 = 1200 m</p><p>Time taken by Q to cover 1200 m = 180 + 12 = 192 seconds </p><p>Hence, the speed of Q = 1200/ 192 = 6.25 m/s = 6.25 * 18/5 = 22.5 km/h </p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In a 975-meter underground tunnel sprint between two futuristic robots, Robo-X races at a speed of 23.4 km/h. Out of courtesy, Robo-X gives Robo-Y a 50-meter head start-but still finishes 35 seconds ahead. What is Robo-Y's running speed?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2349;&#2357;&#2367;&#2359;&#2381;&#2351;&#2357;&#2366;&#2342;&#2368; &#2352;&#2379;&#2348;&#2379;&#2335;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; 975 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2349;&#2370;&#2350;&#2367;&#2327;&#2340; &#2360;&#2369;&#2352;&#2306;&#2327; &#2360;&#2381;&#2346;&#2381;&#2352;&#2367;&#2306;&#2335; &#2350;&#2375;&#2306;, &#2352;&#2379;&#2348;&#2379;-&#2319;&#2325;&#2381;&#2360; 23.4 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2342;&#2380;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404; &#2358;&#2367;&#2359;&#2381;&#2335;&#2366;&#2330;&#2366;&#2352; &#2325;&#2375; &#2344;&#2366;&#2340;&#2375;, &#2352;&#2379;&#2348;&#2379;-&#2319;&#2325;&#2381;&#2360; &#2352;&#2379;&#2348;&#2379;-&#2357;&#2366;&#2312; &#2325;&#2379; 50 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2348;&#2338;&#2364;&#2340; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;-&#2354;&#2375;&#2325;&#2367;&#2344; &#2347;&#2367;&#2352; &#2349;&#2368; 35 &#2360;&#2375;&#2325;&#2306;&#2337; &#2310;&#2327;&#2375; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404; &#2352;&#2379;&#2348;&#2379;-&#2357;&#2366;&#2312; &#2325;&#2368; &#2342;&#2380;&#2337;&#2364;&#2344;&#2375; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">27 km/h</span><span class=\"hqt\" style=\"display:none\">27 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">12 km/h</span><span class=\"hqt\" style=\"display:none\">12 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">16 km/h</span><span class=\"hqt\" style=\"display:none\">16 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">18 km/h</span><span class=\"hqt\" style=\"display:none\">18 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>[To convert km/h in m/s, multiply with 5/18] </b></p><p>23.4 km/h = 6.5 m/s</p><p>Time taken by X to cover 975 m = 975/6.5 = 150 seconds </p><p>Distance covered by Y = 975  -  50 = 925 m</p><p>Time taken by Y to cover 925 m = 150 + 35 = 185 seconds </p><p>Hence, the speed of Y = 925/185 = 5 m/s = 5 * 18/5 = 18 km/h</p>",
    "question_index": 5
  },
  {
