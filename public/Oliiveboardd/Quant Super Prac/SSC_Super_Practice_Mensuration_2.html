<!DOCTYPE html>

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">

                    </div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A well with 14 cm radius is dug 23 cm deep. Find the volume of the earth taken out of it.</p></span><span class=\"hqt\" style=\"display:none\">14 &#2360;&#2375;&#2350;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2325;&#2369;&#2310;&#2305; 23 &#2360;&#2375;&#2350;&#2368; &#2327;&#2361;&#2352;&#2366; &#2326;&#2379;&#2342;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360;&#2350;&#2375;&#2306; &#2360;&#2375; &#2344;&#2367;&#2325;&#2366;&#2354;&#2368; &#2327;&#2312; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">14,178 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">14,178 cm<sup>3</sup></span>",
      "<span class=\"eqt\">14,108 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">14,108 cm<sup>3</sup></span>",
      "<span class=\"eqt\">14,168 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">14,168 cm<sup>3</sup></span>",
      "<span class=\"eqt\">15,168 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">15,168 cm<sup>3</sup></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Volume of the cylinder = &#960;r<sup>2</sup>h</p><p>=&gt;&#960;  X  14<sup>2</sup>  X  23 = (22/7)  X  196  X  23</p><p>=&gt; 22  X  28  X  23 = 14168 cm<sup>3</sup></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The volume of a right circular cone is 150 &#960; cm<sup>3</sup> and its height is 18 cm. Find its slant height (in cm) (correct to 2 decimal places). </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2354;&#2350;&#2381;&#2348; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 150 &#960; &#2360;&#2375;&#2350;&#2368;<sup>3</sup> &#2361;&#2376; &#2340;&#2341;&#2366; &#2311;&#2360;&#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; 18 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2368; &#2340;&#2367;&#2352;&#2381;&#2351;&#2325; &#2314;&#2305;&#2330;&#2366;&#2312; (&#2360;&#2375;&#2350;&#2368; &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; (2 &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2340;&#2325; &#2360;&#2361;&#2368;)&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">18.68</span><span class=\"hqt\" style=\"display:none\">18.68</span>",
      "<span class=\"eqt\">25.35</span><span class=\"hqt\" style=\"display:none\">25.35</span>",
      "<span class=\"eqt\">28.68</span><span class=\"hqt\" style=\"display:none\">28.68</span>",
      "<span class=\"eqt\">15.25</span><span class=\"hqt\" style=\"display:none\">15.25</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>h = 18 cm</p><p>Volume of a right circular cone = 150 &#960; cm<sup>3</sup> </p><p>(1/3) * &#960; * r<sup>2</sup> * 18 = 150&#960; </p><p>r<sup>2</sup> = 25</p><p>r = 5 cm </p><p>Slant height = l = &radic;(5<sup>2</sup> + 18<sup>2</sup>) </p><p>= &radic;(25 + 324)</p><p>= &radic;349 </p><p>&#8776; 18.68 </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The radius of the base of a cylinder is 14 cm and its curved surface area is 880 cm<sup>2</sup>. Its volume (in cm<sup>3</sup>) is: (Take &#960; = 22/7)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 14 cm &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2366; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 880 cm<sup>2 </sup>&#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2366; &#2310;&#2351;&#2340;&#2344; (cm<sup>3 </sup>&#2350;&#2375;&#2306;) &#2361;&#2376;:</p><p>(&#960; = 22/7 &#2354;&#2368;&#2332;&#2367;&#2319;)</p></span>",
    "options": [
      "<span class=\"eqt\">3080</span><span class=\"hqt\" style=\"display:none\">3080</span>",
      "<span class=\"eqt\">6160</span><span class=\"hqt\" style=\"display:none\">6160</span>",
      "<span class=\"eqt\">1078</span><span class=\"hqt\" style=\"display:none\">1078</span>",
      "<span class=\"eqt\">9240</span><span class=\"hqt\" style=\"display:none\">9240</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let height of the cylinder = 'h' cm</p><p>Curved surface area = 2&#960;rh</p><p>880 = 2 * (22/7) * 14 * h</p><p>h = 10 cm</p><p>Volume of cylinder = &#960;r<sup>2</sup>h</p><p>= (22/7) * 14<sup>2</sup> * 10</p><p>= 6160 cm<sup>3</sup></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A cylinder of height 8 cm and radius 6 cm is melted and converted into 3 cones of the same radius and height that of cylinder. Determine the total curved surface area of cones.</p></span><span class=\"hqt\" style=\"display:none\"><p>8 cm &#2314;&#2306;&#2330;&#2366;&#2312; &#2324;&#2352; 6 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2360;&#2350;&#2366;&#2344; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; 3 &#2358;&#2306;&#2325;&#2369;&#2323;&#2306; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2358;&#2306;&#2325;&#2369;&#2323;&#2306; &#2325;&#2366; &#2325;&#2369;&#2354; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">180 &#960; cm2</span><span class=\"hqt\" style=\"display:none\">180 &#960; cm2</span>",
      "<span class=\"eqt\">60 &#960; cm2</span><span class=\"hqt\" style=\"display:none\">60 &#960; cm2</span>",
      "<span class=\"eqt\">144 &#960; cm2</span><span class=\"hqt\" style=\"display:none\">144 &#960; cm2</span>",
      "<span class=\"eqt\">120 &#960; cm2</span><span class=\"hqt\" style=\"display:none\">120 &#960; cm2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Radius of cone = Radius of cylinder = r = 6 cm</p><p>Height of cone = Height of cylinder = h = 8 cm</p><p>Lateral height of cone = &radic;(8<sup>2</sup> + 6<sup>2</sup>) = l = 10 cm</p><p>Curved surface area of one cone = &#960;rl = &#960; * 6 * 10 = 60&#960; cm<sup>2</sup></p><p>Curved surface area of three such cones = 3 * 60&#960; = 180&#960; cm<sup>2</sup></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A drainage tile is a cylindrical shell 42 cm long. The inside and outside diameters are 8 cm and 14 cm, respectively. What is the volume (in cm<sup>3</sup>) of clay required for the tile? (Use &#960; = 22/7)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2332;&#2354; &#2344;&#2367;&#2325;&#2366;&#2360;&#2368; &#2335;&#2366;&#2311;&#2354; 42 &#2360;&#2375;&#2350;&#2368; &#2354;&#2306;&#2348;&#2366; &#2319;&#2325; &#2348;&#2375;&#2354;&#2344;&#2366;&#2325;&#2366;&#2352; &#2326;&#2379;&#2354; &#2361;&#2376;&#2404; &#2309;&#2306;&#2342;&#2352; &#2324;&#2352; &#2348;&#2366;&#2361;&#2352; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 8 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 14 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2335;&#2366;&#2311;&#2354; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; (&#2360;&#2375;&#2350;&#2368; 3 &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;? (&#960; = 22/7 &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2375;&#2306;)</p></span>",
    "options": [
      "<span class=\"eqt\">5241</span><span class=\"hqt\" style=\"display:none\">5241</span>",
      "<span class=\"eqt\">4356</span><span class=\"hqt\" style=\"display:none\">4356</span>",
      "<span class=\"eqt\">4881</span><span class=\"hqt\" style=\"display:none\">4881</span>",
      "<span class=\"eqt\">4125</span><span class=\"hqt\" style=\"display:none\">4125</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Outer radius = 14/2 = 7 cm</p><p>Inner radius = 8/2 = 4 cm</p><p>h = 42 cm</p><p>Volume = &#960;h (R<sup>2</sup>  -  r<sup>2</sup>) </p><p>= (22/7) * 42 * (7<sup>2</sup> - 4<sup>2</sup>) </p><p>= 132 * (49  -  16) </p><p>= 132 * 33</p><p>= 4356 cm<sup>3</sup></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The curved surface area of a cone is 308 cm<sup>2</sup>, and its slant height is 28 cm. Find the radius of its base. (Use &#960; = 22/7) </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 308 &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2361;&#2376;, &#2340;&#2341;&#2366; &#2311;&#2360;&#2325;&#2368; &#2340;&#2367;&#2352;&#2381;&#2351;&#2325; &#2314;&#2305;&#2330;&#2366;&#2312; 28 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; (&#960; = 22/7 &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352;&#2375;&#2306;) </p></span>",
    "options": [
      "<span class=\"eqt\">2.8 cm</span><span class=\"hqt\" style=\"display:none\">2.8 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">3.5 cm</span><span class=\"hqt\" style=\"display:none\">3.5 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">2.5 cm</span><span class=\"hqt\" style=\"display:none\">2.5 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">3.0 cm</span><span class=\"hqt\" style=\"display:none\">3.0 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>l = 28 cm</p><p>Curved surface area of a cone = 308 cm<sup>2</sup></p><p>(22/7) * r * 28 = 308</p><p>88r = 308</p><p>r = 3.5 cm </p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio between the height and radius of the base of a cylinder is 7 : 5. If its volume is 14836.5 cm<sup>3</sup>, then find its total surface area (take &#960; = 3.14).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2324;&#2352; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 7:5 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2311;&#2360;&#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 14836.5 cm<sup>3 </sup>&#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; (&#960; = 3.14 &#2354;&#2368;&#2332;&#2367;&#2319;)&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3391.2 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">3391.2 cm<sup>2</sup></span>",
      "<span class=\"eqt\">5391.2 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">5391.2 cm<sup>2</sup></span>",
      "<span class=\"eqt\">4391.2 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">4391.2 cm<sup>2</sup></span>",
      "<span class=\"eqt\">5591.2 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">5591.2 cm<sup>2</sup></span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let height and radius of cylinder is '7x' and '5x' respectively.</p><p>Volume of cylinder = &#960;2<sup>2</sup>h = 14836.5</p><p>3.14 * (5x)<sup>2</sup> * 7x = 14836.5</p><p>x<sup>3</sup> = 27</p><p>x = 3</p><p>Total surface area of cylinder = 2&#960;r(h + r) = 2 * 3.14 * 5x * (7x + 5x)</p><p>= 376.8 * x<sup>2</sup></p><p>= 376.8 * 3<sup>2</sup></p><p>= 3391.2 cm<sup>2</sup></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A rectangular piece of paper is 50 cm long and 22 cm wide. If a cylinder is formed by rolling the paper along its breadth, then the volume of the cylinder is:</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2327;&#2332;&#2364; &#2325;&#2366; &#2319;&#2325; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2335;&#2369;&#2325;&#2337;&#2364;&#2366; 50 &#2360;&#2375;&#2350;&#2368; &#2354;&#2306;&#2348;&#2366; &#2324;&#2352; 22 &#2360;&#2375;&#2350;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2366;&#2327;&#2332;&#2364; &#2325;&#2379; &#2313;&#2360;&#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2375; &#2309;&#2344;&#2369;&#2342;&#2367;&#2358; &#2328;&#2369;&#2350;&#2366;&#2325;&#2352; &#2319;&#2325; &#2348;&#2375;&#2354;&#2344;&#2366;&#2325;&#2366;&#2352; &#2335;&#2369;&#2325;&#2337;&#2364;&#2366; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2375;&#2354;&#2344;&#2366;&#2325;&#2366;&#2352; &#2335;&#2369;&#2325;&#2337;&#2364;&#2375; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">2125 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">2125 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">1925 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">1925 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
