    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Amount of Rs.10000 invested at a rate of 10% compounded annually for 3 years will amount to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2369;.10000 &#2325;&#2368; &#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2379; 10% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352;, &#2357;&#2361; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; _____ &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.12210</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.12210</span>",
      "<span class=\"eqt\">Rs.13310</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.13310</span>",
      "<span class=\"eqt\">Rs.14410</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.14410</span>",
      "<span class=\"eqt\">Rs.15510</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.15510</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=157 height=44 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20864/image011.png\"></p><p><img width=268 height=44 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20864/image012.png\"></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A sum increased by 20% at some rate of simple interest in T years. The compound interest on Rs.12000 at same rate of interest in 3 years is Rs. 3972 when compounded annually. What should come in place of T?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2350;&#2375;&#2306; T &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2325;&#2367;&#2360;&#2368; &#2342;&#2352; &#2360;&#2375; 20% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; 12000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 3 &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2350;&#2366;&#2344; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; 3972 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; T &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2310;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">4 years</span><span class=\"hqt\" style=\"display:none\">4 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">3 years</span><span class=\"hqt\" style=\"display:none\">3 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">1 year</span><span class=\"hqt\" style=\"display:none\">1 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">2 years</span><span class=\"hqt\" style=\"display:none\">2 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let, the rate of interest be R%.</p><p>Then, CI = 12000  X  ((1+R/100)<sup>3 </sup> - 1) = 3972</p><p>(1+R/100)<sup>3</sup> = (3972+12000)/12000</p><p>(100+R)<sup>3</sup> = 1331000</p><p>R = 10%</p><p>Now, at simple rate of interest,</p><p>20% of sum = sum X  10 X  T/100</p><p>T = 2 years</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A certain sum amounts to &#8377;32210.2 in 15 months at the rate of 40% per annum compounded quarterly. Find the value of sum.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 40% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2340;&#2381;&#2352;&#2376;&#2350;&#2366;&#2360;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; 15 &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#8377;32210.2 &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;24000</span><span class=\"hqt\" style=\"display:none\">&#8377;24000</span>",
      "<span class=\"eqt\">&#8377;13600</span><span class=\"hqt\" style=\"display:none\">&#8377;13600</span>",
      "<span class=\"eqt\">&#8377;20000</span><span class=\"hqt\" style=\"display:none\">&#8377;20000</span>",
      "<span class=\"eqt\">&#8377;25200</span><span class=\"hqt\" style=\"display:none\">&#8377;25200</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A = &#8377;32210.2, n = 15/3 = 5, R = 40/4 = 10%</p><p>32210.2 = P * (1 + 10/100)<sup>5</sup></p><p>32210.2 = P * (11/10)<sup>5</sup></p><p>P = 0.2 * 100000</p><p>P = &#8377;20000</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A person invested a certain amount in compound interest at a 25% rate of interest compounded annually for three years. If the compound interest received is Rs. 4880, then find the amount invested. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#2340;&#2368;&#2344; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; 25% &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; 4880 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 5120</span><span class=\"hqt\" style=\"display:none\">5120 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 5520</span><span class=\"hqt\" style=\"display:none\">5520 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 5820</span><span class=\"hqt\" style=\"display:none\">5820 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 5420</span><span class=\"hqt\" style=\"display:none\">5420 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>25% = 1/4 </p><p>C.I = P * (5<sup>T</sup>  -  4<sup>T</sup>)/4<sup>T</sup> [5 = sum of numerator and denominator of 1/4 and T = Time]</p><p>4880 = P * (5<sup>3</sup>  -  4<sup>3</sup>)/4<sup>3</sup> </p><p>4880 * 64 = P * 61 </p><p>P = 4880 * 64/61 </p><p>P = Rs. 5120 </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A certain sum of money at 15% per annum compounded annually for two years has amounted to Rs. 4232. If the same sum of money is invested into simple interest at 22% per annum for four years, then what is the simple interest?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 15% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2325;&#2352; &#2342;&#2379; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2369;. 4232 &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2350;&#2366;&#2344; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; 22% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2330;&#2366;&#2352; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 2832</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 2832</span>",
      "<span class=\"eqt\">Rs. 2772</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 2772</span>",
      "<span class=\"eqt\">Rs. 2816</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 2816</span>",
      "<span class=\"eqt\">Rs. 3232</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 3232</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let Rs. P be the interest</p><p>4232 = P(1 + 15/100)<sup>2</sup></p><p>=&gt; P = 4232 * 100/115 * 100/115</p><p>=&gt; P = Rs. 3200</p><p>And SI = (3200 * 22 * 4)/100 = Rs. 2816</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If a person invested Rs. 3200 in compound interest at a 30% rate of interest compounded annually for three years, then find the total amount received. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#2352;&#2369;.3200 &#2325;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2379; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; 30% &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2340;&#2368;&#2344; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;, &#2340;&#2379; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2369;&#2354; &#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 7630.4</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 7630.4</span>",
      "<span class=\"eqt\">Rs. 7830.4</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 7830.4</span>",
      "<span class=\"eqt\">Rs. 7230.4</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 7230.4</span>",
      "<span class=\"eqt\">Rs. 7030.4</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 7030.4</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Amount = C.I + Principal amount </p><p>30% = 3/10 </p><p>C.I = P (13<sup>T</sup>  -  10<sup>T</sup>)10<sup>T</sup> [13 = sum of numerator and denominator of 3/10 and T = Time]</p><p>= 3200 * (13<sup>3</sup>  -  10<sup>3</sup>)/10<sup>3</sup> </p><p>= 3200 * (2197  -  1000)/1000 </p><p>= Rs. 3830.4 </p><p>Amount = 3830.4 + 3200 = Rs. 7030.4</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If a person invested Rs. 6000 in compound interest at a 20% rate of interest compounded half yearly for two years, then find the compound interest received.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2309;&#2352;&#2381;&#2343;&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; 20% &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2342;&#2379; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; 6000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 2484.6</span><span class=\"hqt\" style=\"display:none\">2484.6 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 2784.6</span><span class=\"hqt\" style=\"display:none\">2784.6 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 2684.6</span><span class=\"hqt\" style=\"display:none\">2684.6 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 2984.6</span><span class=\"hqt\" style=\"display:none\">2984.6 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>[For half yearly - Time double and the Rate of interest half]</b></p><p>20%/2 = 1/10 and Time = 2 * 2 = 4 </p><p>C.I = P (11<sup>T</sup>  -  10<sup>T</sup>)/10<sup>T</sup> [11 = sum of numerator and denominator of 1/10 and T = Time]</p><p>= 6000 * (11<sup>4</sup>  -  10<sup>4</sup>)/10<sup>4</sup> </p><p>= 6000 * (14641  -  10000)/10000 </p><p>= 6 * 4641/10</p><p>= Rs. 2784.6 </p>",
    "question_index": 6
