<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="10">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">10</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">10 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A speaks the truth 5 out of 7 times and B speaks truth 8 out of 9 times. What is the probability that they contradict each other in stating the same fact?</p></span><span class=\"hqt\" style=\"display:none\"><p>A, 7 &#2350;&#2375;&#2306; &#2360;&#2375; 5 &#2348;&#2366;&#2352; &#2360;&#2340;&#2381;&#2351; &#2348;&#2379;&#2354;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; B, 9 &#2350;&#2375;&#2306; &#2360;&#2375; 8 &#2348;&#2366;&#2352; &#2360;&#2340;&#2381;&#2351; &#2348;&#2379;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2344;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2350;&#2366;&#2344; &#2340;&#2341;&#2381;&#2351; &#2325;&#2379; &#2325;&#2361;&#2344;&#2375; &#2350;&#2375;&#2306; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2366; &#2326;&#2306;&#2337;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1/7</span><span class=\"hqt\" style=\"display:none\">1/7</span>",
      "<span class=\"eqt\">1/9</span><span class=\"hqt\" style=\"display:none\">1/9</span>",
      "<span class=\"eqt\">1/4</span><span class=\"hqt\" style=\"display:none\">1/4</span>",
      "<span class=\"eqt\">1/3</span><span class=\"hqt\" style=\"display:none\">1/3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>P(A) = 5/7</p><p>P(B) = 8/9</p><p>Probability that A lies = 1-5/7 = 2/7</p><p>Probability that B lies = 1-8/9 = 1/9</p><p>Required probability = P(A) * P(B') + P(A') * P(B)</p><p>= (5/7) * (1/9) + (2/7) * (8/9)</p><p>= 5/63 + 16/63</p><p>= 21/63</p><p>= 1/3</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Three cards are drawn one after another with replacement from a pack of cards. What is the probability of getting first card a Jack, second card a black card, and third card an even numbered card?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2366;&#2358; &#2325;&#2368; &#2319;&#2325; &#2327;&#2337;&#2381;&#2337;&#2368; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; &#2319;&#2325; &#2325;&#2375; &#2348;&#2366;&#2342; &#2319;&#2325; &#2325;&#2375; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2325;&#2366;&#2352;&#2381;&#2337; &#2344;&#2367;&#2325;&#2366;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2361;&#2354;&#2375; &#2325;&#2366;&#2352;&#2381;&#2337; &#2325;&#2375; &#2332;&#2376;&#2325;, &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2366;&#2352;&#2381;&#2337; &#2325;&#2375; &#2325;&#2366;&#2354;&#2366; &#2325;&#2366;&#2352;&#2381;&#2337; &#2324;&#2352; &#2340;&#2368;&#2360;&#2352;&#2375; &#2325;&#2366;&#2352;&#2381;&#2337; &#2325;&#2375; &#2319;&#2325; &#2360;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2366; &#2325;&#2366;&#2352;&#2381;&#2337; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">5/169</span><span class=\"hqt\" style=\"display:none\">5/169</span>",
      "<span class=\"eqt\">5/338</span><span class=\"hqt\" style=\"display:none\">5/338</span>",
      "<span class=\"eqt\">25/26</span><span class=\"hqt\" style=\"display:none\">25/26</span>",
      "<span class=\"eqt\">20/338</span><span class=\"hqt\" style=\"display:none\">20/338</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Probability of drawing a Jack from a pack of cards = 4/52 = 1/13</p><p>Probability of drawing a black card from a pack of cards = 26/52 = 1/2</p><p>Probability of drawing an even numbered card from a pack of cards = 20/52 = 5/13</p><p>Required probability = 1/13 * &frac12; * 5/13</p><p>= 5/338</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If A and B are two events such that P(A &#8899; B) = 3/4, P(A &#8898; B) = 1/4 and P(B) = 1/2, then the events A and B are _____.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A &#2324;&#2352; B &#2342;&#2379; &#2328;&#2335;&#2344;&#2366;&#2319;&#2305; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306; &#2325;&#2367; P(A &#8899; B) = 3/4, P(A &#8898; B) = 1/4 &#2324;&#2352; P(B) = 1/2 &#2361;&#2376;, &#2340;&#2379; &#2328;&#2335;&#2344;&#2366;&#2319;&#2305; A &#2324;&#2352; B _____ &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Not mutually</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2344;&#2361;&#2368;&#2306;</span>",
      "<span class=\"eqt\">Mutually exclusive</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2309;&#2344;&#2344;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Independent</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Dependent</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2358;&#2381;&#2352;&#2367;&#2340;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>P(A &#8899; B) = P(A) + P(B)  -  P(A &#8898; B)</p><p>3/4 = P(A) + &frac12; - &#188;</p><p>P(A) = 3/4  -  &#188; = 1/2</p><p>P(A) * P(B) = 1/2 * &frac12; = 1/4 = P(A &#8898; B)</p><p>So, A and B are independent event.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A person can hit a target 5 times out of 8 shots. If he fires 10 shots, what is the probability that he will hit the target twice?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; 8 &#2358;&#2377;&#2335; &#2350;&#2375;&#2306; &#2360;&#2375; 5 &#2348;&#2366;&#2352; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2349;&#2375;&#2342; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; 10 &#2358;&#2377;&#2335; &#2347;&#2366;&#2351;&#2352; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2325;&#2379; &#2342;&#2379; &#2348;&#2366;&#2352; &#2349;&#2375;&#2342;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376; ?</p></span>",
    "options": [
      "<span class=\"eqt\">(1135 X 3<sup>8</sup>)/8<sup>10</sup></span><span class=\"hqt\" style=\"display:none\">(1135 X 3<sup>8</sup>)/8<sup>10</sup></span>",
      "<span class=\"eqt\">(1165 X 3<sup>8</sup>)/8<sup>10</sup></span><span class=\"hqt\" style=\"display:none\">(1165 X 3<sup>8</sup>)/8<sup>10</sup></span>",
      "<span class=\"eqt\">(1175 X 3<sup>8</sup>)/8<sup>10</sup></span><span class=\"hqt\" style=\"display:none\">(1175 X 3<sup>8</sup>)/8<sup>10</sup></span>",
      "<span class=\"eqt\">(1125 X 3<sup>8</sup>)/8<sup>10</sup></span><span class=\"hqt\" style=\"display:none\">(1125 X 3<sup>8</sup>)/8<sup>10</sup></span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Probability of hitting the target P(H) = 5/8</p><p>Probability of not hitting the target P(H') = 1  -  5/8 = 3/8</p><p>If the person hit the target twice then he will not hit exactly 8 shots.</p><p>Probability that he will hit the target twice = <sup>10</sup>C<sub>2</sub> * [P(H)]<sup>2</sup> * [P(H')]<sup>8</sup></p><p>= (10*9/2) * (5/8)<sup>2</sup> * (3/8)<sup>8</sup></p><p>= 45 * 25 * 3<sup>8</sup>/8<sup>10</sup></p><p>= (1125*3<sup>8</sup>)/8<sup>10</sup></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In grade 11 of a school, 40 students opted for Physics, 17 opted for Biology, and 20 opted for Chemistry. If the total number of students in grade 11 was 60, all of these students opted for at least one of the three subjects mentioned here, and exactly five of these students opted for all these three subjects, what is the probability that a randomly selected student of grade 11 of this school would have opted for exactly one of these three subjects? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2381;&#2325;&#2370;&#2354; &#2325;&#2375; 11&#2357;&#2368;&#2306; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; 40 &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2344;&#2375; &#2349;&#2380;&#2340;&#2367;&#2325;&#2368;, 17 &#2344;&#2375; &#2332;&#2368;&#2357;&#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2324;&#2352; 20 &#2344;&#2375; &#2352;&#2360;&#2366;&#2351;&#2344; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; 11&#2357;&#2368;&#2306; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 60 &#2341;&#2368;, &#2340;&#2379; &#2311;&#2344; &#2360;&#2349;&#2368; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2344;&#2375; &#2351;&#2361;&#2366;&#2305; &#2348;&#2340;&#2366;&#2319; &#2327;&#2319; &#2340;&#2368;&#2344; &#2357;&#2367;&#2359;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; &#2319;&#2325; &#2357;&#2367;&#2359;&#2351; &#2330;&#2369;&#2344;&#2366;, &#2324;&#2352; &#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2336;&#2368;&#2325; &#2346;&#2366;&#2305;&#2330; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2344;&#2375; &#2311;&#2344; &#2340;&#2368;&#2344;&#2379;&#2306; &#2357;&#2367;&#2359;&#2351;&#2379;&#2306; &#2325;&#2379; &#2330;&#2369;&#2344;&#2366;, &#2340;&#2379; &#2325;&#2381;&#2351;&#2366; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2311;&#2360; &#2360;&#2381;&#2325;&#2370;&#2354; &#2325;&#2375; 11&#2357;&#2368;&#2306; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2319;&#2325; &#2351;&#2366;&#2342;&#2371;&#2330;&#2381;&#2331;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2330;&#2369;&#2344;&#2375; &#2327;&#2319; &#2331;&#2366;&#2340;&#2381;&#2352; &#2344;&#2375; &#2311;&#2344; &#2340;&#2368;&#2344; &#2357;&#2367;&#2359;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2336;&#2368;&#2325; &#2319;&#2325; &#2357;&#2367;&#2359;&#2351; &#2330;&#2369;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">0.75</span><span class=\"hqt\" style=\"display:none\">0.75</span>",
      "<span class=\"eqt\">0.85</span><span class=\"hqt\" style=\"display:none\">0.85</span>",
      "<span class=\"eqt\">0.90</span><span class=\"hqt\" style=\"display:none\">0.90</span>",
      "<span class=\"eqt\">0.80</span><span class=\"hqt\" style=\"display:none\">0.80</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Total number of students = 60</p><p>Number of students who opted two or more subjects = 40 + 17 + 20 + 5  -  60 = 12</p><p>Number of students who opted exactly one subject = 60 - 12 = 48</p><p>Probability = 48/60 = 0.8</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If A and B are 2 events with P(A) =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">8</span></div>&nbsp;, P(B) =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">2</span></div>&nbsp;and P(A&cap;B) =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">4</span></div>&nbsp;. Find P(<span style='text-decoration:overline'>A</span> &cap; <span style='text-decoration:overline'>B</span>)&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&nbsp;&#2351;&#2342;&#2367; A &#2340;&#2341;&#2366; B &#2342;&#2379; &#2328;&#2335;&#2344;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; P(A) =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">8</span></div>&nbsp;, P(B) =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">2</span></div>&nbsp;&amp; P(A&cap;B) =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">4</span></div>&nbsp;. P(<span style='text-decoration:overline'>A</span> &cap; <span style='text-decoration:overline'>B</span>) &#2326;&#2379;&#2332;&#2375;&#2306;&nbsp;</div></p><p></p></span>",
    "options": [
      "<span class=\"eqt\">1/8</span><span class=\"hqt\" style=\"display:none\">1/8</span>",
      "<span class=\"eqt\">3/8</span><span class=\"hqt\" style=\"display:none\">3/8</span>",
      "<span class=\"eqt\">7/8</span><span class=\"hqt\" style=\"display:none\">7/8</span>",
      "<span class=\"eqt\">5/8</span><span class=\"hqt\" style=\"display:none\">5/8</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>P(A) = 3/8, P(B) = 1/2, P(A &#8898; B) = 1/4</p><p>P(A &#8899; B) = P(A) + P(B)  -  P(A &#8898; B)</p><p>P(A &#8899; B) = 3/8 + &frac12; - &#188;</p><p>P(A &#8899; B) = 5/8</p><p>P(A' &#8745; B') = 1 - P(A U B)</p><p>= 1  -  5/8</p><p>= 3/8</p><p></p>",
    "question_index": 5
