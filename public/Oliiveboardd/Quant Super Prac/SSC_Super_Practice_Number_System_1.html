<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="10">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">10</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">10 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The cube of the sum of two given numbers is 1728, while the product of the two given numbers is 32. Find the positive difference between the cubes of the two given numbers.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327;&#2347;&#2354; &#2325;&#2366; &#2328;&#2344; 1728 &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2342;&#2368; &#2327;&#2312; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; 32 &#2361;&#2376;&#2404; &#2342;&#2368; &#2327;&#2312; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2328;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">448</span><span class=\"hqt\" style=\"display:none\">448</span>",
      "<span class=\"eqt\">576</span><span class=\"hqt\" style=\"display:none\">576</span>",
      "<span class=\"eqt\">480</span><span class=\"hqt\" style=\"display:none\">480</span>",
      "<span class=\"eqt\">512</span><span class=\"hqt\" style=\"display:none\">512</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the two number are 'a' and 'b'.</p><p>According to the question:</p><p>(a + b)<sup>3</sup> = 1728 = 12<sup>3</sup></p><p>a + b = 12 ....... (1)</p><p>ab = 32 ...... (2)</p><p>(a  -  b)<sup>2</sup> = (a + b)<sup>2</sup>  -  4ab</p><p>(a  -  b)<sup>2</sup> = 12<sup>2</sup>  -  4 * 32 = 16</p><p>a  -  b = 4</p><p>a = 8 and b = 4</p><p>Required difference = 8<sup>3</sup>  -  4<sup>3</sup> = 512  -  64</p><p>= 448</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a prime number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2319;&#2325; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">54</span><span class=\"hqt\" style=\"display:none\">54</span>",
      "<span class=\"eqt\">39</span><span class=\"hqt\" style=\"display:none\">39</span>",
      "<span class=\"eqt\">68</span><span class=\"hqt\" style=\"display:none\">68</span>",
      "<span class=\"eqt\">89</span><span class=\"hqt\" style=\"display:none\">89</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Prime number:</b> Number which is divisible by only 1 and itself.</p><p>54 = 1 * 2 * 3 * 3 * 3</p><p>39 = 1 * 3 * 13</p><p>68 = 1 * 2 * 2 * 17</p><p>89 = 1 * 89</p><p>Hence, 89 is a prime number.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A number whose fifth part increased by 5 equals to its third part decreased by 7. Find half of the number.</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2367;&#2360;&#2325;&#2366; &#2346;&#2366;&#2305;&#2330;&#2357;&#2366;&#2305; &#2349;&#2366;&#2327; 5 &#2360;&#2375; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2346;&#2352; &#2313;&#2360;&#2325;&#2366; &#2340;&#2368;&#2360;&#2352;&#2366; &#2349;&#2366;&#2327; 7 &#2360;&#2375; &#2328;&#2335; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2310;&#2343;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">150</span><span class=\"hqt\" style=\"display:none\">150</span>",
      "<span class=\"eqt\">80</span><span class=\"hqt\" style=\"display:none\">80</span>",
      "<span class=\"eqt\">60</span><span class=\"hqt\" style=\"display:none\">60</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the number = N.</p><p>Equation: N/5 + 5 = N/3  -  7</p><p>Multiply by 15: 3N + 75 = 5N  -  105</p><p>=&gt; 180 = 2N</p><p>=&gt; N = 90</p><p>Half = 90/2 = 45</p><p>Option (a) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Ramu mixes 2 litres of water at 100&deg;C and 18 litres of water at 32&deg;C. What temperature will the water have after mixing?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2350;&#2370; 100&deg;C &#2346;&#2352; 2 &#2354;&#2368;&#2335;&#2352; &#2346;&#2366;&#2344;&#2368; &#2324;&#2352; 32&deg;C &#2346;&#2352; 18 &#2354;&#2368;&#2335;&#2352; &#2346;&#2366;&#2344;&#2368; &#2350;&#2367;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">66&deg;C</span><span class=\"hqt\" style=\"display:none\">66&deg;C</span>",
      "<span class=\"eqt\">20&deg;C</span><span class=\"hqt\" style=\"display:none\">20&deg;C</span>",
      "<span class=\"eqt\">38.8&deg;C</span><span class=\"hqt\" style=\"display:none\">38.8&deg;C</span>",
      "<span class=\"eqt\">40&deg;C</span><span class=\"hqt\" style=\"display:none\">40&deg;C</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Final temperature T = (m&#8321; * T&#8321; + m&#8322; * T&#8322;) / (m&#8321; + m&#8322;) </p><p>m&#8321; = 2 L, T&#8321; = 100&deg;C </p><p>m&#8322; = 18 L, T&#8322; = 32&deg;C </p><p>T = (2 * 100 + 18 * 32)/(2 + 18) </p><p>= (200 + 576)/20 </p><p>= 776/20 </p><p>= 38.8&deg;C</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the average of the prime numbers lying between 69 and 92.</p></span><span class=\"hqt\" style=\"display:none\"><p>69 &#2324;&#2352; 92 &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2381;&#2341;&#2367;&#2340; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">79</span><span class=\"hqt\" style=\"display:none\">79</span>",
      "<span class=\"eqt\">82</span><span class=\"hqt\" style=\"display:none\">82</span>",
      "<span class=\"eqt\">80</span><span class=\"hqt\" style=\"display:none\">80</span>",
      "<span class=\"eqt\">81</span><span class=\"hqt\" style=\"display:none\">81</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Prime numbers lying between 69 and 92 = 71, 73, 79, 83, 89</p><p>Average = (71 + 73 + 79 + 83 + 89)/5 = 395/5 = 79</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Rajesh, in his printing press, got an order to print some books, out of which he completed 17/27 of the order in 34 days. In how many days, did he complete the entire order of printing?</p><p>Options:</p></span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2375;&#2358; &#2325;&#2379; &#2309;&#2346;&#2344;&#2368; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335;&#2367;&#2306;&#2327; &#2346;&#2381;&#2352;&#2375;&#2360; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2325;&#2367;&#2340;&#2366;&#2348;&#2375;&#2306; &#2331;&#2366;&#2346;&#2344;&#2375; &#2325;&#2366; &#2321;&#2352;&#2381;&#2337;&#2352; &#2350;&#2367;&#2354;&#2366;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360;&#2344;&#2375; &#2321;&#2352;&#2381;&#2337;&#2352; &#2325;&#2366; 17/27 &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; 34 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404; &#2313;&#2360;&#2344;&#2375; &#2331;&#2346;&#2366;&#2312; &#2325;&#2366; &#2346;&#2370;&#2352;&#2366; &#2321;&#2352;&#2381;&#2337;&#2352; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366;?</p><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</span>",
    "options": [
      "<span class=\"eqt\">60</span><span class=\"hqt\" style=\"display:none\">60</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">54</span><span class=\"hqt\" style=\"display:none\">54</span>",
      "<span class=\"eqt\">56</span><span class=\"hqt\" style=\"display:none\">56</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Time taken to print 17/27 of the order to print some books = 34 days</p><p>Time taken to print the entire order to print the books = 34 *27/17 = 54 days</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The sum of two consecutive even numbers is 174. Find the smaller number:</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2360;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 174 &#2361;&#2376;&#2404; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;:</span>",
    "options": [
      "<span class=\"eqt\">84</span><span class=\"hqt\" style=\"display:none\">84</span>",
      "<span class=\"eqt\">90</span><span class=\"hqt\" style=\"display:none\">90</span>",
      "<span class=\"eqt\">86</span><span class=\"hqt\" style=\"display:none\">86</span>",
      "<span class=\"eqt\">88</span><span class=\"hqt\" style=\"display:none\">88</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the numbers be n and n + 2.</p><p>Their sum: n + (n + 2) = 2n + 2 = 174.</p><p>Solve: 2n = 172&#8195;&rarr;&#8195;n = 86.</p><p>Option (c) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The sum of five consecutive numbers is 80. Find the largest number.</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2306;&#2330; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 80 &#2361;&#2376;&#2404; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the numbers be (x  -  2), (x  -  1), x, (x + 1), (x + 2)</p><p>Sum of numbers = 5x</p><p>According to question,</p><p>5x = 80</p><p>x = 16</p><p>largest number = 16 + 2 = 18</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>How many whole numbers lie between 11<sup>2</sup> and 12<sup>2</sup>? </p></span><span class=\"hqt\" style=\"display:none\"><p>11<sup>2</sup> &#2324;&#2352; 12<sup>2</sup> &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2340;&#2344;&#2368; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;? </p></span>",
    "options": [
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Numbers lie between 11<sup>2</sup> and 12<sup>2 </sup>= 144 - 121 - 1 = 22. </p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>The cube of the sum of two given numbers is 1728, while the product of the two given numbers is 32. Find the positive difference between the cubes of the two given numbers.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327;&#2347;&#2354; &#2325;&#2366; &#2328;&#2344; 1728 &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2342;&#2368; &#2327;&#2312; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; 32 &#2361;&#2376;&#2404; &#2342;&#2368; &#2327;&#2312; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2328;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">448</span><span class=\"hqt\" style=\"display:none\">448</span>",
      "<span class=\"eqt\">576</span><span class=\"hqt\" style=\"display:none\">576</span>",
      "<span class=\"eqt\">480</span><span class=\"hqt\" style=\"display:none\">480</span>",
      "<span class=\"eqt\">512</span><span class=\"hqt\" style=\"display:none\">512</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the numbers be A and B.</p><p>Product of numbers AB = 32... (1)</p><p>And (A + B)<sup>3</sup> = 1728 = 12<sup>3</sup></p><p>So, A + B = 12... (2)</p><p>From equation (1) and (2),</p><p>A = 8 and B = 4</p><p>Therefore,</p><p>A<sup>3</sup>  -  B<sup>4</sup> = 8<sup>3</sup>  -  4<sup>3</sup> = 512  -  64 = 448</p>",
    "question_index": 9
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
