<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Average number of pens with a group of students is (55/2). Two students with pens 50 and 25 are removed from the group and a new student with pens 16 is added to the list. If initially the number of students in the group was 10, then find the new average of the group.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2346;&#2366;&#2360; &#2346;&#2375;&#2344; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; (55/2) &#2361;&#2376;&#2404; 50 &#2324;&#2352; 25 &#2346;&#2375;&#2344; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2360;&#2350;&#2370;&#2361; &#2360;&#2375; &#2361;&#2335;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 16 &#2346;&#2375;&#2344; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2344;&#2319; &#2331;&#2366;&#2340;&#2381;&#2352; &#2325;&#2379; &#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2358;&#2369;&#2352;&#2370; &#2350;&#2375;&#2306; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 10 &#2341;&#2368;, &#2340;&#2379; &#2360;&#2350;&#2370;&#2361; &#2325;&#2366; &#2344;&#2351;&#2366; &#2324;&#2360;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>",
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Initially total number of pens = (55/2) * 10 = 275</p><p>New average = (275  -  50  -  25 +16)/9 = 24</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Average of a series of five consecutive numbers is 37. Find the average of the smallest and the second largest number of that series.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2306;&#2330; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2368; &#2319;&#2325; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2366; &#2324;&#2360;&#2340; 37 &#2361;&#2376;&#2404; &#2313;&#2360; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2324;&#2360;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>",
      "<span class=\"eqt\">37.5</span><span class=\"hqt\" style=\"display:none\">37.5</span>",
      "<span class=\"eqt\">36.5</span><span class=\"hqt\" style=\"display:none\">36.5</span>",
      "<span class=\"eqt\">38</span><span class=\"hqt\" style=\"display:none\">38</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Average of a series of five consecutive numbers = 37</p><p>Sum of the five consecutive numbers = 37 x 5 = 185</p><p>Let the series of 5 consecutive numbers be p, (p + 1), (p + 2), (p + 3) and (p + 4)</p><p>According to the question:</p><p>=&gt; p + (p + 1) + (p + 2) + (p + 3) + (p + 4) = 185</p><p>=&gt; 5p + 10 = 185</p><p>=&gt; 5p = 175</p><p>=&gt; p = 35</p><p>Hence, the series is 35, 36, 37, 38 and 39</p><p>Required average of the smallest and the second largest number of that series = (35 + 38)/2 = 36.5</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The average of five consecutive even numbers is 92. What is the largest of these numbers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2306;&#2330; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2360;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 92 &#2361;&#2376;&#2404; &#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">96</span><span class=\"hqt\" style=\"display:none\">96</span>",
      "<span class=\"eqt\">98</span><span class=\"hqt\" style=\"display:none\">98</span>",
      "<span class=\"eqt\">92</span><span class=\"hqt\" style=\"display:none\">92</span>",
      "<span class=\"eqt\">94</span><span class=\"hqt\" style=\"display:none\">94</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the numbers be 'X', 'X + 2', 'X + 4', 'X + 6', and 'X + 8'.</p><p>X + X + 2 + X + 4 + X + 6 + X + 8 = 92 * 5</p><p>5X + 20 = 460</p><p>5X = 440</p><p>X = 88</p><p>Hence, the required number 88 + 8 = 96</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The age of Kiran after three years is 42 years. If the ratio of present age of Kiran and Shubham is 13:11 respectively, then find the present age of Shubham.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2325;&#2367;&#2352;&#2339; &#2325;&#2368; &#2310;&#2351;&#2369; 42 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2367;&#2352;&#2339; &#2324;&#2352; &#2358;&#2369;&#2349;&#2350; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 13:11 &#2361;&#2376;, &#2340;&#2379; &#2358;&#2369;&#2349;&#2350; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">22 years</span><span class=\"hqt\" style=\"display:none\">22 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">44 years</span><span class=\"hqt\" style=\"display:none\">44 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">33 years</span><span class=\"hqt\" style=\"display:none\">33 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">55 years</span><span class=\"hqt\" style=\"display:none\">55 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Present age of Kiran = 42  -  3 = 39 years</p><p>Present age of Shubham = 39*11/13 = 33 years</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The 1<sup>st</sup> number is (2x  -  12) and the 2<sup>nd </sup>number is 'x'. If the sum of three numbers is 175 and the 3<sup>rd</sup> number is 5 less than the average of the 1<sup>st</sup> and 2<sup>nd</sup> numbers, then find the value of 'x'. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2361;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; (2x - 12) &#2361;&#2376; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 'x' &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2340;&#2368;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 175 &#2361;&#2376; &#2324;&#2352; &#2340;&#2368;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2346;&#2361;&#2354;&#2368; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2360;&#2375; 5 &#2325;&#2350; &#2361;&#2376;, &#2340;&#2379; 'x' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">44</span><span class=\"hqt\" style=\"display:none\">44</span>",
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">52</span><span class=\"hqt\" style=\"display:none\">52</span>",
      "<span class=\"eqt\">40</span><span class=\"hqt\" style=\"display:none\">40</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The 3<sup>rd</sup> number = (2x  -  12 + x)/2  -  5</p><p>A/Q</p><p>2x  -  12 + x + (2x  -  12 + x)/2  -  5 = 175</p><p>4x  -  24 + 2x + 2x  -  12 + x  -  10 = 350</p><p>9x = 396</p><p>x = 44</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Anshika is two years younger than Bhawna and seven years older than Rekha. If the sum of present age of Rekha and Bhawna is 25 years, then find the age of Anshika after three years.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2306;&#2358;&#2367;&#2325;&#2366;, &#2349;&#2366;&#2357;&#2344;&#2366; &#2360;&#2375; &#2342;&#2379; &#2357;&#2352;&#2381;&#2359; &#2331;&#2379;&#2335;&#2368; &#2324;&#2352; &#2352;&#2375;&#2326;&#2366; &#2360;&#2375; &#2360;&#2366;&#2340; &#2357;&#2352;&#2381;&#2359; &#2348;&#2337;&#2364;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2352;&#2375;&#2326;&#2366; &#2324;&#2352; &#2349;&#2366;&#2357;&#2344;&#2366; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2366; &#2351;&#2379;&#2327; 25 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;, &#2340;&#2379; &#2340;&#2368;&#2344; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2309;&#2306;&#2358;&#2367;&#2325;&#2366; &#2325;&#2368; &#2310;&#2351;&#2369; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">18 years</span><span class=\"hqt\" style=\"display:none\">18 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">21 years</span><span class=\"hqt\" style=\"display:none\">21 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">20 years</span><span class=\"hqt\" style=\"display:none\">20 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">16 years</span><span class=\"hqt\" style=\"display:none\">16 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Present age of Anshika = 'n' years </p><p>Present age of Bhawna = 'n + 2' years</p><p>Present age of Rekha = 'n  -  7' years</p><p>Now,</p><p>n  -  7 + n + 2 = 25</p><p>n = 15</p><p>Age of Anshika after three years = 15 + 3 = 18 years</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of the present age of M and N is 6:5 respectively and the age of M after seven years is 43 years. If P is 11 years younger than N, then find the present age of P.</p></span><span class=\"hqt\" style=\"display:none\"><p>M &#2324;&#2352; N &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 6:5 &#2361;&#2376; &#2324;&#2352; &#2360;&#2366;&#2340; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; M &#2325;&#2368; &#2310;&#2351;&#2369; 43 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; P, N &#2360;&#2375; 11 &#2357;&#2352;&#2381;&#2359; &#2331;&#2379;&#2335;&#2366; &#2361;&#2376;, &#2340;&#2379; P &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">17 years</span><span class=\"hqt\" style=\"display:none\">17 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">21 years</span><span class=\"hqt\" style=\"display:none\">21 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">19 years</span><span class=\"hqt\" style=\"display:none\">19 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">12 years</span><span class=\"hqt\" style=\"display:none\">12 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Present age of M = 43  -  7 = 36 years </p><p>Present age of N = 36*5/6 = 30 years</p><p>Present age of P = 30  -  11 = 19 years</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Average number of boys in class P and Q is 45 and the average number of students in class P and Q is 64. If the number of girls in class P is 18, then find the ratio of the number of girls in class P to that in class Q.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2325;&#2381;&#2359;&#2366; P &#2324;&#2352; Q &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 45 &#2361;&#2376; &#2324;&#2352; &#2325;&#2325;&#2381;&#2359;&#2366; P &#2324;&#2352; Q &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 64 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2325;&#2381;&#2359;&#2366; P &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 18 &#2361;&#2376;, &#2340;&#2379; &#2325;&#2325;&#2381;&#2359;&#2366; P &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2325;&#2325;&#2381;&#2359;&#2366; Q &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3:4</span><span class=\"hqt\" style=\"display:none\">3:4</span>",
      "<span class=\"eqt\">9:10</span><span class=\"hqt\" style=\"display:none\">9:10</span>",
      "<span class=\"eqt\">12:13</span><span class=\"hqt\" style=\"display:none\">12:13</span>",
      "<span class=\"eqt\">7:6</span><span class=\"hqt\" style=\"display:none\">7:6</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Number of boys in class P and Q = 2*45 = 90 </p><p>Number of students in class P and Q = 2*64 = 128</p><p>Number of girls in class P = 18 </p><p>Number of girls in class Q = 128  -  90  -  18 = 20</p><p>Required ratio = 18:20 = 9:10</p>",
    "question_index": 7

    "question": "<span class=\"eqt\"><p>The average weight of a class of 10 students is increased by 2 kg when one student of 30 kg left and another student joined. After a few months, new student left and another student joined whose weight was 10 less than the students who left now. What is the difference between the final and initial average? </p><p> </p></span><span class=\"hqt\" style=\"display:none\"><p>10 &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2366; &#2324;&#2360;&#2340; &#2357;&#2332;&#2344; 2 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348; 30 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2357;&#2332;&#2344; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2331;&#2366;&#2340;&#2381;&#2352; &#2331;&#2379;&#2337;&#2364; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2366; &#2331;&#2366;&#2340;&#2381;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2369;&#2331; &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2344;&#2351;&#2366; &#2331;&#2366;&#2340;&#2381;&#2352; &#2330;&#2354;&#2366; &#2327;&#2351;&#2366; &#2324;&#2352; &#2319;&#2325; &#2309;&#2344;&#2381;&#2351; &#2331;&#2366;&#2340;&#2381;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379; &#2327;&#2351;&#2366; &#2332;&#2367;&#2360;&#2325;&#2366; &#2357;&#2332;&#2344; &#2309;&#2348; &#2331;&#2379;&#2337;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2360;&#2375; 10 &#2325;&#2350; &#2341;&#2366;&#2404; &#2309;&#2306;&#2340;&#2367;&#2350; &#2324;&#2352; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2324;&#2360;&#2340; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2340;&#2344;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#23     "question": "<span class=\"eqt\"><p>There are total 40 students in a class in which 60% are boys. Average marks of all students of the class in Hindi are 70. If average marks of all girls in Hindi are 75, then find the average marks of boys in same subject.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; 40 &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2368; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; 60% &#2354;&#2396;&#2325;&#2375; &#2361;&#2376;&#2306;| &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2361;&#2367;&#2306;&#2342;&#2368; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; 70 &#2361;&#2376;&#2306;| &#2351;&#2342;&#2367; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2361;&#2367;&#2306;&#2342;&#2368; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2354;&#2396;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; 75 &#2361;&#2376;&#2306;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2344; &#2357;&#2367;&#2359;&#2351; &#2350;&#2375;&#2306; &#2354;&#2396;&#2325;&#2379; &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;|</p></span>",
