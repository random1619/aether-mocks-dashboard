  {
    "question": "<span class=\"eqt\"><p>A starts a business with &#8377;75,000 and B joins the business 5 months later with an investment of &#8377;80,000. After 1 year, they earn a profit of &#8377;4,08,800. Find the share of A and B (in &#8377;).</p></span><span class=\"hqt\" style=\"display:none\"><p>A, &#8377;75,000 &#2325;&#2375; &#2360;&#2366;&#2341; &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; B, &#8377;80,000 &#2325;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2360;&#2366;&#2341; 5 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; 1 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2357;&#2375; &#8377;4,08,800 &#2325;&#2366; &#2354;&#2366;&#2349; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; A &#2324;&#2352; B &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; (&#8377; &#2350;&#2375;&#2306;)&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2,52,000 and 1,56,800</span><span class=\"hqt\" style=\"display:none\">2,52,000 &#2324;&#2352; 1,56,800</span>",
      "<span class=\"eqt\">2,50,000 and 1,58,800</span><span class=\"hqt\" style=\"display:none\">2,50,000 &#2324;&#2352; 1,58,800</span>",
      "<span class=\"eqt\">2,48,000 and 1,60,800</span><span class=\"hqt\" style=\"display:none\">2,48,000 &#2324;&#2352; 1,60,800</span>",

    "solution": "<p>Profit of share of A and B = (12*75000) : (7 * 80000) = 45:28</p><p>Share of A = 408800 * 45/(45+28) = &#8377;252000</p><p>Share of B = 408800  -  252000 = &#8377;156800</p>",

  {
    "question": "<span class=\"eqt\"><p>A and B had a joint business in which A invested &#8377;60,000 for one year and after 3 months from the start of the business, B invested &#8377;80,000. At the beginning of the second year, A invested &#8377;30,000 more and B withdrew &#8377;5,000. At the end of two years, profit earned by A was &#8377;35,880. What was the profit (in &#8377;) earned by B, if they distributed half of the total profit equally and rest in the investment ratio?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2325;&#2366; &#2319;&#2325; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2341;&#2366; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; A &#2344;&#2375; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;60,000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; 3 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342; B &#2344;&#2375; &#8377;80,000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2350;&#2375;&#2306; A &#2344;&#2375; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#8377;30,000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; B &#2344;&#2375; &#8377;5,000 &#2344;&#2367;&#2325;&#2366;&#2354; &#2354;&#2367;&#2351;&#2375;&#2404; &#2342;&#2379; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2354;&#2366;&#2349; &#8377;35,880 &#2341;&#2366;&#2404; &#2351;&#2342;&#2367; &#2357;&#2375; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; &#2325;&#2366; &#2310;&#2343;&#2366; &#2349;&#2366;&#2327; &#2360;&#2350;&#2366;&#2344; &#2352;&#2370;&#2346; &#2360;&#2375; &#2324;&#2352; &#2358;&#2375;&#2359; &#2349;&#2366;&#2327; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2357;&#2367;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2354;&#2366;&#2349; (&#8377; &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    "correct_option_id": 2,
    "solution": "<p>Ratio of profit share of A and B = [60000 * 12 + 90000 * 12]: [80000 * 9 + 75000 * 12] = 10: 9</p><p>Let total profit = 4x</p><p>Share of A = <img width=143 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20002/image083.png\"></p><p><img width=89 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20002/image084.png\"></p><p>x = 17480</p><p>Share of B = <img width=192 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20002/image085.png\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>X, Y and Z enter into a partnership. X invests some money at the beginning. Y invests thrice the amount of X after 4 months and Z invest double the amount of Y after 9 months from the beginning. If the annual gain be Rs.450000, then what is the share of Y?</p></span><span class=\"hqt\" style=\"display:none\"><p>X, Y &#2324;&#2352; Z &#2319;&#2325; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; X &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2343;&#2344; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; Y, &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349; &#2360;&#2375; 4 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; X &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2343;&#2344; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; Z, &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349; &#2360;&#2375; 9 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; Y &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2343;&#2344; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2354;&#2366;&#2349; &#2352;&#2369;. 450000 &#2361;&#2376;, &#2340;&#2379; Y &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 200000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 200000</span>",
      "<span class=\"eqt\">Rs. 150000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 150000</span>",
      "<span class=\"eqt\">Rs. 100000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 100000</span>",
      "<span class=\"eqt\">Rs. 300000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 300000</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let investment of X = 'x'</p><p>Investment of Y = 3x</p><p>Investment of Z = 6x</p><p>Ratio of their profit share in annual profit from the business = (x * 12): (3x * (12  -  4)): (6x * (12  -  9)) = 12x: 24x: 18x = 2: 4: 3</p><p>Share of Y = 450000 * (4/9)</p><p>= &#8377;200000</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A and B start a business. A invests 33(1/3)%, of the total capital and B invests the remaining. If the total profit at the end of the year is &#8377; 1,62,000, then B's share (in &#8377;) is:</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; A &#2325;&#2369;&#2354; &#2346;&#2370;&#2306;&#2332;&#2368; &#2325;&#2366; 33(1/3)% &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; B &#2358;&#2375;&#2359; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; &#8377; 1,62,000 &#2361;&#2376;, &#2340;&#2379; B &#2325;&#2366; &#2354;&#2366;&#2349;&#2366;&#2306;&#2358;(&#8377; &#2350;&#2375;&#2306;) &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">1,08,000</span><span class=\"hqt\" style=\"display:none\">1,08,000</span>",
      "<span class=\"eqt\">1,12,000</span><span class=\"hqt\" style=\"display:none\">1,12,000</span>",
      "<span class=\"eqt\">1,20,000</span><span class=\"hqt\" style=\"display:none\">1,20,000</span>",
      "<span class=\"eqt\">54,000</span><span class=\"hqt\" style=\"display:none\">54,000</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>33(1/3)=33+ (1/3) =100/3</p><p>Let the total investments of A and B together = &#8377; a</p><p>Then, A's investment = (100/3)% of a = &#8377; a/3</p><p>And B's investment = a  -  a/3 = &#8377; 2a/3</p><p>Since A and B invested for the same period, so </p><p>Profit ratio = investment ratio = A: B = (a/3): (2a/3) = 1: 2</p><p>Total profit earned = &#8377; 1,62,000</p><p>Therefore, share of B in profit = 162000 * 2/(1 + 2) = &#8377; 108000</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Three partners P, Q and R invested a total of Rs. 52,000 in a business. At the end of the year, P got Rs.1430, Q got Rs.1870 and R got Rs. 2420 as the share of profit. How much amount did Q invest in the business?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2379;&#2306; P, Q &#2324;&#2352; R &#2344;&#2375; &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; 52,000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2354;&#2366;&#2349;&#2366;&#2306;&#2358; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; P &#2325;&#2379; 1430 &#2352;&#2369;&#2346;&#2351;&#2375;, Q &#2325;&#2379; 1870 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; R &#2325;&#2379; 2420 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2367;&#2354;&#2375;&#2404; Q &#2344;&#2375; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 17000</span><span class=\"hqt\" style=\"display:none\">17000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 20400</span><span class=\"hqt\" style=\"display:none\">20400 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 15300</span><span class=\"hqt\" style=\"display:none\">15300 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 18700</span><span class=\"hqt\" style=\"display:none\">18700 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Since the period of investment is same, which mean ratio of profit from the business will be same as the ratio of their investment.</p><p>Ratio of investment of P, Q, and R = 1430: 1870: 2420 = 13: 17: 22</p><p>Investment of Q = 52000 * (17/52) = &#8377;17000</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A and B invested money in a business in the ratio of 7 : 5. If 15% of the total profit goes for charity, and A's share in the profit is Rs.5,950, then what is the total profit?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2344;&#2375; &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2350;&#2375;&#2306; 7:5 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; &#2325;&#2366; 15% &#2342;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; A &#2325;&#2366; &#2354;&#2366;&#2349;&#2366;&#2306;&#2358; 5,950 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
