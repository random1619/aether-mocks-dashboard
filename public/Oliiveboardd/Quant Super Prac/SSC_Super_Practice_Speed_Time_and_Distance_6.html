<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If P (A U B) = 12/25, P (A' U B') = 11/30, P(B) = 7/15, then the odds against the event A are:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; P (A U B) = 12/25, P (A' U B') = 11/30, P(B) = 7/15, &#2340;&#2379; &#2328;&#2335;&#2344;&#2366; A &#2325;&#2375; &#2357;&#2367;&#2352;&#2369;&#2342;&#2381;&#2343; &#2348;&#2366;&#2343;&#2366;&#2319;&#2306; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">53/97</span><span class=\"hqt\" style=\"display:none\">53/97</span>",
      "<span class=\"eqt\">97/150</span><span class=\"hqt\" style=\"display:none\">97/150</span>",
      "<span class=\"eqt\">53/150</span><span class=\"hqt\" style=\"display:none\">53/150</span>",
      "<span class=\"eqt\">97/53</span><span class=\"hqt\" style=\"display:none\">97/53</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>P (B') = 1  -  7/15 = 8/15</p><p>P (A' &#1352; B') = 1  -  P (A U B) </p><p>= 1  -  12/25 </p><p>= 13/25 </p><p>P (A' U B') = P (A') + P(B')  -  P (A' &#1352; B')</p><p>11/30 = P(A') + 8/15  -  13/25 </p><p>P(A') = (55 + 78  -  80)/150 = 53/150 </p><p>P(A) = 1  -  53/150 = 97/150</p><p>Odds against the event A = P(A')/P(A) </p><p>= (53/150)/(97/150)</p><p>= 53/97 </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If P (A U B) = 1/12, P (A' U B') = 13/18, and P(A) = 2/9, then the odds in favor of the event B are:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; P (A U B) = 1/12, P (A' U B') = 13/18, &#2340;&#2341;&#2366; P(A) = 2/9, &#2340;&#2379; &#2328;&#2335;&#2344;&#2366; B &#2325;&#2375; &#2346;&#2325;&#2381;&#2359; &#2350;&#2375;&#2306; &#2321;&#2337;&#2381;&#2360; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">5/31</span><span class=\"hqt\" style=\"display:none\">5/31</span>",
      "<span class=\"eqt\">7/29</span><span class=\"hqt\" style=\"display:none\">7/29</span>",
      "<span class=\"eqt\">29/36</span><span class=\"hqt\" style=\"display:none\">29/36</span>",
      "<span class=\"eqt\">7/36</span><span class=\"hqt\" style=\"display:none\">7/36</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>P(A') = 1  -  2/9 = 7/9 </p><p>P (A' &#1352; B') = 1  -  P (A U B) </p><p>= 1  -  1/12 </p><p>= 11/12 </p><p>P (A' U B') = P(A') + P (B')  -  P (A' &#1352; B') </p><p>13/18 = 7/9 + P (B')  -  11/12 </p><p>P (B') = (26 + 33  -  28)/36 </p><p>= 31/36 </p><p>P(B) = 1  -  31/36 = 5/36 </p><p>Odds in favor of event B = P(B)/ P(B')</p><p>= (5/36)/(31/36) </p><p>= 5/31</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Three cards are drawn one after another with replacement from a pack of cards. What is the probability of getting the first card as king, the second as black, and the third as a number card that is the square of an odd number(more than 1)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2352;&#2381;&#2337; &#2325;&#2375; &#2319;&#2325; &#2346;&#2376;&#2325;&#2375;&#2335; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; &#2319;&#2325; &#2325;&#2375; &#2348;&#2366;&#2342; &#2319;&#2325; &#2340;&#2368;&#2344; &#2325;&#2366;&#2352;&#2381;&#2337; &#2344;&#2367;&#2325;&#2366;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2361;&#2354;&#2375; &#2325;&#2366;&#2352;&#2381;&#2337; &#2325;&#2379; &#2352;&#2366;&#2332;&#2366;, &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2325;&#2366;&#2354;&#2366; &#2324;&#2352; &#2340;&#2368;&#2360;&#2352;&#2375; &#2325;&#2379; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2337; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; &#2332;&#2379; &#2319;&#2325; &#2357;&#2367;&#2359;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; (1 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;) &#2325;&#2366; &#2357;&#2352;&#2381;&#2327; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1/676</span><span class=\"hqt\" style=\"display:none\">1/676</span>",
      "<span class=\"eqt\">3/1352</span><span class=\"hqt\" style=\"display:none\">3/1352</span>",
      "<span class=\"eqt\">1/1352</span><span class=\"hqt\" style=\"display:none\">1/1352</span>",
      "<span class=\"eqt\">1/338</span><span class=\"hqt\" style=\"display:none\">1/338</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>King = 4, black card = 26, The square of an odd number = 1 (3<sup>2</sup> = 9) </p><p>Hence, the required probability = 4/52 * 26/52 * 1/52 </p><p>= 1/1352 </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Three cards are drawn one after another with replacement from a pack of cards. What is the probability of getting the first card as an ace of black, the second as red, and the third as a number card that is divisible by 3?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2366;&#2358; &#2325;&#2375; &#2346;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2327;&#2337;&#2381;&#2337;&#2368; &#2360;&#2375; &#2319;&#2325; &#2325;&#2375; &#2348;&#2366;&#2342; &#2319;&#2325; &#2340;&#2368;&#2344; &#2325;&#2366;&#2352;&#2381;&#2337; &#2344;&#2367;&#2325;&#2366;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2361;&#2354;&#2366; &#2325;&#2366;&#2352;&#2381;&#2337; &#2325;&#2366;&#2354;&#2375; &#2352;&#2306;&#2327; &#2325;&#2366; &#2311;&#2325;&#2381;&#2325;&#2366;, &#2342;&#2370;&#2360;&#2352;&#2366; &#2354;&#2366;&#2354; &#2352;&#2306;&#2327; &#2325;&#2366; &#2311;&#2325;&#2381;&#2325;&#2366; &#2324;&#2352; &#2340;&#2368;&#2360;&#2352;&#2366; 3 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2337; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1/2704</span><span class=\"hqt\" style=\"display:none\">1/2704</span>",
      "<span class=\"eqt\">1/1352</span><span class=\"hqt\" style=\"display:none\">1/1352</span>",
      "<span class=\"eqt\">3/1352</span><span class=\"hqt\" style=\"display:none\">3/1352</span>",
      "<span class=\"eqt\">3/2704</span><span class=\"hqt\" style=\"display:none\">3/2704</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Ace of black = 2, Red = 26, divisible by 3 = 3 [3, 6, 9] </p><p>Hence, the required probability = 2/52 * 26/52 * 3/52 </p><p>= 3/2704</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>'P' speaks the truth 5 out of 12 times and 'Q' speaks the truth 8 out of 21 times. What is the probability that they contradict each other in stating the same fact?</p></span><span class=\"hqt\" style=\"display:none\"><p>'P' 12 &#2350;&#2375;&#2306; &#2360;&#2375; 5 &#2348;&#2366;&#2352; &#2360;&#2330; &#2348;&#2379;&#2354;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'Q' 21 &#2350;&#2375;&#2306; &#2360;&#2375; 8 &#2348;&#2366;&#2352; &#2360;&#2330; &#2348;&#2379;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2381;&#2351;&#2366; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2357;&#2375; &#2319;&#2325; &#2361;&#2368; &#2340;&#2341;&#2381;&#2351; &#2325;&#2379; &#2348;&#2340;&#2366;&#2340;&#2375; &#2361;&#2369;&#2319; &#2319;&#2325;-&#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2366; &#2326;&#2306;&#2337;&#2344; &#2325;&#2352;&#2375;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">121/252</span><span class=\"hqt\" style=\"display:none\">121/252</span>",
      "<span class=\"eqt\">91/252</span><span class=\"hqt\" style=\"display:none\">91/252</span>",
      "<span class=\"eqt\">84/101</span><span class=\"hqt\" style=\"display:none\">84/101</span>",
      "<span class=\"eqt\">67/84</span><span class=\"hqt\" style=\"display:none\">67/84</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Probability of P tell a lie = 1  -  5/12 = 7/12</p><p>Probability of Q tell a lie = 1  -  8/21 = 13/21 </p><p>Hence, the required probability = 5/12 * 13/21 + 7/12 * 8/21 </p><p>= 65/252 + 56/252</p><p>= 121/252 </p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>'A' speaks the truth 7 out of 19 times and 'B' speaks the truth 9 out of 25 times. What is the probability that they contradict each other in stating the same fact?</p></span><span class=\"hqt\" style=\"display:none\"><p>'A' 19 &#2350;&#2375;&#2306; &#2360;&#2375; 7 &#2348;&#2366;&#2352; &#2360;&#2330; &#2348;&#2379;&#2354;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'B' 25 &#2350;&#2375;&#2306; &#2360;&#2375; 9 &#2348;&#2366;&#2352; &#2360;&#2330; &#2348;&#2379;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2381;&#2351;&#2366; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2357;&#2375; &#2319;&#2325; &#2361;&#2368; &#2340;&#2341;&#2381;&#2351; &#2325;&#2379; &#2348;&#2340;&#2366;&#2340;&#2375; &#2361;&#2369;&#2319; &#2319;&#2325;-&#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2366; &#2326;&#2306;&#2337;&#2344; &#2325;&#2352;&#2375;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">63/475</span><span class=\"hqt\" style=\"display:none\">63/475</span>",
      "<span class=\"eqt\">44/95</span><span class=\"hqt\" style=\"display:none\">44/95</span>",
      "<span class=\"eqt\">192/475</span><span class=\"hqt\" style=\"display:none\">192/475</span>",
      "<span class=\"eqt\">4/475</span><span class=\"hqt\" style=\"display:none\">4/475</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Probability of A tell a lie = 1  -  7/19 = 12/19</p><p>Probability of B tell a lie = 1  -  9/25 = 16/25 </p><p>Hence, the required probability =7/19 * 16/25 + 12/19 * 9/25 </p><p>= 112/475 + 108/475</p><p>= 220/475</p><p>= 44/95</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The probabilities of solving a problem by three friends A, B, and C are 4/9, 7/12, and 5/11 respectively. The probability that the problem will be solved is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2350;&#2367;&#2340;&#2381;&#2352;&#2379;&#2306; A, B &#2324;&#2352; C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2360;&#2368; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2325;&#2379; &#2361;&#2354; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366;&#2319;&#2305; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 4/9, 7/12 &#2324;&#2352; 5/11 &#2361;&#2376;&#2306;&#2404; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2325;&#2375; &#2361;&#2354; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">25/198</span><span class=\"hqt\" style=\"display:none\">25/198</span>",
      "<span class=\"eqt\">81/198</span><span class=\"hqt\" style=\"display:none\">81/198</span>",
      "<span class=\"eqt\">173/198</span><span class=\"hqt\" style=\"display:none\">173/198</span>",
      "<span class=\"eqt\">95/198</span><span class=\"hqt\" style=\"display:none\">95/198</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>P(A') = 1  -  4/9 = 5/9 </p><p>P(B') = 1  -  7/12 = 5/12 </p><p>P(C') = 1  -  5/11 = 6/11 </p><p>Probability of encoding = 5/9 * 5/12 * 6/11 = 25/198 </p><p>Hence, the required probability = 1  -  25/198 = 173/198</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The probability of encoding a problem by A is 9/14 and the probability of solving a problem by B and C are 8/11, and 7/9 respectively. The probability that the problem will be solved is:</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2360;&#2368; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2325;&#2379; &#2319;&#2344;&#2325;&#2379;&#2337; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; 9/14 &#2361;&#2376; &#2324;&#2352; B &#2340;&#2341;&#2366; C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2360;&#2368; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2325;&#2379; &#2361;&#2354; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 8/11 &#2340;&#2341;&#2366; 7/9 &#2361;&#2376;&#2404; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2325;&#2375; &#2361;&#2354; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">3/77</span><span class=\"hqt\" style=\"display:none\">3/77</span>",
      "<span class=\"eqt\">4/11</span><span class=\"hqt\" style=\"display:none\">4/11</span>",
      "<span class=\"eqt\">20/99</span><span class=\"hqt\" style=\"display:none\">20/99</span>",
      "<span class=\"eqt\">74/77</span><span class=\"hqt\" style=\"display:none\">74/77</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>P(B') = 1  -  8/11 = 3/11 </p><p>P(C') = 1  -  7/9 = 2/9 </p><p>The probability of encoding = 9/14 * 3/11 * 2/9 = 3/77 </p><p>Hence, the required probability = 1  -  3/77 = 74/77</p>",
    "question_index": 7

  {
