<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>How many numbers between 1 and 1000 are divisible by 3,5 and 7 and have even sum of digits?</p></span><span class=\"hqt\" style=\"display:none\"><p>1 &#2360;&#2375; 1000 &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2340;&#2344;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; 3,5 &#2324;&#2352; 7 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2306; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2360;&#2350; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>For a number to be divisible by 3,5 and 7, it should be divisible by LCM (3,5,7) = 105</p><p>=&gt; Numbers between 1 and 1000 divisible by 105 are (105,210,315,420,525,630,735,840 and 945). </p><p>Out of these, only 5 have an even sum of digits (105, 420, 525, 840 and 945)</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If 102M3N represents a number then find how many such numbers can be formed by different values of M and N if it is divisible by 12.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 102M3N &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; M &#2324;&#2352; N &#2325;&#2375; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2350;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2320;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2348;&#2344;&#2366;&#2312; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2351;&#2342;&#2367; &#2351;&#2361; 12 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>For a number to be divisible by 12, it should be completely divisible by 4 and 3.</p><p>Given number is 102M3N.</p><p>For the number to be divisible by 4, the digit at one's place must be even and the number formed by its last two digits must be divisible by 4.</p><p>As, 32 and 36 are divisible by 4</p><p>Possible values of N = 2, 6</p><p>Now, when N= 2</p><p>The number becomes 102M32.</p><p>For a number to be divisible by 3 the sum of all digits should be divisible by 3.</p><p>1+0+2+M +3+2 = 8 + M</p><p>8+M should be divisible by 3.</p><p>Possible values of M = 1, 4, 7</p><p>Now, when N=6</p><p>The number becomes 102M36.</p><p>1+0+2+M +3+6 = 12 + M</p><p>12+M should be divisible by 3.</p><p>Possible values of M = 0, 3, 6, 9</p><p>With all possible values of M and N we can form seven such numbers which are divisible by 12.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>How many whole numbers are there between 109 and 345 which are exactly divisible by 11?</p></span><span class=\"hqt\" style=\"display:none\"><p>109 &#2324;&#2352; 345 &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2340;&#2344;&#2368; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306; &#2332;&#2379; 11 &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">43</span><span class=\"hqt\" style=\"display:none\">43</span>",
      "<span class=\"eqt\">26</span><span class=\"hqt\" style=\"display:none\">26</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>",
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Smallest number divisible by 11 between 109 and 345 = 110</p><p>Largest number divisible by 11 between 109 and 345 = 341</p><p>Formed an A.P. with a = 110, d = 11 and a<sub>n</sub> = 341</p><p>a<sub>n</sub> = a + (n  -  1)d</p><p>341 = 110 + (n  -  1)11</p><p>231 = 11n  -  11</p><p>11n = 242</p><p>n = 22 </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If 413A9 is divisible by 11, find the value of the smallest natural number A.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 413A9, 11 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; A &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Sum of the digits at odd places = 4 + 3 + 9 = 16</p><p>Sum of the digits at even places = 1 + A</p><p>Difference = 16  -  1  -  A = 15  -  A</p><p>To be divisible by 11, 15  -  A should be a multiple of 11 and therefore A should be equal to 4.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the smallest non-zero value of K so that 7-digit number 4205K01 is divisible by 9.</p></span><span class=\"hqt\" style=\"display:none\"><p>K &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2327;&#2376;&#2352;-&#2358;&#2370;&#2344;&#2381;&#2351; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306; &#2340;&#2366;&#2325;&#2367; 7-&#2309;&#2306;&#2325;&#2368;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 4205K01 9 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sum of the digits of given number = 4 + 2 + 0 + 5 + k + 0 + 1 = 12 + K</p><p>And be divisible by 9, 12 + k should be divisible by 9 and therefore k should be equal to 6.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If 27662AB is divisible by 80. Then find the value of (A + B) such that B&lt;A&lt;5.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 27662AB, 80 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2404; &#2340;&#2379; (A + B) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; B&lt;A&lt;5 &#2361;&#2379;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>We know that 80 = 8 x 10 and if a number is divisible by 80, then it must be divisible by 10 and 8.</p><p>For divisible by 10, the last digit of the number should be 0. So, B = 0.</p><p>And for divisible by 8, the last three digits should be divisible by 8.</p><p>The last three digits = 2A0</p><p>To be divisible by 8, the only possible value of A is 4.</p><p>Therefore, (A + B) = 4 + 0 = 4.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>An 8  -  digit number 3112093X leaves remainder 0 when divided by 3. How many values of X are possible?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; 8 &#2309;&#2306;&#2325;&#2368;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 3112093X &#2325;&#2379; 3 &#2360;&#2375; &#2349;&#2366;&#2327; &#2342;&#2375;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; 0 &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; X &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2366;&#2344; &#2360;&#2306;&#2349;&#2357; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Sum of the digits of given number = 19 + X</p><p>To be divisible by 3, the value of X be either 2 or 5 or 8.</p><p>So, possible values of X = 3</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If the four-digit number 535y is divisible by 7, then what is the value of y?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2330;&#2366;&#2352; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 535y, 7 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; y &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>If a number is divisible by 7, then the last digit of the number multiplied by 2 and subtracted from the rest of the number, leaving the last digit, will be 0 or a multiple of 7.</p><p>Now check the options,</p><p>Option a: y = 4, so 535  -  8 = 527 not a multiple of 7.</p><p>Option b: y = 5, so 535  -  10 = 525 a multiple of 7.</p><p>So, y = 5</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following numbers is divisible by 11?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 11 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">5215342</span><span class=\"hqt\" style=\"display:none\">5215342</span>",
      "<span class=\"eqt\">7648741</span><span class=\"hqt\" style=\"display:none\">7648741</span>",
      "<span class=\"eqt\">6588321</span><span class=\"hqt\" style=\"display:none\">6588321</span>",
      "<span class=\"eqt\">3287965</span><span class=\"hqt\" style=\"display:none\">3287965</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Option a:</p><p>Difference between the sum of digits at odd places and the sum of the digits at even places = 11  -  11 = 0</p><p>Hence option a is divisible by 11.</p><p>Option b:</p><p>Difference between the sum of digits at odd places and the sum of the digits at even places = 19  -  18 = 1</p><p>Hence option b is not divisible by 11.</p><p>Option c: </p><p>Difference between the sum of digits at odd places and the sum of the digits at even places = 18  -  15 = 3</p><p>Hence option c is not divisible by 11.</p><p>Option d:</p><p>Difference between the sum of digits at odd places and the sum of the digits at even places = 25  -  15 = 10</p><p>Hence option d is not divisible by 11.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>If a 9-digit number 469A72B08 is divisible by 72, then find the LCM of A and B if B is a perfect square</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 9 &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 469A72B08, 72 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; A &#2324;&#2352; B &#2325;&#2366; LCM &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;, &#2351;&#2342;&#2367; B &#2319;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2352;&#2381;&#2327; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>We know that if a number is divisible by 72, it must be divisible by 8 and 9.</p><p>To be divisible by 8, B08 should be divisible by 8 and for that, the only possible value of B to be a perfect square also, should be 4.</p><p>So, B = 4</p><p>Now,</p><p>To be divisible by 9, the sum of the digits should be divisible by 9.</p><p>Sum of digits = 40 + A</p><p>The only possible for A is 5.</p><p>So, LCM of A and B = LCM of 5 and 4 = 20</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>If the six-digit number 1319XY is divisible by 3, 7, and 11, then what is the value of (4y)<sup>x </sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2331;&#2361; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 1319XY, 3, 7 &#2324;&#2352; 11 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; (4y)<sup>x </sup> &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">64</span><span class=\"hqt\" style=\"display:none\">64</span>"
    ],
    "correct_option_id": 0,
