<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The pie chart shows the percentage distribution of total number of students in all sections of the class.</p><p>Total number of students in the class = 600</p><p><img width=576 height=349 id=\"Chart 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image005.png\"></p><p>The following line graph shows the total number of boys and girl students present in five sections of a class on a certain day.</p><p><img width=620 height=347 id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image006.png\"></p><p>Total number of students absent in class A and C together is what percent more or less than total number of students absent in class E?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2360;&#2349;&#2368; &#2360;&#2375;&#2325;&#2381;&#2358;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = 600</p><p><img width=576 height=349 id=\"Chart 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image005.png\"></p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2375;&#2326;&#2366; &#2327;&#2381;&#2352;&#2366;&#2347; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2367;&#2344; &#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2346;&#2366;&#2306;&#2330; &#2360;&#2375;&#2325;&#2381;&#2358;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2354;&#2337;&#2364;&#2325;&#2375; &#2324;&#2352; &#2331;&#2366;&#2340;&#2381;&#2352;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=620 height=347 id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image006.png\"></p><p>&#2325;&#2325;&#2381;&#2359;&#2366; A &#2324;&#2352; C &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2325;&#2381;&#2359;&#2366; E &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2309;&#2343;&#2367;&#2325; &#2351;&#2366; &#2325;&#2350; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">40%</span><span class=\"hqt\" style=\"display:none\">40%</span>",
      "<span class=\"eqt\">70%</span><span class=\"hqt\" style=\"display:none\">70%</span>",
      "<span class=\"eqt\">60%</span><span class=\"hqt\" style=\"display:none\">60%</span>",
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Total number of students in class A = 600 * 20/100 = 120</p><p>Total number of students present in class A = 90 + 20 = 110</p><p>Total number of students absent in class A = 120  -  110 = 10</p><p>Total number of students in class C = 600 * 12/100 = 72</p><p>Total number of students present in class C = 30 + 20 = 50</p><p>Total number of students absent in class C = 72  -  50 = 22</p><p>Total number of students in class E = 600 * 20/100 = 120</p><p>Total number of students present in class E = 60 + 40 = 100</p><p>Total number of students absent in class E = 120 - 100 = 20</p><p>Required percentage = (32 - 20)/20 * 100 = 60%</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The following bar graph shows the monthly income (in thousand) and savings (as percentage) of six peoples working in a company.</p><p><img width=576 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image011.png\"></p><p>The following pie chart shows the monthly expenditure of each person on various items as percentage.</p><p><img width=576 height=336 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image012.png\"></p><p>Find the difference between average expenditure of A and B on food and average expenditure of E and F on education.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2348;&#2366;&#2352; &#2327;&#2381;&#2352;&#2366;&#2347; &#2319;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2350;&#2375;&#2306; &#2325;&#2366;&#2350; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2331;&#2361; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2350;&#2366;&#2360;&#2367;&#2325; &#2310;&#2351; (&#2361;&#2332;&#2366;&#2352; &#2350;&#2375;&#2306;) &#2324;&#2352; &#2348;&#2330;&#2340; (&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306;) &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=576 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image011.png\"></p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2350;&#2366;&#2360;&#2367;&#2325; &#2357;&#2381;&#2351;&#2351; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=576 height=336 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image012.png\"></p><p>&#2349;&#2379;&#2332;&#2344; &#2346;&#2352; A &#2324;&#2352; B &#2325;&#2375; &#2324;&#2360;&#2340; &#2357;&#2381;&#2351;&#2351; &#2324;&#2352; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2346;&#2352; E &#2324;&#2352; F &#2325;&#2375; &#2324;&#2360;&#2340; &#2357;&#2381;&#2351;&#2351; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2060</span><span class=\"hqt\" style=\"display:none\">2060</span>",
      "<span class=\"eqt\">3038</span><span class=\"hqt\" style=\"display:none\">3038</span>",
      "<span class=\"eqt\">4044</span><span class=\"hqt\" style=\"display:none\">4044</span>",
      "<span class=\"eqt\">1230</span><span class=\"hqt\" style=\"display:none\">1230</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Total expenditure of A on food = <img width=172 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image013.png\"> = 9360</p><p>Total expenditure of B on food = <img width=161 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image014.png\"> = 6880</p><p>Average expenditure of A and B on food = <img width=89 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image015.png\"> = 8120</p><p>Total expenditure of E on education = <img width=171 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image016.png\"> = 3952</p><p>Total expenditure of F on education = <img width=171 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image017.png\"> = 4200</p><p>Average expenditure of E and F on education = <img width=151 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image018.png\"></p><p>Required difference = 8120  -  4076 = 4044</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The following bar graph shows the total export of wheat in 5 consecutive years.</p><p>Total export of grain = total export of wheat+ total export of maize + total export of rice</p><p>Total export of all types of grain is same in 5 consecutive years and equal to 500 tonnes.</p><p><img width=570 height=283 id=\"Chart 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image031.png\"></p><p>The following table shows the ratio of total export of maize and rice in 5 consecutive years.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Years</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Ratio of total export of maize to rice</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2018</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4:5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2019</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4:7</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2020</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3:2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2021</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5:3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2022</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8:5</td></tr></table><p>Which of the following statement is correct?</p><p><b>I. </b>The ratio of total export of wheat and total export of maize in year 2022 is 3:2.</p><p><b>II. </b>The difference between total export of rice in year 2019 and 2018 is 60.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2348;&#2366;&#2352; &#2327;&#2381;&#2352;&#2366;&#2347; 5 &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2327;&#2375;&#2361;&#2370;&#2306; &#2325;&#2375; &#2325;&#2369;&#2354; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2309;&#2344;&#2366;&#2332; &#2325;&#2366; &#2325;&#2369;&#2354; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; = &#2327;&#2375;&#2361;&#2370;&#2306; &#2325;&#2366; &#2325;&#2369;&#2354; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; + &#2350;&#2325;&#2381;&#2325;&#2366; &#2325;&#2366; &#2325;&#2369;&#2354; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; + &#2330;&#2366;&#2357;&#2354; &#2325;&#2366; &#2325;&#2369;&#2354; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340;</p><p>&#2360;&#2349;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2309;&#2344;&#2366;&#2332; &#2325;&#2366; &#2325;&#2369;&#2354; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; 5 &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376; &#2324;&#2352; 500 &#2335;&#2344; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404;</p><p><img width=570 height=283 id=\"Chart 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image031.png\"></p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366; 5 &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2325;&#2381;&#2325;&#2366; &#2324;&#2352; &#2330;&#2366;&#2357;&#2354; &#2325;&#2375; &#2325;&#2369;&#2354; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2352;&#2381;&#2359;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2330;&#2366;&#2357;&#2354; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2350;&#2325;&#2381;&#2325;&#2366; &#2325;&#2375; &#2325;&#2369;&#2354; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2018</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4:5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2019</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4:7</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2020</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3:2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2021</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5:3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2022</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8:5</td></tr></table><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>I. &#2357;&#2352;&#2381;&#2359; 2022 &#2350;&#2375;&#2306; &#2327;&#2375;&#2361;&#2370;&#2306; &#2325;&#2375; &#2325;&#2369;&#2354; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2324;&#2352; &#2350;&#2325;&#2381;&#2325;&#2366; &#2325;&#2375; &#2325;&#2369;&#2354; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3:2 &#2361;&#2376;&#2404;</p><p>II. &#2357;&#2352;&#2381;&#2359; 2019 &#2324;&#2352; 2018 &#2350;&#2375;&#2306; &#2330;&#2366;&#2357;&#2354; &#2325;&#2375; &#2325;&#2369;&#2354; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 60 &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>For I:</b></p><p>Total export of wheat in year 2022 = 240</p><p>Total export of rice and maize in year 2022 = 500  -  240 = 260</p><p>Total export of maize in year 2022 = 260 * 8/13 = 160</p><p>Required ratio = 240:160 = 3:2</p><p><b>For II:</b></p><p>Total export of wheat in year 2019 = 280</p><p>Total export of rice and maize in year 2019 = 500  -  280 = 220</p><p>Total export of rice in year 2019 = 220 * 7/11 = 140</p><p>Total export of wheat in year 2018 = 140</p><p>Total export of rice and maize in year 2018 = 500  -  140 = 360</p><p>Total export of rice in year 2018 = 360 * 5/9 = 200</p><p>Required difference = 200  -  140 = 60</p>",

    "question": "<span class=\"eqt\"><p>The table given below shows the average number of tourists visited in India and Japan together in five different years and the line graph shows the number of tourists visited in India.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Year</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Average number of tourists visited in India and Japan together</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2014</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2015</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2016</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2017</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2018</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8000</td></tr></table><p><img width=416 height=246 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25169/image007.png\">.</p><p>What is the ratio of number of tourists visited in India in 2014 and 2015 together to number of tourists visited in Japan in 2018?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2368; &#2327;&#2312; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366; &#2346;&#2366;&#2306;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2324;&#2352; &#2332;&#2366;&#2346;&#2366;&#2344; &#2350;&#2375;&#2306; &#2310;&#2319; &#2346;&#2352;&#2381;&#2351;&#2335;&#2325;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2352;&#2375;&#2326;&#2366; &#2327;&#2381;&#2352;&#2366;&#2347; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2310;&#2319; &#2346;&#2352;&#2381;&#2351;&#2335;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2352;&#2381;&#2359;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2349;&#2366;&#2352;&#2340; &#2324;&#2352; &#2332;&#2366;&#2346;&#2366;&#2344; &#2350;&#2375;&#2306; &#2310;&#2319; &#2346;&#2352;&#2381;&#2351;&#2335;&#2325;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2014</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2015</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2016</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2017</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2018</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8000</td></tr></table><p><img width=416 height=246 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25169/image007.png\">.</p><p>2014 &#2324;&#2352; 2015 &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2310;&#2319; &#2346;&#2352;&#2381;&#2351;&#2335;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; 2018 &#2350;&#2375;&#2306; &#2332;&#2366;&#2346;&#2366;&#2344; &#2310;&#2319; &#2346;&#2352;&#2381;&#2351;&#2335;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "comp": "<span class=\"eqt\"><p><b>Directions :</b>   A fruit vendor sold a total of 300 kg fruits of different types in two different days  -  day1 and day2. The following pie chart shows the percentage of quantity of different types sold by him in day1 and day2 together.</p><p><img width=312 height=331 id=\"Chart 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16386/image024.png\"></p><p>The following bar graph shows the ratio between the quantity of fruits sold on day1 and day2.</p><p><img width=576 height=336 id=\"Chart 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16386/image025.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; :</b> &#2319;&#2325; &#2347;&#2354; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2342;&#2379; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2342;&#2367;&#2344;&#2379;&#2306; - &#2342;&#2367;&#2344; 1 &#2324;&#2352; &#2342;&#2367;&#2344; 2 &#2350;&#2375;&#2306; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2325;&#2369;&#2354; 300 kg &#2347;&#2354; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2367;&#2344; 1 &#2324;&#2352; &#2342;&#2367;&#2344; 2 &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2347;&#2354;&#2379;&#2306; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"312\" height=\"331\" id=\"Chart 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16386/image024.png\"></p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2342;&#2339;&#2381;&#2337; &#2310;&#2352;&#2375;&#2326; &#2342;&#2367;&#2344; 1 &#2324;&#2352; &#2342;&#2367;&#2344; 2 &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2347;&#2354;&#2379;&#2306; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16386/image025.png\"></p></span>",
    "question": "<span class=\"eqt\"><p>The ratio of the quantity of Oranges and Guavas sold on Day1 together to the total quantity of Mangoes sold on Day2 is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2344; 1 &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2366;&#2341; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2323;&#2352;&#2375;&#2306;&#2332; &#2324;&#2352; &#2327;&#2369;&#2310;&#2357;&#2366; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2340;&#2341;&#2366; &#2342;&#2367;&#2344; 2 &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2350;&#2376;&#2306;&#2327;&#2379; &#2325;&#2368; &#2325;&#2369;&#2354; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "comp": "<span class=\"eqt\"><p><b>Directions [Set of 2 Questions]:</b> Study the data given below and answer the following questions.</p><p>Below pie chart shows the percentage distribution of sanitizers sold by five shopkeepers in two months together (November and December):</p><p>Total number of sanitizers sold by five shopkeepers together in two months together = 2400</p><p><img width=480 height=288 id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13946/image007.png\"></p><p>Below line graph shows the number of sanitizers sold by five shopkeepers in November:</p><p><img width=480 height=347 id=\"Chart 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13946/image008.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;: </b>&#2344;&#2368;&#2330;&#2375; &#2342;&#2368; &#2327;&#2312; &#2360;&#2370;&#2330;&#2344;&#2366; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;:</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2371;&#2340;&#2381;&#2340; &#2310;&#2352;&#2375;&#2326; &#2350;&#2375;&#2306; &#2346;&#2366;&#2306;&#2330; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2379; &#2350;&#2361;&#2368;&#2344;&#2375; (&#2344;&#2357;&#2306;&#2348;&#2352; &#2324;&#2352; &#2342;&#2367;&#2360;&#2306;&#2348;&#2352;) &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2360;&#2376;&#2344;&#2367;&#2335;&#2366;&#2311;&#2332;&#2364;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;:</p><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2346;&#2366;&#2306;&#2330; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2379; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2360;&#2376;&#2344;&#2367;&#2335;&#2366;&#2311;&#2332;&#2364;&#2352; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = 2400</p><p><img width=\"480\" height=\"288\" id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13946/image007.png\"></p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2346;&#2366;&#2306;&#2330; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2357;&#2306;&#2348;&#2352; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2360;&#2376;&#2344;&#2367;&#2335;&#2366;&#2311;&#2332;&#2364;&#2352; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;:</p><p><img width=\"480\" height=\"347\" id=\"Chart 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13946/image008.png\"></p></span>",
    "question": "<span class=\"eqt\"><p>If M = the average number of sanitizers sold by shopkeepers A, E and D in December and N = the average number of sanitizers sold by shopkeepers A, D and E in November, then what is the value of M/N?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; M = &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352;&#2379;&#2306; A, E &#2324;&#2352; D &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2367;&#2360;&#2306;&#2348;&#2352; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2360;&#2376;&#2344;&#2367;&#2335;&#2366;&#2311;&#2332;&#2364;&#2352; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; N = &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352;&#2379;&#2306; A, D &#2324;&#2352; E &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2357;&#2306;&#2348;&#2352; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2360;&#2376;&#2344;&#2367;&#2335;&#2366;&#2311;&#2332;&#2364;&#2352; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2379;, &#2340;&#2379; M/N &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">0.99</span><span class=\"hqt\" style=\"display:none\">0.99</span>",
      "<span class=\"eqt\">0.81</span><span class=\"hqt\" style=\"display:none\">0.81</span>",
      "<span class=\"eqt\">8.81</span><span class=\"hqt\" style=\"display:none\">8.81</span>",
      "<span class=\"eqt\">7.72</span><span class=\"hqt\" style=\"display:none\">7.72</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total number of sanitizers sold by shopkeeper A in November and December together = 2400 * 13/100 = 312</p><p>Number of sanitizers sold by shopkeeper A in November = 120</p><p>Number of sanitizers sold by shopkeeper A in December = 312  -  120 = 192</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Total</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">November</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">December</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Shopkeeper A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">312</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">120</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">192</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Shopkeeper B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">528</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">280</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">248</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Shopkeeper C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">672</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">340</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">332</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Shopkeeper D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">600</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">360</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">240</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Shopkeeper E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">288</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">180</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">108</td></tr></table><br><p>M = (192 + 108 + 240)/3 = 180</p><p>N = (120 + 360 + 180)/3 = 220</p><p>So, M/N = 180/220 = 0.81</p>",
    "question_index": 5
  },

    "question": "<span class=\"eqt\"><p>Read the data carefully and answer the following question.</p><p>Following pie-chart represents the percentage break-up of number of students in class XI in schools A, B, C and D.</p><p><img width=468 height=287 id=\"Chart 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20810/image018.png\"></p><p>Following table represents the ratio of number of girls to boys in class XI in respective schools.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">School</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ratio of number of girls to boys in class XI</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2: 3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5: 3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3: 1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4: 5</td></tr></table><p>In school B, if the number of boys in class XI and XII are in the ratio 3: 4 respectively and in school C, the number of girls in class X and XI are in the ratio 1: 2 respectively, then what is the ratio of number of boys in class XII in school B to the number of girls in class X in school C?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2306;&#2325;&#2396;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344; &#2360;&#2375; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2360;&#2381;&#2325;&#2370;&#2354;&#2379;&#2306; A, B, C &#2324;&#2352; D &#2350;&#2375;&#2306; &#2327;&#2381;&#2351;&#2366;&#2352;&#2361;&#2357;&#2368;&#2306; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"468\" height=\"287\" id=\"Chart 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20810/image018.png\"></p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2360;&#2381;&#2325;&#2370;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2325;&#2381;&#2359;&#2366; XI &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2381;&#2325;&#2370;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2325;&#2381;&#2359;&#2366; XI &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2: 3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5: 3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3: 1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4: 5</td></tr></table><p>&#2360;&#2381;&#2325;&#2370;&#2354; B &#2350;&#2375;&#2306;, &#2351;&#2342;&#2367; &#2325;&#2325;&#2381;&#2359;&#2366; XI &#2324;&#2352; XII &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3: 4 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376; &#2340;&#2341;&#2366; &#2360;&#2381;&#2325;&#2370;&#2354; C &#2350;&#2375;&#2306;, &#2325;&#2325;&#2381;&#2359;&#2366; X &#2324;&#2352; XI &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 1: 2 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2381;&#2325;&#2370;&#2354; B &#2350;&#2375;&#2306; &#2348;&#2366;&#2352;&#2361;&#2357;&#2368;&#2306; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2360;&#2381;&#2325;&#2370;&#2354; C &#2350;&#2375;&#2306; &#2325;&#2325;&#2381;&#2359;&#2366; X &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>Let the total number of students in class XI in schools A, B, C and D together = n</p><p>Then, total number of students in class XI in school B = 16% of n = 0.16n</p><p>Total number of students in class XI in school C = 32% of n = 0.32n</p><p>Number of boys in class XI in school B = 0.16n * 3/(3 + 5) = 0.06n</p><p>Number of girls in class XI in school C = 0.32n * 3/(3 + 1) = 0.24n</p><p>Now, number of boys in class XII in school B = 0.06n * 4/3 = 0.08n</p><p>And the number of girls in class X in school C = 0.24n * 1/2 = 0.12n</p><p>Therefore, ratio = 0.08n: 0.12n = <b>2: 3</b></p>",
    "question_index": 6

6;?</p></span>",

    "solution": "<p>Number of laptops repaired on Monday and Tuesday together in shop A = (56&deg;/360&deg;) * 4500 = 700</p><p>Number of laptops repaired on Monday and Tuesday together in shop C = (40&deg;/360&deg;) * 4500 = 500</p><p>Number of laptops repaired on Monday and Tuesday together in shop D = (80&deg;/360&deg;) * 4500 = 1000</p><p>Number of laptops repaired on Tuesday in shop A = (100  -  60)% of 700 = 280</p><p>Number of laptops repaired on Tuesday in shop C = (100  -  60)% of 500 = 200</p><p>Number of laptops repaired on Tuesday in shop D = (100  -  70)% of 1000 = 300</p><p>Therefore, the average number of laptops repaired in shops A, C and D on Tuesday</p><p>= (280 + 200 + 300)/3</p><p>= <b>260</b></p>",

;\">60</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Product Development</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">80</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sales</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">76</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">38</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">38</td></tr></table><br><p>X = 60  -  (24 + 32) = 60  -  56 = 4</p><p>Value of X/2 = 4/2 = 2</p>",

1;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2342;&#2369;&#2325;&#2366;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2352;&#2375;&#2358;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2370;&#2340;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">40</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">32</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">68</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">64</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">36</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">45</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">55</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">48</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">52</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">F</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">70</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30</td></tr></table><p>&#2342;&#2369;&#2325;&#2366;&#2344; B &#2324;&#2352; D &#2350;&#2375;&#2306; &#2360;&#2370;&#2340;&#2368; &#2360;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368;, &#2342;&#2369;&#2325;&#2366;&#2344; A &#2350;&#2375;&#2306; &#2352;&#2375;&#2358;&#2350; &#2325;&#2368; &#2360;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;?</p></span>",

    "solution": "<p>Let total 'n' sarees sold from all given stores together in 2014.</p><p>Sale of sarees in store A = 20% of n = 0.2n</p><p>Sale of sarees in store B = 10% of n = 0.1n</p><p>Sale of sarees in store D = 24% of n = 0.24n</p><p>Sale of sarees in store E = 12% of n = 0.12n</p><p>Then, sale of cottons sarees in stores B = 68% of 0.1n = 0.068n</p><p>Sale of cotton sarees in store D = 55% of 0.24n = 0.132n</p><p>Average sale of cotton sarees in stores B and D = (0.068n + 0.132n)/2 = 0.1n</p><p>Sale of silk sarees in store A = 40% of 0.2n = 0.08n</p><p>Therefore, percentage = (0.1n)/(0.08n) * 100 = <b>125%</b></p>",

    "solution": "<p>From the line graph,</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Shop</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Total number of pens and envelops sold (Average * 2)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">80</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">70</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">90</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">100</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">F</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">120</td></tr></table><p>Number of pens sold by shop A = 80 * 3/4 = 60</p><p>Number of envelops sold by shop A = 80  -  60 = 20</p><p>Similarly, we can find the number of pens and envelops sold by other shops.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Shop</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Total number of pens and envelops sold</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Number of pens sold</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Number of envelops sold</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">80</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">24</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">36</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">70</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">50</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">90</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">40</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">50</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">100</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">40</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">F</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">120</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Total</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">520</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">294</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">226</td></tr></table><p>Therefore, X = 294  -  226 = 68</p><p>Hence, it cannot be divisible by 6.</p>",

    "question": "<span class=\"eqt\"><p>The following bar graph shows the average of number of females in five different organization in 2011 and 2012.</p><p><img width=576 height=336 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image002.png\"></p><p>The following table shows the ratio of number of females in 2011 to that of in 2012 in five different organization.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Organization</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ratio of number of females in 2011 to that of in 2012</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4 : 3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Q</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">25 : 22</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5 : 6</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7 : 5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">26 : 19</td></tr></table><p>If M = total number of females in 2011 and 2012 in organization Q, N = difference between the number of females in 2011 and 2012 in organization T, and L = difference between the number of females in 2012 in organization R and that of in 2012 in organization S, then find the value of M + N  -  L.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2342;&#2306;&#2337; &#2310;&#2352;&#2375;&#2326; &#2357;&#2352;&#2381;&#2359; 2011 &#2324;&#2352; 2012 &#2350;&#2375;&#2306; er:1px solid black;padding:5px;\">4 : 3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Q</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">25 : 22</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5 : 6</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7 : 5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">26 : 19</td></tr></table><p>&#2351;&#2342;&#2367; M = &#2360;&#2306;&#2327;&#2336;&#2344; Q &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2359; 2011 &#2324;&#2352; &#2357;&#2352;&#2381;&#2359; 2012 &#2350;&#2375;&#2306; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, N = &#2360;&#2306;&#2327;&#2336;&#2344; T &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2359; 2011 &#2324;&#2352; &#2357;&#2352;&#2381;&#2359; 2012 &#2350;&#2375;&#2306; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2324;&#2352; L = &#2360;&#2306;&#2327;&#2336;&#2344; R &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2359; 2012 &#2350;&#2375;&#2306; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2360;&#2306;&#2327;&#2336;&#2344; S &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2359; 2012 &#2350;&#2375;&#2306; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;, &#2340;&#2379; M + N - L &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "correct_option_id": 0,
    "solution": "<p>Let number of females in organization P in 2011 and 2012 be 4X and 3X respectively.</p><p>Given,</p><p>4X + 3X = 2 * 35 </p><p>7X = 70</p><p>X = 10</p><p>So, number of females in organization P in 2011 = 4 * 10 = 40 </p><p>And number of females in organization P in 2012 = 3 * 10 = 30</p><p>Similarly, we can find the number of females in 2011 and 2012 in other organizations.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Organization</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Number of females in 2011</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Number of females in 2012</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">40</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Q</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">50</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">44</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">72</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">42</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">52</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">38</td></tr></table><p>Now,</p><p>M = 50 + 44 = 94</p><p>N = 52  -  38 = 14</p><p>L = 72  -  30 = 42</p><p>Value of M + N  -  L = 94 + 14  -  42 = 66</p>",
    "question_index": 13
  },

    "question": "<span class=\"eqt\"><p>The following bar graph shows the ratio between the numbers of R.O and mixers sold by five different salespersons named A, B, C, D, and E from March to May.</p><p>Ratio of number of RO to that of mixers = Value indicated for RO/Value indicated for mixer</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/erss22101782bg1.png\"></p><p>The following table shows the number of R.O sold by five different salespersons from March to May.<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Salesperson</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Number of R.O sold</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">12</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td></tr></table></p><p>The number of mixers sold by salesperson A and B together is what percent more or less than the number of mixers sold by salesperson C and D together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2342;&#2306;&#2337; &#2310;&#2352;&#2375;&#2326; &#2350;&#2366;&#2352;&#2381;&#2330; &#2360;&#2375; &#2350;&#2312; &#2340;&#2325; A, B, C, D &#2324;&#2352; E &#2344;&#2366;&#2350; &#2325;&#2375; &#2346;&#2366;&#2306;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2375;&#2354;&#2381;&#2360;&#2346;&#2352;&#2381;&#2360;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; R.O. &#2324;&#2352; &#2350;&#2367;&#2325;&#2381;&#2360;&#2352; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>R.O. &#2324;&#2352; &#2350;&#2367;&#2325;&#2381;&#2360;&#2352; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; = RO &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2350;&#2366;&#2344;/&#2350;&#2367;&#2325;&#2381;&#2360;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2350;&#2366;&#2344;</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/erss22101782bg1.png\"></p><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366; &#2350;&#2366;&#2352;&#2381;&#2330; &#2360;&#2375; &#2350;&#2312; &#2340;&#2325; &#2346;&#2366;&#2305;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2375;&#2354;&#2381;&#2360;&#2346;&#2352;&#2381;&#2360;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; R.O. &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2375;&#2354;&#2381;&#2360;&#2346;&#2352;&#2381;&#2360;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2348;&#2375;&#2330;&#2375; &#2327;&#2319; R.O &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">12</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td></tr></table><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2375;&#2354;&#2381;&#2360;&#2346;&#2352;&#2381;&#2360;&#2344; A &#2324;&#2352; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2350;&#2367;&#2325;&#2381;&#2360;&#2352; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2375;&#2354;&#2381;&#2360;&#2346;&#2352;&#2381;&#2360;&#2344; C &#2324;&#2352; D &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2350;&#2367;&#2325;&#2381;&#2360;&#2352; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2309;&#2343;&#2367;&#2325; &#2351;&#2366; &#2325;&#2350; &#2361;&#2376;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p>Given,</p><p>The number of R.O sold by salesperson A = 15</p><p>So,</p><p>5 units = 15</p><p>1 unit = 3</p><p>3 units = 9</p><p>Number of mixer sold by salesperson A = 9</p><p>Similarly, we can find out the number of mixer sold by salesperson B, C, and D.</p><p>Number of mixer sold by salesperson B = 36</p><p>Number of mixer sold by salesperson C = 18</p><p>Number of mixer sold by salesperson D = 7</p><p>Number of mixer sold by salesperson E = 3</p><p>Required percentage = {(36 + 9)  -  (18 + 7)} * 100/(18 + 7)</p><p>= (45  -  25) * 100/25 = 80%</p>",

    "question": "<span class=\"eqt\"><p>The following bar graph shows the maximum marks of each subject in an examination.</p><p><img width=576 height=336 id=\"Chart 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image013.png\"></p><p>The following line graph shows the percentage of marks obtained by two students A and B in each subject.</p><p><img width=576 height=336 id=\"Chart 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image014.png\"></p><p>The sum of marks obtained by A in Art and that of by B in Science is what percent of the sum of marks obtained by A in Hindi and that of by B in English? (Up to one decimal point)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2342;&#2306;&#2337; &#2310;&#2352;&#2375;&#2326; &#2319;&#2325; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2367;&#2359;&#2351; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image013.png\"></p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2367;&#2359;&#2351; &#2350;&#2375;&#2306; &#2342;&#2379; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306;- A &#2324;&#2352; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image014.png\"></p><p>A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2366;&#2344;&#2357;&#2367;&#2325;&#2368; (&#2310;&#2352;&#2381;&#2335;&#2381;&#2360;) &#2350;&#2375;&#2306; &#2324;&#2352; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354;, A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2361;&#2367;&#2306;&#2342;&#2368; &#2350;&#2375;&#2306; &#2324;&#2352; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327;&#2347;&#2354; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; (&#2342;&#2358;&#2350;&#2354;&#2357; &#2325;&#2375; &#2319;&#2325; &#2360;&#2381;&#2341;&#2366;&#2344; &#2340;&#2325;) &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>The following line graph shows the ratio of number of books published by publication A and B over the given years.</p><p><img width=576 height=336 id=\"Chart 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image008.png\"></p><p>The following table shows the number of books published by publication C, over the given years.<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Year</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Number of books published by C</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2010</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">180</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2011</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">240</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2012</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">200</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2013</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">300</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2014</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">250</td></tr></table></p><p>If number of books published by A in 2011 is 25% more than that by C in 2011 and the number of books published by B in 2011 exceeds the number of books published by A in 2012 by 2, then number of books published by B in 2012 is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2344; A &#2324;&#2352; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2344; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image008.png\"></p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2344; C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2352;&#2381;&#2359;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2010</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">180</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2011</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">240</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2012</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">200</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2013</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">300</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2014</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">250</td></tr></table><p>&#2351;&#2342;&#2367; 2011 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2344; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, 2011 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2344; C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 25% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376; &#2340;&#2341;&#2366; 2011 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2344; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, 2012 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2344; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 2 &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; 2012 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2344; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "solution": "<p>Ratio of the number of books published by A in 2011 to that by B in 2011 = 1.5 = 3/2</p><p>Let number of books published by A in 2011 = 3X</p><p>According to the question,</p><p>3X = 240 * 125/100</p><p>3X = 300</p><p>X = 100</p><p>So, number of books published by B in 2011 = 300 * 2X/3X = 200</p><p>Therefore, number of books published by A in 2012 = 200  -  2 = 198</p><p>Given, ratio of the number of books published by A in 2012 to that by B in 2012 = 1.1 = 11/10</p><p>11 units = 198</p><p>10 units = 198 * 10/11 = 180</p><p>Number of books published by B in 2012 = 180</p>",
    "question_index": 16
