    "question": "<span class=\"eqt\"><p>Read the data carefully and answer the following question.</p><p>Following pie-chart represents the population of six cities i.e., P, Q, R, S, T and U.</p><p><img width=488 height=301 id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20810/image016.png\"></p><p>Following table represents the female population of six cities.<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">City</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Female population</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">28000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Q</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">50000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">14000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">48000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">U</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8000</td></tr></table></p><p>If male population of city S is 40000 more than the male population of city P, then find the male population of city Q and T together.</p><p>Note: Total population of city = Total male population of city + Total female population of city</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2305;&#2325;&#2396;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2346;&#2397;&#2367;&#2319; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2331;&#2361; &#2358;&#2361;&#2352;&#2379;&#2306; &#2309;&#2352;&#2381;&#2341;&#2366;&#2340; P, Q, R, S, T &#2324;&#2352; U &#2325;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"488\" height=\"301\" id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20810/image016.png\"></p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366; &#2331;&#2361; &#2358;&#2361;&#2352;&#2379;&#2306; &#2325;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2358;&#2361;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2350;&#2361;&#2367;&#2354;&#2366; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">28000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Q</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">50000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">14000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">48000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">U</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8000</td></tr></table><p>&#2351;&#2342;&#2367; &#2358;&#2361;&#2352; S &#2325;&#2368; &#2346;&#2369;&#2352;&#2369;&#2359; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2358;&#2361;&#2352; P &#2325;&#2368; &#2346;&#2369;&#2352;&#2369;&#2359; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 40000 &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2358;&#2361;&#2352; Q &#2324;&#2352; T &#2325;&#2368; &#2346;&#2369;&#2352;&#2369;&#2359; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><b>&#2344;&#2379;&#2335;:</b> &#2358;&#2361;&#2352; &#2325;&#2368; &#2325;&#2369;&#2354; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = &#2358;&#2361;&#2352; &#2325;&#2368; &#2325;&#2369;&#2354; &#2346;&#2369;&#2352;&#2369;&#2359; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; + &#2358;&#2361;&#2352; &#2325;&#2368; &#2325;&#2369;&#2354; &#2350;&#2361;&#2367;&#2354;&#2366; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</p></span>",

    "solution": "<p>Let total population of all six cities together = n</p><p>Then, total population of city P = 15% of n = 0.15n</p><p>Total population of city S = 30% of n = 0.3n</p><p>Male population of city P = 0.15n  -  28000</p><p>Male population of city S = 0.3n  -  48000</p><p>Now, 0.3n  -  48000 = 40000 + 0.15n  -  28000</p><p>0.15n = 60000</p><p>n = 400000</p><p>Total population of city Q = 25% of 400000 = 100000</p><p>Total population of city T = 15% of 400000 = 60000</p><p>Then, male population of city Q = 100000  -  50000 = 50000</p><p>Male population of city T = 60000  -  20000 = 40000</p><p>Therefore, male population of city Q and T together = 50000 + 40000 = <b>90000</b></p>",
    "question_index": 17
  },

    "question": "<span class=\"eqt\"><p>The following pie chart shows the population of different villages in the year 2022. The total population of the given villages is 204800.</p><p><img width=576 height=336 id=\"Chart 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image035.png\"></p><p>The following line graph shows the population of man and woman (in thousand) in different villages in the year 2022.</p><p><img width=576 height=336 id=\"Chart 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image036.png\"></p><p>Population of each village = Total population of man + Total population of woman + Total population of children</p><p>Find the sum of total population of children in all the villages together.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2357;&#2352;&#2381;&#2359; 2022 &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2327;&#2366;&#2305;&#2357;&#2379;&#2306; &#2325;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2367;&#2319; &#2327;&#2319; &#2327;&#2366;&#2305;&#2357;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 204800 &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image035.png\"></p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2357;&#2352;&#2381;&#2359; 2022 &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2327;&#2366;&#2305;&#2357;&#2379;&#2306; &#2325;&#2368; &#2346;&#2369;&#2352;&#2369;&#2359; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366; &#2325;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; (&#2361;&#2332;&#2366;&#2352; &#2350;&#2375;&#2306;) &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image036.png\"></p><p>&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2327;&#2366;&#2305;&#2357; &#2325;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; + &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; + &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</p><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2349;&#2368; &#2327;&#2366;&#2305;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
