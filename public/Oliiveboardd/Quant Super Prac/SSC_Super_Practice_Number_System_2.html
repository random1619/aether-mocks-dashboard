<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A six-digit number 11p9q4 is divisible by 24. Then the greatest possible value for pq is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2331;&#2361;-&#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 11p9q4, 24 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; pq &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2350;&#2366;&#2344; ___ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">42</span><span class=\"hqt\" style=\"display:none\">42</span>",
      "<span class=\"eqt\">32</span><span class=\"hqt\" style=\"display:none\">32</span>",
      "<span class=\"eqt\">56</span><span class=\"hqt\" style=\"display:none\">56</span>",
      "<span class=\"eqt\">68</span><span class=\"hqt\" style=\"display:none\">68</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A number is divisible by 24 means a number is divisible by both 3 and 8 individually.</p><p>11p9q4 is divisible by 8 means last three digits (9q4) must be divisible by 8.</p><p>Possible values of q = 0, 4, 8 [We cannot take 0 as a value of 'q' because it will make the product 0 and we will never get the maximum possible value.]</p><p><b>When q = 4:</b></p><p>Sum of digits of number = 1 + 1 + p + 9 + 4 + 4 = 19 + p</p><p>Possible values of p = 2, 5, 8</p><p>Possible values of 'pq' = 8, 20, 32</p><p><b>When q = 8:</b></p><p>Sum of digits of number = 1 + 1 + p + 9 + 8 + 4 = 23 + p</p><p>Possible values of p = 1, 4, 7</p><p>Possible values of 'pq' = 8, 32, 56</p><p>So, maximum possible value of 'pq' = 56</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following numbers is NOT divisible by 8?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 8 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">7344</span><span class=\"hqt\" style=\"display:none\">7344</span>",
      "<span class=\"eqt\">5544</span><span class=\"hqt\" style=\"display:none\">5544</span>",
      "<span class=\"eqt\">7497</span><span class=\"hqt\" style=\"display:none\">7497</span>",
      "<span class=\"eqt\">4608</span><span class=\"hqt\" style=\"display:none\">4608</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>(A number is divisible by 8 if the number formed by its last three digits is divisible by 8).</p><p>1) For 7344, the last three digits are 344 which exactly is divisible by 8.(344/8 = 43)</p><p>2) For 5544, the last three digits are 544. Which is exactly is divisible by 8.(544/8 = 68)</p><p>3) For 7497, the last three digits are 497. Which is not divisible by 8.</p><p>4) For 4608, the last three digits are 608. which is exactly divisible by 8. (608/8 = 76)</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>For what least value of n, 22<sup>n</sup> + 2n is completely divided by 6, where n is an integer?</p></span><span class=\"hqt\" style=\"display:none\"><p>n &#2325;&#2375; &#2325;&#2367;&#2360; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2350;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; 22<sup>n</sup> + 2n, 6 &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2361;&#2379;&#2327;&#2366;, &#2332;&#2361;&#2366;&#2305; n &#2319;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A number is divisible by 6 if it is divisible by both 2 and 3</p><p>A number is divisible by 2 if it is even.</p><p>Since 2<sup>n</sup> is always even for any integer n, the sum 22<sup>n</sup> + 2<sup>n</sup> will be even if 22<sup>n</sup> is even.</p><p>Since 22<sup>n</sup> is a power of 22, and 22 is even, it follows that 22<sup>n</sup> is also always even.</p><p>Thus, 22<sup>n</sup> + 2<sup>n </sup>is always even, meaning it is divisible by 2.</p><p>A number is divisible by 3 if the sum of its digits is divisible by 3</p><p>Since 22 = 1(mod 3), we get</p><p>22<sup>n</sup>  -  1<sup>n</sup> = 1 (mod 3)</p><p>Since 2 = 2(mod 3), we get</p><p>2<sup>n</sup> = 2<sup>n</sup> mod 3)</p><p>For divisibility by 3, we need</p><p>22<sup>n</sup> + 2<sup>n</sup> = 1 + 2<sup>n</sup> = 0 (mod 3)</p><p>1 + 2<sup>n</sup> = 0 (mod 3)</p><p>2<sup>n</sup> = -1 = 2<sup> </sup>(mod 3)</p><p>Checking the powers of 2 module 3</p><p>2<sup>1</sup> = 2(mod 3) [satisfy]</p><p>2<sup>2</sup> = 4 = 1(mod 3) [does not satisfy]</p><p>2<sup>3</sup> = 8 = 2 (mod 3) [satisfy]</p><p>2<sup>4</sup> = 16 = 1 (mod 3) [does not satisfy]</p><p>Observing the pattern, 2<sup>n</sup> = 2(mod 3) when n is odd</p><p>Smallest n to satisfy both condition,</p><p>22<sup>n</sup> + 2<sup>n </sup>is even</p><p>2<sup>n</sup> = 2 (mod 3), meaning n is odd</p><p>The smallest odd integer is n = 1</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following numbers is divisible by 6?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 6 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">128530</span><span class=\"hqt\" style=\"display:none\">128530</span>",
      "<span class=\"eqt\">12581</span><span class=\"hqt\" style=\"display:none\">12581</span>",
      "<span class=\"eqt\">438750</span><span class=\"hqt\" style=\"display:none\">438750</span>",
      "<span class=\"eqt\">62233</span><span class=\"hqt\" style=\"display:none\">62233</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A number is divisible by 6 if it is divisible by both 2 and 3.</p><p>Only option (a) and (c) are divisible by 2 as their unit digit is 0.</p><p>A number is divisible by 3 if sum of its digit is divisible by 3.</p><p>Sum of digits of 128530 = 1 + 2 + 8 + 5 + 3 + 0 = 19 (not divisible)</p><p>Sum of digits of 438750 = 4 + 3 + 8 + 7 + 5 + 0 = 27 (divisible)</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A number is divisible by 3 only when: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2379;&#2312; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 3 &#2360;&#2375; &#2340;&#2349;&#2368; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2332;&#2348;:</p></span>",
    "options": [
      "<span class=\"eqt\">the difference of the sum of the odd and the even digits is divisible by 3</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2359;&#2350; &#2324;&#2352; &#2360;&#2350; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 3 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">the sum of its digits is divisible by 3</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 3 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">the last digit is either 0 or an even number</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2367;&#2350; &#2309;&#2306;&#2325; &#2351;&#2366; &#2340;&#2379; 0 &#2351;&#2366; &#2325;&#2379;&#2312; &#2360;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">the last two digits are divisible by 3</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2367;&#2350; &#2342;&#2379; &#2309;&#2306;&#2325; 3 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A number is divisible by 3 only when the sum of its digits is divisible by 3.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If 436P5 is divisible by 3, then the largest value of P is:</p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; 436P5, 3 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; P &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;:</span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A number is divisible by 3 if sum of its digits is divisible by 3.</p><p>4 + 3 + 6 + P + 5 = 18 + P</p><p>P can be 6, 9 or 12 as this is divisible by 3. </p><p>For largest number = 12</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find the greatest value of 'k' in a 6-digit number 6745k2 such that the number is divisible by 3.</p></span><span class=\"hqt\" style=\"display:none\">&#2331;&#2361; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 6745k2 &#2350;&#2375;&#2306; 'k' &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 3 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A number is divisible by 3 if the sum of its digits is divisible by 3.</p><p>Sum of the digits of 6745k2 = 6 + 7 + 4 + 5 + k + 2 = 24 + k</p><p>For it to be divisible by 3, 24 + k must be divisible by 3.</p><p>On checking each option one by one: we get</p><p>when k = 8:</p><p>24 + 8 = 32</p><p>When k = 6:</p><p>24 + 6 = 30 (divisible by 3)</p><p>When k = 9:</p><p>24 + 9 = 33 (divisible by 3)</p><p>When k = 7:</p><p>24 + 7 = 31</p><p>So largest number = 9</p><p>Option (c) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The number 1254216 is divisible by which of the following numbers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 1254216 &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option a: Since unit digit is 6. It is not divisible by 5.</p><p>Option b: (1+5+2+6)  -  (2+4+1) = 7, not divisible by 11.</p><p>Option c: 4216 = 16*263 + 8, not divisible by 16.</p><p>Option d: 216 = 8*27, divisible by 8.</p><p>Hence, option d is correct.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>If the four-digit number 463y is divisible by 7, then what is the value of y?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2330;&#2366;&#2352; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 463y, 7 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; y &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>If a number is divisible by 7, then the difference between twice the unit digit and the remaining part of the number should be 0 or multiple of 7.</p><p>Option (a)  -  463 - 2*4 = 463  -  8 = 455 = 7*65</p><p>Hence, y = 4</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Find the remainder, if 19<sup>200</sup> is divided by 20.</p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; 19<sup>200</sup> &#2325;&#2379; 20 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">-1</span><span class=\"hqt\" style=\"display:none\">-1</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>We are given a = 19 and n = 20. Since 19 and 20 are coprime (gcd(19, 20) = 1), Euler's Theorem can be applied.</p><p>First, we calculate &#966;(20):</p><p>20 can be factored as 20 = 2&#178;  X  5, so:</p><p>&#966;(20) = 20  X  (1 - 1/2)  X  (1 - 1/5) = 20  X  1/2  X  4/5 = 8</p><p>According to Euler's Theorem, we know:</p><p>19<sup>8</sup> &#8801; 1 (mod 20).</p><p>Now, we want to calculate 19<sup>200</sup> mod 20. We can write 200 as a multiple of 8 plus a remainder:</p><p>200 = 8  X  25, so:</p><p>19<sup>200</sup> = (19<sup>8</sup>)<sup>25</sup>.</p><p>Since 19<sup>8</sup> &#8801; 1 (mod 20), we have:</p><p>19<sup>200</sup> = (1)<sup>25</sup> &#8801; 1 (mod 20).</p>",

    "question": "<span class=\"eqt\"><p>If m is even, then (8<sup>m</sup>  -  1) is divisible by:</p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; m &#2360;&#2350; &#2361;&#2376;, &#2340;&#2379; (8<sup>m</sup> - 1) &#2344;&#2367;&#2350;&#2381;&#2344; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;:</span>",
