    <script>
        const questions = [
  {
    "comp": "<span class=\"eqt\"><p><b>Directions:</b> Study the data carefully and answer the following question.</p><p>Below pie chart shows the percentage distribution of employees who were hired by a company from 2012 to 2016:</p><p>Total number of employees who hired by the company from 2012 to 2016 = 8000</p><p><img width=480 height=288 id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18825/image007.png\"></p><p>Below pie chart shows the break-up (in degree) of male employees who were hired by the company from 2012 to 2016:</p><p>Total number of males employees who hired by the company from 2012 to 2016 = 5400</p><p><img width=480 height=288 id=\"Chart 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18825/image008.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;:</b> &#2337;&#2375;&#2335;&#2366; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; 2012 &#2360;&#2375; 2016 &#2340;&#2325; &#2319;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;:</p><p>2012 &#2360;&#2375; 2016 &#2340;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = 8000</p><p><img width=480 height=288 id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18825/image007.png\"></p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; 2012 &#2360;&#2375; 2016 &#2340;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2346;&#2369;&#2352;&#2369;&#2359; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2348;&#2381;&#2352;&#2375;&#2325;-&#2309;&#2346; (&#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2350;&#2375;&#2306;) &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;:</p><p>2012 &#2360;&#2375; 2016 &#2340;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2346;&#2369;&#2352;&#2369;&#2359; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = 5400</p><p><img width=480 height=288 id=\"&#2330;&#2366;&#2352;&#2381;&#2335; 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18825/image008.png\"></p></span>",
    "question": "<span class=\"eqt\"><p>24% and 36% employees who were hired by the company in 2013 are from IT and HR departments, respectively, then how many employees who hired by the company in 2013 are from other than IT and HR departments?</p></span><span class=\"hqt\" style=\"display:none\"><p>2013 &#2350;&#2375;&#2306; &#2325;&#2306;&#2346;&#2344;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2319; &#2327;&#2319; 24% &#2324;&#2352; 36% &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2368; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2310;&#2312;&#2335;&#2368; &#2324;&#2352; &#2319;&#2330;&#2310;&#2352; &#2357;&#2367;&#2349;&#2366;&#2327;&#2379;&#2306; &#2360;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; 2013 &#2350;&#2375;&#2306; &#2325;&#2306;&#2346;&#2344;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2319; &#2327;&#2319; &#2325;&#2367;&#2340;&#2344;&#2375; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2368; &#2310;&#2312;&#2335;&#2368; &#2324;&#2352; &#2319;&#2330;&#2310;&#2352; &#2357;&#2367;&#2349;&#2366;&#2327;&#2379;&#2306; &#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366; &#2309;&#2344;&#2381;&#2351; &#2357;&#2367;&#2349;&#2366;&#2327;&#2379;&#2306; &#2360;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">344</span><span class=\"hqt\" style=\"display:none\">344</span>",
      "<span class=\"eqt\">324</span><span class=\"hqt\" style=\"display:none\">324</span>",
      "<span class=\"eqt\">384</span><span class=\"hqt\" style=\"display:none\">384</span>",
      "<span class=\"eqt\">354</span><span class=\"hqt\" style=\"display:none\">354</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Number of employees hired in 2012 = 8000 * 20/100 = 1600</p><p>Number of male employees hired in 2012 = 5400 * 72/360 = 1080</p><p>So, number of female employees hired in 2012 = 1600  -  1080 = 520 </p><p>Similarly, calculating the remaining data: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Total</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Male</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Female</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2012</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1600</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1080</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">520</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2013</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">960</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">675</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">285</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2014</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2240</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1620</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">620</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2015</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1200</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">900</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">300</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2016</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2000</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1125</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">875</td></tr></table><br><p>The number of employees who were hired by the company in 2013 are from other than IT and HR departments = 960 * (100  -  24  -  36)/100 = 384</p>",
    "question_index": 0
  },
  {
    "comp": "<span class=\"eqt\"><p><b>Directions:</b> The following pie charts show the distribution (percentage wise) of students who have given different exams from institutes A and B.</p><p>Total number of students who have given exams from institute A and B are 1800 and 1600 respectively.</p><p><img width=369 height=336 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18870/image002.png\"><img width=359 height=336 id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18870/image003.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;:</b> &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344; A &#2324;&#2352; B &#2360;&#2375; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2342;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2340;&#2352;&#2339; (&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;) &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344; A &#2324;&#2352; B &#2360;&#2375; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2342;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 1800 &#2324;&#2352; 1600 &#2361;&#2376;&#2404;</p><p><img width=369 height=336 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18870/image002.png\"><img width=359 height=336 id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18870/image003.png\"></p></span>",
    "question": "<span class=\"eqt\"><p>Number of students who have given CHSL exam from institute A are what percentage of number of students who have given CPO exam from institute B?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344; A &#2360;&#2375; CHSL &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2342;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344; B &#2360;&#2375; CPO &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2342;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">113.25%</span><span class=\"hqt\" style=\"display:none\">113.25%</span>",
      "<span class=\"eqt\">127.5%</span><span class=\"hqt\" style=\"display:none\">127.5%</span>",
      "<span class=\"eqt\">118.75%</span><span class=\"hqt\" style=\"display:none\">118.75%</span>",
      "<span class=\"eqt\">124.5%</span><span class=\"hqt\" style=\"display:none\">124.5%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Number of students who have given CHSL exam from institute A = 1800 * 17/100 = 18 * 17</p><p>Number of students who have given CPO exam from institute B = 1600 * 15/100 = 16 * 15</p><p>Required% = (18 * 17) * 100/ (16 * 15) = 1275/10 = 127.5%</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The pie chart 1 shows the percentage distribution of number of men who visited 5 shops in a day. The pie chart 2 shows the percentage distribution of total number of women who visited 5 shops in a day.</p><p>Total number of men who visited 5 shops in a day = 2500</p><p>Total number of women who visited 5 shops in a day = 1000</p><p><img width=509 height=379 id=\"Chart 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20812/image011.png\"></p><p><img width=513 height=379 id=\"Chart 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20812/image012.png\"></p><p>Total number of men who visited shop A, B and C in a day is approximately what percent of total number of women who visited shop C, D and E in a day (Correct to two decimal places)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; 1 &#2319;&#2325; &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; 5 &#2342;&#2369;&#2325;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; 2 &#2319;&#2325; &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; 5 &#2342;&#2369;&#2325;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2319;&#2325; &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; 5 &#2342;&#2369;&#2325;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = 2500</p><p>&#2319;&#2325; &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; 5 &#2342;&#2369;&#2325;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = 1000</p><p><img width=509 height=379 id=\"Chart 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20812/image011.png\"></p><p><img width=513 height=379 id=\"Chart 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20812/image012.png\"></p><p>&#2319;&#2325; &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2342;&#2369;&#2325;&#2366;&#2344; A, B &#2324;&#2352; C &#2346;&#2352; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2319;&#2325; &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2342;&#2369;&#2325;&#2366;&#2344; C, D &#2324;&#2352; E &#2346;&#2352; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2354;&#2327;&#2349;&#2327; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376; (&#2342;&#2379; &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2340;&#2325; &#2360;&#2361;&#2368;)?</p></span>",
    "options": [
      "<span class=\"eqt\">179.77%</span><span class=\"hqt\" style=\"display:none\">179.77%</span>",
      "<span class=\"eqt\">334.33%</span><span class=\"hqt\" style=\"display:none\">334.33%</span>",
      "<span class=\"eqt\">214.29%</span><span class=\"hqt\" style=\"display:none\">214.29%</span>",
      "<span class=\"eqt\">126.46%</span><span class=\"hqt\" style=\"display:none\">126.46%</span>"
    ],
    "correct_option_id": 2,

    "comp": "<span class=\"eqt\"><p><b>Directions:</b></p><p>Following graph shows the percentage of people likes different cold drinks out of total number of people likes cold drinks from a village.</p><p><img width=576 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3683/image001.png\"></p><p>The Total Population = The number of persons who like cold drink + the number of persons who do not like cold drink</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; [4 &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2350;&#2370;&#2361;]:</b></p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2352;&#2375;&#2326; &#2319;&#2325; &#2327;&#2366;&#2305;&#2357; &#2325;&#2375; &#2325;&#2379;&#2354;&#2381;&#2337; &#2337;&#2381;&#2352;&#2367;&#2306;&#2325; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2360;&#2375; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2379;&#2354;&#2381;&#2337; &#2337;&#2381;&#2352;&#2367;&#2306;&#2325; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;|</p><p><img width=\"576\" height=\"336\" id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3683/image001.png\"></p><p>&#2325;&#2369;&#2354; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = &#2325;&#2379;&#2354;&#2381;&#2337; &#2337;&#2381;&#2352;&#2367;&#2306;&#2325; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#230     "question": "<span class=\"eqt\"><p>If 20% people do not like any cold drinks and 640 people like Sprite, then how many people do not like any cold drink?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 20% &#2354;&#2379;&#2327; &#2325;&#2379;&#2312; &#2349;&#2368; &#2325;&#2379;&#2354;&#2381;&#2337; &#2337;&#2381;&#2352;&#2367;&#2306;&#2325; &#2346;&#2360;&#2306;&#2342; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; 640 &#2354;&#2379;&#2327; &#2360;&#2381;&#2346;&#2381;&#2352;&#2366;&#2311;&#2335; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2354;&#2379;&#2327; &#2325;&#2379;&#2312; &#2349;&#2368; &#2325;&#2379;&#2354;&#2381;&#2337; &#2337;&#2381;&#2352;&#2367;&#2306;&#2325; &#2346;&#2360;&#2306;&#2342; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",

      "<span class=\"eqt\">1500</span><span class=\"hqt\" style=\"display:none\">1500</span>",
      "<span class=\"eqt\">Other than above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2360;&#2375; &#2309;&#2344;&#2381;&#2351;</span>"

    "comp": "<span class=\"eqt\"><p><b>Directions:</b>Read the data carefully and answer the following questions.</p><p>Following pie chart shows the degree distribution of marks obtained by a student in 7 different subjects. Total marks obtained by him in all the 7 subjects together is 3240.</p><p><img width=480 height=288 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12160/image002.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;: </b>&#2310;&#2306;&#2325;&#2396;&#2379;&#2306; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340; &#2310;&#2352;&#2375;&#2326; &#2319;&#2325; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 7 &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2357;&#2367;&#2359;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2366;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2349;&#2368; 7 &#2357;&#2367;&#2359;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2366;&#2306;&#2325; 3240 &#2361;&#2376;&#2404;</p><p><img width=\"480\" height=\"288\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12160/image002.png\"></p></span>",

    "comp": "<span class=\"eqt\"><p><b>Directions [Set of 4 Questions]: </b> The Pie chart given below shows the percent distribution of the number of students that participate in an event from five different classes A, B, C, D and E out of total students that participate in the event.</p><p>Total number of students who participated in the event from five classes together = 180</p><p><img width=453 height=336 id=\"Chart 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8601/image003.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; [4 &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2350;&#2370;&#2361;]: </b>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2349;&#2366;&#2327; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2325;&#2369;&#2354; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2366;&#2305;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2325;&#2325;&#2381;&#2359;&#2366;&#2323;&#2306; A, B, C, D &#2324;&#2352; E &#2360;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2349;&#2366;&#2327; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2346;&#2366;&#2305;&#2330; &#2325;&#2325;&#2381;&#2359;     "question": "<span class=\"eqt\"><p>What is the respective ratio of the average number of students that participated from classes A and E together to the average number of students that participated from classes B, C and D together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325;-&#2360;&#2366;&#2341; &#2325;&#2325;&#2381;&#2359;&#2366; A &#2324;&#2352; E &#2360;&#2375; &#2349;&#2366;&#2327; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2340;&#2341;&#2366; &#2319;&#2325;-&#2360;&#2366;&#2341; &#2325;&#2325;&#2381;&#2359;&#2366; B, C &#2324;&#2352; D &#2360;&#2375; &#2349;&#2366;&#2327; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2360;&#2350;&#2381;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;?</p></span>",

    "correct_option_id": 2,
    "solution": "<p>Table given below shows the number of students from different classes who participated in the event:</p><p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Classes</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Number of students that participated in the event</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>A</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">25% of 180 = 45</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>B</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30% of 180 = 54</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>C</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15% of 180 = 27</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>D</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">10% of 180 = 18</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>E</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20% of 180 = 36</td></tr></table></p><br><p>Average number of students that participated from classes A and E together = (45 + 36)/2 = 40.5</p><p>Average number of students that participated from classes B, C and D together = (54 + 27 + 18)/3 = 33</p><p>Required ratio = 40.5: 33 = 27: 22</p>",

    "comp": "<span class=\"eqt\"><p><b>Directions : </b>Study the data carefully and answer the following questions.</p><p>The below pie chart shows the number of people participated from five district of UP in plantation campaign.</p><p>Total number of people participated in plantation campaign = 450000</p><p><img width=491 height=336 id=\"Chart 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p6839/image001.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; : </b>&#2310;&#2305;&#2325;&#2396;&#2379;&#2306; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2350;&#2375;&#2306; UP &#2325;&#2375; &#2346;&#2366;&#2305;&#2330; &#2332;&#2367;&#2354;&#2379;&#2306; &#2360;&#2375; &#2357;&#2371;&#2325;&#2381;&#2359;&#2366;&#2352;&#2379;&#2346;&#2339; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; &#2350;&#2375;&#2306; &#2349;&#2366;&#2327; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2357;&#2371;&#2325;&#2381;&#2359;&#2366;&#2352;&#2379;&#2346;&#2339; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; &#2350;&#2375;&#2306; &#2349;&#2366;&#2327; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;     "question": "<span class=\"eqt\"><p>Following first pie-chart represents the percentage break-up of the number of employees in company P, Q, R, S and T; and the second pie-chart represents the percentage break-up of the number of male employees in company P, Q, R, S and T.</p><p>Total number of employees in company P, Q, R, S and T together = 5500</p><p><img width=420 height=296 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16898/image008.png\"></p><p>Number of male employees in company P, Q, R, S and T together = 3500</p><p><img width=422 height=310 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16898/image009.png\"></p><p>In which of the following companies, the number of female employees is a multiple of 15?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2361;&#2354;&#2366; &#2357;&#2371;&#2340;&#2368;&#2351;-&#2310;&#2352;&#2375;&#2326; &#2325;&#2306;&#2346;&#2344;&#2368; P, Q, R, S &#2324;&#2352; T &#2350;&#2375;&#2306; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2342;&#2370;&#2360;&#2352;&#2366; &#2357;&#2371;&#2340;&#2368;&#2351;-&#2310;&#2352;&#2375;&#2326; &#2325;&#2306;&#2346;&#2344;&#2368; P, Q, R, S &#2324;&#2352; T &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2319;&#2325; &#2360;&#236 </td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1210</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">910</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">300 (multiple of 15)</td></tr></table><p>Hence, the number of female employees in company S and T is a multiple of 15.</p>",

    "question": "<span class=\"eqt\"><p>The following pie chart shows the degree distribution of number of marbles five children named as A, B, C, D and E have.</p><p><img width=332 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p17287/image009.png\"></p><p>B lost 20% of his total marbles, D lost 30% of his total marbles, and E, lost 1/4<sup>th</sup> of his total marbles. C bought 25% more than his total marbles and A gave 40% of his total marbles to E. If D lost 2/5<sup>th</sup> of his remaining marbles, then the central angle (to the nearest degree) of the sector corresponding to child C in the pie chart will become:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351;-&#2310;&#2352;&#2375;&#2326; A, B, C, D &#2324;&#2352; E &#2344;&#2366;&#2350; &#2325;&#2375; &#2346;&#2366;&#2305;&#2330; &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2375; &#2325;&#2306;&#2330;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2357;&#2367;&#2340;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"332\" height=\"336\" id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p17287/image009.png\"></p><p>B &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2325;&#2369;&#2354; &#2325;&#2306;&#2330;&#2379;&#2306; &#2325;&#2366; 20% &#2326;&#2379; &#2342;&#2367;&#2351;&#2366;, D &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2325;&#2369;&#2354; &#2325;&#2306;&#2330;&#2379;&#2306; &#2325;&#2366; 30% &#2326;&#2379; &#2342;&#2367;&#2351;&#2366; &#2324;&#2352; E &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2325;&#2369;&#2354; &#2325;&#2306;&#2330;&#2379;&#2306; &#2325;&#2366; 1/4 &#2349;&#2366;&#2327; &#2326;&#2379; &#2342;&#2367;&#2351;&#2366;&#2404; C &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2325;&#2369;&#2354; &#2325;&#2306;&#2330;&#2379;&#2306; &#2360;&#2375; 25% &#2309;&#2343;&#2367;&#2325; &#2326;&#2352;&#2368;&#2342;&#2366; &#2324;&#2352; A &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2325;&#2369;&#2354; &#2325;&#2306;&#2330;&#2379;&#2306; &#2325;&#2366; 40%, E &#2325;&#2379; &#2342;&#2375; &#2342;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; D &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2358;&#2375;&#2359; &#2325;&#2306;&#2330;&#2379;&#2306; &#2325;&#2366; 2/5 &#2349;&#2366;&#2327; &#2326;&#2379; &#2342;&#2367;&#2351;&#2366;, &#2340;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2350;&#2375;&#2306; &#2348;&#2330;&#2381;&#2330;&#2375; C &#2325;&#2375; &#2360;&#2306;&#2327;&#2340; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2326;&#2306;&#2337; &#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2325;&#2379;&#2339; (&#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2340;&#2325;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2348;&#2344; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">113</span><span class=\"hqt\" style=\"display:none\">113</span>",
      "<span class=\"eqt\">120</span><span class=\"hqt\" style=\"display:none\">120</span>",
      "<span class=\"eqt\">104</span><span class=\"hqt\" style=\"display:none\">104</span>",
      "<span class=\"eqt\">95</span><span class=\"hqt\" style=\"display:none\">95</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the total number of marbles all children together have initially = 360</p><p>Number of marbles A has after giving 40% to E = 90 * 60/100 = 54</p><p>Number of marbles B has after losing 20% of his total marbles = 60 * 80/100 = 48</p><p>Number of marbles C has after buying 25% more = 80 * 125/100 = 100</p><p>Number of marbles D has after losing 30% of his total = 50 * 70/100 = 35</p><p>Number of marbles D has after losing 2/5<sup>th</sup> of 35 = 35 * 3/5 = 21</p><p>Number of marbles E has after losing 1/4<sup>th</sup> of his total = 80 * 3/4 = 60</p><p>Number of marbles E has after receiving 36 marbles from A = 60 + 36 = 96</p><p>Required angle = 100 * 360/319 = 112.8 = 113&deg;</p>",
    "question_index": 10
  },

    "question": "<span class=\"eqt\"><p>Study the data carefully and answer the following question:</p><p>The below pie charts show the percentage distribution of students who play five different sports (Soccer, Golf, Swimming, Boxing, and Karate) from two states (Maharashtra and Gujrat):</p><p><img width=437 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12070/image002.png\"></p><p><img width=425 height=336 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12070/image003.png\"></p><p>If number of students who play Golf from Maharashtra and Gujrat are 12000 and 1920, respectively, then what is the ratio of number of students who play boxing and soccer together from Maharashtra to the number of students who play swimming and Karate together from Gujrat?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2305;&#2325;&#2396;&#2379;&#2306; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;:</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351;-&#2310;&#2352;&#2375;&#2326; &#2342;&#2379; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; (&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2324;&#2352; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340;) &#2360;&#2375; &#2346;&#2366;&#2305;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2326;&#2375;&#2354; (&#2360;&#2377;&#2325;&#2352;, &#2327;&#2379;&#2354;&#2381;&#2347;, &#2340;&#2376;&#2352;&#2366;&#2325;&#2368;, &#2350;&#2369;&#2325;&#2381;&#2325;&#2375;&#2348;&#2366;&#2332;&#2368; &#2324;&#2352; &#2325;&#2352;&#2366;&#2335;&#2375;) &#2326;&#2375;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;:</p><p><img width=\"437\" height=\"336\" id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12070/image002.png\"></p><p><img width=\"425\" height=\"336\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12070/image003.png\"></p><p>&#2351;&#2342;&#2367; &#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2324;&#2352; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2360;&#2375; &#2327;&#2379;&#2354;&#2381;&#2347; &#2326;&#2375;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 12000 &#2324;&#2352; 1920 &#2361;&#2376;, &#2340;&#2379; &#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2360;&#2375; &#2319;&#2325; &#2360;&#2366;&#2341; &#2348;&#2377;&#2325;&#2381;&#2360;&#2367;&#2306;&#2327; &#2324;&#2352; &#2360;&#2377;&#2325;&#2352; &#2326;&#2375;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2340;&#2341;&#2366; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2360;&#2375; &#2319;&#2325; &#2360;&#2366;&#2341; &#2340;&#2376;&#2352;&#2366;&#2325;&#2368; &#2324;&#2352; &#2325;&#2352;&#2366;&#2335;&#2375; &#2326;&#2375;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2: 5</span><span class=\"hqt\" style=\"display:none\">2: 5</span>",
      "<span class=\"eqt\">3: 2</span><span class=\"hqt\" style=\"display:none\">3: 2</span>",
      "<span class=\"eqt\">3: 1</span><span class=\"hqt\" style=\"display:none\">3: 1</span>",
      "<span class=\"eqt\">5: 3</span><span class=\"hqt\" style=\"display:none\">5: 3</span>"

    "correct_option_id": 2,
    "solution": "<p>Total number of students from Maharashtra = 12000 * 100/25 = 48000</p><p>Total number of students from Gujrat = 1920 * 100/15 = 12800</p><p>So, required ratio = (48000 * (20 + 12)/100): (12800 * (30 + 10)/100) = 3: 1</p>",

    "question": "<span class=\"eqt\"><p>The following pie chart shows the percentage distribution of number of candidates who appeared in five exams- A, B, C, D and E. Total number of candidates are 25000.</p><p>Total number of candidates appeared = Selected candidates + Non- selected candidates</p><p><img width=576 height=336 id=\"Chart 19\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20650/image019.png\"></p><p>The ratio of selected and non-selected candidate for exam C is 4:5 respectively then how many candidates are selected in exam C?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2346;&#2366;&#2305;&#2330; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366;- A, B, C, D &#2324;&#2352; E &#2350;&#2375;&#2306; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2349;&#2381;&#2351;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2309;&#2349;&#2381;&#2351;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 25000 &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2349;&#2381;&#2351;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = &#2330;&#2351;&#2344;&#2367;&#2340; &#2309;&#2349;&#2381;&#2351;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; + &#2330;&#2351;&#2344;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2349;&#2381;&#2351;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</p><p><img width=\"576\" height=\"336\" id=\"Chart 19\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20650/image019.png\"></p><p>&#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; C &#2350;&#2375;&#2306; &#2330;&#2351;&#2344;&#2367;&#2340; &#2324;&#2352; &#2330;&#2351;&#2344;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2349;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 4:5 &#2361;&#2376;, &#2340;&#2379; &#2351;&#2361; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; C &#2350;&#2375;&#2306; &#2330;&#2351;&#2344;&#2367;&#2340; &#2309;&#2349;&#2381;&#2351;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>The following pie chart shows the percentage distribution of number of students enrolled in different universities. Total number of students enrolled in all the universities together is 2.5 lakhs.</p><p><img width=576 height=336 id=\"Chart 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20650/image022.png\"></p><p>Find the ratio of average number of students enrolled DU and BHU together to average number of students enrolled IIT and JNU together.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2349;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 2.5 &#2354;&#2366;&#2326; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20650/image022.png\"></p><p>&#2319;&#2325; &#2360;&#2366;&#2341; DU &#2324;&#2352; BHU &#2350;&#2375;&#2306; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2324;&#     "question": "<span class=\"eqt\"><p>Study the following information carefully and answer the related questions.</p><p>Following pie-chart represents the percentage break-up of sales of watches in a store from Monday to Saturday. </p><p>Total sale of watches in the store from Monday to Sunday = 13880</p><p><img width=507 height=281 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16840/image001.png\"></p><p>If 2880 watches sold on Sunday, then what is the difference between the average sale of watches from Monday to Tuesday and the average sale of watches from Thursday to Saturday? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2370;&#2330;&#2344;&#2366; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2360;&#2375; &#2358;&#2344;&#2367;&#2357;&#2366;&#2352; &#2340;&#2325; &#2319;&#2325; &#2360;&#2381;&#2335;&#2379;&#2352; &#2350;&#2375;&#2306; &#2328;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2360;&#2375; &#2352;&#2357;&#2367;&#2357;&#2366;&#2352; &#2340;&#2325; &#2360;&#2381;&#2335;&#2379;&#2352; &#2350;&#2375;&#2306; &#2328;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; = 13880</p><p><img width=\"507\" height=\"281\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16840/image001.png\"></p><p>&#2351;&#2342;&#2367; &#2352;&#2357;&#2367;&#2357;&#2366;&#2352; &#2325;&#2379; 2880 &#2328;&#2337;&#2364;&#2367;&#2351;&#2366;&#2305; &#2348;&#2375;&#2330;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2360;&#2375; &#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352; &#2340;&#2325; &#2328;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2324;&#2352; &#2327;&#2369;&#2352;&#2369;&#2357;&#2366;&#2352; &#2360;&#2375; &#2358;&#2344;&#2367;&#2357;&#2366;&#2352; &#2340;&#2325; &#2328;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
