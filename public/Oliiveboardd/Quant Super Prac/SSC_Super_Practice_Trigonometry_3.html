    <script>

  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">2 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">90 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Naman borrows a sum of &#8377;3,48,020 at the rate of 8% per annum simple interest. At the end of the first year, he repays &#8377;15,090 towards return of principal amount borrowed. If Naman clears all pending dues at the end of the second year,Including interest payment that accrued during the first year, how much does he pay (in &#8377;) at the end of the second year?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2350;&#2344; 8% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 3,48,020 &#2352;&#2369;&#2346;&#2351;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2361;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306;, &#2357;&#2361; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368; &#2327;&#2312; &#2350;&#2370;&#2354; &#2352;&#2366;&#2358;&#2367; &#2325;&#2375; &#2348;&#2342;&#2354;&#2375; 15,090 &#2352;&#2369;&#2346;&#2351;&#2375; &#2330;&#2369;&#2325;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2344;&#2350;&#2344; &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2354;&#2306;&#2348;&#2367;&#2340; &#2348;&#2325;&#2366;&#2351;&#2366; &#2330;&#2369;&#2325;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2348;&#2381;&#2351;&#2366;&#2332; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2349;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; (&le; &#2350;&#2375;&#2306;) &#2325;&#2352;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</span>",

    "correct_option_id": 1,
    "solution": "<p>For 1<sup>st</sup> year:-</p><p>SI<sub>1</sub> = (3,48,020  X  8  X  1)/(100)</p><p>SI<sub>1</sub> = Rs . 27,841.6</p><p>Now after first year principal remianing:-</p><p>Rs. 3,48,020  -  Rs.15,090</p><p>Remaining Principal = Rs .3,32,930</p><p>Now for 2<sup>nd</sup> year interest:-</p><p>SI<sub>2</sub> = (3,32,930  X  8  X  1)/(100)</p><p>SI<sub>2</sub> = Rs.26,634.4</p><p>Total interest = SI<sub>1</sub> + SI<sub>2</sub> = Rs.27,841.6 + Rs.26,634.4</p><p>Total SI = Rs.54,476</p><p>Now total amount to be paid at the end of 2<sup>nd</sup> year:- </p><p>Total Amount = Rs3,32,930 + Rs54,476 = Rs.3,87,406</p><p>Option (b) is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">5 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Find the amount (integral value only) if a sum of &#8377;6,500 is being borrowed at 10% interest per annum for 2 years if interest is compounded half-yearly.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#8377;6,500 &#2325;&#2368; &#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 10% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; 2 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2340;&#2341;&#2366; &#2351;&#2342;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2309;&#2352;&#2381;&#2343;-&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2344; (&#2325;&#2375;&#2357;&#2354; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;&#2367;&#2340; &#2350;&#2366;&#2344;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

    "correct_option_id": 1,
    "solution": "<p>Amount = P[1+R/200]<sup>2n</sup></p><p>= 6500 * [1 + 10/200]<sup>2*2</sup></p><p>= 6500 * [1 + 1/20]<sup>4</sup></p><p>= 6500 * [21/20]<sup>4</sup></p><p>= 65 *194481/1600</p><p>= &#8377;7900</p>",
    "question_index": 1

  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">5 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Sohan borrows a sum of &#8377;1,41,545 at the rate of 11% per annum simple interest. At the end of the first year, he repays &#8377;25,490 towards return of principal amount borrowed. If Sohan clears all pending dues at the end of the second year, Including interest payment that accrued during the first year, how much does he pay (in &#8377;) at the end of the second year?</p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2361;&#2344; 11% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 1,41,545 &#2352;&#2369;&#2346;&#2351;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2361;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306;, &#2357;&#2361; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368; &#2327;&#2312; &#2350;&#2370;&#2354; &#2352;&#2366;&#2358;&#2367; &#2325;&#2375; &#2348;&#2342;&#2354;&#2375; 25,490 &#2352;&#2369;&#2346;&#2351;&#2375; &#2330;&#2369;&#2325;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2379;&#2361;&#2344; &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2354;&#2306;&#2348;&#2367;&#2340; &#2348;&#2325;&#2366;&#2351;&#2366; &#2330;&#2369;&#2325;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2348;&#2381;&#2351;&#2366;&#2332; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2349;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366; (&#8377; &#2350;&#2375;&#2306;)?</span>",

      "<span class=\"eqt\">1,37,407</span><span class=\"hqt\" style=\"display:none\">1,37,407</span>"

    "correct_option_id": 0,
    "solution": "<p>For 1<sup>st</sup> year,</p><p>P = Rs. 141545, R = 11%, T = 1 year</p><p>SI = (P * R * T)/100</p><p>=&gt; (141545 * 11 * 1)/100 = Rs. 15569.95</p><p>For 2<sup>nd</sup> year, </p><p>P = 141545  -  25490 = Rs. 116055</p><p>R = 11%</p><p>T = 1 year</p><p>SI = (116055 * 11 * 1)/100 = Rs. 12766.05</p><p>SI for 1<sup>st</sup> year and 2<sup>nd</sup> year = 15569.95+ 12766.05 = Rs. 28336</p><p>Second year pay = Principal + SI </p><p>=&gt; 116055 + 28336 = Rs. 144391</p>",

  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">4 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Aman borrows a sum of &#8377;192208 at the rate of 15% per annum simple interest. At the end of the first year, he repays &#8377;20196 towards return of principal amount borrowed. If Aman clears all pending dues at the end of the second year, including interest payment that accrued during the first year, how much does he pay (in &#8377;) at the end of the second year?</p></span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2344; 15% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#8377;192208 &#2325;&#2368; &#2352;&#2366;&#2358;&#2367; &#2313;&#2343;&#2366;&#2352; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2361;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306;, &#2357;&#2361; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368; &#2327;&#2312; &#2350;&#2370;&#2354; &#2352;&#2366;&#2358;&#2367; &#2325;&#2368; &#2357;&#2366;&#2346;&#2360;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;20196 &#2330;&#2369;&#2325;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2309;&#2350;&#2344; &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2354;&#2306;&#2348;&#2367;&#2340; &#2348;&#2325;&#2366;&#2351;&#2366; &#2330;&#2369;&#2325;&#2366; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2348;&#2381;&#2351;&#2366;&#2332; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2349;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; (&#8377; &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</span>",

    "solution": "<p>For 1<sup>st</sup> year,</p><p>P = Rs. 192208, R = 15%, T = 1 year</p><p>SI = (P * R * T)/100</p><p>=&gt; (192208 * 15 * 1)/100 = Rs. 28831.2</p><p>For 2<sup>nd</sup> year,</p><p>P = 192208  -  20196 = Rs. 172012</p><p>R = 15%</p><p>T = 1 year</p><p>SI = (172012 * 15 * 1)/100 = Rs. 25801.8</p><p>SI for 1<sup>st</sup> year and 2<sup>nd</sup> year = 28831.2 + 25801.8 = Rs. 54633</p><p>Second year pay = Principal + SI</p><p>=&gt; 172012 + 54633 = Rs. 226645</p>",

  {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">6 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>Damani purchased an item costing &#8377;7,500 and paid &#8377;3,500 as a down payment for the same. If the simple interest charged for the remaining amount is 9% per annum and Damani cleared all dues after 4 months of the purchase, how much did Damani pay after 4 months as interest?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2350;&#2366;&#2344;&#2368; &#2344;&#2375; &#8377;7,500 &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2326;&#2352;&#2368;&#2342;&#2368; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2354;&#2367;&#2319; &#8377;3,500 &#2325;&#2366; &#2340;&#2340;&#2381;&#2325;&#2366;&#2354; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2342;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2358;&#2375;&#2359; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; 9% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2361;&#2376; &#2324;&#2352; &#2342;&#2350;&#2366;&#2344;&#2368; &#2344;&#2375; &#2326;&#2352;&#2368;&#2342; &#2325;&#2375; 4 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342; &#2360;&#2349;&#2368; &#2342;&#2375;&#2351; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;, &#2340;&#2379; &#2342;&#23   {
    "question": "<div class=\"status-sec\"><table class=\"table-status\"><tbody><tr><td class=\"noborder\"></td><td class=\"noborder txt-black\">Time</td><td class=\"noborder txt-black\">Status</td></tr><tr><td class=\"txt-black bg-blue\">You</td><td class=\"txt-muted\">0 sec</td><td><span class=\"tst-status status-unat\">Unattempted</span></td></tr><tr><td class=\"txt-black bg-blue\">Topper</td><td class=\"txt-muted\">5 sec</td><td><span class=\"tst-status status-correct\">Correct</span></td></tr></tbody></table></div><span class=\"eqt\"><p>A clock is sold for &#8377;550 cash or in the instalment scheme, for &#8377;250 cash down payment and &#8377;310 after one month. Find the rate of interest charged in the instalment scheme.</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2328;&#2337;&#2364;&#2368; 550 &#2352;&#2369;&#2346;&#2351;&#2375; &#2344;&#2325;&#2342; &#2351;&#2366; &#2325;&#2367;&#2358;&#2381;&#2340; &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, 250 &#2352;&#2369;&#2346;&#2351;&#2375; &#2344;&#2325;&#2342; &#2309;&#2327;&#2381;&#2352;&#2367;&#2350; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2324;&#2352; &#2319;&#2325; &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342; 310 &#2352;&#2369;&#2346;&#2351;&#2375;&#2404; &#2325;&#2367;&#2358;&#2381;&#2340; &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2375;&#2306; &#2354;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",

    "solution": "<p>Cash price = &#8377;550. </p><p>Instalment total = &#8377;250 (down payment) + &#8377;310 (after 1 month) = &#8377;560. </p><p>Extra amount paid = &#8377;560 - &#8377;550 = &#8377;10 (this is the interest). </p><p>Principal for interest is the remaining amount after down payment: &#8377;550 - &#8377;250 = &#8377;300. </p><p>Time = 1 month = 1/12 year. </p><p>Simple interest formula: I = PRT/100, where I = 10, P = 300, T = 1/12. </p><p>10 = (300  X  R  X  1/12) / 100. </p><p>10 = 300R / 1200. </p><p>10 = R / 4. </p><p>R = 40%. </p><p>Option (a) is the correct answer.</p>",
