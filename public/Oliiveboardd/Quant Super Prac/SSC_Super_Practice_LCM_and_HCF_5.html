<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>a, b, c and 23 are four distinct numbers and the HCF of each pair of numbers (23, a), (23, b), (23, c) is 23 where a, b, c are each less than 95 and a &lt; b &lt; c. What is the value of (b * c + a)/2?</p></span><span class=\"hqt\" style=\"display:none\"><p>a, b, c &#2324;&#2352; 23 &#2330;&#2366;&#2352; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306; &#2324;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2332;&#2379;&#2337;&#2364;&#2375; (23, a), (23, b), (23, c) &#2325;&#2366; HCF 23 &#2361;&#2376; &#2332;&#2361;&#2366;&#2305; a, b, c &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; 95 &#2360;&#2375; &#2325;&#2350; &#2361;&#2376;&#2306; &#2324;&#2352; a &lt; b &lt; c &#2361;&#2376;&#2404; (b * c + a)/2 &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3095</span><span class=\"hqt\" style=\"display:none\">3095</span>",
      "<span class=\"eqt\">3145</span><span class=\"hqt\" style=\"display:none\">3145</span>",
      "<span class=\"eqt\">3244</span><span class=\"hqt\" style=\"display:none\">3244</span>",
      "<span class=\"eqt\">3197</span><span class=\"hqt\" style=\"display:none\">3197</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The four distinct numbers are 23, a, b and c.</p><p>HCF is always the factor of the given numbers.</p><p>a, b, c should be multiple of 23 as the HCF is 23.</p><p>Only possible multiples of 23 are 2, 3 and 4.</p><p>a, b and c each are less than 95 and a < b < c.</p><p>So, a = 23 * 2 = 46</p><p>b = 23 * 3 = 69</p><p>c = 23 * 4 = 92</p><p>(b * c + a)/2 = (69 * 92 + 46)/2</p><p>= (6348 + 46)/2 = 6394/2 = 3197</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The sum and difference of LCM and HCF of two numbers are 146 and 38 respectively. If the sum of numbers is 154, then find the larger number.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; LCM &#2324;&#2352; HCF &#2325;&#2366; &#2351;&#2379;&#2327; &#2324;&#2352; &#2309;&#2306;&#2340;&#2352; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 146 &#2324;&#2352; 38 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 154 &#2361;&#2376;, &#2340;&#2379; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">112</span><span class=\"hqt\" style=\"display:none\">112</span>",
      "<span class=\"eqt\">42</span><span class=\"hqt\" style=\"display:none\">42</span>",
      "<span class=\"eqt\">46</span><span class=\"hqt\" style=\"display:none\">46</span>",
      "<span class=\"eqt\">108</span><span class=\"hqt\" style=\"display:none\">108</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>LCM + HCF = 146 ....... (i)</p><p>LCM  -  HCF = 38 ....... (ii)</p><p>From (i) and (ii), we get -</p><p>LCM = 92</p><p>HCF = 54</p><p>Let, the numbers be x and (154  -  x).</p><p>x * (154  -  x) = 92 * 54</p><p>=> 154x  -  x<sup>2</sup> = 4968</p><p>=> x<sup>2</sup>  -  154x + 4968 = 0</p><p>=> x<sup>2</sup>  -  (46 + 108)x + 4968 = 0</p><p>=> x = 46, 108</p><p>Larger number = 108</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Find the greatest number of five digits which is divisible by 12, 21, 15 and 30.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2305;&#2330; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; 12, 21, 15 &#2324;&#2352; 30 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">99960</span><span class=\"hqt\" style=\"display:none\">99960</span>",
      "<span class=\"eqt\">99860</span><span class=\"hqt\" style=\"display:none\">99860</span>",
      "<span class=\"eqt\">99940</span><span class=\"hqt\" style=\"display:none\">99940</span>",
      "<span class=\"eqt\">99950</span><span class=\"hqt\" style=\"display:none\">99950</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Greatest number of 5 digits = 99999</p><p>Required number must be divisible by LCM of (12, 21, 15 and 30) which is 420.</p><p>Dividing 99999 by 420, we get 39 as remainder.</p><p>Required number = (99999  -  39) = 99960</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Sum of two numbers is 260 and their highest common factor is 13. What is the maximum number of pairs that satisfy the condition?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 260 &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; 13 &#2361;&#2376;&#2404; &#2358;&#2352;&#2381;&#2340; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2332;&#2379;&#2337;&#2364;&#2379;&#2306; &#2325;&#2368; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let, the numbers are 13a and 13b.</p><p>According to question,</p><p>13a + 13b = 260</p><p>=> a + b = 20</p><p>Co-prime numbers with sum 20 are (1, 19), (3, 17), (7, 13), (9, 11).</p><p>Number of pairs = 4</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>HCF of two numbers each having three digits is 12 and their LCM is 1716. Find the difference of numbers.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2309;&#2306;&#2325;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; HCF 12 &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2366; LCM 1716 &#2361;&#2376;&#2404; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">28</span><span class=\"hqt\" style=\"display:none\">28</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let, the numbers be 12a and 12b.</p><p>12ab = 1716</p><p>=> ab = 143</p><p>Co-prime numbers with product 143 are (11, 13).</p><p>Numbers are (11 * 12 =) 132 and (13 * 12 =) 156.</p><p>Required difference = 156  -  132 = 24</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Find the greatest possible length which can be used to measure exactly the lengths 5m 25 cm, 8m 80 cm and 10 m.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2349;&#2357; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; 5 &#2350;&#2368;&#2335;&#2352; 25 &#2360;&#2375;&#2350;&#2368;, 8 &#2350;&#2368;&#2335;&#2352; 80 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 10 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2379; &#2350;&#2366;&#2346;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>5m 25 cm = 525 cm</p><p>8m 80 cm = 880 cm</p><p>10 m = 1000 cm</p><p>Required length = HCF of 525, 880 and 1000</p><p>Factors of 525 = 5<sup>2</sup> * 3 * 7</p><p>Factors of 880 = 2<sup>4</sup> * 5 * 11</p><p>Factors of 1000 = 2<sup>3</sup> * 5<sup>3</sup></p><p>HCF = 5</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find the largest number which divides 258, 314, and 356 and leaves same remainder in each case.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; 258, 314 &#2324;&#2352; 356 &#2325;&#2379; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2358;&#2375;&#2359; &#2331;&#2379;&#2337;&#2364;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Required number = HCF of (356  -  314), (356  -  258) and (314  -  258)</p><p>= HCF of (42, 98, 56)</p><p>42 = 7 * 3 * 2</p><p>98 = 2 * 7 * 7</p><p>56 = 7 * 2 * 2 * 2</p><p>HCF = 7 * 2 = 14</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Find the smallest five digit number which is divisible by 18, 25 and 33.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2306;&#2330; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; 18, 25 &#2324;&#2352; 33 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">14820</span><span class=\"hqt\" style=\"display:none\">14820</span>",
      "<span class=\"eqt\">13240</span><span class=\"hqt\" style=\"display:none\">13240</span>",
      "<span class=\"eqt\">13250</span><span class=\"hqt\" style=\"display:none\">13250</span>",
      "<span class=\"eqt\">14850</span><span class=\"hqt\" style=\"display:none\">14850</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Smallest 5-digit number = 10000</p><p>Required number must be divisible by LCM of (18, 25 and 33) which is 4950.</p><p>Dividing 10000 by 4950, we get 100 as remainder.</p><p>Required number = 10000 + (4950  -  100) = 14850</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>A shop contains 52 bats, 143 balls, and 104 gloves. The shopkeeper plans to arrange these items in rows in such a way that each row contains the same type of items and an equal number of items. What is the minimum number of rows required for this arrangement?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344; &#2350;&#2375;&#2306; 52 &#2348;&#2354;&#2381;&#2354;&#2375;, 143 &#2327;&#2375;&#2306;&#2342;&#2375;&#2306; &#2324;&#2352; 104 &#2342;&#2360;&#2381;&#2340;&#2366;&#2344;&#2375; &#2361;&#2376;&#2306;&#2404; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2311;&#2344; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2379; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2311;&#2360; &#2340;&#2352;&#2361; &#2360;&#2375; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2319;&#2325; &#2361;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2305; &#2324;&#2352; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2305; &#2361;&#2379;&#2306;&#2404; &#2311;&#2360; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total number of bats, balls and gloves in the shop are 52, 143 and 104 respectively.</p><p>HCF of 52, 143 and 104 = 13</p><p>Minimum number of rows required for this arrangement = (52 + 143 + 104)/13 = 23</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Find the HCF of 11/25, 12/35, 13/15 and 13/40.</p></span><span class=\"hqt\" style=\"display:none\"><p>11/25, 12/35, 13/15 &#2324;&#2352; 13/40 &#2325;&#2366; HCF &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
