<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The HCF of two numbers is 30 and their sum is 300. Find possible number of pairs.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; HCF 30 &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2366; &#2351;&#2379;&#2327; 300 &#2361;&#2376;&#2404; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the numbers be 30u and 30v, where u and v are co-primes.</p><p>ATQ,</p><p>30u + 30v = 300</p><p>30 (u + v) = 300</p><p>u + v = 10</p><p>Thus,</p><p>(u=1, v=9), (u=3, v=7)</p><p>Possible number of pairs = 2</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The number that should be subtracted from 675 and 870 to get 39 as the GCD is: </p></span><span class=\"hqt\" style=\"display:none\"><p>675 &#2324;&#2352; 870 &#2350;&#2375;&#2306; &#2360;&#2375; 39 &#2325;&#2379; GCD &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2328;&#2335;&#2366;&#2312; &#2332;&#2366;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319; &#2357;&#2361; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>When we divide 675 by 39, the quotient is 17, and the remainder is 12.</p><p>When we divide 870 by 39, the quotient is 22, and the remainder is 12.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What is the greatest number that will divide 575 and 779 leaving the remainder 31 in both cases?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2380;&#2344; &#2360;&#2368; &#2361;&#2376; &#2332;&#2379; 575 &#2324;&#2352; 779 &#2325;&#2379; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2358;&#2375;&#2359; 31 &#2331;&#2379;&#2337;&#2364;&#2375;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">68</span><span class=\"hqt\" style=\"display:none\">68</span>",
      "<span class=\"eqt\">72</span><span class=\"hqt\" style=\"display:none\">72</span>",
      "<span class=\"eqt\">55</span><span class=\"hqt\" style=\"display:none\">55</span>",
      "<span class=\"eqt\">76</span><span class=\"hqt\" style=\"display:none\">76</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The remainder of 31 on dividing 575 and 779</p><p>That means (575  -  31 = 544) and (779  -  31 = 748) will be divisible by the number. </p><p>HCF (544, 748) = 68</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If N = 27<sup>19</sup>, then find the total number of factors of N which are perfect cubes. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; N = 27<sup>19</sup>, &#2340;&#2379; N &#2325;&#2375; &#2313;&#2344; &#2325;&#2369;&#2354; &#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2346;&#2370;&#2352;&#2381;&#2339; &#2328;&#2344; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">57</span><span class=\"hqt\" style=\"display:none\">57</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">38</span><span class=\"hqt\" style=\"display:none\">38</span>",
      "<span class=\"eqt\">40</span><span class=\"hqt\" style=\"display:none\">40</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>N = (27)<sup>19</sup> = (3)<sup>3*19</sup> = 3<sup>57</sup></p><p>We know that: </p><p>Hence, the total number of perfect cube factors = 57/3 + 1 = 19 + 1 = 20</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The HCF and LCM of two numbers is 18 and 108 respectively. If one number is 50% more than the other number, then find the larger number.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; HCF &#2324;&#2352; LCM &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 18 &#2324;&#2352; 108 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 50% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">54</span><span class=\"hqt\" style=\"display:none\">54</span>",
      "<span class=\"eqt\">72</span><span class=\"hqt\" style=\"display:none\">72</span>",
      "<span class=\"eqt\">90</span><span class=\"hqt\" style=\"display:none\">90</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let one number = 2a</p><p>Other number = 150% of 2a = 3a </p><p>Now,</p><p>2a*3a = 18*108</p><p>a<sup>2</sup> = 18*18</p><p>a = 18</p><p>So, larger number = 3*18 = 54</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A shop contains 52 bats, 143 balls, and 104 gloves. The shopkeeper plans to arrange these items in rows in such a way that each row contains the same type of items and an equal number of items. What is the minimum number of rows required for this arrangement?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344; &#2350;&#2375;&#2306; 52 &#2348;&#2354;&#2381;&#2354;&#2375;, 143 &#2327;&#2375;&#2306;&#2342;&#2375;&#2306; &#2324;&#2352; 104 &#2342;&#2360;&#2381;&#2340;&#2366;&#2344;&#2375; &#2361;&#2376;&#2306;&#2404; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2311;&#2344; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2379; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2311;&#2360; &#2340;&#2352;&#2361; &#2360;&#2375; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2319;&#2325; &#2361;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2305; &#2324;&#2352; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2305; &#2361;&#2379;&#2306;&#2404; &#2311;&#2360; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total number of bats, balls and gloves in the shop are 52, 143 and 104 respectively.</p><p>HCF of 52, 143 and 104 = 13</p><p>minimum number of rows required for this arrangement = (52 + 143 + 104)/13 = 23</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find LCM of 28, 72 and 144.</p></span><span class=\"hqt\" style=\"display:none\"><p>28, 72 &#2324;&#2352; 144 &#2325;&#2366; LCM &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">702</span><span class=\"hqt\" style=\"display:none\">702</span>",
      "<span class=\"eqt\">1008</span><span class=\"hqt\" style=\"display:none\">1008</span>",
      "<span class=\"eqt\">504</span><span class=\"hqt\" style=\"display:none\">504</span>",
      "<span class=\"eqt\">2016</span><span class=\"hqt\" style=\"display:none\">2016</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Prime factors of 28 = 2 * 2 * 7</p><p>Prime factors of 72 = 2 * 2 * 2 * 3 * 3</p><p>Prime factors of 144 = 2 * 2 * 2 * 2 * 3 * 3</p><p>LCM = 2 * 2 * 7 * 2 * 3 * 3 * 2 = 1008</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If N = 6<sup>6</sup> + 6<sup>9</sup> + 6<sup>10</sup> + 6<sup>7</sup>, then how many positive factors of N are there?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; N = 6<sup>6</sup> + 6<sup>9</sup> + 6<sup>10</sup> + 6<sup>7 </sup>&#2361;&#2376;, &#2340;&#2379; N &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2327;&#2369;&#2339;&#2344;&#2326;&#2306;&#2337; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">294</span><span class=\"hqt\" style=\"display:none\">294</span>",
      "<span class=\"eqt\">251</span><span class=\"hqt\" style=\"display:none\">251</span>",
      "<span class=\"eqt\">381</span><span class=\"hqt\" style=\"display:none\">381</span>",
      "<span class=\"eqt\">343</span><span class=\"hqt\" style=\"display:none\">343</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>N = 6<sup>6</sup> + 6<sup>9</sup> + 6<sup>10</sup> + 6<sup>7</sup></p><p>N = 6<sup>6</sup> * (1 + 6<sup>3</sup> + 6<sup>4</sup> + 6)</p><p>N = (2 * 3)<sup>6</sup> * [(1 + 6<sup>3</sup>) + 6(1 + 6<sup>3</sup>)]</p><p>N = 2<sup>6</sup> * 3<sup>6</sup> * (1 + 6<sup>3</sup>) * (1 + 6)</p><p>N = 2<sup>6</sup> * 3<sup>6</sup> * 217 * 7</p><p>N = 2<sup>6</sup> * 3<sup>6</sup> * 7 * 31 * 7</p><p>N = 2<sup>6</sup> * 3<sup>6</sup> * 7<sup>2</sup> * 31</p><p>If N = a<sup>p</sup> * b<sup>q</sup> * c<sup>r</sup> [Where a, b and c are prime], then total positive factors of N = (p + 1)(q + 1)(r + 1).</p><p>Hence, positive factors of N = (6 + 1) * (6 + 1) * (2 + 1) * (1 + 1) = 7 * 7 * 3 * 2 = 294</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>How many factors of the number 2<sup>7</sup> x 3<sup>5</sup> x 13<sup>6</sup> are even?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 2<sup>7</sup> x 3<sup>5</sup> x 13<sup>6</sup> &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2327;&#2369;&#2339;&#2344;&#2326;&#2306;&#2337; &#2360;&#2350; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">294</span><span class=\"hqt\" style=\"display:none\">294</span>",
      "<span class=\"eqt\">256</span><span class=\"hqt\" style=\"display:none\">256</span>",
      "<span class=\"eqt\">336</span><span class=\"hqt\" style=\"display:none\">336</span>",
      "<span class=\"eqt\">210</span><span class=\"hqt\" style=\"display:none\">210</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The total number of factors = 8 x 6 x 7 = 336</p><p>Total number of odd factors = 6 x 7 = 42</p><p>So the number of factors = 336  -  42 = 294.</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Which is the largest six-digit number, which when divided by 12,15, 20, 24 and 30, leaves the remainders 8, 11, 16, 20 and 26, respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2331;&#2361;-&#2309;&#2306;&#2325;&#2368;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2368;, &#2332;&#2367;&#2360;&#2375; 12,15, 20, 24 &#2324;&#2352; 30 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 8, 11, 16, 20 &#2324;&#2352; 26 &#2358;&#2375;&#2359; &#2352;&#2361; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">999956</span><span class=\"hqt\" style=\"display:none\">999956</span>",
      "<span class=\"eqt\">999960</span><span class=\"hqt\" style=\"display:none\">999960</span>",
      "<span class=\"eqt\">999964</span><span class=\"hqt\" style=\"display:none\">999964</span>",
      "<span class=\"eqt\">999982</span><span class=\"hqt\" style=\"display:none\">999982</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The LCM of 12, 15 20,24, 30 = 120</p><p>the greatest of 6-digit = 999999</p><p>Dividing 999999 by 120 we get 39 as the remainder</p><p>Hence the 6-digit number divisible by 120 is (999999-39)</p><p>= 999960</p><p>Since 12-8=4, 15-11 = 4, 20-16=4, 24-20= 4, 30-26 = 4</p><p>then reminder is each case is =4 less than the divisor</p><p>Hence, Required number = 999960-4 = 999956</p>",
    "question_index": 9

  {
