<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A motor boat with speed 20 km/h in still water takes 1 h longer to go 48 km upstream than to return downstream over the same distance. What is the speed of the stream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; 20 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2330;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2350;&#2379;&#2335;&#2352; &#2348;&#2379;&#2335; &#2325;&#2379; 48 &#2325;&#2367;&#2350;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2332;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2354;&#2380;&#2335;&#2344;&#2375; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 1 &#2328;&#2306;&#2335;&#2366; &#2309;&#2343;&#2367;&#2325; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2 km/h</span><span class=\"hqt\" style=\"display:none\">2 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">4 km/h</span><span class=\"hqt\" style=\"display:none\">4 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">6 km/h</span><span class=\"hqt\" style=\"display:none\">6 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">8 km/h</span><span class=\"hqt\" style=\"display:none\">8 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the stream of speed be c km/h</p><p>Upstream speed = 20 &#8722; c; downstream = 20 + c.</p><p>48/(20&#8722;c) &#8722; 48/(20+c) = 1.</p><p>96c/(400 &#8722; c&#178;) = 1.</p><p>c&#178; + 96c &#8722; 400 = 0</p><p>c&#178; + 100c  -  4c  -  400 =0</p><p>(c + 100)(c - 4) = 0</p><p>c = 4 km/h</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A boat takes 10 minutes to cover 1 km upstream and 5 minutes to cover the same distance downstream. What are its speeds in still water and of the stream (in kmph)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 1 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 10 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 5 &#2350;&#2367;&#2344;&#2335; &#2354;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2311;&#2360;&#2325;&#2368; &#2327;&#2340;&#2367; (&#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Boat - 8, Stream - 2</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2357; - 8, &#2343;&#2366;&#2352;&#2366; - 2</span>",
      "<span class=\"eqt\">Boat - 9, Stream - 3</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2357; - 9, &#2343;&#2366;&#2352;&#2366; - 3</span>",
      "<span class=\"eqt\">Boat - 10, Stream - 4</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2357; - 10, &#2343;&#2366;&#2352;&#2366; - 4</span>",
      "<span class=\"eqt\">Boat - 12, Stream - 6</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2357; - 12, &#2343;&#2366;&#2352;&#2366; - 6</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let, speed of boat in still water and speed of stream be b km/h and s km/h respectively.</p><p>Upstream speed = 1 km &div; (10/60 h) = 6 kmph</p><p>Downstream speed = 1 km &div; (5/60 h) = 12 kmph</p><p>b  -  s = 6, b + s = 12 =&gt; 2b = 18 =&gt; b = 9, s = 3</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A boat takes the same time to travel 18 km upstream as to travel 24 km downstream. What is the ratio of its speed in still water to the speed of the stream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 18 &#2325;&#2367;&#2350;&#2368; &#2330;&#2354;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2340;&#2344;&#2366; &#2361;&#2368; &#2360;&#2350;&#2351; &#2354;&#2375;&#2340;&#2368; &#2361;&#2376; &#2332;&#2367;&#2340;&#2344;&#2366; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 24 &#2325;&#2367;&#2350;&#2368; &#2330;&#2354;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2311;&#2360;&#2325;&#2368; &#2327;&#2340;&#2367; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">6 : 1</span><span class=\"hqt\" style=\"display:none\">6 : 1</span>",
      "<span class=\"eqt\">7 : 1</span><span class=\"hqt\" style=\"display:none\">7 : 1</span>",
      "<span class=\"eqt\">8 : 1</span><span class=\"hqt\" style=\"display:none\">8 : 1</span>",
      "<span class=\"eqt\">9 : 1</span><span class=\"hqt\" style=\"display:none\">9 : 1</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let, speed of boat in still water and speed of stream be b km/h and s km/h respectively.</p><p>18/(b  -  s) = 24/(b + s) =&gt; 18(b + s) = 24(b  -  s)</p><p>=&gt; 18b + 18s = 24b  -  24s =&gt; 42s = 6b =&gt; b/s = 42/6 = 7/1</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A boat is moving with speed 40 km/hr downstream and 12 km/hr upstream. If upstream speed of boat is increased by 25% and downstream speed is decreased by 3 km/hr, then find the speed of boat in still water.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 40 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 12 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2330;&#2354; &#2352;&#2361;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2344;&#2366;&#2357; &#2325;&#2368; &#2343;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2327;&#2340;&#2367; &#2350;&#2375;&#2306; 25% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2327;&#2340;&#2367; &#2350;&#2375;&#2306; 3 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2328;&#2335;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">25 km/hr</span><span class=\"hqt\" style=\"display:none\">25 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">26 km/hr</span><span class=\"hqt\" style=\"display:none\">26 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">27 km/hr</span><span class=\"hqt\" style=\"display:none\">27 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">28 km/hr</span><span class=\"hqt\" style=\"display:none\">28 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>New downstream speed = 40  -  3 = 37 km/hr</p><p>New upstream speed = 125% of 12 = 15 km/hr</p><p>Speed of boat in still water = (upstream speed + downstream speed)/2</p><p>= (37 + 15)/2</p><p>= 26 km/hr</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A boat goes 63 km upstream and returns in 4 hours. The ratio of speeds of the boat and the stream is 8:1. How much distance can the boat cover in 5 hours 15 minutes when running in still water?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 63 km &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; 4 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2357;&#2366;&#2346;&#2360; &#2310;&#2340;&#2368; &#2361;&#2376;&#2404; &#2344;&#2366;&#2357; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 8:1 &#2361;&#2376;&#2404; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; 5 &#2328;&#2306;&#2335;&#2375; 15 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">160 km</span><span class=\"hqt\" style=\"display:none\">160 km</span>",
      "<span class=\"eqt\">210 km</span><span class=\"hqt\" style=\"display:none\">210 km</span>",
      "<span class=\"eqt\">168 km</span><span class=\"hqt\" style=\"display:none\">168 km</span>",
      "<span class=\"eqt\">186 km</span><span class=\"hqt\" style=\"display:none\">186 km</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the speed of the stream be S km/h. then the speed of boat = 8S</p><p>Upstream speed = 7S and downstream speed = 9S</p><p>63/7S + 63/9S = 4</p><p>=&gt; 9/S + 7/S = 4</p><p>=&gt; S = 4</p><p>Hence speed of boat = 32 km/h</p><p>Required distance = 32 x 5.25 = 168km</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A man rows at 10 kmph in still water. He goes 24 km upstream and returns to his starting point in a total of 5 hours. What is the speed of the stream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2342;&#2350;&#2368; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; 10 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2344;&#2366;&#2357; &#2330;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2361; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 24 &#2325;&#2367;&#2350;&#2368; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2325;&#2369;&#2354; 5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2375; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2354;&#2380;&#2335; &#2310;&#2340;&#2366; &#2361;&#2376;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 kmph</span><span class=\"hqt\" style=\"display:none\">1 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">2 kmph</span><span class=\"hqt\" style=\"display:none\">2 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">3 kmph</span><span class=\"hqt\" style=\"display:none\">3 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">4 kmph</span><span class=\"hqt\" style=\"display:none\">4 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let speed of stream = s kmph</p><p>Upstream speed = (10 - s) kmph</p><p>Downstream speed = (10 + s) kmph</p><p>Time taken in upstream + time taken in downstream = 5 h</p><p>=&gt; 24/(10  -  s) + 24/(10 + s) = 5</p><p>Combine: [24(10 + s) + 24(10  -  s)]/(100  -  s&#178;) = 5</p><p>Numerator = 240 + 24s + 240  -  24s = 480</p><p>=&gt; 480/(100  -  s&#178;) = 5 =&gt; 100  -  s&#178; = 96 =&gt; s&#178; = 4 =&gt; s = 2</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>A boat's speed in still water is 15 kmph and the stream speed is 3 kmph. How long (in hours) will it take to travel 36 km upstream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2319;&#2325; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; 15 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366; &#2361;&#2376; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; 3 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366; &#2361;&#2376;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 36 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; (&#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306;) &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">2 h</span><span class=\"hqt\" style=\"display:none\">2 &#2328;&#2306;&#2335;&#2375;</span>",

    "question": "<span class=\"eqt\"><p>A boat can cover 3K km in upstream in 9 hours. If the ratio of the speed of the boat in still water and speed of the stream is 7: 2, then in how much time it will cover K km in downstream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; 9 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 3K &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 7:2 &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; K &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2375;&#2327;&#2368;?</p></span>",

    "question": "<span class=\"eqt\"><p>A boat takes 6 hours more to travel a certain distance upstream than it takes to cover the same distance downstream. If the speed of boat is doubled, it takes only 1 hour more to travel the same distance upstream than it takes downstream. Find the ratio of the speed of boat to the speed of the stream.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2325;&#2379; &#2343;&#2366;&#2352;&#2366;-&#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; &#2325;&#2368; &#2343;&#2366;&#2352;&#2366;-&#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2350;&#2351; &#2360;&#2375; 6 &#2328;&#2306;&#2335;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;| &#2351;&#2342;&#2367; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2379; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2379; &#2351;&#2361; &#2343;&#2366;&#2352;&#2366;-&#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2342;&#2367;&#2358;&#2366; &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2343;&#2366;&#2352;&#2366;-&#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2342;&#2367;&#2358;&#2366; &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2350;&#2351; &#2360;&#2375; &#2325;&#2375;&#2357;&#2354; 1 &#2328;&#2306;&#2335;&#2366; &#2309;&#2343;&#2367;&#2325; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;| &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;|</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;5: &radic;2</span><span class=\"hqt\" style=\"display:none\">&radic;5:&radic;2</span>",
      "<span class=\"eqt\">&radic;10: 2</span><span class=\"hqt\" style=\"display:none\">&radic;10:2</span>",
      "<span class=\"eqt\">&radic;5: &radic;3</span><span class=\"hqt\" style=\"display:none\">&radic;5:&radic;3</span>",

    "correct_option_id": 0,
    "solution": "<p>Let speed of boat be 'x' and speed of stream be 'y' and one-way distance be 'D'.</p><p>It takes 6 h more upstream than downstream.</p><p>=&gt; D/(x - y)  -  D/(x + y) = 6</p><p>=&gt; D = (3x<sup>2</sup>  -  3y<sup>2</sup>)/y (i)</p><p>When the speed of the boat is doubled,</p><p>=&gt; D/(2x - y)  -  D/(2x + y) = 1</p><p>=&gt; D = (4x<sup>2</sup>  -  y<sup>2</sup>)/2y (ii)</p><p>From (i) and (ii)-</p><p>=&gt; (3x<sup>2</sup>  -  3y<sup>2</sup>)/y = (4x<sup>2</sup>  -  y<sup>2</sup>)/2y</p><p>=&gt; 6x<sup>2</sup>  -  6y<sup>2</sup> = 4x<sup>2</sup>  -  y<sup>2</sup></p><p>=&gt; 2x<sup>2</sup> = 5y<sup>2</sup></p><p>=&gt; x : y = &radic;5:&radic;2</p>",
    "question_index": 12
  },

    "question": "<span class=\"eqt\"><p>If the ratio of speed of boat in still water and speed of boat in downstream is 4: 5 and boat covers 96 km in upstream in 16 hours, then in how many hours boat can cover 112 km downstream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4:5 &#2361;&#2376; &#2324;&#2352; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 96 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 16 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 112 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2375; &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>A boat's speed in still water is 12 km/h. It rows 20 km upstream, stops for 30 minutes, then rows 20 km downstream. If the total time is 6(&frac12;) hours, find the stream's speed.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2319;&#2325; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; 12 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;&#2404; &#2351;&#2361; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 20 &#2325;&#2367;&#2350;&#2368; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;, 30 &#2350;&#2367;&#2344;&#2335; &#2352;&#2369;&#2325;&#2340;&#2368; &#2361;&#2376;, &#2347;&#2367;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 20 &#2325;&#2367;&#2350;&#2368; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2369;&#2354; &#2360;&#2350;&#2351; 6(&frac12;) &#2328;&#2306;&#2335;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "correct_option_id": 2,
    "solution": "<p>Let speed of stream = x km/h</p><p>Upstream speed = (12 &#8722; x) km/h</p><p>Downstream speed = (12 + x) km/h</p><p>Time taken in upstream = 20/(12&#8722;x) h</p><p>Rest = 1/2 h</p><p>Time taken in downstream = 20/(12+x) h</p><p>Total time taken = 13/2 h</p><p>20/(12&#8722;x) + 1/2 + 20/(12+x) = 13/2</p><p>20/(12&#8722;x) + 20/(12+x) = 6</p><p>20(12+x) + 20(12&#8722;x) = 6(144&#8722;x<sup>2</sup>)</p><p>240 + 20x + 240 &#8722; 20x = 864 &#8722; 6x<sup>2</sup></p><p>480 = 864 &#8722; 6x<sup>2</sup></p><p>6x<sup>2</sup> = 384</p><p>x<sup>2</sup> = 64</p><p>x = 8</p><p>Hence, speed of stream = 8 km/h</p>",
