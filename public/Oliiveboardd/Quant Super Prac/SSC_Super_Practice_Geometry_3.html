<body>
    <!-- Welcome Screen -->

                </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>&nbsp;A circle is circumscribed on a quadrilateral ABCD. If &angle;DAB = 100&deg;, &angle;ADB = 35&deg; and &angle;CDB =40&deg;, then find the measure of &angle;DBC.&nbsp;</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2319;&#2325; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; ABCD &#2325;&#2375; &#2346;&#2352;&#2367;&#2327;&#2340; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736;DAB = 100&deg;, &#8736;ADB = 35&deg; &#2324;&#2352; &#8736;CDB =40&deg; &#2361;&#2376;, &#2340;&#2379; &#8736;DBC &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">35<sup>o</sup></span><span class=\"hqt\" style=\"display:none\">35<sup>o</sup></span>",
      "<span class=\"eqt\">60<sup>o</sup></span><span class=\"hqt\" style=\"display:none\">60<sup>o</sup></span>",
      "<span class=\"eqt\">45<sup>o</sup></span><span class=\"hqt\" style=\"display:none\">45<sup>o</sup></span>",
      "<span class=\"eqt\">40<sup>o</sup></span><span class=\"hqt\" style=\"display:none\">40<sup>o</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=279 height=205 id=\"Picture 40\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20111/image110.jpg\"></p><p>In &#916; ADB,</p><p>&#8736; ABD = 180  -  (&#8736; ADB + &#8736; DAB)</p><p>= 180  -  (35 + 100)</p><p>= 45&deg;</p><p>Since quadrilateral ABCD is a cyclic quadrilateral.</p><p>So,</p><p>&#8736; ADB + &#8736; CDB + &#8736; ABD + &#8736; DBC = 180</p><p>35 + 40 + 45 + &#8736; DBC = 180</p><p>&#8736; DBC = 180  -  120</p><p>&#8736; DBC = 60&deg;</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Find the number of common tangents, if r<sub>1</sub> + r<sub>2</sub> = C<sub>1</sub> C<sub>2</sub>. (With usual notations, r<sub>1</sub> &amp; r<sub>2</sub> and C<sub>1</sub> &amp; C<sub>2</sub> are the radii and centres of the two circles.)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; r<sub>1</sub> + r<sub>2</sub> = C<sub>1</sub> C<sub>2 </sub>(&#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2360;&#2306;&#2325;&#2375;&#2340;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; r<sub>1</sub> &#2324;&#2352; r<sub>2 </sub> &#2340;&#2341;&#2366; C<sub>1</sub> &#2324;&#2352; C<sub>2</sub> &#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2319;&#2305; &#2324;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2361;&#2376;&#2306;) &#2361;&#2376;, &#2340;&#2379; &#2313;&#2349;&#2351;&#2344;&#2367;&#2359;&#2381;&#2336; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>If <img width=13 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20888/image017.png\">+ <img width=15 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20888/image021.png\"> = <img width=35 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20888/image022.png\">, then there are 3 common tangents (2 direct and 1 transverse) .</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Find the perimeter of major sector of a circle of radius 12 meters, whose minor sector subtends an angle of 75&deg; at the center.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; 12 &#2350;&#2368;&#2335;&#2352; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2354;&#2328;&#2369; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2326;&#2306;&#2337; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2352; 75&deg; &#2325;&#2366; &#2325;&#2379;&#2339; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2342;&#2368;&#2352;&#2381;&#2328; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2326;&#2306;&#2337; &#2325;&#2368; &#2346;&#2352;&#2367;&#2343;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">24 + 5&#960; meters</span><span class=\"hqt\" style=\"display:none\">24 + 5&#960; &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">24 + 19&#960; meters</span><span class=\"hqt\" style=\"display:none\">24 + 19&#960; &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">24  -  5&#960; meters</span><span class=\"hqt\" style=\"display:none\">24 - 5&#960; &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">24  -  19&#960; meters</span><span class=\"hqt\" style=\"display:none\">24 - 19&#960; &#2350;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Arc length of any sector of a circle which makes angle of &#952; at the centre = 2&#960;r * (&#952;/360)</p><p>Total perimeter of the sector = Arc length + 2 * Radius = 2&#960;r * (&#952;/360) + 2r</p><p>Since minor sector makes an angle of 75&deg; at the centre which means major sector will make angle equal to 360&deg;  -  75&deg; = 285&deg;</p><p>So, perimeter of major sector = 2&#960; * 12 * (285/360) + 2 * 12</p><p>= 19&#960; + 24 meters</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The radii of two circle are 5 cm and 10 cm and the distance between their centres is 17 cm. Find the length of the transverse common tangent</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2319;&#2305; 5 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 10 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2313;&#2344;&#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 17 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2309;&#2344;&#2369;&#2346;&#2381;&#2352;&#2360;&#2381;&#2341; &#2313;&#2349;&#2351;&#2344;&#2367;&#2359;&#2381;&#2336; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">9 cm</span><span class=\"hqt\" style=\"display:none\">9 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">8 cm</span><span class=\"hqt\" style=\"display:none\">8 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">6 cm</span><span class=\"hqt\" style=\"display:none\">6 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">7.5 cm</span><span class=\"hqt\" style=\"display:none\">7.5 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here R<sub>1</sub>=5 cm</p><p>R<sub>2</sub>=17 cm</p><p>Distance=10 cm</p><p>Formula=L= &radic;(d<sup>2</sup>-(R<sub>1</sub>+R<sub>2</sub>)<sup>2</sup>)</p><p>Here (R<sub>1</sub>+R<sub>2</sub>)<sup>2</sup>=15<sup>2</sup>=225</p><p>d<sup>2</sup>=17<sup>2</sup>=289</p><p>so L=&radic;(289-225)=8cm.</p><p>option (b) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A chord of length 42 cm is drawn in a circle having diameter 58 cm. what is the minimum distance of other parallel chord of length 40 cm in the same circle from 42 cm long chord?</p></span><span class=\"hqt\" style=\"display:none\"><p>58 cm &#2357;&#2381;&#2351;&#2366;&#2360; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2350;&#2375;&#2306; 42 cm &#2354;&#2306;&#2348;&#2366;&#2312; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2332;&#2368;&#2357;&#2366; &#2326;&#2368;&#2306;&#2330;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2357;&#2371;&#2340;&#2381;&#2340; &#2350;&#2375;&#2306; 40 cm &#2354;&#2306;&#2348;&#2366;&#2312; &#2357;&#2366;&#2354;&#2368; &#2309;&#2344;&#2381;&#2351; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2332;&#2368;&#2357;&#2366; &#2325;&#2368; 42 cm &#2354;&#2306;&#2348;&#2368; &#2332;&#2368;&#2357;&#2366; &#2360;&#2375; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">4 cm</span><span class=\"hqt\" style=\"display:none\">4 cm</span>",
      "<span class=\"eqt\">1 cm</span><span class=\"hqt\" style=\"display:none\">1 cm</span>",
      "<span class=\"eqt\">3 cm</span><span class=\"hqt\" style=\"display:none\">3 cm</span>",
      "<span class=\"eqt\">2 cm</span><span class=\"hqt\" style=\"display:none\">2 cm</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=277 height=271 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20787/image029.jpg\"></p><p>Radius = OA = OC = 58/2 = 29 cm</p><p>Chord AB = 42 cm So, AE = 21 cm</p><p>And chord CD = 40 cm So, CF = 20 cm</p><p>OF<sup>2</sup> = OC<sup>2</sup>  -  CF<sup>2</sup></p><p>=&gt; OF = &radic;(841  -  400) = &radic;441</p><p>=&gt; OF = 21 cm</p><p>And OE<sup>2</sup> = OA<sup>2</sup>  -  AE<sup>2</sup></p><p>=&gt; OE = &radic;(841  -  441) = &radic;400</p><p>=&gt; OE = 20 cm</p><p>So, EF = OF  -  OE = 21  -  20 = 1 cm</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Two circles of radii 8 cm and 3 cm, respectively, are 13 cm apart. AB is a direct common tangent touch to both the circles at A and B respectively then the length of AB is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 8 cm &#2324;&#2352; 3 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; 13 cm &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;&#2306;&#2404; AB &#2319;&#2325; &#2360;&#2368;&#2343;&#2368; &#2313;&#2349;&#2351;&#2344;&#2367;&#2359;&#2381;&#2336; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366; &#2361;&#2376; &#2332;&#2379; &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; A &#2324;&#2352; B &#2346;&#2352; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; AB &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">10 cm</span><span class=\"hqt\" style=\"display:none\">10 cm</span>",
      "<span class=\"eqt\">12 cm</span><span class=\"hqt\" style=\"display:none\">12 cm</span>",
      "<span class=\"eqt\">8 cm</span><span class=\"hqt\" style=\"display:none\">8 cm</span>",
      "<span class=\"eqt\">6 cm</span><span class=\"hqt\" style=\"display:none\">6 cm</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>When two circles of radii r<sub>1</sub> cm and r<sub>2</sub> cm are d cm apart (d &gt; r<sub>1</sub> + r<sub>2</sub> and r<sup>2</sup> &gt; r<sub>1</sub>), then length of their common tangent = &radic;[d<sup>2</sup>  -  (r<sub>2</sub>  -  r<sub>1</sub>)<sup>2</sup>]</p><p>AB = &radic;[13<sup>2</sup>  -  (8  -  3)<sup>2</sup>]</p><p>= &radic;[169  -  25]</p><p>= &radic;144</p><p>= 12 cm</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Select the correct option with respect to the given statement.</p><p>Two tangents are drawn at the end of the diameter of a circle.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2357;&#2381;&#2351;&#2366;&#2360; &#2325;&#2375; &#2331;&#2379;&#2352; &#2346;&#2352; &#2342;&#2379; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305; &#2326;&#2368;&#2306;&#2330;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">They intersect each other.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2325;&#2366;&#2335;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They pass through origin.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2350;&#2370;&#2354; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They are parallel to each other.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They are perpendicular to each other.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2375; &#2354;&#2306;&#2348;&#2357;&#2340; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=270 height=174 id=\"Picture 79\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21889/image056.png\"></p><p><b>We know that:</b> The radius from the center of the circle to the point of tangency is perpendicular to the tangent line.</p><p>&#8736;AMO = &#8736;CNO = 90&deg;</p><p>Hence, two tangents are drawn at the end of the diameter of a circle are parallel to each other.</p>",
    "question_index": 6
  },
  {

    "question": "<span class=\"eqt\"><p>In the following figure, P and Q are centers of two circles. The circles are intersecting at points A and B. PA produced on both the sides meets the circles at C and D. If &ang;CPB = 100&deg;, then find the value of x.</p><p><img width=208 height=170 id=\"Picture 34\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19993/image024.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; &#2348;&#2367;&#2306;&#2342;&#2369; P &#2324;&#2352; Q &#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2361;&#2376;&#2306;&#2404; &#2357;&#2371;&#2340;&#2381;&#2340; &#2348;&#2367;&#2306;&#2342;&#2369; A &#2324;&#2352; B &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; PA &#2325;&#2379; &#2342;&#2379;&#2344;&#2379;&#2306; &#2323;&#2352; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2346;&#2352; &#2351;&#2361; &#2357;&#2371;&#2340;&#2381;&#2340; &#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; C &#2324;&#2352; D &#2346;&#2352; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736;CPB = 100&deg; &#2361;&#2376;, &#2340;&#2379; x &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"208\" height=\"170\" id=\"Picture 34\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19993/image024.jpg\"></p></span>",

    "solution": "<p><img width=198 height=169 id=\"Picture 33\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19993/image025.jpg\"></p><p>&#8736;CPB = 100&deg;</p><p>&#8736;APB = 180  -  100 = 80&deg;</p><p>In DAPB,</p><p>&#8736;PAB = &ang;PBA = &frac12; (180-80) = 50&deg;</p><p>&#8736;BAD = 180  -  50 = 130&deg;</p><p>In ABED,</p><p>&#8736;BAD + &ang;BED = 180&deg; (In cyclic quadrilateral, the sum of opposite angles is equal to 180&deg;.)</p><p>&#8736;BED = 180&deg; - 130&deg; = 50&deg;</p><p>&#8736;BQD = 2&ang;BED (The angle at the center is double the angle at the circumference.)</p><p>&#8736;BQD = 2 X 50 = 100&deg;</p>",

    "question": "<span class=\"eqt\"><p>Let O is the centre of a circle and P is a point outside the circle. If PAB is a secant of the circle which intersects the circle at A and B, and PT is the tangent drawn from P, then find the length of PT. [PA = 3 cm and AB = 9 cm]</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344; &#2354;&#2368;&#2332;&#2367;&#2319; O &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2361;&#2376; &#2324;&#2352; P &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2348;&#2366;&#2361;&#2352; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; PAB &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2319;&#2325; &#2331;&#2375;&#2342;&#2367;&#2325;&#2366;/&#2360;&#2368;&#2325;&#2375;&#2306;&#2335; &#2361;&#2376; &#2324;&#2352; PAB &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2379; A &#2324;&#2352; B &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; PT, P &#2360;&#2375; &#2326;&#2368;&#2306;&#2330;&#2368; &#2327;&#2312; &#2319;&#2325; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366; &#2361;&#2376;, &#2340;&#2379; PT &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; [PA = 3 cm &#2324;&#2352; AB = 9 cm]</p></span>",

    "question": "<span class=\"eqt\"><p>PA and PB are two tangents from a point P outside the circle with center O. If A and B are points on the circle such that &#8736;APB = 128&deg;, then &#8736;OAB is equal to:</p></span><span class=\"hqt\" style=\"display:none\"><p>PA &#2324;&#2352; PB &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2357;&#2366;&#2354;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2348;&#2366;&#2361;&#2352; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; P &#2360;&#2375; &#2342;&#2379; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; A &#2324;&#2352; B &#2357;&#2371;&#2340;&#2381;&#2340; &#2346;&#2352; &#2320;&#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; &#2361;&#2376;&#2306; &#2325;&#2367; &#8736;APB = 128&deg;, &#2340;&#2379; &#8736;OAB &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2327;&#2366;:</p></span>",

    "solution": "<p><img width=268 height=153 id=\"Picture 24\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24643/image091.png\"></p><p>&#8736;APB = 128&deg;</p><p>In Quadrilateral PAOB:</p><p>&#8736;APB + &#8736;AOB = 180&deg; [&#8736;PAO = &#8736;PBO = 90&deg; = Angle formed between tangent and radius.]</p><p>&#8736;AOB = 180&deg; - 128&deg; = 52&deg;</p><p>In &#916;AOB:</p><p>&#8736;AOB + &#8736;OAB + &#8736;OBA = 180&deg;</p><p>&#8736;OAB + &#8736;OAB = 180&deg; - 52&deg; = 128&deg; [&#8736;OAB = &#8736;OBA]</p><p>&#8736;OAB = 128&deg;/2 = 64&deg;</p>",

    "question": "<span class=\"eqt\"><p>A circle is inscribed in a triangle ABC. It touches sides AB, BC and AC at points R, P and Q, respectively. If AQ = 3.5 cm, PC = 4.5 cm and BR = 7 cm, then the perimeter (in cm) of the triangle &#916;ABC is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; ABC &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2361;&#2376;&#2404; &#2351;&#2361; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; AB, BC &#2324;&#2352; AC &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2348;&#2367;&#2306;&#2342;&#2369; R, P &#2324;&#2352; Q &#2346;&#2352; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; AQ = 3.5 cm, PC = 4.5 cm &#2324;&#2352; BR = 7 cm &#2361;&#2376;, &#2340;&#2379; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#916;ABC &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; (cm &#2350;&#2375;&#2306;) &#2361;&#2376;:</p></span>",
    "options": [

      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">28</span><span class=\"hqt\" style=\"display:none\">28</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>"

    "correct_option_id": 3,
    "solution": "<p><img width=216 height=167 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24643/image090.png\"></p><p>AQ = 3.5 cm, PC = 4.5 cm and BR = 7 cm</p><p>AQ = AR = 3.5 cm, PC = QC = 4.5 cm, and BP = BR = 7 cm</p><p>Perimeter of the triangle = AB + BC + AC = (AR + BR) + (BP + PC) + (AQ + QC) = 2 * (3.5 + 4.5 + 7)</p><p>= 2 * 15</p><p>= 30 cm</p>",

    "question": "<span class=\"eqt\"><p>Two circles touch each other externally. The radius of the first circle with center A is 18 cm. The radius of the second circle with center B is 8 cm. Find the length of their common tangent CD.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2348;&#2366;&#2361;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; A &#2357;&#2366;&#2354;&#2375; &#2346;&#2361;&#2354;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 18 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; B &#2357;&#2366;&#2354;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 8 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2313;&#2344;&#2325;&#2368; &#2313;&#2349;&#2351;&#2344;&#2367;&#2359;&#2381;&#2336; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366; CD &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>In the given figure, MNP, SQP, NQR and MSR are straight lines. &#8736;NPQ = 54&deg; and = &#8736;QRS = 68&deg;. What is the degree measure of &#8736;SMN?</p><p><img width=339 height=272 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22631/image093.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, MNP, SQP, NQR &#2324;&#2352; MSR &#2360;&#2368;&#2343;&#2368; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;&#2404; &#8736;NPQ = 54&deg; &#2324;&#2352; = &#8736;QRS = 68&deg; &#2361;&#2376;&#2404; &#8736;SMN &#2325;&#2366; &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2350;&#2366;&#2346; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p><img width=\"339\" height=\"272\" id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22631/image093.png\"></p></span>",

      "<span class=\"eqt\">38&deg;</span><span class=\"hqt\" style=\"display:none\">38&deg;</span>",
      "<span class=\"eqt\">54&deg;</span><span class=\"hqt\" style=\"display:none\">54&deg;</span>",
      "<span class=\"eqt\">68&deg;</span><span class=\"hqt\" style=\"display:none\">68&deg;</span>"

    "correct_option_id": 0,
    "solution": "<p>In &#916;MNR:</p><p>&#8736;MNR + &#8736;RMN + &#8736;MRN = 180&deg;</p><p>&#8736;MNR + &#8736;RMN = 180&deg; - 68&deg; = 112&deg;</p><p>&#8736;MNR + &#8736;SMN = 112&deg; .......... (1)</p><p>In &#916;SMP:</p><p>&#8736;SMP + &#8736;MSP + &#8736;SPM = 180&deg;</p><p>&#8736;SMP + &#8736;MSP = 180&deg; - 54&deg; = 126&deg;</p><p>&#8736;SMN + &#8736;MSP = 126&deg; ........ (2)</p><p>From (1) and (2):</p><p>(&#8736;MNR + &#8736;SMN) + (&#8736;SMN + &#8736;MSP) = 112&deg; + 126&deg;</p><p>(&#8736;MNR + &#8736;MSP) + (&#8736;SMN + &#8736;SMN) = 238&deg;</p><p>(&#8736;MNR + &#8736;MSP) + 2(&#8736;SMN) = 238&deg; ....... (3)</p><p>In cyclic quadrilateral SMNQ:</p><p>&#8736;MSQ + &#8736;MNQ = 180&deg; ........... (4)</p><p>From (3) and (4):</p><p>180&deg; + 2(&#8736;SMN) = 238&deg;</p><p>&#8736;SMN = 29&deg;</p>",
    "question_index": 17
  },

    "question": "<span class=\"eqt\"><p>ABCD is a cyclic quadrilateral such that AB is a diameter of the circle circumscribing it and &#8736;ADC = 118&deg;, What is the measure of &#8736;BAC?</p></span><span class=\"hqt\" style=\"display:none\"><p>ABCD &#2319;&#2325; &#2330;&#2325;&#2381;&#2352;&#2368;&#2351; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376; &#2325;&#2367; AB &#2311;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2327;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2361;&#2376; &#2324;&#2352; &#8736;ADC = 118&deg; &#2361;&#2376;, &#2340;&#2379; &#8736;BAC &#2325;&#2368; &#2350;&#2366;&#2346; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">30&deg;</span><span class=\"hqt\" style=\"display:none\">30&deg;</span>"

    "solution": "<p><img width=226 height=167 id=\"Picture 11\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22634/image116.png\"></p><p>In the cyclic quadrilateral ABCD:</p><p>&#8736;ADC + &#8736;ABC = &#8736;DAB + &#8736;DCB = 180&deg;</p><p>Since, &#8736;ADC = 118&deg;</p><p>So, &#8736;ABC = 180  -  118 = 62&deg;</p><p>In triangle OBC:</p><p>OB = OC</p><p>So, &#8736;OBC = &#8736;OCB</p><p>Since, &#8736;OBC = &#8736;ABC = 62&deg;</p><p>So, &#8736;OCB = 62&deg;</p><p>And, &#8736;BOC = 180  -  (62 + 62) = 56&deg;</p><p>Since, &#8736;BOC = 2&#8736;BAC</p><p>So, &#8736;BAC = 56/2 = 28&deg;</p>",

    "question": "<span class=\"eqt\"><p>In the given figure, the length of arc AB is equal to twice the length of radius r of the circle. Find the area of sector OAB in terms of the radius r.</p><p><img width=209 height=212 id=\"Picture 50\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image081.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, &#2330;&#2366;&#2346; AB &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312;, &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; (r) &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2326;&#2306;&#2337; OAB &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (&#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; r &#2325;&#2375; &#2346;&#2342;&#2379;&#2306; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p><img width=\"209\" height=\"212\" id=\"Picture 50\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image081.png\"></p></span>",
