    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Find the remainder if 43<sup>43</sup> + 43 is divided by 44.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 43<sup>43</sup> + 43 &#2325;&#2379; 44 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">43</span><span class=\"hqt\" style=\"display:none\">43</span>",
      "<span class=\"eqt\">42</span><span class=\"hqt\" style=\"display:none\">42</span>",
      "<span class=\"eqt\">41</span><span class=\"hqt\" style=\"display:none\">41</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=68 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22135/image007.png\"></p><p><img width=112 height=43 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22135/image008.png\"></p><p><img width=188 height=17 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22135/image009.png\"></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>(5<sup>54</sup> + 5<sup>55</sup> + 5<sup>56</sup> + 5<sup>57</sup>) is divisible by which of the following numbers?</p></span><span class=\"hqt\" style=\"display:none\"><p>(5<sup>54</sup> + 5<sup>55</sup> + 5<sup>56</sup> + 5<sup>57</sup>) &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">73</span><span class=\"hqt\" style=\"display:none\">73</span>",
      "<span class=\"eqt\">51</span><span class=\"hqt\" style=\"display:none\">51</span>",
      "<span class=\"eqt\">91</span><span class=\"hqt\" style=\"display:none\">91</span>",
      "<span class=\"eqt\">250</span><span class=\"hqt\" style=\"display:none\">250</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let's assume A = 5<sup>54</sup> + 5<sup>55</sup> + 5<sup>56</sup> + 5<sup>57</sup></p><p>= 5<sup>54</sup>(1 + 5 + 5<sup>2</sup> + 5<sup>3</sup>)</p><p>=5<sup>54</sup>(1 + 5 + 25 + 125)</p><p>=5<sup>54</sup>  X  156</p><p>Clearly out of the given options 250 completely divides the given expression.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The number 222222222222 is always divisible by ___</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 222222222222, _____ &#2360;&#2375; &#2360;&#2342;&#2376;&#2357; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">only 11</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 11</span>",
      "<span class=\"eqt\">both 3 and 9</span><span class=\"hqt\" style=\"display:none\">3 &#2324;&#2352; 9 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">both 3 and 11</span><span class=\"hqt\" style=\"display:none\">3 &#2324;&#2352; 11 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only 3</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sum of digits of 222222222222 = 24</p><p>24 is divisible by 3 but not divisible by 9.</p><p>Sum of odd digits  -  sum of even digits = 0</p><p>So, the number is divisible by 3 and 11.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>When y is divided by 29, the remainder obtained is 4. What will be the remainder when y<sup>5</sup> is divided by 29?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; y &#2325;&#2379; 29 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; 4 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; y<sup>5</sup> &#2325;&#2379; 29 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let us take an example to understand the concept of remainder:</p><p>When x is divided by y it gives the remainder 'a'. If we are performing any operation on x, then the same operation will be performed on 'a'.</p><p>Like, the remainder obtained on dividing x<sup>n </sup>by y is equal to the remainder obtained on diving a<sup>n</sup> by y.</p><p>Here, remainder 4 is obtained on dividing y by 29. Then,</p><p>New remainder = remainder obtained when y<sup>5</sup>/29</p><p>= remainder obtained when 4<sup>5</sup>/29</p><p>= remainder obtained when 1024/29</p><p>= <b>9</b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The number of those numbers which are between 300 and 700 (both inclusive) and divisible by 4, 5, and 6 is X. What is the value of (X<sup>2</sup>  -  X + 1)?</p></span><span class=\"hqt\" style=\"display:none\"><p>300 &#2324;&#2352; 700 (&#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2350;&#2366;&#2357;&#2375;&#2358;&#2368;) &#2325;&#2375; &#2348;&#2368;&#2330; &#2324;&#2352; 4, 5 &#2324;&#2352; 6 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; X &#2361;&#2376;&#2404; (X<sup>2</sup> - X + 1) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">31</span><span class=\"hqt\" style=\"display:none\">31</span>",
      "<span class=\"eqt\">43</span><span class=\"hqt\" style=\"display:none\">43</span>",
      "<span class=\"eqt\">57</span><span class=\"hqt\" style=\"display:none\">57</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Here the L.C.M of 4, 5, and 6 = 60</p><p>So, largest such number between 300 and 700 (both inclusive) = 660</p><p>Smallest such number = 300</p><p>X = (660 - 300)/60 + 1</p><p>X = 7</p><p>So,</p><p>Value of X<sup>2</sup>  -  X + 1 = 49  -  7 + 1 = 42 + 1 = 43</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which one of the following is always divisible by 25?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2350;&#2375;&#2358;&#2366; 25 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">40040</span><span class=\"hqt\" style=\"display:none\">40040</span>",
      "<span class=\"eqt\">511135</span><span class=\"hqt\" style=\"display:none\">511135</span>",
      "<span class=\"eqt\">622005</span><span class=\"hqt\" style=\"display:none\">622005</span>",
      "<span class=\"eqt\">300500</span><span class=\"hqt\" style=\"display:none\">300500</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The last two digits of multiples of 25 are always 25, 50, 75 or 00.</p><p>Hence, option d is the answer.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find the remainder 529 x 147 x 79 is divided by 15.</p></span><span class=\"hqt\" style=\"display:none\"><p>529 x 147 x 79 &#2325;&#2379; 15 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 1,
    "solution": "\"<p><span><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/8abbb93b4c0b11b06fa3d41ee6c831b7.png\" />&nbsp;&nbsp;</span></p>\"",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What is the remainder when 2<sup>131</sup> divided by 63?</p></span><span class=\"hqt\" style=\"display:none\"><p>2<sup>131 </sup>&#2325;&#2379; 63 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2358;&#2375;&#2359;&#2347;&#2354; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">32</span><span class=\"hqt\" style=\"display:none\">32</span>",
      "<span class=\"eqt\">130</span><span class=\"hqt\" style=\"display:none\">130</span>",
      "<span class=\"eqt\">61</span><span class=\"hqt\" style=\"display:none\">61</span>",
      "<span class=\"eqt\">98</span><span class=\"hqt\" style=\"display:none\">98</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>We will take the totient of 63, which is 2<sup>6</sup></p><p>If totient of a number is divided by the number then the remainder is 1.</p><p>so 2<sup>131</sup>= 2<sup>6<sup>21</sup></sup> x 2<sup>5</sup></p><p>[2<sup>6<sup>21</sup></sup> x 2<sup>5</sup>]/63 = 2<sup>5</sup>/63</p><p>Remainder = 32</p><p>So the answer is 32.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>An eight-digit number 9835034x is divisible by 44, then what will be the value of x?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2336; &#2309;&#2306;&#2325;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 9835034x, 44 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; x &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>An eight-digit number 9835034x is divisible by 44 that means the number is divisible by 4 and 11.</p><p>Since last two digit is divisible by 4, thus given number is divisible by 4. So, possible values of x = {0, 4, 8}</p><p>By divisibility rule of 11, If the difference of the sum of alternative digits of the number is divisible by 11, then that number is divisible by 11 completely.</p><p>(9 + 3 + 0 + 4)  -  (8 + 5 + 3 + x) = 0 - x</p><p>Thus, value of x should be 0, then the given number will be divisible by 11.</p><p>Hence, value of x = 0</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>How many natural numbers upto 99 are divisible by 10?</p></span><span class=\"hqt\" style=\"display:none\"><p>99 &#2340;&#2325; &#2325;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; 10 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Natural numbers upto 99 which are divisible by 10 = 10, 20, 30, 40, 50, 60, 70, 80, 90 </p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>If 3A65B is divisible by 11, then what is the value of B  -  A?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 3A65B, 11 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; B - A &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Given number = 3A65B</p><p>Sum of digits at even places = A + 5</p><p>Sum of digits at odd places = 9 + B</p><p>Difference = 9 + B  -  A  -  5 = B  -  A + 4</p><p>Now, to be the divisible by 11, the value of B  -  A should be 7.</p><p>Therefore, B  -  A = 7</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>The greatest number that divides 126, 224 and 608 leaving remainders 2, 7 and 19, respectively is:</p></span><span class=\"hqt\" style=\"display:none\"><p>_______&#2357;&#2361; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2360;&#2375; 126, 224 &#2324;&#2352; 608 &#2325;&#2379; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2325;&#2381;&#2352;&#2350;&#2358;: 2, 7 &#2324;&#2352; 19 &#2358;&#2375;&#2359;&#2347;&#2354; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">27</span><span class=\"hqt\" style=\"display:none\">27</span>",
      "<span class=\"eqt\">31</span><span class=\"hqt\" style=\"display:none\">31</span>",
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">37</span><span class=\"hqt\" style=\"display:none\">37</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>We have to find the greatest number by which (126  -  2), (224  -  7) and (608  -  19) are completely divisible.</p><p>The greatest number = HCF of 124, 217 and 589</p><p>The greatest number = 31</p>",
    "question_index": 11
