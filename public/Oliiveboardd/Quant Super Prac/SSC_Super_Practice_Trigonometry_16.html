<body>
    <!-- Welcome Screen -->

                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>

                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>

            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If the angle of elevation of a butterfly from observation point C, 372 m above the ground is 30&deg; and the angle of depression to its shadow on the ground is 60&deg;, then the height of the butterfly above the ground is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2332;&#2350;&#2368;&#2344; &#2360;&#2375; 372 &#2350;&#2368;&#2335;&#2352; &#2314;&#2346;&#2352; &#2309;&#2357;&#2354;&#2379;&#2325;&#2344; &#2348;&#2367;&#2306;&#2342;&#2369; C &#2360;&#2375; &#2319;&#2325; &#2340;&#2367;&#2340;&#2354;&#2368; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 30&deg; &#2361;&#2376; &#2324;&#2352; &#2332;&#2350;&#2368;&#2344; &#2346;&#2352; &#2313;&#2360;&#2325;&#2368; &#2331;&#2366;&#2351;&#2366; &#2325;&#2366; &#2309;&#2357;&#2344;&#2350;&#2344; &#2325;&#2379;&#2339; 60&deg; &#2361;&#2376;, &#2340;&#2379; &#2332;&#2350;&#2368;&#2344; &#2360;&#2375; &#2314;&#2346;&#2352; &#2340;&#2367;&#2340;&#2354;&#2368; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">558 m</span><span class=\"hqt\" style=\"display:none\">558 &#2350;&#2368;</span>",
      "<span class=\"eqt\">558&radic;3 m</span><span class=\"hqt\" style=\"display:none\">558&radic;3 &#2350;&#2368;</span>",
      "<span class=\"eqt\">279&radic;3 m</span><span class=\"hqt\" style=\"display:none\">279&radic;3 &#2350;&#2368;</span>",
      "<span class=\"eqt\">279 m</span><span class=\"hqt\" style=\"display:none\">279 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=154 height=138 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27478/image001.png\"></p><p>A = butterfly position</p><p>C = observation point</p><p>E = Shadow point</p><p>BD = 372 m</p><p>Let the height of the butterfly above the ground be 'H' m.</p><p>The height of the butterfly above the ground AD = (H  -  372) m. </p><p>Tan 30&deg; = (H  -  372)/BC</p><p>1/&radic;3 = (H  -  372)/BC </p><p>BC = (H  -  372) &radic;3 .. (i)</p><p>BC = DE = (H  -  372) &radic;3</p><p>Tan 60&deg; = H/DE</p><p>&radic;3 = H/DE </p><p>DE = H/&radic;3 ... (ii)</p><p>From (i) and (ii) </p><p>(H  -  372) &radic;3 = H/&radic;3 </p><p>3H  -  3 * 372 = H </p><p>2H = 3 * 372 </p><p>H = 558 m</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A 4.2 m tall boy is 31&radic;3 m away from a shopping mall. The angle of elevation from his eye to the top of the shopping mall is 60&deg;. The height of the shopping mall is:</p></span><span class=\"hqt\" style=\"display:none\"><p>4.2 &#2350;&#2368;&#2335;&#2352; &#2354;&#2306;&#2348;&#2366; &#2319;&#2325; &#2354;&#2337;&#2364;&#2325;&#2366; &#2358;&#2377;&#2346;&#2367;&#2306;&#2327; &#2350;&#2377;&#2354; &#2360;&#2375; 31&radic;3 &#2350;&#2368;&#2335;&#2352; &#2342;&#2370;&#2352; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2368; &#2310;&#2305;&#2326; &#2360;&#2375; &#2358;&#2377;&#2346;&#2367;&#2306;&#2327; &#2350;&#2377;&#2354; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 60&deg; &#2361;&#2376;&#2404; &#2358;&#2377;&#2346;&#2367;&#2306;&#2327; &#2350;&#2377;&#2354; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">88.8 m</span><span class=\"hqt\" style=\"display:none\">88.8 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">97.2 m</span><span class=\"hqt\" style=\"display:none\">97.2 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">97.2&radic;3 m</span><span class=\"hqt\" style=\"display:none\">97.2&radic;3 &#2350;&#2368;</span>",
      "<span class=\"eqt\">88.8&radic;3 m</span><span class=\"hqt\" style=\"display:none\">88.8&radic;3 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=208 height=130 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27478/image002.png\"></p><p>AD = (AB + BD) = Height of shopping mall</p><p>BD = CE</p><p>CE = Height of boy</p><p>ED = Distance between boy and shopping mall</p><p>tan 60&deg; = AB/BC</p><p>&radic;3 = AB/31&radic;3</p><p>AB = 93 m</p><p>AD = 93 + 4.2 = 97.2 m</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The length of the shadow on the ground of a tall cell tower of height 32&radic;3 m is 96 m. What is the angle (in degrees) of elevation of the sun?</p></span><span class=\"hqt\" style=\"display:none\"><p>32&radic;3 &#2350;&#2368;&#2335;&#2352; &#2314;&#2305;&#2330;&#2375; &#2360;&#2375;&#2354; &#2335;&#2366;&#2357;&#2352; &#2325;&#2368; &#2332;&#2364;&#2350;&#2368;&#2344; &#2346;&#2352; &#2331;&#2366;&#2351;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 96 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2404; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; (&#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">90&deg;</span><span class=\"hqt\" style=\"display:none\">90&deg;</span>",
      "<span class=\"eqt\">45&deg;</span><span class=\"hqt\" style=\"display:none\">45&deg;</span>",
      "<span class=\"eqt\">30&deg;</span><span class=\"hqt\" style=\"display:none\">30&deg;</span>",
      "<span class=\"eqt\">60&deg;</span><span class=\"hqt\" style=\"display:none\">60&deg;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=166 height=110 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27478/image003.png\"></p><p>AB = Height of cell tower</p><p>BC = Shadow of tower</p><p>Let the angle be 'X'.</p><p>tan X = AB/BC</p><p>tan X = 32&radic;3/96</p><p>tan X = 1/&radic;3 = 30&deg;</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A kite is flying in the sky with its string fully extended to 318 m, making an angle of 45&deg; with the ground. Find the height (in m) at which the kite is flying.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2340;&#2306;&#2327; &#2309;&#2346;&#2344;&#2368; &#2337;&#2379;&#2352;&#2368; &#2325;&#2379; 318 &#2350;&#2368;&#2335;&#2352; &#2340;&#2325; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2347;&#2376;&#2354;&#2366;&#2325;&#2352; &#2310;&#2360;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2313;&#2337;&#2364; &#2352;&#2361;&#2368; &#2361;&#2376;, &#2332;&#2379; &#2332;&#2364;&#2350;&#2368;&#2344; &#2360;&#2375; 45&deg; &#2325;&#2366; &#2325;&#2379;&#2339; &#2348;&#2344;&#2366; &#2352;&#2361;&#2368; &#2361;&#2376;&#2404; &#2346;&#2340;&#2306;&#2327; &#2332;&#2367;&#2360; &#2314;&#2305;&#2330;&#2366;&#2312; (&#2350;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2346;&#2352; &#2313;&#2337;&#2364; &#2352;&#2361;&#2368; &#2361;&#2376;, &#2313;&#2360;&#2375; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">318&radic;2</span><span class=\"hqt\" style=\"display:none\">318&radic;2</span>",
      "<span class=\"eqt\">106&radic;3</span><span class=\"hqt\" style=\"display:none\">106&radic;3</span>",
      "<span class=\"eqt\">318&radic;3</span><span class=\"hqt\" style=\"display:none\">318&radic;3</span>",
      "<span class=\"eqt\">159&radic;2</span><span class=\"hqt\" style=\"display:none\">159&radic;2</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=201 height=98 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27478/image004.png\"></p><p>AC = Length of string</p><p>AB = height at which the kite is flying</p><p>sin 45&deg; = AB/AC</p><p>1/&radic;2 = AB/ 318</p><p>AB = 159&radic;2 m</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A 93-meter-long bamboo is leaning against a wall, forming a 60&deg; angle with the floor. What is the horizontal distance between the base of bamboo and the wall?</p></span><span class=\"hqt\" style=\"display:none\"><p>93 &#2350;&#2368;&#2335;&#2352; &#2354;&#2306;&#2348;&#2366; &#2319;&#2325; &#2348;&#2366;&#2306;&#2360; &#2342;&#2368;&#2357;&#2366;&#2352; &#2325;&#2375; &#2360;&#2361;&#2366;&#2352;&#2375; &#2335;&#2367;&#2325;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;, &#2332;&#2379; &#2347;&#2352;&#2381;&#2358; &#2360;&#2375; 60 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2325;&#2366; &#2325;&#2379;&#2339; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2348;&#2366;&#2306;&#2360; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2324;&#2352; &#2342;&#2368;&#2357;&#2366;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2381;&#2359;&#2376;&#2340;&#2367;&#2332; &#2342;&#2370;&#2352;&#2368; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">46.5 m</span><span class=\"hqt\" style=\"display:none\">46.5 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">93&radic;2 m</span><span class=\"hqt\" style=\"display:none\">93&radic;2 &#2350;&#2368;</span>",
      "<span class=\"eqt\">62 m</span><span class=\"hqt\" style=\"display:none\">62 &#2350;&#2368;</span>",
      "<span class=\"eqt\">93/&radic;3 m</span><span class=\"hqt\" style=\"display:none\">93/&radic;3 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=205 height=97 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27478/image005.png\"></p><p>AC = Height of bamboo</p><p>BC = distance between the bamboo base and wall</p><p>cos 60&deg; = BC/AC</p><p>1/2 = BC/93</p><p>BC = 46.5 m</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Standing at point C on ground, a person observes the top of a building at an elevation angle of 45&deg;. If the horizontal distance from point C to the base of the building is 420 meters, determine 35% of the building's height.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2350;&#2368;&#2344; &#2346;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; C &#2346;&#2352; &#2326;&#2337;&#2364;&#2375; &#2361;&#2379;&#2325;&#2352;, &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; 45&deg; &#2325;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; &#2346;&#2352; &#2319;&#2325; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2379; &#2342;&#2375;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2348;&#2367;&#2306;&#2342;&#2369; C &#2360;&#2375; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2340;&#2325; &#2325;&#2368; &#2325;&#2381;&#2359;&#2376;&#2340;&#2367;&#2332; &#2342;&#2370;&#2352;&#2368; 420 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2366; 35% &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">294 m</span><span class=\"hqt\" style=\"display:none\">294 &#2350;&#2368;</span>",
      "<span class=\"eqt\">147 m</span><span class=\"hqt\" style=\"display:none\">147 &#2350;&#2368;</span>",
      "<span class=\"eqt\">189 m</span><span class=\"hqt\" style=\"display:none\">189 &#2350;&#2368;</span>",
      "<span class=\"eqt\">273 m</span><span class=\"hqt\" style=\"display:none\">273 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=205 height=102 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27478/image006.png\"></p><p>AB = Height of the building</p><p>BC = Distance between point C and building</p><p>tan 45&deg; = AB/BC</p><p>1 = AB/420</p><p>AB = 420 m</p><p>Hence, 35% of AB = 420 * 35/100</p><p>= 147 m</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Two phone towers stand at different Points, one measuring 23 meters and the other 60.5 meters. A wire is stretched between their tops, forming an angle of 60&deg; with the horizontal. Given this information, determine the length of the wire connecting the tops of the two towers.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2347;&#2364;&#2379;&#2344; &#2335;&#2366;&#2357;&#2352; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2346;&#2352; &#2326;&#2337;&#2364;&#2375; &#2361;&#2376;&#2306;, &#2319;&#2325; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 23 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2368; 60.5 &#2350;&#2368;&#2335;&#2352;&#2404; &#2313;&#2344;&#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2340;&#2366;&#2352; &#2347;&#2376;&#2354;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;, &#2332;&#2379; &#2325;&#2381;&#2359;&#2376;&#2340;&#2367;&#2332; &#2360;&#2375; 60&deg; &#2325;&#2366; &#2325;&#2379;&#2339; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2361; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;, &#2342;&#2379; &#2335;&#2366;&#2357;&#2352;&#2379;&#2306; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2340;&#2366;&#2352; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">37.5&radic;3 m</span><span class=\"hqt\" style=\"display:none\">37.5&radic;3 &#2350;&#2368;</span>",
      "<span class=\"eqt\">25/&radic;3 m</span><span class=\"hqt\" style=\"display:none\">25/&radic;3 &#2350;&#2368;</span>",
      "<span class=\"eqt\">25&radic;3 m</span><span class=\"hqt\" style=\"display:none\">25&radic;3 &#2350;&#2368;</span>",
      "<span class=\"eqt\">37.5/&radic;3 m</span><span class=\"hqt\" style=\"display:none\">37.5/&radic;3 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=208 height=130 id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27478/image007.jpg\"></p><p>AD = 60.5 m</p><p>CE = BD = 23 m</p><p>AB = 60.5  -  23 = 37.5 m</p><p>AC = length of the wire</p><p>sin 60&deg; = AB/AC</p><p>&radic;3/2 = 37.5/AC</p><p>AC = 25&radic;3 m</p>",
    "question_index": 6

    "question": "<span class=\"eqt\"><p>A long ladder is leaning against a wall, forming an angle &#952; with the ground. It is given that cosec &#952; = 85/84. Additionally, the foot of the ladder is positioned 10.4 meters away from the base of the wall. Based on this information, determine the height at which the top of the ladder touches the wall.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2354;&#2306;&#2348;&#2368; &#2360;&#2368;&#2338;&#2364;&#2368; &#2342;&#2368;&#2357;&#2366;&#2352; &#2325;&#2375; &#2360;&#2361;&#2366;&#2352;&#2375; &#2335;&#2367;&#2325;&#2368; &#2361;&#2369;&#2312; &#2361;&#2376;, &#2332;&#2379; &#2332;&#2364;&#2350;&#2368;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; &#952; &#2325;&#2366; &#2325;&#2379;&#2339; &#2348;&#2344;&#2366; &#2352;&#2361;&#2368; &#2361;&#2376;&#2404; &#2351;&#2361; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; cosec &#952; = 85/84 &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2375; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340;, &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2366; &#2346;&#2376;&#2352; &#2342;&#2368;&#2357;&#2366;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2360;&#2375; 10.4 &#2350;&#2368;&#2335;&#2352; &#2342;&#2370;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404; &#2311;&#2360; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, &#2357;&#2361; &#2314;&#2305;&#2330;&#2366;&#2312; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2360; &#2346;&#2352; &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2366; &#2358;&#2368;&#2352;&#2381;&#2359; &#2342;&#2368;&#2357;&#2366;&#2352; &#2325;&#2379; &#2331;&#2370;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",

    "solution": "<p><img width=205 height=98 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27478/image008.png\"></p><p>AB = Perpendicular, BC = Base, AC = Hypotenuse</p><p>sin &#952; = 1/cosec &#952;</p><p>sin &#952; = 84/85 = AB/AC</p><p>cos<sup>2</sup>&#952; = 1  -  sin<sup>2</sup> &#952;</p><p>cos<sup>2</sup>&#952; = 1  -  (84/85)<sup>2</sup></p><p>cos<sup>2</sup>&#952; = 169/7225 = 13/85 = BC/AC</p><p>13/85 = 10.4/AC</p><p>AC = 68 m</p><p>sin 84/85 = AB/AC</p><p>84/85 = AB/68</p><p>AB = 67.2 m</p>",

    "question": "<span class=\"eqt\"><p>A person with a height of 3.2 meters is standing at a distance of 34.5&radic;3 meters from the base of a tree. The person observes the top of the tree at an angle of elevation of 30&deg; from his eye level. Given this information, determine the total height of the tree in meters.</p></span><span class=\"hqt\" style=\"display:none\"><p>3.2 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2319;&#2325; &#2346;&#2375;&#2337;&#2364; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2360;&#2375; 34.5&radic;3 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2326;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404; &#2357;&#2361; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2309;&#2346;&#2344;&#2368; &#2310;&#2306;&#2326;&#2379;&#2306; &#2325;&#2375; &#2360;&#2381;&#2340;&#2352; &#2360;&#2375; 30&deg; &#2325;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; &#2346;&#2352; &#2346;&#2375;&#2337;&#2364; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2379; &#2342;&#2375;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, &#2346;&#2375;&#2337;&#2364; &#2325;&#2368; &#2325;&#2369;&#2354; &#2314;&#2306;&#2330;&#2366;&#2312; &#2350;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">37.7 m</span><span class=\"hqt\" style=\"display:none\">37.7 &#2350;&#2368;</span>",
      "<span class=\"eqt\">32.3 m</span><span class=\"hqt\" style=\"display:none\">32.3 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">30.5 m</span><span class=\"hqt\" style=\"display:none\">30.5 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">14.5 m</span><span class=\"hqt\" style=\"display:none\">14.5 &#2350;&#2368;&#2335;&#2352;</span>"

    "correct_option_id": 0,
    "solution": "<p><img width=214 height=134 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27478/image009.png\"></p><p>AD = (AB + BD) = Height of tree</p><p>BD = CE = Height of boy</p><p>BC = DE = Distance between boys and tree</p><p>tan 30&deg; = AB/BC</p><p>1/&radic;3 = AB/34.5&radic;3</p><p>AB = 34.5 m</p><p>AD = 34.5 + 3.2 = 37.7 m</p>",

    "question": "<span class=\"eqt\"><p>A 29-meter-long ladder is used to reach the ventilator of a house on one side of a street, which is located at a height of 4&radic;30 meters above the ground. Without changing the position of its foot, the ladder is then rotated to the opposite side, where it reaches another ventilator at a height of 6&radic;6 meters. The width of the street is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; 29 &#2350;&#2368;&#2335;&#2352; &#2354;&#2306;&#2348;&#2368; &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2360;&#2337;&#2364;&#2325; &#2325;&#2375; &#2319;&#2325; &#2340;&#2352;&#2347; &#2360;&#2381;&#2341;&#2367;&#2340; &#2328;&#2352; &#2325;&#2375; &#2357;&#2375;&#2306;&#2335;&#2367;&#2354;&#2375;&#2335;&#2352; &#2340;&#2325; &#2346;&#2361;&#2369;&#2306;&#2330;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2332;&#2350;&#2368;&#2344; &#2360;&#2375; 4&radic;30 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404; &#2309;&#2346;&#2344;&#2375; &#2346;&#2376;&#2352; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2379; &#2348;&#2342;&#2354;&#2375; &#2348;&#2367;&#2344;&#2366;, &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2379; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2328;&#2369;&#2350;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2361;&#2366;&#2306; &#2351;&#2361; 6&radic;6 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2346;&#2352; &#2319;&#2325; &#2309;&#2344;&#2381;&#2351; &#2357;&#2375;&#2306;&#2335;&#2367;&#2354;&#2375;&#2335;&#2352; &#2340;&#2325; &#2346;&#2361;&#2369;&#2306;&#2330;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2337;&#2364;&#2325; &#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">42 m</span><span class=\"hqt\" style=\"display:none\">42 &#2350;&#2368;</span>",
      "<span class=\"eqt\">44 m</span><span class=\"hqt\" style=\"display:none\">44 &#2350;&#2368;</span>",
      "<span class=\"eqt\">47 m</span><span class=\"hqt\" style=\"display:none\">47 &#2350;&#2368;</span>",
      "<span class=\"eqt\">41 m</span><span class=\"hqt\" style=\"display:none\">41 &#2350;&#2368;</span>"

    "correct_option_id": 1,
    "solution": "<p>Hypotenous<sup>2</sup> = Base<sup>2</sup> + Perpendicular<sup>2</sup> </p><p>Let the distance between foot of ladder and ventilator of the 1<sup>st</sup> house and the distance between the foot of ladder and ventilator of the 2<sup>nd</sup> house be 'X' m and 'Y' m respectively. </p><p>Let the height of the 1<sup>st</sup> ventilator and 2<sup>nd</sup> ventilator from the ground be 'P' m and 'Q' m respectively. </p><p>Let the height of the ladder be 'L'. </p><p>L<sup>2</sup> = X<sup>2</sup> + P<sup>2</sup></p><p>29<sup>2</sup>  -  (4&radic;30)<sup>2</sup> = X<sup>2</sup> </p><p>X<sup>2</sup> = 361 </p><p>X = 19 m</p><p>L<sup>2</sup> = Y<sup>2</sup> + P<sup>2</sup></p><p>Y<sup>2</sup> = 29<sup>2</sup>  -  (6&radic;6)<sup>2</sup></p><p>Y<sup>2</sup> = 625 </p><p>Y = 25 m</p><p>Hence, the width of street = 19 + 25 = 44 m</p>",
    "question_index": 9

    "question": "<span class=\"eqt\"><p>Two points, K and L, are located along the same straight line from the base of a tall building. The distances of these points from the building are 128 meters and 98 meters, respectively. The angles of elevation from these points to the top of the building are complementary. The height of the building is.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; K &#2324;&#2352; L &#2319;&#2325; &#2314;&#2306;&#2330;&#2368; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2360;&#2375; &#2319;&#2325; &#2361;&#2368; &#2360;&#2368;&#2343;&#2368; &#2352;&#2375;&#2326;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2311;&#2350;&#2366;&#2352;&#2340; &#2360;&#2375; &#2311;&#2344; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 128 &#2350;&#2368;&#2335;&#2352; &#2324;&#2352; 98 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2404; &#2311;&#2344; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2360;&#2375; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2340;&#2325; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; &#2346;&#2370;&#2352;&#2325; &#2361;&#2376;&#2306;&#2404; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">113 m</span><span class=\"hqt\" style=\"display:none\">113 &#2350;&#2368;</span>",
      "<span class=\"eqt\">109 m</span><span class=\"hqt\" style=\"display:none\">109 &#2350;&#2368;</span>",
      "<span class=\"eqt\">112 m</span><span class=\"hqt\" style=\"display:none\">112 &#2350;&#2368;</span>",
      "<span class=\"eqt\">104 m</span><span class=\"hqt\" style=\"display:none\">104 &#2350;&#2368;</span>"

    "correct_option_id": 2,
    "solution": "<p>Complementary angle = Two angles whose sum is 90 degrees.</p><p>Let the angle made by point K be &#952;.</p><p>The angle made by point L = 90&deg; - &#952;</p><p>tan &#952; = P/B = P/128 [P = perpendicular and B = Base]</p><p>tan (90&deg; - &#952;) = P/98</p><p>cot &#952; = P/98 [tan (90&deg; - &#952;) = cot &#952;]</p><p>1/tan &#952; = P/98 [cot &#952; = 1/tan &#952;]</p><p>1/(P/128) = P/98</p><p>128/P = P/98</p><p>P<sup>2</sup> = 12544</p><p>P = 112 m</p><p>Hence, the height of the building = 112 m</p>",
    "question_index": 10

    "question": "<span class=\"eqt\"><p>A vertical pole stands on level ground, casting a shadow due to sunlight. As the altitude of the sun increases from 45&deg; to 60&deg;, the length of the pole's shadow decreases by 11.2 meters. Find the height of the tower in meters.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2368;&#2343;&#2366; &#2326;&#2306;&#2349;&#2366; &#2360;&#2350;&#2340;&#2354; &#2332;&#2350;&#2368;&#2344; &#2346;&#2352; &#2326;&#2337;&#2364;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2331;&#2366;&#2351;&#2366; &#2348;&#2344;&#2366; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404; &#2332;&#2376;&#2360;&#2375;-&#2332;&#2376;&#2360;&#2375; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 45 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2360;&#2375; 60 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2340;&#2325; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2376;, &#2326;&#2306;&#2349;&#2375; &#2325;&#2368; &#2331;&#2366;&#2351;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 11.2 &#2350;&#2368;&#2335;&#2352; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2350;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306; &#2335;&#2366;&#2357;&#2352; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">11.2/(&radic;3  -  1) m</span><span class=\"hqt\" style=\"display:none\">11.2/(&radic;3 - 1) &#2350;&#2368;</span>",
      "<span class=\"eqt\">11.2&radic;3/(&radic;3 + 1) m</span><span class=\"hqt\" style=\"display:none\">11.2&radic;3/(&radic;3 + 1) &#2350;&#2368;</span>",
      "<span class=\"eqt\">11.2/(&radic;3 + 1) m</span><span class=\"hqt\" style=\"display:none\">11.2/(&radic;3 + 1) &#2350;&#2368;</span>",
      "<span class=\"eqt\">11.2&radic;3/(&radic;3  -  1) m</span><span class=\"hqt\" style=\"display:none\">11.2&radic;3/(&radic;3 - 1) &#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the height of the tower and initial shadow of the tower be 'T' m, and 'S' m respectively.</p><p>New shadow = (S  -  11.2) m</p><p>tan &#952; = Perpendicular/ Base</p><p>tan 45&deg; = T/S</p><p>1 = T/S</p><p>T = S .. (i)</p><p>tan 60&deg; = T/(S  -  11.2)</p><p>&radic;3 = S/(S  -  11.2)</p><p>S&radic;3  -  11.2&radic;3 = S</p><p>S (&radic;3  -  1) = 11.2&radic;3</p><p>S = 11.2&radic;3/(&radic;3  -  1) m = T</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Two points, A and B, are located on the same side of a tower and are 82 meters apart from each other. The angles of elevation from A and B to the top of the tower are 45&deg; and 60&deg;, respectively. Find the height of the tower.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; A &#2324;&#2352; B &#2319;&#2325; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2375; &#2319;&#2325; &#2361;&#2368; &#2340;&#2352;&#2347; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2306; &#2324;&#2352; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2375; 82 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;&#2306;&#2404; A &#2324;&#2352; B &#2360;&#2375; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 45&deg; &#2324;&#2352; 60&deg; &#2361;&#2376;&#2306;&#2404; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">82&radic;3/(&radic;3  -  1) m</span><span class=\"hqt\" style=\"display:none\">82&radic;3/(&radic;3 - 1) &#2350;&#2368;</span>",
      "<span class=\"eqt\">82/(&radic;3  -  1) m</span><span class=\"hqt\" style=\"display:none\">82/(&radic;3 - 1) &#2350;&#2368;</span>",
      "<span class=\"eqt\">82&radic;3/(&radic;3 + 1) m</span><span class=\"hqt\" style=\"display:none\">82&radic;3/(&radic;3 + 1) &#2350;&#2368;</span>",
      "<span class=\"eqt\">82/(&radic;3  +  1) m</span><span class=\"hqt\" style=\"display:none\">82/(&radic;3 + 1) &#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the distance between the tower and point A be 'a' m.</p><p>The distance from the tower and point B = a  -  82 m [angle increased so, distance decreased]</p><p>Let the height of the tower be 'H' m</p><p>From point A (where the angle of elevation is 45&deg;),</p><p>tan 45&deg; = H/a</p><p>1/ = H/a</p><p>a = H</p><p>From point B (where the angle of elevation is 60&deg;),</p><p>tan 60&deg; = H/(a  -  82)</p><p>&radic;3 = H/(a  -  82)</p><p>a&radic;3 - 82&radic;3 = H</p><p>H&radic;3  -  H = 82&radic;3</p><p>H (&radic;3  -  1) = 82&radic;3</p><p>H = 82&radic;3/(&radic;3  -  1) m</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>As a ship sails directly toward a lighthouse that stands 72 meters above the river, the angle of depression observed from the top of the lighthouse changes from 30&deg; to 60&deg;. Determine the distance the ship travels during this period of observation.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2325;&#2379;&#2312; &#2332;&#2361;&#2366;&#2332; &#2344;&#2342;&#2368; &#2360;&#2375; 72 &#2350;&#2368;&#2335;&#2352; &#2314;&#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2354;&#2366;&#2311;&#2335;&#2361;&#2366;&#2313;&#2360; &#2325;&#2368; &#2323;&#2352; &#2360;&#2368;&#2343;&#2375; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2354;&#2366;&#2311;&#2335;&#2361;&#2366;&#2313;&#2360; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2360;&#2375; &#2342;&#2375;&#2326;&#2366; &#2327;&#2351;&#2366; &#2309;&#2357;&#2344;&#2350;&#2344; &#2325;&#2379;&#2339; 30&deg; &#2360;&#2375; 60&deg; &#2340;&#2325; &#2348;&#2342;&#2354; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2309;&#2357;&#2354;&#2379;&#2325;&#2344; &#2325;&#2368; &#2311;&#2360; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2332;&#2361;&#2366;&#2332; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2351; &#2325;&#2368; &#2327;&#2312; &#2342;&#2370;&#2352;&#2368; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">24&radic;3 m</span><span class=\"hqt\" style=\"display:none\">24&radic;3 &#2350;&#2368;</span>",
      "<span class=\"eqt\">48&radic;3 m</span><span class=\"hqt\" style=\"display:none\">48&radic;3 &#2350;&#2368;</span>",
      "<span class=\"eqt\">32&radic;3 m</span><span class=\"hqt\" style=\"display:none\">32&radic;3 &#2350;&#2368;</span>",
      "<span class=\"eqt\">72&radic;3 m</span><span class=\"hqt\" style=\"display:none\">72&radic;3 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the distance between the lighthouse and the ship when angles, 30&deg; and 60&deg; be 'X' m and 'Y' m respectively. </p><p>Tan 30&deg; = 72/X </p><p>1/&radic;3 = 72/X </p><p>X = 72&radic;3 m</p><p>Tan 60&deg; = 72/Y</p><p>&radic;3 = 72/Y </p><p>Y&radic;3 = 72 </p><p>Y = 72/&radic;3 </p><p>Y = 24&radic;3 m</p><p>Hence, distance traveled = 72&radic;3 - 24&radic;3 = 48&radic;3 m </p>",
    "question_index": 13

    "question": "<span class=\"eqt\"><p>A vertical pole and a vertical tower stand on the same level of ground. From the top of the pole, the angle of elevation to the top of the tower is 60&deg;, and the angle of depression to the bottom of the tower is 30&deg;. Given that the height of the tower is 276 meters, determine the height of the pole. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2326;&#2306;&#2349;&#2366; &#2324;&#2352; &#2319;&#2325; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2350;&#2368;&#2344;&#2366;&#2352; &#2332;&#2350;&#2368;&#2344; &#2325;&#2375; &#2319;&#2325; &#2361;&#2368; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2326;&#2337;&#2364;&#2375; &#2361;&#2376;&#2306;&#2404; &#2326;&#2306;&#2349;&#2375; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2360;&#2375;, &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 60&deg; &#2361;&#2376;, &#2324;&#2352; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2375; &#2340;&#2354; &#2325;&#2366; &#2309;&#2357;&#2344;&#2350;&#2344; &#2325;&#2379;&#2339; 30&deg; &#2361;&#2376;&#2404; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 276 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;, &#2326;&#2306;&#2349;&#2375; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404; </p></span>",
    "options": [

    "solution": "<p>Let the height of the pole be 'H' m.</p><p>Let the distance between the pole and the tower = 'D' m</p><p>tan30&deg; = H/D</p><p>1/&radic;3 = H/D</p><p>H&radic;3 = D</p><p>tan 60&deg; = (276  -  H) /D</p><p>&radic;3 = (276  -  H) /D</p><p>&radic;3 = (276  -  H)/H&radic;3</p><p>&radic;3  X  H&radic;3 = 276  -  H</p><p>3H + H = 276</p><p>H = 69 m</p>",

  {
    "question": "<span class=\"eqt\"><p>A tower with a height of 36&radic;3 meters stands on level ground. The angles of elevation from two points ( p and q )located on opposite sides of the tower to its top are 45&deg; and 30&deg;, respectively. What is the distance between these two points?</p></span><span class=\"hqt\" style=\"display:none\"><p>36&radic;3 &#2350;&#2368;&#2335;&#2352; &#2314;&#2305;&#2330;&#2368; &#2319;&#2325; &#2350;&#2368;&#2344;&#2366;&#2352; &#2360;&#2350;&#2340;&#2354; &#2349;&#2370;&#2350;&#2367; &#2346;&#2352; &#2326;&#2337;&#2364;&#2368; &#2361;&#2376;&#2404; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2342;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; (p &#2324;&#2352; q) &#2360;&#2375; &#2311;&#2360;&#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 45&deg; &#2324;&#2352; 30&deg; &#2361;&#2376;&#2306;&#2404; &#2311;&#2344; &#2342;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">18 (2&radic;3 + 3) m</span><span class=\"hqt\" style=\"display:none\">18 (2&radic;3 + 3) &#2350;&#2368;</span>",

      "<span class=\"eqt\">36 (&radic;3 + 3) m</span><span class=\"hqt\" style=\"display:none\">36 (&radic;3 + 3) &#2350;&#2368;</span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>Let the distance between Tower and Respective points p and q when angles, 45&deg; and 30&deg; be 'P' m and 'Q' respectively.</p><p>tan 45&deg; = 36&radic;3/P</p><p>1 = 36&radic;3 /P</p><p>P = 36&radic;3 m</p><p>tan 30&deg; = 36&radic;3/Q</p><p>1/&radic;3 = 36&radic;3/Q</p><p>Q = 108 m</p><p>Hence, distance between p and q = 36&radic;3 + 108 = 36 (&radic;3 + 3) m</p>",
    "question_index": 15

&#2325;&#2379;&#2339; &#952; &#2361;&#2376;&#2404; (&radic;3 = 1.7 &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2375;&#2306;)</p></span>",

    "question": "<span class=\"eqt\"><p>A building has a height of 213 m. If it has an angle of depression for two points on the ground on opposite sides 30&deg; and 60&deg; respectively, then find the distance between the two points.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 213 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2311;&#2360;&#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2342;&#2367;&#2358;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2332;&#2350;&#2368;&#2344; &#2346;&#2352; &#2342;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2357;&#2344;&#2350;&#2344; &#2325;&#2379;&#2339; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 30&deg; &#2324;&#2352; 60&deg; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>During a cyclone, a straight vertical tower broke at some point, causing its top to fall and touch the ground at a distance of 24 meters from its base. The fallen part of the tower forms an angle of 60&deg; with the horizontal ground. Find the original height of the tower before it broke.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2325;&#2381;&#2352;&#2357;&#2366;&#2340; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2319;&#2325; &#2360;&#2368;&#2343;&#2368; &#2326;&#2337;&#2364;&#2368; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2367;&#2360;&#2368; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2335;&#2370;&#2335; &#2327;&#2312;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2313;&#2360;&#2325;&#2366; &#2358;&#2368;&#2352;&#2381;&#2359; &#2327;&#2367;&#2352; &#2327;&#2351;&#2366; &#2324;&#2352; &#2309;&#2346;&#2344;&#2375; &#2310;&#2343;&#2366;&#2352; &#2360;&#2375; 24 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2332;&#2350;&#2368;&#2344; &#2325;&#2379; &#2331;&#2370; &#2327;&#2351;&#2366;&#2404; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2366; &#2327;&#2367;&#2352;&#2366; &#2361;&#2369;&#2310; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2381;&#2359;&#2376;&#2340;&#2367;&#2332; &#2332;&#2350;&#2368;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341; 60&deg; &#2325;&#2366; &#2325;&#2379;&#2339; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2335;&#2370;&#2335;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2368; &#2350;&#2370;&#2354; &#2314;&#2306;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">24 (2&radic;3 + 1) m</span><span class=\"hqt\" style=\"display:none\">24 (2&radic;3 + 1) &#2350;&#2368;</span>",

    "correct_option_id": 2,
    "solution": "<p>Let the length of the fallen part be 'H' m (hypotenuse)</p><p>cos 60&deg; = 24/H</p><p>1/2 = 24/H</p><p>H = 48 m</p><p>Let the height of the remaining part be 'X' m</p><p>sin 60&deg; = X/H</p><p>&radic;3/2 = X/48</p><p>X = 24&radic;3 m</p><p>Hence, the original height of the tower = 48 + 24&radic;3 m</p>",

    "question": "<span class=\"eqt\"><p>A construction company is working on an unfinished skyscraper. From a point 198 meters away from its base, the angle of elevation to the current top of the skyscraper is 30&deg;. The company plans to increase the height of the building so that, from the same observation point, the new angle of elevation to the top will be 60&deg;. Determine how much additional height must be added to the skyscraper. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2306;&#2346;&#2344;&#2368; &#2319;&#2325; &#2309;&#2343;&#2370;&#2352;&#2375; &#2327;&#2327;&#2344;&#2330;&#2369;&#2306;&#2348;&#2368; &#2311;&#2350;&#2366;&#2352;&#2340; &#2346;&#2352; &#2325;&#2366;&#2350; &#2325;&#2352; &#2352;&#2361;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2360;&#2375; 198 &#2350;&#2368;&#2335;&#2352; &#2342;&#2370;&#2352; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375;, &#2327;&#2327;&#2344;&#2330;&#2369;&#2306;&#2348;&#2368; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2375; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2358;&#2368;&#2352;&#2381;&#2359; &#2346;&#2352; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 30&deg; &#2361;&#2376;&#2404; &#2325;&#2306;&#2346;&#2344;&#2368; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2325;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2348;&#2344;&#2366; &#2352;&#2361;&#2368; &#2361;&#2376; &#2340;&#2366;&#2325;&#2367;, &#2313;&#2360;&#2368; &#2309;&#2357;&#2354;&#2379;&#2325;&#2344; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375;, &#2358;&#2368;&#2352;&#2381;&#2359; &#2346;&#2352; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2366; &#2344;&#2351;&#2366; &#2325;&#2379;&#2339; 60&deg; &#2361;&#2379;&#2404; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2327;&#2327;&#2344;&#2330;&#2369;&#2306;&#2348;&#2368; &#2311;&#2350;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2314;&#2306;&#2330;&#2366;&#2312; &#2332;&#2379;&#2337;&#2364;&#2368; &#2332;&#2366;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404; </p></span>",

    "correct_option_id": 3,
    "solution": "<p>Let the current height and final height of the skyscraper be 'X' m and 'Y' m respectively.</p><p>tan 30&deg; = Perpendicular/ Base</p><p>1/&radic;3 = X/198</p><p>X = 198/&radic;3 m</p><p>tan 60&deg; = Y/198</p><p>&radic;3 = Y/198</p><p>Y = 198&radic;3 m</p><p>Hence, the additional height = 198&radic;3  -  198/&radic;3</p><p>= (594  -  198)/&radic;3</p><p>= 396/&radic;3</p><p>= 132&radic;3 m</p>",
