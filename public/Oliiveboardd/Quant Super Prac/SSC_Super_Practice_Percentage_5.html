    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A certain amount of money was lent for a period of 1 year 9 months at a rate of 10% per annum compounded annually. If the compound interest is Rs.1,460, find the amount of money lent.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; 10% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 1 &#2357;&#2352;&#2381;&#2359; 9 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2368; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2343;&#2366;&#2352; &#2342;&#2368; &#2327;&#2312;&#2404; &#2351;&#2342;&#2367; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2352;&#2369;.1,460 &#2361;&#2376;, &#2340;&#2379; &#2313;&#2343;&#2366;&#2352; &#2342;&#2368; &#2327;&#2312; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 8,200</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 8,200</span>",
      "<span class=\"eqt\">Rs. 7,500</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 7,500</span>",
      "<span class=\"eqt\">Rs. 6,000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 6,000</span>",
      "<span class=\"eqt\">Rs. 8,000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 8,000</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the amount of money lent = 100x</p><p>Interest amount at the end of 1 year = (100x * 10 * 1)/100 = 10x</p><p>Total amount at the end of 1 year = 100x + 10x = 110x</p><p>Interest amount for the next 9 months = (110x * 10 * 9)/(100 * 12) = 33x/4</p><p>Total interest amount for 1 year 9 months = 10x + 33x/4 = 1460</p><p>73x/4 = 1460</p><p>x = 80</p><p>Amount of money lent = 100x</p><p>= &#8377;8000</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><div>&nbsp;The compound interest on a certain sum at 10&percnt; p.a. for 2<div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>3</span></div> years is Rs. 1,201.60 , where interest is compounded yearly. The sum is&#58;&nbsp;</div></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 10% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; 2 1/3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; 1,201.60 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2332;&#2361;&#2366;&#2305; &#2348;&#2381;&#2351;&#2366;&#2332; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 4,200</span><span class=\"hqt\" style=\"display:none\">4,200 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 4,800</span><span class=\"hqt\" style=\"display:none\">4,800 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 5,400</span><span class=\"hqt\" style=\"display:none\">5,400 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 4,500</span><span class=\"hqt\" style=\"display:none\">4,500 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Rate for first 2 years = 10%</p><p>Rate for 1/3 years = (10/3) %</p><p>Compound interest = Rs.1201.60</p><p>1201.60 + P = P * (1 + 10/100) * (1 + 10/100) * (1 + 1/30)</p><p>1201.60 + P = P * (11/10) * (11/10) * (31/30)</p><p>1201.60 = (3751P/3000)  -  P</p><p>1201.60 = 751P/3000</p><p>P = 1201.60 * 3000/751</p><p>P = Rs.4800</p><p>Alternate method:</p><p><img width=95 height=71 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19217/image052.png\"></p><p>3751  -  3000 = 751 units</p><p>751 unit = 1201.60</p><p>1 unit = 1201.6/751</p><p>3000 unit = (1201.60 * 3000/751) = Rs.4800</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The simple interest on a sum of money at 10% per annum for 2 years is &#8377;8,100. What would be the compound interest (in &#8377;) on the same sum for the same period at 15% p.a, when the interest is compounded yearly? (nearest to &#8377; 1)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 2 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; 10% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#8377;8,100 &#2361;&#2376;, &#2340;&#2379; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2375; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2360;&#2350;&#2366;&#2344; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2366;&#2344; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 15% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; (&#8377; &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;? (&#8377;1 &#2325;&#2375; &#2344;&#2367;&#2325;&#2335;&#2340;&#2350;)</p></span>",
    "options": [
      "<span class=\"eqt\">13,061</span><span class=\"hqt\" style=\"display:none\">13,061</span>",
      "<span class=\"eqt\">8,100</span><span class=\"hqt\" style=\"display:none\">8,100</span>",
      "<span class=\"eqt\">14,671</span><span class=\"hqt\" style=\"display:none\">14,671</span>",
      "<span class=\"eqt\">12,751</span><span class=\"hqt\" style=\"display:none\">12,751</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the sum = P</p><p>According to the question:</p><p>(P * 2 * 10)/100 = 8100</p><p>P = &#8377;40500</p><p>Let compound interest amount = 'C'</p><p>According to the question:</p><p>= 40500 * (1 + 15/100)<sup>2</sup>  -  40500</p><p>= 53561.25  -  40500</p><p>= &#8377;13061.25</p><p>= &#8377;13061</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What is the compound interest on &#8377;20,000 for 9 months at the rate of 4% per annum, when interest is compounded quarterly?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2348;&#2381;&#2351;&#2366;&#2332; &#2340;&#2367;&#2350;&#2366;&#2361;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; 20,000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2352; 9 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 4% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;610</span><span class=\"hqt\" style=\"display:none\">&#8377;610</span>",
      "<span class=\"eqt\">&#8377;606.02</span><span class=\"hqt\" style=\"display:none\">&#8377;606.02</span>",
      "<span class=\"eqt\">&#8377;609.05</span><span class=\"hqt\" style=\"display:none\">&#8377;609.05</span>",
      "<span class=\"eqt\">&#8377;605</span><span class=\"hqt\" style=\"display:none\">&#8377;605</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total quarters in a year = 4</p><p>Let the interest amount received = I</p><p>According to the question:</p><p><img width=199 height=89 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21037/image030.png\"></p><p><img width=183 height=49 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21037/image031.png\"></p><p><img width=161 height=49 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21037/image032.png\"></p><p><img width=143 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21037/image033.png\"></p><p>I = &#8377;606.02</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>&#8377;4,000 is given at 5% p.a. for one yearand interest is compounded half yearly. &#8377;2,000 is given at 40% p.a. compounded quarterly for 1 year. The total interest received is nearest to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#8377;4,000 &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; 5% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2342;&#2367;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2348;&#2381;&#2351;&#2366;&#2332; &#2309;&#2352;&#2381;&#2343;&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#8377;2,000 &#2340;&#2381;&#2352;&#2376;&#2350;&#2366;&#2360;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; 40% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; 1 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2369;&#2354; &#2348;&#2381;&#2351;&#2366;&#2332; &#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;1,130.70</span><span class=\"hqt\" style=\"display:none\">&#8377;1,130.70</span>",
      "<span class=\"eqt\">&#8377;1,333.30</span><span class=\"hqt\" style=\"display:none\">&#8377;1,333.30</span>",
      "<span class=\"eqt\">&#8377;1,444.40</span><span class=\"hqt\" style=\"display:none\">&#8377;1,444.40</span>",
      "<span class=\"eqt\">&#8377;1,888.80</span><span class=\"hqt\" style=\"display:none\">&#8377;1,888.80</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>For case 1:</p><p>R% = 5/2 = 2.5%</p><p>Time = 2 years</p><p><img width=215 height=49 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20646/image120.png\"></p><p><img width=163 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20646/image121.png\"></p><p><img width=125 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20646/image122.png\"></p><p><img width=69 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20646/image123.png\"></p><p><img width=75 height=17 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20646/image124.png\"></p><p>For case 2:</p><p>R = 40/4 = 10%</p><p>Time = 4</p><p><img width=221 height=49 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20646/image125.png\"></p><p><img width=140 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20646/image126.png\"></p><p><img width=107 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20646/image127.png\"></p><p><img width=75 height=17 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20646/image128.png\"></p><p>Total interest = 202.5 + 928.2 = Rs.1130.70</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Calculate the difference between the compound interest and the simple interest on a sum of &#8377;5,000 at the rate of 8% for 3 years. (to nearest &#8377;)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#8377;5,000 &#2325;&#2368; &#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 8% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2324;&#2352; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; (&#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#8377; &#2340;&#2325;)</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;108</span><span class=\"hqt\" style=\"display:none\">&#8377;108</span>",
      "<span class=\"eqt\">&#8377;105</span><span class=\"hqt\" style=\"display:none\">&#8377;105</span>",
      "<span class=\"eqt\">&#8377;102</span><span class=\"hqt\" style=\"display:none\">&#8377;102</span>",
      "<span class=\"eqt\">&#8377;99</span><span class=\"hqt\" style=\"display:none\">&#8377;99</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>P = 5000 Rs., R = 8%, T = 3 years</p><p>Simple interest = 5000 * 8 * 3/100 = 1200 Rs.</p><p>Compound interest = 5000[(1 + 8/100)<sup>3</sup>  -  1]</p><p>= 5000 *(19683  - 15625)/15625</p><p>= 5000 * 4058/15625</p><p>= 1298.56&#8776; 1299 Rs.</p><p>Required difference = 1299  -  1200 = 99 Rs.</p>",
    "question_index": 5

    "question": "<span class=\"eqt\"><p>Krishna invested a sum of &#8377;25,000 in two parts. He earned 11% p.a. simple interest on part 1 and 10% p.a. compound interest compounded annually on part 2. If the total interest received by him after 2 years is &#8377; 5,370, then find the sum invested on simple interest.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2371;&#2359;&#2381;&#2339;&#2366; &#2344;&#2375; &#2342;&#2379; &#2349;&#2366;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#8377; 25,000 &#2325;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2313;&#2360;&#2344;&#2375; &#2349;&#2366;&#2327; 1 &#2346;&#2352; 11% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2349;&#2366;&#2327; 2 &#2346;&#2352; 10% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; 2 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2313;&#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2369;&#2354; &#2348;&#2381;&#2351;&#2366;&#2332; &#8377; 5,370 &#2361;&#2376;, &#2340;&#2379; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;12,000</span><span class=\"hqt\" style=\"display:none\">&#8377;12,000</span>",
      "<span class=\"eqt\">&#8377;12,500</span><span class=\"hqt\" style=\"display:none\">&#8377;12,500</span>",
      "<span class=\"eqt\">&#8377;13,000</span><span class=\"hqt\" style=\"display:none\">&#8377;13,000</span>",
      "<span class=\"eqt\">&#8377;11,000</span><span class=\"hqt\" style=\"display:none\">&#8377;11,000</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let sum invested on simple interest = Rs. (25000  -  x) and sum invested on compound interest = Rs. x</p><p>So, (25000  -  x) * 11 * 2/100 + x * ((1 + 10/100) <sup>2</sup>  -  1) = 5370</p><p>=&gt; 5500  -  11x/50 + 21x/100 = 5370</p><p>=&gt; x/100 = 5500  -  5370 = 130</p><p>=&gt; x = 13000</p><p>So, sum invested on simple interest = 25000  -  13000 = Rs. 12000</p>",
    "question_index": 15
  },

    "question": "<span class=\"eqt\"><p>A certain amount of money becomes thrice in 5 years at compound interest. How many years it will take to become 9 times?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; 5 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360;&#2375; 9 &#2327;&#2369;&#2344;&#2366; &#2361;&#2379;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2357;&#2352;&#2381;&#2359; &#2354;&#2327;&#2375;&#2306;&#2327;&#2375;?</p></span>",

    "correct_option_id": 2,
    "solution": "<p>Let principal = P</p><p>Amount = 3P</p><p>P(1 + r/100)<sup>5</sup> = 3P</p><p>(1 + r/100)<sup>5</sup> = 3</p><p>For 9 times: </p><p>P(1 + r/100)<sup>t</sup> = 9P, </p><p>(1 + r/100)<sup>t</sup> = 9 = 3<sup>2</sup></p><p>(1 + r/100)<sup>t</sup> = (1 + r/100)<sup>5*2</sup></p><p>t = 10 years</p>",
    "question_index": 16

    "question": "<span class=\"eqt\"><p>In what time will a sum of &#8377;1,25,000 amount to &#8377;1,48,877 at 12% per annum, if interest is being compound half-yearly?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#8377;1,25,000 &#2325;&#2368; &#2319;&#2325; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2309;&#2352;&#2381;&#2343;-&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; 12% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#8377;1,48,877 &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",
