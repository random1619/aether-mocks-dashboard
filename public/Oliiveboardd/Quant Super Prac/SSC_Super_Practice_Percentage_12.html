<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Find the effective annual rate of interest corresponding to 8 % per annum compounded half yearly.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2352;&#2381;&#2343;&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; 8% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">16.64 %</span><span class=\"hqt\" style=\"display:none\">16.64 %</span>",
      "<span class=\"eqt\">4 %</span><span class=\"hqt\" style=\"display:none\">4 %</span>",
      "<span class=\"eqt\">8.16 %</span><span class=\"hqt\" style=\"display:none\">8.16 %</span>",
      "<span class=\"eqt\">6 %</span><span class=\"hqt\" style=\"display:none\">6 %</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Rate of interest = 8/2 = 4%</p><p>Effective annual rate = 4 + 4 + (4 x 4)/100 = 8.16%</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Amit takes a loan of Rs.1,20,000 for 4 years from a bank to purchase a new bike. The rate of interest applicable is 10% per annum and is compounded annually. How much money can he save on interest if he pays the remaining loan at completion of 2 years:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2350;&#2367;&#2340; &#2344;&#2375; &#2344;&#2312; &#2348;&#2366;&#2311;&#2325; &#2326;&#2352;&#2368;&#2342;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2376;&#2306;&#2325; &#2360;&#2375; 4 &#2360;&#2366;&#2354; &#2325;&#2375; &#2354;&#2367;&#2319; 1,20,000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2354;&#2379;&#2344; &#2354;&#2367;&#2351;&#2366;&#2404; &#2354;&#2366;&#2327;&#2370; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; 10% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2361;&#2376; &#2324;&#2352; &#2351;&#2361; &#2360;&#2366;&#2354;&#2366;&#2344;&#2366; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; 2 &#2360;&#2366;&#2354; &#2346;&#2370;&#2352;&#2375; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359; &#2354;&#2379;&#2344; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2357;&#2361; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2376;&#2360;&#2366; &#2348;&#2330;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.30492</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.30492</span>",
      "<span class=\"eqt\">Rs.25492</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.25492</span>",
      "<span class=\"eqt\">Rs.35200</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.35200</span>",
      "<span class=\"eqt\">Rs.25200</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.25200</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Total interest to be paid in 4 years = <img width=400 height=55 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20559/image004.png\"></p><p>If the entire remaining loan amount is paid at the completion of two years,</p><p>Interest paid = <img width=240 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20559/image005.png\"></p><p>Savings on interest paid = 55692  -  25200 = Rs.30492</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Compound interest received after 2 years on &#8377;26800 at (R  -  5)% rate of interest per annum compounded annually is &#8377;2747. Find the amount received on &#8377;21200 at R% rate of interest per annum compounded annually for 3 years.</p></span><span class=\"hqt\" style=\"display:none\"><p>(R - 5)% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#8377;26800 &#2346;&#2352; 2 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#8377;2747 &#2361;&#2376;&#2404; 3 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; R% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#8377;21200 &#2346;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;31137.4</span><span class=\"hqt\" style=\"display:none\">&#8377;31137.4</span>",
      "<span class=\"eqt\">&#8377;24748.6</span><span class=\"hqt\" style=\"display:none\">&#8377;24748.6</span>",
      "<span class=\"eqt\">&#8377;30145.5</span><span class=\"hqt\" style=\"display:none\">&#8377;30145.5</span>",
      "<span class=\"eqt\">&#8377;28217.2</span><span class=\"hqt\" style=\"display:none\">&#8377;28217.2</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Compound interest received after 2 years = 2747</p><p>26800 *[{1 + (R  -  5)/100}<sup>2</sup> - 1] = 2747</p><p>[{100 + (R  -  5)}<sup>2</sup> - 10000] = 27470000/26800 = 1025</p><p>R + 95 = 105</p><p>R = 10%</p><p>So, amount received on &#8377;221200 at 10% rate of interest per annum compounded annually for 3 years</p><p>= 21200 *{1 + 10/100}<sup>3</sup></p><p>= 21200 * 1331/1000</p><p>= &#8377;28217.2</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Find the compound interest received after 2.5 years at 16% rate of compound interest compounded annually on &#8377;40000.</p></span><span class=\"hqt\" style=\"display:none\"><p>'40000' &#2346;&#2352; 16% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2360;&#2375; 2.5 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;10408.56</span><span class=\"hqt\" style=\"display:none\">&#8377;10408.56</span>",
      "<span class=\"eqt\">&#8377;12590.84</span><span class=\"hqt\" style=\"display:none\">&#8377;12590.84</span>",
      "<span class=\"eqt\">&#8377;18129.92</span><span class=\"hqt\" style=\"display:none\">&#8377;18129.92</span>",
      "<span class=\"eqt\">&#8377;21346.05</span><span class=\"hqt\" style=\"display:none\">&#8377;21346.05</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Amount received after 2 years = 40000(1+16/100)<sup>2</sup> = 53824</p><p>Amount received after 2.5 years = = 53824 + 53824*16*6/(100*12) = &#8377;58129.92 </p><p>Compound interest received after 2.5 years = 58129.92  -  40000 = &#8377;18129.92</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Ashu borrowed an amount of Rs. 62500 for compound interest at 24% per annum. For every six months the interest will be added to principal amount. Then what is the total amount that Ashu should pay after 1.5 years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2358;&#2369; &#2344;&#2375; 24% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; 62500 &#2352;&#2369;&#2346;&#2351;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2367;&#2319;&#2404; &#2361;&#2352; &#2331;&#2361; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2348;&#2381;&#2351;&#2366;&#2332; &#2350;&#2370;&#2354; &#2352;&#2366;&#2358;&#2367; &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404; &#2340;&#2379; 1.5 &#2360;&#2366;&#2354; &#2348;&#2366;&#2342; &#2310;&#2358;&#2369; &#2325;&#2379; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2368; &#2352;&#2366;&#2358;&#2367; &#2330;&#2369;&#2325;&#2366;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 87808</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 87808</span>",
      "<span class=\"eqt\">Rs. 87826</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 87826</span>",
      "<span class=\"eqt\">Rs. 87818</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 87818</span>",
      "<span class=\"eqt\">Rs. 87842</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 87842</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Given, Time = 1.5 years</p><p>Rate of interest = 24% per annum = 12% per 6 months</p><p>By using the formula compound interest,</p><p>Amount = P(1+R/100)<sup>(T*n)</sup></p><p>=&gt; Amount = 62500 * (1 + 12/100)<sup>3/2 * 2</sup></p><p>=&gt; Amount = 62500 * (28/25)<sup>3</sup></p><p>=&gt; Amount = Rs. 87808</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A certain sum amounts to &#8377;3240 in two years and &#8377;3888 in three years at R% rate of compound interest. Find the rate of interest, when the interest is compounded annually.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2366;&#2358;&#2367; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; R% &#2342;&#2352; &#2346;&#2352; &#2342;&#2379; &#2360;&#2366;&#2354; &#2350;&#2375;&#2306; &#8377;3240 &#2324;&#2352; &#2340;&#2368;&#2344; &#2360;&#2366;&#2354; &#2350;&#2375;&#2306; &#8377;3888 &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;, &#2332;&#2348; &#2348;&#2381;&#2351;&#2366;&#2332; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">10%</span><span class=\"hqt\" style=\"display:none\">10%</span>",
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>",
      "<span class=\"eqt\">8%</span><span class=\"hqt\" style=\"display:none\">8%</span>",
      "<span class=\"eqt\">15%</span><span class=\"hqt\" style=\"display:none\">15%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to the question-</p><p>P(1 + R/100)<sup>2</sup> = 3240 ----(1)</p><p>P(1 + R/100)<sup>3</sup> = 3888 ----(2)</p><p>On dividing (2) by (1)  - </p><p>1 + R/100 = 3888/3240 = 6/5</p><p>R = 100/5</p><p>R = 20%</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find the difference between compound interest and simple interest obtained on Rs. 8000 invested at 20% rate of interest after 3 years.</p></span><span class=\"hqt\" style=\"display:none\"><p>20% &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2319; &#2327;&#2319; 8000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2352; 3 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2324;&#2352; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 124.4</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 124.4</span>",
      "<span class=\"eqt\">Rs. 115.8</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 115.8</span>",
      "<span class=\"eqt\">Rs. 102.4</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 102.4</span>",
      "<span class=\"eqt\">Rs. 122.6</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 122.6</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Difference after 3 years = P(r/100)<sup>2</sup> [(300 + r)/100]</p><p>=&gt; 8000(20/100)<sup>2</sup> * (300 + 20)/100</p><p>=&gt; 8000/25 * 320/100 = Rs. 102.4</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What is the sum of money that amounts to &#8377;28090 after 6 months at 24% rate of compound interest, when the interest is compounded quarterly?</p></span><span class=\"hqt\" style=\"display:none\"><p>24% &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; 6 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342; &#8377;28090 &#2325;&#2368; &#2352;&#2366;&#2358;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2368;, &#2332;&#2348;&#2325;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2340;&#2367;&#2350;&#2366;&#2361;&#2368; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;20000</span><span class=\"hqt\" style=\"display:none\">&#8377;20000</span>",
      "<span class=\"eqt\">&#8377;22500</span><span class=\"hqt\" style=\"display:none\">&#8377;22500</span>",
      "<span class=\"eqt\">&#8377;25000</span><span class=\"hqt\" style=\"display:none\">&#8377;25000</span>",
      "<span class=\"eqt\">&#8377;17500</span><span class=\"hqt\" style=\"display:none\">&#8377;17500</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>ACQ,</p><p>Amount received after 6 months = &#8377;28090</p><p>P*(1 + 24/400)<sup>2</sup> = 28090</p><p>2809P/2500 = 28090</p><p>P = &#8377;25000</p>",
    "question_index": 7

    "question": "<span class=\"eqt\"><p>A person deposited a sum for 2 years at a rate of 12.5 % per annum on compound interest. The difference between the interest at the end of 1 year and that at the end of 2 years is Rs.5625. Find the sum.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; 12.5% &#8203;&#8203;&#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 2 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2350;&#2366; &#2325;&#2368;&#2404; 1 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2324;&#2352; 2 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 5625 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;&#2404; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
