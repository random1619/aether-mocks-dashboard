<body>

                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>

                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>

                <!-- Controls -->

                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The radius of a circle is <img width=24 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18763/image001.png\">times of the side of a square whose perimeter is 1008 cm. If the perimeter of a rectangle is 816 cm more than the circumference of the circle and length of the rectangle is 648 cm more than its breadth, then what is difference between area of circle and rectangle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2319;&#2325; &#2357;&#2352;&#2381;&#2327; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2325;&#2368; <img width=24 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18763/image001.png\">&#2327;&#2369;&#2344;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; 1008 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2310;&#2351;&#2340; &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2346;&#2352;&#2367;&#2343;&#2367; &#2360;&#2375; 816 &#2360;&#2375;&#2350;&#2368; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376; &#2324;&#2352; &#2310;&#2351;&#2340; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2311;&#2360;&#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2360;&#2375; 648 &#2360;&#2375;&#2350;&#2368; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2324;&#2352; &#2310;&#2351;&#2340; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">200 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">200 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">300 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">300 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">100 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">100 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">0 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">0 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let radius of the circle and side of the square is 10x and 3x respectively.</p><p>Perimeter of the square = 1008</p><p>=&gt; 4 * 3x = 1008</p><p>=&gt; x = 84</p><p>Let breadth of the rectangle = y cm and length of the rectangle = (y + 648) cm</p><p>So, perimeter of the rectangle = 816 + 2&#960;r</p><p>=&gt; 2(y + 648 + y) = 816 + 2 * 22/7 * 840</p><p>=&gt; 2y + 648 = 3048</p><p>=&gt; y = 2400/2</p><p>=&gt; y = 1200</p><p>The area of the circle = 22/7 * 840 * 840 = 2217600 cm<sup>2</sup></p><p>And area of the rectangle = 1200 * (1200 + 648) = 2217600 cm<sup>2</sup></p><p>Hence, required difference = 2217600  -  2217600 = 0 </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Non-parallel sides of a trapezium are of same length which are of length 10 cm and the distance between the parallel sides of the trapezium is 6 cm. If smaller parallel side of the trapezium is 4 cm, then what is the product of the diagonals of the trapezium (in cm<sup>2</sup>)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2354;&#2350;&#2381;&#2348; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2368; &#2327;&#2376;&#2352;-&#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2349;&#2369;&#2332;&#2366;&#2319;&#2305; &#2360;&#2350;&#2366;&#2344; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2368; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 10 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; &#2360;&#2350;&#2354;&#2350;&#2381;&#2348; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2368; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 6 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2350;&#2354;&#2350;&#2381;&#2348; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2368; &#2331;&#2379;&#2335;&#2368; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2349;&#2369;&#2332;&#2366; 4 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2354;&#2350;&#2381;&#2348; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2375; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339;&#2379;&#2306; &#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; (&#2360;&#2375;&#2350;&#2368; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">600</span><span class=\"hqt\" style=\"display:none\">600</span>",
      "<span class=\"eqt\">360</span><span class=\"hqt\" style=\"display:none\">360</span>",
      "<span class=\"eqt\">180</span><span class=\"hqt\" style=\"display:none\">180</span>",
      "<span class=\"eqt\">270</span><span class=\"hqt\" style=\"display:none\">270</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=266 height=142 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21210/image008.jpg\"></p><p>Given, AD = BC = 10 cm</p><p>CD = EF = 4 cm and DE = CF = 6 cm</p><p>In &#8710;BCF,</p><p>BC<sup>2</sup> = BF<sup>2</sup> + CF<sup>2</sup></p><p>=&gt; 10<sup>2</sup> = BF<sup>2</sup> + 6<sup>2</sup></p><p>=&gt; BF<sup>2</sup> = 100  -  36</p><p>=&gt; BF<sup>2</sup> = 64</p><p>=&gt; BF = 8 cm</p><p>Similarly, AE = 8 cm</p><p>So, AF = 8 + 4 = 12 cm</p><p>In &#8710;ACF,</p><p>AC<sup>2</sup> = AF<sup>2</sup> + CF<sup>2</sup></p><p>=&gt; AC<sup>2</sup> = 12<sup>2</sup> + 6<sup>2</sup> = 180</p><p>=&gt; AC = &radic;180 = 6&radic;5 cm</p><p>Similarly, BD = 6&radic;5 cm</p><p>Therefore, product of the diagonals of the trapezium = AC * BD = 6&radic;5 * 6&radic;5 = 180 cm<sup>2</sup></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A rectangular plot ABCD is 120 m long along AB and 90 m wide along BC. A pathway is constructed outside of the plot all around the sides. The pathways along BC and DA are each 15 m wide. If the area of the path is equal to 8/9<sup>th</sup> of the area of rectangular plot ABCD, then find the wide along AB.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2381;&#2354;&#2377;&#2335; ABCD, AB &#2325;&#2375; &#2360;&#2366;&#2341; 120 &#2350;&#2368;&#2335;&#2352; &#2354;&#2306;&#2348;&#2366; &#2324;&#2352; BC &#2325;&#2375; &#2360;&#2366;&#2341; 90 &#2350;&#2368;&#2335;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404; &#2346;&#2381;&#2354;&#2377;&#2335; &#2325;&#2375; &#2348;&#2366;&#2361;&#2352; &#2330;&#2366;&#2352;&#2379;&#2306; &#2340;&#2352;&#2347; &#2319;&#2325; &#2352;&#2366;&#2360;&#2381;&#2340;&#2366; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; BC &#2324;&#2352; DA &#2325;&#2375; &#2360;&#2366;&#2341; &#2352;&#2366;&#2360;&#2381;&#2340;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; 15 &#2350;&#2368;&#2335;&#2352; &#2330;&#2380;&#2337;&#2364;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2341; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2381;&#2354;&#2377;&#2335; ABCD &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2375; 8/9 &#2357;&#2375;&#2306; &#2349;&#2366;&#2327; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;, &#2340;&#2379; AB &#2325;&#2375; &#2360;&#2366;&#2341; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">25 m</span><span class=\"hqt\" style=\"display:none\">25 &#2350;&#2368;</span>",
      "<span class=\"eqt\">20 m</span><span class=\"hqt\" style=\"display:none\">20 &#2350;&#2368;</span>",
      "<span class=\"eqt\">30 m</span><span class=\"hqt\" style=\"display:none\">30 &#2350;&#2368;</span>",
      "<span class=\"eqt\">35 m</span><span class=\"hqt\" style=\"display:none\">35 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the wide along AB or CD be 'X' m.</p><p>A/Q</p><p>(120 + 2X) * (90 + 2 * 15)  -  120 * 90 = 8/9 * 120 * 90</p><p>(120 + 2X) * 120  -  120 * 90 = 80 * 120</p><p>120 + 2X  -  90 = 80</p><p>2X = 50</p><p>X = 25</p><p>Hence, the required value is 25 m.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>WXYZ is a quadrilateral. The length of diagonal WY is 32 cm. The sum of perpendicular drawn from vertex X and Z on the diagonal WY is 12 cm. What is the area of the quadrilateral?</p></span><span class=\"hqt\" style=\"display:none\"><p>WXYZ &#2319;&#2325; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2361;&#2376;&#2404; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; WY &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 32 cm &#2361;&#2376;&#2404; &#2358;&#2368;&#2352;&#2381;&#2359; X &#2324;&#2352; Z &#2360;&#2375; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; WY &#2346;&#2352; &#2326;&#2368;&#2306;&#2330;&#2375; &#2327;&#2319; &#2354;&#2350;&#2381;&#2348; &#2325;&#2366; &#2351;&#2379;&#2327; 12 cm &#2361;&#2376;&#2404; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">160 sq. cm</span><span class=\"hqt\" style=\"display:none\">160 sq. cm</span>",
      "<span class=\"eqt\">180 sq. cm</span><span class=\"hqt\" style=\"display:none\">180 sq. cm</span>",
      "<span class=\"eqt\">192 sq. cm</span><span class=\"hqt\" style=\"display:none\">192 sq. cm</span>",
      "<span class=\"eqt\">172 sq. cm</span><span class=\"hqt\" style=\"display:none\">172 sq. cm</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the length of perpendicular drawn from vertex X to WY = A cm</p><p>Therefore, the length of perpendicular drawn from vertex Z to WY = (12  -  A) cm</p><p>Area of quadrilateral = Area of triangle WZY + area of triangle WXY</p><p>= (1/2) * A * 32 + (1/2) * (12  -  A) * 32</p><p>= 16A + 192  -  16A</p><p>= 192 sq. cm</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Length and breadth of a rectangle are 65 cm and 40 cm respectively. Find the area of rectangle when length and breadth are increased by 20% and 30% respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2351;&#2340; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 65 cm &#2324;&#2352; 40 cm &#2361;&#2376;&#2404; &#2310;&#2351;&#2340; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 20% &#2324;&#2352; 30% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2310;&#2351;&#2340; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4020 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">4020 cm<sup>2</sup></span>",
      "<span class=\"eqt\">4056 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">4056 cm<sup>2</sup></span>",
      "<span class=\"eqt\">4080 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">4080 cm<sup>2</sup></span>",
      "<span class=\"eqt\">4100 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">4100 cm<sup>2</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Length and breadth are 65 cm and 40 cm respectively</p><p>After increase Length = 65 * 120/100 = 78 cm</p><p>Breadth = 40 * 130/100 = 52 cm</p><p>Area of rectangle = 78 * 52 = 4056 cm<sup>2</sup></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The length and breadth of rectangle A are L cm and B cm respectively. The length and breadth of rectangle Y are (3L/2) cm and 4B cm respectively. Find the area of rectangle Y is how many times of the area of rectangle A.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2351;&#2340; A &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; L cm &#2324;&#2352; B cm &#2361;&#2376;&#2404; &#2310;&#2351;&#2340; Y &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; (3L/2) cm &#2324;&#2352; 4B cm &#2361;&#2376;&#2404; &#2351;&#2361; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2310;&#2351;&#2340; Y &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;, &#2310;&#2351;&#2340; A &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Area of rectangle A = L * B sq. cm</p><p>Area of rectangle Y = (3L/2) * 4B = 6 * L * B sq. cm</p><p>So, Area of rectangle Y is 6 times the area of rectangle A.</p>",
    "question_index": 5
  },
  {

    "question": "<span class=\"eqt\"><p>The areas of a square and a rectangle are equal. The side of the square is A cm, and the length of the rectangle is 7 cm greater than A. Find the perimeter of the rectangle, if the width of the rectangle is 3 cm less than A.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2352;&#2381;&#2327; &#2324;&#2352; &#2319;&#2325; &#2310;&#2351;&#2340; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; &#2357;&#2352;&#2381;&#2327; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; A cm &#2361;&#2376; &#2324;&#2352; &#2310;&#2351;&#2340; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; A &#2360;&#2375; 7 cm &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2310;&#2351;&#2340; &#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; A &#2360;&#2375; 3 cm &#2325;&#2350; &#2361;&#2376;, &#2340;&#2379; &#2310;&#2351;&#2340; &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
