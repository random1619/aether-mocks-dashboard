<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The average of first 50 even natural numbers is</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2361;&#2354;&#2368; 50 &#2360;&#2350; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2361;&#2376; :</p></span>",
    "options": [
      "<span class=\"eqt\">50</span><span class=\"hqt\" style=\"display:none\">50</span>",
      "<span class=\"eqt\">100</span><span class=\"hqt\" style=\"display:none\">100</span>",
      "<span class=\"eqt\">51</span><span class=\"hqt\" style=\"display:none\">51</span>",
      "<span class=\"eqt\">101</span><span class=\"hqt\" style=\"display:none\">101</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sum of first 'n' even numbers = n (n + 1)</p><p> Average of first 'n' even numbers = (n + 1)</p><p>Hence, Average of first 50 even numbers = 50 + 1 = 51</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Average of 7 numbers is 12. When three new numbers 15, 86 and y are added, then average becomes 20. What is the value of y?</p></span><span class=\"hqt\" style=\"display:none\"><p>7 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 12 &#2361;&#2376;&#2404; &#2332;&#2348; &#2340;&#2368;&#2344; &#2344;&#2312; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; 15, 86 &#2324;&#2352; y &#2332;&#2379;&#2337;&#2364; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2324;&#2360;&#2340; 20 &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; y &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Average = (sum of observations)/(number of observations)</p><p>Sum of 7 numbers + sum of 3 new numbers = average of (7 + 3 = 10) numbers </p><p>7 * 12 + 15 + 86 + y = 10 * 20</p><p>y = 200  -  185 </p><p><b>y = 15</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If the average of 5 numbers 2m  -  1, 56, 128, 11 and 3m is 47.8, then the value of 'm' is equal to  - </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 5 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; 2m - 1, 56, 128, 11 &#2324;&#2352; 3m &#2325;&#2366; &#2324;&#2360;&#2340; 47.8 &#2361;&#2376;, &#2340;&#2379; 'm' &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2360;&#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Average = (sum of observations)/(number of observations)</p><p>Then, 47.8 = (2m  -  1 + 56 + 128 + 11 + 3m)/5</p><p>239 = 5m + 194</p><p>5m = 45</p><p><b>m = 9</b></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Average runs scored by a batsman in 12 innings is 11. If he scores 89 runs in the next innings, then his average runs after 13<sup>th</sup> innings becomes  -</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2354;&#2381;&#2354;&#2375;&#2348;&#2366;&#2332; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 12 &#2346;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2344;&#2366;&#2319; &#2327;&#2319; &#2324;&#2360;&#2340; &#2352;&#2344; 11 &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; &#2309;&#2327;&#2354;&#2368; &#2346;&#2366;&#2352;&#2368; &#2350;&#2375;&#2306; 89 &#2352;&#2344; &#2348;&#2344;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; 13&#2357;&#2368;&#2306; &#2346;&#2366;&#2352;&#2368; &#2325;&#2375; &#2348;&#2366;&#2342; &#2313;&#2360;&#2325;&#2375; &#2324;&#2360;&#2340; &#2352;&#2344; __________ &#2361;&#2379; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>",
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Average runs scored = (total runs scored)/(total no. of innings)</p><p>Total runs scored in 12 innings = 12 * 11 = 132</p><p>Total runs scored in 13 innings = 132 + 89 = 221</p><p>Therefore, average runs scored in 13 innings = 221/13 = <b>17</b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In a class of 50 students 20% are girls and rest are boys. Average marks of boys are 45 and that of girls are 40. What are the average marks of the whole class?</p></span><span class=\"hqt\" style=\"display:none\"><p>50 &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; 20% &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306; &#2324;&#2352; &#2358;&#2375;&#2359; &#2354;&#2337;&#2364;&#2325;&#2375; &#2361;&#2376;&#2306;&#2404; &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; 45 &#2361;&#2376;&#2306; &#2324;&#2352; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; 40 &#2361;&#2376;&#2306;&#2404; &#2360;&#2306;&#2346;&#2370;&#2352;&#2381;&#2339; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; &#2325;&#2367;&#2340;&#2344;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">50</span><span class=\"hqt\" style=\"display:none\">50</span>",
      "<span class=\"eqt\">44</span><span class=\"hqt\" style=\"display:none\">44</span>",
      "<span class=\"eqt\">38</span><span class=\"hqt\" style=\"display:none\">38</span>",
      "<span class=\"eqt\">54</span><span class=\"hqt\" style=\"display:none\">54</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Number of girls = 20% of 50 = 10</p><p>Number of boys = 50  -  10 = 40</p><p>Total marks of all boys = 45 X 40 = 1800</p><p>Total marks of all girls = 40 X 10 = 400</p><p>Average marks of whole class = (1800+400)/50 = 2200/50 = 44</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The average of 9 numbers is 6. The average of first four numbers is 5 and average of last three numbers is 5. The average of 5<sup>th</sup> and 6<sup>th</sup> number is:</p></span><span class=\"hqt\" style=\"display:none\"><p>9 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 6 &#2361;&#2376;&#2404; &#2346;&#2361;&#2354;&#2368; &#2330;&#2366;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 5 &#2361;&#2376; &#2324;&#2352; &#2309;&#2306;&#2340;&#2367;&#2350; &#2340;&#2368;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 5 &#2361;&#2376;&#2404; &#2346;&#2366;&#2305;&#2330;&#2357;&#2368;&#2306; &#2324;&#2352; &#2331;&#2336;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2324;&#2360;&#2340; &#2361;&#2376; :</p></span>",
    "options": [
      "<span class=\"eqt\">8.5</span><span class=\"hqt\" style=\"display:none\">8.5</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">9.5</span><span class=\"hqt\" style=\"display:none\">9.5</span>",
      "<span class=\"eqt\">10.5</span><span class=\"hqt\" style=\"display:none\">10.5</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sum of 9 numbers = 9 * 6 = 54</p><p>Sum of first 4 numbers = 5 * 4 = 20</p><p>Sum of last 3 numbers = 3 * 5 = 15</p><p>Sum of 5<sup>th</sup> and 6<sup>th</sup> number = 54  -  20  -  15 = 54  -  35 = 19</p><p>Required average = 19/2 = 9.5</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>A is 36 years old and his brother is 9 years older than A. What was the ratio of the ages of A and his brother fifteen years ago? </p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2325;&#2368; &#2310;&#2351;&#2369; 36 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2325;&#2366; &#2349;&#2366;&#2312; A &#2360;&#2375; &#2310;&#2351;&#2369; &#2350;&#2375;&#2306; 9 &#2357;&#2352;&#2381;&#2359; &#2348;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404; &#2346;&#2306;&#2342;&#2381;&#2352;&#2361; &#2357;&#2352;&#2381;&#2359; &#2346;&#2361;&#2354;&#2375;, A &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2349;&#2366;&#2312; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">5:8</span><span class=\"hqt\" style=\"display:none\">5:8</span>",
      "<span class=\"eqt\">2:5</span><span class=\"hqt\" style=\"display:none\">2:5</span>",
      "<span class=\"eqt\">3:7</span><span class=\"hqt\" style=\"display:none\">3:7</span>",
      "<span class=\"eqt\">7:10</span><span class=\"hqt\" style=\"display:none\">7:10</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A is 36 years old</p><p>Age of A's brother = 36 + 9 = 45 years. </p><p>The ratio of the ages of A and his brother fifteen years ago = (36 - 15) / (45 - 15) = 21/30 = <b>7/10</b>. </p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Average of four consecutive numbers is 9.5. Which among the following number, when added to each number in the same order, the newly formed numbers are in proportion?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2366;&#2352; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 9.5 &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2368; &#2327;&#2312; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2346;&#2352; &#2344;&#2357;-&#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2360;&#2350;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2379;&#2306;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the four consecutive numbers are: a, a + 1, a + 2, a + 3</p><p>Then, 4 * 9.5 = a + a + 1 + a + 2 + a + 3</p><p>a = 8</p><p>Then, numbers are: 8, 9, 10, 11</p><p>Now, let the number added = n</p><p>Then, (8 + n): (9 + n) :: (10 + n): (11 + n)</p><p>(8 + n)(11 + n) = (10 + n)(9 + n)</p><p>88 + 19n + n<sup>2</sup> = 90 + 19n + n<sup>2</sup></p><p>Hence, option (d) is the answer.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The average of 18 consecutive even numbers is P and when first 8 numbers are dropped, then average becomes Q. If P + Q = 50, then find the average of 4P and 2Q.</p></span><span class=\"hqt\" style=\"display:none\"><p>18 &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2360;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; P &#2361;&#2376; &#2324;&#2352; &#2332;&#2348; &#2346;&#2361;&#2354;&#2368; 8 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2335;&#2366; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2324;&#2360;&#2340; Q &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; P + Q = 50 &#2361;&#2376;, &#2340;&#2379; 4P &#2324;&#2352; 2Q &#2325;&#2366; &#2324;&#2360;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">71</span><span class=\"hqt\" style=\"display:none\">71</span>",
      "<span class=\"eqt\">69</span><span class=\"hqt\" style=\"display:none\">69</span>",
      "<span class=\"eqt\">73</span><span class=\"hqt\" style=\"display:none\">73</span>",
      "<span class=\"eqt\">67</span><span class=\"hqt\" style=\"display:none\">67</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let 18 consecutive even numbers be 'x', 'x + 2', 'x + 4', 'x + 6', ........., 'x + 34'.</p><p>According to the question:</p><p><img width=281 height=193 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11800/image024.png\"></p><p>P  -  17 = Q  -  25</p><p>Q  -  P = 8 ........ (1)</p><p>P + Q = 50 ...... (2)</p><p>From (1) and (2):</p><p>Q = 29 and P = 21</p><p>Required average = (4P + 2Q)/2 = 2P + Q</p><p>= 42 + 29</p><p>= 71</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Average of three integers L, M and N is 843 and average of M and N is 750. If M is 129 less than L, then the value of N is -</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; L, M &#2324;&#2352; N &#2325;&#2366; &#2324;&#2360;&#2340; 843 &#2361;&#2376; &#2340;&#2341;&#2366; M &#2324;&#2352; N &#2325;&#2366; &#2324;&#2360;&#2340; 750 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; M, L &#2360;&#2375; 129 &#2325;&#2350; &#2361;&#2376;, &#2340;&#2379; N &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376; -</p></span>",
    "options": [
      "<span class=\"eqt\">817</span><span class=\"hqt\" style=\"display:none\">817</span>",

    "question": "<span class=\"eqt\"><p>A mall has an average of 320 visitors on Sundays, 425 on Saturdays, and 300 on weekdays. What is the average number of visitors per day in a month of 30 days beginning with a Sunday? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2350;&#2377;&#2354; &#2350;&#2375;&#2306; &#2352;&#2357;&#2367;&#2357;&#2366;&#2352; &#2325;&#2379; &#2324;&#2360;&#2340;&#2344; 320, &#2358;&#2344;&#2367;&#2357;&#2366;&#2352; &#2325;&#2379; 425 &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351;&#2342;&#2367;&#2357;&#2360;&#2379;&#2306; &#2346;&#2352; 300 &#2310;&#2327;&#2306;&#2340;&#2369;&#2325; &#2310;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2352;&#2357;&#2367;&#2357;&#2366;&#2352; &#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; 30 &#2342;&#2367;&#2344;&#2379;&#2306; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2342;&#2367;&#2344; &#2310;&#2327;&#2306;&#2340;&#2369;&#2325;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "correct_option_id": 3,
    "solution": "<p>The total number of Sundays in 30 days starting with Sunday = 5 </p><p>The total number of visitors on Sundays = 5 * 320 = 1600</p><p>The total number of Saturdays in 30 days = 4</p><p>The total number of visitors on Saturdays = 4 * 425 = 1700</p><p>The total number of weekdays in 30 days = 30  -  (4 + 5) = 21 days</p><p>The total number of visitors on weekdays = 21 * 300 = 6300</p><p>The required average = (1600 + 1700 + 6300)/ 30 = 320</p>",

    "question": "<span class=\"eqt\"><p>Ashna secured 65 marks in geography while her scores in history, polity and economics were in the ratio 3: 4: 13 respectively. If her average score in geography, history and economics is 91, then how many marks did she secure in polity?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2358;&#2344;&#2366; &#2344;&#2375; &#2332;&#2367;&#2351;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347;&#2368; &#2350;&#2375;&#2306; 65 &#2309;&#2306;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2319; &#2332;&#2348;&#2325;&#2367; &#2361;&#2367;&#2360;&#2381;&#2335;&#2381;&#2352;&#2368;, &#2346;&#2377;&#2354;&#2367;&#2335;&#2368; &#2324;&#2352; &#2311;&#2325;&#2379;&#2344;&#2377;&#2350;&#2367;&#2325;&#2381;&#2360; &#2350;&#2375;&#2306; &#2313;&#2360;&#2325;&#2375; &#2309;&#2306;&#2325; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3: 4:13 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2341;&#2375;&#2404; &#2351;&#2342;&#2367; &#2332;&#2367;&#2351;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347;&#2368;, &#2361;&#2367;&#2360;&#2381;&#2335;&#2381;&#2352;&#2368; &#2324;&#2352; &#2311;&#2325;&#2379;&#2344;&#2377;&#2350;&#2367;&#2325;&#2381;&#2360; &#2350;&#2375;&#2306; &#2313;&#2360;&#2325;&#2366; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; 91 &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2344;&#2375; &#2346;&#2377;&#2354;&#2367;&#2335;&#2368; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2306;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2319;?</p></span>",

    "question": "<span class=\"eqt\"><p>In a company, the average monthly salary of a department of 40 employees is Rs. 31000. When 18 employees left the dept, the average monthly salary increased by Rs. 9000, then what is the average monthly salary of 18 employees who left the dept?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2350;&#2375;&#2306;, 40 &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2319;&#2325; &#2357;&#2367;&#2349;&#2366;&#2327; &#2325;&#2366; &#2324;&#2360;&#2340; &#2350;&#2366;&#2360;&#2367;&#2325; &#2357;&#2375;&#2340;&#2344; 31000 &#2352;&#2369; &#2361;&#2376;&#2404; &#2332;&#2348; 18 &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2344;&#2375; &#2357;&#2367;&#2349;&#2366;&#2327; &#2331;&#2379;&#2337;&#2364; &#2342;&#2367;&#2351;&#2366;, &#2340;&#2379; &#2324;&#2360;&#2340; &#2350;&#2366;&#2360;&#2367;&#2325; &#2357;&#2375;&#2340;&#2344; &#2350;&#2375;&#2306; 9,000 &#2352;&#2369; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379; &#2327;&#2351;&#2368;, &#2340;&#2379; &#2357;&#2367;&#2349;&#2366;&#2327; &#2331;&#2379;&#2337;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; 18 &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2350;&#2366;&#2360;&#2367;&#2325; &#2357;&#2375;&#2340;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Rs. 20000</span><span class=\"hqt\" style=\"display:none\">20000 &#2352;&#2369;</span>",
      "<span class=\"eqt\">Rs. 24000</span><span class=\"hqt\" style=\"display:none\">24000 &#2352;&#2369;</span>"

    "solution": "<p>The total monthly salary of the dept = 40 * 31000 = Rs. 1240000</p><p>When 18 employees left the dept, then total monthly salary of 22 employees = 22 * (31000 + 9000) = Rs. 880000</p><p>So, total monthly salary of 18 employees = 1240000  -  880000 = Rs. 360000</p><p>Hence, average monthly salary of 18 employees = Rs. 360000/18 = Rs. 20000</p>",
