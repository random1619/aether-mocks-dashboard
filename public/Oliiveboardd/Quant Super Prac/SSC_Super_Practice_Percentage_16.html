    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "comp": "<span class=\"eqt\"><p><b>Directions [Set of 4 Questions]: </b>Study the data carefully and answer the following questions:</p><p>Below line graph shows the number of milk packets of three companies (M, N and O) sold by five companies:</p><p><img width=576 height=336 id=\"Chart 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8011/image006.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; [4 &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2375;&#2335;]:</b>&#2310;&#2306;&#2325;&#2337;&#2364;&#2379;&#2306; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;:</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2352;&#2375;&#2326;&#2366; &#2327;&#2381;&#2352;&#2366;&#2347; &#2346;&#2366;&#2306;&#2330; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2340;&#2368;&#2344; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; (M, N &#2324;&#2352; O) &#2325;&#2375; &#2342;&#2370;&#2343; &#2325;&#2375; &#2346;&#2376;&#2325;&#2375;&#2335;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;:</p><p><img width=576 height=336 id=\"Chart 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8011/image006.png\"></p></span>",
    "question": "<span class=\"eqt\"><p>What is the difference between the number of milk packets of company M and N sold by shopkeeper A and B together and the number of milk packets of company N and O sold by shopkeeper C and E together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; A &#2324;&#2352; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2325;&#2306;&#2346;&#2344;&#2368; M &#2324;&#2352; N &#2325;&#2375; &#2342;&#2370;&#2343; &#2325;&#2375; &#2346;&#2376;&#2325;&#2375;&#2335;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; C &#2324;&#2352; E &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2325;&#2306;&#2346;&#2344;&#2368; N &#2324;&#2352; O &#2325;&#2375; &#2342;&#2370;&#2343; &#2325;&#2375; &#2346;&#2376;&#2325;&#2375;&#2335;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2381;&#2351;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">150</span><span class=\"hqt\" style=\"display:none\">150</span>",
      "<span class=\"eqt\">140</span><span class=\"hqt\" style=\"display:none\">140</span>",
      "<span class=\"eqt\">160</span><span class=\"hqt\" style=\"display:none\">160</span>",
      "<span class=\"eqt\">180</span><span class=\"hqt\" style=\"display:none\">180</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The number of milk packets of company M and N sold by shopkeeper A and B together = 240 + 280 + 320 + 440 = 1280</p><p>The number of milk packets of company N and O sold by shopkeeper C and E together = 260 + 480 + 420 + 280 = 1440</p><p>So, required difference = 1440  -  1280 = 160</p>",
    "question_index": 0
  },
  {
    "comp": "<span class=\"eqt\"><p><b>Direction:</b>Study the following information carefully and answer the related questions.</p><p>Following bar-graph represents the data regarding number of students in B.Sc. first, second and third years in five colleges.</p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p17361/image001.png\"></p><p><b>Note:</b> Total number of students in a college = number of students in B.Sc. first, second and third year together</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;:</b>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2348;&#2366;&#2352;-&#2327;&#2381;&#2352;&#2366;&#2347; &#2346;&#2366;&#2306;&#2330; &#2325;&#2377;&#2354;&#2375;&#2332;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2368;.&#2319;&#2360;&#2360;&#2368;. &#2346;&#2381;&#2352;&#2341;&#2350;, &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2337;&#2375;&#2335;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p17361/image001.png\"></p><p><b>&#2344;&#2379;&#2335;:</b> &#2319;&#2325; &#2325;&#2377;&#2354;&#2375;&#2332; &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = &#2348;&#2368;.&#2319;&#2360;&#2360;&#2368;. &#2346;&#2381;&#2352;&#2341;&#2350;, &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2324;&#2352; &#2340;&#2371;&#2340;&#2368;&#2351; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</p></span>",
    "question": "<span class=\"eqt\"><p>If 66(2/3)% and 40% of the students in college Q and R respectively in B.Sc. first year are males, how many more or less male students are there in B.Sc. first in college Q as compared to that in college R?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2377;&#2354;&#2375;&#2332; Q &#2324;&#2352; R &#2350;&#2375;&#2306; &#2348;&#2368;.&#2319;&#2360;.&#2360;&#2368;. &#2346;&#2381;&#2352;&#2341;&#2350; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 66(2/3)% &#2324;&#2352; 40% &#2331;&#2366;&#2340;&#2381;&#2352; &#2346;&#2369;&#2352;&#2369;&#2359; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2325;&#2377;&#2354;&#2375;&#2332; R &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2325;&#2377;&#2354;&#2375;&#2332; Q &#2350;&#2375;&#2306; &#2348;&#2368;.&#2319;&#2360;.&#2360;&#2368;. &#2346;&#2381;&#2352;&#2341;&#2350; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2343;&#2367;&#2325; &#2351;&#2366; &#2325;&#2350; &#2346;&#2369;&#2352;&#2369;&#2359; &#2331;&#2366;&#2340;&#2381;&#2352; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">28</span><span class=\"hqt\" style=\"display:none\">28</span>",
      "<span class=\"eqt\">56</span><span class=\"hqt\" style=\"display:none\">56</span>",
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>From the graph, we get </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">College</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">First year</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Second year</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Third year</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">120</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">80</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">150</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Q</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">100</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">110</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">190</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">230</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">80</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">170</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">130</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">150</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">90</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">250</td></tr></table><br><p>66(2/3) means (66 + 2/3) or (200/3).</p><p>Number of male students in B.Sc. first year in college Q = (200/3)% of 60 = 40</p><p>And the number of male students in B.Sc. first year in college R = 40% of 190 = 76</p><p>Therefore, difference = 76  -  40 = <b>36</b></p>",
    "question_index": 1
  },
  {
    "comp": "<span class=\"eqt\"><p><b>Directions [Set of 3 Questions]:</b>   Study the given graph carefully and answer the questions that follow.</p><p><img width=576 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18173/image001.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; [3 &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2375;&#2335;]:</b> &#2342;&#2367;&#2319; &#2327;&#2319; &#2327;&#2381;&#2352;&#2366;&#2347; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404;</p><p><img width=576 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18173/image001.png\"></p></span>",
    "question": "<span class=\"eqt\"><p>The number of students of height equal or more than 160 cm but less than 175 cm is what percent of number of students of height equal or more than 170 cm? (Up to one correct decimal)</p></span><span class=\"hqt\" style=\"display:none\"><p>160 &#2360;&#2375;&#2350;&#2368; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2351;&#2366; &#2313;&#2360;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2375;&#2325;&#2367;&#2344; 175 &#2360;&#2375;&#2350;&#2368; &#2360;&#2375; &#2325;&#2350; &#2314;&#2306;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 170 &#2360;&#2375;&#2350;&#2368; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2351;&#2366; &#2313;&#2360;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2314;&#2306;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;? (&#2319;&#2325; &#2360;&#2361;&#2368; &#2342;&#2358;&#2350;&#2354;&#2357; &#2340;&#2325;)</p></span>",
    "options": [
      "<span class=\"eqt\">165.8%</span><span class=\"hqt\" style=\"display:none\">165.8%</span>",
      "<span class=\"eqt\">152.4%</span><span class=\"hqt\" style=\"display:none\">152.4%</span>",
      "<span class=\"eqt\">165.4%</span><span class=\"hqt\" style=\"display:none\">165.4%</span>",
      "<span class=\"eqt\">152.8%</span><span class=\"hqt\" style=\"display:none\">152.8%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Number of students of height equal or more than 160 cm but less than 175 cm = 18 + 15 + 10 = 43</p><p>Number of students of height equal or more than 170 cm = 10 + 9 + 7 = 26</p><p>Required percentage = 43 * 100/26= 165.4%</p>",
    "question_index": 2
  },

    "comp": "<span class=\"eqt\"><p><b>Directions [Set of 3 Questions]:</b>   Study the given graph carefully to answer the questions. The following histogram shows the number of orders delivered by a restaurant according to the distance in a month.</p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18457/image004.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; [3 &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2375;&#2335;]:</b> &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2367;&#2319; &#2327;&#2319; &#2327;&#2381;&#2352;&#2366;&#2347; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2361;&#2367;&#2360;&#2381;&#2335;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2319;&#2325; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2342;&#2370;&#2352;&#2368; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2319;&#2325; &#2352;&#2375;&#2360;&#2381;&#2340;&#2352;&#2366;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2340;&#2352;&#2367;&#2340; &#2325;&#2367;&#2319; &#2327;&#2319; &#2321;&#2352;&#2381;&#2337;&#2352; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18457/image004.png\"></p></span>",

    "comp": "<span class=\"eqt\"><p><b>Directions [Set of 3 Questions]:</b>   A college building has five storeys. The following bar graph shows the number of boys and girls present on each storey.</p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18553/image028.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; [3 &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2375;&#2335;]:</b> &#2319;&#2325; &#2325;&#2377;&#2354;&#2375;&#2332; &#2325;&#2368; &#2311;&#2350;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2346;&#2366;&#2305;&#2330; &#2350;&#2306;&#2332;&#2367;&#2354;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2348;&#2366;&#2352; &#2327;&#2381;&#2352;&#2366;&#2347; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2350;&#2306;&#2332;&#2367;&#2354; &#2346;&#2352; &#2350;&#2380;&#2332;&#2370;&#2342; &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2324;&#2352; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18553/image028.png\"></p></span>",
    "question": "<span class=\"eqt\"><p>The difference between the number of boys and girls presents on storey 3 is what percent of the difference between the number of boys and girls present on storey 5? (Up to two correct decimals)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2306;&#2332;&#2367;&#2354; 3 &#2346;&#2352; &#2350;&#2380;&#2332;&#2370;&#2342; &#2354;&#2337;&#2364;&#2325;&#2375; &#2324;&#2352; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2350;&#2306;&#2332;&#2367;&#2354; 5 &#2346;&#2352; &#2350;&#2380;&#2332;&#2370;&#2342; &#2354;&#2337;&#2364;&#2325;&#2375; &#2324;&#2352; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;? (&#2342;&#2379; &#2360;&#2361;&#2368; &#2342;&#2358;&#2350;&#2354;&#2357; &#2340;&#2325;)</p></span>",
    "options": [
      "<span class=\"eqt\">26.67%</span><span class=\"hqt\" style=\"display:none\">26.67%</span>",
      "<span class=\"eqt\">23.33%</span><span class=\"hqt\" style=\"display:none\">23.33%</span>",
      "<span class=\"eqt\">28.33%</span><span class=\"hqt\" style=\"display:none\">28.33%</span>",
      "<span class=\"eqt\">22.67%</span><span class=\"hqt\" style=\"display:none\">22.67%</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Difference between the number of boys and girls present on storey 3 = 420  -  380 = 40</p><p>Difference between the number of boys and girls present on storey 5 = 450  -  300 = 150</p><p>Required percentage = 40 * 100/150 = 80/3 = 26.67%</p>",
    "question_index": 4
  },

    "comp": "<span class=\"eqt\"><p><b>Directions [Set of 2 Questions]:</b>Study the data carefully and answer the following questions: </p><p>Below line graph shows the number of patients who visited in three different hospitals in five days:</p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19430/image006.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; [2 &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2375;&#2335;]:</b>&#2310;&#2306;&#2325;&#2337;&#2364;&#2379;&#2306; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;:</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2352;&#2375;&#2326;&#2366; &#2327;&#2381;&#2352;&#2366;&#2347; &#2346;&#2366;&#2306;&#2330; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2309;&#2360;&#2381;&#2346;&#2340;&#2366;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2310;&#2319; &#2350;&#2352;&#2368;&#2332;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;:</p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19430/image006.png\"></p></span>",
    "question": "<span class=\"eqt\"><p>What is the ratio of average number of patients who visited in hospital T in day 1 and day 3 together to the average number of patients who visited in hospital S in day 2 and day 5 together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2361;&#2354;&#2375; &#2342;&#2367;&#2344; &#2324;&#2352; &#2340;&#2368;&#2360;&#2352;&#2375; &#2342;&#2367;&#2344; &#2309;&#2360;&#2381;&#2346;&#2340;&#2366;&#2354; T &#2350;&#2375;&#2306; &#2310;&#2319; &#2350;&#2352;&#2368;&#2332;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2342;&#2370;&#2360;&#2352;&#2375; &#2342;&#2367;&#2344; &#2324;&#2352; &#2346;&#2366;&#2306;&#2330;&#2357;&#2375;&#2306; &#2342;&#2367;&#2344; &#2309;&#2360;&#2381;&#2346;&#2340;&#2366;&#2354; S &#2350;&#2375;&#2306; &#2310;&#2319; &#2350;&#2352;&#2368;&#2332;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">21: 32</span><span class=\"hqt\" style=\"display:none\">21: 32</span>",
      "<span class=\"eqt\">7: 8</span><span class=\"hqt\" style=\"display:none\">7: 8</span>",

    "correct_option_id": 2,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hospital S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hospital T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hospital U</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Day 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">44</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">28</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">32</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Day 2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">24</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">26</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Day 3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">36</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">56</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">50</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Day 4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">48</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">54</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">36</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Day 5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">40</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">42</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">48</td></tr></table><br><p>The average number of patients who visited in hospital T in day 1 and day 3 together = (28 + 56)/2 = 42</p><p>The average number of patients who visited in hospital S in day 2 and day 5 together = (24 + 40)/2 = 32</p><p>So, required ratio = 42: 32 = 21: 16</p>",

    "question": "<span class=\"eqt\"><p>The bar graph 1 shows total number of qualified and non-qualified candidates in four exams and bar graph 2 shows total number of qualified male candidates and non-qualified female candidates in the exam.</p><p>Total number of candidates = Total number of qualified (male + female) candidates + Total number of non-qualified (male +female) candidates</p><p><img width=576 height=336 id=\"Chart 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image032.png\"></p><p><img width=576 height=336 id=\"Chart 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image033.png\"></p><p>Which of the following statement is correct?</p><p><b>I. </b>The ratio of total number of non-qualified male candidates in exam P and qualified female candidates in exam R is 2:5.</p><p><b>II. </b>The Average of total number of non-qualified male candidates in all the exams together is 160.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2366;&#2352; &#2327;&#2381;&#2352;&#2366;&#2347; 1 &#2330;&#2366;&#2352; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2351;&#2379;&#2327;&#2381;&#2351; &#2324;&#2352; &#2309;&#2351;&#2379;&#2327;&#2381;&#2351; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2348;&#2366;&#2352; &#2327;&#2381;&#2352;&#2366;&#2347; 2 &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2351;&#2379;&#2327;&#2381;&#2351; &#2346;&#2369;&#2352;&#2369;&#2359; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; &#2324;&#2352; &#2309;&#2351;&#2379;&#2327;&#2381;&#2351; &#2350;&#2361;&#2367;&#2354;&#2366; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = &#2351;&#2379;&#2327;&#2381;&#2351; (&#2346;&#2369;&#2352;&#2369;&#2359; + &#2350;&#2361;&#2367;&#2354;&#2366;) &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; + &#2309;&#2351;&#2379;&#2327;&#2381;&#2351; (&#2346;&#2369;&#2352;&#2369;&#2359; + &#2350;&#2361;&#2367;&#2354;&#2366;) &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</p><p><img width=576 height=336 id=\"Chart 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image032.png\"></p><p><img width=576 height=336 id=\"Chart 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20715/image033.png\"></p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>I. &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; P &#2350;&#2375;&#2306; &#2309;&#2351;&#2379;&#2327;&#2381;&#2351; &#2346;&#2369;&#2352;&#2369;&#2359; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; R &#2350;&#2375;&#2306; &#2351;&#2379;&#2327;&#2381;&#2351; &#2350;&#2361;&#2367;&#2354;&#2366; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2:5 &#2361;&#2376;&#2404;</p><p>II. &#2360;&#2349;&#2368; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2309;&#2351;&#2379;&#2327;&#2381;&#2351; &#2346;&#2369;&#2352;&#2369;&#2359; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2324;&#2360;&#2340; 160 &#2361;&#2376;&#2404;</p></span>",

    "comp": "<span class=\"eqt\"><p><b>Direction: </b>Study the data carefully and answer the following questions:</p><p>The below line graph shows the profit earned by two companies G and H (in Rs. Millions) during five years:</p><p><img width=605 height=340 id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11056/image007.gif\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; [</b><b>3 &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2350;&#2370;&#2361;</b><b>]: </b>&#2310;&#2306;&#2325;&#2396;&#2379;&#2306; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;:</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2368; &#2327;&#2312; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2350;&#2375;&#2306; &#2346;&#2366;&#2305;&#2330; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2342;&#2379; &#2325;&#2306;&#2346;&#2344;&#2368; G &#2324;&#2352; H (&#2350;&#2367;&#2354;&#2367;&#2351;&#2344; &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306;) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2354;&#2366;&#2349; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;:</p><p><img width=\"605\" height=\"340\" id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11056/image007.gif\"></p></span>",
    "question": "<span class=\"eqt\"><p>What is the respective ratio of the profit earned by company G in 2011 and 2015 together to the profit earned by company H in 2012 and 2013 together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2306;&#2346;&#2344;&#2368; G &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; 2011 &#2324;&#2352; 2015 &#2350;&#2375;&#2306; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2354;&#2366;&#2349; &#2340;&#2341;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; H &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; 2012 &#2324;&#2352; 2013 &#2350;&#2375;&#2306; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2354;&#2366;&#2349; &#2325;&#2366; &#2360;&#2350;&#2381;&#2348;&#2344;&#2381;&#2343;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

&#2349;&#2366;&#2327; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2352;&#2367;&#2359;&#2381;&#2336; (&#2360;&#2368;&#2344;&#2367;&#2351;&#2352;) &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;:</p><p><img width=\"576\" height=\"336\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er221018slt852-002.png\"></p><p>&#2344;&#2379;&#2335; : &#2360;&#2381;&#2325;&#2370;&#2354; &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = &#2325;&#2344;&#2367;&#2359;&#2381;&#2336; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; + &#2357;&#2352;&#2367;&#2359;&#2381;&#2336; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</p><p>&#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2381;&#2325;&#2370;&#2354;&#2379;&#2306; &#2360;&#2375; &#2319;&#2325; &#2360;&#2366;&#2341; &#2348;&#2376;&#2337;&#2350;&#2367;&#2306;&#2335;&#2344; &#2324;&#2352; &#2348;&#2375;&#2360;&#2348;&#2377;&#2354; &#2350;&#2375;&#2306; &#2349;&#2366;&#2327; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p><b>Direction:</b>   The following histogram shows the number of workers according to their daily wages.</p><p><img width=576 height=336 id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18870/image007.png\"></p><p>Out of the number of workers who earn Rs.500 or more but less than Rs.550, 60% are of age 50 years or more, 30% are of age less than 50 years, and remaining are of age less than 40 years. The number of workers of age 40 years or more but less than 50 years is:</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; [3 &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2366; &#2360;&#2350;&#2370;&#2361;]: </b>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2351;&#2340; &#2330;&#2367;&#2340;&#2381;&#2352; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;&#2379;&#2306; &#2325;&#2368; &#2342;&#2376;&#2344;&#2367;&#2325; &#2350;&#2332;&#2342;&#2370;&#2352;&#2368; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2313;&#2344;&#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18870/image007.png\"></p><p>500 &#2352;&#2369;&#2346;&#2351;&#2375; &#2351;&#2366; &#2313;&#2360;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2375;&#2325;&#2367;&#2344; 550 &#2352;&#2369;&#2346;&#2351;&#2375; &#2360;&#2375; &#2325;&#2350; &#2325;&#2350;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2360;&#2375; 60% &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;&#2379;&#2306; &#2325;&#2368; &#2310;&#2351;&#2369; 50 &#2357;&#2352;&#2381;&#2359; &#2351;&#2366; &#2313;&#2360;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, 30% &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;&#2379;&#2306; &#2325;&#2368; &#2310;&#2351;&#2369; 50 &#2357;&#2352;&#2381;&#2359; &#2360;&#2375; &#2325;&#2350; &#2361;&#2376; &#2324;&#2352; &#2358;&#2375;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; 40 &#2357;&#2352;&#2381;&#2359; &#2360;&#2375; &#2325;&#2350; &#2361;&#2376;&#2404; 40 &#2357;&#2352;&#2381;&#2359; &#2351;&#2366; &#2313;&#2360;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2375;&#2325;&#2367;&#2344; 50 &#2357;&#2352;&#2381;&#2359; &#2360;&#2375; &#2325;&#2350; &#2310;&#2351;&#2369; &#2357;&#2366;&#2354;&#2375; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Number of workers who earn Rs.500 or more but less than Rs.550 = 150</p><p>Percentage of workers of age less than 40 years = 10%</p><p>Number of workers of age less than 50 years = 150 * 30/100 = 45</p><p>Number of workers of age less than 40 years = 150 * 10/100 = 15</p><p>Number of workers of age 40 years or more but less than 50 years = 45  -  15 = 30.</p>",
    "question_index": 11
  },

    "question": "<span class=\"eqt\"><p>The given histogram represents the frequency distribution of patients admitted in 250 hospitals in a month:</p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21825/image023.png\"></p><p>The number of hospitals in which patients admitted more 450 but less than 600 is what percentage more or less than the number of hospitals in which patients admitted less than 400?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2310;&#2351;&#2340; &#2330;&#2367;&#2340;&#2381;&#2352; (&#2361;&#2367;&#2360;&#2381;&#2335;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;) &#2319;&#2325; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; 250 &#2309;&#2360;&#2381;&#2346;&#2340;&#2366;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2352;&#2381;&#2340;&#2368; &#2350;&#2352;&#2368;&#2332;&#2379;&#2306; &#2325;&#2368; &#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;:</p><p><img width=\"576\" height=\"336\" id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21825/image023.png\"></p><p>&#2313;&#2344; &#2309;&#2360;&#2381;&#2346;&#2340;&#2366;&#2354;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; 450 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2375;&#2325;&#2367;&#2344; 600 &#2360;&#2375; &#2325;&#2350; &#2350;&#2352;&#2368;&#2332; &#2349;&#2352;&#2381;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2313;&#2344; &#2309;&#2360;&#2381;&#2346;&#2340;&#2366;&#2354;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2309;&#2343;&#2367;&#2325; &#2351;&#2366; &#2325;&#2350; &#2361;&#2376; &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; 400 &#2360;&#2375; &#2325;&#2350; &#2350;&#2352;&#2368;&#2332; &#2349;&#2352;&#2381;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">12.50%</span><span class=\"hqt\" style=\"display:none\">12.50%</span>",
      "<span class=\"eqt\">33.33%</span><span class=\"hqt\" style=\"display:none\">33.33%</span>",
      "<span class=\"eqt\">27.05%</span><span class=\"hqt\" style=\"display:none\">27.05%</span>",
      "<span class=\"eqt\">45.45%</span><span class=\"hqt\" style=\"display:none\">45.45%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The number of hospitals in which patients admitted more 450 but less than 600 = 16 + 26 + 20 = 62</p><p>The number of hospitals in which patients admitted less than 400 = 18 + 27 + 15 + 25 = 85</p><p>So, required percentage = (85  -  62)/85 * 100 = 27.05%</p>",
    "question_index": 12
  },

    "solution": "<p>Marks obtained by A in half yearly exam = 600</p><p>Marks obtained by A in annual exam = 2*550  -  600 = 500</p><p>Similarly, we get-</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Students</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Marks obtained in half yearly exam</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Marks obtained in annual exam</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">600</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">500</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">500</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">650</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">350</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">750</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">950</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">700</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">750</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">450</td></tr></table><p>Marks obtained by A and B in half yearly exam together = 600 + 500 = 1100</p><p>Marks obtained by B and C in annual exam together = 650 + 750 = 1400</p><p>Required ratio = 1100:1400 = 11:14</p>",

    "question": "<span class=\"eqt\"><p>Following bar-graph represents production of items in company A and B in different years.</p><p><img width=525 height=385 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16605/image007.png\"></p><p>What is the ratio of production of items in company A from 2006 to 2008 to the production of items in company B in 2005, 2006 and 2009 together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2342;&#2306;&#2337;-&#2310;&#2352;&#2375;&#2326; &#2325;&#2306;&#2346;&#2344;&#2368; A &#2324;&#2352; B &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"525\" height=\"385\" id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16605/image007.png\"></p><p>&#2357;&#2352;&#2381;&#2359; 2006 &#2360;&#2375; 2008 &#2340;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; A &#2350;&#2375;&#2306; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2324;&#2352; &#2319;&#2325; &#2360;&#2366;&#2341; &#2357;&#2352;&#2381;&#2359; 2005, 2006 &#2324;&#2352; 2009 &#2350;&#2375;&#2306; &#2325;&#2306;&#2346;&#2344;&#2368; B &#2350;&#2375;&#2306; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Study the following information carefully and answer the related question.</p><p>Following bar-graph represents the data regarding the number of government schools and private schools in cities A, B, C and D.</p><p><img width=576 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er230102t2npm25-001.png\"></p><p></p><p>Number of private schools in cities A, C and D together is what percent more or less than the number of government schools in cities A, B and C together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2370;&#2330;&#2344;&#2366; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2342;&#2306;&#2337; &#2310;&#2352;&#2375;&#2326; &#2358;&#2361;&#2352; A, B, C &#2324;&#2352; D &#2350;&#2375;&#2306; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2360;&#2381;&#2325;&#2370;&#2354;&#2379;&#2306; &#2324;&#2352; &#2344;&#2367;&#2332;&#2368; &#2360;&#2381;&#2325;&#2370;&#2354;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2310;&#2305;&#2325;&#2396;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er230102t2npm25-001.png\"></p><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2358;&#2361;&#2352; A, C &#2324;&#2352; D &#2350;&#2375;&#2306; &#2344;&#2367;&#2332;&#2368; &#2360;&#2381;&#2325;&#2370;&#2354;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2319;&#2325; &#2360;&#2366;&#2341; &#2358;&#2361;&#2352; A, B &#2324;&#2352; C &#2350;&#2375;&#2306; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2360;&#2381;&#2325;&#2370;&#2354;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2309;&#2343;&#2367;&#2325; &#2351;&#2366; &#2325;&#2350; &#2361;&#2376;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>From the graph, we have <table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">City</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Number of government schools</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Number of private schools</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">88</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">104</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">32</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">80</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">72</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">100</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">64</td></tr></table></p><p>Number of private schools in cities A, C and D together = 104 + 72 + 64 = 240</p><p>And number of government schools in cities A, B and C together = 88 + 32 + 60 = 180</p><p>Therefore, percentage = ((240  -  180)/180) * 100 = <b>33(1/3)%</b></p>",
