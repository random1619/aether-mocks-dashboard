<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>When a number is divided by 16 then we are getting a remainder of 1. What will be the remainders when the same number is divided by 8 and 4 respectively?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 16 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2361;&#2350;&#2375;&#2306; &#2358;&#2375;&#2359;&#2347;&#2354; 1 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; &#2313;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 8 &#2324;&#2352; 4 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1, 2</span><span class=\"hqt\" style=\"display:none\">1, 2</span>",
      "<span class=\"eqt\">1, 0</span><span class=\"hqt\" style=\"display:none\">1, 0</span>",
      "<span class=\"eqt\">0, 1</span><span class=\"hqt\" style=\"display:none\">0, 1</span>",
      "<span class=\"eqt\">1, 1</span><span class=\"hqt\" style=\"display:none\">1, 1</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the given number be N.</p><p>Therefore according to the question,</p><p>N = 16k + 1 (k is a non-negative integer)</p><p>Now when we divide N by 8 or 4 it is clear that remainder is 1.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A number when divided by 5 and 7 successively leaves a remainder of 2 and 4 respectively. Find the remainder when the same number is divided by 35?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 5 &#2324;&#2352; 7 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 2 &#2324;&#2352; 4 &#2358;&#2375;&#2359; &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; &#2313;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 35 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>On dividing the number by 7 we will get remainder 4.</p><p>Hence number will be = 7k + 4 (k is whole number)</p><p>On dividing the number by 5 we will get the remainder 2 hence required number = 5(7k + 4) + 2 = 35k + 20 + 2 = 35k + 22</p><p>Therefore by dividing the number with 35 we will get the remainder 22.</p><p></p><p><b> Express Method </b></p><p>Let the last quotient be 1.</p><p>The dividend for 7 = 7 x 1 + 4 = 11</p><p>The dividend for 5 = 5 x 11 + 2 = 57</p><p>So, the number is 57.</p><p>When we divide 57 by 35, we get 22 as remainder.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Ram has some sweets with him. If he distributes these sweets equally to his 4 friends then he is left with 1 sweet. If he wants to distribute them equally to his 3 friends then he is left with 2 sweets. What is the numbers of sweets Ram initially has?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2350; &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2369;&#2331; &#2350;&#2367;&#2336;&#2366;&#2311;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306;&#2404; &#2309;&#2327;&#2352; &#2357;&#2361; &#2311;&#2344; &#2350;&#2367;&#2336;&#2366;&#2311;&#2351;&#2379;&#2306; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; 4 &#2342;&#2379;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2352;&#2366;&#2348;&#2352;-&#2348;&#2352;&#2366;&#2348;&#2352; &#2348;&#2366;&#2305;&#2335; &#2342;&#2375; &#2340;&#2379; &#2313;&#2360;&#2325;&#2375; &#2346;&#2366;&#2360; 1 &#2350;&#2367;&#2336;&#2366;&#2312; &#2348;&#2330;&#2340;&#2368; &#2361;&#2376;&#2404; &#2309;&#2327;&#2352; &#2357;&#2361; &#2311;&#2344;&#2381;&#2361;&#2375;&#2306; &#2309;&#2346;&#2344;&#2375; 3 &#2342;&#2379;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2352;&#2366;&#2348;&#2352;-&#2348;&#2352;&#2366;&#2348;&#2352; &#2348;&#2366;&#2305;&#2335;&#2344;&#2366; &#2330;&#2366;&#2361;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2313;&#2360;&#2325;&#2375; &#2346;&#2366;&#2360; 2 &#2350;&#2367;&#2336;&#2366;&#2311;&#2351;&#2366;&#2305; &#2348;&#2330;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2352;&#2366;&#2350; &#2325;&#2375; &#2346;&#2366;&#2360; &#2358;&#2369;&#2352;&#2370; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2350;&#2367;&#2336;&#2366;&#2311;&#2351;&#2366;&#2305; &#2341;&#2368;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">47</span><span class=\"hqt\" style=\"display:none\">47</span>",
      "<span class=\"eqt\">34</span><span class=\"hqt\" style=\"display:none\">34</span>",
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>",
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Going by trial and error from the answer choices If we divide 17 by 4 then the remainder is 1, if we divide it by 3 then remainder is 2 hence option (3) is the answer.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which two numbers have a product of 48 and, when the larger number is divided by the smaller, a quotient of 3?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; 48 &#2361;&#2376; &#2340;&#2341;&#2366; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2349;&#2366;&#2327;&#2347;&#2354; 3 &#2310;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">5, 15</span><span class=\"hqt\" style=\"display:none\">5, 15</span>",
      "<span class=\"eqt\">4, 12</span><span class=\"hqt\" style=\"display:none\">4, 12</span>",
      "<span class=\"eqt\">5, 12</span><span class=\"hqt\" style=\"display:none\">5, 12</span>",
      "<span class=\"eqt\">4, 15</span><span class=\"hqt\" style=\"display:none\">4, 15</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Checking with options given</p><p>5 * 15 = 75 &#8800; 48</p><p>5 * 12 &#8800; 48</p><p>4 * 15 &#8800; 48</p><p>4 * 12 = 48</p><p>Hence the correct answer is option B.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>When a number is divided by 5, it leaves remainder 4. When the square of that numbers is divided by 5, calculate the remainder.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 5 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; 4 &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2325;&#2379; 5 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Assume the number to be 9</p><p>Square of 9 = 9<sup>2</sup></p><p>= 81</p><p>Remainder = 1</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Remainder obtained after dividing a number by 8 is 3 and when the same number is divided by 9, remainder becomes 6. If difference between quotients in both the cases is 2, then find the number.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 8 &#2360;&#2375; &#2349;&#2366;&#2327; &#2342;&#2375;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; 3 &#2310;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2332;&#2348; &#2313;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 9 &#2360;&#2375; &#2349;&#2366;&#2327; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; 6 &#2352;&#2361; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2366;&#2327;&#2347;&#2354;&#2379;&#2306; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 2 &#2361;&#2376;, &#2340;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">139</span><span class=\"hqt\" style=\"display:none\">139</span>",
      "<span class=\"eqt\">141</span><span class=\"hqt\" style=\"display:none\">141</span>",
      "<span class=\"eqt\">123</span><span class=\"hqt\" style=\"display:none\">123</span>",
      "<span class=\"eqt\">155</span><span class=\"hqt\" style=\"display:none\">155</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let number = N</p><p>Let quotient when N is divided by 8 is 'x' and it is given that difference between quotient in both the cases is 2.</p><p>Quotient when a number is divided by smaller number is always more than when the same number is divided by greater number.</p><p>Hence, quotient when N is divided by 9 is 'x  -  2'</p><p>We know that:</p><p>Dividend = Divisor * Quotient + Remainder</p><p>N = 8x + 3 ...... (1)</p><p>N = 9 (x  -  2) + 6 ...... (2)</p><p>From (1) and (2):</p><p>8x + 3 = 9 (x  -  2) + 6</p><p>8x + 3 = 9x  -  18 + 6</p><p>x = 12 + 3</p><p>x = 15</p><p>Hence, number = N = 8x + 3</p><p>= 8 * 15 + 3</p><p>= 123</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>When a number is divided successively by 6, 11, and 14, we get the remainders 3, 4, and 5 respectively. When the same number is divided successively by 14, 11, and 6, we get the remainders A, B, and C respectively. Find the value of (A + B  -  C).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; 6, 11 &#2324;&#2352; 14 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2361;&#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3, 4 &#2324;&#2352; 5 &#2358;&#2375;&#2359;&#2347;&#2354; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2332;&#2348; &#2313;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; 14, 11 &#2324;&#2352; 6 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2361;&#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; A, B &#2324;&#2352; C &#2358;&#2375;&#2359;&#2347;&#2354; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; (A + B - C) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the number is N, so when N is divided by 6, the remainder is 3. Let us say that the quotient is x. This x when divided by 11 leaves the remainder 4 and quotient y and when y is divided by 14, it leaves the remainder 5 and quotient z. This can be written as below:</p><p>N = 6x + 3... (1)</p><p>X = 11y + 4... (2)</p><p>y = 14z + 5... (3)</p><p>Putting equation (3) and (2),</p><p>X = 154z + 55 + 4 = 154z + 59... (4)</p><p>Putting equation (4) in (1),</p><p>N = 6 * (154z + 59) + 3 = 924z + 357.</p><p>Smallest such number is 357, when z = 0</p><p>Therefore, N = 357</p><p>Now, 357/14, quotient is 25 and remainder is 7.</p><p>25/11, the quotient is 2 and the remainder is 3.</p><p>2/6, the quotient is 0 and the remainder is 2.</p><p>So, A = 7, B = 3, and C = 2</p><p>Therefore, A + B  -  C = 7 + 3  -  2 = 10  -  2 = 8</p><p></p><p><b> Express Method </b></p><p>Let in the first condition, last quotient be 1.</p><p>So, dividend for 14 = 14 x 1 + 5 = 19</p><p>dividend for 11 = 11 x 19 + 4 = 213</p><p>dividend for 6 = 213 x 6 + 3 = 1281</p><p>So, the number is 1281.</p><p>Now,</p><p>(1281/14) = quotient = 25 and remainder(A) = 7</p><p>(25/11) = quotient = 2 and remainder(B) = 3</p><p>2/6 = remainder(C) = 2</p><p>Therefore,</p><p>A + B - C = 7 + 3 - 2 = 8</p><p></p>",
    "question_index": 6
  },
  {
