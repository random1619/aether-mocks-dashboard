<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>How many numbers which are smaller than 945 but greater than 360 are neither divisible by 4 nor by 9?</p></span><span class=\"hqt\" style=\"display:none\"><p>945 &#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2354;&#2375;&#2325;&#2367;&#2344; 360 &#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2344; &#2340;&#2379; 4 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2306; &#2324;&#2352; &#2344; &#2361;&#2368; 9 &#2360;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">390</span><span class=\"hqt\" style=\"display:none\">390</span>",
      "<span class=\"eqt\">413</span><span class=\"hqt\" style=\"display:none\">413</span>",
      "<span class=\"eqt\">383</span><span class=\"hqt\" style=\"display:none\">383</span>",
      "<span class=\"eqt\">415</span><span class=\"hqt\" style=\"display:none\">415</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Numbers which are not divisible by both 4 and 9 = numbers not divisible by 4 + numbers not divisible by 9  -  numbers not divisible by LCM of 4 and 9</p><p>LCM of 4 and 9 = 36</p><p>Now, total numbers between 360 and 945 = 584</p><p>We find the numbers among these 584 numbers which are divisible by 4, 9 and 36.</p><p>Numbers divisible by 4 = 364, 368 .., 944, i.e., there are 146 numbers.</p><p>Numbers divisible by 9 = 369, 378 .., 936, i.e., there are 64 numbers.</p><p>Numbers divisible by 36 = 396, 432, .., 936, i.e., there are 16 numbers.</p><p>So, numbers divisible by both 4 and 9 = 146 + 64  -  16 = 194</p><p>Hence, numbers not divisible by both 4 and 9 = 584  -  194 = 390 numbers</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>How many numbers are there between 100 to 1000 which are divisible by both 5 and 11? </p></span><span class=\"hqt\" style=\"display:none\"><p>100 &#2360;&#2375; 1000 &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2340;&#2344;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306; &#2332;&#2379; 5 &#2324;&#2352; 11 &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Number divisible of 5 and 11 both = 5 * 11 = 55</p><p>The number  -  110, 165, ........... 990</p><p>a<sub>n</sub> = a + (n  -  1) * d</p><p>990 = 110 + (n  -  1) * 55</p><p>880 = 55n  -  55</p><p>55n = 880 + 55</p><p>n = 935/55 = 17</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If a five  -  digit number ABCDE is divisible by 7, 11 and 13, then the value of (A  -  B + C  -  D + E) is -</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2346;&#2366;&#2305;&#2330; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; ABCDE, 7, 11 &#2324;&#2352; 13 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; (A - B + C - D + E) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366; -</p></span>",
    "options": [
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Since, the number ABCDE is divisible by 7, 11 and 13, it must be divisible by 1001.</p><p>ABCDE = N * 1001 (where 10 &le; N &le; 99)</p><p>For N = 10 =&gt; ABCDE = 10 * 1001 = 10010</p><p>For N = 11 =&gt; ABCDE = 11 * 1001 = 11011</p><p>On comparing  -  </p><p>A = D, B = 0 and C = E</p><p>A  -  B + C  -  D + E = (A  -  D) + (C  -  E) + B = 0 </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>How many factors of 2<sup>4 </sup>* 3<sup>8</sup> * 5<sup>4</sup> * 7<sup>2</sup> are divisible by 6 but not by 30?</p></span><span class=\"hqt\" style=\"display:none\"><p>2<sup>4</sup>* 3<sup>8</sup> * 5<sup>4</sup> * 7<sup>2</sup> &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2327;&#2369;&#2339;&#2344;&#2326;&#2306;&#2337; 6 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; 30 &#2360;&#2375; &#2344;&#2361;&#2368;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">42</span><span class=\"hqt\" style=\"display:none\">42</span>",
      "<span class=\"eqt\">128</span><span class=\"hqt\" style=\"display:none\">128</span>",
      "<span class=\"eqt\">32</span><span class=\"hqt\" style=\"display:none\">32</span>",
      "<span class=\"eqt\">64</span><span class=\"hqt\" style=\"display:none\">64</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Number divisible by 6 = 2 * 3</p><p>Number of factors divisible by 6 = 2 * 3 (2<sup>3</sup> * 3<sup>7</sup> * 7<sup>2</sup>)</p><p>(If 5<sup>4 </sup>is considered then the number will be divisible by 30)</p><p>Required number = 4 * 8 * 2 = 64</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What is the remainder of function 4x<sup>3</sup>  -  3x<sup>2</sup> + 2x  -  1 when it is divided by 4x + 1? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2344; 4x<sup>3</sup> - 3x<sup>2</sup> + 2x - 1 &#2325;&#2379; 4x + 1 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">2/3</span><span class=\"hqt\" style=\"display:none\">2/3</span>",
      "<span class=\"eqt\">-7/4</span><span class=\"hqt\" style=\"display:none\">-7/4</span>",
      "<span class=\"eqt\">-1/2</span><span class=\"hqt\" style=\"display:none\">-1/2</span>",
      "<span class=\"eqt\">5/3</span><span class=\"hqt\" style=\"display:none\">5/3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=229 height=143 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26465/image007.png\" ></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If a five digit number 325xy is divisible by 7, 9 and 11, what is the value of (3x + 4y)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2346;&#2366;&#2306;&#2330; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 325xy, 7, 9 &#2324;&#2352; 11 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; (3x + 4y) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>325xy is divisible by 7, 9 and 11</p><p>For divisibility by 9</p><p>(3 + 2 + 5 + x + y) is divisible by 9</p><p>10 + x + y is divisible by 9, So x + y is either 8 or 17</p><p>x + y = 8 or x + y = 17</p><p>For divisibility by 11</p><p>(3 + 5 + y)  -  (2 + x) is divisible by 11</p><p>6 + y  -  x = 0 or 11</p><p>x  -  y = 6 or y  -  x = 5</p><p>Using equations x + y = 8 and x  -  y = 6</p><p>we get x = 7 and y = 1</p><p>Using equations x + y = 17 and y  -  x = 5</p><p>we get y = 11 and x = 6</p><p>Possible case is x = 7 and y = 1</p><p>Number 32571 is divisible by 7 also</p><p>3x + 4y = 3  X  7 + 4  X  1 = 25</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If a number 8P213Q is divisible by 9, then the sum of possible values of (P + Q) is -</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 8P213Q, 9 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; (P + Q) &#2325;&#2375; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; - &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>",
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Since, 8P213Q is divisible by 9, then the sum of digit of number must be divisible by 9.</p><p>8 + P + 2 + 1 + 3 + Q</p><p>= 14 + P + Q, is divisible by 9</p><p>P + Q = 4, 13</p><p>Sum of possible values of (P + Q) = 4 + 13 = 17</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Find the smallest number which should be added to 8921725, so that the resulting number is divisible by 8? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2375; 8921725 &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2366;&#2325;&#2367; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 8 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;?</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>For divisibility by 8, last three - digit of the number must be divisible by 8.</p><p>725 = 90 * 8 + 5</p><p>Remainder = 5</p><p>Resultant number = 8  -  5 = 3</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>If a number A is divisible by 4 and another number B is divisible by 5, then which of the following will be divisible by 20?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; A, 4 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; B, 5 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 20 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">A + B</span><span class=\"hqt\" style=\"display:none\">A + B</span>",
      "<span class=\"eqt\">A  -  B</span><span class=\"hqt\" style=\"display:none\">A  -  B</span>",
      "<span class=\"eqt\">A * B</span><span class=\"hqt\" style=\"display:none\">A * B</span>",
      "<span class=\"eqt\">A &div; B</span><span class=\"hqt\" style=\"display:none\">A &div; B</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Since, A is divisible by 4 and B is divisible by 5, then</p><p>A*B will be divisible by 4*5 = 20</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>If a number 7P51Q is divisible by 30, then the value of (P  X  Q) is  -  </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 7P51Q, 30 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; (P X Q) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366; - </p></span>",
    "options": [
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>For divisibility by 30, the number must be divisible by 3 and 10.</p><p>For divisibility by 10, the value of Q must be 0.</p><p>Now,</p><p>P  X  Q = P  X  0 = 0</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Find the remainder when 7<sup>230</sup> is divided by 48.</p></span><span class=\"hqt\" style=\"display:none\"><p>7<sup>230</sup> &#2325;&#2379; 48 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>7<sup>230</sup> = 7<sup>(2*115)</sup> = 49<sup>115</sup></p><p>= (48+1)<sup>115</sup></p><p>When 7<sup>230</sup> is divisible by 48, the remainder is 1.</p>",
    "question_index": 10
