<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The following pie chart shows the study time of different subjects of a student in a day. Study the pie chart and answer the question. </p><p><b><img width=520 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27004/image024.png\"></b></p><p>If the student studied English for 3 hours, then he studied Mathematics for: </p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344; &#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; &#2319;&#2325; &#2331;&#2366;&#2340;&#2381;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2357;&#2367;&#2359;&#2351;&#2379;&#2306; &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2366; &#2360;&#2350;&#2351; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404;</p><p><b><img width=520 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27004/image024.png\"></b></p><p>&#2351;&#2342;&#2367; &#2331;&#2366;&#2340;&#2381;&#2352; &#2344;&#2375; 3 &#2328;&#2306;&#2335;&#2375; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2367;&#2351;&#2366;, &#2340;&#2379; &#2313;&#2360;&#2344;&#2375; &#2327;&#2339;&#2367;&#2340; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2367;&#2340;&#2344;&#2375; &#2328;&#2306;&#2335;&#2375; &#2325;&#2367;&#2351;&#2366;:</span>",
    "options": [
      "<span class=\"eqt\">2 hours</span><span class=\"hqt\" style=\"display:none\">2 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">1 hour</span><span class=\"hqt\" style=\"display:none\">1 &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">7 hours</span><span class=\"hqt\" style=\"display:none\">7 &#2327;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">5 hours</span><span class=\"hqt\" style=\"display:none\">5 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>According to question, </p><p>3 = (15  X  Total study time) &div; 100</p><p>=&gt; Total study time = (3  X  100) &div; 15 = 20 hours</p><p>Actual study time for Mathematics = (35  X  20) &div; 100 = 7 hours</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Study the given pie chart and select the most appropriate option to fill in the blank.</p><p>The given pie chart shows the sales of different fruits in a day for a shop.</p><p>If the total number of fruits sold by a fruit seller in a day is 1200, then the number of bananas sold is ___.</p><p><img width=319 height=276 id=\"Picture 29\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27095/image027.png\" ></p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2348;&#2360;&#2375; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; &#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2347;&#2354;&#2379;&#2306; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2347;&#2354; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2347;&#2354;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 1200 &#2361;&#2376;, &#2340;&#2379; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2325;&#2375;&#2354;&#2375; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; ___ &#2361;&#2376;&#2404;</p><p><img width=319 height=276 id=\"Picture 29\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27095/image027.png\" ></span>",
    "options": [
      "<span class=\"eqt\">360</span><span class=\"hqt\" style=\"display:none\">360</span>",
      "<span class=\"eqt\">520</span><span class=\"hqt\" style=\"display:none\">520</span>",
      "<span class=\"eqt\">240</span><span class=\"hqt\" style=\"display:none\">240</span>",
      "<span class=\"eqt\">480</span><span class=\"hqt\" style=\"display:none\">480</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Number of bananas sold = 1,200  X  (40 &div; 100)</p><p>=&gt; Number of bananas sold = 1,200  X  0.40 = 480</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The given pie chart shows the percentage distribution of 450 employees in an organization. Read the pie chart and answer the question that follows.</p><p><img width=593 height=351 id=\"Chart 904775097\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22634/image085.png\"></p><p>What is the number of employees working in department F?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2319;&#2325; &#2360;&#2306;&#2327;&#2336;&#2344; &#2350;&#2375;&#2306; 450 &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2325;&#2379; &#2346;&#2397;&#2367;&#2351;&#2375; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p><img width=\"593\" height=\"351\" id=\"Chart 904775097\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22634/image085.png\"></p><p>&#2357;&#2367;&#2349;&#2366;&#2327; F &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2352;&#2340; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>",
      "<span class=\"eqt\">99</span><span class=\"hqt\" style=\"display:none\">99</span>",
      "<span class=\"eqt\">63</span><span class=\"hqt\" style=\"display:none\">63</span>",
      "<span class=\"eqt\">72</span><span class=\"hqt\" style=\"display:none\">72</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The number of employees working in department F = 22% of 450 = 99</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The given pie chart shows the annual agricultural production (in tonnes) in a region. The total production is 8600 tonnes.</p><p>What is the annual production of rice in the region?</p><p><img width=318 height=240 id=\"Picture 23\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27092/image022.png\"></p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; &#2319;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2325;&#2371;&#2359;&#2367; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; (&#2335;&#2344; &#2350;&#2375;&#2306;) &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2369;&#2354; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; 8600 &#2335;&#2344; &#2361;&#2376;&#2404;</p><p>&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2330;&#2366;&#2357;&#2354; &#2325;&#2366; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p><img width=318 height=240 id=\"Picture 23\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27092/image022.png\"></span>",
    "options": [
      "<span class=\"eqt\">5012 tonnes</span><span class=\"hqt\" style=\"display:none\">5012 &#2335;&#2344;</span>",
      "<span class=\"eqt\">1052 tonnes</span><span class=\"hqt\" style=\"display:none\">1052 &#2335;&#2344;</span>",
      "<span class=\"eqt\">2150 tonnes</span><span class=\"hqt\" style=\"display:none\">2150 &#2335;&#2344;</span>",
      "<span class=\"eqt\">2051 tonnes</span><span class=\"hqt\" style=\"display:none\">2051 &#2335;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Production of rice = (25 / 100)  X  8600</p><p>= 0.25  X  8600</p><p>= 2150 tonnes</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The below figure shows the estimated expenses of a family whose total estimated expenditure was &#8377;2,50,000. Study the figure and answer the question that follows</p><p><img width=576 height=336 id=\"Chart 31\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27251/image021.png\"></p><p>It was found that the actual expenditure on electricity was 10% more than the estimated expenditure, and the actual expenditure on rent was 20% less than estimated. All other expenses were same as that of the estimates. What was the total actual expenditure?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2310;&#2306;&#2325;&#2337;&#2364;&#2366; &#2319;&#2325; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2325;&#2375; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2326;&#2352;&#2381;&#2330; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2325;&#2369;&#2354; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2326;&#2352;&#2381;&#2330; 2,50,000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2341;&#2366;&#2404; &#2310;&#2306;&#2325;&#2337;&#2364;&#2375; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;</p><p><img width=576 height=336 id=\"Chart 31\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27251/image021.png\"></p><p>&#2351;&#2361; &#2346;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2367; &#2348;&#2367;&#2332;&#2354;&#2368; &#2346;&#2352; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2357;&#2381;&#2351;&#2351; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2357;&#2381;&#2351;&#2351; &#2360;&#2375; 10% &#2309;&#2343;&#2367;&#2325; &#2341;&#2366;, &#2324;&#2352; &#2325;&#2367;&#2352;&#2366;&#2319; &#2346;&#2352; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2357;&#2381;&#2351;&#2351; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2357;&#2381;&#2351;&#2351; &#2360;&#2375; 20% &#2325;&#2350; &#2341;&#2366;&#2404; &#2309;&#2344;&#2381;&#2351; &#2360;&#2349;&#2368; &#2357;&#2381;&#2351;&#2351; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2368; &#2341;&#2375;&#2404; &#2325;&#2369;&#2354; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2357;&#2381;&#2351;&#2351; &#2325;&#2367;&#2340;&#2344;&#2366; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">&#8377;2,52,500</span><span class=\"hqt\" style=\"display:none\">&#8377;2,52,500</span>",
      "<span class=\"eqt\">&#8377;2,40,750</span><span class=\"hqt\" style=\"display:none\">&#8377;2,40,750</span>",
      "<span class=\"eqt\">&#8377;2,43,750</span><span class=\"hqt\" style=\"display:none\">&#8377;2,43,750</span>",
      "<span class=\"eqt\">&#8377;2,48,750</span><span class=\"hqt\" style=\"display:none\">&#8377;2,48,750</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Estimated electricity expense = 11% of 250000=27500</p><p>Actual Electricity= 27500*110%=30250</p><p>Now, Actual rent expense = 80% of 45000=36000</p><p>Now rest of the expense = (20+16+17+18)%of 25000=177500</p><p>So total expenditure = 30250+36000+177500=243750</p><p>Option (c) is the correct answer.</p>",
    "question_index": 4
