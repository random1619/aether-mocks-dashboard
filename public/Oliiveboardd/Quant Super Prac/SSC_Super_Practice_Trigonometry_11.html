<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If 7cos x - sec x = 4&radic;3 . cos x, then find the value of (cos<sup>2</sup> x  -  7).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 7cos x - sec x = 4&radic;3 . cos x &#2361;&#2376;, &#2340;&#2379; (cos<sup>2</sup> x - 7) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2&radic;3</span><span class=\"hqt\" style=\"display:none\">2&radic;3</span>",
      "<span class=\"eqt\">&radic;3</span><span class=\"hqt\" style=\"display:none\">&radic;3</span>",
      "<span class=\"eqt\">8&radic;3</span><span class=\"hqt\" style=\"display:none\">8&radic;3</span>",
      "<span class=\"eqt\">4&radic;3</span><span class=\"hqt\" style=\"display:none\">4&radic;3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>7cos x - sec x = 4&radic;3 . cos x</p><p>=&gt; 7cos<sup>2</sup> x - 1 = 4&radic;3 cos<sup>2</sup> x</p><p>=&gt; (7  -  4&radic;3) cos<sup>2</sup> x = 1</p><p>=&gt; cos<sup>2</sup> x = 1/(7  -  4&radic;3) * (7 + 4&radic;3)/(7 + 4&radic;3)</p><p>=&gt; cos<sup>2</sup> x = 7 + 4&radic;3</p><p>=&gt; (cos<sup>2</sup> x  -  7) = 4&radic;3</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If A is an acute angle and sec A = cosec A, then find the value of 2sin<sup>2</sup>A +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">tan<sup>2</sup>A</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">3</span></div>&nbsp;-  cos<sup>2</sup>A + 1.&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; A &#2319;&#2325; &#2344;&#2381;&#2351;&#2370;&#2344; &#2325;&#2379;&#2339; &#2361;&#2376; &#2324;&#2352; sec A = cosec A &#2361;&#2376;, &#2340;&#2379; 2sin<sup>2</sup>A + <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">tan<sup>2</sup>A</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">3</span></div> - cos<sup>2</sup>A + 1 &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</div></p></span>",
    "options": [
      "<span class=\"eqt\">11/6</span><span class=\"hqt\" style=\"display:none\">11/6</span>",
      "<span class=\"eqt\">12/5</span><span class=\"hqt\" style=\"display:none\">12/5</span>",
      "<span class=\"eqt\">13/4</span><span class=\"hqt\" style=\"display:none\">13/4</span>",
      "<span class=\"eqt\">10/3</span><span class=\"hqt\" style=\"display:none\">10/3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Since A is an acute angle and secA = cosecA, therefore A = 45&deg;</p><p>Now,</p><p>2sin<sup>2</sup>A + [(tan<sup>2</sup>A)/3]  -  cos<sup>2</sup>A + 1</p><p>= 2sin<sup>2</sup>45&deg; + [(tan<sup>2</sup>45&deg;)/3]  -  cos<sup>2</sup>45&deg; + 1</p><p>= 2 * (1/2) + (1/3)  -  (1/2) + 1</p><p>= 2 + (1/3)  -  (1/2)</p><p>= (12 + 2  -  3)/6 = 11/6</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If sin A +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">sin A</span></div>&nbsp;= 29, then sin<sup>2</sup> A + cosec<sup>2</sup> A is:&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367;  sin A +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">sin A</span></div>&nbsp;= 29, &#2361;&#2376;, &#2340;&#2379; sin<sup>2</sup> A + cosec<sup>2</sup> A &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</div></p></span>",
    "options": [
      "<span class=\"eqt\">837</span><span class=\"hqt\" style=\"display:none\">837</span>",
      "<span class=\"eqt\">841</span><span class=\"hqt\" style=\"display:none\">841</span>",
      "<span class=\"eqt\">839</span><span class=\"hqt\" style=\"display:none\">839</span>",
      "<span class=\"eqt\">835</span><span class=\"hqt\" style=\"display:none\">835</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>sinA + (1/sinA) = 29</p><p>sinA + cosecA = 29</p><p>Square both sides,</p><p>sin<sup>2</sup>A + cosec<sup>2</sup>A + 2 sinA cosecA = 841</p><p>sin<sup>2</sup>A + cosec<sup>2</sup>A = 841  -  2 = 839</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Find the value of &#952;. If (&#960;/2 &lt; &#952; &lt; &#960;) and sin &#952; = 1/&radic;2.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (&#960;/2 &lt; &#952; &lt; &#960;) &#2324;&#2352; sin &#952; = 1/&radic;2 &#2361;&#2376;, &#2340;&#2379; &#952; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">45&deg;</span><span class=\"hqt\" style=\"display:none\">45&deg;</span>",
      "<span class=\"eqt\">150&deg;</span><span class=\"hqt\" style=\"display:none\">150&deg;</span>",
      "<span class=\"eqt\">135&deg;</span><span class=\"hqt\" style=\"display:none\">135&deg;</span>",
      "<span class=\"eqt\">120&deg;</span><span class=\"hqt\" style=\"display:none\">120&deg;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Given that,</p><p>sin&#952; = 1/&radic;2.</p><p>sin&#952; = sin 45</p><p>But given that (&#960;/2 &lt; &#952; &lt; &#960;),</p><p>So, sin&#952; = sin (&#960;  -  45)</p><p>sin&#952; = sin135</p><p>So, the value of &#952; = 135&deg;.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What is the value of (sin 300&deg; x sin 240&deg;)  -  (tan 300&deg; x tan 240&deg;)</p></span><span class=\"hqt\" style=\"display:none\"><p>(sin 300<sup>0</sup> x sin 240<sup>0</sup>) - (tan 300<sup>0</sup> x tan 240<sup>0</sup>) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3.75</span><span class=\"hqt\" style=\"display:none\">3.75</span>",
      "<span class=\"eqt\">2.75</span><span class=\"hqt\" style=\"display:none\">2.75</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>(sin 300&deg; x sin 240&deg;)  -  (tan 300&deg; x tan 240&deg;)</p><p>= (sin (270&deg; +30&deg;) x sin (270&deg; - 30&deg;))- (tan (270&deg; + 30&deg;) x tan (270&deg; -30&deg;))</p><p>= ((-cos 30&deg;) x (-cos 30&deg;)  -  ((-cot 30&deg;) x (cot 30&deg;))</p><p>= cos<sup>2</sup> 30&deg;  -  (-cot<sup>2</sup> 30&deg;)</p><p>= (3/4) + 3 = 3.75</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If sin&theta; = <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>8</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>17</span></div> , then find value of tan&theta;.&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; sin&#952; = <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>8</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>17</span></div> &#2361;&#2376;, &#2340;&#2379; tan&#952; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</div></p></span>",
    "options": [
      "<span class=\"eqt\">15/17</span><span class=\"hqt\" style=\"display:none\">15/17</span>",
      "<span class=\"eqt\">8/15</span><span class=\"hqt\" style=\"display:none\">8/15</span>",
      "<span class=\"eqt\">15/8</span><span class=\"hqt\" style=\"display:none\">15/8</span>",
      "<span class=\"eqt\">17/15</span><span class=\"hqt\" style=\"display:none\">17/15</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>sin&#1256; = 8/17</p><p>P = 8, H = 17</p><p>B = &radic; (17<sup>2</sup> - 8<sup>2</sup>)</p><p>B = 15</p><p>tan&#1256; = 8/15</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Simplify the following:</p><p><div>&nbsp;<div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>cosx - <span style='font-size: 19px;'>&radic;</span><span style='text-decoration:overline'>3</span> sinx</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>2</span></div>&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2379; &#2360;&#2352;&#2354;&#2368;&#2325;&#2371;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; : <div>&nbsp;<div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>cosx - <span style='font-size: 19px;'>&radic;</span><span style='text-decoration:overline'>3</span> sinx</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>2</span></div></div></p></span>",
    "options": [
      "<span class=\"eqt\">cos(&#960;/3 - x)</span><span class=\"hqt\" style=\"display:none\">cos(&#960;/3 - x)</span>",
      "<span class=\"eqt\">sin(&#960;/3 + x)</span><span class=\"hqt\" style=\"display:none\">sin(&#960;/3 + x)</span>",
      "<span class=\"eqt\">cos(&#960;/3 + x)</span><span class=\"hqt\" style=\"display:none\">cos(&#960;/3 + x)</span>",
      "<span class=\"eqt\">sin(&#960;/3 - x)</span><span class=\"hqt\" style=\"display:none\">sin(&#960;/3 - x)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=95 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20927/image061.png\"></p><p>= <img width=95 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20927/image062.png\"></p><p>= cos(x)cos(&#960;/3)  -  sin(x)sin(&#960;/3)</p><p>= cos(&#960;/3 + x)</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;Find the value of sec A if cot A =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">cosec A</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">4</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; cot A = cosec A/4 &#2361;&#2376;, &#2340;&#2379; sec A &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">-2</span><span class=\"hqt\" style=\"display:none\">-2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">1/4</span><span class=\"hqt\" style=\"display:none\">1/4</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>cotA = cosecA/4</p><p>cosA/sinA = 1/4sinA</p><p>cosA = &#188;</p><p>secA = 4</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>If sec (4x  -  40)&deg; = cosec (5x + 22)&deg;, then find the value of tan5x&deg;.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; sec (4x - 40) = cosec (5x + 22) &#2361;&#2376;, &#2340;&#2379; tan5x &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;3</span><span class=\"hqt\" style=\"display:none\">&radic;3</span>",
      "<span class=\"eqt\">1/&radic;3</span><span class=\"hqt\" style=\"display:none\">1/&radic;3</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>sec (4x  -  40)&deg; = cosec (5x + 22)&deg;</p><p>sec (4x  -  40) = sec (90  -  5x  -  22)</p><p>4x  -  40 = 90  -  5x  -  22</p><p>9x = 130  -  22</p><p>9x = 108</p><p>x = 12&deg;</p><p>Now,</p><p>tan5x = tan60 = &radic;3</p>",
    "question_index": 8

  {
