<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The average of five consecutive even numbers is 92. What is the largest of these numbers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2305;&#2330; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2360;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 92 &#2361;&#2376;&#2404; &#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">96</span><span class=\"hqt\" style=\"display:none\">96</span>",
      "<span class=\"eqt\">98</span><span class=\"hqt\" style=\"display:none\">98</span>",
      "<span class=\"eqt\">92</span><span class=\"hqt\" style=\"display:none\">92</span>",
      "<span class=\"eqt\">94</span><span class=\"hqt\" style=\"display:none\">94</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the numbers be 'X', 'X + 2', 'X + 4', 'X + 6', and 'X + 8'.</p><p>X + X + 2 + X + 4 + X + 6 + X + 8 = 92 * 5</p><p>5X + 20 = 460</p><p>5X = 440</p><p>X = 88</p><p>Hence, the required number 88 + 8 = 96</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The average age of the men in a group is 36 years, and the average age of the women is 30 years. If the combined average age of all people in the group is 34 years, what is the ratio of the number of men to the number of women?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2310;&#2351;&#2369; 36 &#2357;&#2352;&#2381;&#2359; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2310;&#2351;&#2369; 30 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2360;&#2349;&#2368; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2324;&#2360;&#2340; &#2310;&#2351;&#2369; 34 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 : 1</span><span class=\"hqt\" style=\"display:none\">1 : 1</span>",
      "<span class=\"eqt\">2 : 1</span><span class=\"hqt\" style=\"display:none\">2 : 1</span>",
      "<span class=\"eqt\">3 : 2</span><span class=\"hqt\" style=\"display:none\">3 : 2</span>",
      "<span class=\"eqt\">4 : 3</span><span class=\"hqt\" style=\"display:none\">4 : 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let m = number of men, w = number of women</p><p>According to question,</p><p>(36m + 30w) / (m + w) = 34</p><p>36m + 30w = 34m + 34w</p><p>2m = 4w</p><p>m : w = 2 : 1</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Four years ago, A was three times as old as B. Six years from now, A will be twice as old as B. Find their current ages.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2366;&#2352; &#2357;&#2352;&#2381;&#2359; &#2346;&#2361;&#2354;&#2375;, A &#2325;&#2368; &#2310;&#2351;&#2369; B &#2360;&#2375; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2341;&#2368;&#2404; &#2309;&#2348; &#2360;&#2375; &#2331;&#2361; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342;, A &#2325;&#2368; &#2310;&#2351;&#2369; B &#2360;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368;&#2404; &#2313;&#2344;&#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">32 years and 12 years</span><span class=\"hqt\" style=\"display:none\">32 &#2357;&#2352;&#2381;&#2359; &#2324;&#2352; 12 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">34 years and 14 years</span><span class=\"hqt\" style=\"display:none\">34 &#2357;&#2352;&#2381;&#2359; &#2324;&#2352; 14 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">36 years and 16 years</span><span class=\"hqt\" style=\"display:none\">36 &#2357;&#2352;&#2381;&#2359; &#2324;&#2352; 16 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">38 years and 18 years</span><span class=\"hqt\" style=\"display:none\">38 &#2357;&#2352;&#2381;&#2359; &#2324;&#2352; 18 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let current ages of A and B are A years and B years.</p><p>Now,</p><p>A  -  4 = 3(B  -  4)</p><p>=&gt; A = 3B  -  8</p><p>Also,</p><p>A + 6 = 2 (B + 6)</p><p>=&gt; A = 2B + 6</p><p>So,</p><p>3B  -  8 = 2B + 6</p><p>=&gt; B = 14</p><p>A's present age = 34 years</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A family's average milk consumption for the first six months of the year is 30 L per month. In each of the next three months, consumption increases by 20% over the previous month. What must their consumption in the tenth month be so that the overall ten&#8208;month average is 35 L?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2325;&#2368; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2331;&#2361; &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2324;&#2360;&#2340; &#2342;&#2370;&#2343; &#2325;&#2368; &#2326;&#2346;&#2340; 30 &#2354;&#2368;&#2335;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2366;&#2361; &#2361;&#2376;&#2404; &#2309;&#2327;&#2354;&#2375; &#2340;&#2368;&#2344; &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2326;&#2346;&#2340; &#2346;&#2367;&#2331;&#2354;&#2375; &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 20% &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2342;&#2360;&#2357;&#2375;&#2306; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2368; &#2326;&#2346;&#2340; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; &#2325;&#2369;&#2354; &#2342;&#2360; &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2366; &#2324;&#2360;&#2340; 35 &#2354;&#2368;&#2335;&#2352; &#2361;&#2379; &#2332;&#2366;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">60 L</span><span class=\"hqt\" style=\"display:none\">60 L</span>",
      "<span class=\"eqt\">62 L</span><span class=\"hqt\" style=\"display:none\">62 L</span>",
      "<span class=\"eqt\">64 L</span><span class=\"hqt\" style=\"display:none\">64 L</span>",
      "<span class=\"eqt\">66 L</span><span class=\"hqt\" style=\"display:none\">66 L</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let consumption in the tenth month be a L</p><p>Sum for first six months = 6*30 = 180 L</p><p>Each of months 7 - 9 = 30 X 120% = 36 L; sum = 3*36 = 108 L</p><p>Total for ten months = 10&#183;35 = 350 L</p><p>So, 180 + 108 + a = 350</p><p>=&gt; a = 350  -  288</p><p>=&gt; a = 62 L</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A class of 40 students has an average score of 70. The teacher discovers that one student's score of 85 was mistakenly recorded as 58. Also, a new student joins with a score of 95. What is the new average of the class?</p></span><span class=\"hqt\" style=\"display:none\"><p>40 &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2366; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; 70 &#2361;&#2376;&#2404; &#2358;&#2367;&#2325;&#2381;&#2359;&#2325; &#2325;&#2379; &#2346;&#2340;&#2366; &#2330;&#2354;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2319;&#2325; &#2331;&#2366;&#2340;&#2381;&#2352; &#2325;&#2375; 85 &#2309;&#2306;&#2325; &#2327;&#2354;&#2340;&#2368; &#2360;&#2375; 58 &#2342;&#2352;&#2381;&#2332; &#2361;&#2379; &#2327;&#2319; &#2341;&#2375;&#2404; &#2311;&#2360;&#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366;, 95 &#2309;&#2306;&#2325; &#2325;&#2375; &#2360;&#2366;&#2341; &#2319;&#2325; &#2344;&#2351;&#2366; &#2331;&#2366;&#2340;&#2381;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2366; &#2344;&#2351;&#2366; &#2324;&#2360;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">71.15</span><span class=\"hqt\" style=\"display:none\">71.15</span>",
      "<span class=\"eqt\">71.20</span><span class=\"hqt\" style=\"display:none\">71.20</span>",
      "<span class=\"eqt\">71.30</span><span class=\"hqt\" style=\"display:none\">71.30</span>",
      "<span class=\"eqt\">71.27</span><span class=\"hqt\" style=\"display:none\">71.27</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>total students= 40, initial average = 70</p><p>Total recorded score = 40  X  70 = 2,800</p><p>Wrongly recorded value = 58</p><p>Correct value = 85</p><p>Thus, Corrected sum after fixing the score of one student = 2,800  -  58 + 85 = 2,827</p><p>since, New student's score = 95</p><p>so, New total sum= 2,827 + 95 = 2,922</p><p>New total number of students = 40 + 1 = 41</p><p>Thus, average = 2,922 / 41 = 71.27</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The average of five consecutive odd numbers is 25. What is the largest of these numbers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2305;&#2330; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2357;&#2367;&#2359;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 25 &#2361;&#2376;&#2404; &#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">27</span><span class=\"hqt\" style=\"display:none\">27</span>",
      "<span class=\"eqt\">29</span><span class=\"hqt\" style=\"display:none\">29</span>",
      "<span class=\"eqt\">31</span><span class=\"hqt\" style=\"display:none\">31</span>",
      "<span class=\"eqt\">33</span><span class=\"hqt\" style=\"display:none\">33</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Five consecutive odd numbers can be written as n - 4, n - 2, n, n+2, n+4; their average = n</p><p>So n = 25; largest = n + 4 = 29</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Ten years from now, a person's age will be the square of what it was ten years ago. Find the person's current age.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2360; &#2360;&#2366;&#2354; &#2348;&#2366;&#2342;, &#2325;&#2367;&#2360;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2368; &#2310;&#2351;&#2369; &#2342;&#2360; &#2360;&#2366;&#2354; &#2346;&#2361;&#2354;&#2375; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2357;&#2352;&#2381;&#2327; &#2361;&#2379;&#2327;&#2368;&#2404; &#2313;&#2360; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">10 years</span><span class=\"hqt\" style=\"display:none\">10 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">15 years</span><span class=\"hqt\" style=\"display:none\">15 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">20 years</span><span class=\"hqt\" style=\"display:none\">20 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">25 years</span><span class=\"hqt\" style=\"display:none\">25 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let, current age = x years Then, x + 10 = (x  -  10)&#178;</p><p>=&gt; (x  -  10)&#178;  -  x  -  10 = 0</p><p>=&gt; x&#178;  -  21x + 90 = 0</p><p>=&gt; x = 15 or 6</p><p>[x = 6 is discarded as 10 years ago, the person's age would be -4 years which is impossible.]</p><p>So, x = 15</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Average gym attendance for Mon to Fri was 30. If 50 persons attended the gym on Saturday and average of all seven days is 32, then how many persons must attend on Sunday?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2360;&#2375; &#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352; &#2340;&#2325; &#2332;&#2367;&#2350; &#2350;&#2375;&#2306; &#2324;&#2360;&#2340; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; 30 &#2341;&#2368;&#2404; &#2351;&#2342;&#2367; &#2358;&#2344;&#2367;&#2357;&#2366;&#2352; &#2325;&#2379; 50 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2332;&#2367;&#2350; &#2350;&#2375;&#2306; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2369;&#2319; &#2324;&#2352; &#2360;&#2349;&#2368; &#2360;&#2366;&#2340; &#2342;&#2367;&#2344;&#2379;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 32 &#2361;&#2376;, &#2340;&#2379; &#2352;&#2357;&#2367;&#2357;&#2366;&#2352; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">26</span><span class=\"hqt\" style=\"display:none\">26</span>",
      "<span class=\"eqt\">28</span><span class=\"hqt\" style=\"display:none\">28</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Desired 7-day total: 7  X  32 = 224</p><p>Sum for first 6 days: 5 * 30 + 50 = 150 + 50 = 200</p><p>Sunday attendance: 224  -  200 = <b>24</b></p>",
    "question_index": 7
  },
  {

    "question": "<span class=\"eqt\"><p>In the first 20 overs of a 50 over cricket match the run rate per over is 5.5. If the team has to chase a target of 310 in 50 overs then what should be the minimum run-rate in the remaining overs?</p></span><span class=\"hqt\" style=\"display:none\"><p>50 &#2323;&#2357;&#2352; &#2325;&#2375; &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2350;&#2376;&#2330; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; 20 &#2323;&#2357;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367; &#2323;&#2357;&#2352; &#2352;&#2344; &#2352;&#2375;&#2335; 5.5 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2335;&#2368;&#2350; &#2325;&#2379; 50 &#2323;&#2357;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; 310 &#2352;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2325;&#2366; &#2346;&#2368;&#2331;&#2366; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359; &#2323;&#2357;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2352;&#2344;-&#2352;&#2375;&#2335; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [

      "<span class=\"eqt\">6.66</span><span class=\"hqt\" style=\"display:none\">6.67</span>"

    "question": "<span class=\"eqt\"><p>The ratio of present ages of A, B, and C is 2 : 3 : 4. After 10 years, the ratio of their ages will be 4 : 5 : 7. What is the present age of C?</p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2 : 3 : 4 &#2361;&#2376;&#2404; 10 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2313;&#2344;&#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4 : 5 : 7 &#2361;&#2379;&#2327;&#2366;&#2404; C &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>",
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let present ages = 2x, 3x, 4x.</p><p>After 10 years: (2x + 10):(3x + 10):(4x + 10) = 4:5:7.</p><p>Use first two terms: (2x + 10)/(3x + 10) = 4/5</p><p>=&gt; 5(2x + 10) = 4(3x + 10)</p><p>=&gt; 10x + 50 = 12x + 40 =&gt; 2x = 10 =&gt; x = 5.</p><p>C's present age = 4x = 4  X  5 = 20.</p>",
    "question_index": 10

    "question": "<span class=\"eqt\"><p>The ratio of the ages of P and Q is 5 : 8. After 4 years, the ratio will be 7 : 10. What is the difference in their present ages (in years)?</p></span><span class=\"hqt\" style=\"display:none\"><p>P &#2324;&#2352; Q &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 5 : 8 &#2361;&#2376;&#2404; 4 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342;, &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 7 : 10 &#2361;&#2379;&#2327;&#2366;&#2404; &#2313;&#2344;&#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2350;&#2375;&#2306; (&#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p></span>",

    "correct_option_id": 0,
