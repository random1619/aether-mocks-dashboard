<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If a boy climbs 16 m on a pole in the first one minute and 4 m comes down in the next one minute, then how long will it be at the peak of the pole? The total length of the pole is 184 m.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2354;&#2337;&#2364;&#2325;&#2366; &#2346;&#2361;&#2354;&#2375; &#2319;&#2325; &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2326;&#2306;&#2349;&#2375; &#2346;&#2352; 16 &#2350;&#2368;&#2335;&#2352; &#2330;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2327;&#2354;&#2375; &#2319;&#2325; &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; 4 &#2350;&#2368;&#2335;&#2352; &#2344;&#2368;&#2330;&#2375; &#2310;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2326;&#2306;&#2349;&#2375; &#2325;&#2375; &#2358;&#2367;&#2326;&#2352; &#2346;&#2352; &#2313;&#2360;&#2325;&#2368; &#2325;&#2369;&#2354; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368;? &#2326;&#2306;&#2349;&#2375; &#2325;&#2368; &#2325;&#2369;&#2354; &#2354;&#2306;&#2348;&#2366;&#2312; 184 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">28 minutes</span><span class=\"hqt\" style=\"display:none\">28 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">27 minutes</span><span class=\"hqt\" style=\"display:none\">27 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">30 minutes</span><span class=\"hqt\" style=\"display:none\">30 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">29 minutes</span><span class=\"hqt\" style=\"display:none\">29 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Boys covers distance in 2 minutes = 16  -  4 = 12 m</p><p>Hence, the required time = 2 * (184  -  16) /12 + 1 minute of last 16 m</p><p>= 28 minutes + 1 minute</p><p>= 29 minutes</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A bicycle can cover 234 km in 18 hours. Find the distance covered by train in 55 hours which is moving at speed which is 80% more than speed of bicycle.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2311;&#2325;&#2367;&#2354; 18 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 234 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; 55 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2335;&#2381;&#2352;&#2375;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2351; &#2325;&#2368; &#2327;&#2312; &#2342;&#2370;&#2352;&#2368; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;, &#2332;&#2379; &#2360;&#2366;&#2311;&#2325;&#2367;&#2354; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; 80% &#2309;&#2343;&#2367;&#2325; &#2327;&#2340;&#2367; &#2360;&#2375; &#2330;&#2354; &#2352;&#2361;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1287 km</span><span class=\"hqt\" style=\"display:none\">1287 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">1295 km</span><span class=\"hqt\" style=\"display:none\">1295 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">1278 km</span><span class=\"hqt\" style=\"display:none\">1278 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">1290 km</span><span class=\"hqt\" style=\"display:none\">1290 &#2325;&#2367;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Speed of bicycle = 234/18 = 13 km/hr</p><p>Speed of train = 180% of 13 = 23.4 km/hr</p><p>Required distance = 23.4 * 55 = 1287 km</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Rohan started a journey from point 'A' at 2:35:20 p.m. and reached point 'B' at 11:18:15 a.m. Kripa started from point 'A' 1 hour 24 mins 40 secs after Rohan and reached point 'B' 41 mins 45 secs after him. How long did Kripa take to complete his journey?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2379;&#2361;&#2344; &#2344;&#2375; &#2342;&#2379;&#2346;&#2361;&#2352; 2:35:20 &#2348;&#2332;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; 'A' &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2324;&#2352; 11:18:15 &#2348;&#2332;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; 'B' &#2346;&#2352; &#2346;&#2361;&#2369;&#2306;&#2330;&#2366;&#2404; &#2325;&#2371;&#2346;&#2366; &#2344;&#2375; &#2352;&#2379;&#2361;&#2344; &#2325;&#2375; 1 &#2328;&#2306;&#2335;&#2375; 24 &#2350;&#2367;&#2344;&#2335; 40 &#2360;&#2375;&#2325;&#2306;&#2337; &#2348;&#2366;&#2342; &#2348;&#2367;&#2306;&#2342;&#2369; 'A' &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; 41 &#2350;&#2367;&#2344;&#2335; 45 &#2360;&#2375;&#2325;&#2306;&#2337; &#2348;&#2366;&#2342; &#2348;&#2367;&#2306;&#2342;&#2369; 'B' &#2346;&#2352; &#2346;&#2361;&#2369;&#2306;&#2330;&#2366;&#2404; &#2325;&#2371;&#2346;&#2366; &#2325;&#2379; &#2309;&#2346;&#2344;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">17 hours</span><span class=\"hqt\" style=\"display:none\">17 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">10 hours</span><span class=\"hqt\" style=\"display:none\">10 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">15 hours</span><span class=\"hqt\" style=\"display:none\">15 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">20 hours</span><span class=\"hqt\" style=\"display:none\">20 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Rohan started a journey from point 'A' at 2:35:20 p.m.</p><p>Kripa started from point 'A' 24 mins 40 secs after Rohan</p><p>2:35:20 + 1:24:40 = 4:00:00</p><p>Rohan reaches point 'B' at 11:18:15 a.m.</p><p>Kripa reaches point 'B' 41 mins 45 secs after Rohan.</p><p>11:18:15 + 00:41:45 = 12:00:00</p><p>Kripa starts the journey from 4:00:00 and completes the journey at 12:00:00 of next day.</p><p>Total time taken by Kripa = 8 hours + 12 hours = 20 hours</p><p>Kripa takes 20 hours to complete his journey.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A person travels a certain distance at a speed of 225 km/h and returns at a speed of 175 km/h. If the total time taken for the round trip is 16 hours, what is the distance between the two places?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; 225 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 175 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2357;&#2366;&#2346;&#2360; &#2310;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2310;&#2344;&#2375;-&#2332;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2366; &#2325;&#2369;&#2354; &#2360;&#2350;&#2351; 16 &#2328;&#2306;&#2335;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1350 km</span><span class=\"hqt\" style=\"display:none\">1350 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">1525 km</span><span class=\"hqt\" style=\"display:none\">1525 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">1575 km</span><span class=\"hqt\" style=\"display:none\">1575 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">1700 km</span><span class=\"hqt\" style=\"display:none\">1700 &#2325;&#2367;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the distance be 'D'</p><p>A/Q</p><p>D/225 + D/175 = 16</p><p>(7D + 9D)/1575 = 16</p><p>D = 1575 km</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A person's office is 180 km away from his home. To reach his office he travelled one - sixth of the distance at 15 km/hour, half of the distance at 40 km/hour and the remaining distance at 30 km/hour. Find the total time taken by him.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351; &#2313;&#2360;&#2325;&#2375; &#2328;&#2352; &#2360;&#2375; 180 &#2325;&#2367;&#2350;&#2368; &#2342;&#2370;&#2352; &#2361;&#2376;&#2404; &#2309;&#2346;&#2344;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2360;&#2344;&#2375; &#2342;&#2370;&#2352;&#2368; &#2325;&#2366; &#2331;&#2336;&#2366; &#2349;&#2366;&#2327; 15 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375;, &#2310;&#2343;&#2368; &#2342;&#2370;&#2352;&#2368; 40 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2340;&#2341;&#2366; &#2358;&#2375;&#2359; &#2342;&#2370;&#2352;&#2368; 30 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2340;&#2351; &#2325;&#2368;&#2404; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2369;&#2354; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4.80 hours</span><span class=\"hqt\" style=\"display:none\">4.80 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">6.25 hours</span><span class=\"hqt\" style=\"display:none\">6.25 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">7.20 hours</span><span class=\"hqt\" style=\"display:none\">7.20 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">5.25 hours</span><span class=\"hqt\" style=\"display:none\">5.25 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total distance = 180 km</p><p>Time taken to cover one  -  sixth of the distance</p><p>=&gt; 180/(6 * 15) = 2 hours</p><p>Time taken to cover half of the distance</p><p>=&gt; 180/(2 * 40) = 2.25 hours</p><p>Time taken to cover remaining distance = (180  -  30  -  90)/30 = 2 hours</p><p>Total time = 2 + 2.25 + 2 = 6.25 hours</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If a car takes 15 hours to cover 600 km, how long will it take to cover 1500 m at the same speed?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2325;&#2366;&#2352; &#2325;&#2379; 600 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 15 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2313;&#2360;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; 1500 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">200 sec</span><span class=\"hqt\" style=\"display:none\">200 &#2360;&#2375;&#2325;&#2306;&#2337;</span>",
      "<span class=\"eqt\">135 sec</span><span class=\"hqt\" style=\"display:none\">135 &#2360;&#2375;&#2325;&#2306;&#2337;</span>",
      "<span class=\"eqt\">250 sec</span><span class=\"hqt\" style=\"display:none\">250 &#2360;&#2375;&#2325;&#2306;&#2337;</span>",
      "<span class=\"eqt\">220 sec</span><span class=\"hqt\" style=\"display:none\">220 &#2360;&#2375;&#2325;&#2306;&#2337;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Speed = 600/15 = 40 km/hr = 40 x 5/18 = 200/18 m/sec</p><p>Time = 1500 / (200/18) = 135 sec</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Adarsh travels 3/8 part of the journey at the speed of 27 km/h, 1/6 part of the journey at the speed of 30 km/h and rest of the journey at the speed of 33 km/h. Find the average speed of Adarsh.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2342;&#2352;&#2381;&#2358; &#2309;&#2346;&#2344;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2366; 3/8 &#2349;&#2366;&#2327; 27 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375;, 1/6 &#2349;&#2366;&#2327; 30 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2340;&#2341;&#2366; &#2358;&#2375;&#2359; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; 33 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2340;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2310;&#2342;&#2352;&#2381;&#2358; &#2325;&#2368; &#2324;&#2360;&#2340; &#2327;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">32 km/h</span><span class=\"hqt\" style=\"display:none\">32 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">31.5 km/h</span><span class=\"hqt\" style=\"display:none\">31.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">27 km/h</span><span class=\"hqt\" style=\"display:none\">27 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">30 km/h</span><span class=\"hqt\" style=\"display:none\">30 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let total distance travelled by Adarsh = 24a (LCM of 8 and 6)</p><p>Remaining journey = 1  -  3/8  -  1/6 = 11/24</p><p>Total time taken = (24a*3/8)/27 + (24a*1/6)/30 + (24a*11/24)/33</p><p>= a/3 + 2a/15 + a/3</p><p>= 4a/5</p><p>Average speed = 24a/(4a/5) = 30 km/h</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Bhuvan travels at the speed of 35 km/h by car in 2.4 hours and 12 km/h on foot in 36 minutes. Find his average speed.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2369;&#2357;&#2344; 35 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2325;&#2366;&#2352; &#2360;&#2375; 2.4 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 12 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2346;&#2376;&#2342;&#2354; 36 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2368; &#2324;&#2360;&#2340; &#2327;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Two cars 1350 m apart are travelling in same direction and the faster car overtakes the slower car from behind in 270 seconds. 1350 m apart if they travel towards each other, they will meet after 30 seconds. Find the speed of both the cars (in km/hr).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2325;&#2366;&#2352;&#2375;&#2306; 1350 m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;&#2306; &#2324;&#2352; &#2360;&#2350;&#2366;&#2344; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2352;&#2361;&#2368; &#2361;&#2376;&#2306; &#2324;&#2352; &#2340;&#2375;&#2332;&#2368; &#2360;&#2375; &#2330;&#2354; &#2352;&#2361;&#2368; &#2325;&#2366;&#2352; 270 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2343;&#2368;&#2350;&#2368; &#2330;&#2354; &#2352;&#2361;&#2368; &#2325;&#2366;&#2352; &#2360;&#2375; &#2310;&#2327;&#2375; &#2344;&#2367;&#2325;&#2354; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 1350 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2357;&#2375; &#2319;&#2325;-&#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2368; &#2323;&#2352; &#2330;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2357;&#2375; 30 &#2360;&#2375;&#2325;&#2306;&#2337; &#2325;&#2375; &#2348;&#2366;&#2342; &#2350;&#2367;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2330;&#2366;&#2354; (&#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">108 km/hr, 72 km/hr</span><span class=\"hqt\" style=\"display:none\">108 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;, 72 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">90 km/hr, 72 km/hr</span><span class=\"hqt\" style=\"display:none\">90 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;, 72 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">90 km/hr, 54 km/hr</span><span class=\"hqt\" style=\"display:none\">90 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;, 54 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">72 km/hr, 54 km/hr</span><span class=\"hqt\" style=\"display:none\">72 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;, 54 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let, the speed of faster car is 'a' m/s and the slower car is 'b' m/s.</p><p>Time = distance/ speed</p><p>According to question,</p><p>270 = 1350/ (a - b) [when moving in the same direction, subtract speed]</p><p>(a - b) = 5 ....... eq (i)</p><p>30 = 1350/ (a + b) [when moving in opposite direction, add speed]</p><p>(a + b) = 45 ...... eq (ii)</p><p>From eq (i) and eq (ii), we get -</p><p>a = 25 m/s = 25 * 18/5 = 90 km/hr</p><p>b = 20 m/s = 20 * 18/5 = 72 km/hr</p><p>[To convert m/s into km/hr multiply by 18/5]</p>",
    "question_index": 8

    "question": "<span class=\"eqt\"><p>X and Y are two stations which are 280 km apart. A train starts at a certain time from X and travels towards Y at 60 km/h. After 2 hours, another train starts from Y and travels towards X at 20 km/h. After how much time from the start of train which left from X, both trains meet?</p></span><span class=\"hqt\" style=\"display:none\"><p>X &#2324;&#2352; Y &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2375; 280 km &#2342;&#2370;&#2352; &#2342;&#2379; &#2360;&#2381;&#2335;&#2375;&#2358;&#2344; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2335;&#2381;&#2352;&#2375;&#2344; X &#2360;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2350;&#2351; &#2346;&#2352; &#2330;&#2354;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; Y &#2325;&#2368; &#2323;&#2352; 60 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; 2 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2342;&#2370;&#2360;&#2352;&#2368; &#2335;&#2381;&#2352;&#2375;&#2344; Y &#2360;&#2375; &#2330;&#2354;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; X &#2325;&#2368; &#2323;&#2352; 20 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; X &#2360;&#2375; &#2344;&#2367;&#2325;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2335;&#2381;&#2352;&#2375;&#2344; &#2325;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2344;&#2375; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2348;&#2366;&#2342; &#2342;&#2379;&#2344;&#2379;&#2306; &#2335;&#2381;&#2352;&#2375;&#2344; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2375; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",

      "<span class=\"eqt\">6 hours</span><span class=\"hqt\" style=\"display:none\">6 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">2 hours</span><span class=\"hqt\" style=\"display:none\">2 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Distance covered by the train leaving from X in 2 hr = 60 * 2 = 120 km</p><p>Remaining distance = 280 - 120 = 160 km</p><p>Now, relative speed = 60 + 20 = 80 km/hr</p><p>Time in which both trains meet after the train leaving from Y started = 160/80 = 2 hr</p><p>Required time = 2 + 2 = 4 hr</p>",
    "question_index": 9
  },

    "question": "<span class=\"eqt\"><p>A bike covers a certain distance at a certain time at the speed of 64 km/hr. If at the speed of 72 km/hr, the bike covers 40 km more at the same time, then find the original distance (in km) covered by the bike.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2366;&#2311;&#2325; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2350;&#2351; &#2346;&#2352; 64 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 72 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375;, &#2348;&#2366;&#2311;&#2325; &#2360;&#2350;&#2366;&#2344; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; 40 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2309;&#2343;&#2367;&#2325; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2366;&#2311;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2351; &#2325;&#2368; &#2327;&#2312; &#2350;&#2370;&#2354; &#2342;&#2370;&#2352;&#2368; (km &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A policeman noticed a thief from 400 m. The thief started running and the policeman was chasing him. The thief and the policeman ran at the speeds of 14 km/hr and 15 km/hr, respectively. What was the distance between them after 4 minutes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2344;&#2375; 400 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2360;&#2375; &#2319;&#2325; &#2330;&#2379;&#2352; &#2325;&#2379; &#2342;&#2375;&#2326;&#2366;&#2404; &#2330;&#2379;&#2352; &#2349;&#2366;&#2327;&#2344;&#2375; &#2354;&#2327;&#2366; &#2324;&#2352; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2313;&#2360;&#2325;&#2366; &#2346;&#2368;&#2331;&#2366; &#2325;&#2352; &#2352;&#2361;&#2366; &#2341;&#2366;&#2404; &#2330;&#2379;&#2352; &#2324;&#2352; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 14 km/hr &#2324;&#2352; 15 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2349;&#2366;&#2327;&#2375;&#2404; 4 &#2350;&#2367;&#2344;&#2335; &#2348;&#2366;&#2342; &#2313;&#2344;&#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2341;&#2368;?</p></span>",
    "options": [

    "question": "<span class=\"eqt\"><p>Train A takes 35 minutes more than train B to travel a distance of 460 km. Due to engine trouble speed of train B falls by a quarter, so it takes 30 minutes more than train A to complete the same journey. What is the speed of train A (in km/hr)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2335;&#2381;&#2352;&#2375;&#2344; A, 460 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2335;&#2381;&#2352;&#2375;&#2344; B &#2360;&#2375; 35 &#2350;&#2367;&#2344;&#2335; &#2309;&#2343;&#2367;&#2325; &#2360;&#2350;&#2351; &#2354;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404; &#2311;&#2306;&#2332;&#2344; &#2350;&#2375;&#2306; &#2326;&#2352;&#2366;&#2348;&#2368; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2335;&#2381;&#2352;&#2375;&#2344; B &#2325;&#2368; &#2330;&#2366;&#2354; &#2319;&#2325;-&#2330;&#2380;&#2341;&#2366;&#2312; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2311;&#2360;&#2354;&#2367;&#2319; &#2360;&#2350;&#2366;&#2344; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2335;&#2381;&#2352;&#2375;&#2344; A &#2360;&#2375; 30 &#2350;&#2367;&#2344;&#2335; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325; &#2360;&#2350;&#2351; &#2354;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404; &#2335;&#2381;&#2352;&#2375;&#2344; A &#2325;&#2368; &#2330;&#2366;&#2354; (km/hr &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "solution": "<p>Speed ratio of train B = 4: 3</p><p>So, the time ratio of train B = 3: 4</p><p>Time difference between train A and B = 35 + 30 = 65 minutes</p><p>Time taken by train A = 65 * 3 + 35 = 230 min = 23/6 hours</p><p>Speed of train A = 460 * 6/23 = 120 km/hr</p><p></p>",

    "question": "<span class=\"eqt\"><p>Two persons M and N started moving towards each other from their respective homes at the same time. The speed of M is (6/5)<sup>th</sup> of the speed of N. After meeting N on the way M took 2 hours 30 minutes to reach N's home, then how much time was taken by N to reach M's home after meeting M on the way?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; M &#2324;&#2352; N &#2319;&#2325; &#2361;&#2368; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2375;-&#2309;&#2346;&#2344;&#2375; &#2328;&#2352;&#2379;&#2306; &#2360;&#2375; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2368; &#2323;&#2352; &#2332;&#2366;&#2340;&#2375; &#2361;&#2369;&#2319; &#2344;&#2367;&#2325;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306; &#2404; M &#2325;&#2368; &#2327;&#2340;&#2367; N &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; (6/5)&#2357;&#2366;&#2306; &#2361;&#2376;&#2404; &#2352;&#2366;&#2360;&#2381;&#2340;&#2375; &#2350;&#2375;&#2306; N &#2360;&#2375; &#2350;&#2367;&#2354;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; M &#2325;&#2379; N &#2325;&#2375; &#2328;&#2352; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2344;&#2375; &#2350;&#2375;&#2306; 2 &#2328;&#2306;&#2335;&#2375; 30 &#2350;&#2367;&#2344;&#2335; &#2325;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;, &#2347;&#2367;&#2352; N &#2325;&#2379; M &#2360;&#2375; &#2350;&#2367;&#2354;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; M &#2325;&#2375; &#2328;&#2352; &#2346;&#2361;&#2369;&#2305;&#2330;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376; ?</p></span>",
    "options": [
      "<span class=\"eqt\">3.2 hours</span><span class=\"hqt\" style=\"display:none\">3.2 &#2328;&#2306;&#2335;&#2375;</span>",

    "correct_option_id": 1,
    "solution": "<p>Consider the following</p><p>t1 = time taken by M to reach N's home after meeting N on the way </p><p>t2= time taken by N to reach M's home after meeting M on the way </p><p>v1 = speed of M </p><p>v2 = speed of N</p><p>Here,</p><p>t1 = 2 hours 30 minutes = 2.5 hours</p><p>v1 = 6v2/5 </p><p>or, v2/v1 = 5/6</p><p>Now,</p><p>t1/t2 = (v2/v1)<sup>2</sup></p><p>or, 2.5/t2 = (5/6)<sup>2</sup> = 25/36</p><p>or, t2 = 2.5*36/25 = 3.6 hours</p>",

    "question": "<span class=\"eqt\"><p>A policeman starts to chase a thief. When thief moves 12 steps, the policeman moves 8 steps. Also 4 steps of policeman is equal to 7 steps of thief. If the speed of thief is 30 km/hr, then find the speed of policeman?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2319;&#2325; &#2330;&#2379;&#2352; &#2325;&#2366; &#2346;&#2368;&#2331;&#2366; &#2325;&#2352;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; &#2330;&#2379;&#2352; 12 &#2325;&#2342;&#2350; &#2330;&#2354;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; 8 &#2325;&#2342;&#2350; &#2330;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2366;&#2341; &#2361;&#2368; &#2346;&#2369;&#2354;&#2367;&#2360; &#2325;&#2375; 4 &#2325;&#2342;&#2350; &#2330;&#2379;&#2352; &#2325;&#2375; 7 &#2325;&#2342;&#2350; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2330;&#2379;&#2352; &#2325;&#2368; &#2330;&#2366;&#2354; 30 km/hr &#2361;&#2376;, &#2340;&#2379; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2325;&#2368; &#2330;&#2366;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;?</p></span>",
