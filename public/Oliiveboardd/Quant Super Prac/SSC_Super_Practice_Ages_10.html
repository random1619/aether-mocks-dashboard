    "question": "<span class=\"eqt\"><p><div>&nbsp;If x = 4 + 2&radic;2 and y = 4 + &radic;5, what is the value of&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x  -  1</span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">y  -  2</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; x = 4 + 2&radic;2 &#2324;&#2352; y = 4 + &radic;5 &#2361;&#2376;, &#2340;&#2379; <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x  -  1</span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">y  -  2</span></div> &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</div></p></span>",

    "question": "<span class=\"eqt\"><p>If 7&radic;x + y&radic;3 = &radic;32 + &radic;18 + &radic;27 + &radic;12, what is the value of x<sup>y</sup>  -  y<sup>x</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 7&radic;x + y&radic;3 = &radic;32 + &radic;18 + &radic;27 + &radic;12, &#2340;&#2379; x<sup>y</sup> - y<sup>x </sup> &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366; ?</p></span>",

    "solution": "<p>As we know that, 4ab = (a + b)<sup>2</sup>  -  (a  -  b)<sup>2</sup></p><p>=&gt;4ab = 6  -  2 = 4</p><p>=&gt;ab = 1</p><p>Also; a<sup>2</sup> + b<sup>2</sup> = (a + b)<sup>2</sup>  -  2ab</p><p>=&gt; a<sup>2</sup> + b<sup>2</sup> = 6  -  2 = 4</p><p>Hence required value = ab (a<sup>2</sup> + b<sup>2</sup>) = 1  X  4 = 4</p>",
