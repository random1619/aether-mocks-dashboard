<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The surface area of the three adjacent faces of a cuboid are A, B, C respectively. Find the volume of a cube having a side length numerically equal to the volume of the cuboid.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344;&#2366;&#2349; &#2325;&#2375; &#2340;&#2368;&#2344; &#2310;&#2360;&#2344;&#2381;&#2344; &#2347;&#2354;&#2325;&#2379;&#2306; &#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; A, B, C &#2361;&#2376;&#2404; &#2319;&#2325; &#2328;&#2344; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2328;&#2344;&#2366;&#2349; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">(A.B.C)<sup>1/3</sup></span><span class=\"hqt\" style=\"display:none\">(&#2319;.&#2348;&#2368;.&#2360;&#2368;)<sup>1/3</sup></span>",
      "<span class=\"eqt\">(A.B.C)<sup>1/2</sup></span><span class=\"hqt\" style=\"display:none\">(&#2319;.&#2348;&#2368;.&#2360;&#2368;)<sup>1/2</sup></span>",
      "<span class=\"eqt\">(A.B.C)<sup>3/2</sup></span><span class=\"hqt\" style=\"display:none\">(&#2319;.&#2348;&#2368;.&#2360;&#2368;)<sup>3/2</sup></span>",
      "<span class=\"eqt\">A.B.C</span><span class=\"hqt\" style=\"display:none\">&#2319;.&#2348;&#2368;.&#2360;&#2368;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The 3 adjacent surface areas of a cuboid are A, B and C.</p><p>A =l.b ---------(i)</p><p>B= b.h ---------(ii)</p><p>C= h.l ----------(iii)</p><p>On multiplying (i),(ii),(iii) we get,</p><p>A. B. C = l.b.b.h.h.l</p><p>=&gt; A. B. C = (l.b.h)<sup>2</sup></p><p>Where l, b and h are the length, breadth and height of the cuboid.</p><p>Now, Volume = l.b.h = (A.B.C)<sup>1/2</sup></p><p>Volume of the cube = a<sup>3</sup></p><p>Where, a = (A.B.C)<sup>&frac12;</sup></p><p>=&gt; volume of cube = (A.B.C)<sup>3/2</sup></p><p>So, <b>option 3</b> is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A cylindrical tank of diameter 21cm is partially filled with water. If a cubical metal block of side 14cm is immersed into it, the water level in the tank will rise approximately by how much level?</p></span><span class=\"hqt\" style=\"display:none\"><p>21 &#2360;&#2375;&#2350;&#2368; &#2357;&#2381;&#2351;&#2366;&#2360; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2348;&#2375;&#2354;&#2344;&#2366;&#2325;&#2366;&#2352; &#2335;&#2376;&#2306;&#2325; &#2310;&#2306;&#2358;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2366;&#2344;&#2368; &#2360;&#2375; &#2349;&#2352;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 14 &#2360;&#2375;&#2350;&#2368; &#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2328;&#2344;&#2366;&#2325;&#2366;&#2352; &#2343;&#2366;&#2340;&#2369; &#2325;&#2366; &#2348;&#2381;&#2354;&#2377;&#2325; &#2311;&#2360;&#2350;&#2375;&#2306; &#2337;&#2369;&#2348;&#2379;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2360;&#2381;&#2340;&#2352; &#2354;&#2327;&#2349;&#2327; &#2325;&#2367;&#2340;&#2344;&#2366; &#2348;&#2338;&#2364; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">7.426 cm</span><span class=\"hqt\" style=\"display:none\">7.426 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">7.526 cm</span><span class=\"hqt\" style=\"display:none\">7.526 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">7.922 cm</span><span class=\"hqt\" style=\"display:none\">7.922 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">8.526 cm</span><span class=\"hqt\" style=\"display:none\">8.526 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Volume of the cubical block = 14<sup>3</sup> = 2744</p><p>Volume of the water raised/ volume of the cubical block = &#960; * 10.5<sup>2</sup> * raised water level</p><p>Raised water level = 2744 / &#960; * 10.5<sup>2</sup> = 7.922 cm</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A cuboid of size 8 cm  X  4 cm  X  2 cm is cut into cubes of equal sides of 1 cm side. What is the ratio of the surface area of the original cuboid to the surface areas of all the unit cubes to be formed?</p></span><span class=\"hqt\" style=\"display:none\"><p>8 &#2360;&#2375;&#2350;&#2368; x 4 &#2360;&#2375;&#2350;&#2368; x 2 &#2360;&#2375;&#2350;&#2368; &#2310;&#2325;&#2366;&#2352; &#2325;&#2375; &#2319;&#2325; &#2328;&#2344;&#2366;&#2349; &#2325;&#2379; 1 &#2360;&#2375;&#2350;&#2368; &#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2357;&#2366;&#2354;&#2375; &#2328;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2366;&#2335;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2350;&#2370;&#2354; &#2328;&#2344;&#2366;&#2349; &#2325;&#2375; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2366; &#2348;&#2344;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2349;&#2368; &#2311;&#2325;&#2366;&#2312; &#2328;&#2344;&#2379;&#2306; &#2325;&#2375; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2360;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">22:5</span><span class=\"hqt\" style=\"display:none\">22:5</span>",
      "<span class=\"eqt\">8:11</span><span class=\"hqt\" style=\"display:none\">8:11</span>",
      "<span class=\"eqt\">21:23</span><span class=\"hqt\" style=\"display:none\">21:23</span>",
      "<span class=\"eqt\">7:24</span><span class=\"hqt\" style=\"display:none\">7:24</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Volume of the cuboid = l * b * h = 8 * 4 * 2 = 64 cm&ge;</p><p>Volume of each cube = 1 * 1 * 1 = 1 cm&ge;</p><p>If n is the number of cubes formed, 64 = n * 1 (Since volume will be equal)</p><p>=&gt; Number of small cubes = 64</p><p>Surface area of cuboid = 2 (lw + wh + hl) = 2 (8 * 4 + 4 * 2 + 2 * 8) = 2 * (32 + 8 + 16) = 2 * 56 = 112 cm&#178;</p><p>Surface area of all cubes = 64 * 6 * 1&ge; = 384 cm&#178;</p><p>Ratio of surface area of cuboid and all cubes = 112:384 = 7:24</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Jacob Tremblay's room is in the shape of a cuboid and measures 15m x 12m x 9m. What is the maximum length of an iron rod that he can fit in his room?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2375;&#2325;&#2348; &#2335;&#2381;&#2352;&#2375;&#2350;&#2381;&#2348;&#2354;&#2375; &#2325;&#2366; &#2325;&#2350;&#2352;&#2366; &#2328;&#2344;&#2366;&#2349; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2325;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2366; &#2350;&#2366;&#2346; 15 &#2350;&#2368;&#2335;&#2352; x 12 &#2350;&#2368;&#2335;&#2352; x 9 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2404; &#2357;&#2361; &#2309;&#2346;&#2344;&#2375; &#2325;&#2350;&#2352;&#2375; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2325;&#2367;&#2340;&#2344;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2368; &#2354;&#2379;&#2361;&#2375; &#2325;&#2368; &#2331;&#2337;&#2364; &#2347;&#2367;&#2335; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">15m</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">30m</span><span class=\"hqt\" style=\"display:none\">30 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">17m</span><span class=\"hqt\" style=\"display:none\">17&#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">15&radic;2m</span><span class=\"hqt\" style=\"display:none\">15&radic;2&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Maximum length of rod will be when it is diagonally placed in a cuboid.</p><p>The length of the diagonal of his room = &radic;{(15)&#178; + (12)&#178; + (9)&#178;} = &radic;(225 + 144 +81) = &radic;450</p><p>Maximum length of rod = 15&radic;2 m</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The area of the two sides of a box is 144 cm<sup>2</sup> and 90 cm<sup>2</sup> respectively. If the area of the upper surface of the box is 40 cm<sup>2</sup> then what is the volume of the box?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2368; &#2342;&#2379; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 144 &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2324;&#2352; 90 &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2368; &#2314;&#2346;&#2352;&#2368; &#2360;&#2340;&#2361; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 40 &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2361;&#2376;, &#2340;&#2379; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1050 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">1050 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">760 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">760 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">720 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">720 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">860 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">860 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the length, breadth and height of a box is represented by l, b, h.</p><p>Now we know that volume of any box having length, breadth and height respectively as l, b, h is (V) = l  X  b  X  h</p><p>Now area of a side of a box is = l  X  h = 144 .. (1)</p><p>Similarly, Area of the other side of box = b  X  h = 90 .. (2)</p><p>And area of upper surface = l  X  b = 40 .. (3)</p><p>Now if we multiply all these 3 equations together then we get</p><p>(l  X  b  X  h)<sup>2</sup> = 144  X  90  X  40</p><p>=&gt; l  X  b  X  h = &radic;(144 X 90  X 40)</p><p>So, Volume of the box = &radic;144 x&radic;3600</p><p>=12x60 =720 cm<sup>3</sup></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What is the maximum total surface area of a cuboid whose sum of length, breadth and height is 17 cm? (All the dimensions of the cuboid are integral dimensions)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344;&#2366;&#2349; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366; &#2332;&#2367;&#2360;&#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312;, &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2366; &#2351;&#2379;&#2327; 17 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;? (&#2328;&#2344;&#2366;&#2349; &#2325;&#2375; &#2360;&#2349;&#2368; &#2310;&#2351;&#2366;&#2350; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2310;&#2351;&#2366;&#2350; &#2361;&#2376;&#2306;)</p></span>",
    "options": [
      "<span class=\"eqt\">156 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">156 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">216 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">216 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">184 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">184 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">192 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">192 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>If length, breadth and height of the cuboid are; l, b and h respectively then; l + b + h = 17</p><p>Now in order to maximize total surface area we have to take the values of l, b and h close to each other.</p><p>Hence (l, b, h) = (6, 6, 5)</p><p>Therefore, total surface area of the cuboid = 2(6  X  6 + 6  X  5 + 5  X  6) = 2(36 + 30 + 30) cm<sup>2</sup></p><p>= 192 cm<sup>2</sup></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The measurement of a wood box is 62  X  34  X  15 cm<sup>3 </sup>(length*width*height). If the thickness of the wood is 0.5 cm then what will be the weight of the box if it is known that weight of 1 cm<sup>3</sup> is 5 gram?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2354;&#2325;&#2337;&#2364;&#2368; &#2325;&#2375; &#2348;&#2325;&#2381;&#2360;&#2375; &#2325;&#2366; &#2350;&#2366;&#2346; 62 X 34 X 15 &#2360;&#2375;&#2350;&#2368;<sup>3 </sup>(&#2354;&#2306;&#2348;&#2366;&#2312;*&#2330;&#2380;&#2337;&#2364;&#2366;&#2312;*&#2314;&#2306;&#2330;&#2366;&#2312;) &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2354;&#2325;&#2337;&#2364;&#2368; &#2325;&#2368; &#2350;&#2379;&#2335;&#2366;&#2312; 0.5 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2340;&#2379; &#2348;&#2325;&#2381;&#2360;&#2375; &#2325;&#2366; &#2357;&#2332;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366; &#2351;&#2342;&#2367; &#2351;&#2361; &#2332;&#2381;&#2334;&#2366;&#2340; &#2361;&#2379; &#2325;&#2367; 1 &#2360;&#2375;&#2350;&#2368;<sup>3</sup> &#2325;&#2366; &#2357;&#2332;&#2344; 5 &#2327;&#2381;&#2352;&#2366;&#2350; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">20.82 kg</span><span class=\"hqt\" style=\"display:none\">20.82 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">17.19 kg</span><span class=\"hqt\" style=\"display:none\">17.19 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",

  {
    "question": "<span class=\"eqt\"><p>A larger solid cuboid of dimensions 32cm x 25cm x 18cm respectively is cut into many small solid cuboids of dimensions 15cm x 12cm x 10cm respectively. The surface area of all small cuboids is __ cm<sup>2</sup> more than the surface area of larger cuboid.</p></span><span class=\"hqt\" style=\"display:none\"><p>32 &#2360;&#2375;&#2350;&#2368; x 25 &#2360;&#2375;&#2350;&#2368; x 18 &#2360;&#2375;&#2350;&#2368; &#2310;&#2351;&#2366;&#2350; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2348;&#2337;&#2364;&#2375; &#2336;&#2379;&#2360; &#2328;&#2344;&#2366;&#2349; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 15 &#2360;&#2375;&#2350;&#2368; x 12 &#2360;&#2375;&#2350;&#2368; x 10 &#2360;&#2375;&#2350;&#2368; &#2310;&#2351;&#2366;&#2350; &#2357;&#2366;&#2354;&#2375; &#2325;&#2312; &#2331;&#2379;&#2335;&#2375; &#2336;&#2379;&#2360; &#2328;&#2344;&#2366;&#2349;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2366;&#2335;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2349;&#2368; &#2331;&#2379;&#2335;&#2375; &#2328;&#2344;&#2366;&#2349;&#2379;&#2306; &#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2348;&#2337;&#2364;&#2375; &#2328;&#2344;&#2366;&#2349; &#2325;&#2375; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2360;&#2375; __ &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3006 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">3006 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">3242 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">3242 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">3548 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">3548 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">3112 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">3112 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let a, b and c are dimensions of larger cuboid and d, e and f are dimensions of small cuboid, i.e.,</p><p>For larger cuboid:</p><p>a = 32 cm, b = 25 cm, c = 18 cm</p><p>Volume of larger cuboid = a x b x c = 32 x 25 x 18 = 14400 cm<sup>3</sup></p><p>For small cuboids:</p><p>d = 15 cm, e = 12 cm, f = 10 cm</p><p>Volume of each small cuboid = d x e x f = 15 x 12 x 10 = 1800 cm<sup>3</sup></p><p>Total number of small cuboids = 14400/1800 = 8</p><p>Now, surface area of all small cuboids = 8 x 2(d x e + e x f + f x d)</p><p>= 8 x 2(15 x 12 + 12 x 10 + 10 x 15)</p><p>= 7200 cm<sup>2</sup></p><p>And, surface area of larger cuboid = 2(a x b + b x c + c x a)</p><p>= 2(32 x 25 + 25 x 18 + 18 x 32)</p><p>= 3652 cm<sup>2</sup></p><p>Difference between surface area of all small cuboids and larger cuboid</p><p>= 7200  -  3652</p><p>= 3548 cm<sup>2</sup></p>",
    "question_index": 8
  },

    "question": "<span class=\"eqt\"><p>24 small cubes of same sizes placed together in a manner to make a one large cube. If the surface area of the large cube is equal to the sum of the surface areas of all smaller cubes, and sum of lateral surface area of large cube and one small cube is 9792 cm<sup>2</sup>, then what is the side of each small cube?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2361;&#2368; &#2310;&#2325;&#2366;&#2352; &#2325;&#2375; 24 &#2331;&#2379;&#2335;&#2375; &#2328;&#2344;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2311;&#2360; &#2340;&#2352;&#2361; &#2352;&#2326;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; &#2319;&#2325; &#2348;&#2337;&#2364;&#2366; &#2328;&#2344; &#2348;&#2344; &#2332;&#2366;&#2319;&#2404; &#2351;&#2342;&#2367; &#2348;&#2337;&#2364;&#2375; &#2328;&#2344; &#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2360;&#2349;&#2368; &#2331;&#2379;&#2335;&#2375; &#2328;&#2344;&#2379;&#2306; &#2325;&#2375; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;&#2379;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;, &#2340;&#2341;&#2366; &#2348;&#2337;&#2364;&#2375; &#2328;&#2344; &#2324;&#2352; &#2319;&#2325; &#2331;&#2379;&#2335;&#2375; &#2328;&#2344; &#2325;&#2375; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 9792 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2331;&#2379;&#2335;&#2375; &#2328;&#2344; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">12 cm</span><span class=\"hqt\" style=\"display:none\">12 &#2360;&#2375;&#2350;&#2368;</span>",

      "<span class=\"eqt\">24 cm</span><span class=\"hqt\" style=\"display:none\">24 &#2360;&#2375;&#2350;&#2368;</span>"

    "correct_option_id": 0,
    "solution": "<p>Let side of bigger cube = A cm and side of each smaller cube = a cm</p><p>(6A<sup>2</sup>)/(12 * 6a<sup>2</sup>) = 2/3</p><p>=&gt; A<sup>2</sup>/a<sup>2</sup> = 2/3 * 24 = 16</p><p>=&gt; A/a = 4/1</p><p>Let A = 4x and a = x cm</p><p>So, 4A<sup>2</sup> + 4a<sup>2</sup> = 9792</p><p>=&gt; 4 * 16x<sup>2</sup> + 4 * x<sup>2</sup> = 9792</p><p>=&gt; 68x<sup>2</sup> = 9792</p><p>=&gt; x<sup>2</sup>= 144</p><p>=&gt; x = 12 cm</p><p>So, length of the small cube = x = 12 cm</p>",

  {
    "question": "<span class=\"eqt\"><p>If a cube is melted and converted in to 1000 cubes of equal volumes, then total surface area of a smaller cube is how much percent less than the total surface area of bigger cube?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2328;&#2344; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366; &#2325;&#2352; &#2360;&#2350;&#2366;&#2344; &#2310;&#2351;&#2340;&#2344; &#2325;&#2375; 1000 &#2328;&#2344; &#2348;&#2344;&#2366;&#2351;&#2375; &#2332;&#2366;&#2351;&#2375;, &#2340;&#2379; &#2319;&#2325; &#2331;&#2379;&#2335;&#2375; &#2328;&#2344; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;, &#2348;&#2396;&#2375; &#2328;&#2344; &#2325;&#2375; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2350; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">94%.</span><span class=\"hqt\" style=\"display:none\">94%.</span>",
      "<span class=\"eqt\">99%.</span><span class=\"hqt\" style=\"display:none\">99%.</span>",
      "<span class=\"eqt\">92%.</span><span class=\"hqt\" style=\"display:none\">92%.</span>",
      "<span class=\"eqt\">90%.</span><span class=\"hqt\" style=\"display:none\">90%.</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the side of cube be A</p><p>Total surface area = 6 x A<sup>2</sup></p><p>Volume = A<sup>3</sup></p><p>Volume of each small cube = (A<sup>3</sup>/1000)</p><p>Side of each small cube = (A/10)</p><p>Total surface area of each small cube = 6 (A/10)<sup>2 </sup>= 6(A<sup>2</sup>/100)</p><p>Required percentage change = 100% - (((6(A<sup>2</sup>/100))/ (6 x A<sup>2</sup>)) x 100%) = 100% - 1% = 99%.</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>A cube of side 5 cm has been assembled using 125 cubes each of 1 cm edge. One cube is removed from the middle of each of the faces of the cube. What is the surface area (in cm<sup>2</sup>) of the remaining solid?</p></span><span class=\"hqt\" style=\"display:none\"><p>5 cm &#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2328;&#2344; &#2325;&#2379; 1 cm &#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; 125 &#2328;&#2344;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2325;&#2367;&#2351;&#2375; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2328;&#2344; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2347;&#2354;&#2325; &#2325;&#2375; &#2350;&#2343;&#2381;&#2351; &#2360;&#2375; &#2319;&#2325; &#2328;&#2344; &#2325;&#2366;&#2335;&#2325;&#2352; &#2361;&#2335;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359; &#2336;&#2379;&#2360; &#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (cm<sup>2</sup> &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">155</span><span class=\"hqt\" style=\"display:none\">155</span>",
      "<span class=\"eqt\">144</span><span class=\"hqt\" style=\"display:none\">144</span>",
      "<span class=\"eqt\">150</span><span class=\"hqt\" style=\"display:none\">150</span>",
      "<span class=\"eqt\">174</span><span class=\"hqt\" style=\"display:none\">174</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Since 1 small cube from the middle of each of the faces of the large cube is removed. Which means 4 new faces of side 1 cm at all the 6 faces of new cube will be created.</p><p>Total surface area of the cube = Surface area of cube + 6 * (4 * Area of one new small face)</p><p>= 6 * 5<sup>2</sup> + 6 * (4 * 1<sup>2</sup>)</p><p>= 150 + 24</p><p>= 174 cm<sup>2</sup></p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>The volume of a cuboid is X cubic cm and that of a cube is Y cubic cm. If X = 3Y, and dimensions of the cuboid are 5 cm x 5 cm x 15 cm. then the total surface area of cube is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344;&#2366;&#2349; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; X &#2328;&#2344; &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; &#2319;&#2325; &#2328;&#2344; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; Y &#2328;&#2344; &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; X = 3Y &#2361;&#2376; &#2324;&#2352; &#2328;&#2344;&#2366;&#2349; &#2325;&#2366; &#2310;&#2351;&#2366;&#2350; 5 &#2360;&#2375;&#2350;&#2368; x 5 &#2360;&#2375;&#2350;&#2368; x 15 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2328;&#2344; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2361;&#2376;:</p></span>",

  {
    "question": "<span class=\"eqt\"><p>The lateral surface area of a rectangular block is 4046 sq. cm. If length, breadth, and height are in the ratio of 5: 2: 1, find length.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2348;&#2381;&#2354;&#2377;&#2325; &#2325;&#2366; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 4046 sq. cm &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2354;&#2306;&#2348;&#2366;&#2312;, &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 5: 2: 1 &#2361;&#2376;, &#2340;&#2379; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

    "solution": "<p>Let the length, breadth, and height of the block be 5X cm, 2X cm, and X cm respectively.</p><p>Lateral surface area = 4046</p><p>2 * X * (5X + 2X) = 4046</p><p>14X<sup>2</sup> = 4046</p><p>X<sup>2</sup> = 289</p><p>X = 17 cm</p><p>Length = 5X = 17 * 5 = 85 cm</p>",

    "question": "<span class=\"eqt\"><p>A rectangular parallelepiped has length 20 cm more than its breadth and 15 cm more than its height. If the sum of its length, breadth and height is 85 cm, then find its volume.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2360;&#2350;&#2366;&#2344;&#2381;&#2340;&#2352; &#2359;&#2335;&#2347;&#2354;&#2325; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2311;&#2360;&#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2360;&#2375; 20 &#2360;&#2375;&#2350;&#2368; &#2309;&#2343;&#2367;&#2325; &#2324;&#2352; &#2313;&#2360;&#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2360;&#2375; 15 &#2360;&#2375;&#2350;&#2368; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2311;&#2360;&#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312;, &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2366; &#2351;&#2379;&#2327; 85 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
