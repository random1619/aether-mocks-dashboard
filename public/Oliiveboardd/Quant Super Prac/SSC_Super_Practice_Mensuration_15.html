<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts & Icons -->

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The surface area of a sphere is 616 sq. cm, find its diameter. (Take &#960; = 22/7)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 616 sq. cm &#2361;&#2376;, &#2311;&#2360;&#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; (&#960; = 22/7 &#2354;&#2368;&#2332;&#2367;&#2319;)</p></span>",
    "options": [
      "<span class=\"eqt\">12 cm</span><span class=\"hqt\" style=\"display:none\">12 cm</span>",
      "<span class=\"eqt\">13 cm</span><span class=\"hqt\" style=\"display:none\">13 cm</span>",
      "<span class=\"eqt\">16 cm</span><span class=\"hqt\" style=\"display:none\">16 cm</span>",
      "<span class=\"eqt\">14 cm</span><span class=\"hqt\" style=\"display:none\">14 cm</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Given,</p><p>4&#960;r * r = 616</p><p>4 * 22 / 7 * r * r= 616</p><p>22/ 7 * r * r= 154</p><p>r * r = 7 * 7</p><p>r=7</p><p></p><p>Diameter is 2 * r = 14 cm</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If the total surface area of the hemisphere is 462 cm<sup>2</sup> and the radius of the hemisphere is half the radius of the sphere, then find the total surface area of the sphere. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 462 cm<sup>2</sup> &#2361;&#2376; &#2340;&#2341;&#2366; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;, &#2319;&#2325; &#2327;&#2379;&#2354;&#2375; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2368; &#2310;&#2343;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2398 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">2398 cm<sup>2</sup></span>",
      "<span class=\"eqt\">2354 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">2354 cm<sup>2</sup></span>",
      "<span class=\"eqt\">2464 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">2464 cm<sup>2</sup></span>",
      "<span class=\"eqt\">2332 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">2332 cm<sup>2</sup></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The total surface area of the hemisphere = 3&#960;r<sup>2</sup></p><p>462 = 3 * 22/7 * r<sup>2</sup></p><p>r<sup>2</sup> = 462 * 7/66 </p><p>r<sup>2</sup> = 49</p><p>r = 7 cm</p><p>Radius of sphere = 2 * 7 = 14 cm </p><p>Hence, the total surface area of the sphere = 4&#960;r<sup>2</sup> </p><p>= 4 * 22/7 * 14 * 14 </p><p>= 2464 cm<sup>2</sup></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If the ratio of total surface area of a sphere to the curved surface area of a hemisphere is 8: 9, and the radius of the sphere is 12 cm, then find the radius of the hemisphere.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2327;&#2379;&#2354;&#2375; &#2325;&#2375; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2324;&#2352; &#2319;&#2325; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2375; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 8: 9 &#2361;&#2376; &#2340;&#2341;&#2366; &#2327;&#2379;&#2354;&#2375; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 12 cm &#2361;&#2376;, &#2340;&#2379; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">21 cm</span><span class=\"hqt\" style=\"display:none\">21 cm</span>",
      "<span class=\"eqt\">18 cm</span><span class=\"hqt\" style=\"display:none\">18 cm</span>",
      "<span class=\"eqt\">16 cm</span><span class=\"hqt\" style=\"display:none\">16 cm</span>",
      "<span class=\"eqt\">20 cm</span><span class=\"hqt\" style=\"display:none\">20 cm</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total surface area of the sphere/ Curved surface area of the hemisphere = 8/9</p><p>4&#960;r<sub>1</sub><sup>2</sup>/ 2&#960;r<sup>2</sup> = 8/9</p><p>=> 2 * 12<sup>2</sup>/ r<sup>2</sup> = 8/9</p><p>=> r<sup>2</sup> = 2 * 144 * 9/8</p><p>=> r<sup>2</sup> = 324</p><p>=> r = 18 cm</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Total surface area of the cylinder is 1364 cm<sup>2</sup> and the height of the cylinder is 24 cm. If the radius of the cylinder is equal to the radius of a sphere, then find the curved surface area of the sphere.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 1364 cm<sup>2</sup> &#2361;&#2376; &#2324;&#2352; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 24 cm &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2319;&#2325; &#2327;&#2379;&#2354;&#2375; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">616 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">616 cm<sup>2</sup></span>",
      "<span class=\"eqt\">308 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">308 cm<sup>2</sup></span>",
      "<span class=\"eqt\">780 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">780 cm<sup>2</sup></span>",
      "<span class=\"eqt\">462 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">462 cm<sup>2</sup></span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Total surface area of the cylinder = 2&#960;r (r + h)</p><p>1364 = 2 * 22/7 * r (r + 24)</p><p>=> 217 = r<sup>2</sup> + 24r</p><p>=> r<sup>2</sup> + 24r  -  217 = 0</p><p>=> r<sup>2</sup> + 31r  -  7r  -  217 = 0</p><p>=> r*(r + 31)  -  7*(r + 31) = 0</p><p>=> (r  -  7)*(r + 31) = 0</p><p>=> r = 7 [Neglect negative value]</p><p>Hence, the curved surface area of the sphere = 4&#960;r<sup>2</sup></p><p>= 4 * 22/7 * 7 * 7</p><p>= 616 cm<sup>2</sup></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The total surface area of the sphere is 5544 cm<sup>2</sup>. If the radius of the sphere is equal to the radius of a cone and the slant height of the cone is 32 cm, then find the curved surface area of the cone. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 5544 cm<sup>2</sup> &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2327;&#2379;&#2354;&#2375; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;, &#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376; &#2324;&#2352; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2340;&#2367;&#2352;&#2381;&#2351;&#2325; &#2314;&#2305;&#2330;&#2366;&#2312; 32 cm &#2361;&#2376;, &#2340;&#2379; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1980 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">1980 cm<sup>2</sup></span>",
      "<span class=\"eqt\">1408 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">1408 cm<sup>2</sup></span>",
      "<span class=\"eqt\">2816 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">2816 cm<sup>2</sup></span>",
      "<span class=\"eqt\">2112 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">2112 cm<sup>2</sup></span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The total surface area of the sphere = 4&#960;r<sup>2</sup></p><p>5544 = 4 * 22/7 * r<sup>2</sup></p><p>r<sup>2</sup> = 441 </p><p>r = 21 cm </p><p>Hence, the curved surface area of the cone = &#960;rl</p><p>= 22/7 * 21 * 32 </p><p>= 2112 cm<sup>2</sup></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If the total surface area of the hemisphere is 13975.5 cm<sup>2</sup>, then find the diameter of the hemisphere. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 13975.5 cm<sup>2</sup> &#2361;&#2376;, &#2340;&#2379; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">55 cm</span><span class=\"hqt\" style=\"display:none\">55 cm</span>",
      "<span class=\"eqt\">81 cm</span><span class=\"hqt\" style=\"display:none\">81 cm</span>",
      "<span class=\"eqt\">77 cm</span><span class=\"hqt\" style=\"display:none\">77 cm</span>",
      "<span class=\"eqt\">62 cm</span><span class=\"hqt\" style=\"display:none\">62 cm</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The total surface area of the hemisphere = 3&#960;r<sup>2</sup></p><p>13975.5 = 3 * 22/7 * r<sup>2</sup></p><p>r<sup>2</sup> = 1482.25 </p><p>r = 38.5 cm</p><p>Hence, the diameter of the hemisphere = 2 * 38.5</p><p>= 77 cm</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>A sphere has a volume of 154 cm<sup>3</sup>. If a cylinder of diameter 0.28 cm has the same volume as that of the sphere, find the height of the cylinder.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 154 cm<sup>3 </sup>&#2361;&#2376;&#2404; 0.28 cm &#2357;&#2381;&#2351;&#2366;&#2360; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; , &#2327;&#2379;&#2354;&#2375; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">25 m</span><span class=\"hqt\" style=\"display:none\">25 m</span>",
      "<span class=\"eqt\">14 m</span><span class=\"hqt\" style=\"display:none\">14 m</span>",
      "<span class=\"eqt\">35 m</span><span class=\"hqt\" style=\"display:none\">35 m</span>",
      "<span class=\"eqt\">7 m</span><span class=\"hqt\" style=\"display:none\">7 m</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Area of cross-section = &pi; &times; 0.14<sup>2</sup> = 0.0616 cm<sup>2</sup></p><p>Let the height of the cylinder be h.</p><p>0.0616 &times; h = 154</p><p>h = 2500 cm = 25 m</p><p>Hence, option a.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>When diameter of a sphere is decreased by 8 cm, its volume becomes 904.32 cm<sup>3</sup>. Find the surface area (in cm<sup>2</sup>) of the original sphere. (take &#960; = 3.14)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2379;&#2354;&#2375; &#2325;&#2375; &#2357;&#2381;&#2351;&#2366;&#2360; &#2325;&#2379; 8 cm &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2313;&#2360;&#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 904.32 cm<sup>3</sup><sup> </sup>&#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2350;&#2370;&#2354; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (cm<sup>2 </sup>&#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; (&#960; = 3.14 &#2354;&#2368;&#2332;&#2367;&#2319;)</p></span>",
    "options": [
      "<span class=\"eqt\">2826</span><span class=\"hqt\" style=\"display:none\">2826</span>",
      "<span class=\"eqt\">942</span><span class=\"hqt\" style=\"display:none\">942</span>",
      "<span class=\"eqt\">1256</span><span class=\"hqt\" style=\"display:none\">1256</span>",
      "<span class=\"eqt\">1884</span><span class=\"hqt\" style=\"display:none\">1884</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>New volume of sphere = (4/3) * &#960; * (new radius of sphere)<sup>3</sup></p><p>904.32 = (4/3) * 3.14 * (new radius of sphere)<sup>3</sup></p><p>New radius of sphere = 6</p><p>Original radius of sphere = 6 + 8/2 = 10 cm</p><p>Therefore, surface area of the original sphere = 4 * &#960; * (radius of sphere)<sup>2</sup></p><p>= 4 * 3.14 * 10 * 10</p><p>= <b>1256 cm<sup>2</sup></b></p><p><b><sup> </sup></b></p>",
    "question_index": 7
  },
  {

    "question": "<span class=\"eqt\"><p>Suppose the surface area of a sphere is A<sub>1</sub>. It is cut right in the middle into two equal parts and the total surface areas of both parts is A<sub>2</sub>. Find A<sub>1</sub>:A<sub>2</sub>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2366; &#2319;&#2325; &#2327;&#2379;&#2354;&#2366; &#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; A<sub>1 </sub> &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; &#2336;&#2368;&#2325; &#2350;&#2343;&#2381;&#2351; &#2350;&#2375;&#2306; &#2325;&#2366;&#2335; &#2325;&#2352; &#2342;&#2379; &#2348;&#2352;&#2366;&#2348;&#2352; &#2349;&#2366;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2366;&#2306;&#2335;&#2366; &#2327;&#2351;&#2366; &#2324;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2349;&#2366;&#2327;&#2379;&#2306; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; A<sub>2 </sub> &#2361;&#2376;| A<sub>1</sub>:A<sub>2 </sub> &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;?</p></span>",
