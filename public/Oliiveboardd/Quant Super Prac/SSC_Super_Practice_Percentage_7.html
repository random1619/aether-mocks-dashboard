<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>

                <!-- Controls -->

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Study the line graph and answer the question that follows.</p><p>The line graph represents the number of vehicles (in thousands) manufactured by two automobile companies A and B over the years from 2010 to 2015. The X-axis represents the years and Y- axis represents number of vehicles in thousands,</p><p>(The data shown here is only for mathematical exercise. They do not represent the actual figures of the country.)</p><p><img border=0 width=576 height=392 id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21831/image034.png\"></p><p>Company B is projecting an increase in the number of vehicles to be manufactured in 2016 by 70% with respect to its average number of vehicles from 2010 to 2015. What should be the approximate percentage increase in the number of vehicles (in thousands) to be manufactured by company A in 2016 with respect to the number of vehicles in 2015, so that it is at par with Company B?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2357;&#2352;&#2381;&#2359; 2010 &#2360;&#2375; &#2357;&#2352;&#2381;&#2359; 2015 &#2340;&#2325; &#2342;&#2379; &#2321;&#2335;&#2379;&#2350;&#2379;&#2348;&#2366;&#2311;&#2354; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; A &#2324;&#2352; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2357;&#2366;&#2361;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; (&#2361;&#2332;&#2366;&#2352; &#2350;&#2375;&#2306;) &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; X-&#2309;&#2325;&#2381;&#2359; &#2357;&#2352;&#2381;&#2359; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; Y-&#2309;&#2325;&#2381;&#2359; &#2361;&#2332;&#2366;&#2352; &#2350;&#2375;&#2306; &#2357;&#2366;&#2361;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>(&#2351;&#2361;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2319; &#2327;&#2319; &#2310;&#2305;&#2325;&#2396;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2309;&#2349;&#2381;&#2351;&#2366;&#2360; &#2325;&#2375; &#2354;&#2367;&#2319; &#2361;&#2376;&#2404; &#2357;&#2375; &#2342;&#2375;&#2358; &#2325;&#2375; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2310;&#2305;&#2325;&#2337;&#2364;&#2379;&#2306; &#2325;&#2379; &#2344;&#2361;&#2368;&#2306; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;)</p><p><img border=\"0\" width=\"576\" height=\"392\" id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21831/image034.png\"></p><p>&#2325;&#2306;&#2346;&#2344;&#2368; B &#2357;&#2352;&#2381;&#2359; 2010 &#2360;&#2375; &#2357;&#2352;&#2381;&#2359; 2015 &#2340;&#2325; &#2309;&#2346;&#2344;&#2375; &#2357;&#2366;&#2361;&#2344;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2359; 2016 &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2366;&#2361;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; 70% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; &#2354;&#2327;&#2366; &#2352;&#2361;&#2368; &#2361;&#2376;&#2404; &#2357;&#2352;&#2381;&#2359; 2015 &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2357;&#2366;&#2361;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2357;&#2352;&#2381;&#2359; 2016 &#2350;&#2375;&#2306; &#2325;&#2306;&#2346;&#2344;&#2368; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2357;&#2366;&#2361;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; (&#2361;&#2332;&#2366;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306;) &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367; &#2351;&#2361; &#2325;&#2306;&#2346;&#2344;&#2368; B &#2325;&#2375; &#2357;&#2366;&#2361;&#2344; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;?</p></span>",
    "options": [
      "<span class=\"eqt\">57</span><span class=\"hqt\" style=\"display:none\">57</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">50</span><span class=\"hqt\" style=\"display:none\">50</span>",
      "<span class=\"eqt\">42</span><span class=\"hqt\" style=\"display:none\">42</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The average number of vehicles from 2010 to 2015 = (307 + 270 + 250 + 289+ 310 + 416)/6 = 307 thousands</p><p>The number of vehicles to be manufactured by B in 2016 = 307 * 170/100 = 521.9 thousands</p><p>So, the number of vehicles to be manufactured by A in 2016 = 521.9 thousands</p><p>So, required percentage = (521.9  -  348)/348 * 100 = 49.97% &#8776; 50%</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In 2010, a company's total expenditure was categorised under different expense heads, and their percentage distribution is illustrated in the bar graph given below.</p><p><img width=434 height=264 id=\"Picture 27\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27095/image025.png\" ></p><p>If the expenditure on an advertisement is &#8377;2.1 crore, then the difference between the expenditure on transport and taxes is?</p></span><span class=\"hqt\" style=\"display:none\">2010 &#2350;&#2375;&#2306;, &#2319;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2375; &#2325;&#2369;&#2354; &#2357;&#2381;&#2351;&#2351; &#2325;&#2379; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2357;&#2381;&#2351;&#2351; &#2358;&#2368;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2371;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;, &#2324;&#2352; &#2313;&#2344;&#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2348;&#2366;&#2352; &#2327;&#2381;&#2352;&#2366;&#2347; &#2350;&#2375;&#2306; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p><img width=434 height=264 id=\"Picture 27\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27095/image025.png\" ></p><p>&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2346;&#2344; &#2346;&#2352; &#2357;&#2381;&#2351;&#2351; 2.1 &#2325;&#2352;&#2379;&#2337;&#2364; &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344; &#2324;&#2352; &#2325;&#2352;&#2379;&#2306; &#2346;&#2352; &#2357;&#2381;&#2351;&#2351; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2340;&#2352; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">&#8377;32 lakh</span><span class=\"hqt\" style=\"display:none\">&#8377;32 &#2354;&#2366;&#2326;</span>",
      "<span class=\"eqt\">&#8377;42 lakh</span><span class=\"hqt\" style=\"display:none\">&#8377;42 &#2354;&#2366;&#2326;</span>",
      "<span class=\"eqt\">&#8377;30 lakh</span><span class=\"hqt\" style=\"display:none\">&#8377;30 &#2354;&#2366;&#2326;</span>",
      "<span class=\"eqt\">&#8377;35 lakh</span><span class=\"hqt\" style=\"display:none\">&#8377;35 &#2354;&#2366;&#2326;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>According to question, </p><p>Expenditure on advertisement (15)% = 2.1 crore</p><p>Difference of percentage between expenditure on transport and taxes = (12.5  -  10)% = 2.5%</p><p>1% = 2.1/15</p><p>2.5% = 2.1/15 * 2.5 = 0.35 crore or &#8377;35 lakh</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The given histogram represents the marks obtained by 128 students. Read the graph and answer the question that follows.</p><p><img width=493 height=276 id=\"Chart 27\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19954/image025.png\"></p><p>What percent of students got marks less than 60?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2310;&#2351;&#2340;&#2330;&#2367;&#2340;&#2381;&#2352; 128 &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2310;&#2352;&#2375;&#2326; &#2325;&#2379; &#2346;&#2338;&#2364;&#2367;&#2319; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"493\" height=\"276\" id=\"Chart 27\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19954/image025.png\"></p><p>&#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2344;&#2375; 60 &#2360;&#2375; &#2325;&#2350; &#2309;&#2306;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2319; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">67.5%</span><span class=\"hqt\" style=\"display:none\">67.5%</span>",
      "<span class=\"eqt\">72.5%</span><span class=\"hqt\" style=\"display:none\">72.5%</span>",
      "<span class=\"eqt\">75%</span><span class=\"hqt\" style=\"display:none\">75%</span>",
      "<span class=\"eqt\">62.5%</span><span class=\"hqt\" style=\"display:none\">62.5%</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Number of students who got marks less than 60 = 8 + 14 + 28 + 30 = 80</p><p>Total students = 128</p><p>Required percent = (80/128) * 100 = 62.5%</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The following bar graph shows the sales of a company (in&#8377; crore) in different years. Study the graph and answer the question.</p><p><img width=576 height=336 id=\"Picture 31\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27166/image028.png\" ></p><p>The mean of the highest and lowest sales (in&#8377; crore) is:</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2348;&#2366;&#2352; &#2327;&#2381;&#2352;&#2366;&#2347; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; (&#2325;&#2352;&#2379;&#2337;&#2364; &#2350;&#2375;&#2306;) &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2327;&#2381;&#2352;&#2366;&#2347; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404;</p><p><img width=576 height=336 id=\"Picture 31\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27166/image028.png\" ></p><p>&#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2324;&#2352; &#2360;&#2348;&#2360;&#2375; &#2325;&#2350; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; (&#2325;&#2352;&#2379;&#2337;&#2364; &#2350;&#2375;&#2306;) &#2325;&#2366; &#2324;&#2360;&#2340; &#2361;&#2376;:</span>",
    "options": [
      "<span class=\"eqt\">326.7</span><span class=\"hqt\" style=\"display:none\">326.7</span>",
      "<span class=\"eqt\">394.5</span><span class=\"hqt\" style=\"display:none\">394.5</span>",
      "<span class=\"eqt\">484.2</span><span class=\"hqt\" style=\"display:none\">484.2</span>",
      "<span class=\"eqt\">412.3</span><span class=\"hqt\" style=\"display:none\">412.3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Highest sales is in the year 2022 = &#8377;584 crore , and</p><p>Lowest sales is in the year 2018 = &#8377;205 crore</p><p>So,</p><p>Mean = (584+205)/2</p><p>=&gt; Mean = 394.5 crore</p><p>Option (b) is the correct answer.</p>",
    "question_index": 3

  {

    "question": "<span class=\"eqt\"><p>Study the given graph and answer the question that follows.</p><p>The graph shows the sales of three products: P, Q and R by four companies: A, B, C and D.</p><p><img width=539 height=314 id=\"Picture 24\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27092/image023.png\" ></p><p>What percentage is the total production by company C, of the total production by company A?</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2327;&#2381;&#2352;&#2366;&#2347; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404;</p><p>&#2327;&#2381;&#2352;&#2366;&#2347; &#2330;&#2366;&#2352; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306;: A, B, C &#2324;&#2352; D &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2368;&#2344; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306;: P, Q &#2324;&#2352; R &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=539 height=314 id=\"Picture 24\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27092/image023.png\" ></p><p>&#2325;&#2306;&#2346;&#2344;&#2368; C &#2325;&#2366; &#2325;&#2369;&#2354; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344;, &#2325;&#2306;&#2346;&#2344;&#2368; A &#2325;&#2375; &#2325;&#2369;&#2354; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;?</span>",
