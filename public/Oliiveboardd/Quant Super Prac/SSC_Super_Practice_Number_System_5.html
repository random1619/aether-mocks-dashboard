<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The largest four-digit number which is exactly divisible by each one of the numbers 15, 25, 90 and 125.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2366;&#2352; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2379; 15, 25, 90 &#2324;&#2352; 125 &#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">9010</span><span class=\"hqt\" style=\"display:none\">9010</span>",
      "<span class=\"eqt\">9000</span><span class=\"hqt\" style=\"display:none\">9000</span>",
      "<span class=\"eqt\">9250</span><span class=\"hqt\" style=\"display:none\">9250</span>",
      "<span class=\"eqt\">9200</span><span class=\"hqt\" style=\"display:none\">9200</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Factor of 15 = 3 * 5 </p><p>Factor of 25 = 5 * 5</p><p>Factor of 90 = 2 * 3<sup>2</sup> * 5</p><p>Factor of 125 = 5<sup>3</sup></p><p>LCM = 3<sup>2</sup> * 5<sup>3</sup> * 2 = 2250</p><p>Largest 4  -  digit number = 9999</p><p>9999 &div; 2250 = 4 remainder 999</p><p>Required number = 9999  -  999 = 9000</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The Least 6-digit number which is exactly divisible by each of the numbers 24, 16, 56 and 72.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2331;&#2361; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2357;&#2361; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2379; 24, 16, 56 &#2324;&#2352; 72 &#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">100500</span><span class=\"hqt\" style=\"display:none\">100500</span>",
      "<span class=\"eqt\">100900</span><span class=\"hqt\" style=\"display:none\">100900</span>",
      "<span class=\"eqt\">100800</span><span class=\"hqt\" style=\"display:none\">100800</span>",
      "<span class=\"eqt\">128000</span><span class=\"hqt\" style=\"display:none\">128000</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Least 6-digit number = 100000</p><p>Factor of 24 = 2<sup>3</sup>* 3</p><p>Factor of 16 = 2<sup>4</sup></p><p>Factor of 56 = 2<sup>3 </sup>* 7</p><p>Factor of 72 = 2<sup>3</sup> * 3<sup>2</sup></p><p>LCM = 2<sup>4</sup> * 3<sup>2</sup> * 7 = 1008</p><p>100000/1008 = 99.206</p><p>Required number = 1008 * 100 = 100800 </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What is the largest number that will divide 132, 204, and 408 exactly?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2380;&#2344; &#2360;&#2368; &#2361;&#2376; &#2332;&#2379; 132, 204 &#2324;&#2352; 408 &#2325;&#2379; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2375;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Factor of 132 = 2<sup>2</sup> * 3 * 11</p><p>204 = 2<sup>2</sup> * 3 * 17</p><p>408 = 2<sup>3</sup> * 3 * 17</p><p>HCF = 2<sup>2</sup> * 3 = 12</p><p>Required number = 12</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Find the least number which when divided by 12, 15, 18, and 30 leaves a remainder 3 in each case, but is exactly divisible by 11.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2375; 12, 15, 18 &#2324;&#2352; 30 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2358;&#2375;&#2359;&#2347;&#2354; 3 &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2357;&#2361; 11 &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">382</span><span class=\"hqt\" style=\"display:none\">382</span>",
      "<span class=\"eqt\">354</span><span class=\"hqt\" style=\"display:none\">354</span>",
      "<span class=\"eqt\">363</span><span class=\"hqt\" style=\"display:none\">363</span>",
      "<span class=\"eqt\">373</span><span class=\"hqt\" style=\"display:none\">373</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Factor of 12 = 2<sup>2</sup> * 3</p><p>Factor of 15 = 3 * 5</p><p>Factor of 18 = 2 * 3<sup>2</sup></p><p>Factor of 30 = 2 * 3 * 5</p><p>LCM = 2<sup>2</sup> * 3<sup>2</sup> * 5 = 180</p><p>Number will be 180k + 3 (k is an integer)</p><p>Try k = 1</p><p>=&gt; 180 * 1 + 3 = 183 (Not divisible by 11)</p><p>Try k = 2</p><p>=&gt; 180 * 2 + 3 = 363 (divisible by 11)</p><p>Least number = 363</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the least number which when divided by 10, 12, 15 and 18 leaves 2 as remainder, but when divided by 13 leaves no remainder.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2375; 10, 12, 15 &#2324;&#2352; 18 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; 2 &#2358;&#2375;&#2359; &#2348;&#2330;&#2375;, &#2354;&#2375;&#2325;&#2367;&#2344; 13 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2325;&#2379;&#2312; &#2358;&#2375;&#2359; &#2344; &#2348;&#2330;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">156</span><span class=\"hqt\" style=\"display:none\">156</span>",
      "<span class=\"eqt\">182</span><span class=\"hqt\" style=\"display:none\">182</span>",
      "<span class=\"eqt\">308</span><span class=\"hqt\" style=\"display:none\">308</span>",
      "<span class=\"eqt\">234</span><span class=\"hqt\" style=\"display:none\">234</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Factor of 10 = 2 * 5</p><p>Factor of 12 = 2<sup>2</sup> * 3</p><p>Factor of 15 = 3 * 5</p><p>Factor of 18 = 2 * 3<sup>2</sup></p><p>LCM = 4 * 9 * 5 = 180</p><p>Required number = 180k + 2 (k is an integer)</p><p>When k = 1</p><p>180 * 1 + 2 = 182 (divisible by 13)</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Find the least number which when divided by 6, 9, 15, and 20 leaves remainder 1 in each case, and is divisible by 17.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2375; 6, 9, 15 &#2324;&#2352; 20 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2358;&#2375;&#2359;&#2347;&#2354; 1 &#2348;&#2330;&#2375; &#2340;&#2341;&#2366; &#2357;&#2361; 17 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">884</span><span class=\"hqt\" style=\"display:none\">884</span>",
      "<span class=\"eqt\">867</span><span class=\"hqt\" style=\"display:none\">867</span>",
      "<span class=\"eqt\">901</span><span class=\"hqt\" style=\"display:none\">901</span>",
      "<span class=\"eqt\">935</span><span class=\"hqt\" style=\"display:none\">935</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Factor of 6 = 2 * 3</p><p>Factor of 9 = 3<sup>2</sup></p><p>Factor of 15 = 3 * 5</p><p>Factor of 20 = 2<sup>2</sup> * 5</p><p>LCM = 4 * 9 * 5 = 180</p><p>Required number = 180k + 1 (where k is an integer)</p><p>Try k = 1,</p><p>180 * 1 + 1 = 181 (not divisible by 17)</p><p>Try k = 2 </p><p>180 * 2 + 1 = 361 (not divisible by 17)</p><p>Try k = 3</p><p>180 * 3 + 1 = 541 (not divisible by 17)</p><p>Try k = 4</p><p>180 * 4 + 1 = 721 (not divisible by 17)</p><p>Try k = 5</p><p>180 * 5 + 1 = 901 (divisible by 17)</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>A fruit vendor has a number of apples. If he tries to pack them in groups of 3, 4, 6 or 9, there are 2 apples left. But if he packs them in groups of 7, there are none left. Find the least number of apples he has.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2347;&#2354; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2312; &#2360;&#2375;&#2348; &#2361;&#2376;&#2306;&#2404; &#2309;&#2327;&#2352; &#2357;&#2361; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; 3, 4, 6 &#2351;&#2366; 9 &#2325;&#2375; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2376;&#2325; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; 2 &#2360;&#2375;&#2348; &#2348;&#2330;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2354;&#2375;&#2325;&#2367;&#2344; &#2309;&#2327;&#2352; &#2357;&#2361; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; 7 &#2325;&#2375; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2376;&#2325; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2319;&#2325; &#2349;&#2368; &#2360;&#2375;&#2348; &#2344;&#2361;&#2368;&#2306; &#2348;&#2330;&#2340;&#2366;&#2404; &#2313;&#2360;&#2325;&#2375; &#2346;&#2366;&#2360; &#2360;&#2375;&#2348;&#2379;&#2306; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2325;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">182</span><span class=\"hqt\" style=\"display:none\">182</span>",
      "<span class=\"eqt\">196</span><span class=\"hqt\" style=\"display:none\">196</span>",
      "<span class=\"eqt\">154</span><span class=\"hqt\" style=\"display:none\">154</span>",
      "<span class=\"eqt\">140</span><span class=\"hqt\" style=\"display:none\">140</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>LCM of 3, 4, 6 and 9 = 36</p><p>Least number(N) = 36k + 2</p><p>N &#8801; 0 (mod 7)</p><p>36k + 2 &#8801; 0 (mod 7)</p><p>36k &#8801; - 2 &#8801; 5(mod 7)</p><p>Now reduce 36 mod 7</p><p>36/7 = 5 remainder 1, so 36 &#8801; 1 mod 7</p><p>So the equation becomes</p><p>1k &#8801; 5 (mod 7)</p><p>k &#8801; 5 (mod 7)</p><p>take smallest k = 5</p><p>N = 36 * 5 + 2 = 182 (when divided by 3, 4, 6 and 9 leaves remainder 2)</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Soldiers are to be arranged in rows of 5, 6, 8 or 10. In each case, 1 soldier is left out. But when arranged in rows of 11, no soldier is left. What is the minimum number of soldiers in the parade?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2376;&#2344;&#2367;&#2325;&#2379;&#2306; &#2325;&#2379; 5, 6, 8 &#2351;&#2366; 10 &#2325;&#2368; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2326;&#2337;&#2364;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2361;&#2376;&#2404; &#2361;&#2352; &#2348;&#2366;&#2352; 1 &#2360;&#2376;&#2344;&#2367;&#2325; &#2331;&#2370;&#2335; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2354;&#2375;&#2325;&#2367;&#2344; 11 &#2325;&#2368; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2326;&#2337;&#2364;&#2366; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2325;&#2379;&#2312; &#2360;&#2376;&#2344;&#2367;&#2325; &#2344;&#2361;&#2368;&#2306; &#2348;&#2330;&#2340;&#2366;&#2404; &#2346;&#2352;&#2375;&#2337; &#2350;&#2375;&#2306; &#2360;&#2376;&#2344;&#2367;&#2325;&#2379;&#2306; &#2325;&#2368; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">198</span><span class=\"hqt\" style=\"display:none\">198</span>",
      "<span class=\"eqt\">154</span><span class=\"hqt\" style=\"display:none\">154</span>",
      "<span class=\"eqt\">121</span><span class=\"hqt\" style=\"display:none\">121</span>",
      "<span class=\"eqt\">165</span><span class=\"hqt\" style=\"display:none\">165</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>LCM of 5, 6, 8 and 10 = 120</p><p>Least number(N) = 120k + 1 </p><p>N &#8801; 0 (mod 11)</p><p>120k + 1 &#8801; 0 (mod 11)</p><p>120k &#8801; -1 &#8801; 10 (mod 11)</p><p>Reduce 120 mod 11 : </p><p>120/11 = 10 remainder 10, so 120 &#8801; 10 mod 11</p><p>10k &#8801; 10 (mod 11)</p><p>Divide both sides by 10</p><p>k &#8801; 1 (mod 11)</p><p>take smallest value of k = 1</p><p>N = 120 * 1 + 1 = 121</p>",
    "question_index": 7
  },
  {
