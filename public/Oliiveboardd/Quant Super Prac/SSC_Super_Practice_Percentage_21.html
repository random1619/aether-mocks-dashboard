    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Study the following information carefully and answer the related questions.</p><p>Following pie-chart represents the percentage break-up of monthly income of five employees.</p><p><img width=393 height=253 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12371/image008.png\"></p><p>If A spends 64% of his income and saves Rs.8262, then what is the difference between monthly income of B and E?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2370;&#2330;&#2344;&#2366; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351;-&#2310;&#2352;&#2375;&#2326;, &#2346;&#2366;&#2305;&#2330; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2350;&#2366;&#2360;&#2367;&#2325; &#2310;&#2351; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"393\" height=\"253\" id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12371/image008.png\"></p><p>&#2351;&#2342;&#2367; A &#2309;&#2346;&#2344;&#2368; &#2310;&#2351; &#2325;&#2366; 64% &#2349;&#2366;&#2327; &#2326;&#2352;&#2381;&#2330; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 8262 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2348;&#2330;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; B &#2324;&#2352; E &#2325;&#2368; &#2350;&#2366;&#2360;&#2367;&#2325; &#2310;&#2351; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.14850</span><span class=\"hqt\" style=\"display:none\">14850 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs.14300</span><span class=\"hqt\" style=\"display:none\">14300 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs.13200</span><span class=\"hqt\" style=\"display:none\">13200 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs.13750</span><span class=\"hqt\" style=\"display:none\">13750 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Here, expenditure of A = 64% of A's monthly income</p><p>Then, savings of A = (100  -  64)% of A's monthly income</p><p>8262 = (36/100) * A's monthly income</p><p>A's monthly income = Rs.22950</p><p>Percentage difference between the monthly income of B and E = 27 - 16 = 11%</p><p>Now,</p><p>17% = 22950</p><p>11% = 22950 * 11/17 = Rs.14850</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Study the given pie-chart and answer the questions that follows.</p><p>The pie-chart shows the expenditure by a family on different heads.</p><p><img width=425 height=336 id=\"Chart 28\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21007/image113.png\"></p><p>The angle formed by the sector representing education at the centre of the circle is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2319;&#2325; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2350;&#2342;&#2379;&#2306; &#2346;&#2352; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2351; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"425\" height=\"336\" id=\"Chart 28\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21007/image113.png\"></p><p>&#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2350;&#2375;&#2306; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2325;&#2379;&#2339; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">45&deg;</span><span class=\"hqt\" style=\"display:none\">45&deg;</span>",
      "<span class=\"eqt\">54&deg;</span><span class=\"hqt\" style=\"display:none\">54&deg;</span>",
      "<span class=\"eqt\">67&deg;</span><span class=\"hqt\" style=\"display:none\">67&deg;</span>",
      "<span class=\"eqt\">60&deg;</span><span class=\"hqt\" style=\"display:none\">60&deg;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>100% = 360&deg;</p><p>1% = 3.6&deg;</p><p>15% = 3.6 * 15 = 54&deg;</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Below pie chart shows the percentage distribution of keyboard sold by five shopkeepers:</p><p><img width=576 height=336 id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19346/image008.png\"></p><p>If number of keyboards sold by shopkeeper U is 3600 more than the number of keyboards sold by shopkeeper W, then What is the average number of keyboards sold by shopkeepers S, T and V together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2346;&#2366;&#2305;&#2330; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337; &#2325;&#2375; &#2357;&#2367;&#2340;&#2352;&#2339; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; :</p><p><img width=462 height=270 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er221028sscerma-002.png\"></p><p>&#2351;&#2342;&#2367; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; U &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; W &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 3600 <em><b>&#2332;&#2381;&#2351;&#2366;&#2342;&#2366;</b></em> &#2361;&#2376;, &#2340;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; S, T &#2324;&#2352; V &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2325;&#2368;&#2348;&#2379;&#2352;&#2381;&#2337;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3510</span><span class=\"hqt\" style=\"display:none\">3510</span>",
      "<span class=\"eqt\">3240</span><span class=\"hqt\" style=\"display:none\">3240</span>",
      "<span class=\"eqt\">4800</span><span class=\"hqt\" style=\"display:none\">4800</span>",
      "<span class=\"eqt\">4410</span><span class=\"hqt\" style=\"display:none\">4410</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Total number of keyboards sold by all five shopkeepers = 3600 * 100/(32  -  20) = 30000</p><p>Required average = 30000 * (15 + 27 + 6)/300 = 4800</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The pie chart given below shows the percentage of mixers sold by 8 different companies.</p><p><img width=290 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20435/image022.png\"></p><p>Total number of mixers sold by all 8 companies is X. Find the value of X, if the difference between the average number of mixers sold by B, C, and H together and the average number of mixers sold by A, E, and F together is 200.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; 8 &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2350;&#2367;&#2325;&#2381;&#2360;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"290\" height=\"336\" id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20435/image022.png\"></p><p>&#2360;&#2349;&#2368; 8 &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2350;&#2367;&#2325;&#2381;&#2360;&#2352; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; X &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2366;&#2341; B, C &#2324;&#2352; H &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2350;&#2367;&#2325;&#2381;&#2360;&#2352; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2319;&#2325; &#2360;&#2366;&#2341; A, E, &#2324;&#2352; F &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2350;&#2367;&#2325;&#2381;&#2360;&#2352; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 200 &#2361;&#2376;, &#2340;&#2379; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4000</span><span class=\"hqt\" style=\"display:none\">4000</span>",
      "<span class=\"eqt\">5000</span><span class=\"hqt\" style=\"display:none\">5000</span>",
      "<span class=\"eqt\">3600</span><span class=\"hqt\" style=\"display:none\">3600</span>",
      "<span class=\"eqt\">4500</span><span class=\"hqt\" style=\"display:none\">4500</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Average of percentage of mixers sold by B, C, and H together = (18 + 7 + 8)/3 = 11%</p><p>Average of percentage of mixers sold by A, E, and F together = (20 + 8 + 17)/3 = 15%</p><p>According to the question,</p><p>4% = 200</p><p>1% = 50</p><p>100% = 5000</p><p>So, X = 5000</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The following pie chart shows the percentage break-up of total marks scored by 5 students in annual exam.</p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21057/image004.png\"></p><p>If the average marks scored by R and S together is 500 then find the total marks scored by T in annual exam.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; 5 &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2369;&#2354; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21057/image004.png\"></p><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2366;&#2341; R &#2324;&#2352; S &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2319; &#2327;&#2319; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; 500 &#2361;&#2376;&#2306;, &#2340;&#2379; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; T &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2319; &#2327;&#2319; &#2325;&#2369;&#2354; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">200</span><span class=\"hqt\" style=\"display:none\">200</span>",
      "<span class=\"eqt\">300</span><span class=\"hqt\" style=\"display:none\">300</span>",
      "<span class=\"eqt\">600</span><span class=\"hqt\" style=\"display:none\">600</span>",
      "<span class=\"eqt\">800</span><span class=\"hqt\" style=\"display:none\">800</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Average marks scored by R and S together = 500</p><p>Total marks scored by R and S together = 2*500 = 1000</p><p>Total marks scored by T together = 1000 * 15/50 = 20*15 = 300</p>",
    "question_index": 4

    "question": "<span class=\"eqt\"><p><b>Directions: </b>Study the following information carefully and answer the related questions.</p><p>Following pie-chart represents the percentage break-ups of total number of products manufactured by a company during the following year.</p><p>Total number of products manufactured from 2010-2015 = 15000</p><p><img width=386 height=282 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p6978/image002.png\"></p><p>If sale of company in 2015 is 724, then how many products remain unsold in the company in same year?</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;: </b>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2367;&#2360;&#2368; &#2325;&#2306;&#2346;&#2344;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#236     "question": "<span class=\"eqt\"><p>The pie chart given below shows the degree distribution of number of students attempted six mock tests from a learning platform:</p><p>Number of students who attempted mock test T5 = 11700</p><p><img width=576 height=336 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19497/image023.png\"></p><p>M = Average number of students who attempted tests T2, T4, and T6.</p><p>N = Difference between the number of students who attempted test T1, and T3.</p><p>What is the value of M &div; N?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2319;&#2325; &#2354;&#2352;&#2381;&#2344;&#2367;&#2306;&#2327; &#2346;&#2381;&#2354;&#2376;&#2335;&#2347;&#2377;&#2352;&#2381;&#2350; &#2360;&#2375; &#2331;&#2361; &#2350;&#2377;&#2325; &#2335;&#2375;&#2360;&#2381;&#2335; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2350;&#2377;&#2325; &#2335;&#2375;&#2360;&#2381;&#2335; T5 &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = 11700</p><p><img width=\"576\" height=\"336\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19497/image023.png\"></p><p>M = &#2335;&#2375;&#2360;&#2381;&#2335; T2, T4 &#2324;&#2352; T6 &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2404;</p><p>N = &#2335;&#2375;&#2360;&#2381;&#2335; T1 &#2324;&#2352; T3 &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2366;&#2360; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352;&#2404;</p><p>M &div; N &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
