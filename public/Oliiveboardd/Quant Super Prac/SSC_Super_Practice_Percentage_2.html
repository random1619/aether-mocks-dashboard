<body>
    <!-- Welcome Screen -->

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A shopkeeper gives a discount of 12% on the purchase of 10 kg of sugar. The cost price of the sugar is &#8377;30/kg, and the marked price is &#8377;38/kg. The weighing machine of the shopkeeper is faulty, and it shows weight of 1 kg when the actual weight is 900 grams. Find the percentage profit of the shop keeper (rounded off to two decimal places).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; 10 &#2325;&#2367;&#2354;&#2379; &#2330;&#2368;&#2344;&#2368; &#2325;&#2368; &#2326;&#2352;&#2368;&#2342; &#2346;&#2352; 12% &#2325;&#2368; &#2331;&#2370;&#2335; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2330;&#2368;&#2344;&#2368; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; 30 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379; &#2361;&#2376;, &#2324;&#2352; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; 38 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379; &#2361;&#2376;&#2404; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2325;&#2368; &#2340;&#2380;&#2354; &#2350;&#2358;&#2368;&#2344; &#2326;&#2352;&#2366;&#2348; &#2361;&#2376;, &#2324;&#2352; &#2351;&#2361; 1 &#2325;&#2367;&#2354;&#2379; &#2357;&#2332;&#2344; &#2342;&#2367;&#2326;&#2366;&#2340;&#2368; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2357;&#2332;&#2344; 900 &#2327;&#2381;&#2352;&#2366;&#2350; &#2361;&#2376;&#2404; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2354;&#2366;&#2349; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306; (&#2342;&#2379; &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2340;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;&#2367;&#2340;)&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">30.18%</span><span class=\"hqt\" style=\"display:none\">30.18%</span>",
      "<span class=\"eqt\">12.5%</span><span class=\"hqt\" style=\"display:none\">12.5%</span>",
      "<span class=\"eqt\">22.25%</span><span class=\"hqt\" style=\"display:none\">22.25%</span>",
      "<span class=\"eqt\">23.85%</span><span class=\"hqt\" style=\"display:none\">23.85%</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Cost price of 10 kg of sugar = 30  X  10 = &#8377;300 </p><p>Marked price of 10 kg of sugar = 38  X  10 = &#8377;380</p><p>Selling Price = (100  -  12)% of 380 = &#8377;334.4 </p><p>Actual weight = 10  X  (900/1000) = 9 kg</p><p>Actual CP = 30  X  9 = &#8377;270</p><p>Profit = 334.4 - 270 = &#8377;64.4 </p><p>Profit % = (64.4/270)  X  100 &#8776; 23.85% </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A trader marks his goods at 20% higher than the cost price. Further, he uses a weighing balance which shows 1200 grams for a kilogram. What is his profit percentage?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2368; &#2309;&#2346;&#2344;&#2375; &#2350;&#2366;&#2354; &#2346;&#2352; &#2354;&#2366;&#2327;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2375; 20% &#2309;&#2343;&#2367;&#2325; &#2350;&#2370;&#2354;&#2381;&#2351; &#2309;&#2306;&#2325;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366;, &#2357;&#2361; &#2319;&#2325; &#2357;&#2332;&#2344; &#2340;&#2380;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2340;&#2352;&#2366;&#2332;&#2370; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2319;&#2325; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2375; &#2354;&#2367;&#2319; 1200 &#2327;&#2381;&#2352;&#2366;&#2350; &#2342;&#2367;&#2326;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2366; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">66%</span><span class=\"hqt\" style=\"display:none\">66%</span>",
      "<span class=\"eqt\">50%</span><span class=\"hqt\" style=\"display:none\">50%</span>",
      "<span class=\"eqt\">44%</span><span class=\"hqt\" style=\"display:none\">44%</span>",
      "<span class=\"eqt\">55%</span><span class=\"hqt\" style=\"display:none\">55%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let cost price of 1000 gm = &#8377;100</p><p>Marked price = 120% of 100 = &#8377;120</p><p>Selling price = 1200 * 120/1000 = &#8377;144</p><p>Profit percentage = [(144  -  100)/100] *100 = 44%</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A dishonest shopkeeper promises to sell his goods at cost price. However, he uses a weight that actually weighs 49% less than what is written on it. Find his profit percentage.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2375;&#2312;&#2350;&#2366;&#2344; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2309;&#2346;&#2344;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344; &#2325;&#2379; &#2354;&#2366;&#2327;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2348;&#2375;&#2330;&#2344;&#2375; &#2325;&#2366; &#2357;&#2366;&#2342;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2361;&#2366;&#2354;&#2366;&#2305;&#2325;&#2367;, &#2357;&#2361; &#2319;&#2325; &#2320;&#2360;&#2375; &#2348;&#2366;&#2335; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2357;&#2332;&#2344; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357; &#2350;&#2375;&#2306; &#2313;&#2360; &#2346;&#2352; &#2354;&#2367;&#2326;&#2375; &#2357;&#2332;&#2344; &#2360;&#2375; 49% &#2325;&#2350; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2366; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">96(4/51) %</span><span class=\"hqt\" style=\"display:none\">96(4/51) %</span>",
      "<span class=\"eqt\">98(8/51) %</span><span class=\"hqt\" style=\"display:none\">98(8/51) %</span>",
      "<span class=\"eqt\">97(5/51) %</span><span class=\"hqt\" style=\"display:none\">97(5/51) %</span>",
      "<span class=\"eqt\">95(4/51) %</span><span class=\"hqt\" style=\"display:none\">95(4/51) %</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>49% less weight = 49% of 1000 g = 490 g</p><p>=&gt; He gave 510 g instead of 1000 gm </p><p>Profit percentage = (490/510) * 100 = 4900/51 = 96(4/51)%</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A shopkeeper cheats 25% in weight while buying rice and cheats 25% while selling it. If he sells the rice at 12(1/2) % profit, then find his net profit percentage.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2330;&#2366;&#2357;&#2354; &#2326;&#2352;&#2368;&#2342;&#2340;&#2375; &#2360;&#2350;&#2351; &#2357;&#2332;&#2344; &#2350;&#2375;&#2306; 25% &#2325;&#2368; &#2343;&#2379;&#2326;&#2366;&#2343;&#2337;&#2364;&#2368; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2348;&#2375;&#2330;&#2340;&#2375; &#2360;&#2350;&#2351; &#2349;&#2368; 25% &#2325;&#2368; &#2343;&#2379;&#2326;&#2366;&#2343;&#2337;&#2364;&#2368; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; &#2330;&#2366;&#2357;&#2354; &#2325;&#2379; 12(1/2)% &#2354;&#2366;&#2349; &#2346;&#2352; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2366; &#2358;&#2369;&#2342;&#2381;&#2343; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">82.5%</span><span class=\"hqt\" style=\"display:none\">82.5%</span>",
      "<span class=\"eqt\">62.5%</span><span class=\"hqt\" style=\"display:none\">62.5%</span>",
      "<span class=\"eqt\">87.5%</span><span class=\"hqt\" style=\"display:none\">87.5%</span>",
      "<span class=\"eqt\">92.5%</span><span class=\"hqt\" style=\"display:none\">92.5%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let he bought 125 units at the price of 100 units.</p><p>While selling, he only sells 75 units at the price of 100 units.</p><p>Let cost price of 1 unit = &#8377;100</p><p>Selling price of 1 unit = 112(1/2)% of 100 = &#8377;112.5</p><p>Profit = 112.5*125  -  75*100 = 14062.5  -  7500 = 6562.5</p><p>Profit percentage = (6562.5/7500)*100 = 87.5%</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A shopkeeper sells his goods using weights 27% less than true weights and claims to sell his goods at the cost price. His gain per cent (rounded off to 1 decimal place) is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2309;&#2346;&#2344;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344; &#2325;&#2379; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2357;&#2332;&#2344; &#2360;&#2375; 27% &#2325;&#2350; &#2357;&#2332;&#2344; &#2346;&#2352; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2346;&#2344;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344; &#2325;&#2379; &#2354;&#2366;&#2327;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2348;&#2375;&#2330;&#2344;&#2375; &#2325;&#2366; &#2342;&#2366;&#2357;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2366; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; (1 &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2381;&#2341;&#2366;&#2344; &#2340;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;&#2367;&#2340;) &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">47.9</span><span class=\"hqt\" style=\"display:none\">47.9</span>",
      "<span class=\"eqt\">37.0</span><span class=\"hqt\" style=\"display:none\">37.0</span>",
      "<span class=\"eqt\">39.8</span><span class=\"hqt\" style=\"display:none\">39.8</span>",
      "<span class=\"eqt\">40.0</span><span class=\"hqt\" style=\"display:none\">40.0</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let,</p><p>True weight = 100, </p><p>So,</p><p>Used = 73 </p><p>CP = 73, SP = 100 </p><p>Gain = 100 - 73 = 27 </p><p>Gain % = (27 / 73)  X  100 = 36.986 &#8776; 37.0% </p><p>Option (b) is the correct answer.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>B purchased 15 kg apples at the rate of &#8377;180 per kg from a wholesaler who uses a weight of 950 grams for the kg weight. B sold all these apples at &#8377;180 per kg but used a weight of 750 grams for the kg weight. Find the percentage profit earned by B in the transaction (correct to 2 places of decimal).</p></span><span class=\"hqt\" style=\"display:none\"><p>B &#2344;&#2375; &#2319;&#2325; &#2341;&#2379;&#2325; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2360;&#2375; &#8377;180 &#2346;&#2381;&#2352;&#2340;&#2367; kg &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 15 kg &#2360;&#2375;&#2348; &#2326;&#2352;&#2368;&#2342;&#2375; &#2324;&#2352; &#2341;&#2379;&#2325; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; kg &#2357;&#2332;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; 950 &#2327;&#2381;&#2352;&#2366;&#2350; &#2357;&#2332;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; B &#2344;&#2375; &#2311;&#2344; &#2360;&#2349;&#2368; &#2360;&#2375;&#2348;&#2379;&#2306; &#2325;&#2379; &#8377;180 &#2346;&#2381;&#2352;&#2340;&#2367; kg &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2348;&#2375;&#2330;&#2366; &#2354;&#2375;&#2325;&#2367;&#2344; kg &#2357;&#2332;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; 750 &#2327;&#2381;&#2352;&#2366;&#2350; &#2357;&#2332;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366;&#2404; &#2311;&#2360; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2350;&#2375;&#2306; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2354;&#2366;&#2349; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306; (&#2342;&#2358;&#2350;&#2354;&#2357; &#2325;&#2375; 2 &#2309;&#2306;&#2325; &#2340;&#2325;)&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">25.75%</span><span class=\"hqt\" style=\"display:none\">25.75%</span>",
      "<span class=\"eqt\">26.67%</span><span class=\"hqt\" style=\"display:none\">26.67%</span>",
      "<span class=\"eqt\">22.55%</span><span class=\"hqt\" style=\"display:none\">22.55%</span>",
      "<span class=\"eqt\">33.33%</span><span class=\"hqt\" style=\"display:none\">33.33%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Since B got only 950 grams at the cost of 1000 grams and he sold only 750 grams at the cost of 1000 grams.</p><p>Let price of 1 gram of apple = 1</p><p>Cost of 950 grams of apple = 1000 [When false weight is used]</p><p>Selling price of 750 grams of apples = 1000 [When false weight is used]</p><p>Selling price of 950 grams of apples = 1000 * (950/750) = 3800/3 = 1266.67</p><p>Profit amount = 1266.67  -  1000 = 266.67</p><p>Profit percent = (266.67/1000) * 100</p><p>= 26.67%</p>",
    "question_index": 5

    "question": "<span class=\"eqt\"><p>A dishonest fruit-seller sells fruits at 20% profit but he uses 950 gm weight in place of 1 kg. What is the profit per cent?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2348;&#2375;&#2312;&#2350;&#2366;&#2344; &#2347;&#2354; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; 20% &#2354;&#2366;&#2349; &#2346;&#2352; &#2347;&#2354; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2357;&#2361; 1 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; 950 &#2327;&#2381;&#2352;&#2366;&#2350; &#2357;&#2332;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",

    "correct_option_id": 1,
    "solution": "<p>Let the Cost Price of 1 kg fruits be &#8377;100.</p><p>Selling Price of 1 kg fruits = &#8377;100 + 20% of &#8377;100</p><p>=&gt; &#8377;100 + &#8377;20 = &#8377;120</p><p>He uses 950 gm instead of 1 kg.</p><p>Therefore, Selling Price of 950 gm fruits = &#8377;120</p><p>Now, Cost Price of 950 gm fruits = 950/1000  X  100 = &#8377;95</p><p>Profit = Selling Price - Cost Price</p><p>=&gt; &#8377;120 - &#8377;95 = &#8377;25</p><p>Profit % = 25/95 * 100 = (500/19)%</p>",
