<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If <img width=92 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11816/image025.png\">, then the value of (m<sup>4</sup> - 2m<sup>3</sup> + m<sup>2</sup>) is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; <img width=92 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11816/image025.png\">, &#2340;&#2379; (m<sup>4</sup> - 2m<sup>3</sup> + m<sup>2</sup>) &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=145 height=223 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11816/image026.png\"></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If x<sup>2</sup> + 2&radic;3x + 4 = 0, then what is the value of (x<sup>7</sup> + x<sup>6</sup> + 64x + 80)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; x<sup>2</sup> + 2&radic;3x + 4 = 0, &#2340;&#2379; (x<sup>7</sup> + x<sup>6</sup> + 64x + 80) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">32</span><span class=\"hqt\" style=\"display:none\">32</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>x<sup>2</sup> + 2&radic;3x + 4 = 0</p><p>=&gt; x<sup>2</sup>/2x + 4/2x = -2&radic;3x/2x</p><p>=&gt; x/2 + 2/x = -&radic;3</p><p>=&gt; (x/2 + 2/x)<sup>3</sup> = (-&radic;3)<sup>3</sup></p><p>=&gt; x<sup>3</sup>/8 + 8/x<sup>3</sup> + 3 * (-&radic;3) = -3&radic;3</p><p>=&gt; x<sup>3</sup>/8 + 8/x<sup>3</sup> = 0</p><p>=&gt; x<sup>6</sup> + 64 = 0</p><p>=&gt; x<sup>6</sup> = -64 ----(i)</p><p>(x<sup>7</sup> + x<sup>6</sup> + 64x + 80)</p><p>= x<sup>6</sup>(x + 1) + 64x + 80</p><p>= -64(x + 1) + 64x + 80</p><p>= -64x -64 + 64x + 80</p><p>= 16</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If x  -  4&radic;x  -  1 = 0, then x<sup>2</sup> + 1/x<sup>2</sup> is equal to  -  </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; x - 4&radic;x - 1 = 0, &#2340;&#2379; x<sup>2</sup> + 1/x<sup>2</sup> &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376; - </p></span>",
    "options": [
      "<span class=\"eqt\">256</span><span class=\"hqt\" style=\"display:none\">256</span>",
      "<span class=\"eqt\">322</span><span class=\"hqt\" style=\"display:none\">322</span>",
      "<span class=\"eqt\">258</span><span class=\"hqt\" style=\"display:none\">258</span>",
      "<span class=\"eqt\">326</span><span class=\"hqt\" style=\"display:none\">326</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>x  -  4&radic;x  -  1 = 0</p><p>&radic;x  -  1/&radic;x = 4</p><p>Squaring both sides - </p><p>(&radic;x  -  1/&radic;x)<sup>2</sup> = 16</p><p>x + 1/x = 18</p><p>Squaring both sides - </p><p>(x + 1/x)<sup>2</sup> = 324</p><p>x<sup>2</sup> + 1/x<sup>2</sup> = 322</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If 1/(x + 4)  -  x = 7, then what is the value of 1/(x + 4)<sup>2</sup> + (x + 4)<sup>2</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 1/(x + 4) - x = 7, &#2340;&#2379; 1/(x + 4)<sup>2</sup> + (x + 4)<sup>2</sup> &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>1/(x + 4)  -  x = 7</p><p>1/(x + 4)  -  (x + 4) = 3</p><p>Squaring both sides  -  </p><p>1/(x + 4)<sup>2</sup> + (x + 4)<sup>2</sup>  -  2 = 9</p><p>1/(x + 4)<sup>2</sup> + (x + 4)<sup>2</sup> = 11</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If x<sup>2</sup> + 1/x<sup>2</sup> = 83, then find the value of (x<sup>2</sup>  -  1)/x?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; x<sup>2</sup> + 1/x<sup>2</sup> = 83, &#2340;&#2379; (x<sup>2</sup> - 1)/x &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">&#177;11</span><span class=\"hqt\" style=\"display:none\">&#177;11</span>",
      "<span class=\"eqt\">&#177;3</span><span class=\"hqt\" style=\"display:none\">&#177;3</span>",
      "<span class=\"eqt\">&#177;9</span><span class=\"hqt\" style=\"display:none\">&#177;9</span>",
      "<span class=\"eqt\">&#177;5</span><span class=\"hqt\" style=\"display:none\">&#177;5</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>x<sup>2</sup> + 1/x<sup>2</sup> = 83</p><p>x<sup>2</sup> + 1/x<sup>2</sup>  -  2 = 83 - 2</p><p>x<sup>2</sup> + 1/x<sup>2</sup>  -  2 = 81</p><p>(x  -  1/x)<sup>2</sup> = 81</p><p>x  -  1/x = &#177;9</p><p>(x<sup>2</sup>  -  1)/x = &#177;9</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If 4x  -  3/4x = 7, then what is the value of 64x<sup>2</sup> + 9/4x<sup>2</sup> = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 4x - 3/4x = 7, &#2340;&#2379; 64x<sup>2</sup> + 9/4x<sup>2</sup> = &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">196</span><span class=\"hqt\" style=\"display:none\">196</span>",
      "<span class=\"eqt\">224</span><span class=\"hqt\" style=\"display:none\">224</span>",
      "<span class=\"eqt\">210</span><span class=\"hqt\" style=\"display:none\">210</span>",
      "<span class=\"eqt\">220</span><span class=\"hqt\" style=\"display:none\">220</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>4x  -  3/4x = 7</p><p>On multiplying 2 both sides:-</p><p>8x  -  3/2x = 14</p><p>Squaring both sides  -  </p><p>64x<sup>2</sup> + 9/4x<sup>2</sup>  -  24 = 196</p><p>64x<sup>2</sup> + 9/4x<sup>2</sup> = 220</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If &radic;y  -  1/&radic;y = &radic;5, then the value of y<sup>3</sup> + 1/y<sup>3</sup> is  -  </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &radic;y - 1/&radic;y = &radic;5, &#2340;&#2379; y<sup>3</sup> + 1/y<sup>3</sup> &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376; - </p></span>",
    "options": [
      "<span class=\"eqt\">322</span><span class=\"hqt\" style=\"display:none\">322</span>",
      "<span class=\"eqt\">348</span><span class=\"hqt\" style=\"display:none\">348</span>",
      "<span class=\"eqt\">304</span><span class=\"hqt\" style=\"display:none\">304</span>",
      "<span class=\"eqt\">284</span><span class=\"hqt\" style=\"display:none\">284</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&radic;y  -  1/&radic;y = &radic;5</p><p>y + 1/y = 7</p><p>y<sup>2</sup> + 1/y<sup>2</sup> = 47</p><p>y<sup>3</sup> + 1/y<sup>3</sup> = (y + 1/y)(y<sup>2</sup> + 1/y<sup>2</sup>  -  y*1/y)</p><p>= 7(47  -  1)</p><p>= 322</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If x  -  2/x = 5, x &#8800; 0, then what is the value of (x<sup>4</sup>  -  8/x<sup>2</sup>)/(x<sup>2</sup>  -  4x  -  2)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; x - 2/x = 5, x &#8800; 0, &#2340;&#2379; (x<sup>4</sup> - 8/x<sup>2</sup>)/(x<sup>2</sup> - 4x - 2) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">125</span><span class=\"hqt\" style=\"display:none\">125</span>",
      "<span class=\"eqt\">145</span><span class=\"hqt\" style=\"display:none\">145</span>",
      "<span class=\"eqt\">155</span><span class=\"hqt\" style=\"display:none\">155</span>",
      "<span class=\"eqt\">135</span><span class=\"hqt\" style=\"display:none\">135</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>x  -  2/x = 5</p><p>(x<sup>4</sup>  -  8/x<sup>2</sup>)/(x<sup>2</sup>  -  4x  -  2)</p><p>Divide by x into numerator and denominator - </p><p>= (x<sup>3</sup>  -  8/x<sup>3</sup>)/(x  -  4  -  2/x) </p><p>= (x  -  2/x)(x<sup>2</sup> + 4/x<sup>2</sup> + x*2/x)/(5  -  4)</p><p>= 5[(x - 2/x)<sup>2</sup> + 2*x*2/x + 2]</p><p>= 5(5<sup>2</sup> + 4 + 2)</p><p>= 155</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>If (x + 1/x) = &radic;5 and x &gt; 1, what is the value of (x<sup>8</sup>  -  1/x<sup>8</sup>)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (x + 1/x) = &radic;5 &#2324;&#2352; x > 1, &#2340;&#2379; (x<sup>8</sup> - 1/x<sup>8</sup>) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">17&radic;5</span><span class=\"hqt\" style=\"display:none\">17&radic;5</span>",
      "<span class=\"eqt\">22&radic;5</span><span class=\"hqt\" style=\"display:none\">22&radic;5</span>",
      "<span class=\"eqt\">25&radic;5</span><span class=\"hqt\" style=\"display:none\">25&radic;5</span>",
      "<span class=\"eqt\">21&radic;5</span><span class=\"hqt\" style=\"display:none\">21&radic;5</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>x + 1/x = &radic;5</p><p>x<sup>8</sup>  -  1/x<sup>8</sup> = (x + 1/x)*(x  -  1/x)*(x<sup>2</sup> + 1/x<sup>2</sup>)(x<sup>4</sup> + 1/x<sup>4</sup>)</p><p>= (x + 1/x)*&radic;[(x + 1/x)<sup>2</sup>  -  4]*[(x + 1/x)<sup>2</sup>  -  2]*[{(x + 1/x)<sup>2</sup>  -  2}<sup>2</sup>  -  2]</p><p>= &radic;5*&radic;[(&radic;5)<sup>2</sup>  -  4]*[(&radic;5)<sup>2</sup>  -  2]*[{(&radic;5)<sup>2</sup>  -  2}<sup>2</sup>  -  2]</p><p>= &radic;5*1*3*7</p><p>= 21&radic;5</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>If x &gt; 0 and x<sup>4 </sup>+ 1/x<sup>4</sup> = 3842, then find x<sup>7</sup> + 1/x<sup>7</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; x > 0 &#2340;&#2341;&#2366; x<sup>4 </sup>+ 1/x<sup>4</sup> = 3842, &#2340;&#2379; x<sup>7</sup> + 1/x<sup>7</sup> &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">1874880</span><span class=\"hqt\" style=\"display:none\">1874880</span>",
      "<span class=\"eqt\">1874888</span><span class=\"hqt\" style=\"display:none\">1874888</span>",
      "<span class=\"eqt\">1874894</span><span class=\"hqt\" style=\"display:none\">1874894</span>",
      "<span class=\"eqt\">1874884</span><span class=\"hqt\" style=\"display:none\">1874884</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>x<sup>4 </sup>+ 1/x<sup>4</sup> = 3842</p><p>According to formula  -  </p><p>If a<sup>2</sup> + 1/a<sup>2</sup> = n, then a + 1/a = &radic;(n + 2)</p><p>x<sup>2 </sup>+ 1/x<sup>2</sup> = &radic;(3842 + 2) = &radic;3844 = 62 </p><p>x<sup> </sup>+ 1/x = &radic;(62 + 2) = &radic;64 = 8 </p><p>x<sup>3 </sup>+ 1/x<sup>3</sup> = 8<sup>3</sup>  -  3*8 = 488 </p><p>Now,</p><p>x<sup>7 </sup>+ 1/x<sup>7</sup> = (x<sup>4 </sup>+ 1/x<sup>4</sup>)(x<sup>3</sup> + 1/x<sup>3</sup>)  -  (x + 1/x) </p><p>= 3842*488  -  8</p><p>= 1874888</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>If k + 1/k  -  2 = 0 and k &gt; 0, then what is the value of k<sup>15</sup> + 1/k<sup>11</sup>? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; k + 1/k - 2 = 0 &#2324;&#2352; k &gt; 0, &#2340;&#2379; k<sup>15</sup> + 1/k<sup>11</sup> &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">-1</span><span class=\"hqt\" style=\"display:none\">-1</span>",
      "<span class=\"eqt\">-2</span><span class=\"hqt\" style=\"display:none\">-2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>k + 1/k  -  2 = 0</p><p>k<sup>2</sup> + 1  -  2k = 0</p><p>(k - 1)<sup>2</sup> = 0 </p><p>k = 1</p><p>k<sup>15</sup> + 1/k<sup>11</sup> = 1<sup>15</sup> + 1/(1)<sup>11</sup></p><p>= 1 + 1</p><p>= 2</p>",
    "question_index": 10
