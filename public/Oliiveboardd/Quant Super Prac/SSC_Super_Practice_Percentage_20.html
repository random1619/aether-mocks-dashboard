    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p><b>Directions:</b>   The following histogram shows the number of people who work out in gym at different times.</p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18870/image004.png\"></p><p>Out of number of people who work out at 5  -  6 PM, 1/3<sup>rd</sup> are girls. The number of girls who work out at 5  -  6 PM are what percent of number of people who work out at 8  -  9 PM?</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;: </b>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2351;&#2340; &#2330;&#2367;&#2340;&#2381;&#2352; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2350;&#2351; &#2346;&#2352; &#2332;&#2367;&#2350; &#2350;&#2375;&#2306; &#2325;&#2360;&#2352;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18870/image004.png\"></p><p>&#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 5-6 &#2348;&#2332;&#2375; &#2325;&#2360;&#2352;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; 1/3 &#2349;&#2366;&#2327; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2366;&#2306; &#2361;&#2376;&#2306;&#2404; &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 5-6 &#2348;&#2332;&#2375; &#2325;&#2360;&#2352;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 8-9 &#2348;&#2332;&#2375; &#2325;&#2360;&#2352;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>",
      "<span class=\"eqt\">25%</span><span class=\"hqt\" style=\"display:none\">25%</span>",
      "<span class=\"eqt\">10%</span><span class=\"hqt\" style=\"display:none\">10%</span>",
      "<span class=\"eqt\">30%</span><span class=\"hqt\" style=\"display:none\">30%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Number of girls who do workout at 5  -  6 PM = 15 * 1/3 = 5</p><p>Number of people who do workout at 8  -  9 PM = 20</p><p>Required percentage = 5/20*100 = 25%</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The following line graph shows the percentage increase in the number of employees in four departments  -  A, B, C and D from year 2002 to year 2003.</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er221027st19-47q.png\"></p><p>The number of employees in departments A and C in 2002 were in the ratio 2: 3 respectively and number of employees in department C in 2003 was 135 more than that in department A in 2003. Find the total number of employees in departments A and C together in 2002.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2357;&#2352;&#2381;&#2359; 2002 &#2360;&#2375; &#2357;&#2352;&#2381;&#2359; 2003 &#2340;&#2325; &#2330;&#2366;&#2352; &#2357;&#2367;&#2349;&#2366;&#2327;&#2379;&#2306; - A, B, C &#2324;&#2352; D &#2350;&#2375;&#2306; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er221027st19-47q.png\"></p><p>&#2357;&#2352;&#2381;&#2359; 2002 &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2327; A &#2324;&#2352; C &#2350;&#2375;&#2306; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 2:3 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2341;&#2368; &#2324;&#2352; &#2357;&#2352;&#2381;&#2359; 2003 &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2327; C &#2350;&#2375;&#2306; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2357;&#2352;&#2381;&#2359; 2003 &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2327; A &#2350;&#2375;&#2306; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 135 &#2309;&#2343;&#2367;&#2325; &#2341;&#2368;&#2404; &#2357;&#2352;&#2381;&#2359; 2002 &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2366;&#2341; &#2357;&#2367;&#2349;&#2366;&#2327; A &#2324;&#2352; C &#2350;&#2375;&#2306; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">250</span><span class=\"hqt\" style=\"display:none\">250</span>",
      "<span class=\"eqt\">300</span><span class=\"hqt\" style=\"display:none\">300</span>",
      "<span class=\"eqt\">500</span><span class=\"hqt\" style=\"display:none\">500</span>",
      "<span class=\"eqt\">400</span><span class=\"hqt\" style=\"display:none\">400</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let number of employees in department A in 2002 = 2x</p><p>And number of employees in department C in 2002 = 3x</p><p>Number of employees in department A in 2003 = 2x + 2x * (20/100) = 12x/5</p><p>Number of employees in department C in 2003 = 3x + 3x * (25/100) = 15x/4</p><p>Given,</p><p>(15x/4)  -  (12x/5) = 135</p><p>(75x  -  48x) = 135 * 20</p><p>27x = 135 * 20</p><p>x = 5 * 20 = 100</p><p>Total number of employees in departments A and C together in 2002 = 2x + 3x = 5x = 500</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The following line graph shows the number of boys and number of girls in six different schools.</p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image004.png\"></p><p>If the line graph is presented as pie chart that showed total number of students in six different schools, then the central angle formed by total number of students in school C would be:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2331;&#2361; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2354;&#2396;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image004.png\"></p><p>&#2351;&#2342;&#2367; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2325;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2325;&#2367; &#2331;&#2361; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; C &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2309;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2325;&#2379;&#2339; &#2361;&#2379;&#2327;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">56.4&deg;</span><span class=\"hqt\" style=\"display:none\">56.4&deg;</span>",
      "<span class=\"eqt\">64&deg;</span><span class=\"hqt\" style=\"display:none\">64&deg;</span>",
      "<span class=\"eqt\">43.2&deg;</span><span class=\"hqt\" style=\"display:none\">43.2&deg;</span>",
      "<span class=\"eqt\">48&deg;</span><span class=\"hqt\" style=\"display:none\">48&deg;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">School</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Total number of students</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">38</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">45</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">55</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">38</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">F</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">44</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Total</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">250</td></tr></table><p>250 students = 360&deg;</p><p>30 students = 360 * 30/250 = 43.2&deg;</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Read the data carefully and answer the following questions.</p><p>Graph given below shows the monthly savings of five different persons.</p><p><img width=546 height=330 id=\"Chart 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12160/image012.png\"></p><p>Savings of person R is what percent of total savings of all the five persons together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2305;&#2325;&#2337;&#2364;&#2379;&#2306; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2360;&#2375; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2310;&#2352;&#2375;&#2326; &#2346;&#2366;&#2305;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2350;&#2366;&#2360;&#2367;&#2325; &#2348;&#2330;&#2340; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"546\" height=\"330\" id=\"Chart 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12160/image012.png\"></p><p>&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; R &#2325;&#2368; &#2348;&#2330;&#2340; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2340;&#2380;&#2352; &#2360;&#2375; &#2360;&#2349;&#2368; &#2346;&#2366;&#2305;&#2330; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2348;&#2330;&#2340; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">15%</span><span class=\"hqt\" style=\"display:none\">15%</span>",
      "<span class=\"eqt\">18%</span><span class=\"hqt\" style=\"display:none\">18%</span>",
      "<span class=\"eqt\">12%</span><span class=\"hqt\" style=\"display:none\">12%</span>",
      "<span class=\"eqt\">21%</span><span class=\"hqt\" style=\"display:none\">21%</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Savings of person R = 9 thousand</p><p>Savings of all the 5 persons together = 15 + 6 + 9 + 12 + 18 = 60 thousand</p><p>Required percent = (9/60) * 100</p><p>= 15%</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The given histogram shows the number of shopkeepers who sold packets of biscuits in a month.</p><p><img width=567 height=322 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21808/image011.png\"></p><p>Total number of shopkeepers who sold packets of biscuits 15 or more is-</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2310;&#2351;&#2340;&#2330;&#2367;&#2340;&#2381;&#2352; &#2319;&#2325; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2348;&#2367;&#2360;&#2381;&#2325;&#2369;&#2335; &#2325;&#2375; &#2346;&#2376;&#2325;&#2375;&#2335; &#2348;&#2375;&#2330;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"567\" height=\"322\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21808/image011.png\"></p><p>15 &#2351;&#2366; &#2313;&#2360;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2348;&#2367;&#2360;&#2381;&#2325;&#2369;&#2335; &#2325;&#2375; &#2346;&#2376;&#2325;&#2375;&#2335; &#2348;&#2375;&#2330;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;-</p></span>",

    "question": "<span class=\"eqt\"><p><b>Direction: </b>Study the information given below and answer the following questions:</p><p>The given histogram represents the frequency distribution of monthly expenditure (in thousands) of 200 people in a colony:</p><p><img width=576 height=336 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p9899/image001.png\"></p><p>What is the average expenditure of people who spend between Rs. 31000 to 50000?</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; : </b>&#2344;&#2368;&#2330;&#2375; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;:</p><p>&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2310;&#2351;&#2340;&#2330;&#2367;&#2340;&#2381;&#2352; &#2319;&#2325; &#2325;&#2377;&#2354;&#2379;&#2344;&#2368; &#2350;&#2375;&#2306; 200 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2360;&#2367;&#2325; &#2357;&#2381;&#2351;&#2351; (&#2361;&#2332;&#2366;&#2352; &#2350;&#2375;&#2306;) &#2325;&#2368; &#2348;&#2366;&#2352;&#2306;&#2348;&#2366;&#2352;&#2340;&#2366; &#2348;&#2306;&#2335;&#2344; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;:</p><p><img width=\"576\" height=\"336\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p9899/image001.png\"></p><p>&#2352;&#2369;.31000 &#2360;&#2375; &#2352;&#2369;.50000 &#2325;&#2375; &#2348;&#2368;&#2330; &#2357;&#2381;&#2351;&#2351; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2357;&#2381;&#2351;&#2351; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p><b>Directions:</b>   The given bar graph shows the number of speakers and headphones sold of five different brands in a month.</p><p><img width=576 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19164/image089.png\"></p><p>The number of speakers sold of brand F is 188 less than number of speakers sold of brand E and number of headphones sold of brand F is 90% of number of headphones sold of brand E. The ratio of number of speakers to number of headphones sold of brand F is:</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;:</b> &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2342;&#2306;&#2337; &#2310;&#2352;&#2375;&#2326; &#2319;&#2325; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2346;&#2366;&#2305;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2348;&#2381;&#2352;&#2366;&#2306;&#2337; &#2325;&#2375; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2360;&#2381;&#2346;&#2368;&#2325;&#2352; &#2324;&#2352; &#2361;&#2375;&#2337;&#2347;&#2364;&#2379;&#2344; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19164/image089.png\"></p><p>&#2348;&#2381;&#2352;&#2366;&#2306;&#2337; F &#2325;&#2375; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2360;&#2381;&#2346;&#2368;&#2325;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2348;&#2381;&#2352;&#2366;&#2306;&#2337; E &#2325;&#2375; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2360;&#2381;&#2346;&#2368;&#2325;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 188 &#2325;&#2350; &#2361;&#2376; &#2340;&#2341;&#2366; &#2348;&#2381;&#2352;&#2366;&#2306;&#2337; F &#2325;&#2375; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2361;&#2375;&#2337;&#2347;&#2379;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2348;&#2381;&#2352;&#2366;&#2306;&#2337; E &#2325;&#2375; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2361;&#2375;&#2337;&#2347;&#2379;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; 90% &#2361;&#2376;&#2404; &#2348;&#2381;&#2352;&#2366;&#2306;&#2337; F &#2325;&#2375; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2360;&#2381;&#2346;&#2368;&#2325;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2361;&#2375;&#2337;&#2347;&#2379;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>The given histogram shows the time taken by different people to complete a race of 200 m.</p><p><img width=576 height=336 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19296/image002.png\"></p><p>The percentage of people who took 50 sec or more but less than 70 sec to complete the race is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2310;&#2351;&#2340;&#2330;&#2367;&#2340;&#2381;&#2352; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 200 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2380;&#2337;&#2364; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19296/image002.png\"></p><p>&#2342;&#2380;&#2337;&#2364; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 50 &#2360;&#2375;&#2325;&#2306;&#2337; &#2351;&#2366; &#2313;&#2360;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2375;&#2325;&#2367;&#2344; 70 &#2360;&#2375;&#2325;&#2306;&#2337; &#2360;&#2375; &#2325;&#2350; &#2360;&#2350;&#2351; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;:</p></span>",
