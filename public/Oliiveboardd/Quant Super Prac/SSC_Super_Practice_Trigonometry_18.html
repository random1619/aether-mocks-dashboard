<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>

            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>

                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">

                    </div>
                    <div class="stat-item">

                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If set A = {4, 7, 6, 12, 18}, then for which of the following set B would A and B be disjoint sets?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; A = {4, 7, 6, 12, 18} &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; B &#2325;&#2375; &#2354;&#2367;&#2319; A &#2324;&#2352; B &#2309;&#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; &#2361;&#2379;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">B = {x: x is an odd rational number}</span><span class=\"hqt\" style=\"display:none\">B = {x: x &#2319;&#2325; &#2357;&#2367;&#2359;&#2350; &#2346;&#2352;&#2367;&#2350;&#2375;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;}</span>",
      "<span class=\"eqt\">B = {16, 13, 15, 12, 20, 25}</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368; = {16, 13, 15, 12, 20, 25}</span>",
      "<span class=\"eqt\">B = {a, e, 14, 16, 18, 22}</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368; = {&#2319;, &#2312;, 14, 16, 18, 22}</span>",
      "<span class=\"eqt\">B = {x: x is an even prime number}</span><span class=\"hqt\" style=\"display:none\">B = {x: x &#2319;&#2325; &#2360;&#2350; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;}</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>For two sets A and B to be disjoint, A &#8745; B = &#966;.</p><p>So, B = {x: x is an even prime number} = {2} which is not an element of set A.</p><p>So, A and B are disjoint sets.</p><p>In option (a), A and B are not disjoint sets as all natural numbers are rational numbers.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If number of elements in a universal set U is 40, number of elements in set A and set B is 20, and 10 respectively, and n(A<img width=15 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15277/image014.png\">B) = 5, then find the number of elements belongs to neither set A nor set B.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2366;&#2352;&#2381;&#2357;&#2349;&#2380;&#2350;&#2367;&#2325; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; U &#2350;&#2375;&#2306; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 40 &#2361;&#2376;, &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; A &#2324;&#2352; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; B &#2350;&#2375;&#2306; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 20 &#2324;&#2352; 10 &#2361;&#2376;, &#2324;&#2352; n(A<img width=15 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15277/image014.png\">B) = 5 &#2361;&#2376;, &#2340;&#2379; &#2344; &#2340;&#2379; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; A &#2324;&#2352; &#2344; &#2361;&#2368; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; B &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Given, n(U) = 40, n(A) = 20, n(B) = 10, n(A<img width=15 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15277/image014.png\">B) = 5</p><p>Using the formula,</p><p>n(A<img width=15 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15277/image015.png\">B) = n(A) + n(B) - n(A<img width=15 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15277/image014.png\">B) = 20 + 10  -  5 = 25</p><p>Let the number of elements belongs to neither set A nor set B = D</p><p>So, n(AUB) = n(U)  -  D</p><p>D = 40  -  25 = 15.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The number of elements only belongs to set A is 22, and number of elements only belongs to set B is 14. If A<img width=15 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15299/image029.png\">B = 3, then the number of elements in set B is what percent less than the number of elements in set A?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2357;&#2354; &#2360;&#2375;&#2335; A &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 22 &#2361;&#2376;, &#2324;&#2352; &#2325;&#2375;&#2357;&#2354; &#2360;&#2375;&#2335; B &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 14 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; A<img width=15 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15299/image029.png\">B = 3, &#2340;&#2379; &#2360;&#2375;&#2335; B &#2350;&#2375;&#2306; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375;&#2335; A &#2350;&#2375;&#2306; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2350; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">24%</span><span class=\"hqt\" style=\"display:none\">24%</span>",
      "<span class=\"eqt\">30%</span><span class=\"hqt\" style=\"display:none\">30%</span>",
      "<span class=\"eqt\">28%</span><span class=\"hqt\" style=\"display:none\">28%</span>",
      "<span class=\"eqt\">32%</span><span class=\"hqt\" style=\"display:none\">32%</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Number of elements only belongs to set A = 22</p><p>Number of elements only belongs to set B =14</p><p>Given,</p><p>A<img width=15 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15299/image029.png\">B = 3</p><p>So, number of elements in set A = 22 + 3 = 25</p><p>And number of elements in set B = 14 + 3 = 17</p><p>Required percentage = (8/25) * 100 = 32%.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If the universal set U = {2, 4, 6, 8, 10, 12, 14}, set A = {1, 2, 3, 4, 5, 6}, and set B = {3, 6, 9, 12, 15}, then find the number of elements in set U  -  {A  -  B}.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2366;&#2352;&#2381;&#2357;&#2340;&#2381;&#2352;&#2367;&#2325; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; U = {2, 4, 6, 8, 10, 12, 14}, &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; A = {1, 2, 3, 4, 5, 6}, &#2340;&#2341;&#2366; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; B = {3, 6, 9, 12, 15} &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; U - {A - B} &#2350;&#2375;&#2306; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>U = {2, 4, 6, 8, 10, 12, 14}</p><p>A = {1, 2, 3, 4, 5, 6}</p><p>B = {3, 6, 9, 12, 15}</p><p>So, A  -  B = {1, 2, 4, 5}</p><p>And U  -  (A  -  B) = {2, 4, 6, 8, 10, 12, 14} - {1, 2, 4, 5}</p><p>= (6, 8, 10, 12, 14)</p><p>So, n(U  -  (A  -  B)) = 5.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>X and Y are two sets such that set X = {x - 4: x is an odd number between 30 to 50} and set Y = {y: y is a prime number between 20 to 50}. What is the sum of elements in the set (Y  -  X)?</p></span><span class=\"hqt\" style=\"display:none\"><p>X &#2324;&#2352; Y &#2342;&#2379; &#2360;&#2375;&#2335; &#2361;&#2376;&#2306; &#2332;&#2367;&#2360;&#2360;&#2375; &#2360;&#2375;&#2335; X = {x - 4: x, 30 &#2360;&#2375; 50 &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2357;&#2367;&#2359;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;} &#2324;&#2352; &#2360;&#2375;&#2335; Y = {y: y, 20 &#2360;&#2375; 50 &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;}&#2404; &#2360;&#2375;&#2335; (Y - X) &#2350;&#2375;&#2306; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">53</span><span class=\"hqt\" style=\"display:none\">53</span>",
      "<span class=\"eqt\">70</span><span class=\"hqt\" style=\"display:none\">70</span>",
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>X = {x - 4: x is an odd number between 30 to 50} </p><p>X = {27, 29, 31, 33, 35, 37, 39, 41, 43, 45}</p><p>Y = {y: y is a prime number between 20 to 50} </p><p>Y = {23, 29, 31, 37, 41, 43, 47}</p><p>So, set (Y  -  X) = {23, 47}</p><p>Required sum = 23 + 47 = 70</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If A = {11, 22, 44, 55} and B = {44, 55, 77} then find the number of elements in A &#8746; B.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A = {11, 22, 44, 55} &#2340;&#2341;&#2366; B = {44, 55, 77} &#2361;&#2379; &#2340;&#2379; A &#8746; B &#2350;&#2375;&#2306; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A = {11, 22, 44, 55}</p><p>B = {44, 55, 77}</p><p>A &#8746; B = {11, 22, 44, 55, 77}</p><p>Number of elements in A &#8746; B = 5</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If A = {21, 23, 40, 53} and B = {23, 40, 44} then find the number of elements in A &#8745; B.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A = {21, 23, 40, 53} &#2340;&#2341;&#2366; B = {23, 40, 44} &#2361;&#2379; &#2340;&#2379; A &#8745; B &#2350;&#2375;&#2306; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A = {21, 23, 40, 53}</p><p>B = {23, 40, 44}</p><p>A &#8745; B = {23, 40}</p><p>Number of elements in A &#8745; B = 2</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If U denotes the universal set, then complement of a set A, is also denoted by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; U &#2360;&#2366;&#2352;&#2381;&#2357;&#2340;&#2381;&#2352;&#2367;&#2325; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; A &#2325;&#2366; &#2346;&#2370;&#2352;&#2325; &#2349;&#2368; &#2344;&#2367;&#2350;&#2381;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">A - U</span><span class=\"hqt\" style=\"display:none\">A - U</span>",
      "<span class=\"eqt\">U  -  A</span><span class=\"hqt\" style=\"display:none\">U  -  A</span>",
      "<span class=\"eqt\">U  -  A'</span><span class=\"hqt\" style=\"display:none\">U  -  A'</span>",
      "<span class=\"eqt\">A'  -  U</span><span class=\"hqt\" style=\"display:none\">A'  -  U</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>We can define complement of a set A as the difference between U and A, that is A' = U  -  A.</p><p>Hence option b is correct.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>If n(A <img width=15 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27664/image001.png\"> B) = 30, n(A) = 17, and n(B) = 21, then find the number of elements common to A and B.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; n(A <img width=15 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27664/image001.png\"> B) = 30, n(A) = 17, &#2340;&#2341;&#2366; n(B) = 21 &#2361;&#2376;, &#2340;&#2379; A &#2340;&#2341;&#2366; B &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

      "<span class=\"eqt\">95</span><span class=\"hqt\" style=\"display:none\">95</span>"

    "correct_option_id": 0,
    "solution": "<p>Using the formula,</p><p>n(A <img width=15 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27664/image001.png\"> B) = n(A) + n(B)  -  n(A &#8745; B)</p><p>Number of users enrolled in at least one = Coding + Design  -  Both</p><p>= 140 + 100  -  70 = 170</p><p>Number of users enrolled in neither course = Total  -  At least one = 250  -  170 = 80</p>",
