    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If tan(t) = 3/7, where t is an acute angle, then what is the value of cosec(t)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; tan(t) = 3/7, &#2332;&#2361;&#2366;&#2305; t &#2319;&#2325; &#2344;&#2381;&#2351;&#2370;&#2344; &#2325;&#2379;&#2339; &#2361;&#2376;, &#2340;&#2379; cosec(t) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;53/7</span><span class=\"hqt\" style=\"display:none\">&radic;53/7</span>",
      "<span class=\"eqt\">&radic;53/3</span><span class=\"hqt\" style=\"display:none\">&radic;53/3</span>",
      "<span class=\"eqt\">&radic;58/3</span><span class=\"hqt\" style=\"display:none\">&radic;58/3</span>",
      "<span class=\"eqt\">&radic;58/7</span><span class=\"hqt\" style=\"display:none\">&radic;58/7</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>tan(t) = 3/7 (Prependicular = 3, base = 7).</p><p>Hypotenuse = &radic;(3&#178; + 7&#178;) = &radic;(9 + 49) = &radic;58</p><p>sin(t) = Prependicular/hypotenuse = 3/&radic;58</p><p>cosec(t) = 1/sin(t) = &radic;58/3</p><p>Option (c) is the correct answer</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If sin&#952; = 11/12, then what will be the value of (tan&#952; + sec&#952;)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; sin&#952; = 11/12, &#2340;&#2379; (tan&#952; + sec&#952;) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;23</span><span class=\"hqt\" style=\"display:none\">&radic;23</span>",
      "<span class=\"eqt\">11/&radic;23</span><span class=\"hqt\" style=\"display:none\">11/&radic;23</span>",
      "<span class=\"eqt\">12/&radic;23</span><span class=\"hqt\" style=\"display:none\">12/&radic;23</span>",
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>sin &#952; = 11/12 </p><p>Since, sin<sup>2</sup> &#952; + cos<sup>2</sup> &#952; = 1</p><p>cos<sup>2</sup> &#952; = 1  -  (11/12)<sup>2</sup> </p><p>cos<sup>2</sup> &#952; = 1  -  121/144 </p><p>cos<sup>2</sup> &#952; = 23/144</p><p>cos&#952; = &radic;23/12</p><p>tan&#952; + sec&#952; = sin&#952;/cos&#952; + 1/cos&#952; </p><p>= (11/12)/(&radic;23/12) + 1/(&radic;23/12) </p><p>= 11/&radic;23 + 12/&radic;23 </p><p>= 23/&radic;23 </p><p>= &radic;23</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If cosq=4/5, find the value of cotq+tanq.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; cosq=4/5 &#2361;&#2376;, &#2340;&#2379; cotq+tanq &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">12/25</span><span class=\"hqt\" style=\"display:none\">12/25</span>",
      "<span class=\"eqt\">25/12</span><span class=\"hqt\" style=\"display:none\">25/12</span>",
      "<span class=\"eqt\">27/12</span><span class=\"hqt\" style=\"display:none\">27/12</span>",
      "<span class=\"eqt\">12/27</span><span class=\"hqt\" style=\"display:none\">12/27</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>cosq=4/5 = Base/Hypotenuse</p><p>Perpendicular = &radic;[Hypotenuse<sup>2</sup>  -  Base<sup>2</sup>] = &radic;(5<sup>2</sup>  -  4<sup>2</sup>) = 3</p><p>cot&#952; = Base/Perpendicular = 3/4</p><p>tan&#952; = Perpendicular/Base = 4/3</p><p>cotq + tanq.</p><p>= 3/4 + 4/3</p><p>= (9 + 16)/12</p><p>= 25/12</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;Given that sin&#952; =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">15</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">17</span></div>&nbsp;, evaluate&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">15 cot&#952; + 17 sin&#952;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">8 tan&#952; + 16 sec&#952;</span></div>&nbsp;, where 0&deg; &lt; &#952; &lt; 90&deg;.&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2361; &#2342;&#2375;&#2326;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2367; sin&#952; = <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">15</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">17</span></div>&nbsp;, &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2325;&#2352;&#2375;&#2306; <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">15 cot&#952; + 17 sin&#952;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">8 tan&#952; + 16 sec&#952;</span></div>&nbsp;, &#2332;&#2361;&#2366;&#2305; 0&deg; &lt; &#952; &lt; 90&deg;.</p><p></span>",
    "options": [
      "<span class=\"eqt\">23/49</span><span class=\"hqt\" style=\"display:none\">23/49</span>",
      "<span class=\"eqt\">49/23</span><span class=\"hqt\" style=\"display:none\">49/23</span>",
      "<span class=\"eqt\">26/3</span><span class=\"hqt\" style=\"display:none\">26/3</span>",
      "<span class=\"eqt\">26/23</span><span class=\"hqt\" style=\"display:none\">26/23</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>By using sin&#952;=15/17, cos&#952;=8/17, tan&#952;=15/8, cot&#952;=8/15, and sec&#952;=17/8, substitute directly into the expression to get the numerator = 15 X (8/15) + 17 X (15/17) = 23 and the denominator = 8 X (15/8) + 16 X (17/8) = 49, so the value is 23/49.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the value of the following expression:</p><p>sin(30 + &#952;)  -  cos(60  -  &#952;)</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><p>sin(30 + &#952;) - cos(60 - &#952;)</span>",
    "options": [
      "<span class=\"eqt\">2 sin(30 + &#952;)</span><span class=\"hqt\" style=\"display:none\">2 &#2346;&#2366;&#2346;(30 &#952;)</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">&radic;3/2</span><span class=\"hqt\" style=\"display:none\">&&#2352;&#2375;&#2337;&#2367;&#2325;;3/2</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#8226; Recall the identity cos(60  -  &#952;) = sin(90  -  (60  -  &#952;)) = sin(30 + &#952;).</p><p>&#8226; Hence, sin(30 + &#952;)  -  cos(60  -  &#952;) = sin(30 + &#952;)  -  sin(30 + &#952;) = 0.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If cot &theta; =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&radic;3</span></div>&nbsp;, 0 &lt; &theta; 90&deg;, then find the value of&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2 - sin<sup>2</sup> &theta;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">1 - cos<sup>2</sup> &theta;</span></div>&nbsp;+ cosec<sup>2</sup> &theta; - sec &theta;&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; cot &#952; = <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&radic;3</span></div>&#2324;&#2352; 0 &lt; &#952; 90&deg; &#2361;&#2376;, &#2340;&#2379; <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2 - sin<sup>2</sup> &theta;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">1 - cos<sup>2</sup> &theta;</span></div>&nbsp;+ cosec<sup>2</sup> &theta; - sec &theta; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</div></p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>cot&#952; = 1/&radic;3</p><p>cot&#952; = cot60&deg;</p><p>&#952; = 60&deg;</p><p>Now,</p><p><img width=189 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24842/image086.png\"></p><p><img width=235 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24842/image087.png\"></p><p><img width=165 height=89 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24842/image088.png\"></p><p><img width=108 height=68 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24842/image089.png\"></p><p><img width=55 height=68 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24842/image090.png\"></p><p><img width=51 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24842/image091.png\"></p><p><img width=49 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24842/image092.png\"></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If cot&#952; = 3/4, &#952; is an acute angle, then sin&#952; + cos&#952;  -  tan&#952; is equal to:</p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; cot&#952; = 3/4, &#952; &#2319;&#2325; &#2344;&#2381;&#2351;&#2370;&#2344; &#2325;&#2379;&#2339; &#2361;&#2376;, &#2340;&#2379; sin&#952; + cos&#952; - tan&#952; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</span>",
    "options": [
      "<span class=\"eqt\">1/11</span><span class=\"hqt\" style=\"display:none\">1/11</span>",
      "<span class=\"eqt\">1/15</span><span class=\"hqt\" style=\"display:none\">1/15</span>",
      "<span class=\"eqt\">1/13</span><span class=\"hqt\" style=\"display:none\">1/13</span>",
      "<span class=\"eqt\">1/18</span><span class=\"hqt\" style=\"display:none\">1/18</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>cot&#952; = &frac34;</p><p>B/P = &frac34;</p><p>B = 3, P = 4</p><p>H = &radic;(3<sup>2</sup> + 4<sup>2</sup>)</p><p>H = 5 </p><p>sin&#952; = P/H = 4/5 </p><p>cos&#952; = B/H = 3/5 </p><p>tan&#952; = P/B = 4/3 </p><p>sin&#952; + cos&#952;  -  tan&#952; = 4/5 + 3/5 - 4/3 = (12 + 9 - 20)/15 = 1/15 </p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If &#952; be acute angle and cos &#952; = 24/25, then the value of cot (90 - &#952;) is equal to: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#952; &#2344;&#2381;&#2351;&#2370;&#2344; &#2325;&#2379;&#2339; &#2361;&#2379; &#2324;&#2352; cos &#952; = 24/25 &#2361;&#2379;, &#2340;&#2379; cot (90 - &#952;) &#2325;&#2366; &#2350;&#2366;&#2344; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">5/24</span><span class=\"hqt\" style=\"display:none\">5/24</span>",
      "<span class=\"eqt\">7/24</span><span class=\"hqt\" style=\"display:none\">7/24</span>",
      "<span class=\"eqt\">7/25</span><span class=\"hqt\" style=\"display:none\">7/25</span>",
      "<span class=\"eqt\">6/25</span><span class=\"hqt\" style=\"display:none\">6/25</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>cos &#952; = 24/25</p><p>sin &#952; = &radic;(1 - (24/25)&#178;) = &radic;(1 - 576/625) = &radic;(49/625) = 7/25</p><p>cot (90 - &#952;) = tan &#952; = sin &#952; / cos &#952; = (7/25) / (24/25) = 7/24</p><p>Option(b) is the correct answer</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>If sec 6A = cosec (A - 29&deg;), where 2A is an acute angle, then the measure of &#8736;A = ___&deg;.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; sec 6A = cosec (A - 29&deg;), &#2332;&#2361;&#2366;&#2305; 2A &#2319;&#2325; &#2344;&#2381;&#2351;&#2370;&#2344; &#2325;&#2379;&#2339; &#2361;&#2376;, &#2340;&#2379; &#8736;A &#2325;&#2366; &#2350;&#2366;&#2346; = ___&deg; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>",
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>sec 6A = cosec (A - 29&deg;)</p><p>cosec (90&deg; - 6A) = cosec (A - 29&deg;)</p><p>90&deg; - 6A = A  -  29&deg;</p><p>7A = 119</p><p>A = 17&deg; </p>",
    "question_index": 8
