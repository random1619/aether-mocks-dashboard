<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>

            <div class="welcome-actions">

        <div class="exam-header">

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>K and L together can finish a work in 18 days. If K alone can finish the same work in 63 days, then in how many hours L alone finish the work?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; K &#2324;&#2352; L &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 18 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; K &#2309;&#2325;&#2375;&#2354;&#2375; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 63 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; L &#2309;&#2325;&#2375;&#2354;&#2375; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">21 days</span><span class=\"hqt\" style=\"display:none\">21 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">25.2 days</span><span class=\"hqt\" style=\"display:none\">25.2 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">17.8 days</span><span class=\"hqt\" style=\"display:none\">17.8 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">28 days</span><span class=\"hqt\" style=\"display:none\">28 &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total work = LCM of 63 and 18 = 126 units</p><p>Efficiency of K and L together = 126/18 = 7 units/day</p><p>Efficiency of K = 126/63 = 2 units/day</p><p>Time taken L to complete the work = 126/(7-2) = 25.2 days</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A work can be finished in 12 days by 28 workers. If the work were to be finished in 8 days, how many additional workers would be required?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2366;&#2350; 28 &#2350;&#2332;&#2342;&#2370;&#2352;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 12 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2366;&#2350; &#2325;&#2379; 8 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2361;&#2379;, &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2350;&#2332;&#2342;&#2370;&#2352;&#2379;&#2306; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In such cases we have the formula,</p><p>M<sub>1 </sub>D<sub>1</sub> = M<sub>2 </sub>D<sub>2</sub></p><p>28*12 = M<sub>2</sub>*8</p><p>M<sub>2</sub> = 42</p><p>Therefore, Required additional workers = 42-28</p><p>= 14 workers</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If 16 people can do a job in 10 days, then 20 people with twice the efficiency can do the same work in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 16 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 10 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2342;&#2325;&#2381;&#2359;&#2340;&#2366; &#2357;&#2366;&#2354;&#2375; 20 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">10 days</span><span class=\"hqt\" style=\"display:none\">10 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">5 days</span><span class=\"hqt\" style=\"display:none\">5 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">4 days</span><span class=\"hqt\" style=\"display:none\">4 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">8 days</span><span class=\"hqt\" style=\"display:none\">8 &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Total work = 16 * 10 = 160 units</p><p>Required answer = 160/ (20 * 2) = 4 days</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Two men together can complete a piece of work in 12 days. If after 4 days two more men joins them, the work will now be completed in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 12 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; 4 &#2342;&#2367;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2342;&#2379; &#2346;&#2369;&#2352;&#2369;&#2359; &#2313;&#2344;&#2325;&#2375; &#2360;&#2366;&#2341; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351; &#2309;&#2348; ____ &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5 days</span><span class=\"hqt\" style=\"display:none\">5 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">10 days</span><span class=\"hqt\" style=\"display:none\">10 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">6 days</span><span class=\"hqt\" style=\"display:none\">6 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">8 days</span><span class=\"hqt\" style=\"display:none\">8 &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Work done by 1 man in one day = 1/(2  X 12) = 1/24</p><p>Work completed by 2 men in 4 days = 4  X  (1/12) = 1/3</p><p>Remaining work = [1  -  (1/3)] = 2/3</p><p>Work done by 4 men in one day = 4  X  (1/24) = 1/6</p><p>Time taken by 4 men to complete the remaining work = <img width=76 height=71 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20559/image014.png\"></p><p>Time taken to complete the entire work = 4 + 4 = 8 days</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>P can do a certain work in 36 days and Q and R together can do the same work in 20 days. If Q can do the same work in 2.5 times the number of days in which P and R together can do, find the number of days taken by R alone to complete the same work.</p></span><span class=\"hqt\" style=\"display:none\"><p>P &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 36 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; Q &#2324;&#2352; R &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 20 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; Q &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; P &#2324;&#2352; R &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2319; &#2327;&#2351;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; 2.5 &#2327;&#2369;&#2344;&#2366; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; R &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2325;&#2375;&#2354;&#2375; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2319; &#2327;&#2351;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>",
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">54</span><span class=\"hqt\" style=\"display:none\">54</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let total work = LCM of 36 and 20 = 180 units</p><p>Efficiency of P = 180/36 = 5 units per day</p><p>Efficiency of Q and R = 180/20 = 9 units per day</p><p>Efficiency of P, Q, and R together = 14 units per day</p><p>Ratio of number of days taken by Q and (P + R) = 2.5: 1 = 5: 2</p><p>Ratio of efficiencies of Q and (P + R) = 2: 5</p><p>So,</p><p>Q + P + R = 14</p><p>7x = 14</p><p>x = 2</p><p>Efficiency of P + R = 5x = 10</p><p>Efficiency of R = 10  -  5 = 5 units per day</p><p>Required answer = 180/5 = 36 days</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A can finish a piece of the work in 48 days and B can finish it in 36 days. They worked together for 15 days and then A B left. Find the time taken by A to finish the remaining work.</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 48 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; B &#2311;&#2360;&#2375; 36 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; 15 &#2342;&#2367;&#2344;&#2379;&#2306; &#2340;&#2325; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2347;&#2367;&#2352; B &#2344;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2331;&#2379;&#2396; &#2342;&#2367;&#2351;&#2366;&#2404; &#2358;&#2375;&#2359; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">28 days</span><span class=\"hqt\" style=\"display:none\">28 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">13 days</span><span class=\"hqt\" style=\"display:none\">13 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">18 days</span><span class=\"hqt\" style=\"display:none\">18 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">24 days</span><span class=\"hqt\" style=\"display:none\">24 &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The total work = L.C.M of 48 and 36 = 144</p><p>Efficiency = total work/ time taken</p><p>Efficiency of A = 144/ 48 = 3</p><p>Efficiency of B = 144/ 36 = 4</p><p>Work done in 15 days by A and B = 15 * 7 = 105</p><p>Work remaining = 144  -  105 = 39</p><p>Time taken by A to finish the remaining work = 39/ 3 = 13 days</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>4 men, 5 women, and 9 boys can complete a work in 30 days. 6 men, 5 women, and 1 boy can complete the same work in 40 days. In how many days will 12 men, 12 women, and 12 boys can complete the same work?</p></span><span class=\"hqt\" style=\"display:none\"><p>4 &#2346;&#2369;&#2352;&#2369;&#2359;, 5 &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2305; &#2324;&#2352; 9 &#2354;&#2337;&#2364;&#2325;&#2375; &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 30 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; 6 &#2346;&#2369;&#2352;&#2369;&#2359;, 5 &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2305; &#2324;&#2352; 1 &#2354;&#2337;&#2364;&#2325;&#2366; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 40 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 12 &#2346;&#2369;&#2352;&#2369;&#2359;, 12 &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2305; &#2324;&#2352; 12 &#2354;&#2337;&#2364;&#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2375;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">14(1/7)</span><span class=\"hqt\" style=\"display:none\">14(1/7)</span>",
      "<span class=\"eqt\">15(2/7)</span><span class=\"hqt\" style=\"display:none\">15(2/7)</span>",
      "<span class=\"eqt\">14(2/7)</span><span class=\"hqt\" style=\"display:none\">14(2/7)</span>",
      "<span class=\"eqt\">15(1/7)</span><span class=\"hqt\" style=\"display:none\">15(1/7)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>One day's work of (4 + 6) men, (5 + 5) women, and (9 + 1) boys = (1/30) + (1/40) = 7/120</p><p>Or, One day's work of 10 men, 10 women, and 10 boys = 7/120</p><p>One day's work of 12 men, 12 women, and 12 boys = (7/120) * 12/10 = 7/100</p><p>Required number of days = 100/7 = 14(2/7) days</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A and B together can do a piece of work in 14 days, B and C together can do the same piece of work in 20 days and C and A together can do the same piece of work in 15 days. They all work together for 10 days after which A and B leave the work. How many days C will take to finish the remaining work?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; A &#2324;&#2352; B &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 14 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2319;&#2325; &#2360;&#2366;&#2341; B &#2324;&#2352; C &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 20 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; C &#2324;&#2352; A &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 15 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2357;&#2375; &#2360;&#2349;&#2368; 10 &#2342;&#2367;&#2344;&#2379;&#2306; &#2340;&#2325; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; A &#2324;&#2352; B &#2325;&#2366;&#2352;&#2381;&#2351; &#2331;&#2379;&#2337;&#2364; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2358;&#2375;&#2359; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; C &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344; &#2354;&#2327;&#2375;&#2306;&#2327;&#2375;?</p></span>",

    "correct_option_id": 2,
    "solution": "<p>Let total work = LCM of 14, 20, and 15 = 420 units</p><p>Efficiency of A and B = 420/14 = 30 units per day</p><p>Efficiency of B and C = 420/20 = 21 units per day</p><p>Efficiency of C and A = 420/15 = 28 units per day</p><p>2 * (A + B + C) = 79</p><p>A + B + C = 79/2</p><p>Efficiency of C = (79/2)  -  30 = 19/2 units per day</p><p>Work done by A, B, and C in 10 days = 79 * 10/2 = 395</p><p>Remaining work = 420  -  395 = 25 units</p><p>Required number of days = 25 * 2/19 = 50/19 = 2(12/19) days.</p>",
    "question_index": 7
  },

    "question": "<span class=\"eqt\"><p>J, K and L can finish a work in 44 days. If K and L together take 55 days to complete the same work, then find the time taken by J to complete the whole work alone.</p></span><span class=\"hqt\" style=\"display:none\"><p>J, K &#2324;&#2352; L &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 44 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2366;&#2341; K &#2324;&#2352; L &#2325;&#2379; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 55 &#2342;&#2367;&#2344; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; J &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2325;&#2375;&#2354;&#2375; &#2360;&#2306;&#2346;&#2370;&#2352;&#2381;&#2339; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>16 boys can complete a piece of work in 14 days by working 9 hours per day. In how many days will 12 boys complete the same work by working 7 hours?</p></span><span class=\"hqt\" style=\"display:none\"><p>16 &#2354;&#2337;&#2364;&#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2342;&#2367;&#2344; 9 &#2328;&#2306;&#2335;&#2375; &#2325;&#2366;&#2350; &#2325;&#2352;&#2325;&#2375; &#2319;&#2325; &#2325;&#2366;&#2350; &#2325;&#2379; 14 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; 12 &#2354;&#2337;&#2364;&#2325;&#2375; 7 &#2328;&#2306;&#2335;&#2375; &#2325;&#2366;&#2350; &#2325;&#2352;&#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2350; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2375;&#2306;&#2327;&#2375;?</p></span>",

    "question": "<span class=\"eqt\"><p>A can do 3/4<sup>th</sup> of the work in 27 days, B can do 60% of the work in 96/5 days, and C can do 1/4<sup>th</sup> of the work in 12 days. Find the time taken by them together to do the same work. </p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2319;&#2325; &#2325;&#2366;&#2350; &#2325;&#2366; 3/4 &#2349;&#2366;&#2327; 27 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, B &#2325;&#2366;&#2350; &#2325;&#2366; 60% &#2349;&#2366;&#2327; 96/5 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; C &#2325;&#2366;&#2350; &#2325;&#2366; 1/4 &#2349;&#2366;&#2327; 12 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2344;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2350; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [

    "question": "<span class=\"eqt\"><p>A working alone can take 8 hours more than B can take to complete the same work, working alone. Working together they can complete the task in 7 hours and 30 minutes. Find the time taken by A working alone to do 50% of the work.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2309;&#2325;&#2375;&#2354;&#2375; A &#2325;&#2379; &#2309;&#2325;&#2375;&#2354;&#2375; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2351; &#2360;&#2375; 8 &#2328;&#2306;&#2335;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325; &#2360;&#2350;&#2351; &#2354;&#2327; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2357;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 7 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 30 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 50% &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">18 hours</span><span class=\"hqt\" style=\"display:none\">18 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">12 hours</span><span class=\"hqt\" style=\"display:none\">12 &#2328;&#2306;&#2335;&#2375;</span>",

    "solution": "<p><img width=226 height=53 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23180/image001.png\" ></p><p>Total work = time taken by A * time taken by B = t (t  -  8)</p><p>Time = total work/ total efficiency</p><p>7.5 = t (t  -  8)/ 2t  -  8</p><p>15t  -  60 = t<sup>2</sup>  -  8t</p><p>t<sup>2</sup>  -  23t + 60 = 0</p><p>t = 20, 3 [3 is not possible]</p><p>The total work = 20 * 12</p><p>Time taken by A to do 50% of the work = 20 * 6/ 12 = 10 hours</p>",

    "question": "<span class=\"eqt\"><p>A and B can do a work alone in 40 days and 60 days respectively. They started the work together and B left 10 days before the completion of work. For how many days did B work?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2350; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;: 40 &#2342;&#2367;&#2344; &#2324;&#2352; 60 &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2350; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; B &#2344;&#2375; &#2325;&#2366;&#2350; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379;&#2344;&#2375; &#2360;&#2375; 10 &#2342;&#2367;&#2344; &#2346;&#2361;&#2354;&#2375; &#2325;&#2366;&#2350; &#2331;&#2379;&#2337;&#2364; &#2342;&#2367;&#2351;&#2366;&#2404; B &#2344;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2340;&#2325; &#2325;&#2366;&#2350; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>No. of days in which A can do the work alone = 40 days</p><p>No. of days in which B can do the work alone = 60 days</p><p>When A and B started the work together, B left 10 days before the completion of work. This means A alone worked for last 10 days. So,</p><p>Part of work done by A in last 10 days = 10/40 = 1/4</p><p>Remaining work = 1  -  1/4 = 3/4</p><p>Now, time taken by A and B together to complete 3/4<sup>th</sup> part of the work</p><p>= (3/4) * 1/(1/40 + 60)</p><p>= (3/4) * 1/((3 + 2)/120)</p><p>= (3/4) * 120/5</p><p>= 18</p><p>Therefore, B worked for <b>18 days</b>.</p>",
    "question_index": 13
  },

    "question": "<span class=\"eqt\"><p>A contractor takes a contract to complete a road in 120 days and employed 100 labours. After 45 days he found that one fourth work is completed. How many more labours he requires to complete the remaining work in time?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2336;&#2375;&#2325;&#2375;&#2342;&#2366;&#2352; &#2319;&#2325; &#2360;&#2337;&#2364;&#2325; &#2325;&#2379; 120 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2336;&#2375;&#2325;&#2366; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 100 &#2350;&#2332;&#2342;&#2370;&#2352;&#2379;&#2306; &#2325;&#2379; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; 45 &#2342;&#2367;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342; &#2313;&#2360;&#2344;&#2375; &#2346;&#2366;&#2351;&#2366; &#2325;&#2367; &#2319;&#2325; &#2330;&#2380;&#2341;&#2366;&#2312; &#2325;&#2366;&#2350; &#2361;&#2368; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2358;&#2375;&#2359; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2360;&#2350;&#2351; &#2346;&#2352; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2360;&#2375; &#2324;&#2352; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2332;&#2342;&#2370;&#2352;&#2379;&#2306; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">80</span><span class=\"hqt\" style=\"display:none\">80</span>",
      "<span class=\"eqt\">82</span><span class=\"hqt\" style=\"display:none\">82</span>",
      "<span class=\"eqt\">85</span><span class=\"hqt\" style=\"display:none\">85</span>",
      "<span class=\"eqt\">90</span><span class=\"hqt\" style=\"display:none\">90</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In 45 days 100 labours have done one fourth work, we need to find the labours required for doing three fourth work in given time i.e. 120  -  45 = 75 days</p><p>Using formula, M1D1/W1= M2D2/W2</p><p>Here M<sub>1</sub>=100, D<sub>1</sub>=45, W<sub>1</sub>= &#188;</p><p>M<sub>2</sub>=?, D<sub>2</sub>= 75, W<sub>2</sub>= &frac34;</p><p>We have (100 X 45 )/(1/4)= (M2 X 75)/(3/4)</p><p>=&gt; M<sub>2</sub>= 180</p><p>Now as 100 labours are appointed before therefore extra labours required to complete the work in given time = 80</p>",
    "question_index": 14

    "question": "<span class=\"eqt\"><p>P, Q, and R can do a piece of work in 13 days, 25 days, and 50 days respectively. On day1, P and R work together, on day2, Q and R work together, on day3, P and Q work together, and on day4, all three work together. After 4 days, the part of work remaining is:</p></span><span class=\"hqt\" style=\"display:none\"><p>P, Q &#2324;&#2352; R &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2350; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 13 &#2342;&#2367;&#2344;, 25 &#2342;&#2367;&#2344; &#2324;&#2352; 50 &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2361;&#2354;&#2375; &#2342;&#2367;&#2344; P &#2324;&#2352; R &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2342;&#2370;&#2360;&#2352;&#2375; &#2342;&#2367;&#2344; Q &#2324;&#2352; R &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2368;&#2360;&#2352;&#2375; &#2342;&#2367;&#2344; P &#2324;&#2352; Q &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2330;&#2380;&#2341;&#2375; &#2342;&#2367;&#2344; &#2340;&#2368;&#2344;&#2379;&#2306; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; 4 &#2342;&#2367;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2325;&#2366;&#2350; &#2325;&#2366; &#2358;&#2375;&#2359; &#2349;&#2366;&#2327; &#2361;&#2376;:</p></span>",
