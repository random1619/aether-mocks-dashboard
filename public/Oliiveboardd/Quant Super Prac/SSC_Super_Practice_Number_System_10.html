<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>What is the unit's digit of the sum 1 + 2<sup>2</sup> + 3<sup>3</sup> + 4<sup>4</sup> + 5<sup>5</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2379;&#2327; 1 + 2<sup>2</sup> + 3<sup>3</sup> + 4<sup>4</sup> + 5<sup>5</sup> &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2325;&#2366; &#2309;&#2306;&#2325; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>2<sup>2</sup> = 4; 3<sup>3</sup> = 27; 4<sup>4</sup> = 256; 5<sup>5</sup> = 3125</p><p>Sum = 1+ 4 + 27+ 256 + 3125 = 3413 </p><p>Alternate:</p><p>The quicker way to solve questions like this is to know the repetitive tendency of the unit digits of the powers of numbers 1-9.</p><p>For example, any power of numbers with unit digits 1, 5 and 6 would always have the unit digit as 1, 5 and 6 itself respectively. Every odd power of number with unit digit 4 would have unit digit as 4 and every even power would have the unit digit as 6. Unit digits of powers of 2 and 3 repeat for every power of 4, i.e., unit digit of 2<sup>1 </sup>is same as 2<sup>5</sup>, unit digit of 2<sup>2</sup> is same as 2<sup>6</sup>, unit digit of 3<sup>3</sup> is same as 3<sup>7</sup> etc.</p><p>=&gt; Sum of the unit digits = 1 + 4 + 7 + 6 + 5 = 23 =&gt; Unit digit would be 3.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The total number of digits used in numbering the pages of a book having 400 pages is</p></span><span class=\"hqt\" style=\"display:none\"><p>400 &#2346;&#2371;&#2359;&#2381;&#2336;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2325;&#2375; &#2346;&#2371;&#2359;&#2381;&#2336;&#2379;&#2306; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">1092</span><span class=\"hqt\" style=\"display:none\">1092</span>",
      "<span class=\"eqt\">1089</span><span class=\"hqt\" style=\"display:none\">1089</span>",
      "<span class=\"eqt\">1091</span><span class=\"hqt\" style=\"display:none\">1091</span>",
      "<span class=\"eqt\">1090</span><span class=\"hqt\" style=\"display:none\">1090</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Total number of digits = (no. of digits in 1*digit page nos. + no. of digits in 2*digit page nos. + no. of digits in 3*digit page nos.)</p><p>= (1 x 9 + 2 x 90 + 3 x 301)</p><p>=(9 + 180 + 903)</p><p>= 1092</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Five-digit numbers are formed by using the digits 0, 1, 2, 3 and 4 with each being used exactly once. What is the difference between the greatest and the lowest numbers thus formed?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2306;&#2330; &#2309;&#2306;&#2325;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; 0, 1, 2, 3 &#2324;&#2352; 4 &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2348;&#2344;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2348;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2348;&#2344;&#2366;&#2312; &#2327;&#2312; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2324;&#2352; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2381;&#2351;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">33766</span><span class=\"hqt\" style=\"display:none\">33766</span>",
      "<span class=\"eqt\">32976</span><span class=\"hqt\" style=\"display:none\">32976</span>",
      "<span class=\"eqt\">32967</span><span class=\"hqt\" style=\"display:none\">32967</span>",
      "<span class=\"eqt\">33245</span><span class=\"hqt\" style=\"display:none\">33245</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Greatest number that can be formed from the given digits = 43210</p><p>Lowest number that can be formed from the given digits = 10234</p><p>Now the required difference = 43210  -  10234 = 32976</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Find the digit at unit's place of 61*62*63*64*65*66*67*68*69</p></span><span class=\"hqt\" style=\"display:none\"><p>61*62*63*64*65*66*67*68*69 &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2366; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;</p></span>",
    "options": [
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>If we observe carefully, the unit digit will be the result of the product of the unit digits of 61, 62, ....69</p><p>i.e. 1*2*3*4*5*6*7*8*9</p><p>i.e 2*5*1*3*4*6*7*8*9</p><p>i.e 10*1*3*4*6*7*8*9</p><p>i.e 0</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If the positions of the digits of a two digit number are interchanged, the number obtained is smaller than the original number by 27. If the digits of the number are in the ratio of 2 : 1 then what is the original number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2342;&#2379; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2370;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 27 &#2325;&#2350; &#2361;&#2379;&#2327;&#2368;&#2404; &#2351;&#2342;&#2367; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2309;&#2306;&#2325; 2 : 1 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2379;&#2306;, &#2340;&#2379; &#2350;&#2370;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>",
      "<span class=\"eqt\">63</span><span class=\"hqt\" style=\"display:none\">63</span>",
      "<span class=\"eqt\">74</span><span class=\"hqt\" style=\"display:none\">74</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the original number be = 10a + b</p><p>According to the question; 10a + b = 10b + a + 27</p><p>=&gt; 9a = 9b + 27</p><p>=&gt; a = b + 3... (1)</p><p>According to the question; a/b=2/1</p><p>=&gt; a = 2b... (2)</p><p>From Equation (1) and (2) we will get;</p><p>=&gt; 2b = b + 3</p><p>=&gt; b = 3</p><p>Hence; a = 6</p><p>Therefore original number = 63</p><p></p><p><b> Express Method </b></p><p>By checking options,</p><p>48 - 84 = -36 (not correct)</p><p>36 - 63 = -27 (not correct)</p><p>63 - 36 = 27. (Correct)</p><p>Hence original number = 63</p><p></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The digit in the unit's place in the expansion of 3<sup>13</sup> is?</p></span><span class=\"hqt\" style=\"display:none\"><p>3<sup>13</sup> &#2325;&#2375; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2350;&#2375;&#2306; &#2311;&#2325;&#2366;&#2312; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2306;&#2325; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Unit digits of 3: 3, 9, 7, 1 after this same values repeat in same order</p><p>&#8594; 13/3&#8594;Rem=1</p><p>&#8594; Last digit = 3</p><p>Hence option A is correct.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>What is the number of zeroes at the end of 89!?</p></span><span class=\"hqt\" style=\"display:none\"><p>89 &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2358;&#2370;&#2344;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Maximum power of 5 in 89!</p><p>= [89/5] + [89/25]</p><p>= 17 + 3</p><p>= 20</p><p>So, number of zeroes in 89! = 20</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What is the unit digit of 5<sup>5</sup> + 6<sup>9</sup> + 7<sup>13</sup> + 8<sup>17 </sup>+ ... + 15<sup>45</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>5<sup>5</sup> + 6<sup>9</sup> + 7<sup>13</sup> + 8<sup>17 </sup>+ ... + 15<sup>45</sup> &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The concept of cyclicity is used to identify the last digit of the number.</p><p>Cyclicity chart:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\" rowspan=\"2\">Number</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\" rowspan=\"2\">Cyclicity</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\" colspan=\"4\">Unit digit values</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Power 4</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">0</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">0</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table><p>(Note: when remainder is 0, power = cyclicity)</p><p>In the given series 5<sup>5</sup> + 6<sup>9</sup> + 7<sup>13</sup> + 8<sup>17 </sup>+ ... + 15<sup>45</sup>, we can see that power of every next term is increased by 4 than power of previous number and from cyclicity table, we can see the cyclicity of numbers from 0 to 9.</p><p>Now, from cyclicity, we know unit digit of 5<sup>th</sup> power of 5 will be 5, 9<sup>th</sup> power of 6 will be 6 and so on.</p><p>Then, unit digit of 5<sup>5</sup> + 6<sup>9</sup> + 7<sup>13</sup> + 8<sup>17 </sup>+ ... + 15<sup>45</sup> = unit digit of (5 + 6 + 7 + 8 + .. + 15)</p><p>In the above series,</p><p>First term = 5 = a</p><p>Last term = 15 = a<sub>n</sub></p><p>Common difference = d = 6  -  5 = 1</p><p>Then, a<sub>n</sub> = a + (n  -  1)d</p><p>15 = 5 + (n  -  1) x 1</p><p>n = 11</p><p>Then, unit digit of (5 + 6 + 7 + 8 + .. + 15)</p><p>= unit digit of (n/2)(a + a<sub>n</sub>)</p><p>= unit digit of (11/2)(5 + 15)</p><p>= unit digit of 110</p><p>= <b>0</b></p>",

    "question": "<span class=\"eqt\"><p>When digits of a two-digit number are reversed and added to the number, then the resultant is 143. If the difference between the digits is 1, then find product of the digits.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2342;&#2379; &#2309;&#2306;&#2325;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2313;&#2354;&#2335; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; 143 &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 1 &#2361;&#2376;, &#2340;&#2379; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the two-digit number = 10a + b, where a and b are tens and unit digits.</p><p>When digits of the number are interchanged, then new number = 10b + a</p><p>Now, 10a + b + 10b + a = 143</p><p>11a + 11b = 143</p><p>a + b = 13</p><p>Difference between digits = (a  -  b) or (b  -  a) = 1</p><p>a = (13  -  1)/2 = 6, b = 13  -  6 = 7</p><p>or b = (13  -  1)/2 = 6, a = 13  -  6 = 7</p><p>So, the number can be 67 or 76.</p><p>Product of digits = 6 * 7 = <b>42</b></p>",
    "question_index": 8
  },

    "question": "<span class=\"eqt\"><p>Sum of digits of a 3-digit number is 13 and its unit digit is 3 times of the digit at hundreds place. If unit digit is 1 more than tens digit, then find the number.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; 3-&#2309;&#2306;&#2325;&#2368;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 13 &#2361;&#2376; &#2340;&#2341;&#2366; &#2311;&#2360;&#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325;, &#2360;&#2376;&#2325;&#2337;&#2364;&#2375; &#2325;&#2375; &#2309;&#2306;&#2325; &#2325;&#2366; 3 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325;, &#2342;&#2361;&#2366;&#2312; &#2309;&#2306;&#2325; &#2360;&#2375; 1 &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>How many zeroes are there in the product of 10!  X  9!  X  8!  X  7!  X  6!?</p></span><span class=\"hqt\" style=\"display:none\"><p>10! X 9! X 8! X 7! X 6! &#2325;&#2375; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2358;&#2370;&#2344;&#2381;&#2351; &#2361;&#2376;&#2306;?</p></span>",

      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Since every pair of 2 and 5 gives a zero and in consecutive numbers, multiple of 5 occurs less than multiple of 2, so we need to count only fives. </p><p>To find the number of fives in 10*9*8*....*1 we will divide the maximum number (i.e. 10) by 5 and count only quotient i.e. 2.</p><p>So, total number of fives in 10!  X  9!  X  8!  X  7!  X  6! = (10/5) + (9/5) + (8/5) + (7/5) + (6/5)</p><p>= 2 + 1 + 1 + 1 + 1 </p><p>= 6</p><p>Hence, there are six zeroes in 10!  X  9!  X  8!  X  7!  X  6!.</p>",
    "question_index": 12

    "solution": "<p>A = 4<sup>3</sup> + 8<sup>3</sup> + 12<sup>3</sup> + .... + 44<sup>3</sup></p><p>A = 64 * (1<sup>3 </sup>+ 2<sup>3</sup> +3<sup>3</sup> + ... + 11<sup>3</sup>)</p><p>Here, we know that, (1<sup>3 </sup>+ 2<sup>3</sup> + 3<sup>3</sup> + ... + n<sup>3</sup>) = (n(n + 1)/2)<sup>2</sup></p><p>Then, A = 64 * ((11(11 + 1)/2)<sup>2</sup>) = 278784</p><p>Unit digit of A = 4</p><p>Similarly, B = 12<sup>2</sup> + 18<sup>2</sup> + 24<sup>2</sup> + .... + 54<sup>2</sup></p><p>B = 36 * ((2<sup>2 </sup>+ 3<sup>2</sup> + 4<sup>2</sup> + ... + 9<sup>2</sup>)  -  1<sup>2</sup>)</p><p>Here, we know that, (1<sup>2 </sup>+ 2<sup>2</sup> + 3<sup>2</sup> + ... + n<sup>2</sup>) = n(n + 1)(2n + 1)/6</p><p>Then, B = 36 * ((9(9 + 1)(18 + 1)/6)  -  1) = 10224</p><p>Unit digit of B = 4</p><p>Therefore, difference between unit digit of A and B = 4  -  4 = <b>0</b></p>",

    "solution": "<p>The cyclicity of the numbers is given below in the table:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Numbers</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Cyclicity</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1, 5, 6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4, 9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2, 3, 7, 8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td></tr></table><p>The unit digit of the series will be the unit digits of sum of unit digits of individual terms of the series.</p><p>Unit digit of 7<sup>19</sup> = 7<sup>3</sup> = 3</p><p>Unit digit of 8<sup>19</sup> = 8<sup>3</sup> = 2</p><p>Unit digit of 9<sup>19</sup> = 9<sup>1</sup> = 9</p><p>Unit digit of 10<sup>19</sup> = 0</p><p>Unit digit of 11<sup>19</sup> = 1</p><p>Unit digit of 12<sup>19</sup> = Unit digit of 2<sup>19</sup> = 2<sup>3</sup> = 8</p><p>Unit digit of 13<sup>19</sup> = Unit digit of 3<sup>19</sup> = 3<sup>3</sup> = 7</p><p>Unit digit of 14<sup>19</sup> = Unit digit of 4<sup>19</sup> = 4<sup>1</sup> = 4</p><p>Unit digit of 15<sup>19</sup> = 5</p><p>Unit digit of 16<sup>19</sup> = 6</p><p>Sum of unit digits of all terms = 3 + 2 + 9 + 0 + 1 + 8 + 7 + 4 + 5 + 6 + 3 + 2 + 9 = 59</p><p>Unit digit of the series = 9</p>",

    "solution": "<p>The concept of cyclicity is used to identify the last digit of the number.</p><p>In 116<sup>111</sup>:</p><p>Unit digit of 116 is 6 and cyclicity of 6 is 1.</p><p>So, we have to divide the power of 116 i.e.111 by 1.</p><p>After dividing 111 by 1, remainder = 0. So, power = cyclicity = 1</p><p>Unit digit of 6<sup>1</sup> = 6</p><p>In 392<sup>56</sup>:</p><p>Unit digit of 392 is 2 and cyclicity of 2 is 4.</p><p>So, we have to divide the power of 392 i.e.56 by 4.</p><p>After dividing 56 by 4, remainder = 0. So, power = cyclicity = 4</p><p>Unit digit of 2<sup>4</sup> = 6</p><p>In 108<sup>123</sup>:</p><p>Unit digit of 108 is 8 and cyclicity of 8 is 4.</p><p>So, we have to divide the power of 108 i.e.123 by 4.</p><p>After dividing 123 by 4, remainder = 3. So, power &#8800; cyclicity</p><p>Unit digit of 8<sup>3</sup> = 2</p><p>In 664<sup>93</sup>:</p><p>Unit digit of 664 is 4 and cyclicity of 4 is 2.</p><p>So, we have to divide the power of 664 i.e.93 by 2.</p><p>After dividing 93 by 2, remainder = 1. So, power &#8800;cyclicity</p><p>Unit digit of 4<sup>1</sup> = 4</p><p>Therefore, unit digit of (116<sup>111</sup> + 392<sup>56</sup> + 108<sup>123</sup>  -  664<sup>93</sup>)</p><p>= unit digit of (6 + 6 + 2  -  4)</p><p>= <b>0</b></p>",
