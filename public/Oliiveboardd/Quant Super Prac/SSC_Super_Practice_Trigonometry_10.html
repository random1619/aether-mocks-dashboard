<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If tan&#952; = 3/5, then find the value of (1 + sec&#952;)(1  -  sec&#952;)/(1 + cosec&#952;)(1  -  cosec&#952;).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; tan&#952; = 3/5, &#2340;&#2379; (1 + sec&#952;)(1 - sec&#952;)/(1 + cosec&#952;)(1 - cosec&#952;) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">9/25</span><span class=\"hqt\" style=\"display:none\">9/25</span>",
      "<span class=\"eqt\">25/9</span><span class=\"hqt\" style=\"display:none\">25/9</span>",
      "<span class=\"eqt\">81/625</span><span class=\"hqt\" style=\"display:none\">81/625</span>",
      "<span class=\"eqt\">625/81</span><span class=\"hqt\" style=\"display:none\">625/81</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>tan&#952; = 3/5</p><p>(1 + sec&#952;)(1  -  sec&#952;)/(1 + cosec&#952;)(1  -  cosec&#952;)</p><p>= (sec<sup>2</sup>&#952;  -  1)/(cosec<sup>2</sup>&#952;  -  1)</p><p>= tan<sup>2</sup>&#952;/cot<sup>2</sup>&#952;</p><p>= tan<sup>4</sup>&#952;</p><p>= (3/5)<sup>4</sup></p><p>= 81/625</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The minimum value of 2 sin<sup>2</sup> q + 3 cos<sup>2</sup> q is </p></span><span class=\"hqt\" style=\"display:none\"><p>2 sin<sup>2</sup> q + 3 cos<sup>2</sup> q &#2325;&#2366; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2350;&#2366;&#2344; &#2361;&#2376; -</p></span>",
    "options": [
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 2,
    "solution": " <p>2 sin<sup>2</sup> q + 3 cos<sup>2</sup> q</p> <p>= 2(sin<sup>2</sup> q + cos<sup>2</sup> q) + cos<sup>2</sup> q</p> <p>= 2 + cos<sup>2</sup> q</p> <p>Since the minimum value of cos<sup>2</sup> q is 0, the minimum value of the given expression is 2.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If cos<sup>2</sup> &theta; + 12.5 sin &theta; - 7 = 0, then the value of sin &theta; is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; cos<sup>2</sup> &#952; + 12.5 sin &#952; - 7 = 0 &#2361;&#2376;, &#2340;&#2379; sin &#952; &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:____</p></span>",
    "options": [
      "<span class=\"eqt\">-&frac12;</span><span class=\"hqt\" style=\"display:none\">-&frac12;</span>",
      "<span class=\"eqt\">&frac12;</span><span class=\"hqt\" style=\"display:none\">&frac12;</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">1/&radic;2</span><span class=\"hqt\" style=\"display:none\">1/&radic;2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>cos<sup>2</sup> &theta; + 12.5 sin &theta; - 7 = 0</p><p>1 - sin<sup>2</sup>&theta; + 12.5 sin &theta; - 7 = 0</p><p>Multiplying by 2 on both sides,</p><p>=&gt; 2-2sin<sup>2</sup> &theta;+ 25sin &theta;-14 = 0</p> <p>=&gt; 2 sin<sup>2</sup> &theta; -25 sin &theta; +12 = 0</p> <p>=&gt; (2sin &theta; - 1) (sin &theta; - 12) = 0</p> <p>=&gt; 2sin &theta; = 1 (Since sin &theta; cant be 12, as its maximum value is 1)</p> <p>=&gt; sin &theta; = &frac12; </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What is the value of (cosA + cosB)<sup>2</sup> + (sinA  -  sinB)<sup>2</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>(cosA + cosB)<sup>2</sup> + (sinA - sinB)<sup>2</sup>? &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376; ?</p></span>",
    "options": [
      "<span class=\"eqt\">4cos<sup>2</sup>(A + B)</span><span class=\"hqt\" style=\"display:none\">4cos<sup>2</sup>(A + B)</span>",
      "<span class=\"eqt\">2cos<sup>2</sup>(A + B)/2</span><span class=\"hqt\" style=\"display:none\">2cos<sup>2</sup>(A + B)/2</span>",
      "<span class=\"eqt\">2cos<sup>2</sup>(A + B)</span><span class=\"hqt\" style=\"display:none\">2cos<sup>2</sup>(A + B)/2</span>",
      "<span class=\"eqt\">4cos<sup>2</sup>(A + B)/2</span><span class=\"hqt\" style=\"display:none\">4cos<sup>2</sup>(A + B)/2</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>= (cosA + cosB)<sup>2</sup> + (sinA  -  sinB)<sup>2</sup></p><p>= (cos<sup>2</sup>A + cos<sup>2</sup>B + 2cosA.cosB) + (sin<sup>2</sup>A + sin<sup>2</sup>B  -  2sinA.sinB)</p><p>= (cos<sup>2</sup>A + sin<sup>2</sup>A) + (cos<sup>2</sup>B + sin<sup>2</sup>B) + 2(cosA.cosB  -  sinA.sinB)</p><p>= 1 + 1 + 2cos(A + B)</p><p>= 2[1 + cos(A + B)]</p><p>= 2[1 + 2cos<sup>2</sup>(A + B)/2  -  1]</p><p>= 2 * 2cos<sup>2</sup>(A + B)/2</p><p>= 4cos<sup>2</sup>(A + B)/2</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If p = (1  -  Tan<sup>2</sup>B) and q = (1  -  Cot<sup>2</sup>B), then the expression [1  -  (p/q)] = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; p = (1 - Tan<sup>2</sup>B) &#2361;&#2376; &#2324;&#2352; q = (1 - Cot<sup>2</sup>B) &#2361;&#2376;, &#2340;&#2379; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; [1 - (p/q)] = ? &#2361;&#2376;-</p></span>",
    "options": [
      "<span class=\"eqt\">Sec<sup>2</sup>B + 1</span><span class=\"hqt\" style=\"display:none\">Sec<sup>2</sup>B + 1</span>",
      "<span class=\"eqt\">1  -  Tan<sup>2</sup>B</span><span class=\"hqt\" style=\"display:none\">1 - Tan<sup>2</sup>B</span>",
      "<span class=\"eqt\">Sec<sup>2</sup>B</span><span class=\"hqt\" style=\"display:none\">Sec<sup>2</sup>B</span>",
      "<span class=\"eqt\">Tan<sup>2</sup>B</span><span class=\"hqt\" style=\"display:none\">Tan<sup>2</sup>B</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>p = (1  -  Tan<sup>2</sup>B) and q = (1  -  Cot<sup>2</sup>B)</p><p>p = (Cos<sup>2</sup>B  -  Sin<sup>2</sup>B)/Cos<sup>2</sup>B</p><p>q =  - (Cos<sup>2</sup>B  -  Sin<sup>2</sup>B)/ Sin<sup>2</sup>B</p><p>p/q = [(Cos<sup>2</sup>B  -  Sin<sup>2</sup>B)/Cos<sup>2</sup>B]/[  - (Cos<sup>2</sup>B  -  Sin<sup>2</sup>B)/ Sin<sup>2</sup>B]</p><p>p/q =  -  Sin<sup>2</sup>B/ Cos<sup>2</sup>B =  - Tan<sup>2</sup>B</p><p>1  -  (p/q) = 1 + Tan<sup>2</sup>B = Sec<sup>2</sup>B</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If M sinx  -  3 = N cosx and N sinx  -  4 = - M cos x, then M<sup>2</sup> + N<sup>2</sup> equals to  -</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; M sinx - 3 = N cosx &#2324;&#2352; N sinx - 4 = - M cos x &#2361;&#2376;, &#2340;&#2379; M<sup>2</sup> + N<sup>2</sup> &#2325;&#2367;&#2360;&#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376; -</p></span>",
    "options": [
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">75</span><span class=\"hqt\" style=\"display:none\">75</span>",
      "<span class=\"eqt\">32</span><span class=\"hqt\" style=\"display:none\">32</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Here, M sinx  -  3 = N cosx</p><p>M sinx  -  N cosx = 3 ..(i)</p><p>And, N sinx  -  4 = - M cos x</p><p>N sinx + M cosx = 4 ..(ii)</p><p>Taking sinx (i) + cosx (ii), we get</p><p>M sin<sup>2</sup>x  -  N sinx cosx + M cos<sup>2</sup>x + N sinx cosx = 3 sinx + 4 cosx</p><p>M = 3 sinx + 4 cosx</p><p>And, (3 sinx + 4 cosx) sinx  -  N cosx = 3 = 3(cos<sup>2</sup>x + sin<sup>2</sup>x)</p><p>N = - 3 cosx + 4 sinx</p><p>Therefore,M<sup>2</sup> + N<sup>2</sup> = (3 sinx + 4 cosx)<sup>2</sup> + ( -  3 cosx + 4 sinx)<sup>2</sup></p><p>= 9 sin<sup>2</sup>x + 16 cos<sup>2</sup>x + 24 sinx cosx + 16 sin<sup>2</sup>x + 9 cos<sup>2</sup>x  -  24 sinx cosx</p><p>= 9 + 16</p><p>= <b>25</b></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If sin&#952; cot&#952; + tan&#952; cos&#952; = sec&#952;, 0&#730; &lt; x &lt; 90&#730;, then (4 cot&#952; + 3 sin&#952;) = k(3 tan &#952;  -  &radic;2 cos &#952;). Find the value of 'k'.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; sin&#952; cot&#952; + tan&#952; cos&#952; = sec&#952;, 0&#730; &lt; x &lt; 90&#730; &#2361;&#2376;, &#2340;&#2379; (4 cot&#952; + 3 sin&#952;) = k(3 tan &#952; - &radic;2 cos &#952;) &#2361;&#2376;&#2404; 'k' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">(4 + &radic;2)/3</span><span class=\"hqt\" style=\"display:none\">(4 + &radic;2)/3</span>",
      "<span class=\"eqt\">(8 + 3&radic;2)/4</span><span class=\"hqt\" style=\"display:none\">(8 + 3&radic;2)/4</span>",
      "<span class=\"eqt\">(3&radic;2  -  1)/2</span><span class=\"hqt\" style=\"display:none\">(3&radic;2 - 1)/2</span>",
      "<span class=\"eqt\">2(2&radic;2 + 1)/3</span><span class=\"hqt\" style=\"display:none\">2(2&radic;2 + 1)/3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, sin&#952; cot&#952; + tan&#952; cos&#952; = sec&#952;</p><p>sin&#952; cos&#952;/sin&#952; + (sin&#952;/cos&#952;) cos&#952; = 1/cos&#952;</p><p>cos<sup>2</sup>&#952; + sin&#952; cos&#952; = 1</p><p>sin&#952; cos&#952; = 1  -  cos<sup>2</sup>&#952;</p><p>sin&#952; cos&#952; = sin<sup>2</sup>&#952;</p><p>tan&#952; = 1, then &#952; = 45&#730;</p><p>Therefore, (4 cot&#952; + 3 sin&#952;) = k(3 tan &#952;  -  &radic;2 cos &#952;)</p><p>(4 cot45&#730; + 3 sin45&#730;) = k(3 tan 45&#730;  -  &radic;2 cos 45&#730;)</p><p>(4 * 1 + 3 * 1/&radic;2) = k(3 * 1  -  &radic;2 * 1/&radic;2)</p><p><b>k = (8 + 3</b><b>&radic;</b><b>2)/4</b></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If ((9/2)sin2A/cosA)  -  6cos<sup>2</sup>A = 9, and 0&#730; &lt; x &le; 90&#730; then which of the following is true?</p><p>I. cos2A  -  cosec A + 2 = 0</p><p>II. tan(A/2) = &radic;3</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; ((9/2)sin2A/cosA) - 6cos<sup>2</sup>A = 9 &#2324;&#2352; 0&#730; &lt; x &le; 90&#730; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p><p>I. cos2A - cosec A + 2 = 0</p><p>II. tan(A/2) = &radic;3</p></span>",
    "options": [
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Here, ((9/2)sin2A/cosA)  -  6cos<sup>2</sup>A = 9</p><p>(9 sinA cosA/cosA)  -  6 + 6sin<sup>2</sup>A = 9</p><p>9sinA + 6sin<sup>2</sup>A  -  15 = 0</p><p>2sin<sup>2</sup>A + 3sinA  -  5 = 0</p><p>2sin<sup>2</sup>A + 5sinA  -  2sinA  -  5 = 0</p><p>(sinA  -  1)(2sinA + 5) = 0</p><p>Then, sin A = 1, A = 90&#730;</p><p>Now, cos2A  -  cosec A + 2 = cos(2 * 90&#730;)  -  cosec 90&#730; + 2 = -1  -  1 + 2 = 0</p><p>So, I is true.</p><p>And, tan(A/2) = tan(90&#730;/2) = tan 45&#730; = 1 &#8800; &radic;3</p><p>So, II is false.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><div>&nbsp;The value of&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">6(sec<sup>2</sup>72 - cot<sup>2</sup>18) - [sin<sup>2</sup>(53 + &theta;) + sin<sup>2</sup>(37 - &theta;)]</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cosec(66 + &theta;) + 7cosec<sup>2</sup>46 + 3tan72tan18 - 7tan<sup>2</sup>44 - sec(24 - &theta;)</span></div>&nbsp;is equal to &#58;&nbsp;</div></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2360;&#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;: <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">6(sec<sup>2</sup>72 - cot<sup>2</sup>18) - [sin<sup>2</sup>(53 + &theta;) + sin<sup>2</sup>(37 - &theta;)]</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cosec(66 + &theta;) + 7cosec<sup>2</sup>46 + 3tan72tan18 - 7tan<sup>2</sup>44 - sec(24 - &theta;)</span></div></div></p></span>",
    "options": [
      "<span class=\"eqt\">2/3</span><span class=\"hqt\" style=\"display:none\">2/3</span>",
