<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A thief takes off on his bike at a certain speed, after seeing a police car at a distance of 250 m. The police car starts chasing the thief and catches him. If the thief runs 1.5 km before being caught and the speed of the police car is 70 km/h, then what is the speed of thief's bike (in km/h)?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2330;&#2379;&#2352; 250 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2319;&#2325; &#2346;&#2369;&#2354;&#2367;&#2360; &#2325;&#2366;&#2352; &#2325;&#2379; &#2342;&#2375;&#2326;&#2325;&#2352; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2327;&#2340;&#2367; &#2360;&#2375; &#2309;&#2346;&#2344;&#2368; &#2348;&#2366;&#2311;&#2325; &#2346;&#2352; &#2349;&#2366;&#2327; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2369;&#2354;&#2367;&#2360; &#2325;&#2366;&#2352; &#2330;&#2379;&#2352; &#2325;&#2366; &#2346;&#2368;&#2331;&#2366; &#2325;&#2352;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2375; &#2346;&#2325;&#2337;&#2364; &#2354;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2330;&#2379;&#2352; &#2346;&#2325;&#2337;&#2364;&#2375; &#2332;&#2366;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; 1.5 &#2325;&#2367;&#2350;&#2368; &#2349;&#2366;&#2327;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2369;&#2354;&#2367;&#2360; &#2325;&#2366;&#2352; &#2325;&#2368; &#2327;&#2340;&#2367; 70 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2330;&#2379;&#2352; &#2325;&#2368; &#2348;&#2366;&#2311;&#2325; &#2325;&#2368; &#2327;&#2340;&#2367; (&#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">65 km/h</span><span class=\"hqt\" style=\"display:none\">65 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">60 km/h</span><span class=\"hqt\" style=\"display:none\">60 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">55 km/h</span><span class=\"hqt\" style=\"display:none\">55 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">50 km/h</span><span class=\"hqt\" style=\"display:none\">50 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Convert 250 m to km: 250 m = 0.25 km.</p><p>The thief covers an extra 1.5 km after the police start chasing.</p><p>Let the thief's speed be v km/h. Then, his time = 1.5/v hours.</p><p>In the same time, the police cover the thief's extra 1.5 km plus the initial 0.25 km head start, total 1.75 km.</p><p>Since the police speed is 70 km/h, their time = 1.75/70 hours.</p><p>Equate the times: 1.5/v = 1.75/70.</p><p>Solve for v:</p><p>&#8195;&#8195;v = (1.5  X  70) / 1.75 = 105 / 1.75 = 60 km/h.</p><p>Option (b) is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A thief is noticed by a policeman from a distance of 92 m. The thief starts running and the policeman chases him. The thief and the policeman run at the speed of 90 km/h and 104.4 km/h, respectively. In how much time will the policeman catch the thief?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2330;&#2379;&#2352; &#2325;&#2379; &#2319;&#2325; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; 92 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2360;&#2375; &#2342;&#2375;&#2326; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2330;&#2379;&#2352; &#2349;&#2366;&#2327;&#2344;&#2375; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2313;&#2360;&#2325;&#2366; &#2346;&#2368;&#2331;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2330;&#2379;&#2352; &#2324;&#2352; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 90 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2324;&#2352; 104.4 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2349;&#2366;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2330;&#2379;&#2352; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2346;&#2325;&#2337;&#2364; &#2354;&#2375;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">21 seconds</span><span class=\"hqt\" style=\"display:none\">21 &#2360;&#2375;&#2325;&#2306;&#2337;</span>",
      "<span class=\"eqt\">26 seconds</span><span class=\"hqt\" style=\"display:none\">26 &#2360;&#2375;&#2325;&#2306;&#2337;</span>",
      "<span class=\"eqt\">23 seconds</span><span class=\"hqt\" style=\"display:none\">23 &#2360;&#2375;&#2325;&#2306;&#2337;</span>",
      "<span class=\"eqt\">22 seconds</span><span class=\"hqt\" style=\"display:none\">22 &#2360;&#2375;&#2325;&#2306;&#2337;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Distance = 92 m</p><p>Speed of thief = 90 km/h = 90  X  5/18 = 25 m/s</p><p>Speed of policeman = 104.4 km/h or 104.4  X  5/18 = 29 m/s</p><p>Relative speed = 29  -  25 = 4m/sec</p><p>Time = Distance/Relative speed</p><p>=&gt; 92/4 = 23 seconds</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A bus travels at 100 km/h for the first 30 Minutes. Later it travels at 80 km/h. Find the time taken by the bus to travel 290 km.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2360; &#2346;&#2361;&#2354;&#2375; 30 &#2350;&#2367;&#2344;&#2335; &#2340;&#2325; 100 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404; &#2348;&#2366;&#2342; &#2350;&#2375;&#2306; &#2351;&#2361; 80 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404; 290 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2348;&#2360; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&#8201;4 hours</span><span class=\"hqt\" style=\"display:none\">&#8201;4 &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">&#8201;3.5 hours</span><span class=\"hqt\" style=\"display:none\">&#8201;3.5 &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">&#8201;3 hours</span><span class=\"hqt\" style=\"display:none\">&#8201;3 &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">&#8201;2.5 hours</span><span class=\"hqt\" style=\"display:none\">&#8201;2.5 &#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The distance covered by the bus at 100 km/h in first 1/2 hour = 100 * (1/2) = 50 km</p><p>The distance covered by the bus at 80 km/h = 290  -  50 = 240 km</p><p>The time taken to covered 240 km at 80 km/h = 240/80 = 3 km/h</p><p>So, the time taken by the bus to travel 290 km = 3 + 1/2 = 3.5 hours</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A man drives his car for 24 km at a speed of 48 km/h, and for the next 1.5 hours he drives at a speed of 80 km/h. Find his average speed (in km/h) for the entire journey.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2309;&#2346;&#2344;&#2368; &#2325;&#2366;&#2352; 24 km &#2340;&#2325; 48 km/h &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2330;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2327;&#2354;&#2375; 1.5 &#2328;&#2306;&#2335;&#2375; &#2340;&#2325; &#2357;&#2361; 80 km/h &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2327;&#2366;&#2337;&#2364;&#2368; &#2330;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2370;&#2352;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2360;&#2325;&#2368; &#2324;&#2360;&#2340; &#2330;&#2366;&#2354; (km/h &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">64</span><span class=\"hqt\" style=\"display:none\">64</span>",
      "<span class=\"eqt\">72</span><span class=\"hqt\" style=\"display:none\">72</span>",
      "<span class=\"eqt\">68</span><span class=\"hqt\" style=\"display:none\">68</span>",
      "<span class=\"eqt\">75</span><span class=\"hqt\" style=\"display:none\">75</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total distance covered = 24 + 1.5 * 80 = 144 km</p><p>Total time = 24/48 + 1.5 = 2 hours</p><p>Average speed = Total distance/Total time = 144/2</p><p>= 72 km/h</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A takes 2 hours 30 minutes more than B to walk 40 km. If A doubles his speed, then he can make it in 1 hour less than B. How much time (in hours) does A require for walking a 40 km distance?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2325;&#2379; 40 km &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; B &#2360;&#2375; 2 &#2328;&#2306;&#2335;&#2375; 30 &#2350;&#2367;&#2344;&#2335; &#2309;&#2343;&#2367;&#2325; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; A &#2309;&#2346;&#2344;&#2368; &#2330;&#2366;&#2354; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2325;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; &#2311;&#2360;&#2375; B &#2360;&#2375; 1 &#2328;&#2306;&#2335;&#2366; &#2325;&#2350; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; A &#2325;&#2379; 40 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; (&#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306;) &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let speeds of A and B is 'a' and 'b' respectively.</p><p>According to the question:</p><p><img width=160 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24643/image108.png\"></p><p><img width=80 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24643/image109.png\"></p><p><img width=164 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24643/image110.png\"></p><p>From (1) and (2):</p><p><img width=116 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24643/image111.png\"></p><p><img width=61 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24643/image112.png\"></p><p>a = 40/7 km/h</p><p>Time taken by A to walk 40 km distance = 40 &div; (40/7)</p><p>= 7 hours</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A car travels the first 160 km at a speed of 64 km/h and the next 160 km at a speed of 80 km/hr What is the average speed for the first 320 km of the tour?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2366;&#2352; &#2346;&#2361;&#2354;&#2375; 160 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 64 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2309;&#2327;&#2354;&#2375; 160 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 80 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; 320 km &#2325;&#2375; &#2354;&#2367;&#2319; &#2324;&#2360;&#2340; &#2330;&#2366;&#2354; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">70 km/h</span><span class=\"hqt\" style=\"display:none\">70 km/h</span>",
      "<span class=\"eqt\">71.11 km/h</span><span class=\"hqt\" style=\"display:none\">71.11 km/h</span>",
      "<span class=\"eqt\">66 km/h</span><span class=\"hqt\" style=\"display:none\">66 km/h</span>",
      "<span class=\"eqt\">75.32 km/h</span><span class=\"hqt\" style=\"display:none\">75.32 km/h</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total distance covered = 160 + 160 = 320 km</p><p>Total time taken = 160/64 + 160/80 = 2.5 + 2 = 4.5 hours</p><p>Average speed = Total distance covered/Total time taken = 320/4.5</p><p>= 71.11 km/h</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Anand covers a certain distance in the first lag of 5 hours at the speed of 50 km/h. In the second lag, he increased the speed by 20% due to which he covered 20% extra distance than that of the first lag. He covered the third lag at the average speed of the first two lags and covered 10% extra distance than that of the second lag distance. How much total time (in hours) did he take to complete all three lags?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2344;&#2306;&#2342; 5 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2309;&#2306;&#2340;&#2352;&#2366;&#2354; &#2350;&#2375;&#2306; 50 km/h &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2370;&#2360;&#2352;&#2375; &#2309;&#2306;&#2340;&#2352;&#2366;&#2354; &#2350;&#2375;&#2306; &#2313;&#2360;&#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2330;&#2366;&#2354; &#2350;&#2375;&#2306; 20% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2352; &#2342;&#2368; &#2332;&#2367;&#2360;&#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2313;&#2360;&#2344;&#2375; &#2346;&#2361;&#2354;&#2375; &#2309;&#2306;&#2340;&#2352;&#2366;&#2354; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; 20% &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2368;&#2404; &#2313;&#2360;&#2344;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2309;&#2306;&#2340;&#2352;&#2366;&#2354; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2361;&#2354;&#2375; &#2342;&#2379; &#2309;&#2306;&#2340;&#2352;&#2366;&#2354; &#2325;&#2368; &#2324;&#2360;&#2340; &#2330;&#2366;&#2354; &#2360;&#2375; &#2340;&#2351; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2309;&#2306;&#2340;&#2352;&#236     "question": "<span class=\"eqt\"><p>A bus covers a 60 kilometer distance in 1 hour 30 minutes, whereas the same distance is covered by a car in 45 minutes. What is the ratio of the speed of the car to the speed of the bus?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2360; 60 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 1 &#2328;&#2306;&#2335;&#2366; 30 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; &#2319;&#2325; &#2325;&#2366;&#2352; 45 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2325;&#2366;&#2352; &#2325;&#2368; &#2330;&#2366;&#2354; &#2324;&#2352; &#2348;&#2360; &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>A thief is spotted by a policeman from a distance of 100 m. The thief starts running and the policeman chases him. If the speed of thief and policeman are 21 km/h and 23 km/h, respectively, then how far will the thief have to run before he is over taken?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2330;&#2379;&#2352; &#2325;&#2379; &#2319;&#2325; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; 100 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2360;&#2375; &#2342;&#2375;&#2326; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2330;&#2379;&#2352; &#2349;&#2366;&#2327;&#2344;&#2375; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2313;&#2360;&#2325;&#2366; &#2346;&#2368;&#2331;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2330;&#2379;&#2352; &#2324;&#2352; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 21 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2324;&#2352; 23 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2330;&#2379;&#2352; &#2325;&#2379; &#2346;&#2325;&#2337;&#2364;&#2375; &#2332;&#2366;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352; &#2349;&#2366;&#2327;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</span>",

    "question": "<span class=\"eqt\"><p>Suppose A starts walking at a speed of 8 km/h. After 8 hours B started travelling on a bicycle at a speed of 24 km/h. The distance from the starting B can catch A is:</p></span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2344; &#2354;&#2368;&#2332;&#2367;&#2319; A 8 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2330;&#2354;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; 8 &#2328;&#2306;&#2335;&#2375; &#2348;&#2366;&#2342; B 24 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2360;&#2366;&#2311;&#2325;&#2367;&#2354; &#2346;&#2352; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; B, A &#2325;&#2379; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340;&#2368; &#2360;&#2381;&#2341;&#2366;&#2344; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2325; &#2346;&#2325;&#2337;&#2364; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;:</span>",

    "question": "<span class=\"eqt\"><p>A policeman is chasing a thief at a speed of 82 km/h. The thief is 1300 m away and is running at a speed of 64 km/h. In how much time will the policeman catch the thief if both are riding on bikes?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; 82 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2319;&#2325; &#2330;&#2379;&#2352; &#2325;&#2366; &#2346;&#2368;&#2331;&#2366; &#2325;&#2352; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404; &#2330;&#2379;&#2352; 1300 &#2350;&#2368;&#2335;&#2352; &#2342;&#2370;&#2352; &#2361;&#2376; &#2324;&#2352; 64 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2349;&#2366;&#2327; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2348;&#2366;&#2311;&#2325; &#2346;&#2352; &#2360;&#2357;&#2366;&#2352; &#2361;&#2376;&#2306; &#2340;&#2379; &#2330;&#2379;&#2352; &#2325;&#2379; &#2346;&#2325;&#2337;&#2364;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2375;&#2327;&#2366;?</span>",

    "question": "<span class=\"eqt\"><p>How much percentage should a racer increase speed to reduce the time by 20% to cover a fixed distance?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2343;&#2366;&#2357;&#2325; &#2325;&#2379; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2350;&#2351; &#2325;&#2379; 20% &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2346;&#2344;&#2368; &#2330;&#2366;&#2354; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2352;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [

      "<span class=\"eqt\">40%</span><span class=\"hqt\" style=\"display:none\">40%</span>",
      "<span class=\"eqt\">35%</span><span class=\"hqt\" style=\"display:none\">35%</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>We know that: </b>Ratio of time to cover a certain is equal to the ratio of reciprocal of the speeds.</p><p>Let the actual and decrease time is 100 and 80 respectively.</p><p>Ratio of actual and increased speed = (1/Actual time): (1/Reduced time) = (1/100): (1/80) = 4: 5</p><p>Hence, percent increment in the speed = (5  -  4)/4 * 100</p><p>= 25%</p>",
