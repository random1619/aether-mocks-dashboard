    "question": "<span class=\"eqt\"><p>The following line graph shows the number of boys enrolled in different universities and the table shows the number of students enrolled in those universities.</p><p><img width=508 height=336 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27549/image001.png\"></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Universities</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Number of students enrolled</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">28000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">56000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">40000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">24000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">F</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">45000</td></tr></table><p>Number of girls enrolled in university A is what percentage more or less than the number of boys enrolled in university E and F together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2375;&#2326;&#2366; &#2327;&#2381;&#2352;&#2366;&#2347; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;   {
    "question": "<span class=\"eqt\"><p>Below given pie chart shows the percentage distribution of the marks scored by five students in Hindi and the table given below shows the marks obtained by them in English and Geography.</p><p><img width=404 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27549/image002.png\"></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Student</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Marks scored in English</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Marks scored in Geography</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Raman</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">90</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">48</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vishal</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">65</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">70</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Paresh</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">72</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">56</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Satish</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">84</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ashu</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">80</td></tr></table><p>If the total marks scored by Satish in all subjects together is 144, then find the marks obtained by Vishal in Hindi and Geography together.</p></span><span class=\"hqt\" styl lack;padding:5px;\">48</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2357;&#2367;&#2358;&#2366;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">65</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">70</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2346;&#2352;&#2375;&#2358;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">72</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">56</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2340;&#2368;&#2358;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">84</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2310;&#2358;&#2369;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">80</td></tr></table><p>&#2351;&#2342;&#2367; &#2360;&#2340;&#2368;&#2358; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2349;&#2368; &#2357;&#2367;&#2359;&#2351;&#2379;&#2306; &#2325;&#2379; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2369;&#2354; &#2309;&#2306;&#2325; 144 &#2361;&#2376;&#2306;, &#2340;&#2379; &#2357;&#2367;&#2358;&#2366;&#2354; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2361;&#2367;&#2306;&#2342;&#2368; &#2324;&#2352; &#2349;&#2370;&#2327;&#2379;&#2354; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
