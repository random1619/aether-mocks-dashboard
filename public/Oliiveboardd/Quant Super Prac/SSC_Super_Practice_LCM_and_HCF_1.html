    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>LCM of two number is 56 times their HCF, with the sum of their HCF and LCM being 1710. If one of the two numbers is 240, then what is the other number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2351; (LCM) &#2313;&#2344;&#2325;&#2375; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; (HCF) &#2325;&#2366; 56 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; HCF &#2324;&#2352; LCM &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; 1710 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 240 &#2361;&#2376;,&#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">57</span><span class=\"hqt\" style=\"display:none\">57</span>",
      "<span class=\"eqt\">171</span><span class=\"hqt\" style=\"display:none\">171</span>",
      "<span class=\"eqt\">1680</span><span class=\"hqt\" style=\"display:none\">1680</span>",
      "<span class=\"eqt\">210</span><span class=\"hqt\" style=\"display:none\">210</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let HCF and LCM of two numbers be H and L respectively.</p><p>According to the question:</p><p>L = 56H ........ (1)</p><p>L + H = 1710 ....... (2)</p><p>From (1) and (2):</p><p>56H + H = 1710</p><p>H = 30</p><p>L = 1680</p><p>We know that:</p><p>Product of two numbers = Product of their HCF and LCM</p><p>240 * N = 1680 * 30</p><p>N = 210</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>What is the LCM of 3.6, 1.8 and 0.144?</p></span><span class=\"hqt\" style=\"display:none\"><p>3.6, 1.8 &#2324;&#2352; 0.144 &#2325;&#2366; &#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2351; (LCM) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3.6</span><span class=\"hqt\" style=\"display:none\">3.6</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>",
      "<span class=\"eqt\">3600</span><span class=\"hqt\" style=\"display:none\">3600</span>",
      "<span class=\"eqt\">360</span><span class=\"hqt\" style=\"display:none\">360</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=60 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20002/image071.png\"></p><p><img width=52 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20002/image072.png\"></p><p><img width=85 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20002/image073.png\"></p><p>LCM of 3.6, 1.8, and 0.144 = <img width=171 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20002/image074.png\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Two numbers are in the ratio 9 : 7. If their HCF is 6, find their LCM.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; 9:7 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2313;&#2344;&#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; (HCF) 6 &#2361;&#2376;, &#2340;&#2379; &#2313;&#2344;&#2325;&#2366; &#2354;&#2328;&#2369;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2351; (LCM) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">189</span><span class=\"hqt\" style=\"display:none\">189</span>",
      "<span class=\"eqt\">126</span><span class=\"hqt\" style=\"display:none\">126</span>",
      "<span class=\"eqt\">378</span><span class=\"hqt\" style=\"display:none\">378</span>",
      "<span class=\"eqt\">252</span><span class=\"hqt\" style=\"display:none\">252</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the numbers are 9x and 7x respectively. </p><p>HCF of 9x and 7x = x = 6</p><p>LCM of 9x and 7x = 63x = 63  X  6</p><p>= 378</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The HCF of two numbers is one-twentieth of their LCM. If one of the numbers is 96 and the difference of the LCM and the HCF is 456, then what is the other number? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; HCF &#2313;&#2344;&#2325;&#2375; LCM &#2325;&#2366; &#2348;&#2368;&#2360;&#2357;&#2366;&#2305; &#2349;&#2366;&#2327; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 96 &#2361;&#2376; &#2324;&#2352; LCM &#2324;&#2352; HCF &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 456 &#2361;&#2376;, &#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;? </p></span>",
    "options": [
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">120</span><span class=\"hqt\" style=\"display:none\">120</span>",
      "<span class=\"eqt\">144</span><span class=\"hqt\" style=\"display:none\">144</span>",
      "<span class=\"eqt\">72</span><span class=\"hqt\" style=\"display:none\">72</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let other number = x</p><p>Let LCM = y</p><p>HCF = y/20</p><p>=&gt; LCM  -  HCF = 456</p><p>y  -  y/20 = 456</p><p>y = 480</p><p>LCM = 480</p><p>HCF = 480/20 = 24</p><p>Product of two numbers = LCM * HCF</p><p>96 * x = 480 * 24</p><p>x = 120</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;The HCF of <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'> 1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>2 </span></div>, <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'> 3</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>4 </span></div>, <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'> 5</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>6 </span></div>, and <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'> 7</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>8 </span></div> is&#58;&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div><div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'> 1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>2 </span></div>, <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'> 3</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>4 </span></div>, <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'> 5</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>6 </span></div>, and <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'> 7</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>8 </span></div> &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; (HCF) &#2361;&#2376;:</div></p></span>",
    "options": [
      "<span class=\"eqt\">105/2</span><span class=\"hqt\" style=\"display:none\">105/2</span>",
      "<span class=\"eqt\">1/24</span><span class=\"hqt\" style=\"display:none\">1/24</span>",
      "<span class=\"eqt\">7/24</span><span class=\"hqt\" style=\"display:none\">7/24</span>",
      "<span class=\"eqt\">1/48</span><span class=\"hqt\" style=\"display:none\">1/48</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>HCF of fractions = HCF of numerator/LCM of denominator</p><p>HCF of 1/2, 3/4, 5/6, and 7/8 = HCF of 1, 3, 5, and 7/LCM of 2, 4, 6, and 8</p><p>HCF of 1, 3, 5, and 7 = 1</p><p>LCM of 2, 4, 6, and 8 = 24</p><p>Required HCF = 1/24</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The product of two numbers is 38025 and their Highest Common Factor is 65. What is the Least Common Multiple of these numbers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; 38025 &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; 65 &#2361;&#2376;, &#2340;&#2379; &#2311;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2351; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">455</span><span class=\"hqt\" style=\"display:none\">455</span>",
      "<span class=\"eqt\">585</span><span class=\"hqt\" style=\"display:none\">585</span>",
      "<span class=\"eqt\">715</span><span class=\"hqt\" style=\"display:none\">715</span>",
      "<span class=\"eqt\">435</span><span class=\"hqt\" style=\"display:none\">435</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Since the HCF of two numbers is 65, then let the numbers are 65a and 65b respectively. ['a' and 'b' are co-prime.]</p><p>Product of two numbers = 65a  X  65b = 38025</p><p>ab = 9</p><p>LCM of two numbers = 65ab = 65  X  9</p><p>= 585</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If the highest common factor (HCF) of x and y is 15, then the HCF of 36x<sup>2</sup> -  81y<sup>2</sup> and 81x<sup>2</sup> -  9y<sup>2</sup> is divisible by.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; x &#2324;&#2352; y &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; (HCF) 15 &#2361;&#2376;, &#2340;&#2379; 36x<sup>2</sup> - 81y<sup>2</sup> &#2324;&#2352; 81x<sup>2</sup> - 9y<sup>2</sup> &#2325;&#2366; HCF _____ &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">135</span><span class=\"hqt\" style=\"display:none\">135</span>",
      "<span class=\"eqt\">120</span><span class=\"hqt\" style=\"display:none\">120</span>",
      "<span class=\"eqt\">180</span><span class=\"hqt\" style=\"display:none\">180</span>",
      "<span class=\"eqt\">90</span><span class=\"hqt\" style=\"display:none\">90</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>36x<sup>2</sup> -  81y<sup>2</sup> = 9[(2x)<sup>2</sup> - (3y)<sup>2</sup>] = 9*(2x+3y)*(2x-3y)</p><p>81x<sup>2</sup> -  9y<sup>2</sup>= 9[(3x)<sup>2</sup> - y<sup>2</sup>] = 9*(3x+y)*(3x-y)</p><p>HCF of x and y is 15.</p><p>HCF of 36x<sup>2</sup> -  81y<sup>2</sup> and 81x<sup>2</sup> -  9y<sup>2</sup>= 9*15*15</p><p>HCF of 36x<sup>2</sup> -  81y<sup>2</sup> and 81x<sup>2</sup> -  9y<sup>2</sup> is divisible by 135.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Find the greatest number that will divide 49, 147 and 322 to leave the same remainder in each case.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2360;&#2375; 49, 147 &#2324;&#2352; 322 &#2325;&#2379; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2358;&#2375;&#2359;&#2347;&#2354; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>We know that:</b> If two or more numbers give the same remainder when divided by some other number, then their difference must give a remainder of zero when divided by that number.</p><p>So,</p><p>Greatest number that will divide 49, 147 and 322 to leave the same remainder in each case = HCF of (147  -  49), (322  -  49), and (322  -  147)</p><p>= HCF of 98, 273, and 175</p><p>98 = 2 * 7<sup>2</sup></p><p>273 = 3 * 7 * 13</p><p>175 = 5<sup>2</sup> * 7</p><p>HCF of 98, 273, and 175 = 7</p><p>Hence, required number = 7</p>",
    "question_index": 7
