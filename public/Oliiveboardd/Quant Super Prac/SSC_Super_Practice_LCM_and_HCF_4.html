<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If A, B, and C are coprime numbers then which of the following is true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A, B &#2324;&#2352; C &#2360;&#2361;&#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">HCF of (A, BC) = A</span><span class=\"hqt\" style=\"display:none\">(A, BC) &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; (HCF) = A</span>",
      "<span class=\"eqt\">HCF of (A, BC) = 1</span><span class=\"hqt\" style=\"display:none\">(A, BC) &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; (HCF) = 1</span>",
      "<span class=\"eqt\">HCF of (B, AC) = A</span><span class=\"hqt\" style=\"display:none\">(B, AC) &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; (HCF) = A</span>",
      "<span class=\"eqt\">HCF of (B, AC) = B</span><span class=\"hqt\" style=\"display:none\">(B, AC) &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; (HCF) = B</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let A = 3, B = 5, and C = 7,</p><p>Now HCF of (A, BC) = HCF of (3, 35) = 1</p><p>HCF of (B, AC) = HCF of (5, 21) = 1</p><p>Hence option b is true.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Let the HCF of X and Y be 'M' and let Y = MN. LCM of X and Y is given by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2366; &#2325;&#2367; X &#2324;&#2352; Y &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; (HCF) 'M' &#2361;&#2376; &#2324;&#2352; Y = MN &#2361;&#2376;&#2404; X &#2324;&#2352; Y &#2325;&#2366; &#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2351; (LCM) &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">XN</span><span class=\"hqt\" style=\"display:none\">XN</span>",
      "<span class=\"eqt\">MN</span><span class=\"hqt\" style=\"display:none\">MN</span>",
      "<span class=\"eqt\">YN</span><span class=\"hqt\" style=\"display:none\">YN</span>",
      "<span class=\"eqt\">XY</span><span class=\"hqt\" style=\"display:none\">XY</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>We know that,</p><p>HCF * LCM = product of numbers</p><p>M * LCM = X * Y</p><p>LCM = X * MN/M</p><p>LCM = XN</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What is the H.C.F. of 95, 380, 665?</p></span><span class=\"hqt\" style=\"display:none\"><p>95, 380, 665 &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>",
      "<span class=\"eqt\">95</span><span class=\"hqt\" style=\"display:none\">95</span>",
      "<span class=\"eqt\">78</span><span class=\"hqt\" style=\"display:none\">78</span>",
      "<span class=\"eqt\">190</span><span class=\"hqt\" style=\"display:none\">190</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>95, 380, 665</p><p></p><p>95 = 19 x 5</p><p>380 = 19 x 5 x 4</p><p>665 = 19 x 7 x 5</p><p></p><p>Therefore, the H.C.F is 19 x 5 = 95</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The least number which is exactly divisible by 3, 8, 5, 12, and 4. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2379; 3, 8, 5, 12 &#2324;&#2352; 4 &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">120</span><span class=\"hqt\" style=\"display:none\">120</span>",
      "<span class=\"eqt\">100</span><span class=\"hqt\" style=\"display:none\">100</span>",
      "<span class=\"eqt\">90</span><span class=\"hqt\" style=\"display:none\">90</span>",
      "<span class=\"eqt\">150</span><span class=\"hqt\" style=\"display:none\">150</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>L.C.M of 3, 8, 5, 12, and 4 = 120</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What is the LCM of 48, 56, and 72?</p></span><span class=\"hqt\" style=\"display:none\"><p>48, 56 &#2324;&#2352; 72 &#2325;&#2366; &#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2351; (LCM) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1014</span><span class=\"hqt\" style=\"display:none\">1014</span>",
      "<span class=\"eqt\">1012</span><span class=\"hqt\" style=\"display:none\">1012</span>",
      "<span class=\"eqt\">1010</span><span class=\"hqt\" style=\"display:none\">1010</span>",
      "<span class=\"eqt\">1008</span><span class=\"hqt\" style=\"display:none\">1008</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Multiple of 48 = 2 * 2 * 2 * 2 * 3</p><p>Multiple of 56 = 2 * 2 * 2 * 7</p><p>Multiple of 72 = 2 * 2 * 2 * 3 * 3</p><p>LCM of 48 , 56 and 72 = 2 * 2 * 2 * 3 * 2 * 7 * 3 = 1008</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;What is the Least Common Multiple <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>8</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>7</span></div> , <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>9</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>14</span></div> , and <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>16</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>7</span></div> &quest;&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;-</p><p><div><div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>8</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>7</span></div> , <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>9</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>14</span></div> , and <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>16</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>7</span></div></div></p></span>",
    "options": [
      "<span class=\"eqt\">144/7</span><span class=\"hqt\" style=\"display:none\">144/7</span>",
      "<span class=\"eqt\">72/7</span><span class=\"hqt\" style=\"display:none\">72/7</span>",
      "<span class=\"eqt\">288/7</span><span class=\"hqt\" style=\"display:none\">288/7</span>",
      "<span class=\"eqt\">48/7</span><span class=\"hqt\" style=\"display:none\">48/7</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Least Common Multiple 8/7, 9/14, and 16/7 = (LCM of 8, 9, and 16)/(HCF of 7, 14) = 144/7</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The product of the smallest common multiple and the biggest common factor of 45, 90, 120, and 150 is: </p></span><span class=\"hqt\" style=\"display:none\"><p>45, 90, 120 &#2324;&#2352; 150 &#2325;&#2375; &#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2351; &#2324;&#2352; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; &#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">9000</span><span class=\"hqt\" style=\"display:none\">9000</span>",
      "<span class=\"eqt\">27000</span><span class=\"hqt\" style=\"display:none\">27000</span>",
      "<span class=\"eqt\">90000</span><span class=\"hqt\" style=\"display:none\">90000</span>",
      "<span class=\"eqt\">2700</span><span class=\"hqt\" style=\"display:none\">2700</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Smallest common multiple (L.C.M) of 45, 90, 120, and 150 = 1800 </p><p>Biggest common factor (H.C.F) of 45, 90, 120, and 150 = 15 </p><p>Hence, the product of L.C.M and H.C.F = 1800 * 15 = 27000 </p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If LCM and HCF of two numbers is 576 and 8 respectively and their sum is 136. Find the smallest number.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; &#2324;&#2352; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 576 &#2324;&#2352; 8 &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; 136 &#2361;&#2376;&#2404; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">72</span><span class=\"hqt\" style=\"display:none\">72</span>",
      "<span class=\"eqt\">64</span><span class=\"hqt\" style=\"display:none\">64</span>",
      "<span class=\"eqt\">56</span><span class=\"hqt\" style=\"display:none\">56</span>",
      "<span class=\"eqt\">40</span><span class=\"hqt\" style=\"display:none\">40</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let numbers are '8a' and '8b' (a and b are co-prime and a &gt; b).</p><p>LCM of 8a and 8b = 8ab = 576</p><p>ab = 72 .... (1)</p><p>Sum = 8a + 8b = 136</p><p>(a + b) = 17 .... (2)</p><p>From (1) and (2):</p><p>a = 9 and b = 8</p><p>Smallest number = 8b = 64</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The least number which when divided by 18, 12, 16 and 24 leaves remainder 6 in each case is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2331;&#2379;&#2335;&#2368; &#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2367;&#2360;&#2375; 18, 12, 16 &#2324;&#2352; 24 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; 6 &#2358;&#2375;&#2359;&#2347;&#2354; &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2357;&#2361; &#2361;&#2376; :</p></span>",
    "options": [
      "<span class=\"eqt\">132</span><span class=\"hqt\" style=\"display:none\">132</span>",
      "<span class=\"eqt\">144</span><span class=\"hqt\" style=\"display:none\">144</span>",
      "<span class=\"eqt\">150</span><span class=\"hqt\" style=\"display:none\">150</span>",
      "<span class=\"eqt\">156</span><span class=\"hqt\" style=\"display:none\">156</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Least number which when divided by 18, 12, 16 and 24 leaves remainder 6 in each case = LCM of 18, 12, 16 and 24 + Common remainder</p><p>LCM of 18, 12, 16 and 24 = 144</p><p>Common remainder = 6</p><p>Required number = 144 + 6</p><p>= 150</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Ratio of LCM of two numbers to the HCF of same numbers is 42: 1. The difference between the LCM and HCF is 738. If one number is 108, then what is the other number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2351; (LCM) &#2324;&#2352; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; (HCF) &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 42: 1 &#2361;&#2376;&#2404; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2351; &#2324;&#2352; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 738 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2361;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 108 &#2361;&#2376;, &#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">84</span><span class=\"hqt\" style=\"display:none\">84</span>",
