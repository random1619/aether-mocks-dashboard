<body>

                <!-- Controls -->

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Mohit invested total of Rs.36000 in two different schemes A and B for 3 years. Scheme A offers 40% rate of simple interest while the scheme B offers 20% compound rate of interest. Amount of interest received from scheme B is Rs.180 more than that received from scheme A, then amount invested in scheme B is how much more than that invested in scheme A?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2379;&#2361;&#2367;&#2340; &#2344;&#2375; 3 &#2360;&#2366;&#2354; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2379; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; A &#2324;&#2352; B &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; 36000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2351;&#2379;&#2332;&#2344;&#2366; A 40% &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2351;&#2379;&#2332;&#2344;&#2366; B 20% &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2379;&#2332;&#2344;&#2366; B &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2348;&#2381;&#2351;&#2366;&#2332; &#2352;&#2366;&#2358;&#2367; &#2351;&#2379;&#2332;&#2344;&#2366; A &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2348;&#2381;&#2351;&#2366;&#2332; &#2352;&#2366;&#2358;&#2367; &#2360;&#2375; 180 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2351;&#2379;&#2332;&#2344;&#2366; B &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2352;&#2366;&#2358;&#2367; &#2351;&#2379;&#2332;&#2344;&#2366; A &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2352;&#2366;&#2358;&#2367; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.9000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.9000</span>",
      "<span class=\"eqt\">Rs.7500</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.7500</span>",
      "<span class=\"eqt\">Rs.10500</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.10500</span>",
      "<span class=\"eqt\">Rs.8000</span><span class=\"hqt\" style=\"display:none\">8000</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let amount invested in scheme A and B is (36000  -  100x) and '100x' respectively.</p><p>Interest from scheme A = [{(36000  -  100x) * 40 * 3}/100] = (43200  -  120x)</p><p>Interest from scheme B = 100x * [(1.2)<sup>3</sup>  -  1] = 72.8x</p><p>According to the question:</p><p>72.8x  -  (43200  -  120x) = 180</p><p>192.8x = 43380</p><p>x = 225</p><p>Amount invested in scheme A = 36000  -  100x = Rs.13500</p><p>Amount invested in scheme B = 100x = Rs.22500</p><p>Required difference = 22500  -  13500 = Rs.9000</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A sum of Rs. 16200 at a certain rate of interest for 3 years in simple interest is amounted to Rs. 25920. If same sum of money is invested at same rate of interest compounded annually for two years, then what is compound interest earned?</p></span><span class=\"hqt\" style=\"display:none\"><p>16200 &#2352;&#2369;&#2346;&#2319; &#2325;&#2368; &#2319;&#2325; &#2352;&#2366;&#2358;&#2367; &#2325;&#2379; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; 25920 &#2352;&#2369;&#2346;&#2319; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2350;&#2366;&#2344; &#2352;&#2366;&#2358;&#2367; &#2325;&#2379; &#2342;&#2379; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2366;&#2344; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 7112</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 7112</span>",
      "<span class=\"eqt\">Rs. 7224</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 7224</span>",
      "<span class=\"eqt\">Rs. 7336</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 7336</span>",
      "<span class=\"eqt\">Rs. 7128</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 7128</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let R% be the rate of interest</p><p>SI = (16200 * R * 3)/100</p><p>=&gt; (25920  -  16200) = 486R</p><p>=&gt; R = 9720/486</p><p>=&gt; R = 20%</p><p>So, CI = 16200 * [(1 + 20/100)<sup>2</sup>  -  1] = 16200 * 0.44 = Rs. 7128</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A certain sum invested for 3 years at a rate of simple interest of 5% per annum gives Rs.2400 as interest. What will be the extra interest received if the interest is compounded annually:</p></span><span class=\"hqt\" style=\"display:none\"><p>5% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 2400 &#2352;&#2369;&#2346;&#2351;&#2375; &#2348;&#2381;&#2351;&#2366;&#2332; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379; &#2340;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.132</span><span class=\"hqt\" style=\"display:none\">132</span>",
      "<span class=\"eqt\">Rs.112</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.112</span>",
      "<span class=\"eqt\">Rs.152</span><span class=\"hqt\" style=\"display:none\">152</span>",
      "<span class=\"eqt\">Rs.122</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.122</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=255 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20434/image020.png\"></p><p>Hence the Sum = Rs.16000</p><p><img width=501 height=44 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20434/image021.png\"></p><p>Hence, the extra interest received if the interest is compounded annually = 2522  -  2400 = <b>Rs.122</b></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Compound interest on a sum at R% per annum for 2 years is 11% more than the simple interest on same sum at same rate of interest in same period. What is the value of R?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; R% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 2 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332;, &#2360;&#2350;&#2366;&#2344; &#2309;&#2357;&#2343;&#2367; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2360;&#2350;&#2366;&#2344; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2360;&#2375; 11% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; R &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Simple interest = sum * rate * time/100 = sum * R * 2/100 = sum * (2R/100)</p><p>Compound interest = sum * ((1 + rate/100)<sup>time </sup> -  1) = sum * ((1 + R/100)<sup>2</sup>  -  1) = sum * R(200 + R)/10000</p><p>Then, sum * R(200 + R)/10000 = (100 + 11)/100 * sum * (2R/100)</p><p>200 + R = 222</p><p><b>R = 22</b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the interest earned after 2 years on a sum of &#8377;9375 at 40% rate of interest per annum compounded half yearly.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#8377;9375 &#2325;&#2368; &#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 40% &#2346;&#2381;&#2352;&#2340;&#2367;&#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2309;&#2352;&#2381;&#2343;&#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; 2 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2348;&#2381;&#2351;&#2366;&#2332; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;8490</span><span class=\"hqt\" style=\"display:none\">&#8377;8490</span>",
      "<span class=\"eqt\">&#8377;10065</span><span class=\"hqt\" style=\"display:none\">&#8377;10065</span>",
      "<span class=\"eqt\">&#8377;12934</span><span class=\"hqt\" style=\"display:none\">&#8377;12934</span>",
      "<span class=\"eqt\">&#8377;7680</span><span class=\"hqt\" style=\"display:none\">&#8377;7680</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Since the sum is compounded half-yearly, then-</p><p>Compound interest = <img width=304 height=49 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21824/image040.png\"></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A sum 'P' amounts to &#8377;15972 in 9 months at the rate of 40% per annum compounded quarterly. Find the value of P.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2352;&#2366;&#2358;&#2367; 'P' 40% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2340;&#2367;&#2350;&#2366;&#2361;&#2368; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; 9 &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#8377;15972 &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; P &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;11500</span><span class=\"hqt\" style=\"display:none\">&#8377;11500</span>",
      "<span class=\"eqt\">&#8377;13800</span><span class=\"hqt\" style=\"display:none\">&#8377;13800</span>",
      "<span class=\"eqt\">&#8377;12000</span><span class=\"hqt\" style=\"display:none\">&#8377;12000</span>",
      "<span class=\"eqt\">&#8377;14000</span><span class=\"hqt\" style=\"display:none\">&#8377;14000</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Since the sum is compounded quarterly, then-</p><p><img width=152 height=49 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21824/image043.png\"></p><p>P = 15972000/1331</p><p>P = &#8377;12000</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>What is the difference between the compound interest and simple interest obtained on Rs. 42000 at 10% for 3 years. </p></span><span class=\"hqt\" style=\"display:none\"><p>42000 &#2352;&#2369;&#2346;&#2319; &#2346;&#2352; 3 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; 10% &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2324;&#2352; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2381;&#2351;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 1283</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1283</span>",
      "<span class=\"eqt\">Rs. 1292</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1292</span>",
      "<span class=\"eqt\">Rs. 1280</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1280</span>",
      "<span class=\"eqt\">Rs. 1302</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1302</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Difference between CI and SI after 3 years = P(r/100)<sup>2</sup> * (300 + r)/100</p><p>=&gt; 42000 (10/100)<sup>2</sup> * (300 + 10)/100</p><p>=&gt; 42000 * 1/100 * 310/100 = Rs. 1302</p>",
    "question_index": 6

    "question": "<span class=\"eqt\"><p>A certain sum amounts to Rs.470.4 in 2 years and to Rs.499.8 in 3 years on compound annually. How much will be the simple interest (in Rs.) on Rs.24000 at the same rate for 4 years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; 2 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2369;.470.4 &#2324;&#2352; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2369;.499.8 &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2352;&#2369;.24000 &#2325;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; &#2360;&#2350;&#2366;&#2344; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; 4 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; (&#2352;&#2369;. &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
