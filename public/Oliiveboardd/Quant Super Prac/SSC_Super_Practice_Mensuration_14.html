<body>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Area of base of cone is 64&#960; cm<sup>2</sup> and length of slant height of the cone is 14 cm. Find the lateral surface area of the cone.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 64&#960; cm<sup>2 </sup>&#2361;&#2376; &#2324;&#2352; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2340;&#2367;&#2352;&#2381;&#2351;&#2325; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 14 cm &#2361;&#2376;, &#2340;&#2379; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">374 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">374 cm<sup>2</sup></span>",
      "<span class=\"eqt\">275 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">275 cm<sup>2</sup></span>",
      "<span class=\"eqt\">253 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">253 cm<sup>2</sup></span>",
      "<span class=\"eqt\">352 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">352 cm<sup>2</sup></span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let radius of base of cone = 'r' cm</p><p>Area of base = &#960;r<sup>2</sup></p><p>64&#960; = &#960;r<sup>2</sup></p><p>r = 8 cm</p><p>Slant height = l = 14 cm</p><p>Lateral surface area of cone = &#960;rl</p><p>= (22/7) * 8 * 14</p><p>= 352 cm<sup>2</sup></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p> The volume of a solid right circular cone is 600&pi; cm <sup>3</sup> , and the diameter of its base is 30 cm. The total surface area (in cm <sup>2</sup> ) of the cone is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2336;&#2379;&#2360; &#2354;&#2306;&#2348; &#2357;&#2352;&#2381;&#2340;&#2381;&#2340;&#2369;&#2354; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 600&#960; &#2360;&#2375;&#2350;&#2368;<sup>3 </sup>&#2361;&#2376;, &#2324;&#2352; &#2311;&#2360;&#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; 30 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2340;&#2379;, &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (&#2360;&#2375;&#2350;&#2368;<sup>2 </sup>&#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">496&pi;</span><span class=\"hqt\" style=\"display:none\">496&#960;</span>",
      "<span class=\"eqt\">480&pi;</span><span class=\"hqt\" style=\"display:none\">480&#960;</span>",
      "<span class=\"eqt\">255&pi;</span><span class=\"hqt\" style=\"display:none\">255&#960;</span>",
      "<span class=\"eqt\">472&pi;</span><span class=\"hqt\" style=\"display:none\">472&#960;</span>"
    ],
    "correct_option_id": 1,
    "solution": "\"<p> <img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/1d3efe864cf27ebd3041efbd0404a45b.png\" /> </p>\"",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The base radius of a cone and its slant height are in the ratio of 3: 7. If the lateral surface area of cone is 3234 cm<sup>2</sup>, then find the difference between its base radius and slant height.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; &#2313;&#2360;&#2325;&#2368; &#2340;&#2367;&#2352;&#2381;&#2351;&#2325; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3:7 &#2361;&#2376;&#2404;&#2351;&#2342;&#2367; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 3234cm<sup>2</sup> &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; &#2340;&#2367;&#2352;&#2381;&#2351;&#2325; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">24 cm</span><span class=\"hqt\" style=\"display:none\">24 cm</span>",
      "<span class=\"eqt\">26 cm</span><span class=\"hqt\" style=\"display:none\">26 cm</span>",
      "<span class=\"eqt\">22 cm</span><span class=\"hqt\" style=\"display:none\">22 cm</span>",
      "<span class=\"eqt\">28 cm</span><span class=\"hqt\" style=\"display:none\">28 cm</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the base radius of cone be 3x cm and its slant height be 7x cm.</p><p>Given,</p><p>Lateral surface area = 3234 cm<sup>2</sup></p><p>&#928; * r * l = 3234</p><p>(22/7) * 3x * 7x = 3234</p><p>x<sup>2</sup> = 3234 * 7/ (21 * 22)</p><p>x = &radic;49 = 7 cm</p><p>Required difference = 7x  -  3x = 4x = 4 * 7 = 28 cm</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Find the total surface area (in sq. cm) of a cone if the base radius of cone is 7/2 cm and slant height of the cone is 4 cm.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 7/2 cm &#2361;&#2376; &#2324;&#2352; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2340;&#2367;&#2352;&#2381;&#2351;&#2325; &#2314;&#2305;&#2330;&#2366;&#2312; 4 cm &#2361;&#2376;, &#2340;&#2379; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (sq. cm &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">82.5</span><span class=\"hqt\" style=\"display:none\">82.5</span>",
      "<span class=\"eqt\">76.5</span><span class=\"hqt\" style=\"display:none\">76.5</span>",
      "<span class=\"eqt\">88.4</span><span class=\"hqt\" style=\"display:none\">88.4</span>",
      "<span class=\"eqt\">105.2</span><span class=\"hqt\" style=\"display:none\">105.2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Total surface area = &#960; * r * (l + r)</p><p>= (22/7) * (7/2) * [4 + (7/2)]</p><p>= 11 * 15/2</p><p>= 82.5 cm<sup>2</sup></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The length of a cylindrical wire is 200 m. If the volume of the wire is 3.08 m<sup>3</sup>, then find the radius of the wire.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2375;&#2354;&#2344;&#2366;&#2325;&#2366;&#2352; &#2340;&#2366;&#2352; &#2325;&#2368; &#2354;&#2350;&#2381;&#2348;&#2366;&#2312; 200 m &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2340;&#2366;&#2352; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 3.08 m<sup>3 </sup>&#2361;&#2376;, &#2340;&#2379; &#2340;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">7 cm</span><span class=\"hqt\" style=\"display:none\">7 cm</span>",
      "<span class=\"eqt\">14 cm</span><span class=\"hqt\" style=\"display:none\">14 cm</span>",
      "<span class=\"eqt\">9 cm</span><span class=\"hqt\" style=\"display:none\">9 cm</span>",
      "<span class=\"eqt\">21 cm</span><span class=\"hqt\" style=\"display:none\">21 cm</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>h = 200m</p><p>Volume of the cylindrical wire = 3.08 m<sup>3</sup></p><p>&#928;r<sup>2</sup>h = 3.08 m<sup>3</sup></p><p><img width=23 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21013/image004.png\"> * r<sup>2</sup> * 200 = 3.08</p><p>r<sup>2</sup> = <img width=63 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21013/image005.png\"></p><p>r<sup>2</sup> = <img width=69 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21013/image006.png\"></p><p>r = <img width=31 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21013/image007.png\"> m</p><p>r = 7 cm</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A solid cube of side 11 cm is melted and casted into a solid cylinder of height 3.5 cm. Find the radius of cylinder.</p></span><span class=\"hqt\" style=\"display:none\"><p>11 cm &#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2336;&#2379;&#2360; &#2328;&#2344; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352; 3.5 cm &#2314;&#2305;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2336;&#2379;&#2360; &#2348;&#2375;&#2354;&#2344; &#2350;&#2375;&#2306; &#2338;&#2366;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">11 cm</span><span class=\"hqt\" style=\"display:none\">11 cm</span>",
      "<span class=\"eqt\">10.5 cm</span><span class=\"hqt\" style=\"display:none\">10.5 cm</span>",
      "<span class=\"eqt\">14 cm</span><span class=\"hqt\" style=\"display:none\">14 cm</span>",
      "<span class=\"eqt\">5.5 cm</span><span class=\"hqt\" style=\"display:none\">5.5 cm</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Volume of cube = Volume of cylinder</p><p>a<sup>3</sup> = &#960;r<sup>2</sup>h</p><p>11<sup>3</sup> = (22/7) * r<sup>2</sup> * 3.5</p><p>r<sup>2</sup> = 121</p><p>r = 11 cm</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The volume of a cylinder is 138600 cm<sup>2</sup> and its height is 25 cm, then find the radius of the base of the cylinder?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 138600 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 25 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2375;&#2354;&#2344; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">28 cm</span><span class=\"hqt\" style=\"display:none\">28 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">44 cm</span><span class=\"hqt\" style=\"display:none\">44 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">42 cm</span><span class=\"hqt\" style=\"display:none\">42 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">35 cm</span><span class=\"hqt\" style=\"display:none\">35 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The volume of a cylinder is 138600 cm<sup>2</sup></p><p>=&gt; 22/7 * r<sup>2</sup> * 25 = 138600</p><p>=&gt; r<sup>2</sup> = 1764</p><p>=&gt; r = 42 cm</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A largest possible cone is cut out from a cube of volume 1331 cm<sup>3</sup>. The volume of the cone is :</p></span><span class=\"hqt\" style=\"display:none\"><p>1331 &#2328;&#2344; &#2360;&#2375;&#2350;&#2368; &#2325;&#2375; &#2328;&#2344; &#2360;&#2375; &#2319;&#2325; &#2360;&#2306;&#2349;&#2357; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366;&#2335;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">380 cu cm</span><span class=\"hqt\" style=\"display:none\">380 &#2328;&#2344; &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">348.6 cu cm</span><span class=\"hqt\" style=\"display:none\">348.6 &#2328;&#2344; &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">369.1 cu cm</span><span class=\"hqt\" style=\"display:none\">36 9 .1 &#2328;&#2344; &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">396.1 cu cm</span><span class=\"hqt\" style=\"display:none\">3 9 6.1 &#2328;&#2344; &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Volume = 1331 cm<sup>3</sup> = a<sup>3</sup>, therefore each edge a = 11 cm</p><p>The radius of the base of the cone = 11/2 = 5.5</p><p>Height of cone=11</p><p>Volume = (1/3) x (22/7) x (5.5) x (5.5) x (11) = 348.6 cu cm</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Find the total surface area (in sq. cm) of a cylinder whose base radius and height are 4.8 cm and 10.2 cm respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (sq. cm &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 4.8 cm &#2324;&#2352; 10.2 cm &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">192&#960;</span><span class=\"hqt\" style=\"display:none\">192&#960;</span>",
      "<span class=\"eqt\">144&#960;</span><span class=\"hqt\" style=\"display:none\">144&#960;</span>",
      "<span class=\"eqt\">168&#960;</span><span class=\"hqt\" style=\"display:none\">168&#960;</span>",
      "<span class=\"eqt\">154&#960;</span><span class=\"hqt\" style=\"display:none\">154&#960;</span>"
