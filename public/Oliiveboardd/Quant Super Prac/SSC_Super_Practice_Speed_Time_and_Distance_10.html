<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A man travels at the speed of 12 km/h on foot and 36 km/hr on bike. If he covered 240 km distance in 12 hours, then find the time taken by him on bike.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2346;&#2376;&#2342;&#2354; 12 km/h &#2324;&#2352; &#2348;&#2366;&#2311;&#2325; &#2346;&#2352; 36 km/h &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; 12 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 240 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2366;&#2311;&#2325; &#2346;&#2352; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5 hours</span><span class=\"hqt\" style=\"display:none\">5 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">8 hours</span><span class=\"hqt\" style=\"display:none\">8 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">7 hours</span><span class=\"hqt\" style=\"display:none\">7 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">4 hours</span><span class=\"hqt\" style=\"display:none\">4 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the time taken on the bike be 't' hours.</p><p>According to question,</p><p>36 * t + (12  -  t) * 12 = 240 </p><p>=&gt; 36t + 144  -  12t = 240 </p><p>=&gt; 24t = 96 </p><p>=&gt; t = 4 </p><p>Hence, the required time is 4 hours.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If a man is walking at 9/7<sup>th</sup> of his normal speed, and reaches 12 minutes early, then find the normal time taken by him to cover the same distance.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2309;&#2346;&#2344;&#2368; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2330;&#2366;&#2354; &#2325;&#2375; 9/7&#2357;&#2375;&#2306; &#2349;&#2366;&#2327; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2352;&#2361;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2346;&#2344;&#2375; &#2327;&#2306;&#2340;&#2357;&#2381;&#2351; &#2346;&#2352; 12 &#2350;&#2367;&#2344;&#2335; &#2346;&#2361;&#2354;&#2375; &#2346;&#2361;&#2369;&#2305;&#2330; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">42 minutes</span><span class=\"hqt\" style=\"display:none\">42 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">54 minutes</span><span class=\"hqt\" style=\"display:none\">54 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">48 minutes</span><span class=\"hqt\" style=\"display:none\">48 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">60 minutes</span><span class=\"hqt\" style=\"display:none\">60 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=211 height=81 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24743/image002.jpg\"></p><p>Hence, the required time = 9 * 6 = 54 minutes </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Two persons are 342 km apart, where one is at point A and the other is at point B. They start travelling in the same direction with speeds of 82 km/hr and 64 km/hr respectively. When the two persons cross each other, the estimated time will be: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; 342 km &#2342;&#2370;&#2352; &#2361;&#2376;&#2306;, &#2332;&#2361;&#2366;&#2305; &#2346;&#2361;&#2354;&#2366; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2367;&#2306;&#2342;&#2369; A &#2346;&#2352; &#2361;&#2376; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2366; &#2348;&#2367;&#2306;&#2342;&#2369; B &#2346;&#2352; &#2361;&#2376;&#2404; &#2357;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 82 km/hr &#2324;&#2352; 64 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2360;&#2350;&#2366;&#2344; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2332;&#2348; &#2342;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2319;&#2325;-&#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2346;&#2366;&#2352; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2360;&#2350;&#2351; &#2361;&#2379;&#2327;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">19.5 hours</span><span class=\"hqt\" style=\"display:none\">19.5 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">19 hours</span><span class=\"hqt\" style=\"display:none\">19 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">18 hours</span><span class=\"hqt\" style=\"display:none\">18 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">18.5 hours</span><span class=\"hqt\" style=\"display:none\">18.5 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Time = Distance/ Speed </p><p>= 342/ (82 - 64) [Moving in same directions, subtract the speed]</p><p>= 342/18 hours</p><p>= 19 hours</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A motor car does a journey in 39 hrs, the first half at 30 km/hr and the second half at 35 km/hr. Find the distance.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2350;&#2379;&#2335;&#2352; &#2325;&#2366;&#2352; 39 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2319;&#2325; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2346;&#2361;&#2354;&#2375; &#2310;&#2343;&#2375; &#2349;&#2366;&#2327; &#2325;&#2379; 30 km/hr &#2340;&#2341;&#2366; &#2342;&#2370;&#2360;&#2352;&#2375; &#2310;&#2343;&#2375; &#2349;&#2366;&#2327; &#2325;&#2379; 35 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2342;&#2370;&#2352;&#2368; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1370 Km</span><span class=\"hqt\" style=\"display:none\">1370 Km</span>",
      "<span class=\"eqt\">1180 Km</span><span class=\"hqt\" style=\"display:none\">1180 Km</span>",
      "<span class=\"eqt\">1260 Km</span><span class=\"hqt\" style=\"display:none\">1260 Km</span>",
      "<span class=\"eqt\">1155 Km</span><span class=\"hqt\" style=\"display:none\">1155 Km</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the distance = X km</p><p>Then X/2 km is travelled at a speed of 30 km/hr and X/2 km at a speed of 35 km/hr.</p><p>Then time taken to travel the whole journey = [X/(2*30)] + [X/(2*35)] = 39 hrs</p><p>(X/60) + (X/70) = 39</p><p>13X/420 = 39</p><p>X = 39*420/13 = 1260 Km</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Nikhil travelled at 50 km/h from his home to hospital by bus and returns at 20 km/h from hospital to his home by auto. If he covers the whole journey in 105 minutes, then find the distance between his home to hospital.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2326;&#2367;&#2354; &#2309;&#2346;&#2344;&#2375; &#2328;&#2352; &#2360;&#2375; &#2309;&#2360;&#2381;&#2346;&#2340;&#2366;&#2354; &#2340;&#2325; 50 km/h &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2348;&#2360; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2360;&#2381;&#2346;&#2340;&#2366;&#2354; &#2360;&#2375; &#2309;&#2346;&#2344;&#2375; &#2328;&#2352; &#2340;&#2325; 20 km/h &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2321;&#2335;&#2379; &#2360;&#2375; &#2357;&#2366;&#2346;&#2360; &#2354;&#2380;&#2335;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; &#2346;&#2370;&#2352;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; 105 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2375; &#2328;&#2352; &#2360;&#2375; &#2309;&#2360;&#2381;&#2346;&#2340;&#2366;&#2354; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">15 km</span><span class=\"hqt\" style=\"display:none\">15 km</span>",
      "<span class=\"eqt\">20 km</span><span class=\"hqt\" style=\"display:none\">20 km</span>",
      "<span class=\"eqt\">40 km</span><span class=\"hqt\" style=\"display:none\">40 km</span>",
      "<span class=\"eqt\">25 km</span><span class=\"hqt\" style=\"display:none\">25 km</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the distance between his home to hospital = d</p><p>d/50 + d/20 = 105/60</p><p>7d/100 = 7/4</p><p>d = 25 km</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Ratio of speed of Car to Bike is 7 : 3. If a Bike can cover 135 km in 9 hours, then find the time taken by Car to cover 525 km.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2366;&#2352; &#2324;&#2352; &#2319;&#2325; &#2348;&#2366;&#2311;&#2325; &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 7: 3 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2348;&#2366;&#2311;&#2325; 135 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 9 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 525 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">12 hours</span><span class=\"hqt\" style=\"display:none\">12 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">20 hours</span><span class=\"hqt\" style=\"display:none\">20 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">16 hours</span><span class=\"hqt\" style=\"display:none\">16 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">15 hours</span><span class=\"hqt\" style=\"display:none\">15 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the speed of Car and Bike be 7x km/hr and 3x km/hr respectively,</p><p>Speed of Bike = 135/9 = 15 km/hr</p><p>According to question,</p><p>3x = 15</p><p>=> 7x = 35 km/hr</p><p>Required time = 525/35 = 15 hours</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>A car covers 560 km in 16 hours. Find the distance covered by car in 8 hours when speed of car got increased by 20%.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2366;&#2352; 16 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 560 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2366;&#2352; &#2325;&#2368; &#2330;&#2366;&#2354; &#2350;&#2375;&#2306; 20% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; 8 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2351; &#2325;&#2368; &#2327;&#2312; &#2342;&#2370;&#2352;&#2368; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">336 km</span><span class=\"hqt\" style=\"display:none\">336 km</span>",
      "<span class=\"eqt\">430 km</span><span class=\"hqt\" style=\"display:none\">430 km</span>",
      "<span class=\"eqt\">328 km</span><span class=\"hqt\" style=\"display:none\">328 km</span>",
      "<span class=\"eqt\">408 km</span><span class=\"hqt\" style=\"display:none\">408 km</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Speed of car = 560/16 = 35 km/hr</p><p>Speed of car after increase = 35 * 120/100 = 42 km/hr</p><p>Distance covered in 8 hours = 8 * 42 = 336 km</p>",
    "question_index": 6
  },
  {

    "question": "<span class=\"eqt\"><p>Mohana and Rohan start travelling by their bikes simultaneously from place O to place P at the speed of 24 km/h and 36 km/hr, respectively. Rohan and Mohan reach the place P in T hours and (T + 1.6) hours, respectively. What is the distance between the place O and place P?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2379;&#2361;&#2344; &#2324;&#2352; &#2352;&#2379;&#2361;&#2344; &#2309;&#2346;&#2344;&#2368; &#2348;&#2366;&#2311;&#2325; &#2360;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 24 km/h &#2324;&#2352; 36 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; O &#2360;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; P &#2340;&#2325; &#2319;&#2325; &#2360;&#2366;&#2341; (&#2360;&#2350;&#2366;&#2344; &#2360;&#2350;&#2351; &#2346;&#2352;) &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2352;&#2379;&#2361;&#2344; &#2324;&#2352; &#2350;&#2379;&#2361;&#2344; &#2360;&#2381;&#2341;&#2366;&#2344; P &#2346;&#2352; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; T &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; (T + 1.6) &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2346;&#2361;&#2369;&#2305;&#2330;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2360;&#2381;&#2341;&#2366;&#2344; O &#2324;&#2352; &#2360;&#2381;&#2341;&#2366;&#2344; P &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Dheeraj covers 2/3<sup>th</sup> of distance at the rate of 5km/hr and the rest of the distance at 8km/hr, and manages to cover the overall distance in 7 hours. Find the total distance covered by Dheeraj?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2343;&#2368;&#2352;&#2332; &#2344;&#2375; &#2342;&#2370;&#2352;&#2368; &#2325;&#2375; 2/3 &#2349;&#2366;&#2327; &#2325;&#2379; 5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2324;&#2352; &#2358;&#2375;&#2359; &#2342;&#2370;&#2352;&#2368; &#2325;&#2379; 8 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2340;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; 7 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2342;&#2370;&#2352;&#2368; &#2325;&#2379; &#2340;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2343;&#2368;&#2352;&#2332; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2351; &#2325;&#2368; &#2327;&#2312; &#2325;&#2369;&#2354; &#2342;&#2370;&#2352;&#2368; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;?</p></span>",

    "solution": "<p>Let the distance between A and B be 'd' km and the distance at which they meet be 'n' km from A.</p><p>Time taken by boy till they meet = time taken by girl till they meet</p><p>So, n = 36 * 2 = 72 km</p><p>And (d  -  n) = 24 * 2 = 48 km</p><p>Hence, time taken by boy to cover the remaining distance, i.e., 48 km = 48/36 = 1(1/3) hrs</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p>Jia takes 50 minutes less than Pia to cover 50 km. However, if Jia reduces her speed to half of her previous speed, then she takes 1(2/3) hrs more than Pia to cover the same distance. What is the speed of Pia (in km/hr)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2367;&#2351;&#2366; &#2325;&#2379; 50 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2346;&#2367;&#2351;&#2366; &#2360;&#2375; 50 &#2350;&#2367;&#2344;&#2335; &#2325;&#2350; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2361;&#2366;&#2354;&#2366;&#2305;&#2325;&#2367;, &#2351;&#2342;&#2367; &#2332;&#2367;&#2351;&#2366; &#2309;&#2346;&#2344;&#2368; &#2327;&#2340;&#2367; &#2325;&#2379; &#2309;&#2346;&#2344;&#2368; &#2346;&#2367;&#2331;&#2354;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2310;&#2343;&#2368; &#2325;&#2352; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2375; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2346;&#2367;&#2351;&#2366; &#2360;&#2375; 1(2/3) &#2328;&#2306;&#2335;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2367;&#2351;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; (&#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>"

    "correct_option_id": 2,
    "solution": "<p>Let the speeds of Jia and Pia be '2s' km/hr and 'v' km/hr respectively.</p><p>50/v  -  50/2s = 50/60</p><p>1/v  -  1/2s = 1/60 .. (i)</p><p>Again, 50/s  -  50/v = 1(2/3) = 5/3</p><p>10/s  -  10/v = 1/3 .. (ii)</p><p>10 * (i) + (1/2) * (ii) gives</p><p>10/v  -  5/v = 1/6 + 1/6</p><p>5/v = 1/3</p><p>v = 15 km/hr</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Time taken by car A to cover 32 km is 8 min less than that taken by car B to cover the same distance. If speed of car B is increased by 36 km/h, then it takes 4 min less than car A to cover the same distance, then find the actual speed of car B.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2366;&#2352; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 32 &#2325;&#2367;&#2350;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2325;&#2366;&#2352; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2351; &#2360;&#2375; 8 &#2350;&#2367;&#2344;&#2335; &#2325;&#2350; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2366;&#2352; B &#2325;&#2368; &#2327;&#2340;&#2367; 36 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2348;&#2338;&#2364;&#2366; &#2342;&#2368; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352; A &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 4 &#2350;&#2367;&#2344;&#2335; &#2325;&#2350; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2366;&#2352; B &#2325;&#2368; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2327;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

    "correct_option_id": 2,
    "solution": "<p>Let actual speeds of cars A and B be 'a' km/h and 'b' km/h respectively.</p><p>According to the question:</p><p><img width=188 height=73 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11800/image013.png\"></p><p>From (1) and (2):</p><p><img width=149 height=81 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11800/image014.png\"></p><p>5760 = b (b + 36)</p><p>b = 60</p><p>Actual speed of car B = 60 km/h</p>",

  {
    "question": "<span class=\"eqt\"><p>A thief is noticed by a policeman from a distance of 250/3 m. The thief starts running and the policeman chases him. The thief and the policeman run at the rate of 19 km and 20 km per hour respectively. What is the distance between them after 2 minutes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2344;&#2375; 250/3 m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2360;&#2375; &#2319;&#2325; &#2330;&#2379;&#2352; &#2325;&#2379; &#2342;&#2375;&#2326;&#2366;&#2404; &#2330;&#2379;&#2352; &#2349;&#2366;&#2327;&#2344;&#2375; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2313;&#2360;&#2325;&#2366; &#2346;&#2368;&#2331;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2330;&#2379;&#2352; &#2324;&#2352; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 19 km &#2324;&#2352; 20 km &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2342;&#2380;&#2337;&#2364;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; 2 &#2350;&#2367;&#2344;&#2335; &#2348;&#2366;&#2342; &#2313;&#2344;&#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">40 m</span><span class=\"hqt\" style=\"display:none\">40 m</span>",
      "<span class=\"eqt\">50 m</span><span class=\"hqt\" style=\"display:none\">50 m</span>",
      "<span class=\"eqt\">30 m</span><span class=\"hqt\" style=\"display:none\">30 m</span>",
      "<span class=\"eqt\">60 m</span><span class=\"hqt\" style=\"display:none\">60 m</span>"

    "correct_option_id": 1,
    "solution": "<p>Relative speed = 20 - 19 = 1 kmph</p><p>Distance covered in 2 minutes = (2/60) x 1 = 1/30 km = 100/3 m</p><p>Required distance between police and thief = (250/3) - (100/3) = 150/3 = 50 m</p>",

      "<span class=\"eqt\">3 min 36 sec</span><span class=\"hqt\" style=\"display:none\">3 &#2350;&#2367;&#2344;&#2335; 36 &#2360;&#2375;&#2325;&#2306;&#2337;</span>",
