  {
    "question": "<span class=\"eqt\"><p>The inner and outer radii of a circular track are 28 m and 25 m, respectively. The cost of levelling the track at 28 per m<sup>2</sup> is:</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2335;&#2381;&#2352;&#2376;&#2325; &#2325;&#2368; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2324;&#2352; &#2348;&#2366;&#2361;&#2352;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2319;&#2305; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 28 &#2350;&#2368;&#2335;&#2352; &#2324;&#2352; 25 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2306;&#2404; 28 &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2368;<sup>2</sup> &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2335;&#2381;&#2352;&#2376;&#2325; &#2325;&#2379; &#2360;&#2350;&#2340;&#2354; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#2361;&#2376;:</span>",
    "options": [
      "<span class=\"eqt\">15421</span><span class=\"hqt\" style=\"display:none\">15421</span>",
      "<span class=\"eqt\">13992</span><span class=\"hqt\" style=\"display:none\">13992</span>",
      "<span class=\"eqt\">11229</span><span class=\"hqt\" style=\"display:none\">11229</span>",
      "<span class=\"eqt\">17355</span><span class=\"hqt\" style=\"display:none\">17355</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Inner radius of the circular track =25 m </p><p>Outer radius of the circular track = 28m </p><p>Cost of leveling the track = &#2352;28 per m<sup>2</sup></p><p>Area of a circular track=&#960;(R<sup>2</sup>-r<sup>2</sup>)</p><p>Area of the track = 22/7(28<sup>2</sup>-25<sup>2</sup>)</p><p>Area=159*22/7 m<sup>2</sup></p><p>Cost of levelling = Area x Cost</p><p>22/7 X 159x28</p><p>22 X 159 X 4=Rs.13992</p><p>:The correct answer is option (b).</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The radii of two circles are 8 cm and 15 cm.The perimeter of the circle having area equal to the sum of the areas of the two circles (in cm) is:</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2319;&#2305; 8 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 15 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;&#2379;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327; (&#2360;&#2375;&#2350;&#2368; &#2350;&#2375;&#2306;) &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2357;&#2366;&#2354;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">32&#960;</span><span class=\"hqt\" style=\"display:none\">32&#960;</span>",
      "<span class=\"eqt\">30&#960;</span><span class=\"hqt\" style=\"display:none\">30&#960;</span>",
      "<span class=\"eqt\">28&#960;</span><span class=\"hqt\" style=\"display:none\">28&#960;</span>",
      "<span class=\"eqt\">34&#960;</span><span class=\"hqt\" style=\"display:none\">34&#960;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Radius of two circles are 8 cm and 15 cm respectively.</p><p>Given that area of new circle = sum of area of both circle</p><p>So area of new circle = &#960; * 8<sup>2</sup> + &#960;*15<sup>2</sup></p><p>= &#960; *( 64+ 225)</p><p>= &#960; *(289)</p><p>So &#960; *R<sup>2</sup> = &#960;*289</p><p>So R = 17</p><p>Now perimeter = 2*&#960;*R= 2*&#960; *17 =34&#960;</p><p>Option (d) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The perimeter of a circular lawn is 1232 m. There is 7 m wide path around the lawn. The area (in m<sup>2</sup>) of the path is: (take &pi; = 22/7)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2328;&#2366;&#2360; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344; &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; 1232 m &#2361;&#2376;&#2404; &#2328;&#2366;&#2360; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; 7 m &#2330;&#2380;&#2337;&#2364;&#2366; &#2319;&#2325; &#2346;&#2341; &#2361;&#2376;&#2404; &#2346;&#2341; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (m<sup>2</sup> &#2350;&#2375;&#2306;) &#2361;&#2376;: (&#960; = 22/7 &#2354;&#2368;&#2332;&#2367;&#2319;)</p></span>",
    "options": [
      "<span class=\"eqt\">8778</span><span class=\"hqt\" style=\"display:none\">8778</span>",
      "<span class=\"eqt\">8558</span><span class=\"hqt\" style=\"display:none\">8558</span>",
      "<span class=\"eqt\">8800</span><span class=\"hqt\" style=\"display:none\">8800</span>",
      "<span class=\"eqt\">8756</span><span class=\"hqt\" style=\"display:none\">8756</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let radius of circular lawn = 'R' m</p><p>Perimeter of circular lawn = 2&#960;R = 1232</p><p><img width=117 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19954/image062.png\"></p><p>R = 196 m</p><p>Area of path = Area of lawn with path  -  Area of lawn without path</p><p><img width=141 height=27 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19954/image063.png\"></p><p><img width=127 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19954/image064.png\"></p><p><img width=209 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19954/image065.png\"></p><p><img width=95 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19954/image066.png\"></p><p><img width=68 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19954/image067.png\"></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A circular clock has the hour hand of length 6 inch. Find the length of the distance it covers by it's tip from 9 p.m. to 3 a.m.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2328;&#2337;&#2364;&#2368; &#2350;&#2375;&#2306; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2360;&#2370;&#2312; 6 &#2311;&#2306;&#2330; &#2354;&#2306;&#2348;&#2368; &#2361;&#2376;&#2404; &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 9 &#2348;&#2332;&#2375; &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344; 3 &#2348;&#2332;&#2375; &#2340;&#2325; &#2311;&#2360;&#2325;&#2375; &#2344;&#2379;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2351; &#2325;&#2368; &#2327;&#2312; &#2342;&#2370;&#2352;&#2368; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4&#960; inch</span><span class=\"hqt\" style=\"display:none\">4&#960; &#2311;&#2306;&#2330;</span>",
      "<span class=\"eqt\">2&#960; inch</span><span class=\"hqt\" style=\"display:none\">2&#960; &#2311;&#2306;&#2330;</span>",

      "<span class=\"eqt\">8&#960; inch</span><span class=\"hqt\" style=\"display:none\">8&#960; &#2311;&#2306;&#2330;</span>"

    "correct_option_id": 2,
    "solution": "<p>The path traveled by tip of the hour hand over the course of 12 hours = 2&#960;r</p><p>So, path traveled by tip of the hour hand over the course of 6 hours (i.e, 9 p.m. to 3 a.m) = 1/2 * 2&#960; * 6 = 6&#960; inch</p>",
    "question_index": 3

  {
    "question": "<span class=\"eqt\"><p>The side of an equilateral triangle is 12 cm. What is the area (in cm<sup>2</sup>, rounded off to 2 decimal places) of the triangle? Given: &radic;3 = 1.732</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; 12 cm &#2361;&#2376;&#2404; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (cm<sup>2 </sup>&#2350;&#2375;&#2306;, &#2342;&#2358;&#2350;&#2354;&#2357; &#2325;&#2375; 2 &#2309;&#2306;&#2325;&#2379;&#2306; &#2340;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;&#2367;&#2340;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;? &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;: &radic;3 = 1.732</p></span>",
    "options": [
      "<span class=\"eqt\">68.07</span><span class=\"hqt\" style=\"display:none\">68.07</span>",
      "<span class=\"eqt\">63.89</span><span class=\"hqt\" style=\"display:none\">63.89</span>",
      "<span class=\"eqt\">62.35</span><span class=\"hqt\" style=\"display:none\">62.35</span>",
      "<span class=\"eqt\">65.23</span><span class=\"hqt\" style=\"display:none\">65.23</span>"

    "correct_option_id": 2,
    "solution": "<p>Area of an equilateral triangle of side 'a' = &radic;3a<sup>2</sup>/4</p><p>= 1.732 * 12<sup>2</sup>/4</p><p>= 1.732 * 36</p><p>= 62.352</p><p>= 62.35 cm<sup>2</sup></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>One-quarter of a circular pizza of radius 21 cm was removed from the whole pizza. What is the perimeter (in cm) of the remaining pizza? (Use &#960; =22/7)</p></span><span class=\"hqt\" style=\"display:none\">21 &#2360;&#2375;&#2350;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2367;&#2332;&#2381;&#2332;&#2366; &#2325;&#2366; &#2319;&#2325;-&#2330;&#2380;&#2341;&#2366;&#2312; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2346;&#2370;&#2352;&#2375; &#2346;&#2367;&#2332;&#2381;&#2332;&#2366; &#2360;&#2375; &#2344;&#2367;&#2325;&#2366;&#2354; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; &#2358;&#2375;&#2359; &#2346;&#2367;&#2332;&#2381;&#2332;&#2366; &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; (&#2360;&#2375;&#2350;&#2368; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;? (&#960; =22/7 &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352;&#2375;&#2306;)</span>",
    "options": [
      "<span class=\"eqt\">99</span><span class=\"hqt\" style=\"display:none\">99</span>",
      "<span class=\"eqt\">141</span><span class=\"hqt\" style=\"display:none\">141</span>",
      "<span class=\"eqt\">128</span><span class=\"hqt\" style=\"display:none\">128</span>",
      "<span class=\"eqt\">131</span><span class=\"hqt\" style=\"display:none\">131</span>"

    "correct_option_id": 1,
    "solution": "<p>We know that perimeter of a circle=2*&#960; *R </p><p>As pizza is circular</p><p>So perimeter of whole pizza= 2*22/7*21=132 cm</p><p>As one quarter was removed, so perimeter that was removed=132/4=33 cm</p><p>Three parts perimeter=132-33=99 cm</p><p>So total perimeter of remaining pizza=99+21+21 (as it will be 2*&#960; *r +2r)</p><p>= 141 cm.</p><p>Option (b) is the correct answer.</p>",

  {
    "question": "<span class=\"eqt\"><p>Find the area of the sector of a circle with radius 4 cm and angle 30&deg;.</p></span><span class=\"hqt\" style=\"display:none\"><p>4 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; 30&deg; &#2325;&#2379;&#2339; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2326;&#2306;&#2337; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

      "<span class=\"eqt\">7.186 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">7.186 cm<sup>2</sup></span>",

    "solution": "<p>Area of sector of circle = &#960;r<sup>2</sup> * (&#952;/360&deg;)</p><p>= 3.14 * 4<sup>2</sup> * (30/360)</p><p>= 3.14 * (4/3)</p><p>= 4.186 cm<sup>2</sup></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The area of a table top in the shape of an equilateral triangle is 9&radic;3 cm<sup>2</sup>. What is the length (in cm) of each side of the table top?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2325;&#2368; &#2350;&#2375;&#2332; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 9&radic;3 cm<sup>2 </sup>&#2361;&#2376;&#2404; &#2350;&#2375;&#2332; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2349;&#2369;&#2332;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; (cm &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>Let side of table top = 'a' cm</p><p>Area of table top = <img width=83 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19946/image060.png\"></p><p>a = 6</p><p>Length of each side = 6 cm</p>",

    "question": "<span class=\"eqt\"><p>A race track is in the shape of a ring whose inner and outer circumferences are 440 m and 506 m, respectively. What is the cost of levelling the track at Rs. 6/m<sup>2</sup>? (Take &pi; = 22/7 )</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2352;&#2375;&#2360; &#2335;&#2381;&#2352;&#2376;&#2325; &#2352;&#2367;&#2306;&#2327; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2325;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2368; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2324;&#2352; &#2348;&#2366;&#2361;&#2352;&#2368; &#2346;&#2352;&#2367;&#2343;&#2367; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 440 &#2350;&#2368;&#2335;&#2352; &#2324;&#2352; 506 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2404; &#2335;&#2381;&#2352;&#2376;&#2325; &#2325;&#2379; 6 &#2352;&#2369;&#2346;&#2351;&#2375;/m<sup>2</sup> &#2342;&#2352; &#2360;&#2375; &#2360;&#2350;&#2340;&#2354; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;? (&#960; = 22/7 &#2354;&#2368;&#2332;&#2367;&#2319;)</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 18,966</span><span class=\"hqt\" style=\"display:none\">18,966 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",

    "correct_option_id": 3,
    "solution": "<p>Let inner radius and outer radius are r cm and R cm respectively.</p><p>Given,</p><p>2 * &#960; * r = 440</p><p>2 * (22/7) * r = 440</p><p>r = 70 m</p><p>And</p><p>2 * &#960; * R = 506</p><p>2 * (22/7) * R = 506</p><p>R = 80.5 m</p><p>Area covered by track = &#960; * R * R  -  &#960; * r * r</p><p>= (22/7) * (80.5<sup>2</sup>  -  70<sup>2</sup>)</p><p>= (22/7) * (80.5 + 70) * (80 .5  -  70)</p><p>= (22/7) * 150.5 * 10.5</p><p>= (22/7) * 150.5 * 1.5</p><p>= 4966.5 sq. m</p><p>Cost of levelling 1 sq. m = Rs.6</p><p>Cost of levelling 4966.5 sq. m = 6 * 4966.5 = Rs.29799</p>",
