<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">

                <!-- Dynamically populated question container -->

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>

                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">

                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>

                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>

                    <div class="stat-item">

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>

            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>What is the value of angle whose complement is one - seventh of its supplement?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2325;&#2379;&#2339; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2346;&#2370;&#2352;&#2325; &#2313;&#2360;&#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2370;&#2352;&#2325; &#2325;&#2366; &#2319;&#2325;-&#2360;&#2366;&#2340;&#2357;&#2366;&#2305; &#2349;&#2366;&#2327; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">15&deg;</span><span class=\"hqt\" style=\"display:none\">15&deg;</span>",
      "<span class=\"eqt\">75&deg;</span><span class=\"hqt\" style=\"display:none\">75&deg;</span>",
      "<span class=\"eqt\">30&deg;</span><span class=\"hqt\" style=\"display:none\">30&deg;</span>",
      "<span class=\"eqt\">25&deg;</span><span class=\"hqt\" style=\"display:none\">25&deg;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let angle be &#952;.</p><p>According to question-</p><p>=&gt; (90&deg; - &#952;) = 1/7 * (180&deg; - &#952;)</p><p>=&gt; 630&deg; - 7&#952; = 180&deg;  -  &#952;</p><p>=&gt; 450&deg; = 6&#952;</p><p>=&gt; &#952; = 75&deg;</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The value of &#8736;BOC from the figure is:</p><p><img width=473 height=312 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8152/image002.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2367;&#2340;&#2381;&#2352; &#2360;&#2375; &#8736;BOC &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p><p><img width=473 height=312 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8152/image002.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">360&deg;</span><span class=\"hqt\" style=\"display:none\">360&deg;</span>",
      "<span class=\"eqt\">148&deg;</span><span class=\"hqt\" style=\"display:none\">148&deg;</span>",
      "<span class=\"eqt\">137&deg;</span><span class=\"hqt\" style=\"display:none\">137&deg;</span>",
      "<span class=\"eqt\">144&deg;</span><span class=\"hqt\" style=\"display:none\">144&deg;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Given, &#8736;AOC = 146&deg; and &#8736;AOB = 66&deg;</p><p>We know, Complete Angle = 360&deg;</p><p>From the figure, &#8736;AOC + &#8736;AOB + &#8736;BOC = 360&deg;</p><p>146&deg; + 66&deg; + &#8736;BOC = 360&deg;</p><p>212&deg; + &#8736;BOC = 360&deg;</p><p>&#8736;BOC = 360&deg;  -  212&deg; = 148&deg;</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In the given two straight lines AB and CD intersect each other at point R. If &#8736;CRQ = 65&deg;, then what is the value of (x - y  -  z)?</p><p><img width=368 height=362 id=Image11 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11022/image009.gif\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2342;&#2379; &#2360;&#2368;&#2343;&#2368; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305; AB &#2324;&#2352; CD &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; R &#2346;&#2352; &#2325;&#2366;&#2335;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#8736;CRQ = 65&deg; &#2361;&#2376;, &#2340;&#2379; (x - y - z) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p><img width=368 height=362 id=Image11 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11022/image009.gif\"></p></span>",
    "options": [
      "<span class=\"eqt\">100&deg;</span><span class=\"hqt\" style=\"display:none\">100&deg;</span>",
      "<span class=\"eqt\">110&deg;</span><span class=\"hqt\" style=\"display:none\">110&deg;</span>",
      "<span class=\"eqt\">90&deg;</span><span class=\"hqt\" style=\"display:none\">90&deg;</span>",
      "<span class=\"eqt\">102&deg;</span><span class=\"hqt\" style=\"display:none\">102&deg;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#8736;ARC = &#8736;DRB (Vertically opposite angles)</p><p>=&gt; y = x/4</p><p>=&gt; x = 4y</p><p>By line property,</p><p>And 65 + y/4 + x/4 = 180</p><p>=&gt; 65 + y/4 + y = 180</p><p>=&gt; 5y/4 = 180  -  65</p><p>=&gt; y = 4/5 * 115</p><p>=&gt; y = 92&deg;</p><p>Hence, x = 4 * 92 = 368&deg;</p><p>By line property,</p><p>And, &#8736;ARD + &#8736;DRB = 180&deg;</p><p>=&gt; z/2 + x/4 = 180</p><p>=&gt; z/2 + 368/4 = 180</p><p>=&gt; z/2 = 180  -  92</p><p>=&gt; z = 88 * 2</p><p>=&gt; z = 176&deg; </p><p>Hence, x  -  y  -  z = 368  -  92  -  176 = 100&deg;</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In the given figure, A = 126&deg;, then what is the difference between A/3 and 2B?</p><p><img width=285 height=305 id=Image14 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11022/image012.gif\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, A = 126&deg;, &#2340;&#2379; A/3 &#2324;&#2352; 2B &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2381;&#2351;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p><p><img width=285 height=305 id=Image14 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11022/image012.gif\"></p></span>",
    "options": [
      "<span class=\"eqt\">28&deg;</span><span class=\"hqt\" style=\"display:none\">28&deg;</span>",
      "<span class=\"eqt\">39&deg;</span><span class=\"hqt\" style=\"display:none\">39&deg;</span>",
      "<span class=\"eqt\">34&deg;</span><span class=\"hqt\" style=\"display:none\">34&deg;</span>",
      "<span class=\"eqt\">42&deg;</span><span class=\"hqt\" style=\"display:none\">42&deg;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#8736;POQ + &#8736;QOM + &#8736;MON + &#8736;NOP = 360&deg;</p><p>=&gt; A + 2B + A/4 + 3B = 360&deg;</p><p>=&gt; 5A/4 + 5B = 360&deg;</p><p>=&gt; B = 72&deg;  -  A/4</p><p>=&gt; B = 72&deg;  -  126/4 </p><p>=&gt; B = 40.5&deg; </p><p>Hence, 2B  -  A/3 = 2 * 40.5&deg;  -  126&deg;/3 = 39&deg;</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In the figure given below, BC || QR, &#8736;A = 56&deg;, &#8736;B = 72&deg; and &#8736;P = 34&deg;, then find the measure of &#8736;R.</p><p><img width=162 height=231 id=\"Picture 11\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11888/image021.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, BC || QR, &#8736;A = 56&deg;, &#8736;B = 72&deg; &#2340;&#2341;&#2366; &#8736;P = 34&deg; &#2361;&#2376;, &#2340;&#2379; &#8736;R &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=162 height=231 id=\"Picture 11\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11888/image021.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">92&deg;</span><span class=\"hqt\" style=\"display:none\">92&deg;</span>",
      "<span class=\"eqt\">102&deg;</span><span class=\"hqt\" style=\"display:none\">102&deg;</span>",
      "<span class=\"eqt\">88&deg;</span><span class=\"hqt\" style=\"display:none\">88&deg;</span>",
      "<span class=\"eqt\">94&deg;</span><span class=\"hqt\" style=\"display:none\">94&deg;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In &#8710;ABC:</p><p>&#8736;A + &#8736;B + &#8736;C = 180&deg;</p><p>56&deg; + 72&deg; + &#8736;C = 180&deg;</p><p>&#8736;C = 52&deg;</p><p>Since BC || QR which means, &#8736;BCA = &#8736;PQR = 52&deg;</p><p>In &#8710;PQR:</p><p>&#8736;P + &#8736;PQR + &#8736;R = 180&deg;</p><p>34&deg; + 52&deg; + &#8736;R = 180&deg;</p><p>&#8736;R = 94&deg;</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In the following figure, PQ is parallel to TV and RU is parallel to QW. If &#8736;RUV = 48&deg; and &#8736;WUT = 67&deg;, then what is &#8736;QWU equal to?</p><p><img width=107 height=148 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13859/image006.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2330;&#2367;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306;, PQ, TV &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2361;&#2376; &#2324;&#2352; RU, QW &#2325;&#2375; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736;RUV = 48&deg; &#2324;&#2352; &#8736;WUT = 67&deg; &#2361;&#2376;, &#2340;&#2379; &#8736;QWU &#2325;&#2367;&#2360;&#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;?</p><p><img width=107 height=148 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13859/image006.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">120&deg;</span><span class=\"hqt\" style=\"display:none\">120&deg;</span>",
      "<span class=\"eqt\">115&deg;</span><span class=\"hqt\" style=\"display:none\">115&deg;</span>",
      "<span class=\"eqt\">125&deg;</span><span class=\"hqt\" style=\"display:none\">125&deg;</span>",
      "<span class=\"eqt\">110&deg;</span><span class=\"hqt\" style=\"display:none\">110&deg;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=107 height=148 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13859/image007.jpg\"></p><p>&#8736;RUW = 180&deg;  -  67&deg;  -  48&deg; = 65&deg;</p><p>Since, RU || QW and WU is transversal line</p><p>So, &#8736;QWU + &#8736;WUR = 180&deg; (co- interior angle)</p><p>=&gt;&#8736;QWU + 65&deg; = 180&deg;</p><p>=&gt;&#8736;QWU = 115&deg;</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In the following figure, m is a line. If a  -  2b = 30&deg;, then find the measure of (2a+5b)&deg;.</p><p><img width=206 height=111 id=\"Picture 134624456\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21602/image003.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2330;&#2367;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306;, m &#2319;&#2325; &#2352;&#2375;&#2326;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; a - 2b = 30&deg;, &#2340;&#2379; (2a+5b)&deg; &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p><img width=206 height=111 id=\"&#2330;&#2367;&#2340;&#2381;&#2352; 134624456\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21602/image003.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">140&deg;</span><span class=\"hqt\" style=\"display:none\">140&deg;</span>",
      "<span class=\"eqt\">130&deg;</span><span class=\"hqt\" style=\"display:none\">130&deg;</span>",
      "<span class=\"eqt\">150&deg;</span><span class=\"hqt\" style=\"display:none\">150&deg;</span>",
      "<span class=\"eqt\">120&deg;</span><span class=\"hqt\" style=\"display:none\">120&deg;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=206 height=111 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21602/image004.jpg\"></p><p>a  -  2b = 30&deg;</p><p>a = 2b + 30&deg;</p><p>(a + b) + 40&deg; + (7b + 10) = 180&deg;</p><p>2b + 30&deg; + b + 40&deg; + 7b + 10 = 180&deg;</p><p>10b = 100</p><p>b = 10&deg;</p><p>a = 2*10 + 30 = 50&deg;</p><p>2a + 5b = 2*50&deg; + 5*10 = 150&deg;</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The measure of an angle whose supplement is three times as large as its complement is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2379;&#2339; &#2325;&#2368; &#2350;&#2366;&#2346;, &#2332;&#2367;&#2360;&#2325;&#2368; &#2346;&#2352;&#2367;&#2346;&#2370;&#2352;&#2325; &#2325;&#2379;&#2339; , &#2346;&#2370;&#2352;&#2325; &#2325;&#2379;&#2339; &#2360;&#2375; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2348;&#2396;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">45&deg;</span><span class=\"hqt\" style=\"display:none\">45&deg;</span>",
      "<span class=\"eqt\">75&deg;</span><span class=\"hqt\" style=\"display:none\">75&deg;</span>",
      "<span class=\"eqt\">60&deg;</span><span class=\"hqt\" style=\"display:none\">60&deg;</span>",
      "<span class=\"eqt\">30&deg;</span><span class=\"hqt\" style=\"display:none\">30&deg;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the angle be a.</p><p>Supplement of a = (180&deg;  -  a) and Complement of a = (90&deg; - a)</p><p>Given, supplement is three times the complement of the angle.</p><p>Therefore, (180&deg; - a) = 3(90&deg; - a)</p><p>2a = 90&deg; which gives a = 45&deg;</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p> In the given figure, PR || UV and PQ || RS, &#8736;RST = 30&#176; , &#8736;STU = 45&#176;. Find the value of &#8736;QPR+&#8736;TUV?</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/6db1ae9552c606e36f24b1857fd900a3.png\" /> </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, PR || UV &#2324;&#2352; PQ || RS &#2361;&#2376;, &#8736;RST = 30&deg;, &#8736;STU = 45&deg; &#2361;&#2376;&#2404; &#8736;QPR+&#8736;TUV &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/6db1ae9552c606e36f24b1857fd900a3.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">150&#186;</span><span class=\"hqt\" style=\"display:none\">150&#186;</span>",
      "<span class=\"eqt\">195&#186;</span><span class=\"hqt\" style=\"display:none\">195&#186;</span>",
      "<span class=\"eqt\">205&#186;</span><span class=\"hqt\" style=\"display:none\">205&#186;</span>",
      "<span class=\"eqt\">165&#186;</span><span class=\"hqt\" style=\"display:none\">165&#186;</span>"

    "question": "<span class=\"eqt\"><p><div>&nbsp;In the given figure AB and CD intersect at T and ET is perpendicular at line AB. If &#8736;ATC = <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>7</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>11</span></div> &times; &#8736;ETC, then what is the value of &#8736;ATD &quest;&nbsp;</div></p><p></p><p><img width=360 height=363 id=Image12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11022/image010.gif\"></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; AB &#2324;&#2352; CD, T &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; ET &#2352;&#2375;&#2326;&#2366; AB &#2346;&#2352; &#2354;&#2306;&#2348; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736;ATC = <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>7</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>11</span></div> X &#8736;ETC &#2361;&#2376;, &#2340;&#2379; &#8736;ATD &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p><p><img width=\"360\" height=\"363\" id=\"Image12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11022/image010.gif\"></div></p></span>",
