    "question": "<span class=\"eqt\"><p>If <img width=118 height=46 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12777/image004.png\">, then which of the following is TRUE?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; <img width=118 height=46 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12777/image004.png\">, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",

  {
    "question": "<span class=\"eqt\"><p>&radic;675  -  &radic;243 + &radic;588  -  &radic;1452 = a&radic;3, then what is the value of a<sup>3</sup>  -  4a<sup>2</sup>  -  2a + 7?</p></span><span class=\"hqt\" style=\"display:none\"><p>&radic;675 - &radic;243 + &radic;588 - &radic;1452 = a&radic;3, &#2340;&#2379; a<sup>3</sup> - 4a<sup>2</sup> - 2a + 7 &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">-11</span><span class=\"hqt\" style=\"display:none\">-11</span>",
      "<span class=\"eqt\">-9</span><span class=\"hqt\" style=\"display:none\">-9</span>",

    "correct_option_id": 2,
    "solution": "<p>&radic;675  -  &radic;243 + &radic;588  -  &radic;1452 = a&radic;3</p><p>&radic;(15 * 15 * 3)  -  &radic;(9 * 9 * 3) + &radic;(14 * 14 * 3)  -  &radic;(22 * 22 * 3) = a&radic;3</p><p>15&radic;3  -  9&radic;3 + 14&radic;3  -  22&radic;3 = a&radic;3</p><p>29&radic;3  -  31&radic;3 = a&radic;3</p><p>-2&radic;3 = a&radic;3</p><p>a = -2</p><p>Therefore, a<sup>3</sup>  -  4a<sup>2</sup>  -  2a + 7</p><p>= (-2)<sup>3</sup>  -  4(-2)<sup>2</sup>  -  2(-2) + 7</p><p>= -8  -  16 + 4 + 7</p><p>= -24 + 11</p><p>= <b>-13</b></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If (1  -  &radic;5)<sup>2</sup>(2  -  &radic;5)<sup>2</sup> + (3 + &radic;5)<sup>2</sup> = (a + b) + (a  -  b)&radic;5, then find the value of 'b'.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (1 - &radic;5)<sup>2</sup>(2 - &radic;5)<sup>2</sup> + (3 + &radic;5)<sup>2</sup> = (a + b) + (a - b)&radic;5, &#2340;&#2379; 'b' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">46</span><span class=\"hqt\" style=\"display:none\">46</span>",
      "<span class=\"eqt\">38</span><span class=\"hqt\" style=\"display:none\">38</span>",
      "<span class=\"eqt\">62</span><span class=\"hqt\" style=\"display:none\">62</span>",
      "<span class=\"eqt\">56</span><span class=\"hqt\" style=\"display:none\">56</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>(1  -  &radic;5)<sup>2</sup>(2  -  &radic;5)<sup>2</sup> + (3 + &radic;5)<sup>2</sup> = (a + b) + (a  -  b)&radic;5</p><p>(1 + 5  -  2&radic;5)(4 + 5  -  2&radic;5) + 9 + 5 + 6&radic;5 = (a + b) + (a  -  b)&radic;5</p><p>(6  -  2&radic;5)(9  -  2&radic;5) + 14 + 6&radic;5 = (a + b) + (a  -  b)&radic;5</p><p>54  -  12&radic;5  -  18&radic;5 + 20 + 14 + 6&radic;5 = (a + b) + (a  -  b)&radic;5</p><p>88  -  24&radic;5 = (a + b) + (a  -  b)&radic;5</p><p>Now, a + b = 88 =&gt; a = 88  -  b</p><p>a  -  b = -24 =&gt; a = b  -  24</p><p>Then, 88  -  b = b  -  24</p><p>2b = 112</p><p><b>b = 56</b></p>",
    "question_index": 3

  {
    "question": "<span class=\"eqt\"><p>If (&radic;2 + 3)/(&radic;2  -  3)  -  (&radic;2  -  3)/(&radic;2 + 3) = m + n&radic;2, then what is the value of (m  -  n)? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (&radic;2 + 3)/(&radic;2 - 3) - (&radic;2 - 3)/(&radic;2 + 3) = m + n&radic;2, &#2340;&#2379; (m - n) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">15/8</span><span class=\"hqt\" style=\"display:none\">15/8</span>",
      "<span class=\"eqt\">12/7</span><span class=\"hqt\" style=\"display:none\">12/7</span>",
      "<span class=\"eqt\">11&radic;3</span><span class=\"hqt\" style=\"display:none\">11&radic;3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>(&radic;2 + 3)/(&radic;2  -  3)  -  (&radic;2  -  3)/(&radic;2 + 3) = m + n&radic;2</p><p>[(&radic;2 + 3)<sup>2</sup>  -  (&radic;2  -  3)<sup>2</sup>]/(&radic;2 + 3)(&radic;2  -  3) = m + n&radic;2</p><p>12&radic;2/(-7) = m + n&radic;2</p><p>Comparing both sides  -  </p><p>m = 0 and n = -12/7</p><p>m  -  n = 0  -  (-12/7) = 12/7</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What value should come in place of the question mark?</p><p>(64)<sup>8</sup> * (4)<sup>-32</sup> * (16)<sup>12</sup> &div; (2)<sup>-18</sup> * (4)<sup>22</sup> = (2)<sup>?</sup></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2350;&#2366;&#2344; &#2310;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>(64)<sup>8</sup> * (4)<sup>-32</sup> * (16)<sup>12</sup> &div; (2)<sup>-18</sup> * (4)<sup>22</sup> = (2)<sup>?</sup></p></span>",
    "options": [
      "<span class=\"eqt\">84</span><span class=\"hqt\" style=\"display:none\">84</span>",
      "<span class=\"eqt\">63</span><span class=\"hqt\" style=\"display:none\">63</span>",
      "<span class=\"eqt\">94</span><span class=\"hqt\" style=\"display:none\">94</span>",
      "<span class=\"eqt\">89</span><span class=\"hqt\" style=\"display:none\">89</span>"

    "correct_option_id": 2,
    "solution": "<p>(64)<sup>8</sup> * (4)<sup>-32</sup> * (16)<sup>12</sup> &div; (2)<sup>-18</sup> * (4)<sup>22</sup> = (2)<sup>?</sup></p><p>[(2)<sup>6</sup>]<sup>8 </sup>* 1/(4)<sup>32 </sup>* (2)<sup>48</sup> * (2)<sup>18</sup> * (2)<sup>44</sup> = (2)<sup>?</sup></p><p>[(2)<sup>48</sup> * (2)<sup>48</sup> * (2)<sup>18</sup> * (2)<sup>44</sup>)/(2)<sup>64</sup> = (2)<sup>?</sup></p><p>(2)<sup>48 + 48 + 18 + 44  -  64 </sup>= (2)<sup>?</sup></p><p>? = 48 + 48 + 18 + 44  -  64 = 94</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Let a = (&radic;3 + 1) / (&radic;3 - 1). Simplify a + 1/a.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344; &#2354;&#2368;&#2332;&#2367;&#2319; a = (&radic;3 + 1) / (&radic;3 - 1)&#2404; a + 1/a &#2325;&#2379; &#2360;&#2352;&#2354; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; First, rationalize a:</p><p>a = [(&radic;3 + 1)/(&radic;3 - 1)]  X  [(&radic;3 + 1)/(&radic;3 + 1)]</p><p>= ( (&radic;3 + 1)&#178; ) / (3 - 1)</p><p>= (3 + 2&radic;3 + 1) / 2</p><p>= (4 + 2&radic;3) / 2</p><p>= 2 + &radic;3.</p><p>&#183; Then 1/a = 1 / (2 + &radic;3). Rationalize again:</p><p>1 / (2 + &radic;3)  X  [(2 - &radic;3)/(2 - &radic;3)] = (2 - &radic;3) / (4 - 3) = 2 - &radic;3.</p><p>&#183; So a + 1/a = (2 + &radic;3) + (2 - &radic;3) = 4.</p>",
    "question_index": 6
  },
  {

    "options": [
      "<span class=\"eqt\">20 - &radic;2</span><span class=\"hqt\" style=\"display:none\">20 - &radic;2</span>",

    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>What is the value of m + 2n?</p><p><img width=168 height=45 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12361/image003.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>m + 2n &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p><p><img width=\"168\" height=\"45\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12361/image003.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=212 height=172 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12361/image004.png\"></p><p>On comparing both the sides, we get</p><p>12 + 2m = -12</p><p>2m = -24</p><p>m = -12</p><p>And -12 = 12  -  3n</p><p>-24 = -3n</p><p>n = 8</p><p>Therefore, m + 2n = -12 + 2 * 8 = -12 + 16 =<b> 4</b></p>",
    "question_index": 8
