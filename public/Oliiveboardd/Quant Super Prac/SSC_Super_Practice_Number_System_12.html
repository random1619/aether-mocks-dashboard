<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A worker earned Rs. 20/- on one day and spent Rs. 15/- on the next day. He again earned Rs. 20/- on the third day and spent Rs. 15/- on the fourth day and so on. On which day he will first have the 60 with him?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2350;&#2332;&#2342;&#2370;&#2352; &#2344;&#2375; &#2319;&#2325; &#2342;&#2367;&#2344; 20 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2350;&#2366;&#2319; &#2324;&#2352; &#2309;&#2327;&#2354;&#2375; &#2342;&#2367;&#2344; 15 &#2352;&#2369;&#2346;&#2351;&#2375; &#2326;&#2352;&#2381;&#2330; &#2325;&#2367;&#2319;&#2404; &#2313;&#2360;&#2344;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2342;&#2367;&#2344; &#2347;&#2367;&#2352; 20 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2350;&#2366;&#2319; &#2324;&#2352; &#2330;&#2380;&#2341;&#2375; &#2342;&#2367;&#2344; 15 &#2352;&#2369;&#2346;&#2351;&#2375; &#2326;&#2352;&#2381;&#2330; &#2325;&#2367;&#2319; &#2324;&#2352; &#2311;&#2360;&#2368; &#2340;&#2352;&#2361; &#2310;&#2327;&#2375; &#2349;&#2368;&#2404; &#2325;&#2367;&#2360; &#2342;&#2367;&#2344; &#2313;&#2360;&#2325;&#2375; &#2346;&#2366;&#2360; &#2360;&#2348;&#2360;&#2375; &#2346;&#2361;&#2354;&#2375; 60 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2379;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">17<sup>th</sup></span><span class=\"hqt\" style=\"display:none\">17&#2357;&#2375;&#2306;</span>",
      "<span class=\"eqt\">24th</span><span class=\"hqt\" style=\"display:none\">24 &#2357;&#2375;&#2306;</span>",
      "<span class=\"eqt\">30th</span><span class=\"hqt\" style=\"display:none\">30 &#2357;&#2368;&#2306;</span>",
      "<span class=\"eqt\">20th</span><span class=\"hqt\" style=\"display:none\">20 &#2357;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>On every odd day he is earning Rs. 20/-</p><p>On every even day he is spending Rs. 15/-</p><p>For every 2 days, he is saving Rs. 5/-</p><p>So till 16<sup>th</sup> day, he has saved = 5 * 8 = Rs. 40/-</p><p>On 17<sup>th</sup> day, he earns Rs. 20 i.e. 40 + 20 = Rs. 60/-</p><p>Thus the total number of days required = 17 days</p><p>Hence the correct answer is option A.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is <b>not </b>irrational?</p><p>A = 18, B = 24, C = 36, D = 12</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2309;&#2346;&#2352;&#2367;&#2350;&#2375;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p><p>A = 18, B = 24, C = 36, D = 12</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;(A + B + C + D)</span><span class=\"hqt\" style=\"display:none\">&radic;(A + B + C + D)</span>",
      "<span class=\"eqt\">&radic;(A * B * C)</span><span class=\"hqt\" style=\"display:none\">&radic;(A * B * C)</span>",
      "<span class=\"eqt\">&radic;(B * C * D)</span><span class=\"hqt\" style=\"display:none\">&radic;(B * C * D)</span>",
      "<span class=\"eqt\">&radic;(A * B * D)</span><span class=\"hqt\" style=\"display:none\">&radic;(A * B * D)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>From 1: &radic;(A + B + C + D) = &radic;(18 + 24 + 36 + 12) = &radic;90 = 3&radic;10</p><p>From 2: &radic;(A * B * C) = &radic;(18 * 24 * 36) = 72&radic;3</p><p>From 3: &radic;(B * C * D) = &radic;(24 * 36 * 12) = 72&radic;2</p><p>From 4: &radic;(A * B * D) = &radic;(18 * 24 * 12) = 72 <b>(rational)</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>How many such numbers are there in which the digit '0' and the digit '1' appear together while writing numbers from 95 to 179 ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2320;&#2360;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; 95 &#2360;&#2375; 179 &#2340;&#2325; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2354;&#2367;&#2326;&#2340;&#2375; &#2360;&#2350;&#2351; &#2309;&#2306;&#2325; '0' &#2324;&#2352; &#2309;&#2306;&#2325; '1' &#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2367;&#2326;&#2366;&#2312; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The numbers in which the digit '0' and the digit '1' appear together while writing numbers from 95 to 179 are 100, 101, 102, 103, 104, 105, 106, 107, 108, 109, 110, 120, 130, 140, 150, 160 and 170.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A person has total 500 chocolates. He gives 4 chocolates to 'm' boys each and 5 chocolates to 'n' girls each. Which of the following statement is true?</p><p>I. m = 75, n = 40</p><p>II. m = 60, n = 52</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2369;&#2354; 500 &#2330;&#2377;&#2325;&#2354;&#2375;&#2335; &#2361;&#2376;&#2306;&#2404; &#2357;&#2361; 'm' &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2325;&#2379; 4 &#2330;&#2377;&#2325;&#2354;&#2375;&#2335; &#2324;&#2352; 'n' &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; 5 &#2330;&#2377;&#2325;&#2354;&#2375;&#2335; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p><p>I. m = 75, n = 40</p><p>II. m = 60, n = 52</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Total number of chocolates = 4m + 5n = 400</p><p>From I:</p><p>m = 75, n = 40</p><p>Then, 4 * 75 + 5 * 40 = 300 + 200 = 500</p><p>So, this statement is true.</p><p>From II:</p><p>m = 60, n = 52</p><p>Then, 4 * 60 + 5 * 52 = 240 + 260 = 500</p><p>So, this statement is true.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What least number should be added to 16000 to make it a perfect square?</p></span><span class=\"hqt\" style=\"display:none\"><p>16000 &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2368; &#2331;&#2379;&#2335;&#2368; &#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2379;&#2337;&#2364;&#2368; &#2332;&#2366;&#2319; &#2325;&#2367; &#2357;&#2361; &#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2352;&#2381;&#2327; &#2348;&#2344; &#2332;&#2366;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">127</span><span class=\"hqt\" style=\"display:none\">127</span>",
      "<span class=\"eqt\">128</span><span class=\"hqt\" style=\"display:none\">128</span>",
      "<span class=\"eqt\">129</span><span class=\"hqt\" style=\"display:none\">129</span>",
      "<span class=\"eqt\">130</span><span class=\"hqt\" style=\"display:none\">130</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>(127)<sup>2</sup> = 16129</p><p>Least number that should be added = 16129  -  16000 = 129</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In a class, 430 chocolates were distributed among 90 students in such a way that each boy got 6 chocolates, and each girl got 4 chocolates. Find the total number of girls in the class. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306;, 90 &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; 430 &#2330;&#2377;&#2325;&#2354;&#2375;&#2335; &#2311;&#2360; &#2340;&#2352;&#2361; &#2360;&#2375; &#2357;&#2367;&#2340;&#2352;&#2367;&#2340; &#2325;&#2368; &#2327;&#2312;&#2306; &#2325;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2354;&#2337;&#2364;&#2325;&#2375; &#2325;&#2379; 6 &#2330;&#2377;&#2325;&#2354;&#2375;&#2335; &#2350;&#2367;&#2354;&#2368;&#2306;, &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2354;&#2337;&#2364;&#2325;&#2368; &#2325;&#2379; 4 &#2330;&#2377;&#2325;&#2354;&#2375;&#2335; &#2350;&#2367;&#2354;&#2368;&#2306;&#2404; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">60</span><span class=\"hqt\" style=\"display:none\">60</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">55</span><span class=\"hqt\" style=\"display:none\">55</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the total number of girls be 'X'</p><p>Boys = 90  -  X</p><p>According to question,</p><p>X * 4 + (90  -  X) * 6 = 430</p><p>4X + 540  -  6X = 430</p><p>2X = 110</p><p>X = 55</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>How many 5-digits numbers are there in which all digits are prime?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2340;&#2344;&#2368; 5-&#2309;&#2306;&#2325;&#2368;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2309;&#2306;&#2325; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1536</span><span class=\"hqt\" style=\"display:none\">1536</span>",
      "<span class=\"eqt\">1024</span><span class=\"hqt\" style=\"display:none\">1024</span>",
      "<span class=\"eqt\">1225</span><span class=\"hqt\" style=\"display:none\">1225</span>",
      "<span class=\"eqt\">1386</span><span class=\"hqt\" style=\"display:none\">1386</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to the question:</p><p>Let the 5-digit number = abcde</p><p>Digit used in place of 'a', 'b', 'c', 'd' and 'e' = 2, 3, 5 and 7 = 4 numbers</p><p>Therefore, total number of 5-digit numbers in which all digits are prime</p><p>= 4 * 4 * 4 * 4 * 4</p><p><b>= 1024</b></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Number of digits in the square root of 42627841 is:</p></span><span class=\"hqt\" style=\"display:none\"><p>42627841 &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2350;&#2370;&#2354; &#2350;&#2375;&#2306; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The total number of digits in 42627841 = 8</p><p>Hence required number of digits in the square root = 8/2 = 4</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following numbers cannot be square of any natural number ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2360;&#2368; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2357;&#2352;&#2381;&#2327; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379; &#2360;&#2325;&#2340;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">285156</span><span class=\"hqt\" style=\"display:none\">285156</span>",
      "<span class=\"eqt\">15376</span><span class=\"hqt\" style=\"display:none\">15376</span>",
      "<span class=\"eqt\">27225</span><span class=\"hqt\" style=\"display:none\">27225</span>",
      "<span class=\"eqt\">42322</span><span class=\"hqt\" style=\"display:none\">42322</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>If we look carefully, we would observe that the square of any number can't contain last digit as 2.</p><p>Hence, option d is the right answer.</p>",
    "question_index": 8
