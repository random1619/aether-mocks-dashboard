<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Fresh and dry orange contains 78% and 36% water. Find the quantity of dry fruit can be obtained from 800 kg of fresh orange.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2366;&#2332;&#2364;&#2375; &#2324;&#2352; &#2360;&#2370;&#2326;&#2375; &#2360;&#2306;&#2340;&#2352;&#2375; &#2350;&#2375;&#2306; 78% &#2324;&#2352; 36% &#2346;&#2366;&#2344;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; 800 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2340;&#2366;&#2332;&#2375; &#2360;&#2306;&#2340;&#2352;&#2375; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2370;&#2326;&#2375; &#2350;&#2375;&#2357;&#2375; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">290 kg</span><span class=\"hqt\" style=\"display:none\">290 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">285 kg</span><span class=\"hqt\" style=\"display:none\">285 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">280 kg</span><span class=\"hqt\" style=\"display:none\">280 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">275 kg</span><span class=\"hqt\" style=\"display:none\">275 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Pulp content in both the fresh fruit and dry fruit is same </p><p>Let weight of dry fruit be x kg </p><p>Fresh fruit 78% water and 22% pulp</p><p>Dry fruit 36% water and 64% pulp</p><p>22% of 800 = 64% of x</p><p>x = (22 * 800)/64 = 275 kg</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The number of males in coaches A and B, are in the ratio of 3: 2. The number of males in coach C is 20% more than the sum of number of males in coaches A and B. If the number of males in coaches B and C together is 400, then find the number of males in coach A.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2379;&#2330; A &#2324;&#2352; B &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 3: 2 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404; &#2325;&#2379;&#2330; C &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379;&#2330; A &#2324;&#2352; B &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2351;&#2379;&#2327; &#2360;&#2375; 20% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2379;&#2330; B &#2324;&#2352; C &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 400 &#2361;&#2376;, &#2340;&#2379; &#2325;&#2379;&#2330; A &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">150</span><span class=\"hqt\" style=\"display:none\">150</span>",
      "<span class=\"eqt\">120</span><span class=\"hqt\" style=\"display:none\">120</span>",
      "<span class=\"eqt\">160</span><span class=\"hqt\" style=\"display:none\">160</span>",
      "<span class=\"eqt\">140</span><span class=\"hqt\" style=\"display:none\">140</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let number of males in coaches A and B be 3x and 2x respectively.</p><p>Then,</p><p>Number of males in coach C = 5x * 120/100 = 6x</p><p>Given,</p><p>2x + 6x = 400</p><p>8x = 400</p><p>x = 50</p><p>Therefore,</p><p>Number of males in coach A = 3x = 3 * 50 = 150</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>64% of the first's number equals 70% of the second's number. If the second number is increased by 960 and the first number is decreased by 200, then the ratio of the second number to the first number becomes 6: 5. What is the value of the first number? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2361;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; 64% &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; 70% &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; 960 &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2332;&#2366;&#2319; &#2340;&#2341;&#2366; &#2346;&#2361;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; 200 &#2325;&#2368; &#2325;&#2350;&#2368; &#2325;&#2368; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2346;&#2361;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 6:5 &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2361;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">4200</span><span class=\"hqt\" style=\"display:none\">4200</span>",
      "<span class=\"eqt\">3840</span><span class=\"hqt\" style=\"display:none\">3840</span>",
      "<span class=\"eqt\">4000</span><span class=\"hqt\" style=\"display:none\">4000</span>",
      "<span class=\"eqt\">4800</span><span class=\"hqt\" style=\"display:none\">4800</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The first number * 64/100 = the second number * 70/100 </p><p>The first number/ The second number = 35/32 </p><p>Let the first number and the second number be '35X' and '32X' respectively. </p><p>A/Q</p><p>(The second number + 960)/ (The first number  -  200) = 6/5 </p><p>(32X + 960)/ (35X  -  200) = 6/5</p><p>160X + 4800 = 210X  -  1200 </p><p>50X = 6000 </p><p>X = 120 </p><p>Hence, the first number = 35 * 120 = 4200 </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In a city with a disease outbreak, the city lost 16 % of its total population. Out of the remaining population, 30 % moved to another city. If the present population of the city is 3822, then find the initial population of the city. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2348;&#2368;&#2350;&#2366;&#2352;&#2368; &#2347;&#2376;&#2354;&#2344;&#2375; &#2360;&#2375; &#2358;&#2361;&#2352; &#2325;&#2368; &#2325;&#2369;&#2354; &#2310;&#2348;&#2366;&#2342;&#2368; &#2325;&#2366; 16% &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2326;&#2340;&#2381;&#2350; &#2361;&#2379; &#2327;&#2351;&#2366;&#2404; &#2348;&#2330;&#2368; &#2361;&#2369;&#2312; &#2310;&#2348;&#2366;&#2342;&#2368; &#2350;&#2375;&#2306; &#2360;&#2375; 30% &#2354;&#2379;&#2327; &#2342;&#2370;&#2360;&#2352;&#2375; &#2358;&#2361;&#2352; &#2330;&#2354;&#2375; &#2327;&#2319;&#2404; &#2351;&#2342;&#2367; &#2358;&#2361;&#2352; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 3822 &#2361;&#2376;, &#2340;&#2379; &#2358;&#2361;&#2352; &#2325;&#2368; &#2310;&#2352;&#2306;&#2349;&#2367;&#2325; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">7500</span><span class=\"hqt\" style=\"display:none\">7500</span>",
      "<span class=\"eqt\">5000</span><span class=\"hqt\" style=\"display:none\">5000</span>",
      "<span class=\"eqt\">6500</span><span class=\"hqt\" style=\"display:none\">6500</span>",
      "<span class=\"eqt\">7000</span><span class=\"hqt\" style=\"display:none\">7000</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the total population of a city be '100X'</p><p>The population of the city after disease outbreak = 100X * 84/100 = 84X </p><p>The current population of the village = 84X * 70/100 </p><p>3822 = 84X * 70/100 </p><p>X = 3822 * 100/ (70 * 84) </p><p>X = 65</p><p>Hence, the initial population of the city = 6500</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The price of petrol increases by 45 %, by what percentage should a bike owner reduce his petrol consumption to ensure that his expenditure on petrol does not increase? (correct up to two decimal places) </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2375;&#2335;&#2381;&#2352;&#2379;&#2354; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; 45% &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2319;&#2325; &#2348;&#2366;&#2311;&#2325; &#2350;&#2366;&#2354;&#2367;&#2325; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; &#2346;&#2375;&#2335;&#2381;&#2352;&#2379;&#2354; &#2325;&#2368; &#2326;&#2346;&#2340; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2340;&#2325; &#2325;&#2350; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; &#2351;&#2361; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2361;&#2379; &#2360;&#2325;&#2375; &#2325;&#2367; &#2346;&#2375;&#2335;&#2381;&#2352;&#2379;&#2354; &#2346;&#2352; &#2313;&#2360;&#2325;&#2366; &#2326;&#2352;&#2381;&#2330; &#2344; &#2348;&#2338;&#2364;&#2375;? (&#2342;&#2379; &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2340;&#2325; &#2360;&#2361;&#2368;) </p></span>",
    "options": [
      "<span class=\"eqt\">68.96%</span><span class=\"hqt\" style=\"display:none\">68.96%</span>",
      "<span class=\"eqt\">70.42%</span><span class=\"hqt\" style=\"display:none\">70.42%</span>",
      "<span class=\"eqt\">29.57%</span><span class=\"hqt\" style=\"display:none\">29.57%</span>",
      "<span class=\"eqt\">31.03%</span><span class=\"hqt\" style=\"display:none\">31.03%</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the initial price of petrol per Liter and initial consumption of petrol be '100' and '100' respectively.</p><p>Initial expenditure = 100 x 100</p><p>The new price of petrol = 100 * 45/100 = 145</p><p>The final consumption of the petrol = 100 * 100/ 145</p><p>= 68.96</p><p>Hence, the required value = (100  -  68.96) * 100/100 = 31.03%</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A reduction of 18% in the cost price of rice enables a shopkeeper to purchase 36 kg more for a total of Rs. 8200 than he could previously buy. If he wants to make a profit of 38.8 % on the pre-reduction cost price, at what price per kg should the rice be sold? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2366;&#2357;&#2354; &#2325;&#2375; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2350;&#2375;&#2306; 18% &#2325;&#2368; &#2325;&#2350;&#2368; &#2360;&#2375; &#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; 36 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2330;&#2366;&#2357;&#2354; &#2309;&#2343;&#2367;&#2325; &#2326;&#2352;&#2368;&#2342; &#2346;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2368; &#2325;&#2369;&#2354; &#2325;&#2368;&#2350;&#2340; 8200 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; &#2325;&#2335;&#2380;&#2340;&#2368; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2325;&#2375; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 38.8% &#2325;&#2366; &#2354;&#2366;&#2349; &#2325;&#2350;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2330;&#2366;&#2357;&#2354; &#2325;&#2367;&#2360; &#2325;&#2368;&#2350;&#2340; &#2346;&#2352; &#2348;&#2375;&#2330;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 69.4</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 69.4</span>",
      "<span class=\"eqt\">Rs. 56.908</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 56.908</span>",
      "<span class=\"eqt\">Rs. 62.46</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 62.46</span>",
      "<span class=\"eqt\">Rs. 76.34</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 76.34</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Reduction in price = 18% = 9/50 [Here 9 shows the units of purchase increased due to reduction in price]</p><p>9 units = 36 kg</p><p>1 unit = 4 kg</p><p>Therefore,</p><p>original consumption = 4 x (50 - 9) = 41 x 4 kg</p><p>Original price of rice = 8200/(41 x 4) = Rs.50</p><p>Hence, the selling price of rice = 50 * 138.8/100 = Rs. 69.4</p>",
    "question_index": 5
  },
  {

    "solution": "<p>(A + B) * 30/100 = (2A  -  B) * 37.5/100 </p><p>(A + B) * 3/10 = (2A  -  B) * 3/8</p><p>(A + B) * 1/5 = (2A  -  B) * 1/4</p><p>4A + 4B = 10A  -  5B </p><p>9B = 6A </p><p>3B = 2A </p><p>B/A = 2/3</p><p>Hence, the required percentage = 3 * 100/2 = 150% </p>",

    "question": "<span class=\"eqt\"><p>The number of employees in a company increases and decreases every alternate year by 25%. If it started with an increase in 2022, then the total number of employees at the end of 2024, as compared to that of 2022, had (correct to two decimal places). </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2325;&#2306;&#2346;&#2344;&#2368; &#2350;&#2375;&#2306; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2366;&#2354; 25% &#2348;&#2338;&#2364;&#2340;&#2368; &#2324;&#2352; &#2328;&#2335;&#2340;&#2368; &#2361;&#2376;&#2404; &#2309;&#2327;&#2352; 2022 &#2350;&#2375;&#2306; &#2311;&#2360;&#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2358;&#2369;&#2352;&#2370; &#2361;&#2369;&#2312;, &#2340;&#2379; 2022 &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 2024 &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; (&#2342;&#2379; &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2340;&#2325; &#2360;&#2361;&#2368;) &#2361;&#2379; &#2327;&#2312; &#2361;&#2379;&#2327;&#2368;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A bus starts from stop P with 'n' number of passengers. At stop Q, 20% of the total passengers get down and 40 new passengers get in. At stop R, 45% of the passengers get down and 75 new passengers get in. If a total of 295 passengers are left on the bus, find the value of 'n'. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2360; &#2360;&#2381;&#2335;&#2377;&#2346; P &#2360;&#2375; 'n' &#2351;&#2366;&#2340;&#2381;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2381;&#2335;&#2377;&#2346; Q &#2346;&#2352;, &#2325;&#2369;&#2354; &#2351;&#2366;&#2340;&#2381;&#2352;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; 20% &#2313;&#2340;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; 40 &#2344;&#2319; &#2351;&#2366;&#2340;&#2381;&#2352;&#2368; &#2330;&#2338;&#2364;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2360;&#2381;&#2335;&#2377;&#2346; R &#2346;&#2352;, 45% &#2351;&#2366;&#2340;&#2381;&#2352;&#2368; &#2313;&#2340;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; 75 &#2344;&#2319; &#2351;&#2366;&#2340;&#2381;&#2352;&#2368; &#2330;&#2338;&#2364;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2348;&#2360; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; 295 &#2351;&#2366;&#2340;&#2381;&#2352;&#2368; &#2348;&#2330;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; 'n' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>If 12% of 75% of 80% of a = 18, then which of the following is true?</p><p>I. 4% of 18% of a = 2.4</p><p>II. 30% of a% of 1200 = 720</p><p>III. 6% of a = 21</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 12% of 75% of 80% of a = 18 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p><p>I. 4% of 18% of a = 2.4</p><p>II. 30% of a% of 1200 = 720</p><p>III. 6% of a = 21</p></span>",

    "solution": "<p>12% of 75% of 80% of a = 18</p><p>(12/100) * (75/100) * (80/100) * a = 18</p><p>a = 250</p><p><b>From I: </b>4% of 18% of a</p><p>= (4/100) * (18/100) * 250</p><p>= 1.8 &#8800; 2.4</p><p><b>From II:</b> 30% of a% of 1200</p><p>= (30/100) * (250/100) * 1200</p><p>= 900 &#8800; 720</p><p><b>From III: </b>6% of a</p><p>= (6/100) * 250</p><p>= 15 &#8800; 21</p><p>Hence, option (d) is the correct answer.</p>",

    "question": "<span class=\"eqt\"><p>Rajan spent 10% of his salary on rent. He spent 20% of the remaining part of the salary on transport. After which he spent 40% of the balance of the salary on food. Further, he spent 80% of the balance on various bills. He deposits &#8377; 5000 in the bank and kept the remaining &#8377; 1480 for his own petty expenditure. Find his monthly salary (in &#8377;).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2344; &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2357;&#2375;&#2340;&#2344; &#2325;&#2366; 10% &#2325;&#2367;&#2352;&#2366;&#2319; &#2346;&#2352; &#2326;&#2352;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366;&#2404; &#2313;&#2360;&#2344;&#2375; &#2358;&#2375;&#2359; &#2357;&#2375;&#2340;&#2344; &#2325;&#2366; 20% &#2346;&#2352;&#2367;&#2357;&#2361;&#2344; &#2346;&#2352; &#2326;&#2352;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366;&#2404; &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2313;&#2360;&#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2358;&#2375;&#2359; &#2357;&#2375;&#2340;&#2344; &#2325;&#2366; 40% &#2349;&#2379;&#2332;&#2344; &#2346;&#2352; &#2326;&#2352;&#2381;&#2330; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404; &#2311;&#2360;&#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366;, &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2358;&#2375;&#2359; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2366; 80% &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2348;&#2367;&#2354;&#2379;&#2306; &#2346;&#2352; &#2326;&#2352;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366;&#2404; &#2357;&#2361; 5000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2348;&#2376;&#2306;&#2325; &#2350;&#2375;&#2306; &#2332;&#2350;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2358;&#2375;&#2359; 1480 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2346;&#2344;&#2375; &#2331;&#2379;&#2335;&#2375;-&#2350;&#2379;&#2335;&#2375; &#2326;&#2352;&#2381;&#2330; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2326; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2366; &#2350;&#2366;&#2360;&#2367;&#2325; &#2357;&#2375;&#2340;&#2344; (&#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

      "<span class=\"eqt\">64800</span><span class=\"hqt\" style=\"display:none\">64800</span>",
      "<span class=\"eqt\">82500</span><span class=\"hqt\" style=\"display:none\">82500</span>"

    "correct_option_id": 0,
    "solution": "<p>Let total salary be Rs. 100x</p><p>Salary spent on rent = 10% of Rs. 100x = (100x * 10/100) = Rs.10x</p><p>Remaining salary spent on transport = 20% of 90x = 90x * (20/100) = Rs.18x</p><p>Remaining salary spent on food = 40% of 72x = 72x * (40/100) = Rs.28.8x</p><p>Remaining salary spent on various bills = 80% of 43.2x = 43.2x * (80/100) = Rs.34.56x</p><p>Remaining salary = 100x  -  (10 + 18 + 28.8 + 34.56)x = (100  -  91.36)x = Rs.8.64x</p><p>Money deposited in the bank and saved for his own petty expenditure = Rs. (5000 + 1480) = Rs. 6480</p><p>Now, as per the question,</p><p>8.64x = 6480</p><p>100x = (6480/8.64)* 100 = 75,000</p>",

    "question": "<span class=\"eqt\"><p>In a school, 30% are boys and rest are girls. If 60% of boys and 80% of girls are present on a certain day, then find the percentage of students absent on that day.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2381;&#2325;&#2370;&#2354; &#2350;&#2375;&#2306; 30% &#2354;&#2337;&#2364;&#2325;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2358;&#2375;&#2359; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2367;&#2344; 60% &#2354;&#2337;&#2364;&#2325;&#2375; &#2324;&#2352; 80% &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2366;&#2305; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2313;&#2360; &#2342;&#2367;&#2344; &#2309;&#2344;&#2369;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "solution": "<p>Let the number of students in the school = 100</p><p>Number of boys in the school = 30</p><p>Number of girls in the school = 70</p><p>Total number of absent students = (100 - 60)% of 30 + (100  -  80)% of 70</p><p>= 12 + 14</p><p>= 26</p><p>Hence, percentage of students absent on that day = 26%</p>",
