<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">

                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">

        <div class="exam-header">

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">

                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A boat can cover 3K km in upstream in 9 hours. If the ratio of the speed of the boat in still water and speed of the stream is 7: 2, then in how much time it will cover K km in downstream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; 9 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 3K &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 7: 2 &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; K &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2375;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">2(1/3) hours</span><span class=\"hqt\" style=\"display:none\">2(1/3) &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">2(1/2) hours</span><span class=\"hqt\" style=\"display:none\">2(1/2) &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">2 hours</span><span class=\"hqt\" style=\"display:none\">2 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">1(2/3) hours</span><span class=\"hqt\" style=\"display:none\">1(2/3) &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let speed of the boat in still water and speed of the stream are 7x km/h and 2x km/h</p><p>Upstream speed = 3K/9 = K/3</p><p>=&gt; K/3 = 7x  -  2x</p><p>=&gt; K = 5x * 3 = 15x</p><p>So, required time = 15x/(7x + 2x) = 15/9 = 1(2/3) hours</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A boat can covers 144 km in upstream in 24 hours and 168 km in downstream in 1008 minutes, then in how much time the boat can cover 54 km in upstream and 45 km in downstream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; 24 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 144 &#2325;&#2367;&#2350;&#2368; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 1008 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; 168 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 54 &#2325;&#2367;&#2350;&#2368; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 45 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">11.5 hours</span><span class=\"hqt\" style=\"display:none\">11.5 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">12.5 hours</span><span class=\"hqt\" style=\"display:none\">12.5 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">13.5 hours</span><span class=\"hqt\" style=\"display:none\">13.5 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">14.5 hours</span><span class=\"hqt\" style=\"display:none\">14.5 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Upstream speed of the boat = 144/24 = 6 km/h</p><p>And, 1008 minutes = 1008/60 = 16.8 hours</p><p>So, downstream speed of the boat = 168/16.8 = 10 km/h</p><p>So, required time = 54/6 + 45/10 = 13.5 hours</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Two points S and T are in a river and R is in between S and T such that SR = 63 km and river flow along TS. If a boat start travelling from point R to T and then return to point S in total of 45 hours and the boat can travel 108 km in still water in Y hours and the speed of the stream is 4.2 km/h, then what is the value of Y? (ST = 120 km)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; S &#2324;&#2352; T &#2319;&#2325; &#2344;&#2342;&#2368; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306; &#2324;&#2352; R, S &#2324;&#2352; T &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376; &#2325;&#2367; SR = 63 &#2325;&#2367;&#2350;&#2368; &#2324;&#2352; &#2344;&#2342;&#2368; TS &#2325;&#2375; &#2360;&#2366;&#2341; &#2348;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2344;&#2366;&#2357; &#2348;&#2367;&#2306;&#2342;&#2369; R &#2360;&#2375; T &#2340;&#2325; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; &#2325;&#2369;&#2354; 45 &#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2367;&#2306;&#2342;&#2369; S &#2346;&#2352; &#2357;&#2366;&#2346;&#2360; &#2310;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2344;&#2366;&#2357; Y &#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2352; &#2346;&#2366;&#2344;&#2368; &#2350;&#2375;&#2306; 108 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; 4.2 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;, &#2340;&#2379; Y &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;? (ST = 120 &#2325;&#2367;&#2350;&#2368;)</p></span>",
    "options": [
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Speed of the boat in still water = 108/Y</p><p>and speed of stream = 4.2 km/h</p><p>So, upstream speed = (108/Y  -  4.2) km/h</p><p>And downstream speed = (108/Y + 4.2) km/h</p><p>According to the question,</p><p>57/(108/Y + 4.2) + 120/(108/Y  -  4.2) = 45</p><p>=&gt; Y = 15</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A boat covered 'D' km downstream in 't' hours and covered the same distance upstream in '2t' hours. If the speed of a boat in still water is 18 km/hr, then find the time taken by a boat to cover 432 km upstream.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 'D' &#2325;&#2367;&#2350;&#2368; 't' &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; '2t' &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; 18 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 432 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">24 hours</span><span class=\"hqt\" style=\"display:none\">24 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">18 hours</span><span class=\"hqt\" style=\"display:none\">18 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">27 hours</span><span class=\"hqt\" style=\"display:none\">27 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">36 hours</span><span class=\"hqt\" style=\"display:none\">36 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the speed of the stream be 'y' km/hr.</p><p>Downstream speed = speed of a boat in still water + speed of the stream</p><p>= (18 + y) km/hr</p><p>Upstream speed = speed of a boat in still water - speed of the stream</p><p>= (18  -  y) km/hr</p><p>Time = distance/ speed</p><p>t = D/ (18 + y) ......... eq (i)</p><p>2t = D/ (18  -  y) </p><p>t = D/2 (18  -  y) ........... eq (ii)</p><p>From eq (i) and eq (ii)</p><p>D/ (18 + y) = D/ 2 (18  -  y)</p><p>36  -  2y = 18 + y</p><p>3y = 18</p><p>y = 6 km/hr</p><p>Time (upstream) = 432/ (18  -  6) = 36 hours</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A boat can travel 1008 km downstream in 18 hours and the speed of the stream is 20 km/hr. If the speed of boat in still water is increased by 25%, then find the time taken by boat to travel 1035 km in still water. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; 18 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 1008 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; 20 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; 25% &#2348;&#2338;&#2364;&#2366; &#2342;&#2368; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; 1035 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">21 hours</span><span class=\"hqt\" style=\"display:none\">21 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">19 hours</span><span class=\"hqt\" style=\"display:none\">19 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">17 hours</span><span class=\"hqt\" style=\"display:none\">17 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">23 hours</span><span class=\"hqt\" style=\"display:none\">23 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the speed of boat in still water be 'X' km/h.</p><p>Speed of a boat downstream = Speed of boat in still water + Speed of stream</p><p>= X + 20 </p><p>Distance/ Time = Speed </p><p>1008/18 = X + 20 </p><p>56 = X + 20 </p><p>X = 36 km/h</p><p>Final speed of boat in still water = 36 * 125/100 = 45 km/h</p><p>Hence, the required time = 1035/45 = 23 hours</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p> The speeds of two boats A and B in still water are 7.5 m/s and 12.5 m/s respectively and the speed of the stream is 2.5 m/s. If the time taken by boat A to go &#8216;x&#8217; m upstream and came back, is 16 seconds more than the time taken by boat B to go &#8216;x&#8217; m upstream and came back, then find the time taken by boat B to go &#8216;x&#8217; m upstream and came back. </p><p> </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2342;&#2379; &#2344;&#2366;&#2357;&#2379;&#2306; A &#2324;&#2352; B &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 7.5 &#2350;&#2368;&#2335;&#2352;/&#2360;&#2375;&#2325;&#2306;&#2337; &#2324;&#2352; 12.5 &#2350;&#2368;&#2335;&#2352;/&#2360;&#2375;&#2325;&#2306;&#2337; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; 2.5 &#2350;&#2368;&#2335;&#2352;/&#2360;&#2375;&#2325;&#2306;&#2337; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2344;&#2366;&#2357; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 'x' &#2350;&#2368;&#2335;&#2352; &#2332;&#2366;&#2344;&#2375; &#2324;&#2352; &#2357;&#2366;&#2346;&#2360; &#2310;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351;, &#2344;&#2366;&#2357; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 'x' &#2350;&#2368;&#2335;&#2352; &#2332;&#2366;&#2344;&#2375; &#2324;&#2352; &#2357;&#2366;&#2346;&#2360; &#2310;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2351; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 16 &#2360;&#2375;&#2325;&#2306;&#2337; &#2309;&#2343;&#2367;&#2325; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2366;&#2357; B &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 'x' &#2350;&#2368;&#2335;&#2352; &#2332;&#2366;&#2344;&#2375; &#2324;&#2352; &#2357;&#2366;&#2346;&#2360; &#2310;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "solution": "\"<p>The upstream speed of boat A = 7.5 &#8211; 2.5 = 5 m/s</p><p>The downstream speed of boat A = 7.5 + 2.5 = 10 m/s</p><p>The upstream speed of boat B = 12.5 &#8211; 2.5 = 10 m/s</p><p>The downstream speed of boat B = 12.5 + 2.5 = 15 m/s</p><p>According to the question:</p><p> <img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/866378092acdc56db3857cf3b8a0839c.png\" /> </p><p> The time taken by boat B to go 120 m upstream and came back = \r<img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-000078.png\"/>\r + \r<img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-000079.png\"/>\r = 20 seconds</p><p> </p>\"",

    "question": "<span class=\"eqt\"><p>The total time taken by a boat to cover 45 km upstream and 63 km downstream is 8 hours. If the ratio of speed of stream to the speed of the boat in still water is 2: 7 respectively, then what is the difference between the time taken by the boat to cover 80 km upstream and 72 km downstream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 45 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 63 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 8 &#2328;&#2306;&#2335;&#2375; &#2325;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2324;&#2352; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 2: 7 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2366;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 80 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 72 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2350;&#2351; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>Let speed of stream be 2x km/h. So, speed of boat in still water = 7x km/h</p><p>So, upstream speed = 7x  -  2x = 5x km/h and downstream speed = 7x + 2x = 9x km/h</p><p>According to the question,</p><p>45/5x + 63/9x = 8</p><p>=&gt; x = 2</p><p>So, required difference = 80/10  -  72/18 = 4 hours</p>",

    "question": "<span class=\"eqt\"><p>A steamer takes 't' hours to go 'D' km upstream while 't + 1' hours to go 'D + 32' km downstream, then find the value of 't' if speed of steamer in still water and speed of stream are 20 km/h and 4 km/h respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2381;&#2335;&#2368;&#2350;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 'D' &#2325;&#2367;&#2350;&#2368; &#2332;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; 't' &#2328;&#2306;&#2335;&#2375; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 'D + 32' &#2325;&#2367;&#2350;&#2368; &#2332;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; 't + 1' &#2328;&#2306;&#2335;&#2375; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2360;&#2381;&#2335;&#2368;&#2350;&#2352; &#2325;&#2368; &#2327;&#2340;&#2367; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 20 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2324;&#2352; 4 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;, &#2340;&#2379; 't' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;</p></span>",

    "correct_option_id": 0,
    "solution": "<p>Upstream speed of steamer = 20  -  4 = 16 km/h</p><p>Downstream speed of steamer = 20 + 4 = 24 km/h</p><p>According to the question:</p><p><img width=181 height=103 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11561/image023.png\"></p><p>From (1) and (2):</p><p>16t + 32 = 24t + 24</p><p>t = 1</p><p>Hence, value of 't' = 1</p>",

    "question": "<span class=\"eqt\"><p>A boat can cover 352 km in still water in 11 hours and it can cover 192 km in upstream and 180 km in downstream in total of 12.5 hours. What is the upstream speed of the boat?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; 11 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 352 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2351;&#2361; &#2325;&#2369;&#2354; 12.5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 192 km &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 180 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2344;&#2366;&#2357; &#2325;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2330;&#2366;&#2354; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">32 km/h</span><span class=\"hqt\" style=\"display:none\">32 km/h</span>",
      "<span class=\"eqt\">21 km/h</span><span class=\"hqt\" style=\"display:none\">21 km/h</span>",

    "question": "<span class=\"eqt\"><p>A boat covers a certain distance upstream in 45 hours. It covers the same distance downstream in 36 hours. If the speed of boat is 36 km/hr. Find the difference between speed of boat in still water and the speed of stream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; 45 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2344;&#2366;&#2357; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; 36 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; 36 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;&#2404; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">36 km/hr</span><span class=\"hqt\" style=\"display:none\">36 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">28 km/hr</span><span class=\"hqt\" style=\"display:none\">28 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",

    "solution": "\"<p>Let the speed of stream = x km/hour.</p><p>&#8594; Speed of boat in downstream = (36 + x) km/hr</p><p>&#8594; Speed of boat in upstream = (36 &#8211; x) km/hour</p><p>Now, we know that, (when distance is constant)</p><p>&#8594; Speed (downstream) &#215; time(downstream) = speed (upstream) &#215; Time(upstream)</p><p>&#8594; (36 + x) &#215; 36 = (36 &#8211; x)(36 + 9)</p><p>&#8594; 36x = 324 &#8211; 45x</p><p>&#8594; 81x = 324</p><p>&#8594; x = 4km/hr = The speed of stream.</p><p>Hence, required difference = (36 &#8211; 4) km/hr = 32 km/hr</p>\"",

  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;Speed of a boat in still water is 133&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">3</span></div>&nbsp;% of the speed of the current. If the boat covers 51 km upstream in 8.5 hours, then what is the downstream distance covered by the boat in 4.5 hours?&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2319;&#2325; &#2344;&#2366;&#2357; &#2325;&#2368; &#2330;&#2366;&#2354;, &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2368; 133 (1/3) % &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 51 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 8.5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; 4.5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2368; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [

      "<span class=\"eqt\">189 km</span><span class=\"hqt\" style=\"display:none\">189 km</span>",
      "<span class=\"eqt\">198 km</span><span class=\"hqt\" style=\"display:none\">198 km</span>"

    "correct_option_id": 2,
    "solution": "<p>Let speed of current = s km/hr</p><p>Then, speed of boat in still water = (400/3)% of s = 4s/3 km/hr</p><p>Now, upstream speed = 4s/3  -  s = s/3</p><p>Also, upstream speed = 51/8.5 = 6 km/hr</p><p>Then, s/3 = 6</p><p>s = 18 km/hr</p><p>Then, downstream speed = s + 4s/3 = 7s/3 = 7 * 18/3 = 42 km/hr</p><p>Therefore, downstream distance covered in 4.5 hours = 42 * 4.5 = <b>189 km</b></p>",

    "question": "<span class=\"eqt\"><p><div>&nbsp;A boat can cover a distance of 9 km upstream in a certain time and a distance of 15 km downstream in the same time. If the boat can cover 12 km upstream and 16 km downstream in 2&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">5</span></div>&nbsp;hour, then find the speed of stream in km/hr.&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 9 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2360;&#2350;&#2366;&#2344; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 15 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 12 km &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 16 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 2 2/5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; km/hr &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2330;&#2366;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "correct_option_id": 3,
    "solution": "<p>Let speed of boat in still water = x km/hr</p><p>And speed of stream = y km/hr</p><p>ATQ,</p><p>9/(x  -  y) = 15/(x + y)</p><p>3x + 3y = 5x  -  5y</p><p>2x = 8y</p><p>x = 4y...(1)</p><p>And,</p><p>12/(x  -  y) + 16/(x + y) = 12/5</p><p>From equation (1),</p><p>12/3y + 16/5y = 12/5</p><p>108/15y = 12/5</p><p>y = 9/3</p><p>y = 3 km/hr.</p>",

    "question": "<span class=\"eqt\"><p>Boat A covers 24 km more distance than boat B while travelling downstream in 12 hours. The sum of upstream and downstream speed of boat A is 44 km/hr. Find the average of speed of boat A and boat B in still water.</p></span><span class=\"hqt\" style=\"display:none\"><p>12 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306;, &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2344;&#2366;&#2357; A, &#2344;&#2366;&#2357; B &#2360;&#2375; 24 &#2325;&#2367;&#2350;&#2368; &#2309;&#2343;&#2367;&#2325; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2344;&#2366;&#2357; A &#2325;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2327;&#2340;&#2367; &#2325;&#2366; &#2351;&#2379;&#2327; 44 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;&#2404; &#2340;&#2379;, &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; A &#2324;&#2352; &#2344;&#2366;&#2357; B &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2366; &#2324;&#2360;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "correct_option_id": 2,
    "solution": "<p>Let speed of boat A and boat B in still water are 'a' km/hr and 'b' km/hr respectively and stream is flowing with speed 's' km/hr.</p><p>Upstream speed of boat A = a  -  s</p><p>Downstream speed of boat A = a + s</p><p>Downstream speed of boat B = b + s</p><p>a + s + a  -  s = 44</p><p>a = 22 km/hr</p><p>Boat A covers 28 km more distance than boat B while travelling downstream, i.e.,</p><p>(a + s)12  -  (b + s)12 = 24</p><p>b = a  -  2 = 22  -  2 = 20 km/hr</p><p>Average = (22 + 20)/2 = 21 km/hr</p>",

    "question": "<span class=\"eqt\"><p><div>&nbsp;A boat can cover 30 km in still water in 5 hours and speed of the stream is <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>2</span></div> of the speed of the boat in still water. Find the time taken by the boat to cover 57 km in upstream.&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; 5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 30 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2330;&#2366;&#2354;, &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2366; 1/2 &#2349;&#2366;&#2327; &#2361;&#2376;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 57 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>The difference between upstream speed of boat A and boat B is 5 km/hr and the sum of their speeds in still water is 45 km/hr. What is the speed of boat B in still water?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2366;&#2357; A &#2324;&#2352; &#2344;&#2366;&#2357; B &#2325;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2330;&#2366;&#2354; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 5 km/hr &#2361;&#2376; &#2340;&#2341;&#2366; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; 45 km/hr &#2361;&#2376;&#2404; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; B &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Two points K and L are on a river and river is flowing along KL. If a boat rows from point L to point K in 2 hours and rows from point K to point L in 4/7 hours less time than it takes to cover from point L to point K, then what is the speed of the boat? (KL = 30 km)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; K &#2324;&#2352; L &#2319;&#2325; &#2344;&#2342;&#2368; &#2346;&#2352; &#2361;&#2376;&#2306; &#2324;&#2352; &#2344;&#2342;&#2368; KL &#2325;&#2375; &#2309;&#2344;&#2369;&#2342;&#2367;&#2358; &#2348;&#2361; &#2352;&#2361;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2344;&#2366;&#2357; &#2348;&#2367;&#2306;&#2342;&#2369; L &#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; K &#2340;&#2325; 2 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; K &#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; L &#2340;&#2325; &#2330;&#2354;&#2344;&#2375; &#2350;&#2375;&#2306; &#2348;&#2367;&#2306;&#2342;&#2369; L &#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; K &#2340;&#2325; &#2332;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2350;&#2351; &#2360;&#2375; 4/7 &#2328;&#2306;&#2335;&#2375; &#2325;&#2350; &#2360;&#2350;&#2351; &#2354;&#2375;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2366;&#2357; &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;? (KL = 30 km)</p></span>",
