<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>What is the number of trailing zeros in 10000!?</p></span><span class=\"hqt\" style=\"display:none\"><p>10000 &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2367;&#2350; &#2358;&#2370;&#2344;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2497</span><span class=\"hqt\" style=\"display:none\">2497</span>",
      "<span class=\"eqt\">2499</span><span class=\"hqt\" style=\"display:none\">2499</span>",
      "<span class=\"eqt\">2498</span><span class=\"hqt\" style=\"display:none\">2498</span>",
      "<span class=\"eqt\">2500</span><span class=\"hqt\" style=\"display:none\">2500</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>10000 mod 5 = 2000</p><p>10000 mod 25 = 400</p><p>10000 mod 125 = 80</p><p>10000 mod 625 = 16</p><p>10000 mod 3125 = 3</p><p>Total = 2000 + 400 + 80 + 16 + 3 = 2499</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Find the unit digit in (423)<sup>75</sup>  X  (867)<sup>54</sup> + (295)<sup>63</sup>  X  (712)<sup>91</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>(423)<sup>75</sup> X (867)<sup>54</sup> + (295)<sup>63</sup> X (712)<sup>91</sup> &#2350;&#2375;&#2306; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; (423)<sup>75</sup> &rarr; last digit 3; cycle of 3 is [3,9,7,1] =&gt; 75/4 = 3 (remainder) &rarr; 3<sup>3</sup> = 7</p><p>&bull; (867)<sup>54</sup> &rarr; last digit 7; cycle of 7 is [7,9,3,1] =&gt; 54/4 = 2 (remainder) &rarr; 7<sup>2</sup> = 9</p><p>&bull; (295)<sup>63</sup> &rarr; last digit 5; cycle of 5 is always 5</p><p>&bull; (712)<sup>91</sup> &rarr; last digit 2; cycle of 2 is [2,4,8,6] =&gt; 91/4 = 3 (remainder) &rarr; 2<sup>3</sup> = 8</p><p>&bull; Unit digit = 7 * 9 + 5 * 8 = 3 + 0 = 3</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In the product 22  X  18  X  4*  X  46, the digit in the unit place is 8. The digit to come in place of * is - </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2339;&#2344;&#2347;&#2354; 22 X 18 X 4* X 46 &#2350;&#2375;&#2306; &#2311;&#2325;&#2366;&#2312; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2366; &#2309;&#2306;&#2325; 8 &#2361;&#2376;&#2404; * &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2309;&#2306;&#2325; &#2361;&#2376; - </p></span>",
    "options": [
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; 22 &rarr; 2; 18 &rarr; 8; 46 &rarr; 6 </p><p>&bull; 2 X 8 X 6 = 96 &rarr; unit 6</p><p>&bull; 6  X  * = 8 &rarr; * = 3 or 8</p><p>Hence, option 'd' is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The digit in the unit's place of (215)<sup>33</sup> + (764)<sup>68</sup> + (389)<sup>127</sup>  -  (412)<sup>54</sup> is - </p></span><span class=\"hqt\" style=\"display:none\"><p>(215)<sup>33</sup> + (764)<sup>68</sup> + (389)<sup>127</sup> - (412)<sup>54</sup> &#2325;&#2375; &#2311;&#2325;&#2366;&#2312; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2366; &#2309;&#2306;&#2325; &#2361;&#2376; - </p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; (215)<sup>33</sup> &rarr; last digit 5 &rarr; cycle of 5 is always 5</p><p>&bull; (764)<sup>68</sup> &rarr; last digit 4; cycle of 4 is [4,6]; 68/2 = 0 (remainder) &rarr; 4<sup>2</sup> = 6 </p><p>&bull; (389)<sup>127</sup> &rarr; last digit 9; odd exponential power &rarr; unit digit &rarr; 1 </p><p>&bull; (412)<sup>54</sup> &rarr; last digit 2; cycle of 2 is [2,4,8,6]; 54/4 = 2 (remainder) &rarr; 2<sup>2</sup> = 4 </p><p>&bull; Unit digit = 5 + 6 + 1  -  4 = 8</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the unit digit.</p><p>- (613)<sup>47</sup>  -  (7428)<sup>59</sup> + (3956)<sup>84</sup> + (2087)<sup>31</sup>  -  (864)<sup>68</sup></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>- (613)<sup>47</sup> - (7428)<sup>59</sup> + (3956)<sup>84</sup> + (2087)<sup>31</sup> - (864)<sup>68</sup></p></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull;  - (613)<sup>47</sup> &rarr; last digit = 3; 47 mod 4 = 3 &rarr; 7 &rarr; unit digit = -7</p><p>&bull;  - (7428)<sup>59</sup> &rarr; last digit = 8; 59 mod 4 = 3 &rarr; 2 &rarr; -7  -  2 = -9 &rarr; unit digit = 1</p><p>&bull; +(3956)<sup>84</sup> &rarr; last digit = 6 &rarr; always 6 &rarr; 1 + 6 = 7 &rarr; unit digit = 7</p><p>&bull; +(2087)<sup>31</sup> &rarr; last digit = 7; 31 mod 4 = 3 &rarr; 3 &rarr; 7 + 3 = 10 &rarr; unit digit = 0</p><p>&bull;  - (864)<sup>68</sup> &rarr; last digit = 4; 68 mod 2 = 0 &rarr; 6 &rarr; 0  -  6 =  - 6 &rarr; unit digit = 4</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What is the number of trailing zeros in 12345!?</p></span><span class=\"hqt\" style=\"display:none\"><p>12345! &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2367;&#2350; &#2358;&#2370;&#2344;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3082</span><span class=\"hqt\" style=\"display:none\">3082</span>",
      "<span class=\"eqt\">3080</span><span class=\"hqt\" style=\"display:none\">3080</span>",
      "<span class=\"eqt\">3081</span><span class=\"hqt\" style=\"display:none\">3081</span>",
      "<span class=\"eqt\">3079</span><span class=\"hqt\" style=\"display:none\">3079</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>12345 mod 5 = 2469</p><p>12345 mod 25 = 493</p><p>12345 mod 125 = 98</p><p>12345 mod 625 = 19</p><p>12345 mod 3125 = 3</p><p>Total = 2469 + 493 + 98 + 19 + 3 = 3082</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find the unit digit in (999)<sup>253</sup> + (642)<sup>87</sup>  X  (305)<sup>44</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>(999)<sup>253</sup> + (642)<sup>87</sup> X (305)<sup>44</sup> &#2350;&#2375;&#2306; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; (999)<sup>253</sup> &rarr; last digit 9; odd exponent &rarr; 9</p><p>&bull; (642)<sup>87</sup> &rarr; last digit 2; cycle of 2 is [2,4,8,6]; 87/4 = 3 (remainder) &rarr; 2<sup>3</sup> = 8</p><p>&bull; (305)<sup>44</sup> &rarr; last digit 5 &rarr; cycle of 5 is always 5</p><p>&bull; Unit digit = 9 + 8 * 5 = 9 + 40 = 9</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Find the unit digit.</p><p>(482)<sup>37</sup>  X  (759)<sup>42</sup>  X  (314)<sup>59</sup></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>(482)<sup>37</sup> X (759)<sup>42</sup> X (314)<sup>59</sup></p></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; (482)<sup>37</sup> &rarr; last digit = 2; cycle [2,4,8,6]; 37 mod 4 = 1 &rarr; 2</p><p>&bull; (759)<sup>42</sup> &rarr; last digit = 9; cycle [9,1]; 42 mod 2 = 0 &rarr; 1</p><p>&bull; (314)<sup>59</sup> &rarr; last digit = 4; cycle [4,6]; 59 mod 2 = 1 &rarr; 4</p><p>&bull; Product = 2  X  1  X  4 = 8 &rarr; unit digit = 8</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>31  X  68  X  ?  X  42 has unit's digit 6. Find the value that will replace \"?\".</p></span><span class=\"hqt\" style=\"display:none\"><p>31 X 68 X ? X 42 &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; 6 &#2361;&#2376;&#2404; &#2357;&#2361; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; \"?\" &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2319;&#2327;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; 31 &rarr; 1; 68 &rarr; 8 &rarr; 1 X 8 = 8</p><p>&bull; 42 &rarr; 2 &rarr; 8 X 2 = 16 &rarr; unit digit = 6</p><p>&bull; Let the missing digit be d: 6 X d &#8801; 6 (mod 10) &rarr; d = 1</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Find the unit digit.</p><p>(847)<sup>123</sup>  -  (6925)<sup>46</sup> + (1307)<sup>89</sup>  -  (5748)<sup>132</sup> + (396)<sup>57</sup></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>(847)<sup>123</sup> - (6925)<sup>46</sup> + (1307)<sup>89</sup> - (5748)<sup>132</sup> + (396)<sup>57</sup></p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; (847)<sup>123</sup> &rarr; 7; cycle [7,9,3,1]; 123 mod 4 = 3 &rarr; unit digit = 3</p><p>&bull;  - (6925)<sup>46</sup> &rarr; last digit 5 &rarr; always 5 &rarr; 3  -  5 =  - 2 &rarr; unit digit = 8</p><p>&bull; +(1307)<sup>89</sup> &rarr; last digit 7; cycle [7,9,3,1]; 89 mod 4 = 1 &rarr; 7 &rarr; 8 + 7 = 15 &rarr; unit digit = 5</p><p>&bull;  - (5748)<sup>132</sup> &rarr; last digit 8; cycle [8,4,2,6]; 132 mod 4 = 0 &rarr; 6 &rarr; 5  -  6 =  - 1 &rarr; unit digit = 9</p><p>&bull; +(396)<sup>57</sup> &rarr; last digit 6 &rarr; always 6 &rarr; 9 + 6 = 15 &rarr; unit digit = 5</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Find the number of trailing zeros in 1000!  X  1500!.</p></span><span class=\"hqt\" style=\"display:none\"><p>1000! X 1500! &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2367;&#2350; &#2358;&#2370;&#2344;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">622</span><span class=\"hqt\" style=\"display:none\">622</span>",
      "<span class=\"eqt\">623</span><span class=\"hqt\" style=\"display:none\">623</span>",
      "<span class=\"eqt\">624</span><span class=\"hqt\" style=\"display:none\">624</span>",
      "<span class=\"eqt\">621</span><span class=\"hqt\" style=\"display:none\">621</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>1000! zeros = 1000 mod 5 + 1000 mod 25 + 1000 mod 125 + 1000 mod 625</p><p>= 200 + 40 + 8 + 1 = 249</p><p>1500! zeros = 1500 mod 5 + 1500 mod 25 + 1500 mod 125 + 1500 mod 625</p><p>= 300 + 60 + 12 + 2 = 374</p><p>Combined = 249 + 374 = 623</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Find the number of trailing zeros in 2340!  X  6789!.</p></span><span class=\"hqt\" style=\"display:none\"><p>2340! X 6789! &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2367;&#2350; &#2358;&#2370;&#2344;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2276</span><span class=\"hqt\" style=\"display:none\">2276</span>",
      "<span class=\"eqt\">2277</span><span class=\"hqt\" style=\"display:none\">2277</span>",
      "<span class=\"eqt\">2275</span><span class=\"hqt\" style=\"display:none\">2275</span>",
      "<span class=\"eqt\">2278</span><span class=\"hqt\" style=\"display:none\">2278</span>"
