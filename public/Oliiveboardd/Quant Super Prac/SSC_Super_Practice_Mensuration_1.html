<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The length of the largest possible rod that can be placed in a cubical room is 42&radic;3 m. The surface area (in m<sup>2</sup>) of the largest possible sphere that fit within the cubical room is: [Use &#960; = 22/7]</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344;&#2366;&#2325;&#2366;&#2352; &#2325;&#2350;&#2352;&#2375; &#2350;&#2375;&#2306; &#2352;&#2326;&#2368; &#2332;&#2366; &#2360;&#2325;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2331;&#2337;&#2364; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 42&radic;3 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2404; &#2328;&#2344;&#2366;&#2325;&#2366;&#2352; &#2325;&#2350;&#2352;&#2375; &#2350;&#2375;&#2306; &#2347;&#2367;&#2335; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2375; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (&#2350;&#2368;&#2335;&#2352;<sup>2</sup> &#2350;&#2375;&#2306;) &#2361;&#2376;: [&#960; = 22/7 &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2375;&#2306;]</p></span>",
    "options": [
      "<span class=\"eqt\">3590</span><span class=\"hqt\" style=\"display:none\">3590</span>",
      "<span class=\"eqt\">4589</span><span class=\"hqt\" style=\"display:none\">4589</span>",
      "<span class=\"eqt\">2564</span><span class=\"hqt\" style=\"display:none\">2564</span>",
      "<span class=\"eqt\">5544</span><span class=\"hqt\" style=\"display:none\">5544</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Length of the largest possible rod = 42&radic;3 m</p><p>Side of cube = 42&radic;3/&radic;3 = 42 m</p><p>Radius of largest possible sphere that fit within cube = 42/2 = 21 m</p><p>Surface area of the largest possible sphere = 4 * 22/7 * 21 * 21</p><p>= 88 * 63</p><p>= 5544 m<sup>2</sup></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The area of the base of a rectangular tank is 720 m<sup>2</sup> and the volume of water contained in it is 28800 m<sup>3</sup>. What is the depth of the water?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2335;&#2306;&#2325;&#2368; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 720 m<sup>2</sup> &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2361;&#2367;&#2340; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 28800 m<sup>3 </sup>&#2361;&#2376;&#2404; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2327;&#2361;&#2352;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">30 m</span><span class=\"hqt\" style=\"display:none\">30 m</span>",
      "<span class=\"eqt\">40 m</span><span class=\"hqt\" style=\"display:none\">40 m</span>",
      "<span class=\"eqt\">50 m</span><span class=\"hqt\" style=\"display:none\">50 m</span>",
      "<span class=\"eqt\">60 m</span><span class=\"hqt\" style=\"display:none\">60 m</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the length, width, and height of the rectangular tank is 'l' m, 'b' m, and 'h' m respectively.</p><p>Area of base of rectangular tank = lb = 720</p><p>Volume of rectangular tank = lbh = 28800</p><p>720h = 28800</p><p>h = 40 m</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The internal length, breadth and height of a cuboidal room are 12 m, 8 m, and 10 m, respectively. The total cost (in &#8377;) of whitewashing only all four walls of the cost of &#8377; 25 per m<sup>2</sup>, is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344;&#2366;&#2325;&#2366;&#2352; &#2325;&#2350;&#2352;&#2375; &#2325;&#2368; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2354;&#2306;&#2348;&#2366;&#2312;, &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 12 m, 8 m &#2324;&#2352; 10 m &#2361;&#2376;&#2404; &#8377; 25 &#2346;&#2381;&#2352;&#2340;&#2367; m<sup>2</sup> &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#2360;&#2375; &#2325;&#2375;&#2357;&#2354; &#2330;&#2366;&#2352;&#2379;&#2306; &#2342;&#2368;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2352;&#2306;&#2327;&#2344;&#2375; &#2325;&#2368; &#2325;&#2369;&#2354; &#2354;&#2366;&#2327;&#2340; (&#8377; &#2350;&#2375;&#2306;) &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">11,400</span><span class=\"hqt\" style=\"display:none\">11,400</span>",
      "<span class=\"eqt\">18,000</span><span class=\"hqt\" style=\"display:none\">18,000</span>",
      "<span class=\"eqt\">10,000</span><span class=\"hqt\" style=\"display:none\">10,000</span>",
      "<span class=\"eqt\">12,600</span><span class=\"hqt\" style=\"display:none\">12,600</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>L = 12 m, B = 8 m, and H = 10 m</p><p>Surface area of all the four walls of the room = 2H(L + B)</p><p>= 2 * 10 * (12 + 8)</p><p>= 400 m<sup>2</sup></p><p>Cost of whitewashing only all four walls = 400 * 25</p><p>= &#8377;10000</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A solid metallic cube of side 9 cm and a solid metallic cuboid having dimensions 5 cm, 13 cm, 31 cm are melted to form a single cube. How much (in &#8377;) is the cost to polish the new cube at a rate of &#8377; 10 per cm<sup>2</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>9 cm &#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2336;&#2379;&#2360; &#2343;&#2366;&#2340;&#2381;&#2357;&#2367;&#2325; &#2328;&#2344; &#2324;&#2352; 5 cm, 13 cm &#2324;&#2352; 31 cm &#2357;&#2367;&#2350;&#2366;&#2323;&#2306; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2336;&#2379;&#2360; &#2343;&#2366;&#2340;&#2381;&#2357;&#2367;&#2325; &#2328;&#2344;&#2366;&#2349; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352; &#2319;&#2325; &#2328;&#2344; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#8377; 10 &#2346;&#2381;&#2352;&#2340;&#2367; cm<sup>2</sup> &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2344;&#2319; &#2328;&#2344; &#2325;&#2379; &#2346;&#2377;&#2354;&#2367;&#2358; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#2325;&#2367;&#2340;&#2344;&#2368; (&#8377; &#2350;&#2375;&#2306;) &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">8,650</span><span class=\"hqt\" style=\"display:none\">8,650</span>",
      "<span class=\"eqt\">11,760</span><span class=\"hqt\" style=\"display:none\">11,760</span>",
      "<span class=\"eqt\">13,620</span><span class=\"hqt\" style=\"display:none\">13,620</span>",
      "<span class=\"eqt\">27,440</span><span class=\"hqt\" style=\"display:none\">27,440</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The volume of the cube = 9<sup>3</sup> = 729 cm<sup>3</sup></p><p>The volume of the cuboid = 5 * 13 * 31 = 2015 cm<sup>3</sup></p><p>The volume of the new cube = 729 + 2015 = 2744 cm<sup>3</sup></p><p>The side of the cube = &#8731;2744 = 14 cm</p><p>The surface area of the cube = 6 * 14<sup>2</sup> = 1176 cm<sup>2</sup></p><p>Since, the cost of polish the cube = &#8377; 10 per cm<sup>2</sup></p><p>So, the total cost of polishing the cube = 1176 * 10 = &#8377;11760</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What is the volume of a cube whose surface area is 54 cm<sup>2</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2328;&#2344; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 54 cm<sup>2 </sup>&#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">28 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">28 cm<sup>3</sup></span>",
      "<span class=\"eqt\">3 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">3 cm<sup>3</sup></span>",
      "<span class=\"eqt\">27 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">27 cm<sup>3</sup></span>",
      "<span class=\"eqt\">9 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">9 cm<sup>3</sup></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the side of cube = 'a' cm</p><p>Surface area of cube = 6a<sup>2</sup> = 54</p><p>a<sup>2</sup> = 9</p><p>a = 3</p><p>Volume of cube = a<sup>3</sup></p><p>= 3<sup>3</sup></p><p>= 27 cm<sup>3</sup></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The length of the side of a cube is 8 cm. Find the volume of the cube?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 8 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2328;&#2344; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">612 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">612 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">512 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">512 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">664 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">664 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">564 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">564 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Side = 8 cm</p><p>Volume of the cube = 8<sup>3</sup> = 512 cm<sup>3</sup></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>A cuboidal water purifier can carry 10 litres of water. Its breadth is 1/5 of its height and length is 1/3 of the sum of the breadth and height. The height of the tank is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344;&#2366;&#2325;&#2366;&#2352; &#2332;&#2354; &#2358;&#2379;&#2343;&#2325; 10 &#2354;&#2368;&#2335;&#2352; &#2346;&#2366;&#2344;&#2368; &#2354;&#2375; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2311;&#2360;&#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2366; 1/5 &#2361;&#2376; &#2324;&#2352; &#2354;&#2306;&#2348;&#2366;&#2312; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2366; 1/3 &#2361;&#2376;&#2404; &#2335;&#2376;&#2306;&#2325; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">80 cm</span><span class=\"hqt\" style=\"display:none\">80 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">10 cm</span><span class=\"hqt\" style=\"display:none\">10 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">20 cm</span><span class=\"hqt\" style=\"display:none\">20 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">50 cm</span><span class=\"hqt\" style=\"display:none\">50 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let:- </p><p>H = height, </p><p>So, B = H/5, and L = (B + H) / 3 </p><p>= (H/5 + H) / 3 </p><p>= (6H/5) / 3 = 2H/5. </p><p>Volume = 10 L = 10000 cm<sup>3</sup> = L  X  B  X  H = (2H/5)  X  (H/5)  X  H = 2H<sup>3</sup> / 25. </p><p>10000 = 2H<sup>3</sup> / 25</p><p>H<sup>3</sup> = 125000</p><p>H = 50 cm. </p><p>Option (d) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A cuboid with dimensions 20 cm, 12 cm, and 10 cm is cut into 8 identical pieces by 3 cuts. What will be the total surface area of all the pieces?</p></span><span class=\"hqt\" style=\"display:none\"><p>20 &#2360;&#2375;&#2350;&#2368;, 12 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 10 &#2360;&#2375;&#2350;&#2368; &#2310;&#2351;&#2366;&#2350; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2328;&#2344;&#2366;&#2349; &#2325;&#2379; 3 &#2348;&#2366;&#2352; &#2325;&#2366;&#2335;&#2325;&#2352; 8 &#2360;&#2350;&#2366;&#2344; &#2335;&#2369;&#2325;&#2337;&#2364;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2366;&#2335;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2349;&#2368; &#2335;&#2369;&#2325;&#2337;&#2364;&#2379;&#2306; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1680 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">1680 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">3360 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">3360 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">2240 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">2240 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">1220 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">1220 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Dimensions of identical pieces: </p><p>Length = 20/2 = 10 cm</p><p>Width = 12/2 = 6 cm</p><p>Height = 10/2 = 5 cm </p><p>Surface area of 8 identical cuboids = 8*2(10*6 + 6*5 + 5*10) </p><p>= 16(60 + 30 + 50) </p><p>= 16 * 140 </p><p>= 2240 cm<sup>2</sup> </p>",
    "question_index": 7
