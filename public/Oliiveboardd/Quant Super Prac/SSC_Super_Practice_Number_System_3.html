<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">

                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">

            <div class="welcome-actions">

        <!-- Main Content -->

            <!-- Question Area -->

                <!-- Controls -->

                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>

            <!-- Desktop Navigator Sidebar -->

                        <div class="stat-name">Flagged</div>

                        <div class="stat-name">Unanswered</div>

                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>

        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>On dividing a certain number by 304, we get 43 as the remainder. If the same number is divided by 16, what will be the remainder?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 304 &#2360;&#2375; &#2349;&#2366;&#2327; &#2342;&#2375;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; 43 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 16 &#2360;&#2375; &#2349;&#2366;&#2327; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the required number be N. Given:</p><p>When N is divided by 304, the remainder is 43.</p><p>This implies N = 304k + 43 for some integer k.</p><p>To find the remainder when N is divided by 16, observe:</p><p>304 is a multiple of 16 (304 = 16  X  19).</p><p>Therefore, 304k is divisible by 16, and N mod 16 depends only on 43 mod 16.</p><p>43 divided by 16 leaves a remainder of 11.</p><p>Hence, the remainder is 11.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>When a number is divided by 512 it leaves a remainder 67. If the same number is divided by 32, then what will be the remainder?</p></span><span class=\"hqt\" style=\"display:none\">&#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 512 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; 67 &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 32 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Express the number as 512 X k + 67. </p><p>Since 512 is exactly divisible by 32</p><p>the remainder when dividing by 32 comes only from 67. Dividing 67 by 32 gives a remainder of 67  -  32 X 2 = 67  -  64 = 3.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>When a number is successively divided by 3, 4 and 7, the remainder obtained is 2, 3 and 5, respectively. What will be the remainder when 42 divides the same number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; 3, 4 &#2324;&#2352; 7 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 2, 3 &#2324;&#2352; 5 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 42 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">41</span><span class=\"hqt\" style=\"display:none\">41</span>",
      "<span class=\"eqt\">29</span><span class=\"hqt\" style=\"display:none\">29</span>",
      "<span class=\"eqt\">31</span><span class=\"hqt\" style=\"display:none\">31</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let number = N</p><p>Let two quotients are 'a' and 'b' respectively.</p><p>b = 7 * 1 + 5 = 12</p><p>a = 12 * 4 + 3 = 51</p><p>N = 51 * 3 + 2 = 155 = 3 * 42 + 29</p><p>Remainder when 155 is divided by 42 is 29.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Find the number when successively divided by 3, 5 and 7 leaves remainder 2,1 and 3, respectively, and the last quotient is 3.</p></span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2375; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; 3, 5 &#2324;&#2352; 7 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 2, 1 &#2324;&#2352; 3 &#2348;&#2330;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2309;&#2306;&#2340;&#2367;&#2350; &#2349;&#2366;&#2327;&#2347;&#2354; 3 &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">360</span><span class=\"hqt\" style=\"display:none\">360</span>",
      "<span class=\"eqt\">362</span><span class=\"hqt\" style=\"display:none\">362</span>",
      "<span class=\"eqt\">365</span><span class=\"hqt\" style=\"display:none\">365</span>",
      "<span class=\"eqt\">367</span><span class=\"hqt\" style=\"display:none\">367</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the number be N.</p><p>&#8226; When divided by 3: N = 3  X  Q&#8321; + 2.</p><p>&#8226; When Q&#8321; is divided by 5: Q&#8321; = 5  X  Q&#8322; + 1.</p><p>&#8226; When Q&#8322; is divided by 7: Q&#8322; = 7  X  Q&#8323; + 3, with Q&#8323; = 3 (given).</p><p>Q&#8322;: 7 X 3 + 3 = 21 + 3 = 24.</p><p>Then, Q&#8321; = 5 X 24 + 1 = 120 + 1 = 121.</p><p>Finally, N = 3 X 121 + 2 = 363 + 2 = 365.</p><p>Option (c) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>When a number is divided by 3, the remainder is 2. Again, when the quotient is divided by 7, the remainder is 5. What will be the remainder when the original number is divided by 21?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 3 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; 2 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2332;&#2348; &#2349;&#2366;&#2327;&#2347;&#2354; &#2325;&#2379; 7 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; 5 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2350;&#2370;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; 21 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the number = (3k + 2)</p><p>Now, when the quotient is divided by 7, the remainder is 5.</p><p>So, k = 7m + 5</p><p>So, the number = (3(7m + 5) + 2) = (21m + 17)</p><p>when the original number is divided by 21 = (21m + 17)/21</p><p>So, the remainder = 17</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A natural number n divides 732 and leaves 12 as a remainder. How many values of n are possible? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; n, 732 &#2325;&#2379; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; 12 &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; n &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2366;&#2344; &#2360;&#2306;&#2349;&#2357; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>732 = n * q + 12 </p><p>n * q = 720 </p><p>Factors of 720 = 2<sup>4</sup> * 3<sup>2</sup>*5</p><p>Total number of factors = (4 + 1)(2 + 1)(1 + 1) = 30</p><p>Factors less than or equal to 12 = 1, 2, 3, 4, 5, 6, 8, 9, 10, 12 = total 10</p><p>So, possible values of n = 30  -  10 = 20 </p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>When the integer n is divided by 18, the quotient is x and the remainder is 6. When the integer n is divided by 25, the quotient is y and the remainder is 15. Which of the following is true?</p></span><span class=\"hqt\" style=\"display:none\">&#2332;&#2348; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; n &#2325;&#2379; 18 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2349;&#2366;&#2327;&#2347;&#2354; x &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2358;&#2375;&#2359; 6 &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; n &#2325;&#2379; 25 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2349;&#2366;&#2327;&#2347;&#2354; y &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2358;&#2375;&#2359; 15 &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">25y + 18x = 9</span><span class=\"hqt\" style=\"display:none\">25y + 18x = 9</span>",
      "<span class=\"eqt\">25y - 18x = 9</span><span class=\"hqt\" style=\"display:none\">25y - 18x = 9</span>",
      "<span class=\"eqt\">18x + 25y = 9</span><span class=\"hqt\" style=\"display:none\">18x + 25y = 9</span>",
      "<span class=\"eqt\">18x - 25y = 9</span><span class=\"hqt\" style=\"display:none\">18x - 25y = 9</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>We know dividend = Divisor*quotient + remainder</p><p>n = 18x + 6 = 25y + 15.</p><p>18x + 6 = 25y + 15 </p><p>18x - 25y = 15 - 6 = 9.</p><p>So 18x -25y = 9</p><p>Option (d) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>On dividing 8675123 by a certain number, the quotient is 33624 and the remainder is 131. The divisor is ______.</p></span><span class=\"hqt\" style=\"display:none\"><p>8675123 &#2325;&#2379; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2349;&#2366;&#2327;&#2347;&#2354; 33624 &#2340;&#2341;&#2366; &#2358;&#2375;&#2359;&#2347;&#2354; 131 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;&#2349;&#2366;&#2332;&#2325; ______ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">538</span><span class=\"hqt\" style=\"display:none\">538</span>",
      "<span class=\"eqt\">258</span><span class=\"hqt\" style=\"display:none\">258</span>",
      "<span class=\"eqt\">248</span><span class=\"hqt\" style=\"display:none\">248</span>",
      "<span class=\"eqt\">356</span><span class=\"hqt\" style=\"display:none\">356</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Number = Divisor * Quotient + Remainder</p><p>8675123 = Divisor * 33624 + 131</p><p>Divisor = <img width=104 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20984/image075.png\"></p><p>= <img width=67 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20984/image076.png\"></p><p>= 258</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The divisor is 24 times the quotient and 8 times the remainder. If the quotient is 18, then the dividend is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2332;&#2325;, &#2349;&#2366;&#2327;&#2347;&#2354; &#2325;&#2366; 24 &#2327;&#2369;&#2344;&#2366; &#2324;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2366; 8 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2349;&#2366;&#2327;&#2347;&#2354; 18 &#2361;&#2376;, &#2340;&#2379; &#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">7830</span><span class=\"hqt\" style=\"display:none\">7830</span>",
      "<span class=\"eqt\">7630</span><span class=\"hqt\" style=\"display:none\">7630</span>",
      "<span class=\"eqt\">7840</span><span class=\"hqt\" style=\"display:none\">7840</span>",
      "<span class=\"eqt\">7450</span><span class=\"hqt\" style=\"display:none\">7450</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Quotient = 18</p><p>Divisor = 24 * 18</p><p>Remainder = 24 * 18/8 = 54</p><p>Dividend = Divisor * quotient + Remainder</p><p>= 24 * 18 * 18 + 54</p><p>= 7830</p>",
    "question_index": 8
