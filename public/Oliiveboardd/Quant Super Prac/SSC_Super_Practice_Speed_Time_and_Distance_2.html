<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The effective speed of a boat is 15.2 km/h against the stream and 20.8 km/h along the stream. Find the speed of the stream.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2325;&#2368; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2330;&#2366;&#2354; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 15.2 km/h &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 20.8 km/h &#2361;&#2376;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2330;&#2366;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">18 km/h</span><span class=\"hqt\" style=\"display:none\">18 km/h</span>",
      "<span class=\"eqt\">1.8 km/h</span><span class=\"hqt\" style=\"display:none\">1.8 km/h</span>",
      "<span class=\"eqt\">2.8 km/h</span><span class=\"hqt\" style=\"display:none\">2.8 km/h</span>",
      "<span class=\"eqt\">3 km/h</span><span class=\"hqt\" style=\"display:none\">3 km/h</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Speed of boat against the stream = x  -  y = 15.2 km/h</p><p>Speed of boat along the stream = x + y = 20.8 km/h</p><p>x = Speed of boat in still water</p><p>y = Speed of stream</p><p>Speed of stream = (20.8  -  15.2)/2</p><p>= 2.8 km/h</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A man wishes to cover 1 km distance in river water. In still water he takes 12 minutes to cover it, but in the flowing river he takes 13 minutes. The speed of the flowing water of the river is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2342;&#2350;&#2368; &#2344;&#2342;&#2368; &#2325;&#2375; &#2346;&#2366;&#2344;&#2368; &#2350;&#2375;&#2306; 1 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2381;&#2341;&#2367;&#2352; &#2346;&#2366;&#2344;&#2368; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; &#2311;&#2360;&#2375; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 12 &#2350;&#2367;&#2344;&#2335; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2348;&#2361;&#2340;&#2368; &#2344;&#2342;&#2368; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; 13 &#2350;&#2367;&#2344;&#2335; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2344;&#2342;&#2368; &#2325;&#2375; &#2348;&#2361;&#2340;&#2375; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2327;&#2340;&#2367; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">25 km/h</span><span class=\"hqt\" style=\"display:none\">25 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">5/13 km/h</span><span class=\"hqt\" style=\"display:none\">5/13 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">22 km/h</span><span class=\"hqt\" style=\"display:none\">22 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">7/12 km/h</span><span class=\"hqt\" style=\"display:none\">7/12 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Still water speed = 1/(12/60) = 5 km/h</p><p>River speed (against current) = 1/(13/60) = 60/13 km/h</p><p>River speed = 5 - 60/13 = 5/13 km/h</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of the speeds of a boat upstream and downstream is 2:3, and the sum of these two speeds is 15 km/h. What is the speed of the stream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2325;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2327;&#2340;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2:3 &#2361;&#2376;, &#2324;&#2352; &#2311;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 15 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3.5 km/h</span><span class=\"hqt\" style=\"display:none\">3.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">1.5 km/h</span><span class=\"hqt\" style=\"display:none\">1.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">3 km/h</span><span class=\"hqt\" style=\"display:none\">3 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">2.5 km/h</span><span class=\"hqt\" style=\"display:none\">2.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Upstream = b - s, Downstream = b + s</p><p>2b = 15, b = 7.5</p><p>(7.5 - s)/(7.5 + s) = 2/3</p><p>3(7.5 - s) = 2(7.5 + s)</p><p>22.5 - 3s = 15 + 2s</p><p>s = 1.5 km/h</p><p>Option (b) is the correct answer</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Ashu can row 7.5 km an hour in still water. He finds that it takes four times as much time to row upstream, as it takes to row downstream. The speed of the stream is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2358;&#2369; &#2360;&#2381;&#2341;&#2367;&#2352; &#2346;&#2366;&#2344;&#2368; &#2350;&#2375;&#2306; 7.5 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2352;&#2347;&#2364;&#2381;&#2340;&#2366;&#2352; &#2360;&#2375; &#2344;&#2366;&#2357; &#2330;&#2354;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2344;&#2375; &#2346;&#2366;&#2351;&#2366; &#2325;&#2367; &#2313;&#2360;&#2375; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2330;&#2354;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2332;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;, &#2313;&#2360;&#2360;&#2375; &#2330;&#2366;&#2352; &#2327;&#2369;&#2344;&#2366; &#2332;&#2364;&#2381;&#2351;&#2366;&#2342;&#2366; &#2360;&#2350;&#2351; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2330;&#2354;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">3.5 km/h</span><span class=\"hqt\" style=\"display:none\">3.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">1.5 km/h</span><span class=\"hqt\" style=\"display:none\">1.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">4.5 km/h</span><span class=\"hqt\" style=\"display:none\">4.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">2.5 km/h</span><span class=\"hqt\" style=\"display:none\">2.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Speed of Ashu = 7.5 km/h</p><p>Let speed of stream = s km/h</p><p>Now,</p><p>4 * 1/(7.5 + s) = 1/(7.5  -  s)</p><p>4(7.5  -  s) = 7.5 + s</p><p>30  -  4s = 7.5 + s</p><p>5s = 22.5</p><p>s = 4.5</p><p>Hence, speed of stream = 4.5 km/h</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A boat running upstream takes 10 hours to cover a certain distance, while it takes 7 hours to cover the same distance running downstream. What is the ratio between the speed of the boat and that of the water current, respectively?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2325;&#2379; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2330;&#2354;&#2340;&#2375; &#2361;&#2369;&#2319; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 10 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; 7 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2344;&#2366;&#2357; &#2325;&#2368; &#2330;&#2366;&#2354; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">17 : 5</span><span class=\"hqt\" style=\"display:none\">17 : 5</span>",
      "<span class=\"eqt\">3 : 17</span><span class=\"hqt\" style=\"display:none\">3 : 17</span>",
      "<span class=\"eqt\">2 : 17</span><span class=\"hqt\" style=\"display:none\">2 : 17</span>",
      "<span class=\"eqt\">17 : 3</span><span class=\"hqt\" style=\"display:none\">17 : 3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let speed of boat be A kmph and speed of water be B kmph.</p><p>According to the question, distance is same.</p><p>10 * (A - B) = 7 * (A + B)</p><p>10A  -  10B = 7A + 7B</p><p>3A = 17B</p><p>A/B = 17/3</p><p>A: B = 17: 3</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A motorboat, whose speed in 15 km/h in still water goes 50 km downstream and comes back in a total of 7 hours 30 minutes. The speed of the stream (in km/h) is:</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2350;&#2379;&#2335;&#2352;&#2348;&#2379;&#2335;, &#2332;&#2367;&#2360;&#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; 15 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;, &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 50 &#2325;&#2367;&#2350;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2325;&#2369;&#2354; 7 &#2328;&#2306;&#2335;&#2375; 30 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2357;&#2366;&#2346;&#2360; &#2310;&#2340;&#2368; &#2361;&#2376;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; (&#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>We know that downstream speed = Speed of Boat + speed of stream</p><p>Upstream speed = Speed of Boat  -  speed of stream</p><p>Speed of Boat= 15 km/hr</p><p>Let speed of stream =y</p><p>So according to question :-</p><p>50/(15+y) + 50/(15-y) = 7+ 30/60</p><p>&rarr; 50 [1/(15+y) + 1/(15-y)] =15/2</p><p>&rarr; 50(30/(225-y<sup>2</sup>))=15/2</p><p>&rarr; 1500*2=15(225-y<sup>2</sup>)</p><p>&rarr; y<sup>2</sup>=25</p><p>So y=5 km/h</p><p>Option (b) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>A boatman rows 2 km in 10 mins, along the stream and 12 km in 2 hours against the stream. What is the speed of the stream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357;&#2367;&#2325; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 10 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; 2 &#2325;&#2367;&#2350;&#2368; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 2 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 12 &#2325;&#2367;&#2350;&#2368; &#2344;&#2366;&#2357; &#2330;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3 km/h</span><span class=\"hqt\" style=\"display:none\">3 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">2.5 km/h</span><span class=\"hqt\" style=\"display:none\">2.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">4 km/h</span><span class=\"hqt\" style=\"display:none\">4 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">3.5 km/h</span><span class=\"hqt\" style=\"display:none\">3.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let boat's speed = b km/h</p><p>Stream's speed = s km/h</p><p>Downstream speed = b + s</p><p>b + s = 2/(10/60) </p><p>b + s = 12 ------(1)</p><p>Upstream speed = b - s</p><p>b  -  s = 12/2 = 6 -----(2)</p><p>Eqn (1)  -  eqn (2):</p><p>(b + s) - (b  -  s) = 12  -  6</p><p>2s = 6</p><p>s = 3 </p><p>Stream's speed = 3 km/h</p>",
    "question_index": 6
  },
  {

    "question": "<span class=\"eqt\"><p>A man can row a boat at speed 8 km/h in still water. It takes thrice as long to row upstream as it does to row downstream. Find the speed of the stream (in km/h). </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; 8 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2344;&#2366;&#2357; &#2330;&#2354;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2344;&#2366;&#2357; &#2330;&#2354;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2344;&#2366;&#2357; &#2330;&#2354;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2350;&#2351; &#2360;&#2375; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; (&#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "correct_option_id": 1,
    "solution": "<p>Speed of boat in still water = 8 km/h </p><p>Let speed of stream = s km/h </p><p>and the distance cover in one side = d km</p><p>Downstream speed = 8 + s </p><p>Upstream speed = 8 - s </p><p>Time upstream = d/(8 - s) </p><p>Time downstream = d/(8 + s) </p><p>Time taken in upstream = 3 * time taken in downstream </p><p>d/(8 - s) = 3 * d/(8 + s) </p><p>8 + s = 24  -  3s </p><p>4s = 16 </p><p>s = 4 km/h </p>",

    "question": "<span class=\"eqt\"><p>A boat covers a distance of 12 km in 1 hour upstream and in 45 minutes downstream. Find the speed of the boat and the stream (in km/h).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; 12 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 1 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 45 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2344;&#2366;&#2357; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2330;&#2366;&#2354; (km/h &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A boat can cover 120 km upstream and back in a total of 30 hours, and 25 km upstream and 40 km downstream in a total of 7 hours. How much distance will the boat cover in 16 hours in still water?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2332;&#2366;&#2344;&#2375; &#2324;&#2352; &#2357;&#2366;&#2346;&#2360; &#2310;&#2344;&#2375; &#2325;&#2368; &#2325;&#2369;&#2354; 120 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2369;&#2354; 30 &#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376; &#2340;&#2341;&#2366; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 25 km &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 40 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2369;&#2354; 7 &#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; 16 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2375;&#2327;&#2368;?</p></span>",

    "question": "<span class=\"eqt\"><p>A boat covers 24 km upstream and 36 km downstream in 10 hours, and 36 km upstream and 24 km downstream in 12 hours. The speed of the current is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; 10 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 24 &#2325;&#2367;&#2350;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2324;&#2352; 36 &#2325;&#2367;&#2350;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2340;&#2341;&#2366; 12 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; 36 &#2325;&#2367;&#2350;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2324;&#2352; 24 &#2325;&#2367;&#2350;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2361;&#2376;:</p></span>",
    "options": [

      "<span class=\"eqt\">33/13 km/h</span><span class=\"hqt\" style=\"display:none\">33/13 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">25/8 km/h</span><span class=\"hqt\" style=\"display:none\">25/8 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">24/7 km/h</span><span class=\"hqt\" style=\"display:none\">24/7 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"

    "correct_option_id": 2,
    "solution": "<p>Let boat's speed = b km/h</p><p>Current's speed = s km/h</p><p>Let 1/(b  -  s) = u, 1/(b + s) = v</p><p>ATQ  - </p><p>24/(b - s) + 36/(b + s) = 10 </p><p>12u + 18v = 5 -----(1)</p><p>36/(b - s) + 24/(b + s) = 12 </p><p>12u + 8v = 4 -----(2)</p><p>eqn(1)  -  eqn(2):</p><p>10v = 1</p><p>v = 1/10</p><p>b + s = 10 ----(3)</p><p>12u + 8*1/10 = 4</p><p>12u = 4  -  4/5 = 16/5</p><p>u = 4/15</p><p>b  -  s = 15/4 ----(4)</p><p>Eqn(3)  -  eqn(4):</p><p>(b + s)  -  (b  -  s) = 10  -  15/4</p><p>2s = 25/4</p><p>s = 25/8</p><p>Current's speed = 25/8 km/h</p>",
    "question_index": 12

    "question": "<span class=\"eqt\"><p>A boat covers a distance of 80 km downstream in 8 h while it takes 10 h to cover the same distance upstream. What is the speed (in km/h) of the boat in still water?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 80 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 8 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; 10 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2330;&#2366;&#2354; (km/h &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

  {
    "question": "<span class=\"eqt\"><p>A man's speed in still water is 4 km/h more than the speed of the current. If the man takes a total of 10 h to cover 45 km downstream and 35 km upstream, then the speed of the man in still water is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2368; &#2327;&#2340;&#2367; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; 4 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 45 &#2325;&#2367;&#2350;&#2368; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 35 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; 10 &#2328;&#2306;&#2335;&#2375; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;:</p></span>",

    "correct_option_id": 0,
    "solution": "<p>Let current speed = c km/h, </p><p>Still water speed = c + 4 km/h</p><p>Downstream speed = (c + 4) + c = 2c + 4</p><p>Upstream speed = (c + 4) - c = 4 km/h</p><p>Time = 10 h</p><p>45/(2c + 4) + 35/4 = 10</p><p>45/(2c + 4) = 5/4</p><p>2c + 4 = 36</p><p>2c = 32</p><p>c = 16</p><p>Speed of the man in still water = 16 + 4 = 20 km/h</p>",

    "question": "<span class=\"eqt\"><p>Dharmendra can row 80 km upstream and 110 km downstream in 13 hours. Also, he can row 60 km upstream and 88 km downstream in 10 hours. What is the speed (in km/h) of the current?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2343;&#2352;&#2381;&#2350;&#2375;&#2306;&#2342;&#2381;&#2352; 13 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 80 km &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 110 km &#2344;&#2366;&#2357; &#2330;&#2354;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2366;&#2341; &#2361;&#2368;, &#2357;&#2361; 10 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 60 km &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 88 km &#2344;&#2366;&#2357; &#2330;&#2354;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2330;&#2366;&#2354; (km/h &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "solution": "<p>Let upstream and downstream speed is 'U' km/h and 'D' km/h respectively.</p><p>According to the question:</p><p><img width=96 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23333/image069.png\"></p><p><img width=167 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23333/image070.png\"></p><p><img width=164 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23333/image071.png\"></p><p>From (1) and (2):</p><p>4/U = 0.4</p><p>U = 10</p><p>From equation (2):</p><p><img width=156 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23333/image072.png\"></p><p>D = 22</p><p>Speed of current = (D  -  U)/2</p><p>= (22  -  10)/2</p><p>= 6 km/h</p>",

  {
    "question": "<span class=\"eqt\"><p>A boat running upstream takes 10 hours to cover a certain distance, while it takes 7 hours to cover the same distance running downstream. What is the ratio between the speed of the boat and that of the water current, respectively?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2325;&#2379; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 10 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; 7 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2344;&#2366;&#2357; &#2325;&#2368; &#2330;&#2366;&#2354; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    "solution": "<p>Ratio of upstream speed to downstream speed is inversely proportional to the ratio of time taken while travelling same distance upstream to downstream.</p><p>Ratio of upstream speed to downstream speed = 1/10: 1/7 = 7: 10</p><p>Ratio of speed of the boat to the water current = (10 + 7): (10  -  7)</p><p>= 17: 3</p>",

  {
    "question": "<span class=\"eqt\"><p>The speed of a boat in still water is 12 km/h, and the speed of the stream is 3 km/h. A man goes to a place by boat, 45 km and comes back to the starting point. Find the total time taken by him.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; 12 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;, &#2340;&#2341;&#2366; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; 3 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2366;&#2357; &#2360;&#2375; &#2325;&#2367;&#2360;&#2368; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; 45 &#2325;&#2367;&#2350;&#2368; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2357;&#2366;&#2346;&#2360; &#2310;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2369;&#2354; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
