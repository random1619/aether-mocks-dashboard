    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A and B borrowed Rs.20910 each from a shopkeeper. A and B returned amount in two equal installments at 4% and 5% rate of simple interest. What is the total interest received by shopkeeper?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2344;&#2375; &#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2360;&#2375; 20910 &#2352;&#2369;&#2346;&#2351;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2367;&#2319;&#2404; A &#2324;&#2352; B &#2344;&#2375; &#2342;&#2379; &#2348;&#2352;&#2366;&#2348;&#2352; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; 4% &#2324;&#2352; 5% &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2352;&#2366;&#2358;&#2367; &#2354;&#2380;&#2335;&#2366;&#2312;&#2404; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2325;&#2379; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2348;&#2381;&#2351;&#2366;&#2332; &#2350;&#2367;&#2354;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.2450</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.2450</span>",
      "<span class=\"eqt\">Rs.2380</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.2380</span>",
      "<span class=\"eqt\">Rs.2760</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.2760</span>",
      "<span class=\"eqt\">Rs.2530</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.2530</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>For A:</p><p>Let each installment = Rs. a</p><p>Then, 20910 x (1 + 4 x 2/100) = a x (1 + 4 x 1/100) + a</p><p>a = 11070</p><p>For B:</p><p>Let each installment = Rs. b</p><p>Then, 20910 x (1 + 5 x 2/100) = b x (1 + 5 x 1/100) + b</p><p>b = 11220</p><p>Then, total interest received by shopkeeper = 2a + 2b  -  2 x 20910</p><p>= 2 x 11070 + 2 x 11220  -  2 x 20910</p><p>= <b>Rs.2760</b></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A coffee machine is available for selling at Rs.9100 of instant payment or three equal instalments. If rate of interest charged is 20% CI, then how much extra amount paid by a customer if purchased the coffee machine by paying instalments?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2377;&#2347;&#2368; &#2350;&#2358;&#2368;&#2344; 9100 &#2352;&#2369;&#2346;&#2351;&#2375; &#2340;&#2340;&#2381;&#2325;&#2366;&#2354; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2351;&#2366; &#2340;&#2368;&#2344; &#2348;&#2352;&#2366;&#2348;&#2352; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2346;&#2352; &#2348;&#2375;&#2330;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; 20% &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2377;&#2347;&#2368; &#2350;&#2358;&#2368;&#2344; &#2326;&#2352;&#2368;&#2342;&#2344;&#2375; &#2346;&#2352; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2368; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.3240</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.3240</span>",
      "<span class=\"eqt\">Rs.4320</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.4320</span>",
      "<span class=\"eqt\">Rs.3860</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.3860</span>",
      "<span class=\"eqt\">Rs.4820</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.4820</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Cost price of machine = Rs.9100</p><p>Let equal instalments = 'P'</p><p>Now,</p><p>9100 * 1.2<sup>3</sup> = P + P * 1.2 + P * 1.2<sup>2</sup></p><p>15724.8 = P * (1 + 1.2 + 1.44)</p><p>P = 4320</p><p>Total amount of instalments paid = 4320 * 3 = Rs.12960</p><p>Extra amount paid = 12960  -  9100</p><p>= Rs.3860</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A farmer took a loan of &#8377;23100 from landholder and paid it in two equal annual instalments of &#8377;15120 each at R% rate of compound interest. What is the value of R?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2367;&#2360;&#2366;&#2344; &#2344;&#2375; &#2349;&#2370;&#2360;&#2381;&#2357;&#2366;&#2350;&#2368; &#2360;&#2375; 23100 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2315;&#2339; &#2354;&#2367;&#2351;&#2366; &#2324;&#2352; &#2311;&#2360;&#2375; 15120 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2342;&#2379; &#2348;&#2352;&#2366;&#2348;&#2352; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; R% &#2342;&#2352; &#2346;&#2352; &#2330;&#2369;&#2325;&#2366;&#2351;&#2366;&#2404; R &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">15%</span><span class=\"hqt\" style=\"display:none\">15%</span>",
      "<span class=\"eqt\">10%</span><span class=\"hqt\" style=\"display:none\">10%</span>",
      "<span class=\"eqt\">18%</span><span class=\"hqt\" style=\"display:none\">18%</span>",
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Total amount of loan = &#8377;23100</p><p><img width=211 height=63 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21860/image003.png\"></p><p>R = 20%</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Ashutosh bought a table of &#8377;12425 and made a down payment of some amount. He paid the remaining amount in two equal instalments of &#8377;6171 at 10% rate of compound interest. Find the down payment made by Ashutosh.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2358;&#2369;&#2340;&#2379;&#2359; &#2344;&#2375; &#8377;12425 &#2350;&#2375;&#2306; &#2319;&#2325; &#2335;&#2375;&#2348;&#2354; &#2326;&#2352;&#2368;&#2342;&#2368; &#2324;&#2352; &#2325;&#2369;&#2331; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2309;&#2327;&#2381;&#2352;&#2367;&#2350; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404; &#2313;&#2360;&#2344;&#2375; &#2358;&#2375;&#2359; &#2352;&#2366;&#2358;&#2367; &#2325;&#2379; &#8377;6171 &#2325;&#2368; &#2342;&#2379; &#2348;&#2352;&#2366;&#2348;&#2352; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; 10% &#2330;&#2325;&#2381;&#2352;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2330;&#2369;&#2325;&#2366;&#2351;&#2366;&#2404; &#2310;&#2358;&#2369;&#2340;&#2379;&#2359; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2309;&#2327;&#2381;&#2352;&#2367;&#2350; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;1828</span><span class=\"hqt\" style=\"display:none\">&#8377;1828</span>",
      "<span class=\"eqt\">&#8377;1960</span><span class=\"hqt\" style=\"display:none\">&#8377;1960</span>",
      "<span class=\"eqt\">&#8377;1680</span><span class=\"hqt\" style=\"display:none\">&#8377;1680</span>",
      "<span class=\"eqt\">&#8377;1715</span><span class=\"hqt\" style=\"display:none\">&#8377;1715</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let down payment = d</p><p><img width=232 height=63 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21860/image004.png\"></p><p>12425  -  d = 5610 + 5100</p><p>d = 12425 - 10710</p><p>d = &#8377;1715</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Ramesh took a loan of &#8377;41600 from a bank and paid it in two equal installments of &#8377;23200 each at a certain rate of simple interest. What is the rate of interest?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2350;&#2375;&#2358; &#2344;&#2375; &#2319;&#2325; &#2348;&#2376;&#2306;&#2325; &#2360;&#2375; 41600 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2315;&#2339; &#2354;&#2367;&#2351;&#2366; &#2324;&#2352; &#2311;&#2360;&#2375; 23200 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2342;&#2379; &#2348;&#2352;&#2366;&#2348;&#2352; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2330;&#2369;&#2325;&#2366;&#2351;&#2366;&#2404; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">10%</span><span class=\"hqt\" style=\"display:none\">10%</span>",
      "<span class=\"eqt\">8%</span><span class=\"hqt\" style=\"display:none\">8%</span>",
      "<span class=\"eqt\">4%</span><span class=\"hqt\" style=\"display:none\">4%</span>",
      "<span class=\"eqt\">12%</span><span class=\"hqt\" style=\"display:none\">12%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the rate of interest = r%</p><p>According to the question-</p><p>41600(1 + r*2/100) = 23200(1 + r*1/100) + 23200</p><p>416(100 + 2r) = 232(200 + r)</p><p>600r = 4800</p><p>r = 8%</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A man bought AC of &#8377;37376 and made a down payment of &#8377;1256 and paid the remaining amount in four equal installments at 5% rate of simple interest. Find the value of each installment.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#8377;37376 &#2325;&#2366; AC &#2326;&#2352;&#2368;&#2342;&#2366; &#2324;&#2352; &#8377;1256 &#2325;&#2366; &#2337;&#2366;&#2313;&#2344;&#2346;&#2375;&#2350;&#2375;&#2306;&#2335; &#2325;&#2367;&#2351;&#2366; &#2340;&#2341;&#2366; &#2358;&#2375;&#2359; &#2352;&#2366;&#2358;&#2367; &#2325;&#2379; 5% &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2330;&#2366;&#2352; &#2348;&#2352;&#2366;&#2348;&#2352; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2330;&#2369;&#2325;&#2366;&#2351;&#2366;&#2404; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2367;&#2360;&#2381;&#2340; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;13395</span><span class=\"hqt\" style=\"display:none\">&#8377;13395</span>",
      "<span class=\"eqt\">&#8377;12560</span><span class=\"hqt\" style=\"display:none\">&#8377;12560</span>",
      "<span class=\"eqt\">&#8377;10530</span><span class=\"hqt\" style=\"display:none\">&#8377;10530</span>",
      "<span class=\"eqt\">&#8377;10080</span><span class=\"hqt\" style=\"display:none\">&#8377;10080</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let each installment = p</p><p>Down payment = &#8377;1256</p><p>Remaining amount = 37376  -  1256 = 36120</p><p>Now,</p><p>36120(1 + 5*4/100) = p(1 + 5*3/100) + p(1 + 5*2/100) + p(1 + 5*1/100) + p</p><p>36120*120 = 115p + 110p + 105p + 100p</p><p>p = &#8377;10080</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Deepa bought a gift item at a certain sum and paid the sum in three equal annual installments of &#8377;6800 in three years at 12% rate of simple interest. Find the sum at which she bought the gift item.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368;&#2346;&#2366; &#2344;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2366;&#2358;&#2367; &#2346;&#2352; &#2319;&#2325; &#2313;&#2346;&#2361;&#2366;&#2352; &#2357;&#2360;&#2381;&#2340;&#2369; &#2326;&#2352;&#2368;&#2342;&#2368; &#2324;&#2352; &#2313;&#2360; &#2352;&#2366;&#2358;&#2367; &#2325;&#2379; 12% &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2340;&#2368;&#2344; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#8377;6800 &#2325;&#2368; &#2340;&#2368;&#2344; &#2348;&#2352;&#2366;&#2348;&#2352; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2330;&#2369;&#2325;&#2366;&#2351;&#2366;&#2404; &#2357;&#2361; &#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360; &#2346;&#2352; &#2313;&#2360;&#2344;&#2375; &#2313;&#2346;&#2361;&#2366;&#2352; &#2357;&#2360;&#2381;&#2340;&#2369; &#2326;&#2352;&#2368;&#2342;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;12500</span><span class=\"hqt\" style=\"display:none\">&#8377;12500</span>",
      "<span class=\"eqt\">&#8377;20250</span><span class=\"hqt\" style=\"display:none\">&#8377;20250</span>",
      "<span class=\"eqt\">&#8377;14670</span><span class=\"hqt\" style=\"display:none\">&#8377;14670</span>",
      "<span class=\"eqt\">&#8377;16800</span><span class=\"hqt\" style=\"display:none\">&#8377;16800</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let Deepa bought a gift item in &#8377;'a'.</p><p>a(1 + 12*3/100) = 6800*(1 + 12*2/100) + 6800(1 + 12*1/100) + 6800</p><p>136a = 6800*(124 + 112 + 100)</p><p>a = &#8377;16800</p>",
    "question_index": 6
