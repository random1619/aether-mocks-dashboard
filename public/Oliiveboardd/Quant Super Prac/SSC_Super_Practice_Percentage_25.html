<body>
    <!-- Welcome Screen -->

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>For a certain article, if discount is 22% the profit is 17%. If the discount is 12%, then the profit is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2375; &#2354;&#2367;&#2319;, &#2351;&#2342;&#2367; &#2331;&#2370;&#2335; 22% &#2361;&#2376;, &#2340;&#2379; &#2354;&#2366;&#2349; 17% &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2331;&#2370;&#2335; 12% &#2361;&#2376;, &#2340;&#2379; &#2354;&#2366;&#2349; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">17%</span><span class=\"hqt\" style=\"display:none\">17%</span>",
      "<span class=\"eqt\">32%</span><span class=\"hqt\" style=\"display:none\">32%</span>",
      "<span class=\"eqt\">7%</span><span class=\"hqt\" style=\"display:none\">7%</span>",
      "<span class=\"eqt\">19%</span><span class=\"hqt\" style=\"display:none\">19%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let marked price of article = Rs.100</p><p>Selling price of article = 100 * 78/100 = Rs.78</p><p>Profit% = 17%</p><p>Cost price of article = 100 * 78/(100 + 17)</p><p>= 100 * 78/117 = 100 * 2/3 = Rs.200/3</p><p>If the discount is 12%, then selling price will be = 100 * 88/100 = Rs.88</p><p>Profit% = [88  -  (200/3)] * 100/(200/3) = 64 * 100/200 = 32%.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A person bought an Air  -  conditioner at 15% discount on the marked price. If he had not got discount, he would have to pay Rs.2250 more. Find the cost price at which the person bought the Air  -  conditioner.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 15% &#2325;&#2368; &#2331;&#2370;&#2335; &#2346;&#2352; &#2319;&#2325; &#2319;&#2351;&#2352; &#2325;&#2306;&#2337;&#2368;&#2358;&#2344;&#2352; &#2326;&#2352;&#2368;&#2342;&#2366;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360;&#2375; &#2325;&#2379;&#2312; &#2331;&#2370;&#2335; &#2344;&#2361;&#2368;&#2306; &#2350;&#2367;&#2354;&#2368; &#2361;&#2379;&#2340;&#2368;, &#2340;&#2379; &#2313;&#2360;&#2375; &#2352;&#2369;. 2250 &#2325;&#2366; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366; &#2346;&#2396;&#2340;&#2366;&#2404; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#2325;&#2367;&#2360; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2319;&#2351;&#2352; &#2325;&#2306;&#2337;&#2368;&#2358;&#2344;&#2352; &#2326;&#2352;&#2368;&#2342;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 12750</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 12750</span>",
      "<span class=\"eqt\">Rs. 13400</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 13400</span>",
      "<span class=\"eqt\">Rs. 15000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 15000</span>",
      "<span class=\"eqt\">Rs. 11300</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 11300</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the marked price of the article be x</p><p>Then according to question,</p><p>x * 15/100 = Rs. 2250</p><p>x = Rs. 15000</p><p>Cost price of the article will be 15000  -  2250 = Rs.12750</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Find the profit percentage of a person on an article if the ratio of cost price and selling price of the article is 9 : 15(Approx.). </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2324;&#2352; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 9: 15 &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360; &#2357;&#2360;&#2381;&#2340;&#2369; &#2346;&#2352; &#2325;&#2367;&#2360;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;(&#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">54</span><span class=\"hqt\" style=\"display:none\">54</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">67</span><span class=\"hqt\" style=\"display:none\">67</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the cost price and selling price of the article be 9x and 15x respectively</p><p>According to question,</p><p>Profit% = (S.P.  -  C.P.)/C.P. * 100</p><p>= (15x  -  9x)/9x * 100 </p><p>= 6x/9x * 100 = 66.66666 &#8773; 67%</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The selling price of 15 oranges is the same as the cost price of 19 oranges. What is the approximate profit percentage?</p></span><span class=\"hqt\" style=\"display:none\"><p>15 &#2360;&#2306;&#2340;&#2352;&#2375; &#2325;&#2366; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351;, 19 &#2360;&#2306;&#2340;&#2352;&#2375; &#2325;&#2375; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2404; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">15.34%</span><span class=\"hqt\" style=\"display:none\">15.34%</span>",
      "<span class=\"eqt\">18.75%</span><span class=\"hqt\" style=\"display:none\">18.75%</span>",
      "<span class=\"eqt\">32.5%</span><span class=\"hqt\" style=\"display:none\">32.5%</span>",
      "<span class=\"eqt\">26.67%</span><span class=\"hqt\" style=\"display:none\">26.67%</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>According to the question,</p><p>Profit = cost price of (19-15) oranges = 4 oranges.</p><p>Profit percentage = (profit/cost price)  X 100 = (4/15)  X  100 = 26.67%</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Rajkumar decides to sell his watch at a discount of 5%. However, his brother purchases it from him and receives an 8% discount. Rajkumar loses Rs.45 in profit as a result of this. What was the watch's marked price?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2325;&#2369;&#2350;&#2366;&#2352; &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2328;&#2337;&#2364;&#2368; &#2325;&#2379; 5% &#2325;&#2368; &#2331;&#2370;&#2335; &#2346;&#2352; &#2348;&#2375;&#2330;&#2344;&#2375; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2325;&#2367;&#2351;&#2366;&#2404; &#2361;&#2366;&#2354;&#2366;&#2305;&#2325;&#2367; &#2313;&#2360;&#2325;&#2366; &#2349;&#2366;&#2312; &#2313;&#2360;&#2360;&#2375; &#2357;&#2361; &#2328;&#2396;&#2368; &#2326;&#2352;&#2368;&#2342;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2375; 8% &#2325;&#2368; &#2331;&#2370;&#2335; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2352;&#2366;&#2332;&#2325;&#2369;&#2350;&#2366;&#2352; &#2325;&#2379; &#2354;&#2366;&#2349; &#2350;&#2375;&#2306; &#2352;&#2369;.45 &#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2328;&#2337;&#2364;&#2368; &#2325;&#2366; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2367;&#2340;&#2344;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.1500</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.1500</span>",
      "<span class=\"eqt\">Rs.1410</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.1410</span>",
      "<span class=\"eqt\">Rs.1430</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.1430</span>",
      "<span class=\"eqt\">Rs.1560</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.1560</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the marked price of watch = 100x</p><p>Price at which Rajkumar intended to sell the Watch = 95% of 100x = 95x</p><p>Price at which his brother purchases the watch = 92% of 100x = 92x</p><p>According to the question:</p><p>95x  -  92x = 45</p><p>x = 15</p><p>Marked price = 100x = &#8377;1500</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Riya sold an item to Vani at 10% loss and Vani sold it to Maya at Rs. 4950 at 10% profit. Riya bought the item by spending -</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2367;&#2351;&#2366; &#2344;&#2375; &#2357;&#2366;&#2339;&#2368; &#2325;&#2379; 10% &#2361;&#2366;&#2344;&#2367; &#2346;&#2352; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2348;&#2375;&#2330;&#2368; &#2324;&#2352; &#2357;&#2366;&#2339;&#2368; &#2344;&#2375; &#2350;&#2366;&#2351;&#2366; &#2325;&#2379; &#2351;&#2361; &#2357;&#2360;&#2381;&#2340;&#2369; 4950 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; 10% &#2354;&#2366;&#2349; &#2346;&#2352; &#2348;&#2375;&#2330; &#2342;&#2367;&#2351;&#2366;&#2404; &#2352;&#2367;&#2351;&#2366; &#2344;&#2375; &#2313;&#2360; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; &#2326;&#2352;&#2368;&#2342;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2340;&#2344;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2326;&#2352;&#2381;&#2330; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 7000</span><span class=\"hqt\" style=\"display:none\">7000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 2000</span><span class=\"hqt\" style=\"display:none\">2000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 5000</span><span class=\"hqt\" style=\"display:none\">5000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 5300</span><span class=\"hqt\" style=\"display:none\">5300 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the cost price of item for Riya = m</p><p>Cost price of item for Riya = 0.9m</p><p>Cost price of item for Maya = 0.9m * 110/100 = 0.99m</p><p>According to the question:</p><p>0.99m = 4950</p><p>m = 4950/0.99</p><p>m = Rs. 5000</p><p><b>Alternate method-</b></p><p>Let the cost price of item for Riya = m</p><p>m * 0.9 * 1.1 = 4950</p><p>m = 4950/0.99 = Rs. 5000</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>A shopkeeper purchased a car for Rs. 88500 and spent Rs. 1250 on transportation. If he sold the bike for Rs. 107700, then find the profit percent.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2344;&#2375; 88500 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2366;&#2352; &#2326;&#2352;&#2368;&#2342;&#2368; &#2324;&#2352; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344; &#2346;&#2352; 1250 &#2352;&#2369;&#2346;&#2351;&#2375; &#2326;&#2352;&#2381;&#2330; &#2325;&#2367;&#2319;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360;&#2344;&#2375; &#2325;&#2366;&#2352; &#2325;&#2379; 107700 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2366;, &#2340;&#2379; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">18%</span><span class=\"hqt\" style=\"display:none\">18%</span>",
      "<span class=\"eqt\">24%</span><span class=\"hqt\" style=\"display:none\">24%</span>",
      "<span class=\"eqt\">25%</span><span class=\"hqt\" style=\"display:none\">25%</span>",
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>C.P = 88500 + 1250 = Rs. 89750</p><p>S.P = C.P * (100 + Profit)/100</p><p>107700 = 89750 * (100 + Profit)/100</p><p>100 + Profit% = 107700 * 100/89750</p><p>100 + Profit% = 120</p><p>Profit = 20%</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A shopkeeper sold an article for Rs. 504 per article, there was a loss of 16%. If the shopkeeper incurs a total loss of Rs. 4128, then how many articles were sold?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2344;&#2375; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; 504 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2348;&#2375;&#2330;&#2366;, &#2313;&#2360;&#2375; 16% &#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2361;&#2369;&#2312;&#2404; &#2351;&#2342;&#2367; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2325;&#2379; &#2325;&#2369;&#2354; 4128 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2361;&#2369;&#2312;, &#2340;&#2379; &#2313;&#2360;&#2344;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2319;&#2305; &#2348;&#2375;&#2330;&#2368;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">37</span><span class=\"hqt\" style=\"display:none\">37</span>",
      "<span class=\"eqt\">51</span><span class=\"hqt\" style=\"display:none\">51</span>",
      "<span class=\"eqt\">47</span><span class=\"hqt\" style=\"display:none\">47</span>",
      "<span class=\"eqt\">43</span><span class=\"hqt\" style=\"display:none\">43</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>S.P = C.P * (100  -  Loss)/100</p><p>504 = C.P * (100  -  16)/100</p><p>C.P = 504 * 100/84 = Rs. 600</p><p>Loss = 600  -  504 = 96</p><p>Hence, the total articles sold = 4128/96 = 43</p>",
    "question_index": 7
  },
  {

    "question": "<span class=\"eqt\"><p>Marked price and cost price of an item are in the ratio 7: 4 respectively. After allowing a discount of 24% on the marked price of the item, item is sold at Rs.1330. Find the profit (in Rs.) earned on the item. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2375; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2324;&#2352; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 7: 4 &#2361;&#2376;&#2404; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2375; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 24% &#2325;&#2368; &#2331;&#2370;&#2335; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; &#2352;&#2369;.1330 &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2360;&#2381;&#2340;&#2369; &#2346;&#2352; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2354;&#2366;&#2349; (&#2352;&#2369;. &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Sankar gives a note book free on purchased of thirteen note book and also, he offers 2% discount. Sankar marked at what percentage above the cost price of the note book so that he gains 40% profit on whole transactions?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2306;&#2325;&#2352; &#2340;&#2375;&#2352;&#2361; &#2344;&#2379;&#2335; &#2348;&#2369;&#2325; &#2326;&#2352;&#2368;&#2342;&#2344;&#2375; &#2346;&#2352; &#2319;&#2325; &#2344;&#2379;&#2335; &#2348;&#2369;&#2325; &#2350;&#2369;&#2347;&#2381;&#2340; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2360;&#2366;&#2341; &#2361;&#2368; &#2357;&#2361; 2% &#2331;&#2370;&#2335; &#2349;&#2368; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2358;&#2306;&#2325;&#2352; &#2344;&#2375; &#2346;&#2370;&#2352;&#2375; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2346;&#2352; 40% &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;, &#2344;&#2379;&#2335; &#2348;&#2369;&#2325; &#2325;&#2375; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2309;&#2343;&#2367;&#2325; &#2350;&#2370;&#2354;&#2381;&#2351; &#2309;&#2306;&#2325;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>Ankit bought a book at 15% discount and a copy at 10% discount on the respective marked price. If the selling price of book and copy for Ankit is Rs.680 and Rs.1080 respectively, then what is the total discount percent received by Ankit?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2306;&#2325;&#2367;&#2340; &#2344;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 15% &#2325;&#2368; &#2331;&#2370;&#2335; &#2346;&#2352; &#2319;&#2325; &#2325;&#2367;&#2340;&#2366;&#2348; &#2324;&#2352; 10% &#2325;&#2368; &#2331;&#2370;&#2335; &#2346;&#2352; &#2319;&#2325; &#2325;&#2377;&#2346;&#2368; &#2326;&#2352;&#2368;&#2342;&#2368;&#2404; &#2351;&#2342;&#2367; &#2309;&#2306;&#2325;&#2367;&#2340; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2340;&#2366;&#2348; &#2324;&#2352; &#2325;&#2377;&#2346;&#2368; &#2325;&#2366; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 680 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; 1080 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2309;&#2306;&#2325;&#2367;&#2340; &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2369;&#2354; &#2331;&#2370;&#2335; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>A shopkeeper sold 20 pens at 8% profit and 25 markers and 4% profit. If cost price of a pen is &#8377;10 less than the cost of a marker and the selling price of all the pens and markers is &#8377;1212, then find cost price of a marker.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2344;&#2375; 20 &#2346;&#2375;&#2344; 8% &#2354;&#2366;&#2349; &#2346;&#2352; &#2324;&#2352; 25 &#2350;&#2366;&#2352;&#2381;&#2325;&#2352; &#2324;&#2352; 4% &#2354;&#2366;&#2349; &#2346;&#2352; &#2348;&#2375;&#2330;&#2375;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2346;&#2375;&#2344; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2319;&#2325; &#2350;&#2366;&#2352;&#2381;&#2325;&#2352; &#2325;&#2375; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2375; &#8377;10 &#2325;&#2350; &#2361;&#2376; &#2340;&#2341;&#2366; &#2360;&#2349;&#2368; &#2346;&#2375;&#2344; &#2324;&#2352; &#2350;&#2366;&#2352;&#2381;&#2325;&#2352;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#8377;1212 &#2361;&#2376;, &#2340;&#2379; &#2319;&#2325; &#2350;&#2366;&#2352;&#2381;&#2325;&#2352; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
