<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>

                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">

                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

        </div>
    </div>
    
    <!-- Main Exam Interface -->

        </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Below given bar graph shows the number of Railway stations, Bus stands and Airports constructed in state A and state B. What is the average of the number of railway stations constructed in state A, bus stands in state B and airports in state A?</p><p><img width=351 height=231 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25004/image001.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2342;&#2306;&#2337; &#2310;&#2352;&#2375;&#2326; &#2352;&#2366;&#2332;&#2381;&#2351; A &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; B &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2352;&#2375;&#2354;&#2357;&#2375; &#2360;&#2381;&#2335;&#2375;&#2358;&#2344;&#2379;&#2306;, &#2348;&#2360; &#2309;&#2337;&#2381;&#2337;&#2379;&#2306; &#2324;&#2352; &#2361;&#2357;&#2366;&#2312; &#2309;&#2337;&#2381;&#2337;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2352;&#2366;&#2332;&#2381;&#2351; A &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2352;&#2375;&#2354;&#2357;&#2375; &#2360;&#2381;&#2335;&#2375;&#2358;&#2344;&#2379;&#2306;, &#2352;&#2366;&#2332;&#2381;&#2351; B &#2350;&#2375;&#2306; &#2348;&#2360; &#2309;&#2337;&#2381;&#2337;&#2379;&#2306; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; A &#2350;&#2375;&#2306; &#2361;&#2357;&#2366;&#2312; &#2309;&#2337;&#2381;&#2337;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2324;&#2360;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p><p><img width=\"351\" height=\"231\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25004/image001.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">80</span><span class=\"hqt\" style=\"display:none\">80</span>",
      "<span class=\"eqt\">90</span><span class=\"hqt\" style=\"display:none\">90</span>",
      "<span class=\"eqt\">95</span><span class=\"hqt\" style=\"display:none\">95</span>",
      "<span class=\"eqt\">85</span><span class=\"hqt\" style=\"display:none\">85</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Number of railway stations in state A = 160</p><p>Number of bus stands in state B = 60</p><p>Number of airports in state A = 20</p><p>Sum = 160 + 60 + 20 = 240</p><p>Required average = 240/3 = 80</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Following line graph shows the percentage increase(from previous month) in the enrolment of Males and Females in a College in the months of March, April and May in 2018.</p><p><img width=576 height=336 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p5425/image002.png\"></p><p>If the enrolment of Males and Females in April is 3240 and 2750 respectively, what is the difference between the total enrolment in May and the total enrolment in February?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2357;&#2352;&#2381;&#2359; 2018 &#2325;&#2375; &#2350;&#2366;&#2352;&#2381;&#2330;, &#2309;&#2346;&#2381;&#2352;&#2376;&#2354;, &#2324;&#2352; &#2350;&#2312; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2377;&#2354;&#2375;&#2332; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2375; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2344; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; (&#2346;&#2370;&#2352;&#2381;&#2357;&#2357;&#2352;&#2381;&#2340;&#2368; &#2350;&#2361;&#2368;&#2344;&#2375; &#2360;&#2375;) &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;|</p><p><img width=\"576\" height=\"336\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p5425/image002.png\"></p><p>&#2351;&#2342;&#2367; &#2309;&#2346;&#2381;&#2352;&#2376;&#2354; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2375; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2344; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3240 &#2324;&#2352; 2750 &#2361;&#2376;&#2306;, &#2340;&#2379; &#2350;&#2312; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2344; &#2324;&#2352; &#2347;&#2352;&#2357;&#2352;&#2368; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2344; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2340;&#2344;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2225</span><span class=\"hqt\" style=\"display:none\">2225</span>",
      "<span class=\"eqt\">2350</span><span class=\"hqt\" style=\"display:none\">2350</span>",
      "<span class=\"eqt\">2400</span><span class=\"hqt\" style=\"display:none\">2400</span>",
      "<span class=\"eqt\">2450</span><span class=\"hqt\" style=\"display:none\">2450</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Enrolment of Males in May = 3240(1 + 25/100) = 4050</p><p>Enrolment of Males in March = 3240/(1  -  10/100) = 3600</p><p>Enrolment of Males in February = 3600/(1 + 20/100) = 3000</p><p>Enrolment of Females in May = 2750(1 + 20/100) = 3300</p><p>Enrolment of Females in March = 2750/(1 + 10/100) = 2500</p><p>Enrolment of Females in February = 2500/(1 + 25/100) = 2000</p><p>Required difference = (4050 + 3300)  -  (3000 + 2000) = 2350</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p><b>Directions:</b>  Study the data carefully and answer the following questions:</p><p>Below bar graph shows the number of people (in thousands) who read five different newspapers from two cities:</p><p><img width=480 height=288 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p14867/image006.png\"></p><p>In city A, the ratio of number of people who read BS to the number of people who read TD is:</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;:</b> &#2310;&#2306;&#2325;&#2396;&#2379;&#2306; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;:</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2342;&#2306;&#2337; &#2310;&#2352;&#2375;&#2326; &#2342;&#2379; &#2358;&#2361;&#2352;&#2379;&#2306; &#2325;&#2375; &#2346;&#2366;&#2305;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2350;&#2366;&#2330;&#2366;&#2352; &#2346;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; (&#2361;&#2332;&#2366;&#2352; &#2350;&#2375;&#2306;) &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;:</p><p><img width=\"480\" height=\"288\" id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p14867/image006.png\"></p><p>&#2358;&#2361;&#2352; A &#2350;&#2375;&#2306;, BS &#2346;&#2338;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; TD &#2346;&#2338;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">7: 6</span><span class=\"hqt\" style=\"display:none\">7: 6</span>",
      "<span class=\"eqt\">9: 8</span><span class=\"hqt\" style=\"display:none\">9: 8</span>",
      "<span class=\"eqt\">8: 7</span><span class=\"hqt\" style=\"display:none\">8: 7</span>",
      "<span class=\"eqt\">7: 9</span><span class=\"hqt\" style=\"display:none\">7: 9</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In city A the number of people who read BS = 480000</p><p>In city A the number of people who read TD = 420000</p><p>Required ratio = 480000: 420000 = 8: 7</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Study the following bar graph and answer the question that follows.</p><p>The given bar graph represents the import of goods (in Tonnes) in India from four countries in the year 2020. The X-axis represents the countries and Y-axis represents the quantity of goods (in tonnes).</p><p><img width=472 height=202 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21057/image001.png\"></p><p>Find the ratio of the total import of goods from China and Russia together to the total import of goods from UAE and United states together.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2342;&#2306;&#2337; &#2310;&#2352;&#2375;&#2326; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404;</p><p>&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2342;&#2306;&#2337; &#2310;&#2352;&#2375;&#2326; &#2357;&#2352;&#2381;&#2359; 2020 &#2350;&#2375;&#2306; &#2330;&#2366;&#2352; &#2342;&#2375;&#2358;&#2379;&#2306; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2366;&#2354; &#2325;&#2375; &#2310;&#2351;&#2366;&#2340; (&#2335;&#2344; &#2350;&#2375;&#2306;) &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; X-&#2309;&#2325;&#2381;&#2359; &#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; Y-&#2309;&#2325;&#2381;&#2359; &#2350;&#2366;&#2354; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; (&#2335;&#2344; &#2350;&#2375;&#2306;) &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"472\" height=\"202\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21057/image001.png\"></p><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2330;&#2368;&#2344; &#2324;&#2352; &#2352;&#2370;&#2360; &#2360;&#2375; &#2350;&#2366;&#2354; &#2325;&#2375; &#2325;&#2369;&#2354; &#2310;&#2351;&#2366;&#2340; &#2340;&#2341;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2309;&#2352;&#2348; &#2309;&#2350;&#2368;&#2352;&#2366;&#2340; &#2324;&#2352; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2309;&#2350;&#2375;&#2352;&#2367;&#2325;&#2366; &#2360;&#2375; &#2350;&#2366;&#2354; &#2325;&#2375; &#2325;&#2369;&#2354; &#2310;&#2351;&#2366;&#2340; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">9:10</span><span class=\"hqt\" style=\"display:none\">9:10</span>",
      "<span class=\"eqt\">6:7</span><span class=\"hqt\" style=\"display:none\">6:7</span>",
      "<span class=\"eqt\">2:3</span><span class=\"hqt\" style=\"display:none\">2:3</span>",
      "<span class=\"eqt\">1:4</span><span class=\"hqt\" style=\"display:none\">1:4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Total import of goods from China and Russia together = 200 + 430 = 630</p><p>Total import of goods from UAE and United states together = 250 + 450 = 700</p><p>Required ratio = 630 : 700 = 9:10</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The following graph shows the population of man, woman and children in 6 different villages. The population of man, woman and children is given in thousand.</p><p><img width=576 height=336 id=\"Chart 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21057/image019.png\"></p><p>Difference between total population of man of village Y and Z is what percent of the difference between total population of woman of village U and V?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2352;&#2375;&#2326; 6 &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2327;&#2366;&#2306;&#2357;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306;, &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2324;&#2352; &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2306;, &#2346;&#2369;&#2352;&#2369;&#2359; &#2324;&#2352; &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2332;&#2366;&#2352; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21057/image019.png\"></p><p>&#2327;&#2366;&#2305;&#2357; Y &#2324;&#2352; Z &#2325;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352;, &#2327;&#2366;&#2305;&#2357; U &#2324;&#2352; V &#2325;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">47%</span><span class=\"hqt\" style=\"display:none\">47%</span>",
      "<span class=\"eqt\">70%</span><span class=\"hqt\" style=\"display:none\">70%</span>",
      "<span class=\"eqt\">68%</span><span class=\"hqt\" style=\"display:none\">68%</span>",
      "<span class=\"eqt\">80%</span><span class=\"hqt\" style=\"display:none\">80%</span>"

    "question": "<span class=\"eqt\"><p><b>Directions:</b>   The following line graph shows the quantity (in ml) of chemical X and chemical Y in five different mixtures.</p><p><img width=576 height=336 id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18691/image003.png\"></p><p>Total quantity of chemical X and chemical Y in which two mixtures is same?</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;: </b>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2346;&#2366;&#2305;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2360;&#2366;&#2351;&#2344; X &#2324;&#2352; &#2352;&#2360;&#2366;&#2351;&#2344; Y &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; (ml &#2350;&#2375;&#2306;) &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18691/image003.png\"></p><p>&#2325;&#2367;&#2344; &#2342;&#2379; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2360;&#2366;&#2351;&#2344; X &#2324;&#2352; &#2352;&#2360;&#2366;&#2351;&#2344; Y &#2325;&#2368; &#2325;&#2369;&#2354; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>The given histogram represents the frequency distribution of marks obtained by 200 students in a class:</p><p><img width=576 height=336 id=\"Chart 1634619424\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22821/image002.png\"></p><p>What is the ratio of number of students who score more than 120 to the number of students who score between 21 to 100?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2310;&#2351;&#2340; &#2330;&#2367;&#2340;&#2381;&#2352; &#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; 200 &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2350;&#2381;&#2348;&#2366;&#2352;&#2340;&#2366; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;:</p><p><img width=\"576\" height=\"336\" id=\"Chart 1634619424\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22821/image002.png\"></p><p>120 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2309;&#2306;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2340;&#2341;&#2366; 21 &#2360;&#2375; 100 &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
