<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The length and height of a cuboid are twice and thrice of its breadth respectively. If breadth, length and height are increased by 50%, 80% and 100% respectively, by what percentage its volume will be increased?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344;&#2366;&#2349; &#2325;&#2368; &#2354;&#2350;&#2381;&#2348;&#2366;&#2312; &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; &#2313;&#2360;&#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2368; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2342;&#2369;&#2327;&#2344;&#2368; &#2324;&#2352; &#2340;&#2367;&#2327;&#2369;&#2344;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312;, &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 50%, 80% &#2324;&#2352; 100% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">360%</span><span class=\"hqt\" style=\"display:none\">360%</span>",
      "<span class=\"eqt\">320%</span><span class=\"hqt\" style=\"display:none\">320%</span>",
      "<span class=\"eqt\">440%</span><span class=\"hqt\" style=\"display:none\">440%</span>",
      "<span class=\"eqt\">180%</span><span class=\"hqt\" style=\"display:none\">180%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let l,b and h be the initial length, breadth and height of the cuboid respectively.</p><p>Initial volume V = lbh</p><p>Final volume V' = (1.8l)(1.5b)(2h) = 5.4lbh</p><p>So, % increase in its volume = (V'  -  V)/V *100 = (5.4lbh  -  lbh)/(lbh) *100 = 440%</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of the total surface areas of two cubes is 49 : 81. What is the ratio of their volumes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2328;&#2344;&#2379;&#2306; &#2325;&#2375; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 49 : 81 &#2361;&#2376;&#2404; &#2313;&#2344;&#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">343 : 729</span><span class=\"hqt\" style=\"display:none\">343 : 729</span>",
      "<span class=\"eqt\">294 : 486</span><span class=\"hqt\" style=\"display:none\">294 : 486</span>",
      "<span class=\"eqt\">7 : 9</span><span class=\"hqt\" style=\"display:none\">7 : 9</span>",
      "<span class=\"eqt\">49 : 121</span><span class=\"hqt\" style=\"display:none\">49 : 121</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Surface area of a cube = 6a<sup>2</sup></p><p>Surface area is proportional to the square of sides.</p><p>Ratio of sides of the given cubes = &radic;49 : &radic;81 = 7 : 9</p><p>Volume of cube = side<sup>3</sup></p><p>Hence, ratio of volume of cubes = 7<sup>3</sup> : 9<sup>3</sup> = 343 : 729</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A metal cuboid of dimensions 56 cm * 55 cm * 70 cm is drawn into a cylindrical wire of radius 7 cm. Find the length of the wire.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2350;&#2366;&#2323;&#2306; 56 cm * 55 cm * 70 cm &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2343;&#2366;&#2340;&#2369; &#2325;&#2375; &#2328;&#2344;&#2366;&#2349; &#2325;&#2379; 7 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2348;&#2375;&#2354;&#2344;&#2366;&#2325;&#2366;&#2352; &#2340;&#2366;&#2352; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2326;&#2368;&#2306;&#2330;&#2366; (&#2348;&#2342;&#2354;&#2366;) &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2340;&#2366;&#2352; &#2325;&#2368; &#2354;&#2350;&#2381;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">18.8 m</span><span class=\"hqt\" style=\"display:none\">18.8 m</span>",
      "<span class=\"eqt\">10 m</span><span class=\"hqt\" style=\"display:none\">10 m</span>",
      "<span class=\"eqt\">12.4 m</span><span class=\"hqt\" style=\"display:none\">12.4 m</span>",
      "<span class=\"eqt\">14 m</span><span class=\"hqt\" style=\"display:none\">14 m</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Volume of cuboid = Volume of cylindrical wire</p><p>56 * 55 * 70 = &#960; * 7<sup>2</sup> * h</p><p>h = <img width=84 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20967/image016.png\"></p><p>h = 1400 cm</p><p>h = 14 m</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Two cubes of sides 10m and 12m are melted to form a cylinder of radius 4m. What is the height of the cylinder?</p></span><span class=\"hqt\" style=\"display:none\"><p>10m &#2324;&#2352; 12m &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2328;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352; 4m &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2366; &#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">64.5m</span><span class=\"hqt\" style=\"display:none\">64.5m</span>",
      "<span class=\"eqt\">48m</span><span class=\"hqt\" style=\"display:none\">48m</span>",
      "<span class=\"eqt\">54.25m</span><span class=\"hqt\" style=\"display:none\">54.25m</span>",
      "<span class=\"eqt\">50m</span><span class=\"hqt\" style=\"display:none\">50m</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Volume of two cubes = Volume of the cylinder</p><p>10<sup>3</sup> + 12<sup>3</sup> = &#960; * 4 * 4 * h</p><p>1000 + 1728 = 22*4*4*h/7</p><p>2728 * 7/(22*4*4) = h</p><p>h = 54.25m</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the volume of a cube whose side is equal to the side of square having area 196 cm<sup>2</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2328;&#2344; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2325;&#2368; &#2349;&#2369;&#2332;&#2366; 196 cm<sup>2</sup> &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2357;&#2366;&#2354;&#2375; &#2357;&#2352;&#2381;&#2327; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2744 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">2744 cm<sup>3</sup></span>",
      "<span class=\"eqt\">2164 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">2164 cm<sup>3</sup></span>",
      "<span class=\"eqt\">3375 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">3375 cm<sup>3</sup></span>",
      "<span class=\"eqt\">4096 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">4096 cm<sup>3</sup></span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Side of square = &radic;196 = 14 cm</p><p>Side of cube = 14 cm</p><p>Volume of cube = 14<sup>3</sup> = 2744cm<sup>3</sup></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The base area of a cuboid is 52 cm<sup>2</sup>. Find the height of the cuboid if the volume of the cuboid is 1664 cm<sup>3</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344;&#2366;&#2349; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 52 cm<sup>2 </sup>&#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2328;&#2344;&#2366;&#2349; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 1664 cm<sup>3 </sup>&#2361;&#2376;, &#2340;&#2379; &#2328;&#2344;&#2366;&#2349; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">28 cm</span><span class=\"hqt\" style=\"display:none\">28 cm</span>",
      "<span class=\"eqt\">32 cm</span><span class=\"hqt\" style=\"display:none\">32 cm</span>",
      "<span class=\"eqt\">18 cm</span><span class=\"hqt\" style=\"display:none\">18 cm</span>",
      "<span class=\"eqt\">25 cm</span><span class=\"hqt\" style=\"display:none\">25 cm</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Base area of cuboid = 52</p><p>Length * Width = 52</p><p>Given,</p><p>Volume of cuboid = 1664</p><p>Length * width * height = 1664</p><p>52 * height = 1664</p><p>Height = 1664/52</p><p>Height = 32 cm</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The length of diagonal of a cube is 10&radic;3 cm. What is the lateral surface area (in sq. cm) of cube?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344; &#2325;&#2375; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 10&radic;3 cm &#2361;&#2376;, &#2340;&#2379; &#2328;&#2344; &#2325;&#2366; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (sq. cm &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">200</span><span class=\"hqt\" style=\"display:none\">200</span>",
      "<span class=\"eqt\">600</span><span class=\"hqt\" style=\"display:none\">600</span>",
      "<span class=\"eqt\">100</span><span class=\"hqt\" style=\"display:none\">100</span>",
      "<span class=\"eqt\">400</span><span class=\"hqt\" style=\"display:none\">400</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Diagonal of cube = side of cube * &radic;3</p><p>10&radic;3 = side of cube * &radic;3</p><p>Side of cube = 10 cm</p><p>Lateral surface area = 4 * side<sup>2</sup></p><p>= 4 * 10 * 10</p><p>= 400 sq. cm</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A cuboidal tank of dimensions 75 cm x 25 cm x 56 cm is completely filled with water. How many 1.5 liters water bottles can be filled from the tank? </p></span><span class=\"hqt\" style=\"display:none\"><p>75 cm x 25 cm x 56 cm &#2310;&#2351;&#2366;&#2350;&#2379;&#2306; &#2325;&#2366; &#2319;&#2325; &#2328;&#2344;&#2366;&#2325;&#2366;&#2352; &#2335;&#2306;&#2325;&#2368; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2332;&#2354; &#2360;&#2375; &#2349;&#2352;&#2366; &#2361;&#2376;&#2404; &#2335;&#2306;&#2325;&#2368; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; 1.5 &#2354;&#2368;&#2335;&#2352; &#2332;&#2354; &#2325;&#2368; &#2348;&#2379;&#2340;&#2354;&#2375;&#2306; &#2349;&#2352;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">84</span><span class=\"hqt\" style=\"display:none\">84</span>",
      "<span class=\"eqt\">56</span><span class=\"hqt\" style=\"display:none\">56</span>",
      "<span class=\"eqt\">70</span><span class=\"hqt\" style=\"display:none\">70</span>",
      "<span class=\"eqt\">98</span><span class=\"hqt\" style=\"display:none\">98</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Capacity of cuboidal tank = 75 * 25 * 56 = 105000 cm<sup>3</sup> = 105 liters</p><p>Therefore, number of 1.5 liters water bottles that can be filled from the tank</p><p>= 105/1.5</p><p>= <b>70</b></p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of the dimension of a cuboidal box is 6:4:5. If the diagonal of a cuboid is 2&radic;77cm then find the volume of the cuboidal box.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344;&#2366;&#2349;&#2366;&#2325;&#2366;&#2352; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2368; &#2357;&#2367;&#2350;&#2366;&#2323;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 6:4:5 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2328;&#2344;&#2366;&#2349; &#2325;&#2366; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; 2&radic;77cm &#2361;&#2376;, &#2340;&#2379; &#2328;&#2344;&#2366;&#2349; &#2325;&#2375; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">840cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">840cm<sup>3</sup></span>",
      "<span class=\"eqt\">960cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">960cm<sup>3</sup></span>",
      "<span class=\"eqt\">600cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">600cm<sup>3</sup></span>",
      "<span class=\"eqt\">1210cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">1210cm<sup>3</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the length, breadth and height of the cuboidal box are 6a, 4a and 5a respectively.</p><p>Diagonal of a cuboid = 2&radic;77cm</p><p>&radic;(l<sup>2</sup> + b<sup>2</sup> + h<sup>2</sup>) = 2&radic;77</p><p>(6a)<sup>2</sup> + (4a)<sup>2</sup> + (5a)<sup>2</sup> = 4*77 = 308</p><p>36a<sup>2</sup> + 16a<sup>2</sup> + 25a<sup>2</sup> = 308</p><p>77a<sup>2</sup> = 308</p><p>a<sup>2</sup> = 4</p><p>a = 2</p><p>So, the length, breadth and height of the cuboidal box are 12cm, 8cm and 10cm respectively.</p><p>Volume of the cuboidal box = 12*8*10 = 960cm<sup>3</sup></p>",
    "question_index": 8
  },
  {
