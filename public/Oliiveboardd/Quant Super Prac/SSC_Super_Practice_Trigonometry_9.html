<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If tan&#952; = 21/20, then what is the value of (3cos&#952;  -  2sin&#952;)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; tan&#952; = 21/20, &#2340;&#2379; (3cos&#952; - 2sin&#952;) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12/29</span><span class=\"hqt\" style=\"display:none\">12/29</span>",
      "<span class=\"eqt\">20/29</span><span class=\"hqt\" style=\"display:none\">20/29</span>",
      "<span class=\"eqt\">18/29</span><span class=\"hqt\" style=\"display:none\">18/29</span>",
      "<span class=\"eqt\">21/29</span><span class=\"hqt\" style=\"display:none\">21/29</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>tan&#952; = 21/20</p><p>Perpendicular = 21, Base = 20</p><p>Hypotenuse = &radic;(21<sup>2</sup> + 20<sup>2</sup>)</p><p>= &radic;(441 + 400)</p><p>= 29</p><p>Now,</p><p>3cos&#952;  -  2sin&#952; = 3*20/29  -  2*21/29</p><p>= 18/29</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If sin&#952; = 55/73, then what is the value of (3sec&#952;  -  5cot&#952;)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; sin&#952; = 55/73, &#2340;&#2379; (3sec&#952; - 5cot&#952;) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">22/129</span><span class=\"hqt\" style=\"display:none\">22/129</span>",
      "<span class=\"eqt\">35/176</span><span class=\"hqt\" style=\"display:none\">35/176</span>",
      "<span class=\"eqt\">23/129</span><span class=\"hqt\" style=\"display:none\">23/129</span>",
      "<span class=\"eqt\">45/176</span><span class=\"hqt\" style=\"display:none\">45/176</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>sin&#952; = 55/73</p><p>Perpendicular = 55, Hypotenuse = 73</p><p>Base = &radic;(73<sup>2</sup>  -  55<sup>2</sup>)</p><p>= &radic;(128*18)</p><p>= 48</p><p>sec&#952; = 73/48</p><p>cot&#952; = 48/55</p><p>3sec&#952;  -  5cot&#952; = 3*73/48  -  5*48/55</p><p>= 73/16  -  48/11</p><p>= 35/176</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If cos7A = sin(A  -  46&deg;), where A is an acute angle, then what is the measure of &#8736;A?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; cos7A = sin(A - 46&deg;), &#2332;&#2361;&#2366;&#2305; A &#2319;&#2325; &#2344;&#2381;&#2351;&#2370;&#2344; &#2325;&#2379;&#2339; &#2361;&#2376;, &#2340;&#2379; &#8736;A &#2325;&#2366; &#2350;&#2366;&#2346; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">16&deg;</span><span class=\"hqt\" style=\"display:none\">16&deg;</span>",
      "<span class=\"eqt\">24&deg;</span><span class=\"hqt\" style=\"display:none\">24&deg;</span>",
      "<span class=\"eqt\">17&deg;</span><span class=\"hqt\" style=\"display:none\">17&deg;</span>",
      "<span class=\"eqt\">21&deg;</span><span class=\"hqt\" style=\"display:none\">21&deg;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Since, cos&#952; = sin(90&deg;  -  &#952;)</p><p>cos7A = sin(A  -  46&deg;)</p><p>sin(90&deg; - 7A) = sin(A  -  46&deg;)</p><p>90&deg; - 7A = A - 46&deg;</p><p>A = 17&deg;</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If cosY = 8/17, then the value of sinY*secY*tanY is ________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; cosY = 8/17, &#2340;&#2379; sinY*secY*tanY &#2325;&#2366; &#2350;&#2366;&#2344; ________ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">225/64</span><span class=\"hqt\" style=\"display:none\">225/64</span>",
      "<span class=\"eqt\">15/8</span><span class=\"hqt\" style=\"display:none\">15/8</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">225/136</span><span class=\"hqt\" style=\"display:none\">225/136</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>cosY = 8/17</p><p>Base = 8, Hypotenuse = 17</p><p>Perpendicular = &radic;(17<sup>2</sup>  -  8<sup>2</sup>)</p><p>= &radic;(25*9)</p><p>= 15</p><p>=&gt; sinY*secY*tanY</p><p>= 15/17 * 17/8 * 15/8</p><p>= 225/64</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If tan&#952; = 11/60, then the value of 2tanY*3cosecY  -  4secY is ________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; tan&#952; = 11/60, &#2340;&#2379; 2tanY*3cosecY - 4secY &#2325;&#2366; &#2350;&#2366;&#2344; ________ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">61/60</span><span class=\"hqt\" style=\"display:none\">61/60</span>",
      "<span class=\"eqt\">150/61</span><span class=\"hqt\" style=\"display:none\">150/61</span>",
      "<span class=\"eqt\">121/30</span><span class=\"hqt\" style=\"display:none\">121/30</span>",
      "<span class=\"eqt\">61/30</span><span class=\"hqt\" style=\"display:none\">61/30</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>tan&#952; = 11/60</p><p>Perpendicular = 11, Base = 60</p><p>Hypotenuse = &radic;(11<sup>2</sup> + 60<sup>2</sup>)</p><p>= &radic;(121 + 3600)</p><p>= 61</p><p>=&gt; 2tanY*3cosecY  -  4secY</p><p>= 6 * 11/60 * 61/11  -  4* 61/60</p><p>= 61/10  -  61/15</p><p>= 61/30</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If (sec&#945; + tan&#945;)/(sec&#945; - tan&#945;) = 37/7, then what is the value of sin&#945;?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (sec&#945; + tan&#945;)/(sec&#945; - tan&#945;) = 37/7, &#2340;&#2379; sin&#945; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">22/19</span><span class=\"hqt\" style=\"display:none\">22/19</span>",
      "<span class=\"eqt\">30/23</span><span class=\"hqt\" style=\"display:none\">30/23</span>",
      "<span class=\"eqt\">15/22</span><span class=\"hqt\" style=\"display:none\">15/22</span>",
      "<span class=\"eqt\">29/34</span><span class=\"hqt\" style=\"display:none\">29/34</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>(sec&#945; + tan&#945;)/(sec&#945; - tan&#945;) = 37/7</p><p>7sec&#945; + 7tan&#945; = 37sec&#945;  -  37tan&#945;</p><p>sec&#945;/tan&#945; = 22/15</p><p>(1/cos&#945;)/(sin&#945;/cos&#945;) = 22/15</p><p>sin&#945; = 15/22</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Simplify (cos21&deg; + sin21&deg;)/(cos21&deg; - sin21&deg;).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2352;&#2354; &#2348;&#2344;&#2366;&#2319;&#2306; (cos21&deg; + syn21&deg;)/(cos21&deg; - syn21&deg;).</p></span>",
    "options": [
      "<span class=\"eqt\">cot28&deg;</span><span class=\"hqt\" style=\"display:none\">cot28&deg;</span>",
      "<span class=\"eqt\">tan66&deg;</span><span class=\"hqt\" style=\"display:none\">tan66&deg;</span>",
      "<span class=\"eqt\">tan24&deg;</span><span class=\"hqt\" style=\"display:none\">tan24&deg;</span>",
      "<span class=\"eqt\">cot64&deg;</span><span class=\"hqt\" style=\"display:none\">cot64&deg;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>(cos21&deg; + sin21&deg;)/(cos21&deg; - sin21&deg;)</p><p>= (1 + sin21&deg;/cos21&deg;)/(1  -  sin21&deg;/cos21&deg;)</p><p>= (1 + tan21&deg;)/(1 - tan21&deg;)</p><p>= (tan&#960;/4 + tan21&deg;)/(1 - tan&#960;/4 * tan21&deg;)</p><p>Since, tan (A + B) = (tanA + tanB)/(1  -  tanAtanB)</p><p>= tan(45 + 21&deg;)</p><p>= tan66&deg;</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If sin(A + 2B) = 1/&radic;2 and cos(A  -  B) = 1, then find the value of &#8736;B.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; sin(A + 2B) = 1/&radic;2 &#2324;&#2352; cos(A - B) = 1, &#2340;&#2379; &#8736;B &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">15&deg;</span><span class=\"hqt\" style=\"display:none\">15&deg;</span>",
      "<span class=\"eqt\">30&deg;</span><span class=\"hqt\" style=\"display:none\">30&deg;</span>",
      "<span class=\"eqt\">10&deg;</span><span class=\"hqt\" style=\"display:none\">10&deg;</span>",
      "<span class=\"eqt\">45&deg;</span><span class=\"hqt\" style=\"display:none\">45&deg;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>sin(A + 2B) = 1/&radic;2</p><p>sin(A + 2B) = sin45&deg;</p><p>A + 2B = 45&deg; ------(1)</p><p>cos(A  -  B) = 1</p><p>cos(A  -  B) = cos0&deg;</p><p>A  -  B = 0&deg; ------(2)</p><p>From eqn (1) and (2)  - </p><p>B = 15&deg;</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>If tan(A  -  B) = 1/&radic;3 and sec(A + B) = 2, then find the value of (2A  -  B).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; tan(A - B) = 1/&radic;3 &#2324;&#2352; sec(A + B) = 2, &#2340;&#2379; (2A - B) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">45&deg;</span><span class=\"hqt\" style=\"display:none\">45&deg;</span>",
      "<span class=\"eqt\">60&deg;</span><span class=\"hqt\" style=\"display:none\">60&deg;</span>",
      "<span class=\"eqt\">90&deg;</span><span class=\"hqt\" style=\"display:none\">90&deg;</span>",
      "<span class=\"eqt\">75&deg;</span><span class=\"hqt\" style=\"display:none\">75&deg;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>tan(A - B) = 1/&radic;3</p><p>tan(A - B) = tan30&deg;</p><p>A  -  B = 30&deg; ------(1)</p><p>sec(A + B) = 2</p><p>sec(A + B) = sec60&deg;</p><p>A + B = 60&deg; ------(2)</p><p>From eqn (1) and (2)  - </p><p>A = 45&deg;, B = 15&deg;</p><p>2A  -  B = 2*45  -  15 = 75&deg;</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>If sin{3(x - y)} = cos(x - y), then what is the value of tan{2(x  -  y)}?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; sin{3(x - y)} = cos(x - y) &#2361;&#2376;, &#2340;&#2379; tan{2(x - y)} &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">&radic;3</span><span class=\"hqt\" style=\"display:none\">&radic;3</span>",
      "<span class=\"eqt\">1/&radic;3</span><span class=\"hqt\" style=\"display:none\">1/&radic;3</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>sin{3(x - y)} = cos(x - y)</p><p>cos{90 - 3(x - y)} = cos(x - y)</p><p>90  -  3(x  -  y) = x  -  y</p><p>2(x  -  y) = 45&deg;</p><p>tan{2(x  -  y)} = tan45&deg; = 1</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>If A + B = 45&deg; and (1 - tanA)(1 - tanB) = 3x, then find the value of x.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A + B = 45&deg; &#2340;&#2341;&#2366; (1 - tanA)(1 - tanB) = 3x, &#2340;&#2379; x &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">-1</span><span class=\"hqt\" style=\"display:none\">-1</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A + B = 45&deg;</p><p>Put A = 45&deg; and B = 0&deg;</p><p>(1 - tanA)(1 - tanB) = 3x</p><p>(1  -  tan45&deg;)(1  -  tan0&deg;) = 3x</p><p>(1  -  1)(1  -  0) = 3x</p><p>3x = 0</p><p>x = 0</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p><img width=553 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26460/image001.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><img width=553 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26460/image001.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">sin(C  -  A)/cosAcosC</span><span class=\"hqt\" style=\"display:none\">sin(C  -  A)/cosAcosC</span>",
      "<span class=\"eqt\">cos(C + A)/cosAcosC</span><span class=\"hqt\" style=\"display:none\">cos(C + A)/cosAcosC</span>",
      "<span class=\"eqt\">cos(C  -  A)/cosAcosC</span><span class=\"hqt\" style=\"display:none\">cos(C  -  A)/cosAcosC</span>",
      "<span class=\"eqt\">sin(A  -  C)/cosAcosC</span><span class=\"hqt\" style=\"display:none\">sin(A  -  C)/cosAcosC</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>cos(X + Y) = cosXcosY  -  sinXsinY</p><p><img width=157 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26460/image002.png\"></p><p><img width=315 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26460/image003.png\"></p><p><img width=197 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26460/image004.png\"></p><p><img width=101 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26460/image005.png\"></p><p><img width=153 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26460/image006.png\"></p><p><img width=84 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26460/image007.png\"></p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>If tan&#952; = 7 + 4&radic;3, then find the value of cosec&#952;sec&#952;.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; tan&#952; = 7 + 4&radic;3, &#2340;&#2379; cosec&#952;sec&#952; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
