</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>From two points located X meters and Y meters away from the base of a building on the same straight line (such that Y>X), the angles of elevation to the top of the building are supplementary. If the angle of elevation from the point C is 45&deg; which is X meters away from the base of a building,  and the height of the building is h meters, find the value of the product X * Y.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2360;&#2375; X &#2350;&#2368;&#2335;&#2352; &#2324;&#2352; Y &#2350;&#2368;&#2335;&#2352; &#2342;&#2370;&#2352; &#2319;&#2325; &#2361;&#2368; &#2360;&#2368;&#2343;&#2368; &#2352;&#2375;&#2326;&#2366; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2342;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2360;&#2375; (&#2332;&#2376;&#2360;&#2375; &#2325;&#2367; Y>X), &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2346;&#2352; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; &#2346;&#2370;&#2352;&#2325; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2348;&#2367;&#2306;&#2342;&#2369; C &#2360;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 45 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2361;&#2376; &#2332;&#2379; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2360;&#2375; X &#2350;&#2368;&#2335;&#2352; &#2342;&#2370;&#2352; &#2361;&#2376;, &#2324;&#2352; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; h &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; X * Y &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2h</span><span class=\"hqt\" style=\"display:none\">2h</span>",
      "<span class=\"eqt\">h/2</span><span class=\"hqt\" style=\"display:none\">h/2</span>",
      "<span class=\"eqt\">h<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">h<sup>2</sup></span>",
      "<span class=\"eqt\">-h<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">-h<sup>2</sup></span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=272 height=208 id=image1.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27673/image001.jpg\" alt=O46.JPG></p><p>In triangle ABC,</p><p>tan 45&deg; = h/X</p><p>X = h</p><p>In triangle ADB,</p><p>tan 135&deg; = h/Y</p><p>-1 = h/Y</p><p>Y = -h</p><p>Required product = X* Y = h* (-h) = -h<sup>2</sup>.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A drone hovers at the top of a 180-meter-high cliff, scanning a nearby tower. The angles of depression from the drone to the base and the top of the tower are 60&deg; and 30&deg; respectively. Calculate the height of the tower.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2337;&#2381;&#2352;&#2379;&#2344; 180 &#2350;&#2368;&#2335;&#2352; &#2314;&#2306;&#2330;&#2368; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2346;&#2352; &#2350;&#2306;&#2337;&#2352;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2346;&#2366;&#2360; &#2325;&#2375; &#2319;&#2325; &#2335;&#2377;&#2357;&#2352; &#2325;&#2379; &#2360;&#2381;&#2325;&#2376;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2337;&#2381;&#2352;&#2379;&#2344; &#2360;&#2375; &#2335;&#2377;&#2357;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2324;&#2352; &#2358;&#2368;&#2352;&#2381;&#2359; &#2346;&#2352; &#2309;&#2357;&#2344;&#2350;&#2344; &#2325;&#2379;&#2339; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 60&deg; &#2324;&#2352; 30&deg; &#2361;&#2376;&#2306;&#2404; &#2335;&#2377;&#2357;&#2352; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">80 m</span><span class=\"hqt\" style=\"display:none\">80 &#2350;&#2368;</span>",
      "<span class=\"eqt\">60 m</span><span class=\"hqt\" style=\"display:none\">60 &#2350;&#2368;</span>",
      "<span class=\"eqt\">120 m</span><span class=\"hqt\" style=\"display:none\">120 &#2350;&#2368;</span>",
      "<span class=\"eqt\">100 m</span><span class=\"hqt\" style=\"display:none\">100 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=234 height=216 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27673/image002.jpg\"></p><p>In triangle ABC,</p><p>tan60&deg; = 180/x</p><p>x = 180/&radic;3 m</p><p>x = 60&radic;3 m</p><p>In triangle ADE,</p><p>tan30&deg; = (180  -  H)/x</p><p>1/&radic;3 = (180  -  H)/x</p><p>1/&radic;3 = (180  -  H)/ (60&radic;3)</p><p>60 = 180  -  H</p><p>H = 120 m.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A cat climbs to the top of a pole that is X meters tall, positioned 2X meters away from a tall tree. From the top of the pole, the cat looks up at an angle of 45&deg; to see the top of the tree. What is the height of the tree?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2367;&#2354;&#2381;&#2354;&#2368; &#2319;&#2325; &#2326;&#2306;&#2349;&#2375; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2346;&#2352; &#2330;&#2338;&#2364;&#2340;&#2368; &#2361;&#2376; &#2332;&#2379; X &#2350;&#2368;&#2335;&#2352; &#2314;&#2306;&#2330;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2319;&#2325; &#2314;&#2306;&#2330;&#2375; &#2346;&#2375;&#2337;&#2364; &#2360;&#2375; 2X &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404; &#2326;&#2306;&#2349;&#2375; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2360;&#2375;, &#2348;&#2367;&#2354;&#2381;&#2354;&#2368; &#2346;&#2375;&#2337;&#2364; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2379; &#2342;&#2375;&#2326;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 45&deg; &#2325;&#2375; &#2325;&#2379;&#2339; &#2346;&#2352; &#2342;&#2375;&#2326;&#2340;&#2368; &#2361;&#2376;&#2404; &#2346;&#2375;&#2337;&#2364; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">X/3</span><span class=\"hqt\" style=\"display:none\">X/3</span>",
      "<span class=\"eqt\">3X</span><span class=\"hqt\" style=\"display:none\">3X</span>",
      "<span class=\"eqt\">3X/2</span><span class=\"hqt\" style=\"display:none\">3X/2</span>",
      "<span class=\"eqt\">X/3</span><span class=\"hqt\" style=\"display:none\">X/3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=219 height=319 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27673/image003.png\"></p><p>In triangle CAB,</p><p>tan45&deg; = CB/BA</p><p>1 = CB/BA</p><p>CB = BA = 2X m</p><p>Height of building CD = CB + BD = 2X + X = 3x.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A child has launched a kite that soars H meters above the ground. The kite string, perfectly taut with no slack, is tied to a peg fixed in the ground. The string makes an angle of 60&deg; with the ground, and its length is given as 11&radic;3 meters. Which of the following statements is correct?</p><p>(A) The value of H is perfect square.</p><p>(B) The value of H lies between 30 and 40.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2330;&#2381;&#2330;&#2375; &#2344;&#2375; &#2346;&#2340;&#2306;&#2327; &#2313;&#2337;&#2364;&#2366;&#2312; &#2332;&#2379; &#2332;&#2364;&#2350;&#2368;&#2344; &#2360;&#2375; H &#2350;&#2368;&#2335;&#2352; &#2314;&#2346;&#2352; &#2313;&#2337;&#2364;&#2368;&#2404; &#2346;&#2340;&#2306;&#2327; &#2325;&#2368; &#2337;&#2379;&#2352;&#2368;, &#2348;&#2367;&#2344;&#2366; &#2325;&#2367;&#2360;&#2368; &#2338;&#2368;&#2354; &#2325;&#2375; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2340;&#2344;&#2368; &#2361;&#2369;&#2312; &#2361;&#2376;, &#2332;&#2364;&#2350;&#2368;&#2344; &#2350;&#2375;&#2306; &#2354;&#2327;&#2368; &#2319;&#2325; &#2326;&#2370;&#2305;&#2335;&#2368; &#2360;&#2375; &#2348;&#2306;&#2343;&#2368; &#2361;&#2369;&#2312; &#2361;&#2376;&#2404; &#2337;&#2379;&#2352;&#2368; &#2332;&#2364;&#2350;&#2368;&#2344; &#2360;&#2375; 60&deg; &#2325;&#2366; &#2325;&#2379;&#2339; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2324;&#2352; &#2311;&#2360;&#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 11&radic;3 &#2350;&#2368;&#2335;&#2352; &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>(A) H &#2325;&#2366; &#2350;&#2366;&#2344; &#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2352;&#2381;&#2327; &#2361;&#2376;&#2404;</p><p>(B) H &#2325;&#2366; &#2350;&#2366;&#2344; 30 &#2324;&#2352; 40 &#2325;&#2375; &#2348;&#2368;&#2330; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a</span>",
      "<span class=\"eqt\">only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b</span>",
      "<span class=\"eqt\">neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>",
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=243 height=297 id=image3.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27673/image004.jpg\" alt=O51.JPG> <br clear=all> In triangle ABC,</p><p>sin C = AB/AC</p><p>sin 60&deg; = H/ (11&radic;3)</p><p>&radic;3/2 = H/ (11&radic;3)</p><p>H = &radic;3/2 * (11&radic;3) = 33/2</p><p>H = 16.5 m</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A hot air balloon floats serenely at a height of 200&radic;3 m above a desert trail. Two travelers, standing at points A and C along the same straight path, observe the balloon. The angle of elevation from point A is 60&deg;, and from point C it is 30&deg;. What is the distance between A and C?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2352;&#2381;&#2350; &#2361;&#2357;&#2366; &#2325;&#2366; &#2327;&#2369;&#2348;&#2381;&#2348;&#2366;&#2352;&#2366; &#2352;&#2375;&#2327;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344;&#2368; &#2352;&#2366;&#2360;&#2381;&#2340;&#2375; &#2360;&#2375; 200&radic;3 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2346;&#2352; &#2358;&#2366;&#2306;&#2340; &#2349;&#2366;&#2357; &#2360;&#2375; &#2340;&#2376;&#2352; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2361;&#2368; &#2360;&#2368;&#2343;&#2375; &#2352;&#2366;&#2360;&#2381;&#2340;&#2375; &#2346;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; A &#2324;&#2352; C &#2346;&#2352; &#2326;&#2337;&#2364;&#2375; &#2342;&#2379; &#2351;&#2366;&#2340;&#2381;&#2352;&#2368; &#2327;&#2369;&#2348;&#2381;&#2348;&#2366;&#2352;&#2375; &#2325;&#2366; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2348;&#2367;&#2306;&#2342;&#2369; A &#2360;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 60&deg; &#2361;&#2376;, &#2324;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; C &#2360;&#2375; &#2351;&#2361; 30&deg; &#2361;&#2376;&#2404; A &#2324;&#2352; C &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">400 m</span><span class=\"hqt\" style=\"display:none\">400 &#2350;&#2368;</span>",
      "<span class=\"eqt\">300 m</span><span class=\"hqt\" style=\"display:none\">300 &#2350;&#2368;</span>",
      "<span class=\"eqt\">350 m</span><span class=\"hqt\" style=\"display:none\">350 &#2350;&#2368;</span>",
      "<span class=\"eqt\">250 m</span><span class=\"hqt\" style=\"display:none\">250 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=462 height=271 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27673/image005.png\"></p><p>Given BD = 200&radic;3 m</p><p>Let distance between A and C = x km</p><p>In triangle BDC,</p><p>tan 30&deg; = BD/(BA + x)</p><p>1/&radic;3 = 200&radic;3/ (BA + x)</p><p>BA + x = 600 m ... (1)</p><p>In triangle DAB,</p><p>tan60&deg; = BD/BA</p><p>&radic;3 = (200&radic;3)/BA</p><p>BA = 200 m ... (2)</p><p>From equation (1) and (2),</p><p>200 + x = 600</p><p>x = 400 m</p>",
    "question_index": 4
  },

    "question": "<span class=\"eqt\"><p>Two drone pilots, stationed at points C and D, are observing the top of a tall radio tower. Pilot C is just 6 meters away from the base of the tower, while Pilot D is much farther back at 96 meters from the base of the tower  -  both on the same straight runway. Pilot C tilts their drone camera upward at an angle of 54&deg; to capture the top of the tower, while Pilot D does the same but at an angle of 36&deg;. Find the height of the tower.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2337;&#2381;&#2352;&#2379;&#2344; &#2346;&#2366;&#2351;&#2354;&#2335;, &#2332;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; C &#2324;&#2352; D &#2346;&#2352; &#2340;&#2376;&#2344;&#2366;&#2340; &#2361;&#2376;&#2306;, &#2319;&#2325; &#2314;&#2306;&#2330;&#2375; &#2352;&#2375;&#2337;&#2367;&#2351;&#2379; &#2335;&#2366;&#2357;&#2352; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2366; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2352; &#2352;&#2361;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2366;&#2351;&#2354;&#2335; C &#2335;&#2366;&#2357;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2360;&#2375; &#2360;&#2367;&#2352;&#2381;&#2347;&#2364; 6 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2351;&#2354;&#2335; D &#2335;&#2366;&#2357;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2360;&#2375; 96 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2348;&#2361;&#2369;&#2340; &#2346;&#2368;&#2331;&#2375; &#2361;&#2376; - &#2342;&#2379;&#2344;&#2379;&#2306; &#2319;&#2325; &#2361;&#2368; &#2360;&#2368;&#2343;&#2375; &#2352;&#2344;&#2357;&#2375; &#2346;&#2352; &#2361;&#2376;&#2306;&#2404; &#2346;&#2366;&#2351;&#2354;&#2335; C &#2335;&#2366;&#2357;&#2352; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2379; &#2325;&#2376;&#2346;&#2381;&#2330;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2346;&#2344;&#2375; &#2337;&#2381;&#2352;&#2379;&#2344; &#2325;&#2376;&#2350;&#2352;&#2375; &#2325;&#2379; 54&deg; &#2325;&#2375; &#2325;&#2379;&#2339; &#2346;&#2352; &#2314;&#2346;&#2352; &#2325;&#2368; &#2323;&#2352; &#2333;&#2369;&#2325;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2351;&#2354;&#2335; D &#2349;&#2368; &#2320;&#2360;&#2366; &#2361;&#2368; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; 36&deg; &#2325;&#2375; &#2325;&#2379;&#2339; &#2346;&#2352;&#2404; &#2335;&#2366;&#2357;&#2352; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

    "correct_option_id": 0,
    "solution": "<p>Let height of tower = H m</p><p><img width=486 height=243 id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27673/image006.jpg\" ></p><p>In &#916; ABC,</p><p>Tan54&deg; = H/6</p><p>H = 6 * tan54&deg;... (1)</p><p>In &#916; ABD,</p><p>Tan36&deg; = H/96</p><p>H = 96 * tan36&deg;... (2)</p><p>From equation (1) and (2),</p><p>H<sup>2</sup> = 96 * 6 * tan54 * tan36</p><p>H<sup>2</sup> = 576 * tan54 * cot54</p><p>H = &radic;576</p><p>H = 24 m</p>",
    "question_index": 5

    "question": "<span class=\"eqt\"><p>The length of a wall is 21 m. The angle of elevation of a ladder leaning against a wall is A, and the foot of the ladder is 7&radic;3 m away from the wall. Find the value of A.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2368;&#2357;&#2366;&#2352; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 21 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2404; &#2342;&#2368;&#2357;&#2366;&#2352; &#2325;&#2375; &#2360;&#2361;&#2366;&#2352;&#2375; &#2335;&#2367;&#2325;&#2368; &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; A &#2361;&#2376;, &#2340;&#2341;&#2366; &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2366; &#2346;&#2366;&#2342; &#2342;&#2368;&#2357;&#2366;&#2352; &#2360;&#2375; 7&radic;3 &#2350;&#2368;&#2335;&#2352; &#2342;&#2370;&#2352; &#2361;&#2376;&#2404; A &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

      "<span class=\"eqt\">30&deg;</span><span class=\"hqt\" style=\"display:none\">30&deg;</span>",

    "correct_option_id": 0,
    "solution": "<p>Length of ladder = perpendicular = 21 m</p><p>Distance between foot of ladder and wall = base = 7&radic;3 m </p><p>Tan A = perpendicular/base = 21/7&radic;3</p><p>Tan A = &radic;3</p><p>Tan A = tan 60&deg;</p><p>A = 60&deg; </p>",

    "solution": "<p>The given data can be shown using the following diagram:</p><p><b><img width=115 height=125 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p372/image012.jpg\" ></b></p><p>Here, AB is the building, CD is the skyscraper and BC is the distance (<i>d</i>) between the building and skyscraper. Also, angle DAE = 30&deg; and angle DBC = 60&deg; (Given).</p><p>AB = CE = 50, AE = BC = <i>d</i></p><p>In triangle DBC, tan 60&deg; = <i>CD/d = &radic;3</i> =&gt; C<i>D = d&radic;3 = </i>DE + 50<i>.</i></p><p>In triangle DAE, tan 30&deg; = <i>DE/d =</i> (<i>d&radic;3 </i>- 50)/ <i>d </i>= 1/<i>&radic;3</i></p><p>=&gt;(3<i>d</i> - 50<i>&radic;3</i>) = <i>d</i></p><p>=&gt; 2<i>d</i> = 50<i>&radic;3</i> =&gt; <i>d</i> = 25<i>&radic;3</i></p><p><b>C<i>D = d&radic;3</i> = 25  X  3 = 75 m (Height of skyscraper).</b></p>",

    "question": "<span class=\"eqt\"><p>The angle of elevation of a bird from a point 50 m above a lake is 30 and the angle of depression of its reflection in the lake is 60. What is the height at which the bird is located?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2333;&#2368;&#2354; &#2360;&#2375; 50 &#2350;&#2368;&#2335;&#2352; &#2314;&#2346;&#2352; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2319;&#2325; &#2346;&#2325;&#2381;&#2359;&#2368; &#2325;&#2379; &#2342;&#2375;&#2326;&#2344;&#2375; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 30 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2361;&#2376; &#2324;&#2352; &#2333;&#2368;&#2354; &#2350;&#2375;&#2306; &#2311;&#2360;&#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348; &#2325;&#2366; &#2309;&#2357;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 60 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2361;&#2376;&#2404; &#2346;&#2325;&#2381;&#2359;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">500&radic;3 m</span><span class=\"hqt\" style=\"display:none\">500&radic;3 &#2350;&#2368;</span>",
      "<span class=\"eqt\">50 m</span><span class=\"hqt\" style=\"display:none\">50 &#2350;&#2368;</span>",
      "<span class=\"eqt\">100 m</span><span class=\"hqt\" style=\"display:none\">100 &#2350;&#2368;</span>",
      "<span class=\"eqt\">200 m</span><span class=\"hqt\" style=\"display:none\">200 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>We have drawn the figure according to the given information in the question.</p> <p>Here E is the location of the bird. So the total height of the bird from sea level is </p> <p>BE = BC + CE = 50 + h</p> <p>Here AB represents sea level. Now BE = BF</p> <p>because the reflection of the bird will be at the same depth as its height from the sea level.</p> <p><img width=390 height=464 id=image139.png src=\"https://u1.oliveboard.in/exams/solution/http://188.166.225.173/images/customimg/trigonometry/image060.jpg\"></p> <p>Now in triangle DEC, tan 30&deg; = h/DC &#8658; DC = h&radic;3 .. (1)</p><p>Now in triangle DFC, tan 60&deg; = (50 + (50+h))/DC or DC  = (100 + h)/&radic;3 ..(2) </p> <p>From equation (1) and (2) </p> <p>3h = 100 + h &#8658; 2h = 100 </p> <p>&#8658; h = 50m</p> <p>So the height of the bird = BE = 50 + h = 100m</p>",
    "question_index": 12
  },

    "question": "<span class=\"eqt\"><p>On a field, there is a vertical pillar with a tower on its top. At a point 14 meters away from the foot of the pillar, the angles of elevation of the top and bottom of the tower are 60&#176; and 45&#176; respectively. Find the difference of the height of the pillar and the tower.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2350;&#2376;&#2342;&#2366;&#2344; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2360;&#2381;&#2340;&#2306;&#2349; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2346;&#2352; &#2319;&#2325; &#2335;&#2366;&#2357;&#2352; &#2361;&#2376;&#2404; &#2360;&#2381;&#2340;&#2306;&#2349; &#2325;&#2375; &#2346;&#2366;&#2342; &#2360;&#2375; 14 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352;, &#2335;&#2366;&#2357;&#2352; &#2325;&#2375; &#2314;&#2346;&#2352; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2325;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 60&deg; &#2324;&#2352; 45&deg; &#2361;&#2376;&#2306;&#2404; &#2360;&#2381;&#2340;&#2306;&#2349; &#2324;&#2352; &#2335;&#2366;&#2357;&#2352; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">14 &#8211; 11/&#8730;3 meters</span><span class=\"hqt\" style=\"display:none\">14 - 11/&radic;3 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">28 &#8211; 11/&#8730;3 meters</span><span class=\"hqt\" style=\"display:none\">28 - 11/&radic;3 &#2350;&#2368;&#2335;&#2352;</span>",

    "correct_option_id": 3,
    "solution": "\"<p>Calculation:</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/7783878.png\"><br></p><p>In a triangle BCD,</p><p> &#8658; tan 45&#176; = BD/BC</p><p> &#8658; 1 = BD/14</p><p> &#8658; BD = 14 meters (Pillar)</p><p>In a triangle ABC,</p><p> &#8658; tan 60&#176; = AB/BC</p><p> &#8658; &#8730;3 = AB/14</p><p> &#8658; AB = 14&#8730;3 (Pillar + Tower)</p><p> &#8658; AD = AB &#8211; BD = (14&#8730;3)- 14</p><p> &#8658; AD = 14(&#8730;3 - 1)</p><p> &#8658; The difference of the height of the pillar and the tower = BD - AD</p><p> &#8658; 14 - 14(&#8730;3 - 1)</p><p> &#8658; 28 - 14&#8730;3</p><p></p>\"",

    "question": "<span class=\"eqt\"><p>Angle of depression of banks on opposite sides of a river are &#945; and &#946; from a point on a bridge. If height of bridge is h and &#945;+&#946; = &#42597;/4, find width of the river.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2369;&#2354; &#2325;&#2375; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2319;&#2325; &#2344;&#2342;&#2368; &#2325;&#2368; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2342;&#2367;&#2358;&#2366; &#2325;&#2375; &#2325;&#2367;&#2344;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2309;&#2357;&#2344;&#2350;&#2344; &#2325;&#2379;&#2339; &#945; &#2324;&#2352; &#946; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2369;&#2354; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; h &#2361;&#2376; &#2324;&#2352; &#945;+&#946; = &#42597;/4 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2342;&#2368; &#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">h(cot&#945;.cot&#946; - 1)</span><span class=\"hqt\" style=\"display:none\">h(cot&#945;.cot&#946; - 1)</span>",

      "<span class=\"eqt\">h(cot&#945;- cot&#946;)/(cot&#945;.cot&#946;)</span><span class=\"hqt\" style=\"display:none\">h(cot&#945;- cot&#946;)/(cot&#945;.cot&#946;)</span>"

    "correct_option_id": 0,
    "solution": "<p><img width=301 height=176 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13676/image012.jpg\"></p><p>Width of river = x + y</p><p>tan&#945; = h/x and tan&#946; = h/y</p><p>x = h/tan&#945; and y =h/tan&#946;</p><p>Width = x + y = h(1/tan&#945; + 1/tan&#946;)</p><p>= h(tan&#945;+tan&#946;)/(tan&#945;.tan&#946;) .. (1)</p><p>Since tan(&#945;+&#946;) = (tan&#945; + tan&#946;)/(1- tan&#945;.tan&#946;) = tan&#42597;/4</p><p>(tan&#945; + tan&#946;)/(1- tan&#945;.tan&#946;) = 1</p><p>tan&#945; + tan&#946; = 1- tan&#945;.tan&#946;</p><p>(tan&#945; + tan&#946;)/(tan&#945;.tan&#946;) = (1- tan&#945;.tan&#946;)/ (tan&#945;.tan&#946;)</p><p>Width = h(tan&#945;+tan&#946;)/(tan&#945;.tan&#946;) = h(1- tan&#945;.tan&#946;)/ (tan&#945;.tan&#946;)</p><p>= h(1/(tan&#945;.tan&#946;)  -  1)</p><p>= h(cot&#945;.cot&#946; - 1)</p>",
    "question_index": 15
  },

    "solution": "<p><img width=466 height=281 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image089.jpg\" alt=O61.JPG></p><p>Let height of flag AD = h m then height of building BD = (h + 3) m.</p><p>In triangle ABC,</p><p>tan75 = (2h + 3)/BC</p><p>tan (45 + 30) = (2h + 3)/BC</p><p><img width=163 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image090.png\"></p><p><img width=109 height=79 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image091.png\"></p><p><img width=107 height=43 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image092.png\"></p><p><img width=103 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image093.png\"></p><p><img width=89 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image094.png\"></p><p><img width=101 height=27 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image095.png\"></p><p><img width=25 height=19 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image096.png\"></p><p><img width=133 height=43 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image097.png\"></p><p><img width=269 height=23 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image098.png\"></p><p><img width=93 height=23 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image099.png\"></p><p><img width=73 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image100.png\"></p><p><img width=157 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image101.png\"></p><p><img width=84 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image102.png\"></p><p><img width=108 height=43 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image103.png\"></p><p><img width=69 height=43 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15470/image104.png\"></p><p><img width=127 height=43 src=\"https://u1.oliveboard.in     "question": "<span class=\"eqt\"><p>The feet and head of a person are observed to have 45&deg; and 30&deg; angles of depression from the top of a tree respectively. If the height of the person is 4 metres, the height of the tree (in metres) is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2325;&#2381;&#2359; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2346;&#2376;&#2352;&#2379; &#2324;&#2352; &#2360;&#2367;&#2352; &#2325;&#2379; &#2342;&#2375;&#2326;&#2344;&#2375; &#2346;&#2352; &#2348;&#2344;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2309;&#2357;&#2344;&#2350;&#2344; &#2325;&#2379;&#2339; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 45&deg; &#2324;&#2352; 30&deg; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; 4 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2357;&#2371;&#2325;&#2381;&#2359; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; (&#2350;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;:</p></span>",

    "solution": "<p><img width=206 height=198 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8370/image087.jpg\"></p><p>Let AC be the tree and ED be the person.</p><p>ED = 4</p><p>Let BE &#8869; AC. So, BC = ED = 4</p><p>Hence, AB = AC  -  4</p><p>Now, <img width=27 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8370/image088.png\"> = cot45&deg; = 1</p><p>CD = AC</p><p>Hence, BE = AC</p><p>Again, <img width=27 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8370/image089.png\"> = tan30&deg; = <img width=25 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8370/image004.png\"></p><p>AB = <img width=25 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8370/image090.png\"> = <img width=27 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8370/image091.png\"></p><p>AC = AB + BC</p><p>AC = <img width=27 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8370/image091.png\"> + 4</p><p>AC = 4 (<img width=47 height=43 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8370/image092.png\">)</p><p>AC = 4 (<img width=77 height=47 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8370/image093.png\">) = <img width=83 height=31 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8370/image086.png\"> metres</p>",
