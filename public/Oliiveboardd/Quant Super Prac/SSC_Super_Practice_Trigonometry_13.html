<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

            <div class="welcome-header" style="margin-bottom: 24px;">

                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">

                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">

                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>

            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If a<sup>x</sup> = b, b<sup>y</sup> = c and c<sup>z</sup> = a<sup>2</sup>, then what is the value of xyz?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a<sup>x</sup> = b, b<sup>y</sup> = c &#2324;&#2352; c<sup>z</sup> = a<sup>2</sup>, &#2340;&#2379; xyz &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">-1</span><span class=\"hqt\" style=\"display:none\">-1</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>It is given that, c<sup>z</sup> = a<sup>2</sup></p><p>=&gt; (b<sup>y</sup>)<sup>z</sup> = c<sup>z</sup> = a<sup>2</sup></p><p>=&gt; (a<sup>x</sup>)<sup>yz</sup> = a<sup>2</sup></p><p>=&gt; a<sup>xyz</sup> = a<sup>2</sup></p><p>Hence, xyz = 2</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If 9<sup>(12/x)</sup> &div; 27<sup>(x  -  4)</sup> = 3<sup>10</sup>, then what is the value of [(2<sup>x</sup>  -  x<sup>2</sup>)/7], where 'x' is a positive integer?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 9<sup>(12/x)</sup> &div; 27<sup>(x - 4)</sup> = 3<sup>10</sup>, &#2340;&#2379; [(2<sup>x</sup> - x<sup>2</sup>)/7] &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;, &#2332;&#2361;&#2366;&#2305; 'x' &#2319;&#2325; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>9<sup>(12/x)</sup> &div; 27<sup>(x  -  4)</sup> = 3<sup>10</sup></p><p>(3<sup>2</sup>)<sup>(12/x)</sup> * (3<sup>3</sup>)<sup>(x  -  4)</sup> = 3<sup>10</sup></p><p>3<sup>(24/x)</sup> * 3<sup>(3x  -  12)</sup> = 3<sup>10</sup></p><p>3<sup>[(24/x) + 3x  -  12]</sup> = 3<sup>10</sup></p><p>(24/x) + 3x  -  12 = 10</p><p>(24/x) + 3x = 22</p><p>24 + 3x<sup>2</sup> = 22x</p><p>3x<sup>2</sup>  -  22x + 24 = 0</p><p>(x  -  6)(3x  -  4) = 0</p><p>x = 6 and 4/3</p><p>Since 'x' is positive integer. So, x &#8800; 4/3</p><p>= [(2<sup>x</sup>  -  x<sup>2</sup>)/7]</p><p>= [(2<sup>6</sup>  -  6<sup>2</sup>)/7]</p><p>= (64  -  36)/7</p><p>= 28/7</p><p>= 4</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If 81 * 27<sup>(m + 2)</sup> = 3<sup>n</sup>, and 3125<sup>(n + 3)</sup> * 125<sup>4</sup> = 5<sup>m</sup>, then which of the following is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 81 * 27<sup>(m + 2)</sup> = 3<sup>n</sup>, &#2340;&#2341;&#2366; 3125<sup>(n + 3)</sup> * 125<sup>4</sup> = 5<sup>m</sup>, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">m = 13/2 and n = 11/2</span><span class=\"hqt\" style=\"display:none\">m = 13/2 &#2324;&#2352; n = 11/2</span>",
      "<span class=\"eqt\">m = 11/2 and n = 13/2</span><span class=\"hqt\" style=\"display:none\">m = 11/2 &#2324;&#2352; n = 13/2</span>",
      "<span class=\"eqt\">m = -11/2 and n = -13/2</span><span class=\"hqt\" style=\"display:none\">m = -11/2 &#2324;&#2352; n = -13/2</span>",
      "<span class=\"eqt\">m = -13/2 and n = -11/2</span><span class=\"hqt\" style=\"display:none\">m = -13/2 &#2324;&#2352; n = -11/2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>81 * 27<sup>(m + 2)</sup> = 3<sup>n</sup></p><p>=&gt; 3<sup>4 + 3(m + 2) </sup>= 3<sup>n</sup></p><p>=&gt; 4 + 3m + 6 = n</p><p>=&gt; 3m  -  n + 10 = 0----(1)</p><p>And 3125<sup>(n + 3)</sup> * 125<sup>4</sup> = 5<sup>m</sup></p><p>=&gt; 5<sup>5(n + 3) + 12</sup> = 5<sup>m</sup></p><p>=&gt; 5n + 15 + 12 = m</p><p>=&gt; 5n  -  m + 27 = 0---(2)</p><p>Solving equations (1), and (2), we get</p><p>m = -11/2 and n = -13/2</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Evaluate: <img width=254 height=37 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image006.png\" ></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2325;&#2352;&#2375;&#2306;: <img width=254 height=37 id=\"&#2330;&#2367;&#2340;&#2381;&#2352; 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image006.png\" ></p></span>",
    "options": [
      "<span class=\"eqt\">84</span><span class=\"hqt\" style=\"display:none\">84</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">42</span><span class=\"hqt\" style=\"display:none\">42</span>",
      "<span class=\"eqt\">37</span><span class=\"hqt\" style=\"display:none\">37</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>According to the Question,</p><p><img width=254 height=37 id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image007.png\" ></p><p>=<img width=223 height=39 id=\"Picture 26\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image008.png\" ></p><p>=<img width=228 height=39 id=\"Picture 28\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image009.png\" ></p><p>=<img width=179 height=40 id=\"Picture 31\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image010.png\" ></p><p>=<img width=105 height=40 id=\"Picture 33\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image011.png\" ></p><p>=<img width=98 height=40 id=\"Picture 40\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image012.png\" ></p><p>=<img width=35 height=40 id=\"Picture 42\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image013.png\" > =42</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If 7 <sup>(a + b) </sup>= 343 and 49 <sup>(a  -  b) </sup>= 2401, find the value of 3a.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 7 <sup>(a + b) </sup>= 343 &#2324;&#2352; 49 <sup>(a - b) </sup>= 2401 &#2361;&#2376;, &#2340;&#2379; 3a &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">15/2</span><span class=\"hqt\" style=\"display:none\">15/2</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>7<sup>(a+b)</sup> =343=7<sup>3</sup></p><p>So, a + b = 3 .. (1)</p><p>49<sup>(a-b)</sup> = 2401 = 49<sup>2</sup></p><p>So, a - b = 2 .. (2)</p><p>Add eq (1) and (2),</p><p>2a = 5</p><p>Or 3a = 5 x 3/2 = 15/2</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If 81<sup>(2x + 3) </sup>= 729<sup>y</sup>, then which of the following is true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 81<sup>(2x + 3)</sup>= 729<sup>y</sup> &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">y = (4x/3) + 2</span><span class=\"hqt\" style=\"display:none\">y = (4x/3) + 2</span>",
      "<span class=\"eqt\">y = (4x/3)  -  2</span><span class=\"hqt\" style=\"display:none\">y = (4x/3)  -  2</span>",
      "<span class=\"eqt\">y = (4x/3) + 1</span><span class=\"hqt\" style=\"display:none\">y = (4x/3) + 1</span>",
      "<span class=\"eqt\">y = (4x/3)  -  1</span><span class=\"hqt\" style=\"display:none\">y = (4x/3)  -  1</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=88 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image002.png\"></p><p><img width=79 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image003.png\"></p><p><img width=25 height=19 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image004.png\"></p><p><img width=81 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image005.png\"></p><p><img width=72 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image006.png\"></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If A = 10<sup>400</sup>, B = 8<sup>200</sup>, and C = 6<sup>800</sup>, then which of the following is true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A = 10<sup>400</sup>, B = 8<sup>200</sup>, &#2324;&#2352; C = 6<sup>800</sup>, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">A &lt; B &lt; C</span><span class=\"hqt\" style=\"display:none\">A &lt; B &lt; C</span>",
      "<span class=\"eqt\">C &lt; A &lt; B</span><span class=\"hqt\" style=\"display:none\">C &lt; A &lt; B</span>",
      "<span class=\"eqt\">B &lt; A &lt; C</span><span class=\"hqt\" style=\"display:none\">B &lt; A &lt; C</span>",
      "<span class=\"eqt\">A &lt; C &lt; B</span><span class=\"hqt\" style=\"display:none\">A &lt; C &lt; B</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=201 height=31 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image007.png\"></p><p><img width=159 height=31 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image008.png\"></p><p><img width=111 height=31 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image009.png\"></p><p>Therefore, B &lt; A &lt; C</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The highest number amongst <img width=121 height=23 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image010.png\"> is:</p><p>(A) <img width=31 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image011.png\"></p><p>(B) <img width=31 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image012.png\"></p><p>(C) <img width=35 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image013.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;:</p><p>(A) <img width=31 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image011.png\"></p><p>(B) <img width=31 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image012.png\"></p><p>(C) <img width=35 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image013.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">A</span><span class=\"hqt\" style=\"display:none\">A</span>",
      "<span class=\"eqt\">B</span><span class=\"hqt\" style=\"display:none\">B</span>",
      "<span class=\"eqt\">C</span><span class=\"hqt\" style=\"display:none\">C</span>",
      "<span class=\"eqt\">Cannot be determined.</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2351; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=76 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image014.png\"></p><p><img width=80 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image015.png\"></p><p><img width=85 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image016.png\"></p><p><img width=7 height=7 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image017.png\">LCM of denominators of fractional powers = LCM (4, 6, 12) = 12</p><p>We get:</p><p><img width=153 height=31 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image018.png\"></p><p><img width=147 height=31 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image019.png\"></p><p><img width=148 height=31 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27059/image020.png\"></p><p>The highest among them is 1000, so the highest number is 10<sup>(1/4)</sup>.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>If 16<sup>x</sup> x 64<sup>(1/4) </sup>= 4<sup>(3/4)</sup>, then find the value of x.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 16<sup>x</sup> x 64<sup>(1/4) </sup>= 4<sup>(3/4)</sup> &#2361;&#2379;, &#2340;&#2379; x &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",

      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
