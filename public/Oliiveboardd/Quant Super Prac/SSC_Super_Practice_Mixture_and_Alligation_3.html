<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In what ratio must a grocer mix two types of sugar costing Rs. 18/kg and Rs. 25/kg, so that the resultant mixture costs Rs. 21/kg?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2306;&#2360;&#2366;&#2352;&#2368; &#2325;&#2379; &#2352;&#2369;.18/kg &#2324;&#2352; &#2352;&#2369;.25/kg &#2357;&#2366;&#2354;&#2368; &#2342;&#2379; &#2325;&#2367;&#2360;&#2381;&#2350; &#2325;&#2368; &#2330;&#2368;&#2344;&#2368; &#2325;&#2379; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2368; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2352;&#2369;.21/kg &#2361;&#2379;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 : 3</span><span class=\"hqt\" style=\"display:none\">1 : 3</span>",
      "<span class=\"eqt\">2 : 1</span><span class=\"hqt\" style=\"display:none\">2 : 1</span>",
      "<span class=\"eqt\">4 : 3</span><span class=\"hqt\" style=\"display:none\">4 : 3</span>",
      "<span class=\"eqt\">3 : 2</span><span class=\"hqt\" style=\"display:none\">3 : 2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=290 height=232 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25022/image002.gif\"></p><p>Required ratio = 4 : 3</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A mixture of 220 litres contains milk and water in the ratio 4: 7 respectively. What quantity of milk should be added to the mixture to reverse the ratio of milk and water?</p></span><span class=\"hqt\" style=\"display:none\"><p>220 &#2354;&#2368;&#2335;&#2352; &#2325;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 4: 7 &#2361;&#2376;&#2404; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2313;&#2354;&#2335;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">132 liters</span><span class=\"hqt\" style=\"display:none\">132 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">143 liters</span><span class=\"hqt\" style=\"display:none\">143 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">154 liters</span><span class=\"hqt\" style=\"display:none\">154 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">165 liters</span><span class=\"hqt\" style=\"display:none\">165 &#2354;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Initial quantity of mixture = 220 liters</p><p>Initial quantity of milk = 220 * 4/(4 + 7) = 80 liters</p><p>And, initial quantity of water = 220  -  80 = 140 liters</p><p>Let x litres milk is added to the mixture. Then,</p><p>7: 4 = (80 + x): 140</p><p><b>x = 165 liters</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A mixture P is formed by mixing milk and water from beakers A and B in the ratio 3: 4 respectively. Initially, beakers A contains 60 litres milk and beaker B contains 40 litres water. After mixing, the remaining quantity of milk in beaker A is 24 litres more than the remaining quantity of water in beaker B, then what is the quantity of mixture P?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; P &#2348;&#2368;&#2325;&#2352; A &#2324;&#2352; B &#2360;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3:4 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2379; &#2350;&#2367;&#2354;&#2366; &#2325;&#2352; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2350;&#2375;&#2306; &#2348;&#2368;&#2325;&#2352; A &#2350;&#2375;&#2306; 60 &#2354;&#2368;&#2335;&#2352; &#2342;&#2370;&#2343; &#2324;&#2352; &#2348;&#2368;&#2325;&#2352; B &#2350;&#2375;&#2306; 40 &#2354;&#2368;&#2335;&#2352; &#2346;&#2366;&#2344;&#2368; &#2341;&#2366;&#2404; &#2350;&#2367;&#2358;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2348;&#2368;&#2325;&#2352; A &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2348;&#2368;&#2325;&#2352; B &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2325;&#2375; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2360;&#2375; 24 &#2354;&#2368;&#2335;&#2352; &#2309;&#2343;&#2367;&#2325; &#2341;&#2368;, &#2340;&#2379; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; P &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">35 liters</span><span class=\"hqt\" style=\"display:none\">35 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">21 liters</span><span class=\"hqt\" style=\"display:none\">21 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">42 liters</span><span class=\"hqt\" style=\"display:none\">42 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">28 liters</span><span class=\"hqt\" style=\"display:none\">28 &#2354;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the quantity of milk and water in mixture P are '3a' litres and '4a' litres respectively.</p><p>Then, the remaining quantity of milk in beaker A = 60  -  3a</p><p>And, the remaining quantity of water in beaker B = 40  -  4a</p><p>Then, 60  -  3a = 40  -  4a + 24</p><p>a = 4</p><p>Therefore, quantity of mixture P = 3a + 4a = 7a = 7 * 4 = <b>28 litres</b></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Two vessel A and B contain spirit and water in the ratio of 3:5 and 4:17 respectively. Vessel A has 27 liters of spirit. Find the total water content in both vessels A and B together if the total spirit in both vessels together is 43 liters.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2348;&#2352;&#2381;&#2340;&#2344;&#2379;&#2306; A &#2324;&#2352; B &#2350;&#2375;&#2306; &#2360;&#2381;&#2346;&#2367;&#2352;&#2367;&#2335; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3:5 &#2324;&#2352; 4:17 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2348;&#2352;&#2381;&#2340;&#2344; A &#2350;&#2375;&#2306; 27 &#2354;&#2368;&#2335;&#2352; &#2360;&#2381;&#2346;&#2367;&#2352;&#2367;&#2335; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2379;&#2344;&#2379;&#2306; &#2348;&#2352;&#2381;&#2340;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2381;&#2346;&#2367;&#2352;&#2367;&#2335; &#2325;&#2368; &#2325;&#2369;&#2354; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; 43 &#2354;&#2368;&#2335;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2379;&#2344;&#2379;&#2306; &#2348;&#2352;&#2381;&#2340;&#2344;&#2379;&#2306; A &#2324;&#2352; B &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2325;&#2369;&#2354; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">68 liters</span><span class=\"hqt\" style=\"display:none\">68 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">113 liters</span><span class=\"hqt\" style=\"display:none\">113 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">45 liters</span><span class=\"hqt\" style=\"display:none\">45 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">23 liters</span><span class=\"hqt\" style=\"display:none\">23 &#2354;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In vessel A spirit = 27 liters</p><p>Ratio of spirit to water = 3:5</p><p>Water in vessel A = 5/3 *27= 45 liters</p><p>Total spirit in vessel A and B = 43 liters</p><p>Spirit in vessel B = 43  -  27 = 16 liters</p><p>Ratio of spirit to water = 4:17</p><p>Water in vessel B = 17/4*16 = 68 liters</p><p>Total water in both vessel A and B = 68+45= 113 liters</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of milk and water in a 91l mixture is 4: 3. Some quantity of milk is removed from the mixture, and the ratio of milk to water becomes 12: 13. How much milk is removed? </p></span><span class=\"hqt\" style=\"display:none\"><p>911 &#2354;&#2368;&#2335;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4: 3 &#2361;&#2376;&#2404; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2360;&#2375; &#2342;&#2370;&#2343; &#2325;&#2368; &#2325;&#2369;&#2331; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2344;&#2367;&#2325;&#2366;&#2354; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2340;&#2341;&#2366; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 12: 13 &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2367;&#2340;&#2344;&#2366; &#2342;&#2370;&#2343; &#2344;&#2367;&#2325;&#2366;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">16l</span><span class=\"hqt\" style=\"display:none\">16l</span>",
      "<span class=\"eqt\">18l</span><span class=\"hqt\" style=\"display:none\">18l</span>",
      "<span class=\"eqt\">24l</span><span class=\"hqt\" style=\"display:none\">24l</span>",
      "<span class=\"eqt\">22l</span><span class=\"hqt\" style=\"display:none\">22l</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The milk in a mixture = 91*4/7 = 52l</p><p>The water in a mixture = 91  -  52 = 39 l</p><p>Let the milk removed from the mixture be 'x'.</p><p>A/Q</p><p>(52  -  x)/ 39 = 12/13 </p><p>52* 13  -  13x = 39* 12</p><p>676  -  13x = 468</p><p>13x = 676  -  468</p><p>x = 208/13 = 16l</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>How much quantity (in kg) of corn flour costing Rs. 63 per kg must be mixed with 40 kg of rice flour of costing Rs. 36 per kg, so that on selling the mixture at Rs. 58.5 per kg, there is a gain of 30%?</p></span><span class=\"hqt\" style=\"display:none\"><p>63 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2325;&#2375; &#2350;&#2325;&#2312; &#2325;&#2375; &#2310;&#2335;&#2375; &#2325;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; (&#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306;) &#2325;&#2379; 36 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#2325;&#2375; 40 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2330;&#2366;&#2357;&#2354; &#2325;&#2375; &#2310;&#2335;&#2375; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2379; 58.5 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2346;&#2352; &#2348;&#2375;&#2330;&#2344;&#2375; &#2346;&#2352; 30% &#2325;&#2366; &#2354;&#2366;&#2349; &#2361;&#2379;?</p></span>",
    "options": [
      "<span class=\"eqt\">20 kg</span><span class=\"hqt\" style=\"display:none\">20 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">40 kg</span><span class=\"hqt\" style=\"display:none\">40 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">60 kg</span><span class=\"hqt\" style=\"display:none\">60 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">50 kg</span><span class=\"hqt\" style=\"display:none\">50 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let k kg of corn flour is added. </p><p>According to the question,</p><p>(k * 63 + 40 * 36)/(k + 40) = 58.5 * 100/130</p><p>=&gt; (63k + 1440)/(k + 40) = 45</p><p>=&gt; 63k + 1440 = 45k + 1800</p><p>=&gt; 18k = 360</p><p>=&gt; k = 20 kg</p>",
    "question_index": 5
  },
  {

    "question": "<span class=\"eqt\"><p>A can contains a mixture of two liquids P &amp; Q in the ratio 5:3. When 16 ml of mixture are drawn off and the can is filled with same quantity of liquid Q, the ratio of P &amp; Q becomes 23:17. How many millilitres of liquid P was contained by the can initially?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2376;&#2344; &#2350;&#2375;&#2306; &#2342;&#2379; &#2340;&#2352;&#2354; P &#2324;&#2352; Q &#2325;&#2366; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; 5:3 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404; &#2332;&#2348; 16 ml &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2344;&#2367;&#2325;&#2366;&#2354; &#2354;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2325;&#2376;&#2344; &#2350;&#2375;&#2306; &#2340;&#2352;&#2354; Q &#2325;&#2368; &#2360;&#2350;&#2366;&#2344; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2337;&#2366;&#2354; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; P &#2324;&#2352; Q &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 23:17 &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2310;&#2352;&#2306;&#2349; &#2350;&#2375;&#2306; &#2325;&#2376;&#2344; &#2350;&#2375;&#2306; &#2340;&#2352;&#2354; P &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2367;&#2354;&#2368;&#2354;&#2368;&#2335;&#2352; &#2341;&#2368;?</p></span>",

      "<span class=\"eqt\">125 ml</span><span class=\"hqt\" style=\"display:none\">125 ml</span>",
      "<span class=\"eqt\">75 ml</span><span class=\"hqt\" style=\"display:none\">75 ml</span>",
      "<span class=\"eqt\">200 ml</span><span class=\"hqt\" style=\"display:none\">200 ml</span>"

    "correct_option_id": 1,
    "solution": "<p>Let the can contains 5x and 3x of mixtures P and Q.</p><p>Quantities of P in mixture left = [5x-(5/8  X  16)] = 5x - 10</p><p>Quantities of Q in mixture left = [3x-(3/8  X  16)] = 3x  -  6</p><p>\\ (5x - 10) / [ ( 3x - 6) +16] = 23/17</p><p>(5x - 10) / ( 3x + 10) = 23/17</p><p>85x  -  170 = 69x + 230</p><p>16x = 400</p><p>x = 25</p><p>So, the can contains 25  X  5 = 125 ml of P</p>",

;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A container contains 96 ml of mixture of chemical A and chemical B in the ratio of 5: 7 respectively. If 36 ml of mixture is taken out from that container and then 40 ml of chemical B added to it, what will be the percentage of chemical A in the final mixture?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2350;&#2375;&#2306; &#2352;&#2360;&#2366;&#2351;&#2344; A &#2324;&#2352; &#2352;&#2360;&#2366;&#2351;&#2344; B &#2325;&#2366; 96 ml &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 5:7 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2350;&#2375;&#2306; &#2360;&#2375; 36 ml &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2344;&#2367;&#2325;&#2366;&#2354; &#2354;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; &#2313;&#2360;&#2350;&#2375;&#2306; 40 ml &#2352;&#2360;&#2366;&#2351;&#2344; B &#2350;&#2367;&#2354;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2309;&#2306;&#2340;&#2367;&#2350; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2352;&#2360;&#2366;&#2351;&#2344; A &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">12%</span><span class=\"hqt\" style=\"display:none\">12%</span>",

      "<span class=\"eqt\">50%</span><span class=\"hqt\" style=\"display:none\">50%</span>",

    "solution": "<p>A container contains 96 ml of mixture of chemical A and chemical B in the ratio of 5: 7 respectively.</p><p>Total quantity of chemical A = 96 * (5/12)= 40 ml</p><p>Total quantity of chemical B = 96 * (7/12) = 56 ml</p><p>Chemical A in 36 ml of mixture= 36 * (5/12)=15 ml</p><p>New mixture= 96- 36 + 40=100 ml</p><p>Chemical A in new mix= 40  -  15 =25 ml</p><p>Percentage of chemical A in final mixture= (25/100)*100=25%</p>",
