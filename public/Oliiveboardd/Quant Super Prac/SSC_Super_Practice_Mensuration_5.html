    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Find the least number of square tiles are required to cover a rectangular floor having dimensions </p><p>20  X  16 m<sup>2</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>20 X 16 &#2350;&#2368;<sup>2</sup> &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2347;&#2352;&#2381;&#2358; &#2325;&#2379; &#2338;&#2325;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2357;&#2352;&#2381;&#2327;&#2366;&#2325;&#2366;&#2352; &#2335;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">80</span><span class=\"hqt\" style=\"display:none\">80</span>",
      "<span class=\"eqt\">56</span><span class=\"hqt\" style=\"display:none\">56</span>",
      "<span class=\"eqt\">70</span><span class=\"hqt\" style=\"display:none\">70</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Number of square tiles = 20 * 16 / area of one square tile</p><p>Area of one square tile = x<sup>2</sup></p><p>For finding the side length of one square tile, we will have to take the H.C.F of length and breadth of the rectangle.</p><p>This is because we don't want to cut any square tile, and we want to use a whole number of square tiles.</p><p>=&gt; X = H. C.F of 20 and 16.</p><p>=&gt; H. C. F = 4</p><p>=&gt; Number of square tiles required = 20* 16 / 4</p><p>=&gt; 20 * 4</p><p>=&gt; 80 tiles</p><p>So, <b>option 2</b> is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In a parallelogram the length of the adjacent sides are 12 cm and 14 cm respectively. If the length of one diagonal is 16 cm then what is the approximate length of the other diagonal?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2350;&#2375;&#2306; &#2310;&#2360;&#2344;&#2381;&#2344; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 12 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 14 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 16 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">14.56 cm</span><span class=\"hqt\" style=\"display:none\">14.56 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">17.5 cm</span><span class=\"hqt\" style=\"display:none\">17.5 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">20.6 cm</span><span class=\"hqt\" style=\"display:none\">20.6 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">22 cm</span><span class=\"hqt\" style=\"display:none\">22 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>We know that in a parallelogram</p><p>Sum of the squares of the diagonals = 2(sum of the squares of the two adjacent sides)</p><p>Let the length of the other diagonal be = D cm</p><p>Therefore; D<sup>2</sup> + 16<sup>2</sup> = 2(12<sup>2</sup>+ 14<sup>2</sup>)</p><p>=&gt; D<sup>2</sup> + 256 = 2(144+ 196)</p><p>=&gt; D<sup>2</sup> = 680  -  256 = 424</p><p>=&gt; D = 20.6 cm</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Find the area of a Quadrilateral which has a diagonal of length 10 cm and the length of the perpendiculars drawn on this diagonal from opposite vertices are 3 cm and 4 cm.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2325;&#2375; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 10 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2340;&#2341;&#2366; &#2311;&#2360; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; &#2346;&#2352; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2358;&#2368;&#2352;&#2381;&#2359;&#2379;&#2306; &#2360;&#2375; &#2337;&#2366;&#2354;&#2375; &#2327;&#2319; &#2354;&#2306;&#2348;&#2379;&#2306; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 3 &#2360;&#2375;&#2350;&#2368; &#2340;&#2341;&#2366; 4 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">60 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">60 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">35 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">35 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">15 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">15 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">40 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">40 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Area of Quadrilateral ABCD = area of &#916; ABD + area of &#916; BCD</p><p><img width=197 height=198 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p1006/image011.jpg\"></p><p>Area of &#916; ABD = (1/2)*BD*AE</p><p>BD = 10 cm</p><p>AE = 3 cm</p><p>CF = 4 cm</p><p> Area of &#916; ABD = 1*10*3/2 = 15 cm<sup>2</sup></p><p>Area of &#916; BCD = (1/2)*BD*CF</p><p>= 1*10*4/2 = 20 cm<sup>2</sup></p><p> Area of Quadrilateral = 15 + 20 = 35 cm<sup>2</sup></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What is the perpendicular distance (in cm) between the parallel sides of a trapezium whose area is 216 sq.cm and the lengths of the parallel sides are 18 cm and 36 cm?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2354;&#2350;&#2381;&#2348; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2368; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2354;&#2306;&#2348;&#2357;&#2340; &#2342;&#2370;&#2352;&#2368; (&#2360;&#2375;&#2350;&#2368; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 216 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 18 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 36 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>We have &#8710; = 1/2(a + b) h</p><p>Therefore 216 = 1/2 (18 + 36) h therefore h = 8 cm.</p><p>Hence the correct option is C.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If one of the sides of the rhombus is 10 cm and one diagonal is 16 cm, Find the area.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2350;&#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2368; &#2319;&#2325; &#2349;&#2369;&#2332;&#2366; 10 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; &#2319;&#2325; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; 16 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">96cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">96&#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">1176 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">1176 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">84 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">84 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">160 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">160 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=138 height=154 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p1541/image002.jpg\"></p><p>=&gt; The figure will be as shown.</p><p>=&gt; In &#8710; AOC, AO = 8 cm, AC = 10 cm</p><p>=&gt;  OC<sup>2</sup> = AC<sup>2</sup>  -  AO<sup>2</sup></p><p>=&gt; OC<sup>2</sup> = 10<sup>2</sup> -8<sup>2</sup></p><p>=&gt;  OC = 6</p><p>=&gt; And BC = BO+OC</p><p>=&gt; = 6+6</p><p>=&gt; = 12 cm</p><p>=&gt; Area = D<sub>1</sub>*D<sub>2</sub> / 2</p><p>=&gt; 16*12 / 2</p><p>=&gt; 16*6</p><p>=&gt; 96cm<sup>2</sup></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In the trapezium given below, AB = 8 cm, AC = 6 cm and BD = 10 cm, then what is the area of this trapezium?</p><p><img width=321 height=177 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p6449/image001.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2354;&#2350;&#2381;&#2348; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2350;&#2375;&#2306; AB = 8 &#2360;&#2375;&#2350;&#2368;, AC = 6 &#2360;&#2375;&#2350;&#2368; &#2340;&#2341;&#2366; BD = 10 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360; &#2360;&#2350;&#2354;&#2350;&#2381;&#2348; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p><img width=321 height=177 id=\"&#2330;&#2367;&#2340;&#2381;&#2352; 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p6449/image001.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">108 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">108 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">72 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">72 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">144 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">144 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">36 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">36 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=322 height=175 id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p6449/image002.jpg\"></p><p>OB = AC = 6 cm</p><p>BD = 10 cm</p><p>BOD is a right-angle triangle:</p><p>BD<sup>2</sup> = OB<sup>2</sup> + OD<sup>2</sup></p><p>10<sup>2</sup> = 6<sup>2</sup> + OD<sup>2</sup></p><p>OD<sup>2</sup> = 100  -  36</p><p>OD = 8 cm</p><p>CD = OC + OD [OC = AB = 8 cm]</p><p>CD = 8 + 8 = 16 cm</p><p>Area of trapezium = (1/2) * (AB + CD) * AC = (1/2) * (8 + 16) * 6</p><p>= 72 cm<sup>2</sup></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The perimeter of a parallelogram ABCD is 84 cm and DE and BF is perpendicular to AB and AD respectively. If AB = 24 cm and DE = 21 cm, then what is the length of BF?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; ABCD &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; 84 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2340;&#2341;&#2366; DE &#2324;&#2352; BF &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; AB &#2324;&#2352; AD &#2346;&#2352; &#2354;&#2306;&#2348;&#2357;&#2340; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; AB = 24 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; DE = 21 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; BF &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">36 cm</span><span class=\"hqt\" style=\"display:none\">36 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">22 cm</span><span class=\"hqt\" style=\"display:none\">22 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">24 cm</span><span class=\"hqt\" style=\"display:none\">24 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">28 cm</span><span class=\"hqt\" style=\"display:none\">28 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The perimeter of a parallelogram ABCD is 84 cm</p><p>2(AB + AD) = 84</p><p>=&gt; AD = 42 - 24</p><p>=&gt; AD = 18 cm</p><p>We know that,</p><p>AB * DE = BF * AD</p><p>=&gt; 24 * 21 = BF * 18</p><p>=&gt; BF = (24 * 21)/18</p><p>=&gt; BF = 28 cm</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If area of triangle BEC is 6 cm<sup>2</sup>, then what is the area of the trapezium ABCD given below?</p><p><img width=368 height=198 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p6272/image004.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; BEC &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 6 &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2361;&#2376;, &#2340;&#2379; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2354;&#2350;&#2381;&#2348; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; ABCD &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p><img width=368 height=198 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p6272/image004.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">54 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">54 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">48 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">48 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">58 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">58 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">42 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">42 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In triangle BEC:</p><p>BE is perpendicular to EC. Then,</p><p>Area of triangle BEC = (1/2) x EC x BE = 6</p><p>(1/2) x 3 x BE = 6</p><p>BE = 4 cm</p><p>Now, if we draw a line AF perpendicular to DC, then AF = BE = 4 cm and AB = FE = 9 cm</p><p><img width=385 height=207 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p6272/image005.png\"></p><p>Then, in triangle AFD, by using Pythagoras theorem, we have</p><p>AD<sup>2</sup> = AF<sup>2 </sup>+ DF<sup>2</sup></p><p>(2&radic;13)<sup>2</sup> = (4)<sup>2</sup> + DF<sup>2</sup></p><p>DF = 6 cm</p><p>Now, DC = DF + FE + EC = 6 + 9 + 3 = 18 cm</p><p>Since, AB and DC are parallel to each other and BE is the distance between them.</p><p>Therefore, area of trapezium ABCD = (1/2) x sum of parallel sides of trapezium x distance between parallel sides</p><p>= (1/2) x (AB + DC) x BE</p><p>= (1/2) x (9 + 18) x 4</p><p>= 54 cm<sup>2</sup></p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>In a parallelogram, 'a' and 'b' are adjacent sides, and its area is 108 cm<sup>2</sup>. If distance between two parallel sides, whose length is 'a', is 6 cm and the ratio of 'a' to 'b' is 9: 4, then find the perimeter of the parallelogram?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2350;&#2375;&#2306;, 'a' &#2324;&#2352; 'b' &#2310;&#2360;&#2344;&#2381;&#2344; &#2349;&#2369;&#2332;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;, &#2324;&#2352; &#2311;&#2360;&#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 108 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;<sup>2</sup>&#2404; &#2351;&#2342;&#2367; &#2342;&#2379; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306;, &#2332;&#2367;&#2344;&#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 'a' &#2361;&#2376;, &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 6 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; 'a' &#2360;&#2375; 'b' &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 9: 4 &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">48 cm</span><span class=\"hqt\" style=\"display:none\">48 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">60 cm</span><span class=\"hqt\" style=\"display:none\">60 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">44 cm</span><span class=\"hqt\" style=\"display:none\">44 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">52 cm</span><span class=\"hqt\" style=\"display:none\">52 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Area of the parallelogram = 108 cm<sup>2</sup></p><p>So,</p><p>a * 6 = 108</p><p>a = 18 cm</p><p>Since, ratio of 'a' to 'b' = 9: 4</p><p>So,</p><p>b = 18 * (4/9) = 8 cm</p><p>Now, perimeter of the parallelogram = 2 * (18 + 8) = 52 cm</p>",
    "question_index": 8
  },

    "question": "<span class=\"eqt\"><p>The length and the breadth of a rectangular plot of land are in the ratio 3: 2. If Rs. 2160 is spent on surrounding the plot with a fence at the rate of Rs. 27 per meter, then find the difference between the length and the breadth of the rectangular plot.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2349;&#2370;&#2326;&#2306;&#2337; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3:2 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2349;&#2370;&#2326;&#2306;&#2337; &#2325;&#2379; 27 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2348;&#2366;&#2337;&#2364; &#2360;&#2375; &#2328;&#2375;&#2352;&#2344;&#2375; &#2346;&#2352; 2160 &#2352;&#2369;&#2346;&#2351;&#2375; &#2326;&#2352;&#2381;&#2330; &#2325;&#2367;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2349;&#2370;&#2326;&#2306;&#2337; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "correct_option_id": 0,
    "solution": "<p>The length of rectangle plot = 2 (length + breadth) = 2 (3a + 2a)</p><p>The cost of fence = 27 * 2 (3a + 2a) </p><p>Rs. 2160 = 54 (3a + 2a)</p><p>5a = 40</p><p>a = 8</p><p>The required difference = 3a  -  2a = a = 8 m</p>",

    "question": "<span class=\"eqt\"><p>The area of a rhombus is 336 cm<sup>2</sup> and sum of its diagonal is 62 cm. What is the side of the rhombus? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 336 &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2375; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; &#2325;&#2366; &#2351;&#2379;&#2327; 62 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2360;&#2350;&#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p>Let the diagonal of the rhombus be 'd' cm and 'D' cm respectively.</p><p>D + d = 62 cm</p><p>Area of a rhombus = 336 cm<sup>2</sup></p><p>&frac12; * d * D = 336</p><p>d*D = 672</p><p>Side of the rhombus = &radic;{(d/2)<sup>2</sup> + (D/2)<sup>2</sup>} </p><p>= &frac12; * &radic;{d<sup>2</sup> + D<sup>2</sup>}</p><p>= &frac12; * &radic;{(d+D)<sup>2</sup>  -  2dD}</p><p>= &frac12; * &radic;{62<sup>2</sup>  -  2*672}</p><p>= &frac12; * &radic;(2500)</p><p>= &frac12; * 50</p><p>= 25 cm</p><p><u> </u></p>",

    "solution": "<p>The perimeter of a square = 4 * side</p><p>The perimeter of a rectangle = 2 (Length + Breadth) </p><p>The perimeter of the square/ The perimeter of a rectangle = 8/ 7</p><p>4 * side/ [2 * (L + B) = 8/7</p><p>2 * L/ (L + 27) = 8/7 </p><p>L * 7 = 4 (L + 27) </p><p>3L = 4 * 27 </p><p>L = 36 cm</p><p>Hence, the area of the rectangle = 27 * 36 = 972 cm<sup>2</sup></p>",
