<!DOCTYPE html>

<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">

            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->

                <!-- Controls -->
                <div class="nav-controls">

            </div>
            
            <!-- Desktop Navigator Sidebar -->

                    </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If x<sup>2</sup> + 7x + 8 = 0, then find the value of&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">4x</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x<sup>2</sup>  -  5x + 8</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&nbsp;&#2351;&#2342;&#2367;  x<sup>2</sup> + 7x + 8 = 0, &#2340;&#2379; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;  &nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">4x</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x<sup>2</sup>  -  5x + 8</span></div></div></p><p></p></span>",
    "options": [
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>",
      "<span class=\"eqt\">-1/4</span><span class=\"hqt\" style=\"display:none\">-1/4</span>",
      "<span class=\"eqt\">-1/3</span><span class=\"hqt\" style=\"display:none\">-1/3</span>",
      "<span class=\"eqt\">1/6</span><span class=\"hqt\" style=\"display:none\">1/6</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>x&#178; + 7x + 8 = 0</p><p>x&#178; = -7x - 8</p><p>Substitute x&#178; = -7x - 8 into (x&#178; - 5x + 8):</p><p>x&#178; - 5x + 8 = (-7x - 8) - 5x + 8</p><p>=&gt; -7x - 5x - 8 + 8</p><p>=&gt; -12x</p><p>So, the denominator becomes -12x.</p><p>The expression becomes : </p><p>(4x)/(x&#178; - 5x + 8) = (4x)/(-12x)</p><p>=&gt; 4/-12 = -1/3</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If a -&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a - 5</span></div>&nbsp;= 10, then the value of (a - 5)<sup>3</sup> -&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(a - 5)<sup>3</sup></span></div>&nbsp;is:&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; a - <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a - 5</span></div> = 10 &#2361;&#2376;, &#2340;&#2379; (a - 5)<sup>3</sup> - <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(a - 5)<sup>3</sup></span></div> &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</div></p></span>",
    "options": [
      "<span class=\"eqt\">140</span><span class=\"hqt\" style=\"display:none\">140</span>",
      "<span class=\"eqt\">70</span><span class=\"hqt\" style=\"display:none\">70</span>",
      "<span class=\"eqt\">100</span><span class=\"hqt\" style=\"display:none\">100</span>",
      "<span class=\"eqt\">120</span><span class=\"hqt\" style=\"display:none\">120</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=85 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image074.png\"></p><p><img width=108 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image075.png\"></p><p><img width=133 height=45 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image076.png\"></p><p><img width=280 height=49 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image077.png\"></p><p><img width=192 height=45 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image078.png\"></p><p><img width=179 height=45 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image079.png\"></p><p><img width=148 height=45 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image080.png\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If a<sup>3</sup> +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a<sup>3 </sup></span></div>&nbsp;= 2 (a &gt; 0), then the value of a +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a</span></div>&nbsp;is :&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; a<sup>3</sup> +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a<sup>3 </sup></span></div>&nbsp;= 2 (a &gt; 0), &#2340;&#2379; a +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">a</span></div>&nbsp; &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</div></p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>a<sup>3</sup> + 1/a<sup>3</sup> = 2</p><p>(a + 1/a)<sup>3</sup> = a<sup>3 </sup>+ 1/a<sup>3</sup> + 3(a + 1/a)</p><p>x<sup>3</sup> = 2 + 3x</p><p>where x = a + 1/a</p><p>rearrange the equation : </p><p>x<sup>3</sup>  -  3x  -  2 = 0</p><p>(x  -  2)(x<sup>2</sup> + 2x + 1) = 0</p><p>Solving x<sup>2</sup> + 2x + 1 = 0</p><p>(x + 1)<sup>2</sup> = 0 =&gt; x = - 1</p><p>Since a &gt; 0, we discard x = -1 and we take</p><p>a + 1/a = 2</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If x<sup>2</sup> + 1 = x , then the value of x<sup>12</sup> + x<sup>6</sup> + 1 is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; x<sup>2</sup> + 1 = x , &#2340;&#2379; x<sup>12</sup> + x<sup>6</sup> + 1 &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>When, x&#178; + 1 = x</p><p>Then,</p><p>x<sup>3</sup> = -1</p><p>x<sup>6</sup> = 1 </p><p>x<sup>9</sup> = -1</p><p>x<sup>12</sup> = 1 </p><p>Given, x&#178; + 1 = x</p><p>x<sup>12</sup> + x<sup>6</sup> + 1 = 1 + 1 + 1 = 3</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If x +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x</span></div>&nbsp;= 7 where x &gt; 0, the positive value of x -&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x</span></div>&nbsp;is:&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; x +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x</span></div>&nbsp;= 7 &#2332;&#2361;&#2366;&#2306; x &gt; 0, x &#2325;&#2366; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2350;&#2366;&#2344;  x -&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x</span></div>&nbsp;&nbsp; &#2361;&#2376;:</div></p></span>",
    "options": [
      "<span class=\"eqt\">5&radic;4</span><span class=\"hqt\" style=\"display:none\">5&radic;4</span>",
      "<span class=\"eqt\">5&radic;5</span><span class=\"hqt\" style=\"display:none\">5&radic;5</span>",
      "<span class=\"eqt\">3&radic;5</span><span class=\"hqt\" style=\"display:none\">3&radic;5</span>",
      "<span class=\"eqt\">4&radic;5</span><span class=\"hqt\" style=\"display:none\">4&radic;5</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Here, (x+1/x)=7</p><p>We know that : (x+1/x)<sup>2</sup> = (x-1/x)<sup>2</sup> + 4</p><p>So putting the value of (x+1/x) as 7, we get:-</p><p>7<sup>2</sup> = (x-1/x)<sup>2</sup> + 4</p><p>49-4= (x-1/x)<sup>2</sup></p><p>So, (x-1/x) =&radic;45= &radic;9*5 =3&radic;5</p><p>Option (c) is the correct answer.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;Let 3t -&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">3t</span></div>&nbsp;= 3, then which of the following expressions has the value equal to 12?&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2350;&#2366;&#2344; &#2354;&#2368;&#2332;&#2367;&#2319; 3t -&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">3t</span></div>&nbsp;= 3, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2366; &#2350;&#2366;&#2344; 12 &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;?</div></p></span>",
    "options": [
      "<span class=\"eqt\">9t<sup>2</sup> + 1/9t<sup>2</sup> + 2</span><span class=\"hqt\" style=\"display:none\">9t<sup>2</sup> + 1/9t<sup>2</sup> + 2</span>",
      "<span class=\"eqt\">9t<sup>2</sup> + 1/9t<sup>2</sup>  -  2</span><span class=\"hqt\" style=\"display:none\">9t<sup>2</sup> + 1/9t<sup>2</sup>  -  2</span>",
      "<span class=\"eqt\">9t<sup>2</sup> + 1/9t<sup>2</sup> + 1</span><span class=\"hqt\" style=\"display:none\">9t<sup>2</sup> + 1/9t<sup>2</sup> + 1</span>",
      "<span class=\"eqt\">9t<sup>2</sup> + 1/9t<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">9t<sup>2</sup> + 1/9t<sup>2</sup></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>(a - b)<sup>2</sup> = a<sup>2</sup> - 2ab + b<sup>2</sup></p><p>3t - 1/3t = 3</p><p>Squaring both side</p><p>9t<sup>2</sup> + 1/9t<sup>2</sup> - 2 = 9</p><p>9t<sup>2</sup> + 1/9t<sup>2</sup> = 11</p><p>According to question, </p><p>Put the value 9t<sup>2</sup> + 1/9t<sup>2</sup> = 11 in option (c)</p><p>9t<sup>2</sup> + 1/9t<sup>2</sup> + 1</p><p>=&gt; 11 + 1 = 12</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If x = 7  -  4&radic;3, then find the value of x<sup>2</sup> +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x<sup>2</sup></span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&nbsp;&#2351;&#2342;&#2367;  x = 7  -  4&radic;3, &#2340;&#2379; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;   x<sup>2</sup> +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x<sup>2</sup></span></div></div></p><p></p></span>",
    "options": [
      "<span class=\"eqt\">188</span><span class=\"hqt\" style=\"display:none\">188</span>",
      "<span class=\"eqt\">194</span><span class=\"hqt\" style=\"display:none\">194</span>",
      "<span class=\"eqt\">186</span><span class=\"hqt\" style=\"display:none\">186</span>",
      "<span class=\"eqt\">196</span><span class=\"hqt\" style=\"display:none\">196</span>"

    "solution": "<p>If x/(x&#178; - 2x + 1) = 1/3, then find the value of x&ge; + 1/x&ge;.</p><p>Recognize that x&#178; - 2x + 1 = (x - 1)&#178;. The equation becomes:</p><p>&#8195;&#8195;x/(x - 1)&#178; = 1/3.</p><p>Multiply both sides by (x - 1)&#178;:</p><p>&#8195;&#8195;x = (x - 1)&#178;/3.</p><p>&#8195;&#8195;Then multiply by 3:</p><p>&#8195;&#8195;3x = (x - 1)&#178;.</p><p>Expand (x - 1)&#178;:</p><p>&#8195;&#8195;3x = x&#178; - 2x + 1.</p><p>&#8195;&#8195;Rearrange to form a quadratic:</p><p>&#8195;&#8195;x&#178; - 5x + 1 = 0.</p><p>Divide the quadratic by x (x &#8800; 0):</p><p>&#8195;&#8195;x - 5 + 1/x = 0, which gives:</p><p>&#8195;&#8195;x + 1/x = 5.</p><p>Use the identity:</p><p>&#8195;&#8195;(x + 1/x)&ge; = x&ge; + 1/x&ge; + 3(x + 1/x).</p><p>&#8195;&#8195;Substitute x + 1/x = 5:</p><p>&#8195;&#8195;125 = x&ge; + 1/x&ge; + 15.</p><p>&#8195;&#8195;Thus, x&ge; + 1/x&ge; = 125 - 15 = 110.</p><p>Option (a) is the correct answer.</p>",
