<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If the volume of the prism is 2178&radic;3 cm3 and the side of the base of the prism is 22 cm, then find the height of the prism. The base of a right prism is an equilateral triangle</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 2178&radic;3 cm3 &#2361;&#2376; &#2324;&#2352; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; 22 cm &#2361;&#2376;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; &#2360;&#2350;&#2325;&#2379;&#2339; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2319;&#2325; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">20 cm</span><span class=\"hqt\" style=\"display:none\">20 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">16 cm</span><span class=\"hqt\" style=\"display:none\">16 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">14 cm</span><span class=\"hqt\" style=\"display:none\">14 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">18 cm</span><span class=\"hqt\" style=\"display:none\">18 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the height of the prism be h cm</p><p>The volume of the prism = Area of base * height</p><p>&radic;3/4 * 22 * 22 * h = 2178&radic;3</p><p>h = 18 cm</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A right pyramid with an equilateral triangle as the base is given, and each side of the equilateral triangle is 12 units. The vertical height of the pyramid is 4&radic;7 units. Find the length of the lateral edge.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2379; &#2310;&#2343;&#2366;&#2352; &#2350;&#2366;&#2344;&#2325;&#2352; &#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2340;&#2341;&#2366; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2349;&#2369;&#2332;&#2366; 12 &#2311;&#2325;&#2366;&#2312; &#2361;&#2376;&#2404; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2368; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; 4&radic;7 &#2311;&#2325;&#2366;&#2312; &#2361;&#2376;&#2404; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2325;&#2367;&#2344;&#2366;&#2352;&#2375; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4&radic;10 units</span><span class=\"hqt\" style=\"display:none\">4&radic;10 &#2311;&#2325;&#2366;&#2311;&#2351;&#2366;&#2306;</span>",
      "<span class=\"eqt\">5&radic;10 units</span><span class=\"hqt\" style=\"display:none\">5&radic;10 &#2311;&#2325;&#2366;&#2311;&#2351;&#2366;&#2306;</span>",
      "<span class=\"eqt\">2&radic;10 units</span><span class=\"hqt\" style=\"display:none\">2&radic;10 &#2311;&#2325;&#2366;&#2311;&#2351;&#2366;&#2306;</span>",
      "<span class=\"eqt\">3&radic;10 units</span><span class=\"hqt\" style=\"display:none\">3&radic;10 &#2311;&#2325;&#2366;&#2311;&#2351;&#2366;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Length of (slant height) = &radic;[(base/&radic;3)<sup>2</sup> + height<sup>2</sup>]</p><p>= &radic;[(12/&radic;3)<sup>2</sup> + (4&radic;7)<sup>2</sup>]</p><p>= 4&radic;10</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If the area of the base of a regular hexagonal pyramid is 384&radic;3 m<sup>2</sup> and the area of one of its faces is 128&radic;3 m<sup>2</sup>, then find the volume of the pyramid.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2359;&#2335;&#2381;&#2325;&#2379;&#2339;&#2368;&#2351; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 384&radic;3 m<sup>2</sup> &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2375; &#2319;&#2325; &#2347;&#2354;&#2325; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 128&radic;3 m<sup>2</sup> &#2361;&#2376;, &#2340;&#2379; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1536/&radic;3 m<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">1536/&radic;3 &#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">3072/&radic;3 m<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">3072/&radic;3 &#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">1728/&radic;3 m<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">1728/&radic;3 &#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">2048/&radic;3 m<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">2048/&radic;3 &#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Area of base of hexagonal pyramid = 3&radic;3/2 * base<sup>2</sup></p><p>384&radic;3 = 3&radic;3/2 * base<sup>2</sup></p><p>Base<sup>2</sup> = 256 m<sup>2</sup></p><p>base = 16 m</p><p>Area of one face = 1/2 * base * slant height </p><p>128&radic;3 = 1/2 * 16 * slant height </p><p>Slant height = 16&radic;3 m</p><p>Height = &radic;[(16&radic;3)<sup>3</sup>  -  (16&radic;3/2)<sup>2</sup>] = 24 m</p><p>The volume of the pyramid = 1/3 * area of hexagon * Height of the pyramid</p><p>= 1/3 * 384&radic;3 * 24</p><p>= 3072&radic;3 m<sup>3</sup></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If the base of a right pyramid is a triangle of sides 8 cm, 24 cm, and 25 cm and its volume is 928 cm<sup>3</sup>, then find its height.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; 8 &#2360;&#2375;&#2350;&#2368;, 24 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 25 &#2360;&#2375;&#2350;&#2368; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 928 &#2360;&#2375;&#2350;&#2368;3 &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">31 cm</span><span class=\"hqt\" style=\"display:none\">31 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">27 cm</span><span class=\"hqt\" style=\"display:none\">27 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">33 cm</span><span class=\"hqt\" style=\"display:none\">33 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">29 cm</span><span class=\"hqt\" style=\"display:none\">29 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The given base is a triangle with sides 8 cm, 24 cm, and 25 cm. Since</p><p>8<sup>2</sup> + 24<sup>2</sup> = 25<sup>2</sup>, it is a right triangle with:</p><p>Base = 8 cm, Height = 24 cm, Hypotenuse = 25 cm</p><p>The area of a right triangle = 1/2  X  Base  X  Height</p><p>= 1/2 * 8 * 24</p><p>= 96 cm<sup>2</sup></p><p>The volume of the pyramid = 1/3 * area of base * height</p><p>928 = 1/3  X  96  X  h</p><p>h = 29 cm</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A right pyramid stands on a square base of diagonal 16&radic;2 cm. If the height of the pyramid is 12 cm, find the area of its slant surface.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; 16&radic;2 &#2360;&#2375;&#2350;&#2368; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327;&#2366;&#2325;&#2366;&#2352; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2326;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 12 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2375; &#2340;&#2367;&#2352;&#2331;&#2375; &#2346;&#2371;&#2359;&#2381;&#2336; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">128&radic;17 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">128&radic;17 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">224&radic;17 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">224&radic;17 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">102&radic;17 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">102&radic;17 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">125&radic;17 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">125&radic;17 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Slant height = &radic;[(diagonal/2)<sup>2</sup> + height<sup>2</sup>]</p><p>= &radic;[(16&radic;2/2)<sup>2</sup> + 12<sup>2</sup>] </p><p>= 4&radic;17 cm</p><p>Side of square = diagonal/2 = 16&radic;2/2 = 16 cm</p><p>The area of a slant surface = 1/2 * (Perimeter of base) * Slant Height</p><p>= 1/2 * (4 * 16) * 4&radic;17</p><p>= 128&radic;17 cm<sup>2</sup></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The base of a right pyramid in an equilateral triangle of side 20&radic;3 cm. If the total surface area of the pyramid is 1080&radic;3 cm<sup>2</sup>, then find its height.</p></span><span class=\"hqt\" style=\"display:none\"><p>20&radic;3 &#2360;&#2375;&#2350;&#2368; &#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352;&#2404; &#2351;&#2342;&#2367; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 1080&radic;3 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;<sup>2</sup>, &#2340;&#2379; &#2311;&#2360;&#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">25 cm</span><span class=\"hqt\" style=\"display:none\">25 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">24 cm</span><span class=\"hqt\" style=\"display:none\">24 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">26 cm</span><span class=\"hqt\" style=\"display:none\">26 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">22 cm</span><span class=\"hqt\" style=\"display:none\">22 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Inradius of the equilateral triangle = side/2&radic;3 = (20&radic;3)/(2&radic;3)</p><p>= 10 cm</p><p>Slant height (l) = &radic;[h<sup>2</sup> + 100]</p><p>Total surface area = &frac12; * (perimeter of the base * slant height) + Base area</p><p>1080&radic;3 = 1/2 * (3 * 20&radic;3 * &radic;[h<sup>2</sup> + 100]) +&radic;3/4 * (20&radic;3)<sup>2</sup></p><p>1080&radic;3 = 30&radic;3 * &radic;[h<sup>2</sup> + 100] + 300&radic;3</p><p>&radic;[h<sup>2</sup> + 100] = 26</p><p>h<sup>2</sup> = 676  -  100 = 576</p><p>h = 24 cm</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>There is a pyramid on a base, which is a regular hexagon of side 16a. If every slant edge of this pyramid is of length 17a, then find the lateral surface area of this pyramid.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2319;&#2325; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2361;&#2376;, &#2332;&#2379; 16a &#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2359;&#2335;&#2381;&#2349;&#2369;&#2332; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2311;&#2360; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2340;&#2367;&#2352;&#2331;&#2375; &#2325;&#2367;&#2344;&#2366;&#2352;&#2375; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 17a &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2366; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">240a<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">240a<sup>2</sup></span>",
      "<span class=\"eqt\">225a<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">225a<sup>2</sup></span>",
      "<span class=\"eqt\">360a<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">360a<sup>2</sup></span>",
      "<span class=\"eqt\">720a<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">720a<sup>2</sup></span>"
