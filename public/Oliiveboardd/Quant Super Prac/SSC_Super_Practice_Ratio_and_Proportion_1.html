<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If A:B = 6 : 8 and B:C = 5 : 11, then A:B:C is:</p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; A:B = 6 : 8 &#2340;&#2341;&#2366; B:C = 5 : 11, &#2340;&#2379; A:B:C &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;:</span>",
    "options": [
      "<span class=\"eqt\">11:23:14</span><span class=\"hqt\" style=\"display:none\">11:23:14</span>",
      "<span class=\"eqt\">14:31:25</span><span class=\"hqt\" style=\"display:none\">14:31:25</span>",
      "<span class=\"eqt\">15:32:44</span><span class=\"hqt\" style=\"display:none\">15:32:44</span>",
      "<span class=\"eqt\">15:20:44</span><span class=\"hqt\" style=\"display:none\">15:20:44</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A:B =6:8 and B:C = 5:11</p><p>As B is common in both and have a value of 8 and 5 respectively, so multiplying A:B by 5 and B:C by 8, we get:-</p><p>A:B= 30:40 and B:C =40:88</p><p>So A:B:C = 30:40:88 = 15:20:44</p><p>Option (d) is the correct answer. </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Find the fourth proportional to 4, 9 and 16.</p></span><span class=\"hqt\" style=\"display:none\">4, 9 &#2324;&#2352; 16 &#2325;&#2366; &#2330;&#2340;&#2369;&#2352;&#2381;&#2341; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340;&#2367;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">27</span><span class=\"hqt\" style=\"display:none\">27</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>We know by formula,</p><p>If four number is given as :-</p><p>x:y&#8759;p:q</p><p>x/y=p/q</p><p>x*q=p*y</p><p>So applying same rule for the numbers 4 , 9 and 16 is:-</p><p>4*x=9*16</p><p>x=36.</p><p>Option (c) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of boys to girls initial in a college is 5 : 6. If 40 boys leave the college and 50 girls join the college, the ratio will become 8 : 11. Find the number of girls (initial) in the college.</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2325;&#2377;&#2354;&#2375;&#2332; &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2324;&#2352; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 5 : 6 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 40 &#2354;&#2337;&#2364;&#2325;&#2375; &#2325;&#2377;&#2354;&#2375;&#2332; &#2331;&#2379;&#2337;&#2364; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; 50 &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2366;&#2306; &#2325;&#2377;&#2354;&#2375;&#2332; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 8 : 11 &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404; &#2325;&#2377;&#2354;&#2375;&#2332; &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; (&#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325;) &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">740</span><span class=\"hqt\" style=\"display:none\">740</span>",
      "<span class=\"eqt\">860</span><span class=\"hqt\" style=\"display:none\">860</span>",
      "<span class=\"eqt\">720</span><span class=\"hqt\" style=\"display:none\">720</span>",
      "<span class=\"eqt\">640</span><span class=\"hqt\" style=\"display:none\">640</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the initial number of boys to girls be 5x and 6x respectively,</p><p>According to question,</p><p>(5x  -  40)/(6x + 50) = 8/11</p><p>55x  -  440 = 48x + 400</p><p>7x = 840</p><p>x = 120</p><p>required number of girls = 6 * 120 = 720</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following fractions is the largest?</p><p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">7</span></div>&nbsp;,&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">7</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">53</span></div>&nbsp;,&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">41</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">80</span></div>&nbsp;,&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">29</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">79</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2349;&#2367;&#2344;&#2381;&#2344; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2361;&#2376;?</p><p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">7</span></div>&nbsp;,&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">7</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">53</span></div>&nbsp;,&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">41</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">80</span></div>&nbsp;,&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">29</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">79</span></div></div></p></span>",
    "options": [
      "<span class=\"eqt\">29/79</span><span class=\"hqt\" style=\"display:none\">29/79</span>",
      "<span class=\"eqt\">7/53</span><span class=\"hqt\" style=\"display:none\">7/53</span>",
      "<span class=\"eqt\">3/7</span><span class=\"hqt\" style=\"display:none\">3/7</span>",
      "<span class=\"eqt\">41/80</span><span class=\"hqt\" style=\"display:none\">41/80</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>3/7 &#8776; 0.4286</p><p>7/53 &#8776; 0.1321</p><p>41/80 &#8776; 0.5125</p><p>29/79 &#8776; 0.3671</p><p>41/80 is the largest fraction.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of the third proportional to 16 &amp; 40 and the mean proportional between 10 &amp; 40 is:</p></span><span class=\"hqt\" style=\"display:none\"><p>16 &#2324;&#2352; 40 &#2325;&#2375; &#2340;&#2371;&#2340;&#2368;&#2351;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2340;&#2341;&#2366; 10 &#2324;&#2352; 40 &#2325;&#2375; &#2350;&#2343;&#2381;&#2351; &#2350;&#2366;&#2343;&#2381;&#2351;&#2366;&#2344;&#2369;&#2346;&#2366;&#2340;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">5 : 1</span><span class=\"hqt\" style=\"display:none\">5 : 1</span>",
      "<span class=\"eqt\">1 : 5</span><span class=\"hqt\" style=\"display:none\">1 : 5</span>",
      "<span class=\"eqt\">4 : 1</span><span class=\"hqt\" style=\"display:none\">4 : 1</span>",
      "<span class=\"eqt\">1 : 4</span><span class=\"hqt\" style=\"display:none\">1 : 4</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let third proportional of 16 and 40 = 'x'</p><p>16: 40&#8759; 40: x</p><p>x = 40<sup>2</sup>/16 = 100</p><p>Mean proportional between 10 and 40 = (10 + 40)/2 = 25</p><p>Required ratio = 100: 25</p><p>= 4: 1</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;The salaries of A, B and C are in ratio of <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>3</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>2</span></div> &#58; <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>6</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>5</span></div> &#58; <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>4</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>3</span></div> . The salary of A and B together is Rs.40,500. By what percentage is the salary of A more than that of C &quest;&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C &#2325;&#2366; &#2357;&#2375;&#2340;&#2344;</p><p><div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>3</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>2</span></div> &#58; <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>6</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>5</span></div> &#58; <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>4</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>3</span></div> &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404; A &#2324;&#2352; B &#2325;&#2366; &#2357;&#2375;&#2340;&#2344; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352; 40,500 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;&#2404; A &#2325;&#2366; &#2357;&#2375;&#2340;&#2344; C &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12%</span><span class=\"hqt\" style=\"display:none\">12%</span>",
      "<span class=\"eqt\">13%</span><span class=\"hqt\" style=\"display:none\">13%</span>",
      "<span class=\"eqt\">11.5%</span><span class=\"hqt\" style=\"display:none\">11.5%</span>",
      "<span class=\"eqt\">12.5%</span><span class=\"hqt\" style=\"display:none\">12.5%</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Since, the ratio of the salaries of A, B and C = 3/2: 6/5: 4/3 = 45: 36: 40</p><p>And the salaries of A and B together = Rs.40,500</p><p>So, the salary of A = 40500 * 45/((45+36)) = Rs.22500</p><p>And the salary of C = 22500 * 40/45 = Rs.20000</p><p>The required percentage = (22500  -  20000)/20000 * 100 = 12.5%</p><p>Short method:</p><p>Since, the ratio of salaries of A and B = 45: 40</p><p>So, the required percentage = (45  -  40)/40 * 100 = 12.5%</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of two numbers is 2 : 5 and their difference is 210. The smaller number is __________.</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2 : 5 &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 210 &#2361;&#2376;&#2404; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; __________ &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">60</span><span class=\"hqt\" style=\"display:none\">60</span>",
      "<span class=\"eqt\">130</span><span class=\"hqt\" style=\"display:none\">130</span>",
      "<span class=\"eqt\">140</span><span class=\"hqt\" style=\"display:none\">140</span>",
      "<span class=\"eqt\">350</span><span class=\"hqt\" style=\"display:none\">350</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the two numbers be 2x and 5x respectively,</p><p>According to question, </p><p>5x  -  2x = 210</p><p>3x = 210</p><p>x = 70</p><p>smaller number = 2x = 140</p>",
    "question_index": 6

  {

    "question": "<span class=\"eqt\"><p>The cost of a diamond varies directly as the square of its weight. Once, this diamond broke into four pieces with weights in the ratio of 4 : 3 : 2 : 1 .When the pieces were sold, the merchant got &#8377;63,000 less than that of one piece. Find the original price of the diamond.</p></span><span class=\"hqt\" style=\"display:none\">&#2361;&#2368;&#2352;&#2375; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2313;&#2360;&#2325;&#2375; &#2357;&#2332;&#2344; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2348;&#2342;&#2354;&#2340;&#2368; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404; &#2319;&#2325; &#2348;&#2366;&#2352;, &#2351;&#2361; &#2361;&#2368;&#2352;&#2366; 4 : 3 : 2 : 1 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2357;&#2332;&#2344; &#2357;&#2366;&#2354;&#2375; &#2330;&#2366;&#2352; &#2335;&#2369;&#2325;&#2337;&#2364;&#2379;&#2306; &#2350;&#2375;&#2306; &#2335;&#2370;&#2335; &#2327;&#2351;&#2366;&#2404; &#2332;&#2348; &#2335;&#2369;&#2325;&#2337;&#2364;&#2379;&#2306; &#2325;&#2379; &#2348;&#2375;&#2330;&#2366; &#2327;&#2351;&#2366;, &#2340;&#2379; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2368; &#2325;&#2379; &#2319;&#2325; &#2335;&#2369;&#2325;&#2337;&#2364;&#2375; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 63,000 &#2337;&#2377;&#2354;&#2352; &#2325;&#2350; &#2350;&#2367;&#2354;&#2375;&#2404; &#2361;&#2368;&#2352;&#2375; &#2325;&#2368; &#2350;&#2370;&#2354; &#2325;&#2368;&#2350;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",

    "question": "<span class=\"eqt\"><p>The monthly incomes of A, B and C are in the ratio 2 : 9 : 3 and their expenses are in the ratio 3 : 9 : 5. If A's saving is half of his total income, then savings of A, B and C are, respectively, in the ratio of:</p></span><span class=\"hqt\" style=\"display:none\">A, B &#2324;&#2352; C &#2325;&#2368; &#2350;&#2366;&#2360;&#2367;&#2325; &#2310;&#2351; 2 : 9 : 3 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2326;&#2352;&#2381;&#2330; 3 : 9 : 5 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; A &#2325;&#2368; &#2348;&#2330;&#2340; &#2313;&#2360;&#2325;&#2368; &#2325;&#2369;&#2354; &#2310;&#2351; &#2325;&#2368; &#2310;&#2343;&#2368; &#2361;&#2376;, &#2340;&#2379; A, B &#2324;&#2352; C &#2325;&#2368; &#2348;&#2330;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;:</span>",
    "options": [
      "<span class=\"eqt\">3 : 9 : 2</span><span class=\"hqt\" style=\"display:none\">3 : 9 : 2</span>",
      "<span class=\"eqt\">2 : 5 : 2</span><span class=\"hqt\" style=\"display:none\">2 : 5 : 2</span>",
      "<span class=\"eqt\">3 : 18 : 4</span><span class=\"hqt\" style=\"display:none\">3 : 18 : 4</span>",
      "<span class=\"eqt\">1 : 2 : 1</span><span class=\"hqt\" style=\"display:none\">1 : 2 : 1</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let A, B, C have incomes 2k, 9k, and 3k respectively.</p><p>Let their expenses be 3m, 9m, and 5m respectively.</p><p>For A, saving = Income  -  Expense = 2k  -  3m.</p><p>Given A's saving is half of his income:</p><p>&#8195;&#8195;2k  -  3m = k&#8195;&#8195;&rarr;&#8195;&#8195;k = 3m&#8195;&#8195;&rarr;&#8195;&#8195;m = k/3.</p><p>Now, calculate savings:</p><p>A's saving: 2k  -  3(k/3) = 2k  -  k = k.</p><p>B's saving: 9k  -  9(k/3) = 9k  -  3k = 6k.</p><p>C's saving: 3k  -  5(k/3) = 3k  -  (5k/3) = (9k  -  5k)/3 = (4k)/3.</p><p>The ratio A:B:C = k : 6k : (4k/3).</p><p>Multiply each term by 3 to eliminate the fraction:</p><p>&#8195;&#8195;= 3k : 18k : 4k&#8195;&#8195;&rarr;&#8195;&#8195;3 : 18 : 4.</p><p>Option (c) is the correct answer.</p>",
