<body>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A person takes a loan of Rs. 260 at 5% simple interest .He returns Rs. 150 at the end of one year. In order to clear his dues at the end of 2 year, he would pay-</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; 5% &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; 260 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2315;&#2339; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2361; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; 150 &#2352;&#2369;&#2346;&#2351;&#2375; &#2354;&#2380;&#2335;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; 2 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2375; &#2348;&#2325;&#2366;&#2351;&#2375; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319;, &#2313;&#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">123.15 Rs.</span><span class=\"hqt\" style=\"display:none\">123.15 &#2352;&#2369;.</span>",
      "<span class=\"eqt\">122.23 Rs.</span><span class=\"hqt\" style=\"display:none\">122.23 &#2352;&#2369;.</span>",
      "<span class=\"eqt\">132.45 Rs.</span><span class=\"hqt\" style=\"display:none\">132.45 &#2352;&#2369;.</span>",
      "<span class=\"eqt\">129.15 R</span><span class=\"hqt\" style=\"display:none\">129.15 &#2352;&#2369;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Amount to be paid in first year= 260 + [(260  X 5  X 1)/100] = 260 + 13= 273</p><p>Amount left as principal for second year = 273  -  150= 123</p><p>So, Amount paid in second year= 123 + [(123  X 5  X 1)]/100 =123 + 6.15 = 129.15</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Ritik invested Rs. 7000 for 2 years and 3500 for 5 years at the same rate of interest. If the total simple interest from these investments is Rs. 2835 then find the rate of interest.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2315;&#2340;&#2367;&#2325; &#2344;&#2375; 2 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; 7000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; 5 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; 3500 &#2352;&#2369;&#2346;&#2351;&#2375; &#2360;&#2350;&#2366;&#2344; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2319;&#2404; &#2351;&#2342;&#2367; &#2311;&#2344; &#2344;&#2367;&#2357;&#2375;&#2358;&#2379;&#2306; &#2360;&#2375; &#2325;&#2369;&#2354; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; 2835 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">7%</span><span class=\"hqt\" style=\"display:none\">7%</span>",
      "<span class=\"eqt\">10%</span><span class=\"hqt\" style=\"display:none\">10%</span>",
      "<span class=\"eqt\">6%</span><span class=\"hqt\" style=\"display:none\">6%</span>",
      "<span class=\"eqt\">9%</span><span class=\"hqt\" style=\"display:none\">9%</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the rate of interest = R</p><p>According to the question-</p><p>[(7000 X 2 X R)/100] + [(3500 X 5 X R/100] = 2835</p><p>140R + 175R = 2835</p><p>315R = 2835</p><p>R = 2835/315</p><p>R = 9%</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If a certain sum of money will become 13 times of itself in 48 years at simple interest, then same sum of money become 37 times of itself in how many years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; 48 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2368; 13 &#2327;&#2369;&#2344;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2367;&#2340;&#2344;&#2375; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2368; 37 &#2327;&#2369;&#2344;&#2366; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">72 years</span><span class=\"hqt\" style=\"display:none\">72 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">144 years</span><span class=\"hqt\" style=\"display:none\">144 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">288 years</span><span class=\"hqt\" style=\"display:none\">288 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">120 years</span><span class=\"hqt\" style=\"display:none\">120 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let principal = Rs. P, and rate = R%, Time = 48 years</p><p>13P  -  P = (P * R * 48)/100</p><p>=&gt; 12 = 48R/100</p><p>=&gt; R = 12 * 100/48</p><p>=&gt; R = 25%</p><p>Now, 37P  -  P = (P * 25 * T)/100</p><p>=&gt; 3600/25 = T</p><p>=&gt; T = 144 years</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>At simple rate of interest, Reena invested 30% of a sum at 20% per annum and rest of the sum at R% per annum. In 5 years, total interest received by her is 72% the sum invested. What is the value of R? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352;, &#2352;&#2368;&#2344;&#2366; &#2344;&#2375; 30% &#2352;&#2366;&#2358;&#2367; &#2325;&#2379; 20% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2340;&#2341;&#2366; &#2358;&#2375;&#2359; &#2352;&#2366;&#2358;&#2367; &#2325;&#2379; R% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; 5 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2313;&#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2369;&#2354; &#2348;&#2381;&#2351;&#2366;&#2332; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; 72% &#2361;&#2376;&#2404; R &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Simple interest = sum * rate * time/100</p><p>Total simple interest received = simple interest received on 30% of the sum at 20% per annum for 5 years + simple interest received on 70% of the sum at R% per annum for 5 years </p><p>72% of sum = (30% of sum) * 20 * 5/100 + (70% of sum) * R * 5/100</p><p>72/100 = 3/10 + 7R/200</p><p>42/100 = 7R/200</p><p><b>R = 12</b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The simple interest on a certain sum of money at 5% rate for 3 years is 480. What is the value of the amount received after 8 years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 5% &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2366; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; 480 &#2361;&#2376;&#2404; 8 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3970 Rs.</span><span class=\"hqt\" style=\"display:none\">3970 &#2352;&#2369;.</span>",
      "<span class=\"eqt\">5458 Rs.</span><span class=\"hqt\" style=\"display:none\">5458 &#2352;&#2369;.</span>",
      "<span class=\"eqt\">4480 Rs.</span><span class=\"hqt\" style=\"display:none\">4480 &#2352;&#2369;.</span>",
      "<span class=\"eqt\">4790 Rs.</span><span class=\"hqt\" style=\"display:none\">4790 &#2352;&#2369;.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>According to the question,</p><p>(P  X  5  X  3)/100 = 480</p><p>P = 48000/15</p><p>P = 3200 Rs.</p><p>Simple interest after 8 years = 3200  X  5  X  8)/100 = 1280</p><p>Total amount received after 8 years = 3200 + 1280 = 4480 Rs.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Vansh lent Rs. 3000 to Deep and Rs. 5000 to Prince for 4 years on simple interest. If he earned Rs. 1280 from both amount as interest then find the rate of interest per annum.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2306;&#2358; &#2344;&#2375; &#2342;&#2368;&#2346; &#2325;&#2379; 3000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; &#2346;&#2381;&#2352;&#2367;&#2306;&#2360; &#2325;&#2379; 5000 &#2352;&#2369;&#2346;&#2351;&#2375; 4 &#2360;&#2366;&#2354; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2313;&#2343;&#2366;&#2352; &#2342;&#2367;&#2319;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360;&#2344;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2352;&#2366;&#2358;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; 1280 &#2352;&#2369;&#2346;&#2351;&#2375; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2367;&#2319;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4%</span><span class=\"hqt\" style=\"display:none\">4%</span>",
      "<span class=\"eqt\">5.5%</span><span class=\"hqt\" style=\"display:none\">5.5%</span>",
      "<span class=\"eqt\">3%</span><span class=\"hqt\" style=\"display:none\">3%</span>",
      "<span class=\"eqt\">8%</span><span class=\"hqt\" style=\"display:none\">8%</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Total interest earned = 1280</p><p>[3000*r*4/100] + [5000*r*4/100] = 1280</p><p>120r + 200r = 1280</p><p>320r = 1280</p><p>r = 4%</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In how many years will a sum of Rs. 6,400 fetch Rs. 3,840 as interest at 7.5% per annum simple interest?</p></span><span class=\"hqt\" style=\"display:none\"><p>6,400 &#2352;&#2369;&#2346;&#2319; &#2325;&#2368; &#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 7.5% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; 3,840 &#2352;&#2369;&#2346;&#2319; &#2348;&#2381;&#2351;&#2366;&#2332; &#2350;&#2367;&#2354;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">8 years</span><span class=\"hqt\" style=\"display:none\">8 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">10 years</span><span class=\"hqt\" style=\"display:none\">10 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">5 years</span><span class=\"hqt\" style=\"display:none\">5 &#2360;&#2366;&#2354;</span>",
      "<span class=\"eqt\">7 years</span><span class=\"hqt\" style=\"display:none\">7 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>SI = P  X  R  X  T/100</p><p>3,840 = 6,400  X  7.5  X  T/100</p><p>T = 8 years</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A person invested a certain amount in two different schemes equally at a 25% rate of interest and a 20% rate of interest. If the total simple interest received from both schemes after three years is Rs.8100 then find the total principal amount invested in both schemes.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#2342;&#2379; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2366;&#2358;&#2367; &#2325;&#2379; 25% &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2324;&#2352; 20% &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2360;&#2350;&#2366;&#2344; &#2352;&#2370;&#2346; &#2360;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2340;&#2368;&#2344; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379;&#2344;&#2379;&#2306; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2369;&#2354; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; 8100 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2379;&#2344;&#2379;&#2306; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2325;&#2369;&#2354; &#2350;&#2370;&#2354; &#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 60000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 60000</span>",
      "<span class=\"eqt\">Rs. 80000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 80000</span>",
      "<span class=\"eqt\">Rs. 20000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 20000</span>",
      "<span class=\"eqt\">Rs. 12000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 12000</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the principal amount invested in each scheme be Rs. X.</p><p>S.I = P * R * T/100</p><p>8100 = X * 25 * 3/100 + X * 20 * 3/100</p><p>75X + 60X = 810000</p><p>X = 6000</p><p>Hence, the required value = 6000 * 2 = Rs. 12000</p>",

    "question": "<span class=\"eqt\"><p>Shane borrows &#8377;30,000 from a bank at a simple interest rate of 10% per annum for 3 years. However, he is unable to repay the loan on time and requests an extension of 3 more years. The bank adds the interest from the first 3 years to the principal for the next 3 years at the same interest rate. What is the total amount Shane pays at the end of 6 years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2375;&#2344; &#2344;&#2375; 3 &#2360;&#2366;&#2354; &#2325;&#2375; &#2354;&#2367;&#2319; 10% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2348;&#2376;&#2306;&#2325; &#2360;&#2375; 30,000 &#2337;&#2377;&#2354;&#2352; &#2313;&#2343;&#2366;&#2352; &#2354;&#2367;&#2319;&#2404; &#2361;&#2366;&#2354;&#2366;&#2305;&#2325;&#2367;, &#2357;&#2361; &#2360;&#2350;&#2351; &#2346;&#2352; &#2315;&#2339; &#2330;&#2369;&#2325;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2309;&#2360;&#2350;&#2352;&#2381;&#2341; &#2361;&#2376; &#2324;&#2352; 3 &#2324;&#2352; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2366; &#2309;&#2344;&#2369;&#2352;&#2379;&#2343; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2348;&#2376;&#2306;&#2325; &#2346;&#2361;&#2354;&#2375; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2379; &#2309;&#2327;&#2354;&#2375; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2360;&#2368; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2350;&#2370;&#2354;&#2343;&#2344; &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404; 6 &#2360;&#2366;&#2354; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2358;&#2375;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2330;&#2369;&#2325;&#2366;&#2312; &#2327;&#2312; &#2325;&#2369;&#2354; &#2352;&#2366;&#2358;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>A sum is lent for 4 years at A% per annum simple interest. If the sum is lent at (A + 1.5)%, then it earns Rs.120 more. Find the sum.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 4 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; A% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2313;&#2343;&#2366;&#2352; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; (A + 1.5)% &#2346;&#2352; &#2313;&#2343;&#2366;&#2352; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; 120 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A certain sum becomes 2.2 times of itself after 10 years at certain rate of SI, then after how much time it becomes 3.16 times of itself at same rate of interest?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 10 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2368; 2.2 &#2327;&#2369;&#2344;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2344; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; &#2357;&#2361; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2348;&#2366;&#2342; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2368; 3.16 &#2327;&#2369;&#2344;&#2366; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">16 years</span><span class=\"hqt\" style=\"display:none\">16 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">18 years</span><span class=\"hqt\" style=\"display:none\">18 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">20 years</span><span class=\"hqt\" style=\"display:none\">20 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">24 years</span><span class=\"hqt\" style=\"display:none\">24 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let sum = Rs P</p><p>Let rate of interest = R % per annum</p><p>Now,</p><p><img width=139 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12338/image009.png\"></p><p>R = 12</p><p>Let required time = 't' years</p><p><img width=140 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12338/image010.png\"></p><p>t = 2.16 * (100/12)</p><p>t = 216/12</p><p>t = 18 years</p><p></p><p><b>Alternate Method</b></p><p>If a certain sum of money becomes m times in t years then required time in which it will be n times = (n - 1) x t/(m - 1)</p><p>Here, t = 10, n = 3.16, m = 2.2</p><p>Required time = (3.16 - 1) x 10/1.2 = 18 years</p>",
    "question_index": 12
  },

    "solution": "<p>Interest obtained after 2 years = (20000 * 5 * 2)/100 = Rs. 2000</p><p>Total amount after 2 years = 20000 + 2000 = Rs. 22000</p><p>Interest obtained after 4 years = (22000 * 15 * 2)/100 = Rs. 6600</p><p>Total amount of interest received after 4 years = 2000+6600 = Rs. 8600</p>",

    "question": "<span class=\"eqt\"><p>An equal sum of Rs. 10000 is lent for 2 years at two different rates per annum on a simple interest. The interest on latter was Rs. 2000 more than the former. Sum of the rates at which principals are lent is 16% per annum. What was the total interest earned from the two sums?</p></span><span class=\"hqt\" style=\"display:none\"><p>10000 &#2352;&#2370;&#2346;&#2319; &#2325;&#2368; &#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2379; &#2342;&#2379; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2379; &#2349;&#2367;&#2344;&#2381;&#2344; &#2342;&#2352;&#2379;&#2306; &#2346;&#2352; &#2313;&#2343;&#2366;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;| &#2348;&#2366;&#2342; &#2357;&#2366;&#2354;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2368; &#2346;&#2352; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2361;&#2354;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2375; 2000 &#2352;&#2370;&#2346;&#2319; &#2309;&#2343;&#2367;&#2325; &#2341;&#2366;| &#2313;&#2344; &#2342;&#2352;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2332;&#2367;&#2344; &#2346;&#2352; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367;&#2351;&#2366;&#2305; &#2313;&#2343;&#2366;&#2352; &#2342;&#2368; &#2327;&#2351;&#2368; &#2341;&#2368; 16% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;| &#2342;&#2379;&#2344;&#2379;&#2306; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2369;&#2354; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p><div>&nbsp;In how many years the simple interest on a sum of money at the rate of 3&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">6</span></div>&nbsp;% per annum will become equal to the principal?&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2325;&#2367;&#2340;&#2344;&#2375; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 3&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">6</span></div>&nbsp;% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2350;&#2370;&#2354;&#2343;&#2344; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2366;?</div></p></span>",

    "correct_option_id": 2,
