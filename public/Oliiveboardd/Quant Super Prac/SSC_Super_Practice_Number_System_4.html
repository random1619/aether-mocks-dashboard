<body>

        </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If the sum of five consecutive odd natural numbers is 235, then find the average of the largest number and the smallest number.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2346;&#2366;&#2305;&#2330; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2357;&#2367;&#2359;&#2350; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 235 &#2361;&#2376;, &#2340;&#2379; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2324;&#2360;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">47</span><span class=\"hqt\" style=\"display:none\">47</span>",
      "<span class=\"eqt\">43</span><span class=\"hqt\" style=\"display:none\">43</span>",
      "<span class=\"eqt\">51</span><span class=\"hqt\" style=\"display:none\">51</span>",
      "<span class=\"eqt\">49</span><span class=\"hqt\" style=\"display:none\">49</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the smallest number be 'a'</p><p>The sum of five consecutive odd natural numbers = 235</p><p>a + (a + 2) + (a + 4) + (a + 6) + (a + 8) = 235</p><p>5a = 215</p><p>a = 43</p><p>a + 8 = 51</p><p>hence, the required average = (43 + 51)/2 = 47</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If the sum of five consecutive even natural numbers is 260, then the middle number is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2346;&#2366;&#2305;&#2330; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2360;&#2350; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 260 &#2361;&#2376;, &#2340;&#2379; &#2350;&#2343;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">50</span><span class=\"hqt\" style=\"display:none\">50</span>",
      "<span class=\"eqt\">52</span><span class=\"hqt\" style=\"display:none\">52</span>",
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">54</span><span class=\"hqt\" style=\"display:none\">54</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the middle number be 'a'</p><p>The sum of five consecutive even numbers = 260</p><p>(a  -  4) + (a  -  2) + a + (a + 2) + (a + 4) = 260</p><p>5a = 260</p><p>a = 52</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Find the sum of all prime numbers between 18 and 57.</p></span><span class=\"hqt\" style=\"display:none\"><p>18 &#2324;&#2352; 57 &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2349;&#2368; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">333</span><span class=\"hqt\" style=\"display:none\">333</span>",
      "<span class=\"eqt\">341</span><span class=\"hqt\" style=\"display:none\">341</span>",
      "<span class=\"eqt\">323</span><span class=\"hqt\" style=\"display:none\">323</span>",
      "<span class=\"eqt\">319</span><span class=\"hqt\" style=\"display:none\">319</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The prime numbers from 18 to 57 = 19, 23, 29, 31, 37, 41, 43, 47, 53</p><p>Hence, the required sum = 19 + 23 + 29 + 31 + 37 + 41 + 43 + 47 + 53 </p><p>= 323</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Find the difference between the sum of all composite numbers from 41 to 53 and the sum of all prime numbers from 10 to 30. </p></span><span class=\"hqt\" style=\"display:none\"><p>41 &#2360;&#2375; 53 &#2340;&#2325; &#2360;&#2349;&#2368; &#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327; &#2340;&#2341;&#2366; 10 &#2360;&#2375; 30 &#2340;&#2325; &#2360;&#2349;&#2368; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">322</span><span class=\"hqt\" style=\"display:none\">322</span>",
      "<span class=\"eqt\">326</span><span class=\"hqt\" style=\"display:none\">326</span>",
      "<span class=\"eqt\">309</span><span class=\"hqt\" style=\"display:none\">309</span>",
      "<span class=\"eqt\">315</span><span class=\"hqt\" style=\"display:none\">315</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The composite numbers from 41 to 53 = 42, 44, 45, 46, 48, 49, 50, 51, 52</p><p>The sum of all the composite numbers from 41 to 53 = 42 + 44 + 45 + 46 + 48 + 49 + 50 + 51 + 52 = 427 </p><p>The prime numbers from 10 to 30 = 11, 13, 17, 19, 23, 29</p><p>The sum of all the prime numbers from 10 to 30 = 11 + 13 + 17 + 19 + 23 + 29 = 112</p><p>Hence, the required difference = 427  -  112 = 315</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the number of prime numbers between 60 and 90.</p></span><span class=\"hqt\" style=\"display:none\"><p>60 &#2324;&#2352; 90 &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The prime numbers between 60 and 90 = 61, 67, 71, 73, 79, 83, 89 </p><p>Hence, the required number = 7</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Find the sum of the number of composite numbers between 30 and 49 and the number of prime numbers between 50 and 90.</p></span><span class=\"hqt\" style=\"display:none\"><p>30 &#2324;&#2352; 49 &#2325;&#2375; &#2348;&#2368;&#2330; &#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; 50 &#2324;&#2352; 90 &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2351;&#2379;&#2327; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The composite numbers between 30 and 49 = 32, 33, 34, 35, 36, 38, 39, 40, 42, 44, 45, 46, 48 = 13</p><p>The prime numbers between 50 and 90 = 53, 59, 61, 67, 71, 73, 79, 83, 89 = 9</p><p>Hence, the required sum = 13 + 9 = 22</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If a number is squared and 18 is added to it, and the resultant is tripled, then the final value will be 486. What is that number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2357;&#2352;&#2381;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2324;&#2352; &#2313;&#2360;&#2350;&#2375;&#2306; 18 &#2332;&#2379;&#2337;&#2364;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2341;&#2366; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2309;&#2306;&#2340;&#2367;&#2350; &#2350;&#2366;&#2344; 486 &#2361;&#2379;&#2327;&#2366;&#2404; &#2357;&#2361; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the number be a.</p><p>[a<sup>2</sup> + 18] * 3 = 486</p><p>a<sup>2</sup> + 18 = 162</p><p>a<sup>2</sup> = 144</p><p>a = 12</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If a number is doubled and 15 is added to it, and the resultant is squared, then the final value will be 1681. What is that number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2324;&#2352; &#2313;&#2360;&#2350;&#2375;&#2306; 15 &#2332;&#2379;&#2337;&#2364; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2341;&#2366; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2357;&#2352;&#2381;&#2327; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2309;&#2306;&#2340;&#2367;&#2350; &#2350;&#2366;&#2344; 1681 &#2361;&#2379;&#2327;&#2366;&#2404; &#2357;&#2361; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the number be a</p><p>(a * 2 + 15)<sup>2</sup> = 1681</p><p>=> 2a + 15 = 41</p><p>=> 2a = 26</p><p>=> a = 13</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>If the sum of two numbers is 32 and the product of those numbers is 255, then the sum of their squares is equal to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 32 &#2361;&#2376; &#2324;&#2352; &#2313;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; 255 &#2361;&#2376;, &#2340;&#2379; &#2313;&#2344;&#2325;&#2375; &#2357;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">514</span><span class=\"hqt\" style=\"display:none\">514</span>",
      "<span class=\"eqt\">524</span><span class=\"hqt\" style=\"display:none\">524</span>",
      "<span class=\"eqt\">504</span><span class=\"hqt\" style=\"display:none\">504</span>",
      "<span class=\"eqt\">534</span><span class=\"hqt\" style=\"display:none\">534</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>a + b = 32, a * b = 255</p><p>(a + b)<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> + 2ab</p><p>32<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> + 2 * 255</p><p>a<sup>2</sup> + b<sup>2</sup> = 1024  -  510 = 514</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>If the difference between the two numbers is 9 and the sum of their squares is 585, then find the product of the two numbers.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 9 &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2357;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 585 &#2361;&#2376;, &#2340;&#2379; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">264</span><span class=\"hqt\" style=\"display:none\">264</span>",
      "<span class=\"eqt\">252</span><span class=\"hqt\" style=\"display:none\">252</span>",
      "<span class=\"eqt\">248</span><span class=\"hqt\" style=\"display:none\">248</span>",
      "<span class=\"eqt\">260</span><span class=\"hqt\" style=\"display:none\">260</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>a  -  b = 9, a<sup>2</sup> + b<sup>2</sup> = 585</p><p>(a  -  b)<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup>  -  2ab</p><p>9<sup>2</sup> = 585  -  2ab </p><p>ab = (585  -  81)/2 = 252</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>A sum of Rs. 1728 was distributed among some children. Each child received an amount equal to three times the number of children. How many children were there?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2369;&#2331; &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; 1728 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2352;&#2366;&#2358;&#2367; &#2348;&#2366;&#2305;&#2335;&#2368; &#2327;&#2312;&#2404; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2348;&#2330;&#2381;&#2330;&#2375; &#2325;&#2379; &#2325;&#2369;&#2354; &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2352;&#2366;&#2358;&#2367; &#2350;&#2367;&#2354;&#2368;&#2404; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2375; &#2348;&#2330;&#2381;&#2330;&#2375; &#2341;&#2375;?</p></span>",

    "question": "<span class=\"eqt\"><p>What is the average of two consecutive even numbers, if the difference of whose square is 132?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2360;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2344;&#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 132 &#2361;&#2376;?</p></span>",
