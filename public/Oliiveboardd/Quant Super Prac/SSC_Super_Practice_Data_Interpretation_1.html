#2340;&#2352;&#2366;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">0-5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5-10</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">10-15</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15-20</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20-25</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">25-30</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30-35</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td></tr></table></span>",

371;&#2340;&#2381;&#2340;&#2367;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">16</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">24</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td></tr></table></span>",
