<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">

                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>

                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A, B and C invest Rs.120000, Rs.120000 and Rs.240000 respectively. Profit is Rs.30000 for a year. C received 8% of total profit being an active partner and rest of the profit is divided among A, B and C according to their investment. Find the total profit share of C.</p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C &#2344;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 120000 &#2352;&#2369;&#2346;&#2351;&#2375;, 120000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; 240000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2354;&#2366;&#2349; 30000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;&#2404; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2349;&#2366;&#2327;&#2368;&#2342;&#2366;&#2352; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2344;&#2366;&#2340;&#2375; C &#2325;&#2379; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; &#2325;&#2366; 8% &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2310; &#2324;&#2352; &#2358;&#2375;&#2359; &#2354;&#2366;&#2349; &#2325;&#2379; A, B &#2324;&#2352; C &#2325;&#2375; &#2348;&#2368;&#2330; &#2313;&#2344;&#2325;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; C &#2325;&#2366; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.13600</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.13600</span>",
      "<span class=\"eqt\">Rs.16200</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.16200</span>",
      "<span class=\"eqt\">Rs.15400</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.15400</span>",
      "<span class=\"eqt\">Rs.16000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.16000</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>C's ratio share = 240000/(120000+120000+240000) = 240000/480000 = 1/2</p><p>C's share of profit as active partner= 30000  X  8% = Rs. 2400</p><p>C's share of profit from investment = (30000 - 2400)/2 = 27600/2 = Rs. 13800</p><p>C's total profit share = 13800 + 2400 = Rs. 16200</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A's capital is twice B's, and B's is three times C's. They invest these amounts for 8, 12 and 16 months respectively. If profit is Rs.170000, what is C's share?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2325;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; B &#2325;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; &#2360;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2361;&#2376;, &#2324;&#2352; B &#2325;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; C &#2325;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; &#2360;&#2375; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2357;&#2375; &#2311;&#2344; &#2352;&#2366;&#2358;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 8, 12 &#2324;&#2352; 16 &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2354;&#2366;&#2349; 170000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; C &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.25600</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.25600</span>",
      "<span class=\"eqt\">Rs.27200</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.27200</span>",
      "<span class=\"eqt\">Rs.28400</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.28400</span>",
      "<span class=\"eqt\">Rs.29600</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.29600</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let C's capital = Y =&gt; B's capital = 3Y =&gt; A's capital = 6Y</p><p>Time - capital: A = 6Y X 8 = 48Y; B = 3Y X 12 = 36Y; C = Y X 16 = 16Y</p><p>Total = 48Y + 36Y + 16Y = 100Y</p><p>C's share = 170000  X  (16Y &div; 100Y) = 170000  X  0.16 = Rs. 27200</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A, B and C share profit equally. C is guaranteed 10% on his investment of &#8377;50000. If total profit is &#8377;9000, how much extra must C receive?</p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C &#2354;&#2366;&#2349; &#2325;&#2379; &#2348;&#2352;&#2366;&#2348;&#2352;-&#2348;&#2352;&#2366;&#2348;&#2352; &#2348;&#2366;&#2306;&#2335;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; C &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; 50000 &#2337;&#2377;&#2354;&#2352; &#2325;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2346;&#2352; 10% &#2325;&#2368; &#2327;&#2366;&#2352;&#2306;&#2335;&#2368; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; 9000 &#2337;&#2377;&#2354;&#2352; &#2361;&#2376;, &#2340;&#2379; C &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2366; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2350;&#2367;&#2354;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 2000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 2000</span>",
      "<span class=\"eqt\">Rs. 2500</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 2500</span>",
      "<span class=\"eqt\">Rs. 1800</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1800</span>",
      "<span class=\"eqt\">Rs. 3000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 3000</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Guaranteed = 10% of 50000 = Rs. 5000</p><p>Actual equal share = 1/3  X  9000 = Rs. 3000</p><p>Deficiency = 5000  -  3000 = Rs. 2000</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A, B and C started a business by investing amounts in the ratio of 5: 4: 3 respectively. A invested for 16 months which is 1 month and 6 months more than the investment period of B and C respectively. What is the ratio of profit earned by A, B and C respectively?</p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C &#2344;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;: 5:4:3 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2325;&#2375; &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;&#2404; A &#2344;&#2375; 16 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2332;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; B &#2324;&#2352; C &#2325;&#2368; &#2344;&#2367;&#2357;&#2375;&#2358; &#2309;&#2357;&#2343;&#2367; &#2360;&#2375; 1 &#2350;&#2361;&#2368;&#2344;&#2366; &#2324;&#2352; 6 &#2350;&#2361;&#2368;&#2344;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; A, B &#2324;&#2352; C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2354;&#2366;&#2349; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">8: 6: 3</span><span class=\"hqt\" style=\"display:none\">8: 6: 3</span>",
      "<span class=\"eqt\">4: 3: 2</span><span class=\"hqt\" style=\"display:none\">4: 3: 2</span>",
      "<span class=\"eqt\">8: 9: 5</span><span class=\"hqt\" style=\"display:none\">8: 9: 5</span>",
      "<span class=\"eqt\">4: 2: 1</span><span class=\"hqt\" style=\"display:none\">4: 2: 1</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let Rs.5a, Rs.4a and Rs.3a are amounts invested by A, B and C respectively.</p><p>A's investment period = 16 months</p><p>B's investment period = 16  -  1 = 15 months</p><p>C's investment period = 16  -  6 = 10 months</p><p>Therefore, profit ratio = A: B: C = (5a * 16): (4a * 15): (3a * 10) = <b>8: 6: 3</b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Sagar and Virat started a Dhaba. The investment of Sagar is 9/8th times of the investment of Virat and the share of profit of Sagar is 135% of the share of profit of Virat. If Sagar invested for 18 months, then for how much time period Virat invested the money?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2327;&#2352; &#2324;&#2352; &#2357;&#2367;&#2352;&#2366;&#2335; &#2344;&#2375; &#2319;&#2325; &#2338;&#2366;&#2348;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;&#2404; &#2360;&#2366;&#2327;&#2352; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358;, &#2357;&#2367;&#2352;&#2366;&#2335; &#2325;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2366; 9/8 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376; &#2324;&#2352; &#2360;&#2366;&#2327;&#2352; &#2325;&#2375; &#2354;&#2366;&#2349; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366;, &#2357;&#2367;&#2352;&#2366;&#2335; &#2325;&#2375; &#2354;&#2366;&#2349; &#2325;&#2375; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375; &#2325;&#2366; 135% &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2366;&#2327;&#2352; &#2344;&#2375; 18 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;, &#2340;&#2379; &#2357;&#2367;&#2352;&#2366;&#2335; &#2344;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">15 months</span><span class=\"hqt\" style=\"display:none\">15 &#2350;&#2361;&#2368;&#2344;&#2375;</span>",
      "<span class=\"eqt\">12 months</span><span class=\"hqt\" style=\"display:none\">12 &#2350;&#2361;&#2368;&#2344;&#2375;</span>",
      "<span class=\"eqt\">24 months</span><span class=\"hqt\" style=\"display:none\">24 &#2350;&#2361;&#2368;&#2344;&#2375;</span>",
      "<span class=\"eqt\">20 months</span><span class=\"hqt\" style=\"display:none\">20 &#2350;&#2361;&#2368;&#2344;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let Virat invested the money for m months.</p><p>So, ratio of profit of Sagar and Virat = 135: 100 = 27: 20</p><p>=&gt; (9 * 18): (8 * m) = 27: 20</p><p>=&gt; 9 * 18/(8 * m) = 27/20</p><p>=&gt; m = (9 * 18)/8 * 20/27</p><p>=&gt; m = 15 months</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A, B and C invest Rs.120000, Rs.150000 and Rs.180000 respectively for 12 months. If profit is Rs.315000, what is the difference between C's and B's shares?</p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C &#2344;&#2375; 12 &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 120000 &#2352;&#2369;&#2346;&#2351;&#2375;, 150000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; 180000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2354;&#2366;&#2349; 315000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; C &#2324;&#2352; B &#2325;&#2375; &#2358;&#2375;&#2351;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2381;&#2351;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.18000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.18000</span>",
      "<span class=\"eqt\">Rs.20000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.20000</span>",
      "<span class=\"eqt\">Rs.21000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.21000</span>",
      "<span class=\"eqt\">Rs.22000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.22000</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Total capital = 120000 + 150000 + 180000 = Rs. 450000</p><p>B's share = 315000  X  (150000 &div; 450000) = 315000  X  1/3 = Rs. 105000</p><p>C's share = 315000  X  (180000 &div; 450000) = 315000  X  2/5 = Rs. 126000</p><p>Required difference = 126000 &#8722; 105000 = Rs. 21000</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>A, B and C invest &#8377;60000, &#8377;90000 and &#8377;120000 for 2 years. Profit is &#8377;94500. C retires and is paid his capital plus profit share. How much does C receive (in Rs.)?</p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C &#2344;&#2375; 2 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;60000, &#8377;90000 &#2324;&#2352; &#8377;120000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2354;&#2366;&#2349; &#8377;94500 &#2361;&#2376;&#2404; C &#2360;&#2375;&#2357;&#2366;&#2344;&#2367;&#2357;&#2371;&#2340;&#2381;&#2340; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2375; &#2313;&#2360;&#2325;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; &#2324;&#2352; &#2354;&#2366;&#2349; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; C &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2366; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376; (&#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306;)?</p></span>",
    "options": [
      "<span class=\"eqt\">156000</span><span class=\"hqt\" style=\"display:none\">156000</span>",
      "<span class=\"eqt\">162000</span><span class=\"hqt\" style=\"display:none\">162000</span>",
      "<span class=\"eqt\">164000</span><span class=\"hqt\" style=\"display:none\">164000</span>",
      "<span class=\"eqt\">158000</span><span class=\"hqt\" style=\"display:none\">158000</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Ratio of profit share = 60000 X 2 : 90000 X 2 : 120000 X 2</p><p>= 2 : 3 : 4</p><p>C's profit share = 4/9  X  94500 = Rs. 42000</p><p>Total amount received by C = 120000 + 42000 = Rs. 162000</p>",
    "question_index": 6

    "question": "<span class=\"eqt\"><p>A and B start a business. A invests &#8377;40,000 for 8 months. B invests &#8377;50,000 for 6 months. C invests &#8377;17,500 for t months. If the profits of A, B, and C are in the ratio 16 : 15 : 14, for how many months did C invest?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; A 8 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;40,000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; B 6 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;50,000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; C t &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;17,500 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; A, B &#2324;&#2352; C &#2325;&#2366; &#2354;&#2366;&#2349; 16 : 15 : 14 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;, &#2340;&#2379; C &#2344;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>P, Q and R started a hotel. Three times the investment of Q is equal to seven times the investment of P and is equal to twice the investment of R. If the total annual profit earned by them is 20.5 lakhs, then what is the difference between profit share (in lakhs) of Q and R?</p></span><span class=\"hqt\" style=\"display:none\"><p>P, Q &#2324;&#2352; R &#2344;&#2375; &#2319;&#2325; &#2361;&#2379;&#2335;&#2354; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;&#2404; Q &#2325;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2366; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366;, P &#2325;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2360;&#2366;&#2340; &#2327;&#2369;&#2344;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376; &#2324;&#2352; R &#2325;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2375; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2313;&#2344;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2369;&#2354; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2354;&#2366;&#2349; 20.5 &#2354;&#2366;&#2326; &#2361;&#2376;, &#2340;&#2379; Q &#2324;&#2352; R &#2325;&#2375; &#2354;&#2366;&#2349; &#2325;&#2375; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375; (&#2354;&#2366;&#2326; &#2350;&#2375;&#2306;) &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

    "solution": "<p>Let the investment of Q = Rs. a</p><p>Then, investment of P = 3a/7</p><p>Investment of R = 3a/2</p><p>Period of investment for P, Q and R is same. So,</p><p>Now, profit ratio = investment ratio, P: Q: R = (3a/7): a: (3a/2) = 6: 14: 21</p><p>Total profit earned = 20.5 lakhs</p><p>Therefore, difference between share of Q and R = [(21  -  14)/(6 + 14 + 21)] * 20.5 = <b>3.5 lakhs</b></p>",
