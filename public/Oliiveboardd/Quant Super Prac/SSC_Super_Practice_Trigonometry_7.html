    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A 20 m long ladder rests against a wall so that the angle between the ladder and the wall is 30<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20002/image077.png\">. How far (in m) is the base of the ladder from the wall?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; 20 m &#2354;&#2306;&#2348;&#2368; &#2360;&#2368;&#2338;&#2364;&#2368; &#2319;&#2325; &#2342;&#2368;&#2357;&#2366;&#2352; &#2360;&#2375; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2335;&#2367;&#2325;&#2368; &#2361;&#2376; &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367; &#2360;&#2368;&#2338;&#2364;&#2368; &#2324;&#2352; &#2342;&#2368;&#2357;&#2366;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2325;&#2379;&#2339; 30<img width=\"9\" height=\"15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20002/image077.png\"> &#2361;&#2379;&#2404; &#2342;&#2368;&#2357;&#2366;&#2352; &#2360;&#2375; &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352;&#2368; (m &#2350;&#2375;&#2306;) &#2346;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">10&radic;3</span><span class=\"hqt\" style=\"display:none\">10&radic;3</span>",
      "<span class=\"eqt\">20&radic;3</span><span class=\"hqt\" style=\"display:none\">20&radic;3</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=130 height=269 id=\"Picture 43\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20002/image080.png\"></p><p>AC = 20 m</p><p><img width=85 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20002/image081.png\"></p><p><img width=51 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20002/image082.png\"></p><p>BC = 10 m</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A mirror is placed on the ground facing upwards. A man sees the top of a tower in the mirror which is at a distance of 105 m from the mirror. The man is 0.5 m away from the mirror, and his height is 1.5 m. Find the height of the tower (in metres).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2352;&#2381;&#2346;&#2339; &#2325;&#2379; &#2314;&#2346;&#2352; &#2325;&#2368; &#2323;&#2352; &#2350;&#2369;&#2306;&#2361; &#2325;&#2352;&#2325;&#2375; &#2332;&#2350;&#2368;&#2344; &#2346;&#2352; &#2352;&#2326;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2310;&#2342;&#2350;&#2368; &#2342;&#2352;&#2381;&#2346;&#2339; &#2350;&#2375;&#2306; &#2319;&#2325; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2379; &#2342;&#2375;&#2326;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2342;&#2352;&#2381;&#2346;&#2339; &#2360;&#2375; 105 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;&#2404; &#2310;&#2342;&#2350;&#2368; &#2342;&#2352;&#2381;&#2346;&#2339; &#2360;&#2375; 0.5 &#2350;&#2368;&#2335;&#2352; &#2342;&#2370;&#2352; &#2361;&#2376;, &#2324;&#2352; &#2313;&#2360;&#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 1.5 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2404; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; (&#2350;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">315</span><span class=\"hqt\" style=\"display:none\">315</span>",
      "<span class=\"eqt\">115</span><span class=\"hqt\" style=\"display:none\">115</span>",
      "<span class=\"eqt\">210</span><span class=\"hqt\" style=\"display:none\">210</span>",
      "<span class=\"eqt\">280</span><span class=\"hqt\" style=\"display:none\">280</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=298 height=128 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27797/image026.png\"></p><p>Here PQ is height of man = 1.5 m</p><p>And TS is the height of tower.</p><p>And also &#916;PQR and &#916;TSR is similar</p><p>Similar triangles: Man's eye height (1.5 m) to mirror distance (0.5 m) vs. tower height (x) to mirror distance (105 m). </p><p>x / 105 = 1.5 / 0.5 </p><p>x = 105  X  3 = 315 m. </p><p>option (a) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A ladder is resting against a wall. The angle between the foot of the ladder and the wall is 45&deg; And the foot of the ladder is 6.6 m away from the wall. The length of the ladder (in m) is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2368;&#2338;&#2364;&#2368; &#2342;&#2368;&#2357;&#2366;&#2352; &#2325;&#2375; &#2360;&#2361;&#2366;&#2352;&#2375; &#2335;&#2367;&#2325;&#2368; &#2361;&#2369;&#2312; &#2361;&#2376;&#2404; &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2324;&#2352; &#2342;&#2368;&#2357;&#2366;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2325;&#2379;&#2339; 45&deg; &#2361;&#2376; &#2324;&#2352; &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352;, &#2342;&#2368;&#2357;&#2366;&#2352; &#2360;&#2375; 6.6 m &#2342;&#2370;&#2352; &#2361;&#2376;&#2404; &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; (m &#2350;&#2375;&#2306;) &#2361;&#2379;&#2327;&#2368;:</p></span>",
    "options": [
      "<span class=\"eqt\">6.6  X  &radic;2</span><span class=\"hqt\" style=\"display:none\">6.6 X &radic;2</span>",
      "<span class=\"eqt\">3.3  X  &radic;2</span><span class=\"hqt\" style=\"display:none\">3.3 X &radic;2</span>",
      "<span class=\"eqt\">2.2  X  &radic;2</span><span class=\"hqt\" style=\"display:none\">2.2 X &radic;2</span>",
      "<span class=\"eqt\">3.6  X  &radic;2</span><span class=\"hqt\" style=\"display:none\">3.6 X &radic;2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=194 height=183 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24842/image083.png\"></p><p>AB = Length of ladder</p><p>In &#916;ABC:</p><p>cos45&deg; = Base/Hypotenuse</p><p>1/&radic;2 = 6.6/AB</p><p>AB = 6.6  X  &radic;2 m</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A ladder leaning against a wall makes an angle &#952; with the horizontal ground such that cos &#952; = 5/13. If the height of the top of the ladder from the wall is 18 m, then what is the distance (in m) of the foot of the ladder from the wall?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368;&#2357;&#2366;&#2352; &#2325;&#2375; &#2360;&#2361;&#2366;&#2352;&#2375; &#2326;&#2396;&#2368; &#2319;&#2325; &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2381;&#2359;&#2376;&#2340;&#2367;&#2332; &#2360;&#2340;&#2361; &#2325;&#2375; &#2360;&#2366;&#2341; &#952; &#2325;&#2366; &#2325;&#2379;&#2339; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376; &#2325;&#2367; cos &#952; = 5/13 &#2361;&#2376;&#2404;&#2351;&#2342;&#2367; &#2342;&#2368;&#2357;&#2366;&#2352; &#2360;&#2375; &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; 18m &#2361;&#2376;, &#2340;&#2379; &#2342;&#2368;&#2357;&#2366;&#2352; &#2360;&#2375; &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2375; &#2344;&#2367;&#2330;&#2354;&#2375; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; (m &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">19.5</span><span class=\"hqt\" style=\"display:none\">19.5</span>",
      "<span class=\"eqt\">7.5</span><span class=\"hqt\" style=\"display:none\">7.5</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=165 height=194 id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24643/image094.png\"></p><p>cos &#952; = BC/AC = 5/13</p><p>Let BC = 5 and AC = 13</p><p>AB = &radic;[13<sup>2</sup>  -  5<sup>2</sup>] = 12</p><p>Given:</p><p>AB = 12 = 18 m</p><p>1 = 1.5 m</p><p>Now,</p><p>Distance (in m) of the foot of the ladder from the wall = BC = 5 = 5 * 1.5</p><p>= 7.5 m</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A ladder 10 m long rests against a vertical wall making an angle of 30&deg; with the wall. How high up (in m) does it reach the wall from the ground? (Take &radic;3=1.73)</p></span><span class=\"hqt\" style=\"display:none\"><p>10 m &#2354;&#2306;&#2348;&#2368; &#2319;&#2325; &#2360;&#2368;&#2338;&#2364;&#2368; &#2342;&#2368;&#2357;&#2366;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; 30&deg; &#2325;&#2366; &#2325;&#2379;&#2339; &#2348;&#2344;&#2366;&#2340;&#2375; &#2361;&#2369;&#2319; &#2319;&#2325; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2342;&#2368;&#2357;&#2366;&#2352; &#2346;&#2352; &#2335;&#2367;&#2325;&#2368; &#2361;&#2369;&#2312; &#2361;&#2376;&#2404; &#2351;&#2361; &#2332;&#2350;&#2368;&#2344; &#2360;&#2375; &#2342;&#2368;&#2357;&#2366;&#2352; &#2340;&#2325; &#2325;&#2367;&#2340;&#2344;&#2368; &#2313;&#2305;&#2330;&#2366;&#2312; (m &#2350;&#2375;&#2306;) &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2340;&#2366; &#2361;&#2376;? (&radic;3=1.73 &#2354;&#2368;&#2332;&#2367;&#2319;)</p></span>",
    "options": [
      "<span class=\"eqt\">5.88</span><span class=\"hqt\" style=\"display:none\">5.88</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">8.65</span><span class=\"hqt\" style=\"display:none\">8.65</span>",
      "<span class=\"eqt\">8.56</span><span class=\"hqt\" style=\"display:none\">8.56</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img border=0 width=156 height=332 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21831/image031.jpg\"></p><p>Cos 30&deg; = BC/AB</p><p>=&gt; &radic;3/2 = BC/10</p><p>=&gt; BC = 5&radic;3</p><p>=&gt; BC = 5 * 1.73</p><p>=&gt; BC = 8.65 m</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A man looks at the reflection of the top of the lamp-post on the mirror that is 6.6 m away from the foot of the lamppost. The man's height is 1.25 m and he is standing 2 m away from the mirror. Assuming that the mirror is placed on the ground, facing the sky and the man, and that the mirror and the lamp-post are in a same line, find the height of the lamp-post (in metres).</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2310;&#2342;&#2350;&#2368; &#2354;&#2376;&#2306;&#2346;-&#2346;&#2379;&#2360;&#2381;&#2335; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348; &#2325;&#2379; &#2342;&#2352;&#2381;&#2346;&#2339; &#2346;&#2352; &#2342;&#2375;&#2326;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2354;&#2376;&#2306;&#2346;-&#2346;&#2379;&#2360;&#2381;&#2335; &#2325;&#2375; &#2346;&#2376;&#2352; &#2360;&#2375; 6.6 &#2350;&#2368;&#2335;&#2352; &#2342;&#2370;&#2352; &#2361;&#2376;&#2404; &#2310;&#2342;&#2350;&#2368; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 1.25 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376; &#2324;&#2352; &#2357;&#2361; &#2342;&#2352;&#2381;&#2346;&#2339; &#2360;&#2375; 2 &#2350;&#2368;&#2335;&#2352; &#2342;&#2370;&#2352; &#2326;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404; &#2351;&#2361; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2367; &#2342;&#2352;&#2381;&#2346;&#2339; &#2332;&#2350;&#2368;&#2344; &#2346;&#2352; &#2352;&#2326;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2310;&#2325;&#2366;&#2358; &#2324;&#2352; &#2310;&#2342;&#2350;&#2368; &#2325;&#2366; &#2360;&#2366;&#2350;&#2344;&#2366; &#2325;&#2352; &#2352;&#2361;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2342;&#2352;&#2381;&#2346;&#2339; &#2324;&#2352; &#2354;&#2376;&#2306;&#2346;-&#2346;&#2379;&#2360;&#2381;&#2335; &#2319;&#2325; &#2361;&#2368; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;, &#2354;&#2376;&#2306;&#2346;-&#2346;&#2379;&#2360;&#2381;&#2335; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; (&#2350;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">4.28</span><span class=\"hqt\" style=\"display:none\">4.28</span>",
      "<span class=\"eqt\">4.45</span><span class=\"hqt\" style=\"display:none\">4.45</span>",
      "<span class=\"eqt\">3.97</span><span class=\"hqt\" style=\"display:none\">3.97</span>",
      "<span class=\"eqt\">4.13</span><span class=\"hqt\" style=\"display:none\">4.13</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=323 height=178 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27671/image021.png\" ></p><p>Let the height of the lamppost be x meters.</p><p>Using the similarity:</p><p>x/6.6=1.25/2</p><p>h = 6.6  X  1.25/2</p><p>h = 6.6  X  0.625</p><p>h = 4.125 meters&#8776;4.13 metres.</p><p>Option (d) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Asha and Suman's mud forts have heights 9 cm and 16 cm. If the fort tops are at 25 cm apart from each other, then the distance (in cm) between two forts is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2358;&#2366; &#2324;&#2352; &#2360;&#2369;&#2350;&#2344; &#2325;&#2375; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2375; &#2325;&#2367;&#2354;&#2379;&#2306; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 9 cm &#2324;&#2352; 16 cm &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2367;&#2354;&#2375; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2375; 25 cm &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2367;&#2354;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; (cm &#2350;&#2375;&#2306;) &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",

    "solution": "<p><img width=242 height=199 id=\"Picture 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22634/image117.png\"></p><p>Height of Asha's mud fort = AB = 9 cm</p><p>Height of Suman's mud fort = CD = 16 cm</p><p>The length of CE = 16  -  9 = 7 cm</p><p>The distance between fort tops = AC = 25 cm</p><p>So, the distance between two forts = AE = BD = &radic;(AC<sup>2 </sup> -  CE<sup>2</sup>) = &radic;(25<sup>2 </sup> -  7<sup>2</sup>) = 24 cm</p>",

  {
    "question": "<span class=\"eqt\"><p>A vertical pole of length 6 m casts a 4 m long shadow on the ground. At the same time, a tower casts a 28 m long shadow. Find the height of the tower. </p></span><span class=\"hqt\" style=\"display:none\"><p>6 &#2350;&#2368;&#2335;&#2352; &#2354;&#2350;&#2381;&#2348;&#2366; &#2319;&#2325; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2326;&#2306;&#2349;&#2366; &#2332;&#2350;&#2368;&#2344; &#2346;&#2352; 4 &#2350;&#2368;&#2335;&#2352; &#2354;&#2350;&#2381;&#2348;&#2368; &#2331;&#2366;&#2351;&#2366; &#2337;&#2366;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2368; &#2360;&#2350;&#2351;, &#2319;&#2325; &#2350;&#2368;&#2344;&#2366;&#2352; 28 &#2350;&#2368;&#2335;&#2352; &#2354;&#2350;&#2381;&#2348;&#2368; &#2331;&#2366;&#2351;&#2366; &#2337;&#2366;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">42 m</span><span class=\"hqt\" style=\"display:none\">42 &#2350;&#2368;</span>",
      "<span class=\"eqt\">32 m</span><span class=\"hqt\" style=\"display:none\">32 &#2350;&#2368;</span>",
      "<span class=\"eqt\">36 m</span><span class=\"hqt\" style=\"display:none\">36 &#2350;&#2368;</span>",

    "correct_option_id": 0,
    "solution": "<p>As angle of elevation is same for both tower and pole,</p><p>So</p><p>Similar triangles: Pole height/shadow = Tower height/shadow </p><p>6 / 4 = h / 28 </p><p>h = 28  X  (6 / 4) = 7 &#1093; 6 = 42 m.</p><p>Option (a) is the correct answer.</p>",

    "question": "<span class=\"eqt\"><p>From a point C on a level ground, the angle of elevation of the top of the tower is 30<img width=16 height=16 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19991/image079.png\">If the distance of point C from the foot of the tower is 510 m, then 50% of the height of the tower (in m) is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2340;&#2354; &#2332;&#2350;&#2368;&#2344; &#2346;&#2352; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; C &#2360;&#2375;, &#2335;&#2377;&#2357;&#2352; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 30<img width=16 height=16 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19991/image079.png\"> &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2335;&#2377;&#2357;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; C &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 510 m &#2361;&#2376;, &#2340;&#2379; &#2335;&#2377;&#2357;&#2352; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2366; 50% (m &#2350;&#2375;&#2306;) &#2361;&#2376; :</p></span>",

  {
    "question": "<span class=\"eqt\"><p>Exactly midway between the foot of two towers P and Q, the angles of elevation of their tops are 45&deg; and 60<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19993/image054.png\"> respectively. The ratio of the heights of P and Q is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2350;&#2368;&#2344;&#2366;&#2352;&#2379;&#2306; P &#2324;&#2352; Q &#2325;&#2375; &#2340;&#2354; &#2325;&#2375; &#2336;&#2368;&#2325; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2313;&#2344;&#2325;&#2375; &#2358;&#2367;&#2326;&#2352;&#2379;&#2306; &#2325;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 45&deg; &#2324;&#2352; 60&deg; &#2361;&#2376;&#2306;, &#2340;&#2379; P &#2324;&#2352; Q &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376; ?</p></span>",
    "options": [
      "<span class=\"eqt\">1 : &radic;3</span><span class=\"hqt\" style=\"display:none\">1 : &radic;3</span>",
      "<span class=\"eqt\">3 : 1</span><span class=\"hqt\" style=\"display:none\">3 : 1</span>",
      "<span class=\"eqt\">1 : 3</span><span class=\"hqt\" style=\"display:none\">1 : 3</span>",
      "<span class=\"eqt\">&radic;3 : 1</span><span class=\"hqt\" style=\"display:none\">&radic;3 : 1</span>"

    "correct_option_id": 0,
    "solution": "<p><img width=218 height=162 id=\"Picture 31\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19993/image057.png\"></p><p>In &#916;ABC,</p><p>tan45&deg; = AB/BC</p><p>1 = P/BC</p><p>P = BC</p><p>In &#916;CDE,</p><p>tan60&deg; = DE/CD</p><p>&radic;3 = Q/CD</p><p>Q = CD&radic;3</p><p>Ratio of the heights of P and Q = BC: CD&radic;3 = 1: &radic;3</p>",

  {
    "question": "<span class=\"eqt\"><p>The length of the shadow of a vertical pole on the ground is 36 m. If the angle of elevation of the sun at that time is<img width=12 height=16 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22634/image103.png\">such that sec&#952; = 13/12, then what is the height (in m) of the pole?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2370;&#2350;&#2367; &#2346;&#2352; &#2319;&#2325; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2326;&#2306;&#2349;&#2375; &#2325;&#2368; &#2331;&#2366;&#2351;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 36 m &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360; &#2360;&#2350;&#2351; &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; <img width=\"12\" height=\"16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22634/image103.png\"> &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376; &#2325;&#2367; sec&#952; = 13/12 &#2361;&#2376;, &#2340;&#2379; &#2326;&#2306;&#2349;&#2375; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; (m &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=320 height=187 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22634/image104.png\"></p><p>Since, sec&#952; = 13/12 = Hypotenuse/Base = AC/BC</p><p>And the base = the shadow of the pole = BC = 36 m</p><p>So, the hypotenuse = AC = 36  X  13/12 = 39 m</p><p>And the height of the pole = the perpendicular = AB = &radic;(39<sup>2</sup>  -  36<sup>2</sup>) = 15 m</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>Let A and B be two towers with the same base. From the midpoint of the line joining their feet, the angles of elevation of the tops of A and B are 30&deg; and 45&deg;, respectively. The ratio of the heights of A and B is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344; &#2354;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; A &#2324;&#2352; B &#2360;&#2350;&#2366;&#2344; &#2310;&#2343;&#2366;&#2352; &#2357;&#2366;&#2354;&#2368; &#2342;&#2379; &#2350;&#2368;&#2344;&#2366;&#2352; &#2361;&#2376;&#2306;&#2404; &#2313;&#2344;&#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2352;&#2375;&#2326;&#2366; &#2325;&#2375; &#2350;&#2343;&#2381;&#2351; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375;, A &#2324;&#2352; B &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 30&deg; &#2324;&#2352; 45&deg; &#2361;&#2376;&#2404; A &#2324;&#2352; B &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2361;&#2376;:</p></span>",

    "solution": "<p><img width=307 height=188 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24842/image084.jpg\"></p><p>PM = QM</p><p>In &#916;APM and &#916;BQM:</p><p>tan30&deg; = AP/PM</p><p>1/&radic;3 = AP/PM</p><p>PM = AP&radic;3 ........ (1)</p><p>tan45&deg; = BQ/QM</p><p>1 = BQ/PM</p><p>PM = BQ ....... (2)</p><p>AP&radic;3 = BQ</p><p>AP: BQ = 1: &radic;3</p>",
    "question_index": 11

  {
    "question": "<span class=\"eqt\"><p>Two ships are on the opposite of a light house such that all three of them are collinear. The angles of depression of the two ships from the top of the light house are 30&deg; and 60&deg;. If the ships are 230&radic;3 m apart, then find the height of the light house (in m).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2354;&#2366;&#2311;&#2335; &#2361;&#2366;&#2313;&#2360; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2342;&#2379; &#2332;&#2361;&#2366;&#2332; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306; &#2325;&#2367; &#2340;&#2368;&#2344;&#2379;&#2306; &#2360;&#2350;&#2352;&#2375;&#2326;&#2368; &#2361;&#2376;&#2306;&#2404; &#2354;&#2366;&#2311;&#2335; &#2361;&#2366;&#2313;&#2360; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2360;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2332;&#2361;&#2366;&#2332;&#2379;&#2306; &#2325;&#2375; &#2309;&#2357;&#2344;&#2350;&#2344; &#2325;&#2379;&#2339; 30&deg; &#2324;&#2352; 60&deg; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2332;&#2361;&#2366;&#2332; 230&radic;3 m &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2354;&#2366;&#2311;&#2335; &#2361;&#2366;&#2313;&#2360; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; (m &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">175.4</span><span class=\"hqt\" style=\"display:none\">175.4</span>",
      "<span class=\"eqt\">165.2</span><span class=\"hqt\" style=\"display:none\">165.2</span>",
      "<span class=\"eqt\">172.5</span><span class=\"hqt\" style=\"display:none\">172.5</span>",
      "<span class=\"eqt\">180.5</span><span class=\"hqt\" style=\"display:none\">180.5</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=355 height=220 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21334/image009.jpg\"></p><p>In &#8710;SLT,</p><p>tan 60&deg; = h/x</p><p>=&gt; &radic;3 = h/x</p><p>=&gt; x = h/&radic;3</p><p>And in &#8710;RLT,</p><p>tan 30&deg; = h/(230&radic;3  -  x)</p><p>=&gt; 1/&radic;3 = h(230&radic;3  -  x)</p><p>=&gt; 230&radic;3 - h/&radic;3 = h&radic;3</p><p>=&gt; h(&radic;3 + 1/&radic;3) = 230&radic;3</p><p>=&gt; h(3 + 1) /&radic;3 = 230&radic;3</p><p>=&gt; h = 230 * &frac34;</p><p>=&gt; h = 172.5 m</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>The angle of elevation of a ladder against a wall is 45&deg;. The length of the ladder is 12 m. what is the distance between the wall and the foot of the ladder?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2368;&#2357;&#2366;&#2352; &#2346;&#2352; &#2335;&#2367;&#2325;&#2368; &#2319;&#2325; &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 45&deg; &#2361;&#2376;&#2404; &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 12m &#2361;&#2376;&#2404; &#2342;&#2368;&#2357;&#2366;&#2352; &#2324;&#2352; &#2360;&#2368;&#2338;&#2364;&#2368; &#2325;&#2375; &#2340;&#2354; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

  {
    "question": "<span class=\"eqt\"><p>The angle of elevation of the top of an unfinished tower at a point distant 78 m from its base is 30&deg;. How much higher must the tower be raised (in m) so that the angle of elevation of the top of the finished tower at the same point will be 60&deg;?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2309;&#2343;&#2370;&#2352;&#2368; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2360;&#2375; 78 m &#2342;&#2370;&#2352; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2313;&#2360;&#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 30&deg; &#2361;&#2376;&#2404; &#2340;&#2376;&#2351;&#2366;&#2352; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2366; &#2360;&#2350;&#2366;&#2344; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 60&deg; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2340;&#2325; (m &#2350;&#2375;&#2306;) &#2314;&#2346;&#2352; &#2348;&#2397;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",

    "solution": "<p><img width=217 height=232 id=\"Picture 51\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19955/image066.png\"></p><p>Let BC = h<sub>1</sub> and AB = h<sub>2</sub></p><p>&#8736;APB = 30&deg;</p><p>&#8736;APC = 60&deg;</p><p>In &#916;APB:</p><p>Tan 30&deg; = AB/AP</p><p><img width=60 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19955/image067.png\"></p><p>h<sub>2</sub> = 26&radic;3 m</p><p>In &#916;APC:</p><p>Tan 60&deg; = AC/AP</p><p><img width=83 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19955/image068.png\"></p><p>78&radic;3 = 26&radic;3 + h<sub>1</sub></p><p>BC = h<sub>1</sub> = 52&radic;3 m</p>",

  {
