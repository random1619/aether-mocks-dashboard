<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The dimensions of a box are 15 m, X m, and 10 m. If the cost of painting the entire box externally is Rs.2898 at Rs.3 per sq. m, then find the volume (in cubic m) of the box.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2375; &#2310;&#2351;&#2366;&#2350; 15 &#2350;&#2368;&#2335;&#2352;, X &#2350;&#2368;&#2335;&#2352; &#2324;&#2352; 10 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2370;&#2352;&#2375; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2379; &#2348;&#2366;&#2361;&#2352;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2375;&#2306;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; 3 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2327; &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 2898 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; (&#2328;&#2344; &#2350;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1828</span><span class=\"hqt\" style=\"display:none\">1828</span>",
      "<span class=\"eqt\">1998</span><span class=\"hqt\" style=\"display:none\">1998</span>",
      "<span class=\"eqt\">2108</span><span class=\"hqt\" style=\"display:none\">2108</span>",
      "<span class=\"eqt\">1746</span><span class=\"hqt\" style=\"display:none\">1746</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Surface area of the box = Total cost of painting/Rate</p><p>= 2898/3 = 966 sq. m</p><p>So,</p><p>2 * (15X + 10X + 150) = 966</p><p>25X = 483  -  150</p><p>25X = 333</p><p>X= 333/25</p><p>X = 13.32</p><p>Now,</p><p>Volume of the box = 15 * 13.32 * 10</p><p>= 15 * 10 * 1332/100</p><p>= 666 * 3 = 1998 cubic m</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p> What is the weight of a cubical block of ice 50 cm in length, if one cubic metre of ice weights 900 kilograms? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2328;&#2344; &#2350;&#2368;&#2335;&#2352; &#2348;&#2352;&#2381;&#2347; &#2325;&#2366; &#2349;&#2366;&#2352; 900 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2361;&#2376;, &#2340;&#2379; 50 &#2360;&#2375;&#2350;&#2368; &#2354;&#2306;&#2348;&#2375; &#2348;&#2352;&#2381;&#2347; &#2325;&#2375; &#2319;&#2325; &#2328;&#2344;&#2366;&#2325;&#2366;&#2352; &#2326;&#2306;&#2337; &#2325;&#2366; &#2349;&#2366;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">113 kg</span><span class=\"hqt\" style=\"display:none\">113 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">113.5 kg</span><span class=\"hqt\" style=\"display:none\">113.5 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">112.5 kg</span><span class=\"hqt\" style=\"display:none\">112.5 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">114 kg</span><span class=\"hqt\" style=\"display:none\">114 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>\"</p><p>Volume of the cubical block of ice = 50 &#215; 50 &#215; 50 cm <sup>3</sup></p><p>= (50 * 50 * 50)/(100 * 100 * 100)</p><p>= (1/8) m<sup>3</sup></p><p>weight of the cube = (1/8) * 900 = 112.50 kg\"</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The length, breadth, height of an ice box is 4m, 2m 40 cm, and 1 m 20 cm respectively. Find the longest rope which can measure the dimensions of the box exactly.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2311;&#2360; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312;, &#2330;&#2380;&#2337;&#2364;&#2366;&#2312;, &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 4 m, 2 m 40 cm &#2324;&#2352; 1 m 20 cm &#2361;&#2376;&#2404; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2375; &#2357;&#2367;&#2350;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2335;&#2368;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2350;&#2366;&#2346; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2360;&#2325;&#2381;&#2359;&#2350; &#2360;&#2348;&#2360;&#2375; &#2354;&#2306;&#2348;&#2368; &#2352;&#2360;&#2381;&#2360;&#2368; &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">60 cm</span><span class=\"hqt\" style=\"display:none\">60 cm</span>",
      "<span class=\"eqt\">50 cm</span><span class=\"hqt\" style=\"display:none\">50 cm</span>",
      "<span class=\"eqt\">30 cm</span><span class=\"hqt\" style=\"display:none\">30 cm</span>",
      "<span class=\"eqt\">40 cm</span><span class=\"hqt\" style=\"display:none\">40 cm</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Length = 4 m = 400 cm</p><p>Breadth = 2 m 40 cm = 240 cm</p><p>Height = 1 m 20 cm = 120 cm</p><p>Length of rope = HCF of 400, 240, and 120 = 40 cm</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A cuboidal tank of length and width 16m and X m respectively is full of water. When 35.2 kilolitres water is removed from the tank, the level of water goes down by 40 cm. The value of X is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 16m &#2324;&#2352; Xm &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2328;&#2344;&#2366;&#2325;&#2366;&#2352; &#2335;&#2376;&#2306;&#2325; &#2346;&#2366;&#2344;&#2368; &#2360;&#2375; &#2346;&#2370;&#2352;&#2366; &#2349;&#2352;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;&#2404; &#2332;&#2348; &#2335;&#2376;&#2306;&#2325; &#2360;&#2375; 35.2 &#2325;&#2367;&#2354;&#2379;&#2354;&#2368;&#2335;&#2352; &#2346;&#2366;&#2344;&#2368; &#2344;&#2367;&#2325;&#2366;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2360;&#2381;&#2340;&#2352; 40 cm &#2344;&#2368;&#2330;&#2375; &#2330;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">4.5</span><span class=\"hqt\" style=\"display:none\">4.5</span>",
      "<span class=\"eqt\">6.5</span><span class=\"hqt\" style=\"display:none\">6.5</span>",
      "<span class=\"eqt\">5.5</span><span class=\"hqt\" style=\"display:none\">5.5</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>35.2 kl = 35.2 cubic m</p><p>Volume of water removed = Area of base * decrease in water level</p><p>35.2 = 16 * X * (0.4)</p><p>X = 35.2/6.4</p><p>X = 5.5</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The lateral surface area of a cuboid is 216 sq.m. Find the height of the cuboid, if the sum of the adjacent side of its base is 36 m.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344;&#2366;&#2349; &#2325;&#2366; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 216 sq.m. &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2328;&#2344;&#2366;&#2349; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2310;&#2360;&#2344;&#2381;&#2344; &#2349;&#2369;&#2332;&#2366; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; 36 m &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4 m</span><span class=\"hqt\" style=\"display:none\">4 m</span>",
      "<span class=\"eqt\">2 m</span><span class=\"hqt\" style=\"display:none\">2 m</span>",
      "<span class=\"eqt\">3 m</span><span class=\"hqt\" style=\"display:none\">3 m</span>",
      "<span class=\"eqt\">2.5 m</span><span class=\"hqt\" style=\"display:none\">2.5 m</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>lateral surface area of cuboid = 216 sq. m</p><p>2 * height * (length + width) = 216</p><p>Height = 216/ (2 * 36) = 3 m</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The breadth of a cuboid is b cm. The length of the cuboid is three times its breadth and the height of the cuboid is the average of its length and breadth. Find the total surface area (in sq. cm) of cuboid.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344;&#2366;&#2349; &#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; b cm &#2361;&#2376;&#2404; &#2328;&#2344;&#2366;&#2349; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312;, &#2313;&#2360;&#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2368; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2328;&#2344;&#2366;&#2349; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312;, &#2313;&#2360;&#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2366; &#2324;&#2360;&#2340; &#2361;&#2376;&#2404; &#2328;&#2344;&#2366;&#2349; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (sq. cm &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">12b<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">12b<sup>2</sup></span>",
      "<span class=\"eqt\">22b<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">22b<sup>2</sup></span>",
      "<span class=\"eqt\">16b<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">16b<sup>2</sup></span>",
      "<span class=\"eqt\">28b<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">28b<sup>2</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Breadth = b cm</p><p>length = 3b cm</p><p>Height = 2b cm</p><p>Total surface area = 2 * (lb+bh +hl) = 2 * (3b<sup>2</sup> + 2b<sup>2</sup> + 6b<sup>2</sup>) = 22b<sup>2</sup> cm<sup>2</sup></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>There is a cuboid with surface area of adjacent faces being A cm<sup>2</sup>, B cm<sup>2</sup> and C cm<sup>2</sup>. Find volume of the cuboid (in cm<sup>3</sup>).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344;&#2366;&#2349; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2310;&#2360;&#2344;&#2381;&#2344; &#2347;&#2354;&#2325;&#2379;&#2306; &#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; A &#2360;&#2375;&#2350;&#2368;<sup>2</sup>, B &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2324;&#2352; C &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2361;&#2376;&#2404; &#2328;&#2344;&#2366;&#2349; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; (&#2360;&#2375;&#2350;&#2368;<sup>3</sup> &#2350;&#2375;&#2306;)&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;(A<sup>2</sup> + B<sup>2</sup> + C<sup>2</sup>)*(A + B + C)</span><span class=\"hqt\" style=\"display:none\">&radic;(A<sup>2</sup> + B<sup>2</sup> + C<sup>2</sup>)*(A + B + C)</span>",
      "<span class=\"eqt\">&radic;(ABC)</span><span class=\"hqt\" style=\"display:none\">&radic;(ABC)</span>",
      "<span class=\"eqt\">&radic;(AB<sup>2</sup> + BC<sup>2</sup> + CA<sup>2</sup>)</span><span class=\"hqt\" style=\"display:none\">&radic;(AB<sup>2</sup> + BC<sup>2</sup> + CA<sup>2</sup>)</span>",
      "<span class=\"eqt\">&radic;AB + &radic;BC + &radic;CA</span><span class=\"hqt\" style=\"display:none\">&radic;AB + &radic;BC + &radic;CA</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let l, b and h be dimensions of cuboid.</p><p>Surface area of three faces of cuboid;</p><p>l*b = A ..(1)</p><p>b*h = B ..(2)</p><p>h*l = C ..(3)</p><p>Multiplying (1), (2) and (3); we get</p><p>(l*b*h)<sup>2</sup> = A*B*C</p><p>Volume of cuboid = l*b*h = &radic;(ABC)</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The total surface area of a cube is X sq. cm and lateral surface area of the same cube is Y sq. cm. If X  -  Y = 392, then find the side length of the cube.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; X sq. cm &#2361;&#2376; &#2324;&#2352; &#2360;&#2350;&#2366;&#2344; &#2328;&#2344; &#2325;&#2366; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; Y sq. cm &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; X - Y = 392 &#2361;&#2376;, &#2340;&#2379; &#2328;&#2344; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">12 cm</span><span class=\"hqt\" style=\"display:none\">12 cm</span>",
      "<span class=\"eqt\">24 cm</span><span class=\"hqt\" style=\"display:none\">24 cm</span>",
      "<span class=\"eqt\">16 cm</span><span class=\"hqt\" style=\"display:none\">16 cm</span>",
      "<span class=\"eqt\">14 cm</span><span class=\"hqt\" style=\"display:none\">14 cm</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>X  -  Y = 392</p><p>6 * side<sup>2</sup>  -  4 * side<sup>2</sup> = 392</p><p>2 * side<sup>2</sup> = 392</p><p>Side = &radic;196</p><p>Side = 14 cm</p>",
    "question_index": 7
