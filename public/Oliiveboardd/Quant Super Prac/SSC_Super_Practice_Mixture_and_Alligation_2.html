<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The concentrations of three acids, A, B, and C are specified as 25%, 40%, and 75%, respectively. They are blended in a ratio of 4:5: a, yielding a solution with a concentration of 60%. What is the value of 'a'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2309;&#2350;&#2381;&#2354;&#2379;&#2306;, A, B, &#2324;&#2352; C &#2325;&#2368; &#2360;&#2366;&#2306;&#2342;&#2381;&#2352;&#2340;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 25%, 40%, &#2324;&#2352; 75% &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2342;&#2367;&#2359;&#2381;&#2335; &#2325;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; 4:5: a &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2350;&#2367;&#2358;&#2381;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; 60% &#2360;&#2366;&#2306;&#2342;&#2381;&#2352;&#2340;&#2366; &#2357;&#2366;&#2354;&#2366; &#2328;&#2379;&#2354; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; 'a' &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Concentration of solutions A, B, and C = (4 + 5 + a) * 60/100</p><p>4 * 25/100 + 5 * 40/100 + a * 75/100 = 5.4 + 0.45a</p><p>1 + 2 + 0.75a = 5.4 + 0.6a </p><p>0.15a = 2.4 </p><p>a = 16 </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>240 litres of a mixture of spirit and water in the ratio 7: 5 is present in a container A. 30 litres of the mixture is transferred to another container B. Then container A is filled with 30 litres of water. Then 144 litres of the mixture is again transferred to container B. The final ratio of spirit to water of the mixture in container B is equal to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; A &#2350;&#2375;&#2306; 7:5 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2360;&#2381;&#2346;&#2381;&#2352;&#2367;&#2335; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; 240 &#2354;&#2368;&#2335;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2376;&#2404; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2366; 30 &#2354;&#2368;&#2335;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; B &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2347;&#2367;&#2352; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; A &#2325;&#2379; 30 &#2354;&#2368;&#2335;&#2352; &#2346;&#2366;&#2344;&#2368; &#2360;&#2375; &#2349;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2347;&#2367;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2366; 144 &#2354;&#2368;&#2335;&#2352; &#2347;&#2367;&#2352; &#2360;&#2375; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; B &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; B &#2350;&#2375;&#2306; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2375; &#2360;&#2381;&#2346;&#2381;&#2352;&#2367;&#2335; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2306;&#2340;&#2367;&#2350; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">99: 87</span><span class=\"hqt\" style=\"display:none\">99: 87</span>",
      "<span class=\"eqt\">91: 87</span><span class=\"hqt\" style=\"display:none\">91: 87</span>",
      "<span class=\"eqt\">99: 83</span><span class=\"hqt\" style=\"display:none\">99: 83</span>",
      "<span class=\"eqt\">91: 83</span><span class=\"hqt\" style=\"display:none\">91: 83</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Final amount of spirit = 240 * 7/12 = 140 l</p><p>Final amount of water = 240  -  140 = 100 l </p><p>Spirit transfer = 30 * 7/12 = 17.5 l</p><p>Water transfer = 30  -  17.5 = 12.5 l</p><p>The ratio of spirit to water after mixing 30 l water = (140  -  17.5)/(100  -  12.5 + 30) </p><p>= 122.5/117.5</p><p>= 49/47</p><p>Spirit transfer 2nd time = 144 * 49/96 = 73.5 l</p><p>Water transfer 2nd time = 144  -  73.5 = 70.5 l</p><p>Hence, the required ratio = (17.5 + 73.5)/ (12.5 + 70.5) </p><p>= 91/83</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A 180 litres solution of acid and water contains 40% acid. How much water (in litres) must be added to get a solution to having 25% acid? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2350;&#2381;&#2354; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2375; 180 &#2354;&#2368;&#2335;&#2352; &#2328;&#2379;&#2354; &#2350;&#2375;&#2306; 40% &#2309;&#2350;&#2381;&#2354; &#2361;&#2376;&#2404; 25% &#2309;&#2350;&#2381;&#2354; &#2357;&#2366;&#2354;&#2366; &#2328;&#2379;&#2354; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2366;&#2344;&#2368; (&#2354;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2350;&#2367;&#2354;&#2366;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">108 l</span><span class=\"hqt\" style=\"display:none\">108 &#2354;&#2368;</span>",
      "<span class=\"eqt\">96 l</span><span class=\"hqt\" style=\"display:none\">96 &#2319;&#2354;</span>",
      "<span class=\"eqt\">112 l</span><span class=\"hqt\" style=\"display:none\">112 &#2319;&#2354;</span>",
      "<span class=\"eqt\">90 l</span><span class=\"hqt\" style=\"display:none\">90 &#2354;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Acid = 180 * 40/100 = 72 l </p><p>Water = 180  -  72 = 108 l</p><p>Let the quantity of water added be 'X' l</p><p>(180 + X) * 25/100 = 72 </p><p>180 + X = 288 </p><p>X = 108 l </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In alloys A and B, the ratio of lead to tin is 7: 4 and 4: 5, respectively. 220 kg of alloy A and 270 kg of alloy B are mixed to form a new alloy. What is the amount of tin (in kg) in the new alloy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2366;&#2340;&#2369; A &#2324;&#2352; B &#2350;&#2375;&#2306;, &#2360;&#2368;&#2360;&#2375; &#2324;&#2352; &#2335;&#2367;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 7:4 &#2324;&#2352; 4:5 &#2361;&#2376;&#2404; 220 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2366;&#2340;&#2369; A &#2324;&#2352; 270 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2366;&#2340;&#2369; B &#2325;&#2379; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352; &#2319;&#2325; &#2344;&#2351;&#2366; &#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2366;&#2340;&#2369; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2319; &#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2366;&#2340;&#2369; &#2350;&#2375;&#2306; &#2335;&#2367;&#2344; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; (&#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">210 kg</span><span class=\"hqt\" style=\"display:none\">210 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">270 kg</span><span class=\"hqt\" style=\"display:none\">270 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">230 kg</span><span class=\"hqt\" style=\"display:none\">230 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">250 kg</span><span class=\"hqt\" style=\"display:none\">250 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Tin in alloy A = 220 * 4/(7 + 4) = 80 kg</p><p>Tin in alloy B = 270 * 5/(4 + 5) = 150 kg</p><p>Hence, the required amount = 80 + 150 = 230 kg</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A vessel contains 108 litres mixture of milk and water in a ratio 5: 7. If 10 litres of milk is added to the vessel, then how much water (in litres) should be added to the vessel to have milk and water in the ratio 11: 16?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2352;&#2381;&#2340;&#2344; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; 108 &#2354;&#2368;&#2335;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; 5: 7 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2348;&#2352;&#2381;&#2340;&#2344; &#2350;&#2375;&#2306; 10 &#2354;&#2368;&#2335;&#2352; &#2342;&#2370;&#2343; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2352;&#2381;&#2340;&#2344; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2366;&#2344;&#2368; (&#2354;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 11: 16 &#2361;&#2379; &#2332;&#2366;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">17 l</span><span class=\"hqt\" style=\"display:none\">17 &#2319;&#2354;</span>",
      "<span class=\"eqt\">13 l</span><span class=\"hqt\" style=\"display:none\">13 &#2319;&#2354;</span>",
      "<span class=\"eqt\">23 l</span><span class=\"hqt\" style=\"display:none\">23 &#2319;&#2354;</span>",
      "<span class=\"eqt\">19 l</span><span class=\"hqt\" style=\"display:none\">19 &#2319;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Initial quantity of milk = 108 * 5/(5 + 7) = 45 l</p><p>Initial quantity of water = 108  -  45 = 63 l </p><p>Let the amount of water added be 'X' l</p><p>(45 + 10)/(63 + X) = 11/16 </p><p>55/(63 + X) = 11/16 </p><p>80 = 63 + X </p><p>X = 17 l</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>An alloy contains the metals gold, silver, and zinc in the ratio 9: 5: 7, and another contains the metals silver, zinc, and tin in the ratio 11: 18: 13. If equal weights of each alloys are mixed to form a third alloy, then how many parts of the metal zinc is in the new alloy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2350;&#2367;&#2358;&#2381;&#2352; &#2343;&#2366;&#2340;&#2369; &#2350;&#2375;&#2306; &#2360;&#2379;&#2344;&#2366;, &#2330;&#2366;&#2306;&#2342;&#2368; &#2324;&#2352; &#2332;&#2360;&#2381;&#2340;&#2366; &#2343;&#2366;&#2340;&#2369;&#2319;&#2306; 9: 5: 7 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;, &#2324;&#2352; &#2319;&#2325; &#2309;&#2344;&#2381;&#2351; &#2350;&#2375;&#2306; &#2330;&#2366;&#2306;&#2342;&#2368;, &#2332;&#2360;&#2381;&#2340;&#2366; &#2324;&#2352; &#2335;&#2367;&#2344; &#2343;&#2366;&#2340;&#2369;&#2319;&#2306; 11: 18: 13 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2350;&#2367;&#2358;&#2381;&#2352; &#2343;&#2366;&#2340;&#2369; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2357;&#2332;&#2344; &#2325;&#2379; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352; &#2319;&#2325; &#2340;&#2368;&#2360;&#2352;&#2366; &#2350;&#2367;&#2358;&#2381;&#2352; &#2343;&#2366;&#2340;&#2369; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2319; &#2350;&#2367;&#2358;&#2381;&#2352; &#2343;&#2366;&#2340;&#2369; &#2350;&#2375;&#2306; &#2332;&#2360;&#2381;&#2340;&#2366; &#2343;&#2366;&#2340;&#2369; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2366;&#2327; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">13/84 kg</span><span class=\"hqt\" style=\"display:none\">13/84 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">9/84 kg</span><span class=\"hqt\" style=\"display:none\">9/84 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">8/21 kg</span><span class=\"hqt\" style=\"display:none\">8/21 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">9/42 kg</span><span class=\"hqt\" style=\"display:none\">9/42 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Gold: Silver: Zinc = 9: 7: 5</p><p>Silver: Zinc: tin = 11: 18: 13</p><p>Let the quantity mixed from both alloys be '42' kg</p><p>Zinc in alloy 1<sup>st</sup> = 42 * 7/(9 + 7 + 5) = 14 kg</p><p>Zinc in alloy 2<sup>nd</sup> = 42 * 18/(11 + 18 + 13) = 18 kg</p><p>Hence, zinc in 3<sup>rd</sup> alloy = (14 + 18)/(42 + 42) = 8/21 kg</p>",
    "question_index": 5
  },
  {

    "question": "<span class=\"eqt\"><p>There are 280 litres of pure milk in a container. One-fifth of the milk is replaced by water in the container. Again one-fifth of the mixture is extracted and an equal amount of water is added. What is the ratio of milk to water in the new mixture?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2350;&#2375;&#2306; 280 &#2354;&#2368;&#2335;&#2352; &#2358;&#2369;&#2342;&#2381;&#2343; &#2342;&#2370;&#2343; &#2361;&#2376;&#2404; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2325;&#2366; &#2346;&#2366;&#2306;&#2330;&#2357;&#2366;&#2306; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2346;&#2366;&#2344;&#2368; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2347;&#2367;&#2352; &#2360;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2366; &#2346;&#2366;&#2306;&#2330;&#2357;&#2366;&#2306; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2344;&#2367;&#2325;&#2366;&#2354; &#2354;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2348;&#2352;&#2366;&#2348;&#2352; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2319; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>The ratio of spirit and water in two mixtures of 120 litres and 75 litres is 13:7 and 7:8 respectively. Both the mixtures are mixed. Now the ratio of the spirit and water in the new mixture is:</p></span><span class=\"hqt\" style=\"display:none\"><p>120 &#2354;&#2368;&#2335;&#2352; &#2324;&#2352; 75 &#2354;&#2368;&#2335;&#2352; &#2325;&#2375; &#2342;&#2379; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2381;&#2346;&#2381;&#2352;&#2367;&#2335; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 13:7 &#2324;&#2352; 7:8 &#2361;&#2376;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339;&#2379;&#2306; &#2325;&#2379; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2309;&#2348; &#2344;&#2319; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2360;&#2381;&#2346;&#2381;&#2352;&#2367;&#2335; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2361;&#2376;:</p></span>",

    "solution": "<p>Let the quantity of mixture in three vessels be 6x, 5x, and 8x </p><p>Vessel 1:</p><p>Mixture taken out = 6x * 1/3 = 2x </p><p>Water removed = 2x * 1/2 = x</p><p>Vessel 2: </p><p>Mixture taken out = 5x * 1/2 = 5x/2 </p><p>Water removed = 5x/2 * 3/5 = 3x/2 </p><p>Vessel 3: </p><p>Mixture taken out = 8x * 1/2 = 4x </p><p>Water removed = 4x * 3/8 = 3x/2 </p><p>Total mixture = 2x + 5x/2 + 4x = 17x/2</p><p>Total Water = x + 3x/2 + 3x/2 = 4x </p><p>Hence, the required percentage = (4x * 100)/(17x/2)</p><p>= 800/17% </p>",

    "question": "<span class=\"eqt\"><p>Two vessels contain a mixture of petrol and kerosene in the ratio of 17:13 and 21:23 respectively. The ratio of the volumes of the quantities from the two vessels to be mixed so that the new mixture may contain the same volume of petrol and kerosene is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2348;&#2352;&#2381;&#2340;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2375;&#2335;&#2381;&#2352;&#2379;&#2354; &#2324;&#2352; &#2325;&#2375;&#2352;&#2379;&#2360;&#2367;&#2344; &#2325;&#2366; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 17:13 &#2324;&#2352; 21:23 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2348;&#2352;&#2381;&#2340;&#2344;&#2379;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366;&#2323;&#2306; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376; &#2325;&#2367; &#2344;&#2319; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2346;&#2375;&#2335;&#2381;&#2352;&#2379;&#2354; &#2324;&#2352; &#2325;&#2375;&#2352;&#2379;&#2360;&#2367;&#2344; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;:</p></span>",

    "question": "<span class=\"eqt\"><p>A vessel contains 1600 litres of milk. 320 litres of milk was taken out from it and replaced with water. Then again from the mixture, 320 litres is taken out and replaced with water. The ratio of milk and water in the resultant mixture is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2352;&#2381;&#2340;&#2344; &#2350;&#2375;&#2306; 1600 &#2354;&#2368;&#2335;&#2352; &#2342;&#2370;&#2343; &#2361;&#2376;&#2404; &#2311;&#2360;&#2350;&#2375;&#2306; &#2360;&#2375; 320 &#2354;&#2368;&#2335;&#2352; &#2342;&#2370;&#2343; &#2344;&#2367;&#2325;&#2366;&#2354;&#2325;&#2352; &#2313;&#2360;&#2325;&#2368; &#2332;&#2327;&#2361; &#2346;&#2366;&#2344;&#2368; &#2337;&#2366;&#2354; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; &#2347;&#2367;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2360;&#2375; 320 &#2354;&#2368;&#2335;&#2352; &#2342;&#2370;&#2343; &#2344;&#2367;&#2325;&#2366;&#2354;&#2325;&#2352; &#2313;&#2360;&#2325;&#2368; &#2332;&#2327;&#2361; &#2346;&#2366;&#2344;&#2368; &#2337;&#2366;&#2354; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2368; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2361;&#2376;:</p></span>",

      "<span class=\"eqt\">12: 11</span><span class=\"hqt\" style=\"display:none\">12: 11</span>",
      "<span class=\"eqt\">15: 13</span><span class=\"hqt\" style=\"display:none\">15: 13</span>"

    "correct_option_id": 0,
    "solution": "<p>a = Initial quantity </p><p>b = amount removed and replaced </p><p>n = number of times </p><p>Final Quantity = a * (1  -  b/a)<sup>n</sup></p><p>= 1600 * (1  -  320/1600)<sup>2</sup></p><p>= 1600 * 4/5 * 4/5</p><p>= 1024 l</p><p>Water = 1600  -  1024 = 576 l</p><p>Hence, the required ratio = 1024/576 = 16:9</p>",

    "question": "<span class=\"eqt\"><p>An alloy is made by mixing metal A costing Rs 800/kg and metal B costing Rs 650/kg in the ratio A: B = 9: 13. What is the cost (in Rs) of 44 kilograms of this alloy?</p></span><span class=\"hqt\" style=\"display:none\"><p>800 &#2352;&#2369;&#2346;&#2351;&#2375;/&#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2357;&#2366;&#2354;&#2368; &#2343;&#2366;&#2340;&#2369; A &#2324;&#2352; 650 &#2352;&#2369;&#2346;&#2351;&#2375;/&#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2357;&#2366;&#2354;&#2368; &#2343;&#2366;&#2340;&#2369; B &#2325;&#2379; A: B = 9: 13 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352; &#2319;&#2325; &#2350;&#2367;&#2358;&#2381;&#2352; &#2343;&#2366;&#2340;&#2369; &#2348;&#2344;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360; &#2350;&#2367;&#2358;&#2381;&#2352; &#2343;&#2366;&#2340;&#2369; &#2325;&#2375; 44 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; (&#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
