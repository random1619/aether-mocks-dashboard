    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A shopkeeper sold a table and chair together at the price of Rs.5225. If percentage profit on table is 25 and percentage profit on chair is 40, then what is the actual profit of shopkeeper on chair if percentage profit on table and chair together 30.625?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2344;&#2375; &#2319;&#2325; &#2350;&#2375;&#2332; &#2324;&#2352; &#2325;&#2369;&#2352;&#2381;&#2360;&#2368; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; 5225 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2346;&#2352; &#2348;&#2375;&#2330;&#2366;&#2404; &#2351;&#2342;&#2367; &#2350;&#2375;&#2332; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2354;&#2366;&#2349; 25 &#2361;&#2376; &#2324;&#2352; &#2325;&#2369;&#2352;&#2381;&#2360;&#2368; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2354;&#2366;&#2349; 40 &#2361;&#2376;, &#2340;&#2379; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2325;&#2366; &#2325;&#2369;&#2352;&#2381;&#2360;&#2368; &#2346;&#2352; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2354;&#2366;&#2349; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;, &#2351;&#2342;&#2367; &#2350;&#2375;&#2332; &#2324;&#2352; &#2325;&#2369;&#2352;&#2381;&#2360;&#2368; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2354;&#2366;&#2349; 30.625 &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.800</span><span class=\"hqt\" style=\"display:none\">800</span>",
      "<span class=\"eqt\">Rs.1200</span><span class=\"hqt\" style=\"display:none\">1200</span>",
      "<span class=\"eqt\">Rs.600</span><span class=\"hqt\" style=\"display:none\">600</span>",
      "<span class=\"eqt\">Rs.540</span><span class=\"hqt\" style=\"display:none\">540</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Percentage profit on table and chair together = 30.625 and selling price of table and chair together is Rs.5225</p><p>Cost price of table and chair together = (100/130.625) x 5225</p><p>= Rs.4000</p><p>According to Alligation rule ratio of cost prices of table and chair</p><p><img width=274 height=205 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p4682/image004.jpg\"></p><p>= (9.375)/(5.625)</p><p>= 5:3</p><p>Cost price of chair= (3/8) x 4000 =Rs.1500</p><p>Profit on chair = 0.4 x 1500 = Rs.600.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Sample A contains two types of sugars costing Rs.50 per kg and Rs.40 per kg in the ratio 3:7 respectively and sample B contains two types of sugars costing Rs.50 per kg and Rs.40 per kg in the ratio 2:3 respectively. In what ratio these two samples should be mixed, so that final mixture contains sugars costing Rs.50 per kg and Rs.40 per kg in the ratio 9:16 respectively?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2350;&#2370;&#2344;&#2366; A &#2350;&#2375;&#2306; &#2342;&#2379; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2330;&#2368;&#2344;&#2368; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2325;&#2368; &#2325;&#2368;&#2350;&#2340; 50 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2324;&#2352; 40 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2361;&#2376; &#2324;&#2352; &#2311;&#2344;&#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3:7 &#2361;&#2376; &#2324;&#2352; &#2344;&#2350;&#2370;&#2344;&#2366; B &#2350;&#2375;&#2306; &#2342;&#2379; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2330;&#2368;&#2344;&#2368; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2325;&#2368; &#2325;&#2368;&#2350;&#2340; 50 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2324;&#2352; 40 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2361;&#2376; &#2324;&#2352; &#2311;&#2344;&#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 2:3 &#2361;&#2376;&#2404; &#2311;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2350;&#2370;&#2344;&#2379;&#2306; &#2325;&#2379; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;, &#2340;&#2366;&#2325;&#2367; &#2309;&#2306;&#2340;&#2367;&#2350; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; 50 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2324;&#2352; 40 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2368; &#2330;&#2368;&#2344;&#2368; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 9:16 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2379;?</p></span>",
    "options": [
      "<span class=\"eqt\">1:3</span><span class=\"hqt\" style=\"display:none\">1:3</span>",
      "<span class=\"eqt\">2:3</span><span class=\"hqt\" style=\"display:none\">2:3</span>",
      "<span class=\"eqt\">4:5</span><span class=\"hqt\" style=\"display:none\">4:5</span>",
      "<span class=\"eqt\">3:7</span><span class=\"hqt\" style=\"display:none\">3:7</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Percentage of sugar costing Rs.50 per kg in sample A</p><p>= (3/10) x 100% = 30%</p><p>Percentage of sugar costing Rs.50 per kg in sample B</p><p>= (2/5) x 100% = 40%</p><p>Percentage of sugar costing Rs.50 per kg in final mixture</p><p>= (9/25) x 100% = 36%</p><p>According to Alligation rule,</p><p><img width=178 height=140 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p5093/image005.jpg\"></p><p>Ratio = 4/6 = 2:3</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>From a container containing milk and water solution, a boy took out 20 litres of solution and poured the equal quantity of water, then the ratio of milk to water became 12: 13. If he again takes out 12.5 litres of solution and mixes the equal quantity of water, the ratio of milk to water would become 21: 29. What was the quantity of solution contained in the container?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2375; &#2328;&#2379;&#2354; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2360;&#2375;, &#2319;&#2325; &#2354;&#2337;&#2364;&#2325;&#2375; &#2344;&#2375; 20 &#2354;&#2368;&#2335;&#2352; &#2328;&#2379;&#2354; &#2344;&#2367;&#2325;&#2366;&#2354;&#2366; &#2324;&#2352; &#2313;&#2360;&#2350;&#2375;&#2306; &#2348;&#2352;&#2366;&#2348;&#2352; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2337;&#2366;&#2354;&#2366;, &#2340;&#2379; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 12:13 &#2361;&#2379; &#2327;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; &#2347;&#2367;&#2352; &#2360;&#2375; 12.5 &#2354;&#2368;&#2335;&#2352; &#2328;&#2379;&#2354; &#2344;&#2367;&#2325;&#2366;&#2354;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2350;&#2375;&#2306; &#2348;&#2352;&#2366;&#2348;&#2352; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2350;&#2367;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 21:29 &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2366;&#2404; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2328;&#2379;&#2354; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2381;&#2351;&#2366; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">120 litres</span><span class=\"hqt\" style=\"display:none\">120 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">100 litres</span><span class=\"hqt\" style=\"display:none\">100 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">125 litres</span><span class=\"hqt\" style=\"display:none\">125 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">150 litres</span><span class=\"hqt\" style=\"display:none\">150 &#2354;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In this question, we will go from the last information</p><p>In a solution, the ratio of milk to water = 12: 13</p><p>Let the quantity of milk be 12a litres and the quantity of water be 13a litres</p><p>In 12.5 litres solution,</p><p>The quantity of milk = 12*12.5/25 = 6 litres</p><p>Quantity of water = 12.5  -  6 = 6.5 litres</p><p>Thus, (12a  -  6)/(13a  -  6.5 + 12.5) = 21/29</p><p>(12a  -  6)/(13a + 6) = 21/29</p><p>By solving, a = 4 litres</p><p>It means, total quantity of solution = 12a + 13a = 25a = 100 litres</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A vessel initially contains milk and water in the ratio 4: 1 and 40 litres of the total mixture are taken out and replaced with same amount of water. This process is repeated one more time and now amount of pure milk is decreases by 57.6 litres, then what is the initial amount of mixture in the vessel?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2352;&#2381;&#2340;&#2344; &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2370; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4:1 &#2361;&#2376; &#2324;&#2352; &#2325;&#2369;&#2354; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2366; 40 &#2354;&#2368;&#2335;&#2352; &#2344;&#2367;&#2325;&#2366;&#2354; &#2325;&#2352; &#2313;&#2360;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2319;&#2325; &#2348;&#2366;&#2352; &#2324;&#2352; &#2342;&#2379;&#2361;&#2352;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2348; &#2358;&#2369;&#2342;&#2381;&#2343; &#2342;&#2370;&#2343; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; 57.6 &#2354;&#2368;&#2335;&#2352; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2352;&#2381;&#2340;&#2344; &#2350;&#2375;&#2306; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">200 litres</span><span class=\"hqt\" style=\"display:none\">200 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">250 litres</span><span class=\"hqt\" style=\"display:none\">250 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">150 litres</span><span class=\"hqt\" style=\"display:none\">150 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">100 litres</span><span class=\"hqt\" style=\"display:none\">100 &#2354;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let initial amount of milk and water in the vessel is '4x' and 'x' litres respectively.</p><p>Amount of pure milk in the vessel after 2 such operations when 40 litres of the mixture is replaced with same amount of water = 4x[1  -  (40/5x)]<sup>2</sup></p><p>According to the question:</p><p>4x  -  {4x[1  -  (40/5x)]<sup>2</sup>} = 57.6</p><p>4x  -  {4x[1  -  (8/x)]<sup>2</sup>} = 57.6</p><p>4x  -  4x[1 + (64/x)<sup>2</sup>  -  (16/x)] = 57.6</p><p>4x  -  4x  -  (256/x) + 64 = 57.6</p><p>256/x = 6.4</p><p>x = 40</p><p>Initial amount of mixture in the vessel = 5x = 200 litres</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Two shopkeepers A and B have mixtures of rice and impurity, mixture with A and B has rice and impurity in the ratio 3: 2 and 10: 1 respectively. Both shopkeepers mix their mixture in the ratio 10: 11 and final mixture contains 55 kg more rice than impurity, then what is the total quantity of rice in final mixture?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352;&#2379;&#2306; A &#2324;&#2352; B &#2325;&#2375; &#2346;&#2366;&#2360; &#2330;&#2366;&#2357;&#2354; &#2324;&#2352; &#2309;&#2358;&#2369;&#2342;&#2381;&#2343;&#2340;&#2366; &#2325;&#2366; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2361;&#2376;, A &#2324;&#2352; B &#2325;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2330;&#2366;&#2357;&#2354; &#2324;&#2352; &#2309;&#2358;&#2369;&#2342;&#2381;&#2343;&#2340;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3: 2 &#2324;&#2352; 10: 1 &#2361;&#2376;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2309;&#2346;&#2344;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2379; 10: 11 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2309;&#2306;&#2340;&#2367;&#2350; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2309;&#2358;&#2369;&#2342;&#2381;&#2343;&#2340;&#2366; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 55 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2309;&#2343;&#2367;&#2325; &#2330;&#2366;&#2357;&#2354; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2309;&#2306;&#2340;&#2367;&#2350; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2330;&#2366;&#2357;&#2354; &#2325;&#2368; &#2325;&#2369;&#2354; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">105 kg</span><span class=\"hqt\" style=\"display:none\">105 &#2325;&#2367;&#2354;&#2379;</span>",
      "<span class=\"eqt\">90 kg</span><span class=\"hqt\" style=\"display:none\">90 &#2325;&#2367;&#2354;&#2379;</span>",
      "<span class=\"eqt\">75 kg</span><span class=\"hqt\" style=\"display:none\">75 &#2325;&#2367;&#2354;&#2379;</span>",
      "<span class=\"eqt\">80 kg</span><span class=\"hqt\" style=\"display:none\">80 &#2325;&#2367;&#2354;&#2379;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Part of rice in mixture with shopkeeper A = 3/5</p><p>Part of rice in mixture with shopkeeper B = 10/11</p><p>Let part of rice in mixture with shopkeeper in final mixture = X</p><p>By the rule of alligation:</p><p><img width=140 height=79 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p9279/image004.jpg\"></p><p>[(10/11)  -  X]: [X  -  (3/5)] = 10: 11</p><p>10  -  11X = 10X  -  6</p><p>16 = 21X</p><p>X = 16/21</p><p>Ratio of rice to impurity in final mixture = 16: (21  -  16) = 16: 5</p><p>Total quantity of rice in final mixture = 16/11 * 55 = 80 kg</p>",
    "question_index": 4
  },

    "question": "<span class=\"eqt\"><p>Three glasses with similar volume are full of mixture of water and milk. In the first glass, the ratio of water and milk is 7 : 9, in second glass is 3 : 13 and in third glass is 5 : 11. If from first glass 1/4<sup>th</sup> of the mixture, from 2<sup>nd</sup> glass half of the mixture and from 3<sup>rd</sup> glass 3/4<sup>th</sup> of the mixture are poured in another container, what would be the resultant ratio of water and milk?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2310;&#2351;&#2340;&#2344; &#2357;&#2366;&#2354;&#2375; &#2340;&#2368;&#2344; &#2327;&#2367;&#2354;&#2366;&#2360; &#2346;&#2366;&#2344;&#2368; &#2324;&#2352; &#2342;&#2370;&#2343; &#2325;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2360;&#2375; &#2349;&#2352;&#2375; &#2361;&#2369;&#2319; &#2361;&#2376;&#2306;&#2404; &#2346;&#2361;&#2354;&#2375; &#2327;&#2367;&#2354;&#2366;&#2360; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2324;&#2352; &#2342;&#2370;&#2343; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 7 : 9 &#2361;&#2376;, &#2342;&#2370;&#2360;&#2352;&#2375; &#2327;&#2367;&#2354;&#2366;&#2360; &#2350;&#2375;&#2306; 3 : 13 &#2361;&#2376; &#2324;&#2352; &#2340;&#2368;&#2360;&#2352;&#2375; &#2327;&#2367;&#2354;&#2366;&#2360; &#2350;&#2375;&#2306; 5 : 11 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2361;&#2354;&#2375; &#2327;&#2367;&#2354;&#2366;&#2360; &#2360;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2366; 1/4 &#2349;&#2366;&#2327;, &#2342;&#2370;&#2360;&#2352;&#2375; &#2327;&#2367;&#2354;&#2366;&#2360; &#2360;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2366; &#2310;&#2343;&#2366; &#2349;&#2366;&#2327; &#2324;&#2352; &#2340;&#2368;&#2360;&#2352;&#2375; &#2327;&#2367;&#2354;&#2366;&#2360; &#2360;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2366; 3/4 &#2349;&#2366;&#2327; &#2325;&#2367;&#2360;&#2368; &#2342;&#2370;&#2360;&#2352;&#2375;     "question": "<span class=\"eqt\"><p>A shopkeeper has a certain quantity of wheat. He sold 40 kg of total wheat at 33(1/3) % profit and the rest at 20% profit. If the shopkeeper gained 28(8/9) % profit on the whole, then find the total quantity of wheat?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2325;&#2375; &#2346;&#2366;&#2360; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2327;&#2375;&#2361;&#2370;&#2305; &#2361;&#2376;&#2404; &#2313;&#2360;&#2344;&#2375; &#2325;&#2369;&#2354; 40 &#2325;&#2367;&#2354;&#2379; &#2327;&#2375;&#2361;&#2370;&#2305; 33(1/3)% &#2354;&#2366;&#2349; &#2346;&#2352; &#2324;&#2352; &#2358;&#2375;&#2359; 20% &#2354;&#2366;&#2349; &#2346;&#2352; &#2348;&#2375;&#2330;&#2366;&#2404; &#2351;&#2342;&#2367; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2325;&#2379; &#2325;&#2369;&#2354; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352; 28(8/9)% &#2354;&#2366;&#2349; &#2361;&#2369;&#2310;, &#2340;&#2379; &#2327;&#2375;&#2361;&#2370;&#2305; &#2325;&#2368; &#2325;&#2369;&#2354; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">80 kg</span><span class=\"hqt\" style=\"display:none\">80 &#2325;&#2367;&#2354;&#2379;</span>",
      "<span class=\"eqt\">60 kg</span><span class=\"hqt\" style=\"display:none\">60 &#2325;&#2367;&#2354;&#2379;</span>",
      "<span class=\"eqt\">90 kg</span><span class=\"hqt\" style=\"display:none\">90 &#2325;&#2367;&#2354;&#2379;</span>",

    "correct_option_id": 1,
    "solution": "<p>By the rule of alligation:</p><p><img width=259 height=61 id=\"Picture 24\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p9671/image003.png\"></p><p>Ratio = 2: 1</p><p>Given,</p><p>The quantity of wheat, which is sold at 33(1/3) % = 40 kg</p><p>So, the quantity of wheat, which is sold at 20% profit = 40 * &frac12; = 20 kg</p><p>So, the total quantity of wheat = 40 + 20 = 60 kg</p>",

    "question": "<span class=\"eqt\"><p>A vessel is filled with milk and water of 5 litres and 8 litres respectively. Find the quantity of mixture to be drawn off and filled with milk to make the mixture containing milk and water in the ratio of 2 : 1.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2352;&#2381;&#2340;&#2344; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 5 &#2354;&#2368;&#2335;&#2352; &#2324;&#2352; 8 &#2354;&#2368;&#2335;&#2352; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2349;&#2352;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;&#2404; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2360;&#2375; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2 : 1 &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2360;&#2375; &#2344;&#2367;&#2325;&#2366;&#2354;&#2375; &#2327;&#2319; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2313;&#2360;&#2375; &#2342;&#2370;&#2343; &#2360;&#2375; &#2349;&#2352;&#2367;&#2319;&#2404;</p></span>",

    "correct_option_id": 1,
    "solution": "<p>Let x litres of mixture is taken off</p><p>Quantity of milk and water is 5 litres and 8 litres respectively</p><p>Quantity of milk and water after replacement,</p><p>Milk = (5  -  5x/13 + x), water = (8  -  8x/13)</p><p>According to question,</p><p>(5  -  5x/13 + x) : (8  -  8x/13) = 2 : 1</p><p>(65  -  5x + 13x)/13 : (104  -  8x)/13 = 2 : 1</p><p>(65 + 8x)/(104  -  8x) = 2/1</p><p>x = 143/24 = 5.95 litres</p>",

    "question": "<span class=\"eqt\"><p>6 liters of mixture is taken out and replaced with water from a container containing 30 liters of pure syrup. This process was repeated further two times. How much syrup is now left in the container?</p></span><span class=\"hqt\" style=\"display:none\"><p>30 &#2354;&#2368;&#2335;&#2352; &#2358;&#2369;&#2342;&#2381;&#2343; &#2360;&#2367;&#2352;&#2346; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2360;&#2375; 6 &#2354;&#2368;&#2335;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2344;&#2367;&#2325;&#2366;&#2354;&#2325;&#2352; &#2313;&#2360;&#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2337;&#2366;&#2354;&#2366; &#2327;&#2351;&#2366;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2342;&#2379; &#2348;&#2366;&#2352; &#2324;&#2352; &#2342;&#2379;&#2361;&#2352;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; &#2309;&#2348; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2367;&#2352;&#2346; &#2348;&#2330;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>Suppose a container contains A unit of pure liquid and B unit of liquid and taken out and filled with other liquid after n operations quantity of pure liquid in the final mixture </p><p>= A(1  -  B/A)<sup>n</sup></p><p>By using above formula,</p><p>Quantity of syrup in the final mixture = 30(1  -  6/30)<sup>3</sup></p><p>= 30 (1  -  1/5)<sup>3</sup></p><p>= 30 * 4/5 * 4/5 * 4/5 = 15.36 litres</p>",

    "question": "<span class=\"eqt\"><p>In an exam, 1 mark is given for each correct answer and one mark is deducted for each wrong answer. If a girl answers all 50 questions and gets 26 marks, then find the number of questions answered correctly. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; 1 &#2309;&#2306;&#2325; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2327;&#2354;&#2340; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2309;&#2306;&#2325; &#2325;&#2366;&#2335;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2354;&#2337;&#2364;&#2325;&#2368; &#2360;&#2349;&#2368; 50 &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; 26 &#2309;&#2306;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>T<b>he ratio of milk to water in a 280 liters mixture is 4 </b><b>&#42237;</b><b> 3. How much water (in liters) should be added so that the respective ratio of milk and water becomes 32 </b><b>&#42237;</b><b> 39?</b></p></span><span class=\"hqt\" style=\"display:none\"><p>280 &#2354;&#2368;&#2335;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4 &#2361;&#2376;&#42237; 3. &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2366;&#2344;&#2368; (&#2354;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 32&#42237; 39 &#2361;&#2379; &#2332;&#2366;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">80 liters</span><span class=\"hqt\" style=\"display:none\">80 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">63 liters</span><span class=\"hqt\" style=\"display:none\">63 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">70 liters</span><span class=\"hqt\" style=\"display:none\">70 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">75 liters</span><span class=\"hqt\" style=\"display:none\">75 &#2354;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Total mixture = 280 liters</p><p>Milk = (280 * 4)/(4 + 3) = 160 liters</p><p>Water = 280  -  160 = 120 liters</p><p>Let water added = x liters</p><p>160/(120 + x) = 32/39</p><p>120 + x = 195</p><p>x = 75 liters</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>Two vessels contain a mixture of liquid A and liquid B. In the first vessel, the ratio of liquids A to B is 3: 2; in the second, the ratio is 3: 1. A 24-liter cask is filled from these vessels to contain a mixture of liquids A and B in 2: 1. Find the amount taken from the first vessel.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2348;&#2352;&#2381;&#2340;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2381;&#2352;&#2357; A &#2324;&#2352; &#2342;&#2381;&#2352;&#2357; B &#2325;&#2366; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2361;&#2376;&#2404; &#2346;&#2361;&#2354;&#2375; &#2348;&#2352;&#2381;&#2340;&#2344; &#2350;&#2375;&#2306; &#2342;&#2381;&#2352;&#2357; A &#2360;&#2375; B &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3:2 &#2361;&#2376;; &#2342;&#2370;&#2360;&#2352;&#2375; &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3:1 &#2361;&#2376;&#2404; &#2311;&#2344; &#2348;&#2352;&#2381;&#2340;&#2344;&#2379;&#2306; &#2360;&#2375; 24 &#2354;&#2368;&#2335;&#2352; &#2325;&#2366; &#2319;&#2325; &#2346;&#2368;&#2346;&#2366; &#2349;&#2352;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2342;&#2381;&#2352;&#2357; A &#2324;&#2352; B &#2325;&#2366; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; 2:1 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2361;&#2354;&#2375; &#2348;&#2352;&#2381;&#2340;&#2344; &#2360;&#2375; &#2354;&#2368; &#2327;&#2312; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">20/3 L</span><span class=\"hqt\" style=\"display:none\">20/3 L</span>",

    "correct_option_id": 3,
    "solution": "<p>Using Alligation method,</p><p>Ratio of mixing = [(3/4) - (2/3)]/[(2/3) - (3/5)]</p><p>= (1/12)/(1/15)</p><p>= 5/4</p><p>Amount taken from the first vessel = 24 x 5/9 = 40/3 L</p>",

    "question": "<span class=\"eqt\"><p>A can of mixed fruit juice contains 25ml apple juice and 75ml pineapple juice. If 'a' ml apple juice and 12 ml pineapple juice is added to the mixture the ratio becomes 1:3. Find the value of 'a'.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2367;&#2358;&#2381;&#2352;&#2367;&#2340; &#2347;&#2354;&#2379;&#2306; &#2325;&#2375; &#2352;&#2360; &#2325;&#2375; &#2319;&#2325; &#2337;&#2367;&#2348;&#2381;&#2348;&#2375; &#2350;&#2375;&#2306; 25 ml &#2360;&#2375;&#2348; &#2325;&#2366; &#2352;&#2360; &#2324;&#2352; 75 ml &#2309;&#2344;&#2366;&#2344;&#2366;&#2360; &#2325;&#2366; &#2352;&#2360; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; 'a' ml &#2360;&#2375;&#2348; &#2325;&#2366; &#2352;&#2360; &#2324;&#2352; 12 ml &#2309;&#2344;&#2366;&#2344;&#2366;&#2360; &#2325;&#2366; &#2352;&#2360; &#2350;&#2367;&#2354;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 1:3 &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; 'a' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>There are two mixtures of wine and water, A and B. Mixtures A and B contains respectively 40% and 20% wine. If 'x' L of mixture A is mixed with 50 L of mixture B and ratio of wine to water in new mixture is 1: 2, then find the value of 'x'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2352;&#2366;&#2348; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2375; &#2342;&#2379; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; A &#2324;&#2352; B &#2361;&#2376;&#2306;&#2404; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; A &#2324;&#2352; B &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 40% &#2324;&#2352; 20% &#2358;&#2352;&#2366;&#2348; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; A &#2325;&#2366; 'x' &#2354;&#2368;&#2335;&#2352;, &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; B &#2325;&#2375; 50 &#2354;&#2368;&#2335;&#2352; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2344;&#2319; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2358;&#2352;&#2366;&#2348; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 1: 2 &#2361;&#2376;, &#2340;&#2379; 'x' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",

    "question": "<span class=\"eqt\"><p>A vessel is filled with liquid, 12 parts of which are water and 13 parts are syrup. How much of the mixture must be drawn off and replaced with water so that the mixture may be half water and half syrup?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2352;&#2381;&#2340;&#2344; &#2340;&#2352;&#2354; &#2360;&#2375; &#2349;&#2352;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2366; 12 &#2349;&#2366;&#2327; &#2346;&#2366;&#2344;&#2368; &#2361;&#2376; &#2324;&#2352; 13 &#2349;&#2366;&#2327; &#2360;&#2367;&#2352;&#2346; &#2361;&#2376;&#2404; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2366;&#2327; &#2344;&#2367;&#2325;&#2366;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2310;&#2343;&#2366; &#2346;&#2366;&#2344;&#2368; &#2324;&#2352; &#2310;&#2343;&#2366; &#2360;&#2367;&#2352;&#2346; &#2361;&#2379;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p>Let the vessel contains 25 litres of liquid.</p><p>Let x litres of the liquid be replaced with water.</p><p>Quantity of water in new mixture = [12  -  (12x/25) + x] litres</p><p>Quantity of syrup in new mixture = [13  -  13x/25] litres</p><p>[12  -  (12x/25) + x] = [13  -  13x/25]</p><p>300  -  12x + 25x = 325  -  13x</p><p>26x = 25</p><p>x = 25/26</p><p>So, part of mixture replaced = (25/26) / 25 = 1/26</p>",
