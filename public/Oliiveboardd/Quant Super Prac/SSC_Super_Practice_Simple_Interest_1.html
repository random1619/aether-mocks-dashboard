</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A sum of money at simple rate of interest amounts to Rs. 689 in 3 years and Rs. 901 in 7 years. Find the principal amount.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; 689 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; 7 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; 901 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2350;&#2370;&#2354;&#2343;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 640</span><span class=\"hqt\" style=\"display:none\">640 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 600</span><span class=\"hqt\" style=\"display:none\">600 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 550</span><span class=\"hqt\" style=\"display:none\">550 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 530</span><span class=\"hqt\" style=\"display:none\">530 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Interest obtained in 4 years = 901  -  689 = Rs. 212</p><p>Interest obtained in 3 years = 212/4 * 3 = Rs. 159</p><p>Principal amount = 689  -  159 = Rs. 530</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The difference in simple interest on a certain sum at 12% per annum for 8 years and 15% per annum for 5 years is Rs 2100 then what is the sum?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 12% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; 8 &#2357;&#2352;&#2381;&#2359; &#2340;&#2341;&#2366; 15% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; 5 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 2100 &#2352;&#2370;&#2346;&#2319; &#2361;&#2379;, &#2340;&#2379; &#2357;&#2361; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376; ?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs 12000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369; 12000</span>",
      "<span class=\"eqt\">Rs 18000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369; 18000</span>",
      "<span class=\"eqt\">Rs 10000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369; 10000</span>",
      "<span class=\"eqt\">Rs 15000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369; 15000</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the required sum = Rs P</p><p>According to the question; (P  X 12  X 8)/100-(P  X 15  X 5)/100=2100</p><p>=&gt; (96P-75P)/100=2100</p><p>=&gt; 21P/100=2100</p><p>=&gt; P=(2100  X 100)/21</p><p>=&gt; P = Rs 10000</p><p><b><u> </u></b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A sum of money doubles itself in 4 years at simple interest. In how much time will it become 7 times at the same rate of interest?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; 4 &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2344; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2325;&#2367;&#2340;&#2344;&#2368; &#2360;&#2350;&#2351;&#2366;&#2357;&#2343;&#2367; &#2350;&#2375;&#2306; &#2351;&#2361; 7 &#2327;&#2369;&#2344;&#2368; &#2361;&#2379; &#2332;&#2366;&#2351;&#2375;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">25 years</span><span class=\"hqt\" style=\"display:none\">25 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">23 years</span><span class=\"hqt\" style=\"display:none\">23 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">24 years</span><span class=\"hqt\" style=\"display:none\">24 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">21 years</span><span class=\"hqt\" style=\"display:none\">21 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let sum = P and rate of interest = R%</p><p>According to the question:</p><p>(P * R * 4)/100 = 2P  -  P</p><p>R = 25%</p><p>Now,</p><p>(P * 25 * t)/100 = 7P  -  P</p><p>t = 24 years</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A and B invested a total of Rs. 18000 at 15% and 12% simple rate of interest respectively for 3 years and they both get Rs. 7560 as interest amount. Find the amount invested by A.</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2344;&#2375; 3 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 15% &#2324;&#2352; 12% &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; &#2325;&#2369;&#2354; 18000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2313;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2379; &#2348;&#2381;&#2351;&#2366;&#2332; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; 7560 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2367;&#2354;&#2375;&#2404; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 18000</span><span class=\"hqt\" style=\"display:none\">18000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 16000</span><span class=\"hqt\" style=\"display:none\">16000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 14000</span><span class=\"hqt\" style=\"display:none\">14000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 12000</span><span class=\"hqt\" style=\"display:none\">12000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the amount invested by A = Rs. x</p><p>Then amount invested by B = 18000  -  x</p><p>According to question,</p><p>(x * 15 * 3)/100 + {(18000  -  x) * 12 * 3)/100 = Rs. 7560</p><p>(45x/100) + (648000  -  36x)/100 = 7560</p><p>(9x + 648000)/100 = 7560</p><p>9x = 108000</p><p>x = Rs. 12000</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>At what rate of percent per annum with simple interest will a sum of money double in 12.5 years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2325;&#2379;&#2312; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 12.5 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">12.5</span><span class=\"hqt\" style=\"display:none\">12.5</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>According to the question,</p><p>Simple interest = 2P - P = Rs. P</p><p>So,</p><p>P = P * R * T/100</p><p>R = 100/12.5 = 8%</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Mr. Pankaj invested a certain amount at 8% per annum at simple interest. If the difference between the simple interest for 5 years and 6 years is Rs. 320, then what is the principal amount invested by Mr. Pankaj?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2381;&#2352;&#2368; &#2346;&#2306;&#2325;&#2332; &#2344;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 8% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368;&#2404; &#2351;&#2342;&#2367; 5 &#2357;&#2352;&#2381;&#2359; &#2324;&#2352; 6 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2352;&#2369;. 320 &#2361;&#2376;, &#2340;&#2379; &#2358;&#2381;&#2352;&#2368; &#2346;&#2306;&#2325;&#2332; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2350;&#2370;&#2354; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 3600</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 3600</span>",
      "<span class=\"eqt\">Rs. 2000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 2000</span>",
      "<span class=\"eqt\">Rs. 6500</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 6500</span>",
      "<span class=\"eqt\">Rs. 4000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 4000</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let Rs. P be the principal amount of money.</p><p>According to the question,</p><p>(P * 8 * 6)/100  -  (P * 8 * 5)/100 = 320</p><p>=&gt; 0.08P = 320</p><p>=&gt; P = 320/0.08</p><p>=&gt; P = Rs. 4000</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Rahul invested &#8377;14400 for 't' years at 16 (2/3)% simple rate of interest. If interest amount received is &#8377;6000, then find the value of 't'.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2361;&#2369;&#2354; &#2344;&#2375; 16 (2/3)% &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; 't' &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;14400 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2348;&#2381;&#2351;&#2366;&#2332; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#8377;6000 &#2361;&#2376;, &#2340;&#2379; 't' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">2.5</span><span class=\"hqt\" style=\"display:none\">2.5</span>",
      "<span class=\"eqt\">1.5</span><span class=\"hqt\" style=\"display:none\">1.5</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Rate of interest = 16 (2/3)% = (50/3)%</p><p>According to the question:</p><p>(14400 * t * 50)/(3 * 100) = 6000</p><p>t = 2.5</p><p>Hence, value of 't' = 2.5</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A person invested Rs. 8000 in two schemes, some amount at a 12% rate of interest and the remaining amount at an 8% rate of interest for two years. If the simple interest received from both schemes is Rs. 1520, then find the amount invested at a 12% rate of interest. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#2342;&#2379; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; 8000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;, &#2342;&#2379; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2369;&#2331; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 12% &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2324;&#2352; &#2358;&#2375;&#2359; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 8% &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; 1520 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; 12% &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 4000</span><span class=\"hqt\" style=\"display:none\">4000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 3000</span><span class=\"hqt\" style=\"display:none\">3000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 5000</span><span class=\"hqt\" style=\"display:none\">5000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 3500</span><span class=\"hqt\" style=\"display:none\">3500 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the amount invested at a 12% rate of interest be Rs. 'X'. </p><p>S.I = P * R * T/100 </p><p>1520 = X * 12 * 2/100 + (8000  -  X) * 8 * 2/100 </p><p>152000 = 24X + 128000  -  16X </p><p>8X = 24000 </p><p>X = 3000 </p><p>Hence, the required value is Rs. 3000.</p>",
    "question_index": 7
