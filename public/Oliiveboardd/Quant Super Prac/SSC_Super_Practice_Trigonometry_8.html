    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following expressions is the greatest?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;32 + &radic;17</span><span class=\"hqt\" style=\"display:none\">&radic;32 + &radic;17</span>",
      "<span class=\"eqt\">&radic;24 + &radic;25</span><span class=\"hqt\" style=\"display:none\">&radic;24 + &radic;25</span>",
      "<span class=\"eqt\">&radic;39 + &radic;12</span><span class=\"hqt\" style=\"display:none\">&radic;39 + &radic;12</span>",
      "<span class=\"eqt\">&radic;17 + &radic;24</span><span class=\"hqt\" style=\"display:none\">&radic;17 + &radic;24</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>If a and b are positive numbers and a<sup>2</sup> &gt; b<sup>2</sup>, it means a will also be greater than b.</p><p>So, in this case we will take square of the each given surd and then compare their values.</p><p>As we know that (a + b)<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> + 2ab</p><p>(&radic;32 + &radic;17)<sup>2</sup> = 49 + 2&radic;544 ... (1)</p><p>(&radic;24 + &radic;25)<sup>2</sup> = 49 + 2&radic;600 ... (2)</p><p>(&radic;39 + &radic;12)<sup>2</sup> = 51 + 2&radic;468 ... (3)</p><p>(&radic;17 + &radic;24)<sup>2</sup> = 41 + 2&radic;408 ... (4)</p><p>Since, &#8730;600 is greater than &#8730;544, &#8730;468 and &#8730;408, and (2) has the same base value (49) as (1) but a larger added term 2&#8730;600, (2) will be the largest.</p><p>Thus, the greatest expression is &#8730;24 + &#8730;25.</p><p></p><p><b> Express method </b></p><p>When the sum of the given terms is the same, then the difference between the terms of that option is smallest, will be the greatest among given options.</p><p>Here,</p><p>option a: difference = 32 - 17 = 15</p><p>option b: difference = 25 - 24 = 1</p><p>option c: difference = 39 - 12 = 27</p><p>option d: difference = 24 - 17 = 7</p><p>Hence, option b will be the greatest.</p><p></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If <img width=184 height=46 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12777/image001.png\">, then find the value of <img width=64 height=30 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12777/image002.png\">.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; <img width=184 height=46 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12777/image001.png\">, &#2340;&#2379; <img width=64 height=30 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12777/image002.png\"> &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5&radic;7</span><span class=\"hqt\" style=\"display:none\">5&radic;7</span>",
      "<span class=\"eqt\">10/&radic;17</span><span class=\"hqt\" style=\"display:none\">10/&radic;17</span>",
      "<span class=\"eqt\">5&radic;17</span><span class=\"hqt\" style=\"display:none\">5&radic;17</span>",
      "<span class=\"eqt\">10/&radic;7</span><span class=\"hqt\" style=\"display:none\">10/&radic;7</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=544 height=302 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12777/image003.png\"></p><p>After comparing:</p><p>(a + b) = 27 ..... (1)</p><p>(a  -  b) = 11 ..... (2)</p><p>From (1) and (2):</p><p>a = (27 + 11)/2 = 19</p><p>b = (27  -  11)/2 = 8</p><p>Now,</p><p>&radic;(a<sup>2</sup> + b<sup>2</sup>)</p><p>= &radic;(19<sup>2</sup> + 8<sup>2</sup>)</p><p>= &radic;(361 + 64)</p><p>= &radic;425</p><p>= 5&radic;17</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Find the mixed surd form of &radic;1960.</p></span><span class=\"hqt\" style=\"display:none\"><p>&radic;1960 &#2325;&#2366; &#2350;&#2367;&#2358;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2381;&#2342;&#2350; &#2352;&#2370;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">14&radic;10</span><span class=\"hqt\" style=\"display:none\">14&radic;10</span>",
      "<span class=\"eqt\">3&radic;5</span><span class=\"hqt\" style=\"display:none\">3&radic;5</span>",
      "<span class=\"eqt\">8&radic;21</span><span class=\"hqt\" style=\"display:none\">8&radic;21</span>",
      "<span class=\"eqt\">9&radic;10</span><span class=\"hqt\" style=\"display:none\">9&radic;10</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Multiple of 1960 = 2 * 2 * 2 * 5 * 7 * 7</p><p>&radic;1960 = &radic;(2 * 2 * 2 * 5 * 7 * 7)</p><p>= 2 * 7 * &radic;(2 * 5)</p><p>= 14&radic;10</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If a = 1/&radic;(2  -  &radic;3), then what is the value of 4a<sup>2</sup>  -  (1/a<sup>2</sup>)  -  5&radic;3?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a = 1/&radic;(2 - &radic;3) &#2361;&#2376;, &#2340;&#2379; 4a<sup>2</sup> - (1/a<sup>2</sup>) - 5&radic;3 &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>a = 1/&radic;(2  -  &radic;3)</p><p>a<sup>2</sup> = [1/&radic;(2  -  &radic;3)]<sup>2</sup> = 1/(2  -  &radic;3)</p><p>1/a<sup>2</sup> = (2  -  &radic;3)</p><p>a<sup>2</sup> = 1/(2  -  &radic;3) * (2 + &radic;3)/(2 + &radic;3)</p><p>a<sup>2</sup> = (2 + &radic;3)/(4  -  3)</p><p>a<sup>2</sup> = (2 + &radic;3)</p><p>= 4a<sup>2</sup>  -  (1/a<sup>2</sup>)  -  5&radic;3</p><p>= 4 * (2 + &radic;3)  -  (2  -  &radic;3)  -  5&radic;3</p><p>= 8 + 4&radic;3  -  2 + &radic;3  -  5&radic;3</p><p><b>= </b>6</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If x = 3 + 2&radic;2, the value of x<sup>2</sup> + &nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x<sup>2</sup></span></div>&nbsp; is&nbsp;</div></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&nbsp;&#2351;&#2342;&#2367; x = 3 + 2&radic;2 &#2361;&#2376;, &#2340;&#2379; x<sup>2</sup> + &nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x<sup>2</sup></span></div>&nbsp; &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;-</div></p></span>",
    "options": [
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>",
      "<span class=\"eqt\">32</span><span class=\"hqt\" style=\"display:none\">32</span>",
      "<span class=\"eqt\">34</span><span class=\"hqt\" style=\"display:none\">34</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#8757;x=3+2&radic;2</p> <p> x<sup>2</sup>= (3+2&radic;2)<sup>2</sup>=9+8+12&radic;2</p> <p>=17+12&radic;2</p> <div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x<sup>2</sup></span></div>&nbsp; = &nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">17 + 12&radic;2</span></div>&nbsp; x &nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">17 - 12&radic;2</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">17 - 12&radic;2</span></div></div><p>= 17 - 12&radic;2</p><p>So, required value = 17 + 12&radic;2 + 17 - 12&radic;2 = 34</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If A = 1/(4+&radic;7) &amp; B = 1/(3-&radic;7), find the value of 27A + 6B.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A = 1/(4+&radic;7) &#2324;&#2352; B = 1/(3-&radic;7) &#2361;&#2376;, 27A + 6B &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">33</span><span class=\"hqt\" style=\"display:none\">33</span>",
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">27</span><span class=\"hqt\" style=\"display:none\">27</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A = 1/(4+&radic;7) = 1/(4+&radic;7) x (4-&radic;7)/(4-&radic;7) = (4 - &radic;7)/(16 - 7) = (4 - &radic;7)/9</p> <p>27A = 12  -  3&radic;7</p> <p>A = 1/(3-&radic;7) = 1/(3-&radic;7) x (3+&radic;7)/(3+&radic;7) = (3+&radic;7)/9-7 = (3+&radic;7)/2</p> <p>6B = 9 + 3&radic;7</p> <p>27A + 6B = 12  -  3&radic;7 + 9 + 3&radic;7 = 21</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>What is the closest value of &radic;<span style=\"text-decoration:overline\">4&radic;27 + 3</span></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&radic;4&radic;27 + 3 &#2325;&#2366; &#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#2350;&#2366;&#2344;</p></span>",
    "options": [
      "<span class=\"eqt\">4.6</span><span class=\"hqt\" style=\"display:none\">4.6</span>",
      "<span class=\"eqt\">4.3</span><span class=\"hqt\" style=\"display:none\">4.3</span>",
      "<span class=\"eqt\">4.9</span><span class=\"hqt\" style=\"display:none\">4.9</span>",
      "<span class=\"eqt\">5.2</span><span class=\"hqt\" style=\"display:none\">5.2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let <img width=99 height=25 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8730/image002.png\"></p><p>x<sup>2</sup> = 4&radic;27 + 3</p><p>= 12&radic;3 + 3</p><p>= 12 * 1.732 + 3</p><p>= 23.784</p><p>Now,</p><p><b>From option (a):</b></p><p>Square of 4.6 = 4.6 * 4.6 = 21.16</p><p><b>From option (b):</b></p><p>Square of 4.3 = 4.3 * 4.3 = 18.49</p><p><b>From option (c):</b></p><p>Square of 4.9 = 4.9 * 4.9 = 24.01</p><p><b>From option (d):</b></p><p>Square of 5.2 = 5.2 * 5.2 = 27.04</p><p>Since, 24.01 is closest to x<sup>2</sup>, then option (c) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;What is the closest value to :&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&radic;<span style=\"text-decoration:overline\">(3 - 2&radic;2)</span></span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2360;&#2344;&#2381;&#2344;&#2367;&#2325;&#2335; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;: &nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&radic;<span style=\"text-decoration:overline\">(3 - 2&radic;2)</span></span></div></div></p></span>",
    "options": [
      "<span class=\"eqt\">3.4</span><span class=\"hqt\" style=\"display:none\">3.4</span>",
      "<span class=\"eqt\">2.4</span><span class=\"hqt\" style=\"display:none\">2.4</span>",
      "<span class=\"eqt\">4.2</span><span class=\"hqt\" style=\"display:none\">4.2</span>",
      "<span class=\"eqt\">3.8</span><span class=\"hqt\" style=\"display:none\">3.8</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let <img width=92 height=44 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8730/image004.png\"></p><p><img width=88 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8730/image005.png\"></p><p><img width=141 height=57 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8730/image006.png\"></p><p>= 3+ 2&radic;2</p><p>= 3 + 2 * 1.414</p><p>= 5.828</p><p>Now,</p><p><b>From option (1):</b></p><p>Square of 3.4 = 3.4 * 3.4 = 11.56</p><p><b>From option (2):</b></p><p>Square of 2.4 = 2.4 * 2.4 = 5.76</p><p><b>From option (3):</b></p><p>Square of 4.2 = 4.2 * 4.2 = 17.64</p><p><b>From option (4):</b></p><p>Square of 3.8 = 3.8 * 3.8 = 14.44</p><p>Since, 5.76 is closest to x<sup>2</sup>, then option (b) is the correct answer.</p>",
    "question_index": 7

    "solution": "<p>As we know, (a + b)(a  -  b) = a<sup>2</sup>  -  b<sup>2</sup></p><p><b>From option (1):</b></p><p>(&radic;108 + &radic;101)(&radic;108 - &radic;101) = 108  -  101 = 7</p><p>(&radic;108 - &radic;101) = 7/(&radic;108 + &radic;101)...(i)</p><p><b>From option (2)</b>:</p><p>(&radic;86 + &radic;79)(&radic;86 - &radic;79) = 86  -  79 = 7</p><p>(&radic;86 - &radic;79) = 7/(&radic;86 + &radic;79)...(ii)</p><p><b>From option (3):</b></p><p>(&radic;217 + &radic;210)(&radic;217 - &radic;210) = 217  -  210 = 7</p><p>(&radic;217 - &radic;210) = 7/(&radic;217 + &radic;210)</p><p><b>From option (4):</b></p><p>(&radic;99 + &radic;92)(&radic;99 - &radic;92) = 99  -  92 = 7</p><p>(&radic;99 - &radic;92) = 7/(&radic;99 + &radic;92)</p><p>Here, we can see that denominator of (iii) &gt; (i) &gt; (iv) &gt; (ii), i.e,</p><p>(&radic;217 + &radic;210 ) &gt; (&radic;108 + &radic;101) &gt; (&radic;99 + &radic;92) &gt; (&radic;86 + &radic;79)</p><p>And, (&radic;217 - &radic;210 ) &lt; (&radic;108 - &radic;101) &lt; (&radic;99 - &radic;92) &lt; (&radic;86 - &radic;79)</p><p>Hence, (&radic;86 - &radic;79) is the largest.</p><p></p><p><b> Express Method </b></p><p>If the difference of a given number is approximately the same, then the pair whose number is greatest will be the smallest, and vice-versa the pair with the smallest number will be the largest.</p><p>Hence , option 2 is the largest.</p><p></p><p></p>",
