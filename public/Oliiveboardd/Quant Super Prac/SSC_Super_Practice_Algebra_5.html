<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following equation has equal and positive roots?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2350;&#2370;&#2354; &#2348;&#2352;&#2366;&#2348;&#2352; &#2324;&#2352; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">y<sup>2</sup>  -  10y + 16 = 0</span><span class=\"hqt\" style=\"display:none\">y<sup>2</sup> - 10y + 16 = 0</span>",
      "<span class=\"eqt\">9y<sup>2</sup>  -  105y + 196 = 0</span><span class=\"hqt\" style=\"display:none\">9y<sup>2</sup> - 105y + 196 = 0</span>",
      "<span class=\"eqt\">9y<sup>2</sup>  -  24y + 16 = 0</span><span class=\"hqt\" style=\"display:none\">9y<sup>2</sup> - 24y + 16 = 0</span>",
      "<span class=\"eqt\">4y<sup>2</sup>  -  100y + 225 = 0</span><span class=\"hqt\" style=\"display:none\">4y<sup>2</sup> - 100y + 225 = 0</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>From option (1):</p><p>For quadratic equation: y<sup>2</sup>  -  10y + 16 = 0</p><p>y<sup>2</sup>  -  10y + 16 = 0</p><p>y<sup>2</sup>  -  8y  -  2y + 16 = 0</p><p>y = 8, 2</p><p>Hence, roots of the given equation are positive but not equal.</p><p>From option (2):</p><p>For quadratic equation: 9y<sup>2</sup>  -  105y + 196 = 0</p><p>9y<sup>2</sup>  -  105y + 196 = 0</p><p>9y<sup>2</sup>  -  21y  -  84y + 196 = 0</p><p>y = 7/3, 28/3</p><p>Hence, roots of this equation are positive but not equal.</p><p>From option (3):</p><p>For quadratic equation: 9y<sup>2</sup>  -  24y + 16 = 0</p><p>9y<sup>2</sup>  -  24y + 16 = 0</p><p>9y<sup>2</sup>  -  12y  -  12y + 16 = 0</p><p>y = 4/3, 4/3</p><p>Hence, roots of this equation are positive and equal.</p><p>From option (4):</p><p>For quadratic equation: 4y<sup>2</sup>  -  100y + 225 = 0</p><p>4y<sup>2</sup>  -  100y + 225 = 0</p><p>4y<sup>2</sup>  -  90y  -  10y + 225 = 0</p><p>y = 45/2, 5/2</p><p>Hence, roots of this equation are positive but not equal.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If a and b are roots of quadratic equation x<sup>2</sup>  -  22x + 85 = 0 and a &gt; b, then how many numbers between 100 and 1500 are divisible by both (a  -  b) and average of a and b?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a &#2324;&#2352; b &#2342;&#2381;&#2357;&#2367;&#2328;&#2366;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; x<sup>2</sup> - 22x + 85 = 0 &#2324;&#2352; a &gt; b &#2325;&#2375; &#2350;&#2370;&#2354; &#2361;&#2376;&#2306;, &#2340;&#2379; 100 &#2324;&#2352; 1500 &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2340;&#2344;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; (a - b) &#2324;&#2352; a &#2324;&#2352; b &#2325;&#2375; &#2324;&#2360;&#2340; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>x<sup>2</sup>  -  22x + 85 = 0</p><p>x<sup>2</sup>  -  17x  -  5x + 85 = 0</p><p>x = 17, 5</p><p>a = 17, b = 5</p><p>a  -  b = 17  -  5 = 12</p><p>Average of a and b = (17 + 5)/2 = 11</p><p>Numbers divisible by both 12 and 11 = numbers divisible by LCM of 12 and 11</p><p>LCM of 12 and 11 = 132</p><p>Numbers between 100 and 1500 which are divisible by 132 = 132, 264,...., 1452.</p><p>Total numbers = ((1452  -  132)/1320 + 1 = 11</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If one root of the equation 2x<sup>2</sup> + kx + m = 0 is 3 and (k<sup>2</sup> + m<sup>2</sup>  -  25<sup>2</sup>) =  - 15 such that m &gt; 0, then the other root is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; 2x<sup>2</sup> + kx + m = 0 &#2325;&#2366; &#2319;&#2325; &#2350;&#2370;&#2354; 3 &#2361;&#2376; &#2324;&#2352; (k<sup>2</sup> + m<sup>2</sup> - 25<sup>2</sup>) = - 15 &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2367; m &gt; 0 &#2361;&#2376;, &#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2366; &#2350;&#2370;&#2354; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">7/2</span><span class=\"hqt\" style=\"display:none\">7/2</span>",
      "<span class=\"eqt\">15/2</span><span class=\"hqt\" style=\"display:none\">15/2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>As 3 is a root, so x = 3</p><p>2x<sup>2</sup> + kx + m = 0</p><p>18 + 3k + m = 0</p><p>m =  - (18 + 3k) .. (i)</p><p>(k<sup>2</sup> + m<sup>2</sup>  -  25<sup>2</sup>) =  - 15</p><p>k<sup>2</sup> + m<sup>2 </sup>= 625  -  15 = 610</p><p>k<sup>2</sup> + (18 + 3k)<sup>2 </sup>= 610</p><p>k<sup>2</sup> + 324 + 108k + 9k<sup>2 </sup>= 610</p><p>10k<sup>2</sup> + 108k  -  286 = 0</p><p>5k<sup>2</sup> + 54k  -  143 = 0</p><p>k = 2.2 or  - 13</p><p>m =  - 24.6 or 21</p><p>As m &gt; 0, so k =  - 13 and m = 21</p><p>Hence, the equation is 2x<sup>2</sup>  -  13x + 21 = 0</p><p>So, solving we get that the other root is 7/2.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If K and L are roots of the equation <img width=135 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13823/image003.png\"> and K + L = 10, then what is the value of <img width=41 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13823/image004.png\">?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; K &#2324;&#2352; L &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2350;&#2370;&#2354; &#2361;&#2376;&#2306; &#2324;&#2352; K + L = 10 &#2361;&#2376;, &#2340;&#2379; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">-10/19</span><span class=\"hqt\" style=\"display:none\">-10/19</span>",
      "<span class=\"eqt\">-5/38</span><span class=\"hqt\" style=\"display:none\">-5/38</span>",
      "<span class=\"eqt\">10/19</span><span class=\"hqt\" style=\"display:none\">10/19</span>",
      "<span class=\"eqt\">5/38</span><span class=\"hqt\" style=\"display:none\">5/38</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=228 height=145 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13823/image005.png\"></p><p>Sum of the roots = K + L = 5p</p><p>Thus, K + L = 10</p><p>=&gt; 5p = 10</p><p>=&gt; p = 2</p><p>And KL = -19p<sup>2</sup> = -19 * 4</p><p><img width=203 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13823/image006.png\"></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If the roots of the equations <img width=253 height=43 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13823/image009.png\"> are equal, then what is the value of k?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2375; &#2350;&#2370;&#2354; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2306;, &#2340;&#2379; k &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>",
      "<span class=\"eqt\">-1/2</span><span class=\"hqt\" style=\"display:none\">-1/2</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">-1</span><span class=\"hqt\" style=\"display:none\">-1</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=253 height=43 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13823/image009.png\"></p><p>=&gt; (x + 1)[x(x  -  1)k  -  k(k + 1)] = x(x  -  1)(x + 1)(k  -  1)</p><p>=&gt; x(x  -  1)k  -  x(x  -  1)(k  -  1)  -  k(k + 1) = 0</p><p>=&gt; x(x  -  1)[k  -  k + 1]  -  k(k + 1) = 0</p><p>=&gt; x<sup>2</sup>  -  x  -  k(k + 1) = 0</p><p>Since, roots are equal.</p><p>Thus, b<sup>2</sup>  -  4ac = 0</p><p>=&gt; 1  -  4(-k(k + 1) = 0</p><p>=&gt; k(k + 1) = -1/4</p><p>=&gt; k<sup>2</sup> + k + &#188; = 0</p><p>=&gt; 4k<sup>2</sup> + 4k + 1 = 0</p><p>=&gt; (2k + 1)<sup>2</sup> = 0</p><p>=&gt; k = -1/2</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Which one is one of the factors of <img width=169 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13823/image016.png\">?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; <img width=169 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13823/image016.png\"> &#2325;&#2366; &#2319;&#2325; &#2325;&#2366;&#2352;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">(3x + 2/x + 14)</span><span class=\"hqt\" style=\"display:none\">(3x + 2/x + 14)</span>",
      "<span class=\"eqt\">(2x + 3/x + 7)</span><span class=\"hqt\" style=\"display:none\">(2x + 3/x + 7)</span>",
      "<span class=\"eqt\">(2x + 3/x  -  5)</span><span class=\"hqt\" style=\"display:none\">(2x + 3/x - 5)</span>",
      "<span class=\"eqt\">(2x + 3/x  -  7)</span><span class=\"hqt\" style=\"display:none\">(2x + 3/x - 7)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=319 height=196 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13823/image017.png\"></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find the common factors in the equation (2p<sup>2</sup> + 11p - 63) and (24p<sup>2</sup> - 74p - 35).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2368;&#2325;&#2352;&#2339; (2p<sup>2</sup> + 11p - 63) &#2324;&#2352; (24p<sup>2</sup> - 74p - 35) &#2350;&#2375;&#2306; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2325;&#2366;&#2352;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3p - 8</span><span class=\"hqt\" style=\"display:none\">3p - 8</span>",
      "<span class=\"eqt\">p + 9</span><span class=\"hqt\" style=\"display:none\">p + 9</span>",
      "<span class=\"eqt\">12p + 5</span><span class=\"hqt\" style=\"display:none\">12p + 5</span>",
      "<span class=\"eqt\">2p - 7</span><span class=\"hqt\" style=\"display:none\">2p - 7</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>According to the Question,</p><p>Equation: (2p<sup>2</sup>+11p-63)</p><p>=2p<sup>2</sup>+18p-7p-63</p><p>=2p(p+9)-7(p+9)</p><p>=(2p-7) (p+9)</p><p>Equation: (24p<sup>2</sup>-74p-35)</p><p>=24p<sup>2</sup>-84p+10p-35</p><p>=12p(2p-7)+5(2p-7)</p><p>=(2p-7) (12p+5)</p><p>Common factor in both the equations is (2p-7)</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If 7/2 is one of roots of equation 2x<sup>2</sup>  -  px + 28 = 0. Find the other root of the equation and the value of p.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 7/2 &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; 2x<sup>2</sup> - px + 28 = 0 &#2325;&#2366; &#2319;&#2325; &#2350;&#2370;&#2354; &#2361;&#2376;&#2404; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2366; &#2342;&#2370;&#2360;&#2352;&#2366; &#2350;&#2370;&#2354; &#2324;&#2352; p &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4, 13</span><span class=\"hqt\" style=\"display:none\">4, 13</span>",
      "<span class=\"eqt\">3/2, 15</span><span class=\"hqt\" style=\"display:none\">3/2, 15</span>",
      "<span class=\"eqt\">5, 15</span><span class=\"hqt\" style=\"display:none\">5, 15</span>",
      "<span class=\"eqt\">4, 15</span><span class=\"hqt\" style=\"display:none\">4, 15</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>If 7/2 is a root of the equation, then x = 7/2 will satisfy the equation</p><p>2x<sup>2</sup>  -  px + 28 = 0</p><p>2 * (7/2)<sup>2</sup>  -  p(7/2) + 28 = 0</p><p>49  -  7p + 56 = 0</p><p>7p = 105</p><p>p = 15</p><p>Equation = 2x<sup>2</sup>  -  15x + 28 = 0</p><p>2x<sup>2</sup>  -  (8 + 7)x + 28 = 0</p><p>(x  -  4)(2x  -  7) = 0</p><p>x = 4, 7/2</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>One root of the equation mx<sup>2</sup> + 13x  -  63 = 0 is 7/3. The value of m and the other root of equation respectively is - </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2368;&#2325;&#2352;&#2339; mx<sup>2</sup> + 13x - 63 = 0 &#2325;&#2366; &#2319;&#2325; &#2350;&#2370;&#2354; 7/3 &#2361;&#2376;&#2404; m &#2325;&#2366; &#2350;&#2366;&#2344; &#2324;&#2352; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2366; &#2342;&#2370;&#2360;&#2352;&#2366; &#2350;&#2370;&#2354; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2361;&#2376; - </p></span>",
    "options": [
      "<span class=\"eqt\">5, -9/2</span><span class=\"hqt\" style=\"display:none\">5, -9/2</span>",
      "<span class=\"eqt\">6, 9/2</span><span class=\"hqt\" style=\"display:none\">6, 9/2</span>",
      "<span class=\"eqt\">5, 9/2</span><span class=\"hqt\" style=\"display:none\">5, 9/2</span>",

    "question": "<span class=\"eqt\"><p>If the roots of the equation px<sup>2</sup> + 2(q + r)x + (p  -  r) = 0 are equal, then what is the value of p<sup>2</sup>  -  q<sup>2</sup>  -  r<sup>2</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; px<sup>2</sup> + 2(q + r)x + (p - r) = 0 &#2325;&#2368; &#2350;&#2370;&#2354; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2306;, &#2340;&#2379; p<sup>2</sup> - q<sup>2</sup> - r<sup>2 </sup>&#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If 2x<sup>2</sup> -5x + 2 = 0, and x &lt; 1, then find the value of&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2x<sup>2</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x - 1</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; 2x<sup>2</sup> -5x + 2 = 0 &#2324;&#2352; x &lt; 1 &#2361;&#2376;, &#2340;&#2379;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2x<sup>2</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x - 1</span></div> &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</div></p></span>",
    "options": [

    "solution": "<p>Given,</p><p>2x<sup>2</sup> -5x + 2 = 0</p><p>2x<sup>2</sup>  -  4x  -  x + 2 =0</p><p>2x(x  -  2) -1(x  -  2) = 0</p><p>(2x  -  1)(x  -  2) = 0</p><p>X = 2 or 1/2</p><p>Since X&lt;1, so, X should be equal to 1/2.</p><p>Now,</p><p>(2x<sup>2</sup>)/(x  -  1)</p><p>= {2 * (1/4)}/(-1/2)</p><p>= (1/2)/(-1/2) = -1.</p>",
