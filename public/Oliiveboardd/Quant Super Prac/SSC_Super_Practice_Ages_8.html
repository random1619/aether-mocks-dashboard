<body>

    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If (x + 1/x) = 2&radic;2 and x &gt; 1, what is the value of (x<sup>8</sup>  -  1/x<sup>8</sup>)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (x + 1/x) = 2&radic;2 &#2324;&#2352; x > 1, &#2340;&#2379; (x<sup>8</sup> - 1/x<sup>8</sup>) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">616&radic;2</span><span class=\"hqt\" style=\"display:none\">616&radic;2</span>",
      "<span class=\"eqt\">732&radic;2</span><span class=\"hqt\" style=\"display:none\">732&radic;2</span>",
      "<span class=\"eqt\">816&radic;2</span><span class=\"hqt\" style=\"display:none\">816&radic;2</span>",
      "<span class=\"eqt\">904&radic;2</span><span class=\"hqt\" style=\"display:none\">904&radic;2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>x + 1/x = 2&radic;2</p><p>x<sup>8</sup>  -  1/x<sup>8</sup> = (x + 1/x)*(x  -  1/x)*(x<sup>2</sup> + 1/x<sup>2</sup>)(x<sup>4</sup> + 1/x<sup>4</sup>)</p><p>= (x + 1/x)*&radic;[(x + 1/x)<sup>2</sup>  -  4]*[(x + 1/x)<sup>2</sup>  -  2]*[{(x + 1/x)<sup>2</sup>  -  2}<sup>2</sup>  -  2]</p><p>= 2&radic;2*&radic;[(2&radic;2)<sup>2</sup>  -  4]*[(2&radic;2)<sup>2</sup>  -  2]*[{(2&radic;2)<sup>2</sup>  -  2}<sup>2</sup>  -  2]</p><p>= 2&radic;2*2*6*34</p><p>= 816&radic;2</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If 27K<sup>6</sup> + 26K<sup>3</sup>  -  1 = 0, then the positive value of [2K + (&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">K</span></div>&nbsp;)] is&#58;&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; 27K<sup>6</sup> + 26K<sup>3</sup> - 1 = 0 &#2361;&#2376;, &#2340;&#2379; [2K + ( <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">K</span></div>)] &#2325;&#2366; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2350;&#2366;&#2344; &#2361;&#2376;:</div></p></span>",
    "options": [
      "<span class=\"eqt\">8(1/3)</span><span class=\"hqt\" style=\"display:none\">8(1/3)</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">9(2/3)</span><span class=\"hqt\" style=\"display:none\">9(2/3)</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>27K<sup>6</sup> + 26K<sup>3</sup>  -  1 = 0</p><p>27K<sup>6</sup> + 27K<sup>3</sup>  -  K<sup>3</sup>  -  1 = 0</p><p>27K<sup>3</sup>(K<sup>3</sup> + 1)  -  1 (K<sup>3</sup> + 1) = 0</p><p>(27K<sup>3</sup>  -  1) (K<sup>3</sup> + 1) = 0</p><p>27K<sup>3</sup>  -  1 = 0 or K<sup>3</sup> + 1 = 0</p><p>27K<sup>3</sup> = 1 or K = -1</p><p>K<sup>3</sup> = 1/27</p><p>K = 1/3</p><p>Positive value of [2K + (3/K)]</p><p>= [(2/3) + 3 * 3]</p><p>= 9(2/3).</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If (2p + 3)<sup>3</sup> + (3p  -  5)<sup>3 </sup>+ (p  -  2)<sup>3</sup> = (2p + 3)(3p  -  5)(3p  -  6), then what is the value of 'p'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (2p + 3)<sup>3</sup> + (3p - 5)<sup>3 </sup>+ (p - 2)<sup>3</sup> = (2p + 3)(3p - 5)(3p - 6) &#2361;&#2376;, &#2340;&#2379; 'p' &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2/3</span><span class=\"hqt\" style=\"display:none\">2/3</span>",
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>",
      "<span class=\"eqt\">3/4</span><span class=\"hqt\" style=\"display:none\">3/4</span>",
      "<span class=\"eqt\">5/6</span><span class=\"hqt\" style=\"display:none\">5/6</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>We know, a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup>  -  3abc = (a + b + c)(a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup>  -  ab  -  bc  -  ac)</p><p>Here, (2p + 3)<sup>3</sup> + (3p  -  5)<sup>3 </sup>+ (p  -  2)<sup>3</sup> = (2p + 3)(3p  -  5)(3p  -  6) = 3(2p + 3)(3p  -  5)(p  -  2)</p><p>This means, a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup> = 3abc</p><p>Then, a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup>  -  3abc = 0</p><p>And, (a + b + c)(a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup>  -  ab  -  bc  -  ac) = 0</p><p>So, a + b + c = 0</p><p>Now, (2p + 3) + (3p  -  5) + (p  -  2) = 0</p><p><b>p = 2/3</b></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If x<sup>16</sup>  -  617x<sup>8</sup> + 16 = 0, and x &gt; 0, then find the value of x<sup>2</sup> +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x<sup>2</sup></span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; x<sup>16</sup> - 617x<sup>8</sup> + 16 = 0 &#2324;&#2352; x &gt; 0 &#2361;&#2376;, &#2340;&#2379; x<sup>2</sup> + <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x<sup>2</sup></span></div> &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</div></p></span>",
    "options": [
      "<span class=\"eqt\">&radic;31</span><span class=\"hqt\" style=\"display:none\">&radic;31</span>",
      "<span class=\"eqt\">&radic;29</span><span class=\"hqt\" style=\"display:none\">&radic;29</span>",
      "<span class=\"eqt\">&radic;33</span><span class=\"hqt\" style=\"display:none\">&radic;33</span>",
      "<span class=\"eqt\">&radic;26</span><span class=\"hqt\" style=\"display:none\">&radic;26</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Given,</p><p><img width=139 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16030/image001.png\"></p><p><img width=115 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16030/image002.png\"></p><p><img width=97 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16030/image003.png\"></p><p><img width=120 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16030/image004.png\"></p><p><img width=119 height=45 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16030/image005.png\"></p><p><img width=89 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16030/image006.png\"></p><p><img width=112 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16030/image007.png\"></p><p><img width=109 height=45 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16030/image008.png\"></p><p><img width=99 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16030/image009.png\"></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If 3x<sup>2</sup> - &radic;13x + 1 = 0, then find the value of (27x<sup>3</sup> + x<sup>-3</sup>).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 3x<sup>2</sup> - &radic;13x + 1 = 0 &#2361;&#2376;, &#2340;&#2379; (27x<sup>3</sup> + x<sup>-3</sup>) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;13</span><span class=\"hqt\" style=\"display:none\">&radic;13</span>",
      "<span class=\"eqt\">2&radic;13</span><span class=\"hqt\" style=\"display:none\">2&radic;13</span>",
      "<span class=\"eqt\">4&radic;13</span><span class=\"hqt\" style=\"display:none\">4&radic;13</span>",
      "<span class=\"eqt\">3&radic;13</span><span class=\"hqt\" style=\"display:none\">3&radic;13</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>3x<sup>2</sup> - &radic;13x + 1 = 0</p><p>3x<sup>2</sup> + 1 = &radic;13x</p><p>3x + (1/x) = &radic;13</p><p>Cube both sides,</p><p><img width=124 height=45 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16030/image010.png\"></p><p><img width=212 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16030/image011.png\"></p><p><img width=181 height=23 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16030/image012.png\"></p><p><img width=125 height=23 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16030/image013.png\"></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If x&radic;7 +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x&radic;7</span></div>&nbsp;= 3, find the value of 49x<sup>4</sup> +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">49x<sup>4</sup></span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; x&radic;7 + <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x&radic;7</span></div> = 3 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; : 49x<sup>4</sup> + <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">49x<sup>4</sup></span></div></div></p></span>",
    "options": [
      "<span class=\"eqt\">51</span><span class=\"hqt\" style=\"display:none\">51</span>",
      "<span class=\"eqt\">47</span><span class=\"hqt\" style=\"display:none\">47</span>",
      "<span class=\"eqt\">81</span><span class=\"hqt\" style=\"display:none\">81</span>",
      "<span class=\"eqt\">79</span><span class=\"hqt\" style=\"display:none\">79</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>(&radic;7)x + 1/(&radic;7)x = 3</p><p>[(&radic;7)x + 1/(&radic;7)x]<sup>2</sup> = 3<sup>2</sup></p><p>7x<sup>2</sup> + 1/7x<sup>2</sup> + 2 = 9</p><p>7x<sup>2</sup> + 1/7x<sup>2</sup> = 9  -  2 = 7</p><p>[7x<sup>2</sup> + 1/7x<sup>2</sup>]<sup>2</sup> = 7<sup>2</sup></p><p>49x<sup>4</sup> + 1/49x<sup>4</sup> + 2 = 49</p><p>49x<sup>4</sup> + 1/49x<sup>4</sup> = 49  -  2 = 47</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If (x  -  1)(x  -  2)  -  3 = 4x, then what is the value of (3x<sup>2 </sup>+ 7x  -  3)(x<sup>2</sup>  -  1)<sup>-1</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (x - 1)(x - 2) - 3 = 4x &#2361;&#2376;, &#2340;&#2379; (3x<sup>2 </sup>+ 7x - 3)(x<sup>2</sup> - 1)<sup>-1</sup> &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Here, (x  -  1)(x  -  2)  -  3 = 4x</p><p>x<sup>2</sup>  -  3x + 2  -  3 = 4x</p><p>x<sup>2</sup> = 7x + 1...(i)</p><p>Now, (3x<sup>2 </sup>+ 7x  -  3)(x<sup>2</sup>  -  1)<sup>-1</sup></p><p>= (3(7x + 1) + 7x  -  3)(7x + 1  -  1)<sup>-1</sup></p><p>= (21x + 3 + 7x  -  3)/(7x)</p><p>= (28x)/(7x)</p><p>= <b>4</b></p>",
    "question_index": 6

    "question": "<span class=\"eqt\"><p>If 1 + a<sup>2</sup> = 2/a, then what will be the value of 3a + 4/a + 5?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 1 + a<sup>2</sup> = 2/a, &#2340;&#2379; 3a + 4/a + 5 &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
