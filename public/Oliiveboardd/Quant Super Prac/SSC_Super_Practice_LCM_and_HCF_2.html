<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Find the number of common factors of 144, 216 and 288.</p></span><span class=\"hqt\" style=\"display:none\"><p>144, 216 &#2324;&#2352; 288 &#2325;&#2375; &#2360;&#2366;&#2352;&#2381;&#2357; &#2327;&#2369;&#2339;&#2344;&#2326;&#2306;&#2337;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">72</span><span class=\"hqt\" style=\"display:none\">72</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The HCF of these numbers is 72 and the number of factors of 72 (2<sup>3</sup> x 3<sup>2</sup>) is 4 x 3 = 12.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If N = A<sup>2</sup> x B<sup>2</sup> x C<sup>4</sup>, where A, B and C are prime numbers. How many factors of N are perfect squares?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; N = A<sup>2</sup> x B<sup>2</sup> x C<sup>4</sup>, &#2332;&#2361;&#2366;&#2305; A, B &#2324;&#2352; C &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;&#2404; N &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2327;&#2369;&#2339;&#2344;&#2326;&#2306;&#2337; &#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2352;&#2381;&#2327; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>For the factors to be perfect squares, assume A<sup>2</sup> = P, B<sup>2</sup> = Q and C<sup>2</sup>= R</p> <p>So, for the factors to be perfect square, we can write N = PQR<sup>2</sup> = (1+1) (1+1) (2+1) = 12</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>How many factors of 2<sup>4</sup> * 3<sup>2</sup> * 5<sup>7</sup> * 7<sup>3</sup> are divisible by 42 but not by 84?</p></span><span class=\"hqt\" style=\"display:none\"><p>2<sup>4</sup> * 3<sup>2</sup> * 5<sup>7</sup> * 7<sup>3</sup> &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2327;&#2369;&#2339;&#2344;&#2326;&#2306;&#2337; 42 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; 84 &#2360;&#2375; &#2344;&#2361;&#2368;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>42 = 2 * 3 * 7</p><p>84 = 2<sup>2</sup> * 3 * 7</p><p>Now, to have number divisible by 42 and not by 84. We have to make sure that 2 is taken only once. As, if we pick 2 two's, then it will form 84 with no. of 3 and 7 selected and since minimum 3 and 7 we have to select is 1, we cannot have 2 more than one.</p><p>Number= 2<sup>4</sup> * 3<sup>2</sup> * 5<sup>7</sup> * 7<sup>3</sup></p><p>So, there are 2 ways of picking 3, 8 ways of picking 3, 3 ways of picking 7 and only one way of picking 2 and that is 2<sup>1</sup>.</p><p>So, total number of ways = 1 * 2 * 8 * 3 = 48</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What is the LCM of &#8731;1728, &#8732;256, &radic;196, (32)<sup>1/5</sup></p></span><span class=\"hqt\" style=\"display:none\"><p>&#8731;1728, &#8732;256, &radic;196, (32)<sup>1/5</sup> &#2325;&#2366; LCM &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">84</span><span class=\"hqt\" style=\"display:none\">84</span>",
      "<span class=\"eqt\">86</span><span class=\"hqt\" style=\"display:none\">86</span>",
      "<span class=\"eqt\">168</span><span class=\"hqt\" style=\"display:none\">168</span>",
      "<span class=\"eqt\">42</span><span class=\"hqt\" style=\"display:none\">42</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#8731;1728 = 12 = 2 * 2 * 3</p><p>&#8732;256 = 4 = 2 * 2</p><p>&radic;196 = 14 = 2 * 7</p><p>(32)<sup>1/5</sup> = 2 = 2</p><p>LCM = 2 * 2 * 3 * 7 = 84</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Four bells toll once every 8 seconds, 10 seconds, 15 seconds and 27 seconds respectively. If all the bells together toll at 7:00 am, then they will toll together next at -</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2366;&#2352; &#2328;&#2306;&#2335;&#2367;&#2351;&#2366;&#2305; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2361;&#2352; 8 &#2360;&#2375;&#2325;&#2306;&#2337;, 10 &#2360;&#2375;&#2325;&#2306;&#2337;, 15 &#2360;&#2375;&#2325;&#2306;&#2337; &#2324;&#2352; 27 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2319;&#2325; &#2348;&#2366;&#2352; &#2348;&#2332;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2360;&#2349;&#2368; &#2328;&#2306;&#2335;&#2367;&#2351;&#2366;&#2305; &#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2369;&#2348;&#2361; 7:00 &#2348;&#2332;&#2375; &#2348;&#2332;&#2375;&#2306;&#2327;&#2368;, &#2340;&#2379; &#2357;&#2375; &#2309;&#2327;&#2354;&#2368; &#2348;&#2366;&#2352; &#2319;&#2325; &#2360;&#2366;&#2341; &#2348;&#2332;&#2375;&#2306;&#2327;&#2368; -</p></span>",
    "options": [
      "<span class=\"eqt\">7:18 am</span><span class=\"hqt\" style=\"display:none\">7:18 &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344;</span>",
      "<span class=\"eqt\">7.05 am</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2348;&#2361; 7.05 &#2348;&#2332;&#2375;</span>",
      "<span class=\"eqt\">7:20 am</span><span class=\"hqt\" style=\"display:none\">7:20 &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344;</span>",
      "<span class=\"eqt\">7:15 am</span><span class=\"hqt\" style=\"display:none\">7:15 &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>LCM of 8, 10, 15 and 27 = 1080 s = 18 minutes</p><p>Required time = 7:00 am + 18 minutes = 7:18 am</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Products of two numbers is 7134. If HCF of the numbers is 58, then LCM of numbers is : </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; 7134 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; HCF 58 &#2361;&#2376;, &#2340;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; LCM &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">93</span><span class=\"hqt\" style=\"display:none\">93</span>",
      "<span class=\"eqt\">113</span><span class=\"hqt\" style=\"display:none\">113</span>",
      "<span class=\"eqt\">143</span><span class=\"hqt\" style=\"display:none\">143</span>",
      "<span class=\"eqt\">123</span><span class=\"hqt\" style=\"display:none\">123</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>LCM * HCF = Product of two numbers</p><p>LCM * 58 = 7134</p><p>LCM = 7134/58 </p><p>LCM = 123</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>HCF and products of numbers are 5 and 1050 respectively. The number of possible pairs of numbers are : </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; HCF &#2324;&#2352; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 5 &#2324;&#2352; 1050 &#2361;&#2376;&#2306;&#2404; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the numbers are 5a and 5b respectively</p><p>According to question,</p><p>5a * 5b = 1050</p><p>ab = 42</p><p>required possible pair of values of a and b which are prime to each other are (7, 6), (14 * 3), (21 * 2), (1 * 42)</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>LCM of two numbers is 12 times of the HCF of the numbers and sum of LCM and HCF of numbers is 208. If one number is 48, then find the other number.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; LCM &#2313;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; HCF &#2325;&#2366; 12 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; LCM &#2324;&#2352; HCF &#2325;&#2366; &#2351;&#2379;&#2327; 208 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 48 &#2361;&#2376;, &#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">44</span><span class=\"hqt\" style=\"display:none\">44</span>",
      "<span class=\"eqt\">46</span><span class=\"hqt\" style=\"display:none\">46</span>",
      "<span class=\"eqt\">64</span><span class=\"hqt\" style=\"display:none\">64</span>",
      "<span class=\"eqt\">54</span><span class=\"hqt\" style=\"display:none\">54</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the other number be a and HCF of numbers be x</p><p>Then LCM of numbers = 12x</p><p>According to question,</p><p>x + 12x = 208</p><p>x = 208/13 = 16</p><p>LCM = 16 * 12 = 192</p><p>LCM * HCF = Products of two numbers</p><p>16 * 192 = 48 * a</p><p>a = (16 * 192)/48</p><p>a = 64</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>HCF and LCM of two numbers are 21 and 2457 respectively. If one number lies between 170 to 200, then the number is : </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; HCF &#2324;&#2352; LCM &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 21 &#2324;&#2352; 2457 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 170 &#2360;&#2375; 200 &#2325;&#2375; &#2348;&#2368;&#2330; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">183</span><span class=\"hqt\" style=\"display:none\">183</span>",
      "<span class=\"eqt\">175</span><span class=\"hqt\" style=\"display:none\">175</span>",
      "<span class=\"eqt\">199</span><span class=\"hqt\" style=\"display:none\">199</span>",
      "<span class=\"eqt\">189</span><span class=\"hqt\" style=\"display:none\">189</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the numbers are 21a and 21b </p><p>LCM * HCF = product of two numbers</p><p>21 * 2457 = 21a * 21b</p><p>ab = (21 * 2457)/(21 * 21)</p><p>ab = 117</p><p>Two co- prime numbers with product 117 are 13 and 9</p><p>Therefore, the required number is (21 * 13, 21 * 9) = 273 and 189</p><p>Number which lies between 170 to 200 = 189</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Find the least number which when divided by 8, 13, 26 and 52 leaves remainder of 3 in each case.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2375; 8, 13, 26 &#2324;&#2352; 52 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2358;&#2375;&#2359; 3 &#2348;&#2330;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">107</span><span class=\"hqt\" style=\"display:none\">107</span>",
      "<span class=\"eqt\">102</span><span class=\"hqt\" style=\"display:none\">102</span>",
      "<span class=\"eqt\">97</span><span class=\"hqt\" style=\"display:none\">97</span>",
      "<span class=\"eqt\">112</span><span class=\"hqt\" style=\"display:none\">112</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>LCM of 8, 13, 26 and 52 is 104</p><p>Required number = 104 + 3 = 107</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Find the greatest five-digit number which is exactly divisible by 4, 7 and 12.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2305;&#2330; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2357;&#2361; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; 4, 7 &#2324;&#2352; 12 &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">99960</span><span class=\"hqt\" style=\"display:none\">99960</span>",
      "<span class=\"eqt\">99964</span><span class=\"hqt\" style=\"display:none\">99964</span>",
      "<span class=\"eqt\">99978</span><span class=\"hqt\" style=\"display:none\">99978</span>",
      "<span class=\"eqt\">99984</span><span class=\"hqt\" style=\"display:none\">99984</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Greatest 5  -  digit number = 99999</p><p>LCM of 4, 7 and 12 = 84</p><p>99999 when divided by 84 leaves 39 as remainder</p><p>Required number = 99999  -  39 = 99960</p>",
    "question_index": 10
