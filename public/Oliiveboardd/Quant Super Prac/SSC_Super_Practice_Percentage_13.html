<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A sum of Rs. 125 is lent by a child to his friend to be returned in 10 monthly installments of Rs. 13.75 each, the rate of interest is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2330;&#2381;&#2330;&#2375; &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2342;&#2379;&#2360;&#2381;&#2340; &#2325;&#2379; 125 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2352;&#2366;&#2358;&#2367; 13.75 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; 10 &#2350;&#2366;&#2360;&#2367;&#2325; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2366;&#2346;&#2360; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2343;&#2366;&#2352; &#2342;&#2368;, &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">12%</span><span class=\"hqt\" style=\"display:none\">12%</span>",
      "<span class=\"eqt\">18%</span><span class=\"hqt\" style=\"display:none\">18%</span>",
      "<span class=\"eqt\">16%</span><span class=\"hqt\" style=\"display:none\">16%</span>",
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Amount = 13.75 * Total time = 13.75 * 10 </p><p>= Rs. 137.5 </p><p>Amount  -  Principal = S.I = P * R * T/100 </p><p>137.5  -  125 = 125 * 10 * R/ (100 * 12) </p><p>12.5 = 25R/24</p><p>R = 12%</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A sum of Rs. 180 is lent by a child to his friend to be returned in 8 monthly installments of Rs. 24.75 each, the rate of interest is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2330;&#2381;&#2330;&#2375; &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; &#2342;&#2379;&#2360;&#2381;&#2340; &#2325;&#2379; 180 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2352;&#2366;&#2358;&#2367; 24.75 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; 8 &#2350;&#2366;&#2360;&#2367;&#2325; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2366;&#2346;&#2360; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2343;&#2366;&#2352; &#2342;&#2368;, &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">18%</span><span class=\"hqt\" style=\"display:none\">18%</span>",
      "<span class=\"eqt\">15%</span><span class=\"hqt\" style=\"display:none\">15%</span>",
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>",
      "<span class=\"eqt\">24%</span><span class=\"hqt\" style=\"display:none\">24%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Amount = 24.75 * Total time = 24.75 * 8 </p><p>= Rs. 198 </p><p>Amount  -  Principal = S.I = P * R * T/100 </p><p>198  -  180 = 180 * 8 * R/ (100 * 12) </p><p>18 = 6R/5 </p><p>R = 15% </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A person borrowed 8100 at 8 % annual simple interest repayable in 3 equal annual installments. What will be the annual installment?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; 8% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; 8100 &#2352;&#2369;&#2346;&#2351;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2367;&#2319;, &#2332;&#2367;&#2360;&#2375; 3 &#2348;&#2352;&#2366;&#2348;&#2352; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2330;&#2369;&#2325;&#2366;&#2344;&#2366; &#2341;&#2366;&#2404; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2325;&#2367;&#2360;&#2381;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 3000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 3000</span>",
      "<span class=\"eqt\">Rs. 3100</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 3100</span>",
      "<span class=\"eqt\">Rs. 2900</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 2900</span>",
      "<span class=\"eqt\">Rs. 2800</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 2800</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>S.I = P * R * T/100</p><p></p><p>= 8100 * 8 * 3/100</p><p></p><p>= Rs. 1944</p><p></p><p>A = Amount = 8100 + 1944 = Rs. 10044</p><p></p><p>T = Time</p><p></p><p>R = rate</p><p></p><p>Installment = (A * 100)/ [T * 100 + (Tn - 1 + Tn - 2 +  + 1) * R]</p><p></p><p>= (10044 * 100)/ [3 * 100 + (2 + 1) * 8]</p><p></p><p>= (10044 * 100)/ 324</p><p></p><p>= Rs. 3100</p><p></p><p>Hence, annual instalment = Rs. 3100</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A Bluetooth speaker is sold for Rs. 550 in cash, or under an installment plan of Rs. 250 as a down payment and Rs. 310 after one month. Find the annual rate of interest charged in the installment scheme.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2381;&#2354;&#2370;&#2335;&#2370;&#2341; &#2360;&#2381;&#2346;&#2368;&#2325;&#2352; 550 &#2352;&#2369;&#2346;&#2351;&#2375; &#2344;&#2325;&#2342; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2351;&#2366; 250 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2309;&#2327;&#2381;&#2352;&#2367;&#2350; &#2325;&#2367;&#2360;&#2381;&#2340; &#2324;&#2352; &#2319;&#2325; &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342; 310 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2325;&#2367;&#2360;&#2381;&#2340; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2340;&#2361;&#2340; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2367;&#2360;&#2381;&#2340; &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2375;&#2306; &#2354;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>",
      "<span class=\"eqt\">30%</span><span class=\"hqt\" style=\"display:none\">30%</span>",
      "<span class=\"eqt\">40%</span><span class=\"hqt\" style=\"display:none\">40%</span>",
      "<span class=\"eqt\">15%</span><span class=\"hqt\" style=\"display:none\">15%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Since Rs. 250 is paid upfront, the remaining Rs. 300 is the principal (P) or loan amount.</p><p>But the payment after 1 month is Rs. 310, so the interest (SI) is: 310 - 300 = Rs.10</p><p>Now,</p><p>SI = P * R * T/100</p><p>10 = 300 * R * (1/12)/100</p><p>R = 40%</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A person 3300 borrowed at 10% annual simple interest repayable in 2 equal annual installments. What will be the annual installment?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; 10% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; 3300 &#2352;&#2369;&#2346;&#2319; &#2313;&#2343;&#2366;&#2352; &#2354;&#2367;&#2319;, &#2332;&#2367;&#2360;&#2375; 2 &#2348;&#2352;&#2366;&#2348;&#2352; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2325;&#2367;&#2358;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2330;&#2369;&#2325;&#2366;&#2344;&#2366; &#2361;&#2376;&#2404; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2325;&#2367;&#2358;&#2381;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 1600</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1600</span>",
      "<span class=\"eqt\">Rs. 1200</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1200</span>",
      "<span class=\"eqt\">Rs. 1100</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1100</span>",
      "<span class=\"eqt\">Rs. 1400</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1400</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Solution:</p><p>S.I = P * R * T/100</p><p>= 3300 * 10 * 2/100</p><p>= Rs. 660</p><p>A = Amount = 3300 + 660 = Rs. 3960</p><p>T = Time</p><p>R = rate</p><p>Installment = (A * 100)/ [T * 100 + (Tn  1 + Tn  2 +  + 1) * R]</p><p>= (3960 * 100)/ [2 * 100 + (1 + 1) * 10]</p><p>= (3960 * 100)/ 220</p><p>= Rs. 1600</p><p>Hence, annual instalment = Rs. 1600</p><p></p><p></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What annual installment will discharge a debt of Rs. 6148 in four equal installments at the rate of 4% p.a. on simple interest annually?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2325;&#2367;&#2360;&#2381;&#2340; 6148 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2315;&#2339; &#2325;&#2379; &#2330;&#2366;&#2352; &#2348;&#2352;&#2366;&#2348;&#2352; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; 4% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2330;&#2369;&#2325;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 1250</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1250</span>",
      "<span class=\"eqt\">Rs. 1450</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1450</span>",
      "<span class=\"eqt\">Rs. 1550</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1550</span>",
      "<span class=\"eqt\">Rs. 1350</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1350</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Solution:</p><p>A = Amount = Rs. 6148</p><p>T = Time</p><p>R = rate</p><p>Installment = (A * 100)/ [T * 100 + (Tn - 1 + Tn - 2 +  + 1) * R]</p><p>= (6148 * 100)/ [4 * 100 + (3 + 2 + 1) * 4]</p><p>= Rs. 1450</p><p>Hence, annual instalment = Rs. 1450</p><p></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>A sum of &#8377;16,310 is to be repaid in 4 equal yearly installments of &#8377;3,500 each, starting after one year. If interest is charged at simple interest, what annual rate of interest is being applied?</p></span><span class=\"hqt\" style=\"display:none\"><p>$16,310 &#2325;&#2368; &#2352;&#2366;&#2358;&#2367; &#2325;&#2379; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2348;&#2366;&#2342; $3,500 &#2325;&#2368; 4 &#2348;&#2352;&#2366;&#2348;&#2352; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2330;&#2369;&#2325;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2354;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2342;&#2352; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>let the rate of interest be y.</p><p>Total interest = (3500 x y x 3/100) + (3500 x y x 2/100) + (3500 x y x 1/100) + (3500 x y x 0/100) = 210y</p><p>Total amount paid = 3500 x 4 + 210y = Rs.14000 + 210y</p><p>Given that,</p><p>14000 + 210y = 16310</p><p>210y = 2310</p><p>y=11%</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What annual installment will discharge a debt of Rs. 3696 in four equal installments at the rate of 8% p.a. on simple interest annually?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2325;&#2367;&#2360;&#2381;&#2340; 3696 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2315;&#2339; &#2325;&#2379; &#2330;&#2366;&#2352; &#2348;&#2352;&#2366;&#2348;&#2352; &#2325;&#2367;&#2360;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; 8% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2330;&#2369;&#2325;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 875</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 875</span>",
      "<span class=\"eqt\">Rs. 850</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 850</span>",
      "<span class=\"eqt\">Rs. 800</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 800</span>",
      "<span class=\"eqt\">Rs. 825</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 825</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Solution:</p><p>A = Amount = Rs. 3696</p><p>T = Time</p><p>R = rate</p><p>Installment = (A * 100)/ [T * 100 + (Tn - 1 + Tn - 2 + ... + 1) * R]</p><p>= (3696 * 100)/ [4 * 100 + (3 + 2 + 1) * 8]</p><p>= (3696 * 100)/ 448</p><p>= Rs. 825</p><p>Hence, annual instalment = Rs. 825</p><p></p>",
    "question_index": 7
