<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Write the equation for (2x-5) (3x+5).</p></span><span class=\"hqt\" style=\"display:none\"><p>(2x-5) (3x+5) &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2354;&#2367;&#2326;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3x<sup>3</sup> - 2x + 3</span><span class=\"hqt\" style=\"display:none\">3x<sup>3</sup> - 2x + 3</span>",
      "<span class=\"eqt\">4x<sup>2</sup> + 5x - 5</span><span class=\"hqt\" style=\"display:none\">4x<sup>2</sup> + 5x - 5</span>",
      "<span class=\"eqt\">5x<sup>2</sup> + 10x - 55</span><span class=\"hqt\" style=\"display:none\">5x<sup>2</sup> + 10x - 55</span>",
      "<span class=\"eqt\">6x<sup>2</sup> - 5x - 25</span><span class=\"hqt\" style=\"display:none\">6x<sup>2</sup> - 5x - 25</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Given that</p><p>(2x-5) (3x+5)</p><p>= 6x<sup>2</sup> + 10x - 15x - 25</p><p>= 6x<sup>2</sup> - 5x - 25</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If (2x  -  9)(x + 7) both are factors of mx<sup>2</sup> + nx  -  63, then which of the following is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (2x - 9)(x + 7) &#2342;&#2379;&#2344;&#2379;&#2306; mx<sup>2</sup> + nx - 63 &#2325;&#2375; &#2327;&#2369;&#2339;&#2344;&#2326;&#2306;&#2337; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2m = n - 1</span><span class=\"hqt\" style=\"display:none\">2m = n - 1</span>",
      "<span class=\"eqt\">2m = 5n</span><span class=\"hqt\" style=\"display:none\">2m = 5n</span>",
      "<span class=\"eqt\">m = 2n</span><span class=\"hqt\" style=\"display:none\">m = 2n</span>",
      "<span class=\"eqt\">m + 1 = n</span><span class=\"hqt\" style=\"display:none\">m + 1 = n</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>(2x  -  9)(x + 7) = mx<sup>2</sup> + nx  -  63</p><p>=&gt; 2x<sup>2</sup> + 5x  -  63 = mx<sup>2</sup> + nx  -  63</p><p>So, m = 2, and n = 5</p><p>Checking by options:</p><p>(a) 2m = n - 1</p><p>=&gt; 2 * 2 = 5  -  1</p><p>=&gt; 4 = 4 (True)</p><p>(b) 2m = 5n</p><p>=&gt; 2 * 2 = 5 * 5</p><p>=&gt; 4 &#8800; 25 (False)</p><p>(c) m = 2n</p><p>=&gt; 2 = 2 * 5</p><p>=&gt; 2 &#8800; 10 (False)</p><p>(d) m + 1 = n</p><p>=&gt; 2 + 1 = 5</p><p>=&gt; 3 &#8800; 5 (False)</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a quadratic equation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2342;&#2381;&#2357;&#2367;&#2328;&#2366;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">p(p  -  1) = (p + 7)<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">p(p  -  1) = (p + 7)<sup>2</sup></span>",
      "<span class=\"eqt\">q<sup>3</sup>  -  3q + 4 = (q<sup>2</sup>  -  1)(2q + 1)</span><span class=\"hqt\" style=\"display:none\">q<sup>3</sup>  -  3q + 4 = (q<sup>2</sup>  -  1)(2q + 1)</span>",
      "<span class=\"eqt\">r(5r  -  6) = r<sup>2</sup> + 2</span><span class=\"hqt\" style=\"display:none\">r(5r  -  6) = r<sup>2</sup> + 2</span>",
      "<span class=\"eqt\">(s<sup>2</sup>  -  2)<sup>2</sup> = s<sup>3</sup> - 3</span><span class=\"hqt\" style=\"display:none\">(s<sup>2</sup>  -  2)<sup>2</sup> = s<sup>3</sup> - 3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>a) p(p  -  1) = (p + 7)<sup>2</sup> =&gt; 15p + 49 = 0</p><p>b) q<sup>3</sup>  -  3q + 4 = (q<sup>2</sup>  -  1)(2q + 1) =&gt; q<sup>3</sup> + q<sup>2</sup> + q  -  5 = 0</p><p>c) r(5r  -  6) = r<sup>2</sup> + 2 =&gt; 2r<sup>2</sup>  -  3r  -  1 = 0</p><p>d) (s<sup>2</sup>  -  2)<sup>2</sup> = s<sup>3</sup>  -  3 =&gt; s<sup>4</sup>  -  s<sup>3</sup>  -  4s<sup>2</sup>+ 7 = 0</p><p>Hence, option 'c' is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following equations has roots 17 and 19? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2375; &#2350;&#2370;&#2354; 17 &#2324;&#2352; 19 &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">X<sup>2</sup>  -  36X + 313 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup>  -  36X + 313 = 0</span>",
      "<span class=\"eqt\">X<sup>2</sup>  -  36X + 393 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup>  -  36X + 393 = 0</span>",
      "<span class=\"eqt\">X<sup>2</sup>  -  36X + 293 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup>  -  36X + 293 = 0</span>",
      "<span class=\"eqt\">X<sup>2</sup>  -  36X + 323 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup>  -  36X + 323 = 0</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>(a) </p><p>313 = Products of roots = 313 * 1 [Not satisfied]</p><p>(b) </p><p>393 = Products of roots = 3 * 131 [Not satisfied]</p><p>(c) </p><p>293 = Products of roots = 293 * 1 [Not satisfied]</p><p>(d) </p><p>323 = Products of roots = 17 * 19 [Satisfied]</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the quadratic equation that has one root is 7 + &radic;9. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2342;&#2381;&#2357;&#2367;&#2328;&#2366;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2325;&#2366; &#2319;&#2325; &#2350;&#2370;&#2354; 7 + &radic;9 &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">X<sup>2</sup> + 14X + 40 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup> + 14X + 40 = 0</span>",
      "<span class=\"eqt\">X<sup>2</sup> + 14X + 40 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup> + 14X + 40 = 0</span>",
      "<span class=\"eqt\">X<sup>2</sup>  -  14X + 40 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup>  -  14X + 40 = 0</span>",
      "<span class=\"eqt\">X<sup>2</sup>  -  14X + 49 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup>  -  14X + 49 = 0</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>One root = 7 + &radic;9 </p><p>Other root = 7 - &radic;9 </p><p>The required quadratic equation = X<sup>2</sup>  -  (&#946; + &#945;) X + &#946;&#945; = 0 </p><p>X<sup>2</sup>  -  (7 + &radic;9 + 7  -  &radic;9) X + (7 + &radic;9) (7  -  &radic;9) = 0 </p><p>X<sup>2</sup>  -  14X + 40 = 0 </p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If one root of the equation 2x<sup>2</sup>  -  x = 10 is 2, find the other root.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; 2x<sup>2</sup> - x = 10 &#2325;&#2366; &#2319;&#2325; &#2350;&#2370;&#2354; 2 &#2361;&#2376;, &#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2366; &#2350;&#2370;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">-3/2</span><span class=\"hqt\" style=\"display:none\">-3/2</span>",
      "<span class=\"eqt\">3/2</span><span class=\"hqt\" style=\"display:none\">3/2</span>",
      "<span class=\"eqt\">-1/2</span><span class=\"hqt\" style=\"display:none\">-1/2</span>",
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the other root of the equation be x</p><p>Sum of roots of equation = -b/a</p><p>x + 2 = 1/2</p><p>x = -3/2</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The sum of roots of the equation 4x<sup>2</sup>  -  mx + n = 0 is 20, if one root of the equation is 7/2, then find the value of 'n'.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2368;&#2325;&#2352;&#2339; 4x<sup>2</sup> - mx + n = 0 &#2325;&#2375; &#2350;&#2370;&#2354;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 20 &#2361;&#2376;, &#2351;&#2342;&#2367; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2366; &#2319;&#2325; &#2350;&#2370;&#2354; 7/2 &#2361;&#2376;, &#2340;&#2379; 'n' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">241</span><span class=\"hqt\" style=\"display:none\">241</span>",
      "<span class=\"eqt\">231</span><span class=\"hqt\" style=\"display:none\">231</span>",
      "<span class=\"eqt\">181</span><span class=\"hqt\" style=\"display:none\">181</span>",
      "<span class=\"eqt\">251</span><span class=\"hqt\" style=\"display:none\">251</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Sum of roots of the equation = 20</p><p>m/4=20</p><p>m = 80</p><p>One root of the equation = 7/2</p><p>Now,</p><p>4x<sup>2</sup>  -  mx + n = 0</p><p>4*(7/2)<sup>2</sup>  -  80*7/2 + n = 0</p><p>49  -  280 + n = 0</p><p>n = 231</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If p and q are the roots of equation x<sup>2</sup>  -  15x + 56 = 0, and p is also the root of the equation 3x<sup>2</sup>  -  20x  -  7 = 0, the what is the value of (p - q)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; p &#2324;&#2352; q &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; x<sup>2</sup> - 15x + 56 = 0 &#2325;&#2375; &#2350;&#2370;&#2354; &#2361;&#2376;&#2306;, &#2324;&#2352; p &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; 3x<sup>2</sup> - 20x - 7 = 0 &#2325;&#2366; &#2350;&#2370;&#2354; &#2349;&#2368; &#2361;&#2376;, &#2340;&#2379; (p - q) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">-1</span><span class=\"hqt\" style=\"display:none\">-1</span>",
      "<span class=\"eqt\">-2</span><span class=\"hqt\" style=\"display:none\">-2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>x<sup>2</sup>  -  15x + 56 = 0</p><p>x<sup>2</sup>  -  7x  -  8x + 56 = 0</p><p>(x  -  7)(x  -  8) = 0</p><p>x = 7, 8</p><p>3x<sup>2</sup>  -  20x  -  7 = 0</p><p>3x<sup>2</sup>  -  21x + x  -  7 = 0</p><p>(x  -  7)(3x + 1) = 0</p><p>x = 7, -1/3</p><p>p = 7 and q = 8</p><p>p  -  q = 7  -  8 = -1</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a quadratic equation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2342;&#2381;&#2357;&#2367;&#2328;&#2366;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">(x  -  2)<sup>2</sup> = 2x  -  8</span><span class=\"hqt\" style=\"display:none\">(x  -  2)<sup>2</sup> = 2x  -  8</span>",
      "<span class=\"eqt\">(x + 3)(x  -  5) = (x  -  4)(x + 6)</span><span class=\"hqt\" style=\"display:none\">(x + 3)(x  -  5) = (x  -  4)(x + 6)</span>",
      "<span class=\"eqt\">(x + 2) (2x  -  3) = x(x  -  5)</span><span class=\"hqt\" style=\"display:none\">(x + 2) (2x  -  3) = x(x  -  5)</span>",
      "<span class=\"eqt\">x<sup>3</sup>  -  2x<sup>2</sup> + 3x + 2 = x<sup>3</sup> + (2)<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">x<sup>3</sup>  -  2x<sup>2</sup> + 3x + 2 = x<sup>3</sup> + (2)<sup>3</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>a) (x  -  2)<sup>2</sup> = 2x  -  8</p><p>x<sup>2 </sup>+ 4  -  4x = 2x  -  8 </p><p>x<sup>2</sup>  -  6x + 12 = 0 (Quadratic)</p><p>b) (x + 3)(x  -  5) = (x  -  4)(x + 6)</p><p>x<sup>2 </sup>+ 3x  -  5x  -  15 = x<sup>2</sup>  -  4x + 6x  -  24</p><p>4x  -  9 = 0 (Not Quadratic)</p><p>c) (x + 2) (2x  -  3) = x(x  -  5)</p><p>2x<sup>2</sup> + 4x  -  3x  -  6 = x<sup>2</sup>  -  5x</p><p>x<sup>2</sup> + 6x  -  6 = 0 (Quadratic)</p><p>d) x<sup>3</sup>  -  2x<sup>2</sup> + 3x + 2 = x<sup>3</sup> + (2)<sup>3</sup></p><p>x<sup>3</sup>  -  2x<sup>2</sup> + 3x + 2 = x<sup>3</sup> + 8</p><p>-2x<sup>2</sup> + 3x + 2  -  8 = 0</p><p>2x<sup>2</sup>  -  3x + 6 = 0 (Quadratic)</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>What is the square root of the following?</p><p>(X<sup>2</sup> + 26X + 169) (X<sup>2</sup> + 38X + 361) </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2357;&#2352;&#2381;&#2327;&#2350;&#2370;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p>(X<sup>2</sup> + 26X + 169) (X<sup>2</sup> + 38X + 361) </p></span>",
    "options": [

    "question": "<span class=\"eqt\"><p><div>&nbsp;If &alpha; and &beta; are roots of x<sup>2</sup> - x - 1 = 0, then the equation whose roots are&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">&alpha;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&beta;</span></div>&nbsp;and&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">&beta;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&alpha;</span></div>&nbsp;is:&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; &#945; &#2324;&#2352; &#946;, x<sup>2</sup> - x - 1 = 0 &#2325;&#2375; &#2350;&#2370;&#2354; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2357;&#2361; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2332;&#2367;&#2360;&#2325;&#2375; &#2350;&#2370;&#2354; <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">&alpha;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&beta;</span></div>&#2324;&#2352;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">&beta;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&alpha;</span></div> &#2361;&#2376;&#2306;:</div></p></span>",

    "solution": "<p>We know, if &#945; and &#946; are roots of the equation ax<sup>2</sup> + bx + c, then</p><p>&#945; = -b/a and &#946; = c/a</p><p>In the given equation x<sup>2</sup>  -  x  -  1 = 0:</p><p>&#945; + &#946; = -(-1)/1 = 1</p><p>And &#945;&#946; = (-1)/1 = -1</p><p>Now, (&#945; + &#946;)<sup>2</sup> = &#945;<sup>2</sup> + &#946;<sup>2</sup> + 2&#945;&#946;</p><p>1<sup>2</sup> = &#945;<sup>2</sup> + &#946;<sup>2</sup> + 2 * (-1)</p><p>&#945;<sup>2</sup> + &#946;<sup>2</sup> = 3</p><p>Then, &#945;/&#946; + &#946;/&#945; = (&#945;<sup>2</sup> + &#946;<sup>2</sup>)/&#945;&#946; = 3/(-1) = -3</p><p>And &#945;/&#946; * &#946;/&#945; = 1</p><p>Therefore, the equation whose roots are -3 and 1 is:</p><p>x<sup>2</sup> + (-3)x + 1 = 0</p><p>x<sup>2</sup>  -  3x + 1 = 0</p>",
