        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If x<sup>3/2</sup> + y<sup>3/2</sup> + z<sup>3/2</sup> = 3(xyz)<sup>1/2</sup> and &radic;x + &radic;y + &radic;z &#8800; 0, what is the value of (x + y + z)/(2&radic;(xy) + 2&radic;(yz)+ 2&radic;(zx))?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; x<sup>3/2</sup> + y<sup>3/2</sup> + z<sup>3/2</sup> = 3(xyz)<sup>1/2</sup> &#2340;&#2341;&#2366; &radic;x + &radic;y + &radic;z &#8800; 0, &#2340;&#2379; (x + y + z)/(2&radic;(xy) + 2&radic;(yz)+ 2&radic;(zx)) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>",
      "<span class=\"eqt\">&#8722;1/2</span><span class=\"hqt\" style=\"display:none\">&#8722;1/2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>x<sup>3/2</sup> + y<sup>3/2</sup> + z<sup>3/2</sup> = 3(xyz)<sup>1/2</sup></p><p>=&gt;(&radic;x)<sup>3</sup> + (&radic;y)<sup>3</sup> + (&radic;z)<sup>3</sup> &#8722; 3&radic;x&radic;y&radic;z = 0</p><p>=&gt;(&radic;x + &radic;y + &radic;z)((&radic;x)<sup>2</sup> + (&radic;y)<sup>2</sup> + (&radic;z)<sup>2</sup> &#8722; &radic;x&radic;y &#8722; &radic;y&radic;z &#8722; &radic;z&radic;x) = 0</p><p>Since, &radic;x + &radic;y + &radic;z &#8800; 0</p><p>&#8756;(&radic;x)<sup>2</sup> + (&radic;y)<sup>2</sup> + (&radic;z)<sup>2</sup> &#8722; &radic;x&radic;y &#8722; &radic;y&radic;z &#8722; &radic;z&radic;x = 0</p><p>=&gt;x + y + z = &radic;(xy) + &radic;(yz) + &radic;(zx)</p><p>=&gt;(x + y + z)/(2&radic;(xy) + 2&radic;(yz) + 2&radic;(zx)) = 1/2</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If a<sup>2</sup> + 4b<sup>2</sup> + 49c<sup>2</sup> + 18 <b>= </b>2(2b + 28c - a), then the value of (3a + 2b + 7c) is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a<sup>2</sup> + 4b<sup>2</sup> + 49c<sup>2</sup> + 18 = 2(2b + 28c - a), &#2340;&#2379; (3a + 2b + 7c) &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>a<sup>2</sup> + 4b<sup>2</sup> + 49c<sup>2</sup> + 18 = 2(2b + 28c - a)</p><p>=&gt; a<sup>2</sup> + 2a + 1 + 4b<sup>2</sup>  -  4b + 1 + 49c<sup>2</sup>  -  56c + 16 = 0</p><p>=&gt; (a + 1)<sup>2</sup> + (2b  -  1)<sup>2</sup> + (7c  -  4)<sup>2</sup> = 0</p><p>Thus, a = -1, b = 1/2 and c = 4/7</p><p>Hence, 3a + 2b + 7c = 3 * (-1) + 2 * (&frac12;) + 7 * (4/7) = 2</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What is the value of [(a<sup>2</sup>  -  12bc  -  4c<sup>2</sup>  -  9b<sup>2</sup>)/(a<sup>2</sup>  -  4c<sup>2</sup> + 6ab + 9b<sup>2</sup>)]?</p></span><span class=\"hqt\" style=\"display:none\"><p>[(a<sup>2</sup> - 12bc - 4c<sup>2</sup> - 9b<sup>2</sup>)/(a<sup>2</sup> - 4c<sup>2</sup> + 6ab + 9b<sup>2</sup>)] &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">(a + 3b + 2c)/(a + 3b - 2c)</span><span class=\"hqt\" style=\"display:none\">(a + 3b + 2c)/(a + 3b - 2c)</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">(a  -  3b  -  2c)/(a + 3b - 2c)</span><span class=\"hqt\" style=\"display:none\">(a  -  3b  -  2c)/(a + 3b - 2c)</span>",
      "<span class=\"eqt\">(a  -  3b + 2c)/(a + 3b - 2c)</span><span class=\"hqt\" style=\"display:none\">(a  -  3b + 2c)/(a + 3b - 2c)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>[(a<sup>2</sup>  -  12bc  -  4c<sup>2</sup>  -  9b<sup>2</sup>)/(a<sup>2</sup>  -  4c<sup>2</sup> + 6ab + 9b<sup>2</sup>)]</p><p>= [(a<sup>2</sup>  -  (9b<sup>2</sup> + 12bc + 4c<sup>2</sup>))/((a<sup>2</sup> + 6ab + 9b<sup>2</sup>)  -  4c<sup>2</sup>)]</p><p>= [(a<sup>2</sup>  -  (3b + 2c)<sup>2</sup>)/((a + 3b)<sup>2</sup> - (2c)<sup>2</sup>]</p><p>= [{(a  -  (3b + 2c))(a + 3b + 2c)}/{(a + 3b  -  2c)(a + 3b + 2c)}]</p><p>= (a  -  3b  -  2c)/(a + 3b - 2c)</p>",
    "question_index": 2

  {
    "question": "<span class=\"eqt\"><p>Expand <img width=91 height=43 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11637/image002.png\">.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; <img width=91 height=43 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11637/image002.png\">.</p></span>",
    "options": [
      "<span class=\"eqt\">a<sup>2</sup>/4 + 4b<sup>2</sup>/9 + 9c<sup>2</sup>/16 + ab/3 + bc/2 + 3ac/4</span><span class=\"hqt\" style=\"display:none\">a<sup>2</sup>/4 + 4b<sup>2</sup>/9 + 9c<sup>2</sup>/16 + ab/3 + bc/2 + 3ac/4</span>",
      "<span class=\"eqt\">a<sup>2</sup>/4 + 4b<sup>2</sup>/9 + 9c<sup>2</sup>/16 + 2ab/3 + bc + 3ac/4</span><span class=\"hqt\" style=\"display:none\">a<sup>2</sup>/4 + 4b<sup>2</sup>/9 + 9c<sup>2</sup>/16 + 2ab/3 + bc + 3ac/4</span>",
      "<span class=\"eqt\">a<sup>2</sup>/4 + 4b<sup>2</sup>/9 + 9c<sup>2</sup>/16 + ab + bc + 3ac/4</span><span class=\"hqt\" style=\"display:none\">a<sup>2</sup>/4 + 4b<sup>2</sup>/9 + 9c<sup>2</sup>/16 + ab + bc + 3ac/4</span>",
      "<span class=\"eqt\">a<sup>2</sup>/4 + 4b<sup>2</sup>/9 + 9c<sup>2</sup>/16 + 2ab/3 + bc/3 + 3ac</span><span class=\"hqt\" style=\"display:none\">a<sup>2</sup>/4 + 4b<sup>2</sup>/9 + 9c<sup>2</sup>/16 + 2ab/3 + bc/3 + 3ac</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>We know that:</p><p><b>(a + b + c)<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup> + 2ab + 2bc + 2ca</b></p><p><img width=365 height=120 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11637/image003.png\"></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If a<sup>3</sup> + b<sup>3 </sup>+ c<sup>3 </sup>= 2477, a + b + c = 23, and (a  -  b)<sup>2</sup> + (b  -  c)<sup>2</sup> + (c  -  a)<sup>2</sup> = 134, then abc is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a<sup>3</sup> + b<sup>3 </sup>+ c<sup>3 </sup>= 2477, a + b + c = 23, &#2340;&#2341;&#2366; (a - b)<sup>2</sup> + (b - c)<sup>2</sup> + (c - a)<sup>2</sup> = 134, &#2340;&#2379; abc &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">234</span><span class=\"hqt\" style=\"display:none\">234</span>",
      "<span class=\"eqt\">936</span><span class=\"hqt\" style=\"display:none\">936</span>",
      "<span class=\"eqt\">312</span><span class=\"hqt\" style=\"display:none\">312</span>",
      "<span class=\"eqt\">468</span><span class=\"hqt\" style=\"display:none\">468</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup>  -  3abc = [(a + b + c)/2][(a  -  b)<sup>2</sup> + (b  -  c)<sup>2</sup> + (c  -  a)<sup>2</sup>]</p><p>2477  -  3abc = 23/2 * 134 </p><p>3abc = 2477  -  1541 </p><p>abc = 936/3 = 312</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If a + b = 3, b + c = 5 and 2ac  -  b<sup>2</sup> = 2, then find the value of (a + b + c)<sup>2</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a + b = 3, b + c = 5 &#2324;&#2352; 2ac - b<sup>2</sup> = 2 &#2361;&#2376;, &#2340;&#2379; (a + b + c)<sup>2 </sup>&#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">38</span><span class=\"hqt\" style=\"display:none\">38</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>We have, (a + b + c)<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup> + 2ab + 2bc + 2ac</p><p>= a<sup>2</sup> + b<sup>2</sup> + 2ab + c<sup>2 </sup>+ 2bc + 2ac</p><p>= a<sup>2</sup> + b<sup>2</sup> + 2ab + b<sup>2</sup> + c<sup>2 </sup>+ 2bc + 2ac  -  b<sup>2</sup></p><p>= (a + b)<sup>2 </sup>+ (b + c)<sup>2</sup> + (2ac  -  b<sup>2</sup>)</p><p>= 3<sup>2</sup> + 5<sup>2</sup> + 2</p><p>= 36</p>",
    "question_index": 5

  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>(a - b)(b - c)</span></div> - <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>(b - c)(c - a)</span></div> - <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>(c - a)(a - b)</span></div> = 2, then which of the following is correct&quest;&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>(a - b)(b - c)</span></div> - <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>(b - c)(c - a)</span></div> - <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>(c - a)(a - b)</span></div> = 2 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2361;&#2368; &#2361;&#2376;?</div></p></span>",
    "options": [
      "<span class=\"eqt\">(a - b) (b  -  c) = 2</span><span class=\"hqt\" style=\"display:none\">(a - b) (b - c) = 2</span>",

    "correct_option_id": 3,
    "solution": "<p><img width=307 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18409/image020.png\"></p><p><img width=153 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18409/image021.png\"></p><p><img width=153 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18409/image022.png\"></p><p><img width=111 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18409/image023.png\"></p><p><img width=109 height=23 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18409/image024.png\"></p>",
