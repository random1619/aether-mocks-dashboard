<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>

                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>

    </div>

                <!-- Dynamically populated question container -->

                <!-- Controls -->
                <div class="nav-controls">

                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>

                    <div class="stat-item">

                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>

        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In two concentric circles, the tangent of smaller circle is the chord of larger circle. Radius of the circles are (a + 7) cm and (2a + 3) cm. If the length of chord is 42 cm, then find the value of a.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2368;&#2351; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2331;&#2379;&#2335;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366; &#2348;&#2337;&#2364;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2332;&#2368;&#2357;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2319;&#2305; (a + 7) &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; (2a + 3) &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2332;&#2368;&#2357;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 42 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; a &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">16 cm</span><span class=\"hqt\" style=\"display:none\">16 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">19 cm</span><span class=\"hqt\" style=\"display:none\">19 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">13 cm</span><span class=\"hqt\" style=\"display:none\">13 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">11 cm</span><span class=\"hqt\" style=\"display:none\">11 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=152 height=138 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21879/image012.jpg\" ></p><p>AC = a + 7 and AB = 2a + 3</p><p>BC = 42/2 = 21 cm</p><p>In &#8710;ABC-</p><p>AB<sup>2</sup> = BC<sup>2</sup> + AC<sup>2</sup></p><p>(2a + 3)<sup>2</sup> = 21<sup>2</sup> + (a + 7)<sup>2</sup></p><p>4a<sup>2</sup> + 9 + 12a = 441 + a<sup>2</sup> + 49 + 14a</p><p>3a<sup>2</sup> -2a  -  481 = 0</p><p>3a<sup>2</sup> -39a + 37a  -  481 = 0</p><p>(13a + 37)(a  -  13) = 0</p><p>a = 13 cm, -37/13</p><p>So, a = 13 cm</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>From an external point P, two tangents PA and PB are drawn to a circle with centre O and diameter 20 mm. If PA + PB = 60 mm, then find the measure of length OP.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2366;&#2361;&#2352;&#2368; &#2348;&#2367;&#2306;&#2342;&#2369; P &#2360;&#2375;, &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2324;&#2352; &#2357;&#2381;&#2351;&#2366;&#2360; 20 &#2350;&#2367;&#2350;&#2368; &#2357;&#2366;&#2354;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2346;&#2352; &#2342;&#2379; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305; PA &#2324;&#2352; PB &#2326;&#2368;&#2306;&#2330;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; PA + PB = 60 &#2350;&#2367;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; OP &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">20&radic;10 mm</span><span class=\"hqt\" style=\"display:none\">20&radic;10 &#2350;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">20 mm</span><span class=\"hqt\" style=\"display:none\">20 &#2350;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">10&radic;10 mm</span><span class=\"hqt\" style=\"display:none\">10&radic;10 &#2350;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">20&radic;5 mm</span><span class=\"hqt\" style=\"display:none\">20&radic;5 &#2350;&#2367;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>According to the question:</p><p><img width=333 height=202 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21886/image015.png\"></p><p>PA + PB = 60 mm</p><p>PA = PB</p><p>So, PA = 60/2 = 30 mm</p><p>Radius of circle = OA = OB = 20/2 = 10 mm</p><p>Now, in &#916;OAP:</p><p>OA<sup>2</sup> + PA<sup>2</sup> = OP<sup>2</sup></p><p>10<sup>2</sup> + 30<sup>2</sup> = OP<sup>2</sup></p><p>OP<sup>2 </sup>= 1000</p><p><b>OP = 10&radic;10 mm</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>On a circle of centre O, from point B, a tangent BA is drawn that meets circle at point A. If OA = 9 cm, and AB = 12 cm, then find the length of OB.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2357;&#2366;&#2354;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2346;&#2352;, &#2348;&#2367;&#2306;&#2342;&#2369; B &#2360;&#2375; &#2319;&#2325; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366; BA &#2326;&#2368;&#2306;&#2330;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2332;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; A &#2346;&#2352; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; OA = 9 &#2360;&#2375;&#2350;&#2368;, &#2324;&#2352; AB = 12 &#2360;&#2375;&#2350;&#2368;, &#2340;&#2379; OB &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">18 cm</span><span class=\"hqt\" style=\"display:none\">18 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">16 cm</span><span class=\"hqt\" style=\"display:none\">16 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">21 cm</span><span class=\"hqt\" style=\"display:none\">21 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">15 cm</span><span class=\"hqt\" style=\"display:none\">15 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=370 height=215 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21909/image007.png\"></p><p>We know that &#8736; OAB = 90&deg;</p><p>In &#916; OAB,</p><p>OB<sup>2</sup> = OA<sup>2</sup> + AB<sup>2</sup></p><p>OB<sup>2</sup> = 81 + 144</p><p>OB<sup>2</sup> = 225</p><p>OB = 15 cm</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The diameter of the circle in which a central angle of 50&deg; intercepts an arc of length 20 cm is -</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; 50&deg; &#2325;&#2366; &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2368;&#2351; &#2325;&#2379;&#2339; 20 &#2360;&#2375;&#2350;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2375; &#2330;&#2366;&#2346; &#2325;&#2379; &#2325;&#2366;&#2335;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">108/&#960; cm</span><span class=\"hqt\" style=\"display:none\">108/&#960; &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">144/&#960; cm</span><span class=\"hqt\" style=\"display:none\">144/&#960; &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">216/&#960; cm</span><span class=\"hqt\" style=\"display:none\">216/&#960; &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">132/&#960; cm</span><span class=\"hqt\" style=\"display:none\">132/&#960; &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let diameter of the circle = 2r cm</p><p>Now,</p><p>Length of arc = 20 cm</p><p>(50&deg;/360&deg;) * 2&#960;r = 20</p><p>r = 360/5&#960;</p><p>r = 72/&#960; cm</p><p>Diameter of the circle = 2*72/&#960; = 144/&#960; cm</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In a circle two chords AB and CD intersect at point O. If AO = 14 cm, BO = 21 cm and CO = 15 cm. what is the length of CD?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2350;&#2375;&#2306; &#2342;&#2379; &#2332;&#2368;&#2357;&#2366;&#2319;&#2305; AB &#2324;&#2352; CD &#2348;&#2367;&#2306;&#2342;&#2369; O &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; AO = 14 &#2360;&#2375;&#2350;&#2368;, BO = 21 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; CO = 15 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; CD &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">38.6 cm</span><span class=\"hqt\" style=\"display:none\">38.6 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">35.6 cm</span><span class=\"hqt\" style=\"display:none\">35.6 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">40.6 cm</span><span class=\"hqt\" style=\"display:none\">40.6 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">34.6 cm</span><span class=\"hqt\" style=\"display:none\">34.6 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=190 height=172 id=\"Picture 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24543/image005.png\"></p><p>AO * BO = CO * DO</p><p>14 * 21 = 15 * DO</p><p>DO = 19.6 cm</p><p>CD = 15 + 19.6 = 34.6 cm</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Two circles with centres W and V touch each other externally at point X. W is the centre of bigger circle and WV is produced to a point S. If STU is the common tangent to the circles at T and U where T is a point on the smaller circle, the ratio of radii of the circles is 9: 5 and SW = 84 cm, then what is the length of TU?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; W &#2324;&#2352; V &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; X &#2346;&#2352; &#2348;&#2366;&#2361;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; W &#2348;&#2337;&#2364;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2361;&#2376; &#2324;&#2352; WV &#2325;&#2379; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; S &#2340;&#2325; &#2348;&#2338;&#2364;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; STU, T &#2324;&#2352; U &#2346;&#2352; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2313;&#2349;&#2351;&#2344;&#2367;&#2359;&#2381;&#2336; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366; &#2361;&#2376;, &#2332;&#2361;&#2366;&#2305; T &#2331;&#2379;&#2335;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2346;&#2352; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2361;&#2376;, &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 9: 5 &#2324;&#2352; SW = 84 cm &#2361;&#2376;, &#2340;&#2379; TU &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12&radic;5 cm</span><span class=\"hqt\" style=\"display:none\">12&radic;5 cm</span>",
      "<span class=\"eqt\">18&radic;5 cm</span><span class=\"hqt\" style=\"display:none\">18&radic;5 cm</span>",
      "<span class=\"eqt\">20&radic;5 cm</span><span class=\"hqt\" style=\"display:none\">20&radic;5 cm</span>",
      "<span class=\"eqt\">16&radic;5 cm</span><span class=\"hqt\" style=\"display:none\">16&radic;5 cm</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=376 height=136 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15951/image015.jpg\"></p><p>Radius of larger circle = 9x cm</p><p>Radius of smaller circle = 5x cm</p><p>UT = &radic;[(9x + 5x)<sup>2</sup>  -  (9x  -  5x)<sup>2</sup> ] = &radic;(196x<sup>2</sup>  -  16x<sup>2</sup>) = &radic;(180x<sup>2</sup>) = 6x&radic;5 cm</p><p>In &#8710;SVT and &#8710;SWU,</p><p>&#8736;STV = &#8736;SUW</p><p>&#8736;SVT = &#8736;SWU</p><p>Thus, &#8710;SVT ~ &#8710;SWU</p><p>VT/WU = SV/SW</p><p>=&gt; 5/9 = (84  -  14x)/84</p><p>=&gt; 84 * 5/9 = 84  -  14x</p><p>=&gt; 14x = 112/3</p><p>=&gt; x = 8/3</p><p>Hence, TU = 6&radic;5 * 8/3 = 16&radic;5 cm</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In the adjoining figure A, B, C and D are concyclic points. Find the value of x.</p><p><img width=298 height=251 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/17991/image002.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2360;&#2344;&#2381;&#2344; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; A, B, C &#2324;&#2352; D &#2360;&#2350;&#2357;&#2352;&#2381;&#2340;&#2368; &#2348;&#2367;&#2306;&#2342;&#2369; &#2361;&#2376;&#2306;&#2404; x &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p><img width=\"298\" height=\"251\" id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/17991/image002.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">85&#730;</span><span class=\"hqt\" style=\"display:none\">85&#730;</span>",
      "<span class=\"eqt\">105&#730;</span><span class=\"hqt\" style=\"display:none\">105&#730;</span>",
      "<span class=\"eqt\">95&#730;</span><span class=\"hqt\" style=\"display:none\">95&#730;</span>",
      "<span class=\"eqt\">115&#730;</span><span class=\"hqt\" style=\"display:none\">115&#730;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#8736;ABC = 180&#730;- 85&#730; = 95&#730;(linear pair)</p> <p>&#8736;ADC = 180&#730;- 95&#730; = 85&#730;(opposite angles of cyclic quadrilateral)</p> <p>X = 180&#730;- 85&#730; = 95&#730;(linear pair)</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>In the given figure, &#8736;AQC = 70&deg; and &#8736;BCD = 130&deg;, then what is the value of &#8736;APB?</p><p><img width=339 height=283 id=Image6 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p10052/image006.gif\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, &#8736;AQC = 70&deg; &#2324;&#2352; &#8736;BCD = 130&deg; &#2361;&#2376;, &#2340;&#2379; &#8736;APB &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p><p><img width=\"339\" height=\"283\" id=\"Image6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p10052/image006.gif\"></p></span>",

    "correct_option_id": 0,
    "solution": "<p>Since quadrilateral ABCD is cyclic.</p><p>So, &#8736;BAD = 180&deg; - &#8736;BCD = 180&deg; -130&deg;</p><p>=&gt; &#8736;BAD = 50&deg;</p><p>And in &#8710;AQD,</p><p>&#8736;ADQ = 180&deg; - &#8736;BAD - &#8736;AQD</p><p>=&gt; &#8736;ADQ = 180&deg;  -  50&deg;  -  70&deg;</p><p>=&gt; &#8736;ADQ = 60&deg;</p><p>So, &#8736;ABC = 180&deg; - &#8736;ADC</p><p>=&gt; &#8736;ABC = 180&deg;  -  60&deg;</p><p>=&gt; &#8736;ABC = 120&deg;</p><p>Thus, in &#8710;ABP,</p><p>&#8736;APB = 180 - &#8736;PAB - &#8736;PBA</p><p>=&gt; &#8736;APB = 180  -  50  -  120</p><p>=&gt; &#8736;APB = 10&deg;</p>",

    "question": "<span class=\"eqt\"><p>In the given figure, X is the centre of the circle, XW &#8869; YZ and &#8736;ZYV = 32&deg;. What is the value of &#8736;YUW?</p><p><img width=188 height=175 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15951/image014.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, &#2348;&#2367;&#2306;&#2342;&#2369; X &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2361;&#2376; &#2340;&#2341;&#2366; XW &#8869; YZ &#2324;&#2352; &#8736;ZYV = 32&deg; &#2361;&#2376;&#2404; &#8736;YUW &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p><p><img width=\"188\" height=\"175\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15951/image014.jpg\"></p></span>",

    "question": "<span class=\"eqt\"><p>In the given figure, ABCD is a cyclic quadrilateral with centre O, and &#8736;BDC = 110&deg;. Find the measure of &#8736;ABC.</p><p><img width=235 height=209 id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21879/image016.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2330;&#2367;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306;, ABCD &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2330;&#2325;&#2381;&#2352;&#2368;&#2351; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2361;&#2376; &#2324;&#2352; &#8736;BDC = 110&deg; &#2361;&#2376;&#2404; &#8736;ABC &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"235\" height=\"209\" id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21879/image016.jpg\"></p></span>",

    "question": "<span class=\"eqt\"><p>The radii of two circles are r and R and the distance between their centres is C. Find the number of common tangents between these two circles, if C = r + R.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2319;&#2305; r &#2324;&#2352; R &#2361;&#2376;&#2306; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; C &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; C = r + R &#2361;&#2376;, &#2340;&#2379; &#2311;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2313;&#2349;&#2351;&#2344;&#2367;&#2359;&#2381;&#2336; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>In a circle, PQ is a chord which produced to X such that XY is the tangent to the circle from point X. If XY = 6.5 cm and XQ = 2.5 cm, then find the value of PQ.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2350;&#2375;&#2306; PQ &#2319;&#2325; &#2332;&#2368;&#2357;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2375; X &#2340;&#2325; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2348;&#2397;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; XY, &#2348;&#2367;&#2306;&#2342;&#2369; X &#2346;&#2352; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; XY = 6.5 cm &#2324;&#2352; XQ = 2.5 cm &#2361;&#2376;, &#2340;&#2379; PQ &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Consider the following figure, P and Q are the centres of circles.</p><p><img width=232 height=175 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20435/image036.png\"></p><p>If AB = 8&radic;3 cm, and PQ = r cm, then find the value of PM.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2368;&#2332;&#2367;&#2319;, P &#2324;&#2352; Q &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2361;&#2376;&#2306;&#2404;</p><p><img width=\"232\" height=\"175\" id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20435/image036.png\"></p><p>&#2351;&#2342;&#2367; AB = 8&radic;3 cm &#2324;&#2352; PQ = r cm &#2361;&#2376;, &#2340;&#2379; PM &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Length of the minutes hand of a clock is 15 cm. Find out the total distance travelled by the minutes hand of the clock in 12 min?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2337;&#2364;&#2368; &#2325;&#2368; &#2350;&#2367;&#2344;&#2335; &#2325;&#2368; &#2360;&#2369;&#2312; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 15 cm &#2361;&#2376;&#2404; &#2328;&#2337;&#2364;&#2368; &#2325;&#2368; &#2350;&#2367;&#2344;&#2335; &#2357;&#2366;&#2354;&#2368; &#2360;&#2369;&#2312; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 12 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2368; &#2327;&#2312; &#2325;&#2369;&#2354; &#2342;&#2370;&#2352;&#2368; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",

    "question": "<span class=\"eqt\"><p>In a circle with center O, TX and TY are tangents to the circle at X and Y respectively, from an external point T. If &#8736; XOY = 108&deg;, then what is the measure of &#8736; OTY?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2350;&#2375;&#2306;, TX &#2324;&#2352; TY &#2319;&#2325; &#2348;&#2366;&#2361;&#2381;&#2351; &#2348;&#2367;&#2306;&#2342;&#2369; T &#2360;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; X &#2324;&#2352; Y &#2346;&#2352; &#2326;&#2368;&#2306;&#2330;&#2368; &#2327;&#2312; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#8736; XOY = 108&deg; &#2361;&#2376;, &#2340;&#2379; &#8736; OTY &#2325;&#2368; &#2350;&#2366;&#2346; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "solution": "<p><img width=394 height=228 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p17034/image026.jpg\" ></p><p>In &#916; OXY,</p><p>OX = OY</p><p>So, &#8736; OXY = &#8736; OYX</p><p>&#8736; OXY + &#8736; OYX + &#8736; YOX = 180</p><p>2 * &#8736; OXY = 180  -  108</p><p>&#8736; OXY = 36&deg;</p><p>We know that,</p><p>&#8736; XTY = 2 * &#8736; OXY = 2 * 36 = 72&deg;</p><p>And &#8736; OTY = &#8736; XTY/2 = 72/2 = 36&deg;</p>",
