<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Two pipes A and B can fill a tank in 20 hrs and 30 hrs respectively but due to a drainage pipe C, the tank gets filled in 60 hrs when all the three pipes are opened simultaneously. Find the time taken by pipes A and C to empty a fully filled tank, when opened together.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2346;&#2366;&#2311;&#2346;&#2375;&#2306; A &#2324;&#2352; B &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 20 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 30 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; &#2319;&#2325; &#2332;&#2354;&#2344;&#2367;&#2325;&#2366;&#2360;&#2368; &#2346;&#2366;&#2311;&#2346; C &#2325;&#2375; &#2325;&#2366;&#2352;&#2339;, &#2332;&#2348; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2361;&#2368; &#2360;&#2350;&#2351; &#2346;&#2352; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2335;&#2376;&#2306;&#2325; 60 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;| &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; C &#2325;&#2379; &#2332;&#2348; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2349;&#2352;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;|</p></span>",
    "options": [
      "<span class=\"eqt\">60 hrs</span><span class=\"hqt\" style=\"display:none\">60 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">30 hrs</span><span class=\"hqt\" style=\"display:none\">30 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">20 hrs</span><span class=\"hqt\" style=\"display:none\">20 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">15 hrs</span><span class=\"hqt\" style=\"display:none\">15 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Tank filled by A in 1 hr = 1/20</p><p>Tank filled by B in 1 hr = 1/30</p><p>Let tank leaked by C in 1 hr = 1/x</p><p> 1/20 + 1/30  -  1/x = 1/60</p><p> x = 15</p><p>Or pipe C can empty in 15 hours</p><p>Now A + C = 1/15  -  1/20</p><p>= (4  -  3)/60 = 1/60</p><p>= 60 hrs to empty</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Pipes A, B, and a leak C are connected to a tank. A and B can fill it in 6 and 9 hours, while C can empty it in 12 hours. The pipes A, B and C operate alternately starting with pipe A. How long will it take to fill the tank?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A, B &#2324;&#2352; &#2319;&#2325; &#2352;&#2367;&#2360;&#2366;&#2357; C &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2361;&#2376;&#2306;&#2404; A &#2324;&#2352; B &#2311;&#2360;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 6 &#2324;&#2352; 9 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; C &#2311;&#2360;&#2375; 12 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2366;&#2311;&#2346; A, B &#2324;&#2352; C, &#2346;&#2366;&#2311;&#2346; A &#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2325;&#2352; &#2348;&#2366;&#2352;&#2368;-&#2348;&#2366;&#2352;&#2368; &#2360;&#2375; &#2330;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">91/6 h</span><span class=\"hqt\" style=\"display:none\">91/6 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">48/5 h</span><span class=\"hqt\" style=\"display:none\">48/5 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">61/3 h</span><span class=\"hqt\" style=\"display:none\">61/3 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">24/5 h</span><span class=\"hqt\" style=\"display:none\">24/5 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the capacity be LCM (6, 9, 12) = 36 units.</p><p>Efficiency of A = 36/6 = +6 units/hr, B = 36/9 = +4 units/hr, C = 36/12 = -3 units/hr</p><p>Net work in one 3-hour cycle = 6 + 4 - 3 = 7 units.</p><p>To get close to 36 units, we run 5 full cycles.</p><p>Work done in 5 cycles = 5  X  7 = 35 units.</p><p>Time taken = 5  X  3 = 15 hours.</p><p>Remaining work = 36 - 35 = 1 unit.</p><p>After 15 hours, the cycle restarts with A.</p><p>Time taken by A to fill the remaining 1 unit = 1 / 6 hours.</p><p>Total time = 15 + 1/6 = <b>91/6 hours</b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe A can fill a tank in 8 hours, and Pipe B can fill the same tank in 12 hours. They work together for 3 hours, after which a leak (which empties the tank in 24 hours) opens. How much longer will it take to fill the tank completely?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 8 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2313;&#2360;&#2368; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 12 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2350;&#2367;&#2354;&#2325;&#2352; 3 &#2328;&#2306;&#2335;&#2375; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2319;&#2325; &#2352;&#2367;&#2360;&#2366;&#2357; &#2326;&#2369;&#2354; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; (&#2332;&#2379; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 24 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;)&#2404; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">5 h</span><span class=\"hqt\" style=\"display:none\">5 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">5 h 15 m</span><span class=\"hqt\" style=\"display:none\">5 &#2328;&#2306;&#2335;&#2375; 15 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">5 h 30 m</span><span class=\"hqt\" style=\"display:none\">5 &#2328;&#2306;&#2335;&#2375; 30 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">6 h</span><span class=\"hqt\" style=\"display:none\">6 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A+B rate = 1/8 + 1/12 = 5/24 tank/hr =&gt; in 3 h = 15/24 = 5/8 done</p><p>Remaining = 3/8; leak rate = 1/24 =&gt; net = 1/8 + 1/12  -  1/24 = 1/6 tank/hr</p><p>Time = (3/8)/(1/6) = 2.25 h = 2 h 15 m =&gt; total = 3 h + 2 h 15 m = 5 h 15 m</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A canal is filled by pipe X in 12 hours and by pipe Y in 16 hours. A leak at the bottom can empty the full canal in 48 hours. X and Y are opened together with the leak for 4 hours, then X is closed and only Y and the leak continue. How long from the start will it take to fill the canal?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2361;&#2352; &#2346;&#2366;&#2311;&#2346; X &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 12 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; Y &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 16 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2340;&#2354; &#2346;&#2352; &#2319;&#2325; &#2352;&#2367;&#2360;&#2366;&#2357; &#2346;&#2370;&#2352;&#2368; &#2344;&#2361;&#2352; &#2325;&#2379; 48 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; X &#2324;&#2352; Y &#2325;&#2379; &#2352;&#2367;&#2360;&#2366;&#2357; &#2325;&#2375; &#2360;&#2366;&#2341; 4 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2347;&#2367;&#2352; X &#2325;&#2379; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2325;&#2375;&#2357;&#2354; Y &#2324;&#2352; &#2352;&#2367;&#2360;&#2366;&#2357; &#2332;&#2366;&#2352;&#2368; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2361;&#2352; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">16 hours</span><span class=\"hqt\" style=\"display:none\">16 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">18 hours</span><span class=\"hqt\" style=\"display:none\">18 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">20 hours</span><span class=\"hqt\" style=\"display:none\">20 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">22 hours</span><span class=\"hqt\" style=\"display:none\">22 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>X's rate = 1/12 canal per hour</p><p>Y's rate = 1/16 canal per hour</p><p>Leak's rate =  - 1/48 canal per hour</p><p>Net rate for first 4 hours = 1/12 + 1/16  -  1/48 = (4 + 3  -  1)&#8201;&div;&#8201;48 = 6/48 = 1/8 canal per hour</p><p>Work done in 4 hours = 4  X  (1/8) = 1/2 of the canal</p><p>Remaining work = 1  -  1/2 = 1/2 of the canal</p><p>Net rate thereafter = 1/16  -  1/48 = (3  -  1)&#8201;&div;&#8201;48 = 2/48 = 1/24 canal per hour</p><p>Time to complete remaining = (1/2) &div; (1/24) = 12 hours</p><p>Total time = 4 + 12 = 16 hours</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe Y can fill a tank in 90 minutes and pipe Z can fill the tank in 72 minutes. If they both together can fill the tank at 75 m<sup>3</sup>/hour, then what is the volume of the tank? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; Y &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 90 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; Z &#2313;&#2360;&#2368; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 72 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2350;&#2367;&#2354;&#2325;&#2352; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 75 &#2350;&#2368;&#2335;&#2352;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;? </p></span>",
    "options": [
      "<span class=\"eqt\">50 m<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">50 &#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">60 m<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">60 &#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">45 m<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">45 &#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">30 m<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">30 &#2350;&#2368;<sup>3</sup></span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Total capacity (LCM of 90 and 72) = 360 units</p><p>Efficiency of pipe Y = 360/90 = 4 units/minute</p><p>Efficiency of pipe Z = 360/72 = 5 units/minute</p><p>Time taken by pipe Y and Z together to fill the tank = 360/(4 + 5) = 40 minutes</p><p>Volume of the tank = 75 * 40/60 = 50 m<sup>3</sup></p>",
    "question_index": 4
  },
  {

    "question": "<span class=\"eqt\"><p>Pipe A can fill a tank at 25 m<sup>3</sup>/minute. Pipe A and pipe B together can fill the same tank in 12 minutes. If the volume of the tank is 500 m<sup>3</sup>, then find the time taken by pipe B to fill the tank alone.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 25 &#2350;&#2368;<sup>3</sup>/&#2350;&#2367;&#2344;&#2335; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2350;&#2367;&#2354;&#2325;&#2352; &#2313;&#2360;&#2368; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 12 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 500 &#2350;&#2368;<sup>3</sup> &#2361;&#2376;, &#2340;&#2379; &#2346;&#2366;&#2311;&#2346; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2325;&#2375;&#2354;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Pipe A can fill a tank in 8 hours, while Pipe B can fill the same tank in 12 hours. Both pipes are opened together, and after 4 hours, the rate of Pipe B is reduced to half of its original. In how many total hours will the tank be completely filled?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 8 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2311;&#2346; B &#2313;&#2360;&#2368; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 12 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; 4 &#2328;&#2306;&#2335;&#2375; &#2348;&#2366;&#2342;, &#2346;&#2366;&#2311;&#2346; B &#2325;&#2368; &#2342;&#2352; &#2328;&#2335;&#2325;&#2352; &#2310;&#2343;&#2368; &#2352;&#2361; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2335;&#2306;&#2325;&#2368; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2375; &#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",

    "solution": "<p>Let, total work = 1 full tank</p><p>Rate of pipe A = 1/6 tank per hour</p><p>Rate of pipe B = 1/3 tank per hour</p><p>Rate of pipe C =  - 1/6 tank per hour</p><p>Work done in first 2 h by pipe A = 2  X  (1/6) = 1/3</p><p>Work done in next 2 h by pipe B = 2  X  (1/3) = 2/3</p><p>Work done in next 2 h by pipe C = 2  X  ( - 1/6) =  - 1/3</p><p>Net work after first 6 h = 1/3 + 2/3  -  1/3 = 2/3</p><p>Remaining work = 1  -  2/3 = 1/3</p><p>Combined rate of pipes A, B &amp; C = 1/6 + 1/3  -  1/6 = 1/3 tank per hour</p><p>Time to finish = (1/3) / (1/3) = 1 hour</p><p>Total time = 6 h + 1 h = 7 hours</p>",

    "solution": "<p>Rate of pipe A = 1/36 units/minute</p><p>Rate of pipe B = 1/48 units/minute</p><p>Rate of pipe C =  - 1/360 units/minute</p><p>Work by A in first 10 minutes = 10  X  (1/36) = 10/36 = 5/18 units</p><p>Remaining = 1  -  5/18 = 13/18 units</p><p>Now A closes; B + C open: combined rate = 1/48  -  1/360 = 13/720 units/minute</p><p>Time to finish = (13/18) &div; (13/720) = (13/18)  X  (720/13) = 720/18 = 40 minutes</p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>Three pipes P, Q and R together can fill a tank in 30 hours and pipe P alone can fill the tank in 80 hours. In how many hours, pipes Q and R together can fill the tank?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2340;&#2368;&#2344; &#2346;&#2366;&#2311;&#2346; P, Q &#2324;&#2352; R &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 30 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; P &#2309;&#2325;&#2375;&#2354;&#2375; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 80 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; &#2346;&#2366;&#2311;&#2346; Q &#2324;&#2352; R &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">48 hours</span><span class=\"hqt\" style=\"display:none\">48 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">36 hours</span><span class=\"hqt\" style=\"display:none\">36 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">54 hours</span><span class=\"hqt\" style=\"display:none\">54 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">60 hours</span><span class=\"hqt\" style=\"display:none\">60 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Total capacity = LCM of 30 and 80 = 240 units</p><p>Part filled by pipe P, Q and R together = 240/30 = 8 units/hour</p><p>Part filled by pipe P = 240/80 = 3 units/hour</p><p>Time taken by pipes Q and R together to fill the tank = 240/(8  -  3) = 48 hours</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p> A tank is connected with 8 pipes some are inlet pipes and rest are outlet pipes. Each of inlet pipe can fill the tank in 8 hours individually while each outlet pipe can empty the tank in 6 hours individually if all pipes are kept open when the tank is empty, it will take 8 hours for the tank to fill. How many of these are outlet pipes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2335;&#2376;&#2306;&#2325; 8 &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2369;&#2331; &#2311;&#2344;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; &#2361;&#2376;&#2306; &#2324;&#2352; &#2358;&#2375;&#2359; &#2310;&#2313;&#2335;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; &#2361;&#2376;&#2306;&#2404; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2311;&#2344;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; &#2309;&#2325;&#2375;&#2354;&#2375; 8 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2310;&#2313;&#2335;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; &#2309;&#2325;&#2375;&#2354;&#2366; 6 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2335;&#2376;&#2306;&#2325; &#2326;&#2366;&#2354;&#2368; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2360;&#2349;&#2368; &#2346;&#2366;&#2311;&#2346; &#2326;&#2369;&#2354;&#2375; &#2352;&#2326;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 8 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2375;&#2306;&#2327;&#2375;&#2404; &#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2310;&#2313;&#2335;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",

    ],
    "correct_option_id": 1,
    "solution": "\"<p> <img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/4f4db9e5477db51815dc06fb683a8321.png\"> </p><p> Now, the tank is filled in 8 hrs</p><p> So, in 1 hr qty. filled=3</p><p> for 5 inlet pipe and 3 outlet pipe , </p><p> qty filled in 1 hour=5&#215;3-3&#215;4=3 units</p><p>so, clearly there are 5 inlet and 3 outlet pipes.</p>\"",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe A, which can fill a tank in 10 hours, is opened alone for 4 hours. Then, pipe B, which can fill the tank in 15 hours, is also opened. How many more hours will it take to fill the tank?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A, &#2332;&#2379; &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 10 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2325;&#2379; &#2309;&#2325;&#2375;&#2354;&#2375; 4 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2347;&#2367;&#2352;, &#2346;&#2366;&#2311;&#2346; B, &#2332;&#2379; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 15 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2325;&#2379; &#2349;&#2368; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; &#2354;&#2327;&#2375;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">1.2</span><span class=\"hqt\" style=\"display:none\">1.2</span>",
      "<span class=\"eqt\">4.5</span><span class=\"hqt\" style=\"display:none\">4.5</span>",
      "<span class=\"eqt\">3.6</span><span class=\"hqt\" style=\"display:none\">3.6</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the capacity be LCM (10, 15) = 30 units</p><p>Efficiency A = 3 units/hr, B = 2 units/hr</p><p>Work done by A in 4 hours = 3  X  4 = 12 units</p><p>Remaining work = 30 - 12 = 18 units</p><p>Combined rate = 3 + 2 = 5 units/hr</p><p>Time to fill remaining part = 18 / 5 = <b>3.6 hours</b></p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;Two pipes X and Y together can fill a cistern in 1&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">5</span></div>&nbsp;hours and X alone can fill in 3 hours. Then Y alone can fill the cistern in:&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2379; &#2346;&#2366;&#2311;&#2346; X &#2324;&#2352; Y &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 1 (3/5) &#2328;&#2306;&#2335;&#2375; &#2360;&#2375; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; X &#2309;&#2325;&#2375;&#2354;&#2375; 3 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2340;&#2379; Y &#2309;&#2325;&#2375;&#2354;&#2375; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">18 hours</span><span class=\"hqt\" style=\"display:none\">18 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">24/7 hours</span><span class=\"hqt\" style=\"display:none\">24/7 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">24 hours</span><span class=\"hqt\" style=\"display:none\">24 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">16/5 hours</span><span class=\"hqt\" style=\"display:none\">16/5 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let Y alone can fill the cistern in Y hours.</p><p>According to the question,</p><p>(1/3) + (1/Y) = 5/8</p><p>(1/Y) = (5/8)  -  (1/3)</p><p>(1/Y) = (15  -  8)/24 = 7/24</p><p>So, time taken by Y alone to fill the cistern = 24/7 hours</p>",
    "question_index": 16
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe A fills in 8 h and pipe B empties in 24 h. They operate alternately: A for 3 h, then B for 1 h, and so on. How long from the start will it take to fill the tank completely?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A, 8 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B, 24 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2348;&#2366;&#2352;&#2368;-&#2348;&#2366;&#2352;&#2368; &#2360;&#2375; &#2330;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;: A, 3 &#2328;&#2306;&#2335;&#2375;, &#2347;&#2367;&#2352; B, 1 &#2328;&#2306;&#2335;&#2375;, &#2324;&#2352; &#2311;&#2360;&#2368; &#2340;&#2352;&#2361;&#2404; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2360;&#2375; &#2354;&#2375;&#2325;&#2352; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">10 h</span><span class=\"hqt\" style=\"display:none\">10 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">12 h</span><span class=\"hqt\" style=\"display:none\">12 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">14 h</span><span class=\"hqt\" style=\"display:none\">14 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">16 h</span><span class=\"hqt\" style=\"display:none\">16 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Rate of A = 1/8; Rate of B = &#8722;1/24</p><p>Work by A in 3 h = 3/8</p><p>Work by B in 1 h = &#8722;1/24</p><p>Net per 4 h cycle = 3/8 &#8722; 1/24 = 1/3</p><p>Number of cycles = 1/(1/3) = 3 cycles</p><p>Total time = 3 X 4 = 12 h</p>",
    "question_index": 17
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe A fills a tank in 12 h and pipe B in 15 h. Both are opened, and after 4 h pipe C, which empties a full tank in 20 h, is also opened. How long from the start will the tank be full?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 12 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B 15 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2379; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; 4 &#2328;&#2306;&#2335;&#2375; &#2348;&#2366;&#2342; &#2346;&#2366;&#2311;&#2346; C, &#2332;&#2379; &#2346;&#2370;&#2352;&#2368; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 20 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2325;&#2379; &#2349;&#2368; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2335;&#2306;&#2325;&#2368; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2348;&#2366;&#2342; &#2346;&#2370;&#2352;&#2368; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">7 h</span><span class=\"hqt\" style=\"display:none\">7 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">8 h</span><span class=\"hqt\" style=\"display:none\">8 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">9 h</span><span class=\"hqt\" style=\"display:none\">9 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">10 h</span><span class=\"hqt\" style=\"display:none\">10 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Rate of (A+B) = 1/12+1/15 = 3/20</p><p>Work in 4 h = 4 X 3/20 = 3/5</p><p>Rate of C = &#8722;1/20</p><p>=&gt; new net rate = 3/20 &#8722;1/20 = 1/10</p><p>Remaining work = 2/5</p><p>Time to finish = (2/5)/(1/10) = 4 h</p><p>Total time = 4 + 4 = 8 h</p>",
    "question_index": 18
  },
  {
    "question": "<span class=\"eqt\"><p>Four inlet pipes A, B, C, and D can fill a cistern in 6 h, 12 h, 24 h, and 24 h respectively. All four are opened together. How long will it take to fill the cistern?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2366;&#2352; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2346;&#2366;&#2311;&#2346; A, B, C &#2324;&#2352; D &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 6 &#2328;&#2306;&#2335;&#2375;, 12 &#2328;&#2306;&#2335;&#2375;, 24 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 24 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2330;&#2366;&#2352;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">2 h</span><span class=\"hqt\" style=\"display:none\">2 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">3 h</span><span class=\"hqt\" style=\"display:none\">3 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">4 h</span><span class=\"hqt\" style=\"display:none\">4 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">5 h</span><span class=\"hqt\" style=\"display:none\">5 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Rate of A = 1/6; B = 1/12; C = 1/24; D = 1/24</p><p>Combined rate = 1/6+1/12+1/24+1/24 = (4+2+1+1)/24 = 8/24 = 1/3</p><p>Time = 1/(1/3) = 3 h</p>",
    "question_index": 19
  }
];
