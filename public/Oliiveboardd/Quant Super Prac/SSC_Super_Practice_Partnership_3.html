<body>
    <!-- Welcome Screen -->

                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

            </div>
        </div>
    </div>

    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Rohan invested Rs. 12000 for 2 years and Brijendra invested Rs.12000 in the first year and invested additional Rs.8000 for the second year. Brijendra's share fraction in profit is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2379;&#2361;&#2344; &#2344;&#2375; 2 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; 12000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2348;&#2371;&#2332;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352; &#2344;&#2375; &#2346;&#2361;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; 12000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2340;&#2341;&#2366; &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; 8000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2354;&#2366;&#2349; &#2350;&#2375;&#2306; &#2348;&#2371;&#2332;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3/4</span><span class=\"hqt\" style=\"display:none\">3/4</span>",
      "<span class=\"eqt\">3/7</span><span class=\"hqt\" style=\"display:none\">3/7</span>",
      "<span class=\"eqt\">4/7</span><span class=\"hqt\" style=\"display:none\">4/7</span>",
      "<span class=\"eqt\">4/5</span><span class=\"hqt\" style=\"display:none\">4/5</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Profits are proportional to the value of investment made.</p><p>Ratio of investments = <img width=265 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20245/image015.png\"></p><p>Brijendra's share fraction in profit = <img width=64 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20245/image016.png\"></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In a partnership, A invests half the amount invested by B, and C invested amount equal to the amount invested by B. After one year, from a profit of Rs.17500, what will be the share of A?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2350;&#2375;&#2306;, A, B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2310;&#2343;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; C, B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2352;&#2366;&#2358;&#2367; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342;, 17500 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2354;&#2366;&#2349; &#2350;&#2375;&#2306; &#2360;&#2375;, A &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.3500</span><span class=\"hqt\" style=\"display:none\">3500</span>",
      "<span class=\"eqt\">Rs.2500</span><span class=\"hqt\" style=\"display:none\">2500</span>",
      "<span class=\"eqt\">Rs.1500</span><span class=\"hqt\" style=\"display:none\">1500</span>",
      "<span class=\"eqt\">Rs.2100</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.2100</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Ratio of investments made = A:B:C = B/2:B:B = 1:2:2</p><p>A's share in profit of Rs.17500 = <img width=192 height=45 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20245/image017.png\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Ashish, Akash and Aryan started a business with an investment in a ratio of 1:6:8 respectively. They earned the profit after certain years in a ratio of 1:4:12, the ratio of the time of their investments is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2358;&#2368;&#2359;, &#2310;&#2325;&#2366;&#2358; &#2324;&#2352; &#2310;&#2352;&#2381;&#2351;&#2344; &#2344;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 1:6:8 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2325;&#2375; &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;&#2404; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2325;&#2369;&#2331; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342; 1:4:12 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2354;&#2366;&#2349; &#2325;&#2350;&#2366;&#2351;&#2366;, &#2313;&#2344;&#2325;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2360;&#2350;&#2351; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">6:4:9</span><span class=\"hqt\" style=\"display:none\">6:4:9</span>",
      "<span class=\"eqt\">4:9:3</span><span class=\"hqt\" style=\"display:none\">4:9:3</span>",
      "<span class=\"eqt\">9:6:4</span><span class=\"hqt\" style=\"display:none\">9:6:4</span>",
      "<span class=\"eqt\">1:9:4</span><span class=\"hqt\" style=\"display:none\">1:9:4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Profit earned is directly proportional to (investment  X  time of investment)</p><p>Ratio of time of investment = <img width=177 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20245/image018.png\"></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A and B started a business partnership, A invested an amount of 7000 for 8 months and B invested an amount of 5000 for a year. In what ratio the profit of Rs.12000 after a year will be shared between A and B:</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2344;&#2375; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;, A &#2344;&#2375; 8 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 7000 &#2325;&#2368; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; B &#2344;&#2375; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; 5000 &#2325;&#2368; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2348;&#2366;&#2342; 12000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2354;&#2366;&#2349; A &#2324;&#2352; B &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2360;&#2366;&#2333;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">12:13</span><span class=\"hqt\" style=\"display:none\">12:13</span>",
      "<span class=\"eqt\">14:15</span><span class=\"hqt\" style=\"display:none\">14:15</span>",
      "<span class=\"eqt\">11:12</span><span class=\"hqt\" style=\"display:none\">11:12</span>",
      "<span class=\"eqt\">15:16</span><span class=\"hqt\" style=\"display:none\">15:16</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Ratio of profits of A:B = (7000 X 8) : (5000 X 12) = 56000:60000 = <b>14:15</b></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Three partners started a partnership by investing a certain amount for 1 year. If the profit on investment is 10% of the total investment in which A's share is Rs.1500, B's share is Rs.2100 and C's share is Rs.1200, What was the total investment made by B?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2379;&#2306; &#2344;&#2375; 1 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2325;&#2375; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368;&#2404; &#2351;&#2342;&#2367; &#2344;&#2367;&#2357;&#2375;&#2358; &#2346;&#2352; &#2354;&#2366;&#2349; &#2325;&#2369;&#2354; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2366; 10% &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; A &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; 1500 &#2352;&#2369;&#2346;&#2351;&#2375;, B &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; 2100 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; C &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; 1200 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2369;&#2354; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2340;&#2344;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.18000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.18000</span>",
      "<span class=\"eqt\">Rs.21000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.21000</span>",
      "<span class=\"eqt\">Rs.15000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.15000</span>",
      "<span class=\"eqt\">Rs.12000</span><span class=\"hqt\" style=\"display:none\">12000</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total profit = 1500+2100+1200 = Rs.4800</p><p>Total investment = 4800/0.1 = Rs.48000</p><p>Proportion of investment = proportion of profit = 1500:2100:1200 = 5:7:4</p><p>B's share in investment = <img width=187 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20245/image021.png\"></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A, B and C started a business by investing amounts in the ratio 7: 8: 15 respectively. After 8 months C left. After next 4 months B left. At the end of two-years partnership if the total profit earned by them together is Rs.13440, then what is the share of B in profit? </p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C &#2344;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 7: 8: 15 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2352;&#2366;&#2358;&#2367; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2325;&#2375; &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;&#2404; 8 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342; C &#2344;&#2375; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2331;&#2379;&#2337;&#2364; &#2342;&#2367;&#2351;&#2366;&#2404; &#2309;&#2327;&#2354;&#2375; 4 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342; B &#2344;&#2375; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2331;&#2379;&#2337;&#2364; &#2342;&#2367;&#2351;&#2366;&#2404; &#2342;&#2379; &#2360;&#2366;&#2354; &#2325;&#2368; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2351;&#2342;&#2367; &#2313;&#2344;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; 13440 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2354;&#2366;&#2349; &#2350;&#2375;&#2306; B &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.3360</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.3360</span>",
      "<span class=\"eqt\">Rs.2520</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.2520</span>",
      "<span class=\"eqt\">Rs.4200</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.4200</span>",
      "<span class=\"eqt\">Rs.5040</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.5040</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the amount invested by A, B and C are Rs.7a, Rs.8a and Rs.15a respectively. </p><p>Partnership period = 2 years = 24 months </p><p>Now, profit ratio, A: B: C = (7a * 24): (8a * (8 + 4)): (15a * 8) = 7: 4: 5</p><p>Total profit earned = Rs.13440</p><p>Therefore, share of B in profit = 13440 * 4/(7 + 4 + 5) = <b>Rs.3360</b></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Ashok, Deepak and Priya enter into a partnership by investing Rs. 8500, Rs. 7650 and Rs. 10200 respectively for 1 year. If the share of Ashok is Rs. 500 then find 20% of average share of Priya and Deepak. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2358;&#2379;&#2325;, &#2342;&#2368;&#2346;&#2325; &#2324;&#2352; &#2346;&#2381;&#2352;&#2367;&#2351;&#2366; 1 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 8500 &#2352;&#2369;&#2346;&#2351;&#2375;, 7650 &#2352;&#2369;&#2346;&#2351;&#2375; &#2324;&#2352; 10200 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2325;&#2375; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2309;&#2358;&#2379;&#2325; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; 500 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2367;&#2351;&#2366; &#2324;&#2352; &#2342;&#2368;&#2346;&#2325; &#2325;&#2375; &#2324;&#2360;&#2340; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375; &#2325;&#2366; 20% &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">200 Rs.</span><span class=\"hqt\" style=\"display:none\">200 &#2352;&#2369;.</span>",
      "<span class=\"eqt\">105 Rs.</span><span class=\"hqt\" style=\"display:none\">105 &#2352;&#2369;.</span>",
      "<span class=\"eqt\">300 Rs.</span><span class=\"hqt\" style=\"display:none\">300 &#2352;&#2369;.</span>",
      "<span class=\"eqt\">430 Rs.</span><span class=\"hqt\" style=\"display:none\">430 &#2352;&#2369;.</span>"
