<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The base of a right prism is an equilateral triangle. If the lateral surface area of prism and the volume of the prism is 1440 cm<sup>2</sup> and 2880&radic;3 cm<sup>3</sup> respectively, then find the side of the base of the prism.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2319;&#2325; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2366; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2324;&#2352; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 1440 &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2324;&#2352; 2880&radic;3 &#2360;&#2375;&#2350;&#2368;<sup>3</sup> &#2361;&#2376;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">21 cm</span><span class=\"hqt\" style=\"display:none\">21 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">14 cm</span><span class=\"hqt\" style=\"display:none\">14 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">24 cm</span><span class=\"hqt\" style=\"display:none\">24 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">15 cm</span><span class=\"hqt\" style=\"display:none\">15 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the base of prism and height of the prism be 'a' cm and h cm respectively.</p><p>Lateral surface area of the prism = Perimeter of base * height</p><p>3 * a * h = 1440</p><p>ah = 480</p><p>The volume of the prism = Area of base * height</p><p>&radic;3/4 * a<sup>2</sup> * h = 2880&radic;3</p><p>a * 480 = 2880 * 4</p><p>a = 24 cm</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The base of a prism is a regular hexagon. If every edge of the prism measures is 18 meters and height is 12 meter then the volume of the prism is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2319;&#2325; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2359;&#2335;&#2381;&#2349;&#2369;&#2332; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2367;&#2344;&#2366;&#2352;&#2375; &#2325;&#2368; &#2350;&#2366;&#2346; 18 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376; &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; 12 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">5832&radic;3 m<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">5832&radic;3 &#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">4232&radic;3 m<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">4232&radic;3 &#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">5232&radic;3 m<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">5232&radic;3 &#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">4832&radic;3 m<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">4832&radic;3 &#2350;&#2368;<sup>3</sup></span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Side = 18 m, Height = 12 meters</p><p>Volume of prism = 3&radic;3/2 * side<sup>2</sup> * height</p><p>= 3&radic;3/2 * (18 * 18) * 12</p><p>= 5832&radic;3 m<sup>3</sup></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If X is the number of vertices, Y is the number of edges, and Z is the number of faces of the Regular Pentagonal prism then Find the value 3(Z  -  X + Y)/2.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; X &#2358;&#2368;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;, Y &#2325;&#2367;&#2344;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;, &#2324;&#2352; Z &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2346;&#2306;&#2330;&#2325;&#2379;&#2339;&#2368;&#2351; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2375; &#2330;&#2375;&#2361;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2350;&#2366;&#2344; 3(Z - X + Y)/2 &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Number of faces in pentagonal prism 'Z'= 7</p><p>Number of vertices in pentagonal prism 'X' = 10</p><p>Number of edges in pentagonal prism 'Y' = 15</p><p>Hence, 3 * (7  -  10 + 15)/2 = 18</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If the area of the base, height, and volume of a right hexagonal prism are (3&radic;3X<sup>2</sup>/2) cm<sup>2</sup>, 20&radic;3 cm, and 70560 cm<sup>3</sup> respectively. then find the value of X.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339; &#2359;&#2335;&#2381;&#2325;&#2379;&#2339;&#2368;&#2351; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352;, &#2314;&#2306;&#2330;&#2366;&#2312; &#2324;&#2352; &#2310;&#2351;&#2340;&#2344; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; (3&radic;3X<sup>2</sup>/2) &#2360;&#2375;&#2350;&#2368;<sup>2</sup>, 20&radic;3 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 70560 &#2360;&#2375;&#2350;&#2368;<sup>3</sup> &#2361;&#2376;, &#2340;&#2379; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">28</span><span class=\"hqt\" style=\"display:none\">28</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">26</span><span class=\"hqt\" style=\"display:none\">26</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The volume of a right prism = Area of base * Height</p><p>70560 = (3&radic;3X<sup>2</sup>)/2 * 20&radic;3</p><p>X<sup>2</sup> = 784</p><p>X = 28 </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A prism has a base that is a right-angled Triangle .The legs of this triangle, which are adjacent to the right angle, have lengths of 36 cm and 77 cm The height of the prism is 18 cm. The density of the material of the prism is 5 gm/cm<sup>3</sup> then find the weight of the prism.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2360;&#2350;&#2325;&#2379;&#2339; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2376;&#2404; &#2311;&#2360; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366;&#2319;&#2305;, &#2332;&#2379; &#2360;&#2350;&#2325;&#2379;&#2339; &#2325;&#2375; &#2360;&#2350;&#2368;&#2346; &#2361;&#2376;&#2306;, &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 36 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 77 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; 18 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2375; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2325;&#2366; &#2328;&#2344;&#2340;&#2381;&#2357; 5 &#2327;&#2381;&#2352;&#2366;&#2350;/&#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404;<sup>3</sup> &#2340;&#2379; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2366; &#2349;&#2366;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">132.74 kg</span><span class=\"hqt\" style=\"display:none\">132.74 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">128.74 kg</span><span class=\"hqt\" style=\"display:none\">128.74 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">136.74 kg</span><span class=\"hqt\" style=\"display:none\">136.74 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">124.74 kg</span><span class=\"hqt\" style=\"display:none\">124.74 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Area of base = &frac12; * 36 * 77 = 1386 cm<sup>2</sup></p><p>The volume of prism = area of base * Height</p><p>= 1386 * 18</p><p>= 24948 cm<sup>3</sup></p><p>Weight = Density * Volume</p><p>= 24948 * 5</p><p>= 124.74 kg</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Find the volume of a right prism which is based on a regular hexagon of height 10 cm. If its total surface area is 1056&radic;3 cm<sup>2</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; 10 &#2360;&#2375;&#2350;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2359;&#2335;&#2381;&#2349;&#2369;&#2332; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2311;&#2360;&#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 1056&radic;3 &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2460&radic;3 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">2460&radic;3 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">2880&radic;3 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">2880&radic;3 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">2760&radic;3 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">2760&radic;3 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">2680&radic;3 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">2680&radic;3 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the side of the hexagon be 'a' cm.</p><p>Perimeter of the prism = 6a</p><p>Area of the hexagonal prism = 3&radic;3/2 * a<sup>2</sup></p><p>The total surface area of the prism = perimeter of the base * Height + 2 * Area of the base </p><p>1056&radic;3 = 6a * 10 + 2 * 3&radic;3/2 * a<sup>2</sup></p><p>3a<sup>2</sup> + 20&radic;3a  -  1056 = 0</p><p>3a<sup>2</sup> + 44&radic;3a - 24&radic;3a  -  1056 = 0</p><p>a (3a + 44&radic;3) - 8&radic;3 (3a + 44&radic;3) = 0</p><p>(a - 8&radic;3) (3a + 44&radic;3) = 0</p><p>a = 8&radic;3</p><p>The volume of the prism = Area of the prism * Height</p><p>= 3&radic;3/2 * 8&radic;3 * 8&radic;3 * 10</p><p>= 2880&radic;3 cm<sup>3</sup></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The base of a pyramid is Pentagon and volume of pyramid is 2025 cubic cm. The ratio between the apothem of pentagon and its side length is 3: 5 and difference between them is 6 cm. Find the height of pyramid.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2346;&#2306;&#2330;&#2349;&#2369;&#2332; &#2361;&#2376; &#2324;&#2352; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 2025 &#2328;&#2344; &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2346;&#2306;&#2330;&#2349;&#2369;&#2332; &#2325;&#2368; &#2309;&#2306;&#2340;&#2307;&#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; (apothem) &#2324;&#2352; &#2311;&#2360;&#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3:5 &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 6 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">16 cm</span><span class=\"hqt\" style=\"display:none\">16 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">14 cm</span><span class=\"hqt\" style=\"display:none\">14 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">18 cm</span><span class=\"hqt\" style=\"display:none\">18 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">20 cm</span><span class=\"hqt\" style=\"display:none\">20 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
