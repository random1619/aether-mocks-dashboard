    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A, B, and C invested capital in the ratio of 13: 14: 18 respectively. At the end of the business term, they received the profit in the ratio of 4: 3: 5. What is the ratio of their invested time?</p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C &#2344;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 13: 14: 18 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2346;&#2370;&#2306;&#2332;&#2368; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368;&#2404; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306;, &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; 4: 3: 5 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2310;&#2404; &#2313;&#2344;&#2325;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358;&#2367;&#2340; &#2360;&#2350;&#2351; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">502: 351: 443</span><span class=\"hqt\" style=\"display:none\">502: 351: 443</span>",
      "<span class=\"eqt\">502: 350: 443</span><span class=\"hqt\" style=\"display:none\">502: 350: 443</span>",
      "<span class=\"eqt\">504: 351: 455</span><span class=\"hqt\" style=\"display:none\">504: 351: 455</span>",
      "<span class=\"eqt\">504: 350: 455</span><span class=\"hqt\" style=\"display:none\">504: 350: 455</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the invested time of A, B, and C be 'x', 'y', and 'z' respectively. </p><p>A's profit share/ B's profit share = 4/3 </p><p>(13 * x)/ (14 * y) = 4/3 </p><p>x/y = 56/39 </p><p>A's profit share/ C's profit share = 4/5 </p><p>(13 * x)/ (18 * z) = 4/5 </p><p>x/z = 72/65 </p><p><img width=245 height=62 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26954/image003.png\"></p><p>Hence, the required ratio = 504: 351: 455 </p><p><b>Express method:</b></p><p>Ratio of invested capital of A, B and C = 13:14:18</p><p>Ratio of the profit share of A, B and C = 4:3:5</p><p>Ratio of invested time of A, B and C = 4/13 : 3/14 : 5/18</p><p>=&gt;126*4 : 117*3 : 91*5 </p><p>=&gt; 504:351:455</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of the investments of A to that of B in a business is 16:15, and the ratio of their profits at the end of the business is 2:5. If A invested the money for 6 months, then for how many months has B invested his money?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2350;&#2375;&#2306; A &#2324;&#2352; B &#2325;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 16:15 &#2361;&#2376;, &#2340;&#2341;&#2366; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2375; &#2354;&#2366;&#2349; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2:5 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; A &#2344;&#2375; 6 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2343;&#2344; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2361;&#2376;, &#2340;&#2379; B &#2344;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2346;&#2344;&#2366; &#2343;&#2344; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>(A's investment * A's Time)/(B's investment * B's Time) = 2/5</p><p>(16 * 6)/(15 * B's Time) = 2/5</p><p>B's Time = (16 * 6 * 5)/ (15 * 2) = 16 months</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In a partnership business, B's capital was 1/3 of A's capital. If after 8 months, B withdrew 1/4 of his capital and after 2 months more A withdrew 1/2 of his capital, then the profit ratio of A and B after a year will be:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2350;&#2375;&#2306;, B &#2325;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; A &#2325;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; &#2325;&#2366; 1/3 &#2341;&#2368;&#2404; &#2351;&#2342;&#2367; 8 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342;, B &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; &#2325;&#2366; 1/4 &#2344;&#2367;&#2325;&#2366;&#2354; &#2354;&#2367;&#2351;&#2366; &#2324;&#2352; 2 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342; A &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; &#2325;&#2366; 1/2 &#2344;&#2367;&#2325;&#2366;&#2354; &#2354;&#2367;&#2351;&#2366;, &#2340;&#2379; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; A &#2324;&#2352; B &#2325;&#2366; &#2354;&#2366;&#2349; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2361;&#2379;&#2327;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">2: 1</span><span class=\"hqt\" style=\"display:none\">2: 1</span>",
      "<span class=\"eqt\">4: 3</span><span class=\"hqt\" style=\"display:none\">4: 3</span>",
      "<span class=\"eqt\">5: 3</span><span class=\"hqt\" style=\"display:none\">5: 3</span>",
      "<span class=\"eqt\">3: 1</span><span class=\"hqt\" style=\"display:none\">3: 1</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>I = Investment </p><p>T = Time</p><p>Let A's capital be '12'</p><p><img width=334 height=50 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26954/image007.png\"></p><p>Hence, the required ratio = 3:1</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A, B, and C together start a business. Two times the investment of A equals three times the Investment of B and the capital of B is four times that of C. Find the respective ratio of shares of A, B and C in the profit. </p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C &#2350;&#2367;&#2354;&#2325;&#2352; &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; A &#2325;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2366; &#2342;&#2379; &#2327;&#2369;&#2344;&#2366; B &#2325;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376; &#2324;&#2352; B &#2325;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; C &#2325;&#2368; &#2346;&#2370;&#2306;&#2332;&#2368; &#2360;&#2375; &#2330;&#2366;&#2352; &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2354;&#2366;&#2349; &#2350;&#2375;&#2306; A, B &#2324;&#2352; C &#2325;&#2375; &#2358;&#2375;&#2351;&#2352;&#2379;&#2306; &#2325;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3: 2: 1</span><span class=\"hqt\" style=\"display:none\">3: 2: 1</span>",
      "<span class=\"eqt\">6: 4: 1</span><span class=\"hqt\" style=\"display:none\">6: 4: 1</span>",
      "<span class=\"eqt\">2: 3: 1</span><span class=\"hqt\" style=\"display:none\">2: 3: 1</span>",
      "<span class=\"eqt\">1: 4: 1</span><span class=\"hqt\" style=\"display:none\">1: 4: 1</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>I = Investment </p><p>T = Time </p><p>Let the investment be C be 'X'</p><p>B's investment = 4X</p><p>2A's investment = 3B's investment </p><p>2A's investment = 3 * 4X </p><p>A's investment = 6X</p><p>Hence, the required ratio = 6: 4: 1</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A and B started a partnership business investing in the ratio of 9:16 respectively. C joined them after 4 months with an amount equal to 3/4<sup>th</sup> of B. What was their profit at the end of a year, if C got Rs. 36000 as his share? </p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2344;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 9:16 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2325;&#2375; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;&#2404; C, B &#2325;&#2375; 3/4 &#2349;&#2366;&#2327; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2352;&#2366;&#2358;&#2367; &#2325;&#2375; &#2360;&#2366;&#2341; 4 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342; &#2313;&#2344;&#2325;&#2375; &#2360;&#2366;&#2341; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379; &#2327;&#2351;&#2366;&#2404; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2366; &#2354;&#2366;&#2349; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;, &#2351;&#2342;&#2367; C &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; 36000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2367;&#2354;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 157500</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 157500</span>",
      "<span class=\"eqt\">Rs. 139500</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 139500</span>",
      "<span class=\"eqt\">Rs. 162000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 162000</span>",
      "<span class=\"eqt\">Rs. 148500</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 148500</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>I = Investment </p><p>T = Time </p><p><b><img width=422 height=48 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26954/image010.png\"></b></p><p>Hence, the total profit = 36000 * 33/8 = Rs. 148500</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A starts a trading business by investing Rs. 8 lakhs. After 3 months, B joined the business by investing Rs. 12 lakhs, and then 3 months after B joined, C joined them by investing Rs. 16 lakhs. One year after A started the business, they made Rs. 450000 in profit. What is A's profit share?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2344;&#2375; 8 &#2354;&#2366;&#2326; &#2352;&#2369;&#2346;&#2351;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2325;&#2375; &#2319;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2367;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;&#2404; 3 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342;, B &#2344;&#2375; 12 &#2354;&#2366;&#2326; &#2352;&#2369;&#2346;&#2351;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2325;&#2375; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379; &#2327;&#2351;&#2366;, &#2324;&#2352; &#2347;&#2367;&#2352; B &#2325;&#2375; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; 3 &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2366;&#2342;, C &#2344;&#2375; 16 &#2354;&#2366;&#2326; &#2352;&#2369;&#2346;&#2351;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2325;&#2375; &#2313;&#2344;&#2325;&#2366; &#2360;&#2366;&#2341; &#2342;&#2367;&#2351;&#2366;&#2404; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342;, &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; 450000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2354;&#2366;&#2349; &#2325;&#2350;&#2366;&#2351;&#2366;&#2404; A &#2325;&#2366; &#2354;&#2366;&#2349; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 136000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 136000</span>",
      "<span class=\"eqt\">Rs. 156000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 156000</span>",
      "<span class=\"eqt\">Rs. 124000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 124000</span>",
      "<span class=\"eqt\">Rs. 144000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 144000</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>I = Investment </p><p>T = Time </p><p><img width=382 height=42 id=\"Picture 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26954/image012.png\"></p><p>Hence, A's profit share = 450000 * 8/25 = Rs. 144000</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>A, B, and C together invest Rs. 57800 in a business. A invests Rs. 2500 more than B and B invests Rs. 2000 more than C. Out of a total profit of Rs. 46240, find the share of A and C together.</p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C &#2350;&#2367;&#2354;&#2325;&#2352; &#2319;&#2325; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351; &#2350;&#2375;&#2306; 57800 &#2352;&#2369;&#2346;&#2351;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; A, B &#2360;&#2375; 2500 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2343;&#2367;&#2325; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; B, C &#2360;&#2375; 2000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2343;&#2367;&#2325; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; 46240 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2375; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; &#2350;&#2375;&#2306; &#2360;&#2375; A &#2324;&#2352; C &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
