    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If 'M' is the simple interest on 'N' and 'N' is the simple interest on 'P' then what is the relation between M, N and P? (Interest rate and time period is same in both the cases.)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 'M', 'N' &#2346;&#2352; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2361;&#2376; &#2324;&#2352; 'N', 'P' &#2346;&#2352; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2361;&#2376;, &#2340;&#2379; M, N &#2324;&#2352; P &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2381;&#2351;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343; &#2361;&#2376;? (&#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2324;&#2352; &#2360;&#2350;&#2351; &#2309;&#2357;&#2343;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2404;)</p></span>",
    "options": [
      "<span class=\"eqt\">M<sup>2</sup> = NP</span><span class=\"hqt\" style=\"display:none\">M<sup>2</sup> = NP</span>",
      "<span class=\"eqt\">N = MP</span><span class=\"hqt\" style=\"display:none\">N = MP</span>",
      "<span class=\"eqt\">2N = (M + P)</span><span class=\"hqt\" style=\"display:none\">2N = (M + P)</span>",
      "<span class=\"eqt\">N<sup>2</sup> = MP</span><span class=\"hqt\" style=\"display:none\">N<sup>2</sup> = MP</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>According to the question,</p><p>M = (N  X R  X T)/100</p><p>=&gt; (R X T)/100 = M/N ..... (1)</p><p>Also,</p><p>N = (P  X R  X T)/100</p><p>=&gt; (R X T)/100 = N/P ..... (2)</p><p>From (1) and (2), we get -</p><p>N<sup>2</sup> = MP</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Manoj deposited Rs 22000 in SBI which offers simple interest @ 6% per annum. If Manoj withdrew Rs 10000 at the end of each 1<sup>st</sup> and 2<sup>nd</sup> year respectively then what is the total amount that Manoj will get at the end of 3<sup>rd</sup> year?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2344;&#2379;&#2332; &#2344;&#2375; &#2319;&#2360;&#2348;&#2368;&#2310;&#2312; &#2350;&#2375;&#2306; 22000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2332;&#2350;&#2366; &#2325;&#2367;&#2319;, &#2332;&#2367;&#2360; &#2346;&#2352; 6% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2350;&#2344;&#2379;&#2332; &#2344;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2361;&#2354;&#2375; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; 10000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2344;&#2367;&#2325;&#2366;&#2354;&#2375;, &#2340;&#2379; &#2340;&#2368;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2350;&#2344;&#2379;&#2332; &#2325;&#2379; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2368; &#2352;&#2366;&#2358;&#2367; &#2350;&#2367;&#2354;&#2375;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs 3870</span><span class=\"hqt\" style=\"display:none\">3870 &#2352;&#2369;&#2346;&#2319;</span>",
      "<span class=\"eqt\">Rs 4040</span><span class=\"hqt\" style=\"display:none\">4040 &#2352;&#2369;.</span>",
      "<span class=\"eqt\">Rs 4260</span><span class=\"hqt\" style=\"display:none\">4260 &#2352;&#2369;&#2346;&#2319;</span>",
      "<span class=\"eqt\">Rs 4160</span><span class=\"hqt\" style=\"display:none\">4160 &#2352;&#2369;&#2346;&#2319;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Interest during 1st year = Rs (22000  X  6/100) = Rs 1320</p><p>Principal amount for 2nd year = Rs (22000  -  10000) = Rs 12000</p><p>Interest during 2nd year = Rs (12000  X  6/100) = Rs 720</p><p>Principal amount during 3rd year = Rs (12000  -  10000) = Rs 2000</p><p>Interest during 3rd year = Rs (2000  X  6/100) = Rs 120</p><p>Total amount that Manoj would get at the end of the third year = Rs (22000 + 1320 + 720 + 120  -  10000  -  10000) = Rs 4160</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In 10 years under simple interest, a sum of money becomes 5 times of itself. If the rate of interest per annum was increased by 20% but the time remains constant, then the same sum of money would fetch Rs. 160 more. In how many years, the same sum of money will fetch a total simple interest of Rs. 1500?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2375; &#2340;&#2361;&#2340; 10 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2309;&#2346;&#2344;&#2375; &#2310;&#2346; &#2360;&#2375; 5 &#2327;&#2369;&#2344;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2350;&#2375;&#2306; 20% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2332;&#2366;&#2319; &#2354;&#2375;&#2325;&#2367;&#2344; &#2360;&#2350;&#2351; &#2360;&#2381;&#2341;&#2367;&#2352; &#2352;&#2361;&#2375;, &#2340;&#2379; &#2357;&#2361;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 160 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2375;&#2327;&#2368;&#2404; &#2325;&#2367;&#2340;&#2344;&#2375; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2361;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 1500 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2325;&#2369;&#2354; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2375;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">18 years 3 months</span><span class=\"hqt\" style=\"display:none\">18 &#2357;&#2352;&#2381;&#2359; 3 &#2350;&#2361;&#2368;&#2344;&#2375;</span>",
      "<span class=\"eqt\">20 years 6 months</span><span class=\"hqt\" style=\"display:none\">20 &#2357;&#2352;&#2381;&#2359; 6 &#2350;&#2361;&#2368;&#2344;&#2375;</span>",
      "<span class=\"eqt\">18 years 9 months</span><span class=\"hqt\" style=\"display:none\">18 &#2357;&#2352;&#2381;&#2359; 9 &#2350;&#2361;&#2368;&#2344;&#2375;</span>",
      "<span class=\"eqt\">19 years 8 months</span><span class=\"hqt\" style=\"display:none\">19 &#2357;&#2352;&#2381;&#2359; 8 &#2350;&#2361;&#2368;&#2344;&#2375;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the principal = P</p><p>Amount at the end of 10 years = 5P</p><p>SI = 5P  -  P = 4P</p><p>We know that,</p><p>SI = P*R*T/100</p><p>=> 4P = P*R*10/100</p><p>=> R = 40%</p><p>New rate of interest per annum = (100 + 20)% of 40 = 120% of 40 = 1.2*40 = 48%</p><p>Simple interest @ 48% per annum = P*48*10/100 = 4.8P</p><p>According to the question, 4.8P  -  4P = 0.8P = 160</p><p>=> P = 200</p><p>Also,</p><p>1500 = 40*T*200/100</p><p>=> 80T = 1500</p><p>=> T = 150/8 = 18.75 years = 18 years 9 months</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A lender lends his Rs. 30000 to his friend. The rate of simple interest is such that it increases by 1% point after every year. The rate of interest at the time the loan was taken is 5% per annum. If the loan was taken for 8 years, then what is the amount received by the lender at the end of 8 years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2315;&#2339;&#2342;&#2366;&#2340;&#2366; &#2309;&#2346;&#2344;&#2375; &#2350;&#2367;&#2340;&#2381;&#2352; &#2325;&#2379; 30000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2313;&#2343;&#2366;&#2352; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2320;&#2360;&#2368; &#2361;&#2376; &#2325;&#2367; &#2351;&#2361; &#2361;&#2352; &#2360;&#2366;&#2354; 1% &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2315;&#2339; &#2354;&#2375;&#2344;&#2375; &#2325;&#2375; &#2360;&#2350;&#2351; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; 5% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2341;&#2368;&#2404; &#2351;&#2342;&#2367; &#2315;&#2339; 8 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;, &#2340;&#2379; 8 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2315;&#2339;&#2342;&#2366;&#2340;&#2366; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2368; &#2352;&#2366;&#2358;&#2367; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2312;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 48,400</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 48,400</span>",
      "<span class=\"eqt\">Rs. 48,800</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 48,800</span>",
      "<span class=\"eqt\">Rs. 49,200</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 49,200</span>",
      "<span class=\"eqt\">Rs. 50,400</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 50,400</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Interest rate is increasing by 1% point after every year.</p><p>So, the interest rate for each year will be (5%, 6%, ....., 12%).</p><p>Effective interest rate for 8 years = (5 + 6 + 7 + 8 + 9 + 10 + 11 + 12) = 68%</p><p>Amount received by the lender at the end of 8 years = 30000 + 30000*68/100 = Rs. 50400</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the amount which at a certain rate of simple interest amounts to Rs.2225 in 2 years and interest received on the same amount with the same rate of interest in 6 years is Rs.675.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2361; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2352; &#2360;&#2375; 2 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; 2225 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; &#2360;&#2350;&#2366;&#2344; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2360;&#2375; 6 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2348;&#2381;&#2351;&#2366;&#2332; 675 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 1200</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1200</span>",
      "<span class=\"eqt\">Rs. 2000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 2000</span>",
      "<span class=\"eqt\">Rs. 1600</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1600</span>",
      "<span class=\"eqt\">Rs. 1800</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 1800</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the amount invested be Rs. S and rate of interest be r.</p><p>Amount received after 2 years = Rs. 2225</p><p><img width=127 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20434/image001.png\"></p><p>Simple interest in 6 years = Rs. 675</p><p><img width=97 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20434/image002.png\"></p><p><img width=92 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20434/image003.png\"></p><p><img width=203 height=57 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20434/image004.png\"></p><p>S = <b>Rs. 2000</b></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A certain amount is deposited in bank for a number of years numerically equal to the rate of simple interest given by the bank and at the end of the period, the interest received is 1/16<sup>th</sup> of the amount deposited. Find the rate of interest offered by the bank.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2352;&#2366;&#2358;&#2367; &#2348;&#2376;&#2306;&#2325; &#2350;&#2375;&#2306; &#2325;&#2312; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2350;&#2366; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2348;&#2376;&#2306;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2368; &#2327;&#2312; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2348;&#2381;&#2351;&#2366;&#2332; &#2332;&#2350;&#2366; &#2325;&#2368; &#2327;&#2312; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; 1/16&#2357;&#2366;&#2306; &#2349;&#2366;&#2327; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2348;&#2376;&#2306;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2 %</span><span class=\"hqt\" style=\"display:none\">2 %</span>",
      "<span class=\"eqt\">3.5 %</span><span class=\"hqt\" style=\"display:none\">3.5 %</span>",
      "<span class=\"eqt\">4.5 %</span><span class=\"hqt\" style=\"display:none\">4.5 %</span>",
      "<span class=\"eqt\">2.5 %</span><span class=\"hqt\" style=\"display:none\">2.5 %</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the amount deposited be Rs. S.</p><p>Simple interest earned on the deposit = Rs. S/16</p><p>Given, R = t</p><p>Therefore,</p><p><img width=85 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20434/image005.png\"></p><p><img width=120 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20434/image006.png\"></p>",
    "question_index": 5

    "question": "<span class=\"eqt\"><p>A certain sum is invested for certain time at simple interest. It amounts to Rs 200 at 12% per annum. But when invested at 4% per annum, it amounts to Rs 100. Find the time?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2350;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312;| 12% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2342;&#2352; &#2360;&#2375; &#2351;&#2361; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 200 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;| &#2354;&#2375;&#2325;&#2367;&#2344; &#2332;&#2348; &#2311;&#2360;&#2375; 4% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2342;&#2352; &#2360;&#2375; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2351;&#2361; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 100 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;| &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">10 years</span><span class=\"hqt\" style=\"display:none\">10 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">20 years</span><span class=\"hqt\" style=\"display:none\">20 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">15 years</span><span class=\"hqt\" style=\"display:none\">15 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">25 years</span><span class=\"hqt\" style=\"display:none\">25 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A certain sum is invested for certain time. It amounts to Rs X at P% per annum. But when invested at Q% per annum, it amounts to Rs Y.</p> <p>Then the time = [(X-Y)/(YP-XQ)]*100</p> <p>Here X = Rs 200, Y = Rs 100, P = 12%, Q = 4%</p> <p>So time = [(200-100)/(100*12-200*4)]*100</p> <p>Time = (100/400)*100 = 25 years</p>",
    "question_index": 11
  },

    "question": "<span class=\"eqt\"><p>A man borrowed a sum of Rs.29200 and agreed to repay it by paying Rs.9000 at the end of first year, Rs.10000 at the end of second year, and Rs.12000 at the end of third year. What is the rate of simple interest? (Up to one correct decimal)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2352;&#2369;.29200 &#2325;&#2368; &#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2313;&#2343;&#2366;&#2352; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2361;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2352;&#2369;.9000, &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2352;&#2369;.10000 &#2324;&#2352; &#2340;&#2368;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2352;&#2369;.12000 &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2325;&#2375; &#2311;&#2360;&#2375; &#2330;&#2369;&#2325;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2361;&#2350;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2325;&#2367;&#2340;&#2344;&#2368; (&#2342;&#2358;&#2350;&#2354;&#2357; &#2325;&#2375; &#2319;&#2325; &#2360;&#2381;&#2341;&#2366;&#2344; &#2340;&#2325; &#2360;&#2361;&#2368;) &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2.6%</span><span class=\"hqt\" style=\"display:none\">2.6%</span>",
      "<span class=\"eqt\">3.1%</span><span class=\"hqt\" style=\"display:none\">3.1%</span>",
      "<span class=\"eqt\">2.1%</span><span class=\"hqt\" style=\"display:none\">2.1%</span>",
      "<span class=\"eqt\">3.4%</span><span class=\"hqt\" style=\"display:none\">3.4%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Principal = Rs.29200</p><p>Total amount repaid = 9000 + 10000 + 12000 = Rs.31000</p><p>Interest = 31000  -  29200 = Rs.1800</p><p>Let rate% = R%</p><p>1800 = 29200 * R * 3/100</p><p>R = 600/292</p><p>R = 150/73</p><p>R = 2.05% = 2.1%</p>",
    "question_index": 12

    "question": "<span class=\"eqt\"><p>Difference between the simple interest received on Rs.8500 at some rate of interest in 6 years and the simple interest received on same sum in 5 years when interest rate is decreased by 3 is Rs.2847.5. What is the actual rate of interest? </p></span><span class=\"hqt\" style=\"display:none\"><p>6 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; 8500 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2324;&#2352; &#2332;&#2348; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2350;&#2375;&#2306; 3 &#2325;&#2368; &#2325;&#2350;&#2368; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; 5 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 2847.5 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;&#2404; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>We know, SI = sum * rate * time/100</p><p>Let actual rate of interest = R%</p><p>Then, SI on Rs.8500 at R% rate in 6 years = 8500 * R * 6/100 = 510R</p><p>SI on Rs.8500 at (R  -  3)% rate in 5 years = 8500 * (R  -  3) * 5/100 = 425R  -  1275 </p><p>Now, 2847.5 = 510R  -  (425R  -  1275)</p><p>85R = 1572.5</p><p><b>R = 18.5</b></p>",

;&#2352; &#2346;&#2352; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2367;&#2319; &#2327;&#2319; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; 20% &#2324;&#2352; 14 (2/7)% &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368; &#2327;&#2312; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
