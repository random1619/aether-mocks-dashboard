<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A boat covers 108 km upstream and 168 km downstream in 21 hours. If the speed of the stream is 1 km/hr, what distance (in km) will the boat cover in 10 hours in still water?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; 21 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 108 &#2325;&#2367;&#2350;&#2368; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 168 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; 1 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2381;&#2341;&#2367;&#2352; &#2346;&#2366;&#2344;&#2368; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; 10 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352;&#2368; (&#2325;&#2367;&#2350;&#2368; &#2350;&#2375;&#2306;) &#2340;&#2351; &#2325;&#2352;&#2375;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">130 km</span><span class=\"hqt\" style=\"display:none\">130 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">140 km</span><span class=\"hqt\" style=\"display:none\">140 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">90 km</span><span class=\"hqt\" style=\"display:none\">90 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">150 km</span><span class=\"hqt\" style=\"display:none\">150 &#2325;&#2367;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the speed of boat be x km/hr</p><p>108/(x - 1) + 168/(x+1) = 21</p><p>[108(x+1) + 168(x-1)] = 21(x<sup>2</sup>  -  1)</p><p>108x + 108 + 168x  -  168 = 21x<sup>2</sup>  -  21</p><p>276x  -  60 = 21x<sup>2</sup>  -  21</p><p>21x<sup>2</sup>  -  276x + 39 = 0</p><p>7x<sup>2</sup>  -  92x + 13 = 0</p><p>7x<sup>2</sup>  -  91x  -  x + 13 = 0</p><p>7x(x  -  13)  -  (x  -  13) = 0</p><p>(7x  -  1)(x  -  13) = 0</p><p>x = 13</p><p>required distance = 13 * 10 = 130 km</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A boat covers 110 km in upstream and 196 km in downstream in 12 hours. If it covers 375 km in still water in 15 hours, then what is the speed of the stream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; 12 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 110 &#2325;&#2367;&#2350;&#2368; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 196 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2351;&#2361; 15 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; 375 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">4 km/h</span><span class=\"hqt\" style=\"display:none\">4 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">3 km/h</span><span class=\"hqt\" style=\"display:none\">3 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">2 km/h</span><span class=\"hqt\" style=\"display:none\">2 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">5 km/h</span><span class=\"hqt\" style=\"display:none\">5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let speed of stream = 'v' km/h</p><p>Speed of boat in still water = 375/15 = 25 km/h</p><p>Now,</p><p>110/(25 - v) + 196/(25 + v) = 12</p><p>v = 3 km/h</p><p>So, speed of stream = 3 km/h</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A boat can travel 48 km downstream in 3 hours and the same distance upstream in 6 hours. Find the speed of the boat in still water.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 48 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 3 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; 6 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">10 kmph</span><span class=\"hqt\" style=\"display:none\">10 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">8 kmph</span><span class=\"hqt\" style=\"display:none\">8 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">12 kmph</span><span class=\"hqt\" style=\"display:none\">12 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">9 kmph</span><span class=\"hqt\" style=\"display:none\">9 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Downstream speed = 48/3 = 16 kmph</p><p>Upstream speed = 48/6 = 8 kmph</p><p>Speed of the boat in still water = (1/2) (Downstream speed + upstream speed) = 12 kmph</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A boat's speed in still water is 14 km/h. If it takes 3 hours to cover a certain distance downstream and 4 hours to cover the same distance upstream, find the speed of the stream.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2319;&#2325; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; 14 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; 3 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 4 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2 kmph</span><span class=\"hqt\" style=\"display:none\">2 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">1.5 kmph</span><span class=\"hqt\" style=\"display:none\">1.5 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">3 kmph</span><span class=\"hqt\" style=\"display:none\">3 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">2.5 kmph</span><span class=\"hqt\" style=\"display:none\">2.5 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the speed of the stream be X kmph.</p><p>According to the question,</p><p>(14 + X) x 3 = (14  -  X) x 4</p><p>42 + 3X = 56  -  4X</p><p>7X = 14</p><p>X = 2 kmph</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A boy takes 9 hours to swim 11.25 km downstream and 9 hours to swim 9 km upstream. What is the flow of stream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2354;&#2337;&#2364;&#2325;&#2375; &#2325;&#2379; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 11.25 km &#2340;&#2376;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 9 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 9 km &#2340;&#2376;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 9 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">0.125 km/hr</span><span class=\"hqt\" style=\"display:none\">0.125 km/hr</span>",
      "<span class=\"eqt\">0.15 km/hr</span><span class=\"hqt\" style=\"display:none\">0.15 km/hr</span>",
      "<span class=\"eqt\">0.25 km/hr</span><span class=\"hqt\" style=\"display:none\">0.25 km/hr</span>",
      "<span class=\"eqt\">0.0125 km/hr</span><span class=\"hqt\" style=\"display:none\">0.0125 km</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Downstream speed (D) = 11.25/9 = 1.25 km/hr</p><p>Upstream speed (U) = 9/9 = 1 km/hr</p><p>Flow of stream = (1/2) * (D  -  U)</p><p>= (1/2) * (1.25  -  1)</p><p>= (1/2) * 0.25 = 0.125 km/hr</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A boat can cover a distance of 96 km in downstream and after reaching to destination it again returns to mid-point in total of 7 hours. The speed of the stream is 5/16 times of the downstream speed of the boat, then in how much time it will cover 84 km in upstream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 96 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2327;&#2306;&#2340;&#2357;&#2381;&#2351; &#2340;&#2325; &#2346;&#2361;&#2369;&#2306;&#2330;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2351;&#2361; &#2325;&#2369;&#2354; 7 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2347;&#2367;&#2352; &#2360;&#2375; &#2350;&#2343;&#2381;&#2351; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2354;&#2380;&#2335; &#2310;&#2340;&#2368; &#2361;&#2376;&#2404; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2330;&#2366;&#2354;, &#2344;&#2366;&#2357; &#2325;&#2368; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2330;&#2366;&#2354; &#2325;&#2368; 5/16 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2351;&#2361; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 84 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2375;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">9 hours</span><span class=\"hqt\" style=\"display:none\">9 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">6 hours</span><span class=\"hqt\" style=\"display:none\">6 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">7 hours</span><span class=\"hqt\" style=\"display:none\">7 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">4 hours</span><span class=\"hqt\" style=\"display:none\">4 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let speed of the stream = 5x km/h and downstream speed of the boat = 16x km/h</p><p>So, speed of boat in still water = 16x  -  5x = 11x km/h and upstream speed of the boat = 11x  -  5x = 6x km/h</p><p>According to the question,</p><p>96/16x + 48/6x = 7</p><p>=&gt; x = 2 km/h</p><p>Required time = 84/(2 * 6) = 7 hours</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of the speed of a boat downstream to the speed of a stream is 4: 1. If a boat covered 352 km against the current in 22 hours, then find the speed of a boat in still water. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2319;&#2325; &#2344;&#2366;&#2357; &#2325;&#2368; &#2330;&#2366;&#2354; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4:1 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2344;&#2366;&#2357; 22 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 352 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2330;&#2366;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">16 km/hr</span><span class=\"hqt\" style=\"display:none\">16 km/hr</span>",
      "<span class=\"eqt\">32 km/hr</span><span class=\"hqt\" style=\"display:none\">32 km/hr</span>",
      "<span class=\"eqt\">24 km/hr</span><span class=\"hqt\" style=\"display:none\">24 km/hr</span>",
      "<span class=\"eqt\">08 km/hr</span><span class=\"hqt\" style=\"display:none\">08 km/hr</span>"
    ],
    "correct_option_id": 2,
