<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../css/mock-main.css">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Ravi's monthly salary is &#8377;16,000. He spends 30% of his salary on rent, 20% of his salary on education. 60% of the remaining amount is invested in mutual funds. Find the amount invested in mutual funds in a month.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2357;&#2367; &#2325;&#2366; &#2350;&#2366;&#2360;&#2367;&#2325; &#2357;&#2375;&#2340;&#2344; &#8377;16,000 &#2361;&#2376;&#2404; &#2357;&#2361; &#2309;&#2346;&#2344;&#2375; &#2357;&#2375;&#2340;&#2344; &#2325;&#2366; 30% &#2325;&#2367;&#2352;&#2366;&#2351;&#2375; &#2346;&#2352; &#2324;&#2352; 20% &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2346;&#2352; &#2357;&#2381;&#2351;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2358;&#2375;&#2359; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2366; 60% &#2350;&#2381;&#2351;&#2370;&#2330;&#2369;&#2309;&#2354; &#2347;&#2306;&#2337; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2319;&#2325; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2381;&#2351;&#2370;&#2330;&#2369;&#2309;&#2354; &#2347;&#2306;&#2337; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377; 5,000</span><span class=\"hqt\" style=\"display:none\">&#8377; 5,000</span>",
      "<span class=\"eqt\">&#8377; 4,800</span><span class=\"hqt\" style=\"display:none\">&#8377; 4,800</span>",
      "<span class=\"eqt\">&#8377; 4,200</span><span class=\"hqt\" style=\"display:none\">&#8377; 4,200</span>",
      "<span class=\"eqt\">&#8377; 4,500</span><span class=\"hqt\" style=\"display:none\">&#8377; 4,500</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Remaining salary of Ravi = [16000  X  (100  -  30  -  20)]/100 = &#8377;8000</p><p>Amount invested in mutual funds = 0.60  X  8000 = &#8377;4800</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>At an event there are 500 guests, among whom 28% are adult males, 64% are adult females, and the rest are children. Find the total number of children at the event.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; 500 &#2309;&#2340;&#2367;&#2341;&#2367; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; 28% &#2357;&#2351;&#2360;&#2381;&#2325; &#2346;&#2369;&#2352;&#2369;&#2359;, 64% &#2357;&#2351;&#2360;&#2381;&#2325; &#2350;&#2361;&#2367;&#2354;&#2366;&#2319;&#2305; &#2324;&#2352; &#2358;&#2375;&#2359; &#2348;&#2330;&#2381;&#2330;&#2375; &#2361;&#2376;&#2306;&#2404; &#2311;&#2360; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">55</span><span class=\"hqt\" style=\"display:none\">55</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">40</span><span class=\"hqt\" style=\"display:none\">40</span>",
      "<span class=\"eqt\">50</span><span class=\"hqt\" style=\"display:none\">50</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Percentage of children at the event = (100  -  28  -  64) = 8%</p><p>Number of children at the event = 0.08  X  500 = 40</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A person spends 30% of his salary. Salary of the person increases by 40% and savings  increases by 10%. Find the percentage increase in the expenditure of the person.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2309;&#2346;&#2344;&#2375; &#2357;&#2375;&#2340;&#2344; &#2325;&#2366; 30% &#2357;&#2381;&#2351;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2357;&#2375;&#2340;&#2344; &#2350;&#2375;&#2306; 40% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2348;&#2330;&#2340; &#2350;&#2375;&#2306; 10% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">125%</span><span class=\"hqt\" style=\"display:none\">125%</span>",
      "<span class=\"eqt\">95%</span><span class=\"hqt\" style=\"display:none\">95%</span>",
      "<span class=\"eqt\">110%</span><span class=\"hqt\" style=\"display:none\">110%</span>",
      "<span class=\"eqt\">82%</span><span class=\"hqt\" style=\"display:none\">82%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let, salary of the person = Rs. 100x</p><p>Expenditure of the person = 100x * 30/100 = Rs. 30x</p><p>Savings of the person = Rs. 70x</p><p>Salary after increment = 100x * 140/100 = Rs. 140x</p><p>Savings after increment = 70x * 110/100 = Rs. 77</p><p>Expenditure after increment = 140x  -  77x = Rs. 63x</p><p>Required percentage increase in expenditure = (63x  -  30x)/30x * 100 = 33/30 * 100 = 110%</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In the election, 8% of the voters did not cast their votes. Two candidates contested the election in which the winning candidate got 48% of the total votes and won election by 1100 votes. Find the total number of voters in the election, given that all the votes cast were valid.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2330;&#2369;&#2344;&#2366;&#2357; &#2350;&#2375;&#2306; 8% &#2350;&#2340;&#2342;&#2366;&#2340;&#2366; &#2357;&#2379;&#2335; &#2344;&#2361;&#2368;&#2306; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2375; &#2330;&#2369;&#2344;&#2366;&#2357; &#2342;&#2379; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352; &#2354;&#2337;&#2364;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2332;&#2368;&#2340;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352; &#2344;&#2375; &#2325;&#2369;&#2354; &#2357;&#2379;&#2335; &#2325;&#2375; 48% &#2357;&#2379;&#2335; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2319; &#2324;&#2352; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2313;&#2360;&#2344;&#2375; 1100 &#2357;&#2379;&#2335; &#2360;&#2375; &#2330;&#2369;&#2344;&#2366;&#2357; &#2332;&#2368;&#2340;&#2366;&#2404; &#2351;&#2361; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2349;&#2368; &#2357;&#2379;&#2335; &#2357;&#2376;&#2343; &#2361;&#2376;, &#2340;&#2379; &#2330;&#2369;&#2344;&#2366;&#2357; &#2350;&#2375;&#2306; &#2350;&#2340;&#2342;&#2366;&#2340;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">25500</span><span class=\"hqt\" style=\"display:none\">25500</span>",
      "<span class=\"eqt\">26500</span><span class=\"hqt\" style=\"display:none\">26500</span>",
      "<span class=\"eqt\">27500</span><span class=\"hqt\" style=\"display:none\">27500</span>",
      "<span class=\"eqt\">28500</span><span class=\"hqt\" style=\"display:none\">28500</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let total number of votes = 100x</p><p>So, total number of votes cast = 100x * 92/100 = 92x</p><p>Number of votes cast for winner = 100x * 48/100 = 48x</p><p>Thus, number of votes cast for looser = 92x  -  48x = 44x</p><p>Winner won election by 1100 votes.</p><p>=&gt; 48x  -  44x = 1100</p><p>=&gt; x = 1100/4</p><p>=&gt; x = 275</p><p>Hence, total number of votes = 27500</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If price of a commodity increases by 25% then, by how much percent should consumption be reduced so that total expenditure rises by only 10%.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351; &#2350;&#2375;&#2306; 25% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2375; &#2313;&#2346;&#2349;&#2379;&#2327; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2368; &#2325;&#2350;&#2368; &#2325;&#2368; &#2332;&#2366;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319; &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367; &#2325;&#2369;&#2354; &#2357;&#2381;&#2351;&#2351; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; 10% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">8%</span><span class=\"hqt\" style=\"display:none\">8%</span>",
      "<span class=\"eqt\">10%</span><span class=\"hqt\" style=\"display:none\">10%</span>",
      "<span class=\"eqt\">12%</span><span class=\"hqt\" style=\"display:none\">12%</span>",
      "<span class=\"eqt\">14%</span><span class=\"hqt\" style=\"display:none\">14%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<br><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/imgpm/quessol1504958885.png\" max_width=\"500px\">",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Sale of almonds in a store in July and August is increased by 60% and 50% respectively as compared to that in previous month. If 105.6 kg almonds sold in August, then how much more almonds sold in July as compared to that in previous month? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2369;&#2354;&#2366;&#2312; &#2324;&#2352; &#2309;&#2327;&#2360;&#2381;&#2340; &#2350;&#2375;&#2306; &#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344; &#2350;&#2375;&#2306; &#2348;&#2366;&#2342;&#2366;&#2350; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2346;&#2367;&#2331;&#2354;&#2375; &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 60% &#2324;&#2352; 50% &#2309;&#2343;&#2367;&#2325; &#2361;&#2369;&#2312;&#2404; &#2351;&#2342;&#2367; &#2309;&#2327;&#2360;&#2381;&#2340; &#2350;&#2375;&#2306; 105.6 kg &#2348;&#2366;&#2342;&#2366;&#2350; &#2348;&#2375;&#2330;&#2375; &#2327;&#2351;&#2375;, &#2340;&#2379; &#2332;&#2369;&#2354;&#2366;&#2312; &#2350;&#2375;&#2306; &#2346;&#2367;&#2331;&#2354;&#2375; &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2343;&#2367;&#2325; &#2348;&#2366;&#2342;&#2366;&#2350; &#2348;&#2375;&#2330;&#2375; &#2327;&#2351;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">19.8 kg</span><span class=\"hqt\" style=\"display:none\">19.8 kg</span>",
      "<span class=\"eqt\">22 kg</span><span class=\"hqt\" style=\"display:none\">22 kg</span>",
      "<span class=\"eqt\">26.4 kg</span><span class=\"hqt\" style=\"display:none\">26.4 kg</span>",
      "<span class=\"eqt\">33 kg</span><span class=\"hqt\" style=\"display:none\">33 kg</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sale of almonds in August = 105.6 kg</p><p>Sale of almonds in July = 105.6 * 100/(100 + 50) = 70.4 kg</p><p>Sale of almonds in June = 70.4 * 100/(100 + 60) = 44 kg</p><p>Therefore, difference = 70.4  -  44 = <b>26.4 kg</b></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>P is 10% more than Q and Q is 10% more than R. Then by what percent is P more than R?</p></span><span class=\"hqt\" style=\"display:none\"><p>P, Q &#2360;&#2375; 10% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376; &#2324;&#2352; Q, R &#2360;&#2375; 10% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; P, R &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">18.5%</span><span class=\"hqt\" style=\"display:none\">18.5%</span>",
      "<span class=\"eqt\">21%</span><span class=\"hqt\" style=\"display:none\">21%</span>",
      "<span class=\"eqt\">23%</span><span class=\"hqt\" style=\"display:none\">23%</span>",
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let R = 100 units</p><p>Q = 100 * 110% = 110 units</p><p>P = 110 * 110% = 121 units</p><p>Required percentage = <img width=117 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20909/image019.png\"> = 21%</p><p><b>Alternate method:</b></p><p>Required percentage = 10 + 10 + <img width=52 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20909/image020.png\"> = 21%</p>",
    "question_index": 6
  },
  {

    "question": "<span class=\"eqt\"><p>In a village, 18% of the total population left due to flood. Out of the remaining population, 28% migrated to town. If the current population of the village is 2952, then what was the population before the flood? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2366;&#2306;&#2357; &#2350;&#2375;&#2306; &#2348;&#2366;&#2338;&#2364; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2325;&#2369;&#2354; &#2310;&#2348;&#2366;&#2342;&#2368; &#2325;&#2366; 18% &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2327;&#2366;&#2306;&#2357; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352; &#2330;&#2354;&#2366; &#2327;&#2351;&#2366;&#2404; &#2358;&#2375;&#2359; &#2310;&#2348;&#2366;&#2342;&#2368; &#2350;&#2375;&#2306; &#2360;&#2375; 28% &#2354;&#2379;&#2327; &#2358;&#2361;&#2352; &#2330;&#2354;&#2375; &#2327;&#2319;&#2404; &#2351;&#2342;&#2367; &#2327;&#2366;&#2306;&#2357; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 2952 &#2361;&#2376;, &#2340;&#2379; &#2348;&#2366;&#2338;&#2364; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2341;&#2368;?</p></span>",
    "options": [

    "correct_option_id": 1,
    "solution": "<p>Let the total population of a village be '100X'</p><p>The population of the village after flood = 100X * 82/100 = 82X </p><p>The current population of the village = 82X * 72/100 </p><p>2952 = 82X * 72/100 </p><p>X = 2952 * 100/ (72 * 82) </p><p>X = 50 </p><p>Hence, the population before the flood = 5000 </p>",

    "question": "<span class=\"eqt\"><p>When 30% of M is subtracted from 60% of N, then the resultant is -3. The sum of 25% of M and 45% of N is 31. What is the difference between M and N? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; N &#2325;&#2375; 60% &#2350;&#2375;&#2306; &#2360;&#2375; M &#2325;&#2366; 30% &#2328;&#2335;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2368; -3 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; M &#2325;&#2375; 25% &#2324;&#2352; N &#2325;&#2375; 45% &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; 31 &#2361;&#2376;&#2404; M &#2324;&#2352; N &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">50</span><span class=\"hqt\" style=\"display:none\">50</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>60% of N  -  30% of M = -3</p><p>M = 2N + 10 ...(i)</p><p>And 25% of M + 45% of N = 31</p><p>M = (620  -  9N)/5 ...(ii)</p><p>From (i) and (ii), we get</p><p>2N + 10 = (620  -  9N)/5</p><p>10N + 50 = 620 - 9N</p><p>N = 30</p><p>M = 2 * 30 + 10 = 70</p><p>Therefore, N  -  M = 70  -  30 = <b>40</b></p>",
