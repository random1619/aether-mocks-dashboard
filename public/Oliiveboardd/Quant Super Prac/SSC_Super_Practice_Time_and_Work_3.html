<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Three taps P, Q and R alone can empty a tank in 8 hours, 4 hours, and 2 hours, respectively. When the tank is full, all three taps P, Q and R are opened one by one in the same order, but after an equal interval of 0.5 hour. In approximately how much time will the tank be empty?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2344;&#2354; P, Q &#2324;&#2352; R &#2309;&#2325;&#2375;&#2354;&#2375; &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 8 &#2328;&#2306;&#2335;&#2375;, 4 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 2 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2332;&#2348; &#2335;&#2376;&#2306;&#2325; &#2349;&#2352; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2340;&#2368;&#2344;&#2379;&#2306; &#2344;&#2354; P, Q &#2324;&#2352; R &#2319;&#2325;-&#2319;&#2325; &#2325;&#2352;&#2325;&#2375; &#2313;&#2360;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; 0.5 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2309;&#2306;&#2340;&#2352;&#2366;&#2354; &#2325;&#2375; &#2348;&#2366;&#2342;&#2404; &#2335;&#2376;&#2306;&#2325; &#2354;&#2327;&#2349;&#2327; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 hour</span><span class=\"hqt\" style=\"display:none\">1 &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">1 hour 31 minutes</span><span class=\"hqt\" style=\"display:none\">1 &#2328;&#2306;&#2335;&#2366; 31 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">1 hour 51 minutes</span><span class=\"hqt\" style=\"display:none\">1 &#2328;&#2306;&#2335;&#2366; 51 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">1 hour 41 minutes</span><span class=\"hqt\" style=\"display:none\">1 &#2328;&#2306;&#2335;&#2366; 41 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Part emptied by tap P in 1 hour = 1/8</p><p>Part emptied by tap Q in 1 hour = 1/4</p><p>Part emptied by tap R in 1 hour = 1/2</p><p>Let the time in which the tank is emptied be 'x' hours</p><p>Tap P was open for = x hours</p><p>Tap Q was open for = (x  -  0.5) hours</p><p>Tap R was open for = (x  -  1) hours</p><p>Now, part emptied by tank in x hours = 1</p><p>=&gt; x/8 + (x  -  0.5)/4 + (x  -  1)/2 = 1</p><p>=&gt; x/8 + (2x  -  1)/8 + (4x  -  4)/8 = 1</p><p>=&gt; x + 2x  -  1 + 4x  -  4 = 8</p><p>=&gt; 7x = 13</p><p>=&gt; x = 13/7 hours &#8773; 1 hour 51 min.</p><p>So, the tank will be empty in approximately 1 hour 51 min</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Inlet pipes, R and S can fill a tank in 50 minutes and 72 minutes respectively. Outlet pipes D and E together can empty the tank in 60 minutes. When pipes D and R are opened together, then the tank is filled in 96 minutes. In how many minutes (approximately) will the tank be filled if the pipes S and E are opened together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2344;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346;, R &#2324;&#2352; S &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 50 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 72 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2310;&#2313;&#2335;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; D &#2324;&#2352; E &#2350;&#2367;&#2354;&#2325;&#2352; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 60 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2332;&#2348; &#2346;&#2366;&#2311;&#2346; D &#2324;&#2352; R &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; 96 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; S &#2324;&#2352; E &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2367;&#2344;&#2335; (&#2354;&#2327;&#2349;&#2327;) &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">147 minutes</span><span class=\"hqt\" style=\"display:none\">147 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">125 minutes</span><span class=\"hqt\" style=\"display:none\">125 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">49 minutes</span><span class=\"hqt\" style=\"display:none\">49 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">163 minutes</span><span class=\"hqt\" style=\"display:none\">163 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the total work be 7200 units (LCM of 50, 72, 60 and 96)</p><p>Work done by R in a day = 7200/50 = 144 units</p><p>Work done by S in a day = 7200/72 = 100 units</p><p>Work done by E and D in a day = 7200/60 = 120 units</p><p>Work done by R and D in a day = 7200/96 = 75 units</p><p>So, work done by D in a day = 144  -  75 = 69 units</p><p>So, work done by E in a day = 120  -  69 = 51 units</p><p>When S and E are opened together, work done = 100  -  51= 49 units</p><p>So, total time taken to fill the tank = 7200/49 = 146.93 ~ 147 minutes</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe A can fill a tank in 72 minutes and pipe B can fill the same tank at 15 m<sup>3</sup>/minute. If the volume of the tank is 540 m<sup>3</sup>, then find the time taken by pipe A and pipe B together to fill the tank together.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 72 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2313;&#2360;&#2368; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 15 m<sup>3</sup>/&#2350;&#2367;&#2344;&#2335; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 540 m<sup>3</sup> &#2361;&#2376;, &#2340;&#2379; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2367;&#2354;&#2325;&#2352; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">24 minutes</span><span class=\"hqt\" style=\"display:none\">24 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">30 minutes</span><span class=\"hqt\" style=\"display:none\">30 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">18 minutes</span><span class=\"hqt\" style=\"display:none\">18 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">20 minutes</span><span class=\"hqt\" style=\"display:none\">20 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Volume of the tank = 540 m<sup>3</sup></p><p>Time taken by pipe B = 540/15 = 36 minutes</p><p>Total capacity (LCM of 36 and 72) = 72 units</p><p>Efficiency of pipe A = 72/72 = 1 units/minute</p><p>Efficiency of pipe B = 72/36 = 2 units/minute</p><p>Time taken by pipe A and B together to fill the tank = 72/(1 + 2) = 24 minutes</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe A and B can fill a tank in 8 minutes and 12 minutes respectively. Both the pipes are opened. The tank got filled in 6 minutes if pipe A is turned off after  - </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; B &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 8 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 12 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2326;&#2379;&#2354; &#2342;&#2367;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; A &#2325;&#2379; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; 6 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; - </p></span>",
    "options": [
      "<span class=\"eqt\">4 minutes</span><span class=\"hqt\" style=\"display:none\">4 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">5 minutes</span><span class=\"hqt\" style=\"display:none\">5 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">6 minutes</span><span class=\"hqt\" style=\"display:none\">6 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">7 minutes</span><span class=\"hqt\" style=\"display:none\">7 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Capacity of tank = LCM of 8 and 12 = 24 unit</p><p>Efficiency of pipe A = 24/8 = 3 units/minute</p><p>Efficiency of pipe B = 24/12 = 2 units/minute</p><p>Let pipe A turned off after 'x' minutes</p><p>According to question,</p><p>(3 + 2)x + 2(6  -  x) = 24</p><p>5x + 12  -  2x = 24</p><p>3x = 12</p><p>x = 4 minutes</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe P and Q can fill a tank in 3 minutes and 12 minutes respectively and pipe R can empty it in 15 minutes. Find the time taken to fill the tank when all pipes are opened together.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; P &#2324;&#2352; Q &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 12 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; R &#2311;&#2360;&#2375; 15 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; &#2360;&#2349;&#2368; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4 (1/2) minutes</span><span class=\"hqt\" style=\"display:none\">4 (1/2) &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">2 (1/5) minutes</span><span class=\"hqt\" style=\"display:none\">2 (1/5) &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">3 (2/5) minutes</span><span class=\"hqt\" style=\"display:none\">3 (2/5) &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">2 (6/7) minutes</span><span class=\"hqt\" style=\"display:none\">2 (6/7) &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Capacity of tank = LCM of 3, 12 and 15 = 60 unit</p><p>Efficiency of pipe P = 60/3 = 20 units/minute</p><p>Efficiency of pipe Q = 60/12 = 5 units/minute</p><p>Efficiency of pipe R = 60/15 = 4 units/minute</p><p>Required time = 60/(20 + 5  -  4) = 60/21 or 20/7 = 2(6/7) minutes</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Two pipes P and Q fill a tank in 140 minutes and 52.5 minutes respectively. A third pipe R can empty it at __ liters/minute. When all three pipes are opened together, then the tank is filled in 1 hour. If the capacity of the tank is 630 liters, then what should come in place of the given blank?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2346;&#2366;&#2311;&#2346; P &#2324;&#2352; Q &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 140 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 52.5 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2340;&#2368;&#2360;&#2352;&#2366; &#2346;&#2366;&#2311;&#2346; R &#2311;&#2360;&#2375; __&#2354;&#2368;&#2335;&#2352;/&#2350;&#2367;&#2344;&#2335; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; &#2319;&#2325; &#2360;&#2366;&#2341; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; 1 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2335;&#2376;&#2306;&#2325; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; 630 &#2354;&#2368;&#2335;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2310;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>P = 140 minutes, Q = 52.5 minutes</p><p>When all pipes are opened together, then the tank is filled in 1 hour (or 60 minutes). This means filling rate is more than the emptying rate. So,</p><p>1/60 = 1/P + 1/Q  -  1/R</p><p>1/60 = 1/140 + 1/52.5  -  1/R</p><p>R = 105 minutes</p><p>Let R can empty the tank it at X liters/minute.</p><p>Since, the capacity of the tank is 630 liters, then</p><p>X = 630/105</p><p><b>X = 6</b></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If 17/25 part of a tank is filled by a pipe in 14 minutes 10 seconds, then rest part of the tank will be filled in  - </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2366; 17/25 &#2349;&#2366;&#2327; &#2319;&#2325; &#2346;&#2366;&#2311;&#2346; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 14 &#2350;&#2367;&#2344;&#2335; 10 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2349;&#2352;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; &#2325;&#2366; &#2358;&#2375;&#2359; &#2349;&#2366;&#2327; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">5 minutes 30 seconds</span><span class=\"hqt\" style=\"display:none\">5 &#2350;&#2367;&#2344;&#2335; 30 &#2360;&#2375;&#2325;&#2306;&#2337;</span>",
      "<span class=\"eqt\">7 minutes 20 seconds</span><span class=\"hqt\" style=\"display:none\">7 &#2350;&#2367;&#2344;&#2335; 20 &#2360;&#2375;&#2325;&#2306;&#2337;</span>",
      "<span class=\"eqt\">8 minutes 10 seconds</span><span class=\"hqt\" style=\"display:none\">8 &#2350;&#2367;&#2344;&#2335; 10 &#2360;&#2375;&#2325;&#2306;&#2337;</span>",

    "solution": "<p>14 minutes 10 seconds = (14 * 60 + 10) seconds = 850 seconds</p><p>Total part of the tank will be filled in = 850 * 25/17 = 1250 seconds</p><p>Therefore, remaining part of the tank will be filled in = 1250  -  850 = 400 seconds = <b>6 minutes 40 seconds</b></p>",

  {
    "question": "<span class=\"eqt\"><p> A pipe can fill a tank in 20 minutes and another pipe can fill a tank in 30 minutes. Pipe A is opened for half of the time and pipe A and B are opened for the other half. How long will it take to fill the tank? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 20 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2366; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 30 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2366;&#2311;&#2346; A &#2325;&#2379; &#2310;&#2343;&#2375; &#2360;&#2350;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; B &#2325;&#2379; &#2342;&#2370;&#2360;&#2352;&#2375; &#2310;&#2343;&#2375; &#2360;&#2350;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">25 minutes</span><span class=\"hqt\" style=\"display:none\">25 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">20 minutes</span><span class=\"hqt\" style=\"display:none\">20 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">15 minutes</span><span class=\"hqt\" style=\"display:none\">15 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">16 minutes</span><span class=\"hqt\" style=\"display:none\">16 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "\"<p>In 1 min pipe A can fill 1/20 of the tank</p><p>In 1 min pipe B can fill 1/30 of the tank</p><p>In 1 min pipe A and B together can fill 1/20+1/30=1/12 of the tank</p><p>Say pipe A only opened for x mins and pipes A and B together opened for x mins</p><p>Then portion of tank filled</p><p>= x/20+x/12 = 1</p><p>or (3x+5x)/60=1</p><p>or 8x/60=1</p><p>or 2x=15</p><p>So time taken to fill the tank = 2x=15 minutes</p>\"",
    "question_index": 7
  },

    "question": "<span class=\"eqt\"><p>Two inlet pipes P and Q and one outlet pipe R are attached to a tank. Pipes P and Q can individually fill the tank in 90 minutes and 180 minutes respectively. If pipes P, Q, and R are opened simultaneously, the tank is full in 1 hour 40 minutes. How much time will be taken by pipe R to empty the full tank?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2311;&#2344;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; P &#2324;&#2352; Q &#2340;&#2341;&#2366; &#2319;&#2325; &#2310;&#2313;&#2335;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; R &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2361;&#2369;&#2319; &#2361;&#2376;&#2306;&#2404; &#2346;&#2366;&#2311;&#2346; P &#2324;&#2352; Q &#2319;&#2325;&#2354; (&#2309;&#2325;&#2375;&#2354;&#2375;) &#2319;&#2325;&#2354; &#2340;&#2380;&#2352; &#2360;&#2375; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 90 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 180 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; P, Q &#2324;&#2352; R &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; 1 &#2328;&#2306;&#2335;&#2375; 40 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2346;&#2370;&#2352;&#2368; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2346;&#2366;&#2311;&#2346; R &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">200 minutes</span><span class=\"hqt\" style=\"display:none\">200 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">120 minutes</span><span class=\"hqt\" style=\"display:none\">120 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">150 minutes</span><span class=\"hqt\" style=\"display:none\">150 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">100 minutes</span><span class=\"hqt\" style=\"display:none\">100 &#2350;&#2367;&#2344;&#2335;</span>"

    "correct_option_id": 2,
    "solution": "<p>Pipes P and Q can individually fill the tank in 90 minutes and 180 minutes respectively.</p><p>If pipes P, Q, and R are opened simultaneously, the tank is full in 1 hour 40 minutes.</p><p>Pipe R alone can empty the tank in = 1/(1/100  -  1/90  -  1/180) = -150</p><p>Hence, R alone can empty the tank in = 150 minutes</p><p></p>",
    "question_index": 8

  {
    "question": "<span class=\"eqt\"><p>Pipe A and pipe B together can fill a cistern in 28 minutes, pipe B and pipe C together can fill the same cistern in 42 minutes, and pipe A and pipe C together can fill the same cistern in 56 minutes. Find the time taken by pipe C alone to fill the cistern. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 28 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2319;&#2325; &#2360;&#2366;&#2341; &#2346;&#2366;&#2311;&#2346; B &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; C &#2360;&#2350;&#2366;&#2344; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 42 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; C &#2360;&#2350;&#2366;&#2344; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 56 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2366;&#2311;&#2346; C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">4 hours 32 minutes</span><span class=\"hqt\" style=\"display:none\">4 &#2328;&#2306;&#2335;&#2375; 32 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">5 hours 36 minutes</span><span class=\"hqt\" style=\"display:none\">5 &#2328;&#2306;&#2335;&#2375; 36 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">6 hours 30 minutes</span><span class=\"hqt\" style=\"display:none\">6 &#2328;&#2306;&#2335;&#2375; 30 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">7 hours 24minutes</span><span class=\"hqt\" style=\"display:none\">7 &#2328;&#2306;&#2335;&#2375; 24 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The capacity of a cistern = L.C.M of 28, 42, and 56 = 168</p><p>Efficiency = total capacity/ time taken</p><p>Efficiency of pipe A and pipe B = 168/28 = 6</p><p>Efficiency of pipe B and pipe C = 168/42 = 4</p><p>Efficiency of pipe A and pipe C = 168/56 = 3</p><p>Efficiency of pipe A, pipe B, and pipe C = (6 + 4 + 3)/2 = 13/2</p><p>Efficiency of pipe C = 13/2  -  6 = 1/2</p><p>The required value = 168/ (1/2) = 336 minutes = 5 hours 36 minutes</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe Q can fill the tank in 4 hours while pipe R can empty the tank in 10 hours. First pipe Q is opened for 3 hours then it was closed and after that pipe R is opened for 2 hours, then what part of the tank will be filled?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; Q &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 4 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2311;&#2346; R &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 10 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2361;&#2354;&#2375; &#2346;&#2366;&#2311;&#2346; Q &#2325;&#2379; 3 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2347;&#2367;&#2352; &#2313;&#2360;&#2375; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2366;&#2311;&#2346; R &#2325;&#2379; 2 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>",
      "<span class=\"eqt\">17/20</span><span class=\"hqt\" style=\"display:none\">17/20</span>",
      "<span class=\"eqt\">11/20</span><span class=\"hqt\" style=\"display:none\">11/20</span>",
      "<span class=\"eqt\">13/15</span><span class=\"hqt\" style=\"display:none\">13/15</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let total capacity of tank = LCM of 4 and 10 = 20</p><p>Part of tank filled by pipe Q in 1 hour = 20/4 = 5 units</p><p>Part of tank emptied by pipe R in 1 hour = 2 units</p><p>Part of tank filled = (5 * 3 - 2 * 2)/20 = 11/20</p><p></p>",
    "question_index": 10
  },

    "question": "<span class=\"eqt\"><p>Inlet pipes A and B alone can fill a tank in 26 min and 24 min respectively and an outlet pipe C alone can empty that tank in 42 min. Pipe A is opened at 7: 36 PM and after 11 min pipe C is also opened. At what time pipe B must be opened to fill the tank at 8: 15 PM?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2344;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; B &#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 26 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 24 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2309;&#2325;&#2375;&#2354;&#2375; &#2319;&#2325; &#2310;&#2313;&#2335;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; C &#2313;&#2360; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 42 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2366;&#2311;&#2346; A &#2325;&#2379; &#2358;&#2366;&#2350; 7: 36 &#2348;&#2332;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 11 &#2350;&#2367;&#2344;&#2335; &#2348;&#2366;&#2342; &#2346;&#2366;&#2311;&#2346; C &#2325;&#2379; &#2349;&#2368; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2366;&#2311;&#2346; B &#2325;&#2379; &#2325;&#2367;&#2360; &#2360;&#2350;&#2351; &#2346;&#2352; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;, &#2340;&#2366;&#2325;&#2367; &#2335;&#2376;&#2306;&#2325; &#2358;&#2366;&#2350; 8: 15 &#2348;&#2332;&#2375; &#2340;&#2325; &#2349;&#2352; &#2342;&#2375;?</p></span>",

      "<span class=\"eqt\">7: 40 PM</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2350; 7: 40 &#2348;&#2332;&#2375;</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>Total time for which pipe A is opened = 8: 15  -  7: 36 = 39 min</p><p>Total time for which pipe C is opened = 39  -  11 = 28 min</p><p>Let time for which pipe B is opened = 'x' min</p><p>Now,</p><p><img width=197 height=127 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p10919/image003.png\"></p><p>Hence, time at which pipe B is opened = 8: 15  -  0: 04 = 8: 11 PM</p>",

  {
    "question": "<span class=\"eqt\"><p>Pipe A functions at a uniform rate. It is found that at 11: 00 am, 5/11<sup>th</sup> of tank is filled by pipe A and by 12: 31 pm, 3/4<sup>th</sup> of the tank is filled by the pipe A. How long does it take to fill the tank completely?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2360;&#2350;&#2366;&#2344; &#2342;&#2352; &#2346;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2361; &#2346;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344; 11:00 &#2348;&#2332;&#2375; &#2346;&#2366;&#2311;&#2346; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2335;&#2306;&#2325;&#2368; &#2325;&#2366; 5/11 &#2349;&#2366;&#2327; &#2349;&#2352;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 12:31 &#2348;&#2332;&#2375; &#2340;&#2325; &#2346;&#2366;&#2311;&#2346; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2335;&#2306;&#2325;&#2368; &#2325;&#2366; 3/4 &#2349;&#2366;&#2327; &#2349;&#2352;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2346;&#2370;&#2352;&#2381;&#2339; &#2352;&#2370;&#2346; &#2360;&#2375; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">300 min</span><span class=\"hqt\" style=\"display:none\">300 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">270 min</span><span class=\"hqt\" style=\"display:none\">270 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">312 min</span><span class=\"hqt\" style=\"display:none\">312 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">308 min</span><span class=\"hqt\" style=\"display:none\">308 &#2350;&#2367;&#2344;&#2335;</span>"

    "correct_option_id": 3,
    "solution": "<p>At 11: 00 am, 5/11<sup>th</sup> of tank is filled and by 12: 31 pm, 3/4<sup>th</sup> of tank is filled.</p><p>In 91 min, part of tank is filled = (3/4)  -  (5/11) = (33  -  20)/44 = 13/44<sup>th</sup></p><p>Full tank is filled in = 91 * 44/13 = 308 min.</p>",

    "solution": "<p>Let total capacity of tank = LCM of 28 and 32 = 224 units</p><p>Efficiency of pipe = 224/28 = 8 units per hour</p><p>Efficiency of leak and pipe = 224/32 = 7 units per hour</p><p>Net efficiency of leak = 7  -  8 = -1 units per hour [- shows leak will empty the tank]</p><p>50% of total capacity = 224 * &frac12; = 112 units</p><p>Required time = 112/1 = 112 hours.</p>",

  {
    "question": "<span class=\"eqt\"><p>Pipe A and pipe B can fill a tank in 18 minutes and 72 minutes respectively. There is an outlet pipe C which can empty the tank in 144 minutes. Find the time taken to fill the tank if all three pipes are opened together.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 18 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 72 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2310;&#2313;&#2335;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; C &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 144 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354; &#2342;&#2367;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",

    "solution": "<p>Capacity of tank = LCM of 18, 72 and 144 = 144 unit</p><p>Efficiency of pipe A = 144/18 = 8 unit</p><p>Efficiency of pipe B = 144/72 = 2 unit</p><p>Efficiency of pipe C = 144/144 = 1 unit</p><p>Required time = 144/(8 + 2 - 1) = 144/9 </p><p>=&gt; 16 minutes</p>",

    "question": "<span class=\"eqt\"><p>Pipe A can fill a tank in 60 hours and Pipe B can fill half of the tank in 45 hours. Find the time taken by Pipe A and Pipe B together to fill the tank.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 60 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; &#2310;&#2343;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; 45 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "solution": "<p>Time taken by Pipe B to completely fill the tank = 45 * 2 = 90 hours</p><p>Total capacity of the tank = LCM of 60 and 90 = 180 units</p><p>Efficiency = Total capacity/ Time taken</p><p>Efficiency of pipe A = 180/60 = 3 units</p><p>Efficiency of Pipe B = 180/90 = 2 units</p><p>Time taken by Pipe A and Pipe B to fill the tank = 180/ (3 + 2) = 36 hours</p>",

  {

    "question": "<span class=\"eqt\"><p>Pipes A, B, and C can fill a tank in 12 hours, 24 hours, and 16 hours respectively. If pipes A and C are opened together for one hour and pipes B and C are opened together for next one hour, and in this way the pipes are opened further for alternate hours, then find the time taken to fill the tank.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A, B &#2324;&#2352; C &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 12 &#2328;&#2306;&#2335;&#2375;, 24 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 16 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; C &#2325;&#2379; &#2319;&#2325; &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2346;&#2366;&#2311;&#2346; B &#2324;&#2352; C &#2325;&#2379; &#2309;&#2327;&#2354;&#2375; &#2319;&#2325; &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325;&#2366;&#2306;&#2340;&#2352; &#2328;&#2306;&#2335;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>An inlet pipe A can fill a tank in 24 minutes whereas outlet pipe B takes 40 minutes to empty the tank, then find the time taken by both pipes together to fill the tank completely.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2311;&#2344;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 24 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2310;&#2313;&#2335;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; B &#2325;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 40 &#2350;&#2367;&#2344;&#2335; &#2325;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2346;&#2370;&#2352;&#2381;&#2339; &#2352;&#2370;&#2346; &#2360;&#2375; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Pipe P, pipe Q and pipe R can fill a tank in 18 minutes, 54 minutes and 72 minutes respectively. Pipe P and pipe Q both are opened for 9 minutes. Find the time taken by pipe R alone to fill the remaining tank.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; P, &#2346;&#2366;&#2311;&#2346; Q &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; R &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 18 &#2350;&#2367;&#2344;&#2335;, 54 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 72 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2366;&#2311;&#2346; P &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; Q &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2379; 9 &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2358;&#2375;&#2359; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2366;&#2311;&#2346; R &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
