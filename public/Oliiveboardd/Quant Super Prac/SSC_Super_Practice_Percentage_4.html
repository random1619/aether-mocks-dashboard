<html lang="en">
<head>

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>

            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In how much time will &#8377;5,000 at 4% per annum simple interest produce the same interest as &#8377;8,000 in 2.5 years at 8% per annum simple interest?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; 4% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#8377;5,000, &#2313;&#2340;&#2344;&#2366; &#2361;&#2368; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2375;&#2327;&#2366; &#2332;&#2367;&#2340;&#2344;&#2366; 8% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 2.5 &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#8377;8,000, &#2313;&#2340;&#2344;&#2366; &#2361;&#2368; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2375;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">8 years</span><span class=\"hqt\" style=\"display:none\">8 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">5 years</span><span class=\"hqt\" style=\"display:none\">5 &#2360;&#2366;&#2354;</span>",
      "<span class=\"eqt\">4 years</span><span class=\"hqt\" style=\"display:none\">4 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">2 years</span><span class=\"hqt\" style=\"display:none\">2 &#2360;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>First, calculate the interest on &#8377;8,000 at 8% for 2.5 years:</p><p>Interest = 8000  X  8/100  X  2.5 = &#8377;1,600</p><p>Next, for &#8377;5,000 at 4% per annum, annual interest = 5000  X  4/100 = &#8377;200</p><p>Time required = 1600 / 200 = 8 years</p><p>Option (a) is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If the annual rate of simple interest increases from 11&percnt; to 17( <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>2</span></div> )&percnt;, then a person's yearly income increases by &#8377;1,071.20. The simple interest (in &#8377;) on the same sum at 10&percnt; for 5 years is &#58;&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2342;&#2352; 11% &#2360;&#2375; &#2348;&#2338;&#2364;&#2325;&#2352; 17(1/2)% &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2368; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2310;&#2351; &#8377;1,071.20 &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 10% &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 5 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; (&#8377; &#2350;&#2375;&#2306;) &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">9,120</span><span class=\"hqt\" style=\"display:none\">9,120</span>",
      "<span class=\"eqt\">8,240</span><span class=\"hqt\" style=\"display:none\">8,240</span>",
      "<span class=\"eqt\">16,480</span><span class=\"hqt\" style=\"display:none\">16,480</span>",
      "<span class=\"eqt\">7,250</span><span class=\"hqt\" style=\"display:none\">7,250</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the amount, on which SI is calculated be &#8377;x.</p><p>So,</p><p>(x * 35)/(100 * 2)  -  (x * 11)/100 = 1071.20</p><p>35x  -  22x = 214240</p><p>x = 16480</p><p>Now, the SI on &#8377;16480 at 10% for 5 years:</p><p>(16480 * 10 * 5)/100</p><p>= &#8377;8240</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Aman invested a sum of money in scheme A at the rate of 8% p.a. for a period of 5 years on simple interest. He invested four times of the sum of scheme A in scheme B at the rate of 5% p.a. for 7 years on simple interest. He received a total interest amount of &#8377;1,620. How much (in &#8377;) did he invest in scheme B?</p></span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2344; &#2344;&#2375; &#2360;&#2381;&#2325;&#2368;&#2350; A &#2350;&#2375;&#2306; 5 &#2360;&#2366;&#2354; &#2325;&#2368; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; 8% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2319;&#2325; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2313;&#2360;&#2344;&#2375; &#2360;&#2381;&#2325;&#2368;&#2350; A &#2325;&#2368; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2330;&#2366;&#2352; &#2327;&#2369;&#2344;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2360;&#2381;&#2325;&#2368;&#2350; B &#2350;&#2375;&#2306; 7 &#2360;&#2366;&#2354; &#2325;&#2375; &#2354;&#2367;&#2319; 5% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2313;&#2360;&#2375; &#2325;&#2369;&#2354; &#2348;&#2381;&#2351;&#2366;&#2332; &#2352;&#2366;&#2358;&#2367; 1,620 &#2337;&#2377;&#2354;&#2352; &#2350;&#2367;&#2354;&#2368;&#2404; &#2313;&#2360;&#2344;&#2375; &#2360;&#2381;&#2325;&#2368;&#2350; B &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; (&#8377; &#2350;&#2375;&#2306;) &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">2,400</span><span class=\"hqt\" style=\"display:none\">2,400</span>",
      "<span class=\"eqt\">900</span><span class=\"hqt\" style=\"display:none\">900</span>",
      "<span class=\"eqt\">3,200</span><span class=\"hqt\" style=\"display:none\">3,200</span>",
      "<span class=\"eqt\">3,600</span><span class=\"hqt\" style=\"display:none\">3,600</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In scheme A,</p><p>Let amount invested be x,</p><p>Rate=8%,</p><p>Time=5 years</p><p>So S.I=x*8*5/100</p><p>In scheme B,</p><p>Amount invested=4x,</p><p>Rate=5%</p><p>Time=7 years</p><p>S.I=4x*5*7/100</p><p>Total= scheme A+scheme B,So</p><p>40x/100 + 140x/100=1620</p><p>180x=162000</p><p>X=900.</p><p>So 4x=3600.</p><p>Option (d) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>A person deposited some amount of money in the bank at simple interest. After 20 years, the amount became nine times the amount deposited. In how many years will the amount become 13 times the amount if the interest rate remains the same?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#2348;&#2376;&#2306;&#2325; &#2350;&#2375;&#2306; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2325;&#2369;&#2331; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2350;&#2366; &#2325;&#2368;&#2404; 20 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342;, &#2352;&#2366;&#2358;&#2367; &#2332;&#2350;&#2366; &#2325;&#2368; &#2327;&#2312; &#2352;&#2366;&#2358;&#2367; &#2325;&#2368; &#2344;&#2380; &#2327;&#2369;&#2344;&#2368; &#2361;&#2379; &#2327;&#2312;&#2404; &#2351;&#2342;&#2367; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2357;&#2361;&#2368; &#2352;&#2361;&#2375; &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2366;&#2358;&#2367; 13 &#2327;&#2369;&#2344;&#2368; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">28</span><span class=\"hqt\" style=\"display:none\">28</span>",
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let principal = &#8377;P</p><p>P(1 + 20R/100) = 9P</p><p>1 + R/5 = 9</p><p>R/5 = 8</p><p>R = 40%</p><p>Now,</p><p>P(1 + 40T/100) = 13P</p><p>1 + 2T/5 = 13</p><p>2T/5 = 12</p><p>T = 30 years</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A certain sum of money is given at a certain rate of simple interest for 6 years. Had it been given at 7% higher rate, it would have fetched &#8377;1,512 more. Find the sum (in &#8377;).</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 6 &#8203;&#8203;&#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2352; &#2346;&#2352; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2311;&#2360;&#2375; 7% &#2309;&#2343;&#2367;&#2325; &#2342;&#2352; &#2346;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366;, &#2340;&#2379; &#2351;&#2361; 1,512 &#2337;&#2377;&#2354;&#2352; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2340;&#2368;&#2404; &#2352;&#2366;&#2358;&#2367; (&#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">3200</span><span class=\"hqt\" style=\"display:none\">3200</span>",
      "<span class=\"eqt\">3600</span><span class=\"hqt\" style=\"display:none\">3600</span>",
      "<span class=\"eqt\">3100</span><span class=\"hqt\" style=\"display:none\">3100</span>",
      "<span class=\"eqt\">4200</span><span class=\"hqt\" style=\"display:none\">4200</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the sum be P.</p><p>SI for increased rate = &#8377;1,512</p><p>Increased rate = (Rate + 7)%</p><p>Difference in SI = (P  X  7  X  6) / 100</p><p>=&gt; &#8377;1,512 = (P  X  42) / 100</p><p>=&gt; 1512 = 0.42P</p><p>=&gt; P = 1512 / 0.42</p><p>=&gt; P = 3600</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A sum of &#8377;36,000 is divided into two parts, A and B, such that the simple interest at the rate of 15% p.a. On A and B after two years and four years, respectively, is equal. The total interest (in &#8377;) received from A is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#8377;36,000 &#2325;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2379; &#2342;&#2379; &#2349;&#2366;&#2327;&#2379;&#2306; A &#2324;&#2352; B &#2350;&#2375;&#2306; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; 15% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; A &#2324;&#2352; B &#2346;&#2352; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2342;&#2379; &#2357;&#2352;&#2381;&#2359; &#2324;&#2352; &#2330;&#2366;&#2352; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; A &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2369;&#2354; &#2348;&#2381;&#2351;&#2366;&#2332; (&#8377; &#2350;&#2375;&#2306;) &#2361;&#2379;&#2327;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">1,800</span><span class=\"hqt\" style=\"display:none\">1,800</span>",
      "<span class=\"eqt\">3,600</span><span class=\"hqt\" style=\"display:none\">3,600</span>",
      "<span class=\"eqt\">5,400</span><span class=\"hqt\" style=\"display:none\">5,400</span>",
      "<span class=\"eqt\">7,200</span><span class=\"hqt\" style=\"display:none\">7,200</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the invested amount in scheme A and B is 'x' and '36000  -  x' respectively.</p><p>According to the question:</p><p>(x * 15 * 2)/100 = [(36000  -  x) * 15 * 4]/100</p><p>x = 72000  -  2x</p><p>x = 24000</p><p>Total interest amount received from A = (x * 15 * 2)/100 = 0.3x</p><p>= &#8377;7200</p>",
    "question_index": 5
  },
  {

    "question": "<span class=\"eqt\"><p>A total of &#8377;2,00,000 is divided into two parts for investing in different banks on simple interest. One yields 4% p.a. while the other yields 6% p.a. If the total interest at the end of one year is equivalent to 4.7% p.a. on the whole amount, the amount (in &#8377;) invested in each bank is ________, respectively.</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2354; &#8377;2,00,000 &#2325;&#2379; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2379; &#2349;&#2366;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2346;&#2352; 4% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2348;&#2381;&#2351;&#2366;&#2332; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2342;&#2370;&#2360;&#2352;&#2375; &#2346;&#2352; 6% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2348;&#2381;&#2351;&#2366;&#2332; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2370;&#2352;&#2368; &#2352;&#2366;&#2358;&#2367; &#2346;&#2352; 4.7% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2348;&#2376;&#2306;&#2325; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2352;&#2366;&#2358;&#2367; (&#8377; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; ________ &#2361;&#2376;&#2404;</span>",

    "solution": "<p>Let the amount invested at 4% be &#8377;x</p><p>Then, the amount invested at 6% will be &#8377;(2,00,000 - x)</p><p>Total interest = Interest from 4% + Interest from 6%</p><p>Total interest = 4.7% of 2,00,000</p><p>Interest from 4% = x  X  4/100</p><p>Interest from 6% = (2,00,000 - x)  X  6/100</p><p>Total interest = x  X  4/100 + (2,00,000 - x)  X  6/100</p><p>Total interest = 4.7% of 2,00,000</p><p>4.7/100  X  2,00,000 = x  X  4/100 + (2,00,000 - x)  X  6/100</p><p>9,400 = 4x/100 + 6(2,00,000 - x)/100</p><p>9,400 = 4x/100 + 12,000 - 6x/100</p><p>=&gt; 9,400 = 12,000 - 2x/100</p><p>=&gt; 9,400 - 12,000 = -2x/100</p><p>=&gt; -2,600 = -2x/100</p><p>=&gt; 2,600 = 2x/100</p><p>=&gt; 2,60,000 = 2x</p><p>=&gt; x = 1,30,000</p><p>Amount invested at 4% = &#8377;1,30,000</p><p>Amount invested at 6% = &#8377;2,00,000 - &#8377;1,30,000 = &#8377;70,000</p>",
