<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If the father's age 12 years ago was four times the age of his son and 10 years hence son's age will be a year less than half of the father's age, then find the ratio of their present ages. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 12 &#2357;&#2352;&#2381;&#2359; &#2346;&#2361;&#2354;&#2375; &#2346;&#2367;&#2340;&#2366; &#2325;&#2368; &#2310;&#2351;&#2369; &#2313;&#2360;&#2325;&#2375; &#2346;&#2369;&#2340;&#2381;&#2352; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2368; &#2330;&#2366;&#2352; &#2327;&#2369;&#2344;&#2368; &#2341;&#2368; &#2324;&#2352; 10 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2346;&#2369;&#2340;&#2381;&#2352; &#2325;&#2368; &#2310;&#2351;&#2369; &#2346;&#2367;&#2340;&#2366; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2375; &#2310;&#2343;&#2375; &#2360;&#2375; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2350; &#2361;&#2379;&#2327;&#2368;, &#2340;&#2379; &#2313;&#2344;&#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5: 2</span><span class=\"hqt\" style=\"display:none\">5: 2</span>",
      "<span class=\"eqt\">4: 3</span><span class=\"hqt\" style=\"display:none\">4: 3</span>",
      "<span class=\"eqt\">5: 4</span><span class=\"hqt\" style=\"display:none\">5: 4</span>",
      "<span class=\"eqt\">3: 2</span><span class=\"hqt\" style=\"display:none\">3: 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the present age of the son be 'a' years.</p><p>Age of the father 12 years ago = Age of the son 12 years ago * 4</p><p>=> Age of the father 12 years ago = (a  -  12) * 4</p><p>Age of father 10 years hence = (Age of Son 10 years hence + 1) * 2</p><p>According to question,</p><p>(a -12) * 4 + 12 + 10 = (a + 10 + 1) * 2</p><p>=&gt; 4a  -  48 + 22 = 2a + 22</p><p>=&gt; 2a = 48</p><p>=&gt; a = 24</p><p>Father's present age = (24  -  12) * 4 + 12 = 60</p><p>Hence, the required ratio = 60/24 = 5: 2</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Ratio of present age of P to Q is 3 : 4. After 3 years the ratio becomes 7 : 9. What will be the age of Q after 5 years?</p></span><span class=\"hqt\" style=\"display:none\"><p>P &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2366; Q &#2360;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3 : 4 &#2361;&#2376;&#2404; 3 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 7 : 9 &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; 5 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; Q &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">27 years</span><span class=\"hqt\" style=\"display:none\">27 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">29 years</span><span class=\"hqt\" style=\"display:none\">29 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">33 years</span><span class=\"hqt\" style=\"display:none\">33 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">36 years</span><span class=\"hqt\" style=\"display:none\">36 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the ages of P and Q be 3x years and 4x years respectively.</p><p>According to question,</p><p>(3x + 3)/(4x + 3) = 7/9</p><p>=> 27x + 27 = 28x + 21</p><p>=> x = 6</p><p>Age of Q after 5 years = 4 * 6 + 5 = 29 years</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Sakshi's marks in mathematics was incorrectly entered as 84 instead of 72. If there are 40 students in the class, then what is the increment in the average marks of the class in mathematics because of this typing error?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2325;&#2381;&#2359;&#2368; &#2325;&#2375; &#2327;&#2339;&#2367;&#2340; &#2350;&#2375;&#2306; &#2309;&#2306;&#2325; 72 &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2327;&#2354;&#2340;&#2368; &#2360;&#2375; 84 &#2342;&#2352;&#2381;&#2332; &#2361;&#2379; &#2327;&#2319; &#2341;&#2375;&#2404; &#2351;&#2342;&#2367; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; 40 &#2331;&#2366;&#2340;&#2381;&#2352; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2311;&#2360; &#2335;&#2366;&#2311;&#2346;&#2367;&#2306;&#2327; &#2340;&#2381;&#2352;&#2369;&#2335;&#2367; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2327;&#2339;&#2367;&#2340; &#2350;&#2375;&#2306; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2369;&#2312; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">0.1</span><span class=\"hqt\" style=\"display:none\">0.1</span>",
      "<span class=\"eqt\">0.3</span><span class=\"hqt\" style=\"display:none\">0.3</span>",
      "<span class=\"eqt\">0.4</span><span class=\"hqt\" style=\"display:none\">0.4</span>",
      "<span class=\"eqt\">0.2</span><span class=\"hqt\" style=\"display:none\">0.2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let increment in the average marks = k</p><p>40 * k = 84  -  72</p><p>=> k = 12/40</p><p>=> k = 0.3</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If the average of a number and its reciprocal is 3.5, then what is the sum of its cube and its reciprocal?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350; &#2325;&#2366; &#2324;&#2360;&#2340; 3.5 &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2375; &#2328;&#2344; &#2324;&#2352; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350; &#2325;&#2366; &#2351;&#2379;&#2327; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">298</span><span class=\"hqt\" style=\"display:none\">298</span>",
      "<span class=\"eqt\">364</span><span class=\"hqt\" style=\"display:none\">364</span>",
      "<span class=\"eqt\">280</span><span class=\"hqt\" style=\"display:none\">280</span>",
      "<span class=\"eqt\">322</span><span class=\"hqt\" style=\"display:none\">322</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the number = p</p><p>p + 1/p = 7</p><p>(p + 1/p)<sup>3</sup> = 7<sup>3</sup> = 343</p><p>p<sup>3</sup> + 1/p<sup>3</sup> + 3(p * 1/p)(p + 1/p) = 343</p><p>p<sup>3</sup> + 1/p<sup>3</sup> + 3*7 = 343</p><p>p<sup>3</sup> + 1/p<sup>3</sup> = 343  -  21 = 322 </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If the average of 80 numbers M<sub>1</sub>, M<sub>2</sub>, M<sub>3</sub>, ......, M<sub>80</sub> is M, then find the average of the numbers M<sub>1</sub> + 20, M<sub>2</sub> + 20, M<sub>3</sub> + 20, .........., M<sub>80</sub> + 20.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 80 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; M<sub>1</sub>, M<sub>2</sub>, M<sub>3</sub>, ......, M<sub>80</sub> &#2325;&#2366; &#2324;&#2360;&#2340; M &#2361;&#2376;, &#2340;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; M<sub>1</sub> + 20, M<sub>2</sub> + 20, M<sub>3</sub> + 20, .........., M<sub>80</sub> + 20 &#2325;&#2366; &#2324;&#2360;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">20M</span><span class=\"hqt\" style=\"display:none\">20M</span>",
      "<span class=\"eqt\">M + 10</span><span class=\"hqt\" style=\"display:none\">M + 10</span>",
      "<span class=\"eqt\">M + 20</span><span class=\"hqt\" style=\"display:none\">M + 20</span>",
      "<span class=\"eqt\">10M</span><span class=\"hqt\" style=\"display:none\">10M</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>M<sub>1</sub> + M<sub>2</sub> + M<sub>3</sub> + ...... + M<sub>80</sub> = 80M</p><p>[(M<sub>1</sub> + 20) + (M<sub>2</sub> + 20) + (M<sub>3</sub> + 20) + ...... + (M<sub>80</sub> + 20)]/80 </p><p>= (80M + 20*80)/80</p><p>= M + 20</p><p><b>Express method - </b></p><p>If the average of some numbers is 'a' and a number 'b' is added/subtracted/multiplied/divide to each number, then the new average becomes (a+b)/(a-b)/ab/(a/b) respectively.</p><p>So, the average of the numbers M<sub>1</sub> + 20, M<sub>2</sub> + 20, M<sub>3</sub> + 20, .........., M<sub>80</sub> + 20 = M + 20</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The average of thirty  -  five numbers is 60. The average of the first 18 numbers and that of the last 18 numbers is 54.2 and 70.8 respectively. If the 18<sup>th</sup> number is excluded, then what is the average of the remaining numbers (correct to one decimal place)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2376;&#2306;&#2340;&#2368;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 60 &#2361;&#2376;&#2404; &#2346;&#2361;&#2354;&#2368; 18 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2324;&#2352; &#2309;&#2306;&#2340;&#2367;&#2350; 18 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 54.2 &#2324;&#2352; 70.8 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 18&#2357;&#2368;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2344;&#2367;&#2325;&#2366;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2358;&#2375;&#2359; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; (&#2319;&#2325; &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2381;&#2341;&#2366;&#2344; &#2340;&#2325; &#2360;&#2361;&#2368;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">52.5</span><span class=\"hqt\" style=\"display:none\">52.5</span>",
      "<span class=\"eqt\">57.3</span><span class=\"hqt\" style=\"display:none\">57.3</span>",
      "<span class=\"eqt\">60.7</span><span class=\"hqt\" style=\"display:none\">60.7</span>",
      "<span class=\"eqt\">59.9</span><span class=\"hqt\" style=\"display:none\">59.9</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>18<sup>th</sup> number = (Sum of first 18 numbers + Sum of last 18 numbers) - Sum of 35 numbers </p><p>= 18*54.2 + 18*70.8  -  35*60</p><p>= 18*125  -  2100</p><p>= 150</p><p>Average of the remaining 34 numbers = (35*60  -  150)/34 = 57.3</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The number of students in class P and class Q of a school are 50 and 60 respectively. The average marks in a subject of all the students is 91. If the average marks of the students in class P is 40% more than that of students in class Q, then what is the average marks of students in class Q?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2381;&#2325;&#2370;&#2354; &#2325;&#2368; &#2325;&#2325;&#2381;&#2359;&#2366; P &#2324;&#2352; &#2325;&#2325;&#2381;&#2359;&#2366; Q &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 50 &#2324;&#2352; 60 &#2361;&#2376;&#2404; &#2360;&#2349;&#2368; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2319;&#2325; &#2357;&#2367;&#2359;&#2351; &#2350;&#2375;&#2306; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; 91 &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2325;&#2325;&#2381;&#2359;&#2366; P &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; Q &#2325;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2360;&#2375; 40% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2325;&#2325;&#2381;&#2359;&#2366; Q &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">88</span><span class=\"hqt\" style=\"display:none\">88</span>",
      "<span class=\"eqt\">70</span><span class=\"hqt\" style=\"display:none\">70</span>",
      "<span class=\"eqt\">68</span><span class=\"hqt\" style=\"display:none\">68</span>",
      "<span class=\"eqt\">77</span><span class=\"hqt\" style=\"display:none\">77</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let average marks of the students in class Q = m</p><p>Total marks of all the students of class P and Q together = Total marks of all the students of class P + Total marks of all the students of class Q</p><p>=> 91*(50 + 60) = 50*1.4m + 60*m</p><p>=> m = 91*110/(70 + 60)</p><p>=> m = 77</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What is the difference between the average of first 160 odd positive numbers and the average of first 137 even positive numbers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2341;&#2350; 160 &#2357;&#2367;&#2359;&#2350; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2340;&#2341;&#2366; &#2346;&#2381;&#2352;&#2341;&#2350; 137 &#2360;&#2350; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2381;&#2351;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">26</span><span class=\"hqt\" style=\"display:none\">26</span>",
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>",
      "<span class=\"eqt\">31</span><span class=\"hqt\" style=\"display:none\">31</span>",
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Average of first 160 odd positive numbers = 160<sup>2</sup>/160 = 160</p><p>Average of first 137 even positive numbers = [137*(137 + 1)]/137 = 138</p><p>Required difference = 160 - 138 = 22 </p>",
    "question_index": 7
  },
  {

pan>",
