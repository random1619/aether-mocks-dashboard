<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>When 27 is added to a two digit number, its digits get reversed. What is the difference between its units digit and tens digit?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2342;&#2379; &#2309;&#2306;&#2325;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; 27 &#2332;&#2379;&#2337;&#2364;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2375; &#2309;&#2306;&#2325; &#2313;&#2354;&#2335; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2311;&#2360;&#2325;&#2375; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2324;&#2352; &#2342;&#2361;&#2366;&#2312; &#2309;&#2306;&#2325; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2381;&#2351;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the two digit number be 'ab' = 10a + b</p><p>Given that,</p><p>10a + b + 27 = 10b + a</p><p>=&gt; 27 = 9*(b-a)</p><p>=&gt;b-a = 3</p><p>Hence the difference would be 3</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If the digits of a two-digit number are interchanged, the value of the number decreases by 18. The digit at the tens place is double the digit at unit place. What is the number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2342;&#2379; &#2309;&#2306;&#2325;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2350;&#2366;&#2344; 18 &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2361;&#2366;&#2312; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2366; &#2309;&#2306;&#2325; &#2311;&#2325;&#2366;&#2312; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2375; &#2309;&#2306;&#2325; &#2325;&#2366; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">42</span><span class=\"hqt\" style=\"display:none\">42</span>",
      "<span class=\"eqt\">63</span><span class=\"hqt\" style=\"display:none\">63</span>",
      "<span class=\"eqt\">84</span><span class=\"hqt\" style=\"display:none\">84</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the two-digit number be 10x + y.</p><p>Numbers obtained by interchanging the digits = 10y + x</p><p>&#8756; (10x + y) - (10y + x) = 18</p><p>=&gt; 9x - 9y = 18</p><p>=&gt; x - y = 2 ..(i)</p><p>Also, y = x/2</p><p>=&gt; 2y = x ..(ii)</p><p>From (i) and (ii), y = 2 and x = 4.</p><p>&#8756; The number is 42.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Find the number of zeros when numbers 2, 4, 6, 8, 10.................. 42, 44, 46, 48, 50 are multiplied together.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 2, 4, 6, 8, 10................. 42, 44, 46, 48, 50 &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2358;&#2370;&#2344;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The numbers of zeros in the multiplication will be from the numbers 10, 20, 30, 40 and 50 which are 5 in number. One more zero when 50 and 20 are multiplied together.</p><p>=&gt;  Total 5 + 1 = 6</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Find the unit's digit of the product 61*62*63*.........69</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2339;&#2344;&#2347;&#2354; 61*62*63*.........69 &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>If we observe carefully, the unit digit will be the result of the product of the unit digits of 61, 62,.........69</p><p>i.e., 1*2*3*4*5*6*7*8*9</p><p>i.e., 2*5*1*3*4*6*7*8*9</p><p>i.e., 10*1*3*4*6*7*8*9</p><p>i.e., 0</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What is the unit digit in the expansion of (9853)<sup>5 </sup><sup> X  7  X  11  X  13</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>(9853)<sup>5 </sup><sup> X 7 X 11 X 13</sup> &#2325;&#2375; &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2350;&#2375;&#2306; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Unit digit of 9853<sup>5 </sup><sup> X  7  X  11  X  13</sup> = Unit digit of 3<sup>5005</sup></p><p>= Unit digit of 3<sup>(4 </sup><sup> X  1251 + 1)</sup></p><p>= 1 * 3<sup>1</sup></p><p>= 3</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What is the number of trailing zero in 688!?</p></span><span class=\"hqt\" style=\"display:none\"><p>688 &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2367;&#2350; &#2358;&#2370;&#2344;&#2381;&#2351; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">164</span><span class=\"hqt\" style=\"display:none\">164</span>",
      "<span class=\"eqt\">182</span><span class=\"hqt\" style=\"display:none\">182</span>",
      "<span class=\"eqt\">170</span><span class=\"hqt\" style=\"display:none\">170</span>",
      "<span class=\"eqt\">180</span><span class=\"hqt\" style=\"display:none\">180</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Number of zeroes = number of pairs of 2 * 5.</p><p>Quotient of 688/5 = 137</p><p>Quotient of 137/5 = 27</p><p>Quotient of 27/5 = 5</p><p>Quotient of 5/5 = 1</p><p>Total number of zeroes = 137 + 27 + 5 + 1 = 170</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Find the number of zeroes in 181!</p></span><span class=\"hqt\" style=\"display:none\"><p>181 &#2350;&#2375;&#2306; &#2358;&#2370;&#2344;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;!</p></span>",
    "options": [
      "<span class=\"eqt\">44</span><span class=\"hqt\" style=\"display:none\">44</span>",
      "<span class=\"eqt\">39</span><span class=\"hqt\" style=\"display:none\">39</span>",
      "<span class=\"eqt\">43</span><span class=\"hqt\" style=\"display:none\">43</span>",
      "<span class=\"eqt\">33</span><span class=\"hqt\" style=\"display:none\">33</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>We know that to find the number of zeroes in any expression, all we need to do is to count the number of 5's.</p><p>Therefore,</p><p>181/5: Quotient 36.</p><p>36/5: Quotient 7.</p><p>7/5: Quotient 1.</p><p>Total number of 5's = 36 + 7 + 1 = 44</p><p>Total number of zeroes = 44</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Find the number of zeroes in 143! x 6 x 16 x 23 x 12 x 43.</p></span><span class=\"hqt\" style=\"display:none\"><p>143! x 6 x 16 x 23 x 12 x 43 &#2350;&#2375;&#2306; &#2358;&#2370;&#2344;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">32</span><span class=\"hqt\" style=\"display:none\">32</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">44</span><span class=\"hqt\" style=\"display:none\">44</span>",
      "<span class=\"eqt\">34</span><span class=\"hqt\" style=\"display:none\">34</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>We know that to find the number of zeroes in any expression, all we need to do is to count the number of 5's.</p><p>In 143!</p><p>143/5: Quotient 28.</p><p>28/5: Quotient 5.</p><p>5/5: Quotient 1.</p><p>Total number of 5's = 34</p><p>In the remaining part of expression 6 x 16 x 23 x 12 x 43, number of 5's = 0</p><p>Total number of zeroes in the expression = 34 + 0 = 34</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Find the number of zeroes in the product <img width=200 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27304/image001.png\">.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2350;&#2375;&#2306; &#2358;&#2370;&#2344;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; <img width=200 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27304/image001.png\">.</p></span>",
    "options": [
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=200 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27304/image001.png\"></p><p><img width=255 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27304/image002.png\"></p><p><img width=205 height=17 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27304/image003.png\"></p><p><img width=151 height=17 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27304/image004.png\"></p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>Find the number of zeroes in the following expression: 82! + 101!</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2350;&#2375;&#2306; &#2358;&#2370;&#2344;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;: 82! + 101!</p></span>",
    "options": [
      "<span class=\"eqt\">41</span><span class=\"hqt\" style=\"display:none\">41</span>",
      "<span class=\"eqt\">39</span><span class=\"hqt\" style=\"display:none\">39</span>",
      "<span class=\"eqt\">44</span><span class=\"hqt\" style=\"display:none\">44</span>",
      "<span class=\"eqt\">43</span><span class=\"hqt\" style=\"display:none\">43</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>We know that to find the number of zeroes in any expression, all we need to do is to count the number of 5's.</p><p>In 82!</p><p>82/5: Quotient 16.</p><p>16/5: Quotient 3.</p><p>Total number of 5's = 19</p><p>Number of zeroes in 82! = 19</p><p>In 101!</p><p>101/5: Quotient 20</p><p>20/5: Quotient 4</p><p>Total number of 5's = 24</p><p>Number of zeroes in 101! = 24</p><p>Required answer = 19 + 24 = 43</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Find the unit digit of 266<sup>32</sup> + 5000<sup>125</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>266<sup>32</sup> + 5000<sup>125</sup> &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>We know that any power of 6 gives 6 as a unit digit. And unit digit of 5000 is 0 which also gives 0 as the unit digit irrespective of power.</p><p>Therefore,</p><p>Unit digit of 266<sup>32</sup> + 5000<sup>125 </sup>= (6 + 0) = 6</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>The digit in unit's place of the product 77 x 78 x 79 x 81 x 83 x 85 x 87.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2325;&#2375; &#2311;&#2325;&#2366;&#2312; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2366; &#2309;&#2306;&#2325; 77 x 78 x 79 x 81 x 83 x 85 x 87.</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Product of the unit digits in the given expression = 7 x 8 x 9 x 1 x 3 x 5 x 7 contains a '0' as 8 x 5 = 40.</p><p>Therefore, required answer will be 0.</p>",
    "question_index": 11
  },
  {

  {
    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are true?</p><p>I. The unit digit of the sum of the first 183 natural numbers is 6.</p><p>II. The unit digit of (213)<sup>329</sup> X (189)<sup>282</sup> X (517)<sup>511</sup> is 9.</p><p>III. Total number of odd factors of 2520 is 15</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p><p>I. &#2346;&#2361;&#2354;&#2375; 183 &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; 6 &#2361;&#2376;&#2404;</p><p>II. (213)<sup>329</sup> X (189)<sup>282</sup> X (517)<sup>511</sup> &#2325;&#2366; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325; 9 &#2361;&#2376;&#2404;</p><p>III. 2520 &#2325;&#2375; &#2357;&#2367;&#2359;&#2350; &#2327;&#2369;&#2339;&#2325; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 15 &#2361;&#2376;</p></span>",

      "<span class=\"eqt\">Only III and I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III &#2324;&#2352; I</span>",
      "<span class=\"eqt\">All of I, II and III</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; I, II &#2324;&#2352; III</span>"

    "correct_option_id": 0,
    "solution": "<p><b>I:</b></p><p>Sum of first 183 natural numbers = 183(183 + 1)/2 = 183*92</p><p>So, unit's digit will be 3*2 = 6</p><p>I is true</p><p><b>II:</b></p><p>Unit digit of (213)<sup>329</sup> X (189)<sup>282</sup> X (517)<sup>511</sup></p><p>= unit digit of 3<sup>329 </sup> X  9<sup>282 </sup> X  7<sup>511</sup></p><p>We know the cyclicity of the numbers:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Number</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cyclicity</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1, 5, 6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4, 9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2, 3, 7, 8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td></tr></table><p>Unit digit of 3<sup>329</sup> = Unit digit of 3<sup>4 X 82 + 1</sup> = Unit digit of 3<sup>1</sup> = 3</p><p>Unit digit of 9<sup>282</sup> = 1</p><p>Unit digit of 7<sup>511</sup> = Unit digit of 7<sup>4 X 127 + 3</sup> = Unit digit of 7<sup>3</sup> = 3</p><p>So, Unit digit of (215)<sup>327</sup> X (189)<sup>282</sup> X (517)<sup>511</sup></p><p>= 3 X 1 X 3</p><p>= 9</p><p>II is true</p><p><b>III.</b></p><p>2520 = 2<sup>3</sup> X 3<sup>2</sup> X 5 X 7</p><p>Number of odd factors = (2 + 1)(1 + 1)(1 + 1) = 3*2*2 = 12</p><p>III is false</p>",

    "question": "<span class=\"eqt\"><p>If M = &radic;121 + &radic;12321 + &radic;1234321 + .. + &radic;12345678987654321, then what is the sum of digits of 'M'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; M = &radic;121 + &radic;12321 + &radic;1234321 + .. + &radic;12345678987654321&#2361;&#2376;, &#2340;&#2379; 'M' &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    "solution": "<p>M = &radic;121 + &radic;12321 + &radic;1234321 + .. + &radic;12345678987654321</p><p>=&gt; M = 11 + 111 + 1111 + .. + 111111111</p><p>=&gt; M = (1 + 11 + 111 + 1111 + .. + 111111111)  -  1</p><p>=&gt; M = (1 + (10 + 1) + (100 + 10 + 1) + (1000 + 100 + 10 + 1) + .. + (10<sup>8</sup> + 10<sup>7</sup> + 10<sup>6</sup> + 10<sup>5</sup> + .. + 1)  -  1</p><p>=&gt; M = ((9 * 1) + (8 * 10) + (7 * 10<sup>2</sup>) + (6 * 10<sup>3</sup>) + (5 * 10<sup>4</sup>) + (4 * 10<sup>5</sup>) + (3 * 10<sup>6</sup>) + (2 * 10<sup>7</sup>) + (1 * 10<sup>8</sup>))  -  1</p><p>=&gt; M = 123456789  -  1</p><p>=&gt; M = 123456788</p><p>Sum of digits of M = 1 + 2 + 3 + 4 + 5 + 6 + 7 + 8 + 8 = 44</p>",

    "question": "<span class=\"eqt\"><p>If A = 3<sup>3</sup> + 6<sup>3</sup> + 9<sup>3</sup> + .... + 39<sup>3 </sup>and B = 4<sup>2</sup> + 6<sup>2</sup> + 8<sup>2</sup> + .... + 28<sup>2</sup>, then what is the product of unit digits of A and 2B?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A = 3<sup>3</sup> + 6<sup>3</sup> + 9<sup>3</sup> + .... + 39<sup>3 </sup>&#2324;&#2352; B = 4<sup>2</sup> + 6<sup>2</sup> + 8<sup>2</sup> + .... + 28<sup>2</sup>, &#2340;&#2379; A &#2324;&#2352; 2B &#2325;&#2375; &#2311;&#2325;&#2366;&#2312; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 3,
    "solution": "<p>A = 3<sup>3</sup> + 6<sup>3</sup> + 9<sup>3</sup> + .... + 39<sup>3</sup></p><p>A = 27 * ((1<sup>3 </sup>+ 2<sup>3</sup> + 3<sup>3</sup> + ... + 13<sup>3</sup>)</p><p>Here, we know that, (1<sup>3 </sup>+ 2<sup>3</sup> + 3<sup>3</sup> + ... + n<sup>3</sup>) = (n(n + 1)/2)<sup>2</sup></p><p>Then, A = 27 * (((13(13 + 1)/2)<sup>2</sup>) = 223587</p><p>Similarly, B = 4<sup>2</sup> + 6<sup>2</sup> + 8<sup>2</sup> + .... + 28<sup>2</sup></p><p>B = 4 * (2<sup>2</sup> + 3<sup>2</sup> + 4<sup>2 </sup>+ ... + 14<sup>2</sup>)</p><p>B = 4 * ((1<sup>2 </sup>+ 2<sup>2</sup> + 3<sup>2</sup> + ... + 14<sup>2</sup>)  -  1<sup>2</sup>)</p><p>Here, we know that, (1<sup>2 </sup>+ 2<sup>2</sup> + 3<sup>2</sup> + ... + n<sup>2</sup>) = n(n + 1)(2n + 1)/6</p><p>Then, B =4 * ((14(14 + 1)(28 + 1)/6)  -  (1) = 4056</p><p>2B=8112</p><p>Therefore, product of unit digit of A and B = 7 * 2 = <b>14</b></p>",

;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table><p>(Note: when remainder is 0, power = cyclicity)</p><p>In 348<sup>66</sup>:</p><p>Unit digit of 348 is 8.</p><p>From the cyclicity chart, cyclicity of 8 is 4.</p><p>So, we have to divide the power of 348 i.e.66 by 4.</p><p>After dividing 66 by 4, remainder = 2. So, power &#8800; cyclicity</p><p>Unit digit of 8<sup>2</sup> = 4</p><p>So, unit digit of 348<sup>66 </sup>= <b>4</b></p>",
