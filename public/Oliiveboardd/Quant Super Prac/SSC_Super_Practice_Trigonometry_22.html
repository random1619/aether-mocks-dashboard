<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;">
                    <i class="fas fa-graduation-cap" style="color: var(--primary);"></i> devgagan
                </h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <!-- Standardized Sectional Timer Toggle Widget in Welcome Screen -->
            <div class="settings-container" style="margin-bottom: 32px; padding: 16px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; display: flex; align-items: center; justify-content: space-between;">
                <div class="settings-info" style="text-align: left;">
                    <h3 style="font-size: 1rem; font-weight: 700; color: var(--text-main); margin-bottom: 4px;">10-Min Sectional Timer</h3>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin: 0;">Force a strict 10-minute limit on all test sections</p>
                </div>
                <label class="switch" style="position: relative; display: inline-block; width: 46px; height: 26px;">
                    <input type="checkbox" id="sectionalTimerOverrideToggle">
                    <span class="slider" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border-color); transition: .4s; border-radius: 34px;"></span>
                </label>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>

        </div>
        
        <!-- Main Content -->

            <!-- Question Area -->

                <!-- Controls -->

    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Justify the lines from the equations 5X+3Y+9=0 and 6X-10Y-35</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2368;&#2325;&#2352;&#2339;&#2379;&#2306; 5X+3Y+9=0 &#2324;&#2352; 6X-10Y-35 &#2360;&#2375; &#2352;&#2375;&#2326;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2330;&#2367;&#2340;&#2381;&#2351; &#2360;&#2367;&#2342;&#2381;&#2343; &#2325;&#2368;&#2332;&#2367;&#2319;</p></span>",
    "options": [
      "<span class=\"eqt\">Parallel</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;</span>",
      "<span class=\"eqt\">Perpendicular</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2343;&#2366;</span>",
      "<span class=\"eqt\">Intersecting</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2360;&#2381;&#2346;&#2352;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Coincident</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2344;&#2366;&#2360;&#2367;&#2348;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Slope of the equation 5X+3Y+9=0 is</p><p>3Y = -5X -9</p><p>Y =-5X/3 -3</p><p>Equation for slope is </p><p>Y = mX +C</p><p>Slope of the first line(m1) = -5/3</p><p>Slope of the equation 6X-10Y-35 is</p><p>-10Y = -6X +35</p><p>Y = (6X/10)  -  (35/10)</p><p>Y = 3X/5  -  (7/2)</p><p>Slope of the second line (m2) = 3/5</p><p>m1 = -1/m2</p><p>therefore, lines are perpendicular</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Intercept (unit) made by the plane <img width=113 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20637/image232.png\"> with <img width=67 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20637/image233.png\"> respectively is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2340;&#2354; <img width=113 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20637/image232.png\"> &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; <img width=67 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20637/image233.png\"> &#2325;&#2375; &#2360;&#2366;&#2341; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2309;&#2357;&#2352;&#2379;&#2343;&#2344; (&#2311;&#2325;&#2366;&#2312;) &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">(2, 3, 4)</span><span class=\"hqt\" style=\"display:none\">(2, 3, 4)</span>",
      "<span class=\"eqt\">(1, 3, 4)</span><span class=\"hqt\" style=\"display:none\">(1, 3, 4)</span>",
      "<span class=\"eqt\">(1, 2, 5)</span><span class=\"hqt\" style=\"display:none\">(1, 2, 5)</span>",
      "<span class=\"eqt\">(4, 2, 0)</span><span class=\"hqt\" style=\"display:none\">(4, 2, 0)</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=113 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20637/image232.png\"></p><p>Intercept on x axis, both <img width=89 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20637/image234.png\"></p><p><img width=99 height=17 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20637/image235.png\"></p><p><img width=37 height=16 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20637/image236.png\"></p><p>Intercept on y axis, both <img width=89 height=17 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20637/image237.png\"></p><p><img width=99 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20637/image238.png\"></p><p><img width=37 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20637/image239.png\"></p><p>Intercept on z axis, both <img width=91 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20637/image240.png\"></p><p><img width=97 height=17 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20637/image241.png\"></p><p><img width=37 height=16 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20637/image242.png\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The graph of 5x = 7 + 2y cuts the x  -  axis at point P(a, b). Find the value of (2a  -  3b).</p></span><span class=\"hqt\" style=\"display:none\"><p>5x = 7 + 2y &#2325;&#2366; &#2327;&#2381;&#2352;&#2366;&#2347; x - &#2309;&#2325;&#2381;&#2359; &#2325;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; P(a, b) &#2346;&#2352; &#2325;&#2366;&#2335;&#2340;&#2366; &#2361;&#2376;&#2404; (2a - 3b) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">12/5</span><span class=\"hqt\" style=\"display:none\">12/5</span>",
      "<span class=\"eqt\">17/5</span><span class=\"hqt\" style=\"display:none\">17/5</span>",
      "<span class=\"eqt\">9/5</span><span class=\"hqt\" style=\"display:none\">9/5</span>",
      "<span class=\"eqt\">14/5</span><span class=\"hqt\" style=\"display:none\">14/5</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Since, the graph of 5x = 7 + 2y cuts the x  -  axis at point P(a, b).</p><p>So, y = 0 =&gt; b = 0</p><p>5x = 7 + 2*0</p><p>x = 7/5</p><p>a = 7/5</p><p>2a  -  3b = 2*7/5  -  3*0 </p><p>= 14/5</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What is the reflection of the point (4, 2) on the X  -  axis?</p></span><span class=\"hqt\" style=\"display:none\"><p>X-&#2309;&#2325;&#2381;&#2359; &#2346;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; (4, 2) &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">(2, -4)</span><span class=\"hqt\" style=\"display:none\">(2, -4)</span>",
      "<span class=\"eqt\">(-4, -2)</span><span class=\"hqt\" style=\"display:none\">(-4, -2)</span>",
      "<span class=\"eqt\">(-4, 2)</span><span class=\"hqt\" style=\"display:none\">(-4, 2)</span>",
      "<span class=\"eqt\">(4, -2)</span><span class=\"hqt\" style=\"display:none\">(4, -2)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=222 height=218 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26671/image001.jpg\"></p><p>Since, the point (4, 2) is in the first quadrant and the reflection is on X  -  axis.</p><p>So, the reflection of this point will be in the fourth quadrant.</p><p>Reflection of the point (4, 2) on the X  -  axis = (4, -2)</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the perpendicular length from the origin to the line 8x + 15y  -  29 = 0. (up to one decimal place)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2370;&#2354; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2352;&#2375;&#2326;&#2366; 8x + 15y - 29 = 0 &#2346;&#2352; &#2354;&#2350;&#2381;&#2348;&#2357;&#2340; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; (&#2342;&#2358;&#2350;&#2354;&#2357; &#2325;&#2375; &#2319;&#2325; &#2360;&#2381;&#2341;&#2366;&#2344; &#2340;&#2325;)</p></span>",
    "options": [
      "<span class=\"eqt\">2.1</span><span class=\"hqt\" style=\"display:none\">2.1</span>",
      "<span class=\"eqt\">1.7</span><span class=\"hqt\" style=\"display:none\">1.7</span>",
      "<span class=\"eqt\">1.9</span><span class=\"hqt\" style=\"display:none\">1.9</span>",
      "<span class=\"eqt\">1.3</span><span class=\"hqt\" style=\"display:none\">1.3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Line =&gt; 8x + 15y  -  29 = 0</p><p>Comparing with Ax<sub>1</sub> + By<sub>1</sub> + C = 0</p><p>=&gt; A = 8, B = 15, C = -29</p><p>Origin = (x, y) = (0, 0)</p><p><img width=169 height=44 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27648/image001.png\"></p><p><img width=185 height=44 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27648/image002.png\"></p><p><img width=116 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27648/image003.png\"></p><p>Distance = 29/17</p><p>= 1.7</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Find the length of the part of the straight line 12x + 35y = 420 intercepted between the axes.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2368;&#2343;&#2368; &#2352;&#2375;&#2326;&#2366; 12x + 35y = 420 &#2325;&#2375; &#2309;&#2325;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2340;&#2307;&#2326;&#2306;&#2337;&#2367;&#2340; &#2349;&#2366;&#2327; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">37</span><span class=\"hqt\" style=\"display:none\">37</span>",
      "<span class=\"eqt\">47</span><span class=\"hqt\" style=\"display:none\">47</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Straight line =&gt; 12x + 35y = 420</p><p>12x/420 + 35y/420 = 1</p><p>x/35 + y/12 = 1</p><p>Comparing with x/a + y/b = 1</p><p>a = 35, b = 12</p><p>Length of the line segment = &radic;(a<sup>2</sup> + b<sup>2</sup>)</p><p>= &radic;(35<sup>2</sup> + 12<sup>2</sup>)</p><p>= &radic;(1225 + 144)</p><p>= &radic;1369</p><p>= 37 units</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If the intersection points of the equations x + 3y  -  11 = 0 and 5x  -  y + 17 = 0 on the graph is (x, y), then what is the value of (x + 3y)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2327;&#2381;&#2352;&#2366;&#2347; &#2346;&#2352; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339;&#2379;&#2306; x + 3y - 11 = 0 &#2324;&#2352; 5x - y + 17 = 0 &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2348;&#2367;&#2306;&#2342;&#2369; (x, y) &#2361;&#2376;&#2306;, &#2340;&#2379; (x + 3y) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>x + 3y  -  11 = 0 and 5x  -  y + 17 = 0</p><p>Comparing the equations with a<sub>1</sub>x + b<sub>1</sub>y + c<sub>1</sub> = 0 and a<sub>2</sub>x + b<sub>2</sub>y + c<sub>2</sub> = 0 =&gt;</p><p>a<sub>1</sub> = 1, b<sub>1</sub> = 3, c<sub>1</sub> = -11</p><p>a<sub>2</sub> = 5, b<sub>2</sub> = -1, c<sub>2</sub> = 17</p><p>x = (b<sub>1</sub>c<sub>2</sub>  -  b<sub>2</sub>c<sub>1</sub>)/(a<sub>1</sub>b<sub>2</sub>  -  a<sub>2</sub>b<sub>1</sub>)</p><p>x = [3*17  -  (-1)(-11)]/[1*(-1)  -  5*3]</p><p>x = (51  -  11)/(-1  -  15)</p><p>x = 40/(-16)</p><p>x = - 2.5</p><p>y = (a<sub>2</sub>c<sub>1</sub>  -  a<sub>1</sub>c<sub>2</sub>)/(a<sub>1</sub>b<sub>2</sub>  -  a<sub>2</sub>b<sub>1</sub>)</p><p>y = [5*(-11)  -  1*17)/[1*(-1)  -  5*3)</p><p>y = (-55  -  17)/(-1  -  15)</p><p>y = 72/16</p><p>y = 4.5</p><p>x + 3y = - 2.5 + 3*4.5</p><p>= -2.5 + 13.5</p><p>= 11</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The lines 3x + 7y = -2 and 4x  -  y = 18 have a unique solution. Find the distance (in units) between the unique solution and the point of intersection of the line 4x  -  y = 18 and the y  -  axis.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2375;&#2326;&#2366;&#2319;&#2305; 3x + 7y = -2 &#2324;&#2352; 4x - y = 18 &#2325;&#2366; &#2319;&#2325; &#2309;&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2361;&#2354; &#2361;&#2376;&#2404; &#2309;&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2361;&#2354; &#2324;&#2352; &#2352;&#2375;&#2326;&#2366; 4x - y = 18 &#2324;&#2352; y - &#2309;&#2325;&#2381;&#2359; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2348;&#2367;&#2306;&#2342;&#2369; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; (&#2311;&#2325;&#2366;&#2311;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5&radic;15</span><span class=\"hqt\" style=\"display:none\">5&radic;15</span>",
      "<span class=\"eqt\">4&radic;11</span><span class=\"hqt\" style=\"display:none\">4&radic;11</span>",
      "<span class=\"eqt\">5&radic;19</span><span class=\"hqt\" style=\"display:none\">5&radic;19</span>",
      "<span class=\"eqt\">4&radic;17</span><span class=\"hqt\" style=\"display:none\">4&radic;17</span>"
    ],
    "correct_option_id": 3,

    "question": "<span class=\"eqt\"><p>Find the value of k, if the following pair of linear equations have infinite solutions?</p><p>kx + 7y  -  k = 5 and 6x + (5k  -  1)y = 16</p></span><span class=\"hqt\" style=\"display:none\"><p>k &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;, &#2351;&#2342;&#2367; &#2352;&#2376;&#2326;&#2367;&#2325; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2375; &#2309;&#2344;&#2306;&#2340; &#2361;&#2354; &#2361;&#2376;&#2306;?</p><p>kx + 7y - k = 5 &#2324;&#2352; 6x + (5k - 1)y = 16</p></span>",

    "question": "<span class=\"eqt\"><p>Find the value of k, where k is an integer value, if the lines 6x  -  (k  -  3)y  -  k = 0 and (7k  -  1)x + 2ky  -  8 = 0 are parallel?</p></span><span class=\"hqt\" style=\"display:none\"><p>k &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;, &#2332;&#2361;&#2366;&#2305; k &#2319;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2350;&#2366;&#2344; &#2361;&#2376;, &#2351;&#2342;&#2367; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305; 6x - (k - 3)y - k = 0 &#2324;&#2352; (7k - 1)x + 2ky - 8 = 0 &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2361;&#2376;&#2306;?</p></span>",

    "question": "<span class=\"eqt\"><p>Which of the following line passes through the midpoint of line segment joining points (3,4) and (-2,7)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2352;&#2375;&#2326;&#2366; &#2332;&#2369;&#2396;&#2366;&#2357; &#2348;&#2367;&#2344;&#2381;&#2342;&#2369;&#2323;&#2306; (3,4) &#2324;&#2352; (-2,7) &#2325;&#2375; &#2352;&#2375;&#2326;&#2366; &#2326;&#2306;&#2337; &#2325;&#2375; &#2350;&#2343;&#2381;&#2351; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2327;&#2369;&#2332;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Both (1) and (2)</span><span class=\"hqt\" style=\"display:none\">(1) &#2324;&#2352; (2) &#2342;&#2379;&#2344;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>According to the mid-point formula (x, y) coordinates of mid- point</p><p>x = (3 +(-2)) /2 = 0.5</p><p>y = (4 + 7)/2 = 5.5</p><p>So, line passing through mid-point must satisfy its equation for given set of values.</p><p>According to option (1)</p><p>5.5 = 10  -  (9 x 0.5) = 5.5</p><p>LHS = RHS hence line passes through mid-point.</p><p>According to option (2)</p><p>5.5 = 3 + (5 x 0.5) = 5.5</p><p>LHS = RHS hence line passes through mid-point.</p><p>According to option (3)</p><p>5.5 = 5  -  (2 x 0.5) = 4</p><p>LHS is not equal to RHS hence line does not pass through mid-point.</p><p>Hence correct answer is option (4).</p>",

    "question": "<span class=\"eqt\"><p>The points (0, 8/3), (1, 3) and (82, 30) are the vertices of:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2367;&#2306;&#2342;&#2369; (0, 8/3), (1, 3) &#2357; (82, 30) &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">an obtuse angled triangle</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2309;&#2343;&#2367; &#2325;&#2379;&#2339; &#2357;&#2366;&#2354;&#2375; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2375;</span>",

    "correct_option_id": 3,
    "solution": "<p>Let the three points be A (0, 8/3), B (1, 3) and C (82, 30)</p><p>Then, AB = &radic; {(1  -  0)<sup>2</sup>+ (3  -  8/3)<sup>2</sup>} = &radic;10 /3</p><p>BC = &radic; ((82  -  1)<sup>2</sup> + (30  -  3)<sup>2</sup>)</p><p>BC = &radic; (6561 + 729)</p><p>BC =&radic;7290</p><p>BC = 27&radic;10</p><p>CA = &radic; ((82  -  0)<sup>2</sup> + (30  -  8/3)<sup>2</sup>)</p><p>CA = &radic; ((10*82<sup>2</sup>)/9) = 82/3 * &radic;10</p><p>Now AB + BC = &radic;10/3 + 27&radic;10 = 82/3 * &radic;10</p><p>Since, AB + BC = AC, &radic;10 /3 + 27&radic;10 = 82/3 * &radic;10</p><p>It means point A, B and C are collinear.</p>",
