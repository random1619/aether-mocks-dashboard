    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Shovik purchases two types of sugar - the first type at Rs. 45 per kg and the second type at Rs. 80 per kg. In what ratio should Shovik blend the first type of sugar with the second type so that, by selling each kg of the blended sugar at Rs. 72 per kg, he makes a profit of 20%?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2379;&#2357;&#2367;&#2325; &#2342;&#2379; &#2392;&#2367;&#2360;&#2381;&#2350; &#2325;&#2368; &#2330;&#2368;&#2344;&#2368; &#2326;&#2352;&#2368;&#2342;&#2340;&#2366; &#2361;&#2376; - &#2346;&#2361;&#2354;&#2368; &#2392;&#2367;&#2360;&#2381;&#2350; &#2325;&#2368; &#2330;&#2368;&#2344;&#2368; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2352;&#2369;. 45 &#2346;&#2381;&#2352;&#2340;&#2367; kg &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2368; &#2392;&#2367;&#2360;&#2381;&#2350; &#2325;&#2368; &#2330;&#2368;&#2344;&#2368; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2352;&#2369;. 80 &#2346;&#2381;&#2352;&#2340;&#2367; kg &#2361;&#2376;&#2404; &#2358;&#2379;&#2357;&#2367;&#2325; &#2325;&#2379; &#2346;&#2361;&#2354;&#2368; &#2392;&#2367;&#2360;&#2381;&#2350; &#2325;&#2368; &#2330;&#2368;&#2344;&#2368; &#2325;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2392;&#2367;&#2360;&#2381;&#2350; &#2325;&#2368; &#2330;&#2368;&#2344;&#2368; &#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367; &#2350;&#2367;&#2358;&#2381;&#2352;&#2367;&#2340; &#2330;&#2368;&#2344;&#2368; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; (kg) &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2379; &#2352;&#2369;.72 &#2346;&#2381;&#2352;&#2340;&#2367; kg &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2348;&#2375;&#2330;&#2344;&#2375; &#2346;&#2352; &#2313;&#2360;&#2375; 20% &#2325;&#2366; &#2354;&#2366;&#2349; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2361;&#2379;?</p></span>",
    "options": [
      "<span class=\"eqt\">4 : 3</span><span class=\"hqt\" style=\"display:none\">4 : 3</span>",
      "<span class=\"eqt\">5 : 4</span><span class=\"hqt\" style=\"display:none\">5 : 4</span>",
      "<span class=\"eqt\">3 : 4</span><span class=\"hqt\" style=\"display:none\">3 : 4</span>",
      "<span class=\"eqt\">3 : 2</span><span class=\"hqt\" style=\"display:none\">3 : 2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Selling price of mixture = Rs. 72 per kg</p><p>Profit% = 20%</p><p>Cost price of mixture = 72 * 100/120 = 72 * 5/6 = Rs. 60</p><p>Using Alligation method,</p><p>Quantity of first type/Quantity of second type = (80  -  60)/ (60  -  45) = 20/15 = 4/3 = 4: 3</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>How much water should be added to 60 litres of milk at 1(1/2) litres a rupee so as to have a mixture worth 1(7/8) litres a rupee?</p></span><span class=\"hqt\" style=\"display:none\">1(1/2) &#2354;&#2368;&#2335;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367; &#2352;&#2369;&#2346;&#2319; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 60 &#2354;&#2368;&#2335;&#2352; &#2342;&#2370;&#2343; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2366;&#2344;&#2368; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; 1(7/8) &#2354;&#2368;&#2335;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367; &#2352;&#2369;&#2346;&#2319; &#2361;&#2379;?</span>",
    "options": [
      "<span class=\"eqt\">15 litres</span><span class=\"hqt\" style=\"display:none\">15 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">12 litres</span><span class=\"hqt\" style=\"display:none\">12 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">27 litres</span><span class=\"hqt\" style=\"display:none\">27 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">20 litres</span><span class=\"hqt\" style=\"display:none\">20 &#2354;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Cost of 1 litre of milk: </p><p>1(1/2)litres for 1 rupee &rarr; cost per litre = 1 &div; 1.5 = 2/3 rupee.</p><p>Total cost of 60 litres of milk = 60  X  (2/3) = 40 rupees.</p><p>Desired cost per litre of the mixture: </p><p>1(7/8) litres for 1 rupee &rarr; 1.875 litres per rupee &rarr; cost per litre = 1 &div; 1.875 = 8/15 rupee.</p><p>Let x = litres of water (free). </p><p>Total volume = 60 + x.</p><p>Total cost remains 40 rupees (milk only).</p><p>New cost per litre = 40 &div; (60 + x).</p><p>Set this equal to 8/15: 40 &div; (60 + x) = 8/15.</p><p>Cross multiply: 40  X  15 = 8  X  (60 + x) &rarr; 600 = 480 + 8x &rarr; x = 15.</p><p>Option (a) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A vessel contains 18 litres mixture of milk and water in the ratio 5:1. If 3 litres of milk is added to the vessel, then how much water (in litres) should be added to the vessel to have milk and water in the ratio 9:2?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2352;&#2381;&#2340;&#2344; &#2350;&#2375;&#2306; 5:1 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; 18 &#2354;&#2368;&#2335;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2348;&#2352;&#2381;&#2340;&#2344; &#2350;&#2375;&#2306; 3 &#2354;&#2368;&#2335;&#2352; &#2342;&#2370;&#2343; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2352;&#2381;&#2340;&#2344; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2366;&#2344;&#2368; (&#2354;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 9:2 &#2361;&#2379; &#2332;&#2366;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">1.5</span><span class=\"hqt\" style=\"display:none\">1.5</span>",
      "<span class=\"eqt\">0.5</span><span class=\"hqt\" style=\"display:none\">0.5</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Initial mixture = 18 litres </p><p>Milk = (5/6) * 18 = 15 litres </p><p>Water = (1/6) * 18 = 3 litres </p><p>Let x litres of water be added =&gt;</p><p>(15 + 3)/(3 + x) = 9/2</p><p>18 * 2 = 9(3 + x)</p><p>36 = 27 + 9x </p><p>9x = 9 </p><p>x = 1 </p><p>Hence, option 'd' is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Two vessels, A and B, contain spirit and water in the ratio 3:4 and 5:3, respectively. Find the ratio in which these two mixtures be mixed to obtain a new mixture in vessel C containing spirit and water in the ratio 4:3.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2348;&#2352;&#2381;&#2340;&#2344; A &#2324;&#2352; B &#2350;&#2375;&#2306; &#2360;&#2381;&#2346;&#2381;&#2352;&#2367;&#2335; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3:4 &#2324;&#2352; 5:3 &#2361;&#2376;&#2404; &#2348;&#2352;&#2381;&#2340;&#2344; C &#2350;&#2375;&#2306; &#2360;&#2381;&#2346;&#2381;&#2352;&#2367;&#2335; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4:3 &#2361;&#2379;, &#2311;&#2360;&#2325;&#2375; &#2354;&#2367;&#2319; &#2311;&#2344; &#2342;&#2379;&#2344;&#2379;&#2306; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339;&#2379;&#2306; &#2325;&#2379; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2351;&#2361; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3:8</span><span class=\"hqt\" style=\"display:none\">3:8</span>",
      "<span class=\"eqt\">3:7</span><span class=\"hqt\" style=\"display:none\">3:7</span>",
      "<span class=\"eqt\">5:8</span><span class=\"hqt\" style=\"display:none\">5:8</span>",
      "<span class=\"eqt\">4:7</span><span class=\"hqt\" style=\"display:none\">4:7</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Vessel A: Spirit = 3/7, Water = 4/7 </p><p>Vessel B: Spirit = 5/8, Water = 3/8 </p><p>Desired: Spirit = 4/7, Water = 3/7 </p><p>Using allegation on spirit: </p><p>(5/8 - 4/7) / (4/7 - 3/7) </p><p>LCM of 8, 7 = 56 </p><p>5/8 = 35/56, 4/7 = 32/56, 3/7 = 24/56 </p><p>(35/56 - 32/56) : (32/56 - 24/56) </p><p>(3/56) : (8/56) = 3:8 </p><p>Ratio of A:B = 3:8</p><p>Option (a) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Cost of two types of rice is Rs. 60 per kg and Rs. 84 per kg. If both the rice is mixed together in the ratio 1 : 1, then what should be the price of mixed variety of rice per kg?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2330;&#2366;&#2357;&#2354; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; 60 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2324;&#2352; 84 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2330;&#2366;&#2357;&#2354;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; 1:1 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2350;&#2367;&#2358;&#2381;&#2352;&#2367;&#2340; &#2325;&#2367;&#2360;&#2381;&#2350; &#2325;&#2375; &#2330;&#2366;&#2357;&#2354; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2368;&#2350;&#2340; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2379;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 80 per kg</span><span class=\"hqt\" style=\"display:none\">80 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Rs. 68 per kg</span><span class=\"hqt\" style=\"display:none\">68 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Rs. 76 per kg</span><span class=\"hqt\" style=\"display:none\">76 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Rs. 72 per kg</span><span class=\"hqt\" style=\"display:none\">72 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Since both the rice are mixed in the same quantity, which means the price of mixed variety of rice per kg will be the average of price per kg of rice of both the types.</p><p>Hence, price of mixed variety of rice per kg = (60 + 84)/2 = 144/2 = &#8377;72 per kg</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A jar contains 35% syrup in the mixture of syrup and water. A part of this mixture is replaced by another mixture containing 20% syrup. Now, in the new mixture, the percentage of syrup is found to be 24%. What is the ratio in which these mixtures were mixed to obtain the new mixture?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2332;&#2366;&#2352; &#2350;&#2375;&#2306; &#2330;&#2366;&#2358;&#2344;&#2368; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; 35% &#2330;&#2366;&#2358;&#2344;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2375; &#2319;&#2325; &#2349;&#2366;&#2327; &#2325;&#2379; 20% &#2330;&#2366;&#2358;&#2344;&#2368; &#2357;&#2366;&#2354;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2309;&#2348; &#2344;&#2351;&#2375; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2330;&#2366;&#2358;&#2344;&#2368; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; 24% &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2351;&#2366; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2311;&#2344; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339;&#2379;&#2306; &#2325;&#2379; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">3 : 14</span><span class=\"hqt\" style=\"display:none\">3 : 14</span>",
      "<span class=\"eqt\">4 : 11</span><span class=\"hqt\" style=\"display:none\">4 : 11</span>",
      "<span class=\"eqt\">5 : 13</span><span class=\"hqt\" style=\"display:none\">5 : 13</span>",
      "<span class=\"eqt\">7 : 10</span><span class=\"hqt\" style=\"display:none\">7 : 10</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the ratio in which the two mixtures are mixed = x: y</p><p>By the rule of alligation: </p><p><img width=131 height=49 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24258/image035.png\"></p><p>(20  -  24): (24  -  35) = x: y</p><p>4: 11 = x: y</p><p>x: y = 4: 11</p>",
    "question_index": 5

    "question": "<span class=\"eqt\"><p>There is a 21 litres mixture of milk and water. The ratio of milk and water in the mixture is 4:3. Find the amount of water (in litres) that should be added to this mixture so that the resulting mixture has 50% of water in it.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; 21 &#2354;&#2368;&#2335;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2361;&#2376;&#2404; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4:3 &#2361;&#2376;&#2404; &#2311;&#2360; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2366;&#2344;&#2368; (&#2354;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2368; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; 50% &#2346;&#2366;&#2344;&#2368; &#2361;&#2379;&#2404;</p></span>",

      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",

    "solution": "<p>Initial mixture is 21 litres with milk:water = 4:3,</p><p>So total parts = 7,</p><p>Milk = (4/7)  X  21 = 12 litres,</p><p>Water = (3/7)  X  21 = 9 litres.</p><p>Let y litres of water be added. New total = 21 + y, new water = 9 + y.</p><p>For 50% water,</p><p>(9 + y) / (21 + y) = 1/2.</p><p>2(9 + y) = 21 + y</p><p>so 18 + 2y = 21 + y</p><p>y = <b>3.</b></p>",

    "question": "<span class=\"eqt\"><p>In what ratio must a grocer mix two varieties of pulses costing &#8377;15 and &#8377;20 per kg, respectively, so as to get a mixture worth &#8377;18 per kg?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2306;&#2360;&#2366;&#2352;&#2368; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#8377;15 &#2324;&#2352; &#8377;20 &#2346;&#2381;&#2352;&#2340;&#2367; kg &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2357;&#2366;&#2354;&#2368; &#2342;&#2379; &#2325;&#2367;&#2360;&#2381;&#2350; &#2325;&#2368; &#2342;&#2366;&#2354;&#2379;&#2306; &#2325;&#2379; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367; &#8377;18 &#2346;&#2381;&#2352;&#2340;&#2367; kg &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2375;?</p></span>",

      "<span class=\"eqt\">3:4</span><span class=\"hqt\" style=\"display:none\">3:4</span>",
      "<span class=\"eqt\">2:3</span><span class=\"hqt\" style=\"display:none\">2:3</span>",

    "solution": "<p>Let the ratio in which two varieties are mixed = x: 1</p><p>According to the question:</p><p>x * 15 + 1 * 20 = (x + 1) * 18</p><p>15x + 20 = 18x + 18</p><p>3x = 2</p><p>x = 2/3</p><p>Hence, required ratio = 2: 3</p>",
