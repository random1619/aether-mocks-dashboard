<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">10</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">10 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>What is the value of 0.8  X  0.8  X  0.8 + 0.7  X  0.7  X  0.7 + 2.52?</p></span><span class=\"hqt\" style=\"display:none\"><p>0.8 X 0.8 X 0.8 + 0.7 X 0.7 X 0.7 + 2.52 &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2.125</span><span class=\"hqt\" style=\"display:none\">2.125</span>",
      "<span class=\"eqt\">5.165</span><span class=\"hqt\" style=\"display:none\">5.165</span>",
      "<span class=\"eqt\">4.275</span><span class=\"hqt\" style=\"display:none\">4.275</span>",
      "<span class=\"eqt\">3.375</span><span class=\"hqt\" style=\"display:none\">3.375</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>0.8  X  0.8  X  0.8 + 0.7  X  0.7  X  0.7 + 2.52</p><p>= 0.8<sup>3</sup> + 0.7<sup>3</sup> + 3  X  0.8  X  0.7 (0.8 + 0.7)</p><p><b>We know that:</b> (a + b)<sup>3</sup> = a<sup>3</sup> + b<sup>3</sup> + 3ab (a + b)</p><p>= (0.8 + 0.7)<sup>3</sup></p><p>= 1.5<sup>3</sup></p><p>= 3.375</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Simplify the following expression.</p><p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">7.35 x 7.35 - 2.25 x 2.25</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">0.24</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2360;&#2352;&#2354;&#2368;&#2325;&#2371;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">7.35 x 7.35 - 2.25 x 2.25</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">0.24</span></div></div></p><p></p></span>",
    "options": [
      "<span class=\"eqt\">204</span><span class=\"hqt\" style=\"display:none\">204</span>",
      "<span class=\"eqt\">320</span><span class=\"hqt\" style=\"display:none\">320</span>",
      "<span class=\"eqt\">225</span><span class=\"hqt\" style=\"display:none\">225</span>",
      "<span class=\"eqt\">304</span><span class=\"hqt\" style=\"display:none\">304</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=156 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23402/image058.png\"></p><p><img width=189 height=40 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23402/image059.png\"></p><p><img width=69 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23402/image060.png\"></p><p>= 40 * 5.1</p><p>= 204</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The value of the expression (1.55<sup>2</sup> +0.55<sup>2</sup> +1.55 &#1093; 0.55) is equal to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2381;&#2351;&#2306;&#2332;&#2325; (1.55<sup>2</sup> +0.55<sup>2</sup> +1.55 &#1093; 0.55) &#2325;&#2366; &#2350;&#2366;&#2344; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">1.55<sup>2</sup>-0.55<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">1.55<sup>2</sup>-0.55<sup>2</sup></span>",
      "<span class=\"eqt\">1.55<sup>3</sup>-0.55<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">1.55<sup>3</sup>-0.55<sup>3</sup></span>",
      "<span class=\"eqt\">1.55<sup>3</sup>+0.55<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">1.55<sup>3</sup> 0.55<sup>3</sup></span>",
      "<span class=\"eqt\">1.55<sup>2</sup>+0.55<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">1.55<sup>2</sup> 0.55<sup>2</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Formula of </p><p>a<sup>3</sup>-b<sup>3</sup>=(a-b)(a<sup>2</sup>+b<sup>2</sup> +ab)</p><p>let a=1.55 and b=0.55</p><p>so (1.55<sup>3</sup>-0.55<sup>3</sup>)=(1.55-0.55)(1.55<sup>2</sup> + 0.55<sup>2</sup> +1.55*0.55)</p><p>therefore</p><p>(1.55<sup>3</sup>-0.55<sup>3</sup>)=(1.55<sup>2</sup> + 0.55<sup>2</sup> +1.55*0.55)</p><p>Option (b) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Arrange the following ratios in ascending order. </p><p>3:4, 3:5, 2:11, 7:2 </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340;&#2379;&#2306; &#2325;&#2379; &#2310;&#2352;&#2379;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>3:4, 3:5, 2:11, 7:2 </p></span>",
    "options": [
      "<span class=\"eqt\">3:5 &lt; 2:11 &lt; 3:4 &lt; 7:2</span><span class=\"hqt\" style=\"display:none\">3:5 &lt; 2:11 &lt; 3:4 &lt; 7:2</span>",
      "<span class=\"eqt\">7:2 &lt; 3:4 &lt; 3:5 &lt; 2:11</span><span class=\"hqt\" style=\"display:none\">7:2 &lt; 3:4 &lt; 3:5 &lt; 2:11</span>",
      "<span class=\"eqt\">2:11 &lt; 3:5 &lt; 3:4 &lt; 7:2</span><span class=\"hqt\" style=\"display:none\">2:11 &lt; 3:5 &lt; 3:4 &lt; 7:2</span>",
      "<span class=\"eqt\">3:4 &lt; 3:5 &lt; 2:11 &lt; 7:2</span><span class=\"hqt\" style=\"display:none\">3:4 &lt; 3:5 &lt; 2:11 &lt; 7:2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>3:4 = 3/4 = 0.75 </p><p>3:5 = 3/5 = 0.6 </p><p>2:11 = 2/11 = 0.1818 </p><p>7:2 = 7/2 = 3.5</p><p>Ascending order: 0.1818 &lt; 0.6 &lt; 0.75 &lt; 3.5</p><p>So, 2:11 &lt; 3:5 &lt; 3:4 &lt; 7:2</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>What is the correct descending order of the following ratios? </p><p>17/30, 7/15, 27/50, 11/20 </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340;&#2379;&#2306; &#2325;&#2366; &#2360;&#2361;&#2368; &#2309;&#2357;&#2352;&#2379;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p>17/30, 7/15, 27/50, 11/20 </p></span>",
    "options": [
      "<span class=\"eqt\">11/20 &gt; 17/30 &gt; 27/50 &gt; 7/15</span><span class=\"hqt\" style=\"display:none\">11/20 > 17/30 > 27/50 > 7/15</span>",
      "<span class=\"eqt\">17/30 &gt; 11/20 &gt; 27/50 &gt; 7/15</span><span class=\"hqt\" style=\"display:none\">17/30 &gt; 11/20 &gt; 27/50 &gt; 7/15</span>",
      "<span class=\"eqt\">17/30 &gt; 27/50 &gt; 11/20 &gt; 7/15</span><span class=\"hqt\" style=\"display:none\">17/30 > 27/50 > 11/20 > 7/15</span>",
      "<span class=\"eqt\">7/15 &gt; 11/20 &gt; 27/50 &gt; 17/30</span><span class=\"hqt\" style=\"display:none\">7/15 > 11/20 > 27/50 > 17/30</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Convert to decimals: </p><p>17/30 = 0.56</p><p>7/15 = 0.46</p><p>27/50 = 0.54</p><p>11/20 = 0.55</p><p>Order: 0.56 &gt; 0.55 &gt; 0.54 &gt; 0.46</p><p>= 17/30 &gt; 11/20 &gt; 27/50 &gt; 7/15</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Adi and Dia together have &#8377;1,440. If 3/10 of Adi's amount is equal to 3/5 of Dia's amount, how much amount does Dia have?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2342;&#2367; &#2324;&#2352; &#2342;&#2368;&#2351;&#2366; &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2369;&#2354; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352; &#8377;1,440 &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2310;&#2342;&#2367; &#2325;&#2368; &#2352;&#2366;&#2358;&#2367; &#2325;&#2366; 3/10 &#2342;&#2368;&#2351;&#2366; &#2325;&#2368; &#2352;&#2366;&#2358;&#2367; &#2325;&#2375; 3/5 &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2368;&#2351;&#2366; &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2367;&#2340;&#2344;&#2368; &#2352;&#2366;&#2358;&#2367; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&#8377;480</span><span class=\"hqt\" style=\"display:none\">&#8377;480</span>",
      "<span class=\"eqt\">&#8377;540</span><span class=\"hqt\" style=\"display:none\">&#8377;540</span>",
      "<span class=\"eqt\">&#8377;464</span><span class=\"hqt\" style=\"display:none\">&#8377;464</span>",
      "<span class=\"eqt\">&#8377;512</span><span class=\"hqt\" style=\"display:none\">&#8377;512</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let Dia's amount = &#8377;n</p><p>Adi's amount = &#8377;(1440  -  n)</p><p>3/10 * (1440  -  n) = 3/5 * n</p><p>1440  -  n = 2n</p><p>3n = 1440</p><p>n = 480</p><p>Dia's amount = &#8377;480</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which is the greatest ratio among the following? </p><p>8/11,4/5,1/2 and 1/11</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2380;&#2344; &#2360;&#2366; &#2361;&#2376;?</p><p>8/11,4/5,1/2 &#2324;&#2352; 1/11</span>",
    "options": [
      "<span class=\"eqt\">4/5</span><span class=\"hqt\" style=\"display:none\">4/5</span>",
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>",
      "<span class=\"eqt\">1/11</span><span class=\"hqt\" style=\"display:none\">1/11</span>",
      "<span class=\"eqt\">8/11</span><span class=\"hqt\" style=\"display:none\">8/11</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>8/11 &#8776; 0.727, 4/5 = 0.8, 1/2 = 0.5, 1/11 &#8776; 0.091 </p><p>Greatest: 4/5.</p><p>Option (a) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>12.75% is equivalent to ___</p></span><span class=\"hqt\" style=\"display:none\">12.75% ___ &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;</span>",
    "options": [
      "<span class=\"eqt\">37/400</span><span class=\"hqt\" style=\"display:none\">37/400</span>",
      "<span class=\"eqt\">51/400</span><span class=\"hqt\" style=\"display:none\">51/400</span>",

    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following fractions is the largest?</p><p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">3</span></div>&nbsp;,&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">6</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">53</span></div>&nbsp;,&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">79</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">90</span></div>&nbsp;,&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">33</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">44</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2349;&#2367;&#2344;&#2381;&#2344; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2361;&#2376;?</p><p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">3</span></div>&nbsp;,&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">6</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">53</span></div>&nbsp;,&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">79</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">90</span></div>&nbsp;,&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">33</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">44</span></div></div></p></span>",
    "options": [
      "<span class=\"eqt\">2/3</span><span class=\"hqt\" style=\"display:none\">2/3</span>",
      "<span class=\"eqt\">33/44</span><span class=\"hqt\" style=\"display:none\">33/44</span>",
      "<span class=\"eqt\">6/53</span><span class=\"hqt\" style=\"display:none\">6/53</span>",
      "<span class=\"eqt\">79/90</span><span class=\"hqt\" style=\"display:none\">79/90</span>"
