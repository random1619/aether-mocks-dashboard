<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In how many ways can 15 differently coloured chairs are attached to a round swing?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2379;&#2354; &#2333;&#2370;&#2354;&#2375; &#2346;&#2352; 15 &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2352;&#2306;&#2327; &#2325;&#2368; &#2325;&#2369;&#2352;&#2381;&#2360;&#2367;&#2351;&#2366;&#2305; &#2325;&#2367;&#2340;&#2344;&#2375; &#2340;&#2352;&#2368;&#2325;&#2379;&#2306; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">105*13!</span><span class=\"hqt\" style=\"display:none\">105*13!</span>",
      "<span class=\"eqt\">7*13!</span><span class=\"hqt\" style=\"display:none\">7*13!</span>",
      "<span class=\"eqt\">14!</span><span class=\"hqt\" style=\"display:none\">14!</span>",
      "<span class=\"eqt\">15!</span><span class=\"hqt\" style=\"display:none\">15!</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In a round swing, clockwise and anticlockwise arrangements are the same.</p><p>Total number of ways = (15  -  1)!/2 = 14!/2 = 7*13!</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A team of 5 members is to be chosen from a group of 6 male employees and 5 female employees. In how many ways 3 male employees and 2 female employees of the team can be choose?</p></span><span class=\"hqt\" style=\"display:none\"><p>6 &#2346;&#2369;&#2352;&#2369;&#2359; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; 5 &#2350;&#2361;&#2367;&#2354;&#2366; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2360;&#2375; 5 &#2360;&#2342;&#2360;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2335;&#2368;&#2350; &#2330;&#2369;&#2344;&#2368; &#2332;&#2366;&#2344;&#2368; &#2361;&#2376;&#2404; &#2335;&#2368;&#2350; &#2325;&#2375; 3 &#2346;&#2369;&#2352;&#2369;&#2359; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; 2 &#2350;&#2361;&#2367;&#2354;&#2366; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2340;&#2352;&#2368;&#2325;&#2379;&#2306; &#2360;&#2375; &#2330;&#2369;&#2344;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3600</span><span class=\"hqt\" style=\"display:none\">3600</span>",
      "<span class=\"eqt\">2400</span><span class=\"hqt\" style=\"display:none\">2400</span>",
      "<span class=\"eqt\">3000</span><span class=\"hqt\" style=\"display:none\">3000</span>",
      "<span class=\"eqt\">2800</span><span class=\"hqt\" style=\"display:none\">2800</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total number of male and female employees are 6 and 5 respectively.</p><p>Total number of ways in which 5 members of the team can be choose = <sup>6</sup>C<sub>3</sub> * <sup>5</sup>C<sub>2</sub></p><p>= (6!/3!) * (5!/3!)</p><p>= [(6*5*4*3*2*1)/(3*2*1)] * [(5*4*3*2*1)/(3*2*1)]</p><p>= 120 * 20</p><p>= 2400</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>3 analog watches are selected from 7 distinct analog watches and 2 digital watches are selected from 9 distinct digital watches. In how many ways can the 5 watches be arranged in a box if the watches placed alternate.</p></span><span class=\"hqt\" style=\"display:none\"><p>7 &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2319;&#2344;&#2366;&#2354;&#2377;&#2327; &#2328;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; 3 &#2319;&#2344;&#2366;&#2354;&#2377;&#2327; &#2328;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; 9 &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2328;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; 2 &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2328;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2328;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325;-&#2319;&#2325; &#2325;&#2352;&#2325;&#2375; &#2352;&#2326;&#2366; &#2332;&#2366;&#2319; &#2340;&#2379; 5 &#2328;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2348;&#2377;&#2325;&#2381;&#2360; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2340;&#2352;&#2368;&#2325;&#2379;&#2306; &#2360;&#2375; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">12096</span><span class=\"hqt\" style=\"display:none\">12096</span>",
      "<span class=\"eqt\">15120</span><span class=\"hqt\" style=\"display:none\">15120</span>",
      "<span class=\"eqt\">10080</span><span class=\"hqt\" style=\"display:none\">10080</span>",
      "<span class=\"eqt\">17280</span><span class=\"hqt\" style=\"display:none\">17280</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total analog and digital watches are 7 and 9 respectively.</p><p>Total number of ways to select 3 analog watches and 2 digital watches when the watches placed alternate = <sup>7</sup>P<sub>3</sub> * <sup>9</sup>P<sub>2</sub></p><p>= (7!/4!) * (9!/7!)</p><p>= 9*8*7*6*5</p><p>= 15120</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>How many different words of 10 letters are possible using the letters of the word TELEVISION if it contains two I's together?</p></span><span class=\"hqt\" style=\"display:none\"><p>TELEVISION &#2358;&#2348;&#2381;&#2342; &#2325;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; 10 &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2358;&#2348;&#2381;&#2342; &#2360;&#2306;&#2349;&#2357; &#2361;&#2376;&#2306;, &#2351;&#2342;&#2367; &#2311;&#2360;&#2350;&#2375;&#2306; &#2342;&#2379; I &#2319;&#2325; &#2360;&#2366;&#2341; &#2361;&#2379;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">36*7!</span><span class=\"hqt\" style=\"display:none\">36*7!</span>",
      "<span class=\"eqt\">5*9!</span><span class=\"hqt\" style=\"display:none\">5*9!</span>",
      "<span class=\"eqt\">18*7!</span><span class=\"hqt\" style=\"display:none\">18*7!</span>",
      "<span class=\"eqt\">4*7!</span><span class=\"hqt\" style=\"display:none\">4*7!</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In the word TELEVISION, there are 10 letters =&gt; 2I (which are together so count as one place), 2E are repeated.</p><p>Total number of ways = 9!/2! = 36*7!</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>How many different words of 12 letters are possible using the letters of the word SURVEILLANCE if the word begins and ends with E?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2358;&#2348;&#2381;&#2342; SURVEILLANCE &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2324;&#2352; &#2309;&#2306;&#2340; E &#2360;&#2375; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2348;&#2381;&#2342; &#2325;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; 12 &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2358;&#2348;&#2381;&#2342; &#2360;&#2306;&#2349;&#2357; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">10!</span><span class=\"hqt\" style=\"display:none\">10!</span>",
      "<span class=\"eqt\">6*11!</span><span class=\"hqt\" style=\"display:none\">6*11!</span>",
      "<span class=\"eqt\">5*9!</span><span class=\"hqt\" style=\"display:none\">5*9!</span>",
      "<span class=\"eqt\">55*9!</span><span class=\"hqt\" style=\"display:none\">55*9!</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In the word SURVEILLANCE, there are 12 letters =&gt; 2E (which are fix at the beginning and end), 2L are repeated.</p><p>Total number of ways = 10!/2! = 5*9!</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Three glass mugs are selected from six distinct glass mugs and a ceramic mug are selected from eight distinct ceramic mugs. In how many ways can the four mugs be arranged on a rack in a coffee shop if a glass mug must be placed at the beginning of the rack?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2331;&#2361; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2327;&#2381;&#2354;&#2366;&#2360; &#2350;&#2327; &#2350;&#2375;&#2306; &#2360;&#2375; &#2340;&#2368;&#2344; &#2327;&#2381;&#2354;&#2366;&#2360; &#2350;&#2327; &#2330;&#2369;&#2344;&#2375; &#2327;&#2319; &#2361;&#2376;&#2306; &#2324;&#2352; &#2310;&#2336; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2367;&#2352;&#2375;&#2350;&#2367;&#2325; &#2350;&#2327; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2360;&#2367;&#2352;&#2375;&#2350;&#2367;&#2325; &#2350;&#2327; &#2330;&#2369;&#2344;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2325;&#2377;&#2347;&#2364;&#2368; &#2358;&#2377;&#2346; &#2350;&#2375;&#2306; &#2352;&#2376;&#2325; &#2346;&#2352; &#2330;&#2366;&#2352; &#2350;&#2327; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2340;&#2352;&#2368;&#2325;&#2379;&#2306; &#2360;&#2375; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2309;&#2327;&#2352; &#2352;&#2376;&#2325; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2350;&#2375;&#2306; &#2319;&#2325; &#2327;&#2381;&#2354;&#2366;&#2360; &#2350;&#2327; &#2352;&#2326;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">2880</span><span class=\"hqt\" style=\"display:none\">2880</span>",
      "<span class=\"eqt\">1440</span><span class=\"hqt\" style=\"display:none\">1440</span>",
      "<span class=\"eqt\">1920</span><span class=\"hqt\" style=\"display:none\">1920</span>",
      "<span class=\"eqt\">1600</span><span class=\"hqt\" style=\"display:none\">1600</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total glass and ceramic mugs are 6 and 8 respectively.</p><p>Total number of ways to select 3 glass mugs and a ceramic mug when a glass mug placed at the beginning of the rack = 3 * <sup>5</sup>C<sub>2</sub> * <sup>8</sup>C<sub>1</sub> * 3!</p><p>= 3 * [(5*4)/(2*1)] * 8 * 3!</p><p>= 3*10*8*6</p><p>= 1440</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In a game of poker, a hand consists of 4 cards dealt from a standard deck of 52 cards. How many such hands contain exactly 1 jack and 3 Queens?\"</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2379;&#2325;&#2352; &#2325;&#2375; &#2326;&#2375;&#2354; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2361;&#2366;&#2341; &#2350;&#2375;&#2306; 52 &#2346;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2319;&#2325; &#2350;&#2366;&#2344;&#2325; &#2337;&#2375;&#2325; &#2360;&#2375; 4 &#2346;&#2340;&#2381;&#2340;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2320;&#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2361;&#2366;&#2341; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2336;&#2368;&#2325; 1 &#2332;&#2376;&#2325; &#2324;&#2352; 3 &#2352;&#2366;&#2344;&#2367;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306;?\"</p></span>",
    "options": [
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A standard deck of 52 cards has 4 jacks and 4 Queens.</p><p>Total number of ways = <sup>4</sup>C<sub>1</sub> * <sup>4</sup>C<sub>3</sub> = 4*4 = 16</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A team of 7 students is to be chosen from a group of 5 boys and 4 girls. How many teams are possible if one particular boy must be excluded from the team?</p></span><span class=\"hqt\" style=\"display:none\"><p>5 &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2324;&#2352; 4 &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2360;&#2375; 7 &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2335;&#2368;&#2350; &#2330;&#2369;&#2344;&#2368; &#2332;&#2366;&#2344;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359; &#2354;&#2337;&#2364;&#2325;&#2375; &#2325;&#2379; &#2335;&#2368;&#2350; &#2360;&#2375; &#2348;&#2366;&#2361;&#2352; &#2352;&#2326;&#2366; &#2332;&#2366;&#2319; &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2368; &#2335;&#2368;&#2350;&#2375;&#2306; &#2360;&#2306;&#2349;&#2357; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">8!</span><span class=\"hqt\" style=\"display:none\">8!</span>",
      "<span class=\"eqt\">9!</span><span class=\"hqt\" style=\"display:none\">9!</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Students when a particular boy excluded = (5  -  1) + 4 = 8</p><p>Total number of ways = <sup>8</sup>C<sub>7</sub> = <sup>8</sup>C<sub>1</sub> = 8</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>In how many ways can a football team of 9 players be chosen from 14 players?</p></span><span class=\"hqt\" style=\"display:none\"><p>14 &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; 9 &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2347;&#2369;&#2335;&#2348;&#2377;&#2354; &#2335;&#2368;&#2350; &#2325;&#2367;&#2340;&#2344;&#2375; &#2340;&#2352;&#2368;&#2325;&#2379;&#2306; &#2360;&#2375; &#2330;&#2369;&#2344;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1890</span><span class=\"hqt\" style=\"display:none\">1890</span>",
      "<span class=\"eqt\">2002</span><span class=\"hqt\" style=\"display:none\">2002</span>",
      "<span class=\"eqt\">1996</span><span class=\"hqt\" style=\"display:none\">1996</span>",
