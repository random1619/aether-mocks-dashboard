<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>What is the length of intercepts of line 12x  -  28y + 21 = 0 between two axes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2309;&#2325;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2352;&#2375;&#2326;&#2366; 12x - 28y + 21 = 0 &#2325;&#2375; &#2309;&#2306;&#2340;&#2307;&#2326;&#2306;&#2337;&#2379;&#2306; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;52/4 unit</span><span class=\"hqt\" style=\"display:none\">&radic;52/4 &#2311;&#2325;&#2366;&#2312;</span>",
      "<span class=\"eqt\">&radic;54/4 unit</span><span class=\"hqt\" style=\"display:none\">&radic;54/4 &#2311;&#2325;&#2366;&#2312;</span>",
      "<span class=\"eqt\">&radic;56/4 unit</span><span class=\"hqt\" style=\"display:none\">&radic;56/4 &#2311;&#2325;&#2366;&#2312;</span>",
      "<span class=\"eqt\">&radic;58/4 unit</span><span class=\"hqt\" style=\"display:none\">&radic;58/4 &#2311;&#2325;&#2366;&#2312;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>12x  -  28y + 21 = 0</p><p>12x  -  28y = -21</p><p>(12x/-21)  -  (28y/-21) = 1</p><p>(4x/-7) + (4y/3) = 1</p><p>[x/(-7/4)] + [y/(3/4)] = 1</p><p>Intercept of line of the form (x/a) + (y/b) = 1 at x and y axes is 'a' and 'b' respectively.</p><p>Length of intercept = &radic;(a<sup>2</sup> + b<sup>2</sup>)</p><p>Intercept of given line at x and y axes is '-7/4' and '3/4' respectively.</p><p>Length of intercept = &radic;[(-7/4)<sup>2</sup> + (3/4)<sup>2</sup>] = &radic;58/4 unit</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If point (6, 11) and (5, 9) lie on the graph of the line ax + by = 12, find the value of a<sup>2</sup>  -  ab + b<sup>2</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2348;&#2367;&#2306;&#2342;&#2369; (6, 11) &#2324;&#2352; (5, 9) &#2352;&#2375;&#2326;&#2366; ax + by = 12 &#2325;&#2375; &#2327;&#2381;&#2352;&#2366;&#2347; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2306;, &#2340;&#2379; a<sup>2</sup> - ab + b<sup>2</sup> &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1008</span><span class=\"hqt\" style=\"display:none\">1008</span>",
      "<span class=\"eqt\">924</span><span class=\"hqt\" style=\"display:none\">924</span>",
      "<span class=\"eqt\">1144</span><span class=\"hqt\" style=\"display:none\">1144</span>",
      "<span class=\"eqt\">1264</span><span class=\"hqt\" style=\"display:none\">1264</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>It is given that the points (6, 11) and (5, 9) lie on the graph of the line ax + by = 12. Therefore, x = 6, y = 11 and x = 5, y = 9 are solutions of the equations ax + by = 12.</p><p>Therefore,</p><p>6a + 11b = 12... (1)</p><p>5a + 9b = 12... (2)</p><p>From equation (1) and (2),</p><p>Multiply eq. (1) by 5 and eq. (2) by 6 and subtract equation (2) from equation (1),</p><p>We get, a = 24 and b = -12</p><p>Now, a<sup>2</sup>  -  ab + b<sup>2</sup> = (24)<sup>2</sup>  -  (24 * -12) + (-12)<sup>2</sup> = 576 + 288 + 144 = 1008.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If length of portion of straight line 18x + ky = 180 intercepted between axis is 5&radic;13 unit, then find the value of 'k'.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2368;&#2343;&#2368; &#2352;&#2375;&#2326;&#2366; 18x + ky = 180 &#2325;&#2375; &#2309;&#2325;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2340;&#2307;&#2326;&#2306;&#2337;&#2367;&#2340; &#2349;&#2366;&#2327; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 5&radic;13 &#2311;&#2325;&#2366;&#2312; &#2361;&#2376;, &#2340;&#2379; 'k' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Given equation of line: 18x + ky = 180</p><p>Intercept form of equation of line: (18x/180) + (ky/180) = 1</p><p>(x/10) + [y/(180/k)] = 1</p><p>After comparing the above equation with standard intercept form of a libe: x/a + y/b = 1</p><p>a = 10, b = 180/k</p><p>Length of portion of straight line intercepted between axis = &radic;(a<sup>2</sup> + b<sup>2</sup>)</p><p>5&radic;13 = &radic;[10<sup>2</sup> + (180/k)<sup>2</sup>]</p><p>325  -  100 = (180/k)<sup>2</sup></p><p>15<sup>2</sup> = (180/k)<sup>2</sup></p><p>15 = 180/k</p><p>k = 180/15</p><p>k = 12</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Find the area of the quadrilateral formed with the vertices (4, 2), (12, 5), (9, 1), and (1, -1).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2368;&#2352;&#2381;&#2359;&#2379;&#2306; (4, 2), (12, 5), (9, 1) &#2324;&#2352; (1, -1) &#2360;&#2375; &#2348;&#2344;&#2375; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">20.5 square units</span><span class=\"hqt\" style=\"display:none\">20.5 &#2357;&#2352;&#2381;&#2327; &#2311;&#2325;&#2366;&#2312;</span>",
      "<span class=\"eqt\">34 square units</span><span class=\"hqt\" style=\"display:none\">34 &#2357;&#2352;&#2381;&#2327; &#2311;&#2325;&#2366;&#2312;</span>",
      "<span class=\"eqt\">23 square units</span><span class=\"hqt\" style=\"display:none\">23 &#2357;&#2352;&#2381;&#2327; &#2311;&#2325;&#2366;&#2312;</span>",
      "<span class=\"eqt\">14.5 square units</span><span class=\"hqt\" style=\"display:none\">14.5 &#2357;&#2352;&#2381;&#2327; &#2311;&#2325;&#2366;&#2312;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the points be A(4, 2), B(12, 5), C(9, 1), and D(1, -1).</p><p>The quadrilateral ABCD can be divided into triangles ABC and ACD and hence the area of the quadrilateral is the sum of the areas of the two triangles.</p><p>Area of a triangle with vertices (x<sub>1</sub>, y<sub>1</sub>), (x<sub>2</sub>, y<sub>2</sub>) and (x<sub>3</sub>, y<sub>3</sub>) is: </p><p><img width=263 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19346/image002.png\"></p><p>Hence, area of the triangle ABC with vertices A(4, 2), B(12, 5) and C(9, 1)</p><p><img width=219 height=147 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19346/image005.png\"></p><p>And area of the triangle ACD with vertices A(4, 2), C(9, 1), and D(1, -1).</p><p><img width=216 height=147 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19346/image006.png\"></p><p>Therefore, area of the quadrilateral = 11.5 + 9 = 20.5 square units</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If the distance between two points A(6, a) and B(9, b) is 3&radic;10 unit, then the value of (a  -  b) is-</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2342;&#2379; &#2348;&#2367;&#2344;&#2381;&#2342;&#2369;&#2323;&#2306; A(6, a) &#2324;&#2352; B(9, b) &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 3&radic;10 &#2311;&#2325;&#2366;&#2312; &#2361;&#2376;, &#2340;&#2379; (a - b) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&#177;8</span><span class=\"hqt\" style=\"display:none\">&#177;8</span>",
      "<span class=\"eqt\">&#177;7</span><span class=\"hqt\" style=\"display:none\">&#177;7</span>",
      "<span class=\"eqt\">&#177;11</span><span class=\"hqt\" style=\"display:none\">&#177;11</span>",
      "<span class=\"eqt\">&#177;9</span><span class=\"hqt\" style=\"display:none\">&#177;9</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>s = &radic;[(9 - 6)<sup>2</sup> + (a - b)<sup>2</sup>]</p><p>=&gt; (3&radic;10)<sup>2</sup> = 9 + (a - b)<sup>2</sup></p><p>=&gt; 90  -  9 = (a - b)<sup>2</sup></p><p>=&gt; 81 = (a - b)<sup>2</sup></p><p>=&gt; a - b = &#177;9</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If A (1, -5, 0), B (5, -1, -1) and C (9, 3, -2) are collinear, then find the ratio in which B divides line segment AC.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A (1, -5, 0), B (5, -1, -1) &#2324;&#2352; C (9, 3, -2) &#2360;&#2306;&#2352;&#2375;&#2326; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2357;&#2361; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; B &#2352;&#2375;&#2326;&#2366;&#2326;&#2306;&#2337; AC &#2325;&#2379; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1:4</span><span class=\"hqt\" style=\"display:none\">1:4</span>",
      "<span class=\"eqt\">3:5</span><span class=\"hqt\" style=\"display:none\">3:5</span>",
      "<span class=\"eqt\">2:1</span><span class=\"hqt\" style=\"display:none\">2:1</span>",
      "<span class=\"eqt\">1:1</span><span class=\"hqt\" style=\"display:none\">1:1</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Coordinate of A = (1, -5, 0)</p><p>Coordinate of B = (5, -1, -1)</p><p>Coordinate of C = (9, 3, -2)</p><p>Let B divides the line segment AC in the ratio of k:1.</p><p>Now, by segment formula,</p><p>(5, -1, -1) = [(9k+1)/(k+1), (3k-5)/(k+1), (-2k+0)/(k+1)]</p><p>(9k+1)/(k+1) = 5</p><p>9k + 1 = 5k + 5</p><p>4k = 4</p><p>k = 1</p><p>So, B divide AC in 1:1.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>A circle has a radius of 6&radic;3 units and its center lies on the line Y = X  -  1. Find the equation of the circle if it passes through (12, 7). </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 6&radic;3 &#2311;&#2325;&#2366;&#2312; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2352;&#2375;&#2326;&#2366; Y = X - 1 &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2371;&#2340;&#2381;&#2340; (12, 7) &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">X<sup>2</sup> + Y<sup>2</sup>  -  18X + 18Y + 54 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup> + Y<sup>2</sup> - 18X + 18Y + 54 = 0</span>",
      "<span class=\"eqt\">X<sup>2</sup> + Y<sup>2</sup> + 18X  -  18Y + 54 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup> + Y<sup>2</sup> + 18X - 18Y + 54 = 0</span>",
      "<span class=\"eqt\">X<sup>2</sup> + Y<sup>2</sup> + 18X + 18Y + 54 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup> + Y<sup>2</sup> + 18X + 18Y + 54 = 0</span>",
      "<span class=\"eqt\">X<sup>2</sup> + Y<sup>2</sup>  -  18X  -  18Y + 54 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup> + Y<sup>2</sup> - 18X - 18Y + 54 = 0</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Center = X<sub>1</sub>, Y<sub>1</sub></p><p>Y<sub>1</sub> = X<sub>1</sub>  -  1</p><p>Center = (X<sub>1</sub>, X<sub>1 </sub> -  1)</p><p>(X<sub>1</sub>  -  X<sub>2</sub>)<sup>2</sup> + (X<sub>1</sub>  -  Y<sub>2</sub>)<sup>2</sup> = Radius<sup>2</sup> </p><p>(X<sub>1</sub>  -  12)<sup>2 </sup>+ (X<sub>1</sub>  -  1  -  7)<sup>2</sup> = (6&radic;3)<sup>2</sup> </p><p>X<sub>1</sub><sup>2</sup> + 144  -  24X<sub>1</sub> + X<sub>1</sub><sup>2</sup> + 64  -  16X<sub>1</sub> = 108 </p><p>2X<sub>1</sub><sup>2</sup>  -  40X<sub>1</sub> + 208 = 108 </p><p>X<sub>1</sub><sup>2</sup>  -  20X<sub>1</sub> + 100 = 0 </p><p>X<sub>1</sub> = 10, 10 </p><p>Y<sub>1</sub> = 9, 9</p><p>X1, Y1 = (9, 9) </p><p>Hence, the required equation: </p><p>(X  -  9)<sup>2</sup> + (Y  -  9)<sup>2</sup> = (&radic;108)2 </p><p>X<sup>2</sup> + 81  -  18X + Y<sup>2</sup> + 81  -  18Y = 108 </p><p>X<sup>2</sup> + Y<sup>2</sup>  -  18X  -  18Y + 54 = 0 </p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Find the equation of a circle whose center is (6, - 2) and which passes through the point (9, 7). </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; (6, - 2) &#2361;&#2376; &#2324;&#2352; &#2332;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; (9, 7) &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">X<sup>2</sup> + Y<sup>2</sup>  -  12X + 4Y + 50 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup> + Y<sup>2</sup> - 12X + 4Y + 50 = 0</span>",
      "<span class=\"eqt\">X<sup>2 </sup>+ Y<sup>2</sup> + 12X + 4Y  -  50 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2 </sup>+ Y<sup>2</sup> + 12X + 4Y - 50 = 0</span>",
