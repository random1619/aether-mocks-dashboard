<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A sector of a circular sheet of radius 35 cm and an arc length of 132 cm is cut and a cone is formed by joining the edges. What is the volume of the cone formed?</p></span><span class=\"hqt\" style=\"display:none\"><p>35 &#2360;&#2375;&#2350;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; 132 &#2360;&#2375;&#2350;&#2368; &#2330;&#2366;&#2346; &#2354;&#2306;&#2348;&#2366;&#2312; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2358;&#2368;&#2335; &#2325;&#2366; &#2319;&#2325; &#2326;&#2306;&#2337; &#2325;&#2366;&#2335;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2325;&#2367;&#2344;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2325;&#2352; &#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2348;&#2344;&#2375; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12936 cu.cm</span><span class=\"hqt\" style=\"display:none\">12936 &#2328;&#2344; &#2360;&#2375;.&#2350;&#2368;.</span>",
      "<span class=\"eqt\">13456 cu.cm</span><span class=\"hqt\" style=\"display:none\">13456 &#2328;&#2344; &#2360;&#2375;.&#2350;&#2368;.</span>",
      "<span class=\"eqt\">14286 cu.cm</span><span class=\"hqt\" style=\"display:none\">14286 &#2328;&#2344; &#2360;&#2375;.&#2350;&#2368;.</span>",
      "<span class=\"eqt\">15696 cu.cm</span><span class=\"hqt\" style=\"display:none\">15696 &#2328;&#2344; &#2360;&#2375;.&#2350;&#2368;.</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=128 height=173 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p240/image008.jpg\"></p><p>Let h and r be the height and the base radius of the cone formed.</p><p>2&#960;r = length of arc = 132 cm</p><p>r = (132* 7)/44 = 21 cm</p><p>As the slant height of the cone is the radius of the sheet, l = 35 cm</p><p>Height of the cone (h)</p><p>= &radic;((l)<sup>2</sup>- (r)<sup>2</sup>) = &radic;((35)<sup>2</sup> - (21)<sup>2</sup>)</p><p>= &radic;(1225-441) = &radic;784 = 28 cm</p><p>Therefore volume of the cone formed</p><p>= 1/3 * &#960; * (21)<sup>2</sup>* 28 = 12936 cu cm</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A cube with side 4 cm contains a conical flask inside it. What can be the largest possible volume of the conical flask?</p></span><span class=\"hqt\" style=\"display:none\"><p>4 &#2360;&#2375;&#2350;&#2368; &#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2328;&#2344; &#2325;&#2375; &#2309;&#2306;&#2342;&#2352; &#2319;&#2325; &#2358;&#2306;&#2325;&#2381;&#2357;&#2366;&#2325;&#2366;&#2352; &#2347;&#2381;&#2354;&#2366;&#2360;&#2381;&#2325; &#2352;&#2326;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;&#2404; &#2358;&#2306;&#2325;&#2381;&#2357;&#2366;&#2325;&#2366;&#2352; &#2347;&#2381;&#2354;&#2366;&#2360;&#2381;&#2325; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2310;&#2351;&#2340;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">64&#960;/3 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">64&#960;/3 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">32&#960;/3 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">32&#960;/3 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">128&#960;/3 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">128&#960;/3 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">16&#960;/3 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">16&#960;/3 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=137 height=109 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p1867/image001.png\"></p><p>The radius of the cone will be 4/2 cm</p><p>The height of the cone will be 4 cm</p><p>The volume of the cone= &pi; (4/2)<sup>2</sup> x 4/3 = (&#960;4<sup>3</sup>)/12 = 16&#960;/3</p><p>Correct answer: d)16&#960;/3 cm<sup>3</sup></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If the circumference of base of the cylinder is 132 cm and its height is 36 cm then what will be the approximate volume of the cylinder?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2348;&#2375;&#2354;&#2344; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2346;&#2352;&#2367;&#2343;&#2367; 132 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 36 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2340;&#2379; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2310;&#2351;&#2340;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">0.05 m<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">0.05 &#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">0.01 m<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">0.01 &#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">0.07 m<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">0.07 &#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">0.1 m<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">0.1 &#2350;&#2368;<sup>3</sup></span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let's assume that the base radius of the cylinder = R cm</p><p>According to the question; 2&#960;R = 132</p><p>=&gt; 2  X  22/7  X R=132</p><p>=&gt; R = (132  X  7)/(22  X  2)= 21 cm</p><p>Now volume of the cylinder = &#960; R<sup>2</sup>h = 22/7  X  21  X  21  X  36</p><p>= 49896cm<sup>3</sup> = 0.05 m<sup>3</sup> (Approx)</p><p>(1cm = 0.01 m = 10<sup>-2</sup> m, hence 1 cm<sup>3 </sup>= 10<sup>-6 </sup>m<sup>3</sup>)</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The diameters of two solid iron cylinders are 8 cm and 16 cm respectively and height of the cylinders are 9 cm and 12 cm respectively. These two iron cylinders are melted to make a new solid cone whose height is 19 cm. Find diameter of the base of the cone.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2336;&#2379;&#2360; &#2354;&#2379;&#2361;&#2375; &#2325;&#2375; &#2348;&#2375;&#2354;&#2344;&#2379;&#2306; &#2325;&#2375; &#2357;&#2381;&#2351;&#2366;&#2360; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 8 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 16 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2306; &#2324;&#2352; &#2348;&#2375;&#2354;&#2344;&#2379;&#2306; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 9 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 12 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2311;&#2344; &#2342;&#2379; &#2354;&#2379;&#2361;&#2375; &#2325;&#2375; &#2348;&#2375;&#2354;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352; &#2319;&#2325; &#2344;&#2351;&#2366; &#2336;&#2379;&#2360; &#2358;&#2306;&#2325;&#2369; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; 19 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">24 cm</span><span class=\"hqt\" style=\"display:none\">24 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">28 cm</span><span class=\"hqt\" style=\"display:none\">28 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">20 cm</span><span class=\"hqt\" style=\"display:none\">20 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">18 cm</span><span class=\"hqt\" style=\"display:none\">18 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>R<sub>1</sub> = 8/2 = 4 cm, R<sub>2</sub> = 16/2 = 8 cm, H<sub>1</sub> = 9 cm and H<sub>2</sub> = 12 cm</p><p>Height of the cone = 19 cm</p><p>Let r be the radius of the cone.</p><p>According to the question,</p><p>=&gt; &#960;R<sub>1</sub><sup>2</sup>H<sub>1</sub> + &#960;R<sub>2</sub><sup>2</sup>H<sub>2</sub><sup>2</sup> = 1/3 * &#960;r<sup>2</sup>h</p><p>=&gt; (16 * 9 + 64 * 12) * 3 = r<sup>2</sup> * 19</p><p>=&gt; r<sup>2</sup> = 2736/19 = 144</p><p>=&gt; r = 12 cm</p><p>Hence, diameter of the base of the cone = 12 * 2 = 24 cm</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A bucket in the shape of frustrum of a cone has the top radius of 20cm and the bottom radius is 14cm. Height of the bucket is 70cm. Calculate the volume of water that can be stored in the bucket:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2331;&#2367;&#2344;&#2381;&#2344;&#2325; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2325;&#2368; &#2319;&#2325; &#2348;&#2366;&#2354;&#2381;&#2335;&#2368; &#2325;&#2368; &#2314;&#2346;&#2352;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 20 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; &#2344;&#2367;&#2330;&#2354;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 14 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2348;&#2366;&#2354;&#2381;&#2335;&#2368; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 70 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2348;&#2366;&#2354;&#2381;&#2335;&#2368; &#2350;&#2375;&#2306; &#2332;&#2350;&#2366; &#2325;&#2367;&#2319; &#2332;&#2366; &#2360;&#2325;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">68.24 litres</span><span class=\"hqt\" style=\"display:none\">68.24 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">62.24 litres</span><span class=\"hqt\" style=\"display:none\">62.24 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">64.24 litres</span><span class=\"hqt\" style=\"display:none\">64.24 &#2354;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">66.24 litres</span><span class=\"hqt\" style=\"display:none\">66.24 &#2354;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=305 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20728/image011.png\"></p><p><img width=345 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20728/image012.png\"></p><p>1 cm<sup>3</sup> = 1 ml</p><p>Therefore, 64240 cm<sup>3</sup> = 64240 ml = 64.24 litres</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The radius of the base of a cylinder is 1/3 of the height of a cone and height of the cylinder is twice the radius of the cone. The volume of the cone is 2156 cm<sup>3</sup>. If the radius of the cylinder is 14 cm, then find the volume of the cylinder.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2368; 1/3 &#2361;&#2376; &#2324;&#2352; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2368; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2361;&#2376;&#2404; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 2156 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 14 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5868 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">5868 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">8624 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">8624 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">9858 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">9858 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">10220 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">10220 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Radius of the cylinder = 14 cm</p><p>Height of cone = 14*3 = 42 cm</p><p>Radius of the cone = r</p><p>Height of cylinder = 2r</p><p>Volume of the cone = 2156 cm<sup>3</sup></p><p>1/3 * &#960; * r<sup>2</sup> * 42 = 2156</p><p>r = 7 cm</p><p>Height of cylinder = 2r = 2*7 = 14 cm</p><p>Volume of the cylinder = &#960; * 14 * 14 * 14 = 8624 cm<sup>3</sup></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Height of a cone is 40% more than its radius. If the volume of cone is 1069.2 cm<sup>3</sup>, then find the difference between height and radius of the cone. (Take &#960; = 22/7)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2311;&#2360;&#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2360;&#2375; 40% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 1069.2 &#2360;&#2375;&#2350;&#2368;3 &#2361;&#2376;, &#2340;&#2379; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2324;&#2352; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; (&#960; = 22/7 &#2354;&#2368;&#2332;&#2367;&#2319;)</p></span>",
    "options": [
      "<span class=\"eqt\">2.8 cm</span><span class=\"hqt\" style=\"display:none\">2.8 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">3.2 cm</span><span class=\"hqt\" style=\"display:none\">3.2 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">2.4 cm</span><span class=\"hqt\" style=\"display:none\">2.4 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">3.6 cm</span><span class=\"hqt\" style=\"display:none\">3.6 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let radius of cone = r cm</p><p>Then, height of cone = (100 + 40)% of r = 1.4r cm</p><p>Volume of cone = 1/3 * &#960; * (radius of cone)<sup>2 </sup>* height of cone</p><p>1069.2 = 1/3 * 22/7 * r<sup>2</sup> * 1.4r</p><p>r<sup>3</sup> = 729</p><p>r = 9</p><p>Therefore, difference between height and radius of the cone = 1.4r  -  r = 0.4r = 0.4 * 9 = <b>3.6 cm</b></p>",
    "question_index": 6
  },

    "question": "<span class=\"eqt\"><p>A solid cylinder has a total surface area of 6336 cm<sup>2</sup>. If the height of the cylinder is 27 cm, then find the radius of the cylinder. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2336;&#2379;&#2360; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 6336 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 27 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">21 cm</span><span class=\"hqt\" style=\"display:none\">21 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">27 cm</span><span class=\"hqt\" style=\"display:none\">27 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">22 cm</span><span class=\"hqt\" style=\"display:none\">22 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">28 cm</span><span class=\"hqt\" style=\"display:none\">28 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The total surface area of the cylinder = 2&#960;r (r + 27) </p><p>6336 = 2 * 22/7 * r (r + 27)</p><p>1008 = r * (r + 27)</p><p>r<sup>2</sup> + 27r  -  1008 = 0 </p><p>r<sup>2</sup> + 48r  -  21r  -  1008 = 0 </p><p>r (r + 48)  -  21 (r + 48) = 0</p><p>(r  -  21) (r + 48) = 0 </p><p>r = 21 cm </p><p>Hence, the radius of the cylinder = 21 cm</p>",
    "question_index": 7
  },

    "question": "<span class=\"eqt\"><p>From a wooden solid cylinder of base radius 7 cm and height 14 cm, a cone is cut. The height and base radius of cone are half of height and half of base radius of cylinder respectively. Find the percentage of wood wasted in the process. (upto two decimal)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2343;&#2366;&#2352; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 7 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; 14 &#2360;&#2375;&#2350;&#2368; &#2325;&#2375; &#2354;&#2325;&#2337;&#2364;&#2368; &#2325;&#2375; &#2336;&#2379;&#2360; &#2348;&#2375;&#2354;&#2344; &#2360;&#2375; &#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366;&#2335;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2324;&#2352; &#2310;&#2343;&#2366;&#2352; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2368; &#2310;&#2343;&#2368; &#2324;&#2352; &#2310;&#2343;&#2366;&#2352; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2368; &#2310;&#2343;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2326;&#2352;&#2366;&#2348; &#2361;&#2369;&#2312; &#2354;&#2325;&#2337;&#2364;&#2368; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; (&#2342;&#2358;&#2350;&#2354;&#2357; &#2325;&#2375; &#2342;&#2379; &#2360;&#2381;&#2341;&#2366;&#2344; &#2340;&#2325;)</p></span>",
    "options": [
      "<span class=\"eqt\">90.24%</span><span class=\"hqt\" style=\"display:none\">90.24%</span>",

      "<span class=\"eqt\">88.27%</span><span class=\"hqt\" style=\"display:none\">88.27%</span>",
      "<span class=\"eqt\">78.16%</span><span class=\"hqt\" style=\"display:none\">78.16%</span>"

    "correct_option_id": 1,
    "solution": "<p>Volume of cylinder = &#960;r<sup>2</sup>h = &#960;*7*7*14 cubic cm</p><p>Volume of cone = 1/3* &#960;*r<sup>2</sup>*h = 1/3* &#960;* (7/2)* (7/2)* 7 cubic cm</p><p>Amount of wood wasted = Volume of cylinder  -  Volume of cone</p><p>= &#960;*7*7*14 - 1/3* &#960;* (7/2)* (7/2)* 7</p><p>= 49&#960;* (14  -  7/12)</p><p>= 49&#960;* 161/12 cubic cm</p><p>Required Percentage = [(49&#960;* 161/12)/ (&#960;*7*7*14)]* 100</p><p>= 161* 25/42 = 95.83%</p><p>Short method:</p><p>Volume of cylinder = &#960;r<sup>2</sup>h</p><p>Volume of cone = 1/3 * &#960;(r/2)<sup>2</sup>(h/2) = 1/24 * &#960;r<sup>2</sup>h</p><p>Amount of wood wasted = Volume of cylinder  -  Volume of cone = 23/24 * &#960;r<sup>2</sup>h</p><p>Required percentage = (23/24 * &#960;r<sup>2</sup>h)/( &#960;r<sup>2</sup>h) * 100 = 95.83%</p>",
    "question_index": 8

    "question": "<span class=\"eqt\"><p>Water from 'N' small cylindrical mugs each of radius and height 15 cm and 14 cm respectively is poured into a large cuboidal pool of dimension 2 m * 4.5 m * 2.2 m to completely fill it, find the value of N.</p></span><span class=\"hqt\" style=\"display:none\"><p>'N' &#2331;&#2379;&#2335;&#2375; &#2348;&#2375;&#2354;&#2344;&#2366;&#2325;&#2366;&#2352; &#2350;&#2327;&#2379;&#2306; &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2350;&#2327; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 15 cm &#2324;&#2352; 14 cm &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2346;&#2366;&#2344;&#2368; &#2354;&#2375;&#2325;&#2352; 2 m * 4.5 m * 2.2 m &#2310;&#2351;&#2366;&#2350; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2348;&#2337;&#2364;&#2375; &#2328;&#2344;&#2366;&#2325;&#2366;&#2352; &#2346;&#2370;&#2354; &#2325;&#2379; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2349;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2370;&#2354; &#2350;&#2375;&#2306; &#2337;&#2366;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; N &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>The diameter and the slant height of a conical tent are 16 m and 5.6 m respectively. What length of cloth having a width of 4 m is needed to make the tent?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2358;&#2306;&#2325;&#2381;&#2357;&#2366;&#2325;&#2366;&#2352; &#2340;&#2306;&#2348;&#2370; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2324;&#2352; &#2340;&#2367;&#2352;&#2381;&#2351;&#2325; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 16 m &#2324;&#2352; 5.6 m &#2361;&#2376;&#2404; &#2340;&#2306;&#2348;&#2370; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 4 m &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2354;&#2350;&#2381;&#2348;&#2375; &#2325;&#2346;&#2337;&#2364;&#2375; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2327;&#2368;?</p></span>",

    "question": "<span class=\"eqt\"><p>Find the radius of the base and height of a cylinder if curved surface area and volume of the cylinder are 2112 cm<sup>2</sup> and 25344 cm<sup>3</sup>, respectively. (Take &#960; = 22/7)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2324;&#2352; &#2310;&#2351;&#2340;&#2344; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 2112 &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2324;&#2352; 25344 &#2360;&#2375;&#2350;&#2368;<sup>3</sup> &#2361;&#2376;, &#2340;&#2379; &#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; (&#960; = 22/7)</p></span>",

      "<span class=\"eqt\">Radius = 42 cm, and Height = 15 cm</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; = 42 &#2360;&#2375;&#2350;&#2368;, &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; = 15 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Radius = 22 cm, and Height = 10 cm</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; = 22 &#2360;&#2375;&#2350;&#2368;, &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; = 10 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Radius = 28 cm, and Height = 12 cm</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; = 28 &#2360;&#2375;&#2350;&#2368;, &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; = 12 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Radius = 24 cm, and Height = 14 cm</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; = 24 &#2360;&#2375;&#2350;&#2368;, &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; = 14 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Given, curved surface area and volume of the cylinder are 2112 cm<sup>2</sup> and 25344 cm<sup>3</sup>, respectively.</p><p>So, 2 * 22/7 * r * h = 2112</p><p>=&gt; rh = 336</p><p>And 22/7 * r<sup>2</sup> * h = 25344</p><p>=&gt; 22/7 * r * 336 = 25344</p><p>=&gt; r = 25344 * 7/22 * 1/336</p><p>=&gt; r = 24 cm</p><p>Hence, h = 336/24</p><p>=&gt; h = 14 cm</p>",
    "question_index": 15
