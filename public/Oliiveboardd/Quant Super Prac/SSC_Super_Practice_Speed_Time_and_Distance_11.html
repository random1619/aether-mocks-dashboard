<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In a race, Anurag gives a lead of 90 m to Vipul. If Anurag runs 2 times as fast as Vipul, then find the distance Anurag has to run before they meet?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2380;&#2337;&#2364; &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2352;&#2366;&#2327; &#2357;&#2367;&#2346;&#2369;&#2354; &#2360;&#2375; 90 &#2350;&#2368;&#2335;&#2352; &#2310;&#2327;&#2375; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2309;&#2344;&#2369;&#2352;&#2366;&#2327; &#2357;&#2367;&#2346;&#2369;&#2354; &#2360;&#2375; 2 &#2327;&#2369;&#2344;&#2366; &#2340;&#2375;&#2332; &#2342;&#2380;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2309;&#2344;&#2369;&#2352;&#2366;&#2327; &#2325;&#2379; &#2350;&#2367;&#2354;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352;&#2368; &#2342;&#2380;&#2337;&#2364;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">180 m</span><span class=\"hqt\" style=\"display:none\">180 &#2350;&#2368;</span>",
      "<span class=\"eqt\">200 m</span><span class=\"hqt\" style=\"display:none\">200 &#2350;&#2368;</span>",
      "<span class=\"eqt\">172 m</span><span class=\"hqt\" style=\"display:none\">172 &#2350;&#2368;</span>",
      "<span class=\"eqt\">198 m</span><span class=\"hqt\" style=\"display:none\">198 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>If time of constant, then</p><p>Ratio of speed = Ratio of distance</p><p>Ratio of speed of Anurag and Vipul = 2:1</p><p>Ratio of distance = 2:1</p><p>So, </p><p>1 unit = 90 m</p><p>2 unit = 2*90 = 180 m</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Suresh is 1(2/7) time faster than Naresh. In a race, Suresh gives a head start of 50 m to Naresh. Find the length of the race if both finished the race at same time.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2369;&#2352;&#2375;&#2358;, &#2344;&#2352;&#2375;&#2358; &#2360;&#2375; 1(2/7) &#2327;&#2369;&#2344;&#2366; &#2340;&#2375;&#2332; &#2361;&#2376;&#2404; &#2319;&#2325; &#2342;&#2380;&#2337;&#2364; &#2350;&#2375;&#2306;, &#2360;&#2369;&#2352;&#2375;&#2358;, &#2344;&#2352;&#2375;&#2358; &#2360;&#2375; 50 &#2350;&#2368;&#2335;&#2352; &#2310;&#2327;&#2375; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2375; &#2319;&#2325; &#2361;&#2368; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2342;&#2380;&#2337;&#2364; &#2346;&#2370;&#2352;&#2368; &#2325;&#2368;, &#2340;&#2379; &#2342;&#2380;&#2337;&#2364; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">180 m</span><span class=\"hqt\" style=\"display:none\">180 &#2350;&#2368;</span>",
      "<span class=\"eqt\">220 m</span><span class=\"hqt\" style=\"display:none\">220 &#2350;&#2368;</span>",
      "<span class=\"eqt\">175 m</span><span class=\"hqt\" style=\"display:none\">175 &#2350;&#2368;</span>",
      "<span class=\"eqt\">225 m</span><span class=\"hqt\" style=\"display:none\">225 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Ratio of speed of Suresh and Naresh = 1(2/7) : 1 = 9:7</p><p>Let speed of Suresh and Naresh is 9X m/s and 7X m/s respectively.</p><p>Let distance covered by Naresh = L m</p><p>Since, both reach at the same time  - </p><p>(L + 50)/9X = L/7X</p><p>7L + 350 = 9L</p><p>2L = 350</p><p>L = 175</p><p>The length of race = 175 + 50 = 225 m</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>P gives Q a lead of 54 meters to end a race in dead heat. If P runs 30% faster than Q, then find the length of race course.</p></span><span class=\"hqt\" style=\"display:none\"><p>P, Q &#2325;&#2379; 54 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2348;&#2338;&#2364;&#2340; &#2342;&#2367;&#2354;&#2366;&#2325;&#2352; &#2352;&#2375;&#2360; &#2325;&#2379; &#2348;&#2352;&#2366;&#2348;&#2352;&#2368; &#2346;&#2352; &#2326;&#2340;&#2381;&#2350; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; P, Q &#2360;&#2375; 30% &#2340;&#2375;&#2332; &#2342;&#2380;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2352;&#2375;&#2360; &#2325;&#2379;&#2352;&#2381;&#2360; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">234 m</span><span class=\"hqt\" style=\"display:none\">234 &#2350;&#2368;</span>",
      "<span class=\"eqt\">256 m</span><span class=\"hqt\" style=\"display:none\">256 &#2350;&#2368;</span>",
      "<span class=\"eqt\">210 m</span><span class=\"hqt\" style=\"display:none\">210 &#2350;&#2368;</span>",
      "<span class=\"eqt\">204 m</span><span class=\"hqt\" style=\"display:none\">204 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>If time of constant, then</p><p>Ratio of speed = Ratio of distance</p><p>Ratio of speed of P and Q = 130:100 = 13:10</p><p>Ratio of distance = 13:10</p><p>Length of race = 54*13/(13  -  10) = 234 m</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of speed of Meena and Teena is 6:5 respectively. If they run a race on a track of 138 m, then what part of the length of the race should Meena give Teena as a head start, so that the race ends in a dead heat?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2368;&#2344;&#2366; &#2324;&#2352; &#2335;&#2368;&#2344;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 6:5 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2375; 138 &#2350;&#2368;&#2335;&#2352; &#2325;&#2375; &#2335;&#2381;&#2352;&#2376;&#2325; &#2346;&#2352; &#2342;&#2380;&#2337;&#2364;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2350;&#2368;&#2344;&#2366; &#2325;&#2379; &#2342;&#2380;&#2337;&#2364; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2366;&#2327; &#2335;&#2368;&#2344;&#2366; &#2325;&#2379; &#2310;&#2327;&#2375; &#2352;&#2326;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;, &#2340;&#2366;&#2325;&#2367; &#2342;&#2380;&#2337;&#2364; &#2348;&#2352;&#2366;&#2348;&#2352;&#2368; &#2346;&#2352; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;?</p></span>",
    "options": [
      "<span class=\"eqt\">28 m</span><span class=\"hqt\" style=\"display:none\">28 &#2350;&#2368;</span>",
      "<span class=\"eqt\">32 m</span><span class=\"hqt\" style=\"display:none\">32 &#2350;&#2368;</span>",
      "<span class=\"eqt\">19 m</span><span class=\"hqt\" style=\"display:none\">19 &#2350;&#2368;</span>",
      "<span class=\"eqt\">23 m</span><span class=\"hqt\" style=\"display:none\">23 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>If time of constant, then</p><p>Ratio of speed = Ratio of distance</p><p>Ratio of speed of Meena and Teena = 6:5</p><p>Ratio of distance = 6:5</p><p>Length of race = 138 m</p><p>Required head start = 138*(6  -  5)/6 = 23 m</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Himanshu and Kapil takes 2 minutes 50 seconds and 3 minutes 20 seconds to complete a race respectively. If they both start the race from starting point at the same time, then Himanshu beats Kapil by 60 meters. What is the length of race course. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2367;&#2350;&#2366;&#2306;&#2358;&#2369; &#2324;&#2352; &#2325;&#2346;&#2367;&#2354; &#2319;&#2325; &#2342;&#2380;&#2337;&#2364; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 2 &#2350;&#2367;&#2344;&#2335; 50 &#2360;&#2375;&#2325;&#2306;&#2337; &#2324;&#2352; 3 &#2350;&#2367;&#2344;&#2335; 20 &#2360;&#2375;&#2325;&#2306;&#2337; &#2325;&#2366; &#2360;&#2350;&#2351; &#2354;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2357;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2319;&#2325; &#2361;&#2368; &#2360;&#2350;&#2351; &#2346;&#2352; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340;&#2368; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2342;&#2380;&#2337;&#2364; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2361;&#2367;&#2350;&#2366;&#2306;&#2358;&#2369; &#2325;&#2346;&#2367;&#2354; &#2360;&#2375; 60 &#2350;&#2368;&#2335;&#2352; &#2310;&#2327;&#2375; &#2344;&#2367;&#2325;&#2354; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2352;&#2375;&#2360; &#2325;&#2379;&#2352;&#2381;&#2360; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">400 m</span><span class=\"hqt\" style=\"display:none\">400 &#2350;&#2368;</span>",
      "<span class=\"eqt\">350 m</span><span class=\"hqt\" style=\"display:none\">350 &#2350;&#2368;</span>",
      "<span class=\"eqt\">380 m</span><span class=\"hqt\" style=\"display:none\">380 &#2350;&#2368;</span>",
      "<span class=\"eqt\">420 m</span><span class=\"hqt\" style=\"display:none\">420 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Difference between time = 3 minutes 20 seconds  -  2 minutes 50 seconds = 200  -  170 = 30 seconds</p><p>So, Kapil covers 60 meters in 30 seconds</p><p>Speed of Kapil = 2 m/s</p><p>Length of race course = 200*2 = 400 m</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>In a race of 1 km, Pooja completes the race in 150 seconds while Preeti completes in 160 seconds. Find the distance by which Pooja beats Preeti?</p></span><span class=\"hqt\" style=\"display:none\"><p>1 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2380;&#2337;&#2364; &#2350;&#2375;&#2306;, &#2346;&#2370;&#2332;&#2366; 150 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2342;&#2380;&#2337;&#2364; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2346;&#2381;&#2352;&#2368;&#2340;&#2367; 160 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2342;&#2380;&#2337;&#2364; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2346;&#2370;&#2332;&#2366; &#2344;&#2375; &#2346;&#2381;&#2352;&#2368;&#2340;&#2367; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352;&#2368; &#2360;&#2375; &#2361;&#2352;&#2366;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">56.5 m</span><span class=\"hqt\" style=\"display:none\">56.5 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">62.5 m</span><span class=\"hqt\" style=\"display:none\">62.5 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">68.5 m</span><span class=\"hqt\" style=\"display:none\">68.5 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">52.5 m</span><span class=\"hqt\" style=\"display:none\">52.5 &#2350;&#2368;&#2335;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Speed of Preeti = 1000/160 = 6.25 m/s</p><p>Difference between time = 160  -  150 = 10 seconds</p><p>Distance by which Pooja beats Preeti = 6.25 * 10 = 62.5 m</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Pawan covers 1.5 km in 15 minutes and Naman beats Pawan by 150 m, then find the time taken by Naman to completer the race of 1.5 km?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2357;&#2344; 1.5 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 15 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2344;&#2350;&#2344; &#2346;&#2357;&#2344; &#2360;&#2375; 150 &#2350;&#2368;&#2335;&#2352; &#2310;&#2327;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2350;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 1.5 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2380;&#2337;&#2364; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">12 minutes</span><span class=\"hqt\" style=\"display:none\">12 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">13.5 minutes</span><span class=\"hqt\" style=\"display:none\">13.5 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">10 minutes</span><span class=\"hqt\" style=\"display:none\">10 &#2350;&#2367;&#2344;&#2335;&#2379;&#2306;</span>",
      "<span class=\"eqt\">12.5 minutes</span><span class=\"hqt\" style=\"display:none\">12.5 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Time taken by Pawan = 15 minutes</p><p>Naman beats Pawan by 150 m.</p><p>Distance covered by Pawan = 1.5 km  -  150 m = 1500  -  150 = 1350 m</p><p>Time taken by Naman to completer the race of 1.5 km = 1350 * 15/1500 = 13.5 minutes</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Mayank and Prashant can cover a race of 900 meters from point P to Q in 1 minute 40 seconds and 2 minutes respectively. When Mayank finished the race, then find the distance between Prashant and point Q.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2351;&#2306;&#2325; &#2324;&#2352; &#2346;&#2381;&#2352;&#2358;&#2366;&#2306;&#2340; &#2348;&#2367;&#2306;&#2342;&#2369; P &#2360;&#2375; Q &#2340;&#2325; 900 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2380;&#2337;&#2364; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 1 &#2350;&#2367;&#2344;&#2335; 40 &#2360;&#2375;&#2325;&#2306;&#2337; &#2324;&#2352; 2 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2332;&#2348; &#2350;&#2351;&#2306;&#2325; &#2344;&#2375; &#2342;&#2380;&#2337;&#2364; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352; &#2354;&#2368;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2358;&#2366;&#2306;&#2340; &#2324;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; Q &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">150 m</span><span class=\"hqt\" style=\"display:none\">150 &#2350;&#2368;</span>",
      "<span class=\"eqt\">85 m</span><span class=\"hqt\" style=\"display:none\">85 &#2350;&#2368;</span>",
      "<span class=\"eqt\">90 m</span><span class=\"hqt\" style=\"display:none\">90 &#2350;&#2368;</span>",
      "<span class=\"eqt\">120 m</span><span class=\"hqt\" style=\"display:none\">120 &#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>1 minute 40 seconds = 100 seconds and 2 minutes = 120 seconds</p><p>Speed of Prashant = 900/120 = 7.5 m/s</p><p>Distance between Prashant and point Q = 7.5(120  -  100) = 150 m </p>",
    "question_index": 7

    "question": "<span class=\"eqt\"><p>In a race, Rani beats Vani by 252 m or 36 seconds. If the speed of Rani is 10 m/s, then find the speed of Vani.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2380;&#2337;&#2364; &#2350;&#2375;&#2306; &#2352;&#2366;&#2344;&#2368;, &#8203;&#8203;&#2357;&#2366;&#2339;&#2368; &#2325;&#2379; 252 &#2350;&#2368;&#2335;&#2352; &#2351;&#2366; 36 &#2360;&#2375;&#2325;&#2306;&#2337; &#2360;&#2375; &#2361;&#2352;&#2366; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2352;&#2366;&#2344;&#2368; &#2325;&#2368; &#2327;&#2340;&#2367; 10 &#2350;&#2368;&#2335;&#2352;/&#2360;&#2375;&#2325;&#2306;&#2337; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2366;&#2339;&#2368; &#2325;&#2368; &#2327;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
