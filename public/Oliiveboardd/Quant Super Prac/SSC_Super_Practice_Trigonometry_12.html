    "question": "<span class=\"eqt\"><p><div>&nbsp;Evaluate:&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">cos A[(1 - cot A)cot A + cosec<sup>2</sup> A]</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(cosec A - sin A)sec A(cos A + sin A)</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2360;&#2352;&#2354;&#2368;&#2325;&#2371;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;: &nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">cos A[(1 - cot A)cot A + cosec<sup>2</sup> A]</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(cosec A - sin A)sec A(cos A + sin A)</span></div></div></p></span>",
    "options": [
      "<span class=\"eqt\">sinA</span><span class=\"hqt\" style=\"display:none\">sinA</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">tanA</span><span class=\"hqt\" style=\"display:none\">tanA</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"

    "correct_option_id": 1,
    "solution": "<p><img width=227 height=47 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18579/image027.png\"></p><p><img width=227 height=64 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18579/image028.png\"></p><p><img width=221 height=69 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18579/image029.png\"></p><p><img width=179 height=59 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18579/image030.png\"></p><p><img width=111 height=44 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18579/image031.png\"></p><p><img width=117 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18579/image032.png\"></p>",

  {
    "question": "<span class=\"eqt\"><p>What is the simplified value of (cosecA + sinA)(cosecA - sinA)?</p></span><span class=\"hqt\" style=\"display:none\"><p>(cosecA + sinA)(cosecA - sinA) &#2325;&#2366; &#2360;&#2352;&#2354;&#2368;&#2325;&#2371;&#2340; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>&nbsp;<span><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-000163.png\"/>&nbsp;&nbsp;</span></p><p><span><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-006469.png\"/>&nbsp;&nbsp;</span></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If 6tanA = 5, find the value of (&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">sin( A + B ) + sin ( A - B )</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cos( A + B ) + cos( A - B )</span></div>&nbsp;+ 1).&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; 6tanA = 5 &#2361;&#2376;, &#2340;&#2379; ( <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">sin( A + B ) + sin ( A - B )</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cos( A + B ) + cos( A - B )</span></div> + 1) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</div></p></span>",
    "options": [
      "<span class=\"eqt\">11/5</span><span class=\"hqt\" style=\"display:none\">11/5</span>",
      "<span class=\"eqt\">13/6</span><span class=\"hqt\" style=\"display:none\">13/6</span>",
      "<span class=\"eqt\">11/6</span><span class=\"hqt\" style=\"display:none\">11/6</span>",
      "<span class=\"eqt\">13/5</span><span class=\"hqt\" style=\"display:none\">13/5</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Given,</p><p>6tanA = 5</p><p>tanA = 5/6</p><p>We know that,</p><p>sin(A + B) + sin(A - B)= 2sinAcosB</p><p>cos(A + B) + cos (A - B) = 2cosAcosB</p><p>Now,</p><p>(2sinAcosB/2cosAcosB) + 1</p><p>= tanA + 1</p><p>= (5/6) + 1 = 11/6</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If sec <i>a</i> = X and cosec <i>a</i> = Y, then X<sup>2 </sup>+ Y<sup>2</sup> = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; sec <i>a</i> = X &#2324;&#2352; cosec <i>a</i> = Y &#2361;&#2376;, &#2340;&#2379; X<sup>2 </sup>+ Y<sup>2</sup>=?</p></span>",
    "options": [
      "<span class=\"eqt\">XY</span><span class=\"hqt\" style=\"display:none\">XY</span>",
      "<span class=\"eqt\">X<sup>2</sup>Y<sup>2</sup> - XY</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup>Y<sup>2</sup>-XY</span>",
      "<span class=\"eqt\">X<sup>2</sup>Y<sup>2</sup> + XY</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup>Y<sup>2</sup>+XY</span>",
      "<span class=\"eqt\">X<sup>2</sup>Y<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup>Y<sup>2</sup></span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Given: sec<i>a</i> = X and cosec<i>a</i> = Y</p><p>X<sup>2</sup> + Y<sup>2</sup> = sec<sup>2</sup>a + cosec<sup>2</sup>a</p><p>= {1}/{cos<sup>2</sup>a} + {1}/{sin<sup>2</sup>a}</p><p>= {sin<sup>2</sup>a + cos<sup>2</sup>a}/{sin<sup>2</sup>a&#215;cos<sup>2</sup>a}</p><p>We know that cos<sup>2</sup>a + sin<sup>2</sup>a = 1</p><p>So, X<sup>2</sup> + Y<sup>2</sup> = <inlineformula>{1}/{sin<sup>2</sup>a&#215;cos<sup>2</sup>a}</inlineformula> = cosec<sup>2</sup>a&#215;sec<sup>2</sup>a = X<sup>2</sup>Y<sup>2</sup></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p><div>What is tanA + <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>tanA</span></div> + sin<span><sup>2</sup></span> A +  <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>1 + tan<span><sup>2</sup></span> A</span></div> equal to &#58;&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>tanA + <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>tanA</span></div> + sin<span><sup>2</sup></span> A +  <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>1 + tan<span><sup>2</sup></span> A</span></div> &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2360;&#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;?</div></p></span>",
    "options": [
      "<span class=\"eqt\">1 + sec A</span><span class=\"hqt\" style=\"display:none\">1 + sec A</span>",
      "<span class=\"eqt\">1 + sec A cosec A</span><span class=\"hqt\" style=\"display:none\">1 + sec A cosec A</span>",
      "<span class=\"eqt\">sec A cosec A</span><span class=\"hqt\" style=\"display:none\">sec A cosec A</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"

    "correct_option_id": 1,
    "solution": "<p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">tan<sup>2</sup> A + 1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">tan A</span></div>&nbsp;+ sin<sup>2</sup> A +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">sec<sup>2</sup> A</span></div>&nbsp;=&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">sec<sup>2</sup> A</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">tan A</span></div>&nbsp;+ sin<sup>2</sup> A + cos<sup>2</sup> A&nbsp;&nbsp;= 1 + sec A cosec A&nbsp;</div></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">(cot<sup>2</sup> &theta; - 1)<sup>2</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(1 - tan<sup>2</sup> &theta;)<sup>2</sup></span></div>&nbsp;= ?&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>((cot<sup>2</sup>&#952; -1)/(1-tan<sup>2</sup>&#952;))<sup>2 </sup>= ?</p></span>",
    "options": [
      "<span class=\"eqt\">cot<sup>3</sup> &#952;</span><span class=\"hqt\" style=\"display:none\">cot<sup>3</sup> &#952;</span>",
      "<span class=\"eqt\">tan<sup>4</sup> &#952;</span><span class=\"hqt\" style=\"display:none\">tan<sup>4</sup> &#952;</span>",
      "<span class=\"eqt\">cot<sup>4</sup> &#952;</span><span class=\"hqt\" style=\"display:none\">cot<sup>4</sup> &#952;</span>",
      "<span class=\"eqt\">tan<sup>3</sup> &#952;</span><span class=\"hqt\" style=\"display:none\">tan<sup>3</sup> &#952;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>(cot<sup>2</sup>&#952; -1) = cos<sup>2</sup>&theta; /sin<sup>2</sup> &theta; - 1  = (cos<sup>2</sup>&theta; - sin<sup>2</sup> &theta;)/sin<sup>2</sup> &theta;</p><p>1-tan<sup>2</sup>&#952; = (cos<sup>2</sup>&theta; - sin<sup>2</sup>&theta;)/cos<sup>2</sup>&theta;</p><p>So, ? = ((1/sin<sup>2</sup>&theta;)/(1/cos<sup>2</sup>&theta;))<sup>2</sup> = cot<sup>4</sup>&theta;</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The value of cot78 cot47 + cot55 cot 47 + cot 55 cot 78 is:</p></span><span class=\"hqt\" style=\"display:none\"><p>cot78 cot47 + cot55 cot 47 + cot 55 cot 78 &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",

      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",

      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"

    "correct_option_id": 0,
    "solution": "<p>78 + 47 + 55 = 180&deg;</p><p>We know that if A + B + C = 180&deg;</p><p>Then,</p><p>cotA.cotB + cotB.cotC + cotC.cotA = 1</p><p>Therefore required answer is 1.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If X =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">sin<sup>2</sup> A</span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cos<sup>2</sup> A</span></div>&nbsp;, find the value of &radic;X&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; X =  <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">sin<sup>2</sup> A</span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cos<sup>2</sup> A</span></div> &#2361;&#2376; , &#2340;&#2379; &radic;X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</div></p></span>",
    "options": [
