<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">3</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If one of the interior angles of a regular polygon is 15/16 times of one of the interior angles of a regular decagon, then fine the number of diagonals of the polygon.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2350; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2366; &#2319;&#2325; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339;, &#2319;&#2325; &#2360;&#2350; &#2342;&#2360;&#2349;&#2369;&#2332; &#2325;&#2375; &#2325;&#2367;&#2360;&#2368; &#2319;&#2325; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339; &#2325;&#2366; 15/16 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2375; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Interior angles of a regular polygon =15/16* [180*(10-2)/10]</p><p>[180*(n-2)/n] = 135</p><p>180n - 360 = 135n</p><p>45n = 360</p><p>n = 8</p><p>Number of diagonals of octagon = 8 * (8-3)/2 = 20</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In a rhombus ABCD, O is any interior point such that OA = OC. What is five-ninths of the degree measure of &#8736;DOB?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2350;&#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; ABCD &#2350;&#2375;&#2306;, O &#2325;&#2379;&#2312; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2361;&#2376; &#2332;&#2367;&#2360;&#2360;&#2375; OA = OC &#2361;&#2376;&#2404; &#8736;DOB &#2325;&#2375; &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2350;&#2366;&#2346; &#2325;&#2366; &#2346;&#2366;&#2305;&#2330;-&#2344;&#2380;&#2357;&#2366;&#2305; &#2349;&#2366;&#2327; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">120&deg;</span><span class=\"hqt\" style=\"display:none\">120&deg;</span>",
      "<span class=\"eqt\">150&deg;</span><span class=\"hqt\" style=\"display:none\">150&deg;</span>",
      "<span class=\"eqt\">100&deg;</span><span class=\"hqt\" style=\"display:none\">100&deg;</span>",
      "<span class=\"eqt\">90&deg;</span><span class=\"hqt\" style=\"display:none\">90&deg;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>As given a rhombus ABCD,OA=OC</p><p>As we know by the property of rhombus, it's diagonal bisect each other at right angle</p><p>As OA=OC,O lies in the perpendicular bisector of AC</p><p>So &#8736; AOB=&#8736; COD=90&deg; </p><p>&#8736; DOB=&#8736; AOB+&#8736; COD=180&deg; </p><p>So 5/9*180&deg; =100&deg; .</p><p>Option (c) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What is the area of a quadrilateral ABCD, (shown below) in which sides AB and BC are equal, sides AD and CD are of lengths 5 cm and 13 cm, respectively, and side AD is perpendicular to the diagonal AC?</p><p><img width=255 height=161 id=\"Picture 30\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27933/image023.png\" ></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; ABCD &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;, (&#2344;&#2368;&#2330;&#2375; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;) &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2349;&#2369;&#2332;&#2366;&#2319;&#2305; AB &#2324;&#2352; BC &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2306;, &#2349;&#2369;&#2332;&#2366;&#2319;&#2305; AD &#2324;&#2352; CD &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 5 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 13 &#2360;&#2375;&#2350;&#2368; &#2354;&#2306;&#2348;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2341;&#2366; &#2349;&#2369;&#2332;&#2366; AD &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; AC &#2346;&#2352; &#2354;&#2306;&#2348;&#2357;&#2340; &#2361;&#2376;?</p><p><img width=255 height=161 id=\"Picture 30\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27933/image023.png\" ></p></span>",
    "options": [
      "<span class=\"eqt\">75 cm&#178;</span><span class=\"hqt\" style=\"display:none\">75 &#2360;&#2375;&#2350;&#2368;&#178;</span>",
      "<span class=\"eqt\">78 cm&#178;</span><span class=\"hqt\" style=\"display:none\">78 &#2360;&#2375;&#2350;&#2368;&#178;</span>",
      "<span class=\"eqt\">82 cm&#178;</span><span class=\"hqt\" style=\"display:none\">82 &#2360;&#2375;&#2350;&#2368;&#178;</span>",
      "<span class=\"eqt\">80 cm&#178;</span><span class=\"hqt\" style=\"display:none\">80 &#2360;&#2375;&#2350;&#2368;&#178;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#916;ADC: AD &#8869; AC, AD = 5, CD = 13, AC = &radic;(13&#178; - 5&#178;) = 12</p><p>Area &#916;ADC = (1/2)  X  12  X  5 = 30 cm&#178;</p><p>&#916;ABC: AB = BC, AC = 12</p><p>Area via Heron's: s = (10+10 + 12) / 2 = 16, Area = &radic;(16(6)(6)(4)];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
