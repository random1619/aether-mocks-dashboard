<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->

    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The weight of an aluminium cone is (7/9) times the weight of iron cone. If weight of 1 gm of aluminium is (9/7) times of the weight of 1 gm of iron cone and heights of both cones are equal, then what is the ratio of radius of aluminium cone to radius of iron cone?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2354;&#2381;&#2351;&#2369;&#2350;&#2368;&#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2357;&#2332;&#2344; &#2354;&#2379;&#2361;&#2375; &#2325;&#2375; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2357;&#2332;&#2344; &#2325;&#2366; (7/9) &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 1 &#2327;&#2381;&#2352;&#2366;&#2350; &#2319;&#2354;&#2381;&#2351;&#2369;&#2350;&#2368;&#2344;&#2367;&#2351;&#2350; &#2325;&#2366; &#2357;&#2332;&#2344; 1 &#2327;&#2381;&#2352;&#2366;&#2350; &#2354;&#2379;&#2361;&#2375; &#2325;&#2375; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2357;&#2332;&#2344; &#2325;&#2366; (9/7) &#2327;&#2369;&#2344;&#2366; &#2361;&#2376; &#2324;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2358;&#2306;&#2325;&#2369;&#2323;&#2306; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2319;&#2354;&#2381;&#2351;&#2369;&#2350;&#2368;&#2344;&#2367;&#2351;&#2350; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; &#2354;&#2379;&#2361;&#2375; &#2325;&#2375; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">7: 9</span><span class=\"hqt\" style=\"display:none\">7: 9</span>",
      "<span class=\"eqt\">8: 9</span><span class=\"hqt\" style=\"display:none\">8: 9</span>",
      "<span class=\"eqt\">7: 8</span><span class=\"hqt\" style=\"display:none\">7: 8</span>",
      "<span class=\"eqt\">6: 7</span><span class=\"hqt\" style=\"display:none\">6: 7</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let height of the aluminium cone = height of iron cone = h</p><p>And radius of aluminium cone = r and radius of iron cone = R</p><p>According to the question,</p><p>{9 * (1/3 * &#960; * r<sup>2</sup> * h)}/{7 * (1/3 * &#960; * R<sup>2</sup> * h)} = 7/9</p><p>=&gt; r<sup>2</sup>/R<sup>2</sup> = 49/81</p><p>=&gt; r/R = 7/9</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A cylindrical hollow pipe of height 14 cm and radius 2.8 cm is to be varnished. If there is opening at both the ends, then find how much area is left to be varnished? (Take &#960; =22/7)</p></span><span class=\"hqt\" style=\"display:none\"><p>14 cm &#2314;&#2305;&#2330;&#2366;&#2312; &#2324;&#2352; 2.8 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2348;&#2375;&#2354;&#2344;&#2366;&#2325;&#2366;&#2352; &#2326;&#2379;&#2326;&#2354;&#2375; &#2346;&#2366;&#2311;&#2346; &#2346;&#2352; &#2357;&#2366;&#2352;&#2381;&#2344;&#2367;&#2358; &#2354;&#2327;&#2366;&#2344;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; &#2325;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2367;&#2352;&#2375;&#2306; &#2326;&#2369;&#2354;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2357;&#2366;&#2352;&#2381;&#2344;&#2367;&#2358; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;? (&#960; =22/7 &#2354;&#2368;&#2332;&#2367;&#2351;&#2375;)</p></span>",
    "options": [
      "<span class=\"eqt\">49.28 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">49.28 cm<sup>2</sup></span>",
      "<span class=\"eqt\">246.4 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">246.4 cm<sup>2</sup></span>",
      "<span class=\"eqt\">123.2 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">123.2 cm<sup>2</sup></span>",
      "<span class=\"eqt\">222.8 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">222.8 cm<sup>2</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to the Question,</p><p>Height of cylinder H= 14 cm</p><p>Radius of cylinder R= 2.8 cm</p><p>Since there is the opening at both the ends, so the area to be varnished is the curved surface area of cylinder</p><p>= 2&#960;RH</p><p>= 2 x 22/7 x 2.8 x 14</p><p>= 246.4 cm<sup>2</sup></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A cone of volume 5632 cm<sup>3</sup> is melted to form four identical cuboids. If the ratio of dimension of cuboid is 16:11:8, then find the total surface area of the cuboid.</p></span><span class=\"hqt\" style=\"display:none\"><p>5632 cm<sup>3</sup> &#2310;&#2351;&#2340;&#2344; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352; &#2330;&#2366;&#2352; &#2360;&#2350;&#2366;&#2344; &#2328;&#2344;&#2366;&#2349; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2328;&#2344;&#2366;&#2349; &#2325;&#2368; &#2357;&#2367;&#2350;&#2366;&#2323;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 16:11:8 &#2361;&#2376;, &#2340;&#2379; &#2328;&#2344;&#2366;&#2349; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">487 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">487 cm<sup>2</sup></span>",
      "<span class=\"eqt\">860 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">860 cm<sup>2</sup></span>",
      "<span class=\"eqt\">784 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">784 cm<sup>2</sup></span>",
      "<span class=\"eqt\">508 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">508 cm<sup>2</sup></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let dimension of cuboids are 16a, 11a and 8a respectively.</p><p>Volume of the cone = 5632 cm<sup>3</sup></p><p>4 * 16a * 11a * 8a = 5632</p><p>a<sup>3</sup> = 1</p><p>a = 1</p><p>So, l = 16 cm, b = 11 cm and h = 8 cm </p><p>Total surface area of the cuboid = 2[16*11 + 11*8 + 16*8] = 2*[176 + 88 + 128] = 784 cm<sup>2</sup></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>What is volume of the frustum of the cone, if the radius of the upper base of the frustum of the cone and height of the frustum of the cone are 20 cm and 10.5 cm respectively, and the radius of the lower base is 10 cm?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2331;&#2367;&#2344;&#2381;&#2344;&#2325; &#2325;&#2375; &#2314;&#2346;&#2352;&#2368; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2331;&#2367;&#2344;&#2381;&#2344;&#2325; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 20 cm &#2324;&#2352; 10.5 cm &#2361;&#2376; &#2324;&#2352; &#2344;&#2367;&#2330;&#2354;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 10 cm &#2361;&#2376;, &#2340;&#2379; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2331;&#2367;&#2344;&#2381;&#2344;&#2325; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">7500 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">7500 cm<sup>3</sup></span>",
      "<span class=\"eqt\">6600 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">6600 cm<sup>3</sup></span>",
      "<span class=\"eqt\">7700 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">7700 cm<sup>3</sup></span>",
      "<span class=\"eqt\">7200 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">7200 cm<sup>3</sup></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Volume of the frustum of the cone = 1/3 * 22/7 * H * (R<sup>2</sup> + Rr + r<sup>2</sup>) = 1/3 * 22/7 * 10.5 * (400 + 200 + 100) = 7700 cm<sup>3</sup></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;The base area of a cylinder is&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">2710.62</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">7</span></div>&nbsp;sq. cm and height is 35 cm. What is the curved surface area (in sq. cm) of the cylinder? (Take &pi; =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">22</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">7</span></div>&nbsp;)&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;  <div style=\"display: inline-block;position: relative;vertical-align: middle;\"> <span style=\"text-align:center;display: block; padding: 0;\">2710.62</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">7</span></div>&nbsp;sq. cm &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; 35 cm &#2361;&#2376;&#2404; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (sq. cm &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;? (&#960; =;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">22</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">7</span></div> &#2350;&#2366;&#2344;&#2375;&#2306;)</div></p></span>",
    "options": [
      "<span class=\"eqt\">2442</span><span class=\"hqt\" style=\"display:none\">2442</span>",
      "<span class=\"eqt\">2892</span><span class=\"hqt\" style=\"display:none\">2892</span>",
      "<span class=\"eqt\">2424</span><span class=\"hqt\" style=\"display:none\">2424</span>",
      "<span class=\"eqt\">2282</span><span class=\"hqt\" style=\"display:none\">2282</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Base area = 2710.62/7</p><p>&#928; * (R)<sup>2</sup> = 271062/700</p><p>(22/7) * R<sup>2</sup> = 271062/700</p><p>R<sup>2</sup> = 12321/100</p><p>R = 111/10</p><p>R = 11.1 cm</p><p>Height = 35 cm</p><p>Curved surface area = 2 * &#928; * R * H</p><p>= 2 * (22/7) * 11.1 * 35</p><p>= 22 * 111 = 2442 sq. cm</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The curved surface area of a cylinder and a cone of equal radius is X sq. cm and Y sq. cm respectively. If X = Y and slant height of cone is A cm, then the height of cylinder is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2324;&#2352; &#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; X sq.cm &#2324;&#2352; Y sq.cm &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; X = Y &#2324;&#2352; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2340;&#2367;&#2352;&#2381;&#2351;&#2325; &#2314;&#2306;&#2330;&#2366;&#2312; A cm &#2361;&#2376;, &#2340;&#2379; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">A</span><span class=\"hqt\" style=\"display:none\">A</span>",
      "<span class=\"eqt\">A/2</span><span class=\"hqt\" style=\"display:none\">A/2</span>",
      "<span class=\"eqt\">2A</span><span class=\"hqt\" style=\"display:none\">2A</span>",
      "<span class=\"eqt\">A/4</span><span class=\"hqt\" style=\"display:none\">A/4</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to the question,</p><p>X = Y</p><p>2 * &#960; * r * Height = &#960; * r * A</p><p>2 * Height = A</p><p>Height = A/2</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If a right circular cone of height 6.9 cm has the circumference of its base 24&#960; cm, then the volume (in cm<sup>3</sup>) (rounded off to two decimal places) of the cone is: (take &#960; = 22/7)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 6.9 cm &#2314;&#2306;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2354;&#2306;&#2348; &#2357;&#2352;&#2381;&#2340;&#2381;&#2340;&#2369;&#2354; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2346;&#2352;&#2367;&#2343;&#2367; 24&#960; cm &#2361;&#2376;, &#2340;&#2379; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; (cm<sup>3</sup>&#2350;&#2375;&#2306;) (&#2342;&#2358;&#2350;&#2354;&#2357; &#2325;&#2375; &#2342;&#2379; &#2309;&#2306;&#2325;&#2379;&#2306; &#2340;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;&#2367;&#2340;) &#2361;&#2376;: (&#960; = 22/7 &#2354;&#2368;&#2332;&#2367;&#2319;)</p></span>",
    "options": [
      "<span class=\"eqt\">1055.61</span><span class=\"hqt\" style=\"display:none\">1055.61</span>",
      "<span class=\"eqt\">1495.22</span><span class=\"hqt\" style=\"display:none\">1495.22</span>",
      "<span class=\"eqt\">1040.91</span><span class=\"hqt\" style=\"display:none\">1040.91</span>",
      "<span class=\"eqt\">1510.43</span><span class=\"hqt\" style=\"display:none\">1510.43</span>"

    "question": "<span class=\"eqt\"><p>If a solid cone of volume 27&pi; cm<sup>3</sup> is kept inside a hollow cylinder whose radius and height are of that cone, then the volume of water needed to fill the empty space is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 27&#960; &#2360;&#2375;&#2350;&#2368;<sup>3</sup> &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2375; &#2336;&#2379;&#2360; &#2358;&#2306;&#2325;&#2369; &#2325;&#2379; &#2319;&#2325; &#2326;&#2379;&#2326;&#2354;&#2375; &#2348;&#2375;&#2354;&#2344; &#2325;&#2375; &#2309;&#2306;&#2342;&#2352; &#2352;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; &#2313;&#2360; &#2358;&#2306;&#2325;&#2369; &#2332;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2326;&#2366;&#2354;&#2368; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2361;&#2376; :</p></span>",
