<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;Two pipes, A and B, can fill a tank in 1&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">3</span></div>&nbsp;hours and 2 hours respectively. If both the pipes are opened simultaneously, then in how many hours will the tank be full?&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2342;&#2379; &#2346;&#2366;&#2311;&#2346;, A &#2324;&#2352; B, &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 1<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">3</span></div> &#2328;&#2306;&#2335;&#2375;and 2 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2335;&#2376;&#2306;&#2325; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2366;?</div></p></span>",
    "options": [
      "<span class=\"eqt\">1(1/4) minutes</span><span class=\"hqt\" style=\"display:none\">1(1/4) &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">55 minutes</span><span class=\"hqt\" style=\"display:none\">55 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">48 minutes</span><span class=\"hqt\" style=\"display:none\">48 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">1(2/3) minutes</span><span class=\"hqt\" style=\"display:none\">1(2/3) &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Rate of pipe A = 1 / (4/3) = 3/4 tank per hour.</p><p>Rate of pipe B = 1 / 2 = 1/2 tank per hour.</p><p>Combined rate = (3/4) + (1/2) = 5/4 tank per hour</p><p>Time taken to fill the tank = 1 / (5/4) = 4/5 hours or 48 minutes</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe A takes 4/5 of the time required by pipe B to fill an empty tank individually. When an outlet pipe C is also opened simultaneously with pipes A and B, it takes 4/5 more time to fill the empty tank than it takes when only pipe A and pipe B are opened together. If it takes 40 hours to fill the tank when all the three pipes are opened simultaneously, in what time (in hours) will pipe C empty the full tank, operating alone?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2346; A &#2325;&#2379; &#2326;&#2366;&#2354;&#2368; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2349;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2366;&#2311;&#2346; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2360;&#2350;&#2351; &#2325;&#2366; 4/5 &#2349;&#2366;&#2327; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; &#2310;&#2313;&#2335;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; C &#2325;&#2379; &#2349;&#2368; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; B &#2325;&#2375; &#2360;&#2366;&#2341; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2326;&#2366;&#2354;&#2368; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2344;&#2375; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 4/5 &#2309;&#2343;&#2367;&#2325; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2344;&#2375; &#2346;&#2352; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 40 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2346;&#2366;&#2311;&#2346; C &#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2346;&#2370;&#2352;&#2366; &#2335;&#2376;&#2306;&#2325; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; (&#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306;) &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2342;&#2375;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">50</span><span class=\"hqt\" style=\"display:none\">50</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">65</span><span class=\"hqt\" style=\"display:none\">65</span>",
      "<span class=\"eqt\">75</span><span class=\"hqt\" style=\"display:none\">75</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let time taken by pipe B to fill a tank = 5x hours</p><p>So time taken by pipe A = 4x</p><p>Now pipe A and B together will fill in 1 hour = 1/4x + 1/5x =9/20x</p><p>So they will take 20x/9 to fill a tank.</p><p>When C an outlet pipe opens together with A and B it will take =(1+4/5)*(20x/9)=4x</p><p>So 4x=40</p><p>x=10</p><p>Now 1/A + 1/B  -  1/C =1/40</p><p>9/20x  -  1/C = 1/40</p><p>Putting x = 10:</p><p>9/200  -  1/40 = 1/C</p><p>1/C = 4/200</p><p>C =50.</p><p>Option (a) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Pipes A and B can fill a tank in 6 hours and 8 hours, respectively. Both pipes are opened together for 3 hours. After that pipe A is closed, and B continues to fill the tank. In how many hours will the tank be filled?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; B &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 6 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 8 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; 3 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2366;&#2311;&#2346; A &#2325;&#2379; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; B &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2366; &#2332;&#2366;&#2352;&#2368; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376;&#2404; &#2335;&#2376;&#2306;&#2325; &#2325;&#2367;&#2340;&#2344;&#2375; &#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Efficiency of pipe A = 1/6 (tank/hour)</p><p>Efficiency of pipe B = 1/8 (tank/hour)</p><p>Part of tank filled by both pipes in 3 hours = 3  X  (1/6 + 1/8)</p><p>=&gt; [3(4+3)]/24 = 21/24 or 7/8 of the tank</p><p>Remaining part = 1 - 7/8 = 1/8 (of the tank)</p><p>Time taken by pipe B to fill the remaining tank = (1/8)/(1/8) = 1 hour</p><p>Total time taken to fill the tank = 3 + 1 = 4 hours</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Pipe X can fill a tank in 9 hours and Pipe Y can fill it in 21 hours. If they are opened on alternate hours and Pipe X is opened first, in how many hours shall the tank be full?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2346; X &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 9 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; Y &#2311;&#2360;&#2375; 21 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2357;&#2376;&#2325;&#2354;&#2381;&#2346;&#2367;&#2325; &#2328;&#2306;&#2335;&#2379;&#2306; &#2346;&#2352; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; X &#2325;&#2379; &#2346;&#2361;&#2354;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2335;&#2376;&#2306;&#2325; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">73/7</span><span class=\"hqt\" style=\"display:none\">73/7</span>",
      "<span class=\"eqt\">87/7</span><span class=\"hqt\" style=\"display:none\">87/7</span>",
      "<span class=\"eqt\">66/7</span><span class=\"hqt\" style=\"display:none\">66/7</span>",
      "<span class=\"eqt\">80/7</span><span class=\"hqt\" style=\"display:none\">80/7</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>X can fill it in 9 hours,</p><p>Y can fill it in 21 hours</p><p>L.C.M of 9 and 21 =63</p><p>Efficiency of X = 63/9=7</p><p>Efiiciency of Y = 63/21= 3</p><p>If X is opened first and then Y is opened next hour.</p><p>So in 2 hours they will work :- (7+3)= 10 units of work.</p><p>So in 12 hours they will work:- 10*6=60 units of work,</p><p>Now as again X will have to work for remaining 3 units of work</p><p>So it will take 3/7 hours to fill the remaining tank.</p><p>So total time needed =12+3/7 =87/7</p><p>Option (b) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Two pipes A and B can fill a tank in 20 and 30 hours, respectively. Both pipes are opened to fill the tank, but when the tank is one-third full, a leak develops through which one-fourth of the water supplied by both pipes goes out. Find the total time (in hours) taken to fill the tank.</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; B &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 20 &#2324;&#2352; 30 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2332;&#2348; &#2335;&#2376;&#2306;&#2325; &#2319;&#2325; &#2340;&#2367;&#2361;&#2366;&#2312; &#2349;&#2352; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2319;&#2325; &#2352;&#2367;&#2360;&#2366;&#2357; &#2357;&#2367;&#2325;&#2360;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367; &#2325;&#2367;&#2319; &#2327;&#2319; &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2319;&#2325; &#2330;&#2380;&#2341;&#2366;&#2312; &#2349;&#2366;&#2327; &#2348;&#2366;&#2361;&#2352; &#2344;&#2367;&#2325;&#2354; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2366; &#2325;&#2369;&#2354; &#2360;&#2350;&#2351; (&#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">14(2/3)</span><span class=\"hqt\" style=\"display:none\">14(2/3)</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">11(2/5)</span><span class=\"hqt\" style=\"display:none\">11(2/5)</span>",
      "<span class=\"eqt\">12(1/3)</span><span class=\"hqt\" style=\"display:none\">12(1/3)</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Efficiency of pipe A = 1/20</p><p>Efficiency of pipe B = 1/30</p><p>Efficiency of both pipes together = 1/20 + 1/30 = 1/12</p><p>Time taken by both pipes to fill 1/3<sup>rd</sup> of the tank = (1/3)/(1/12) = 4 hours</p><p>1/4<sup>th</sup> of the water supplied got wasted = 1/12 * 1/4 = 1/48</p><p>Now the effective filling rate = 1/12  -  1/48 = 1/16</p><p>Time taken to fill remaining 2/3<sup>rd</sup> of the tank = (2/3)/(1/16) = 10 (2/3) hours</p><p>Total time = 4 + 10(2/3) = 14 (2/3) hours</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>A cistern can be filled by two pipes in 8 minutes and 10 minutes, separately. Both the pipes are opened together for a certain time, but due to an obstruction, only 5/8 of the full quantity of water flowed through the former pipe and 3/5 through the latter pipe. However, the obstruction was suddenly removed, and the cistern was filled in 3 minutes from that moment. How long did it take before the full flow began?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2342;&#2379; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; 8 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 10 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2350;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2309;&#2357;&#2352;&#2379;&#2343; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339;, &#2346;&#2361;&#2354;&#2375; &#2346;&#2366;&#2311;&#2346; &#2360;&#2375; &#2325;&#2375;&#2357;&#2354; 5/8 &#2346;&#2366;&#2344;&#2368; &#2348;&#2361;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2346;&#2366;&#2311;&#2346; &#2360;&#2375; 3/5 &#2346;&#2366;&#2344;&#2368; &#2348;&#2361;&#2340;&#2366; &#2361;&#2376;&#2404; &#2361;&#2366;&#2354;&#2366;&#2305;&#2325;&#2367;, &#2309;&#2357;&#2352;&#2379;&#2343; &#2325;&#2379; &#2309;&#2330;&#2366;&#2344;&#2325; &#2361;&#2335;&#2366; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2324;&#2352; &#2313;&#2360; &#2325;&#2381;&#2359;&#2339; &#2360;&#2375; 3 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2335;&#2306;&#2325;&#2368; &#2349;&#2352; &#2327;&#2312;&#2404; &#2346;&#2370;&#2352;&#2366; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">3(1/16) minutes</span><span class=\"hqt\" style=\"display:none\">3(1/16) &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">2(6/17) minutes</span><span class=\"hqt\" style=\"display:none\">2(6/17) &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">9(6/7) minutes</span><span class=\"hqt\" style=\"display:none\">9(6/7) &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">2(30/37) minutes</span><span class=\"hqt\" style=\"display:none\">2(30/37) &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Effective rates of pipes under obstruction:</p><p>For Pipe 1 (5/8 of full flow):</p><p>Rate = (5/8)  X  (1/8) = 5/64</p><p>For Pipe 2 (3/5 of full flow):</p><p>Rate = (3/5)  X  (1/10) = 3/50</p><p>Total rate of work under obstruction = 5/64 + 3/50</p><p>Take LCM of 64 and 50 = 1600:</p><p>5/64 = 125/1600, and 3/50 = 96/1600</p><p>Total rate = 125/1600 + 96/1600 = 221/1600</p><p>Work done after obstruction is removed:</p><p>Full flow rate of Pipe 1 = 1/8 and Pipe 2 = 1/10:</p><p>Total rate of full flow = 1/8 + 1/10</p><p>Take LCM of 8 and 10 = 40:</p><p>1/8 = 5/40, and 1/10 = 4/40</p><p>Total rate = 5/40 + 4/40 = 9/40</p><p>Time taken after full flow began = 3 minutes.</p><p>Work done in 3 minutes = Rate  X  Time:</p><p>Work = (9/40)  X  3 = 27/40</p><p>Work done before obstruction was removed:</p><p>Total work = 1 (full cistern).</p><p>Work done before = Total work - Work done after obstruction was removed:</p><p>Work done before = 1 - 27/40 = 13/40</p><p>Time taken before obstruction was removed:</p><p>Work = Rate  X  Time</p><p>Time = Work / Rate</p><p>=&gt; (13/40) &div; (221/1600)</p><p>Convert division into multiplication:</p><p>Time = (13/40)  X  (1600/221)</p><p>=&gt; (13  X  1600) / (40  X  221) = 20800 / 8840 or 2(6/17) minutes</p>",
    "question_index": 5
  },

    "question": "<span class=\"eqt\"><p>Two pipes can fill a tank in 12 hours and 18 hours, respectively, while a third pipe can empty it in 8 hours. How long (in hours) will it take to fill the empty tank if all three pipes are opened simultaneously?</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 12 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 18 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2319;&#2325; &#2340;&#2368;&#2360;&#2352;&#2366; &#2346;&#2366;&#2311;&#2346; &#2311;&#2360;&#2375; 8 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2319;&#2305; &#2340;&#2379; &#2326;&#2366;&#2354;&#2368; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; (&#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306;) &#2354;&#2327;&#2375;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>",
      "<span class=\"eqt\">72</span><span class=\"hqt\" style=\"display:none\">72</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Part filled by the first pipe in 1 hour = 1/12</p><p>Part filled by the second pipe in 1 hour = 1/18</p><p>Part emptied by the third pipe in 1 hour = 1/8</p><p>Net part of the tank filled in 1 hour = (1/12) + (1/18) - (1/8)</p><p>Net part of the tank filled in 1 hour = 1/12 + 1/18 - 1/8</p><p>LCM of 12, 18, and 8 = 72</p><p>1/12 = 6/72</p><p>1/18 = 4/72</p><p>1/8 = 9/72</p><p>Net part filled = (6/72) + (4/72) - (9/72)</p><p>=&gt; (6 + 4 - 9)/72 = 1/72</p><p>Therefore, the time taken to fill the tank is:</p><p>Time = 1 / (Net part filled in 1 hour)</p><p>=&gt; 1 / (1/72) = 72 hours</p>",
    "question_index": 6
  },

    "question": "<span class=\"eqt\"><p>Three pipes, P, Q and R, together take four hours to fill a tank. All the three pipes were opened at the same time. After three hours, P was closed, and Q and R filled the remaining tank in two hours. How many hours will P alone take to fill the tank?</p></span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344; &#2346;&#2366;&#2311;&#2346;, P, Q &#2324;&#2352; R, &#2319;&#2325; &#2360;&#2366;&#2341; &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2330;&#2366;&#2352; &#2328;&#2306;&#2335;&#2375; &#2354;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2361;&#2368; &#2360;&#2350;&#2351; &#2346;&#2352; &#2326;&#2379;&#2354;&#2375; &#2327;&#2319;&#2404; &#2340;&#2368;&#2344; &#2328;&#2306;&#2335;&#2375; &#2348;&#2366;&#2342;, P &#2325;&#2379; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;, &#2324;&#2352; Q &#2324;&#2352; R &#2344;&#2375; &#2358;&#2375;&#2359; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2342;&#2379; &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404; P &#2325;&#2379; &#2309;&#2325;&#2375;&#2354;&#2375; &#2335;&#2376;&#2306;&#2325; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2375;&#2306;&#2327;&#2375;?</span>",

    "question": "<span class=\"eqt\"><p>One pipe can fill a tank four times as fast as another pipe. If together the two pipes can fill the tank in 48 minutes, the slower pipe alone will be able to fill the tank in:</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2366;&#2311;&#2346; &#2325;&#2367;&#2360;&#2368; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2342;&#2370;&#2360;&#2352;&#2375; &#2346;&#2366;&#2311;&#2346; &#2360;&#2375; &#2330;&#2366;&#2352; &#2327;&#2369;&#2344;&#2366; &#2340;&#2375;&#2332;&#2364;&#2368; &#2360;&#2375; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2350;&#2367;&#2354;&#2325;&#2352; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 48 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2343;&#2368;&#2350;&#2368; &#2327;&#2340;&#2367; &#2357;&#2366;&#2354;&#2366; &#2346;&#2366;&#2311;&#2346; &#2309;&#2325;&#2375;&#2354;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2349;&#2352; &#2346;&#2366;&#2319;&#2327;&#2366;:</span>",

    "question": "<span class=\"eqt\"><p>A tank can be filled by pipe A in 4 hours and pipe B in 6 hours. At 8:00 a.m., pipe A was opened. At what time will the tank be filled if pipe B is opened at 9:00 a.m.?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2346;&#2366;&#2311;&#2346; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 4 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2341;&#2366; &#2346;&#2366;&#2311;&#2346; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 6 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2369;&#2348;&#2361; 8:00 &#2348;&#2332;&#2375;, &#2346;&#2366;&#2311;&#2346; A &#2326;&#2379;&#2354;&#2366; &#2327;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; B &#2325;&#2379; &#2360;&#2369;&#2348;&#2361; 9:00 &#2348;&#2332;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2319; &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2367;&#2360; &#2360;&#2350;&#2351; &#2349;&#2352;&#2375;&#2327;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">10:16 a.m.</span><span class=\"hqt\" style=\"display:none\">10:16 &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344;</span>",
      "<span class=\"eqt\">10:22 a.m.</span><span class=\"hqt\" style=\"display:none\">10:22 &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344;</span>",
      "<span class=\"eqt\">10:48 a.m.</span><span class=\"hqt\" style=\"display:none\">10:48 &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344;</span>",
      "<span class=\"eqt\">10:18 a.m.</span><span class=\"hqt\" style=\"display:none\">10:18 &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Capacity of tank = LCM of 4 and 6 = 24 units</p><p>Efficiency of pipe A = 24/4 = 6 units/hour</p><p>Efficiency of pipe B = 24/6 = 4 units/hour</p><p>Part of the tank filled by pipe A till 9:00 a.m. = 6 units</p><p>Remaining part of the tank to be fill = 24  -  6 = 18 units</p><p>Time taken to fill the remaining tank = 18/(6 + 4) = 18/10 or 1(4/5) hours</p><p>1(4/5) hours = 1 hours 48 minutes</p><p>Total time taken = 1 hour + 1 hour 48 minutes</p><p>=&gt; 2 hours 48 minutes</p><p>Required time = 10:48 a.m.</p>",

    "question": "<span class=\"eqt\"><p>Pipes A and B can fill a tank in 15 hours and 25 hours, respectively, whereas pipe C can empty the full tank in 40 hours. All three pipes are opened together, but pipe A is closed after 5 hours. After how many hours will the remaining part of the tank be filled?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; B &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 15 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 25 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2311;&#2346; C &#2346;&#2370;&#2352;&#2368; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 40 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2346;&#2366;&#2311;&#2346; A &#2325;&#2379; 5 &#2328;&#2306;&#2335;&#2375; &#2348;&#2366;&#2342; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2367;&#2340;&#2344;&#2375; &#2328;&#2306;&#2335;&#2375; &#2348;&#2366;&#2342; &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; &#2348;&#2330;&#2366; &#2361;&#2369;&#2310; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2366;?</span>",

    "correct_option_id": 3,
    "solution": "<p>Work done by Pipe A in 1 hour = 1 / 15</p><p>Work done by Pipe B in 1 hour = 1 / 25</p><p>Work done by Pipe C in 1 hour = -1 / 40 (negative because it empties the tank)</p><p>Total work done in 1 hour by all three pipes:</p><p>(1 / 15) + (1 / 25) - (1 / 40)</p><p>LCM of 15, 25, and 40 = 600</p><p>Total work = (40 / 600) + (24 / 600) - (15 / 600) = (40 + 24 - 15) / 600 = 49 / 600</p><p>Work done in 1 hour = 49 / 600</p><p>Total work in 5 hours = 5  X  (49 / 600) = 245 / 600</p><p>Fraction of tank filled in 5 hours = 245 / 600</p><p>Remaining part of the tank = 1 - (245 / 600) = (600 - 245) / 600 = 355 / 600</p><p>Work done by Pipe B and Pipe C in 1 hour (after Pipe A is closed):</p><p>Work done by Pipe B in 1 hour = 1 / 25</p><p>Work done by Pipe C in 1 hour = -1 / 40</p><p>Total work done in 1 hour by Pipe B and Pipe C:</p><p>(1 / 25) - (1 / 40)</p><p>LCM of 25 and 40 = 200</p><p>Total work = (8 / 200) - (5 / 200) = 3 / 200</p><p>Work done in 1 hour = 3 / 200</p><p>Remaining work = 355 / 600</p><p>Time = Remaining work / Work done in 1 hour</p><p>Time = (355 / 600) / (3 / 200)</p><p>Time = (355  X  200) / (600  X  3) = 71000 / 1800 = 355/9 or 39(4/9) hours</p>",
    "question_index": 11

    "question": "<span class=\"eqt\"><p>An inlet pipe can fill a water storage tank in 11 hours and an outlet pipe can empty the completely filled tank in 15 hours. If both pipes opened simultaneously. The time taken to fill the empty tank (in hrs) is :</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2311;&#2344;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2332;&#2354; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 11 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2319;&#2325; &#2310;&#2313;&#2335;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2349;&#2352;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 15 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2326;&#2366;&#2354;&#2368; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351; (&#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306;) &#2361;&#2376;:</span>",

    "question": "<span class=\"eqt\"><p>Pipe X can fill a tank in 60 hours while pipe Y can fill the tank in 72 hours. Both pipes are opened together for 20 hours. How much of the tank is left empty?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2346; X &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 60 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2311;&#2346; Y &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 72 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; 20 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2326;&#2366;&#2354;&#2368; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [

      "<span class=\"eqt\">7/18</span><span class=\"hqt\" style=\"display:none\">7/18</span>",

    "correct_option_id": 2,
    "solution": "<p>Capacity of tank = LCM of 60 and 72 = 360 units</p><p>Efficiency of pipe X = 360/60 = 6 units/hours</p><p>Efficiency of pipe Y = 360/72 = 5 units/hours</p><p>Part of tank got filled in 20 hours = (6 + 5) * 20 = 220 units</p><p>Part of tank left empty = 140/360 = 7/18</p>",

  {
    "question": "<span class=\"eqt\"><p>There are two pipes used to fill a tank and when operated together, they can fill the tank in 20 minutes. If one pipe can fill the tank two and a half times as quickly as the other, then the faster pipe alone can fill the tank in:</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2379; &#2346;&#2366;&#2311;&#2346; &#2325;&#2366; &#2311;&#2360;&#2381;&#2340;&#2375;&#2350;&#2366;&#2354; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2332;&#2348; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2319;&#2325; &#2360;&#2366;&#2341; &#2330;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2375; 20 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2346;&#2366;&#2311;&#2346; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2338;&#2366;&#2312; &#2327;&#2369;&#2344;&#2366; &#2340;&#2375;&#2332;&#2364;&#2368; &#2360;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2340;&#2375;&#2332;&#2364; &#2346;&#2366;&#2311;&#2346; &#2309;&#2325;&#2375;&#2354;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;:</span>",

    "correct_option_id": 3,
    "solution": "<p>Let the two pipes be x and y</p><p>They can fill together in 20 minutes.</p><p>Let efficiency of x&gt;y</p><p>So efficiency of x/y=2.5/1=5/2</p><p>Let efficiency of x = 5k and for y =2k</p><p>So total work=(5k+2k)*20</p><p>So faster one can fill it in= 7k*20/5k=28 min.</p><p>Option (d) is the correct answer.</p>",
    "question_index": 14

    "question": "<span class=\"eqt\"><p>Two pipes X and Y can fill a tank in 14 hours and 21 hours, respectively. Both pipes are opened simultaneously to fill the tank. In how many hours will the empty tank be filled?</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2346;&#2366;&#2311;&#2346; X &#2324;&#2352; Y &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 14 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 21 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2326;&#2366;&#2354;&#2368; &#2335;&#2376;&#2306;&#2325; &#2325;&#2367;&#2340;&#2344;&#2375; &#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2366;?</span>",

    "solution": "<p>Pipe X can fill the tank in 14 hours</p><p>Pipe Y can fill the tank in 21 hours</p><p>L.C.M of 14 and 21 is 42</p><p>Efficiency of X is :- 42/14 = 3</p><p>Efficiency of Y is :- 42/21 = 2</p><p>When both pipes will open simultaneoulsy, efficiency = (3+2) = 5</p><p>So time taken by them to fill tank = 42/5 = 8(2/5)</p><p>Option (a) is the correct answer. </p>",

    "question": "<span class=\"eqt\"><p>Two inlet pipes, P1 and P2, can fill a cistern in 20 hours and 30 hours, respectively. They were opened at the same time, but pipe P1 had to be closed 5 hours before the cistern was full. How many hours in total did it take for the two pipes to fill the cistern?</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2311;&#2344;&#2354;&#2375;&#2335; &#2346;&#2366;&#2311;&#2346;, P1 &#2324;&#2352; P2, &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 20 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 30 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2319;&#2325; &#2361;&#2368; &#2360;&#2350;&#2351; &#2346;&#2352; &#2326;&#2379;&#2354;&#2366; &#2327;&#2351;&#2366;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2335;&#2306;&#2325;&#2368; &#2325;&#2375; &#2349;&#2352;&#2344;&#2375; &#2360;&#2375; 5 &#2328;&#2306;&#2335;&#2375; &#2346;&#2361;&#2354;&#2375; &#2346;&#2366;&#2311;&#2346; P1 &#2325;&#2379; &#2348;&#2306;&#2342; &#2325;&#2352;&#2344;&#2366; &#2346;&#2337;&#2364;&#2366;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; &#2335;&#2306;&#2325;&#2368; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2375; &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2375;?</span>",

    "question": "<span class=\"eqt\"><p>Pipe Q can fill the tank in 60 hours while pipe R may fill in 45 hours. Q and R pipes are opened together for 6 hours after which pipe W is also opened to empty the tank. All three pipes are opened simultaneously for 24 hours to reach the half level mark. How much time (in hours) will pipe W alone take to empty the entire tank?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2346; Q &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 60 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2311;&#2346; R 45 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; Q &#2324;&#2352; R &#2346;&#2366;&#2311;&#2346; &#2325;&#2379; 6 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2366;&#2311;&#2346; W &#2325;&#2379; &#2349;&#2368; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2310;&#2343;&#2375; &#2360;&#2381;&#2340;&#2352; &#2325;&#2375; &#2344;&#2367;&#2358;&#2366;&#2344; &#2340;&#2325; &#2346;&#2361;&#2369;&#2305;&#2330;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2349;&#2368; &#2340;&#2368;&#2344; &#2346;&#2366;&#2311;&#2346;&#2379;&#2306; &#2325;&#2379; 24 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2366;&#2311;&#2346; W &#2325;&#2379; &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2370;&#2352;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2360;&#2350;&#2351; (&#2328;&#2306;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306;) &#2354;&#2327;&#2375;&#2327;&#2366;?</span>",
    "options": [

      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>"

    "correct_option_id": 2,
    "solution": "<p>Pipe Q can fill it in 60 hours</p><p>Pipe R can fill it in 45 hours</p><p>L.C.M of 60 and 45 is 180</p><p>Efficiency of Q and R is :-</p><p>Q's efficiency = 180/60=3</p><p>R's efficiency= 180/45=4</p><p>So in first 6 hours work done= (4+3)*6=42 units</p><p>Remaining=180-42=138 units</p><p>Let efficiency of pipe W be 'w, as three pipes work for 24 hours and reach half level mark</p><p>So 1/2 of 180=90, and as 42 is already completed, so remaining=90-42=48</p><p>So, 24*(3+4-w)=48</p><p>w=5,</p><p>so time taken by w alone to complete= 180/5=36 hours</p>",
    "question_index": 17

  {
    "question": "<span class=\"eqt\"><p>Pipe A can fill a cistern in 4 hours and Pipe B can fill the same cistern in 5 hours. Pipe C can empty a full cistern in 3 hours. If all three pipes are opened together, then the time (in minutes) taken to fill the tank is: (round to the nearest minute)</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 4 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2313;&#2360;&#2368; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 5 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2366;&#2311;&#2346; C &#2319;&#2325; &#2346;&#2370;&#2352;&#2368; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 3 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2340;&#2368;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351; (&#2350;&#2367;&#2344;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306;) &#2361;&#2376;: (&#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#2350;&#2367;&#2344;&#2335; &#2340;&#2325;)</span>",
    "options": [

      "<span class=\"eqt\">465</span><span class=\"hqt\" style=\"display:none\">465</span>",
      "<span class=\"eqt\">800</span><span class=\"hqt\" style=\"display:none\">800</span>",
      "<span class=\"eqt\">514</span><span class=\"hqt\" style=\"display:none\">514</span>"

    "correct_option_id": 3,
    "solution": "<p>Capacity of cistern = LCM of 4, 5 &amp; 3 = 60 units</p><p>Efficiency of pipe A = 60/4 = 15 units/hour</p><p>Efficiency of pipe B = 60/5 = 12 unit/hour</p><p>Efficiency of pipe C = 60/3 = 20 unit/hour</p><p>Required time = 60/(15 + 12  -  20) = 60/7</p><p>=&gt; 60/7 * 60 &#8776; 514 minutes</p>",
    "question_index": 18

    "question": "<span class=\"eqt\"><p>One pipe can fill a tank 6 times faster than another pipe. If both the pipes together can fill the tank in 40 minutes, then in how many minutes will the slower pipe alone be able to fill the tank?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2366;&#2311;&#2346; &#2342;&#2370;&#2360;&#2352;&#2375; &#2346;&#2366;&#2311;&#2346; &#2360;&#2375; 6 &#2327;&#2369;&#2344;&#2366; &#2340;&#2375;&#2332;&#2368; &#2360;&#2375; &#2319;&#2325; &#2335;&#2376;&#2306;&#2325; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2366;&#2311;&#2346; &#2350;&#2367;&#2354;&#2325;&#2352; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 40 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2343;&#2368;&#2350;&#2368; &#2327;&#2340;&#2367; &#2357;&#2366;&#2354;&#2366; &#2346;&#2366;&#2311;&#2346; &#2309;&#2325;&#2375;&#2354;&#2375; &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2346;&#2366;&#2319;&#2327;&#2366;?</span>",

      "<span class=\"eqt\">290</span><span class=\"hqt\" style=\"display:none\">290</span>",

    "correct_option_id": 3,
    "solution": "<p>Let efficiency of one pipe be 'x'</p><p>So efficiency of another pipe = '6x'</p><p>As both can together complete the work in 40 min</p><p>So total work =(x + 6x)*40 =280x</p><p>So slower pipe alone will take 280x/x = 280 min to completely fill tank.</p><p>Option (d) is the correct answer.</p>",
