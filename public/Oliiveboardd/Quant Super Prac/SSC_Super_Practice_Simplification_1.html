<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Find the least fraction of the following.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2366; &#2309;&#2306;&#2358; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2/5</span><span class=\"hqt\" style=\"display:none\">2/5</span>",
      "<span class=\"eqt\">4/7</span><span class=\"hqt\" style=\"display:none\">4/7</span>",
      "<span class=\"eqt\">1/4</span><span class=\"hqt\" style=\"display:none\">1/4</span>",
      "<span class=\"eqt\">1/11</span><span class=\"hqt\" style=\"display:none\">1/11</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>2/5 = 0.4 ; 4/7 = 0.57 ; 1/4 = 0.25 ; 1/11 = 0.09</p><p>Clearly, 1/11 is the least.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is true?</p><p>I: 18/43 &gt; 12/31 &gt; 17/35</p><p>II: 7/18 &lt; 9/21 &lt; 11/24</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p><p>I: 18/43 &gt; 12/31 &gt; 17/35</p><p>II: 7/18 &lt; 9/21 &lt; 11/24</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>I: 18/43 &gt; 12/31 &gt; 17/35</p><p>= 19530/46655 &gt; 18060/46655 &gt; 22661/46655</p><p>Which is not true. </p><p>II: 7/18 &lt; 9/21 &lt; 11/24</p><p>= 196/504 &lt; 216/504 &lt; 231/504</p><p>Which is true.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which fraction bears the same ratio to 1/20 as 5/6 does to 7/12? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2368; &#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2366; 1/20 &#2360;&#2375; &#2357;&#2361;&#2368; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2361;&#2376; &#2332;&#2379; 5/6 &#2325;&#2366; 7/12 &#2360;&#2375; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1/14</span><span class=\"hqt\" style=\"display:none\">1/14</span>",
      "<span class=\"eqt\">3/17</span><span class=\"hqt\" style=\"display:none\">3/17</span>",
      "<span class=\"eqt\">1/21</span><span class=\"hqt\" style=\"display:none\">1/21</span>",
      "<span class=\"eqt\">2/35</span><span class=\"hqt\" style=\"display:none\">2/35</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Required fraction = 5/6 * 12/7 * 1/20 = 1/14</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The difference between the greatest decimal number and the smallest decimal number among 0.7978, 0.098, 0.0698 and 0.9856 is:</p></span><span class=\"hqt\" style=\"display:none\"><p>0.7978, 0.098, 0.0698 &#2324;&#2352; 0.9856 &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">0.9058</span><span class=\"hqt\" style=\"display:none\">0.9058</span>",
      "<span class=\"eqt\">0.9258</span><span class=\"hqt\" style=\"display:none\">0.9258</span>",
      "<span class=\"eqt\">0.9158</span><span class=\"hqt\" style=\"display:none\">0.9158</span>",
      "<span class=\"eqt\">0.9358</span><span class=\"hqt\" style=\"display:none\">0.9358</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The greatest decimal number = 0.9856</p><p>The smallest decimal number = 0.0698</p><p>Required difference = 0.9856  -  0.0698 = 0.9158</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The non-terminating decimal among the following fractions is:</p><p>25/16, 29/4, 31/3, 41/5 </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2349;&#2367;&#2344;&#2381;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2309;&#2357;&#2367;&#2352;&#2366;&#2350; &#2342;&#2358;&#2350;&#2354;&#2357; &#2361;&#2376;:</p><p>25/16, 29/4, 31/3, 41/5 </p></span>",
    "options": [
      "<span class=\"eqt\">29/4</span><span class=\"hqt\" style=\"display:none\">29/4</span>",
      "<span class=\"eqt\">31/3</span><span class=\"hqt\" style=\"display:none\">31/3</span>",
      "<span class=\"eqt\">25/16</span><span class=\"hqt\" style=\"display:none\">25/16</span>",
      "<span class=\"eqt\">41/5</span><span class=\"hqt\" style=\"display:none\">41/5</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>[If the denominator of a rational number has either 2 or 5 or both as prime factors, then the decimal expansion is terminating decimal]</b></p><p>25/16, factors of 16 is 2 * 2 * 2 * 2, so it is a terminating decimal.</p><p>29/4, factors of 4 is 2 * 2, so it is a terminating decimal. </p><p>31/3, factors of 3 is 3, so it is a non - terminating decimal.</p><p>41/5, factors of 5 is 5, so it is a terminating decimal.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The denominator of a fraction is 5 more than the numerator. When both increased by 4 the fraction becomes 4/5. Find the new fraction obtained when original fraction got multiplied by 3/2.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2366; &#2361;&#2352; &#2309;&#2306;&#2358; &#2360;&#2375; 5 &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2332;&#2348; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2379; 4 &#2360;&#2375; &#2348;&#2338;&#2364;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2379; &#2349;&#2367;&#2344;&#2381;&#2344; 4/5 &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2350;&#2370;&#2354; &#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2379; 3/2 &#2360;&#2375; &#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2344;&#2312; &#2349;&#2367;&#2344;&#2381;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3/4</span><span class=\"hqt\" style=\"display:none\">3/4</span>",
      "<span class=\"eqt\">2/3</span><span class=\"hqt\" style=\"display:none\">2/3</span>",
      "<span class=\"eqt\">5/7</span><span class=\"hqt\" style=\"display:none\">5/7</span>",
      "<span class=\"eqt\">8/7</span><span class=\"hqt\" style=\"display:none\">8/7</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the original fraction be x/(x + 5)</p><p>According to question,</p><p>(x + 4)/(x + 9) = 4/5</p><p>5x + 20 = 4x + 36</p><p>x = 16</p><p>original fraction = 16/21</p><p>new obtained fraction = 16/21 * 3/2 = 8/7</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following numbers is the terminating decimal?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2309;&#2306;&#2340; &#2342;&#2358;&#2350;&#2354;&#2357; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">5/8</span><span class=\"hqt\" style=\"display:none\">5/8</span>",
      "<span class=\"eqt\">6/7</span><span class=\"hqt\" style=\"display:none\">6/7</span>",
      "<span class=\"eqt\">2/3</span><span class=\"hqt\" style=\"display:none\">2/3</span>",
      "<span class=\"eqt\">5/9</span><span class=\"hqt\" style=\"display:none\">5/9</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>5/8 = 0.625</p><p>6/7 = 0.8571....</p><p>2/3 = 0.666.....</p><p>5/9 = 0.5555....</p><p>5/8 is terminating decimal.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following fractions are in descending order?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2349;&#2367;&#2344;&#2381;&#2344; &#2309;&#2357;&#2352;&#2379;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">11/36, 9/28, 7/20</span><span class=\"hqt\" style=\"display:none\">11/36, 9/28, 7/20</span>",
      "<span class=\"eqt\">7/20, 9/28, 11/36</span><span class=\"hqt\" style=\"display:none\">7/20, 9/28, 11/36</span>",
      "<span class=\"eqt\">11/36, 7/20, 9/28</span><span class=\"hqt\" style=\"display:none\">11/36, 7/20, 9/28</span>",
      "<span class=\"eqt\">7/20, 11/36, 9/28</span><span class=\"hqt\" style=\"display:none\">7/20, 11/36, 9/28</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>L.C.M = 20, 36, and 28 = 1260</p><p>7/20 = 441/1260</p><p>11/36 = 385/1260</p><p>9/28 = 405/1260</p><p>Descending = 7/20, 9/28, 11/36</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>One decimal is 2.509 more than another decimal. If smaller decimal is 1.048, then find the larger decimal.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2358;&#2350;&#2354;&#2357; &#2342;&#2370;&#2360;&#2352;&#2375; &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2375; 2.509 &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2331;&#2379;&#2335;&#2366; &#2342;&#2358;&#2350;&#2354;&#2357; 1.048 &#2361;&#2376;, &#2340;&#2379; &#2348;&#2337;&#2364;&#2366; &#2342;&#2358;&#2350;&#2354;&#2357; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3.775</span><span class=\"hqt\" style=\"display:none\">3.775</span>",
      "<span class=\"eqt\">3.585</span><span class=\"hqt\" style=\"display:none\">3.585</span>",
      "<span class=\"eqt\">3.557</span><span class=\"hqt\" style=\"display:none\">3.557</span>",
      "<span class=\"eqt\">3.675</span><span class=\"hqt\" style=\"display:none\">3.675</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Smaller decimal = 1.048</p><p>Larger decimal = 1.048 + 2.509 = 3.557</p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>A fraction is 3/4 less than another fraction. If the sum of the fractions is 9/10, then find the smaller fraction.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2349;&#2367;&#2344;&#2381;&#2344; &#2342;&#2370;&#2360;&#2352;&#2368; &#2349;&#2367;&#2344;&#2381;&#2344; &#2360;&#2375; 3/4 &#2325;&#2350; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2349;&#2367;&#2344;&#2381;&#2344;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 9/10 &#2361;&#2376;, &#2340;&#2379; &#2331;&#2379;&#2335;&#2368; &#2349;&#2367;&#2344;&#2381;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3/20</span><span class=\"hqt\" style=\"display:none\">3/20</span>",
      "<span class=\"eqt\">1/10</span><span class=\"hqt\" style=\"display:none\">1/10</span>",
      "<span class=\"eqt\">3/40</span><span class=\"hqt\" style=\"display:none\">3/40</span>",
      "<span class=\"eqt\">3/8</span><span class=\"hqt\" style=\"display:none\">3/8</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let smaller fraction = x</p><p>Larger fraction = x + 3/4</p><p>Now,</p><p>x + x + 3/4 = 9/10</p><p>2x = 9/10  -  3/4 = 3/20</p><p>x = 3/40</p><p>Hence, smaller fraction = 3/40</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p><img width=284 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24942/image006.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><img width=284 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24942/image006.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">142/99</span><span class=\"hqt\" style=\"display:none\">142/99</span>",
      "<span class=\"eqt\">142/990</span><span class=\"hqt\" style=\"display:none\">142/990</span>",
      "<span class=\"eqt\">142/900</span><span class=\"hqt\" style=\"display:none\">142/900</span>",
      "<span class=\"eqt\">142/999</span><span class=\"hqt\" style=\"display:none\">142/999</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=85 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24942/image007.png\"></p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>What are the largest fractions of 5/12, 7/24, 9/16, and 11/18</p></span><span class=\"hqt\" style=\"display:none\"><p>5/12, 7/24, 9/16 &#2324;&#2352; 11/18 &#2325;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">96/144</span><span class=\"hqt\" style=\"display:none\">96/144</span>",
      "<span class=\"eqt\">92/144</span><span class=\"hqt\" style=\"display:none\">92/144</span>",
      "<span class=\"eqt\">86/144</span><span class=\"hqt\" style=\"display:none\">86/144</span>",
      "<span class=\"eqt\">88/144</span><span class=\"hqt\" style=\"display:none\">88/144</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>L.C.M of 12, 24, 16, and 18 = 144</p><p>5/12 = 60/144</p><p>7/24 = 42/144</p><p>9/16 = 81/144</p><p>11/18 = 88/144</p><p>Hence, the required number is 88/144.</p>",
    "question_index": 11

    "question": "<span class=\"eqt\"><p>Which of the following is true?</p><p>I. 0.2<span style=\"text-decoration:overline\">59</span> = 128/495</p><p>II. 0.<span style=\"text-decoration:overline\">42</span> = 7/15</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. 0.2<span style=\"text-decoration:overline\">59</span> = 128/495</p><p>II. 0.<span style=\"text-decoration:overline\">42</span> = 7/15</p></span>",

    "question": "<span class=\"eqt\"><p>When a fraction is multiplied by the square of &radic;5/2, then it becomes 1(1/3). If numerator of the fraction is increased by 50% and its denominator is decreased by 20%, then the resultant is __.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2319;&#2325; &#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2379; &radic;5/2 &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2360;&#2375; &#2327;&#2369;&#2339;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; 1(1/3) &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2375; &#2309;&#2306;&#2358; &#2350;&#2375;&#2306; 50% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2361;&#2352; &#2350;&#2375;&#2306; 20% &#2325;&#2368; &#2325;&#2350;&#2368; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; ______ &#2361;&#2379;&#2327;&#2366;&#2404;</p></span>",

    "solution": "<p>1(1/3) means (1 + 1/3) or (4/3).</p><p>Let the fraction = p/q</p><p>Then, (&radic;5/2)<sup>2</sup> * p/q = 4/3</p><p>p/q = (4/3) * 4/5 = 16/15</p><p>now, when numerator of the fraction is increased by 50% and its denominator is decreased by 20%, then resultant = ((100 + 50)% of 16)/((100  -  20)% of 15)</p><p>= (150 * 16)/(80 * 15)</p><p>= <b>2</b></p>",

    "question": "<span class=\"eqt\"><p>Which of the following is largest among the fractions 8/9, 11/12, 23/24 and 31/36?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2349;&#2367;&#2344;&#2381;&#2344;&#2379;&#2306;- 8/9, 11/12, 23/24 &#2324;&#2352; 31/36 &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>The denominator of a fraction is 5 more than its numerator, which is a positive integer. The numerator is doubled and the denominator is now 3. The resultant fraction is 20/9 more than the original fraction. What is the numerator of the original fraction?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2366; &#2361;&#2352; &#2313;&#2360;&#2325;&#2375; &#2309;&#2306;&#2358; &#2360;&#2375; 5 &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2332;&#2379; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2361;&#2376;| &#2309;&#2306;&#2358; &#2325;&#2379; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2309;&#2348; &#2361;&#2352; 3 &#2361;&#2376;| &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2368; &#2349;&#2367;&#2344;&#2381;&#2344; &#2350;&#2370;&#2354; &#2349;&#2367;&#2344;&#2381;&#2344; &#2360;&#2375; 20/9 &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;| &#2350;&#2370;&#2354; &#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2366; &#2309;&#2306;&#2358; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",

    "solution": "<p>Let the numerator = n, then denominator = n+5. Hence the fraction = n/(n+5)</p> <p>According to the given condition, 2n/3  -  n/(n+5) = 20/9</p> <p>Multiplying all terms by 9(n+5) [LCM of denominators]</p> <p>6n(n+5)  -  9n = 20(n+5)</p> <p>=&gt; 6n<sup>2</sup> + 30n  -  9n = 20n + 100</p> <p>=&gt; 6n<sup>2</sup> + n  -  100 = 0</p> <p>=&gt; 6n<sup>2</sup> + 25n  -  24n  -  100 = 0</p> <p>=&gt; n(6n+25)  -  4(6n+25) = 0</p> <p>=&gt; (6n+25)(n-4) = 0</p> <p>Since n is a positive integer, n =4</p>",
    "question_index": 17

    "question": "<span class=\"eqt\"><p>If we add 1 to the twice of the denominator of a fraction then we will get 1/5. If we subtract 1 from numerator and add 1 to denominator then we will get 1/4. What is the original fraction?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2361;&#2350; &#2325;&#2367;&#2360;&#2368; &#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2375; &#2361;&#2352; &#2325;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2375; &#2350;&#2375;&#2306; 1 &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2379; &#2361;&#2350;&#2375;&#2306; 1/5 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2327;&#2366;&#2404; &#2351;&#2342;&#2367; &#2361;&#2350; &#2309;&#2306;&#2358; &#2350;&#2375;&#2306; &#2360;&#2375; 1 &#2328;&#2335;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2361;&#2352; &#2350;&#2375;&#2306; 1 &#2332;&#2379;&#2337;&#2364;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2361;&#2350;&#2375;&#2306; 1/4 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2327;&#2366;&#2404; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>Let the fraction = m/n</p><p>According to the 1<sup>st</sup> condition; m/(2n+1) = 1/5</p><p>=&gt;5m = 2n + 1</p><p>=&gt; 5m  -  2n = 1 ... (1)</p><p>According to the 2<sup>nd</sup> condition; (m-1)/(n+ 1) = 1/4</p><p>=&gt;4m - 4 = n +1</p><p>=&gt; 4m - n = 5 ...(2)</p><p>Solving (1) and (2) we will get; m = 3 and n = 7</p><p>Hence the original fraction = m/n = 3/7</p>",
