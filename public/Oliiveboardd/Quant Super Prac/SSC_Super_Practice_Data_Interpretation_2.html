  {
    "comp": "<span class=\"eqt\"><p><b>Directions:</b> Study the data carefully and answer the following question.</p><p>The given pie chart shows the percentage-wise quantity of sugar in different sacks and percentage-wise quantity of rice in different containers.</p><p>The total quantity of sugar = 6200 kg</p><p><img width=340 height=315 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16258/image002.png\"></p><p>The total quantity of rice = 4000 kg</p><p><img width=373 height=388 id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16258/image003.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; :</b> &#2310;&#2305;&#2325;&#2396;&#2379;&#2306; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2348;&#2379;&#2352;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2330;&#2368;&#2344;&#2368; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;-&#2357;&#2366;&#2352; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2324;&#2352; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2330;&#2366;&#2357;&#2354; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;-&#2357;&#2366;&#2352; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2330;&#2368;&#2     "question": "<span class=\"eqt\"><p>Aman bought 30% sugar from sack E and 10% rice from container E. The difference between the quantity of sugar and rice, Aman has:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2350;&#2344; &#2344;&#2375; &#2348;&#2379;&#2352;&#2368; E &#2350;&#2375;&#2306; &#2360;&#2375; 30% &#2330;&#2368;&#2344;&#2368; &#2324;&#2352; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; E &#2350;&#2375;&#2306; &#2360;&#2375; 10% &#2330;&#2366;&#2357;&#2354; &#2326;&#2352;&#2368;&#2342;&#2375;&#2404; &#2309;&#2350;&#2344; &#2325;&#2375; &#2346;&#2366;&#2360; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2330;&#2368;&#2344;&#2368; &#2324;&#2352; &#2330;&#2366;&#2357;&#2354; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376; :</p></span>",
    "options": [
      "<span class=\"eqt\">411 kg</span><span class=\"hqt\" style=\"display:none\">411 kg</span>",
      "<span class=\"eqt\">419 kg</span><span class=\"hqt\" style=\"display:none\">419 kg</span>",
      "<span class=\"eqt\">417 kg</span><span class=\"hqt\" style=\"display:none\">417 kg</span>",
      "<span class=\"eqt\">415 kg</span><span class=\"hqt\" style=\"display:none\">415 kg</span>"

    "correct_option_id": 2,
    "solution": "<p>Quantity of sugar Aman has = 6200 * 25/100 * 30/100 = 465 kg</p><p>Quantity of rice Aman has = 4000 * 12/100 * 10/100 = 48 kg</p><p>Required difference = 465  -  48 = 417 kg</p>",
    "question_index": 0
  },
  {
    "comp": "<span class=\"eqt\"><p><b>Directions:</b>   Read the data carefully and answer the following questions.</p><p>Pie chart given below shows the percent distribution of monthly income (in &#8377;) of five persons and percent distribution of their monthly savings (in &#8377;).</p><p><img width=576 height=336 id=\"Chart 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16608/image004.png\"></p><p><img width=576 height=336 id=\"Chart 18\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16608/image005.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; :</b> &#2310;&#2305;&#2325;&#2337;&#2364;&#2379;&#2306; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2346;&#2366;&#2305;&#2330; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2350;&#2366;&#2360;&#2367;&#2325; &#2310;&#2351; (&#8377; &#2350;&#2375;&#2306;) &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2324;&#2352; &#2313;&#2344;&#2325;&#2368; &#2350;&#2366;&#2360;&#2367;&#2325; &#2348;&#2330;&#2340; (&#8377; &#2350;&#2375;&#2306;) &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16608/image004.png\"></p><p><img width=\"576\" height=\"336\" id=\"Chart 18\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16608/image005.png\"></p></span>",
    "question": "<span class=\"eqt\"><p>Which of the following person spends maximum in a month? [Income = Expenditure + Savings]</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2319;&#2325; &#2350;&#2361;&#2368;&#2344;&#2375;&#2306; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2352;&#2369;&#2346;&#2351;&#2375; &#2326;&#2352;&#2381;&#2330; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;? [&#2310;&#2351; = &#2357;&#2381;&#2351;&#2351; + &#2348;&#2330;&#2340;]</p></span>",
    "options": [
      "<span class=\"eqt\">D</span><span class=\"hqt\" style=\"display:none\">D</span>",
      "<span class=\"eqt\">B</span><span class=\"hqt\" style=\"display:none\">B</span>",
      "<span class=\"eqt\">A</span><span class=\"hqt\" style=\"display:none\">A</span>",
      "<span class=\"eqt\">C</span><span class=\"hqt\" style=\"display:none\">C</span>"
    ],
    "correct_option_id": 1,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Persons</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Monthly income (in &#8377;)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Monthly savings (in &#8377;)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>A</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">24% of 2.5 lakhs = 60000</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20% of 1 lakh = 20000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>B</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">80000</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">25000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>C</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">40000</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>D</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">50000</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">30000</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>E</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20000</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">10000</td></tr></table><br><p>Monthly expenditure of A = 60000  -  20000 = &#8377;40000</p><p>Monthly expenditure of B = 80000  -  25000 = &#8377;55000</p><p>Monthly expenditure of C = 40000  -  15000 = &#8377;25000</p><p>Monthly expenditure of D = 50000  -  30000 = &#8377;20000</p><p>Hence, monthly expenditure of B is maximum.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The first line graph shows the production of product A and B (in thousands) during the period 2004 to 2009 and the second line Graph shows the percentage sale of these products.</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/7aec52cd393b4acf4949fd7070ccfcec.png\" /></p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/139a5517aced16468357db02fecc6f03.png\" /></p><p>In the given line graph, what is the total sale of Product B in the year 2004 and 2008 together?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2361;&#2354;&#2366; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326;, 2004 &#2360;&#2375; 2009 &#2325;&#2368; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; A &#2324;&#2352; B &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; (&#2361;&#2332;&#2366;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306;) &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2366; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2311;&#2344; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/7aec52cd393b4acf4949fd7070ccfcec.png\"></p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/139a5517aced16468357db02fecc6f03.png\"></p><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2350;&#2375;&#2306;, &#2319;&#2325;&#2360;&#2366;&#2341; &#2357;&#2352;&#2381;&#2359; 2004 &#2324;&#2352; &#2357;&#2352;&#2381;&#2359; 2008 &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; B &#2325;&#2368; &#2325;&#2369;&#2354; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12500</span><span class=\"hqt\" style=\"display:none\">12500</span>",
      "<span class=\"eqt\">14600</span><span class=\"hqt\" style=\"display:none\">14600</span>",
      "<span class=\"eqt\">11950</span><span class=\"hqt\" style=\"display:none\">11950</span>",
      "<span class=\"eqt\">11825</span><span class=\"hqt\" style=\"display:none\">11825</span>"

    "correct_option_id": 3,
    "solution": "\"<p> Total sale of B in (2004 and 2008) </p><p>55 &#215; 8.5 + 65 &#215; 11 </p><p>467.5 + 715 </p><p>ATQ,</p><p> \r<img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-000899.png\"/>\r &#215;1000 </p><p>= 11825</p><p></p>\"",
    "question_index": 2

    "question": "<span class=\"eqt\"><p>The following pie charts shows the percentage distributions and degree-wise distributions of insurance sold by five salesmen in May and June.</p><p><img width=312 height=336 id=\"Chart 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20119/image005.png\"><img width=372 height=336 id=\"Chart 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20119/image006.png\"></p><p>Total number of insurances sold by all five salesmen in June is 20% more than that of in May. If salesmen B and C sold 160 insurances together in May, then total number of insurances sold by A, B, and C in June is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2350;&#2312; &#2324;&#2352; &#2332;&#2370;&#2344; &#2350;&#2375;&#2306; &#2346;&#2366;&#2305;&#2330; &#2360;&#2375;&#2354;&#2381;&#2360;&#2350;&#2376;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2348;&#2368;&#2350;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2324;&#2352; &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; -&#2357;&#2366;&#2352; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"312\" height=\"336\" id=\"Chart 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20119/image005.png\"><img width=\"372\" height=\"336\" id=\"Chart 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20119/image006.png\"></p><p>&#2332;&#2370;&#2344; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2346;&#2366;&#2305;&#2330; &#2360;&#2375;&#2354;&#2381;&#2360;&#2350;&#2376;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2348;&#2368;&#2350;&#2366; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2312; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2346;&#2366;&#2305;&#2330; &#2360;&#2375;&#2354;&#2381;&#2360;&#2350;&#2376;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2348;&#2368;&#2350;&#2366; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 20% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2375;&#2354;&#2381;&#2360;&#2350;&#2376;&#2344; B &#2324;&#2352; C &#2344;&#2375; &#2350;&#2312; &#2350;&#2375;&#2306; 160 &#2348;&#2368;&#2350;&#2366; &#2348;&#2375;&#2330;&#2375;, &#2340;&#2379; &#2332;&#2370;&#2344; &#2350;&#2375;&#2306; A, B &#2324;&#2352; C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2348;&#2368;&#2350;&#2366; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376; ?</p></span>",

    "question": "<span class=\"eqt\"><p>The following pie chart shows the distribution (percentage wise) of 600 marbles in six different jars - A, B, C, D, E and F. Each jar contains marbles of two colors  -  white and black.</p><p><img width=303 height=336 id=\"Chart 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image012.png\"></p><p>The table shows the number of black marbles in each jar.<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Jar</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Number of black marbles</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">80</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Y</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">92</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">X</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">42</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">F</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">36</td></tr></table></p><p>If the ratio of number of black marbles to that of white marbles in jar D is 12: 7, and number of black marbles in jar B is 12 less than that in jar D, then the difference between the number of white marbles in jar B and jar D is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2350;&#2375;&#2306; &#2331;&#2361; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2332;&#2366;&#2352; - A, B, C, D, E &#2324;&#2352; F &#2350;&#2375;&#2306; 600 &#2325;&#2306;&#2330;&#2375; &#2325;&#2366; &#2357;&#2367;&#2340;&#2352;&#2339; (&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2366;&#2352;) &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2332;&#2366;&#2352; &#2350;&#2375;&#2306; &#2342;&#2379; &#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2375; &#2346;&#2340;&#2381;&#2341;&#2352; &#2361;&#2376;&#2306;- &#2360;&#2347;&#2375;&#2342; &#2324;&#2352; &#2325;&#2366;&#2354;&#2366;&#2404;<img width=\"303\" height=\"336\" id=\"Chart 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image012.png\"></p><p>&#2340;&#2366;&#2354;&#2367;&#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2332;&#2366;&#2352; &#2350;&#2375;&#2306; &#2325;&#2366;&#2354;&#2375; &#2325;&#2306;&#2330;&#2375; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2332;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2366;&#2354;&#2375; &#2346;&#2340;&#2381;&#2341;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">80</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Y</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">92</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">X</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">42</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">F</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">36</td></tr></table><p>&#2351;&#2342;&#2367; &#2332;&#2366;&#2352; D &#2350;&#2375;&#2306; &#2325;&#2366;&#2354;&#2375; &#2346;&#2340;&#2381;&#2341;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2360;&#2347;&#2364;&#2375;&#2342; &#2346;&#2340;&#2381;&#2341;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 12:7 &#2361;&#2376; &#2340;&#2341;&#2366; &#2332;&#2366;&#2352; B &#2350;&#2375;&#2306; &#2325;&#2366;&#2354;&#2375; &#2346;&#2340;&#2381;&#2341;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2332;&#2366;&#2352; D &#2350;&#2375;&#2306; &#2325;&#2366;&#2354;&#2375; &#2346;&#2340;&#2381;&#2341;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 12 &#2325;&#2350; &#2361;&#2376;, &#2340;&#2379; &#2332;&#2366;&#2352; B &#2324;&#2352; &#2332;&#2366;&#2352; D &#2350;&#2375;&#2306; &#2360;&#2347;&#2364;&#2375;&#2342; &#2346;&#2340;&#2381;&#2341;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;:</p></span>",

    "solution": "<p>Let number of black marbles and white marbles in jar D be 12a and 7a respectively.</p><p>Total number of marbles in jar D = 600 * 19/100 = 114</p><p>So, 12a + 7a = 114</p><p>19a = 114</p><p>a = 6</p><p>Number of black marbles in jar D = 72</p><p>So, number of black marbles in jar B = 72  -  12 = 60</p><p>Number of white marbles in jar D = 42</p><p>Number of white marbles in jar B = (600 * 16/100)  -  60 = 96  -  60 = 36</p><p>Required difference = 42  -  36 = 6</p>",

    "question": "<span class=\"eqt\"><p>The following pie charts show the result of a survey. A survey conducted on 3000 people staying in various societies and having various favourite movies.</p><p><img width=325 height=336 id=\"Chart 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image005.png\"> <img width=402 height=336 id=\"Chart 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image006.png\"></p><p>If the favourite movie of 40% people of society Q is D, then what will be the ratio of people who like movie D except society Q to total number of people staying in society S?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2319;&#2325; &#2360;&#2352;&#2381;&#2357;&#2375;&#2325;&#2381;&#2359;&#2339; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2360;&#2379;&#2360;&#2366;&#2311;&#2335;&#2368; &#2350;&#2375;&#2306; &#2352;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; 3000 &#2354;&#2379;&#2327;&#2379;&#2306; &#2346;&#2352; &#2319;&#2325; &#2360;&#2352;&#2381;&#2357;&#2375;&#2325;&#2381;&#2359;&#2339; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2324;&#2352; &#2311;&#2344; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2360;&#2306;&#2342;&#2368;&#2342;&#2366; &#2347;&#2367;&#2354;&#2381;&#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404;</p><p><img width=\"325\" height=\"336\" id=\"Chart 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image005.png\"> <img width=\"402\" height=\"336\" id=\"Chart 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19504/image006.png\"></p><p>&#2351;&#2342;&#2367; &#2360;&#2379;&#2360;&#2366;&#2311;&#2335;&#2368; Q &#2325;&#2375; 40% &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2346;&#2360;&#2306;&#2342;&#2368;&#2342;&#2366; &#2347;&#2367;&#2354;&#2381;&#2350; D &#2361;&#2376;, &#2340;&#2379; &#2360;&#2379;&#2360;&#2366;&#2311;&#2335;&#2368; Q &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352; &#2347;&#2367;&#2354;&#2381;&#2350; D &#2325;&#2379; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2360;&#2379;&#2360;&#2366;&#2311;&#2335;&#2368; S &#2350;&#2375;&#2306; &#2352;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    "comp": "<span class=\"eqt\"><p><b>Directions:</b>   Study the given charts carefully and answer the questions that follow.</p><p><img width=576 height=336 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p17711/image057.png\"><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Day</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The respective ratio between the number of males and females visited</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Monday</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7: 5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tuesday</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6: 7</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Wednesday</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3: 4</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Thursday</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5: 1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Friday</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2: 3</td></tr></table></p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;:</b> &#2342;&#2367;&#2319; &#2327;&#2319; &#2310;&#2352;&#2375;&#2326; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p17711/image057.png\"></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2342;&#2367;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2342;&#2380;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7: 5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6: 7</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3: 4</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2327;&#2369;&#2352;&#2370;&#2357;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5: 1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2: 3</td></tr></table></span>",
    "question": "<span class=\"eqt\"><p>The difference between the total number of males visited on Monday and Tuesday together and that of females visited on Thursday and Friday together is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2324;&#2352; &#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352; &#2325;&#2379; &#2342;&#2380;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2340;&#2341;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2327;&#2369;&#2352;&#2369;&#2357;&#2366;&#2352; &#2324;&#2352; &#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352; &#2325;&#2379; &#2342;&#2380;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;:</p></span>",

      "<span class=\"eqt\">90</span><span class=\"hqt\" style=\"display:none\">90</span>",

    "correct_option_id": 1,
    "solution": "<p>Number of males visited on Monday = 480 * 7/12 = 280</p><p>Number of males visited on Tuesday = 520 * 6/13 = 240</p><p>Number of females visited on Thursday = 540 * 1/6 = 90</p><p>Number of females visited on Friday = 600 * 3/5 = 360</p><p>Required difference = (280 + 240)  -  (360 + 90) = 520  -  450 = 70</p>",
