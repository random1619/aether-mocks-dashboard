<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;">
                    <i class="fas fa-graduation-cap" style="color: var(--primary);"></i> devgagan
                </h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <!-- Standardized Sectional Timer Toggle Widget in Welcome Screen -->
            <div class="settings-container" style="margin-bottom: 32px; padding: 16px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; display: flex; align-items: center; justify-content: space-between;">
                <div class="settings-info" style="text-align: left;">
                    <h3 style="font-size: 1rem; font-weight: 700; color: var(--text-main); margin-bottom: 4px;">10-Min Sectional Timer</h3>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin: 0;">Force a strict 10-minute limit on all test sections</p>
                </div>
                <label class="switch" style="position: relative; display: inline-block; width: 46px; height: 26px;">
                    <input type="checkbox" id="sectionalTimerOverrideToggle">
                    <span class="slider" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border-color); transition: .4s; border-radius: 34px;"></span>
                </label>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">

        <div class="exam-header">

            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>

                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->

                <!-- Controls -->

            <!-- Desktop Navigator Sidebar -->

    </div>
    
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Find the value of (1 + cotA  -  cosecA)(1 + tanA + secA)  -  3(sin<sup>2</sup>A + cos<sup>2</sup>A).</p></span><span class=\"hqt\" style=\"display:none\"><p>(1 + cotA - cosecA)(1 + tanA + secA) - 3(sin<sup>2</sup>A + cos<sup>2</sup>A) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">-1</span><span class=\"hqt\" style=\"display:none\">-1</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">-2</span><span class=\"hqt\" style=\"display:none\">-2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>(1 + cotA  -  cosecA)(1 + tanA + secA)  -  3(sin<sup>2</sup>A + cos<sup>2</sup>A)</p><p>= (1 + tanA + secA + cotA + cotA tanA + cotA secA  -  cosecA  -  cosecA tanA  -  cosecA secA)  -  3*1</p><p>= 1 + tanA + secA + cotA + 1 + cosecA  -  cosecA  -  secA  -  cosecA secA  -  3</p><p>= tanA + cotA  -  cosecA secA  -  1</p><p>= sinA/cosA + cosA/sinA  -  1/sinAcosA  -  1</p><p>= (sin<sup>2</sup>A + cos<sup>2</sup>A)/sinAcosA  -  1/sinAcosA  -  1</p><p>= 1/sinAcosA  -  1/sinAcosA  -  1</p><p>= -1</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If SinA + Sin<sup>2</sup>A=1, then the value of the expression (Cos<sup>2</sup>A + Cos<sup>4</sup>A) is _________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; SinA + Sin<sup>2</sup>A=1, &#2340;&#2379; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; (Cos<sup>2</sup>A + Cos<sup>4</sup>A) &#2325;&#2366; &#2350;&#2366;&#2344;_____&#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3/2</span><span class=\"hqt\" style=\"display:none\">3/2</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>SinA + Sin<sup>2</sup>A=1</p><p>SinA = 1- Sin<sup>2</sup>A</p><p>SinA = Cos<sup>2</sup>A</p><p>Cos<sup>2</sup>A + Cos<sup>4</sup>A</p><p>= Cos<sup>2</sup>A + (Cos<sup>2</sup>A)<sup>2</sup></p><p>= SinA + Sin<sup>2</sup>A</p><p>= 1</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If &#945; + &#946; = 45&deg; and (tan &#945; + 1)(tan &#946; + 1) = 2x, then x is:</p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#945; + &#946; = 45&deg; &#2340;&#2341;&#2366; (tan &#945; + 1)(tan &#946; + 1) = 2x, &#2340;&#2379; x &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">-1</span><span class=\"hqt\" style=\"display:none\">-1</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Expand: (tan &#945; + 1)(tan &#946; + 1) = tan &#945; tan &#946; + tan &#945; + tan &#946; + 1 = 2x.</p><p>Since &#945; + &#946; = 45&deg;, tan(&#945; + &#946;) = tan 45&deg; = 1.</p><p>tan(&#945; + &#946;) = (tan &#945; + tan &#946;)/(1 - tan &#945; tan &#946;) = 1 </p><p>tan &#945; + tan &#946; = 1 - tan &#945; tan &#946;.</p><p>Substitute: (tan &#945; tan &#946; + 1) + (tan &#945; + tan &#946;) = tan &#945; tan &#946; + 1 + (1 - tan &#945; tan &#946;) = 1 + 1 = 2.</p><p>So, 2x = 2 &rarr; x = 1.</p><p>Option (d) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Find the value of 3 sin 15&deg; - 4 sin<sup>3</sup> 15&deg; </p></span><span class=\"hqt\" style=\"display:none\">3 sin 15&deg; - 4 sin<sup>3</sup> 15&deg; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;</span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>",
      "<span class=\"eqt\">1/&radic;2</span><span class=\"hqt\" style=\"display:none\">1/&radic;2</span>",
      "<span class=\"eqt\">&radic;2</span><span class=\"hqt\" style=\"display:none\">&radic;2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let &#952; = 15&deg;.</p><p>=&gt; sin3&#952; = sin(3  X  15&deg;) = sin45&deg;</p><p>=&gt; sin45&deg; = 1/&radic;2</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If cos&#8308;&#952; - sin&#8308;&#952; = 4/5, then find the value of sin4&#952;.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; cos&#8308;&#952; - sin&#8308;&#952; = 4/5, &#2340;&#2379; sin4&#952; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">24/25</span><span class=\"hqt\" style=\"display:none\">24/25</span>",
      "<span class=\"eqt\">21/25</span><span class=\"hqt\" style=\"display:none\">21/25</span>",
      "<span class=\"eqt\">16/25</span><span class=\"hqt\" style=\"display:none\">16/25</span>",
      "<span class=\"eqt\">18/25</span><span class=\"hqt\" style=\"display:none\">18/25</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>cos&#8308;&#952; - sin&#8308;&#952; = 4/5</p><p>(cos&#178;&#952; - sin&#178;&#952;)(cos&#178;&#952; + sin&#178;&#952;) = 4/5</p><p>Since cos&#178;&#952; + sin&#178;&#952; = 1 and cos&#178;&#952; - sin&#178;&#952; = cos 2&#952; </p><p>cos 2&#952; = 4/5 </p><p>sin&#178; 2&#952; = 1 - cos&#178; 2&#952; </p><p>= 1 - (4/5)&#178; </p><p>= 1 - 16/25 </p><p>= 9/25 </p><p>sin 2&#952; = 3/5 </p><p>sin 4&#952; = 2 * sin 2&#952; * cos 2&#952; = 2 * (3/5) * (4/5) </p><p>sin 4&#952; = 24/25</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If tanA + sinA = x, tanA  -  sinA = y, what is the value of x<sup>2</sup>  -  y<sup>2</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; tanA + sinA = x, tanA - sinA = y, &#2340;&#2379; x<sup>2</sup> - y<sup>2</sup> &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2&radic;(x/y)</span><span class=\"hqt\" style=\"display:none\">2&radic;(x/y)</span>",
      "<span class=\"eqt\">4&radic;(x/y)</span><span class=\"hqt\" style=\"display:none\">4&radic;(x/y)</span>",
      "<span class=\"eqt\">&radic;(xy)</span><span class=\"hqt\" style=\"display:none\">&radic;(xy)</span>",
      "<span class=\"eqt\">4&radic;(xy)</span><span class=\"hqt\" style=\"display:none\">4&radic;(xy)</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>x = tanA + sinA -----(1)</p><p>y = tanA  -  sinA -------(2)</p><p>Multiplying eqn(1) and (2)  - </p><p>xy = (tanA + sinA)(tanA  -  sinA)</p><p>xy = tan<sup>2</sup>A  -  sin<sup>2</sup>A</p><p>xy = sin<sup>2</sup>A/cos<sup>2</sup>A  -  sin<sup>2</sup>A*cos<sup>2</sup>A/cos<sup>2</sup>A</p><p>xy = (sin<sup>2</sup>A/cos<sup>2</sup>A)(1  -  cos<sup>2</sup>A)</p><p>xy = tan<sup>2</sup>Asin<sup>2</sup>A</p><p>x<sup>2</sup>  -  y<sup>2</sup> = (x + y)(x  -  y)</p><p>= (tanA + sinA + tanA  -  sinA)( tanA + sinA  -  tanA + sinA)</p><p>= 4tanAsinA</p><p>= 4&radic;(xy)</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Evaluate:</p><p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">3cos<sup>3</sup>&#952; - 2cos&#952;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">sin&#952; - 3sin<sup>3</sup>&#952;</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">3cos<sup>3</sup>&#952; - 2cos&#952;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">sin&#952; - 3sin<sup>3</sup>&#952;</span></div></div></p></span>",
    "options": [
      "<span class=\"eqt\">tan&#952;</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2344;&#952;</span>",
      "<span class=\"eqt\">cot<sup>2</sup>&#952;</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2335;<sup>2</sup>&#952;</span>",
      "<span class=\"eqt\">cot&#952;</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2335;&#952;</span>",
      "<span class=\"eqt\">tan<sup>2</sup>&#952;</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2344;<sup>2</sup>&#952;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Numerator: 3cos&ge;&#952; - 2cos&#952; = cos&#952; (3cos&#178;&#952; - 2) </p><p>Denominator: sin&#952; - 3sin&ge;&#952; = sin&#952; (1 - 3sin&#178;&#952;) </p><p>Fraction = [cos&#952; (3cos&#178;&#952; - 2)] / [sin&#952; (1 - 3sin&#178;&#952;)] </p><p>= cot&#952; [(3cos&#178;&#952; - 2) / (1 - 3sin&#178;&#952;)] </p><p>= cot&#952; [(3(1 - sin&#178;&#952;) - 2) / (1 - 3sin&#178;&#952;)] </p><p>= cot&#952; [(3 - 3sin&#178;&#952; - 2) / (1 - 3sin&#178;&#952;)]</p><p>= cot&#952; [(1 - 3sin&#178;&#952;) / (1 - 3sin&#178;&#952;)]</p><p>= cot&#952; </p><p>Option (c) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;Evaluate the given expression:&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">5</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">1 + cot<sup>2</sup> &#952;</span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">1 + tan<sup>2</sup> &#952;</span></div>&nbsp;+&nbsp;&nbsp;2 cos<sup>2</sup> &#952;&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2325;&#2352;&#2375;&#2306;:<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">5</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">1 + cot<sup>2</sup> &#952;</span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">3</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">1 + tan<sup>2</sup> &#952;</span></div>&nbsp;+&nbsp;&nbsp;2 cos<sup>2</sup> &#952;&nbsp;</div></p></span>",
    "options": [
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>We have the expression as:-</p><p>5/(1+cot<sup>2</sup>&#952;)+3/(1+tan<sup>2</sup>&#952;)+2cos<sup>2</sup>&#952;</p><p>We know that:-</p><p>1+cot<sup>2</sup>&#952; = cosec<sup>2</sup>&#952; , and 1 + tan<sup>2</sup>&#952; = sec<sup>2</sup>&#952;</p><p>So after putting it in equation, we get:-</p><p>5/cosec<sup>2</sup>&#952; +3/sec<sup>2</sup>&#952; +2cos<sup>2</sup>&#952;</p><p>= 5sin<sup>2</sup>&#952; + 3cos<sup>2</sup>&#952; + 2cos<sup>2</sup>&#952;</p><p>=5 (as sin<sup>2</sup>&#952; + cos<sup>2</sup>&#952; =1)</p><p>Option (c) is the correct answer.</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>If sec &#952; + tan &#952; = x, then find sin &#952;.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; sec &#952; + tan &#952; = x, &#2340;&#2379; sin &#952; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">(x<sup>2</sup> + 1)/(1  -  x<sup>2</sup>)</span><span class=\"hqt\" style=\"display:none\">(x<sup>2</sup> + 1)/(1  -  x<sup>2</sup>)</span>",

    "question": "<span class=\"eqt\"><p><div>&nbsp;If cot&#952; = &radic;11, then the value of&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">cosec<sup>2</sup>&#952;  -  sec<sup>2</sup>&#952;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cosec<sup>2</sup>&#952; + sec<sup>2</sup>&#952;</span></div>&nbsp;is&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; cot&#952; = &radic;11, &#2340;&#2379; <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">cosec<sup>2</sup>&#952;  -  sec<sup>2</sup>&#952;</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cosec<sup>2</sup>&#952; + sec<sup>2</sup>&#952;</span></div>&nbsp;</div> &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;</p></span>",

    "question": "<span class=\"eqt\"><p><div>&nbsp;If p =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">sin A</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">1 + cos A</span></div>&nbsp;, then&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">sin A</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">1 - cos A</span></div>&nbsp;is equal to:&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; p =&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">sin A</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">1 + cos A</span></div>&nbsp;, &#2340;&#2379; <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">sin A</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">1 - cos A</span></div>&nbsp; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</div></p></span>",
    "options": [

    "solution": "<p>Start with the given:</p><p>&#8195;&#8195;p = sin A / (1 + cos A).</p><p>Multiply numerator and denominator by (1  -  cos A):</p><p>&#8195;&#8195;p = [sin A (1  -  cos A)] / [(1 + cos A)(1  -  cos A)].</p><p>Use the identity (1 + cos A)(1  -  cos A) = 1 &#8722; cos&#178;A = sin&#178;A:</p><p>&#8195;&#8195;p = [sin A (1  -  cos A)] / sin&#178;A.</p><p>Cancel sin A:</p><p>&#8195;&#8195;p = (1  -  cos A) / sin A.</p><p>Taking reciprocals yields:</p><p>&#8195;&#8195;1/p = sin A / (1  -  cos A).</p><p>Answer: sin A / (1  -  cos A) = 1/p</p><p>Option (a) is the correct answer.</p>",

    "solution": "<p><img width=203 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image131.png\"></p><p><img width=251 height=55 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image132.png\"></p><p><img width=352 height=47 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image133.png\"></p><p><img width=179 height=47 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image134.png\"></p><p><img width=179 height=81 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image135.png\"></p><p><img width=219 height=81 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image136.png\"></p><p><img width=219 height=47 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image137.png\"></p><p><b>We know that: </b>cos 2&#952; = cos<sup>2</sup> &#952;  -  sin<sup>2</sup> &#952; = 2 cos<sup>2</sup> &#952;  -  1</p><p><img width=111 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image138.png\"></p><p><img width=25 height=16 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22215/image139.png\"></p>",

  {
    "question": "<span class=\"eqt\"><p>If m + 5 = sec<sup>2</sup> A cosec<sup>2</sup> A(1  -  cos<sup>2</sup> A)(1  -  sin<sup>2</sup>A) + 5, then find the value of m : </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; m + 5 = sec<sup>2</sup> A cosec<sup>2</sup> A(1 - cos<sup>2</sup> A)(1 - sin<sup>2</sup>A) + 5, &#2340;&#2379; m &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;:</p></span>",

    "solution": "<p>sec&#178;A = 1/cos&#178;A</p><p>cosec&#178;A = 1/sin&#178;A</p><p>1 - cos&#178;A = sin&#178;A</p><p>1 - sin&#178;A = cos&#178;A</p><p>m + 5 = sec&#178;A  X  cosec&#178;A  X  sin&#178;A  X  cos&#178;A + 5</p><p>Substitute sec&#178;A = 1/cos&#178;A and cosec&#178;A = 1/sin&#178;A:</p><p>m + 5 = (1/cos&#178;A)  X  (1/sin&#178;A)  X  sin&#178;A  X  cos&#178;A + 5</p><p>m + 5 = (1  X  cos&#178;A  X  sin&#178;A) / (cos&#178;A  X  sin&#178;A) + 5</p><p>m + 5 = 1 + 5</p><p>m + 5 = 6</p><p>m = 6  -  5 = 1</p>",
