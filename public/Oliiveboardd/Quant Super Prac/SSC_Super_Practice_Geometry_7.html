<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>KLMN is a parallelogram such that &#8736; MKL = X&deg;, &#8736; KML = Y&deg;, and &#8736; KNM = Z&deg;. Find the value of (X + Y + Z).</p></span><span class=\"hqt\" style=\"display:none\"><p>KLMN &#2319;&#2325; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2361;&#2376; &#2332;&#2367;&#2360;&#2360;&#2375; &#8736; MKL = X&deg;, &#8736; KML = Y&deg;, &#2340;&#2341;&#2366; &#8736; KNM = Z&deg;. (X + Y + Z) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;.</p></span>",
    "options": [
      "<span class=\"eqt\">360&deg;</span><span class=\"hqt\" style=\"display:none\">360&deg;</span>",
      "<span class=\"eqt\">90&deg;</span><span class=\"hqt\" style=\"display:none\">90&deg;</span>",
      "<span class=\"eqt\">120&deg;</span><span class=\"hqt\" style=\"display:none\">120&deg;</span>",
      "<span class=\"eqt\">180&deg;</span><span class=\"hqt\" style=\"display:none\">180&deg;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=233 height=138 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22067/image004.png\" ></p><p>We know that opposite angles of parallelogram are equal.</p><p>So, &#8736; KNM = &#8736; KLM = Z&deg;</p><p>Sum of all angles in a triangle = 180&deg;</p><p>So,</p><p>&#8736; LKM + &#8736; KLM + &#8736; LMK = 180&deg;</p><p>X + Y + Z = 180&deg;</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>In the given rectangle, if &#8736; CFO = 55&deg;, and &#8736; COD = 102&deg;, then find the value of &#8736; OCD.</p><p><img width=239 height=125 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22067/image006.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2310;&#2351;&#2340; &#2350;&#2375;&#2306;, &#2351;&#2342;&#2367; &#8736; CFO = 55&deg;, &#2340;&#2341;&#2366; &#8736; COD = 102&deg; &#2361;&#2376;, &#2340;&#2379; &#8736; OCD &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=239 height=125 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22067/image006.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">37&deg;</span><span class=\"hqt\" style=\"display:none\">37&deg;</span>",
      "<span class=\"eqt\">43&deg;</span><span class=\"hqt\" style=\"display:none\">43&deg;</span>",
      "<span class=\"eqt\">42&deg;</span><span class=\"hqt\" style=\"display:none\">42&deg;</span>",
      "<span class=\"eqt\">48&deg;</span><span class=\"hqt\" style=\"display:none\">48&deg;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=239 height=125 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22067/image007.png\"></p><p>CF || DE</p><p>So, &#8736; CFO = &#8736; EDO = 55&deg; [alternate angles]</p><p>Therefore, &#8736; ODC = 90  -  55 = 35&deg;</p><p>Now, in &#916; COD,</p><p>&#8736; OCD = 180  -  (&#8736; ODC + &#8736; COD)</p><p>= 180  -  (35 + 102)</p><p>= 180  -  137</p><p>= 43&deg;</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Two opposite angles of a parallelogram are (6X + 9)&deg; and (49  -  2X)&deg;. Find the value of X.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2375; &#2342;&#2379; &#2360;&#2350;&#2381;&#2350;&#2369;&#2326; &#2325;&#2379;&#2339; (6X + 9)&deg; &#2340;&#2341;&#2366; (49 - 2X)&deg; &#2361;&#2376;&#2306;&#2404; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">10&deg;</span><span class=\"hqt\" style=\"display:none\">10&deg;</span>",
      "<span class=\"eqt\">5&deg;</span><span class=\"hqt\" style=\"display:none\">5&deg;</span>",
      "<span class=\"eqt\">8&deg;</span><span class=\"hqt\" style=\"display:none\">8&deg;</span>",
      "<span class=\"eqt\">12&deg;</span><span class=\"hqt\" style=\"display:none\">12&deg;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>We know that opposite angles of a parallelogram are equal.</p><p>So,</p><p>6X + 9 = 49  -  2X</p><p>8X = 40</p><p>X = 5&deg;</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>KLMN is a rhombus. Find the value of &#8736; KML, if &#8736; KNL = 30&deg;.</p></span><span class=\"hqt\" style=\"display:none\"><p>KLMN &#2319;&#2325; &#2360;&#2350;&#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2361;&#2376;&#2404; &#8736;KML &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;, &#2351;&#2342;&#2367; &#8736;KNL = 30&deg; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">50&deg;</span><span class=\"hqt\" style=\"display:none\">50&deg;</span>",
      "<span class=\"eqt\">30&deg;</span><span class=\"hqt\" style=\"display:none\">30&deg;</span>",
      "<span class=\"eqt\">40&deg;</span><span class=\"hqt\" style=\"display:none\">40&deg;</span>",
      "<span class=\"eqt\">60&deg;</span><span class=\"hqt\" style=\"display:none\">60&deg;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=207 height=179 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22067/image011.png\"></p><p>Diagonals of rhombus are angle bisectors.</p><p>So, &#8736; LNM = &#8736; KNL = 30&deg;</p><p>And &#8736; N = 30 + 30 = 60&deg;</p><p>NM || KL,</p><p>So, &#8736; N + &#8736; M = 180</p><p>&#8736; M = 120&deg;</p><p>Therefore,</p><p>&#8736; KML = 120/2 = 60&deg;</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>MNOP is a trapezium such that PO || MN, &#8736; PMN = 80&deg; and PM = ON. Find the measure of &#8736; ONM.</p></span><span class=\"hqt\" style=\"display:none\"><p>MNOP &#2319;&#2325; &#2360;&#2350;&#2354;&#2350;&#2381;&#2348; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; PO || MN, &#8736; PMN = 80&deg; &#2340;&#2341;&#2366; PM = ON &#2361;&#2376;&#2404; &#8736; ONM &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">40&deg;</span><span class=\"hqt\" style=\"display:none\">40&deg;</span>",
      "<span class=\"eqt\">100&deg;</span><span class=\"hqt\" style=\"display:none\">100&deg;</span>",
      "<span class=\"eqt\">80&deg;</span><span class=\"hqt\" style=\"display:none\">80&deg;</span>",
      "<span class=\"eqt\">60&deg;</span><span class=\"hqt\" style=\"display:none\">60&deg;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=249 height=169 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22067/image013.png\"></p><p>Given, PM = ON, therefore trapezium MNOP is an isosceles trapezium.</p><p>Therefore, &#8736; ONM = &#8736; PMN = 80&deg;</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>PQRS is a rectangle. If &#8736; SPX = 40&deg; and &#8736; XZQ = 132&deg;, then find the measure of &#8736; PXZ.</p><p><img width=313 height=165 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22067/image014.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>PQRS &#2319;&#2325; &#2310;&#2351;&#2340; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736; SPX = 40&deg; &#2340;&#2341;&#2366; &#8736; XZQ = 132&deg; &#2361;&#2376;, &#2340;&#2379; &#8736; PXZ &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=313 height=165 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22067/image014.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">86&deg;</span><span class=\"hqt\" style=\"display:none\">86&deg;</span>",
      "<span class=\"eqt\">82&deg;</span><span class=\"hqt\" style=\"display:none\">82&deg;</span>",
      "<span class=\"eqt\">84&deg;</span><span class=\"hqt\" style=\"display:none\">84&deg;</span>",
      "<span class=\"eqt\">78&deg;</span><span class=\"hqt\" style=\"display:none\">78&deg;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=313 height=165 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22067/image014.png\"></p><p>&#8736; XPZ = 90 - &#8736; SPX = 90  -  40 = 50&deg;</p><p>&#8736; XZP = 180 - &#8736; XZQ = 180  -  132 = 48&deg;</p><p>In &#916; XPZ,</p><p>&#8736; PXZ = 180  -  (&#8736; XPZ + &#8736; XZP)</p><p>= 180  -  (50 + 48)</p><p>= 180  -  98</p><p>= 82&deg;</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In a parallelogram ABCD, AB = 5a, BC = 8&radic;3a, and &#8736;ABC = 30&deg;. Find the measure of diagonal AC.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; ABCD &#2350;&#2375;&#2306;, AB = 5a, BC = 8&radic;3a, &#2340;&#2341;&#2366; &#8736;ABC = 30&deg; &#2361;&#2376;&#2404; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; AC &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">8&radic;11a</span><span class=\"hqt\" style=\"display:none\">8&radic;11a</span>",
      "<span class=\"eqt\">&radic;97a</span><span class=\"hqt\" style=\"display:none\">&radic;97a</span>",
      "<span class=\"eqt\">9&radic;5a</span><span class=\"hqt\" style=\"display:none\">9&radic;5a</span>",
      "<span class=\"eqt\">&radic;119a</span><span class=\"hqt\" style=\"display:none\">&radic;119a</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=308 height=181 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24618/image013.jpg\"></p><p>In &#8710;ABE,</p><p>cos30&deg; = BE/5a =&gt; BE = 5a*&radic;3/2</p><p>sin30&deg; = AE/5a =&gt; AE = 5a/2</p><p>CE = 8&radic;3a - 5a*&radic;3/2 = 11&radic;3a/2</p><p>In &#8710;AEC,</p><p>AC<sup>2</sup> = AE<sup>2</sup> + CE<sup>2</sup></p><p>AC<sup>2</sup> = (5a/2)<sup>2</sup> + (11&radic;3a/2)<sup>2</sup></p><p>AC<sup>2</sup> = 25a<sup>2</sup>/4 + 363a<sup>2</sup>/4</p><p>AC<sup>2</sup> = 97a<sup>2</sup></p><p>AC = &radic;97a</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If the ratio of measure of the four internal angles of a quadrilateral are 3: 2: 4: 3, then the value of largest angle of the quadrilateral is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2346; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3: 2: 4: 3 &#2361;&#2376;, &#2340;&#2379; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2375; &#2325;&#2379;&#2339; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">155&deg;</span><span class=\"hqt\" style=\"display:none\">155&deg;</span>",
      "<span class=\"eqt\">160&deg;</span><span class=\"hqt\" style=\"display:none\">160&deg;</span>",
      "<span class=\"eqt\">145&deg;</span><span class=\"hqt\" style=\"display:none\">145&deg;</span>",
      "<span class=\"eqt\">120&deg;</span><span class=\"hqt\" style=\"display:none\">120&deg;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>We know that:</b> Sum of the internal angles of a quadrilateral is 360&deg;.</p><p>3x + 2x + 4x + 3x = 360&deg;</p><p>12x = 360&deg;</p><p>x = 30&deg;</p><p>So, largest angle of the quadrilateral = 4*30&deg; = 120&deg;</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The diagonals of a cyclic quadrilateral ABCD intersect at P and the area of the triangle APB is 63 cm<sup>2</sup>. If AB = 12 cm and CD = 8 cm, then find the area of &#8710;CPD.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2330;&#2325;&#2381;&#2352;&#2368;&#2351; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; ABCD &#2325;&#2375; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; P &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; APB &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 63 &#2360;&#2375;&#2350;&#2368; 2 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; AB = 12 &#2360;&#2375;&#2350;&#2368; &#2340;&#2341;&#2366; CD = 8 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#8710;CPD &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">32 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">32 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">24 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">24 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">36 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">36 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">28 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">28 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=184 height=161 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26815/image017.png\"></p><p>In &#8710;APB and &#8710;PDC</p><p>&#8736;APB = &#8736;DPC [Vertically opposite angle]</p><p>&#8736;BAP = &#8736;PDC [Angle subtended by chord BC at any point on the circle is same]</p><p>&#8710;APB ~ &#8710;PDC</p><p>Area of &#8710;APB/ Area of &#8710;PDC = (AB/CD)<sup>2</sup></p><p>63/Area of &#8710;PDC = (12 * 12/ 8 * 8)</p><p>Area of &#8710;PDC = 28 cm<sup>2</sup></p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>In the following figure, WXYZ is a rectangle. Find the measure of &#8736; MNY.</p><p><img width=312 height=177 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16833/image002.jpg\" ></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; WXYZ &#2319;&#2325; &#2310;&#2351;&#2340; &#2361;&#2376;&#2404; &#8736; MNY &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"312\" height=\"177\" id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16833/image002.jpg\"></p></span>",

    "question": "<span class=\"eqt\"><p>In a trapezium PQRS, PQ II SR and SR = 18.6 cm. If PQ &gt; SR and the length of the line segment joining the mid-points of its diagonals is 4.8 cm, then find the value of PQ.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2354;&#2306;&#2348; PQRS &#2350;&#2375;&#2306;, PQ II SR &#2324;&#2352; SR = 18.6 cm &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; PQ &gt; SR &#2361;&#2376; &#2340;&#2341;&#2366; &#2311;&#2360;&#2325;&#2375; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339;&#2379;&#2306; &#2325;&#2375; &#2350;&#2343;&#2381;&#2351;-&#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2325;&#2379; &#2350;&#2367;&#2354;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2352;&#2375;&#2326;&#2366;&#2326;&#2306;&#2337; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 4.8 cm &#2361;&#2376;, &#2340;&#2379; PQ &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>The side of a rhombus is 2&radic;7 cm and length of one diagonal is 4&radic;3 cm. The area of the rhombus will be:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; 2&radic;7 cm &#2324;&#2352; &#2319;&#2325; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 4&radic;3 cm &#2361;&#2376;&#2404; &#2360;&#2350;&#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2361;&#2379;&#2327;&#2366; :</p></span>",

      "<span class=\"eqt\">16&radic;3 sq. cm</span><span class=\"hqt\" style=\"display:none\">16&radic;3 sq. cm</span>",
      "<span class=\"eqt\">8 sq. cm</span><span class=\"hqt\" style=\"display:none\">8 sq. cm</span>"

    "correct_option_id": 2,
    "solution": "<p>Side of rhombus = 2&radic;7 cm</p><p>Half-length of one diagonal = 2&radic;3 cm</p><p>Half-length of second diagonal = &radic; [(2&radic;7)<sup>2</sup>  -  (2&radic;3)<sup>2</sup>]</p><p>= &radic; (28  -  12) = 4 cm</p><p>Length of second diagonal = 8 cm</p><p>Area of rhombus = (1/2) * product of diagonals</p><p>= (1/2) * (4&radic;3) * 8 = 16&radic;3 sq. cm</p>",

  },
  {
    "question": "<span class=\"eqt\"><p> In a parallelogram, two sides are of length 5 cm and 10 cm respectively while the ratio of two diagonals of the parallelogram is 1 : 3, then what is the difference between the length of both the diagonals of the parallelogram? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2350;&#2375;&#2306;, &#2342;&#2379; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 5 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 10 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2375; &#2342;&#2379; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 1 : 3 &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339;&#2379;&#2306; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">9 cm</span><span class=\"hqt\" style=\"display:none\">9 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">8 cm</span><span class=\"hqt\" style=\"display:none\">8 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">12 cm</span><span class=\"hqt\" style=\"display:none\">12 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">10 cm</span><span class=\"hqt\" style=\"display:none\">10 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=404 height=235 id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er221028st2npm8-006.jpg\"></p><p>Let the length of sides of parallelogram be a and b respectively and length of diagonals of the parallelogram is e and f respectively.</p><p>Suppose e = x and f = 3x</p><p>According to Euler's quadrilateral theorem:</p><p>a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup> + d<sup>2</sup> = e<sup>2</sup> + f<sup>2</sup><img width=14 height=18 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er221028st2npm8-007.png\"></p><p>2 * 25 + 2 * 100 = x<sup>2</sup> + (3x)<sup>2</sup></p><p>250 = 10x<sup>2</sup></p><p>5 = x</p><p>Required Difference: 3x  -  x = 2x = 2 * 5 = 10 cm</p><p></p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>In a polygon, 5 interior angle each of 172&deg; and remaining all are 160&#2276;&deg;. Find the number of sides:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; 172&deg; &#2325;&#2375; 5 &#2309;&#2306;&#2340;: &#2325;&#2379;&#2339; &#2361;&#2376; &#2324;&#2352; &#2358;&#2375;&#2359; &#2360;&#2349;&#2368; 160&#2276;&deg; &#2361;&#2376;| &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>",
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Interior angle + Exterior angle = 180&deg;</p> <p>172&deg; + Exterior angle = 180&deg;</p> <p>Exterior angle = 180&deg; - 172&deg; = 8&deg;</p> <p>Same as, Exterior angle = 180&deg; - 160&deg; = 20&deg;</p> <p>Now,</p> <p>When, interior angle 172&deg;, exterior angle 8&#1476;&deg; (5 of them)</p> <p>When, interior angle 160&deg;, exterior angle 20&deg; (let 'n' of them)</p> <p>Total exterior angle be 360&deg;</p> <p>Therefore, 8&deg; * 5 + 20&deg; * n = 360&deg;</p> <p>n = 16</p> <p>Therefore, number of sides = 16 + 5 = 21</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of the number of sides of two regular polygons is 5: 3 and the ratio of their each interior angles is 39: 35. The number of sides of these polygon (respectively) is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2350; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332;&#2379;&#2306; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 5:3 &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2306;&#2340;&#2307; &#2325;&#2379;&#2339;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 39:35 &#2361;&#2376;&#2404; &#2311;&#2344; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332;&#2379;&#2306; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; (&#2325;&#2381;&#2352;&#2350;&#2358;&#2307;) &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">10, 6</span><span class=\"hqt\" style=\"display:none\">10, 6</span>",
      "<span class=\"eqt\">15, 9</span><span class=\"hqt\" style=\"display:none\">15, 9</span>",
      "<span class=\"eqt\">20, 12</span><span class=\"hqt\" style=\"display:none\">20, 12</span>",
      "<span class=\"eqt\">5, 3</span><span class=\"hqt\" style=\"display:none\">5, 3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>If n be the no. of sides of the polygon then</p><p>Each interior angle = (n - 2) * 180/ n</p><p>Let number of sides in one polygon = 5x</p><p>And number of sides in other polygon = 3x</p><p>According to question,</p><p>[(180* (5x  -  2)/5x)]/ [180* (3x  -  2)/3x] = 39/35</p><p>35x  -  14 = 39x  -  26</p><p>4x = 12</p><p>x = 3</p><p>So, number of sides in one polygon = 5x = 5* 3 = 15</p><p>And number of sides in other polygon = 3x = 3* 3 = 9</p>",
    "question_index": 14
  },

    "question": "<span class=\"eqt\"><p>If one of the interior angles of a regular polygon is 20&deg; less than one of the interior angles of a regular nonagon, then find the number of diagonals of the polygon.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2350; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2375; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2325;&#2379;&#2339;, &#2319;&#2325; &#2360;&#2350; &#2344;&#2357;&#2349;&#2369;&#2332; &#2325;&#2375; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2325;&#2379;&#2339; &#2360;&#2375; 20&deg; &#2325;&#2350; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2375; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Interior angle of a nonagon = (9  -  2) * 180/9 = 140&deg;</p><p>So, interior angle of regular polygon = 140  -  20 = 120&deg;</p><p>Exterior angle of regular polygon = 180  -  120 = 60&deg;</p><p>Number of sides of regular polygon = 360/60 = 6</p><p>Number of diagonals = 6 * (6  -  3)/2 = 9</p>",

  {
    "question": "<span class=\"eqt\"><p>Ratio of one internal angle of a regular polygon to the one external angle of the same polygon is 3 : 1, then find the number of sides in the regular polygon.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2375; &#2319;&#2325; &#2310;&#2340;&#2306;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339; &#2324;&#2352; &#2360;&#2350;&#2366;&#2344; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2375; &#2319;&#2325; &#2348;&#2366;&#2361;&#2381;&#2351; &#2325;&#2379;&#2339; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3 : 1 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2350;&#2375;&#2306; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",

    "solution": "<p>Sum of one interior angle and one external angle = 180&deg;</p><p>According to the question,</p><p>(3 + 1) = 4 units = 180&deg;</p><p>1 unit = 45&deg;</p><p>We know that,</p><p>each external angle = 360/n</p><p>45 = 360/n</p><p>n = 8</p>",

  {
    "question": "<span class=\"eqt\"><p>A regular pentagon has 75 cm<sup>2</sup> area. If the length of a side of pentagon is 5 cm, find the apothem.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350; &#2346;&#2306;&#2330;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 75 cm<sup>2</sup> &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2306;&#2330;&#2349;&#2369;&#2332; &#2325;&#2368; &#2319;&#2325; &#2349;&#2369;&#2332;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 5 cm &#2361;&#2376;, &#2340;&#2379; &#2319;&#2346;&#2379;&#2341;&#2375;&#2350; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
