    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>AB and AC are two tangents to the circle. BD is the diameter of the circle which is produced to meet C and E is the point on the circle where AC touches the circle. If EC = 35 cm and BD = 24 cm then find the length of AE.</p></span><span class=\"hqt\" style=\"display:none\"><p>AB &#2324;&#2352; AC &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2342;&#2379; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;&#2404; BD &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2361;&#2376; &#2332;&#2379; C &#2360;&#2375; &#2350;&#2367;&#2354;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2338;&#2364;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; E &#2357;&#2371;&#2340;&#2381;&#2340; &#2346;&#2352; &#2357;&#2361; &#2348;&#2367;&#2306;&#2342;&#2369; &#2361;&#2376; &#2332;&#2361;&#2366;&#2305; AC &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2379; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; EC = 35 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; BD = 24 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2340;&#2379; AE &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">12.4 cm</span><span class=\"hqt\" style=\"display:none\">12.4 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">16.8 cm</span><span class=\"hqt\" style=\"display:none\">16.8 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">17.1 cm</span><span class=\"hqt\" style=\"display:none\">17.1 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">8.7 cm</span><span class=\"hqt\" style=\"display:none\">8.7 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=243 height=202 id=\"Picture 11\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21879/image010.jpg\"></p><p>In &#8710;EOC-</p><p>OC<sup>2</sup> = OE<sup>2</sup> + EC<sup>2</sup></p><p>OC<sup>2</sup> = 12<sup>2</sup> + 35<sup>2</sup></p><p>OC = 37 cm</p><p>BC = 37 + 12 = 49</p><p>Let AB = AE = 'a' cm</p><p>In &#8710;ABC-</p><p>AC<sup>2</sup> = AB<sup>2</sup> + BC<sup>2</sup></p><p>(a + 35)<sup>2</sup> = a<sup>2</sup> + 49<sup>2</sup></p><p>a<sup>2</sup> + 1225 + 70a = a<sup>2</sup> + 2401</p><p>a = 16.8 cm</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Find the length of the common chord of two circles having radii equal to 60 cm and 50 cm whose centres are 50 cm apart.</p></span><span class=\"hqt\" style=\"display:none\"><p>60 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 50 &#2360;&#2375;&#2350;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2313;&#2349;&#2351;&#2344;&#2367;&#2359;&#2381;&#2336; &#2332;&#2368;&#2357;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2344;&#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2375; 50 &#2360;&#2375;&#2350;&#2368; &#2342;&#2370;&#2352; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">45 cm</span><span class=\"hqt\" style=\"display:none\">45 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">86 cm</span><span class=\"hqt\" style=\"display:none\">86 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">96 cm</span><span class=\"hqt\" style=\"display:none\">96 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">54 cm</span><span class=\"hqt\" style=\"display:none\">54 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=390 height=247 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23270/image004.jpg\" ></p><p>Let 'O' and 'P' be the centres of the circle having radii equal to 60 cm and 50 cm, respectively</p><p>Therefore, OP is the line joining the centres of the two circle</p><p>According to the question,</p><p>OP = 50 cm</p><p>Let length of OA be 'x' cm.</p><p>Therefore, AP = (50 - x) cm</p><p>From &#916;MOA, using Pythagoras theorem</p><p>MA<sup>2</sup> = (60<sup>2</sup> - x<sup>2</sup>)</p><p>In &#916;MPA</p><p>MA<sup>2 </sup>= 50<sup>2</sup> - (50 - x)<sup>2</sup></p><p>Therefore, MA<sup>2</sup> = (60<sup>2</sup> - x<sup>2</sup>) = 50<sup>2</sup> - (50 - x)<sup>2</sup></p><p>Or, 3600 - x<sup>2</sup> = 2500 - 2500 - x<sup>2</sup> + 100x</p><p>Or, 3600 = 100x</p><p>So, 'x' = 36</p><p>So, MA<sup>2</sup> = 60<sup>2</sup> - 36<sup>2</sup></p><p>Or, MA<sup>2</sup> = 3600 - 1296</p><p>Or, MA<sup>2</sup> = 2304</p><p>So, MA = 48 (Since, length cannot be negative therefore, we will take the positive root only)</p><p>So, MN = 2 X MA = 2 X 48 = 96 cm</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In the given figure, O is the centre of two concentric circles and OQ = 17 cm, PQ = 30 cm and QR = 9 cm, then what will be the approximate length of XY?</p><p><img width=270 height=242 id=\"Picture 42\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p6560/image012.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, &#2342;&#2379; &#2360;&#2306;&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2361;&#2376; &#2324;&#2352; OQ = 17 &#2360;&#2375;&#2350;&#2368;, PQ = 30 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; QR = 9 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; XY &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2379;&#2327;&#2368;?</p><p><img width=\"270\" height=\"242\" id=\"Picture 42\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p6560/image012.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">40.5 cm</span><span class=\"hqt\" style=\"display:none\">40.5 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">27.5 cm</span><span class=\"hqt\" style=\"display:none\">27.5 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">23.5 cm</span><span class=\"hqt\" style=\"display:none\">23.5 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">43.5 cm</span><span class=\"hqt\" style=\"display:none\">43.5 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Given that,</p><p>SQ = 30/2 = 15 cm</p><p>OS = (OQ<sup>2</sup>  -  SQ<sup>2</sup>)<sup>1/2</sup> = (17<sup>2</sup>  -  15<sup>2</sup>)<sup>1/2</sup> = 8 cm</p><p>SR = SQ  -  QR = 15  -  9 = 6 cm</p><p>OR = (OS<sup>2</sup> + SR<sup>2</sup>)<sup>1/2</sup> = (64 + 36)<sup>1/2</sup> = 10 cm</p><p>OR = OZ = 10 cm</p><p>OQ = OX = OY = 17 cm</p><p>XZ = YZ = (OX<sup>2</sup>  -  OZ<sup>2</sup>)<sup>1/2</sup> = (17<sup>2</sup> - 10<sup>2</sup>)<sup>1/2</sup> = 13.75cm (approx.)</p><p>So, the value of XY = XZ + YZ = 13.75 + 13.75 = 27.5 cm</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The radius of two identical circles are 9 cm and 6 cm. The distance between their centers is 18 cm. If the length of direct common tangent is X and length of direct transverse tangent is Y. Then the value of (X/Y)<sup>2</sup> is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2350;&#2366;&#2344; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2319;&#2305; 9 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 6 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2306;&#2404; &#2313;&#2344;&#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 18 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2368;&#2343;&#2368; &#2313;&#2349;&#2351;&#2344;&#2367;&#2359;&#2381;&#2336; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; X &#2361;&#2376; &#2340;&#2341;&#2366; &#2360;&#2368;&#2343;&#2368; &#2309;&#2344;&#2369;&#2346;&#2381;&#2352;&#2360;&#2381;&#2341; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; Y &#2361;&#2376;, &#2340;&#2379; (X/Y)<sup>2</sup> &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">35/11</span><span class=\"hqt\" style=\"display:none\">35/11</span>",
      "<span class=\"eqt\">13/9</span><span class=\"hqt\" style=\"display:none\">13/9</span>",
      "<span class=\"eqt\">7/8</span><span class=\"hqt\" style=\"display:none\">7/8</span>",
      "<span class=\"eqt\">32/7</span><span class=\"hqt\" style=\"display:none\">32/7</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Given radius (R) = 9 cm and radius (r) = 6 cm</p><p>Distance between their centers (D) = 18 cm</p><p>Length of direct common tangent (X) =<img width=218 height=27 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p14625/image005.png\"> </p><p>Length of direct transverse tangent (Y) =<img width=225 height=27 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p14625/image006.png\"> </p><p>The value of (X/Y)<sup>2</sup> = 315/99 = 35/11.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The radius of two circles with centres X and Y are 12 cm and 6 cm, respectively. If a transverse common tangent MN to both the circles which cuts the line joining the both centres X and Y at point O such that MO = 16 cm, then what is the distance between both centres of the circles if M is point on bigger circle and N is point on smaller circle?</p></span><span class=\"hqt\" style=\"display:none\"><p>X &#2324;&#2352; Y &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2319;&#2305; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 12 cm &#2324;&#2352; 6 cm &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2309;&#2344;&#2369;&#2346;&#2381;&#2352;&#2360;&#2381;&#2341; &#2313;&#2349;&#2351;&#2344;&#2367;&#2359;&#2381;&#2336; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366; MN &#2361;&#2376; &#2332;&#2379; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2379;&#2306; X &#2324;&#2352; Y &#2325;&#2379; &#2350;&#2367;&#2354;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2352;&#2375;&#2326;&#2366; &#2325;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; O &#2346;&#2352; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366;&#2335;&#2340;&#2368; &#2361;&#2376; &#2325;&#2367; MO = 16 cm &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; M &#2348;&#2337;&#2364;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2346;&#2352; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2361;&#2376; &#2340;&#2341;&#2366; N &#2331;&#2379;&#2335;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2346;&#2352; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">30 cm</span><span class=\"hqt\" style=\"display:none\">30 cm</span>",
      "<span class=\"eqt\">10 cm</span><span class=\"hqt\" style=\"display:none\">10 cm</span>",
      "<span class=\"eqt\">20 cm</span><span class=\"hqt\" style=\"display:none\">20 cm</span>",
      "<span class=\"eqt\">40 cm</span><span class=\"hqt\" style=\"display:none\">40 cm</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=345 height=157 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18763/image013.jpg\"></p><p>MO = 16 cm</p><p>Since &#8736;XMO = &#8736;ONY = 90&deg; </p><p>By Pythagoras theorem, </p><p>XO<sup>2</sup> = XM<sup>2</sup> + MO<sup>2</sup></p><p>=&gt; XO<sup>2</sup> = 12<sup>2</sup> + 16<sup>2</sup></p><p>=&gt; XO<sup>2</sup> = 144 + 256 = 400</p><p>=&gt; XO = 20 cm</p><p>Since &#8736;XMO = &#8736;ONY = 90&deg;</p><p>And &#8736;MOX = &#8736;YON (transverse angle)</p><p>So, &#8736;MXO = &#8736;OYN</p><p>Hence, &#8710;XMO and &#8710;OYN are similar triangles. </p><p>XM/YN = XO/YO</p><p>=&gt; 12/6 = 20/YO</p><p>=&gt; YO = 20/2 = 10 cm</p><p>Hence, XY = XO + OY = 20 + 10 = 30 cm</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>X and Y are centres of two touching circles at point A and MN is a common tangent to both the circles. If another common tangent drawn from point A which intersects tangent MN at point B, and length of AB is 18.9 cm, then what is the length of MN?</p></span><span class=\"hqt\" style=\"display:none\"><p>X &#2324;&#2352; Y &#2348;&#2367;&#2306;&#2342;&#2369; A &#2346;&#2352; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2361;&#2376;&#2306; &#2324;&#2352; MN &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2360;&#2366;&#2352;&#2381;&#2357; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2348;&#2367;&#2306;&#2342;&#2369; A &#2360;&#2375; &#2319;&#2325; &#2309;&#2344;&#2381;&#2351; &#2360;&#2366;&#2352;&#2381;&#2357; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366; &#2326;&#2368;&#2306;&#2330;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2332;&#2379; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366; MN &#2325;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; B &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; AB &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 18.9 cm &#2361;&#2376;, &#2340;&#2379; MN &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">32.4 cm</span><span class=\"hqt\" style=\"display:none\">32.4 cm</span>",
      "<span class=\"eqt\">37.8 cm</span><span class=\"hqt\" style=\"display:none\">37.8 cm</span>",
      "<span class=\"eqt\">35.5 cm</span><span class=\"hqt\" style=\"display:none\">35.5 cm</span>",
      "<span class=\"eqt\">31.2 cm</span><span class=\"hqt\" style=\"display:none\">31.2 cm</span>"

    "correct_option_id": 1,
    "solution": "<p><img width=280 height=235 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19361/image002.jpg\"></p><p>Since, two tangents from same point are always equal.</p><p>Thus, MB = BA = 18.9 cm, and AB = BN = 18.9 cm</p><p>Hence, MN = MB + BN = 18.9 + 18.9 = 37.8 cm</p>",
    "question_index": 5

    "question": "<span class=\"eqt\"><p>The radius of a circle with center O, is 9 cm. From an external point P, PA and PB are two tangents at A and B are drawn. Find the value of (PA  -  OA), if the perimeter of quadrilateral PAOB is 40 cm.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 9 cm &#2361;&#2376;&#2404; &#2319;&#2325; &#2348;&#2366;&#2361;&#2381;&#2351; &#2348;&#2367;&#2306;&#2342;&#2369; P &#2360;&#2375;, PA &#2324;&#2352; PB &#2342;&#2379; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306; &#2332;&#2379; A &#2324;&#2352; B &#2346;&#2352; &#2326;&#2368;&#2306;&#2330;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; PAOB &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; 40 cm &#2361;&#2376;, &#2340;&#2379; (PA - OA) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">3 cm</span><span class=\"hqt\" style=\"display:none\">3 cm</span>",
      "<span class=\"eqt\">4 cm</span><span class=\"hqt\" style=\"display:none\">4 cm</span>",
      "<span class=\"eqt\">2 cm</span><span class=\"hqt\" style=\"display:none\">2 cm</span>",
      "<span class=\"eqt\">1 cm</span><span class=\"hqt\" style=\"display:none\">1 cm</span>"

    "correct_option_id": 2,
    "solution": "<p>Radius of circle = 9 cm</p><p>Therefore, OA = OB = 9 cm</p><p>From point P, PA and PB are two tangents at A and B are drawn, therefore PA = PB = Y (Let)</p><p>Perimeter of quadrilateral = 40 cm</p><p>PA + AO + OB + PB = 40</p><p>Y + 9 + 9 + Y = 40</p><p>2Y = 22</p><p>Y = 11</p><p>Therefore, the value of (PA  -  OA) = 11  -  9 = 2 cm.</p>",
    "question_index": 6
  },

    "question": "<span class=\"eqt\"><p>A tangent XY touches a circle at A. Two chords are drawn from A to B and C such that BC = BA. If angle made by chord AB with tangent XY is 75&#8304; respectively, and D is a point on minor arc of BC, then find &#8736;BDC.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2379; A &#2346;&#2352; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; A &#2360;&#2375; B &#2324;&#2352; A &#2360;&#2375; C &#2340;&#2325; &#2342;&#2379; &#2332;&#2368;&#2357;&#2366;&#2319;&#2305; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2326;&#2368;&#2306;&#2330;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2306; &#2325;&#2367; BC = BA &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2332;&#2368;&#2357;&#2366; AB &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366; XY &#2325;&#2375; &#2360;&#2366;&#2341; &#2309;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2379;&#2339; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 75&#8304; &#2361;&#2376; &#2324;&#2352; D, &#2354;&#2328;&#2369; &#2330;&#2366;&#2346; &#2346;&#2352; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2361;&#2376;, &#2340;&#2379; &#8736;BDC &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">110&#8304;</span><span class=\"hqt\" style=\"display:none\">110&#8304;</span>",
      "<span class=\"eqt\">105&#8304;</span><span class=\"hqt\" style=\"display:none\">105&#8304;</span>",
      "<span class=\"eqt\">120&#8304;</span><span class=\"hqt\" style=\"display:none\">120&#8304;</span>",

    "correct_option_id": 1,
    "solution": "<p>XY is the tangent that touches the circle at A.</p><p><img width=201 height=191 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p13980/image004.jpg\"></p><p>&#8736;YAB = &#8736;ACB = 75&#8304; (property of circle)</p><p>Since, BC = BA;</p><p>&#8736;ACB = &#8736;CAB = 75&#8304;</p><p>Hence, &#8736;CAB + &#8736;BDC = 180&#8304; (sum of angles on opposite arcs)</p><p>&#8736;BDC = 180&#8304; - 75&#8304; = 105&#8304;</p>",
    "question_index": 7
  },

    "question": "<span class=\"eqt\"><p>A circle is inscribed in a quadrilateral STUV. If the length of sides ST, TU, and UV are 21.4 cm, 18.6 cm, and 24.8 cm, respectively, then what is the length of the side VS?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; STUV &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; ST, TU &#2324;&#2352; UV &#2349;&#2369;&#2332;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 21.4 &#2360;&#2375;&#2350;&#2368;, 18.6 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 24.8 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; VS &#2349;&#2369;&#2332;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "solution": "<p><img width=213 height=181 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12283/image021.jpg\"></p><p>We know that,</p><p>When a circle touches all the four sides of a quadrilateral STUV, then</p><p>ST + UV = TU + VS</p><p>=&gt; (21.4 + 24.8) = (18.6 + VS)</p><p>=&gt; VS = 46.2  -  18.6</p><p>=&gt; VS = 27.6 cm</p>",

    "question": "<span class=\"eqt\"><p>In following diagram length of chords PQ and RS are 10cm and 8cm respectively and total length of MN is 9cm which passes through centre C of the given circle. What is the radius of the circle?</p><p><img width=186 height=166 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19481/image006.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2352;&#2375;&#2326; &#2350;&#2375;&#2306; &#2332;&#2368;&#2357;&#2366; PQ &#2324;&#2352; RS &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 10cm &#2324;&#2352; 8cm &#2361;&#2376; &#2324;&#2352; MN &#2325;&#2368; &#2325;&#2369;&#2354; &#2354;&#2306;&#2348;&#2366;&#2312; 9cm &#2361;&#2376; &#2324;&#2352; MN, &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; C &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2327;&#2369;&#2332;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p><p><img width=\"186\" height=\"166\" id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19481/image006.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">&radic;41 cm</span><span class=\"hqt\" style=\"display:none\">&radic;41 cm</span>",
      "<span class=\"eqt\">&radic;51 cm</span><span class=\"hqt\" style=\"display:none\">&radic;51 cm</span>",
      "<span class=\"eqt\">&radic;31 cm</span><span class=\"hqt\" style=\"display:none\">&radic;31 cm</span>",
      "<span class=\"eqt\">&radic;47 cm</span><span class=\"hqt\" style=\"display:none\">&radic;47 cm</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let r be the radius of circle and length of CM = x cm.</p><p><img width=151 height=135 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19481/image007.jpg\"></p><p>Length of CN = (9-x) cm. Perpendicular to any chord from the centre of</p><p>circle bisect it.</p><p>(r)<sup>2</sup> = (x)<sup>2</sup> + (4)<sup>2</sup></p><p>(r)<sup>2</sup>= (x)<sup>2</sup> + 16 ----------(1)</p><p>Similarly</p><p>(r)<sup>2</sup>= (9 - x)<sup> 2</sup> + (5)<sup> 2</sup></p><p>(r)<sup> 2 </sup>= (9  -  x)<sup> 2</sup> + 25 ----------(2)</p><p>From equations (1) and (2) we get</p><p>(x)<sup>2</sup>+ 16 = (9 - x)<sup> 2 </sup>+ 25</p><p>x&#178; = 81-18x +x&#178; + 9</p><p>18x = 90</p><p>x = 5 cm</p><p>r<sup>2</sup> = 25 + 16 = 41</p><p>r= &radic;41 cm</p>",
    "question_index": 9
  },
  {
    "question": "<span class=\"eqt\"><p>Find the length of chord MP if MQ is diameter of length 16 cm and &#8736;MNO = 45&deg;.</p><p><img width=260 height=172 id=\"Picture 51\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3466/image010.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; MQ &#2357;&#2381;&#2351;&#2366;&#2360; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 16 cm &#2361;&#2376; &#2324;&#2352; &#8736;MNO = 45<sup>0</sup> &#2361;&#2376;, &#2340;&#2379; &#2332;&#2368;&#2357;&#2366; MP &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"260\" height=\"172\" id=\"Picture 51\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3466/image010.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">8&radic;2 cm</span><span class=\"hqt\" style=\"display:none\">8&radic;2 cm</span>",
      "<span class=\"eqt\">8 cm</span><span class=\"hqt\" style=\"display:none\">8 cm</span>",
      "<span class=\"eqt\">9&radic;2 cm</span><span class=\"hqt\" style=\"display:none\">9&radic;2 cm</span>",
      "<span class=\"eqt\">9 cm</span><span class=\"hqt\" style=\"display:none\">9 cm</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#8736;MPQ = 90&deg; (MQ is the diameter and any triangle inscribed in a semicircle is always a right angle.)</p><p>&#8736;PQO + &#8736;PNO = 180&deg;(PNOQ is a cyclic quadrilateral.)</p><p>&#8736;PQO = 180&deg;  -  45&deg; = 135&deg;</p><p>&#8736;PQM = 180&deg;  -  135&deg; = 45&deg;</p><p>In &#9651;MPQ, &#8736;PMQ = 180&deg;  -  90&deg;  -  45&deg; = 45&deg;</p><p>So, MP = PQ (Let them be 'x')</p><p>MQ<sup>2</sup> = MP<sup>2</sup> + PQ<sup>2</sup></p><p>16<sup>2</sup> = x<sup>2</sup> + x<sup>2</sup></p><p>2x<sup>2</sup> = 256</p><p>x<sup>2</sup> = 128</p><p>MP = x = 8&radic;2 cm</p>",
    "question_index": 10
  },
  {
    "question": "<span class=\"eqt\"><p>From a point P outside the circle of center O, a tangent PT of length 12&radic;3 cm is drawn. PBA is secant, radius of circle is 13 cm and perpendicular distance of chord AB from the center is 5 cm, then find the length of PA (PA &gt; PB).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2357;&#2366;&#2354;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2348;&#2366;&#2361;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; P &#2360;&#2375;, 12&radic;3 cm &#2354;&#2306;&#2348;&#2366;&#2312; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366; PT &#2326;&#2368;&#2306;&#2330;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; PBA &#2331;&#2375;&#2342;&#2367;&#2325;&#2366; &#2361;&#2376;, &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 13 cm &#2324;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2375; &#2332;&#2368;&#2357;&#2366; AB &#2325;&#2368; &#2354;&#2306;&#2348;&#2357;&#2340; &#2342;&#2370;&#2352;&#2368; 5 cm &#2361;&#2376;, &#2340;&#2379; PA &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; (PA&gt; PB)&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">48 cm</span><span class=\"hqt\" style=\"display:none\">48 cm</span>",
      "<span class=\"eqt\">24 cm</span><span class=\"hqt\" style=\"display:none\">24 cm</span>",
      "<span class=\"eqt\">36 cm</span><span class=\"hqt\" style=\"display:none\">36 cm</span>",
      "<span class=\"eqt\">40 cm</span><span class=\"hqt\" style=\"display:none\">40 cm</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=202 height=171 id=\"Picture 26\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18314/image003.png\"></p><p>PT = 12&radic;3 cm</p><p>AO = 13 cm</p><p>OM = 5 cm</p><p>AM = &radic;(AO<sup>2</sup>  -  OM<sup>2</sup>) = &radic;(13<sup>2</sup>  -  5<sup>2</sup>) = 12 cm</p><p>AB = 24 cm</p><p><b>We know that: </b>PT<sup>2</sup> = PA * PB</p><p>Let PB = 'x' cm</p><p>(12&radic;3)<sup>2</sup> = (x + 24) * x</p><p>x<sup>2</sup> + 24x = 432</p><p>x<sup>2</sup> + 24x  -  432 = 0</p><p>x = 12</p><p>PA = x + 24 = 36 cm</p>",
    "question_index": 11
  },
  {
    "question": "<span class=\"eqt\"><p>In the figure given below, DC (= 2&radic;85 cm) is the diameter of the circle, BE = 2 cm and BC = 12 cm. If AD = 6 cm, then calculate the value of AE.</p><p><img width=195 height=193 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8132/image003.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, DC (= 2&radic;85 &#2360;&#2375;.&#2350;&#2368;.) &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2361;&#2376;, BE = 2 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; BC = 12 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; AD = 6 &#2360;&#2375;&#2350;&#2368; &#2361;&#2379;, &#2340;&#2379; AE &#2325;&#2375; &#2350;&#2366;&#2344; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p><img width=\"195\" height=\"193\" id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8132/image003.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">6&radic;3 cm</span><span class=\"hqt\" style=\"display:none\">6&radic;3 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">8&radic;2 cm</span><span class=\"hqt\" style=\"display:none\">8&radic;2 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">4&radic;6 cm</span><span class=\"hqt\" style=\"display:none\">4&radic;6 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">7&radic;2 cm</span><span class=\"hqt\" style=\"display:none\">7&radic;2 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Here, &#8736;A = &#8736;B = 90&#730; (because if one side of a triangle inscribed in a circle is equal to diameter of the circle, then the triangle formed is a right angled triangle.)</p><p>Then, by using Pythagoras theorem:</p><p>DC<sup>2</sup> = BD<sup>2</sup> + BC<sup>2</sup></p><p>(2&radic;85)<sup>2</sup> = BD<sup>2</sup> + 12<sup>2</sup></p><p>BD = 14 cm</p><p>Now, DE = BD  -  BE = 14  -  2 = 12 cm</p><p>Similarly, DE<sup>2</sup> = AD<sup>2</sup> + AE<sup>2</sup></p><p>12<sup>2 </sup>= 6<sup>2</sup> + AE<sup>2</sup></p><p><b>AE = 6&radic;3 cm</b></p>",
    "question_index": 12
  },
  {
    "question": "<span class=\"eqt\"><p>A circle of centre O circumscribed a triangle PQR and a tangent MQ is drawn at point Q. It is also given that- &#8736;PRQ = 70&deg;, &#8736;PQM = x&deg; and &#8736;OPQ = y&deg;, then what is the value of (x  -  y)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2325;&#2366; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;, &#2319;&#2325; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; PQR &#2325;&#2375; &#2346;&#2352;&#2367;&#2327;&#2340; &#2361;&#2376; &#2324;&#2352; &#2319;&#2325; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366; MQ &#2348;&#2367;&#2306;&#2342;&#2369; Q &#2346;&#2352; &#2326;&#2368;&#2306;&#2330;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404; &#2351;&#2361; &#2349;&#2368; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367;- &#8736;PRQ = 70&deg;, &#8736;PQM = x&deg; &#2324;&#2352; &#8736;OPQ = y&deg; &#2361;&#2376;, &#2340;&#2379; (x - y) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">80&deg;</span><span class=\"hqt\" style=\"display:none\">80&deg;</span>",
      "<span class=\"eqt\">60&deg;</span><span class=\"hqt\" style=\"display:none\">60&deg;</span>",
      "<span class=\"eqt\">40&deg;</span><span class=\"hqt\" style=\"display:none\">40&deg;</span>",
      "<span class=\"eqt\">50&deg;</span><span class=\"hqt\" style=\"display:none\">50&deg;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=256 height=212 id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p4997/image001.jpg\"></p><p>&#8736;PRQ = 70&deg;, &#8736;PQM = x&deg; and &#8736;OPQ = y&deg;</p><p>&#8736;OQP = &#8736;OPQ [OP = OQ = Radius]</p><p>&#8736;POQ = 2 * &#8736;PRQ [Angle which is subtended by an arc at the centre of a circle is double the size of the angle subtended at any point on the circumference]</p><p>&#8736;POQ = 2 * 70&deg; = 140&deg;</p><p>In &#9651;POQ-</p><p>&#8736;POQ + &#8736;OQP + &#8736;OPQ = 180&deg;</p><p>140&deg; + &#8736;OPQ + &#8736;OPQ = 180&deg;</p><p>&#8736;OPQ = y&deg; = 20&deg;</p><p>y = 20</p><p>&#8736;OQM = 90&deg; [Angle between radius and tangent.]</p><p>&#8736;OQP + &#8736;PQM = 90&deg;</p><p>x&deg; = 90&deg;  -  20&deg;</p><p>x = 70</p><p>(x  -  y) = 70  -  20 = 50&deg;</p>",
    "question_index": 13
  },
  {
    "question": "<span class=\"eqt\"><p>In the figure given below, ABCD is a quadrilateral such that AB ll DC and AB produced to E. If &#8736;CBE is 63&#730;, then find the value of 'x'.</p><p><img width=228 height=185 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8232/image005.jpg\" ></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; ABCD &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2375; &#2361;&#2376; &#2325;&#2367; AB ll DC &#2361;&#2376; &#2324;&#2352; AB, E &#2340;&#2325; &#2326;&#2368;&#2306;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;| &#2351;&#2342;&#2367; &#8736;CBE 63&#730; &#2361;&#2376;, &#2340;&#2379; 'x' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;|</p><p><img width=\"228\" height=\"185\" id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8232/image005.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">53(2/3)</span><span class=\"hqt\" style=\"display:none\">53(2/3)</span>",
      "<span class=\"eqt\">71(2/3)</span><span class=\"hqt\" style=\"display:none\">71(2/3)</span>",
      "<span class=\"eqt\">51(1/3)</span><span class=\"hqt\" style=\"display:none\">51(1/3)</span>",
      "<span class=\"eqt\">74(1/3)</span><span class=\"hqt\" style=\"display:none\">74(1/3)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Here, &#8736;ABC + &#8736;CBE = 180</p><p>&#8736;ABC = 180  -  63 = 117&#730;</p><p>In a quadrilateral inscribed in a circle, its opposite angles are supplementary to each other. Then,</p><p>&#8736;ABC + &#8736;D = 180</p><p>117 + 7(y + 1) = 180</p><p>y = 8</p><p>&#8736;A + &#8736;C = 180</p><p>3x + 4y  -  6 = 180</p><p>3x + 4 * 8 = 186</p><p><b>x = 51(1/3)</b></p>",
    "question_index": 14
  },
  {
    "question": "<span class=\"eqt\"><p>In the given figure, O is the center and KOL is a diameter of the circle. If &#8736; KOM = 140&deg; then &#8736; LMN =?</p><p><img width=302 height=223 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18670/image014.jpg\" ></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, &#2348;&#2367;&#2306;&#2342;&#2369; O &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2361;&#2376; &#2324;&#2352; KOL &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736;KOM = 140&deg; &#2361;&#2376; &#2340;&#2379; &#8736;LMN =?</p><p><img width=\"302\" height=\"223\" id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18670/image014.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">15&deg;</span><span class=\"hqt\" style=\"display:none\">15&deg;</span>",
      "<span class=\"eqt\">10&deg;</span><span class=\"hqt\" style=\"display:none\">10&deg;</span>",
      "<span class=\"eqt\">25&deg;</span><span class=\"hqt\" style=\"display:none\">25&deg;</span>",
      "<span class=\"eqt\">20&deg;</span><span class=\"hqt\" style=\"display:none\">20&deg;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Given,</p><p>&#8736; KOM = 140&deg;</p><p>So,</p><p>&#8736; KLM = 140/2 = 70&deg; [angle subtended by an arc at the center is double the angle subtended by it  at any point on circumference]</p><p>Now,</p><p>OL = OM = Radius</p><p>So, &#8736; OLM = &#8736; OML = 70&deg;</p><p>We know that angle between the tangent and radius at point of contact = 90&deg;</p><p>So, &#8736; OMN = 90&deg;</p><p>Therefore,</p><p>&#8736; LMN = &#8736; OMN - &#8736; OML = 90  -  70 = 20&deg;</p>",
    "question_index": 15
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;In a circle, a chord MN is drawn. Point P is on the minor arc MN and point Q is on the major arc MN such that &#8736; QNM = 75&deg;. Find the measure of ( <div style='display: inline-block;position: relative;vertical-align: middle;'><span style='text-align:center;display: block; padding: 0;'>1</span><span style='display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;'>_________</span><span style='display: block; padding: 0;border-top: thin solid black; text-align:center'>3</span></div> ) &times; &#8736; QPM&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2350;&#2375;&#2306; &#2319;&#2325; &#2332;&#2368;&#2357;&#2366; MN &#2326;&#2368;&#2306;&#2330;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2348;&#2367;&#2306;&#2342;&#2369; P &#2354;&#2328;&#2369; &#2330;&#2366;&#2346; MN &#2346;&#2352; &#2324;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; Q &#2342;&#2368;&#2352;&#2381;&#2328; &#2330;&#2366;&#2346; MN &#2346;&#2352; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376; &#2325;&#2367; &#8736; QNM = 75&deg; &#2361;&#2376;&#2404; (1/3)  X  &#8736; QPM &#2325;&#2366; &#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "solution": "<p><img width=246 height=231 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23087/image007.png\"></p><p>Take arc QM,</p><p>&#8736; QNM = &#8736; QPM [angles subtended in the same segment]</p><p>So, &#8736; QPM = 75&deg;</p><p>And so (1/3) * &#8736; QPM = 75/3 = 25&deg;</p>",
    "question_index": 16

  {
    "question": "<span class=\"eqt\"><p>WXYZ is a cyclic quadrilateral. Diagonals WY and ZX intersect each other at M. If &#8736; XMY = 126&deg; and &#8736; MYZ = 40&deg;, then what is the measure of &#8736; YWX?</p></span><span class=\"hqt\" style=\"display:none\"><p>WXYZ &#2319;&#2325; &#2330;&#2325;&#2381;&#2352;&#2368;&#2351; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2361;&#2376;&#2404; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; WY &#2324;&#2352; ZX &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; M &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#8736; XMY = 126&deg; &#2324;&#2352; &#8736; MYZ = 40&deg; &#2361;&#2376;, &#2340;&#2379; &#8736; YWX &#2325;&#2366; &#2350;&#2366;&#2346; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>In a circle, length of chord AB is 14 cm, PAB is a straight line, PA = 18 cm and radius of circle is 10 cm, then point P is how far from the centre of circle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2350;&#2375;&#2306;, &#2332;&#2368;&#2357;&#2366; AB &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 14 &#2360;&#2375;.&#2350;&#2368; &#2361;&#2376;, PAB &#2319;&#2325; &#2360;&#2368;&#2343;&#2368; &#2352;&#2375;&#2326;&#2366; &#2361;&#2376;, PA = 18 &#2360;&#2375;.&#2350;&#2368; &#2324;&#2352; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 10 &#2360;&#2375;.&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; P &#2360;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>There is a circle with centre B and AD and AC are two tangents to the circle such that &#8736;DAB = 30&deg;. If radius of the circle is 18 cm, then what is the value of &radic;3(AD + AC)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; B &#2361;&#2376; &#2340;&#2341;&#2366; AD &#2324;&#2352; AC &#2357;&#2371;&#2340;&#2381;&#2340; &#2346;&#2352; &#2342;&#2379; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306; &#2325;&#2367; &#8736;DAB = 30&deg; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 18 cm &#2361;&#2376;, &#2340;&#2379; &radic;3(AD + AC) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
