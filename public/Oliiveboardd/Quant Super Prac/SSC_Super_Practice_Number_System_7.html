<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A square of a number added to its 4 times gives 437 as a solution. Find the number</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; 4 &#2327;&#2369;&#2344;&#2366; &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2344;&#2375; &#2346;&#2352; &#2361;&#2354; 437 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;</p></span>",
    "options": [
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>",
      "<span class=\"eqt\">21</span><span class=\"hqt\" style=\"display:none\">21</span>",
      "<span class=\"eqt\">26</span><span class=\"hqt\" style=\"display:none\">26</span>",
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the number be x, then according to condition x<sup>2</sup> + 4x = 437, </p> <p>On solving this we get x = 19, -23 From the options the number is 19.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The sum of the digits that must be multiplied by 1500 so as to make it a perfect cube is</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2370;&#2352;&#2381;&#2339; &#2328;&#2344; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 1500 &#2360;&#2375; &#2327;&#2369;&#2339;&#2366; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>1500 = 3*5*5*5*2*2</p><p>To make it a perfect cube, it must be multiplied with</p><p>3*2*3 = 18</p><p>Sum of digit = 1+8</p><p>= 9</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Find the product of all the prime numbers between 70 and 80.</p></span><span class=\"hqt\" style=\"display:none\"><p>70 &#2324;&#2352; 80 &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2349;&#2368; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">518337</span><span class=\"hqt\" style=\"display:none\">518337</span>",
      "<span class=\"eqt\">409457</span><span class=\"hqt\" style=\"display:none\">409457</span>",
      "<span class=\"eqt\">560946</span><span class=\"hqt\" style=\"display:none\">560946</span>",
      "<span class=\"eqt\">576727</span><span class=\"hqt\" style=\"display:none\">576727</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Prime numbers are numbers that are only divisible by themselves or 1.</p><p>The prime numbers between 70 and 80 are 71, 73 and 79.</p><p>Therefore their product = 71*73*79</p><p>Product = 409457</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The sum of two numbers is 80 and their product is 1564. What will be the sum of their reciprocals? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 80 &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; 1564 &#2361;&#2376;&#2404; &#2313;&#2344;&#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">25/391</span><span class=\"hqt\" style=\"display:none\">25/391</span>",
      "<span class=\"eqt\">15/391</span><span class=\"hqt\" style=\"display:none\">15/391</span>",
      "<span class=\"eqt\">40/391</span><span class=\"hqt\" style=\"display:none\">40/391</span>",
      "<span class=\"eqt\">20/391</span><span class=\"hqt\" style=\"display:none\">20/391</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the number be x and y respectively.</p><p>x + y = 80</p><p>x = 80  -  y</p><p>x * y = 1564</p><p>(80  -  y) * y = 1564</p><p>80y  -  y<sup>2</sup> = 1564</p><p>y<sup>2 </sup> -  80y + 1564 = 0</p><p>y = 34, 46</p><p>The required value = 1/34 + 1/46 = (23 + 17)/782 = 20/391</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If P and Q are two distinct prime numbers less than 20, then which of the following statement cannot be true?</p><p>I: 2P + 3Q can be even.</p><p>II: Maximum value of (P + Q)/(P  -  Q) is more than 15.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; P &#2324;&#2352; Q 20 &#2360;&#2375; &#2325;&#2350; &#2342;&#2379; &#2349;&#2367;&#2344;&#2381;&#2344; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p><p>I: 2P + 3Q &#2360;&#2350; &#2361;&#2379; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II: (P + Q)/(P - Q) &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2350;&#2366;&#2344; 15 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>P and Q can be 2, 3, 5, 7, 11, 13, 17 or 19.</p><p>I: If we take Q = 2, then the value of 2P + 3Q will be even. </p><p>II: For maximum value, the value of (P+Q) is maximum and (P - Q) is minimum.</p><p>Let P = 19 and Q = 17</p><p>(17 + 19)/(19  -  17) = 18</p><p>So, option 'd' is correct.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If m and n are whole numbers such that m<sup>n</sup> = 121, then the value of (m  -  1)<sup>n + 1</sup> is</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; m &#2324;&#2352; n &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2306; &#2361;&#2376;&#2306; &#2332;&#2376;&#2360;&#2375; &#2325;&#2367; m<sup>n</sup> = 121 &#2361;&#2376;, &#2340;&#2379; (m - 1) n + 1 &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:__</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">121</span><span class=\"hqt\" style=\"display:none\">121</span>",
      "<span class=\"eqt\">1000</span><span class=\"hqt\" style=\"display:none\">1000</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>We know that,</p><p>11<sup>2</sup> = 121</p><p>Putting m = 11 and n = 2, we get</p><p>(m  -  1)<sup>n + 1</sup> = (11  -  1)<sup>2 + 1</sup> = 10<sup>3</sup> = 1000</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The sum of square of two positive numbers is 808 and cube of one number is 2904 more than the square of its 4 times, then find the second number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2325;&#2366; &#2351;&#2379;&#2327; 808 &#2361;&#2376; &#2324;&#2352; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2328;&#2344;, &#2311;&#2360;&#2325;&#2375; 4 &#2327;&#2369;&#2344;&#2366; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2360;&#2375; 2904 &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let two numbers be A and B.</p><p>A<sup>2</sup> + B<sup>2</sup> = 808</p><p>And A<sup>3</sup> = 2904 + (4A)<sup>2</sup></p><p>=&gt; A<sup>3</sup>  -  16A<sup>2</sup> = 2904</p><p>=&gt; A<sup>2</sup>(A  -  16) = 484 * 6 = 22<sup>2</sup> * (22  -  16)</p><p>So, A = 22</p><p>So, B<sup>2</sup> = 808  -  22<sup>2</sup> = 324</p><p>=&gt; B = 18</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>There are two numbers X and Y such that X is equal to the sum of all prime numbers between 118 and 140 and Y is equal to the sum of composite numbers from 61 to 97, then what is the difference between X and Y?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2366;&#2319;&#2306; X &#2324;&#2352; Y &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367; X, 118 &#2324;&#2352; 140 &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2349;&#2368; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376; &#2324;&#2352; Y, 61 &#2360;&#2375; 97 &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;, &#2340;&#2379; X &#2324;&#2352; Y &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1689</span><span class=\"hqt\" style=\"display:none\">1689</span>",
      "<span class=\"eqt\">1678</span><span class=\"hqt\" style=\"display:none\">1678</span>",
      "<span class=\"eqt\">1769</span><span class=\"hqt\" style=\"display:none\">1769</span>",
      "<span class=\"eqt\">1789</span><span class=\"hqt\" style=\"display:none\">1789</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>All prime numbers between 118 and 140 = {127, 131, 137, 139}</p><p>Sum = 127 + 131 + 137 + 139 = 534</p><p>Sum of all natural-numbers from 61 to 97 = (97  -  61 + 1)/2 * (61 + 97) = 2923</p><p>And all prime numbers from 61 to 97 = {61, 67, 71, 73, 79, 83, 89, 97}</p><p>Sum = 61 + 67 + 71 + 73 + 79 + 83 + 89 + 97 = 620</p><p>So, sum of all composite numbers from 61 to 97 = 2923  -  620 = 2303</p><p>So, required difference = 2303  -  534 = 1769</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>abc denotes a 3-digit number. If a and b are interchanged, the value of the original number decreases by 90. How many possible pairs (a, b) exist?</p></span><span class=\"hqt\" style=\"display:none\"><p>abc 3- &#2309;&#2306;&#2325;&#2379; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; | &#2351;&#2342;&#2367; a &#2324;&#2352; b &#2325;&#2379; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2375; &#2309;&#2342;&#2354;&#2366;-&#2348;&#2342;&#2354;&#2368; &#2325;&#2352; &#2342;&#2368; &#2332;&#2366;&#2319; ,&#2340;&#2379; &#2350;&#2370;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2350;&#2366;&#2344; 90 &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2366; | (a, b) &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2332;&#2379;&#2396;&#2379; &#2325;&#2368; &#2360;&#2306;&#2349;&#2366;&#2357;&#2344;&#2366; &#2361;&#2376; ?</p></span>",
    "options": [
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>100a + 10b + c  -  (100b + 10a + c) = 90 </p> <p>90a  -  90b = 90&#8594; a  -  b = 1...(i). Also, a &gt; 0 and a and b both are less than 10. There are 9 pairs of (a, b) satisfying equation (i). </p>",
    "question_index": 8
  },
  {
    "question": "<span class=\"eqt\"><p>x, y, and z are distinct prime numbers where x &lt; y &lt; z. If xy + yz = 154, then what is the sum of possible values of z?</p></span><span class=\"hqt\" style=\"display:none\"><p>x, y, &#2324;&#2352; z &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2309;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306; &#2332;&#2361;&#2366;&#2305; x &lt; y &lt; z &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; xy + yz = 154 &#2361;&#2376;, &#2340;&#2379; z &#2325;&#2375; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">32</span><span class=\"hqt\" style=\"display:none\">32</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>",
