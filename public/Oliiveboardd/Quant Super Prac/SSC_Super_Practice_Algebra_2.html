<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">14</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>If (4x  -  7y)<sup>2 </sup>+ (5y  -  3z)<sup>2</sup> = 0, then find x : y : z = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (4x - 7y)<sup>2 </sup>+ (5y - 3z)<sup>2</sup> = 0, &#2340;&#2379; x : y : z = ? &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">21 : 20 : 15</span><span class=\"hqt\" style=\"display:none\">21 : 20 : 15</span>",
      "<span class=\"eqt\">21 : 12 : 20</span><span class=\"hqt\" style=\"display:none\">21 : 12 : 20</span>",
      "<span class=\"eqt\">22 : 21 : 20</span><span class=\"hqt\" style=\"display:none\">22 : 21 : 20</span>",
      "<span class=\"eqt\">21 : 20 : 12</span><span class=\"hqt\" style=\"display:none\">21 : 20 : 12</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>If a<sup>2</sup> + b<sup>2</sup> = 0</p><p>=&gt; a = 0 and b = 0</p><p>(4x  -  7y)<sup>2</sup> + (5y  -  3z)<sup>2</sup> = 0</p><p>4x  -  7y = 0</p><p>4x = 7y</p><p>x : y = 7 : 4........(i)</p><p>5y  -  3z = 0</p><p>5y = 3z</p><p>y : z = 3 : 5.......(ii)</p><p>multiply eq(i) by 3 and eq(ii) by 4 we get,</p><p>x : y : z = 21 : 12 : 20</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If a<sup>2</sup> + b<sup>2</sup> + c<sup>2 </sup>+ 266 = 2 (9a + 8b  -  11c), then (ab  -  bc  -  ca)  -  128 is :</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a<sup>2</sup> + b<sup>2</sup> + c<sup>2 </sup>+ 266 = 2 (9a + 8b - 11c), &#2340;&#2379; (ab - bc - ca) - 128 &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">156</span><span class=\"hqt\" style=\"display:none\">156</span>",
      "<span class=\"eqt\">343</span><span class=\"hqt\" style=\"display:none\">343</span>",
      "<span class=\"eqt\">131</span><span class=\"hqt\" style=\"display:none\">131</span>",
      "<span class=\"eqt\">243</span><span class=\"hqt\" style=\"display:none\">243</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup> + 266 = 2(9a + 8b  -  11c)</p><p>a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup> + 266 = 18a + 16b  -  22c</p><p>a<sup>2</sup>  -  18a + b<sup>2</sup>  -  16b + c<sup>2</sup> + 22c + 266 = 0</p><p>a<sup>2</sup> -18a + 81 + b<sup>2</sup> + 64  -  16b + c<sup>2</sup> + 121 + 22c = 0</p><p>(a  -  9)<sup>2</sup> + (b  -  8)<sup>2</sup> + (c + 11)<sup>2</sup> = 0</p><p>a = 9, b = 8 and c = -11</p><p>(ab  -  bc  -  ca)  -  128 = (9*8  -  (8 * -11)  -  (-11 * 9)  -  128</p><p>=&gt; (72 + 88 + 99)  -  128 = 259  -  128</p><p>=&gt; 131</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If 25x<sup>2</sup> + 4y<sup>2</sup> + 4z<sup>2</sup> = 4 (5x  -  y + 6z)  -  41, then the value of (xy + 2z) is :</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 25x<sup>2</sup> + 4y<sup>2</sup> + 4z<sup>2</sup> = 4 (5x - y + 6z) - 41, &#2340;&#2379; (xy + 2z) &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">28/5</span><span class=\"hqt\" style=\"display:none\">28/5</span>",
      "<span class=\"eqt\">15/7</span><span class=\"hqt\" style=\"display:none\">15/7</span>",
      "<span class=\"eqt\">29/5</span><span class=\"hqt\" style=\"display:none\">29/5</span>",
      "<span class=\"eqt\">32/5</span><span class=\"hqt\" style=\"display:none\">32/5</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>25x<sup>2</sup> + 4y<sup>2</sup> + 4z<sup>2</sup> = 4(5x  -  y + 6z)  -  41</p><p>=&gt; 25x<sup>2</sup> + 4y<sup>2</sup> + 4z<sup>2</sup>  -  20x + 4y  -  24z + 41= 0</p><p>=&gt; (5x)<sup>2</sup>  -  2*5x * 2 + 2<sup>2</sup> + (2y)<sup>2</sup> + 2 * 2y * 1 + 1<sup>2</sup> + (2z)<sup>2</sup>  -  2 * 2z * 6 + 6<sup>2</sup> = 0</p><p>(5x  -  2)<sup>2</sup> + (2y + 1)<sup>2</sup> + (2z  -  6)<sup>2</sup> = 0</p><p>(5x  -  2)<sup>2</sup> = 0</p><p>5x  -  2 = 0</p><p>x = 2/5</p><p>similarly,</p><p>y = -1/2 and z = 3</p><p>(xy + 2z) = 2/5 * (-1/2) + 2 * 3 = 29/5</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If 7<sup>a</sup> = 11<sup>b</sup> = 77<sup>c</sup>, then find the value of c = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 7<sup>a</sup> = 11<sup>b</sup> = 77<sup>c</sup>, &#2340;&#2379; c &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; = ?</p></span>",
    "options": [
      "<span class=\"eqt\">1/a  -  a/b + 1/c = 0</span><span class=\"hqt\" style=\"display:none\">1/a  -  a/b + 1/c = 0</span>",
      "<span class=\"eqt\">1/a  -  1/b  -  1/c = 0</span><span class=\"hqt\" style=\"display:none\">1/a  -  1/b  -  1/c = 0</span>",
      "<span class=\"eqt\">1/a + 1/b + 1/c = 0</span><span class=\"hqt\" style=\"display:none\">1/a + 1/b + 1/c = 0</span>",
      "<span class=\"eqt\">1/a + 1/b  -  1/c = 0</span><span class=\"hqt\" style=\"display:none\">1/a + 1/b  -  1/c = 0</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>7<sup>a</sup> = 11<sup>b</sup> = 77<sup>c</sup></p><p>Let 7<sup>a</sup> = 11<sup>b</sup> = 77<sup>c</sup> = k</p><p>7 = k<sup>1/a</sup>............(i)</p><p>11 = k<sup>1/b</sup>............(ii)</p><p>77 = k<sup>1/c</sup>...........(iii)</p><p>7 * 11 = 77</p><p>k<sup>1/a</sup> * k<sup>1/b</sup> = k<sup>1/c</sup>............using eq(i), (ii) and (iii)</p><p>k<sup>1/A</sup> <sup>+ 1/B</sup> = k<sup>1/C</sup></p><p>1/a + 1/b = 1/c</p><p>1/a + 1/b  -  1/c = 0</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If 4<sup>x</sup> = 7<sup>y</sup> = 28<sup>-z</sup>, then which option is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 4<sup>x</sup> = 7<sup>y</sup> = 28<sup>-z</sup>, &#2340;&#2379; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1/x  -  2/y  -  2/z = 0</span><span class=\"hqt\" style=\"display:none\">1/x  -  2/y  -  2/z = 0</span>",
      "<span class=\"eqt\">1/x + 2/y + 1/z = 0</span><span class=\"hqt\" style=\"display:none\">1/x + 2/y + 1/z = 0</span>",
      "<span class=\"eqt\">2/x + 1/y  -  1/z = 0</span><span class=\"hqt\" style=\"display:none\">2/x + 1/y  -  1/z = 0</span>",
      "<span class=\"eqt\">1/x + 1/y + 1/z = 0</span><span class=\"hqt\" style=\"display:none\">1/x + 1/y + 1/z = 0</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>4<sup>x</sup> = 7<sup>y</sup> = 28<sup>-z</sup></p><p>Let 4<sup>x</sup> = 7<sup>y</sup> = 28<sup>-z</sup> = k</p><p>4 = k<sup>1/x</sup>............(i)</p><p>7 = k<sup>1/y</sup>............(ii)</p><p>28 = k<sup>-1/z</sup>...........(iii)</p><p>4 * 7 = 28</p><p>k<sup>1/x</sup> * k<sup>1/y</sup> = k<sup>-1/z</sup>............using eq(i), (ii) and (iii)</p><p>k<sup>1/x</sup> <sup>+ 1/y</sup> = k<sup>-1/z</sup></p><p>1/x + 1/y = -1/z</p><p>1/x + 1/y + 1/z = 0</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If x + y + z = 3, xy + yz + zx = -4 and xyz = -4, then (x<sup>3</sup> + y<sup>3</sup> + z<sup>3</sup>) is equal to ______ .</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; x + y + z = 3, xy + yz + zx = -4 &#2324;&#2352; xyz = -4 &#2361;&#2376;, &#2340;&#2379; (x<sup>3</sup> + y<sup>3</sup> + z<sup>3</sup>) &#2325;&#2367;&#2360;&#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">60</span><span class=\"hqt\" style=\"display:none\">60</span>",
      "<span class=\"eqt\">62</span><span class=\"hqt\" style=\"display:none\">62</span>",
      "<span class=\"eqt\">51</span><span class=\"hqt\" style=\"display:none\">51</span>",
      "<span class=\"eqt\">58</span><span class=\"hqt\" style=\"display:none\">58</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>x<sup>2</sup> + y<sup>2</sup> + z<sup>2</sup> = (x + y + z)<sup>2</sup>  -  2(xy + yz + zx)</p><p>x<sup>2</sup> + y<sup>2</sup> + z<sup>2</sup> = (3)<sup>2</sup>  -  2(-4)</p><p>x<sup>2</sup> + y<sup>2</sup> + z<sup>2</sup> = 9 + 8</p><p>x<sup>2</sup> + y<sup>2</sup> + z<sup>2</sup> = 17</p><p>x<sup>3</sup> + y<sup>3</sup> + z<sup>3</sup> = (x + y + z)(x<sup>2</sup> + y<sup>2</sup> + z<sup>2</sup>  -  xy  -  yz  -  zx) + 3xyz</p><p>x<sup>3 </sup>+ y<sup>3</sup> + z<sup>3</sup> = 3[17  -  (-4)] + 3(-4)</p><p>x<sup>3</sup> + y<sup>3</sup> + z<sup>3</sup> = 63  -  12</p><p>x<sup>3</sup> + y<sup>3</sup> + z<sup>3</sup> = 51</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If &#945; + &#946; + &#947; = 0, then (5&#946;<sup>2</sup> + 2&#945;<sup>2</sup> + &#947;<sup>2</sup>)/( 6&#946;<sup>2</sup> + 3&#945;<sup>2 </sup>+ 2&#945;&#946;) = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#945; + &#946; + &#947; = 0, &#2347;&#2367;&#2352; (5&#946;<sup>2</sup> + 2&#945;<sup>2</sup> + &#947;<sup>2</sup>)/( 6&#946;<sup>2</sup> + 3&#945;<sup>2 </sup>+ 2&#945;&#946;) = ?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">1.25</span><span class=\"hqt\" style=\"display:none\">1.25</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#945; + &#946; + &#947; = 0</p><p>&#947; = - (&#945; + &#946;)</p><p>substitute &#947; = -(&#945; + &#946;) into the formula :</p><p>{5&#946;<sup>2</sup> + 2&#945;<sup>2</sup> + [-(&#945; + &#946;)<sup>2</sup>]/{ 6&#946;<sup>2</sup> + 3&#945;<sup>2 </sup>+ 2&#945;&#946;}</p><p>=&gt; [5&#946;<sup>2</sup> + 2&#945;<sup>2</sup> + (&#945; + &#946;)<sup>2</sup>] / {6&#946;<sup>2</sup> + 3&#945;<sup>2 </sup>+ 2&#945;&#946;}</p><p>=&gt; (5&#946;<sup>2</sup> + 2&#945;<sup>2</sup> + &#945;<sup>2</sup> + 2&#945;&#946; + &#946;<sup>2</sup>)/( 6&#946;<sup>2</sup> + 3&#945;<sup>2 </sup>+ 2&#945;&#946;)</p><p>=&gt; (5&#946;<sup>2</sup> + 3&#945;<sup>2</sup> + 2&#945;&#946; + &#946;<sup>2</sup>)/( 6&#946;<sup>2</sup> + 3&#945;<sup>2 </sup>+ 2&#945;&#946;)</p><p>=&gt; (6&#946;<sup>2</sup> + 3&#945;<sup>2</sup> + 2&#945;&#946;)/(6&#946;<sup>2</sup> + 3&#945;<sup>2 </sup>+ 2&#945;&#946;)</p><p>=&gt; (6&#946;<sup>2</sup> + 3&#945;<sup>2 </sup>+ 2&#945;&#946;)/(6&#946;<sup>2</sup> + 3&#945;<sup>2 </sup>+ 2&#945;&#946;)</p><p>=&gt; 1</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>If 2a + 4b + 5c = 0, then what is the value of (8a<sup>3</sup> + 64b<sup>3</sup> + 125c<sup>3</sup>) ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 2a + 4b + 5c = 0, &#2340;&#2379; (8a<sup>3</sup> + 64b<sup>3</sup> + 125c<sup>3</sup>) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">90abc</span><span class=\"hqt\" style=\"display:none\">90&#2319;&#2348;&#2368;&#2360;&#2368;</span>",
      "<span class=\"eqt\">100abc</span><span class=\"hqt\" style=\"display:none\">100&#2319;&#2348;&#2368;&#2360;&#2368;</span>",
      "<span class=\"eqt\">120abc</span><span class=\"hqt\" style=\"display:none\">120&#2319;&#2348;&#2368;&#2360;&#2368;</span>",
      "<span class=\"eqt\">125abc</span><span class=\"hqt\" style=\"display:none\">125&#2319;&#2348;&#2368;&#2360;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>We use the identity for the sum of cubes: a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup> - 3abc</p><p>=&gt; (a + b + c)(a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup> - ab - bc - ca)</p><p><b>Formula Used:</b></p><p>8a<sup>3</sup> + 64b<sup>3</sup> + 125c<sup>3</sup>  -  3(2a)(4b)(5c) = (2a + 4b + 5c)[(2a)<sup>2</sup> + (4b)<sup>2</sup> + (5c)<sup>2</sup>  -  (2a)(4b) - (4b)(5c) - (5c)(2a)]</p><p><b>Calculation:</b></p><p>We have,</p><p>=&gt; 2a + 4b + 5c = 0</p><p>Using the formula for the sum of cubes, we get:</p><p>=&gt; 8a<sup>3</sup> + 64b<sup>3</sup> + 125c<sup>3</sup>  -  120abc = (2a + 4b + 5c)(4a<sup>2</sup> + 16b<sup>2</sup> + 25c<sup>2</sup> - 8ab - 20bc - 10ca)</p><p>=&gt; 8a<sup>3</sup> + 64b<sup>3</sup> + 125c<sup>3</sup>  -  120abc = 0</p><p>=&gt; 8a<sup>3</sup> + 64b<sup>3</sup> + 125c<sup>3</sup> = 120abc</p><p><b>The value of 8a<sup>3</sup> + 64b<sup>3</sup> + 125c<sup>3</sup> is 120abc.</b></p>",
    "question_index": 7

  {
