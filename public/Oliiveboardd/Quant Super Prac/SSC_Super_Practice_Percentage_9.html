<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">

                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->

                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">

                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->

                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->

                <div class="stats-grid">
                    <div class="stat-item">

                    </div>
                    <div class="stat-item">

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The percentage of students enrolled in different activities in a school which are displayed in the left side pie chart. The total number of students is 5000.</p><p>In the right-side pie chart, the total number of girls is 1550 and their percentage breakup enrolled in these activities.</p><p><b><img width=255 height=285 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27469/image017.png\"></b><img width=346 height=287 id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27469/image018.png\"><br clear=all> The number of girls enrolled in Craft forms what per cent of the total number of students in the school?</p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2381;&#2325;&#2370;&#2354; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;, &#2332;&#2379; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 5000 &#2361;&#2376;&#2404;</p><p>&#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2325;&#2375; &#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; &#2350;&#2375;&#2306;, &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 1550 &#2361;&#2376; &#2324;&#2352; &#2311;&#2344; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; &#2313;&#2344;&#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2357;&#2352;&#2339; &#2361;&#2376;&#2404;</p><p><b><img width=255 height=285 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27469/image017.png\"></b><img width=346 height=287 id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27469/image018.png\"> &#2325;&#2381;&#2352;&#2366;&#2347;&#2381;&#2335; &#2350;&#2375;&#2306; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2381;&#2325;&#2370;&#2354; &#2350;&#2375;&#2306; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">6.82%</span><span class=\"hqt\" style=\"display:none\">6.82%</span>",
      "<span class=\"eqt\">5.81%</span><span class=\"hqt\" style=\"display:none\">5.81%</span>",
      "<span class=\"eqt\">8.82%</span><span class=\"hqt\" style=\"display:none\">8.82%</span>",
      "<span class=\"eqt\">7.11%</span><span class=\"hqt\" style=\"display:none\">7.11%</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Calculate number of girls in Craft:</b></p><p>&#8195;22% of 1550 = 0.22  X  1550 = 341 (approximately)</p><p><b>Now, find the percentage of total students:</b></p><p>&#8195;(341 &div; 5000)  X  100 &#8776; 6.82%</p><p>Option (a) is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The given pie-charts show the distribution of Graduate and Post-graduate level students in five different colleges A, B, C, D and E.</p><p><img width=272 height=234 id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27471/image023.png\"><img width=280 height=231 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27471/image024.png\"><br clear=all> What is the ratio between the number of students studying at Post-Graduate and Graduate levels, respectively, from college E?</p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2366;&#2312;-&#2330;&#2366;&#2352;&#2381;&#2335; &#2346;&#2366;&#2306;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2325;&#2377;&#2354;&#2375;&#2332;&#2379;&#2306; A, B, C, D &#2324;&#2352; E &#2350;&#2375;&#2306; &#2360;&#2381;&#2344;&#2366;&#2340;&#2325; &#2324;&#2352; &#2360;&#2381;&#2344;&#2366;&#2340;&#2325;&#2379;&#2340;&#2381;&#2340;&#2352; &#2360;&#2381;&#2340;&#2352; &#2325;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p><img width=272 height=234 id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27471/image023.png\"><img width=280 height=231 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27471/image024.png\"> &#2325;&#2377;&#2354;&#2375;&#2332; E &#2360;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2360;&#2381;&#2344;&#2366;&#2340;&#2325;&#2379;&#2340;&#2381;&#2340;&#2352; &#2324;&#2352; &#2360;&#2381;&#2344;&#2366;&#2340;&#2325; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2346;&#2338;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">32:43</span><span class=\"hqt\" style=\"display:none\">32:43</span>",
      "<span class=\"eqt\">16:17</span><span class=\"hqt\" style=\"display:none\">16:17</span>",
      "<span class=\"eqt\">44:45</span><span class=\"hqt\" style=\"display:none\">44:45</span>",
      "<span class=\"eqt\">48:37</span><span class=\"hqt\" style=\"display:none\">48:37</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The ratio of Post-Graduate to Graduate students in college E is 22% of 16800: 20% of 18900: = 3696:3780=44:45.</p><p>Option (c) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Following pie chart presents monthly expenditures by Sushma and Preeti in different heads. Sushma and Preeti make equal expenditure every month.</p><p><img width=652 height=328 id=\"Chart 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27707/image034.png\"><img width=502 height=328 id=\"Chart 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27707/image035.png\"></p><p>What is the difference between the central angle corresponding to the expenditure incurred on Health by Sushma and Preeti?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2366;&#2312; &#2330;&#2366;&#2352;&#2381;&#2335; &#2360;&#2369;&#2359;&#2350;&#2366; &#2324;&#2352; &#2346;&#2381;&#2352;&#2368;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2350;&#2342;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2319; &#2327;&#2319; &#2350;&#2366;&#2360;&#2367;&#2325; &#2357;&#2381;&#2351;&#2351; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2369;&#2359;&#2350;&#2366; &#2324;&#2352; &#2346;&#2381;&#2352;&#2368;&#2340;&#2367; &#2361;&#2352; &#2350;&#2361;&#2368;&#2344;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2326;&#2352;&#2381;&#2330; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p><img width=652 height=328 id=\"Chart 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27707/image034.png\"><img width=502 height=328 id=\"Chart 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27707/image035.png\"></p><p>&#2360;&#2369;&#2359;&#2350;&#2366; &#2324;&#2352; &#2346;&#2381;&#2352;&#2368;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2346;&#2352; &#2325;&#2367;&#2319; &#2327;&#2319; &#2357;&#2381;&#2351;&#2351; &#2325;&#2375; &#2309;&#2344;&#2369;&#2352;&#2370;&#2346; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2325;&#2379;&#2339; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2381;&#2351;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">102&deg;</span><span class=\"hqt\" style=\"display:none\">102&deg;</span>",
      "<span class=\"eqt\">18&deg;</span><span class=\"hqt\" style=\"display:none\">18&deg;</span>",
      "<span class=\"eqt\">12&deg;</span><span class=\"hqt\" style=\"display:none\">12&deg;</span>",
      "<span class=\"eqt\">112&deg;</span><span class=\"hqt\" style=\"display:none\">112&deg;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total expenditure for Sushma- 30000</p><p>3000=360</p><p>Health  -  7500</p><p>7500- 360/30000*7500= 90&deg;</p><p>Total expenditure of Preeti= 100%</p><p>100%= 360</p><p>On health- 20%</p><p>20%- 360/100*20=72&deg;</p><p>difference between the central angle= 90&deg; - 72&deg;= 18&deg;</p><p>Option(b) is the correct answer</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Study the given pie-chart and table and answer the question that follows </p><p>The Pie-chart shows the percentage distribution of age groups of visitors to a park in a month.</p><p><img width=576 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24118/image032.png\"></p><p>The table shows the male, female distribution of the visitors in terms of the percentage.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Age</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Male Percentage</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Female Percentage</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">More than 60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">58</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">42</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">45-60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">80</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">35-45</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">81</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">19</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">25-35</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">40</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Less than 25</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">45</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">55</td></tr></table><p>If 2000 male visitors and 1500 female visitors were there in all, then the ratio of the number of male visitors in the age group 25-35 to the female visitors of the age group 45-60 is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2324;&#2352; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;:</p><p>&#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2319;&#2325; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2346;&#2366;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2310;&#2327;&#2306;&#2340;&#2369;&#2325;&#2379;&#2306; &#2325;&#2375; &#2310;&#2351;&#2369; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24118/image032.png\"></p><p>&#2340;&#2366;&#2354;&#2367;&#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2310;&#2327;&#2306;&#2340;&#2369;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2375; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2310;&#2351;&#2369;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2346;&#2369;&#2352;&#2369;&#2359; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2350;&#2361;&#2367;&#2354;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">58</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">42</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">45-60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">80</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">35-45</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">81</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">19</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">25-35</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">60</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">40</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">25 &#2360;&#2375; &#2325;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">45</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">55</td></tr></table><p>&#2351;&#2342;&#2367; &#2325;&#2369;&#2354; 2000 &#2346;&#2369;&#2352;&#2369;&#2359; &#2310;&#2327;&#2306;&#2340;&#2369;&#2325; &#2324;&#2352; 1500 &#2350;&#2361;&#2367;&#2354;&#2366; &#2310;&#2327;&#2306;&#2340;&#2369;&#2325; &#2361;&#2376;&#2306;, &#2340;&#2379; 25-35 &#2310;&#2351;&#2369; &#2357;&#2352;&#2381;&#2327; &#2325;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359; &#2310;&#2327;&#2306;&#2340;&#2369;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352;     "solution": "<p>Let total visitors = 'x'</p><p>Total visitors in the age group of 25-35 = 27% of x</p><p>Total male visitors in the age group of 25-35 = 60% of 27% of x</p><p>Total visitors in the age group of 45-60 = 29% of x</p><p>Total female visitors in the age group of 45-60 = 20% of 29% of x</p><p>Required ratio = (60% of 27% of x): (20% of 29% of x)</p><p>= (60 * 27): (20 * 29)</p><p>= 81: 29</p>",

    "question": "<span class=\"eqt\"><p>The given pie charts represent the distribution of candidates who enrolled for a bank clerical examination and the candidates (out of those enrolled) who passed the examination, from five different institutes P, Q, R, S and T.</p><p>Study the pie charts and answer the question that follows.</p><p>(i) Total number of candidates who enrolled for the examination from five institutes = 5500</p><p><img width=280 height=181 id=\"Chart 32\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20625/image053.png\">Fig.(i)</p><p>(ii) Total number of candidates who passed the examination from five institutes = 3300</p><p><img width=288 height=231 id=\"Chart 33\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20625/image054.png\">Fig.(ii)</p><p>Which institute(s) has/have the highest percentage of candidates passed to the candidates enrolled?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2346;&#2366;&#2306;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; P, Q, R, S &#2324;&#2352; T &#2360;&#2375; &#2348;&#2376;&#2306;&#2325; &#2325;&#2375; &#2325;&#2381;&#2354;&#2352;&#2381;&#2325; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; &#2324;&#2352; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2375; &#2310;&#2306;&#2325;&#2337;&#2364;&#2375;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#23     "question": "<span class=\"eqt\"><p>Study the following graph and answer the question given below.</p><p><img width=576 height=336 id=\"Chart 30\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20656/image062.png\"></p><p><img width=576 height=336 id=\"Chart 31\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20656/image063.png\"></p><p>What is the ratio of the total amount invested by Vivek in schemes A and C together to the total amount invested by Shalini in schemes A and C together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2352;&#2375;&#2326; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 30\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20656/image062.png\"></p><p><img width=\"576\" height=\"336\" id=\"Chart 31\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20656/image063.png\"></p><p>&#2357;&#2367;&#2357;&#2375;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2351;&#2379;&#2332;&#2344;&#2366; A &#2324;&#2352; C &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2325;&#2369;&#2354; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2324;&#2352; &#2358;&#2366;&#2354;&#2367;&#2344;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2351;&#2379;&#2332;&#2344;&#2366; A &#2324;&#2352; C &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2327;&#2312; &#2325;&#2369;&#2354; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#
