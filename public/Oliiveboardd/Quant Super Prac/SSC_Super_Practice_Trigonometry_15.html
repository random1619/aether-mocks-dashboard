<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Central Stylesheet -->

<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The value of 2<sup>2</sup> + 4<sup>2</sup> + 6<sup>2</sup> + .... + 20<sup>2</sup> is equal to:</p></span><span class=\"hqt\" style=\"display:none\"><p>2<sup>2</sup> + 4<sup>2</sup> + 6<sup>2</sup> + .... + 20<sup>2</sup> &#2325;&#2366; &#2350;&#2366;&#2344; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">1540</span><span class=\"hqt\" style=\"display:none\">1540</span>",
      "<span class=\"eqt\">770</span><span class=\"hqt\" style=\"display:none\">770</span>",
      "<span class=\"eqt\">385</span><span class=\"hqt\" style=\"display:none\">385</span>",
      "<span class=\"eqt\">1260</span><span class=\"hqt\" style=\"display:none\">1260</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>2<sup>2</sup>(1<sup>2</sup>+2<sup>2</sup>+3<sup>2</sup>+...+10<sup>2</sup>)</p><p>= 4 x {10(10+1)(2x10+1)/6} (Sum of first n<sup>2</sup> terms)</p><p>= 4x385</p><p>= 1540</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p></p><div>&nbsp;If &nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">(1 + 3 + 5 + 7.. 20 terms)</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(2 + 4 + 6 + .. n terms)</span></div>&nbsp; = &nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">40</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">11</span></div>&nbsp;, then find n.&nbsp;</div></span><span class=\"hqt\" style=\"display:none\"><p></p><div>&nbsp;If &nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">(1 + 3 + 5 + 7.. 20 terms)</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(2 + 4 + 6 + .. n terms)</span></div>&nbsp; = &nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">40</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">11</span></div>&nbsp;, then find n.&nbsp;</div></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\"><p>7</p></span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\"><p>10</p></span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\"><p>8</p></span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\"><p>9</p></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here the numerator is the sum of first 20 odd numbers which is equal to 20<sup>2</sup> i.e. 400</p><p>Denominator is the sum of first n even numbers which is of the form n<sup>2</sup> + n</p><p>400/(n<sup>2</sup> + n) = 40/11</p><p>On solving we get, n = 10</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The sum of all three digit numbers divisible by 9 is -</p></span><span class=\"hqt\" style=\"display:none\"><p>9 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2360;&#2349;&#2368; &#2340;&#2368;&#2344; &#2309;&#2306;&#2325;&#2368;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2361;&#2376; -</p></span>",
    "options": [
      "<span class=\"eqt\">55450</span><span class=\"hqt\" style=\"display:none\">55450</span>",
      "<span class=\"eqt\">55430</span><span class=\"hqt\" style=\"display:none\">55430</span>",
      "<span class=\"eqt\">55530</span><span class=\"hqt\" style=\"display:none\">55530</span>",
      "<span class=\"eqt\">55350</span><span class=\"hqt\" style=\"display:none\">55350</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Required numbers are 108, 117, 126...... 999</p> <p>This is an A.P. in which a = 108, d = 9 and l = 999</p> <p>Let the number of terms = n. </p> <p>So a + (n-1) x d = 999</p> <p>So, n = 100</p> <p>Required sum = n/2(a + l) = 100/2 x (108 + 999) = 55350</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The sum (101 + 102 + 103 + ........ + 200) is equal to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2379;&#2327; (101 + 102 + 103 + ........ + 200) &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">15000</span><span class=\"hqt\" style=\"display:none\">15000</span>",
      "<span class=\"eqt\">15025</span><span class=\"hqt\" style=\"display:none\">15025</span>",
      "<span class=\"eqt\">15050</span><span class=\"hqt\" style=\"display:none\">15050</span>",
      "<span class=\"eqt\">15090</span><span class=\"hqt\" style=\"display:none\">15090</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>101 + 102 + 103 + ....... + 200</p> <p>S = (100+1) + (100+2) + (100+3) + ........ + (100+100)</p> <p>S = (100+100+100+.... 100 times) + (1+2+3+ .... +100)</p> <p>S = (100*100) + (1+2+3+ .... +100)</p> <p>S = (10000) + (1+2+3+ .... +100)</p> <p>S = 10000 + 100*(100 + 1)/2 because sum of first 'n' natural numbers = n(n+1)/2</p> <p>S = 10000 + 5050 = 15050</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Find the value of X if X = <img width=275 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image029.png\">.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; X = &#2361;&#2376; &#2340;&#2379; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;<img width=275 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image029.png\">.</p></span>",
    "options": [
      "<span class=\"eqt\">25420</span><span class=\"hqt\" style=\"display:none\">25420</span>",
      "<span class=\"eqt\">22410</span><span class=\"hqt\" style=\"display:none\">22410</span>",
      "<span class=\"eqt\">23770</span><span class=\"hqt\" style=\"display:none\">23770</span>",
      "<span class=\"eqt\">24250</span><span class=\"hqt\" style=\"display:none\">24250</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=197 height=17 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image030.png\"></p><p><img width=220 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image031.png\"></p><p><img width=236 height=23 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image032.png\"></p><p><img width=259 height=23 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image033.png\"></p><p><img width=75 height=19 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image034.png\"></p><p><img width=360 height=24 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image035.png\"></p><p><img width=232 height=23 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image036.png\"></p><p><img width=167 height=28 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image037.png\"></p><p><img width=120 height=20 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image038.png\"></p><p><img width=253 height=47 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image039.png\">.</p><p><img width=212 height=17 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image040.png\"></p><p><img width=139 height=17 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image041.png\"></p><p><img width=59 height=17 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19856/image042.png\"></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If sum of n consecutive positive even numbers is 2352, find n.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; n &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 2352 &#2361;&#2376;, &#2340;&#2379; n &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">46</span><span class=\"hqt\" style=\"display:none\">46</span>",
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">51</span><span class=\"hqt\" style=\"display:none\">51</span>",
      "<span class=\"eqt\">49</span><span class=\"hqt\" style=\"display:none\">49</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Sum of n consecutive even numbers = n(n+1) = 2352</p><p>n<sup>2</sup>+ n  -  2352 = 0</p><p>n<sup>2</sup> + 49n  -  48n  -  2352 = 0</p><p>n = -49 or +48</p><p>Hence, n = <b>48</b></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The 10<sup>th</sup> term of a geometric series is 8 times the 7<sup>th</sup> term of the series. If 5<sup>th</sup> term of the series is 80, then what is the 8<sup>th</sup> term of the series?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2332;&#2381;&#2351;&#2366;&#2350;&#2367;&#2340;&#2368;&#2351; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2366; 10&#2357;&#2366;&#2305; &#2346;&#2342; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2375; 7&#2357;&#2375;&#2306; &#2346;&#2342; &#2325;&#2366; 8 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2366; 5&#2357;&#2366;&#2305; &#2346;&#2342; 80 &#2361;&#2376;, &#2340;&#2379; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2366; 8&#2357;&#2366;&#2305; &#2346;&#2342; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1280</span><span class=\"hqt\" style=\"display:none\">1280</span>",
      "<span class=\"eqt\">320</span><span class=\"hqt\" style=\"display:none\">320</span>",
      "<span class=\"eqt\">640</span><span class=\"hqt\" style=\"display:none\">640</span>",
      "<span class=\"eqt\">2560</span><span class=\"hqt\" style=\"display:none\">2560</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The 10<sup>th</sup> term of a geometric series is 8 times the 7<sup>th</sup> term of the series.</p><p>=&gt; ar<sup>9</sup> = 8 * ar<sup>6</sup></p><p>=&gt; r<sup>3</sup> = 8</p><p>=&gt; r = 2</p><p>5<sup>th</sup> term of the series is 80</p><p>=&gt; ar<sup>4</sup> = 80</p><p>=&gt; a * 2<sup>4</sup> = 80</p><p>=&gt; a = 80/16</p><p>=&gt; a = 5</p><p>Hence, 8<sup>th</sup> term of the series = 5 * 2<sup>7</sup> = 640</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>What is the value of 1/0.9+1/0.09+1/0.009+&#8943; up to 6 terms?</p></span><span class=\"hqt\" style=\"display:none\"><p>1/0.9+1/0.09+1/0.009+&#8943; &#2325;&#2375; 6 &#2346;&#2342;&#2379;&#2306; &#2340;&#2325; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1111110/9</span><span class=\"hqt\" style=\"display:none\">1111110/9</span>",
      "<span class=\"eqt\">555555</span><span class=\"hqt\" style=\"display:none\">555555</span>",
      "<span class=\"eqt\">999999</span><span class=\"hqt\" style=\"display:none\">999999</span>",
      "<span class=\"eqt\">555555/9</span><span class=\"hqt\" style=\"display:none\">555555/9</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Given series is in the form of G.P.:</p><p>Then, first term = a = (1/0.9)</p><p>Common ratio = r = (1/0.09)/(1/0.9) = 10</p><p>Total terms = n = 6</p><p>Therefore, sum = a(r<sup>n</sup>  -  1)/(r  -  1)</p><p>= (1/0.9)(10<sup>6</sup>  -  1)/(10  -  1)</p><p><b>= 1111110/9</b></p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>There are two numbers X and Y such that geometric mean of X and Y is four-fifth of the Arithmetic mean of X and Y. What is the ratio of X and Y?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; X &#2324;&#2352; Y &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306;, &#2325;&#2367; X &#2324;&#2352; Y &#2325;&#2366; &#2332;&#2381;&#2351;&#2366;&#2350;&#2367;&#2340;&#2368;&#2351; &#2350;&#2366;&#2343;&#2381;&#2351;, X &#2324;&#2352; Y &#2325;&#2375; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2350;&#2366;&#2343;&#2381;&#2351; &#2325;&#2366; 4/5 &#2361;&#2376;&#2404; X &#2324;&#2352; Y &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3: 4</span><span class=\"hqt\" style=\"display:none\">3: 4</span>",
      "<span class=\"eqt\">4: 1</span><span class=\"hqt\" style=\"display:none\">4: 1</span>",
      "<span class=\"eqt\">5: 4</span><span class=\"hqt\" style=\"display:none\">5: 4</span>",
      "<span class=\"eqt\">6: 1</span><span class=\"hqt\" style=\"display:none\">6: 1</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The geometric mean of X and Y is four-fifth of the Arithmetic mean of X and Y</p><p>=&gt; &radic;XY = (4/5) * (X + Y)/2</p><p>=&gt; (X + Y)/2&radic;XY = 5/4</p><p>By componendo and dividendo rule,</p><p>(X + Y + 2&radic;XY)/(X + Y  -  2&radic;XY) = (5+4)/(5-4)</p><p>=&gt; (&radic;X + &radic;Y)<sup>2</sup>/(&radic;X - &radic;Y)<sup>2</sup> = 9/1</p><p>=&gt; (&radic;X + &radic;Y)/(&radic;X - &radic;Y) = 3</p><p>=&gt; &radic;X + &radic;Y = 3&radic;X - 3&radic;Y</p><p>=&gt; 2&radic;X = 4&radic;Y</p><p>=&gt; &radic;X/&radic;Y = 2</p><p>=&gt; X/Y = 4/1</p>",
    "question_index": 8
