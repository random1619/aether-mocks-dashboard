<body>
    <!-- Welcome Screen -->

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Charan was initially riding on his motor bike at a speed of 24 kmph. He increased his speed by 3 kmph at the end of every hour. Find his average speed for the first eight hours of journey.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2352;&#2339; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2350;&#2375;&#2306; &#2309;&#2346;&#2344;&#2368; &#2350;&#2379;&#2335;&#2352; &#2348;&#2366;&#2311;&#2325; &#2346;&#2352; 24 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2330;&#2354; &#2352;&#2361;&#2366; &#2341;&#2366;&#2404; &#2361;&#2352; &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2313;&#2360;&#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2327;&#2340;&#2367; 3 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2375; &#2348;&#2338;&#2364;&#2366; &#2342;&#2368;&#2404; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2310;&#2336; &#2328;&#2306;&#2335;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2360;&#2325;&#2368; &#2324;&#2360;&#2340; &#2327;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">31.5 kmph</span><span class=\"hqt\" style=\"display:none\">31.5 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">34.5 kmph</span><span class=\"hqt\" style=\"display:none\">34.5 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">37.5 kmph</span><span class=\"hqt\" style=\"display:none\">37.5 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">40.5 kmph</span><span class=\"hqt\" style=\"display:none\">40.5 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Speed in nth hour = 24 + (n - 1) 3 = (3n + 21) kmph.</p><p>Total distance travelled by him in eight hours = 24 + 27 +... + (3(8) + 21)</p><p>= 8/2 [2(24) + (8  -  1) 3] = 4(48 + 21) = 276km.</p><p>Therefore average speed of Charan = 276/8 = 34.5 kmph.</p><p>Hence the correct option is (2).</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A State Transport bus covers a certain distance at an average speed of 75 kmph without stopping it. But with stoppages, it covers the same distance at an average speed of 50 kmph. Calculate for how many minutes per hour on average bus stops during its journey?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344; &#2348;&#2360; &#2348;&#2367;&#2344;&#2366; &#2352;&#2369;&#2325;&#2375; 75 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2324;&#2360;&#2340; &#2327;&#2340;&#2367; &#2360;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2354;&#2375;&#2325;&#2367;&#2344; &#2352;&#2369;&#2325;&#2344;&#2375; &#2346;&#2352;, &#2351;&#2361; &#2360;&#2350;&#2366;&#2344; &#2342;&#2370;&#2352;&#2368; 50 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2324;&#2360;&#2340; &#2327;&#2340;&#2367; &#2360;&#2375; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2309;&#2346;&#2344;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2324;&#2360;&#2340;&#2344; &#2348;&#2360; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2367;&#2344;&#2335; &#2352;&#2369;&#2325;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">15 min</span><span class=\"hqt\" style=\"display:none\">15 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">10 min</span><span class=\"hqt\" style=\"display:none\">10 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">20 min</span><span class=\"hqt\" style=\"display:none\">20 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">18 min</span><span class=\"hqt\" style=\"display:none\">18 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>A bus travelling at 75 kmph covers 75/60 i.e. 1.25 km per minute.</p><p>Now time to cover 50km by 1.25km per minute will be 40 minutes.</p><p>Therefore, at an average speed of 50kmph, the bus stops for 20 minutes on average every hour.</p><p><b><u> </u></b></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A and B decide to meet a point Y on a particular day from point X. A leaves for point X at 12:00 a.m. at a speed of 36 km/hr. B leaves for point X at 12:30 am the same day A left. At what speed should B travel to catch up with A in 3 hours?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2319;&#2325; &#2326;&#2366;&#2360; &#2342;&#2367;&#2344; &#2348;&#2367;&#2306;&#2342;&#2369; X &#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; Y &#2346;&#2352; &#2350;&#2367;&#2354;&#2344;&#2375; &#2325;&#2366; &#2347;&#2376;&#2360;&#2354;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; A 12:00 &#2348;&#2332;&#2375; &#2360;&#2369;&#2348;&#2361; 36 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; X &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2325;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; B &#2313;&#2360;&#2368; &#2342;&#2367;&#2344; 12:30 &#2348;&#2332;&#2375; &#2360;&#2369;&#2348;&#2361; &#2348;&#2367;&#2306;&#2342;&#2369; X &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2325;&#2354;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360; &#2342;&#2367;&#2344; A &#2344;&#2367;&#2325;&#2354;&#2366; &#2341;&#2366;&#2404; 3 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; A &#2325;&#2379; &#2346;&#2325;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; B &#2325;&#2379; &#2325;&#2367;&#2360; &#2327;&#2340;&#2367; &#2360;&#2375; &#2330;&#2354;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">42 km/hr</span><span class=\"hqt\" style=\"display:none\">42 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">44 km/hr</span><span class=\"hqt\" style=\"display:none\">44 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">46 km/hr</span><span class=\"hqt\" style=\"display:none\">46 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">48 km/hr</span><span class=\"hqt\" style=\"display:none\">48 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Distance covered by A = 36 * 1/2 = 18 km</p><p>In 3 hours, B requires to increase the speed to catchup A by = 18/3 = 6 km/hr</p><p>B's speed = 36 + 6 = 42 km/hr</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Saket has his final year exam at XYZ Engineering College. He left his home and travelled at a certain speed so that he would reach the college on time. After travelling half the distance, he realised that he left his admit card at home. He turned back immediately and increased his speed by 50% and reached his home. As compared to his original speed, by what percent should Saket increase his speed so that he still reaches the college on time?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2366;&#2325;&#2375;&#2340; &#2325;&#2366; XYZ &#2311;&#2306;&#2332;&#2368;&#2344;&#2367;&#2351;&#2352;&#2367;&#2306;&#2327; &#2325;&#2377;&#2354;&#2375;&#2332; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2361;&#2376; | &#2357;&#2361; &#2309;&#2346;&#2344;&#2375; &#2328;&#2352; &#2360;&#2375; &#2344;&#2367;&#2325;&#2354;&#2366; &#2324;&#2352; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2327;&#2340;&#2367; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2368; &#2340;&#2366;&#2325;&#2367; &#2357;&#2361; &#2325;&#2377;&#2354;&#2375;&#2332; &#2360;&#2350;&#2351; &#2360;&#2375; &#2346;&#2361;&#2369;&#2305;&#2330; &#2360;&#2325;&#2375; | &#2310;&#2343;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; , &#2313;&#2360;&#2375; &#2351;&#2366;&#2342; &#2310;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2357;&#2361; &#2309;&#2346;&#2344;&#2366; &#2319;&#2337;&#2350;&#2367;&#2335; &#2325;&#2366;&#2352;&#2381;&#2337; &#2328;&#2352; &#2346;&#2352; &#2361;&#2368; &#2349;&#2370;&#2354; &#2327;&#2351;&#2366; &#2361;&#2376; | &#2357;&#2361; &#2340;&#2369;&#2352;&#2344; &#2357;&#2366;&#2346;&#2360; &#2350;&#2369;&#2396;&#2366; &#2324;&#2352; &#2309;&#2346;&#2344;&#2368; &#2327;&#2340;&#2367; &#2350;&#2375;&#2306; 50% &#2325;&#2368; &#2348;&#2397;&#2379;&#2340;&#2352;&#2368; &#2325;&#2368; &#2324;&#2352; &#2309;&#2346;&#2344;&#2366; &#2328;&#2352; &#2346;&#2361;&#2369;&#2305;&#2330; &#2327;&#2351;&#2366; | &#2313;&#2360;&#2325;&#2368; &#2350;&#2370;&#2354; &#2327;&#2340;&#2367; &#2360;&#2375; &#2340;&#2369;&#2354;&#2344;&#2366; &#2346;&#2352; , &#2360;&#2366;&#2325;&#2375;&#2340; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2327;&#2340;&#2367; &#2348;&#2397;&#2366;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; &#2357;&#2361; &#2309;&#2349;&#2368; &#2349;&#2368; &#2325;&#2377;&#2354;&#2375;&#2332; &#2360;&#2350;&#2351; &#2360;&#2375; &#2346;&#2361;&#2369;&#2305;&#2330; &#2360;&#2325;&#2375; ?</p></span>",
    "options": [
      "<span class=\"eqt\">250%</span><span class=\"hqt\" style=\"display:none\">250%</span>",
      "<span class=\"eqt\">300%</span><span class=\"hqt\" style=\"display:none\">300%</span>",
      "<span class=\"eqt\">500%</span><span class=\"hqt\" style=\"display:none\">500%</span>",
      "<span class=\"eqt\">450%</span><span class=\"hqt\" style=\"display:none\">450%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Suppose the distance between home and college is 12 km and the speed is 2 kmph. It would take 6 hrs to reach college. When he reaches half way, he has already spent 3 hours. He turns back at a speed of 3 kmph and takes 6/3 = 2 hours to reach home. Now, he has only 1 hour to reach college. So the speed must be 12 kmph. Thus the increase in speed is (12-2)/2  X 100 = 500%. </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>A person leaves for his office at 8:45 am everyday and reaches at 9:35 am by driving at 54 km/hr. Today, he left home at the same time but his car broke down at 9:05 am. He took 15 minutes to fix the car and started driving again but at 45 km/hr speed. At what time will he reach his office today?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2352;&#2379;&#2332;&#2366;&#2344;&#2366; 8:45 &#2348;&#2332;&#2375; &#2360;&#2369;&#2348;&#2361; &#2309;&#2346;&#2344;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2325;&#2354;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 54 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2337;&#2381;&#2352;&#2366;&#2311;&#2357;&#2367;&#2306;&#2327; &#2325;&#2352;&#2325;&#2375; 9:35 &#2348;&#2332;&#2375; &#2360;&#2369;&#2348;&#2361; &#2346;&#2361;&#2369;&#2306;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2310;&#2332; &#2357;&#2361; &#2309;&#2346;&#2344;&#2375; &#2328;&#2352; &#2360;&#2375; &#2313;&#2360;&#2368; &#2360;&#2350;&#2351; &#2346;&#2352; &#2344;&#2367;&#2325;&#2354;&#2366; &#2346;&#2352;&#2344;&#2381;&#2340;&#2369; 9:05 &#2348;&#2332;&#2375; &#2313;&#2360;&#2325;&#2368; &#2325;&#2366;&#2352; &#2393;&#2352;&#2366;&#2348; &#2361;&#2379; &#2327;&#2351;&#2368;&#2404; &#2325;&#2366;&#2352; &#2325;&#2379; &#2336;&#2368;&#2325; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; 15 &#2350;&#2367;&#2344;&#2335; &#2325;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2366; &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2313;&#2360;&#2344;&#2375; 45 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2330;&#2354;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;&#2404; &#2310;&#2332; &#2357;&#2361; &#2325;&#2367;&#2360; &#2360;&#2350;&#2351; &#2340;&#2325; &#2309;&#2346;&#2344;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2354;&#2351; &#2346;&#2361;&#2369;&#2306;&#2330;&#2375;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">9:50 am</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2348;&#2361; 9:50</span>",
      "<span class=\"eqt\">9:41 am</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2348;&#2361; 9:41</span>",
      "<span class=\"eqt\">9:56 am</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2348;&#2361; 9:56</span>",
      "<span class=\"eqt\">10:05 am</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2348;&#2361; 10:05</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Time taken by the person to travel to his office everyday = 8:45 am to 9:35 am, i.e., 50 minutes.</p><p>Hence, distance travelled from home to office = 54 * (50/60) = 45 km</p><p>Today, he drove for 20 minutes at 54 km/hr, so distance travelled for 20 minutes = 54 * (20/60) = 18 km</p><p>Distance left to cover = 45  -  18 = 27 km</p><p>Also, he took 15 minutes to repair the car, then the time when he restarts the car was 9:20 am.</p><p>So, time taken to travel remaining distance = 27/45 = 0.6 hr = 36 minutes</p><p>Hence, from 9:20 am, he takes 36 minutes to reach office, i.e., he reaches at 9:56 am.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Two bullets were fired at a place at an interval of 38 minutes. A person approaching the firing point in his car hears the two sounds at an interval of 36 minutes. The speed of sound is 330m/s. What is the speed of car(in km/hr)?</p></span><span class=\"hqt\" style=\"display:none\"><p>38 &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2366;&#2354; &#2346;&#2352; &#2319;&#2325; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2342;&#2379; &#2327;&#2379;&#2354;&#2367;&#2351;&#2366;&#2305; &#2330;&#2354;&#2366;&#2351;&#2368; &#2327;&#2312;&#2306; &#2341;&#2368;&#2306;&#2404; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2309;&#2346;&#2344;&#2368; &#2325;&#2366;&#2352; &#2350;&#2375;&#2306; &#2344;&#2367;&#2358;&#2366;&#2344;&#2375;&#2348;&#2366;&#2395;&#2368; &#2360;&#2381;&#2341;&#2354; &#2325;&#2375; &#2346;&#2366;&#2360; &#2346;&#2361;&#2369;&#2305;&#2330;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 36 &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2366;&#2354; &#2346;&#2352; &#2342;&#2379; &#2343;&#2381;&#2357;&#2344;&#2367;&#2351;&#2366;&#2305; &#2360;&#2369;&#2344;&#2340;&#2366; &#2361;&#2376;&#2404; &#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2368; &#2327;&#2340;&#2367; 330 &#2350;&#2368;/&#2360;&#2375;&#2325;&#2306;&#2337; &#2361;&#2376;&#2404; &#2325;&#2366;&#2352; &#2325;&#2368; &#2327;&#2340;&#2367; (&#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">60</span><span class=\"hqt\" style=\"display:none\">60</span>",
      "<span class=\"eqt\">68</span><span class=\"hqt\" style=\"display:none\">68</span>",
      "<span class=\"eqt\">72</span><span class=\"hqt\" style=\"display:none\">72</span>",
      "<span class=\"eqt\">66</span><span class=\"hqt\" style=\"display:none\">66</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Distance travelled by the man in 36 minutes is equal to the distance travelled by sound in (38  -  36) = 2 minutes.</p> <p>Now let the speed of the car be s km/hr.</p> <p>s x 36/60 = 330 x 18/5 x 2/60</p> <p>=&gt; s = 66 x 18 x 2/36 = 66 km/h</p>",
    "question_index": 5
  },

    "question": "<span class=\"eqt\"><p>Monique travels a distance of 960 km, some distance by train and rest by bus. Monique takes 7 hours if she travels 600 km by train and rest by bus. She takes 7 hours 20 minutes when she covers 560 km by bus and rest by train, then what is the speed of the train?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2379;&#2344;&#2367;&#2325; 960 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2325;&#2369;&#2331; &#2342;&#2370;&#2352;&#2368; &#2335;&#2381;&#2352;&#2375;&#2344; &#2360;&#2375; &#2324;&#2352; &#2358;&#2375;&#2359; &#2342;&#2370;&#2352;&#2368; &#2348;&#2360; &#2360;&#2375;&#2404; &#2351;&#2342;&#2367; &#2350;&#2379;&#2344;&#2367;&#2325; 600 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2335;&#2381;&#2352;&#2375;&#2344; &#2360;&#2375; &#2324;&#2352; &#2358;&#2375;&#2359; &#2342;&#2370;&#2352;&#2368; &#2348;&#2360; &#2360;&#2375; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2375; 7 &#2328;&#2306;&#2335;&#2375; &#2325;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; 560 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2348;&#2360; &#2360;&#2375; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2358;&#2375;&#2359; &#2342;&#2370;&#2352;&#2368; &#2335;&#2381;&#2352;&#2375;&#2344; &#2360;&#2375; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2340;&#2379; &#2313;&#2360;&#2375; 7 &#2328;&#2306;&#2335;&#2375; 20 &#2350;&#2367;&#2344;&#2335; &#2325;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2381;&#2352;&#2375;&#2344; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [

    "correct_option_id": 3,
    "solution": "<p>Let speed of train be t km/h and speed of bus be b km/h</p><p>600/t + 360/b = 7 ---(1)</p><p>And 400/t + 560/b = 22/3 ---(2)</p><p>Solving both equations, we get</p><p>t = 150 km/h and b = 120 km/h</p>",

    "question": "<span class=\"eqt\"><p>Ram drive his car from Varanasi to Lucknow via Allahabad and distance between Allahabad and Lucknow is 8/5 times of the distance between Varanasi and Allahabad. The ratio of average speed of the car from Varanasi to Allahabad and that of from Allahabad to Lucknow is 2: 5. Find average speed from Allahabad to Lucknow if the average speed for the entire journey was 91 km/h?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2350; &#2309;&#2346;&#2344;&#2368; &#2325;&#2366;&#2352; &#2357;&#2366;&#2352;&#2366;&#2339;&#2360;&#2368; &#2360;&#2375; &#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342; &#2361;&#2379;&#2340;&#2375; &#2361;&#2369;&#2319; &#2354;&#2326;&#2344;&#2314; &#2325;&#2375; &#2354;&#2367;&#2319; &#2330;&#2354;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342; &#2324;&#2352; &#2354;&#2326;&#2344;&#2314; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2357;&#2366;&#2352;&#2366;&#2339;&#2360;&#2368; &#2324;&#2352; &#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2366; 8/5 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2357;&#2366;&#2352;&#2366;&#2339;&#2360;&#2368; &#2360;&#2375; &#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342; &#2324;&#2352; &#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342; &#2360;&#2375; &#2354;&#2326;&#2344;&#2314; &#2325;&#2368; &#2325;&#2366;&#2352; &#2325;&#2368; &#2324;&#2360;&#2340; &#2327;&#2340;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2:5 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2370;&#2352;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2324;&#2360;&#2340; &#2327;&#2340;&#2367; 91 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2341;&#2368;, &#2340;&#2379; &#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342; &#2360;&#2375; &#2354;&#2326;&#2344;&#2314; &#2325;&#2368; &#2324;&#2360;&#2340; &#2327;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">138.5 km/h</span><span class=\"hqt\" style=\"display:none\">138.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">156.5 km/h</span><span class=\"hqt\" style=\"display:none\">156.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">134.5 km/h</span><span class=\"hqt\" style=\"display:none\">134.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">143.5 km/h</span><span class=\"hqt\" style=\"display:none\">143.5 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let distance between Allahabad and Lucknow be 8x km and Varanasi and Allahabad be 5x km.</p><p>Also let the speed between Varanasi and Allahabad be 2y km/h and that of between Allahabad and Lucknow be 5y km/h, respectively.</p><p>Total time to travel from Varanasi to Lucknow = 5x/(2y) + 8x/(5y) = 41x/(10y) Hours</p><p>Total distance = 8x + 5x = 13x km</p><p>According to the question,</p><p>13x/(41x/10y) = 91</p><p>=&gt; 130y/41 = 91</p><p>=&gt; y = 91 * 41/130</p><p>=&gt; y = 28.7</p><p>Hence, average speed from Allahabad to Lucknow = 5y = 5 * 28.7 = 143.5 km/h</p>",
    "question_index": 7
  },

    "question": "<span class=\"eqt\"><p>Car A can travel 4 km less than car B in 24 min and when speed of car A is increased to 15/11 times its original speed, then car A can travel 2.4 km more in 24 min than car B, then find the actual speed of car A.</p></span><span class=\"hqt\" style=\"display:none\"><p>24 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352; A , &#2325;&#2366;&#2352; B &#2360;&#2375; 4 &#2325;&#2367;&#2350;&#2368; &#2325;&#2350; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2332;&#2348; &#2325;&#2366;&#2352; A &#2325;&#2368; &#2327;&#2340;&#2367; &#2313;&#2360;&#2325;&#2368; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2327;&#2340;&#2367; &#2360;&#2375; 15/11 &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; 24 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352; A, &#2325;&#2366;&#2352; B &#2360;&#2375; 2.4 &#2325;&#2367;&#2350;&#2368; &#2309;&#2343;&#2367;&#2325; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2366;&#2352; A &#2325;&#2368; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2327;&#2340;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">44 km/h</span><span class=\"hqt\" style=\"display:none\">44 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366;</span>",

    "question": "<span class=\"eqt\"><p>Mukul started running from one point towards another point. If he runs at the rate 15/4 km/h, he arrives the destination 12 minutes late. If Mukul traveled at the speed of 9/2 km/h, then he arrives 20 minutes early. What is distance between the two points?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2325;&#2369;&#2354; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; &#2325;&#2368; &#2323;&#2352; &#2342;&#2380;&#2396;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; 15/4 &#2325;&#2367;&#2350;&#2368; / &#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2342;&#2380;&#2396;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; &#2327;&#2306;&#2340;&#2357;&#2381;&#2351; &#2346;&#2352; 12 &#2350;&#2367;&#2344;&#2335; &#2342;&#2375;&#2352;&#2368; &#2360;&#2375; &#2346;&#2361;&#2369;&#2306;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2350;&#2369;&#2325;&#2369;&#2354; 9/2 &#2325;&#2367;&#2350;&#2368; / &#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2361; 20 &#2350;&#2367;&#2344;&#2335; &#2346;&#2361;&#2354;&#2375; &#2346;&#2361;&#2369;&#2306;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2342;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">15 km</span><span class=\"hqt\" style=\"display:none\">15 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">12 km</span><span class=\"hqt\" style=\"display:none\">12 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">18 km</span><span class=\"hqt\" style=\"display:none\">18 &#2325;&#2367;&#2350;&#2368;</span>",
      "<span class=\"eqt\">21 km</span><span class=\"hqt\" style=\"display:none\">21 &#2325;&#2367;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let original time taken by Mukul to traveled from one point to another point = x hours</p><p>According to the question,</p><p>15/4 * (x + 12/60) = 9/2 * (x  -  20/60)</p><p>=&gt; 15x + 3 = 18x  -  18 * 1/3</p><p>=&gt; 3x = 9</p><p>=&gt; x = 3 hours</p><p>So, distance between one point and another point = 15/4 * (3 + 1/5) = 12 km</p>",
    "question_index": 9
  },

    "question": "<span class=\"eqt\"><p>A man completed certain journey by a car. If he covered 30% of the distance at a speed of 30 km/hr, 60% distance at 20 km/hr and the remaining distance at 5 km/hr then what was his average speed during the entire journey?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2369;&#2352;&#2369;&#2359; &#2325;&#2369;&#2331; &#2342;&#2370;&#2352;&#2368; &#2325;&#2366;&#2352; &#2360;&#2375; &#2340;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;| &#2351;&#2342;&#2367; &#2357;&#2361; 30% &#2342;&#2370;&#2352;&#2368; 30 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352;/&#2328;&#2306;&#2335;&#2366;, 60% &#2342;&#2370;&#2352;&#2368; 20 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352;/&#2328;&#2306;&#2335;&#2366; &#2324;&#2352; &#2358;&#2375;&#2359; &#2342;&#2370;&#2352;&#2368; 5 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2340;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2370;&#2352;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2313;&#2360;&#2325;&#2368; &#2324;&#2360;&#2340; &#2327;&#2340;&#2367; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">20.25 km/hr</span><span class=\"hqt\" style=\"display:none\">20.25&#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">17.67 km/hr</span><span class=\"hqt\" style=\"display:none\">17.67 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">18.5 km/hr</span><span class=\"hqt\" style=\"display:none\">18.5 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352;/&#2328;&#2306;&#2335;&#2366;</span>",
      "<span class=\"eqt\">16.67 km/hr</span><span class=\"hqt\" style=\"display:none\">16.67 &#2325;&#2367;&#2354;&#2379;&#2350;&#2368;&#2335;&#2352;/&#2328;&#2306;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the total distance = 100a km</p> <p>Time taken to cover 30% of distance at 30 km/hr = 30a/30 = a hour</p> <p>Time taken to cover 60% of distance at 20 km/hr = 60a/20 = 3a hour</p> <p>Time taken to cover 10% of distance at 5 km/hr = 10a/5 = 2a hour</p> <p>Hence average speed = 100a/(a+3a+2a) = 16.67 km/hr</p>",
    "question_index": 10

    "question": "<span class=\"eqt\"><p>Pankaj travels from City A to City B with a speed of 35 km/h and from City B to City C with a speed of S km/h. If his average speed from City A to City C is 32 km/h and the ratio of the distance between A and B and that of between B and C is 7: 9 respectively, then find the value of S.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2306;&#2325;&#2332; &#2358;&#2361;&#2352; A &#2360;&#2375; &#2358;&#2361;&#2352; B &#2340;&#2325; 35 &#2325;&#2367;&#2350;&#2368; / &#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2358;&#2361;&#2352; B &#2360;&#2375; &#2358;&#2361;&#2352; C &#2340;&#2325; S &#2325;&#2367;&#2350;&#2368; / &#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2358;&#2361;&#2352; A &#2360;&#2375; &#2358;&#2361;&#2352; C &#2340;&#2325; &#2313;&#2360;&#2325;&#2368; &#2324;&#2360;&#2340; &#2327;&#2340;&#2367; 32 &#2325;&#2367;&#2350;&#2368; / &#2328;&#2306;&#2335;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; A &#2324;&#2352; B &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2341;&#2366; B &#2324;&#2352; C &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 7: 9 &#2361;&#2376;, &#2340;&#2379; S &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",

    "correct_option_id": 3,
    "solution": "<p>Let distance between A and B (AB) = 7x and distance between B and C (BC) = 9x</p><p>Average speed = Total distance/Total time</p><p>Total distance = 7x + 9x = 16x</p><p>Total time = <img width=57 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11768/image003.png\"></p><p><img width=93 height=108 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11768/image004.png\"></p><p>Value of S = 30</p>",

    "question": "<span class=\"eqt\"><p>Priyanka travels at the speed of 45 kmph for 5.4 hours and 39 kmph for 7 hours. In this way she covers four-fifths of the distance. At what average speed should she travel to cover the remaining distance in 3 hours?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2367;&#2351;&#2306;&#2325;&#2366; 45 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; 5.4 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; 39 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; 7 &#2328;&#2306;&#2335;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;| &#2311;&#2360; &#2340;&#2352;&#2368;&#2325;&#2375; &#2360;&#2375; &#2357;&#2361; &#2342;&#2370;&#2352;&#2368; &#2325;&#2366; 4/5 &#2349;&#2366;&#2327; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;| &#2313;&#2360;&#2375; &#2358;&#2375;&#2359; &#2342;&#2370;&#2352;&#2368; &#2325;&#2379; 3 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360;/&#2325;&#2367;&#2340;&#2344;&#2368; &#2324;&#2360;&#2340; &#2327;&#2340;&#2367; &#2360;&#2375; &#2313;&#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",

    "question": "<span class=\"eqt\"><p>A boy travels with speed s km/hr. Travelling with 20% less speed, the boy reaches his destination 40 minutes late and travelling with 4 km/hr more speed, he reaches his destination 20 minutes earlier. Find the value of 's'.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2354;&#2396;&#2325;&#2366; s km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; 20% &#2325;&#2350; &#2330;&#2366;&#2354; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2354;&#2337;&#2364;&#2325;&#2366; 40 &#2350;&#2367;&#2344;&#2335; &#2342;&#2375;&#2352;&#2368; &#2360;&#2375; &#2309;&#2346;&#2344;&#2375; &#2327;&#2306;&#2340;&#2357;&#2381;&#2351; &#2346;&#2352; &#2346;&#2361;&#2369;&#2305;&#2330;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 4 km/hr &#2325;&#2368; &#2309;&#2343;&#2367;&#2325; &#2330;&#2366;&#2354; &#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2357;&#2361; 20 &#2350;&#2367;&#2344;&#2335; &#2346;&#2361;&#2354;&#2375; &#2309;&#2346;&#2344;&#2375; &#2327;&#2306;&#2340;&#2357;&#2381;&#2351; &#2346;&#2352; &#2346;&#2361;&#2369;&#2305;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; 's' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "correct_option_id": 3,
    "solution": "<p>Actual speed = s km/hr</p><p>Let actual time = t hours</p><p>Then, distance covered = s * t..(i)</p><p>Travelling with 20% less speed, the boy reached his destination 40 minutes late. So,</p><p>Distance covered = (100  -  20)% of s * (t + 40/60)</p><p>= (80/100) * s * (t + 2/3)</p><p>= (4s/5) * (t + 2/3)..(ii)</p><p>From (i) and (ii), we have</p><p>s * t = (4s/5) * (t + 2/3)</p><p>15t = 4(3t + 2)</p><p>15t = 12t + 8</p><p>t = 8/3</p><p>And, travelling with 4 km/hr more speed, he reaches his destination 20 minutes earlier. So,</p><p>Distance covered = (s + 4) * (t  -  20/60)</p><p>= (s + 4) * (8/3  -  1/3)</p><p>= 7(s + 4)/3..(iii)</p><p>From (i) and (iii), we have</p><p>s * (8/3) = 7(s + 4)/3</p><p>8s = 7s + 28</p><p><b>s = 28</b></p>",
