<html lang="en">
<head>

<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>

                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">

        <div class="exam-header">

                    </div>

                    </div>
                    <div class="stat-item">

                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>

                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p><b>Directions: </b>Study the following information carefully and answer the related questions.</p><p>Following pie-chart represents the percentage distribution of number of quantity of (wheat + rice) sold from different shops.</p><p>Total quantity (wheat + rice) sold = 95000 kg</p><p><img width=399 height=302 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8454/image020.png\"></p><p>(Quantity of wheat sold from each shop is 7500 kg more than the quantity of rice sold from respective shop.)</p><p>What is the difference between quantity of rice sold from shop A and B taken together and quantity of wheat sold from shop E?</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;: </b>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2342;&#2369;&#2325;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; (&#2327;&#2375;&#2361;&#2370;&#2305; + &#2330;&#2366;&#2357;&#2354;) &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2348;&#2375;&#2330;&#2368; &#2327;&#2312; (&#2327;&#2375;&#2361;&#2370;&#2305; + &#2330;&#2366;&#2357;&#2354;) &#2325;&#2368; &#2325;&#2369;&#2354; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; = 95000 kg</p><p><img width=\"399\" height=\"302\" id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8454/image020.png\"></p><p>(&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344; &#2360;&#2375; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2327;&#2375;&#2361;&#2370;&#2305; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366;, &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2342;&#2369;&#2325;&#2366;&#2344; &#2360;&#2375; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2330;&#2366;&#2357;&#2354; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2360;&#2375; 7500 kg &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404;)</p><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2342;&#2369;&#2325;&#2366;&#2344; A &#2324;&#2352; B &#2360;&#2375; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2330;&#2366;&#2357;&#2354; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2340;&#2341;&#2366; &#2342;&#2369;&#2325;&#2366;&#2344; E &#2360;&#2375; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2327;&#2375;&#2361;&#2370;&#2305; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2300 kg</span><span class=\"hqt\" style=\"display:none\">2300 kg</span>",
      "<span class=\"eqt\">2500 kg</span><span class=\"hqt\" style=\"display:none\">2500 kg</span>",
      "<span class=\"eqt\">2100 kg</span><span class=\"hqt\" style=\"display:none\">2100 kg</span>",
      "<span class=\"eqt\">2700 kg</span><span class=\"hqt\" style=\"display:none\">2700 kg</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Quantity of (wheat + rice) sold from shop:</p><p>A = 28% of 95000 = 26600 kg</p><p>B = 12% of 95000 = 11400 kg</p><p>C = 20% of 95000 = 19000 kg</p><p>D = 18% of 95000 = 17100 kg</p><p>E = 22% of 95000 = 20900 kg</p><p>Quantity of wheat sold from shop:</p><p>A = (26600 + 7500)/2 = 17050 kg</p><p>B = (11400 + 7500)/2 = 9450 kg</p><p>C = (19000 + 7500)/2 = 13250 kg</p><p>D = (17100 + 7500)/2 = 12300 kg</p><p>E = (20900 + 7500)/2 = 14200 kg</p><p>Quantity of rice sold from shop:</p><p>A = 17050  -  7500 = 9550 kg</p><p>B = 9450  -  7500 = 1950 kg</p><p>C = 13250  -  7500 = 5750 kg</p><p>D = 12300  -  7500 = 4800 kg</p><p>E = 14200  -  7500 = 6700 kg</p><p><b>In tabular form:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\" rowspan=\"2\">Shop</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\" colspan=\"3\">Quantity sold (in kg)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Wheat + rice</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Wheat</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rice</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">26600</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">17050</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9550</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">11400</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9450</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1950</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">19000</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">13250</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5750</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">17100</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">12300</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4800</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20900</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">14200</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6700</td></tr></table><p>quantity of rice sold from shop A and B taken together = 9550 + 1950 = 11500 kg</p><p>quantity of wheat sold from shop E = 14200 kg</p><p>Therefore, difference = 14200  -  11500 = <b>2700 kg</b></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The following pie chart represents percentage wise distribution of total number of students in a class in five different groups.</p><p>Total number of students in the class = 1800</p><p><img width=438 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p5292/image004.png\"></p><p>Out of the total number of students in Blue group, respective ratio of boys and girls is 3:2 and out of the total number of students in Green group, respective ratio of boys and girls is 4:3. Number of girls in Blue group is approximately what percent of the number of girls in Green group?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2346;&#2366;&#2306;&#2330; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340;&#2357;&#2366;&#2352; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;|</p><p>&#2325;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = 1800</p><p><img width=\"438\" height=\"336\" id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p5292/image004.png\"></p><p>&#2344;&#2368;&#2354;&#2375; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2360;&#2375;, &#2354;&#2396;&#2325;&#2375; &#2324;&#2352; &#2354;&#2396;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3:2 &#2361;&#2376; &#2324;&#2352; &#2361;&#2352;&#2375; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2360;&#2375;, &#2354;&#2396;&#2325;&#2375; &#2324;&#2352; &#2354;&#2396;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4:3 &#2361;&#2376;| &#2344;&#2368;&#2354;&#2375; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2354;&#2396;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2352;&#2375; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2354;&#2396;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">87%</span><span class=\"hqt\" style=\"display:none\">87%</span>",
      "<span class=\"eqt\">85%</span><span class=\"hqt\" style=\"display:none\">85%</span>",
      "<span class=\"eqt\">79%</span><span class=\"hqt\" style=\"display:none\">79%</span>",
      "<span class=\"eqt\">83%</span><span class=\"hqt\" style=\"display:none\">83%</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Total number of students in Blue group = 25/100 x 1800</p><p>= 450</p><p>Number of girls in Blue group = 2/5 x 450 = 180</p><p>Total number of students in Green group = 28/100 x 1800</p><p>= 504</p><p>Number of girls in Green group = 3/7 x 504 = 216</p><p>Required percentage = 180/216 x 100</p><p>= 83.33%</p><p>= 83% approx.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Study the following information carefully and answer the related question.</p><p>Following pie-chart represents the data regarding percentage break-ups of number of viewers of news channel from different towns.</p><p><img width=392 height=198 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p5949/image004.png\"></p><p>Viewers from town P and R together are approximately what percent less than viewers from town S and U together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351;-&#2310;&#2352;&#2375;&#2326; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2358;&#2361;&#2352;&#2379;&#2306; &#2360;&#2375; &#2360;&#2350;&#2366;&#2330;&#2366;&#2352; &#2330;&#2376;&#2344;&#2354; &#2325;&#2375; &#2342;&#2352;&#2381;&#2358;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2310;&#2306;&#2325;&#2396;&#2375; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"392\" height=\"198\" id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p5949/image004.png\"></p><p>&#2358;&#2361;&#2352; P &#2324;&#2352; &#2358;&#2361;&#2352; R &#2360;&#2375; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2342;&#2352;&#2381;&#2358;&#2325;, &#2358;&#2361;&#2352; S &#2324;&#2352; &#2358;&#2361;&#2352; U &#2360;&#2375; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2342;&#2352;&#2381;&#2358;&#2325;&#2379;&#2306; &#2360;&#2375; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2350; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">36%</span><span class=\"hqt\" style=\"display:none\">36%</span>",
      "<span class=\"eqt\">40%</span><span class=\"hqt\" style=\"display:none\">40%</span>",
      "<span class=\"eqt\">45%</span><span class=\"hqt\" style=\"display:none\">45%</span>",
      "<span class=\"eqt\">51%</span><span class=\"hqt\" style=\"display:none\">51%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let total viewer = a</p><p>Viewers from town P and R together = (12 + 10)% of a = 0.22a</p><p>Viewers from town S and U together = (26 + 11)% of a = 0.37a</p><p>Difference = 0.37a  -  0.22a = 0.15a</p><p>Percentage = (0.15a/0.37a) x 100 = 40% (approx.)</p>",
    "question_index": 2
