<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">

                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->

        <!-- Main Content -->

            <!-- Question Area -->

                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>

                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>

                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>

                    </div>
                    <div class="stat-item">

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The ratio between the angles of a quadrilateral is 7:5:2:6. If the difference between the largest and smallest angle of the quadrilateral is 25% more than one of the angles of a parallelogram, then what can be inferred about the largest angle of the parallelogram?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2375; &#2325;&#2379;&#2339;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 7:5:2:6 &#2361;&#2376;| &#2351;&#2342;&#2367; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2375; &#2325;&#2379;&#2339;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2375; &#2324;&#2352; &#2319;&#2325; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2375; &#2325;&#2379;&#2339; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2360;&#2368; &#2319;&#2325; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2375; &#2325;&#2379;&#2339; &#2360;&#2375; 25% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2344;&#2381;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2375; &#2325;&#2379;&#2339; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2366; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">100</span><span class=\"hqt\" style=\"display:none\">100</span>",
      "<span class=\"eqt\">108</span><span class=\"hqt\" style=\"display:none\">108</span>",
      "<span class=\"eqt\">112.5</span><span class=\"hqt\" style=\"display:none\">112.5</span>",
      "<span class=\"eqt\">115</span><span class=\"hqt\" style=\"display:none\">115</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The ratio between the angles of a quadrilateral is 7:5:2:6</p><p>The sum of the angles of the quadrilateral is 360 degrees.</p><p>Hence, 7x + 5x + 2x + 6x = 360</p><p>or 20x = 360</p><p>or x = 18 degrees.</p><p>Hence the angles are 126, 90, 36 and 108 degrees respectively.</p><p>Difference between the largest and smallest angle = 90 degrees.</p><p>Now that is 25% more than one of the angles of a parallelogram.</p><p>Thus one of the angles of a parallelogram is 72 degrees, and it's adjacent angle is 108 degrees.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If ABCD is a square and BCE is an equilateral triangle, what is the measure of the angle DEC?</p> <p><img width=164 height=106 id=\"Picture 72\" src=\"https://u1.oliveboard.in/exams/solution/http://188.166.225.173/images/vpimages/batch4/image451.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; ABCD &#2319;&#2325; &#2357;&#2352;&#2381;&#2327; &#2361;&#2376; &#2324;&#2352; BCE &#2319;&#2325; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2379;&#2339; DEC &#2325;&#2366; &#2350;&#2366;&#2346; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p><img width=\"164\" height=\"106\" id=\"Picture 72\" src=\"https://u1.oliveboard.in/exams/solution/vpimages/batch4/image451.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">15 degrees</span><span class=\"hqt\" style=\"display:none\">15 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">30 degrees</span><span class=\"hqt\" style=\"display:none\">30 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">20 degrees</span><span class=\"hqt\" style=\"display:none\">20 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">45 degrees</span><span class=\"hqt\" style=\"display:none\">45 &#2337;&#2367;&#2327;&#2381;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": " <p><img width=227 height=132 id=\"Picture 73\" src=\"https://u1.oliveboard.in/exams/solution/http://188.166.225.173/images/vpimages/batch4/image452.png\"></p> <p>In &#916;DEC, &#8736;DCE=90+60=150 degrees </p> <p>&#8736;CDE = &#8736;DEC = <img width=104 height=41 src=\"https://u1.oliveboard.in/exams/solution/http://188.166.225.173/images/vpimages/batch4/image453.png\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In following figure PS||QR and PS =UV = QR and UV||PS, then what is the m&ang;UQR?</p><p><img width=265 height=222 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3051/image002.png\" ></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; PS||QR &#2324;&#2352; PS =UV = QR &#2324;&#2352; UV||PS &#2361;&#2376;, &#2340;&#2379; m&#8736;UQR &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375; ?</p><p><img width=\"265\" height=\"222\" id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3051/image002.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">120&deg;</span><span class=\"hqt\" style=\"display:none\">120<sup>0</sup></span>",
      "<span class=\"eqt\">60&deg;</span><span class=\"hqt\" style=\"display:none\">60<sup>0</sup></span>",
      "<span class=\"eqt\">30&deg;</span><span class=\"hqt\" style=\"display:none\">30<sup>0</sup></span>",
      "<span class=\"eqt\">other than above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2360;&#2375; &#2309;&#2344;&#2381;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>As per given in the diagram PS||QR and PS||UV so UV||PS and quadrilateral UVQR is a parallelogram.</p><p>m&ang;VUQ = 120<sup>0</sup></p><p>m&ang;VUQ + m&ang;UQR = 180........................(Adjacent angles of parallelogram are supplementary).</p><p>m&ang;UQR =60<sup>0</sup>.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Trapezium MNOP is shown in figure where MN || OP and length of parallel sides are 12 cm and 17 cm respectively. Find the length of diagonal PN of the trapezium if area of trapezium is 72.5 cm<sup>2</sup>.</p><p><img width=248 height=118 id=\"Picture 18\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3147/image006.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2354;&#2350;&#2381;&#2348; MNOP &#2325;&#2379; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2332;&#2361;&#2366;&#2306; MN || OP &#2324;&#2352; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 12 &#2360;&#2375;.&#2350;&#2368;. &#2324;&#2352; 17 &#2360;&#2375;.&#2350;&#2368;. &#2361;&#2376; | &#2351;&#2342;&#2367; &#2360;&#2350;&#2354;&#2350;&#2381;&#2348; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 72.5 &#2360;&#2375;.&#2350;&#2368;.<sup>2</sup> &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2354;&#2350;&#2381;&#2348; &#2325;&#2375; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339; PN &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306; |</p><p><img width=248 height=118 id=\"Picture 18\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3147/image006.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">12 cm</span><span class=\"hqt\" style=\"display:none\">12 &#2360;&#2375;.&#2350;&#2368;.</span>",
      "<span class=\"eqt\">13 cm</span><span class=\"hqt\" style=\"display:none\">13 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">14 cm</span><span class=\"hqt\" style=\"display:none\">14 &#2360;&#2375;.&#2350;&#2368;.</span>",
      "<span class=\"eqt\">15 km</span><span class=\"hqt\" style=\"display:none\">15 &#2360;&#2375;.&#2350;&#2368;.</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Draw a line NA perpendicular to OP.</p><p><img width=248 height=118 id=\"Picture 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3147/image007.png\"></p><p>Area of trapezium = &frac12; * (Sum of parallel sides) * (Perpendicular distance between parallel sides)</p><p>=&gt; 72.5 = &frac12; * (12 + 17) * NA</p><p>=&gt; NA = 145/29 = 5 cm</p><p>MNAP is a rectangle-</p><p>=&gt; PN<sup>2</sup> = MN<sup>2</sup> + NA<sup>2</sup></p><p>=&gt; PN<sup>2</sup> = 12<sup>2</sup> + 5<sup>2</sup> = 144 + 25 = 169</p><p>=&gt; PN = 13 cm</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In given trapezium, what is the value of d?</p><p><img width=248 height=103 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3031/image004.png\" ></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2354;&#2306;&#2348; &#2350;&#2375;&#2306;, D &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p><img width=\"248\" height=\"103\" id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3031/image004.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">3.</span><span class=\"hqt\" style=\"display:none\">3.</span>",
      "<span class=\"eqt\">5.</span><span class=\"hqt\" style=\"display:none\">5.</span>",
      "<span class=\"eqt\">4.</span><span class=\"hqt\" style=\"display:none\">4.</span>",
      "<span class=\"eqt\">2.</span><span class=\"hqt\" style=\"display:none\">2.</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>4d -2 is the mid-segment of trapezium</p><p>(4d-2) = (1/2) x (12 +16) =(1/2) x 28 =14</p><p>4d -2 = 14</p><p>d = 4</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What is the value of &ang;COD if ABCD is a square with &ang;BEO = 55&deg; and E is the mid-point of side AB?</p><p><img width=158 height=125 id=\"Picture 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3879/image003.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; ABCD &#2319;&#2325; &#2357;&#2352;&#2381;&#2327; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#8736;BEO = 55&deg; &#2361;&#2376; &#2324;&#2352; E &#2349;&#2369;&#2332;&#2366; AB &#2325;&#2366; &#2350;&#2343;&#2381;&#2351; &#2348;&#2367;&#2306;&#2342;&#2369; &#2361;&#2376;, &#2340;&#2379; &#8736;COD &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p><p><img width=\"158\" height=\"125\" id=\"Picture 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3879/image003.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">60&deg;</span><span class=\"hqt\" style=\"display:none\">60<sup>0</sup></span>",
      "<span class=\"eqt\">70&deg;</span><span class=\"hqt\" style=\"display:none\">70<sup>0</sup></span>",
      "<span class=\"eqt\">80&deg;</span><span class=\"hqt\" style=\"display:none\">80<sup>0</sup></span>",
      "<span class=\"eqt\">90&deg;</span><span class=\"hqt\" style=\"display:none\">90<sup>0</sup></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#8736;BEO = &#8736;OCD = 55<sup>0</sup> [Alternate angles.]</p><p>In &#9651;OCD,</p><p>&#8736;OCD = 55<sup>0</sup></p><p>&#8736;ODC = 45<sup>0 </sup>[BD is the diameter.]</p><p>&#8736;OCD + &#8736;ODC + &#8736;COD = 180<sup>0</sup></p><p>55<sup>0</sup> + 45<sup>0</sup> + &#8736;COD = 180<sup>0</sup></p><p>&#8736;COD = 180<sup>0</sup>  -  (55<sup>0</sup> + 45<sup>0</sup>)</p><p>&#8736;COD = 80<sup>0</sup></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>What is the length of the base of the parallelogram whose corresponding altitude is thrice the base and the area of the parallelogram is 147 cm&#178;?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2332;&#2367;&#2360;&#2325;&#2368; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2314;&#2306;&#2330;&#2366;&#2312;, &#2310;&#2343;&#2366;&#2352; &#2325;&#2375; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2361;&#2376; &#2324;&#2352; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 147 &#2360;&#2375;&#2350;&#2368;&#178; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2354;&#2350;&#2381;&#2348;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">4 cm</span><span class=\"hqt\" style=\"display:none\">4 &#2360;&#2375;.&#2350;&#2368;.</span>",
      "<span class=\"eqt\">5 cm</span><span class=\"hqt\" style=\"display:none\">5 &#2360;&#2375;.&#2350;&#2368;.</span>",
      "<span class=\"eqt\">6 cm</span><span class=\"hqt\" style=\"display:none\">6 &#2360;&#2375;.&#2350;&#2368;.</span>",
      "<span class=\"eqt\">7 cm</span><span class=\"hqt\" style=\"display:none\">7 &#2360;&#2375;.&#2350;&#2368;.</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the base of the parallelogram be x cm.</p><p>&#8756; Height of the parallelogram = 3x cm.</p><p>Area of the parallelogram = x * 3x</p><p>=&gt; 3x&#178; = 147</p><p>=&gt; x&#178; = 49</p><p>=&gt; x = 7 cm</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A rhombus ABCD has the diagonals of length 16cm and 12 cm. What is the distance between its parallel lines?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; ABCD &#2325;&#2375; &#2357;&#2367;&#2325;&#2352;&#2381;&#2339;&#2379;&#2306; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 16 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 12 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2368; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2352;&#2375;&#2326;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">19.2 cm</span><span class=\"hqt\" style=\"display:none\">19.2 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">38.4 cm</span><span class=\"hqt\" style=\"display:none\">38.4 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">9.6 cm</span><span class=\"hqt\" style=\"display:none\">9.6 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">10 cm</span><span class=\"hqt\" style=\"display:none\">10 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=340 height=196 id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11918/image013.png\"></p><p>Since the diagonals of rhombus perpendicularly bisects each other</p><p>Side of rhombus = ((12/2)<sup>2</sup> + (16/2)<sup>2</sup>)<sup>1/2</sup> = (36 + 64)<sup>1/2</sup> = 10 cm</p><p>Area of the rhombus = &frac12; * product of diagonals = &frac12; * 16*12 = 96cm<sup>2</sup></p><p>Area of rhombus = Side * distance between parallel lines</p><p>96cm<sup>2</sup> = 10*distance between parallel lines</p><p>Distance between parallel lines = 96/10 = 9.6cm</p>",

    "question": "<span class=\"eqt\"><p>If a 30-sided polygon is transformed into a 13-sided polygon, then the sum of interior angles of 30-sided polygon is reduced by</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; 30-&#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2379; 13-&#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; 30-&#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2375; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2375; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; &#2325;&#2367;&#2340;&#2344;&#2366; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>Since in quadrilateral UVWX, all sides are equal and &#8736;XUV = 90<sup>o</sup>, so UVWX is a square.</p><p>Let the square UVWX looks like this, when UV is produced to a point Y and UW is produced to a point Z:</p><p><img width=316 height=196 id=\"Picture 22\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image023.png\"></p><p>UW is a diagonal (i.e., a bisector), so, &#8736;XUW =&#8736;WUV=&#8736;VWU=&#8736;UWX=90/2 =45<sup>o</sup></p><p>UY is a straight line with angle 180<sup>o</sup>. So, &#8736;YVW=180-90 =90<sup>o</sup></p><p>Similarly, &#8736;VWO = 90<sup>o</sup></p><p>&#8736;OWZ=&#8736;UWX=45<sup>o</sup> (Vertically opposite angles)</p><p>&#8756; <img width=13 height=8 id=\"Picture 59\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image020.png\" >YVW + <img width=13 height=8 id=\"Picture 60\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image020.png\" >ZWV = <img width=13 height=8 id=\"Picture 61\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image020.png\" >YVW + <img width=13 height=8 id=\"Picture 62\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image020.png\" >OWZ+<img width=13 height=8 id=\"Picture 63\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18085/image020.png\" >VWO</p><p>= 90+90+45 =225<sup>o</sup></p>",

    "question": "<span class=\"eqt\"><p>In a parallelogram, ratio of length and breadth is 9: 7. If distance between bigger sides is 21 cm and area of parallelogram is 1100 cm<sup>2</sup><sub>,</sub> find distance between shorter sides.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2350;&#2375;&#2306; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 9:7 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2348;&#2337;&#2364;&#2368; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 21 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 1100 &#2360;&#2375;&#2350;&#2368;<sup>2</sup> &#2361;&#2376;, &#2340;&#2379; &#2331;&#2379;&#2335;&#2368; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>What is the ratio of the number of sides of polygon whose sum of interior angles is 4500&deg; to the polygon whose sum of interior angles is 720&deg;?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; 4500<sup>o</sup> &#2357;&#2366;&#2354;&#2375; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2340;&#2341;&#2366; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; 720<sup>o</sup> &#2357;&#2366;&#2354;&#2375; &#2342;&#2370;&#2360;&#2352;&#2368; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">9:4</span><span class=\"hqt\" style=\"display:none\">9:4</span>"

    "correct_option_id": 1,
    "solution": "<p>According to the Question,</p><p>If N is the number of sides of the polygon, then sum of its interior angles = (N-2) x 180&deg;</p><p>Now, number of sides of polygon whose sum of interior angles is 4500&deg; = (N&#173;&#173;<sub>1</sub>-2) x 180&deg;</p><p>N&#173;&#173;<sub>1</sub> = (4500/180) +2</p><p>N&#173;&#173;<sub>1</sub>=25+2 = 27 sides</p><p>And, number of sides of polygon whose sum of interior angles is 720&deg; = (N<sub>2</sub>-2) x 180&deg;</p><p>N&#173;&#173;<sub>2</sub> = (720/180) +2</p><p>N&#173;&#173;<sub>2</sub> =4+2 = 6 sides</p><p>To find the ratio of number of sides of polygon whose sum of interior angles is 4500&deg; to the polygon whose sum of interior angles is 720&deg; = N<sup>&#173;</sup><sub>1</sub>/N<sub>2</sub> = 27/6 = 9/2 = 9:2 Ans.</p>",

    "question": "<span class=\"eqt\"><p>The ratio of number of sides of two regular polygons is 2:3. If the sum of one polygon's interior angles is added to the sum of the other polygon's interior angles, then the added value will be 1080&deg;. The measures of their exterior angles are  - </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2350; &#2360;&#2350;&#2348;&#2361;&#2369;&#2349;&#2369;&#2332;&#2379;&#2306; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2:3 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2319;&#2325; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2375; &#2309;&#2306;&#2340;: &#2325;&#2379;&#2339;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;, &#2342;&#2370;&#2360;&#2352;&#2375; &#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2375; &#2309;&#2306;&#2340;: &#2325;&#2379;&#2339;&#2379;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2332;&#2379;&#2337;&#2364;&#2366; &#2327;&#2351;&#2366; &#2350;&#2366;&#2344; 1080&deg; &#2361;&#2379;&#2327;&#2366;&#2404; &#2313;&#2344;&#2325;&#2375; &#2348;&#2361;&#2367;&#2325;&#2379;&#2339;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2346; &#2361;&#2376;&#2306; -</p></span>",

    "solution": "<p>Let, the number of sides of two regular polygons be n<sub>1</sub> and n<sub>2</sub>.</p><p>n<sub>1</sub>/n<sub>2 </sub>= 2/3</p><p>[(n<sub>1 </sub>- 2)  X  180 ] + [(n<sub>2 </sub>- 2)  X  180 ] = 1080&deg;</p><p>n<sub>1 </sub> -  2 + n<sub>2</sub>  -  2 = 1080/180 = 6</p><p>n<sub>1</sub> + n<sub>2 </sub>= 10</p><p>n<sub>1 </sub>+ 3n<sub>1</sub>/2 = 10</p><p>5n<sub>1</sub>/2 = 10</p><p>n<sub>1</sub>/2 = 2</p><p>n<sub>1 </sub>= 4</p><p>So, n<sub>2 </sub>= 6</p><p>Exterior angle of one polygon = 360/4 = 90&deg;</p><p>Exterior angle of the other polygon = 360/6 = 60&deg;</p>",
