<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is correct?</p><p>I. if x = 12, y = -2 and z = -10, then x<sup>3</sup> + y<sup>3</sup> + z<sup>3</sup> = 360.</p><p>II. if x + y = 48 and 4xy = 128, then 4x<sup>2</sup> + 4y<sup>2</sup> = 4480.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2351;&#2342;&#2367; x = 12, y = -2 &#2324;&#2352; z = -10 &#2361;&#2376;, &#2340;&#2379; x<sup>3</sup> + y<sup>3</sup> + z<sup>3</sup> = 360 &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2342;&#2367; x + y = 48 &#2324;&#2352; 4xy = 128 &#2361;&#2376;, &#2340;&#2379; 4x<sup>2</sup> + 4y<sup>2</sup> = 4480 &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>I if x = 12, y = -2 and z = -10, then x<sup>3</sup> + y<sup>3</sup> + z<sup>3</sup> = 360.</p><p>=&gt; Since, x + y + z = 12  -  2  -  10 = 0</p><p>So, x<sup>3</sup> + y<sup>3</sup> + z<sup>3</sup> = 3xyz = 3 * 12 * (-2) * (-10) = 720</p><p>Hence, I is not correct.</p><p>II if x + y = 48 and 4xy = 128, then 4x<sup>2</sup> + 4y<sup>2</sup> = 4480.</p><p>(x + y)<sup>2</sup> = x<sup>2</sup> + y<sup>2</sup> + 2xy</p><p>=&gt; 48<sup>2</sup> = x<sup>2</sup> + y<sup>2</sup> + 128/2</p><p>=&gt;2304  -  64 = x<sup>2</sup> + y<sup>2</sup></p><p>=&gt; 4x<sup>2</sup> + 4y<sup>2</sup> = 8960</p><p>Hence, II is not correct.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If a + b  -  c = 5 and ab  -  bc  -  ac = 10, then find the value of a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup>.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a + b - c = 5 &#2324;&#2352; ab - bc - ac = 10 &#2361;&#2376;, &#2340;&#2379; a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup> &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">40</span><span class=\"hqt\" style=\"display:none\">40</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Since, (a + b - c)<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> + c<sup>2 </sup>+ 2ab  -  2bc  -  2ca</p><p>a<sup>2</sup> + b<sup>2</sup> + c<sup>2 </sup>= (a + b  -  c)<sup>2 </sup> -  2(ab  -  bc  -  ca)</p><p>a<sup>2</sup> + b<sup>2</sup> + c<sup>2 </sup>= 5<sup>2</sup>  -  2 X 10 = 25  -  20 = 5</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If x + y + z = 1, then find the least value of&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x</span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">y</span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">z</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&nbsp;&#2351;&#2342;&#2367;  x + y + z = 1, &#2340;&#2379; &#2325;&#2366; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">x</span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">y</span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">z</span></div></div></p><p></p></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Given, x+y+z=1</p><p>We know that A.M.&ge;G.M.</p><p>and G.M.&ge;H.M.</p><p>therefore </p><p>A.M.&ge;H.M.</p><p><img width=155 height=64 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26945/image020.png\"> </p><p>&#10233;<img width=93 height=64 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26945/image021.png\"></p><p>&#10233; <img width=88 height=44 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26945/image022.png\"></p><p>Therefore the least value of 1/x + 1/y + 1/z is 9.</p><p>So option (c) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Solve the given set of three equations to get the value of the unknowns: </p><p>x + 2z = 3 </p><p>x + 2y + 3z = 5 </p><p>3x - 5z = -13</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2332;&#2381;&#2334;&#2366;&#2340; &#2350;&#2366;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2367;&#2319; &#2327;&#2319; &#2340;&#2368;&#2344; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2325;&#2379; &#2361;&#2354; &#2325;&#2352;&#2375;&#2306;: </p><p>x + 2z = 3 </p><p>x + 2y + 3z = 5 </p><p>3x - 5z = -13</p></span>",
    "options": [
      "<span class=\"eqt\">x = 0,y = -1,z = 2</span><span class=\"hqt\" style=\"display:none\">x = 0,y = -1,z = 2</span>",
      "<span class=\"eqt\">x = -1,y = 0,z = 2</span><span class=\"hqt\" style=\"display:none\">x = -1,y = 0,z = 2</span>",
      "<span class=\"eqt\">x = -1,y = 2,z = 0</span><span class=\"hqt\" style=\"display:none\">x = -1,y = 2,z = 0</span>",
      "<span class=\"eqt\">x = 2,y = 0,z = -1</span><span class=\"hqt\" style=\"display:none\">x = 2,y = 0,z = -1</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>We are given the following system of three equations with three unknowns x, y, and z:</p><p>X+ 2z=3(Equation 1)</p><p>x+2y +3z=5 (Equation 2)</p><p>3x-5z =-13 (Equation 3)</p><p>From Equation 1:</p><p>We can solve forx: x=3-2z</p><p>Substitute x = (3  -  2z) into Equations 2 and 3</p><p>Substitute into Equation 2:</p><p>(3-2z) + 2y +3z=5</p><p>3-2z+ 2y+3z=5</p><p>3+2y+z=5</p><p>2y+z=2</p><p>Now, we have</p><p>2y=2-z</p><p>y=(2-z)/2</p><p>Substitute into Equation 3:</p><p>3(3 -2z)-5z=-13</p><p>9 -6z-5z=-13</p><p>9-11z=-13</p><p>-11z=-22</p><p>z=2</p><p>From x=3-2z</p><p>expressions for x and y.</p><p>Now that we know z = 2, substitute this value into the</p><p>x=3-2(2)=3-4=-1</p><p>From y=(2-2)/2y=0</p><p>The solution to the system of equations is: x=-1, y=0 </p><p>z=2</p><p>The correct answer is option b.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>If p = 8.15, q = 9.06 and r = -17.21, then value of p<sup>3</sup> + q<sup>3</sup> + r<sup>3</sup> - 3pqr is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; p = 8.15, q = 9.06 &#2324;&#2352; r = -17.21 &#2361;&#2376;, &#2340;&#2379; p<sup>3</sup> + q<sup>3</sup> + r<sup>3</sup> - 3pqr &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">-3.81</span><span class=\"hqt\" style=\"display:none\">-3.81</span>",
      "<span class=\"eqt\">-5.62</span><span class=\"hqt\" style=\"display:none\">-5.62</span>",
      "<span class=\"eqt\">4.75</span><span class=\"hqt\" style=\"display:none\">4.75</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>p + q + r = 8.15 + 9.06  -  17.21 = 0</p><p>We know that, a + b + c = 0, then a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup>= 3abc</p><p>So, p<sup>3</sup> + q<sup>3</sup> + r<sup>3</sup> - 3pqr = 3pqr  -  3pqr = 0</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Find the value of:</p><p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-</p><p>align:center;display: block; padding: 0;\">p<sup>2</sup> - (q - r)<sup>2</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(p + r)<sup>2</sup> - q<sup>2</sup></span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">q<sup>2</sup> - (p - r)<sup>2</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(p + q)<sup>2</sup> - r<sup>2</sup></span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">r<sup>2</sup> - (p - q)<sup>2</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(q + r)<sup>2</sup> - p<sup>2</sup></span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-</p><p>align:center;display: block; padding: 0;\">p<sup>2</sup> - (q - r)<sup>2</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(p + r)<sup>2</sup> - q<sup>2</sup></span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">q<sup>2</sup> - (p - r)<sup>2</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(p + q)<sup>2</sup> - r<sup>2</sup></span></div>&nbsp;+&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">r<sup>2</sup> - (p - q)<sup>2</sup></span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">(q + r)<sup>2</sup> - p<sup>2</sup></span></div></div></p><p></p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=236 height=52 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24263/image054.png\"></p><p><img width=412 height=44 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24263/image055.png\"></p><p><img width=225 height=44 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24263/image056.png\"></p><p><img width=217 height=44 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24263/image057.png\"></p><p><img width=103 height=44 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24263/image058.png\"></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>If 9(a<sup>2</sup> +b<sup>2</sup>) +c<sup>2</sup> + 20 = 12(a +2b), then the value of &radic;(6a + 9b + 2c) is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 9(a<sup>2</sup> +b<sup>2</sup>) +c<sup>2</sup> + 20 = 12(a +2b) &#2361;&#2376;, &#2340;&#2379; &radic;(6a + 9b + 2c) &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",

    "question": "<span class=\"eqt\"><p>If a&#178; + b&#178; + c&#178; = 2(a + c - 1), then the value of a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup> = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a&#178; + b&#178; + c&#178; = 2(a + c - 1), &#2340;&#2379; a<sup>3</sup> + b<sup>3</sup> + c<sup>3</sup> &#2325;&#2366; &#2350;&#2366;&#2344; = ?</p></span>",
