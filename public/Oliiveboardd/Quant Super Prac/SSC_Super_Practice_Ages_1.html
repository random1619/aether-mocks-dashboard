<body>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The average marks (out of 100) of boys and girls in an examination are 75 and 80, respectively. If the average marks of all the students in that examination are 78. Find the ratio of the number of boys to the number of girls.</p><p><b>Options:</b></p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2375; &#2324;&#2352; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; (100 &#2350;&#2375;&#2306; &#2360;&#2375;) &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 75 &#2324;&#2352; 80 &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; 78 &#2361;&#2376;&#2306;&#2404; &#2354;&#2337;&#2364;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><b>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</b></span>",
    "options": [
      "<span class=\"eqt\">2:3</span><span class=\"hqt\" style=\"display:none\">2:3</span>",
      "<span class=\"eqt\">3:4</span><span class=\"hqt\" style=\"display:none\">3:4</span>",
      "<span class=\"eqt\">1:3</span><span class=\"hqt\" style=\"display:none\">1:3</span>",
      "<span class=\"eqt\">1:2</span><span class=\"hqt\" style=\"display:none\">1:2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the number of girls in the examination = X</p><p>Number of boys in the examination = 100  -  X</p><p>Average marks (out of 100) of boys and girls in an examination are 75 and 80 respectively.</p><p>ACQ,</p><p>75(100  -  X) + 80X = 78*100</p><p>7500  -  75X + 80X = 7800</p><p>5X = 300</p><p>X = 60</p><p>Required ratio = (100  -  60):60 = 2:3</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>The average weight of 15 persons is increased by 1.2 kg when one of them whose weight is 51 kg is replaced by a new man. The weight of the new man is:</p></span><span class=\"hqt\" style=\"display:none\"><p>15 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2349;&#2366;&#2352; &#2350;&#2375;&#2306; 1.2 kg &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2348; &#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; 51 kg &#2349;&#2366;&#2352; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2319;&#2325; &#2344;&#2351;&#2366; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2351;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366; &#2349;&#2366;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">69 kg</span><span class=\"hqt\" style=\"display:none\">69 kg</span>",
      "<span class=\"eqt\">70 kg</span><span class=\"hqt\" style=\"display:none\">70 kg</span>",
      "<span class=\"eqt\">65 kg</span><span class=\"hqt\" style=\"display:none\">65 kg</span>",
      "<span class=\"eqt\">59 kg</span><span class=\"hqt\" style=\"display:none\">59 kg</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Weight of new man = Weight of old man + Total increment in the weight of all the 15 persons</p><p>= 51 + 15 * 1.2</p><p>= 51 + 18</p><p>= 69 kg</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>At present, A is thrice as old as B. C is 5 years elder than B. The sum of the ages of A, B and C is 75 years. The ratio of the age of B five years ago to the age of A three years from now is  -  </p><p>Options:</p></span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306;, A &#2325;&#2368; &#2310;&#2351;&#2369; B &#2360;&#2375; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2368; &#2361;&#2376;&#2404; C, B &#2360;&#2375; 5 &#2357;&#2352;&#2381;&#2359; &#2348;&#2337;&#2364;&#2366; &#2361;&#2376;&#2404; A, B &#2324;&#2352; C &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2351;&#2379;&#2327; 75 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;&#2404; &#2346;&#2366;&#2305;&#2330; &#2357;&#2352;&#2381;&#2359; &#2346;&#2361;&#2354;&#2375; B &#2325;&#2368; &#2310;&#2351;&#2369; &#2324;&#2352; &#2309;&#2348; &#2360;&#2375; &#2340;&#2368;&#2344; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; A &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; - </p><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</span>",
    "options": [
      "<span class=\"eqt\">2:3</span><span class=\"hqt\" style=\"display:none\">2:3</span>",
      "<span class=\"eqt\">1:4</span><span class=\"hqt\" style=\"display:none\">1:4</span>",
      "<span class=\"eqt\">4:7</span><span class=\"hqt\" style=\"display:none\">4:7</span>",
      "<span class=\"eqt\">1:5</span><span class=\"hqt\" style=\"display:none\">1:5</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the present age of B be 'x' years.</p><p>Present age of A = 3x years</p><p>Present age of C = x + 5 years</p><p>Sum of ages of a, B and C together = 75 years</p><p>x + 3x + x + 5 = 75</p><p>x = 14</p><p>Age of B five years ago : age of A three years from now = (14  -  5):(3*14 + 3) = 9:45 = 1:5</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The average age of A, B and C is 20 years. Two years ago, the sum of the ages of A and B was 6 more than that of C. Find the present age of C.</p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C &#2325;&#2368; &#2324;&#2360;&#2340; &#2310;&#2351;&#2369; 20 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;&#2404; &#2342;&#2379; &#2357;&#2352;&#2381;&#2359; &#2346;&#2370;&#2352;&#2381;&#2357;, A &#2324;&#2352; B &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354;, C &#2325;&#2368; &#2310;&#2351;&#2369; &#2360;&#2375; 6 &#2357;&#2352;&#2381;&#2359; &#2309;&#2343;&#2367;&#2325; &#2341;&#2366;, &#2340;&#2379; C &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">28 years</span><span class=\"hqt\" style=\"display:none\">28 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">29 years</span><span class=\"hqt\" style=\"display:none\">29 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">26 years</span><span class=\"hqt\" style=\"display:none\">26 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">25 years</span><span class=\"hqt\" style=\"display:none\">25 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sum of present ages of A, B, and C = 20 * 3 = 60 years</p><p>A + B + C = 60 ........ (1)</p><p>According to the question:</p><p>(A  -  2) + (B  -  2) = (C  -  2) + 6</p><p>A + B = C + 8 ...... (2)</p><p>From (1) and (2):</p><p>C + 8 + C = 60</p><p>C = 26 years</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Three boys, on an average, are 25 years old, and their age are in the ratio of 3 : 5 : 7. What is the age of youngest boy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2354;&#2337;&#2364;&#2325;&#2375; &#2324;&#2360;&#2340;&#2344; 25 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2313;&#2344;&#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3 : 5 : 7 &#2361;&#2376;&#2404; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2375; &#2354;&#2337;&#2364;&#2325;&#2375; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12 years</span><span class=\"hqt\" style=\"display:none\">12 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">15 years</span><span class=\"hqt\" style=\"display:none\">15 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">21 years</span><span class=\"hqt\" style=\"display:none\">21 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">24 years</span><span class=\"hqt\" style=\"display:none\">24 &#2360;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Total age of three boys = 3*25 = 75 years</p><p>Ratio of age = 3:5:7 (smallest ratio = 3)</p><p>Age of youngest boy = 75 * 3/(3 + 5 + 7) = 15 years</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>The average of the first 7 non-zero multiples of 17 is:</p></span><span class=\"hqt\" style=\"display:none\"><p>17 &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; 7 &#2327;&#2376;&#2352;-&#2358;&#2370;&#2344;&#2381;&#2351; &#2327;&#2369;&#2339;&#2325;&#2379;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; _____ &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">67</span><span class=\"hqt\" style=\"display:none\">67</span>",
      "<span class=\"eqt\">68</span><span class=\"hqt\" style=\"display:none\">68</span>",
      "<span class=\"eqt\">69</span><span class=\"hqt\" style=\"display:none\">69</span>",
      "<span class=\"eqt\">66</span><span class=\"hqt\" style=\"display:none\">66</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>First 7 non-zero multiples of 17 = 17, 34,...., 119</p><p>Required average = <img width=177 height=39 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20933/image055.png\"></p><p><img width=79 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20933/image056.png\"></p><p>= 68</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>In nine innings of cricket, the average of a batsman is 58 runs. How many runs does he need to make in the tenth innings to get the average score 61?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2325;&#2368; &#2344;&#2380; &#2346;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2348;&#2354;&#2381;&#2354;&#2375;&#2348;&#2366;&#2332; &#2325;&#2366; &#2324;&#2360;&#2340; 58 &#2352;&#2344; &#2361;&#2376;&#2404; &#2324;&#2360;&#2340; &#2360;&#2381;&#2325;&#2379;&#2352; 61 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2360;&#2375; &#2342;&#2360;&#2357;&#2368;&#2306; &#2346;&#2366;&#2352;&#2368; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2352;&#2344; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">88</span><span class=\"hqt\" style=\"display:none\">88</span>",
      "<span class=\"eqt\">69</span><span class=\"hqt\" style=\"display:none\">69</span>",
      "<span class=\"eqt\">79</span><span class=\"hqt\" style=\"display:none\">79</span>",
      "<span class=\"eqt\">100</span><span class=\"hqt\" style=\"display:none\">100</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Total runs in nine innings = 9 * 58</p><p>Total runs in ten innings = 10 * 61</p><p>Runs scored in 10<sup>th</sup> innings = 10 * 61  -  9 * 58</p><p>= 610  -  522</p><p>= 88</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of the present ages of Ram and Ramesh is 3 : 5. After 7 years the ratio of their ages will be 4 : 5. Find the present age of Ramesh.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2350; &#2324;&#2352; &#2352;&#2350;&#2375;&#2358; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3 : 5 &#2361;&#2376;&#2404; 7 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2313;&#2344;&#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 4 : 5 &#2361;&#2379;&#2327;&#2366;&#2404; &#2352;&#2350;&#2375;&#2358; &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5 years</span><span class=\"hqt\" style=\"display:none\">5 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">15 years</span><span class=\"hqt\" style=\"display:none\">15 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">7 years</span><span class=\"hqt\" style=\"display:none\">7 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">12 years</span><span class=\"hqt\" style=\"display:none\">12 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let, present ages of Ram and Ramesh are 3m and 5m years respectively.</p><p><img width=76 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20888/image045.png\"></p><p>15m + 35 = 20m + 28</p><p>5m = 7</p><p>m = 7/5</p><p>Present age of Ramesh = 5*7/5 = 7 years</p>",
    "question_index": 7
  },
  {
    "question": "<span class=\"eqt\"><p>The weights (in kg) of five girls of a class are 49, 42, 61, 55 and 58. What is the average weight (in kg) of these five girls?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; &#2325;&#2368; &#2346;&#2366;&#2305;&#2330; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2357;&#2332;&#2344; (kg &#2350;&#2375;&#2306;) 49, 42, 61, 55 &#2324;&#2352; 58 &#2361;&#2376;&#2404; &#2311;&#2344; &#2346;&#2366;&#2305;&#2330; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2357;&#2332;&#2344; (kg &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">53</span><span class=\"hqt\" style=\"display:none\">53</span>",
      "<span class=\"eqt\">54</span><span class=\"hqt\" style=\"display:none\">54</span>",
      "<span class=\"eqt\">51</span><span class=\"hqt\" style=\"display:none\">51</span>",
      "<span class=\"eqt\">52</span><span class=\"hqt\" style=\"display:none\">52</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Required average weight of the girls = (49 + 42 + 61 + 55 + 58)/5</p><p>= 265/5</p><p>= 53 kg</p>",
    "question_index": 8
