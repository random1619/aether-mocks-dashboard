</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>

            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">

        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>

                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>

                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>

                    </div>
                    <div class="stat-item">

                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>On dividing n by 7, we get remainder as 4. Find the remainder when 3n + 2 is divided by 7.</p></span><span class=\"hqt\" style=\"display:none\"><p>n &#2325;&#2379; 7 &#2360;&#2375; &#2349;&#2366;&#2327; &#2342;&#2375;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359; 4 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; 3n + 2 &#2325;&#2379; 7 &#2360;&#2375; &#2349;&#2366;&#2327; &#2342;&#2375;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In this type of question, find the smallest n which on dividing by 7 gives a remainder = 4</p><p> N =11</p><p>Now 3n+ 2 = 3*11+ 2</p><p>=&gt; 35</p><p>=&gt; When 35 is divided by 7, we get 0 as remainder.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If the equation: (3x<sup>2</sup> + 4x  -  C) is completely divisible by (x  -  D) and (x + 3) both, then what is the value of 'C &div; D' where the value of 'D' is positive?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339;: (3x<sup>2</sup> + 4x - C) &#2346;&#2370;&#2352;&#2381;&#2339;&#2340;&#2307; (x - D) &#2324;&#2352; (x + 3) &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; 'C &div; D' &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; &#2332;&#2361;&#2366;&#2305; 'D' &#2325;&#2366; &#2350;&#2366;&#2344; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">27</span><span class=\"hqt\" style=\"display:none\">27</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Since, f(x) = (3x<sup>2</sup> + 4x  -  C) is completely divisible by (x + 3), then-</p><p>f(-3) = 0</p><p>3(-3)<sup>2</sup> + 4(-3)  -  C = 0</p><p>27  -  12  -  C = 0</p><p>C = 15</p><p>Since, f(x) = (3x<sup>2</sup> + 4x  -  C) is also completely divisible by (x  -  D), then-</p><p>f(D) = 0</p><p>3(D)<sup>2</sup> + 4(D)  -  15 = 0</p><p>3D<sup>2</sup> + 4D  -  15 = 0</p><p>(3D  -  5)(D + 3) = 0</p><p>D = 5/3 ['D' can't be equal to -3.]</p><p>Now, the value of 'C &div; D' = 15 &div; (5/3)</p><p>= 15 * (3/5)</p><p>= 3 * 3</p><p>= 9</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>What is the remainder of function (5x<sup>3</sup> + 2x<sup>2</sup>  -  4x + 3) when it is divided by (x  -  2)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2364;&#2306;&#2325;&#2381;&#2358;&#2344; (5x<sup>3</sup> + 2x<sup>2</sup> - 4x + 3) &#2325;&#2379; (x - 2) &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">59</span><span class=\"hqt\" style=\"display:none\">59</span>",
      "<span class=\"eqt\">41</span><span class=\"hqt\" style=\"display:none\">41</span>",
      "<span class=\"eqt\">49</span><span class=\"hqt\" style=\"display:none\">49</span>",
      "<span class=\"eqt\">43</span><span class=\"hqt\" style=\"display:none\">43</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=403 height=218 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24602/image003.png\"></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>If (3x + 1) and (x  -  3) both are factors of p<sup>2</sup>x<sup>2</sup>  -  12x  -  q, then </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (3x + 1) &#2324;&#2352; (x - 3) &#2342;&#2379;&#2344;&#2379;&#2306; p<sup>2</sup>x<sup>2</sup> - 12x - q &#2325;&#2375; &#2327;&#2369;&#2339;&#2344;&#2326;&#2306;&#2337; &#2361;&#2376;&#2306;, &#2340;&#2379;</p></span>",
    "options": [
      "<span class=\"eqt\">p = 1/q</span><span class=\"hqt\" style=\"display:none\">p = 1/q</span>",
      "<span class=\"eqt\">p = q/2</span><span class=\"hqt\" style=\"display:none\">p = q/2</span>",
      "<span class=\"eqt\">p<sup>2</sup> = -q</span><span class=\"hqt\" style=\"display:none\">p<sup>2</sup> = -q</span>",
      "<span class=\"eqt\">p<sup>2</sup> = q</span><span class=\"hqt\" style=\"display:none\">p<sup>2</sup> = q</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>3x + 1 = 0 </p><p>x = -1/3 ... (i)</p><p>put value (i) in p<sup>2</sup>x<sup>2</sup>  -  12x  -  q </p><p>p<sup>2</sup> (-1/3)<sup>2</sup>  -  12 * (-1/3)  -  q = 0 </p><p>p<sup>2</sup>/9 + 4  -  q = 0 </p><p>p<sup>2</sup> + 36  -  9q = 0 .. (ii)</p><p>x  -  3 = 0 </p><p>x = 3 .. (iii)</p><p>put value (ii) in p<sup>2</sup>x<sup>2</sup>  -  12x  -  q </p><p>p<sup>2</sup> * 3<sup>2</sup>  -  12 * 3  -  q = 0 </p><p>9p<sup>2</sup>  -  36  -  q = 0 ... (iv)</p><p>Add (ii) and (iv) </p><p>P<sup>2</sup> = q </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The difference between the two numbers is 1702. When dividing the largest number by smaller, we get 2 as the quotient and 558 remainder. Find the largest number.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 1702 &#2361;&#2376;&#2404; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2349;&#2366;&#2327; &#2342;&#2375;&#2344;&#2375; &#2346;&#2352;, &#2361;&#2350;&#2375;&#2306; &#2349;&#2366;&#2327;&#2347;&#2354; 2 &#2324;&#2352; &#2358;&#2375;&#2359; 558 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2846</span><span class=\"hqt\" style=\"display:none\">2846</span>",
      "<span class=\"eqt\">2684</span><span class=\"hqt\" style=\"display:none\">2684</span>",
      "<span class=\"eqt\">2884</span><span class=\"hqt\" style=\"display:none\">2884</span>",
      "<span class=\"eqt\">2268</span><span class=\"hqt\" style=\"display:none\">2268</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the largest number be X</p><p>The smallest number = X  -  1702 </p><p>X = (X  -  1702) * 2 + 558 </p><p>X = 2X  -  3404 + 558 </p><p>X = 2846</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If a problem involves division, the divisor is twelve times the quotient and ten times the remainder. If the remainder is 18, then the dividend is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2360;&#2350;&#2360;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2349;&#2366;&#2327; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;, &#2340;&#2379; &#2349;&#2366;&#2332;&#2325; &#2349;&#2366;&#2327;&#2347;&#2354; &#2325;&#2366; &#2348;&#2366;&#2352;&#2361; &#2327;&#2369;&#2344;&#2366; &#2324;&#2352; &#2358;&#2375;&#2359; &#2325;&#2366; &#2342;&#2360; &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2358;&#2375;&#2359; 18 &#2361;&#2376;, &#2340;&#2379; &#2354;&#2366;&#2349;&#2366;&#2306;&#2358; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">2684</span><span class=\"hqt\" style=\"display:none\">2684</span>",
      "<span class=\"eqt\">2172</span><span class=\"hqt\" style=\"display:none\">2172</span>",
      "<span class=\"eqt\">2718</span><span class=\"hqt\" style=\"display:none\">2718</span>",
      "<span class=\"eqt\">2396</span><span class=\"hqt\" style=\"display:none\">2396</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Divisor = 10 * Remainder </p><p>= 10 * 18 </p><p>= 180 </p><p>Divisor = 12 * Quotient </p><p>180 = 12 * Quotient </p><p>Quotient = 15 </p><p>Dividend = 180 * 15 + 18 = 2718 </p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>When a number is divided by a certain divisor, the remainder is 42, and another no. is divided by the same divisor, the remainder is 37. If the sum of both numbers is divided by the same certain divisor, the remainder is 28. Find the certain divisor.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2349;&#2366;&#2332;&#2325; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359; 42 &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2319;&#2325; &#2309;&#2344;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2313;&#2360;&#2368; &#2349;&#2366;&#2332;&#2325; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359; 37 &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2379; &#2319;&#2325; &#2361;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2349;&#2366;&#2332;&#2325; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359; 28 &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2349;&#2366;&#2332;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">51</span><span class=\"hqt\" style=\"display:none\">51</span>",
      "<span class=\"eqt\">54</span><span class=\"hqt\" style=\"display:none\">54</span>",
      "<span class=\"eqt\">47</span><span class=\"hqt\" style=\"display:none\">47</span>",
      "<span class=\"eqt\">49</span><span class=\"hqt\" style=\"display:none\">49</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>N<sub>1</sub>/D = R<sub>1</sub>, N<sub>2</sub>/D = R<sub>2</sub>, (N<sub>1</sub> + N<sub>2</sub>)/D = R<sub>3</sub></p><p>D = R<sub>1</sub> + R<sub>2</sub>  -  R<sub>3</sub> = 42 + 37  -  28 = 51</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>When a number is divided by a certain divisor, the remainder is 48, and another no. is divided by the same divisor, the remainder is 33. If the sum of both numbers is divided by the same certain divisor, the remainder is 29. Find the certain divisor.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2349;&#2366;&#2332;&#2325; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359; 48 &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2324;&#2352; &#2319;&#2325; &#2309;&#2344;&#2381;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2313;&#2360;&#2368; &#2349;&#2366;&#2332;&#2325; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359; 33 &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2379; &#2319;&#2325; &#2361;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2349;&#2366;&#2332;&#2325; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359; 29 &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2349;&#2366;&#2332;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">58</span><span class=\"hqt\" style=\"display:none\">58</span>",
      "<span class=\"eqt\">52</span><span class=\"hqt\" style=\"display:none\">52</span>",
      "<span class=\"eqt\">56</span><span class=\"hqt\" style=\"display:none\">56</span>",
      "<span class=\"eqt\">54</span><span class=\"hqt\" style=\"display:none\">54</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>N<sub>1</sub>/D = R<sub>1</sub>, N<sub>2</sub>/D = R<sub>2</sub>, (N<sub>1</sub> + N<sub>2</sub>)/D = R<sub>3</sub></p><p>D = R<sub>1</sub> + R<sub>2</sub>  -  R<sub>3</sub> = 48 + 33  -  29 = 52 </p>",
    "question_index": 7
  },
