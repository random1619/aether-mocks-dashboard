<body>
    <!-- Welcome Screen -->

                    <div class="stat-item">

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A solid cone of radius 7 cm and height 7 cm was melted along with two solid spheres of radius 7 cm each to form a solid cylinder of radius 7 cm. what is the curved surface area (in cm<sup>2</sup>) of the cylinder?</p><p>(user&#960; = 22/7)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 7cm &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; 7cm &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2336;&#2379;&#2360; &#2358;&#2306;&#2325;&#2369; &#2325;&#2379; 7cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2336;&#2379;&#2360; &#2327;&#2379;&#2354;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352; 7cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2366; &#2319;&#2325; &#2336;&#2379;&#2360; &#2348;&#2375;&#2354;&#2344; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (cm<sup>2 </sup>&#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p><p>(&#960; = 22/7 &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352;&#2375;&#2306;)</p></span>",
    "options": [
      "<span class=\"eqt\">2196</span><span class=\"hqt\" style=\"display:none\">2196</span>",
      "<span class=\"eqt\">924</span><span class=\"hqt\" style=\"display:none\">924</span>",
      "<span class=\"eqt\">482</span><span class=\"hqt\" style=\"display:none\">482</span>",
      "<span class=\"eqt\">880</span><span class=\"hqt\" style=\"display:none\">880</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Volume of cone + volume of 2 spheres = volume of cylinder </p><p>1/3 * &#960; * 7<sup>2 </sup>* 7 + 2 * 4/3 * &#960; * 7<sup>3</sup> = &#960; * 7<sup>2 </sup>* height of cylinder </p><p>7/3 + 56/3 = height of cylinder </p><p>Height of cylinder = 21 cm</p><p>Therefore, curved surface area of cylinder = 2 * 22/7 * 7 * 21 = 924 cm<sup>2</sup></p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>A spherical box has surface area 528 cm<sup>2</sup>. Find the radius of the spherical box.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 528 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">&radic;37 cm</span><span class=\"hqt\" style=\"display:none\">&radic;37 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">&radic;42 cm</span><span class=\"hqt\" style=\"display:none\">&radic;42 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">&radic;29 cm</span><span class=\"hqt\" style=\"display:none\">&radic;29 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">&radic;35 cm</span><span class=\"hqt\" style=\"display:none\">&radic;35 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Surface area of spherical box = 528 cm<sup>2</sup></p><p>4 * 22/7 * r<sup>2</sup> = 528</p><p>r<sup>2</sup> = 528*7/88</p><p>r<sup>2</sup> = 42</p><p>r = &radic;42 cm</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The cost of painting a spherical vessel of diameter 14 cm is &#8377; 21,560. What is the cost of painting (in &#8377;) per square centimetre? (Use &#960; = 22/7)</p></span><span class=\"hqt\" style=\"display:none\"><p>14 &#2360;&#2375;&#2350;&#2368; &#2357;&#2381;&#2351;&#2366;&#2360; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2348;&#2352;&#2381;&#2340;&#2344; &#2325;&#2379; &#2346;&#2375;&#2306;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#8377;21,560 &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2306;&#2335;&#2368;&#2350;&#2368;&#2335;&#2352; &#2346;&#2375;&#2306;&#2335;&#2367;&#2306;&#2327; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; (&#8377; &#2350;&#2375;&#2306;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;? (&#8377; = 22/7 &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352;&#2375;&#2306;)</p></span>",
    "options": [
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>",
      "<span class=\"eqt\">32</span><span class=\"hqt\" style=\"display:none\">32</span>",
      "<span class=\"eqt\">28</span><span class=\"hqt\" style=\"display:none\">28</span>",
      "<span class=\"eqt\">35</span><span class=\"hqt\" style=\"display:none\">35</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Radius of spherical vessel = 14/2 = 7 cm</p><p>Surface area of spherical vessel = 4&#960;r<sup>2</sup> = 4 * 22/7 * 7<sup>2</sup> = 616 cm<sup>2</sup></p><p>Total cost = &#8377; 21560</p><p>Cost per cm<sup>2</sup> = 21560/616 = &#8377;35</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of the total surface area and volume of a sphere is 2 : 7. Its radius is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2379;&#2354;&#2375; &#2325;&#2375; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2324;&#2352; &#2310;&#2351;&#2340;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2 : 7 &#2361;&#2376;&#2404; &#2311;&#2360;&#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">10.5 cm</span><span class=\"hqt\" style=\"display:none\">10.5 cm</span>",
      "<span class=\"eqt\">7 cm</span><span class=\"hqt\" style=\"display:none\">7 cm</span>",
      "<span class=\"eqt\">10 cm</span><span class=\"hqt\" style=\"display:none\">10 cm</span>",
      "<span class=\"eqt\">7.5 cm</span><span class=\"hqt\" style=\"display:none\">7.5 cm</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the radius of sphere = R cm</p><p>According to the question:</p><p>4&#960;R<sup>2</sup>: 4&#960;R<sup>3</sup>/3 = 2: 7</p><p>3/R = 2/7</p><p>R = 10.5 cm</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>One laddoo with a radius of 5 cm belongs to a shopkeeper. How many laddoos of radius 2.5 cm may be created from the same one laddoo?</p></span><span class=\"hqt\" style=\"display:none\"><p>5 &#2360;&#2375;&#2350;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2354;&#2337;&#2381;&#2337;&#2370; &#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2325;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2368; &#2354;&#2337;&#2381;&#2337;&#2370; &#2360;&#2375; 2.5 &#2360;&#2375;&#2350;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2354;&#2337;&#2381;&#2337;&#2370; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Radius of large laddoo = 5 cm</p><p>Volume of large laddoo = 4/3 &#960; * 5<sup>3</sup></p><p>Radius of small laddoo = 2.5 cm</p><p>Volume of small laddoo = 4/3 &#960; * (2.5)<sup>3</sup></p><p>Number of small laddoos = [4/3 &#960; * 5<sup>3</sup>]/[ 4/3 &#960; * 2.5<sup>3</sup>] = (5/2.5)<sup>3</sup> = 8</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If the volume of a sphere is equal to that of a cylinder having the same radius, then find the ratio of the radius to height of the cylinder.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344;, &#2360;&#2350;&#2366;&#2344; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2348;&#2375;&#2354;&#2344; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1 : 2</span><span class=\"hqt\" style=\"display:none\">1 : 2</span>",
      "<span class=\"eqt\">2 : 3</span><span class=\"hqt\" style=\"display:none\">2 : 3</span>",
      "<span class=\"eqt\">3 : 4</span><span class=\"hqt\" style=\"display:none\">3 : 4</span>",
      "<span class=\"eqt\">3 : 5</span><span class=\"hqt\" style=\"display:none\">3 : 5</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the radius of cylinder = radius of sphere = r </p><p>Let height of cylinder = h</p><p>Then, volume of sphere = volume of cylinder </p><p>4/3 * &#960; * r<sup>3</sup> = &#960; * r<sup>2</sup> * h </p><p>r: h = 3: 4</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The radius of a hemispherical bowl is 9 cm. The capacity of the bowl is: (Use &#960; = 22/7)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2325;&#2335;&#2379;&#2352;&#2375; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 9 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2325;&#2335;&#2379;&#2352;&#2375; &#2325;&#2368; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2361;&#2376;: (&#960; = 22/7 &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352;&#2375;&#2306;)</p></span>",
    "options": [
      "<span class=\"eqt\">1527.43 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">1527.43 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">1428.78 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">1428.78 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">1625.37 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">1625.37 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">1821.47 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">1821.47 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Radius = 9 cm</p><p>Volume of hemispherical bowl = 2/3 * 22/7 * 9<sup>3</sup> = 44 * 729/21 &#8776; 1527.43 cm<sup>3</sup></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>A solid lead sphere of radius 11 cm is melted and recast into small solid spheres of radius 2 cm each. How many maximum numbers (in integer) of such spheres can be made?</p></span><span class=\"hqt\" style=\"display:none\"><p>11 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2336;&#2379;&#2360; &#2360;&#2368;&#2360;&#2375; &#2325;&#2375; &#2327;&#2379;&#2354;&#2375; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2375; 2 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2331;&#2379;&#2335;&#2375; &#2336;&#2379;&#2360; &#2327;&#2379;&#2354;&#2375; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2369;&#2344;&#2307; &#2338;&#2366;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2327;&#2379;&#2354;&#2379;&#2306; &#2325;&#2368; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; (&#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2350;&#2375;&#2306;) &#2361;&#2379; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">125</span><span class=\"hqt\" style=\"display:none\">125</span>",
      "<span class=\"eqt\">166</span><span class=\"hqt\" style=\"display:none\">166</span>",
      "<span class=\"eqt\">100</span><span class=\"hqt\" style=\"display:none\">100</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The volume of a sphere = 4/3 &#960;r<sup>3</sup></p><p>The volume of the sphere of radius of 11 cm = 4/3 &#960; * 11<sup>3</sup></p><p>The volume of one sphere of radius of 2 cm = 4/3 &#960; * 2<sup>3</sup></p><p>The maximum number of small spheres, which can be made = 4/3 &#960; * 11<sup>3</sup>/4/3 &#960; * 2<sup>3</sup></p><p>= 1331/8</p><p>= 166 (Approx.)</p>",
    "question_index": 7

  {
