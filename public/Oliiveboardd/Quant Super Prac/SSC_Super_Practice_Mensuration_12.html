</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">

        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>

                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>

            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>

                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>

            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>A metallic cuboidal block of dimensions 88 cm * 84 cm * 42 cm is melted to form a sphere. What is the surface area of the sphere formed?</p></span><span class=\"hqt\" style=\"display:none\"><p>88 &#2360;&#2375;&#2350;&#2368; * 84 &#2360;&#2375;&#2350;&#2368; * 42 &#2360;&#2375;&#2350;&#2368; &#2310;&#2351;&#2366;&#2350; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2343;&#2366;&#2340;&#2369; &#2325;&#2375; &#2328;&#2344;&#2366;&#2349;&#2368;&#2351; &#2348;&#2381;&#2354;&#2377;&#2325; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352; &#2319;&#2325; &#2327;&#2379;&#2354;&#2366; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2348;&#2344;&#2375; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">16146 sq.cm</span><span class=\"hqt\" style=\"display:none\">16146 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">18256 sq.cm</span><span class=\"hqt\" style=\"display:none\">18256 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">20196 sq.cm</span><span class=\"hqt\" style=\"display:none\">20196 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;.&#2350;&#2368;.</span>",
      "<span class=\"eqt\">22176 sq.cm</span><span class=\"hqt\" style=\"display:none\">22176 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let 'r' be the radius of the sphere formed.</p><p>Volume of the sphere = 4/3 &#960;r<sup>3</sup> = 88 * 84 * 42</p><p>= 4/3 * 22/7 * r<sup>3</sup> = 88 * 84 * 42</p><p>r<sup>3</sup> = (88* 84* 42 * 21)/88 = (2 * 21)<sup>3</sup></p><p>r = 42 cm</p><p>Therefore curved surface area of the sphere formed = 4 * 22/7 * (42)<sup>2</sup> = 22176 sq cm</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Two hemi-spheres and three sphere of diameter 4cm and 2cm respectively are melted into a cylinder of radius 2cm. Find the height of the formed cylinder.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 4 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 2 &#2360;&#2375;&#2350;&#2368; &#2357;&#2381;&#2351;&#2366;&#2360; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2379;&#2306; &#2324;&#2352; &#2340;&#2368;&#2344; &#2327;&#2379;&#2354;&#2379;&#2306; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2325;&#2352; 2 &#2360;&#2375;&#2350;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2348;&#2344;&#2375; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2.66 m</span><span class=\"hqt\" style=\"display:none\">2.66 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">2.66 cm</span><span class=\"hqt\" style=\"display:none\">2.66 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">2.75 m</span><span class=\"hqt\" style=\"display:none\">2.75 &#2350;&#2368;&#2335;&#2352;</span>",
      "<span class=\"eqt\">2.75 cm</span><span class=\"hqt\" style=\"display:none\">2.75 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Volume of three spheres =3  X  4/3  X  &#960;  X  r<sup>3</sup> = 3  X  4/3  X  &#960;  X  1<sup>3</sup></p><p>Volume of two hemi-spheres =2  X  2/3  X  &#960;  X  r<sup>3</sup> =2  X  2/3  X  &#960;  X  2<sup>3</sup></p><p>Volume of a cylinder =&#960;  X  r<sup>2</sup> X  h = &#960;  X  2<sup>2</sup> X  h</p><p>Now, Volume of the hemi-spheres and spheres is equal to the volume of the cylinder.</p><p>On solving, we get that the height of the cylinder is 2.66cm.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>A cone is mounted on a hemisphere to form a toy such that radius of the base of the cone and radius of the hemisphere is same. Volume of the hemisphere is 2156/3 cm<sup>3</sup>. If height of the cone is 3 cm more than thrice its radius, find the curved surface area of the toy.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2379; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2346;&#2352; &#2352;&#2326;&#2325;&#2352; &#2326;&#2367;&#2354;&#2380;&#2344;&#2366; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 2156/3 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2311;&#2360;&#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2375; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2375; &#2360;&#2375; 3 &#2360;&#2375;&#2350;&#2368; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2326;&#2367;&#2354;&#2380;&#2344;&#2375; &#2325;&#2366; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">580 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">580 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">636 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">636 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">716 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">716 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">858 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">858 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=134 height=198 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p4802/image002.png\"></p><p>We know that</p><p>Volume of a hemisphere = 2/3 x &#960;r<sup>3</sup></p><p>=&gt; 2156/3 = 2/3 x 22/7 x r<sup>3</sup></p><p>=&gt; r<sup>3</sup> = 2156/3 x 3/2 x 7/22</p><p>=&gt; r<sup>3</sup> = 343</p><p>=&gt; r = 7 cm = radius of the hemisphere = radius of the cone</p><p>Height of the cone = 3 + 3 x 7 = 3 + 21 = 24 cm</p><p>By Pythagoras theorem</p><p>Slant height of the cone = &radic;[(24)<sup>2</sup> + (7)<sup>2</sup>]</p><p>= &radic;(576 +49)</p><p>= &radic;625</p><p>= 25 cm</p><p>Curved surface area of the toy = curved surface area of the cone + curved surface area of the hemisphere</p><p>= &#960;rl + 2&#960;r<sup>2</sup></p><p>= 22/7 x 7 x 25 + 2 x 22/7 x 7 x 7</p><p>= 550 + 308</p><p>= 858 cm<sup>2</sup></p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The volume of a hemisphere is 2425.5 cm<sup>3</sup>. If the radius of the hemisphere is 3/4<sup>th</sup> of the radius of another sphere, then find the surface area of the sphere.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 2425.5 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2342;&#2370;&#2360;&#2352;&#2375; &#2327;&#2379;&#2354;&#2375; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2368; 3/4 &#2361;&#2376;, &#2340;&#2379; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2632 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">2632 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">2464 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">2464 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">2548 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">2548 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>",
      "<span class=\"eqt\">2212 cm<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">2212 &#2360;&#2375;&#2350;&#2368;<sup>2</sup></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The volume of the hemisphere = 2425.5 cm<sup>3</sup></p><p>(2/3)&#960;r<sup>3</sup> = 2425.5</p><p>(2/3) * (22/7) * r<sup>3</sup> = 2425.5</p><p>r<sup>3</sup> = 1157.625</p><p>r = 10.5 cm</p><p>The radius of the sphere = 10.5 * 4/3 = 14 cm</p><p>The surface area of the sphere = 4&#960;r<sup>2</sup> = 4 * (22/7) * 14 * 14 = 2464 cm<sup>2</sup></p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Two spheres of maximum possible diameter are cut from an iron rod of length 30m and radius 7m. Find the ratio of volume of two spheres to the volume of remaining part of iron rod.</p></span><span class=\"hqt\" style=\"display:none\"><p>30 &#2350;&#2368;&#2335;&#2352; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; 7 &#2350;&#2368;&#2335;&#2352; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2368; &#2354;&#2379;&#2361;&#2375; &#2325;&#2368; &#2331;&#2337;&#2364; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2360;&#2306;&#2349;&#2357; &#2357;&#2381;&#2351;&#2366;&#2360; &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366;&#2335;&#2375; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2379;&#2354;&#2379;&#2306; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2366; &#2354;&#2379;&#2361;&#2375; &#2325;&#2368; &#2331;&#2337;&#2364; &#2325;&#2375; &#2358;&#2375;&#2359; &#2349;&#2366;&#2327; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2360;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">28:17</span><span class=\"hqt\" style=\"display:none\">28:17</span>",
      "<span class=\"eqt\">14:9</span><span class=\"hqt\" style=\"display:none\">14:9</span>",
      "<span class=\"eqt\">10:19</span><span class=\"hqt\" style=\"display:none\">10:19</span>",
      "<span class=\"eqt\">32:11</span><span class=\"hqt\" style=\"display:none\">32:11</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=326 height=164 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21517/image001.jpg\"></p><p>Volume of iron rod = &#960;r<sup>2</sup>h = 22/7 * 7 * 7 * 30 = 4620m<sup>3</sup></p><p>Volume of two spheres of radius 7m = 2 * (4/3) * (22/7) * 7 * 7 * 7 = 8624/3 m<sup>3</sup></p><p>Volume of remaining part of the rod = 4620  -  8624/3 = 5236/3 m<sup>3</sup></p><p>Required ratio = (8624/3) : (5236/3) = 28:17</p><p><b>Alternate method:</b></p><p>Since radius is same for both iron rod and spheres.</p><p>Ratio = <img width=297 height=71 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21517/image002.png\"></p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What will be the volume of sphere whose surface area is equal to 616 cm<sup>2 </sup>(approx.)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366; &#2332;&#2367;&#2360;&#2325;&#2366; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 616 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2350;&#2368;<sup>2 </sup>(&#2354;&#2327;&#2349;&#2327;) &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1437 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">1437 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">1458 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">1458 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">1478 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">1478 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\"><sup> </sup>1522 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\"><sup> </sup>1522 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Surface area of sphere = 4&#960;r<sup>2</sup></p><p>4&#960;r<sup>2</sup> = 616</p><p>=> 4 * 22/7 * r<sup>2</sup> = 616</p><p>=> r<sup>2</sup> = 49</p><p>=> r = 7 cm</p><p>Volume of sphere = 4/3 * &#960;r<sup>3</sup></p><p>= 4/3 * 22/7 * (7)<sup>3</sup> = 1437 cm<sup>3</sup></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>The total surface area of a hemisphere is 4439.82 cm<sup>2</sup>. Find the curved surface area of the hemisphere. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 4439.82 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

    "solution": "<p>Let height of cone = h</p><p>Volume of cone = (1/3) * &#960; * 12 * 12 * h</p><p>Sum of volume of two hemispheres = (2/3) * &#960; * 6 * 6 * 6 + (2/3) * &#960; * 4 * 4 * 4</p><p>Then, (1/3) * &#960; * 12 * 12 * h = (2/3) * &#960; * 6 * 6 * 6 + (2/3) * &#960; * 4 * 4 * 4</p><p>h = 35/9 cm = 3.9 cm (approx.)</p><p>Therefore, height of cone lies between 3.5 and 4.5 cm.</p>",
