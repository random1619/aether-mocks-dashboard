    "question": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">In each question below is given a statement followed by two conclusions numbered I and II. You have to assume everything in the statement to be true, then consider the two conclusions together and decide which of them logically follows beyond a reasonable doubt from the information given in the statement.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Statement:</span><br><span style=\"font-family:Cambria\">I. Education is a process of lighting.</span></p><p><span style=\"font-family:Cambria\">II. Mind requires light to enlighten the core of cognitive aspect.</span><br><span style=\"font-family:Cambria;font-weight:bold\">Conclusions:</span><br><span style=\"font-family:Cambria\">I. Education is a light which removes the darkness of mind.</span></p><p><span style=\"font-family:Cambria\">II. Education is a static process for mind.</span></p>",
    "options": [
      "<p><span style=\"font-family:Cambria\">Both conclusion I and II follow</span></p>",
      "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">Neither of the conclusion follow</span></p>",
      "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">Only conclusion I follow</span></p>",
      "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">Only conclusion II follow</span></p>"
    ],
    "correct_option_id": 2,
    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria;font-weight:bold\">Conclusion I</span><span style=\"font-family:Cambria\">: </span><span style=\"font-family:Cambria;font-weight:bold\">\"Education is a light which removes the darkness of mind\"</span><span style=\"font-family:Cambria\">.</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">This follows logically from the statement that education is a process of lighting. The metaphor here is that education brings light to the mind, dispelling ignorance (darkness), which fits with the idea that education removes the darkness of the mind.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Conclusion II</span><span style=\"font-family:Cambria\">: </span><span style=\"font-family:Cambria;font-weight:bold\">\"Education is a static process for mind\"</span><span style=\"font-family:Cambria\">.</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">This does not logically follow from the statement. The statement talks about education being a process, but it does not describe it as static. Education is generally understood to be a dynamic, evolving process, not static.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Conclusion:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Only conclusion I follows</span><span style=\"font-family:Cambria;font-size:13pt\"> because it aligns with the metaphor of education bringing light to the mind, while conclusion II does not logically follow.</span></li></ul><p><span style=\"font-family:Cambria\">Thus, the correct answer is: </span><span style=\"font-family:Cambria;font-weight:bold\">Only conclusion I follows</span><span style=\"font-family:Cambria\">.</span></p>",

ensive or strongly against accepted norms.</span></p>",

nning economic activities. The means of production are commonly owned by the state, and the government makes decisions about what to produce, how to produce it, and who gets the products. The goal is to achieve economic equality and provide for the needs of all citizens.</span></li></ul></li></ul>",

    "correct_option_id": 0,
    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">The correct answer is: </span><span style=\"font-family:Cambria;font-weight:bold\">Only II</span></p><p><span style=\"font-family:Cambria\">In the Rigveda, prayers and hymns often mention </span><span style=\"font-family:Cambria;font-weight:bold\">cattle, children, and horses</span><span style=\"font-family:Cambria\"> as they were considered significant for prosperity and well-being. Cattle and horses were vital for agrarian and pastoral life, while children were seen as blessings for the continuation of family and society.</span></p><p><span style=\"font-family:Cambria\">Here's a brief explanation of each option:</span></p><ol><li><span style=\"font-weight:bold\">Only II:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">The Rigveda contains numerous hymns that mention cattle, children, and horses, indicating their importance in Vedic society. Prayers for prosperity, wealth, and family well-being often included these elements.</span></li></ul></li><li><span style=\"font-weight:bold\">Only I:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">The Rigveda does not commonly mention dogs and fish in its prayers. While these animals were part of the environment, they were not central to the primary prayers in the hymns.</span></li></ul></li></ol><p><span style=\"font-family:Cambria;font-weight:bold\">Important Details About Rigveda for Upcoming Government Exams:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">The Rigveda is the </span><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">oldest of the four Vedas</span><span style=\"font-family:Cambria;font-size:13pt\"> and is composed of 1,028 hymns (sūktas) divided into 10 books (mandalas).</span></li><li><span style=\"font-family:Cambria;font-size:13pt\">It is written in Vedic Sanskrit and is one of the earliest texts of human civilization.</span></li><li><span style=\"font-family:Cambria;font-size:13pt\">The Rigveda is primarily a collection of hymns </span><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">(Called Samhita)</span><span style=\"font-family:Cambria;font-size:13pt\"> dedicated to various deities like Agni (fire), Indra (warrior god), Varuna (cosmic order), and others.</span></li><li><span style=\"font-family:Cambria;font-size:13pt\">The hymns are recited in rituals and ceremonies for invoking blessings, prosperity, and protection.</span></li><li><span style=\"font-family:Cambria;font-size:13pt\">It reflects a predominantly agrarian and </span><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">pastoral society</span><span style=\"font-family:Cambria;font-size:13pt\"> with a strong emphasis on rituals, sacrifices (yajnas), and worship of natural forces.</span></li><li><span style=\"font-family:Cambria;font-size:13pt\">It's important to note that this system, as originally conceived, was meant to organize society based on occupational roles and duties, not as a rigid hierarchy. </span><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">There are four Varna: Brahmin, Kshatriya, Vaishyas and Shudra. </span></li></ul><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Key Deities:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Indra: Chief deity and god of thunder and rain.</span></li><li><span style=\"font-family:Cambria;font-size:13pt\">Agni: God of fire and the intermediary between gods and humans.</span></li><li><span style=\"font-family:Cambria;font-size:13pt\">Varuna: Guardian of cosmic order (Rta) and moral values.</span></li><li><span style=\"font-family:Cambria;font-size:13pt\">Surya: Sun god and the source of light and life.</span></li></ul></li></ul><p><span style=\"font-family:Cambria\">F</span><span style=\"font-family:Cambria;font-weight:bold\">our Vedas:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Rigveda:</span><span style=\"font-family:Cambria;font-size:13pt\"> The oldest and most significant of the four Vedas, containing hymns and praises dedicated to various deities.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Samaveda:</span><span style=\"font-family:Cambria;font-size:13pt\"> Known as the Veda of melodies and chants, it consists mainly of hymns taken from the Rigveda, but arranged in a way to be sung during rituals and sacrifices.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Yajurveda:</span><span style=\"font-family:Cambria;font-size:13pt\"> The Veda of rituals, it contains prose mantras and instructions for performing religious rituals and ceremonies. It is divided into two parts: Shukla (White) Yajurveda and Krishna (Black) Yajurveda.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Atharvaveda:</span><span style=\"font-family:Cambria;font-size:13pt\"> This Veda includes hymns, spells, and incantations, and deals with everyday life, health, and healing. It is considered more practical and less ritualistic compared to the other Vedas.</span></li></ul><p><span style=\"font-family:Cambria\"> </span></p>",

<span style=\"font-family:Cambria\"> of </span><span style=\"font-family:Cambria;font-weight:bold\">Tamil Nadu</span><span style=\"font-family:Cambria\"> state spread over 688.59 sq.km. at the tri-junction of three states, viz, Karnataka, Kerala and Tamil Nadu and it plays an unique role by forming part of the Nilgiris Biosphere Reserve, the first Biosphere Reserve in India, declared during 1986. </span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Bandhavgarh National Park</span><span style=\"font-family:Cambria\"> is a national park of India, located in the Umaria district of Madhya Pradesh. Bandhavgarh, with an area of 105 square kilometres (41 sq mi), was declared a national park in 1968 and then became Tiger Reserve in 1993.</span></li></ul>",

ies that were to be progressively state-owned, with the state setting up new enterprises, while private enterprises could only supplement the state's efforts.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Schedule C</span><span style=\"font-family:Cambria\">: All other industries not included in Schedules A and B, which were open to private sector initiatives and development.</span></li></ul></li><li><span style=\"font-family:Cambria\">The Industrial Policy of 1956 is </span><span style=\"font-family:Cambria;font-weight:bold\">known as the economic constitution of the country</span><span style=\"font-family:Cambria\">.</span></li></ul>",

lains highly fertile and suitable for agriculture. This is why many ancient civilizations, such as those along the Nile, Indus, and Yellow Rivers, flourished on flood plains.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Types of Flood Plains</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Khadar</span><span style=\"font-family:Cambria;font-size:13pt\">: Also known as the active flood plain, it is the area closest to the river and is frequently inundated. It receives fresh deposits of alluvium during each flood.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Bhangar</span><span style=\"font-family:Cambria;font-size:13pt\">: This is the older alluvial plain that lies above the level of the active flood plain. It is less frequently affected by floods and has a slightly higher elevation.</span></li></ul></li></ul><ul><li><span style=\"font-family:Cambria;font-weight:bold\">Ecological Importance</span><span style=\"font-family:Cambria\">: Flood plains support diverse ecosystems and habitats, including wetlands, grasslands, and forests. They provide habitat for a variety of wildlife and act as natural buffers, absorbing floodwaters and reducing the impact on downstream areas.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Flood Management</span><span style=\"font-family:Cambria\">: To manage and mitigate the impacts of floods, various flood control measures are implemented, such as levees, dams, and floodways. Proper land use planning and floodplain zoning can also help minimize flood risks.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Human Settlement</span><span style=\"font-family:Cambria\">: Due to their fertility and proximity to water sources, flood plains are often densely populated. However, this also makes them vulnerable to flood hazards, necessitating effective flood management and disaster preparedness.</span></li></ul>",
