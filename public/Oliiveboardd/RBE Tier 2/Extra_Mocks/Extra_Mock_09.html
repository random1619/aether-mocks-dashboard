<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">

                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">130</div>
                </div>

                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">

            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->

            <div class="exam-title">Oliveboard Quiz</div>

                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>

                    </div>

                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>

                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    "question": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">The prices of P and Q increase by 75 paise and 25 paise every month respectively. The present price of P is ₹ 65.50 and that of Q is ₹ 68.50.</span><span style=\"font-family:Cambria\">  </span><span style=\"font-family:Cambria\">In how many months from now will the price of Q be equal that of P?</span></p>",

    "question": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">A sum of money is to be divided among Q, R, S and T in the ratio 9 : 3:11:12. If the difference between the value of the combined shares of Q and S, and that of R and T is ₹6,150,</span><span style=\"font-family:Cambria\">  </span><span style=\"font-family:Cambria\">find the value of the combined shares of S and R.</span></p>",

r terraces away from the river and is less fertile compared to the newer alluvial soil (Khadar) found on the floodplains.</span></li></ul></li></ul>",

    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">The correct answer is </span><span style=\"font-family:Cambria;font-weight:bold\">Bank rate</span><span style=\"font-family:Cambria\">.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Explanation:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Bank Rate</span><span style=\"font-family:Cambria;font-size:13pt\">: This is the rate at which the Reserve Bank of India (RBI) is ready to buy or rediscount bills of exchange or other commercial papers. It is a tool used by the central bank to control the supply of money in the economy and influence the interest rates. Changes in the bank rate can affect borrowing and lending rates in the economy.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Other Options:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Reverse Repo Rate</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">This is the rate at which the RBI borrows money from commercial banks. It is used to control the money supply in the economy. An increase in the reverse repo rate can encourage banks to park more funds with the RBI, thereby reducing the money supply in the market.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Repo Rate</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">This is the rate at which the RBI lends short-term money to commercial banks. It is a tool used by the central bank to control inflation and stimulate economic growth. An increase in the repo rate makes borrowing more expensive for banks, which can reduce the money supply and help control inflation.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Exchange Rate</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">This is the rate at which one currency can be exchanged for another. It is determined by the foreign exchange market and is influenced by factors such as interest rates, economic stability, and geopolitical events. The exchange rate is not directly related to the RBI's buying or rediscounting of bills of exchange or commercial papers.</span></li></ul></li></ul>",

ambria;font-weight:bold\">Japan:</span><span style=\"font-family:Cambria\"> Procedure Established by Law (article 21)</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">France:</span><span style=\"font-family:Cambria\"> Republic and the ideals of Liberty, Equality and Fraternity in the Preamble</span></p>",

    "question": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">In which year did the Seventy fourth amendment of the Indian constitution take place?</span></p>",
    "options": [
      "<p><span style=\"font-family:Cambria\"> </span><span style=\"font-family:Cambria\">2002</span></p>",
      "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\"> </span><span style=\"font-family:Cambria\">1992</span></p>",
      "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\"> </span><span style=\"font-family:Cambria\">1998</span></p>",
      "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\"> </span><span style=\"font-family:Cambria\">1990</span></p>"

    "correct_option_id": 1,
    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">The correct answer is </span><span style=\"font-family:Cambria;font-weight:bold\">1992</span><span style=\"font-family:Cambria\">.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Explanation:</span></p><p><span style=\"font-family:Cambria\">The Seventy-fourth Amendment of the Indian Constitution, also known as the </span><span style=\"font-family:Cambria;font-weight:bold\">Constitution (Seventy-fourth Amendment) Act, 1992</span><span style=\"font-family:Cambria\">, was enacted to strengthen urban local bodies and ensure their effective functioning as democratic units of self-government. </span></p><p><span style=\"font-family:Cambria\">The </span><span style=\"font-family:Cambria;font-weight:bold\">73rd and 74th Amendments</span><span style=\"font-family:Cambria\"> to the Indian Constitution introduced key features that aimed to strengthen grassroots governance by establishing the Panchayati Raj and Urban Local Bodies, respectively.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">73rd Amendment (1992):</span></p><p><span style=\"font-family:Cambria\">This amendment added </span><span style=\"font-family:Cambria;font-weight:bold\">Part IX</span><span style=\"font-family:Cambria\"> to the Constitution, dealing with the Panchayati Raj system, and the </span><span style=\"font-family:Cambria;font-weight:bold\">Eleventh Schedule</span><span style=\"font-family:Cambria\">, listing 29 functional areas of Panchayats.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Key Features:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Three-tier system:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Panchayati Raj institutions are structured into three levels: Gram Panchayat (village), Panchayat Samiti (intermediate), and Zila Parishad (district).</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Reservation of Seats:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Reservation for Scheduled Castes (SCs), Scheduled Tribes (STs), and Women (one-third of the seats) at all levels.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Direct Elections:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Members of Panchayats are directly elected by the people.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Five-year tenure:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Fixed tenure of five years for Panchayats, with mandatory elections within six months if dissolved prematurely.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">State Election Commission:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Independent body responsible for conducting Panchayat elections.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">State Finance Commission:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">To recommend the distribution of funds between the state and Panchayats.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Eleventh Schedule:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Lists 29 subjects (e.g., agriculture, education, health) to be devolved to Panchayats for planning and implementation.</span></li></ul></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">74th Amendment (1992):</span></p><p><span style=\"font-family:Cambria\">This amendment added </span><span style=\"font-family:Cambria;font-weight:bold\">Part IX-A</span><span style=\"font-family:Cambria\"> to the Constitution, dealing with Urban Local Bodies (ULBs), and the </span><span style=\"font-family:Cambria;font-weight:bold\">Twelfth Schedule</span><span style=\"font-family:Cambria\">, listing 18 functional areas of ULBs.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Key Features:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Three types of ULBs:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Municipal Corporations (for large urban areas), Municipal Councils (for smaller urban areas), and Nagar Panchayats (for transitional areas).</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Reservation of Seats:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Similar to the 73rd Amendment, with reservations for SCs, STs, and Women (one-third of the seats).</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Direct Elections:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Representatives of ULBs are directly elected by the people.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Five-year tenure:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Fixed tenure of five years, with elections within six months of dissolution.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">State Election Commission:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Conducts elections for Urban Local Bodies.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Twelfth Schedule:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Lists 18 functional areas (e.g., urban planning, water supply, slum improvement) for ULBs to manage.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Ward Committees:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Provision for creating ward committees in municipalities with a population exceeding 3 lakhs to ensure localized governance.</span></li></ul></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Significance:</span></p><p><span style=\"font-family:Cambria\">Both amendments aimed to decentralize governance, empower local bodies, ensure participatory democracy, and address local developmental needs effectively. They also provide constitutional status to Panchayati Raj and Urban Local Bodies, strengthening grassroots democracy in India.</span></p>",
    "question_index": 123
  },

    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">The Correct Answer is: a</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Annatto</span><span style=\"font-family:Cambria\"> is an orange-red condiment and food coloring derived from the seeds of the achiote tree (Bixa orellana), native to tropical parts of the Americas.</span></p><ul><li><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">It is often </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">used to impart a yellow to red-orange color</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\"> to foods, but sometimes also for its flavor and aroma. </span></li><li><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">The color of </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">annatto comes from various</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\"> </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">carotenoid pigments</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">, mainly bixin and norbixin, found in the reddish waxy coating of the seeds. The condiment is typically prepared by grinding the seeds to a powder or paste. </span></li><li><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">Annatto and its extracts are now widely used in an artisanal or industrial scale as a coloring agent in many processed </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">food products, such as cheeses, dairy spreads, butter and margarine, custards, cakes and other baked goods, potatoes, snack foods, breakfast cereals, smoked fish, sausages</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">, and more. In these uses, annatto is a natural alternative to synthetic food coloring compounds, but it has been linked to rare cases of food-related allergies.</span></li><li><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">Annatto is of particular commercial value in the </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">United States </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">because the Food and Drug Administration considers colorants derived from it to be \"exempt of certification\".</span></li></ul>",

an><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">This layer lies above the stratosphere and extends from about 50 to 85 kilometers (31 to 53 miles) above the Earth's surface. The temperature in the mesosphere decreases with altitude, and it is the layer where most meteorites burn up upon entering the Earth's atmosphere.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Stratosphere</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">This layer is located above the troposphere and extends from about 15 to 50 kilometers (9 to 31 miles) above the Earth's surface. The stratosphere contains the ozone layer, which absorbs and scatters ultraviolet radiation from the sun. In this layer, the temperature increases with altitude due to the absorption of radiation by the ozone layer.</span></li></ul></li></ul><p><img src=\"https://appx-content-v2.classx.co.in/website/bulk_uploader_images/1736426502016_image003.jpeg\" width=\"335\" height=\"335\" alt=\"Premium Vector | Layers of atmosphere infographic.\" ></p>",
