    "question": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">A 7 metre long piece of cloth is cut into three smaller pieces. How long is the longest of the three pieces? </span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Statements: </span></p><p><span style=\"font-family:Cambria\">One piece is 3.70 metre long.</span></p><p><span style=\"font-family:Cambria\">One piece is 1.50 metre longer than another piece and the remaining piece is 90 cm long.</span></p>",
    "options": [
      "<p><span style=\"font-family:Cambria\">Statement I alone but not Statement II alone is sufficient to answer the problem.</span></p>",
      "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">Statement I and II both are needed to answer the problem.</span></p>",

    ],
    "correct_option_id": 3,
    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria;font-weight:bold\">Statement 1:</span><span style=\"font-family:Cambria\"> One piece is 3.70 meters long.</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Remaining length:</span><span style=\"font-family:Cambria;font-size:13pt\"> 7 m - 3.70 m = 3.30 meters.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Observation:</span><span style=\"font-family:Cambria;font-size:13pt\"> The remaining 3.30 meters are divided into two pieces. Regardless of how these two pieces are divided, the longest piece is 3.70 meters.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Conclusion:</span><span style=\"font-family:Cambria\"> Statement 1 alone is sufficient.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Statement 2:</span><span style=\"font-family:Cambria\"> One piece is 1.50 meters longer than another, and the remaining piece is 90 cm (0.90 meters) long.</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Remaining length after 90 cm piece:</span><span style=\"font-family:Cambria;font-size:13pt\"> 7 m - 0.90 m = 6.10 meters.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Let:</span><span style=\"font-family:Cambria;font-size:13pt\"> Length of one piece = x meters.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Then:</span><span style=\"font-family:Cambria;font-size:13pt\"> Length of the other piece = x + 1.50 meters.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Equation:</span><span style=\"font-family:Cambria;font-size:13pt\"> x + (x + 1.50) = 6.10</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Solving for x:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">2x + 1.50 = 6.10</span></li><li><span style=\"font-family:Cambria;font-size:13pt\">2x = 6.10 - 1.50</span></li><li><span style=\"font-family:Cambria;font-size:13pt\">2x = 4.60</span></li><li><span style=\"font-family:Cambria;font-size:13pt\">x = 2.30 meters</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Lengths of the pieces:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">First piece: 2.30 meters</span></li><li><span style=\"font-family:Cambria;font-size:13pt\">Second piece: 2.30 + 1.50 = 3.80 meters</span></li><li><span style=\"font-family:Cambria;font-size:13pt\">Third piece: 0.90 meters</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Observation:</span><span style=\"font-family:Cambria;font-size:13pt\"> The longest piece is 3.80 meters.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Conclusion:</span><span style=\"font-family:Cambria\"> Statement 2 alone is sufficient.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Final Conclusion:</span><span style=\"font-family:Cambria\"> Both statements independently provide enough information to determine the length of the longest piece.</span></p><p><span style=\"font-family:Cambria\">Therefore, the correct answer is: </span><span style=\"font-family:Cambria;font-weight:bold\">Statement I alone sufficient and also Statement II alone sufficient to answer the problem.</span></p>",

    "correct_option_id": 0,
    "solution": "<style> *{overflow-wrap: break-word;} </style> <style> img, svg {vertical-align: middle; max-width:100%}</style> <p><span style=\"font-family:Cambria;font-weight:bold\">Correct Answer: Pistil</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Pistil:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Explanation</span><span style=\"font-family:Cambria;font-size:13pt\">: The pistil is the female reproductive part of a flower that contains a single carpel or a group of fused carpels. It is typically divided into three parts: the ovary, style, and stigma. The stigma receives pollen, and through the style, the pollen travels to the ovary, where fertilization occurs.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Primary Function</span><span style=\"font-family:Cambria;font-size:13pt\">: To receive pollen and assist in the fertilization process.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Other Options:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Sepals</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Explanation</span><span style=\"font-family:Cambria;font-size:13pt\">: Sepals are the outermost parts of the flower, usually green, that protect the developing bud. They enclose and protect the flower before it blooms.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Primary Function</span><span style=\"font-family:Cambria;font-size:13pt\">: To protect and support the flower.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Anthers</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Explanation</span><span style=\"font-family:Cambria;font-size:13pt\"     "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria;font-weight:bold\">The Correct Answer: Infinite</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Explanation:</span></p><p><span style=\"font-family:Cambria\">In a liquidity trap, interest rates are very low, and people expect them to rise in the future. As a result, people prefer to hold onto money rather than investing in bonds or other financial assets because they believe bond prices will fall (i.e., interest rates will rise). This makes the demand for money for speculative purposes highly sensitive to changes in the interest rate.</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Interest Elasticity for Speculative Money Demand</span><span style=\"font-family:Cambria;font-size:13pt\">: Infinite elasticity means that even a tiny change in the interest rate will lead to an infinitely large change in the quantity of money demanded for speculative purposes. In a liquidity trap, individuals are willing to hold an infinite amount of money at a particular low-interest rate, making the speculative demand for money infinitely elastic.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Other Options:</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Perfectly Inelastic:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">If the demand were perfectly inelastic, changes in the interest rate would have no effect on the quantity of money demanded for speculative purposes. This is not true in a liquidity trap because people respond very strongly to changes in interest rates.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Zero:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Zero elasticity would imply that the quantity of money demanded for speculative purposes does not change at all with changes in the interest rate. This does not apply to a liquidity trap scenario where demand is very sensitive to interest rates.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Perfectly Elastic:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Perfectly elastic demand would mean that any small change in the interest rate would cause an infinite change in the quantity of money demanded. This is essentially the same as infinite elasticity in this context. Thus, both terms could be used interchangeably.</span></li></ul>",
    "question_index": 106
  },

    "question": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">Which of the following sultans of Delhi established a strong and large standing army to protect and defeat the Mongol invasion?</span></p>",

    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria;font-weight:bold\">The Correct Answer is: Alauddin Khilji</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Explanation:</span></p><p><span style=\"font-family:Cambria\">Alauddin Khilji, the Sultan of Delhi (1296–1316), established a strong and large standing army to counter the frequent Mongol invasions during his reign. He implemented military reforms, including maintaining a permanent and well-equipped army, introducing a system of branding horses (</span><span style=\"font-family:Cambria;font-style:italic\">dagh</span><span style=\"font-family:Cambria\">), and keeping detailed records of soldiers (</span><span style=\"font-family:Cambria;font-style:italic\">chehra</span><span style=\"font-family:Cambria\">). These measures were crucial for the defense of his empire against Mongol threats.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Important Facts about the Delhi Sultanate:</span></p><ul><li><span style=\"font-family:Cambria;font-weight:bold\">Timeline:</span><span style=\"font-family:Cambria\"> Existed from 1206 to 1526 AD, spanning five dynasties.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Dynasties:</span><ul><li><span style=\"font-family:Cambria;font-weight:bold\">Slave Dynasty (1206–1290):</span><span style=\"font-family:Cambria\"> Founded by Qutb-ud-din Aibak.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Khilji Dynasty (1290–1320):</span><span style=\"font-family:Cambria\"> Known for Alauddin Khilji's military and administrative reforms.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Tughlaq Dynasty (1320–1414):</span><span style=\"font-family:Cambria\"> Muhammad bin Tughlaq's ambitious but failed policies.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Sayyid Dynasty (1414–1451):</span><span style=\"font-family:Cambria\"> Weak rulers, decline of central authority.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Lodi Dynasty (1451–1526):</span><span style=\"font-family:Cambria\"> Ended with Ibrahim Lodi's defeat by Babur at Panipat.</span></li></ul></li><li><span style=\"font-family:Cambria;font-weight:bold\">Important Rulers:</span><ul><li><span style=\"font-family:Cambria;font-weight:bold\">Qutb-ud-din Aibak:</span><span style=\"font-family:Cambria\"> Built Qutub Minar and Adhai Din ka Jhopra.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Iltutmish:</span><span style=\"font-family:Cambria\"> Introduced the Iqta system and established the silver tanka.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Razia Sultan:</span><span style=\"font-family:Cambria\"> First and only female Sultan of Delhi.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Alauddin Khilji:</span><span style=\"font-family:Cambria\"> Market reforms, military expansions, and resistance to Mongols.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Muhammad bin Tughlaq:</span><span style=\"font-family:Cambria\"> Known for shifting the capital to Daulatabad and issuing token currency.</span></li></ul></li><li><span style=\"font-family:Cambria;font-weight:bold\">Architecture:</span><span style=\"font-family:Cambria\"> Prominent contributions include Qutub Minar, Alai Darwaza, and Hauz Khas.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Mongol Invasions:</span><span style=\"font-family:Cambria\"> Frequent during Alauddin Khilji's and Muhammad bin Tughlaq's reigns; led to military advancements.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Administration:</span><span style=\"font-family:Cambria\"> Centralized rule with a strong military focus, use of Iqta and Jagir systems.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">Decline:</span><span style=\"font-family:Cambria\"> Weakened by internal conflicts, decentralization, and the rise of regional powers like the Vijayanagara Empire and Bahmani Sultanate.</span></li><li><span style=\"font-family:Cambria;font-weight:bold\">End:</span><span style=\"font-family:Cambria\"> The Sultanate ended in 1526 with Babur's victory in the First Battle of Panipat, marking the beginning of the Mughal Empire.</span></li></ul>",

    "question": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">What type of topography does the Himalayan mountain system represent?</span></p>",

    "correct_option_id": 1,
    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria;font-weight:bold\">Correct Answer: Youthful</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Explanation:</span></p><p><span style=\"font-family:Cambria\">The Himalayan mountain system represents </span><span style=\"font-family:Cambria;font-weight:bold\">youthful</span><span style=\"font-family:Cambria\"> topography. These mountains are relatively young in geological terms, having formed around 50 million years ago due to the collision of the Indian Plate with the Eurasian Plate. This collision caused the Earth's crust to buckle and create the towering peaks of the Himalayas. Youthful mountains are characterized by their high elevation, steep slopes, sharp peaks, and active geological processes such as earthquakes and erosion.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Extra Information about Mountain Types:</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Very Old Mountains:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">These mountains are typically worn down by millions of years of weathering and erosion. They have gentle slopes, rounded peaks, and broad valleys.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Examples</span><span style=\"font-family:Cambria;font-size:13pt\">: The Appalachian Mountains in North America.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Youthful Mountains:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Youthful mountains are high, with sharp and rugged peaks, steep slopes, and deep valleys. They are geologically active and may experience frequent earthquakes and volcanic activity.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Examples</span><span style=\"font-family:Cambria;font-size:13pt\">: The Himalayas in Asia, the Andes in South America.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Mature Mountains:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Mature mountains have been through significant erosion but still retain some rugged features. Their peaks may be less sharp compared to youthful mountains, but they still maintain noticeable elevation.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Examples</span><span style=\"font-family:Cambria;font-size:13pt\">: The Rocky Mountains in North America, the Alps in Europe.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Old Mountains:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Old mountains have been extensively worn down by erosion over hundreds of millions of years. They typically have rolling hills and broad, flat areas.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Examples</span><span style=\"font-family:Cambria;font-size:13pt\">: The Ural Mountains in Russia.</span></li></ul>",

></ul><p><span style=\"font-family:Cambria\">The Golden Quadrilateral Project significantly improved road connectivity, reduced travel time between major cities, and facilitated economic growth by providing better access to markets and ports.</span></p>",

ying principle is the conservation of momentum, not velocity.</span></li></ul></li></ul>",
