    "correct_option_id": 1,
    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria;font-weight:bold\">Step 1: Identify the common word</span></p><ul><li><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">The word </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"see\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\"> appears in both </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"tee see pee\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\"> and </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"see kee lee\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">.</span><ul><li><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">In the first sentence, it is part of </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"Open yours shoes\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">.</span></li><li><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">In the second sentence, it is part of </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"Shoes are nice\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">.</span></li></ul></li></ul><p><span style=\"font-family:Cambria\">Since </span><span style=\"font-family:Cambria;font-weight:bold\">\"shoes\"</span><span style=\"font-family:Cambria\"> is common in both sentences, </span><span style=\"font-family:Cambria;font-weight:bold\">\"see\"</span><span style=\"font-family:Cambria\"> must correspond to </span><span style=\"font-family:Cambria;font-weight:bold\">\"shoes\"</span><span style=\"font-family:Cambria\">.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Step 2: Analyze the second sentence</span></p><ul><li><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">In </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"see kee lee\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\"> (which means </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"Shoes are nice\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">), </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"see\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\"> is already identified as </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"shoes\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">.</span></li><li><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">Therefore, </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"kee\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\"> and </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"lee\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\"> must correspond to </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"are\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\"> and </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"nice\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">, but we don't know which is which yet.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Step 3: Look at the third sentence</span></p><ul><li><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">In </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"lee ree mee\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\"> (which means </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"Girls are beautiful\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">), </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"lee\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\"> is likely </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"are\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\"> because it appears in both the second and third sentences in similar positions (between the subject and the adjective).</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Step 4: Conclusion</span></p><ul><li><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">Since </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"lee\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\"> is identified as </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"are\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">, the remaining word </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"kee\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\"> must mean </span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt;font-weight:bold\">\"nice\"</span><span style=\"line-height:115%;font-family:Cambria;font-size:13pt\">.</span></li></ul><p><span style=\"font-family:Cambria\">Answer</span><span style=\"font-family:Cambria;font-weight:bold\">: Kee</span></p>",

    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">The correct answer is </span><span style=\"font-family:Cambria;font-weight:bold\">Retreating monsoon</span><span style=\"font-family:Cambria\">.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Retreating Monsoon (Transition Season)</span><span style=\"font-family:Cambria\">:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">The retreating monsoon, also known as the post-monsoon or autumn season, occurs from October to November. During this period, the southwest monsoon winds begin to retreat from the Indian subcontinent. The weather during this season is characterized by a transition from the rainy monsoon season to the dry winter season. The humidity decreases, and the skies begin to clear, making it a distinctive transition period between the wet and dry phases of the year.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Other Options:</span></p><p><span style=\"font-family:Cambria\">The Cold Weather Season (Winter)</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Period</span><span style=\"font-family:Cambria;font-size:13pt\">: December to February</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Characteristics</span><span style=\"font-family:Cambria;font-size:13pt\">: Cold temperatures, clear skies, and low humidity. Northern India experiences significant drops in temperature, and some regions, especially the Himalayan states, may see snowfall.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">The Hot Weather Season (Summer)</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Period</span><span style=\"font-family:Cambria;font-size:13pt\">: March to May</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Characteristics</span><span style=\"font-family:Cambria;font-size:13pt\">: High temperatures, intense heat, and occasional heatwaves. This season is marked by dry and hot weather, particularly in northern and central India.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Advancing Monsoon (Southwest Monsoon)</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Period</span><span style=\"font-family:Cambria;font-size:13pt\">: June to September</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Characteristics</span><span style=\"font-family:Cambria;font-size:13pt\">: Heavy rainfall brought by the southwest monsoon winds. This season is crucial for agriculture, as it provides the majority of the annual rainfall. The onset of the monsoon varies across regions, typically starting in Kerala and moving northwards.</span></li></ul>",

a</span><span style=\"font-family:Cambria;font-size:13pt\"> reproduces through </span><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">binary fission</span><span style=\"font-family:Cambria;font-size:13pt\">.</span></li></ul><p><span style=\"font-family:Cambria\">So, the correct answer is </span><span style=\"font-family:Cambria;font-weight:bold\">Neither I nor II</span><span style=\"font-family:Cambria\">.</span></p>",

n two surfaces slide or attempt to slide across each other. It opposes the motion of the objects involved.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Example</span><span style=\"font-family:Cambria;font-size:13pt\">: When you rub your hands together, the resistance you feel is due to friction. Friction generates heat and slows down the movement of your hands.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Momentum</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Momentum is the product of an object's mass and its velocity. It is a measure of the amount of motion an object has and is a vector quantity.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Example</span><span style=\"font-family:Cambria;font-size:13pt\">: A moving car has momentum due to its mass and velocity. The faster the car moves, the greater its momentum.</span></li></ul></li></ul>",

    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">The correct answer is </span><span style=\"font-family:Cambria;font-weight:bold\">Trade balance</span><span style=\"font-family:Cambria\">.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Trade Balance</span><span style=\"font-family:Cambria\">:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">The trade balance is the difference between the monetary value of a country's exports and imports of goods. A positive trade balance indicates a trade surplus, where exports exceed imports, while a negative trade balance indicates a trade deficit, where imports exceed exports.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Other Options:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Trade Deficit</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">A trade deficit occurs when the value of a country's imports exceeds the value of its exports. This results in a negative trade balance.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Fiscal Deficit</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">A fiscal deficit refers to the situation where a government's total expenditures exceed its total revenues, excluding borrowing. It is related to the government's budget and not directly to the trade of goods.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Trade Surplus</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">A trade surplus occurs when the value of a country's exports exceeds the value of its imports. This results in a positive trade balance.</span></li></ul></li></ul>",

    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">The correct answer is </span><span style=\"font-family:Cambria;font-weight:bold\">Monetary Policy</span><span style=\"font-family:Cambria\">.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Monetary Policy</span><span style=\"font-family:Cambria\">:</span></p><p><span style=\"font-family:Cambria\">The Reserve Bank of India (RBI) uses monetary policy to regulate the money supply and achieve macroeconomic objectives such as controlling inflation, managing interest rates, and ensuring financial stability. The RBI employs various tools within monetary policy, such as the repo rate, reverse repo rate, cash reserve ratio (CRR), and open market operations (OMOs).</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Other Options:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Fiscal Policy</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Fiscal policy refers to the government's use of taxation and public spending to influence the economy. It is managed by the government, not the central bank, and aims to achieve economic stability, promote growth, and reduce unemployment.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Trade Policy</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Trade policy involves the regulations and agreements that a country adopts regarding international trade, including tariffs, import quotas, and trade agreements. It is designed to influence the country's trade relationships and balance of payments.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Industrial Policy</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Industrial policy consists of government measures aimed at promoting the growth and development of specific industries within the economy. It includes subsidies, tax incentives, and regulatory frameworks to support industrial growth.</span></li></ul></li></ul><p><span style=\"font-family:Cambria\">In summary, </span><span style=\"font-family:Cambria;font-weight:bold\">monetary policy</span><span style=\"font-family:Cambria\"> is the primary tool used by the Reserve Bank of India to regulate the money supply and achieve economic objectives.</span></p>",

    "question": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">When a compressed spring is released, it converts its potential energy into:</span></p>",
    "options": [
      "<p><span style=\"font-family:Cambria\">Mechanical energy</span></p>",
      "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">Gravitational energy</span></p>",
      "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">Elastic Potential energy</span></p>",

    "correct_option_id": 3,
    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria;font-weight:bold\">Correct Answer: Kinetic Energy</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Kinetic Energy</span><span style=\"font-family:Cambria\">:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Kinetic energy is the energy an object possesses due to its motion.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Example</span><span style=\"font-family:Cambria;font-size:13pt\">: When a compressed spring is released, the stored elastic potential energy is converted into kinetic energy, causing the spring to move and expand.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Other Options:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Mechanical Energy</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Mechanical energy is the sum of an object's kinetic and potential energy.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Example</span><span style=\"font-family:Cambria;font-size:13pt\">: A moving car has mechanical energy, which includes both its kinetic energy (due to motion) and potential energy (due to its position or height).</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Gravitational Energy</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Gravitational energy, or gravitational potential energy, is the energy an object possesses due to its position in a gravitational field.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Example</span><span style=\"font-family:Cambria;font-size:13pt\">: A rock held at a certain height above the ground has gravitational potential energy. When the rock falls, this energy is converted into kinetic energy.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Elastic Potential Energy</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Elastic potential energy is the energy stored in an object when it is compressed or stretched.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Example</span><span style=\"font-family:Cambria;font-size:13pt\">: A compressed spring has elastic potential energy. When it is released, this energy is converted into kinetic energy, causing the spring to move.</span></li></ul></li></ul>",

    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria;font-weight:bold\">Correct Answer: Magna Carta</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Magna Carta:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Part III of the Indian Constitution is often referred to as the \"</span><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Magna Carta of India</span><span style=\"font-family:Cambria;font-size:13pt\">\" because it enshrines Fundamental Rights, ensuring liberty, equality, and justice. The term \"Magna Carta\" historically signifies a charter of rights and liberties, making it an apt metaphor for this part of the Constitution. </span></li><li><span style=\"font-family:Cambria;font-size:13pt\">It is also called </span><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Bill of Rights in USA</span><span style=\"font-family:Cambria;font-size:13pt\">. They form the cornerstone of Indian democracy and ensure the protection of individual freedoms.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Key details about the Fundamental Rights in the Indian Constitution, which are enshrined in Part III:</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Fundamental Rights:</span></p><ol><li><span style=\"font-weight:bold\">Right to Equality (Articles 14-18)</span><span>:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 14</span><span style=\"font-family:Cambria;font-size:13pt\">: Equality before the law and equal protection of the laws.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 15</span><span style=\"font-family:Cambria;font-size:13pt\">: Prohibition of discrimination on grounds of religion, race, caste, sex, or place of birth.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 16</span><span style=\"font-family:Cambria;font-size:13pt\">: Equality of opportunity in matters of public employment.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 17</span><span style=\"font-family:Cambria;font-size:13pt\">: Abolition of untouchability.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 18</span><span style=\"font-family:Cambria;font-size:13pt\">: Abolition of titles except military and academic distinctions.</span></li></ul></li><li><span style=\"font-weight:bold\">Right to Freedom (Articles 19-22)</span><span>:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 19</span><span style=\"font-family:Cambria;font-size:13pt\">: Protection of six freedoms, including speech and expression, assembly, association, movement, residence, and profession.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 20</span><span style=\"font-family:Cambria;font-size:13pt\">: Protection in respect of conviction for offenses, including protection against double jeopardy and self-incrimination.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 21</span><span style=\"font-family:Cambria;font-size:13pt\">: Protection of life and personal liberty.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 21A</span><span style=\"font-family:Cambria;font-size:13pt\">: Right to education.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 22</span><span style=\"font-family:Cambria;font-size:13pt\">: Protection against arrest and detention in certain cases.</span></li></ul></li><li><span style=\"font-weight:bold\">Right against Exploitation (Articles 23-24)</span><span>:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 23</span><span style=\"font-family:Cambria;font-size:13pt\">: Prohibition of human trafficking and forced labor.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 24</span><span style=\"font-family:Cambria;font-size:13pt\">: Prohibition of child labor in hazardous industries.</span></li></ul></li><li><span style=\"font-weight:bold\">Right to Freedom of Religion (Articles 25-28)</span><span>:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 25</span><span style=\"font-family:Cambria;font-size:13pt\">: Freedom of conscience and free profession, practice, and propagation of religion.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 26</span><span style=\"font-family:Cambria;font-size:13pt\">: Freedom to manage religious affairs.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 27</span><span style=\"font-family:Cambria;font-size:13pt\">: Freedom from payment of taxes for promotion of any particular religion.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 28</span><span style=\"font-family:Cambria;font-size:13pt\">: Freedom from attending religious instruction or worship in certain educational institutions.</span></li></ul></li><li><span style=\"font-weight:bold\">Cultural and Educational Rights (Articles 29-30)</span><span>:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 29</span><span style=\"font-family:Cambria;font-size:13pt\">: Protection of interests of minorities, including the right to conserve their language, script, and culture.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 30</span><span style=\"font-family:Cambria;font-size:13pt\">: Right of minorities to establish and administer educational institutions.</span></li></ul></li><li><span style=\"font-weight:bold\">Right to Constitutional Remedies (Article 32)</span><span>:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Article 32</span><span style=\"font-family:Cambria;font-size:13pt\">: Right to move the Supreme Court for the enforcement of Fundamental Rights. This article empowers citizens to seek justice if their rights are violated.</span></li></ul></li></ol>",

    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">The correct answer is </span><span style=\"font-family:Cambria;font-weight:bold\">To connect state capitals with district headquarters</span><span style=\"font-family:Cambria\">.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">To Connect State Capitals with District Headquarters</span><span style=\"font-family:Cambria\">:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">The primary purpose of State Highways in India is to connect state capitals with district headquarters and other important towns within the state. These highways facilitate intra-state connectivity and improve access to various regions, supporting economic development and transportation.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Other Options:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">To Connect India’s Four Big Metro Cities and State Capitals</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">This is the primary purpose of the National Highways, not State Highways. National Highways connect major cities and capitals across the country, forming the backbone of India's road network.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">To Provide Links in Rural Areas and Other Important Towns</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">While State Highways may pass through rural areas and towns, their primary purpose is not to specifically provide links in rural areas. Rural roads and district roads are more focused on connecting rural areas.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">To Connect Strategically Important Roads</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Strategically important roads are often the domain of National Highways and expressways, which cater to national security and strategic interests. State Highways are more focused on intra-state connectivity.</span></li></ul></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Expressways:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Yamuna Expressway</span><span style=\"font-family:Cambria;font-size:13pt\">: Connects Greater Noida with Agra.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Mumbai-Pune Expressway</span><span style=\"font-family:Cambria;font-size:13pt\">: India's first six-lane concrete, high-speed, access-controlled tolled expressway.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Eastern Peripheral Expressway</span><span style=\"font-family:Cambria;font-size:13pt\">: Connects Kundli to Palwal, bypassing Delhi.</span></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Delhi-Meerut Expressway</span><span style=\"font-family:Cambria;font-size:13pt\">: Connects Delhi with Meerut.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Rural Roads:</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Pradhan Mantri Gram Sadak Yojana (PMGSY)</span><span style=\"font-family:Cambria\">: An initiative to provide good all-weather road connectivity to unconnected villages.</span></p>",

    "solution": "<style> *{overflow-wrap: break-word;} </style> <p><span style=\"font-family:Cambria\">The correct answer is </span><span style=\"font-family:Cambria;font-weight:bold\">Custom duties</span><span style=\"font-family:Cambria\">.</span></p><p><span style=\"font-family:Cambria;font-weight:bold\">Custom Duties</span><span style=\"font-family:Cambria\">:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Custom duties are a type of indirect tax imposed on goods when they are imported into or exported out of a country. The cost of the tax is typically included in the price of the goods, making it an indirect tax because the burden is passed on to the end consumer.</span></li></ul><p><span style=\"font-family:Cambria;font-weight:bold\">Other Options:</span></p><ul><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Wealth Tax</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Wealth tax is a type of direct tax levied on an individual's net wealth or the value of their assets. It directly impacts the individual who owns the wealth.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Income Tax</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Income tax is a direct tax imposed on an individual's or entity's income. It is paid directly to the government by the person or entity earning the income.</span></li></ul></li><li><span style=\"font-family:Cambria;font-size:13pt;font-weight:bold\">Estate Duty</span><span style=\"font-family:Cambria;font-size:13pt\">:</span><ul><li><span style=\"font-family:Cambria;font-size:13pt\">Estate duty, also known as inheritance tax or death duty, is a direct tax levied on the estate of a deceased person before it is distributed to their heirs. It directly affects the deceased's estate and beneficiaries.</span></li></ul></li></ul>",
