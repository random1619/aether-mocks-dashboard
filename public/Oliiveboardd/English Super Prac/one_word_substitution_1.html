<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the option that can be used as a one word substitute for the given group of words.</p><p>An often-imaginary place or state of utter perfection and happiness</p>",
    "options": [
      "Inferno",
      "Dystopia",
      "Euphoria",
      "Utopia"
    ],
    "correct_option_id": 3,
    "solution": "<p>A utopia refers to an imaginary place or state of ideal perfection in terms of laws, governance, and happiness. It is often used to describe an ideal society where everything is perfect. The term was popularized by Sir Thomas More's book Utopia in 1516.</p><p>Inferno: A place of intense heat or hell.</p><p>Dystopia: An imagined state of great suffering or injustice, often the opposite of utopia.</p><p>Euphoria: A feeling of intense happiness or excitement.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words:</p><p>Fear of closed spaces</p>",
    "options": [
      "Photophobia",
      "Optophobia",
      "Agoraphobia",
      "Claustrophobia"
    ],
    "correct_option_id": 3,
    "solution": "<p>Claustrophobia: Fear of closed or confined spaces.</p><p>Photophobia: Fear of light.</p><p>Optophobia: Fear of opening one's eyes.</p><p>Agoraphobia: Fear of open or crowded spaces.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words. </p><p>A person who is trained to travel in a spacecraft.</p>",
    "options": [
      "Astronaut",
      "Anthropologist",
      "Alchemist",
      "Curator"
    ],
    "correct_option_id": 0,
    "solution": "<p>Astronaut: A specific term for a person trained to travel and work in space.</p><p>Anthropologist: A person who studies human societies, cultures, and their development, including physical characteristics, social practices, and cultural evolution.</p><p>Alchemist: A person who practices alchemy, an ancient philosophy and speculative science aimed at transforming base metals into gold, discovering the elixir of life, or achieving ultimate wisdom.</p><p>Curator: A person responsible for organizing and managing a collection, often in museums, galleries, or libraries, including acquiring, preserving, and displaying artifacts or works of art.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>A false idea or belief</p>",
    "options": [
      "Reticence",
      "Atrophy",
      "Fallacy",
      "Entropy"
    ],
    "correct_option_id": 2,
    "solution": "<p>A fallacy refers to a misconception or a false idea or belief often based on incorrect reasoning.</p><p>Reticence  -  The quality of being reserved, quiet, or reluctant to speak.</p><p>Atrophy  -  The gradual decline or wasting away of muscles, skills, or effectiveness due to disuse.</p><p>Entropy  -  A measure of disorder or randomness in a system, often associated with the gradual decline into chaos.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the underlined group of words:</p><p>\"In Indian mythology, most of the Asuras wish to be <u>never able to die</u>.\"</p>",
    "options": [
      "Invincible",
      "Impervious",
      "Invisible",
      "Immortal"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct word for \"never able to die\" is \"immortal,\" meaning eternal or living forever.</p><p>Invincible  Cannot be defeated.</p><p>Impervious  Cannot be affected or penetrated.</p><p>Invisible  Cannot be seen.</p><p>Immortal  Cannot die.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words:</p><p>\"That which cannot be conquered\"</p>",
    "options": [
      "Invisible",
      "Indelible",
      "Ineffable",
      "Invincible"
    ],
    "correct_option_id": 3,
    "solution": "<p>The word \"invincible\" means unbeatable or incapable of being conquered.</p><p>Invisible  -  Something that cannot be seen.</p><p>Indelible  -  Something that cannot be erased, removed, or forgotten (e.g., indelible ink or an indelible memory).</p><p>Ineffable  -  Something that is too great or extreme to be expressed in words (e.g., ineffable beauty or ineffable joy).</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate meaning of the underlined word in the given sentence:</p><p>\"He is an <u>atheist</u>, although he respects everyone's belief.\"</p>",
    "options": [
      "One who believes in God",
      "One who believes in nature",
      "One who is extremist",
      "One who does not believe in God"
    ],
    "correct_option_id": 3,
    "solution": "<p>An atheist is someone who does not believe in the existence of God.</p><p>Theist  One who believes in God.</p><p>Pantheist  One who believes in nature as divine.</p><p>Extremist  One who holds extreme views.</p><p>Atheist  One who does not believe in God.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Kamal is not willing to purchase a house on the 12th floor of a sea-side apartment, as she is fearful of heights. She is suffering from ___________.</p>",
    "options": [
      "heliophobia",
      "claustrophobia",
      "sociophobia",
      "acrophobia"
    ],
    "correct_option_id": 3,
    "solution": "<p>Acrophobia is the fear of heights. Other options are:</p><p>Heliophobia: fear of sunlight</p><p>Claustrophobia: fear of confined spaces</p><p>Sociophobia: fear of social situations</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>Cannot be corrected</p>",
    "options": [
      "Illegible",
      "Incorrigible",
      "Incredible",
      "Ineligible"
    ],
    "correct_option_id": 1,
    "solution": "<p>\"Incorrigible\" means unable to be corrected or reformed. Other options mean:</p><p>Illegible: unable to be read</p><p>Incredible: impossible to believe</p><p>Ineligible: not qualified</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the word which means the same as the group of words given.</p><p>A written statement made under oath</p>",
    "options": [
      "Testimony",
      "Affirmation",
      "Affidavit",
      "Statement"
    ],
    "correct_option_id": 2,
    "solution": "<p>An \"affidavit\" is specifically a written statement confirmed by oath or affirmation for use as evidence in court. While testimony and statement can be oral, and affirmation doesn't necessarily imply a written document.</p><p>Testimony  A formal spoken or written account given as evidence, usually in a legal or official setting.</p><p>Affirmation  A declaration that something is true, often without an oath, used in legal or personal contexts.</p><p>Statement  A general declaration or account of facts or opinions, which may or may not be legally binding.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>A person who is inclined to see the worst aspect of things</p>",
    "options": [
      "Pessimist",
      "Philanthropist",
      "Optimist",
      "Altruist"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Pessimist refers to someone who always expects the worst.</p><p>&#183; Philanthropist is someone who seeks to promote the welfare of others.</p><p>&#183; Optimist is someone who always expects the best.</p><p>&#183; Altruist is someone who selflessly cares for others.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>The study of coins</p>",
    "options": [
      "Numismatics",
      "Choreography",
      "Informatics",
      "Cartography"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Numismatics refers to the study or collection of coins, medals, and related objects.</p><p>&#183; Choreography is the art of designing dance sequences.</p><p>&#183; Informatics is the study of information processing and computer systems.</p><p>&#183; Cartography is the science of map-making.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>The workers received a sum for the services they rendered.</p>",
    "options": [
      "Recruitment",
      "Remembrance",
      "Remuneration",
      "Rejuvenation"
    ],
    "correct_option_id": 2,
    "solution": "<p>\"Remuneration\" specifically refers to payment or compensation for work done or services rendered. This term precisely captures the meaning of receiving payment for services, making it the most appropriate one-word substitute for the given phrase.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>A person who deceives others by pretending to be someone else</p>",
    "options": [
      "Unrecognisable",
      "Fraud",
      "Impostor",
      "Inaccessible"
    ],
    "correct_option_id": 2,
    "solution": "<p>An \"impostor\" is specifically a person who pretends to be someone else in order to deceive others. While \"fraud\" is related, it's broader in meaning. \"Unrecognisable\" and \"inaccessible\" are unrelated to deception.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>Capable of being done</p>",
    "options": [
      "Suitable",
      "Feasible",
      "Practical",
      "Useful"
    ],
    "correct_option_id": 1,
    "solution": "<p>\"Feasible\" precisely means capable of being done or accomplished. While \"practical\" and \"suitable\" are related concepts, \"feasible\" specifically addresses the possibility of something being accomplished, making it the most appropriate choice for the given definition.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the underlined group of words.</p><p>My father always tells <u>amusing and true stories</u> from his childhood at bedtime.</p>",
    "options": [
      "Anecdotes",
      "Sonnets",
      "Fables",
      "Allegories"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Anecdotes: Short, personal stories used to entertain or illustrate a point.</p><p>&#183; Sonnets: 14-line poems with a specific rhyme scheme and meter, often about love or nature.</p><p>&#183; Fables: Short stories featuring animals with moral lessons.</p><p>&#183; Allegories: Extended metaphors where characters or events represent abstract ideas, teaching a lesson.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the underlined group of words.</p><p><u>Humour that describes the weaknesses of the other person</u> is itself a crime among peer groups.</p>",
    "options": [
      "A joke",
      "Attire",
      "Satire",
      "A curse"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; \"Satire\" is a form of humor that criticizes or mocks weaknesses, often in a witty way.</p><p>&#183; \"A joke\" is general humor.</p><p>&#183; \"Attire\" means clothing, which is irrelevant.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given phrase.</p><p>A person who performs magic to entertain people</p>",
    "options": [
      "Alchemist",
      "Angel",
      "Magician",
      "Palmist"
    ],
    "correct_option_id": 2,
    "solution": "<p>A magician is someone who performs magic tricks to entertain an audience.</p><p>&bull; Option 1: Alchemist  -  A person who practices alchemy (turning metals into gold).</p><p>&bull; Option 2: Angel  -  A supernatural being, not related to magic.</p><p>&bull; Option 4: Palmist  -  A person who reads palms, but not necessarily a magician.</p><p>Thus, Magician is the correct answer.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given phrase.</p><p>A person who is kept captive for fulfillment of demands of money or conditions.</p>",
    "options": [
      "Hostage",
      "Hermit",
      "Heretic",
      "Introvert"
    ],
    "correct_option_id": 0,
    "solution": "<p>A hostage is a person held captive to force someone else to fulfill demands.</p><p>&bull; <b>Hermit</b>  -  A person who lives in solitude, away from society.</p><p>&bull; <b>Heretic</b>  -  Someone who holds beliefs that go against established religious or cultural doctrines.</p><p>&bull; <b>Introvert</b>  -  A person who prefers solitude and feels more comfortable in quiet or less social environments.</p><p>Thus, Option 1 is the correct answer.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the underlined group of words.</p><p>We, as human beings, have a tendency of believing in the <u>things that can be seen and touched.</u></p>",
    "options": [
      "Impalpable",
      "Spiritual",
      "Inexpressible",
      "Tangible"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; \"Tangible\" means \"something that can be seen and touched.\"</p><p>&#183; Other options are incorrect:</p><p>o Impalpable &rarr; Means cannot be touched (opposite meaning).</p><p>o Spiritual &rarr; Related to the soul, not physical objects.</p><p>o Inexpressible &rarr; Cannot be described in words, unrelated.</p><p>Hence, option (4) is the correct answer.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
