    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Parts of the given sentence have been underlined. Identify the part that has an error. Select 'No error' if there is no error. </p><p>Hide treats inside <u>an empty cardboard egg</u> carton <u>to challenge they</u> to learn <u>how to open the box</u>.</p>",
    "options": [
      "No error",
      "An empty cardboard egg",
      "How to open the box",
      "To challenge they"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option d): This part contains the error. The word \"they\" is a subjective pronoun, which cannot be used in this context because it follows the verb \"challenge.\" We need an objective pronoun as the object of the verb \"challenge\". The correct objective pronoun should be \"them.\" Thus, it should read \"to challenge them.\" So, replace \"they\" with \"them\" to rectify the error.</p><p>The correct sentence is: Hide treats inside an empty cardboard egg carton to challenge <b>them</b> to learn how to open the box.</p><p>Hence, option (d) is the answer. </p><p><b>Note: Subjective Pronouns:</b> The pronouns I, you, we, he, she, it, and they are known as subjective pronouns because they act as the subjects of verbs: We went to the party.</p><p><b>Objective Pronouns:</b> The pronouns me, you, us, him, her, it, and them are called objective pronouns because they act as the objects of verbs and prepositions: Anjali drove us home.</p>",
    "question_index": 0
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>She dare (A)/ not to cheat (B)/ anyone again (C)/ in her life (D).</p>",
    "options": [
      "A",
      "B",
      "C",
      "D"
    ],
    "correct_option_id": 1,
    "solution": "<p>If need/ dare is used in a negative sentence, 'not' should be followed by a 'bare infinitive'. It means we should use only 1<sup>st</sup> form of verb and not 'to +1<sup>st</sup> form of verb.' In the given sentence 'to' will be omitted.</p><p>So, the correct sentence is - 'She dare not <b>cheat</b> anyone again in her life'.</p><p>Hence, option (b) is the correct choice.</p><p><b>Note:</b> Infinitive: The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p> To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p> My father likes to cook. [like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p> To vote in elections is our right. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p> Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p> The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Identify the error in the following sentence. </p><p>She deciding to submit her application for the job, hoping for a positive response. </p>",
    "options": [
      "Deciding",
      "Submit",
      "Application",
      "Hoping"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error in the sentence is in the word \"deciding.\" The correct form is \"decided\" or 'has decided' to impart the correct meaning to the sentence. \"Deciding\" is the -ing verb, which requires a helping verb before it which is not given in the sentence and also, it does not give the required meaning to the sentence. The corrected form is \"decided/ has decided\" Hence, (a) is the correct answer.</p><p>The corrected sentence would be: \"She decided to submit her application for the job, hoping for a positive response.\"</p><p>OR</p><p>\"She has decided to submit her application for the job, hoping for a positive response.\"</p>",
    "question_index": 2
  },
  {
    "question": "<p>In the following sentence, four words or phrases have been underlined. One of them is incorrect. Choose the INCORRECT word or phrase from the given options.</p><p><u>The month-long annual</u> carnival, which <u>features several event</u>, has <u>become a big draw</u> since it <u>was launched</u> in 2004.</p>",
    "options": [
      "become a big draw",
      "The month-long annual",
      "was launched",
      "features several event"
    ],
    "correct_option_id": 3,
    "solution": "<p>The phrase in option (d) is incorrect. </p><p>A plural noun should be used after 'several'. Therefore, 'event' should be replaced with 'event'' to rectify the given sentence. </p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 3
  },
  {
    "question": "<p>Spot the erroneous part if any, in the following sentence.</p><p>Unless she/ <u>does not study(A)/</u> diligently, / <u>she won't(B)/</u> be able to/ <u>excel in(C)/</u> her exams. / No error (D). </p>",
    "options": [
      "B",
      "A",
      "C",
      "D"
    ],
    "correct_option_id": 1,
    "solution": "<p>The adverbs 'until', 'unless', 'scarcely' and 'hardly' are already negative in tone and should not be followed by an additional 'not'. So, 'does not' needs to be removed and the verb form of 'study' be written accordingly in order to rectify the error. Hence, (b) is the correct answer.</p><p>The final correct sentence would be: Unless she studies diligently, she won't be able to excel in her exams.</p>",
    "question_index": 4
  },
  {
    "question": "<p>The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer.</p><p>Arun did not join (1)/ the party because he has (2)/ an urgent work to do. (3)/ No error (4)</p>",
    "options": [
      "1",
      "2",
      "3",
      "No Error"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct sentence is \"Arun did not join the party because he has <b>some</b> urgent work to do\".</p><p>Work when used in the context of matter or business is considered uncountable plural and therefore it should not be preceded by 'a' or 'an' whereas when referring to a creation or composition (poem, song, etc.) is countable and can be preceded by 'a' or 'an'. Urgent work, homework, class work, office work, important work etc. are uncountable and considered plural.</p><p>C is the answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p>Troy <u>is</u> the city <u>who</u> was <u>destroyed</u> in a day by the <u>intruders</u>.</p>",
    "options": [
      "Who",
      "Is",
      "Destroyed",
      "Intruders"
    ],
    "correct_option_id": 0,
    "solution": "<p>We use the relative pronoun 'who' to refer to humans and we use 'that' to refer to inanimate objects, types of people, places, things, or animals. Since the city 'Troy' [a place] is mentioned in the sentence which is referred to using the relative pronoun, 'who' needs to be replaced by 'that' in order to rectify the error.</p><p><b>The correct sentence is: </b>Troy is the city <b>that </b>was destroyed in a day by the intruders.</p><p>Hence, (a) is the correct answer.</p><p><b>Note:</b> Relative pronouns: A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies, or describes, the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option that contains a grammatical error in the underlined portion.</p><p>Yesterday, I went to the ballet class with my elder sister and, we will shoot a video for our YouTube channel.</p>",
    "options": [
      "<u>Yesterday, I went to the ballet</u> class with my elder sister and, we will shoot a video for our YouTube channel.",
      "Yesterday, I went to the ballet <u>class with my elder sister</u> and, we will shoot a video for our YouTube channel.",
      "Yesterday, I went to the ballet class with my elder sister <u>and, we will shoot</u> a video for our YouTube channel.",
      "Yesterday, I went to the ballet class with my elder sister and, we will shoot <u>a video for our YouTube channel. </u>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The whole sentence is in past tense [evident from 'yesterday'], so 'will shoot' [future tense] should be replaced with 'shot' [past tense] to rectify the error.</p><p><b>The correct sentence is: </b>Yesterday, I went to the ballet class with my elder sister and, we <b>shot</b> a video for our YouTube channel.</p><p>Hence, (c) is the correct answer.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the option that contains a grammatical error in the underlined portion. </p><p>There are being installed various new computer's in the office of the head of the department of biochemistry. </p>",
    "options": [
      "There are being installed <u>various new computer's</u> in the office of the head of the department of biochemistry.",
      "<u>There are being installed</u> various new computer's in the office of the head of the department of biochemistry.",
      "There are being installed various new computer's <u>in the office of the head</u> of the department of biochemistry.",
      "There are being installed various new computer's in the office of the head <u>of the department of biochemistry. </u>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Adding an apostrophe and an \"s\" to a word shows ownership, but it doesn't make a word plural. The sentence does not represent ownership/possession, but the plural form of 'computer'. So, \"computer's\" should be replaced with \"computers\" in order to rectify the error.</p><p><b>The correct sentence is: </b>There are being installed various new <b>computers</b> in the office of the head of the department of biochemistry.</p><p>Hence, (a) is the correct answer.</p>",
    "question_index": 8
  },
  {
    "question": "<p>In the given sentence, several segments have been underlined. One of these underlined segments is grammatically incorrect in the context of its usage in the sentence. Identify the incorrect segment from the following options. </p><p>He would never <u>compromised his principles</u>, <u>even when faced with adversity</u>, <u>consistently upholding his integrity</u> and <u>staying true to his values</u>.</p>",
    "options": [
      "compromised his principles",
      "even when faced with adversity",
      "consistently upholding his integrity",
      "staying true to his values"
    ],
    "correct_option_id": 0,
    "solution": "<p>The verb \"compromised\" [past form verb] is incorrect because when \"would\" (modal verb) is used, the base form of the verb should follow. So, in this case, it should be \"He would never compromise his principles\" rather than \"He would never compromised his principles.\"</p><p>The correct structure is \"would never\" + the base form of the verb. Hence, (a) is the correct answer.</p><p>The final correct sentence would be: He would never compromise his principles, even when faced with adversity, consistently upholding his integrity and staying true to his values.</p><p><b>Note: Modal verb:</b> A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Spot the erroneous part if any, in the following sentence.</p><p>The professor and/ <u>the researcher has(A)/</u> already/ <u>left the(B)/</u> conference/ <u>to attend an(C)/</u> important seminar. / No error (D). </p>",
    "options": [
      "D",
      "C",
      "B",
      "A"
    ],
    "correct_option_id": 3,
    "solution": "<p>When two singular nouns are joined by 'and' and the definite article is placed before each noun, then that refers to different persons or things. This means the sentence has a plural subject. So, 'has' (singular verb) should be replaced by 'have' (plural verb) in the given sentence as the verb must agree with the subject. Hence, (d) is the correct answer.</p><p>The final correct sentence would be: The professor and the researcher have already left the conference to attend an important seminar.</p>",
    "question_index": 10
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The tar and the stone / chips are arrived / for the / road construction.</p>",
    "options": [
      "for the",
      "chips are arrived",
      "road construction",
      "The tar and the stone"
    ],
    "correct_option_id": 1,
    "solution": "<p>The part given in option (b) has the error. The sentence indicates an action that has happened in the past but it needs to be conveyed as if it has happened in the present. In such cases, 'perfect tense' is to be used to denote such actions.</p><p>The correct sentence is: The tar and the stone chips have arrived for the road construction.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 11
  },
  {
    "question": "<p><b> </b>The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer.</p><p>This amount of money is enough for my survival in that country.</p>",
    "options": [
      "This amount of money is",
      "enough for my survival",
      "in that country.",
      "No error"
    ],
    "correct_option_id": 3,
    "solution": "<p>With uncountable nouns, we use 'amount of/quantity of' followed by a singular verb. </p><p>So, no error is mentioned here. </p><p>Hence, option (d) is correct. </p><p>Note:</p><p>Nouns can be countable or uncountable. Countable nouns can be counted, e.g. an apple, two apples, three apples, etc. Uncountable nouns cannot be counted, e.g. air, rice, water, etc. When you learn a new noun, you should check if it is countable or uncountable and note how it is used in a sentence.</p>",
    "question_index": 12
  },
  {
    "question": "<p><b> </b>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Had she seen you, she would stop to say hello to you.</p>",
    "options": [
      "Had she seen",
      "you, she",
      "would stop to",
      "say hello to you."
    ],
    "correct_option_id": 2,
    "solution": "<p>Conditional sentences of this type say that something did not happen because a certain condition was not fulfilled, </p><p><b><i>Syntax: </i></b><i>Had + Subject + third form of the verb, subject + would have + third form of the verb.</i></p><p>The use of 'would have stopped' is correct here and not 'would stop'. </p><p>The correct sentence is: \"Had she seen you, she would have stopped to say hello to you.\"</p><p>Hence, option (c) is correct. </p>",
    "question_index": 13
  },
  {
    "question": "<p><b> </b>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The dining room is located interior with the living room, creating a cosy and integrated space for family gatherings.</p>",
    "options": [
      "The dining room is located",
      "creating a cosy and integrated",
      "space for family gatherings.",
      "interior with the living room,"
    ],
    "correct_option_id": 3,
    "solution": "<p>According to the rule, the adjectives that end in 'ior' like 'senior, junior, interior, exterior, etc.' are followed by 'to'. So, 'interior to' is the correct phrase and not 'interior with'.</p><p>The correct sentence is  -  \"The dining room is located interior to the living room, creating a cosy and integrated space for family gatherings.\"</p><p>Hence, option (d) is correct.</p><p>NOTE/-</p><p><b>Adjectives:</b> Words which are used with a noun/pronoun to describe or point out, the person, animal, place, or thing which the noun names, or to tell the number or quantity, are called Adjectives.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>Let's</u> look <u>back</u> at some of the most prominent <u>case</u>, and <u>where</u> they stand now.</p>",
    "options": [
      "back",
      "case",
      "where",
      "Let's"
    ],
    "correct_option_id": 1,
    "solution": "<p>The noun that comes after 'some of' should be a plural noun as it talks about the selection of a few from a number of things. Therefore, the singular noun 'case' should be replaced with the plural noun 'cases' to rectify the given sentence. </p><p>Hence, option (b) is the correct answer. </p>",
    "question_index": 15
  },
  {
    "question": "<p>The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer.</p><p>During the ride back to / River Heights, Emma sensed that Bill / was keeping something of her.</p>",
    "options": [
      "River Heights, Emma sensed that Bill",
      "was keeping something of her",
      "During the ride back to",
      "No error"
    ],
    "correct_option_id": 1,
    "solution": "<p>Option B is the right answer, as the correct preposition to be used here is 'from (her), not 'of (her)'. This phrase means to hide something from someone. Option D is eliminated. Options A and C are eliminated, as they contain no errors.</p>",
    "question_index": 16
  },
  {
    "question": "<p>The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error-free, mark 'No error' as your answer.</p><p>Each student have to come up with a new idea for the vacation activity. </p>",
    "options": [
      "for the vacation activity",
      "No error",
      "Each student have to come",
      "up with a new idea"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Each' is a distributive pronoun, i.e., pronouns that consider or refer to persons or things individually or one at a time and not collectively.</p><p>So, the subject is singular which is incorrectly followed by the plural verb 'have' and this leads to an error in subject-verb agreement. It should be changed with the singular verb 'has'.</p><p>The correct sentence is: Each student has to come up with a new idea for the vacation activity.</p><p>Hence, the correct answer is option (c).</p><p>Note:</p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 17
  },
  {
    "question": "<p>The following sentence has been split into three segments. Identify the segment that contains an error. If the sentence is free of any errors, mark 'No error' as your answer. </p><p>This is the same painting which adorned/ the walls of our ancestral home, / evoking nostalgic memories of bygone eras. </p>",
    "options": [
      "No error",
      "this is the same painting which adorned",
      "the walls of our ancestral home",
      "evoking nostalgic memories of bygone eras"
    ],
    "correct_option_id": 1,
    "solution": "<p>All, any, the only, the same, none, much, the little, the few, something, anything, nothing and superlative degrees are all followed by 'that' only. They cannot be followed by 'who' or 'which'. Hence, (b) is the correct answer. </p><p>The corrected sentence: This is the same painting that adorned the walls of our ancestral home, evoking nostalgic memories of bygone eras.</p><p><b>Note: </b>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 18
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>In the streets, prosperous/ citizens has / pushed their way / towards the palace gates.</p>",
    "options": [
      "towards the palace gates",
      "In the streets, prosperous",
      "citizens has",
