    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate option to fill in the blanks.</p><p>The mayor <b>_____</b> plans to revitalize the downtown area and <b>_____</b> more businesses.</p>",
    "options": [
      "announced, attract",
      "revitalize, encourage",
      "attracting, investment",
      "negotiated, annihilated"
    ],
    "correct_option_id": 0,
    "solution": "<p>According to the subject-verb agreement rule, we cannot use the plural verb 'revitalize' (imbue (something) with new life and vitality) with the singular subject 'mayor'. So, option (b) is eliminated. The present participle verb 'attracting' doesn't fit in the first position as it requires a helping verb before it which is not there. So, option (c) is eliminated. Revitalizing plans don't 'annihilate' [destroy] businesses. So, option (d) is eliminated.</p><p>Among the given options, option (a) contains the correct combination of words.</p><p>Hence, option (a) is the correct answer.</p><p>The complete sentence is: The mayor announced plans to revitalize the downtown area and attract more businesses.</p><p><b>Note:</b></p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blanks. </p><p>Magnets have a special _____ to attract certain materials, particularly those containing iron, nickel, or cobalt, due to their magnetic fields. They ____ through the force of magnetism, which is created by the alignment of tiny magnetic particles within the magnet. </p>",
    "options": [
      "Fragility, study",
      "Error, stir",
      "Ability, work",
      "Guilt, beat"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate option to fill in the first blank is 'ability'. 'Ability' means the quality of being able to do something, especially the physical, mental, financial, or legal power to accomplish something. In the sentence, it indicates that magnets possess a special power or capability to attract specific materials, emphasising their unique property due to their magnetic fields. Other words do not fit the context of the sentence. 'Fragility' means being easily broken or damaged. 'Error' means a mistake. 'Guilt' means a feeling of having committed wrong or failed in an obligation.</p><p>The most appropriate option to fill in the second blank is 'work'. In the sentence, 'work' describes how magnets function or operate through the force of magnetism, explaining the mechanism behind their ability to attract certain materials. Other words do not fit the context of the sentence. 'Study' means to devote time and attention to gaining knowledge. 'Stir' means to mix or move around. 'Beat' means to strike repeatedly. Hence, (c) is the correct answer. </p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blanks. </p><p>Plants play a crucial role in cleaning the air by taking in carbon dioxide and releasing oxygen during photosynthesis, which helps _____ atmospheric gases. They also ____ as natural air filters by capturing dust, pollutants, and other particulates on their surfaces, thereby reducing airborne contaminants.</p>",
    "options": [
      "Balance, act",
      "Withdraw, play",
      "Express, nag",
      "Disclose, provoke"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate option to fill in the first blank is 'balance'. 'Balance' means to bring into harmony or equilibrium. In the sentence, it indicates that plants help to stabilise or regulate atmospheric gases by taking in carbon dioxide and releasing oxygen. Other words do not fit the context of the sentence. 'Withdraw' means to take back or remove. 'Express' means to convey or communicate. 'Disclose' means to reveal or make known.</p><p>The most appropriate option to fill in the second blank is 'act'. 'Act' means to perform a function or role. In the sentence, it describes how plants function as natural air filters by capturing dust and pollutants. Other words do not fit the context of the sentence. 'Play' means to engage in activity or performance. 'Nag' means to annoy or irritate. 'Provoke' means to stimulate or incite. Hence, (a) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>We shall _______ from doing evil.</p>",
    "options": [
      "refine",
      "refrain",
      "restrain",
      "reserve"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Refine' means to purify.</p><p>'Refrain' means to stop oneself from doing something.</p><p>'Restrain' means to prevent someone from doing something</p><p>'Reserve' means to retain for future use.</p><p>'Refine' and 'reserve' are not suitable for this context as we cannot purify doing evil and also we cannot retain doing evil for future use.</p><p>Among 'refrain' and 'restrain', 'refrain' is more suitable for the context.</p><p>We shall refrain from doing evil. This means that we should stop ourselves from doing evil.</p><p>We shall restrain from doing evil is incorrect. The correct form is: we shall restrain others from doing evil. This is to restrain to stop someone else from doing something, so 'restrain' should be followed by an object.</p><p>B is the right answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>They usually suggest products that a customer ____ be interested in buying.</p>",
    "options": [
      "Should",
      "Used to",
      "Can",
      "Might"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Might' is used to indicate conditional or possible actions. In the given sentence. 'might' has been used in a similar context. Hence, (d) is the correct answer. </p><p>'Should' is used to tell somebody what they ought to do, to give advice or to add emphasis.</p><p>'Used to' is used to denote formerly and habitually or repeatedly, but possibly no longer, done.</p><p>'Can' is used to denote strength, power, potential or authority. It is used in the given sentence to express the potential of the speaker.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>_________ goes on a killing spree to end the menace of systematic corruption.</p>",
    "options": [
      "I",
      "They",
      "He",
      "Himself"
    ],
    "correct_option_id": 2,
    "solution": "<p>The blank is followed by a singular verb. So, we should replace the blank with a singular pronoun. The pronoun 'I' is singular but the singular verb does not follow 'I'. So, option (a) is eliminated. 'They' is a plural pronoun. So, option (b) is also eliminated. The reflexive pronoun 'himself' cannot act as the subject of the sentence. So, option (d) is also eliminated. The subjective pronoun 'he' is the correct choice among the given options.</p><p>The complete sentence is: He goes on a killing spree to end the menace of systematic corruption.</p><p>Hence, option (c) is the correct answer.</p><p><b>Note:</b></p><p><b>Subjective Pronouns:</b> The pronouns I, you, we, he, she, it, and they are known as subjective pronouns because they act as the subjects of verbs: We went to the party.</p><p><b>Reflexive Pronouns: </b>Reflexive pronouns include myself, himself, herself, itself, ourselves, yourselves, and themselves. These are used to refer back to the subject of the clause in which they are used: She hurt herself in the eye.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>I buy my eggs from a farmer ___ chickens roam free across the main road.</p>",
    "options": [
      "Whose",
      "Whom",
      "Who",
      "Which"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Whose' is the correct choice for the second blank because 'whose' is used to show belongingness or association. 'Whom' is used as the object of a verb or preposition and 'which' is used for animals/objects. 'Who' is used to add information about the subject, and it doesn't reflect the possession. By filling the blank with 'whose', we are able to specify the farmer using the information about his chickens. Hence, (a) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>I ___ to school daily on foot but my friends prefer to travel by rickshaw.</p>",
    "options": [
      "Going",
      "Went",
      "Gone",
      "Go"
    ],
    "correct_option_id": 3,
    "solution": "<p>The usage of the word 'daily' indicates a routine and that the sentence is in the Present Simple tense [indicated by the use of the present tense verb 'prefer']. So, the present tense form of the verb (go) is used in the blank. The past tense verbs 'went' and 'gone' and the present continuous tense verb 'going' are eliminated. Hence, (d) is the correct answer. </p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The _____ scientist received a prestigious award for her groundbreaking research.</p>",
    "options": [
      "Imminent",
      "Eminent",
      "Emigrant",
      "Immigrant"
    ],
    "correct_option_id": 1,
    "solution": "<p>Among the given options, 'eminent' fits in the blank appropriately as its usage emphasizes the scientist's reputation within her profession, indicating that she is widely recognized and esteemed for her work. The word 'eminent' means '(of a person) famous and respected within a particular sphere or profession'. </p><p>The complete sentence is: The <b>eminent </b>scientist received a prestigious award for her groundbreaking research.</p><p>Hence, (b) is the correct answer. </p><p>'Imminent' means about to happen. </p><p>'Emigrant' means a person who leaves their own country in order to settle permanently in another. </p><p>'Immigrant' means a person who comes to live permanently in a foreign country. </p>",
    "question_index": 8
  },
  {
    "question": "<p>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p><p>Wolves howl to communicate ________ location to other pack members and to ______ off rivalling packs from their territory, it's also been ________ that wolves will howl to their own pack members out of affection, as opposed to anxiety, wolf packs tend to ________ large territories for themselves, especially if prey is scarce.</p>",
    "options": [
      "their, ward, found, claim",
      "there, accept, established, ground",
      "their, receive, launched, affirm",
      "our, admit, initiated, assert"
    ],
    "correct_option_id": 0,
    "solution": "<p>The use of 'there' and 'our' is incorrect to talk about wolves. So, options (b) and (d) will get eliminated.</p><p>'Ward off' is the right phrasal verb which means to prevent someone or something from harming or affecting one. Therefore, it is used in the sentence to talk about the harm that rivalling packs can cause.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Tara ____ come and visit my mother, who is an astrologer, if she wants to know about the upcoming transits in her birth chart.</p>",
    "options": [
      "Should",
      "Mustn't",
      "Need",
      "Ought"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Should' is used to indicate duty, propriety or expediency. The given sentence shows the possibility or likelihood of Tara visiting the speaker's mother. So, 'should' should be placed in the given blank. Hence, (a) is the correct answer. </p><p>'Must' is used to show certainty or a strong belief. 'Mustn't' is contrary to the context of the sentence. </p><p>'Need to' would have been appropriate in the sentence. </p><p>'Ought to' is used to show duty. </p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The player was uncertain about _____ place in the team.</p>",
    "options": [
      "his",
      "them",
      "we",
      "they"
    ],
    "correct_option_id": 0,
    "solution": "<p>The blank requires a possessive adjective/determiner to indicate the possession of the object. The subject of the sentence 'the player' is singular and so the respective possessive adjective/determiner is required to be singular too. Among the options, 'his' is the only singular pronoun that can be related to the subject 'the player'.</p><p>Hence, the correct answer is option (a).</p><p>Note:</p><p><b>Possessive Determiners/Adjectives:</b> Words like <b><i>'my', 'our', 'your', 'his', 'her', 'its'</i></b>, and <b><i>'their'</i></b> are known as possessive adjectives (or possessive determiners). They come before nouns and <b>indicate ownership</b> of the noun. <b>Example:</b> \"The teacher asked the students to open <b><i>their</i></b> drawing books.\"</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Many of the <b>_______</b> we were taught about what is healthy, or ethical, were untrue, and it is time we define new ideas of what it means to lead a good life.</p>",
    "options": [
      "Idea",
      "Furious",
      "Strange",
      "Lessons"
    ],
    "correct_option_id": 3,
    "solution": "<p>The blank requires a noun in its plural form as it is preceded by the phrase 'many of the'. The determiner 'many' is plural and should be followed by a plural noun. Options b) and c) are eliminated because they are adjectives. Option a) is a noun, but it is singular (and not plural). Therefore, option a) is eliminated. Option d) is a plural noun.</p><p>'Lessons' satisfies the grammatical condition mentioned above and correctly fills the blank.</p><p>Thus, option d) is correct.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank(s).</p><p>__ Ganga is __ sacred river that flows in the north of India.</p>",
    "options": [
      "The, a",
      "A, the",
      "An, an",
      "The, the"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Ganga' is the name of a river, and the definite article 'the' is used before it because the definite article 'the' is used before the names of rivers, lakes, seas and oceans. So, 'the' is used in the first blank.</p><p>'A' is used when the noun or adjective that comes next begins with a consonant sound. 'A' before a noun shows that what is referred to is not already known to the speaker, listener, writer and/or reader. So, 'a' is used in the second blank here.</p><p>Hence, (a) is the correct answer.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate word to fill in the blank.</p><p>The slaves, who were kept in ___________, attacked the tyrannical master when one of them broke the chain and set the others free.</p>",
    "options": [
      "caricature",
      "captivate",
      "capitulate",
      "captivity"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Captivity</b>: the condition of being imprisoned or confined.</p><p>Among the given options, <b>\"captivity\"</b> fits the context of the sentence. It gives the idea that the imprisoned slaves attacked their master when they were able to break out.</p><p>'Captivate' and 'capitulate' are <b>verbs</b>. But the word that must fit the blank should be a <b>noun</b> because it is preceded by the preposition (in).</p><p>'Caricature' [noun] is a contextual misfit as per its meaning.</p><p>Thus, the correct option is <b>(d) captivity.</b></p><p>Thus, the correct sentence should be: The slaves, who were kept in <u>captivity</u>, attacked the tyrannical master when one of them broke the chain and set the others free.</p><p>Additional Information:</p><p>The respective meanings of the other options are given below in the table:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Word</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Captivate</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">attract and hold the interest</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Capitulate</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">surrender</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Caricature</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a picture, description, or imitation of a person in which certain striking characteristics are exaggerated</td></tr></table></p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>As they _______ their journey in journalism, perhaps they ought to also stand for openness in their own reporting practices.</p>",
    "options": [
      "Enter to",
      "Fall out",
      "Get away with",
      "Embark on"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Enter to' and 'fall out' (have an argument, or leave one's place in a military formation; or happen) do not fit contextually; hence, option (a) can be eliminated. 'Get away with' (escape blame, punishment, or undesirable consequences for an act that is wrong) is also not making the sentence meaningful; and hence cannot be the answer.</p><p>'Embark on' (to begin a particular journey), when used, conveys  -  'as they <u>begin working</u> as journalists, perhaps they ought to support openness in their own reporting practices'  -  a perfectly meaningful sentence. Hence, 'embark on' should be the clear choice here.</p><p>The answer is option (d).</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank(s).</p><p>_________ of his two shirts are blue in colour, but one is new and the _________ is old.</p>",
    "options": [
      "Every, one",
      "Both, any",
      "Both, other",
      "anybody, few"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence talks about two shirts only. Hence, we cannot use the pronoun 'every'. So, option a) is incorrect. </p><p>'Anybody' signifies a person whereas two shirts (things) are mentioned in the sentence. This makes 'Anybody' an incorrect pronoun to be used in this sentence. So, option d) is incorrect. </p><p>'Other' as an <b>indefinite pronoun</b> refers to a different person or thing from the one already mentioned. Hence, the new shirt is already mentioned. To talk about the old one, we use the pronoun 'other'. </p><p>Hence, option c) is correct.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank(s).</p><p>____ ants and their friends were going to _____ temple.</p>",
    "options": [
      "An, a",
      "A few, a",
      "A, the",
      "An, no article required"
    ],
    "correct_option_id": 1,
    "solution": "<p>The first blank is followed by a plural noun 'ants' and so either the definite article 'the' or a determiner that denotes a plural noun is the correct choice for that blank. The second blank is followed by a common noun 'temple' and it can be indicated by the indefinite article 'a'. Among the options, 'an' in options (a) and (d) and 'a' in option (c) for the first blank indicate a singular noun, in contrast to the plural noun 'ants'. So, the options are negated. 'A few' is a determiner that indicates more than one but not a large quantity of an object. This suitably quantifies the noun 'ants'. Similarly, 'a' suggested for the common noun 'temple' is also the correct fit.</p><p>Hence, the correct answer is option (b).</p><p>Note:</p><p>Determiner: A modifying word that determines the kind of reference a noun or noun group has, for example, 'a', 'the', 'every', 'much', 'many', etc.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank(s).</p><p>Sometimes the fog is so ______ that these lights cannot be ______, but most lighthouses _______ great fog bells or fog horns; some of the latter are made to sound by steam and can be ________ for a long distance.</p>",
    "options": [
      "Dense, seen, have, heard",
      "Blockish, perceived, have, gather",

<p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
