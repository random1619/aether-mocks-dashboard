<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate option to substitute the highlighted segment in the given sentence. If no substitution is required, select No improvement.</p><p>Under each category <b>their is so much </b>scope for minor variations so there is immense ingenuity in costume designing now than ever before.</p>",
    "options": [
      "there is so much",
      "there is so more",
      "there is so many",
      "No improvement"
    ],
    "correct_option_id": 0,
    "solution": "<p>The highlighted phrase contains 'their' (which means belonging to or associated with the people or things previously mentioned) which needs to be replaced by 'there'. In option b) use of 'more' is incorrect as it is used to make comparison in a sentence. In option c) use of 'many' for 'scopes' is incorrect in the given sentence as 'scope' (here means the opportunity or possibility to do or deal with something) is not a countable noun. Hence, the answer is option a).</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the alternative that will improve the underlined part of the sentence. In case there is no improvement required, select 'No improvement'.</p><p>There is enough cynicism going around right now, and a book that offers strategies to not only cope <b><u>until learn</u></b> and flourish is more than welcome.</p>",
    "options": [
      "And learn",
      "While learning",
      "But also learn",
      "No improvement"
    ],
    "correct_option_id": 2,
    "solution": "<p>The phrase 'not only' is accompanied with either 'but' or 'but also' in the sentence. Only option (c) can suffice this condition.</p><p>Hence, (c) is correct.</p>",
    "question_index": 1
  },
  {
    "question": "<p>In the question given below, a part of the sentence is bracketed. Below are given alternatives to the bracketed part which may improve the sentence. Choose the correct alternative. In case no improvement is required, choose '<b>No Improvement</b>' option.</p><p>I want the girl who broke the window (to own out now).</p>",
    "options": [
      "No Improvement",
      "to own up now",
      "to own with now",
      "to own away now"
    ],
    "correct_option_id": 1,
    "solution": "<p>As the correct preposition to be used here is 'own up', which means to confess a mistake, option B is the right answer. Option A is eliminated, as the sentence needs improvement. Options C and D are eliminated as they do not lend the intended meaning to the given sentence.</p>",
    "question_index": 2
  },
  {
    "question": "<p>In the question below, a sentence is given with one part bracketed. Select the option that provides the correct replacement for the bracketed part. In case of no improvement needed, choose Option D.</p><p>This little prince too had a (narrowly escape) of being stifled by the somewhat rough caresses of its overjoyed young father.</p>",
    "options": [
      "narrowly escaping",
      "narrow escape",
      "narrow escaped",
      "No Improvement"
    ],
    "correct_option_id": 1,
    "solution": "<p>The noun 'escape' should be used here, instead of the verb 'escaping' or 'escaped'. To modify this noun, the adjective 'narrow' should be used, and not the adverb 'narrowly'. B is the right answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If no substitution is required, select 'No improvement required' as your answer.</p><p>More times than not, discussions about life <u>tends to be</u> accompanied by the word \"balance.\"</p>",
    "options": [
      "Tending to be",
      "Tend to be",
      "Is rarely",
      "No replacement required"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given phrase is incorrect because 'discussions' is a plural subject and it must be followed by a plural verb, but 'tends' is a singular verb. Similarly, option c) is also incorrect because 'is' is a singular verb. Option a) does not fit in the sentence grammatically owing to the use of present participle form of verb 'tending'. Option b) is grammatically and meaningfully correct. Hence, b) is the correct answer. </p>",
    "question_index": 4
  },
  {
    "question": "<p>In the question given below, a part of the sentence is bracketed. Below are given alternatives to the bracketed part which may improve the sentence. Choose the correct alternative. In case no improvement is required, choose '<b>No Improvement</b>'.</p><p>If you want to make me proud, you will (make of your minds) to be good and hardworking.</p>",
    "options": [
      "No Improvement",
      "make out your minds",
      "make up your minds",
      "make with your minds"
    ],
    "correct_option_id": 2,
    "solution": "<p>Option C is the right answer. Option A is eliminated, as the sentence needs improvement. Options B and D are eliminated, as the correct preposition to be used here is 'make up', which means to decide something.</p>",
    "question_index": 5
  },
  {
    "question": "<p>A sentence is given with one part bracketed. Select the option that provides the correct replacement for the bracketed part. In case no improvement is needed, choose Option D.</p><p>He could never (get by) his brother's death.</p>",
    "options": [
      "get over",
      "get out",
      "get at",
      "No Improvement"
    ],
    "correct_option_id": 0,
    "solution": "<p>Get by  -  to sustain oneself. Get over  -  to recover from illness or disappointment or pain. Get out  -  to leave a place. Get at  -  imply. Only A makes sense in the context.</p>",
    "question_index": 6
  },
  {
    "question": "<p>A sentence is given with one part bracketed. Select the option that provides the correct replacement for the bracketed part. In case no improvement is needed, choose Option D.</p><p>Let us wait for some more time to see if he (turns out).</p>",
    "options": [
      "turns up",
      "turns over",
      "turns back",
      "No Improvement"
    ],
    "correct_option_id": 0,
    "solution": "<p>Turn out  -  result. Turn up  -  appear or arrive. Turn over  -  to change sides. Turn back  -  to go in the opposite direction. Only A makes sense in the context.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the alternative that will improve the underlined part of the sentence. In case there is no improvement required. Select \"No improvement\".</p><p>In her essay, MacKinnon wrote that <u>most hurtful</u> for women to organize as women.</p>",
    "options": [
      "It was hard",
      "It was hardening",
      "It will be substantially",
      "No improvement"
    ],
    "correct_option_id": 0,
    "solution": "<p>The underlined phrase is incorrect as the phrase needs to have a helping verb to connect it to the remaining part of the sentence. In the phrase in option b) use of the word 'hardening'(means 'make or become hard or harder') is incorrect. In option c) use of the adverb 'substantially' for the noun 'women' is incorrect; instead, an adjective should have been used to make the sentence correct. The phrase in option a) fits both contextually and grammatically in the sentence. Hence, the answer is option a).</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option to substitute the highlighted segment in the given sentence. If no substitution is required, select No improvement.</p><p>A great deal of what psychologists as researchers and practitioners do in the field <b>is to pay attention</b><b>s, </b>watch and listen carefully.</p>",
    "options": [
      "No improvement",
      "is to paid attention",
      "is to pay attention",
      "are to pay attention"
    ],
    "correct_option_id": 2,
    "solution": "<p>The highlighted part is incorrect as use of 'attentions' needs to be replaced by 'attention' as it is an abstract noun (which is always singular). In option b) use of 'paid' is incorrect as infinitive marker 'to' will take a root verb after it. In option d) use of helping verb 'are' is incorrect as helping verb 'are' here is referring to 'what the researchers and practitioners do' in the field, so it will take a singular helping verb i.e. 'is'. Hence, the answer is option c).</p>",
    "question_index": 9
  },
  {
    "question": "<p>A part of the sentence is in brackets. Below are given alternatives to the bracketed part which may improve the sentence. Choose the correct alternative. In case no improvement is required, choose '<b>No Improvement</b>' option.</p><p>They went out for a long walk, (through many a sunny fields).</p>",
    "options": [
      "through a sunny field",
      "through many a sunny field",
      "No Improvement",
      "through many sunny field"
    ],
    "correct_option_id": 1,
    "solution": "<p>Option B is the right answer. Option C is eliminated, as the sentence needs improvement. Option A is eliminated as it changes the meaning of the sentence and appears to convey as if there was just a single sunny field, while the sentence talks about many. Option D is eliminated, as it is grammatically incorrect. The correct syntax is: 'through many a sunny field.'</p>",
    "question_index": 10
  },
  {
    "question": "<p>A part of the sentence is in brackets. Below are given alternatives to the bracketed part which may improve the sentence. Choose the correct alternative. In case no improvement is required, choose '<b>No Improvement</b>' option.</p><p>If you do not know the meaning of a word, (look it out).</p>",
    "options": [
      "look it off",
      "look it down",
      "look it up",
      "No Improvement"
    ],
    "correct_option_id": 2,
    "solution": "<p>Look out  -  to be alert and watch out for something. Look off  -  grammatically incorrect. Look down  -  to behave condescendingly towards someone. Look up  -  to research something. Only C makes sense in the given context.</p>",
    "question_index": 11
  },
  {
    "question": "<p>In the question below, a part of the sentence is bracketed. Below are given alternatives to the bracketed part which may improve the sentence. Choose the correct alternative. In case no improvement is required, choose '<b>No Improvement</b>' option.</p><p>A great blue-and-silver car (swept away to the) field-gates.</p>",
    "options": [
      "swept at to the",
      "swept up to the",
      "swept out to the",
      "No Improvement"
    ],
    "correct_option_id": 1,
    "solution": "<p>Option B is the right answer. Option D is eliminated, as the sentence needs improvement. Option A is eliminated, as it uses two prepositions in succession 'at' and 'to', thus making the sentence incongruous. Option C is eliminated since it incorrectly uses the preposition 'out' which is grammatically incorrect in this context.</p>",
    "question_index": 12
  },
  {
    "question": "<p>In the following question, a part of the sentence is bracketed. Below are given alternatives to the bracketed part which may improve the sentence. Choose the correct alternative. In case no improvement is required, choose '<b>No Improvement</b>' option.</p><p>He was afraid that if he said anything to his father, (he must be forbidden) to go to the park.</p>",
    "options": [
      "No Improvement",
      "he should be forbidden",
      "he can be forbidden",
      "he might be forbidden"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option D is the right answer. Option A is eliminated, as the sentence needs improvement. Option B is eliminated, as the word 'should' is grammatically incorrect in this context as we need a word that states a future possibility. Option C is eliminated since it uses the present tense (can), while the sentence must use the past tense (might, in this case).</p>",
    "question_index": 13
  },
  {
    "question": "<p>A part of the sentence is bracketed. Below are given alternatives to the bracketed part which may improve the sentence. Choose the correct alternative. In case no improvement is required, choose \"<b><u>No Improvement</u></b>\" option.</p><p>She is living (independent from) her parents now.</p>",
    "options": [
      "independent off",
      "independent of",
      "independent on",
      "No improvement"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Independent' should be followed by 'of' not 'from'. The phrase means to be self-sufficient or separate. The difference between 'Independent from' and 'independent of' is as follows:</p><p></p><p>Independent from = [not ruled by another country]</p><p>The rebel republic has already declared itself independent from the Soviet Union</p><p>Independent of = [unaffected by]</p><p>Personal conversations are not independent of media news.</p><p>Their decisions are quite independent of any other argument.</p><p>Therefore, option B is the answer.</p><p></p>",
    "question_index": 14
  },
  {
    "question": "<p>In the question given below, a part of the sentence is bracketed. Below the sentence, are given alternatives to the bracketed part which may improve the sentence. Choose the correct alternative. In case no improvement is required, choose '<b>No Improvement</b>' option.</p><p>(As soon as he was) gone than Lisa unlocked the door.</p>",
    "options": [
      "No sooner was he",
      "Hardly was he",
      "No Improvement",
      "As sooner was he"
    ],
    "correct_option_id": 0,
    "solution": "<p>Option A is the right answer. Option C is eliminated, as the sentence needs improvement. Option B is eliminated, as the phrase 'hardly was/had he' is generally used with 'when'. Option D is eliminated since it is grammatically incorrect.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement'.</p><p>The government requires <u>that all the file be</u> submitted to the department without any fail.</p>",
    "options": [
      "No improvement",
      "That all the files be",
      "For all the file to be",
      "All the file should be"
    ],
    "correct_option_id": 1,
    "solution": "<p>The determiner 'all' requires a plural verb after it. So, 'files' would be appropriate in place of 'file'. Hence, option (b) is the answer.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>The government should seek ways to curb spending by candidates and parties, which <u>has reached alarming high </u>levels and poses a threat to free and fair elections.</p>",
    "options": [
      "Has reach alarmingly high",
      "Has reached alarmingly high",
      "Have reached alarmingly high",
      "No improvement required"
    ],
    "correct_option_id": 1,
    "solution": "<p>The highlighted part is incorrect as the adjective 'alarming' cannot qualify the other adjective 'high'; the adverb 'alarmingly' is needed here. A is incorrect as the past participle form of verb needs to be used after 'has'. C is incorrect as the noun 'spending' is in singular and we need an auxiliary verb in singular form to agree with it. So, 'has' in place of 'have'. Option B is the right answer.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>We decided to <u>call off</u> Tanu yesterday, but it seems she was out.</p>",
    "options": [
      "call at",
      "call after",
      "call on",
      "No Improvement required"
    ],
    "correct_option_id": 2,
    "solution": "<p>Call off  -  cancel or postpone a plan. Call at  -  grammatically incorrect. Call after  -  to name a child after someone. Call on  -  to visit someone. Only C makes sense in the sentence.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>She walked quickly to the handwork cupboard and <u>flung off the door</u>.</p>",
    "options": [
      "flung open the door",
      "flung out the door",
      "flung the door",
      "No Improvement required"
    ],
    "correct_option_id": 0,
    "solution": "<p>Option A is the right answer. Option D is eliminated, as the sentence needs improvement as 'flung off' is meaningless. Option B is eliminated, as the prepositional phrase 'flung out' would mean to throw something out, which makes no sense in this context. Option C is eliminated since it omits the use of a preposition; 'flung' when used without a preposition, means to throw. It seems absurd if we say that 'she threw the door'.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
