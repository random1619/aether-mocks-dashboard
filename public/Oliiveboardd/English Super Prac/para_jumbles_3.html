    <script>
        const questions = [
  {
    "question": "<p>The following question consists of few sentences of a passage. The first and the last sentences have been fixed and marked S1 and S6 respectively. The middle four sentences have been jumbled and labelled P, Q, R and S. You are required to find the proper sequence of the four sentences and mark your answer accordingly.</p><p>S1: The cosmos, with its mystery governed by immutable laws of poetic precision, staggered her imagination</p><p>S6:. And so, at seventeen, she founded a small school of her own.</p><p>P : by fifteen, she had mastered higher mathematics</p><p>Q : which she supplemented with an ardent love of poetry</p><p>R : further to offer her in the way of higher education for a woman</p><p>S : no institution  -  not on the island, not on the globe  -  had anything</p><p>The proper sequence should be</p>",
    "options": [
      "RSQP",
      "QSPR",
      "PQSR",
      "SPRQ"
    ],
    "correct_option_id": 2,
    "solution": "<p>The first and the last sentence are fixed. We need to arrange PQRS in a way that the arrangement is meaningful and grammatically correct.</p><p>The last sentence (S6) mentions that 'so, she opened her own school'. The use of 'so' gives us a hint that the reason for her opening her own school must have been mentioned somewhere and it should precede the last sentence. The reason is mentioned in SR in that order; the reason being that no institution had anything to offer her. Option C satisfies this criterion. And PQSR is a meaningful sentence arrangement. Option C is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>In the following question, the first and the last sentence are given marked as S1 and S6 respectively. Other parts have been jumbled up and labelled as P, Q, R and S. Find the proper sequence of the sentences and mark your answer accordingly.</p><p></p><p>S1: Over the past century, cooking techniques have evolved and diversified, and cooking has started to move away from more primitive heat sources.</p><p>S6: Increasingly, scientists have been pointing to the microwave as a healthier way of cooking  -  depending on what you cook in it.</p><p>P. microwaves, electric hobs and toasters can</p><p>Q. now be found in almost</p><p>R. an alternative to high flames</p><p>S. every house, providing</p>",
    "options": [
      "PRQS",
      "PSQR",
      "PQSR",
      "PQRS"
    ],
    "correct_option_id": 2,
    "solution": "<p>S1 talks about the evolution of cooking techniques and the movement away from 'primitive heat sources', and S6 puts forward scientists' views of healthier ways of cooking in a microwave. We need sentence(s) that can connect these two ideas. P talks about the alternative heat sources (heat sources are mentioned in S1) that have been adopted, i.e. 'microwaves, electric hobs, and toasters'. Q carries the sentence forward by talking about where these devices are commonly used, and the answer lies in S (i.e., almost 'every house'). R completes the sentence by tagging these sources as alternatives to high flames. Thus, the correct order is PQSR.</p><p>Hence, c) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>In the following question, the first part of the sentence is fixed and the remaining three are jumbled. Rearrange the parts in the correct order and choose the correct option.</p><p>Investing is an enormous industry solely dedicated to the idea of</p><p>P - using capital to create more capital but in many instances,</p><p>Q - in yourself can lead to a meaningful payoff, too</p><p>R - investing time and energy, which, just like money are in finite supply,</p>",
    "options": [
      "PRQ",
      "QRP",
      "RPQ",
      "QPR"
    ],
    "correct_option_id": 0,
    "solution": "<p>R would seem to be the best choice to follow the fixed part of the sentence, but P would be the actual connecting part because R talks of investing 'time and energy' while the fixed part talks of the stock market, where money is invested as stated in P. Following this, R would connect with P as R makes comparison of 'time and energy' with 'money', and further, R connects with Q, both collectively reflect on investing time and energy in oneself to generate more money.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p></p><p>a) the heavy, black clouds appear in the distance</p><p>b) when a storm approaches, the scene changes, </p><p>c) and throw a deep, long</p><p>d) shade over the world of waters</p>",
    "options": [
      "a,b,c,d",
      "b,a,c,d",
      "a,c,d,b",
      "c,d,b,a"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence talks about the effects of a storm on the water. Part 'b' is the opening sentence as it introduces the subject 'a storm'. The changes mentioned 'b' are elaborated in 'a', making it the next part of the sentence. The conjunction 'and' [used to add additional information] in part 'c' shows the continuation of the description of changes mentioned in 'a'. 'd' is the remaining part and follows last.</p><p>The correct sequence of the parts of the sentence is b,a,c,d.</p><p>The sentence is  - <i> <b>\"When a storm approaches, the scene changes, the heavy, black clouds appear in the distance and throw a deep, long shade over the world of waters.\"</b></i></p><p>Hence, option (b) is correct.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Parts of a sentence are given below. While the first and the last parts (A and F) are in the correct order, the parts in between are jumbled up. Arrange the parts in the correct order to form a meaningful and coherent sentence.</p><p></p><p>A. The athlete's</p><p>B. shattered records</p><p>C. incredible performance</p><p>D. established a new benchmark</p><p>E. and</p><p>F. in their respective sport.</p>",
    "options": [
      "B, E, C, D",
      "D, E, C, B",
      "E, D, B, C",
      "C, B, E, D"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct order is ACBEDF.</p><p>The sentence begins with the possessive phrase \"The athlete's\", indicating that something belongs to the athlete. It is to be followed by the noun phrase \"incredible performance\", describing what the athlete did. The phrase \"shattered records\" describes the result or consequence of the performance, indicating that existing records were broken. The conjunction \"and\" connects the two parts of the sentence. The phrase \"established a new benchmark\" describes another result of the performance, indicating that a new standard was set. Lastly, the prepositional phrase \"in their respective sport\" specifies the specific domain or field in which the records were shattered, and the benchmark was established. By arranging these parts in the given order, the sentence forms a coherent and meaningful statement.</p><p>Hence, option (d) is the correct answer.</p><p>The rearranged sentence is: The athlete's incredible performance shattered records and established a new benchmark in their respective sport.</p><p><b>Note:</b></p><p><b>Prepositional phrase: </b>A modifying phrase consisting of a preposition and its object. Example: The cat was hiding under the table. Here, 'under' is the preposition while 'table' is its object.</p><p><b>Possessive nouns </b>are types of nouns that show ownership or connection. All nouns become possessive nouns with the addition of an apostrophe and a suffix - the letter \"s\" - at the end of the word. However, when a plural noun ends in the letter \"s,\" the possessive form of the word only requires the use of an apostrophe at the end. Possessive nouns can be tricky because they function like adjectives by modifying another noun or pronoun in the sentence. E.g., \"Timmy's dog is cute.\"</p><p><b>Noun phrase:</b> A noun phrase is built around a single noun. Example: Their website published an article about the importance of focused work. Here 'article' is a noun and the part highlighted is a noun phrase.</p>",
    "question_index": 4
  },
  {
    "question": "<p>A sentence, split into four parts, has been given. Choose the best order which produces the original sentence. </p><p>on the first day of the month of Shravan(A)/ this annual pilgrimage starts(B)/ and ends(C)/ on the 13th day(D)</p>",
    "options": [
      "C, B, A, D",
      "A, C, B, D",
      "B, D, C, A",
      "B, A, C, D"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct order is BACD.</p><p>Part B introduces the annual pilgrimage, indicating that it begins at a certain time.</p><p>Part A provides additional information about the specific starting point, stating that it occurs on the first day of the month of Shravan.</p><p>Part C indicates the continuation of the sentence, introducing the end of the pilgrimage.</p><p>Part D specifies the endpoint, stating that it occurs on the 13th day.</p><p>By arranging these parts in the given order, the sentence forms a coherent and meaningful statement, with each part focusing on different aspects of the annual pilgrimage.</p><p>Hence, option (d) is the correct answer. </p><p>The rearranged sentence is: This annual pilgrimage starts on the first day of the month of Shravan and ends on the 13th day. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Parts of a sentence are given below. While the first and the last parts (S1 and S6) are in the correct order, the parts in between are jumbled up. Arrange the parts in the correct order to form a meaningful and coherent sentence. </p><p></p><p>S1) The development of septicemia</p><p>A) contracted an infectious disease</p><p>B) indicates that the infectious process </p><p>C) following surgery or after the patient has </p><p>D) has escaped the control of the body's immune system </p><p>S6) and requires immediate medical intervention.</p>",
    "options": [
      "CABD",
      "BCDA",
      "CDAB",
      "CBDA"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct order to form a coherent paragraph/sentence is CABD. S1 introduces the topic of septicemia, setting the context for what will be discussed in the sentence. Part C provides additional information about the circumstances under which septicemia can occur/develop, adding detail to the context provided in the introductory sentence. Part A follows the context provided in part C and specifies that it can also occur/develop in patients who have contracted an infectious disease. Parts B and D follow logically, explaining that the development of septicemia indicates something. It indicates that the infectious process has escaped the control of the body's immune system. These parts explain the severity of the situation, stating that the infectious process has overwhelmed the body's immune system. Finally, S6 concludes the paragraph by emphasising the urgency of the situation, indicating that septicemia demands immediate medical attention due to the severity of the condition. </p><p>Parts C and A form an essential logical pair. So, they should be placed together. Part C provides contextual information about the scenarios in which septicemia might occur. It sets the stage by mentioning situations like post-surgery or after the patient has suffered something. Part A completes the thought presented in part C by specifying what the patient has suffered (an infectious disease). In option (a), C and A are placed together. Hence, (a) is the correct answer. </p><p>The sentence formed is: The development of septicemia following surgery or after the patient has contracted an infectious disease indicates that the infectious process has escaped the control of the body's immune system and requires immediate medical intervention.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Rearrange the parts of the sentence in the correct order. </p><p>P. The cinematic effects in her </p><p>Q. Of the past</p><p>R. The great filmmakers </p><p>S. Films are clearly borrowed from </p>",
    "options": [
      "QSRP",
      "RQSP",
      "SPRQ",
      "PSRQ"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct order to form a meaningful sentence is PSRQ. Part P comes first as it introduces the subject of the sentence, which is \"The cinematic effects\" (it indicates that cinematic effect is present in something). Part S then specifies what the cinematic effects are related to (Films). It states that cinematic effects are present in her films. It also indicates that these cinematic effects are borrowed. Part R further introduces the individuals from whom the cinematic effects are borrowed (filmmakers). Accordingly, SR forms a necessary pair. Part Q then qualifies the time period or era from which these great filmmakers are from, indicating they are historical figures. Hence, (d) is the correct answer. </p><p><b>The complete sentence is:</b> The cinematic effects in her films are clearly borrowed from the great filmmakers of the past.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order with the first part being fixed. Arrange the parts in the correct order to form a meaningful sentence. </p><p>Infants begin to smile and show excitement when </p><p>B. And display what is considered </p><p>C. Positive stimulus events are withdrawn </p><p>D. To be sadness when </p><p>E. Presented with familiar faces, </p>",
    "options": [
      "CBED",
      "BDEC",
      "EBDC",
      "DECB"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct order to form a meaningful sentence is EBDC. Part E comes first as it is directly linked with the fixed (first) part. The fixed part states that the infants begin to smile and show excitement when something happens. Part E specifies the condition under which infants begin to smile and show excitement - when they are presented with familiar faces. Part B continues the sentence by introducing another reaction of the infants - displaying something that is considered to be a different emotion. Part D completes the thought started in B by specifying what the infants are displaying  -  sadness (Accordingly, BD forms a necessary pair). Part C completes the sentence by specifying the condition that causes the infants to display sadness - when positive stimulus events are withdrawn. Hence, (c) is the correct answer. </p><p><b>The complete sentence is:</b> Infants begin to smile and show excitement when presented with familiar faces, and display what is considered to be sadness when positive stimulus events are withdrawn.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order with the first part being fixed. Arrange the parts in the correct order to form a meaningful sentence. </p><p>In anticipation of the flooding, </p><p>B. To assess the potential and</p><p>C. An enormous amount of research was undertaken </p><p>D. Communities were relocated, and </p><p>E. Then the actual impact</p>",
    "options": [
      "EBDC",
      "CEDB",
      "BCED",
      "DCBE"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct order to form a meaningful sentence is DCBE. Part D comes first as it describes an action taken in anticipation of the flooding - communities were relocated. Part C continues the discussion by describing another action taken  -  research was undertaken. Part B provides the purpose of the research - assessing the potential (Accordingly, CB forms a logical pair). Part E provides another the purpose of the research - assessing both the potential and the actual impact. Hence, (d) is the correct answer. </p><p><b>The complete sentence is:</b> In anticipation of the flooding, communities were relocated, and an enormous amount of research was undertaken to assess the potential and then the actual impact. </p>",
    "question_index": 9
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful and coherent sentence.</p><p>A. They saw strong demand</p><p>B. Printing additional copies </p><p>C. Of the book until </p><p>D. From bookstores</p><p>E. The publishers decided against </p>",
    "options": [
      "ADCBE",
      "ACBDE",
      "EACDB",
      "EBCAD"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct order to form a meaningful and coherent sentence is EBCAD. Part E comes first as it sets the context for a decision made by the publishers. Part B comes next as it explains what action was being considered by the publishers (printing of additional copies of something). Part C specifies what the additional copies are related to a book. Accordingly, BC forms a necessary pair. Parts A and D then explain what the printing of additional copies of the book is dependent on- strong demand from bookstores. Hence, (d) is the correct answer. </p><p><b>The complete sentence is: </b>The publishers decided against printing additional copies of the book until they saw strong demand from bookstores.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Identify the option that arranges the given parts in the correct order to form a meaningful and coherent sentence.</p><p>A. She has a natural flair </p><p>B. The technical sophistication </p><p>C. For design, but her </p><p>D. Creations sometimes lack </p><p>E. Of experienced designers</p>",
    "options": [
      "ADCEB",
      "ACDBE",
      "EBCAD",
      "CDABE"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct order to form a meaningful and coherent sentence is ACDBE. Part A establishes a positive characteristic about her. Part C comes next as it specifies where her positive trait applies - specifically, in design. Accordingly, AC forms a logical pair. Part C introduces a contrast or limitation to the positive trait mentioned in A and part D continues to explain the contrast. Part B then specifies what is lacking in her creations (technical sophistication). Part E mentions the object of the stated contrast ('experienced designers'). Hence, (b) is the correct answer. </p><p><b>The complete sentence is:</b> She has a natural flair for design, but her creations sometimes lack the technical sophistication of experienced designers.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p></p><p>(a) for in the calculation of </p><p>(b) the cost of the film and the</p><p>(c) processing were all accounted</p><p>(d) the cost of the service</p>",
    "options": [
      "a,c,d,b",
      "b,c,a,d",
      "c,d,a,b",
      "b,d,a,c"
    ],
    "correct_option_id": 1,
    "solution": "<p>'b' talks about the main topic of discussion 'the film' so it will be the first part of the sentence and 'c' will be the next part of the sentence as it continues to discuss what happens with the film. 'a'-'d' is a definite pair as it talks about the calculation and cost of the service for the film.</p><p>The correct sequence of the parts of the sentence is b,c,a,d.</p><p>The sentence is  -  <b><i>\"</i></b><b><i>The cost of the film and the processing were all accounted for in the calculation of the cost of the service.</i></b><b><i>\"</i></b></p><p>Hence, option (b) is correct.</p>",
    "question_index": 12
  },
  {
    "question": "<p>A sentence, split into four parts, has been given. Choose the best order which produces the original sentence. </p><p>achieving such a feat(A)/ an elite club of nations(B)/ would see India enter(C)/ a successful mission(D)</p>",
    "options": [
      "B, A, D, C",
      "B, C, A, D",
      "D, C, B, A",
      "D, C, A, B"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct order is DCBA.</p><p>Part D introduces the condition or outcome of a successful mission, highlighting the importance of achieving success.</p><p>Part C describes the consequence or effect of a successful mission, stating that it would lead to India entering or joining something.</p><p>Part B specifies the group or category that India would become a part of, emphasizing it as an elite club of nations.</p><p>Part A provides additional information about the accomplishment or achievement, highlighting that the nations in the elite club have achieved a similar feat.</p><p>By arranging these parts in the given order, the sentence forms a coherent and meaningful statement.</p><p>Hence, option (c) is the correct answer. </p><p>The rearranged sentence is: A successful mission would see India enter an elite club of nations achieving such a feat. </p>",
    "question_index": 13
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order with the first part being fixed. Arrange the parts in the correct order to form a meaningful sentence.</p><p></p><p>It has been justly </p><p>B. this continuous cyclical </p><p>C. progress at work</p><p>D. movement entirely excludes </p><p>E. observed by many that</p>",
    "options": [
      "ECDB",
      "DCEB",
      "CDBE",
      "EBDC"
    ],
    "correct_option_id": 3,
    "solution": "<p>After reading all five parts we can observe that, the fixed part and E form a pair as the fixed part ends with the adverb 'justly' and E starts with the verb 'observed' to be modified by this adverb. B and D also form a pair as B ends with the adjective 'cyclical' and D starts with the noun 'movement' to get modified by this adjective. C can be placed last as it explains that there is a hindrance in development at work due to the continuous cyclical movement. Rearranging the four jumbled parts in the order of EBDC makes a meaningful sentence. Hence, (d) is the correct answer.</p><p>The final sentence would be: It has been justly observed by many that this continuous cyclical movement entirely excludes progress at work.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Identify the options that arrange the part in the correct order to form a meaningful sentence. </p><p>A. It took two days</p><p>B. who had set out</p><p>C. spotted by one of his</p><p>D. for him to be</p><p>E. fellow fishermen</p><p>F. to search for him</p>",
    "options": [
      "ACEDBF",
      "ADCEBF",
      "ADCBEF",
      "ABCEDF"

> are known as possessive adjectives (or possessive determiners). They come before nouns and <b>indicate ownership</b> of the noun. <b>Example:</b> \"The teacher asked the students to open <b><i>their</i></b> drawing books.\"</p><p><b>Relative pronouns: </b>A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies, or describes, the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p>",
