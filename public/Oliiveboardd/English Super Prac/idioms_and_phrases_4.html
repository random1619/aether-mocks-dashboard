<!DOCTYPE html>

<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">

        </div>

                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>

            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>What does the idiom 'Steal someone's thunder' mean?</p>",
    "options": [
      "Take credit for someone else's idea.",
      "Praise someone openly.",
      "Help someone succeed.",
      "Keep a secret."
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct answer is \"Take credit for someone else's idea.\"</p><p>Praise someone openly: Incorrect, as the idiom refers to undermining someone, not giving them praise.</p><p>Help someone succeed: Incorrect, as the idiom implies taking away someone's recognition, not aiding them.</p><p>Keep a secret: Incorrect, as the idiom has nothing to do with confidentiality.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the meaning of the idiom in bold and italics.</p><p>Sometimes he decides when he is <b><i>beside himself</i></b>.</p>",
    "options": [
      "Not in good health.",
      "Only a shadow of oneself.",
      "Out of mind.",
      "All alone."
    ],
    "correct_option_id": 2,
    "solution": "<p>The meaning of the idiom 'beside himself' is 'out of his/her mind'. Among the options, 'out of mind' is the correct option that matches the meaning of the given idiom.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate idiom that means the same as the given sentence. </p><p>Just because the restaurant has a fancy exterior, it doesn't mean the food is good.</p>",
    "options": [
      "Don't cry over spilled milk.",
      "Don't judge a book by its cover.",
      "The early bird catches the worm.",
      "Strike while the iron is hot."
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence means that even though the restaurant looks impressive from the outside, it doesn't necessarily mean the food inside is of good quality. The idiom that best fits this situation is: Don't judge a book by its cover. This idiom means that you shouldn't form opinions about something or someone based solely on outward appearances because they may be misleading. Hence, (b) is the correct answer.</p><p>Don't cry over spilled milk: This means not getting upset over something that has already happened and cannot be changed.</p><p>The early bird catches the worm: This means that being proactive and taking action early can lead to success or an advantage.</p><p>Strike while the iron is hot: This means to take advantage of an opportunity promptly, while conditions are favourable or circumstances are right.</p>",
    "question_index": 2
  },
  {
    "question": "<p> Select the most appropriate meaning of the idiom used in the given sentence. </p><p>The coach hit the ceiling when he found out the team had skipped practice to go to a party.</p>",
    "options": [
      "Reached the rooftop",
      "Severe punishment",
      "Become angry",
      "Ignore the situation"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate meaning of the idiom \"hit the ceiling\" is 'become angry'. The idiom \"hit the ceiling\" is used to describe a sudden outburst of anger or extreme frustration. In the sentence, it suggests that the coach became very angry upon discovering that the team had skipped practice to attend a party. Other options do not give the appropriate meaning of the idiom. Hence, (c) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate meaning of the boldened idiom.</p><p>Once one child in our school has the infection, it <b>spreads like wildfire</b>.</p>",
    "options": [
      "Spreads with great speed.",
      "Spreads very slowly.",
      "Spreads very severely with greater effect.",
      "Spreads like a forest."
    ],
    "correct_option_id": 0,
    "solution": "<p>The meaning of the highlighted idiom 'spread like wildfire' means 'quickly affect or become known by more and more people' and the meaning fits in the given sentence. Hence, the answer is option a).</p>",
    "question_index": 4
  },
  {
    "question": "<p>Choose the correct meaning of the bracketed idiom in the given sentence. </p><p>I'm feeling a little _____ (under the weather) today, so I think I'll stay home from work.</p>",
    "options": [
      "Not well",
      "Extremely well",
      "A peaceful life",
      "Generous and kind"
    ],
    "correct_option_id": 0,
    "solution": "<p>The idiom \"under the weather\" means to feel slightly unwell or ill. It is often used to describe someone who is not feeling well enough to go to work or school, but who is not sick enough to see a doctor. Hence, (a) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate idiom to substitute the underlined segment in the given sentence.</p><p>After reviewing the proposal, the board of directors decided to <u>show approval</u> to the new marketing campaign.</p>",
    "options": [
      "Throw hat in the ring",
      "Play with fire",
      "Beat the dead horse",
      "Give the green light"
    ],
    "correct_option_id": 3,
    "solution": "<p>Throw hat in the ring - To enter a competition or join an activity.</p><p>Play with fire - To engage in a risky or dangerous activity.</p><p>Beat the dead horse - To waste time on a futile issue or effort.</p><p>Give the green light - To give approval or permission for something to proceed.</p><p>Among the given options, the idiom 'give the green light' can accurately substitute the underlined segment.</p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the appropriate idiom for the given blank.</p><p>Though Tom is super successful, no one genuinely looks up to him because he likes to ______________.</p>",
    "options": [
      "fish in troubled waters",
      "fight to the finish",
      "foot the bill",
      "hang fire"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Fish in troubled waters: </b>to take advantage of the trouble of others.</p><p>It is in context to the fact that even though Tom is extremely successful, no one truly respects him since he prefers <b>to take advantage of the trouble of others</b>.</p><p>The rest of the idioms don't fit in the context of the sentence.</p><p>Therefore, the correct answer is: <b>(a) fish in troubled waters.</b></p><p>Additional Information:</p><p>The meanings of the rest of the idioms are given below in the table:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Idiom</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>fight to the finish</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Fight till the end</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>foot the bill</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">bear expenses</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>hang fire</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">remain unsolved</td></tr></table>",
    "question_index": 7
  },
  {
    "question": "<p>Select the appropriate idiom for the given blank.</p><p>If the allied forces of the rival countries want to vanquish the common enemy, they need to ____________ first.</p>",
    "options": [
      "stir the hornet's nest",
      "keep the wolf from the door",
      "live in a fool's paradise",
      "mend their fences"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Mend their fences: </b>to make peace.</p><p>It is in context to the fact that if hostile countries' allied armies seek to defeat a common enemy, they must first <b>make peace</b>.</p><p>The rest of the idioms don't fit in the context of the sentence.</p><p>Therefore, the correct answer is: <b>(d) mend their fences.</b></p><p>Additional Information:</p><p>The meanings of the rest of the idioms are given below in the table:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Idiom</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>stir the hornet's nest</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">raise controversy</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>keep the wolf from the door</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">to avoid starvation</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>live in a fool's paradise</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">false hope</td></tr></table>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate meaning of the underlined idiom.</p><p>She remained <u>on the fence </u>about the next day's travel.</p>",
    "options": [
      "Certain",
      "Prepared",
      "Confirmed",
      "Undecided"
    ],
    "correct_option_id": 3,
    "solution": "<p>The meaning of the idiom 'on the fence' is 'undecided about a decision'. Among the options, option (d) 'undecided' (not having made a decision) gives the meaning of the underlined idiom.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate idiom for the given situation.</p><p>He is busy every night working on his project. He draws diagrams, conducts experiments, and writes up his findings until late in the night. Despite feeling tired, he knows that staying up late now will help him succeed in the competition. So, with his desk lamp on, he continues to work hard, determined to impress the judges with his project. What is he doing?</p>",
    "options": [
      "Burning the midnight oil",
      "Flying off the handle",
      "Spending a night on the town",
      "Throwing in the towel"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate idiom for the given situation is 'burning the midnight oil'. 'Burning the midnight oil' means working late into the night, especially to complete a task or project. In the given context, the individual is diligently working on his project late into the night, despite feeling tired, with the determination to succeed in the competition. This aligns perfectly with the meaning of \"burning the midnight oil.\" Other idioms are not suitable for the given context. 'Flying off the handle' means losing one's temper suddenly or becoming very angry. 'Spending a night on the town' means going out and enjoying oneself socially for the evening. 'Throwing in the towel' means giving up or surrendering, especially in the face of adversity. Hence, (a) is the correct answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate idiom that can substitute italicised words in the given sentence.</p><p>The report's introduction provides a <i>complete view</i> of the new project. </p>",
    "options": [
      "Apple of the eye",
      "Bird's eye view",
      "One trick pony",
      "Fish out of water"
    ],
    "correct_option_id": 1,
    "solution": "<p>Apple of the eye: Cherished above all others; a person's favourite.</p><p>Bird's eye view: An overall or panoramic view; a comprehensive perspective.</p><p>One trick pony: Someone or something with only one special talent or ability.</p><p>Fish out of water: A person who feels uncomfortable or out of place in a particular situation.</p><p>Among the given options, the idiom 'bird's eye view' can correctly substitute the italicised words in the sentence.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>A flash in the pan</p>",
    "options": [
      "A continuous and lasting achievement",
      "An unpredictable turn of events",
      "A fleeting success or popularity",
      "A hidden or unexpected talent"
    ],
    "correct_option_id": 2,
    "solution": "<p>A flash in the pan: Something that shows initial promise but fails to deliver or maintain success.</p><p>Among the given options, 'a fleeting success or popularity' is the correct meaning of the given idiom.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the sentence that uses the idiom correctly.</p>",
    "options": [
      "Ranita was not selected for the job as she got cold feet.",
      "Walking bare feet on grass gave him cold feet.",
      "After too much cycling Arun got cold feet.",
      "One can swim easily with cold feet."
    ],
    "correct_option_id": 0,
    "solution": "<p>To \"have cold feet\" is to be too fearful to undertake or complete an action, a wave of timidity or fearfulness, loss or lack of courage or confidence.</p><p>Only the sentence in option (a) uses the idiom correctly.</p><p>Hence, option (a) is the correct answer.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>Roll up one's sleeves</p>",
    "options": [
      "to prepare for a fight",
      "to explain something to a stubborn person",
      "to prepare for hard work",
      "to prepare oneself for failure"
    ],
    "correct_option_id": 2,
    "solution": "<p>The idiom 'roll up one's sleeves' means to prepare oneself to work hard. E.g. We need to roll up our sleeves and begin working right away, or else we will not be able to finish in time. C is the right answer.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate option to substitute the highlighted segment in the given sentence.</p><p>When I got an e-mail asking for my password, I should have <b>killed</b><b> a rat</b>.</p>",
    "options": [
      "Smelled a rat",
      "Played with a rat",
      "Killed a bat",
      "Killed a hat"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct form of the idiom is  -  'smelled a rat'. </p><p>It means 'to recognize that something is not as it appears to be or that something dishonest is happening'. </p><p>Hence, option (a) is the answer. </p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>It is crucial for professionals to continuously strive for improvement, instead of just <u>looking to the tributes</u>.</p>",
    "options": [
      "Looking to the honours",
      "Looking to the laurels",
      "Looking to the merits",
      "Looking to the distinctions"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct idiom with its meaning is given below.</p><p>Looking to the laurels: To rest on one's laurels, to be satisfied with past achievements and not strive for further success.</p><p>Among the given choices, option (b) can substitute the underlined segment given in the sentence.</p><p>Hence, option (b) is the correct answer. </p>",
    "question_index": 16
  },
  {
    "question": "<p>Identify the idiom that conveys the meaning given in brackets.</p><p>The citizens were (angry and protesting strongly) after the controversial policy was announced by the government.</p>",
    "options": [
      "Up in arms",
      "Up on the arm",
      "Up on fire",
      "Up the fire"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct idiom for the given meaning is 'up in arms', as it effectively conveys the idea of being angry and protesting strongly. The idiom 'up in arms' means to be very angry and ready to fight or protest about something (angry and protesting strongly). The phrases in options (b), (c), and (d) are not standard English idioms and they do not convey the intended meaning. Hence, (a) is the correct answer.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the sentence that uses the given idiom correctly.</p><p></p><p>Cut corners</p>",
    "options": [
      "He cut corners when he bought cheap materials and built his house.",
      "She cut corners when she used scissors and made her dress shorter.",
      "He cut corners when he took shortcuts and arrived early at his destination.",
      "She cut corners when she skipped breakfast and lost weight."
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct answer is (a) 'He cut corners when he bought cheap materials and built his house'.</p><p>The idiom \"cut corners\" means to do something in an easy, cheap or fast way, but with poor quality or results. It is usually used to describe situations where someone tries to save time, money or effort, but at the expense of quality or performance. The sentence (a) uses the idiom correctly to show that he bought cheap material and built his house but with poor quality or results. The other sentences do not use the idiom correctly because they either suggest that the things were done well, properly or beneficially, which contradicts the meaning of the idiom.</p>",
    "question_index": 18
  },
  {
    "question": "<p><b> </b>In the following question, a statement has been given with highlighted text. Select the option that can replace the text with the correct idiom or phrase. </p><p>If you <b>put all your efforts into doing it</b>, you would finish the job in an hour. </p>",
    "options": [
      "Put your mind to it",
      "Have something in mind",
      "Have a mind like a steel trap",
      "Prey on somebody's mind"
    ],
    "correct_option_id": 0,
    "solution": "<p>The phrase 'put your mind to it' means to put all of your attention and efforts into doing it. Hence, (a) is the correct answer. </p><p>Have something in mind- to be thinking about something as a possibility. </p><p>Have a mind like a steel trap- to be able to think very quickly, clearly and intelligently&#183; </p><p>Prey on somebody's mind- to worry about something for a long time. </p>",
    "question_index": 19
  }
];
    </script>
