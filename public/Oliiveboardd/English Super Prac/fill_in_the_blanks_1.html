<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>If it</u> <u>will rain</u> tomorrow, <u>I will</u> stay <u>at home.</u></p>",
    "options": [
      "I will",
      "at home",
      "will rain",
      "If it"
    ],
    "correct_option_id": 2,
    "solution": "<p>In conditional sentences (if-clauses), we use the simple present tense in the if-clause to talk about future possibilities, not the future tense. The correct sentence should be \"If it rains tomorrow, I will stay at home.\" The future tense \"will rain\" in the if-clause is incorrect.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Identify the grammatical error in the following sentence and select the correct tense from the options given below.</p><p>I have met my friend yesterday.</p>",
    "options": [
      "had been meeting",
      "was meeting",
      "met my friend",
      "have been meeting"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence \"I have met my friend yesterday\" contains a grammatical error in tense usage. The present perfect tense \"have met\" indicates an action completed at an unspecified time or with ongoing relevance, but \"yesterday\" is a specific past time marker, requiring the simple past tense \"met.\" The correct sentence is \"I met my friend yesterday.\"</p><p>&#183; Option 1 (\"had been meeting\") is past perfect continuous, implying a prolonged past action, not suitable here.</p><p>&#183; Option 2 (\"was meeting\") is past continuous, suggesting an ongoing action, not a completed meeting.</p><p>&#183; Option 3 (\"met my friend\") correctly uses the simple past tense, fixing the error.</p><p>&#183; Option 4 (\"have been meeting\") is present perfect continuous, inappropriate with \"yesterday.\"</p><p>Thus, option 3 is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>The sentence below contains errors. Select the option with the correct use of tenses.</p><p>I will revised my course at least three times before my final examination.</p>",
    "options": [
      "I would revised my course at least three times before my final examination.",
      "I will be revised my course at least three times since my final examination.",
      "I will have revised my course at least three times before my final examination.",
      "I must revised my course at least three times before my final examination."
    ],
    "correct_option_id": 2,
    "solution": "<p>The original sentence has a grammatical error in the verb form \"will revised\" (should be \"will revise\"). Additionally, the context suggests an action completed before a future event (the final examination), which requires the future perfect tense (\"will have revised\").</p><p>&bull; Option 1: \"I would revised\" is incorrect because \"would\" is used for hypothetical situations, and \"revised\" should be \"revise\" after \"would.\"</p><p>&bull; Option 2: \"I will be revised\" is incorrect because \"revised\" is passive, implying the course revises itself, and \"since\" is inappropriate for a future event.</p><p>&bull; Option 3: \"I will have revised\" correctly uses the future perfect tense to indicate the action of revising will be completed before the examination.</p><p>&bull; Option 4: \"I must revised\" is incorrect because \"must\" is a modal verb requiring the base form \"revise.\"</p><p>Thus, the correct option is 3) I will have revised my course at least three times before my final examination.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution required'.</p><p>The inspector <u>smile</u> after he was finished and patted Margie's head.</p>",
    "options": [
      "No substitution required",
      "smiled",
      "was smiled",
      "has smiled"
    ],
    "correct_option_id": 1,
    "solution": "<p>The underlined segment \"smile\" is incorrect because it is a noun or base verb form, but the sentence requires a past tense verb to match \"was finished\" and \"patted.\"</p><p>&#183; Option 1: Incorrect, as substitution is needed.</p><p>&#183; Option 2: \"Smiled\" is the simple past tense, correct for the context.</p><p>&#183; Option 3: \"Was smiled\" is passive, implying the smile acted on the inspector, which is incorrect.</p><p>&#183; Option 4: \"Has smiled\" is present perfect, inconsistent with the past tense narrative.</p><p>The correct sentence is: \"The inspector smiled after he was finished and patted Margie's head.\" Thus, the correct option is 2. smiled.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the following sentence.</p><p><u>We are decorate</u> the living-room at the moment.</p>",
    "options": [
      "We are being decorating",
      "We are being decorate",
      "We are decorates",
      "We are decorating"
    ],
    "correct_option_id": 3,
    "solution": "<p>The underlined segment \"are decorate\" is incorrect. The present continuous tense requires the verb form \"decorating\" after \"are.\"</p><p>&#183; Option 1: \"We are being decorating\" is incorrect; \"being\" is unnecessary.</p><p>&#183; Option 2: \"We are being decorate\" is passive and incorrect.</p><p>&#183; Option 3: \"We are decorates\" uses the wrong verb form for continuous tense.</p><p>&#183; Option 4: \"We are decorating\" is the correct present continuous form.</p><p>The correct sentence is: \"We are decorating the living-room at the moment.\" Thus, the correct option is 4. We are decorating.</p>",
    "question_index": 4
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>How long are you working / for your current employer / and why don't you / look for better opportunities?</p>",
    "options": [
      "look for better opportunities",
      "and why don't you",
      "How long are you working",
      "for your current employer"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the segment \"How long are you working.\" In English, when asking about the duration of an ongoing action that started in the past and continues to the present, the present perfect continuous tense is used (e.g., \"How long have you been working\"). The present continuous tense (\"are you working\") is incorrect in this context because it implies a temporary or current action rather than a duration. The correct sentence would be: \"How long have you been working for your current employer and why don't you look for better opportunities?\"</p><p>Thus, the segment with the error is \"How long are you working.\"</p>",
    "question_index": 5
  },
  {
    "question": "<p>The following sentence has been divided into four parts. Identify the part that contains an error.</p><p>(A) It is sad / (B) that you / (C) are believing / (D) in superstitious rituals.</p>",
    "options": [
      "A",
      "C",
      "B",
      "D"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error lies in part 3 \"are believing.\" The verb \"believe\" is a stative verb, which describes a state rather than an action. Stative verbs are generally not used in continuous tenses like \"are believing.\" The correct form should be \"believe.\" </p><p>The correct sentence: It is sad that you believe in superstitious rituals.</p><p>Hence, the correct answer is option 2.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>Sivamani <u>is working</u> as an electrician for the past 22 years.</p><p></p>",
    "options": [
      "had been worked",
      "has been working",
      "have been working",
      "would work"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Present perfect continuous tense (\"has been working\") is correct for actions continuing from the past to the present.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the option that can substitute the bracketed word correctly and complete the sentence.</p><p>If he runs, he (get) there in time.</p>",
    "options": [
      "Will get",
      "Is getting",
      "Got there in time",
      "Has to get"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; This is a first conditional sentence (if + present simple, will + base verb).</p><p>&#183; Correct structure: <i>If + Present Simple, + Will + Base Verb</i></p><p>&#183; Option 1 (Will get) follows this rule.</p><p>&#183; Option 2 (Is getting) does not match the conditional structure.</p><p>&#183; Option 3 (Got there in time) is past tense and does not fit.</p><p>&#183; Option 4 (Has to get) implies necessity rather than a conditional action.</p><p>Thus, option 1 (Will get) is the correct answer.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the correct word to replace the bracketed word in the sentence:</p><p>\"I said I (don't) understand.\"</p>",
    "options": [
      "Doesn't",
      "Am doing",
      "Didn't",
      "Done"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The sentence is in past tense (\"said\"), so the verb must also be in the past tense.</p><p>&#183; \"Don't\" is present tense, but \"didn't\" is past tense, making it the correct choice.</p><p>&#183; Corrected sentence:</p><p>\"I said I didn't understand.\"</p><p>Explanation of Options:</p><p>&#183; Doesn't (A) &rarr; Present tense, incorrect. </p><p>&#183; Am doing (B) &rarr; Doesn't fit the sentence structure. </p><p>&#183; Didn't (C) &rarr; Correct answer, matches the past tense. </p><p>&#183; Done (D) &rarr; Incorrect verb form. </p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The captain dropped the trophy while he ___ the victory with his teammates.</p>",
    "options": [
      "celebrated",
      "celebrates",
      "is celebrating",
      "was celebrating"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence is: \"The captain dropped the trophy while he ___ the victory with his teammates.\" We need to choose the correct verb tense to fill the blank.</p><p>&#183; The main clause (\"The captain dropped the trophy\") is in the past simple tense, indicating a completed action in the past.</p><p>&#183; The subordinate clause introduced by \"while\" describes an action happening simultaneously with the main clause's action. Since the main action is in the past, the simultaneous action should also be in the past.</p><p>&#183; Option A (\"celebrated\"): Past simple suggests the celebration was a completed event, but \"while\" implies an ongoing action at the moment of dropping, making this less precise.</p><p>&#183; Option B (\"celebrates\"): Present simple is incorrect as it doesn't match the past context of the sentence.</p><p>&#183; Option C (\"is celebrating\"): Present continuous is incorrect for the same reason; it's not in the past.</p><p>&#183; Option D (\"was celebrating\"): Past continuous (\"was celebrating\") correctly indicates an ongoing action in the past at the time the trophy was dropped (e.g., \"He was celebrating when he dropped it\").</p><p>Thus, the correct sentence is: \"The captain dropped the trophy while he was celebrating the victory with his teammates.\"</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>He ___ the truth.</p>",
    "options": [
      "spoken",
      "speaking",
      "spoke",
      "speak"
    ],
    "correct_option_id": 2,
    "solution": "<p>As the sentence is in the past tense (indicated by the context of a completed action), the past tense form of the verb \"speak\" is appropriate. Among the given options-</p><p>&#183; \"spoken\" is the past participle, used with auxiliary verbs (e.g., \"has spoken\").</p><p>&#183; \"speaking\" is the present participle, indicating ongoing action.</p><p>&#183; \"spoke\" is the simple past tense, fitting a completed action.</p><p>&#183; \"speak\" is the present tense, unsuitable for a past context.</p><p>Thus, \"spoke\" is the correct choice, making the sentence \"He spoke the truth.\"</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank:</p><p>\"Serena ______ from fever since the 5th of this month.\"</p>",
    "options": [
      "is suffering",
      "has been suffering",
      "suffers",
      "suffered"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct answer is option 2: \"has been suffering.\" The phrase \"since the 5th of this month\" indicates a continuous action that started in the past and is still ongoing at the present moment. The present perfect continuous tense (\"has been suffering\") is appropriate here to show the duration of the action. Option 1 (\"is suffering\") suggests a current state without emphasizing duration, option 3 (\"suffers\") is simple present and does not convey the ongoing nature, and option 4 (\"suffered\") is past tense, which is incorrect as the action continues.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate word to fill in the blank.</p><p>I _______ something burning now.</p>",
    "options": [
      "smell",
      "have smelt",
      "smelt",
      "have been smelling"
    ],
    "correct_option_id": 0,
    "solution": "<p>The completed sentence would then be: \"I smell something burning now.\"</p><p>This sentence is in the present tense and describes the action of smelling something in the present moment.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Fill in the blank with the most appropriate word.</p><p>Second-hand furniture ______ here at reasonable prices.</p>",
    "options": [
      "are sold",
      "were selling",
      "has sold",
      "is sold"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Furniture' is an uncountable noun, so singular verb will be used after it. So, 'are' and 'were' in options (a) and (b) are incorrect. </p><p>The given sentence is in passive voice as the subject 'furniture' is subject to the action of being sold at reasonable price. So, the active voice construct 'has sold' is not correct here. </p><p>'Is sold' makes the sentence meaningful. </p><p>The complete sentence is: Second-hand furniture is sold here at reasonable prices.</p><p>Hence, option (d) is the answer. </p><p><b>Note: Countable and uncountable nouns: 1. Countable nouns</b> are the class of nouns that can be counted, for example, 'table'  -  one table, two tables, three tables, etc. <b>2. Uncountable nouns </b>are the nouns that cannot be counted or usually are not counted, for example, light, water, milk, information, furniture, etc. They do not generally have a plural form and can't be preceded by<b> 'a' </b>or <b>'an'. </b>Many abstract nouns are typically uncountable. Some uncountable nouns can be used in the plural as well, depending on the meaning or context of the word.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Fill in the blank with the most appropriate option.</p><p>If it _______ been for him, nobody would even have known Monster was back!</p>",
    "options": [
      "Wasn't",
      "Hadn't",
      "Couldn't",
      "Hasn't"
    ],
    "correct_option_id": 1,
    "solution": "<p>The third conditional uses the past perfect ('had not been' in the given sentence) in the if clause and a modal ('would' in the given sentence) and present perfect ('have known' in the given sentence) in the result clause. This form is used to talk about a hypothetical situation in the past that did not happen  -  typically with an outcome that did not happen and is perhaps the opposite of what did happen. The same is the scenario here. </p><p>So, the complete sentence is: If it hadn't been for him, nobody would even have known Monster was back!</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the present perfect tense of the verb given in the brackets to fill in the blank. </p><p>Alex _______ (study) two programming languages. </p>",
    "options": [
      "Has studied",
      "Have study",
      "Has been studying",
      "Had studied"
    ],
    "correct_option_id": 0,
    "solution": "<p>The present perfect tense describes an action that happened at an unspecified time in the past or has relevance to the present. It is formed using \"has/have\" + past participle. The subject, \"Alex,\" is singular, so \"has\" is appropriate. </p><p>&#183; <b>(1) Has studied</b>: This is the present perfect tense, using \"has\" (singular) and the past participle \"studied.\" It indicates that Alex completed studying two programming languages at some point, with relevance to now (e.g., he knows them). This fits the sentence.</p><p>&#183; <b>(2) Have study</b>: This is incorrect because \"have\" requires a plural subject, and \"study\" is the base form, not the past participle needed for present perfect (correct: \"studied\").</p><p>&#183; <b>(3) Has been studying</b>: This is the present perfect continuous tense, emphasizing an ongoing action that started in the past and continues. The sentence doesn't suggest ongoing study, so this is less appropriate.</p><p>&#183; <b>(4) Had studied</b>: This is the past perfect tense, used for actions completed before another past event, which doesn't match the present relevance implied by the sentence.</p><p>The sentence implies a completed action with present relevance, making <b>has studied</b> the correct present perfect form. Therefore, the correct answer is option (1).</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Never ever ______ seen a more disgusting sight.</p>",
    "options": [
      "did I",
      "has I",
      "have I",
      "I have"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence uses inversion for emphasis, common with phrases like \"never ever.\" The correct structure is \"Never ever + auxiliary + subject + verb.\" Since the subject is \"I\" and the verb is \"seen\" (present perfect), the auxiliary is \"have.\"</p><p>did I: Incorrect, as \"did\" is for past simple, not present perfect.</p><p>has I: Incorrect, as \"has\" pairs with third-person singular, not \"I.\"</p><p>have I: Correct, as \"have\" matches \"I\" in present perfect with inversion.</p><p>I have: Incorrect, as it lacks inversion required by \"never ever.\"</p><p>Thus, have I is correct: \"Never ever have I seen..\"</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate verb / verb phrase to fill in the blank.</p><p>In 2030, advancements in technology _______ the way we live, work and interact with each other.</p>",
    "options": [
      "could be reshaped",
      "shall have been reshaped",
      "will be reshaping",
      "have reshaped"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence refers to a future event in 2030, describing the ongoing impact of technological advancements. The appropriate verb tense should reflect future action with a continuous effect.</p><p>Option 1(\"could be reshaped\") suggests possibility but lacks the certainty implied by the context.</p><p>Option 2 (\"shall have been reshaped\") is a future perfect tense, implying completion by 2030, which doesn't fit the ongoing nature.</p><p>Option 3 (\"will be reshaping\") is the future continuous tense, indicating ongoing action in the future, which suits the context of continuous change.</p><p>Option 4 (\"have reshaped\") is present perfect, implying past action, which is incorrect for a future context.</p><p>Thus, \"will be reshaping\" is the most appropriate choice.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blanks.</p><p>\"He had ________ the ________ into smaller clips.\"</p>",
    "options": [
      "clipping, clips",
      "clipping, clipped",
      "clips, clipping",
      "clipped, clipping"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence requires a past participle in the first blank (following \"had\") and a noun in the second blank (as the object being divided). \"Clipped\" is the past participle form needed after \"had\" in a past perfect construction, and \"clipping\" as a noun refers to the item being divided into smaller pieces.</p>",
    "question_index": 19
  }
];
    </script>
