<!DOCTYPE html>

<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>

                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>

                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>

                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Fill in the blanks with the correct pair of words.</p><p>I saw your ___ playing outside in the ___ this afternoon. </p>",
    "options": [
      "Son, sun",
      "Sun, son",
      "Sun, sun",
      "Son, son"
    ],
    "correct_option_id": 0,
    "solution": "<p>The given sentence talks about the speaker seeing a person playing outside in the afternoon. Both blanks require a noun as the first blank is preceded by a possessive determiner (your) and the second blank is preceded by the definite article 'the'. 'Son' means one's male offspring and 'sun' means the star which is the centre of the solar system. Among the given options, 'son' and 'sun' fit in the blanks respectively as their usage conveys that the speaker saw a person's kid playing in the sunlight this afternoon. Hence, (a) is the correct answer. </p><p>Note:</p><p><b>Possessive Determiners/Adjectives:</b> Words like <b><i>'my', 'our', 'your', 'his', 'her', 'its'</i></b>, and <b><i>'their'</i></b> are known as possessive adjectives (or possessive determiners). They come before nouns and <b>indicate ownership</b> of the noun. <b>Example:</b> \"The teacher asked the students to open <b><i>their</i></b> drawing books.\" </p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate homophones to fill the blanks.</p><p>The __________ of the cake made it a ____________ impossible to resist.</p>",
    "options": [
      "Sent, desert",
      "Scent, desert",
      "Sent, dessert",
      "Scent, dessert"
    ],
    "correct_option_id": 3,
    "solution": "<p>\"Scent\" refers to the pleasant smell or fragrance of something. \"Dessert\" refers to a sweet course typically eaten at the end of a meal. So, the pleasant smell of the cake made it difficult to resist, especially since dessert usually entices people with its sweetness.</p><p>The completed sentence is \"The scent of the cake made it a dessert impossible to resist.\"</p><p>Hence, option (d) is correct. </p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the correct homonym from the given options to fill in the blank. </p><p>He _______ the coming tide with absorbed attention.</p>",
    "options": [
      "Aide",
      "Aid",
      "Eyed",
      "Add"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let's look at the meanings of the given options. </p><p>Aide: an assistant to an important person, especially a political leader.</p><p>Aid: help, typically of a practical nature.</p><p>Eyed: look closely or with interest.</p><p>Add: join (something) to something else so as to increase the size, number, or amount.</p><p>The sentence talks about observing a tide with great attention. So, among the given options, 'eyed' is the most appropriate choice. </p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 2
  },
  {
    "question": "<p><b> </b>Select the most appropriate homonym to fill in the blank.</p><p>After boarding the small boat, the couple decided to _____ over to a nearby island.</p>",
    "options": [
      "Sail",
      "Seal",
      "Sale",
      "Sell"
    ],
    "correct_option_id": 0,
    "solution": "<p>In the given sentence, the word that fits best is \"sail\" because it describes the action of travelling over water in a boat, which matches the context of the sentence where the couple decides to travel to a nearby island after boarding a small boat. Hence, (a) is the correct answer.</p><p>The final sentence: After boarding the small boat, the couple decide to sail over to a nearby island.</p><p>A seal can refer to a marine mammal with flippers, or it can refer to a device used for closing or fastening something securely.</p><p>Sale  -  \"Sale\" refers to the exchange of goods or services for money.</p><p>Sell  -  \"Sell\" means to exchange goods or services for money or other goods.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The homophone for the word 'night' is _________.</p>",
    "options": [
      "knit",
      "knight",
      "neat",
      "net"
    ],
    "correct_option_id": 1,
    "solution": "<p>Homophones are words that sound the same but have different meanings and spellings.</p><p>\"Night\" refers to the period of time when it is dark, and the sun has set.</p><p>The word \"knight\" sounds exactly like \"night\" but refers to a medieval soldier or someone who is honoured by the monarch in modern times.</p><p>&#183; Knit  -  the act of creating fabric by interlocking loops of yarn.</p><p>&#183; Neat  -  something that is tidy or well-organized.</p><p>&#183; Net  -  a mesh fabric used for catching things, or the Internet.</p><p>Hence, option (b) is correct.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate homophone to fill in the blank.</p><p>Despite her sore feet, she managed to complete the marathon, which was a remarkable ____ of endurance.</p>",
    "options": [
      "Feast",
      "Feat",
      "Feist",
      "Face"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most appropriate homophone to fill in the blank in this sentence would be 'feat'. The word 'feat' refers to an achievement that requires great courage, skill, or strength, which accurately reflects the context of the sentence. The other options do not fit in the context. 'Feast' refers to a large meal. 'Feist' refers to a type of dog breed. 'Face' is a part of the body. Hence, (b) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate homophones to fill in the blanks.</p><p>She ___________ a beautiful picture of a flower that was ___________ for her art class.</p>",
    "options": [
      "drew; due",
      "due; drew",
      "drew; drew",
      "due; due"
    ],
    "correct_option_id": 0,
    "solution": "<p>Option (a) is the correct choice. </p><p><b>Drew</b> is a verb which means to produce a picture or diagram by making lines and marks on paper with a pencil, pen, etc. <b>Due</b> as an adjective means expected at or planned for at a certain time. The sentence is about a person who produced a picture for her art class. </p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate homophone of the underlined word to fill in the blank.</p><p>She <u>sent</u> a bouquet of flowers to her mother. She loved the _______ of roses.</p>",
    "options": [
      "send",
      "cent",
      "scent",
      "smell"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate homophone of the underlined word to fill in the blank is 'scent'. This word means a distinctive smell, especially one that is pleasant. 'Cent' means a unit of money equal to one-hundredth of a dollar. It does not give any meaning to the sentence. The other options are not suitable homophones of 'sent', which is the past (V2) and past participle (V3) of the verb 'send'. 'Send' means to cause or order someone or something to go somewhere, and 'smell' means to perceive or emit an odour or aroma.</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 7
  },
  {
    "question": "<p><b> </b>Select the most appropriate homonym to fill in the blanks. </p><p>I placed a _____ on the horse race yesterday.</p>",
    "options": [
      "Bait",
      "Bat",
      "Bet",
      "But"
    ],
    "correct_option_id": 2,
    "solution": "<p>Among the options provided, \"bet\" is the correct homonym to fill in the blank, as it appropriately fits the context of placing a wager on the horse race. Hence, (c) is the correct answer. </p><p>The final sentence: I placed a bet on the horse race yesterday. </p><p>Bait- food or other lure used to entice prey or induce them to do something desired. </p><p>Bat- a piece of equipment used in various sports, such as baseball or cricket.</p><p>But- used to introduce a phrase or clause contrasting with what has already been mentioned.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate homonym to fill the blank.</p><p>I need to consult a doctor for my ____ fall problem.</p>",
    "options": [
      "hare",
      "heir",
      "hair",
      "here"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Hair' (any of the fine threadlike strands growing from the skin of humans, mammals, and some other animals) is the only option that can fill in the blank because it denotes the type of problem for which the person needs to consult a doctor. 'Heir' (a person legally entitled to the property or rank of another on that person's death), 'hare' (a fast-running, long-eared mammal that resembles a large rabbit, having very long hind legs and typically found in grassland or open woodland) and 'here' (in, at, or to this place or position) do not fit the context of the sentence and are meaningless if used in the sentence.</p><p>The complete sentence is: I need to consult a doctor for my hair fall problem.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 9
  },
  {
    "question": "<p><b> </b>Select the most appropriate homophones to fill in the blanks. </p><p>After twisting her ankle, she needed time to ____ before she could put weight on her _____ again. </p>",
    "options": [
      "Heel, heel",
      "Heel, heal",
      "Heal, heel",
      "Heal, heal"
    ],
    "correct_option_id": 2,
    "solution": "<p>For the first blank, the correct word is \"heal,\" which means to become healthy again after an injury or illness. This indicates that she needed time for her ankle to recover or get better. </p><p>For the second blank, the correct word is \"heel,\" which refers to the back part of the foot. This word describes the part of her body she needed to put weight on after her ankle healed. </p><p>Hence, (c) is the correct answer. </p><p>The final sentence: After twisting her ankle, she needed time to heal before she could put weight on her heel again.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank(s).</p><p>I did not know ____ was milk kept in the refrigerator for ____ son.</p>",
    "options": [
      "They're, their",
      "Their, there",
      "There, their",
      "There, they're"
    ],
    "correct_option_id": 2,
    "solution": "<p>The given sentence talks about a person who did not know that milk was kept in the refrigerator for someone's kid. The first blank should convey the position/place where the milk was kept (used to introduce the clause in the sentence) and the second blank requires an adjective as it is followed by a noun (son). 'There' is used to indicate the fact or existence of something. 'Their' is used to indicate belonging to or associated with the people or things. Among the given options, 'there' and 'their' fit in the blank respectively as their usage conveys that the speaker didn't know about the existence of milk in the refrigerator for a couple's son. Hence, (c) is the correct answer. </p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the correct homonym from the given options to fill in the blank. </p><p>Check the care label on the ______ of fabric when you are buying it.</p>",
    "options": [
      "bail",
      "bale",
      "boil",
      "bile"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let's look at the meanings of the given options.</p><p>Bail: the temporary release of an accused person awaiting trial, sometimes on the condition that a sum of money is lodged to guarantee their appearance in court.</p><p>Bale: a large wrapped or bound bundle of paper, hay, or cotton.</p><p>Boil: the temperature at which a liquid bubble turns to vapour.</p><p>Bile: a bitter greenish-brown alkaline fluid that aids digestion and is secreted by the liver and stored in the gall bladder.</p><p>The context of the sentence is related to cloth. After observing the meanings of each option, 'bale' is the most appropriate choice.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank. </p><p>The homophone of the word 'maze' is ______. </p>",
    "options": [
      "Mare",
      "Maize",
      "Mace",
      "Mere"
    ],
    "correct_option_id": 1,
    "solution": "<p>A homophone is a word that sounds the same as another word but has a different meaning and/or spelling.</p><p>\"Maize\" is a homophone for \"maze,\" as both words sound the same but have different meanings and spellings.</p><p><b>Hence, option (b) is the answer.</b></p><p>Maze: a network of paths and hedges designed as a puzzle through which one has to find a way.</p><p>Maize: a Central American cereal plant that yields large grains (corn or sweetcorn) set in rows on a cob. </p><p>Mare: This refers to a female horse and does not sound the same as \"maze.\"</p><p>Mace: This can refer to a ceremonial staff or a spice and does not sound the same as a \"maze.\"</p><p>Mere: This word is used to emphasize how small or insignificant someone or something is, and it does not sound the same as \"maze.\"</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank. </p><p>The homophone for the word 'here' is ______.</p>",
    "options": [
      "Hair",
      "Heat",
      "There",
      "Haven"
    ],
    "correct_option_id": 0,
    "solution": "<p>A homophone is a word that sounds the same as another word but has a different meaning and/or spelling.</p><p>\"Hair\" is a homophone for \"here,\" as both words sound the same but have different meanings and spellings.</p><p><b>Hence, option (a) is the answer.</b> </p><p>Here: in, at, or to this place or position.</p><p>Hair: any of the fine threadlike strands growing from the skin of humans, mammals, and some other animals.</p><p>Heat: This refers to the temperature or warmth and is not a homophone for \"here.\"</p><p>There: This word indicates a place or position but does not sound the same as \"here.\"</p><p>Haven: This refers to a place of safety or refuge and is also not a homophone for \"here.\"</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the correct homonym from the given options to fill in the blank. </p><p>Make sure you've signed the cheque before ______ the envelope.</p>",
    "options": [
      "sealing",
      "ceiling",
      "seedling",
      "sailing"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let's look at the meanings of the given options. </p><p>Sealing: the action or process of fastening or closing something securely.</p><p>Ceiling: the upper interior surface of a room or other similar compartment.</p><p>Seedling: a young plant, especially one raised from seed and not from a cutting.</p><p>Sailing: the action of sailing in a ship or boat.</p><p>After observing the meanings of each option, we can conclude that 'sealing' is the most appropriate choice among the given options.</p><p>Hence, option (a) is the correct answer. </p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate homophones to fill in the blanks. </p><p>I couldn't _____ to walk on the hot sand with my ____ feet. </p>",
    "options": [
      "Bare, bears",
      "Bare, bear",
      "Bear, bare",
      "Bear, bares"
    ],
    "correct_option_id": 2,
    "solution": "<p>In the first blank, we need a verb that fits in the context of walking on the hot sand. The word \"bear\" fits this context perfectly and implies that it was difficult for the subject to walk on the hot sand. \"Bear\" can mean to endure or tolerate something difficult or uncomfortable.</p><p>In the second blank, we need an adjective to describe the condition of the feet. The word \"bare\" means uncovered or naked, which fits in the context of walking on hot sand because one wouldn't want to walk on hot sand with uncovered or naked feet. </p><p>\"Bares\" is incorrect as it is a verb which means \"uncovers (a part of the body or other thing) and exposes it to view\".</p><p><b>The complete sentence is: </b>I couldn't <b>bear </b>to walk on the hot sand with my <b>bare</b> feet.</p><p>Hence, (c) is the correct answer. </p>",
    "question_index": 16
  },
  {
    "question": "<p> Select the most appropriate homonym to fill in the blank.</p><p>The beavers feed on leaves and the living ____ of the trees.</p>",
    "options": [
      "Berk",
      "Barque",
      "Bark",
      "Barge"
    ],
    "correct_option_id": 2,
    "solution": "<p>In the given sentence, we are talking about a kind of rodents (beavers) who eat leaves and parts of trees. So, the appropriate homonym in the current context is 'bark' which means 'the hard outer covering of a tree'.</p><p>Hence, (c) is the correct answer.</p><p>Berk: a gullible person who is easy to take advantage of</p><p>Barque: a type of sailing vessel</p><p>Barge: to move clumsily</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank. </p><p>The pastry chef sifted the ____ before adding it to the cake batter. </p>",
    "options": [
      "Floor",
      "Flour",
      "Flower",
      "Fluor"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most appropriate homonym to fill in the blank is 'flour'. \"Flour\" refers to a finely ground powder made from grains, nuts, seeds, or roots, commonly used in baking to make dough or batter. In the given sentence, the pastry chef sifted the flour before adding it to the cake batter, indicating the correct ingredient for baking. Other words do not fit the context of the sentence. \"Floor\" refers to the surface of a room on which one stands or walks. \"Flower\" is the reproductive structure found in flowering plants. \"Fluor\" typically refers to fluoride or fluorine, chemical elements or compounds. </p><p>The complete sentence is: The pastry chef sifted the flour before adding it to the cake batter.</p><p>Hence, (b) is the correct answer. </p>",
    "question_index": 18
  },
  {
    "question": "<p><b> </b>Select the most appropriate homonym to fill the blank.</p><p>She used a ___________ to tie her hair back.</p>",
    "options": [
      "pear",
      "pare",
      "pair",
      "peer"
    ],
    "correct_option_id": 2,
    "solution": "<p>In this context, \"pair\" refers to two similar or identical objects that are used together. In this case, it suggests that she used a pair of something (such as hair ties or clips) to tie her hair back.</p><p>The completed sentence would be: \"She used a pair to tie her hair back.\"</p><p>Hence, option (c) is correct. </p>",
    "question_index": 19
  }
];
    </script>
