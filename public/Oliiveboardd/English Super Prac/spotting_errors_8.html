    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>I told Pooja <u>that she could have use my car to get around</u> while she is in my hometown.</p>",
    "options": [
      "that she could have use my car to get around with",
      "that she can use my car to get around",
      "that she could have use my car to get away",
      "that she can use my car to get away with"
    ],
    "correct_option_id": 1,
    "solution": "<p>The usage of the word 'use' is incorrect in the underlined part. Either the third form of a verb should be used after the helping verb 'have', or the word 'have' should be removed from the sentence so that the first form of the verb fits appropriately after the modal verb 'could/can' in the sentence. So, options (a) and (c) are incorrect as they do not rectify this error.</p><p>Option (d) is incorrect as 'to get away with' means 'to escape'. It does not make the sentence coherent as one cannot escape a place and yet stay in the speaker's hometown.</p><p>Hence, (b) is the correct answer.</p><p><b>Note: </b>Modal verb: A verb used with another verb to express an idea such as the possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence.</p><p>One's family plays a very <u>major role to continue the trends</u> and age-old traditions.</p>",
    "options": [
      "passive role in making the trends",
      "futile part in making trends",
      "significant role in enduring the trends",
      "docile part in enduring trends"
    ],
    "correct_option_id": 2,
    "solution": "<p>In the underlined phrase the verb 'to continue' is in infinite form, but the sentence implies that the action to follow age-old traditions still continues and so the verb has to be in the continuous form of the verb (V4). Among the given options, in option (a), 'passive role' contradicts the context of the given sentence as the sentence indicates an active continuation of following the tradition and thus it is negated. Also, age-old traditions cannot be made in the present, they are already there. In options (b) and (d), 'futile' (incapable of producing any useful result; pointless) and 'docile' (ready to accept control or instruction; submissive) are contextually irrelevant words and thus they cannot replace the given incorrect phrase. Thus, options (b) and (d) are also negated. Option (c) 'significant role in enduring the trends' is the most appropriate option that can replace the incorrect phrase given in the sentence.</p><p>Hence, the correct answer is option (c).</p><p>Note:</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 1
  },
  {
    "question": "<p>In the sentence identify the segment which contains the grammatical error.</p><p>That man would have attacked you, if you went that way.</p>",
    "options": [
      "attacked you",
      "that man would have",
      "if you went",
      "that way"
    ],
    "correct_option_id": 2,
    "solution": "<p>The first part of the sentence is in past perfect conditional, so the other half must have if + past perfect tense. The phrase 'if you went' should be replaced by 'if you had gone' in order to rectify the error. Hence, (c) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Identify the segment in the given sentence which contains the grammatical error.</p><p>If India will win this match they will win the series.</p>",
    "options": [
      "If India will win",
      "this match",
      "they will win",
      "the series"
    ],
    "correct_option_id": 0,
    "solution": "<p>The given sentence is an example of the first conditional sentence. The sentence structure of a first conditional sentence is: <b>if + simple present, will/can/must + verb.</b></p><p>The given sentence is incorrect according to the syntax of the sentence. The verb 'will win' should be replaced with the singular form of the verb (because the subject 'India' is singular in nature) 'wins' to rectify the given sentence. Therefore, the error is in the part in option (a).</p><p>Hence, option (a) is the correct answer.</p><p>The correct sentence is: If India wins this match, they will win the series.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence.</p><p>I keep telling myself <u>how I am luck</u>y<u> to have</u> such wonderful sisters.</p>",
    "options": [
      "how lucky I am to have",
      "how lucky I am to having",
      "how I am lucky for",
      "how I am lucky for having"
    ],
    "correct_option_id": 0,
    "solution": "<p>The tone of the given sentence is exclamatory (expressing the joy of being lucky).</p><p>In this case, the sentence structure is: Expression of exclamation ['How lucky'] + subject ['I'] + verb ['am'] + object ['to have such wonderful sisters'].</p><p>So, the phrase in option (a) improves the underlined part.</p><p>Hence, option (a) is the answer.</p><p>Option (b) Is incorrect because the infinitive marker 'to' should be followed by the base verb, whereas, 'having' is not the base verb.</p><p><b>Note: </b><b>Infinitive marker</b>: A word or affix attached to the stem of a verb in order to form the full infinitive. In English, to is the infinitive marker.</p><p><b>Infinitive:</b> The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p>&#183; To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p>&#183; My father likes to cook. [like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p>&#183; To vote in elections is our right. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#183; Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>&#183; The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Parts of the following sentence have been given as options. Select the option that contains an error.</p><p>Today she said to her friend, \"You're the sweetest person I have met ever\".</p>",
    "options": [
      "I have met ever\".",
      "her friend, \"You're",
      "Today she said to",
      "the sweetest person"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let's break down the sentence: \"Today she said to her friend, 'You're the sweetest person I have met ever'.\"</p><p>&#183; Option 1: \"I have met ever\"  -  The phrase \"I have met ever\" is grammatically incorrect. The correct word order should be \"I have ever met.\" In English, \"ever\" typically comes before the verb in such constructions (e.g., \"the sweetest person I have ever met\"). The placement of \"ever\" at the end is incorrect, making this segment erroneous.</p><p>&#183; Option 2: \"her friend, 'You're\"  -  This segment is grammatically correct. It's part of the sentence structure where \"she said to her friend\" introduces the dialogue, and \"You're\" is the contraction of \"You are,\" which is appropriate in the quoted speech.</p><p>&#183; Option 3: \"Today she said to\"  -  This segment is also correct. It forms the introductory clause of the sentence, with proper tense (\"said\") and preposition (\"to\").</p><p>&#183; Option 4: \"the sweetest person\"  -  This segment is correct as well. It's part of the quoted speech and is grammatically sound.</p><p>Thus, the error lies in Option 1 due to the incorrect placement of \"ever.\"</p>",
    "question_index": 5
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains an INCORRECT preposition.</p><p>Please remember to take / your notice to the reception area / if you want it to be displayed / upon the bulletin board.</p>",
    "options": [
      "Please remember to take",
      "upon the bulletin board",
      "if you want it to be displayed",
      "your notice to the reception area"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let's analyze each segment for the use of prepositions:</p><p>&#183; Option 1: \"Please remember to take\"  -  This segment has no preposition, just the verb \"take.\" It's grammatically correct as part of the sentence.</p><p>&#183; Option 2: \"upon the bulletin board\"  -  The preposition \"upon\" is incorrect here. The standard preposition for displaying something on a bulletin board is \"on,\" not \"upon.\" \"Upon\" is more formal and typically used in different contexts (e.g., \"upon arrival\"). The correct phrase should be \"on the bulletin board.\"</p><p>&#183; Option 3: \"if you want it to be displayed\"  -  This segment has no preposition and is grammatically correct as a conditional clause.</p><p>&#183; Option 4: \"your notice to the reception area\"  -  The preposition \"to\" is correct here, indicating the destination of the notice (i.e., \"take your notice to the reception area\").</p><p>The incorrect preposition is in Option 2, where \"upon\" should be replaced with \"on.\"</p>",
    "question_index": 6
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p>She <u>will being</u> <u>studying</u> for her <u>exams</u> <u>tomorrow</u>.</p>",
    "options": [
      "studying",
      "tomorrow",
      "will being",
      "exams"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence \"She will being studying for her exams tomorrow\" has a grammatical error in the underlined part \"will being.\" In English, the future continuous tense is formed using \"will be\" followed by the present participle of the verb (e.g., \"studying\"). The phrase \"will being\" is incorrect because \"being\" is not the appropriate verb form here; it should be \"will be studying.\" The correct sentence is \"She will be studying for her exams tomorrow.\" The other underlined parts - \"studying,\" \"exams,\" and \"tomorrow\" - are correct in context. Therefore, the error is in option 3.</p>",
    "question_index": 7
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The teacher will never / give you punishment / if you will / come on time.</p>",
    "options": [
      "give you punishment",
      "if you will",
      "come on time",
      "the teacher will never"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in the segment \"if you will.\" In English, the simple present tense is used in conditional clauses introduced by \"if\" when referring to future possibilities, not the future tense with \"will.\" The correct form is \"if you come on time.\" Thus, the sentence should read: \"The teacher will never give you punishment if you come on time.\" The other segments are correct: \"the teacher will never\" is a valid subject and verb phrase, \"give you punishment\" is acceptable (though \"impose punishment\" might be more formal), and \"come on time\" is grammatically sound.</p>",
    "question_index": 8
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains an error.</p><p>If she exercises daily, / she would / remain energetic / and fit forever.</p>",
    "options": [
      "remain energetic",
      "If she exercises daily",
      "and fit forever",
      "she would"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error is in the segment \"she would.\" This sentence is a first conditional, expressing a real possibility in the future, where the structure is \"If + present simple, will + base verb.\" The correct form should be \"she will remain energetic.\" The full sentence should be: \"If she exercises daily, she will remain energetic and fit forever.\" The other segments are correct: \"If she exercises daily\" uses the present simple appropriately, \"remain energetic\" is a valid verb phrase, and \"and fit forever\" is acceptable, though \"forever\" is slightly informal.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the following sentence.</p><p><u>Play cards</u> is not allowed here.</p>",
    "options": [
      "Play card",
      "Played cards",
      "Playing cards",
      "Playing card"
    ],
    "correct_option_id": 2,
    "solution": "<p>The underlined \"Play cards\" is incorrect as a subject. We need a gerund or noun phrase:</p><p>&#183; Play card: Incorrect, as \"card\" is singular and \"play\" isn't a noun.</p><p>&#183; Played cards: Past tense verb phrase, not a subject.</p><p>&#183; Playing cards: A gerund phrase acting as a noun, meaning the activity, correct here.</p><p>&#183; Playing card: Singular, implying one card, not the game.</p><p>\"Playing cards\" fits: \"Playing cards is not allowed here.\"</p>",
    "question_index": 10
  },
  {
    "question": "<p>The given sentence is divided into four segments. Identify the segment that contains a grammatical error.</p><p>A company can / make money by / obtain resources / more affordably.</p>",
    "options": [
      "A company can",
      "make money by",
      "obtain resources",
      "more affordably"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error lies in the segment \"obtain resources.\" When the preposition \"by\" is followed by a verb to indicate the means of achieving something, the verb should be in the gerund form (verb + -ing). The correct phrase is \"obtaining resources,\" as the gerund is required after \"by.\"</p><p>&#183; Option 1 (\"A company can\") is correct as the subject and modal verb.</p><p>&#183; Option 2 (\"make money by\") is correct, setting up the gerund requirement.</p><p>&#183; Option 3 (\"obtain resources\") should be \"obtaining resources.\"</p><p>&#183; Option 4 (\"more affordably\") is correct as a comparative adverb.</p><p>Thus, the segment with the error is obtain resources.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the following sentence.</p><p>Had you been to Dubai, <u>I would also go</u> with you.</p>",
    "options": [
      "I shall be gone",
      "I will have went",
      "I would has also gone",
      "I would have gone"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence uses the third conditional (\"Had you been... would have...\") to describe a hypothetical past situation. The correct substitution should maintain this structure, so \"I would have gone\" is appropriate.</p><p>Option 1: Incorrect. \"I shall be gone\" is future tense and doesn't match the conditional structure.</p><p>Option 2: Incorrect. \"I will have went\" uses incorrect grammar (\"went\" should be \"gone\") and is future perfect, not conditional.</p><p>Option 3: Incorrect. \"I would has also gone\" uses incorrect grammar (\"has\" should be \"have\") and is not idiomatic.</p><p>The correct sentence is: Had you been to Dubai, I would have gone with you</p><p>Hence, the correct answer is option (4).</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the following sentence.</p><p>He passed away <u>in the year 1950 at 10 a.m. on 13 July</u>.</p>",
    "options": [
      "in the year 1950 at 10 a.m. on 13 July",

    "correct_option_id": 1,
    "solution": "<p>This option presents the details in the correct <b>chronological order</b>, which is how events are typically described in English:</p><p>1) <b>Time</b> &rarr; 10 a.m.</p><p>2) <b>Date</b> &rarr; 13 July</p><p>3) <b>Year</b> &rarr; 1950</p><p>So, the full sentence becomes:</p><p>\"He passed away <b>at 10 a.m. on 13 July in the year 1950</b>.\"</p>",
    "question_index": 13
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The manager asked / the cooking team, \"Who / among you is to baked the / Christmas cake this year?\"</p>",
    "options": [
      "Christmas cake this year?",

      "among you is to baked the",

    ],
    "correct_option_id": 2,
    "solution": "<p>The segment \"among you is to baked the\" contains a grammatical error. The verb \"baked\" is incorrect in this context; it should be \"bake\" to maintain the infinitive form after the phrase \"is to.\" The correct construction would be \"among you is to bake the.\" The other segments are grammatically correct: \"The manager asked\" is a valid introductory clause, \"the cooking team, 'Who'\" is part of a direct question, and \"Christmas cake this year?\" completes the question appropriately. Thus, option 3 is the segment with the error.</p><p><b>The correct sentence is- \"The manager asked the cooking team, \"Who among you is to bake the Christmas cake this year?\"\"</b></p>",
    "question_index": 14
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>By the time I reaching / the metro station, / the train had departed.</p>",
    "options": [

      "the train had departed",
      "no error"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error lies in the phrase \"By the time I reaching.\" The verb \"reaching\" should be in the past perfect tense to align with the sequence of events indicated by \"By the time\" and the past perfect \"had departed\" in the latter part of the sentence. The correct form is \"By the time I had reached.\" </p><p>The corrected sentence is: \"By the time I had reached the metro station, the train had departed.\"</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 15
  },
  {
    "question": "<p>Three segments of the following sentence have been underlined and given as options. One of them may contain an error. Select the option that contains the error. If you don't find any error, mark 'No error' as your answer.</p><p><u>When my father will come</u>, <u>I will make sure</u> that <u>I discuss the possibilities</u> of a new business venture with him.</p>",

    "correct_option_id": 2,
    "solution": "<p>The error is in the segment \"When my father will come.\" In English, the simple present tense is used in \"when\" clauses for future events, not the future tense \"will.\" The correct form is \"When my father comes.\" </p><p>The corrected sentence is: \"When my father comes, I will make sure that I discuss the possibilities of a new business venture with him.\"</p><p>Option a: I will make sure  -  Correct, as it uses the future tense appropriately.</p><p>Option b: No error  -  Incorrect, as there is a clear error in option c.</p><p>Option d: I discuss the possibilities  -  Correct in the context of the subjunctive mood after \"make sure that.\"</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate option to substitute the bracketed segment in the given sentence. If there is no need to substitute it, select \"no substitution required'.</p><p>If the dog (is allow complete freedom), it can assume that any toy is acceptable for play.</p>",
    "options": [
      "is allowed complete freedom",
      "allowed completely freedom",
      "No substitution required",
      "are allowed complete free"
    ],
    "correct_option_id": 0,
    "solution": "<p>The helping verb 'is' should be followed by either past participle (V3) or present participle (V4). Also, the dog is what the action of being allowed complete freedom is subjected at. So, the passive voice construct 'is + allowed' is apt in this case. </p><p>The correct sentence is: If the dog is allowed complete freedom, it can assume that any toy is acceptable for play.</p><p>Hence, option (a) is the answer. </p><p><b>Note: Active and Passive Voice: </b>When the person doing the action is the subject, the sentence is said to be in active form/voice. When the subject is what the action is directed at, then the sentence is said to be in passive form/voice. For example: Active Voice: Rita and her friends performed a skit. Here 'Rita and her friends' (subject) perform the action. Passive Voice: A skit was performed by Rita and her friends. Here 'skit' is the subject (at which the action is directed).</p>",
    "question_index": 17
