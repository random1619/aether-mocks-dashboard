<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>The patient</u> <u>had been waiting</u> patiently <u>for over two hours</u> before the doctor <u>finally attends</u> to him for a check-up.</p>",
    "options": [
      "for over two hours",
      "had been waiting",
      "finally attends",
      "The patient"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the verb tense in the segment \"finally attends\". The first part of the sentence uses the Past Perfect Continuous tense (had been waiting), which describes an action that was ongoing for a duration before another event in the past. This sets the entire context of the sentence in the past. The second action must also be in the past tense.</p><p>The verb 'attends' is in the Simple Present tense, which is incorrect. It should be in the Simple Past tense ('attended') to maintain the correct sequence of tenses.</p><p><b>Correct sentence:</b> The patient had been waiting patiently for over two hours before the doctor <b>finally attended</b> to him for a check-up.</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>By this time next year, my sister ________ her master's degree from the university.</p>",
    "options": [
      "will complete",
      "is completing",
      "will have completed",
      "completed"
    ],
    "correct_option_id": 2,
    "solution": "<p>The given sentence describes an action that will be finished before a specific point in the future. The key phrase is \"By this time next year,\" which sets a future deadline for the completion of an action. Therefore, the blank requires a verb in the Future Perfect tense.</p><p>The correct option is <b>\"will have completed\"</b>. The Future Perfect tense (will + have + past participle) is used to express an action that will be finished by a certain future time. It perfectly fits the context of completing a degree by a future date.</p><p>The other options do not fit:</p><p>&#183; \"will complete\" (Simple Future) indicates that the action will happen in the future but doesn't emphasize its completion before a specific time.</p><p>&#183; \"is completing\" (Present Continuous) is used for an action happening now, which contradicts the future timeline.</p><p>&#183; \"completed\" (Simple Past) refers to an action that is already finished, which is incorrect.</p><p>Thus, the correct sentence is: \"By this time next year, my sister <b>will have completed</b> her master's degree from the university.\"</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option with the correct use of future tense.</p>",
    "options": [
      "If the weather forecast is accurate, it is going to snow heavily tomorrow.",
      "If the weather forecast is accurate, it will have snowed heavily tomorrow.",
      "If the weather forecast will be accurate, it is going to snow heavily tomorrow.",
      "If the weather forecast is accurate, it will have been snowing heavily tomorrow."
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct option is a) If the weather forecast is accurate, it is going to snow heavily tomorrow.</p><p>This sentence is a Type 1 conditional sentence, used for real future possibilities. The structure is If + Simple Present, ... Simple Future. The phrase \"is going to\" is a common way to express the simple future, especially for predictions based on present evidence (the accurate forecast).</p><p>Let's look at why the other options are incorrect:</p><p>&#183; <b>Option (b):</b> This uses the future perfect tense (\"will have snowed\"), which is incorrect. It would mean the snowing will be finished by some point tomorrow, which is not the intended meaning of a general prediction.</p><p>&#183; <b>Option (c):</b> This is incorrect because the 'if' clause in a Type 1 conditional must use the simple present tense (\"is\"), not the future tense (\"will be\").</p><p>&#183; <b>Option (d):</b> This uses the future perfect continuous tense, which is incorrect as it describes the duration of an action up to a future point, not a simple prediction.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select a grammatically correct sentence using the future tense.</p>",
    "options": [
      "As soon as the sun will set, the streetlights will turn on automatically.",
      "As soon as the sun sets, the streetlights will turn on automatically.",
      "As soon as the sun will set, the streetlights are turning on automatically.",
      "As soon as the sun has set, the streetlights would turn on automatically."
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct option is b) As soon as the sun sets, the streetlights will turn on automatically.</p><p>This sentence demonstrates the correct structure for future time clauses. When a clause begins with a time conjunction like \"as soon as,\" \"when,\" \"before,\" or \"after\" and refers to the future, it must use the <b>simple present tense</b> (\"sets\"). The main clause then uses the simple future tense (\"will turn on\").</p><p>Let's look at why the other options are incorrect:</p><p>&#183; <b>Option (a):</b> This is incorrect because the future tense (\"will set\") cannot be used in a future time clause starting with \"as soon as\".</p><p>&#183; <b>Option (c):</b> This has two errors: it incorrectly uses the future tense in the time clause and uses the present continuous tense (\"are turning on\") in the main clause, which is less appropriate than the simple future for a statement of future fact.</p><p>&#183; <b>Option (d):</b> This has two errors: it incorrectly uses the present perfect (\"has set\") in the time clause and \"would\" instead of \"will\" in the main clause.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to substitute the bracketed segment in the given sentence.</p><p>If I knew his address, I (would have visited his) home to meet his parents.</p>",
    "options": [
      "would visit his",
      "will visit his",
      "would be visiting his",
      "will have visited his"
    ],
    "correct_option_id": 0,
    "solution": "<p>This sentence is a Type 2 conditional, used for hypothetical or unreal situations in the present. The 'if' clause uses the Simple Past tense (\"knew\") to express this unreality. The main clause (the result clause) in a Type 2 conditional must use \"would\" + the base form of the verb. The underlined segment incorrectly uses \"would have visited,\" which belongs to a Type 3 conditional (for unreal past situations).</p><p>The correct option is \"would visit his\" because it follows the correct structure for a Type 2 conditional (\"would\" + base verb).</p><p>Option b) \"will visit his\" is used for Type 1 conditionals (real future possibilities).</p><p>Option c) \"would be visiting his\" implies an ongoing action, which is less appropriate here than the simple result.</p><p>Option d) \"will have visited his\" is the Future Perfect tense and doesn't fit the conditional structure.</p><p>So, the correct sentence is: If I knew his address, I would visit his home to meet his parents.</p><p>Hence, the most appropriate choice is a) would visit his.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>It is high time</u> that the municipal corporation <u>realises</u> its responsibility <u>towards maintaining</u> <u>the cleanliness</u> of the city's public parks.</p>",
    "options": [
      "the cleanliness",
      "realises",
      "towards maintaining",
      "It is high time"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in the verb tense in the segment \"realises\". The idiomatic expression \"It is time\" or \"It is high time\" is followed by a subject and a verb in the Simple Past tense. This structure is used to express that something should have been done earlier and is overdue.</p><p>The verb realises is in the Simple Present tense. The correct verb form to use in this structure is the Simple Past tense, which is 'realised'.</p><p><b>Correct sentence:</b></p><p>It is high time that the municipal corporation <b>realised</b> its responsibility towards maintaining the cleanliness of the city's public parks.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>He ________ to the gym every single morning before he goes to work.</p>",
    "options": [
      "goes",
      "is going",
      "went",
      "has gone"
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence describes a routine or habitual action. The phrases \"every single morning\" and \"before he goes to work\" are key indicators of a repeated, daily habit. The blank requires a verb tense that expresses regular, habitual actions in the present.</p><p>The correct option is <b>\"goes\"</b>. The Simple Present tense is used to describe habits, routines, and general truths. Since going to the gym is a daily routine for him, the Simple Present is the most appropriate choice.</p><p>The other options do not fit:</p><p>&#183; \"is going\" (Present Continuous) would imply he is on his way to the gym right now, not that it's a habit.</p><p>&#183; \"went\" (Simple Past) refers to a completed action in the past.</p><p>&#183; \"has gone\" (Present Perfect) indicates a recent past action with a result in the present, not a routine.</p><p>Thus, the correct sentence is: \"He <b>goes</b> to the gym every single morning before he goes to work.\"</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option with the correct use of the present tense.</p>",
    "options": [
      "The Earth is revolving around the Sun in an elliptical orbit.",
      "The Earth revolves around the Sun in an elliptical orbit.",
      "The Earth has revolved around the Sun in an elliptical orbit.",
      "The Earth has been revolving around the Sun since an elliptical orbit."
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct option is b) The Earth revolves around the Sun in an elliptical orbit.</p><p>This sentence correctly uses the <b>simple present tense</b> (revolves). The simple present tense is used to state universal truths, scientific facts, and general habits that are always true. The fact that the Earth orbits the Sun is a universal truth.</p><p>Let's look at why the other options are incorrect:</p><p>&#183; <b>Option (a):</b> This uses the present continuous tense (\"is revolving\"). This tense is used for actions happening right now or for temporary situations, not for permanent universal truths.</p><p>&#183; <b>Option (c):</b> This uses the present perfect tense (\"has revolved\"), which implies a recently completed action or an action with a result in the present. This is inappropriate for a timeless fact.</p><p>&#183; <b>Option (d):</b> This uses the present perfect continuous tense incorrectly. \"Since\" must be followed by a point in time, not a description of the orbit like \"an elliptical orbit\".</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the option with the correct use of the present tense.</p>",
    "options": [
      "Look! That talented artist is painting a beautiful landscape on the canvas.",
      "Look! That talented artist paints a beautiful landscape on the canvas.",
      "Look! That talented artist has painted a beautiful landscape on the canvas.",
      "Look! That talented artist has been painting a beautiful landscape on the canvas."
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct option is a) Look! That talented artist is painting a beautiful landscape on the canvas.</p><p>This sentence correctly uses the <b>present continuous tense</b> (is painting). The word \"Look!\" at the beginning of the sentence indicates that the action is happening at the moment of speaking. The present continuous tense is the correct choice for describing actions in progress right now.</p><p>Let's look at why the other options are incorrect:</p><p>&#183; <b>Option (b):</b> This uses the simple present tense (\"paints\"), which is used for habits or general truths, not for an action happening at this specific moment.</p><p>&#183; <b>Option (c):</b> This uses the present perfect tense (\"has painted\"), which would imply the action is already finished. The word \"Look!\" suggests the action is ongoing.</p><p>&#183; <b>Option (d):</b> This uses the present perfect continuous tense (\"has been painting\"). While it describes an ongoing action, it emphasizes the duration from a past point until now, which is not the primary focus here. The simple present continuous is more direct.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option to substitute the bracketed segment in the given sentence.</p><p>The board demanded that the new policy (is implemented immediately) by the manager.</p>",
    "options": [
      "was implemented immediately",
      "be implemented immediately",
      "has been implemented immediately",
      "will be implemented immediately"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence uses a verb of command or demand (\"demanded\"). In such cases, the clause that follows (the 'that' clause) must use the subjunctive mood. In the present subjunctive, the base form of the verb (the infinitive without 'to') is used, regardless of the subject. Here, the verb is \"to be,\" so its base form is \"be\".</p><p>The correct option is \"be implemented immediately\" because it correctly uses the subjunctive mood (\"be\" + past participle for passive voice).</p><p>Option a) \"was implemented immediately\" is the Simple Past and is incorrect.</p><p>Option c) \"has been implemented immediately\" is the Present Perfect and is incorrect.</p><p>Option d) \"will be implemented immediately\" is the future tense and is not in the subjunctive mood.</p><p>So, the correct sentence is: The board demanded that the new policy be implemented immediately by the manager.</p><p>Hence, the most appropriate choice is b) be implemented immediately.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p>If the city's administration <u>had taken</u> stricter measures earlier, the waterlogging situation <u>will not have become</u> <u>so severe</u> <u>after the heavy rainfall</u>.</p>",
    "options": [
      "after the heavy rainfall",
      "will not have become",
      "so severe",
      "had taken"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in the main clause of this Type 3 conditional sentence in the segment will not have become. Type 3 conditionals are used to talk about unreal past situations. The structure is: If + Past Perfect, ... would/could/might + have + Past Participle (V3).</p><p>The 'if' clause (If the city's administration had taken...) correctly uses the Past Perfect tense. Therefore, the main clause must use \"would have + V3\", not \"will have + V3\".</p><p><b>Correct sentence: </b>If the city's administration had taken stricter measures earlier, the waterlogging situation <b>would not have become</b> so severe after the heavy rainfall.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>My cousin</u> <u>is working</u> as a software developer in <u>that multinational company</u> <u>since he graduated</u> from college two years ago.</p>",
    "options": [
      "that multinational company",
      "since he graduated",
      "is working",
      "My cousin"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the use of the Present Continuous tense in the segment is working. The sentence uses the conjunction 'since' to indicate a point in the past ('he graduated') from which an action has continued up to the present. For such actions that start in the past and continue to the present, the Present Perfect Continuous tense ('has been working') or the Present Perfect tense ('has worked') should be used. The Present Continuous tense ('is working') is typically used for actions happening right now or in the current period, but not with 'since' to denote duration from a past point.</p><p><b>Correct sentence:</b> My cousin <b>has been working</b> as a software developer in that multinational company since he graduated from college two years ago.</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>I cannot come to the phone right now because I ________ a shower.</p>",
    "options": [
      "took",
      "had taken",
      "have taken",
      "am taking"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence explains the reason for a current inability (\"I cannot come to the phone right now\"). The reason is an action that is in progress at the moment of speaking. The blank requires a verb tense that describes an action happening at the present moment.</p><p>The correct option is <b>\"am taking\"</b>. The Present Continuous tense (am/is/are + -ing) is used to describe actions that are happening at the time of speaking. The speaker is currently in the shower, which is why they cannot answer the phone.</p><p>The other options do not fit:</p><p>&#183; \"took\" (Simple Past) describes a completed action in the past.</p><p>&#183; \"had taken\" (Past Perfect) describes an action completed before another past action.</p><p>&#183; \"have taken\" (Present Perfect) describes a recently completed action, but the context implies the action is still ongoing.</p><p>Thus, the correct sentence is: \"I cannot come to the phone right now because I <b>am taking</b> a shower.\"</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the option with the correct use of the past tense.</p>",
    "options": [
      "While I was studying for my exam, my phone rang loudly.",
      "While I had been studying for my exam, my phone rang loudly.",
      "While I studied for my exam, my phone had rung loudly.",
      "While I was studying for my exam, my phone was ringing loudly."
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct option is a) While I was studying for my exam, my phone rang loudly.</p><p>This sentence correctly uses the <b>past continuous tense</b> (was studying) for a longer, background action and the <b>simple past tense</b> (rang) for a shorter, interrupting action. This is the standard structure for showing an interruption in the past.</p><p>Let's look at why the other options are incorrect:</p><p>&#183; <b>Option (b):</b> This uses the past perfect continuous (\"had been studying\"), which is not necessary here as there is no earlier past action to refer to.</p><p>&#183; <b>Option (c):</b> This incorrectly uses the simple past (\"studied\") for the longer action and the past perfect (\"had rung\") for the interrupting action.</p><p>&#183; <b>Option (d):</b> This uses the past continuous for both actions (\"was studying\" and \"was ringing\"), which suggests two parallel, ongoing actions rather than one interrupting the other.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option to substitute the bracketed segment in the given sentence.</p><p>Our guide explained that the sun (had risen in the east) every single day.</p>",
    "options": [
      "is rising in the east",
      "rises in the east",
      "has risen in the east",
      "was rising in the east"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence is in indirect (reported) speech. While the reporting verb \"explained\" is in the past, the information in the 'that' clause (\"the sun... in the east\") is a universal truth or a scientific fact. A universal truth is always expressed in the Simple Present tense, even when the reporting verb is in the past. The underlined part incorrectly uses the Past Perfect tense (\"had risen\").</p><p>The correct option is \"rises in the east,\" which uses the Simple Present tense to state the universal fact.</p><p>Option a) \"is rising in the east\" is Present Continuous and implies a temporary action.</p><p>Option c) \"has risen in the east\" is Present Perfect and is not used for universal truths.</p><p>Option d) \"was rising in the east\" is Past Continuous and incorrect.</p><p>So, the correct sentence is: Our guide explained that the sun rises in the east every single day.</p><p>Hence, the most appropriate choice is b) rises in the east.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>The research team</u> <u>has submitted</u> <u>its detailed report about</u> the project's progress <u>to the management committee</u> last week.</p>",
    "options": [
      "to the management committee",
      "has submitted",
      "its detailed report about",
      "The research team"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in the use of the Present Perfect tense in the segment \"has submitted\". The sentence contains the specific past time adverbial 'last week', which indicates that the action was completed at a definite time in the past. For actions completed at a specific past time, the Simple Past tense should be used.</p><p>The correct verb form is 'submitted' (V2 form of submit). The Present Perfect tense ('has submitted') is used for actions that have a connection to the present or occurred at an unspecified time in the past.</p><p><b>Correct sentence:</b> The research team <b>submitted</b> its detailed report about the project's progress to the management committee last week.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>While the children ________ in the park, their parents were watching them from a bench.</p>",
    "options": [
      "were playing",
      "had played",
      "have played",
      "played"
