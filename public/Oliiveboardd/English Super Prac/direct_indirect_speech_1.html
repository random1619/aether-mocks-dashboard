    <script>
        const questions = [
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>'I am determined to publish my findings,' the scientist asserted confidently.</p>",
    "options": [
      "The scientist confidently asserted that she is determined to publish her findings.",
      "The scientist confidently asserted that she would be determined to publish her findings.",
      "The scientist confidently asserted that she was determined to publish her findings.",
      "The scientist confidently asserted that she had determined to publish her findings."
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence in the Direct Speech is in <b>Simple Present Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Simple Past Tense</b>.</p><p>Simple Present (Subject + V1 + Object) should be converted into Simple Past (Subject +V2 + Object).</p><p>\"That\" is used in place of Inverted Commas while transforming the sentence from Direct Speech to Indirect Speech.</p><p>For example:</p><p>He said, \"I never go to the village.\" (Direct Speech)</p><p>He said that he never went to the village. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>To convert the direct speech \"I am determined...\" into reported speech, the pronoun \"I\" changes to \"she\" (assuming the scientist is female, as implied by options), and the verb tense shifts back (present \"am\" to past \"was\").</p><p>Therefore, the correct answer is:</p><p><b>The correct sentence is: \"The scientist confidently asserted that she was determined to publish her findings.\"</b></p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>I warned Rita not to be late the next day.</p>",
    "options": [
      "I warned to Rita, \"Don't be late tomorrow\".",
      "I warning Rita, \"Not be late tomorrow\".",
      "I warned Rita, \"Not be late tomorrow\".",
      "I warned Rita, \"Don't be late tomorrow\"."
    ],
    "correct_option_id": 3,
    "solution": "<p>Imperative Sentences in Direct Speech sometimes begin with Negative Commands like \"Don't\"</p><p>The reporting verbs like \"asked/ask\", \"told/tell\", \"advised/ advise\" etc. are changed into \"said/say\", etc.</p><p>\"Not + to + V1\" in indirect speech is changed to \"Don't + V1\" in direct speech.</p><p>Thus, going by the options is one of the best techniques to solve these questions.</p><p>For example:</p><p>My friend advised me not to go to Kolkata. (Indirect Speech)</p><p>My friend said to me, \"Don't go to Kolkata\".\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>'Not to' will be changed to 'don't'. </p><p>'Next day' will changed to 'tomorrow'. </p><p>Inverted commas will be introduced.</p><p>Therefore, the correct answer is option (d): I warned Rita, \"Don't be late tomorrow\".</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Joey said to the girl, \"How are you doing?\"</p>",
    "options": [
      "Joey asked the girl if she was doing fine.",
      "Joey asked the girl how was she doing.",
      "Joey asked the girl that how was she doing.",
      "Joey asked the girl how she was doing."
    ],
    "correct_option_id": 3,
    "solution": "<p>The given sentence is in Interrogative form. In such cases, 'said/said to' becomes 'asked', 'enquired', etc. in the Indirect form, and the verb follows the subject unlike in the Direct form. Accordingly, the sentence that follows the afore-mentioned grammatical rules of Indirect speech is option (d), 'Joey asked the girl how she was doing'. Though option (b), is a closer option, it can be noted that the verb precedes the subject in it and so, it is negated. The other two sentences do not follow the grammatical norms for Indirect speech and so, they are negated.</p><p>Hence, the correct answer is option (d).</p><p>Note:</p><p><b>Direct and Indirect Speech: </b>We use direct speech when we repeat someone's words and indirect speech when we use our own words to report what someone says. For Example: Direct speech: 'I like watching movies,' Seema said; Indirect speech: Seema said she likes watching movies.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Raghav said to Meera, \"Are you upset with me?\"</p>",
    "options": [
      "Raghav asked Meera if she was upset with her.",
      "Raghav asked Meera if she was upset with him.",
      "Raghav asked Meera if she was upset with me.",
      "Raghav asked Meera why she was upset with him."
    ],
    "correct_option_id": 1,
    "solution": "<p>In the case of Interrogative sentences like this, \"said\" in Direct Speech is changed into \"enquired (of)\", \"wanted to know\", \"asked\", etc.</p><p>In Indirect speech, the verb is always placed after the subject, unlike in Direct Speech.</p><p>If there is a question in the Direct Speech whose answer can come as \"Yes\" or \"No\" in the Indirect Speech, we should use the conjunctions \"if\" or \"whether\".</p><p>For example:</p><p>Ravi said to me, \"Is she studying?\" (Direct Speech)</p><p>Ravi asked me if she was studying. (Indirect Speech)</p><p>Also, the sentence in the Direct Speech is in the Simple Present tense. So, the tense in the Indirect Speech should be in the Simple Past tense.</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>'If' would be introduced in the sentence.</p><p>The pronouns 'you' and 'me' would be changed to 'she' and 'him' respectively.</p><p>'Are you' would be changed to 'she was'.</p><p>Therefore, the correct answer is option (b): Raghav asked Meera if she was upset with him.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>\"So help me heaven!\", the man cried, \"I shall never lie again.\"</p>",
    "options": [
      "The man cries out to heaven to help him not to lie again ever.",
      "The man called upon heaven to witness his resolve that he would never lie again.",
      "The man requested heaven to help him and see that he lie again.",
      "The man called heaven and ordered to help him and see to it that she never lies again."
    ],
    "correct_option_id": 1,
    "solution": "<p>Exclamatory Sentences are used to express joy, surprise, wonder, etc. The use of \"Alas!\", \"Hurray!\", \"Oh!\" is evident in Direct Speech. The reporting verb ['said' in the Direct Speech] in the Indirect Speech is changed into \"Exclaimed with sorrow\", \"Exclaimed with joy\", etc.</p><p>Exclamatory Sentence in Direct Speech is changed into assertive form when it is changed into Indirect Speech.</p><p>\"That\" is used in place of Inverted Commas [used in the Direct Speech] in the Indirect Speech.</p><p>The sentence in the Direct Speech is in Future Simple Tense. Therefore, the sentence in the Indirect Speech should be in Present Conditional Tense.</p><p>Future Simple (Subject + will/shall + V1 + object) should be converted into Present Conditional (Subject + would/should + V1 +object).</p><p>For example:</p><p>He said, \"I will be in Kolkata on Friday.\" (Direct Speech)</p><p>He said that he would be in Kolkata on Friday. (Indirect Speech)</p><p>For example:</p><p>Barney said, \"Good Heavens! I am ruined.\" (Direct Speech)</p><p>Barney exclaimed with sorrow that he was ruined. (Indirect Speech)</p><p>The minister said, \"How foolish of me.\" (Direct Speech)</p><p>The minister confessed with regret that he was very foolish. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; 'I' changes to 'he'.</p><p>&#183; 'Help me heaven' changes to 'called upon heaven'</p><p>Therefore, the correct answer is: The man called upon heaven to witness his resolve that he would never lie again.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>She asked, \"Are you meeting my partners next week?\"</p>",
    "options": [
      "She asked about our meeting her partners next week.",
      "She asked if we meet her partners next week.",
      "She asked if we were meeting her partners the following week.",
      "She asked if we were meeting her partners next week."
    ],
    "correct_option_id": 2,
    "solution": "<p>In the case of Interrogative sentences like this, \"said\" in Direct Speech is changed into \"enquired (of)\", \"wanted to know\", \"asked\", etc.</p><p>In Indirect speech, the verb is always placed after the subject, unlike in Direct Speech.</p><p>If there is a question in the Direct Speech whose answer can come as \"Yes\" or \"No\" in the Indirect Speech, we should use the conjunctions \"if\" or \"whether\".</p><p>For example:</p><p>Ravi said to me, \"Is she studying?\" (Direct Speech)</p><p>Ravi asked me if she was studying. (Indirect Speech)</p><p>Also, the sentence in the Direct Speech is in the Present continuous tense. So, the tense in the Indirect Speech should be in the Past continuous tense.</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>'If' will be introduced in the sentence. </p><p>'Are you' will be changed to 'we were'. </p><p>'My' will be changed to 'her'.</p><p>'Next week' will be changed to 'following week'.</p><p>Therefore, the correct answer is option (c): She asked if we were meeting her partners the following week.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>He said, \"Two and two make four.\"</p>",
    "options": [
      "He says that two and two make four.",
      "He said that two and two make four.",
      "He says that two and two made four.",
      "He said that two and two made four."
    ],
    "correct_option_id": 1,
    "solution": "<p>When a Direct Speech contains an idiom or phrase, there should be no change in tense while transforming it into Indirect Speech.</p><p>For example:</p><p>The minister said, \"The mice will play when the cat is away.\" (Direct Speech)</p><p>The minister said that the mice will play when the cat is away. (Indirect Speech)</p><p>The given sentence in direct speech is in present indefinite tense. So, the sentence in indirect speech should also be in present indefinite tense. Reporting verb will remain in same tense as the direct speech.</p><p>Therefore, the correct answer is (b): He said that two and two make four.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>The soldier said to his fellow soldiers, \"I have buried our brave comrade here.\"</p>",
    "options": [
      "The soldier told us that I had buried their brave comrade here.",
      "The soldier told his fellow soldiers that I had buried our brave comrade there.",
      "The soldier told his fellow soldiers that he had buried their brave comrade there.",
      "The soldier told us that he had buried our brave comrade there."
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence in the Direct Speech is in <b>Present Perfect Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Past Perfect Tense</b>.</p><p>Present Perfect (Subject + has/have + V3 +Object) should be converted into Past Perfect (Subject + had + V3 +Object).</p><p>For example:</p><p>He said, \"I have got a new job\" (Direct Speech)</p><p>He said that he had got a new job (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>\"I\" becomes \"He\"</p><p>\"Have buried\" becomes \"Had buried\" (past perfect)</p><p>\"Here\" becomes \"There.\"</p><p>Among the given options, \"The soldier told his fellow soldiers that he had buried their brave comrade there\" follows the rules of Indirect speech.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The mother said that the kids were playing.</p>",
    "options": [
      "The mother said, \"The kids have been playing\".",
      "The mother has said, \"The kids were playing\".",
      "The mother told, \"The kids had been playing\".",
      "The mother said, \"The kids are playing\"."
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence in the Indirect Speech is in <b>Past Continuous Tense</b>. Therefore, the sentence in the Direct Speech will be in <b>Present Continuous Tense</b>.</p><p>Past Continuous (Subject + was/were + V1 + ing + Object) will be converted into Present Continuous (Subject + is/am/are + V1 +ing + Object)</p><p>For example:</p><p>He said that he was checking the assignment. (Indirect Speech)</p><p>He said, \"I am checking the assignment.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>'That' will be removed from the sentence. </p><p>'Were' will be changed to 'are'.</p><p>Therefore, the correct answer is option (d): The mother said, \"The kids are playing\".</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>He said, \"I shall need a copy of the documents.\"</p>",
    "options": [
      "He said that he would need a copy of the documents.",
      "He said that he is going to need a copy of the document.",
      "He said that he will need a copy of the documents.",
      "He said that he shall need a copy of the document."
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence in the Direct Speech is in <b>Future Simple Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Present Conditional Tense</b>.</p><p>Future Simple (Subject + will/shall + V1 + object) should be converted into Present Conditional (Subject + would/should + V1 +object).</p><p>For example:</p><p>He said, \"I will be in Kolkata on Friday.\" (Direct Speech)</p><p>He said that he would be in Kolkata on Friday. (Indirect Speech)</p><p>The following thing in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>Shall-Would</p><p>Among the options, the sentence that follows the rules of Indirect Speech is \"He said that he would need a copy of the documents.\"</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>My brother said to me, \"Don't play in the rain.\"</p>",
    "options": [
      "My brother said to me don't play in the rain.",
      "My brother forbade me to play in the rain.",
      "My brother assured me not to play in the rain.",
      "My brother refused me to not play in the rain."
    ],
    "correct_option_id": 1,
    "solution": "<p>Imperative Sentences sometimes begin with Negative Commands like \"Don't\".</p><p>The reporting verbs like \"said/say\", etc. are changed into \"asked/ask\", \"told/tell\", \"advised/ advise\" etc.</p><p>\"Not + To + V1\" is used in these sentences. For example, \"don't go\" should be changed to \"not to go\" in Indirect speech.</p><p>In this context, \"Don't ......\" changes into \"not to ......\".</p><p>For example:</p><p>My friend said to me, \"Don't go to Kolkata.\" (Direct Speech)</p><p>My friend advised me not to go to Kolkata. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>'Said to me' would be changed to 'forbade me'.</p><p>'Don't' would be deleted and simply replaced with 'to' since forbade in itself is negative in nature.</p><p>Therefore, the correct answer is option (b): My brother forbade me to play in the rain.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>I said to Mohan, \"He has a green book.\"</p>",
    "options": [
      "I told Mohan that he had had a green book.",
      "I told Mohan that he have a green book.",
      "I told Mohan that he had a green book.",
      "I told Mohan that he has a green book."
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence in the Direct Speech is in <b>Present Perfect Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Past Perfect Tense</b>.</p><p>Present Perfect (Subject + has/have + V3 +Object) should be converted into Past Perfect (Subject + had + V3 +Object).</p><p>For example:</p><p>He said, \"I have got a new job.\" (Direct Speech)</p><p>He said that he had got a new job. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>'Said to' will be changed to 'told'. </p><p>That' will be introduced in the sentence and inverted commas will be removed.</p><p>Therefore, the correct answer is option (c): I told Mohan that he had a green book.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option in direct speech.</p>",
    "options": [
      "The principal say me, \"You are in-charge of the admission cell.\"",
      "The principal said me, You are in-charge of the admission cell.",
      "The principal said to I, \"You are in-charge of the admission cell.\"",
      "The principal said to me, \"You are in-charge of the admission cell.\""
    ],
    "correct_option_id": 3,
    "solution": "<p>Option (a) is incorrect as the reporting verb 'say' is incorrect here. 'Said to' or 'says to' should have been used here. 'To' needs to be added to denote whom the principal told something ('me'). Option (b) is incorrect for the same reason. </p><p>Option (c) is incorrect as the objective pronoun 'me' should have been used in place of subjective pronoun 'I' to denote who was being told something. </p><p>Option (d) represents the correct sentence in direct speech. </p><p>Hence, option (d) is the answer. </p><p><b>Note: </b><b>Objective Pronouns:</b> The pronouns me, you, us, him, her, it, and them are called objective pronouns because they act as the objects of verbs and prepositions: Anjali drove us home.</p><p><b>Subjective Pronouns:</b> The pronouns I, you, we, he, she, it, and they are known as subjective pronouns because they act as the subjects of verbs: We went to the party.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>He said, \"I bought this book for my brother.\"</p>",
    "options": [
      "He said that he has bought this book for his brother.",
      "He said that he buy this book for his brother.",
      "He said that he had bought that book for his brother.",
      "He said that he bought this book for his brother."
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence in the Direct Speech is in <b>Past Simple Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Past Perfect Tense</b>.</p><p>Past Simple (Subject + V2 + Object) should be converted into Past Perfect (Subject + had + V3 + Object).</p><p>For example:</p><p>He said, \"Arya sent me a book.\" (Direct Speech)</p><p>He said that Arya had sent him a book. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>I  -  he</p><p>Bought  -  had bought</p><p>This  -  that</p><p>My  -  his</p><p>Therefore, the correct answer is (c): He said that he had bought that book for his brother.</p>",

    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Shikha said, \"The heavy rain this week has spoiled all my travel plans.\"</p>",
    "options": [
      "Shikha said that the heavy rain that week had spoiled all her travel plans.",

      "Shikha said that the heavy rain that week has spoiled all her travel plans.",

    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence in the Direct Speech is in <b>Present Perfect Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Past Perfect Tense</b>.</p><p>Present Perfect (Subject + has/have + V3 +Object) should be converted into Past Perfect (Subject + had + V3 +Object).</p><p>For example:</p><p>He said, \"I have got a new job.\" (Direct Speech)</p><p>He said that he had got a new job. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>'This week' would be changed to 'that week'.</p><p>'Has spoiled' would be changed to 'had spoiled'.</p><p>'My' would be changed to 'her'.</p><p>Since there is no object of the verb 'said' in the sentence in direct speech, 'said' would be changed to 'said that' only.</p><p>Therefore, the correct answer is option (a): Shikha said that the heavy rain that week had spoiled all her travel plans.</p>",
