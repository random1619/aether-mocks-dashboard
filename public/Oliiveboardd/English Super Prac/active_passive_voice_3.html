        </div>

    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" verb and the preposition \"by\" is necessary while changing the voice of the sentence from Passive to Active.</p><p>In Active voice (look at the options), it should be in interrogative form. These are \"wh\" questions that don't take \"yes\" or \"no\" as an answer.</p><p>\"By whom?\" is changed into \"Who\" while transforming from Passive to Active.</p><p>For example:</p><p>By whom are you taught Math? (or) Who are you taught Math by? (Passive)</p><p>Who teaches you Math? (Active)</p><p>\"Who\" is changed into \"Whom\" while transforming from Passive to Active.</p><p>For example:</p><p>Who is being taught by you? (Passive)</p><p>Whom are you teaching? (Active)</p><p>The sentence in the Passive voice is in <b>past indefinite tense</b>. So, the sentence in the Active voice should be in <b>past indefinite tense</b>.</p><p>The options except (d) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is: (d)</p>",

  {

    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>He picked up a vase from the table and flung it across the room.</p>",

    "correct_option_id": 0,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of the verb ['being'] is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in <b>Present Continuous</b>. Thus, the Passive voice will also be in Present Continuous.</p><p>The format of Active voice is: Subject + am/is/are + V1 + ing + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + am/is/are + being + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>Arnab is typing a document. (Active Voice)</p><p>A document is being typed by Arnab. (Passive Voice)</p><p>The options except (a) don't follow the correct grammatical format of the Passive Voice.</p><p>Hence, the correct answer is option (a).</p><p>Note:</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
