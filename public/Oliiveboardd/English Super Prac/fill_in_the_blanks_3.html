<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate option to fill in the blanks.</p><p>It's funny how every time he fails to apply the ____ and the _____ glass.</p>",
    "options": [
      "breaks; breaks",
      "breaks; brakes",
      "brakes; breaks",
      "brakes; brakes"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence requires two words to fill the blanks, and the context suggests a play on homophones \"brakes\" and \"breaks.\"</p><p>\"Brakes\" refers to a device for slowing or stopping (e.g., in a vehicle).</p><p>\"Breaks\" means to shatter or fracture (e.g., a glass breaking).</p><p>The sentence likely describes a scenario where someone fails to apply the \"brakes\" (e.g., in a car), causing something (like a glass) to \"break.\"</p><p>Checking the options:</p><p>Option 1: \"breaks; breaks\" is incorrect because \"breaks\" (shattering) does not make sense for applying a slowing mechanism.</p><p>Option 2: \"breaks; brakes\" reverses the logical order; applying \"brakes\" (slowing) does not break a glass.</p><p>Option 3: \"brakes; breaks\" fits perfectly: failing to apply the \"brakes\" (e.g., not stopping a car) causes the glass to \"break.\"</p><p>Option 4: \"brakes; brakes\" is incorrect because the glass does not \"brake\" (slow down).</p><p>Thus, option 3 is the correct choice.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blanks.</p><p>Reptiles _________ from amphibians. For a long period of 160 million years in earth's history, reptiles were the dominant form of life on the planet and _________ in an enormous variety of shapes and sizes.</p>",
    "options": [
      "developed; continued",
      "came; exhausted",
      "evolved; existed",
      "involved; lived"
    ],
    "correct_option_id": 2,
    "solution": "<p>Reptiles \"evolved\" from amphibians, indicating a gradual development through natural selection, which fits the biological context. The term \"evolved\" is commonly used in scientific contexts to describe the origin and diversification of species. For the second blank, \"existed\" is suitable because it conveys that reptiles were present and dominant in a wide variety of forms over a long period, aligning with the idea of their persistence and diversity during that era.</p><p><b>Correct sentence: Reptiles evolved from amphibians. For a long period of 160 million years in earth's history, reptiles were the dominant form of life on the planet and existed in an enormous variety of shapes and sizes.</b></p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate word to fill in the blank.</p><p>I should have stopped them then and there. But it never even ______ to me that I should.</p>",
    "options": [
      "Happened",
      "Occurred",
      "Reminded",
      "Suggested"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given sentences intend to convey the point of view of a person that he/she should have stopped certain people regarding an unknown event. So, 'occurred' is the right fit with the meaning '(of a thought or idea) comes into the mind of' which no other option can mean.</p><p>Hence, option (b) is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate word to fill in the blank.</p><p>As far as he is ________, he will love to attend the party.</p>",
    "options": [
      "Anxious",
      "Interested",
      "Concerned",
      "Confined"
    ],
    "correct_option_id": 2,
    "solution": "<p>The given sentence talks about on what condition 'he' will love to attend the party. Among the given options, 'concerned' fits in the blank appropriately as its usage conveys that as long as it is about him, it is clear that he will willingly attend the party.</p><p>Other words don't fit in contextually.</p><p>Hence, (c) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Scientists all over the world are engaged in ______ how to find a vaccine for COVID-19.</p>",
    "options": [
      "Scrutinizing",
      "Researching",
      "Investigating",
      "Inspecting"
    ],
    "correct_option_id": 2,
    "solution": "<p>The blank requires a noun as it follows the preposition 'in' which requires a noun/noun equivalent after it. The words given in the options are gerunds.</p><p>Scrutinizing: to examine something very carefully in order to discover information.</p><p>Researching: a detailed study of a subject, especially in order to discover (new) information or reach a (new) understanding.</p><p>Investigating: to examine something carefully.</p><p>Inspecting: to look at something or someone carefully in order to discover information, especially about their quality or condition.</p><p>As per the sentence, the scientists are engaged in finding a way to produce the vaccine.</p><p>Here, the word 'investigating' is the most appropriate as scientists are trying to discover a way to find a vaccine.</p><p>Hence, option (c) is the correct answer.</p><p><b>Note: Gerund:</b> Gerund is a verb form that functions as a noun, ending in -ing. A gerund can be either the subject or object of a sentence in English. Example: \"Everybody enjoyed her dancing and singing at the party.\" The words 'dancing' and 'singing' are gerunds.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Complete the collocation.</p><p>I met my professor yesterday and we _____ a long conversation about books and work.</p>",
    "options": [
      "did",
      "spoke",
      "had",
      "talked"
    ],
    "correct_option_id": 2,
    "solution": "<p>In the English language, collocation refers to a natural combination of words that are closely affiliated with each other.</p><p>'Have a conversation' - If you have a conversation with someone, you talk with them, usually in an informal situation.</p><p>So, with 'conversation', we generally use the verb 'had'.</p><p>'Did a conversation', 'spoke a conversation', and 'talked a conversation' are not correct phrases.</p><p><b>The correct sentence is: </b>I met my professor yesterday and we <b>had</b> a long conversation about books and work.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Fill in the blank with most appropriate word.</p><p>The old building was _____ by the authorities.</p>",
    "options": [
      "pulled up",
      "pulled off",
      "pulled down",
      "pulled through"
    ],
    "correct_option_id": 2,
    "solution": "<p>Pulled up - (of a vehicle) come to a halt.</p><p>Pulled off - succeed in achieving or winning something difficult.</p><p>Pulled down - demolish a building.</p><p>Pulled through - to survive a dangerous or difficult situation.</p><p>The sentence discusses an action by the authorities on the old building. </p><p>Filling the blank with 'pulled down' makes the sentence contextually correct as it implies that the old building was demolished by the authorities. </p><p>Other options do not fit in contextually. </p><p><b>The correct sentence is: </b>The old building was <b>pulled down</b> by the authorities.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blanks.( &#216;: No article)</p><p>___ road to ___ Taj Mahal passes through ___ forest.</p>",
    "options": [
      "A; the",
      "&#216;; &#216;",
      "The; a",
      "A; a"
    ],
    "correct_option_id": 2,
    "solution": "<p>In the sentence, the first blank refers to \"road to Taj Mahal,\" which is a specific road leading to a unique monument, so the definite article \"The\" is appropriate. The second blank refers to \"Taj Mahal,\" a proper noun and specific monument, which typically does not take an article, but in this context, it is often referred to as \"the Taj Mahal\" in formal English. The third blank refers to \"forest,\" which is a general noun in this context (not a specific forest), so the indefinite article \"a\" is suitable. Thus, the correct option is \"The; a,\". </p><p><b>The complete sentence is: \"The road to the Taj Mahal passes through a forest.\"</b></p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The artist received a ___ from the audience.</p>",
    "options": [
      "handful of applause",
      "round of applause",
      "bunch of applause",
      "plenty of applause"
    ],
    "correct_option_id": 1,
    "solution": "<p>The blank requires a phrase that conventionally describes applause.</p><p>\"Round of applause\" (option 2) is a standard expression meaning a burst of clapping (e.g., \"The artist received a round of applause\").</p><p>\"Handful of applause\" (option 1) is not a common phrase.</p><p>\"Bunch of applause\" (option 3) is incorrect, as \"bunch\" is used for tangible items like flowers.</p><p>\"Plenty of applause\" (option 4) is grammatically possible but less idiomatic than \"round of applause.\"</p><p>Thus, option 2 (\"round of applause\") is the most appropriate.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Fill in the blank with the most appropriate word.</p><p>______ you deserve credit for the success of the show.</p>",
    "options": [
      "No less",
      "Such that",
      "None but",
      "Only if"
    ],
    "correct_option_id": 2,
    "solution": "<p>Filling the blank with 'none but' gives the meaning that no one else deserves credit for the success of the show except 'you'. </p><p>Other options do not make the sentence meaningful. </p><p>The complete sentence is: None but you deserve credit for the success of the show.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Police used_______evidence to convict a victim who was innocent.</p>",
    "options": [
      "Stunted",
      "Fabricated",
      "Hateful",
      "Authentic"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence implies that the police used such evidence which could convict the innocent victim, so the evidence must be false.</p><p>Stunted - having been prevented from growing or developing properly.</p><p>Fabricated - produce something in order to deceive.</p><p>Hateful - arousing, deserving of, or filled with hatred.</p><p>Authentic - of undisputed origin and not a copy; genuine.</p><p>Among the given options, only 'fabricated' fits the provided context.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Fill in the blank with the most appropriate option.</p><p>Towel off and _____ your moisturizer immediately.</p>",
    "options": [
      "Refer",
      "Touch",
      "Surrender",
      "Apply"
    ],
    "correct_option_id": 3,
    "solution": "<p>The blank requires a verb that denotes an action with respect to moisturizer.</p><p>Apply - to spread or rub a substance such as cream or paint on a surface.</p><p>So, only 'apply' fits in contextually and implies that the speaker asks for the moisturizer to be spread or rub.</p><p>Hence, option (d) is the answer.</p><p>The complete sentence is: Towel off and apply your moisturizer immediately.</p><p>Surrender - stop resisting to an enemy or opponent and submit to their authority.</p>",
    "question_index": 11
  },
  {
    "question": "<p>A sentence has been given with a blank to be filled with an appropriate option. Choose the correct alternative.</p><p>I told you not to give my number to ________.</p>",
    "options": [
      "Other",
      "Anyone",
      "Someone",
      "Each one"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Other' and 'each one' do not give any meaning to the sentence. They fail to denote the object of the sentence. </p><p>Anyone - any person or people.</p><p>Someone - an unknown or unspecified person; some person.</p><p>Filling the blank with 'anyone' gives the meaning that the subject told that no person should be given his/her number. 'Someone' fails to give meaning to the sentence. </p><p>The complete sentence is: I told you not to give my number to anyone. </p><p>Hence, option (b) is the answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Fill in the blank with the most appropriate option.</p><p>It's a challenge, as you yourself said and men find it hard to turn______challenges.</p>",
    "options": [
      "Up",
      "Below",
      "Down",
      "Aside"
    ],
    "correct_option_id": 2,
    "solution": "<p>Turn up - be found, especially by chance, after being lost.</p><p>Turn down - reject something offered or proposed.</p><p>Turn aside - turn your body (or head) in a different direction or away from something/someone, so you are not facing them anymore.</p><p>Turn below  -  not an appropriate phrasal verb. </p><p>Filling the blank with 'turn down' gives the meaning that men find it difficult to reject challenges. </p><p>Other options fail to give meanings to the sentence. </p><p>The complete sentence is: It's a challenge, as you yourself said and men find it hard to turn down challenges. </p><p>Hence, option (c) is the answer.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Fill in the blank with the most appropriate option.</p><p>I was ______ and was suddenly woken up by the loud noise of crackers bursting.</p>",
    "options": [
      "Fast asleep",
      "Quiet asleep",
      "Quite asleep",
      "Long asleep"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct phrase is 'fast asleep' which means 'sleeping deeply'.</p><p>The complete sentence is: I was fast asleep and was suddenly woken up by the loud noise of crackers bursting.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the correctly spelt word to fill in the blank.</p><p>We are entering a point where technology will change at __________ speeds.</p>",
    "options": [
      "extreme",
      "inferier",
      "suprime",
      "modarate"
    ],
    "correct_option_id": 0,
    "solution": "<p>\"Extreme\" is correctly spelled and fits the context of rapid technological change.</p><p>Inferier: Misspelled; correct is \"inferior.\"</p><p>Suprime: Misspelled; correct is \"supreme.\"</p><p>Modarate: Misspelled; correct is \"moderate.\"</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>She is _________ a peacock in the blue satin saree.</p>",
    "options": [
      "very beautiful as",
      "so beautiful as",
      "as beautiful as",
      "beautiful like"
    ],
    "correct_option_id": 2,
    "solution": "<p>Options (a) and (b) are negated because 'so' (to such a great extent) and 'very' (in a high degree) lay more stress on the adjective 'beautiful' rather than comparing the person and a peacock. Option (d) is negated because it means to state that the peacock is in a blue saree, which is not the context of the sentence.</p><p>Option (c) correctly establishes the comparison between the person (who is compared) and a peacock (with what/whom the person is compared) and so, it can fill in the given blank.</p><p>The complete sentence is: She is as beautiful as a peacock in the blue satin saree.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>'Habitual' may be replaced by '_____'</p>",
    "options": [
      "Stagnant",
      "Continual",
      "Temperate",
      "Holistic"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most appropriate option to fill in the blank is 'continual'. \"Habitual\" and \"continual\" both imply something that occurs regularly or repeatedly over time. 'Stagnant' means characterised by lack of activity, growth, or development. 'Temperate' means mild, moderate, or restrained. 'Holistic' means characterised by the belief that the parts of something are intimately interconnected and explicable only by reference to the whole. Hence, (b) is the correct answer. </p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Meenakshi sweeps the ball excellently when she _____ an off-spin delivery.</p>",
    "options": [
      "will get",
      "has got",
      "got",
      "gets"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate option to fill in the blank is 'gets'. This option is correct because it is in the simple present tense, which is commonly used to express habitual actions or general truths. In the given context, \"gets\" indicates the action of Meenakshi sweeping the ball excellently as a response to an off-spin delivery.</p><p>Option (a) uses the future tense (\"will get\"), which suggests that the action of sweeping the ball excellently will occur in the future. But the sentence describes a habitual or general action that Meenakshi performs when faced with an off-spin delivery. The simple present tense is more appropriate for expressing habitual actions or general truths.</p><p>Option (b) uses the present perfect tense (\"has got\"), which indicates an action that started in the past and has relevance to the present moment. The present perfect tense is not suitable in the given context because the sentence does not emphasise the completion of the action, but rather the habit of sweeping the ball excellently in response to an off-spin delivery.</p><p>Option (c) uses the simple past tense (\"got\"), which indicates an action that occurred in the past. But the sentence does not describe a specific past event. Accordingly, this option is incorrect. Hence, (d) is the correct answer.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the most appropriate article to fill in the blank.</p><p>Rabindranath Tagore, ______ poet, was famous for his poetical work, Gitanjali.</p>",
    "options": [
      "no article required",
      "an",
      "a",
      "the"
    ],
    "correct_option_id": 3,
    "solution": "<p>The definite article \"the\" is used before \"poet\" to specify Rabindranath Tagore as a, well-known poet and also the person about whom the sentence is about.</p><p>The complete sentence: Rabindranath Tagore, the poet, was famous for his poetical work, Gitanjali.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
