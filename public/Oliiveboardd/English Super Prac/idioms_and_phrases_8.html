<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Choose the correct meaning of the bracketed idiom in the given sentence:</p><p>I tried to fix the car myself, but it was just ___________(a drop in the ocean) compared to what needed to be done.</p>",
    "options": [
      "A huge achievement",
      "A rewarding experience",
      "A difficult challenge",
      "A small and insignificant effort"
    ],
    "correct_option_id": 3,
    "solution": "<p>\"A drop in the ocean\" refers to something that is very small or insignificant compared to the overall scope of a situation.</p><p>Hence, option (d) is correct. </p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the correct meaning of the underlined idiom.</p><p>The store owner installed security cameras to catch anyone trying to <u>get a five-finger discount.</u></p>",
    "options": [
      "Shoplift",
      "Profit",
      "To win",
      "To lose money"
    ],
    "correct_option_id": 0,
    "solution": "<p>The phrase \"five-finger discount\" is a slang term that refers to stealing, typically <b>shoplifting</b>. The \"five fingers\" symbolize a person's hand, implying the act of taking something without paying for it.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate idiom for the following statement.</p><p>He seems like he's just pretending to be threatening and isn't causing any real harm.</p>",
    "options": [
      "The ball is in your court.",
      "All bark and no bite.",
      "Don't bite the hand that feeds you.",
      "Let sleeping dogs lie."
    ],
    "correct_option_id": 1,
    "solution": "<p>\"All bark and no bite\" describes someone who makes a lot of noise or gives the appearance of being active or threatening, but in reality, they do nothing significant or don't follow through.</p><p>\"The ball is in your court\" means that it is now your responsibility to take action or make a decision.</p><p>\"Don't bite the hand that feeds you\" means that you shouldn't harm or be ungrateful toward someone who is helping or supporting you.</p><p>\"Let sleeping dogs lie\" means that it's best to avoid interfering with something that is currently at rest or causing no trouble.</p><p>Hence, option (b) is correct. </p>",
    "question_index": 2
  },
  {
    "question": "<p>Which of the following idioms means 'to wish someone good luck\"?</p>",
    "options": [
      "Golden opportunity",
      "Turn up the nose",
      "Black sheep",
      "Break a leg"
    ],
    "correct_option_id": 3,
    "solution": "<p>Golden opportunity  -  A rare and valuable chance to achieve something or succeed.</p><p>Turn up the nose  -  To show disdain or a feeling of superiority, often by rejecting something as beneath one's standards.</p><p>Black sheep  -  A person who is considered different or an outsider in a group, often because they don't conform to accepted behaviour or norms.</p><p>Break a leg  -  An expression used to wish someone good luck, especially before a performance or event.</p><p>Hence, option (d) is correct. </p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate idiom for the following statement. </p><p>The intense argument between the two colleagues turned into a dramatic and spectacular session. </p>",
    "options": [
      "Steal someone's thunder",
      "Blood and thunder",
      "All wet",
      "Off the hook"
    ],
    "correct_option_id": 1,
    "solution": "<p>The statement describes an intense argument between two colleagues that turned into a dramatic and spectacular session. The idiom \"Blood and thunder\" is a figurative expression that is often used to describe a situation or event characterized by intense emotions, conflict, and drama. Hence, (b) is the correct answer. </p><p>\"Steal someone's thunder\" means to take credit for someone else's achievements or to overshadow someone else's success. </p><p>\"All wet\" is an informal expression meaning completely wrong or mistaken. </p><p>\"Off the hook\" typically means being released from an obligation or responsibility. </p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>Put something on ice</p>",
    "options": [
      "Put a project on hold.",
      "Reduce the temperature.",
      "Calm someone down.",
      "Forget about something."
    ],
    "correct_option_id": 0,
    "solution": "<p>The idiom 'put something on ice' means 'to delay doing anything about a plan or idea'; option a) is similar in meaning to the given phrase. Hence, the answer is option a).</p>",
    "question_index": 5
  },
  {
    "question": "<p>In the question below, a sentence is given with a blank. From the options below, choose the correct idiom that can fit in the blank to make the sentence grammatically and meaningfully correct.</p><p>If you aren't an expert in ______________, then you are not fit to be a good salesman.</p>",
    "options": [
      "burning one's boats",
      "breaking the ice",
      "assuming airs",
      "clipping one's wings"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Breaking the ice: </b>initiating a conversation.</p><p>It is in context to the fact that if you don't know how to <b>initiate a conversation</b>, you're not cut out to be a salesperson.</p><p>The rest of the idioms don't fit in the context of the sentence.</p><p>Therefore, the correct answer is: <b>(b) breaking the ice.</b></p><p>Additional Information:</p><p>The meanings of the rest of the idioms are given below in the table:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Idiom</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>burning one's boats</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">point of no return</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>assuming airs</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">to pretend</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>clipping one's wings</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">to weaken the power</td></tr></table>",
    "question_index": 6
  },
  {
    "question": "<p>Four alternatives are given for the Idiom/Phrase underlined in the sentence. Choose the alternative which best expresses the meaning of the Idiom/Phrase and mark it.</p><p>If you don't plan your preparation for this exam, you'll only be <u>chasing your tail</u>.</p>",
    "options": [
      "Doing a lot but achieving little",
      "Trying to be clever to achieve something",
      "Do as expected or as promised",
      "Prove the effectiveness of something"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Chasing your tail' means doing a lot but achieving little. Hence, option (a) is the correct answer.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate idiom that can substitute italicised words in the given sentence </p><p>We applaud the family's decision to <i>remain silent</i> over the issue.</p>",
    "options": [
      "give a shot",
      "chase rainbows",
      "break the ice",
      "hold their peace"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option (d) is the correct answer.</p><p>The idiom 'hold one's peace' means 'remain silent about something'.</p><p><b>The meanings of the Other idioms are-</b></p><p>Give a shot- to try to do something.</p><p>Chase rainbows- trying to do or achieve something that is not really possible or realistic.</p><p>Break the ice- to start a conversation.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the sentence that uses the given idiom correctly.</p><p></p><p>Bear a grudge</p>",
    "options": [
      "She bears a grudge against him for breaking her heart, and she refuses to talk to him ever again.",
      "He bears a grudge against his boss for not giving him a promotion, and he joins the boss to work on another project.",
      "They bear a grudge against each other for partying together at a friend's birthday party.",
      "I bear a grudge against myself for clearing the exam after working hard for two months."
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct answer is (a) 'She bears a grudge against him for breaking her heart, and she refuses to talk to him ever again.'</p><p>The idiom \"bear a grudge\" means to continue feeling angry or resentful towards someone for a past offense or wrong. It usually has a negative connotation. Option (a) uses the idiom correctly, as it implies that she is still bitter and unforgiving towards him. The other options either use the idiom in a positive or neutral way, or in a different sense, which is not appropriate.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Choose the correct meaning of the italicised idiom in the given sentence. </p><p>I was supposed to keep it a secret, but I accidentally <i>let the cat out of the bag</i>.</p>",
    "options": [
      "To hide the truth.",
      "To create a fa&#231;ade.",
      "To cook a story.",
      "To reveal a secret."
    ],
    "correct_option_id": 3,
    "solution": "<p>The idiom \"let the cat out of the bag\" means to reveal a secret, often unintentionally. Hence, (d) is the correct answer. </p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the sentence that uses the idiom correctly. </p><p></p>",
    "options": [
      "Four young seniors from Pune are on cloud nine after the successful West-to-East cycle expedition.",
      "It's going to rain pretty soon as the sky looks like it is on cloud nine.",
      "She is very gloomy because she was on cloud nine.",
      "She could have reached the airport on time if she had been on cloud nine."
    ],
    "correct_option_id": 0,
    "solution": "<p>The idiom 'on cloud nine' means 'extremely happy'. The idiom is used correctly by the sentence in option (a). The sentence conveys that they are extremely happy as they completed the expedition. </p><p>Hence, option (a) is the correct answer. </p>",
    "question_index": 11
  },
  {
    "question": "<p>In the question below, a sentence is given with a blank. From the options below, choose the correct idiom that can fit in the blank to make the sentence grammatically and meaningfully correct.</p><p>The basic advice with investment in the market is don't _________________.</p>",
    "options": [
      "give up the day job",
      "put all your eggs in one basket",
      "To make a long story short",
      "Take a grain of salt"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence talks about what not to do while investing in the market. 'Put all your eggs in one basket (which means to depend for your success on a single person or plan of action)' adds meaning to the sentence as the sentence now become 'basic advice with investment is to not depend on a single plan of action'. Don't give up the day job' means 'to tell someone that you do not think they are very good at something'; it is contextually incorrect though it fits grammatically. 'To make a long story short' means 'to provide just the basic facts rather than giving a lengthy explanation'; it's grammatically incorrect. In option d) the correct idiom is 'take it with a grain of salt' not 'take a grain of salt'; it will be contextually incorrect. Hence, the answer is option b). </p>",
    "question_index": 12
  },
  {
    "question": "<p>In the question given below, an idiom/ phrase is given. From the options, choose the one that best expresses the meaning of the given idiom/ phrase.</p><p>Sour as vinegar</p>",
    "options": [
      "a very bitter person",
      "a very scared person",
      "a very generous person",
      "a very dominating person"
    ],
    "correct_option_id": 0,
    "solution": "<p>The idiom 'sour as vinegar' means a very irritable or bitter person. E.g. Michael has been sour as vinegar, ever since his job application was rejected. A is the right answer.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate meaning of the underlined idiom in the given sentence.</p><p>The sight of a dog eating a dead cow <u>made my flesh crawl</u>.</p>",
    "options": [
      "Something that makes you feel disgusting",
      "Something that hampers your emotional well being",
      "Something that hampers your physical well being",
      "Something that makes you cry"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Make (your) flesh crawl' refers to something that induces a feeling of disgust. Hence, the answer is option a).</p>",
    "question_index": 14
  },
  {
    "question": "<p> Select the correct meaning of the idiom in bold and italics.</p><p>The more famous and successful you become, the more money you make. It's a <b><i>snowball effect</i></b>. </p>",
    "options": [
      "Tendency to become arrogant or selfish.",
      "Increase in amount or degree of something at a fast rate.",
      "The desire to become successful and famous.",
      "Decrease in net worth and popularity."
    ],
    "correct_option_id": 1,
    "solution": "<p>Snowball effect: a situation in which something grows bigger or more important at an ever-increasing rate; amplify.</p><p>Among the options, 'increase in amount or degree of something at a fast rate' is the correct option that matches the meaning of the given idiom. </p><p>Hence, (b) is the correct answer. </p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate meaning of the underlined idiom in the given sentence.</p><p>Dreaming about moving to Canada and owning a luxurious house is more like a <u>pie in the sky</u>.</p>",
    "options": [
      "A happy event in the future",
      "Something that will come true soon",
      "An unlikely or fanciful idea",
      "A dream come true"
    ],
    "correct_option_id": 2,
    "solution": "<p>The idiom 'pie in the sky' means 'used to describe or refer to something that is pleasant to contemplate but is very unlikely to be realized'. Hence, the answer is option c).</p>",
    "question_index": 16
  },
  {
    "question": "<p>In the following question, a statement has been given with highlighted text. Select the option that can replace the text with correct idiom or phrase. </p><p>The party's <b>ordinary workers</b> are beginning to question the prime minister's choice of advisers. </p>",
    "options": [
      "Cock and bull stories",
      "Rank and file",
      "Men of straw",
      "Big guns"
    ],
    "correct_option_id": 1,
    "solution": "<p>The idiom 'rank and file' means 'ordinary people'. </p><p>Hence, option (b) is the answer. </p><p>'Cock and bull stories' means 'made up stories that one should not believe'.</p><p>'Men of straw' means 'men of no substance'.</p><p>'Big guns' means 'important people'. </p>",
    "question_index": 17
  },
  {
    "question": "<p>Identify the proverb that best suits the following scenario.</p><p>When too many people work together on a project as the lead, the final output is substandard.</p>",
    "options": [
      "A journey of a thousand miles begins with a single step.",
      "Actions speak louder than words.",
      "A stitch in time saves nine.",
      "Too many cooks spoil the broth."
    ],
    "correct_option_id": 3,
    "solution": "<p>Among the given options, the proverb 'too many cooks spoil the broth' correctly represents the given scenario in the question, and it means 'if too many people are involved in a task or activity, especially as the lead, it will not be done well'.</p><p>Hence, (d) is the correct answer.</p><p>A journey of a thousand miles begins with a single step: It is necessary to take the first step to achieve a long-term goal.</p><p>Actions speak louder than words: What people do is more significant than what they say.</p><p>A stitch in time saves nine: Address problems or challenges promptly to prevent them from becoming more significant and requiring more effort to fix.</p>",
    "question_index": 18
  },
  {
    "question": "<p><b> </b>Select the most appropriate idiom for the given situation.</p><p>At the start of the workshop, the participants sat in silence, each feeling a bit nervous about meeting new colleagues. Sensing the tension, the facilitator decided to initiate a fun activity. She asked everyone to share an interesting fact about themselves. As people began to open up and share stories, laughter filled the room, and the atmosphere became more relaxed. What did the facilitator do?</p>",
    "options": [
      "Break the ice",
      "Break a leg",
      "Beat around the bush",
      "Burn the midnight oil"
    ],
    "correct_option_id": 0,
    "solution": "<p>The participants were feeling nervous and tense at the beginning of the workshop. The facilitator sensed this tension and decided to initiate a fun activity by asking everyone to share an interesting fact about themselves. This helped to create a more relaxed and friendly atmosphere, encouraging people to open up and interact with each other. \"Breaking the ice\" means to initiate a conversation or activity to make people feel more comfortable in a social setting, especially when they are meeting each other for the first time. Hence, (a) is the correct answer. </p><p>Break a leg: This is a phrase used to wish someone good luck, especially before a performance or event.</p><p>Beat around the bush: Refers to avoiding the main topic or issue; speaking indirectly or evasively instead of addressing something directly.</p><p>Burn the midnight oil: To work late into the night; putting in extra effort or working hard, especially during late hours.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
