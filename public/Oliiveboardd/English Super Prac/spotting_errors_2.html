    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>Sincere students / like you and he should study / regularly to pass the examination.</p>",
    "options": [
      "Sincere students",
      "like you and he should study",
      "regularly to pass the examination.",
      "No error"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence is grammatically correct. \"Like you and he\" uses the subjective case correctly (\"he\" instead of \"him\"), and the rest of the sentence is structurally sound.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that will improve the given sentence by using the most appropriate pronoun.</p><p>Pradeep, whom is a teacher, also works as a content writer.</p>",
    "options": [
      "Pradeep, which is a teacher, also works as a content writer.",
      "Pradeep, whose is a teacher, also works as a content writer.",
      "Pradeep, who is a teacher, also works as a content writer.",
      "Pradeep, that is a teacher, also works as a content writer."
    ],
    "correct_option_id": 2,
    "solution": "<p>Correct answer is \"who is.\" \"Who\" is the correct pronoun for a person, and \"is\" agrees with the singular subject \"Pradeep.\"</p><p>Which is: \"Which\" is used for things, not people.</p><p>Whose is: \"Whose\" is possessive, not appropriate here; it needs a noun (e.g., \"whose book\").</p><p>That is: While \"that\" can sometimes be used for people, \"who\" is more appropriate for a person in this context.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 1
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>When Sanathan asked Mr. Jignesh / for a fresh evaluation of his performance / in the last financial year, / little did him know that the results will come out worse than expected.</p>",
    "options": [
      "When Sanathan asked Mr. Jignesh",
      "for a fresh evaluation of his performance",
      "in the last financial year",
      "little did him know that the results will come out worse than expected"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence contains a pronoun error. The objective pronoun 'him' should be replaced with its subjective pronoun 'he' as the verb 'know' requires a subject. Therefore, the error is in the part in option (d).</p><p>The correct sentence is: When Sanathan asked Mr. Jignesh for a fresh evaluation of his performance in the last financial year, little did he know that the results will come out worse than expected.</p><p>Hence, option (d) is the correct answer.</p><p><b>Note:</b></p><p><b>Objective Pronouns:</b> The pronouns me, you, us, him, her, it, and them are called objective pronouns because they act as the objects of verbs and prepositions: Anjali drove us home.</p><p><b>Subjective Pronouns:</b> The pronouns I, you, we, he, she, it, and they are known as subjective pronouns because they act as the subjects of verbs: We went to the party.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Identify the segment in the given sentence which contains the grammatical error.</p><p>I don't recognise none of the politicians who have been invited to be the speakers today.</p>",
    "options": [
      "the politicians who have been",
      "invited to be",
      "the speakers today",
      "I don't recognise none of"
    ],
    "correct_option_id": 3,
    "solution": "<p>We use 'none' as a pronoun. It cannot be used in a negative sentence. Therefore, the phrase 'I don't recognise none of' is incorrect. The correct phrase is either 'I recognise none of' or 'I don't recognise any of'. Therefore, the error is in the part in option (d).</p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined words in the following sentence.</p><p>I hope you have <u>enjoying yourselves</u> at the party tonight!</p>",
    "options": [
      "enjoys yourselves",
      "will be enjoy himself",
      "are enjoying themselves",
      "enjoy yourselves"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; \"Have enjoying\" is grammatically incorrect because \"enjoying\" is in the present participle form and should not be used with \"have.\"</p><p>&#183; Correct sentence: \"I hope you enjoy yourselves at the party tonight!\"</p><p>&#183; Incorrect options: </p><p>o A) enjoys yourselves  -  Incorrect verb conjugation.</p><p>o B) will be enjoy himself  -  Incorrect pronoun and verb form.</p><p>o C) are enjoying themselves  -  Changes meaning (third-person plural instead of second-person plural).</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p><u>Their was a large snake</u> found in the garden last evening.</p>",
    "options": [
      "There was a large snake",
      "There was the larger snake",
      "There was not a large snake",
      "Their was the larger snake"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; \"Their\" is incorrect because it is a possessive pronoun, while the correct word should be \"There\", which is used to indicate existence.</p><p>&#183; Correct sentence: \"There was a large snake found in the garden last evening.\"</p><p>&#183; Incorrect options: </p><p>o B) There was the larger snake  -  Changes the meaning.</p><p>o C) There was not a large snake  -  Incorrect negation.</p><p>o D) Their was the larger snake  -  Incorrect use of \"Their.\"</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>It was <u>her</u> who first saw the criminal.</p>",
    "options": [
      "she",
      "them",
      "hers",
      "him"
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence is: \"It was her who first saw the criminal.\"</p><p>&#183; The underlined segment is \"her,\" and we need to substitute it with a pronoun that fits grammatically. The structure \"It was [pronoun] who...\" requires a subjective pronoun because \"who first saw the criminal\" refers to the subject of the clause.</p><p>&#183; Option 1: \"she\"  -  This is correct. \"She\" is the subjective form of the pronoun, and in formal English, the correct construction is \"It was she who first saw the criminal.\" While \"her\" is often used in informal speech, \"she\" is grammatically correct in this context.</p><p>&#183; Option 2: \"them\"  -  This is incorrect. \"Them\" is plural and objective, which doesn't fit the singular subject \"who first saw the criminal.\"</p><p>&#183; Option 3: \"hers\"  -  This is incorrect. \"Hers\" is a possessive pronoun, but the sentence requires a subjective pronoun to act as the subject of the clause.</p><p>&#183; Option 4: \"him\"  -  This is incorrect. \"Him\" is a masculine pronoun, while the context indicates a feminine pronoun (\"her\").</p><p>Option 1 (\"she\") is the most appropriate substitution.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined word segment in the following sentence.</p><p>They are leaving <u>there coats there</u>.</p>",
    "options": [
      "their coats there",
      "they're coats there",
      "there coats their",
      "their coats their"
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence is: \"They are leaving there coats there.\" The underlined segment is \"there coats there,\" which has homophone errors.</p><p>o there: Refers to a place (adverb), incorrect before \"coats.\"</p><p>o their: Possessive pronoun, correct for \"their coats\" (belonging to \"they\").</p><p>o The first \"there\" should be \"their\" (possessive), and the second \"there\" is correct (place).</p><p>Let's check options:</p><p>o 1. their coats there: Correct; \"their coats\" fixes the possessive error, and \"there\" is correct for the location.</p><p>o 2. they're coats there: Incorrect; \"they're\" (they are) doesn't fit before \"coats.\"</p><p>o 3. there coats their: Incorrect; \"there coats\" is wrong, and \"their\" as a place is incorrect.</p><p>o 4. their coats their: Incorrect; the second \"their\" should be \"there\" for location.</p><p>The corrected sentence is: \"They are leaving their coats there.\"</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined word segment in the following sentence.</p><p>The girl <u>which is wearing a blue shirt</u> is my sister.</p>",
    "options": [
      "which is wearing the blue shirt",
      "who is wearing a blue shirt",
      "which wear a blue shirt",
      "who wear a blue shirt"
    ],
    "correct_option_id": 1,
    "solution": "<p>The original sentence is: \"The girl which is wearing a blue shirt is my sister.\" The underlined segment is \"which is wearing a blue shirt,\" and we need to correct it.</p><p>&#183; The relative pronoun \"which\" is incorrect here because it's typically used for things or animals, not people. For people, \"who\" is appropriate.</p><p>&#183; The verb \"is wearing\" is correct as it's present continuous, describing a current action, but we need to ensure subject-verb agreement and pronoun correctness.</p><p>&#183; Option A (\"which is wearing the blue shirt\"): Retains \"which,\" so it's incorrect for a person.</p><p>&#183; Option B (\"who is wearing a blue shirt\"): Uses \"who,\" the correct pronoun for a person, and \"is wearing a blue shirt\" is grammatically sound, maintaining the original meaning.</p><p>&#183; Option C (\"which wear a blue shirt\"): Uses \"which\" (wrong) and \"wear\" (incorrect verb form; it should be \"wears\" for singular \"which,\" but \"which\" is wrong anyway).</p><p>&#183; Option D (\"who wear a blue shirt\"): Uses \"who\" (correct), but \"wear\" is incorrect for the singular subject \"girl\" (should be \"wears\" or \"is wearing\").</p><p>The corrected sentence is: \"The girl who is wearing a blue shirt is my sister.\" Thus, the correct answer is Option B.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the following sentence.</p><p><u>There was some</u> drawing-pins in my desk.</p>",
    "options": [
      "There is some",
      "There has some",
      "Theirs some",
      "There are some"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error in the phrase is the helping verb 'was'. \"Drawing-pins\" is plural, so the plural verb \"are\" is require4. \"There are some\" agrees with the subject.</p><p>Option 1- There is some: Incorrect, as \"is\" is singular, not matching the plural \"drawing-pins.\"</p><p>Option 2-There has some: Incorrect, as \"has\" is not used in this structure.</p><p>Option 3-Theirs some: Incorrect, as \"theirs\" is a possessive pronoun, not a valid substitute.</p><p>The correct sentence is: There are some drawing-pins in my desk.</p><p>Hence, the correct answer is option (4).</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option that rectifies the error(s) in the following sentence.</p><p>One must do his/her duty proparly.</p>",
    "options": [
      "One must do once duty proparly.",
      "One must do ones duty properly.",
      "One must do one's duti proprly.",
      "One must do one's duty properly."
    ],
    "correct_option_id": 3,
    "solution": "<p>In the given sentence, when using the pronoun \"one,\" the possessive form is \"one's,\" not \"his/her.\" Proparly: Incorrect spelling; the correct word is \"properly.\"</p><p>One must do once duty proparly: Incorrect; \"once\" is wrong (should be \"one's\"), and \"proparly\" is misspelled. Negated due to multiple errors.</p><p>One must do ones duty properly: Incorrect; \"ones\" lacks the possessive apostrophe (\"one's\"). Negated as it is grammatically incorrect.</p><p>One must do one's duti proprly: Incorrect; \"duti\" and \"proprly\" are misspelled. Negated due to spelling errors.</p><p>One must do one's duty properly: Correctly uses \"one's\" and spells \"properly\" correctly.</p><p>Corrected Sentence: One must do one's duty properly.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option to substitute the bracketed segment in the given sentence. If there is no need to substitute it, select 'no substitution required'.</p><p>(In fact, climbing fern is spreading so rapidly that its) now the state's worst invasive weed.</p>",
    "options": [
      "In fact, climbing fern is spreading so rapid that it's",
      "In fact, climbing fern is spread so rapidly that its",
      "In fact, climbing fern is spreading so rapidly that it's",
      "No substitution required"
    ],
    "correct_option_id": 2,
    "solution": "<p>The given sentence does not imply any possession/ownership, so the usage of possessive pronoun/adjective 'its' is incorrect and it should be replaced with 'it's (it is)'.</p><p>Option (b) is incorrect for the same reason.</p><p>Option (a) is incorrect as the verb 'spreading' requires the adverb 'rapidly' to modify/qualify it, and not the adjective 'rapid'.</p><p>The correct sentence is: In fact, climbing fern is spreading so rapidly that it's now the state's worst invasive weed.</p><p>Hence, option (c) is correct.</p><p><b>Note: Possessive Determiners/Adjectives:</b> Words like <b><i>'my', 'our', 'your', 'his', 'her', 'its'</i></b>, and <b><i>'their'</i></b> are known as possessive adjectives (or possessive determiners). They come before nouns and <b>indicate ownership</b> of the noun. <b>Example:</b> \"The teacher asked the students to open <b><i>their</i></b> drawing books.\"</p><p><b>Possessive Pronouns: </b>The pronouns mine, yours, hers, its, his, ours, and theirs are known as possessive pronouns: they refer to something owned by the speaker or by someone or something previously mentioned. For example: The pen is mine.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the word segment that substitutes (replaces) the bracketed word segment correctly and completes the sentence meaningfully. Select the option 'no correction required' if the sentence is correct as given.</p><p>(Their heads were) dragonish, and their pupil-less eyes white and staring.</p>",
    "options": [
      "Their head were",
      "Their heads was",
      "No correction required",
      "There heads were"
    ],
    "correct_option_id": 2,
    "solution": "<p>The given sentence is grammatically and contextually correct.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Improve the underlined part of the sentence. Choose \"No improvement\" as an answer if the sentence is grammatically correct,</p><p>Fishermen make <u>their lives</u> from the sea.</p>",
    "options": [
      "there livings",
      "his living",
      "their live",
      "No improvement"
    ],
    "correct_option_id": 3,
    "solution": "<p>The given sentence is grammatically correct.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the word segment that substitutes (replaces) the bracketed word segment correctly and completes the sentence meaningfully. Select the option 'no correction required' if the sentence is correct as given.</p><p>The relationship between two people is (by the way in what) they feel and behave towards each other.</p>",
    "options": [
      "The way by which",
      "By which ways",
      "The way in which",
      "No correction required"
    ],
    "correct_option_id": 2,
    "solution": "<p>The noun 'the way' would be followed by the relative pronoun 'which', and not 'what'. So, the bracketed segment requires substitution.</p><p>'The way in which' implies the mechanism or phenomenon by means of which [something occurs or is done]. Other options do not form meaningful phrase.</p><p>The correct sentence is: The relationship between two people is the way in which they feel and behave towards each other.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Identify the segment that contains a grammatical error. If there is no error, select 'No error'.</p><p>He best understand that / because of the fight it is no / longer his decision to make.</p>",
    "options": [
      "He best understand that",
      "longer his decision to make.",
      "because of the fight it is no",
      "No error"
    ],
    "correct_option_id": 0,
    "solution": "<p>The singular pronoun 'he' should be followed by the singular verb 'understands', not the plural verb 'understand'.</p><p>So, there is an error in part mentioned in option (a).</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Identify the segment that contains a grammatical error. If there is no error, select 'No error'</p><p>In practice rounds, my caddie, Greg, /and me works on my short/ game with a baseball glove.</p>",
    "options": [
      "and me works on my short",
      "No error",
      "game with a baseball glove.",
      "In practice rounds, my caddie, Greg,"
    ],
    "correct_option_id": 0,
    "solution": "<p></p><p>There is are two errors in the part in option (a). First, we need to replace the objective pronoun 'me' with subjective pronoun 'I' as it is the part of the subject of the sentence.</p><p>Also, the subject 'Greg and I' is plural in nature. So, singular verb 'works' should be replaced with plural verb 'work'.</p><p>Hence, option (a) is the answer.</p><p> </p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate homophone to fill in the blank.</p><p>These people are artists. _____ skills are extraordinary.</p>",
    "options": [
      "They or",
      "There",
      "They're",
      "Their"
    ],
    "correct_option_id": 3,
    "solution": "<p>The blank requires a homophone that indicates possession of skills by the artists.</p><p>&#183; Option 1: They or is not a standard homophone and does not fit grammatically.</p><p>&#183; Option 2: There indicates location or existence, which is incorrect.</p><p>&#183; Option 3: They're is a contraction of \"they are,\" which does not fit.</p><p>&#183; Option 4: Their is a possessive pronoun meaning belonging to them, which correctly indicates that the skills belong to the artists.</p><p>The correct homophone is \"Their.\" The sentence is: \"These people are artists. Their skills are extraordinary.\"</p>",
    "question_index": 17
  },
  {
    "question": "<p>Fill in the blank with the most appropriate word.</p><p>The man ___ book you are reading is my father.</p>",
    "options": [
      "who",
      "whose",
      "whom",
      "that"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most appropriate word to fill in the blank is 'whose'. The given sentence/blank requires a word that connects the man to the book he owns or is associated with. The word \"whose\" is a relative pronoun that is used to indicate possession or ownership. In the given context, it effectively connects the man to the book he owns. It indicates that the book belongs to the man. The word \"who\" is used to refer to a person, but it doesn't convey possession or ownership. It simply identifies the person. The relative pronoun \"whom\" also doesn't convey possession or ownership. \"That\" is a relative pronoun used to refer to people or things, but it doesn't convey possession or ownership. It simply identifies the person or thing being referred to. Hence, (b) is the correct answer. </p><p>The complete sentence is: The man whose book you are reading is my father.</p><p><b>NOTE:</b></p><p><b>Relative pronouns:</b> A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies, or describes, the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the most appropriate pronoun to fill in the blank.</p><p>Mr. Amit Kumar, Proprietor of Xyling Pens is known for ______ honesty and decent behaviour in the business arena.</p>",
    "options": [
      "Her",
      "It",
      "His",
      "they"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence refers to \"Mr. Amit Kumar,\" a male individual, so the pronoun must be masculine. \"His\" is the correct possessive pronoun for a male subject. \"Her\" is feminine, \"it\" is for non-human entities, and \"they\" is plural or gender-neutral, none of which fit. Thus, \"his\" is the correct choice.</p><p><b>The complete sentence is- \"Mr. Amit Kumar, Proprietor of Xyling Pens is known for his honesty and decent behaviour in the business arena.\"</b></p>",
    "question_index": 19
  }
];
    </script>
