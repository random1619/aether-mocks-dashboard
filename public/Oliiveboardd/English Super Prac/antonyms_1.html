<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate ANTONYM of the underlined word in the following sentence to fill in the blank.</p><p>Most of the flowers <u>bloom</u> in the spring season but they start to ________ during summer.</p>",
    "options": [
      "flush",
      "wither",
      "flourish",
      "blossom"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#61623; <b>Bloom</b> means to flower or flourish, and its antonym is <b>wither</b>, which means to dry up or fade away.</p><p>&#61623; <b>Flush</b>, <b>flourish</b>, and <b>blossom</b> are all synonyms of bloom, not antonyms.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the given word.</p><p>Risible</p>",
    "options": [
      "Serious",
      "Curious",
      "Droll",
      "Giddy"
    ],
    "correct_option_id": 0,
    "solution": "<p>Risible means something that is laughable or amusing.</p><p>The antonym of risible would be serious, which describes something solemn, grave, or not humorous.</p><p>Curious means inquisitive.</p><p>Droll means amusing in an odd or whimsical way (similar to risible).</p><p>Giddy means lighthearted or excitable.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the word in the brackets to fill in the blank:</p><p>The ______ to the venue was decorated with beautiful lights. [exit]</p>",
    "options": [
      "House",
      "Road",
      "Entry",
      "Ceremony"
    ],
    "correct_option_id": 2,
    "solution": "<p>\"Entry\" is the opposite (antonym) of \"exit\" and fits logically in the context of the sentence.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the given word:</p><p>Mechanical</p>",
    "options": [
      "Surrogate",
      "Automatised",
      "Yielding",
      "Manual"
    ],
    "correct_option_id": 3,
    "solution": "<p>\"Mechanical\" refers to something automated or machine-like, whereas \"manual\" means done by hand, making it the antonym.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the underlined word in the following sentence. </p><p>In Shakespeare's The Merchant of Venice, Shylock's <u>connivance</u> aimed to jeopardise Antonio's life. </p>",
    "options": [
      "Safeguard",
      "Risk",
      "Peril",
      "Jape"
    ],
    "correct_option_id": 0,
    "solution": "<p>\"Safeguard\" means to protect, which is opposite to \"connivance\" meaning secret cooperation in wrongdoing.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the word OPPOSITE in meaning to the given word. </p><p>Deficient </p>",
    "options": [
      "Skimpy",
      "Broken",
      "Ample",
      "Terrible"
    ],
    "correct_option_id": 2,
    "solution": "<p>\"Ample\" means sufficient, directly opposite to \"deficient\" meaning inadequate.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the given word.</p><p>Barbarity</p>",
    "options": [
      "Callous",
      "Compromise",
      "Compassion",
      "Rivalry"
    ],
    "correct_option_id": 2,
    "solution": "<p>\"Barbarity\" means extreme cruelty or brutality. Its antonym is \"compassion,\" which means kindness and concern for others. The other options either are similar to barbarity (callous) or unrelated (compromise, rivalry).</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the word in bold.</p><p>His mother never held a <b>grudge</b> against his father.</p>",
    "options": [
      "rancour",
      "benevolence",
      "revulsion",
      "malevolence"
    ],
    "correct_option_id": 1,
    "solution": "<p>A \"grudge\" is a persistent feeling of ill will or resentment. Its antonym is \"benevolence,\" which means kindness and goodwill. The other options (rancour, revulsion, malevolence) are similar in meaning to grudge.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the underlined word in the given sentence.</p><p>An elephant is a <u>large</u> mammal.</p>",
    "options": [
      "Bumper",
      "Gigantic",
      "Tiny",
      "Heroic"
    ],
    "correct_option_id": 2,
    "solution": "<p>\"Large\" means of considerable size or extent. Its most appropriate antonym is \"tiny,\" which means very small. \"Bumper\" and \"gigantic\" are synonyms of large, while \"heroic\" is unrelated to size.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate antonym of the underlined word.</p><p>\"If someone <u>babbles</u>, it means that they talk in a confused or excited way.\"</p>",
    "options": [
      "Gossips",
      "Quiet",
      "Talkative",
      "Rants"
    ],
    "correct_option_id": 1,
    "solution": "<p>To babble means to talk excessively in a confused manner. Its opposite is quiet, which means not speaking much.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Choose the most appropriate ANTONYM for the underlined word in the given sentence.</p><p>\"The war was followed by a long period of <u>prosperity</u>.\"</p>",
    "options": [
      "Security",
      "Secure",
      "Affluence",
      "Failure"
    ],
    "correct_option_id": 3,
    "solution": "<p>The word prosperity means wealth or success. Its antonym is failure, which means a lack of success or decline in fortune.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate antonym of the word in brackets to fill in the blank.</p><p>\"Akash went to ______ his school uniform.\" [sell]</p>",
    "options": [
      "Loan",
      "Rent",
      "Buy",
      "Make"
    ],
    "correct_option_id": 2,
    "solution": "<p>The opposite of \"sell\" is \"buy.\"</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the word in bold.</p><p>\"Many people fought to <b>abolish</b> slavery during the Civil War.\"</p>",
    "options": [
      "kill",
      "terminate",
      "establish",
      "damage"
    ],
    "correct_option_id": 2,
    "solution": "<p>\"Abolish\" means to formally put an end to a system, practice, or institution. Its most appropriate antonym is \"establish,\" which means to set up or bring into existence. The other options either share similar meanings with \"abolish\" or are not directly related to the concept of ending/beginning a system.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of \"Candid\"</p>",
    "options": [
      "Tender",
      "Guileless",
      "Dishonest",
      "Irrelevant"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Candid' means truthful, straightforward, and honest. Therefore, its antonym would be 'dishonest', which means untruthful or deceitful. The other options don't represent opposite meanings.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of \"Reluctant\"</p>",
    "options": [
      "Desperate",
      "Obedient",
      "Enthusiastic",
      "Beautiful"
    ],
    "correct_option_id": 2,
    "solution": "<p>\"Reluctant\" means unwilling or hesitant to do something. Its most appropriate antonym is \"enthusiastic,\" which means showing keen interest or eagerness. The other options don't represent direct opposites of reluctant.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate antonym of the underlined word.</p><p>The appearance of most of the animals in the jungle is <u>deceptive</u> in nature.</p>",
    "options": [
      "Honest",
      "Illusive",
      "Ugly",
      "Beautiful"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Deceptive means misleading or dishonest, so its opposite is Honest.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate antonym of the underlined word.</p><p>The long-standing <u>feud</u> between the two villages was settled due to the intervention of the two chiefs.</p>",
    "options": [
      "Humility",
      "Harmony",
      "Humble",
      "Honesty"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Feud means a long and bitter quarrel, so its opposite is Harmony (peace and agreement).</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate antonym of the given word to fill in the blank.</p><p>Capricious</p><p>Share market prices have remained __________ for weeks.</p>",
    "options": [
      "Fickle",
      "Stable",
      "Mischievous",
      "Volatile"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; \"Capricious\" means unpredictable or changing frequently.</p><p>&bull; The opposite of \"capricious\" is \"stable,\" which means constant and unchanging.</p><p>Other options are incorrect:</p><p>&bull; Fickle  -  Also means unpredictable (similar to capricious).</p><p>&bull; Mischievous  -  Playful or naughty (not related).</p><p>&bull; Volatile  -  Unstable (similar to capricious).</p><p>Thus, \"Stable\" is the correct antonym.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Identify the most appropriate antonym of the underlined word in the following sentence.</p><p>I love the <u>stunning</u> view of the mountain.</p>",
    "options": [
      "Toxic",
      "Superfluous",
      "Smashing",
      "Mundane"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; \"Stunning\" means \"very beautiful or impressive.\"</p><p>&bull; \"Mundane\" means \"ordinary or dull,\" which is the opposite of \"stunning.\"</p><p>Other options:</p><p>&bull; (1) Toxic &rarr; Incorrect, as it means \"poisonous\" and is unrelated to \"stunning.\"</p><p>&bull; (2) Superfluous &rarr; Incorrect, as it means \"unnecessary\" or \"excessive.\"</p><p>&bull; (3) Smashing &rarr; Incorrect, as it means \"very impressive or wonderful\" (a synonym, not an antonym).</p>",
    "question_index": 18
  },
  {
    "question": "<p>Complete the sentence with the most appropriate set of ANTONYMS of the highlighted word.</p><p>'Grisly'</p><p>The other day Jimmy behaved _______ with Jammy, and that was quite _______ for me.</p>",
    "options": [
      "Rudely, attractive",
      "Disgusting, atrocious",
      "Ghastly, shameless",
      "Pleasantly, comforting"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; Grisly means horrifying, gruesome, or shocking.</p><p>&#183; The antonyms should mean \"nice\" or \"pleasant\".</p><p>&#183; Pleasantly and comforting are the best opposite words.</p><p>&#183; Other options:</p><p>o Rudely, attractive (incorrect pair).</p><p>o Disgusting, atrocious (both negative).</p><p>o Ghastly, shameless (also negative).</p><p>Thus, the correct answer is option 4.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
