    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The judge said that __________ for breaking the law.</p>",
    "options": [
      "the convict can either pay the fine or face imprisonment",
      "either the convict can pay the fine or face imprisonment",
      "the convict either can pay the fine or face imprisonment",
      "either can the convict pay the fine or face imprisonment"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Either...or</b> are <b>correlative conjunctions</b>.</p><p>Correlative conjunctions are sort of like tag-team conjunctions. They come in <b>pairs</b>, and you have to use both of them in different places in a sentence to make them work. They get their name from the fact that they work together (co-) and relate one sentence element to another.</p><p>The format of <b>Either..or</b> is: <b>Noun/Pronoun </b>(the convict) <b>+ verb </b>(can)<b>+ Either+ the Condition </b>(pay the fine)<b> + or + the other Condition </b>(face imprisonment)<b>.</b></p><p>For example: You can <b>either</b> take this salary <b>or</b> leave the job.</p><p>Thus, the correct option is <b>(a) the convict can either pay the fine or face imprisonment</b></p><p>Thus, the correct sentence should be: The judge said that <u>the convict can either pay the fine or face imprisonment</u> for breaking the law.</p><p>Additional Information:</p><p>Some of the important <b>Correlative Conjunctions</b> are:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Either...or</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Neither...nor</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hardly...when</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Scarcely...when</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Both..and</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">If..then</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Not only...but also</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rather...than</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Whether..or</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">No sooner..than</td></tr></table>",
    "question_index": 0
  },
  {
    "question": "<p> Select the most appropriate option to fill in the blank(s).</p><p>This train is going _____ Delhi ____ Mumbai.</p>",
    "options": [
      "From, from",
      "To, to",
      "From, to",
      "Too, form"
    ],
    "correct_option_id": 2,
    "solution": "<p>'From' [preposition] is used to refer to the place where someone or something starts or originates. We can use 'to' [as a preposition] to indicate a destination or direction. 'From' requires 'to' after it in order to complete the thought. Example- I've visited many cities in Asia, from Hong Kong, Beijing, Tokyo to Taipei.</p><p>'Too' [adverb] and 'form' [verb/noun] are not prepositions and are irrelevant here.</p><p>Hence, option (c) is correct.</p><p>Note:</p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>1) The teacher scolded the child <b>for </b><u>being</u> late.</p><p>2) We're going <b>to</b> a <u>party</u>.</p><p>&#183; The words in bold are called prepositions because they normally take a position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank(s).</p><p>The magazine's ____ was so engaging that it kept the readers ______ for hours.</p>",
    "options": [
      "Motif",
      "Content",
      "Material",
      "Cover"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct word to fill in the blanks is 'content'. In the first blank, the word 'content' refers to the information contained within the magazine. In the second blank, it refers to the satisfaction that the readers get from reading the magazine's content. So, the sentence conveys that the magazine's content was so captivating that it kept the readers completely absorbed for hours. Other options are not suitable for the second blank meaning-wise and are thus negated.</p><p>Hence, (b) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank(s).</p><p>The old bookstore with its ________ wooden floors and shelves lined with ________ volumes, exuded a nostalgic charm that drew readers seeking solace in the ________ pages of classic literature.</p>",
    "options": [
      "polished, new, digital",
      "creaky, ancient, weathered",
      "shiny, modern, vibrant",
      "sturdy, glossy, contemporary"
    ],
    "correct_option_id": 1,
    "solution": "<p>The words 'creaky, ancient, and weathered' appropriately describe an old bookstore with worn wooden floors and aged book volumes, enhancing the nostalgic atmosphere mentioned in the sentence.</p><p>'Creaky' means 'making or liable to make a creaking sound when being moved or when pressure is applied'.</p><p>'Weathered' means 'worn by long exposure to the atmosphere'.</p><p>'New' and 'modern' do not fit in contextually to explain 'volumes' (of books) in an old bookstore. 'Glossy' is not an appropriate adjective for books. </p><p>Hence, (b) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Complete the following collocation.</p><p>He took a <b>________</b> breath before diving into the icy water.</p>",
    "options": [
      "bottomless",
      "shallow",
      "profound",
      "deep"
    ],
    "correct_option_id": 3,
    "solution": "<p>Collocation is a word or phrase that is often used with another word or phrase, in a way that sounds correct to people who have spoken the language all their lives but might not be expected from the meaning.</p><p>Let's look at the meanings of the given options. </p><p>Bottomless: A bottomless hole, container, etc. has or appears to have no bottom.</p><p>Shallow: having only a short distance from the top to the bottom.</p><p>Profound: felt or experienced very strongly or in an extreme way.</p><p>Deep: going or being a long way down from the top or surface or being of a particular distance from the top to the bottom. </p><p>Among the given options, 'stunning' is the correct choice. Here, 'deep breaths' means 'breaths that fill the lungs with air'.</p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The punishment for many offences includes fine ____ imprisonment. </p>",
    "options": [
      "After",
      "And",
      "If",
      "Because"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given blank requires coordinating conjunction as the two nouns that it intends to connect are at equal footing in the given context. The only coordinating conjunction in the given options is \"and\" and therefore, is the correct answer. Option a), c) and d) are incorrect because they are subordinating conjunctions which are used to connect the subordinating clause to the main clause and since there is no such division in the given sentence, these are incorrect. Therefore, the correct answer is option b). </p><p><b>Note:</b></p><p><b>Coordinating conjunctions</b> join items that are of equal importance in a sentence. Also, it joins two words of equal grammatical rank.</p><p><i>Examples include: </i>And, but, nor, or, but, otherwise, also, either-or, neither-nor, etc. are the chief coordinate conjunctions.</p><p><b>Subordinating conjunctions</b> connect subordinate clauses (dependent clauses) to the main clause of a sentence.</p><p><i>Examples include: </i>after, because, if, another, though, till, than, lest, etc.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>_________, the school has rescheduled the exam to next week due to unforeseen circumstances.</p>",
    "options": [
      "As far as I know",
      "By far as I know",
      "As far by I know",
      "I know as"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate option to fill in the blank is 'as far as I know'. \"As far as I know\" is an expression that means the statement that follows is based on the speaker's current understanding or knowledge. In the given sentence, it indicates that the speaker is providing information about the school rescheduling the exam, and this information is based on what the speaker currently knows. The other options are grammatically incorrect or awkward. </p><p>Option (b) is not correct. The phrase \"by far\" is used to emphasise a difference in degree or extent, but it doesn't fit well in the given context.</p><p>Option (c) contains a word order error. The correct order should be \"as far as I know.\" Placing \"by\" in the middle disrupts the proper structure of the expression.</p><p>Option (d) is also grammatically incorrect. It doesn't conform to the usual structure of the idiomatic expression used in the given context. The standard phrase is \"as far as I know,\" where \"as far as\" is an idiomatic way of expressing the extent or limits of one's knowledge.</p><p>Hence, (a) is the correct answer. </p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Each _______ also has its own specific requirements and functions.</p>",
    "options": [
      "money",
      "equipment",
      "offices",
      "branch"
    ],
    "correct_option_id": 3,
    "solution": "<p>The determiner 'each' is followed by a singular countable noun. According to this, 'money' and 'equipment' are eliminated as those are uncountable nouns. The noun 'offices' is a plural noun. So, option (c) is eliminated. Option (d) is the one that fits correctly in the blank since it follows the grammatical conditions mentioned above and brings out a coherent meaning to the sentence. Hence, option (d) is the correct answer.</p><p><b>Note:</b></p><p>Determiner - A modifying word that determines the kind of reference a noun or noun group has, for example,<b> '<i>a', 'the', 'every', 'much', 'many', </i></b><i>etc.</i></p><p>Countable and uncountable nouns: 1. Countable nouns are the class of nouns that can be counted, for example, table  one table, two tables, three tables, etc. 2. Uncountable nouns are the nouns that cannot be counted or usually are not counted, for example, light, water, milk, information, furniture, etc. They do not generally have a plural form and can't be preceded by a or an. Many abstract nouns are typically uncountable. Some uncountable nouns can be used in the plural as well, depending on the meaning or context of the word.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank. </p><p>Long lines of cars can be <b>_______ </b>outside gas stations in major cities. </p>",
    "options": [
      "sees",
      "saw",
      "seeing",
      "seen"
    ],
    "correct_option_id": 3,
    "solution": "<p>We can only use a participle verb after 'be'. The use of the present participle verb (-ing form of the verb) makes the sentence active. The -ing form of the verb 'see' doesn't fit in the sentence. The subject of the sentence is 'long queues of cars'. So, the passive voice 'be seen' fits in the sentence as the sentence gives emphasis on the receiver of the action. So, the past participle form of the verb will be appropriate here.</p><p>Hence, option (d) is the correct answer.</p><p><b>The correct sentence is:</b> Long lines of cars can be <b>seen</b> outside gas stations in major cities.</p><p><b>Note:</b></p><p><b>Voice of a sentence</b> - Depending upon the emphasis we want to lay we use a particular voice in a particular context. We use <b>active voice </b>to lay emphasis on the doer of the action while we use <b>passive voice </b>to lay emphasis on the receiver of the action.</p><p>Example:</p><p>Active- Radha will work. (emphasis on Radha)</p><p>Passive- Work will be done by Radha. (emphasis on Work)</p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>I ___ hear him yelling at his neighbours yesternight in a drunken state.</p>",
    "options": [
      "Can",
      "Could",
      "Will",
      "Shall"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Could' refers to an ability that a person generally had in the past or to something that was generally possible in the past. The given sentence is in the past tense as indicated by the words 'yesternight' and 'could' used here in a similar context. Hence, (b) is the correct answer.</p><p>'Can' is used to denote strength, power, potential or authority.</p><p>'Will' is used when someone is determined or sure to do something; it is used emphatically.</p><p>'Shall' is used to express ideas related to specific rules or laws or used in the future tense to speak about something that will happen or exits, or it expresses promises of the future.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The Transport Corporation has decided to discontinue ______ bus service for private schools.</p>",
    "options": [
      "it's",
      "these",
      "its",
      "those"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Bus service' is a singular noun phrase, so we can eliminate the plural demonstrative adjectives 'these' and 'those'. We need a possessive determiner to qualify the noun 'bus service'. \"It's\" is the contracted form of \"it is/it has\" which is not required here. So, option (a) is eliminated as it is grammatically incorrect. The possessive determiner 'its' is the one that fits correctly in the blank. Hence, option (c) is the correct answer.</p><p><b>Note:</b></p><p><b>Possessive Determiners/Adjectives:</b> Words like <b><i>'my', 'our', 'your', 'his', 'her', 'its'</i></b>, and <b><i>'their'</i></b> are known as possessive adjectives (or possessive determiners). They come before nouns and <b>indicate ownership</b> of the noun. <b>Example:</b> \"The teacher asked the students to open <b><i>their</i></b> drawing books.\"</p><p><b>Demonstrative Adjectives:</b> Demonstrative adjectives include <b><i>\"this\", \"that\", \"these\" </i></b>and <b><i>\"those\"</i></b>. These <b><i>modify or describe a noun</i></b> and come before a noun while 'demonstrative pronouns' replace a noun. <b>Example:</b> \"I like<b><i> that</i></b> T-shirt of yours\".</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank(s).</p><p><b><u> </u></b></p><p>In some rural areas in India, the hospitals are ___ equipped because of the ___ of the funds from the administration. </p>",
    "options": [
      "Well, dearth",
      "Faulty, lack",
      "Inadequately, scarcity",
      "Fully, paucity"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct choice is option (c) inadequately, scarcity.</p><p>&#183; Inadequately: Insufficient, inept, or unsuitable; Scarcity: Insufficiency or shortness of supply.</p><p>&#183; Among the given options, option (c) fits the best in the context of the sentence. The sentence refers to the scarcity of equipment and funds in the hospitals in some rural areas. 'Faulty' is an adjective and cannot be used in the first blank because an adverb is needed to qualify the adjective 'equipped'. The rest of the options are incorrect because no hospital can be 'well/fully equipped' because of a lack of funds. Both 'dearth' and 'paucity' means 'shortage'.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>I don't really _________ with my sister's husband.</p>",
    "options": [
      "lay out",
      "get along",
      "kept off",
      "made up"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let's look at the meanings of the given phrases.</p><p>lay out: plan building, garden, etc.</p><p>get along: have a harmonious or friendly relationship.</p><p>kept off: keep at a distance.</p><p>made up: to end (quarrel), compose.</p><p>We can only use a base verb after the verb 'do'. 'Kept' and 'made' are the past tense of the base verbs 'keep' and 'make' respectively. So, options (c) and (d) are eliminated. Of the remaining two options, only the verb 'get along' provides a coherent meaning to the sentence.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Great-grandma is set to make hundred dolls for children who lost _____ in Beirut blast.</p>",
    "options": [
      "hers",
      "themselves",
      "its",
      "theirs"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Theirs' is the correct possessive pronoun to be used because the sentence intends to convey that the great-grandma will make dolls for those children who lost their dolls in the blast. Possessive pronouns show that something belongs to someone. 'Theirs' is used to refer to the lost dolls of those children.</p><p>Hence, option (d) is correct.</p><p><b>NOTE:</b></p><p>Possessive Pronouns: The pronouns mine, yours, hers, his, ours, and theirs are known as possessive pronouns: they refer to something owned by the speaker or by someone or something previously mentioned. For example: The pen is mine.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>He was aware of the __________ danger when he saw a soldier with a sword coming for him at the Battle of Blackwater.</p>",
    "options": [
      "heretical",
      "trivial",
      "immerse",
      "imminent"

    "solution": "<p>The most appropriate option to fill in the blanks is (d). The article \"the\" is used before \"bullet\" to refer to a specific bullet, the one being discussed in the context of narrowly missing the heart. Using \"a\" before \"bullet\" implies any bullet, which doesn't fit the context that refers to a specific bullet that narrowly missed the heart. 'An' is the indefinite article used before words that begin with a vowel sound. However, \"bullet\" starts with a consonant sound. So, \"an\" is not appropriate here.</p><p>The article \"a\" is used before \"couple\" to indicate any indefinite or unspecified couple of centimetres. Using \"the\" before \"couple\" suggests a specific or previously mentioned couple of centimetres, which does not align with the intended meaning of an unspecified distance. Hence, (d) is the correct answer. </p><p><b>NOTE:</b></p><p>A <b>noun</b> is a word used as the name of a person, place, or thing. Now consider the following sentences:</p><p>1) <b> Mahesh</b> is a clever boy.</p><p>2) A <b>herd</b> of cattle was grazing on the pastureland.</p><p>3) <b>Honesty</b> is the best policy.</p><p>An <b>article </b>is a word that comes before a noun to indicate whether it's specific or general.</p><p><b>Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",

    "correct_option_id": 0,
    "solution": "<p>The most appropriate option to fill in the blank is 'hasn't she'. When the main sentence/clause is positive, the question tag should be negative, and vice versa. In the given case, the main sentence/clause is positive. So, the question tag would be negative. Also, if there is an auxiliary verb (be, have, do, is, etc.) in the main sentence/clause, the question tag also contains the same auxiliary verb. In the given sentence, the auxiliary verb \"has\" is used. Accordingly, option (a) is correct because it maintains the opposite polarity (positive main sentence, negative question tag) and uses the same auxiliary verb (\"has\"). </p><p>Option (b) is incorrect as it changes the pronoun to \"he\" and uses \"isn't,\" which is not consistent with the original sentence.</p><p>Option (c) is incorrect because it uses \"wasn't\", which is not consistent with the original auxiliary verb \"has.\"</p><p>Option (d) is also incorrect. This option uses \"doesn't\", which is not consistent with the original auxiliary verb \"has.\" The forms of 'do' (does, do, did) are used when there is no auxiliary verb in the main clause. When forming question tags, if the main clause lacks an auxiliary verb (be, have, can, will, etc.), a suitable form of \"do\" is introduced in the question tag. </p><p>Hence, (a) is the correct answer. </p><p><b>NOTE:</b></p><p><b>Auxiliary verb:</b> A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. Auxiliary verbs help to form the various tenses, moods, and voices of other verbs. The principal ones are be, do, and have. Example: She will sing a song tomorrow. Here, 'will' is the auxiliary verb that supports the main verb 'sing'.</p>",

    "question": "<p>Select the most appropriate option to fill in the blank. </p><p>The new software ______ extensively to ensure its compatibility with various devices.</p>",
    "options": [
      "Is being tested",
      "Is been testing",
      "Has being tested",
      "Was being testing"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate option to fill in the blank is 'is being tested'. \"Is being tested\" is the present progressive tense, which indicates that the action of testing the new software is currently ongoing. This choice effectively communicates that the testing process is happening at the present moment.</p><p>Option (b) is grammatically incorrect because it combines the present tense \"is\" with \"been testing.\" In English, the present progressive tense is formed using \"is being\" followed by the present participle (-ing form) of the verb, as in \"is being tested.\" \"Is been testing\" does not follow this pattern and is not grammatically valid.</p><p>Option (c) is incorrect because it uses the present participle \"being\" with the present perfect auxiliary verb \"has.\" The present perfect tense is formed with \"has been\" followed by the past participle of the verb. The correct form for the present perfect tense in this context would be \"has been tested.\"</p><p>Option (d) is incorrect. The verb \"was\" is in the past tense, indicating that the action occurred in the past. However, the phrase \"being testing\" is a present progressive form, indicating ongoing action in the present. Combining a past tense verb with a present progressive form creates tense inconsistency. Hence, (a) is the correct answer. </p><p>Note:</p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
