    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate phrasal verb to fill in the blank.</p><p>The teacher asked the students to ____ their ideas during the class discussion.</p>",
    "options": [
      "get on",
      "put off",
      "bring up",
      "bring about"
    ],
    "correct_option_id": 2,
    "solution": "<p>The context suggests the teacher wants students to introduce or share their ideas during the discussion. \"Bring up\" means to introduce a topic or idea for discussion, fitting the sentence perfectly. The other phrasal verbs have meanings that do not suit the context.</p><p>\"Get on\" means to continue or make progress, not to share or introduce ideas.</p><p>\"Put off\" means to delay or discourage, which is unrelated to sharing ideas.</p><p>\"Bring about\" means to cause or make something happen, not to introduce ideas for discussion.</p><p>The complete sentence: The teacher asked the students to bring up their ideas during the class discussion.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate phrasal verb to fill in the blank.</p><p>The teacher asked the students to ____ their essays before the deadline.</p>",
    "options": [
      "land in",
      "put off",
      "hand in",
      "hand up"
    ],
    "correct_option_id": 2,
    "solution": "<p>The context suggests the teacher wants students to submit their essays. \"Hand in\" means to submit or turn in work, fitting the sentence perfectly. The other phrasal verbs have meanings that do not suit the context of submitting assignments.</p><p>\"Land in\" means to arrive or get into a situation, not to submit work.</p><p>\"Put off\" means to postpone, which is the opposite of submitting by a deadline.</p><p>\"Hand up\" is not a standard phrasal verb in this context; it may imply raising a hand, not submitting work.</p><p>The complete sentence: The teacher asked the students to hand in their essays before the deadline.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate phrasal verb to fill in the blank.</p><p>The details were<u> ___ </u>from one person to the other within no time.</p>",
    "options": [
      "passed away",
      "passed in",
      "passed down",
      "passed cut"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate phrasal verb to fill in the blank in the given sentence is 'passed down'. The sentence suggests that information or details were transmitted or conveyed from one person to another. 'Passed down' is the most suitable phrasal verb for this context, as it implies the act of transmitting or handing down information or knowledge from one generation to the next or from one person to another. The other options do not appropriately convey the idea of transferring information from one person to another:</p><p>Passed away- typically refers to someone's death.</p><p>Passed in-does not convey the intended meaning of transmitting information.</p><p>\"Passed cut\" is not a commonly used phrasal verb and does not convey the intended meaning of transferring information.</p><p>Hence, (c) is the correct answer.</p><p><b>NOTE:</b></p><p>Phrasal verb: A phrase that consists of a verb with a preposition or adverb or both, the meaning of which is different from the meaning of its separate parts. <b>Example:</b> She has always looked down on me. Here, the phrasal verb 'to look down on someone' doesn't mean that you are looking down from a higher place at someone who is below you; it means that you think that you are better than someone.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate collocating word to fill in the blank.</p><p>Mentally strong people do not ________ to suicide over trivial issues.</p>",
    "options": [
      "Make up",
      "Give in",
      "Conceive on",
      "Fall in"
    ],
    "correct_option_id": 1,
    "solution": "<p>Make up - invent a story or plan.</p><p>Give in - cease fighting or arguing; admit defeat.</p><p>Conceive - form or devise (a plan or idea) in the mind.</p><p>Fall in - take one's place in a line or formation. Also, If a roof or ceiling falls in, it drops to the ground because it is damaged.</p><p>The sentence implies the action by strong people which may or may not include suicide over trivial issues. </p><p>'Conceive' is not followed by the preposition 'on', so option (c) is incorrect. </p><p>Among the other given options, only option (b) fits the blank contextually and gives the meaning that mentally strong people do not admit defeat and do not resort to suicide over trivial issues. </p><p>The correct sentence is: Mentally strong people do not give in to suicide over trivial issues.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate phrasal verb to fill in the blank.</p><p><u>_______</u> that thought. It will be a great idea someday.</p>",
    "options": [
      "Hold on",
      "Hold to",
      "Hold against",
      "Hold onto"
    ],
    "correct_option_id": 3,
    "solution": "<p>Hold on - grasp or support something with one's hands.</p><p>Hold to  -  Not a meaningful phrasal verb</p><p>Hold against - to use (something) as a reason to have a bad opinion of (someone). </p><p>Hold onto - &#8203;to keep something that is an advantage for you; to not give or sell something to somebody else.</p><p>As per the meanings, 'hold onto' fits in the blank and implies that it is being suggested to keep the particular thought for future. </p><p>The complete sentence is: Hold onto that thought. It will be a great idea someday.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate word segment for the underlined word in the given sentence.</p><p>Pintu has been advised to <u>reduce</u> smoking by his family doctor.</p>",

    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate phrasal verb to fill in the blank.</p><p>The driver very subtly ____ the traffic violation he committed.</p>",
    "options": [
      "ironed through",
      "ironed in",
      "ironed out",
      "ironed aside"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate phrasal verb to fill in the blank is 'ironed out'. The phrasal verb \"ironed out\" means to resolve or eliminate problems, issues, or difficulties in a situation. In the context of the sentence, it implies that the driver skilfully handled the situation, smoothing over any potential consequences or complications related to the traffic violation. The other options do not use the appropriate preposition for the given context. Hence, (c) is the correct answer.</p><p><b>NOTE:</b></p><p>Phrasal verb: A phrase that consists of a verb with a preposition or adverb or both, the meaning of which is different from the meaning of its separate parts. <b>Example: </b>She has always looked down on me. Here, the phrasal verb 'to look down on someone' doesn't mean that you are looking down from a higher place at someone who is below you; it means that you think that you are better than someone.</p><p>A Preposition is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples:</b></p><p>1) The teacher scolded the child <b>on</b> being late.</p><p>2) We're going <b>to</b> a party.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>Gear up for</p>",
    "options": [
      "Start off",
      "Pass into",
      "Get ready for",
      "Put on"
    ],
    "correct_option_id": 2,
    "solution": "<p>Start off- begin to travel or move.</p><p>Pass into- to become a part of something.</p><p>Get ready for- prepare.</p><p>Put on- place a garment, piece of jewellery, etc. on part of one's body.</p><p>The meaning of the word 'gear up for' is 'prepare or equip oneself for something; get ready'. Among the options, the phrase that is the appropriate meaning of the given idiom is option (c) 'get ready for'.</p><p>Hence, the correct answer option (c).</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution required.'</p><p>I decided to <u>call out</u> to various bookstores in the area to see if any of them had the book I needed.</p>",
    "options": [
      "call around",
      "No substitution required",
      "call off",
      "call on"
    ],
    "correct_option_id": 0,
    "solution": "<p>In the given sentence, the phrase \"call out\" is incorrectly used. The sentence discusses the action of contacting multiple bookstores to inquire about the availability of a book, which implies making several phone calls. The phrasal verb \"call out\" typically means to shout, criticize publicly, or summon someone, none of which fits the intended meaning here. The most appropriate substitution is \"call around\", which means to contact several people or places by phone, especially to gather information. Therefore, the correct sentence should be: \"I decided to call around to various bookstores in the area to see if any of them had the book I needed.\" This choice conveys the intended idea accurately and grammatically. Hence, option 1, \"call around,\" is the correct answer.</p><p>Hence, the correct answer is option (1).</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underline segment in the given sentence.</p><p>The Ukrainian soldiers <u>passed in</u> for several weeks.</p>",
    "options": [
      "hanged to",
      "get off",
      "held out",
      "hanged in"

    "correct_option_id": 2,
    "solution": "<p>The given sentence talks about the Ukrainian soldiers doing something for several weeks. The phrase 'hold out' means resist or survive in difficult circumstances. So, the usage of the phrase 'held out' conveys that the Ukrainian soldiers survived difficult circumstances for several weeks. Hence, (c) is the correct answer.</p><p>'Hanged to' means to continue to grasp or hold someone or something.</p><p>'Get off' means escape a punishment.</p><p>'Hanged in' means remain persistent and determined.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence.</p><p>How did you <u>come about</u> his purse?</p>",
    "options": [
      "come into",
      "come off",
      "come out",
      "come by"
    ],
    "correct_option_id": 3,
    "solution": "<p>Come into - reach or be brought to a specified situation or result.</p><p>Come off - to happen as planned, or to succeed.</p><p>Come out - (of a fact) emerge; become known.</p><p>Come by - manage to acquire or obtain something.</p><p>Replacing the underlined segment with 'come by' gives the meaning that how did 'you' manage to obtain his purse. This is contextually and grammatically correct.</p><p>Other options do not fit in contextually.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution required'.</p><p>She paid a high price for the clothes she <u>brought at</u> the boutique.</p>",
    "options": [
      "bring at",
      "bought at",
      "No substitution required",
      "brought to"
    ],
    "correct_option_id": 1,
    "solution": "<p>'She paid a high price' implies that the subject got the clothes from the boutique by paying money. For this the verb 'bought' (which means 'obtain in exchange for payment') should be used here in place of 'brought' (which means 'take or go with (someone or something) to a place'.</p><p>The correct sentence is: She paid a high price for the clothes she bought at the boutique.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>He is <u>waitin</u>g <u>upon</u> you in the compound.</p>",
    "options": [
      "waiting on",
      "waiting at",

      "waiting up"

    "correct_option_id": 2,
    "solution": "<p>'Waiting upon' is not a meaningful phrase.</p><p>'To wait for someone' means to be expecting someone or something and be prepared to deal with him, her, or it. This makes the sentence meaningful.</p><p>The correct sentence is: He is waiting for you in the compound.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>The commanders <u>entered by force into</u> terrorists' camp.</p>",
    "options": [
      "broke down",
      "broke with",
      "broke into",
      "broke off"
    ],
    "correct_option_id": 2,
    "solution": "<p>Among the given options, the most appropriate phrasal verb is \"broke into,\" because it conveys the idea that the commanders forcefully entered the terrorists' camp without permission. Hence, (c) is the correct answer. </p><p>Broke down: This means to collapse or fail. </p><p>Broke with: This means to end a relationship or connection with someone or something. </p><p>Broke off: This means to end abruptly or suddenly. </p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>The young boy displayed an <u>aptitude on</u> scientific research.</p>",
    "options": [
      "aptitude for",
      "aptitude at",
      "aptitude by",
      "aptitude in"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate option that can substitute the underlined segment in the given sentence is 'aptitude for'. The preposition \"on\" does not correctly convey the relationship between \"aptitude\" and \"scientific research\". The preposition 'on' is used to indicate surface position. \"For\" is the correct preposition to use with the noun \"aptitude\" when referring to a natural ability or talent in a particular field or activity. The phrase \"aptitude for\" indicates that the young boy possesses a talent or ability suited to the field of scientific research. The other prepositions do not convey the intended meaning. \"At\" typically refers to a specific location or point in time. It does not indicate a proficiency or ability in a particular field or activity. \"By\" is often used to indicate the agent or means by which something is done. \"Aptitude in\" is less commonly used compared to \"aptitude for\" when indicating a natural ability or talent in a specific field or activity. \"In\" is typically used to describe a state or condition within a certain domain, but \"for\" is more commonly used to express suitability or proficiency in a particular area. Hence, (a) is the correct answer.</p><p><b>The correct sentence is:</b> \"The young boy displayed an aptitude for scientific research.\"</p><p><b>NOTE:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 14
  },

    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>The young boy displayed an <u>aptitude on</u> scientific research.</p>",
    "options": [
      "aptitude for",

    "question_index": 15
  },

    "question": "<p>Select the option that will improve the underlined part of the given sentence.</p><p>No effort has been made by the Indian cricket team <u>to cash off on</u> its vibrant image in the World Cup.</p>",
    "options": [
      "to cash in on",

    ],
    "correct_option_id": 0,
    "solution": "<p>The only meaningful phrasal verbs with the word 'cash' are 'to cash in' and 'to cash up'.</p><p>So, options c) and d) are incorrect.</p><p>When cashiers and storekeepers <b>cash up</b>, they add up all the money taken from customers during a shift, or at the end of the working day. This phrasal verb does not fit in the given sentence which discusses that the cricket team had made no efforts towards a certain thing in World Cup.</p><p>'<b>To cash in on</b>' means 'to get money or another advantage from an event or situation, often in an unfair way'.</p><p>The phrase gives the meaning that the Indian cricket team did not unfairly use its vibrant image to get any advantage in the World Cup. It forms a meaningful sentence.</p><p>Hence, option a) is correct.</p><p><b>Note: </b>Phrasal verb: A phrase that consists of a verb with a preposition or adverb or both, the meaning of which is different from the meaning of its separate parts. Example: She has always looked down on me. Here, the phrasal verb 'to look down on someone' doesn't mean that you are looking down from a higher place at someone who is below you; it means that you think that you are better than someone.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>After the old building <u>was pulled out</u>, the building contractor surveyed the progress of the work.</p>",

  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution required'.</p><p>It is quite difficult to <b><u>make on</u></b> what this doctor writes.</p>",
    "options": [
      "make out",
      "make in",

      "made on"
