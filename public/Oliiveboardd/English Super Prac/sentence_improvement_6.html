                <!-- Dynamically populated question container -->

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'. </p><p>We were shocked by his <u>haggard appearance.</u></p>",
    "options": [
      "Haggardly appearance",
      "No improvement required",
      "Haggardly appearing",
      "Haggard appearing"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given sentence is correct, both grammatically and contextually. Therefore, no improvement is required. </p><p>Hence, option (b) is correct.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'. </p><p>Perhaps <u>it is me</u> who should recuse myself from the vote. </p>",
    "options": [
      "It is mine",
      "It is I",
      "It is my",
      "No improvement required"
    ],
    "correct_option_id": 1,
    "solution": "<p>If a sentence starts with 'it' followed by any form of the verb 'be', the pronoun that follows must be in 'nominative form' ['I' in this case]. 'Me' is the objective pronoun, 'mine' is the possessive pronoun, and 'my' is the possessive adjective.</p><p>Hence, option (b) is correct.</p><p><b>NOTE/-</b></p><p><b>Subjective/Nominative Pronouns:</b> The pronouns I, you, we, he, she, it, and they are known as subjective pronouns because they act as the subjects of verbs: We went to the party.</p><p><b>Objective Pronouns:</b> The pronouns me, you, us, him, her, it, and them are called objective pronouns because they act as the objects of verbs and prepositions: Anjali drove us home.</p><p><b>Possessive Pronouns: </b>The pronouns mine, yours, hers, his, ours, and theirs are known as possessive pronouns: they refer to something owned by the speaker or by someone or something previously mentioned. For example: The pen is mine.</p><p><b>Possessive Determiners/Adjectives:</b> Words like <b><i>'my', 'our', 'your', 'his', 'her', 'its'</i></b>, and <b><i>'their'</i></b> are known as possessive adjectives (or possessive determiners). They come before nouns and <b>indicate ownership</b> of the noun. <b>Example:</b> \"The teacher asked the students to open <b><i>their</i></b> drawing books.\"</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>The damp weather is synonymous with a host of diseases and skin problems, <u>which varies according</u> to the many skin types.</p>",
    "options": [
      "that varies according",
      "that vary accordingly",
      "No improvement required",
      "which vary according"
    ],
    "correct_option_id": 3,
    "solution": "<p>In the given sentence, 'which' is a relative pronoun. The verb that follows a relative pronoun is used according to the antecedent that precedes the relative pronoun. In this case, 'skin problems' is the antecedent. Since it is a plural noun, we cannot use the singular verb 'varies'. So, the underlined part of the sentence is grammatically incorrect. Option (a) is also incorrect for the same reason. 'Accordingly' is an adverb. Example - \"The boss told me how to do the project, and I acted accordingly.\" We cannot use the preposition 'to' after 'accordingly'. So, option (b) is also eliminated. Among the given options, option (d) is the correct choice.</p><p>Hence, option (d) is the correct answer.</p><p><b>Note:</b></p><p><b>Relative pronouns: </b>A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies, or describes, the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option to improve the underlined segment in the given sentence. If there is no need to improve it, select 'no improvement required'. </p><p>After putting in so much effort, she finally <u>managing getting her</u> admission to Harvard. </p>",
    "options": [
      "no improvement required",
      "managed to get",
      "managing to getting",
      "manage to get"
    ],
    "correct_option_id": 1,
    "solution": "<p>The use of 'managing' is wrong because no helping verb is used prior to it. So, option (c) is also negated for the same reason. Option (d) is also negated because the verb does not agree with the subject of the sentence. 'She' is a singular noun but 'manage' is a plural verb. Thus, option (b) is correct.</p><p><b>The correct sentence is: </b>After putting in so much effort, she finally <b>managed to get</b> admission to Harvard.</p><p>Hence, (b) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate collocation to substitute the underlined word in the given sentence.</p><p>The passenger did pay <u>attention of</u> the conductor's call.</p>",
    "options": [
      "attention into",
      "attention out",
      "attention in",
      "attention to"
    ],
    "correct_option_id": 3,
    "solution": "<p>The underlined words denote the action done by a passenger with respect to a conductor's action and in the underlined part, the preposition 'of' is an incorrect fit which needs to be replaced by the preposition 'to' which means 'identifying the person or thing affected by or receiving something' and indicates the stimuli to which the passenger paid attention. The other options do not fit contextually, so they are negated.</p><p>Hence, the correct answer is option (d).</p><p>Note:</p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the appropriate option to replace the underlined word with adverb of time. </p><p>I am going to clean my house <u>intensively</u>. </p>",
    "options": [
      "sadly",
      "tomorrow",
      "fast",
      "accidentally"
    ],
    "correct_option_id": 1,
    "solution": "<p>Among the given options, only 'tomorrow' is the adverb of time. Adverbs that change or qualify the meaning of a sentence by telling us when things happen are defined as adverbs of time. Hence, (b) is the correct answer. </p><p>The rest of the words (including the underlined one) are adverbs of manner. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the option that substitutes the bracketed word segment correctly and completes the sentence meaningfully. </p><p>There's a danger that (us will end up blaming) innocent children for society's problems.</p>",
    "options": [
      "We will ending up blaming",
      "Us will ending up blaming",
      "We will ends up blaming",
      "We will end up blaming"
    ],
    "correct_option_id": 3,
    "solution": "<p>Objective pronoun 'us' needs to be replaced with subjective pronoun 'we' to denote the subject of the sentence. </p><p>Also, the modal verb 'will' should be followed by the base verb 'end', not the -ing or -s/es verb. </p><p>Only option following both rules is option (d). </p><p>The correct sentence is: There's a danger that we will end up blaming innocent children for society's problems.</p><p>Hence, option (d) is the answer. </p><p><b>Note: Subjective Pronouns:</b> The pronouns I, you, we, he, she, it, and they are known as subjective pronouns because they act as the subjects of verbs: We went to the party.</p><p><b>Objective Pronouns:</b> The pronouns me, you, us, him, her, it, and them are called objective pronouns because they act as the objects of verbs and prepositions: Anjali drove us home.</p><p><b>Modal verb:</b> A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option that can replace the bracketed segment in the given sentence.</p><p>He couldn't help but feel a pang of regret as he (gazing at the faded) photograph, a visual reminder of the friendships he had let drift away over the years.</p>",
    "options": [
      "Looking at the faded",
      "Gazed at the faded",
      "Gaze at the torn",
      "Were gaze at the torn"
    ],
    "correct_option_id": 1,
    "solution": "<p>The phrase \"gazing at the faded\" in the original sentence uses the present participle (-ing) form \"gazing,\" suggesting an ongoing or continuous action. However, the sentence as a whole discusses a past event, indicated by the past tense of \"couldn't help\" and the mention of feeling regret. This inconsistency in verb tenses disrupts the coherence of the sentence. To maintain consistency and align with the past tense narrative of the sentence, a past tense verb form should be used to describe the action related to looking at the faded photograph.</p><p>Option (b) uses the past tense verb \"gazed,\" which aligns with the past action indicated in the sentence. \"Gazed\" indicates a specific and completed action of looking at the faded photograph. It accurately reflects the action that occurred in the past, as the character experienced a pang of regret while looking at the photograph.</p><p>Option (c) uses the phrase \"gaze at the torn,\" which lacks the past tense required to match the context of the sentence. The sentence discusses a past event, and \"gaze\" in the simple present tense doesn't align with the past tense narrative required in this context.</p><p>Option (a) uses the present participle \"looking,\" which does not align with the past tense context of the sentence.</p><p>Option (d) is incorrect as 'were' needs to be followed by either past participle (v3 form) or present participle (-ing form of verb), but 'gaze' is a base verb. </p><p><b>The correct sentence is:</b> He couldn't help but feel a pang of regret as he gazed at the faded photograph, a visual reminder of the friendships he had let drift away over the years.</p><p>Hence, (b) is the correct answer. </p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution required'.</p><p>The women in the team <u>has showcased exceptional</u> teamwork and dedication.</p>",
    "options": [
      "Has exhibited excellent",
      "Is demonstrating excellent",
      "No substitution required",
      "Have demonstrated exceptional"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct option that can substitute the underlined segment is 'have demonstrated exceptional'. The error in the original sentence is related to subject-verb agreement. The singular 'has' in the sentence does not match with the plural subject 'women'. \"Women\" is a plural noun, so it should be followed by the plural verb \"have,\" not the singular \"has.\"</p><p>Option (d) correctly substitutes \"has\" with \"have\" to match the plural subject \"women.\"</p><p>Options (a) and (b) are incorrect because they do not address the subject-verb agreement error in the original sentence. Both 'has' and 'is' are singular and do not match with the plural subject 'women'. Hence, (d) is the correct answer.</p><p><b>The correct sentence is: </b>The women in the team <b>have demonstrated exceptional</b> teamwork and dedication.</p><p><b>NOTE:</b></p><p>Subject-verb agreement means that a subject and its verb must be both singular or plural:</p><p>A singular subject takes a singular verb.</p><p>A plural subject takes a plural verb.</p><p>For example, in the sentence 'John lives in France', the subject John (singular 'he') 'agrees with' the third person singular form of the verb to live  -  lives.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution required'.</p><p>Honesty and integrity <u>is basic principles</u> in building trust with others.</p>",
    "options": [
      "Is very important",
      "Has substantial importance",
      "Are fundamental principles",
      "No substitution required"
    ],
    "correct_option_id": 2,
    "solution": "<p>The option that can substitute the underlined segment is 'are fundamental principles'. The original sentence is grammatically incorrect due to subject-verb agreement issues. The subject of the sentence is \"Honesty and integrity,\" which is a compound subject joined by \"and.\" Therefore, it is plural and requires the plural verb \"are,\" not the singular verb \"is.\"</p><p>Option (c) rectifies the original error as it uses \"are,\" which agrees with the plural subject and appropriately describes the importance of honesty and integrity in building trust.</p><p>Option (a) uses \"is,\" which does not agree with the plural subject \"Honesty and integrity.\"</p><p>Option (b) uses \"has,\" which is singular and does not agree with the plural subject. Hence, (c) is the correct answer.</p><p><b>The correct sentence is:</b> Honesty and integrity <b>are fundamental principles</b> in building trust with others.</p><p><b>NOTE:</b></p><p><b>Subject-verb agreement</b> means that a subject and its verb must be both singular or plural:</p><p>A singular subject takes a singular verb.</p><p>A plural subject takes a plural verb.</p><p>For example, in the sentence 'John lives in France', the subject John (singular 'he') 'agrees with' the third person singular form of the verb to live  -  lives.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the option that will improve the italicized part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>The chancellor and chief justice <i>have</i> arrived for the graduation ceremony.</p>",
    "options": [
      "Has",
      "No improvement required",
      "Were",
      "Having"
    ],
    "correct_option_id": 0,
    "solution": "<p>The underlined word needs to be an auxiliary verb that must be used before 'arrived' which is the main verb in the sentence. When the subjects suggest one idea to the mind or refer to the same person or thing, the verb is singular. Also, when two singular nouns refer to the same person or thing, the article 'the' is used only once. The only singular auxiliary verb in the sentence is 'has'. Therefore, the correct answer is option a). </p><p><b>Note:</b></p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p><p>A <b>Verb </b>is a word or group of words that is used to indicate that something happens or exists, for example, bring, happen, be, do.</p><p><b><i>Main verb</i></b> is the principal verb in any sentence. It denotes an action or state of being. Main verbs can stand alone, or they can be used with a helping (auxiliary) verb. </p><p><b><i>Auxiliary verbs</i></b>, also known as helping verbs are used with main verbs to make tenses, passive voices, questions, and negatives.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the appropriate option to replace the underlined word with adverb of time. </p><p>We had dinner and <u>constantly</u> went for a walk.</p>",
    "options": [
      "sadly",
      "daily",
      "afterwards",
      "away"
    ],
    "correct_option_id": 2,
    "solution": "<p>Among the given options, 'afterwards' (after the time mentioned) is the correct choice as it is the only adverb of time.</p><p>Hence, option (c) is the correct answer.</p><p><b>The correct sentence is</b>: We had dinner and afterwards went for a walk.</p><p><b>Note:</b></p><p><b>Adverb of Time: </b>It tells us when an action is done or occurs.</p><p>Examples: after, early, now, soon, then.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option to improve the underlined segment in the given sentence. If there is no need to improve it, select 'No improvement'.</p><p>It is very difficult to <u>live off</u> honesty in today's world as there is rampant corruption and manipulation.</p>",
    "options": [
      "live in",
      "live on",
      "live by",
      "No improvement"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>\"live by\"</b> is a phrasal verb.</p><p><b>Live by</b>: means or manner; to agree with and follow (something, such as a set of beliefs)</p><p>The phrasal verb <b>\"live by\"</b> perfectly fits the meaning of the sentence. It conveys that corruption in today's world makes it difficult for us to <b>follow and practice</b> honesty.</p><p>The rest of the phrasal verbs don't fit in contextually.</p><p>Thus, <b>\"live by\"</b> should replace <b>\"live off\".</b></p><p>Therefore, the correct answer is: <b>(c) live by</b></p><p>The corrected form of the sentence is: It is very difficult to <u>live by</u> honesty in today's world as there is rampant corruption and manipulation.</p><p>Additional Information:</p><p>The meaning of the rest of the phrasal verbs is given below in the table:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Word</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Live in</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">reside at the place where one works or studies</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Live on</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">have a particular amount of money with which to buy food and other necessities</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Live off</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">source of income</td></tr></table>",
    "question_index": 12
  },
  {
    "question": "<p>Select the alternative that will improve the underlined part of the sentence. In case there is no improvement required, select 'No improvement'.</p><p>In recent years, a growing number of climate-change researchers have made the conscious decision <b><u>to reduce there carbon footprints</u></b> by avoiding air travel or flying less.</p>",
    "options": [
      "to reduced their carbon footprints",
      "to reduce their carbon footprints",
      "to reducing there carbon footprints",
      "No improvement"
    ],
    "correct_option_id": 1,
    "solution": "<p>The phrase that is underlined in the given sentence is incorrect as it uses the adverb 'there' (at that place) instead of possessive determiner 'their' (belongs to them). For the same reason option (c) too is incorrect. Option (a) is incorrect as the infinitive marker 'to' is always followed by verb in its base form ('reduce'). Option (b) when replaces the bold section makes the sentence grammatically correct.</p><p>Hence, (b) is correct.</p><p><b>NOTE:</b></p><p>Possessive Adjectives: Words like my, our, your, his, her, its, and their are known as possessive adjectives (or determiners). They come before nouns and indicate ownership of the noun. Example: The teacher asked the students to open their drawing books.</p><p>\"Infinitive: The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p> To err is human. [like a noun, the infinitive to err is the subject of the verb is]</p><p> My father likes to cook. [like a noun, the infinitive to cook is the object of the verb likes]</p><p> To vote in elections is our right. [the infinitive to vote, like a noun, is the subject of the verb is, but, like a verb, it also takes an object (elections)]</p><p> Radha went to the lake to fetch water. [the infinitive to fetch, like a noun, is the object of the verb went, but, like a verb, it also takes an object (water)]</p><p> The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.</p><p>\"</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>They wouldn't have hired you if you <u>hadn't had</u> some experience abroad.</p>",
    "options": [
      "haven't had",
      "have",
      "has",
      "No improvement required"

    "correct_option_id": 3,
