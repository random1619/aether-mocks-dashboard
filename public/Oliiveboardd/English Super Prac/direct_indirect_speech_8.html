        const questions = [
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The Principal asked Neha where she was going after the graduation ceremony.</p>",
    "options": [
      "The Principal said to Neha, \"Where you are going after the graduation ceremony?\"",
      "The Principal said to Neha, \"Where have you been going after the graduation ceremony?\"",
      "The Principal said to Neha, \"Where were you going after the graduation ceremony?\"",
      "The Principal said to Neha, \"Where are you going after the graduation ceremony?\""
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence in the Indirect Speech is in <b>Past Continuous Tense</b>. Therefore, the sentence in the Direct Speech will be in <b>Present Continuous Tense</b>.</p><p>Past Continuous (Subject + was/were + V1 + ing + Object) will be converted into Present Continuous (Subject + is/am/are + V1 +ing + Object)</p><p>For example:</p><p>He said that he was checking the assignment. (Indirect Speech)</p><p>He said, \"I am checking the assignment.\" (Direct Speech)</p><p>In the case of <b>Interrogative sentences</b> like this, the verb in Direct speech is always placed before the subject, unlike in Indirect Speech.</p><p>In the sentences beginning with the question word, the statement in the direct speech also begins with the same question word. </p><p>For example:</p><p>The teacher asked Jennie why she was late. (Indirect speech)</p><p>The teacher said to Jennie, \"Why are you late?\" (Direct speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>&#8226;&#61472;'She' in the indirect speech is changed into 'you' in direct speech.</p><p>&#8226;&#61472;'Asked' is changed into 'said to'.</p><p>&#8226;&#61472;'Was' is changed into 'are'.</p><p>Also, inverted commas (\"...\") are placed in direct speech.</p><p>Option (a) is eliminated because the verb 'are' is not placed before the subject 'you'. Option (b) is eliminated because it is in Present Perfect Continuous tense. Option (c) is eliminated because it is in Past Continuous tense. Option (d) is the correct answer.</p><p>The correct sentence is: <b>The Principal said to Neha, \"Where are you going after the graduation ceremony?\"</b></p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The spectator said that when the police enquired, the people cooperated.</p>",
    "options": [
      "The spectator said, \"When the police enquires, the people cooperates.\"",
      "The spectator said, \"When the police enquired, the people cooperated.\"",
      "The spectator said, \"When the police had to enquire, the people had to cooperate.\"",
      "The spectator said, \"When the police will enquire, the people will have to cooperate.\""
    ],
    "correct_option_id": 1,
    "solution": "<p>If the sentence is in the <b>Past tense</b>, the form of tense doesn't change when it is used in the <b>time clause</b>.</p><p>One way of identifying the time clause is that the Time clause always begins with the following:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>When</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Whenever</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">While</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">As</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Since</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">After</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Before</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Until</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">As soon as</td></tr></table><p>For example:</p><p>Arun told him that when George called him, he responded. (Indirect speech)</p><p>Arun told him, \"When George called me, I responded.\" (Direct speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Said that</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said</td></tr></table><p>From the given options, one that follows the above mentioned conditions for Direct speech is option (b) \"The spectator said, \"When the police enquired, the people cooperated.\"'</p><p>Hence, the correct answer is option (b). </p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>The man said to me, \"May your child never know a hungry belly\"</p>",
    "options": [
      "The man blessed me that my child will never know a hungry belly.",
      "The man wished me that his child may never know a hungry belly.",
      "The man wished me that my child might never know a hungry belly.",
      "The man prayed for me that my child could never have known a hungry belly."
    ],
    "correct_option_id": 2,
    "solution": "<p>These kinds of sentences are called Optative Sentences.</p><p>Optative Sentences are usually prayers or wishes.</p><p>In these kinds of sentences, \"said\" in the Direct Speech is changed into \"prayed\", \"wished\", etc.</p><p>\"That\" is used in place of Inverted Commas while transforming the sentence from Direct Speech to Indirect Speech.</p><p>While changing from Direct Speech to Indirect Speech, the sentence is changed into its Assertive form i.e., \"Subject + might/may + V1 + Object\".</p><p>For example:</p><p>The father said to his son, \"May God bless you!\" (Direct Speech)</p><p>The father wished his son that God might bless him. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The reporting verb 'said to' is changed into 'wished'. </p><p>&#183; 'May' is changed into 'might'. </p><p>&#183; The possessive determiner 'your' is changed into 'my'. </p><p>Therefore, the correct answer is option (c): <b>The man wished me that my child might never know a hungry belly.</b></p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that is NOT an example of indirect speech. </p><p></p>",
    "options": [

      "Jerry said that he will buy a new car as soon as he receives his payment."
    ],
    "correct_option_id": 0,
    "solution": "<p>Exclamatory Sentences are used to express joy, surprise, wonder, etc. The use of \"Alas!\", \"Hurray!\", \"Oh!\" is evident in these types of sentences in only Direct Speech.</p><p>Among the given options, only (a) has such a word in it (wow). Hence, (a) is the correct answer. </p>",
    "question_index": 3
  },
  {
    "question": "<p>In the following question, a sentence has been given in Direct/Indirect speech. Out of the four alternatives suggested, select the one which best expresses the same sentence in Indirect/Direct speech.</p><p>Lalitadevi said to the boy, &#8220;Will you step with me into the garden?&#8221; </p>",
    "options": [
      "Lalitadevi asked the boy if he would step with her into the garden.",
      "Lalitadevi said to the boy if he would step with me in the garden.",
      "Lalitadevi said to the boy if he would like to step with me in the garden.",
      "Lalitadevi requested the boy to step with me in the garden."
    ],
    "correct_option_id": 0,
    "solution": "<p>In the case of Interrogative sentences like this, said in Direct Speech is changed into enquired (of), wanted to know, asked, etc.</p><p>In Indirect speech, the verb is always placed after the subject, unlike in Direct Speech.</p><p>If there is a question in the Direct Speech whose answer can come as Yes or No in the Indirect Speech, we should use the conjunctions if or whether.</p><p>For example:</p><p>Ravi said to me, Is she studying? (Direct Speech)</p><p>Ravi asked me if she was studying. (Indirect Speech)</p><p>Also, the sentence in the Direct Speech is in the  tense. So, the tense in the Indirect Speech should be in the  tense.</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>said to&#8217; into &#8216;asked&#8217;\" \"you' becomes \"he\", 'will' becomes 'would'.</p><p>Therefore, the correct answer is option (a).</p><p></p><p></p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>He said that after India lost the medal, he was distressed.</p>",
    "options": [
      "He said, \"After India had lost the medal, he had to be distressed.\"",
      "He said, \"After India loses the medal, he distressed.\"",
      "He said, \"After India lost the medal, I was distressed.\"",
      "He said, \"After India lost the medal, I had to be distressed.\""
    ],
    "correct_option_id": 2,
    "solution": "<p>If the sentence is in the <b>Past tense</b>, the form of tense doesn't change when it is used in the <b>time clause</b>.</p><p>One way of identifying the time clause is that the Time clause always begins with the following:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">When</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Whenever</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">While</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">As</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Since</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>After</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Before</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Until</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">As soon as</td></tr></table><p>For example:</p><p>Arun told him that when George called him, he responded. (Indirect speech)</p><p>Arun told him, \"When George called me, I responded.\" (Direct speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Said that</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">he</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table><p>From the given options, one that follows the above mentioned conditions for Direct speech is option (c) \"He said, \"After India lost the medal, I was distressed.\"\"</p><p>Hence, the correct answer is option (c). </p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Fiza said, \"I had brought cashews and almonds.\"</p>",
    "options": [
      "Fiza said that she had being brought cashews and almonds.",
      "Fiza said that she had been brought cashews and almonds.",
      "Fiza said that she had brought cashews and almonds.",
      "Fiza said that she has brought cashews and almonds."
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence in the Direct Speech is in <b>Past Perfect</b>. Therefore, the sentence in the Indirect Speech should also be in <b>Past Perfect</b>.</p><p>Past Perfect form (Subject + had + V3 + Object) should be kept intact in indirect speech.</p><p>For example:</p><p>He said, \"I had just finished the movie.\" (Direct Speech)</p><p>He said that he had just finished the movie. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; Inverted commas (\"...\") are replaced with 'that'. </p><p>&#183; The pronoun 'I' changed to 'she'. </p><p>Therefore, the correct answer is: (c)</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option that is NOT an example of indirect speech. </p><p></p>",
    "options": [
      "John said to Jessica that he went to the mall without her.",
      "You will give your best to accomplish your aim.",

    "correct_option_id": 1,
    "solution": "<p>One of the formats of Direct Speech is:</p><p>Subject + will/shall + V1 + object.</p><p>For example:</p><p>He said that he would go to Kolkata on Friday. (Indirect Speech)</p><p>He said, \"I will go to Kolkata on Friday\" (Direct Speech)</p><p>Among the given options, only (b) matches with required format. Hence, (b) is the correct answer. </p>",
    "question_index": 7
  },
  {
    "question": "<p>In the following question, a sentence has been given in Direct/Indirect speech. Out of the four alternatives suggested, select the one which best expresses the same sentence in Indirect/Direct speech.</p><p>He said to Manjari, &#8220;When do you intend to return my laptop you took from me?&#8221;</p>",
    "options": [
      "He enquired Manjari that when did she intend to return his laptop she took from him.",

      "He enquired Manjari that when she intended to return his laptop she had taken from him.",
      "He enquired when Manjari intended to return his laptop she took from him."
    ],
    "correct_option_id": 1,
    "solution": "<p>The reporting verb is said i.e. in past, therefore, the tense in reported speech must be changed according to past. So &#8216;Present Indefinite&#8217; tense should be changed into &#8216;Past Indefinite tense. After &#8216;when&#8217; use assertive structure of the sentence. Changes to be made in personal pronouns i.e. &#8216;you&#8217; changes into &#8216;she&#8217;. Change &#8216;said to&#8217; into &#8216;enquired&#8217; as the sentence is interrogative.</p><p>Hence, the correct answer is option (b).</p><p></p>",
    "question_index": 8
  },
  {
    "question": "<p>In the following question, a sentence has been given in Direct/Indirect speech. Out of the four alternatives suggested, select the one which best expresses the same sentence in Indirect/Direct speech.</p><p>Taniska said to her, &#8220;I shall leave this place as soon as it is possible.&#8221; </p>",
    "options": [
      "Taniska told her that he would leave that place as soon as it was possible.",

      "Taniska asked her whether to leave that place as soon as it was possible.",

    "correct_option_id": 0,
    "solution": "<p>The sentence in the Direct Speech is in Future Simple Tense. Therefore, the sentence in the Indirect Speech should be in Present Conditional Tense.</p><p>Future Simple (Subject + will/shall + V1 + object) should be converted into Present Conditional (Subject + would/should + V1 +object).</p><p>For example:</p><p>He said, I will be in Kolkata on Friday. (Direct Speech)</p><p>He said that he would be in Kolkata on Friday. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#8216;I&#8217; changes into &#8216;he&#8217; and &#8216;this&#8217; into &#8216;that&#8217;&#8216;said to&#8217; into &#8216;told&#8217;</p><p>Therefore, the correct answer is option (a)</p><p></p><p></p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Teena said, \"I have got something for us.\"</p>",
    "options": [
      "Teena said that they had got something for us.",
      "Teena said that I had got something for them.",
      "Teena said that she has got something for them.",

    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence in the Direct Speech is in <b>Present Perfect Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Past Perfect Tense</b>.</p><p>Present Perfect (Subject + has/have + V3 +Object) should be converted into Past Perfect (Subject + had + V3 +Object).</p><p>For example:</p><p>He said, \"I have got a new job.\" (Direct Speech)</p><p>He said that he had got a new job. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; Inverted commas (\"...\") are replaced with 'that'. </p><p>&#183; The pronoun 'I' changes to 'she'. </p><p>&#183; The verb 'have' changed to 'had'. </p><p>&#183; The objective pronoun 'us' changes to 'them'. </p><p>Therefore, the correct answer is: (d). </p>",
    "question_index": 10
  },
  {
