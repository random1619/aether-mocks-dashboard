        const questions = [
  {
    "comp": "<p><b>Directions [Set of 4 Questions]:</b>   In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p><p>Off the coast of southeast China, one particular fish species is <b>__(A)__</b>: the oddly named Bombay duck. When research ships trawl the seafloor off that coast, they now <b>__(B)__</b> upwards of 200kg of the gelatinous fish per hour  -  a more than tenfold increase over a decade ago. The <b>__(C)__</b> for this mass invasion, says Pauly, is extremely low oxygen levels in these polluted waters. Fish species that can't <b>__(D)__</b> with less oxygen have fled, while the Bombay duck, part of a small subset of species that is physiologically better able to deal with less oxygen, has moved in.</p>",
    "question": "<p>Select the most appropriate option to fill in the blank A.</p>",
    "options": [
      "surviving",
      "disappearing",
      "declining",
      "flourishing"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let's look at the meanings of the given options. </p><p>Surviving: continue to live or exist, especially in spite of danger or hardship.</p><p>Disappearing: cease to be visible.</p><p>Declining: becoming smaller, fewer, or less; decreasing.</p><p>Flourishing: (of a living organism) grow or develop in a healthy or vigorous way, especially as the result of a particularly congenial environment.</p><p>The sentence with the blank and the following sentence convey that the number of Bombay duck fish (established later in the passage to be an invasive species) keeps on increasing. So, among the given options, 'flourishing' is the correct choice. </p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 0
  },
  {
    "comp": "<p><b>Directions [Set of 4 Questions]:</b>   In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p><p>Off the coast of southeast China, one particular fish species is <b>__(A)__</b>: the oddly named Bombay duck. When research ships trawl the seafloor off that coast, they now <b>__(B)__</b> upwards of 200kg of the gelatinous fish per hour  -  a more than tenfold increase over a decade ago. The <b>__(C)__</b> for this mass invasion, says Pauly, is extremely low oxygen levels in these polluted waters. Fish species that can't <b>__(D)__</b> with less oxygen have fled, while the Bombay duck, part of a small subset of species that is physiologically better able to deal with less oxygen, has moved in.</p>",
    "question": "<p>Select the most appropriate option to fill in the blank B.</p>",
    "options": [
      "catch",
      "harvest",
      "purchase",
      "kill"
    ],
    "correct_option_id": 0,

    "question_index": 1
  },
  {

    "options": [

      "reason",

    ],
    "correct_option_id": 2,

    "correct_option_id": 3,
    "solution": "<p>The sentence with the blank talks about the availability of oxygen. The verb 'relate' (to find or show the connection between two or more things) doesn't provide a coherent sentence. So, it is eliminated. 'Agree with less oxygen' does not form a meaningful phrase. 'Associate with' means 'make or show a connection between'. It also doesn't provide a coherent meaning to the sentence. Among the given options, 'cope' (deal effectively with something difficult) is the correct choice. </p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 3
  },
  {
    "comp": "<p><b>Directions [Set of 4 Questions]:</b>   In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p><p><b>__(A)__</b> biodiversity worldwide is incredibly challenging; national monitoring programmes differ widely, the majority of collected data is erratic and little is <b>__(B)__</b> publicly. But scientists may have found a surprising solution: the filters already used <b>__(C)__</b> the world to monitor air pollution. These devices have for decades been unintentionally capturing large amounts of environmental DNA from animals and plants. Scientists say this could be used to help us <b>__(D)__</b> past, as well as future, changes in biodiversity.</p>",
    "question": "<p>Select the most appropriate option to fill in the blank A.</p>",
    "options": [
      "Building",
      "Tracking",
      "Connecting",
      "Reading"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let's look at the meanings of the given options. </p><p>Building: construct (something) by putting parts or materials together.</p><p>Tracking: note the progress or course of.</p><p>Connecting: bring together or into contact so that a real or notional link is established.</p><p>Reading: look at and comprehend the meaning of (written or printed matter) by interpreting the characters or symbols of which it is composed. </p><p>The passage talks about the difficulties in and the modern solution of monitoring biodiversity and its changes. The latter part of the sentence talks about monitoring biodiversity. So, among the given options, 'tracking' is the correct choice. </p><p>Hence, option (b) is the correct answer. </p>",
    "question_index": 4
  },
  {
    "comp": "<p><b>Directions [Set of 4 Questions]:</b>   In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p><p><b>__(A)__</b> biodiversity worldwide is incredibly challenging; national monitoring programmes differ widely, the majority of collected data is erratic and little is <b>__(B)__</b> publicly. But scientists may have found a surprising solution: the filters already used <b>__(C)__</b> the world to monitor air pollution. These devices have for decades been unintentionally capturing large amounts of environmental DNA from animals and plants. Scientists say this could be used to help us <b>__(D)__</b> past, as well as future, changes in biodiversity.</p>",

      "calculated"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence with the blank talks about the data regarding our biodiversity. The blank requires a verb which is qualified by the adverb 'publicly'. The verb 'sold' doesn't fit here as this data is collected for research purposes, not for a business. Similarly, the phrases 'corrected publicly' and 'calculated publicly' are incorrect. Researchers are not going to correct or calculate this data publicly. So, they are also eliminated. Among the given options, 'shared' is the correct choice. </p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "comp": "<p><b>Directions [Set of 4 Questions]:</b>   In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p><p><b>__(A)__</b> biodiversity worldwide is incredibly challenging; national monitoring programmes differ widely, the majority of collected data is erratic and little is <b>__(B)__</b> publicly. But scientists may have found a surprising solution: the filters already used <b>__(C)__</b> the world to monitor air pollution. These devices have for decades been unintentionally capturing large amounts of environmental DNA from animals and plants. Scientists say this could be used to help us <b>__(D)__</b> past, as well as future, changes in biodiversity.</p>",
    "question": "<p>Select the most appropriate option to fill in the blank C.</p>",
    "options": [
      "in",
      "over",
      "around",
      "along"
    ],
    "correct_option_id": 2,
    "solution": "<p>The blank requires a preposition. Among the given options, the sentence states that devices that are used to monitor air pollution can be used to monitor biodiversity. 'Along' is used with a straight path, river, etc. So, it is eliminated. 'Over' is used to convey if something is above or higher than something else. It doesn't fit in the given sentence. Between the two remaining options, 'around' is the correct choice. To monitor air pollution, we need to place the device in every part of the world and not in a particular place. So, 'in' is eliminated. </p><p>Hence, option (c) is the correct answer. </p><p><b>Note:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 6
  },
  {
    "comp": "<p><b>Directions [Set of 4 Questions]:</b>   In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p><p><b>__(A)__</b> biodiversity worldwide is incredibly challenging; national monitoring programmes differ widely, the majority of collected data is erratic and little is <b>__(B)__</b> publicly. But scientists may have found a surprising solution: the filters already used <b>__(C)__</b> the world to monitor air pollution. These devices have for decades been unintentionally capturing large amounts of environmental DNA from animals and plants. Scientists say this could be used to help us <b>__(D)__</b> past, as well as future, changes in biodiversity.</p>",
    "question": "<p>Select the most appropriate option to fill in the blank D.</p>",
    "options": [
      "design",
      "direct",
      "grab",
      "understand"
    ],
    "correct_option_id": 3,
    "solution": "<p>The passage talks about monitoring biodiversity and its changes. The verbs 'grab' (grasp or seize suddenly and roughly) or 'direct' (control the operations of; manage or govern) don't fit in the sentence as they don't provide a coherent sentence. We cannot plan our past and future changes by collecting data. We can only observe and study our biodiversity using this data. So, the verb 'design' doesn't fit in the sentence. </p><p>Among the given options, 'understand' is the correct choice. </p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 7
  },
  {
    "comp": "<p><b>Directions [Set of 4 Questions]:</b>   In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p><p>In the ______ (A) part of the last century there lived a man of science, an eminent proficient in every branch of natural philosophy, ______ (B) not long before our story opens had made the experience of a spiritual affinity more attractive than any chemical one. He had left his laboratory to the care of an assistant, cleared his fine countenance from the furnace smoke, ______ (C) the stain of acids from his fingers, and persuaded a beautiful woman to become his wife. In those days when the comparatively recent ________ (D) of electricity and other kindred mysteries of Nature seemed to open paths into the region of miracle, it was not unusual for the love of science to rival the love of a woman in its depth and absorbing energy. </p>",
    "question": "<p>Which of the following words can fill in the blank A?</p>",
    "options": [
      "Fast",
      "Normal",
      "Lush",
      "Latter"
    ],
    "correct_option_id": 3,
    "solution": "<p>The blank requires an adjective that qualifies the noun 'part' and denotes the specific part of the last century. 'Fast' (moving or capable of moving at high speed), 'normal' (usual, typical, or expected) and 'lush' (growing luxuriantly) do not denote the time of the century that is mentioned in the sentence and so, they are negated. 'Latter' (occurring or situated nearer to the end of something than to the beginning) is the word that matches the context of the sentence and denotes time as per the requirement of the sentence.</p><p>Hence, the correct answer is option (d).</p><p>Note:</p><p><b>Qualifiers: </b>A word or phrase that limits the meaning of another word or phrase or makes it less general. 'Adverbs' and 'adjectives' are qualifiers.</p>",
    "question_index": 8
  },
  {
    "comp": "<p><b>Directions [Set of 4 Questions]:</b>   In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p><p>In the ______ (A) part of the last century there lived a man of science, an eminent proficient in every branch of natural philosophy, ______ (B) not long before our story opens had made the experience of a spiritual affinity more attractive than any chemical one. He had left his laboratory to the care of an assistant, cleared his fine countenance from the furnace smoke, ______ (C) the stain of acids from his fingers, and persuaded a beautiful woman to become his wife. In those days when the comparatively recent ________ (D) of electricity and other kindred mysteries of Nature seemed to open paths into the region of miracle, it was not unusual for the love of science to rival the love of a woman in its depth and absorbing energy. </p>",
    "question": "<p>Which of the following words can fill in the blank B?</p>",
    "options": [
      "whose",
      "whom",
      "which",
      "who"
    ],
    "correct_option_id": 3,
    "solution": "<p>The blank requires a relative pronoun that denotes the noun 'a man of science' that is also the subject of the sentence. 'Whose' denotes the possession of a person, 'which' is not used for humans and 'whom' is used to refer to the object and so, these options are negated. 'Who' is the pronoun that denotes the person, as required in the sentence and can thus fill the given blank.</p><p>Hence, the correct answer is option (d).</p><p>Note:</p><p><b>Relative pronouns: </b>A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies, or describes, the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p>",
    "question_index": 9
  },
  {
    "comp": "<p><b>Directions [Set of 4 Questions]:</b>   In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p><p>In the ______ (A) part of the last century there lived a man of science, an eminent proficient in every branch of natural philosophy, ______ (B) not long before our story opens had made the experience of a spiritual affinity more attractive than any chemical one. He had left his laboratory to the care of an assistant, cleared his fine countenance from the furnace smoke, ______ (C) the stain of acids from his fingers, and persuaded a beautiful woman to become his wife. In those days when the comparatively recent ________ (D) of electricity and other kindred mysteries of Nature seemed to open paths into the region of miracle, it was not unusual for the love of science to rival the love of a woman in its depth and absorbing energy. </p>",
    "question": "<p>Which of the following words can fill in the blank C?</p>",
    "options": [
      "applied",
      "removed",
      "induced",
      "counted"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence talks about the subject who does something that makes the acid stains go off the subject's fingers. Among the options, the only word that matches this context of the sentence is 'removed' (abolish or get rid of). The remaining options do not convey the required meaning and are thus negated.</p><p>Applied- put or spread (a substance) on a surface.</p><p>Induced- bring about or give rise to.</p><p>Counted- determine the total number of (a collection of items).</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 10
  },
  {
    "comp": "<p><b>Directions [Set of 4 Questions]:</b>   In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p><p>In the ______ (A) part of the last century there lived a man of science, an eminent proficient in every branch of natural philosophy, ______ (B) not long before our story opens had made the experience of a spiritual affinity more attractive than any chemical one. He had left his laboratory to the care of an assistant, cleared his fine countenance from the furnace smoke, ______ (C) the stain of acids from his fingers, and persuaded a beautiful woman to become his wife. In those days when the comparatively recent ________ (D) of electricity and other kindred mysteries of Nature seemed to open paths into the region of miracle, it was not unusual for the love of science to rival the love of a woman in its depth and absorbing energy. </p>",

  {
    "comp": "<p><b>Directions [Set of 4 Questions]:</b>   In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank. </p><p>Food Fusion and Culinary Adventures have emerged as an exciting __(1)__ in the gastronomic world, igniting taste buds with innovative and cross-cultural creations. This culinary movement encourages chefs and home cooks alike to __(2)__ traditional boundaries, blending ingredients and techniques from diverse cuisines to craft new, flavourful experiences. Food enthusiasts are reimagining classics and experimenting with __(3)__ combinations, resulting in dishes that tantalize the palate and expand cultural horizons. Food Fusion is not just about taste; it's a celebration of cultural diversity and a reflection of our interconnected world. It encourages exploration of global culinary traditions, fostering a deeper appreciation for different cultures through the __(4)__ language of food. Whether it's a fusion food truck on the corner or an adventurous home chef experimenting in their kitchen, Food Fusion and Culinary Adventures continue to inspire culinary creativity. </p>",
