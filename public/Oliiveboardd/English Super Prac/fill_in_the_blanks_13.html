<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p> In the following question, the sentence is given with a blank to be filled in with an appropriate word. Select the correct alternative out of the five and indicate it by selecting the appropriate option. </p><p>He was hoping __________ hope that the thief will bring his wallet back to him.</p>",
    "options": [
      "for",
      "in",
      "against",
      "till"
    ],
    "correct_option_id": 2,
    "solution": "\"<p> The correct options is (3) i.e.&#160; <b>against</b></p><p>Option 1 &#8216;for&#8217; cannot be used because someone can&#8217;t hope for hope again.</p><p>&#8216;In&#8217; cannot be used in the blank since it does not fit in the context. Till cannot be used as it is used to define an ending period and the statement does not indicate any such period. &#8216;Towards&#8217; meaning to aim at something, but such an aim is not present in the statement. Only, &#8216;against&#8217; fits the context as it means to hope in a little way against all possibilities, and hence, it is the proper fit.</p><p>Note:</p><p>'To hope against hope' is a phrase that means 'to hope for something that is almost impossible'.</p><p>&#160;</p>\"",
    "question_index": 0
  },
  {
    "question": "<p>A sentence is given with a blank to be filled in with appropriate word. Four alternatives are suggested. Choose the correct option.</p><p>The ________ between the Indian and Pakistani armies still continues.</p>",
    "options": [
      "dual",
      "match",
      "duel",
      "deal"
    ],
    "correct_option_id": 2,
    "solution": "<p>Dual means two. Match means competition. Duel means a prearranged contest with deadly weapons between two people in order to settle a dispute. Deal means agreement. Hence the suitable filler for the given sentence is 'duel'.</p>",
    "question_index": 1
  },
  {
    "question": "<p>In the below questions, sentences are given with blanks to be filled in with an appropriate word(s). Four alternatives are suggested for each question. Choose the correct alternative out of the four.</p><p>You must learn to ___________the words of your speech so that the audience gets your message.</p>",
    "options": [
      "instigate",
      "inundate",
      "elucidate",
      "enunciate"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option D is the right answer, as the word 'enunciate' (say or pronounce clearly) fits most appropriately in the context of the sentence. Option A is eliminated, as the word 'instigate' means to rouse a fight; this does not fit in the statement. Option B is eliminated as the word 'inundate' means to overwhelm, and makes no sense in this context. For option C, the word 'elucidate' which means to explain in detail; fits loosely in the sentence, but not as well as Option D as the 'words of speech' are being talked about.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate word to fill in the blank.</p><p>Rajvir asked his son not to __________ him in front of the guests.</p>",
    "options": [
      "abash",
      "aberration",
      "elucidate",
      "expedite"
    ],
    "correct_option_id": 0,
    "solution": "<p>Among the given options, \"abash\" fits the context of the sentence. It gives us the idea that Rajvir requested that his son refrains from <b>embarrassing</b> him in front of the guests.</p><p><b>Abash</b>: make (someone) feel embarrassed or disconcerted.</p><p>The word that must fit the blank should be a <b>verb</b> as Rajvir requested his son not to do something (in this case, embarrass him). 'Aberration' is a <b>noun</b> and thus, it is an incorrect option.</p><p>'Elucidate' and 'expedite' are contextual misfits as per their meanings.</p><p>Thus, the correct option is <b>(a), abash</b>.</p><p>Thus, the correct sentence should be: Rajvir asked his son not to <u>abash</u> him in front of the guests.</p><p>Additional Information:</p><p>The respective meanings of the other options are given below in the table:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Word</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Aberration</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a departure from what is normal, usual, or expected</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Elucidate</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">explain</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Expedite</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">accelerate</td></tr></table>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Though the bedsheet that they gifted us is not made of wool, it has a _________ texture to it which can be felt after touching.</p>",
    "options": [
      "Woozy",
      "Wool",
      "Woolen",
      "Woolish"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Woozy' means unsteady, dizzy, or dazed. 'Woolen' means made of wool. 'Woolish' is an incorrect word.</p><p>An adjective is required here to describe the texture of the bedsheet so 'woolen' is the correct adjective to describe that as it is mentioned in the initial part of the sentence that it is not made up of wool.</p><p>Hence, option (c) is correct.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate article(s) to fill in the blanks. </p><p>Every ____ year, many people all over ____ world need new organs to continue enjoying their lives.</p>",
    "options": [
      "No article; the",
      "A; the",
      "An; the",
      "The; the"
    ],
    "correct_option_id": 0,
    "solution": "<p>The phrase \"every year\" does not require an article in between because \"every\" itself conveys a sense of regularity and encompasses all years in a recurring manner. Adding \"a\" or \"an\" would be incorrect, as \"every\" already provides the necessary grammatical structure. So, no article is required in the first blank.</p><p>The definite article \"the\" should be used in the second blank because \"world\" is unique and universally understood as a specific entity. There is only one world being referred to here, so \"the\" is appropriate.</p><p><b>The complete sentence is: </b>Every year, many people all over <b>the</b> world need new organs to continue enjoying their lives.</p><p>Hence, option (a) is the answer.</p><p><b>Note: Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun or plural noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun or singular noun.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate adverb to fill in the blank. </p><p>The crowd cheered _____ for the team.</p>",
    "options": [
      "Loudly",
      "Slowly",
      "Quietly",
      "Mechanically"
    ],
    "correct_option_id": 0,
    "solution": "<p>The adverb \"loudly\" fits best because cheering typically involves making noise, especially in support of a team. This aligns with the context of an enthusiastic crowd.</p><p><b>The complete sentence is:</b> The crowd cheered <b>loudly </b>for the team. </p><p><b>Hence, option (a) is the answer.</b></p><p>Option (b): \"Slowly\" refers to the speed or pace, which is not relevant to how cheering is expressed.</p><p>Option (c): \"Quietly\" contradicts the idea of cheering, which is generally loud.</p><p>Option (d): \"Mechanically\" refers to doing something in an automatic or emotionless way, which does not match the enthusiasm implied by cheering.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The entrepreneur's innovative approach to business management __________ a paradigm shift in the industry.</p>",
    "options": [
      "Precipitated",
      "Perpetuated",
      "Promulgated",
      "Propagated"
    ],
    "correct_option_id": 2,
    "solution": "<p>Precipitated: To cause (a substance) to be deposited in solid form from a solution; to cause it to happen suddenly or unexpectedly.</p><p>Perpetuated: To make something continue indefinitely; to prolong the existence of something.</p><p>Promulgated: To formally announce or make known; to officially put a law or decree into effect.</p><p>Propagated: To spread or promote widely; to reproduce or multiply.</p><p>In the context of the given sentence, the entrepreneur's innovative approach is not merely causing or spreading a paradigm shift, instead, it is actively promoting a new way of thinking in the industry. Therefore, among the given options, the word 'promulgated' is the most suitable choice.</p><p>The complete sentence is: The entrepreneur's innovative approach to business management promulgated a paradigm shift in the industry.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 7
  },
  {
    "question": "<p> Select the most appropriate homonym to fill in the blank.</p><p>Any relationship can go ____ when bad behaviours remain unchanged.</p>",
    "options": [
      "Sour",
      "Sure",
      "Sir",
      "Sore"
    ],
    "correct_option_id": 0,
    "solution": "<p>In the given sentence, it is stated that a relationship can go to a difficult phase if people don't address their bad behaviours. So, the appropriate homonym in the current context is 'sour' which means 'become unpleasant or strained; worsen'.</p><p>Hence, (a) is the correct answer.</p><p>Sure: free from doubt; assured</p><p>Sir: a respectful or formal term of address used to a man</p><p>Sore: physically painful or sensitive, as a wound</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate homonyms from the given alternatives to fill in the blanks. </p><p>I didn't ______ to be ______ when I said that.</p><p>A. mean (average)</p><p>B. mean (verb)</p><p>C. mean (cruel)</p>",
    "options": [
      "B, C",
      "A, B",
      "C, B",
      "C, A"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Mean (verb)</b> is appropriate in the first blank as it refers to the act of conveying an idea or intention: \"I didn't mean to be...\"</p><p><b>Mean (cruel)</b> fits the context when placed in second blank as it refers to being unkind: \"to be mean when I said that.\"</p><p>The words in their respective places give the meaning that the speaker didn't intend to be unkind. </p><p><b>Mean (average)</b> does not fit the context of the sentence, as it relates to a statistical concept.</p><p>The correct sentence is: I didn't mean to be mean when I said that.</p><p>Hence, option (a) is the answer. </p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the correct homonym from the given options to fill in the blank.</p><p>She bought a new ____ of shoes for the party.</p>",
    "options": [
      "Pair",
      "Peer",
      "Pear",
      "Pyre"
    ],
    "correct_option_id": 0,
    "solution": "<p>Among the given options, 'pair' is the best fit because it refers to two items of the same kind, such as shoes, which are typically sold as a pair. </p><p>The complete sentence is: She bought a new <b>pair</b> of shoes for the party.</p><p>Hence, (a) is the correct answer.</p><p>'Peer' refers to a person of the same age, status, or ability.</p><p>'Pear' refers to a type of fruit, which is unrelated to shoes.</p><p>'Pyre' refers to a large pile of burning material, especially for a funeral.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The ______ day is longer than ours, about thirty hours instead of twenty-four, with that divided evenly between day and night.</p>",
    "options": [
      "firstly",
      "standard",
      "lastly",
      "excellence"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, the blank is to be filled by an adjective qualifying the noun 'day'. Options (a) and (c) are negated as these are adverbs and option (d) is negated as it is a noun. 'Standard' satisfies the grammatical condition mentioned above and brings out a meaningfully coherent sentence.</p><p>Hence, (b) is correct.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Sudha has been blessed _______ a son this week.</p>",
    "options": [
      "with",
      "in",
      "on",
      "of"
    ],
    "correct_option_id": 0,
    "solution": "<p>'With' is used to refer to something that is accompanied by, having or possessing. In the given sentence, 'with' has been used in a similar context. Hence, option (a) is the correct answer.</p><p>'In' is used while expressing the situation of something that is or appears to be enclosed or surrounded by something else, while expressing a period of time, and while expressing the length of time.</p><p>'On' is used when something is touching the surface of something.</p><p>'Of' is used while expressing the relationship between a part and a whole, or while expressing the relationship between a scale or measure and a value.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Stick to your routine lest you __________ fail.</p>",
    "options": [
      "might",
      "must",
      "should",
      "would"
    ],
    "correct_option_id": 2,
    "solution": "<p>Among the given options, 'should' fits the blank.</p><p>'Lest' and 'should' are used together in pairs in a sentence.</p><p>For example: Work hard <b>lest</b> you <b>should</b> fail.</p><p>Similarly, in this sentence, 'should' must fit the blank because it must be paired with 'lest'.</p><p>The rest of the options are grammatically incorrect.</p><p>Thus, the correct option is <b>(c) should</b>.</p><p>Thus, the correct sentence should be: Stick to your routine lest you <u>should</u> fail.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The future of communication will _____ shift to private, encrypted services.</p>",
    "options": [
      "Increasingly",
      "Increases",
      "Increasing",
      "Increased"
    ],
    "correct_option_id": 0,
    "solution": "<p>An adverb is needed in the blank. An adverb is a part of speech that provides a greater description of a verb (in this case 'shift'), adjective, another adverb, phrase, clause, or sentence. Among all the options, only 'increasingly' is an adverb and it means to an increasing extent; more and more.</p><p>The complete sentnce is: The future of communication will increasingly shift to private, encrypted services.</p><p>Hence, option (a) is the correct answer.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The ability to impart knowledge and ______ respect is the essential qualification for teachers.</p>",
    "options": [
      "improve",
      "disappearance",
      "worsen",
      "command"
    ],
    "correct_option_id": 3,
    "solution": "<p>A base verb would fit in the blank to follow parallelism with another base verb 'impart' placed before the conjunction 'and'. So, the noun 'disappearance' is eliminated. The sentence intends to convey that giving knowledge and respect is the basic requirement in any teacher. Since, 'respect' can be either given or received so the words 'improve' and worsen' cannot fit in. Thus, 'command(give)' is the correct choice.</p><p>Hence, option (d) is correct.</p><p><b>Note:</b></p><p><b>Parallelism:</b> In grammar, parallelism, also known as parallel structure or parallel construction, is a balance within one or more sentences of similar phrases or clauses that have the same grammatical structure. Given below is an example which shows a sentence in two forms (parallel in structure and lacking parallelism): Lacking parallelism: Prerna likes cooking, dancing and to sing. Parallel: Prerna likes cooking, dancing and singing.</p>",
    "question_index": 15
  },
  {
    "question": "<p>In the question given below, a sentence is given with two blanks, followed by four options, each having two words that may or may not fit in the blanks. From the given options, choose the one that has the correct pair of words to fit in the given blanks.</p><p>I'm very much ____ who will pay an artist ___ a thing that they've made.</p>",
    "options": [
      "somewhat, so",
      "someone, for",
      "sometime, to",
      "somehow, by"
    ],
    "correct_option_id": 1,
    "solution": "<p>The presence of relative pronoun 'who' suggests that there should be a pronoun too in the sentence whom it can refer to, so 'someone' is the pronoun that is apt for the first blank which is referring to the noun 'I'. With this, 'for' would fit in the second blank as it is used to showcase a reason or a cause.</p><p>Hence, option (b) is correct.</p><p><b>NOTE:</b></p><p>Relative pronouns: A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies, or describes, the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank. </p><p>After months of hard work and dedication, she finally <b>________</b> her degree and walked across the stage to receive her diploma.</p>",
    "options": [
      "could be earned",
      "will earn",
      "had earned",
      "earned"
    ],
    "correct_option_id": 3,
    "solution": "<p>The verb in the blank and 'walked' are joined by using 'and'. Here we need to follow parallelism to maintain the structure of the sentence. Since the verb 'walked' is in the simple past tense, 'earned' is the most appropriate choice among the given options. </p><p>Hence, option (d) is the correct answer. </p><p><b>The correct sentence is:</b> After months of hard work and dedication, she finally <b>earned</b> her degree and walked across the stage to receive her diploma.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>A large chunk of lemon crop grown in the country goes _______ to factories.</p>",
    "options": [
      "director",
      "directing",
      "directed",
      "directly"
    ],
    "correct_option_id": 3,
    "solution": "<p>The blank requires an adverb to modify the verb 'goes'. Among the given options, only option (d) 'directly' is an adverb.</p><p>The correct sentence is: A large chunk of lemon crop grown in the country goes directly to factories.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>How you choose to conduct _____ private life is your own business!</p>",
    "options": [
      "Yours",
      "Ours",
      "Our",
      "Your"
    ],
    "correct_option_id": 3,
    "solution": "<p>The possessive pronouns ('yours' and 'ours' in the given statement) are generally not followed by the noun. So, these options are negated.</p><p>Here, a possessive adjective/determiner would fit. The apt possessive determiner to denote the subject 'you' is 'your' ['our' is used for 'we'].</p><p>The complete sentence is: How you choose to conduct <b>your </b>private life is your own business!</p><p>Hence, option (d) is the answer.</p><p><b>Note: Possessive Pronouns: </b>The pronouns mine, yours, hers, his, ours, and theirs are known as possessive pronouns: they refer to something owned by the speaker or by someone or something previously mentioned. For example: The pen is mine.</p><p><b>Possessive Determiners/Adjectives:</b> Words like <b><i>'my', 'our', 'your', 'his', 'her', 'its'</i></b>, and <b><i>'their'</i></b> are known as possessive adjectives (or possessive determiners). They come before nouns and <b>indicate ownership</b> of the noun. <b>Example:</b> \"The teacher asked the students to open <b><i>their</i></b> drawing books.\"</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
