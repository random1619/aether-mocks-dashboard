<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Oliveboard Quiz</title>

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Fill in the blank with the most appropriate word.</p><p>With the cancellation of licence and commencement of liquidation proceedings, the process of paying the _______ of The Karad Janata Sahakari Bank will be set in motion.</p>",
    "options": [
      "loan",
      "amount",
      "dues",
      "depositors"
    ],
    "correct_option_id": 3,
    "solution": "<p>Here, the blank is to be filled by a noun which explains to whom 'The Karad Janata Sahakari Bank' is going to pay. Out of the given options, only 'depositors' satisfies the given condition and brings out a meaningfully coherent sentence.</p><p>Hence, (d) is correct.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Choose the correct option out of the following given options and mark it.</p><p> The White House had sought to halt the book&#8217;s publication, but a judge ___________ its release, saying it was too late for a restraining order. </p>",
    "options": [
      "refused to block",
      "have refused to block",
      "refusing to block",
      "refused to blocking"
    ],
    "correct_option_id": 0,
    "solution": "\"<p> Use &#8216;refused to block&#8217; in the given blank space. The verb &#8216;refused&#8217; should be used here as the sentence talks about the past time. Since, the sentence is in active voice, so the first form &#8216;block&#8217; should be used here after the preposition &#8216;to&#8217;. </p>\"",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>They caught up with the man, and he stopped, ________ at them through thick glasses.</p>",
    "options": [
      "snooping",
      "examining",
      "peering",
      "seeing"
    ],
    "correct_option_id": 2,
    "solution": "<p>Option C is the right answer, as the word 'peering' means to look searchingly and fits most appropriately in the context of the sentence. Option A is eliminated, as the word 'snooping' means to search secretly for something, which does not fit in this context. Option B is eliminated as the word 'examining' is generally not used before a preposition. Option D is eliminated as the word 'seeing' would make the sentence grammatically incorrect, as there should be no preposition after 'seeing'.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The ______ were advised by him to tie up with the institution because they have no resources to validate. </p>",
    "options": [
      "slants",
      "abhorrent",
      "authority",
      "authorities"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence talks about a person's advice on tying up with an institution. The blank requires a noun as it follows the definite article (the), which requires a noun after it. According to this, option (b) is eliminated because 'abhorrent' (inspiring disgust and loathing; repugnant) is an adjective. The noun 'slants' (a sloping position) does not give coherent meaning to the sentence. So, option (a) is also eliminated. Since the helping verb (were) associated with the subject is a plural verb, the subject should be plural. Therefore, the plural noun 'authorities' is the correct choice between the remaining two options. Hence, option (d) is the correct answer. </p><p><b>Note:-</b></p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate word to fill in the blank.</p><p>The king shall _________ the primary fort of the enemies as soon as they let their guard down.</p>",
    "options": [
      "conquered",
      "wrest",
      "meek",
      "relinquish"
    ],
    "correct_option_id": 1,
    "solution": "<p>Among the given options, \"wrest\" fits the context of the sentence. It gives us the idea that as soon as the adversaries let their defences down, the king will <b>seize</b> their primary fort.</p><p><b>Wrest</b>: take (something, especially power or control) after considerable effort or difficulty; seize.</p><p>The word that must fit the blank should be a <b>verb</b> as the king shall do something (in this case, seize the fort of the enemies). 'Meek' is an <b>adjective</b> and thus, it is an incorrect option.</p><p>The use of the modal 'shall' before the blank is used to express the <b>future tense</b>. 'Conquered' is in the <b>past tense</b> and thus, it is an incorrect option.</p><p>'Relinquish' is a contextual misfit as in the sentence. It is said that as soon as the enemies 'let their guard down' and it means that the king wants to seize the fort.</p><p>Thus, the correct option is <b>(b), wrest</b>.</p><p>Thus, the correct sentence should be: The king shall <u>wrest</u> the primary fort of the enemies as soon as they let their guard down.</p><p>Additional Information:</p><p>The respective meanings of the other options are given below in the table:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Word</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Conquered</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">having been overcome and taken control of by military force</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meek</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">quiet, gentle, and easily imposed on</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Relinquish</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">give up</td></tr></table>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>____ the big fight is between Facebook and Twitter, the performance of WhatsApp will be keenly watched.</p>",
    "options": [
      "Just as",
      "Though",
      "If when",
      "Before"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence intends to convey despite the fact that the big fight is between Facebook and Twitter, WhatsApp's performance will be watched. The correct conjunction to be used is 'though'. It is one of the subordinating conjunctions which instead of joining two independent clauses of equal importance, make one clause less important than another. Rest of the conjunctions are also subordinating but their usage varies. 'Just as' is used to connect things on similar theme, 'if when is used to convey condition with time and 'before' is used to convey in advance of the time of some event.</p><p>Hence, option (b) is correct.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank(s).</p><p>France is ________ country but Australia is a continent as well as ______ country.</p>",
    "options": [
      "The, a",
      "No article required, the",
      "The, the",
      "A, a"
    ],
    "correct_option_id": 3,
    "solution": "<p>The noun 'country' is singular in case of both the blanks. Moreover, it is a common noun representing a category. Thus, it will be preceded by the indefinite article 'a', in case of both the blanks. Hence, d) is the correct answer. </p><p>Note: </p><p>Definite and indefinite articles: In English language, we have one definite article 'the'; it refers to, or introduces, a specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Complete the following collocation. </p><p>The colourful advertisement _____ my attention immediately.</p>",
    "options": [
      "Caught",
      "Took",
      "Snatched",
      "Blurred"
    ],
    "correct_option_id": 0,
    "solution": "<p>When something \"catches our attention,\" it means it attracts or captures our focus, and this phrase is frequently used to describe the impact of visuals, such as an advertisement. Hence, (a) is the correct answer. </p><p>The final sentence would be: The colourful advertisement caught my attention immediately. </p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The politician dared not face the burst of rage which this news excited, and _________ from the city.</p>",
    "options": [
      "escape",
      "fled",
      "absent",
      "exited"
    ],
    "correct_option_id": 1,
    "solution": "<p>Escape/ Flee  -  run away from. Exit  -  leave. We need a verb in the simple past tense, as the sentence is in past tense, so A is incorrect as it is in the present tense. C is incorrect as it is an adjective, while we need a verb. D is incorrect as the use of the preposition 'from' is redundant after 'exit'. B is the right answer.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>It is welcome that the Centre has announced a package of measures to _________ investment, employment and exports in this sector.</p>",
    "options": [
      "Boost",
      "Boast",
      "Boasted",
      "Burst"
    ],
    "correct_option_id": 0,
    "solution": "<p>The word 'boast' means to speak excessively for. 'Boasted' is the past form of this verb. Hence, both options are incorrect. 'Burst' means to break open or break apart suddenly and violently. 'Boost' which means give impetus to grow, fits in the sentence and hence, option a) is the correct choice.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>All students should express their ______ views in the group discussion without any fear.</p>",
    "options": [
      "outspoken",
      "guarded",
      "candid",
      "secluded"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Outspoken' means frank in stating one's opinions, especially if they are shocking or controversial. 'Guarded' means secured. 'Candid' means honest/truthful/straight forward. 'Secluded' means not seen or visited by many people; sheltered and private.</p><p>The sentence says that students should present their views fearlessly, so 'candid' is the right word to describe the straightforward and truthful thoughts.</p><p>Hence, option (c) is correct.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>________________ going to take the responsibility for collecting the budget for the college function.</p>",
    "options": [
      "Either my friends nor I are",
      "Neither my friends or I am",
      "Either my friends or I are",
      "Either my friends or I am"
    ],
    "correct_option_id": 3,
    "solution": "<p>- The correct option is <b>(d) Either my friends or I am</b>.</p><p>- <b>Either..or </b>is a correlative conjunction i.e. 'either' and 'or' are used together in sentences.</p><p>- The format of <b>Either..or</b> is: <b>Either+ noun/pronoun + or + the other noun/pronoun. </b>Thus, option (a) and option (b) are incorrect.</p><p>- For example:</p><p>-&gt;You can <b>either</b> take this salary <b>or</b> leave the job.</p><p>- In the case of <b>either..or</b>, always put the <b>verb</b> as per the subject which is <b>closest</b> to it. Thus, option (c) is incorrect.</p><p>- For example:</p><p>-&gt;Either my friends or <b>I am</b> coming to meet you. (In this sentence, the verb 'am' agrees with the subject 'I' because 'I' is closest to the placement of the verb.)</p><p>- Therefore, the correct answer is: <u>Either my friends or I am</u> going to take the responsibility for collecting the budget for the college function.</p><p>Additional Information:</p><p>- In the case of <b>neither..nor</b>, always put the <b>verb</b> as per the subject which is <b>closest</b> to it.</p><p>- For example:</p><p>-&gt;Neither my friends nor I am coming to meet you.</p><p><b>Correlative conjunctions</b> are sort of like tag-team conjunctions. They come in pairs, and you have to use both of them in different places in a sentence to make them work. They get their name from the fact that they work together (co-) and relate one sentence element to another. Correlative conjunctions include pairs such as 'both/and,' 'either/or,' 'neither/nor,' 'not/but' and 'not only/but also.'</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>It is my own fault if _________ am deceived by the same man twice.</p>",
    "options": [
      "she",
      "I",
      "they",
      "we"
    ],
    "correct_option_id": 1,
    "solution": "<p>Since the blank is followed by the verb 'am', only the pronoun 'I' can replace the blank.</p><p>The correct sentence is: It is my own fault if <b>I</b> am deceived by the same man twice.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>In the letter, he was asked to _________ the station.</p>",
    "options": [
      "fall apart",
      "stop by",
      "bring up",
      "pull up"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let's look at the meanings of the given phrases.</p><p>fall apart: to break into pieces/(of a person) lose one's capacity to cope.</p><p>stop by: to visit someone for a short time, usually on the way to another place.</p><p>bring up: look after a child until it is an adult.</p><p>pull up: (of a vehicle) come to a halt.</p><p>Among the given options, only the verb 'stop by' fits correctly in the given sentence which mentions that the person was asked to do something regarding the station.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The tragedies of the past ____ us that hegemony and group politics bring no peace or security.</p>",
    "options": [
      "tells",
      "tell",
      "saying",
      "says"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence conveys that group politics and hegemony do not bring peace. Option (c) is eliminated because it is a present participle verb and a present participle verb requires a helping verb such as \"is/am/are/been\" to precede it. The subject of the sentence is 'tragedies' which is plural in nature. According to subject-verb agreement, we cannot use a singular verb with a plural subject. So, options (a) and (d) are eliminated because those are singular verbs (third person singular). The plural verb 'tell' is the correct choice here. Hence, option (b) is the correct answer.</p><p><b>Note:-</b></p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank(s).</p><p>The stock market <b>_____</b> a significant surge, <b>_____</b> record-breaking highs.</p>",
    "options": [
      "exclusively, attained",
      "culminating, breaching",
      "created, heavily",
      "experienced, reaching"
    ],
    "correct_option_id": 3,
    "solution": "<p>The adverb 'exclusively' doesn't fit in the first position [a verb is needed to complete the clause]. So, option (a) is eliminated. The -ing verb 'culminating' needs a helping verb before it. Since there is no helping verb before the first blank, option (b) is also eliminated. The adverb 'heavily' doesn't fit in the second position [a verb is needed to complete the sentence]. So, option (c) is eliminated. </p><p>Among the given options, option (d) contains the most appropriate combination of words. </p><p>Hence, option (d) is the correct answer. </p><p>The complete sentence is: The stock market experienced a significant surge, reaching record-breaking highs.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>We _________ conform to your demands.</p>",
    "options": [
      "does not",
      "do not",
      "is not",
      "was not"
    ],
    "correct_option_id": 1,
    "solution": "<p>The blank requires an auxiliary verb phrase that supports the action 'conform' with respect to the noun 'demands'. 'Does/is/was not' correspond to a singular subject, but 'we' is a plural pronoun, so they will be negated. Moreover, 'conform' is in the base form of the verb (V1), so options c) and d) cannot be used and are thus negated. 'Do not' [plural verb] is the most appropriate form of the verb that supports the verb 'conform' as required in the sentence.</p><p>Hence, the correct answer is option (b).</p><p>The correct sentence is: We do not conform to your demands.</p><p>Note:</p><p><b>Auxiliary verb:</b> A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. Auxiliary verbs help to form the various tenses, moods, and voices of other verbs. The principal ones are be, do, and have. Example: She will sing a song tomorrow. Here, 'will' is the auxiliary verb that supports the main verb 'sing'.</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p><p><b>Verb phrase: </b>A verb phrase is the verbal part of a clause. A verb phrase has an ordinary verb (come, thought, left, climbing) and may also have an auxiliary verb (had, was, will) Example: She had already thought about the idea before. Here 'thought' is the main verb, 'had' the auxiliary verb and the highlighted part, the verb phrase.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Her voice was barely ___ a whisper but he turned when called upon.</p>",
    "options": [
      "Above",
      "With",
      "By",
      "For"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Above' is used to refer to something higher than. Here, in the given sentence, 'above' has been used in a similar context (slightly higher than the sound of a whisper).</p><p><b>The sentence is:</b> Her voice was barely <b>above</b> a whisper but he turned when called upon.</p><p>Hence, (a) is the correct answer.</p><p>'With' is used to refer to something that is accompanied by, having or possessing.</p><p>'By' is used to identify the agent performing an action or the means of achieving something.</p><p>'For' - We use 'for' to talk about a purpose or a reason for something.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank(s).</p><p>The marquee on ______ closed neighbourhood movie theatre reads, \"See you on the other side; I like reading it every day as I pass by on ______ walk.</p>",
    "options": [
      "My, my",
      "Mine, my",
      "My, mine",
      "Mine, mine"
