    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>The detailed report, which includes comprehensive data from all the regional branches, <u>are now ready for submission</u> to the board of directors for the quarterly review.</p>",
    "options": [
      "is now ready for submission",
      "have now been ready for submission",
      "were now ready for submission",
      "No substitution"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is in subject-verb agreement. The main subject of the sentence is \"The detailed report\", which is singular. The verb must agree with this singular subject. The long phrase \"which includes comprehensive data from all the regional branches\" is an intervening clause and does not change the number of the main subject.</p><p>&#183; <b>Option a) \"is now ready for submission\" is correct.</b> It uses the singular verb \"is\" which correctly agrees with the singular subject \"report\".</p><p>&#183; Option b) \"have now been ready for submission\" is incorrect because the verb \"have\" is plural.</p><p>&#183; Option c) \"were now ready for submission\" is incorrect because the verb \"were\" is plural.</p><p>&#183; Option d) 'No substitution' is incorrect because the original phrase uses the plural verb \"are\".</p><p>So, the correct sentence is: The detailed report, which includes comprehensive data from all the regional branches, <b>is</b> now ready for submission to the board of directors for the quarterly review.</p><p>Hence, option (a) is the correct answer.</p><p><b>Note:</b></p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>My father enjoys ________ to old melodies on his vintage radio.</p>",
    "options": [
      "to listen",
      "listen",
      "listened",
      "listening"
    ],
    "correct_option_id": 3,
    "solution": "<p>The context of the sentence describes an activity that someone likes to do. The blank follows the main verb \"enjoys\". Certain verbs in English, like \"enjoy\", \"avoid\", \"finish\", and \"mind\", are followed by a gerund (a verb ending in -ing).</p><p>The correct option is \"listening\". This is a gerund and is the grammatically correct form to follow the verb \"enjoys\".</p><p>The other options are incorrect verb forms for this structure: \"to listen\" is an infinitive; \"listen\" is the base form; \"listened\" is the past tense form.</p><p>Thus, the complete sentence is: \"My father enjoys <b>listening</b> to old melodies on his vintage radio.\"</p><p>Hence, option (d) is the correct answer.</p><p><b>Note: </b></p><p><b>Gerund:</b> Gerund is a verb form that functions as a noun, ending in -ing. A gerund can be either the subject or object of a sentence in English. Example: \"Everybody enjoyed her dancing and singing at the party.\" The words 'dancing' and 'singing' are gerunds.</p><p><b>Infinitive:</b> The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p>&#183; To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p>&#183; My father likes to cook. [like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p>&#183; To vote in elections is our right. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#183; Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>&#183; The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>The collection of rare stamps</u>, along with the antique coin album, <u>were sold</u> <u>at the auction</u> <u>for a high price</u>.</p>",
    "options": [
      "for a high price",
      "at the auction",
      "The collection of rare stamps",
      "were sold"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error is in the verb 'were'. This is an error of subject-verb agreement. The true subject of the sentence is \"The collection\". The phrase \"of rare stamps, along with the antique coin album\" is a prepositional phrase that modifies the subject but does not change its number. Since the subject \"collection\" is singular, it requires a singular verb. The verb 'were' is a plural verb. The correct singular verb is 'was'.</p><p>The correct sentence is: The collection of rare stamps, along with the antique coin album, <b>was</b> sold at the auction for a high price.</p><p>Hence, option (d) is the correct answer.</p><p><b>Note:</b></p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p><p><b>Prepositional phrase:</b> A modifying phrase consisting of a preposition and its object. Example: The cat was hiding under the table. Here, 'under' is the preposition while 'table' is its object.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p>The security guard at the gate <u>prevented the visitors</u> <u>from enter</u> <u>the restricted area</u> without <u>proper permission</u>.</p>",
    "options": [
      "prevented the visitors",
      "the restricted area",
      "from enter",
      "proper permission"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error lies in the verb form 'enter'. The phrase \"prevent from\" is followed by a gerund (a verb form ending in -ing). The base form 'enter' is incorrect. The correct gerund form is 'entering'.</p><p>The correct sentence is: The security guard at the gate prevented the visitors from <b>entering</b> the restricted area without proper permission.</p><p>Hence, option (c) is the correct answer.</p><p><b>Note:</b></p><p><b>Gerund:</b> Gerund is a verb form that functions as a noun, ending in -ing. A gerund can be either the subject or object of a sentence in English. It often follows prepositions like 'from', 'in', 'on'.</p>",
    "question_index": 3
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>If she would have studied harder, / she would have passed / the difficult final examination.</p>",
    "options": [
      "No error",
      "she would have passed",
      "If she would have studied harder",
      "the difficult final examination"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the 'if' clause. This sentence describes an unreal past condition (a Type 3 conditional). The structure for a Type 3 conditional is: If + past perfect (had + V3), ... would have + past participle (V3). The 'if' clause should not contain 'would have'. The correct structure for the 'if' clause is 'had studied'.</p><p>Correct Sentence: If she had studied harder, she would have passed the difficult final examination.</p><p>Hence, option (c) is the correct answer.</p><p><b>Note:</b></p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>If I <u>was the finance minister of the country</u>, I would implement sweeping tax reforms to encourage investment and boost the national economy for long-term growth.</p>",
    "options": [
      "am the finance minister of the country",
      "had been the finance minister of the country",
      "were the finance minister of the country",
      "No substitution"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the use of the verb in the subjunctive mood. The sentence describes a hypothetical or imaginary situation (the speaker is not the finance minister). In such unreal conditional sentences starting with \"if\", the verb \"to be\" takes the form \"were\" for all subjects, including singular ones like \"I\", \"he\", and \"she\".</p><p>&#183; Option a) \"am the finance minister of the country\" is incorrect because it describes a real situation in the present tense, not a hypothetical one.</p><p>&#183; Option b) \"had been the finance minister of the country\" is incorrect. This form is used for past unreal conditions (Type 3 conditional), referring to something that could have happened in the past but didn't.</p><p>&#183; <b>Option c) \"were the finance minister of the country\" is correct.</b> It uses the proper subjunctive form \"were\" to express a present unreal or hypothetical condition.</p><p>&#183; Option d) 'No substitution' is incorrect because \"was\" is not the correct subjunctive form in this context.</p><p>So, the correct sentence is: If I <b>were</b> the finance minister of the country, I would implement sweeping tax reforms to encourage investment and boost the national economy for long-term growth.</p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The winners of the annual sports meet ________ tomorrow at the ceremony.</p>",
    "options": [
      "announce",
      "are announcing",
      "have announced",
      "will be announced"
    ],
    "correct_option_id": 3,
    "solution": "<p>The context of the sentence is about an action that will happen in the future (\"tomorrow\"). The subject, \"The winners\", cannot perform the action of announcing; the action will be done <i>to</i> them. This requires a passive voice.</p><p>The correct option is \"will be announced\". This is the future passive voice (will be + V3), which correctly indicates that the winners will be the recipients of the announcing action in the future.</p><p>The other options are incorrect: \"announce\" (simple present tense) and \"are announcing\" (present continuous tense) are in the active voice and wrong tense; \"have announced\" (present perfect tense) is in the active voice and the wrong tense.</p><p>Thus, the complete sentence is: \"The winners of the annual sports meet <b>will be announced</b> tomorrow at the ceremony.\"</p><p>Hence, option (d) is the correct answer.</p><p><b>Note: </b></p><p><b>Active and Passive Voice: </b>When the person doing the action is the subject, the sentence is said to be in active form/voice. When the subject is what the action is directed at, then the sentence is said to be in passive form/voice. For example: Active Voice: Rita and her friends performed a skit. Here 'Rita and her friends' (subject) perform the action. Passive Voice: A skit was performed by Rita and her friends. Here 'skit' is the subject (at which the action is directed).</p>",
    "question_index": 6
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>The teacher advised the</u> students <u>to not making a noise</u> as the <u>principal was</u> on her <u>official rounds</u>.</p>",
    "options": [
      "The teacher advised the",
      "principal was",
      "official rounds",
      "to not making a noise"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error is in the verb form 'making'. The verb 'advised' is followed by an infinitive structure (to + base form of the verb). The phrase 'to not making' is incorrect. It should be 'not to make'. The negative 'not' should come before the infinitive 'to make'.</p><p>The correct sentence is: The teacher advised the students <b>not to make</b> a noise as the principal was on her official rounds.</p><p>Hence, option (d) is the correct answer.</p><p><b>Note:</b></p><p><b>Infinitive:</b> The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p>&#183; To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p>&#183; My father likes to cook. [like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p>&#183; To vote in elections is our right. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#183; Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>&#183; The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.</p>",
    "question_index": 7
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>The team of scientists / has discovered a new planet / which can supported life.</p>",
    "options": [
      "which can supported life",
      "The team of scientists",
      "has discovered a new planet",
      "No error"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error lies in the verb form 'supported'. The word 'can' is a modal verb. Modal verbs (like can, should, must, will) are always followed by the base form of the main verb (V1). 'Supported' is the past tense form (V2/V3). The correct base form is 'support'.</p><p>Correct Sentence: The team of scientists has discovered a new planet which can <b>support</b> life.</p><p>Hence, option (a) is the correct answer.</p><p><b>Note: </b></p><p><b>Modal verb:</b> A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 8
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>The strict coach made all the players / to practice for an extra hour / after the disappointing match.</p>",
    "options": [
      "to practice for an extra hour",
      "The strict coach made all the players",
      "No error",
      "after the disappointing match"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is the use of the infinitive 'to practice'. Certain causative verbs like 'make', 'let', and 'have' are followed by an object and then the bare infinitive (the base form of the verb without 'to'). The use of 'to' is incorrect here. The correct form is 'practice'.</p><p>Correct Sentence: The strict coach made all the players <b>practice</b> for an extra hour after the disappointing match.</p><p>Hence, option (a) is the correct answer.</p><p><b>Note:</b></p><p><b>Infinitive:</b> The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p>&#183; To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p>&#183; My father likes to cook. [like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p>&#183; To vote in elections is our right. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#183; Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>&#183; The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>The ancient manuscript, which was discovered by archaeologists in a hidden chamber of the monastery, <u>was wrote in a language</u> that scholars have not yet been able to decipher.</p>",
    "options": [
      "was written in a language",
      "have been written in a language",
      "was written into a language",
      "No substitution"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is in the formation of the passive voice. The passive voice is formed with the appropriate form of the verb \"to be\" + the past participle (the third form or V3) of the main verb. The verb here is \"write\". Its forms are write (V1), wrote (V2), and written (V3). The original sentence incorrectly uses the simple past form \"wrote\" instead of the past participle \"written\".</p><p>&#183; <b>Option a) \"was written in a language\" is correct.</b> It uses the correct past participle \"written\" to form the passive voice correctly.</p><p>&#183; Option b) \"have been written in a language\" is incorrect as the plural verb \"have\" does not agree with singular subject \"ancient manuscript\".</p><p>&#183; Option c) \"was written into a language\" is incorrect because the preposition \"into\" is not appropriate. One writes \"in\" a language.</p><p>&#183; Option d) 'No substitution' is incorrect because \"was wrote\" is an ungrammatical passive construction.</p><p>So, the correct sentence is: The ancient manuscript, which was discovered by archaeologists in a hidden chamber of the monastery, was <b>written</b> in a language that scholars have not yet been able to decipher.</p><p>Hence, option (a) is the correct answer. </p><p><b>Note:</b></p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>High levels of air pollution ________ many health problems in urban areas.</p>",
    "options": [
      "is causing",
      "cause",
      "causes",
      "has caused"
    ],
    "correct_option_id": 1,
    "solution": "<p>The context of the sentence states a general fact about the effect of pollution. The grammatical subject of the sentence is \"levels\" (from \"High levels\"), which is plural. The blank requires a plural verb to agree with the plural subject.</p><p>The correct option is \"cause\". This is the base form of the verb, which is used for plural subjects in the simple present tense.</p><p>The other options are incorrect as they are singular verbs: \"is causing\" (singular), \"causes\" (singular), and \"has caused\" (singular). They do not agree with the plural subject \"levels\".</p><p>Thus, the complete sentence is: \"High levels of air pollution <b>cause</b> many health problems in urban areas.\"</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The historic building ________ by the fire has been completely restored now.</p>",
    "options": [
      "damaging",
      "damaged",
      "was damaging",
      "to damage"

    "correct_option_id": 1,
