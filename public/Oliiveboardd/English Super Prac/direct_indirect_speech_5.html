    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The woman asked the shopkeeper if he could give her some change.</p>",
    "options": [
      "\"Can you give me some change?\" the woman said to the shopkeeper.",
      "\"Would you give me some change?\" the woman said to the shopkeeper.",
      "\"Will you give me some change?\" the woman said to the shopkeeper.",
      "\"Should you give me some change?\" the woman said to the shopkeeper."
    ],
    "correct_option_id": 0,
    "solution": "<p>When converting indirect to direct speech, the modal verb 'could' will change to 'can'. A is the right answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Mohan asked,' Do you live in the hostel, Zoya?'</p>",
    "options": [
      "Mohan asked if Zoya lived in the hostel.",
      "Mohan asked Zoya whether she lived in the hostel.",
      "Mohan asked if Zoya lives in the hostel.",
      "Mohan asked me whether Zoya lived in the hostel."
    ],
    "correct_option_id": 1,
    "solution": "<p>The question is directed to Zoya, not to the reader ('me'), and neither is it a general question. Hence options (a) and (d) are eliminated.</p><p>The verb must be changed from simple present to simple past. ('live' to 'lived'), as the reported verb ('asked') is in past tense.</p><p>When the question doesn't start with a 'wh-' word, the reporting verb is followed by an 'if' or 'whether'.</p><p>Hence, the correct sentence in indirect speech is: Mohan asked Zoya whether she lived in the hostel.</p><p>Therefore, option (b) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Oliver says, \"We are not going downstairs.\" </p>",
    "options": [
      "Oliver says that they were not going downstairs.",
      "Oliver says that they are not going downstairs.",
      "Oliver says that they had not gone downstairs.",
      "Oliver says that they are going downstairs."
    ],
    "correct_option_id": 1,
    "solution": "<p>When the reporting verb is in Present Tense or Future Tense, there is no change in the Indirect Speech.</p><p>For Example:</p><p>Arnab says, \"I want to be the best English teacher in India.\" (Direct Speech)</p><p>Arnab says that he wants to be the best English teacher in India. (Indirect Speech)</p><p>Shubham will say, \"Kaustav is always late.\" (Direct Speech)</p><p>Shubham will say that Kaustav is always late. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; Inverted commas (\"...\") are replaced with 'that'.</p><p>&#183; Pronoun 'we' is changed to 'they'.</p><p>None of the options except (b) follows these rules. Hence, option (b) is the correct answer.</p><p>Therefore, the correct answer is option (b): <b>Oliver says that they are not going downstairs.</b></p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Jim said, \"I will join the office soon\".</p>",
    "options": [
      "Jim said that he will join the office soon.",
      "Jim said that I would join the office soon.",
      "Jim said that he would join the office soon.",
      "Jim said that I will join the office soon."
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence in the Direct Speech is in <b>Future Simple Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Present Conditional Tense</b>.</p><p>Future Simple (Subject + will/shall + V1 + object) should be converted into Present Conditional (Subject + would/should + V1 +object).</p><p>For example:</p><p>He said, \"I will be in Kolkata on Friday.\" (Direct Speech)</p><p>He said that he would be in Kolkata on Friday. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech: 'I' becomes 'he', 'will' becomes 'would', and 'that' gets included.</p><p>Accordingly, the correct form of Indirect speech for the sentence is given in option (c), Jim said that he would join the office soon.</p><p>Hence, the correct answer is option (c).</p><p>Note:</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>Ruchi said that she was going to cast her vote.</p>",
    "options": [
      "Ruchi said to, \"I was going to cast my vote\".",
      "Ruchi said, \"I am going to cast my vote\".",
      "Ruchi said, \"She was going to cast my vote\".",
      "Ruchi said, \"I was going to cast her vote\"."
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence in the Indirect Speech is in <b>Past Continuous Tense</b>. Therefore, the sentence in the Direct Speech will be in <b>Present Continuous Tense</b>.</p><p>Past Continuous (Subject + was/were + V1 + ing + Object) will be converted into Present Continuous (Subject + is/am/are + V1 +ing + Object)</p><p>For example:</p><p>He said that he was checking the assignment. (Indirect Speech)</p><p>He said, \"I am checking the assignment.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>'She was' becomes 'I am', 'her' becomes 'my' and 'that' is removed.</p><p>Accordingly, the option that has the correct Direct speech sentence is (b), Ruchi said, \"I am going to cast my vote\".</p><p>Hence, the correct answer is option (b).</p><p>Note:</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>He said that he was booking a hotel room.</p>",
    "options": [
      "He said, \"I am booking a hotel room.\"",
      "He said, \"He is booking a hotel room.\"",
      "He said, \"I was booking a hotel room.\"",
      "He says, \"I am booking a hotel room.\""
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence in the Indirect Speech is in Past Continuous Tense. Therefore, the sentence in the Direct Speech will be in Present Continuous Tense.</p><p>Past Continuous (Subject + was/were + V1 + ing + Object) will be converted into Present Continuous (Subject + is/am/are + V1 +ing + Object)</p><p>For example:</p><p>He said that he was checking the assignment. (Indirect Speech)</p><p>He said, \"I am checking the assignment.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>He- I </p><p>Was  -  am </p><p>So, the sentence in direct speech is: He said, \"I am booking a hotel room.\"</p><p>Hence, (a) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Raj said to Rajiv, \"Don't justify your mistakes.\"</p>",
    "options": [
      "Raj advised Rajiv not to justify your mistakes.",
      "Raj advised Rajiv not to justified his mistakes.",
      "Raj advised Rajiv don't justify his mistakes.",
      "Raj advised Rajiv not to justify his mistakes."
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Imperative Sentences</b> sometimes begin with Negative Commands like \"Don't\".</p><p>As required, \"Said/ Say\" is changed into \"Asked/ Ask\", \"Told/ Tell\", \"Advised/ Advise\" etc.</p><p>\"Not + To+ Verb\" is used in these sentences. For example, \"don't go\" changes into \"not to go\" in Indirect speech.</p><p>In this context, \"Don't ......\" changes into \"not to ......\".</p><p>For example:</p><p>My friend said to me, \"Don't go to Kolkata\".\" (Direct Speech)</p><p>My friend advised me not to go to Kolkata. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said to</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">advised</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Don't</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">not to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">your</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">his</td></tr></table><p>Therefore, the correct answer is: <b>(d) Raj advised Rajiv not to justify his mistakes.</b></p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>Bindu asked Rekha if Komal was spying on her.</p>",
    "options": [
      "Bindu said to Rekha, \"Komal is spying on you?\"",
      "Bindu said to Rekha, \"Is Komal spying on you?\"",
      "Bindu said to Rekha, \"Was Komal spying on you?\"",
      "Bindu said to Rekha, \"Had Komal been spying on you?\""
    ],
    "correct_option_id": 1,
    "solution": "<p>In the case of sentences like this where the sentence takes an <b>Interrogative form</b> in Direct Speech, \"enquired (of)\", \"wanted to know\", \"asked\", etc. in Indirect Speech is changed into \"said\" in Direct Speech.</p><p>In Direct speech, the <b>verb</b> is always placed <b>before</b> the <b>subject</b>, unlike in Indirect Speech. Thus, option (a) is incorrect.</p><p>If there is a question whose answer can come as \"Yes\" or \"No\", we should use \"If\" or \"Whether\" before the Indirect Speech and \"Is/are/am/was/were\" before the Direct Speech.</p><p>For example:</p><p>Sushma asked me if she was cooking. (Indirect Speech)</p><p>Sushma said to me, \"Is she cooking?\" (Direct Speech)</p><p>The tense of the Indirect Speech is in the <b>Past Continuous Tense</b>. So, the tense in the Direct Speech will be in the <b>Present Continuous Tense</b>.</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">asked.. if</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Komal was spying</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Is Komal spying</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">her</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">you</td></tr></table><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 7
  },
  {
    "question": "<p>  Select the option that expresses the given sentence in reported speech.</p><p>Mary said to me, \"I want to make a complaint about you.\"</p>",
    "options": [
      "Mary tell me that she has wanted to make a complaint about me.",
      "Mary told me that she was wanted to make a complaint about me.",
      "Mary told me that she wanted to make a complaint about me.",
      "Mary told me that she wanted to be made a complaint about me."
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence in the Direct Speech is in Simple Present Tense. Therefore, the sentence in the Indirect Speech should be in Simple Past Tense.</p><p>Simple Present (Subject +V1st + Object) should be converted into Simple Past (Subject +V2 + Object).</p><p>\"That\" is used in place of Inverted Commas while transforming the sentence from Direct Speech to Indirect Speech.</p><p>For example:</p><p>He said, \"I never go to the village.\" (Direct Speech)</p><p>He said that he never went to the village. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The reporting verb 'said to' is changed into 'told'. </p><p>&#183; The pronouns 'I' and 'you' are changed into 'she' and 'me' respectively. </p><p>&#183; The verb 'want' (present simple) is changed into 'wanted' (past simple).</p><p>Therefore, the correct answer is: <b>Mary told me that she wanted to make a complaint about me.</b></p><p>Hence, the answer is option c).</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>Jeremy told me that they didn't mind his working there. </p>",
    "options": [
      "Jeremy asked me, \"They don't mind his working there.\"",
      "Jeremy said to me, \"They didn't mind me working here.\"",
      "Jeremy said to me, \"They don't mind my working here.\"",
      "Jeremy said to me, \"They don't mind me working here.\""
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence in the Indirect Speech is in <b>Simple Past Tense</b>. Therefore, the sentence in the Direct Speech will be in <b>Simple Present Tense</b>.</p><p>Simple Past (Subject + V2 + Object) will be converted into Simple Present (Subject +V1 + Object).</p><p>For example:</p><p>He said that he never went to the village. (Indirect Speech)</p><p>He said, \"I never go to the village.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>&#183; The reporting verb 'told' is changed into 'said to'.</p><p>&#183; 'That' is removed.</p><p>&#183; The verb 'didn't' (simple past) is changed into 'don't' (simple present).</p><p>&#183; The possessive determiner 'his' is changed into 'my'.</p><p>&#183; 'There' is changed into 'here'.</p><p>Therefore, the correct answer is option (c): Jeremy said to me, \"They don't mind my working here.\"</p>",
    "question_index": 9
  },
  {
    "question": "<p>  Select the option that expresses the given sentence in reported speech.</p><p>Jennie asked me, \"Why are you doing this to me?\"</p>",
    "options": [
      "Jennie said to me why I was doing that to her.",
      "Jennie told me why was I doing that to her.",
      "Jennie asked me why I am doing that to her.",
      "Jennie asked me why I was doing that to her."
    ],
    "correct_option_id": 3,
    "solution": "<p>In the case of Interrogative sentences like this, \"said\" in Direct Speech is changed into \"enquired (of)\", \"wanted to know\", \"asked\", etc.</p><p>In Indirect speech, the verb is always placed after the subject, unlike in Direct Speech.</p><p>For example:</p><p>The teacher said to him, \"What is your name?\" (Direct Speech)</p><p>The teacher asked him what his name was. (Indirect Speech)</p><p>'Asked' is already present in the direct speech.</p><p>Also, the sentence in the Direct Speech is in the Present Continuous tense. So, the tense in the Indirect Speech should be in the Past Continuous tense.</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The verb 'are doing' (present continuous) is changed into 'was doing' (past continuous).</p><p>&#183; The pronouns 'you' and 'me' are changed into 'I' and 'her' respectively.</p><p>&#183; 'This' is changed to 'that'.</p><p>Therefore, the correct answer is: <b>Jennie asked me why I was doing that to her.</b></p><p>Hence, the answer is option d).</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>She asked me what my favourite cuisine was.</p>",
    "options": [
      "She said to me, \"What is your favourite cuisine?\"",
      "She said to me, \"What my favourite cuisine is?\"",
      "She said to me, \"What is my favourite cuisine?\"",
      "She said to me, \"What your favourite cuisine was?\""
    ],
    "correct_option_id": 0,
    "solution": "<p>In the case of Interrogative sentences like this, \"enquired (of)\", \"wanted to know\", \"asked\", etc. in Indirect Speech is changed into \"said/to\" in Direct Speech.</p><p>In Direct speech, the verb is always placed before the subject, unlike in Indirect Speech.</p><p>For example:</p><p>The teacher asked him what his name was. (Indirect Speech)</p><p>The teacher said to him, \"What is your name?\" (Direct Speech)</p><p>The tense of the Indirect Speech is in the Past. So, the tense in the Direct Speech will be in the Present.</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>'Asked' changes to 'said to', 'my' changes to 'your' and 'was' changes to 'is'.</p><p>Hence, option (a) is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>He said, &quot; I might visit her in the hospital if time permits.&quot;</p>",
    "options": [
      "He said that he may visit her in the hospital if time permits.",
      "He said that he might visit her in the hospital if time permits.",
      "He said he may visit her in the hospital if time permits.",
      "He says he may visit her in the hospital if time permits."
    ],
    "correct_option_id": 1,
    "solution": "<p>The given sentence is in direct speech. In the indirect speech, the reporting verb (said) will be joined to the reported sentence (I might visit her in the hospital if time permits) by the conjunction 'that'. The modal verb 'might' will not change in the reported speech. 'I' changes to 'he'. Thus, option B is the correct answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>My elder brother said, \"I must learn driving rules.\" </p>",
    "options": [
      "My elder brother said that he had to learn driving rules.",
      "My elder brother said that he must be learning driving rules.",
      "My elder brother said that he should be learning driving rules.",
      "My elder brother said that he would learn driving rules."
    ],
    "correct_option_id": 0,
    "solution": "<p>When \"must\" denotes morality or universality, there isn't any change in the use of \"must\".</p><p>For example:</p><p>The Professor said, \"We must love our country.\"</p><p>The Professor said that we must love our country.</p><p>However, if the use of \"must\" doesn't denote universality or morality, then the tense form changes as per the normal rules.</p><p>For example:</p><p>Rahul said, \"I must go to school at once.\"</p><p>Rahul said that he had to go to school at once.</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; Inverted commas (\"...\") are replaced with 'that'. </p><p>&#183; In the given sentence 'must' doesn't denote universality or morality. So, 'must' will change to 'had to'. </p><p>&#183; The pronoun 'I' changes to 'he'.</p><p>None of the options except (a) follows these rules. Hence, option (a) is the correct answer. </p><p>Therefore, the correct answer is: <b>My elder brother said that he had to learn driving rules.</b></p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>They asked his mother what she was going to serve them at the party.</p>",
    "options": [
      "They asks his mother, \"What are you being going to serve us at the party?\"",
      "They said to his mother, \"What are you going to serve hers at the party?\"",
      "They asked his mother, \"What are you going to serve us at the party?\"",
      "They said to his mother, \"What are you going to serve us at the party?\""
