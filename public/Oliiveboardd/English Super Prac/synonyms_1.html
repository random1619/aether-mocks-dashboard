<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p><b> </b>Select the most appropriate meaning of the given word. </p><p>Terse </p>",
    "options": [
      "Using no unnecessary words",
      "Utterly lacking",
      "Drawn from many sources",
      "Relying on experience"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Terse' means using no necessary words. Hence, (a) is the correct answer. </p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option that means the same as the underlined word in the given sentence.</p><p>His careless remarks about her appearance <u>incensed</u> her beyond measure,  leaving her feeling deeply humiliated and agitated.</p>",
    "options": [
      "Made very shy and embarrassed",
      "Left alone",
      "Put in a pleasant mood",
      "Made enraged"
    ],
    "correct_option_id": 3,
    "solution": "<p>The underlined word 'incensed' means made very angry. Hence, (d) is the correct answer. </p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate synonym of the bracketed word in the following sentence to fill in the blank.</p><p>The _____ (boring) work involves stitching clothes alongside hundreds of other women, making the hours drag on endlessly.</p>",
    "options": [
      "Brisk",
      "Banal",
      "Animated",
      "Persuasive"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most appropriate synonym for the word 'boring' is 'banal'. \"Boring\" refers to something dull, uninteresting, or lacking in excitement. \"Banal\" also means lacking in originality as to be obvious and boring. In the given sentence, both words convey the idea that the work involving stitching clothes alongside hundreds of other women is dull and uninteresting. \"Brisk\" means energetic, quick, or lively. \"Animated\" means lively or full of energy. \"Persuasive\" means able to convince someone to do or believe something through reasoning or argument. Hence, (b) is the correct answer.</p><p><b>The complete sentence is: </b>The banal work involves stitching clothes alongside hundreds of other women.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate synonym of the bracketed word in the following sentence to fill in the blank.</p><p>In today's world, it is _______ (cardinal) to involve young people in decision-making that impacts their lives, as their perspectives are vital for shaping a future that reflects their needs and aspirations.</p>",
    "options": [
      "Maniacal",
      "Screeching",
      "Premier",
      "Insignificant"
    ],
    "correct_option_id": 2,
    "solution": "<p>Cardinal - of the greatest importance; fundamental.</p><p>Premier - first in importance, order, or position; leading.</p><p>So, both words are similar in meaning. Hence, option (c) is the answer.</p><p>Maniacal - exhibiting extremely wild or violent behaviour.</p><p>Screeching - (of a person or animal) giving a loud, harsh, piercing cry.</p><p>Insignificant - unimportant, trifling, or petty.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate synonym of the word 'castigate' in the given sentence and choose the correct option.</p><p>It's not productive to constantly rebuke others for their mistakes without offering constructive feedback, as this only fosters resentment and hinders personal growth.</p>",
    "options": [
      "Rebuke",
      "Productive",
      "Feedback",
      "Constructive"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate synonym of the word 'castigate' in the given sentence is 'rebuke'. The word \"castigate\" means to rebuke or reprimand severely. Accordingly, (a) is correct. 'Productive' means effective in achieving specified results. 'Feedback' is the information about reactions to a product, a person's performance of a task, etc., used as a basis for improvement. 'Constructive' means useful or helpful. Hence, (a) is the correct answer.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate synonym of the word 'blithe' in the given sentence and choose the correct option.</p><p>The comedian's jaunty personality charmed the audience, eliciting laughter and applause, and creating an atmosphere of shared joy and lightheartedness.</p>",
    "options": [
      "Applause",
      "Eliciting",
      "Personality",
      "Jaunty"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate synonym of the word 'blithe' in the given sentence is 'jaunty'. The word \"blithe\" means cheerful and carefree. 'Jaunty' describes someone who is cheerful and full of good humour. 'Applause' refers to the clapping of hands as a demonstration of approval or appreciation. 'Eliciting' means to evoke or draw out (a response, answer, or reaction) from someone. 'Personality' refers to the combination of characteristics or qualities that form an individual's distinctive character. Hence, (d) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate synonym of the underlined word. </p><p>The \"most dangerous snake in the world\" debate is <u>entrenched</u> in technicalities because there are so many species of dangerous snakes that have evolved with specialized weapons and deadly skills. These predators threaten small prey in the wild, as well as occasional unlucky humans who cross their paths.</p>",
    "options": [
      "United",
      "Addicted",
      "Uplifted",
      "Ingrained"
    ],
    "correct_option_id": 3,
    "solution": "<p>Entrenched: establish (an attitude, habit, or belief) so firmly that change is very difficult or unlikely.</p><p>Ingrained: (of a habit, belief, or attitude) firmly fixed or established; difficult to change.</p><p>So, both words are similar in meaning. Hence, option (d) is the answer. </p><p>United: joined together politically, for a common purpose, or by common feelings.</p><p>Addicted: physically and mentally dependent on a particular substance.</p><p>Uplifted: raise the level of; improve.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate synonym of the italicized word in the given sentence.</p><p>NOAA's scale provides a clear <i>framework</i> for understanding the potential impact of these celestial disturbances, enabling better preparation and response to such events.</p>",
    "options": [
      "Skeleton",
      "Distribution",
      "Contribution",
      "Development"
    ],
    "correct_option_id": 0,
    "solution": "<p>Framework: a basic structure underlying a system, concept, or text.</p><p>Skeleton: the arrangement of and relations between the parts or elements of something complex.</p><p>Both words are similar in meaning. Hence, option (a) is the answer.</p><p>Distribution: the action of sharing something among a number of recipients.</p><p>Contribution: a gift or payment to a common fund or collection.</p><p>Development: an event constituting a new stage in a changing situation.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate synonym of the given word from the sentence.</p><p>Grasp</p><p>Researchers studying terrestrial and marine ecosystems could have far more in common than they assimilate, as both fields often address interconnected challenges like climate change and biodiversity loss.</p>",
    "options": [
      "Studying",
      "Marine",
      "Assimilate",
      "Common"
    ],
    "correct_option_id": 2,
    "solution": "<p>Grasp: comprehend fully.</p><p>Assimilate: become fully aware of (something) as a fact; understand clearly.</p><p>So, both words are similar in meaning.</p><p>Hence, option (c) is the answer.</p><p>Studying: look closely in order to observe or read.</p><p>Marine: relating to or found in the sea.</p><p>Common: occurring, found, or done often; prevalent.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate synonym of the given word from the sentence.</p><p>Motive</p><p>But for our stimulus, since we only want to estimate differences, a simple model will do just fine, allowing us to focus on the most relevant variables without overcomplicating the analysis.</p>",
    "options": [
      "Stimulus",
      "Estimate",
      "Differences",
      "Model"
    ],
    "correct_option_id": 0,
    "solution": "<p>Motive: a reason for doing something.</p><p>Stimulus: the reason for which something is done or created or for which something exists.</p><p>So, both words are similar in meaning.</p><p>Hence, option (a) is the answer.</p><p>Estimate: roughly calculate or judge the value, number, quantity, or extent of.</p><p>Differences: point or way in which people or things are dissimilar.</p><p>Model: a thing used as an example to follow or imitate.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate synonym of the boldened word.</p><p>The ambassador gave <b>assent</b> to the new idea.</p>",
    "options": [
      "approval",
      "displeasure",
      "ignore",
      "doubt"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Assent</b>: the expression of agreement; approval.</p><p>It is in context to the ambassador who gave<b> approval</b> to the novel approach.</p><p>Therefore, the correct answer is: <b>(a) approval</b>.</p><p>The meanings of the rest of the options are given below in the table:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Word</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Displeasure</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">annoyance or angry</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Ignore</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">refuse to take notice of or acknowledge</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Doubt</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a feeling of uncertainty or lack of conviction</td></tr></table>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate synonym of the given word.</p><p>Abominable</p>",
    "options": [
      "Delightful",
      "Atrocious",
      "Callow",
      "Apathy"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Abominable' means 'Causing moral revulsion'. Options c) and d) can be rejected as they are unrelated to the word. 'Delightful' means 'Causing delight; charming'. Hence, option a) can also be rejected as it is the exact opposite. 'Callow' means '(of a young person) inexperienced and immature'. 'Apathy' means 'Lack of interest, enthusiasm, or concern'. Hence, option b) is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate synonym of the underlined word.</p><p>Academic achievement and student engagement have improved as a result of the school's <u>innovative</u> approach to teaching and learning.</p>",
    "options": [
      "traditional",
      "creative",
      "boring",
      "outdated"
    ],
    "correct_option_id": 1,
    "solution": "<p>The underlined word is 'innovative', which means new or original. The most appropriate synonym of 'innovative' among the options is 'creative', which means having the ability or power to create or invent something. The other options are not synonyms of 'innovative'. 'Traditional' means following or based on old or established customs or practices, 'boring' means dull or uninteresting, and 'outdated' means old-fashioned or obsolete.</p><p>Hence, option (b) is the correct answer. </p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate synonym of the underlined word.</p><p>It was a <u>trick</u> to persuade him to give her all the money.</p>",
    "options": [
      "Sly",
      "Horrid",
      "Hoax",
      "Feeble"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Trick' means something designed to fool or swindle. 'Hoax' means anything deliberately intended to deceive/a plan to deceive someone; a trick. So, the two words can be used as synonyms for each other. Hence, (c) is the correct answer.</p><p>'Sly' means artfully cunning.</p><p>'Horrid' means rough and rugged.</p><p>'Feeble' means deficient in physical strength.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Identify the pair of synonyms from the underlined words in the given sentence. </p><p>Despite the <u>personal</u> <u>cost</u>, perfectionists believe that treating themselves <u>harshly</u> is <u>necessary</u> because if they let up an inch, they'll never <u>achieve</u> <u>anything</u>, and they'll <u>earn</u> the <u>scorn</u> or disappointment of others.</p>",
    "options": [
      "cost, scorn",
      "harshly, anything",
      "achieve, earn",
      "personal, necessary"
    ],
    "correct_option_id": 2,
    "solution": "<p>Cost- the effort, loss, or sacrifice necessary to achieve or obtain something</p><p>Scorn- a feeling and expression of contempt or disdain for someone or something</p><p>Harshly- in a manner that is unpleasantly rough or jarring to the senses</p><p>Anything- used to refer to a thing, no matter what</p><p>Achieve- successfully bring about or reach (a desired objective or result) by effort, skill, or courage</p><p>Earn- gain deservedly in return for one's behaviour or achievements</p><p>Personal- belonging to or affecting a particular person rather than anyone else</p><p>Necessary- needed to be done, achieved, or present; essential</p><p>Among the underlined words, only 'achieve' and 'earn' are synonymous with each other and so, they are the required pair of synonyms from the underlined words.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate synonym of the given word.</p><p><b>Sedentary</b></p>",
    "options": [
      "Obsolete",
      "Active",
      "Frenetic",
      "Sitting"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Sedentary' means '(Adj) (of a person) tending to spend much time seated'. Options a) and c) can be rejected as they are unrelated to the word. 'Active' means 'Engaging or ready to engage in physically energetic pursuits'. Hence, option b) can also be rejected as it is the exact opposite. 'Obsolete' means 'No longer produced or used; out of date'. 'Frenetic' means 'Fast and energetic in a rather wild and uncontrolled way'. Hence, option d) is the correct answer.</p>",
    "question_index": 15
  },
  {
    "question": "<p><b> </b>Select the denotation of the highlighted word. </p><p>During the heated debate, the protesters grew <b>vociferous</b>, shouting slogans. </p>",
    "options": [
      "Vocal",
      "Shy",
      "Subdued",
      "Splendid"
    ],
    "correct_option_id": 0,
    "solution": "<p>If you describe someone as vociferous, you mean that they speak with great energy and determination, because they want their views to be heard. 'Vocal' means expressing opinions or feelings freely or loudly. So, the two words can be used as synonyms of each other. Hence, (a) is the correct answer. </p><p>Shy- being reserved or having or showing nervousness or timidity in the company of other people. </p><p>Subdued- quiet and rather reflective or depressed. </p><p>Splendid- magnificent; very impressive. </p>",
    "question_index": 16
  },
  {
    "question": "<p>Identify the pair of synonyms from the underlined words in the given sentence. </p><p>The <u>euphoric</u> child <u>gleefully</u> <u>chased</u> <u>bubbles</u>, his <u>joyful</u> <u>laughter</u> filling the air as he <u>embraced</u> the simple <u>pleasures</u> of life.</p>",
    "options": [
      "Embraced, chased",
      "Bubbles, laughter",
      "Gleefully, pleasures",
      "Euphoric, joyful"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Euphoric' means characterized by or feeling intense excitement and happiness. 'Joyful' means feeling, expressing, or causing great pleasure and happiness. So, the two words can be used as synonyms of each other. Hence, (d) is the correct answer.</p><p>Embraced- held (someone) closely in one's arms, especially as a sign of affection. </p><p>Chased- pursued in order to catch or catch up with. </p><p>Bubbles- plural of 'bubble' which means a thin sphere of liquid enclosing air or another gas. </p><p>Laughter- the action or sound of laughing. </p><p>Gleefully- in an exuberantly or triumphantly joyful manner. </p><p>Pleasures- plural of 'pleasure' which means a feeling of happy satisfaction and enjoyment. </p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate synonym of the given word.</p><p>Remorse</p>",
    "options": [
      "Guilt",
      "Confusion",
      "Clarity",
      "Uncertainty"
    ],
    "correct_option_id": 0,
    "solution": "<p>Guilt- a feeling of having committed wrong or failed in an obligation.</p><p>Confusion- uncertainty about what is happening, intended, or required.</p><p>Clarity- the quality of being coherent and intelligible.</p><p>Uncertainty- the state of being uncertain.</p><p>The meaning of the word 'remorse' is 'deep regret or guilt for a wrong committed'. Among the given options, the word that matches the meaning of the given word is option (a), 'guilt'.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the most appropriate SYNONYM to replace the italicised word.</p><p>Senior management favoured a <i>pragmatic</i> approach to the problem.</p>",
    "options": [
      "Short-sighted",
      "Realistic",
      "Idealistic",
      "Far-sighted"
    ],
    "correct_option_id": 1,
    "solution": "<p>Pragmatic- of or relating to a practical point of view or practical considerations.</p><p>Realistic- interested in, concerned with, or based on what is real or practical.</p><p>So, the two words can be used as synonyms. Hence, (b) is the correct answer.</p><p>Short-sighted- unable to see far; near-sighted.</p><p>Idealistic- based on high or noble principles, purposes, goals, etc.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
