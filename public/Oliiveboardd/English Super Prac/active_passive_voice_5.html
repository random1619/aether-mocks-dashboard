    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the correct sentence in passive voice from the following options.</p><p>The book challenges the theological and scientific methodologies.</p>",
    "options": [
      "The theological and scientific methodologies is challenged by the book.",
      "The theological and scientific methodologies were challenged by the book.",
      "The theological and scientific methodologies are challenged by the book.",
      "The theological and scientific methodologies was challenged by the book."
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence is in simple present tense. The subject and the object should be interchanged, and the tense should not change while changing the voice of a sentence. Option C has taken care of all these criteria. Option B and D have changed the tense of the sentence and option A has used the incorrect auxiliary verb 'is' for the plural subject.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the correct sentence in active voice from the following options.</p><p></p>",
    "options": [
      "The car was fixed by the mechanic.",
      "Fixing the car was performed by the mechanic.",
      "The fixing of the car was done by the mechanic.",
      "The mechanic fixed the car."
    ],
    "correct_option_id": 3,
    "solution": "<p>Option (d) is the correct answer. </p><p>The Active voice in this question is in <b>Past Indefinite</b>.</p><p>The format of Active voice is: Subject + V2 + Object.</p><p>In this sentence, the subject \"the mechanic\" is performing the action \"fixed\" on the object \"the car,\" making it an active voice sentence.</p><p>The options except (d) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is option (d): The mechanic fixed the car.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>I remember my mother taking me to the museum.</p>",
    "options": [
      "I remember having been taken to the museum by my mother.",
      "I remembered by my mother to be taken to the museum.",
      "I remember to be taken to the museum by my mother.",
      "I remember being taken to the museum by my mother."
    ],
    "correct_option_id": 3,
    "solution": "<p>Such types of sentences are converted into passive using different patterns. In this case, we use &#8216;being taken&#8217; for &#8216;taking me&#8217; in passive voice. Also, 'by' is introduced in the passive voice before the doer [here 'my mother'] of an action. Option d) will be the correct choice.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the correct sentence in passive voice from the following options. </p><p></p>",
    "options": [
      "The attentive waiter will serve the meal.",
      "The attentive waiter said, \"I will be serving you meals\".",
      "The attentive waiter served the meal.",
      "The meal was served by the attentive waiter."
    ],
    "correct_option_id": 3,
    "solution": "<p>(a) - This sentence is in active voice. The subject (attentive waiter) will perform the action (will serve).</p><p>(b) - This sentence is in active voice as well. The subject (attentive waiter) spoke and will be performing the action (will be serving).</p><p>(c) - This sentence is in active voice. The subject (attentive waiter) performed the action (served).</p><p>(d) - This sentence is in passive voice. The focus is on the meal (the receiver of the action), and the doer of the action (attentive waiter) is mentioned with the preposition \"by.\"</p><p>In passive voice constructions, the typical pattern is: Object + a form of \"to be\" + past participle ('served' in this case) + by + the doer of the action (optional). Option (d) fits this pattern, making it the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>The surroundings amazed me while we were travelling.</p>",
    "options": [
      "I was amazed with the surroundings while we were travelling.",
      "I was amazed at the surroundings while we were travelling.",
      "I have been amazed by the surroundings while we were travelling.",
      "I was amazed at the surrounding while we were travelling."
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183;The correct answer is<b>(b) I was amazed at the surroundings while we were travelling.</b></p><p>&#183;The <b>subject</b> of the Active Voice is changed into the <b>object</b> of the Passive Voice. Also, the <b>object</b> of the Active Voice is changed into the <b>subject</b> of the Passive Voice.</p><p>&#183;The usage of a <b>helping verb</b> is necessary while changing the voice of the sentence from Active to Passive.</p><p>&#183;The sentence is in <b>Simple Past</b> in the Active Voice. Thus, in the Passive voice, the sentence will be in <b>Simple Past</b>.</p><p>&#183;The format of Active voice is:<b>Subject + V2 + Object.</b></p><p>&#183;Thus, in Passive voice, the format will be:<b>Subject (Objective case) + was/were + V3 + by + Object (Subjective Case).</b></p><p>&#183;Certain verbs<b>don't</b> agree with the preposition <b>\"by\"</b> in Passive form.</p><p>&#183;They take the preposition which is appropriate to them.</p><p>&#183;Some of the verbs along with the prepositions are given in the table below:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Verb</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Preposition</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Known</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Surprised</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">at</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Amazed</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">at</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Annoyed (somebody)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">with</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Annoyed (something)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">at</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Included</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">in</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Moved</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">by</td></tr></table><p>&#183;For example:</p><p>o She annoyed me. (Active)</p><p>o I was annoyed with her. (Passive)</p><p>&#183;The options except <b>(b)</b> don't follow the correct grammatical format of the Passive Voice.</p><p>&#183;Therefore, the correct answer is:<b>I was amazed at the surroundings while we were travelling.</b></p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>I have to crack SSC CGL this year.</p>",
    "options": [
      "This year, I have to crack SSC CGL.",
      "SSC CGL have to be cracked by me this year.",
      "SSC CGL has to be cracked by me this year.",
      "SSC CGL will have to be cracked by me this year."
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183;The correct answer is <b>(c) SSC CGL has to be cracked by me this year.</b></p><p>&#183;The <b>subject</b> of the Active Voice is changed into the <b>object </b>of the Passive Voice. Also, the <b>object</b> of the Active Voice is changed into the <b>subject</b> of the Passive Voice.</p><p>&#183;The usage of a <b>helping verb</b> is necessary while changing the voice of the sentence from Active to Passive.</p><p>&#183;The preposition <b>\"by\"</b> is used before the object made in Passive Voice. However, it is optional in some cases.</p><p>&#183;The question in Active voice is in <b>Infinitive form.</b></p><p>&#183;Infinitive sentence is: <b>To + V1 form.</b></p><p>&#183;The format in Active voice is: Subject + am/is/are/was/were + to + V1 + object</p><p>&#183;Thus, the format in Passive voice will be: Object of the active voice (Subjective case) + am/is/are/was/were + to + be + V3 + by + Subject of the active voice (Objective case).</p><p>&#183;For example:</p><p>o I have to lend some books. (Active)</p><p>o Some books have to be lent by me. (Passive)</p><p>Option (b) is incorrect as the plural verb \"have\" cannot be used for the singular noun \"SSC CGL\".</p><p>&#183;The options except <b>(c)</b> don't follow the correct grammatical format of the Passive Voice.</p><p>&#183;Therefore, the correct answer is: <b>SSC CGL has to be cracked by me this year.</b></p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>Why was Shekhar not taken seriously by any of the team members?</p>",
    "options": [
      "Why do any of the team members not take Shekhar seriously?",
      "Why didn't any of the team members take Shekhar seriously?",
      "Why will any of the team members not take Shekhar seriously?",
      "Why does any of the team members not take Shekhar Kapoor seriously?"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#8226;The above sentence is an interrogative sentence starting with a question word (why, when, how, where, etc.).</p><p>The subject and object of the passive sentence should become the object and subject of the active sentence respectively.</p><p>While making the sentence active, we need to put the suitable helping verb after the question word according to the new subject.</p><p>Use the correct form of the main verb according to the tense instead of the past participle.</p><p>Remove preposition &#8216;by&#8217;.</p><p>&#8226;Use the following syntax for the above sentence-</p><p>Passive voice- Question word + was/were + subject + not + V3 + by + object + other + ?</p><p>Active voice - Question word + did not + new subject + V3 + new object + other + ?</p><p>Hence, the correct active voice form is 'Why didn't any of the team members take Shekhar seriously?'</p><p>Hence, option b) is correct.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>Were arms taken up by the country?</p>",
    "options": [
      "Do the country take up arms?",
      "Did the country take up arms?",
      "Had the country taken up arms?",
      "The country was taking up arms."
    ],
    "correct_option_id": 1,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the preposition 'by' is necessary while changing the voice of the sentence from Passive to Active.</p><p>In Active voice (look at the options), it should be an <b>interrogative sentence</b>. The answer to this question will be either \"yes\" or \"no\".</p><p>These types of sentences usually begin with a helping verb like \"Did\".</p><p>In Passive voice, the format is: <b>Was/Were + Subject (Objective case) + V3 + by + Object (Subjective case)?</b></p><p>Therefore, the format of the sentence which begins with \"Did\" in Active voice is: <b>Did + Subject + V1 + Object?</b></p><p>For example:</p><p>Were you beaten by him? (Passive)</p><p>Did he beat you? (Active)</p><p>The options except (b) don't follow the correct grammatical format of the Active Voice.</p><p>Thus, the correct answer is: <b>(b) Did the country take up arms?</b></p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>Do you need motivation to work out?</p>",
    "options": [
      "Are motivation needed by you to work out?",
      "Is motivation needed by you to work out?",
      "Does working out need motivation?",
      "Is there a need for motivation to work out?"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The <b>subject</b> of the Active Voice is changed into <b>object</b> of the Passive voice. Also, the <b>object</b> of the Active Voice is changed into <b>subject</b> of the Passive Voice.</p><p>&#183; Preposition <b>\"by\"</b> is used before the object made in Passive Voice. However, it is optional in some cases.</p><p>&#183; The question in Active voice is an <b>interrogative sentence</b>. The answer to this question will be <b>either \"yes\" or \"no\".</b></p><p>&#183; The format of the sentence which begins with \"Do\" or \"Does\" in Active voice is: <b>Do/ Does + Subject + V1 + Object?</b></p><p>&#183; Therefore, in Passive voice, the format will be: <b>Am/Is/Are + Subject (Objective case) + V3 + by + Object (Subjective case).</b></p><p>&#183; For example:</p><p>o Does he need therapy? (Active)</p><p>o Is therapy needed by him? (Passive)</p><p>&#183; The options except <b>(b)</b> don't follow the correct grammatical format of the Passive Voice.</p><p>&#183; Thus, the correct answer is: <b>Is motivation needed by you to work out?</b></p><p>V1 -&gt; Base form/simple form of verb, V2 -&gt; Past form of verb (-ed form or irregular verb), V3 -&gt; Past participle form of verb (-ed, -d, -t, -en, or -n), V4 -&gt; Continuous form of verb / Present participle form of verb (-ing form), V5 -&gt; Third person singular (V1+ -es or -s)</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the correct sentence in passive voice from the following options. </p><p></p>",
    "options": [
      "His friends invited themselves to the surprise birthday party.",
      "I said to him, \"I will invite all your friends to the surprise birthday party\".",
      "I invited his friends to the surprise birthday party.",
      "His friends were invited to the surprise birthday party by me."
    ],
    "correct_option_id": 3,
    "solution": "<p>(a) - This sentence is in active voice. The subject (friends) performed the action (invited themselves).</p><p>(b) - This sentence is in active voice. The subject (I) will perform the action (will invite).</p><p>(c) - This sentence is in active voice. The subject (I) performed the action (invited).</p><p>(d) - This sentence is in passive voice. The focus is on the friends (the receiver of the action), and the doer of the action (me) is mentioned with the preposition \"by.\" This option fits the passive voice construction: Object + a form of \"to be\" + past participle (invited) + by + the doer of the action (optional).</p><p>Therefore, option (d) is the correct answer in passive voice.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>Who taught you to play the keyboard this smoothly?</p>",
    "options": [
      "By whom were you taught to play the keyboard this smoothly?",
      "Whom were you taught to play the keyboard this smoothly?",
      "You taught by whom to play the keyboard this smoothly?",
      "By whom you taught to play the keyboard this smoothly?"
    ],
    "correct_option_id": 0,
    "solution": "<p>The subject of the Active voice is changed into the object of the Passive voice. The object of the Active voice is changed into the subject of the Passive voice. The usage of a 'to be' form of the verb ['were' here] is necessary while changing the voice of the sentence from Active to Passive.</p><p>The preposition \"by\" is used before the object made in passive voice.</p><p>The question in Active voice is in Interrogative form. This is \"wh\" question that doesn't take yes or no as the answer.</p><p>'Who' is changed into 'by whom'.</p><p>For example:</p><p>Who taught you Science? (Active voice)</p><p>By whom were you taught Science? (Passive voice)</p><p>Hence, (a) is the correct answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>She had been chosen by me, for her very graceful style of dancing.</p>",
    "options": [
      "I had chosen for her very graceful style of dancing.",
      "I had chosen herself for her very graceful style of dancing.",
      "I had chosen she for her very graceful style of dancing.",
      "I had chosen her for her very graceful style of dancing."
    ],
    "correct_option_id": 3,
    "solution": "<p>Option D is the right answer. Option A is eliminated as it fails to specify who had been chosen, while the original sentence clearly does so. Option B is eliminated as it uses the reflexive pronoun 'herself', which should only be used when the speaker is talking about himself/herself, not the third person. Option C is eliminated as it is grammatically incorrect, the pronoun 'her' must be used here, as it forms the object of the verb (the person to whom the action is done) and not the subject 'she'.</p><p>Note:</p><p>Reflexive pronouns are words like myself, yourself, himself, herself, itself, ourselves, yourselves and themselves. They refer back to a person or thing. We often use reflexive pronouns when the subject and the object of a verb are the same.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>He had tasted the food before she came.</p>",
    "options": [
      "The food was tasted by him before she comes.",
      "The food has been tasted by him before she came.",
      "The food had been tasted by him before she came.",
      "The food tasted by him before she had come."
    ],
    "correct_option_id": 2,
    "solution": "<p>The subject of active voice becomes the object in passive voice and vice-versa. The given sentence in active voice is in past perfect tense. So, the one in passive voice should also be in past perfect tense. In passive voice, we use &#8220;Object+ had + been + V3 + by + Subject&#8221;.</p><p>So, the correct sentence in passive voice becomes: 'The food had been tasted by him before she came'.</p><p>Hence, option c) is correct.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>My pen has been stolen.</p>",
    "options": [
      "The pen I had has been stolen",
      "Somebody have stolen my pen.",
      "My pen had been stolen.",
      "Somebody has stolen my pen."
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183;The correct answer is<b>(d) Somebody has stolen my pen.</b></p><p>&#183;The <b>subject</b> of the Passive Voice is changed into the <b>object</b> of the Active Voice. Also, the <b>object</b> of the Passive Voice is changed into the <b>subject</b> of the Active Voice.</p><p>&#183;The removal of the <b>helping verb</b> is necessary while changing the voice of the sentence from Passive to Active.</p><p>&#183;In Active voice, the introduction of <b>\"Somebody\"</b> is necessary for these types of sentences.</p><p>&#183;For example:</p><p>o I have been robbed. (Passive)</p><p>o Somebody has robbed me. (Active)</p><p>&#183;\"Somebody\" is always followed by a singular verb. Thus, option (b) is incorrect as \"has\" will replace \"have\".</p><p>&#183;The options except <b>(d)</b> don't follow the correct grammatical format of the Active Voice.</p><p>&#183;Therefore, the correct answer is:<b> Somebody has stolen my pen.</b></p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>The passport verification was being conducted by the local police station.</p>",
    "options": [
      "The local police station has been conducting the passport verification.",
      "The local police station was conducting the passport verification.",
      "The local police station is conducting the passport verification.",
      "The local police station will be conducting the passport verification."
    ],
    "correct_option_id": 1,
    "solution": "<p>The changes that happen while converting Passive voice to Active voice sentence are: the Subject in the Passive voice becomes the Object in the Active voice and the Object in the Passive voice will become the Subject in the Active voice.</p><p>The helping verb ['being' here] and the preposition 'by' should be removed while changing from Passive voice to Active voice.</p><p>The tense of the sentence in Passive voice remains the same in the Active voice too. In this Passive voice sentence, the tense is Past Continuous tense.</p><p>The Passive voice format is Object of the Active voice (Subjective case) + was/were + being + V3 + by + Subject of the Active voice (Objective case).</p><p>The Active voice format is Subject + was/were + Verb (ing) + Object.</p><p>For example:</p><p>The weights were being lifted by him. (Passive voice)</p><p>He was lifting the weights. (Active voice)</p><p>From the given options, the one that follows the above mentioned changes is option (b), \"The local police station was conducting the passport verification\".</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>The state GST funds shall be released by the Finance minister.</p>",
