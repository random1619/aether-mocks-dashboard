<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>His family lives __ Mahu in Madhya Pradesh.</p>",
    "options": [
      "of",
      "by",
      "at",
      "on"
    ],
    "correct_option_id": 2,
    "solution": "<p>The blank requires a preposition to indicate the location where \"his family lives.\" The place name is \"Mahu in Madhya Pradesh,\" and the preposition must correctly describe residence in a specific place.</p><p>In English, \"at\" is used for specific locations or smaller places (e.g., \"lives at [village/town]\").</p><p>\"Mahu\" is likely a small town or village, making \"at\" appropriate.</p><p>Checking the options:</p><p>Option 1: \"of\" is incorrect for indicating location.</p><p>Option 2: \"by\" suggests proximity (e.g., near Mahu), not residence.</p><p>Option 3: \"at\" correctly indicates living in a specific place.</p><p>Option 4: \"on\" is used for surfaces or larger areas, not specific towns.</p><p>The completed sentence is: \"His family lives at Mahu in Madhya Pradesh.\"</p><p>Thus, option 3 is correct.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Rohan is _______ self-sufficient man who needs no assistance.</p>",
    "options": [
      "in",
      "a",
      "the",
      "of"
    ],
    "correct_option_id": 1,
    "solution": "<p>The blank will be filled with the indefinite article 'a' as the sentence mentions the singular subject 'Rohan' to be self-sufficient.</p><p>The definite article 'the' is not used before the adjectives unless we use it with adjectives like rich, poor, elderly, and unemployed to talk about groups of people.</p><p>In ('used to indicate location or position within or inside something') does not fit in contextually as no location or position is mentioned in the sentence.</p><p>Of ('expresses the relationship between a part and a whole') renders the sentence meaningless contextually.</p><p>Hence, option (b) is the answer.</p><p><b>The correct sentence is:</b> Rohan is <b>a</b> self-sufficient man who needs no assistance.</p><p><b>Note: </b><b>Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option fill in the blank.</p><p>I have been studying this course ______ two years now.</p>",
    "options": [
      "through",
      "since",
      "for",
      "almost"
    ],
    "correct_option_id": 2,
    "solution": "<p>Through - from one end or side of something to the other.</p><p>Since - used to refer to a point of time (an action that begun in the past and is still continuing)</p><p>For - used to show a period of time, in the past, present or future.</p><p>Almost - We use almost to refer to the progress of things, especially if we are measuring and counting things.</p><p>The given sentence mentions that it has been two years now that the subject has been studying the course. Because a period of time is mentioned, we would use the preposition 'for' (and not 'since').</p><p>Other options render the sentence meaningless.</p><p><b>The correct sentence is: </b>I have been studying this course <b>for</b> two years now.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate word to fill in the blank.</p><p>We respect you but we don't agree _______ your ideas.</p>",
    "options": [
      "for",
      "with",
      "by",
      "to"
    ],
    "correct_option_id": 1,
    "solution": "<p>The completed sentence would be: \"We respect you but we don't agree with your ideas.\"</p><p>\"Agree with\" is the correct phrase to use when expressing alignment or conformity with someone's ideas or opinions.</p><p>Hence, option (b) is correct.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate words to fill in the blanks.</p><p>Today computer viruses spread _______ a dizzying speed ______ way of file downloads.</p>",
    "options": [
      "by; by",
      "in; from",
      "at; from",
      "at; by"
    ],
    "correct_option_id": 3,
    "solution": "<p>\"At a dizzying speed\" describes how quickly the computer viruses spread.</p><p>\"By way of file downloads\": This part explains the method or mechanism through which the computer viruses spread. \"By way of\" means using or through. So, the sentence states that the viruses spread using file downloads as the method.</p><p>The corrected sentence would then be: \"Today computer viruses spread at a dizzying speed by way of file downloads.\"</p><p>Hence, option (d) is correct.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Fill in the blank with the most appropriate word.</p><p>Eggs are sold ______ the dozen.</p>",
    "options": [
      "at",
      "to",
      "by",
      "in"
    ],
    "correct_option_id": 2,
    "solution": "<p>We use <i>by</i> to talk about measurements and increases and decreases in amounts. Here, the sentence talks about the amount/number of eggs. So, 'by' is an apt word for the blank here. </p><p>The complete sentence is: Eggs are sold by the dozen.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Fill in the blank with the most appropriate word.</p><p>The fan was directly<u>___________ </u>my head.</p>",
    "options": [
      "below",
      "at",
      "on",
      "over"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate word to fill in the blank is 'over'. 'Over' means above in place or position. In the context of the sentence, it indicates the spatial relationship between the fan and the person's head, suggesting that the fan is positioned directly above the person's head. Other prepositions are not correct for the given context. 'Below' indicates a lower position or level compared to something else. \"At\" is used to specify a particular place or location. 'On' suggests contact or attachment to the surface of the head, rather than being positioned directly above it. Hence, (d) is the correct answer. </p><p>The complete sentence is: The fan was directly over my head.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>My grandparents live in a beautiful house ___ the countryside.</p>",
    "options": [
      "in",
      "on",
      "onto",
      "at"
    ],
    "correct_option_id": 0,
    "solution": "<p>The preposition \"in\" is used for general areas like \"the countryside.\" \"On\" is for surfaces, \"onto\" indicates movement, and \"at\" is for specific points, making \"in\" the correct choice.</p><p><b>The complete sentence is- \"My grandparents live in a beautiful house in the countryside.\"</b></p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The way she elaborated on every detail with precision impressed everyone _______ the meeting.</p>",
    "options": [
      "Off",
      "Above",
      "At",
      "into"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence requires a preposition that fits the context of impressing people during the meeting.</p><p>Option 1(\"off\") is incorrect, as it does not imply presence or context of the meeting.</p><p>Option 2 (\"above\") is incorrect, as it suggests superiority or position, not fitting the context.</p><p>Option 3 (\"at\") is correct, as \"at the meeting\" is the standard preposition for events or gatherings.</p><p>Option 4 (\"into\") suggests movement or transformation, which is inappropriate.</p><p>Thus, \"at\" is the most appropriate preposition.</p>",
    "question_index": 8
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Select the segment that contains a grammatical error from the given options.</p><p>I am going / to home / soon after the / programme gets over.</p>",
    "options": [
      "To home",
      "Soon after the",
      "I am going",
      "Programme gets over"
    ],
    "correct_option_id": 0,
    "solution": "<p>With adverbs of place, we don't need the preposition (to/from/at/in, etc). We do not use prepositions before nouns when they are used as adverbs.</p><p>'Home', as an adverb, means 'to or at the place where one lives'.</p><p>In the given sentence, 'home' denotes the same meaning.</p><p>So, <b>the correct sentence is: </b>I am <b>going home</b> soon after the programme gets over.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>A visit <u>in</u> Ladhak is a must these days.</p>",
    "options": [
      "from",
      "to",
      "for",
      "at"
    ],
    "correct_option_id": 1,
    "solution": "<p>We can use 'to' as a preposition to indicate a destination or direction. Here, 'Ladhak' is a destination.</p><p>So, the preposition 'to' (instead of 'in') should have been used here.</p><p><b>The correct sentence is: </b>A visit <b>to </b>Ladhak is a must these days.</p><p><b>Hence, option (b) is the answer.</b></p><p><b>Note: </b>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>.</p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Identify the segment in the sentence which contains a grammatical error.</p><p>She has been working tirelessly since hours.</p>",
    "options": [
      "been working",
      "She has",
      "since hours",
      "tirelessly"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Since' is used to denote the point in time. But here, instead of a point in time, a period of time is mentioned for which we use the preposition 'for'. </p><p>The correct sentence is: She has been working tirelessly for hours.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>My friends are on a trip <u>to the world.</u></p>",
    "options": [
      "within the world",
      "around the world",
      "by the world",
      "in the world"
    ],
    "correct_option_id": 1,
    "solution": "<p>The phrase \"around the world\" is the correct idiom for a global trip.</p><p>Within the world: Implies inside, not travel.</p><p>By the world: Incorrect preposition.</p><p>In the world: Too vague, not specific to travel.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined word in the given sentence.</p><p>The culprit had been shot <u>from</u> the back by the police inspector.</p>",
    "options": [
      "by",
      "off",
      "in",
      "to"
    ],
    "correct_option_id": 2,
    "solution": "<p>The phrase \"shot from the back\" is awkward and not idiomatic in English. The standard preposition for indicating the part of the body where someone is shot is \"in\" (e.g., \"shot in the back\"). In: Correctly indicates the location on the body where the shot occurred (e.g., \"shot in the back\"). It is the standard preposition in this context.</p><p>By: Already used in the sentence to indicate the agent (police inspector) and would be redundant or confusing if used again. Negated as it does not fit the context of location.</p><p>Off: Implies removal or separation (e.g., \"fell off the cliff\"), which is inappropriate for describing a gunshot wound. Negated as it is not idiomatic.</p><p>To: Suggests direction or destination (e.g., \"walked to the park\"), not a specific location on the body. Negated as it does not convey the intended meaning.</p><p>Corrected Sentence: The culprit had been shot in the back by the police inspector.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 13
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that has a grammatical error.</p><p>The thieves had no alternative / but to acquiesce with / the orders of / the police.</p>",
    "options": [
      "the police",
      "the orders of",
      "The thieves had no alternative",
      "but to acquiesce with"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error lies in the segment \"but to acquiesce with.\" The verb \"acquiesce\" is followed by the preposition \"to\" in standard English (e.g., \"acquiesce to demands\"), not \"with.\" The correct segment should be \"but to acquiesce to.\"</p><p>The correct sentence is: The thieves had no alternative but to acquiesce to the orders of the police.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 14
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>I had walked / for most of the day / to Kanpur and then / get on the train by Mumbai.</p>",
    "options": [
      "I had walked",
      "To Kanpur and then",
      "Get on the train by Mumbai",
      "For most of the day"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence contains a prepositional error. The phrase 'get on the train by Mumbai' is incorrect.</p><p>The sentence talks about the journey to someplace. We cannot use the preposition 'by' before the destination. The preposition 'to' can be used to indicate the destination of the journey. For example: Let's all go to the cinema tonight!</p><p>We can use 'by' to indicate the mode of transport. For example: We went to Pisa by train.</p><p>Also, since the sentence denotes two actions done in past, one after another, 'get' should be replaced with the past tense form 'got'.</p><p>The correct sentence is- 'I had walked for most of the day to Kanpur and then got on the train to Mumbai.'</p><p>Hence, option (c) is the correct answer.</p><p><b>Note:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>.</p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the sentence with the appropriate use of preposition.</p>",
    "options": [
      "Are you interested along with modern art?",
      "Are you interested into modern art?",
      "Are you interested with modern art?",
      "Are you interested in modern art?"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option (d) is the correct answer.</p><p>The preposition 'in' is used with the word 'interested'. 'Interested in' is used when what comes after it is a noun, or a verb acting like a noun (known as a gerund).</p><p>For example: He's very interested in nuclear physics.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the word segment that substitutes (replaces) the bracketed word segment correctly and completes the sentence meaningfully.</p><p>The percentage of employees who called in sick and the number of employees who left their jobs within 2 years (were reflective of the level of job satisfaction).</p>",
    "options": [
      "are reflective of the level of job satisfaction",
      "is reflective of the level of job satisfaction",
      "has reflected the level of job satisfaction",
      "were reflective on the level of job satisfaction"
    ],
    "correct_option_id": 0,
    "solution": "<p>Certain words are used with only certain prepositions. The preposition 'of' is used with the word 'reflective'. If something is reflective of a particular situation or attitude, it is typical of that situation or attitude, or is a consequence of it. So, options (c) and (d) are incorrect.</p><p>When two subjects are joined using 'and', the verb should be plural. So, we cannot use the singular verb 'is' in the given sentence. So, option (b) is also incorrect.</p><p>Among the given options, the phrase in option (a) is the correct choice.</p><p>Hence, option (a) is the correct answer.</p><p><b>Note:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>.</p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 17
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>There is a whole world / out there that / is invisible from / the naked eye.</p>",
    "options": [
      "the naked eye",
      "is invisible from",
      "There is a whole world",
      "out there that"
    ],
    "correct_option_id": 1,
    "solution": "<p>'From' implies that the naked eyes are the source of invisibility which is not what the sentence implies.</p><p>Replacing 'from' with 'to' gives the meaning that for the naked eyes, there is a whole world out there that they cannot see. This is meaningful.</p><p>The correct sentence is: There is a whole world out there that is invisible to the naked eye.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 18
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The company specialises at / designing, crafting and manufacturing / exquisite, high-quality furniture / of exceptional craftsmanship.</p>",
    "options": [
      "The company specialises at",
      "Designing, crafting and manufacturing",
      "Exquisite, high-quality furniture",
      "Of exceptional craftsmanship"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The correct preposition after \"specialises\" is \"in\", not \"at\".</p><p>&#183; The correct phrase should be:</p><p>\"The company specialises in designing, crafting and manufacturing exquisite, high-quality furniture of exceptional craftsmanship.\"</p><p>Thus, option 1 (\"specialises at\") is the incorrect segment.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
