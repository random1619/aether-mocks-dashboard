        const questions = [
  {
    "question": "<p>For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given below. From the options P, Q, R and S, select the appropriate sentence for S2 and S3, respectively.</p><p></p><p>(S1) Once upon a time, there was a mother named Maria who lived in a small village with her two children, John, and Emily.</p><p>(S2)</p><p>(S3)</p><p>(S4) Despite the challenges she faced, Maria was a loving and devoted mother who always put her children's needs before her own.</p><p>(P) They knew that they owed everything they had achieved in life to their mother's hard work and dedication.</p><p>(Q) With the help of her children, Maria was able to recover from her illness and return to work.</p><p>(R) Maria was a single mother, as her husband had passed away several years ago, and she had been left to raise her children alone.</p><p>(S) She encouraged her children to study hard and do well in school, as she knew that education was their ticket to a better life, John and Emily loved their mother dearly and appreciated all that she did for them.</p>",
    "options": [
      "P, S",
      "S, P",
      "R, S",
      "Q, P"
    ],
    "correct_option_id": 2,
    "solution": "<p>The first sentence talks about a woman (Maria) and her family, more about 'Maria' is mentioned in 'R' (she was a single mother and raised her children alone), so it will be the second sentence of the paragraph and how she raised her children (by encouraging her children to study) is mentioned in sentence 'S'. Therefore, the correct order is R and S.</p><p>Hence, option (c) is correct. </p>",
    "question_index": 0
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. But there's also a powerful psychological effect of seeing your peers leave, which can motivate you to start wondering if the grass is greener on their side.</p><p>B. Mass departure  -  which management experts dub 'turnover contagion'  -  is common and can involve multiple employees independently reacting to the same change in personnel in the policy.</p><p>C. So, especially in today's uncertain labour market, good managers should be strengthening employee retention and recruitment, to avoid being left captaining a ship without a crew.</p><p>D. The strength of turnover contagion depends on which employees leave, and the kind of circumstances they leave under.</p>",
    "options": [
      "CADB",
      "BADC",
      "DACB",
      "CDAB"
    ],
    "correct_option_id": 1,
    "solution": "<p>A mandatory pair BA would be formed because the concept of 'mass departure' is introduced but B and A reflect the psychological effect behind the concept of mass departure rather than what it actually is. Clearly, D and C are about the concept of mass departure so both D and C would follow the pair BA. But the usage of 'so' in C shows that it would follow D as it illustrates a solution to avoid a situation like a mass departure.</p><p>Thus, the final order is <b>BADC</b>.</p><p>Hence, option (b) is correct.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Given below is a four-sentence paragraph (S1-S4). S1 and S4 are given. From the options (P, Q, R) choose two sentences which can be S2 and S3.</p><p>S1: Painite is the second-rarest mineral in existence, which appears as deep red hexagonal crystals.</p><p>S2: ___________________________</p><p>S3: ___________________________</p><p>S4: But unbeknownst to Pain, they were actually something far rarer.</p><p>P. In 1952, the English gem collector and dealer Arthur Pain acquired two crimson crystals in Myanmar.</p><p>Q. The very first painite crystal discovered, known as painite #1, was later analyzed by Rossman.</p><p>R. Pain thought the crystals were rubies, which the region is famed for.</p>",
    "options": [
      "RP",
      "QR",
      "PR",
      "PQ"
    ],
    "correct_option_id": 2,
    "solution": "<p>S1 introduces us to the painite crystal which is the second-rarest mineral on earth. P states that in 1952 Arthur Pain acquired two crimson crystals in Myanmar. R follows P as it states that Pain thought that those two crystals were rubies. 'But' is used to introduce a phrase or clause contrasting with what has already been mentioned. S4 states that those were not rubies but actually a far rarer mineral. Sentence Q does not fit in as it tells about another person, Rossman, whereas sentence S4 talks about someone by the name of 'Pain'. </p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 2
  },
  {
    "question": "<p>Given below are six sentences, out of which sentences A and F are in the correct positions. Sentences B, C, D and E are in jumbled order. Select the option that gives the correct order. </p><p></p><p>A. Urban policy experts have long been arguing that the existing railway infrastructure in the state cannot meet the demands of the future.</p><p>B. The government claims the MONO project can take a significant load of traffic off. </p><p>C. This will make travel faster for commuters and reduce congestion on roads.</p><p>D. Most trains run at an average speed of 45 km/hr due to a lot of curves and bends on the existing stretch.</p><p>E. The state government began the process of land acquisition after the state's cabinet approval in June 2021.</p><p>F. Out of 1,383 hectares needed to be acquired, 1,198 hectares will be private land.</p>",
    "options": [
      "ABCDEF",
      "ADBECF",
      "ADBCEF",
      "ABDECF"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct order is: ADBCEF.</p><p>The first sentence states that the current railway infrastructure cannot meet the demands of the future. D follows A as it talks about the reason for this. Therefore, AD is a pair. Sentence B follows and introduces us to the MONO project. It states that the project can take a significant load of traffic off. C follows B as it talks about the advantages of the project. The last sentence talks about land acquisition. Sentence E also talks about land acquisition. So, E precedes F.</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>In the following question, the 1st and the last part of the sentences/passage are numbered 1 and 6. The rest of the sentence/ passage is split into four parts and named P, Q, R and S. These four parts are not given in their proper order. Read the sentences/passage and find out which of the four combinations is correct.</p><p></p><p>1. The harder Tom tried to put his mind on his book, the more his ideas wandered.</p><p>P. Tom's heart ached to be free, or else to have something of interest to do to pass the time. </p><p>Q. It was the sleepiest of days.</p><p>R. It seemed to him that the noon recess would never come. </p><p>S. So at last, with a sigh and a yawn, he gave it up.</p><p>6. His hand wandered into his pocket to take out his pocket watch.</p>",
    "options": [
      "PQRS",
      "QSRP",
      "SRQP",
      "SPQR"
    ],
    "correct_option_id": 2,
    "solution": "<p>The passage begins by telling us that Tom was unable to concentrate on the book. S follows, as it refers to this activity which Tom was trying to do, and tells us that he gave it up. R expands further on Tom's thoughts about that day. Q continues along the same lines. P brings us back to what Tom did next. P and 6 establish continuity with each other, as the subject of the verb in both is the same. So, the order is SRQP. Hence, option C is correct.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in correct order to form a meaningful sentence. </p><p>No tickets when we boarded / I had only Rs 100 in my pocket and / a train to Aurangabad. </p>",
    "options": [
      "No tickets when we boarded I had only Rs 100 in my pocket and a train to Aurangabad.",

      "No tickets when we boarded a train to Aurangabad I had only Rs 100 in my pocket and.",
      "I had only Rs 100 in my pocket and a train to Aurangabad no tickets when we boarded"
    ],
    "correct_option_id": 1,
    "solution": "<p>Options (a) and (c) are eliminated as they aren't proper sentences. The sentence in option (d) is logically incorrect. The fact that he/she had only Rs 100 and a train is illogical. So, option (d) is also incorrect. Option (b) represents the correct sentence. </p><p>Hence, option (b) is the correct answer. </p><p><b>The correct sentence is</b>: I had only Rs 100 in my pocket and no tickets when we boarded a train to Aurangabad. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. To prevent pickpocketing, people are advised to keep valuables secure and remain vigilant in busy environments.</p><p>B. Pickpocketing is a form of theft where a skilled thief stealthily steals items like wallets, phones, or money from a person's pocket or bag without them noticing. </p><p>C. It often occurs in crowded places such as markets, public transportation, or tourist areas where distractions are common. </p>",
    "options": [
      "ACB",
      "BCA",
      "CAB",
      "CBA"
    ],
    "correct_option_id": 1,
    "solution": "<p>Sentence B introduces the main idea: \"Pickpocketing is a form of theft...\" It defines what pickpocketing is, setting up the context for the rest of the paragraph. Therefore, it should come first. </p><p>Sentence C provides more details about pickpocketing, describing where it commonly occurs: crowded places like markets, public transportation, or tourist areas. This sentence logically follows the introduction in B, as it adds more context about the locations where pickpocketing happens. </p><p>Sentence A offers advice on how to prevent pickpocketing, making it a natural conclusion to the paragraph. After learning what pickpocketing is and where it happens, it's logical to provide guidance on how to avoid becoming a victim.</p><p>Therefore, the correct order is BCA</p><p>Hence, option (b) is correct. </p>",
    "question_index": 6
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. However, the rapid growth of urban areas has led to challenges such as housing shortages, traffic congestion, pollution, and the strain on public services, raising questions about the sustainability of this expansion. </p><p>B. As urbanization continues to accelerate, city planners and governments must find innovative solutions to create smart, sustainable urban environments that can accommodate growing populations while preserving natural resources. </p><p>C. Urbanization, the movement of people from rural areas to cities, has become one of the defining trends of the modern era, reshaping economies, social structures, and environmental conditions around the world. </p><p>D. With cities offering more employment opportunities, better infrastructure, and access to education and healthcare, they have become magnets for populations seeking to improve their quality of life.</p>",
    "options": [
      "DBAC",
      "CDAB",
      "BDCA",
      "DACB"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; If the sentences are read carefully, it can be noted that the sentences talk about 'urbanization'. </p><p>&bull; Sentence C has to come first, as it introduces the central topic that is discussed in the remaining sentences. </p><p>&bull; It is followed by the sentence pair DA, which talks about the effect of urbanization in city areas and city planning activities and the straining effects of rapid urbanization. </p><p>&bull; Sentence B concludes the discussion by suggesting possible solutions that can mitigate the effects of urbanization. So, the final order is CDAB.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 7
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. Remote work and flexible schedules have become more common, allowing employees to achieve a better work-life balance. </p><p>B. This shift has also opened up new opportunities for people with disabilities, caregivers, and those living in remote areas, promoting diversity, equity, and inclusion in the workforce.</p><p>C. The future of work is evolving rapidly, influenced by technological advancements and changing workforce dynamics. </p><p>D. As a result, productivity and job satisfaction have increased, leading to improved overall well-being for workers. </p>",
    "options": [
      "ACBD",
      "BDCA",
      "ABDC",
      "CADB"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct order to form a coherent paragraph is CADB.</p><p>Sentence C introduces the topic by stating that \"The future of work is evolving rapidly,\" setting the context for discussing changes in work dynamics.</p><p>Sentence A follows by detailing one specific change: \"Remote work and flexible schedules have become more common, allowing employees to achieve a better work-life balance.\" This sentence builds on the theme of evolving work dynamics presented in C. Accordingly, CA forms a logical pair. </p><p>Sentence D then explains the positive outcomes of these changes: \"As a result, productivity and job satisfaction have increased, leading to improved overall well-being for workers.\" This shows the effects of remote work and flexible schedules mentioned in A.</p><p>Sentence B concludes the paragraph by expanding on the implications of these changes, noting that this shift has opened up new opportunities for underrepresented groups, thus promoting diversity, equity, and inclusion. This ties back to the evolving nature of work while emphasising its broader social impact. Hence, (d) is the correct answer. </p>",
    "question_index": 8
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. Theories of relativity and quantum mechanics have led physicists to question the linear progression of time, proposing alternative models where time is relative and context-dependent. </p><p>B. While time is often measured in seconds, minutes, and hours, its true nature remains a subject of philosophical and scientific inquiry. </p><p>C. The human experience of time, influenced by emotions, memories, and perception, continues to fascinate philosophers, psychologists, and scholars seeking to understand its subjective and often paradoxical nature.</p><p>D. Time is a constant yet elusive force that shapes human existence, determining the pace of our lives and the course of history. </p>",
    "options": [
      "ACBD",
      "DBAC",
      "ADCB",
      "CBDA"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct order to form a coherent paragraph is DBAC.</p><p>Sentence D comes first as it introduces time as an important and constant force that affects human existence. It sets the stage for discussing the broader concept of time.</p><p>Sentence B builds on D by acknowledging that although we commonly measure time in units (seconds, minutes, hours), the true nature of time remains a mystery. </p><p>Sentence A builds upon B and introduces scientific theories, particularly relativity and quantum mechanics, that challenge conventional views about time. It presents the notion that time might not be linear and may change based on context, thereby deepening the complexity introduced in B.</p><p>Sentence C shifts to the subjective experience of time (as opposed to the physical and scientific aspects discussed earlier). It highlights the fascination with time from a human perspective, connecting the scientific views in A to the emotional and psychological experience of time. Hence, (b) is the correct answer. </p>",
    "question_index": 9
  },
  {
    "question": "<p>Some sentences are given below. While the first and the last sentences (I and II) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph. </p><p></p><p>I. \"Have you given any more thought to your future and marriage?\" the mother asked. </p><p>A. The daughter had been thinking about it but wanted to focus on her career first. </p><p>B. But according to the mother, marriage was an important part of life too. </p><p>C. The mother said, \"Sometimes, finding the right partner can also support your dreams.\" </p><p>D. The daughter further said, \"I just want to make sure I'm financially stable and independent before I take that step.\" </p><p>II. \"I'll keep an open mind, but for now, I really want to chase my professional goals\", the daughter said. </p>",
    "options": [
      "ABDC",
      "BDCA",
      "CABD",
      "DACB"
    ],
    "correct_option_id": 0,
    "solution": "<p>In statement I, the mother is asking about the daughter's thoughts on her future and marriage. A aligns exactly with the daughter's thoughts. B should be placed next as the mother's perspective on the importance of marriage is shown in the sentence. D matches with the daughter's response. She mentions her desire to achieve financial stability and independence before considering marriage. In C, the mother suggests that finding the right partner can be beneficial for supporting the daughter's dreams. So, rearranging sentences into the sequence of ABDC forms a coherent paragraph. Hence, (a) is the correct answer. </p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate order of the segments in the options that will fill in the blanks and make a coherent paragraph.</p><p>The rapid advancement of artificial intelligence, combined ______________/ ________________/ __________________ /_______________ innovation, consumer protection, and ethical practices.</p>",
    "options": [
      "to reevaluate their regulatory frameworks/ aiming to strike a balance between / with growing concerns about data privacy and security/ has prompted governments and industries worldwide",
      "with growing concerns about data privacy and security/ has prompted governments and industries worldwide/ to reevaluate their regulatory frameworks/ aiming to strike a balance between",
      "has prompted governments and industries worldwide/ with growing concerns about data privacy and security/ aiming to strike a balance between/ to reevaluate their regulatory frameworks",
      "aiming to strike a balance between/ to reevaluate their regulatory frameworks/ with growing concerns about data privacy and security/ has prompted governments and industries worldwide"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>\"With growing concerns about data privacy and security\"</b> introduces the context, indicating that concerns about data privacy are a driving factor. It appropriately follows the verb \"combined\", forming the meaningful phrase \"combined with\" implying that growing concerns about data privacy and security are also certain factors along with the rapid advancement of AI.</p><p><b>\"Has prompted governments and industries worldwide\"</b> follows logically, showing the reaction to these concerns.</p><p><b>\"To reevaluate their regulatory frameworks\"</b> explains what the governments and industries are doing in response.</p><p><b>\"Aiming to strike a balance between\"</b> concludes the paragraph by specifying their goal (balancing innovation, protection, and ethics).</p><p>So, the complete coherent paragraph is: The rapid advancement of artificial intelligence, combined with growing concerns about data privacy and security, has prompted governments and industries worldwide to reevaluate their regulatory frameworks, aiming to strike a balance between innovation, consumer protection, and ethical practices.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. The global shift towards renewable energy has been driven by the urgent need to reduce greenhouse gas emissions and combat climate change, making it one of the most critical transitions of our time. </p><p>B. Wind, solar, and hydropower have emerged as leading alternatives to fossil fuels, offering cleaner, more sustainable energy sources that can help mitigate the environmental damage caused by traditional energy production.</p><p>C. Despite significant advancements in renewable technologies, challenges remain in terms of storage, cost, and infrastructure, requiring further investment and innovation to make these energy sources more viable on a large scale. </p><p>D. Governments and corporations around the world are increasingly committing to renewable energy targets, recognizing the importance of transitioning to a low-carbon economy for the future of the planet.</p>",
    "options": [
      "ADCB",
      "CDAB",
      "ABCD",
      "DCAB"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The given sentences are in sequence.</p><p>&bull; The given sentences talk about the necessity of switching to renewable energy sources and sentence A aptly initiates the discussion by stressing the need for the change.</p><p>&bull; Sentence B lists down the alternatives to conventional fuels and so, it can be the second sentence, whereby it extends the discussion started in A.</p><p>&bull; Sentence C follows B, and it talks about the challenges that exist in the switching, and sentence D completes the discussion by stating the efforts taken by multiple entities to achieve the global shift toward renewable energy sources. So, the final order is ABCD.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 12
  },
  {
    "question": "<p><b> </b>Select the option that expresses the given sentence in passive voice.</p><p>Rahul is writing an amazing essay. He is also solving the math problems.</p>",
    "options": [
      "An amazing essay was written by Rahul. The math problems have also been solved by him.",
      "An amazing essay is being written by Rahul. The math problems are also being solved by him.",
      "An amazing essay was written by Rahul. The math problems were also solved by him.",
      "An amazing essay has been written by Rahul. He solved the math problems."
    ],
    "correct_option_id": 1,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of the verb ['being'] is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in <b>Present Continuous</b>. Thus, the Passive voice will also be in Present Continuous.</p><p>The format of Active voice is: Subject + am/is/are + V1 + ing + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + am/is/are + being + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>Arnab is typing a document. (Active Voice)</p><p>A document is being typed by Arnab. (Passive Voice)</p><p>The options except (b) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is: \"An amazing essay is being written by Rahul. The math problems are also being solved by him.\"</p><p>Hence, option (b) is correct.</p>",
    "question_index": 13
