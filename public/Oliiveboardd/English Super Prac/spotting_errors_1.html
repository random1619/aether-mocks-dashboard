<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the alternative that will improve the underlined part of the sentence. In case there is no improvement select 'No improvement'.</p><p>I had <u>no information's about</u> the bank strike so I went there yesterday.</p>",
    "options": [
      "no information about",
      "not got information's about",
      "No improvement",
      "no information's concerning"
    ],
    "correct_option_id": 0,
    "solution": "<p>In the underlined part, the noun 'information's' is the incorrect plural form. 'Information' is both the singular and plural form of the noun and so except option (a) the other options have the incorrect form of the noun 'information's' as a suggestion.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the segment in the sentence, which contains the grammatical error.</p><p>They had to wait for the luggages to be put into the cab before they themselves got into it.</p>",
    "options": [
      "to be put into the cab",
      "for the luggages",
      "They had to wait",
      "before they themselves got into it"
    ],
    "correct_option_id": 1,
    "solution": "<p>The part 'for the luggages' is erroneous. The word 'luggage' is both the countable and uncountable form of a noun and 'luggages' is an incorrect form of the word, which needs to be replaced by 'luggage'.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 1
  },
  {
    "question": "<p>Parts of the following sentence have been given as options. Select the option that contains an error.</p><p>Ramayana is an ancient Sanskrit epic; it is believed to be written around 500 BC to 100 BC.</p>",
    "options": [
      "Ramayana is an ancient",
      "Sanskrit epic; it is",
      "believed to be written",
      "around 500 BC to 100 BC."
    ],
    "correct_option_id": 0,
    "solution": "<p>\"Ramayana\" is an epic, so 'the' must be used before it.</p><p>The correct sentence would be \"The Ramayana is an ancient Sanskrit epic; it is believed to have been written around 500 BC to 100 BC.\"</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>Please take <u>many as</u> you want.</p>",
    "options": [
      "so much",
      "as much",
      "too much",
      "much of"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The correct phrase should be \"as much as you want.\"</p><p>&#183; \"Many\" is incorrect because it is used for countable nouns, while \"much\" is used for uncountable nouns.</p><p>&#183; Incorrect options: </p><p>o \"So much\" does not fit the sentence structure.</p><p>o \"Too much\" changes the meaning (indicating excess).</p><p>o \"Much of\" is grammatically incorrect here.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>One of my <u>best friends are here.</u></p>",
    "options": [
      "better friends are here",
      "best friends is here",
      "better friends is here",
      "best friend is here"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The subject \"One of my best friends\" is singular, so the verb should be \"is\" instead of \"are.\"</p><p>Correct sentence: \"One of my best friends is here.\"</p>",
    "question_index": 4
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>I am going / to buy a red car / with a leather seats / and a sunroof.</p>",
    "options": [
      "I am going",
      "and a sunroof",
      "to buy a red car",
      "with a leather seats"
    ],
    "correct_option_id": 3,
    "solution": "<p>The article \"a\" is singular, but \"seats\" is plural. The correct form would be \"with leather seats\" (no article, as \"leather\" describes the material of the plural \"seats\") or \"with a leather seat\" (singular). The mismatch between \"a\" and \"seats\" is the error.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Parts of the following sentence have been given as options. Select the option that contains an error.</p><p>There was an gang of thieves spotted at our local bank, make sure to be careful.</p>",
    "options": [
      "at our local bank",
      "make sure to be careful",
      "There was an gang",
      "of thieves spotted"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error lies in the segment \"There was an gang.\" The article \"an\" is incorrect before \"gang,\" as \"gang\" starts with a consonant sound (/&#609;/), requiring the article \"a.\" The correct phrase is \"There was a gang.\" Additionally, the sentence has a structural issue with the second clause (\"make sure to be careful\"), which lacks a conjunction or proper punctuation (e.g., a semicolon), but this is not part of the options provided.</p><p>&#183; Option 1 (\"at our local bank\") is correct as a prepositional phrase.</p><p>&#183; Option 2 (\"make sure to be careful\") is grammatically correct, though the sentence structure could be improved.</p><p>&#183; Option 3 (\"There was an gang\") contains the article error.</p><p>&#183; Option 4 (\"of thieves spotted\") is correct as a prepositional phrase.</p><p>Thus, the segment with the error is There was an gang.</p>",
    "question_index": 6
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains a grammatical error.</p><p>After your insistence, / my sister / checked / a mailbox again.</p>",
    "options": [
      "a mailbox again.",
      "After your insistence,",
      "my sister",
      "checked"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is in \"a mailbox again.\" The use of the indefinite article \"a\" with \"mailbox\" followed by \"again\" is incorrect because \"again\" implies repetition, suggesting the mailbox is specific (one previously checked). The correct phrase would be \"the mailbox again\" to indicate a specific mailbox.</p><p>The correct sentence is: After your insistence, my sister checked the mailbox again.</p><p>Hence, the correct answer is option (1).</p>",
    "question_index": 7
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>Policeman</u> came to <u>my village</u> and asked about <u>a person</u> who burgled <u>a house</u> last night.</p>",
    "options": [
      "policeman",
      "a house",
      "my village",
      "a person"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is in the word \"policeman,\" which is a singular noun without an article. In English, singular countable nouns typically require an article (\"a,\" \"an,\" or \"the\") unless they are proper nouns or used in a general sense.</p><p>In this sentence, \"Policeman\" refers to a specific individual who came to the village, so it should be \"The policeman\" or \"A policeman.\" The absence of an article makes the sentence grammatically incorrect. Thus, the option \"policeman\" contains the error.</p><p><b>The correct sentence is-\" A/The policeman came to my village and asked about a person who burgled a house last night.\"</b></p>",
    "question_index": 8
  },
  {
    "question": "<p>Identify the segment in the sentence which contains a grammatical error.</p><p>One of the proposals received by us seem very interesting.</p>",
    "options": [
      "seem very interesting",
      "received by us",
      "the proposals",
      "One of"
    ],
    "correct_option_id": 0,
    "solution": "<p>The phrase 'one of the' is followed by the plural noun and singular verb, whereas 'seem' is the singular verb. </p><p>Replace 'seem' with singular verb 'seems' to make the sentence grammatically correct. </p><p>The correct sentence is: One of the proposals received by us seems very interesting.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Parts of the following sentence have been given as options. Select the option that contains an error.</p><p>Can we go visit a Statue of Liberty on our trip to the United States?</p>",
    "options": [
      "Can we go",
      "visit a Statue of Liberty",
      "on our trip to",
      "the United States?"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in the article \"a\" before \"Statue of Liberty,\" which is a proper noun referring to a specific monument, requiring \"the\" instead of \"a.\" The correct phrase is \"visit the Statue of Liberty.\"</p><p>The correct sentence: Can we go visit the Statue of Liberty on our trip to the United States?</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>In yesterday's fire accident, <u>her feets are</u> burnt badly.</p>",
    "options": [
      "her feet was",
      "her feet were",
      "her foots were",
      "No substitution"
    ],
    "correct_option_id": 1,
    "solution": "<p>The segment \"feets are burnt\" contains two errors: \"feets\" is incorrect (the plural of \"foot\" is \"feet\"), and \"are\" should be \"were\" to match the past tense of \"yesterday's fire accident.\" The correct substitution is \"her feet were.\" </p><p>The corrected sentence is: \"In yesterday's fire accident, her feet were burnt badly.\"</p><p>Option a: her feet was  -  Corrects \"feets\" but uses incorrect singular verb \"was\" for plural \"feet.\"</p><p>Option c: her foots were  -  \"Foots\" is incorrect; the plural is \"feet.\"</p><p>Option d: No substitution  -  Incorrect, as the original has errors.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option to substitute the bracketed segment in the given sentence. If there is no need to substitute it, select 'no substitution required'.</p><p>When it comes to face masks, the (market are flooded with choices).</p>",
    "options": [
      "No substitution required",
      "Market is flooded with choices",
      "Market are flooded off choices",
      "Markets is flooded with choices"
    ],
    "correct_option_id": 1,
    "solution": "<p>The singular noun 'market' should be followed by the singular verb 'is', and not plural verb 'are'. This is the violation of subject-verb agreement. Option (b) rectifies this error.</p><p>Options (a) and (d) also violate rule of subject-verb agreement.</p><p>The correct sentence is: When it comes to face masks, the market is flooded with choices.</p><p>Hence, option (b) is the answer.</p><p><b>Note: Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 12
  },
  {
    "question": "<p>Identify the segment that contains a grammatical error. If there is no error, select 'No error'.</p><p>In 79 A.D., the Mount Vesuvius blew / its top, burying the ancient / cities of Pompeii and Herculaneum.</p>",
    "options": [
      "In 79 A.D., the Mount Vesuvius blew",
      "its top, burying the ancient",
      "cities of Pompeii and Herculaneum.",
      "No Error"
    ],
    "correct_option_id": 0,
    "solution": "<p>We use <i>the</i> with the names of some mountains: <i>the Matterhorn, the Jungfrau</i>.</p><p>We do not use <i>the</i> if the name includes <i>Mount</i> or <i>Mountain</i>: <i>Mount Olympus</i>, <i>Brokeback Mountain</i>.</p><p>So, 'the' before 'Mount Vesuvius' needs to be removed in order to rectify the error.</p><p>The correct sentence is: In 79 A.D., Mount Vesuvius blew its top, burying the ancient cities of Pompeii and Herculaneum.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Identify the segment that contains a grammatical error. If there is no error, select 'No error'.</p><p>Even if a evidence was / relevant to the case, it couldn't / be used to determine the reprobate.</p>",
    "options": [
      "relevant to the case, it couldn't",
      "Even if a evidence was,",
      "No error",
      "be used to determine the reprobate."
    ],
    "correct_option_id": 1,
    "solution": "<p>'Evidence' is an uncountable noun and indefinite article 'a' will not be used before it.</p><p>Remove 'a' from the sentence in order to rectify the error.</p><p>The correct sentence is: Even if evidence was relevant to the case, it couldn't be used to determine the reprobate.</p><p>Hence, option (b) is the answer.</p><p><b>Note: Countable and uncountable nouns: 1. Countable nouns</b> are the class of nouns that can be counted, for example, 'table'  -  one table, two tables, three tables, etc. <b>2. Uncountable nouns </b>are the nouns that cannot be counted or usually are not counted, for example, light, water, milk, information, furniture, etc. They do not generally have a plural form and can't be preceded by<b> 'a' </b>or <b>'an'. </b>Many abstract nouns are typically uncountable. Some uncountable nouns can be used in the plural as well, depending on the meaning or context of the word.</p><p><b>Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Identify the segment that contains a grammatical error. If there is no error, select 'No error'.</p><p>Ben Essenburg is widely known / as one of the world's best portrayer / of the Everglades.</p>",
    "options": [
      "as one of the world's best portrayer",
      "No error",
      "of the Everglades.",
      "Ben Essenburg is widely known"
    ],
    "correct_option_id": 0,
    "solution": "<p>The phrase 'one of the' is followed by the plural nouns, whereas 'portrayer' is the singular noun. </p><p>The correct sentence is: Ben Essenburg is widely known as one of the world's best portrayers of the Everglades.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Improve the underlined part of the sentence. Choose 'No improvement' as an answer if the sentence is grammatically correct.</p><p>I like to hang my laundry outside in the <u>suns to dry</u>.</p>",
    "options": [
      "No improvement",
      "sun to dried",
      "sun to dries",
      "sun to dry"
    ],
    "correct_option_id": 3,
    "solution": "<p></p><p>The correct phrase is 'outside in the sun', and not 'outside in the suns'.</p><p>The correct sentence is: I like to hang my laundry outside in the sun to dry.</p><p>Hence, option (d) is the answer.</p><p> </p>",
    "question_index": 16
  },
  {
    "question": "<p>Parts of the following sentence have been given as options. Select the option that contains an error.</p><p>The farm cattle is grazing in the field when the tiger attacked.</p>",
    "options": [
      "The farm cattle",
      "in the field when",
      "is grazing",
      "the tiger attacked"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence is: \"The farm cattle is grazing in the field when the tiger attacked.\"</p><p>A. The farm cattle: Correct, \"cattle\" is a plural noun.</p><p>B. in the field when: Prepositional phrase and conjunction are correct.</p><p>C. is grazing: Incorrect, as \"cattle\" is plural and requires \"are grazing.\"</p><p>D. the tiger attacked: Correct, past tense aligns with \"when.\"</p><p>The error is in subject-verb agreement: \"cattle\" needs \"are,\" not \"is.\"</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The invention of fertilisers and insecticides has increased agricultural ______ which is required to feed the swelling population of the world.</p>",
    "options": [
      "cargo",
      "goods",
      "output",
      "product"
    ],
    "correct_option_id": 2,
    "solution": "<p>Cargo- Goods carried on a ship, aircraft, or motor vehicle</p><p>Goods- Merchandise or possessions</p><p>Output- The amount of a thing produced by a person, machine, or industry</p><p>Product- An article or substance that is manufactured or refined for sale</p><p>The sentence talks about the use of fertilizers with respect to agriculture and the blank requires a word that denotes the resultant of agricultural activity that can feed the world's population. Among the given words, 'cargo' is a contextually irrelevant option and so it is negated. 'Goods' is a plural noun which cannot be placed before the singular verb 'is' and so, the option is negated. 'Product' is qualified by the adjective 'agricultural' but it is uninfluenced by the use of fertilisers and insecticides, which are used to increase the yield. Thus, his option is also negated. Option (c) 'output' is similar to the word 'yield' which is the most appropriate word to fit the given blank.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 18
  },
  {
    "question": "<p>A sentence has been given with a blank to be filled with an appropriate word. Choose the correct alternative.</p><p>Every person should know their own _________, what their skill set is and how unique they are.</p>",
    "options": [
      "calamities",
      "punctualities",
      "specialties",
      "fecundities"
    ],
    "correct_option_id": 2,
    "solution": "<p>The blank requires a noun to describe what a person owns. Let's look at the meanings of the given words.</p><p>Calamities: an event causing great and often sudden damage or distress; a disaster.</p><p>Punctualities: the fact or quality of being on time.</p><p>Specialties: a particular type of work that they do most or do best, or a subject that they know a lot about.</p><p>Fecundities: the ability to produce an abundance of offspring or new growth; fertility.</p><p>The sentence talks about a person's attributes and uniqueness. Therefore, among the given options, 'specialties' is the most appropriate choice.</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 19
  }
];
    </script>

</body>
