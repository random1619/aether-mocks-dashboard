<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Substitute the underlined word-segment with most appropriate idiom.</p><p>Everyone knew about his impending resignation, but it remained <u>the obvious unaddressed problem</u> during the entire meeting.</p>",
    "options": [
      "a fish out of water",
      "the elephant in the room",
      "a wolf in sheep's clothing",
      "a storm in a teacup"
    ],
    "correct_option_id": 1,
    "solution": "<p>The phrase \"the obvious unaddressed problem\" refers to a significant issue that everyone is aware of but no one discusses, often due to discomfort or sensitivity.</p><p>The idiom \"the elephant in the room\" means an obvious major problem or controversial issue that is conspicuously present but avoided as a subject for discussion. This perfectly describes the situation with his unmentioned resignation.</p><p>Therefore, it is the most suitable idiomatic replacement.</p><p>a) a fish out of water  -  someone who is uncomfortable in a particular or unfamiliar situation. (Describes a person's feeling, not an unaddressed issue.)</p><p>c) a wolf in sheep's clothing  -  a dangerous person who pretends to be harmless. (Describes a deceptive person, not an undiscussed topic.)</p><p>d) a storm in a teacup  -  a lot of unnecessary anger and worry about a matter that is not important. (Suggests the issue is trivial, which is not implied here.)</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate idiom to fill in the blank.</p><p>She had been working non-stop for a month, so her doctor advised her to _______________ for a week. Rest was essential.</p>",
    "options": [
      "paint the town red",
      "hit the books",
      "let her hair down",
      "jump the gun"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence indicates that the person has been working very hard and needs to relax and take a break. The idiom should reflect this need for rest and unwinding.</p><p>The missing phrase must idiomatically describe the act of relaxing and enjoying oneself after a period of hard work.</p><p>Option c) is correct. This idiom means to relax and enjoy oneself, often after working hard or being under stress. This fits the doctor's advice for rest.</p><p>Option a) means to go out and enjoy oneself flamboyantly, often by drinking and partying. While it involves enjoyment, it might not be the restful break the doctor advised.</p><p>Option b) means to study hard. This is the opposite of what is needed.</p><p>Option d) means to do or say something too soon, before the right time. This is irrelevant to taking a break.</p><p><b>Complete sentence:</b> She had been working non-stop for a month, so her doctor advised her to let her hair down for a week. Rest was essential.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Which of the following idioms means 'to initiate something or set a process in motion'?</p>",
    "options": [
      "Hold your horses",
      "Get the ball rolling",
      "Jump on the bandwagon",
      "Throw a spanner in the works"
    ],
    "correct_option_id": 1,
    "solution": "<p>a) Hold your horses  -  To wait; to be patient before doing something.</p><p>b) Get the ball rolling  -  To start something, especially a process or activity that involves other people.</p><p>c) Jump on the bandwagon  -  To join a popular activity or trend.</p><p>d) Throw a spanner in the works (UK) / Throw a monkey wrench in the works (US)  -  To do something that prevents a plan or activity from succeeding.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate meaning of the underlined idiom in the following sentence.</p><p>Constantly <u>crying wolf</u> over small matters means nobody believes you in a genuine crisis later.</p>",
    "options": [
      "Complaint",
      "Deception",
      "Exaggeration",
      "Apology"
    ],
    "correct_option_id": 1,
    "solution": "<p>The idiom \"cry wolf\" means to raise a false alarm or ask for help when you do not need it, with the result that people do not believe you when you are really in trouble. In the sentence, it warns against making false alarms.</p><p>a) Complaint  -  While it may involve complaining, the core meaning is about the false alarm.</p><p>b) Deception  -  Correct, as raising a false alarm is a form of misleading or deceiving others about the reality of a situation.</p><p>c) Exaggeration  -  Close, but \"cry wolf\" specifically refers to a false alarm leading to future disbelief, which is a form of deception.</p><p>d) Apology  -  Not related to the meaning of raising a false alarm.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Identify the correct meaning of the idiom(s) given below.</p><p>'By the skin of one's teeth'</p>",
    "options": [
      "to put something on hold",
      "give away a secret",
      "to be patient",
      "by a narrow margin; only just"
    ],
    "correct_option_id": 3,
    "solution": "<p>'By the skin of one's teeth' means 'by a narrow margin; only just'. Hence, (d) is the right answer.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Substitute the underlined word-segment with most appropriate idiom.</p><p>She accidentally <u>revealed the secret</u> about the surprise party when talking to the birthday boy.</p>",
    "options": [
      "hit the nail on the head",
      "went down in flames",
      "let the cat out of the bag",
      "burned her bridges"
    ],
    "correct_option_id": 2,
    "solution": "<p>The phrase \"revealed the secret\" refers to disclosing information that was meant to be concealed, especially if done carelessly.</p><p>The idiom \"let the cat out of the bag\" means to reveal a secret carelessly or by mistake. This perfectly fits the context of accidentally telling someone about a surprise party planned for them.</p><p>Therefore, it is the most suitable idiomatic replacement.</p><p>a) hit the nail on the head  -  to describe exactly what is causing a situation or problem, or to say something that is exactly right. (Not about revealing a secret.)</p><p>b) went down in flames  -  to fail spectacularly. (Unrelated to revealing information, though revealing the secret might lead to the party \"going down in flames\" in terms of surprise.)</p><p>d) burned her bridges  -  to destroy one's path, connections, or opportunities, especially in a professional sense or a relationship. (Refers to ruining relationships, not just revealing a single secret.)</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Substitute the underlined word-segment with most appropriate idiom.</p><p>When listening to the politician's promises, it's wise to <u>regard them with some scepticism</u>.</p>",
    "options": [
      "go the extra mile",
      "cry over spilt milk",
      "take them with a grain of salt",
      "bite off more than one can chew"
    ],
    "correct_option_id": 2,
    "solution": "<p>The phrase \"regard them with some scepticism\" refers to not fully believing something or being doubtful about its truth or likelihood.  The idiom \"take something with a grain of salt\" means to not completely believe something that you are told because you think it is unlikely to be true or accurate. Here, \"them\" (implied \"it\" in the base idiom \"take it with a grain of salt\") refers to the promises. This fits the context of being cautious about a politician's promises. Therefore, it is the most suitable idiomatic replacement.</p><p>a) go the extra mile  -  to make a special effort. (Unrelated to skepticism.)</p><p>b) cry over spilt milk  -  to be unhappy about what cannot be undone. (Unrelated to believing promises.)</p><p>d) bite off more than one can chew  -  to take on a task that is too big or difficult. (Unrelated to scepticism about statements.)</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate idiom to fill in the blank.</p><p>I don't know all the details yet; I've only heard it _______________. I need more concrete information.</p>",
    "options": [
      "through the grapevine",
      "in a nutshell",
      "from the horse's mouth",
      "out of the blue"
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence indicates that the speaker has received information informally or through rumours, not from an official source, and therefore lacks complete details. The idiom should reflect this informal way of hearing news.</p><p>The missing phrase must idiomatically describe hearing information passed from person to person, often as rumour or gossip.</p><p>Option a) is correct. This idiom means to hear news or information informally, through a network of personal contacts or rumours, rather than from an official source. This fits the context perfectly.</p><p>Option b) means in a very brief way, using few words. While the information might be incomplete, this idiom refers to conciseness, not the source.</p><p>Option c) means from the original or most reliable source. This is the opposite of what the sentence implies.</p><p>Option d) means unexpectedly or without warning. This refers to the manner of occurrence, not the source of information.</p><p><b>Complete sentence:</b> I don't know all the details yet; I've only heard it through the grapevine. I need more concrete information.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Which of the following idioms means 'to achieve two aims with a single action'?</p>",
    "options": [
      "Kill two birds with one stone",
      "Put all your eggs in one basket",
      "Rob Peter to pay Paul",
      "Burn your bridges"
    ],
    "correct_option_id": 0,
    "solution": "<p>a) Kill two birds with one stone  -  To succeed in achieving two things in a single action.</p><p>b) Put all your eggs in one basket  -  To risk everything on the success of one venture or plan.</p><p>c) Rob Peter to pay Paul  -  To take something from one person or source to pay another, often leading to a cycle of debt or problems.</p><p>d) Burn your bridges  -  To destroy one's path, connections, or opportunities, especially in a professional sense or a relationship, making it impossible to return to a previous state.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>Grease the palm</p>",
    "options": [
      "To work hard",
      "To bribe",
      "To become a mechanic",
      "To live a boring life"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Grease the palm' means 'To bribe'.</p><p>Hence, option (b) is the correct answer. </p>",
    "question_index": 9
  },
  {
    "question": "<p>Substitute the underlined word-segment with most appropriate idiom.</p><p>The student felt he <u>was rescued from the difficult situation by the final signal</u> as the exam ended.</p>",
    "options": [
      "saved by the bell",
      "cost an arm and a leg",
      "cut to the chase",
      "fit as a fiddle"
    ],
    "correct_option_id": 0,
    "solution": "<p>The phrase \"was rescued from the difficult situation by the final signal\" means that an unwelcome or challenging situation was brought to an end by an external event, often at the last moment.</p><p>The idiom \"saved by the bell\" means to be rescued from a difficult or awkward situation at the very last moment, often by an interruption. This perfectly describes the student's relief at the exam ending.</p><p>Therefore, it is the most suitable idiomatic replacement.</p><p>b) cost an arm and a leg  -  to be extremely expensive. (Unrelated to being rescued from a situation.)</p><p>c) cut to the chase  -  to get to the main point quickly, avoiding unnecessary details. (Unrelated to being rescued.)</p><p>d) fit as a fiddle  -  to be in very good physical health. (Unrelated to the exam situation.)</p><p>Hence, option (a) is the correct answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate idiom to fill in the blank.</p><p>Despite their different backgrounds, the two colleagues _______________ on most important issues. They worked well together.</p>",
    "options": [
      "saw eye to eye",
      "turned a blind eye",
      "pulled strings",
      "kept their chins up"
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence describes a situation where two colleagues, despite differences, agree on important matters, leading to good teamwork. The idiom should express this agreement or shared perspective.</p><p>The missing phrase must idiomatically convey the idea of being in agreement or having the same opinion as someone else.</p><p>Option a) is correct. This idiom means to agree with someone or have the same opinion as them. This perfectly describes the colleagues' harmonious working relationship on key issues.</p><p>Option b) means to pretend not to notice something, especially something wrong. This is unrelated to agreement.</p><p>Option c) means to use one's influence, especially secretly, to get an advantage. This doesn't fit the context of agreement on issues.</p><p>Option d) means to remain cheerful in a difficult situation. While positive, it doesn't specifically refer to agreement.</p><p><b>Complete sentence:</b> Despite their different backgrounds, the two colleagues saw eye to eye on most important issues. They worked well together.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate meaning of the underlined idiom in the following sentence.</p><p>After much persuasion, my little brother finally <u>spilled the beans</u> about who broke the expensive vase.</p>",
    "options": [
      "Disclosure",
      "Concealment",
      "Cleansing",
      "Ignorance"
    ],
    "correct_option_id": 0,
    "solution": "<p>The idiom \"spill the beans\" means to reveal secret information unintentionally or indiscreetly. In the sentence, the little brother finally disclosed the secret about who broke the vase.</p><p>a) Disclosure  -  Correct, as it means the act of making new or secret information known.</p><p>b) Concealment  -  Opposite of the idiom's meaning; it means hiding something.</p><p>c) Cleansing  -  Not related to revealing information; it means making something clean.</p><p>d) Ignorance  -  Means lack of knowledge, which is not what the idiom implies.</p><p>Hence, option (a) is the correct answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>Break the bank</p>",
    "options": [
      "Rob a bank",
      "Ask money as a loan",
      "To be very expensive",
      "Selling everything that one owns"
    ],
    "correct_option_id": 2,
    "solution": "<p>The meaning of the idiom 'break the bank' is 'cost more than one can afford'. Among the given options, the correct meaning of the given idiom is mentioned in option (c) 'to be very expensive'.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>Pull a fast one</p>",
    "options": [
      "Play a trick",
      "A witty remark",
      "Engage in physical fight",
      "An unexpected hindrance"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Pull a fast one' means 'Play a trick'.</p><p>Hence, option (a) is the correct answer. </p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate idiom to fill in the blank.</p><p>The new intern was so nervous on his first day that he felt like _______________. He wasn't sure how to behave.</p>",
    "options": [
      "a bull in a China shop",
      "a fish out of water",
      "a wolf in sheep's clothing",
      "a couch potato"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence describes an intern feeling nervous and unsure in a new environment. The idiom should express a feeling of being out of place or uncomfortable.</p><p>The missing phrase must idiomatically convey the intern's discomfort and unfamiliarity with the situation.</p><p>Option b) is correct. This idiom means to feel awkward or uncomfortable because you are in a situation that you are not used to. This perfectly describes the intern's feelings.</p><p>Option a) means someone who is very clumsy and often breaks things in a delicate situation. While the intern is nervous, the sentence doesn't specifically imply clumsiness causing damage.</p><p>Option c) means a dangerous person pretending to be harmless. This is entirely unrelated to an intern's nervousness.</p><p>Option d) means a lazy person who spends a lot of time watching television. This has no connection to the intern's situation.</p><p><b>Complete sentence:</b> The new intern was so nervous on his first day that he felt like a fish out of water. He wasn't sure how to behave.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate idiom to fill in the blank.</p><p>After his initial proposal was rejected, he went _______________ and came back with a much better plan. His persistence paid off.</p>",
    "options": [
      "back to the drawing board",
      "off the beaten path",
      "over the top",
      "down to the wire"
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence describes a situation where an initial attempt failed, requiring a complete restart or a new approach to planning. The idiom should convey this idea of starting again from the beginning.</p><p>The missing phrase must idiomatically describe the act of starting a planning process all over again because a previous attempt failed.</p><p>Option a) is correct. This idiom means to start planning something again from the beginning because a previous attempt was unsuccessful. This perfectly fits the context of revising a rejected proposal.</p><p>Option b) means to a place that is not well-known or popular; unconventional. This refers to location or method, not necessarily restarting a plan.</p><p>Option c) means excessive or exaggerated. This doesn't fit the context of improving a plan.</p><p>Option d) means until the very last moment. This refers to timing, not the process of replanning.</p><p><b>Complete sentence:</b> After his initial proposal was rejected, he went back to the drawing board and came back with a much better plan. His persistence paid off.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Which of the following idioms means 'to be extremely busy or overwhelmed with work or tasks'?</p>",
    "options": [
      "Have too many irons in the fire",
      "Keep one's head above water",
      "Twiddle one's thumbs",
      "Have an axe to grind"
    ],
    "correct_option_id": 0,
    "solution": "<p>a) Have too many irons in the fire  -  To be involved in too many activities or projects at the same time, making it difficult to manage them all effectively.</p><p>b) Keep one's head above water  -  To manage to survive, especially financially, despite difficulties.</p><p>c) Twiddle one's thumbs  -  To do nothing or to be bored because one has nothing to do.</p><p>d) Have an axe to grind  -  To have a private or selfish reason for doing or being involved in something.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate meaning of the underlined idiom in the following sentence.</p><p>Despite his fear, the soldier had to <u>bite the bullet</u> and advance towards the enemy lines.</p>",
    "options": [
      "Retreat",
      "Complaint",
      "Endurance",
      "Celebration"
    ],
    "correct_option_id": 2,
    "solution": "<p>The idiom \"bite the bullet\" means to face a difficult or unpleasant situation with courage and stoicism. In the sentence, the soldier had to bravely endure the dangerous situation.</p><p>a) Retreat  -  Opposite of facing the situation courageously.</p><p>b) Complaint  -  The idiom implies acceptance without complaint, not voicing dissatisfaction.</p><p>c) Endurance  -  Correct, as it means the ability or strength to continue or last, especially despite fatigue, stress, or other adverse conditions.</p><p>d) Celebration  -  Not appropriate for a fearful or difficult situation.</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the most appropriate meaning of the underlined idiom in the following sentence.</p><p>The intern attempted to <u>steal his colleague's thunder</u> by claiming credit for the successful project.</p>",
    "options": [
      "Detraction",
      "Support",
      "Criticism",
      "Applause"
    ],
    "correct_option_id": 0,
    "solution": "<p>The idiom \"steal someone's thunder\" means to take credit for someone else's achievements or ideas, or to lessen the impact or importance of what someone else does or says. In the sentence, the intern is trying to take credit and diminish his colleague's achievement.</p><p>a) Detraction  -  Correct, as it means the act of diminishing the worth, reputation, or importance of someone or something.</p><p>b) Support  -  Opposite of the idiom's meaning; it means to help or encourage.</p><p>c) Criticism  -  While the act might be criticized, the idiom itself isn't about criticizing.</p><p>d) Applause  -  Opposite, as the act aims to take applause away from another.</p><p>Hence, option (a) is the correct answer.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
