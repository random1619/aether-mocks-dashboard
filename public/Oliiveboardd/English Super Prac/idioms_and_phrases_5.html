<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate meaning of the underlined idiom in the given sentence.</p><p>When the District Attorney asked the convict about details of the day of the crime, he started <u>beating about the bush</u>.</p>",
    "options": [
      "Being excessively aggressive",
      "Accusing others of the crime",
      "Speaking in a confusing manner without giving a correct answer",
      "Trying to invoke sympathy"
    ],
    "correct_option_id": 2,
    "solution": "<p>The idiom 'beating about the bush' means 'to avoid talking about what is important'.</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>Old wives' tale</p>",
    "options": [
      "a scientific fact",
      "a common practice",
      "a belief gaining popularity fast",
      "a common belief little confirmed by science"
    ],
    "correct_option_id": 3,
    "solution": "<p>The idiom 'old wives' tale' refers to a superstitious belief that is not confirmed by science. E.g. The idea that drinking alcohol will cure the flu is an old wives' tale, nothing more. D is the right answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>Like a bull in a China shop</p>",
    "options": [
      "A sincere and responsible disposition",
      "Something unjustifiably expensive",
      "Cannot be trusted or relied upon",
      "Act awkwardly and carelessly"
    ],
    "correct_option_id": 3,
    "solution": "<p>Like a bull in a China shop: Behaving clumsily or recklessly in a delicate or sensitive situation.</p><p>Among the given options, 'act awkwardly and carelessly' is the correct meaning of the given idiom.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 2
  },
  {
    "question": "<p>Four alternatives are given for the idiom/phrase. Choose the correct alternative that best expresses the meaning of the idiom/phrase.</p><p></p><p>Black and blue</p>",
    "options": [
      "badly affected physically and mentally",
      "unable to distinguish between what is real and what is fake",
      "unable to believe",
      "unable to face people"
    ],
    "correct_option_id": 0,
    "solution": "<p>To be in black and blue means to get beaten severely or badly affected mentally and physically. Hence, option (a) is the answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Choose the correct meaning of the phrase. </p><p>Once bitten, twice shy.</p>",
    "options": [
      "Extremely introvert before others.",
      "A bad experience makes you wary of the same thing happening again.",
      "Having a bad omen.",
      "Bitten by an animal that makes you sick."
    ],
    "correct_option_id": 1,
    "solution": "<p>The phrase 'once bitten, twice shy' means a bad experience that makes you wary of the same thing happening again. </p><p>Usage - He was two days late last time, so she's not hiring him again - once bitten, twice shy.</p><p>Hence, (b) is the correct answer. </p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate idiom that can substitute italicised words in the given sentence </p><p>The one-hour period after his lunch is his time for <i>a short sleep</i>. </p>",
    "options": [
      "on thin ice",
      "once in a blue moon",
      "on cloud nine",
      "forty winks"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option (d) is the correct answer.</p><p>The idiom 'forty winks' means 'a short sleep, especially during the day'.</p><p><b>The meanings of the other idioms are-</b></p><p>On thin ice means- in a risky situation.</p><p>Once in a blue moon means  -  rarely.</p><p>On cloud nine- extremely happy.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate meaning of the underlined idiom in the given sentence.</p><p>It took a few weeks of bed rest, but I'm <u>in the pink</u> of health now.</p>",
    "options": [
      "Fit, healthy, and happy",
      "Most beautiful",
      "Somewhat unfit",
      "About to recover"
    ],
    "correct_option_id": 0,
    "solution": "<p>The idiom 'in the pink' means 'in extremely good health and spirits'. Hence, the answer is option a).</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate meaning of the highlighted idiom in the given sentence.</p><p>Their daughter was the <b>alpha and omega</b> of their lives.</p>",
    "options": [
      "Most important part.",
      "The first and last.",
      "The beginning of something.",
      "The end of something."
    ],
    "correct_option_id": 0,
    "solution": "<p>The meaning of the idiom 'alpha and omega' is 'the essence' and the meaning fits in the given sentence. Hence, the answer is option a).</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate meaning of the boldened/underlined idiom.</p><p>He has no political <u>axe to grind</u>, he is just concerned about the state of affairs here.</p>",
    "options": [
      "A private interest to serve",
      "To put extra efforts",
      "To do hard work at the last moment",
      "To serve the desired purpose"
    ],
    "correct_option_id": 0,
    "solution": "<p>The idiom 'an axe to grind' means a selfish aim or motive. So, 'a private interest to serve' is the most appropriate meaning of the given idiom.</p><p>Hence, option (a) is the correct choice.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>Bide one's time.</p>",
    "options": [
      "Wasting all the time and worrying later.",
      "Worrying incessantly.",
      "Waiting for the right opportunity.",
      "Spending less self-time."
    ],
    "correct_option_id": 2,
    "solution": "<p>The meaning of the idiom 'bide one's time' is 'wait quietly for a good opportunity to do something'. Accordingly, the correct answer is given in option (c), 'waiting for the right opportunity'.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>In the doldrums</p>",
    "options": [
      "Be independent and self-sufficient",
      "Doing something poorly in order to save time or money",
      "Dull and inactive",
      "To appear in a way or make an impression that causes oneself to be regarded unfavorably by others"
    ],
    "correct_option_id": 2,
    "solution": "<p>The idiom 'In the doldrums' means 'Dull and inactive'. Hence option c) is the correct answer.</p><p></p><p>'Cut a sorry figure' means 'To appear in a way or make an impression that causes oneself to be regarded unfavorably by others'.</p><p></p><p>'Paddle one's own canoe' means 'Be independent and self-sufficient'.</p><p></p><p>'Cutting corners' means 'Doing something poorly in order to save time or money'.</p>",
    "question_index": 10
  },
  {
    "question": "<p> Select the correct meaning of the idiom in bold and italics.</p><p>Trying to interest your son in studying is like <b><i>beating a dead horse</i></b>.</p>",
    "options": [
      "Encouraging pupils to increase their study time.",
      "Making futile efforts with no real benefit or consequence.",
      "Teaching with a pessimistic attitude.",
      "Doing more than needed or expected."
    ],
    "correct_option_id": 1,
    "solution": "<p>Beating a dead horse: spend time and effort on things that are hopeless and unchangeable. </p><p>Among the options, 'making futile efforts with no real benefit or consequence' is the correct option that matches the meaning of the given idiom. </p><p>Hence, (b) is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate meaning of the underlined idiom.</p><p>After the new rules and regulations have come into effect, <u>the ball is in your court. </u></p>",
    "options": [
      "It is up to you to make the next decision or step",
      "You should be more active and sportive",
      "You should listen to others before deciding anything",
      "You should abide by all the rules and regulations"
    ],
    "correct_option_id": 0,
    "solution": "<p>\"The ball is in your court\" means \"It is up to you to make the next decision or step\". Hence, option (a) is the answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>See eye to eye</p>",
    "options": [
      "To disagree",
      "To be in agreement",
      "To have different opinions",
      "To be taller than someone"
    ],
    "correct_option_id": 1,
    "solution": "<p>'See eye to eye' means to be in full agreement.</p><p>So, 'to be in agreement' is the right meaning here.</p><p>Hence, option (b) is correct.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p><b><u>A pinch of salt</u></b>.</p>",
    "options": [
      "with alert",
      "wholeheartedly",
      "with evidence",
      "with considerable doubt"
    ],
    "correct_option_id": 3,
    "solution": "<p>To take something with a pinch of salt means 'with considerable doubt'. Hence, option (d) is the answer.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>The acid test</p>",
    "options": [
      "To reveal the bitter truth.",
      "The deciding moment in a game.",
      "Under great psychological pressure.",
      "The true test of the value of something."
    ],
    "correct_option_id": 3,
    "solution": "<p>The idiom 'the acid test' means the true test of the value of something. Hence, d) is the correct answer.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>The bee's knees</p>",
    "options": [
      "Observant",
      "Foolish",
      "Problematic",
      "Extraordinary"
    ],
    "correct_option_id": 3,
    "solution": "<p>The given idiom 'the bee's knees' means 'an excellent or ideally suitable person or thing'.</p><p>Hence, 'extraordinary' is correct word to explain the meaning of this idiom.</p><p>Hence, option d) is correct.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>Come to the point</p>",
    "options": [
      "To speak plainly about the real issue",
      "To unravel a mystery",
      "To get reconciled to something",
      "To meet at a designated place"
    ],
    "correct_option_id": 0,
    "solution": "<p>The idiom 'come to the point' means 'to reach the main or most important idea of something that is said or written'.</p><p>Usage: It took several paragraphs for her to come to the point of her argument.</p><p>Hence, option (a) is the correct answer.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the sentence that uses the given idiom correctly.</p><p>Hit the nail on the head</p>",
    "options": [
      "He hit the nail on the head when he guessed her age.",
      "She hit the nail on the head when she hammered the picture frame.",
      "I hit the nail on the head when I couldn't solve the puzzle.",
      "They hit the nail on the head when they lost the treasure."
    ],
    "correct_option_id": 0,
    "solution": "<p>The idiom \"hit the nail on the head\" means to say or do something exactly right, especially by identifying or describing something accurately. It usually has a positive connotation. Option (a) uses the idiom correctly, as it implies that he made a correct or precise guess. The other options either use the idiom in a literal sense, which is not appropriate or in a way that does not match the meaning of the idiom, which is misleading.</p><p>Hence, option (a) is the correct answer. </p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>A feather in one's cap</p>",
    "options": [
      "Speaking or writing in an ironic or insincere way",
      "An achievement to be proud of",
      "To cause one to feel very happy",
      "To behave recklessly; to idly squander one's wealth"
    ],
    "correct_option_id": 1,
    "solution": "The idiom 'A feather in one's cap' means 'An achievement to be proud of'. Hence option b) is the correct answer.'Make (one's) day' means 'To cause one to feel very happy'. 'Tongue in cheek' means 'Speaking or writing in an ironic or insincere way'. 'Play ducks and drakes' means 'To behave recklessly; to idly squander one's wealth'.",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
