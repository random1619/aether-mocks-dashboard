    <script>
        const questions = [
  {
    "question": "<p>Select the sentence in which the '-ing' form of verb expresses the continuity of an action/event.</p>",
    "options": [
      "Writing poetry is a relaxing activity.",
      "I have a career in writing.",
      "The students are discussing the project details.",
      "He bought a writing pad for his notes."
    ],
    "correct_option_id": 2,
    "solution": "<p>Option (c): The '-ing' form of the verb \"discussing\" in this sentence is part of the present continuous tense (\"are discussing\"), which indicates that the action is happening now and expresses the continuity of the event.</p><p>Option (a): Here, the '-ing' form \"writing\" is a gerund, which functions as a noun and does not express the continuity of an action/event while the '-ing' form \"relaxing\" is an adjective modifying the noun 'activity'.</p><p>Option (b): Here also, the '-ing' form \"writing\" is a gerund, which functions as a noun and does not express the continuity of an action/event.</p><p>Option (d): The '-ing' form \"writing\" here is an adjective describing the type of pad. It does not indicate the continuity of any action/event.</p><p>Hence, the correct answer is option (c).</p><p>Note:</p><p><b>Gerund:</b> Gerund is a verb form that functions as a noun, ending in -ing. A gerund can be either the subject or object of a sentence in English. Example: \"Everybody enjoyed her dancing and singing at the party.\" The words 'dancing' and 'singing' are gerunds.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the grammatically correct statement from among the given options.</p><p>A. The photo captured an beautiful sunset. It was captured during an our vacation in the Maldives.</p><p>B. A photo captured an beautiful sunset. It was captured during our vacation in the Maldives.</p><p>C. An photo captured the beautiful sunset. It was captured during our vacation in a Maldives.</p><p>D. The photo captured a beautiful sunset. It was captured during our vacation in the Maldives.</p>",
    "options": [
      "D",
      "A",
      "B",
      "C"
    ],
    "correct_option_id": 0,
    "solution": "<p>The definite article 'the' should be used before 'photo' and 'Maldives' because in both instances, it introduces specific nouns, that is, 'a particular photo that captured a sunset' and 'a place (Maldives)'.</p><p>The indefinite article 'a' should be used before 'beautiful' as it is referring to an unspecified noun, that is, 'sunset'. Since 'beautiful' is not a vowel-sounding word, 'an' cannot be used before it.</p><p>The sentences A, B, and C depict grammatically incorrect usage of the articles.</p><p>Hence, (a) is the correct answer.</p><p><b>Note:</b></p><p><b>Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Which one of the following is a correct sentence?</p>",
    "options": [
      "No matter the season the requirement to keep your food fresh securely remains inevitable.",
      "No matter season, the requirement to keep your food fresh securely remains inevitable.",
      "No matter the season, the requirement to keep your food fresh, securely remains inevitable.",
      "No matter the season, the requirement to keep your food fresh securely remains inevitable."
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Option (d)</b> is the correct sentence as it uses the correct structure by including the phrase \"No matter the season\" followed by a comma to introduce the main clause.</p><p>Let us look at the incorrect options:</p><p>Option (a): \"No matter the season\" is an introductory phrase that sets the context for the main clause. The comma after \"season\" is necessary to separate the introductory phrase from the main clause.</p><p>Option (b): \"No matter season\" is grammatically incorrect. It should be \"No matter the season.\"</p><p>Option (c): The placement of the comma after \"fresh\" is inappropriate. It creates a comma splice and disrupts the flow of the sentence.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the grammatically correct sentence.</p><p></p><p>A. He do not like spicy food.</p><p>B. He were not like spicy food.</p><p>C. He are not like spicy food.</p><p>D. He doesn't like spicy food. </p>",
    "options": [
      "B",
      "A",
      "D",
      "C"
    ],
    "correct_option_id": 2,
    "solution": "<p>The subject \"he\" is singular, so it requires a singular verb form [does]. 'Do', 'were' and 'are' are plural helping verbs, so they can't be used. Therefore, the correct sentence is \"He doesn't like spicy food.\"</p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the grammatically correct sentence. </p><p></p>",
    "options": [
      "They have know each other since childhood.",
      "Arnav has lived in this city for ten years.",
      "We have just move into our new house.",
      "They had buy tickets for the concert, but it was cancelled at the last minute."
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence given in option (b) is grammatically correct. </p><p>Option (a) is not correct. In the present perfect tense (indicated by the helping verb 'have'), the correct form of the main verb after \"have\" is the past participle form. But 'know' (base form) is not the past participle form of the verb. Accordingly, 'know' should be replaced with the past participle form 'known'. <b>The correct sentence is:</b> They have known each other since childhood.</p><p>Option (c) is incorrect. In the present perfect tense (indicated by the helping verb 'have'), the correct form of the main verb after \"have\" is the past participle form. But 'move' (base form) is not the past participle form of the verb. Accordingly, 'move' should be replaced with the past participle form 'moved'. <b>The correct sentence is: </b>We have just moved into our new house.</p><p>Option (d) is also incorrect. In the past perfect tense (indicated by the helping verb 'had'), the correct form of the main verb after \"had\" is the past participle form. But the verb \"buy\" (base form) is not the past participle form of the verb. Accordingly, 'buy' should be replaced with the past participle form 'bought'. Also, \"had bought\" is used to indicate an action that occurred before another action in the past (in this case, the cancellation of the concert).</p><p><b>The correct sentence is:</b> They had bought tickets for the concert, but it was cancelled at the last minute. Hence, (b) is the correct answer. </p><p><b>NOTE:</b></p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing</b> at the party, the women fell on the ground.</p><p><b>Encouraged </b>by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the option that expresses the given sentence in present tense form.</p><p>My letter of protest was just a drop in the ocean.</p>",
    "options": [
      "My letter of protest will have been just a drop in the ocean.",
      "My letter of protest had been just a drop in the ocean.",
      "My letter of protest is just a drop in the ocean.",
      "My letter of protest will be just a drop in the ocean."
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct option that expresses the given sentence in present tense form is (c). Option (c) changes the verb \"was\" (past tense) to \"is\" (present tense). The present tense is used to describe actions or situations that are happening currently or are generally true. Options (a) and (d) are in the future tense forms. Option (b) is in the past tense form. Hence, (c) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the option that expresses the following sentence in superlative degree of comparison.</p><p>He is a fast runner.</p>",
    "options": [
      "He is the fastest runner.",
      "He is faster than any runner.",
      "No other runner is as faster as he is.",
      "No change required."
    ],
    "correct_option_id": 0,
    "solution": "<p>The adjective is 'fast' and it is in the positive degree, which means it does not show any comparison. To change a sentence from the positive degree to the superlative degree, we need to add -est to the adjective and use the definite article 'the' before it. The superlative degree shows that something or someone has the highest degree of quality among all the others in a group.</p><p>Hence, option (a) is the correct answer.</p><p>Option (b) is in comparative degree.</p><p>Option (c) is incorrect as 'faster' is in the comparative degree while the positive degree is used with 'as...as'.</p><p><b>Note:</b></p><p><b>Adjectives:</b> Words which are used with a noun/pronoun to describe or point out, the person, animal, place, or thing which the noun names, or to tell the number or quantity, are called Adjectives.</p><p>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Identify the sentence that correctly uses the indefinite article.</p><p></p>",
    "options": [
      "She is a MBA graduate with a honorary doctorate.",
      "She is an MBA graduate with an honorary doctorate.",
      "She is a MBA graduate with an honorary doctorate.",
      "She is an MBA graduate with a honorary doctorate."
    ],
    "correct_option_id": 1,
    "solution": "<p>Only the sentence in option (b) has the correct use of indefinite articles. The article 'an' is used before words that start with a vowel or a vowel-sounding word. Accordingly, 'MBA' and 'honorary' start with a vowel sound. So, the use of 'an' is correctly used in option (b).</p><p>Hence, the correct answer is option (b).</p><p>Note:</p><p><b>Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the sentence with the appropriate use of adverb of frequency. </p><p></p>",
    "options": [
      "His hard work comes late.",
      "He stays up late very hard.",
      "He hardly ever stays up late.",
      "He is working very hard to stay up late."
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence in option (c) is the sentence with the appropriate use of adverb of frequency.</p><p>'Hardly' is an adverb of frequency which means 'only just; almost not'.</p><p>Hence, option (c) is the correct answer. </p><p><b>Note:</b></p><p><b>Adverb of Frequency:</b> It tells us how often an action is performed.</p><p>Examples: always, never, frequently, often, etc.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the sentence with the appropriate use of adverb of frequency. </p><p></p>",
    "options": [
      "He visited his grandparents lately.",
      "He frequently visits his grandparents.",
      "He visited his grandparents with his children.",
      "He visited his grandparents to take care of them."
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence in option (b) is the sentence with the appropriate use of adverb of frequency.</p><p>'Frequently' is an adverb of frequency which means 'regularly or habitually'.</p><p>Hence, option (b) is the correct answer. </p><p><b>Note:</b></p><p><b>Adverb of Frequency:</b> It tells us how often an action is performed.</p><p>Examples: always, never, frequently, often, etc.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Identify the sentence that correctly uses the indefinite article.</p><p></p>",
    "options": [
      "She suggested a elaborate approach but mine is an easier one.",
      "She suggested an elaborate approach but mine is a easier one.",
      "She suggested a elaborate approach but mine is a easier one.",
      "She suggested an elaborate approach but mine is an easier one."
    ],
    "correct_option_id": 3,
    "solution": "<p>Note:</p><p>Only the sentence in option (d) has the correct use of indefinite articles. The article 'an' is used before words that start with a vowel or a vowel sounding word. Accordingly, 'elaborate' and 'easier' start with a vowel. So, the use of 'an' is correctly used in option (d).</p><p>Hence, the correct answer is option (d).</p><p><b>Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Choose the option that would make the sentence grammatically correct.</p><p>She endured the monster behaviour for years.</p>",
    "options": [
      "She have endured the monstrous behaviour for years.",
      "She endured the monstrous behaviour for years.",
      "She endured the monstrous behaviour since years.",
      "No change, the sentence is correct as is."
    ],
    "correct_option_id": 1,
    "solution": "<p>The use of 'monster' (noun) to describe 'behaviour' (another noun) is incorrect, an adjective (monstrous) should be used here in place of 'monster'.</p><p>Option (a) is incorrect as 'she' is a singular noun and 'have' is a plural verb. Option (c) is incorrect as 'since' is used with a point of time and 'for' denotes a period.</p><p>Hence, option (b) is correct.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the option that expresses the following sentence in superlative degree of comparison.</p><p>He works harder than anyone else in his office.</p>",
    "options": [
      "He works hardest in his office.",
      "Harder worker in his office is he.",
      "No one else in his office works as hard as he does.",
      "He works hard in his office."
    ],
    "correct_option_id": 0,
    "solution": "<p>The adverb is 'hard' and it is in the comparative degree, which means it compares one thing or person with another and shows that it has a higher or lower degree of quality. To change a sentence from the comparative degree to the superlative degree, we need to add -est to an adverb. The superlative degree shows that something or someone has the highest degree of quality among all the others in a group.</p><p>Hence, option (a) is the correct answer.</p><p>Option (b) is incoherent.</p><p>Options (c) and (d) are in positive degree.</p><p><b>Note:</b></p><p><b>Adjectives:</b> Words which are used with a noun/pronoun to describe or point out, the person, animal, place, or thing which the noun names, or to tell the number or quantity, are called Adjectives.</p><p>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Spot the error in the given sentence and select the correct sentence from the given options.</p><p>He believe that one's personality is determined mostly by genetics.</p>",
    "options": [
      "He believe that one's personality is determination mostly by genetics.",
      "He believe that one's personality is determination most by genetics.",
      "He believes that one's personality is determined mostly by genetics.",
      "He believe that one's personality is determined most by genetics."
    ],
    "correct_option_id": 2,
    "solution": "<p>'He' is a singular pronoun, so it must be followed by a singular verb ('believes', in the given context) as per the subject verb agreement rule. Also, a main verb follows a helping verb, a verb is qualified by an adverb, and a noun is qualified by an adjective, so all these rules are correctly followed in option (c) only. Hence, option (c) is correct.</p><p><b>NOTE/-</b></p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the appropriate option to replace the underlined word with adverb of time.</p><p>I went to school <u>neatly</u>.</p>",
    "options": [
      "regularly",
      "early",
      "occasionally",
      "periodically"
    ],
    "correct_option_id": 1,
    "solution": "<p>Among the options, the only word that is an adverb of time is option (b), 'early'. 'Regularly', 'occasionally' and 'periodically' are adverbs of frequency. 'Neatly' is an adverb of manner.</p><p>The correct sentence is: I went to school early.</p><p>Hence, the correct answer is option (b).</p><p>Note:</p><p><b>Adverb of Time: </b>It tells us when an action is done or occurs.</p><p>Examples: after, early, now, soon, then.</p><p><b>Adverb of Frequency:</b> It tells us how often an action is performed.</p><p>Examples: always, never, frequently, often, etc.</p><p><b>Adverb of Manner:</b> It tells us how an action is performed or how an event occurs.</p><p>Examples: walking briskly, listening quietly.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the sentence with the appropriate use of preposition.</p><p></p>",
    "options": [
      "Opportunity never knocks twice by any man's door.",
      "Opportunity never knocks twice in any man's door.",
      "Opportunity never knocks twice at any man's door.",
      "Opportunity never knocks twice upon any man's door."
    ],
    "correct_option_id": 2,
    "solution": "<p>The preposition 'at' and 'on' can be used in this type of sentence. Both 'knock at the door' and 'knock on the door' are correct.</p><p>Hence, option (c) is the correct answer. </p><p>By - We use 'by' meaning 'not later than' to refer to arrangements and deadlines.</p><p>In - expressing the situation of something that is or appears to be enclosed or surrounded by something else.</p><p>Upon - used to show that something happens soon after, and often because of, something else</p>",
    "question_index": 15
  },
  {
    "question": "<p><b> </b>Select the appropriate option to replace the underlined word with the adverb of time. </p><p>She is looking forward to the beach party which will be held <u>usually</u>. </p>",
    "options": [
      "Always",
      "Weekly",
      "Yearly",
      "Tomorrow"
    ],
    "correct_option_id": 3,
    "solution": "<p>In the given sentence, the speaker is describing the anticipation for a beach party. The word \"usually\" suggests that the party is typically held on a regular basis. However, since the question asks for an adverb of time, \"usually\" should be replaced with an appropriate adverb of time. Option (d) \"Tomorrow\" is the best choice as it provides a specific time reference, indicating that the beach party will take place on the day after the present time. Hence, (d) is the correct answer. </p><p>The other options are adverbs of frequency. </p><p>The final sentence would be: She is looking forward to the beach party which will be held tomorrow. </p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the sentence with the appropriate use of preposition. </p><p></p>",
    "options": [
      "What's the difference both cardiac arrest and a heart attack?",
      "What's the difference by cardiac arrest and a heart attack?",
      "What's the difference of cardiac arrest and a heart attack?",
