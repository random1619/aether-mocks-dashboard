        const questions = [
  {
    "question": "<p>In the following question, the first part of the sentence is fixed and the remaining three are jumbled. Rearrange the parts in the correct order so as to form a grammatically correct and meaningful sentence and mark the answer accordingly.</p><p>The company mainly</p><p>P. single-borrower corporate segment,</p><p>Q. which is riskier than the retail segment</p><p>R. operates in the large</p>",
    "options": [
      "RQP",
      "PQR",
      "RPQ",
      "PRQ"
    ],
    "correct_option_id": 2,
    "solution": "<p>R is the best choice for the second part as it completes the idea (operates) of what the company does. P follows R as the adjective 'large' correctly qualifies the noun 'single-borrower'. Thus, Q is the last part. RPQ is the correct arrangement.</p><p>The final sentence is: The company mainly operates in the large single-borrower corporate segment, which is riskier than the retail segment.</p><p>Hence, (c) is correct.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate order of the segments in the options that will fill in the blanks and make a coherent sentence.</p><p>Though Rahul prefers eating at home, __________ / __________ / __________ / __________.</p>",
    "options": [
      "he decided to try a new restaurant yesterday / so much so that / and to his delight, the food was exceptional / he plans to visit it again this weekend",
      "and to his delight, the food was exceptional / so much so that / he decided to try a new restaurant yesterday / he plans to visit it again this weekend",
      "he decided to try a new restaurant yesterday / and to his delight, the food was exceptional / so much so that / he plans to visit it again this weekend",
      "so much so that / he plans to visit it again this weekend / he decided to try a new restaurant yesterday / and to his delight, the food was exceptional"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct coherent sentence is:</p><p>\"Though Rahul prefers eating at home, he decided to try a new restaurant yesterday, and to his delight, the food was exceptional, so much so that he plans to visit it again this weekend.\"</p><p>First Segment: \"He decided to try a new restaurant yesterday\" introduces the action Rahul took.</p><p>Second Segment: \"And to his delight, the food was exceptional\" describes his reaction to the experience.</p><p>Third Segment: \"So much so that\" connects the previous statement to the consequence.</p><p>Fourth Segment: \"He plans to visit it again this weekend\" provides the conclusion of the narrative.</p><p>Option a): Incorrect because \"so much so that\" appears before \"and to his delight, the food was exceptional,\" disrupting the logical flow.</p><p>Option b): Incorrect because \"and to his delight, the food was exceptional\" precedes \"he decided to try a new restaurant yesterday,\" which disrupts the sequence of events.</p><p>Option d): Incorrect because \"so much so that\" comes at the beginning, which lacks proper context and makes the sentence illogical.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the correct option to form a meaningful sentence.</p><p>supporting (a)/ philanthropy contributes (b)/ opportunities for (c)/ and fostering (d)/ to alleviating global (e)/ innovative solutions (f)/ economic (g)/ disadvantaged (h)/ poverty by (i)/ communities (j)</p>",
    "options": [
      "b, e, i, a, f, d, g, c, h, j",
      "b, a, g, e, f, j, d, h, i, c",
      "b, c, f, j, i, a, g, h, e, d",
      "b, g, d, i, a, j, c, f, e, h"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct option is option a): b, e, i, a, f, d, g, c, h, j</p><p>The sentence formed is: \"Philanthropy contributes to alleviating global poverty by supporting innovative solutions and fostering economic opportunities for disadvantaged communities.\"</p><p><b>b) Philanthropy contributes</b> - The subject (\"Philanthropy\") and the verb (\"contributes\") are introduced, starting the sentence.</p><p><b>e) to alleviating global</b> - The preposition \"to\" introduces the action of alleviating global poverty, following the verb \"contributes.\"</p><p><b>i) poverty by</b> - This phrase completes the action by specifying what philanthropy contributes to, which is alleviating global poverty.</p><p><b>a) supporting</b> - This verb shows one way in which philanthropy helps to alleviate poverty.</p><p><b>f) innovative solutions</b> - This phrase follows and explains what is being supported: innovative solutions to global poverty.</p><p><b>d) and fostering</b>  -  'And' connects the two ways philanthropy helps alleviate poverty: supporting solutions and fostering something else.</p><p><b>g) economic</b> - This word is part of the phrase that explains what is being fostered: economic opportunities.</p><p><b>c) opportunities for</b> - This phrase specifies that the fostering is of opportunities, namely economic opportunities.</p><p><b>h) disadvantaged</b> - This adjective describes the communities for which economic opportunities are being fostered.</p><p><b>j) communities</b> - This is the object of the sentence, specifying which communities are being helped: disadvantaged communities.</p><p>This sequence provides a clear and coherent sentence.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Parts of a sentence are given below. While the first and the last parts (A and F) are in the correct order, the parts in between are jumbled up. Arrange the parts in the correct order to form a meaningful and coherent sentence.</p><p></p><p>A. Scientists</p><p>B. have developed</p><p>C. that</p><p>D. could revolutionize</p><p>E. a groundbreaking technology</p><p>F. renewable energy production.</p>",
    "options": [
      "B, C, E, D",
      "E, C, B, D",
      "C, B, E, D",
      "B, E, C, D"
    ],
    "correct_option_id": 3,
    "solution": "<p>A. Scientists - This introduces the subject of the sentence, which refers to a group of scientists.</p><p>B. have developed - This shows the action taken by the scientists, indicating that they have created or invented something.</p><p>E. a groundbreaking technology - This describes what the scientists have developed, emphasizing that it is an innovative and revolutionary technology.</p><p>C. that - This introduces a relative clause, indicating that what follows will provide additional information about the technology.</p><p>D. could revolutionize - This specifies the potential impact of the technology, suggesting that it has the capacity to bring about a significant change or transformation.</p><p>F. renewable energy production. - This specifies the particular area or field to which the technology's potential impact is related, indicating that it is in the realm of renewable energy production.</p><p>Therefore, the correct order is ABECDF.</p><p>Hence, option (d) is the correct answer. </p><p>The rearranged sentence is: Scientists have developed a groundbreaking technology that could revolutionize renewable energy production.</p><p><b>Note:</b></p><p><b>Relative Clause</b>: A relative clause is one that's connected to the main clause of the sentence by a word such as who, whom, which, that, or whose.</p><p>Example: He adopted a puppy that <b>had brown eyes and black fur.</b> The highlighted part is the relative clause.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p></p><p>A. routines as the gold standard for spending our time</p><p>B. hacks and packing the most into every day</p><p>C. that we often think of long-term, consistent</p><p>D. society has become so focused on productivity</p>",
    "options": [
      "DBCA",
      "CBDA",
      "BACD",
      "DCAB"
    ],
    "correct_option_id": 0,
    "solution": "<p>Part D has to come first because it describes the premise of the sentence and event that acts as a lead to the remaining parts. It is followed by part B in which the things that are too much focused by society are mentioned and how far they have penetrated our daily lives and how intricate things have become due to productivity routines are mentioned in the pair CA. So, it follows part B. Thus, the final order of the parts of the given sentence is DBCA.</p><p>The complete sentence is: Society has become so focused on productivity hacks and packing the most into every day that we often think of long-term, consistent routines as the gold standard for spending our time.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 4
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p></p><p>A. her wild subjects with an open</p><p>B. degree in science, Goodall says she observed</p><p>C. a secretarial student without an undergraduate</p><p>D. mind and without preconceptions</p>",
    "options": [
      "CBAD",
      "DBCA",
      "DACB",
      "CADB"
    ],
    "correct_option_id": 0,
    "solution": "<p>Parts CB make a pair and it describes the subject, 'Goodall'. This has to come first so that the remaining parts make a meaningful order. The pair is followed by part A which denotes the thing that the subject observes in the sentence and the manner in which she does is given in part D. So, it is the last part. Thus, the final order of the parts of the given sentence is CBAD.</p><p>The complete sentence is: A secretarial student without an undergraduate degree in science, Goodall says she observed her wild subjects with an open mind and without preconceptions.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 5
  },
  {
    "question": "<p>Parts of a sentence are given below. While the first and the last parts (S1 and S6) are in the correct order, the parts in between are jumbled up. Arrange the parts in the correct order to form a meaningful and coherent sentence. </p><p></p><p>S1) A fasting glucose tolerance test </p><p>A) from an impairment of sugar metabolism, </p><p>B) about decreased tolerance to sugar </p><p>C) in persons suffering </p><p>D) can convey important information </p><p>S6) such as diabetes mellitus.</p>",
    "options": [
      "CBAD",
      "BACD",
      "DBCA",
      "DCAB"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct order to form a coherent paragraph/sentence is DBCA. S1 introduces the topic of the fasting glucose tolerance test. Part D follows the introduction of the test and emphasises the significance of the test by highlighting its ability to provide important information. Part B logically follows, explaining one of the key aspects evaluated during the test - decreased tolerance to sugar. Part C provides context by specifying that the test applies to individuals who are suffering from a certain condition. Part A follows part C as it names the condition (an impairment of sugar metabolism). Finally, S6 concludes the paragraph by giving an example of the condition that the fasting glucose tolerance test can detect - diabetes mellitus. </p><p>Part A (\"from an impairment of sugar metabolism\") and S6 (\"such as diabetes mellitus\") form a logical pair because they complement each other. Part A names a condition/health issue and S6 gives an example of that condition. In option (c), part A is placed at last to form a pair with S6. Hence, (c) is the correct answer.</p><p>The sentence formed is: A fasting glucose tolerance test can convey important information about decreased tolerance to sugar in persons suffering from an impairment of sugar metabolism, such as diabetes mellitus.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Rearrange the parts of the sentence in correct order.</p><p>Jobseekers are not</p><p>P. being unemployed are a test of faith</p><p>Q. self-purification, where the difficulties of</p><p>R. relentlessly to a pilgrimage of</p><p>S. fatalistic but reapply themselves</p>",
    "options": [
      "SPQR",
      "PQSR",
      "SRQP",
      "RPSQ"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct order is SRQP.</p><p>The phrase P mentions the plural verb 'are'. Therefore, it must agree with a plural noun. Q mentions the plural noun 'difficulties'. The pair QP is grammatically and contextually correct. Phrase R mentions the adverb 'relentlessly' (in an unceasingly intense or harsh way). It should qualify a verb/adjective/adverb. It can be used to qualify the verb 'reapply'. Therefore, the pair SR is grammatically and contextually correct. Using these pairs, we can conclude that option (c) is the correct answer.</p><p><b>The correct sentence after rearrangement is:</b> Jobseekers are not fatalistic but reapply themselves relentlessly to a pilgrimage of self-purification, where the difficulties of being unemployed are a test of faith.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Rearrange the parts of the sentence in correct order.</p><p>We have been</p><p>P. able to identify certain patterns in</p><p>Q. the microbiome and immune response</p><p>R. that are clearly linked to the progression and</p><p>S. severity of brain injury</p>",
    "options": [
      "PQSR",
      "QPSR",
      "RSPQ",
      "PQRS"
    ],
    "correct_option_id": 3,
    "solution": "<p>The given parts of the sentence are correctly arranged in the order they are given [PQRS] and do not require any rearrangement.</p><p>The correct sentence is: We have been able to identify certain patterns in the microbiome and immune response that are clearly linked to the progression and severity of brain injury.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in correct order to form a meaningful sentence. </p><p>Our customers comfortable / endeavour to make / it will be the company's.</p>",
    "options": [
      "Endeavour to make our customers comfortable it will be the company's.",
      "It will be the company's our customers comfortable endeavour to make.",
      "Endeavour to make it will be the company's our customers comfortable.",
      "It will be the company's endeavour to make our customers comfortable."
    ],
    "correct_option_id": 3,
    "solution": "<p>Option (d) represents the correct sentence. The third part ends with the possessive noun \"company's\" which requires a noun after it. Only the second part can follow this as it starts with the noun 'endeavour'. The first part follows this as it conveys what the company's endeavour is. </p><p>Hence, option (d) is the correct answer. </p><p><b>The correct sentence is</b>: It will be the company's endeavour to make our customers comfortable.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p></p><p>a) around the city.</p><p>b) sailing, swimming, jet skiing,</p><p>c) all available activities</p><p>d) parasailing and hiking are</p>",
    "options": [
      "b,a,d,c",
      "d,c,a,b",
      "c,a,b,d",
      "b,d,c,a"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence talks about adventure activities. 'b' is the opening part of the sentence as it introduces the various activities which continue in part 'd' as well; so, 'd' will be the next part of the sentence. Part 'c' talks more about the availability of these activities and the place where they are done is mentioned in part 'a', so 'c' and 'a' would be the third and fourth parts of the sentence, respectively. </p><p>The correct sequence of the parts of the sentence is b,d,c,a.</p><p>The sentence is  - <i> <b>\"Sailing, swimming, jet skiing, parasailing and hiking are all available activities around the city.\"</b></i></p><p>Hence, option (d) is correct.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Parts of a sentence are given below. While the first and the last parts (S1 and S6) are in the correct order, the parts in between are jumbled up. Arrange the parts in the correct order to form a meaningful and coherent sentence.</p><p></p><p>S1. In today's interconnected world, </p><p>A. and unparalleled access to a vast array </p><p>B. communication, global information exchange </p><p>C. of knowledge, transforming the way</p><p>D. the internet facilitates instant </p><p>S6. we live and interreact. </p>",
    "options": [
      "DBAC",
      "ABDC",
      "BDAC",
      "CABD"
    ],
    "correct_option_id": 0,
    "solution": "<p>S1 introduces the context of the interconnected world and sets the tone for the paragraph. <b>Part D </b>provides a specific aspect of the interconnected world, focusing on the internet's role in enabling instant communication. Part D is followed by <b>part B</b> because it elaborates on the idea of communication introduced in part D. Also, 'instant' in part D is an adjective and would appropriately be followed by the noun 'communication' in part B. So, DB is a mandatory pair. Part B mentions the global exchange of information, further expanding on the topic. Part B leads to <b>part A</b> as it provides additional information about the global exchange of information, which includes unparalleled access to a wide variety of knowledge. Part A naturally flows into <b>part C</b> as it talks about unparalleled access to knowledge. Part C then discusses how this access to knowledge is transforming the way things work. The sentence concludes with S6, which summarizes the overall impact of the interconnected world on the way we live and interact. Rearranging parts in the order of DBAC forms a coherent sentence. Hence, (a) is the correct answer. </p><p>The final sentence would be: In today's interconnected world, the internet facilitates instant communication, global information exchange, and unparalleled access to a vast array of knowledge, transforming the way we live and interact. </p>",
    "question_index": 11
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful and coherent sentence.</p><p>A. Consumption of food prepared</p><p>B. An important food-related </p><p>C. Is the increase in </p><p>D. Lifestyle change of the past two decades </p><p>E. Away from home</p>",
    "options": [
      "BDCAE",
      "DECBA",
      "DBCEA",
      "EACDB"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct order to form a meaningful and coherent sentence is BDCAE. Part B comes first as it sets the context that the sentence will discuss something related to food. Part D follows logically because it specifies what kind of change or trend related to food is being discussed. It introduces the main topic of the sentence, which is the change in lifestyle over the past two decades (Accordingly, BD forms a logical pair). Part C logically follows D because it continues the thought about the lifestyle change introduced in D. It suggests that there has been an increase in something related to this change. Part A then specifies what has increased (consumption of food) as mentioned in C. It talks about the consumption of food that is prepared in a certain manner or location. Part E concludes the sentence by specifying where the food is prepared (away from home). Hence, (a) is the correct answer. </p><p><b>The complete sentence is: </b>An important food-related lifestyle change of the past two decades is the increase in consumption of food prepared away from home.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful and coherent sentence.</p><p>With an alternative vision / properly and go to students / the teachers have to coordinate</p>",
    "options": [
      "With an alternative vision the teachers have to coordinate properly and go to students.",
      "The teachers have to coordinate with an alternative vision properly and go to students.",
      "The teachers have to coordinate properly and go to students with an alternative vision.",
      "Properly and go to students with an alternative vision the teachers have to coordinate."
    ],
    "correct_option_id": 2,
    "solution": "<p>'Properly' is an adverb which is used to qualify a verb. In the given sentence 'coordinate' is a verb. Option (d) is eliminated as the sentence is grammatically incorrect. In other options, the adverb qualifies the verb. The phrase 'with an alternative solution' cannot be at the beginning of the sentence. So, option (a) is also eliminated. Option (b) is eliminated as the phrase 'coordinate with an alternative vision' doesn't provide a coherent meaning. Among the given options, option (c) represents the correct sentence.</p><p>Hence, option (c) is the correct sentence.</p><p><b>The correct sentence is</b>: The teachers have to coordinate properly and go to students with an alternative vision.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Parts of a sentence are given below. While the first and the last parts (A and F) are in the correct order, the parts in between are jumbled up. Arrange the parts in the correct order to form a meaningful and coherent sentence.</p><p></p><p>A. Climate change</p><p>B. to global food security</p><p>C. poses</p><p>D. according to</p><p>E. significant challenges</p><p>F. a recent report.</p>",
    "options": [
      "D, C, B, E",
      "C, E, B, D",
      "B, D, C, E",
      "E, C, B, D"
    ],
    "correct_option_id": 1,
    "solution": "<p>A. Climate change - This introduces the subject of the sentence, specifying the phenomenon being referred to.</p><p>C. poses - This indicates the action or effect caused by climate change, suggesting that it presents challenges or difficulties.</p><p>E. significant challenges - This describes the specific impact of climate change, emphasizing that they are substantial or noteworthy challenges.</p><p>B. to global food security - This specifies the domain or field to which the challenges are related, indicating that they affect the security or availability of food on a global scale.</p><p>D. according to - This introductory phrase indicates the source or reference from which the information is derived.</p><p>F. a recent report. - This specifies the specific source of information, namely a report that was recently published.</p><p>Therefore, the correct order is ACEBDF.</p><p>Hence, option (b) is the correct answer. </p><p>The rearranged sentence is: Climate change poses significant challenges to global food security, according to a recent report.</p>",
    "question_index": 14
