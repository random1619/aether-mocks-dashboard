<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the option that expresses the given sentence in present indefinite tense. </p>",
    "options": [
      "He sends messages to his friends every day.",
      "He sent messages to his friends every day.",
      "He will send messages to his friends every day.",
      "He used to send messages to his friends every day."
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct option that expresses the given sentence in the present indefinite tense is (a).</p><p>The present indefinite tense, also known as the present simple tense, is used to describe actions that are habitual, routine, or generally true. It is formed by using the base form of the verb for most subjects, with the third person singular (he, she, it) adding an -s to the verb.</p><p>Subject: \"He\" (pronoun indicating the person who performs the action)</p><p>Verb: \"sends\" (base form of the verb with the added -s for the third person singular)</p><p>Object: \"messages to his friends every day\" (what is being sent and how often)</p><p>b) - simple past tense [sent]</p><p>c) - simple future tense [will send]</p><p>d) - simple past tense [used to send]</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that expresses the given sentence in future tense form. </p><p>The traffic signal changed to red before we reached the intersection.</p>",
    "options": [
      "The traffic signal was changed to red before we reached the intersection.",
      "The traffic signal changes to red before we reach the intersection.",
      "The traffic signal had changed to red before we reached the intersection.",
      "The traffic signal will change to red before we reach the intersection."
    ],
    "correct_option_id": 3,
    "solution": "<p>To convert the given sentence (simple past tense) into future tense, we need to focus on altering the verb to reflect an action that will happen in the future. The correct future tense form should use \"will\" to indicate a future action. Option (d) option correctly uses \"will change\" to indicate a future action. Hence, (d) is the correct answer.</p><p>(a)  -  past tense form (was changed) </p><p>(b)  -  present tense form (changes) </p><p>(c)  -  past perfect tense form (had changed) </p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that expresses the given sentence in past tense form. </p><p>She is booking tickets online for the concert happening on the weekend.</p>",
    "options": [
      "She was booking tickets online for the concert happening on the weekend.",
      "She books tickets online for the concert happening on the weekend.",
      "She will book tickets online for the concert happening on the weekend.",
      "She will be booking tickets online for the concert happening on the weekend."
    ],
    "correct_option_id": 0,
    "solution": "<p>To convert the given sentence into the past tense, we need to identify the appropriate past tense form of the verb and the context in which it fits. The given sentence uses the present continuous tense (\"is booking\"). To express this action in the past, we change it to the past continuous tense, which is \"was booking.\" This correctly reflects that the action was ongoing in the past. Hence, (a) is the correct answer. </p><p>(b): simple present tense (books)</p><p>(c): simple future tense (will book)</p><p>(d): future continuous tense (will be booking)</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that expresses the given sentence in present tense form. </p><p>The football team will prepare for the upcoming match with rigorous training sessions.</p>",
    "options": [
      "The team was preparing for the upcoming match with rigorous training sessions.",
      "The team prepared for the upcoming match with rigorous training sessions.",
      "The team was prepared for the upcoming match with rigorous training sessions.",
      "The team prepares for the upcoming match with rigorous training sessions."
    ],
    "correct_option_id": 3,
    "solution": "<p>The given sentence uses the future tense (\"will prepare\"). To convert it into the present tense, we can replace \"will prepare\" with \"prepares.\" Option (d) is in the present tense. It correctly reflects the action happening currently or regularly. Hence, (d) is the correct answer. </p><p>(a): past continuous tense (was preparing)</p><p>(b): simple past tense (prepared)</p><p>(c): simple past tense (in passive voice) (was prepared)</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the appropriate option for the given blank.</p><p>He was looking forward to _____ with the new government.</p>",
    "options": [
      "work",
      "be worked",
      "working",
      "works"
    ],
    "correct_option_id": 2,
    "solution": "<p>The phrase 'looking forward to' is always followed by a gerund. Therefore, 'working' is the only gerund here and the correct choice among the given options.</p><p>a) - base verb</p><p>b) - second form verb</p><p>d) - third person singular verb</p><p>Hence, option (c) is the correct answer.</p><p>The correct sentence is: He was looking forward to working with the new government.</p><p>Note:</p><p>A gerund is a verb form that ends in \"-ing\" and functions as a noun. For example, \"swimming\" is a gerund in the sentence \"I have always enjoyed swimming\".</p>",
    "question_index": 4
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error. </p><p>I think that he must have fall upon some bushes and vines that grew in some parts of the chasm.</p>",
    "options": [
      "I think that he must",
      "have fall upon",
      "some bushes and vines",
      "that grew in some"
    ],
    "correct_option_id": 0,
    "solution": "<p>The verbs 'has, have, had' are followed by past participles when the sentence is in active voice.</p><p>So, the use of 'fall' is incorrect. </p><p>The correct sentence is- <b><i>I think that he must have fallen upon some bushes and vines that grew in some parts of the chasm.</i></b></p><p>Hence, option (a) is correct. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the appropriate option for the given blank-</p><p>Water _____ at 0 degrees Celsius.</p>",
    "options": [
      "Freezes",
      "Freezed",
      "Frozen",
      "Freeze"
    ],
    "correct_option_id": 0,
    "solution": "<p>It is a fact about water. So, the use of 'freezes' is correct as present indefinite tense. </p><p>The correct sentence is- <b><i>Water freezes at 0 degrees Celsius.</i></b></p><p>Hence, option (a) is correct. </p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the appropriate option for the given blank-</p><p>He is standing at the edge of the dance floor and is not ________.</p>",
    "options": [
      "Dance",
      "Dances",
      "Danced",
      "Dancing"
    ],
    "correct_option_id": 3,
    "solution": "<p>As per the syntax of present continuous tense- Subject+ is/am/are + not + verb +ing. </p><p>We have to follow the rule of parallelism here as the two actions 'standing on the edge' and 'not dancing' are joined by the conjunction 'and'. </p><p>The use of 'dancing' is appropriate. </p><p>The correct sentence is- <b><i>He is standing at the edge of the dance floor and is not dancing.</i></b></p><p>Hence, option (d) is correct. </p><p><b>Note: Parallelism:</b> In grammar, parallelism, also known as parallel structure or parallel construction, is a balance within one or more sentences of similar phrases or clauses that have the same grammatical structure. Given below is an example which shows a sentence in two forms (parallel in structure and lacking parallelism): Lacking parallelism: Prerna likes cooking, dancing and to sing. Parallel: Prerna likes cooking, dancing and singing.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Which of the following can be used as an example of Future continuous tense?</p>",
    "options": [
      "I was studying for my exam.",
      "My friend calls me for no reason.",
      "He might have lost the match.",
      "We will be coming to your place."
    ],
    "correct_option_id": 3,
    "solution": "<p>The syntax of future continuous tense- Subject +will/shall +be+ verb +ing. </p><p>The correct example of Future continuous tense is - <b><i>We will be coming at your place.</i></b> </p><p>Hence, option (d) is correct.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Which of the following tenses is illustrated in the given sentence-</p><p><b>Will you submit the report to us today?</b></p>",
    "options": [
      "Future perfect tense",
      "Future perfect continuous tense",
      "Future indefinite tense",
      "Future continuous tense"
    ],
    "correct_option_id": 2,
    "solution": "<p>As per the syntax of Future indefinite tense- <i>will/shall + Subject +Verb 1<sup>st</sup> form</i><i></p><p></i>The above example is in the future indefinite tense.</p><p>Hence, option (c) is correct.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select No improvement required.</p><p>He asked his children where <u>had they gone</u>.</p>",
    "options": [
      "They had go",
      "They had gone",
      "They did gone",
      "No improvement required"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Helping verb' comes before the subject in an interrogative sentence. Since this sentence is not an interrogative sentence, 'had' will come after the subject. </p><p>Options (c) and (d) are incorrect as the verbs 'do, does, did' are followed by base verb.</p><p>The correct sentence is - <b><i>He asked his children where they had gone.</i></b></p><p>Hence, option (b) is correct.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Which of the following can be used as an example of Present perfect continuous tense?</p>",
    "options": [
      "Are you studying for your exam?",
      "They have been working on the project for a week now.",
      "He played basketball.",
      "I had waited for the bus for half an hour."
    ],
    "correct_option_id": 1,
    "solution": "<p>The syntax of Present perfect continuous tense - Subject +has/have +been +Verb +ing </p><p>Therefore, the correct example is- <b><i>They have been working on the project for a week now.</i></b></p><p>Hence, option (b) is correct. </p>",
    "question_index": 11
  },
  {
    "question": "<p>In the following question, a sentence is given with a phrase highlighted in bold. Select the option given below that can replace the phrase in bold to make the sentence grammatically and contextually correct and mark that as your answer. If the sentence is correct as it is, mark 'No correction required', as the answer. </p><p>He <b>did not agreed</b> to what was recommended by the committee.</p>",
    "options": [
      "does not agreed",
      "do not agree",
      "did not agree",
      "No correction required"
    ],
    "correct_option_id": 2,
    "solution": "<p>In the phrase given in bold, the past participle form of verb 'agreed', incorrectly follows the verb 'did'. The verb that follows the verb 'did' has to be only in the base form. Among the given options, option (c) 'did not agree' is the correct phrase that can replace the incorrect phrase in the sentence.</p><p>The correct sentence is: He did not agree to what was recommended by the committee.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 12
  },
  {
    "question": "<p>In the following question, a sentence is given with a phrase highlighted in bold. Select the option given below that can replace the phrase in bold to make the sentence grammatically and contextually correct and mark that as your answer. If the sentence is correct as it is, mark 'No correction required', as the answer. </p><p>We <b>will be looking</b> for this particular type of cloth, since yesterday.</p>",
    "options": [
      "would be looking",
      "was looking",
      "were looking",
      "No correction required"
    ],
    "correct_option_id": 2,
    "solution": "<p>The phrase given in bold does not match the tense of the sentence. The given sentence is in Past tense 'yesterday' and 'will' denotes future tense. Among the given options, the phrase that can replace the incorrect phrase in the given sentence is option (c), 'were looking'.</p><p>The correct sentence is: We were looking for this particular type of cloth, since yesterday.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 13
  },
  {
    "question": "<p>In the following question, a sentence is given with a phrase highlighted in bold. Select the option given below that can replace the phrase in bold to make the sentence grammatically and contextually correct and mark that as your answer. If the sentence is correct as it is, mark 'No correction required', as the answer. </p><p>Simran <b>is liking</b> painting when she was young. </p>",
    "options": [
      "liked",
      "was liking",
      "had been liking",
      "No correction required"
    ],
    "correct_option_id": 0,
    "solution": "<p>As per the tense rule, 'past infinite' is used to describe a past habit or interest. So, the use of 'liked' will be correct to describe the likeness of the paintings. </p><p>The correct sentence is- 'Simran liked painting when she was young.'</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 14
  },
  {
    "question": "<p>Identify the tense used in the following sentence. </p><p>The teacher went to see her doctor when she had a headache.</p>",
    "options": [
      "Present Simple",
      "Past Simple",
      "Present Continuous",
      "Present Perfect"
    ],
    "correct_option_id": 1,
    "solution": "<p>The format of Past Simple Tense is Subject + Verb 2. Here, 'The teacher' is the subject and 'went' is the second form of the verb 'go'. Hence, (b) is the correct answer. </p>",
    "question_index": 15
  },
  {
    "question": "<p>Fill in the blank with the verb in the Future Perfect Tense. </p><p>The teacher ____ our answer books. </p>",
    "options": [
      "Will have marked",
      "Will be marking",
      "Will have been marking",
      "Will mark"
    ],
    "correct_option_id": 0,
    "solution": "<p>The format of Future Perfect Tense is  -  Subject + will + have + V3 (past participle). Hence, (a) is the correct answer. </p><p>The final sentence would be: The teacher will have marked our answer books. </p>",
    "question_index": 16
  },
  {
    "question": "<p>Fill in the blank with the suitable verb in the Simple Past Tense. </p><p>The fox _______ anything to eat that evening. </p>",
    "options": [
      "Did not found",
      "Not found",
      "Did not find",
      "Finds"
    ],
    "correct_option_id": 2,
    "solution": "<p>The format of Simple Past Tense in case of a negative sentence is  -  Subject + did + not + V1. Hence, (c) is the correct answer. </p><p>The final sentence would be: The fox did not find anything to eat that evening. </p>",
    "question_index": 17
  },
  {
    "question": "<p>In the following question, a sentence is given, divided into three parts, which may or may not contain an error. Mark the option containing the part with the error. If the sentence is error free, mark 'No error' as the answer. </p><p>Raju has(A)/ passed the matriculation (B)/ examination in 1999(C). </p>",
    "options": [
      "A",
      "B",
      "C",
      "No error"
    ],
    "correct_option_id": 0,
    "solution": "<p>Part A has an error. The given sentence talks of a specific time, i.e., 1999 in the past. So, the use of the Present Perfect tense 'has passed' is incorrect and hence it should be made Simple Past tense [passed] by removing 'has' from the sentence, which rectifies the error. Hence, (a) is the correct answer. </p><p>The final sentence would be: Raju passed the matriculation examination in 1999. </p>",
    "question_index": 18
  },
  {
    "question": "<p>In the following question, a sentence is given, divided into three parts, which may or may not contain an error. Mark the option containing the part with the error. If the sentence is error free, mark 'No error' as the answer. </p><p>Aeon has (A)/ not do his homework (B)/ from school yet(C). </p>",
    "options": [
      "No error",
      "C",
      "A",
      "B"
    ],
    "correct_option_id": 3,
    "solution": "<p>Part B has an error. The verb used after 'has' should always be in the past participle form. So, the present tense verb 'do' is to be replaced by the past participle verb 'done' in order to rectify the error. Hence, (d) is the correct answer. </p><p>Past participle is the form of a verb, typically ending in -ed in English, which is used in forming perfect and passive tenses. </p><p>The final sentence would be: Aeon has not done his homework from school yet.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
