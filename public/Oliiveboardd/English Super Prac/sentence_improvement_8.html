    <script>
        const questions = [
  {
    "question": "<p>A sentence/a part of the sentence is underlined. Four alternatives are given to the underlined part which will improve the sentence. Choose the correct alternative and click the button corresponding to it. In case no improvement is needed, click the button corresponding to \"No improvement\".</p><p>Is there any way we can reschedule the appointment <u>at Tuesday</u>?</p>",
    "options": [
      "in Tuesday",
      "with Tuesday",
      "for Tuesday",
      "No Improvement"
    ],
    "correct_option_id": 2,
    "solution": "<p>'At' is not used to refer to days (on should have been used instead). 'In' means inside something, which is not grammatically correct to use with days of a week. 'With' means accompanied by. A day cannot accompany something. 'For Tuesday' means that the appointment is to be held on Tuesday. This is grammatically correct, making C the right answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option to improve the underlined segment in the given sentence. If there is no need to improve it, select 'No improvement'.</p><p>The hunter said to <u>look over</u> for the trap.</p>",
    "options": [
      "look into",
      "No improvement",
      "look on",
      "look out"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183;<b>\"look out\"</b> is a phrase that is suitable here.</p><p>&#183;<b>Look out:</b> watch out or be careful.</p><p>&#183;This is in context to the hunter who said to be careful from the trap.</p><p>&#183;<b>\"look out\"</b> should replace <b>\"look over\".</b></p><p>&#183;Therefore, the correct answer is: <b>(d) look out.</b></p><p>&#183;The corrected form of the sentence is: The hunter said to <u>look out</u> for the trap.</p><p>Additional Information:</p><p>&#183;The meanings of the rest of the phrases are given below:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Phrasal verb</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Look into</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">investigate a matter</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Look on</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">to see as a spectator</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Look over</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">examine carefully</td></tr></table></p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that can substitute the underlined word in the given idiom. If no substitution is required, select 'No substitution required'. </p><p>A taste of your own <u>drink</u>.</p>",
    "options": [
      "Juice",
      "No substitution required",
      "Cooking",
      "Medicine"
    ],
    "correct_option_id": 3,
    "solution": "<p>The given idiom is \"A taste of your own drink.\" The underlined word here is \"drink\", which needs to be replaced by the word 'medicine'. </p><p>The idiom \"A taste of your own medicine\" means experiencing the same harmful or unpleasant thing that one has been doing to others. It's a metaphorical way of saying that someone is being treated the way they have treated others.</p><p>Hence, (d) is the correct answer. </p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option to improve the underlined segment in the given sentence. If there is no need to improve it, select 'No improvement'.</p><p>The farmer tried to <u>make peaceful</u> between them, but he could not.</p>",
    "options": [
      "making peace",
      "make peace",
      "make peacefully",
      "No Improvement"
    ],
    "correct_option_id": 1,
    "solution": "<p>The base form of the verb 'make' should be used with the infinitive construction 'to + verb', so A is incorrect. C and D are incorrect as the noun 'peace' should be used in place of the adjective 'peaceful' or the adverb 'peacefully'. B is the right answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>It takes nothing but common sense to understand that one should do <u>his duty himself.</u></p>",
    "options": [
      "His duty oneself",
      "One's duty himself",
      "One's duty oneself",
      "No substitution"
    ],
    "correct_option_id": 2,
    "solution": "<p>If 'one' is used as the subject, nominative case 'one' and objective pronoun 'oneself' is used. So, 'one's duty oneself' is the appropriate phrase.</p><p>Hence, option (c) is the correct choice.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the word segment that substitutes (replaces) the bracketed word segment correctly and completes the sentence meaningfully.</p><p>Sapna and Suman (was best friends) at the start of the session but now they have grown to be rivals.</p>",
    "options": [
      "Were best friends",
      "Have to be best friends",
      "Will best friends",
      "Is best friends"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct option that completes the sentence is (a). In the original sentence, 'Sapna and Suman' is a plural subject, so the verb that follows should be in the plural form to agree with the subject. 'Were' is the correct past tense plural form of the verb 'to be' for the subject 'Sapna and Suman'. Option (b) does not accurately represent the past tense of the verb and does not fit the context of the sentence. Option (c) is in the future tense and does not accurately reflect the past tense of the verb needed for this sentence. Option (d) is not the appropriate verb form for the plural subject and is also not in the correct tense. Hence, (a) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the alternative that will improve the underlined part of the sentence. In case there is no improvement required, select 'No improvement'.</p><p><b><u>Me and Daksha</u></b> are planning to start a company.</p>",
    "options": [
      "I and Daksha",
      "Daksha and I",
      "Myself and Daksha",
      "No improvement"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, the error in the underlined part is that 'me' is an object pronoun and is used as a subject pronoun. A similar mistake is made in option (c) i.e. using the subject pronoun instead of the object pronoun or vice versa.</p><p>Whenever two pronouns are used as subjects, the second/third-person pronoun (He/she/they/you) precedes the 'first' person pronoun (I/We) in a positive sentence.</p><p>Hence, (b) is correct.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>He usually <u>sits besides</u> Vicky in class.</p>",
    "options": [
      "sits beside",
      "sit besides",
      "sitting beside",
      "No improvement required"
    ],
    "correct_option_id": 0,
    "solution": "<p>The meaning of the word 'besides' is 'in addition to' or 'apart from'. The sentence is about a person who sits regularly at a place and that place is described with respect to the position of Vicky. The correct word to denote the position is 'beside' which means 'at the side of' or 'next to'. Options b) and d) are eliminated because of the incorrect usage of the word 'besides'. Option c) is eliminated because it is incomplete. The present participle verb 'sitting' requires the auxiliary verb 'is' before it to form the correct tense structure of the present continuous tense.</p><p>From the given options, the one that is in the correct form is option (a) 'sits beside'.</p><p>Hence, the correct answer is option (a).</p><p><b>Note:-</b></p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the bracketed segment in the given sentence. </p><p>Personal growth (transforming) lives profoundly.</p>",
    "options": [
      "Was transform",
      "Is transform",
      "Transforms",
      "Are transformed"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Transforming' (-ing form of verb) requires a helping verb before it which is absent in the given sentence.</p><p>Options (a) and (b) are incorrect as the verb following the helping verbs 'was' and 'is' should either be a past participle (V3) or a present participle verb (V4, i.e., the -ing form of the verb), but 'transform' is a base verb.</p><p>Option (d) is incorrect as it incorrectly uses the plural verb 'are' for the singular subject 'personal growth'.</p><p>Option (c) correctly uses the singular present tense verb \"transforms,\" which agrees with the singular subject \"personal growth.\" This choice effectively conveys the idea that personal growth is an ongoing process that has a profound impact on lives. It is the most suitable choice as it maintains subject-verb agreement. Hence, (c) is the correct answer.</p><p>The final sentence: Personal growth transforms lives profoundly.</p><p>The rest of the options form grammatically incorrect sentences.</p><p><b>Note: Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p><p>A participle is a word derived from a verb that can be used as an adjective or to form certain verb tenses. There are two main types of participles:</p><p></p><p>Past participles (typically ending in -ed, -en, -n, -ne, or -t) are used for perfect tenses and passive voice constructions.</p><p>Present participles (always ending in -ing) are used for continuous tenses.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the word segment that substitutes (replaces) the bracketed word segment correctly and completes the sentence meaningfully.</p><p>When the escaped convict (were apprehended by the authorities), he was hiding in an abandoned warehouse.</p>",
    "options": [
      "Was apprehended by the authorities",
      "Is apprehended from the authorities",
      "Was apprehend by the authorities",
      "Are apprehended by the authorities"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct option that completes the sentence is (a). The original sentence is in the past tense, indicated by the word 'was' before the verb 'hiding'. Therefore, the correct form of the verb should also be in the past tense. 'Was apprehended' is the correct past tense form of the verb 'apprehend' for the third-person singular subject 'the escaped convict'. The other options do not provide the correct verb form or subject-verb agreement. Option (b) uses the present tense 'is apprehended' instead of the correct past tense 'was apprehended'. Option (c) does not use the correct past tense form of the verb 'apprehend'. Option (d) uses the present tense 'are apprehended' instead of the correct past tense 'was apprehended'. Hence, (a) is the correct answer.</p><p><b>NOTE: </b></p><p>Subject-verb agreement means that a subject and its verb must be both singular or both plural:</p><p>A singular subject takes a singular verb.</p><p>A plural subject takes a plural verb.</p><p>For example, in the sentence 'John lives in France', the subject John (singular 'he') 'agrees with' the third person singular form of the verb to live  -  lives.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement'.</p><p>Sachin Tendulkar is by far the <u> great</u> player of cricket in the world.</p>",
    "options": [
      "very great",
      "greatest",
      "great ever",
      "No Improvement"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct sentence is 'Sachin Tendulkar is by far the greatest player of cricket in the world'. 'By far' is used to make superlative degrees sound more stronger, so 'by far' should be followed by the superlative degree.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement'.</p><p>On next Thursday, I <u>have been</u> here for six months.</p>",
    "options": [
      "will have been",
      "would have been",
      "had been",
      "No improvement"
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence refers to a completed action in the future. In this case, we need to use Future Perfect Tense. When we use this tense we are projecting ourselves forward into the future and looking back at an action that will be completed sometime later than now. Hence, 1 is correct</p>",
    "question_index": 11
  },
  {
    "question": "<p>A part of the sentence is underlined. Below are given alternatives to the underlined part which may improve the sentence. Choose the correct alternative. In case no improvement is required, choose \"<b><u>No Improvement</u></b>\" option.</p><p>The school where I studied is just <u>a two-miles walk</u> away.</p>",
    "options": [
      "a two-miles walks",
      "a two-mile walk",
      "two-miles walk",
      "No improvement"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Two-miles walk' should be replaced by 'Two-mile walk' because walk is the noun and 'two-mile' is an adjective for walk. C is rejected because of the missing article 'a'. A is rejected as the correct form to be used here is 'walk'(noun) and not 'walks'(verb).</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>He <u>brought</u> her an engagement ring that was worth five thousand dollars.</p>",
    "options": [
      "fetched",
      "bought",
      "purchased",
      "No improvement required"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Fetched' means to bring something from somewhere. This is not suitable in the given context as an engagement ring is bought, not fetched. Similarly, 'brought' is the past tense of 'bring', which makes it the wrong answer. 'Purchased' is contextually correct, but grammatically incorrect as it should be followed by the preposition 'for'. B is the right answer, as 'bought' is the past tense of 'buy', which fits here.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>In the case of an emergency, please (contacting) Amy.</p>",
    "options": [
      "contacted",
      "contact",
      "contacts",
      "No improvement required"
    ],
    "correct_option_id": 1,
    "solution": "<p>As the sentence is talking about an action that might be taken in the future, the base form of the verb 'contact' should be used here. Hence, the answer is option b).</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined word in the given sentence. If there is no need to substitute it, select 'No substitution required'.</p><p>I played a <u>paradox</u> on my sister by hiding fake spiders in her room.</p>",
    "options": [
      "Foul",
      "Riddle",
      "No substitution required",
      "Prank"
    ],
    "correct_option_id": 3,
    "solution": "<p>The word \"paradox\" doesn't accurately convey the intended meaning in the context of the sentence. A \"paradox\" is a concept or statement that seems contradictory or goes against common belief, yet it might be true or logical within a specific context. In contrast, the sentence implies that the speaker played a trick or a practical joke on his/her sister by hiding fake spiders in her room. This action aligns more with the concept of a \"prank\" rather than a \"paradox.\" A prank involves a playful or mischievous act intended to trick, amuse, or surprise someone, typically in a light-hearted manner. Accordingly, 'prank' is a suitable word to replace 'paradox'. 'Foul' refers to something that is offensive, unpleasant, or morally unacceptable. However, in the context of the sentence, the act of hiding fake spiders as a joke on the sister doesn't necessarily imply anything offensive or morally wrong. Therefore, \"foul\" doesn't appropriately replace \"paradox\" in this context. A 'riddle' is a type of puzzle or enigmatic question that requires thought or cleverness to solve. However, the sentence is describing an action, not a puzzle or a question posed to someone. So, \"riddle\" isn't the appropriate replacement for \"paradox\" in this context. Hence, (d) is the correct answer. </p><p>The revised sentence is: I played a prank on my sister by hiding fake spiders in her room.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>Manju Kapur was 55 years old when her &#64257;rst novel &#8220;Difficult Daughters&#8221; <u>had been published</u> by Harper Collins.</p>",
    "options": [
      "was published",
      "had published",
      "has been published",
      "No improvement required"
    ],
    "correct_option_id": 0,
    "solution": "<p>As the information &#8220;when Manju Kapur was 55-year-old&#8221; shows the past, not the past of past, thus simple past tense should be used and not the past perfect.</p><p>So, the underlined part should be replaced with 'was published'.</p><p>Hence, option a) is correct.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined word in the given sentence. If there is no need to substitute it, select 'No substitution required'.</p><p>The thunder roared <u>broadly</u> during the storm.</p>",
    "options": [
      "Loudly",
      "Patiently",
      "No substitution required",
      "Sensibly"
    ],
    "correct_option_id": 0,
    "solution": "<p>In the sentence \"The thunder roared broadly during the storm,\" the word \"broadly\" (generally or inclusively) is used to describe how the thunder roared. However, \"broadly\" is not the most suitable adverb to convey the sound of thunder during a storm. The word \"loudly\" is the most appropriate substitution for \"broadly\" in this context. \"Loudly\" more accurately describes the nature of thunder during a storm, indicating that the thunder produced a strong, powerful sound that could be heard over a wide area. The word \"patiently\" means to act with patience or tolerance, especially in dealing with delays or difficulties. However, in the context of the sentence describing thunder during a storm, \"patiently\" does not appropriately convey the nature of the sound or the manner in which the thunder roared. \"Sensibly\" means acting with good judgment or practicality. This word also doesn't accurately describe the sound or manner of the thunder during the storm. Hence, (a) is the correct answer. </p><p>The revised sentence is: The thunder roared loudly during the storm.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>Rita is the <u>shorter </u>in the entire school.</p>",
    "options": [
      "longer",
      "longest",
      "shortest",
      "No improvement required"
