    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the helping verb and the preposition 'by' is necessary while changing the voice of the sentence from Passive to Active.</p><p>These types of questions contain <b>Modal verbs</b> and they should be used correctly as stated below. Modal verbs can be identified by the following:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Can</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Could</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">May</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Might</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Shall</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Should</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Will</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Would</td></tr></table><p>In Passive voice, the format is: <b>Object of the Active voice (Subjective case) + Modal + be + V3 + by + Subject of the Active voice (Objective case).</b></p><p>Thus, the format of sentences containing Modal verbs in Active voice is: <b>Subject + Modal + V1 + Object</b>.</p><p>For example:</p><p>The issue shall be solved by you. (Passive Voice)</p><p>You shall solve the issue. (Active Voice)</p><p>From the given options, the sentence that follows the Active voice format is option (b), \"The receptionist shall welcome the guests\".</p><p>Hence, the correct answer is option (b).</p>",
