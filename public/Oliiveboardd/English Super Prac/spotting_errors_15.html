    <script>
        const questions = [
  {
    "question": "<p>Select the sentence with the appropriate use of preposition.</p><p></p>",
    "options": [
      "When you are on Rome, do as Rome does.",
      "When you are away Rome, do as Rome does.",
      "When you are at Rome, do as Rome does.",
      "When you are in Rome, do as Rome does."
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence talks about a location. When you want to convey your location with respect to a country, you should use 'in'. The preposition 'at' is used to convey a specific location.</p><p>For example:</p><p>She has been living <b>in</b> Zurich.</p><p>He is currently <b>at</b> Lexington Street.</p><p>Hence, option (d) is the correct answer.</p><p>On - used to show that something is in a position above something else and touching it.</p><p>Away - to or at a distance from a particular place, person, or thing.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution required'.</p><p>The director heightened the suspense <u>on the movie</u> by using dramatic lighting and sound effects.</p>",
    "options": [
      "No substitution required",
      "Of the movie",
      "On the scene",
      "By the movie"
    ],
    "correct_option_id": 1,
    "solution": "<p>The option that can substitute the underlined segment is 'of the movie'. The error in the original sentence is related to the use of the wrong preposition 'on'. The preposition \"on\" is not appropriate in this context because it does not convey the intended meaning. \"On\" typically indicates location or surface contact, which is not suitable for indicating the heightening of suspense in a movie. The correct preposition to use in the given context is 'of'. \"Of\" is used to indicate possession or association. In this case, it shows that the suspense is related to or belongs to the movie. The phrase \"heightened the suspense of the movie\" indicates that the director increased or intensified the suspense that belongs to or is part of the movie. Option (b) is correct as it correctly replaces \"on\" with \"of \". Option (c) is not correct as it does not rectify the original error. This option continues to use the wrong preposition 'on'. Option (d) is not correct as it also uses a wrong preposition ('by'). The preposition \"by\" is used to indicate the means or method by which something is done. This preposition does not convey the idea that suspense belongs to the movie. Hence, (b) is the correct answer. </p><p><b>The correct sentence is:</b> The director heightened the suspense <b>of the movie</b> by using dramatic lighting and sound effects.</p><p><b>NOTE:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error. </p><p>The engineer <u>improved</u> the efficiency <u>on</u> the machine <u>by</u> using <u>advanced</u> technology.</p>",
    "options": [
      "Improved",
      "By",
      "On",
      "Advanced"
    ],
    "correct_option_id": 2,
    "solution": "<p>The part that contains the error is 'on'. The preposition \"on\" is not appropriate in this context because it does not convey the intended meaning. \"On\" typically indicates location or surface contact, which is not suitable for describing the action of improving efficiency in a machine. The correct preposition to use in the given context is 'of'. \"Of\" is used to indicate possession or association. In the given case, it shows that the improved efficiency is related to or associated with the machine. Therefore, to correct the error, 'on' should be replaced with 'of'. Hence, (c) is the correct answer. </p><p><b>The correct sentence is: </b>The engineer improved the efficiency <b>of </b>the machine by using advanced technology.</p><p><b>NOTE:</b></p><p></b>\"<b>A Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p>Examples</p><p>I. The teacher scolded the child for being late.</p><p>II. We're going to a party. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.\"</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the grammatically correct sentence. </p><p></p>",
    "options": [
      "A house like this needs a particular kind of configuration and furnishing.",
      "The artist completed the masterpiece of using a unique blend of colours and textures.",
      "The airport was bustling with activity as many aircrafts prepared for departure.",
      "The committee planned to reviewed the proposal during their next meeting."
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence given in option (a) is grammatically correct.</p><p>Option (b) is incorrect. The error lies in the incorrect use of the preposition \"of\" instead of \"by.\" When we want to indicate the method or means by which something is done, we use the preposition \"by.\" The preposition \"of\" is used to indicate possession, origin, or association, but it does not correctly convey the idea of the method or means by which the masterpiece was completed. <b>The correct sentence is:</b> The artist completed the masterpiece by using a unique blend of colours and textures.</p><p>Option (c) is also incorrect. The word \"aircrafts\" is incorrect. The correct plural form is \"aircraft\" (singular and plural are the same). <b>The correct sentence is: </b>The airport was bustling with activity as many aircraft prepared for departure. </p><p>Option (d) is also incorrect. After the infinitive marker \"to\", we usually use the base form of the verb. But 'reviewed' (past tense form) is not the base form. So, 'reviewed' should be replaced with the base form 'review'. <b>The correct sentence is:</b> The committee planned to review the proposal during their next meeting. Hence, (a) is the correct answer. </p><p><b>NOTE:</b></p><p>A Preposition is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p>Examples</p><p>I. The teacher scolded the child <b>for </b>being late.</p><p>II. We're going <b>to</b> a party. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p><p><b>\"Infinitive:</b> The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p>&#183; To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p>&#183; My father likes to cook. [like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p>&#183; To vote in elections is our right. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#183; Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>&#183; The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.\"</p>",
    "question_index": 3
  },
  {
    "question": "<p>Identify the segment in the sentence that contains a grammatical error. </p><p>She was visibly angry on the unexpected delay in her flight, causing her to miss an important meeting.</p>",
    "options": [
      "She was visibly angry on",
      "the unexpected delay in her",
      "flight, causing her to miss",
      "an important meeting"
    ],
    "correct_option_id": 0,
    "solution": "<p>In segment (a), \"on\" is incorrect because it doesn't collocate correctly with \"angry.\" The correct preposition should convey the emotion regarding the delay in her flight. \"About\" or \"at\" would be appropriate prepositions here, depending on whether the focus is on the emotion related to the delay (\"angry about\") or the situation itself (\"angry at\"). Hence, (a) is the correct answer.</p><p>The corrected sentence: She was visibly angry <b>at/about</b> the unexpected delay in her flight, causing her to miss an important meeting.</p>",
    "question_index": 4
  },
  {
    "question": "<p> The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer.</p><p>I'm excited on / the upcoming / family reunion. </p>",
    "options": [
      "I'm excited on",
      "The upcoming",
      "Family reunion",
      "No error"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is in option (a). The error is related to the preposition 'on'. The preposition \"on\" is often used to refer to something physical or spatial (e.g., \"on the table,\" \"on the wall\") or to denote a specific day or date (e.g., \"on Monday,\" \"on July 1st\"). The phrase \"excited on\" doesn't convey the right kind of emotional relationship. \"On\" implies a more literal or physical connection rather than an emotional or mental state. The correct preposition to use in the given context is 'about' or 'for'. The preposition \"about\" is used to indicate the subject of a feeling, thought, or discussion and the preposition 'for' is used to indicate the cause or reason behind any action or feeling. Both can help specify what someone is enthusiastic or concerned about. In the given context, they correctly specify the subject of the excitement. Hence, (a) is the correct answer.</p><p><b>The correct sentence is:</b> I'm excited about/for the upcoming family reunion.</p><p><b>NOTE:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>.</p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the sentence with the appropriate use of preposition-</p><p></p>",
    "options": [
      "Apart for English, she is fluent in Spanish and French.",
      "Apart to English, she is fluent in Spanish and French.",
      "Apart from English, she is fluent in Spanish and French.",
      "Apart of English, she is fluent in Spanish and French."
    ],
    "correct_option_id": 2,
    "solution": "<p>Examples of general '<b>Adverb + Preposition</b>' that are used in general English: Along with, apart from, as for, as to, away from, onto, out of, together with, up to, such as. </p><p>The correct sentence is- <b><i>Apart from English, she is fluent in Spanish and French.</i></b></p><p>Hence, option (c) is correct. </p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select No improvement required.</p><p><u>From give presentations</u> to clients, he developed excellent public speaking skills.</p>",
    "options": [
      "From been gave presentations",
      "From given presentations",
      "From giving presentations",
      "No improvement required"
    ],
    "correct_option_id": 2,
    "solution": "<p>The verbs which are placed immediately after prepositions are usually in the gerund form.</p><p>The correct sentence is- <b><i>From giving presentations to clients, he developed excellent public speaking skills.</i></b></p><p>Hence, option (c) is correct. </p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select No improvement required.</p><p>She gave <u>preference on</u> the job offer that provided more opportunities for growth and development.</p>",
    "options": [
      "Preference in",
      "Preference to",
      "Preference off",
      "No improvement required"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Prefer/Preference' is followed by 'to'. </p><p>The correct sentence is- <b><i>She gave preference to the job offer that provided more opportunities for growth and development.</i></b></p><p>Hence, option (b) is correct.</p>",
    "question_index": 8
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The company provided assurance with the product's quality by offering a money-back guarantee.</p>",
    "options": [
      "The company provided",
      "assurance with the",
      "product's quality by",
      "offering a money-back guarantee."
    ],
    "correct_option_id": 1,
    "solution": "<p>'Assurance/Charge/Doubt/Proof/Failure' are followed by 'of'. </p><p>The correct sentence is- <b><i>The company provided assurance of the product's quality by offering a money-back guarantee.</i></b></p><p>Hence, option (b) is correct.</p>",
    "question_index": 9
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>They would have been badly injured but of the fact that they were wearing seat belts.</p>",
    "options": [
      "They would have been",
      "badly injured",
      "but of the fact that",
      "they were wearing seat belts."
    ],
    "correct_option_id": 2,
    "solution": "<p>One type of phrase preposition structure with examples is given below:</p><p>Verb/ Adjective/ Conjunction, etc. + Preposition</p><p>Examples: Except for, owing to, due to, but for, because of.</p><p>The correct sentence is- <b><i>They would have been badly injured but for the fact that they were wearing seat belts.</i></b></p><p>Hence, option (c) is correct. </p>",
    "question_index": 10
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The decision was made among the two parties so we can say that it was a mutual decision.</p>",
    "options": [
      "The decision was made",
      "among the two parties",
      "so we can say that it",
      "was a mutual decision."
    ],
    "correct_option_id": 1,
    "solution": "<p>As per rule-</p><p>a) <b>Between </b>is used when we talk about two persons or things. </p><p><b>Example: <i>Between </i></b><i>red and yellow, I will prefer red. </i></p><p>b) <b>Among </b>is used when we talk about more than two persons or things. </p><p><b>Example: </b><i>Please choose one <b>among </b>the five options</i>. </p><p>The correct is- The decision was made between the two parties so we can say that it was a mutual decision.</p><p>Hence, option (b) is correct.</p>",
    "question_index": 11
  },
  {
    "question": "<p>The underlined word in the given sentence is:</p><p>Their only son is addicted to <u>gambling</u>. </p>",
    "options": [
      "Noun",
      "Verb",
      "Gerund",
      "Preposition"
    ],
    "correct_option_id": 2,
    "solution": "<p>Some prepositions take gerunds as objects. The given sentence is an example of one such case. Here, 'to' is the preposition and 'gambling' is the gerund. Hence, (c) is the correct answer. </p><p>A Gerund is a form that is derived from a verb but functions as a noun. </p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the appropriate preposition for the given blanks.</p><p>The treasure is buried _____ the well.</p>",
    "options": [
      "on",
      "from",
      "of",
      "inside"
    ],
    "correct_option_id": 3,
    "solution": "<p>The blank requires a preposition that denotes the location of the place in which the treasure is buried. Accordingly, option (d), 'inside' is the most appropriate word that denotes the place where the treasure is buried, with respect to the well. 'On' denotes 'to denote still surfaces', 'from' denotes the starting point of a journey or a source, 'of' denotes the relationship between two things/persons and 'at' denotes a particular location and so, these are negated.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the appropriate preposition for the given blanks.</p><p>She has been prohibited ______ entering the college.</p>",
    "options": [
      "from",
      "in",
      "to",
      "on"
    ],
    "correct_option_id": 0,
    "solution": "<p>Certain verbs are followed by certain types of prepositions. One such verb is 'prohibited' and the appropriate preposition that can follow this verb is option (a), 'from'.</p><p>Refrain from hurting; abstain from drinking; prevent from working; aid at doing; persist in disobeying; addicted to gambling; succeed in doing; bent upon doing; disqualified from doing; averse to playing; knack of getting; expert in inventing; prohibit from entering; desist from talking; tired of writing; capable of teaching; pretext for delaying; desirous of going; fond of playing; insist on going. </p><p>Hence, the correct answer is option (a). </p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the appropriate preposition for the given blanks.</p><p>He rushed _______ the room with his coat on.</p>",
    "options": [
      "Into",
      "In",
      "For",
      "From"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Into' means moving towards the inside of anything.</p><p>The correct sentence is- <b><i>He rushed into the room with his coat on.</i></b></p><p>Hence, option (a) is correct. </p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the appropriate preposition for the given blanks.</p><p>We have a meeting scheduled ______ Monday to discuss the new project.</p>",
    "options": [
      "In",
      "On",
      "By",
      "Upon"
    ],
    "correct_option_id": 1,
    "solution": "<p>On- Before the names of days and dates.</p><p>The correct sentence is- <b><i>We have a meeting scheduled on Monday to discuss the new project.</i></b></p><p>Hence, option (b) is correct.</p><p>In - expressing the situation of something that is or appears to be enclosed or surrounded by something else.</p><p>By  -  used to refer to the doer of the action in the passive voice.</p><p>Upon - to show that something happens soon after, and often because of, something else</p><p>Off - away from the place in question; to or at a distance.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the appropriate preposition for the given blanks.</p><p>Select the appropriate option for the given blank-</p><p>She was admitted to his office immediately _____ her arrival.</p>",
    "options": [
      "To",
      "Among",
      "Upon",
      "For"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Upon' is used to show that something happens soon after, and often because of, something else. </p><p>The correct sentence is- <b><i>She</i> <i>was admitted to his office immediately upon her arrival.</i></b></p><p>Hence, option (c) is correct. </p><p>To - to indicate a destination or direction.</p><p>Among - situated more or less centrally in relation to (several other things).</p><p>For - used to indicate the place someone or something is going to or toward.</p><p>In - expressing the situation of something that is or appears to be enclosed or surrounded by something else.</p>",
    "question_index": 17
