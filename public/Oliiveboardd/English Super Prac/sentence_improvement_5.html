    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>The proposed charter is intended <u>to replace</u> a constitution imposed by a military dictatorship 41 years ago.</p>",
    "options": [
      "to have replaced",
      "No improvement required",
      "to replaced",
      "to replacing"
    ],
    "correct_option_id": 1,
    "solution": "<p>The verb 'intend' means 'to have as a plan or purpose'. We usually use 'to + infinitive' with the verb 'intend'. \"We intend to go to Australia next year.\" So, the underlined part of the sentence is correct. Therefore, no improvement is required. </p><p>Hence, option (b) is the correct answer. </p><p><b>Note:</b></p><p><b>Infinitive:</b> The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p>&#183; To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p>&#183; My father likes to cook. [like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p>&#183; To vote in elections is our right. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#183; Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>&#183; The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Spot the error in the given sentence and select the sentence that is error free from the given options. </p><p>He loves to plough weed and decorating his garden with exotic plants.</p>",
    "options": [
      "He loves to plough weed and decorate his garden with exotic plants.",
      "He loves to plough weeding and decorating his garden with exotic plants.",
      "He loves ploughing to weed and to decorating his garden with exotic plants.",
      "He loves to ploughing weed and decorating his garden with exotic plants."
    ],
    "correct_option_id": 0,
    "solution": "<p>In the given sentence, the -ing form of the verb 'decorating' is incorrectly used along with the infinitive marker 'to'. Among the options, only option (a), 'He loves to plough weed and decorate his garden with exotic plants', has the correct base form of verb 'decorate' which agrees with the other verb form (plough). All the remaining options have the -ing form of verbs along with the infinitive marker 'to' which makes them grammatically incorrect and are thus negated.</p><p>Hence, the correct answer is option (a).</p><p>Note:</p><p><b>Infinitive marker</b>: A word or affix attached to the stem of a verb in order to form the full infinitive. In English, to is the infinitive marker.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>I am eagerly anticipating the joyous experience at your party and looking forward to <u>dance and immerse</u> myself in the rhythm, movements, and sheer delight of the moment.</p>",
    "options": [
      "Dancing and immerse",
      "Dances and immerses",
      "Dancing and immersing",
      "No improvement required"
    ],
    "correct_option_id": 2,
    "solution": "<p>There are many expressions such as  -  'looking forward to, accustomed to, averse to, object to, prior to, etc.' that are commonly followed by a gerund. Also, when two verbs are connected with 'and,' they should be in the same form, which in this case would be the gerund.</p><p>So, the use of 'dancing and immersing' is appropriate here. </p><p>No other option follows this rule.</p><p>The correct sentence is  -  <b><i>\"I am eagerly anticipating the joyous experience at your party and looking forward to dancing and immersing myself in the rhythm, movements, and sheer delight of the moment.\"</i></b></p><p>Hence, option (c) is correct. </p><p>Note:</p><p><b>Gerund:</b> Gerund is a verb form that functions as a noun, ending in -ing. A gerund can be either the subject or object of a sentence in English. Example: \"Everybody enjoyed her dancing and singing at the party.\" The words 'dancing' and 'singing' are gerunds.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>Could you please <u>remind to me to attend</u> the team meeting tomorrow at 10 AM, so I don't forget to join the virtual call and contribute to the discussion on the latest project updates and upcoming deadlines?</p>",
    "options": [
      "Remind to me attend",
      "Reminds me attending",
      "Remind me to attend",
      "No improvement required"
    ],
    "correct_option_id": 2,
    "solution": "<p>'To' should not be used with some verbs when followed by an object. Such verbs are- advise, welcome, ask, warm, forbid, order, remind, compliment, etc. So, drop 'to' from 'remind to me'. Also, modal verbs are followed by a base form of verbs so the use of third person singular 'reminds' is incorrect. Therefore, 'remind me to attend' is the right phrase here.</p><p>The correct sentence is  -  <b><i>\"Could you please remind me to attend the team meeting tomorrow at 10 AM, so I don't forget to join the virtual call and contribute to the discussion on the latest project updates and upcoming deadlines?\"</i></b></p><p>Hence, option (c) is correct. </p><p>Note:</p><p><b>Modal verb:</b> A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the grammatically correct sentence. </p><p></p>",
    "options": [
      "We must found a solution to this problem before it gets worse.",
      "We must prioritises customer satisfaction in our business strategy.",
      "They will start their journey early to avoid traffic.",
      "He will called you as soon as he gets home from work."
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence given in option (c) is grammatically correct. This sentence uses the future tense (\"will start\") appropriately to indicate a future action. </p><p>Option (a) is not correct. After the modal verb \"must,\" we use the base form of the verb (\"find\"). But 'found' (past tense form) is not the base form. Modal verbs like \"must\" express necessity or obligation and are always followed by the base form of the main verb. So, 'found' should be replaced with the base form 'find'. <b>The correct sentence is:</b> We must find a solution to this problem before it gets worse.</p><p>Option (b) is not correct. After the modal verb \"must,\" we use the base form of the verb (\"prioritise\"). But 'prioritises' (present tense form) is not the base form. Modal verbs such as \"must\" indicate necessity and are followed by the base form of the verb that expresses the action required. So, 'prioritises' should be replaced with the base form 'prioritise'. <b>The correct sentence is: </b>We must prioritise customer satisfaction in our business strategy.</p><p>Option (d) is incorrect as well. After the modal verb \"will,\" we use the base form of the verb (\"call\"). Modal verbs like \"will\" express future actions or intentions and are followed by the base form of the main verb. But 'called' (past tense form) is not the base form. So, we should replace 'called' with the base form 'call'. <b>The correct sentence is: </b>He will call you as soon as he gets home from work. Hence, (c) is the correct answer. </p><p><b>NOTE:</b></p><p><b>Modal verb:</b> A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the grammatically correct sentence. </p><p>A) They decided to starts a small business together. They have already secured a location and are preparing for their grand opening.</p><p>B) They decided to started a small business together. They have already secured a location and are preparing for their grand opening.</p><p>C) They decided to started a small business together. They have already secured a location and are preparing for there grand opening.</p><p>D) They decided to start a small business together. They have already secured a location and are preparing for their grand opening.</p>",
    "options": [
      "D",
      "A",
      "B",
      "C"
    ],
    "correct_option_id": 0,
    "solution": "<p>The grammatically correct sentence is D. After the infinitive marker \"to\", we usually use the base form of the verb. So, the correct base form to use after 'to' is 'start' (used in D). 'Starts' (used in A) is the present tense form, not the base form of the verb. 'Started' (used in B and C) is the past tense form, not the base form of the verb. Also, in sentence C, \"there\" should be replaced with \"their.\" \"There\" is used to refer to a place, while \"their\" is the possessive form that is needed to indicate that the grand opening belongs to \"them.\" Hence, (a) is the correct answer. </p><p><b>NOTE:</b></p><p>\"Infinitive: The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p>&#183; To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p>&#183; My father likes to cook. [like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p>&#183; To vote in elections is our right. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#183; Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>&#183; The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.\"</p>",
    "question_index": 5
  },
  {
    "question": "<p>In the question given below, a sentence is given, divided into parts. One of the parts may contain an error. Identify the part that contains the error, and mark it as the answer. </p><p>Govind avoids (A)/ to meet him (B)/ at his residence (C)/ in the evening (D).</p>",
    "options": [
      "B",
      "C",
      "A",
      "D"
    ],
    "correct_option_id": 0,
    "solution": "<p>Part B has the error. The verbs enjoy, avoid, miss, postpone, and suggest are not followed by the to-infinitive. They should be used with the gerund.</p><p>The correct sentence is: Govind avoids meeting him at his residence in the evening.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 6
  },
  {
    "question": "<p>In the question given below, a sentence is given, divided into parts. One of the parts may contain an error. Identify the part that contains the error, and mark it as the answer. </p><p>The announcer (A)/ told to us (B)/ that a vehicle is (C)/ blocking the road (D).</p>",
    "options": [
      "C",
      "D",
      "A",
      "B"
    ],
    "correct_option_id": 3,
    "solution": "<p>Part B has the error. The verb 'tell' and its form are followed by an indirect object (me, him, her, etc.) without 'to'.</p><p>The correct sentence is: The announcer told us that a vehicle is blocking the road.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 7
  },
  {
    "question": "<p>In the question given below, a sentence is given, divided into parts. One of the parts may contain an error. Identify the part that contains the error, and mark it as the answer. </p><p>Rony always stressed (A)/that one should (B)/ not to forget the (C)/person that helped one (D). </p>",
    "options": [
      "C",
      "D",
      "B",
      "A"
    ],
    "correct_option_id": 0,
    "solution": "<p>Part C has the error. Infinitive without 'to' is also used after the verbs will, would, shall, should, may, might, can, could and must. In part C, 'to' is incorrectly placed before the verb 'forget'.</p><p>The correct sentence is: Rony always stressed that one should not forget the person that helped one.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 8
  },
  {
    "question": "<p>In the question given below, a sentence is given, divided into parts. One of the parts may contain an error. Identify the part that contains the error, and mark it as the answer. </p><p>I would rather (A)/ want that you (B)/ to go for higher (C)/studies abroad (D).</p>",
    "options": [
      "D",
      "B",
      "C",
      "A"
    ],
    "correct_option_id": 1,
    "solution": "<p>Part B has the error. The verb 'want' should not be used with a 'that'-clause. It is used with the to-infinitive.</p><p>The correct sentence is: I would rather want you to go for higher studies abroad.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 9
  },
  {
    "question": "<p>In the question given below, a sentence is given, divided into parts. One of the parts may contain an error. Identify the part that contains the error, and mark it as the answer. </p><p>All these years, (A)/she desired nothing (B)/ but to have loved (C)/by her siblings (D).</p>",
    "options": [
      "A",
      "C",
      "B",
      "D"
    ],
    "correct_option_id": 1,
    "solution": "<p>Part C has the error. The given sentence is in Passive voice and the format for Present Perfect tense in a passive voice is 'has/have +been+ verb'. In this part, the 'to-be' form of the verb 'been' is missed out.</p><p>Alternatively, 'have loved' can be replaced with 'be loved'.</p><p>The correct sentence is: All these years, she desired nothing but to have been loved by her siblings.</p><p>OR</p><p>All these years, she desired nothing but to be loved by her siblings.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 10
  },
  {
    "question": "<p>In the following question, a sentence is given with a blank and followed by five options. Identify the correct verb that can fill the sentence and make it grammatically correct. </p><p>When the storm hits, we have to _____ to the village's centre.</p>",
    "options": [
      "go",
      "went",
      "gone",
      "goes"
    ],
    "correct_option_id": 0,
    "solution": "<p>The blank requires a verb in the base form to be used here. Accordingly, only option (a), 'go' is the base form of the base and thus, it fills the given blank as required.</p><p>The complete sentence is: When the storm hits, we have to go to the village's centre.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 11
  },
  {
    "question": "<p>In the following question, a sentence is given with a blank and followed by four options. Identify the correct verb that can fill the sentence and make it grammatically correct.</p><p>The crew is _____ for the landing.</p>",
    "options": [
      "waited",
      "has been waiting",
      "have been waiting",
      "waiting"
    ],
    "correct_option_id": 3,
    "solution": "<p>The blank requires a verb in the present participle form to be used in the Active voice sentence. Option (d), 'waiting' is the only verb in the present participle form that can fill the blank as required.</p><p>The complete sentence is: The crew is waiting for the landing.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 12
  },
  {
    "question": "<p>An infinitive can act as: </p><p>I. A verb</p><p>II. An adverb </p><p>III. A noun </p>",
    "options": [
      "Only I",
      "Only II",
      "Both I and III",
      "Both I and II"
    ],
    "correct_option_id": 2,
    "solution": "<p>Consider the sentences below. </p><p>&#61623; <i>To vote in elections is our right</i>. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#61623; <i>Radha went to the lake to fetch water</i>. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>Therefore, an infinitive can act as a noun as well as a verb. </p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 13
  },
  {
    "question": "<p>Which of the following sentences displays the case of a split infinitive?</p>",
    "options": [
      "They intend to thoroughly investigate the mysterious disappearance.",
      "They intend thoroughly to investigate the mysterious disappearance.",
      "They intend to investigate thoroughly the mysterious disappearance.",
      "They thoroughly intend to investigate the mysterious disappearance."
    ],
    "correct_option_id": 0,
    "solution": "<p>Among the given options, (a) displays the case of a split infinitive. The infinitive form of the verb has the structure: to + base form of verb. When we insert a word or words between 'to' and the verb of the infinitive, it is known as a split infinitive. In option (a), the adverb 'thoroughly' has been inserted between 'to' and the verb 'investigate'. Hence, (a) is the correct answer. </p>",
    "question_index": 14
  },
  {
    "question": "<p>Which of the following options is the past participle of the verb 'bet'?</p>",
    "options": [
      "Betted",
      "Bets",
      "Bet",
      "Betting"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Bet' is used both as noun and verb. The past tense and past participle of the verb is 'bet' only, just like its base form. This is the same as the past tense of let or past tense of put in English grammar. </p><p>Hence, (c) is the correct answer. </p>",
    "question_index": 15
  },
  {
    "question": "<p>Which of the following sentences use infinitives correctly? </p><p>I. Let every man praise the bridge he goes over.</p><p>II. He wasn't able to patiently sit in the busy traffic without complaining.</p><p>III. It's five o'clock. I had better to go now before the traffic gets too bad.</p>",
    "options": [
      "Only I",
      "Only II",
      "Both I and III",
      "Both II and III"
    ],
    "correct_option_id": 0,
    "solution": "<p>I: The verb 'let' takes infinitive without 'to'. Therefore, sentence I is correct. </p><p>II: The infinitive form of the verb has the structure: to + base form of</p><p>verb. When we insert a word or words between 'to' and the verb of the infinitive, it is</p><p>known as a split infinitive. In sentence II, the adverb 'patiently' is used to split the infinitive 'to sit'. </p><p>The correct way of writing the above sentence is: He wasn't able to sit patiently in the busy traffic without complaining.</p><p>Therefore, sentence II is incorrect. </p><p>III: The phrase 'had better' takes infinitive without 'to'. So, 'to' should be removed from the sentence. The correct sentence is: It's five o'clock. I had better go now before the traffic gets too bad.</p><p>Hence, option (a) is the correct answer. </p>",
    "question_index": 16
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>He said to me that he was focusing (A)/ on batting even though (B)/ his bowling figures have not been (C)/ impressive in the ongoing tournament. (D)</p>",
    "options": [
      "C",
      "D",
      "A",
      "B"
    ],
    "correct_option_id": 2,
    "solution": "<p>Part A has an error. </p><p>When used with a that-clause, 'tell' takes an indirect object, while 'say' does not.</p><p>Example sentence: Ramya told me (that) she would arrive early today. (not: told (that))</p><p>Ramya said (that) she would arrive early today. (not: said to me)</p><p>Therefore, in the given sentence, the phrase 'said to me' is incorrect. </p><p>The correct sentence is: He told me that he was focusing on batting even though his bowling figures have not been impressive in the ongoing tournament.</p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 17
