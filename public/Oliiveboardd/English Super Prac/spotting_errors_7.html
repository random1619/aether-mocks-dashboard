<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="10">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">10</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">10 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Fill in the blank with the most appropriate word.</p><p>We cannot delay the project _____ it is urgent.</p>",
    "options": [
      "than",
      "as if",
      "although",
      "because"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate word to fill in the blank is 'because'. \"Because\" is a conjunction used to introduce a reason or explanation for something. In the given context, it indicates the reason why the project cannot be delayed, which is its urgency. Other options are not suitable for the given context. The conjunction \"than\" is used in comparisons, indicating one thing is better, worse, or equal to another. The expression \"as if\" is used to indicate that something seems like or resembles something else, often used in hypothetical or imagined situations. The conjunction \"although\" is used to introduce a contrast or concession, indicating that two clauses present contrasting ideas. Hence, (d) is the correct answer.</p><p><b>NOTE:</b></p><p><b>\"CONJUNCTIONS</b></p><p>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.\"</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence.</p><p>Life is hard, unpredictable, but <u>though manageable.</u></p>",
    "options": [
      "still controllable",
      "despite practicable",
      "although bearable",
      "though achievable"
    ],
    "correct_option_id": 0,
    "solution": "<p>'But', 'despite', 'although', and 'thought' are all used to present the contrasting element in the sentence. So, using 'but' with these other three conjunctions would create a redundancy error. </p><p>So, the underlined part will be replaced with 'still controllable'. </p><p><b>The correct sentence is: </b>Life is hard, unpredictable, but <b>still controllable</b>. </p><p>Hence, option (a) is the answer. </p><p><b>Note: CONJUNCTIONS</b></p><p>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Choose an appropriate word that can substitute the bracketed word and complete the sentence meaningfully.</p><p>Shelley was very happy (while) I accepted her invitation to her birthday party.</p>",
    "options": [
      "when",
      "as",
      "after",
      "before"
    ],
    "correct_option_id": 0,
    "solution": "<p>\"When\" is the most appropriate option to replace the word 'while' because Shelley's happiness was immediate reaction once the invitation is accepte4. This meaning is conveyed only through 'when' (a simultaneous action, like 'while').</p><p>Option 2- as: Incorrect, as it suggests simultaneous cause or time, not sequential.</p><p>Option 3-after: Partially correct. The sentence suggests simultaneous reaction and not after a time delay. So, this is not the ideal fit.</p><p>Option 4-before: Incorrect, as it reverses the logical sequence.</p><p>The modified sentence is: Shelley was very happy when I accepted her invitation to her birthday party.</p><p>Hence, the correct answer is option (1).</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence.</p><p>Neither Janki <u>or</u> I am to receive the award.</p>",
    "options": [
      "either",
      "no",
      "nor",
      "not"
    ],
    "correct_option_id": 2,
    "solution": "<p>The underlined part, \"or,\" is incorrect in the context of the sentence. The structure \"Neither...nor\" is a correlative conjunction used to present two negative alternatives. The sentence indicates that neither Janki nor the speaker (I) is receiving the award.</p><p>Option 1 (\"either\") is incorrect, as \"either...or\" is used for positive alternatives, not negative ones.</p><p>Option 2 (\"no\") is grammatically incorrect and does not fit the conjunction structure.</p><p>Option 3 (\"nor\") is correct, forming the proper \"Neither...nor\" construction: \"Neither Janki nor I am to receive the award.\" Note that the verb \"am\" is correct due to the subject \"I\" in the second part, though in formal writing, \"are\" is sometimes used for proximity agreement.</p><p>Option 4 (\"not\") does not form a proper conjunction and is incorrect.</p><p>Thus, the correct option is 3: \"nor.\"</p><p><b>The correct sentence is : \"Neither Janki nor I am to receive the award.\"</b></p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution required'.</p><p><u>Because</u> she didn't love him, she had to marry him.</p>",
    "options": [
      "Despite",
      "Since",
      "No substitution required",
      "Although"
    ],
    "correct_option_id": 3,
    "solution": "<p>The use of \"although\" suggests a contrast between not loving him and still having to marry him, which more accurately reflects the intended meaning. It highlights the contradiction between her feelings and the action she must take, which better fits the context of the sentence.</p><p>The correct sentence is- \"Although she didn't love him, she had to marry him.\"</p><p>Hence, option (d) is correct.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Identify the segment in the sentence which contains a grammatical error.</p><p>She will come to work though it doesn't rain tomorrow.</p>",
    "options": [
      "to work",
      "rain tomorrow",
      "She will come",
      "though it doesn't"
    ],
    "correct_option_id": 3,
    "solution": "<p>The segment that contains a grammatical error is 'though it doesn't'. The use of the conjunction \"though\" is inappropriate in the context of the sentence. \"Though\" is used to introduce a contrast or concession. However, in the sentence, there is no clear contrast being made. A more suitable conjunction for the given context would be \"if\", which implies a conditional relationship between the two clauses. The word \"if\" introduces a condition. It sets up a hypothetical situation where the action described in the main clause (\"She will come to work\") depends on whether the condition stated in the conditional clause (\"it doesn't rain tomorrow\") is fulfilled or not. Other segments of the sentence are grammatically correct. Hence, (d) is the correct answer. </p><p>The correct sentence is: She will come to work if it doesn't rain tomorrow.</p><p><b>Note:</b></p><p><b>\"CONJUNCTIONS</b></p><p>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.\"</p>",
    "question_index": 5
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain a grammatical error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>They had hardly completed / half of the work / than the boss called them.</p>",
    "options": [
      "half of the work",
      "No error",
      "They had hardly completed",
      "than the boss called them"
    ],
    "correct_option_id": 3,
    "solution": "<p>This sentence is in the format 'hardly....when'. It is a connector which describes the state of the former event at the time when the latter event occurs. In the sentence, the conjunction 'than' is incorrect, according to the syntax of 'hardly...when'. Instead, the connector 'when' is to be used.</p><p>The correct sentence is: They had hardly completed half of the work when the boss called them.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 6
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>One can never imagine / how hot it gets in Delhi / unless one doesn't go/ there in person.</p>",
    "options": [
      "One can never imagine",
      "Unless one doesn't go",
      "How hot it gets in Delhi",
      "There in person"
    ],
    "correct_option_id": 1,
    "solution": "<p>We use <i>until</i> as a subordinating conjunction to connect an action or an event to a point in time. Example: Let's wait here <b>until</b> the rain stops.</p><p>So, 'unless' should be replaced with 'until'.</p><p>Hence, option (b) is the answer.</p><p>'Unless' is similar in meaning to 'if not' and can be used instead of 'if not' in certain types of conditional sentences.</p><p>The correct sentence is: One can never imagine how hot it gets in Delhi until one doesn't go there in person.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the word segment that substitutes (replaces) the bracketed word segment correctly and completes the sentence meaningfully:</p><p>Estella had hardly heard the news (after) she began to weep.</p>",
    "options": [
      "While",
      "Well",
      "Than",
      "When"
    ],
    "correct_option_id": 3,
    "solution": "<p>While- at the same time as</p><p>Well- in a good or satisfactory way</p><p>Than- used to introduce the second element in a comparison</p><p>When- at or during the time that</p><p>The sentence talks about a person who begins to weep even before she knows the news. Here, a conjunction that denotes times has to replace the word 'after', which also denotes time. Among the given options, option (d) 'when' is the appropriate word that can replace the word 'after'. Though, option (d) 'while' denotes time, has a different meaning which is not required in the context of the sentence.</p><p>Hence, the correct answer is option (d).</p><p>Note:</p><p><b>CONJUNCTIONS</b></p><p>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>No sooner did Mr. Piyahri Mishra finish his chemistry lecture <u>that the students began to leave.</u></p>",
    "options": [
      "So the students began to leave.",
      "Then the students began to leave.",
      "And the students began to leave.",
      "Than the students began to leave."
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; The correct phrase is \"No sooner.. than\".</p><p>&bull; The correct sentence is: \"No sooner did Mr. Piyahri Mishra finish his chemistry lecture than the students began to leave.\"</p>",
    "question_index": 9
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
