<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate homonym of the underlined word to fill in the blank.</p><p>The _______ treaty ended the long-standing conflict between the two nations. The leaders shook hands and gave each other a <u>piece</u> of cake.</p>",
    "options": [
      "peas",
      "pierce",
      "peak",
      "peace"
    ],
    "correct_option_id": 3,
    "solution": "<p>In this sentence, the context suggests that the blank needs to be filled with a word that indicates a treaty that brings an end to a conflict. </p><p>\"Peas\" is not the correct choice. It's a plural noun referring to a type of vegetable. It doesn't fit the context of a treaty ending a conflict.</p><p>\"Pierce\" is not the correct choice. It means 'to go into or through something, making a hole in it using a sharp point'. It does not fit in contextually and grammatically (the blank requires either a noun to form a noun phrase or an adjective to modify the noun 'treaty', but 'pierce' is a verb) as well. </p><p>\"Peak\" is not the correct choice. It's a noun that usually refers to the pointed top of a mountain or a high point. It doesn't fit the context of a treaty or conflict resolution.</p><p>\"Peace\" is the correct choice. It's a noun that refers to a state of harmony and absence of conflict. It perfectly fits the context of a treaty ending a long-standing conflict between nations.</p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate homophone of the underlined word to fill in the blank.</p><p>She was <u>allowed</u> to go to the party. She told her friends _______ about the same.</p>",
    "options": [
      "aloud",
      "elated",
      "allude",
      "elude"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate homophone of the underlined word to fill in the blank is 'aloud'. This word means out loud or audibly. The other options are not suitable homophones of 'allowed', which means to permit or give permission. 'Elated' means very happy or excited, 'allude' means to hint or refer to something indirectly, and 'elude' means to escape or avoid.</p><p>Hence, option (a) is the correct answer. </p>",
    "question_index": 1
  },
  {
    "question": "<p><b> </b>Select the most appropriate homonym to fill in the blank.</p><p>As she walked through the forest, she caught the _____ of pine trees.</p>",
    "options": [
      "Scent",
      "Cent",
      "Saint",
      "Sent"
    ],
    "correct_option_id": 0,
    "solution": "<p>Among the given options, 'scent' fits perfectly because the sentence would describe the smell or aroma of pine trees that the person caught as she walked through the forest. Hence, (a) is the correct answer.</p><p>The final sentence: As she walked through the forest, she caught the scent of pine trees.</p><p>\"Cent\" refers to a unit of currency.</p><p>\"Saint\" refers to a person who is recognised as having an exceptional degree of holiness.</p><p>\"Sent\" is the past tense of the verb \"send,\" which means to cause something to go or be taken to a particular destination.</p>",
    "question_index": 2
  },
  {
    "question": "<p><b> </b>Select the most appropriate homonym to fill in the blank.</p><p>He stacked books neatly to form a _____ on the desk.</p>",
    "options": [
      "Peel",
      "Pile",
      "Peal",
      "Peer"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given sentence describes how the person neatly stacked books on the desk. Among the given options, 'pile' fits the blank appropriately as it refers to a collection of things laid or stacked on top of each other. Hence, (b) is the correct answer. </p><p>The final sentence: He stacked books neatly to form a pile on the desk. </p><p>\"Peel\" refers to removing the outer covering or skin of something.</p><p>\"Peal\" refers to a loud ringing of bells or a loud sound of laughter or thunder.</p><p>\"Peer\" refers to someone who is of equal standing or status.</p>",
    "question_index": 3
  },
  {
    "question": "<p><b> </b>Select the most appropriate homonym to fill in the blank.</p><p>After work, she loves to relax with a good book and _____. </p>",
    "options": [
      "Red",
      "Read",
      "Raid",
      "Reed"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given sentence talks about what 'she' likes to do after work to relax. The word \"read\" fits here because it means to look at and understand the meaning of written or printed words. Hence, (b) is the correct answer.</p><p>The final sentence: After work, she loves to relax with a good book and read.</p><p>Red- refers to one of the primary colours.</p><p>Raid- a sudden attack or surprise assault.</p><p>Reed- a tall, slender grass-like plant that grows in wetlands or marshy areas.</p>",
    "question_index": 4
  },
  {
    "question": "<p><b> </b>Select the most appropriate homonym to fill in the blank.</p><p>She didn't _____ the answer, so she asked her teacher for help.</p>",
    "options": [
      "No",
      "Know",
      "Now",
      "Knew"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given sentence talks about how the girl didn't have the information or understanding of the answer, so she asked her teacher for assistance. The word \"know\" means to have knowledge or awareness of something. So, in this context, it fits perfectly. Hence, (b) is the correct answer.</p><p>The final sentence: She didn't know the answer, so she asked her teacher for help.</p><p>No- a negative response or refusal.</p><p>Now- It refers to the present moment in time.</p><p>Knew- the past tense of the verb \"know\" [cannot fit after 'did'].</p>",
    "question_index": 5
  },
  {
    "question": "<p><b> </b>Select the most appropriate homonym to fill in the blank.</p><p>They decided to buy _____ tickets for the concert next weekend.</p>",
    "options": [
      "To",
      "Too",
      "Two",
      "Toe"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence talks about how many tickets they decided to purchase for the concert. The word \"two\" represents the number 2, which indicates the number of tickets they plan to buy. Hence, (c) is the correct answer.</p><p>The final sentence: They decided to buy two tickets for the concert next weekend.</p><p>To- a preposition used to indicate direction, movement, or the relationship between nouns or pronouns in a sentence.</p><p>Too- It indicates an excessive degree or extent.</p><p>Toe- It refers to one of the digits on the foot.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank. </p><p>The ___ of friends giggled together, forming a tight circle in the school hallway.</p>",
    "options": [
      "Cluck",
      "Cleek",
      "Click",
      "Clique"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate homonym to fill in the blank is 'clique'. \"Clique\" refers to a small, exclusive group of people who associate closely and often exclude others. In the given sentence, it suggests that a group of friends giggled together, forming a tight circle in the school hallway. Other options do not fit the context of the sentence. \"Cluck\" typically refers to the sound made by a chicken. \"Cleek\" refers to a hook-shaped instrument. \"Click\" refers to a short, sharp sound or operating a computer mouse. </p><p>The complete sentence is: The clique of friends giggled together, forming a tight circle in the school hallway.</p><p>Hence, (d) is the correct answer.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The homophone for the word \"waist\" is _______.</p>",
    "options": [
      "Waste",
      "Taste",
      "Wrist",
      "Wait"
    ],
    "correct_option_id": 0,
    "solution": "<p>A homophone is a word that sounds the same as another word but has a different meaning and often a different spelling.</p><p><b>Waist</b> (the part of the body between the ribs and hips) and <b>waste</b> (to use something carelessly or trash) are pronounced the same way but have different meanings, making them homophones.</p><p>Hence, option (a) is the answer.</p><p>Taste  -  the sensation of flavor.</p><p>Wrist  -  the joint between the hand and the arm.</p><p>Wait  -  to remain in place or delay an action.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank. </p><p>The homophone for the word \"scene\" is _______.</p>",
    "options": [
      "Send",
      "Sane",
      "Seem",
      "Seen"
    ],
    "correct_option_id": 3,
    "solution": "<p>A homophone is a word that sounds the same as another word but has a different meaning and often a different spelling.</p><p><b>Scene</b> (a setting or part of a play or event) and <b>seen </b>(the past participle of \"see\") are pronounced the same way but have different meanings, making them homophones.</p><p>Hence, option (d) is the answer.</p><p>Sane  -  mentally stable.</p><p>Seem  -  to appear to be.</p><p>Send  -  to dispatch something.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Fill in the blanks with appropriate words.</p><p>We all came _____ to _____ the preacher's speech.</p>",
    "options": [
      "here, here",
      "hear, here",
      "hear, hear",
      "here, hear"
    ],
    "correct_option_id": 3,
    "solution": "<p>The first blank requires an adverb to qualify the verb 'came' and the second blank requires a verb to denote the action done. In options (b) and (c), the verb 'hear' is suggested in place of an adverb and so they are negated. In option (a), the adverb 'here' is suggested in place of a verb and so, it is also negated. In option (d), 'here' (in, at, or to this place or position) and 'hear' (perceive with the ear the sound) is the option that suggests the appropriate words for the respective blanks.</p><p>Hence, the correct answer is option (d).</p><p><b>Note:</b></p><p><b>Qualifiers: </b>A word or phrase that limits the meaning of another word or phrase or makes it less general. 'Adverbs' and 'adjectives' are qualifiers.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the correct word for the blanks in the given sentence.</p><p>Students were running ___, even though they were required to ____ for their upcoming blood tests.</p>",
    "options": [
      "Fast",
      "Successfully",
      "Proficiently",
      "Accurately"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct word to fill in the blanks is 'fast'. 'Fast' as an adverb means quickly or at a high speed. In the first blank, the use of the word 'fast' suggests that the students were running at a high speed. 'Fast' as a verb means to abstain from eating. In the second blank, it implies that the students were required to refrain from eating for their upcoming blood tests. Other options are not suitable for the second blank and are thus negated.</p><p>The complete sentence is: Students were running fast, even though they were required to fast for their upcoming blood tests.</p><p>Hence, (a) is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate homophone to fill in the blank. </p><p>The breathtaking mountain view was a mesmerizing _____ that left us in awe of nature's beauty.</p>",
    "options": [
      "Sight",
      "Cite",
      "Side",
      "Kite"
    ],
    "correct_option_id": 0,
    "solution": "<p>Sight: \"Sight\" refers to the ability to see or the act of seeing. It can also be used to describe a visually pleasing or impressive view.</p><p>Cite: \"Cite\" is a verb that means to quote or refer to a source as evidence or justification.</p><p>Side: a position to the left or right of an object, place, or central point.</p><p>Kite: \"Kite\" is a noun that describes a toy or object flown in the air, typically tethered to a string.</p><p>In the given sentence, the context is about a breathtaking mountain view that is mesmerizing and leaves people in awe of nature's beauty. The appropriate term to fill in the blank is something visually impressive, which is \"sight.\" Hence, (a) is the correct answer. </p><p>The sentence would read: \"The breathtaking mountain view was a mesmerizing sight that left us in awe of nature's beauty.\"</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank.</p><p>My _____ objective is to make the information more widely available.</p>",
    "options": [
      "Soul",
      "Sol",
      "Sole",
      "Seoul"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate homonym to fill in the blank is 'sole'. 'Sole' means single or only. In the context of the sentence, this word refers to the primary or only objective. Other words are not suitable for the given context. 'Soul' refers to the spiritual or immaterial part of a human being. 'Sol' refers to the fifth note of a musical scale. 'Seoul' is the capital city of South Korea.</p><p>The complete sentence is: \"My sole objective is to make the information more widely available.\"</p><p>Hence, (c) is the correct answer.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate homonym of the underlined word to fill in the blank. </p><p>The <u>principal </u>of the college addressed the graduating class. She highlighted the ______ of lifelong learning as crucial for personal growth.</p>",
    "options": [
      "Principle",
      "Principe",
      "Primatial",
      "Primal"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate word to fill in the blank is 'principle'. \"Principle\" refers to a fundamental truth, a guiding belief, or a fundamental rule or code of conduct. In the given sentence, the principal emphasises the fundamental belief or truth of lifelong learning. Other words do not fit the context of the sentence. 'Primatial' refers to an archbishop or bishop with jurisdiction over other bishops. 'Principe' means a prince. The word 'primal' relates to being original, basic, or essential. Hence, (a) is the correct answer.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the correct word for the blanks in the given sentence. </p><p>As she tried to ____ the wrapping paper, a single ____ rolled down her cheek.</p>",
    "options": [
      "Tear",
      "Fear",
      "Dear",
      "Bear"
    ],
    "correct_option_id": 0,
    "solution": "<p>For the first blank, we need a word that describes the action towards the wrapping paper. The most suitable option is \"tear.\" In the context of wrapping paper, \"tear\" means to pull or rip it open.</p><p>For the second blank, we need a word that describes the thing rolling down her cheek. The most suitable option is \"tear\" again. In this context, \"tear\" refers to a drop of liquid from the eye, often associated with emotion.</p><p>The complete sentence is: As she tried to tear the wrapping paper, a single tear rolled down her cheek.</p><p>Hence, (a) is the correct answer. </p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate homonym of the underlined word to fill in the blank.</p><p>He <u>ate</u> his lunch quickly. He was very hungry after his morning ______. </p>",
    "options": [
      "eight",
      "bate",
      "weight",
      "wait"
    ],
    "correct_option_id": 3,
    "solution": "<p>In this sentence, the context suggests that the blank needs to be filled with a word that describes an activity or situation that he experienced in the morning. </p><p>\"Eight\" is not the correct choice. It's a numeral that represents the number 8. It doesn't fit the context of an activity or situation in the morning.</p><p>\"Bate\" is not the correct choice. The word means \"an angry mood\". It doesn't fit in the context. </p><p>\"Weight\" is not the correct choice. It's a noun that refers to the measure of the heaviness of an object. It doesn't fit the context of an activity or situation in the morning.</p><p>\"Wait\" is the correct choice. In this context, \"wait\" is a noun that refers to the period of time when he was waiting, possibly for his lunch or for some other activity. The sentence suggests that he was very hungry after waiting in the morning.</p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank. </p><p>The ____ is the basic unit of life.</p>",
    "options": [
      "Sell",
      "Call",
      "Sale",
      "Cell"
    ],
    "correct_option_id": 3,
    "solution": "<p>Cell - This is the correct choice. In biology, a cell is the basic structural and functional unit of living organisms. It is the smallest unit of life that can perform all the necessary functions for an organism to survive and thrive. Hence, (d) is the correct answer. </p><p>The final sentence: The cell is the basic unit of life. </p><p>Sell - This word means to exchange goods or services for money. It doesn't fit the context of being the basic unit of life.</p><p>Call - This word refers to a vocal sound or a telephone conversation. It doesn't convey the idea of being a fundamental unit of life.</p><p>Sale - This word refers to the exchange of goods or services for money. It doesn't fit in the context of biology or the basic unit of life.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank. </p><p>A sudden ____ of light illuminated the sky.</p>",
    "options": [
      "Flare",
      "Flair",
      "Floor",
      "Flour"
    ],
    "correct_option_id": 0,
    "solution": "<p>Flare - This is the correct choice. A flare is a sudden, brief burst of bright light. It can refer to various phenomena, such as a flare in the sky, which could be a signal or a burst of light. It accurately describes the sudden burst of light illuminating the sky, which fits the context of the sentence. Hence, (a) is the correct answer. </p><p>The final sentence: A sudden flare of light illuminated the sky. </p><p>Flair - This word refers to a natural talent or distinctive style. It doesn't convey the idea of a sudden burst of light, so it is not the correct choice in this context.</p><p>Floor - This word refers to the surface of a room on which one stands, and it doesn't fit in the context of a sudden burst of light illuminating the sky.</p><p>Flour - This word refers to a powdery substance obtained by grinding grains, typically used in baking. It has no connection to the sudden burst of light in the sky.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank. </p><p>Please ____ your sources in the research paper.</p>",
    "options": [
      "Cite",
      "Site",
      "Sight",
      "Kite"
    ],
    "correct_option_id": 0,
    "solution": "<p>Cite - This is the correct choice. \"Cite\" means to acknowledge or reference the source of information in a document, such as a research paper. It is a fundamental practice in academic writing to give credit to the sources. Hence, (a) is the correct answer. </p><p>The final sentence: Please cite your sources in the research paper. </p><p>Site - This word refers to a location or place. It doesn't fit the context of providing references in a research paper.</p><p>Sight - This word refers to the ability to see or something that is seen. It doesn't convey the idea of acknowledging sources in a research paper.</p><p>Kite - This word refers to a toy that is flown in the air. It has no relevance to the context of referencing sources in a research paper.</p>",
    "question_index": 19
  }
];
    </script>
