      "around"

  {

    "question": "<p>Select the most appropriate option for blank A.</p>",
    "options": [
      "Has",
      "Have",
      "Are",
      "Am"
    ],
    "correct_option_id": 0,
    "solution": "<p>The given blank requires a verb which satisfies the singular subject, \"the Epigraphy Branch\". According to this, options b) and c) are negated because these are plural verbs. \"Am\" is negated because it is used only along with I, which is not the case here. Option a), \"has\" is a singular verb which satisfies the grammatical condition and brings out a meaningfully coherent sentence. Hence, a) is the correct answer.</p>",

  {

  {

  {
    "comp": "<p><b>Directions [Set of 5 questions]:</b> A passage is given below with some words missing. From the given options, choose the one that fits into the blanks grammatically and contextually.</p><p>For decades, experts have warned that older Americans are taking too many unnecessary drugs, often prescribed by multiple doctors, for _________ or unknown reasons. Researchers estimate that 25 percent of people aged 65 to 69 take at least five prescription drugs to treat ________ conditions, a figure that jumps to nearly 46 percent for those between 70 and 79. Doctors say it is not uncommon to __________ patients taking more than 20 drugs to treat acid reflux, heart disease, depression or insomnia or other disorders. Unlike the overuse of opioid painkillers, the polypharmacy problem has attracted little attention, even though its _________ are well documented. But some doctors are working to reverse the ________. At least 15 percent of seniors seeking care annually from doctors or hospitals have suffered a medication problem; in half of these cases, the problem is believed to be potentially preventable. Studies have linked polypharmacy to unnecessary death. Older patients, who have greater difficulty metabolizing medicines, are more likely to suffer dizziness, confusion and falls. And the side effects of drugs are frequently misinterpreted as a new problem, triggering more prescriptions, a process known as a prescribing cascade.</p>",
