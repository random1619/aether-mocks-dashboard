<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error. </p><p><u>The</u> judge <u>adjourn</u> the court proceedings <u>until</u> further <u>notice</u>.</p>",
    "options": [
      "The",
      "Notice",
      "Until",
      "Adjourn"
    ],
    "correct_option_id": 3,
    "solution": "<p>The part that contains the error is 'adjourn'. The error lies in the subject-verb agreement. The subject of the sentence is \"judge,\" which is singular. But the verb \"adjourn\" is plural. The verb needs to be conjugated correctly for the singular subject. Therefore, to correct the error, the plural verb 'adjourn' should be replaced with the singular verb 'adjourns' to match the singular subject \"judge\". Hence, (d) is the correct answer. </p><p>Or simply, replace 'adjourn' with its past form 'adjourned' to rectify the error.</p><p><b>The correct sentence is: </b>The judge <b>adjourns</b> the court proceedings until further notice.</p><p>Or</p><p>The judge <b>adjourned</b> the court proceedings until further notice.</p><p><b>NOTE:</b></p><p><b>Subject-verb agreement</b> means that a subject and its verb must be both singular or plural:</p><p>A singular subject takes a singular verb.</p><p>A plural subject takes a plural verb. </p><p>For example, in the sentence 'John lives in France', the subject John (singular 'he') 'agrees with' the third person singular form of the verb to live  -  lives.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Identify the segment in the sentence that contains a grammatical error. </p><p>The author and the publisher was thrilled with the overwhelming positive reception of their latest book, which quickly became a bestseller. </p>",
    "options": [
      "The author and the publisher",
      "was thrilled with the overwhelming",
      "positive reception of their latest book,",
      "which quickly became a bestseller"
    ],
    "correct_option_id": 1,
    "solution": "<p>The subject \"The author and the publisher\" is made up of two different individuals: \"the author\" and \"the publisher.\" When two singular nouns are joined by \"and\", each having a preceding 'the', they form a compound subject, which is considered plural. Therefore, the verb should be in the plural form \"were\" instead of the singular form \"was.\" Hence, (b) is the correct answer.</p><p>Note: A compound subject is a subject in a sentence that consists of two or more nouns, pronouns, or noun phrases joined by a coordinating conjunction (such as \"and\" or \"or\") that share the same verb. </p><p>The correct sentence: The author and the publisher <b>were</b> thrilled with the overwhelming positive reception of their latest book, which quickly became a bestseller. </p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the grammatically correct sentence. </p><p></p>",
    "options": [
      "Rajat have been working on this project for two weeks.",
      "Rajat has been working on this project for two weeks.",
      "Rajat has been working on this project since two weeks.",
      "Rajat have been working on this project since two weeks."
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence given in option (b) is grammatically correct. </p><p>Options (a) and (d) are incorrect because of the subject-verb agreement issue. The subject \"Rajat\" is singular, so the correct verb form should be the singular \"has\" instead of plural \"have\". </p><p>Option (c) is also incorrect. The phrase \"since two weeks\" is incorrect. The word \"since\" is used to refer to a specific point in time when an action started. It is typically followed by a specific point in time (e.g., since Monday, since June). It is not used to indicate a duration of time like \"two weeks\". The correct preposition to use here is \"for\". \"For\" is used to indicate the duration of time something has been happening. Hence, (b) is the correct answer. </p><p><b>The correct sentence is:</b> Rajat has been working on this project for two weeks. </p><p><b>NOTE:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p><p><b>Subject-verb agreement</b> means that a subject and its verb must be both singular or both plural:</p><p>A singular subject takes a singular verb.</p><p>A plural subject takes a plural verb. </p><p>For example, in the sentence 'John lives in France', the subject John (singular 'he') 'agrees with' the third person singular form of the verb to live  -  lives.</p>",
    "question_index": 2
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option.</p><p>Though we add few sugar / to our energy drinks / and fruit juices, they do have an excessive/ amount of calories.</p>",
    "options": [
      "to our energy drinks",
      "Though we add few sugar",
      "and fruit juices, they do have an excessive",
      "amount of calories"
    ],
    "correct_option_id": 1,
    "solution": "<p>In the given sentence, 'sugar' is an uncountable noun. We cannot use 'few/many' with uncountable nouns. With uncountable nouns, we use 'little/much'. So, 'few' should be replaced with 'little' to rectify the given sentence. Therefore, the error is in the part in option (b). Hence, option (b) is the correct answer.</p><p>The correct sentence is: Though we add little sugar to our energy drinks and fruit juices, they do have an excessive amount of calories.</p>",
    "question_index": 3
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>Equipments used for the extraction of / groundwater as well as / any combinations of such / structures is provided by the authority.</p>",
    "options": [
      "structures are provided by the authority",
      "groundwater as well as",
      "any combinations of such",
      "Equipments used for the extraction of"
    ],
    "correct_option_id": 3,
    "solution": "<p>The noun 'equipment' is an uncountable noun. So, we cannot make its plural form by adding s at the end. So, the noun 'equipments' should be replaced with 'equipment' to rectify the given sentence. Therefore, the error is in the part in option (d). </p><p>Hence, option (d) is the correct answer.</p><p>The correct sentence is: Equipment used for the extraction of groundwater as well as any combinations of such structures is provided by the authority.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blanks.</p><p>Though our team <b>____</b> agreed to the new terms, the opposite team <b>____</b> different opinions.</p>",
    "options": [
      "have, have",
      "has, has",
      "have, has",
      "has, have"
    ],
    "correct_option_id": 1,
    "solution": "<p>In the given sentence, 'team' is a collective noun taken as a single unit which takes singular verb after it. So, both the blanks will take singular verb 'has'.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>In the following question, a sentence is given with a phrase highlighted in bold. Select the option given below that can replace the phrase in bold to make the sentence grammatically and contextually correct and mark that as your answer. If the sentence is correct as it is, mark 'No correction required', as the answer.</p><p>Before that, my <b>bread and butter were</b> going out and doing concerts.</p>",
    "options": [
      "breads and butters were",
      "bread and butter was",
      "breads and butters is",
      "No correction required"
    ],
    "correct_option_id": 1,
    "solution": "<p>In the given sentence, 'bread and butter' means 'a person's livelihood or main source of income'. The phrase 'breads and butters' is incorrect as it should never be used in plural form. Also, a singular verb should be used with the phrase. Therefore, the correct choice among the given options is 'bread and butter was'.</p><p>Hence, option (b) is the correct answer. </p><p>The correct sentence is: Before that, my <b>bread and butter was</b> going out and doing concerts.</p>",
    "question_index": 6
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option.</p><p>Mathematics are (A)/ one of the oldest (B)/ subjects in (C)/ the history of humanity. (D)</p>",
    "options": [
      "D",
      "B",
      "A",
      "C"
    ],
    "correct_option_id": 2,
    "solution": "<p>Part A has an error.</p><p>Although the noun 'Mathematics' ends with an 's', it is not a plural noun. Other such nouns include names of subjects (Economics, Civics, Physics, etc.), names of some common diseases (Measles, mumps, rickets, etc.), names of some games (billiards, draughts), some words like news, ethics, innings, etc. So, we cannot use the plural verb 'are' with the noun 'Mathematics'. So, 'are' should be replaced with 'is' to rectify the given sentence.</p><p>Hence, option (c) is the answer. </p>",
    "question_index": 7
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>The company has premises with a total (A)/ area of 15 hectares, of which 3600 square metres are (B)/ a workshop and a staff of 15,200 (C)/ who are qualified technicians. (D)</p>",
    "options": [
      "D",
      "A",
      "C",
      "B"
    ],
    "correct_option_id": 3,
    "solution": "<p>Part B has an error. In the given sentence, '3600 square metres' refers to a specific amount of area. When a plural noun denotes a specific amount, length, quantity considered as a whole, the verb is generally singular. So, the verb 'are' should be replaced with its singular form 'is' to rectify the given sentence. </p><p>Hence, option (d) is the correct answer. </p><p>The correct sentence is: The company has premises with a total area of 15 hectares, of which 3600 square metres is a workshop and a staff of 15,200 who are qualified technicians.</p>",
    "question_index": 8
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option.</p><p>He stood on the (A)/ street corner, haranguing (B)/ passer-bys about the stupidity (C)/ of the forthcoming war. (D)</p>",
    "options": [
      "B",
      "D",
      "A",
      "C"
    ],
    "correct_option_id": 3,
    "solution": "<p>Part C has an error. </p><p>A compound noun forms plural by making the principal word plural. For example, 'Daughter-in-laws' is incorrect; the correct plural form of 'daughter-in-law' is 'daughters-in-law'. Similarly, the plural form of 'passer-by' (a person who happens to be going past something, especially on foot) is 'passers-by'. </p><p>Hence, option (d) is the correct answer. </p><p>The correct sentence is: He stood on the street corner, haranguing passers-by about the stupidity of the forthcoming war.</p>",
    "question_index": 9
  },
  {
    "question": "<p>In the following question, a sentence is given with a phrase highlighted in bold. Select the option given below that can replace the phrase in bold to make the sentence grammatically and contextually correct and mark that as your answer. If the sentence is correct as it is, mark 'No correction required', as the answer.</p><p>I bought a new <b>pair of binocular</b> last week.</p>",
    "options": [
      "pairs of binocular",
      "pair of binoculars",
      "binocular of pair",
      "No correction required"
    ],
    "correct_option_id": 1,
    "solution": "<p>Some nouns are used only in the plural forms. Some examples are: jeans, trousers, pants, binoculars, etc. Therefore, 'pair of binoculars' is the correct choice. Hence, option (b) is the correct answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Which of the following sentences is incorrect?</p>",
    "options": [
      "My parents always give good advice.",
      "The furniture in this house is new.",
      "His hairs are black.",
      "This news is false."
    ],
    "correct_option_id": 2,
    "solution": "<p>Some nouns are used only in the singular form, e.g., advice, furniture, innings, information, news, scenery, politics, poetry etc. 'Hair' is one such word. Hence, (c) is the correct answer. </p><p>The correct sentence would be  -  His hair is black.</p>",
    "question_index": 11
  },
  {
    "question": "<p>In the following question, four sentences are given that may or may not have grammatical errors. Choose the sentence that is grammatically correct and mark it as your answer. If all the sentences are incorrect, choose 'All are incorrect' as your answer.</p>",
    "options": [
      "The principal's assistant's son's is looking for his wallet.",
      "Two and two make four.",
      "The average weight of the class are sixty-five kilograms.",
      "All are incorrect"
    ],
    "correct_option_id": 1,
    "solution": "<p>Only sentence (b) is grammatically correct. In sentence (b), 'two' and 'two' are compounded as a plural noun and the use of the plural verb 'make' is the correct form of verb that is to be used. But, in the sentence (a), the possessive form of the noun 'son's' is incorrect as the possessive form must follow a noun to denote the possession, which is not the case in the sentence. In sentence (c), the collective quantity 'kilograms' is treated as a plural noun, which is incorrect and in sentence (d), the noun that ends with the word 's', 'news' is treated as a plural noun and plural verb is incorrectly used in the sentence. 'News' is an uncountable noun and takes a singular verb after it. So, 'are' should be replaced with 'is'.</p><p>Hence, the correct answer is option (b).</p><p>The correct sentences are:</p><p>The principal's assistant's son is looking for his wallet.</p><p>The average weight of the class is sixty-five kilograms.</p>",
    "question_index": 12
  },
  {
    "question": "<p>In the question given below, one part of the sentence may or may not have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>Measle is a highly contagious(A)/ virus that lives in the(B)/ nose and throat mucus(C)/ of an infected person(D).</p>",
    "options": [
      "A",
      "D",
      "B",
      "C"
    ],
    "correct_option_id": 0,
    "solution": "<p>Part A has an error. There are certain nouns which apparently seem plural but are in fact singular. These include the names of some common diseases like mumps, rickets etc. 'Measles' is one such word. Hence, (a) is the correct answer. </p><p>The correct sentence would be: Measles is a highly contagious virus that lives in the nose and throat mucus of an infected person.</p>",
    "question_index": 13
  },
  {
    "question": "<p>In the question given below, one part of the sentence may or may not have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>Ten kilometre(A)/ marathon is definitely(B)/ a sporting event(C)/ in this dull city(D).</p>",
    "options": [
      "D",
      "C",
      "B",
      "A"
    ],
    "correct_option_id": 3,
    "solution": "<p>Part A has an error. Here a specific number 'ten' is given which is plural in nature. So, 'kilometre' will be replaced by 'kilometres', the rest of the sentence remaining as it is, because when a plural noun denotes a specific amount, length, quantity considered as a whole, the verb is generally singular. Hence, (d) is the correct answer. </p><p>The correct sentence would be: Ten kilometres marathon is definitely a sporting event in this dull city.</p>",
    "question_index": 14
  },
  {
    "question": "<p>In the question given below, one part of the sentence may or may not have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>You need to(A)/ constantly target(B)/ your bicep by(C)/ using a curl rod(D).</p>",
    "options": [
      "B",
      "C",
      "A",
      "D"
    ],
    "correct_option_id": 1,
    "solution": "<p>Part C has an error. Some nouns are used only in the plural forms. Some examples are: jeans, trousers, pants, tights, shorts, pyjamas, scissors, etc. 'Biceps' is one such word. So, 'bicep' needs to be replaced by 'biceps' in the given sentence in order to rectify the error. Hence, (b) is the correct answer.</p><p>The correct sentence would be: You need to constantly target your biceps using a curl rod.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p></p><p>My ______ car is parked near the tree.</p>",
    "options": [
      "Father's",
      "Fathers'",
      "Fathers",
      "Father"
    ],
    "correct_option_id": 0,
    "solution": "<p>Among the given options, option (b) 'fathers'' denotes the possession by multiple persons whereas the sentence has the possessive determiner 'my' which means there can be only one father for a person. So, options (b) and (c) (fathers' and fathers) are eliminated. Option (d), 'father' is a common noun which is not in a possessive form and so, it is also negated. Option (a), 'father's' is the most appropriate possessive form of the noun that can fill the given blank as required.</p><p>Hence, the correct answer is option (a).</p><p>The complete sentence is: My father's car is parked near the tree.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Which of the following phrases given below the sentence should replace the phrase given in bold to make the sentence grammatically correct? Choose the best option among the four given alternatives that reflects the correct phrase to be used in the sentence.</p><p>I had to use <b>trials and errors</b> to figure out how to fix my car.</p>",
    "options": [
      "Trial and error",
      "Trials and error",
      "Trial and errors",
      "A trial and an error"
    ],
    "correct_option_id": 0,
    "solution": "<p>There are several phrases in English where two or more nouns are used together as a single noun and treated as singular. For example, bread and butter, black and white etc. 'Trial and error' is one such phrase, which refers to a process of solving a problem through repeated attempts and mistakes. So, the phrase in bold needs to be replaced by 'trial and error'. Hence, (a) is the correct answer. </p>",
    "question_index": 17
  },
  {
    "question": "<p>Which of the following phrases given below the sentence should replace the phrase given in bold to make the sentence grammatically correct?</p><p><b>Kiran's and Jatin's</b> house is getting renovated these days.</p>",
    "options": [
      "Kiran and Jatin",
      "Kiran's and Jatin",
      "Kiran and Jatin's",
      "Kiran and Jatins"
    ],
    "correct_option_id": 2,
    "solution": "<p>When two or more nouns are joined by 'and' implying a common possession, the possessive sign is attached with the last noun. So, 'apostrophe s' will be used with Jatin only and not Kiran. Hence, (c) is the correct answer.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Which of the following pairs is NOT the correct singular and plural form of a noun?</p>",
    "options": [
      "Deer, Deer",
      "Manservant, Manservants",
      "Thief, Thieves",
      "Daughter-in-law, daughters-in-law"
    ],
    "correct_option_id": 1,
    "solution": "<p>Option (b) is incorrect. The correct plural form of 'manservant' is 'menservant'. Hence, (b) is the correct answer.</p>",
    "question_index": 19
  }
];
    </script>
