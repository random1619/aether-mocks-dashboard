<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>He didn't / called me / in the / last week.</p>",
    "options": [
      "in the",
      "He didn't",
      "called me",
      "last week"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Didn't' takes the base verb ('call', in this case) after it, so the usage of 'called' (past simple (V2)/ past participle (V3)) is incorrect.</p><p>Hence, (c) is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>In the sentence identify the segment which contains the grammatical error.</p><p>Electric heaters were providing to all the officers at the guest house.</p>",
    "options": [
      "Were providing",
      "At the guest house.",
      "Electric heaters",
      "To all the officers"
    ],
    "correct_option_id": 0,
    "solution": "<p>Helping verbs like 'were' take either the -ing form of the verb [when the subject is the doer of the action] or the -ed/en form of the verb [when the subject is the receiver of the action]. Here, the subject is 'electric heaters' which are incapable of performing an action, so the use of 'providing' is incorrect. Thus, it should be replaced with 'provided' to rectify the stated error.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>He won't come to the party unless you <u>will invite</u> him personally.</p>",
    "options": [
      "No substitution required",
      "Would invite",
      "Invited",
      "Invite"
    ],
    "correct_option_id": 3,
    "solution": "<p>We cannot use two future tenses in a single verb. The given sentence is an example of a conditional sentence. According to the grammar rule, if we use the future tense in the main clause, we should use the simple present tense in the subordinate clause. For example:</p><p><i>Victory won't come to me unless I go to it.</i></p><p>Therefore, we should use the simple present tense 'invite' in the given sentence.</p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>In the sentence identify the segment which contains the grammatical error.</p><p>Mani Kaul begun his career as an actor and a director of short films before doing his debut feature film, 'Uski Roti.'</p>",
    "options": [
      "debut feature film, 'Uski Roti.'",
      "begun his career as an actor",
      "a director of short films",
      "before doing his"
    ],
    "correct_option_id": 1,
    "solution": "<p>In the given sentence, the part 'begun his career as an actor' is erroneous. The verb 'begun' is in Past Participle form (V3) which requires an auxiliary verb (has/have) to support it. Moreover, the verb indicates that the action is done in the past which can be denoted by a verb in Past form (V2). The correct verb to be used is 'began' in place of 'begun'.</p><p>Hence, the correct answer is option (b).</p><p>Note:</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p><p><b>Auxiliary verb:</b> A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. Auxiliary verbs help to form the various tenses, moods, and voices of other verbs. The principal ones are be, do, and have. Example: She will sing a song tomorrow. Here, 'will' is the auxiliary verb that supports the main verb 'sing'.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Parts of the given sentence have been given as options. One of them contains a grammatical error. Select the option that has the error.</p><p>He continued staring at the elephant, as if he had not see one before.</p>",
    "options": [
      "as if he had not see",
      "staring at the elephant",
      "one before",
      "He continued&#8239;"
    ],
    "correct_option_id": 0,
    "solution": "<p>The part in option (a) has an error.</p><p>'Had' (when used as the helping verb) should be followed by the past participle (V3) form of verb, whereas 'see' is the base verb.</p><p>It should be replaced with 'seen' (past participle form  -  V3).</p><p><b>The correct sentence is: </b>He continued staring at the elephant, as if he had not <b>seen</b> one before.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 4
  },
  {
    "question": "<p>In the given sentence, identify the segment which contains a grammatical error.</p><p>We've decided to spend our time play online games as we will not go out on a vacation this year.</p>",
    "options": [
      "we've decided",
      "not go out",
      "to spend our time",
      "play online games"
    ],
    "correct_option_id": 3,
    "solution": "<p>The following phrases and certain verbs are followed by direct gerund. 'Avoid, mind, detest, can't help, can't bear, resist, enjoy, resent, stop, start, postpone, defer, worth, prefer, consider, practise, finish, risk, pardon, excuse, forgive, <b>spend</b>, etc.'</p><p>So, 'play' should be replaced with 'playing' to rectify the error. </p><p><b>The correct sentence is: </b>We've decided to spend our time <b>playing </b>online games as we will not go out on a vacation this year.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>I <u>am not afraid to spoke</u> the truth.</p>",
    "options": [
      "am not afraid to speaking",
      "am not afraid to speak",
      "was not afraid to spoken",
      "was not afraid to spoke"
    ],
    "correct_option_id": 1,
    "solution": "<p>The infinitive marker 'to' should be followed by the base verb. This rule is followed only in option (b).</p><p>The correct sentence is: I am not afraid to speak the truth.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Identify the segment in the sentence which contains a grammatical error. If there is no error, then select the option 'No error'.</p><p>Sh! Someone listens to our conversation.</p>",
    "options": [
      "No error",
      "Sh! Someone",
      "listens to",
      "our conversation"
    ],
    "correct_option_id": 2,
    "solution": "<p>It is a present continuous action which takes the present participle verb. So, the use of \"verb +ing\" is appropriate.</p><p>The correct answer is  -  \"Sh! Someone is listening to our conversation.\"</p><p>Hence, option (c) is correct.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Identify the segment in the sentence which contains a grammatical error.</p><p>He is over eighty and dare not read without glasses.</p>",
    "options": [
      "dare not read",
      "He is",
      "without glasses",
      "over eighty and"
    ],
    "correct_option_id": 0,
    "solution": "<p>The segment that contains the grammatical error is \"dare not read.\" The verb \"dare\" does not suit the context of the sentence. The verb \"dare\" typically implies a challenge or defiance. A more appropriate verb that fits the context is the modal verb \"can\". The expression 'cannot' indicates inability or incapability, which aligns better with the idea that the person is unable to read without glasses due to his age. Additionally, the plural verb 'dare' does not match with the singular subject 'he'. Hence, (a) is the correct answer. </p><p>The correct sentence is: He is over eighty and cannot read without glasses.</p><p><b>NOTE:</b></p><p><b>Modal verb:</b> A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>If I <u>was very rich</u><i>,</i> I would spend all my time and money for the poor.</p>",
    "options": [
      "If I am very rich",
      "No substitution",
      "If I have much riches",
      "If I were very rich"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence is: \"If I was very rich, I would spend all my time and money for the poor.\" The underlined segment, \"was very rich,\" is part of a conditional sentence expressing an unreal or hypothetical situation (being rich, which is not true). In English, the subjunctive mood is used for hypothetical situations, requiring \"were\" instead of \"was\" for the verb \"to be.\" The correct form is \"If I were very rich.\"</p><p>Option a, \"If I am very rich,\" uses present indicative, implying a real situation, which doesn't fit.</p><p>Option b, \"No substitution,\" is incorrect as \"was\" is grammatically wrong.</p><p>Option c, \"If I have much riches,\" is incorrect due to improper grammar (\"riches\" is plural and not used this way).</p><p>Option d, \"If I were very rich,\" correctly uses the subjunctive mood.</p><p>The correct sentence: If I were very rich, I would spend all my time and money for the poor.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Currently, Mittu and Bittu ____ hard to meet the project deadline.</p>",
    "options": [
      "worked",
      "are working",
      "have worked",
      "were working"
    ],
    "correct_option_id": 1,
    "solution": "<p>The adverb \"currently\" indicates that the action is happening now, requiring the present continuous tense (\"are working\"). Mittu and Bittu are the plural subject, and \"are working\" correctly describes their ongoing effort to meet the deadline. The other tenses do not align with the present time frame indicated by \"currently.\"</p><p>Worked: The simple past tense \"worked\" indicates a completed action, not an ongoing one, which conflicts with \"currently.\"</p><p>Have worked: The present perfect tense \"have worked\" suggests a completed action with present relevance, not an ongoing action.</p><p>Were working: The past continuous tense \"were working\" indicates an ongoing action in the past, not the present.</p><p>The complete sentence: Currently, Mittu and Bittu are working hard to meet the project deadline.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The war ____ badly damaged the country's infrastructure.</p>",
    "options": [
      "has",
      "have",
      "was",
      "is"
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence requires a verb that agrees with the singular subject \"The war\" and indicates a past action with present relevance (damage still exists). The present perfect tense \"has damaged\" is appropriate, as it suggests the war's impact persists. \"Has\" agrees with the singular subject. The other options are either incorrect in tense or number.</p><p>\"Have\" is plural and does not agree with the singular subject \"The war.\"</p><p>\"Was\" is a linking verb and does not fit with \"damaged,\" creating an incomplete or incorrect structure.</p><p>\"Is damaged\" (present tense) suggests ongoing damage, which does not align with the context of a past war.</p><p>The complete sentence: The war has badly damaged the country's infrastructure.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>I did not ____ to university yesterday.</p>",
    "options": [
      "gone",
      "go",
      "went",
      "going"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence is in the simple past tense, as indicated by \"yesterday.\" The verb \"did not\" requires the base form of the verb, so \"go\" is correct, forming \"did not go.\" The other options are incorrect verb forms for this structure.</p><p>\"Gone\" is the past participle, used with \"have\" (e.g., \"have gone\"), not with \"did not.\"</p><p>\"Went\" is the simple past form, but \"did not\" already indicates the past, so the base form \"go\" is needed.</p><p>\"Going\" is the gerund or present participle, inappropriate for the past tense structure.</p><p>The complete sentence: I did not go to university yesterday.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate tense form to fill in the blank.</p><p>Tania ____ to the canteen.</p>",
    "options": [
      "were gone",
      "were going",
      "was going",
      "had going"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence lacks context for time, but the options suggest a past tense. \"Tania\" is singular, so the singular past continuous \"was going\" is appropriate, indicating an ongoing action in the past (e.g., Tania was on her way to the canteen). The other options are either incorrect in number or grammatically invalid.</p><p>\"Were gone\" is plural and implies completion, not an ongoing action.</p><p>\"Were going\" is plural, incorrect for the singular subject \"Tania.\"</p><p>\"Had going\" is not a valid verb form in English.</p><p>The complete sentence: Tania was going to the canteen.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 13
  },
  {
    "question": "<p>A sentence has been given with a blank to be filled with an appropriate option. Choose the correct alternative.</p><p>The person driving the car______control over the wheels and knocked her down.</p>",
    "options": [
      "lose",
      "lost",
      "losing",
      "loose"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence implies an action/incident that happened in past (evident from 'knocked her down'). So, the word in the blank should be filled with the past simple form of verb.</p><p>So, only 'lost' is apt to be filled in the blank.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 14
  },
  {
    "question": "<p>A sentence has been given with a blank to be filled with an appropriate option. Choose the correct alternative.</p><p>Social media is______to market products.</p>",
    "options": [
      "Used",
      "Uses",
      "Use",
      "Using"
    ],
    "correct_option_id": 0,
    "solution": "<p>The helping verb 'is' should be followed by either past participle (V3) or present participle (V4).</p><p>Since 'social media' (subject) is what the action of being used can be subjected at, the passive voice construct 'is + used' will be apt here. </p><p>The complete sentence is: Social media is used to market products.</p><p>Hence, option (a) is the answer. </p><p><b>Note: Active and Passive Voice: </b>When the person doing the action is the subject, the sentence is said to be in active form/voice. When the subject is what the action is directed at, then the sentence is said to be in passive form/voice. For example: Active Voice: Rita and her friends performed a skit. Here 'Rita and her friends' (subject) perform the action. Passive Voice: A skit was performed by Rita and her friends. Here 'skit' is the subject (at which the action is directed).</p>",
    "question_index": 15
  },
  {
    "question": "<p>A sentence has been given with a blank to be filled with an appropriate option. Choose the correct alternative.</p><p>These were two Indian men who _______ hiding in the forest.</p>",
    "options": [
      "was",
      "has been",
      "had been",
      "have being"
    ],
    "correct_option_id": 2,
    "solution": "<p></p><p>The sentence talks about two Indian men, hence plural verb should be used here. So, 'was', and 'has' cannot be used here.</p><p>'Have' is not followed by the -ing form of the verb. So, option (d) is incorrect as well.</p><p>The complete sentence is: These were two Indian men who had been hiding in the forest.</p><p>Hence, option (c) is the answer.</p><p> </p>",
    "question_index": 16
  },
  {
    "question": "<p>Fill in the blank with the most appropriate option.</p><p>Though poor, he ______ proud of his learning.</p>",
    "options": [
      "Were",
      "Could became",
      "Was",
      "Have been"
    ],
    "correct_option_id": 2,
    "solution": "<p>The singular pronoun 'he' should be followed by singular verb, but 'were' and 'have' are plural verbs.</p><p>The modal verb 'could' should be followed by base verb, but 'became' is the past simple form of verb.</p><p>So, only 'was' is apt to fill the blank.</p><p>The complete sentence is: Though poor, he was proud of his learning.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate verb form to fill in the blank.</p><p>Arun __________ his bicycle to school every day.</p>",
    "options": [
      "ride",
      "riding",
      "rides",
      "rode"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence uses \"every day,\" indicating a habitual action in the present. The third-person singular subject \"Arun\" requires the present simple tense verb \"rides.\"</p><p>Ride: Incorrect, as it is the base form or plural present tense, not suitable for a singular subject.</p><p>Riding: Incorrect, as it is a gerund or present participle, not a finite verb.</p><p>Rode: Incorrect, as it is the past tense, not suitable for a present habitual action.</p><p>The complete sentence: Arun rides his bicycle to school every day.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>By this time tomorrow, I _________ the work assigned to me.</p>",
    "options": [
      "will do",
      "will have done",
      "will be done",
      "will have did"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given sentence discusses the action the subject 'I' will take before some time in future. The future perfect tense is used to describe an event that is expected or planned to happen before a time of reference in the future.</p><p>The construct for future perfect tense: Subject + will/shall + have + V3 + Object.</p><p>So, 'will have done' fits the blank appropriately. </p><p>The complete sentence is: By this time tomorrow, I will have done the work assigned to me.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
