        const questions = [
  {
    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>He always says to me, \"I am perturbed.\"</p>",
    "options": [
      "He always tells me that he is mostly perturbed.",
      "He always tells me that he is perturbed by change.",
      "He always tells me that he is perturbed.",
      "He always tells me that he is going to be perturbed."
    ],
    "correct_option_id": 2,
    "solution": "<p>To convert the direct speech sentence \"He always says to me, 'I am perturbed'\" to indirect speech:</p><p>The reporting verb \"says\" is present tense, so the tense of the reported clause (\"I am perturbed\") remains present (\"is\").</p><p>The phrase \"to me\" indicates the verb should be \"tells\" (as \"say to someone\" becomes \"tell someone\" in indirect speech).</p><p>The pronoun \"I\" changes to \"he\" to match the subject.</p><p>The conjunction \"that\" is added, and quotation marks are removed.</p><p>The direct speech \"I am perturbed\" becomes \"he is perturbed,\" making the sentence: \"He always tells me that he is perturbed.\"</p><p>Checking the options:</p><p>Option 1: \"He always tells me that he is mostly perturbed\" adds \"mostly,\" which is not in the original.</p><p>Option 2: \"He always tells me that he is perturbed by change\" adds \"by change,\" which is not implied.</p><p>Option 3: \"He always tells me that he is perturbed\" accurately reflects the original sentence.</p><p>Option 4: \"He always tells me that he is going to be perturbed\" shifts to future tense, which is incorrect.</p><p>Thus, option 3 is the correct choice.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the correct indirect form of the given sentence.</p><p>The blind man said to me, \"Can you help me cross the road?\"</p>",
    "options": [
      "The blind man asked me if I could help him cross the road.",
      "The blind man asked me if I will help him cross the road.",
      "The blind man asked me if I could help him crossed the road.",
      "The blind man asked me if I can help him cross the road."
    ],
    "correct_option_id": 0,
    "solution": "<p>In the case of Interrogative sentences like this, \"said\" in Direct Speech is changed into \"enquired (of)\", \"wanted to know\", \"asked\", etc.</p><p>In Indirect speech, the verb is always placed after the subject, unlike in Direct Speech.</p><p>If there is a question in the Direct Speech whose answer can come as \"Yes\" or \"No\" in the Indirect Speech, we should use the conjunctions \"if\" or \"whether\".</p><p>For example:</p><p>Ravi said to me, \"Is she studying?\" (Direct Speech)</p><p>Ravi asked me if she was studying. (Indirect Speech)</p><p>Also, when converting direct speech into indirect speech, the present modal verbs (can/may/must/will/shall) should be changed into past modal verbs (could/might/had to/would/should).</p><p>Example: She said, \"I can speak ten languages.\" (Direct Speech)</p><p>She said that she could speak ten languages. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>'Said to me' is changed to 'asked me'.</p><p>'If' is introduced in the sentence.</p><p>'Can you' will be changed to 'I could'</p><p>'Help me' will be changed to 'Help him'.</p><p>Therefore, the correct answer is option (a): The blind man asked me if I could help him cross the road.</p><p></p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>My son exclaimed with joy that it was an attractive site.</p>",
    "options": [
      "My son said, \"It is an attractive site.\"",
      "My son said, \"What an attractive site it is!\"",
      "My son said, \"What an attractive site it was!\"",
      "My son said, \"It was an attractive site.\""
    ],
    "correct_option_id": 1,
    "solution": "<p>Exclamatory Sentences are used to express joy, surprise, wonder, etc. The use of \"Alas!\", \"Hurray!\", \"Oh!\" is evident in these types of sentences in Direct Speech.</p><p>The reporting verbs in indirect speech change from \"Exclaimed with sorrow\", \"Exclaimed with joy\", etc. to \"said\" in Direct Speech.</p><p>In Indirect Speech, if the sentence is in assertive form, then it is changed into Exclamatory form in Direct Speech. Thus, going by the options is one of the best techniques to solve these questions.</p><p>For example:</p><p>Barney exclaimed with sorrow that he was ruined. (Indirect Speech)</p><p>Barney said, \"Good Heavens! I am ruined.\" (Direct Speech)</p><p>The tense of the Indirect Speech is in the . So, the tense in the Direct Speech will be in the tense.</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>\"was\" changes to \"is\"</p><p>Therefore, the correct answer is: \"My son said, \"What an attractive it is!\"\"</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that is the direct form of the sentence.</p><p>The doctor advised Jaya to put the eye drops into her eyes four times a day from the next day.</p>",
    "options": [
      "The doctor had advised Jaya, \"From the next day you put the eye drops into your eyes four times a day.\"",
      "The doctor advised Jaya, \"From tomorrow put the eye drops into your eyes four times a day.\"",
      "The doctor advises Jaya, \"From the next day put the eye drops into your eyes four times a day.\"",
      "The doctor advised Jaya, \"From tomorrow put the eye drops into her eyes four times a day.\""
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Imperative Sentences</b> in Direct Speech are used to demonstrate Request, <b>Order</b>, Command, etc.</p><p>Imperative Sentences in Direct Speech begin with <b>Principal verbs</b> like Go, Make, etc. In this case, \"Administer\" is used.</p><p>As per the meaning of \"Said\", \"Say\", etc. in Direct Speech the <b>verb</b> changes form like \"begged/beg\" etc. in Indirect Speech.</p><p>\"To\" is used before the <b>Principal Verbs</b> in Indirect Speech.</p><p>Thus, going by the options is one of the best techniques to solve these questions.</p><p>For example:</p><p>John ordered his assistant to bring him a glass of water. (Indirect Speech)</p><p>John said to his assistant, \"Bring me a glass of water.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">her</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">your</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Next day</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">tomorrow</td></tr></table><p>Accordingly, the option that follows the aforementioned conditions for a Direct Speech sentence is option (b) 'The doctor advised Jaya, \"From tomorrow put the eye drops into your eyes four times a day.\"'</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>\"is he alright now?\" I asked my neighbour's wife about her husband, Mr.Gulyani.</p>",
    "options": [
      "I asked Mrs. Gulyani, my neighbour's wife, if her husband had become alright then.",
      "I asked Mrs. Gulyani, my neighbour's wife, if her husband is alright now.",
      "I asked Mrs. Gulyani, my neighbour's wife, if your husband will be alright now.",
      "I asked Mrs. Gulyani, my neighbour's wife, if her husband was alright then."
    ],
    "correct_option_id": 3,
    "solution": "<p>In the case of Interrogative sentences like this, \"said\" in Direct Speech is changed into \"enquired (of)\", \"wanted to know\", \"asked\", etc.</p><p>In Indirect speech, the verb is always placed after the subject, unlike in Direct Speech.</p><p>If there is a question in the Direct Speech whose answer can come as \"Yes\" or \"No\" in the Indirect Speech, we should use the conjunctions \"if\" or \"whether\".</p><p>For example:</p><p>Ravi said to me, \"Is she studying?\" (Direct Speech)</p><p>Ravi asked me if she was studying. (Indirect Speech)</p><p>Also, the sentence in the Direct Speech is in the Present Simple tense. So, the tense in the Indirect Speech should be in the Past Simple tense.</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>'If' will be added in the sentence.</p><p>'Is' will be changed to 'was'.</p><p>'Now' will be changed to 'then'.</p><p>Therefore, the correct answer is option (d): I asked Mrs. Gulyani, my neighbour's wife, if her husband was alright then.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the correct indirect form of the given sentence.</p><p>Mother said to Megha, \"Leave for your office now.\"</p>",
    "options": [
      "Mother told to Megha to leave for her office now.",
      "Mother said to Megha leave for her office then.",
      "Mother told Megha to leave for your office now.",
      "Mother told Megha to leave for her office then."
    ],
    "correct_option_id": 3,
    "solution": "<p>Imperative Sentences are used to demonstrate Request, Order, Command, etc.</p><p>Imperative Sentences begin with Principal verbs like Go, Make, etc.</p><p>\"To\" is used before the Principal Verbs in the Indirect Speech.</p><p>For example:</p><p>John said to his assistant, \"Bring me a glass of water.\" (Direct Speech)</p><p>John ordered his assistant to bring him a glass of water. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>'Said to'  -  'told'</p><p>'Your'  -  'her'</p><p>'now'  -  'then'</p><p>Hence, (d) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>The lawyer told the father of the accused, \"There is a rumour that he has some connection in that crime.\"</p><p>(a) The lawyer told the father of the accused that there had been a rumour that he had some connection in that crime.</p><p>(b) The lawyer told the father of the accused that there was a rumour that he was having some connection in that crime.</p><p>(c) The lawyer told the father of the accused that there was a rumour that he had some connection in that crime.</p><p>(d) The lawyer told the father of the accused that there was a rumour that he has had some connection in that crime.</p>",
    "options": [
      "a",
      "b",
      "c",
      "d"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence in the Direct Speech is in <b>Present Perfect Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Past Perfect Tense</b>.</p><p>Present Perfect (Subject + has/have + V3 +Object) should be converted into Past Perfect (Subject + had + V3 +Object).</p><p>For example:</p><p>He said, \"I have got a new job.\" (Direct Speech)</p><p>He said that he had got a new job. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>\"is\" changes to \"was\"</p><p>\"has\" changes to \"had\"</p><p><b>Therefore, the correct answer is: \"</b><b>The lawyer told the father of the accused that there was a rumour that he had some connection in that crime.</b><b>\"</b></p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the correct indirect form of the given sentence.</p><p>The supervisor said to the staff, \"Make sure that every room is disinfected properly.\"</p>",
    "options": [
      "The supervisor instructed the staff to make sure that every room was being disinfected properly.",
      "The supervisor instructs the staff to make sure that every room is disinfected properly.",
      "The supervisor instructed the staff to make sure that every room was disinfected properly.",
      "The supervisor instructed the staff to make sure that every room had been disinfected properly."
    ],
    "correct_option_id": 2,
    "solution": "<p>Imperative Sentences are used to demonstrate Request, Order, Command, etc.</p><p>Imperative Sentences begin with Principal verbs like Go, Make, etc.</p><p>The reporting verbs like \"said\", \"say\", etc. in direct speech are changed into \"begged\", \"beg\", etc.</p><p>\"To\" is used before the Principal Verbs in the Indirect Speech.</p><p>For example:</p><p>John said to his assistant, \"Bring me a glass of water.\" (Direct Speech)</p><p>John ordered his assistant to bring him a glass of water. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>'Said to' will be changed to 'instructed'. </p><p>'To' will be introduced in the sentence. </p><p>Simple present tense verb construct ('is disinfected') will be changed to Simple past tense verb construct ('was disinfected').</p><p>Therefore, the correct answer is option (c): The supervisor instructed the staff to make sure that every room was disinfected properly.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the option that is the direct form of the given sentence.</p><p>Brinda told her doctor that she was leaving for Boston the next day.</p>",
    "options": [
      "Brinda told to her doctor, \"I will be leaving for Boston the next day\".",
      "Brinda told her doctor, \"I was leaving for Boston tomorrow\".",
      "Brinda said to her doctor, \"I am leaving for Boston tomorrow.\"",
      "Brinda had told her doctor, \"She was leaving for Boston the next day\"."
    ],
    "correct_option_id": 2,
    "solution": "<p>Option (c) is the correct answer.</p><p>The sentence in the Indirect Speech is in Past Continuous Tense. Therefore, the sentence in the Direct Speech will be in Present Continuous Tense.</p><p>Past Continuous (Subject + was/were + V1 + ing + Object) will be converted into Present Continuous (Subject + is/am/are + V1 +ing + Object)</p><p>For example:</p><p>He said that he was checking the assignment. (Indirect Speech)</p><p>He said, \"I am checking the assignment.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>&#183; The reporting verb 'told' is changed into 'said to'.</p><p>&#183; 'That' is replaced with inverted commas.</p><p>&#183; The verb 'was leaving' (simple past continuous) is changed into 'am leaving' (simple present continuous).</p><p>&#183; The pronoun 'she' is changed into 'I'.</p><p>&#183; 'The next day' is changed into 'tomorrow'.</p><p>Therefore, the correct answer is option (c): Brinda said to her doctor, \"I am leaving for Boston tomorrow.\"</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>She said, \"it is too good to be true\".</p>",
    "options": [
      "She said it were too good to be true.",
      "She said that it was too good to be true.",
      "She is saying that it is too good to be true.",
      "She says that it is too good to be true."
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence in the Direct Speech is in <b>Simple Present Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Simple Past Tense</b>.</p><p>Simple Present (Subject + V1 + Object) should be converted into Simple Past (Subject +V2 + Object).</p><p>\"That\" is used in place of Inverted Commas while transforming the sentence from Direct Speech to Indirect Speech.</p><p>For example:</p><p>He said, \"I never go to the village.\" (Direct Speech)</p><p>He said that he never went to the village. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>'Said' will be changed to 'said that'.</p><p>'Is' will be changed to 'was'. </p><p>Therefore, the correct answer is option (b): She said that it was too good to be true.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>He said, 'Let us wait for the award'.</p>",
    "options": [
      "He proposed that they should wait for the award.",
      "He said that he should wait for the award.",
      "He proposed that he should wait for the award.",
      "He said that they should waited for the award."
    ],
    "correct_option_id": 0,
    "solution": "<p>Option (a) is the correct answer.</p><p>\"Let\" is used to mean \"to allow\" (request) or \"to propose/suggest\".</p><p>\"Let\" as a proposal/suggestion:</p><p>Rules to follow:</p><p>\"Said/said to\" is changed to \"proposed/proposed to\" or \"suggested/suggested to\"</p><p>That is added in indirect speech.</p><p>\"Let\" is removed in the indirect speech.</p><p>Modal verb \"should\" is added in indirect speech.</p><p>Pronouns are changed accordingly.</p><p>Example 1: He said, \"Let us go to the amusement park.\" (Direct Speech)</p><p>He suggested that they should go to the amusement park. (Indirect Speech)</p><p>Example 2: I said to him, \"Let us attend the office party.\" (Direct Speech)</p><p>I proposed to him that we should attend the office party. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>The reporting verb 'said' is changed into 'proposed'.</p><p>Inverted commas is removed and 'that' is introduced.</p><p>The pronoun 'us' is changed into 'they'.</p><p>Therefore, the correct answer is option (a): He proposed that they should wait for the award.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the correct indirect form of the given sentence.</p><p>Mahesh said to Rita, \"Don't play in the sun\".</p>",
    "options": [
      "Mahesh advised Rita not to play in the sun",

      "Mahesh requested Rita that don't play in the sun"
    ],
    "correct_option_id": 0,
    "solution": "<p>Imperative Sentences sometimes begin with Negative Commands like \"Don't\".</p><p>The reporting verbs like \"said/say\", etc. are changed into \"asked/ask\", \"told/tell\", \"advised/ advise\" etc.</p><p>\"Not + To + V1\" is used in these sentences. For example, \"don't go\" should be changed to \"not to go\" in Indirect speech.</p><p>In this context, \"Don't ......\" changes into \"not to ......\".</p><p>For example:</p><p>My friend said to me, \"Don't go to Kolkata.\" (Direct Speech)</p><p>My friend advised me not to go to Kolkata. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>'Said to' will be changed to 'advised'.</p><p>'Don't play' will be changed to 'not to play'.</p><p>Therefore, the correct answer is option (a): Mahesh advised Rita not to play in the sun.</p>",

  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Anil said to Ria, \"I know where everything is kept in the kitchen.\"</p>",
    "options": [
      "Anil told Ria that he knows where everything was kept in the kitchen.",
      "Anil told Ria that he knew where everything is kept in the kitchen.",
      "Anil asked Ria that he knows where everything was kept in the kitchen.",
      "Anil told Ria that he knew where everything was kept in the kitchen."
    ],
    "correct_option_id": 3,
    "solution": "<p>The original sentence is a statement in direct speech. In reported speech, the verb \"know\" (present tense) shifts to \"knew\" (past tense), and the present tense \"is kept\" typically shifts to \"was kept\" to reflect the time change, though it may remain \"is kept\" if the situation is still true. \"Told\" is appropriate for a statement. Options 2 and 4 are similar, but option 4 uses \"was kept,\" which is more consistent with standard reported speech rules for past tense reporting. Option 1 incorrectly uses \"knows,\" and option 3 incorrectly uses \"asked.\"</p><p>Option a: \"Knows\" should be \"knew\" in reported speech, as the reporting verb \"told\" is past tense.</p><p>Option b: While \"knew\" is correct, \"is kept\" may not reflect the standard tense shift to \"was kept\" in reported speech, though it's acceptable if the situation remains true. However, option 4 is more precise.</p><p>Option c: \"Asked\" is incorrect, as the original sentence is a statement, not a question, and \"knows\" should be \"knew.\"</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 12
  },

as! How miserable life has become\".</p><p>Hence, the correct answer is option (b).</p>",

wer is: (c).</p>",
