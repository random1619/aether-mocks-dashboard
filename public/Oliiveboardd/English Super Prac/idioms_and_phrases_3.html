<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Choose the option which best expresses the meaning of the idiom/phrase underlined in the sentence.</p><p>Jamie, at the dentist's today, stood up to the <u>baptism of fire</u> pretty well.</p>",
    "options": [
      "Lodgings and food",
      "Bad manners",
      "The first experience of something that is usually unpleasant",
      "A man's wife"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Baptism of fire' means learning something the hard way through a challenge or difficulty. Hence, (c) is the correct answer.</p><p>The figurative expression for 'lodgings and food' is - Bed and board. </p><p>The figurative expression for 'bad manners' is - Bad form. </p><p>The figurative expression for 'a man's wife' is  -  His better half.</p>",
    "question_index": 0
  },
  {
    "question": "<p>In the following questions a statement has been given with highlighted text. Select the options that can replace the text with correct idiom or phrase. </p><p>When Chris turned forty, he decided to <u>live his life in excitement</u> and quit his job for his hobbies.</p>",
    "options": [
      "Be in the fast lane",
      "Give it a whirl",
      "Snug as a bug in a rug",
      "Palm off"
    ],
    "correct_option_id": 0,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>IDIOM</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>MEANING</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">In the fast lane</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A life filled with excitement.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Give it a whirl</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">To give something a try.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Snug as a bug in a rug</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Warm and cosy.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Palm off</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Pass off something as genuine when it is spurious.</td></tr></table><p>So, the correct idiom is 'in the fast lane'.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 1
  },
  {
    "question": "<p>In the following question, choose the option which best expresses the meaning of the idiom/ phrase underlined in the sentence.</p><p>I got out my wallet and began <u>to dole out</u> the money. </p>",
    "options": [
      "To be in low spirits.",
      "To give out in small quantities.",
      "To be faced with two dangerous situations.",
      "To be in such a situation that it is difficult to decide what to do."
    ],
    "correct_option_id": 1,
    "solution": "<p>'To dole out' means to give out in small quantities. Hence, (b) is the correct answer. </p><p>The figurative expression for 'to be in low spirits' is  -  To be in the doldrums. </p><p>The figurative expression for 'to be faced with two dangerous situations' is  -  To be between the devil and the deep sea. </p><p>The figurative expression for 'to be in such a situation that it is difficult to decide what to do' is  -  To be on the horns of a dilemma. </p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom. </p><p>Play a blinder </p>",
    "options": [
      "To perform with a lot of skill.",
      "To ask for permission.",
      "To manipulate someone.",
      "To choose to ignore behaviour that you know is wrong."
    ],
    "correct_option_id": 0,
    "solution": "<p>The idiom 'play a blinder' means to perform with a lot of skill, especially when you are playing sport. Hence, (a) is the correct answer. </p>",
    "question_index": 3
  },
  {
    "question": "<p>Identify the idiom that conveys the meaning given in brackets.</p><p>They know that the surgery would be tough, but they (persevere and endure) it for their health.</p>",
    "options": [
      "No substitution required.",
      "Bite with bullet.",
      "Slay the bullet.",
      "Bite the bullet."
    ],
    "correct_option_id": 3,
    "solution": "<p>Among the given options, 'bite the bullet' is the correct idiom that conveys the meaning given in the brackets.</p><p>Bite the bullet: to endure a painful experience that you cannot avoid.</p><p>Hence, (d) is the correct answer.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>Instead of avoiding the issue, Mark decided to <u>take the bull by the force</u> and confront the problem head-on.</p>",
    "options": [
      "Shock the bull by the horns",
      "Take the deer by the horns",
      "Take the bull by the horns",
      "Take the bull by the prey"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct idiom with its meaning is given below.</p><p>Take the bull by the horns: To confront a problem directly or to face a difficult situation with courage and determination.</p><p>Among the given choices, option (c) can substitute the underlined segment given in the sentence.</p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate idiom that can substitute italicised words in the given sentence.</p><p>The company denied spending on the <i>pompous exhibitions</i> for the clients. </p>",
    "options": [
      "Dog and pony show",
      "Hold dear",
      "Shoot for the moon",
      "Cost an arm and a leg"
    ],
    "correct_option_id": 0,
    "solution": "<p>Dog and pony show: A presentation or performance that is overly elaborate or showy, often for promotional purposes.</p><p>Hold dear: To value or cherish something or someone greatly.</p><p>Shoot for the moon: To set ambitious or lofty goals; to aim for something very challenging.</p><p>Cost an arm and a leg: To be extremely expensive or costly.</p><p>Among the given options, the idiom 'dog and pony show' can correctly substitute the italicised words in the sentence.</p><p>Hence, option (a) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p><b> </b>Select the most appropriate idiom for the given situation.</p><p>At the company's annual dinner party, Sonal approached Mukesh, hoping to engage in friendly conversation and mend their strained relationship after a recent disagreement at work. However, Mukesh's responses remained short and dismissive, and he quickly excused himself to join a different group of colleagues. Which of the following best describes Mukesh's behaviour towards Sarah?\"</p>",
    "options": [
      "Giving the cold shoulder",
      "Keeping one's chin up",
      "Hitting the hay",
      "In the same boat"
    ],
    "correct_option_id": 0,
    "solution": "<p>Sonal approached Mukesh at the dinner party, hoping to mend their strained relationship after a disagreement. However, Mukesh responded with short, dismissive replies and quickly left to join another group of colleagues. This behaviour indicates that Mukesh was intentionally ignoring or being unfriendly towards Sonal, which aligns with the idiom \"giving the cold shoulder.\" It means intentionally ignoring someone or treating them in a cold or unfriendly manner. Hence, (a) is the correct answer. </p><p>Keeping one's chin up: Remaining cheerful or optimistic in difficult situations; staying positive despite challenges.</p><p>Hitting the hay: Going to bed or going to sleep; it's an informal idiom for going to sleep.</p><p>In the same boat: Sharing a similar situation or circumstance with someone else; facing the same problems or challenges together.</p>",
    "question_index": 7
  },
  {
    "question": "<p><b> </b>Select the most appropriate idiom for the given situation.</p><p>Alex diligently completed his homework assignments each night and reviewed his notes regularly. Meanwhile, his classmates often procrastinated, leaving their homework until the last minute and cramming for exams. As the semester progressed, Alex's hard work paid off as he consistently achieved top grades. Which of the following best describes Alex's attitude? </p>",
    "options": [
      "A penny saved is a penny earned.",
      "Don't count your chickens before they are hatched.",
      "Bite off more than one can chew.",
      "The early bird catches the worm."
    ],
    "correct_option_id": 3,
    "solution": "<p>Alex consistently completed his homework and reviewed his notes regularly, showing a proactive and disciplined approach to his studies. He didn't wait until the last minute to do his work, unlike his classmates who procrastinated. As a result, Alex consistently achieved top grades, demonstrating that his early and consistent efforts paid off. This aligns with the idiom \"The early bird catches the worm,\" which means that those who act promptly or start early are more likely to succeed or gain an advantage. Hence, (d) is the correct answer. </p><p>A penny saved is a penny earned: This means that saving money is just as valuable as earning money, emphasizing the importance of frugality and wise financial management.</p><p>Don't count your chickens before they are hatched: Advises against assuming success before it's certain or before all the necessary steps have been taken; warns against premature optimism.</p><p>Bite off more than one can chew: Refers to taking on more tasks or responsibilities than one can handle; attempting something that is too difficult or ambitious.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option that best expresses the meaning of the proverb in the given sentence. </p><p>It's frustrating when people <b>stick their oars in</b> without understanding the full context of the situation.</p>",
    "options": [
      "To jump to conclusions",
      "To behave rudely",
      "To give an opinion without being asked",
      "To start arguing for no reason"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate option that best expresses the meaning of the given proverb/idiom is 'to give an opinion without being asked.' The expression \"stick one's oar in\" means to interfere or offer input into a situation without being invited. In the context of the sentence, it implies frustration when people involve themselves in a matter without fully grasping the circumstances. Option (c) accurately captures this meaning by suggesting that people are giving their opinions without being solicited. Other options do not give the accurate meaning of the idiom. Hence, (c) is the correct answer. </p>",
    "question_index": 9
  },
  {
    "question": "<p><b> </b>Select the sentence that uses the given idiom correctly.</p><p>Bite off more than you can chew</p>",
    "options": [
      "He bit off more than he could chew when he ordered a large pizza and could finish it.",
      "She bit off more than she could chew when she took on several projects at once and struggled to complete them.",
      "I bit off more than I could chew when I decided to try a new restaurant.",
      "They bit off more than they could chew when they ate too many candies at the party."
    ],
    "correct_option_id": 1,
    "solution": "<p>The idiom \"bite off more than you can chew\" means to take on more responsibilities or tasks than one can handle. It implies overestimating one's capacity or ability to manage a situation. Among the given options, option (b) correctly uses the idiom to describe taking on multiple projects and struggling to complete them. Hence, (b) is the correct answer.</p><p>The rest of the options use the idiom incorrectly. </p>",
    "question_index": 10
  },
  {
    "question": "<p><b> </b>Select the sentence that uses the given idiom correctly.</p><p>Let sleeping dogs lie</p>",
    "options": [
      "She let sleeping dogs lie when she saw her pet napping.",
      "She let sleeping dogs lie when she decided not to bring up an old argument.",
      "She let sleeping dogs lie when she walked past the animal shelter.",
      "She let sleeping dogs lie when she ignored the existence of the truth."
    ],
    "correct_option_id": 1,
    "solution": "<p>The idiom \"let sleeping dogs lie\" means to avoid stirring up old conflicts or problems, especially when doing so could cause more trouble or unrest. Among the given options, option (b) correctly uses the idiom to describe someone deciding not to bring up an old argument, thereby avoiding potential trouble. Hence, (b) is the correct answer. </p><p>The rest of the options use the idiom incorrectly. </p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the idiom that can substitute the underlined group of words. </p><p>After years of hard work, she <u>finally achieved her goal</u>.</p>",
    "options": [
      "Crossed the bridge.",
      "Hit the sack.",
      "Saw eye to eye.",
      "Hit the jackpot."
    ],
    "correct_option_id": 3,
    "solution": "<p>Crossed the bridge: This means to deal with a problem when it arises. </p><p>Hit the sack: This means to go to bed or go to sleep. </p><p>Saw eye to eye: This means to agree with someone. </p><p>Hit the jackpot: This means to achieve great success or get exactly what you want, often unexpectedly or after hard work. </p><p>Given this analysis, the idiom \"hit the jackpot\" is the most suitable substitute for the underlined group of words, as it accurately describes achieving a goal after years of hard work. Hence, (d) is the correct answer. </p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the appropriate idiom for the given blank. </p><p>You can argue with him _______, but he won't change his mind.</p>",
    "options": [
      "Till the cows come home",
      "Head and shoulders above",
      "Standing in good stead",
      "Under the weather"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate option to fill in the blank is 'till the cows come home'. The idiom \"till the cows come home\" means for a very long time or indefinitely. In the given sentence, it describes the persistence of arguing with someone who won't change his mind. Other options do not fit the context of the sentence.</p><p>Option (b) is incorrect. \"Head and shoulders above\" means significantly better or superior.</p><p>Option (c) is incorrect. \"Standing in good stead\" means being in a favourable position or having advantages.</p><p>Option (d) is incorrect. <i>\"</i>Under the weather\" means feeling unwell or sick. Hence, (a) is the correct answer. </p><p><b>The complete sentence is: </b>You can argue with him till the cows come home, but he won't change his mind.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the appropriate idiom for the given blank. </p><p>The government kept the operation _____ to avoid alerting the suspects.</p>",
    "options": [
      "Under wraps",
      "On the booze",
      "Break bread",
      "Rolling in the aisles"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate option to fill in the blank is 'under wraps'. The idiom \"under wraps\" means to keep something secret or confidential. In the given sentence, it describes the government's action of keeping the operation hidden from public knowledge to avoid alerting the suspects. Other options do not fit the context of the sentence.</p><p>Option (b) is incorrect. \"On the booze\" means to be drinking alcohol.</p><p>Option (c) is incorrect. \"Break bread\" means to share a meal.</p><p>Option (d) is incorrect. \"Rolling in the aisles\" means to laugh uncontrollably. Hence, (a) is the correct answer. </p><p><b>The complete sentence is: </b>The government kept the operation under wraps to avoid alerting the suspects. </p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate meaning of the idiom used in the given sentence. </p><p>Her research paper was a curate's egg, some parts being poorly written. </p>",
    "options": [
      "Perfectly balanced and complete",
      "Flawed in some aspects but good in others",
      "Completely original and groundbreaking",
      "A messy and disorganized collection"
    ],
    "correct_option_id": 1,
    "solution": "<p>'A curate's egg' is an idiom that describes something that is partly good and partly bad. Hence, (b) is the correct answer. </p>",
    "question_index": 15
  },
  {
    "question": "<p> Select the most appropriate meaning of the idiom used in the given sentence. </p><p>The argument over who forgot to refill the coffee machine was just a storm in a teacup. </p>",
    "options": [
      "A controversial issue that divided opinions",
      "A significant achievement",
      "Great outrage about a trivial matter",
      "A calm and peaceful resolution"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate meaning of the idiom \"a storm in a teacup\" is 'great outrage about a trivial matter'. The idiom \"a storm in a teacup\" is used to describe a situation where there is a lot of fuss, commotion, or outrage over something that is relatively unimportant or insignificant. In the sentence, it suggests that the argument or dispute about who forgot to refill the coffee machine was blown out of proportion considering the trivial nature of the issue. Other options do not give the appropriate meaning of the idiom. Hence, (c) is the correct answer.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>Cut your losses</p>",
    "options": [
      "To attack unfairly",
      "To cry over the irreparable loss",
      "To avoid losing any more money than you have already lost",
      "To be extravagant or spend without any worry"
    ],
    "correct_option_id": 2,
    "solution": "<p>Cut your losses &#8211; to avoid losing any more money than you have already lost</p><p>Usage: Let's cut our losses and sell the business before prices drop even further.</p><p>Hence, option c) is correct.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>Throw down the gauntlet</p>",
    "options": [
      "Use maximum force on someone/something",
      "Give up on a challenge",
      "Issue a challenge",
      "Announce retirement"
    ],
    "correct_option_id": 2,
    "solution": "<p>Throw down the gauntlet - declare or issue a challenge. Pick/take up the gauntlet- accept a fight or a challenge. So, option C is the right answer.</p><p>\"He often throws down the gauntlet by challenging educational reformers to come up with suitable new methods of teaching morality.\"</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the appropriate idiom for the given blank. </p><p>The mayor has ___________ from the teacher's union.</p>",
    "options": [
      "struck while the iron was hot",
      "gained ground",
      "shot in the dark",
      "rolled up the sleeves"
    ],
    "correct_option_id": 1,
    "solution": "<p>To 'strike while the iron is hot' means to make use of an opportunity immediately. To 'gain ground' means becoming more popular or accepted. 'Shot in the dark' means a guess. 'Roll up the sleeves' means prepare to fight or work. Option b) gives a meaningfully appropriate sentence which indicates that the mayor gained support from the teacher's union. Hence, b) is the correct answer</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
