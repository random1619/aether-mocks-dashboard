<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the word segment that substitutes (replaces) the bracketed word segment correctly and completes the sentence meaningfully. Select the option 'no correction required' if the sentence is correct as given.</p><p>General Houston failed to receive cannon which he had (counted on).</p>",
    "options": [
      "counted out",
      "counted down",
      "counted back",
      "No correction required"
    ],
    "correct_option_id": 3,
    "solution": "<p>The phrase 'count on' means to depend. The other phrases given in the options are grammatically incorrect. D is the right answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the word segment that substitutes (replaces) the bracketed word segment correctly and completes the sentence meaningfully. Select the option 'no correction required' if the sentence is correct as given.</p><p>He was sent to a school in Pavia, and there, he was allowed to devote (many of his time) to the subjects which particularly interested him.</p>",
    "options": [
      "mostly of his time",
      "much of his time",
      "most of his timely",
      "No correction required"
    ],
    "correct_option_id": 1,
    "solution": "<p>The noun 'time' is uncountable, so the uncountable adjective 'much' should be used to modify it in place of the countable 'many'. Also, the adjective 'most' should be used in place of the adverb 'mostly', as it is being used to modify the noun 'time'. B is the right answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Improve the bracketed part of the sentence. If there is no improvement, then select 'No improvement'.</p><p>This (has to be) a one-off thing, otherwise we'll be in trouble.</p>",
    "options": [
      "Has been",
      "Have to be",
      "Has being",
      "No improvement"
    ],
    "correct_option_id": 3,
    "solution": "<p>The given sentence is contextually and grammatically correct.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>I took the cycle <u>which he buy yesterday.</u></p>",
    "options": [
      "that he buys yesterday",
      "that he had bought yesterday",
      "that which he had buy yesterday",
      "No improvement required"
    ],
    "correct_option_id": 1,
    "solution": "<p>The plural verb 'buy' cannot be used for the singular subject 'he'. So, the phrase needs replacement.</p><p>Option (a) is incorrect as 'yesterday' in the sentence implies past tense, but 'buys' is the present tense verb.</p><p>Option (c) is incorrect as 'had' should be followed by the third form of verb, but 'buy' is base verb. 'Bought' would have been appropriate here.</p><p>Option (b) makes the sentence grammatically correct.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>Jeetu <u>can either open his own institute or </u>join Maheshwari classes.</p>",
    "options": [
      "either can open his own institute or",
      "either can open his own institute nor",
      "can neither open his own institute or",
      "No improvement required"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183;<b>\"Either..or\"</b> is a <b>correlative conjunction </b>i.e. both 'either' and 'or' exist together.</p><p>&#183;The format of <b>Either..or </b>is:<b>Noun/Pronoun + verb + Either+ the Condition + or + the other Condition.</b></p><p>&#183;For example: You can <b>either </b>take this salary <b>or</b> leave the job.</p><p>&#183;As we can see, the format of the question needs no improvement.</p><p>&#183;The other options are grammatically incorrect.</p><p>&#183;Therefore, the correct answer is:<b>(d) No improvement required</b>.</p><p>Additional Information:</p><p>&#183;The format of Neither..nor is:<b>Noun/Pronoun + verb + Neither+ the Condition + nor + the other Condition.</b></p><p>&#183;For example: He is <b>neither</b> smart <b>nor</b> hardworking.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the bracketed segment in the given sentence. </p><p>The venomous snake (have delivered) a deadly bite. </p>",
    "options": [
      "Delivered",
      "Has deliver",
      "Will delivering",
      "Deliver"
    ],
    "correct_option_id": 0,
    "solution": "<p>The plural verbs 'have' and 'deliver' cannot be used for the singular verb 'snake'. </p><p>Option (b) is incorrect as the helping verb 'has' requires the past participle form (V3) of the verb after it. But 'deliver' is the base verb.</p><p>Option (c) is incorrect as 'will' requires base verb after it, and not the -ing form of verb. </p><p>\"Delivered\" is the correct and most suitable choice. It provides the past tense form of the verb, accurately conveying that the venomous snake has delivered a deadly bite. Hence, (a) is the correct answer. </p><p>The final sentence: The venomous snake delivered a deadly bite. </p>",
    "question_index": 5
  },
  {
    "question": "<p>In the question given below, a part of the sentence is bracketed. Below are given alternatives to the bracketed part which may improve the sentence. Choose the correct alternative. In case no improvement is required, choose '<b>No Improvement</b>' option.</p><p>Glancing out of the window, she spotted him (going into the) bookshop.</p>",
    "options": [
      "going at the",
      "going inside the",
      "going to the",
      "No Improvement"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option D is the right answer, as the sentence needs no improvement (as it is grammatically and contextually correct).</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If no substitution is required, select 'No improvement required' as your answer.</p><p>The world economy needs leadership from the United States of America, <u>as no further nation has</u> more to lose from a collapse of multilateralism.</p>",
    "options": [
      "as no one had",
      "while no other nation has",
      "as no other nation has",
      "No improvement required"
    ],
    "correct_option_id": 2,
    "solution": "<p>The underlined phrase is incorrect because the word 'further' (which, in adjective form, conveys the meaning of being more distant in space than something else of the same kind (or) additional to what already exists) has been used as an adjective to modify the noun 'nation' which renders the phrase meaningless. The correct phrase to be used in the sentence is 'as no other nation has', which makes the sentence grammatically and contextually correct. Hence, option (c) is the correct answer.</p><p>The phrase in option (a) is incorrect because of the use of 'had' (past perfect) while the sentence is of the present perfect form. The phrase in option (b) is incorrect because the word 'while' is used to show contrast but the sentence does not have anything of contrasting nature.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate collocation to substitute the underlined words in the given sentence. </p><p>He is failing to make <u>progress for</u> work because of his illness. </p>",
    "options": [
      "progress at",
      "progress by",
      "progress through",
      "progress up"
    ],
    "correct_option_id": 0,
    "solution": "<p>Here, 'at' [expresses a relationship between an individual and a skill] is correct since it specifies the progress related to 'work'. Hence, (a) is the correct answer.</p><p>The final sentence would be: He is failing to make progress at work because of his illness.</p><p>For- purpose</p><p>By- agent</p><p>Through- moving in one side and out of the other side</p><p>Up- from a lower to a higher point</p>",
    "question_index": 8
  },
  {
    "question": "<p><b> </b>Select the option that will improve the bracketed part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>If you were a chef, you (would have cooked) delicious meals every day.</p>",
    "options": [
      "Would be cooking",
      "Would have been cooking",
      "No improvement required",
      "Would cook"
    ],
    "correct_option_id": 3,
    "solution": "<p>For imaginary sentences, 'were' is used with all the subjects. </p><p><b>Syntax:</b> <i>If + subject + were + object, subject + would + first form verb.</i></p><p>Only option d) has the base form verb 'cook'. The given phrase and option b) have 'have' after 'would' which isn't required, and option a) has 'be' after 'would' which isn't required.</p><p><b>The correct sentence is: </b>If you were a chef, you would cook delicious meals every day.</p><p>Hence, option (d) is correct. </p>",
    "question_index": 9
  },
  {
    "question": "<p><b> </b>Select the option that will improve the bracketed part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>Alice and Bob smiled at (one another) across the crowded room, silently sharing a moment of understanding.</p>",
    "options": [
      "Each other",
      "Each another",
      "No improvement",
      "One other"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Each other' denotes the mutual relationship between people/ things while 'one another' denotes the mutual relationship among more than two people/ things.</p><p>Since here only two people are concerned, 'each other' is a suitable option over 'one another' while the other two phrases do not exist.</p><p><b>The correct sentence is - </b>Alice and Bob smiled at each other across the crowded room, silently sharing a moment of understanding.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>Don't forget to use insect repellent to <u>ward away</u> the mosquitoes.</p>",
    "options": [
      "warding away",
      "No improvement required",
      "ward of",
      "ward off"
    ],
    "correct_option_id": 3,
    "solution": "<p>The phrase 'ward away' is incorrect. The correct phrasal verb is 'ward off' (prevent someone or something from harming or affecting one). It is grammatically and contextually correct in this sentence. Hence, option (d) is the correct answer. </p><p><b>Note:</b></p><p><b>Phrasal verb: </b>A phrase that consists of a verb with a preposition or adverb or both, the meaning of which is different from the meaning of its separate parts. Example: She has always <b>looked down on</b> me. Here, the phrasal verb <b>'to look down on someone</b>' doesn't mean that you are looking down from a higher place at someone who is below you; it means that you think that you are better than someone.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>His design <u>does away with</u> the latter's camshafts and valves.</p>",
    "options": [
      "No improvement required",
      "does over with",
      "does down in",
      "does in with"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Do away with' is a phrasal verb meaning <i>remove or put an end to something. </i>Since the subject 'design' is singular in nature, the singular verb 'does' is used here. The underlined part of the sentence is grammatically and contextually correct. So, no improvement is required. Hence, option (a) is the correct answer.</p><p>Do over: repeat.</p><p>Do down: criticize someone or something.</p><p>Do in: kill someone.</p><p><b>Note:</b></p><p><b>Phrasal verb: </b>A phrase that consists of a verb with a preposition or adverb or both, the meaning of which is different from the meaning of its separate parts. Example: She has always <b>looked down on</b> me. Here, the phrasal verb <b>'to look down on someone</b>' doesn't mean that you are looking down from a higher place at someone who is below you; it means that you think that you are better than someone.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p><u>Despite of the pressure of</u> daily newspaper coverage, the magazine kept itself relevant by doing investigative stories and detailed political analyses.</p>",
    "options": [
      "In spite the pressure",
      "Despite the pressure of",
      "Despite the pressure",
      "No improvement required"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Despite' is not followed by the preposition 'of' as it means without being affected by; in spite of. Usage of the preposition &#8216;of&#8217; with it is superfluous. But usage of preposition &#8216;of&#8217; is required after &#8216;pressure&#8217; to show the possession.</p><p>So, only option b) (despite the pressure of) can improve the underlined part of the given sentence.</p><p>Hence, option b) is correct.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>Peterkin readjusted his hat and was soon listening with <u>as much interest</u> as I was.</p>",
    "options": [
      "so much interest",
      "as many interest",
      "so many interest",
      "No Improvement required"
    ],
    "correct_option_id": 3,
    "solution": "<p>The comparative adjective 'as' should be used in place of 'so'. The uncountable adjective 'much' should be used in place of the countable 'many', as it is being used to modify the uncountable noun 'interest'. D is the right answer.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>You ought to <u>having taken</u> care of your brothers and sisters. </p>",
    "options": [
      "had taken",
      "having took",
      "No improvement required",
      "have taken"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Ought to' is a modal verb and a modal verb is always followed by a base verb. 'Having' is the present participle (V4) of the base verb 'have'. So, the underlined part of the sentence is grammatically incorrect.</p><p>'Had' is the past tense and past participle of the base verb 'have'. So, option (a) is also eliminated. 'Have taken' is the correct choice. Hence, option (d) is the correct answer.</p><p><b>Note:</b></p><p><b>Modal verb: </b>A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>Renovating the house is going to <u>cost a pretty labour</u>, but it'll be worth it.</p>",
    "options": [
      "Cost an iron penny",
      "Cost a pretty penny",
      "Cost a pretty remake",
      "Cost a little penny"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct idiom with its meaning is given below.</p><p>Cost a pretty penny: To be very expensive.</p><p>Among the given choices, option (b) can substitute the underlined segment given in the sentence.</p><p>Hence, option (b) is the correct answer. </p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>All these belong to the family <u>which have</u> flowers in the form of a cross.</p>",
    "options": [
      "that which",
      "who have",
      "which has",
      "No improvement required"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Which' is a relative pronoun and the verb after the relative pronoun should be used according to the antecedent. In this case, the antecedent is 'family' which is singular in nature. So, the plural verb 'have' is grammatically incorrect. So, the underlined part and option (b) are incorrect. The expression 'that which' does not bring out a meaningful sentence. 'Has' is a singular verb. So, option (c) is grammatically and contextually correct. Hence, option (c) is the correct answer. </p><p><b>Note:</b></p><p><b>Relative pronouns: </b>A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies, or describes, the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>While those symptoms <u>were troubling</u>, they typically resolved within two weeks.</p>",
    "options": [
      "were troubled",
      "was troublesome",
      "we're troubling",
      "No Improvement required"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Troubling' refers to something that causes concern, and 'troubled' means disturbed. Since symptoms can only cause concern, and not be concerned themselves, so 'troubling' will be used here. A is incorrect. B is incorrect as the plural verb 'were' should be used here, as we are talking of more than one symptom. C is incorrect as \"we're\" is short for 'we are', which makes no sense. D is the right answer.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>Unless he <u>is not very</u> cautious with his money, he will run into debt very soon.</p>",
    "options": [
      "will not be very",
      "dared",
      "is very",
      "No improvement required"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Unless' is used to denote the condition i.e. 'If not'. So, the use of the negative word 'not' with 'unless' is superfluous. So, the phrase 'is not very' needs to be replaced with 'is very' to make the sentence grammatically correct.</p><p>Hence, option (c) is correct.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
