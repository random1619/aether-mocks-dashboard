    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>He dreams <u>big</u> than his friends.</p>",
    "options": [
      "bigger",
      "more big",
      "biggest",
      "most big"
    ],
    "correct_option_id": 0,
    "solution": "<p>The underlined word 'big' is in a positive degree but in the sentence, the dreams of the subject are compared with those of his friends and so the sentence is in a comparative degree which means the adjective 'big' has to be in comparative form. Among the given options, 'biggest' is the superlative form and cannot be used. 'More big' and 'most big' are incorrect by default because when a proper comparative/superlative degree adjective exists, we use that instead of making a comparative/superlative degree adjective using 'more/most' and so they are also negated. Option (a) 'bigger' is the most appropriate word that is in comparative form and can replace the underlined word in the given sentence.</p><p>Hence, the correct answer is option (a).</p><p>Note:</p><p>&#183; <b>The Positive Degree </b>of an Adjective is the Adjective in its simple form. It is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> of an adjective denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>Mr. Sharma is <u>kind as</u> his father.</p>",
    "options": [
      "Kinder as",
      "The kindest as",
      "As kind as",
      "No substitution"
    ],
    "correct_option_id": 2,
    "solution": "<p>The construct 'is....as' is incorrect. We use <i>as + adjective/adverb + as</i> to make comparisons when the things we are comparing are equal in some way. For example:</p><p>The world's biggest bull is <b>as big as</b> a small elephant.</p><p>Therefore, the phrase in option (c) is the correct choice.</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>She is the <u>least reliablest</u> person of all.</p>",
    "options": [
      "leastest reliable",
      "less reliable",
      "least reliable",
      "lesser reliable"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate option to substitute the underlined segment is 'least reliable'. 'Least reliablest' is not correct because \"least\" is already a superlative form indicating the lowest degree of reliability. Adding \"-est\" to \"reliable\" is redundant and incorrect. \"Least reliable\" is the correct form that indicates that the person is the most unreliable out of all possible options, which aligns with the intended meaning of the sentence. Option (a) is grammatically incorrect. \"Leastest\" is not a standard English word, and it doesn't follow the pattern of forming superlatives. Therefore, it is not the correct choice. Option (b) is not correct because this option does not accurately convey the intended meaning. \"Less reliable\" implies that the person is not as reliable as others but it does not necessarily indicate that they are the least reliable out of all possible options. Option (d) is incorrect. \"Lesser\" is typically used as a comparative adjective, but in this context, a superlative form is needed. Hence, (c) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined words in the given sentence.</p><p>Varun is <u>handsome than</u> his brother.</p>",
    "options": [
      "much handsome to",
      "most handsome than",
      "more handsome than",
      "more handsome to"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate option that can substitute the underlined words in the given sentence is 'more handsome than'. The error in the original sentence is the incorrect comparative form used. The comparative form of the adjective \"handsome\" should be used to compare two things. In this case, Varun is being compared to his brother. However, the sentence incorrectly uses \"than\" after \"handsome,\" which is grammatically incorrect. The correct comparative form of \"handsome\" is \"more handsome.\" Option (a) is incorrect because \"much\" is used to intensify adjectives or adverbs, not to form comparisons. Option (b) is incorrect because \"most\" is the superlative form of the adjective \"handsome,\" which is used when comparing more than two items. However, the sentence only compares Varun to his brother. Option (d) is incorrect because it uses the preposition \"to\" instead of \"than\" in a comparison of inequality. The correct construction for comparisons of inequality with adjectives is \"more ... than.\" Hence, (c) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>The project was completed / more quicker / than expected.</p>",
    "options": [
      "No error",
      "more quicker",
      "The project was completed",
      "than expected"
    ],
    "correct_option_id": 1,
    "solution": "<p>This is an error of double comparison. \"Quicker\" is already a comparative form of \"quick,\" so adding \"more\" creates redundancy. It should be either \"more quickly\" or simply \"quicker.\" Since \"quicker\" already indicates comparison, \"more\" is unnecessary and incorrect.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the following sentence.</p><p>Rimjhim received <u>a children's very illustrated colourful atlas</u> on her 10th birthday.</p>",
    "options": [
      "a very illustrated colourful atlas children",
      "a very colourful illustrated children's atlas",
      "an very illustrated colourful children's atlas",
      "a colourful very illustrated children's atlas"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The correct structure for adjectives is:</p><p>Quantity &rarr; Opinion &rarr; Size &rarr; Age &rarr; Shape &rarr; Colour &rarr; Origin &rarr; Material &rarr; Purpose &rarr; Noun</p><p>&#183; Correct phrase: \"a very colourful illustrated children's atlas\"</p><p>&#183; Incorrect options: </p><p>o A) Misplaces adjectives.</p><p>o C) Uses \"an\" incorrectly (before consonant sound).</p><p>o D) Adjective order is incorrect.</p>",
    "question_index": 5
  },
  {
    "question": "<p>In the following sentence, the underlined part contains an error. Alternatives to the underlined part are given as options. Select the correct alternative.</p><p>The children were <u>merry</u> than usual on Sunday.</p>",
    "options": [
      "more merrier",
      "the merriest",
      "merriest",
      "merrier"
    ],
    "correct_option_id": 3,
    "solution": "<p>The comparative form of \"merry\" is \"merrier,\" used with \"than\" for comparing two items. \"More merrier\" is redundant, and \"the merriest\" or \"merriest\" are superlatives, unsuitable for a two-item comparison.</p><p><b>The complete sentence is: \"The children were merrier than usual on Sunday.\"</b></p>",
    "question_index": 6
  },
  {
    "question": "<p>Identify the segment that contains a grammatical error.</p><p>He cheated in the [A] / examination, making his [B] / already-falling academic [C] / credentials worst. [D]</p>",
    "options": [
      "D",
      "A",
      "C",
      "B"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is in segment D, where \"worst\" should be \"worse.\" \"Worst\" is the superlative form, used when comparing more than two items, while \"worse\" is the comparative form, appropriate here for comparing the current state to the previous one.</p><p>The correct sentence: He cheated in the examination, making his already-falling academic credentials worse.</p><p>Hence, the correct answer is option (a).</p><p><b>Note:</b></p><p>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 7
  },
  {
    "question": "<p>In the following sentence the underlined part contains an error. Alternatives to the underlined part are given as options.</p><p>Select the correct alternative.</p><p>The new almirah is <u>big</u> than this one.</p>",
    "options": [
      "bigger",
      "more big",
      "biggest",
      "more bigger"
    ],
    "correct_option_id": 0,
    "solution": "<p>The comparative form of \"big\" is \"bigger,\" used here to compare two almirahs.</p><p>More big: Incorrect, as \"bigger\" is the standard form.</p><p>Biggest: Superlative, used for more than two items.</p><p>More bigger: Redundant and incorrect.</p><p>The correct sentence: The new almirah is bigger than this one.</p><p>Hence, the correct answer is option (a)</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate form of comparative degree that can substitute the underlined segment in the given sentence.</p><p>Bilingual children are <u>so intelligent than</u> those who speak just one language.</p>",
    "options": [
      "so intelligent to",
      "better intelligent than",
      "more intelligent than",
      "the most intelligent to"
    ],
    "correct_option_id": 2,
    "solution": "<p>The underlined phrase \"so intelligent than\" is incorrect for a comparative structure. \"More intelligent than\" correctly uses \"more\" for the comparative degree of \"intelligent\" and \"than\" for comparison.</p><p>\"So intelligent to\"-Incorrect because \"so\" is not used with \"to\" in comparisons; it requires \"that\" in different structures.</p><p>\"Better intelligent than\"-Incorrect because \"better\" is the comparative form of \"good,\" not \"intelligent.\" The correct form is \"more intelligent.\"</p><p>\"The most intelligent to\"-Incorrect because \"the most\" is superlative, not comparative, and \"to\" is not used in comparisons.</p><p>Hence, the correct answer is option (c).</p><p><b>Note:</b></p><p>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 9
  },
  {
    "question": "<p>In the following sentence the underlined part contains an error. Alternatives to the underlined part are given as options. Select the correct alternative.</p><p>I want to buy the <u>less</u> expensive bike, but with the best mileage.</p>",
    "options": [
      "least",
      "little",
      "lesser",
      "most less"
    ],
    "correct_option_id": 0,
    "solution": "<p>The underlined phrase \"less expensive\" is incorrect because the sentence implies a superlative comparison (paired with \"best mileage\"). The superlative form \"least\" is required when comparing three or more items.</p><p>The correct sentence is: I want to buy the least expensive bike, but with the best mileage.</p><p>Least-The superlative form, correct for comparing multiple bikes.</p><p>Little-An adjective or quantifier for small amounts, not a comparative for \"expensive.\"</p><p>Lesser-A comparative form, but less common and not standard for \"expensive.\"</p><p>Most less-Grammatically incorrect; \"most\" and \"less\" cannot combine.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the appropriate option that can substitute the underlined word in the following sentence to make it grammatically correct.</p><p>This almirah is made up of <u>heavier</u> metal.</p>",
    "options": [
      "Heaviest",
      "most heavier",
      "most heaviest",
      "heavy"
    ],
    "correct_option_id": 3,
    "solution": "<p>heavier: Comparative, implies comparison not present in the sentence.</p><p>heaviest: Superlative, for more than two items.</p><p>most heavier: Incorrect grammar.</p><p>most heaviest: Incorrect grammar.</p><p>heavy: Base adjective, fits a simple description.</p><p>Correct sentence: \"This almirah is made up of heavy metal.\"</p>",
    "question_index": 11
  },
  {
    "question": "<p>In the following sentence the underlined part contains an error. Alternatives to the underlined part are given as options. Select the correct alternative.</p><p>The sky appeared to be <u>greyest</u> after the storm.</p>",
    "options": [
      "more grey",
      "greyer",
      "most grey",
      "grey"
    ],
    "correct_option_id": 3,
    "solution": "<p>The underlined word greyest is a superlative adjective, implying comparison among three or more items, which is not supported by the sentence context (no multiple items are compared). The sentence requires a simple adjective to describe the sky's appearance.</p><p>more grey: Comparative, implying comparison with another, not suitable without a specific comparison.</p><p>greyer: Comparative, also incorrect without a comparison.</p><p>most grey: Superlative, similar to \"greyest,\" incorrect without multiple items.</p><p>grey: Base adjective, appropriate for a simple description: \"The sky appeared to be grey after the storm.\"</p><p>Thus, grey is the correct alternative.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the option that rectifies the underlined part of the given sentence. In case no correction is needed, select 'No correction required'.</p><p>Cinema provides <u>the most universal</u> entertainment.</p>",
    "options": [
      "an universal",
      "No correction required",
      "a universal",
      "more universal"
    ],
    "correct_option_id": 2,
    "solution": "<p>The adjectives  -  <b><i>empty, excellent, circular, extreme, chief, entire, complete, perfect, final, last, unique, universal, round, square, triangular, eternal, etc. </i></b><i>are not used in the comparative or superlative degree.</i></p><p>So, using 'most' and 'more' before 'universal' is incorrect. So, the highlighted phrase requires replacement. </p><p>'Universal' starts with a vowel but is a consonant-sounding word. So, it shall be preceded by 'a', and not 'an'. </p><p>The correct sentence is: Cinema provides <u>a universal</u> entertainment.</p><p>Hence, option (c) is the answer. </p><p><b>Note: </b>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate word to fill in the blank.</p><p>It is an ______ day to start your new business.</p>",
    "options": [
      "Auspicious",
      "Audacious",
      "Occasional",
      "Ominous"
    ],
    "correct_option_id": 0,
    "solution": "<p>The blank requires an adjective to modify the noun 'day'.</p><p>Let's look at the meanings of the given options.</p><p>Auspicious: conducive to success; favourable.</p><p>Audacious: showing a willingness to take surprisingly bold risks.</p><p>Occasional: occurring, appearing, or done infrequently and irregularly.</p><p>Ominous: giving the worrying impression that something bad is going to happen; threateningly inauspicious.</p><p>Options (b) and (c) are eliminated as they do not provide a coherent sentence. We don't start a new business on a bad day. So, of the two options: (a) and (d), 'auspicious' is the most appropriate choice.</p><p>Hence, option (a) is the correct answer.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Tia wanted a dog that was _________ than Larry's dog.</p>",
    "options": [
      "smarty and strong",
      "smartest and strongest",
      "smarter and stronger",
      "smart and strong"
    ],
    "correct_option_id": 2,
    "solution": "<p>When two entities (person or things) are being compared then 'comparative degree' is used, here Tia's imaginary dog is compared with Larry's dog. Therefore, the use of 'smarter and stronger' is the right phrase for the blank.</p><p>The complete sentence is- '<b>Tia wanted a dog that was smarter and stronger than Larry's dog.</b>'</p><p>Hence, option (c) is correct.</p><p>NOTE/-</p><p>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The movie was released__________ expected.</p>",
    "options": [
      "later than",
      "most later than",
      "later then",
      "more later than"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Later than' means 'after the specified time'. </p><p>Option (b) is incorrect as 'most' is not written with the adjective in comparative degree ('later'). It is written with a positive degree adjective. </p><p>'Later then' does not form a meaningful phrase. So, option (c) is incorrect.</p><p>Option (d) is incorrect as it is the case of double comparative. Double comparatives should be avoided. 'More' should be removed as 'later' in itself is the adjective of comparative degree. </p><p>So, the correct sentence is: The movie was released later than expected.</p><p>Hence, option (a) is the answer.</p><p>Note: &#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The mango is the ______ fruit.</p>",
    "options": [
      "Sweetly",
      "Sweet",
      "Sweeter",
      "sweetest"

    "correct_option_id": 3,
    "solution": "<p>The sentence implies a superlative quality of the mango compared to other fruits. The superlative form of the adjective \"sweet\" is \"sweetest,\" indicating the mango is the most sweet among all fruits. \"Sweetly\" is an adverb, \"sweet\" is the base adjective, and \"sweeter\" is comparative, none of which fit the superlative context.</p><p>Thus, \"sweetest\" is the correct choice.</p><p><b>The complete sentence is: \"The mango is the sweetest fruit.\"</b></p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Prescription safety glasses provide the ______ tailored protection for individuals with vision correction needs.</p>",
    "options": [
      "finest",
      "finer",
      "fine",
      "more finely"
    ],
    "correct_option_id": 0,
    "solution": "<p>It can be noted that the sentence establishes that 'prescription safety glasses' is the ultimate option for people who need vision correction, indicating that the sentence is in superlative degree. Thus, the superlative adjective \"finest\" is appropriate to indicate the highest degree of tailored protection. \"Finer\" is comparative, \"fine\" is positive, and \"more finely\" is an adverb, which doesn't fit the context.</p><p>The complete sentence: Prescription safety glasses provide the finest tailored protection for individuals with vision correction needs.</p><p>Hence, the correct answer is option (a).</p><p>Note:</p><p>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compare4.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 18
