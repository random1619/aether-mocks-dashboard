    "question": "<p>Select the option that converts the given sentence into the superlative degree.</p><p>The river Ganga has some of the purer water on earth.</p>",

    ],
    "correct_option_id": 3,
    "solution": "<p>The original sentence uses \"purer,\" which is the comparative degree of the adjective \"pure.\" To convert it to the superlative degree, \"purer\" becomes \"purest,\" indicating the highest degree of purity. Option 4 correctly uses \"purest\" without redundant modifiers like \"most\" or \"very,\" which are unnecessary since \"purest\" is already the superlative form. The phrase \"some of the purest\" indicates that the Ganga's water is among the purest, which aligns with the original meaning. The other options either use incorrect grammar or redundant modifiers.</p><p>Option 1: The river Ganga has some of the most purest water on earth. Using \"most\" with \"purest\" is grammatically incorrect, as \"purest\" is already the superlative form. This creates a double superlative, which is redundant.</p><p>Option 2: The river Ganga has some of the very purest water on earth. \"Very\" is an intensifier that can be used with positive adjectives (e.g., \"very pure\"), but with superlatives like \"purest,\" it is unnecessary and stylistically awkward in formal English.</p><p>Option 3: The river Ganga has some of the more purest water on earth. \"More\" is used for comparative forms (e.g., \"purer\"), not superlatives. Combining \"more\" with \"purest\" is grammatically incorrect.</p><p>Hence, the correct answer is option (d).</p>",

    "question": "<p>Select the option that expresses the given sentence in positive degree of comparison.</p><p>He was greater than any other physiologist of the century.</p>",

    "correct_option_id": 3,
    "solution": "<p>The positive degree of comparison is the form of an adjective or adverb that expresses a quality or condition without making any comparison. It is the base form of the word, used to describe a quality or condition as it is, without indicating that it is better or worse than anything else. Option (d) expresses the given sentence in the positive degree of comparison by emphasising the superiority of the individual without directly comparing him to anyone else. The phrase \"as great (base form) as\" conveys the idea that the individual's greatness stands unmatched within the context of the century.</p><p>Option (a) is not correct. This option suggests that all other physiologists were equally great as him, which contradicts the original statement that he was greater than any other physiologist of the century.</p><p>Options (b) and (c) are not correct as they use the superlative degree (greatest), not the positive degree. </p><p>Hence, (d) is the correct answer. </p><p><b>NOTE:</b></p><p><b>Adjectives:</b> Words which are used with a noun/pronoun to describe or point out, the person, animal, place, or thing which the noun names, or to tell the number or quantity, are called Adjectives.</p><p>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared. </p>",
    "question_index": 2

    "question": "<p>Select the option that expresses the given sentence in positive degree of comparison.</p><p>She is the dullest child in the class.</p>",

    "correct_option_id": 2,
    "solution": "<p>The option that expresses the given sentence in the positive degree of comparison is 'No other child in the class is as dull as she'. The given sentence is already in the superlative degree, indicating the highest degree of dullness. To express it in the positive degree, which denotes a basic or straightforward comparison without emphasising the extremeness, the sentence can rephrased as: \"No other child in the class is as dull as she.\" This construction compares the dullness of the specified child to the dullness of the other children in the class without singling her out as the \"dullest.\" It represents a positive degree of comparison by highlighting a level of dullness without making it the most extreme in the class. </p><p>Option (a) contains a grammatical error with \"very duller,\" as \"duller\" already implies a comparative degree. The correct form would be either \"She is very dull in the class\" or \"She is duller than others in the class.\"</p><p>Option (b) maintains the superlative form \"dullest,\" which is not in the positive degree. It still emphasises the extremeness.</p><p>Option (d) has an awkward and less conventional structure. It does not clearly convey a positive degree of comparison. </p><p>Hence, (c) is the correct answer. </p><p>NOTE:</p><p>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 3
  },

    "question": "<p>Select the grammatically correct sentence.</p>",

    "correct_option_id": 1,
    "solution": "<p>The grammatically correct sentence is 'The warrior was waiting for the right time to attack the lion hiding in the cave'. This sentence uses the appropriate definite article 'the' before the words 'warrior' and 'lion', indicating specific individuals or entities. Additionally, it correctly uses the phrase 'the right time'. The phrase 'the right time' is the correct choice because it refers to a particular moment that the warrior is waiting for. Using 'an right time' is grammatically incorrect as 'an' is used before words that begin with a vowel sound. Options (a), (c), and (d) contain grammatical errors. In option (a), 'an right time' should be 'the right time'. Similarly, options (c) and (d) have similar errors with the use of \"an\" instead of \"the\" before the words \"warrior\" and \"lion.\"</p><p>Hence, (b) is the correct answer.</p><p><b>NOTE:</b></p><p>An article is a word that comes before a noun to indicate whether it's specific or general.</p><p><b>Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",
