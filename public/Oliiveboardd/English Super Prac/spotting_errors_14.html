    "question": "<p>Select the most appropriate option that can replace the bracketed segment in the given sentence.</p><p>The team (has win) several awards for their innovative work.</p>",
    "options": [
      "Has won",
      "Have winning",
      "Had win",
      "Has winning"
    ],
    "correct_option_id": 0,
    "solution": "<p>In the sentence, 'has' indicates a present perfect tense, which is used to describe actions that started in the past and continue into the present or have just been completed. In the present perfect tense, the auxiliary verb \"has\" is used with the past participle form of the main verb. But 'win' (base form) is not the past participle form. For irregular verbs like \"win\", the past participle form is \"won\". Therefore, the correct structure is \"has won\" (option a).</p><p>Options (b) and (d) are not correct. In present perfect tenses, after \"has\" or \"have\", we use the past participle form of the verb, not the present participle form \"winning\".</p><p>Option (c) is also incorrect. 'Had' indicates a past perfect tense. The past perfect tense is formed using the auxiliary verb \"had\" plus the past participle of the main verb. But 'win' (base form) is not the past participle form. Hence, (a) is the correct answer.</p><p><b>The correct sentence is: </b>The team <b>has won</b> several awards for their innovative work.</p><p><b>NOTE:</b></p><p></b>\"<b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing</b> at the party, the women fell on the ground.</p><p><b>Encouraged </b>by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.\"</p><p><b>Auxiliary verb:</b> A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. Auxiliary verbs help to form the various tenses, moods, and voices of other verbs. The principal ones are be, do, and have. Example: She will sing a song tomorrow. Here, 'will' is the auxiliary verb that supports the main verb 'sing'.</p><p><b>Irregular verbs:</b> Irregular verbs are verbs that do not follow the standard pattern of conjugation in the past tense and past participle forms. In English, most verbs are regular, meaning they form their past tense and past participle by adding -ed to the base form (e.g., walk becomes walked). However, irregular verbs have unique forms that must be memorized because they do not follow this pattern. For example: go-went-gone, eat-ate-eaten, win-won-won, etc.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error. </p><p><u>By</u> the time <u>they</u> noticed, <u>he</u> had <u>broke</u> the window.</p>",
    "options": [
      "Broke",
      "By",
      "They",
      "He"
    ],
    "correct_option_id": 0,
    "solution": "<p>The part that contains a grammatical error is 'broke'. The error lies in the verb form of the word 'broke'. In the past perfect tense (indicated by the helping verb 'had'), we use the past participle form of the main verb after 'had'. However, the verb 'break' in its past participle form is 'broken', not 'broke' (past tense). To rectify the error, we need to replace 'broke' with 'broken'. Hence, (a) is the correct answer. </p><p><b>The correct sentence is:</b> By the time they noticed, he had <b>broken </b>the window.</p><p><b>NOTE:</b></p><p>Participle: A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged </b>by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the grammatically correct sentence. </p><p></p>",
    "options": [
      "I have never seen such a beautiful sunset before.",
      "I have never saw such a beautiful sunset before.",
      "I have never see such a beautiful sunset before.",
      "I have never sees such a beautiful sunset before."
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence given in option (a) is grammatically correct. The sentence is in the present perfect tense (indicated by 'have'). The present perfect tense requires the past participle form after \"have\". The past participle form of the verb 'see' is 'seen' (used in option a). \"Saw\" (option b) is the past simple form of \"see\", not the past participle form. \"See\" (option c) is the base form of the verb. \"Sees\" (option d) is the third-person singular form of \"see\", not past participle form. Hence, (a) is the correct answer. </p><p><b>The correct sentence is:</b> I have never seen such a beautiful sunset before.</p><p><b>NOTE:</b></p><p><b>Participle: </b>A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p>Dancing at the party, the women fell on the ground.</p><p>Encouraged by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that expresses the given sentence in present tense form.</p><p>There was a queue of people waiting patiently for the bus to arrive.</p>",
    "options": [
      "There is a queue of people waiting patiently for the bus to arrive.",
      "There had been a queue of people waiting patiently for the bus to arrive.",
      "There will be a queue of people waiting patiently for the bus to arrive.",
      "There will have been a queue of people waiting patiently for the bus to arrive."
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct option that expresses the given sentence in present tense form is (a). Option (a) changes the verb \"was\" (past tense) to \"is\" (present tense). The present tense is used to describe actions or situations that are happening currently or are generally true. Option (b) is in the past tense form. Options (c) and (d) are in the future tense forms. Hence, (a) is the correct answer. </p>",
    "question_index": 3
  },
  {
    "question": "<p> The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer.</p><p>I would like to / known your thoughts / on this proposal.</p>",
    "options": [
      "No error",
      "I would like to",
      "Known your thoughts",
      "On this proposal"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in option (c). The error is related to the verb form 'known'. \"Known\" is the past participle form of the verb \"know\" (base form) and is not suitable here because the infinitive marker 'to' requires the base form of the verb, not the past participle. Hence, (c) is the correct answer.</p><p><b>The correct sentence is:</b> I would like to know your thoughts on this proposal.</p><p><b>NOTE:</b></p><p>Participle: A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p><p><b>Infinitive marker:</b> A word or affix attached to the stem of a verb in order to form the full infinitive [to + base verb]. In English, \"to\" is the infinitive marker.</p>",
    "question_index": 4
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The teacher / explain the difficult / concepts clearly / to the students. </p>",
    "options": [
      "The teacher",
      "Concepts clearly",
      "To the students",
      "Explain the difficult"
    ],
    "correct_option_id": 3,
    "solution": "<p>The segment with a grammatical error is 'explain the difficult'. The error lies in the subject-verb agreement. The subject of the sentence is \"The teacher,\" which is singular. However, the verb form \"explain\" (plural) is incorrect for this subject because it does not match the singular form. Therefore, to correct the error, \"explain\" should be replaced with the singular verb form \"explains\" to match the singular subject \"The teacher.\" Or, change 'explain' to the past tense verb 'explained'. Hence, (d) is the correct answer.</p><p><b>The correct sentence is:</b> The teacher explains the difficult concepts clearly to the students. </p><p>Or </p><p>The teacher explained the difficult concepts clearly to the students.</p><p><b>Note:</b></p><p>Subject-verb agreement means that the subject and the verb of a sentence agree in number with each other. If the subject is singular, the verb should also be singular. (I am going.) If the subject is plural, the verb should also be plural. (They are going.)</p>",
    "question_index": 5
  },
  {
    "question": "<p>The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer. </p><p>She usually reads a/ book in the evening and/ finished it by bedtime.</p>",
    "options": [
      "No error",
      "She usually reads a",
      "book in the evening and",
      "finished it by bedtime"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option (d) contains the error. The tense should be consistent with the first part of the sentence. Since the first part uses the present tense (\"reads\"), the second part should also be in the present tense to match. The sentence describes the routine of the subject \"she\", so simple present tense would be appropriate here. Therefore, \"finished\" should be corrected to \"finishes.\" Hence, (d) is the correct answer. </p><p>The corrected sentence: She usually reads a book in the evening and finishes it by bedtime. </p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the grammatically correct sentence. </p><p>A) I have completed the initial draft of my novel. The editing process will start next week.</p><p>B) I have complete the initial draft of my novel. The editing process will start next week.</p><p>C) I have completes the initial draft of my novel. The editing process will start next week.</p><p>D) I have completed the initial draft of my novel. The editing process will starts next week.<b></b></p>",
    "options": [
      "B",
      "A",
      "C",
      "D"
    ],
    "correct_option_id": 1,
    "solution": "<p>The grammatically correct sentence is A. The error in sentence B is related to verb form. The phrase \"have complete\" is incorrect because \"complete\" is the base form of the verb, whereas the present perfect tense requires the past participle form of the verb. The correct form is \"have completed.\" The verb \"complete\" should be in the past participle form \"completed\" to match the present perfect tense of the sentence. The error in sentence C is again related to verb from. The phrase \"have completes\" is incorrect. The verb \"completes\" is in the present tense, but the present perfect tense requires the past participle form \"completed.\" The error in sentence D is related to verb form. The phrase \"will starts\" is incorrect because \"starts\" is the present tense form, whereas \"will\" requires the base form of the verb. When using \"will\" for future tense, the verb that follows should be in its base form, not the third person singular form. Hence, (b) is the correct answer. </p><p><b>NOTE:</b></p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 7
  },
  {
    "question": "<p>  Select the appropriate option for the given blank.</p><p>The collector, as well as the principal, ________ at the event.</p>",
    "options": [
      "have arrived",
      "has arrived",
      "were arrived",
      "are arrived"
    ],
    "correct_option_id": 1,
    "solution": "<p>The blank requires a verb phrase with an auxiliary verb and a main verb. When two or more verbs are joined by 'as well as, besides, in addition to, with, together with, along with, nothing but, like, unlike, rather than, no less than, the verb in the sentence is used according to the first subject. Accordingly, the singular verb 'has' is the most appropriate option to fill the given blank.</p><p>The complete sentence is: The collector, as well as the principal, has arrived at the event.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 8
  },
  {
    "question": "<p>  Select the appropriate option for the given blank.</p><p>The pianist ______ practising for his show.</p>",
    "options": [
      "was",
      "were",
      "are",
      "might"
    ],
    "correct_option_id": 0,
    "solution": "<p>The blank requires a primary auxiliary verb to support the main verb 'practising'. Since the noun 'pianist' is singular, the plural verbs 'were' and 'are' are negated. 'Might' is modal auxiliary verb and so they are also negated. Also, it is always followed by the base verb, and not the present participle form (-ing form) of verb. Option (a), 'was' is the most appropriate primary auxiliary verb that can fill the blank as required.</p><p>The complete sentence is: The pianist was practising for his show.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 9
  },
  {
    "question": "<p>  Select the appropriate option for the given blank.</p><p>The boy ______ the blood on his knee.</p>",
    "options": [
      "yawned",

      "barked"

    "correct_option_id": 2,
    "solution": "<p>The blank requires a transitive verb to be used along with object of the sentence 'the blood'. Accordingly, all the options except option (c), 'wiped' are intransitive verbs and so, they are negated.</p><p>The complete sentence is: The boy wiped the blood on his knee.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 10
  },
  {
    "question": "<p>  Select the appropriate option for the given blank.</p><p>Can you ______ me on this issue?</p>",
    "options": [
      "informed",

    "correct_option_id": 2,
    "solution": "<p>The blank requires a verb in base form or simple present tense form because any verb that follows a modal verb has to be only in the base form or simple present tense form. Only 'update' is the verb in base form.</p><p>The complete sentence is: Can you update me on this issue?</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 11

    "question_index": 12
  },
  {
    "question": "<p>   The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Fifteen pounds(A)/ are too (B)/ heavy for (C)/ her to carry (D).</p>",

  {
    "question": "<p>   The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Not in my (A)/ dreams I did (B)/ think that he (C)/ would betray me (D).</p>",

    "question_index": 14
  },
  {
    "question": "<p>  In the following question, a sentence is given with a phrase highlighted in bold. Select the option given below that can replace the phrase in bold to make the sentence grammatically and contextually correct and mark that as your answer. If the sentence is correct as it is, mark 'No correction required', as the answer.</p><p>It <b>appear like</b> the rain is not going to stop at the moment.</p>",
    "options": [

    "correct_option_id": 2,
    "solution": "<p>In the phrase given in bold, the verb 'appear' is related to a plural pronoun, but 'it' is singular. Therefore, the singular form of the verb 'appears' is to be used.</p><p>The correct sentence is: It appears like the rain is not going to stop at the moment.</p><p>Hence, the correct answer is option (c).</p>",
