<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate antonym of the given word.</p><p>Shrewd</p>",
    "options": [
      "acute",
      "foolish",
      "careless",
      "frugal"
    ],
    "correct_option_id": 1,
    "solution": "<p>Shrewd/ acute  -  having sharp powers of judgement. Foolish  -  stupid or lacking sense and intellect. Frugal  -  spending very little money. B is the right answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the ANTONYM of the word 'artificial' to fill in the blank. </p><p>Her smile radiated _________ warmth, lighting up the room instantly.</p>",
    "options": [
      "Ingenuine",
      "Genuine",
      "Foreign",
      "Fictitious"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Artificial' means (of a person or their behaviour) insincere or affected. 'Genuine' means truly what something is said to be; authentic. So, the two words can be used as antonyms of each other. Hence, (b) is the correct answer. </p><p>Ingenuine  -  false or unauthentic. </p><p>Foreign- strange and unfamiliar. </p><p>Fictitious- not real or true, being imaginary or having been fabricated. </p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the underlined words in the given sentence. </p><p>The accident was <u>certain to happen</u>, all thanks to the carelessness of the driver.</p>",
    "options": [
      "Incredible",
      "Avoidable",
      "Certain",
      "Inevitable"
    ],
    "correct_option_id": 1,
    "solution": "<p>Avoidable - able to be avoided or prevented.</p><p>So, 'avoidable' is the most appropriate antonym of the underlined words in the given sentence. Hence, option (b) is the answer.</p><p>Incredible - impossible to believe. </p><p>Certain - able to be firmly relied on to happen or be the case.</p><p>Inevitable - certain to happen; unavoidable.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the underlined word to fill in the blank.</p><p><u> </u></p><p>The positive reviews <u>amplified</u> the restaurant's popularity, while the negative ones __________ its reputation.</p>",
    "options": [
      "complemented",
      "propagated",
      "tarnished",
      "propelled"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let's look at the meanings of the given options. </p><p>Complemented: to make something else seem better or more attractive when combined with it.</p><p>Propagated: to produce a new plant using a parent plant.</p><p>Tarnished: make or become less valuable or respected.</p><p>Propelled: drive or push something forwards. </p><p>In this sentence, \"amplified\" means to increase the effect of something. The antonym for \"amplified\" is \"tarnished\", which means to damage or destroy the quality or reputation of something. </p><p>So, the sentence becomes: \"The positive reviews <u>amplified</u> the restaurant's popularity, while the negative ones <u>tarnished</u> its reputation\".</p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 3
  },
  {
    "question": "<p>Complete the sentence with the most appropriate set of ANTONYMS of the highlighted word.</p><p>'Rigid'</p><p>The artist preferred to work with materials that were ________ and ________, allowing for greater creativity in her sculptures.</p>",
    "options": [
      "Flexible, malleable",
      "Scandalous, secretive",
      "Merciful, dependent",
      "Festive, damaged"
    ],
    "correct_option_id": 0,
    "solution": "<p>Rigid: unable to bend or be forced out of shape; not flexible.</p><p>Flexible: the ability to bend easily without breaking, which contrasts with \"rigid,\" meaning stiff and inflexible.</p><p>Malleable: describes a material that can be shaped or formed under pressure, again opposing the idea of something that is \"rigid.\"</p><p>So, 'flexible' and 'malleable' are the required antonyms. </p><p>The complete sentence is: The artist preferred to work with materials that were <b>flexible</b> and <b>malleable</b>, allowing for greater creativity in her sculptures.</p><p>Hence, option a) is the answer. </p><p><b>Scandalous</b> means causing public outrage or offence, often related to a violation of morality or social norms.</p><p><b>Secretive</b> refers to being inclined to conceal feelings and intentions or to keep something hidden.</p><p><b>Merciful</b> means showing compassion or forgiveness, especially toward someone who is in a position of power.</p><p><b>Dependent</b> refers to needing someone or something else for support or help.</p><p><b>Festive</b> relates to celebrations or joyous occasions, often involving lively or happy elements.</p><p><b>Damaged</b> means harmed or impaired in some way.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the given word.</p><p>Indolent</p>",
    "options": [
      "Lazy",
      "Energetic",
      "Tired",
      "Greedy"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Indolent' means not wanting to work; lazy. Therefore, 'energetic' is the right antonym here. </p><p>Hence, option (b) is correct. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate antonym of the given word from the sentence. </p><p>Vague </p><p>The teacher gave explicit instructions on how to complete the assignment, leaving no room for confusion. </p>",
    "options": [
      "Explicit",
      "Complete",
      "Room",
      "Confusion"
    ],
    "correct_option_id": 0,
    "solution": "<p>The word \"vague\" refers to something that is unclear, imprecise, or not well-defined. </p><p>Explicit: This is the correct antonym. \"Explicit\" means clear, detailed, and leaving no room for uncertainty, which contrasts with the idea of being vague.</p><p>Complete: This is not the antonym of \"vague.\" \"Complete\" refers to being whole or having all parts, and it does not directly address the clarity or precision of instructions.</p><p>Room: This is not the antonym of \"vague.\" \"Room\" in this context refers to space and is not related to the clarity or precision of instructions.</p><p>Confusion: This is not the antonym of \"vague.\" \"Confusion\" is related to lack of understanding or clarity and it is not the opposite of being vague.</p><p>Hence, (a) is the correct answer. </p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the given word. </p><p>Insidious </p>",
    "options": [
      "Harmless",
      "Dangerous",
      "Horrifying",
      "Compulsive"
    ],
    "correct_option_id": 0,
    "solution": "<p>Insidious: (of something unpleasant or dangerous) gradually and secretly causing harm.</p><p>Harmless: not able or likely to cause harm.</p><p>As per the meanings, 'harmless' is the correct antonym. Hence, option (a) is the answer.</p><p>Dangerous: able or likely to cause harm or injury.</p><p>Horrifying: causing horror; extremely shocking.</p><p>Compulsive: resulting from or relating to an irresistible urge.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate antonym of the word 'ardent' in the given sentence.</p><p>He was indifferent to the idea of attending the party, hardly caring whether he went or not.</p>",
    "options": [
      "Indifferent",
      "Attending",
      "Caring",
      "Hardly"
    ],
    "correct_option_id": 0,
    "solution": "<p>The word \"ardent\" means passionate, enthusiastic, or very eager about something. </p><p>'Indifferent' means not showing any particular interest or enthusiasm. This is the opposite of \"ardent,\" which implies strong passion or enthusiasm. Hence, (a) is the correct answer. </p><p>Attending  -  Refers to the action of going to or being present at something, which doesn't relate to the meaning of \"ardent.\"</p><p>Caring  -  Means showing concern or interest. It doesn't directly oppose \"ardent\" in the same way as \"indifferent.\"</p><p>Hardly  -  Means scarcely or barely, and doesn't directly contrast with \"ardent.\"</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the given word.</p><p>Arbitrary</p>",
    "options": [
      "Capricious",
      "Amity",
      "Woe",
      "Consistent"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Arbitrary' means 'Based on random choice or personal whim, rather than any reason or system.' Options b) and c) can be rejected as they are unrelated to the word. 'Capricious' means 'Given to sudden and unaccountable changes of mood or behaviour.' Hence, option a) can also be rejected as it has the same meaning as the word. 'Amity' means 'Friendly relations.' 'Woe' means 'Great sorrow or distress (often used hyperbolically)'. Hence, option d) is the correct answer.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate antonym of the word in brackets to fill in the blanks. </p><p>The _____ (melancholic) crowd cheered loudly for their team.</p>",
    "options": [
      "Romantic",
      "Reliable",
      "Satisfied",
      "Exuberant"
    ],
    "correct_option_id": 3,
    "solution": "<p>Melancholic - expressing feelings of sadness.</p><p>The antonym of 'melancholic' is 'exuberant', meaning full of energy and excitement. Hence, (d) is the correct answer. </p><p>Romantic: relating to or characterized by love or affection</p><p>Reliable: trustworthy and dependable</p><p>Satisfied: content with something</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the word 'concise' in the given sentence. </p><p>The text is clear and concise, although the need for extended detail on the pathogenesis of myocardial infarction is debatable. </p>",
    "options": [
      "goal",
      "volume",
      "precise",
      "lengthy"
    ],
    "correct_option_id": 3,
    "solution": "<p>The word 'concise' means 'giving a lot of information clearly and in a few words; brief but comprehensive'. </p><p>Let's look at the meanings of the given options. </p><p>Goal: the object of a person's ambition or effort; an aim or desired result.</p><p>Volume: the amount of space that a substance or object occupies, or that is enclosed within a container.</p><p>Precise: marked by exactness and accuracy of expression or detail.</p><p>Lengthy: (especially in reference to time) of considerable or unusual length, especially so as to be tedious.</p><p>Among the given options, 'lengthy' is the most appropriate antonym of the given word. </p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 11
  },
  {
    "question": "<p><b> </b>Select the most appropriate ANTONYM of the word given in brackets to fill in the blank. </p><p>The fear of failure can _____ (liberate) one's potential. </p>",
    "options": [
      "Fetter",
      "Educe",
      "Extol",
      "Evince"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Liberate' means to set free from a situation or condition that restricts or limits. 'Fetter' means to restrain or restrict someone or something, typically with chains or manacles; to keep someone within limits or stop them from making progress. So, the two words can be used as antonyms of each other. Hence, (a) is the correct answer.</p><p>Educe: to bring out or draw forth something that is latent, hidden, or potential.</p><p>Extol: to praise or laud someone or something highly; to commend or exalt.</p><p>Evince: to reveal or show clearly; to indicate or display clearly.</p><p>The final sentence: The fear of failure can fetter one's potential.</p>",
    "question_index": 12
  },
  {
    "question": "<p><b> </b>Select the most appropriate antonym of the given word from the sentence. </p><p>Ineffable</p><p>His emotions were so intense that they were hardly expressible in words.</p>",
    "options": [
      "Emotions",
      "Intense",
      "Hardly",
      "Expressible"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Ineffable' means too great or extreme to be expressed or described in words; beyond expression.</p><p>(a) Emotions: Feelings or states of mind.</p><p>(b) Intense: Having a high degree of strength or force; deeply felt.</p><p>(c) Hardly: Barely or almost not.</p><p>(d) Expressible: Capable of being conveyed or communicated.</p><p>So, among the given options, 'expressible' is the most appropriate antonym of the given word. Hence, (d) is the correct answer. </p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate ANTONYM to replace the underlined word.</p><p>The company's financial reports showed a significant <u>augmentation</u> in profits.</p>",
    "options": [
      "Reduction",
      "Departure",
      "Connection",
      "Opportunity"
    ],
    "correct_option_id": 0,
    "solution": "<p>The meaning of the word 'augmentation' is the process of making something greater by adding to it; an increase or enhancement.</p><p>The meaning of the word 'reduction' is the action or fact of making something smaller or less in amount, degree, or size.</p><p>So, these words are antonyms of each other.</p><p>Departure-the action of leaving, especially to start a journey.</p><p>Connection-a relationship in which a person or thing is linked or associated with something else.</p><p>Opportunity-a time or set of circumstances that makes it possible to do something.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 14
  },
  {
    "question": "<p><b> </b>Select the most appropriate ANTONYM to replace the italicised word.</p><p>The old man was known for his <i>irascible </i>temperament. </p>",
    "options": [
      "Impulsive",
      "Lethargic",
      "Patient",
      "Intelligent"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Irascible' means easily angered or prone to outbursts of temper; having a quick and easily provoked temper.</p><p>'Patient' means able to accept or tolerate delays, problems, or suffering without becoming annoyed or anxious; showing self-control and calmness.</p><p>So, the two words can be used as antonyms of each other.</p><p>Hence, (c) is the correct answer.</p><p>Impulsive: Acting or done without forethought; acting on sudden urges or desires.</p><p>Lethargic: Sluggish; lacking in energy or vitality; showing an unwillingness to exert effort or move quickly.</p><p>Intelligent: Having or showing intelligence, especially of a high level; possessing the ability to understand complex ideas, learn quickly, and solve problems.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate ANTONYM to replace the underlined word.</p><p>The manager's <u>autocratic</u> leadership style hindered collaboration and stifled innovation.</p>",
    "options": [
      "Autonomous",
      "Bureaucratic",
      "Democratic",
      "Despotic"
    ],
    "correct_option_id": 2,
    "solution": "<p>The meaning of the word 'autocratic' is exercising power in a dictatorial or authoritarian manner, without input or participation from others. The meaning of the word 'democratic' is Relating to or supporting democracy, where power is vested in the people and exercised through free and fair elections. So, these words are antonyms of each other.</p><p>Autonomous-Having the freedom to govern or control oneself independently.</p><p>Bureaucratic-Relating to the business of running an organization or government, often involving excessive paperwork or red tape.</p><p>Despotic-Exercising power in a cruel or oppressive way, often absolute.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the word in the brackets to fill in the blank.</p><p>Her ______ of the instructions caused the project to be delayed. [attention]</p>",
    "options": [
      "neglect",
      "focus",
      "adherence",
      "respect"
    ],
    "correct_option_id": 0,
    "solution": "<p>The term 'attention' refers to the act of focusing on something. In this context, 'neglect' means to fail to care for or pay attention to instructions, which directly causes the project to be delayed. Thus, the two words are in opposition. Hence, (a) is the correct answer. </p><p>Focus: Concentrating on a particular task or detail. </p><p>Adherence: Following or sticking to instructions. </p><p>Respect: A feeling of admiration. </p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate antonym of the word 'despondent' in the given sentence.</p><p>Sarita greeted everyone with a cheerful smile, brightening up the entire room.</p>",
    "options": [
      "Greeted",
      "Cheerful",
      "Brightening",
      "Entire"
    ],
    "correct_option_id": 1,
    "solution": "<p>The word \"despondent\" means feeling hopeless, downhearted, or in low spirits. </p><p>'Cheerful' means happy, positive, and full of energy, which is the opposite of \"despondent.\" \"Cheerful\" directly contrasts with the sadness implied by \"despondent.\" Hence, (b) is the correct answer. </p><p>Greeted  -  Refers to the action of welcoming or acknowledging someone.</p><p>Brightening  -  Refers to making something brighter or more cheerful. While it contributes to the uplifting tone, it is a description of the effect rather than an emotional state in contrast to \"despondent.\"</p><p>Entire  -  Means whole or complete. This word doesn't have any emotional connection to \"despondent.\"</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the underlined word.</p><p>The company's <u>procrastination</u> in addressing the issue led to further complications.</p>",
    "options": [
      "Delay",
      "Expedite",
      "Hesitate",
      "Postpone"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most appropriate antonym for 'procrastination' is 'expedite'. </p><p>'Procrastination' means the action of delaying or postponing something. </p><p>In the context of the sentence, 'procrastination' indicates the company's delay in addressing the issue. </p><p>'Expedite' means to make something happen sooner or to speed up the process. </p><p>'Delay' means to make something late, which is similar to procrastination. </p><p>'Hesitate' means to pause before taking action, and 'postpone' means to delay something. </p><p>Hence, (b) is the correct answer.</p>",
    "question_index": 19
  }
];
    </script>

</html>
