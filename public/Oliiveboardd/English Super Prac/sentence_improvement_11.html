<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>Please <u>switch of</u> all the lights when not in use. </p>",
    "options": [
      "turn of",
      "turn off",
      "shut of",
      "No improvement required"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Switch of' is not a correct phrasal verb. The same is the case with options (a) and (c) ['off' is to be used in place of 'of']. The correct phrasal verb that can be used in the sentence is 'turn off' (to stop the flow of or shut off by or as if by turning a control). Hence, option (b) is the correct answer.</p><p><b>Note:</b></p><p><b>Phrasal verb: </b>A phrase that consists of a verb with a preposition or adverb or both, the meaning of which is different from the meaning of its separate parts. Example: She has always <b>looked down on</b> me. Here, the phrasal verb <b>'to look down on someone</b>' doesn't mean that you are looking down from a higher place at someone who is below you; it means that you think that you are better than someone.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p></p><p>The king seems to have been <u>fondly of</u> the little Crown Prince Fritz at this time.</p>",
    "options": [
      "fond of",
      "fond out",
      "fond by",
      "No Improvement required"
    ],
    "correct_option_id": 0,
    "solution": "<p>The adjective 'fond' should be used here, as it is being used to modify a noun 'king'. Also, this adjective always takes the preposition 'of' after it. A is the right answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>The boy <u>passed out</u> due to the heat.</p>",
    "options": [
      "passed away",
      "No Improvement required",
      "passed by",
      "passed off"
    ],
    "correct_option_id": 1,
    "solution": "<p>Option B is the right answer, as the sentence needs no improvement. 'Pass out' means to become unconscious. 'Pass away' means to die. 'Pass by' means when something or someone goes past. 'Pass off' means to happen or occur. Options A, C and D are thus eliminated.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>She always <u>looks down at</u> anyone who does not speak English fluently.</p>",
    "options": [
      "looks out on",
      "looks down",
      "looks down on",
      "No Improvement required"
    ],
    "correct_option_id": 2,
    "solution": "<p>Option C is the right answer. Option D is eliminated, as the sentence needs improvement since the given phrase in bold is grammatically incorrect. Option A is eliminated, as the prepositional phrase 'looks out on' means 'be oriented in a certain direction' which isn't implied here. Option B is eliminated as the prepositional phrase 'looks down', indicates that the person performing this action is looking below from a height which is not conveyed here. The correct phrase to be used here is 'looks down on', as it means to consider someone inferior to oneself.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>Please <u>carry out</u> with your homework for another hour.</p>",
    "options": [
      "Carry on",
      "Carry off",
      "Carry by",
      "No improvement required"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Carry out' means to execute an order or task. It doesn't fit the context of the sentence. The sentence asks to do the homework for another hour.</p><p>'Carry off' means to take something and leave with it. It also does not fit the context of the sentence.</p><p>The phrase 'carry by' gives no meaning to the sentence.</p><p>'Carry on' means to continue doing something. This fits the context of the sentence. It means 'continue doing your homework for another hour'.</p><p>This is meaningful.</p><p>So, 'carry on' (option a)) will improve the underlined part of the given sentence.</p><p>Hence, option a) is correct.</p><p></p><p></p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate collocation to substitute the underlined words in the given sentence. </p><p>Each abstract is <u>accompanied across</u> full bibliographic information.</p>",
    "options": [
      "accompanied of",
      "accompanied on",
      "accompanied at",
      "accompanied by"
    ],
    "correct_option_id": 3,
    "solution": "<p>Here, the preposition 'by' is correct since it specifies that full bibliographic information follows each abstract(Here, it may also suggest that abstract occurs at the same time as or along with the full bibliographic information).</p><p>Hence, (d) is the correct answer.</p><p>The final sentence would be: Each abstract is accompanied by full bibliographic information.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate phrasal verb to fill in the blank.</p><p>The army used precision-guided munitions to ____ enemy targets.</p>",
    "options": [
      "Blow up",
      "Blow out",
      "Blow in",
      "Blow off"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate phrasal verb to fill in the blank is 'blow up'. 'Blow up' means to explode or destroy something with an explosion. In the context of the given sentence, it means the army used precision-guided munitions to destroy enemy targets by causing them to explode. Other phrasal verbs are not suitable for the given context. 'Blow out' means to extinguish a flame or fire by blowing on it forcefully. 'Blow in' means to arrive, often unexpectedly or suddenly. 'Blow off' means to ignore or fail to keep a commitment or appointment with someone. Hence, (a) is the correct answer. </p><p><b>The complete sentence is:</b> The army used precision-guided munitions to blow up enemy targets.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>You can always ____________ Michael in case of a crisis.</p>",
    "options": [
      "do over",
      "count on",
      "drop off",
      "get along"
    ],
    "correct_option_id": 1,
    "solution": "<p>The phrasal verb 'do over' means a new attempt or opportunity to do something after a previous attempt has been unsuccessful or unsatisfactory; 'count on' means rely on someone or something; 'drop off' means fall asleep easily, especially without intending to; 'get along' means have a harmonious or friendly relationship. According to the meanings mentioned above, option b) fits in the blank contextually and gives a meaningful sentence. Filling the blank with 'count on' gives the meaning that the subject 'you' can depend on Michael in case of crisis.</p><p>The correct sentence is: You can always <b>count on</b> Michael in case of a crisis.</p><p>Hence, b) is the correct answer.</p><p><b>Note:</b> Phrasal verb: A phrase that consists of a verb with a preposition or adverb or both, the meaning of which is different from the meaning of its separate parts. Example: She has always looked down on me. Here, the phrasal verb 'to look down on someone' doesn't mean that you are looking down from a higher place at someone who is below you; it means that you think that you are better than someone.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>We <u>closed in on</u> her and asked her whose side she was on.</p>",
    "options": [
      "closed off",
      "closed down",
      "closed up",
      "No Improvement required"
    ],
    "correct_option_id": 3,
    "solution": "<p>Close off  -  to stop access to something. Close down  -  to shut down. Close up  -  to fill up a gap or space. Close in on  -  to surround in order to obtain something from someone. D is the right answer, as it fits best in the passage.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Jake thought no one knew how much he liked Julie, but his face when he got to know that she'll be at the party really _______!</p>",
    "options": [
      "Get it done",
      "Gave him away",
      "Got over it",
      "Got a word in edgeways"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Get it done' (achieve; accomplish) results in a grammatical error (according to the Subject-Verb Agreement principle, we need a singular verb with a singular noun/subject 'his face'; while 'get' is a plural verb); 'gave him away' (showed someone's secret feelings); 'got over it' (recovered from some physical or mental ailment); and 'got a word in edgeways' (to speak or express one's opinion despite other people dominating the conversation). Among these options, only 'gave him away' is grammatically correct and at the same time, results in a meaningful sentence/idea  -  'his secret feelings for Julie were evident on his face when Jake got to know that she'll be there'.</p><p>The answer is option (b).</p><p>Note:</p><p>Subject-Verb Agreement: Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - She likes cooking. [singular subject and verb] -- They like to cook vegetables. [plural subject and verb]</p>",
    "question_index": 9
  },
  {
    "question": "<p><b> </b>Select the most appropriate collocation to substitute the underlined phrase in the given sentence. </p><p>He wants to <u>apologize on</u> his behaviour last night. </p>",
    "options": [
      "Apologize at",
      "Apologize of",
      "Apologize for",
      "Apologize in"
    ],
    "correct_option_id": 2,
    "solution": "<p>The verb \"apologize\" is commonly followed by the preposition \"for\" when expressing remorse or seeking forgiveness for a particular action or behaviour. Hence, (c) is the correct answer. </p><p>The final sentence would be: He wants to apologize for his behaviour last night.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate collocation to substitute the underlined words in the given sentence.</p><p>The waste is <u>dumped onto</u> landfills.</p>",
    "options": [
      "dumped into",
      "dumped of",
      "dumped from",
      "dumped to"
    ],
    "correct_option_id": 0,
    "solution": "<p>In the underlined part, the preposition 'onto' which means 'moving to a location on the surface of' is a contextually incorrect word as it does not match the context of the given sentence. Among the given options, 'of' (expressing the relationship between a part and a whole), 'from' (indicating the point at which an observer is placed) and 'to' (identifying the person or thing affected by or receiving something) do not match the context of the given sentence and thus they are negated. Option (a) 'dumped into', in which 'into' means 'expressing movement or action with the result that someone or something becomes enclosed or surrounded by something else', is the most appropriate phrase to replace the underlined words given in the sentence.</p><p>Hence, the correct answer is option (a).</p><p>Note:</p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>The manager <u>praised</u> the employee for his excellent performance and gave him a bonus. </p>",
    "options": [
      "patted on",
      "patted off",
      "patted back",
      "patted down"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct answer is (c) 'patted back', which means to praise or congratulate. Options (a), (b) and (d) change the meaning of the phrase by replacing 'back' with 'on', 'off' or 'down', which imply that the manager touched, dismissed or searched the employee.</p>",
    "question_index": 12
  },
  {
    "question": "<p><b> </b>Select the most appropriate phrasal verb to fill in the blank. </p><p>I need to ______ my files to find that document.</p>",
    "options": [
      "Go for",
      "Go without",
      "Go up",
      "Go through"
    ],
    "correct_option_id": 3,
    "solution": "<p>When you \"go through\" something like files, it means you examine or search them carefully in order to find something or to deal with them systematically. In this context, the person needs to carefully search their files to find a specific document. Hence, (d) is the correct answer. </p><p>The final sentence: I need to go through my files to find that document. </p><p>The other options don't fit the context. </p><p>\"Go for\" means to choose or select something. </p><p>\"Go without\" means to lack something or to refrain from having it. </p><p>\"Go up\" means to increase or rise. </p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate phrasal verb to fill in the blank.</p><p>She invited loads of friends to her party, but only a handful of them _____.</p>",
    "options": [
      "Warmed up",
      "Turned against",
      "Turned up",
      "Turned into"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate phrasal verb to fill in the blank is 'turned up'.</p><p>'Turned up' means to arrive or appear, especially unexpectedly.</p><p>In the context of the given sentence, it describes the arrival of only a handful of friends at her party.</p><p>Other phrasal verbs do not fit the context of the sentence.</p><p>'Warmed up' means to become warmer or friendlier.</p><p>'Turned against' means to become hostile or oppose someone or something'.</p><p>'Turned into' means to transform into something else.</p><p>Hence, (c) is the correct answer.</p><p><b>The complete sentence is:</b> She invited loads of friends to her party, but only a handful of them turned up.</p><p><b>Note</b>:</p><p><b>Phrasal verb: </b>A phrase that consists of a verb with a preposition or adverb or both, the meaning of which is different from the meaning of its separate parts. Example: She has always <b>looked down on</b> me. Here, the phrasal verb <b>'to look down on someone</b>' doesn't mean that you are looking down from a higher place at someone who is below you; it means that you think that you are better than someone.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate phrasal verb to fill in the blank.</p><p>Harman ____ an old friend at the grocery store yesterday and they ended up chatting for hours.</p>",
    "options": [
      "Broke down",
      "Ran into",
      "Checked off",
      "Found out"
    ],
    "correct_option_id": 1,
    "solution": "<p>Among the given options, \"ran into\" fits the blank appropriately as it means to meet someone by chance. This perfectly aligns with the sentence describing an unexpected meeting with an old friend at the grocery store. Hence, (b) is the correct answer. </p><p>The final sentence: Harman ran into an old friend at the grocery store yesterday and they ended up chatting for hours.</p><p>Broke down: To stop functioning or to become very emotional. </p><p>Checked off: To mark items on a list as completed. </p><p>Found out: To discover information. </p>",
    "question_index": 15
  },
  {
    "question": "<p><b> </b>Select the most appropriate phrasal verb to fill in the blank. </p><p>He ______ his ideas in the team meeting. </p>",
    "options": [
      "Set forth",
      "Set back",
      "Set about",
      "Set in"
    ],
    "correct_option_id": 0,
    "solution": "<p>When someone \"sets forth\" their ideas, it means they present or explain them in a clear and organized way. In a team meeting context, this would mean that the person expressed their ideas effectively to the rest of the team. Hence, (a) is the correct answer. </p><p>The final sentence: He set forth his ideas in the team meeting. </p><p>The other options don't fit the context. </p><p>\"Set back\" means to delay or hinder progress. </p><p>\"Set about\" means to start doing something. </p><p>\"Set in\" means to begin and continue steadily or to become established. </p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate collocating word to fill in the blank.</p><p>The team needs to __________ the new software before it can be implemented across the company.</p>",
    "options": [
      "Try out",
      "Bring about",
      "Carry on",
      "Set off"
    ],
    "correct_option_id": 0,
    "solution": "<p>Among the given options, \"try out\" is the best fit because it means testing or experimenting with something to see how it works. In this context, the team needs to test the new software before implementation.</p><p>The complete sentence is: The team needs to <b>try out</b> the new software before it can be implemented across the company.</p><p>Hence, (a) is the correct answer.</p><p>Bring about: to cause something to happen.</p><p>Carry on: to continue doing something.</p><p>Set off: to begin a journey or trigger something, like an alarm.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate collocating word to fill in the blank.</p><p>The investigation team decided to __________ the crime scene for further evidence.</p>",
    "options": [
      "Look over",
      "Look out",
      "Look up",
      "Look away"
    ],
    "correct_option_id": 0,
    "solution": "<p>Among the given options, \"look over\" is the best fit because it means to carefully examine or inspect something, which is appropriate when investigating a crime scene for further evidence.</p><p>The complete sentence is: The investigation team decided to <b>look over</b> the crime scene for further evidence.</p><p>Hence, (a) is the correct answer.</p><p><b>Look out</b>: Means to be vigilant or watchful, especially for danger.</p><p><b>Look up</b>: Refers to searching for information (e.g., in a dictionary or online) or visiting someone after a long time.</p><p><b>Look away</b>: Means to avert your gaze or turn your eyes away from something.</p>",
    "question_index": 18
  },
  {
    "question": "<p><b> </b>Select the most appropriate collocation to substitute the underlined phrase in the given sentence. </p><p>His little sister genuinely <u>cares by</u> the environment and wildlife. </p>",
    "options": [
      "Cares of",
      "Cares about",
      "Cares off",
      "Cares at"
    ],
    "correct_option_id": 1,
    "solution": "<p>The verb \"care\" is often followed by the preposition \"about\" when expressing concern or interest in something. In this case, the sentence is describing how the little sister genuinely has concern and interest in the environment and wildlife. Therefore, the most appropriate collocation is \"cares about.\" Hence, (b) is the correct answer. </p><p>The final sentence would be: His little sister genuinely cares about the environment and wildlife.</p>",
    "question_index": 19
  }
];
    </script>
