<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank.</p><p>The hunter dogs followed the hyena's ________.</p>",
    "options": [
      "sense",
      "scent",
      "cense",
      "cents"
    ],
    "correct_option_id": 1,
    "solution": "<p>Sense- a faculty by which the body perceives an external stimulus.</p><p>Scent- a trail indicated by the characteristic smell of an animal and perceptible to hounds or other animals.</p><p>Cense- ritually perfume (something) with the odour of burning incense.</p><p>Cents- a monetary unit in various countries, equal to one hundredth of a dollar, euro, or other decimal currency unit.</p><p>Among the options, 'scent' is the correct word that fits the context of the sentence in which the thing that the dogs used to follow the hyena is justified which is not the case with the remaining options and thus, they are negated.</p><p>The complete sentence is: The hunter dogs followed the hyena's scent.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The room was very___<u> </u>.</p>",
    "options": [
      "quit",
      "quilt",
      "quiet",
      "quite"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate option to fill in the blank is 'quiet'. The sentence suggests that the room lacked noise or sound, indicating a peaceful or calm atmosphere. 'Quiet' is the most appropriate word to fill in the blank as it is an adjective that describes the absence of noise or disturbance. It accurately portrays the serene and tranquil nature of the room in this context.</p><p>'Quit' is a verb that means to leave or resign from something.</p><p>'Quilt' is a noun that refers to a warm bed covering made of padding enclosed between layers of fabric and kept in place by lines of stitching.</p><p>'Quite' is an adverb which means to a certain degree.</p><p>Hence, (c) is the correct answer.</p><p>NOTE:</p><p><b>Noun: </b>A noun is a word used as the name of a person, place, or thing. Examples: 1. <b>Mahesh </b>is a clever <b>boy</b>. 2. A <b>herd </b>of cattle was grazing on the pastureland. 3. <b>Honesty</b> is the best policy.</p><p><b>Adverbs:</b> Words that describe a verb, an adjective, another adverb, or even a sentence as a whole are called Adverbs.</p><p><b>Adjectives:</b> Words which are used with a noun/pronoun to describe or point out, the person, animal, place, or thing which the noun names, or to tell the number or quantity, are called Adjectives.</p><p><b>Verbs </b>are the action words that are used to describe what the subject is doing.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Yesterday, I ate only a ____ of apples for my dinner.</p>",
    "options": [
      "pier",
      "pear",
      "pare",
      "pair"
    ],
    "correct_option_id": 3,
    "solution": "<p>A \"pair\" refers to two items that are usually similar and used or eaten together, such as a pair of shoes, a pair of socks, or a pair of apples. In the given sentence, the speaker ate only a \"pair\" of apples for dinner, indicating that they consumed two apples. Hence, (d) is the correct answer. </p><p>Pier: A structure built out into the water from a shore, used as a landing place for boats, ships, or pleasure craft, or as a promenade.</p><p>Pear: A sweet, juicy fruit that is narrow at the top and wider towards the bottom, resembling an inverted teardrop in shape.</p><p>Pare: To trim or cut away the outermost part of something, usually to remove the skin or peel. For example, you might pare the skin off an apple before eating it. </p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>____ droplets settled on top of leaves.</p>",
    "options": [
      "Due",
      "Doe",
      "Do",
      "Dew"
    ],
    "correct_option_id": 3,
    "solution": "<p>Among the given options, 'dew' is the most appropriate choice here because it directly relates to the formation of moisture on leaves, which is a common natural occurrence. Hence, (d) is the correct answer.</p><p>The final sentence: Dew droplets settled on top of leaves.</p><p>Due: This typically refers to something owed or expected at a certain time, such as a payment or a deadline.</p><p>Doe: A doe is a female deer.</p><p>Do: This is a verb that can have various meanings, including performing an action, completing a task, or causing something to happen.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The actress is very ____ and takes pride in her appearance all the time.</p>",
    "options": [
      "vein",
      "wane",
      "vane",
      "vain"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate option to fill in the blank is 'vain'. \"Vain\" means excessively proud or concerned about one's appearance or achievements. The sentence suggests that the actress takes pride in her appearance all the time, which indicates a sense of vanity or excessive admiration of oneself. Other words do not fit the context of the sentence. 'Vein' refers to a blood vessel that carries blood towards the heart. 'Wane' means to decrease gradually in size, strength, or intensity. A 'vane' typically refers to a flat or curved piece of metal or other material, often shaped like an arrow, that moves freely to show the direction of the wind. Hence, (d) is the correct answer. </p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank.</p><p>Please _______ more sugar to the juice so that it becomes sweeter</p>",
    "options": [
      "aide",
      "ad",
      "aid",
      "add"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate homonym to fill in the blank is 'add'. \"Add\" means to put or place something with something else. The sentence suggests adding/putting more sugar to the juice to make it sweeter. Other words do not fit the context of the sentence. An 'aide' is a person who assists or supports another person, often in a professional or official capacity. An 'ad' is short for advertisement, which is a public notice or announcement, usually promoting a product, service, or event, with the aim of attracting attention or generating interest. 'Aid' refers to assistance or support given to someone in need, especially in the form of money, resources, or services. Hence, (d) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>She could easily eat the ___ biryani by herself.</p>",
    "options": [
      "haul",
      "whole",
      "hall",
      "hole"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most suitable option to fill in the blank is 'whole'. In the given sentence, the word 'whole' is the most appropriate choice because it denotes the entire amount or entirety of the biryani that the subject is capable of consuming. 'Whole' in this context emphasises that the individual is capable of consuming the entire portion of the biryani. On the other hand, the other options, 'haul' (to pull something with a lot of effort or difficulty), 'hall' (a building or large room in which meetings, concerts, dances, etc. can be held), and 'hole' (an opening; an empty space in something solid), do not make sense in this context, as they do not convey the idea of consuming food. Hence, (b) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank:</p><p>The group of travellers were wonderstruck by the ___________ of the coin.</p>",
    "options": [
      "Wait",
      "White",
      "Wide",
      "Weight"
    ],
    "correct_option_id": 3,
    "solution": "<p>\"Weight\" fits the context as it refers to a characteristic of the coin that impressed the travelers.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The homophone for the word 'there' is _________.</p>",
    "options": [
      "that",
      "their",
      "those",
      "clear"
    ],
    "correct_option_id": 1,
    "solution": "<p>Homophones are words that have the same pronunciation but different meanings and spellings. \"Their\" and \"there\" are homophones. \"That,\" \"those,\" and \"clear\" have different pronunciations from \"there.\"</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate homophone to fill in the blank.</p><p>The ____________ was decorated with candles and chocolates everywhere.</p>",
    "options": [
      "flour",
      "flower",
      "floor",
      "flor"
    ],
    "correct_option_id": 2,
    "solution": "<p>Homophones are words that sound the same but have different meanings. In this context, the correct word should be \"floor\", as it refers to the surface of a room, which can be decorated.</p><p>Flour: A powder used in baking. (Incorrect)</p><p>Flower: A plant part that blooms. (Incorrect)</p><p>Floor: The bottom surface of a room. (Correct Answer)</p><p>Flor: Incorrect spelling.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Ram went to ______ an ice cream.</p>",
    "options": [
      "buy",
      "by",
      "byre",
      "bye"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct verb to use here is \"buy,\" which means to purchase something. The other options are incorrect:</p><p>&#183; \"by\" is a preposition.</p><p>&#183; \"byre\" refers to a cowshed.</p><p>&#183; \"bye\" is a farewell expression.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate homophone to fill in the blank.</p><p>The ointment will help to ______ the wound.</p>",
    "options": [
      "he'll",
      "heel",
      "heal",
      "kneel"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct homophone is \"heal,\" which means to make or become healthy or whole again.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate homophone to fill in the blank.</p><p>He ________ his bike as fast as he could to reach home.</p>",
    "options": [
      "rode",
      "road",
      "rowed",
      "rote"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; \"Rode\" is the past tense of \"ride\" (correct in this context).</p><p>&#183; \"Road\" is a path or street.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate homophone to fill in the blank.</p><p>Ruby gave her mother a hug and offered to knead the ________.</p>",
    "options": [
      "flora",
      "flavour",
      "floor",
      "flour"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The sentence refers to kneading, which is an action related to dough made from flour.</p><p>&#183; Homophones are words that sound the same but have different meanings.</p><p>&#183; Flour (correct choice) &rarr; Fine powder used for baking.</p><p>&#183; Flora &rarr; Refers to plant life, incorrect in this context.</p><p>&#183; Flavour &rarr; Taste of food, unrelated to kneading.</p><p>&#183; Floor &rarr; The bottom surface of a room, incorrect here.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The mother couldn't _________ such an insult from her son in front of the others.</p>",
    "options": [
      "bier",
      "bare",
      "beer",
      "bear"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The sentence conveys tolerating or enduring an insult.</p><p>&#183; Bear (correct choice) &rarr; To tolerate or endure.</p><p>&#183; Bare &rarr; Means \"uncovered\" (e.g., \"bare feet\"), incorrect in this context.</p><p>&#183; Bier &rarr; A platform for carrying a coffin, unrelated.</p><p>&#183; Beer &rarr; An alcoholic drink, incorrect here.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate homophone to fill in the blank.</p><p>The _____ of the flowers spread everywhere when they bloom.</p>",
    "options": [
      "Sent",
      "Saint",
      "Scent",
      "Cent"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Homophones are words that sound the same but have different meanings and spellings.</p><p>&#183; Scent refers to a pleasant smell, which makes sense in the sentence.</p><p>&#183; Other options:</p><p>o Sent (past tense of \"send\").</p><p>o Saint (religious figure).</p><p>o Cent (currency unit).</p><p>Thus, the correct answer is option 3.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the correct homonym from the given options to fill in the blank.</p><p>The wind _______ so powerfully that the door closed.</p>",
    "options": [
      "blow",
      "blew",
      "blues",
      "blue"
    ],
    "correct_option_id": 1,
    "solution": "<p>Option (b), 'blew' can fill the blank. Options (c) and (d), 'blue' and 'blues' denote colours, but the blank requires a verb to denote the action done by the wind. So, these two options are negated. Option (a), 'blow' if used might lead to error in subject verb agreement because, 'wind' is a singular noun and 'blow' corresponds to a plural noun and so, it is also negated. Option (b), 'blew' is the grammatically and contextually correct word to fill the given blank.</p><p>Hence, the correct answer is option (b).</p><p>Note:</p><p>Subject-Verb Agreement: Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank.</p><p>The farmers grow ________ in their fields.</p>",
    "options": [
      "maze",
      "mays",
      "mase",
      "maize"
    ],
    "correct_option_id": 3,
    "solution": "<p>Maze - a network of paths and hedges designed as a puzzle through which one has to find a way.</p><p>Mays  -  the hawthorn (a kind of shrub) or its blossom.</p><p>Mase  -  Something that causes bewilderment or mystery.</p><p>Maize - a tall plant grown in many parts of the world for its yellow seeds, which are eaten as food.</p><p>Among the given options, only maize can be grown in the fields. </p><p>So, the correct sentence is: The farmers grow maize in their fields.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank.</p><p>______________ knowledge in this field is really profound.</p>",
    "options": [
      "There",
      "Their&#8239;",
      "Dare&#8239;",
      "They're"
    ],
    "correct_option_id": 1,
    "solution": "<p>The blank precedes the noun 'knowledge', so it must be filled with the adjective/determiner that can modify the noun. Among the given options, only 'their' is the adjective/determiner (possessive) which can be used in the blank to modify the given noun. </p><p>So, the correct sentence is: Their knowledge in this field is really profound.</p><p>Hence, option (b) is the answer. </p><p>Note: <b>Possessive Determiners/Adjectives:</b> Words like <b><i>'my', 'our', 'your', 'his', 'her', 'its'</i></b>, and <b><i>'their'</i></b> are known as possessive adjectives (or possessive determiners). They come before nouns and <b>indicate ownership</b> of the noun. <b>Example:</b> \"The teacher asked the students to open <b><i>their</i></b> drawing books.\"</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the correct homonym from the given options to fill in the blank.</p><p>The athlete's________ was badly injured due to a fall on the track.</p>",
    "options": [
      "toad",
      "toe",
      "tow",
      "to"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given sentence mentions that the athlete got injured because of the fall on the track. Filling the blank with 'toe' specifies the body part which got injured, and hence makes the sentence grammatically and contextually correct. Other options do not fit in contextually/grammatically.</p><p>The correct sentence is: The athlete's toe was badly injured due to a fall on the track.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 19
  }
];
    </script>
