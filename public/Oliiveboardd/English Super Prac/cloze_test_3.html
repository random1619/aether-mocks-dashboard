    "correct_option_id": 1,
    "solution": "<p>The word that can fill in the given blank is 'completely' because the sentence states that Caesar disqualified his impartiality towards her which only indicates that he was totally impressed with Cleopatra and 'completely' is the only word that is relatable with this context of the sentence.</p><p>Slightly-to a small degree; not considerably.</p><p>Partially-only in part; to a limited extent.</p><p>Randomly-without method or conscious decision; indiscriminately.</p><p>Hence, the correct answer is option (b).</p>",

    "comp": "<p><b>Directions [Set of 5 Questions]:</b>   In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p><p>The conversation which Caesar held ____ (A) Cleopatra deepened the impression which her first appearance had made upon him. Her _____ (B) and animation, the originality of her ideas, and the point and pertinency of her mode of expressing them, made her, independently of her personal charms, an exceedingly entertaining and agreeable companion. She, in fact, _______ (C) won the great conqueror's heart; and, through the strong attachment to her that he immediately formed, he became wholly disqualified to act impartially between her and her brother in regard to their respective _______ (D) to the crown. We call Ptolemy Cleopatra's brother; for, though he was also, in fact, her husband, still, as he was only ten or twelve years of age at the time of Cleopatra's expulsion from Alexandria, the marriage had been probably regarded, thus far, only as a mere matter of form. Caesar was now about fifty-two. He had a wife, named Calpurnia, to ______ (E) he had been married about ten years. </p>",

    "question": "<p>Which of the following words can fill in the blank E?</p>",
    "options": [
      "who",
      "whom",

      "whose"

    "correct_option_id": 1,
    "solution": "<p>The blank requires a relative pronoun in the objective form to denote Calpurnia, the wife of Caesar. Among the options, 'whom' is the only relative pronoun in the objective form and thus it can fill in the given blank. 'Which' denotes an object and not a person, 'who' is a subjective relative pronoun and 'whose' shows belongingness, so these are negated.</p><p>Hence, the correct answer is option (b).</p><p>Note:</p><p><b>Relative pronouns: </b>A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies, or describes, the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p><p>Subjective Pronouns: The pronouns I, you, we, he, she, it, and they are known as subjective pronouns because they act as the subjects of verbs: We went to the party.</p><p>Objective Pronouns: The pronouns me, you, us, him, her, it, and them are called objective pronouns because they act as the objects of verbs and prepositions: Anjali drove us home.</p>",

  {
    "comp": "<p><b>Directions [Set of 5 Questions]: </b>Directions: In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in each blank.</p><p>The population of Venice, more than 170,000 after the second world war, has<b> ____________(A) </b>steadily to some 52,000 today. Remaining residents still feel <b>_______________(B) </b>to live in a city of such beauty, many believing their culture survives despite the onslaught, but they also grieve at the losses, lose heart, and move away at a rate of 1,000 a year to homes on the mainland. A Venice without Venetians  -  without significant numbers of permanent residents  -  is <b>______________(C) </b>for as early as 2030. It is no <b>________________(D) </b>to say that mass tourism  -  adding to Venice's existing issues with mismanagement of the environment, corruption, political stasis and now the climate emergency  -  is bringing the community, the lagoon, and a fabulous heritage to within a <b>___________(E)</b> of collapse.</p>",
    "question": "<p>Which of the following can fit in the blank A?</p>",
    "options": [
      "Concurrently",
      "Risen",
      "Dropped",
      "Censured"
    ],
    "correct_option_id": 2,
    "solution": "<p>The given blank will take the word 'dropped' as the auxiliary verb 'has' is followed by a past participle. Also, the given sentence talks about decrease in population of Venice today. 'Concurrently' which is an adverb can be eliminated. 'Risen' (means 'moved from a lower position to a higher one; come or go up') and 'censured' (means 'expressed severe disapproval of (someone or something)' do not fit contextually in the given blank. Hence, the answer is option c).</p><p>Note: Participle: A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p>Dancing at the party, the women fell on the ground.</p><p>Encouraged by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>Auxiliary verb: A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. Auxiliary verbs help to form the various tenses, moods, and voices of other verbs. The principal ones are be, do, and have. Example: She will sing a song tomorrow. Here, 'will' is the auxiliary verb that supports the main verb 'sing'.</p>",
