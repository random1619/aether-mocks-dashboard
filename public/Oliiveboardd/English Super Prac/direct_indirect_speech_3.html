    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The anchor of the programme asked us whether we were ready for a challenge.</p>",
    "options": [
      "\"Are you ready for this challenge?\" the anchor of the programme said to us.",
      "\"Were you ready for a challenge?\" the anchor of the programme said to us.",
      "\"Are you ready for a challenge?\" the anchor of the programme said to us.",
      "\"Have you been ready for a challenge?\" the anchor of the programme said to us."
    ],
    "correct_option_id": 2,
    "solution": "<p>The main verb in the reported speech is 'asked', hence in the direct form, the reporting speech should be an interrogative sentence. Also the use of 'whether' clarifies that it should be a yes/no type question (also known as 'polar question') starting with an auxiliary verb ('have', 'do', 'be').</p><p>We see that the reported speech of the sentence is in simple past tense (past tense form 'were') so the direct form should be in simple present tense ('were' changes to 'are').</p><p>Option (a) is incorrect because of the (unnecessary) word 'this'.</p><p>The correct direct form is  -  [\"Are you ready for a challenge?\" the anchor of the programme said to us.]</p><p>The answer is option (c).</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that best expresses the given sentence in reported speech.</p><p>Sheldon says, \"One day will come when I win the Nobel Prize for Physics.\"</p>",
    "options": [
      "Sheldon says that one day would come when he won the Nobel Prize for Physics.",
      "Sheldon says that one day will come when he wins the Nobel Prize for Physics.",
      "Sheldon said that one day will come when he wins the Nobel Prize for Physics.",
      "Sheldon says that one day will come when I win the Nobel Prize for Physics."
    ],
    "correct_option_id": 1,
    "solution": "<p>B is the right answer.</p><p>When the Direct Speech is in <b>Present Tense </b>or <b>Future Tense</b>, there is <b>no</b> change of tense in the Indirect Speech.</p><p>For Example:</p><p>Subham says, \"Kaustav is always late.\" (Direct Speech)</p><p>Subham says that Kaustav is always late. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">says</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">says that</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">he</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">win</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">wins</td></tr></table></p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>John said, \"I was studying for the exam last evening.\"</p>",
    "options": [
      "John said that he had studied for the exam the previous evening.",
      "John said that he was studying for the exam the last evening.",
      "John said that he is studying for the exam the previous evening.",
      "John said that he had been studying for the exam the previous evening."
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence in the Direct Speech is in Past Continuous Tense. Therefore, the sentence in the Indirect Speech should be in Past Perfect Continuous Tense.</p><p>Past Continuous (Subject + was/were + V1 + ing + Object) should be converted into Past Perfect Continuous (Subject + had + been + V1 + ing + Object).</p><p>For example:</p><p>He said, \"I was watching television last night.\" (Direct Speech)</p><p>He said that he had been watching television the previous night. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>'Said' is changed to 'said that'.</p><p>'I' is changed to 'he'.</p><p>'Was' is changed to 'had been'.</p><p>'Last evening' is changed to 'the previous night'.</p><p>Therefore, the correct answer is: John said that he had been studying for the exam the previous evening.</p><p>Hence, (d) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>The teacher said, \"Humans need oxygen to survive.\"</p>",
    "options": [
      "The teacher said that humans will need oxygen to survive.",
      "The teacher said that humans would need oxygen to survive.",
      "The teacher said that humans need oxygen to survive.",
      "The teacher said that humans needed oxygen to survive."
    ],
    "correct_option_id": 2,
    "solution": "<p>If there is any Universal Truth or Habitual Truth in the Direct Speech, there is no change in the Indirect Speech.</p><p>For example:</p><p>He said, \"The sun revolves around the sun.\" (Direct Speech)</p><p>He said that the sun revolves around the sun. (Indirect Speech)</p><p>However, changes can take place in the Pronouns of the Indirect Speech.</p><p>Therefore, the correct answer is: The teacher said that humans need oxygen to survive.</p><p>Hence, (c) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>Emma said that she would be attending the meeting.</p>",
    "options": [
      "Emma said, \"I will attend the meeting.\"",
      "Emma said, \"I would attend the meeting.\"",
      "Emma said, \"I will be attending the meeting.\"",
      "Emma said, \"I should attend the meeting.\""
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence in the Indirect Speech is in Conditional Continuous Tense. Therefore, the sentence in the Direct Speech will be in Future Continuous Tense.</p><p>Conditional Continuous (Subject + would/should + be + V1 +ing + Object) will be converted into Future Continuous (Subject + will/shall + be + V1 + ing + Object).</p><p>For example:</p><p>He said that he would be using the book next Friday. (Indirect Speech)</p><p>He said, \"I will be using the book next Friday\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>She  -  I </p><p>Would  -  will </p><p>Hence, (c) is the correct answer. </p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>James asked if I had completed the assignment.</p>",
    "options": [
      "James asked, \"Did you complete the assignment?\"",
      "James asked, \"Have you completed the assignment?\"",
      "James asked, \"Will you complete the assignment?\"",
      "James asked, \"Do you complete the assignment?\""
    ],
    "correct_option_id": 1,
    "solution": "<p>In Direct speech, the verb is always placed before the subject, unlike in Indirect Speech.</p><p>If there is a question whose answer can come as \"Yes\" or \"No\", we remove the inverted commas and add the conjunction \"If\" or \"Whether\" in the Indirect Speech and the verb/s \"Is/are/am/was/were\" before the subject, in Direct Speech.</p><p>For example:</p><p>Ravi asked me if she was studying. (Indirect Speech)</p><p>Ravi said to me, \"Is she studying?\" (Direct Speech)</p><p>The tense of the Indirect Speech is in the Past Perfect tense. So, the tense in the Direct Speech will be in the Present Perfect tense.</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>Asked if - Asked</p><p>Had - have</p><p>I  -  You</p><p>Hence, (b) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>She said to her brother, \"Let me go to work.\"</p>",
    "options": [
      "She requested her brother to let me go to work.",
      "She requested her brother to let her go to work.",
      "She said to her brother to let her go to work.",
      "She told her brother to let her go to work."
    ],
    "correct_option_id": 1,
    "solution": "<p>\"Let\" when used as a request follows the following rules:</p><p>&#183; \"Said/said to\" is changed to \"requested\".</p><p>&#183; Inverted commas are removed and \"to\" is added.</p><p>&#183; Pronouns are changed accordingly.</p><p>Example: The student said to the teacher, \"Let me go home.\" (Direct Speech)</p><p>The student requested the teacher to let him go home. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>Said to  -  requested</p><p>Let me  -  to let her</p><p>So, the sentence in indirect speech is: She requested her brother to let her go to work.</p><p>Hence, (b) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>\"There is a child wanting to see you,\" said the butler to John.</p>",
    "options": [
      "The butler told John that there is a child wanting to see him.",
      "The butler told John that there was a child wanting to see him.",
      "The butler told John that there had been a child wanting to see him.",
      "The butler told John that there was a child want to see him."
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence in the Direct Speech is in Simple Present Tense. Therefore, the sentence in the Indirect Speech should be in Simple Past Tense.</p><p>Simple Present (Subject +V1 + Object) should be converted into Simple Past (Subject +V2 + Object).</p><p></p><p>Option b) is the right answer.</p><p>Option a) is eliminated as it fails to change the tense of the verb. Option c) is eliminated as it incorrectly changes the tense of the verb 'is' from simple present tense to past perfect tense. Option d) is eliminated as it is grammatically incorrect; it uses the verb (want) in the base form, while it should be used in the present continuous tense (wanting).</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The girl told her mother that she had finished her homework.</p>",
    "options": [
      "The girl said to her mother, \"I have finished my homework.\"",
      "The girl said to her mother, \"I have to finish my homework.\"",
      "The girl said to her mother, \"I will finish my homework.\"",
      "The girl said to her mother, \"She has to finish my homework.\""
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence in the Indirect Speech is in <b>Past Perfect Tense</b>. Therefore, the sentence in the Direct Speech will be in <b>Present Perfect Tense</b>.</p><p>Past Perfect <b>(Subject + had + V3 +Object) </b>will be converted into Present Perfect <b>(Subject + has/have + V3 +Object)</b>.</p><p>For example:</p><p>He said that he had got a new job. (Indirect Speech)</p><p>He said, \"I have got a new job.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">told</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Said to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">She, her</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I, my</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">had finished</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">have finished</td></tr></table></p><p>From the given options, the sentence that follows the above mentioned conditions for Direct speech is option (a) \"The girl said to her mother, \"I have finished my homework.\"\"</p><p>Hence, the correct answer is option (a).</p><p>NOTE:</p><p>V1 -&gt; Base form/simple form of verb, V2 -&gt; Past form of verb (-ed form or irregular verb), V3 -&gt; Past participle form of verb (-ed, -d, -t, -en, or -n), V4 -&gt; Continuous form of verb / Present participle form of verb (-ing form), V5 -&gt; Third person singular (V1+ -es or -s).</p>",
    "question_index": 8
  },
  {
    "question": "<p><b> </b>Select the option that expresses the given sentence in direct speech.</p><p>She told her friends that she would be moving to a different state because she had accepted a job offer that required her to relocate. </p>",
    "options": [
      "She said to her friends, \"I would have been moving to a different state because I had to accepted a job offer that requires me to relocate.\"",
      "She said to her friends, \"I was been moving to a different state because I have accepted a job offer that requires me to relocate.\"",
      "She said to her friends, \"I will be moving to a different state because I had have been accepted a job offer that requires me to relocate.\"",
      "She said to her friends, \"I will be moving to a different state because I have accepted a job offer that requires me to relocate.\""
    ],
    "correct_option_id": 3,
    "solution": "<p>The initial part sentence in the Indirect Speech is in Present Conditional Tense. Therefore, the sentence in the Direct Speech will be in Future Simple Tense.</p><p>Present Conditional (Subject + would/should + V1 + object) will be converted into Future Simple (Subject + will/shall + V1 + object).</p><p>For example:</p><p>He said that he would go to Kolkata on Friday. (Indirect Speech)</p><p>He said, \"I will go to Kolkata on Friday\" (Direct Speech)</p><p>For latter part-</p><p>Past Perfect (Subject + had + V3 +Object) will be converted into Present Perfect (Subject + has/have + V3 +Object).</p><p>For example:</p><p>He said that he had got a new job. (Indirect Speech)</p><p>He said, \"I have got a new job.\" (Direct Speech)</p><p>Followed by the end part-</p><p>Simple Past (Subject + V2 + Object) will be converted into Simple Present (Subject + V1/V5 + Object).</p><p>For example:</p><p>He said that he wanted a new job. (Indirect Speech)</p><p>He said, \"I want a new job.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>\"would be\" changes to \"will be\".</p><p>\"Told\" changes to \"said to\".</p><p>\"she\" changes to \"I\"</p><p>\"Her\" changes to \"me\"</p><p>\"Had\" changes to \"have\"</p><p>\"Required\" changes to \"requires\"</p><p>Therefore, the correct answer is: \"She said to her friends, \"I will be moving to a different state because I have accepted a job offer that requires me to relocate.\"\"</p><p>Hence, option (d) is correct.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>The teacher said, \"Read the instructions carefully.\"</p>",
    "options": [
      "The teacher told us to read the instructions carefully.",
      "The teacher told me to read instructions carefully.",
      "The teacher asked us read instructions carefully.",
      "The teacher said to read the instructions carefully."
    ],
    "correct_option_id": 3,
    "solution": "<p>Imperative Sentences are used to demonstrate Request, Order, Command, etc.</p><p>Imperative Sentences begin with Principal verbs like Go, Make, etc.</p><p>The reporting verbs like \"said\", \"say\", etc. in direct speech are changed into \"begged\", \"beg\", etc.</p><p>\"To\" is used before the Principal Verbs in the Indirect Speech.</p><p>For example:</p><p>John said to his assistant, \"Bring me a glass of water.\" (Direct Speech)</p><p>John ordered his assistant to bring him a glass of water. (Indirect Speech)</p><p>Therefore, the correct answer is: \"The teacher said to read the instructions carefully.\"</p><p>Hence, option (d) is correct.</p>",
    "question_index": 10
  },
  {
    "question": "<p><b> </b>Select the option that expresses the given sentence in indirect speech.</p><p>Alice said, \"May God bless your newborn child!\"</p>",
    "options": [
      "Alice wished that God have to bless their newborn child.",
      "Alice said that God will bless their newborn child.",
      "Alice said that God bless their newborn child then.",
      "Alice wished that God might bless their newborn child."
    ],
    "correct_option_id": 3,
    "solution": "<p>These kinds of sentences are called Optative Sentences.</p><p>Optative Sentences are usually prayers or wishes.</p><p>In these kinds of sentences, \"said\" in the Direct Speech is changed into \"prayed\", \"wished\", etc.</p><p>\"That\" is used in place of Inverted Commas while transforming the sentence from Direct Speech to Indirect Speech.</p><p>While changing from Direct Speech to Indirect Speech, the sentence is changed into its Assertive form i.e., \"Subject + might/may + V1 + Object\".</p><p>For example:</p><p>The father said to his son, \"May God bless you!\" (Direct Speech)</p><p>The father wished his son that God might bless him. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>\"said\" changes to \"wished\".</p><p>\"may\" changes to \"might\".</p><p>\"your\" changes to \"their\".</p><p>Therefore, the correct answer is: \"Alice wished that God might bless their newborn child.\"</p><p>Hence, option (d) is correct. </p>",
    "question_index": 11
  },
  {
    "question": "<p><b> </b>Select the option that expresses the given sentence in indirect speech.</p><p>Sarah said, \"I have been baking for hours.\" </p>",
    "options": [
      "Sarah said that she has been baking for hours.",
      "Sarah said that she had been baking for hours.",
      "Sarah said that she was baking for hours.",
      "Sarah said that she would have been baking for hours."
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence in the Direct Speech is in <b>Present Perfect Continuous Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Past Perfect Continuous Tense</b>.</p><p>Present Perfect Continuous (Subject + has/have + been + V1 + ing + Object) should be converted into Past Perfect Continuous (Subject + had + been + V1 + ing + Object).</p><p>For example:</p><p>He said, \"We have been waiting for hours.\" (Direct Speech)</p><p>He said that they had been waiting for hours. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>\"Said\" changes to \"said that\".</p><p>\"I\" changes \"she\".</p><p>\"have\" changes to \"had\".</p><p>Therefore, the correct answer is: \"Sarah said that she had been baking for hours.\"</p><p>Hence, option (b) is correct.</p>",
    "question_index": 12
  },
  {
    "question": "<p><b> </b>Select the option that expresses the given sentence in direct speech.</p><p>My neighbour said that she wanted to go to the park with her children for a play date.</p>",
    "options": [
      "My neighbour said, \"I am wanting to go to the park with my children for a play date.\"",
      "My neighbour said, \"I wanted to go to the park with my children for a play date.\"",
      "My neighbour said, \"I will want to go to the park with my children for a play date.\"",
      "My neighbour said, \"I want to go to the park with my children for a play date.\""
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence in the Indirect Speech is in <b>Simple Past Tense</b>. Therefore, the sentence in the Direct Speech will be in <b>Simple Present Tense</b>.</p><p>Simple Past (Subject + V2 + Object) will be converted into Simple Present (Subject +V1 + Object).</p><p>For example:</p><p>He said that he never went to the village. (Indirect Speech)</p><p>He said, \"I never go to the village.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>\"Said that\" changes to \"said\".</p><p>\"She\" changes to \"I\".</p><p>\"wanted\" changes to \"want\".</p><p>\"Her\" changes to \"my\".</p><p>Therefore, the correct answer is: \"My neighbour said, \"I want to go to the park with my children for a play date.\"\"</p><p>Hence, option (d) is correct. </p>",
    "question_index": 13
  },
  {
    "question": "<p><b> </b>Select the option that expresses the given sentence in indirect speech.</p><p>Emma said, \"I did not expect to see you yesterday.\" </p>",
    "options": [
      "Emma said that she hasn't expected to see me the previous day.",
      "Emma said that she had not expected to see me the previous day.",
      "Emma said that she wasn't expecting to see me last night.",
      "Emma said that she would not expect to see me yesterday."
