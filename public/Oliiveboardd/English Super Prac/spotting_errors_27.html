    <script>
        const questions = [
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>No sooner had the train arrived when / the passengers rushed / to board it without / waiting in the queue.</p>",
    "options": [
      "waiting in the queue",
      "the passengers rushed",
      "to board it without",
      "No sooner had the train arrived when"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error lies in the use of the correlative conjunction. The conjunction 'No sooner' is always followed by 'than'. The use of 'when' is incorrect in this context. The pair 'No sooner..than' is used to indicate that one event happens immediately after another.</p><p><b>Correct sentence:</b> No sooner had the train arrived <b>than</b> the passengers rushed to board it without waiting in the queue.</p><p>So, there is an error in the part mentioned in option b).</p><p>Hence, option (d) is the answer.</p><p><b>Note: Correlative Conjunctions</b> are pairs of words that work together to connect two parts of a sentence that hold an equal value or correlate with one another. E.g., Either/Or, Neither/Nor, Not only/But also, etc.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined word in the given sentence.</p><p>You will not be promoted <u>if</u> you meet all your demanding yearly targets.</p>",
    "options": [
      "because",
      "although",
      "unless",
      "since"
    ],
    "correct_option_id": 2,
    "solution": "<p>The underlined conjunction 'if' introduces a positive condition. The sentence as written creates a nonsensical statement: \"You will not get promoted on the condition that you meet your targets.\" The intended meaning is that promotion is conditional on <i>not</i> failing to meet the targets.</p><p>Option c) <b>unless</b> is the correct choice. 'Unless' means 'except if' or 'if not'. It correctly introduces the negative condition required to make the sentence logical.</p><p>(a) <b>because</b> would state the reason for not being promoted is meeting targets, which is illogical.</p><p>(b) <b>although</b> would introduce a contrast, which does not fit the conditional logic of the sentence.</p><p>(c) <b>since</b> is used to provide a reason, similar to 'because', and would be incorrect.</p><p>So the best replacement is \"unless\", making the corrected sentence: \"You will not be promoted <b>unless</b> you meet all your demanding yearly targets.\"</p><p>Hence, option (c) is the answer.</p><p><b>Note: </b>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>He is wealthy, ________ he lives a very simple and humble life.</p>",
    "options": [
      "so",
      "for",
      "yet",
      "and"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence presents a contrast between two facts. The first part states that \"he is wealthy,\" which might lead one to expect a lavish lifestyle. The second part, however, presents a contrasting reality: \"he lives a very simple and humble life.\" The blank requires a conjunction that highlights this contrast or opposition.</p><p>The correct option is <b>\"yet\"</b>. The conjunction \"yet\" (similar to \"but\") is used to connect two contrasting ideas. It effectively shows that the second part of the sentence is surprising or unexpected in light of the first part.</p><p>The other options do not fit:</p><p>&#183; \"so\" indicates a result or consequence, which is the opposite of the intended meaning.</p><p>&#183; \"for\" is used to mean \"because\" and introduces a reason, which is incorrect.</p><p>&#183; \"and\" simply adds information without showing the contrast.</p><p>Thus, the correct sentence is: \"He is wealthy, <b>yet</b> he lives a very simple and humble life.\"</p><p>Hence, option (c) is the answer.</p><p><b>Note: </b>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>The official spokesperson stated that the primary reason why the flight was delayed for several hours <u>was because of the technical snag</u> discovered during the routine pre-flight inspection.</p>",
    "options": [
      "was that a technical snag was",
      "was due to the technical snag was",
      "being because of the technical snag",
      "No substitution"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error in the underlined segment is a classic case of redundancy. The phrase \"The reason why...\" should be followed by \"...is/was that...\", not by \"...is/was because...\". Both \"reason\" and \"because\" indicate causality, and using them together is grammatically superfluous.</p><p>&#183; <b>Option a) was that a technical snag was</b> is the correct substitution. It uses the correct \"was that...\" construction, creating a grammatically sound and non-redundant sentence.</p><p>&#183; <b>Option b) was due to the technical snag was</b> is incorrect. \"Due to\" also indicates cause, making it redundant, and the second \"was\" is grammatically incorrect.</p><p>&#183; <b>Option c) being because of the technical snag</b> is grammatically awkward and incorrect; \"being\" does not function as the main verb required for the clause.</p><p>&#183; <b>Option d) No substitution</b> is incorrect because the original phrase contains the \"reason...is because\" redundancy error.</p><p><b>Correct sentence:</b> The official spokesperson stated that the primary reason why the flight was delayed for several hours <b>was that a technical snag was</b> discovered during the routine pre-flight inspection.</p><p>Hence, the most appropriate choice is a).</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The city is beautiful in its own way, ________ it lacks the glamour of Paris.</p>",
    "options": [
      "in order that",
      "as if",
      "lest",
      "albeit"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence makes a positive statement (\"The city is beautiful\") but immediately follows it with a qualifying or limiting comment (\"it lacks the glamour of Paris\"). The blank requires a sophisticated conjunction that can concisely introduce this piece of limiting or concessive information.</p><p>The correct option is <b>\"albeit\"</b>. This formal conjunction means \"although\" or \"even though.\" It is perfectly used here to add a contrasting thought that slightly lessens the impact of the main statement. It elegantly connects the praise for the city with a realistic limitation.</p><p>The other options do not fit:</p><p>&#183; \"in order that\" introduces a purpose.</p><p>&#183; \"as if\" makes a hypothetical comparison.</p><p>&#183; \"lest\" is used to introduce something to be prevented.</p><p>Thus, the correct sentence is: \"The city is beautiful in its own way, <b>albeit</b> it lacks the glamour of Paris.\"</p><p>Hence, option (d) is the answer.</p><p><b>Note: </b>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.</p>",
    "question_index": 4
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>Though the detective worked very hard / on this complex case / but he could not / solve the mystery.</p>",
    "options": [
      "on this complex case",
      "Though the detective worked very hard",
      "but he could not",
      "solve the mystery"
    ],
    "correct_option_id": 2,
    "solution": "<p>The conjunction 'though' (or 'although') is used to show a contrast between two clauses. The clause containing it is correctly followed by a comma, but not by 'but'. Using 'but' creates a redundancy because 'though' itself indicates the contrast.</p><p><b>Correct sentence:</b> Though the detective worked very hard on this complex case, <b>he could not</b> solve the mystery.</p><p>So, there is an error in the part mentioned in option c).</p><p>Hence, option (c) is the answer.</p><p><b>Note: </b>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined word in the given sentence.</p><p>You must return the library book on time, <u>and</u> you will be fined.</p>",
    "options": [
      "but",
      "if",
      "unless",
      "or"
    ],
    "correct_option_id": 3,
    "solution": "<p>The underlined conjunction 'and' joins two ideas additively. Here, the second clause is a negative consequence or an alternative to the first clause. The sentence should present a choice: return the book or face the fine.</p><p>Option d) <b>or</b> is the correct choice. It is used to present an alternative or a negative consequence if the first condition is not met.</p><p>(a) <b>but</b> would show a contrast, which isn't the logical connection here.</p><p>(b) <b>if</b> would create an illogical conditional clause.</p><p>(c) <b>unless</b> means 'if not' and would create a grammatically incorrect structure here.</p><p>So the best replacement is \"or\", making the corrected sentence: \"You must return the library book on time, <b>or</b> you will be fined.\"</p><p>Hence, option (d) is the answer.</p><p><b>Note: </b>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>She behaves ________ she were the queen of the entire world.</p>",
    "options": [
      "like",
      "as if",
      "since",
      "when"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence describes someone's behaviour by comparing it to an unreal or hypothetical situation. The use of \"were\" (subjunctive mood) indicates that the situation is imaginary - she is not actually the queen. The blank requires a conjunction that can introduce such a hypothetical or unreal comparison.</p><p>The correct option is <b>\"as if\"</b>. This conjunction is used to talk about an imaginary situation or a situation that may not be true. It is correctly paired with the subjunctive mood (\"were\") to describe her behaviour.</p><p>The other options do not fit:</p><p>&#183; \"like\" is often used informally in this way, but in formal grammar, \"as if\" or \"as though\" is preferred before a clause (a group of words with a subject and a verb).</p><p>&#183; \"since\" gives a reason or indicates a point in time.</p><p>&#183; \"when\" refers to a specific time.</p><p>Thus, the correct sentence is: \"She behaves <b>as if</b> she were the queen of the entire world.\"</p><p>Hence, option (b) is the answer.</p><p><b>Note: </b>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>Given the suspect's history of deceit and the conflicting alibis, the lead investigator had no serious doubt <u>whether the man was being</u> untruthful during the intense final interrogation.</p>",
    "options": [
      "if the man was being",
      "that the man was being",
      "about the man being",
      "No substitution"
    ],
    "correct_option_id": 1,
    "solution": "<p>This question tests the subtle distinction between \"doubt whether/if\" and \"doubt that\". \"Doubt whether\" or \"doubt if\" is used to express uncertainty. However, when the phrase is negative (\"no doubt,\" \"do not doubt\"), it expresses certainty. In such cases of certainty, it must be followed by the conjunction \"that\".</p><p>&#183; <b>Option b) that the man was being</b> is the correct substitution. The phrase \"no serious doubt\" indicates a strong belief or certainty, which correctly requires the conjunction \"that\".</p><p>&#183; <b>Option a) if the man was being</b> is incorrect for the same reason as the original; \"if\" also expresses uncertainty.</p><p>&#183; <b>Option c) about the man being</b> is grammatically possible but changes the structure from a conjunction introducing a clause to a prepositional phrase. The \"that\" clause is the most direct and standard construction here.</p><p>&#183; <b>Option d) No substitution</b> is incorrect because using \"whether\" after \"no doubt\" is a logical and grammatical error.</p><p><b>Correct sentence:</b> Given the suspect's history of deceit and the conflicting alibis, the lead investigator had no serious doubt <b>that the man was being</b> untruthful during the intense final interrogation.</p><p>Hence, the most appropriate choice is b).</p><p><b>Note: </b>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>You will succeed in this challenging venture, ________ you remain persistent.</p>",
    "options": [
      "so that",
      "in case",
      "as long as",
      "as soon as"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence establishes a condition for achieving success in a venture. The context implies that success is contingent upon a continuous state or action (persistence). The blank requires a conjunctive phrase that introduces a condition that must be met over a period.</p><p>The correct option is <b>\"as long as\"</b>. This phrase is used to specify a condition that must remain true for the main clause to be valid. It perfectly captures the idea that persistence throughout the venture is the key to success.</p><p>The other options do not fit:</p><p>&#183; \"so that\" introduces a purpose, which would illogically mean that success is the purpose of remaining persistent.</p><p>&#183; \"in case\" is used for precautions against a possibility (e.g., \"take a map in case you get lost\"), not as a condition for success.</p><p>&#183; \"as soon as\" refers to a specific point in time when one action immediately follows another, not a continuous condition.</p><p>Thus, the correct sentence is: \"You will succeed in this challenging venture, <b>as long as</b> you remain persistent.\"</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 9
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>The weather was so bad / during the storm as we could not / venture out of our / house for two days.</p>",
    "options": [
      "house for two days",
      "during the storm as we could not",
      "venture out of our",
      "The weather was so bad"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error lies in the conjunction pair used to show cause and effect. The adverb 'so' is followed by the conjunction 'that' to express a result or consequence. The pair is 'so..that..'. Using 'as' is incorrect in this structure.</p><p><b>Correct sentence:</b> The weather was so bad during the storm <b>that</b> we could not venture out of our house for two days.</p><p>So, there is an error in the part mentioned in option b).</p><p>Hence, option (b) is the answer.</p><p><b>Note: </b>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.</p>",
    "question_index": 10
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>The famous author is known / not only for his brilliant novels / and also for his / insightful social commentary.</p>",
    "options": [
      "The famous author is known",
      "insightful social commentary",
      "and also for his",
      "not only for his brilliant novels"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the correlative conjunction pair. The phrase 'not only' must be followed by 'but also'. Using 'and also' is an incorrect pairing. This pair is used to add one more point or element to an existing one.</p><p><b>Correct sentence:</b> The famous author is known not only for his brilliant novels <b>but also</b> for his insightful social commentary.</p><p>So, there is an error in the part mentioned in option c).</p><p>Hence, option (c) is the answer.</p><p><b>Note: Correlative Conjunctions</b> are pairs of words that work together to connect two parts of a sentence that hold an equal value or correlate with one another. E.g., Either/Or, Neither/Nor, Not only/But also, etc.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined word in the given sentence.</p><p>The new policy will be implemented next month <u>until</u> the board of directors approves it.</p>",
    "options": [
      "if",
      "unless",
      "while",
      "whether"
    ],
    "correct_option_id": 0,
    "solution": "<p>The underlined conjunction 'until' relates to time, meaning 'up to the point that'. This creates a nonsensical sentence, implying the implementation will happen continuously up to the point of approval and then stop. The sentence describes a condition that must be met for the implementation to occur.</p><p>Option a) <b>if</b> is the correct choice. It is a conjunction of condition, perfectly stating that the implementation is conditional upon the board's approval.</p><p>Now, why the other options are incorrect:</p><p>b) <b>unless</b> means 'if not' and would mean the policy will be implemented only if the board does <i>not</i> approve it, which is illogical.</p><p>c) <b>while</b> indicates a simultaneous action, not a condition.</p><p>d) <b>whether</b> is used to introduce a clause that expresses a doubt or choice between alternatives (e.g., \"I don't know whether he will come\"). It is not used for a direct condition like this.</p><p>So the best replacement is \"if\", making the corrected sentence:</p><p>\"The new policy will be implemented next month <b>if</b> the board of directors approves it.\"</p><p>Hence, option (a) is the answer.</p><p><b>Note: </b>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>________ the team loses the match, we must still acknowledge their outstanding effort.</p>",
    "options": [
      "And",
      "Even if",
      "Since",
      "Whereas"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence discusses a future possibility (losing the match) and the appropriate reaction to it. The context is hypothetical; the loss has not happened yet, but is being considered as a possibility. The blank requires a conjunction that introduces a hypothetical condition while maintaining a sense of concession.</p><p>The correct option is <b>\"Even if\"</b>. This conjunction is used to introduce a hypothetical or unreal condition, emphasizing that the outcome in the main clause (\"we must still acknowledge\") will remain true regardless of that condition. It correctly frames the potential loss as a future possibility, not a current fact.</p><p>The other options do not fit:</p><p>\"And\" will not fit here as \"and\" is a coordinating conjunction used to join words, phrases, or clauses of similar grammatical rank. It indicates addition or connection between the joined elements.</p><p>&#183; \"Since\" introduces a reason, which is illogical in this context.</p><p>&#183; \"Whereas\" is used for direct contrast and does not fit the concessive logic of the sentence.</p><p>Thus, the correct sentence is: \"<b>Even if</b> the team loses the match, we must still acknowledge their outstanding effort.\"</p><p>Hence, option (b) is the answer.</p><p><b>Note: </b>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>He was acquitted of all charges ________ the evidence presented against him was overwhelming.</p>",
    "options": [
      "because",
      "as",
      "since",
      "even though"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence presents two contradictory facts. The first is that he was acquitted (found not guilty). The second is that the evidence against him was overwhelming. This is a surprising or unexpected outcome. The blank requires a conjunction that can connect two contrasting or contradictory ideas, expressing concession.</p><p>The correct option is <b>\"even though\"</b>. This conjunction is a more emphatic form of \"although\" or \"though.\" It is used to introduce a fact that makes the main clause surprising. It strongly highlights the contrast between the powerful evidence and the verdict of acquittal.</p><p>The other options do not fit:</p><p>&#183; \"because,\" \"as,\" and \"since\" are all used to introduce a reason. Using any of them would create a logically nonsensical sentence, implying he was acquitted <i>because</i> the evidence was strong.</p><p>Thus, the correct sentence is: \"He was acquitted of all charges <b>even though</b> the evidence presented against him was overwhelming.\"</p><p>Hence, option (d) is the answer.</p><p><b>Note: </b>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.</p>",
    "question_index": 14
  },
  {
