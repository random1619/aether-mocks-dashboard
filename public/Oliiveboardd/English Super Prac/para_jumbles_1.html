<html lang="en">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. I would attach as many as four of them to a crosspiece, notably arranged on a thin spindle, and transmit the motion of the same to a large disc and so derive considerable 'power'.</p><p>B. In my next attempt I seem to have acted under the first instinctive impulse which later dominated me  -  to harness the energies of nature to the service of man.</p><p>C. These creatures were remarkably efficient, for once they started, they had no sense to stop and continued whirling for hours and hours and the hotter it was the harder they worked.</p><p>D. I did this through the medium of May-bugs  -  or June-bugs as they are called in America - which were a veritable pest in that country and sometimes broke the branches of trees by the sheer weight of their bodies.</p>",
    "options": [
      "BACD",
      "ACBD",
      "BDAC",
      "DACB"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct order of the sentences to form a meaningful and coherent paragraph is BDAC. Sentence B comes first as it sets the context for the subsequent actions described in the paragraph. Sentence D introduces the specific method that is used to harness natural energy, highlighting the use of May-bugs. Sentence A further explains the practical application of using the bugs to create power. Sentence C concludes the paragraph by emphasising the efficiency of the May-bugs in generating power continuously.</p><p>Hence, (c) is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. Several times I have visited the narrow, dirty streets where the poor live, and I grow hot and indignant to think that good people should be content to live in fine houses and become strong and beautiful, while others are condemned to live in hideous, sunless tenements and grow ugly, withered and cringing.</p><p>B. Dear little creatures, they crouch in my heart and haunt me with a constant sense of pain.</p><p>C. The children who crowd these grimy alleys, half-clad and underfed, shrink away from your outstretched hand as if from a blow.</p><p>D. In the country one sees only nature's fair works, and one's soul is not saddened by the cruel struggle for mere existence that goes on in the crowded city.</p>",
    "options": [
      "BACD",
      "ADBC",
      "CABD",
      "DACB"
    ],
    "correct_option_id": 3,
    "solution": "<p>After reading all the sentences thoroughly, we can say that D and A form a pair and D is followed by A because sentence D contrasts the city life described in sentence A with the countryside. Also, C and B form a pair. C describes the appearance and behaviour of the children living in the grimy alleys and B talks about the emotional impact the children have on the narrator. So, the order DACB form a coherent paragraph. Hence, (d) is the correct answer. </p>",
    "question_index": 1
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. This has an impact not just on global poverty, but also on Indians' awareness of the country's poverty for the first time in a decade.</p><p>B. And, for the first time in a decade, this update includes India's poverty data.</p><p>C. From 15 September 2022, a new global poverty line has been established, with the World Bank revising its data in the Poverty and Inequality Platform on this basis.</p><p>D. According to Sunitha Sinha, Roy and Roy van der Weide of the World Bank's Policy Research Working Paper, \"poverty in India had dropped over the recent decade, although not as much as previously thought.\"</p>",
    "options": [
      "DBAC",
      "CBAD",
      "CADB",
      "DBCA"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct order to form a coherent paragraph is CBAD. Sentence C comes first as it introduces the establishment of a new global poverty line by the World Bank, indicating a significant update in poverty measurement methodology. Sentence B highlights a specific aspect of the update: the inclusion of India's poverty data. This is noteworthy because it marks the first time in ten years that India's poverty data is being incorporated into the updated metrics. After introducing the update and its inclusion of India's poverty data, sentence A discusses the broader implications of this change. It suggests that the update has a dual impact: it affects global poverty measurements and also increases awareness among Indians about their country's poverty situation after a decade-long absence of updated data. Sentence D provides further context by citing specific research findings. It mentions the observations of experts from the World Bank, who note that poverty in India has decreased over the recent decade, albeit not as significantly as previously believed. This adds depth to the discussion and supports the earlier statements about the significance of the update. Hence, (b) is the correct answer. </p>",
    "question_index": 2
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the right order to form a meaningful and coherent paragraph.</p><p>A. These kinds of sharks are known as obligate ram ventilators because they draw water in through their mouths and force it out through their gills.</p><p>B. They use a method called buccal pumping, in which water is pulled in through the mouth and forced out through the gills by the cheek muscles.</p><p>C. It is true that many types of sharks must keep moving in order to receive life-giving oxygen from the water passing through their gills.</p><p>D. Other types of sharks are able to remain stationary because they possess special structures called spiracles, which force water out through their gills.</p>",
    "options": [
      "CABD",
      "CDAB",
      "DABC",
      "BCDA"
    ],
    "correct_option_id": 0,
    "solution": "<p>'C' is the first sentence as it introduces the main subject 'types of sharks', it is followed by 'A' as it gives a name to the types of sharks mentioned in 'C'. How they breathe is mentioned in 'A' and what the whole process is called (i.e. buccal pumping), is mentioned in 'B'. 'D' is the final sentence as it talks about the other types of sharks that are stationary, so it is an independent sentence and can be used at the end of the paragraph. Therefore, the correct order of rearrangement is CABD.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 3
  },
  {
    "question": "<p>For the four-sentence (S1toS4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the appropriate sentences for S2 and S3, respectively.</p><p>(S1) The men and women took their places after the initial mingling, and immediately a surge of conversation filled the room.</p><p>(S2)</p><p>(S3)</p><p>(S4) One or two of the women were actually bouncing up and down on the sofa cushions.</p><p>(P) So, the two parties had to lean forward, their elbows on their knees.</p><p>(Q) At the beginning they mingled awkwardly, clutching their drinks, and walking here and there.</p><p>(R) Several people made a last-minute dash to the bathroom before the conversation could start.</p><p>(S) The men's chairs were far enough away from the women's couches.</p>",
    "options": [
      "P,R",
      "R,Q",
      "Q,S",
      "S,P"
    ],
    "correct_option_id": 3,
    "solution": "<p>Sentence S1 mentions that the conversation between the men and women has already started. So, last-minute dash to the bathroom is out of context. Also, 'mingling awkwardly' is also the phase that has already passed.</p><p>Sentence S introduces the scenario and mentions that the men's chairs were far away from the women's couches. As a consequence of this, both the parties (men and women) had to lean forward (mentioned in P). Sentence S4 elaborates further on how a few women were making an extra effort.</p><p>So, sentences S and P are appropriate for S2 and S3 respectively.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A) Healthy, strong trees act as carbon sinks, offsetting carbon and reducing the effects of climate change.</p><p>B) Trees help to clean the air we breathe. Through their leaves and bark, they absorb harmful pollutants and release clean oxygen for us to breathe.</p><p>C) Increasing levels of carbon dioxide caused by deforestation and fossil fuel combustion trap heat in the atmosphere.</p><p>D) In urban environments, trees absorb pollutant gases like nitrogen oxides, ozone, and carbon monoxide, and sweep up particles like dust and smoke.</p>",
    "options": [
      "BDCA",
      "DBAC",
      "CDAB",
      "ABCD"
    ],
    "correct_option_id": 0,
    "solution": "<p>B and D form the mandatory pair 'BD'. B informs that the trees help in keeping the air that we breathe clean by absorbing harmful pollutants and giving out oxygen in return.</p><p>D follows and informs which all pollutant gases the trees absorb in the urban environments.</p><p>C and A form another mandatory pair 'CA'. C informs us that there is an issue of increasing levels of carbon dioxide which results in trapped heat in the atmosphere. A informs how the trees act as carbon sinks and counter the effects of carbon dioxide in the atmosphere.</p><p>Pairs BD and CA are present in option (a) only.</p><p>So, the correct order is BDCA.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. The principles that emerged from those trials, known as the Nuremberg Code, are broadly applicable to many types of health-related research involving human participants, including clinical trials.</p><p>B. The growing breadth and complexity of contemporary health challenges have produced a&#8239;range of difficult questions that cannot always be adequately addressed by relying exclusively on existing policies, guidelines or codes of conduct.</p><p>C. Recent formal efforts to articulate international standards of ethics applicable to health and health care can be traced to the Nuremberg trials of 1947, during which the horrors of Nazi medical experiments came to light.</p><p>D. Ethical questions related to health, health care and public health cover topics as diverse as moral issues around reproduction, state obligations in the provision of health care services and appropriate measures to control infectious disease.</p>",
    "options": [
      "DCAB&#8239;",
      "ACDB&#8239;",
      "DACB&#8239;",
      "DABC&#8239;"
    ],
    "correct_option_id": 0,
    "solution": "<p>Upon reading all sentences, we observe that Sentence C mentions Nuremberg trials. Sentence A mentions 'those trials', implying that sentence A would come after sentence C. So, CA is a mandatory pair.</p><p>CA as a mandatory pair is present in option (a) only.</p><p>So, the correct order is DCAB.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. She shot the movie on the widest canvas possible using the same kind of equipment that captured Star Wars landscapes, and applied a muted colour grading to every frame.</p><p>B. She said last year that she wanted the ensemble film to look like \"a faded postcard\".</p><p>C. Polley lends the central conversation a visual gravitas normally reserved for epics.</p><p>D. Women Talking, adapted by the writer-director Sarah Polley from Miriam Toews's 2018 novel, is vibrant cinema.</p>",
    "options": [
      "DABC",
      "DBCA",
      "CABD",
      "DCAB"
    ],
    "correct_option_id": 3,
    "solution": "<p>'D' should be the first sentence of the paragraph as it introduces the topic of discussion 'Women Talking- a vibrant cinema'. 'C' should be the second sentence as it talks more about the writer-director Polley. The visual gravitas mentioned in sentence 'C' are described more in sentence 'A' which also states the fact that how she shot the movie. 'B' will be the last sentence which states how she wanted the movie to be.</p><p>Therefore, the correct order is- DCAB.</p><p>Hence, option (d) is correct.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. On the afternoon of that eventful day, I stood on the porch, dumb, expectant and guessed vaguely from my mother's signs and from the hurrying to and fro in the house that something unusual was about to happen, so I went to the door and waited on the steps.</p><p>B. I did not know what the future held of marvel or surprise for me and anger and bitterness had preyed upon me continually for weeks and a deep languor had succeeded this passionate struggle.</p><p>C. The most important day I remember in all my life is the one on which my teacher, Anne Mansfield Sullivan, came to me and I am filled with wonder when I consider the immeasurable contrasts between the two lives which it connects and it was the third of March, 1887, three months before I was seven years old.</p><p>D. The afternoon sun penetrated the mass of honeysuckle that covered the porch, and fell on my upturned face and my fingers lingered almost unconsciously on the familiar leaves and blossoms which had just come forth to greet the sweet southern spring.</p>",
    "options": [
      "DABC",
      "CBAD",
      "CADB",
      "CDAB"
    ],
    "correct_option_id": 2,
    "solution": "<p>'C' is the first sentence as it begins the topic of discussion i.e. the important day for a person, 'A' describes the afternoon of the important day so it will be the second sentence of the paragraph. 'D' describes more about the afternoon that was described in 'A'. 'B' is an independent sentence so it can be kept at the end of the paragraph. Therefore, the correct order is CADB.</p><p>Hence, option (c) is correct.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Given below are four jumbled sentences. Select the option that gives their correct logical sequence.</p><p>A. When faced with uncertainty, humans look out for the action of others and become a victim of ineffective rational thinking during compelling, confusing situations.</p><p>B. According to him, in an emergency, we tend to forget that everybody else observing the event is also likely to be looking out for social evidence.</p><p>C. Robert B. Cialdini explains this reaction with a psychological phenomenon called 'pluralistic ignorance'.</p><p>D. Since we all prefer to appear poised and unflustered among others, we are likely to search for answers placidly, with brief, camouflaged glances at those around us.</p>",
    "options": [
      "ACBD",
      "BCDA",
      "ABCD",
      "ABDC"
    ],
    "correct_option_id": 0,
    "solution": "<p>A-B is a pair as 'A' discusses a theory of rational thinking for humans and the scientist who explains this phenomenon is mentioned in 'C'. What he described is further discussed in 'B', makes it the third sentence of the paragraph. 'D' is the concluding statement as it describes the overall reaction of the humans.</p><p>The correct order is ACBD.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. Fort Hare was more than that: it was a beacon for African scholars from all over Southern Central and Eastern Africa.</p><p>B. Until 1960, the University College of Fort Hare, in the municipality of Alice, about twenty miles due east from Heald town, was the only residential center of higher education for blacks in South Africa.</p><p>C. For young black South Africans like myself, it was Oxford and Cambridge, Harvard and Yale, all rolled into one.</p><p>D. The regent was anxious for me to attend Fort Hare and I was gratified to be accepted there. I felt that I was being groomed for success in the world.</p>",
    "options": [
      "BACD",
      "BCAD",
      "CABD",
      "BDAC"
    ],
    "correct_option_id": 0,
    "solution": "<p>Sentence B will come first as it introduces the topic of discussion  -  'University College of Fort Hare' and mentions that it was the only residential center of higher education for blacks in South Africa. </p><p>Sentence A comes next and tells that it was not only the center of higher education for blacks, but also a beacon for scholars from all over Southern, Central and Eastern Africa. Sentence C follows and mentions what the college meant for the author. </p><p>Sentence D concludes and mentions that the author was thankful to be accepted there. </p><p>So, the correct order is BACD.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. Helping parents become savvier at picking care options and tossing retention bonuses to caregivers are others.</p><p>B. These fixes, importantly, can make childcare more affordable for parents and offer life rafts to centre's haemorrhaging workers.</p><p>C. The most proposed government solution for childcare involves building on top of this flawed system is offering more vouchers to purchase private childcare.</p><p>D. But they do little to address the structural needs: improved quality for kids, better wages and working conditions for workers, and more choices in the low-income neighbourhoods.</p>",
    "options": [
      "CDBA",
      "CBDA",
      "CABD",
      "BADC"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sentence C comes first, and it gives the most proposed government solution for childcare. Sentence A comes next and gives some other solutions. 'These fixes' in B refers to the solutions provided in sentences C and A, and it mentions that these solutions make childcare affordable. Sentence D comes next and presents the contrast that despite the benefits these solutions may provide, they do not address the structural needs. </p><p>So, the correct order is CABD. </p><p>Hence, option (c) is the answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A) The Sustainable Development Goals (SDGs) were adopted by all United Nations Member States in 2015 to end poverty, reduce inequality and build more peaceful, prosperous societies by 2030.</p><p>B) The SDGs cannot be achieved without the realisation of child rights.</p><p>C) Also known as the Global Goals, the SDGs are a call to action to create a world where no one is left behind.</p><p>D) As world leaders work to deliver on the 2030 promise, children around the globe are standing up to secure their right to good health, quality education, a clean planet and more.</p>",
    "options": [
      "ABDC",
      "ADCB",
      "ACBD",
      "ADBC"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sentence A comes first as it introduces the subject of the passage  -  'sustainable development goals' and discusses its purposes. Sentence C should come next as it elaborates on their purpose. Sentences B and D form the pair BD as B starts the discussion of SDGs with respect to children, and D carries forward the discussion and mentions what all children around the globe are doing. </p><p>So, the correct order is ACBD. </p><p>Hence, option (c) is the answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. I was almost drowned a dozen times; was nearly boiled alive and just missed being cremated.</p><p>B. Now, my well-being is simply the result of a careful and measured mode of living and perhaps the most astonishing thing is that three times in my youth I was rendered by illness a hopeless physical wreck and given up by physicians.</p><p>C. More than this, through ignorance, and light-heartedness, I got into all sorts of difficulties, dangers and scrapes from which I extricated myself as by enchantment.</p><p>D. But as I recall these incidents to my mind, I feel convinced that my preservation was not altogether accidental.</p>",
    "options": [
      "CADB",
      "BADC",
      "BCAD",
      "DCAB"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sentence B comes first as the author starts the discussion with the present scenario and explains the reason behind his/her well-being, i.e., careful mode of living. In the same sentence, the author draws the contrast and informs that in his/her youth, the author generally got into problems. Sentence C comes next and here, the author mentions amazement as to how he/she always somehow got out of that problem. Sentence A comes next where the author mentions some more examples of such problems. Sentence D comes last and concludes the passage. </p><p>So, the correct order is BCAD. </p><p>Hence, option (c) is the answer.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Sentences of a paragraph are given below. While the first and the last sentences (S1 and S6) are in the correct order, the sentences in between are jumbled up. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>S1. In Dr. Babasaheb Ambedkar</p><p>A. but also an elder statesman and national leader</p><p>B. we have not only a crusader against the caste system,</p><p>C. a valiant fighter for the cause of the downtrodden in India</p><p>D. whose contribution in the form of the Constitution of India</p><p>S6. will be cherished forever by posterity.</p>",
    "options": [
      "DABC",
      "CABD",
      "BACD",
      "ABCD"
    ],
    "correct_option_id": 2,
    "solution": "<p>Part B will come first as it mentions that in Dr. Babasaheb Ambedkar, we get to see a crusader against a caste system. Part A follows and implies that not only a crusader but we can also see an elder statesman and a national leader in him. Part C further follows and mentions what all can be seen him. Part D preceded S6 and the pair D-S6 mentions that his contributions will be cherished forever. </p><p>The correct sentence is: In Dr. Babasaheb Ambedkar, we have not only a crusader against the caste system, but also an elder statesman and national leader, a valiant fighter for the cause of the downtrodden in India, whose contribution in the form of the Constitution of India will be cherished forever by posterity.</p><p>So, the correct order is BACD. </p><p>Hence, option (c) is the answer.</p>",
    "question_index": 14
