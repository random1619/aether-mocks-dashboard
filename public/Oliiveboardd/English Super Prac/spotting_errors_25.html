<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">

                        <div class="stat-name">Flagged</div>
                    </div>

                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>The new software runs / much more smooth / than the previous version, / improving our overall workflow.</p>",
    "options": [
      "The new software runs",
      "much more smooth",
      "than the previous version,",
      "improving our overall workflow"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in the use of the adjective \"smooth\" to modify the verb \"runs\". Verbs are modified by adverbs. The adverb form of \"smooth\" is \"smoothly\". The comparative form would be \"more smoothly\".</p><p>The correct phrase should be \"much more smoothly\".</p><p><b>Correct sentence:</b> The new software runs much more <b>smoothly</b> than the previous version, improving our overall workflow.</p><p>So, there is an error in the part mentioned in option b).</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>I haven't been feeling very well _________, so I am going to the doctor.</p>",
    "options": [
      "late",
      "soon",
      "lately",
      "early"
    ],
    "correct_option_id": 2,
    "solution": "<p>The given sentence describes a recent and ongoing state of health. The use of the present perfect continuous tense (\"haven't been feeling\") indicates an action or state that started in the recent past and continues to the present. The blank requires an adverb of time that means \"recently.\"</p><p>The correct option is <b>\"lately,\"</b> which means \"in the recent past; recently\" and is perfectly suited for use with present perfect tenses.</p><p>The other options do not fit the context: <b>\"late\"</b> refers to a time after the expected or usual time. <b>\"Soon\"</b> refers to a point in the near future. <b>\"Early\"</b> refers to a time before the expected or usual time.</p><p>Thus, the correct sentence is: \"I haven't been feeling very well <b>lately</b>, so I am going to the doctor.\"</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>The project manager told</u> the entire team that <u>they must complete always</u> <u>their assigned tasks </u>before <u>leaving the office</u>.</p>",
    "options": [
      "leaving the office",
      "their assigned tasks",
      "The project manager told",
      "they must complete always"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error is the incorrect placement of the adverb of frequency, \"always\". Adverbs of frequency (like always, never, often, sometimes) are generally placed before the main verb (\"complete\") but after the modal verb (\"must\").</p><p>The correct placement should be \"must always complete\".</p><p><b>Correct sentence:</b> The project manager told the entire team that they <b>must always complete</b> their assigned tasks before leaving the office.</p><p>Hence, option (d) is the correct answer.</p><p><b>Note: Modal verb:</b> A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\"</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option to substitute the bracketed segment in the given sentence.</p><p>The committee's final decision on the matter was (unanimous complete in its) nature.</p>",
    "options": [
      "complete unanimously in its",
      "unanimous completely in its",
      "completely unanimous in its",
      "completely unanimous for its"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error in the bracketed segment is the use of two adjectives (\"unanimous,\" \"complete\") where an adverb and an adjective are needed. The adjective \"unanimous\" describes the \"decision.\" The word modifying \"unanimous\" should be an adverb of degree.</p><p>The adjective <b>\"complete\"</b> should be in its adverbial form, <b>\"completely,\"</b> to modify the adjective \"unanimous.\"</p><p><b>Option c) completely unanimous in its</b> is correct. The adverb \"completely\" correctly modifies the adjective \"unanimous,\" and the preposition \"in\" is appropriate.</p><p><b>Option a) complete unanimously in its</b> is incorrect. It uses an adjective (\"complete\") to modify an adverb (\"unanimously\"), which is grammatically wrong.</p><p><b>Option b) unanimous completely in its</b> has the wrong word order; the adverb should precede the adjective it modifies.</p><p><b>Option d) completely unanimous for its</b> uses the wrong preposition \"for.\" The correct idiom is \"unanimous in nature.\"</p><p><b>Correct Sentence:</b> The committee's final decision on the matter was <b>completely unanimous</b> in its nature.</p><p>Hence, the most appropriate choice is <b>c) completely unanimous in its</b>.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to substitute the bracketed segment in the given sentence.</p><p>(Nowhere else you will find) such a beautiful and serene holiday destination.</p>",
    "options": [
      "Nowhere else will you find",
      "Anywhere else you will find",
      "Elsewhere nowhere you will find",
      "Nowhere else you would find"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error in the bracketed segment is the lack of subject-verb <b>inversion</b> after the negative adverbial phrase \"Nowhere else.\"</p><p>When a sentence or clause begins with a negative or limiting adverbial phrase (like Nowhere, Never, Not only, etc.), the auxiliary verb and the subject must be inverted. The structure should be: Adverbial Phrase + Auxiliary Verb + Subject.</p><p><b>Option a) Nowhere else will you find</b> is correct. It correctly inverts the auxiliary verb \"will\" and the subject \"you.\"</p><p><b>Option b) Anywhere else you will find</b> changes the meaning from negative to positive and is ungrammatical as a statement starter.</p><p><b>Option c) Elsewhere nowhere you will find</b> is a redundant and grammatically incorrect jumble of adverbs.</p><p><b>Option d) Nowhere else you would find</b> lacks the required inversion and incorrectly changes the modal verb to \"would.\"</p><p><b>Correct Sentence:</b> Nowhere else will you find such a beautiful and serene holiday destination.</p><p>Hence, the most appropriate choice is <b>a) Nowhere else will you find</b>.</p>",
    "question_index": 4
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>The athlete who won / the marathon trained / very hardly every day / for the last six months.</p>",
    "options": [
      "for the last six months",
      "The athlete who won",
      "the marathon trained",
      "very hardly every day"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error lies in the incorrect use of the adverb \"hardly\". The adverb \"hard\" means \"with great effort or energy\". The adverb \"hardly\" means \"scarcely\" or \"almost not at all\". The context of the sentence implies that the athlete trained with great effort.</p><p>Therefore, \"hard\" should be used instead of \"hardly\".</p><p><b>Correct sentence:</b> The athlete who won the marathon trained very <b>hard</b> every day for the last six months.</p><p>So, there is an error in the part mentioned in option d).</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Because he is very punctual, he is _________ late for his meetings.</p>",
    "options": [
      "often",
      "always",
      "sometimes",
      "seldom"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence describes the frequency of someone being late, with the given context that he is \"very punctual.\" This implies that his being late is a rare occurrence. The blank requires an adverb of frequency that means \"rarely\" or \"not often.\"</p><p>The correct option is <b>\"seldom,\"</b> which means not often; rarely. This word logically follows from the fact that the person is punctual.</p><p>The other options contradict the given information: <b>\"often\"</b> (frequently) and <b>\"always\"</b> (on every occasion) would mean he is not punctual. <b>\"Sometimes\"</b> (occasionally) is possible but \"seldom\" better captures the idea of rarity implied by \"very punctual.\"</p><p>Thus, the correct sentence is: \"Because he is very punctual, he is <b>seldom</b> late for his meetings.\"</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>The experienced chef prepared</u> the <u>mushroom soup with</u> great care, and <u>it tasted absolutely wonderfully</u> <u>with a hint of thyme</u>.</p>",
    "options": [
      "with a hint of thyme",
      "The experienced chef prepared",
      "mushroom soup with",
      "it tasted absolutely wonderfully"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error is using an adverb (\"wonderfully\") after a linking verb (\"tasted\"). Linking verbs (like be, seem, feel, taste, smell) connect the subject to an adjective that describes it, not an adverb. The soup itself was wonderful. Therefore, the adjective \"wonderful\" should be used. The adverb \"absolutely\" correctly modifies this adjective.</p><p>The correct phrase should be \"it tasted absolutely wonderful\".</p><p><b>Correct sentence:</b> The experienced chef prepared the mushroom soup with great care, and it tasted absolutely <b>wonderful</b> with a hint of thyme.</p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option to substitute the bracketed segment in the given sentence.</p><p>I did not see my friend (nowhere at the party last) night, so I went home early.</p>",
    "options": [
      "somewhere at the party last",
      "anywhere at the party last",
      "anywhere in the party last",
      "everywhere at the party last"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error in the bracketed segment is the use of a <b>double negative</b>. The sentence already contains the negative \"did not.\" In standard English, you cannot use another negative word like \"nowhere\" in the same clause.</p><p>When a sentence is negative, adverbs like <b>\"anywhere,\" \"anything,\"</b> or <b>\"anyone\"</b> should be used instead of \"nowhere,\" \"nothing,\" or \"no one.\"</p><p><b>Option b) anywhere at the party last</b> is correct. It replaces the negative \"nowhere\" with the appropriate non-negative \"anywhere,\" thus avoiding the double negative.</p><p><b>Option a) somewhere at the party last</b> is incorrect. \"Somewhere\" is typically used in positive statements, not negative ones.</p><p><b>Option c) anywhere in the party last</b> uses the less appropriate preposition \"in.\" The standard phrase is \"at a party.\"</p><p><b>Option d) everywhere at the party last</b> contradicts the meaning of the sentence, which states the friend was not seen.</p><p><b>Correct Sentence:</b> I did not see my friend <b>anywhere</b> at the party last night, so I went home early.</p><p>Hence, the most appropriate choice is <b>b) anywhere at the a party last</b>.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option to substitute the bracketed segment in the given sentence.</p><p>He explained the complex procedure (as clear as he could) to the new trainees.</p>",
    "options": [
      "clearer than he could",
      "as clearly as he could",
      "so clearly as he could",
      "No substitution required"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error in the bracketed segment is the use of the adjective \"clear\" where an adverb of manner is needed. The sentence requires a word to describe <i>how</i> he explained the procedure.</p><p>The adjective <b>\"clear\"</b> describes a noun (e.g., a clear explanation).</p><p>The adverb <b>\"clearly\"</b> describes a verb (e.g., explained clearly).</p><p>The structure \"as...as\" is used for making comparisons, and the word between them must be in the correct form (adjective or adverb) depending on what it modifies.</p><p><b>Option b) as clearly as he could</b> is correct. The adverb \"clearly\" correctly modifies the verb \"explained\" within the \"as...as\" comparative structure.</p><p><b>Option a) clearer than he could</b> changes the structure to a direct comparison (\"-er than\") which is not what the sentence requires.</p><p><b>Option c) so clearly as he could</b> is an incorrect structure. The standard form is \"as...as\" for this type of comparison.</p><p><b>Option d) No substitution required</b> is incorrect because the original phrase uses an adjective instead of an adverb.</p><p><b>Correct Sentence:</b> He explained the complex procedure <b>as clearly as</b> he could to the new trainees.</p><p>Hence, the most appropriate choice is <b>b) as clearly as he could</b>.</p>",
    "question_index": 9
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>Our team played so good / that we easily defeated / the defending champions / in the final tournament match.</p>",
    "options": [
      "Our team played so good",
      "that we easily defeated",
      "the defending champions",
      "in the final tournament match"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is the use of the adjective \"good\" to modify the verb \"played\". An adverb is required to describe how the team played. The adverb form of \"good\" is \"well\".</p><p>The phrase \"so good\" should be \"so well\".</p><p><b>Correct sentence:</b> Our team played so <b>well</b> that we easily defeated the defending champions in the final tournament match.</p><p>So, there is an error in the part mentioned in option a).</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>My grandfather _________ goes for a long walk every single morning.</p>",
    "options": [
      "ago",
      "yet",
      "always",
      "soon"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence describes a routine or habitual action, indicated by the phrase \"every single morning.\" The blank requires an adverb of frequency that reflects a habit that occurs without exception.</p><p>The correct option is <b>\"always,\"</b> which means at all times or on every occasion. This perfectly matches the meaning of \"every single morning.\"</p><p>The other options are adverbs of time that do not fit the context: <b>\"ago\"</b> refers to a point in the past. <b>\"Yet\"</b> is typically used in negative sentences or questions to talk about something that hasn't happened. <b>\"Soon\"</b> refers to the near future.</p><p>Thus, the correct sentence is: \"My grandfather <b>always</b> goes for a long walk every single morning.\"</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>The official report confirmed</u> that there was <u>nobody else but the night</u> watchman <u>present in the building</u> <u>when the fire started</u>.</p>",
    "options": [
      "The official report confirmed",
      "nobody else but the night",
      "present in the building",
      "when the fire started"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is the redundant use of the adverb \"else\". When the pronoun \"nobody\" is followed by \"but\" (used in the sense of \"except\"), the word \"else\" is unnecessary and superfluous. The phrase \"nobody but\" correctly conveys the meaning that only the night watchman was present.</p><p>The correct phrase should be \"nobody but the night watchman\".</p><p><b>Correct sentence:</b> The official report confirmed that there was <b>nobody</b> but the night watchman present in the building when the fire started.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence.</p><p>After the throat surgery, she <u>cannot hardly speak</u> without a lot of effort.</p>",
    "options": [
      "can hardly speaking",
      "could not hardly speak",
      "can hardly speak",
      "No substitution"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error in the underlined segment is a double negative. \"Cannot\" and \"hardly\" are both negative in meaning. Using them together is grammatically incorrect in standard English. The sentence should use only one negative word to convey the intended meaning.</p><p><b>Option a) can hardly speaking</b> is incorrect because the modal verb \"can\" must be followed by the base form of the verb (speak), not the present participle (speaking).</p><p><b>Option b) could not hardly speak</b> is incorrect as it retains the double negative error in the past tense.</p><p><b>Option c) can hardly speak</b> is the correct substitution. It removes the word \"not\" and correctly uses the negative adverb \"hardly\" with the modal verb \"can\" to mean she has great difficulty speaking.</p><p><b>Option d) No substitution</b> is incorrect as the original phrase contains a double negative error.</p><p>So, the correct sentence is: After the throat surgery, she <b>can hardly speak</b> without a lot of effort.</p><p>Hence, the most appropriate choice is <b>c) can hardly speak</b>.</p><p><b>Note: Modal verb:</b> A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence.</p><p>My uncle who lives in London <u>comes often to visit</u> our family in India.</p>",
    "options": [
      "often comes to visit",
      "is often coming to visit",
      "comes to visit often",
      "No substitution"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error in the underlined segment is the incorrect placement of the adverb of frequency \"often\". Adverbs of frequency (like always, often, sometimes, never) are generally placed before the main verb (\"comes\").</p><p><b>Option </b><b>a) often comes to visit</b> is the correct choice. It places the adverb of frequency \"often\" before the main verb \"comes\", which is the standard grammatical position.</p><p><b>Option b) is often coming to visit</b> changes the tense to present continuous, which is generally not used for habitual actions like this.</p><p><b>Option c) comes to visit often</b> places the adverb at the end of the clause. While sometimes possible, the position before the main verb is more standard and stylistically better. Option (a) is the most appropriate correction.</p><p><b>Option d) No substitution</b> is incorrect as the placement of the adverb in the original sentence is awkward and non-standard.</p><p>So, the correct sentence is: My uncle who lives in London <b>often</b> comes to visit our family in India.</p><p>Hence, the most appropriate choice is <b>a) often comes to visit</b>.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>_________ had the team scored a goal than the spectators erupted in joy.</p>",
    "options": [
      "Scarcely",
      "Hardly",
      "No sooner",
      "Barely"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence describes two actions happening in quick succession: the team scoring, followed immediately by the crowd's reaction. The sentence structure uses inversion (\"had the team scored\") and is followed by the conjunction \"than.\"</p><p>The rule being tested is the use of correlative pairs with negative or limiting adverbs that cause inversion. The adverbial pair for this structure is \"No sooner... than...\".</p><p>The correct option is <b>\"No sooner.\"</b> The construction \"No sooner had... than...\" is a fixed grammatical structure used to emphasize that the second event happened immediately after the first.</p><p>The other options are incorrect because <b>\"Scarcely,\" \"Hardly,\"</b> and <b>\"Barely\"</b> are all correctly followed by \"when\" or \"before\" (e.g., \"Hardly had the team scored when...\"), not \"than.\"</p><p>Thus, the correct sentence is: \"<b>No sooner</b> had the team scored a goal than the spectators erupted in joy.\"</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The instructions were _________ clear that even a beginner could understand them.</p>",
    "options": [
      "so",
      "too",
      "such",
