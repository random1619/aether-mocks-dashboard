<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>

    <link rel="stylesheet" href="../../css/mock-main.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error-free, mark 'No error' as your answer.</p><p>It is the most toughest song that is ever sung in a competitive round. </p>",
    "options": [
      "song that is ever sung",
      "It is the most toughest",
      "No error",
      "in a competitive round"
    ],
    "correct_option_id": 1,
    "solution": "<p>The part mentioned in option (b) has the error. The superlative form of the adjective 'tough' is 'toughest' and the addition of the adverb 'most' makes the adjective 'toughest', incorrect and thus, 'most' needs to be removed.</p><p>The correct sentence is: It is the toughest song that is ever sung in a competitive round.</p><p>Hence, the correct answer is option (b).</p><p>Note:</p><p>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Identify the segment in the sentence which contains the grammatical error.</p><p>It is bestest to use your calories wisely by filling them up with micronutrient-filled foods.</p>",
    "options": [
      "calories wisely",
      "micronutrient-filled",
      "It is bestest",
      "filling them up"
    ],
    "correct_option_id": 2,
    "solution": "<p>The segment mentioned in option (c) has an error. In formal English language, no such word like 'bestest' exists. The correct word to be used is 'best' which is the superlative form of adjective 'good'.</p><p>Hence, option (c) is correct.</p>",
    "question_index": 1
  },
  {
    "question": "<p>The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer.</p><p>No sooner had she crossed a small bridge near the farm when/ the storm resumed/ with even greater intensity.</p>",
    "options": [
      "No sooner had she crossed a small bridge near the farm when",
      "the storm resumed",
      "with even greater intensity.",
      "No error"
    ],
    "correct_option_id": 0,
    "solution": "<p>Some adverbs are used in pairs- 'Hardly..when', 'no sooner.. than', 'scarcely..when', 'so..that', etc. So, the use of 'when' is inappropriate here. 'No sooner' is used to show that one thing happens immediately after another thing, so its usage seems appropriate here. It should be replaced with 'than'.</p><p>Alternatively, 'no sooner' can be replaced with 'hardly/scarcely'.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Those pictures kept on the sofa are your's, take them along with you.</p>",
    "options": [
      "Those pictures kept on",
      "Take them",
      "Along with you",
      "The sofa are your's"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option (d) has an error. Possessive pronouns like yours, ours, theirs, hers and its are written without an apostrophe ('). So, <b>your's</b> will be replaced by <b>yours </b>in order to rectify the sentence. </p><p>The correct sentence is: Those pictures kept on the sofa are yours, take them along with you.</p><p>Hence, (d) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Identify the segment in the sentence which contains a grammatical error.</p><p>This diamond is more unique and I will buy it.</p>",
    "options": [
      "This diamond",
      "is more",
      "unique and",
      "I will buy it."
    ],
    "correct_option_id": 1,
    "solution": "<p>The error lies in <b>option (b)</b>.</p><p><b>Never</b> use <b>comparative</b> or <b>superlative</b> with the <b>adjective</b> 'unique'.</p><p>So, in this context, 'more' (comparative degree) must be <b>removed</b> before 'unique' in part (b) of the sentence.</p><p>Thus, the error is in option <b>(b) is more</b>.</p><p>Therefore, the corrected form of the sentence is: This diamond is unique and I need to buy it.</p><p>Additional Information:</p><p><b>Never</b> use comparatives or superlatives with these adjectives:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Unique</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Supreme</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Impossible</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vacuum</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Empty</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Everlasting</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Perfect</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Final</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Last</td></tr></table>",
    "question_index": 4
  },
  {
    "question": "<p> In the following question, a sentence is given with an underlined phrase. Select the option given below that can replace the phrase to make the sentence grammatically and contextually correct and mark that as your answer. </p><p>How <u>many milk does</u> a baby need in the first few days?</p>",
    "options": [
      "Much milk do",
      "Much milk does",
      "Many more milk does",
      "Few milk does"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Many' and 'few' are followed by a plural countable noun. 'Milk' is an uncountable noun so the use of uncountable quantifier 'much' is appropriate here followed by verb in singular form as 'a baby' is a singular noun. </p><p>Hence, option (b) is correct. </p><p>NOTE/-</p><p><b>Countable and uncountable nouns: 1. Countable nouns</b> are the class of nouns that can be counted, for example, 'table'  -  one table, two tables, three tables, etc. <b>2. Uncountable nouns </b>are the nouns that cannot be counted or usually are not counted, for example, light, water, milk, information, furniture, etc. They do not generally have a plural form and can't be preceded by<b> 'a' </b>or <b>'an'. </b>Many abstract nouns are typically uncountable. Some uncountable nouns can be used in the plural as well, depending on the meaning or context of the word.</p>",
    "question_index": 5
  },
  {
    "question": "<p>In the following question, one part of the sentence has an error. Identify the segment in the sentence which contains a grammatical error and choose the option accordingly.</p><p>You have to try more hardly to gain subscribers for your magazines.</p>",
    "options": [
      "to gain subscribers",
      "for your magazines",
      "You have to",
      "try more hardly"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Hardly' is an adverb, and is used to suggest that something is unlikely to be or certainly not the case. The sentence talks about the effort put by them to gain subscribers. So, the adverb 'hardly' is grammatically incorrect, and it should be replaced with the adjective 'hard' to rectify the sentence. Hence, option (d) is the correct answer.</p><p><b>The correct sentence is: </b>You have to try more hard to gain subscribers for your magazines.</p><p>Or the sentence can modify as \"You have to try harder to gain subscribers for your magazines.\"</p><p><b>Note:</b></p><p>&#183; <b>The Positive Degree </b>of an Adjective is the Adjective in its simple form. It is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> of an adjective denotes a higher degree of the quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of the quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 6
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Some water were given to the dogs after the long day of the outing.</p>",
    "options": [
      "Some water were",
      "given to the dogs",
      "after the long",
      "day of the outing."
    ],
    "correct_option_id": 0,
    "solution": "<p>When any of '<b><i>some, any, none, all, more / most, </i></b>is used with an <b>uncountable noun</b>, the <b><i>verb is singular</i></b>.</p><p>'Water' is an uncountable noun. So, 'were' [plural] should be replaced with 'was' [singular].</p><p>Hence, option (a) is the correct answer. </p><p><b>Note:-</b></p><p><b>Countable and uncountable nouns: 1. Countable nouns</b> are the class of nouns that can be counted, for example, 'table'  -  one table, two tables, three tables, etc. <b>2. Uncountable nouns </b>are the nouns that cannot be counted or usually are not counted, for example, light, water, milk, information, furniture, etc. They do not generally have a plural form and can't be preceded by<b> 'a' </b>or <b>'an'. </b>Many abstract nouns are typically uncountable. Some uncountable nouns can be used in the plural as well, depending on the meaning or context of the word.</p>",
    "question_index": 7
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Sameer is working in an IT firm in Pune for the past six years.</p>",
    "options": [
      "Sameer is working",
      "in an IT firm",
      "in Pune for the",
      "past six years"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#8220;Has been working&#8221; will replace &#8220;is working&#8221; because the event started in the past and is still continuing. Hence, Present Perfect Continuous Tense will be used.</p><p>So, there is an error in option a).</p><p>Hence, option a) is correct.</p>",
    "question_index": 8
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>A camera lens / capture the visual / image your / brain identifies.</p>",
    "options": [
      "A camera lens",
      "image your",
      "brain identifies",
      "capture the visual"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option (d) has an error. In the part mentioned in option (d), the verb 'capture' which corresponds to a plural verb is incorrectly used to denote the singular noun 'lens', which leads to error in subject verb agreement. Instead, the singular form of the verb 'captures' is to be used.</p><p>The correct sentence is: A camera lens <b>captures</b> the visual image your brain identifies.</p><p>Hence, the correct answer is option (d).</p><p>Note:</p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 9
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The chief guest/ is to be/ carried by/ an helicopter from here. </p>",
    "options": [
      "is to be",
      "The chief guest",
      "carried by",
      "an helicopter from here"
    ],
    "correct_option_id": 3,
    "solution": "<p>The part given in option (d) has the error. The definite article 'an' can be used for a word that starts with a vowel sound. 'Helicopter' doesn't start with a vowel sound. So, 'an' cannot be used here. it must be replaced with 'a' which is used before words with consonant sounds.</p><p>The correct sentence is: The chief guest is to be carried by a helicopter from here.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 10
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error. </p><p>All member of this / old age home actively / participates in the marathons / conducted by the state. </p>",
    "options": [
      "conducted by the state",
      "All member of this",
      "participates in the marathons",
      "old age home actively"
    ],
    "correct_option_id": 1,
    "solution": "<p>A pronoun must agree with its antecedent in person, number, and gender. The noun following 'all' is 'member' which is singular in nature. And 'all' refers to a complete group of people/things (plural in nature). </p><p>So, instead of 'all', 'every' fits in the sentence as it refers to each member of the group individually (singular in nature).</p><p>This means 'all' in the given sentence makes it grammatically incorrect. </p><p>Replace it with 'every' to rectify the error.</p><p><b>Correct sentence: Every</b> member of this old age home actively participates in the marathons conducted by the state.</p><p>So, option b) is the segment that contains a grammatical error. </p><p>Hence, option b) is correct.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Identify the segment in the sentence that contains a grammatical error. </p><p>If I was you, I would consider taking some time off to recharge and reflect on what's important in life.</p>",
    "options": [
      "If I was you, I",
      "would consider taking some",
      "time off to recharge and reflect on",
      "what's important in life"
    ],
    "correct_option_id": 0,
    "solution": "<p>In segment (a), \"was\" is incorrect. The correct form to use in the subjunctive mood, expressing a hypothetical situation, is \"were\" with the first-person singular pronoun \"I.\" The correct phrase should be \"If I were you,\" indicating a hypothetical scenario where the speaker is imagining themselves in another person's position. Hence, (a) is the correct answer. </p><p>The corrected sentence: If I <b>were</b> you, I would consider taking some time off to recharge and reflect on what's important in life.</p>",
    "question_index": 12
  },
  {
    "question": "<p>The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer.</p><p>The seat of new staff was filled/ by an old craftsman/ who had an extensible knowledge of prehistoric designs and crafts.</p>",
    "options": [
      "by an old craftsman",
      "who had an extensible knowledge of prehistoric designs and crafts",
      "The seat of new staff was filled",
      "No error"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Extensive' will replace 'extensible'. Extensible means capable of being extended. 'Extensive' means thorough; dealing with a wide range of information. The person is chosen because of his 'thorough knowledge of craftsmanship' which is helpful for the job. So, 'extensive' is the right word.</p><p>Hence, option (b) is correct.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Spot the error in the given sentence and select the sentence that is error free from the given options.</p><p>She is an ardent devotion. </p>",
    "options": [
      "She an ardent devotee.",
      "She was ardent devotion.",
      "She is an ardent devotee.",
      "She will be ardently devotee."
    ],
    "correct_option_id": 2,
    "solution": "<p>In the given sentence, 'devotion' (love, loyalty, or enthusiasm for a person or activity) is incorrectly used instead of 'devotee' (a person who is very interested in and enthusiastic about someone or something) to denote a person.</p><p></p><p>Option (b) has the same error as the given sentence.</p><p></p><p>Option (a) lacks an auxiliary verb and in option (d), the adverb 'ardently' is used to qualify the noun 'devotee'. These options are erroneous and are thus negated.</p><p></p><p>Option (c), 'She is an ardent devotee' is the grammatically and contextually correct sentence that can replace the given incorrect sentence.</p><p></p><p>Hence, the correct answer is option (c).</p><p></p><p>Note:</p><p><b>Auxiliary verb:</b> A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. Auxiliary verbs help to form the various tenses, moods, and voices of other verbs. The principal ones are be, do, and have. Example: She will sing a song tomorrow. Here, 'will' is the auxiliary verb that supports the main verb 'sing'.</p><p><b>Qualifiers: </b>A word or phrase that limits the meaning of another word or phrase or makes it less general. 'Adverbs' and 'adjectives' are qualifiers.</p>",
    "question_index": 14
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The team worked / diligent to finish / the project before / the deadline.</p>",
    "options": [
      "The team worked",
      "Diligent to finish",
      "The project before",
      "The deadline"
    ],
    "correct_option_id": 1,
    "solution": "<p>The segment with a grammatical error is 'diligent to finish'. \"Diligent\" (constant in effort to accomplish something) is an adjective, which is used to describe nouns. \"Diligent\" does not describe the verb \"worked\" properly. We need an adverb to modify the verb \"worked\". The adverb form of \"diligent\" is \"diligently.\" Hence, (b) is the correct answer. </p><p><b>The correct sentence is:</b> The team worked diligently to finish the project before the deadline.</p>",
    "question_index": 15
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>These burrows need / to be wide dug / for the free / flow of water.</p>",
    "options": [
      "to be wide dug",
      "These burrows need",
      "flow of water",
      "for the free"
    ],
    "correct_option_id": 0,
    "solution": "<p>In the part mentioned in option (a), the verb 'dug' is incorrectly qualified by the adjective 'wide' instead of an adverb. The adverb 'widely' is to be used in the place of the adjective 'wide'.</p><p>The correct sentence is: These burrows need to be <b>widely</b> dug for the free flow of water.</p><p>Hence, the correct answer is option (a).</p><p>Note:</p><p><b>Qualifiers: </b>A word or phrase that limits the meaning of another word or phrase or makes it less general. 'Adverbs' and 'adjectives' are qualifiers.</p>",
    "question_index": 16
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>This was the man whom treated her so coldly earlier today.</p>",
    "options": [
      "whom treated her",
      "This was",
      "so coldly earlier today",
      "the man"
    ],
    "correct_option_id": 0,
    "solution": "<p>The objective pronoun 'whom' is used to refer to objects. In the given sentence, 'the man' is the subject of the sentence and not the object. So, we should use the subjective pronoun 'who' in place of 'whom'. Hence, option (a) is the correct answer.</p><p><b>The correct sentence is: </b>This was the man who treated her so coldly earlier today.</p><p><b>Note:</b></p><p><b>Subjective Pronouns:</b> The pronouns I, you, we, he, she, it, and they are known as subjective pronouns because they act as the subjects of verbs: We went to the party.</p><p><b>Objective Pronouns:</b> The pronouns me, you, us, him, her, it, and them are called objective pronouns because they act as the objects of verbs and prepositions: Anjali drove us home.</p>",
    "question_index": 17
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The island is / surround by/ sharks and / rare marine creatures.</p>",
    "options": [
      "sharks and",
      "rare marine creatures",
      "The island is",
      "surround by"

    "correct_option_id": 3,
