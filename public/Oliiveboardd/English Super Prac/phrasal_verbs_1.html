<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p><b> </b>Select the most appropriate collocation to substitute the underlined phrase in the given sentence. </p><p>The success of the project <u>depends over</u> your cooperation.</p>",
    "options": [
      "Depends off",
      "Depends under",
      "Depends on",
      "Depends at"
    ],
    "correct_option_id": 2,
    "solution": "<p>Collocations are combinations of words that frequently occur together and have become established as natural expressions in a language. In this case, the verb \"depend\" is commonly used with the preposition \"on\" to indicate what something relies on. Hence, (c) is the correct answer. </p><p>The final sentence would be: The success of the project depends on your cooperation.</p>",
    "question_index": 0
  },
  {
    "question": "<p><b> </b>Select the most appropriate collocation to substitute the underlined phrase in the given sentence. </p><p>She is a highly respected cardiologist who <u>specialises at</u> the treatment of heart disease.</p>",
    "options": [
      "Specialise of",
      "Specialises to",
      "Specialises in",
      "Specialises on"
    ],
    "correct_option_id": 2,
    "solution": "<p>The verb \"specialises\" is followed by the preposition \"in\" when indicating the area or field in which someone has expertise or focuses their professional work. Hence, (c) is the correct answer. </p><p>The final sentence would be: She is a highly respected cardiologist who specialises in the treatment of heart disease.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>The company <u>reduced</u> its expenses by cutting down on unnecessary costs. </p>",
    "options": [
      "scaled back",
      "scaled up",
      "scaled down",
      "scaled off"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct answer is (c) 'scaled down', which means to decrease or diminish. Options (a), (b) and (d) change the meaning of the phrasal verb by replacing 'down' with 'back', 'up' or 'off', which imply that the company withdrew, increased or removed its expenses.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option that can replace the bracketed segment in the given sentence.</p><p>The team captain had to (put down) the match due to the sudden unavailability of several key players.</p>",
    "options": [
      "Put off",
      "Put on",
      "Call back",
      "Call on"
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence suggests that the team captain had to postpone or reschedule the match because several important players were unexpectedly unavailable. The original sentence contains an error due to the use of the phrase \"put down.\" The expression \"put down\" typically means to physically place something on a surface or to euthanize an animal, but it does not convey the intended meaning of postponing or cancelling an event, such as a match in this context.</p><p>Option (a) is correct. The phrasal verb \"put off\" means to postpone or delay something to a later time. In the context of the sentence, it accurately conveys the idea that the team captain had to postpone or reschedule the match due to the sudden unavailability of several key players.</p><p>Option (b) is not correct. This phrasal verb \"put on\" commonly means to dress oneself by placing clothing, accessories, or items onto one's body. However, in the context of the sentence, it doesn't convey the idea of postponement or cancellation of the match due to the unavailability of players.</p><p>Option (c) is incorrect. The phrase 'call back' usually means to return a phone call or ask someone to return to a place or situation. However, it doesn't accurately convey the action needed in the given context, where the team captain must take a decision regarding the match due to the absence of key players.</p><p>Option (d) is incorrect as well. \"Call on\" often means to ask for assistance or support from someone. However, in the context of the sentence, it doesn't convey the team captain's action of postponing or cancelling the match due to the sudden unavailability of players.</p><p><b>The correct sentence is: </b>The team captain had to put off the match due to the sudden unavailability of several key players.</p><p>Hence, (a) is the correct answer.</p><p><b>NOTE:</b></p><p><b>Phrasal verb:</b> A phrase that consists of a verb with a preposition or adverb or both, the meaning of which is different from the meaning of its separate parts. Example: She has always looked down on me. Here, the phrasal verb 'to look down on someone' doesn't mean that you are looking down from a higher place at someone who is below you; it means that you think that you are better than someone.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option that best expresses the meaning of the idiom/phrasal verb in the given sentence. </p><p>She urged him to <b>cut back</b> on expenses to save money for future investments, emphasizing the need for financial discipline.</p>",
    "options": [
      "Increase spending",
      "Limit consumption",
      "Invest wisely",
      "Spend carelessly"
    ],
    "correct_option_id": 1,
    "solution": "<p>The phrasal verb \"cut back\" means to do less of something, or use something in smaller amounts, especially money; to limit consumption. Hence, (b) is the correct answer.</p><p><b>NOTE:</b></p><p><b>Phrasal verb:</b> A phrase that consists of a verb with a preposition or adverb or both, the meaning of which is different from the meaning of its separate parts. Example: She has always looked down on me. Here, the phrasal verb 'to look down on someone' doesn't mean that you are looking down from a higher place at someone who is below you; it means that you think that you are better than someone.</p>",
    "question_index": 4
  },
  {
    "question": "<p>In the question given below, a phrasal verb is given, followed by four options. Select the option that gives the correct meaning of the phrasal verb.</p><p>Aim at</p>",
    "options": [
      "Make a formal request for something.",
      "Have the same opinion as somebody else.",
      "To point a weapon at someone or something.",
      "Explain, give a reason."
    ],
    "correct_option_id": 2,
    "solution": "<p>The phrasal verb 'aim at' means 'to point a weapon at someone or something'. </p><p>Usage: The hunter took aim at the hare.</p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<p>In the question given below, a phrasal verb is given, followed by four options. Select the option that gives the correct meaning of the phrasal verb.</p><p>Beef up</p>",
    "options": [
      "Base your hopes on someone/something.",
      "To walk or drive a vehicle backwards.",
      "To feel confident about something or someone.",
      "To strengthen oneself."
    ],
    "correct_option_id": 3,
    "solution": "<p>The phrasal verb 'beef up' means 'give more substance or strength to something'. </p><p>Usage: The company plans to beef up our fringe benefit.</p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 6
  },
  {
    "question": "<p>In the question given below, a phrasal verb is given, followed by four options. Select the option that gives the correct meaning of the phrasal verb.</p><p>Bump into</p>",
    "options": [
      "Return a phone call.",
      "Make unhappy.",
      "End a relationship.",
      "Meet by accident or unexpectedly."
    ],
    "correct_option_id": 3,
    "solution": "<p>The phrasal verb 'bump into' means 'meet by accident or unexpectedly'. </p><p>Usage: I happened to bump into Mervyn Johns in the hallway.</p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 7
  },
  {
    "question": "<p>In the question given below, a phrasal verb is given, followed by four options. Select the option that gives the correct meaning of the phrasal verb.</p><p>Chicken Out</p>",
    "options": [
      "Escape from a place by force.",
      "Improve, refresh one's knowledge of something.",
      "Become exhausted from overworking.",
      "To refrain from doing something because of fear."
    ],
    "correct_option_id": 3,
    "solution": "<p>The phrasal verb 'chicken out' means 'to refrain from doing something because of fear'. </p><p>Usage: Never chicken out when you make up your mind.</p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 8
  },
  {
    "question": "<p>In the question given below, a phrasal verb is given, followed by four options. Select the option that gives the correct meaning of the phrasal verb.</p><p>Nod off</p>",
    "options": [
      "Collect somebody.",
      "Postpone, arrange a later date.",
      "Admit or confess something.",
      "Fall sleep."
    ],
    "correct_option_id": 3,
    "solution": "<p>The phrasal verb 'nod off' means 'fall asleep'. </p><p>Usage: My grandfather often nods off in front of the television.</p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 9
  },
  {
    "question": "<p>What is a phrasal verb?</p>",
    "options": [
      "A group of words that has a deducible meaning",
      "A small group of words standing together as a conceptual unit",
      "An idiomatic phrase consisting of a verb and another element",
      "A sentence with a blank to fill with a phrase"
    ],
    "correct_option_id": 2,
    "solution": "<p>An idiomatic phrase consisting of a <b>verb</b> and another element, typically either an <b>adverb</b>, as in <i>break down</i>, or a <b>preposition</b>, for example <i>see to</i>, or a <b>combination of both</b>, such as <i>look down on</i><b>.</b></p><p>Hence, option (c) is correct. </p>",
    "question_index": 10
  },
  {
    "question": "<p>Fill in the blank with the most appropriate phrasal verb.</p><p>The teacher asked the students to _____ the new vocabulary words. </p>",
    "options": [
      "Write down",
      "Put on",
      "Turn up",
      "Give up"
    ],
    "correct_option_id": 0,
    "solution": "<p>The phrasal verb \"write down\" means to make a note of something in writing. In this context, the teacher instructed the students to make a written note of the new vocabulary words. Hence, (a) is the correct answer. </p><p>'Put on' means to dress oneself in clothing or accessories.</p><p>'Turn up' means to appear or arrive unexpectedly or without prior notice.</p><p>'Give up' means to stop doing something or cease making an effort.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Fill in the blank with the most appropriate phrasal verb.</p><p>I can't ______ with all the noise. </p>",
    "options": [
      "Look up",
      "Run out of",
      "Put up",
      "Go through"
    ],
    "correct_option_id": 2,
    "solution": "<p>The phrasal verb \"put up with\" means to tolerate or endure something, often something unpleasant. In this context, the speaker is expressing his or her inability to tolerate the noise. Hence, (c) is the correct answer. </p><p>'Look up' means to search for information or a word in a reference source.</p><p>'Run out of' means to use up or exhaust the supply of something, resulting in none left. </p><p>'Go through' means to experience, endure, or undergo something.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Fill in the blank with the most appropriate phrasal verb.</p><p>He ______ his old car for a newer model. </p>",
    "options": [
      "Turned down",
      "Worked out",
      "Broke up",
      "Traded in"
    ],
    "correct_option_id": 3,
    "solution": "<p>The phrasal verb \"trade in\" means to exchange something (usually a used item) for something else, often of higher value. In this context, the person exchanged his old car for a newer model. Hence, (d) is the correct answer. </p><p>'Turn down' means to reject or refuse an offer, request, or invitation.</p><p>'Work out' means to resolve or solve a problem or conflict.</p><p>'Break up' means to end a relationship or dissolve a partnership.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Fill in the blank with the most appropriate phrasal verb.</p><p>I need to _____ my presentation before tomorrow. </p>",
    "options": [
      "Put off",
      "Work on",
      "Look forward to",
      "Get along"
    ],
    "correct_option_id": 1,
    "solution": "<p>The phrasal verb \"work on\" means to spend time and effort improving or developing something. In this context, the speaker expresses his or her need to spend time improving their presentation before tomorrow. Hence, (b) is the correct answer. </p><p>'Put off' means to postpone or delay something.</p><p>'Look forward to' means to anticipate or feel excited about something that is going to happen.</p><p>'Get along' means to have a friendly or harmonious relationship with someone. </p>",
    "question_index": 14
  },
  {
    "question": "<p>Fill in the blank with the most appropriate phrasal verb.</p><p>I ______ my friend at the airport yesterday.</p>",
    "options": [
      "Carried out",
      "Went over",
      "Set up",
      "Picked up"
    ],
    "correct_option_id": 3,
    "solution": "<p>The phrasal verb \"pick up\" means to collect or fetch someone or something from a particular place. In this context, the speaker collected his or her friend from the airport. Hence, (d) is the correct answer. </p><p>'Carry out' means to perform or complete a task, action, or plan.</p><p>'Go over' means to review, examine, or discuss something in detail.</p><p>'Set up' means to establish, organize, or arrange something.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the correct meaning of the underlined phrasal verb given in the sentence.</p><p>I decided to <u>drop in</u> on my friend on the way home from work.</p>",
    "options": [
      "To make something necessary.",
      "To be wrong.",
      "To visit, usually on the way somewhere.",
      "To leave something."
    ],
    "correct_option_id": 2,
    "solution": "<p>The phrasal verb- <i>drop in</i> means to visit someone.</p><p>Hence, option (c) is correct. </p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the correct meaning of the underlined phrasal verb given in the sentence.</p><p>I know I can <u>count on</u> my best friend to always be there for me.</p>",
    "options": [
      "To rely or depend on (for help).",
      "To make something necessary.",
      "To count.",
      "To go places."
    ],
    "correct_option_id": 0,
    "solution": "<p>The phrasal verb- <i>count on </i>means to rely or depend on. </p><p>Hence, option (a) is correct. </p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the correct meaning of the underlined phrasal verb given in the sentence.</p><p>Time seems to <u>go by</u> so quickly when I am with my friends.</p>",
    "options": [
      "To proceed a task.",
      "To be guided by.",
      "To put thing closely.",
      "To move or turn back."
    ],
    "correct_option_id": 1,
    "solution": "<p>The phrasal verb- <i>go by</i> means to move past, in space or time.</p><p>Hence, option (b) is correct. </p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the correct meaning of the underlined phrasal verb given in the sentence.</p><p>After hours of discussion, the team realized that the problem <u>boiled down to</u> a lack of communication between departments.</p>",
    "options": [
      "To be angry.",
      "To have jealousy.",
      "To refresh one's knowledge of something.",
      "To be the main reason for something."
    ],
    "correct_option_id": 3,
    "solution": "<p>The phrasal verb- <i>boil down to</i> means to be the main or most important result of something. </p><p>Hence, option (d) is correct.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
