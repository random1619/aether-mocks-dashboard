<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the correctly spelt word to fill in the blank. </p><p>The historian carefully examined the _______. </p>",
    "options": [
      "Manuscript",
      "Mannuscript",
      "Maniscript",
      "Menuscript"
    ],
    "correct_option_id": 0,
    "solution": "<p>Manuscript  -  This is the correct spelling. A manuscript refers to a handwritten or typed document, especially an author's original text or a copy of it. Hence, (a) is the correct answer. </p><p>The final sentence: The historian carefully examined the manuscript. </p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the correctly spelt word.</p>",
    "options": [
      "Clastrophobia",
      "Clustrouphobia",
      "Claustrophobia",
      "Clastrouphobia"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct spelling is 'claustrophobia' (an extreme fear of being shut in a small place; the unpleasant feeling that a person gets in a situation that limits them). Hence, option (c) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the correctly spelt word.</p>",
    "options": [
      "Visious",
      "Vicious",
      "Viscious",
      "Vicsious"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Vicious' is the correctly spelt word among the four options. Hence, the answer is option b).</p><p>Meaning: Deliberately cruel or violent.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the sentence that has no spelling error.</p><p></p>",
    "options": [
      "Permissan to enter this premise is restricted.",
      "The boys are here to ask for your permision.",
      "You are enjoying the exclusive permisiion of the CEO.",
      "One must have to get prior permission to take leave."
    ],
    "correct_option_id": 3,
    "solution": "<p>Among the given sentences, sentence (d) alone has no spelling error.</p><p>The word 'permission' is wrongly spelt in options a), b), and c), and is correctly spelt in option d). </p><p>'Permission' means 'the action of officially allowing someone to do a particular thing; consent or authorization'. </p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 3
  },
  {
    "question": "<p>In the following questions, four words are given, out of which only one word is correctly spelt. Find the correctly spelt word.</p><p></p>",
    "options": [
      "procceeding",
      "extravagant",
      "humilaite",
      "intrigeud"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Extravagant' is the correctly spelt word.</p><p>The correct spellings of the other words are: proceeding, humiliate and intrigued.</p><p>Proceeding: a series of activities</p><p>Extravagant: spending too much money</p><p>Humiliate: To insult someone</p><p>Intrigued: To interest someone a lot</p><p></p><p>Hence, option(b) is the right answer.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the INCORRECTLY spelt word.</p>",
    "options": [
      "Friwsk",
      "Reply",
      "Rusk",
      "Foliage"
    ],
    "correct_option_id": 0,
    "solution": "<p>Option (a) is the correct answer.</p><p>The correct spelling is 'Frisk'.</p><p>Frisk: (of a police officer or other official) passes the hands over (someone) in a search for hidden weapons, drugs, or other items.</p><p>Reply: say something in response to something someone has said.</p><p>Rusk: a light, dry biscuit or piece of twice-baked bread, especially one prepared for use as baby food.</p><p>Foliage: plant leaves collectively.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the correctly spelt word to fill in the blank.</p><p>The ______ body is kept at the morgue.</p>",
    "options": [
      "disected",
      "disacted",
      "dissected",
      "disseccted"
    ],
    "correct_option_id": 2,
    "solution": "<p>Among the given options, the word with the correct spelling that can fill the given blank is option (c), 'dissected'.</p><p>The correct sentence is: The dissected body is kept at the morgue.</p><p>Dissected- methodically cut up (a body or plant) in order to study its internal parts.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 6
  },
  {
    "question": "<p>Identify the correctly spelt word. </p><p></p>",
    "options": [
      "She took a puff from her ciggarette, exhaling slowly.",
      "She took a puff from her cigarette, exhaling slowly.",
      "She took a puff from her cigerette, exhaling slowly.",
      "She took a puff from her cigarete, exhaling slowly."
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct spelling is 'cigarette'. A cigarette is a narrow cylinder of finely cut tobacco leaves that are rolled into thin paper for smoking. It is a commonly used form of tobacco consumption. Hence, (b) is the correct answer. </p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the incorrectly spelt word.</p><p></p>",
    "options": [
      "Eccentric",
      "Ominous",
      "Wierd",
      "Accommodate"
    ],
    "correct_option_id": 2,
    "solution": "<p>Among the given options, the word 'wierd' is incorrectly spelt. </p><p>Weird: Suggesting the supernatural; strange or unusual; bizarre.</p><p>The rest of the words are correctly spelt.</p><p>Hence, the correct answer is option (c).</p><p>Eccentric: Unconventional, peculiar, or deviating from the established norm; a person with unconventional and slightly strange behaviour.</p><p>Ominous: Giving the impression that something bad or unpleasant is going to happen; threatening.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the correctly spelt word to fill in the blank. </p><p>Her wedding ____ consisted of roses and ivy. </p>",
    "options": [
      "Bouquet",
      "Boquet",
      "Booke",
      "Bouquett"
    ],
    "correct_option_id": 0,
    "solution": "<p>Option (a) has the correctly spelt word. Hence, (a) is the correct answer.</p><p>'Bouquet' means a bunch of cut flowers.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Identify the correctly spelt word. </p><p></p>",
    "options": [
      "Facing a dillema, she struggled to make the right decision.",
      "Facing a dilema, she struggled to make the right decision.",
      "Facing a dillemma, she struggled to make the right decision.",
      "Facing a dilemma, she struggled to make the right decision."
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct spelling is 'dilemma'. A dilemma is a situation in which a person is faced with a difficult choice between two or more options, especially when all the options have unfavourable or challenging consequences. Hence, (d) is the correct answer. </p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the option with the correct spellings to replace the underlined words in the given sentence.</p><p>She <u>chanelised</u> her energy into creative <u>persuits</u>.</p>",
    "options": [
      "Channellised; persiuts",
      "Chanellised; persoots",
      "Channlesed; porsuits",
      "Channelised; pursuits"
    ],
    "correct_option_id": 3,
    "solution": "<p>Channelised (Correct Spelling): The correct spelling of the word that means to direct or guide something, in this case, energy, into a particular course or activity is \"channelised.\" In this context, it suggests directing energy in a focused way.</p><p>Pursuits (Correct Spelling): The correct spelling of the word that refers to activities or tasks that one engages in, especially as a hobby or profession, is \"pursuits.\" In the sentence, it implies that the person is directing her energy into creative activities.</p><p>Hence, (d) is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the correctly spelt word to fill in the blank. </p><p>The travellers had to undergo a mandatory _______. </p>",
    "options": [
      "Quarantine",
      "Quaranteen",
      "Quarantean",
      "Qaurantine"
    ],
    "correct_option_id": 0,
    "solution": "<p>Quarantine - This is the correct spelling. 'Quarantine' refers to the isolation or restriction of movement imposed on individuals, animals, or goods to prevent the spread of a contagious disease. Hence, (a) is the correct answer. </p><p>The final sentence: The travellers had to undergo a mandatory quarantine. </p>",
    "question_index": 12
  },
  {
    "question": "<p>Find the correctly spelt word.</p>",
    "options": [
      "marshmellow",
      "marshmello",
      "marshmallow",
      "marshmalow"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct spelling of the word is 'marshmallow (a candy)'.</p><p>Hence, option c) is the answer.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the sentence that has no spelling error.</p><p></p>",
    "options": [
      "In our country, there are still superstisious beliefs in existence.",
      "Supersttittious beliefs must be totally eradicated.",
      "He is very superstitious in everything he does.",
      "Raja Ram Mohan Roy fought against many superstishious beliefs."
    ],
    "correct_option_id": 2,
    "solution": "<p>Among the given sentences, sentence (c) alone has no spelling error.</p><p>The word 'superstitious' is wrongly spelt in options a), b), and d), and is correctly spelt in option c).</p><p>'Superstitious' means 'based on or believing in superstitions (= beliefs based on old ideas about luck and magic rather than science or reason)'.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the INCORRECTLY spelt word.</p>",
    "options": [
      "Demonstrate",
      "Suceptible",
      "Significant",
      "Disastrous"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct spelling is \"susceptible\" which means \"likely or liable to be influenced or harmed by a particular thing.\" Option B is the correct answer.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the correctly spelt word to fill in the blank. </p><p>It took hours for the cryptographer to _____ the ancient code.</p>",
    "options": [
      "Decifer",
      "Deciffer",
      "Decepher",
      "Decipher"
    ],
    "correct_option_id": 3,
    "solution": "<p>Decipher - This is the correct spelling. \"Decipher\" means to convert a coded or encrypted message into ordinary language, and it is the appropriate word to use in this context. Hence, (d) is the correct answer. </p><p>The final sentence: It took hours for the cryptographer to decipher the ancient code. </p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the incorrectly spelt word.</p><p></p>",
    "options": [
      "Grievensce",
      "Heightened",
      "Victorious",
      "Psychology"
    ],
    "correct_option_id": 0,
    "solution": "<p>Among the given options, the word 'grievensce' is incorrectly spelt. </p><p>Grievance: A cause for complaint, especially due to unfair treatment.</p><p>The rest of the words are correctly spelt.</p><p>Hence, the correct answer is option (a).</p><p>Heightened: Made or become more intense, elevated, or increased.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Find the correctly spelt word.</p>",
    "options": [
      "Inditee",
      "Temprament",
      "Negligent",
      "Aggregater"
    ],
    "correct_option_id": 2,
    "solution": "<p>Option a) is correctly spelt as 'indict' (which means formally accused of or charged with a crime). Option b) is correctly spelt as 'temperament' (which means a person's or animal's nature, especially as it permanently affects their behaviour). Option d) is correctly spelt as 'aggregator' (which means a website or program that collects related items of content and displays them or links to them). Option c) is correctly spelt and means careless. Hence, c) is the correct answer.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Identify the correctly spelt sentence.</p><p></p>",
    "options": [
      "The detailed prospectus of the fashion brand provided comprehensive insights into their upcoming collection.",
      "The detailed prouspectus of the fashion brand provided comprehensive insights into their upcoming collection.",
      "The detailed prospektus of the fashion brand provided comprehensive insights into their upcoming collection.",
      "The detailed prospectous of the fashion brand provided comprehensive insights into their upcoming collection."
    ],
    "correct_option_id": 0,
    "solution": "<p>The correctly spelt sentence is (a) (The detailed prospectus of the fashion brand provided comprehensive insights into their upcoming collection). In option (b), the word 'prouspectus' is misspelled; it should be 'prospectus'. In option (c), the word 'prospektus' is misspelled; it should be 'prospectus'. In option (d), the word 'prospectous' is misspelled; it should be 'prospectus'. Hence, (a) is the correct answer. </p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
