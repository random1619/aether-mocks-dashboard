<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the INCORRECTLY spelt word.</p><p></p>",
    "options": [
      "Apparent",
      "Calendar",
      "Exaggerate",
      "Concious"
    ],
    "correct_option_id": 3,
    "solution": "<p>The incorrectly spelt word is 'concious'. The correct spelling of the word is \"conscious.\" 'Conscious' means aware of and responding to one's surroundings; awake. Other words are spelt correctly. 'Apparent' means clearly visible or understood; obvious. 'Exaggerate' means to represent something as being larger, greater, better, or worse than it really is. Hence, (d) is the correct answer. </p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option with the correct spellings to replace the underlined words in the given sentence.</p><p>The new car starts to <u>deprreciate</u> in value as soon as it is <u>drieven</u> off the lot.</p>",
    "options": [
      "depreciate; driven",
      "dapreciate; draven",
      "depreceate; drivan",
      "deapriciate; drivaen"
    ],
    "correct_option_id": 0,
    "solution": "<p>Among the given options, the correct spellings of the underlined words are 'depreciate' and 'driven'. </p><p>Hence, (a) is the correct answer.</p><p>Depreciate - diminish in value over a period of time.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Choose the incorrectly spelt word.</p><p></p>",
    "options": [
      "Preposterous",
      "Temperament",
      "Vigorus",
      "Tempestuous"
    ],
    "correct_option_id": 2,
    "solution": "<p>Preposterous: silly; ridiculous.</p><p>Temperament: a person's character, especially as it affects the way he/she behaves and feels.</p><p>Vigorous: very forceful or energetic.</p><p>Tempestuous: involving a lot of difficulties.</p><p>Among the given words, 'vigorus' is incorrectly spelt.</p><p>Hence, option (c) is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the correctly spelt word to fill in the blank. </p><p>We're entertaining some ________ of Carol's tonight.</p>",
    "options": [
      "Colleagues",
      "Coleagues",
      "Calleagues",
      "Colligues"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct word is 'colleagues' (which means 'people who work together').</p><p>The complete sentence is: We're entertaining some <b>colleagues</b> of Carol's tonight.</p><p>Hence, option (a) is the answer. </p>",
    "question_index": 3
  },
  {
    "question": "<p>In the following sentence, four words are underlined out of which one word is misspelt. Identify the incorrectly spelt word.</p><p>Writing is a powerful tool for communication and <u>storytelling(</u>A<u>)</u>, allowing people to share their thoughts, <u>presserve</u>(B) memories, and explore their <u>imaginations</u>(C) through the <u>written</u>(D) word.</p>",
    "options": [
      "B",
      "A",
      "C",
      "D"
    ],
    "correct_option_id": 0,
    "solution": "<p>The misspelled word in the sentence is \"presserve.\" </p><p>The correct spelling is \"preserve\" which means to keep something in its original condition, preventing it from being damaged, altered, or destroyed.</p><p>Hence, option (a) is correct. </p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the INCORRECTLY spelt word. </p><p></p>",
    "options": [
      "Inference",
      "Symbol",
      "Spliting",
      "Opinion"
    ],
    "correct_option_id": 2,
    "solution": "<p>Option (c) has been spelt incorrectly. The correct spelling is 'splitting' which is the action of dividing or being divided into parts. Hence, (c) is the correct answer.</p><p>'Inference' means a truth or proposition drawn from another which is admitted or supposed to be true.</p><p>'Symbol' means a character or figure representing an idea.</p><p>'Opinion' means a belief or judgement.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the correct spelling of the word that means 'fluent or persuasive in speaking or writing'. </p>",
    "options": [
      "Elequent",
      "Eloquant",
      "Elloquent",
      "Eloquent"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct word is \"eloquent\" (means - fluent or persuasive in speaking or writing). </p><p>Usage: She made an eloquent appeal for action.</p><p>Hence, option (d) is the answer. </p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option that contains all the MISSPELT words in the following sentences.</p><p>I. The children played joyfuly in the park on Sunday.</p><p>II. A sudden storm interupted our picnic at the beach.</p><p>III. The team worked hard to complete the projact on time. </p><p>IV. She wrote a heartfalt letter to her long-lost friend.</p>",
    "options": [
      "Children, picnic, projact, heartfalt",
      "Joyfuly, interupted, projact, letter",
      "Joyfuly, interupted, projact, heartfalt",
      "Children, sudden, complete, heartfalt"
    ],
    "correct_option_id": 2,
    "solution": "<p>All the incorrectly spelt words are in option c). </p><p>The correct words are:</p><p>Joyfully: with great pleasure and happiness.</p><p>Interrupted: to break the continuity of (an action, event, etc.) or hinder (a person) by intrusion.</p><p>Project: an individual or collaborative enterprise that is carefully planned to achieve a particular aim.</p><p>Heartfelt: (of a feeling or its expression) deeply and strongly felt; sincere.</p><p>Hence, option c) is the answer. </p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the sentence that has a spelling error.</p><p></p><p>A. Once a famine struck the village, and despair settled like a heavy fog. </p><p>B. All the crops failed, withering under the relentless sun. </p><p>C. Rivers and lakes started to dry up, leaving the land parched and barren. </p><p>D. Faced with dwindling resources, the people of the village began a sombar exodus, seeking refuge in distant lands to escape the cruel grip of hunger.</p>",
    "options": [
      "Faced with dwindling resources, the people of the village began a sombar exodus, seeking refuge in distant lands to escape the cruel grip of hunger.",
      "All the crops failed, withering under the relentless sun.",
      "Rivers and lakes started to dry up, leaving the land parched and barren.",
      "Once a famine struck the village, and despair settled like a heavy fog."
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence D has a spelling error. The word 'sombar' is spelt incorrectly. The correct spelling of the word is \"somber\" or \"sombre\". \"Somber\" or \"sombre\" means dark or gloomy in mood or tone. There is no spelling error in other sentences. Hence, (a) is the correct answer.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the correctly spelt word to fill in the blank.</p><p>The ________ of his actions were immediate.</p>",
    "options": [
      "Repercushions",
      "Repercutions",
      "Repercushons",
      "Repercussions"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct spelling is \"Repercussions\" which refers to an unintended consequence occurring sometime after an event or action, especially an unwelcome one. So, the sentence should be: \"The repercussions of his actions were immediate.\"</p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the correct spelling of the word that means 'make or become less'. </p>",
    "options": [
      "Diminish",
      "Deminish",
      "Dimenish",
      "Diminesh"
    ],
    "correct_option_id": 0,
    "solution": "<p>\"Diminish\" means \"make or become less\".</p><p>Usage: A single-payer system would diminish the bureaucratic cost of health care.</p><p>Hence, option (a) is the answer. </p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the option with the correct spellings to replace the underlined words in the given sentence.</p><p>The <u>proefessor</u> provided a much-needed <u>clariffication</u> during the lecture.</p>",
    "options": [
      "Proffessor; clerification",
      "Professor; clarification",
      "Proefesor; clearification",
      "Profesor; clarefication"
    ],
    "correct_option_id": 1,
    "solution": "<p>Professor (Correct Spelling): The correct spelling of the word that refers to a person who teaches at a college or university, especially one ranking above an associate professor, is \"professor.\"</p><p>Clarification (Correct Spelling): The correct spelling of the word that means the action of making something clearer or easier to understand is \"clarification.\"</p><p>In the context of the sentence, it suggests that the person provided additional information or explanations to make the subject matter clearer.</p><p>Hence, (b) is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains an INCORRECTLY spelt word. </p><p>We can only make a milestone in history / with some great works in future / and to make milestones, / we need to be ambiteous in life.</p>",
    "options": [
      "we need to be ambiteous in life.",
      "We can only make a milestone in history",
      "with some great works in future",
      "and to make milestones,"
    ],
    "correct_option_id": 0,
    "solution": "<p>The incorrectly spelt word is 'ambiteous' which is mentioned in option (a).</p><p>'Ambitious' is the correctly spelt word which means having a strong desire to be successful, to have power, etc.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the sentence which has no spelling errors.</p><p></p><p></p>",
    "options": [
      "There was a soft note in the haughtty woman's voice.",
      "We don't want to prejudice law enforcment against doing the right thing.",
      "There, good citizens, is the result of a wasted day in the mountains.",
      "She could have established her own inocence and virtue easily enough."
    ],
    "correct_option_id": 2,
    "solution": "<p>Option (a)- The incorrectly spelt word is 'haughtty' and 'haughty' is the correct word. 'Haughty' means being proud and thinking that you are better than other people.</p><p>Option (b)- The incorrectly spelt word is 'enforcment' and 'enforcement' is the correct word.</p><p>Option (d)- The incorrectly spelt word is 'inocence' and 'innocence' is the correct word.</p><p>So, only option (c) has no spelling errors.</p><p>Hence, option (c) is correct.</p>",
    "question_index": 13
  },
  {
    "question": "<p>From among the words given in bold, select the INCORRECTLY spelt word in the following sentence.</p><p>Because Abby came from a <b>wealthe</b> family, it was not <b>surprising</b> that she looked at <b>homeless</b> people with <b>contempt</b>.</p>",
    "options": [
      "Wealthe",
      "Contempt",
      "Surprising",
      "Homeless"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Weathe' is an incorrectly spelt word. 'Wealthy' means 'rich'. All the other words are correctly spelt.</p><p>Hence, option (a) is correct. </p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the INCORRECTLY spelt word.</p><p></p>",
    "options": [
      "DEPRESS",
      "TICKET",
      "STORME",
      "MUSEUM"
    ],
    "correct_option_id": 2,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>WORD</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>MEANING</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Storm</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">very bad weather, with a lot of rain, strong winds, etc.</td></tr></table><p>'Storme' is the incorrect spelling. 'Storm' is the right spelling.</p><p>Hence, option (c) is correct. </p>",
    "question_index": 15
  },
  {
    "question": "<p><b> </b>Select the correctly spelt option that can substitute the underlined word in the given sentence. </p><p>The massive <u>dinnosaur</u> roamed the prehistoric landscape. </p>",
    "options": [
      "Dinosaurr",
      "Dinosaaur",
      "Dinossaur",
      "Dinosaur"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct spelling of the underlined word is 'dinosaur' which is a type of prehistoric reptile that lived millions of years ago and is now extinct. Hence, (d) is the correct answer. </p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the correct spelling of the underlined word.</p><p><u>Turbullance</u> during flight travel is very common.</p>",
    "options": [
      "Turbulance",
      "Turbullence",
      "Turbolence",
      "Turbulence"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct spelling of the underlined word is given in option (d), 'turbulence' and it means 'violent or unsteady movement of air or water, or some other fluid'.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the correct spelling of the incorrectly spelt word.</p><p>These options provide protien, fibre, and healthy fats that can help satisfy your hunger cravings without discomfort.</p>",
    "options": [
      "satisfay",
      "protein",
      "craivings",
      "fiebre"
    ],
    "correct_option_id": 1,
    "solution": "<p>Option (b) is the correct answer. The correct spelling is \"protein\".</p><p>Satisfy: meet the expectations, needs, or desires of (someone).</p><p>Protein: any of a class of nitrogenous organic compounds which have large molecules composed of one or more long chains of amino acids.</p><p>Cravings: a powerful desire for something.</p><p>Fibre: a thread or filament from which a vegetable tissue, mineral substance, or textile is formed.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the correctly spelt word to fill in the blank.</p><p>The ________ of the project was challenging.</p>",
    "options": [
      "Implementaion",
      "Implemntation",
      "Implementasion",
      "Implementation"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct spelling is \"Implementation\" which refers to the process of putting a decision or plan into effect; execution. So, the sentence should be: \"The implementation of the project was challenging.\"</p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
