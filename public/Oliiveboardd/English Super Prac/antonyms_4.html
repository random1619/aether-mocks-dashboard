<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate ANTONYM of the underlined word.</p><p>As newspapers began to reach broader segments of the population, the <u>aversion</u> to reporting on domestic matters lingered.</p>",
    "options": [
      "Rancor",
      "Malice",
      "Revulsion",
      "Propensity"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate antonym for the word 'aversion' is 'propensity'. \"Aversion\" means a strong dislike or avoidance of something. In the given sentence, \"aversion\" suggests a strong dislike or reluctance towards reporting on domestic matters. 'Propensity' is the opposite of \"aversion.\" It means a habitual attraction to some activity or thing.</p><p>'Rancor' means a deep-seated ill will.</p><p>'Malice' refers to the intention or desire to do evil; ill will.</p><p>'Revulsion' means a dislike so strong as to cause stomach upset or queasiness.</p><p>Hence, (d) is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the word given in brackets to fill in the blank.</p><p>But this servant then met a fellow servant who owed him a/an _____ (significant) sum.</p>",
    "options": [
      "Reminiscent",
      "Trifling",
      "Evocative",
      "Nimble"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most appropriate antonym for the word 'significant' is 'trifling'. \"Significant\" means important or considerable in amount or value. \"Trifling\" means unimportant or insignificant. In the given sentence, \"trifling\" conveys that the sum owed was small or insignificant.</p><p>'Reminiscent' means provoking a memory or mental association.</p><p>'Evocative' means provoking a memory or mental association.</p><p>'Nimble' means quick and agile in movement or action. Hence, (b) is the correct answer.</p><p><b>The complete sentence is: </b>But this servant then met a fellow servant who owed him a trifling sum.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the underlined word.</p><p>Amanda still holds a <u>grudge</u> against me for refusing to lend her that money.</p>",
    "options": [
      "Amity",
      "Enmity",
      "Indifference",
      "Belligerency"
    ],
    "correct_option_id": 0,
    "solution": "<p>Grudge - a persistent feeling of ill will or resentment resulting from a past insult or injury.</p><p>Amity - friendship; peaceful harmony</p><p>So, both words are opposite in meaning. Hence, option (a) is the answer.</p><p>Enmity - a deep-seated ill will.</p><p>Indifference - lack of interest, concern, or sympathy.</p><p>Belligerency - an inclination to fight or quarrel.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the word 'tenacious' in the given sentence and choose the correct option.</p><p>Albert is intemperate, irresolute, and unreflective - and he makes bad decisions and develops bad habits. </p>",
    "options": [
      "Develops",
      "Decisions",
      "Intemperate",
      "Irresolute"
    ],
    "correct_option_id": 3,
    "solution": "<p>Tenacious - not readily relinquishing a position, principle, or course of action; determined.</p><p>Irresolute - showing or feeling hesitancy; uncertain; not able or willing to take decisions or actions.</p><p>Both words are opposite in meaning. Hence, option (d) is the answer.</p><p>Develops - grow or cause to grow and become more mature, advanced, or elaborate.</p><p>Decisions - a conclusion or resolution reached after consideration.</p><p>Intemperate - having or showing a lack of self-control; immoderate.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate antonym of the italicized word in the given sentence.</p><p>The island of Sangihe in Indonesia has an <i>endemic</i> species of tarsiers.</p>",
    "options": [
      "Native",
      "Exotic",
      "Disastrous",
      "Defiant"
    ],
    "correct_option_id": 1,
    "solution": "<p>Endemic: (of a plant or animal) native and restricted to a certain place.</p><p>Exotic: unusual and exciting because of coming (or seeming to come) from far away, especially a tropical country.</p><p>Both words are opposite in meaning. Hence, option (b) is the answer. </p><p>Native: (of a plant or animal) of indigenous origin or growth.</p><p>Disastrous: causing great damage.</p><p>Defiant: showing a disposition to challenge, resist, or fight. </p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate antonym of the given word from the sentence.</p><p>Insignificant</p><p>The fear is that it will cross a pivotal threshold, and then begin a decline that is unstoppable.</p>",
    "options": [
      "Pivotal",
      "Cross",
      "Decline",
      "Unstoppable"
    ],
    "correct_option_id": 0,
    "solution": "<p>Insignificant: too small or unimportant to be worth consideration.</p><p>Pivotal: very important.</p><p>So, both words are opposite in meaning. </p><p>Hence, option (a) is the answer. </p><p>Cross: go or extend across or to the other side of (an area, stretch of water, etc.).</p><p>Decline: a gradual and continuous loss of strength, numbers, quality, or value.</p><p>Unstoppable: unable to be stopped or prevented.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate antonym of the given word from the sentence.</p><p>Timidity</p><p>She had the audacity to boldly challenge the status quo with innovative, fresh ideas.</p>",
    "options": [
      "Audacity",
      "Challenge",
      "Status",
      "Innovative"
    ],
    "correct_option_id": 0,
    "solution": "<p>Timidity: lack of courage or confidence.</p><p>Audacity: courage or confidence of a kind that other people find shocking or rude.</p><p>So, both words are opposite in meaning.</p><p>Hence, option (a) is the answer.</p><p>Challenge: dispute the truth or validity of.</p><p>Status: the situation at a particular time during a process.</p><p>Innovative: having the skill and imagination to create new things.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the appropriate antonym for the underlined word.</p><p>I am a complete <u>philistine</u> when it comes to paintings.</p>",
    "options": [
      "Unrefined",
      "Commercial",
      "Tasteless",
      "Cultured"
    ],
    "correct_option_id": 3,
    "solution": "<p>Philistine - hostile or indifferent to culture and the arts. So, 'cultured' is its antonym. Hence, option (d) is the answer. </p><p>Unrefined - not processed to remove impurities or unwanted elements.</p><p>Commercial - making or intended to make a profit.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the given word.</p><p>Organize</p>",
    "options": [
      "Jumble",
      "Pay",
      "Arrange",
      "Calm"
    ],
    "correct_option_id": 0,
    "solution": "<p>Jumble- mix up in a confused or untidy way</p><p>Pay- give (someone) money that is due for work done, goods received, or a debt incurred</p><p>Arrange- put (things) in a neat, attractive, or required order</p><p>Calm- make (someone) tranquil and quiet; soothe</p><p>The meaning of the word 'organize' is 'arrange systematically'. Among the given options, the word that is opposite in meaning to the given word is option (a) 'jumble'.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the underlined words in the given sentence. </p><p>It might take him ages but he'll do it <u>in the end</u>.</p>",
    "options": [
      "Eventually",
      "Finally",
      "Rarely",
      "Initially"
    ],
    "correct_option_id": 3,
    "solution": "<p>Initially - at first.</p><p>So, 'initially' is the most appropriate antonym of the underlined words in the given sentence. Hence, option (d) is the answer.</p><p>Eventually - in the end, especially after a long delay, dispute, or series of problems. </p><p>Rarely - not often; seldom.</p><p>Finally - after a long time, typically when there has been difficulty or delay.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate antonym of the word in brackets to fill in the blanks.</p><p>She accepted both the good and the bad with ___ (AGITATION).</p>",
    "options": [
      "Remorse",
      "Uncertainty",
      "Equanimity",
      "Anxiety"
    ],
    "correct_option_id": 2,
    "solution": "<p>Agitation: a feeling of aggravation, annoyance, restlessness, or nervousness</p><p>Equanimity: mental or emotional stability or composure, especially under tension or strain</p><p>So, the two words can be used as antonyms of each other. Hence, (c) is the correct answer.</p><p>Remorse: deep and painful regret for wrongdoing</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the given word. </p><p>ARBITRARY</p>",
    "options": [
      "Random",
      "Rational",
      "Wild",
      "Subjective"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Arbitrary' means based on chance rather than being planned or based on reason.</p><p>'Random' means made, done, or happening without method or conscious decision.</p><p>Clearly, 'random' and 'subjective' are synonymous to each other and the words 'wild' and 'subjective' are not related to the given word. </p><p>Therefore, option (b), 'rational' which means logical, is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the ANTONYM of the word 'artificial' to fill in the blank. </p><p>Her smile radiated _________ warmth, lighting up the room instantly.</p>",
    "options": [
      "Ingenuine",
      "Genuine",
      "Foreign",
      "Fictitious"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Artificial' means (of a person or their behaviour) insincere or affected. 'Genuine' means truly what something is said to be; authentic. So, the two words can be used as antonyms of each other. Hence, (b) is the correct answer. </p><p>Ingenuine  -  false or unauthentic. </p><p>Foreign- strange and unfamiliar. </p><p>Fictitious- not real or true, being imaginary or having been fabricated. </p>",
    "question_index": 12
  },
  {
    "question": "<p> Select the most appropriate antonym of the word in brackets to fill in the blanks.</p><p>All members of the association ____ (OVERLOOK) to a strict code of practice.</p>",
    "options": [
      "Disregard",
      "Adhere",
      "Forget",
      "Neglect"
    ],
    "correct_option_id": 1,
    "solution": "<p>Overlook: to disregard or ignore indulgently, as faults or misconduct</p><p>Adhere: to be devoted in support or allegiance; be attached as a follower</p><p>So, the two words can be used as antonyms of each other. Hence, (b) is the correct answer.</p><p>Disregard: to pay no attention to; leave out of consideration</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the word 'contribute' in the given sentence.</p><p>Adding too many new constraints can in fact hinder searches because of the increase in constraint checks that must be performed.</p>",
    "options": [
      "Adding",
      "Searches",
      "Hinder",
      "Increase"
    ],
    "correct_option_id": 2,
    "solution": "<p>Contribute - give (something, especially money) in order to help achieve or provide something.</p><p>Hinder - make it difficult for (someone) to do something or for (something) to happen.</p><p>So, both words are opposite in meaning. </p><p>Hence, option (c) is the answer. </p><p>Adding - join (something) to something else so as to increase the size, number, or amount.</p><p>Searches - try to find something by looking or otherwise seeking carefully and thoroughly.</p><p>Increase - become or make greater in size, amount, or degree.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the underlined words in the given sentence. </p><p>The accident was <u>certain to happen</u>, all thanks to the carelessness of the driver.</p>",
    "options": [
      "Incredible",
      "Avoidable",
      "Certain",
      "Inevitable"
    ],
    "correct_option_id": 1,
    "solution": "<p>Avoidable - able to be avoided or prevented.</p><p>So, 'avoidable' is the most appropriate antonym of the underlined words in the given sentence. Hence, option (b) is the answer.</p><p>Incredible - impossible to believe. </p><p>Certain - able to be firmly relied on to happen or be the case.</p><p>Inevitable - certain to happen; unavoidable.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the underlined word to fill in the blank.</p><p><u> </u></p><p>The positive reviews <u>amplified</u> the restaurant's popularity, while the negative ones __________ its reputation.</p>",
    "options": [
      "complemented",
      "propagated",
      "tarnished",
      "propelled"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let's look at the meanings of the given options. </p><p>Complemented: to make something else seem better or more attractive when combined with it.</p><p>Propagated: to produce a new plant using a parent plant.</p><p>Tarnished: make or become less valuable or respected.</p><p>Propelled: drive or push something forwards. </p><p>In this sentence, \"amplified\" means to increase the effect of something. The antonym for \"amplified\" is \"tarnished\", which means to damage or destroy the quality or reputation of something. </p><p>So, the sentence becomes: \"The positive reviews <u>amplified</u> the restaurant's popularity, while the negative ones <u>tarnished</u> its reputation\".</p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the given word.</p><p>Adroit</p>",
    "options": [
      "Clumsy",
      "Dexterous",
      "Nimble",
      "Agile"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Adroit' means clever or skilful. 'Clumsy' means awkward or without skill; 'dexterous' means showing or having skill, especially with hands; 'nimble' means quick and light in movement; 'agile' means able to move quickly and easily. According to the meanings mentioned above, 'clumsy' is antonymous to 'adroit'. Hence, a) is the correct answer.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate ANTONYM of the given word.</p><p>LAMENT</p>",
    "options": [
      "bleed",
      "bemoan",
      "appeal",
      "celebrate"
    ],
    "correct_option_id": 3,
    "solution": "<p>Lament- express regret or disappointment about something; to complain. 'Bemoan' - express discontent or sorrow over (something). Option D ('celebrate') is the correct answer.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Choose the word almost opposite in meaning to the word given below. </p><p>Obdurate </p>",
    "options": [
      "Calamitous",
      "Attractive",
      "Boorish",
      "Yielding"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Obdurate' means stubbornly refusing to change one's opinion or course of action. 'Yielding' means giving way under pressure; not hard or rigid. So, the two words can be used as antonyms of each other. Hence, (d) is the correct answer. </p><p>Calamitous- involving calamity; catastrophic or disastrous. </p><p>Attractive- (of a thing) pleasing or appealing to the senses. </p><p>Boorish- rough and bad-mannered; coarse. </p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
