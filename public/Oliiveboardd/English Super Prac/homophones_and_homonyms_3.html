<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>

    <!-- Central Stylesheet -->

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>

            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>The homophone for the word 'build' is:</p>",
    "options": [
      "Built",
      "Bile",
      "Billed",
      "Belt"
    ],
    "correct_option_id": 2,
    "solution": "<p>Homophones are words that sound the same but have different meanings and spellings.</p><p>\"Build\" and \"billed\" are pronounced the same, but they have different meanings:</p><p>Build - To construct something.</p><p>Billed - Past tense of \"bill,\" meaning to send or receive an invoice. </p><p><b>Hence, option (c) is the answer.</b> </p><p>Built - The past tense and past participle of \"build.\" It means something has been constructed or made.</p><p>Bile - A digestive fluid produced by the liver, or metaphorically, it can mean anger or bitterness.</p><p>Belt - A strip of material used to hold up clothing or as a mechanical device to transmit motion. It can also mean to hit something forcefully (e.g., \"belted the ball\").</p>",
    "question_index": 0
  },
  {
    "question": "<p>The homophone for the word 'great' is:</p>",
    "options": [
      "Grate",
      "Gate",
      "Giant",
      "Bait"
    ],
    "correct_option_id": 0,
    "solution": "<p>Homophones are words that sound the same but have different meanings and spellings.</p><p>\"Great\" and \"grate\" are pronounced the same, but they have different meanings:</p><p>Great - (of an extent, amount, or intensity) considerably above average.</p><p>Grate - To shred food into small pieces (e.g., \"to grate cheese\"); A metal frame or grill, often used in fireplaces.</p><p><b>Hence, option (a) is the answer.</b></p><p>Gate - An entryway or barrier, typically part of a fence or wall.</p><p>Giant - A very large being or something exceptionally large or powerful.</p><p>Bait - Something used to lure or entice, often in fishing or trapping.</p>",
    "question_index": 1
  },
  {
    "question": "<p>The homophone for the word 'coarse' is:</p>",
    "options": [
      "Calls",
      "Course",
      "Courts",
      "Coats"
    ],
    "correct_option_id": 1,
    "solution": "<p>Homophones are words that sound the same but have different meanings and spellings.</p><p>\"Coarse\" and \"course\" are pronounced the same, but they have different meanings:</p><p>Coarse - rough or harsh in texture.</p><p>Course - a path, direction, or progression (e.g., \"a golf course\" or \"the course of events\"); an academic subject of study (e.g., \"a math course\").</p><p><b>Hence, option (b) is the answer. </b></p><p>Calls - To shout or summon, phone conversations or cries.</p><p>Courts - Areas for sports like tennis or basketball; legal venues or systems for justice.</p><p>Coats - Outer garments worn for warmth; layers of material covering a surface.</p>",
    "question_index": 2
  },
  {
    "question": "<p>The homophone for the word 'sea' is:</p>",
    "options": [
      "see",
      "saw",
      "seal",
      "sail"
    ],
    "correct_option_id": 0,
    "solution": "<p>A homophone is a word that sounds the same as another word but has a different meaning and often a different spelling.</p><p>The word \"see\" is a homophone for \"sea\" because they sound identical but have different meanings:</p><p>See: To perceive with the eyes or to understand something.</p><p>Sea: A large body of saltwater.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 3
  },
  {
    "question": "<p>The homophone for the word 'knew' is:</p>",
    "options": [
      "know",
      "now",
      "new",
      "no"
    ],
    "correct_option_id": 2,
    "solution": "<p>A homophone is a word that sounds the same as another word but has a different meaning and often a different spelling.</p><p>The word \"new\" is a homophone for \"knew\" because they sound identical but have different meanings:</p><p>Knew: Past tense of \"know,\" meaning to have knowledge.</p><p>New: Something that is recent, modern, or not old.</p><p>Hence, option (c) is correct.</p>",
    "question_index": 4
  },
  {
    "question": "<p>The homophone for the word 'flower' is:</p>",
    "options": [
      "flour",
      "flow",
      "flown",
      "flair"
    ],
    "correct_option_id": 0,
    "solution": "<p>The word \"flour\" is a homophone for \"flower\" because they sound the same but have different meanings and spellings:</p><p>'Flower' refers to the blooming part of a plant.</p><p>'Flour' refers to the powdery substance made by grinding grains, typically wheat, used in baking.</p><p>Hence, (a) is the correct answer. </p><p>(b): \"Flow\" refers to the movement of a liquid, like water.</p><p>(c): This is the past participle of the verb \"fly\". </p><p>(d): This refers to a distinctive style or talent. </p>",
    "question_index": 5
  },
  {
    "question": "<p>The homophone for the word 'bawl' in the given sentence is:</p><p>During the game, the child would bawl loudly after accidentally getting hit with the ____.</p>",
    "options": [
      "Ball",
      "Bowl",
      "Bawled",
      "Bough"
    ],
    "correct_option_id": 0,
    "solution": "<p>In the given sentence, the word 'bawl' indicates that the child is crying loudly. The homophone 'ball' is the correct option because it matches the context of a game. It suggests that the child is crying after being hit with the ball. On the other hand, the other options do not fit the context. 'Bowl' is a concave-shaped container. 'Bawled' is the past tense of the verb \"bawl\". 'Bough' refers to a main branch of a tree. Hence, (a) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate homophone to fill in the blank. </p><p>The eldest son was designated as the ____ to the family fortune.</p>",
    "options": [
      "Hair",
      "Hare",
      "Here",
      "Heir"
    ],
    "correct_option_id": 3,
    "solution": "<p>Hair: \"Hair\" refers to the fine threads that grow from the skin, especially on the scalp.</p><p>Hare: \"Hare\" is a small mammal, similar to a rabbit.</p><p>Here: \"Here\" indicates a specific location or position.</p><p>Heir: \"Heir\" refers to a person who inherits or is entitled to inherit the property, rank, title, or any other valuable thing.</p><p>In the given sentence, we are talking about someone being designated as the recipient of the family fortune, which involves inheritance. The correct term for this context is \"heir.\" Hence, (d) is the correct answer. </p><p>The sentence would read: \"The eldest son was designated as the heir to the family fortune.\"</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate homophone to fill in the blank. </p><p>The connoisseur savoured the exquisite taste of the aged red ____ in crystal stemware.</p>",
    "options": [
      "Whine",
      "Wine",
      "Wind",
      "While"
    ],
    "correct_option_id": 1,
    "solution": "<p>Whine: \"Whine\" is a verb that means to make a high-pitched, complaining sound.</p><p>Wine: \"Wine\" refers to an alcoholic beverage made from fermented grapes, typically enjoyed for its flavours and aromas.</p><p>Wind: \"Wind\" can refer to the natural movement of air, but it is not suitable in the context of the sentence.</p><p>While: \"While\" is a conjunction used to indicate a period of time or to contrast two ideas.</p><p>In the given sentence, the context is about a connoisseur enjoying the taste of a beverage in crystal stemware. The appropriate term to fill in the blank is a type of alcoholic beverage, which is \"wine.\" Hence, (b) is the correct answer. </p><p>The sentence would read: \"The connoisseur savoured the exquisite taste of the aged red wine in crystal stemware.\"</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank. </p><p>The butcher sells fresh _____ in a nearby shop. </p>",
    "options": [
      "Meat",
      "Meet",
      "Mate",
      "Mat"
    ],
    "correct_option_id": 0,
    "solution": "<p>Meat - This is the correct choice. 'Meat' refers to the flesh of animals, typically used as food. In the context of a butcher selling fresh items in a nearby shop, \"meat\" fits perfectly. Hence, (a) is the correct answer. </p><p>The final sentence: The butcher sells fresh meat in a nearby shop. </p><p>Meet - This word is a verb, meaning to come into the presence or company of someone. It doesn't fit the context of a butcher selling something in a shop.</p><p>Mate - This word can refer to a partner or companion, but it doesn't fit in the context of a butcher selling items in a shop.</p><p>Mat - This word refers to a flat piece of material, typically used as a floor covering. It doesn't fit the context of a butcher selling fresh items.</p>",
    "question_index": 9
  },
  {
    "question": "<p>The homonym for the given context is:</p><p>____ learning is one of the memorizing methods.</p>",
    "options": [
      "Root",
      "Rote",
      "Route",
      "Rot"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Rote' (mechanical or habitual repetition of something to be learned) is the only word that is about learning and so it alone can fill in the given blank. 'Root' (the part of a plant which attaches it to the ground or to a support, typically underground, conveying water and nourishment to the rest of the plant via numerous branches and fibres), 'route' (a way or course taken in getting from a starting point to a destination) and 'rot' (the process of decaying) are contextually irrelevant words so, they cannot fill in the given blank and are thus negated.</p><p>The complete sentence is: Rote learning is one of the memorizing methods.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 10
  },
  {
    "question": "<p> Select the most appropriate homonym to fill in the blank.</p><p>It is said that he could speak and _____ forty languages. </p>",
    "options": [
      "Right",
      "Rite",
      "Write",
      "Wright"
    ],
    "correct_option_id": 2,
    "solution": "<p>In the given sentence, the skill of a person who is well-versed in forty languages is exhibited. So, the appropriate homonym in the current context is 'write' which means 'to express or communicate in writing'.</p><p>Hence, (c) is the correct answer. </p><p>Right: correct in judgment, opinion, or action</p><p>Rite: any customary observance or practice</p><p>Wright: a worker, especially a constructive worker</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank.</p><p>The hikers reached the ___________ of the mountain after a long climb.</p>",
    "options": [
      "peek",
      "peak",
      "pique",
      "pick"
    ],
    "correct_option_id": 1,
    "solution": "<p>In this context, \"peak\" refers to the highest point of a mountain or any projecting part or sharp pointed top. It accurately describes the accomplishment of the hikers reaching the summit after their challenging climb.</p><p>The completed sentence would be: \"The hikers reached the peak of the mountain after a long climb.\"</p><p>Hence, option (b) is correct. </p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank.</p><p>We came to _____ his lecture.</p>",
    "options": [
      "here",
      "hear",
      "hare",
      "heir"
    ],
    "correct_option_id": 1,
    "solution": "<p>The blank requires a verb that denotes the action done with respect to the noun 'lecture'. Accordingly, 'hear' (perceive with the ear the sound made by (someone or something)) is the most appropriate word that matches the context of the sentence and can thus fill the blank.</p><p>Here- in, at, or to this place or position.</p><p>Heir- a person legally entitled to the property or rank of another on that person's death.</p><p>Hare- a fast-running, long-eared mammal that resembles a large rabbit, having very long hind legs and typically found in grassland or open woodland.</p><p>The complete sentence is: We came to hear his lecture.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank.</p><p>He retrieved his hat and quietly ____ his horse away.</p>",
    "options": [
      "Laid",
      "Led",
      "Lad",
      "Load"
    ],
    "correct_option_id": 1,
    "solution": "<p>In the given sentence, we are talking about a person who guided his horse away from someone or something. So, the appropriate homonym in the current context is 'led' which means 'acted as a guide; showed the way'.</p><p>Hence, (b) is the correct answer.</p><p>Laid: to place, set, or locate</p><p>Lad: a boy or young man</p><p>Load: to add to the weight of; fill</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank.</p><p>She is wearing a pretty ___ dress for the dinner party.</p>",
    "options": [
      "Red",
      "Reed",
      "Read",
      "Raid"
    ],
    "correct_option_id": 0,
    "solution": "<p>The given sentence talks about a girl wearing a beautiful dress for a dinner party. Among the given options, 'red' fits in the blank appropriately as its usage conveys the colour of the dress. Hence, (a) is the correct answer. </p><p>The correct sentence is: She is wearing a pretty red dress for the dinner party.</p><p>'Reed' means a tall, slender-leaved plant of the grass family. </p><p>'Read' means an act of speaking aloud words or other information that is written. </p><p>'Raid' means a quick hostile or predatory invasion in a battle. </p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank.</p><p>You went through all of that just to ___ this little purse.</p>",
    "options": [
      "Bye",
      "Buy",
      "Boy",
      "Buoy"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given sentence talks about how a certain person faced a lot of issues just to do something with a little purse. Among the given options, 'buy' fits in the blank appropriately as its usage conveys that somebody went through a lot of trouble just to purchase a particular handbag. Hence, (b) is the correct answer.</p><p>The correct sentence is: You went through all of that just to buy this little purse.</p><p>'Bye' means a shortened form of goodbye.</p><p>'Boy' means a young male.</p><p>'Buoy' means to support or maintain at a high level.</p>",
    "question_index": 16
  },
  {
    "question": "<p>The homonym for the given context is:</p><p>____ gets completed in twelve weeks.</p>",
    "options": [
      "coarse",
      "coerce",
      "curse",
      "course"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Course' (a series of lectures or lessons in a particular subject, leading to an examination or qualification) is the only word that can fill in the blank because it is the only option that can be completed within the stipulated time (as per the sentence). 'Coarse' (rough or harsh in texture), 'curse' (a coarse or blasphemous word or phrase used to express anger or other strong emotion) and 'coerce' (persuade (an unwilling person) to do something by using force or threats) do not fit the sentence contextually and are thus negated.</p><p>The complete sentence is: The course gets completed in twelve weeks.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank. </p><p>The farmer harvested a bountiful crop of ____ from his field. </p>",
    "options": [
      "Mace",
      "Maize",
      "Maze",
      "Mase"
    ],
    "correct_option_id": 1,
    "solution": "<p>\"Maize\" is the correct homonym for this sentence. Maize is a type of cereal grain, also known as corn in some regions. It is a common crop harvested by farmers. So, the correct answer is (b) 'Maize', as it is the word that fits the context of harvesting a crop in a field.</p><p><b>The complete sentence is:</b> The farmer harvested a bountiful crop of <b>maize</b> from his field.</p><p>The rest of the words don't fit in contextually. </p><p>Mace - a spice made from the dried shell of nutmeg/ a decorated rod that is carried by or put in front of particular public officials as a symbol of their authority.</p><p>Maze - a network of paths and hedges designed as a puzzle through which one has to find a way.</p><p>Mase - something that causes bewilderment or mystery.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank. </p><p>One should measure one's _____ before buying the pants.</p>",
    "options": [
      "Vest",
      "West",
      "Waist",
      "Waste"
    ],
    "correct_option_id": 2,
    "solution": "<p>Waist - This is the correct choice. The waist is the part of the body between the ribs and the hips. When buying pants, it is crucial to measure the waist to ensure a proper fit. Hence, (c) is the correct answer.</p><p>The final sentence: One should measure one's waist before buying the pants.</p><p>Vest - A vest is a sleeveless garment that is worn over a shirt. It is not a body part and is not relevant to the context of measuring for pants.</p><p>West - The direction towards the point of the horizon where the sun sets, and it has no connection to the human body or the act of buying pants.</p><p>Waste  -  It refers to material that is discarded or no longer needed. It is not relevant to the context of measuring for pants.</p>",
    "question_index": 19
  }
];
    </script>
