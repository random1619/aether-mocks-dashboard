    <script>
        const questions = [
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>They wouldn't have hired you if you <u>hadn't had</u> some experience abroad.</p>",
    "options": [
      "haven't had",
      "have",
      "has",
      "No improvement required"
    ],
    "correct_option_id": 3,
    "solution": "<p>The given sentence is a conditional sentence. The basic structure of this type of sentence is</p><p><b>If + Past Participle, Past Participle. </b></p><p>The comma is removed when the sentence starts with the main clause like in the given sentence. The main clause follows the given structure. So, the conditional clause will be in past participle form. The underlined part is in past participle form and it is grammatically correct. So, no improvement is required in the given sentence. Hence, option (d) is the correct answer.</p><p><b>Note:</b></p><p><b>Conditional Clause:</b> A conditional clause is the one that usually starts with if or unless and describes something that is possible or probable. Example: If you're going to college, I could give you a lift. Here, \"If you are going to the college\" is the conditional clause and \"I could give you a lift\" is the main clause.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Identify the segment in the sentence which contains a grammatical error.</p><p>Since Monday, I am trying to reach him but he is neither responding to my calls nor replying to my messages.</p>",
    "options": [
      "Since",
      "am trying",
      "neither responding",
      "nor replying to"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error lies in <b>option (b)</b>.</p><p>'Since' is a <b>time expression</b> that denotes a point of time.</p><p>The rule is: <b>Present Indefinite + Time expression= Present Perfect.</b></p><p>For example: Monika <b>has known</b> me <b>since</b> 1995.</p><p>Similarly, in this question, 'Since' is a time expression. So, 'am trying' must be replaced by 'have been trying' (present perfect tense) in the sentence.</p><p>Thus, the error is in option <b>(b) am trying</b>.</p><p>Therefore, the corrected form of the sentence is: Since Monday, I <b>have been trying</b> to reach him but he is neither responding to my calls nor replying to my messages.</p><p>Additional Information:</p><p>Another important <b>Time expression</b> is 'For'.</p><p>'Since' denotes a <b>period of time</b>.</p><p>For example: Monika <b>has known</b> me <b>for</b> five months. (\"five months\" is a period of time)</p>",
    "question_index": 1
  },
  {
    "question": "<p>In the sentence, identify the segment that contains the grammatical error.</p><p>By the time I reached at the event, the show started.</p>",
    "options": [
      "By the time",
      "I reached",
      "at the event",
      "the show started"
    ],
    "correct_option_id": 3,
    "solution": "<p>If two actions take places in the past, one after the other, 1<sup>st</sup> action will be in past perfect tense and the 2<sup>nd</sup> action will be in simple past tense. So 'the show had started' is the correct phrase.</p><p>Hence, option (d) is the correct choice.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>Supposing that <u>he had grasped</u> the concept, he could do wonders in the new project.</p>",
    "options": [
      "he grasped",
      "he grasps",
      "he could grasp",
      "No improvement required"
    ],
    "correct_option_id": 0,
    "solution": "<p>The tense in the 'Supposing that' clause should be in the <b>Simple Past Tense </b>(grasped) when the modal verb 'could' is in the main clause.</p><p>Therefore, the correct answer is: <b>(a) he grasped</b>.</p><p>The corrected form of the sentence is: Supposing that <u>he grasped</u> the concept, he could do wonders in the new project.</p><p>Additional Information:</p><p>'Supposing that' is a <b>conditional sentence</b>. The three types of conditional sentences (with examples) are given in the table.<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Supposing that I <b>study</b> (V1)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I <b>can</b> pass the exam</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Supposing that I <b>studied</b> (V2)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I <b>could</b> pass the exam</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Supposing that I <b>had studied</b> (had + V3)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I <b>could have</b> passed the exam</td></tr></table></p><p>Hence, A is the right answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>It builds on previous work by advocacy groups and news organizations that _______ revealed the hidden ties between the industry and climate change sceptics.</p>",
    "options": [
      "have",
      "were",
      "has",
      "was"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence is in present tense (evident by the use of 'builds'  -  present tense form of 'build') and hence, the use of 'was' and 'were' (past tense forms of 'be') will result in tense inconsistency. Options (b) and (d) can be negated based on this information. It is clear that we need a helping verb in place of the blank so as to make the present perfect tense construct (has/have + past participle of verb) indicating an already completed action that has present consequence/s. Also, the subject of this sentence is 'the previous work'  -  a singular noun  -  and hence, accordingly, we need to use a singular verb 'has' to fill in the blank.</p><p>The answer is option (c).</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>My friend lamented that a complete report was sent to the department a month ago but <u>no action is being taken</u> so far.</p>",
    "options": [
      "no action has been taken",
      "no action was taken",
      "no action had taken",
      "No improvement required"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#8216;Yet&#8217; and &#8216;So far&#8217; take Present Perfect Tense with it.</p><p>Hence, option A is the correct choice.</p><p>So far = at this particular time.</p><p>Example - So far, only two Democrats have entered the race for governor.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the option with the correct use of future tense.</p>",
    "options": [
      "In two years, he will have work for this company for a decade.",
      "In two years, he will have worked for this company for a decade.",
      "In two years, he will works for this company for a decade.",
      "In two years, he will working for this company for a decade."
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence uses the future perfect tense (\"will have worked\"), which is the correct form to indicate an action that will be completed by a certain point in the future. In this case, it means that in two years, the action of working for the company will be completed for a duration of ten years.</p><p>Option (a) is incorrect because \"will have work\" does not properly use the future perfect tense. The correct form is \"will have worked.\"</p><p>Option (c) is incorrect because \"will works\" is grammatically incorrect. After \"will,\" the base form of the verb (\"work\") should be used, not the third-person singular form (\"works\").</p><p>Option (d) is incorrect because \"will working\" is not a valid verb form in English. The correct form would be \"will have worked\" for the future perfect tense.</p><p>Hence, option (b) is correct. </p>",
    "question_index": 6
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>After hearing their explanation,/ we understood that/ they had knew the/ consequences of their actions.</p>",
    "options": [
      "After hearing their explanation,",
      "We understood that",
      "They had knew the",
      "Consequences of their actions"
    ],
    "correct_option_id": 2,
    "solution": "<p>The segment that contains a grammatical error is \"they had knew the\". </p><p>The error is related to the past tense verb \"knew.\" The correct form should be \"known,\" which is the past participle form of \"know\" (knew is the past tense form). </p><p>In the past perfect tense, the helping verb \"had\" is followed by the past participle form of the main verb (not by the past tense form). </p><p>Therefore, the correct phrase should be \"they had known,\" not \"they had knew.\" Hence, (c) is the correct answer.</p><p><b>The correct sentence is</b>: After hearing their explanation, we understood that they <b>had known</b> the consequences of their actions.</p><p><b>Note:</b></p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 7
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>She promised that/ she would done/ everything possible to/ support the team.</p>",
    "options": [
      "She promised that",
      "Everything possible to",
      "She would done",
      "Support the team"
    ],
    "correct_option_id": 2,
    "solution": "<p>The segment that contains a grammatical error is 'she would done'. </p><p>The error is related to the verb \"done.\" </p><p>When we form future conditional tense sentences with \"would,\" we use the base form of the verb that follows \"would.\" </p><p>The correct form in this case should be \"do\", not \"done\" [the past tense verb]. \"Do\" is the base form of the verb that should follow \"would\" to indicate the future action. </p><p>Hence, (c) is the correct answer. </p><p><b>The correct sentence is</b>: She promised that <b>she would do</b> everything possible to support the team.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the option that expresses the given sentence in past tense form.</p><p>She works at the checkout at the local supermarket. </p>",
    "options": [
      "She will work at the checkout at the local supermarket.",
      "She is working at the checkout at the local supermarket.",
      "She has worked at the checkout at the local supermarket.",
      "She worked at the checkout at the local supermarket."
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct option that expresses the given sentence in past tense form is (d). Option (d) changes the verb \"works\" (present tense) to \"worked\" (simple past tense). The simple past tense is used to talk about actions or events that happened and were completed in the past. It is formed by using the past form of the main verb (in this case, \"worked\"). Option (a) is in the simple future tense (\"will\" + base form of the verb). Option (b) is in the present continuous tense (\"is\" + present participle). Option (c) is in the present perfect tense (has + past participle). Hence, (d) is the correct answer.</p><p><b>NOTE:</b></p><p>Participle: A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the option that expresses the given sentence in present tense form. </p><p>She spent hours reflecting on her day, capturing her thoughts in her diary. </p>",
    "options": [
      "She will spend hours reflecting on her day, capturing her thoughts in her diary.",
      "She has spent hours reflecting on her day, capturing her thoughts in her diary.",
      "She will be spending hours reflecting on her day, capturing her thoughts in her diary.",
      "She will have spent hours reflecting on her day, capturing her thoughts in her diary."
    ],
    "correct_option_id": 1,
    "solution": "<p>The original sentence is in the simple past tense (\"spent\"). Option (b) uses the present perfect tense (\"has spent\"). It accurately reflects that the action of spending hours reflecting has been completed with relevance to the present moment. Hence, (b) is the correct answer. </p><p>(a): simple future tense (will spend)</p><p>(c): future continuous tense (will be spending)</p><p>(d): future perfect tense (will have spent)</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the option with the correct use of simple past tense.</p>",
    "options": [
      "She has finish her homework last night.",
      "She finished her homework last night.",
      "She was finishing her homework last night.",
      "She finishes her homework last night."
    ],
    "correct_option_id": 1,
    "solution": "<p>Option a: This sentence is grammatically incorrect. 'Has' takes the third verb form after it while 'finish' is the base verb.</p><p>Option b: The verb \"finished\" is in the simple past tense, which matches the context of the action (\"last night\").</p><p>Option c: This is incorrect because \"was finishing\" is in the past continuous tense.</p><p>Option d: This is incorrect because \"finishes\" is in the present tense, which does not match the past time reference (\"last night\").</p><p>Hence, option (b) is correct.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the option with the correct use of future tense.</p>",
    "options": [
      "A scientist will has presented a theory at an important conference.",
      "A scientist will have present a theory at an important conference.",
      "A scientist will present a theory at an important conference.",
      "A scientist will presents a theory at an important conference."
    ],
    "correct_option_id": 2,
    "solution": "<p>Option (a) is incorrect because \"will has presented\" is grammatically wrong. The correct form would be \"will have presented\" if using the future perfect tense as \"will\" should be followed by the base form of the verb \"have\". </p><p>Option (b) is incorrect because \"will have present\" is not grammatically correct. In the future perfect tense, the verb should be in the past participle form [third form of verb], i.e., \"will have presented.\"</p><p>Option (c) is correct because \"will present\" is the correct use of the simple future tense to indicate an action that will occur in the future.</p><p>Option (d) is incorrect because \"will presents\" is not a valid verb form. After \"will,\" the base form of the verb (\"present\") is required.</p><p>Hence, option (c) is the answer. </p><p><b>Note: Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 12
  },
  {
    "question": "<p><b> </b>Select the option that will improve the bracketed part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>Had she completed her homework, she (would have go) to the movies.</p>",
    "options": [
      "Would go",
      "Would have gone",
      "Would have been gone",
      "No improvement required"
    ],
    "correct_option_id": 1,
    "solution": "<p>Past conditional sentences, also known as the past unreal conditional or the third conditional, are used to talk about imaginary or hypothetical situations in the past and their possible outcomes. </p><p>'Had she completed her homework' is the past perfect clause, indicating an action (completing homework) that was supposed to be done before another past event.</p><p><b>Syntax:</b> <i>Had + subject + third form verb + object, subject + would have + third form verb.</i></p><p>Only option b) has the third form verb 'gone'. The given phrase and option a) have the base verb 'go', and option c) has 'been' which is not required.</p><p><b>The correct sentence is:</b> Had she completed her homework, she would have gone to the movies.</p><p>Hence, option (b) is correct. </p>",
    "question_index": 13
  },
  {
    "question": "<p><b> </b>Select the option that will improve the bracketed part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>By the time the guests (have arrived), we will have decorated the entire house for the party.</p>",
    "options": [
      "Have been arriving",
      "Will arrive",
      "No improvement required",
      "Arrive"
    ],
    "correct_option_id": 3,
    "solution": "<p>When we use 'by the time' with the future perfect tense, we are expressing that an action will be completed, or a situation will have occurred before a specified future event.</p><p><b>Syntax: </b><i>By the time, Simple Present tense, Future Perfect tense.</i></p><p>Only option d) is in the present tense. The given phrase is in present perfect tense, option a) is in present perfect continuous tense, and option b) is in simple future tense.</p><p><b>The correct sentence is: </b>By the time the guests arrive, we will have decorated the entire house for the party.</p><p>Hence, option (d) is correct. </p>",
    "question_index": 14
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Generally, the pleasure / we took from / professional development / is often short-lived.</p>",
    "options": [
      "professional development",
      "we took from",
      "is often short-lived",
      "Generally, the pleasure"
