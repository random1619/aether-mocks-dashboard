<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>What does the idiom 'Bite the bullet' mean?</p>",
    "options": [
      "Enjoy a delicious meal",
      "Face a difficult situation with courage",
      "Avoid confrontation",
      "Give someone a piece of advice"
    ],
    "correct_option_id": 1,
    "solution": "<p>The idiom <b>\"bite the bullet\"</b> means to confront a painful or challenging situation with courage and determination, even though it might be unpleasant.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate meaning of the phrase in bold.</p><p>Your so-called friend has <b>cooked your goose</b>.</p>",
    "options": [
      "To complete a lot of work or a wide range of things",
      "When something develops completely and reaches maturity; when a child becomes an adult",
      "To spend a lot of time and energy but achieve nothing",
      "To interfere with, disrupt or ruin something for someone"
    ],
    "correct_option_id": 3,
    "solution": "<p>The phrase <b>\"cooked your goose\"</b> means to ruin someone's plans, prospects, or success. It implies that someone has caused harm or created a situation that negatively impacts another person's outcomes.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence:</p><p><u>To tell others secret information</u> only for enjoyment is not a good practice.</p>",
    "options": [
      "Spill the words",
      "Spill the cat",
      "Spill the onions",
      "Spill the beans"
    ],
    "correct_option_id": 3,
    "solution": "<p>\"Spill the beans\" is an idiom that means to reveal secret information.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom:</p><p>Care a hang</p>",
    "options": [
      "Hanging clothes to dry",
      "Putting an outfit on a hanger",
      "Caring too much",
      "Showing no interest"
    ],
    "correct_option_id": 3,
    "solution": "<p>The idiom \"care a hang\" means to show no concern or interest in something.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom. </p><p>To read between the lines </p>",
    "options": [
      "To underline some words",
      "To read differently",
      "To read aloud to public",
      "To understand more than what the words suggest"
    ],
    "correct_option_id": 3,
    "solution": "<p>To read between the lines: Means to interpret hidden or implied meanings beyond literal text.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate meaning of the underlined idiom in the following sentence:</p><p>\"In my new office, all employees were different, so I felt like a <u>fish out of water.\"</u></p>",
    "options": [
      "Uncomfortable",
      "Homeless",
      "Frustrated",
      "Disappointed"
    ],
    "correct_option_id": 0,
    "solution": "<p>The idiom \"like a fish out of water\" means feeling uncomfortable in an unfamiliar environment.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Read the sentence carefully and select the most suitable idiom to fill in the blank:</p><p>\"The renowned publisher decided to withdraw a book from the market. No one was interested in the book as the arguments presented were ____________.\"</p>",
    "options": [
      "high and mighty",
      "out of the woods",
      "beside the mark",
      "under the rose"
    ],
    "correct_option_id": 2,
    "solution": "<p>The phrase \"beside the mark\" means irrelevant or not to the point, which fits the context of disinterest in the book's arguments.</p><p>High and mighty  Arrogant or self-important.</p><p>Out of the woods  Free from danger or difficulty.</p><p>Under the rose  Secretly or in confidence</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>A bad patch</p>",
    "options": [
      "A path that is untravelled",
      "A period of time when a person faces lots of troubles",
      "A person who takes a difficult path",
      "A dangerous road to walk on"
    ],
    "correct_option_id": 1,
    "solution": "<p>\"A bad patch\" is an idiom that refers to a difficult period or phase in someone's life when they face multiple problems or challenges. It's a temporary period of hardship or misfortune.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate meaning of the given idiom.</p><p>Radhika stood by Monica's side <u>through thick and thin.</u></p>",
    "options": [
      "Under easy situations wherein she could ensure Monica's safety and security",
      "In all the happy moments, personally spending most of her time",
      "Under all conditions, no matter how challenging or difficult",
      "In the moments when Monica couldn't complete some simple tasks"
    ],
    "correct_option_id": 2,
    "solution": "<p><i>\"Through thick and thin\"</i> means standing by someone in both good and bad times.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate meaning of the underlined idiom.</p><p>In those days, we did not expect luxuries; we were thankful if we could <u>keep the wolf from the door.</u></p>",
    "options": [
      "Avoid starvation",
      "Wallow in poverty",
      "Relish food",
      "Encourage starvation"
    ],
    "correct_option_id": 0,
    "solution": "<p>The idiom \"keep the wolf from the door\" means to have enough money to avoid starvation or extreme poverty.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate meaning of the idiom \"Easy does it\"</p>",
    "options": [
      "Used to tell someone to do something rarely",
      "Used to tell someone to do something violently",
      "Used to tell someone to do something slowly and carefully",
      "Used to tell someone to do something horridly"
    ],
    "correct_option_id": 2,
    "solution": "<p>\"Easy does it\" is an idiom used to tell someone to be careful or to take things slowly. It's often used as a cautionary phrase suggesting that a gentle or careful approach is best.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate meaning of the idiom \"Cut corners\"</p>",
    "options": [
      "Complete a work",
      "Clear a space",
      "Find a suitable place",
      "Do something in an inexpensive and easy way"
    ],
    "correct_option_id": 3,
    "solution": "<p>\"Cut corners\" means to do something in the quickest, easiest, or cheapest way, often by ignoring proper procedures or skipping steps. It usually implies taking shortcuts that might compromise quality.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate idiom to fill the blank in the given situation.</p><p>I thought Sadhna would always stick by me, but when I got into trouble, she turned out to be a/an ___________.</p>",
    "options": [
      "hard nut to crack",
      "open secret",
      "fair-weather friend",
      "white elephant"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Fair-weather friend  -  Someone who supports you only when things are good but leaves you in tough times.</p><p>&#183; Hard nut to crack: A difficult problem or challenge to solve.</p><p>&#183; Open secret: A secret that is widely known but not officially acknowledged.</p><p>&#183; White elephant: A burdensome or costly possession, often difficult to dispose of.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the idiom in the given brackets.</p><p>His PhD degree seems to be <i>(Penelope's web).</i> </p>",
    "options": [
      "An important task",
      "A difficult task",
      "A secret task",
      "An endless task"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; \"Penelope's web\" refers to a task that never ends or is deliberately delayed.</p><p>&#183; This idiom originates from Greek mythology, where Penelope kept weaving and unweaving a fabric to delay choosing a suitor.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option that has the same meaning as the italicized segment.</p><p>His illness became a <i>blessing in disguise</i> when he married his nurse.</p>",
    "options": [
      "An apparent misfortune that eventually has good results",
      "When someone finds it difficult to choose between two alternatives",
      "To present a counter-argument",
      "Deal with a problem if and when it becomes necessary"
    ],
    "correct_option_id": 0,
    "solution": "<p>A blessing in disguise means something that appears bad at first but results in a positive outcome.</p><p>Thus, Option 1 is correct.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate meaning of the underlined idiom.</p><p>I had heard of <u>henpecked husbands</u> and now, I felt that I saw one.</p>",
    "options": [
      "Controlling husband",
      "Bossy husbands",
      "Oppressed husband",
      "Dominating husbands"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; \"Henpecked husband\" refers to a man who is constantly dominated or controlled by his wife.</p><p>&bull; The best match is \"oppressed husband,\" as it implies a husband who is controlled or subdued.</p><p>Other options:</p><p>&bull; (1) Controlling husband &rarr; Incorrect, as \"henpecked\" means the opposite.</p><p>&bull; (2) Bossy husbands &rarr; Incorrect, as the wife is usually the bossy one in this context.</p><p>&bull; (4) Dominating husbands &rarr; Incorrect, as a \"henpecked husband\" is submissive, not dominant.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate idiom to replace the underlined segment in the given sentence.</p><p>After reflecting on the matter regarding his boss's selfish attitude, Raju decided to <u>force himself to perform an unpleasant action in a difficult situation to resolve the matter.</u></p>",
    "options": [
      "Bite the bullet",
      "Dodge the bullet",
      "Shoot the bullet",
      "Ignore the bullet"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Bite the bullet means to endure a painful or unpleasant situation bravely.</p><p>&bull; Dodge the bullet means to escape a difficult situation.</p><p>&bull; Shoot the bullet and Ignore the bullet are incorrect idiomatic usages.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate meaning of the underlined idiom:</p><p>This year's budget is unlikely to pass as law since the president's proposed budgets typically face <u>a jaundiced eye</u>, but this one has gotten even more skepticism.</p>",
    "options": [
      "Jealousy",
      "Confidence",
      "Resentment",
      "Good will"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The idiom \"a jaundiced eye\" means looking at something with suspicion, bias, or resentment.</p><p>&#183; Jealousy (Option 1) is a strong emotion but does not fit well here.</p><p>&#183; Confidence (Option 2) is the opposite of skepticism.</p><p>&#183; Goodwill (Option 4) means positive feelings, which contradicts skepticism.</p><p>Thus, the correct answer is Resentment.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Complete the dialogue for Person B using the correct idiom.</p><p>Person A: I am so nervous. I don't think I should make the speech tomorrow.</p><p>Person B: No. You are just getting ______. You have prepared for this.</p>",
    "options": [
      "hot feet",
      "cold feet",
      "cold hand",
      "cold foot"
    ],
    "correct_option_id": 1,
    "solution": "<p>The context suggests Person A is nervous and considering backing out of the speech. The idiom \"getting cold feet\" means becoming nervous or hesitant about a planned action, fitting perfectly. Person B reassures A that their nervousness is just hesitation and they are prepared. \"Hot feet\" is not a standard idiom, \"cold hand\" relates to poor circulation or fear in a different context, and \"cold foot\" is incorrect. Thus, \"cold feet\" is the correct choice.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the most appropriate meaning of the highlighted idiom.</p><p>The youth involved in the accident escaped <b>by the skin of his teeth</b>.</p>",
    "options": [
      "Barely managed to escape",
      "Very arrogant",
      "Always taking calculated decisions",
      "Deficiency of funds"
    ],
    "correct_option_id": 0,
    "solution": "<p>By the skin of his teeth - by a very narrow margin; only just.</p><p>The sentence implies that the youth barely managed to escape from getting injured in the accident.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
