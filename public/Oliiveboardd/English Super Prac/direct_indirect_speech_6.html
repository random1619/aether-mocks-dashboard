    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>\"I went for a walk today morning, and met Lokesh,\" said Rahul.</p>",
    "options": [
      "Rahul said that he went for a walk that morning, and met Lokesh.",
      "Rahul said that he had gone for a walk that morning, and met Lokesh.",
      "Rahul said that I had gone for a walk that morning, and met Lokesh.",
      "Rahul said that he had gone for a walk today morning, and met Lokesh."
    ],
    "correct_option_id": 1,
    "solution": "<p>The simple past tense 'went' should change into the past perfect 'had gone', when changing from direct to indirect speech. The first person subjective pronoun 'I' will change to the third person subjective 'he'. 'Today morning' will change into 'that morning'. B is the right answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>\"I will have been working on this project for seven months,\" she said.</p>",
    "options": [
      "She said that she would have been working on that project for seven months.",
      "She said that she would have been working on this project for seven months.",
      "She said that I would have been working on that project for seven months.",
      "She said that she will have been working on this project for seven months."
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence in the Direct Speech is in Future Perfect Continuous Tense. Therefore, the sentence in the Indirect Speech should be in Perfect Continuous Conditional Tense.</p><p>Future Perfect Continuous (Subject + will/shall + have + been + V1 + ing + Object) should be converted into Perfect Continuous Conditional (Subject + would/should + have + been + V1 + ing + Object).</p><p>For example:</p><p>The girl said, \"They will have been waiting here.\" (Direct Speech)</p><p>The girl said that they would have been waiting there\". (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>I  -  she </p><p>Will  -  would </p><p>This  -  that</p><p>So, the sentence in indirect speech is: She said that she would have been working on that project for seven months.</p><p>Hence, (a) is the correct answer. </p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>Rani told Sonu that she had been taking piano classes since the previous Monday.</p>",
    "options": [
      "\"I am taking piano classes since last Monday\", Rani said to Sonu.",
      "\"She has been taking piano classes since this Monday\", Rani told Sonu.",
      "\"I have been taking piano classes since last Monday\", Rani said to Sonu.",
      "\"I would be taking piano classes from coming Monday\", Rani told Sonu."
    ],
    "correct_option_id": 2,
    "solution": "<p>Option (c) is the correct choice.</p><p>RULE - If the given sentence in Indirect Speech is in <b>Past Perfect Continuous Tense</b>, the same sentence in Direct Speech would be in <b>either Present Perfect Continuous Tense or Past Continuous Tense or the same tense</b>.</p><p>Past Perfect Continuous <b>(Subject + had + been + V1-ing + Object) </b>would be converted into Present Perfect Continuous <b>(Subject + has/have + been + V1-ing + Object) or </b>Past Continuous <b>(Subject + was/were + V1 + ing + Object).</b></p><p>Here is the case of <b>Past Perfect Continuous Tense</b> to<b> Present Perfect Continuous Tense.</b></p><p>For example:</p><p>He said that they had been waiting for hours. (Indirect Speech)</p><p>He said, \"We have been waiting for hours\". (Direct Speech)</p><p>Also, when changing the sentence from Indirect Speech to Direct Speech, usually used conjunction <b>'that', </b>between the reporting verb and the speech, is removed.</p><p>The following changes will be made in the sentence when changed from Direct speech to Indirect Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Told</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Said to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">She</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Had</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">have</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The previous</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">last</td></tr></table><p>Hence, option (c) is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p></p><p>The man said that he did not see any chance of success except by bribery. </p>",
    "options": [
      "The man said, \"I haven't seen any chance of success except by bribery.\"",
      "The man said, \"I hadn't seen any chance of success except by bribery.\"",
      "The man said, \"I am not seeing any chance of success except by bribery.\"",
      "The man said, \"I don't see any chance of success except by bribery.\""
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence in the Indirect Speech is in Simple Past Tense. Therefore, the sentence in the Direct Speech will be in Simple Present Tense.</p><p>Simple Past (Subject +V2 + Object) will be converted into Simple Present (Subject +V1st + Object).</p><p>For example:</p><p>He said that he never went to the village. (Indirect Speech)</p><p>He said, \"I never go to the village.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>&#183; The verb 'did not see' (simple past) is changed into 'do not see' (simple present).</p><p>&#183; The pronoun 'he' is changed into 'I'. </p><p>All options except (d) don't follow the grammatical structure. Hence, option (d) is the correct answer. </p><p>Therefore, the correct answer is: <b>The man said, \"I don't see any chance of success except by bribery.\"</b></p>",
    "question_index": 3
  },
  {
    "question": "<p>  Select the option that expresses the given sentence in reported speech.</p><p>Chris said to Mary, \"Get the dog in the flat before I throw it through this window.\"</p>",
    "options": [
      "Chris ordered Mary to get the dog in the flat before he threw it through that window.",
      "Chris ordered Mary to get the dog in the flat before I threw that through this window.",
      "Chris requested Mary to get the dog in the flat before him threw it through that window.",
      "Chris ordered Mary to get the dog in the flat before him to throw it through that window."
    ],
    "correct_option_id": 0,
    "solution": "<p>Imperative Sentences are used to demonstrate Request, Order, Command, etc.</p><p>Imperative Sentences begin with Principal verbs like Go, Make, etc.</p><p>As per the meaning of \"Said\", \"Say\", etc. the verbs changes forms like \"begged/beg\" etc.</p><p>'To' is used before the Principal Verbs in the Indirect Speech.</p><p>For example:</p><p>John said to his assistant, \"Bring a glass of water.\" (Direct Speech)</p><p>John ordered his assistant to bring him a glass of water. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The reporting verb 'said to' is changed into 'ordered'. </p><p>&#183; The verb 'get' is changed into the infinitive 'to get'. </p><p>&#183; The verb 'throw' (simple present) is changed into 'threw' (simple past).</p><p>&#183; The pronoun 'I' is changed into 'he'. </p><p>&#183; 'This window' is changed into 'that window'. </p><p>Therefore, the correct answer is: <b>Chris ordered Mary to get the dog in the flat before he threw it through that window.</b></p><p>Hence, the answer is option a).</p><p><b>Note:</b></p><p><b>Infinitive:</b> The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p>&#183; To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p>&#183; My father likes to cook. [like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p>&#183; To vote in elections is our right. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#183; Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>&#183; The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>Rustom told me that when he asked her about the truth, she wasn't responding.</p>",
    "options": [
      "Rustom said to me, \"When I had asked her about the truth, she wasn't responding.\"",
      "Rustom said to me, \"When I asked her about the truth, she wasn't responding.\"",
      "Rustom said to me, \"When I ask her about the truth, she wasn't responding.\"",
      "Rustom said to me, \"When I asked her about the truth, she hadn't responded.\""
    ],
    "correct_option_id": 1,
    "solution": "<p>If the sentence is in the <b>Past tense</b>, the form of tense doesn't change when it is used in the <b>time clause</b>.</p><p>One way of identifying the time clause is that the Time clause always begins with the following:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>When</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Whenever</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">While</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">As</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Since</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">After</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Before</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Until</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">As soon as</td></tr></table></p><p>For example:</p><p>Fariha told me that when she saw him, he was playing tennis.</p><p>Fariha said to me, \"When I saw him, he was playing tennis.\"</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">told.. that</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">he</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td></tr></table></p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>He will say to you, \"I will do my appointed work as soon as possible.\"</p>",
    "options": [
      "He will say to you that he could do his appointed work as soon as possible.",
      "He will say to you that he will do his appointed work as soon as possible.",
      "He will say to you that he would do my appointed work as soon as possible.",
      "He would say to you that he will do my appointed work as soon as possible."
    ],
    "correct_option_id": 1,
    "solution": "<p>When the reporting verb in Direct Speech is in Future Tense, there is no change in the tense in Indirect Speech. However, the pronouns will change accordingly.</p><p>For Example:</p><p>Subham will say, \"Kaustav is always late.\" (Direct Speech)</p><p>Subham will say that Kaustav is always late. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The pronoun 'I' is changed into 'he'.</p><p>&#183; The possessive determiner 'my' is changed into 'his'.</p><p>Therefore, the correct answer is (b): <b>He will say to you that he will do his appointed work as soon as possible.</b></p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>\"Do you think you know better than your own mother?\", shouted his angry father.</p>",
    "options": [
      "His angry father shouted and asked that he thought whether he knew better than his own mother.",
      "His angry father shouted and asked whether he thought he knew better than his own mother.",
      "His angry father shouted to ask if he thought that he knew better than his own mother.",
      "His angry father shouted if he thought that he knew better than his own mother."
    ],
    "correct_option_id": 1,
    "solution": "<p>In option (c), 'Shouted to ask' is wrong and in option (d) 'asked' is missing, hence it is incorrect too. Out of two options now left, (b) is the best choice as it conveys the meaning in a clear way rightly placing 'whether' where it exactly needs to be. Hence, (b) is the right answer.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Rajeev said, \"I met my old friend from high school when I tried to catch a bus.\"</p>",
    "options": [
      "Rajeev says that he met his old friend from high school when he was trying to catch a bus.",
      "Rajeev said that he has met his old friend from high school when he tried to catch a bus.",
      "Rajeev said that he had met his old friend from high school when he had been trying to catch a bus.",
      "Rajeev said that he met his old friend from high school when he tried to catch a bus."
    ],
    "correct_option_id": 3,
    "solution": "<p>If the sentence is in Simple Past, the form of tense doesn't change when it is used in the time clause.</p><p>One way of identifying the time clause is that the Time clause always begins with the following: <b>When, whenever, while, as, since, after, before, until, as soon as</b></p><p>For example:</p><p>Ayush said to me, \"When I saw him, he was working.\" (Direct Speech)</p><p>Ayush told me that when he saw him, he was working. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The pronoun 'I' is changed into 'he' and the possessive determiner 'my' is changed into 'his'. </p><p>&#183; Inverted commas (\"...\") are replaced with 'that'.</p><p>Therefore, the correct answer is option (d): <b>Rajeev said that he met his old friend from high school when he tried to catch a bus.</b></p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>The student said, \"Let us prepare for SSC.\"</p>",
    "options": [
      "The student proposed that they should be prepared for SSC.",
      "The student proposed that they should prepare for SSC.",
      "The student said that they should prepare for SSC.",
      "The student proposed that they should be preparing for SSC."
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct answer is <b>(b) The student proposed that they should prepare for SSC.</b></p><p>Key points:</p><p>&#183;<b>\"Let\"</b> is used to mean <b>\"to allow\".</b></p><p>&#183;<b>\"Say/ Said\"</b> in Direct Speech is changed into <b>\"Propose/ Proposed\", \"Suggest/ Suggested\"</b> etc.</p><p>&#183;If there is an object in the Direct Speech, <b>\"to\"</b> is used after \"proposed\" and \"suggested\" in the Indirect Speech.</p><p>&#183;Let as a proposal:</p><p>o He said, \"Let us go to the library\" (Direct Speech)</p><p>o He proposed that they should go to the library. (Indirect Speech)</p><p>&#183;The following things in the sentence will change when changed from Direct speech to Indirect Speech:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">proposed that</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Let us</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">they should</td></tr></table></p><p>&#183;Therefore, the correct answer is: <b>The student proposed that they should prepare for SSC.</b></p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>Ned Stark said that he had to go to Kings Landing then.</p>",
    "options": [
      "Ned Stark said, \"I must go to Kings Landing then.\"",
      "Ned Stark said, \"I had to go to Kings Landing now.\"",
      "Ned Stark said, \"I must be gone to the Kings Landing now.\"",
      "Ned Stark said, \"I must go to Kings Landing now.\""
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct answer is <b>(d) Ned Stark said, \"I must go to Kings Landing now.\"</b></p><p>Key points:</p><p>&#8226; When <b>\"must\"</b> denotes <b>morality or universality</b>, there isn't any change in the use of <b>\"must\".</b></p><p>&#8226; For example:</p><p>o The Professor said that we must love our country. (Indirect Speech)</p><p>o The Professor said, \"We must love our country.\" (Direct Speech)</p><p>&#8226; However, if the use of <b>\"must\" </b>doesn't denote universality or morality, then the tense form changes as per the normal rules. <b>\"Had to\"</b> in Indirect Speech is changed into <b>\"must\"</b> in Direct Speech. (The question is in reference to this rule.)</p><p>&#8226; For example:</p><p>o Rahul said that he had to go to school at once. (Indirect Speech)</p><p>o Rahul said, \"I must go to school at once.\" (Direct Speech)</p><p>&#8226; The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said that</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">he</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">had to</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">must</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">then</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">now</td></tr></table><p>&#8226; Therefore, the correct answer is: <b>Ned Stark said, \"I must go to Kings Landing now.\"</b></p><p>Additional Information:</p><p>&#8226; The tense form and the verb form of the sentence change as per the list given below (important ones from exam point of view) when changed from Indirect Speech to Direct Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Past simple   (Subject +V2 + Object)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Present simple   (Subject +V1st + Object)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Past Continuous   (Subject +was/were+V1 +ing+ Object)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Present continuous   (Subject +is/am/are+V1 +ing+ Object)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Past perfect   (Subject+had+V3+Object)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Present perfect   (Subject + has/have+V3+Object)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Past perfect   (Subject+had+V3+Object)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Past simple   (Subject+V2+Object)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Past perfect continuous   (Subject +had been+V1 +ing+ Object)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Past Continuous   (Subject +was/were+V1 +ing+ Object)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Present Conditional   (Subject+ would+V1+object)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Future simple   (Subject+ will/shall+V1+object)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Conditional Continuous   (Subject +would+be+V1 +ing+ Object)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Future Continuous   (Subject +will/shall+be+V1 +ing+ Object)</td></tr></table><p>Abbreviation to look out for in the table:</p><p>S -&gt; Subject, V1 -&gt; Base form/simple form of verb, V2 -&gt; Past form of verb (-ed form or irregular verb), V3 -&gt; Past participle form of verb (-ed, -d, -t, -en, or -n).</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Could</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Can</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Might</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">May</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Had to/ Would have to</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Must</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Should</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Should</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Might</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Might</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Could</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Could</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Would</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Will</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ought to</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ought to</td></tr></table><p>&#8226; There is a change in the form of modals in the sentence as per the list given below when we change from Indirect Speech to Direct Speech.</p><p>&#8226; There is also a change in the adverbials of time and place in the sentence as per the list given below when we change from Indirect Speech to Direct Speech.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">That day</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Today</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The next day</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tomorrow</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The previous week</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Last week</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">That</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">This</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">That night</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tonight</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Before</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ago</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">So</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Thus</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Thither</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hither</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Go</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Come</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5p dding:5px;\">Our</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">His</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">His</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Her</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Her</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Its</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Its</td></tr></table><p></p>",

    "correct_option_id": 1,
    "solution": "<p>In the case of sentences like this where the sentence takes an <b>Interrogative form</b> in Direct Speech, \"enquired (of)\", \"wanted to know\", \"asked\", etc. in Indirect Speech is changed into \"said\" in Direct Speech.</p><p>In Direct speech, the <b>verb</b> is always placed before the <b>subject</b>, unlike in Indirect Speech.</p><p>When changing these types of sentences from Indirect Speech to Direct Speech, \"Whom\" becomes \"Who\".</p><p>For example:</p><p>Ravi asked me whom I had visited this afternoon. (Indirect Speech)</p><p>Ravi said to me, \"Who have you visited in the afternoon?\" (Direct Speech)</p><p>The tense of the Indirect Speech is in the <b>Past Perfect tense</b>. So, the tense in the Direct Speech will be in the <b>Present Perfect tense</b>.</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">asked</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">whom</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Who</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">she had</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">have you</td></tr></table><p>Therefore, the correct answer is: <b>(b) Susan said to Selena, \"Who have you asked to remove the chair?\"</b></p>",

    "correct_option_id": 3,
    "solution": "<p><b>Exclamatory Sentences</b> are used to express joy, surprise, <b>sadness</b>, wonder, etc.</p><p>The use of \"Alas!\", \"Hurray!\", \"Oh!\" is evident in these types of sentences in Direct Speech.</p><p>The verb in the Indirect Speech is changed into \"Exclaimed with sorrow\", \"Exclaimed with joy\", etc. in Direct Speech.</p><p>In Indirect Speech, if the form of the sentence is <b>assertive form</b>, then it is changed into Exclamatory form in Direct Speech.</p><p>Thus, going by the options is one of the best techniques to solve these questions.</p><p>For example:</p><p>Barney exclaimed with sorrow that he was ruined. (Indirect Speech)</p><p>Barney said, \"Good Heavens! I am ruined.\" (Direct Speech)</p><p>The tense of the Indirect Speech is in the <b>Past Perfect tense</b>. So, the tense in the Direct Speech will be in the <b>Present Perfect Tense</b>.</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">exclaimed with sorrow that</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said, \"Good Heavens!\"</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">he</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">had done</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">have done</td></tr></table><p>Therefore, the correct answer is: <b>(d) The student said, \"Good Heavens! I have done such a mistake.\"</b></p>",
