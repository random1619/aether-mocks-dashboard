    <script>
        const questions = [
  {
    "question": "<p>Parts of the given sentence have been underlined. One of the parts may contain an error. Select the option that rectifies the error. If you don't find any error, mark 'No error' as your answer.</p><p>It was <u>the home minister</u> of the country who took the decision to change <u>a laws pertaining</u> to <u>migration</u> of people from one state to another.</p>",
    "options": [
      "No error",
      "the laws pertaining",
      "the migration",
      "an home minister"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in \"a laws\"; \"laws\" is plural, so it should be \"the laws\" or \"laws\" without an article. \"The laws pertaining\" corrects this.</p><p>No error: There is an error in \"a laws,\" so this is incorrect.</p><p>The migration: This part is correct; \"migration\" is appropriately used.</p><p>An home minister: This would be incorrect if it were in the sentence, but the original has \"the home minister,\" which is correct.</p><p>The correct sentence: It was the home minister of the country who took the decision to change the laws pertaining to migration of people from one state to another.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 0
  },
  {
    "question": "<p>Parts of the given sentence have been underlined. One of them contains an error. The underlined parts are given as options with some changes. Select the option that correctly rectifies the error.</p><p>The <u>film received</u> critical <u>acclaim for</u> being <u>a more innovative</u> movie <u>of the year</u>.</p>",
    "options": [
      "Film receives",
      "In the year.",
      "Acclaim at",
      "An innovative"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error is in the phrase \"a more innovative.\" The adverb 'more' can be used when two things are in comparison. In the given sentence talks about one specific movie for which comparison is not required and the correct phrase to replace this is 'an innovative'.</p><p>The correct sentence: The film received critical acclaim for being an innovative movie of the year.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>Neither the parents nor the child <u>were happy about</u> the result.</p>",
    "options": [
      "Was happy for",
      "No substitution",
      "Were happy with",
      "Was happy with"
    ],
    "correct_option_id": 3,
    "solution": "<p>The verb in 'neither/nor' sentence agrees with the noun or pronoun closest to it. In the given sentence, the noun closest to the verb is 'child', which is singular in nature. So, 'were' should be replaced by 'was' in order to rectify the error.</p><p>We use 'for' to talk about a purpose.</p><p>We use 'with' to mean 'because of'. Example: I couldn't sleep with the noise of the traffic.</p><p>'For' does not fit here contextually. The sentence implies that no one was happy because of the result. So, 'for' should be replaced with 'with'.</p><p>Hence, (d) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the alternative that will improve the underlined part of the sentence. In case there is no improvement select 'No improvement'.</p><p>Harry and Meghan <u>have decided to work and become</u> financially independent.</p>",
    "options": [
      "have decided to work and became",
      "have decide to work and become",
      "No improvement",
      "has decided to work and become"
    ],
    "correct_option_id": 2,
    "solution": "<p>The underlined part of the sentence is grammatically and contextually correct and requires no correction.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the sentence. In case no improvement is needed, select 'No improvement'.</p><p>As we've been neighbours, I have known Mrs. Shashi Singh <u>since more than 16 years.</u></p>",
    "options": [
      "by more than 16 years",
      "from more than 16 years",
      "No improvement",
      "for more than 16 years"
    ],
    "correct_option_id": 3,
    "solution": "<p>The preposition 'since' is used to refer to the point of time when an action began in the past and is still continuing. Here, '16 years' is a period of time. In such cases, the preposition 'for' should be used. For example:</p><p>We have been married <b>since</b> 1996.</p><p>I was waiting <b>for</b> an hour.</p><p>According to this, option (d) is the correct choice.</p><p><b>Note:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>.</p><p>&#183; The words in bold are called prepositions because they normally take a position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence.</p><p>My sincerity and patience <u>drove me</u> through all odds and problems of life.</p>",
    "options": [
      "Carried me",
      "Flew me",
      "Ran me",
      "Lifted me"
    ],
    "correct_option_id": 0,
    "solution": "<p>To carry someone through a certain phase means helping someone be able to deal with a difficult situation.</p><p>Replacing the underlined segment with 'carried me' gives the meaning that the subject's sincerity and patience helped him/her deal with all odds and problems of life.</p><p>No other option gives any meaning to the sentence.</p><p><b>The correct sentence is: </b>My sincerity and patience <b>carried me </b>through all odds and problems of life.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence.</p><p>The South Indian dish was <u>approved by the guests</u> as it was tasty.</p>",
    "options": [
      "accepted by the visitors",
      "gratified by the visitors",
      "doomed by the visitors",
      "condemned by the visitors"
    ],
    "correct_option_id": 0,
    "solution": "<p>Accepted - generally agreed to be satisfactory or right</p><p>Gratified - to please someone, or to satisfy a wish or need</p><p>Doomed - likely to have an unfortunate and inescapable outcome; ill-fated.</p><p>Condemned - to criticize something or someone strongly, usually for moral reasons</p><p>Among the given options, only option (a) can replace the underlined part as it would give the meaning that the visitors were satisfied with the South Indian dish as it was tasty.</p><p>Other options do not fit in contextually.</p><p>It is contextually incorrect to say that the visitors 'gratified/pleased' the South Indian dish.</p><p>'Doomed' and 'condemned' cannot be related to tasty food.</p><p>Hence, option (a) is correct.</p><p><b>The correct sentence is: </b>The South Indian dish was <b>accepted by the visitors</b> as it was tasty.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>Large glasses magnified his eyes <u>so that to gave</u> him the appearance of a wise owl.</p>",
    "options": [
      "No substitution",
      "as though to gave",
      "so that it gives",
      "so as to give"
    ],
    "correct_option_id": 3,
    "solution": "<p>The infinitive marker 'to' should be followed by the base verb, whereas 'gave' is the past simple (V2) form of verb. So, the underlined segment requires substitution.</p><p>Option (b) repeats the same error, hence it is negated. </p><p>'It' in option (c) is singular pronoun which cannot be used to refer to the plural noun 'glasses'. So, option (c) is negated as well. </p><p>'So as to' means the same as 'in order to'. Replacing the underlined segment with it makes the sentence contextually and grammatically correct. </p><p><b>The correct sentence is: </b>Large glasses magnified his eyes <b>so as to give</b> him the appearance of a wise owl.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>If you <u>tries</u> to dictate your terms, I don't think we can work together.</p>",
    "options": [
      "try",
      "No substitution",
      "have try",
      "were tried"
    ],
    "correct_option_id": 0,
    "solution": "<p>The pronoun 'you' is used with plural verb, and not the singular verb. So, singular verb 'tries' should be substituted.</p><p>The helping verb 'have' should be followed by the past participle (V3) form of verb, but 'try' is the base verb, so option (c) is incorrect.</p><p>'Were tried' is the construct for the sentence in passive voice, whereas the verb 'tried' is action done by the subject, and not on the subject. So, option (d) is incorrect as well.</p><p>'Try' is the plural verb which can follow the pronoun 'you'. So, option (a) can substitute the underlined segment.</p><p><b>The correct sentence is: </b>If you <b>try</b> to dictate your terms, I don't think we can work together.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence.</p><p>Robinhood <u>broke within</u> the mansion to collect some food and money for the poor.</p>",
    "options": [
      "broke upto",
      "broke in",
      "broke into",
      "broke to"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate option to improve the underlined part of the sentence is 'broke into'. The sentence suggests that Robinhood forcefully entered or unlawfully accessed the mansion in order to collect food and money for the poor. The phrase \"broke within\" does not convey the intended meaning. \"Broke within\" can be interpreted as suggesting breaking something from within. \"Broke into\" is the correct phrasal verb to use when someone forcibly enters a building or property without permission. The use of \"broke into\" implies that Robinhood entered the mansion without permission or authorisation. The options \"broke upto,\" \"broke in,\" and \"broke to\" are not correct phrasal verbs to accurately convey the intended meaning of forcibly entering a building or property without permission. Hence, (c) is the correct answer. </p><p><b>NOTE:</b></p><p><b>Verb phrase:</b> A verb phrase is the verbal part of a clause. A verb phrase has an ordinary verb (come, thought, left, climbing) and may also have an auxiliary verb (had, was, will) Example: She had already thought about the idea before. Here 'thought' is the main verb, 'had' the auxiliary verb and the highlighted part, the verb phrase.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined words in the given sentence.</p><p>The young artist spent countless hours perfecting her craft, <u>trying with various methods</u> and mediums, and honing her creative vision until she had produced a stunning collection of works that showcased her unique talent and perspective.</p>",
    "options": [
      "exploring with different factors",
      "experimenting with different techniques",
      "merging with different variations",
      "researching with different types"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most appropriate option to substitute the underlined words in the given sentence is 'experimenting with different techniques'. The original sentence mentions the artist trying different methods and mediums to perfect her craft. \"Experimenting\" is synonymous with \"trying out\" or \"testing,\" which fits the context of the sentence. This option effectively conveys the idea of the artist's continuous efforts to improve her craft through experimentation with various artistic techniques. Options (a), (c), and (d) do not accurately convey the intended meaning of the original sentence, which is about the artist's active experimentation and practice to perfect her craft using different methods and mediums. \"Exploring with different factors\" suggests examining or investigating various elements or variables. \"Merging with different variations\" suggests combining or blending various versions or types of something, which doesn't fit the context of the sentence. 'Researching with different types' implies conducting research using various types. Hence, (b) is the correct answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option that can replace the bracketed word segment in the following sentence.</p><p>Children should avoid giving out personal details online (which will) identify them or their location.</p>",
    "options": [
      "what will",
      "that could",
      "whichever can",
      "which might lead"
    ],
    "correct_option_id": 1,
    "solution": "<p>The phrase \"that could\" is the most appropriate replacement for \"which will\" in this context. It maintains the meaning while being more accurate about the possibility rather than certainty of identification. \"That could identify them\" suggests a potential risk, which is more appropriate for a warning about online safety. \"What will\" is grammatically incorrect here, \"whichever can\" doesn't fit the context, and \"which might lead\" changes the meaning of the sentence.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p><u>Little</u> that I knew of the English language was not sufficient to make me an English teacher.</p>",
    "options": [
      "So little",
      "A little",
      "The little",
      "Very little"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence is: \"Little that I knew of the English language was not sufficient to make me an English teacher.\"</p><p>&#183; The underlined segment is \"Little that I knew,\" and we need to substitute it with a phrase that conveys a similar meaning but corrects any grammatical issues. The sentence implies that the speaker's knowledge of English was insufficient to qualify as a teacher.</p><p>&#183; The original phrase \"Little that I knew\" is awkward. In English, \"little\" as a quantifier can be used in different forms: \"a little\" (a small amount, positive), \"the little\" (the small amount that exists), or \"little\" (not much, negative). The intended meaning here is \"the small amount of knowledge I had,\" which should be followed by a positive statement, but the sentence uses a double negative (\"was not sufficient\"), making it confusing.</p><p>&#183; Option 1: \"So little\"  -  This would make the sentence \"So little that I knew of the English language was not sufficient,\" which is still awkward due to the double negative. It doesn't improve clarity.</p><p>&#183; Option 2: \"A little\"  -  This means a small amount (positive), so \"A little that I knew of the English language was not sufficient\" implies some knowledge, but the double negative makes it confusing.</p><p>&#183; Option 3: \"The little\"  -  This fits best. \"The little\" refers to the small amount of knowledge the speaker had. The corrected sentence becomes: \"The little that I knew of the English language was not sufficient to make me an English teacher,\" meaning the small amount of knowledge I had wasn't enough. This resolves the awkwardness while maintaining the intended meaning.</p><p>&#183; Option 4: \"Very little\"  -  This would make the sentence \"Very little that I knew of the English language was not sufficient,\" which is grammatically awkward and doesn't improve the sentence.</p><p>Option 3 (\"The little\") is the most appropriate substitution.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>Employers in many developing countries report that a lack of skilled workers is a major and increasing bottleneck for their operations, <u>affected their capacity</u> to innovate.</p>",
    "options": [
      "affect their capacity",
      "effecting their capacity",
      "effect their capacity",
      "affecting their capacity"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence is: \"Employers in many developing countries report that a lack of skilled workers is a major and increasing bottleneck for their operations, affected their capacity to innovate.\" The underlined segment is \"affected their capacity,\" and we need the correct form.</p><p>&#183; The sentence describes how the lack of workers impacts innovation capacity. The underlined part should be a participle modifying \"operations\" or a verb consistent with the clause.</p><p>&#183; \"Affect\" (verb) means to influence; \"effect\" (noun) means result, or (verb) to bring about.</p><p>&#183; Option A (\"affect their capacity\"): Present tense \"affect\" doesn't match the participle form needed to parallel \"increasing bottleneck.\"</p><p>&#183; Option B (\"effecting their capacity\"): \"Effecting\" means causing something to happen, which is incorrect here; we need \"influencing.\"</p><p>&#183; Option C (\"effect their capacity\"): \"Effect\" as a verb is wrong, and it doesn't fit grammatically.</p><p>&#183; Option D (\"affecting their capacity\"): The gerund/participle \"affecting\" correctly describes the ongoing impact on capacity, parallel to \"increasing\" (e.g., \"a bottleneck.. affecting their capacity\").</p><p>The corrected sentence is: \".. a major and increasing bottleneck for their operations, affecting their capacity to innovate.\" Thus, Option D is correct.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>Grasslands should not be <u>foraged and some places are to be</u> closed for grazing.</p>",
    "options": [
      "over-grazed and some areas should be",
      "cut and few areas",
      "grazed and some places is",
      "planted or"
    ],
    "correct_option_id": 0,
    "solution": "<p>The underlined segment \"foraged and some places are to be\" is incorrect. \"Foraged\" is not typically used for grasslands (it's more for gathering food), and the verb tense/structure is awkward. The option \"over-grazed and some areas should be\" is correct, as \"over-grazed\" means excessively grazed, harming grasslands, and \"areas\" is more precise than \"places.\" The corrected sentence is: \"Grasslands should not be over-grazed and some areas should be closed for grazing.\"</p><p>&#183; Option 1 (\"over-grazed and some areas should be\") is correct and precise.</p><p>&#183; Option 2 (\"cut and few areas\") changes the meaning to cutting grass, incorrect.</p><p>&#183; Option 3 (\"grazed and some places is\") has a subject-verb agreement error (\"places is\").</p><p>&#183; Option 4 (\"planted or\") changes the meaning entirely.</p><p>Thus, the correct substitution is over-grazed and some areas should be.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Parts of the given sentence have been underlined. One of them contains an error. The underlined parts are given as options with some changes. Select the option that correctly rectifies the error.</p><p><u>Raveena's daughter</u> Kavya is <u>most intelligent</u> student and <u>she consistently</u> achieves <u>top grades</u>.</p>",
    "options": [
      "Raveenas' daughter",
      "she has consistently",
      "an intelligent",
      "topper grades"
    ],
    "correct_option_id": 2,
    "solution": "<p>The phrase \"most intelligent student\" lacks the definite article 'the'. It should be \"the most intelligent student\" or \"an intelligent student.\" Option (c) corrects this by providing the phrase \"an intelligent.\"</p><p>Option a: Incorrect. \"Raveenas' daughter\" introduces a spelling error (apostrophe misuse) and doesn't fix the article issue.</p><p>Option b: Incorrect. \"She has consistently\" changes the verb tense unnecessarily and doesn't address the article error.</p><p>Option d: Incorrect. \"Topper grades\" is not idiomatic; \"top grades\" is correct as is.</p><p>The correct sentence is: Raveena's daughter Kavya is an intelligent student, and she consistently achieves top grades.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most suitable expression that can substitute the underlined part of the sentence without any change in meaning.</p><p>Planning to go for a movie just before the final-year examination is nothing but <u>skating on thin ice</u>.</p>",
    "options": [
      "doing hard work",
      "enjoying the moment",
      "going to hill stations",
      "being in a risky situation"
    ],
    "correct_option_id": 3,
    "solution": "<p>The idiom \"skating on thin ice\" means engaging in a risky or dangerous activity. The context of going to a movie before exams suggests a risky choice due to time constraints, making \"being in a risky situation\" the best substitute.</p><p>Doing hard work: Contradicts the risky connotation.</p><p>Enjoying the moment: Suggests pleasure, not risk.</p><p>Going to hill stations: Unrelated to the context or idiom.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 16
  },
