    ],
    "correct_option_id": 2,
    "solution": "<p>When the person doing the action is the subject, the sentence is said to be in active form/voice. When the subject is what the action is directed at, then the sentence is said to be in passive form/voice. For example: Active Voice: Rita and her friends performed a skit. Here 'Rita and her friends' (subject) perform the action. Passive Voice: A skit was performed by Rita and her friends. Here 'skit' is the subject (at which the action is directed).</p><p>Only in option c), the subject \"I\" is what the action is directed at.</p><p>The passive voice in option (c) is in the <b>Past Indefinite tense</b>.</p><p>In Passive voice, the format will be: Object of the active voice (Subjective case) + was/were + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>Real Madrid won the Champions League. (Active Voice)</p><p>The Champions League was won by Real Madrid. (Passive Voice)</p><p>Hence, option (c) is the answer.</p>",

  },
  {
    "question": "<p>Choose the correct Active/Passive sentence:</p><p></p>",

    ],
    "correct_option_id": 1,
    "solution": "<p>In an active voice sentence, the following format can be seen 'Subject + Verb (tense may vary) + Object'. For a passive voice sentence, the format is 'Subject (objective case of Active voice) + Verb (based on tense in Active voice) + by + Object (subjective case of the Active voice)'.</p><p>Among the given options, the only sentence that appropriately follows the grammatical rules of an Active voice sentence is option (b), 'The authorities stopped the vehicles due to cold weather'. </p><p>Options (a), (c) and (d) do not comply with the grammatical requirements of an Active or Passive voice sentence and thus they are negated.</p><p>Hence, the correct answer is option (b).</p><p>Note:</p><p><b>Active and Passive Voice: </b>When the person doing the action is the subject, the sentence is said to be in active form/voice. When the subject is what the action is directed at, then the sentence is said to be in passive form/voice. For example: Active Voice: Rita and her friends performed a skit. Here 'Rita and her friends' (subject) perform the action. Passive Voice: A skit was performed by Rita and her friends. Here 'skit' is the subject (at which the action is directed).</p>",

  {

    ],
    "correct_option_id": 3,
    "solution": "<p>In Passive voice, the format is: Object of the Active voice (Subjective case) + was/were + being + V3 + by + Subject of the Active voice (Objective case).</p><p>The format of Active voice is: Subject + was/were + V1 + ing + Object.</p><p>For example:</p><p>Math was being practised by Amit. (Passive Voice)</p><p>Amit was practising Math. (Active Voice)</p><p>The options except (d) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is:<b><i> The speech was being given by the politician.</i></b></p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>The incident is orchestrated by a pro. Finding the person behind it is begun by the owner.</p>",

      "A pro orchestrates the incident. The owner begins finding the person behind it.",

    ],
    "correct_option_id": 0,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" ('is' in this case) verb and the preposition 'by' is necessary while changing the voice of the sentence from Passive to Active.</p><p>The Passive voice in this question is in <b>Present Indefinite tense</b>. Thus, the Active voice will also be in Present Indefinite.</p><p>In Passive voice, the format is: Object of the Active voice (Subjective case) + am/is/are + V3 + by + Subject of the Active voice (Objective case).</p><p>Thus, the format of Active voice is: Subject + V1/V5 + Object.</p><p>For example:</p><p>You are liked by her. (Passive Voice)</p><p>She likes you. (Active Voice)</p><p>The options except (a) don't follow the correct grammatical format of the Active Voice.</p><p>Hence, the correct answer is option (a).</p><p>Note:</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 3
  },

    "question_index": 4
  },

    "question_index": 5
  },
  {
    "question": "<p>Describe how you will say What is Tina carrying in her bag? in passive voice.</p>",

      "When is being carried by Tina in her bag?",
      "When is carried by Tina in her bag?",
      "Why will be carried by Tina in her bag?",
      "What is being carried by Tina in her bag?"
    ],
    "correct_option_id": 3,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of the verb 'being' is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The question in Active voice is in interrogative form. These are \"wh\" questions that don't take \"yes\" or \"no\" as an answer.</p><p><b>Case 1: </b>\"Which/What\" etc are placed as they are.</p><p>For example:</p><p>What are you doing? (Active)</p><p>What is being done by you? (Passive)</p><p><b>Case 2: </b>When \"Which/What\" is used as a subject in Active voice, it is changed into \"By what\" in Passive voice.</p><p>For example:</p><p>What is making you happy? (Active)</p><p>By what are you being made happy? (Passive)</p><p>Also, the sentence is in the <b>Present continuous tense </b>in the Active voice. So, in the Passive voice, <b>Present continuous tense</b> should be used.</p><p>The options except (d) don't follow the correct grammatical format of the Passive Voice.</p><p>Hence, the correct answer is option (d).</p><p>Note:</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 6

  {
    "question": "<p>Describe how you will say The priest had closed the temple in passive voice.</p>",

      "The manager wants you.",

    "correct_option_id": 0,

    "question_index": 8

  {
    "question": "<p>Describe how you will say The large pill might be swallowed by him in active voice.</p>",
    "options": [
      "He might have swallowed the large pill.",
      "He might be swallowing the large pill.",
      "He might swallow the large pill.",
      "He might swallowed the large pill."
    ],
    "correct_option_id": 2,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" verb 'be' and the preposition \"by\" is necessary while changing the voice of the sentence from Passive to Active.</p><p>These types of questions contain Modal verbs and they should be used correctly as stated below.</p><p>Some of the modal verbs are: <b>Can, could, may, might, shall, should, will, would, must, ought to</b>.</p><p>In Passive voice, the format is: Object of the Active voice (Subjective case) + Modal + be + V3 + by + Subject of the Active voice (Objective case).</p><p>Thus, the format of such a sentence in Active voice is: Subject + Modal + V1 + Object.</p><p>For example:</p><p>This can be done by you. (Passive Voice)</p><p>You can do this. (Active Voice)</p><p>The options except (c) don't follow the correct grammatical format of the Active Voice.</p><p>Hence, the correct answer is option (c).</p><p>Note:</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p><p><b>Modal verb:</b> A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p>",

  {
