<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution required'.</p><p>As Simon had already been to the park, he <u>lead the wa</u>y for the other children.</p>",
    "options": [
      "leading the way",
      "lead away",
      "led the way",
      "No substitution required"
    ],
    "correct_option_id": 2,
    "solution": "<p>The singular subject 'he' cannot be followed by the plural verb 'lead'. So, the underlined phrase requires correction. Option (b) is incorrect for the same reason. </p><p>Option (a) is incorrect because the -ing form of the verb requires a helping verb like is/am/are before it, which is not the case here. </p><p>The correct sentence is: As Simon had already been to the park, he <u>led the wa</u>y for the other children.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the words in the brackets in the given sentence.</p><p>The bridge which (connecting) the two cities has been destroyed by the bomb.</p>",
    "options": [
      "connected",
      "has connecting",
      "connects",
      "will be connecting"
    ],
    "correct_option_id": 0,
    "solution": "<p>The bridge has been destroyed which implies that the bridge connecting the two cities was the thing of past.</p><p>So, 'connected' is apt to substitute the bracketed segment.</p><p>The correct sentence is: The bridge which connected the two cities has been destroyed by the bomb.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution required'.</p><p>By the time his friends woke up, he had already <u>begun</u> his journey.</p>",
    "options": [
      "begin",
      "No substitution required",
      "began",
      "beginning"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence is grammatically and contextually correct. Hence, option (b) is the answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>Football fans <u>are feelin</u>g <u>proud of their teams</u> when they win.</p>",
    "options": [
      "felt proud to their teams",
      "feel proud of their teams",
      "are feel to proud of their teams",
      "feeling proud of their teams"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given sentence does not describe a situation that is happening at present. So, the use of 'are feeling' (present continuous tense) is incorrect. Option (d) is incorrect for the same reason.</p><p>'Proud' will be followed by 'of'. So, option (a) is incorrect as well.</p><p>'Are' should be followed by either past participle (V3) or present participle (V4), none of which is a case in option (c). So, option (c) is incorrect as well.</p><p>Replacing the underlined segment with option (b) will make the sentence grammatically and contextually correct.</p><p>The correct sentence is: Football fans <u>feel proud of their teams</u> when they win.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution required'.</p><p><u>Had </u>I a rich person, I would share my wealth.</p>",
    "options": [
      "Were I",
      "I am",
      "No substitution required",
      "Had I been"
    ],
    "correct_option_id": 0,
    "solution": "<p>\"Were I\" is a more grammatically correct way to express the hypothetical condition. The corrected sentence would be: \"Were I a rich person, I would share my wealth.\"</p><p>Hence, option (a) is correct.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution required'.</p><p>A large <u>swarm of</u> dogs was blocking the way.</p>",
    "options": [
      "pack of",
      "No substitution required",
      "herd of",
      "school of"
    ],
    "correct_option_id": 0,
    "solution": "<p>A group of dogs is called 'pack'. So, option (a) 'pack of' is an apt substitute. </p><p>Swarm - a large or dense group of flying insects.</p><p>Herd - a large group of animals, especially hoofed mammals, that live together or are kept together as livestock.</p><p>School  -  A group of fish. </p><p>Hence, option (a) is the answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate segment to substitute the underlined words in the given sentence.</p><p>The referee declared that the participant <u>who will score the highest points</u> in the tally will take away the cash prize of 50 lakh.</p>",
    "options": [
      "who can score the highest point",
      "who could score the highest point",
      "who scores the highest point",
      "who settles scores the highest point"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence requires the present tense \"scores\" for a general rule about the competition, and \"points\" should remain plural for consistency.</p><p>Who can score the highest point: \"Can\" implies possibility, not certainty, and \"point\" is singular, incorrect for a tally.</p><p>Who could score the highest point: Past tense \"could\" and singular \"point\" are incorrect.</p><p>Who settles scores the highest point: Illogical phrasing and singular \"point.\"</p><p>The correct sentence: The referee declared that the participant who scores the highest points in the tally will take away the cash prize of 50 lakh.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. </p><p>My friend <u>vanished when the goons came</u> to fight with me.</p>",
    "options": [
      "mobilised when the thugs arrived",
      "attacked when the thugs arrived",
      "disappeared when the thugs arrived",
      "condemned when the thugs arrived"
    ],
    "correct_option_id": 2,
    "solution": "<p>The underlined word, \"vanished,\" means to disappear suddenly. The sentence implies that the friend left or fled when trouble (goons) arrived. The option that best improves the sentence should maintain this meaning while possibly enhancing clarity or context.</p><p>Option a, \"mobilised,\" means to organize or prepare, which doesn't fit.</p><p>Option b, \"attacked,\" suggests aggression, which is opposite to fleeing.</p><p>Option c, \"disappeared when the thugs arrived,\" maintains the meaning of \"vanished\" (disappeared) and replaces \"goons\" with \"thugs,\" a synonym that fits well in formal tone.</p><p>Option d, \"condemned,\" means to criticize, which is unrelated.</p><p>The revised sentence: My friend disappeared when the thugs arrived to fight with me.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>No sooner had she finished her breakfast <u>that she had received</u> a phone call from her boss, informing her that she needed to come to work immediately.</p>",
    "options": [
      "than she receives",
      "than she received",
      "that she receives",
      "that she received"
    ],
    "correct_option_id": 1,
    "solution": "<p>The structure \"no sooner\" is followed by \"than\" in standard English to indicate two events happening in quick succession. The underlined segment, \"that she had received,\" is incorrect because \"that\" should be \"than,\" and the verb tense should be past simple (\"received\") to match the sequence of events in the past, as \"had finished\" is past perfect, indicating the first action.</p><p>Option a, \"than she receives,\" uses present tense, which is incorrect for a past event.</p><p>Option b, \"than she received,\" corrects \"that\" to \"than\" and uses the correct past tense.</p><p>Option c, \"that she receives,\" retains \"that\" and uses incorrect present tense.</p><p>Option d, \"that she received,\" retains the incorrect \"that.\"</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>The company plans <u>to expand</u> its business to the international market.</p>",
    "options": [
      "to limit",
      "to contract",
      "to reduce",
      "to increase"
    ],
    "correct_option_id": 3,
    "solution": "<p>\"Expand\" means to grow or increase in scope. \"To increase\" is the most appropriate substitute, maintaining the meaning. </p><p>The sentence remains: \"The company plans to increase its business to the international market.\"</p><p>Option a: to limit  -  Opposite, meaning to restrict.</p><p>Option b: to contract  -  Opposite, meaning to shrink.</p><p>Option c: to reduce  -  Opposite, meaning to decrease.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option with correct usage of the preposition to substitute the underlined segment in the given sentence.</p><p>The Centre of Excellence for Data Analytics (CEDA) provides quality data analytic services to <u>various government departments on all levels</u> as well as to public sector units at the Centre and in states.</p>",
    "options": [
      "various government departments at all levels",
      "various government departments from all levels",
      "various government departments in all levels",
      "various government departments through all levels"
    ],
    "correct_option_id": 0,
    "solution": "<p>The preposition \"at\" is correct for indicating specific levels of government (e.g., local, state, national). </p><p>The corrected sentence is: \"The Centre of Excellence for Data Analytics (CEDA) provides quality data analytic services to various government departments at all levels as well as to public sector units at the Centre and in states.\"</p><p>Option b: from all levels  -  \"From\" implies origin, not the scope of service.</p><p>Option c: in all levels  -  \"In\" is less precise for levels of hierarchy.</p><p>Option d: through all levels  -  \"Through\" suggests movement, not static service provision.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution':</p><p>The woman <u>to who I sold</u> my house was a criminal.</p>",
    "options": [
      "to whom sold",
      "No substitution",
      "to whom I sold",
      "to whom I sell"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence is: \"The woman to who I sold my house was a criminal.\" The underlined segment \"to who\" is incorrect. In English, \"who\" is used as a subject, while \"whom\" is used as an object, especially after prepositions like \"to.\" Here, \"to\" is a preposition, and the relative pronoun refers to \"the woman,\" the object of the clause \"I sold my house.\" Thus, \"whom\" is correct. The correct structure is \"to whom I sold,\" making the sentence: \"The woman to whom I sold my house was a criminal.\" Among the options:</p><p>to whom sold lacks the subject \"I,\" making it grammatically incorrect.</p><p>No substitution is incorrect as \"to who\" is wrong.</p><p>to whom I sold is the correct structure.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined words in the given sentence.</p><p>We should not <u>underestimate the signification</u> of female education.</p>",
    "options": [
      "underestimate signification",
      "underestimate at signification",
      "underestimate the significance",
      "underestimate on signification"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence is: \"We should not underestimate the signification of female education.\" The underlined word \"signification\" means meaning or importance, but it is less commonly used in this context compared to \"significance,\" which is more precise and standard for referring to importance. Additionally, \"underestimate\" is typically followed by a direct object with \"the\" when referring to a noun like \"significance.\" <br clear=all> </p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p><u>Half of the properly given</u> to his sons by the businessman last year.</p>",
    "options": [
      "Half of the property has been given",
      "Half of the properly was given",
      "No substitution",
      "Half of the property is given"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence is: \"Half of the properly given to his sons by the businessman last year.\" The underlined segment is \"properly given,\" where \"properly\" (meaning correctly or appropriately) is likely a typo for \"property\" (meaning possessions or assets), as the context suggests the businessman gave assets to his sons. Additionally, the sentence lacks a verb to make it grammatically complete. The correct tense, given \"last year,\" is past, so \"was given\" is appropriate. Analyzing the options:</p><p>\"Half of the property has been given\" uses the present perfect tense, which is incorrect for an event last year.</p><p>\"Half of the properly was given\" corrects \"properly\" to \"property\" and uses the correct past tense \"was given,\" though \"properly\" in the option seems to be a typo in the question paper, as the context implies \"property.\"</p><p>No substitution is incorrect because \"properly\" is a typo and the sentence lacks a verb.</p><p>\"Half of the property is given\" uses the present tense, which is incorrect for a past event. Assuming \"properly\" in the original sentence is a typo for \"property,\" the correct substitution is Half of the property was given.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence.</p><p>The bus is now full of passengers, it <u>will leave</u> soon.</p>",
    "options": [
      "leaves",
      "is leaving",
      "is going to leave",
      "has to leave"
    ],
    "correct_option_id": 2,
    "solution": "<p>When the plans are definite, then we should use 'is/are going to' in place of 'will'. So, the underlined phrase should be replaced with 'is going to leave'.</p><p>The correct sentence is: The bus is now full of passengers, it <u>is going to leave</u> soon.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>The company decided to <u>sell</u><u> </u><u>their</u><u> </u><u>stake in</u><u> </u><u>their</u><u> </u><u>subsidiary </u>because it was under massive debts.</p>",
    "options": [
      "sell their stake in its subsidiary",
      "No substitution",
      "sell its stake in their subsidiary",
      "sell its stake in its subsidiary"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate option that can substitute the underlined segment in the given sentence is 'sell its stake in its subsidiary' because it ensures grammatical agreement between the subject and the possessive pronoun. In the original sentence, the subject \"company\" is singular, so the possessive pronoun \"its\" is the correct choice to indicate ownership by the company. Therefore, by using \"its\" in both instances, we achieve grammatical consistency and accuracy in the sentence. Hence, (d) is the correct answer.</p><p><b>Note:</b></p><p>A pronoun is a word that is used in place of a noun or a noun phrase.</p><p><b>Possessive Pronouns: </b>The pronouns mine, yours, hers, his, ours, and theirs are known as possessive pronouns: they refer to something owned by the speaker or by someone or something previously mentioned. For example: The pen is mine.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>The Karaoke programme <u>was planned by the club</u> was a grand success.</p>",
    "options": [
      "were planned by the club",
      "No substitution",
      "has been planned by the club",
      "planned by the club"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate option that can substitute the underlined segment in the given sentence is 'planned by the club'. The option 'planned by the club' is a concise and effective substitution that maintains the intended message while improving the sentence's clarity and conciseness. This option eliminates the redundancy (was) and effectively communicates that the Karaoke program was organized by the club.</p><p>Hence, (d) is the correct answer.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence.</p><p>In today's digital age, information is widely available to everyone <u>by many means</u> of media such as television, newspapers, films, and social media.</p>",
    "options": [
      "with quite enough of mechanisms",
      "through any strategies",
      "via various forms",
      "among many techniques"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate option that can substitute the underlined segment in the given sentence is 'via various forms'. The original sentence conveys the idea that in today's digital age, information is widely accessible through various mediums such as television, newspapers, films, and social media. But the phrase 'many means' is not correct. It should be 'various means'. Option (c) succinctly communicates that information is accessible through different mediums or channels. \"Via various forms\" means \"through different channels\" or \"by different means.\"</p><p>Option (a) does not effectively convey the idea of information being accessible through different channels or mediums. The phrase \"quite enough of mechanisms\" is grammatically awkward and doesn't fit well in the context of the sentence.</p><p>Option (b) implies that information is accessible through any kind of strategic approach. However, it doesn't accurately convey the idea of different channels or mediums through which information is disseminated. </p><p>Option (d) suggests that there are various techniques for accessing information. This option doesn't effectively convey the idea of different channels or mediums. The word \"techniques\" implies specific methods or approaches, rather than the diverse mediums mentioned in the original sentence. Hence, (c) is the correct answer. </p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence.</p><p>The secretary to my boss is very efficient as he not only gives him the required information <u>and also handles</u> correspondence independently.</p>",
    "options": [
      "yet also handles",
      "but also handles",
      "along with also handles",
      "not also handles"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most suitable option to substitute the underlined segment in the sentence is 'but also handles'. In the given sentence, the phrase 'not only' is used to introduce the first of two or more alternatives that are being considered for concurrency, while 'but also' is used to introduce the second of two or more items that are to be connected. The use of 'but also' in the sentence helps to maintain the intended parallelism of the two actions performed by the secretary, simultaneously. It effectively demonstrates that the secretary not only provides the required information but also independently manages correspondence. The other options either do not provide the necessary concurrency or do not fit grammatically within the structure of the sentence. Hence, (b) is the correct answer.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If no substitution is required, select 'No substitution'.</p><p>Many artisans were <u>almost without any</u> work during the pandemic.</p>",
    "options": [
      "any without almost",
      "without any almost",
      "No substitution",
      "almost any without"
    ],
    "correct_option_id": 2,
    "solution": "<p>The underlined phrase 'almost without any work' is grammatically and contextually correct and requires no correction.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 19
  }
];
    </script>
