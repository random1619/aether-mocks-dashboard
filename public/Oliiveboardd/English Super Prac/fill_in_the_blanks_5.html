<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Income inequality will always exist in a market economy where people are allowed to engage in free exchange and earn incomes according to ______________ personal capabilities.</p>",
    "options": [
      "Its",
      "There",
      "It's",
      "Their"
    ],
    "correct_option_id": 3,
    "solution": "<p>The given blank will take the plural possessive adjective 'their' (means 'belonging to or associated with the people or things previously mentioned or easily identified') as it refers to 'people' [plural noun] mentioned in the sentence. 'Its' (which is a singular determiner) cannot be used for the plural noun 'people'. The use of 'it's' (contraction for 'it is/has') and 'there' [adverb] is incorrect in the sentence. Hence, the answer is option d).</p><p>Note:</p><p>A possessive determiner is a pronoun that is used to express possession or belongingness. It helps the reader know who or what owns the noun that it determines. Possessive determiners include pronouns such as 'my', 'your', 'our', 'his', 'her', 'their' and 'its'.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank(s).</p><p>The street vendors submitted _________ request to allocate ___________ a new location for their shops.</p>",
    "options": [
      "their, them",
      "them, this",
      "his, that",
      "hers, their"
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence is about street vendors and their request for the allocation of new locations for their shops. Now, let us consider the first blank. The first blank requires a possessive adjective to denote the subject 'street vendors'. 'Them' is a pronoun that is used as the object of a verb or preposition to refer to two or more people or things previously mentioned or easily identified. Also, possessive adjectives, and not objective pronouns, are followed by nouns. So, option b) is eliminated.</p><p>'His' and 'hers' are also pronouns that denote a singular noun. But we already know that 'street vendors' is a plural noun and so these two pronouns do not fit. Therefore, options (c) and (d) are also eliminated.</p><p>In option (a), 'their' is the possessive adjective that relates with the plural subject 'street vendors' and 'them' is used as the object of a verb or preposition to refer to two or more people or things previously mentioned or easily identified. These two words match the context of the sentence and thus they both fit the blanks respectively.</p><p>Hence, the correct answer is option (a).</p><p><b>Note: </b><b>Possessive Determiners/Adjectives:</b> Words like <b><i>'my', 'our', 'your', 'his', 'her', 'its'</i></b>, and <b><i>'their'</i></b> are known as possessive adjectives (or possessive determiners). They come before nouns and <b>indicate ownership</b> of the noun. <b>Example:</b> \"The teacher asked the students to open <b><i>their</i></b> drawing books.\"</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p><u>Your's truly</u>, honoured to be of service and eager to assist in any way possible, extends sincere regards and remains faithfully dedicated to supporting your needs and aspirations.</p>",
    "options": [
      "Yours truly",
      "Yours' truly",
      "Yours's truly",
      "No improvement"
    ],
    "correct_option_id": 0,
    "solution": "<p>An apostrophe is not used with possessive pronouns (his, hers, yours, ours, theirs). Example- yours faithfully, yours truly.</p><p>The correct sentence is  -  <b><i>\"Yours truly, honoured to be of service and eager to assist in any way possible, extends sincere regards and remains faithfully dedicated to supporting your needs and aspirations.\"</i></b></p><p>Hence, option (a) is correct.</p><p>Note:</p><p>A possessive pronoun is a pronoun used to indicate ownership (e.g., This hat is mine). The English possessive pronouns are mine, ours, yours, his, hers, theirs, and whose.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error. </p><p>The government <u>allocated</u> funds <u>to</u> enhance <u>it's</u> public <u>transportation</u> system.</p>",
    "options": [
      "To",
      "Allocated",
      "Transportation",
      "It's"
    ],
    "correct_option_id": 3,
    "solution": "<p>The part that contains the error is 'it's'. The error lies in the incorrect use of the contraction \"it's\". The word \"it's\" is a contraction of \"it is\" or \"it has\". However, in the given sentence, the intended meaning is to indicate possession, which requires the possessive form \"its\". \"Its\" is a possessive determiner used to indicate that something belongs to or is associated with something previously mentioned. In the sentence, \"its\" indicates possession, showing that the public transportation system belongs to the government. Therefore, to rectify the error, 'it's' should be replaced with 'its'. Hence, (d) is the correct answer.</p><p><b>The correct sentence is: </b>The government allocated funds to enhance <b>its</b> public transportation system.</p><p><b>NOTE:</b></p><p><b>Possessive Determiners/Adjectives</b>: Words like 'my', 'our', 'your', 'his', 'her', 'its', and 'their' are known as possessive adjectives (or possessive determiners). They come before nouns and indicate ownership of the noun. Example: \"The teacher asked the students to open their drawing books.\"</p>",
    "question_index": 3
  },
  {
    "question": "<p>Choose the right word to complete the sentence.</p><p>That blue coat hanging over there is ____. </p>",
    "options": [
      "Me",
      "Mine",
      "Her",
      "Him"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given sentence requires a pronoun that shows possession of the blue coat. Among the given options, only <i>mine</i> is the possessive pronoun. Hence, (b) is the correct answer. </p><p>Note: Possessive pronouns are words used to indicate that something belongs to someone or has a direct relationship with someone else. </p>",
    "question_index": 4
  },
  {
    "question": "<p>Which of the following sentences is grammatically CORRECT?</p>",
    "options": [
      "You, she and I will get a reward for this voluntary work.",
      "She, I and you will get a reward for this voluntary work.",
      "You, I and she will get a reward for this voluntary work.",
      "She, you and I will get a reward for this voluntary work."
    ],
    "correct_option_id": 0,
    "solution": "<p>When expressing a positive idea or praise, the order of pronouns should be: Second person, third person, and first person. Hence, (a) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Consider the following three statements and choose the CORRECT one(s):</p><p>I. I, you and she spoiled the whole event. </p><p>II. You, she and I spoiled the whole event. </p><p>III. She, you and I spoiled the whole event. </p>",
    "options": [
      "Only II and III",
      "Only I and II",
      "Only I",
      "Only II"
    ],
    "correct_option_id": 2,
    "solution": "<p>When confessing a fault or expressing a negative idea, the order is: First person, second person, and third person. Hence, (c) is the correct answer. </p>",
    "question_index": 6
  },
  {
    "question": "<p>Fill in the blank with the appropriate pronoun from the given options:</p><p>____ are going to re-lay the road under the flyover. </p>",
    "options": [
      "They",
      "It",
      "He",
      "She"
    ],
    "correct_option_id": 0,
    "solution": "<p>The verb 'are' is used with the pronouns  -  We, you and they. Hence, (a) is the correct answer. </p><p>The pronouns- He, she, it, that- take 'is' as the verb and with the pronoun 'I', we use 'am'. </p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Tushar is one of the top scorers among boys. Also, _____ records are unbroken.</p>",
    "options": [
      "her",
      "hers",
      "he",
      "his"
    ],
    "correct_option_id": 3,
    "solution": "<p>The blank requires a possessive determiner as it is followed by a noun. From the sentence, it is clear that the gender of the subject is male. So, 'his' is the correct choice among the given options. </p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Prerna is the leader of the ladies' wing. So, while asking the opinions of the legislators, the principal asked _____ as well.</p>",
    "options": [
      "his",
      "him",
      "hers",
      "herself"
    ],
    "correct_option_id": 2,
    "solution": "<p>Options (a) and (b) are eliminated as they correspond to a male. A subjective pronoun cannot be used here because the pronoun in the blank is the objective case of the verb 'asked'. The blank should be replaced with a possessive pronoun as the principal asked for Prerna's opinion. So, 'hers' is the most appropriate choice. </p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>There was no one to support her. So, she introduced ______ to the panel.</p>",
    "options": [
      "her",
      "him",
      "herself",
      "she"
    ],
    "correct_option_id": 2,
    "solution": "<p>Here, the subject and object of the verb 'introduced' is the same. So, a reflexive pronoun should be used here. Therefore, among the given options, 'herself' is the most appropriate choice. </p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Which of the following is not a possessive determiner? </p>",
    "options": [
      "my",
      "our",
      "your",
      "hers"
    ],
    "correct_option_id": 3,
    "solution": "<p>A possessive determiner is used to modify a noun. It is used before a noun. Among the given options all except (d) are possessive determiners. 'Hers' is a possessive pronoun. It is used in place of a noun. 'Hers' means 'her something'. </p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>Are there no human (A)/ rights for this children (B)/ and women who were hit by (C)/ stones on their heads? (D)</p>",
    "options": [
      "B",
      "D",
      "A",
      "C"
    ],
    "correct_option_id": 0,
    "solution": "<p>Part B has an error. </p><p>'Children' is a plural noun. So, we cannot use the demonstrative adjective 'this' here because it is used to refer to singular nouns. These/those should be used in the given sentence. </p><p>Hence, option (a) is the correct answer. </p><p>The correct sentence is: Are there no human rights for these/those children and women who were hit by stones on their heads?</p>",
    "question_index": 12
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>To change (A)/ one's name now, (B)/ he will need to have their (C)/ birth registered in the state. (D)</p>",
    "options": [
      "B",
      "A",
      "D",
      "C"
    ],
    "correct_option_id": 3,
    "solution": "<p>Part C has an error. </p><p>In the given sentence, 'one' is an indefinite pronoun. If 'one' is used in a sentence to refer to 'people in general', the same pronoun should be used throughout the sentence. So, the pronoun 'he' should be replaced with 'one' to rectify the given sentence. </p><p>The correct sentence is: To change one's name now, one will need to have their birth registered in the state.</p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 13
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>A study by (A)/ Corbett Tiger Reserve authorities claims (B)/ that tigers, elephants and leopards have been (C)/ killing each other. (D)</p>",
    "options": [
      "D",
      "B",
      "A",
      "C"
    ],
    "correct_option_id": 0,
    "solution": "<p>Part D has an error. </p><p>'Each other' is used when we talk about two things. In the given sentence, we talk about more than two types of animals. So, 'one another' should be used here. </p><p>Hence, option (a) is the correct answer. </p><p>The correct sentence is: A study by Corbett Tiger Reserve authorities claims that tigers, elephants and leopards have been killing one another.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>She was married to one of the policemen ______ first wife had passed away before having a child.</p>",
    "options": [
      "whom",
      "whose",
      "which",
      "who"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given options are relative pronouns. The blank is followed by a noun. So, the relative pronoun in the blank should be a possessive case. Therefore, 'whose' is the correct choice among the given options. </p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 15
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>In many ways, she (A)/ was a reluctant heroine of the Mutiny, (B)/ whom happened to be at (C)/ the wrong place at the right time. (D)</p>",
    "options": [
      "D",
      "A",
      "C",
      "B"
    ],
    "correct_option_id": 2,
    "solution": "<p>Part C has an error.</p><p>In the given sentence, 'she' is the subject of the sentence. The relative pronoun 'whom' refers to the object of a sentence. So, its use is grammatically incorrect in the given sentence. 'Whom' should be replaced with the relative pronoun 'who' to rectify the given sentence. 'Who' is used to refer to the subject of a sentence. </p><p>Hence, option (c) is the correct answer. </p><p>The correct sentence is: In many ways, she was a reluctant heroine of the Mutiny, who happened to be at the wrong place at the right time.</p>",
    "question_index": 16
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>The producer and director of the (A)/ film, Rahul Shah arrived at the hotel (B)/ yesterday and they are (C)/ eager to meet you. (D)</p>",
    "options": [
      "A",
      "C",
      "B",
      "D"
    ],
    "correct_option_id": 1,
    "solution": "<p>Part C has an error. </p><p>When two singular nouns are joined by 'and', and they refer to the same person or thing, the pronoun used must be singular in number. In this case, the definite article is placed before the first noun. So, the pronoun 'they are' is grammatically incorrect in the given sentence because it is a plural noun. It should be replaced with 'he is' to rectify the given sentence. </p><p>Hence, option (b) is the correct answer. </p><p>The correct sentence is: The producer and director of the film, Rahul Roy arrived at the hotel yesterday and he is eager to meet you.</p>",
    "question_index": 17
  },
  {
    "question": "<p>In the following question, a sentence is given with a phrase highlighted in bold. Select the option given below that can replace the phrase in bold to make the sentence grammatically and contextually correct and mark that as your answer. If the sentence is correct as it is, mark 'No correction required', as the answer.</p><p>Every student and each teacher <b>are working</b> hard to improve the results. </p>",
    "options": [
      "work",
      "were working",
      "is working",
      "No correction required"
    ],
    "correct_option_id": 2,
    "solution": "<p>When two singular nouns are joined by 'and', and are preceded by each or every, a singular verb should follow. So, 'are working' is grammatically incorrect because it is a plural verb. Among the given options, 'is working' is the only correct choice. </p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 18
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>My opponent is (A)/ a good player and (B)/ very unpredictable, but I am (C)/ mentally tougher than she. (D)</p>",
    "options": [
      "D",
      "B",
      "A",
      "C"
    ],
    "correct_option_id": 0,
    "solution": "<p>Part D has an error. </p><p>A pronoun directly after 'than' or 'as' is usually in the <b>accusative case</b> (objective case) unless there is a verb after it. If a verb follows it, the <b>nominative form</b> (subjective case) is used. Since there is no verb after 'she' (subjective pronoun), it is grammatically incorrect. It should be replaced with the accusative case 'her' (objective pronoun) to rectify the given sentence. </p><p>Hence, option (a) is the correct answer. </p><p>The correct sentence is: My opponent is a good player and very unpredictable, but I am mentally tougher than her.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
