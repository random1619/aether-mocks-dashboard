    <script>
        const questions = [
  {
    "question": "<p>Spot the error in the given sentence and select the correct sentence from the options given.</p><p>Me and my friend have decided to volunteer for the community cleanup drive.</p>",
    "options": [
      "My friend and I has decided to volunteer for the community cleanup drive.",
      "Me and my friend has decided to volunteer for the community cleanup drive.",
      "My friend and I have decided to volunteer for the community cleanup drive.",
      "My friend and me have decided to volunteer for the community cleanup drive."
    ],
    "correct_option_id": 2,
    "solution": "<p>The error in the original sentence is the use of the object pronoun \"me\" in the subject position.</p><p>The subject of a sentence is the person or thing performing the action. The subject pronoun is \"I\". The object of a sentence receives the action, and the object pronoun is \"me\". In this sentence, the action is \"have decided\", and the ones deciding are \"my friend\" and \"I\". Therefore, the subject pronoun \"I\" must be used.</p><p>Pronoun Order: When referring to yourself and another person, it is considered grammatically conventional to mention the other person first, in the positive sentences.</p><p>Option a) is incorrect because the subject (\"My friend and I\") is plural and requires the plural verb \"have\", not the singular verb \"has\".</p><p>Option b) is incorrect because it uses the wrong pronoun (\"Me\") and the wrong verb (\"has\").</p><p>Option c) is correct as it uses the correct subject pronoun (\"I\"), follows the correct order, and uses the correct plural verb (\"have\").</p><p>Option d) is incorrect because it uses the object pronoun \"me\" instead of the subject pronoun \"I\".</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Spot the error in the given sentence and select the correct sentence from the options given.</p><p>Each of the girls must bring their own art supplies for the workshop.</p>",
    "options": [
      "Each of the girls must bring her own art supplies for the workshop.",
      "Each of the girl must bring their own art supplies for the workshop.",
      "Each of the girls must brings their own art supplies for the workshop.",
      "Each of the girls must bring there own art supplies for the workshop."
    ],
    "correct_option_id": 0,
    "solution": "<p>Pronouns like \"each\", \"every\", \"everyone\", and \"anyone\" are singular and require a singular pronoun or a determiner.</p><p>The antecedent \"Each\" is singular, but the possessive determiner used is \"their\", which is plural. Since the group (\"girls\") is feminine, the correct singular possessive determiner/adjective is \"her\".</p><p>Option (a) is correct because it uses the singular possessive adjective \"her\" which agrees with the singular antecedent \"Each\" and refers to the girls appropriately.</p><p>Option (b) is incorrect because the phrase \"Each of the...\" must be followed by a plural noun (\"girls\"), not a singular one (\"girl\").</p><p>Option (c) is incorrect because the modal verb \"must\" is always followed by the base form of the verb (\"bring\"), not \"brings\".</p><p>Option (d) is incorrect because it uses \"there\" (an adverb of place) instead of \"their\" (which is also incorrect in this context, but \"there\" is even more wrong).</p><p>Hence, option (a) is the correct answer.</p><p>Note: <b>Possessive Determiners/Adjectives:</b> Words like 'my', 'our', 'your', 'his', 'her', 'its', and 'their' are known as possessive adjectives (or possessive determiners). They come before nouns and indicate ownership of the noun. Example: The teacher asked the students to open their drawing books.</p><p><b>Modal verb:</b> A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Spot the error in the given sentence and select the correct sentence from the options given.</p><p>This kind of problems often makes it hard for he to focus during class.</p>",
    "options": [
      "These kind of problems often makes it hard for him to focus during class.",
      "This kind of problem often makes it hard for him to focus during class.",
      "This kind of problems often makes it hard for his to focus during class.",
      "This kind of problem often makes it hard for he to focus during class."
    ],
    "correct_option_id": 1,
    "solution": "<p>The phrase \"This kind of problems\" is incorrect. The demonstrative adjective \"This\" is singular and corresponds to the singular noun \"kind\". Therefore, the noun following the phrase \"kind of\" should also be singular. The correct phrase is \"This kind of problem\". The plural alternative would be \"These kinds of problems\".</p><p>Also, the phrase \"for he\" is incorrect. The word \"for\" is a preposition. Pronouns that follow a preposition must be in the objective case. \"He\" is a subjective pronoun (used as a subject). The correct objective pronoun is \"him\".</p><p>Option a): This is incorrect. The phrase \"These kind\" creates a new error by mixing a plural demonstrative adjective (\"These\") with a singular noun (\"kind\").</p><p>Option b): It fixes both errors. \"This kind of problem\" has the correct noun agreement, and \"for him\" uses the correct objective pronoun after the preposition.</p><p>Option c): This is incorrect. It retains the first error (\"kind of problems\") and uses the wrong pronoun (\"his\" is a possessive pronoun, not an objective one).</p><p>Option d): This is incorrect. While it fixes the noun agreement error (\"kind of problem\"), it fails to correct the pronoun case error (\"for he\").</p><p>Hence, option (b) is the correct answer. </p><p><b>Note: Demonstrative Adjectives:</b> Demonstrative adjectives include <b><i>\"this\", \"that\", \"these\" </i></b>and <b><i>\"those\"</i></b>. These <b><i>modify or describe a noun</i></b> and come before a noun while 'demonstrative pronouns' replace a noun. <b>Example:</b> \"I like<b><i> that</i></b> T-shirt of yours\".</p><p><b>Subjective Pronouns:</b> The pronouns I, you, we, he, she, it, and they are known as subjective pronouns because they act as the subjects of verbs: We went to the party.</p><p><b>Objective Pronouns:</b> The pronouns me, you, us, him, her, it, and them are called objective pronouns because they act as the objects of verbs and prepositions: Anjali drove us home.</p><p><b>Possessive Pronouns: </b>The pronouns mine, yours, hers, his, ours, and theirs are known as possessive pronouns: they refer to something owned by the speaker or by someone or something previously mentioned. For example: The pen is mine.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>The scholarship was awarded to the student <u>who the selection committee chose</u> as the most deserving candidate based on both academic merit and extracurricular achievements.</p>",
    "options": [
      "whom the selection committee chose",
      "which the selection committee chose",
      "whose the selection committee chose",
      "No substitution"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is the incorrect use of the relative pronoun \"who\". The choice between \"who\" and \"whom\" depends on its grammatical role in the clause it introduces.</p><p>In the clause \"the selection committee chose ___\", the subject is \"the selection committee\" and the verb is \"chose\". The pronoun is the direct object of the verb \"chose\" (the committee chose him/her). Therefore, the object pronoun \"whom\" is the correct choice in formal English.</p><p>&#183; Option a) \"whom the selection committee chose\" is correct. It properly uses the object pronoun \"whom\" as the object of the verb \"chose\".</p><p>&#183; Option b) \"which the selection committee chose\" is incorrect because \"which\" is used for things, not people.</p><p>&#183; Option c) \"whose the selection committee chose\" is incorrect because \"whose\" is a possessive pronoun and does not fit the grammatical structure here.</p><p>&#183; Option d) 'No substitution' is incorrect because the original phrase uses the subject pronoun \"who\" where an object pronoun is required.</p><p>So, the correct sentence is: The scholarship was awarded to the student <b>whom</b> the selection committee chose as the most deserving candidate based on both academic merit and extracurricular achievements.</p><p>Hence, option (a) is the correct answer.</p><p><b>Note: </b></p><p><b>Relative pronouns: </b>A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies, or describes, the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>This is the author ________ new novel has become an international bestseller.</p>",
    "options": [
      "who",
      "which",
      "whom",
      "whose"
    ],
    "correct_option_id": 3,
    "solution": "<p>The context of the sentence is to link an \"author\" to a \"novel\" that belongs to them. The blank requires a relative pronoun that indicates possession or ownership.</p><p>The correct option is \"whose\". 'Whose' is the possessive relative pronoun used to show that something belongs to a person or thing mentioned earlier (in this case, the novel belongs to the author).</p><p>The other options do not fit: \"who\" is a subjective pronoun used to refer to the subject (e.g., the author who writes); \"which\" is used for things, not people; \"whom\" is an objective pronoun used to refer to the object.</p><p>Thus, the complete sentence is: \"This is the author <b>whose</b> new novel has become an international bestseller.\"</p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Spot the error in the given sentence and select the correct sentence from the options given.</p><p>The award was given to the two employees, Mr. Sharma and myself.</p>",
    "options": [
      "The award was given to the two employees, Mr. Sharma and me.",
      "The award was given to the two employees, Mr. Sharma and I.",
      "The award was gave to the two employees, Mr. Sharma and myself.",
      "The award was given for the two employees, Mr. Sharma and myself."
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is the misuse of a reflexive pronoun.</p><p>Reflexive Pronouns: Reflexive pronouns (like myself, yourself, himself) are used when the subject and the object of the verb are the same person (e.g., \"I hurt myself\"). They cannot be used as a simple object of a verb or a preposition.</p><p>In the sentence, \"myself\" is used as the object of the preposition \"to\". This is incorrect. The correct pronoun to use as an object is \"me\". A simple way to check is to remove the other person: \"The award was given to me\" is correct, while \"The award was given to myself\" is incorrect.</p><p>Option a) is correct because it uses the correct objective pronoun \"me\" after the preposition \"to\".</p><p>Option b) is incorrect because \"I\" is a subjective pronoun and cannot be the object of the preposition \"to\".</p><p>Option c) is incorrect because the passive voice requires \"was given\" (was + v3), not \"was gave\" (was + v2), and it still uses the wrong pronoun.</p><p>Option d) is incorrect because it uses the wrong preposition (\"for\") and the wrong pronoun (\"myself\"). \"Given to\" is used when specifying the recipient of something.</p><p>Hence, option (a) is the correct answer.</p><p><b>Note: Reflexive Pronouns: </b>Reflexive pronouns include myself, himself, herself, itself, ourselves, yourselves, and themselves. These are used to refer back to the subject of the clause in which they are used: She hurt herself in the eye.</p><p><b>Subjective Pronouns:</b> The pronouns I, you, we, he, she, it, and they are known as subjective pronouns because they act as the subjects of verbs: We went to the party.</p><p><b>Objective Pronouns:</b> The pronouns me, you, us, him, her, it, and them are called objective pronouns because they act as the objects of verbs and prepositions: Anjali drove us home.</p><p>V1 -> Base form/simple form of verb, V2 -> Past form of verb (-ed form or irregular verb), V3 -> Past participle form of verb (-ed, -d, -t, -en, or -n), V4 -> Continuous form of verb / Present participle form of verb (-ing form), V5 -> Third person singular (V1+ -es or -s).</p>",
    "question_index": 5
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>Let this important and</u> confidential matter <u>remain a strict</u> secret <u>between you and I</u> for <u>the time being</u>.</p>",
    "options": [
      "the time being",
      "Let this important and",
      "remain a strict",
      "between you and I"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error lies in the use of the pronoun 'I' after the preposition 'between'. Prepositions like 'between', 'among', 'for', and 'to' must be followed by a pronoun in the objective case. The subjective pronoun 'I' is incorrect here. The correct objective pronoun is 'me'.</p><p>The correct sentence is: Let this important and confidential matter remain a strict secret between you and me for the time being.</p><p>Hence, option (d) is the correct answer.</p><p><b>Note:</b></p><p><b>Subjective Pronouns:</b> The pronouns I, you, we, he, she, it, and they are known as subjective pronouns because they act as the subjects of verbs: We went to the party.</p><p><b>Objective Pronouns:</b> The pronouns me, you, us, him, her, it, and them are called objective pronouns because they act as the objects of verbs and prepositions: Anjali drove us home.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Spot the error in the given sentence and select the correct sentence from the options given.</p><p>The company, whom logo is globally recognized, was founded more than a century ago.</p>",
    "options": [
      "The company, which logo is globally recognized, was founded more than a century ago.",
      "The company, who's logo is globally recognized, was founded more than a century ago.",
      "The company, whose logo is globally recognized, was founded more than a century ago.",
      "The company, whom logo is globally recognized, is founded more than a century ago."
    ],
    "correct_option_id": 2,
    "solution": "<p>The error in the original sentence lies in the choice of the relative pronoun. The sentence requires a relative pronoun to show possession, that the logo belongs to the company.</p><p>\"Whom\" is an objective pronoun used for people (e.g., \"the man whom I met\"). It does not show possession. So, option (d) is incorrect. </p><p>\"Which\" is a pronoun used for things, but it also does not show possession. So, option (a) is incorrect. </p><p>Who's is a contraction of \"who is\" or \"who has\", and does not show possession. So, option (b) is incorrect.</p><p>\"Whose\" is the possessive relative pronoun used for both people and things to indicate ownership. It correctly indicates that the logo belongs to the company (\"the company's logo\").</p><p>Hence, option (c) is the correct answer. </p><p><b>Note: Relative pronouns: </b>A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies, or describes, the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>When <u>one decides to adopt a pet, you must be</u> fully prepared for the long-term commitment of providing love, care, and attention for the animal's entire life.</p>",
    "options": [
      "one decides to adopt a pet, he must be",
      "one decides to adopt a pet, she must be",
      "you decide to adopt a pet, you must be",
      "No substitution"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error in the overall sentence is an inconsistent use of pronouns. The sentence begins with the formal, impersonal pronoun \"one\" but then switches to the second-person pronoun \"you\" (\"you must be fully prepared\"). To be grammatically correct, the pronouns must be consistent.</p><p>&#183; Option a) \"one decides to adopt a pet, he must be\" creates consistency but is not the best option as \"he\" is not gender-neutral.</p><p>&#183; Option b) \"one decides to adopt a pet, she must be\" creates consistency but is not the best option as \"she\" is not gender-neutral.</p><p>&#183; Option c) \"you decide to adopt a pet, you must be\" is the best choice. It creates a perfectly consistent and more direct sentence by using \"you\" in both clauses, matching the main clause's pronoun.</p><p>&#183; Option d) 'No substitution' is incorrect because the pronoun shift from \"one\" to \"you\" makes the original sentence grammatically flawed.</p><p>So, the correct sentence is: When you decide to adopt a pet, you must be fully prepared for the long-term commitment of providing love, care, and attention for the animal's entire life.</p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The police officer confirmed that it was ________ who reported the theft.</p>",
    "options": [
      "he",
      "him",
      "himself",
      "his"
    ],
    "correct_option_id": 0,
    "solution": "<p>The context of the sentence is identifying the person who performed the action of reporting. The blank is part of a construction following the verb \"to be\" (\"was\") and renames the subject \"it\". In formal English, when a pronoun follows a form of the verb \"to be\" and renames the subject, it should be in the subjective case.</p><p>The correct option is \"he\". 'He' is the subjective pronoun and correctly functions as the predicate nominative, identifying who the subject 'it' was.</p><p>The other options do not fit: \"him\" is the objective case and is incorrect in this formal construction; \"himself\" is a reflexive pronoun; \"his\" is a possessive pronoun.</p><p>Thus, the complete sentence is: \"The police officer confirmed that it was <b>he</b> who reported the theft.\"</p><p>Hence, option (a) is the correct answer.</p><p><b>Note: </b></p><p><b>Reflexive Pronouns: </b>Reflexive pronouns include myself, himself, herself, itself, ourselves, yourselves, and themselves. These are used to refer back to the subject of the clause in which they are used: She hurt herself in the eye.</p><p><b>Possessive Pronouns: </b>The pronouns mine, yours, hers, his, ours, and theirs are known as possessive pronouns: they refer to something owned by the speaker or by someone or something previously mentioned. For example: The pen is mine.</p>",
    "question_index": 9
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>The five team members / constantly argued with / each other instead of / working towards the goal.</p>",
    "options": [
      "working towards the goal",
      "The five team members",
      "each other instead of",
      "constantly argued with"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error lies in the use of the reciprocal pronoun \"each other\". Reciprocal pronouns are used to indicate that two or more people are carrying out an action of the same type, with both receiving the benefits or consequences.</p><p>\"Each other\" is used when referring to two people or things. \"One another\" is used when referring to more than two people or things. Since the sentence refers to \"five team members\" (more than two), the correct reciprocal pronoun is \"one another\".</p><p><b>Correct sentence: </b>The five team members constantly argued with one another instead of working towards the goal.</p><p>So, there is an error in the part mentioned in option (c).</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>The new employee who</u> the <u>manager praised yesterday</u> <u>is extremely</u> diligent and <u>has a great attitude</u> towards work.</p>",
    "options": [
      "The new employee who",
      "is extremely",
      "manager praised yesterday",
      "has a great attitude"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is in the use of the relative pronoun 'who'. The relative pronoun here is the object of the verb 'praised' (The manager praised <i>him</i>). When the relative pronoun is the object, the objective case 'whom' should be used. 'Who' is the subjective case, used when the pronoun is the subject (e.g., the employee <i>who works</i> hard).</p><p>The correct sentence is: The new employee whom the manager praised yesterday is extremely diligent and has a great attitude towards work.</p><p>Hence, option (a) is the correct answer.</p><p><b>Note:</b></p><p><b>Relative pronouns:</b> A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies, or describes, the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p><p><b>Objective Pronouns:</b> The pronouns me, you, us, him, her, it, and them are called objective pronouns because they act as the objects of verbs and prepositions: Anjali drove us home.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Spot the error in the given sentence and select the correct sentence from the options given.</p><p>Whose of these bags belong to you?</p>",
    "options": [
      "Whose of this bag belong to you?",
      "Whom of these bags belong to you?",
      "Who of these bags belong to you?",
      "Which of these bags belongs to you?"
