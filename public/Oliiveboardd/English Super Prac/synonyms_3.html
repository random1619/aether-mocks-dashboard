<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate synonym of the bracketed word in the following sentence to fill in the blank.</p><p>Most of the country's middle-class sneer at her ____ (arrogant) manner and tacky personal style.</p>",
    "options": [
      "Humble",
      "Haughty",
      "Ordinary",
      "Humdrum"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most appropriate synonym for the word 'arrogant' is 'haughty'. 'Arrogant' means having or revealing an exaggerated sense of one's own importance or abilities. It implies a sense of superiority or disdain towards others. \"Haughty\" also means behaving in a disdainful, supercilious manner, looking down on others with a sense of superiority. In the given sentence, both words suggest that the person behaves with a sense of superiority or disdain, leading others to sneer at them. \"Humble\" means having or showing a modest or low estimate of one's importance. \"Ordinary\" means with no special or distinctive features; normal. \"Humdrum\" means lacking excitement or variety; dull. Hence, (b) is the correct answer.</p><p><b>The complete sentence is: </b>Most of the country's middle-class sneer at her haughty manner and tacky personal style.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate SYNONYM of the given word. </p><p>Mean </p>",
    "options": [
      "Afraid",
      "Glad",
      "Fine",
      "Unkind"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Mean' means cruel and spiteful. 'Unkind' means inconsiderate and harsh to others. So, the two words can be used as synonyms of each other. Hence, (d) is the correct answer.</p><p>'Afraid' means impressed with fear.</p><p>'Glad' means pleased or gratified.</p><p>'Fine' means superior quality.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Choose the word from the options that is similar in meaning to the given word.</p><p>Callous</p>",
    "options": [
      "Imitate",
      "Sympathetic",
      "Heartless",
      "Pure"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Callous</b>: showing or having an insensitive and cruel disregard for others; heartless.</p><p>Thus, the synonym of 'Callous' is 'Heartless'.</p><p>Therefore, the correct answer is: <b>(c) Heartless</b>.</p><p>Additional Information:</p><p>The meanings of the rest of the options are given below in the table:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Word</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Imitate</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">take or follow as a model</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Sympathetic</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">feeling, showing, or expressing sympathy</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Pure</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">not mixed or adulterated with any other substance or material</td></tr></table>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate synonym of the bracketed word in the following sentence to fill in the blank.</p><p>My advice is to show that you are serious and _______(reflective) about your subject.</p>",
    "options": [
      "Thoughtful",
      "Oblivious",
      "Indifferent",
      "Callous"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate synonym for the word 'reflective' is 'thoughtful'.</p><p>\"Reflective\" means showing careful consideration or thoughtfulness about something.</p><p>\"Thoughtful\" is a synonym for \"reflective.\" It means showing consideration for others' needs or feelings; and showing careful consideration or thoughtfulness about a subject.</p><p>In the given context, both words convey the idea that the advice being given suggests showing careful consideration or thoughtfulness about one's subject.</p><p>\"Oblivious\" means not aware of or concerned about what is happening around one; lacking conscious awareness.</p><p>\"Indifferent\" means having no particular interest or sympathy; unconcerned.</p><p>\"Callous\" means showing or having an insensitive and cruel disregard for others; emotionally hardened. Hence, (a) is the correct answer.</p><p><b>The complete sentence is: </b>My advice is to show that you are serious and thoughtful about your subject.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate synonym of the given word.</p><p>Remembrance</p>",
    "options": [
      "Reminiscence",
      "Memorable",
      "Recognition",
      "Imagination"
    ],
    "correct_option_id": 0,
    "solution": "<p>Reminiscence - The enjoyable recollection of past events</p><p>Memorable - Worth remembering or easily remembered, especially because of being special or unusual</p><p>Recognition - Acknowledgement of the existence, validity, or legality of something</p><p>Imagination - The ability of the mind to be creative or resourceful</p><p>The meaning of the word 'remembrance' is 'a memory or recollection'. Among the options, the word that is synonymous with the word 'remembrance' is option (a) 'reminiscence'.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the synonym of the word 'change' to fill in the blank.</p><p>Elk were found to ______ their behaviour due to the perceived threat of wolves.</p>",
    "options": [
      "Damage",
      "Alter",
      "Reject",
      "Subject"
    ],
    "correct_option_id": 1,
    "solution": "<p>Alter: change in character or composition, typically in a comparatively small but significant way.</p><p>So, 'alter' is the correct synonym of the word 'change' and can fill the blank appropriately. </p><p>The complete sentence is: Elk were found to <b>alter</b> their behaviour due to the perceived threat of wolves.</p><p>Hence, option (b) is the answer. </p><p>Damage: physical harm that impairs the value, usefulness, or normal function of something.</p><p>Reject: dismiss as inadequate, unacceptable, or faulty.</p><p>Subject: cause or force someone or something to undergo (a particular experience or form of treatment, typically an unwelcome or unpleasant one).</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate synonym of the underlined word.</p><p>Natural resources are <u>abundant</u> in the nation, which has helped it grow a strong and diverse economy but also presents environmental and social concerns.</p>",
    "options": [
      "scarce",
      "plentiful",
      "limited",
      "expensive"
    ],
    "correct_option_id": 1,
    "solution": "<p>The underlined word is 'abundant', which means existing or available in large quantities. The most appropriate synonym of 'abundant' among the options is 'plentiful', which means existing in large numbers or amounts. The other options are not synonyms of 'abundant'. 'Scarce' means insufficient for the demand, 'limited' means restricted in size, amount or extent, and 'expensive' means costing a lot of money.</p><p>Hence, option (b) is the correct answer. </p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate synonym of the given word.</p><p>Article</p>",
    "options": [
      "Object",
      "Year",
      "Poet",
      "Ability"
    ],
    "correct_option_id": 0,
    "solution": "<p>Article: a particular thing, especially one that is one of several things of a similar type or in the same place. </p><p>Object: a material thing that can be seen and touched.</p><p>So, both words are similar in meaning. Hence, option (a) is the answer.</p><p>Year: the period of 365 days.</p><p>Poet: a person who writes poems.</p><p>Ability: possession of the means or skill to do something.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate SYNONYM to replace the underlined word.</p><p>Siloed management systems <u>foster</u> inefficiency and profit loss.</p>",
    "options": [
      "Discourage",
      "Encourage",
      "Neglect",
      "Suppress"
    ],
    "correct_option_id": 1,
    "solution": "<p>Foster: encourage the development of (something, especially something desirable).</p><p>Encourage: stimulate the development of (an activity, state, or belief).</p><p>So, the correct option is 'encourage' (<b>option b</b>).</p><p>Discourage: cause (someone) to lose confidence or enthusiasm.</p><p>Neglect: fail to care for properly.</p><p>Suppress: to prevent something from being seen or expressed or from operating.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate synonym of the given word.</p><p>Occur</p>",
    "options": [
      "Develop",
      "Happen",
      "Take",
      "Credit"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Occur' means to take place. 'Happen' means to befall. So, the two words can be used as synonyms of each other. Hence, (b) is the correct answer.</p><p>'Develop' means to discover. </p><p>'Take' means to get into one's hands. </p><p>'Credit' means to acknowledge the contribution of. </p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate synonym of the underlined word. </p><p>But the prospect of facing their old <u>foes</u> will certainly be a strong incentive.</p>",
    "options": [
      "Attendants",
      "Representatives",
      "Rivals",
      "Friends"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate synonym for the word \"foes\" is 'rivals'. \"Foes\" refers to enemies or adversaries. In the sentence, \"foes\" signifies the old enemies or opponents that the subject will face or confront. So, the most appropriate synonym for \"foes\" in this sentence is \"rivals,\" which suggests opponents or competitors with whom one is in competition or conflict. 'Attendants' are people who are present to provide assistance or services, often in a subordinate role. 'Representatives' are individuals or entities that stand in for or act on behalf of others, often conveying their interests, opinions, or positions. Hence, (c) is the correct answer. </p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate synonym of the given word.</p><p>Impulsive</p>",
    "options": [
      "Patient",
      "Indecisive",
      "Hasty",
      "Pushy"
    ],
    "correct_option_id": 2,
    "solution": "<p>Patient- lacking tendency to be quickly irritated or provoked.</p><p>Indecisive- not providing a clear and definite result.</p><p>Hasty- acting with excessive speed or insufficient consideration.</p><p>Pushy- excessively or unpleasantly self-assertive or ambitious.</p><p>The meaning of the word 'impulsive' is 'acting or done without forethought'. Among the given options, the word that matches the meaning of the given word is option (c), 'hasty'.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 11
  },
  {
    "question": "<p>Choose the one which best expresses the meaning of the given word.</p><p>CANDID</p>",
    "options": [
      "Frank",
      "Evasive",
      "Attempt",
      "Reveal"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Candid' means openly straightforward and direct without reserve or secretiveness.</p><p>Example: The girl demanded a candid conversation with her father regarding the status of their house mortgage.</p><p>Hence, (a) is the correct answer.</p><p>'Evasive' means avoiding commitment.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate synonym of the underlined word. </p><p>The athlete felt <u>fatigued</u> after running the marathon.</p>",
    "options": [
      "Exhausted",
      "Energetic",
      "Careless",
      "Alert"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate synonym for 'fatigued' is 'exhausted'.</p><p>'Fatigued' means extremely tired or worn out.</p><p>'Exhausted' also means very tired.</p><p>'Energetic' means full of energy.</p><p>'Careless' means not paying enough attention.</p><p>'Alert' means fully awake and aware.</p><p>Hence, (a) is the correct answer.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate synonym of the bracketed word in the following sentence to fill in the blank.</p><p>The search has been _____ (impeded) by a lack of fuel for a rescue helicopter.</p>",
    "options": [
      "Hampered",
      "Advanced",
      "Promoted",
      "Restored"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate synonym for the word 'impeded' is 'hampered'. \"Impeded\" means to delay or slow down the progress of something by obstructing or hindering it. \"Hampered\" also means to restrict the movement or progress of something, typically by creating obstacles or limitations. In the sentence, both words convey the idea that the search has been slowed down or obstructed by the lack of fuel for the rescue helicopter. \"Advanced\" means to move forward or make progress. \"Promoted\" means to further the progress, growth, or development of something. \"Restored\" means to bring back something to its original or former condition. Hence, (a) is the correct answer. </p><p><b>The complete sentence is: </b>The search has been hampered by a lack of fuel for a rescue helicopter.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the synonym of the word 'sudden' to fill in the blank.</p><p>Never make ______ movements with the steering wheel when you're passing another vehicle.</p>",
    "options": [
      "Abrupt",
      "Gradual",
      "Friendly",
      "Smooth"
    ],
    "correct_option_id": 0,
    "solution": "<p>Sudden: occurring or done quickly and unexpectedly or without warning.</p><p>Abrupt: sudden and unexpected.</p><p>So, \"abrupt\" is an appropriate synonym and can fill the blank.</p><p>The complete sentence is: Never make <b>abrupt</b> movements with the steering wheel when you're passing another vehicle.</p><p>Hence, option (a) is the answer.</p><p>Gradual: taking place or progressing slowly or by degrees.</p><p>Friendly: kind and pleasant.</p><p>Smooth: (of movement) without jerks.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate synonym of the given word.</p><p>Signal</p>",
    "options": [
      "Show",
      "Hide",
      "Crawl",
      "Cost"
    ],
    "correct_option_id": 0,
    "solution": "<p>Signal: to show that you intend or are ready to do something. </p><p>Show: allow (a quality or emotion) to be perceived; display. </p><p>So, both words are similar in meaning. Hence, option (a) is the answer.</p><p>Hide: put or keep out of sight.</p><p>Crawl: move forward on the hands and knees or by dragging the body close to the ground.</p><p>Cost: to need you to pay a particular amount of money in order for you to buy or do something</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate synonym of the given word.</p><p>Courage</p>",
    "options": [
      "Humility",
      "Fortitude",
      "Awareness",
      "Timidity"
    ],
    "correct_option_id": 1,
    "solution": "<p>Courage: quality that enables a person to face difficulty, danger, pain, etc. without fear; bravery</p><p>Fortitude: courage and patience; strength in facing difficulty, adversity, etc.</p><p>So, the two words can be used as synonyms of each other in the context of the given sentence. Hence, (b) is the correct answer. </p><p>Humility: modest opinion or estimate of one's own importance, rank, etc.</p><p>Timidity: the state or quality of lacking in self-assurance, courage, or bravery</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate synonym of the underlined word. </p><p>The manager's decision was met with <u>enthusiastic</u> support from the team.</p>",
    "options": [
      "Indifferent",
      "Reluctant",
      "Hostile",
      "Eager"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate synonym for 'enthusiastic' is 'eager'. </p><p>'Enthusiastic' means showing intense and eager enjoyment or interest. </p><p>'Eager' also means showing enthusiasm or excitement. </p><p>'Reluctant' means unwilling or hesitant. </p><p>'Hostile' means unfriendly or antagonistic. </p><p>'Indifferent' means having no particular interest or sympathy. </p><p>Hence, (d) is the correct answer.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Identify the synonym for the word -</p><p>Emotion</p>",
    "options": [
      "Embrace",
      "Agitation",
      "Release",
      "Feelings"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Emotion' means a person's internal state of being and involuntary psychological response to an object or a situation. 'Feelings' means sensation or impression. So, the two words can be used as synonyms of each other. Hence, (d) is the correct answer.</p><p>'Embrace' means to clasp someone in the arms with affection.</p><p>'Agitation' means the state of being disrupted by violence.</p><p>'Release' means to free or liberate.</p>",
    "question_index": 19
  }
];
    </script>
