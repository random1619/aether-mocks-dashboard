    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. Digital currencies operate on decentralized blockchain technology, enabling secure, transparent, and near-instantaneous transactions across borders. </p><p>B. On the other hand, the decentralized nature of these currencies challenges the traditional banking model, potentially diminishing the intermediaries' role.</p><p>C. This disruptive shift poses both challenges and opportunities for traditional banking institutions.</p><p>D. Financial institutions are compelled to adapt their strategies to incorporate the benefits of digital currencies while navigating regulatory uncertainties and addressing concerns related to security and volatility.</p><p>E. On one hand, digital currencies offer the promise of financial inclusion, reduced transaction costs, and increased efficiency.</p>",
    "options": [
      "ECDAB",
      "ACEBD",
      "BCDAE",
      "DCAEB"
    ],
    "correct_option_id": 1,
    "solution": "<p>Sentence A: This sentence introduces the central theme of digital currencies and their operation on decentralized blockchain technology.</p><p>Sentence C: Sentence C follows A to explain the impact of digital currencies on traditional banking institutions, emphasizing the disruptive nature of the shift.</p><p>Sentence E: Sentence E provides a contrast by presenting the positive aspects of digital currencies, indicating that they are not only disruptive but also carry potential benefits.</p><p>Sentence B: Following the positive aspects mentioned in Sentence E, Sentence B introduces the challenges posed to the traditional banking model by the decentralized nature of digital currencies.</p><p>Sentence D: The final sentence, D, concludes the paragraph by highlighting the actions that financial institutions must take in response to the challenges and opportunities presented by digital currencies.</p><p>Therefore, the correct sequence is ACEBD, making option (b) the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. As a discipline that celebrates individuality and self-expression, fashion designing remains vibrant.</p><p>B. The ever-evolving nature of fashion demands designers to stay attuned to emerging trends, technological advancements, and sustainable practices.</p><p>C. Beyond the runway, these visionaries shape the commercial landscape, influencing retail and marketing strategies.</p><p>D. From haute couture to ready-to-wear, fashion designers cater to diverse tastes and lifestyles, contributing to the rich tapestry of global style.</p><p>E. Fashion designing is not merely about clothing; it's a form of artistic expression that reflects and responds to the cultural zeitgeist, making it an integral and continually evolving aspect of our lives.</p>",
    "options": [
      "ACDEB",
      "BDCEA",
      "DCEAB",
      "EACBD"
    ],
    "correct_option_id": 1,
    "solution": "<p>B introduces the idea that fashion is constantly changing, and designers need to keep up with various factors. It sets the stage for discussing the role of fashion designers in the industry. Following the introduction of the dynamic nature of fashion, D elaborates on the diverse range of styles and tastes that fashion designers cater to. It expands on the idea introduced in sentence B. Now, in C, the focus shifts from the creative aspect of fashion to its commercial impact. Fashion designers are not just artists; they also play a crucial role in shaping the business and marketing aspects of the industry. E further emphasizes the artistic and cultural significance of fashion designing. It completes the narrative by connecting fashion to broader cultural contexts, suggesting its integral role in our lives. The final sentence, A serves as a concluding statement, summarizing the overall theme. It brings the focus back to the creative aspect of fashion, emphasizing its vibrant and individualistic nature. So, the correct order is BDCEA, as it follows a logical progression from the dynamic nature of fashion to the diverse style designers cater to, their commercial impact, the artistic expression in fashion, and finally, a concluding statement on the vibrancy of fashion as a discipline. Hence, (b) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>For the four sentences (S1 to S4) paragraph below, sentences S1 and S4 are given below. From the options P, Q, R and S, select the appropriate sentence for S2 and S3, respectively. </p><p></p><p>(S1) My most memorable thrilling adventure took place last summer when I decided to go white-water rafting on the Colorado River. </p><p>(S2) </p><p>(S3) </p><p>(S4) The water looked fast and furious, and I couldn't help but wonder what I had gotten myself into.</p><p>(P) The colours of the landscape were vibrant, and I felt a sense of peace wash over me.</p><p>(Q) I had always been drawn to water sports but had never tried anything quite so extreme before.</p><p>(R) As we pulled up to the river, I felt a mixture of excitement and nerves.</p><p>(S) I couldn't believe that I was actually going to jump out of a plane at 10,000 feet in the air.</p>",
    "options": [
      "P, Q",
      "R, S",
      "S, P",
      "Q, R"
    ],
    "correct_option_id": 3,
    "solution": "<p>The first sentence talks about the memorable experience on the Colorado River and sentence 'Q' talks more about the person's predilection towards sports activity, so it will be the second sentence here. How was the experience, is mentioned in sentence 'R', making it the third sentence here. </p><p>Therefore, the correct order is Q and R. </p><p>Hence, option (d) is correct. </p>",
    "question_index": 2
  },
  {
    "question": "<p>For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given below. From the options P, Q, R and S, select the appropriate sentence for S2 and S3, respectively.</p><p></p><p>(S1) Calmness is a state of being that is often sought after but not always achieved.</p><p>(S2)</p><p>(S3)</p><p>(S4) In addition to mindfulness practices, there are many other ways to experience calmness in daily life like taking a walk through nature, listening to soothing music, or practising deep breathing exercises can all help to promote a sense of calm and relaxation.</p><p>(P) In addition to that, achieving calmness is not always easy, especially in today's fast-paced and stressful world.</p><p>(Q) It is a feeling of peace, tranquillity, and serenity that can be experienced in many different ways.</p><p>(R) When we are able to stay calm in the face of challenging situations, we are better able to make clear-headed decisions and respond to others with empathy and compassion.</p><p>(S) One of the most common ways to experience calmness is through meditation or mindfulness practices.</p>",
    "options": [
      "P, Q",
      "P, S",
      "Q, S",
      "R, P"
    ],
    "correct_option_id": 2,
    "solution": "<p>The first sentence talks about calmness, and how it feels is described in sentence Q, so it will be the second sentence of the paragraph. The last sentence talks about the 'mindfulness practices' and sentence S describes that one of the ways to experience calmness is through mindfulness practices, so it will be the third sentence after rearrangement. </p><p>Therefore, the correct order is Q, S.</p><p>Hence, option (c) is correct.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. So when XY Corp talked about the communication interruption device, it immediately escalated tensions between two major powerful countries.</p><p>B. Nearly every country in the world uses hackers to gather intelligence.</p><p>C. Major powers like the United States and Russia have large stables of such groups  -  many of which have been given colourful nicknames by cybersecurity experts. </p><p>D. Where experts worry is when such groups turn their attention from intelligence gathering to digital sabotage.</p>",
    "options": [
      "ADCB",
      "BCDA",
      "DCBA",
      "BACD"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct order is BCDA.</p><p>Sentence B comes first as it provides a platform to carry forward the discussion. It states that all countries use hackers to gather intelligence. C follows B as it gives some instances. So, BC is a pair. Sentence D follows the pair BC and states that the problem arises when countries use their powers in digital wars. The remaining sentence A is the last part of the sentence as it states that the introduction of a device that could potentially be used on an opposing country escalated tensions between two major powerful countries.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. Prompting the move was the observation of a chef, who reached out to the museum last year to bring to its notice that the foreground of the painting did not depict onions. </p><p>B. Almost 135 years after it was painted by Vincent van Gogh, the artwork Red Cabbages and Onions has now been rechristened Red Cabbages and Garlic. </p><p>C. Admitting the error, the museum decided to rename the work.</p><p>D. Recent years have seen several other works of art being renamed for varied reasons.</p>",

    "correct_option_id": 2,
    "solution": "<p>The correct order is BACD.</p><p>Sentence B comes first as it is an independent sentence and also drives the discussion forward. It states that a famous painting has been renamed. A follows B as it talks about why the museum renamed the painting. Sentence C, obviously is the continuation of sentence A as it builds up on A. The remaining sentence D is the last part of the passage. </p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>P. The Minister for Electronics and IT provided this information in a written reply to the Lok Sabha.</p><p>Q. Over 2,100 URLs (Uniform Resource Locators) were blocked on social media platforms in the first six months of this year.</p><p>R. A total of 633, 1,385 and 2,799 URLs were ordered for blocking in the last three years, respectively.</p><p>S. He added that number of URLs ordered for blocking might cross 4,100 this year.</p>",
    "options": [
      "QRPS",
      "PQSR",
      "SPQR",
      "RQSP"
    ],
    "correct_option_id": 0,
    "solution": "<p>Q comes first, as it gives us the point of discussion  -  blocking of URLs. R should come next, as it provides additional details about the URLs blocked in previous years. P should follow, as it cites the source of this information. S comes last, where the minister provides an estimate of blocked URLs for the whole year. A is the right answer.</p><p>Alternate solution: </p><p>PS is a mandatory pair; 'he' in S refers to 'the minister' mentioned in P. This itself eliminates all the options except option A. </p>",
    "question_index": 6
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. It can occur spontaneously or as the result of seeing or hearing a yawn, called contagious yawning.</p><p>B. They are increasing blood flow to the head, oxygenating, and cooling the brain.</p><p>C. Most of the research on spontaneous yawning points to a physiological function.</p><p>D. Though yawning is an instantly recognizable behaviour shared among most vertebrate animals, scientists still don't know enough about this seemingly simple phenomenon.</p>",
    "options": [
      "ABCD",
      "BCDA",
      "BADC",
      "DACB"
    ],
    "correct_option_id": 3,
    "solution": "<p>The subject of the passage 'yawning' is introduced in sentence D. Hence, it will be placed first in the sequence.</p><p>A builds up on the subject by stating the ways in which the process takes place and also introduces 'contagious yawning'. Hence, A should follow D.</p><p>C should follow A as it tells us about research on 'spontaneous yawning' and what type of process it is.</p><p>B enlists the 'physiological function' mentioned in C; hence, B should follow C.</p><p>The sequence after rearrangement will be DACB.</p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. That city is one of the most important sites of the Indus Civilization, or more accurately, the Harappan Civilization of Pakistan and north-western India.</p><p>B. She is one of two bronze artworks found at Mohenjo-Daro that shows a more natural pose than compared to other more formal figures.</p><p>C. The Dancing Girl is a bronze statuette created over 4,500 years ago and is a rare and unique masterpiece. </p><p>D. The statuette was named \"Dancing Girl\" based on an assumption of her profession.</p>",
    "options": [
      "DCAB",
      "DCBA",
      "CBAD",
      "CDBA"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct order is CDBA. </p><p>Sentence C comes first as it introduces us to the main subject of the passage (Dancing Girl bronze statuette). D follows C as it talks about the theory behind the naming of the statuette. So, CD is a pair. Sentence B follows the pair CD and states that the figurine was found in Mohenjo-Daro. A follows B as it talks about this ancient city. </p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 8
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. The announcement was made to coincide with Respect for the Aged Day - a national holiday in Japan.</p><p>B. Two Japanese sisters have been certified by Guinness World Records as the world's oldest living identical twins at over 107 years and 300 days.</p><p>C. Umeno and Koume, both described as sociable people, were born on 5 November 1913 on Shodoshima island.</p><p>D. Umeno Sumiyama and Koume Kodama have broken the record set by late Japanese twin sisters Kin Narita and Gin Kanie.</p>",
    "options": [
      "CADB",
      "BDCA",
      "DCAB",
      "CDAB"
    ],
    "correct_option_id": 1,
    "solution": "<p>A triplet BDC would be formed because B tells that two Japanese sisters have been certified as the world's oldest living identical twins, D tells Umeno Sumiyama and Koume Kodama are those two sisters, and then C provides more information about those two sisters. Lastly, A would end the passage by stating that the announcement regarding the same was made on 'Respect for the Aged Day'.</p><p>Thus, the final order is <b>BDCA</b>.</p><p>Hence, option (b) is correct.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. The Romans who ruled Britain spoke their own language, Latin but most of the people who lived in Britain when the Romans were there spoke a Celtic language.</p><p>B. After the Romans left Britain, Germanic tribes who were on the move throughout Europe in the fifth and sixth centuries invaded.</p><p>C. This Celtic language was like Welsh, but again much older than the present-day Welsh language.</p><p>D. These tribes were the Angles, the Saxons and the Jutes and the language they spoke is known as North Sea Germanic.</p>",
    "options": [
      "ACDB",
      "CBAD",
      "ACBD",
      "BDAC"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct order is ACBD.</p><p>After reading all the sentences, we can say that the passage is about languages. Sentence A comes first as it is an independent sentence and provides a platform to carry forward the discussion. It states that during the Roman rule, people in Britain spoke a Celtic language. C follows A as it talks about this Celtic language. So, AC is a pair. Sentence B follows the pair AC and states that after Romans, German tribes invaded Britain. D follows B as it talks about these tribes.</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. However, the two temperature scales happen to intersect at one frigid position: minus 40 degrees.</p><p>B. Celsius and Fahrenheit use completely different measurements  -  for instance, water freezes at 0 degrees Celsius, but 32 degrees Fahrenheit.</p><p>C. There's another called Kelvin, but it's used to measure really far-spectrum temperatures, like what you'd find in outer space.</p><p>D. If you're interested in taking the temperature of something, there are two different units of measurement available to you: Celsius (or centigrade) and Fahrenheit.</p>",
    "options": [
      "BDCA",
      "BADC",
      "DABC",
      "DCBA"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct order is DCBA.</p><p>After reading all the sentences, we can say that the passage is about temperature scales. Sentence D comes first as it provides a platform to carry forward the discussion. It states that there are two different commonly used scales. C follows D as it states that Kelvin is a third scale to measure temperature. But it is not common as the other two. So, DC is a pair. Sentence B follows the pair DC and states that Celsius and Fahrenheit use completely different measurements. A follows B as it talks about the common point where the two scales meet. 'However' is used to introduce a phrase or clause contrasting with what has already been mentioned. </p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 11
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. Once humans began to stand upright, craft tools, harness fire and organize civilizations, we began to believe that we had become cognitively removed from our fellow animals.</p><p>B. The notion that the human brain can conjure up skyscrapers and create artificial intelligence software, gave us a superiority complex that we are just beginning to question.</p><p>C. As animal behavioural science continues to grow, we are learning that the divide between human and animal intelligence isn't as vast as we may think.</p><p>D. But some animals are smarter than others and at some point, humans started keeping them as pets.</p>",
    "options": [
      "ADCB",
      "BDCA",
      "ABDC",
      "BACD"

    "correct_option_id": 2,
    "solution": "<p>The correct order is ABDC. </p><p>Sentence A comes first as it is an independent sentence and provides a platform to carry forward the discussion. It states that evolution made humans think that they are more intelligent than others. B follows A as it states that this belief might not be true. D follows B as it states that some animals are smarter than others, and humans started petting these smarter animals for their benefit. The remaining sentence (Sentence C) is the last part of the sentence. </p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 12
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. As with any doppelgangers, their friends know the difference between them, their mothers probably couldn't even see the resemblance.</p><p>B. Llamas (Lama glama) and alpacas (Lama pacos) are like those two people you see around town all the time who look just alike.</p><p>C. To be fair, llamas and alpacas, both herd animals, are so closely related they can interbreed and create fertile offspring, so their strong resemblance is no surprise.</p><p>D. But to the average human, both of these pack animals, kind of resemble an ostrich mixed with a standard poodle and a camel, which is a really specific look.</p>",
    "options": [

    "correct_option_id": 1,
    "solution": "<p>The correct order is BADC.</p><p>Sentence B comes first as it is an independent sentence and provides a platform to carry forward the discussion. Sentence B states that the appearance of Llamas and alpacas is the same. A follows B as it is the continuation of B. The noun 'doppelganger(s)' means 'a spirit that looks exactly like a living person'. Sentence A states that the close ones cannot see the similarity between the doppelgangers. 'But' is used to introduce a phrase or clause contrasting with what has already been mentioned. D follows A as it conveys that we humans cannot easily identify the difference between these two animals. The remaining sentence C is the last part of the passage. </p><p>Hence, option (b) is the correct answer. </p>",
    "question_index": 13
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. But there's also a powerful psychological effect of seeing your peers leave, which can motivate you to start wondering if the grass is greener on their side.</p><p>B. Mass departure  -  which management experts dub 'turnover contagion'  -  is common and can involve multiple employees independently reacting to the same change in personnel in the policy.</p><p>C. So, especially in today's uncertain labour market, good managers should be strengthening employee retention and recruitment, to avoid being left captaining a ship without a crew.</p><p>D. The strength of turnover contagion depends on which employees leave, and the kind of circumstances they leave under.</p>",
    "options": [
      "CADB",
      "BADC",
      "DACB",
      "CDAB"
    ],
    "correct_option_id": 1,
    "solution": "<p>A mandatory pair BA would be formed because the concept of 'mass departure' is introduced but B and A reflect the psychological effect behind the concept of mass departure rather than what it actually is. Clearly, D and C are about the concept of mass departure so both D and C would follow the pair BA. But the usage of 'so' in C shows that it would follow D as it illustrates a solution to avoid a situation like a mass departure.</p><p>Thus, the final order is <b>BADC</b>.</p><p>Hence, option (b) is correct.</p>",
    "question_index": 14
