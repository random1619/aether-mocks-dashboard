<body>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>A much more better / performance is expected / from the team / in the crucial final match.</p>",
    "options": [
      "A much more better",
      "from the team",
      "in the crucial final match",
      "performance is expected"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error lies in the use of a double comparative. The word \"better\" is already the comparative form of the adjective \"good\". It is incorrect to add \"more\" before it. To emphasize the comparison, the word \"much\" can be used before the comparative adjective.</p><p>The correct phrase should be \"A much better\".</p><p><b>Correct sentence:</b> A <b>much better</b> performance is expected from the team in the crucial final match.</p><p>So, there is an error in the part mentioned in option a).</p><p>Hence, option (a) is the answer.</p><p><b>Note: </b>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 0
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>A red big beautiful / car was parked outside / the main gate of / the university campus.</p>",
    "options": [
      "the main gate of",
      "the university campus",
      "car was parked outside",
      "A red big beautiful"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error is in the incorrect order of adjectives. When multiple adjectives are used to describe a noun, they should follow a specific order. The general order is Opinion, Size, Age, Shape, Colour, Origin, Material, Purpose (OSASCOMP). In this sentence, \"beautiful\" is an opinion, \"big\" is a size, and \"red\" is a colour. The correct order is Opinion -&gt; Size -&gt; Colour.</p><p>The correct phrase should be \"A beautiful big red\".</p><p><b>Correct sentence:</b> A <b>beautiful big red</b> car was parked outside the main gate of the university campus.</p><p>So, there is an error in the part mentioned in option d).</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>The manager said that / my project was / more unique than all / the other submissions.</p>",
    "options": [
      "my project was",
      "the other submissions",
      "more unique than all",
      "The manager said that"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in using a comparative form with an absolute adjective. Adjectives like \"unique\", \"perfect\", \"extreme\", \"complete\", and \"absolute\" describe states that cannot be graded. Something is either unique or it is not; it cannot be \"more unique\". Such adjectives do not have comparative or superlative forms.</p><p><b>Note:</b> Absolute adjectives (or non-gradable adjectives) represent an absolute quality. Therefore, adding comparatives like 'more' or superlatives like 'most' to them is grammatically incorrect.</p><p><b>Correct sentence:</b> The manager said that my project was <b>unique</b> among all the other submissions.</p><p>So, there is an error in the part mentioned in option c).</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>For the grand charity ball, she wore a stunning <u>silk long purple gown</u> that she had purchased from a renowned international designer during her recent trip to Paris.</p>",
    "options": [
      "long purple silken gown",
      "purple long silk gown",
      "long purple silk gown",
      "No substitution"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error in the underlined segment is the incorrect order of adjectives. When multiple adjectives are used to describe a noun, they should follow a conventional order, generally: Opinion, Size, Age, Shape, Colour, Origin, Material, Purpose (OSASCOMP).</p><p>Option a) \"long purple silken gown\" has the correct order (Size -&gt; Colour -&gt; Material), but \"silken\" is a slightly different adjective, though not incorrect in itself. Option (c) is a more direct correction.</p><p>Option b) \"purple long silk gown\" is incorrect as it places Colour before Size, which violates the standard order of adjectives.</p><p>Option c) \"long purple silk gown\" places the adjectives in the correct order: Size (\"long\"), followed by Colour (\"purple\"), and then Material (\"silk\"). This is the most appropriate and standard arrangement.</p><p>Option d) Since the original order of adjectives is incorrect, \"No substitution\" is not the correct choice.</p><p>So, the correct sentence is: For the grand charity ball, she wore a stunning <b>long purple silk gown</b> that she had purchased from a renowned international designer during her recent trip to Paris.</p><p>Hence, the most appropriate choice is c) <b>long purple silk gown</b>.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>He has a _________ knowledge of ancient Indian history and culture.</p>",
    "options": [
      "few",
      "vast",
      "several",
      "many"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence describes the extent of someone's knowledge on a particular subject. The context implies a large and comprehensive understanding. The blank needs an adjective that can modify the uncountable noun \"knowledge\" to mean a great amount.</p><p>The correct option is <b>\"vast,\"</b> which means of very great extent or quantity. It is appropriately used with abstract, uncountable nouns like \"knowledge\" or \"experience\" to denote immensity.</p><p>The other options are incorrect because <b>\"few,\" \"several,\"</b> and <b>\"many\"</b> are quantifiers used with countable plural nouns (e.g., few books, several ideas, many people). Since \"knowledge\" is uncountable, these options are grammatically unsuitable.</p><p>Thus, the correct sentence is: \"He has a <b>vast</b> knowledge of ancient Indian history and culture.\"</p><p>Hence, option (b) is the answer.</p><p><b>Note: Countable and uncountable nouns: 1. Countable nouns</b> are the class of nouns that can be counted, for example, 'table'  -  one table, two tables, three tables, etc. <b>2. Uncountable nouns </b>are the nouns that cannot be counted or usually are not counted, for example, light, water, milk, information, furniture, etc. They do not generally have a plural form and can't be preceded by<b> 'a' </b>or <b>'an'. </b>Many abstract nouns are typically uncountable. Some uncountable nouns can be used in the plural as well, depending on the meaning or context of the word.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>The new city policy</u> <u>has been effective</u>, as there are now <u>less accidents on the main</u> highway <u>during rush hours</u>.</p>",
    "options": [
      "The new city policy",
      "during rush hours",
      "has been effective",
      "less accidents on the main"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error is in using the quantifier \"less\" with the countable noun \"accidents\". The adjective \"less\" is used to quantify uncountable nouns (like traffic, pollution, time). For plural countable nouns (like accidents, cars, people), the correct quantifier to use is \"fewer\".</p><p>The correct phrase should be \"fewer accidents on the main\".</p><p><b>Correct sentence:</b> The new city policy has been effective, as there are now <b>fewer</b> accidents on the main highway during rush hours.</p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>The bridge was</u> not <u>enough strong to withstand</u> the <u>powerful floodwaters</u>, leading to its <u>eventual collapse</u> during the storm.</p>",
    "options": [
      "powerful floodwaters",
      "The bridge was",
      "eventual collapse",
      "enough strong to withstand"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error lies in the incorrect placement of the adjective \"enough\". When \"enough\" is used to modify an adjective, it must be placed <i>after</i> the adjective it is qualifying. The correct grammatical structure is \"adjective + enough\".</p><p>The correct phrase should be \"strong enough to withstand\".</p><p><b>Correct sentence:</b> The bridge was not <b>strong enough</b> to withstand the powerful floodwaters, leading to its eventual collapse during the storm.</p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>Despite having joined the company only a year ago, her insightful performance and leadership skills are clearly <u>superior than her manager's</u>, earning her a quick and well-deserved promotion.</p>",
    "options": [
      "more superior than her manager's",
      "superior to her manager",
      "superior to her manager's",
      "No substitution"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error lies in using the conjunction \"than\" after the adjective \"superior\". Certain comparative adjectives of Latin origin ending in '-ior' (such as superior, inferior, senior, junior) must be followed by the preposition \"to\" instead of \"than\".</p><p>Option a) \"more superior than her manager's\" is incorrect because it forms a double comparative (\"more superior\"), and it retains the incorrect conjunction \"than\".</p><p>Option b) \"superior to her manager\" is incorrect because the comparison is between her <i>performance and skills</i> and her <i>manager's</i> (performance and skills), not between her skills and the manager himself. The possessive form is necessary.</p><p>Option c) \"superior to her manager's\" is the correct substitution. It uses the correct preposition \"to\" after \"superior\" and maintains the correct possessive comparison with \"manager's\" (which stands for \"manager's performance and leadership skills\").</p><p>Option d) The original segment is grammatically incorrect, so \"No substitution\" is not the correct choice.</p><p>So, the correct sentence is: Despite having joined the company only a year ago, her insightful performance and leadership skills are clearly <b>superior to</b> her manager's, earning her a quick and well-deserved promotion.</p><p>Hence, the most appropriate choice is c) <b>superior to her manager's</b>.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>The city council has recently approved a <u>five-millions-dollar plan</u> to completely renovate the old public library, which includes adding a new children's wing and a modern technology hub.</p>",
    "options": [
      "five-million-dollar plan",
      "five-million-dollars plan",
      "five millions-dollars plan",
      "No substitution"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is in the formation of the compound adjective. When a number and a noun (like \"million\" and \"dollar\") are combined with a hyphen to function as an adjective before another noun (\"plan\"), the noun part of the adjective must be in its singular form.</p><p>Option a) \"five-million-dollar plan\" is correct. Here, \"five-million-dollar\" acts as a single adjectival unit modifying \"plan\", and both \"million\" and \"dollar\" are correctly in their singular forms.</p><p>Option b) \"five-million-dollars plan\" is incorrect because \"dollars\" is in the plural form.</p><p>Option c) \"five millions-dollars plan\" is grammatically incorrect because both \"millions\" and \"dollars\" are in the plural form.</p><p>Option d) The original segment contains an error in the formation of the compound adjective, so \"No substitution\" is not the right answer.</p><p>So, the correct sentence is: The city council has recently approved a <b>five-million-dollar plan</b> to completely renovate the old public library, which includes adding a new children's wing and a modern technology hub.</p><p>Hence, the most appropriate choice is a) <b>five-million-dollar plan</b>.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The politician gave _________ answers to avoid taking a clear stand.</p>",
    "options": [
      "direct",
      "frank",
      "honest",
      "evasive"
    ],
    "correct_option_id": 3,
    "solution": "<p>The context of the sentence is a politician who is \"avoiding taking a clear stand.\" This implies that their answers are intentionally vague, indirect, or misleading. The blank requires an adjective that describes this type of communication.</p><p>The correct option is \"evasive,\" which means tending to avoid commitment or self-revelation, especially by responding only indirectly. This word perfectly describes the act of not giving a straight answer to avoid commitment.</p><p>The other options are all antonyms of the required word: \"direct,\" \"frank,\" and \"honest\" all describe clear, open, and truthful communication, which is the opposite of what the politician was doing.</p><p>Thus, the correct sentence is: \"The politician gave <b>evasive</b> answers to avoid taking a clear stand.\"</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>The rescue team</u> found the <u>asleep trekkers huddled together</u> for warmth <u>inside a small cave</u> high up <u>in the mountains</u>.</p>",
    "options": [
      "the rescue team",
      "inside a small cave",
      "asleep trekkers huddled together",
      "in the mountains"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in using a predicative adjective (\"asleep\") in an attributive position. Adjectives like \"asleep\", \"afraid\", \"alive\", and \"alone\" are typically used after a linking verb (e.g., \"The trekkers were asleep\"). They cannot be placed directly before the noun they modify. The correct attributive adjective is the present participle \"sleeping\".</p><p>The correct phrase should be \"sleeping trekkers huddled together\".</p><p><b>Correct sentence:</b> The rescue team found the <b>sleeping</b> trekkers huddled together for warmth inside a small cave high up in the mountains.</p><p>Hence, option (c) is the correct answer.</p><p><b>Note: </b>In English grammar, \"attributive\" and \"predicative\" refer to the positions of adjectives in relation to nouns. Attributive adjectives appear directly before the noun they modify, while predicative adjectives follow a linking verb (like \"is,\" \"seems,\" \"appears\") and describe the subject of the sentence.</p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 10
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>The manager told us that / he disapproves of these sort / of irresponsible employee behaviour.</p>",
    "options": [
      "of irresponsible employee behaviour",
      "The manager told us that",
      "No error",
      "he disapproves of these sort"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error is in the lack of agreement between the demonstrative adjective \"these\" and the noun \"sort\".</p><p>\"These\" is a plural demonstrative adjective used to modify plural nouns. \"Sort\" is a singular noun. There is a mismatch. The phrase should either be \"this sort\" (singular adjective with singular noun) or \"these sorts\" (plural adjective with plural noun).</p><p>Given the context, \"this sort of irresponsible employee behaviour\" is the most appropriate correction.</p><p><b>Correct Sentence:</b> The manager told us that he disapproves of <b>this sort</b> of irresponsible employee behaviour.</p><p>Hence, option (d) is the correct answer.</p><p><b>Note: Demonstrative Adjectives:</b> Demonstrative adjectives include \"this\", \"that\", \"these\" and \"those\". These modify or describe a noun and come before a noun while 'demonstrative pronouns' replace a noun. Example: \"I like that T-shirt of yours\".</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined word in the given sentence.</p><p>For my family, buying local produce is always a more <u>economic</u> choice for us.</p>",
    "options": [
      "economical",
      "financial",
      "monetary",
      "costly"
    ],
    "correct_option_id": 0,
    "solution": "<p>The adjective \"economic\" is used incorrectly in this context. \"Economic\" relates to the broader field of economy (e.g., economic policy, economic growth). The sentence intends to describe a choice that is efficient and saves money.</p><p>Option a): <b>economical</b> is the correct choice. It means \"giving good value or service in relation to the amount of money, time, or effort spent.\" It correctly describes a money-saving choice.</p><p>Option b): <b>financial</b> is a general term relating to finance or money (e.g., financial advice), but it doesn't specifically mean \"money-saving\".</p><p>Option c): <b>monetary</b> relates to money or currency (e.g., monetary value) and doesn't fit the context of a wise spending choice.</p><p>Option d): <b>costly</b> means expensive, which is the opposite of the intended meaning in the sentence.</p><p>So, the best replacement is \"economical\", making the corrected sentence: \"For my family, buying local produce is always a more <b>economical</b> choice for us.\"</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>_________ employee is required to attend the mandatory safety training session.</p>",
    "options": [
      "Several",
      "Each",
      "Many",
      "All"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence refers to an \"employee\" in the singular. The blank requires a distributive adjective that agrees with a singular countable noun.</p><p>The rule being tested is adjective-noun agreement, specifically with distributive adjectives.</p><p>The correct option is <b>\"Each,\"</b> which is a distributive adjective used to refer to every single member of a group individually and is followed by a singular noun (\"employee\").</p><p>The other options are incorrect because they are used with plural nouns: <b>\"Several\"</b> employees, <b>\"Many\"</b> employees, and <b>\"All\"</b> employees. Since the noun \"employee\" is singular, these options are grammatically unsuitable.</p><p>Thus, the correct sentence is: \"<b>Each</b> employee is required to attend the mandatory safety training session.\"</p><p>Hence, option (b) is the answer.</p><p><b>Note: </b>Distributive adjectives refer to members of a group individually rather than collectively. Common examples include \"each,\" \"every,\" \"either,\" and \"neither.\" These words specify that a noun is being considered separately from the group it belongs to. </p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Of the two routes to the destination, this one is the _________.</p>",
    "options": [
      "shortest",
      "shorter",
      "short",
      "most short"
