    <script>
        const questions = [
  {
    "question": "<p>For the four-sentence (S1 to S4) paragraph below, sentences S1 and S4 are given. From the options P, Q, R and S select the sentences for S2 and S3, respectively.</p><p></p><p>S1. The Directory still nominally governed France, though the affairs of the nation, under their inefficiency and misrule, were passing rapidly to ruin.</p><p>S2.</p><p>S3.</p><p>S4. Joseph defended his absent brother with so much eloquence and power, as to confound his accusers, and he obtained a unanimous verdict in his favour.</p><p>P. Joseph had become a very wealthy man, having acquired a large fortune by his marriage.</p><p>Q. The Directors contemplated with alarm the rising prominence that Napoleon was acquiring in the East.</p><p>R. Preparations were now making for the expedition to Egypt.</p><p>S. They made a formidable attack upon him, through a committee, in the Council of Five Hundred.</p>",
    "options": [
      "R, P",
      "Q, S",
      "S, R",
      "P, Q"
    ],
    "correct_option_id": 1,
    "solution": "<p>Sentences Q and S have to be S2 and S3 respectively. S1 talks about a council that ran the affairs of France and S4 talks about Joseph, who defended his brother, probably against the Directory. Sentences Q and S form a pair as they talk about the activities done by the people in the Directory against Napoleon (Joseph's brother) which leads to the defence of Joseph for his brother in the Council of Five Hundred. The remaining sentences though relevant, do not match the context of the given sentences and are thus negated.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 0
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A) Although many people probably think of bacteria when they hear the term microbe, there are many other microscopic organisms. </p><p>B) While some of these are disease-causing, the majority simply exist as part of the vast food web and have their own ecological niches and importance.</p><p>C) Many are eukaryotic&#8213;i.e., having cells like our own, with a membrane-bound nucleus, as opposed to prokaryotic-like bacteria.</p><p>D) These tiny creatures are commonly studied in school and can often be seen swimming in a drop of water viewed through a microscope.</p><p>E) Many are considered protozoans, meaning they have animal-like traits and were once thought to be the ancestors of modern animals.</p>",
    "options": [
      "ABCED",
      "AEDBC",
      "ACBED",
      "DABCE"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct arrangement of the sentences to form a coherent paragraph is ACBED. Sentence A serves as an introductory statement, expanding the understanding of microbes beyond solely bacteria, and setting the context for discussing various microscopic organisms. Following the introduction, sentence C introduces the distinction between eukaryotic microbes and prokaryotic bacteria, providing insight into the diversity of microscopic organisms. Continuing the discussion on diverse microbes, sentence B elaborates on their different roles, mentioning disease-causing capabilities alongside their ecological importance. Sentence E further expands on the specific types of eukaryotic microbes, focusing on protozoans and their animal-like traits, offering insight into their evolutionary connections. Sentence D concludes the paragraph and provides relatable context, mentioning the common observation and study of these microbes in schools, specifically noting their visibility through a microscope. This sequence offers a coherent flow, initiating with an introduction to microbes beyond bacteria, discussing the diversity of microscopic organisms, delving into their roles and distinctions, exploring specific types of eukaryotic microbes, and concluding with a relatable context of their study and observation. Hence, (c) is the correct answer. </p>",
    "question_index": 1
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Select the option that arranges the sentences in the correct logical sequence to form a meaningful and coherent paragraph.</p><p>A. However, with the global population expected to reach 9.7 billion by 2050, the need for sustainable food production will only intensify. </p><p>B. The focus on reducing food waste and promoting sustainable agriculture is not just a matter of environmental responsibility but also a critical step towards ensuring global food security. </p><p>C. The world's food system is not sustainable, with significant inefficiencies and waste contributing to food insecurity. </p><p>D. The world is currently facing an unprecedented challenge: to feed a rapidly growing population while addressing environmental concerns like climate change.</p>",
    "options": [
      "D, C, A, B",
      "D, B, C, A",
      "C, D, B, A",
      "B, A, C, D"
    ],
    "correct_option_id": 2,
    "solution": "<p>If the sentences are read carefully, it can be noted that sentences C and D have the potential to start the paragraph. So, either C or D can take the first two positions, interchangeably. It is followed by sentence B which mentions the point of focus that can solve the problem mentioned in C and D. Sentence A, which introduces the contradiction to the information in B must be the last sentence, thereby concluding the paragraph. So, the possible arrangements are CDBA and DCBA.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 2
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph. Note: This is about the impact of smartphone use on teenage brain development.</p><p>A. Excessive smartphone use can disrupt healthy brain development by weakening connections between brain cells, making it harder to regulate emotional reactions and other brain functions.</p><p>B. Smartphone use can also make it harder for teenagers to focus and avoid distractions, thereby increasing their dependence on digital devices.</p><p>C. Understanding the impact of smartphone use on teenage brain development is crucial.</p>",
    "options": [
      "BAC",
      "ACB",
      "CAB",
      "CBA"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sentence 'C' serves as an introduction, setting up the importance of the topic. Sentence 'A' explains the negative effects of smartphone use on brain development, expanding on the idea introduced in the first sentence. Sentence 'B' follows and provides additional details on how smartphone use affects focus and leads to dependence on digital devices, continuing from the explanation in sentence A. </p><p>So, the correct order is <b>CAB</b>.</p><p>Hence, option (c) is the answer. </p>",
    "question_index": 3
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Select the option that arranges the sentences in the correct logical sequence to form a meaningful and coherent paragraph.</p><p>a. These unique cultural values can shape how people think about and understand others.</p><p>b. While other cultures encourage people to be independent and make their own choices (this is called independence).</p><p>c. Interestingly, the way you understand what others are thinking and feeling can differ depending on where you grew up and what values you were taught.</p><p>d. For example, some cultures put a lot of emphasis on working together and thinking about the needs of the group (this is called interdependence). </p>",
    "options": [
      "c, d, b, a",
      "a, b, d, c",
      "d, b, a, c",
      "b, a, d, c"
    ],
    "correct_option_id": 0,
    "solution": "<p>Sentence 'c' introduces the topic and sets the context for the discussion on cultural differences and their impact on understanding others. Sentence 'd' provides the first example of a cultural value, expanding on the idea introduced in the first sentence. Sentence 'b' follows and contrasts with the previous example, offering another cultural perspective. Sentence 'a' serves as a concluding sentence, tying the examples back to the main idea introduced in the first sentence.</p><p>So, the correct order is <b>c, d, b, a</b>. </p><p>Hence, option (a) is the answer. </p>",
    "question_index": 4
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. To compensate for this change in lifestyle we need physical exercise.</p><p>B. Our society is turning towards more and more technical sophistication and automation. </p><p>C. It keeps a balance between our body and mind. </p><p>D. However, over-exercise or exercising in an improper way may tell upon our health and growth.</p>",
    "options": [
      "BCAD",
      "ACDB",
      "DCAB",
      "BACD"
    ],
    "correct_option_id": 3,
    "solution": "<p>Sentence B comes first as it is an independent sentence and provides a platform to carry forward the discussion. A follows B as it talks about what should we do to compensate for this change into automation. Sentence A states that we should exercise, and C follows A as it talks about what we can achieve by doing physical exercise. 'However' is used to show a contrast with something that had been said before. D follows C as it contrasts sentence C. Therefore, BACD becomes the correct order among the given options. </p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. It is a political and military partnership among most European countries.</p><p>B. NATO members agree that an attack on one member will be seen as an attack on all. </p><p>C. If that happens, all members will defend the attacked country.</p><p>D. NATO stands for North Atlantic Treaty Organization.</p>",
    "options": [
      "BCDA",
      "BCAD",
      "DABC",
      "DCBA"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sentence D comes first as it introduces us to the main subject 'NATO'. A follows D as it further explains the organisation. So, DA is a pair. The pair BC talks about the agreement among the member countries in that order. Therefore, DABC becomes the correct order among the given options. </p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 6
  },
  {
    "question": "<p> Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A) Across the animal kingdom, migratory patterns vary widely, often dictated by seasonal changes, resource availability, or reproductive cycles. </p><p>B) Migration, an age-old phenomenon embedded within the fabric of numerous species, denotes the deliberate movement of populations from one region to another. </p><p>C) Similarly, mammals, such as wildebeests in Africa, embark on epic migrations driven by the pursuit of greener pastures and water sources.</p><p>D) Birds undertake arduous journeys spanning thousands of miles, navigating through diverse terrains and climates to reach breeding grounds or warmer habitats.</p>",
    "options": [
      "ABDC",
      "BCDA",
      "BADC",
      "DCAB"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct order to form a meaningful and coherent paragraph is BADC. Sentence B provides a general definition and introduction to migration, highlighting its significance across various species. Sentence A follows the general introduction by stating the variability of migratory patterns across different species and the factors influencing these patterns. Sentence D specifically focuses on bird migration, highlighting the incredible distances and challenges birds face during their migrations for breeding or in search of favourable climates. Sentence C broadens the discussion to include mammalian migrations, referencing the migration of wildebeests in Africa driven by the need for better resources. This sequence creates a coherent flow, starting with a general definition of migration (B), moving to the variability of migratory patterns (A), then focusing on bird migration (D), and finally expanding the scope to include mammalian migrations (C). Hence, (c) is the correct answer. </p>",
    "question_index": 7
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph. </p><p></p><p>A) As the day ended, the sky turned orange and pink, painting a beautiful picture above the peaceful park.</p><p>B) Children ran and laughed, playing games on the green grass. </p><p>C) Their families sat on colourful blankets, enjoying picnics in the sunshine. </p><p>D) The park was big and full of trees and flowers. </p>",
    "options": [
      "CBAD",
      "DBCA",
      "BCAD",
      "DACB"
    ],
    "correct_option_id": 1,
    "solution": "<p>The logical sequence to form a coherent paragraph is DBCA. Sentence D provides the initial description, setting the scene by describing the park's size and its natural elements. Sentence B follows the description of the park and introduces the activity of children playing games on the grass, adding movement and liveliness to the scene. Sentence C logically follows, describing their ('children' mentioned in sentence B) families taking advantage of the pleasant setting to enjoy picnics in the park. Sentence A introduces the sunset scene, concluding the sequence by setting the atmosphere as the day comes to an end with a picturesque sky over the serene park. Hence, (b) is the correct answer.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A) Plymouth Rock, an iconic symbol in American history, holds significant cultural and historical importance as the traditional site marking the landing of the Mayflower Pilgrims in 1620.</p><p>B) Despite its revered status, Plymouth Rock's significance evolved over time, transitioning from an unassuming landing site to a revered national monument.</p><p>C) However, its actual role in the Pilgrims' arrival remains shrouded in historical ambiguity and debate.</p><p>D) Located in Plymouth, Massachusetts, the rock stands as a tangible link to the country's early colonial history.</p>",
    "options": [
      "BACD",
      "DABC",
      "BDCA",
      "ADCB"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct arrangement of the sentences to form a coherent paragraph is ADCB. Sentence A serves as an introductory statement, presenting Plymouth Rock as an iconic symbol with historical and cultural importance due to its association with the Mayflower Pilgrims' landing in 1620. Sentence D follows the introductory statement and provides specific information about Plymouth Rock's location and emphasises its connection to America's early colonial history, serving as supporting detail to reinforce its significance. Sentence C introduces doubt about the accuracy of Plymouth Rock's role, highlighting historical ambiguity and ongoing debates about its actual significance in the Pilgrims' arrival despite its perceived importance. Sentence B concludes the paragraph and discusses the transformation of Plymouth Rock's significance, noting how it evolved from a simple landing site to a revered national monument, despite uncertainties regarding its historical accuracy. This sequence begins by introducing Plymouth Rock's historical importance, then provides specific details about its location and introduces doubt about its exact role. Finally, it concludes by discussing the evolution of Plymouth Rock's significance, creating a coherent narrative about its place in American history while acknowledging historical uncertainties. Hence, (d) is the correct answer. </p>",
    "question_index": 9
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. In the introduction of the book <i>Silence: In The Age of Noise</i>, the Norwegian explorer Erling Kagge talks about trying to convince his teenage daughters of the power of silence.</p><p>B. In our privileged, hyper-stimulated, multiple-choice world, we're so used to upgrading life with bonus extras that settling for silence has begun to feel more unnatural.</p><p>C. Sometimes, I think silence isn't so much an enemy as a boring, bog-standard default.</p><p>D. It's vanilla  -  and who wants vanilla when you could have the aural equivalent of a triple chocolate fudge brownie with marshmallow swirls?</p>",
    "options": [
      "DABC",
      "ACDB",
      "CBAD",
      "BDAC"
    ],
    "correct_option_id": 1,
    "solution": "<p>A is the opening sentence as it introduces the subject 'silence' (via a book) of the passage. A mandatory pair CD would be formed because the speaker in C says that they do not think of silence as an enemy or boring instead it is like vanilla as mentioned in D. The remaining sentence B would follow the pair CD because it tells how people in today's world want everything extra which is in alignment with the food analogy mentioned in D.</p><p>Thus, the final order is <b>ACDB</b>.</p><p>Hence, option (b) is correct.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p></p><p>A. Farmers can have multiple harvests to supplement their income.</p><p>B. Though known to be highly nutritious and still consumed but in a limited quantity, it has economic benefits too.</p><p>C. Efforts are under way to popularise the inclusion of Amaranthus  -  a wide variety of leafy vegetables. </p><p>D. But cultivation was gradually on the wane and with it a slice of culinary culture.</p>",
    "options": [
      "CADB",
      "CBAD",
      "ADCB",
      "ACBD"
    ],
    "correct_option_id": 1,
    "solution": "<p>Sentence C comes first as it introduces us to the main subject of the passage 'Amaranthus'. B follows C as it states that this leafy vegetable is nutritious and profitable. A follows B as it states that farmers can have multiple harvests of Amaranthus as it is profitable. 'But' is used to introduce a phrase or clause contrasting with what has already been mentioned. Although the vegetable provides a good income, cultivation was decreased (says sentence D). So, this can be a concluding sentence of the passage. Therefore, CBAD becomes the correct order among the given options. Hence, option (b) is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. Upon enquiry, Raju was found to be a spy from an enemy state.</p><p>B. The E-zone is an unauthorised area in Breeland.</p><p>C. This meant that he could be deported.</p><p>D. Raju and Rinki entered the said zone and got caught.</p>",
    "options": [
      "BDAC",
      "ABDC",
      "BADC",
      "CBAD"
    ],
    "correct_option_id": 0,
    "solution": "<p>After reading all the sentences, we can say that the passage is about E-zone and the subjects' entry therein. Sentence B comes first as it is an independent sentence. Sentence D comes second as it gives a platform to carry forward the discussion. It also uses the phrase 'said zone' and the only sentence that mentions a specific zone is B. Therefore, BD is a pair. Also, DA is another pair because the subjects get caught in D and the enquiry is a direct consequence which is mentioned in A. This pairing is only present in one of the options. C will necessarily follow A because it talks about the man being deported who was a spy which has been highlighted in A. Therefore, the correct order is BDAC. Hence, option (a) is the correct answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. Perhaps he helped turn their home into a saint arcade by requisitioning church overstock; but by any measure, it was quite a display.</p><p>B. There had to be six or seven larger-than-kid-sized statues on the second-floor landing, right at the top of the stairs.</p><p>C. Uncle John, now late in life, worked part-time as a janitor for our parish.</p><p>D. There they stood, in various poses of melancholy, misery, piety and/or penance, hands beckoning, in two-finger blessings with thumb and ring finger circled, or else holding something significant to each.</p>",
    "options": [
      "BACD",
      "CABD",
      "BDCA",
      "CBAD"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct sequence of the sentences will be:</p><p><b>C.</b> Uncle John, now late in life, worked part-time as a janitor for our parish.</p><p><b>A.</b> Perhaps he helped turn their home into a saint arcade by requisitioning church overstock; but by any measure, it was quite a display.</p><p><b>B.</b> There had to be six or seven larger-than-kid-sized statues on the second-floor landing, right at the top of the stairs.</p><p><b>D.</b> There they stood, in various poses of melancholy, misery, piety and/or penance, hands beckoning, in two-finger blessings with thumb and ring finger circled, or else holding something significant to each.</p><p>Identifying the first sentence in the paragraph is a basic step to solve the para jumble. Among the given sentences, <b>C</b> can be easily identified as the introductory sentence as it introduces us to Uncle John, who is old and used to work part-time as a cleaner for the author's parish.</p><p><b>A</b> is in continuation of <b>C </b>as it tells us more about Uncle John. It is mentioned that maybe he assisted in the transformation of their home into a saint arcade by obtaining church leftovers, but it was an impressive show in any case.</p><p>Thereafter, <b>B</b> carries forward the paragraph as it gives us the details of the figures or statues brought from the church by Uncle John. On the second floor, just at the top of the stairs, there had to be six or seven big sculptures.</p><p><b>D</b> is the concluding sentence as it mentions the characteristics of the statues  -  already talked about in <b>B</b>.</p><p>Therefore, the correct answer is: <b>(b) CABD.</b></p>",
    "question_index": 13
  },
  {
    "question": "<p>Sentences of a paragraph are given below in jumbled order. Arrange the sentences in the correct order to form a meaningful and coherent paragraph.</p><p>A. When I was four, I was admitted to St Louis City hospital.</p><p>B. I hated that the bed was covered with a sheet which was white.</p><p>C. I remember the ward I was put into was full of kids of different ages.</p><p>D. It was for my second set of eye surgery's.</p>",
    "options": [
      "CBDA",
      "ABDC",
      "DCAB",
      "ADCB"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>A</b> is the introductory sentence as it introduces us to the author, who was four years old and was admitted to hospital. <b>D</b> is the next sentence as it tells us the reason why the author was admitted. <b>C</b> follows <b>D</b> as it mentions that the author recalls being put into a ward full of children of various ages. Lastly, <b>B</b> is the concluding sentence as it delves into the feelings of the author. It states that the author despised the fact that the bed was draped in a white sheet.</p><p>Therefore, the correct answer is: <b>(d) ADCB</b>.</p>",
    "question_index": 14
