    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p>P. into long-duration spaceflight, advanced propulsion systems,</p><p>Q. the ambitious goal of landing astronauts on Mars</p><p>R. and sustainable life support systems</p><p>S. within the next decade fuels extensive research</p>",
    "options": [
      "RSPQ",
      "QSPR",
      "PRSQ",
      "SPQR"
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence begins with part <b>Q</b>, \"The ambitious goal of landing astronauts on Mars,\" which introduces the main subject of the sentence  -  the ambitious goal. This part clearly sets up what the goal is and what it does.</p><p>Part <b>S</b>, \"within the next decade fuels extensive research,\" logically follows Q. \"within the next decade\" specifies the timeframe for the goal mentioned in Q, and \"fuels extensive research\" is the verb phrase describing the action of the \"ambitious goal.\"</p><p>Next, part <b>P</b>, \"into long-duration spaceflight, advanced propulsion systems,\" specifies the areas into which the extensive research (mentioned in S) is directed. The preposition \"into\" links directly to \"research.\"</p><p>Finally, part <b>R</b>, \"and sustainable life support systems,\" completes the list of research areas initiated in P, using the conjunction \"and\" to add the final element to the series.</p><p>Thus, the correct and meaningful order of the sentence is QSPR.</p><p>The complete sentence after rearrangement is: The ambitious goal of landing astronauts on Mars within the next decade fuels extensive research into long-duration spaceflight, advanced propulsion systems, and sustainable life support systems.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 0
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p>P. audiences worldwide, often performed by skilled orchestras</p><p>Q. and profound emotional depth, continues to captivate</p><p>R. classical music, with its intricate harmonies</p><p>S. in grand, acoustically designed concert halls</p>",
    "options": [
      "QSPR",
      "PQSR",
      "RQPS",
      "SPQR"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence appropriately starts with part <b>R</b>, \"Classical music, with its intricate harmonies,\" which introduces the subject \"Classical music\" and begins to describe its qualities.</p><p>Part <b>Q</b>, \"and profound emotional depth, continues to captivate,\" naturally follows R. It adds another quality (\"profound emotional depth\") using the conjunction \"and,\" and then provides the main verb phrase \"continues to captivate\" for the subject \"Classical music.\"</p><p>Next, part <b>P</b>, \"audiences worldwide, often performed by skilled orchestras,\" specifies whom the music captivates (\"audiences worldwide\") and adds a participial phrase \"often performed by skilled orchestras\" describing how it is presented.</p><p>Finally, part <b>S</b>, \"in grand, acoustically designed concert halls,\" completes the sentence by providing the location where these performances typically occur, modifying \"performed.\"</p><p>Thus, the correct and meaningful order of the sentence is RQPS.</p><p>The complete sentence after rearrangement is: Classical music, with its intricate harmonies and profound emotional depth, continues to captivate audiences worldwide, often performed by skilled orchestras in grand, acoustically designed concert halls.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 1
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p>(a) showcased remarkable urban planning</p><p>(b) a testament to their advanced engineering skills</p><p>(c) the Indus Valley Civilization,</p><p>(d) with sophisticated drainage systems and well-organized cities,</p><p>(e) which flourished around the Indus River,</p>",
    "options": [
      "abdec",
      "ceadb",
      "deacb",
      "eacbd"
    ],
    "correct_option_id": 1,
    "solution": "<p>(c) <b>The Indus Valley Civilization,</b>  -  This part introduces the main subject of the sentence. It's a proper noun and a clear starting point.</p><p>(e) <b>which flourished around the Indus River,</b>  -  This participial phrase provides additional information about \"The Indus Valley Civilization,\" specifying its location and period of prosperity. It naturally follows the subject. So far: \"The Indus Valley Civilization, flourishing around the Indus River,\"</p><p>(a) <b>showcased remarkable urban planning</b>  -  This is the main verb phrase for the subject \"The Indus Valley Civilization.\" It describes what the civilization did. Now we have: \"The Indus Valley Civilization, flourishing around the Indus River, showcased remarkable urban planning\"</p><p>(d) <b>with sophisticated drainage systems and well-organized cities,</b>  -  This prepositional phrase elaborates on \"remarkable urban planning,\" giving specific examples of its features. It connects logically to (a): \"...showcased remarkable urban planning with sophisticated drainage systems and well-organized cities,\"</p><p>(b) <b>a testament to their advanced engineering skills</b>  -  This appositive phrase renames or explains the significance of the previously mentioned achievements, concluding the sentence by highlighting what these features demonstrated. It links to the entire preceding clause.</p><p><b>Final sentence:</b> \"The Indus Valley Civilization, which flourished around the Indus River, showcased remarkable urban planning with sophisticated drainage systems and well-organized cities, a testament to their advanced engineering skills.\"</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p>(a) encourage individuals to seek timely support,</p><p>(b) raising awareness about mental health issues</p><p>(c) and foster a more compassionate</p><p>(d) helps to reduce stigma,</p><p>(e) and understanding society overall</p>",

    ],
    "correct_option_id": 3,
    "solution": "<p>(b) <b>Raising awareness about mental health issues</b>  -  This gerund phrase serves as the subject of the sentence, introducing the main action being discussed.</p><p>(d) <b>helps to reduce stigma,</b>  -  This is the main verb phrase (\"helps\") for the subject in (b), followed by the first benefit or outcome (\"to reduce stigma\"). So far: \"Raising awareness about mental health issues helps to reduce stigma,\"</p><p>(a) <b>encourage individuals to seek timely support,</b>  -  This infinitive phrase (with \"to\" implied from \"helps to\") presents the second benefit, parallel in structure to \"reduce stigma.\" It logically follows (d): \"...helps to reduce stigma, encourage individuals to seek timely support,\"</p><p>(c) <b>and foster a more compassionate</b>  -  This phrase, beginning with \"and,\" introduces the third benefit, continuing the list of positive outcomes. The verb \"foster\" is also parallel. Now: \"...encourage individuals to seek timely support, and foster a more compassionate\"</p><p>(e) <b>and understanding society overall</b>  -  This completes the description of the type of society fostered, with \"and understanding\" being parallel to \"compassionate.\" It forms the object of \"foster.\"</p><p><b>Final sentence:</b> \"Raising awareness about mental health issues helps to reduce stigma, encourage individuals to seek timely support, and foster a more compassionate and understanding society overall.\"</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p>(a) implement robust preservation policies,</p><p>(b) governments must allocate adequate funding,</p><p>(c) and actively involve local communities</p><p>(d) in conservation efforts effectively</p><p>(e) to safeguard cultural heritage for posterity,</p>",
    "options": [

      "daebc",
      "ebacd"
    ],
    "correct_option_id": 3,
    "solution": "<p>(e) <b>To safeguard cultural heritage for posterity,</b>  -  This introductory infinitive phrase clearly states the purpose or goal for the actions that will follow in the sentence.</p><p>(b) <b>governments must allocate adequate funding,</b>  -  This forms the main clause, with \"governments\" as the subject and \"must allocate\" as the verb, detailing the first necessary action to achieve the purpose stated in (e). So far: \"To safeguard cultural heritage for posterity, governments must allocate adequate funding,\"</p><p>(a) <b>implement robust preservation policies,</b>  -  This verb phrase (with \"must\" implied from (b)) lists the second necessary action, parallel in structure to \"allocate adequate funding.\" Now: \"...governments must allocate adequate funding, implement robust preservation policies,\"</p><p>(c) <b>and actively involve local communities</b>  -  This phrase, beginning with \"and,\" introduces the third necessary action, continuing the parallel list of what governments must do. \"...implement robust preservation policies, and actively involve local communities\"</p><p>(d) <b>in conservation efforts effectively</b>  -  This prepositional phrase completes the description of the third action, specifying where and how local communities should be involved.</p><p><b>Final sentence:</b> \"To safeguard cultural heritage for posterity, governments must allocate adequate funding, implement robust preservation policies, and actively involve local communities in conservation efforts effectively.\"</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p>P. a vast majority of flowering plants</p><p>Q. to agricultural biodiversity and food security,</p><p>R. as these insects are crucial pollinators for</p><p>S. the decline of global bee populations poses a significant threat</p>",
    "options": [
      "SQRP",
      "QRPS",
      "RPQS",
      "PQSR"
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence logically begins with part <b>S</b>, \"The decline of global bee populations poses a significant threat,\" which introduces the main subject \"The decline of global bee populations\" and its primary action \"poses a significant threat.\"</p><p>Part <b>Q</b>, \"to agricultural biodiversity and food security,\" directly follows S, specifying what the \"significant threat\" (mentioned in S) is directed towards, using the preposition \"to.\"</p><p>Next, part <b>R</b>, \"as these insects are crucial pollinators for,\" provides the reason or explanation for the threat mentioned. The conjunction \"as\" introduces this causal clause, and \"these insects\" refers back to the \"bee populations\" from part S.</p><p>Finally, part <b>P</b>, \"a vast majority of flowering plants,\" completes the clause started in R, specifying what the insects are pollinators for, thus concluding the sentence with the full impact of the bee population decline.</p><p>Thus, the correct and meaningful order of the sentence is SQRP.</p><p>The complete sentence after rearrangement is: The decline of global bee populations poses a significant threat to agricultural biodiversity and food security, as these insects are crucial pollinators for a vast majority of flowering plants.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 5
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p>(a) reducing our reliance on fossil fuels,</p><p>(b) investing in renewable energy sources</p><p>(c) and fostering sustainable economic growth</p><p>(d) like solar and wind power</p><p>(e) is crucial for mitigating climate change,</p>",
    "options": [
      "acedb",
      "cdeab",
      "eabcd",
      "bdeac"
    ],
    "correct_option_id": 3,
    "solution": "<p>(b) <b>Investing in renewable energy sources</b>  -  This gerund phrase acts as the subject of the sentence, introducing the main action or concept being discussed.</p><p>(d) <b>like solar and wind power</b>  -  This phrase provides examples of \"renewable energy sources,\" clarifying the subject. It naturally follows (b). So far: \"Investing in renewable energy sources like solar and wind power\"</p><p>(e) <b>is crucial for mitigating climate change,</b>  -  This is the predicate of the sentence, with \"is crucial\" being the verb phrase and \"for mitigating climate change\" explaining the primary importance or purpose. It follows (d): \"...is crucial for mitigating climate change,\"</p><p>(a) <b>reducing our reliance on fossil fuels,</b>  -  This participial phrase (-ing form) presents a second crucial outcome or purpose, parallel in structure to \"mitigating climate change.\" It logically extends the idea in (e): \"...crucial for mitigating climate change, reducing our reliance on fossil fuels,\"</p><p>(c) <b>and fostering sustainable economic growth</b>  -  This phrase, beginning with \"and,\" introduces the third parallel outcome/purpose, completing the list of benefits.</p><p><b>Final sentence:</b> \"Investing in renewable energy sources like solar and wind power is crucial for mitigating climate change, reducing our reliance on fossil fuels, and fostering sustainable economic growth.\"</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p>(a) For comprehensive understanding of complex subjects,</p><p>(b) and consistent review of material</p><p>(c) active participation in discussions,</p><p>(d) are absolutely essential for students</p><p>(e) diligent note-taking during lectures,</p>",
    "options": [
      "acebd",
      "cbeda",
      "debac",
      "ecdba"

    "correct_option_id": 0,
    "solution": "<p>(a) <b>For comprehensive understanding of complex subjects,</b>  -  This introductory prepositional phrase sets the context or purpose for what follows. It indicates why the subsequent actions are necessary.</p><p>(c) <b>active participation in discussions,</b>  -  This is the first item in a list of essential actions or requirements that form the compound subject of the sentence. It follows the introductory phrase: \"For comprehensive understanding of complex subjects, active participation in discussions,\"</p><p>(e) <b>diligent note-taking during lectures,</b>  -  This is the second item in the list of essential actions, parallel in structure to (c). It continues the enumeration: \"...active participation in discussions, diligent note-taking during lectures,\"</p><p>(b) <b>and consistent review of material</b>  -  This is the third and final item in the list, connected by the conjunction \"and.\" It completes the compound subject: \"...diligent note-taking during lectures, and consistent review of material\"</p><p>(d) <b>are absolutely essential for students </b> -  This is the predicate of the sentence, with \"are\" agreeing with the plural compound subject (participation, note-taking, and review), and \"absolutely essential for students\" explaining their importance.</p><p><b>Final sentence:</b> \"For comprehensive understanding of complex subjects, active participation in discussions, diligent note-taking during lectures, and consistent review of material are absolutely essential for students.\"</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p>(a) along the winding river,</p><p>(b) their leaves whispering secrets to the breeze,</p><p>(c) ancient trees with gnarled branches stood sentinel,</p><p>(d) creating a timeless scene</p><p>(e) of tranquil beauty</p>",
    "options": [
      "acbde",
      "cbaed",
      "bdeac",
      "deabc"
    ],
    "correct_option_id": 0,
    "solution": "<p>(a) <b>Along the winding river,</b>  -  This prepositional phrase sets the location or scene for the sentence. It's a common way to begin a descriptive sentence.</p><p>(c) <b>ancient trees with gnarled branches stood sentinel,</b>  -  This is the main clause of the sentence, introducing the subject (\"ancient trees\") and the verb (\"stood sentinel\"). It describes what was present in the scene set by (a). So far: \"Along the winding river, ancient trees with gnarled branches stood sentinel,\"</p><p>(b) <b>their leaves whispering secrets to the breeze,</b>  -  This absolute phrase provides additional descriptive detail about the \"ancient trees,\" adding to the imagery. It modifies the subject of the main clause. Now: \"...stood sentinel, their leaves whispering secrets to the breeze,\"</p><p>(d) <b>creating a timeless scene</b>  -  This participial phrase describes the overall effect or result of the elements mentioned so far (the river, the trees, their leaves). It links back to the entire preceding description. \"...their leaves whispering secrets to the breeze, creating a timeless scene\"</p><p>(e) <b>of tranquil beauty </b> -  This prepositional phrase completes the description introduced in (d), specifying the nature of the \"timeless scene.\"</p><p><b>Final sentence:</b> \"Along the winding river, ancient trees with gnarled branches stood sentinel, their leaves whispering secrets to the breeze, creating a timeless scene of tranquil beauty.\"</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Select the option that arranges the parts in the correct sequence to form a meaningful sentence.</p><p>(P) ancient libraries like Alexandria</p><p>(Q) preserving knowledge for future generations</p><p>(O) housed vast collections of scrolls,</p><p>(R) across diverse cultures</p>",
    "options": [
      "POQR",

    "correct_option_id": 0,
    "solution": "<p>The sentence logically begins with part <b>(P) \"Ancient libraries like Alexandria\"</b>, which introduces the subject of the sentence. This subject requires a verb to explain what these libraries did.</p><p>Part <b>(O) \"housed vast collections of scrolls,\"</b> provides this verb (\"housed\") and its object (\"vast collections of scrolls\"), naturally following (P). So far: \"Ancient libraries like Alexandria housed vast collections of scrolls,\".</p><p>Part <b>(Q) \"preserving knowledge for future generations\"</b> is a participial phrase that describes the purpose or result of housing these scrolls. It explains what the action in (P) and (O) achieved.</p><p>Finally, part <b>(R) \"across diverse cultures\"</b> is a prepositional phrase that further modifies \"knowledge\" or \"generations,\" indicating the scope or reach. It provides additional context to (Q).</p><p>Thus, the correct and meaningful order of the sentence is POQR.</p><p><b>The sentence formed after rearrangement is:</b> Ancient libraries like Alexandria housed vast collections of scrolls, preserving knowledge for future generations across diverse cultures.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 9
  },
  {
    "question": "<p>Parts of a sentence are given below in jumbled order. Arrange the parts in the correct order to form a meaningful sentence.</p><p>P. rapid advancements in artificial intelligence necessitate</p><p>Q. to govern its development, ensuring fairness, transparency,</p><p>R. and accountability in diverse applications impacting society</p><p>S. careful consideration of ethical frameworks</p>",

      "PSQR"

    "correct_option_id": 3,
    "solution": "<p>The sentence most coherently starts with part <b>P</b>, \"Rapid advancements in artificial intelligence necessitate,\" which introduces the subject \"Rapid advancements in artificial intelligence\" and the verb \"necessitate.\"</p><p>Part <b>S</b>, \"careful consideration of ethical frameworks,\" follows P, acting as the object of the verb \"necessitate.\" It explains what the advancements necessitate.</p><p>Next, part <b>Q</b>, \"to govern its development, ensuring fairness, transparency,\" elaborates on the purpose of the \"ethical frameworks\" mentioned in S. The infinitive \"to govern\" explains their function, and \"its development\" refers to the development of artificial intelligence. The participial phrase \"ensuring fairness, transparency,\" further details the outcome of these frameworks.</p><p>Finally, part <b>R</b>, \"and accountability in diverse applications impacting society,\" completes the list of principles to be ensured (started in Q with \"fairness, transparency\") by adding \"accountability,\" and specifies the context of these applications.</p><p>Thus, the correct and meaningful order of the sentence is PSQR.</p><p>The complete sentence after rearrangement is: Rapid advancements in artificial intelligence necessitate careful consideration of ethical frameworks to govern its development, ensuring fairness, transparency, and accountability in diverse applications impacting society.</p><p>Hence, the correct answer is option (d).</p>",

  {
