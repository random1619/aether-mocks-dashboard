    "question": "<p>In the following question, a sentence has been given in Direct/Indirect speech. Out of the four alternatives suggested, select the one which best expresses the same sentence in Indirect/Direct speech.</p><p> &#8220;I wonder what he wants to tell me&#8221;, said the merchant.</p>",

    "question_index": 2

    "question_index": 5

    "question": "<p>In the following question, a question is given in Direct speech. Out of the four alternatives, choose the one which best expresses the sentence in Indirect speech.</p><p>I said to Raj,&quot; For how long have you been waiting for me?'</p>",
