<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Marcel said, \"I want a long vacation.\"</p>",
    "options": [
      "Marcel says that he wanted a long vacation.",
      "Marcel said that he wanted a long vacation.",
      "Marcel told to me that he wants a long vacation.",
      "Marcel said that he wants a long vacation."
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence in the Direct Speech is in Simple Present Tense. Therefore, the sentence in the Indirect Speech should be in Simple Past Tense.</p><p>Simple Present (Subject +V1st + Object) should be converted into Simple Past (Subject +V2 + Object). </p><p>\"That\" is used in place of Inverted Commas while transforming the sentence from Direct Speech to Indirect Speech.</p><p>For example:</p><p>He said, \"I never go to the village.\" (Direct Speech)</p><p>He said that he never went to the village. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The pronoun 'I' is changed into 'he'. </p><p>&#183; The verb 'want' (simple present) is changed into 'wanted' (simple past). </p><p>None of the options except (b) follows these rules. Hence, option (b) is the correct answer. </p><p>Therefore, the correct answer is: <b>Marcel said that he wanted a long vacation.</b></p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Arnab said to his friend, \"I had just accepted the offer.\"</p>",
    "options": [
      "Arnab told his friend that he just accepted the offer.",
      "Arnab told his friend that he had just accepted the offer.",
      "Arnab told his friend that he has just accepted the offer.",
      "Arnab told his friend that he will accept the offer."
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence in the Direct Speech is in <b>Past Perfect</b>. Therefore, the sentence in the Indirect Speech should also be in <b>Past Perfect</b>.</p><p>Past Perfect <b>(Subject + had + Past Participle + Object)</b> should be converted into the <b>same tense</b> form.</p><p>For example:</p><p>He said, \"I had just finished the movie\" (Direct Speech)</p><p>He said that he had just finished the movie. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said to</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">told.. that</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">he</td></tr></table><p>Therefore, the correct answer is: <b>(b) Arnab told his friend that he had just accepted the offer</b>.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>Sakshi told her sister that her child had been coughing a lot.</p>",
    "options": [
      "Sakshi said to her sister, \"My child was coughing a lot.\"",
      "Sakshi said to her sister, \"My child coughed a lot.\"",
      "Sakshi said to her sister, \"My child will be coughing a lot.\"",
      "Sakshi says to her sister, \"My child has been coughing a lot.\""
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence in the Indirect Speech is in <b>Past Perfect Continuous Tense</b>. Therefore, the sentence in the Direct Speech will be in <b>Past Continuous Tense</b>. </p><p>Past Perfect Continuous <b>(Subject + had been + V1 + ing + Object)</b> will be converted into Past Continuous <b>(Subject + was/were+V1 + ing + Object)</b>.</p><p>For example:</p><p>She said that she had been dancing the previous day. (Indirect Speech)</p><p>She said, \"I was dancing yesterday\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect speech to Direct Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">told... that</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">her</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">my</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">had been coughing</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">was coughing</td></tr></table><p>Hence, option (a) is the correct answer.</p><p><b>NOTE: </b></p><p>V1 -&gt; Base form/simple form of verb, V2 -&gt; Past form of verb (-ed form or irregular verb), V3 -&gt; Past participle form of verb (-ed, -d, -t, -en, or -n), V4 -&gt; Continuous form of verb / Present participle form of verb (-ing form), V5 -&gt; Third person singular (V1+ -es or -s).</p><p></p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The boy asked his father if he was returning home.</p>",
    "options": [
      "The boy said to his father, \"Were you returning home?\"",
      "The boy said to his father, \"Are you returning home?\"",
      "The boy said to his father, \"Will you be returning home?\"",
      "The boy said to his father, \"Should you returning home?\""
    ],
    "correct_option_id": 1,
    "solution": "<p>In the case of sentences like this where the sentence takes an <b>Interrogative form</b> in Direct Speech, \"enquired (of)\", \"wanted to know\", \"asked\", etc. in Indirect Speech is changed into \"said\" in Direct Speech.</p><p>In Direct speech, the <b>verb</b> is always placed <b>before</b> the <b>subject</b>, unlike in Indirect Speech.</p><p>If there is a question whose answer can come as \"Yes\" or \"No\", we should use \"If\" or \"Whether\" before the Indirect Speech and \"Is/are/am/was/were\" before the Direct Speech.</p><p>For example:</p><p>Kane asked him if he was doing well. (Indirect Speech)</p><p>Kane said to him, \"Are you doing well?\" (Direct Speech)</p><p>The tense of the Indirect Speech is in the <b>Past Continuous Tense</b>. So, the tense in the Direct Speech will be in the <b>Present Continuous Tense</b>.</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">asked.. if</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">He was returning</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Are you returning</td></tr></table><p>From the given options, one that follows the above mentioned conditions for Direct speech is option (b) \"The boy said to his father, \"Are you returning home?\"\" </p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>The manager said to me, \"I'm going to call you right now.\"</p>",
    "options": [
      "The manager told me that he is going to call me right then.",
      "The manager told me that he was going to call me right then.",
      "The manager told me that he was going to call him right now.",
      "The manager told me that he would call me right then."
    ],
    "correct_option_id": 1,
    "solution": "<p>Option (b) is the correct answer.</p><p>The sentence in the Direct Speech is in Present Continuous Tense. Therefore, the sentence in the Indirect Speech should be in Past Continuous Tense.</p><p>Simple Present (Subject + V1 + ing + Object) should be converted into Simple Past (Subject + V2 + ing + Object).</p><p>For example:</p><p>He said, \"I never go to the village.\" (Direct Speech)</p><p>He said that he never went to the village. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&bull; The reporting verb 'said to' is changed into 'told'.</p><p>&bull; Inverted commas are removed and 'that' is added before the statement.</p><p>&bull; The pronouns 'I' and 'you' are changed into 'he' and 'me' respectively.</p><p>&bull; The helping verb 'am' is changed into 'was'.</p><p>&bull; 'Right now' is changed into 'right then'.</p><p>Therefore, the correct answer is: The manager told me that he was going to call me right then.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>Alan said that he would go to the cinemas to watch the latest movie.</p>",
    "options": [
      "Alan said, \"I go to the cinemas to watch the latest movie.\"",
      "Alan said, \"I will be going to the cinemas to watch the latest movie.\"",
      "Alan said, \"I will go to the cinemas to watch the latest movie.\"",
      "Alan said, \"I would have gone to the cinemas to watch the latest movie.\""
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence in the Indirect Speech is in <b>Present Conditional Tense</b>. Therefore, the sentence in the Direct Speech will be in <b>Future Simple Tense</b>.</p><p>Present Conditional <b>(Subject + would/should + V1 +object)</b> will be converted into Future Simple <b>(Subject + will/shall + V1 + object)</b>.</p><p>For example:</p><p>He said that he would bring Karan home on Sunday. (Indirect Speech)</p><p>He said, \"I will bring Karan home on Sunday.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said that</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">he</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">would go</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">will go</td></tr></table></p><p>Hence, option (c) is the correct answer.</p><p><b>NOTE: </b></p><p>V1 -&gt; Base form/simple form of verb, V2 -&gt; Past form of verb (-ed form or irregular verb), V3 -&gt; Past participle form of verb (-ed, -d, -t, -en, or -n), V4 -&gt; Continuous form of verb / Present participle form of verb (-ing form), V5 -&gt; Third person singular (V1+ -es or -s).</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>He said, \"I can distinguish a genuine antique from a reproduction.\"</p>",
    "options": [
      "He said that he could distinguish a genuine antique from a reproduction.",
      "He said to me that he could distinguish a genuine antique from a reproduction.",
      "He said that I could distinguish a genuine antique from a reproduction.",
      "He said that he could be distinguished a genuine antique from a reproduction."
    ],
    "correct_option_id": 0,
    "solution": "<p>When converting direct speech into indirect speech, the present modal verbs (can/may/must/will/shall) should be changed into past modal verbs (could/might/had to/would/should). </p><p>Example: She said, \"I can speak ten languages.\" (Direct Speech)</p><p>She said that she could speak ten languages. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; Inverted commas (\"...\") are replaced with 'that'. </p><p>&#183; The pronoun 'I' is changed into 'he'. </p><p>&#183; 'Can' is changed into 'could'. </p><p>Therefore, the correct answer is option (a): <b>He said that he could distinguish a genuine antique from a reproduction.</b></p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>He said to me, \"You would not live in peace if you did this to me.\"</p>",
    "options": [
      "He told me that I would not live in peace if I did that to him.",
      "He told me that I would not live in peace if I had done that to him.",
      "He told me that I would not live in peace if you had done that to me.",
      "He told me that I could not live in peace if you had done that to me."
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence in the Direct Speech is in <b>Past Simple Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Past Perfect Tense</b>.</p><p>Past Simple (Subject + V2 + Object) should be converted into Past Perfect (Subject + had + V3 + Object).</p><p>For example:</p><p>He said, \"Arya sent me a book.\" (Direct Speech)</p><p>He said that Arya had sent him a book. (Indirect Speech)</p><p>When converting direct speech into indirect speech, the present modal verbs (should/might/could/would/ought to/had to) are not changed, and they remain the same in indirect speech.</p><p>Example: He said, \"I should apologize to Jack for my bad behaviour.\" (Direct Speech)</p><p>He said that he should apologize to Jack for his bad behaviour\". (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The pronoun 'you' and 'me' is changed into 'I' and 'him' respectively.</p><p>&#183; The verb 'did' (past simple) is changed into 'had done' (past perfect).</p><p>&#183; 'This' is changed into 'that' and 'said to' is changed into 'told'.</p><p>Therefore, the correct answer is option (b): <b>He told me that I would not live in peace if I had done that to him.</b></p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The boss said that he would be attending a client meeting the following Monday.</p>",
    "options": [
      "The boss said, \"I would being attending a client meeting next Monday.\"",
      "The boss said, \"I will be attending a client meeting the following Monday.\"",
      "The boss said, \"I will be attending a client meeting next Monday.\"",
      "The boss said, \"I will have been attending a client meeting next Monday.\""
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct answer is <b>(c) The boss said, \"I will be visiting a client meeting next Monday.\"</b></p><p>Key points:</p><p>&#8226; The sentence in the Indirect Speech is in <b>Conditional Continuous Tense.</b> Therefore, the sentence in the Direct Speech will be in <b>Future Continuous Tense.</b></p><p>&#8226; Conditional Continuous <b>(Subject + would/should + be +V1 +ing + Object)</b> will be converted into Future Continuous <b>(Subject + will/shall + be + V1 + ing + Object)</b>.</p><p>&#8226; For example:</p><p>o He said that he would be using the book the following Friday. (Indirect Speech)</p><p>o He said, \"I will be using the book next Friday\" (Direct Speech)</p><p>&#8226; The following things in the sentence will change when changed from Indirect Speech to Direct Speech:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said that he</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said...I</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">would be visiting...the following</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">will be visiting...next</td></tr></table></p><p>&#8226; Therefore, the correct answer is: <b>The boss said, \"I will be visiting a client meeting next Monday.\"</b></p><p>Additional Information:</p><p>&#8226; The tense form and the verb form of the sentence change as per the list given below (important ones from exam point of view) when changed from Indirect Speech to Direct Speech:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Past simple   (Subject +V2 + Object)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Present simple   (Subject +V1st + Object)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Past Continuous   (Subject +was/were+V1 +ing+ Object)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Present continuous   (Subject +is/am/are+V1 +ing+ Object)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Past perfect   (Subject+had+V3+Object)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Present perfect   (Subject + has/have+V3+Object)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Past perfect   (Subject+had+V3+Object)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Past simple   (Subject+V2+Object)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Past perfect continuous   (Subject +had been+V1 +ing+ Object)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Past Continuous   (Subject +was/were+V1 +ing+ Object)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Present Conditional   (Subject+ would+V1+object)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Future simple   (Subject+ will/shall+V1+object)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Conditional Continuous   (Subject +would+be+V1 +ing+ Object)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Future Continuous   (Subject +will/shall+be+V1 +ing+ Object)</td></tr></table></p><p>Abbreviation to look out for in the table:</p><p>S -&gt; Subject, V1 -&gt; Base form/simple form of verb, V2 -&gt; Past form of verb (-ed form or irregular verb), V3 -&gt; Past participle form of verb (-ed, -d, -t, -en, or -n).<table style=\"border-collapse:colla
