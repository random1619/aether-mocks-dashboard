<body>

                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the option that expresses the following sentence in active voice.</p><p>The letter will be delivered by the postman tomorrow.</p>",
    "options": [
      "The postman delivered the letter tomorrow",
      "The postman will have delivered the letter tomorrow.",
      "The postman will deliver the letter tomorrow.",
      "The postman will be delivering the letter tomorrow."
    ],
    "correct_option_id": 2,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the \"to be\" verb and the preposition 'by' is necessary while changing the voice of the sentence from Passive to Active.</p><p>The Passive voice in this question is in <b>Future Indefinite</b>. Thus, the Active voice will also be in Future Indefinite.</p><p>In Passive voice, the format is: Object of the Active voice (Subjective case) + shall/will + be + V3 + by + Subject of the Active voice (Objective case).</p><p>Thus, the format of Active voice is: Subject + shall/will + V1 + Object.</p><p>For example:</p><p>The assignment will be completed by him. (Passive Voice)</p><p>He will complete the assignment. (Active Voice)</p><p>The options except (3) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is: \"The postman will deliver the letter tomorrow.\"</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that correctly expresses the given sentence in passive voice.</p><p>The shareholders will elect him a director.</p>",
    "options": [
      "He will be elected as director by the shareholders.",

      "The shareholders elected him a director.",
      "He will be elected a director."
    ],
    "correct_option_id": 0,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of verb is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in <b>Future Indefinite</b>. Thus, the Passive voice will also be in the Future Indefinite.</p><p>The format of Active voice is: Subject + shall/will + V1 + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + shall/will + be + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>He will complete the assignment. (Active Voice)</p><p>The assignment will be completed by him. (Passive Voice)</p><p>The options except (1) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is: \"He will be elected as director by the shareholders.</p>",
    "question_index": 1
  },
  {

    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence maintains the correct passive structure (\"will be launched\") and tense consistency.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the option that expresses the given sentence in passive voice:</p><p>Historians tell us how this country was divided into three.</p>",
    "options": [
      "We are told by historians how this country has been divided into three.",
      "We are told by historians how this country divided into three.",
      "We are told by historians how this country was divided into three.",
      "We have been told by historians how this country was divided into three."
    ],
    "correct_option_id": 2,

    "question_index": 3
  },
  {
    "question": "<p>Select the option that expresses the following sentence in active voice. </p><p>The car was repaired by the mechanic. </p>",
    "options": [
      "The mechanic repairs the car.",
      "The mechanic has repaired the car.",
      "The mechanic is repairing the car.",
      "The mechanic repaired the car."
    ],
    "correct_option_id": 3,

    "question_index": 4
  },
  {
    "question": "<p>Select the option that expresses the given sentence in passive voice. </p><p>Each candidate was making tall promises. </p>",
    "options": [
      "Tall promises were being made by each candidate.",
      "Tall promises are made by each candidate.",
      "Tall promises will be made by each candidate.",
      "Tall promises are being made by each candidate."
    ],
    "correct_option_id": 0,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of verb is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in <b>Past Continuous</b>. Thus, the Passive voice will also be in Past Continuous.</p><p>The format of Active voice is: Subject + was/were + V1 + ing + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + was/were + being + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>Amit was practising Math. (Active Voice)</p><p>Math was being practised by Amit. (Passive Voice)</p><p>The options except (1) don't follow the correct grammatical format of the Passive Voice.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the option that expresses the following sentence in passive voice:</p><p>\"Sonam does not like bananas.\"</p>",
    "options": [
      "Banana is not liked by Sonam.",
      "Bananas have not been liked by Sonam.",
      "Bananas are not liked by Sonam.",
      "Bananas had not been liked by Sonam."
    ],
    "correct_option_id": 2,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of verb is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in <b>Present Indefinite</b>. Thus, the Passive voice will also be in Present Indefinite.</p><p>The format of Active voice is: Subject + V1/V5 + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + am/is/are + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>She likes you. (Active Voice)</p><p>You are liked by her. (Passive Voice)</p><p>The options except (3) don't follow the correct grammatical format of the Passive Voice.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option that expresses the given sentence in passive voice:</p><p>\"Someone has taken my secret diary.\"</p>",
    "options": [
      "My secret diary had been taken by someone.",
      "My secret diary has to be taken by someone.",
      "My secret diary has been taken by someone.",
      "My secret diary will have been taken by someone."
    ],
    "correct_option_id": 2,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of verb is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in <b>Present Perfect</b>. Thus, the Passive voice will also be in Present Perfect.</p><p>The format of Active voice is: Subject + has/have + V3 + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + has/have + been + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>Arya has bought a new horse. (Active Voice)</p><p>A new horse has been bought by Arya. (Passive Voice)</p><p>The options except (3) don't follow the correct grammatical format of the Passive Voice.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>Don't let Dylan fool you!</p>",
    "options": [
      "Do not be fooled by Dylan.",
      "Do not ever be fooled by Dylan.",
      "Do not be fool by Dylan.",
      "Do not have been fooled by Dylan."
    ],
    "correct_option_id": 0,
    "solution": "<p>When converting an imperative sentence to passive voice:</p><p>The object (you) becomes the subject</p><p>\"Let\" is removed</p><p>The main verb changes to \"be\" + past participle</p><p>The subject becomes the object of \"by\"</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>I will be gifted a fancy doll by them the next day.</p>",
    "options": [
      "They gifted me a fancy doll yesterday.",
      "They are gifting me a fancy doll the next day.",
      "They gift me a fancy doll the previous day.",
      "They will gift me a fancy doll tomorrow."
    ],
    "correct_option_id": 3,
    "solution": "<p>Passive voice: <i>Object + \"to be\" verb + past participle + by subject</i></p><p>Active voice: <i>Subject + verb + object</i></p><p>Correct conversion:</p><p><i>\"They will gift me a fancy doll tomorrow.\"</i></p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>Martha made pancakes yesterday.</p>",
    "options": [
      "Pancakes had been made by Martha yesterday.",
      "Pancakes were being made by Martha yesterday.",
      "Pancakes were made by Martha yesterday.",
      "Pancakes was made by Martha yesterday."
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence is in active voice (Subject + Verb + Object). To convert it into passive voice, we follow:</p><p>Object + appropriate form of \"to be\" + past participle + by + Subject</p><p>Thus, \"Pancakes were made by Martha yesterday\" is the correct transformation.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>His behaviour vexes me sometimes.</p>",
    "options": [
      "He is being vexing me with his behaviour",
      "Sometimes he vexes me with his behaviour.",
      "I am sometimes vexed by his behaviour.",
      "His behaviour is vexed."
    ],
    "correct_option_id": 2,
    "solution": "<p>The active voice sentence is \"His behaviour vexes me sometimes.\" To convert it to passive voice:</p><p>&#183; The object \"me\" becomes the subject.</p><p>&#183; The verb \"vexes\" changes to \"am vexed.\"</p><p>&#183; The subject \"His behaviour\" becomes \"by his behaviour.\"</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>He will give a lecture on personality development.</p>",
    "options": [
      "A lecture on personality development can be given by him.",
      "A lecture will be given on personality development.",
      "A lecture on personality development will be given by him.",
      "A lecture on personality development will be giving by him."
    ],
    "correct_option_id": 2,
    "solution": "<p>The active voice sentence is \"He will give a lecture on personality development.\" To convert it to passive voice:</p><p>&#183; The object \"a lecture\" becomes the subject.</p><p>&#183; The verb \"will give\" changes to \"will be given.\"</p><p>&#183; The subject \"He\" becomes \"by him.\"</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>\"By whom were you injured?\"</p>",
    "options": [
      "Who has injured you?",
      "Who injured you?",
      "Who had injured you?",
      "Who had been injuring you?"
    ],
    "correct_option_id": 1,
    "solution": "<p>When converting passive voice to active voice in this interrogative sentence, we maintain the same tense (simple past). The passive construction \"were injured\" becomes \"injured\" in active voice. The simple form \"Who injured you?\" is the most appropriate and direct active voice equivalent.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the option that expresses the given sentence in active voice:</p><p>\"Were the plants being grafted by the gardener?\"</p>",
    "options": [
      "Was the gardener grafting the plants?",
      "Was the gardener grafted the plants?",
      "Were the plants grafting the gardener?",
      "Were the gardener grafting the plants?"
    ],
    "correct_option_id": 0,
    "solution": "<p>In converting this passive voice question to active voice, we maintain the continuous aspect but change the subject and verb arrangement. The past continuous passive \"were being grafted\" becomes \"was grafting\" in active voice. Since \"gardener\" is singular, we use \"was\" instead of \"were.\" Therefore, \"Was the gardener grafting the plants?\" is the correct active voice form.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>Dipesh will send Rakesh away to college for certain reasons.</p>",
    "options": [
      "Rakesh will have to be sent away to college for certain reasons by Dipesh.",

    "correct_option_id": 1,
    "solution": "<p>&#183; Active voice: Subject (Dipesh) &rarr; Verb (will send) &rarr; Object (Rakesh).</p><p>&#183; Passive voice: Object (Rakesh) &rarr; will be sent &rarr; Subject (by Dipesh).</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>Why are you repeatedly called by her?</p>",
    "options": [

  {
    "question": "<p>Select the option that expresses the following sentence in active voice.</p><p>The concert tickets were bought by my friend.</p>",
