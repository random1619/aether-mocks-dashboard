<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>They have been called off for now, <u>so</u> there is no guarantee they won't break out again.</p>",
    "options": [
      "No improvement required",
      "thus",
      "but",
      "since"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Called off' is a phrasal verb which means <i>to cancel something; to decide that something will not happen. </i>'Break out' is another phrasal verb which means <i>start suddenly. </i>So, the two clauses are contrasting in nature. We use 'so' as a subordinating conjunction to introduce clauses of result or decision which is not the case here.</p><p>For example: It was a long journey, so I'm really tired now.</p><p>Therefore, the underlined part is incorrect. Among the given options, 'but' is the most appropriate one as it can be used to connect ideas that are contrasting in nature. Hence, option (c) is the correct answer.</p><p>We use 'thus' to show that what you are about to mention is the result or consequence of something else that you have just mentioned. We use 'since' to give a reason for something.</p><p><b>Note:</b></p><p><b>Clause</b>: A clause is a group of words that contains a verb (and usually other components too). A clause may form part of a sentence, or it may be a complete sentence in itself. <b>Example:</b></p><p>1) \"His products weren't selling\"; this is an example of a sentence containing <b>one clause. </b></p><p>2) \"After we had had dinner, we went for a walk\"; here, the sentence contains <b>two clauses</b> that are separated by a comma.</p><p>A clause can be categorised as:</p><p><b>1. Main/independent clause</b></p><p><b>2. Subordinate/dependent clause</b></p><p><b>Main/independent clause:</b> In the example 2 given above, the clause \"we went for a walk\" can be said as the main clause (a clause that is not dependent on any other clause for its meaning, it makes sense on its own; a sentence contains at least one main clause.)</p><p><b>Subordinate/dependent clause: </b>In example 2 given above, the clause \"After we had had dinner\" is a subordinate clause: it depends on the main clause for its meaning and cannot exist as a sentence on its own</p><p><b>CONJUNCTIONS</b></p><p>A conjunction (also called a connective) is a word such as and, because, but, for, if, or, when etc. Conjunctions are used to connect phrases, clauses, and sentences.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Identify the segment in the sentence that contains a grammatical error. </p><p>Not only the kids but also the mother were enjoying the peaceful afternoon picnic by the lake. </p>",
    "options": [
      "Not only the kids but",
      "also the mother were",
      "enjoying the peaceful afternoon",
      "picnic by the lake"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in segment (b) \"also the mother were.\" The phrase \"Not only...but also\" is a correlative conjunction pair that connects two subjects. When using \"Not only...but also,\" the verb should agree with the subject closest to it. In this sentence, \"the mother\" is closer to the verb \"were\" than \"the kids.\" Since \"the mother\" is a singular subject, the singular verb \"was\" should have been used in place of the plural verb \"were\". Hence, (b) is the correct answer.</p><p>The corrected sentence: Not only the kids but also the mother <b>was</b> enjoying the peaceful afternoon picnic by the lake.</p><p>Note: A correlative conjunction is a pair of conjunctions that work together to link balanced or parallel words, phrases, or clauses in a sentence. They are used to join equal grammatical elements and ensure the sentence is clear and logically structured.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the appropriate option for the given blank-</p><p>I neither have the time ________ the energy to attend the party tonight.</p>",
    "options": [
      "Or",
      "Nor",
      "And",
      "Yet"
    ],
    "correct_option_id": 1,
    "solution": "<p>The following conjunctions are <b><i>used in pairs </i></b>and hence are called <b><i>correlative conjunctions</i></b>. </p><p>Either....or; Neither....nor; Both....and; Though....Yet; Whether....or; Not only....but also. </p><p>The correct sentence is- <b><i>I neither have the time nor the energy to attend the party tonight.</i></b></p><p>Hence, option (b) is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the appropriate option for the given blank-</p><p>She was hesitant to try bungee jumping, though she had always wanted to do it, ______ she summoned the courage and took the plunge.</p>",
    "options": [
      "Or",
      "But",
      "Than",
      "Yet"
    ],
    "correct_option_id": 3,
    "solution": "<p>The following conjunctions are <b><i>used in pairs </i></b>and hence are called <b><i>correlative conjunctions</i></b>. </p><p>Either....or; Neither....nor; Both....and; Though....Yet; Whether....or; Not only....but also. </p><p>The correct sentence is- <b><i>She was hesitant to try bungee jumping, though she had always wanted to do it, yet she summoned the courage and took the plunge.</i></b></p><p>Hence, option (d) is correct.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the appropriate option for the given blank-</p><p>The sun was shining, _____ the birds were singing in the park.</p>",
    "options": [
      "And",
      "But",
      "Yet",
      "But also"
    ],
    "correct_option_id": 0,
    "solution": "<p>A scene of a park is given here, so two simultaneous activities were going on. Therefore, the use of 'and' will be accurate to describe them.</p><p>The correct sentence is  -  <b><i>The sun was shining, and the birds were singing in the park.</i></b></p><p>Hence, option (a) is correct.</p>",
    "question_index": 4
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>I bought a(A)/ marker and a(B)/ notebook and(C)/ a pencil box(D). </p>",
    "options": [
      "A",
      "D",
      "B",
      "D"
    ],
    "correct_option_id": 2,
    "solution": "<p>Part B has an error. When more than two items are coordinated, the conjunction is normally omitted before each item [and instead, a 'comma' is used], except the last. So, 'and' in part B should be removed in order to rectify the error. Hence, (c) is the correct answer. </p><p>The final sentence would be: I bought a marker, a notebook and a pencil box. </p>",
    "question_index": 5
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>She wants to(A)/ win the final(B)/ race, and yet(C)/ she won't practice(D). </p>",
    "options": [
      "B",
      "C",
      "D",
      "A"
    ],
    "correct_option_id": 1,
    "solution": "<p>Part C has an error. The conjunction 'and' is omitted before the linking words 'then', 'so' and 'yet'. So, 'and' will be removed from part C in order to rectify the error. Hence, (b) is the correct answer. </p><p>The final sentence would be: She wants to win the final race, yet she won't practice. </p>",
    "question_index": 6
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The watchman(A)/ of our (B) / building(C)/ has a car also(D). </p>",
    "options": [
      "A",
      "B",
      "C",
      "D"
    ],
    "correct_option_id": 3,
    "solution": "<p>Part D has an error. The conjunction 'also' is usually used in the middle or beginning of a sentence and not at the end. Hence, (d) is the correct answer. </p><p>The final sentence would be: The watchman of our building also has a car. </p>",
    "question_index": 7
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>I either want(A)/a hot chocolate(B)/ or a cold(C)/ coffee today(D). </p>",
    "options": [
      "A",
      "D",
      "C",
      "B"
    ],
    "correct_option_id": 0,
    "solution": "<p>Part A has an error. When conjunctions are used as correlatives, each of the correlated words should be placed immediately before the words to be connected. So, 'either' should be placed just before the phrase 'a hot chocolate' [just like 'or' is placed right before 'a cold coffee'] in order to rectify the error. Hence, (a) is the correct answer. </p><p>The correct sentence would be: I want either a hot chocolate or a cold coffee today. </p>",
    "question_index": 8
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Your elder(A)/ brother is(B)/ either a liar nor(C)/ a fool(D). </p>",
    "options": [
      "A",
      "B",
      "C",
      "D"
    ],
    "correct_option_id": 2,
    "solution": "<p>Part C has an error. The correct pairs are either/or and neither/nor. So, there are two ways of rectifying the error; either change 'nor' to 'or', or 'either' to 'neither'. Hence, (c) is the correct answer. </p><p>The final sentence would be: Your elder brother is either a liar or a fool. </p><p>OR</p><p>Your elder brother is neither a liar nor a fool. </p>",
    "question_index": 9
  },
  {
    "question": "<p>Fill in the blank with an appropriate conjunction. </p><p>____ it rains, we'll go for shopping tomorrow. </p>",
    "options": [
      "And",
      "Or",
      "Yet",
      "Unless"
    ],
    "correct_option_id": 3,
    "solution": "<p>The given sentence talks about people who have planned to go shopping tomorrow. Among the given options, 'unless' fits in the blank appropriately as its usage conveys that they will go shopping except on a specified condition (which is rain here). Hence, (d) is the correct answer. </p><p>The final sentence would be: Unless it rains, we'll go for shopping tomorrow. </p>",
    "question_index": 10
  },
  {
    "question": "<p>Fill in the blank with an appropriate conjunction. </p><p>Don't be shy ____ you should lose the argument. </p>",
    "options": [
      "Lest",
      "Or",
      "And",
      "As well as"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Lest' means with the intention of preventing, to avoid the risk. It is usually followed by 'should' somewhere in the sentence. In the given sentence, it's mentioned that if one wants to avoid the risk of losing an important argument, one must not be shy, so 'lest' is used in the blank. Hence, (a) is the correct answer. </p><p>The final sentence would be: Don't be shy lest you should lose the argument. </p>",
    "question_index": 11
  },
  {
    "question": "<p>Fill in the blank with an appropriate conjunction. </p><p>Do as you wish, ____ don't expect me to lend a hand. </p>",
    "options": [
      "And",
      "But",
      "For",
      "Because"
    ],
    "correct_option_id": 1,
    "solution": "<p>'But' is used to introduce a phrase or clause contrasting with what has already been mentioned. The given sentence talks about a person is free to exercise his/her own will, however, the speaker will help him/her in no way. Hence, (b) is the correct answer. </p><p>The final sentence would be: Do as you wish, but don't expect me to lend a hand. </p>",
    "question_index": 12
  },
  {
    "question": "<p>Fill in the blank with an appropriate conjunction. </p><p>That boy neither studies at his school with concentration ____ at home. </p>",
    "options": [
      "Or",
      "Either",
      "Nor",
      "And"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Neither/nor' is a pair of correlative conjunctions that connects two parts of a sentence to each other, and they must be used in parallel structures. They indicate negation. So, 'nor' is used in the given blank as there is already 'neither' present in the sentence. Hence, (c) is the correct answer. </p><p>The final sentence would be: That boy neither studies at his school with concentration nor at home. </p>",
    "question_index": 13
  },
  {
    "question": "<p>Fill in the blank with an appropriate conjunction. </p><p>He didn't eat properly, ____ fell sick. </p>",
    "options": [
      "For",
      "But",
      "However",
      "Therefore"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Therefore' is a conjunctive adverb that means for that reason or cause, thus, or consequently. In the given sentence, it's mentioned that the boy didn't pay attention towards his food intake, and as a result, he fell sick. There is a reason given, so 'therefore' is used in the second blank. Hence, (d) is the correct answer. </p><p>The final sentence would be: He didn't eat properly, therefore fell sick. </p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select No improvement required.</p><p>Neither the company's CEO <u>its board members were nor aware</u> of the fraudulent activities happening within the organization. </p>",
    "options": [
      "its board members were aware nor",
      "No improvement required",
      "its board nor members were aware",
      "nor its board members were aware"
    ],
    "correct_option_id": 3,
    "solution": "<p>The following conjunctions are <b><i>used in pairs </i></b>and hence are called <b><i>correlative conjunctions</i></b>. </p><p>Either....or; Neither....nor; Both....and; Though....Yet; Whether....or; Not only....but also. </p><p>When conjunctions are used as <b>correlatives</b>, each of the <b><i>correlated words should be placed immediately before the words to be connected. </i></b></p><p><b>Example: </b></p><p>I either want a cheesecake or a chocolate cake. (wrong) </p><p>I want either a cheesecake or a chocolate cake. (correct) </p><p>The correct sentence is- <b><i>Neither the company's CEO nor its board members were aware of the fraudulent activities happening within the organization.</i></b></p><p>Hence, option (d) is correct. </p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the sentence with the inappropriate use of conjunction-</p>",
    "options": [
      "Both the teachers and the students are responsible for maintaining a clean classroom.",
      "Not only did he pass the exam, but he also got the highest score in the class.",
      "Whether you go to college or start working right away, it's important to have a plan for your future.",
      "Neither John and Sarah wanted to go to the concert because they had other plans."
    ],
    "correct_option_id": 3,
    "solution": "<p>All the sentences are grammatically correct, except for the one mentioned in option (d). 'Neither' is used with 'nor' as per the rule of a correlative conjunction.</p><p>Hence, option (d) is correct. </p>",
    "question_index": 16
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error. </p><p>Not only did she finish her homework but studied for her upcoming exam.</p>",
    "options": [
      "Not only did",
      "she finish her",
      "homework but studied",
      "for her upcoming exam"
    ],
    "correct_option_id": 2,
    "solution": "<p>The following conjunctions are <b><i>used in pairs </i></b>and hence are called <b><i>correlative conjunctions</i></b>. </p><p>Either....or; Neither....nor; Both....and; Though....Yet; Whether....or; Not only....but also. </p><p>The correct sentence is- <b><i>Not only did she finish her homework but also studied for her upcoming exam.</i></b></p><p>Hence, option (c) is correct. </p>",
    "question_index": 17
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error. </p><p>She always tried to help others in need, as she is good and wisest, and she knew how to do it in the most effective way possible.</p>",
    "options": [
      "She always tried to help others in need,",
      "as she knew how to do it in the",
      "most effective way possible.",
      "is good and wisest, and she"
    ],
    "correct_option_id": 3,
    "solution": "<p>Coordinating conjunctions join items that are of equal importance in a sentence. Also, it joins two words of equal grammatical rank.</p><p>Here, 'good' is a positive adjective and 'wiser' is a comparative adjective so they cannot be placed together.</p><p>The correct sentence is - She always tried to help others in need, as she is good and wise, and she knew how to do it in the most effective way possible.</p><p>Hence, option (d) is correct. </p>",
    "question_index": 18
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error. </p><p>I both like chocolate and vanilla ice cream, but I can't decide which one to order.</p>",
    "options": [
      "I both like chocolate",
      "and vanilla ice cream,",
      "but I can't decide",
      "which one to order"
    ],
    "correct_option_id": 0,
    "solution": "<p>The following conjunctions are <b><i>used in pairs </i></b>and hence are called <b><i>correlative conjunctions</i></b>. </p><p>Either....or; Neither....nor; Both....and; Though....Yet; Whether....or; Not only....but also. </p><p>When conjunctions are used as <b>correlatives</b>, each of the <b><i>correlated words should be placed immediately before the words to be connected. </i></b></p><p><b>Example: </b></p><p>I either want a cheesecake or a chocolate cake. (wrong) </p><p>I want either a cheesecake or a chocolate cake. (correct) </p><p>The correct sentence is- <b><i>I like both chocolate and vanilla ice cream, but I can't decide which one to order.</i></b></p><p>Hence, option (a) is correct. </p>",
    "question_index": 19
  }
];
    </script>

    <script src="../../js/mock-core.js"></script>
</body>
</html>
