    "comp": "<p><b>Directions [Set of 4 Questions]:</b><b> </b>Read the given passage and answer the questions that follow.</p><p>Once upon a time, in a grand estate perched on a hill, there lived an arrogant woman named Victoria. Victoria had recently married a wealthy widower, becoming the stepmother to his young son, Thomas. Her arrival brought an air of entitlement and superiority that cast a shadow over their once happy home. Victoria saw Thomas as an obstacle to her new life of luxury. She resented his presence, considering him an inconvenience that stood in the way of her ambitions. Thomas, despite his tender age, possessed a resilient spirit. He yearned for his father's love and acceptance, but Victoria's coldness only incited his determination to rise above her contemptuous behaviour. He sought solace in his own imagination, finding refuge in books and daydreams that transported him far away from the reality of their toxic household.</p><p>Victoria's arrogance began to crumble as she witnessed the positive impact Thomas had on others. She saw his unwavering kindness and the light he brought into their home. Slowly, her heart softened, and she realized the error of her ways. Regret filled her as she reflected on the years of mistreatment and the missed opportunities to build a genuine bond with Thomas. In a moment of vulnerability, Victoria approached Thomas, seeking forgiveness for her past actions. With tears in her eyes, she expressed her remorse and acknowledged the hurt she had caused. Thomas, in a display of grace beyond his years, embraced her with forgiveness, understanding that everyone deserves a chance to change.</p><p>From that day forward, Victoria and Thomas worked to rebuild their relationship. Their story became a testament to the transformative power of humility and forgiveness. Victoria learned that true strength lies not in arrogance, but in the ability to acknowledge one's mistakes and grow from them. And Thomas, through his resilience an
