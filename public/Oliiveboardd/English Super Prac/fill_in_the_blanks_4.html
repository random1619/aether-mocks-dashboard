<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate homonym to fill in the blanks of the given sentences.</p><p>A. I use a ______ to weigh my ingredients while cooking.</p><p>B. The mountaineer is going to _______ the rocky hills.</p>",
    "options": [
      "climb",
      "scale",
      "horn",
      "crawl"
    ],
    "correct_option_id": 1,
    "solution": "<p>\"Scale\" is a homonym meaning a device for weighing (A) and climbing or measuring (B), fitting both contexts.</p><p>Climb: This fits B (climbing hills) but not A (weighing ingredients).</p><p>Horn: This doesn't fit either context (weighing or climbing).</p><p>Crawl: This might loosely fit B but not A (weighing).</p><p>The compete sentences:</p><p>A. I use a scale to weigh my ingredients while cooking.</p><p>B. The mountaineer is going to scale the rocky hills.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blanks.</p><p>Fingernails and toenails helped our _________ to climb trees, peel fruits and use simple tools. While their colour and condition offer clues about your ________health. Nail polish turns them into fashion accessories.</p>",
    "options": [
      "ancestors; overall",
      "predecessor; universal",
      "forefather; all in all",
      "general; altogether"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; For the first blank, \"ancestors\" is the most fitting term, as it refers to early humans or primates who used fingernails and toenails for survival tasks like climbing and tool use, which aligns with evolutionary context.</p><p>&#183; For the second blank, \"overall\" is appropriate because it accurately describes the general state of health that nail color and condition can indicate, such as signs of nutritional deficiencies or medical conditions. The other options do not fit as well contextually or grammatically. For example, \"predecessor\" and \"forefather\" are less specific to evolutionary history, and \"universal\" or \"altogether\" do not convey the intended meaning for health.</p><p><b>The completed sentence would read: \"Fingernails and toenails helped our ancestors to climb trees, peel fruits and use simple tools. While their colour and condition offer clues about your overall health. Nail polish turns them into fashion accessories.\"</b></p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>As I review the events of my past life, I realise how________ are the influences that shape our destinies.</p>",
    "options": [
      "subtle",
      "crude",
      "plain",
      "artless"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let's look at the meanings of the given words.</p><p>Subtle: (especially of a change or distinction) so delicate or precise as to be difficult to analyse or describe.</p><p>Crude: constructed in a rudimentary or makeshift way.</p><p>Plain: not decorated or elaborate; simple or basic in character.</p><p>Artless: without guile or deception.</p><p>The given sentence talks about the influences that shape our destiny. The blank should be replaced with an adjective that can qualify the noun 'influences'. Among the given options, only 'subtle' can replace the blank as its use conveys that even the smallest influence can shape our destiny.</p><p>Hence, option (a) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Several environmentalists from the city conducted a meet to discuss issues related to the ______ pollution levels created by the growing number of pharmaceutical companies.</p>",
    "options": [
      "arise in",
      "rise in",
      "rising from",
      "raising of"
    ],
    "correct_option_id": 1,
    "solution": "<p>The blank requires a noun that indicates some changes to the pollution levels which are influenced by the pharmaceutical companies. 'Arise in' is an incorrect form of verb as 'arise' means 'get up or stand up or emerge' which is not relevant to the context of the sentence and thus negated. 'Rising from' has the preposition 'from' as an extra which is not required and so, it is negated. 'Raising of' means 'bringing up a person or animal from childhood' which is contextually irrelevant to the sentence and thus negated. 'Rise in' (an increase in number, size, amount, or degree) denotes an increase in some quantity or value of pollution levels by the pharmaceutical companies and it is also grammatically correct.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Astronomy enthusiasts and sky gazers will be able to watch six eclipses in 2020, but only three of them are expected to be ______ in India.</p>",
    "options": [
      "exposed",
      "evident",
      "revealed",
      "visible"
    ],
    "correct_option_id": 3,
    "solution": "<p>The blank requires an adjective that indicates the presence of eclipses in India. 'Exposed' (make (something) visible by uncovering it), 'evident' (clearly seen or understood; obvious) and 'revealed' (cause or allow (something) to be seen) are contextually irrelevant options to the sentence and thus negated. 'Visible' means 'able to be seen' which denotes how the eclipses will be in India.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Timers at traffic signals, that help motorists save fuel by switching off their engines while waiting, will soon be phased out due to technical ______.</p>",
    "options": [
      "symbols",
      "glitches",
      "illuminations",
      "streamers"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let's look at the meanings of the given words.</p><p>Symbols: a sign, shape, or object that is used to represent something else.</p><p>Glitches: a small problem or fault that prevents something from being successful or working as well as it should.</p><p>Illuminations: coloured decorative lights outside that make a town look bright and exciting at night.</p><p>Streamers: a long, narrow strip of brightly coloured paper that is used as a decoration for special occasions such as parties.</p><p>The verb 'phased out' means 'to discontinue the practice, production'. The sentence conveys that the timers will be removed, and the possible reason is that there might be some problems. Therefore, the noun 'glitches' is the most appropriate choice.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>In the following passage, a word has been deleted. Read the passage carefully and select the most appropriate option to fill in the blank.</p><p>Manpower exporters and overseas recruiter's commonly________ in illegal business practices for short-term______ gain.</p>",
    "options": [
      "honoured, professional",
      "indulged, monetary",
      "regulated, personal",
      "thrived, devotional"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given sentence mentions a few exporters and recruiters related with illegal business practices. The first blank would represent the action by the subject 'exporters and recruiters' with respect to illegal business practices. So, 'honoured' will not fit in contextually. Hence, option (a) is negated.</p><p>The verb 'regulated' requires the object to denote what is controlled by the subject, which is absent in the given sentence. So, option (c) is incorrect as well.</p><p>'Devotional gain' and 'illegal business practices' have no relation. So, option (d) is incorrect as well.</p><p>Filling the blanks with 'indulged' (means 'to take unrestrained pleasure in') and 'monetary' (means 'of or relating to money') gives the meaning that such people engage in illegal practices to earn money illegally.</p><p>Hence, option (b) is the answer.</p><p><b>The correct sentence is: </b>Manpower exporters and overseas recruiters commonly <b>indulged </b>in illegal business practices for short-term <b>monetary </b>gain.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate word to fill in the blank.</p><p>The prisoner was very upset and angry and there was ______ in her voice.</p>",
    "options": [
      "bitterness",
      "stillness",
      "eagerness",
      "thickness"
    ],
    "correct_option_id": 0,
    "solution": "<p>Bitterness - anger and disappointment at being treated unfairly; resentment.</p><p>Stillness - the absence of movement or sound.</p><p>Eagerness - enthusiasm to do or to have something; keenness.</p><p>Thickness - the distance through an object, as distinct from width or height.</p><p>The sentence mentions that the prisoner was upset and angry, so as per the meanings stated above, only 'bitterness' fits the blank contextually. </p><p><b>The correct sentence is: </b>The prisoner was very upset and angry and there was <b>bitterness</b> in her voice.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate homonyms from the given alternatives to fill in the blanks.</p><p>He ________ imitate the playful movement of the ________.</p><p>A. does (female deer)</p><p>B. does</p><p>C. dose</p>",
    "options": [
      "C, B",
      "B, A",
      "A, B",
      "A, C"
    ],
    "correct_option_id": 1,
    "solution": "<p>Homonyms are words that sound the same but have different meanings. In this sentence, we need the verb form \"does\" (meaning \"performs\") in the first blank, and the noun \"does\" (meaning female deer) in the second blank. Option 2 correctly places these: \"He does imitate the playful movement of the does.\"</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate synonym of the word in brackets to fill in the blank.</p><p>Emotional stimulation provides the necessary __________ for creative imagination. (fecundity)</p>",
    "options": [
      "freedom",
      "fertility",
      "fulcrum",
      "force"
    ],
    "correct_option_id": 1,
    "solution": "<p>\"Fecundity\" means the ability to produce or be fertile, especially in a creative or intellectual sense. \"Fertility\" is the closest synonym, fitting the context of creative imagination.</p><p>Fecundity: Productiveness, especially creatively or intellectually.</p><p>Fertility: The quality of being productive or fertile.</p><p>Freedom: Liberty, unrelated.</p><p>Fulcrum: A pivot point, irrelevant.</p><p>Force: Strength or power, not specific to creativity.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Accepting how wonderful you truly are and incorporating this _______ into your attitude and personality is perhaps one of the most difficult things to do in life.</p>",
    "options": [
      "insight",
      "craziness",
      "folly",
      "glitch"
    ],
    "correct_option_id": 0,
    "solution": "<p>\"Insight\" means a deep understanding of something, fitting the context of recognizing and incorporating one's true worth into one's attitude. So, it can fill in the given blank in the sentence.</p><p>Craziness: Incorrect, as it implies irrationality, not self-awareness.</p><p>Folly: Incorrect, as it means foolishness, not a positive realization.</p><p>Glitch: Incorrect, as it refers to a technical error, not personal understanding.</p><p>The complete sentence: Accepting how wonderful you truly are and incorporating this insight into your attitude and personality is perhaps one of the most difficult things to do in life.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 10
  },
  {
    "question": "<p>In the following passage, some words have been deleted. Read the passage carefully and select the most appropriate option to fill in the blanks.</p><p>Johannes Gutenberg invented the first printing press that could print thousands of ______________ a day. This made books</p><p>cheaper and information ______________ widely available.</p>",
    "options": [
      "pages; more",
      "sheet; much",
      "leaf; many",
      "sides; most"
    ],
    "correct_option_id": 0,
    "solution": "<p>A printing press prints \"pages\" (standard term for book content). \"More widely available\" is the correct comparative phrase for information accessibility.</p><p>Option (b) sheet; much: \"Sheet\" is less specific than \"pages\" for books, and \"much\" is used for uncountable nouns, not suitable here.</p><p>Option (c) leaf; many: \"Leaf\" is an archaic term for a book page, and \"many\" is for countable nouns, not fitting \"information.\"</p><p>Option (d) sides; most: \"Sides\" is vague, and \"most\" implies a superlative, not a comparative increase.</p>",
    "question_index": 11
  },
  {
    "question": "<p>In the following passage, some words have been deleted. Select the most appropriate option to fill in the blanks.</p><p>Leif Erikson is a Viking ________ believed to have sailed from the Green Lands to Vinland. Vinland is now thought to be the northern tip of Canada's Newfoundland island where ________ found evidence of Erikson's ________ in 1960s.</p>",
    "options": [
      "astronomer; sculptors; colony",
      "explorer; archaeologists; settlement",
      "sailor; excavators; packed",
      "calligrapher; historians; community"
    ],
    "correct_option_id": 1,
    "solution": "<p>Option a: \"astronomer; sculptors; colony\"-Leif Erikson was not an astronomer (studying stars), sculptors create art (not relevant to finding evidence), and while \"colony\" is plausible, it is less precise than \"settlement.\"</p><p>Option b: \"explorer; archaeologists; settlement\"-Leif Erikson was a Viking explorer, archaeologists found evidence (correct profession), and \"settlement\" accurately describes what was discovered in Newfoundland.</p><p>Option c: \"sailor; excavators; packed\"-While Erikson was a sailor, \"explorer\" is more specific. Excavators are similar to archaeologists but less precise, and \"packed\" is irrelevant.</p><p>Option d: \"calligrapher; historians; community\"- A calligrapher (writing artist) is irrelevant, historians study but don't typically find physical evidence, and \"community\" is less precise than \"settlement.\"</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Poonam used a rubber <u>band</u> to keep the pencils together. 'Band' here means ____________.</p>",
    "options": [
      "a long rigid piece of wood or metal",
      "a tube filled with water",
      "a thin ring of rubber used for holding things together",
      "a range of values or frequencies within a series"
    ],
    "correct_option_id": 2,
    "solution": "<p>The word \"band\" in the context of holding pencils together refers to a rubber band, specifically a thin ring of rubber used for bundling items. 'Band' here means a thin ring of rubber used for holding things together.</p><p>A long rigid piece of wood or metal- Refers to a rigid strip, unsuitable for holding pencils flexibly.</p><p>A tube filled with water-Unrelated to holding objects together.</p><p>A range of values or frequencies within a series-Refers to an abstract concept, not a physical object.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank</p><p>'Rapid' may be replaced by '___'.</p>",
    "options": [
      "Gradual",
      "Legitimate",
      "Artistic",
      "Speedy"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate option to fill in the blank is 'speedy'. The word \"rapid\" is synonymous with \"speedy.\" Both the words describe something happening or moving quickly. 'Gradual' means happening or changing slowly over time, often occurring in small increments or stages. 'Legitimate' means conforming to the law or rules. 'Artistic' refers to activities, qualities, or expressions related to the arts or artistic endeavours. Hence, (d) is the correct answer.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Keats and Shelly were poets of the same period; in other words, they were _______.</p>",
    "options": [
      "contemporaries",
      "co-writers",
      "colleagues",
      "associates"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate option to fill in the blank is 'contemporaries'. The term \"contemporaries\" fits best to describe the relationship between Keats and Shelly. It refers to individuals who lived or worked in the same time period, especially in the context of being of similar age or time of life. This term signifies that Keats and Shelly were poets who were active during the same era or time period, indicating a shared timeline in their literary contributions. On the other hand, \"co-writers\", \"colleagues\", and \"associates\" do not precisely convey the intended meaning of existing in the same period. Hence, (a) is the correct answer.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate option to complete the given sentence.</p><p>His brother _______ his _______ and gave him a watch after his result.</p>",
    "options": [
      "Took, word",
      "Broke, record",
      "Lost, temper",
      "Kept, promise"
    ],
    "correct_option_id": 3,
    "solution": "<p>Among the given options, the option with the words 'kept' and 'promise' is the most appropriate choice. The phrase 'keep a promise' means 'to do what you said you would do'. The latter part of the sentence confirms that he gave his watch to keep his promise.</p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate verb/verb phrase to fill in the blank.</p><p>They ________________ their house for the past two months, and it's finally starting to look fantastic.</p>",
    "options": [
      "were renovating",
      "will renovate",
      "has renovated",
      "have been renovating"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; The phrase \"for the past two months\" indicates an action that started in the past and is still ongoing, requiring the present perfect continuous tense.</p><p>&bull; Correct form: \"have been renovating\"</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate homonyms to fill in the blanks.</p><p>The rowing instructor commanded them to ________ in a ________.</p><p>A. row (verb)</p><p>B. roe</p><p>C. row(sequence)</p>",
    "options": [
      "C, A",
      "B, C",
      "A, B",
      "A, C"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Row (verb)  -  To move a boat using oars.</p><p>&bull; Row (noun, sequence)  -  A line of objects or people.</p><p>&bull; Roe (noun)  -  Fish eggs (incorrect here).</p><p>The correct sentence:</p><p>\"The rowing instructor commanded them to row in a row.\"</p><p>Thus, Option 4 (A, C) is correct.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The blueberries in the basket are blue. The denotation of the word 'blue' is ______.</p>",
    "options": [
      "gloominess",
      "sadness",
      "a colour",
      "negativity"
    ],
    "correct_option_id": 2,
    "solution": "<p>The denotation of \"blue\" is its literal meaning, which is \"a colour.\" Other options refer to connotative or figurative meanings.</p><p>Gloominess- a state of unhappiness, low spirits, or a feeling of being dark and depressing, often associated with a lack of hope or cheerfulness.</p><p>The complete sentence: The blueberries in the basket are blue. The denotation of the word 'blue' is a colour.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 19
  }
];
    </script>
