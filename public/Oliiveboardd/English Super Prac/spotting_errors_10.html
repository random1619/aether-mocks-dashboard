    <script>
        const questions = [
  {
    "question": "<p>Select the sentence with the appropriate use of preposition.</p><p></p>",
    "options": [
      "They've been best friends when they were children.",
      "They've been best friends by they were children.",
      "They've been best friends for they were children.",
      "They've been best friends since they were children."
    ],
    "correct_option_id": 3,
    "solution": "<p>The use of the present perfect tense indicates that the event/action started in the past and continues to the present. The sentence conveys that their friendship started when they were children. So, it is a point of time in the past. In this type of reference, 'since' is the correct choice. E.g., We have been married since 1997.</p><p>Hence, option (d) is the correct answer. </p><p>By - We use 'by' meaning 'not later than' to refer to arrangements and deadlines.</p><p>For  -  used before a given period of time. </p><p>When  -  used to refer to a future situation or condition that we are certain of.</p>",
    "question_index": 0
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error. </p><p>Radhika wanted to / know my views of / the plan regarding the / Shimla trip next weekend.</p>",
    "options": [
      "Shimla trip next weekend",
      "Radhika wanted to",
      "Know my views of",
      "The plan regarding the"
    ],
    "correct_option_id": 2,
    "solution": "<p>The nouns like 'dependence, pity, views, attack, impression, etc.' are followed by the preposition 'on'. </p><p>So, the preposition 'of' in the sentence makes it grammatically incorrect. </p><p>Replace it with the preposition 'on' to rectify the error. </p><p><b>Correct sentence: </b>Radhika wanted to know my views <b>on</b> the plan regarding the Shimla trip next weekend.</p><p>So, option c) is the segment that contains a grammatical error. </p><p>Hence, option c) is correct.</p><p><b>Note: </b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>1) The teacher scolded the child <b>for </b><u>being</u> late.</p><p>2) We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 1
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Having found a two thousand / rupee note, both kids went / to their father to / divide it among them.</p>",
    "options": [
      "Having found a two thousand",
      "rupee note, both kids went",
      "to their father to",
      "divide it among them"
    ],
    "correct_option_id": 3,
    "solution": "<p>The preposition 'between' is used when we talk about two persons or things.</p><p>Example: Between red and yellow, I will prefer red.</p><p>The preposition 'among' is used when we talk about more than two persons or things.</p><p>Example: Please choose one among the five options.</p><p>In the given sentence, two thousand rupees are to be divided <b>between</b> two kids (as indicated by the determiner 'both').</p><p>So, 'among' in the sentence should be replaced with 'between' to rectify the error.</p><p>So, there is an error in option d).</p><p>Hence, option d) is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>She has / a habit of / spending against / her means.</p>",
    "options": [
      "Her means",
      "She has",
      "Spending against",
      "A habit of"
    ],
    "correct_option_id": 2,
    "solution": "<p>The part mentioned in option (c) has an error. In the afore-mentioned part, the preposition 'against' (in opposition to) is an incorrect word, which needs to be replaced by the preposition 'beyond' ('to be more than or not limited to something') and it indicates that the subject spends way more than her means ('i.e., resources') allow her.</p><p>The correct sentence is: She has a habit of spending beyond her means.</p><p>Hence, the correct answer is option (c).</p><p>Note:</p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>.</p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 3
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>I had walked / for most of the day / to Kanpur and then / get on the train by Mumbai.</p>",
    "options": [
      "I had walked",
      "To Kanpur and then",
      "Get on the train by Mumbai",
      "For most of the day"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence contains a prepositional error. The phrase 'get on the train by Mumbai' is incorrect.</p><p>The sentence talks about the journey to someplace. We cannot use the preposition 'by' before the destination. The preposition 'to' can be used to indicate the destination of the journey. For example: Let's all go to the cinema tonight!</p><p>We can use 'by' to indicate the mode of transport. For example: We went to Pisa by train.</p><p>Also, since the sentence denotes two actions done in past, one after another, 'get' should be replaced with the past tense form 'got'.</p><p>The correct sentence is- 'I had walked for most of the day to Kanpur and then got on the train to Mumbai.'</p><p>Hence, option (c) is the correct answer.</p><p><b>Note:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>.</p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Workout is necessary ______ health.</p>",
    "options": [
      "by",
      "in",
      "to",
      "for"
    ],
    "correct_option_id": 3,
    "solution": "<p>'By' is used for indicating the means of achieving something. 'In' is used to express the situation of something that is or appears to be enclosed or surrounded by something else. 'To' is used for approaching or reaching a particular condition. 'For' indicates 'suitable to' or 'in favour of'. Here, it is used to emphasise the importance of workout with respect to health.</p><p>Hence, option (d) is the correct choice.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Parts of the given sentence have been underlined. Identify the part that has an error. Select 'No error' if there is no error.</p><p>After <u>the meeting ended,</u> the <u>manager discussed about the new policies</u> with the team.</p>",
    "options": [
      "the meeting ended",
      "manager discussed",
      "about the new policies",
      "No error"
    ],
    "correct_option_id": 2,
    "solution": "<p>The word \"discussed\" does not need the preposition \"about.\" It should be \"the manager discussed the new policies.</p><p>The correct sentence is: \"After the meeting ended, the manager discussed the new policies with the team.\"</p><p>Hence, option (c) is correct.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option to improve the underlined segment in the given sentence. If there is no need to improve it, select 'No improvement'.</p><p>I prefer peace <u>over</u> income as I believe in the theory that money can't buy happiness.</p>",
    "options": [
      "than",
      "to",
      "on",
      "No improvement"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>verb</b> 'prefer' agrees with the <b>preposition</b> 'to'.</p><p>For example: I <b>prefer</b> tea <b>to</b> coffee.</p><p>Thus, the preposition 'over' needs an improvement.</p><p>Hence, 'to' should replace 'over'.</p><p>Therefore, the correct answer is: <b>(b) to</b>.</p><p>The corrected form of the sentence is: I prefer peace <u>to</u> income as I believe in the theory that money can't buy happiness.</p><p>Additional Information:</p><p>The preposition \"to\" is used with the following words, in the case of the comparative degree:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Senior</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Junior</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Inferior</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Superior</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Prior</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Prefer</td></tr></table>",
    "question_index": 7
  },
  {
    "question": "<p>Select the sentence with appropriate use of preposition.</p><p></p>",
    "options": [
      "Keep the auction price under Rs. 1 lakh.",
      "Keep the auction price into Rs. 1 lakh.",
      "Keep the auction price in Rs. 1 lakh.",
      "Keep the auction price on Rs. 1 lakh."
    ],
    "correct_option_id": 0,
    "solution": "<p>Among the options, the sentence that has the correct usage of preposition is (a), 'Keep the auction price under Rs. 1 lakh'. The sentence requires a preposition that denotes the limit of the auction price. The preposition which matches this context of the sentence is 'under' (at a lower level than). The other sentences do not have the appropriate preposition to match this context of the sentence and are thus negated.</p><p>Into  -  movement from one side to another.</p><p>In  -  enclosed area.</p><p>On  -  physical contact above a surface.</p><p>Hence, the correct answer is option (a).</p><p>Note:</p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 8
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error. </p><p>She smiled to/ the baby, who/ giggled in response, / at the play school. </p>",
    "options": [
      "She smiled to",
      "The baby, who",
      "Giggled in response",
      "At the play school"
    ],
    "correct_option_id": 0,
    "solution": "<p>The verb \"smile\" is not typically followed by the preposition \"to\" when indicating the direction of the smile. Instead, \"smile\" is usually followed by the preposition \"at\" in such contexts. The correct phrase would be \"She smiled at the baby\". Thus, the error lies in segment (a), hence, (a) is the correct answer.</p><p>The corrected sentence: She smiled at the baby, who giggled in response, at the play school.</p>",
    "question_index": 9
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>She is very / fond of read / books in her / free time. </p>",
    "options": [
      "She is very",
      "fond of read",
      "books in her",
      "free time"
    ],
    "correct_option_id": 1,
    "solution": "<p>The phrase \"fond of read\" is incorrect because after the preposition \"of,\" the verb must take the -ing form of the verb [reading] and not the base form of the verb [read]. The correct phrase is \"fond of reading.\"</p><p>The correct sentence is: \"She is very fond of reading books in her free time.\"</p><p>Hence, option (b) is correct.</p>",
    "question_index": 10
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The decoration/ is being/ done grandly/ with Karthik.</p>",
    "options": [
      "is being",
      "with Karthik",
      "The decoration",
      "done grandly"
    ],
    "correct_option_id": 1,
    "solution": "<p>The part given in option (b) has the error. The given sentence is in Passive voice in which the preposition 'by' is required to denote the doer of the action but in the sentence, 'with' is incorrectly used.</p><p>The correct sentence is: The decoration is being done grandly by Karthik.</p><p>Hence, the correct answer is option (b).</p><p>Note:</p><p><b>Active and Passive Voice: </b>When the person doing the action is the subject, the sentence is said to be in active form/voice. When the subject is what the action is directed at, then the sentence is said to be in passive form/voice. For example: Active Voice: Rita and her friends performed a skit. Here 'Rita and her friends' (subject) perform the action. Passive Voice: A skit was performed by Rita and her friends. Here 'skit' is the subject (at which the action is directed).</p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the sentence with the appropriate use of preposition. </p><p></p>",
    "options": [
      "The AQI on Diwali day this year is the cleanest that the city has seen at 2019.",
      "The AQI on Diwali day this year is the cleanest that the city has seen by 2019.",
      "The AQI on Diwali day this year is the cleanest that the city has seen for 2019.",
      "The AQI on Diwali day this year is the cleanest that the city has seen since 2019."
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence uses the present perfect tense which indicates that the sentence refers the AQI from a particular time in the past to the present. In this type of sentence, 'since' is used to indicate the time in the past (2019). </p><p>Hence, option (d) is the correct answer. </p><p>At: used to show an exact position or particular place. </p><p>By: used to show the person or thing that does something. </p><p>For: used to show an amount of time or distance. </p><p><b>Note:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate preposition to fill in the blank. </p><p>Sneha discovered, to her surprise, a hidden compartment ____ the floorboards of the old house.</p>",
    "options": [
      "Beneath",
      "To",
      "Off",
      "For"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate preposition to fill in the blank is \"beneath.\" \"Beneath\" is used to indicate that something is positioned under or below something else. In the given context, it suggests that the hidden compartment is located under or below the floorboards of the old house. Other prepositions are not suitable for the blank. 'For' typically indicates a purpose or intended recipient. 'To' indicates direction or movement toward a destination. 'Off' indicates separation or removal from something. Hence, (a) is the correct answer. </p><p><b>The complete sentence is:</b> \"Sneha discovered, to her surprise, a hidden compartment beneath the floorboards of the old house.\"</p><p><b>NOTE:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The body had burned _____ recognition.</p>",
    "options": [
      "Beyond",
      "Towards",
      "Behind",
      "From"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Beyond' denotes 'out of reach/or sphere of something'. 'Towards' indicates 'moving in the direction of a place/person/thing'. 'Behind' indicates 'later in time/towards the back'. 'From' is used for indicating the point in space at which a journey, motion, or action starts. 'Burned' indicates that severe damage had happened to the body and as a result, it cannot be recognised. So, 'beyond' is the correct fit here.</p><p>Hence, option (a) is the correct choice.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the sentence with the appropriate use of preposition.</p><p></p>",
    "options": [
      "Initially, most people approved of the new scheme.",
      "Initially, most people approved in the new scheme.",
      "Initially, most people approved on the new scheme.",
      "Initially, most people approved with the new scheme."
