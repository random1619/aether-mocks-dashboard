<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error. </p><p><u>The</u> volunteers completed <u>its</u> community <u>service</u> projects ahead <u>of</u> schedule.</p>",
    "options": [
      "Its",
      "The",
      "Service",
      "Of"
    ],
    "correct_option_id": 0,
    "solution": "<p>The part that contains the error is 'its'. The word \"its\" is a possessive determiner used for inanimate objects or animals. However, the sentence refers to the volunteers, who are people, not inanimate objects or animals. Therefore, the sentence should use a pronoun that refers to people, such as 'their,' to properly attribute the completion of community service projects to the volunteers. Additionally, the plural 'their' matches with the plural 'volunteers'. Hence, (a) is the correct answer. </p><p><b>The correct sentence is:</b> The volunteers completed <b>their</b> community service projects ahead of schedule. </p><p><b>NOTE:</b></p><p><b>Possessive Determiners/Adjectives</b>: Words like 'my', 'our', 'your', 'his', 'her', 'its', and 'their' are known as possessive adjectives (or possessive determiners). They come before nouns and indicate ownership of the noun. Example: \"The teacher asked the students to open their drawing books.\"</p>",
    "question_index": 0
  },
  {
    "question": "<p>Identify the segment in the sentence that contains a grammatical error. </p><p>Although John trains hard, Sarah is more stronger than him, consistently lifting heavier weights at the gym during workouts. </p>",
    "options": [
      "Although John trains hard, Sarah",
      "is more stronger than him,",
      "consistently lifting heavier weights",
      "at the gym during workouts"
    ],
    "correct_option_id": 1,
    "solution": "<p>In segment (b), \"more stronger\" is incorrect. <b>Double</b> Comparatives and Superlatives are to be avoided. \"More\" is redundant here and should be removed as \"stronger\" is a comparative in itself. </p><p>Hence, (b) is the correct answer. </p><p>The corrected sentence: Although John trains hard, Sarah is <b>stronger than</b> him, consistently lifting heavier weights at the gym during workouts.</p><p><b>Note: </b>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select No improvement required.</p><p>As we get older, we tend to become <u>more wiser and more experienced</u>.</p>",
    "options": [
      "Wiser and most experienced",
      "Most wiser and more experienced",
      "Wiser and more experienced",
      "No improvement required."
    ],
    "correct_option_id": 2,
    "solution": "<p><b><i>Two adjectives </i></b>which <b><i>refer to the same noun or pronoun </i></b>joined by a conjunction must be in the <b><i>same degree of comparison. </i></b>So, option (a) will be incorrect.</p><p><b><i>Double </i></b>Comparatives and Superlatives are to be avoided. </p><p><b>Example: </b><i>She is <b>more </b>richer than her sister. ('More' is redundant here and should be removed as 'richer' is a comparative in itself) </i></p><p>The correct sentence is- As we get older, we tend to become wiser and more experienced.</p><p>Hence, option (c) is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select No improvement required.</p><p><u>Most challenging part</u> of the project was getting all the team members on the same page.</p>",
    "options": [
      "The most challenging part",
      "A most challenging parts",
      "A most challenging part",
      "No improvement required."
    ],
    "correct_option_id": 0,
    "solution": "<p>The article '<b><i>the' </i></b>is used only before the <b><i>superlative degree </i></b>and not before the positive or comparative degree. But when selection of one of the two persons or things (sets of things) of the same kind is meant, the <b><i>comparative degree is preceded by 'the' and is followed by 'of'.</i></b></p><p>The correct sentence is- The most challenging part of the project was getting all the team members on the same page.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select No improvement required.</p><p>I had never travelled abroad <u>prior than</u> last year's trip to Japan.</p>",
    "options": [
      "Prior from",
      "No improvement required",
      "Prior to",
      "Prior for"
    ],
    "correct_option_id": 2,
    "solution": "<p>The following are used as comparative adjectives and are followed by <b><i>to </i></b>and not '<b><i>than'</i></b>: <b><i>superior, senior, junior, inferior, prior, anterior, posterior, prefer, </i></b><i>etc. </i></p><p>The correct sentence is- I had never travelled abroad prior to last year's trip to Japan.</p><p>Hence, option (c) is correct. </p>",
    "question_index": 4
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error. If the sentence is error-free, mark 'No error' as the answer.</p><p>The painting is most unique and (A)/ one-of-a-kind, with (B)/ no other copies or (C)/ replicas in existence. (D)</p>",
    "options": [
      "A",
      "B",
      "No error",
      "D"
    ],
    "correct_option_id": 0,
    "solution": "<p>The adjectives  -  <b><i>empty, excellent, circular, extreme, chief, entire, complete, perfect, final, last, unique, universal, round, square, triangular, eternal, etc.</i></b> are not used in the comparative or superlative degree.</p><p>So, 'most' should be removed from part A.</p><p>The correct sentence is- The painting is unique and one-of-a-kind, with no other copies or replicas in existence.</p><p>Hence, option (a) is correct. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the appropriate option for the given blank. </p><p>A/An ____________ stone temple is situated near the river.</p>",
    "options": [
      "massive, red, impressive",
      "impressive, red, ancient",
      "red, massive, impressive",
      "massive, impressive, red"
    ],
    "correct_option_id": 3,
    "solution": "<p>If a noun in a sentence is described in different aspects by more than one adjective, the adjectives must follow a set sequence or order as stated below: </p><p>Opinion - &gt; Size - &gt; Other qualities - &gt;Age - &gt;Colour/Pattern - &gt;Nationality - &gt;Material - &gt;Purpose </p><p><b>Example: </b></p><p><i>After debating between the two, she went with the <b>tall slender red Japanese maple </b>tree. </i>[size, other qualities, colour, nationality, purpose] </p><p><i>The <b>big blue football </b>jersey fit the boy just right. </i>[size, colour, purpose] </p><p>Here, 'size' is massive, 'other quality' is impressive, and 'colour' is red. </p><p>So, the correct sentence is  -  A massive, impressive red stone temple is situated near the river.</p><p>Hence, option (d) is correct. </p>",
    "question_index": 6
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error. </p><p>I need to (A)/ study farther (B)/ to improve (C)/ my grades. (D)</p>",
    "options": [
      "A",
      "B",
      "C",
      "D"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#8226; Farther denotes more distant in space. </p><p>&#8226; Further means additional; more.</p><p>So, the use of 'further' will be correct to talk about additional study for the exam.</p><p>The correct sentence is - I need to study further to improve my grades.</p><p>Hence, option (b) is correct.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the appropriate option for the given blank-</p><p>________ money I had saved up was not enough to buy the car I wanted.</p>",
    "options": [
      "A little",
      "A few",
      "Few",
      "The little"
    ],
    "correct_option_id": 3,
    "solution": "<p><b><i>Few and many </i></b>are used with <b><i>plural countable nouns</i></b>. <b><i>Little and much </i></b>are used with <b><i>singular non-count nouns. Little </i></b>and <b><i>few </i></b>have <b><i>negative </i></b>meanings. We use them to mean <i>'not as much as may be expected or wished for' </i></p><p><b><i>A few </i></b><i>mistakes were found in the paper. </i>&rarr; some, a small number </p><p><b><i>Few </i></b><i>errors were there in the paper. </i>&rarr; not many/almost none </p><p><b><i>The few </i></b><i>remarks that he made were very suggestive. </i>&rarr; The few = not many, but all there are </p><p><i>Jenna has <b>a little </b>money. </i>&rarr; some, a small amount </p><p><i>Jenna has <b>little </b>money to spend. </i>&rarr; not much/almost nothing </p><p><b><i>The little </i></b><i>information he had was not quite reliable</i>. &rarr; The little = not much, but all there is. </p><p>Here, the use of 'the little' will be correct to describe that all the money that person has is not enough to buy a car. </p><p>The correct sentence is - The little money I had saved up was not enough to buy the car I wanted.</p><p>Hence, option (d) is correct.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Which of the following CANNOT be put under the classification of adjectives?</p>",
    "options": [
      "Adjective of number",
      "Adjective of frequency",
      "Adjective of quality",
      "Adjective of quantity"
    ],
    "correct_option_id": 1,
    "solution": "<p>On the basis of how adjectives describe a noun/pronoun, they are classified as: </p><p>&#8226; Adjectives of Quality  -  describes kind or quality of a person or thing. </p><p>&#8226; Adjectives of Quantity  -  shows how much of a thing is meant. </p><p>&#8226; Adjectives of Number  -  shows how many persons or things are meant, or in what order a person or thing stands. </p><p>&#8226; Demonstrative Adjectives  -  points out which person or thing is meant. </p><p>&#8226; Interrogative Adjectives  -  used with nouns to ask questions.</p><p>Hence, option (b) is correct. </p>",
    "question_index": 9
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error. </p><p>Alice is afraid on spiders (A)/ and always runs (B)/ away when she (C)/ sees one. (D)</p>",
    "options": [
      "A",
      "B",
      "C",
      "D"
    ],
    "correct_option_id": 0,
    "solution": "<p>The adjective 'afraid' is followed by preposition 'of' not 'on'. </p><p>The correct sentence is- Alice is afraid of spiders and always runs away when she sees one.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Fill in the blank with a suitable adjective. </p><p>Anamika is a ____ child. </p>",
    "options": [
      "Bravest",
      "Braver",
      "Brave",
      "Smartest"
    ],
    "correct_option_id": 2,
    "solution": "<p>The given sentence shows no sign of comparison of superiority against others. So, a positive degree of adjective will be used. Hence, (c) is the correct answer. </p><p>The final sentence will be: Anamika is a brave child. </p>",
    "question_index": 11
  },
  {
    "question": "<p>Fill in the blank with a suitable adjective. </p><p>She is ____ than her sister. </p>",
    "options": [
      "Beautiful",
      "Intelligent",
      "Poorest",
      "Richer"
    ],
    "correct_option_id": 3,
    "solution": "<p>The given sentence indicates a comparison between two sisters. So, a comparative degree of adjective will be used. Hence, (d) is the correct answer. </p><p>The final sentence will be: She is richer than her sister. </p>",
    "question_index": 12
  },
  {
    "question": "<p>Fill in the blank with a suitable adjective. </p><p>Anamika is the smartest and _____ of all students.</p>",
    "options": [
      "Kinder",
      "Kind",
      "Kindest",
      "Rude"
    ],
    "correct_option_id": 2,
    "solution": "<p>Two adjectives which refer to the same noun or pronoun joined by conjunction must be in the same degree of comparison. So, the blank will be filled by a superlative form of adjective. Hence, (c) is the correct answer. </p><p>The final sentence will be: Anamika is the smartest and kindest of all students. </p>",
    "question_index": 13
  },
  {
    "question": "<p>Which of the following is an example of the superlative degree of an adjective?</p>",
    "options": [
      "Farther",
      "More far",
      "Most far",
      "Farthest"
    ],
    "correct_option_id": 3,
    "solution": "<p>The superlative degree of the adjective 'far' is 'farthest'. Hence, (d) is the correct answer. </p>",
    "question_index": 14
  },
  {
    "question": "<p>Match the following: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Beautiful</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Superlative degree</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Smartest</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Comparative degree</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. More handsome</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Positive degree</td></tr></table>",
    "options": [
      "A-ii, B-iii, C-ii",
      "A-iii, B-i, C-ii",
      "A-i, B-ii, C-iii",
      "A-iii, B-ii, C-i"
    ],
    "correct_option_id": 1,
    "solution": "<p>Most adjectives form their comparatives by the addition of  - r or  - er, and their superlative by the addition of  - st or  - est (depending on the spelling) to the positive. Here, the suffix 'est' has been used with the word 'smart' making it a superlative degree. </p><p>In some cases, adjectives (usually having more than two syllables in the spelling) form their comparative by using the adverb more with the positive, and the superlative by using the adverb most with the positive. Here 'more' has been used with the word 'handsome'. So, it forms a comparative degree. </p><p>Hence, (b) is the correct answer. </p>",
    "question_index": 15
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option.</p><p>These tips and tricks (A)/ once mastered, (B)/ will help you reach your search results (C)/ more faster than anyone else. (D)</p>",
    "options": [
      "D",
      "C",
      "A",
      "B"
    ],
    "correct_option_id": 0,
    "solution": "<p>Part D has an error. </p><p>The double comparative 'more faster' is grammatically incorrect. The correct usage is 'faster'. </p><p>Hence, option (a) is the correct answer. </p><p>The correct sentence is: These tips and tricks once mastered, will help you reach your search results faster than anyone else.</p>",
    "question_index": 16
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option.</p><p>The United Nations has (A)/ declared Finland as (B)/ a world's happiest nation (C)/ for the third consecutive year. (D)</p>",
    "options": [
      "C",
      "A",
      "B",
      "D"
    ],
    "correct_option_id": 0,
    "solution": "<p>Part C has an error. </p><p>'Happiest' is a superlative degree adjective. We always use the definitive article 'the' with a superlative degree adjective. So, the indefinite article 'a' should be replaced with the definite article 'the' to rectify the given sentence. </p><p>Hence, option (a) is the correct answer. </p><p>The correct sentence is: The United Nations has declared Finland as the world's happiest nation for the third consecutive year.</p>",
    "question_index": 17
  },
  {
    "question": "<p>In the question given below, three sentences are given which may or may not contain an error. Choose the one that is grammatically incorrect.</p><p>I. This watch is more expensive of the five watches he has been gifted.</p><p>II. Raghav, in my opinion, is humbler than loyal.</p><p>III. This watch is the more expensive of the two watches.</p>",
    "options": [
      "Only II",
      "Only I",
      "Both I and II",
      "Both II and III"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sentences I and II are incorrect. </p><p>I: A comparative degree is used to compare two things. In the given sentence, the superlative degree should be used to talk about one of the five watches. </p><p>The correct sentence is: This watch is the most expensive of the five watches he has been gifted.</p><p>II: When two qualities in the same person or thing are compared, the comparative</p><p>degree is formed by using more, instead of  - r or  - er with the positive. So, 'humbler' should be replaced with 'more humble'. </p><p>The correct sentence is: Raghav, in my opinion, is more humble than loyal. </p><p>III: When the selection of one of the two persons or things (sets of things) of the same kind is meant, the comparative degree is preceded by 'the' and is followed by 'of'. So, sentence III is correct. </p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 18
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option.</p><p>Ever since Justin made the (A)/ revelation, fans have been (B)/ impatiently waiting for him to (C)/ release the better version of the game. (D)</p>",
    "options": [
      "C",
      "A",
      "D",
      "B"
    ],
    "correct_option_id": 2,
    "solution": "<p>Part D has an error. </p><p>The article 'the' is used only before the superlative degree and not before the</p><p>positive or comparative degree. So, 'the better' should be replaced with 'a better' to rectify the given sentence. </p><p>Hence, option (c) is the correct answer. </p><p>The correct sentence is: Ever since Justin made the revelation, fans have been impatiently waiting for him to release a better version of the game.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
