  {
    "question": "<p>Identify the error in the following sentence. </p><p>She had beat all odds to achieve her long-cherished dream of becoming a successful entrepreneur.</p>",
    "options": [
      "Beat",
      "Achieve",
      "Successful",
      "Becoming"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error in the sentence is in the word \"beat.\" The correct past participle of \"beat\" in this context should be \"beaten\" instead of \"beat.\" \"Beat\" is the present tense form, but in this sentence, we need the past participle form to convey the completed action in the past. The past participle of \"beat\" is \"beaten.\" \"Had\", when acting as a helping verb, requires past participle after it. Therefore, the correction is necessary for grammatical accuracy. Hence, (a) is the correct answer. </p><p>The corrected sentence would be: \"She had beaten all odds to achieve her long-cherished dream of becoming a successful entrepreneur.\"</p><p><b>Note: Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 0
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Engaging in a deep and contemplative process, she took the time to carefully think as the various possibilities, considering various perspectives and potential outcomes before arriving at a well-considered and thoughtful decision.</p>",
    "options": [
      "Engaging in a deep and contemplative process,",
      "considering various perspectives and potential outcomes",
      "before arriving at a well-considered and thoughtful decision.",
      "she took the time to carefully think as the various possibilities,"
    ],
    "correct_option_id": 3,
    "solution": "<p>Adverb 'as' cannot be used with- 'name, elect, think, consider, call, appoint, make, choose'. So, 'think as' will be changed to 'think about (give thought to)' in the given sentence. </p><p>The correct sentence is- <b><i>\"Engaging in a deep and contemplative process, she took the time to carefully think about the various possibilities, considering various perspectives and potential outcomes before arriving at a well-considered and thoughtful decision.\"</i></b></p><p>Hence, option (d) is correct. </p>",
    "question_index": 1
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Navigating the labyrinthine corridors of / ancient history, historians unravels the complexities / of bygone civilizations, piecing together / narratives lost in the sands of time.</p>",
    "options": [
      "Navigating the labyrinthine corridors of",

      "of bygone civilizations, piecing together",
      "narratives lost in the sands of time."
    ],
    "correct_option_id": 1,
    "solution": "<p>The plural noun 'historians' needs to be followed by the plural verb 'unravel' or the past form verb 'unravelled' but not singular verb 'unravels'. Hence, option (b) is the answer. </p><p>The correct sentence is: Navigating the labyrinthine corridors of ancient history, historians unravel the complexities of bygone civilizations, piecing together narratives lost in the sands of time.</p><p>OR</p><p>Navigating the labyrinthine corridors of ancient history, historians unravelled the complexities of bygone civilizations, piecing together narratives lost in the sands of time.</p>",
    "question_index": 2
  },
  {
    "question": "<p><b> </b>The following sentence has been split into three segments. Identify the segment that contains an error. If the sentence is free of any errors, mark 'No error' as your answer. </p><p>The writer and director of the movie has/ put so many efforts to bring the cinematic narrative/ to life, delivering a compelling experience for audience. </p>",
    "options": [
      "the writer and director of the movie has",
      "to life, delivering a compelling experience for audience",
      "put so many efforts to bring the cinematic narrative",
      "No error"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct phrase is \"put so much effort\" rather than \"put so many efforts.\" \"Effort\" is an uncountable noun in this context, so it should not be pluralized. Hence, (c) is the correct answer. </p><p>The corrected sentence would be: The writer and director of the movie has put so much effort to bring the cinematic narrative to life, delivering a compelling experience for audience. </p>",
    "question_index": 3
  },
  {
    "question": "<p>Spot the erroneous part if any, in the following sentence.</p><p>The plumber/ <u>fixed the leak</u> (A)/ <u>after the water</u> (B)/ <u>had flood</u> (C)/ the basement. / No error (D).</p>",
    "options": [
      "D",
      "B",
      "C",
      "A"
    ],
    "correct_option_id": 2,
    "solution": "<p>The erroneous part in the sentence is (C). The error in segment (C) relates to the verb tense agreement. The sentence describes two past actions: the flooding of the basement and the plumber fixing the leak. The sequence of events indicates that the flooding occurred before the plumber fixed the leak. To express this sequence of events properly, the past perfect tense is used to indicate an action that occurred before another past action. In this case, \"had flooded\" (past participle form (V3)) should be used instead of \"had flood\" (flood is the base form of the verb) to convey that the flooding happened prior to the plumber fixing the leak. Hence, (c) is the correct answer. </p><p><b>The correct sentence is: </b>\"The plumber fixed the leak after the water had flooded the basement.\"</p>",
    "question_index": 4
  },
  {
    "question": "<p>Spot the erroneous part if any, in the following sentence. </p><p>The collection of/ <u>vintage coins were(A)/</u> meticulously curated, / <u>featuring rare pieces from(B)/</u> various historical periods/ <u>and regions around the world(C).</u> / No error (D). </p>",
    "options": [
      "A",
      "B",
      "C",
      "D"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error here is related to subject-verb agreement. The subject of this sentence is \"the collection,\" which is a singular noun. However, the verb used in this sentence is \"were,\" which is the plural form of the verb \"to be.\" This is incorrect because the subject \"the collection\" is singular, so the verb should also be singular. To correct this error, we should use the singular form of the verb \"to be,\" which is \"was\". Hence, (a) is the correct answer. </p><p>The final sentence: The collection of vintage coins was meticulously curated, featuring rare pieces from various historical periods and regions around the world.</p><p><b>Note: Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 5
  },
  {
    "question": "<p>Spot the erroneous part if any, in the following sentence. </p><p><u>Having being in the company(A)/</u> for over a decade, / <u>Michael was well-versed in(B)/</u> the intricacies of the industry/ <u>and had developed strong(C)</u>/ relationships with clients. / No error (D). </p>",
    "options": [
      "C",
      "A",
      "D",
      "B"
    ],
    "correct_option_id": 1,
    "solution": "<p>\"Having\" is a gerund or present participle form of the verb \"have,\" which is used to indicate an ongoing action or state. However, in this context, we need the past participle form of the verb.</p><p>\"Being\" is the present participle, which is used in continuous tenses (e.g., \"is being,\" \"was being\"), and it's inappropriate here because the sentence refers to a past and completed action.</p><p>\"Having been\" is the correct past perfect participle form, used to indicate a completed action in the past that is relevant to the present or another past event. In this sentence, it implies that Michael's long presence in the company led to his expertise and relationships.</p><p>Hence, (b) is the correct answer.</p><p>The correct sentence: Having been in the company for over a decade, Michael was well-versed in the intricacies of the industry and had developed strong relationships with clients.</p><p><b>Note: Gerund:</b> Gerund is a verb form that functions as a noun, ending in -ing. A gerund can be either the subject or object of a sentence in English. Example: \"Everybody enjoyed her dancing and singing at the party.\" The words 'dancing' and 'singing' are gerunds.</p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error. </p><p>The volunteers <u>worked</u> tirelessly <u>since</u> six days <u>to</u> build homes <u>for</u> the underprivileged community.</p>",
    "options": [
      "Worked",
      "To",
      "Since",
      "For"
    ],
    "correct_option_id": 2,
    "solution": "<p>The part that contains the error is 'since'. The phrase \"since six days\" is incorrect because \"since\" is used to specify a starting point in time or an event that continues up to the present. It does not convey the duration of time worked by the volunteers. The preposition \"for\" is used to indicate a duration of time. Therefore, the correct phrase should be \"for six days,\" which correctly communicates the duration of time during which the volunteers worked tirelessly to build homes for the underprivileged community. Hence, (c) is the correct answer. </p><p><b>The correct sentence is:</b> The volunteers worked tirelessly <b>for</b> six days to build homes for the underprivileged community.</p><p><b>NOTE:</b></p><p></b>\"<b>A Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p>Examples</p><p>I. The teacher scolded the child for being late.</p><p>II. We're going to a party. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.\"</p>",
    "question_index": 7
  },
  {
    "question": "<p>Identify the segment in the sentence that contains a grammatical error. </p><p>The two sisters, along with their brother, was excitedly planning a surprise birthday party for their parents, hoping to make it a memorable occasion. </p>",
    "options": [
      "The two sisters, along with their",
      "brother, was excitedly planning a surprise",
      "birthday party for their parents, hoping",
      "to make it a memorable occasion"
    ],
    "correct_option_id": 1,
    "solution": "<p>The phrase \"along with their brother\" is an additional descriptive element rather than a coordinating phrase like \"as well as.\" Here, the compound subject \"The two sisters, along with their brother\" includes plural (\"sisters\") and singular (\"brother\") elements. When dealing with compound subjects like this, the verb typically agrees with the plurality of the entire compound subject. Since \"sisters\" is plural, the correct verb form should be plural to match (\"were\" (plural verb) instead of \"was\" (singular verb)). Hence, (b) is the correct answer. </p><p>Note: A compound subject is a subject in a sentence that consists of two or more nouns, pronouns, or noun phrases joined by a coordinating conjunction (such as \"and\" or \"or\") that share the same verb.</p><p>The corrected sentence: The two sisters, along with their brother, <b>were</b> excitedly planning a surprise birthday party for their parents, hoping to make it a memorable occasion.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Identify the segment in the sentence that contains a grammatical error. </p><p>He said me that he had finally decided to pursue his lifelong dream of travelling the world and writing about his adventures. </p>",
    "options": [
      "He said me that he had finally",
      "decided to pursue his lifelong dream",
      "of travelling the world and",
      "writing about his adventures"
    ],
    "correct_option_id": 0,
    "solution": "<p>In segment (a), \"He said me\" is incorrect. The correct phrase should be \"He told me\" where \"told\" is followed by the indirect object pronoun \"me,\" indicating to whom the statement was addressed. \"Told\" is more appropriate here than \"said\" when reporting what someone said directly to another person. </p><p>Hence, (a) is the correct answer. </p><p>Note: An object pronoun is a type of pronoun used as the object of a verb or a preposition in a sentence. Object pronouns receive the action of the verb and are positioned after the verb or preposition. </p><p>The corrected sentence: He <b>told</b> me that he had finally decided to pursue his lifelong dream of travelling the world and writing about his adventures.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Identify the segment in the sentence that contains a grammatical error. </p><p>I sent you the revised document, so please review it and revert back with any comments or questions by Friday.</p>",
    "options": [
      "I sent you the revised document,",
      "so please review it and",
      "revert back with any",
      "comments or questions by Friday"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in segment (c) \"revert back with any.\" The word \"back\" is redundant when used with \"revert,\" as \"revert\" already means to return to a previous state or action. Therefore, the correct term to use in this context is simply \"revert with any.\" Hence, (c) is the correct answer. </p><p>The corrected sentence: I sent you the revised document, so please review it and <b>revert with</b> any comments or questions by Friday.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Identify the segment in the sentence that contains a grammatical error. </p><p>The project has been progressing steadily for last summer, marked by significant milestones achieved by our dedicated team.</p>",
    "options": [
      "The project has been progressing",

    "correct_option_id": 1,
    "solution": "<p>The error is in segment (b) \"steadily for last summer.\" The phrase \"for last summer\" is incorrect because \"last summer\" refers to a time in the past. The correct expression should use \"since\" to indicate the starting point of the progress. \"For\" is rather used to show a period of time, in the past, present or future. Hence, (b) is the correct answer. </p><p>The corrected sentence: The project has been progressing steadily <b>since</b> last summer, marked by significant milestones achieved by our dedicated team.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Identify the segment in the sentence that contains a grammatical error. </p><p>Samantha enjoys to spend weekends hiking in the mountains, finding solace and joy in the beauty of nature. </p>",
    "options": [
      "Samantha enjoys to spend",

      "finding solace and joy",

    "correct_option_id": 0,
    "solution": "<p>In segment (a), \"enjoys to spend\" is incorrect. After the verb \"enjoys,\" the correct structure is to use the gerund form (\"spending\"), which acts as a noun and follows the verb. Therefore, \"enjoys to spend\" should be corrected to \"enjoys spending\" to maintain grammatical accuracy and clarity. Hence, (a) is the correct answer. </p><p>Note: A gerund is a verb form that ends in \"-ing\" and functions as a noun in a sentence. </p><p>The corrected sentence: Samantha enjoys <b>spending</b> weekends hiking in the mountains, finding solace and joy in the beauty of nature. </p>",
    "question_index": 12
  },
  {
    "question": "<p>Identify the segment in the sentence that contains a grammatical error.</p><p>The collection of sculptures is displayed on the museum, showcasing rare and historical pieces from different eras and cultures.</p>",
    "options": [
      "The collection of sculptures is displayed",
      "on the museum, showcasing rare",
      "and historical pieces from",
      "different eras and cultures"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error lies in the preposition \"on\" in the phrase \"on the museum.\" The preposition \"on\" typically indicates placement on top of a surface, such as \"on the table\" or \"on the wall.\" In this case, sculptures are not physically placed on the museum building. Instead, they are displayed within the museum's interior space.</p><p>Use \"in\" to indicate that the collection is inside the museum, where the sculptures are being exhibited. This is the most appropriate option since sculptures are displayed within the space of the museum.</p><p>\"At\" can also be used when you want to refer to a specific location, like a building or venue, without focusing on whether it's inside or outside. Example: \"The collection of sculptures is displayed at the museum.\"</p><p>So, the correct sentence is: The collection of sculptures is displayed in/at the museum, showcasing rare and historical pieces from different eras and cultures.</p><p>Hence, option (b) is the answer.</p>",

  },
  {
    "question": "<p>Identify the segment in the sentence that contains a grammatical error. </p><p>By the time the event ended, she had give a heartfelt speech that moved everyone in the audience to tears.</p>",
    "options": [
      "By the time the event ended,",
      "she had give a heartfelt speech",
      "that moved everyone in",
      "the audience to tears"
    ],
    "correct_option_id": 1,
    "solution": "<p>In segment (b), \"she had give\" is incorrect. The correct past participle form of the verb \"give\" is \"given.\" When using the past perfect tense (\"had given\"), we need to use the past participle form of the verb. Therefore, \"had give\" should be corrected to \"had given\" to maintain grammatical accuracy in the sentence. Hence, (b) is the correct answer. </p><p>Note: A past participle is a verb form that typically ends in \"-ed\" for regular verbs and has various endings for irregular verbs. It is used in forming perfect tenses, passive voice, and as an adjective to describe nouns.</p><p>The corrected sentence: By the time the event ended, she had <b>given</b> a heartfelt speech that moved everyone in the audience to tears.</p>",

  {
    "question": "<p>The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer.</p><p>More than one student (1)/ have attended the state level (2)/ quiz competition from my school./(3) No error (4)</p>",

    "correct_option_id": 1,
    "solution": "<p>The correct sentence is \"More than one student has attended the state level quiz competition from my school\". The noun and verb followed by 'more than one' will always be singular. More than one means not merely. The given sentence should be understood as 'not merely one student has attended the quiz competition (but many have)'. Hence, option (b) is the answer.</p>",

    "question": "<p>In the following question, one of the parts of the sentence may have error. Find out which part of the sentence has an error and select the appropriate option. If the sentence is free from error, select answer option accordingly. </p><p>She gave him an agitated look and (1)/ rolled into her stomach, twisting (2)/ her head away from him. (3)/ No error (4)</p>",
