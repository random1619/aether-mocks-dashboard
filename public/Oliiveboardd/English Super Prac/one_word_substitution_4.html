<body>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate option that means the same as the underlined group of words to fill the blank.</p><p>Some species of flowers bloom <u>once every two years</u>, making them __________.</p>",
    "options": [
      "annual",
      "biannual",
      "biennial",
      "perennial"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Biennial' refers to something that occurs every two years, which matches the description of flowers that bloom once every two years.</p><p>'Annual' refers to something that happens once every year.</p><p>'Biannual' means occurring twice a year.</p><p>'Perennial' refers to something that lasts or comes back every year.</p><p>Hence, option (c) is correct. </p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>A person living at the same time as another</p>",
    "options": [
      "Contemporary",
      "Obsolete",
      "Mercenary",
      "Fiesta"
    ],
    "correct_option_id": 0,
    "solution": "<p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>WORD</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>MEANING</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Contemporary</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A person living at the same time as another</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Obsolete</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A thing no longer in use</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Mercenary</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A soldier who fights for the sake of money</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Fiesta</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Events manifested by festivities</td></tr></table></p><p>So, 'contemporary' is the right word here.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the underlined group of words in the given sentence.</p><p>Maria is <u>a person who speaks many languages</u>, effortlessly switching between English, Spanish, and French during her travels.</p>",
    "options": [
      "Translator",
      "Philologist",
      "Orator",
      "Polyglot"
    ],
    "correct_option_id": 3,
    "solution": "<p>Translator: a person who translates from one language into another, especially as a profession.</p><p>Philologist: a person who studies the history of languages, particularly by analyzing literature.</p><p>Orator: a public speaker, especially one who is eloquent or skilled.</p><p>Polyglot: a person who knows and is able to use several languages.</p><p>Hence, option (d) is the answer. </p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank. </p><p>The tranquil setting of the facility, an establishment for the treatment of the chronically ill, provided patients with the necessary care and support to aid in their recovery and improve their overall well-being. These patients are staying in a ___________. </p>",
    "options": [
      "Auditorium",
      "Museum",
      "Planetarium",
      "Sanatorium"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct answer is <b>d) Sanatorium</b>.</p><p>This option accurately describes a facility designed for the treatment of the chronically ill, making it the most appropriate choice to fill in the blank.</p><p>Auditorium: the part of a theatre, concert hall, or other public building in which the audience sits.</p><p>Museum: a building in which objects of historical, scientific, artistic, or cultural interest are stored and exhibited.</p><p>Planetarium: a building specially equipped to show images of the stars in the sky and other objects in space on a curved ceiling.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the term which means the same as the given group of words. </p><p>The network of entities involved in producing and delivering a product from raw materials to the final consumer.</p>",
    "options": [
      "Food chain",
      "Supply chain",
      "Information chain",
      "Data chain"
    ],
    "correct_option_id": 1,
    "solution": "<p>Supply chain: a complex system of organizations, resources, and processes that involves the production and delivery of a product or service.</p><p>Hence, option b) is the answer. </p><p>Food chain: A sequence of organisms where each is eaten by the next in the chain, illustrating the flow of energy and nutrients.</p><p>Information chain: The sequence of processes involved in collecting, processing, and disseminating information within an organization or system.</p><p>Data chain: The process of collecting, processing, and using data to generate insights and inform decision-making.</p>",
    "question_index": 4
  },
  {
    "question": "<p><b> </b>Select the option that can be used as a one-word substitute for the underlined group of words in the given sentence.</p><p>Sara cannot go with us in the forest, she has a <u>phobia of snakes.</u></p>",
    "options": [
      "Arsonphobia",

      "Mythophobia",
      "Ophidiophobia"

    "question_index": 5
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>An obsession with one's own power and importance.</p>",

      "Megalomania",
      "Bibliomania"

    "correct_option_id": 2,
    "solution": "<p>Egomania: An extreme focus on oneself, often with an inflated sense of self-worth.</p><p>Pyromania: An uncontrollable impulse to set things on fire.</p><p>Megalomania: A delusional obsession with power, wealth, or greatness.</p><p>Bibliomania: A passionate love for collecting books.</p><p>Hence, option (c) is correct.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the term that means the same as the given group of words.</p><p>A self-perpetuating situation where actions or events result in outcomes that increase their initial cause.</p>",
    "options": [
      "Feedback loop",
      "Cyclic outcome",
      "Reversed pattern",
      "Progressive cycle"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Feedback loop</b> refers to a system where the output or result of an action feeds back into the system, reinforcing the original action. This can create a cycle where an effect amplifies its own cause, either positively (positive feedback) or negatively (negative feedback).</p><p>&#183; <b>Cyclic outcome</b> refers to events repeating in a cycle, but it doesn't necessarily suggest that the outcomes increase the initial cause.</p><p>&#183; <b>Reversed pattern</b> would imply a situation where events move in an opposite or reversed direction, not one where outcomes reinforce the cause.</p><p>&#183; <b>Progressive cycle</b> implies gradual development or change over time but doesn't specifically suggest that the outcomes feed back into the cause.</p><p>Thus, <b>feedback loop</b> captures the idea of self-perpetuation, where the result of actions directly reinforces or increases the initial cause.</p><p>Hence, option (a) is correct. </p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option that means the same as the underlined group of words to fill in the blank. </p><p>The <u>doctor who treats eye diseases</u> performed the surgery successfully, showcasing the expertise of an __________.</p>",
    "options": [
      "Endodontist",
      "Chiropodist",
      "Obstetrician",
      "Ophthalmologist"
    ],
    "correct_option_id": 3,
    "solution": "<p>Ophthalmologist: a specialist in the branch of medicine concerned with the study and treatment of disorders and diseases of the eye.</p><p>So, \"ophthalmologist\" can be used to fill the blank. </p><p><b>Hence, option (d) is the answer. </b></p><p>Endodontist - a dentist with special training to treat problems affecting the inside of your tooth, or \"pulp,\" such as root canals.</p><p>Chiropodist - a person who treats the feet and their ailments.</p><p>Obstetrician - a doctor with special training in how to care for pregnant women and help in the birth of babies.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p></p><p>A person without manners or polish</p>",
    "options": [
      "Rustic",
      "Naive",
      "Ingenuous",
      "Connoisseur"
    ],
    "correct_option_id": 0,
    "solution": "<p>Rustic is an unsophisticated and mannerless country person.</p><p>Naive is an inexperienced person.</p><p>Ingenuous means characterized by an inability to mask your feelings; not devious.</p><p>Connoisseur is a person who knows a lot about art, good food, music, etc.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>Having great or unlimited power</p>",
    "options": [
      "Omniscient",
      "Omnipotent",
      "Omnipresent",
      "Octogenarian"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Omnipotent' means 'having great power and influence'. </p><p>Hence, option (b) is the answer. </p><p>'Omniscient' means 'knowing everything'. </p><p>'Omnipresent' means 'widely or constantly encountered; widespread'. </p><p>'Octogenarian' means 'a person who is between 80 and 89 years old'. </p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>A person who believes that war and violence are unjustifiable</p>",
    "options": [
      "pessimist",
      "anarchist",
      "optimist",
      "pacifist"

    "correct_option_id": 3,
    "solution": "<p>'Pessimist' means a person who tends to see the worst aspect of things or believe that the worst will happen; 'anarchist' means a person who believes in or tries to bring about anarchy ('anarchy' means state of disorder due to absence or non-recognition of authority or other controlling systems); 'optimist' means a person who tends to be hopeful and confident about the future or the success of something; 'pacifist' means a person who believes that war and violence are unjustifiable. Hence, d) is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the underlined group of words.</p><p>Girisha is involved in <u>the study of the behaviour, structure, physiology, classification and distribution of animals. </u></p>",
    "options": [
      "Petrology",
      "Zoology",
      "Odontology",
      "Chronobiology"

    "correct_option_id": 1,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>WORD</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>MEANING</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Petrology</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The branch of science concerned with the origin, structure and composition of rocks</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Zoology</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The scientific study of the behaviour, structure, physiology, classification and distribution of animals</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Odontology</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The scientific study of the structure and diseases of teeth</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Chronobiology</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The branch of biology concerned with cyclical physiological phenomena</td></tr></table><p>'Zoology' is the right choice for the underlined group of words. </p><p>Hence, option (b) is correct. </p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the underlined group of words.</p><p>On our way back to the hotel, we got caught in <u>snowstorms with uncontrollable winds.</u></p><p></p>",
    "options": [
      "Bonfire",
      "Hinterland",
      "Blizzard",
      "Virtue"
    ],
    "correct_option_id": 2,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>WORD</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>MEANING</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bonfire</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Huge fire for celebration</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hinterland</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The remote regions of a country which are far away from the rivers</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Blizzard</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Snowstorms with uncontrollable winds</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Virtue</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ethically good behaviour</td></tr></table><p>'Blizzard' is the right choice for the underlined words. </p><p>Hence, option (c) is correct. </p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the italicised group of words in the given sentence.</p><p>Adding more regulations may <i>make the situation worse</i>.</p>",
    "options": [
      "Exaggerate",
      "Exacerbate",
      "Exercise",
      "Exorcise"
    ],
    "correct_option_id": 1,
    "solution": "<p>(a) Exaggerate: This word means to represent something as being larger, greater, better, or worse than it really is. While it involves making something seem worse, it doesn't directly convey the idea of making the situation worse through additional regulations.</p><p>(b) Exacerbate: This word means to make a situation, condition, or problem worse. It accurately captures the idea conveyed in the sentence.</p><p>(c) Exercise: This word means to engage in physical activity or to apply a skill or activity. It does not convey the concept of making a situation worse.</p><p>(d) Exorcise: This word means to drive out or attempt to drive out something undesirable. It is not relevant to the context of making a situation worse.</p><p>Hence, (b) is the correct answer.</p>",
    "question_index": 14

  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>An instrument for measuring the pressure acting on a column of fluid</p>",

    "question_index": 15

  {
    "question": "<p>Select the option that can be used as a one-word substitute for the underlined group of words. </p><p>The fireworks display was beautiful but <u>lasted for a very short time</u> before fading into the night sky.</p>",
    "options": [

    "correct_option_id": 3,
    "solution": "<p>The underlined group of words, \"lasted for a very short time\", describes something that is short-lived and fleeting. The word \"ephemeral\" means \"lasting for a very short time\". Therefore, the one-word substitute for the underlined group of words is \"ephemeral\". Hence, (d) is the correct answer. </p><p>'Esoteric' means intended for or likely to be understood by only a small number of people with specialized knowledge.</p><p>'Ubiquitous' means present, appearing, or found everywhere.</p><p>'Sycophant' means a person who flatters someone excessively in order to gain favour.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>A list of passengers or goods being carried on a vehicle</p>",
    "options": [
      "MULTILINGUAL",
      "MYTHOPHOBIA",
      "WAYBILL",
      "AMBIDEXTROUS"
    ],
    "correct_option_id": 2,
    "solution": "<p>'WAYBILL' means 'A list of passengers or goods being carried on a vehicle'. 'MYTHOPHOBIA' means 'The fear of myths, stories or making false statements'. 'MULTILINGUAL' means 'Person who speaks many languages'. 'AMBIDEXTROUS' means 'One who is able to use the right and left hands equally well'. According to the meanings mentioned above, option c) is the correct answer.</p>",
