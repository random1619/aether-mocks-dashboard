<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="15">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the sentence with the appropriate use of adverb of frequency. </p><p></p>",
    "options": [
      "She talks about her past bitterly.",
      "She talks about her past very pleasantly.",
      "She rarely talks about her past.",
      "She talks about her past with so much interest."
    ],
    "correct_option_id": 2,
    "solution": "<p>Often, seldom, rarely, every now and then, hardly ever, sometimes, never, always, occasionally, eventually, etc. are some examples of adverbs of frequency.</p><p>Hence, option (c) is correct. </p>",
    "question_index": 0
  },
  {
    "question": "<p><b> </b>Select the appropriate option to replace the underlined word with the adverb of time. </p><p>I will finish my work <u>happily</u>. </p>",
    "options": [
      "Regularly",
      "Later",
      "Daily",
      "Weekly"
    ],
    "correct_option_id": 1,
    "solution": "<p>The underlined word \"happily\" describes how the action of finishing work will be done, indicating the manner in which the work will be completed. However, we are asked to replace it with an adverb of time. \"Later\" refers to a specific time in the future when the work will be finished. Hence, (b) is the correct answer. </p><p>\"Regularly\", \"daily\" and \"weekly\" describe frequency, not a specific time.</p><p>The final sentence: I will finish my work later. </p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the appropriate option for the given blank.</p><p>The building was built ________.</p>",
    "options": [
      "rough",
      "swift",
      "complete",
      "hastily"
    ],
    "correct_option_id": 3,
    "solution": "<p>The blank requires an adverb of manner to denote the way the building is built. Accordingly, option (d), 'hastily' is the only adverb of manner given in the option and so, it can fill the blank as required. 'Rough', 'complete' and 'swift' are adjectives and 'more' is an adverb of degree and so, these options are negated.</p><p>The complete sentence is: The building was built hastily.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the appropriate option for the given blank.</p><p>The invitations have been kept ____ the table.</p>",
    "options": [
      "on",
      "randomly",
      "sequentially",
      "when"
    ],
    "correct_option_id": 0,
    "solution": "<p>The blank requires an adverb of place to denote the position of the invitation with respect to the table. Accordingly, only option (a), 'on' is an adverb of place and so, it can fill the blank as required. 'Randomly' and 'sequentially' are adverbs of manner, 'often' is an adverb of frequency and 'when' is an adverb of interrogation and so, these options are negated.</p><p>The complete sentence is: The invitations have been kept on the table.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the appropriate option for the given blank.</p><p>We visit our grandparents' home ________.</p>",
    "options": [
      "often",
      "beautifully",
      "early",
      "never"
    ],
    "correct_option_id": 0,
    "solution": "<p>The blank requires an adverb of frequency to indicate the frequency of the event of visiting the grandparents' home. Accordingly, option (a), 'often' is the most appropriate adverb of frequency that can fill the blank as required. Though option (d) 'never' is an adverb of frequency, it is a grammatically incorrect option to the given sentence. 'Never' should be placed before the verb 'visit' in order to make it the correct option. 'beautifully' is an adverb of manner and 'early' is an adverb of time and so, these options are negated.</p><p>The complete sentence is: We visit our grandparents' home often.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the appropriate option for the given blank.</p><p>The parcel has arrived _______.</p>",
    "options": [
      "how",
      "underneath",
      "early",
      "on"
    ],
    "correct_option_id": 2,
    "solution": "<p>The blank requires an adverb that denotes 'time'. Accordingly, only option (c), 'early' is adverb of time and so, it can fill the blank as required. 'How' is an interrogative adverb, 'underneath' and 'on' are adverbs of place. So, these options are negated.</p><p>The complete sentence is: The parcel has arrived early.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 5
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>How do you often (A)/ make visits (B)/ to these (C)/ peculiar places? (D).</p>",
    "options": [
      "C",
      "A",
      "D",
      "B"
    ],
    "correct_option_id": 1,
    "solution": "<p>Part A has an error. 'Often'<b><i> </i></b>is placed at the end of the sentence (this is generally restricted to negative statements and questions). There is an exception to this, which is, the adverb 'often' is placed before the verb and not at the end of a question that enquires about the frequency of an event. In this sentence, 'often' must have come before the subject 'you'.</p><p>The correct sentence is: How often do you make visits to these peculiar places?</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 6
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>The apartment purchase (A)/ is costing only (B)/ a few weeks of (C)/ restaurant eat-outs (D).</p>",
    "options": [
      "A",
      "C",
      "B",
      "D"
    ],
    "correct_option_id": 2,
    "solution": "<p>Part B has an error. When the verb phrase has an auxiliary and a main verb, the adverb is placed between the auxiliary and the main verb. In this sentence, the adverb 'only' is used after the main verb 'costing'. This is an error.</p><p>The correct sentence is: The apartment purchase is only costing a few weeks of restaurant eat-outs.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 7
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>It is a well-known (A)/ fact that Sameer (B)/ visibly is leading (C)/ the team (D).</p>",
    "options": [
      "D",
      "C",
      "A",
      "B"
    ],
    "correct_option_id": 1,
    "solution": "<p>Part C has an error. When the verb phrase has an auxiliary and a main verb, the adverb is placed between the auxiliary and the main verb. In this sentence, the adverb 'possibly' is placed before the auxiliary verb which is incorrect.</p><p>The correct sentence is: It is a well-known fact that Sameer is visibly leading the team.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 8
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>Hardly than (A)/ the food gotten (B)/ over when the new (C)/ lot came in (D).</p>",
    "options": [
      "B",
      "D",
      "C",
      "A"
    ],
    "correct_option_id": 3,
    "solution": "<p>Part A has an error. 'Scarcely' and 'hardly'<b><i> </i></b>follow the following syntax in a sentence: Hardly/Scarcely + had + Sub + Past participle .. when. In this sentence, the preposition 'than' is used instead of 'had'.</p><p>The correct sentence is: Hardly had the food gotten over when the new lot came in.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 9
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>We had no (A)/ other option left (B)/ but obeying (C)/ his command (D).</p>",
    "options": [
      "C",
      "D",
      "A",
      "B"
    ],
    "correct_option_id": 0,
    "solution": "<p>Part C has an error. In a sentence, the adverb else is followed by 'but' and 'than' follows 'rather', 'other' and 'otherwise'. In this sentence, 'other' is incorrectly followed by 'but'.</p><p>The correct sentence is: We had no other option left than obeying his command.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 10
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>Jahangir is (A)/ considered as (B)/ the greatest among (C)/ the Mughal rulers (D).</p>",
    "options": [
      "C",
      "A",
      "D",
      "B"
    ],
    "correct_option_id": 3,
    "solution": "<p>Part B has an error. Adverb 'as' can be used with 'regard, describe, define, treat, view'. But it cannot be used with verbs like 'name, elect, think, call, make, choose, consider'.</p><p>The correct sentence is: Jahangir is considered the greatest among the Mughal rulers.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 11
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. </p><p>Everyone else (A)/ than our dog (B)/ left us in (C)/ our distress (D).</p>",
    "options": [
      "C",
      "A",
      "D",
      "B"
    ],
    "correct_option_id": 3,
    "solution": "<p>Part B has an error. In a sentence, the adverb 'else' is followed by 'but' and 'than' follows 'rather', 'other' and 'otherwise'. In this sentence, 'else' is incorrectly followed by 'than'.</p><p>The correct sentence is: Everyone else but our dog left us in our distress.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the appropriate option to replace the underlined word with adverb of manner.</p><p>I told her that I would meet her <u>later</u>.</p>",
    "options": [
      "Cheerfully",
      "Often",
      "Regularly",
      "Always"
    ],
    "correct_option_id": 0,
    "solution": "<p>An adverb of manner describes how something is done, and \"cheerfully\" fits this definition as it describes the manner in which the meeting would take place. The other options are adverbs of frequency, which describe how often something happens, not how it happens.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 13
  },
  {
    "question": "<p>The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer.</p><p>No sooner do you / buy a computer when they/ bring out a new one that supersedes it. </p>",
    "options": [
      "No error",
      "No sooner do you",
      "bring out a new one that supersedes it.",
      "buy a computer when they"
    ],
    "correct_option_id": 3,
    "solution": "<p>Part B has an error.</p><p>The adverb 'no sooner' is always followed by 'than' and not 'when'. So, the phrase 'buy a computer when they' is incorrect. The correct phrase is 'buy a computer than they'.</p><p>Hence, option (d) is the correct answer.</p><p>The correct sentence is: No sooner do you buy a computer than they bring out a new one that supersedes it.</p>",
    "question_index": 14
  },
  {
    "question": "<p>In the following question, one part of the sentence may have an error. Find out which part of the sentence has an error and select the appropriate option. If the sentence is free from error, select 'No Error'.</p><p>He says he is back to / work and is feeling much good / after keeping unwell for past few days.</p>",
    "options": [
      "work and is feeling much good",
      "after keeping unwell for past few days",
      "He says he is back to",
      "No error"
    ],
    "correct_option_id": 0,
    "solution": "<p>The adverb 'very' is used with a positive degree adjective while 'much' is used with a comparative degree adjective. For the given sentence, 'better' is a comparative degree of the adjective 'good'. So, the phrase 'much good' is incorrect. The correct phrase is either 'much better' or 'very good'.</p><p>Hence, option (a) is the correct answer.</p><p>The correct sentence is: He says he is back to work and is feeling much better after keeping unwell for past few days.</p>",
    "question_index": 15
  },
  {
    "question": "<p>'Attentively' is an adverb of ______.</p>",
    "options": [
      "Manner",
      "Time",
      "Frequency",
      "Degree"
    ],
    "correct_option_id": 0,
    "solution": "<p>Adverb of Manner: It tells us how an action is performed or how an event occurs.</p><p>Here, 'attentively' shows the manner of performing the action.</p><p>Hence, option (a) is correct.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select No improvement required.<u></p><p>Never I have ever seen</u> such breath-taking scenery as the one I witnessed yesterday.</p>",
    "options": [
      "Never I have ever saw",
      "Never seen I have ever",
      "Never have I ever seen",
      "No improvement required"
    ],
    "correct_option_id": 2,
    "solution": "<p><b><i>According to the rule, </i></b>when<i> <b>never </b></i>is placed in the beginning, subject-verb inversion is used. It follows the given syntax- </p><p>\"Never+ had/have + Subject + Past participle\"</p><p>Therefore, the correct replacement will be 'never have I ever seen'.</p><p>The correct sentence is- Never have I ever seen such breath-taking scenery as the one I witnessed yesterday.</p><p>Hence, option (c) is correct.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select No improvement required.<u></p><p></u>She <u>has hardly not thought</u> about her future plans.</p>",
    "options": [
      "Has hardly thought",
      "Has not thought hardly",
      "Has hardly never thought",
      "No improvement required"
    ],
    "correct_option_id": 0,
    "solution": "<p>Adverbs <b><i>nothing, rarely, hardly, scarcely, neither, barely, seldom, without, </i></b>are negative in meaning. So ideally, we should not use another negative word with them.</p><p>The correct sentence is- 'She has hardly thought about her future plans.'</p><p>Hence, option (a) is correct.</p>",
    "question_index": 18
  },
  {
    "question": "<p>Which of the following is a grammatically correct sentence?</p>",
    "options": [
      "The students waited for the results eagerly.",
      "Eagerly, the students waited for the results.",
      "The students eagerly waited for the results.",
      "The students waited for the eagerly results."
    ],
    "correct_option_id": 2,
    "solution": "<p>Adverb is always placed adjacent or as near as possible to the word it modifies.</p><p>The grammatically correct sentence is- The students eagerly waited for the results.</p><p>Hence, option (c) is correct.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
