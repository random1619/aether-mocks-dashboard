<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">15 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">

            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the italicised group of words.</p><p>The doctor prescribed <i>a medicine that induces sleep</i> to help the patient overcome his insomnia.</p>",
    "options": [
      "Soporific",
      "Veteran",
      "Verbose",
      "Hutch"
    ],
    "correct_option_id": 0,
    "solution": "<p>'Soporific' is the appropriate one-word substitute for the underlined group of words. A 'soporific' is a substance that induces sleep or has a sleep-inducing effect. 'Veteran' refers to a person who has a lot of experience in a particular field, especially military service. 'Verbose' means containing more words than necessary. 'Hutch' refers to a cage for small animals, like rabbits or guinea pigs. Hence, (a) is the correct answer. </p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the bracketed group of words.</p><p>He was offered (a job with a high salary but little responsibility), which seemed appealing at first but left him feeling unfulfilled in the long run.</p>",
    "options": [
      "Hive",
      "Plebiscite",
      "Sinecure",
      "Mint"
    ],
    "correct_option_id": 2,
    "solution": "<p>The appropriate one-word substitute for the underlined group of words is 'sinecure'. A 'sinecure' refers to a position or job that provides a salary or other benefits but requires little or no work. 'Hive' refers to a place where bees live and store honey. 'Plebiscite' is a direct vote by which the people of a region or country express their opinion on an important public question. 'Mint' refers to a place where coins are produced. Hence, (c) is the correct answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p><b> </b>Select the option that can be used as a one-word substitute for the underlined group of words. </p><p>She sat by the window, lost in a <u>feeling of deep sadness or sorrow</u>.</p>",
    "options": [
      "Jubilant",
      "Melancholy",
      "Enigma",
      "Quintessential"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Melancholy' means a feeling of deep sadness or sorrow. Hence, (b) is the correct answer. </p><p>'Jubilant' means feeling or expressing great joy or triumph.</p><p>'Enigma' means something that is mysterious, puzzling, or difficult to understand.</p><p>'Quintessential' means the most typical or perfect example of something.</p>",
    "question_index": 2
  },
  {

    "correct_option_id": 3,
    "solution": "<p>'Lunatic' means 'a person whose actions and manner are marked by extreme eccentricity or recklessness '.</p><p>Hence, option (d) is the answer. </p><p>'Insolvent' means 'unable to pay debts owed'.</p><p>'Narcissist' means 'a person who has an excessive interest in or admiration of themselves'. </p><p>'Polyglot' means 'knowing or using several languages'. </p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the underlined group of words.</p><p>The final result has shown that the worker has <u>done the job without skill</u>.</p>",
    "options": [
      "Clumsy",
      "Immature",
      "Flamboyant",
      "Juvenile"
    ],
    "correct_option_id": 0,
    "solution": "<p>Clumsy- done awkwardly or without skill.</p><p>Immature- not fully developed.</p><p>Flamboyant- to attract attention because of their exuberance, confidence, and stylishness.</p><p>Juvenile- for or relating to young people.</p><p>Among the given options, the word that can be used as a one-word substitute for the underlined phrase is option (a), 'clumsy'.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>A person who sacrifices his life for a cause</p>",
    "options": [
      "ARBITRATOR",
      "CONTEMPORARY",
      "MARTYR",
      "ACROPHOBIA"
    ],
    "correct_option_id": 2,
    "solution": "'MARTYR' means 'A person who sacrifices his life for a cause.'. 'ACROPHOBIA' means 'Extreme or irrational fear of heights.'. 'ARBITRATOR' means 'An independent person or body officially appointed to settle a dispute.'. 'CONTEMPORARY' means 'A person or thing living or existing at the same time as another.'. According to the meanings mentioned above, option c) is the correct answer.",
    "question_index": 5
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>A long, narrow box, typically of wood, in which a dead body is buried or cremated.</p>",
    "options": [
      "Tombstone",
      "Coffin",
      "Cemetery",
      "Burrow"

    "correct_option_id": 1,
    "solution": "<p>Tombstone- A large, flat inscribed stone standing or laid over a grave. </p><p>Coffin- A long, narrow box, typically of wood, in which a dead body is buried or cremated.</p><p>Cemetery- A large burial ground, especially one not in a churchyard.</p><p>Burrow- A hole or tunnel dug by a small animal, especially a rabbit, as a dwelling.</p><p>The option that matches the meaning of the given group of words is (b), 'coffin'.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of italicised words.</p><p>Sarah's <i>holding of her office</i> ends by next year.</p>",

      "Role",
      "Position",
      "Rule",
      "Tenure"
    ],

    "question_index": 7
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of italicised words.</p><p>The situation our country is facing now is <i>extremely serious</i>.</p>",

      "Empathetic",
      "Dire",
      "Stressful",
      "Accommodative"
    ],
    "correct_option_id": 1,
    "solution": "<p>Empathetic- showing an ability to understand and share the feelings of another.</p><p>Dire- extremely serious or urgent.</p><p>Stressful- causing mental or emotional stress.</p><p>Accommodative- willing to fit in with someone's wishes or needs</p><p>Among the given options, the word that matches the meaning of the italicised words in the sentence is option (b), 'dire'.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>To leave hurriedly and secretly</p>",
    "options": [
      "Abdicate",
      "Ameliorate",
      "Aggravate",
      "Abscond"

    "correct_option_id": 3,

    "question_index": 9
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>An exact imitation or copy of written text</p>",
    "options": [
      "itinerary",
      "epicure",
      "platitude",
      "facsimile"
    ],
    "correct_option_id": 3,
    "solution": "<p>Itinerary  -  a planned route or journey. Epicure  -  a person who takes pleasure in fine food or drink. Platitude  -  a remark that has been used too often to be meaningful. Facsimile  -  an exact copy of a written document.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>Taking credit for someone else's writings or ideas</p>",
    "options": [
      "Covertness",
      "Plagiarism",
      "Nuance",
      "Balk"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Covertness' is the quality of being hidden or unknown.</p><p>'Balk' means to hesitate or be unwilling to accept an idea or undertaking.</p><p>'Nuance' is a subtle, fine shade of meaning.</p><p>'Plagiarism' is the correct choice here, as it refers to taking credit for someone else's ideas.</p><p>Hence, option (b) is the right answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>The practice of writing dictionaries</p>",
    "options": [
      "Gerontology",
      "Numismatics",
      "Lexicography",
      "Philology"
    ],
    "correct_option_id": 2,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>WORD</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>MEANING</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Gerontology</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Study of various aspects of ageing</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Numismatics</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Study of collection of coins, tokens, paper money etc.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lexicography</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The practice of writing dictionaries</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Philology</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The study of languages</td></tr></table><p>So, 'lexicography' is the right word.</p><p>Hence, option (c) is correct. </p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>An organized course of action to achieve a goal.</p>",
    "options": [
      "Effort",
      "Focus",
      "Campaign",
      "Direction"
    ],
    "correct_option_id": 2,
    "solution": "<p>Effort- A vigorous or determined attempt.</p><p>Focus- The centre of interest or activity.</p><p>Campaign- An organized course of action to achieve a goal.</p><p>Direction- A course along which someone or something moves.</p><p>The option that matches the meaning of the given group of words is (c), 'campaign'.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>In a very difficult situation.</p>",
    "options": [
      "Dangerous",
      "Beleaguered",
      "Diligent",
      "Bewildered"
    ],
    "correct_option_id": 1,
    "solution": "<p>Dangerous- Able or likely to cause harm or injury.</p><p>Beleaguered- In a very difficult situation.</p><p>Diligent- Having or showing care and conscientiousness in one's work or duties.</p><p>Bewildered- Perplexed and confused; very puzzled.</p><p>The option that matches the meaning of the given group of words is (b), 'beleaguered'.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the given group of words.</p><p>An automatic machine or container which is designed to release a specific amount of something.</p>",
    "options": [
      "Dispenser",
      "Counter",
      "Store",
      "Grocery"
    ],
    "correct_option_id": 0,
    "solution": "<p>Dispenser- An automatic machine or container which is designed to release a specific amount of something.</p><p>Counter- A long, flat, narrow surface or table in a shop, bank, restaurant, etc. at which people are served.</p><p>Store- A shop of any size or kind.</p><p>Grocery- Items of food sold in a grocery or supermarket.</p><p>Among the given options, the word that matches the meaning of the given phrase is option (a), 'dispenser'.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the bracketed group of words.</p><p>He is a (person who talks too much).</p>",
    "options": [
      "Taciturn",
      "Garrulous",

      "Laconic"

    "correct_option_id": 1,
    "solution": "<p>Let's look at the meanings of the given words. </p><p>Taciturn: (of a person) reserved or uncommunicative in speech; saying little. </p><p>Garrulous: excessively talkative, especially on trivial matters. </p><p>Generous: showing a readiness to give more of something, especially money, than is strictly necessary or expected. </p><p>Laconic: (of a person, speech, or style of writing) using very few words.</p><p>Among the given options, 'garrulous' is the correct choice. </p><p>Hence, option (b) is the correct answer. </p>",
    "question_index": 16
  },
  {
    "question": "<p><b> </b>Select the option that can be used as a one-word substitute for the given group of words.</p><p>Willing to give in to the wishes of another. </p>",
    "options": [
      "Amiable",
      "Amenable",
      "Amorphous",
      "Analogy"
    ],
    "correct_option_id": 1,
    "solution": "<p>'Amenable' means willing to give in to the wishes of another. Hence, (b) is the correct answer. </p><p>'Amiable' means having or displaying a friendly and pleasant manner. </p><p>'Amorphous' means without a clearly defined shape or form. </p><p>'Analogy' means a comparison between two things, typically for the purpose of explanation or clarification. </p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the option that can be used as a one-word substitute for the italicised group of words.</p><p>She thinks that she has <i>the quality of being religious</i> and is qualified enough to preach it to others.</p>",
    "options": [
      "Piety",
      "Priesthood",
      "Morality",
      "Abhorrence"
    ],
    "correct_option_id": 0,
    "solution": "<p>Piety- the quality of being religious or reverent.</p><p>Priesthood- the office or position of a priest.</p><p>Morality- principles concerning the distinction between right and wrong or good and bad behaviour.</p><p>Abhorrence- a feeling of revulsion; disgusted loathing.</p><p>Among the given options, the word that can be used as a one-word substitute for the underlined phrase is option (a), 'piety'.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 18

  {
    "question": "<p>Select the option that can be used as a one-word substitute for the underlined group of words.</p><p>After the war, all the prisoners will be kept in <u>the strong underground prison cell, in the castle</u>.</p>",
    "options": [

    "correct_option_id": 2,

    "question_index": 19

];
    </script>
