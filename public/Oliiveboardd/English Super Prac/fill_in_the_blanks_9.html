<body>

            <div class="welcome-actions">

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate word to fill in the blank</p><p>Learn more and you'll generate ideas and enthusiasm for ____ other changes.</p>",
    "options": [
      "Create",
      "Produce",
      "Making",
      "Affect"
    ],
    "correct_option_id": 2,
    "solution": "<p>A gerund (-ing form of verb that acts as a noun) is always used when a verb comes after a preposition. Only option C has a gerund. All other options have base forms of verbs. Option C is the correct answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The factory supplies electrical components ____ cars. </p>",
    "options": [
      "for",
      "Upon",
      "Above",
      "Among"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate option to fill in the blank is 'for'. The preposition \"for\" is used to indicate the purpose or intended recipient of something. In the sentence \"The factory supplies electrical components for cars,\" the word \"for\" indicates that the electrical components are provided with the specific purpose of being used in cars. This preposition shows the relationship between the action (\"supplies\") and its purpose (\"cars\"). Other prepositions are not correct for the given context. \"Above\" generally indicates a higher position or level in space. \"Among\" is used to indicate being part of a group or surrounded by something. \"Upon\" typically denotes a spatial or temporal relationship, meaning \"on\" or \"at the time of.\" Hence, (a) is the correct answer. </p><p>The complete sentence is: The factory supplies electrical components for cars.</p><p><b>NOTE:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b>being late.</p><p>II. We're going <b>to </b>a party.</p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object. </p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blanks.</p><p>_____ burglars have been arrested but ____ jewellery is still missing.</p>",
    "options": [
      "The, a",
      "A, the",
      "The, the",
      "A, an"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate option to fill in the blanks is (c). The definite article \"the\" is used before \"burglars\" to indicate that specific burglars have been arrested. The sentence refers to particular burglars known to both the speaker and the listener. Using \"a\" before 'burglars' is not right. It would mean that some random burglars have been arrested. Moreover, the indefinite articles 'a' and 'an' are used to modify singular nouns (not plural). The definite article \"The\" is also used before \"jewellery\" to specify a particular set of jewellery that is still missing. The use of 'a' before 'jewellery' would imply any piece of jewellery rather than a specific set of jewellery. The article 'an' can also not be used with 'jewellery' because this article is used before words that begin with a vowel sound. Hence, (c) is the correct answer. </p><p><b>NOTE:</b></p><p>A <b>noun</b> is a word used as the name of a person, place, or thing. Now consider the following sentences:</p><p>1) <b> Mahesh</b> is a clever boy.</p><p>2) A <b>herd</b> of cattle was grazing on the pastureland.</p><p>3) <b>Honesty</b> is the best policy.</p><p>An <b>article </b>is a word that comes before a noun to indicate whether it's specific or general.</p><p><b>Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>There are too many spelling mistakes _____ this essay.</p>",
    "options": [
      "In",
      "On",
      "At",
      "Above"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate option to fill in the blank is 'in'. The preposition 'in' is used to indicate inclusion or containment within something. In the sentence, \"There are too many spelling mistakes in this essay,\" 'in' accurately describes the location of the spelling mistakes, highlighting that they are contained within the essay. Other prepositions are not correct for the given context. The preposition 'on' is often used to indicate a surface or position in contact with a surface. The preposition 'at' is generally used to indicate a specific location or position. The preposition 'above' typically denotes a higher position in space or relative to something else. Hence, (a) is the correct answer. </p><p><b>NOTE: </b></p><p>\"<b>A preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for</b> being late.</p><p>II. We're going <b>to </b>a party. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.\"</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The worst tragedy for a poet is to be admired _____ being misunderstood.</p>",
    "options": [
      "between",
      "into",
      "through",
      "for"
    ],
    "correct_option_id": 2,
    "solution": "<p>Such a preposition is to be used that can tell misunderstanding is the reason behind the worst tragedy for a poet. So, 'through' is the correct choice because here 'through' is used to express by means of (an intermediary or agent). 'Between' is used to express at, into, or across the space separating (two objects or regions). 'Into' is used to express movement or action with the result that someone or something becomes enclosed or surrounded by something else. 'For' is used to express the purpose.</p><p>Hence, option (c) is correct.</p><p><b>Note:</b></p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>1) The teacher scolded the child <b>for </b><u>being</u> late.</p><p>2) We're going <b>to</b> a <u>party</u>. </p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Sarah: \"When did you finish reading the book?\"</p><p>Arman: \"I __________ it last weekend.\"</p>",
    "options": [
      "Am finishing",
      "Finish",
      "Finished",
      "Will Finish"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate option to fill in the blank is 'finished'. In the given context, Arman is responding to Sarah's question about when he completed reading the book. Arman uses the past tense form 'finished' to indicate that the action of reading the book occurred in the past, specifically last weekend. This also aligns with the past-tense nature of the question asked by Sarah. Other options are in either present or future tense. Hence, (c) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate word to fill in the blank.</p><p>Asish realized that if he worked __________, he could excel at his job.</p>",
    "options": [
      "hardly",
      "diligently",
      "earnest",
      "lousily"
    ],
    "correct_option_id": 1,
    "solution": "<p>Among the given options, \"diligently\" fits the context of the sentence. It gives us the idea that Asish knew that if he worked <b>zealously</b>, he could be successful at his job.</p><p><b>Diligently</b>: having or showing care and conscientiousness in one's work or duties; zealously.</p><p>The word that must fit the blank should be an <b>adverb</b> as it is modifying 'worked' (verb). 'Earnest' is an <b>adjective</b> and thus, it is an incorrect option.</p><p>'Hardly' and 'lousily' are contextual misfits because Ashish wanted to excel at his job and working zealously is a possible way of achieving that.</p><p>Thus, the correct option is <b>(b), diligently</b>.</p><p>Thus, the correct sentence should be: Asish realized that if he worked <u>diligently</u>, he could excel at his job.</p><p>Additional Information:</p><p>The respective meanings of the other options are given below in the table:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Word</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Meaning</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Hardly</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">scarcely</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Earnest</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">resulting from or showing sincere and intense conviction</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Lousily</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">poorly</td></tr></table>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option for the given blank.</p><p>She practised diligently ______ hours to prepare for the challenging piano recital next week.</p>",
    "options": [
      "For",
      "By",
      "Between",
      "Under"
    ],
    "correct_option_id": 0,
    "solution": "<p>For: This preposition is correct in this context. It indicates the purpose or reason for which she practised diligently. Hence, option (a) is the answer. </p><p>By: This preposition is not suitable in this context. \"By\" typically indicates a deadline or a point in time, and it does not convey the intended meaning of practising for a purpose.</p><p>Between: This preposition is not appropriate here. \"Between\" is used to express a relationship in terms of time or space involving two or more points. It doesn't convey the idea of practising for a specific purpose.</p><p>Under: This preposition is not suitable in this context. \"Under\" is often used to indicate control, supervision, or influence, and it doesn't convey the intended meaning of practising for a purpose.</p><p>The correct sentence is: She practised diligently for hours to prepare for the challenging piano recital next week.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The preamble ____ that India is a secular country. </p>",
    "options": [
      "States",
      "State",
      "State-of-the-art",
      "Stateless"
    ],
    "correct_option_id": 0,
    "solution": "<p>The blank requires a verb that follows the subject \"The preamble\" which is singular. Therefore, it must be a singular verb. The only singular verb in the given options is option a). Since option b) includes a plural verb, it can be eliminated. Options c) and d) are adjectives. They can also be eliminated as the blank requires a verb to tell what it does with respect to India.</p><p>'States' and 'State' are nouns as well.</p><p>In the given sentence, 'states' (as a verb) means 'to say or write something, especially formally'.</p><p>Therefore, the correct answer is option a).</p><p><b>Note:</b></p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blanks and make the sentence meaningful.</p><p>She picked ____ beautiful ____ from the garden.</p>",
    "options": [
      "Two; flowers",
      "To; flours",
      "To; flowers",
      "Two; flours"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate option to fill in the blanks is (a). In the given context, the word \"two\" indicates the number of flowers she picked, and \"flowers\" refers to the type of items she picked from the garden. Other options do not fit contextually. \"To\" is a preposition and does not make the sentence meaningful, and \"flours\" refers to the powdery substance used in cooking, which is not appropriate in the context of picking from a garden.</p><p>Hence, (a) is the correct answer.</p><p>Note:</p><p>A <b>Preposition</b> is a word placed before a noun or a pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition) and shows a relationship in space or time or a logical relationship between two or more people, places, or things in a sentence.</p><p><b>Examples</b></p><p>I. The teacher scolded the child <b>for </b><u>being</u> late.</p><p>II. We're going <b>to</b> a <u>party</u>.</p><p>&#183; The words in bold are called prepositions because they normally take position before (pre) a noun/pronoun or a noun equivalent (pronoun, adverb, gerund, infinitive, adverbial clause, or any clause that can be used as the object of the preposition.</p><p>&#183; The noun/pronoun which is used with a preposition is called its Object.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank. </p><p>I managed to ____ a quiet cafe to enjoy a moment of solitude.</p>",
    "options": [
      "Found",
      "Finds",
      "Finding",
      "Find"
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct option to fill in the blank is (d) \"find.\" In the sentence \"I managed to find a quiet cafe to enjoy a moment of solitude,\" the phrase \"to find\" functions as an infinitive. An infinitive is the base form of a verb preceded by the word \"to.\" It is commonly used after certain verbs, such as \"manage,\" to express purpose, intention, or the completion of an action.</p><p>In this context, \"to find\" indicates the purpose or goal of the action - finding a quiet cafe for a moment of solitude. The use of the base form \"find\" after \"to\" in the infinitive structure is appropriate for expressing the intended outcome of the speaker's effort to manage a moment of solitude. 'Find' aligns with the use of the infinitive structure in English grammar, conveying the purpose or goal associated with the action of managing a moment of solitude. Hence, (d) is the correct answer. </p><p>The final sentence: I managed to find a quiet caf&#233; to enjoy a moment of solitude. </p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Supriya found ____ interesting book at the bookstore.</p>",
    "options": [
      "An",
      "A",
      "No word required",
      "The"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate option to fill in the blank is (a). The indefinite article \"an\" is used before words that begin with a vowel sound. In this sentence, the word \"interesting\" starts with a vowel sound. So, \"an\" is a suitable word to use. The indefinite article \"a\" is used before words that begin with a consonant sound. The definite article \"the\" is used to specify a particular or previously mentioned noun. In this sentence, there is no prior mention or specific context to warrant the use of \"the\" before \"interesting book.\" The sentence is more about a general discovery of an interesting book. It does not refer to a specific book known to both the speaker and the listener. Hence, (a) is the correct answer. </p><p><b>NOTE:</b></p><p>A <b>noun</b> is a word used as the name of a person, place, or thing. Now consider the following sentences:</p><p>1)<b> Mahesh</b> is a clever boy.</p><p>2) A <b>herd</b> of cattle was grazing on the pastureland.</p><p>3) <b>Honesty</b> is the best policy.</p><p>An <b>article </b>is a word that comes before a noun to indicate whether it's specific or general.</p><p><b>Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blanks.</p><p>____ woman in ____ picture is my mother.</p>",
    "options": [
      "The, the",
      "The, a",
      "A, the",
      "An, the"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate option to fill in the blanks is (a). The article \"the\" is used before \"woman\" to refer to a specific woman, indicating that the speaker is talking about a particular woman known to the speaker. Using 'a' before 'woman' suggests any woman rather than a specific one, which doesn't align with the context that refers to a particular woman (speaker's mother) known to the speaker. 'An' is the indefinite article used before words that begin with a vowel sound. However, \"woman\" starts with a consonant sound. So, \"an\" is not appropriate here.</p><p>The article \"the\" is also used before \"picture\" because it is a specific picture known to both the speaker and the listener. The speaker is talking about a specific picture of his/her mother. Using \"a\" before 'picture' suggests any picture rather than a specific one. So, \"a\" is not suitable in this case. Hence, (a) is the correct answer. </p><p><b>NOTE:</b></p><p>A <b>noun</b> is a word used as the name of a person, place, or thing. Now consider the following sentences:</p><p>1) <b> Mahesh</b> is a clever boy.</p><p>2) A <b>herd</b> of cattle was grazing on the pastureland.</p><p>3) <b>Honesty</b> is the best policy.</p><p>An <b>article </b>is a word that comes before a noun to indicate whether it's specific or general.</p><p><b>Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank. </p><p>Tomorrow, I ____ to finish my presentation before the meeting starts.</p>",
    "options": [
      "Needs",
      "Needing",
      "Need",
      "Needed"
    ],
    "correct_option_id": 2,
    "solution": "<p>The given sentence expresses a general present requirement. In this context, the base form of the verb \"to need\" is used.</p><p>Option (a) \"Needs\": This is incorrect because \"needs\" is the third person singular form of the verb \"to need.\" In this sentence, the subject is not third-person singular; it is a first-person singular \"I.\" The correct form for the first-person singular is \"need.\"</p><p>Option (b) \"Needing\": This is incorrect because \"needing\" is a gerund (the -ing form of the verb) and is not suitable for expressing a present need in this context.</p><p>Option (c) \"Need\": <b>This is the correct answer.</b> The sentence should be: \"Tomorrow, I need to finish my presentation before the meeting starts.\" The base form \"need\" is used to express the present requirement or necessity.</p><p>Option (d) \"Needed\": This is incorrect because \"needed\" is the past tense of \"to need,\" and it doesn't convey the present need as required by the sentence.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The _________ was hesitant to mingle with the older fishes in the aquarium.</p>",
    "options": [
      "new parrot",
      "new monkey",
      "new cat",
      "new fish"

    "solution": "<p>The correct option to fill in the blank is 'the'. The definite article \"the\" is used before specific nouns that are known to both the speaker and the listener. In this case, \"the Louvre Museum in Paris\" refers to a specific and well-known cultural institution, making \"the\" the appropriate choice. Indefinite articles ('a' and 'an') are used when referring to non-specific or generic items. In the given sentence, the speaker is specifically talking about their visit to the Louvre Museum in Paris, which is a unique and well-known museum. Choosing \"a\" or \"an\" in this context would imply that there are multiple Louvre Museums, and the speaker happened to visit one of them, but that's not the case. The Louvre Museum in Paris is a singular and distinctive institution. So, the definite article \"the\" is more appropriate to indicate the specific and well-known nature of the museum. Hence, (b) is the correct answer.</p><p>The complete sentence is: We enjoyed our visit to the Louvre Museum in Paris.</p><p><b>NOTE:</b></p><p><b>Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",

    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>We can't underestimate the importance of teamwork, _______?</p>",
    "options": [

      "Can we",
      "Can't we",
      "Haven't we"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct option to fill in the blank is 'can we'. In question tags, when the main clause is negative, the question tag should be positive, and vice versa. In the given sentence, the main clause is negative, indicating that the question tag should be positive. Also, if there is a modal verb (could, can, should, etc.) in the main sentence/clause, the question tag is also constructed with the same modal verb. In the given sentence, the modal verb 'can' is used. Accordingly, option (b) is correct as it uses the correct modal verb 'can' and also maintains the opposite polarity (negative main sentence, positive question tag). </p><p>Option (a) is not correct as it uses the wrong modal verb 'should' instead of 'can'. </p><p>Options (c) and (d) are not correct because they do not adhere to the grammatical rule that a negative main clause should have a positive question tag. </p><p>Hence, (b) is the correct answer. </p><p><b>NOTE:</b></p><p><b>Auxiliary verb: </b>A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. Auxiliary verbs help to form the various tenses, moods, and voices of other verbs. The principal ones are be, do, and have. Example: She will sing a song tomorrow. Here, 'will' is the auxiliary verb that supports the main verb 'sing'.</p><p><b>Modal verb</b>: A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p>",
