<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Parts of the following sentence have been given as options. Select the option that contains a grammatical error.</p><p>The wedding gown / looked decently / despite being / studded with jewels.</p>",
    "options": [
      "The wedding gown",
      "despite being",
      "looked decently",
      "studded with jewels."
    ],
    "correct_option_id": 2,
    "solution": "<p>When verbs of perception including look, taste, smell, feel and sound are used to express sensation or appearance, they are followed by adjectives, not adverbs. This means that 'looked' should be followed by 'decent' and not 'decently'.</p><p>The correct sentence is: The wedding gown looked <b>decent</b> despite being studded with jewels.</p><p>So, the part in option (c) has an error.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>The prisoner was / accused for stealing / from his landlord.</p>",
    "options": [
      "accused for stealing",
      "The prisoner was",
      "from his landlord",
      "No error"
    ],
    "correct_option_id": 0,
    "solution": "<p>The verb 'accused' is followed by 'of' and not 'for'. So, the part in option (a) has an error. </p><p>The correct sentence is: The prisoner was accused <b>of </b>stealing from his landlord.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The boy, as well as / his friends, were / absent from the class / when the teacher came.</p>",
    "options": [
      "absent from the class",
      "when the teacher came",
      "his friends, were",
      "The boy, as well as"
    ],
    "correct_option_id": 2,
    "solution": "<p>When words like<b> <i>along with, together with, as well as, accompanied by</i> etc. </b>are used to combine two subjects, the <b><i>verb agrees with the subject mentioned first</i></b>.</p><p>So, the verb 'were' (plural) does not agree with the first subject 'the boy' (singular). It should be replaced with the singular verb 'was'.</p><p>So, there is an error in part in option (c).</p><p>The correct sentence is: The boy, as well as his friends, <b>was</b> absent from the class when the teacher came.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Parts of the following sentence have been given as options. Select the option that contains a grammatical error.</p><p>He describes the place vivid / that inspired in us / a wish to visit / the same.</p>",
    "options": [
      "He describes the place vivid",
      "the same",
      "a wish to visit",
      "that inspired in us"
    ],
    "correct_option_id": 0,
    "solution": "<p>The verb 'describes' requires an adverb to modify it, whereas 'vivid' is an adjective. Replacing 'vivid' with 'vividly' gives the meaning that 'he' described the place in such a clear manner which evoked strong wish in the speaker's heart to visit the same place.</p><p>The correct sentence is: He describes the place <b>vividly</b> that inspired in us a wish to visit the same.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>My mother said / that Ben will done / the assignment / today.</p>",
    "options": [
      "today",
      "My mother said",
      "that Ben will done",
      "the assignment"
    ],
    "correct_option_id": 2,
    "solution": "<p>The segment that contains a grammatical error is 'that Ben will done'. In the given context, the verb \"done\" is not appropriate. It should be replaced with 'do'. 'Do' is the correct base form of the verb (V1), which should be used after the auxiliary verb 'will' to indicate an action that will take place in the future.</p><p>The correct sentence would be: 'My mother said that Ben will do the assignment today'.</p><p>Hence, (c) is the correct answer.</p><p><b>Note:</b></p><p>Auxiliary verbs are those verbs that are used along with a main verb to express tense, mood, or voice. For example, in the sentence, 'It is raining', the word 'is' functions as an auxiliary verb to indicate that the action of the main verb (\"raining\") is ongoing.</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
    "question_index": 4
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>Mr. Ram Kumar, the cashier are / on temporary withdrawal / from service.</p>",
    "options": [
      "on temporary withdrawal",
      "Mr. Ram Kumar, the cashier are",
      "from service",
      "no error"
    ],
    "correct_option_id": 1,
    "solution": "<p>The part that contains the error is 'Mr. Ram Kumar, the cashier are'. The word 'are' is incorrect here as it does not agree with the singular subject 'Mr. Ram Kumar, the cashier'. The correct verb to use with a singular subject is 'is'. So, the correct sentence should be: 'Mr. Ram Kumar, the cashier, is on temporary withdrawal from service'.</p><p>Hence, (b) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>I am sure that / the postman would be / coming shortly / to deliver the letter.</p>",
    "options": [
      "I am sure that",
      "coming shortly",
      "to deliver the letter",
      "the postman would be"
    ],
    "correct_option_id": 3,
    "solution": "<p>The segment that contains a grammatical error is 'the postman would be'. The error lies in the usage of the word \"would\". \"Will\" implies certainty, while \"would\" implies a possibility. Since the sentence is expressing future certainty (\"I am sure that...\"), it should use the future tense \"will be\" instead of the conditional \"would be\". Hence, (d) is the correct answer.</p><p><b>The correct sentence is:</b> I am sure that the postman will be coming shortly to deliver the letter.</p>",
    "question_index": 6
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Maruti likes / adventure / stories, especially / an adventures of Tarzan.</p>",
    "options": [
      "stories, especially",
      "an adventures of Tarzan",
      "Maruti likes",
      "adventure"
    ],
    "correct_option_id": 1,
    "solution": "<p>The segment that contains a grammatical error is 'an adventures of Tarzan'. The error is the incorrect use of the article \"an\" before the word \"adventures.\" The word \"adventures\" is a plural noun, referring to multiple adventures of Tarzan. Indefinite articles \"a\" or \"an\" are typically used before singular nouns, not plural nouns. Therefore, using \"an\" before \"adventures\" is grammatically incorrect because \"an\" is typically used before singular nouns, whereas \"adventures\" is a plural noun. The definite article \"the\" can be used before the noun \"adventures\" to imply that Maruti likes adventure stories in general, but has a particular fondness for the specific adventures of Tarzan. Hence, (b) is the correct answer.</p><p><b>NOTE:</b></p><p><b>Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",
    "question_index": 7
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>He lived close to/the train station,/yet travelled by bus.</p>",
    "options": [
      "yet travelled by bus",
      "No error",
      "He lived close to",
      "the train station"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given sentence is both contextually and grammatically correct.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 8
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>My father give up/smoking when/I was twelve / years old.</p>",
    "options": [
      "My father give up",
      "smoking when",
      "I was twelve",
      "years old"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is in the part mentioned in option (a).</p><p>'Father' is a singular noun which cannot be followed by the plural verb 'gives'. Also, 'when I was twelve years old' implies that the father stopped smoking in the past.</p><p>So, 'give' should be replaced with the past tense form of the verb, i.e., 'gave'.</p><p>The correct sentence is: My father <b>gave </b>up smoking when I was twelve years old.</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 9
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The postman / delivers the letters / through hand, / door to door.</p>",
    "options": [
      "door to door",
      "delivers the letters",
      "The postman",
      "through hand"
    ],
    "correct_option_id": 3,
    "solution": "<p>Through - moving in one side and out of the other side of (an opening, channel, or location).</p><p>As per the meaning, delivering letters through hand does not give a meaningful sentence. </p><p>We use 'by + noun' to describe how someone travels or communicates, or how things are processed. </p><p>So, in the given sentence, 'through' should be replaced with 'by' to rectify the error. </p><p>The correct sentence is: The postman delivers the letters by hand, door to door.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>She watched / the thief who / steal the purse / in the bus.</p>",
    "options": [
      "the thief who",
      "in the bus",
      "steal the purse",
      "She watched"
    ],
    "correct_option_id": 2,
    "solution": "<p>There is an error in the part in option (c). The verb that follows the relative pronoun 'who' should agree with its antecedent, i.e., 'thief' (singular noun). So, the plural verb 'steal' is incorrect. Also, the given sentence is in past tense</p><p>So, the part can be corrected by replacing 'steal' with 'stole'. </p><p>The correct sentence is: She watched the thief who stole the purse in the bus.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Everybody stared / when me / entered the / drawing room.</p>",
    "options": [
      "when me",
      "Everybody stared",
      "drawing room",
      "entered the"
    ],
    "correct_option_id": 0,
    "solution": "<p>The verb 'entered' requires a noun or a pronoun (in subjective case) as its subject. </p><p>'Me' is a pronoun in the objective case, which is incorrectly used in this sentence in place of the subjective pronoun 'I'. </p><p>So, 'me' should be replaced with 'I' to rectify the error. </p><p>The correct sentence is: Everybody stared when I entered the drawing room. </p><p>Hence, option (a) is the answer. </p><p>Note: <b>Subjective Pronouns:</b> The pronouns I, you, we, he, she, it, and they are known as subjective pronouns because they act as the subjects of verbs: We went to the party.</p><p><b>Objective Pronouns:</b> The pronouns me, you, us, him, her, it, and them are called objective pronouns because they act as the objects of verbs and prepositions: Anjali drove us home.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Parts of the following sentence have been given as options. Select the option that contains an error.</p><p>This is the book whom I wanted to buy.</p>",
    "options": [
      "This is",
      "the book",
      "whom I",
      "wanted to buy"
    ],
    "correct_option_id": 2,
    "solution": "<p>The relative pronoun 'whom' is used for humans. To refer to the noun 'book', we require the relative pronoun 'that'.</p><p>The correct sentence is: This is the book that I wanted to buy.</p><p>Hence, option (c) is the answer.</p><p><b>Note: </b><b>Relative pronouns: </b>A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies, or describes, the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p>",
    "question_index": 13
  },
  {
    "question": "<p>The following sentence has been divided into four parts. One of them contains an error. Select the part that contains the error from the given options.</p><p>They were (A)/ married happily (B)/ before she (C)/ quit her job (D).</p>",
    "options": [
      "D",
      "A",
      "B",
      "C"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence implies that they are already married and were happy before she quit her job. 'Married happily' does not imply the state of their marriage. 'Happily married' fits better in the sentence contextually and grammatically. </p><p>The correct sentence is: They were happily married before she quit her job. </p><p>Hence, option (c) is the answer.</p>",
    "question_index": 14
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>They want to live in first floor of this building.</p>",
    "options": [
      "of this building",
      "live in first floor",
      "No error",
      "They want to"
    ],
    "correct_option_id": 1,
    "solution": "<p>'In' is used to denote an enclosed space or large area. Example: I live in India. </p><p>'On' is used to denote the surface, floor. Example: We live on the second floor of the building. </p><p>So, 'on the floor' is the correct usage in place of 'in the floor'. </p><p>Also, the ordinal 'first' is always preceded by 'the'. </p><p>So, the correct sentence is: They want to live on the first floor of this building.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Parts of the following sentence have been given as options. Select the option that contains an error.</p><p>It takes me an hour to get to work at the moment, but when the new road is finished it be much quicker.</p>",
    "options": [
      "It takes me an hour to get to work",
      "but when the new road is finished",
      "at the moment",
      "it be much quicker"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence is grammatically correct except for the part in option 4, \"it be much quicker.\" The verb \"be\" is incorrect here; it should be \"will be\" to indicate future tense, as the clause refers to a future event (\"when the new road is finished\"). Other options are grammatically correct parts of the sentence.</p><p><b>The correct sentence should read: \"It takes me an hour to get to work at the moment, but when the new road is finished, it will be much quicker.\"</b></p>",
    "question_index": 16
  },
  {
    "question": "<p>The given sentence is divided into four segments. Identify the segment that contains a grammatical error.</p><p>When I returned to the office, / no work was left / as my friend Rahul / has done everything.</p>",
    "options": [
      "When I returned to the office,",
      "has done everything",
      "no work was left",
      "as my friend Rahul"
    ],
    "correct_option_id": 1,
    "solution": "<p>The segment \"has done everything\" is incorrect because the sentence is in past tense (\"returned,\" \"was left\"). It should be \"had done everything\" (past perfect tense), instead of \"has done\" (present perfect tense).</p><p>The correct sentence: When I returned to the office, no work was left as my friend Rahul had done everything.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 17
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>I, you and she / have been working happily / in the same company and in the same branch / for the last nine years.</p>",
    "options": [
      "I, you and she",
      "for the last nine years",
      "have been working happily",
      "in the same company and in the same branch"
    ],
    "correct_option_id": 0,
    "solution": "<p>The part \"I, you and she\" has error in the pronoun order. The correct order for subjects is \"you, she, and I\" when it comes to second, third and first-person pronouns.</p><p>The correct sentence: You, she and I have been working happily in the same company and in the same branch for the last nine years.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 18
  },
  {
    "question": "<p>Parts of the following sentence have been given as options. Select the option that contains an error.</p><p>The speaker's emphasiss is on the present-day problems that are being faced by ordinary men of India.</p>",
    "options": [
      "The speaker's emphasiss is",
      "that are being faced",
      "on the present-day problems",
      "by ordinary men of India"
    ],
    "correct_option_id": 0,
    "solution": "<p>The word 'emohasiss' is the incorrect spelling. </p><p>The correct word is 'emphasis'. It means 'special importance, value, or prominence given to something'. Hence, option (a) is the answer.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
