<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="20">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Oliveboard Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate adverb to fill in the blank.</p><p>___, I'm going to walk my dog.</p>",
    "options": [
      "Now",
      "Already",
      "Annually",
      "Rarely"
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence requires an adverb that indicates the timing of the action \"walk my dog.\" \"Now\" is an adverb of time meaning at the present moment, which fits perfectly: \"I'm going to walk my dog.\" It indicates immediate action.</p><p>The complete sentence: Now, I'm going to walk my dog.</p><p>(b) Already: \"Already\" indicates something has happened before the present moment (e.g., \"I've already walked my dog\"). It doesn't suit a future intention (\"going to\").</p><p>(c) Annually: \"Annually\" means once a year, which is inappropriate for a routine action like walking a dog, implying an unrealistic frequency.</p><p>(d) Rarely: \"Rarely\" indicates infrequency, which contradicts the context of planning to walk the dog immediately.</p><p>Hence, the correct answer is option (1).</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate word to fill in the blank.</p><p>Savita was crying ______ as she felt that her world had fallen apart due to the accident.</p>",
    "options": [
      "Mildly",
      "Bitterly",
      "Definitely",
      "Hardly"
    ],
    "correct_option_id": 1,
    "solution": "<p>Mildly - in a mild or gentle manner/ not seriously</p><p>Bitterly - in a way that shows strong negative emotion such as anger or disappointment</p><p>Definitely - without doubt (used for emphasis).</p><p>Hardly - scarcely (used to qualify a statement by saying that it is true to an insignificant degree).</p><p>The sentence implies that Savita was crying because she felt as if her world had fallen apart. If someone's world or life falls apart, something very bad and serious happens which changes their life. Among the given options, only 'bitterly' fits the blank, contextually, the best. </p><p><b>The correct sentence is: </b>Savita was crying <b>bitterly</b> as she felt that her world had fallen apart due to the accident.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate adverb to fill in the blank.</p><p>He comes here ________.</p>",
    "options": [
      "quickly",
      "formerly",
      "daily",
      "lately"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence requires an adverb that describes the frequency or manner of the action \"comes here.\"</p><p>&bull; Option 1: \"Quickly\" describes the speed of the action, not the frequency, and is inappropriate here.</p><p>&bull; Option 2: \"Formerly\" means \"in the past\" and does not fit the context of regular occurrence.</p><p>&bull; Option 3: \"Daily\" is an adverb of frequency, indicating that he comes every day, which fits the context perfectly.</p><p>&bull; Option 4: \"Lately\" means \"recently\" and implies a change in behavior, which is not suggested by the sentence.</p><p>Thus, the correct option is 3) daily.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate adverb to fill in the blank.</p><p>Nitha can assemble the students of her class ______.</p>",
    "options": [
      "perfect",
      "distract",
      "slow",
      "quickly"
    ],
    "correct_option_id": 3,
    "solution": "<p>The blank requires an adverb to modify the action 'assemble the students'.</p><p>So, options (a) [adjective] and (b) [verb] are incorrect.</p><p>'Slow' as an adverb means 'at a slow pace; slowly'. But it does not fit in the blank as the sentence aims to denote the ability of Nitha. Anyone can assemble the students if given a lot of time. So, option (c) is incorrect.</p><p>The correct adverb to be used here is 'quickly'. It's Nitha's ability that she can quickly assemble the students of her class.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Fill in the blank with the correct collocation.</p><p>Of course, we agree with that measure, it is _______ sensible.</p>",
    "options": [
      "slightly",
      "hardly",
      "partially",
      "perfectly"
    ],
    "correct_option_id": 3,
    "solution": "<p>Adverbs frequently used with 'sensible' are: eminently, entirely, <b>perfectly</b>, quite, really, thoroughly, very, commercially, economically, environmentally, politically.</p><p>Hence, among the given options, only 'perfectly' fits in the blank.</p><p>The correct sentence is: Of course, we agree with that measure, it is <b>perfectly</b> sensible.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 4
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>He was enough tall / to be admitted / into the armed forces.</p>",
    "options": [
      "into the armed forces",
      "to be admitted",
      "No error",
      "He was enough tall"
    ],
    "correct_option_id": 3,
    "solution": "<p>The adverb 'enough' always follows the noun that is modifies. So, the position of 'enough' needs to be changed.</p><p>The correct sentence is: He was tall enough to be admitted into the armed forces.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>The helicopter of the enemies / hovered exact / over their bunker.</p>",
    "options": [
      "No error",
      "hovered exact",
      "The helicopter of the enemies",
      "over their bunker."
    ],
    "correct_option_id": 1,
    "solution": "<p>The verb 'hovered' requires an adverb after it to modify/qualify it, whereas 'exact' is an adjective/verb. It needs to be replaced with the adverb 'exactly'.</p><p>The correct sentence is: The helicopter of the enemies hovered exactly over their bunker.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution required'.</p><p>Suman performed <u>at the festival well yesterday</u>.</p>",
    "options": [
      "well at the festival yesterday",
      "at the festival yesterday well",
      "No substitution required",
      "yesterday at the festival well"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate option to substitute the underlined segment is 'well at the festival yesterday'. The error in the original sentence lies in the placement of the adverb \"well.\" 'Adverbs' typically come after the verb they modify. In the original sentence, \"well\" is not placed after the verb 'performed', which disrupts the typical word order. The adverb \"well\" should be placed after the verb \"performed.\" Option (a) rectifies the original error by placing the adverb \"well\" after the verb \"performed\". Other options do not rectify the original error. Hence, (a) is the correct answer. </p><p>The correct sentence is: Suman performed <u>well </u><u>at the festival yesterday</u>.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Parts of the following sentence have been given as options. Select the option that contains an error.</p><p>My neighbours were serious injured in the car accident.</p>",
    "options": [
      "My neighbours were",
      "the car accident",
      "serious injured",
      "in"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error lies in the phrase \"serious injured.\" The correct form is \"seriously injured,\" as \"seriously\" is an adverb modifying the adjective \"injured\" to describe the extent of the injury.</p><p>The correct sentence: My neighbours were seriously injured in the car accident.</p><p>Hence, the correct answer is option (c).</p>",
    "question_index": 8
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that has a grammatical error.</p><p>Soldiers in / the Indian Armed Forces are / trained never to / fight cowardly.</p>",
    "options": [
      "fight cowardly",
      "the Indian Armed Forces are",
      "trained never to",
      "Soldiers in"
    ],
    "correct_option_id": 0,
    "solution": "<p>The segment \"fight cowardly\" is incorrect because \"cowardly\" is an adjective, but an adverb is needed to modify the verb \"fight.\" The correct form is \"fight cowardly\" should be \"fight in a cowardly manner\" or \"act cowardly.\" </p><p>The corrected sentence is: \"Soldiers in the Indian Armed Forces are trained never to act cowardly.\"</p><p>Option b: the Indian Armed Forces are  -  Correct subject and verb.</p><p>Option c: trained never to  -  Correct infinitive structure.</p><p>Option d: Soldiers in  -  Correct prepositional phrase.</p><p>Hence, the correct answer is option (a).</p>",
    "question_index": 9
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an adverbial usage error.</p><p>Mr. Sukesh and / his family / ate the / food greedy. </p>",
    "options": [
      "his family",
      "food greedy.",
      "ate the",
      "Mr. Sukesh and"
    ],
    "correct_option_id": 1,
    "solution": "<p>In the sentence \"Mr. Sukesh and his family ate the food greedy,\" the word \"greedy\" is incorrectly used as an adverb. The correct adverb form should be \"greedily\" to describe how the action of eating was performed. The segment \"food greedy\" contains the error because \"greedy\" is an adjective, not an adverb, and does not properly modify the verb \"ate.\"</p>",
    "question_index": 10
  },
  {
    "question": "<p>Identify the segment that contains a grammatical error. If there is no error, select 'No error'.</p><p>Police could not catch / the gunman as he ran off / so very fastly into the woods.</p>",
    "options": [
      "the gunman as he ran off",
      "Police could not catch",
      "No error",
      "so very fastly into the woods."
    ],
    "correct_option_id": 3,
    "solution": "<p>The correct adverb form of 'fast' is 'fast' only. 'Fastly' should be replaced with 'fast'. </p><p>The correct sentence is: Police could not catch the gunman as he ran off so very fast into the woods.</p><p>Hence, option (d) is the answer. </p>",
    "question_index": 11
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>It can / get extreme cold / during / the winters.</p>",
    "options": [
      "the winters",
      "during",
      "It can",
      "get extreme cold"
    ],
    "correct_option_id": 3,
    "solution": "<p>The segment that contains a grammatical error is (d) 'get extreme cold'. The segment 'get extreme cold' contains a grammatical error because the adjective 'cold' is incorrectly modified by the adjective 'extreme', instead of an adverb. In the given context, the phrase 'get extremely cold' would be more grammatically correct and precise. Using the adverb 'extremely' rightly qualifies the adjective 'cold'. Hence, (d) is the correct answer.</p><p>Note:</p><p><b>Qualifiers: </b>A word or phrase that limits the meaning of another word or phrase or makes it less general. 'Adverbs' and 'adjectives' are qualifiers.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the appropriate adverb for the underlined word in the sentence.</p><p>He led me to the room that had <u>obvious</u> been built later than the rest of the house.</p>",
    "options": [
      "Obliviously",
      "Obliviousness",
      "Obviousness",
      "Obviously"
    ],
    "correct_option_id": 3,
    "solution": "<p>'Obvious' is an adjective. </p><p>'Obliviousness' is a noun which means 'the quality of not being aware of something, especially what is happening around you'. Hence, option (b) is incorrect. </p><p>'Obviousness' is a noun which means 'the fact that something is clear to almost anyone'. Hence, option (c) is incorrect. </p><p>The adverb is required to modify the verb phrase 'had been built'. So, the adverb will justify/modify the action of building the room. </p><p>'Obliviously' means 'in a way that shows that you are not aware of something, especially what is happening around you'. It does not fit the given context. Hence, option (a) is incorrect.</p><p>'Obviously' means 'in a way that is easily perceived or understood; clearly'. </p><p>Replacing 'obvious'' with 'obviously' implies that it is clearly understood that the mentioned room was built later than the others.</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 13
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>He always / aimed highly / in life.</p>",
    "options": [
      "No error",
      "In life",
      "Aimed highly",
      "He always"
    ],
    "correct_option_id": 2,
    "solution": "<p>In the givens sentence, the adverb 'highly' is used to qualify the verb 'aimed'. The sentence conveys that the subject aimed for high achievements. Generally speaking, the adverbial form of 'high' is 'high'. The adverb 'highly' is used as an intensifier. It is usually used to qualify another adjective or adverb. Therefore, in the given sentence 'highly' should be replaced with 'high' to rectify the given sentence.</p><p>So, the error is in the part in option (c). Hence, option (c) is the correct answer.</p><p><b>The correct sentence is: </b>He always aimed high in life.</p>",
    "question_index": 14
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>He knows that / he has no other option / but to work hard.</p>",
    "options": [
      "He knows that",
      "But to work hard",
      "He has no other option",
      "No error"
    ],
    "correct_option_id": 1,
    "solution": "<p>The part given in option (b) is incorrect. 'Rather', 'otherwise', and 'other' are followed by 'than' (and not 'but') 'Else' is followed by 'but'.</p><p>So, 'but' should be replaced with 'than'.</p><p><b>The correct sentence is:</b> He knows that he has no option <b>than</b> to work hard.</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the sentence with the appropriate use of adverb of manner.</p>",
    "options": [
      "He done his work regularly.",
      "He has just done his work.",
      "He does his work carefully.",
      "He has done his work on my table."
    ],
    "correct_option_id": 2,
    "solution": "<p>Adverbs of manner tell us how something happens.</p><p>'Regularly' is an adverb of frequency.</p><p>'Just' is a common adverb and it also does not tell us how something happens.</p><p>The sentence in option (d) contains no adverb.</p><p>'Carefully' is an adverb of manner as it tells that the work was done in a careful manner.</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 16
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error. </p><p>The windows / violent banged / during the / storm yesterday.</p>",
    "options": [
      "during the",
      "The windows",
      "storm yesterday.",
      "violent banged"
    ],
    "correct_option_id": 3,
    "solution": "<p>The phrase \"violent banged\" is grammatically incorrect. The correct construction would be \"violently banged\" or simply \"banged violently\". This requires an adverb to modify the verb \"banged\" instead of using an adjective.</p>",
    "question_index": 17
  },
  {
    "question": "<p>Select the option that corrects the error in the given sentence:</p><p>\"He ran quick to catch the bus.\"</p>",
    "options": [
      "quiet",
      "rapid",
      "insipid",
      "quickly"
    ],
    "correct_option_id": 3,
    "solution": "<p>The adverb \"quickly\" is required to modify the verb \"ran.\" \"Quick\" is an adjective and cannot modify a verb directly.</p>",
    "question_index": 18
  },
  {
    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains an error.</p><p>He was / bad injured / in the / last match.</p>",
    "options": [
      "Last match.",
      "In the",
      "Bad injured",
      "He was"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; \"Bad injured\" is incorrect. The correct phrase should be \"badly injured\" (adverb \"badly\" modifies \"injured\").</p><p>&#183; \"Bad\" is an adjective, but we need an adverb to describe the verb injured.</p><p>Thus, the correct answer is option 3.</p>",
    "question_index": 19
  }
];
    </script>
    
    <!-- Central JS Controller -->
    <script src="../../js/mock-core.js"></script>
</body>
</html>
