    <script>
        const questions = [
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The commander ordered the soldier to go out and bring him in stealthily. </p>",
    "options": [
      "The commander said, \"Soldier, go out and brought him in stealthily.\"",
      "The commander ordered the soldier, \"Go out and bring you in stealthily.\"",
      "The commander said, \"Soldier, go out and bring him in stealthily.\"",
      "The commander said to the soldier, \"To go out and bring him in stealthily.\""
    ],
    "correct_option_id": 2,
    "solution": "<p>Imperative Sentences in Direct Speech are used to demonstrate Request, Order, Command, etc. Imperative Sentences in Direct Speech begin with Principal verbs like Go, Make, etc.</p><p>The reporting verbs like \"begged\", \"beg\", etc. in indirect speech are changed into \"said\", \"say\", etc. in direct speech. </p><p>\"To\" is used before the Principal Verbs in Indirect Speech.</p><p>Thus, going by the options is one of the best techniques to solve these questions.</p><p>For example:</p><p>John ordered his assistant to bring him a glass of water. (Indirect Speech)</p><p>John said to his assistant, \"Bring me a glass of water.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>&#183; The infinitive 'to go' is changed into the verb 'go'. </p><p>&#183; The reporting verb 'ordered' is changed into 'said'.</p><p>Therefore, the correct answer is option (c): <b>The commander said, \"Soldier, go out and bring him in stealthily.\"</b></p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The man told me who I was to blame him. </p>",
    "options": [
      "The man said to me, \"Who are you to blame me?\"",
      "The man said to me, \"Who you are to blame me?\"",
      "The man said to me, \"Who am I to blame you?\"",
      "The man said to me,\" Who were you to blame me?\""
    ],
    "correct_option_id": 0,
    "solution": "<p>In the case of Interrogative sentences like this, \"enquired (of)\", \"wanted to know\", \"asked\", etc in Indirect Speech is changed into \"said\" in Direct Speech.</p><p>In Direct speech, the verb is always placed before the subject, unlike in Indirect Speech.</p><p>For example:</p><p>The teacher asked him what his name was. (Indirect Speech)</p><p>The teacher said to him, \"What is your name?\" (Direct Speech)</p><p>The tense of the Indirect Speech is in the Past Simple. So, the tense in the Direct Speech will be in the Present Simple.</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>&#183; The reporting verb 'told' is changed into 'said to'. </p><p>&#183; The pronouns 'I' and 'him' are changed into 'you' and 'me' respectively. </p><p>&#183; The verb 'was' (past simple) is changed into 'are' (present simple). </p><p>Therefore, the correct answer is option (a): <b>The man said to me, \"Who are you to blame me?\"</b></p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the right sentence. </p><p>The manager told the team members that he was expecting better results.</p>",
    "options": [
      "The manager said to the team members, \"I will expect better results.\"",
      "The manager said to the team members, \"I was expecting better results.\"",
      "The manager said to the team members, \"I am expecting better results.\"",
      "The manager says to the team members, \"I am expecting better results.\""
    ],
    "correct_option_id": 2,
    "solution": "<p><b>:</b></p><p>The sentence in the Indirect Speech is in <b>Past Continuous Tense</b>. Therefore, the sentence in the Direct Speech will be in <b>Present Continuous Tense</b>.</p><p>Past Continuous <b>(Subject + was/were + V1 + ing + Object)</b> will be converted into Present Continuous <b>(Subject + is/am/are + V1 +ing + Object)</b>.</p><p>For example:</p><p>He said that Suman was teaching the kids. (Indirect Speech)</p><p>He said, \"Suman is teaching the kids.\" (Direct Speech)</p><p>Also, option (d) is incorrect because the tense of reporting verb doesn't change, so the conversion of 'told' into 'says to' is incorrect.</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">told... that</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">He was</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I am</td></tr></table></p><p>The correct sentence is: The manager said to the team members, \"I am expecting better results.\"</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the right sentence. </p><p>The villagers told the Block Development Officer that the contractor had fooled them. </p>",
    "options": [
      "The villagers said to the Block Development Officer, \"The contractor fooled us.\"",
      "The villagers said to the Block Development Officer, \"The contractor was fooling us.\"",
      "The villagers said to the Block Development Officer, \"The contractor will have fooled us.\"",
      "The villagers said to the Block Development Officer, \"The contractor fools us.\""
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence in the Indirect Speech is in <b>Past Perfect Tense</b>. Therefore, the sentence in the Direct Speech will be in <b>Past Simple Tense</b>.</p><p>Past Perfect <b>(Subject + had + V3 + Object)</b> will be converted into Past Simple <b>(Subject + V2 + Object)</b>.</p><p>For example:</p><p>She said that Yusuf had sent her a letter. (Indirect Speech)</p><p>She said, \"Yusuf sent me a letter.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">told... that</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">had fooled them</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Fooled us</td></tr></table><p>Hence, option (a) is the correct answer.</p><p><b>Note: </b>There are two other cases where either the past perfect tense remains same for direct speech or past perfect tense changes to the present perfect tense. In such questions involving more than one case, we go with the options. Since options do not include the sentence in past perfect or present perfect tense, option (a) is the right answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>Shreya said that she was having a sandwich in her breakfast. </p>",
    "options": [
      "Shreya said, \"She was having a sandwich in her breakfast.\"",
      "Shreya said, \"I am having a sandwich in my breakfast.\"",
      "Shreya said, \"She is having a sandwich in her breakfast.\"",
      "Shreya said, \"I was having a sandwich in my breakfast.\""
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence in the Indirect Speech is in Past Continuous Tense. Therefore, the sentence in the Direct Speech will be in Present Continuous Tense.</p><p>Past Continuous (Subject + was/were + V1 + ing + Object) will be converted into Present Continuous (Subject + is/am/are + V1 +ing + Object)</p><p>For example:</p><p>He said that he was checking the assignment. (Indirect Speech)</p><p>He said, \"I am checking the assignment.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>She  -  I </p><p>Was  -  am </p><p>Her  -  my </p><p>Hence, (b) is the correct answer. </p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Subham said to me, \"I was watching Peaky Blinders last night\".</p>",
    "options": [
      "Subham told me that he was watching Peaky Blinders the previous night.",
      "Subham told me that he had been watching Peaky Blinders the previous night.",
      "Subham told me that he has been watching Peaky Blinders the previous night.",
      "Subham told me that he have been watching Peaky Blinders last night."
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct answer is <b>(b)Subham told me that he had been watching Peaky Blinders the previous night.\"</b></p><p>Key points:</p><p>&#183; The sentence in the Direct Speech is in <b>Past Continuous Tense.</b> Therefore, the sentence in the Indirect Speech will be in <b>Past Perfect Continuous Tense</b>.</p><p>&#183; Past Continuous <b>(Subject + was/were+V1 + ing + Object)</b> will be converted into Past Perfect Continuous <b>(Subject + had been + V1 + ing + Object)</b>.</p><p>&#183; For example:</p><p>o He said, \"I was watching television last night\" (Direct Speech)</p><p>o He said that he had been watching television the previous night. (Indirect Speech)</p><p>&#183; The following things in the sentence will change when changed from Direct Speech to Indirect Speech:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said to me</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">told me</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I was watching</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">he had been watching</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">last night</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">the previous night</td></tr></table></p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>Arnab suggested going somewhere that weekend.</p>",
    "options": [
      "Arnab said, \"We have to go somewhere this weekend.\"",
      "Arnab said, \"We can go somewhere this weekend.\"",
      "Arnab said, \"Let's be going somewhere this weekend.\"",
      "Arnab said, \"Let's go somewhere this weekend.\""
    ],
    "correct_option_id": 3,
    "solution": "<p>\"Let\" is used to mean \"to allow\".</p><p>\"Propose/ Proposed\", \"Suggest/ Suggested\" etc. in Indirect Speech are changed into \"Say/ Said\" in Direct Speech.</p><p>If there is <b>no object</b> in the Direct speech and \"Let\" is there, the <b>verb</b> takes an \"ing\" form while transforming into the Indirect Speech.</p><p>For example:</p><p>He suggested going to the station. (Indirect Speech)</p><p>He said, \"Let's go to the station.\" (Direct Speech)</p><p>Thus, going by the options is one of the best techniques to solve these questions.</p><p>The following things in the sentence will change when changed from Indirect speech to Direct Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">suggested going</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said, \"Let's go..\"</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">that</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">this</td></tr></table><p>Therefore, the correct answer is: <b>(d) Arnab said, \"Let's go somewhere this weekend.\"</b></p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Alfie Solomon said, \"Life is so much easier to deal with when one is dead.\"</p>",
    "options": [
      "Alfie Solomon said that life was so much easier to deal with when he was dead.",
      "Alfie Solomon said that life was so much easier to deal with when one was dead.",
      "Alfie Solomon said that life is so much easier to deal with when he is dead.",
      "Alfie Solomon said that life had been so much easier to deal with when he had been dead."
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct answer is <b>(b) Alfie Solomon said that life was so much easier to deal with when one was dead.</b></p><p>Key points:</p><p>&#183;The sentence in the Direct Speech is in <b>Simple Present Tense</b>. Therefore, the sentence in the Indirect Speech will be in <b>Simple Past Tense</b>.</p><p>&#183;Simple Present <b>(Subject +V1 + Object)</b> will be converted into Simple Past <b>(Subject +V2 + Object).</b></p><p>&#183;For example:</p><p>o He said, \"I never go to the village.\" (Direct Speech)</p><p>o He said that he never went to the village. (Indirect Speech)</p><p>&#183;The following things in the sentence will change when changed from Direct speech to Indirect Speech:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said that</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">life is</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">life was</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">one</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">one</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">are dead</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">was dead</td></tr></table></p><p>&#183;Therefore, the correct answer is:<b> b) Alfie Solomon said that life was so much easier to deal with when one was dead.</b></p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>Naruto said, \"I never go back on my word.\"</p>",
    "options": [
      "Naruto said that he never goes back on his word.",
      "Naruto said that he never went back on his word.",
      "Naruto said that he never went back on my word.",
      "Naruto said that he never had gone back on his word."
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct answer is <b>(b) Naruto said that he never went back on his word.</b></p><p>Key points:</p><p>&#183;The sentence in the Direct Speech is in <b>Simple Present Tense</b>. Therefore, the sentence in the Indirect Speech will be in <b>Simple Past Tense.</b></p><p>&#183; Simple Present <b>(Subject + V1 + Object)</b> will be converted into Simple Past <b>(Subject + V2 + Object).</b></p><p>&#183;For example:</p><p>o He said, \"I never go to the village.\" (Direct Speech)</p><p>o He said that he never went to the village. (Indirect Speech)</p><p>&#183;The following things in the sentence will change when changed from Direct speech to Indirect Speech:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Direct Speech</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indirect Speech</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">said that</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">he</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">go</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">went</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">my</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">his</td></tr></table><p>&#183;Therefore, the correct answer is:<b>Naruto said that he never went back on his word.</b></p>",

  },
  {
    "question": "<p>Select the option that expresses the given sentence in reported speech.</p><p>He said to his friend, \"Shall I buy this motorcycle?\"</p>",
    "options": [
      "He asked his friend whether he should buy that motorcycle.",
      "He asked his friend whether he would buy that motorcycle.",
      "He asked his friend whether he shall buy that motorcycle.",
      "He asked his friend whether he will buy this motorcycle."
    ],
    "correct_option_id": 0,
    "solution": "<p>In the case of Interrogative sentences like this, \"said\" in Direct Speech is changed into \"enquired (of)\", \"wanted to know\", \"asked\", etc.</p><p>In Indirect speech, the verb is always placed after the subject, unlike in Direct Speech.</p><p>If there is a question in the Direct Speech whose answer can come as \"Yes\" or \"No\" in the Indirect Speech, we should use the conjunctions \"if\" or \"whether\".</p><p>For example:</p><p>Ravi said to me, \"Is she studying?\" (Direct Speech)</p><p>Ravi asked me if she was studying. (Indirect Speech)</p><p>Also, when converting direct speech into indirect speech, the present modal verbs (can/may/must/will/shall) should be changed into past modal verbs (could/might/had to/would/should).</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>&#183; The reporting verb 'said to' is changed into 'asked'.</p><p>&#183; 'Shall' is changed into 'should'.</p><p>&#183; 'This' is changed into 'that'.</p><p>Therefore, the correct answer is option (a): <b>He asked his friend whether he should buy that motorcycle.</b></p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the option that expresses the given sentence in direct speech.</p><p>The judge ordered the man to tell her to put some make-up on for the following session.</p>",

    "correct_option_id": 1,
    "solution": "<p>Imperative Sentences in Direct Speech are used to demonstrate Request, Order, Command, etc. Imperative Sentences in Direct Speech begin with Principal verbs like Go, Make, etc.</p><p>The reporting verbs like \"begged\", \"beg\", etc. in indirect speech are changed into \"said\", \"say\", etc. in direct speech. </p><p>\"To\" is used before the Principal Verbs in Indirect Speech.</p><p>Thus, going by the options is one of the best techniques to solve these questions.</p><p>For example:</p><p>John ordered his assistant to bring him a glass of water. (Indirect Speech)</p><p>John said to his assistant, \"Bring me a glass of water.\" (Direct Speech)</p><p>The following things in the sentence will change when changed from Indirect Speech to Direct Speech:</p><p>&#183; The reporting verb 'ordered' is changed into 'said to'. </p><p>&#183; The infinitive 'to tell' is changed into the verb 'tell'. </p><p>&#183; 'The following session' is changed into 'the next session'. </p><p>Therefore, the correct answer is option (b): The judge said to the man, \"Tell her to put some make-up on for the next session.\"</p>",
