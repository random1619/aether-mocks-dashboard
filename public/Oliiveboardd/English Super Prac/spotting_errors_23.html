    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p>The antique clock, which has been <u>in our family</u> <u>for generations, need</u> <u>urgent repairs by</u> <u>a skilled horologist</u>.</p>",
    "options": [
      "in our family",
      "for generations, need",
      "urgent repairs by",
      "a skilled horologist"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in the segment \"for generations, need\". The subject of the main clause is \"The antique clock\". The phrase \"which has been in our family for generations\" is a relative clause describing the clock. \"Clock\" is a singular noun. Therefore, it requires a singular verb. The verb \"need\" is in its plural form (or base form used with plural subjects and I/you). The singular form for a third-person singular subject in the present tense is \"needs\".</p><p>Correct sentence: The antique clock, which has been in our family for generations, <b>needs </b>urgent repairs by a skilled horologist.</p><p>Hence, option (b) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p><p>&#183; <b>A restrictive relative clause </b>(also known as a defining relative clause) gives essential information about a noun that comes before it: without this clause the sentence wouldn't make much sense. A restrictive relative clause can be introduced by that, which, whose, who, or whom. Comma is not used before a restrictive clause.</p><p>A non-restrictive relative clause (also called a non-defining relative clause) provides extra information that could be left out without affecting the meaning or structure of the sentence. Non-restrictive relative clauses are normally introduced by which, whose, who, or whom, but never by that. Comma is used before a non-restrictive clause.</p>",
    "question_index": 0
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>My elder brother</u>, who is <u>a renowned architect</u>, <u>often gives me</u> <u>valuable advices regarding</u> career choices and professional development.</p>",
    "options": [
      "My elder brother",
      "a renowned architect",
      "often gives me",
      "valuable advices regarding"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error is in the segment \"valuable advices regarding\". The noun \"advice\" is an uncountable noun, meaning it does not typically have a plural form \"advices\". To refer to multiple pieces of advice, one might say \"pieces of advice\" or simply use \"advice\" as it encompasses the general concept.</p><p>Correct sentence: My elder brother, who is a renowned architect, often gives me valuable <b>advice</b> regarding career choices and professional development.</p><p>Hence, option (d) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>Countable and uncountable nouns:</b> 1. Countable nouns are the class of nouns that can be counted, for example, 'table'  -  one table, two tables, three tables, etc. 2. Uncountable nouns are the nouns that cannot be counted or usually are not counted, for example, light, water, milk, information, furniture, etc. They do not generally have a plural form and can't be preceded by 'a' or 'an'. Many abstract nouns are typically uncountable. Some uncountable nouns can be used in the plural as well, depending on the meaning or context of the word.</p>",
    "question_index": 1
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p>The journey through the <u>dense, unexplored jungle</u> was <u>more harder than the</u> experienced <u>adventurers had initially</u> <u>anticipated it</u>.</p>",
    "options": [
      "dense, unexplored jungle",
      "more harder than the",
      "adventurers had initially",
      "anticipated it"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in the segment \"more harder than the\". \"Harder\" is already the comparative form of the adjective \"hard\". Adding \"more\" before \"harder\" creates a double comparative, which is grammatically incorrect. The correct comparative form is simply \"harder\".</p><p>Correct sentence: The journey through the dense, unexplored jungle was <b>harder</b> than the experienced adventurers had initially anticipated it.</p><p>Hence, option (b) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>The Positive Degree </b>is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>The Comparative degree denotes a higher degree of quality than the positive and is used when two things are compared.<b></b></p><p>The Superlative degree indicates the highest degree of quality and is used when more than two things (or sets of things) are compared. (\"Hard\" is positive, \"harder\" is comparative, \"hardest\" is superlative. \"More harder\" is an incorrect formation of the comparative degree.)</p>",
    "question_index": 2
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>Each of the</u> talented <u>contestants were given</u> <u>a unique theme</u> to <u>create their final masterpiece</u> for the competition.</p>",
    "options": [
      "Each of the",
      "contestants were given",
      "a unique theme",
      "create their final masterpiece"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in the segment \"contestants were given\". When \"Each of\" is used, it refers to every individual member of a group separately. Therefore, the subject \"Each\" is singular and requires a singular verb. \"contestants\" is the object of the preposition \"of\". The verb \"were given\" is plural. It should be the singular form \"was given\".</p><p>Correct sentence: Each of the talented contestants <b>was given</b> a unique theme to create their final masterpiece for the competition.</p><p>Hence, option (b) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 3
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>If he would have studied harder, / he would have surely / passed the difficult examination.</p>",
    "options": [
      "If he would have studied harder,",
      "passed the difficult examination",
      "he would have surely",
      "No error"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is in the structure of the conditional clause in \"If he would have studied harder.\"</p><p>This sentence describes an unreal past condition and its probable past result (a Type 3 conditional sentence). The correct structure for the 'if-clause' in such sentences is \"If + subject + had + past participle (V3).\" The main clause correctly uses \"would have + past participle (V3).\"</p><p>Therefore, \"If he would have studied harder\" should be \"If he had studied harder.\"</p><p><b>Correct Sentence:</b> If he had studied harder, he would have surely passed the difficult examination.</p><p>Hence, option (a) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>V3 (Past Participle):</b> The past participle form of a verb, often ending in -ed, -d, -t, -en, or -n, used in forming perfect tenses and passive voice.</p><p>&#183; <b>Conditional Sentences:</b> Sentences expressing factual implications, or hypothetical situations and their consequences. The structure \"If + Past Perfect, ... would have + Past Participle\" is used for unreal past conditions.</p>",
    "question_index": 4
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>He speaks English very fluent / although his native language / is completely different.</p>",
    "options": [
      "He speaks English very fluent",
      "although his native language",
      "is completely different",
      "No error"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is in the use of the adjective \"fluent\" in \"He speaks English very fluent.\"</p><p>The verb \"speaks\" needs to be modified by an adverb, not an adjective. \"Fluent\" is an adjective, which describes a noun. The adverb form, \"fluently,\" should be used to describe how he speaks.</p><p><b>Correct Sentence:</b> He speaks English very fluently although his native language is completely different.</p><p>Hence, option (a) is the correct answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>Despite of his old age, / he completed the marathon / with remarkable determination.</p>",
    "options": [
      "he completed the marathon",
      "with remarkable determination",
      "Despite of his old age,",
      "No error"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the phrase \"Despite of his old age.\"</p><p>The preposition \"despite\" is used without \"of.\" The correct usage is either \"despite his old age\" or \"in spite of his old age.\" The \"of\" after \"despite\" is superfluous and grammatically incorrect.</p><p><b>Correct Sentence:</b> Despite his old age, he completed the marathon with remarkable determination. (Alternatively: In spite of his old age, he completed the marathon with remarkable determination.)</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>She couldn't hardly believe / her eyes when she saw / the surprising news report.</p>",
    "options": [
      "the surprising news report",
      "her eyes when she saw",
      "She couldn't hardly believe",
      "No error"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the phrase \"She couldn't hardly believe\" due to a double negative.</p><p>\"Couldn't\" (could not) is already negative. \"Hardly\" is a semi-negative adverb meaning \"scarcely\" or \"almost not.\" Using both together creates a double negative, which is grammatically incorrect and can confuse the meaning. The sentence should express that she found it difficult to believe.</p><p>The correct forms would be \"She could hardly believe\" or \"She couldn't believe.\"</p><p><b>Correct Sentence:</b> She could hardly believe her eyes when she saw the surprising news report. (Or: She couldn't believe her eyes when she saw the surprising news report.)</p><p>Hence, option (c) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>Double Negative:</b> A grammatical construction in which two negative words are used in the same clause to express a single negation. Standard English generally avoids double negatives.</p>",
    "question_index": 7
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>He quietly walked into the bustling antique shop, / admired a few vintage items on display, / and then sits near the ornate fireplace to read his book.</p>",
    "options": [
      "No error",
      "admired a few vintage items on display,",
      "and then sits near the ornate fireplace to read his book",
      "He quietly walked into the bustling antique shop,"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in part (c) regarding verb tense consistency. The sentence describes a sequence of actions in the past: \"walked\" (V2) and \"admired\" (V2). To maintain tense consistency, the third verb \"sits\" (V5 - simple present) should also be in the simple past tense, which is \"sat\" (V2).</p><p><b>Correct Sentence:</b> He quietly walked into the bustling antique shop, admired a few vintage items on display, and then sat near the ornate fireplace to read his book.</p><p>Hence, option (c) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>Tense Consistency:</b> In a sentence or paragraph, verbs should generally remain in the same tense unless there's a logical reason for a shift (e.g., describing events at different times).</p><p>&#183; <b>V2 (Past form of verb):</b> The form of the verb used to indicate an action that happened in the past.</p><p>&#183; <b>V5 (Third person singular):</b> The base form of the verb with -s or -es added, used for third-person singular subjects in the simple present tense.</p>",
    "question_index": 8
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>The board of directors was not entirely satisfied / with the vague explanations provided by the manager / and promptly demanded for a more comprehensive project status report.</p>",
    "options": [
      "The board of directors was not entirely satisfied",
      "with the vague explanations provided by the manager",
      "No error",
      "and promptly demanded for a more comprehensive project status report"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error is in part (d) with the preposition \"for\" after \"demanded.\" The verb \"demand\" is a transitive verb that takes a direct object without a preposition when it means to ask for something forcefully. One \"demands something,\" not \"demands for something.\" The \"for\" is superfluous here.</p><p><b>Correct Sentence:</b> The board of directors was not entirely satisfied with the vague explanations provided by the manager and promptly demanded a more comprehensive project status report.</p><p>Hence, option (d) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>Transitive verb:</b> Some verbs always need an object (a noun, phrase, or pronoun that refers to the person or thing that is affected by the action of the verb). These are called transitive verbs.</p>",
    "question_index": 9
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p></p><p>Her remarkable decision to pursue advanced medical studies abroad / was met with strong approve and unwavering support / from her entire family and close friends.</p>",
    "options": [
      "Her remarkable decision to pursue advanced medical studies abroad",
      "was met with strong approve and unwavering support",
      "from her entire family and close friends",
      "No error"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in part (b) with the word \"approve.\" \"Strong\" is an adjective that should modify a noun. \"Approve\" is a verb. The noun form needed here, parallel to \"unwavering support\" (adjective + noun), is \"approval.\"</p><p><b>Correct Sentence:</b> Her remarkable decision to pursue advanced medical studies abroad was met with strong approval and unwavering support from her entire family and close friends.</p><p>Hence, option (b) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>Parts of Speech:</b> Understanding the different roles words play (noun, verb, adjective, adverb, etc.) is crucial for correct sentence construction.</p><p>&#183; <b>Parallelism:</b> In grammar, parallelism, also known as parallel structure or parallel construction, is a balance within one or more sentences of similar phrases or clauses that have the same grammatical structure. Here, \"strong approval\" and \"unwavering support\" maintain parallel structure (adjective + noun).</p><p>&#183; <b>Abstract Noun:</b> It is the name given to ideas, qualities, and conditions - things that cannot be seen or touched and things which have no physical reality. \"Approval\" and \"support\" are abstract nouns.</p>",
    "question_index": 10
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>She did not say / nothing about the incident / to anyone in the office.</p>",
    "options": [
      "to anyone in the office",
      "nothing about the incident",
      "She did not say",
      "No error"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in the part \"nothing about the incident\". The sentence already contains a negative (\"did not\"). Using \"nothing\" creates a double negative, which is grammatically incorrect in standard English and can alter the intended meaning. \"Nothing\" should be replaced with \"anything.\"</p><p>Correct Sentence: She did not say anything about the incident to anyone in the office.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>My father is / an honest man and / always speaks the truth to everyone.</p>",
    "options": [
      "an honest man and",
      "always speaks the truth to everyone",
      "My father is",
      "No error"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence is grammatically correct. The indefinite article \"an\" is correctly used before \"honest\" because \"honest\" begins with a vowel sound (the 'h' is silent).</p><p>Hence, option (d) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",
    "question_index": 12
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>The letter was wrote / by my sister yesterday / with a new pen.</p>",
    "options": [
      "with a new pen",
      "The letter was wrote",
      "No error",
      "by my sister yesterday"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in the part \"The letter was wrote\". The sentence is in the passive voice. In passive voice constructions, the past participle form (V3) of the main verb is used with an auxiliary verb (a form of 'to be'). The past participle of \"write\" is \"written,\" not \"wrote\" (which is the simple past form, V2). The auxiliary verb 'was' (singular) is correct for the singular subject 'The letter'.</p><p>Correct Sentence: The letter was written by my sister yesterday with a new pen.</p><p>Hence, option (b) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). The past participle (V3) form is used here.</p><p>&#183; <b>Passive Voice:</b> When the subject is what the action is directed at, then the sentence is said to be in passive form/voice. Example: A skit was performed by Rita and her friends.</p><p>&#183; <b>Auxiliary verb:</b> A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. 'Was' is an auxiliary verb here.</p>",
    "question_index": 13
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>The government's new initiative to provide vocational training / aim to equip young people with practical skills, / thereby enhancing their employability in the competitive job market.</p>",
    "options": [
      "The government's new initiative to provide vocational training",
      "No error",
      "thereby enhancing their employability in the competitive job market",
      "aim to equip young people with practical skills,"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error is in the part \"aim to equip young people with practical skills,\". The subject of this clause is \"The government's new initiative,\" which is singular. Therefore, the verb should be in its singular form. \"Aim\" (plural/base form) should be \"aims\" (singular).</p><p>Correct Sentence: The government's new initiative to provide vocational training aims to equip young people with practical skills, thereby enhancing their employability in the competitive job market.</p><p>Hence, option (d) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. \"Initiative\" (singular subject) requires the singular verb \"aims.\"</p><p>&#183; <b>V5 -&gt; Third person singular (V1+ -es or -s):</b> 'aims' is the V5 form of the verb 'aim'.</p>",
    "question_index": 14
