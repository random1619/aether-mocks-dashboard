<!DOCTYPE html>

<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">20 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test

    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Parts of the given sentence have been underlined. Identify the part that has an error. Select the option that has an error.</p><p><u>The board's mandate requires</u> that <u>each department head</u> <u>submits a detailed</u> quarterly <u>report to the oversight</u> committee.</p>",
    "options": [
      "The board's mandate requires",
      "each department head",
      "submits a detailed",
      "report to the oversight"
    ],
    "correct_option_id": 2,
    "solution": "<p>This question tests the subjunctive mood. After verbs expressing a demand, request, or requirement (like \"requires that,\" \"insists that,\" \"suggests that\"), the following verb should be in its base form. The correct phrasing is \"...that each department head submit...\" not \"submits.\"</p><p>So, the correct sentence is: The board's mandate requires that each department head <b>submit</b> a detailed quarterly report to the oversight committee.</p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 0
  },
  {
    "question": "<p>Parts of the given sentence have been underlined. Identify the part that has an error. Select the option that has an error.</p><p><u>If the management</u> <u>would have approved</u> the budget <u>sooner</u>, the project <u>would have been completed</u> on schedule.</p>",
    "options": [
      "If the management",
      "would have approved",
      "sooner",
      "would have been completed"
    ],
    "correct_option_id": 1,
    "solution": "<p>This question tests the correct formation of the third conditional (past unreal conditional). The 'if' clause in this structure requires the past perfect tense (\"had\" + past participle), not \"would have.\" The correct structure is: \"If the management <b>had approved</b> the budget sooner, the project would have been completed on schedule.\"</p><p>Hence, option (b) is the correct answer. </p>",
    "question_index": 1
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>The manager made the new intern / to stay back after office hours / to finish the urgent report.</p>",
    "options": [
      "to finish the urgent report",
      "to stay back after office hours",
      "The manager made the new intern",
      "No error"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error is in the part \"to stay back after office hours\". Certain verbs like 'make', 'let', 'help', and 'bid', when used in the active voice, are followed by a bare infinitive (the base form of a verb without 'to'). In this sentence, 'made' is used in the active voice.</p><p>Therefore, the infinitive marker 'to' should be removed before the verb 'stay'. The correct phrase is \"stay back\".</p><p><b>Correct Sentence:</b> The manager made the new intern <b>stay back after office hours</b> to finish the urgent report.</p><p>Hence, option (b) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>Infinitive:</b> The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p>&#183; To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p>&#183; My father likes to cook. [like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p>&#183; To vote in elections is our right. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#183; Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>&#183; The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.</p><p>&#183; <b>Infinitive marker:</b> A word or affix attached to the stem of a verb in order to form the full infinitive. In English, to is the infinitive marker.</p><p>&#183; <b>Active and Passive Voice:</b> When the person doing the action is the subject, the sentence is said to be in active form/voice. When the subject is what the action is directed at, then the sentence is said to be in passive form/voice. For example: Active Voice: Rita and her friends performed a skit. Here 'Rita and her friends' (subject) perform the action. Passive Voice: A skit was performed by Rita and her friends. Here 'skit' is the subject (at which the action is directed).</p>",
    "question_index": 2
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>My father does not approve with / my spending so much time / on social media platforms.</p>",
    "options": [
      "my spending so much time",
      "No error",
      "on social media platforms",
      "My father does not approve with"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error is in the part \"My father does not approve with\". The verb 'approve' is followed by a specific preposition. We use 'approve of' to mean 'to have a positive opinion of someone or something'. The preposition 'with' is incorrect in this context.</p><p>'With' should be replaced by the correct preposition 'of'.</p><p><b>Correct Sentence: My father does not approve of</b> my spending so much time on social media platforms.</p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>Since implementing the new automated quality control system, the factory has reported significantly <u>less complaints from customers</u> regarding product defects, which is a wonderful improvement.</p>",
    "options": [
      "fewer complaints from customers",
      "lesser complaints by customers",
      "few complaints of customers",
      "No substitution"
    ],
    "correct_option_id": 0,
    "solution": "<p>This question tests the difference between the words \"less\" and \"fewer.\" \"Fewer\" is used for countable nouns (items you can count one by one), while \"less\" is used for non-countable or mass nouns (like time, water, or advice).</p><p>In this sentence, \"complaints\" is a countable noun (one complaint, two complaints, etc.). Therefore, the correct word to use is \"fewer.\"</p><p>Option a) <b>fewer complaints from customers</b> correctly uses \"fewer\" with the countable noun \"complaints.\"</p><p>Option b) <b>lesser complaints by customers</b> is incorrect. \"Lesser\" is a comparative adjective meaning of lower importance or quality, not quantity.</p><p>Option c) <b>few complaints of customers</b> changes the meaning. \"Fewer\" is comparative (a smaller number than before), whereas \"few\" is an absolute term meaning a small number.</p><p>So, the correct sentence is: Since implementing the new automated quality control system, the factory has reported significantly <b>fewer</b> complaints from customers regarding product defects, which is a wonderful improvement.</p><p>Hence, the most appropriate choice is <b>a) fewer complaints from customers</b>.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Parts of the given sentence have been underlined. Identify the part that has an error. Select 'No error' if there is no error.</p><p><u>Hardly the presentation had concluded</u> when the fire alarm <u>began to blare</u>, causing <u>immediate confusion in the</u> auditorium.</p>",
    "options": [
      "Hardly the presentation had concluded",
      "began to blare,",
      "No error",
      "immediate confusion in the"
    ],
    "correct_option_id": 0,
    "solution": "<p>This question tests subject-verb inversion after a negative adverb. When a sentence begins with a limiting adverb like \"Hardly,\" \"Scarcely,\" \"Never,\" or \"Not only,\" the word order of the subject and auxiliary verb must be inverted. The correct structure is \"Hardly <b>had the presentation concluded</b>...\"</p><p>Hence, option (a) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Parts of the given sentence have been underlined. Identify the part that has an error. Select the option that has an error.</p><p><u>The supervisor was not pleased</u> about <u>him arriving late</u> to the <u> mandatory safety briefing</u> <u>for the third time</u> this month.</p>",
    "options": [
      "The supervisor was not pleased",
      "him arriving late",
      "mandatory safety briefing",
      "for the third time"
    ],
    "correct_option_id": 1,
    "solution": "<p>When a pronoun comes before a gerund (a verb ending in \"-ing\" that acts as a noun), the pronoun should be in the possessive case. The action the supervisor was not pleased about was the \"arriving,\" so the pronoun should show possession of that action.</p><p>So, the phrase \"pleased about him arriving late\" should be replaced with \"pleased about <b>his</b> arriving late\". </p><p>Hence, option (b) is the correct answer. </p>",
    "question_index": 6
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>The chef cooked the meal perfectly, / but the new soup tasted / very bitterly to all the guests.</p>",
    "options": [
      "The chef cooked the meal perfectly",
      "but the new soup tasted",
      "very bitterly to all the guests",
      "No error"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the part \"very bitterly to all the guests\". The verb 'tasted' is a verb of sensation (like feel, seem, appear, smell, sound). Such verbs are followed by an adjective that describes the quality of the subject, not an adverb. Here, 'bitterly' is an adverb modifying the action of tasting, which is incorrect. We need an adjective to describe the soup itself.</p><p>The correct word to use is the adjective 'bitter'.</p><p><b>Correct Sentence:</b> The chef cooked the meal perfectly, but the new soup tasted <b>very bitter</b> to all the guests.</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 7
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>Had he worked a little harder, / he would have certainly succeeded / in the final examination last year.</p>",
    "options": [
      "Had he worked a little harder",
      "he would have certainly succeeded",
      "in the final examination last year",
      "No error"
    ],
    "correct_option_id": 3,
    "solution": "<p>The given sentence is grammatically correct and contains no error. It is a Type 3 conditional sentence, used for expressing a hypothetical situation in the past that did not happen. The standard structure is \"If + Past Perfect, ... would have + V3\". This sentence uses the inverted form where 'If' is omitted and the auxiliary verb 'had' is placed before the subject ('Had he worked...'). This is a correct and advanced grammatical structure.</p><p><b>Correct Sentence:</b> Had he worked a little harder, he would have certainly succeeded in the final examination last year.</p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>After hiking for eight strenuous hours through the dense and humid jungle, <u>the beautiful waterfall was</u> a truly magnificent and rewarding sight for the exhausted group of trekkers.</p>",
    "options": [
      "the exhausted group saw",
      "it was the beautiful waterfall that",
      "there was the waterfall which",
      "No substitution"
    ],
    "correct_option_id": 0,
    "solution": "<p>The original sentence contains a dangling modifier. The introductory phrase \"After hiking for eight strenuous hours...\" needs to modify the subject of the main clause. As written, the subject is \"the beautiful waterfall,\" which illogically suggests that the waterfall was hiking. The subject must be the people who were actually hiking.</p><p>Option a) <b>the exhausted group saw</b> corrects the error by making \"the exhausted group\" the subject of the main clause. The group did the hiking, so the modifier is no longer dangling.</p><p>Option b) <b>it was the beautiful waterfall that</b> does not fix the problem, as the subject \"it\" still doesn't logically connect to the action of hiking.</p><p>Option c) <b>there was the waterfall which</b> also fails to correct the dangling modifier.</p><p>So, the correct sentence is: After hiking for eight strenuous hours through the dense and humid jungle, <b>the exhausted group saw</b> a truly magnificent and rewarding sight in the beautiful waterfall. (The option provides the grammatically correct subject-verb combination to fix the sentence).</p><p>Hence, the most appropriate choice is <b>a) the exhausted group saw</b>.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Parts of the given sentence have been underlined. Identify the part that has an error. Select the option that has an error.</p><p>The professor <u>instructed</u> the students <u>to submit their</u> final essays <u>to their teaching assistant and myself</u> by the <u>end of the day.</u></p>",
    "options": [
      "instructed",
      "to submit their",
      "to their teaching assistant and myself",
      "end of the day"
    ],
    "correct_option_id": 2,
    "solution": "<p>This question tests the incorrect use of a reflexive pronoun. \"Myself\" should only be used reflexively (I hurt myself) or for emphasis (I myself will do it). It cannot be used as an object in a prepositional phrase. The correct objective pronoun is \"me.\" The correct phrasing is \"...to their teaching assistant and <b>me</b>.\"</p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 10
  },
  {
    "question": "<p>Parts of the given sentence have been underlined. Identify the part that has an error. Select the option that has an error.</p><p><u>This new algorithm is more</u> effective <u>at identifying patterns</u> than <u>any algorithm we have</u> <u>developed in the past.</u></p>",
    "options": [
      "This new algorithm is more",
      "at identifying patterns",
      "any algorithm we have",
      "developed in the past"
    ],
    "correct_option_id": 2,
    "solution": "<p>This question tests for a logical comparison. The new algorithm is one of the algorithms \"we have developed.\" Therefore, it cannot be more effective than itself. The sentence creates an illogical comparison by including the item being compared within the group it is being compared to. The correct phrasing requires the use of \"other\" to exclude the item from the group: \"...than any <b>other</b> algorithm we have developed...\"</p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 11
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>She is looking forward to meet / her old school friends again / at the upcoming alumni event.</p>",
    "options": [
      "She is looking forward to meet",
      "her old school friends again",
      "at the upcoming alumni event",
      "No error"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is in the part \"She is looking forward to meet\". The phrase 'look forward to' is a phrasal verb. When a verb follows this phrase, it must be in the gerund form (verb + -ing). The 'to' in 'look forward to' is a preposition, not an infinitive marker. Prepositions are followed by nouns or gerunds.</p><p>Therefore, the infinitive 'meet' should be replaced by the gerund 'meeting'.</p><p><b>Correct Sentence: She is looking forward to meeting</b> her old school friends again at the upcoming alumni event.</p><p>Hence, option (a) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>Phrasal verb:</b> A phrase that consists of a verb with a preposition or adverb or both, the meaning of which is different from the meaning of its separate parts. Example: She has always looked down on me. Here, the phrasal verb 'to look down on someone' doesn't mean that you are looking down from a higher place at someone who is below you; it means that you think that you are better than someone.</p><p>&#183; <b>Gerund:</b> Gerund is a verb form that functions as a noun, ending in -ing. A gerund can be either the subject or object of a sentence in English. Example: \"Everybody enjoyed her dancing and singing at the party.\" The words 'dancing' and 'singing' are gerunds.</p>",
    "question_index": 12
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>The new investigative committee comprised of / ten senior officers who were / experts in forensic science.</p>",
    "options": [
      "The new investigative committee comprised of",
      "ten senior officers who were",
      "experts in forensic science",
      "No error"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error is in the part \"The new investigative committee comprised of\". The verb 'comprise' means 'to consist of' or 'to be made up of'. In the active voice, 'comprise' is not followed by the preposition 'of'. The preposition 'of' is used when the sentence is in the passive voice (e.g., 'was comprised of').</p><p>The preposition 'of' should be removed to make the sentence grammatically correct in the active voice. Alternatively, 'comprised of' could be replaced with 'consisted of'.</p><p><b>Correct Sentence: The new investigative committee comprised</b> ten senior officers who were experts in forensic science.</p><p>Hence, option (a) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>Active and Passive Voice:</b> When the person doing the action is the subject, the sentence is said to be in active form/voice. When the subject is what the action is directed at, then the sentence is said to be in passive form/voice. For example: Active Voice: Rita and her friends performed a skit. Here 'Rita and her friends' (subject) perform the action. Passive Voice: A skit was performed by Rita and her friends. Here 'skit' is the subject (at which the action is directed).</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option that can substitute the underlined segment in the given sentence. If there is no need to substitute it, select 'No substitution'.</p><p>The seasoned detective methodically interviewed each of the three witnesses, but <u>neither of them offered</u> a consistent account of the events that transpired during the chaotic incident.</p>",
    "options": [
      "none of them offered",
      "either of them offered",
      "neither of them did offer",
      "No substitution"
    ],
    "correct_option_id": 0,
    "solution": "<p>This question tests the correct use of the determiners \"neither\" and \"none.\" \"Neither\" is used to refer to two items or people only. \"None\" is used to refer to three or more items or people. Since the sentence explicitly mentions \"three witnesses,\" using \"neither\" is grammatically incorrect.</p><p>Option a) <b>none of them offered</b> correctly uses \"none\" because the group consists of three people. It is the appropriate choice for groups larger than two.</p><p>Option b) <b>either of them offered</b> is also used for a choice between two options and does not fit the context of three witnesses.</p><p>Option c) <b>neither of them did offer</b> is incorrect because it uses \"neither\" for a group of three and adds an unnecessary auxiliary verb \"did\" for emphasis, which is not required here.</p><p>So, the correct sentence is: The seasoned detective methodically interviewed each of the three witnesses, but <b>none</b> of them offered a consistent account of the events that transpired during the chaotic incident.</p><p>Hence, the most appropriate choice is <b>a) none of them offered</b>.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Parts of the given sentence have been underlined. Identify the part that has an error. Select the option that has an error.</p><p><u>The new CEO promised</u> not only <u>to streamline operations</u>, <u>but also</u>  <u>he would improve</u> employee morale.</p>",
    "options": [
      "The new CEO promised",
      "to streamline operations",
      "but also",
      "he would improve"
    ],
    "correct_option_id": 2,
    "solution": "<p>This question tests for parallel structure with correlative conjunctions (\"not only... but also\"). The grammatical structure following each part of the conjunction should be the same. The first part is followed by an infinitive phrase (\"to streamline operations\"). The second part should also be followed by a parallel structure. The phrase \"he would improve\" breaks the parallelism. The correct sentence would be: \"The new CEO promised not only to streamline operations but also <b>to improve</b> employee morale.\"</p><p>Hence, option (c) is the correct answer. </p>",
    "question_index": 15
  },
  {
    "question": "<p>The following sentence has been divided into parts. One of them may contain an error. Select the part that contains the error from the given options. If you don't find any error, mark 'No error' as your answer.</p><p>Although the mountaineer was very weak, / he was determined to reach the summit / without nobody's assistance.</p>",
    "options": [
      "he was determined to reach the summit",
      "Although the mountaineer was very weak",
      "without nobody's assistance",
      "No error"
