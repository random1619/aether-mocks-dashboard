    "question": "<p>Select the option that expresses the given sentence in present perfect tense.</p><p>A) I had visited Paris several times in the past.</p><p>B) I visited Paris several times in the past.</p><p>C) I was visiting Paris several times in the past.</p><p>D) I have visited Paris several times in the past.</p>",
