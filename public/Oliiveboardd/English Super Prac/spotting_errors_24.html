    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Our much-awaited annual function will be held _________ the coming Friday.</p>",
    "options": [
      "in",
      "at",
      "since",
      "on"
    ],
    "correct_option_id": 3,
    "solution": "<p>The context of the sentence is about specifying the day on which an event will take place. The blank requires a preposition of time that is used for specific days of the week.</p><p>The correct option is <b>\"on.\"</b> The preposition <b>\"on\"</b> is always used before specific days (e.g., on Monday, on Friday) and dates (e.g., on 25th December).</p><p>The other options are incorrect: <b>\"in\"</b> is used for longer periods like months, years, and seasons (e.g., in July, in 2024). <b>\"at\"</b> is used for specific times of the day (e.g., at 5 PM). <b>\"since\"</b> is used to denote a starting point in time.</p><p>Thus, the correct sentence is: \"Our much-awaited annual function will be held <b>on</b> the coming Friday.\"</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 0
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>She has been suffering / from a severe headache / for last Monday / and needs to see a doctor.</p>",
    "options": [
      "from a severe headache",
      "She has been suffering",
      "for last Monday",
      "and needs to see a doctor"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the use of the preposition \"for\" with a specific point in time. The preposition \"for\" is used to indicate a duration or period of time (e.g., for two days). The preposition \"since\" is used to indicate a starting point in time (e.g., since Monday, since 2020). \"Last Monday\" is a specific starting point, so \"since\" should be used.</p><p><b>Correct sentence:</b> She has been suffering from a severe headache <b>since</b> last Monday and needs to see a doctor.</p><p>So, there is an error in the part mentioned in option c).</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 1
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>Despite of working very hard, / he could not pass / the difficult entrance examination / this year.</p>",
    "options": [
      "Despite of working very hard",
      "the difficult entrance examination",
      "this year",
      "he could not pass"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error lies in the use of the preposition \"of\" after \"Despite.\" The word \"Despite\" is a preposition that means \"without being affected by\" and is not followed by \"of.\" The phrase \"in spite of\" has the same meaning and is correctly followed by \"of.\" One can use either \"Despite\" (without \"of\") or \"In spite of.\"</p><p><b>Correct sentence: Despite</b> working very hard, he could not pass the difficult entrance examination this year.</p><p>OR</p><p><b>In spite of</b> working very hard, he could not pass the difficult entrance examination this year.</p><p>So, there is an error in the part mentioned in option a).</p><p>Hence, option (a) is the answer.</p>",
    "question_index": 2
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>The manager did not</u> <u>approve with the</u> new <u>marketing</u> strategy <u>proposed by the junior</u> executive team.</p>",
    "options": [
      "proposed by the junior",
      "The manager did not",
      "approve with the",
      "marketing"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error lies in the preposition \"with\" used after the verb \"approve\". The correct preposition to follow \"approve\" when it means 'to agree to' or 'to accept as satisfactory' is \"of\". The phrasal verb is \"approve of\".</p><p>Correct sentence: The manager did not approve <b>of</b> the new marketing strategy proposed by the junior executive team.</p><p>Hence, option (c) is the correct answer.</p><p><b>Note:</b></p><p><b>Phrasal verb:</b> A phrase that consists of a verb with a preposition or adverb or both, the meaning of which is different from the meaning of its separate parts. Example: She has always looked down on me. Here, the phrasal verb 'to look down on someone' doesn't mean that you are looking down from a higher place at someone who is below you; it means that you think that you are better than someone.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence.</p><p>The students were asked to abstain <u>from talk during the</u> examination.</p>",
    "options": [
      "with talking during the",
      "to talk during the",
      "for talking in the",
      "from talking during the"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error in the underlined segment is the form of the verb \"talk.\" The verb \"abstain\" is followed by the preposition \"from,\" which in turn must be followed by a gerund (the -ing form of a verb) when an action is mentioned.</p><p>The original segment uses the base form \"talk\" instead of the gerund \"talking.\"</p><p><b>Option d) from talking during the</b> is correct. It correctly uses the structure \"abstain from\" followed by the gerund \"talking.\"</p><p><b>Option a) with talking during the</b> uses the wrong preposition \"with.\"</p><p><b>Option b) to talk during the</b> uses the infinitive \"to talk,\" which is incorrect after \"abstain from.\"</p><p><b>Option c) for talking in the</b> uses the wrong preposition \"for.\"</p><p><b>Correct Sentence:</b> The students were asked to abstain from <b>talking</b> during the examination.</p><p>Hence, the most appropriate choice is <b>d) from talking during the</b>.</p><p><b>Note: Gerund:</b> Gerund is a verb form that functions as a noun, ending in -ing. Here, 'talking' functions as the object of the preposition 'from'.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>_________ being a talented musician, he is also an excellent painter.</p>",
    "options": [
      "Beside",
      "Besides",
      "Behind",
      "Below"
    ],
    "correct_option_id": 1,
    "solution": "<p>The context of the sentence is to add another piece of information about a person's talents. The blank requires a preposition that means \"in addition to\" or \"as well as.\"</p><p>The correct option is <b>\"Besides.\"</b> The preposition <b>\"Besides\"</b> (with an 's') means \"in addition to\" or \"apart from.\"</p><p>The other options are incorrect: <b>\"Beside\"</b> (without an 's') is a preposition of place meaning \"next to.\" <b>\"Behind\"</b> and <b>\"Below\"</b> are also prepositions of place and are not logical in this context.</p><p>Thus, the correct sentence is: \"<b>Besides</b> being a talented musician, he is also an excellent painter.\"</p><p>Hence, option (b) is the answer.</p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>My uncle is a famous businessman who deals _________ antique home furniture.</p>",
    "options": [
      "with",
      "on",
      "in",
      "by"
    ],
    "correct_option_id": 2,
    "solution": "<p>The sentence describes a businessman's area of trade. The blank requires a preposition to complete the phrasal verb \"deal,\" specifying the nature of the business.</p><p>The correct option is <b>\"in.\"</b> The phrasal verb <b>\"deal in something\"</b> means to buy and sell a particular product as a business.</p><p>The other options are incorrect: <b>\"deal with\"</b> means to handle a problem, situation, or person. <b>\"deal on\"</b> and <b>\"deal by\"</b> are not standard phrasal verbs with \"deal.\"</p><p>Thus, the correct sentence is: \"My uncle is a famous businessman who deals <b>in</b> antique home furniture.\"</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>He prefers drinking coffee / than tea in the morning / before he leaves / for his office.</p>",
    "options": [
      "before he leaves",
      "than tea in the morning",
      "He prefers drinking coffee",
      "for his office"
    ],
    "correct_option_id": 1,
    "solution": "<p>The error lies in the use of the conjunction \"than\" after the verb \"prefers.\" The verb \"prefers\" is followed by the preposition \"to\" when comparing two nouns or activities (gerunds). The construction is \"prefers [something] to [something else].\"</p><p><b>Correct sentence:</b> He prefers drinking coffee <b>to</b> tea in the morning before he leaves for his office.</p><p>So, there is an error in the part mentioned in option b).</p><p>Hence, option (b) is the answer.</p><p><b>Note: Gerund:</b> Gerund is a verb form that functions as a noun, ending in -ing. A gerund can be either the subject or object of a sentence in English. Example: \"Everybody enjoyed her dancing and singing at the party.\" The words 'dancing' and 'singing' are gerunds.</p>",
    "question_index": 7
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>He insisted</u> on <u>to go to the concert</u> even <u>though his parents</u> had strictly forbidden him <u>from doing so</u>.</p>",
    "options": [
      "from doing so",
      "He insisted",
      "to go to the concert",
      "though his parents"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the structure following the preposition \"on\". A preposition is always followed by a noun or a noun form. The verb \"go\" after \"on\" should be in its gerund form (\"going\") to function as a noun. The use of an infinitive (\"to go\") after a preposition is incorrect in this context.</p><p>Correct sentence: He insisted on <b>going</b> to the concert even though his parents had strictly forbidden him from doing so.</p><p>Hence, option (c) is the correct answer.</p><p><b>Note:</b></p><p><b>Gerund:</b> Gerund is a verb form that functions as a noun, ending in -ing. A gerund can be either the subject or object of a sentence in English. Example: \"Everybody enjoyed her dancing and singing at the party.\" The words 'dancing' and 'singing' are gerunds.</p><p><b>Infinitive:</b> The infinitive is the base form of a verb, often preceded by to.</p><p>Consider the sentences given below:</p><p>&#183; To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p>&#183; My father likes to cook. [like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p>&#183; To vote in elections is our right. [the infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#183; Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>&#183; The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.</p>",
    "question_index": 8
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>Our new school</u> building <u>comprises of fifty</u> classrooms, <u>a large library, and two</u> state-of-the-art <u>computer labs</u>.</p>",
    "options": [
      "a large library, and two",
      "Our new school",
      "computer labs",
      "comprises of fifty"
    ],
    "correct_option_id": 3,
    "solution": "<p>The error is in the use of the preposition \"of\" after the verb \"comprises\". In the active voice, the verb \"comprise\" means 'to consist of' or 'to be made up of' and is not followed by a preposition. The singular subject 'building' agrees with the singular verb 'comprises'. The preposition \"of\" is used when \"comprise\" is used in the passive voice (e.g., \"is comprised of\").</p><p>Correct sentence: Our new school building <b>comprises</b> fifty classrooms, a large library, and two state-of-the-art computer labs.</p><p>Hence, option (d) is the correct answer.</p><p><b>Note:</b></p><p><b>Active and Passive Voice:</b> When the person doing the action is the subject, the sentence is said to be in active form/voice. When the subject is what the action is directed at, then the sentence is said to be in passive form/voice. For example: Active Voice: Rita and her friends performed a skit. Here 'Rita and her friends' (subject) perform the action. Passive Voice: A skit was performed by Rita and her friends. Here 'skit' is the subject (at which the action is directed).</p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>My younger brother is surprisingly good _________ solving complex mathematical problems.</p>",
    "options": [
      "in",
      "on",
      "with",
      "at"
    ],
    "correct_option_id": 3,
    "solution": "<p>The context of the sentence is about having a skill or ability in a particular activity (\"solving problems\"). The blank requires a preposition that correctly follows the adjective \"good\" to denote skill.</p><p>The correct option is <b>\"at.\"</b> The phrase <b>\"good at something\"</b> is the standard English phrase used to express that someone has a talent or skill in a particular area.</p><p>The other options are incorrect: <b>\"good in\"</b> is sometimes used, but \"good at\" is more precise for skills and activities. <b>\"good on\"</b> and <b>\"good with\"</b> (which is used for handling people or tools) are not used in this context.</p><p>Thus, the correct sentence is: \"My younger brother is surprisingly good <b>at</b> solving complex mathematical problems.\"</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>Our new office is situated / conveniently at the third floor / of the modern skyscraper / in the city centre.</p>",
    "options": [
      "of the modern skyscraper",
      "Our new office is situated",
      "conveniently at the third floor",
      "in the city centre"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the use of the preposition \"at\" to refer to a specific floor of a building. The correct preposition to use for floors is \"on.\" We say something is \"on the first floor,\" \"on the second floor,\" etc.</p><p><b>Correct sentence:</b> Our new office is situated conveniently <b>on</b> the third floor of the modern skyscraper in the city centre.</p><p>So, there is an error in the part mentioned in option c).</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 11
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>My uncle has been</u> practising <u>law in the high court</u> <u>since fifteen years</u> with great <u>success and reputation</u>.</p>",
    "options": [
      "success and reputation",
      "My uncle has been",
      "since fifteen years",
      "law in the high court"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the use of the preposition \"since\". \"Since\" is used to denote a specific point in time in the past (e.g., since 2008, since Monday). \"For\" is used to denote a period or duration of time (e.g., for two hours, for ten years). As \"fifteen years\" is a period of time, the correct preposition is \"for\".</p><p>Correct sentence: My uncle has been practising law in the high court <b>for</b> fifteen years with great success and reputation.</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 12
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence.</p><p>The CEO will preside <u>on the annual general meeting</u> of the company tomorrow.</p>",
    "options": [
      "over the annual general meeting",
      "at the annual general meeting",
      "in the annual general meeting",
      "upon the annual general meeting"
    ],
    "correct_option_id": 0,
    "solution": "<p>The error in the underlined segment is the use of the preposition \"on\" with the verb \"preside.\" The correct preposition to follow \"preside\" is \"over.\" The phrasal verb \"preside over\" means to be in charge of a formal meeting or ceremony.</p><p><b>Option a) over the annual general meeting</b> is correct as it uses the correct preposition \"over\" to form the phrasal verb.</p><p><b>Option b) at the annual general meeting</b> is incorrect. While \"at\" can be used for location, it does not form the correct phrasal verb with \"preside.\"</p><p><b>Option c) in the annual general meeting</b> is incorrect because of incorrect preposition again.</p><p><b>Option d) upon the annual general meeting</b> is incorrect because of incorrect preposition again.</p><p><b>Correct Sentence:</b> The CEO will preside <b>over</b> the annual general meeting of the company tomorrow.</p><p>Hence, the most appropriate choice is <b>a) over the annual general meeting</b>.</p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate option to substitute the underlined segment in the given sentence.</p><p>The new policy is not applicable <u>for everyone in the organisation</u> yet.</p>",
    "options": [
      "with everyone in the organisation",
      "on everyone in the organisation",
      "to everyone in the organisation",
      "about everyone in the organisation"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error in the underlined segment is the use of the preposition \"for\" after the adjective \"applicable.\" The correct preposition to use is \"to.\" The phrase \"applicable to\" someone or something is a fixed expression meaning that a rule or law affects them.</p><p><b>Option c) to everyone in the organisation</b> is correct as it uses the correct preposition \"to\" with \"applicable.\"</p><p>All other options are incorrect because of incorrect preposition usage. </p><p><b>Correct Sentence:</b> The new policy is not applicable <b>to</b> everyone in the organisation yet.</p><p>Hence, the most appropriate choice is <b>c) to everyone in the organisation</b>.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The naughty child jumped _________ the river to retrieve his floating ball.</p>",
    "options": [
      "on",
      "in",
      "at",
      "into"
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence describes an action involving movement from one place (outside the river) to another (inside the river). The blank requires a preposition that correctly conveys this motion from outside to inside.</p><p>The correct option is <b>\"into.\"</b> The preposition <b>\"into\"</b> is used to show movement towards the inside of a place.</p><p>The other options are incorrect: <b>\"in\"</b> is used to indicate a position or state of being already inside something (e.g., he was swimming in the river). <b>\"on\"</b> indicates a position on a surface. <b>\"at\"</b> indicates a specific point or location.</p><p>Thus, the correct sentence is: \"The naughty child jumped <b>into</b> the river to retrieve his floating ball.\"</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 15
  },
  {
    "question": "<p>The following sentence has been divided into four segments. Identify the segment that contains an error.</p><p>My father was very angry / on me for breaking / his favourite expensive vase / while playing cricket inside.</p>",
    "options": [
      "while playing cricket inside",
      "his favourite expensive vase",
      "on me for breaking",
      "My father was very angry"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the use of the preposition \"on\" after \"angry.\" When one is angry with a person, the correct preposition to use is \"with.\" The preposition \"at\" is used when one is angry about a thing or a situation. Since the father is angry with a person (\"me\"), \"with\" should be used.</p><p><b>Correct sentence:</b> My father was very angry <b>with</b> me for breaking his favourite expensive vase while playing cricket inside.</p><p>So, there is an error in the part mentioned in option c).</p><p>Hence, option (c) is the answer.</p>",
    "question_index": 16
  },
  {
    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p><u>The inheritance was fairly</u> distributed <u>between the five siblings</u> according <u>to the last</u> will <u>of their father</u>.</p>",
