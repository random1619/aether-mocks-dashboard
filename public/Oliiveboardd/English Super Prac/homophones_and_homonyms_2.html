<body>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>Select the most appropriate homonyms from the given alternatives to fill in the blanks.</p><p>The judge decided to ________ the case to ________ it.</p><p>A. close (shut)</p><p>B. clause (provision in legal text)</p><p>C. close (end/conclude)</p>",
    "options": [
      "A, B",
      "B, C",
      "B, A",
      "C, A"
    ],
    "correct_option_id": 3,
    "solution": "<p>First blank: The verb \"close\" (C) fits correctly as it refers to ending or concluding the case.</p><p>Second blank: The verb \"close\" (A) refers to shutting or finishing something, which aligns with the meaning in this context.</p><p>The judge is performing an action (verb), so the appropriate homonyms must align logically to form a meaningful sentence.</p><p>The complete sentence is: The judge decided to close the case to close it.</p><p>Hence, the correct answer is option (d).</p>",
    "question_index": 0
  },
  {
    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>The homophone for the word 'sight' is ________.</p>",
    "options": [
      "sit",
      "site",
      "size",
      "sigh"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct homophone for \"sight\" is \"site\" as they are pronounced the same but have different meanings:</p><p>Sight: Refers to the ability to see or view.</p><p>Site: Refers to a location or place.</p><p>Sit: Incorrect because, 'sit' denotes 'be or remain in a particular position or state', which is contextually irrelevant to 'sight.'</p><p>Size: Incorrect because 'size' has a different pronunciation and meaning, referring to dimensions or magnitude.</p><p>Sigh: Incorrect because 'sigh' has a different pronunciation and refers to an audible exhale expressing emotion.</p><p>Hence, the correct answer is option (b).</p>",
    "question_index": 1
  },
  {
    "question": "<p>Select the most appropriate homonym of the underlined word to fill in the blank.</p><p>She <u>wrote</u> a heartfelt letter to her grandmother. In this beautifully ______ letter, she expressed her gratitude and love.</p>",
    "options": [
      "wrought",
      "rote",
      "rot",
      "rout"
    ],
    "correct_option_id": 0,
    "solution": "<p>The blank requires an adjective that can be aptly modified by the adverb 'beautifully' and which can also modify the noun 'letter'. </p><p>Wrought  -  Adjective - made or done in a careful or decorative way</p><p>Rote  -  Noun - mechanical or habitual repetition of something to be learned.</p><p>Rot  -  Verb - (chiefly of animal or vegetable matter) decay or cause to decay by the action of bacteria and fungi; decompose.</p><p>Rout  -  Noun - a disorderly retreat of defeated troops.</p><p>Since among the given options, only 'wrought' is an adjective, it is an apt word to fill the blank. </p><p>Filling the blank with ''wrought' would imply that the letter was beautifully decorated. </p><p>The complete sentence is: She <u>wrote</u> a heartfelt letter to her grandmother. In this beautifully wrought letter, she expressed her gratitude and love.</p><p>Hence, option (a) is the correct answer. </p>",
    "question_index": 2
  },
  {
    "question": "<p>Select the most appropriate homonym of the underlined word to fill in the blank.</p><p>He <u>bowed</u> to the audience after his performance. His performance ______ well for the future of the organization.</p>",
    "options": [
      "board",
      "bald",
      "bough",
      "bode"
    ],
    "correct_option_id": 3,
    "solution": "<p>In this sentence, the context suggests that the blank needs to be filled with a word that describes the gesture he received from the audience after bowing.</p><p>\"Board\" is not the correct choice. It's a verb that refers to get on or into (a ship, aircraft, or other vehicle). It doesn't fit the context of a performance and audience appreciation. \"Board\" as a noun also does not fit in the sentence contextually.</p><p>\"Bald\" is not the correct choice. It's an adjective that describes a lack of hair. It doesn't fit the context of the sentence.</p><p>\"Bough\" is not the correct choice. It's a noun that refers to a main branch of a tree. It doesn't fit the context of the sentence.</p><p>\"Bode\" is the correct choice. In this context, \"bode\" means to be a sign of something good or bad for the future. The sentence indicates that he received a positive response from the audience, which matches the context of appreciation after a performance.</p><p>Hence, option (d) is the correct answer.</p>",
    "question_index": 3
  },
  {
    "question": "<p>Select the most appropriate homophone to fill in the blank.</p><p>She saw a movie with her friends. She liked the _______ of the story.</p>",
    "options": [
      "soar",
      "sore",
      "source",
      "sauce"
    ],
    "correct_option_id": 2,
    "solution": "<p>The most appropriate homophone to fill in the blank is 'source'. This word means the origin or basis of something. Filling the blank with 'source' implies that the subject 'she' liked the origins of the movie. Other options do not fit the blank contextually. 'Soar' means to fly or rise high in the air, 'sore' means painful or inflamed, and 'sauce' means a liquid or semi-liquid substance that adds flavour to food.</p><p>Hence, option (c) is the correct answer.</p>",
    "question_index": 4
  },
  {
    "question": "<p>Select the most appropriate homophone of the underlined word to fill in the blank.</p><p>She decided to <u>wear</u> her new jewellery. It is made of silver ______.</p>",
    "options": [
      "were",
      "ware",
      "weir",
      "where"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most appropriate homophone of the underlined word to fill in the blank is 'ware'. This word means manufactured articles of a specified type. The other options are not suitable homophones of the verb 'wear', which means to have on one's body or part of one's body as clothing, decoration, protection, or for some other purpose. 'Were' means second person singular past, plural past, and past subjunctive of be, 'weir' means a low dam built across a river to raise the level of water upstream or regulate its flow, and 'where' means in or to what place or position.</p><p>Hence, option (b) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<p>Select the most appropriate homonym of the underlined word to fill in the blank.</p><p>She felt a <u>draft</u> as the wind blew through the open window. She quickly closed the curtains to block the _______.</p>",
    "options": [
      "droit",
      "draught",
      "trout",
      "drought"
    ],
    "correct_option_id": 1,
    "solution": "<p>In the sentence, \"draft\" refers to a current of air. The context suggests that the blank needs to be filled with a word that describes the thing that she was trying to block by closing the curtains. </p><p>\"Droit\" is not the correct choice. It's a French term that refers to a legal right or privilege. It doesn't fit the context of the sentence.</p><p>\"Draught\" is the correct choice. It refers to a current of air. It fits the context of the wind blowing through the open window and causing a sensation of air movement.</p><p>\"Trout\" is not the correct choice. It's a type of fish. It doesn't fit the context of the sentence, which is about blocking something related to air movement.</p><p>\"Drought\" is not the correct choice. It's a noun that refers to a prolonged period of abnormally low rainfall, leading to a shortage of water. It doesn't fit the context of the sentence.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 6
  },
  {
    "question": "<p>Select the most appropriate homophones to fill the blanks.</p><p>The chef _____ the _____ with spices.</p>",
    "options": [
      "seasoned, meet",
      "seasoned, meat",
      "season, meet",
      "seasons, meet"
    ],
    "correct_option_id": 1,
    "solution": "<p>\"Seasoned\" means to add flavour to food by adding spices, herbs, or other condiments. \"Meat\" refers to the flesh of animals used as food. In this context, the chef is seasoning the meat, which is a common culinary practice to enhance its flavour.</p><p>The completed sentence is \"The chef seasoned the meat with spices.\"</p><p>Hence, option (b) is correct. </p>",
    "question_index": 7
  },
  {
    "question": "<p>Select the most appropriate homophones to fill in the blanks.</p><p>The ___________ of the worker was very loud when he found the ___________.</p>",
    "options": [
      "roar; ore",
      "ore; roar",
      "roar; roar",
      "ore; ore"
    ],
    "correct_option_id": 0,
    "solution": "<p>Option (a) is the correct choice. </p><p>A <b>roar</b> is a loud, deep sound uttered by a person or crowd. An <b>ore</b> is a naturally occurring solid material from which a metal or valuable mineral can be extracted. The sentence is about the excitement of the worker when he found the mineral. </p>",
    "question_index": 8
  },
  {
    "question": "<p>Select the most appropriate homophones to fill in the blanks.</p><p>He had ___________ his ___________ in the pond and watched the ripples.</p>",
    "options": [
      "throne; thrown",
      "thrown; throne",
      "throne; throne",
      "thrown; thrown"
    ],
    "correct_option_id": 1,
    "solution": "<p>Option (b) is the correct choice. </p><p><b>Thrown</b> is a verb which means to propel something with force through the air by a movement of the arm and hand. A <b>throne</b> is a ceremonial chair for a sovereign, bishop, or similar figure. The sentence is about a person who propelled his ceremonial chair in the pond and watched the ripples.</p>",
    "question_index": 9
  },
  {
    "question": "<p>Select the most appropriate homophone of the underlined word to fill in the blank.</p><p>She had to <u>write</u> a report tomorrow. The report is about the ancient _______ of the Egyptians.</p>",
    "options": [
      "right",
      "rite",
      "wright",
      "straight"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most appropriate homophone of the underlined word to fill in the blank is 'rite'. This word means a religious or other solemn ceremony or act. It is also an apt homophone of 'write', which means to mark letters, words, or symbols on a surface, typically paper, with a pen, pencil, or similar implement. 'Right' means correct or morally good/a moral or legal entitlement to have or do something, 'wright' means a maker or builder, and 'straight' means continuing in one direction without bending or curving.</p><p>'Rights' [legal, social, or ethical principles of freedom or entitlement] would have been correct in place of 'right'.</p><p>Hence, option (b) is the correct answer.</p>",
    "question_index": 10
  },
  {
    "question": "<p>Select the most appropriate homophone of the underlined word to fill in the blank.</p><p>The bookstore had a huge <u>sale</u> on musical books, so he bought one to learn the ______ on his guitar.</p>",
    "options": [
      "sail",
      "gale",
      "seal",
      "scale"
    ],
    "correct_option_id": 3,
    "solution": "<p>The most appropriate homophone of the underlined word to fill in the blank is 'scale'. This word means an arrangement of the notes in any system of music in ascending or descending order of pitch. The other options are not suitable homophones of 'sale', which means a period during which a shop or dealer sells goods at reduced prices. 'Sail' means a piece of material extended on a mast to catch the wind and propel a boat or ship or other vessel, 'gale' means a very strong wind, and 'seal' means a marine mammal or a device that prevents leakage.</p><p>Hence, option (d) is the correct answer. </p>",
    "question_index": 11
  },
  {
    "question": "<p>Select the most appropriate homophone to fill in the blank. </p><p>Authorities conducted a _____ on the illegal gambling den last night.</p>",
    "options": [
      "Raid",
      "Red",
      "Read",
      "Ride"
    ],
    "correct_option_id": 0,
    "solution": "<p>Raid: A \"raid\" is a sudden and surprise attack or assault, typically carried out by law enforcement or other authorities.</p><p>Red: \"Red\" is a colour.</p><p>Read: \"Read\" is the past tense of the verb \"to read,\" which means to interpret and understand written or printed material.</p><p>Ride: \"Ride\" refers to the action of sitting on and controlling the movement of an animal, vehicle, or device.</p><p>In the given sentence, the context is about authorities taking action against an illegal gambling den, and the appropriate term to fill in the blank is the action of a sudden and surprise attack, which is a \"raid.\" Hence, (a) is the correct answer. </p><p>The sentence would read: \"Authorities conducted a raid on the illegal gambling den last night.\"</p>",
    "question_index": 12
  },
  {
    "question": "<p><b> </b>Select the most appropriate homonym to fill in the blank.</p><p>The diver watched in awe as a sleek _____ gracefully glided through the water.</p>",
    "options": [
      "Cell",
      "Seal",
      "Sell",
      "Ceil"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given sentence describes a sleek creature gracefully gliding through the water, which fits the behaviour of a 'seal', a marine mammal. Hence, (b) is the correct answer. </p><p>The final sentence: The diver watched in awe as a sleek seal gracefully glided through the water. </p><p>\"Cell\" refers to the smallest structural and functional unit of an organism.</p><p>\"Sell\" means to exchange goods or services for money.</p><p>\"Ceil\" refers to the overhead interior surface of a room. </p>",
    "question_index": 13
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank. </p><p>The ointment helped ___ the cut on her finger within a few days.</p>",
    "options": [
      "He'll",
      "Heal",
      "Heel",
      "Hell"
    ],
    "correct_option_id": 1,
    "solution": "<p>The most appropriate homonym to fill in the blank is 'heal'. \"Heal\" means to become healthy again, especially after an injury or illness. The given sentence suggests that the ointment helped the cut on her finger recover within a few days. Other options do not fit the context of the sentence. \"He'll\" is a contraction of \"he will\". \"Heel\" refers to the back part of the foot below the ankle. \"Hell\" is a place regarded in various religions as a spiritual realm of evil and suffering.</p><p>The complete sentence is: The ointment helped heal the cut on her finger within a few days.</p><p>Hence, (b) is the correct answer.</p>",
    "question_index": 14
  },
  {
    "question": "<p>Select the most appropriate homophones to fill in the blanks. </p><p>His ____ in the play required him to ____ a giant prop onto the stage. </p>",
    "options": [
      "Role, roll",
      "Roll, role",
      "Roles, rolls",
      "Rolls, role"
    ],
    "correct_option_id": 0,
    "solution": "<p>The first blank requires a part that a person played in the play. This is commonly referred to as a \"role.\" A \"role\" in a play or performance is the character or part that an actor portrays.</p><p>The second blank requires the action of moving a giant prop onto the stage. This action is commonly described as \"rolling\". \"Roll\" in this context means to move something by turning it over and over, typically on wheels or by pushing it.</p><p><b>The complete sentence is: </b>His <b>role</b> in the play required him to <b>roll</b> a giant prop onto the stage.</p><p>Hence, (a) is the correct answer.</p><p>Note: Option c) is incorrect as the infinitive marker 'to' is to be followed by the base verb only, whereas 'rolles' is the third person singular form of the verb.</p><p>Infinitive marker: A word or affix attached to the stem of a verb in order to form the full infinitive. In English, to is the infinitive marker.</p>",
    "question_index": 15
  },
  {
    "question": "<p>Select the most appropriate homonym to fill in the blank. </p><p>Neha decided to ____ a new car after saving up for months.</p>",
    "options": [
      "Buy",
      "By",
      "Bye",
      "Bay"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most appropriate homonym to fill in the blank is 'buy'. \"Buy\" means to purchase something in exchange for money. In the given sentence, it indicates that Neha plans to make a purchase. Other words do not fit the context of the sentence. The word \"by\" indicates a method or means. \"Bye\" is a casual shortening of \"goodbye,\" used to bid farewell to someone. A \"bay\" refers to a broad inlet of the sea where the land curves inward. </p><p>The complete sentence is: Neha decided to buy a new car after saving up for months.</p><p>Hence, (a) is the correct answer. </p>",
    "question_index": 16
  },
  {
    "question": "<p><b> </b>Select the most appropriate homonym to fill in the blanks. </p><p>A ____ rolled down his cheek as he watched the emotional scene unfold. </p>",
    "options": [
      "Tire",
      "Tear",
      "Tyre",
      "Tree"
    ],
    "correct_option_id": 1,
    "solution": "<p>Among the options provided, \"tear\" is the correct homonym to fill in the blank, as it appropriately fits the context of a drop of liquid rolling down someone's cheek due to emotion. Hence, (b) is the correct answer.</p><p>The final sentence: A tear rolled down his cheek as he watched the emotional scene unfold.</p><p>Tire- grow weary or become fatigued.</p><p>Tyre- rubber covering of a wheel</p><p>Tree- a large plant with a trunk and branches made of wood, typically growing in the ground.</p>",
    "question_index": 17
  },
  {
    "question": "<p><b> </b>Select the most appropriate homonym to fill in the blank.</p><p>She felt _____ and exhausted, unable to complete her usual daily activities with ease.</p>",
    "options": [
      "Week",
      "Wake",
      "Woke",
      "Weak"
    ],
    "correct_option_id": 3,
    "solution": "<p>In the given sentence, the word that fits best is \"weak\" because it describes the feeling of lacking strength or energy, which matches the context of the sentence where the person is unable to complete their usual daily activities with ease due to feeling tired and exhausted. Hence, (d) is the correct answer. </p><p>The final sentence: She felt weak and exhausted unable to complete her usual daily activities with ease. </p><p>Week - A \"week\" is a period of seven days.</p><p>Wake - To wake means to emerge or become aware after sleep.</p><p>Woke  -  \"Woke\" is the past tense of 'wake', meaning to have emerged or become aware after sleep. </p>",
    "question_index": 18
  },
  {
    "question": "<p><b> </b>Select the most appropriate homonym to fill in the blank.</p><p>She decided to _____ patiently at the bus stop for her friend to arrive. </p>",
    "options": [
      "Wait",
      "Weight",
      "Wheat",
      "Vote"
    ],
    "correct_option_id": 0,
    "solution": "<p>In the given sentence, the word that fits best is \"wait\" because it describes the action of remaining patiently at the bus stop for her friend to arrive, which matches the context of the sentence. Hence, (a) is the correct answer. </p><p>The final sentence: She decided to wait patiently at the bus stop for her friend to arrive. </p><p>Weight  -  \"Weight\" refers to the measure of the heaviness of an object, typically in pounds or kilograms.</p><p>Wheat  -  \"Wheat\" is a cereal grain that is a staple food in many parts of the world.</p><p>Vote  -  \"Vote\" is the formal expression of a choice or opinion in an election or other group decision.</p>",
    "question_index": 19
  }
];
    </script>
