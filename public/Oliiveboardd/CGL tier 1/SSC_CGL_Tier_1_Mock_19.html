    "question": "<span class=\"eqt\"><p>25 persons started a work together, but after some days, 9 persons leave. As a result, the job, which could have been completed in 62 days, was completed in 80 days. How many days after commencement of the work did the nine persons leave?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; 25 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2344;&#2375; &#2319;&#2325; &#2325;&#2366;&#2350; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2325;&#2369;&#2331; &#2342;&#2367;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342; 9 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366;&#2350; &#2331;&#2379;&#2337;&#2364; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346;, &#2332;&#2379; &#2325;&#2366;&#2350; 62 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379;&#2344;&#2366; &#2341;&#2366;, &#2357;&#2361; &#2309;&#2348; 80 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2366;&#2350; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344; &#2348;&#2366;&#2342; &#2344;&#2380; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366;&#2350; &#2331;&#2379;&#2337;&#2364; &#2325;&#2352; &#2330;&#2354;&#2375; &#2327;&#2319; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>",
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the number of days be X after which the four persons leave the work after commencement.</p><p>Total work = 25 * 62 units</p><p>Total work = [25X + 16(80  -  X)] units</p><p>Now,</p><p>1550 = 25X + 1280  -  16X</p><p>270 = 9X</p><p>X = 30</p>",
    "question_index": 59
  },
  {
    "question": "<span class=\"eqt\"><p><div>&nbsp;If A = 3 x&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">t  -  1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">5</span></div>&nbsp;and B = 2t + 3, then for what value of t is A = B.&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; A = 3 x <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">t  -  1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">5</span></div> &#2324;&#2352; B = 2t + 3 &#2361;&#2376;, &#2340;&#2379; t &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; A = B &#2361;&#2379;&#2327;&#2366;?</div></p></span>",
    "options": [
      "<span class=\"eqt\">-18/7</span><span class=\"hqt\" style=\"display:none\">-18/7</span>",
      "<span class=\"eqt\">-11/5</span><span class=\"hqt\" style=\"display:none\">-11/5</span>",
      "<span class=\"eqt\">-13/5</span><span class=\"hqt\" style=\"display:none\">-13/5</span>",

    "solution": "<p>According to the question,</p><p>A = B</p><p>3 * (t  -  1)/5 = 2t + 3</p><p>3t  -  3 = 10t + 15</p><p>7t = -18</p><p>t = -18/7</p>",
    "question_index": 60

  {
    "question": "<span class=\"eqt\"><p>When a number is divided successively by 8, 13, and 18, we get the remainder of 5, 7, and 9, respectively. When the same number is divided successively by 18, 13, and 8, we get the remainder of A, B, and C, respectively. Find the value of (A + B  -  C).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2325;&#2367;&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; 8, 13 &#2324;&#2352; 18 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2361;&#2350;&#2375;&#2306; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 5, 7 &#2324;&#2352; 9 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2332;&#2348; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; 18, 13 &#2324;&#2352; 8 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2361;&#2350;&#2375;&#2306; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; A, B &#2324;&#2352; C &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; (A + B - C) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let in the first condition, the last quotient be 1. </p><p>So, dividend for 18 = 18 * 1 + 9 = 27 </p><p>Dividend for 13 = 13 * 27 + 7 = 358 </p><p>Dividend for 8 = 8 * 358 + 5 = 2869 </p><p>So, the number is 2869 </p><p>Now, </p><p>2869/18, Quotient = 159 and Remainder (A) = 7</p><p>159/13, Quotient = 12 and remainder (B) = 3 </p><p>12/8, Quotient = 1 and remainder (C) = 4 </p><p>Hence, A + B  -  C = 7 + 3  -  4 = 6 </p>",
    "question_index": 61
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following fraction given below has second highest value?</p><p><img width=117 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p10924/image010.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2319; &#2327;&#2319; &#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2366; &#2342;&#2370;&#2360;&#2352;&#2366; &#2313;&#2330;&#2381;&#2330;&#2340;&#2350; &#2350;&#2366;&#2344; &#2361;&#2376;?</p><p><img width=\"117\" height=\"37\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p10924/image010.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">19/36</span><span class=\"hqt\" style=\"display:none\">19/36</span>",
      "<span class=\"eqt\">5/9</span><span class=\"hqt\" style=\"display:none\">5/9</span>",
      "<span class=\"eqt\">7/12</span><span class=\"hqt\" style=\"display:none\">7/12</span>",
      "<span class=\"eqt\">11/18</span><span class=\"hqt\" style=\"display:none\">11/18</span>"

    "correct_option_id": 2,
    "solution": "<p>To compare fractions, we have to make either their denominator equal or numerator equal.</p><p>To make denominator equal, first take LCM of denominators.</p><p>LCM of 12, 9, 18 and 36 = 36</p><p><img width=119 height=145 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p10924/image011.png\"></p><p>Since, 21/36 has second highest value.</p><p>Hence, required fraction is 7/12</p>",

    "question": "<span class=\"eqt\"><p>The cost price of the two articles is equal. One article is sold at a profit of 28% and the other article for Rs. 2280 more than the first. If the net profit is 30%, then what is the cost price of each article?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; 28% &#2354;&#2366;&#2349; &#2346;&#2352; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; &#2342;&#2370;&#2360;&#2352;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; &#2346;&#2361;&#2354;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2360;&#2375; 2280 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2343;&#2367;&#2325; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2344;&#2367;&#2357;&#2354; &#2354;&#2366;&#2349; 30% &#2361;&#2376;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 57000</span><span class=\"hqt\" style=\"display:none\">57000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 55000</span><span class=\"hqt\" style=\"display:none\">55000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 52000</span><span class=\"hqt\" style=\"display:none\">52000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs. 54000</span><span class=\"hqt\" style=\"display:none\">54000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the CP of each article be Rs.100.</p><p>Total CP = Rs.200</p><p>Final SP = 200 x 130/100 = Rs.260</p><p>SP of first article = 100 x 128/100 = Rs.128</p><p>SP of second article = 260 - 128 = Rs.132</p><p>The difference between the selling price = Rs.4</p><p>When the difference is Rs.4, then CP = Rs.100</p><p>When the difference is Rs.2280, then CP = 100 x 2280/4 = Rs.57000</p>",
    "question_index": 66

    "question": "<span class=\"eqt\"><p>In &#916;PQR, &#8736;Q is a right angle. S is a point on the line PQ such that PS = 6 cm, SR = 13 cm and QR = 5 cm. What is the value of PR?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#916;PQR &#2350;&#2375;&#2306;, &#8736;Q &#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339; &#2361;&#2376;| &#2352;&#2375;&#2326;&#2366; PQ &#2346;&#2352; S &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376; &#2325;&#2367; PS = 6 &#2360;&#2375;&#2350;&#2368;, SR = 13 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; QR = 5 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;| PR &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>According to the question:</p><p><img width=157 height=171 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p7893/image003.jpg\" ></p><p>Here, PS = 6 cm, SR = 13 cm, QR = 5 cm</p><p>Then, by Pythagoras Theorem:</p><p>SR<sup>2</sup> = SQ<sup>2</sup> + QR<sup>2</sup></p><p>13<sup>2</sup> = SQ<sup>2</sup> + 5<sup>2</sup></p><p>SQ = 12 cm</p><p>Then, PQ = PS + SQ = 6 + 12 = 18 cm</p><p>Therefore, again by Pythagoras Theorem:</p><p>PR<sup>2</sup> = PQ<sup>2</sup> + QR<sup>2</sup></p><p>PR<sup>2</sup> = 18<sup>2</sup> + 5<sup>2</sup></p><p><b>PR = &radic;349 cm</b></p>",

    "question": "<span class=\"eqt\"><p>A borrowed a certain amount from B, agreeing to pay 10% rate of simple interest after one year. A then invested the borrowed sum in a scheme and made a profit of 6% after repaying B the principal along with the interest. What would have been the percentage profit for B if he had directly invested in the scheme instead?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2344;&#2375; B &#2360;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368; &#2340;&#2341;&#2366; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2348;&#2366;&#2342; 10% &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2375;&#2344;&#2375; &#2346;&#2352; &#2360;&#2361;&#2350;&#2340; &#2361;&#2369;&#2310;&#2404; A &#2344;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368; &#2327;&#2312; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2325;&#2379; &#2319;&#2325; &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2340;&#2341;&#2366; B &#2325;&#2379; &#2350;&#2370;&#2354;&#2343;&#2344; &#2325;&#2375; &#2360;&#2366;&#2341;-&#2360;&#2366;&#2341; &#2348;&#2381;&#2351;&#2366;&#2332; &#2330;&#2369;&#2325;&#2366;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; 6% &#2325;&#2366; &#2354;&#2366;&#2349; &#2325;&#2350;&#2366;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; B &#2344;&#2375; &#2360;&#2368;&#2343;&#2375; &#2351;&#2379;&#2332;&#2344;&#2366; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2361;&#2379;&#2340;&#2366;, &#2340;&#2379; &#2313;&#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2354;&#2366;&#2349; &#2361;&#2379;&#2340;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">16%</span><span class=\"hqt\" style=\"display:none\">16%</span>",
      "<span class=\"eqt\">15%</span><span class=\"hqt\" style=\"display:none\">15%</span>",
      "<span class=\"eqt\">10%</span><span class=\"hqt\" style=\"display:none\">10%</span>",
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the principal amount = Rs. 100</p><p>Interest paid to R = 10%</p><p>Time = 1 year</p><p>SI = (P * R * T)/100</p><p>=&gt; (100 * 10 * 1)/100 = 10</p><p>Amount = 100 + 10 = Rs. 110</p><p>5% profit on initial amount = 6/100 * 100 = Rs. 6</p><p>Total earning = 110 + 6 = Rs. 116</p><p>Gain% = (116  -  100)/100 * 100 = 16%</p>",
    "question_index": 68

    "question": "<p>Select the option that expresses the given sentence in past tense form. </p><p>The painting has been auctioned and the final bid exceeded all expectations.</p>",

    "correct_option_id": 3,
    "solution": "<p>To convert the sentence into the past tense, we need to identify the appropriate past tense form of the verb and the context in which it fits. The given sentence uses the present perfect passive tense (\"has been auctioned\") for the first clause, indicating an action that occurred at an unspecified time before now. To express this in the past tense, we change it to the past simple passive tense, which is \"was auctioned.\" Similarly, the second clause uses the past simple tense \"exceeded,\" which aligns with the past tense of the first clause. Both clauses are in simple past tense. Hence, (d) is the correct answer. </p><p>(a): simple future tense (in passive voice) (will be auctioned)</p><p>(b): simple present tense (in passive voice) (is auctioned)</p><p>(c): present continuous tense (in passive voice) (is being auctioned)</p>",

    "question": "<p> The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer.</p><p>The teacher has / saw significant improvement / in the students' work.</p>",
    "options": [
      "No error",
      "The teacher has",
      "Saw significant improvement",
      "In the students' work"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in option (c). The error is related to the verb form 'saw'. The sentence is in the present perfect tense (indicated by the helping verb 'has'). In this tense, \"has\" or \"have\" is used with the past participle of the verb. But \"saw\" is the simple past tense form (not the past participle form). Accordingly, it should be replaced with \"seen\" (past participle form). Hence, (c) is the correct answer. </p><p><b>The correct sentence is:</b> The teacher has seen significant improvement in the students' work.</p><p><b>NOTE:</b></p><p><b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 78
  },

    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p><u>A little</u> concepts that I mugged up before the exams were enough to get me through this semester.</p>",

    "solution": "<p>&#183;<b>Few </b>deals with <b>plural countable nouns.</b></p><p>&#183;For example: Books, papers, etc.</p><p>&#183;<b>\"Concepts\"</b> is also <b>plural countable noun</b>.</p><p>&#183;The subdivisions are given below in the table:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Few</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Nothing</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>A Few</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Something</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>The Few</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sufficient</td></tr></table><p>&#183;<b>\"The few\"</b> denotes sufficient.</p><p>&#183;In this context, the few chapters that the student remembered were sufficient for him to pass. Thus, <b>\"The few\"</b> is appropriate here.</p><p>&#183;\"A/The Little\" deals with plural uncountable nouns. Thus, option (a) is incorrect.</p><p>&#183; Option (b) is also grammatically incorrect as reflected by the table above.</p><p>&#183;Thus, <b>\"The few\"</b> should replace <b>\"A little\".</b></p><p>&#183;Therefore, the correct answer is:<b>(d) The few.</b></p><p>&#183;The corrected form of the sentence is:<u>The few</u> concepts that I mugged up before the exams were enough to get me through this semester.</p><p>Additional Information:</p><p>&#183;<b>Little</b> deals with <b>plural uncountable nouns.</b></p><p>&#183;For example: Water, oil, etc.</p><p>&#183;The subdivisions are given below in the table:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Little</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Nothing</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>A Little</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Something</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>The Little</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sufficient</td></tr></table>",
