<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cgl1 - Responsive Exam Interface</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->

ck;padding:5px;\">T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td></tr></table><p>Option (c):</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Y</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td></tr></table><p>Option (d):</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"   {
    "question": "<span class=\"eqt\"><p>'P @ Q' means 'P is the wife of Q'</p><p>'P # Q' means 'P is the brother of Q'</p><p>'P % Q' means 'P is the daughter of Q'</p><p>'P &amp; Q' means 'P is the father of Q'</p><p>As per which of the following expressions 'A is the brother's son of D'?</p></span><span class=\"hqt\" style=\"display:none\"><p>'P @ Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;'</p><p>'P # Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;'</p><p>'P % Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;'</p><p>'P &amp; Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'P, Q &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; 'A, D &#2325;&#2375; &#2349;&#2366;&#2312; &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;'?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>Option (a): A # B % C @ E # D</p><p>A # B means 'A is the brother of B'</p><p>B % C means 'B is the daughter of C'</p><p>C @ E means 'C is the wife of E'</p><p>E # D means 'E is the brother of D'</p><p><img width=228 height=116 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25323/image017.png\"></p><p>A is D's brother's son.</p><p>Option (b): A &amp; C # E % B % D</p><p>A &amp; C means 'A is the father of C'</p><p>C # E means 'C is the brother of E'</p><p>E % B means 'E is the daughter of B'</p><p>B % D means 'B is the daughter of D'</p><p><img width=173 height=256 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25323/image018.png\"></p><p>A is D's grandson's son.</p><p>Option (c): A &amp; B @ C # E % D</p><p>A &amp; B means 'A is the father of B'</p><p>B @ C means 'B is the wife of C'</p><p>C # E means 'C is the brother of E'</p><p>E % D means 'E is the daughter of D'</p><p><img width=253 height=112 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25323/image019.png\"></p><p>A is D's daughter-in-law's father.</p><p>Option (d): A # E &amp; B % D % C</p><p>A # E means 'A is the brother of E'</p><p>E &amp; B means 'E is the father of B'</p><p>B % D means 'B is the daughter of D'</p><p>D % C means 'D is the daughter of C'</p><p><img width=267 height=176 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25323/image020.png\"></p><p>A is the brother-in-law of D.</p><p>Thus, the answer is option (a).</p>",

    "options": [

      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",

    "correct_option_id": 2,
    "solution": "<p>In this, the sum of the position of the first and last alphabet of the word according to the alphabetical series. </p><p>SMART ---- Position of S + Position of T = 19 + 20 = 39</p><p>HEAD ---- Position of H + Position of D = 8 + 4 = 12</p><p>Similarly, </p><p>MODEL ---- Position of M + position of L = 13 + 12 = 25</p>",

    "question": "<span class=\"eqt\"><p>Select the correct combination of mathematical signs that sequentially replace the * signs and balance the given equation. </p><p>32 * 17 * 48 * 3 * 0.5 = 41</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2360; &#2360;&#2361;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; * &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>32 * 17 * 48 * 3 * 0.5 = 41</p></span>",
    "options": [
      "<span class=\"eqt\">&div;, +, x,  -</span><span class=\"hqt\" style=\"display:none\">&div;, +, x, -</span>",
      "<span class=\"eqt\">x, +,  - , &div;</span><span class=\"hqt\" style=\"display:none\">x, +, - , &div;</span>",
      "<span class=\"eqt\">- , x, +, &div;</span><span class=\"hqt\" style=\"display:none\">- , x, +, &div;</span>",
      "<span class=\"eqt\">+,  - , &div;, x</span><span class=\"hqt\" style=\"display:none\">+, - , &div;, x</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The given equation is: 32 * 17 * 48 * 3 * 0.5 = 41</p><p>Option (a): when * signs are replaced by &div;, +, x,  -  signs, the equation will be: </p><p>32 &div; 17 + 48 x 3  -  0.5 = 41</p><p>1.88 + 144  -  0.5 = 41</p><p>145.88  -  0.5 = 41</p><p>145.38 = 41. So, the equation is not balanced. </p><p>Option (b): when * signs are replaced by x, +,  - , &div; signs, the equation will be: </p><p>32 x 17 + 48  -  3 &div; 0.5 = 41</p><p>544 + 48  -  6 = 41</p><p>592  -  6 = 41</p><p>586 = 41. So, the equation is not balanced. </p><p>Option (c): when * signs are replaced by  - , x, +, &div; signs, the equation will be: </p><p>32  -  17 x 48 + 3 &div; 0.5 = 41</p><p>32  -  816 + 6 = 41</p><p>38  -  816 = 41</p><p>-778 = 41. So, the equation is not balanced. </p><p>Option (d): when * signs are replaced by +,  - , &div;, x signs, the equation will be: </p><p>32 + 17  -  48 &div; 3 x 0.5 = 41</p><p>32 + 17  -  16 x 0.5 = 41</p><p>32 + 17  -  8 = 41</p><p>49  -  8 = 41</p><p>41 = 41. So, the equation is balanced.</p>",
    "question_index": 12
  },

    "question": "<span class=\"eqt\"><p>Lala Lajpat Rai lost his life while protesting against _________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2366;&#2354;&#2366; &#2354;&#2366;&#2332;&#2346;&#2340; &#2352;&#2366;&#2351; &#2344;&#2375; _________ &#2325;&#2366; &#2357;&#2367;&#2352;&#2379;&#2343; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2346;&#2381;&#2352;&#2366;&#2339; &#2344;&#2381;&#2351;&#2379;&#2331;&#2366;&#2357;&#2352; &#2325;&#2352; &#2342;&#2367;&#2319; &#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Cripps mission</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2360; &#2350;&#2367;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Simon Commission</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2311;&#2350;&#2344; &#2325;&#2350;&#2368;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Cabinet Mission</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2348;&#2367;&#2344;&#2375;&#2335; &#2350;&#2367;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Morley Minto reforms</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2352;&#2381;&#2354;&#2375; &#2350;&#2367;&#2306;&#2335;&#2379; &#2360;&#2369;&#2343;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Lala Lajpat Rai lost his life while protesting against the Simon Commission.</p><p>Lala Lajpat Rai was known as the Lion of Punjab. He was an academician and a freedom fighter. He was the biggest advocate of \"Buy Indian or the Swadeshi movement, along with Lokmanya Tilak and Bipin Chandra Pal (the trio - with respect - was called Lal-Bal-Pal).</p><p>Rai was leading a rally against the Simon Commission when the British ruled police in Lahore rained lathis on the crowd. The shocking baton-charge on the peaceful demonstration took place on October 30, 1928, and 63-year-old veteran academician Rai was hit rather hard. He succumbed to his injuries later and died.</p>",
    "question_index": 25
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following can transfer a Governor from one state to another state? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2325;&#2379; &#2319;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">The Prime Minister</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">The President</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;</span>",
      "<span class=\"eqt\">The Chief Justice of concerned state High Court</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>",
      "<span class=\"eqt\">The Chief Minister of concerned state</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#8226; The President can transfer the Governor from one state to another state for the rest of his term.</p><p>&#8226; The Governor is appointed by the President by warrant under his hand and seal.</p><p>&#8226; The office of the office to the Governor is administered by the Chief Justice of the concerned state High Court.</p>",
    "question_index": 26
  },
  {
    "question": "<span class=\"eqt\"><p>In which of the following soils, common salt can be obtained by evaporating the water?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2350;&#2371;&#2342;&#2366; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2325;&#2379; &#2357;&#2366;&#2359;&#2381;&#2346;&#2367;&#2340; &#2325;&#2352;&#2325;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2344;&#2350;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Laterite soil</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2376;&#2335;&#2375;&#2352;&#2366;&#2311;&#2335; &#2350;&#2371;&#2342;&#2366;</span>",
      "<span class=\"eqt\">Arid soil</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2359;&#2381;&#2325; &#2350;&#2371;&#2342;&#2366;</span>",
      "<span class=\"eqt\">Alluvial soil</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2331;&#2366;&#2352; &#2325;&#2368; &#2350;&#2371;&#2342;&#2366;</span>",
      "<span class=\"eqt\">Black soil</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2354;&#2368; &#2350;&#2371;&#2342;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Arid soils are found in the western parts of Rajasthan. After proper irrigation these soils become cultivable. It lacks humus and moisture because dry climate, high temperature make evaporation faster. Salt content is very high and common salt is obtained by evaporating the water.</p><p></p><p>Laterite Soil: Laterite soils are formed in hot, humid tropical areas. They are rich in iron and aluminum oxides, giving them a reddish color.  While they might contain some salts, they are not known for high concentrations of common salt (sodium chloride).  Their formation process involves intense leaching, which tends to remove soluble salts.</p><p>Alluvial Soil: Alluvial soils are deposited by rivers and are generally very fertile. They can contain a variety of minerals, but the salt content is usually not high enough to make them a good source of common salt.  They are more valued for their agricultural productivity.</p><p>Black Soil: Black soils, also known as regur soils, are rich in clay and are derived from volcanic rock.  They are good at retaining moisture.  While they may contain some salts, like arid soils, the concentration of common salt is not typically high enough for extraction.  They are more known for their fertility and suitability for growing crops like cotton.</p>",
    "question_index": 27
  },
  {
    "question": "<span class=\"eqt\"><p>In the Third Carnatic war, the British East India Company defeated the French forces at ________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2360;&#2352;&#2375; &#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325; &#2351;&#2369;&#2342;&#2381;&#2343; &#2350;&#2375;&#2306;, &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2344;&#2375; _______ &#2350;&#2375;&#2306; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360;&#2368;&#2360;&#2368; &#2360;&#2375;&#2344;&#2366; &#2325;&#2379; &#2361;&#2352;&#2366;&#2351;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Battle of Adyar</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2337;&#2351;&#2366;&#2352; &#2325;&#2375; &#2351;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">Battle of Wandiwash</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2306;&#2337;&#2368;&#2357;&#2366;&#2358; &#2325;&#2375; &#2351;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">Battle of Seringapatam</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2368;&#2352;&#2306;&#2327;&#2346;&#2335;&#2350; &#2325;&#2375; &#2351;&#2369;&#2342;&#2381;&#2343;</span>",
      "<span class=\"eqt\">Battle of Condor</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2306;&#2337;&#2379;&#2352; &#2325;&#2375; &#2351;&#2369;&#2342;&#2381;&#2343;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In the Third Carnatic War, the British East India Company defeated the French forces at the Battle of Wandiwash in 1760.</p><p>This decisive battle, fought near the town of Wandiwash (present-day Vandavasi in Tamil Nadu), marked a turning point in the struggle for colonial supremacy in India.</p><p>The British, led by Sir Eyre Coote, decisively defeated the French, led by Comte de Lally. The victory significantly weakened French influence in India and paved the way for British dominance in the region.</p><p>Following this, the French were confined to a few small enclaves, and their power in India declined rapidly.</p><p>The war ended with the Treaty of Paris (1763), which confirmed British supremacy in India.</p><p></p><p></p>",
    "question_index": 28
  },
  {
    "question": "<span class=\"eqt\"><p>When RBI purchases government securities from the general public, it will lead to ____________ on the stock of high powered money in the economy.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; RBI &#2310;&#2350; &#2332;&#2344;&#2340;&#2366; &#2360;&#2375; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2349;&#2370;&#2340;&#2367;&#2351;&#2366;&#2305; &#2326;&#2352;&#2368;&#2342;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2360;&#2375; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2313;&#2330;&#2381;&#2330; &#2358;&#2325;&#2381;&#2340;&#2367; &#2357;&#2366;&#2354;&#2375; &#2343;&#2344; &#2325;&#2375; &#2360;&#2381;&#2335;&#2377;&#2325; __________</p></span>",
    "options": [
      "<span class=\"eqt\">Decrease</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2306; &#2325;&#2350;&#2368; &#2361;&#2379;&#2327;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Increase</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2327;&#2368;&#2404;</span>",
      "<span class=\"eqt\">No change</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352; &#2325;&#2379;&#2312; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2344;&#2361;&#2368;&#2306; &#2346;&#2396;&#2375;&#2327;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Lower Value</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2366;&#2344; &#2361;&#2379;&#2327;&#2366;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>When the RBI purchases government securities from the general public, it will increase the stock of high-powered money in the economy.</p><p>High-powered money (H): This is also known as the monetary base. It consists of commercial banks' reserves held at the central bank and currency in circulation.</p><p>RBI's purchase of securities: When the RBI buys government securities, it pays for them by crediting the accounts of commercial banks (which then credit their customers' accounts). This increases commercial bank reserves.  Since reserves are a component of high-powered money, the total amount of high-powered money increases.  The public now has money in their accounts, which also increases the money supply.</p><p>Impact on money supply: This increase in high-powered money has a multiplier effect on the overall money supply.  Banks can use these additional reserves to create new loans and deposits, further expanding the money supply in the economy.</p><p></p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>The reactivities of the halogens decrease down the group because</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2376;&#2354;&#2379;&#2332;&#2344; &#2325;&#2368; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2358;&#2368;&#2354;&#2340;&#2366; &#2357;&#2352;&#2381;&#2327; (&#2360;&#2350;&#2370;&#2361;) &#2350;&#2375;&#2306; &#2344;&#2368;&#2330;&#2375; &#2325;&#2368; &#2323;&#2352; &#2325;&#2350;&#2368; &#2361;&#2379;&#2340;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367; ______</p></span>",
    "options": [
      "<span class=\"eqt\">atomic radius increases in size with an increase of electronic energy levels.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2314;&#2352;&#2381;&#2332;&#2366; &#2360;&#2381;&#2340;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2375; &#2360;&#2366;&#2341; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">electronegativity increases down a group.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2327; &#2350;&#2375;&#2306; &#2344;&#2368;&#2330;&#2375; &#2325;&#2368; &#2323;&#2352; &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340;&#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325;&#2340;&#2366; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">of increase the van der Waals forces.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2344; &#2337;&#2352; &#2357;&#2366;&#2354; (van der Waals) &#2348;&#2354; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">of increase in oxidizing ability down the group.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2352;&#2381;&#2327; &#2350;&#2375;&#2306; &#2344;&#2368;&#2330;&#2375; &#2325;&#2368; &#2323;&#2352; &#2311;&#2360;&#2325;&#2375; &#2321;&#2325;&#2381;&#2360;&#2368;&#2325;&#2352;&#2339; &#2325;&#2381;&#2359;&#2350;&#2340;&#2366; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The reactivities of the halogens decrease down the group ( At < I < Br < Cl < F). This is due to the fact that atomic radius increases in size with an increase of electronic energy levels. This lessens the attraction for valence electrons of other atoms, decreasing reactivity. This decrease also occurs because electronegativity decreases down a group; therefore, there is less electron pulling. In addition, there is a decrease in oxidizing ability down the group.</p><p></p><p></p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is an example of alkaline earth metal? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2381;&#2359;&#2366;&#2352;&#2368;&#2351; &#2350;&#2371;&#2342;&#2366; &#2343;&#2366;&#2340;&#2369; &#2325;&#2366; &#2319;&#2325; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Iron</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2361;&#2366;</span>",
      "<span class=\"eqt\">Potassium</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2335;&#2376;&#2358;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Aluminium</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2351;&#2369;&#2350;&#2368;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Barium</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2352;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The alkaline earth metals are six chemical elements in group 2 of the periodic table. </p><p>&#183; They are Beryllium (Be), Magnesium (Mg), Calcium (Ca), Strontium (Sr), <b>Barium (Ba), </b>and Radium (Ra). </p><p>&#183; The elements have very similar properties: they are all shiny, silvery-white, somewhat reactive metals at standard temperature and pressure.</p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is NOT a tributary of the River Brahmaputra?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2344;&#2342;&#2368; &#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2346;&#2369;&#2340;&#2381;&#2352; &#2344;&#2342;&#2368; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2368; <b>&#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Dibang River</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2348;&#2366;&#2306;&#2327; &#2344;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Kameng River</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2350;&#2375;&#2306;&#2327; &#2344;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Yamuna River</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2350;&#2369;&#2344;&#2366; &#2344;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Subansiri River</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2348;&#2366;&#2344;&#2360;&#2367;&#2352;&#2368; &#2344;&#2342;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Yamuna River is NOT a tributary of the Brahmaputra.</p><p>The Dibang, Kameng, and Subansiri are all major tributaries of the Brahmaputra River, flowing from the mountains and joining the main river in northeastern India.</p><p>The Yamuna River, on the other hand, is a major tributary of the Ganges River, not the Brahmaputra. It flows through northern India and joins the Ganges at Prayagraj (formerly known as Allahabad).</p><p></p><p></p><p></p><p></p><p></p><p></p><p></p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>Mrinalini Sarabhai Had won the Padma Bhushan Award in the 1992. She was a multifaceted artist who excelled in ________________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2371;&#2339;&#2366;&#2354;&#2367;&#2344;&#2368; &#2360;&#2366;&#2352;&#2366;&#2349;&#2366;&#2312; &#2344;&#2375; 1992 &#2350;&#2375;&#2306; &#2346;&#2342;&#2381;&#2350; &#2349;&#2370;&#2359;&#2339; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2332;&#2368;&#2340;&#2366; &#2341;&#2366;&#2404; &#2357;&#2361; &#2319;&#2325; &#2348;&#2361;&#2369;&#2350;&#2369;&#2326;&#2368; &#2325;&#2354;&#2366;&#2325;&#2366;&#2352; &#2341;&#2368;&#2306;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; ________________ &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2325;&#2371;&#2359;&#2381;&#2335; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Odissi</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Bharatnatyam</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2352;&#2340;&#2344;&#2366;&#2335;&#2381;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Kathak</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2325;</span>",
      "<span class=\"eqt\">Kuchipudi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2330;&#2367;&#2346;&#2369;&#2337;&#2364;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Mrinalini Sarabhai was a multifaceted artist who excelled in Bharatanatyam. Along with her husband, Vikram Sarabhai, she established the Darpana Academy of Performing Arts. Her dance career, combined with her tireless efforts in arts education, left a legacy in the world of Indian classical dance. She was honoured with the national civilian award Padma Bhushan in 1992. </p>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>The Corbillon Cup is associated with which of the following sport?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2377;&#2352;&#2381;&#2348;&#2367;&#2354;&#2344; &#2325;&#2346; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2326;&#2375;&#2354; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [

    "correct_option_id": 2,
    "solution": "<p>The Corbillon Cup is presented to the Women's Table Tennis Team champions at each edition of the World Team Championships. Donated by former President of the French Table Tennis Association, Marcel Corbillon, in 1933, the Corbillon Cup was first awarded at the World Team Championships in 1934 with the introduction of the Women's Team discipline.</p><p></p><p></p>",

  },
  {
    "question": "<span class=\"eqt\"><p>__________ is a national-level apex organisation with the basic mandate of bringing about socio-economic development of tribals of the country by institutionalizing the trade of Minor Forest Produce (MFP) collected by them.</p></span><span class=\"hqt\" style=\"display:none\"><p>__________ &#2319;&#2325; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2360;&#2381;&#2340;&#2352; &#2325;&#2366; &#2358;&#2368;&#2352;&#2381;&#2359; &#2360;&#2306;&#2327;&#2336;&#2344; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2366; &#2350;&#2370;&#2354; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2342;&#2375;&#2358; &#2325;&#2375; &#2332;&#2344;&#2332;&#2366;&#2340;&#2368;&#2351; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325;&#2340;&#2381;&#2352;&#2367;&#2340; &#2354;&#2328;&#2369; &#2357;&#2344; &#2313;&#2346;&#2332; (MFP) &#2325;&#2375; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2325;&#2379; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2327;&#2340; &#2348;&#2344;&#2366;&#2325;&#2352; &#2313;&#2344;&#2325;&#2366; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325;-&#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">NAFED</span><span class=\"hqt\" style=\"display:none\">NAFED</span>",
      "<span class=\"eqt\">SFAC</span><span class=\"hqt\" style=\"display:none\">SFAC</span>",
      "<span class=\"eqt\">TRIFED</span><span class=\"hqt\" style=\"display:none\">TRIFED</span>",
      "<span class=\"eqt\">TRAI</span><span class=\"hqt\" style=\"display:none\">TRAI</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Tribal Co-operative Marketing Development Federation of India Limited (TRIFED)</b>was established in August 1987 under the Multi-State Cooperative Societies Act, 1984 by the Government of India as a National level Cooperative body under the administrative control of the then Ministry of Welfare of India, with the basic mandate of bringing about socio-economic development of tribals of the country by institutionalizing the trade of Minor Forest Produce (MFP) &amp; Surplus Agricultural Produce (SAP) collected/ cultivated by them.</p><p>TRIFED's MSP for MFP &amp; VanDhan program is in line with the \"The Scheduled Tribes and Other Traditional Forest Dwellers (Forest Rights Act, 2006)\", key forest legislation passed for securing the protection &amp; livelihood of poor tribals and concerns with the rights of forest-dwelling communities to land and other natural resources.</p>",
    "question_index": 35
  },
  {

    "options": [

      "<span class=\"eqt\">Jhiri Mela</span><span class=\"hqt\" style=\"display:none\">&#2333;&#2367;&#2337;&#2364;&#2368; &#2350;&#2375;&#2354;&#2366;</span>",

    "correct_option_id": 2,

  {
    "question": "<span class=\"eqt\"><p>'Mission Mausam' initiative is to be chiefly implemented by the _________.</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2350;&#2367;&#2358;&#2344; &#2350;&#2380;&#2360;&#2350;' &#2346;&#2361;&#2354; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; _________ &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2367;&#2340; &#2325;&#2368; &#2332;&#2366;&#2319;&#2327;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Ministry of Science and Technology</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2319;&#2357;&#2306; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Ministry of Earth Sciences</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Ministry of Environment</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Ministry of Information and Broadcasting</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2330;&#2344;&#2366; &#2319;&#2357;&#2306; &#2346;&#2381;&#2352;&#2360;&#2366;&#2352;&#2339; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Union Cabinet, chaired by Prime Minister Narendra Modi, has approved 'Mission Mausam' with an outlay of Rs.2,000 crore over two years.</p><p>Mission Mausam, to be chiefly implemented by the Ministry of Earth Sciences, is envisaged to be multi-faceted and transformative initiative to tremendously boost India's weather and climate-related science, research, and services.</p><p>The mission's focus will include improving observations and understanding for providing highly accurate and timely weather and climate information across temporal and spatial scales, including monsoon forecasts,alerts for air quality, extreme weather events and cyclones, weather interventions for managing fog,hail, and rain, etc., capacity building and generating awareness.</p><p>Critical elements of Mission Mausam will include the deployment of next-generation radars and satellite systems with advanced sensors and high-performance supercomputers, the development of improved Earth system models and a GIS-based automated Decision Support System for real-time data dissemination. Three Ministry of Earth Sciences institutes: the India Meteorological Department, the Indian Institute of Tropical Meteorology, and the National Centre for Medium-Range Weather Forecasting will primarily implement Mission Mausam. These institutions will be supported by other MoES institutions (Indian National Centre for Ocean Information Services, National Centre for Polar and Ocean Research, and National Institute of Ocean Technology), along with collaborating national and international Institutes, Academia and Industries, furthering India's leadership in weather and climate sciences and services.</p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>Western Ghats are a geographical feature in which of the following Indian states?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; &#2319;&#2325; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>",
      "<span class=\"eqt\">Goa</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2357;&#2366;</span>",
      "<span class=\"eqt\">Maharashtra</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The hill ranges of the Western Ghats are a global biodiversity hotspot, extending along the west coast of India covering Indian states of <b>Gujarat, Maharashtra, Goa, Karnataka, Kerala Tamil Nadu</b> from the river Tapti in the north to the southern tip of India.</p>",
    "question_index": 38
  },
  {
    "question": "<span class=\"eqt\"><p>GDP calculated after adjusting the weight of the value of 'depreciation' is known as ____.</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2350;&#2370;&#2354;&#2381;&#2351;&#2361;&#2381;&#2352;&#2366;&#2360;' &#2325;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2375; &#2349;&#2366;&#2352; &#2325;&#2379; &#2360;&#2350;&#2366;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2360;&#2325;&#2354; &#2342;&#2375;&#2358;&#2368; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; ____ &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Net National Product</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#8205;&#2357;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Gross National Product</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Net Domestic Product</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#8205;&#2357;&#2354; &#2342;&#2375;&#2358;&#2368; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Marginal product</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2350;&#2366;&#2344;&#2381;&#2340; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>GDP calculated after adjusting the weight of the value of depreciation is known as Net Domestic Product (NDP).</p><p>Depreciation (also called capital consumption allowance) refers to the wear and tear or loss of value of physical capital (like machinery, buildings, and infrastructure) over time. When depreciation is subtracted from Gross Domestic Product (GDP), the result is Net Domestic Product (NDP).</p><p>The formula is:</p><p>NDP = GDP &#8722; Depreciation</p><p>NDP provides a more accurate measure of the net production available for consumption or investment in an economy, as it accounts for the cost of replacing worn-out capital.</p><p></p><p></p>",
    "question_index": 39
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following ancient cities was once known as Kaveripattinam, which for a while also served as the capital of the early Chola kings?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2369;&#2331; &#2360;&#2350;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2330;&#2379;&#2354; &#2352;&#2366;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2358;&#2361;&#2352; &#2325;&#2379; &#2325;&#2367;&#2360;&#2368; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2325;&#2366;&#2357;&#2375;&#2352;&#2368;&#2346;&#2335;&#2381;&#2335;&#2367;&#2344;&#2350; &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pattadakal</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2381;&#2340;&#2342;&#2325;&#2354;</span>",
      "<span class=\"eqt\">Poompuhar</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2350;&#2381;&#2346;&#2369;&#2361;&#2352;</span>",
      "<span class=\"eqt\">Muziris</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2332;&#2364;&#2367;&#2352;&#2367;&#2360;</span>",
      "<span class=\"eqt\">Humpi</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2350;&#2381;&#2346;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Poompuhar</b> is an ancient city was once known as Kaveripattinam, which for a while also served as the capital of the early Chola kings in Tamilakkam. </p><p>&#183; Much of the town was washed away by a powerful sea storm in 500 AD. </p><p>&#183; The city served as a great trading centre. </p><p>&#183; It is now an established fact that much of the town was washed away by progressive erosion and floods.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following glands is located deep in the brain in an area called the epithalamus?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2327;&#2381;&#2352;&#2306;&#2341;&#2367; &#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325; &#2350;&#2375;&#2306; &#2319;&#2346;&#2367;&#2341;&#2376;&#2354;&#2375;&#2350;&#2360; &#2344;&#2366;&#2350;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2310;&#2344;&#2381;&#2340;&#2352;&#2367;&#2325; &#2340;&#2380;&#2352; &#2360;&#2375; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Thymus</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2366;&#2311;&#2350;&#2360;</span>",
      "<span class=\"eqt\">Pituitary</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2335;&#2381;&#2351;&#2370;&#2335;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Pineal</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2344;&#2367;&#2351;&#2354;</span>",
      "<span class=\"eqt\">Thyroid</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2366;&#2351;&#2352;&#2377;&#2311;&#2337;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>The pineal gland</b> is located deep in the brain in an area called the epithalamus, where the two halves of the brain join. </p><p>&#183; In humans, this is situated in the middle of the brain; it sits in a groove just above the thalamus, which is an area that co-ordinates a variety of functions related to our senses. </p><p>&#183; The pineal gland contains high levels of calcium and can be used by radiographers to mark the middle of the brain in X-ray images.</p>",
    "question_index": 41
  },
  {
    "question": "<span class=\"eqt\"><p>In July 2024, which state became the first State in the country to adopt an action plan for 'road safety' for the next 10 years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2369;&#2354;&#2366;&#2312; 2024 &#2350;&#2375;&#2306;, &#2325;&#2380;&#2344;-&#2360;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351; &#2309;&#2327;&#2354;&#2375; 10 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; '&#2360;&#2337;&#2364;&#2325; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366;' &#2361;&#2375;&#2340;&#2369; &#2325;&#2366;&#2352;&#2381;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2309;&#2346;&#2344;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2342;&#2375;&#2358; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351; &#2348;&#2344; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kerala</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2352;&#2354;</span>",
      "<span class=\"eqt\">West Bengal</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2348;&#2306;&#2327;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Uttar Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Rajasthan</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Rajasthan became the first State in the country to adopt an action plan for road safety for the next 10 years.</p><p>The action plan, to be accompanied by a government policy, will be aimed at reducing road accidents in the State by 50% till 2030. Its first phase focuses on safety audits of 500km of state highways and major district roads.</p><p>The policy draft also mentions that a pilot speed management programme will be conducted for high-risk corridors in the state, along with piloting improvement works for 25 high-priority black spots. 'A pilot project for the development of dedicated two-wheeler lanes/cycle lanes on state highways is also planned,' said an official.</p><p>Phase 1 will be implemented between 2025 till 2027 and will focus on institutional strengthening and completion of action plan interim targets.</p><p>In phase 2, which will be from 2028 till 2030, the focus on reduction of 50% of road accident fatalities in line with the UN Second Decade of Action for Road Safety.</p><p>In Phase 3, from 2031 till 2033, reduction of 75%of road accident.</p>",
    "question_index": 42
  },
  {
    "question": "<span class=\"eqt\"><p>Which article of the Constitution deals with the Fundamental Duties? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 300 A</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 300 A</span>",
      "<span class=\"eqt\">Article 371 A</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 371 A</span>",
      "<span class=\"eqt\">Article 51 A</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 51 A</span>",
      "<span class=\"eqt\">Article 52</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 52</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#8226; Fundamental duties are listed under Article 51A.</p><p>&#8226; The 42nd Amendment Act of 1976 added 10 fundamental duties to the Indian Constitution, recommended by the Swaran Singh Committee in 1976. Later, the 86th Amendment Act in 2002 added the 11th Fundamental Duty.</p><p></p><p>Other articles:</p><p>i) Article 300 A  -  Right to Property</p><p>ii) Article 371 A- Special provision with respect to the state of Nagaland</p><p>iii) Article 52- The President of India.</p>",
    "question_index": 43
  },

    "solution": "<p>Railway PSU IRCTC on 14 Feb, 2024 announced the appointment of Sanjay Kumar Jain as its Chairman and Managing Director (CMD) with immediate effect.</p><p>Prior to this role, Jain was Principal Chief Commercial Manager (PCCM) of Northern Railway, Indian Railway Catering and Tourism Corporation Ltd (IRCTC) said in an exchange filing.</p><p></p><p></p>",

  },
  {
    "question": "<span class=\"eqt\"><p>With reference to Indian polity, the famous 'Patel scheme' is related to which of the following?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2368; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; '&#2346;&#2335;&#2375;&#2354; &#2351;&#2379;&#2332;&#2344;&#2366;' &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Defence cooperation</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2325;&#2381;&#2359;&#2366; &#2360;&#2361;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">Rural development</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2357;&#2367;&#2325;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Integration of states</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2366; &#2319;&#2325;&#2368;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Resolution of centre-state disputes</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;-&#2352;&#2366;&#2332;&#2381;&#2351; &#2357;&#2367;&#2357;&#2366;&#2342;&#2379;&#2306; &#2325;&#2366; &#2360;&#2350;&#2366;&#2343;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sardar Patel played the most important role in the integration and merger of states. The main objective of shaping the Indian states into sizable or viable administrative units was sought to be achieved by three-fold process of integration, which is famously known as the \"Patel scheme\", after Sardar Vallabhbhai Patel, the Minister-in-Charge of Home Affairs.</p>",
    "question_index": 45
  },
  {
    "question": "<span class=\"eqt\"><p>_______________ is the acceleration of an object at a specific moment of time.</p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>_______________ &#2319;&#2325; &#2357;&#2367;&#2358;&#2367;&#2359;&#2381;&#2335; &#2325;&#2381;&#2359;&#2339; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2340;&#2381;&#2357;&#2352;&#2339; &#2361;&#2376;&#2404;</p></span>",
    "options": [

    ],
    "correct_option_id": 1,
    "solution": "<p>Instantaneous acceleration is the acceleration of an object at a specific moment of time. Acceleration is a measure of the change in the velocity of an object per unit time.</p><p></p><p>It is a vector quantity and its SI unit is m/s 2.</p>",
    "question_index": 46
  },
  {
    "question": "<span class=\"eqt\"><p>When was the first ever cricket ODI match played?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2361;&#2354;&#2366; &#2319;&#2325; &#2342;&#2367;&#2357;&#2360;&#2368;&#2351; &#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; (ODI) &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2350;&#2376;&#2330; &#2325;&#2348; &#2326;&#2375;&#2354;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>Gangireddu Aata is the name given to the \"the bull play\", a very popular form in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2306;&#2327;&#2367;&#2352;&#2375;&#2337;&#2369; &#2310;&#2335;&#2366; \"&#2342; &#2348;&#2369;&#2354; &#2346;&#2381;&#2354;&#2375;\" &#2325;&#2379; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2344;&#2366;&#2350; &#2361;&#2376;, &#2351;&#2361; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2319;&#2325; &#2348;&#2361;&#2369;&#2340; &#2354;&#2379;&#2325;&#2346;&#2381;&#2352;&#2367;&#2351; &#2352;&#2370;&#2346; &#2361;&#2376;:</p></span>",

    "question": "<span class=\"eqt\"><p>Which of the following is a dance festival celebrated in Tamil Nadu where dancers from all over the country come together to showcase their various dancing skills in Bharatnatyam, Kuchipudi, Kathak and Mohiniyattam?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351; &#2313;&#2340;&#2381;&#2360;&#2357; &#2361;&#2376; &#2332;&#2361;&#2366;&#2305; &#2349;&#2352;&#2340;&#2344;&#2366;&#2335;&#2381;&#2351;&#2350;, &#2325;&#2369;&#2330;&#2367;&#2346;&#2369;&#2337;&#2364;&#2368;, &#2325;&#2341;&#2325; &#2324;&#2352; &#2350;&#2379;&#2361;&#2367;&#2344;&#2368;&#2309;&#2335;&#2381;&#2335;&#2350; &#2350;&#2375;&#2306; &#2342;&#2375;&#2358; &#2349;&#2352; &#2325;&#2375; &#2344;&#2352;&#2381;&#2340;&#2325; &#2309;&#2346;&#2344;&#2375; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2344;&#2371;&#2340;&#2381;&#2351; &#2325;&#2380;&#2358;&#2354; &#2325;&#2366; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2360;&#2366;&#2341; &#2310;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Jallikattu</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354;&#2381;&#2354;&#2368;&#2325;&#2335;&#2381;&#2335;&#2370;</span>",
      "<span class=\"eqt\">Thiruvaiyaru</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2367;&#2352;&#2369;&#2357;&#2376;&#2351;&#2366;&#2352;&#2369;</span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>Natyanjali Dance Festival is celebrated in Nataraja Temple in Chidambaram in Tamil Nadu. Nearly 400 dancers from all over the country come together to showcase their various dancing skills in Bharatnatyam, Kuchipudi, Kathak and Mohiniyattam. Dancers are dressed in their traditional outfits and they all focus on representing their diverse culture. This cultural festival aims to bring together diverse forms of dance for a single cause and spreads the message of Unity in Diversity.</p>",
    "question_index": 49
  },

    "question": "<span class=\"eqt\"><p><b>Directions:</b>The following graph shows the number of questions assigned to five different students and percentage of questions solved by them.</p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18240/image004.png\"></p><p>The average number of questions assigned to all students together is: (to the nearest integer)</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;:</b> &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2352;&#2375;&#2326; &#2346;&#2366;&#2305;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2361;&#2354; &#2325;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18240/image004.png\"></p><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2349;&#2368; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;: (&#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2340;&#2325;)</p></span>",

    "question": "<span class=\"eqt\"><p>A dishonest dealer claims to sell goods at the cost price but uses a faulty weight that measures 750 grams instead of 1 kg. What is his percentage gain?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2375;&#2312;&#2350;&#2366;&#2344; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2368; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2350;&#2366;&#2354; &#2348;&#2375;&#2330;&#2344;&#2375; &#2325;&#2366; &#2342;&#2366;&#2357;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; &#2319;&#2325; &#2342;&#2379;&#2359;&#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2332;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; 1 kg &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; 750 &#2327;&#2381;&#2352;&#2366;&#2350; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360;&#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2354;&#2366;&#2349; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">33.33%</span><span class=\"hqt\" style=\"display:none\">33.33%</span>",
      "<span class=\"eqt\">66.67%</span><span class=\"hqt\" style=\"display:none\">66.67%</span>",
      "<span class=\"eqt\">12%</span><span class=\"hqt\" style=\"display:none\">12%</span>",
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Gain % = (true weight  -  false weight)/false weight * 100</p><p>=&gt; (1000  -  750)/750 * 100 = 33.33%</p>",
    "question_index": 51
  },

    "question": "<span class=\"eqt\"><p>If cot<sup>2</sup>A + cosec<sup>2</sup> A = 7, then find the value of cosec (3A/2)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; cot<sup>2</sup>A + cosec<sup>2</sup> A = 7 &#2361;&#2376;, &#2340;&#2379; cosec (3A/2) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">&radic;2</span><span class=\"hqt\" style=\"display:none\">&radic;2</span>",
      "<span class=\"eqt\">2/&radic;3</span><span class=\"hqt\" style=\"display:none\">2/&radic;3</span>",

    "correct_option_id": 1,
    "solution": "<p>Cot<sup>2</sup> A + Cosec<sup>2</sup>A = 7</p><p>Cosec<sup>2</sup> A  -  1 + cosec<sup>2</sup> A = 7</p><p>2cosec<sup>2</sup> A  -  1 = 7</p><p>Cosec<sup>2</sup> A = 4</p><p>Cosec A = 2</p><p>A = 30&deg;</p><p>3A/2 = 45&deg; = &radic;2</p>",
    "question_index": 52
  },
  {
    "question": "<span class=\"eqt\"><p>When a man weighing 93 kg, is replaced by another man in a group of 8 persons, the average weight decreases by 7 kg. What is the weight of new man?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; 8 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; 93 kg &#2357;&#2332;&#2344; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2319;&#2325; &#2309;&#2344;&#2381;&#2351; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2324;&#2360;&#2340; &#2357;&#2332;&#2344; 7 kg &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2319; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2366; &#2357;&#2332;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">37 kg</span><span class=\"hqt\" style=\"display:none\">37 kg</span>",
      "<span class=\"eqt\">34 kg</span><span class=\"hqt\" style=\"display:none\">34 kg</span>",
      "<span class=\"eqt\">40 kg</span><span class=\"hqt\" style=\"display:none\">40 kg</span>",
      "<span class=\"eqt\">36 kg</span><span class=\"hqt\" style=\"display:none\">36 kg</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Total weight decreases = 8 * 7 = 56 kg</p><p>Weight of new man = 93  -  56 = 37 kg</p>",
    "question_index": 53
  },
  {
    "question": "<span class=\"eqt\"><p>The LCM and the HCF of two numbers are 110 and 11 respectively and the sum of the two numbers is 121. Find the sum of the reciprocals of the two numbers.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2328;&#2369;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2381;&#2351; (LCM) &#2324;&#2352; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; (HCF) &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 110 &#2324;&#2352; 11 &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; 121 &#2361;&#2376;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2357;&#2381;&#2351;&#2369;&#2340;&#2381;&#2325;&#2381;&#2352;&#2350;&#2379;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1/12</span><span class=\"hqt\" style=\"display:none\">1/12</span>",
      "<span class=\"eqt\">1/10</span><span class=\"hqt\" style=\"display:none\">1/10</span>",
      "<span class=\"eqt\">1/8</span><span class=\"hqt\" style=\"display:none\">1/8</span>",
      "<span class=\"eqt\">1/11</span><span class=\"hqt\" style=\"display:none\">1/11</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the numbers be X and Y.</p><p>Then, X + Y = 121 and X * Y = 110 * 11</p><p>Now,</p><p>(1/X) + (1/Y)</p><p>= (X + Y)/XY</p><p>= 121/1210</p><p>= 1/10</p>",
    "question_index": 54
  },

    "question": "<span class=\"eqt\"><p><b>Directions:</b>   The following pie-chart shows the percentage distribution of products imported by a company from six different ports  -  P, Q, R, S, T, and U for a particular week.</p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15649/image004.png\"></p><p>The number of products imported from port T is what percentage less than that from port R?</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;: </b>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340; &#2310;&#2352;&#2375;&#2326; &#2319;&#2325; &#2357;&#2367;&#2358;&#2375;&#2359; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2375; &#2354;&#2367;&#2319; &#2331;&#2361; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361;&#2379;&#2306; - P, Q, R, S, T, &#2324;&#2352; U &#2360;&#2375; &#2319;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2310;&#2351;&#2366;&#2340;&#2367;&#2340; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15649/image004.png\"></p><p>&#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; T &#2360;&#2375; &#2310;&#2351;&#2366;&#2340;&#2367;&#2340; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; R &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2350; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p><div>&nbsp;If X = 8 + 3&radic;7, then find the value of &radic;X +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&radic;X</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; X = 8 + 3&radic;7 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;: &radic;X +<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&radic;X</span></div></div></p><p></p></span>",
    "options": [
      "<span class=\"eqt\">&radic;20</span><span class=\"hqt\" style=\"display:none\">&radic;20</span>",
      "<span class=\"eqt\">&radic;15</span><span class=\"hqt\" style=\"display:none\">&radic;15</span>",
      "<span class=\"eqt\">&radic;18</span><span class=\"hqt\" style=\"display:none\">&radic;18</span>",
      "<span class=\"eqt\">&radic;14</span><span class=\"hqt\" style=\"display:none\">&radic;14</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>X = 8 + 3&radic;7</p><p>1/X = 8 - 3&radic;7</p><p>Now,</p><p>[&radic;X + (1/&radic;X)]<sup>2</sup> = X + (1/X) + 2</p><p>= 8 + 3&radic;7 + 8 - 3&radic;7 + 2</p><p>= 18</p><p>So,</p><p>&radic;X + (1/&radic;X) = &radic;18</p><p></p>",
    "question_index": 56

    "question": "<span class=\"eqt\"><p>The table below shows the amount of expense (in lakh) of a company.<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Expense</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Amount</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rent</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Insurance</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6.5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Wages</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">12.5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Taxes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Maintenance</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td></tr></table></p><p>Find the Rent and Taxes together makes what percent of total expenses of the company.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2368; &#2327;&#2312; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366; &#2319;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2366; &#2357;&#2381;&#2351;&#2351; (&#2354;&#2366;&#2326; &#2350;&#2375;&#2306;) &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2357;&#2381;&#2351;&#2351;</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2352;&#2366;&#2358;&#2367;</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2367;&#2352;&#2366;&#2351;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2348;&#2368;&#2350;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6.5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2350;&#2332;&#2342;&#2370;&#2352;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">12.5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2352;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2352;&#2326;&#2352;&#2326;&#2366;&#2357;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td></tr></table><p>&#2325;&#2367;&#2352;&#2366;&#2351;&#2366; &#2324;&#2352; &#2325;&#2352; &#2319;&#2325; &#2360;&#2366;&#2341;, &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2375; &#2325;&#2369;&#2354; &#2357;&#2381;&#2351;&#2351; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">18%</span><span class=\"hqt\" style=\"display:none\">18%</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>Expenses in Rent and Taxes together = 4 + 3 = 7 lakh</p><p>Total expenses of the company = 4 + 6.5 + 12.5 + 3 + 9 = 35 lakh</p><p>Required Percent = (7/35) * 100 = 20%</p>",
    "question_index": 57

    "question": "<span class=\"eqt\"><p><div>&nbsp;If X +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">X</span></div>&nbsp;= 43, then find X<sup>2</sup> +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">X<sup>2</sup></span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; X +<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">X</span></div>&nbsp;= 43 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;:X<sup>2</sup> +&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">X<sup>2</sup></span></div></div></p></span>",
