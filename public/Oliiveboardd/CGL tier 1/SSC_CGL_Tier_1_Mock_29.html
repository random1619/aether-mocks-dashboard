<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">

        </div>
    </div>

                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">

                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>

                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Select the figure from among the given options that can replace the question mark (?) in the following series.</p><p><img width=588 height=122 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26724/image007.jpg\"></p><p><img width=244 height=702 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26724/image008.png\"></p></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p><img width=588 height=122 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26724/image007.jpg\"></p><p><img width=244 height=702 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26724/image008.png\"></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The figure in the bottom right corner is cut into half horizontally and drawn in the middle of the next step. Then the remaining figures are shifting their position in a clockwise direction from corner to corner.</p><p>The letter and number are shifting their position in a clockwise direction.</p><p>For letters, the logic is  - </p><p>J + 3 = M</p><p>M + 3 = P</p><p>P + 3 = S</p><p>S + 3 = V</p><p>For numbers, the logic is  - </p><p>25 + 3<sup>2</sup> = 25 + 9 = 34</p><p>34 + 4<sup>2</sup> = 34 + 16 = 50</p><p>50 + 5<sup>2</sup> = 50 + 25 = 75</p><p>75 + 6<sup>2</sup> = 75 + 36 = 111</p><p>So, following this logic, option figure (III) will replace the question mark-</p><p><img width=249 height=165 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26724/image009.png\"></p><p>Option figure (I) is incorrect because the number in is wrong.</p><p>Option figure (II) is incorrect because the middle figure is wrong and the position of the number is wrong.</p><p>Option (IV) is incorrect because the alphabet is wrong.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>288 is related to 3 by certain logic. Following the same logic, 480 is related to 5. To which if the following is 768 related, following the same logic. </p><p>(NOTE: Operations should be performed on the whole number, without breaking down the number into its constituent digits. E.g. 13  -  Operations on 13 such as adding/deleting/multiplying etc., to 13 can be performed. Breaking 13 into 1 and 3 and then performing mathematical operations on 1 ad 3 is not allowed.)</p></span><span class=\"hqt\" style=\"display:none\">288 &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; 3 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2311;&#2360;&#2368; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; 480 5 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; 768 &#2361;&#2376;, &#2340;&#2379; &#2351;&#2361; &#2313;&#2360;&#2368; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>(&#2344;&#2379;&#2335;: &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2346;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;, &#2348;&#2367;&#2344;&#2366; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2328;&#2335;&#2325; &#2309;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2379;&#2337;&#2364;&#2375;&#2404; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; 13 - 13 &#2346;&#2352; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2332;&#2376;&#2360;&#2375; &#2325;&#2367; 13 &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2344;&#2366;/&#2361;&#2335;&#2366;&#2344;&#2366;/&#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2344;&#2366; &#2310;&#2342;&#2367; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; 13 &#2325;&#2379; 1 &#2324;&#2352; 3 &#2350;&#2375;&#2306; &#2340;&#2379;&#2337;&#2364;&#2344;&#2366; &#2324;&#2352; &#2347;&#2367;&#2352; 1 &#2324;&#2352; 3 &#2346;&#2352; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2352;&#2344;&#2366; &#2309;&#2344;&#2369;&#2350;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;)</span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Here, the logic is:</p><p>288 is related to 3.</p><p>288 &div; 96 = 3.</p><p>480 is related to 5. </p><p>480 &div; 96 = 5.</p><p>Similarly, </p><p>768 &div; 96 = 8.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>32 is related to 10.24 by certain logic. Following the same logic, 18 is related to 3.24. To which if the following is 26 related, following the same logic. </p><p>(NOTE: Operations should be performed on the whole number, without breaking down the number into its constituent digits. E.g. 13  -  Operations on 13 such as adding/deleting/multiplying etc., to 13 can be performed. Breaking 13 into 1 and 3 and then performing mathematical operations on 1 ad 3 is not allowed.)</p></span><span class=\"hqt\" style=\"display:none\">32 &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; 10.24 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2311;&#2360;&#2368; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, 18 3.24 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; 26 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2368; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;&#2404;</p><p>(&#2344;&#2379;&#2335;: &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2346;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;, &#2348;&#2367;&#2344;&#2366; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2328;&#2335;&#2325; &#2309;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2379;&#2337;&#2364;&#2375;&#2404; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; 13 - 13 &#2346;&#2352; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2332;&#2376;&#2360;&#2375; &#2325;&#2367; 13 &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2344;&#2366;/&#2361;&#2335;&#2366;&#2344;&#2366;/&#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2344;&#2366; &#2310;&#2342;&#2367; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; 13 &#2325;&#2379; 1 &#2324;&#2352; 3 &#2350;&#2375;&#2306; &#2340;&#2379;&#2337;&#2364;&#2344;&#2366; &#2324;&#2352; &#2347;&#2367;&#2352; 1 &#2324;&#2352; 3 &#2346;&#2352; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2352;&#2344;&#2366; &#2309;&#2344;&#2369;&#2350;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;)</span>",
    "options": [
      "<span class=\"eqt\">6.76</span><span class=\"hqt\" style=\"display:none\">6.76</span>",
      "<span class=\"eqt\">7.84</span><span class=\"hqt\" style=\"display:none\">7.84</span>",
      "<span class=\"eqt\">2.56</span><span class=\"hqt\" style=\"display:none\">2.56</span>",
      "<span class=\"eqt\">6.86</span><span class=\"hqt\" style=\"display:none\">6.86</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Here, the pattern is: </p><p>32 is related to 10.24 </p><p>(32)<sup>2</sup> &div; 100 = 1024 &div; 100 = 10.24</p><p>18 is related to 3.24</p><p>(18)<sup>2</sup> &div; 100 = 324 &div; 100 = 3.24</p><p>Similarly, </p><p>(26)<sup>2</sup> &div; 100 = 676 &div; 100 = 6.76</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>How many meaningful English words can be formed from N, E, O and D, using each letter mandatorily but only once in each word? </p></span><span class=\"hqt\" style=\"display:none\">N, E, O &#2324;&#2352; D &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2366;&#2352;&#2381;&#2341;&#2325; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2358;&#2348;&#2381;&#2342; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2358;&#2348;&#2381;&#2342; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2348;&#2366;&#2352; &#2361;&#2368; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2379;?</span>",
    "options": [
      "<span class=\"eqt\">Less than two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379; &#2360;&#2375; &#2325;&#2350;</span>",
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>",
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>",
      "<span class=\"eqt\">More than three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The meaningful English words using letters N, E, O and D without repetition are: DONE, NODE.</p><p>DONE means finished. </p><p>NODE means a point at which two lines or systems meet or cross.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>The letters that appear at the odd positions in the word 'DURING' from the left end are arranged in the alphabetical order and then followed by letters that appear at the even positions are arranged in the alphabetical order. How many letters are there in the English alphabetical order between the letter which is the second from the left end and the second from the right end in the group of letters thus formed? </p></span><span class=\"hqt\" style=\"display:none\">&#2358;&#2348;&#2381;&#2342; 'DURING' &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2306; &#2331;&#2379;&#2352; &#2360;&#2375; &#2357;&#2367;&#2359;&#2350; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2379; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; &#2360;&#2350; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2379; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2348;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2306; &#2331;&#2379;&#2352; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2324;&#2352; &#2342;&#2366;&#2319;&#2306; &#2331;&#2379;&#2352; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2361;&#2376;&#2306;?</span>",
    "options": [
      "<span class=\"eqt\">Four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Five</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2305;&#2330;</span>",
      "<span class=\"eqt\">More than five</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2305;&#2330; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The word is DURING. </p><p>The letters that appear at the odd positions from the left end are arranged in the alphabetical order = DNR</p><p>Letters that appear at the even positions are arranged in the alphabetical order = GIU</p><p>So, we get: DNRGIU</p><p>The second letter from left end is N.</p><p>The second letter from right end is I. </p><p>So, letters between N and I are J, K, L, M. So, there are 4 letters. </p>",
    "question_index": 4

    "question": "<span class=\"eqt\"><p>If 'x' means 'addition', '-' means 'division', '/' means 'subtraction' and '+' means 'multiplication', then what will be the value of the expression '12 + 6 - 9 / 12 x 14 / 5'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 'x' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&#2332;&#2379;&#2396;&#2344;&#2366;' &#2361;&#2376;, '-' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&#2349;&#2366;&#2327; &#2325;&#2352;&#2344;&#2366;' &#2361;&#2376;, '/' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&#2328;&#2335;&#2366;&#2344;&#2366;' &#2361;&#2376; &#2324;&#2352; '+' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&#2327;&#2369;&#2344;&#2366; &#2325;&#2352;&#2344;&#2366;' &#2361;&#2376;, &#2340;&#2379; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; '12+6-9/12x14/5' &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>12 + 6 - 9 / 12 x 14 / 5</p><p>means 12 x 6 / 9 - 12 + 14 - 5 = 8 - 12 + 14 - 5 = 22 - 17 = 5</p>",

    "question": "<span class=\"eqt\"><p>Study the following information and answer the given question:</p><p>M+N means M is the wife of N</p><p>Mx N means M is the father of N</p><p>Which of the following expressions means A is the mother in law of P?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;:</p><p>M+N &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; M, N &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;</p><p>Mx N &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; M, N &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; A, P &#2325;&#2368; &#2360;&#2366;&#2360; &#2361;&#2376;?</span>",

    "question": "<span class=\"eqt\"><p>By among the following was the Natya Institute for Kathak and Choreography (NIKC) set up?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2344;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2341;&#2325; &#2319;&#2357;&#2306; &#2344;&#2371;&#2340;&#2381;&#2351;&#2325;&#2354;&#2366; &#2344;&#2366;&#2335;&#2381;&#2351; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344; (&#2344;&#2366;&#2335;&#2381;&#2351; &#2311;&#2306;&#2360;&#2381;&#2335;&#2367;&#2335;&#2381;&#2351;&#2370;&#2335; &#2347;&#2377;&#2352; &#2325;&#2341;&#2325; &#2319;&#2306;&#2337; &#2325;&#2379;&#2352;&#2367;&#2351;&#2379;&#2327;&#2381;&#2352;&#2366;&#2347;&#2368;) (NIKC) &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Munna Shukla</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2344;&#2381;&#2344;&#2366; &#2358;&#2369;&#2325;&#2381;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Shambhu Maharaj</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2306;&#2349;&#2369; &#2350;&#2361;&#2366;&#2352;&#2366;&#2332;</span>",
      "<span class=\"eqt\">Maya Rao</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2351;&#2366; &#2352;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Uma Dogra</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2350;&#2366; &#2337;&#2379;&#2327;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In 1964, in New Delhi, Maya Rao set up the Natya Institute for Kathak and Choreography (NIKC). The institute would become the premier academy for learning Kathak, ballet, and other dance forms. Stalwarts of the Indian music and dance scenes like Pandit Ravi Shankar and Anil Biswas were amongst the regulars at the school.</p><p>The import of the institute was such that in 1987, then Chief Minister of Karnataka, Ramakrishna Hegde, requested her to shift the NIKC to Bengaluru. The centre soon became affiliated with Bangalore University, and apart from Kathak, even taught ballet.</p><p>Her autobiography is 'In A Lifetime in Choreography'. Maya Rao completed a three-year post-graduate degree in choreography and ballet from the erstwhile USSR. She remains amongst a few classical dance performers from India to have received a degree in choreography.</p>",
    "question_index": 25
  },

      "<span class=\"eqt\">Tanakh</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2344;&#2366;&#2326;</span>",
      "<span class=\"eqt\">Tripitaka</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2346;&#2367;&#2335;&#2325;</span>",
      "<span class=\"eqt\">Avesta</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2375;&#2360;&#2381;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Agamas</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2327;&#2350;&#2360;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#61623; <b>Avesta</b>, also called Zend-avesta, sacred book of Zoroastrianism containing its cosmogony, law, and liturgy, the teachings of the prophet Zoroaster (Zarathushtra). </p><p>&#61623; These religious ideas are encapsulated in the sacred texts of the Zoroastrians and assembled in a body of literature called the Avesta. </p><p>&#61623; Composed in an ancient Iranian language, Avestan, the Avesta is made up of different texts, most of which are recited in the Zoroastrian rituals, some of them by priests only, others by both priests and laypeople. </p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>Consider the following Events:</p><p>I- Simla Deputation</p><p>II- Surat Split</p><p>III- Partition of Bengal</p><p>IV- Delhi Pact</p><p>Arrange the above Events in chronological order and select the correct answer from the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2328;&#2335;&#2344;&#2366;&#2323;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I- &#2358;&#2367;&#2350;&#2354;&#2366; &#2358;&#2367;&#2359;&#2381;&#2335;&#2350;&#2306;&#2337;&#2354;</p><p>II- &#2360;&#2370;&#2352;&#2340; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344;</p><p>III- &#2348;&#2306;&#2327;&#2366;&#2354; &#2325;&#2366; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344;</p><p>IV- &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2350;&#2333;&#2380;&#2340;&#2366;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2328;&#2335;&#2344;&#2366;&#2323;&#2306; &#2325;&#2379; &#2325;&#2366;&#2354;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">III, I, II, IV</span><span class=\"hqt\" style=\"display:none\">III, I, II, IV</span>",
      "<span class=\"eqt\">I, II, III, IV</span><span class=\"hqt\" style=\"display:none\">I, II, III, IV</span>",
      "<span class=\"eqt\">IV, III, II, I</span><span class=\"hqt\" style=\"display:none\">IV, III, II, I</span>",
      "<span class=\"eqt\">III, II, I, IV</span><span class=\"hqt\" style=\"display:none\">III, II, I, IV</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The British government's decision to partition Bengal had been made public in December 1903. The idea was to have two provinces: Bengal comprising Western Bengal as well as the provinces of Bihar and Orissa, and Eastern Bengal and Assam. The official reason given for the decision was that Bengal with a population of 78 million (about a quarter of the population of British India) had become too big to be administered. The government announced the partition of Bengal in July 1905 and in October 1905, the partition formally came into force.</p><p>In October 1906, a group of Muslim elites called the Simla Deputation, led by the Agha Khan, met Lord Minto and demanded separate electorates for the Muslims and representation in excess of their numerical strength in view of 'the value of the contribution' Muslims were making \"to the defence of the empire\".</p><p>The Extremists wanted the 1907 session to be held in Nagpur (Central Provinces) with Tilak or Lajpat Rai as the president along with a reiteration of the swadeshi, boycott and national education resolutions. The Moderates wanted the session at Surat in order to exclude Tilak from the presidency, since a leader from the host province could not be session president (Surat being in Tilak's home province of Bombay). Instead, they wanted Rashbehari Ghosh as the president and sought to drop the resolutions on swadeshi, boycott and national education.</p><p>On January 25, 1931, Gandhi and all other members of the Congress Working Committee (CWC) were released unconditionally. The CWC authorised Gandhi to initiate discussions with the viceroy. As a result of these discussions, a pact was signed between the viceroy, representing the British Indian Government, and Gandhi, representing the Indian people, in Delhi on February 14, 1931. This Delhi Pact, also known as the Gandhi-Irwin Pact, placed the Congress on an equal footing with the government.</p>",
    "question_index": 27
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following best describes the Expenditure method of estimating the aggregate value of goods and services produced during a year?</p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2325;&#2369;&#2354; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2366; &#2309;&#2344;&#2369;&#2350;&#2366;&#2344; &#2354;&#2327;&#2366;&#2344;&#2375; &#2325;&#2368; &#2357;&#2381;&#2351;&#2351; &#2357;&#2367;&#2343;&#2367; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Measuring the sum total of the factor payments made in the production process.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2319; &#2327;&#2319; &#2325;&#2366;&#2352;&#2325; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2325;&#2369;&#2354; &#2351;&#2379;&#2327;&#2347;&#2354; &#2325;&#2379; &#2350;&#2366;&#2346;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Measuring the aggregate value of final goods and services produced by all the firms.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2347;&#2352;&#2381;&#2350;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2325;&#2369;&#2354; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2379; &#2350;&#2366;&#2346;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Measuring the aggregate value of spending that the firms receive for the final goods and services they produce</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2326;&#2352;&#2381;&#2330; &#2325;&#2375; &#2325;&#2369;&#2354; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2379; &#2350;&#2366;&#2346;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Option a: Measuring the sum total of the factor payments made in the production process is called the income method of calculating national income.</p><p></p><p>Option b: Measuring the aggregate value of final goods and services produced by all the firms is called the product method or value-added method.</p><p></p><p>Option c: Measuring the aggregate value of spending that the firms receive for the final goods and services they produce is called the expenditure method. Hence, option c is correct.</p><p></p><p>Source: NCERT XII</p>",
    "question_index": 28
  },

    "question": "<span class=\"eqt\"><p>At which Olympics was Kho-Kho featured in an exhibition in the main stadium?</p></span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360; &#2323;&#2354;&#2306;&#2346;&#2367;&#2325; &#2350;&#2375;&#2306; &#2326;&#2379;-&#2326;&#2379; &#2325;&#2379; &#2350;&#2369;&#2326;&#2381;&#2351; &#2360;&#2381;&#2335;&#2375;&#2337;&#2367;&#2351;&#2350; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344;&#2368; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">2016</span><span class=\"hqt\" style=\"display:none\">2016</span>",
      "<span class=\"eqt\">2008</span><span class=\"hqt\" style=\"display:none\">2008</span>",
      "<span class=\"eqt\">1932</span><span class=\"hqt\" style=\"display:none\">1932</span>",
      "<span class=\"eqt\">1936</span><span class=\"hqt\" style=\"display:none\">1936</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Kho-kho was featured as a demonstration sport at the 1936 Berlin Olympics but it did not gain enough support to be included in the Summer Games.</p><p>A 35-member contingent from a little-known physical education institute called Hanuman Vyayam Prasarak Mandal (HVPM) based out of Amravati city of Maharashtra travelled to Berlin on the organisers' invitation to showcase a bunch of indigenous sporting disciplines.</p><p>The itinerary included a variation of kabaddi, then known as hu tu tu in India.</p><p></p><p>About Kabbadi:</p><p>Kho kho is traditionally played outside on a rectangular court, divided in two by a line that connects two poles at either end of the field.</p><p>Teams switch between attack and defence, with the former chasing and tagging defending players around the field.</p><p>Only one player can give chase at a time and attacking players can only move in one direction around the court, forcing them to tag in team-mates crouched on the centre line to take over pursuit.</p><p>The match is won by whichever team can gain the most points, primarily by tagging defenders faster than the opposing team.</p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>Who is considered the father of immunology and is known his work on smallpox?</p></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2325;&#2381;&#2359;&#2366; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2325;&#2366; &#2332;&#2344;&#2325; &#2325;&#2367;&#2360;&#2375; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2330;&#2375;&#2330;&#2325; &#2346;&#2352; &#2313;&#2344;&#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Jonas Salk</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2379;&#2344;&#2366;&#2360; &#2360;&#2366;&#2354;&#2381;&#2325;</span>",
      "<span class=\"eqt\">Louis Pasteur</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2369;&#2312; &#2346;&#2366;&#2358;&#2381;&#2330;&#2352;</span>",
      "<span class=\"eqt\">Edward Jenner</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2337;&#2357;&#2352;&#2381;&#2337; &#2332;&#2375;&#2344;&#2352;</span>",
      "<span class=\"eqt\">Alexander Fleming</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2375;&#2325;&#2381;&#2332;&#2375;&#2306;&#2337;&#2352; &#2347;&#2381;&#2354;&#2375;&#2350;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Edward Jenner is known as the father of immunology.</p><p>He is known for his pioneering work in developing the smallpox vaccine in 1796.</p><p>He discovered that exposure to cowpox (a less severe disease) could protect against smallpox, which was deadly at the time.</p><p>His work laid the foundation for modern immunology and vaccination programs worldwide.</p><p></p><p>Other Options:</p><p>A. Jonas Salk - Developed the inactivated polio vaccine in the 1950s.</p><p>B. Louis Pasteur - Developed vaccines for rabies and anthrax and founded the germ theory of disease.</p><p>D. Alexander Fleming - Discovered penicillin, the worlds first antibiotic, in 1928.</p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>Nat is a classical style of singing of </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2335; &#2327;&#2366;&#2351;&#2344; &#2325;&#2368; &#2319;&#2325; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2358;&#2376;&#2354;&#2368; &#2325;&#2361;&#2366; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Manipur</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2339;&#2367;&#2346;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Assam</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2350;</span>",
      "<span class=\"eqt\">Gujarat</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2332;&#2352;&#2366;&#2340;</span>",
      "<span class=\"eqt\">Goa</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2357;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The <b>Manipuri</b> classical style of singing is called Nat - very different from both north and south Indian music, this style is immediately recognizable with its high pitched open throated rendering with particular type of trills and modulations.</p><p>The main musical instrument is the Pung or the Manipuri classical drum. There are also many other kinds of drums used in Manipuri dance and music.</p><p>The Pena, a stringed instrument is used in Lai Haraoba and Pena singing. Various kinds of cymbals are used in Sankirtana and Ras. The flute is also used to accompany vocal singing.</p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>Earthquakes are measured on a scale called the _______that has replaced the Richter scale, which is now considered outdated and less accurate.</p><p></p></span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2325;&#2306;&#2346; &#2325;&#2379; _______ &#2344;&#2366;&#2350;&#2325; &#2346;&#2376;&#2350;&#2366;&#2344;&#2375; &#2346;&#2352; &#2350;&#2366;&#2346;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2367;&#2360;&#2344;&#2375; &#2352;&#2367;&#2325;&#2381;&#2335;&#2352; &#2346;&#2376;&#2350;&#2366;&#2344;&#2375; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2354;&#2375; &#2354;&#2367;&#2351;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2375; &#2309;&#2348; &#2346;&#2369;&#2352;&#2366;&#2344;&#2366; &#2324;&#2352; &#2325;&#2350; &#2360;&#2335;&#2368;&#2325; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p></span>",
    "options": [
      "<span class=\"eqt\">Beaufort Scale</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2351;&#2370;&#2347;&#2379;&#2352;&#2381;&#2335; &#2360;&#2381;&#2325;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Mercalli Scale</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2352;&#2381;&#2325;&#2366;&#2354;&#2368; &#2360;&#2381;&#2325;&#2375;&#2354;</span>",
      "<span class=\"eqt\">Moment Magnitude Scale</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2359;&#2339; &#2346;&#2352;&#2367;&#2350;&#2366;&#2339; &#2346;&#2376;&#2350;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Seismic Intensity Scale</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2325;&#2306;&#2346;&#2368;&#2351; &#2340;&#2368;&#2357;&#2381;&#2352;&#2340;&#2366; &#2346;&#2376;&#2350;&#2366;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Moment Magnitude Scale (Mw) is now the most widely used and accepted scale for measuring the magnitude of earthquakes.</p><p>It has replaced the Richter scale, which was developed in the 1930s. While the Richter scale was useful for small, local earthquakes, it became less accurate for larger or distant quakes.</p><p>What causes Earthquakes?</p><p>The Earth's crust is made up of separate bits, called plates, that nestle alongside each other.</p><p>These plates often try to move but are prevented by the friction of rubbing up against an adjoining one.</p><p>But sometimes, the pressure builds until one plate suddenly jerks across, causing the surface to move.</p><p>They are measured on a scale called the Moment Magnitude Scale (Mw). This has replaced the Richter scale, which is now considered outdated and less accurate.</p><p>The number attributed to an earthquake represents a combination of the distance the fault line has moved and the force that moved it.</p><p>A tremor of 2.5 or less usually cannot be felt but can be detected by instruments. Quakes of up to five are felt and cause minor damage. The Myanmar earthquake at 7.7 is classified as major and usually causes serious damage, as it has in this instance.</p><p>Anything above 8.0 causes catastrophic damage and can totally destroy communities at its centre.</p><p></p><p>Context:</p><p>Myanmar was hit with a huge earthquake 28 March, 2025.</p><p>The 7.7 magnitude tremor was felt elsewhere, including in Thailand and south-west China.</p><p>South Asia, including Myanmar, is highly prone to earthquakes due to its proximity to the complex assemblage of some of the largest tectonic features on earth, including the Himalayas, the Shillong Plateau, the Southern Indo-Burman Range, and the Andaman-Nicobar subduction zone.</p><p>Originating from the collision of the Indian and the Eurasian Plates some 40 million years ago, the plate boundary in Southeast Asia is an active tectonic feature that generated one of the largest earthquakes in history, of magnitude 9.2, and a transcontinental tsunami in 2004.</p><p></p><p></p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>The dividing tissue present in the growth tissue of the plant is called_________</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2380;&#2343;&#2375; &#2325;&#2375; &#2357;&#2367;&#2325;&#2366;&#2360; &#2314;&#2340;&#2325; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2314;&#2340;&#2325; &#2325;&#2379;________ &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Meristematic tissue</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2349;&#2332;&#2381;&#2351;&#2379;&#2340;&#2325; &#2314;&#2340;&#2325;</span>",
      "<span class=\"eqt\">Permanent tissue</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2314;&#2340;&#2325;</span>",
      "<span class=\"eqt\">Epidermal tissue</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2343;&#2367;&#2330;&#2352;&#2381;&#2350; &#2314;&#2340;&#2325;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Meristematic tissue is the type of plant tissue that consists of actively dividing cells. These tissues are responsible for the growth of the plant.</p><p>They are found in specific regions like the tips of roots and shoots, and in areas where branches or leaves originate.</p><p>These cells are undifferentiated and have a high capacity to divide, enabling the plant to grow in length (primary growth) and thickness (secondary growth).</p>",
    "question_index": 33
  },

    "question": "<span class=\"eqt\"><p>The Government of India liberalised the India economy under the economic reform plan of 1991 to </p><p>I. Reduce inflationary pressures in the economy</p><p>II. Fix the Balance of Payment (BoP) conditions</p><p>III. Improve the fiscal deficit</p><p>Answer Codes:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; 1991 &#2325;&#2368; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2340;&#2361;&#2340; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2379; &#2313;&#2342;&#2366;&#2352; &#2348;&#2344;&#2366;&#2351;&#2366;, &#2311;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;?</p><p>I. &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2375; &#2342;&#2348;&#2366;&#2357; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2366;</p><p>II. &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; (BoP) &#2325;&#2368; &#2358;&#2352;&#2381;&#2340;&#2379;&#2306; &#2325;&#2379; &#2336;&#2368;&#2325; &#2325;&#2352;&#2344;&#2366;</p><p>III. &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2375; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352;</p><p>&#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2379;&#2337;:</p></span>",
    "options": [

      "<span class=\"eqt\">III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">I and III</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Economic Reforms refer to the fundamental or structural changes of the economy through various policy measures. During the 1980s, India had gone through various macroeconomic crises and it became necessary for some structural changes in the economy. <b>The Government of India liberalised the India economy under the reform plan to:</b></p><p>&bull; FIx the rising fiscal deficit.</p><p>&bull; Improve the poor performance of the Public Sector.</p><p>&bull; Fix the adverse Balance of Payments condition.</p><p>&bull; Improve the falling Foreign exchange reserves.</p><p>&bull; Reduce the inflationary Pressure in the economy. </p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following:</p><p>I. It requires High temperature and low rainfall</p><p>II. It requires 210 frost-free days and bright sunshine.</p><p>III. It is also suited for alluvial soil.</p><p>The above conditions are required for the growth of which of the following plants?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;:</p><p>I. &#2311;&#2360;&#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2330;&#2381;&#2330; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344; &#2357;&#2352;&#2381;&#2359;&#2366; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2311;&#2360;&#2325;&#2375; &#2354;&#2367;&#2319; 210 &#2346;&#2366;&#2354;&#2366;-&#2350;&#2369;&#2325;&#2381;&#2340; &#2342;&#2367;&#2344; &#2324;&#2352; &#2340;&#2375;&#2332;&#2364; &#2343;&#2370;&#2346; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>III. &#2351;&#2361; &#2332;&#2354;&#2379;&#2338;&#2364; &#2350;&#2371;&#2342;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2349;&#2368; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2380;&#2343;&#2375; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cotton</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2346;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Jute</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2370;&#2335;</span>",
      "<span class=\"eqt\">Tea</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2351;</span>",
      "<span class=\"eqt\">Wheat</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2375;&#2361;&#2370;&#2305;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Cotton is a Kharif crop that needs:</p><p>- A warm climate (high temperature)</p><p>- Low rainfall (excess water can damage the crop)</p><p>- 210 frost-free days  cotton is sensitive to frost</p><p>- Bright sunshine for good boll formation</p><p>- Well-drained alluvial or black soil is best for cultivation</p>",
    "question_index": 35
  },

    "question": "<span class=\"eqt\"><p>Chloroethane is also called as __.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2354;&#2379;&#2352;&#2379;&#2319;&#2341;&#2375;&#2344; &#2325;&#2379; ______ &#2349;&#2368; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Chloride</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2379;&#2352;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Ethylene</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2341;&#2368;&#2354;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Ethyl Chloride</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2341;&#2367;&#2354; &#2325;&#2381;&#2354;&#2379;&#2352;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Methoprene</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2341;&#2379;&#2346;&#2381;&#2352;&#2368;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Chloroethane (C&#8322;H&#8325;Cl) is an ethyl group (C&#8322;H&#8325;) bonded to a chlorine atom.</p><p>It is a haloalkane and is commonly referred to by its common name: ethyl chloride.</p><p>It is a colorless, flammable gas used as a local anesthetic and in the production of tetraethyl lead (a gasoline additive, now largely phased out).</p>",
    "question_index": 36
  },
  {
    "question": "<span class=\"eqt\"><p>'Xoo infection' has caused high yield loss in which among the following crops? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2347;&#2360;&#2354; &#2350;&#2375;&#2306; '&#2332;&#2370; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339;' &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2313;&#2330;&#2381;&#2330; &#2313;&#2346;&#2332; &#2361;&#2366;&#2344;&#2367; &#2361;&#2369;&#2312; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Wheat</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2375;&#2361;&#2370;&#2305;</span>",
      "<span class=\"eqt\">Rice</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2357;&#2354;</span>",
      "<span class=\"eqt\">Maize</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2325;&#2381;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Sugarcane</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2344;&#2381;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Xanthomonas oryzae pv. oryzae, or commonly known as Xoo infection, are responsible for causing huge yield losses to rice cultivation throughout the world. It is also known as Bacterial blight as it causes a serious bacterial leaf blight disease in rice. It is a gram-negative bacterium. </p><p>Symptoms of Xoo infection on plants: </p><p>&bull; It turns the leaves into pale-green to grey-green color, ultimately leading to their death.</p><p>&bull; Waxy edges appear on the leaves. </p><p>&bull; water-soaked streaks appear around the leaf tip and margins.</p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>Manju Mehta, leading sitar exponent was conferred with the _______ in 2018 for her contribution in the field of music.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2360;&#2367;&#2340;&#2366;&#2352; &#2357;&#2366;&#2342;&#2325; &#2350;&#2306;&#2332;&#2370; &#2350;&#2375;&#2361;&#2340;&#2366; &#2325;&#2379; &#2360;&#2306;&#2327;&#2368;&#2340; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2375; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2352;&#2381;&#2359; 2018 &#2350;&#2375;&#2306; _______ &#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",

    "correct_option_id": 1,
    "solution": "<p>Manju Mehta is associated with sitar. She is a disciple of Pandit Ravi Shankar. In 2018, she was conferred with the 'Tansen Samman' for 2018 by the Madhya Pradesh government for her contribution in the field of music.</p>",

    "question": "<span class=\"eqt\"><p>Which state government started the Lata Mangeshkar Award for Music in 1984?</p></span><span class=\"hqt\" style=\"display:none\"><p>1984 &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; &#2360;&#2306;&#2327;&#2368;&#2340; &#2325;&#2375; &#2354;&#2367;&#2319; &#2354;&#2340;&#2366; &#2350;&#2306;&#2327;&#2375;&#2358;&#2325;&#2352; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Andhra Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Madhya Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Uttar Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>&#8226; The Lata Mangeshkar Award is a national-level award instituted to honour works in the field of music.</p><p>&#8226; The state government of Madhya Pradesh started this award in 1984.</p><p>&#8226; K S Chithra is the latest recipient of this award (2023).</p><p>&#8226; The Lata Mangeshkar Award for Lifetime Achievement is presented by the Maharashtra government since its inception in 1992. Additionally, there is another award given by the Andhra Pradesh government.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>Which article of the Indian Constitution mentions that the \"State shall promote with special care the educational and economic interests of the weaker sections\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2350;&#2375;&#2306; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2361;&#2376; &#2325;&#2367; \"&#2352;&#2366;&#2332;&#2381;&#2351; &#2342;&#2369;&#2352;&#2381;&#2348;&#2354; &#2357;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2375; &#2358;&#2376;&#2325;&#2381;&#2359;&#2367;&#2325; &#2324;&#2352; &#2309;&#2352;&#2381;&#2341; &#2360;&#2306;&#2348;&#2306;&#2343;&#2368; &#2361;&#2367;&#2340;&#2379;&#2306; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359; &#2360;&#2366;&#2357;&#2343;&#2366;&#2344;&#2368; &#2360;&#2375; &#2309;&#2349;&#2367;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2352;&#2375;&#2327;&#2366;\"?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 16</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 16</span>",
      "<span class=\"eqt\">Article 46</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 46</span>",
      "<span class=\"eqt\">Article 87</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 87</span>",
      "<span class=\"eqt\">Article 32</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Article 46 is part of the Directive Principles of State Policy in the Indian Constitution.</p><p>It states:</p><p>\"The State shall promote with special care the educational and economic interests of the weaker sections of the people, and, in particular, of the Scheduled Castes and the Scheduled Tribes, and shall protect them from social injustice and all forms of exploitation.\"</p><p></p><p>What the other articles refer to:</p><p>Article 16 - Provides for equality of opportunity in public employment.</p><p>Article 87 - Deals with the President's address to Parliament.</p><p>Article 32 - Provides the right to constitutional remedies (allows individuals to move the Supreme Court for the enforcement of fundamental rights).</p>",
    "question_index": 41
  },
  {
    "question": "<span class=\"eqt\"><p>Select the entities related to Treaty of Purandar (1665).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2369;&#2352;&#2306;&#2342;&#2352; &#2325;&#2368; &#2360;&#2306;&#2343;&#2367; (1665) &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2325;&#2381;&#2359;&#2379;&#2306; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">British and Marathas</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332; &#2324;&#2352; &#2350;&#2352;&#2366;&#2336;&#2366;</span>",
      "<span class=\"eqt\">Mughals and British</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2327;&#2354; &#2324;&#2352; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;</span>",
      "<span class=\"eqt\">Mughals and Marathas</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2327;&#2354; &#2324;&#2352; &#2350;&#2352;&#2366;&#2336;&#2366;</span>",
      "<span class=\"eqt\">Dutch and Marathas</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2330; &#2324;&#2352; &#2350;&#2352;&#2366;&#2336;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The entities related to the Treaty of Purandar (1665) were:</p><p>Shivaji Maharaj - The Maratha ruler</p><p>Jai Singh I - Mughal general and representative of Emperor Aurangzeb</p><p>Mughal Empire - Represented by Jai Singh on behalf of Aurangzeb</p><p></p><p>Key Points of the Treaty:</p><p>- Shivaji agreed to surrender 23 forts to the Mughals.</p><p>- He retained control over 12 forts.</p><p>- Shivaji was granted a mansabdari (rank) of 5,000 by the Mughals.</p><p>- He agreed to send his son, Sambhaji, to serve in the Mughal court.</p><p>- The treaty marked a temporary truce between the Marathas and the Mughals.</p>",
    "question_index": 42
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following organisation was started by Sisir Kumar Ghosh with the object of stimulating the sense of nationalism amongst the people?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2379;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2357;&#2366;&#2342; &#2325;&#2368; &#2349;&#2366;&#2357;&#2344;&#2366; &#2325;&#2379; &#2332;&#2327;&#2366;&#2344;&#2375; &#2325;&#2375; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2360;&#2375; &#2358;&#2367;&#2358;&#2367;&#2352; &#2325;&#2369;&#2350;&#2366;&#2352; &#2328;&#2379;&#2359; &#2344;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2375; &#2360;&#2306;&#2327;&#2336;&#2344; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">The East India Association</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2319;&#2360;&#2379;&#2360;&#2367;&#2319;&#2358;&#2344;</span>",
      "<span class=\"eqt\">The Indian League</span><span class=\"hqt\" style=\"display:none\">&#2342; &#2311;&#2306;&#2337;&#2367;&#2351;&#2344; &#2354;&#2368;&#2327;</span>",
      "<span class=\"eqt\">British Indian Association</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2311;&#2306;&#2337;&#2367;&#2351;&#2344; &#2319;&#2360;&#2379;&#2360;&#2367;&#2319;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Indian National Association</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2337;&#2367;&#2351;&#2344; &#2344;&#2375;&#2358;&#2344;&#2354; &#2319;&#2360;&#2379;&#2360;&#2367;&#2319;&#2358;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Indian League was started in 1875 by Sisir Kumar Ghosh with the object of stimulating the sense of nationalism amongst the people and of encouraging political education.</p><p>The Indian Association of Calcutta (also known as the Indian National Association) superseded the Indian League and was founded in 1876 by younger nationalists of Bengal led by Surendranath Banerjea and Ananda Mohan Bose, who were getting discontented with the conservative and pro-landlord policies of the British Indian Association. The Indian Association was the most important of pre-Congress associations and aimed to promote by every legitimate means the political, intellectual and material advancement of the people.</p>",
    "question_index": 43
  },
  {
    "question": "<span class=\"eqt\"><p>Identify which of the following statement(s) is/are true regarding the Speaker of Lok Sabha?</p><p>I. The institution of Speaker and Deputy Speaker originated under the Government of India Act 1935.</p><p>II. The Speaker of Lok Sabha has no security of tenure.</p><p>Answer Codes:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2325;&#2367; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2324;&#2352; &#2313;&#2346;&#2366;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2368; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; 1935 &#2325;&#2375; &#2340;&#2361;&#2340; &#2361;&#2369;&#2312; &#2341;&#2368;&#2404;</p><p>II. &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2366; &#2325;&#2379;&#2312; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2379;&#2337;:</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Statement 1 is not correct:</b> The institution of Speaker and Deputy speaker originated under the Government of India Act 1919. Under the Indian Constitution, the Lok Sabha and Legislative Assemblies elect two of its members to be the Speaker and Deputy Speaker, respectively. Apart from the traditional roles with respect to the conduct of business, the Speakers perform two important functions: of certifying a Bill to be a Money Bill (over which the Rajya Sabha/Legislative Council have a limited role), and deciding on disqualification under the Tenth Schedule for defection.</p><p><b>Statement 2 is not correct: </b>The Speaker of the Lok Sabha is provided with security of tenure. He can be removed only by a resolution passed by Lok Sabha by an absolute majority</p>",
    "question_index": 44

    "question": "<span class=\"eqt\"><p>The given equation provides the property of the motion of an object, traversing a circular path. What is 'v' in this equation? ac = v<sup>2</sup>/R</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2341; &#2346;&#2352; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352; &#2352;&#2361;&#2368; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306; 'v' &#2325;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;? ac = v^2/R</p></span>",
    "options": [

    "correct_option_id": 2,
    "solution": "<p>v in the equation ac = v<sup>2</sup>/R represents the linear velocity(speed) of the object moving in a circular path.</p><p></p><p>Here's a breakdown of the terms in the equation:</p><p></p><p>ac: Centripetal acceleration</p><p>v: Linear velocity</p><p>R: Radius of the circular path</p><p>This equation essentially states that the centripetal acceleration of an object moving in a circle is directly proportional to the square of its linear velocity and inversely proportional to the radius of the circle.</p>",

7;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; :</p><p>A B C D</p></span>",

    "solution": "<p>Pandit Ravi Shankar - Sitar</p><p>Ustad Bismillah Khan - Shehnai</p><p>Zakir Hussain - Tabla</p><p>Ustad Binda Khan - Sarangi</p><p></p><p>Further information:</p><p>Pandit Ravi Shankar:</p><p>- Pandit Ravi Shankar was a legendary sitar maestro from India and is internationally renowned for popularizing Indian classical music around the world.</p><p>- He collaborated with Western artists like George Harrison (The Beatles) and performed on global stages.</p><p>- The sitar is a plucked string instrument used extensively in Hindustani classical music.</p><p>Ustad Bismillah Khan:</p><p>- Ustad Bismillah Khan was the most famous Shehnai player in Indian history.</p><p>- He is credited with elevating the shehnai, a traditional wind instrument often used in weddings and religious ceremonies, to the status of a classical instrument.</p><p>- He was awarded the Bharat Ratna, Indias highest civilian award, in 2001.</p><p>Zakir Hussain:</p><p>- Zakir Hussain is one of the worlds greatest tabla virtuosos and known for his mesmerizing rhythm and global collaborations.</p><p>- The tabla is a percussion instrument made of a pair of drums and is key to Hindustani classical music.</p><p>- He is also known for his work with fusion music and global percussion ensembles.</p><p></p><p>Ustad Binda Khan:</p><p>- Ustad Binda Khan was a renowned sarangi player, especially prominent in the early 20th century.</p><p>- The sarangi is a bowed string instrument known for its ability to closely imitate the human voice.</p>",

    "question": "<span class=\"eqt\"><p>A person invested Rs. 12000 in a simple interest at 'X' % rate of interest per annum for 3 years. If the total interest received from the investment is Rs. 6120, then find the value of X. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; 'X'% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; &#2346;&#2352; 3 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2369;.12000 &#2325;&#2366; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2344;&#2367;&#2357;&#2375;&#2358; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2369;&#2354; &#2348;&#2381;&#2351;&#2366;&#2332; &#2352;&#2369;. 6120 &#2361;&#2376;, &#2340;&#2379; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">19</span><span class=\"hqt\" style=\"display:none\">19</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>S.I = P * R * T/100</p><p>6120 = 12000 * X * 3/100</p><p>X = 6120 * 100/ (12000 * 3) = 17%</p><p>Hence, X = 17</p>",
    "question_index": 50
  },

    "question": "<span class=\"eqt\"><p>Pipe A can fill the tank in 27 hours and pipe B can fill the same tank in 36 hours. If they are opened alternately for an hour and pipe A is opened first, then find the time taken to fill 75% of the tank. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; A &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 27 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2360;&#2350;&#2366;&#2344; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 36 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2319;&#2325; &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325;&#2366;&#2306;&#2340;&#2352; &#2352;&#2370;&#2346; &#2360;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2346;&#2366;&#2311;&#2346; A &#2325;&#2379; &#2346;&#2361;&#2354;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; &#2325;&#2366; 75% &#2349;&#2366;&#2327; &#2349;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">27 hours</span><span class=\"hqt\" style=\"display:none\">27 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">25 hours</span><span class=\"hqt\" style=\"display:none\">25 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">23 hours</span><span class=\"hqt\" style=\"display:none\">23 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">21 hours</span><span class=\"hqt\" style=\"display:none\">21 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The total capacity of tank = L.C.M of 27 and 36 = 108</p><p>75% of the tank = 108 * 75/100 = 81</p><p>Efficiency = Total capacity/ Time taken</p><p>Efficiency of A = 108/27 = 4</p><p>Efficiency of B = 108/36 = 3</p><p>Tank filled by A and B in 2 hours = 4 * 1 + 3 * 1 = 7</p><p>Time taken by A and B to fill 81 = 2 * (81/7) + 4/4 = 2 * 11 + 1 </p><p>= 23 hours</p><p>Hence, the required time = 23 hours</p>",
    "question_index": 51
  },

    "question": "<span class=\"eqt\"><p>In the given figure, CD is the bisector of &#8736;ACB. What is the measure of &#8736;BDC.</p><p><img width=200 height=132 id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21237/image011.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, CD, &#8736;ACB &#2325;&#2366; &#2360;&#2350;&#2342;&#2381;&#2357;&#2367;&#2349;&#2366;&#2332;&#2325; &#2361;&#2376;&#2404; &#8736;BDC &#2325;&#2366; &#2350;&#2366;&#2346; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"200\" height=\"132\" id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21237/image011.jpg\"></p></span>",

    "solution": "<p><img width=179 height=118 id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21237/image012.jpg\" ></p><p>Since, CD is the bisector of &#8736;ACB.</p><p>So, &#8736;BCD = (180&#730; - 110&#730;)/2 = 35&#730;</p><p>&#8736;CBD = 110&#730; - 74&#730; = 36&#730;</p><p>In &#8710;CBD-</p><p>&#8736;CBD + &#8736;BDC + &#8736;DCB = 180&#730;</p><p>&#8736;BDC = 180&#730; - 35&#730; - 36&#730;</p><p>&#8736;BDC = 109&#730;</p>",

    "question": "<span class=\"eqt\"><p>If A + B = 45&deg; and (7 + 7tanA) (9 + 9tanB) = 3X/5, then find the value of X.</p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; A + B = 45&deg; &#2340;&#2341;&#2366; (7 + 7tanA) (9 + 9tanB) = 3X/5, &#2340;&#2379; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">245</span><span class=\"hqt\" style=\"display:none\">245</span>",
      "<span class=\"eqt\">175</span><span class=\"hqt\" style=\"display:none\">175</span>",
      "<span class=\"eqt\">210</span><span class=\"hqt\" style=\"display:none\">210</span>",
      "<span class=\"eqt\">130</span><span class=\"hqt\" style=\"display:none\">130</span>"

    "correct_option_id": 2,
    "solution": "<p>We know that (1 + tanA) (1 + tanB) = 2 if A + B = 45&deg;.</p><p>Given,</p><p>(7 + 7tanA) (9 + 9tanB) = 3X/5</p><p>7 x 9 (1 + tanA) (1 + tanB) = 3X/5</p><p>7 x 9 x 2 = 3X/5</p><p>X = 210</p>",

    "question": "<span class=\"eqt\"><p> Three congruent circles each of radius 4 cm touch one another. What is the area (in Sq. cm ) of the portion included between them? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; 4 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2375; &#2340;&#2368;&#2344; &#2360;&#2352;&#2381;&#2357;&#2366;&#2306;&#2327;&#2360;&#2350; &#2357;&#2371;&#2340;&#2381;&#2340; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2313;&#2344;&#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2340;&#2352;&#2381;&#2357;&#2367;&#2359;&#2381;&#2335; &#2349;&#2366;&#2327; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (Sq. cm &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>In alloys A and B, the ratio of lead to tin is 12: 13 and 11: 9, respectively. 350 kg of alloy A and 200 kg of alloy B are mixed to form a new alloy. What is the amount of lead (in kg) in the new alloy?</p></span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2366;&#2340;&#2369; A &#2324;&#2352; B &#2350;&#2375;&#2306;, &#2360;&#2368;&#2360;&#2375; &#2324;&#2352; &#2335;&#2367;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 12:13 &#2324;&#2352; 11:9 &#2361;&#2376;&#2404; &#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2366;&#2340;&#2369; A &#2325;&#2375; 350 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2324;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2366;&#2340;&#2369; B &#2325;&#2375; 200 &#2325;&#2367;&#2327;&#2381;&#2352;&#2366; &#2325;&#2379; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352; &#2319;&#2325; &#2344;&#2351;&#2366; &#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2366;&#2340;&#2369; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2319; &#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2366;&#2340;&#2369; &#2350;&#2375;&#2306; &#2360;&#2368;&#2360;&#2375; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; (&#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">272</span><span class=\"hqt\" style=\"display:none\">272</span>",
      "<span class=\"eqt\">282</span><span class=\"hqt\" style=\"display:none\">282</span>",
      "<span class=\"eqt\">288</span><span class=\"hqt\" style=\"display:none\">288</span>",
      "<span class=\"eqt\">278</span><span class=\"hqt\" style=\"display:none\">278</span>"

    "correct_option_id": 3,
    "solution": "<p>Lead in alloy A = 350 * 12/(12 + 13) = 168 l</p><p>Lead in alloy B = 200 * 11/(11 + 9) = 110 l</p><p>Hence, the required amount = 168 + 110 = 278 l</p>",
