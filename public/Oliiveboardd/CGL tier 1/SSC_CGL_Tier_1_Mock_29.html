    "question": "<span class=\"eqt\"><p>Below pie chart shows the percentage distribution of machines manufactured by five companies:</p><p>Total number of machines manufactured by all five companies = 8000</p><p><img width=386 height=336 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er220917ss9020001.png\"></p><p>Below pie chart shows the degree distribution of machines sold by five companies:</p><p>Total number of machines sold by all five companies = 5400</p><p><img width=384 height=336 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er220917ss9020002.png\"></p><p></p><p>What is the difference between the number of machines sold by company S and T together and that of by company V and W together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2357;&#2371;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2346;&#2366;&#2305;&#2330; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2350;&#2358;&#2368;&#2344;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;:</p><p>&#2360;&#2349;&#2368; &#2346;&#2366;&#2305;&#2330; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2350;&#2358;&#2368;&#2344;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = 8000</p><p><img width=\"386\" height=\"336\" id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er220917ss9020001.png\"></p><p>&#2344;&#2368;&#2330;&#2375; &#2357;&#2371;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2346;&#2366;&#2305;&#2330; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2350;&#2358;&#2368;&#2344;&#2379;&#2306; &#2325;&#2366; &#2337;&#2367;&#2327;&#2381;&#2352;&#2368; &#2357;&#2367;&#2340;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;:</p><p>&#2360;&#2349;&#2368; &#2346;&#2366;&#2305;&#2330; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2350;&#2358;&#2368;&#2344;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; = 5400</p><p><img width=\"384\" height=\"336\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er220917ss9020002.png\"></p><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2306;&#2346;&#2344;&#2368; S &#2324;&#2352; T &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2350;&#2358;&#2368;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2340;&#2341;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2306;&#2346;&#2344;&#2368; V &#2324;&#2352; W &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2350;&#2358;&#2368;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">70</span><span class=\"hqt\" style=\"display:none\">70</span>",
      "<span class=\"eqt\">90</span><span class=\"hqt\" style=\"display:none\">90</span>",
      "<span class=\"eqt\">80</span><span class=\"hqt\" style=\"display:none\">80</span>",
      "<span class=\"eqt\">100</span><span class=\"hqt\" style=\"display:none\">100</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The number of machines manufactured by company S = 8000 * 12/100 = 960</p><p>The number of machines sold by company S = 5400 * 42/360 = 630</p><p>Similarly, calculating the remaining data:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">manufactured</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">sold</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">960</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">630</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2000</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1620</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">U</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1200</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">810</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">V</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2240</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1260</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">W</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1600</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1080</td></tr></table><p>The number of machines sold by company S and T together = 630 + 1620 = 2250</p><p>The number of machines sold by company V and W together = 1260 + 1080 = 2340</p><p>So, required difference = 2340  -  2250 = 90</p>",
    "question_index": 57
  },

    "question": "<span class=\"eqt\"><p>A grocer has a sale of Rs. 20000, Rs. 24000, Rs. 36000 and Rs. X in consecutive four months. Find the value of X if average sale of grocer in all four months is Rs. 31000.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2367;&#2352;&#2366;&#2344;&#2375; &#2325;&#2368; &#2342;&#2369;&#2325;&#2366;&#2344; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2330;&#2366;&#2352; &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2369;. 20000, &#2352;&#2369;. 24000, &#2352;&#2369;. 36000 &#2324;&#2352; &#2352;&#2369;. X &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2349;&#2368; &#2330;&#2366;&#2352; &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2352;&#2366;&#2344;&#2375; &#2325;&#2368; &#2342;&#2369;&#2325;&#2366;&#2344; &#2325;&#2368; &#2324;&#2360;&#2340; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; 31000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 40000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 40000</span>",

    "question": "<span class=\"eqt\"><p>A boat can travel 1612 km upstream in 31 hours. If the ratio of the speed of a boat in still water to the speed of a boat downstream is 19: 25, then find the time taken by boat to travel 3500 km downstream. </p></span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 1612 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 31 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 19:25 &#2361;&#2376;, &#2340;&#2379; &#2344;&#2366;&#2357; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 3500 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">28 hours</span><span class=\"hqt\" style=\"display:none\">28 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">35 hours</span><span class=\"hqt\" style=\"display:none\">35 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">30 hours</span><span class=\"hqt\" style=\"display:none\">30 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">21 hours</span><span class=\"hqt\" style=\"display:none\">21 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the boat's speed downstream and the boat's speed in still water be 25a km/hr and 19a km/h respectively.</p><p>Speed of a boat downstream = The speed of a boat in still water + The speed of the stream</p><p>= 25a km/hr</p><p>Speed of a boat upstream = The speed of a boat in still water - The speed of the stream</p><p>= [19a  -  (25a  -  19a)] = 13a km/hr</p><p>Distance/ Time = Speed</p><p>1612/ 31 = 13a</p><p>13a = 52</p><p>a = 4 </p><p>Hence, the required time = 3500/ 25 * 4</p><p>= 35 hours </p>",
    "question_index": 59
  },

    "question": "<span class=\"eqt\"><p>If two polynomials x<sup>3</sup> + kx<sup>2</sup> + 4x  -  12 and 2x<sup>3</sup> + x<sup>2</sup>  -  2x + 3k leave the same remainder when divided by (x  -  3), Find the value of k and the remainder. </p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2342;&#2379; &#2348;&#2361;&#2369;&#2346;&#2342; x<sup>3</sup> + kx<sup>2</sup> + 4x - 12 &#2324;&#2352; 2x<sup>3</sup> + x<sup>2</sup> - 2x + 3k &#2325;&#2379; (x - 3) &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2360;&#2350;&#2366;&#2344; &#2358;&#2375;&#2359; &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; k &#2325;&#2366; &#2350;&#2366;&#2344; &#2324;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",

    "question": "<span class=\"eqt\"><p>In an election between three candidates A, B, and C, 20% of the total vote cast is declared invalid. A received 40% of valid votes, B received 32% of valid votes and C received 28% of valid votes. If B received 3920 votes more than C, then find the total number of invalid votes.</p></span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; A, B &#2324;&#2352; C &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2330;&#2369;&#2344;&#2366;&#2357; &#2350;&#2375;&#2306;, &#2325;&#2369;&#2354; &#2337;&#2366;&#2354;&#2375; &#2327;&#2319; &#2357;&#2379;&#2335;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; 20% &#2325;&#2379; &#2309;&#2357;&#2376;&#2343; &#2328;&#2379;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; A &#2325;&#2379; &#2357;&#2376;&#2343; &#2357;&#2379;&#2335;&#2379;&#2306; &#2325;&#2366; 40%, B &#2325;&#2379; &#2357;&#2376;&#2343; &#2357;&#2379;&#2335;&#2379;&#2306; &#2325;&#2366; 32% &#2324;&#2352; C &#2325;&#2379; &#2357;&#2376;&#2343; &#2357;&#2379;&#2335;&#2379;&#2306; &#2325;&#2366; 28% &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2310;&#2404; &#2351;&#2342;&#2367; B &#2325;&#2379; C &#2360;&#2375; 3920 &#2357;&#2379;&#2335; &#2309;&#2343;&#2367;&#2325; &#2350;&#2367;&#2354;&#2375;, &#2340;&#2379; &#2325;&#2369;&#2354; &#2309;&#2357;&#2376;&#2343; &#2357;&#2379;&#2335;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</span>",

    "question": "<span class=\"eqt\"><p>In a triangle PQR which is right angle at Q, PQ = 8&radic;5 cm and PS = 16 cm, then find the length of side QR.</p><p><img width=208 height=184 id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3206/image008.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; PQR &#2350;&#2375;&#2306;, &#2332;&#2379; Q &#2346;&#2352; &#2360;&#2350;&#2325;&#2379;&#2339; &#2361;&#2376;, PQ = 8&radic;5 cm &#2324;&#2352; PS = 16 cm &#2361;&#2376;, &#2340;&#2379; &#2349;&#2369;&#2332;&#2366; QR &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"208\" height=\"184\" id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3206/image008.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">4&radic;5 cm</span><span class=\"hqt\" style=\"display:none\">4&radic;5 cm</span>",
      "<span class=\"eqt\">4 cm</span><span class=\"hqt\" style=\"display:none\">4 cm</span>",
      "<span class=\"eqt\">5&radic;5 cm</span><span class=\"hqt\" style=\"display:none\">5&radic;5 cm</span>",
      "<span class=\"eqt\">6&radic;5 cm</span><span class=\"hqt\" style=\"display:none\">6&radic;5 cm</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let RS = 'x'.</p><p>In &#9651;PQS, PQ<sup>2</sup> = PS<sup>2</sup> + QS<sup>2</sup></p><p>=&gt; (8&radic;5)<sup>2</sup> = (16)<sup>2</sup> + QS<sup>2</sup></p><p>=&gt; QS<sup>2</sup> = 64</p><p>=&gt; QS = 8</p><p>In &#9651;QSR, QR<sup>2</sup> = RS<sup>2</sup> + QS<sup>2</sup></p><p>=&gt; QR<sup>2</sup> = x<sup>2</sup> + 8<sup>2</sup></p><p>In &#9651;PQR, PR<sup>2</sup> = PQ<sup>2</sup> + QR<sup>2</sup></p><p>=&gt; (16 + x)<sup>2</sup> = (8&radic;5)<sup>2</sup> + (x<sup>2</sup> + 8<sup>2</sup>)</p><p>=&gt; 256 + x<sup>2</sup> + 32x = 320 + x<sup>2</sup> + 64</p><p>=&gt; 32x = 128</p><p>=&gt; x = 4</p><p>QR = &radic;(4<sup>2</sup> + 8<sup>2</sup>) = 4&radic;5 cm</p>",
    "question_index": 64
  },

    "solution": "<p>=&gt; [(&radic;5+&radic;3) /(&radic;5-&radic;3)] * [(&radic;5+&radic;3)/(&radic;5+&radic;3)] ......(rationalizing)</p><p>=&gt; (5+3+2&radic;15)/ (5-3)</p><p>=&gt; (8+2&radic;15)/2</p><p>=&gt; 4+&radic;15 = a+b&radic;15</p><p>=&gt;  a=4, b=1</p>",

    "question": "<span class=\"eqt\"><p>A prism has the base of a triangle whose inradius and semi-perimeter are 4 cm and 32 cm respectively, the volume of prism is 896 cm&#179;. find the area of the lateral surface of the prism?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 4 cm &#2324;&#2352; 32 cm &#2309;&#2306;&#2340;&#2307;&#2357;&#2371;&#2340;&#2381;&#2340; &#2324;&#2352; &#2309;&#2352;&#2381;&#2343;&#2346;&#2352;&#2367;&#2350;&#2366;&#2346; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2376;, &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 896 cm&ge; &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2368; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2360;&#2340;&#2361; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",

    "question": "<p>Identify the pair of synonyms from the underlined words in the given sentence.</p><p>The <u>conceited</u> entrepreneur <u>frequently</u> showcased his <u>luxurious</u> <u>possessions </u>and <u>achievements</u>, reflecting a <u>proud</u> <u>demeanor</u> that <u>alienated </u>some of his colleagues.</p>",

    "solution": "<p>The words \"conceited\" and \"proud\" are synonyms as they both convey a sense of excessive self-esteem and a high opinion of oneself. \"Conceited\" implies an exaggerated belief in one's own abilities or importance, while \"proud\" denotes a feeling of deep satisfaction or pleasure derived from one's achievements, qualities, or possessions.</p><p>Option (a) is not correct since \"possessions\" and \"achievements\" are related concepts but not exact synonyms. \"Possessions\" refer to belongings or things owned, while \"achievements\" refer to accomplishments.</p><p>Option (b) is not correct as \"luxurious\" and \"demeanor\" are not synonymous. \"Luxurious\" describes something characterized by luxury or opulence, while \"demeanor\" refers to one's outward behavior or conduct.</p><p>Option (c) is not correct because \"frequently\" and \"alienated\" are not synonyms. \"Frequently\" relates to the frequency of an action or occurrence, while \"alienated\" means to make someone feel isolated or estranged.</p><p>Hence, (d) is the correct answer. </p>",

    "question": "<p>Select the most appropriate homonyms from the given alternatives to fill in the blanks.</p><p>I could _____ untie the ______ no matter how hard I tried.</p><p>A. knot (a tie or fastening)</p><p>B. not (negative)</p><p>C. knot (to tie securely)</p>",
    "options": [
      "C, A",
      "A, C",
      "B, C",
      "B, A"
    ],
    "correct_option_id": 3,
    "solution": "<p>The phrase \"I could _____ untie...\" suggests that the speaker is saying they were unable to untie something. That means we need a negative word in the first blank - something that shows inability or refusal. So, in the first blank, the correct word is \"not\" (Option B) - it's the negative adverb used to negate the verb \"could.\"</p><p>The speaker is trying to untie something, which logically would be a \"knot\" - a fastening or loop made by tying rope, string, etc. So, the second blank should be \"knot\" (Option A) - a noun referring to the thing being untied.</p><p>Option C mentions \"knot (to tie securely)\" - this is a verb, but the second blank needs a noun (something that is untied), not an action.</p><p>So using Option C would be grammatically incorrect.</p><p>So, the first blank shall be filled with 'B' (not), and the second blank should be filled with 'A' (knot (noun)).</p><p>Hence, option (d) is the answer.</p>",
    "question_index": 79
  },
