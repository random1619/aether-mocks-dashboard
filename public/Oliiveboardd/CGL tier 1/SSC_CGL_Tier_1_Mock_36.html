<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="exam-duration" content="60">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Each of the digits in the number 32541638298 is arranged in ascending order from left to right. How many digits will remain unchanged in the position compared to the original number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 32541638298 &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2306;&#2325; &#2325;&#2379; &#2348;&#2366;&#2319;&#2306; &#2360;&#2375; &#2342;&#2366;&#2319;&#2306; &#2348;&#2338;&#2364;&#2340;&#2375; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2350;&#2370;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2306;&#2325; &#2309;&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2352;&#2361;&#2375;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">One</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;</span>",
      "<span class=\"eqt\">Three<b> </b></span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;<b> </b></span>",
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>",
      "<span class=\"eqt\">More than three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</span>"

    "correct_option_id": 0,

    "question_index": 0

  {
    "question": "<span class=\"eqt\"><p>Select the option that is related to the fourth term in the same way as the first term is related to the second term and the fifth term is related to the sixth term.</p><p>CDR: BDCEQS:: JRY: ? :: EON: DFNPMO</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2379; &#2330;&#2380;&#2341;&#2375; &#2346;&#2342; &#2360;&#2375; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2346;&#2361;&#2354;&#2366; &#2346;&#2342;, &#2342;&#2370;&#2360;&#2352;&#2375; &#2346;&#2342; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2305;&#2330;&#2357;&#2366;&#2306; &#2346;&#2342;, &#2331;&#2336;&#2375; &#2346;&#2342; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>CDR: BDCEQS:: JRY: ? :: EON: DFNPMO</p></span>",
    "options": [
      "<span class=\"eqt\">ILQPXZ</span><span class=\"hqt\" style=\"display:none\">ILQPXZ</span>",
      "<span class=\"eqt\">IKQSXZ</span><span class=\"hqt\" style=\"display:none\">IKQSXZ</span>",
      "<span class=\"eqt\">ILPSXZ</span><span class=\"hqt\" style=\"display:none\">ILPSXZ</span>",

  {
    "question": "<span class=\"eqt\"><p>Select the set in which the numbers are related in the same way as are the numbers of the following sets.</p><p>(NOTE: operations should be performed on the whole numbers, without breaking down the numbers into its constituent digits. E.g. 13  -  Operations on 13 such as adding/deleting/multiplying etc. to 13 can be performed. Breaking down 13 into 1 and 3 and then performing mathematical operations on 1 and 3 is not allowed)</p><p>(10, 16, 25)</p><p>(18, 27, 64)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2360;&#2350;&#2370;&#2361; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306; &#2332;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2350;&#2370;&#2361;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;&#2404;</p><p>(<b>&#2344;&#2379;&#2335;:</b> &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2309;&#2357;&#2351;&#2357; &#2309;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2319; &#2348;&#2367;&#2344;&#2366; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2306; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2346;&#2352; &#2325;&#2368; &#2332;&#2366;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; 13 - 13 &#2346;&#2352; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2332;&#2376;&#2360;&#2375; 13 &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2344;&#2366;/&#2328;&#2335;&#2366;&#2344;&#2366;/&#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2344;&#2366; &#2310;&#2342;&#2367; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; 13 &#2325;&#2379; 1 &#2324;&#2352; 3 &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2324;&#2352; &#2347;&#2367;&#2352; 1 &#2324;&#2352; 3 &#2346;&#2352; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;)</p><p>(10, 16, 25)</p><p>(18, 27, 64)</p></span>",

      "<span class=\"eqt\">(87, 95, 56)</span><span class=\"hqt\" style=\"display:none\">(87, 95, 56)</span>",
      "<span class=\"eqt\">(56, 71, 31)</span><span class=\"hqt\" style=\"display:none\">(56, 71, 31)</span>",
      "<span class=\"eqt\">(51, 58, 36)</span><span class=\"hqt\" style=\"display:none\">(51, 58, 36)</span>",
      "<span class=\"eqt\">(41, 49, 21)</span><span class=\"hqt\" style=\"display:none\">(41, 49, 21)</span>"

    "correct_option_id": 2,
    "solution": "<p>(10, 16, 25) = 10, 16-10 = 6, (6-1)&#178;=5&#178; = 25</p><p>(18, 27, 64) = 18, 27-18= 9, (9-1)&#178;=8&#178; = 64</p><p>Option (1):</p><p>(87, 95, 56) = 87, 95  -  87 = 8, (8-1)&#178;=7&#178; = 49 which is not equal to 56</p><p>Option (2):</p><p>(56, 71, 31) = 56, 71  -  56= 15, (15-1)&#178; = 14&#178; = 196 which is not equal to 31</p><p>Option (3):</p><p>(51, 58, 36) = 51, 58-51=7, (7-1)&#178;= 6&#178; = 36</p><p>Option (4):</p><p>(41, 49, 21) = 41, 49  -  41 = 8, (8-1)&#178; = 7&#178; = 49 which is not equal to 21</p>",

  {
    "question": "<span class=\"eqt\"><p>Using the letters of the word AGGLUTINATIVE, which among the following words can be made?</p></span><span class=\"hqt\" style=\"display:none\"><p>AGGLUTINATIVE &#2358;&#2348;&#2381;&#2342; &#2325;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2358;&#2348;&#2381;&#2342; &#2348;&#2344;&#2366;&#2351;&#2366;/&#2348;&#2344;&#2366;&#2351;&#2375; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366;/&#2360;&#2325;&#2340;&#2375; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",

  {
    "question": "<span class=\"eqt\"><p>If P denotes 'x', Q denotes '-', R denotes '&div;', S denotes '+' and 55Q42R7P8S10= 1b, then the value of 'b' is</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; P, 'x' &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;, Q, '-' &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;, R, '&div;' &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;, S, '+' &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 55Q42R7P8S10= 1b &#2361;&#2376;, &#2340;&#2379; 'b' &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

    "question": "<span class=\"eqt\"><p>Four Statements are given followed by four conclusions numbered I, II, III and IV. Assuming the statements to be true, even if they seem to be at variance with commonly known facts, decide which of the conclusions logically <b>does NOT follow(s)</b> from the statements.</p><p><b>Statements:</b></p><p>All Radish are Carrot</p><p>Some Carrot are Turnip</p><p>No Turnip is Tomato</p><p>All Potato are Tomato</p><p><b>Conclusions:</b></p><p>I: All Radish being Tomato is a possibility.</p><p>II: Some Potato is Turnip.</p><p>III: Some Turnip are Carrot.</p><p>IV: All Radish being Turnip is a possibility.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2366;&#2352; &#2325;&#2341;&#2344; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2330;&#2366;&#2352; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I, II, III &#2324;&#2352; IV &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2357;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2379;&#2306;, &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><b>&#2325;&#2341;&#2344; :</b></p><p>&#2360;     "solution": "<p><b>Statements:</b></p><p>All Radish are Carrot</p><p>Some Carrot are Turnip</p><p>No Turnip is Tomato</p><p>All Potato are Tomato</p><p><img width=479 height=168 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21342/image016.png\"></p><p>I: All Radish being Tomato is a possibility: There is no relation between Radish and Tomato. Thus, All Radish being Tomato is a possibility. So, conclusion I is true.</p><p>II: Some Potato is Turnip: No Turnip is Tomato. All Potato are Tomato. Thus, No Potato is Turnip. So, conclusion II is false.</p><p>III: Some Turnip is Carrot: Some Carrot are Turnip. Thus, some carrot are Turnip. So, conclusion III is true.</p><p>IV: All Radish being Turnip is a possibility: All Radish are Carrot. Some Carrot are Turnip. Thus, all Radish being Turnip is a possibility. So, conclusion IV is true.</p><p>Hence, only conclusion II does not follow.</p>",

ags, license &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2325;&#2379;&#2312; tag, license &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>In a certain code language,</p><p>P 2 Q means Q is the wife of P</p><p>P 4 Q means Q is the son of P</p><p>P 6 Q means Q is the mother of P</p><p>P 8 Q means Q is the father of P</p><p>Based on the above, how is B related to A if 'J 8 A 2 C 4 E 4 B 6 D'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>P 2 Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; Q, P &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;</p><p>P 4 Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; Q, P &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;</p><p>P 6 Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; Q, P &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>P 8 Q &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; Q, P &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, &#2351;&#2342;&#2367; 'J 8 A 2 C 4 E 4 B 6 D' &#2361;&#2376;, &#2340;&#2379; B, A &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Vajasaneyi Samhita and Taitriya Samhita are the two main branches of:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2332;&#2360;&#2344;&#2375;&#2351;&#2368; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366; &#2324;&#2352; &#2340;&#2376;&#2340;&#2381;&#2340;&#2367;&#2352;&#2368;&#2351; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366; &#2311;&#2360;&#2325;&#2368; &#2342;&#2379; &#2350;&#2369;&#2326;&#2381;&#2351; &#2358;&#2366;&#2326;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Rig Veda</span><span class=\"hqt\" style=\"display:none\">&#2315;&#2327;&#2381;&#2357;&#2375;&#2342;</span>",
      "<span class=\"eqt\">Yajur Veda</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2332;&#2369;&#2352;&#2381;&#2357;&#2375;&#2342;</span>",
      "<span class=\"eqt\">Sama Veda</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2350;&#2357;&#2375;&#2342;</span>",
      "<span class=\"eqt\">Atharva Veda</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2341;&#2352;&#2381;&#2357;&#2357;&#2375;&#2342;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Yajur Veda is divided into two primary recensions:</p><p>- Shukla Yajur Veda (White Yajur Veda): Contains the Vajasaneyi Samhita, a collection of mantras and rituals in a clear, well-arranged form.</p><p>- Krishna Yajur Veda (Black Yajur Veda): Includes the Taittiriya Samhita, which blends mantras with explanatory prose (Brahmana portions).</p><p></p><p>Why Not Others?</p><p>(a) Rig Veda: Oldest Veda, but its Samhitas are Mandalas, not Vajasaneyi/Taittiriya.</p><p>(c) Sama Veda: Focuses on melodies (e.g., Kauthuma Samhita), not ritual prose.</p><p>(d) Atharva Veda: Contains hymns for daily life (e.g., Shaunaka Samhita), unrelated to Yajur Veda's sacrificial rituals.</p><p>Further insights:</p><p>- Yajur means sacrifice or worship. This Veda is concerned mostly with rites and mantras of different sacrifices.</p><p>- Being a treatise on rituals, it is the most popular of the four Vedas.</p>",
    "question_index": 25
  },
  {
    "question": "<span class=\"eqt\"><p>Ramanuja, who was deeply influenced by the Alvars, believed that the best means of attaining salvation was through intense devotion to ________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2350;&#2366;&#2344;&#2369;&#2332;, &#2332;&#2379; &#2309;&#2354;&#2357;&#2352;&#2379;&#2306; &#2360;&#2375; &#2348;&#2361;&#2369;&#2340; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2341;&#2375;, &#2325;&#2366; &#2350;&#2366;&#2344;&#2344;&#2366; &#8203;&#8203;&#2341;&#2366; &#2325;&#2367; &#2350;&#2379;&#2325;&#2381;&#2359; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2309;&#2330;&#2381;&#2331;&#2366; &#2360;&#2366;&#2343;&#2344; ________ &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2327;&#2361;&#2344; &#2349;&#2325;&#2381;&#2340;&#2367; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Shiva</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2357;</span>",
      "<span class=\"eqt\">Vishnu</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2359;&#2381;&#2339;&#2369;</span>",
      "<span class=\"eqt\">Brahma</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Durga</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2369;&#2352;&#2381;&#2327;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Ramanuja believed that the best means of attaining salvation was through intense devotion to <b>Vishnu</b>.</p><p><b>Ramanuja (11th - 12th century CE)</b>, a key philosopher in the Sri Vaishnavism tradition, was deeply influenced by the devotional hymns of the <b>Alvars</b> (Vaishnava saints).</p><p>He propagated <b>Vishishtadvaita (Qualified Non-Dualism)</b>, which emphasized:</p><p>&bull; <b>Intense devotion (Bhakti) to Vishnu (or his avatar, Krishna)</b> as the path to salvation.</p><p>&bull; The soul's loving surrender (<b>Prapatti</b>) to Vishnu for liberation (<b>Moksha</b>).</p>",
    "question_index": 26
  },
  {
    "question": "<span class=\"eqt\"><p>In March 2024, Prime Minister Narendra Modi inaugurated India's first under-river metro tunnel in which city?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2352;&#2381;&#2330; 2024 &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2344;&#2352;&#2375;&#2306;&#2342;&#2381;&#2352; &#2350;&#2379;&#2342;&#2368; &#2344;&#2375; &#2325;&#2367;&#2360; &#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2346;&#2361;&#2354;&#2368; &#2346;&#2366;&#2344;&#2368; &#2325;&#2375; &#2344;&#2368;&#2330;&#2375; (&#2309;&#2306;&#2337;&#2352;-&#2352;&#2367;&#2357;&#2352;) &#2350;&#2375;&#2335;&#2381;&#2352;&#2379; &#2360;&#2369;&#2352;&#2306;&#2327; &#2325;&#2366; &#2313;&#2342;&#2381;&#2328;&#2366;&#2335;&#2344; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [

      "<span class=\"eqt\">Chennai</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2344;&#2381;&#2344;&#2312;</span>",
      "<span class=\"eqt\">Kolkata</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2354;&#2325;&#2366;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Vishakhapatnam</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2366;&#2326;&#2366;&#2346;&#2340;&#2381;&#2340;&#2344;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Prime Minister Narendra Modi inaugurated India's first under-river metro tunnel in Kolkata. The metro tunnel has been built under Kolkata's Hooghly River that will connect Howrah Maidan to Esplanade.</p><p>The 4.8 km stretch between Howrah Maidan and Esplanade is the second section of the East-West Metro corridor between Howrah Maidan and the IT hub Salt Lake Sector V.</p>",

  },

    "question": "<span class=\"eqt\"><p>Which of the following is the correct representation of frequency?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367; &#2325;&#2366; &#2360;&#2361;&#2368; &#2344;&#2367;&#2352;&#2370;&#2346;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1/time period</span><span class=\"hqt\" style=\"display:none\">1/&#2360;&#2350;&#2351; &#2309;&#2357;&#2343;&#2367;</span>",
      "<span class=\"eqt\">1/distance travelled</span><span class=\"hqt\" style=\"display:none\">1/&#2340;&#2351; &#2325;&#2368; &#2327;&#2351;&#2368; &#2342;&#2370;&#2352;&#2368;</span>",
      "<span class=\"eqt\">1/amplitude</span><span class=\"hqt\" style=\"display:none\">1/&#2310;&#2351;&#2366;&#2350;</span>",
      "<span class=\"eqt\">1/wavelength</span><span class=\"hqt\" style=\"display:none\">1/&#2340;&#2352;&#2306;&#2327; &#2342;&#2376;&#2352;&#2381;&#2343;&#2381;&#2351;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In physics, the term frequency refers to <b>the number of waves that pass a fixed point in unit time</b>. It also describes the number of cycles or vibrations undergone during one unit of time by a body in periodic motion. Its unit is Hertz. Frequency = 1/period = 1/(time interval).</p>",
    "question_index": 28
  },

    "question": "<span class=\"eqt\"><p>Match the following. </p><p><img width=585 height=191 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21123/image005.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2379; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"585\" height=\"191\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21123/image005.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">A-2, B-1, C-3, D-4</span><span class=\"hqt\" style=\"display:none\">A-2, B-1, C-3, D-4</span>",
      "<span class=\"eqt\">A-3, B-2, C-1, D-4</span><span class=\"hqt\" style=\"display:none\">A-3, B-2, C-1, D-4</span>",
      "<span class=\"eqt\">A-2, B-1, C-4, D-3</span><span class=\"hqt\" style=\"display:none\">A-2, B-1, C-4, D-3</span>",
      "<span class=\"eqt\">A-4, B-2, C-1, D-3</span><span class=\"hqt\" style=\"display:none\">A-4, B-2, C-1, D-3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Correct code is <b>A-2, B-1, C-3, D-4. </b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Type of market structure</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Features</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Perfect Competition</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Many firms offer a homogeneous product. Because there is freedom of entry and exit and perfect information, firms will make normal profits and prices will be kept low by competitive pressures.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Monopolistic Competition</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Many firms offer products or services that are similar, but not perfect substitutes. Barriers to entry and exit in a monopolistic competitive industry are low, and the decisions of any one firm do not directly affect those of its competitors.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Oligopoly</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Small number of firms, none of which can keep the others from having significant influence. The concentration ratio measures the market share of the largest firms.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Duopoly</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Market structure dominated by two firms. A pure duopoly is a market where there are just two firms. But, in reality, most duopolies are markets where the two biggest firms control over 70% of the market share. Duopolistic markets are imperfectly competitive, so entry barriers are typically significant.</td></tr></table>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>In October 2023, the government has raised the subsidy amount for Pradhan Mantri Ujjwala Yojana beneficiaries to _____________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2023 &#2350;&#2375;&#2306;, &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2313;&#2332;&#2381;&#2332;&#2381;&#2357;&#2354;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2354;&#2366;&#2349;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2348;&#2381;&#2360;&#2367;&#2337;&#2368; &#2325;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2348;&#2338;&#2364;&#2366;&#2325;&#2352; _____________ &#2325;&#2352; &#2342;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.300</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.300</span>",
      "<span class=\"eqt\">Rs.400</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.400</span>",
      "<span class=\"eqt\">Rs.200</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.200</span>",
      "<span class=\"eqt\">Rs.100</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.100</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The government has raised the subsidy amount for Pradhan Mantri Ujjwala Yojana beneficiaries from Rs.200 to Rs.300 per LPG cylinder. Ujjwala beneficiaries currently pay Rs.703 per 14.2-kg cylinder as against the market price of Rs.903. After the decision of the Union Cabinet, they will now pay '603.</p><p></p><p>The Pradhan Mantri Ujjwala Yojana (PMUY), initiated on May 1, 2016, by PM Modi in UP's Ballia, aims to provide cooking fuel such as LPG to rural households. The scheme's focus is on offering LPG connections to women from below the poverty line (BPL) households, SC/ST communities, beneficiaries of Pradhan Mantri Awas Yojana (PMAY), Antyoday Anna Yojana (AAY), forest dwellers, and other disadvantaged groups.</p><p>The Union Cabinet had last month approved the extension of PMUY for release of 75 lakh LPG connections over three years from the financial year 2023-24 to 2025-26. The 75 lakh additional Ujjwala connections will take total number of PMUY beneficiaries to 10.35 crore.</p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>Mandolin Player, U Srinivas, was awarded which of the following award in 1998? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2376;&#2306;&#2337;&#2379;&#2354;&#2367;&#2344; &#2357;&#2366;&#2342;&#2325; &#2351;&#2370; &#2358;&#2381;&#2352;&#2368;&#2344;&#2367;&#2357;&#2366;&#2360; &#2325;&#2379; 1998 &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Padma Bhushan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2381;&#2350; &#2349;&#2370;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Sangita Kalanidhi</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2327;&#2368;&#2340;&#2366; &#2325;&#2354;&#2366;&#2344;&#2367;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Sangeet Natak Akademi Award</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2327;&#2368;&#2340; &#2344;&#2366;&#2335;&#2325; &#2309;&#2325;&#2366;&#2342;&#2350;&#2368; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Padma Shri</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2381;&#2350; &#2358;&#2381;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Uppalapu Srinivas was an Indian mandolin player in Carnatic classical music and composer. </p><p>He was awarded the Padma Shri in 1998, by the Government of India. </p><p>He was also awarded the Sangeet Natak Akademi Award in 2009 given by Sangeet Natak Akademi, which is the National Academy of Music, Dance &amp; Drama, in India.</p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the last element form the fifth period.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2305;&#2330;&#2357;&#2375;&#2306; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2375; &#2309;&#2306;&#2340;&#2367;&#2350; &#2340;&#2340;&#2381;&#2357; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Helium</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2368;&#2354;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Yitrium</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2367;&#2335;&#2381;&#2352;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Rubidium</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2370;&#2348;&#2367;&#2337;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Xenon</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2375;&#2344;&#2377;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The fifth period contains 18 elements, beginning with rubidium and ending with xenon.</p><p>Period 5 elements have electrons in the first five electron shells. All period 5 elements have one or more electrons in the fifth electron shell (valence electrons). When atomic number increases by one, another electron is added. Two electrons join the 5s orbital, ten electrons join the 4d orbital, and six electrons join the 5p orbitals.</p><p></p><p></p>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>Naba Barsha is the celebration of the new year in which state of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2348;&#2366; &#2348;&#2352;&#2360;&#2366; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2344;&#2357; &#2357;&#2352;&#2381;&#2359; &#2325;&#2366; &#2313;&#2340;&#2381;&#2360;&#2357; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kerala</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2352;&#2354;</span>",
      "<span class=\"eqt\">Assam</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2350;</span>",
      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>",
      "<span class=\"eqt\">West Bengal</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2348;&#2306;&#2327;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; Naba Barsha is the celebration of the new year in'<b>West Bengal</b>'as per the Bengali Calendar. It is also popularly known as the PoilaBaisakh which literally translates to first Baisakhi.</p><p>&#183; Vaisakhi, also pronounced Baisakhi, marks the first day of the month of Vaisakh. It is seen as a celebration of spring harvest primarily in Northern India.</p><p>&#183; Vishu is a cultural festival celebrating the Hindu New Year in Kerala. Vishu falls on the first day of the month of Medam in the Malayalam Calendar. Rongali Bihu also called Xaat Bihu is a traditional ethnic festival celebrated in the Northeastern Indian state of Assam, and marks the beginning of the Assamese New Year.</p><p>&#183; Puthandu, also known as Tamil New Year, is the first day of year on the Tamil calendar, traditionally celebrated as a festival by Tamils as the first day of the Tamil month Chittirai.'</p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>_______occurs when air is forced to cool when it rises over mountains.</p></span><span class=\"hqt\" style=\"display:none\"><p>_______&#2340;&#2348; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2332;&#2348; &#2346;&#2361;&#2366;&#2337;&#2364;&#2379;&#2306; &#2360;&#2375; &#2314;&#2346;&#2352; &#2313;&#2336;&#2344;&#2375; &#2346;&#2352; &#2361;&#2357;&#2366; &#2336;&#2306;&#2337;&#2368; &#2361;&#2379;&#2344;&#2375; &#2354;&#2327;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Relief rainfall</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2381;&#2357;&#2340;&#2368;&#2351; &#2357;&#2352;&#2381;&#2359;&#2366;</span>",
      "<span class=\"eqt\">Convectional rainfall</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2361;&#2344;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366;</span>",
      "<span class=\"eqt\">Cyclonic rainfall</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2325;&#2381;&#2352;&#2357;&#2366;&#2340;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366;</span>",
      "<span class=\"eqt\">Frontal rainfall</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2327;&#2381;&#2352;&#2357;&#2352;&#2381;&#2340;&#2368; &#2357;&#2352;&#2381;&#2359;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Relief</b> or orographic rain is formed when air is forced to cool when it rises over relief features in the landscape such as hills or mountains. As it rises it cools, condenses and forms rain.</p><p><img width=246 height=213 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23545/image001.png\" ></p><p>Pic courtesy: NCERT</p>",
    "question_index": 35
  },
  {
    "question": "<span class=\"eqt\"><p>Pandit Suresh \"Bhai\" Gaitonde was a __________ player.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2306;&#2337;&#2367;&#2340; &#2360;&#2369;&#2352;&#2375;&#2358; \"&#2349;&#2366;&#2312;\" &#2327;&#2366;&#2351;&#2340;&#2379;&#2306;&#2337;&#2375; &#2319;&#2325; __________ &#2357;&#2366;&#2342;&#2325; &#2341;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">tabla</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2348;&#2354;&#2366;</span>",
      "<span class=\"eqt\">sitar</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2340;&#2366;&#2352;</span>",
      "<span class=\"eqt\">sarod</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2379;&#2342;</span>",
      "<span class=\"eqt\">veena</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2368;&#2339;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Pandit Suresh \"Bhai\" Gaitonde was a tabla player. He is best known for being a major disciple of Ahmed Jan Thirakwa and leading representative of the Farukhabad tradition. He was the leading exponent of Thirakwa Shailey (baaj).</p><p>Farrukhabad Gharana is one of six prominent playing styles or gharanas of North Indian tabla, in Hindustani classical music, and derives its name from Farrukhabad in Uttar Pradesh state.</p><p></p><p></p>",
    "question_index": 36
  },
  {
    "question": "<span class=\"eqt\"><p>In which of the following year Viceroy of India Lord Linlithgow made a statement on behalf of British parliament which came to be known as the 'August Offer'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2357;&#2366;&#2351;&#2360;&#2352;&#2366;&#2351; &#2354;&#2377;&#2352;&#2381;&#2337; &#2354;&#2367;&#2344;&#2354;&#2367;&#2341;&#2327;&#2379; &#2344;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2306;&#2360;&#2342; &#2325;&#2368; &#2323;&#2352; &#2360;&#2375; &#2319;&#2325; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2352;&#2326;&#2366; &#2341;&#2366;, &#2332;&#2367;&#2360;&#2375; '&#2309;&#2327;&#2360;&#2381;&#2340; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1913</span><span class=\"hqt\" style=\"display:none\">1913</span>",
      "<span class=\"eqt\">1934</span><span class=\"hqt\" style=\"display:none\">1934</span>",
      "<span class=\"eqt\">1928</span><span class=\"hqt\" style=\"display:none\">1928</span>",
      "<span class=\"eqt\">1940</span><span class=\"hqt\" style=\"display:none\">1940</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>On<b> 8 August 1940,</b> Viceroy of India Lord Linlithgow made a statement on behalf of British parliament which came to be known as the 'August Offer', which:</p><p>&#183; Proposed Dominion status as the objective for India</p><p>&#183; Promised that a Constituent Assembly would be set up after the war to determine India's constitutional future with a caveat: no future system of government would be instituted that did not have the support of minority political and religious groups</p><p>&#183; Proposed to expand the Viceroy's council to include a certain number of Indian political representatives, as a token towards Indian Self-Government</p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>Which term is used in badminton for a shot that just clears the net and lands close to it? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2376;&#2337;&#2350;&#2367;&#2306;&#2335;&#2344; &#2350;&#2375;&#2306; &#2313;&#2360; &#2358;&#2377;&#2335; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2360;&#2366; &#2358;&#2348;&#2381;&#2342; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2344;&#2375;&#2335; &#2325;&#2379; &#2346;&#2366;&#2352; &#2325;&#2352;&#2325;&#2375; &#2313;&#2360;&#2325;&#2375; &#2325;&#2352;&#2368;&#2348; &#2327;&#2367;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Smash</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2350;&#2376;&#2358;</span>",
      "<span class=\"eqt\">Drop Shot</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2381;&#2352;&#2377;&#2346; &#2358;&#2377;&#2335;</span>",
      "<span class=\"eqt\">Clear</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2354;&#2367;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Drive</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2381;&#2352;&#2366;&#2311;&#2357;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; \"Drop Shot\" refers to a soft shot that barely clears the net and falls close to it. </p><p>&bull; \"Smash\" refers to a powerful downward shot. </p><p>&bull; \"Clear\" is a shot that sends the shuttlecock to the back of the opponent's court. </p><p>&bull; \"Drive\" refers to a fast, flat shot in badminton. </p><p><b>Further Insight:</b></p><p>&bull; <b>Badminton Important Terminologies:</b> </p><p>&#9675; <b>Smash</b>  -  A powerful downward shot aimed at the opponent's court. </p><p>&#9675; <b>Drop Shot</b>  -  A soft shot that falls just over the net. </p><p>&#9675; <b>Clear</b>  -  A shot that sends the shuttlecock to the back of the opponent's court. </p><p>&#9675; <b>Rally</b>  -  A sequence of shots between players before a point is won. </p><p>&#9675; <b>Drive</b>  -  A fast and flat shot over the net. </p><p>&#9675; <b>Deuce</b>  -  When both players have 20 points each, requiring a two-point lead to win. </p>",
    "question_index": 38
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements are not correct regarding Tropical deciduous forests?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2346;&#2352;&#2381;&#2339;&#2346;&#2366;&#2340;&#2368; &#2357;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">They are also called as Monsoon forests</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2381;&#2361;&#2375;&#2306; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2357;&#2344; &#2349;&#2368; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The mean annual temperature of this region is about 27 &#870; C</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2366; &#2324;&#2360;&#2340; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2354;&#2327;&#2349;&#2327; 27 &#870; C &#2361;&#2376;</span>",
      "<span class=\"eqt\">These are found in the areas with more than 200cm rainfall</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2375; 200 cm &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2357;&#2352;&#2381;&#2359;&#2366; &#2357;&#2366;&#2354;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Teak and Sal are the most important trees grown in this Forest</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2327;&#2380;&#2344; &#2324;&#2352; &#2360;&#2366;&#2354; &#2311;&#2360; &#2357;&#2344; &#2350;&#2375;&#2306; &#2313;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2348;&#2360;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2371;&#2325;&#2381;&#2359; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Tropical deciduous forests: These are found in the areas with 100 to 200cm. annual rainfall.</p><p>These are called 'Monsoon Forests'.</p><p>The mean annual temperature of this region is about 27 &#870; C and the average annual relative humidity is 60 to 70 percent.</p><p>The trees of these forests drop their leaves during the spring and early summer. Teak and Sal are the most important trees. Sandalwood, rosewood, kusum, mahua, palas, haldu, amla, padauk, bamboo and tendu are the other trees of economic importance.</p><p>These forests also provide fragrant oil, varnish, sandal oil and perfumes.</p>",
    "question_index": 39
  },
  {
    "question": "<span class=\"eqt\"><p>The idea of \"Residual Powers\" in the Indian Constitution was influenced by which country?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; \"&#2309;&#2357;&#2358;&#2367;&#2359;&#2381;&#2335; &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306;\" &#2325;&#2366; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2360;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Canada</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2344;&#2366;&#2337;&#2366;</span>",
      "<span class=\"eqt\">USA</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2319;&#2360;&#2319;</span>",
      "<span class=\"eqt\">Australia</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2360;&#2381;&#2335;&#2381;&#2352;&#2375;&#2354;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">UK</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2325;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The concept of residual powers, where powers not explicitly mentioned are vested in the central government, was borrowed from the Canadian Constitution.</p><p>&bull; In India, residual powers are vested in the Union Government, ensuring a strong central authority.</p><p>&bull; This concept is key to maintaining the balance of power between the Union and the States.</p><p>&bull; Article 248 of the Indian Constitution outlines the distribution of residual powers.</p><p>&bull; Residual powers ensure that any emerging issues or areas not foreseen by the Constitution are managed by the central authority.</p><p><b>Additional details:</b></p><p>&bull; We got Fundamental Rights, Judicial Review, Post of President, Vice President etc. from the U.S.</p><p>&bull; We took Freedom of trade, commerce and intercourse, Joint sitting of two houses of Parliament, Cooperative Federalism, Centre-State relation, Concurrent list from Australia.</p><p>&bull; We got single citizenship, Rule of law, and a parliamentary system from the UK.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a key functional aspect of an ecosystem?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325;&#2368; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2340;&#2381;&#2350;&#2325; &#2346;&#2361;&#2354;&#2370; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Species composition</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Stratification</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2340;&#2352;-&#2357;&#2367;&#2344;&#2381;&#2351;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Productivity</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Species enumeration</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The components of an ecosystem function as a unit, considering (i) productivity, (ii) decomposition, (iii) energy flow, and (iv) nutrient cycling.</p><p>A <b>key functional aspect</b> of an ecosystem refers to processes that sustain energy flow and nutrient cycling. <b>Productivity</b> is fundamental because:</p><p>&#183; It measures the <b>rate of biomass production</b> (energy capture by producers via photosynthesis).</p><p>&#183; It determines the <b>energy available</b> for higher trophic levels (herbivores, carnivores).</p><p>&#183; It influences <b>ecosystem stability</b> and biodiversity.</p>",
    "question_index": 41
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct?</p><p>I.The GDP of a country is derived from the different sectors of the economy, namely the agricultural sector, the industrial sector and the service sector.</p><p>II.The contribution made by each of these sectors makes up the structural composition of the economy.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2325;&#2367;&#2360;&#2368; &#2342;&#2375;&#2358; &#2325;&#2366; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2375; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306;, &#2309;&#2352;&#2381;&#2341;&#2366;&#2340;&#2381; &#2325;&#2371;&#2359;&#2367; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;, &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2368; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The GDP of a country is derived from the different sectors of the economy, namely the agricultural sector, the industrial sector and the service sector.</p><p>The contribution made by each of these sectors makes up the structural composition of the economy.</p><p>In some countries, growth in agriculture contributes more to the GDP growth, while in some countries the growth in the service sector contributes more to GDP growth.</p>",
    "question_index": 42
  },
  {
    "question": "<span class=\"eqt\"><p>Which musician is known for reviving and popularizing the ancient Dhrupad style of Hindustani classical music?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2306;&#2327;&#2368;&#2340;&#2325;&#2366;&#2352; &#2361;&#2367;&#2306;&#2342;&#2369;&#2360;&#2381;&#2340;&#2366;&#2344;&#2368; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2360;&#2306;&#2327;&#2368;&#2340; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2330;&#2368;&#2344; &#2343;&#2381;&#2352;&#2369;&#2346;&#2342; &#2358;&#2376;&#2354;&#2368; &#2325;&#2379; &#2346;&#2369;&#2344;&#2352;&#2381;&#2332;&#2368;&#2357;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2354;&#2379;&#2325;&#2346;&#2381;&#2352;&#2367;&#2351; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ravi Shankar</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2358;&#2306;&#2325;&#2352;</span>",
      "<span class=\"eqt\">Ustad Nasir Faiyazuddin Dagar</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2360;&#2381;&#2340;&#2366;&#2342; &#2344;&#2366;&#2360;&#2367;&#2352; &#2347;&#2376;&#2351;&#2366;&#2332;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2337;&#2366;&#2327;&#2352;</span>",
      "<span class=\"eqt\">Zakir Hussain</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2325;&#2367;&#2352; &#2361;&#2369;&#2360;&#2376;&#2344;</span>",
      "<span class=\"eqt\">Kumar Gandharva</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2350;&#2366;&#2352; &#2327;&#2306;&#2343;&#2352;&#2381;&#2357;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Ustad Zia Fariduddin Dagar was an Indian Classical Vocalist in the Dhrupad, the oldest existing form of the Hindustani Classical Music and part of the Dagar family of musicians.</p><p>Dhrupad is one of the oldest forms of classical music in North India, characterized by its meditative and spiritual approach.</p><p>He was awarded the 1994 Sangeet Natak Akademi Award in Hindustani music-Vocal by Sangeet Natak Akademi, India's National Academy of Music, Dance and Drama.</p><p>Padma Shri- India's fourth highest civilian honor been conferred upon him in year 2012  -  but he turned it down.</p><p>Why Not Others?</p><p>(a) Ravi Shankar: Associated with sitar and Khyal gayaki, not Dhrupad.</p><p>(c) Zakir Hussain: Legendary tabla player, unrelated to Dhrupad vocals.</p><p>(d) Kumar Gandharva: Renowned for innovative Khyal and folk fusion, not Dhrupad.</p>",
    "question_index": 43
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Peshwa ruler initiated the system of confederacy among the Maratha chiefs?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2375;&#2358;&#2357;&#2366; &#2358;&#2366;&#2360;&#2325; &#2344;&#2375; &#2350;&#2352;&#2366;&#2336;&#2366; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2306;&#2328; &#2325;&#2368; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Balaji Vishwanath</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2354;&#2366;&#2332;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357;&#2344;&#2366;&#2341;</span>",
      "<span class=\"eqt\">Baji Rao I</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2332;&#2368; &#2352;&#2366;&#2357; I</span>",
      "<span class=\"eqt\">Balaji Bajirao</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2354;&#2366;&#2332;&#2368; &#2348;&#2366;&#2332;&#2368;&#2352;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Madhav-Rao</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2343;&#2357;-&#2352;&#2366;&#2357;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Baji Rao I </b>was the eldest son of Balaji Viswanath. He succeeded his father as Peshwa at the young age of twenty. The Maratha power reached its zenith under him. He initiated the system of confederacy among the Maratha chiefs. </p><p>Under this system, each Maratha chief was assigned a territory which could be administered autonomously. As a result, many Maratha families became prominent and established their authority in different parts of India. They were the Gaekwad at Baroda, the Bhonsle at Nagpur, the Holkars at Indore, the Scindias at Gwalior, and the Peshwas at Poona. </p>",
    "question_index": 44
  },
  {
    "question": "<span class=\"eqt\"><p>India chaired UNESCO's World Heritage Committee and hosted its 46th session from July 21 to 31, 2024, in _______________</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2344;&#2375; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2325;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357; &#2343;&#2352;&#2379;&#2361;&#2352; &#2360;&#2350;&#2367;&#2340;&#2367; &#2325;&#2368; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;&#2340;&#2366; &#2325;&#2368; &#2324;&#2352; 21 &#2360;&#2375; 31 &#2332;&#2369;&#2354;&#2366;&#2312;, 2024 &#2340;&#2325; &#2311;&#2360;&#2325;&#2375; 46&#2357;&#2375;&#2306; &#2360;&#2340;&#2381;&#2352; &#2325;&#2368; &#2350;&#2375;&#2332;&#2348;&#2366;&#2344;&#2368; _______________ &#2350;&#2375;&#2306; &#2325;&#2368;&#2404;</p></span>",
    "options": [

    "correct_option_id": 1,
    "solution": "<p>India chaired UNESCO's World Heritage Committee and hosted its 46th session in New Delhi from July 21 to 31, 2024, marking a historic milestone for our nation.</p><p>Vishal V Sharma, India's Permanent Representative to UNESCO, announced this decision on January 9.</p><p></p><p>The World Heritage Committee, comprising representatives from 21 member states, gathers annually to recognize global cultural and natural heritage.</p><p>According to the'World Heritage Convention, a Committee member's term of office is for six years, but most States Parties choose voluntarily to be Members of the Committee for only four years, in order to give other States Parties an opportunity to be on the Committee.</p><p>The'21'States Parties of the current World Heritage Committee are the following:</p><p>Argentina,Belgium,Bulgaria,Greece,India,Italy,Jamaica,Japan,Kazakhstan,Kenya,Lebanon,Mexico,Qatar,Republic of Korea,Rwanda,Saint Vincent and the Grenadines,Senegal,Turkiye,Ukraine,Vietnam,Zambia</p>",
    "question_index": 45
  },
  {

    "question": "<span class=\"eqt\"><p>In a factory of 90 workers, the average weight of the entire factory is 52 kg. If there are 40 male workers in the factory and the average weight of all the male workers is 55 kg, then what is the average weight of all the females?</p></span><span class=\"hqt\" style=\"display:none\"><p>90 &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2347;&#2376;&#2325;&#2381;&#2335;&#2381;&#2352;&#2368; &#2350;&#2375;&#2306;, &#2346;&#2370;&#2352;&#2368; &#2347;&#2376;&#2325;&#2381;&#2335;&#2381;&#2352;&#2368; &#2325;&#2366; &#2324;&#2360;&#2340; &#2357;&#2332;&#2344; 52 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2347;&#2376;&#2325;&#2381;&#2335;&#2381;&#2352;&#2368; &#2350;&#2375;&#2306; 40 &#2346;&#2369;&#2352;&#2369;&#2359; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2368; &#2361;&#2376;&#2306; &#2324;&#2352; &#2360;&#2349;&#2368; &#2346;&#2369;&#2352;&#2369;&#2359; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2357;&#2332;&#2344; 55 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2349;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2357;&#2332;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">51.4 kg</span><span class=\"hqt\" style=\"display:none\">51.4 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350;</span>",

    "question": "<span class=\"eqt\"><p>A bike covers a certain distance at a certain time at the speed of 64 km/hr. If at the speed of 72 km/hr, the bike covers 40 km more at the same time, then find the original distance (in km) covered by the bike.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2366;&#2311;&#2325; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2350;&#2351; &#2346;&#2352; 64 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 72 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375;, &#2348;&#2366;&#2311;&#2325; &#2360;&#2350;&#2366;&#2344; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; 40 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2309;&#2343;&#2367;&#2325; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2366;&#2311;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2351; &#2325;&#2368; &#2327;&#2312; &#2350;&#2370;&#2354; &#2342;&#2370;&#2352;&#2368; (km &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>The thickness of a spherical metallic shell is 3 cm and external radius of the shell is 9 cm. The density of the shell is 14/11 mg/cubic cm. Find the mass of the shell.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2343;&#2366;&#2340;&#2381;&#2357;&#2367;&#2325; &#2326;&#2379;&#2354; &#2325;&#2368; &#2350;&#2379;&#2335;&#2366;&#2312; 3 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; &#2326;&#2379;&#2354; &#2325;&#2368; &#2348;&#2366;&#2361;&#2381;&#2351; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 9 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2326;&#2379;&#2354; &#2325;&#2366; &#2328;&#2344;&#2340;&#2381;&#2357; 14/11 &#2350;&#2367;&#2327;&#2381;&#2352;&#2366;/&#2328;&#2344; &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2326;&#2379;&#2354; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2376 mg</span><span class=\"hqt\" style=\"display:none\">2376 &#2350;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">2736 mg</span><span class=\"hqt\" style=\"display:none\">2736 &#2350;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">2763 mg</span><span class=\"hqt\" style=\"display:none\">2763 &#2350;&#2367;&#2327;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">2733 mg</span><span class=\"hqt\" style=\"display:none\">2733 &#2350;&#2367;&#2327;&#2381;&#2352;&#2366;</span>"

    "correct_option_id": 1,
    "solution": "<p>External radius of shell= 9 cm</p><p>Thickness of shell = 3 cm</p><p>Internal radius of shell = 9  -  3 = 6 cm</p><p>Volume of shell = 4/3* &#960;* (9<sup>3 </sup> -  6<sup>3</sup>) =4/3* &#960;* 513 = 684&#960; cubic cm</p><p>Density of the shell = 14/11 mg/cm<sup>3</sup></p><p>Mass of the shell = volume * density</p><p>= 684* 22/7* 14/11 = 684* 4 = 2736 mg.</p>",

    "question": "<span class=\"eqt\"><p>In an exam, the minimum passing percentage for class VIII and class IX is 42% and 48% respectively. A student from class VIII scored 136 marks and failed by 32 marks. If the maximum marks for class IX is 125 more than that of class VIII, then find the minimum marks for class IX. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306;, &#2325;&#2325;&#2381;&#2359;&#2366; VIII &#2324;&#2352; &#2325;&#2325;&#2381;&#2359;&#2366; IX &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 42% &#2324;&#2352; 48% &#2361;&#2376;&#2404; &#2325;&#2325;&#2381;&#2359;&#2366; VIII &#2325;&#2375; &#2319;&#2325; &#2331;&#2366;&#2340;&#2381;&#2352; &#2344;&#2375; 136 &#2309;&#2306;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2319; &#2324;&#2352; 32 &#2309;&#2306;&#2325;&#2379;&#2306; &#2360;&#2375; &#2309;&#2344;&#2369;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2361;&#2379; &#2327;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2325;&#2325;&#2381;&#2359;&#2366; IX &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2309;&#2306;&#2325; &#2325;&#2325;&#2381;&#2359;&#2366; VIII &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2309;&#2306;&#2325;&#2379;&#2306; &#2360;&#2375; 125 &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2325;&#2325;&#2381;&#2359;&#2366; IX &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">258</span><span class=\"hqt\" style=\"display:none\">258</span>",
      "<span class=\"eqt\">252</span><span class=\"hqt\" style=\"display:none\">252</span>",
      "<span class=\"eqt\">268</span><span class=\"hqt\" style=\"display:none\">268</span>",
      "<span class=\"eqt\">272</span><span class=\"hqt\" style=\"display:none\">272</span>"

    "correct_option_id": 1,
    "solution": "<p>Let the maximum marks for class VIII be 'X'</p><p>X * 42/100 = 136 + 32 </p><p>X = 400 </p><p>The maximum marks for class IX = 400 + 125 </p><p>= 525 </p><p>Hence, the required minimum marks for class IX = 525 * 48/100</p><p>= 252</p>",
    "question_index": 66
  },

    "question": "<span class=\"eqt\"><p>If a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup>  -  2ab  -  2ac + 2bc = 0, what is the value of 2<sup>4c + 2</sup>/16<sup>(a  -  b)</sup>?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup> - 2ab - 2ac + 2bc = 0 &#2361;&#2376;, &#2340;&#2379; 2<sup>4c + 2</sup>/16<sup>(a - b) </sup>&#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup>  -  2ab  -  2ac + 2bc = 0</p><p>=&gt; a<sup>2</sup>  -  2ab  -  2ca + b<sup>2</sup> + c<sup>2</sup> + 2bc = 0</p><p>=&gt; a<sup>2</sup>  -  2a(b + c) + (b + c)<sup>2</sup> = 0</p><p>=&gt; (a  -  b  -  c)<sup>2</sup> = 0</p><p>=&gt; a  -  b  -  c = 0</p><p>=&gt; a  -  b = c</p><p>&#8756; 2<sup>4c + 2</sup>/16<sup>(a  -  b)</sup></p><p>= 2<sup>2</sup> x 2<sup>4c</sup>/2<sup>4(a  -  b)</sup></p><p>= 4  X  2<sup>4c</sup>/2<sup>4c</sup></p><p>= 4</p><p><b>Express Method</b></p><p>Put c = 0 in the given expression,</p><p>a<sup>2</sup> + b<sup>2</sup> + c<sup>2</sup>  -  2ab  -  2ac + 2bc = 0</p><p>a<sup>2</sup> + b<sup>2</sup> -  2ab = 0</p><p>(a - b)<sup>2</sup> = 0</p><p>a - b = 0</p><p>Now,</p><p>&#8756; 2<sup>4c + 2</sup>/16<sup>(a  -  b)</sup></p><p>= 2<sup>0 + 2</sup>/16<sup>0</sup></p><p>= 4</p>",
    "question_index": 67
  },

    "question": "<span class=\"eqt\"><p>Ram is twice as efficient as Raju and Raghu is three times as efficient as Ram. If Raghu alone can complete a work in 9 days, then find in how many days Raju and Ram working together can complete the work.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2350;, &#2352;&#2366;&#2332;&#2370; &#2360;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2369;&#2358;&#2354; &#2361;&#2376; &#2324;&#2352; &#2352;&#2328;&#2369;, &#2352;&#2366;&#2350; &#2360;&#2375; &#2340;&#2368;&#2344; &#2327;&#2369;&#2344;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2369;&#2358;&#2354; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2352;&#2328;&#2369; &#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 9 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2352;&#2366;&#2332;&#2370; &#2324;&#2352; &#2352;&#2366;&#2350; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">12 days</span><span class=\"hqt\" style=\"display:none\">12 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">15 days</span><span class=\"hqt\" style=\"display:none\">15 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">18 days</span><span class=\"hqt\" style=\"display:none\">18 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">16 days</span><span class=\"hqt\" style=\"display:none\">16 &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let Raju's efficiency be x.</p><p>Then, Ram's efficiency will be 2x.</p><p>And, Raghu's efficiency will be 6x.</p><p>Respective ratio of efficiency of Raju, Ram and Raghu = 1:2:6</p><p>Total work = 6 * 9 = 54 units</p><p>Required time = 54/(1+2) = 18 days</p>",
    "question_index": 70

; &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2366; 2019 &#2324;&#2352; 2021 &#2350;&#2375;&#2306; &#2310;&#2350; &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2360;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>The surroundings amazed me while we were travelling.</p>",

    "correct_option_id": 1,
    "solution": "<p>&#183;The correct answer is<b>(b) I was amazed at the surroundings while we were travelling.</b></p><p>&#183;The <b>subject</b> of the Active Voice is changed into the <b>object</b> of the Passive Voice. Also, the <b>object</b> of the Active Voice is changed into the <b>subject</b> of the Passive Voice.</p><p>&#183;The usage of a <b>helping verb</b> is necessary while changing the voice of the sentence from Active to Passive.</p><p>&#183;The sentence is in <b>Simple Past</b> in the Active Voice. Thus, in the Passive voice, the sentence will be in <b>Simple Past</b>.</p><p>&#183;The format of Active voice is:<b>Subject + V2 + Object.</b></p><p>&#183;Thus, in Passive voice, the format will be:<b>Subject (Objective case) + was/were + V3 + by + Object (Subjective Case).</b></p><p>&#183;Certain verbs<b>don't</b> agree with the preposition <b>\"by\"</b> in Passive form.</p><p>&#183;They take the preposition which is appropriate to them.</p><p>&#183;Some of the verbs along with the prepositions are given in the table below:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Verb</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Preposition</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Known</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Surprised</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">at</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Amazed</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">at</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Annoyed (somebody)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">with</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Annoyed (something)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">at</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Included</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">in</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Moved</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">by</td></tr></table><p>&#183;For example:</p><p>o She annoyed me. (Active)</p><p>o I was annoyed with her. (Passive)</p><p>&#183;The options except <b>(b)</b> don't follow the correct grammatical format of the Passive Voice.</p><p>&#183;Therefore, the correct answer is:<b>I was amazed at the surroundings while we were travelling.</b></p>",

    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>Rose and Lily are to decorate the ceremony hall. The flower seller suggests the required quantity of flowers.</p>",

    "correct_option_id": 1,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of the verb ['be' and 'is' respectively here] is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>For sentence 1:</p><p>The sentence in Active voice is in Infinitive form (to + V1 form).</p><p>The format in Active voice is: Subject + am/is/are/was/were + to + V1 + object</p><p>Thus, the format in Passive voice will be: Object of the active voice (Subjective case) + am/is/are/was/were + to + be + V3 + by + Subject of the active voice (Objective case).</p><p>Also, the sentence is in the Present indefinite tense in the Active voice. So, in the Passive voice, the Present indefinite tense should be used.</p><p>For example:</p><p>You are to help her (Active)</p><p>She is to be helped by you. (Passive)</p><p>So, the first sentence will be correctly represented in passive voice as: The ceremony hall is to be decorated by Rose and Lily.</p><p>For sentence 2:</p><p>The Active voice in this sentence is in <b>Present Indefinite</b>. Thus, the Passive voice will also be in Present Indefinite.</p><p>The format of Active voice is: Subject + V1/V5 + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + am/is/are + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>She likes you. (Active Voice)</p><p>You are liked by her. (Passive Voice)</p><p>So, the second sentence will be correctly represented in passive voice as: The required quantity of flowers is suggested by the flower seller.</p><p>The options except (b) don't follow the correct grammatical format of the Passive Voice.</p><p>Hence, the correct answer is option (b).</p><p>Note:</p><p><b>V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",
