    "question": "<span class=\"eqt\"><p>Calculate the first coefficient of skewness for the following sample data: 70, 75, 80, 85, 85, 85</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2344;&#2350;&#2370;&#2344;&#2366; &#2337;&#2375;&#2335;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2340;&#2367;&#2352;&#2331;&#2366;&#2346;&#2344; &#2325;&#2375; &#2346;&#2361;&#2354;&#2375; &#2327;&#2369;&#2339;&#2366;&#2306;&#2325; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2375;&#2306;: 70, 75, 80, 85, 85, 85</p></span>",
    "options": [
      "<span class=\"eqt\">-0.91</span><span class=\"hqt\" style=\"display:none\">-0.91</span>",
      "<span class=\"eqt\">-0.32</span><span class=\"hqt\" style=\"display:none\">-0.32</span>",
      "<span class=\"eqt\">-0.78</span><span class=\"hqt\" style=\"display:none\">-0.78</span>",
      "<span class=\"eqt\">-0.11</span><span class=\"hqt\" style=\"display:none\">-0.11</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The First Coefficient of Skewness (Karl Pearson's) formula:</p><p>Skewness = (Mean - Mode)/standard deviation</p><p>Mean = (70 + 75 + 80 + 85 + 85 + 85)/6 = 480/6 = 80</p><p>Mode = 85 appears thrice, more than any other number.</p><p>Variance = [(70 - 80)<sup>2</sup> + (75 - 80)<sup>2</sup> + (80 - 80)<sup>2</sup> + (85 - 80)<sup>2</sup> + (85 - 80)<sup>2</sup> + (85 - 80)<sup>2</sup>]/ (6 - 1)</p><p>= [100 + 25 + 0 + 25 + 25 + 25]/5 = 200/5 = 40</p><p>Standard Deviation = &radic;40 = 2&radic;10 = 2 x 3.2 = 6.4</p><p>Skewness = (80 - 85)/6.4 = -5/6.4 = -0.78</p><p>First coefficient of skewness = -0.78</p>",
    "question_index": 51
  },

,

    "question": "<span class=\"eqt\"><p>Pritam buys rice at the rate of Rs. 15/kg. He sells it to Rhitam at 20% profit. However his faulty balance shows 1 kg when it is actually 850 gm. Rhitam bought 20 Kgs of rice from Pritam. What is the overall profit (in Rs.) that Pritam makes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2368;&#2340;&#2350; 15 &#2352;&#2369; &#2325;&#2367;.&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2330;&#2366;&#2357;&#2354; &#2326;&#2352;&#2368;&#2342;&#2340;&#2366; &#2361;&#2376;| &#2357;&#2361; &#2311;&#2360;&#2375; 20% &#2354;&#2366;&#2349; &#2346;&#2352; &#2352;&#2361;&#2367;&#2340;&#2350; &#2325;&#2379; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;| &#2313;&#2360;&#2325;&#2375; &#2309;&#2344;&#2369;&#2330;&#2367;&#2340; &#2340;&#2380;&#2354; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2340;&#2369;&#2354;&#2366; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357; &#2350;&#2375;&#2306; 850 &#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2375; &#2349;&#2366;&#2352; &#2325;&#2379; 1 &#2325;&#2367;.&#2327;&#2381;&#2352;&#2366;&#2350; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;| &#2352;&#2361;&#2367;&#2340;&#2350; 20 &#2325;&#2367;.&#2327;&#2381;&#2352;&#2366;&#2350; &#2330;&#2366;&#2357;&#2354; &#2313;&#2360;&#2360;&#2375; &#2326;&#2352;&#2368;&#2342;&#2340;&#2366; &#2361;&#2376;| &#2346;&#2381;&#2352;&#2368;&#2340;&#2350; &#2344;&#2375; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2354;&#2366;&#2349; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">110</span><span class=\"hqt\" style=\"display:none\">110</span>",
      "<span class=\"eqt\">55</span><span class=\"hqt\" style=\"display:none\">55</span>",
      "<span class=\"eqt\">105</span><span class=\"hqt\" style=\"display:none\">105</span>",
      "<span class=\"eqt\">115</span><span class=\"hqt\" style=\"display:none\">115</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Pritam sells rice to Rhitam at a price of = (15+20% of 15)= Rs.18/kg.</p><p>Now Rhitam bought 20 Kgs from Pritam at a total price of =Rs. 18*20 =Rs. 360</p><p>But as Pritam has a faulty balance thus he is actually selling 850*20/100=17Kgs instead of 20 Kgs.</p><p>Pritam buys 17kgs of rice at a total price of =Rs.17*15 =Rs. 255 and sells it to Rhitam at a price of Rs.360</p><p>So Total profit that Pritam makes =Rs. (360  -  255) =Rs. 105.</p>",
    "question_index": 53

    "question": "<span class=\"eqt\"><p>A certain sum of money at 33(1/3)% per annum compounded annually for two years is amounted to Rs. 16000. If same amount of money invested into simple interest at 16(2/3)% per annum for three years, then what will be the simple interest?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; 33 1/3% &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; &#2342;&#2379; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2352;&#2369;. 16000 &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2350;&#2366;&#2344; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2379; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; 16 2/3 % &#2357;&#2352;&#2381;&#2359;&#2367;&#2325; &#2342;&#2352; &#2346;&#2352; &#2340;&#2368;&#2344; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 4500</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 4500</span>",
      "<span class=\"eqt\">Rs. 4000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 4000</span>",
      "<span class=\"eqt\">Rs. 5000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 5000</span>",
      "<span class=\"eqt\">Rs. 5500</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 5500</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let Rs. P be the sum of Money</p><p>16000 = P(1 + 1/3)<sup>2</sup></p><p>=&gt; P = 16000 * 3/4 * 3/4</p><p>=&gt; P = Rs. 9000</p><p>And SI = (9000 * 1 * 3)/6 = Rs. 4500</p>",
    "question_index": 55

    "question": "<span class=\"eqt\"><p>A circle has a radius of 16 units and its center lies on the line X = Y + 2. If it passes through the point (-6, 8), then find it's equations.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 16 &#2311;&#2325;&#2366;&#2312; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2352;&#2375;&#2326;&#2366; X = Y + 2 &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2351;&#2361; &#2348;&#2367;&#2306;&#2342;&#2369; (-6, 8) &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2327;&#2369;&#2332;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2375; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">X<sup>2</sup> + Y<sup>2</sup>  -  12X  -  16Y + 156 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup> + Y<sup>2</sup> - 12X - 16Y + 156 = 0</span>",
      "<span class=\"eqt\">X<sup>2</sup> + Y<sup>2</sup>  -  12X + 16Y  -  156 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup> + Y<sup>2</sup> - 12X + 16Y - 156 = 0</span>",
      "<span class=\"eqt\">X<sup>2</sup> + Y<sup>2</sup> + 12X  -  16Y  -  156 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup> + Y<sup>2</sup> + 12X - 16Y - 156 = 0</span>",
      "<span class=\"eqt\">X<sup>2</sup> + Y<sup>2</sup> + 12X + 16Y  -  156 = 0</span><span class=\"hqt\" style=\"display:none\">X<sup>2</sup> + Y<sup>2</sup> + 12X + 16Y - 156 = 0</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>a and b lie on X = Y + 2</p><p>So, a = b + 2</p><p>b = a  -  2</p><p>By distance formula,</p><p>(a + 6)<sup>2</sup> + (b  -  8)<sup>2</sup> = radius<sup>2</sup></p><p>=&gt; (a + 6)<sup>2</sup> + (a  -  2  -  8)<sup>2</sup> = 16<sup>2</sup></p><p>=&gt; a<sup>2</sup> + 36 + 12a + a<sup>2</sup> + 100  -  20a = 256</p><p>=&gt; 2a<sup>2</sup>  -  8a  -  120 = 0</p><p>=&gt; a<sup>2</sup>  -  4a  -  60 = 0</p><p>=&gt; a<sup>2</sup>  -  10a + 6a  -  60 = 0</p><p>=&gt; a (a  -  10) + 6 (a  -  10) = 0</p><p>=&gt; (a + 6) (a  -  10) = 0</p><p>=&gt; a = 10, -6</p><p>b = 8, -8</p><p>The required equation:</p><p>(X  -  10)<sup>2</sup> + (Y  -  8)<sup>2</sup> = 16<sup>2</sup></p><p>=&gt; X<sup>2</sup> + 100  -  20X + Y<sup>2</sup> + 64  -  16Y = 256</p><p>=&gt; X<sup>2</sup> + Y<sup>2</sup>  -  20X  -  16Y  -  92 = 0</p><p>(X + 6)<sup>2</sup> + (Y + 8)<sup>2</sup> = 16<sup>2</sup></p><p>=&gt; X<sup>2</sup> + 36 + 12X + Y<sup>2</sup> + 64 + 16Y = 256</p><p>=&gt; X<sup>2</sup> + Y<sup>2</sup> + 12X + 16Y  -  156 = 0</p><p>Hence, X<sup>2</sup> + Y<sup>2</sup> + 12X + 16Y  -  156 = 0 is the equation.</p>",
    "question_index": 56
  },

    "question": "<span class=\"eqt\"><p>Akash and Priya bought the Car together at a price of Rs.70,000. After some days both decided to sell the car. They sold the car at loss of Rs. X. Priya paid 33&frac13; % more than Akash while buying the car. What is total amount received by Akash after this deal, if Priya lost Rs.4000 in this transaction?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2310;&#2325;&#2366;&#2358; &#2324;&#2352; &#2346;&#2381;&#2352;&#2367;&#2351;&#2366; &#2352;&#2369;. 70,000 &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#2346;&#2352; &#2325;&#2366;&#2352; &#2326;&#2352;&#2368;&#2342;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2325;&#2369;&#2331; &#2342;&#2367;&#2344;&#2379;&#2306; &#2348;&#2366;&#2342; &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2366;&#2352; &#2348;&#2375;&#2330;&#2344;&#2375; &#2325;&#2366; &#2347;&#2376;&#2360;&#2354;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2357;&#2361; &#2325;&#2366;&#2352; &#2325;&#2379; &#2352;&#2369;. X &#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2346;&#2352; &#2348;&#2375;&#2330; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2381;&#2352;&#2367;&#2351;&#2366; &#2344;&#2375; &#2325;&#2366;&#2352; &#2326;&#2352;&#2368;&#2342;&#2340;&#2375; &#2360;&#2350;&#2351; &#2310;&#2325;&#2366;&#2358; &#2360;&#2375; 33&#8531;% &#2309;&#2343;&#2367;&#2325; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404; &#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2311;&#2360; &#2360;&#2380;&#2342;&#2375; &#2350;&#2375;&#2306; &#2352;&#2369;. 4000 &#2325;&#2366; &#2344;&#2369;&#2325;&#2360;&#2366;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360; &#2360;&#2380;&#2342;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2310;&#2325;&#2366;&#2358; &#2325;&#2379; &#2325;&#2369;&#2354; &#2325;&#2367;&#2340;&#2344;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2312; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.27000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.27000</span>",
      "<span class=\"eqt\">Rs.20000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.20000</span>",
      "<span class=\"eqt\">Rs.36000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.36000</span>",
      "<span class=\"eqt\">Rs.24000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.24000</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Akash and Priya bought the cars together at a price of Rs.70000</p><p>Let Rs. A be the amount paid by Akash while buying car</p><p>Money paid by Priya while buying car = A + 100/300*A</p><p>= 4A/3</p><p>A + 4A/3 = 70000</p><p>7A/3 = 70000</p><p>A = 30000</p><p>Money paid by Priya while buying car = 4/3*30000</p><p>= Rs.40000</p><p>Since, loss percentage is same, Akash and Priya will face loss in the ratio = 30000/40000 = 3/4</p><p>Loss faced by Akash = 4000/4*3 = Rs.3000</p><p>Selling price of car for Akash  = 30000-3000 = Rs.27000</p>",
    "question_index": 57
  },

    "question": "<span class=\"eqt\"><p>The 55x41y is an six-digit even number and is completely divisible by 33, then among the following (x<sup>2</sup> + y<sup>2</sup>) is divisible by: (x and y are non-zero.)</p></span><span class=\"hqt\" style=\"display:none\"><p>55x41y &#2331;&#2361; &#2309;&#2306;&#2325;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2360;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; 33 &#2360;&#2375; &#2346;&#2370;&#2352;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; (x<sup>2</sup> + y<sup>2</sup>) &#2325;&#2367;&#2360;&#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;: (x &#2324;&#2352; y &#2358;&#2370;&#2344;&#2381;&#2351;&#2375;&#2340;&#2352; &#2361;&#2376;&#2306;&#2404;)</p></span>",
    "options": [
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Since 55x41y is an even number which means possible values of 'y' are 2, 4, 6, and 8.</p><p>Number is divisible by 33 which means it is divisible by 3 and 11 individually.</p><p><b>Divisibility of 3: </b>A number is completely divisible by 3 if the sum of its digits is divisible by 3.</p><p>Sum of digits = 5 + 5 + x + 4 + 1 + y = 15 + x + y.</p><p>Sum of (x + y) can be 0, 3, 6, 9, 12, 15, and 18</p><p><b>Divisibility of 11: </b>If the difference of the sum of the digits at odd places and even places of the number is 0 or divisible by 11, then the given number is also divisible by 11.</p><p>Difference = (5 + x + 1)  -  (5 + 4 + y) = (x  -  y  -  3)</p><p>(x  -  y) must be 3.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Possible values of 'y'</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Possible values of 'x'</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Sum of 'x' and 'y'</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">11</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">11 <b>(Invalid)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table><p>So, x<sup>2</sup> + y<sup>2</sup> = 9<sup>2</sup> + 6<sup>2</sup> = 81 + 36 = 117 = 9 * 13</p><p>Hence, (x<sup>2</sup> + y<sup>2</sup>) is divisible by 13.</p>",
    "question_index": 58
  },
  {
    "question": "<span class=\"eqt\"><p>A solid right circular cylinder has a total surface area of 1232 cm<sup>2</sup>. If its height is 21 cm, what is the radius of its base? (&#960; = 22/7)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2336;&#2379;&#2360; &#2354;&#2350;&#2381;&#2348;&#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2325;&#2369;&#2354; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 1232 &#2357;&#2352;&#2381;&#2327; &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2311;&#2360;&#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; 21 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;? (= 22/7)</p></span>",
    "options": [
      "<span class=\"eqt\">5 cm</span><span class=\"hqt\" style=\"display:none\">5 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">14 cm</span><span class=\"hqt\" style=\"display:none\">14 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">7 cm</span><span class=\"hqt\" style=\"display:none\">7 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">11 cm</span><span class=\"hqt\" style=\"display:none\">11 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let r = radius, h = 21 cm.</p><p>TSA = 2&#960;r(r + h) = 1232</p><p>2 X (22/7) X r(r +21) = 1232</p><p>(44/7) r(r +21) = 1232</p><p>44 r(r +21) = 8624 =&gt; r(r +21) = 196</p><p>r<sup>2</sup> + 21r &#8722; 196 = 0</p><p>r<sup>2</sup> + 28r  -  7r &#8722; 196 = 0</p><p>r(r + 28)  -  7(r + 28) = 0</p><p>(r + 28)(r  -  7) = 0</p><p>r=7</p>",
    "question_index": 59
  },
  {
    "question": "<span class=\"eqt\"><p>If 6a  -  5b = 4 and 2a + 3b = 6, then what is the value of (a + b)<sup>2</sup>  -  6ab + 12?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 6a - 5b = 4 &#2324;&#2352; 2a + 3b = 6 &#2361;&#2376;, &#2340;&#2379; (a + b)<sup>2</sup> - 6ab + 12 &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">7.5</span><span class=\"hqt\" style=\"display:none\">7.5</span>",
      "<span class=\"eqt\">11.75</span><span class=\"hqt\" style=\"display:none\">11.75</span>",
      "<span class=\"eqt\">9.25</span><span class=\"hqt\" style=\"display:none\">9.25</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>6a  -  5b = 4</p><p>And, 2a + 3b = 6</p><p>2a = 6  -  3b</p><p>Then, 3(6  -  3b)  -  5b = 4</p><p>b = 1, a = 3/2</p><p>Therefore, (a + b)<sup>2</sup>  -  6ab + 12</p><p>= (3/2 + 1)<sup>2</sup>  -  6 * (3/2) * 1 + 12</p><p>= <b>9.25</b></p>",
    "question_index": 60

    "question": "<span class=\"eqt\"><p>Total cost of fencing a rectangular plot is Rs 2500 at rate of Rs 10 per metre. If sum of square of length and breadth is 8125 m<sup>2</sup>, find area of the field.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2350;&#2376;&#2342;&#2366;&#2344; &#2325;&#2375; &#2330;&#2366;&#2352;&#2379;&#2306; &#2323;&#2352; &#2348;&#2366;&#2337;&#2364; &#2354;&#2327;&#2366;&#2344;&#2375; &#2325;&#2368; &#2325;&#2369;&#2354; &#2354;&#2366;&#2327;&#2340; 10 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 2500 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2324;&#2352; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2325;&#2366; &#2351;&#2379;&#2327; 8125 &#2350;&#2368;&#2335;&#2352;<sup>2</sup> &#2361;&#2376;, &#2340;&#2379; &#2350;&#2376;&#2342;&#2366;&#2344; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

    "correct_option_id": 1,
    "solution": "<p>Let length and breadth of field be 'l' and 'b'.</p><p>l<sup>2</sup> +b<sup>2</sup> = 8125</p><p>Total cost = Rs 2500</p><p>As fencing is only done on perimeter of field;</p><p>Perimeter of field = 2(l+b) = 2500/10 = 250m</p><p>l + b = 125m</p><p>Squaring on both sides;</p><p>l<sup>2</sup> + b<sup>2</sup> + 2l.b= 125<sup>2</sup></p><p>2l*b = 15625  -  8125 =7500</p><p>l*b = 7500/2 = 3750 m<sup>2</sup></p>",

    "question": "<span class=\"eqt\"><p>In what ratio does the point (1,7) divide the line joining the points (-3,5) and (11,12)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2367;&#2306;&#2342;&#2369; (-3,5) &#2324;&#2352; (11,12) &#2360;&#2375; &#2348;&#2344;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2352;&#2375;&#2326;&#2366; &#2325;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; (1,7) &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2375;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">1:3</span><span class=\"hqt\" style=\"display:none\">1:3</span>",
      "<span class=\"eqt\">3:4</span><span class=\"hqt\" style=\"display:none\">3:4</span>",
      "<span class=\"eqt\">2:5</span><span class=\"hqt\" style=\"display:none\">2:5</span>",
      "<span class=\"eqt\">4:3</span><span class=\"hqt\" style=\"display:none\">4:3</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the required ratio be m:n.</p> <div>&nbsp;(1,7) = (&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">11m - 3n</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">m+n</span></div>&nbsp;,&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">12m + 5n</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">m+n</span></div>&nbsp;)&nbsp;</div><p>Taking x co-ordinate, m + n = 11m - 3n</p><p>10m = 4n</p><p>m:n = 4:10 = 2:5</p>",
    "question_index": 63
  },

    "question": "<span class=\"eqt\"><p>Study the following information carefully and answer the related questions. </p><p>The following table represents the price (in 1000 rupees) of a laptop, sale of laptops in March and the respective ratio of sale of laptops in March to April in companies A, B, C, D, and E.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Company</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Price per laptop (in 1000 rupees)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sale of laptops in March</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The respective ratio of sale of laptops in March to April</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">75</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">24</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4: 3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">125</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">28</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7: 8</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">68</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">52</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4: 5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">44</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">40</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2: 1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">150</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">36</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3: 4</td></tr></table><p>Total earnings of company C and E together on laptops in April is how much more/less than the total earnings of companies A, B, and D together on laptops in the same month? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404; </p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2340;&#2366;&#2354;&#2367;&#2325;&#2366; &#2319;&#2325; &#2354;&#2376;&#2346;&#2335;&#2377;&#2346; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; (1000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306;), &#2350;&#2366;&#2352;&#2381;&#2330; &#2350;&#2375;&#2306; &#2354;&#2376;&#2346;&#2335;&#2377;&#2346; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2324;&#2352; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; A, B, C, D, &#2324;&#2352; E &#2350;&#2375;&#2306; &#2350;&#2366;&#2352;&#2381;&#2330; &#2360;&#2375; &#2309;&#2346;&#2381;&#2352;&#2376;&#2354; &#2340;&#2325; &#2354;&#2376;&#2346;&#2335;&#2377;&#2346; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2325;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2325;&#2306;&#2346;&#2344;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2346;&#2381;&#2352;&#2340;&#2367; &#2354;&#2376;&#2346;&#2335;&#2377;&#2346; &#2325;&#2368;&#2350;&#2340; (1000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306;)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2350;&#2366;&#2352;&#2381;&#2330; &#2350;&#2375;&#2306; &#2354;&#2376;&#2346;&#2335;&#2377;&#2346; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2350;&#2366;&#2352;&#2381;&#2330; &#2360;&#2375; &#2309;&#2346;&#2381;&#2352;&#2376;&#2354; &#2340;&#2325; &#2354;&#2376;&#2346;&#2335;&#2377;&#2346; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2325;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2309;&#2346;&#2381;&#2352;&#2376;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">75</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">24</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4: 3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">125</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">28</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7: 8</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">68</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">52</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4: 5</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">44</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">40</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2: 1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">150</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">36</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3: 4</td></tr></table><p>&#2325;&#2306;&#2346;&#2344;&#2368; C &#2324;&#2352; E &#2325;&#2368; &#2325;&#2369;&#2354; &#2325;&#2350;&#2366;&#2312; &#2309;&#2346;&#2381;&#2352;&#2376;&#2354; &#2350;&#2375;&#2306; &#2354;&#2376;&#2346;&#2335;&#2377;&#2346; &#2346;&#2352; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; A, B &#2324;&#2352; D &#2325;&#2368; &#2325;&#2369;&#2354; &#2325;&#2350;&#2366;&#2312;, &#2313;&#2360;&#2368; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2376;&#2346;&#2335;&#2377;&#2346; &#2346;&#2352; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; A, B &#2324;&#2352; D &#2325;&#2368; &#2325;&#2369;&#2354; &#2325;&#2350;&#2366;&#2312; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2309;&#2343;&#2367;&#2325;/&#2325;&#2350; &#2361;&#2376;?</p></span>",

    "solution": "<p>In April:</p><p>Sale of laptops in company A = 24 * 3/4 = 18</p><p>Sale of laptops in company B = 28 * 8/7 = 32</p><p>Sale of laptops in company C = 52 * 5/4 = 65</p><p>Sale of laptops in company D = 40 * 1/2 = 20</p><p>Sale of laptops in company E = 36 * 4/3 = 48</p><p>Then, total earnings of company C and E together on laptops in April = 68000 * 65 + 150000 * 48 = Rs.11620000</p><p>And total earnings of companies A, B and D together on laptops in April = 75000 * 18 + 125000 * 32 + 44000 * 20 = Rs.6230000</p><p>Therefore, difference = 11620000  -  6230000 = Rs.5390000 = <b>53.9 lakhs</b> </p>",

    "question": "<span class=\"eqt\"><p>Pipes A, B, and C alone can fill a tank in 51 minutes, 68 minutes, and 136 minutes, respectively while pipe D alone can empty the tank in 170 minutes. If pipe A and pipe D opened together and after 180/7 minutes pipe A is closed and pipes B and C are opened, then remaining part of the tank filled in how many minutes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2366;&#2311;&#2346; A, B &#2324;&#2352; C &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 51 &#2350;&#2367;&#2344;&#2335;, 68 &#2350;&#2367;&#2344;&#2335; &#2324;&#2352; 136 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2309;&#2325;&#2375;&#2354;&#2375; &#2346;&#2366;&#2311;&#2346; D &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; 170 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; D &#2325;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 180/7 &#2350;&#2367;&#2344;&#2335; &#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2366;&#2311;&#2346; A &#2325;&#2379; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; B &#2324;&#2352; C &#2325;&#2379; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; &#2325;&#2366; &#2358;&#2375;&#2359; &#2349;&#2366;&#2327; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">40</span><span class=\"hqt\" style=\"display:none\">40</span>",
      "<span class=\"eqt\">50</span><span class=\"hqt\" style=\"display:none\">50</span>",
      "<span class=\"eqt\">60</span><span class=\"hqt\" style=\"display:none\">60</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Pipes A, B, and C alone can fill a tank in 51 minutes, 68 minutes, and 136 minutes, respectively while pipe D alone can empty the tank in 170 minutes </p><p>Let remaining part of the tank will be filled in T minutes.</p><p>180/7 * (1/51  -  1/170) + T(1/68 + 1/136  -  1/170) = 1</p><p>=&gt; 6/17 + T * 11/680 = 1</p><p>=&gt; T = 680/11 * 11/17</p><p>=&gt; T = 40 minutes</p>",

    "question": "<span class=\"eqt\"><p>In a circle, length of chord AB is 14 cm, PAB is a straight line, PA = 18 cm and radius of circle is 10 cm, then point P is how far from the centre of circle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2350;&#2375;&#2306;, &#2332;&#2368;&#2357;&#2366; AB &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 14 &#2360;&#2375;.&#2350;&#2368; &#2361;&#2376;, PAB &#2319;&#2325; &#2360;&#2368;&#2343;&#2368; &#2352;&#2375;&#2326;&#2366; &#2361;&#2376;, PA = 18 &#2360;&#2375;.&#2350;&#2368; &#2324;&#2352; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 10 &#2360;&#2375;.&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; P &#2360;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Two cars P and Q started moving from a same point at same time with uniform speeds 50 km/hr and 40 km/hr respectively. After covering 120 km distance, car P returned back and then meet car Q. Find the time taken by car Q to meet car P.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2325;&#2366;&#2352;&#2375;&#2306; P &#2324;&#2352; Q &#2360;&#2350;&#2366;&#2344; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375; &#2360;&#2350;&#2366;&#2344; &#2360;&#2350;&#2351; &#2346;&#2352; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 50 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2324;&#2352; 40 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2330;&#2354;&#2344;&#2366; &#2346;&#2381;&#2352;&#2366;&#2352;&#2350;&#2381;&#2349; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; 120 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2325;&#2366;&#2352; P &#2357;&#2366;&#2346;&#2360; &#2354;&#2380;&#2335;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; &#2325;&#2366;&#2352; Q &#2360;&#2375; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404; &#2325;&#2366;&#2352; Q &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2366;&#2352; P &#2360;&#2375; &#2350;&#2367;&#2354;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

    "correct_option_id": 1,
    "solution": "<p>Speed of car P = 50 km/hr</p><p>Speed of car Q = 40 km/hr</p><p>Let after travelling x km, car Q meets car P. Then, the diagram will be:</p><p><img width=451 height=182 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12082/image005.png\"></p><p>Now, time taken by car P to cover 120 km = 120/50</p><p>Time taken by car P to cover (120  -  x) km = (120  -  x)/50</p><p>Total time taken by car P = 120/50 + (120  -  x)/50 = (240  -  x)/50</p><p>Time taken by car Q = x/40</p><p>Time taken by both the cars will be same. Then,</p><p>(240  -  x)/50 = x/40</p><p>x = 320/3</p><p>Therefore, time taken by car Q = x/40 = (320/3)/40 = 8/3 hours = (8/3) * 60 = 160 minutes</p><p>= <b>2 hours 40 minutes</b></p>",

    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>The celebrated chef will prepare a lavish five-course meal, and a renowned sommelier will select the finest wines to accompany it.</p>",
    "options": [

      "A lavish five-course meal will be prepared by the celebrated chef, and the finest wines will be selected by a renowned sommelier to accompany it.",

    ],
    "correct_option_id": 1,
    "solution": "<p>The original sentence consists of two clauses in the <b>Active Voice</b>, both of which must be converted into the <b>Passive Voice</b>.</p><p>In both clauses, the subject of the Active Voice becomes the object of the Passive Voice, and the object becomes the subject. The preposition \"by\" is used.</p><p>Both clauses are in the <b>Simple Future Tense</b>. Therefore, both clauses in the new sentence must be in the <b>Simple Future Passive</b>.</p><p>The format of the Simple Future Active is: <b>Subject + will + V1 + Object.</b></p><p>&#183; Clause 1: \"The celebrated chef (Subject) + will + prepare (V1) + a lavish five-course meal (Object).\"</p><p>&#183; Clause 2: \"a renowned sommelier (Subject) + will + select (V1) + the finest wines (Object).\"</p><p>Thus, in the Passive voice, the format will be: <b>Object (as Subject) + will + be + V3 + by + Subject (as Object).</b></p><p>&#183; Clause 1: \"A lavish five-course meal (Subject) + will + be + prepared (V3) + by + the celebrated chef (Object).\"</p><p>&#183; Clause 2: \"the finest wines (Subject) + will + be + selected (V3) + by + a renowned sommelier (Object).\"</p><p>Therefore, the correct answer is <b>option (b): A lavish five-course meal will be prepared by the celebrated chef, and the finest wines will be selected by a renowned sommelier to accompany it.</b></p>",

    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>While the banquet was being prepared by the chefs, the final decorations were being put up by the event staff in the grand hall.</p>",

    "correct_option_id": 1,
    "solution": "<p>In both clauses, the subject of the Passive Voice becomes the object of the Active Voice, and the object of the Passive Voice becomes the subject of the Active Voice.</p><p>The usage of a \"to be\" form of the verb (was being, were being) is characteristic of the Passive Voice. To convert to Active Voice, this structure is changed. The preposition \"by\" before the agent is also removed.</p><p>The Passive Voice in this sentence is in the <b>Past Continuous Tense</b> for both clauses. Therefore, the Active Voice must also be in the <b>Past Continuous Tense</b> to correctly represent two simultaneous, ongoing actions in the past.</p><p>The format of the Past Continuous Passive is: <b>Subject + was/were + being + V3 + by + Object.</b></p><p>&#183; Clause 1: \"the banquet (Subject) + was + being + prepared (V3) + by + the chefs (Object).\"</p><p>&#183; Clause 2: \"the final decorations (Subject) + were + being + put up (V3) + by + the event staff (Object).\"</p><p>Thus, in the Active Voice, the format will be: <b>Object of the passive (as Subject) + was/were + V-ing + Subject of the passive (as Object).</b></p><p>&#183; Clause 1: \"the chefs (Subject) + were + preparing (V-ing) + the banquet (Object).\"</p><p>&#183; Clause 2: \"the event staff (Subject) + were + putting up (V-ing) + the final decorations (Object).\"</p><p>For example:</p><p>While the car was being washed by him, the lawn was being mowed by her. (Passive Voice)</p><p>While he was washing the car, she was mowing the lawn. (Active Voice)</p><p>The options except (b) do not follow the correct grammatical transformation.</p><p>&#183; Option (a) incorrectly changes the tense to Simple Past.</p><p>&#183; Option (c) remains in the Passive Voice.</p><p>&#183; Option (d) uses mismatched tenses (Simple Past and Past Continuous), which breaks the parallel structure of the original sentence.</p><p>Therefore, the correct answer is <b>option (b): While the chefs were preparing the banquet, the event staff were putting up the final decorations in the grand hall.</b></p>",

    "question": "<p>Select the option with the correct use of future tense.</p>",
    "options": [
      "Since you are feeling unwell, I will take care of the entire presentation for tomorrow's meeting.",
      "Since you are feeling unwell, I will taking care of the entire presentation for tomorrow's meeting.",
      "Since you are feeling unwell, I will to take care of the entire presentation for tomorrow's meeting.",
      "Since you are feeling unwell, I will be took care of the entire presentation for tomorrow's meeting."
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct option is a).</p><p>This sentence correctly uses the <b>future simple tense</b> (will + base form of the verb). This tense is used here to express a spontaneous decision or a voluntary offer made at the moment of speaking.</p><p>&#183; <b>Option (b):</b> This is grammatically incorrect. The modal verb \"will\" must be followed by the base form of the verb (\"take\"), not the present participle (\"taking\").</p><p>&#183; <b>Option (c):</b> This is incorrect. \"Will\" is a modal verb and is directly followed by the base verb; it does not take an infinitive with \"to.\"</p><p>&#183; <b>Option (d):</b> This is an incorrect structure. The construction \"will be\" should be followed by a present participle (-ing) or a past participle for the passive voice, but \"took\" is the simple past tense.</p><p><b>Note: Modal verb:</b> A verb used with another verb to express an idea, such as possibility, that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling), and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p><p><b>Infinitive:</b> The infinitive is the base form of a verb, often preceded by \"to\".</p><p>Consider the sentences given below:</p><p>&#183; To err is human. [like a noun, the infinitive 'to err' is the subject of the verb 'is']</p><p>&#183; My father likes to cook. [Like a noun, the infinitive 'to cook' is the object of the verb 'likes']</p><p>&#183; To vote in elections is our right. [The infinitive 'to vote', like a noun, is the subject of the verb 'is', but, like a verb, it also takes an object (elections)]</p><p>&#183; Radha went to the lake to fetch water. [the infinitive 'to fetch', like a noun, is the object of the verb 'went', but, like a verb, it also takes an object (water)]</p><p>&#183; The above sentences illustrate various ways in which infinitives are used. It can both act as a noun and a verb.</p><p>A participle is a form of a verb that functions as an adjective in a sentence, modifying nouns or pronouns. There are two types of participles:</p><p>Present participles: These end in -ing (e.g., running, barking).</p><p>Past participles: These typically end in -ed or -en (e.g., baked, broken).</p><p>Examples:</p><p>The barking dog (present participle modifying \"dog\").</p><p>The broken vase (past participle modifying \"vase\").</p><p>The running athlete (present participle modifying \"athlete\").</p><p>Participles are essential for forming verb tenses and creating clear, fluid writing.</p><p>Passive voice is a grammatical construction where the subject of the sentence is acted upon rather than performing the action. In passive voice, the focus is on the action or the recipient of the action rather than the doer.</p><p>Examples:</p><p>Active Voice: \"The chef cooked the meal.\"</p><p>Passive Voice: \"The meal was cooked by the chef.\".</p><p>Another example:</p><p>Active Voice: \"The dog chased the cat.\"</p><p>Passive Voice: \"The cat was chased by the dog.\".</p><p>In passive constructions, the agent (the doer) may be omitted if it is unknown or irrelevant, e.g., \"The book was read.\".</p>",

    "question": "<p> Parts of the following sentence have been underlined. Select the option that contains an error. </p><p><u>They are</u> also recruited <u>an additional</u> 10 students <u>who</u> would not <u>work out to serve</u> as a control group.</p>",

      "work out to serve"
    ],
    "correct_option_id": 1,
    "solution": "<p>The phrase 'are also recruited' is in the passive voice. The object of the verb 'recruited' is 'an additional 10 students'. So, the work is done by the subject 'they'. Therefore, the given sentence should be in the active voice. The helping verb 'are' should be removed from the sentence to convert it into the active voice.</p><p>Also, \"an additional 10 students\" refers to a nonspecific group of students, simply indicating that they are extra participants, not previously mentioned or identified. It may seem that \"an\" is incorrect because it cannot be used with plural noun \"students\". But, this phrase is correct because the article \"an\" is not directly modifying \"students\" but rather the adjective \"additional.\" \"An\" is used because \"additional\" starts with a vowel sound. The entire phrase \"an additional 10 students\" is treated as a single unit [implying a group of 10 students], where \"an\" modifies \"additional 10.\"</p><p>Hence, option (b) is the correct answer.</p><p><b>The correct sentence is: They</b> also recruited an additional 10 students who would not work out to serve as a control group.</p><p><b>Note:</b></p><p><b>Voice of a sentence</b> - Depending upon the emphasis we want to lay we use a particular voice in a particular context. We use <b>active voice </b>to lay emphasis on the doer of the action while we use <b>passive voice </b>to lay emphasis on the receiver of the action.</p><p>Example:</p><p>Active- Radha will work. (emphasis on Radha)</p><p>Passive- Work will be done by Radha. (emphasis on Work)</p>",
    "question_index": 92
  },
