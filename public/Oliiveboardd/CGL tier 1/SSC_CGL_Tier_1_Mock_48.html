<!DOCTYPE html>

<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    "question": "<span class=\"eqt\"><p>Read the statement below followed by two courses of action.</p><p><b>Statement:</b> The incidence of digital frauds has risen sharply in the last year.</p><p><b>Courses of action:</b></p><p>I. Banks should implement multi-factor authentication for all online transactions.</p><p>II. Customers should stop using online financial services altogether.</p><p>Which course of action follows logically?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2368; &#2327;&#2312; &#2342;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306;&#2404;</p><p><b>&#2325;&#2341;&#2344;:</b> &#2346;&#2367;&#2331;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2343;&#2379;&#2326;&#2366;&#2343;&#2337;&#2364;&#2368; &#2325;&#2368; &#2328;&#2335;&#2344;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2340;&#2375;&#2332;&#2364;&#2368; &#2360;&#2375; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2369;&#2312; &#2361;&#2376;&#2404;</p><p><b>&#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2361;&#2368;:</b></p><p>I. &#2348;&#2376;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2360;&#2349;&#2368; &#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2348;&#2361;&#2369;-&#2325;&#2366;&#2352;&#2325; &#2346;&#2381;&#2352;&#2350;&#2366;&#2339;&#2368;&#2325;&#2352;&#2339; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p>II. &#2327;&#2381;&#2352;&#2366;&#2361;&#2325;&#2379;&#2306; &#2325;&#2379; &#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366;     "options": [

    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Only I follows</b>: banks implementing multi-factor authentication (MFA) requires users to provide at least two verification factors, significantly reducing unauthorized access</p><p>&#183; MFA is widely recognized as an industry best practice in financial security</p><p>&#183; MFA directly mitigates credential-based attacks by adding an extra verification layer</p><p>&#183; Financial institutions have both the technical capacity and regulatory mandate to enforce MFA</p><p>&#183; Advising customers to avoid online services (Course II) is impractical in the digital age</p><p>&#183; Such avoidance would restrict access to essential banking functions like funds transfer and bill payment</p><p>&#183; Fraud prevention is fundamentally a systemic challenge requiring institutional measures, not user avoidance</p><p>&#183; Shifting responsibility entirely to customers ignores the critical role of banks in securing transactions</p>",

    "question": "<span class=\"eqt\"><p>'X @ Y' means 'A is the father-in-law of B'</p><p>'X % Y' means 'A is the son of B'</p><p>'X ! Y' means 'A is the wife of B'</p><p>'X * Y' means 'A is the sister of B'</p><p>As per which of the following expressions 'T is the father of R'?</p></span><span class=\"hqt\" style=\"display:none\"><p>'X @ Y' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2360;&#2360;&#2369;&#2352; &#2361;&#2376;'</p><p>'X % Y' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;'</p><p>'X ! Y' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;'</p><p>'X * Y' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;'</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; 'T, R &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'?</p></span>",

    "correct_option_id": 2,
    "solution": "<p>Option (a): R % Z * H ! T</p><p>R % Z means 'R is the son of Z'</p><p>Z * H means 'Z is the sister of H'</p><p>H ! T means 'H is the wife of T'</p><p><img width=253 height=100 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25851/image021.png\"></p><p>T is the uncle of R.</p><p>Option (b): Q @ T ! N % R</p><p>Q @ T means 'Q is the father-in-law of T'</p><p>T ! N means 'T is the wife of N'</p><p>N % R means 'N is the son of R'</p><p><img width=187 height=108 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25851/image022.png\"></p><p>T is the daughter-in-law of R.</p><p>Option (c): R * E % S ! T</p><p>R * E means 'R is the sister of E'</p><p>E % S means 'E is the son of S'</p><p>S ! T means 'S is the wife of T'</p><p><img width=221 height=109 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25851/image023.png\"></p><p><b>T is the father of R.</b></p><p>Option (d): T @ O ! Z % R</p><p>T @ O means 'T is the father-in-law of O'</p><p>O ! Z means 'O is the wife of Z'</p><p>Z % R means 'Z is the son of R'</p><p><img width=171 height=104 id=\"Picture 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25851/image024.png\"></p><p>T is the husband of R.</p><p>Thus, the answer is option (c).</p>",

    "solution": "<p>&bull; <b>Volt</b> is a derived unit for electric potential (voltage).</p><p>&bull; <b>Kilogram</b> is a fundamental unit for mass.</p><p>&bull; <b>Second</b> is a fundamental unit for time.</p><p>&bull; <b>Ampere</b> is a fundamental unit for electric current.</p><p><b>Further Insight:</b></p><p>&bull; <b>Units</b></p><p>&bull; A unit is a fixed standard quantity used to measure other quantities of the same kind.</p><p>&bull; <b>Types of Units</b>:</p><p>&#9675; <b>Fundamental Units</b>: Cannot be expressed in terms of other physical quantities. Examples: Length (meter), Mass (kilogram), Time (second), etc.</p><p>&#9675; <b>Derived Units</b>: Derived from fundamental units. Examples: Area (square meter), Volume (cubic meter), Force (newton).</p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>Which of the following is/are the criteria mentioned in the Census of India to define an urban area?</p><p>I. At least 50% of male working population engaged in non-agricultural occupations.</p><p>II. A minimum population of 5,000;</p><p>III. A density of population is at least 200 persons per sq. km.</p><p>Select the correct answer using the below codes.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2350;&#2366;&#2344;&#2342;&#2306;&#2337; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2350;&#2375;&#2306; &#2358;&#2361;&#2352;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2354;&#2381;&#2354;&#2367;&#2326;&#2367;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; 50% &#2346;&#2369;&#2352;&#2369;&#2359; &#2325;&#2366;&#2352;&#2381;&#2351;&#2358;&#2368;&#2354; &#2310;&#2348;&#2366;&#2342;&#2368; &#2327;&#2376;&#2352;-&#2325;&#2371;&#2359;&#2367; &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2354;&#2327;&#2368; &#2361;&#2369;&#2312; &#2361;&#2376;&#2404;</p><p>II. &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 5,000;</p><p>III. &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2328;&#2344;&#2340;&#2381;&#2357; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; 200 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2327; &#2325;&#2367;&#2350;&#2368; &#2361;&#2376;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Statement II is correct.</b></p><p><b>Statements I and III are NOT correct.</b></p><p>The Census of India defines an urban area as:</p><p>i) A minimum <b>population of 5,000;</b></p><p>ii) At least <b>75% of male working</b> population engaged in non-agricultural occupations, and</p><p>iii)A density of population is at <b>least 400 persons per</b> sq. km.</p><p>As per the 2011 census (provisional data), about 31% of India's population lives in urban areas.</p><p>Source: NCERT, India Yearbook</p>",
    "question_index": 27
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct?</p><p>I. The Round Table Conferences were conducted by the British government to deliberate upon and bring about constitutional reforms in British India.</p><p>II. Gandhiji participated in the First and Third Round Table Conferences only.</p><p>III. Second Round Table Conference was held in the year 1931.</p><p>Select the correct answer.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2330;&#2366;&#2352;-&#2357;&#2367;&#2350;&#2352;&#2381;&#2358; &#2325;&#2352; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2306;&#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352; &#2354;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2379;&#2354;&#2350;&#2375;&#2332; &#2360;&#2350;&#2381;&#2350;&#2375;&#2354;&#2344; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2319; &#2327;&#2319; &#2341;&#2375;&#2404;</p><p>II. &#2327;&#2366;&#2306;&#2343;&#2368;&#2332;&#2368; &#2344;&#2375; &#2325;&#2375;&#2357;&#2354; &#2346;&#2361;&#2354;&#2375; &#2324;&#2352; &#2340;&#2368;&#2360;&#2352;&#2375; &#2327;&#2379;&#2354;&#2350;&#2375;&#2332; &#2360;&#2350;&#2381;&#2350;&#2375;&#2354;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2349;&#2366;&#2327; &#2354;&#2367;&#2351;&#2366;&#2404;</p><p>III. &#2342;&#2370;&#2360;&#2352;&#2366; &#2327;&#2379;&#2354;&#2350;&#2375;&#2332; &#2360;&#2350;&#2381;&#2350;&#2375;&#2354;&#2344; &#2357;&#2352;&#2381;&#2359; 1931 &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>&#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <u>Statement I is correct</u>: The three Round Table Conferences of 1930 - 1932 were a series of peace conferences organized by the British Government and Indian political personalities to discuss constitutional reforms in India. </p><p>&#183; These started in November 1930 and ended in December 1932.</p><p>&#183; <u>Statement II is incorrect</u>: Gandhiji participated in only Second Round Table Conference which was held in 1931.</p><p>&#183; <u>Statement III is correct</u>: Second Round Table Conference was held in the year 1931.</p><p>&#183; The third Round Table Conference, held between November 17, 1932 and December 24, 1932, was not attended by the Indian National Congress and Gandhi.</p>",
    "question_index": 28
  },
  {
    "question": "<span class=\"eqt\"><p>Which one of the following statements is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cirques are the most common of landforms in glaciated mountains.</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2350;&#2366;&#2330;&#2381;&#2331;&#2366;&#2342;&#2367;&#2340; &#2346;&#2352;&#2381;&#2357;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2352;&#2381;&#2325; &#2360;&#2348;&#2360;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2349;&#2370;-&#2310;&#2325;&#2371;&#2340;&#2367;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Cirques are found at heads of glacial valleys.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2325; &#2361;&#2367;&#2350;&#2344;&#2342; &#2328;&#2366;&#2335;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2367;&#2352;&#2379;&#2306; &#2346;&#2352; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Water is found within the cirque</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2346;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Cirques are the most common of landforms in glaciated mountains. The cirques quite often are found at the heads of glacial valleys. The accumulated ice cuts cirques while moving down the mountain tops. They are deep, long and wide troughs or basins with very steep concave to vertically drop high walls at its head as well as sides. A lake of water can be seen quite often within the cirques after the glacier disappears. Such lakes are called cirque or tarn lakes. There can be two or more cirques one leading into another down below in a stepped sequence.</p>",
    "question_index": 29
  },

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true?</p><p>A. New Delhi is the host of 2025 World Para Athletics Championships, which will take place from 27 September to 5 October.</p><p>B. It will be the 12th edition of the World Para Athletics Championships and the largest Para sport event ever held in India.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A. &#2344;&#2312; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; 2025 &#2357;&#2367;&#2358;&#2381;&#2357; &#2346;&#2376;&#2352;&#2366; &#2319;&#2341;&#2354;&#2375;&#2335;&#2367;&#2325;&#2381;&#2360; &#2330;&#2376;&#2306;&#2346;&#2367;&#2351;&#2344;&#2358;&#2367;&#2346; &#2325;&#2368; &#2350;&#2375;&#2332;&#2348;&#2366;&#2344;&#2368; &#2325;&#2352; &#2352;&#2361;&#2368; &#2361;&#2376;, &#2332;&#2379; 27 &#2360;&#2367;&#2340;&#2306;&#2348;&#2352; &#2360;&#2375; 5 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; &#2340;&#2325; &#2361;&#2379;&#2327;&#2368;&#2404;</p><p>B. &#2351;&#2361; &#2357;&#2367;&#2358;&#2381;&#2357; &#2346;&#2376;&#2352;&#2366; &#2319;&#2341;&#2354;&#2375;&#2335;&#2367;&#2325;&#2381;&#2360; &#2330;&#2376;&#2306;&#2346;&#2367;&#2351;&#2344;&#2358;&#2367;&#2346; &#2325;&#2366; 12&#2357;&#2366;&#2306; &#2360;&#2306;&#2360;&#2381;&#2325;&#2352;&#2339; &#2361;&#2379;&#2327;&#2366; &#2324;&#2352; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2309;&#2348; &#2340;&#2325; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2346;&#2376;&#2352;&#2366; &#2326;&#2375;&#2354; &#2310;&#2351;&#2379;&#2332;&#2344; &#2361;&#2379;&#2327;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2319;&#2325;</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Jawaharlal Nehru (JLN) Stadium will host over 1,000 athletes during the New Delhi 2025 World Para Athletics Championships, which will take place from 27 September to 5 October.</p><p>It will be the 12th edition of the World Para Athletics Championships and the largest Para sport event ever held in India.</p><p>The New Delhi 2025 World Para Athletics Championships competition programme will feature 186 medal events (101 men's, 84 women's and one mixed), 15 more than at the last edition of the championships in Kobe.</p><p>Asia has hosted the World Championships in four occasions, at Doha 2015 in Qatar, Dubai 2019 in the United Arab Emirates and Kobe 2024 in Japan.</p><p>The JLN Stadium was constructed to host the Asian Games in 1982 and later renovated and upgraded for hosting the 2010 Commonwealth Games.</p><p></p><p></p><p></p>",
    "question_index": 30
  },

    "question": "<span class=\"eqt\"><p>Identify the correct statement.</p><p>I.  The first woman hockey player to receive Arjuna Award was Anne Lumsden.</p><p>II. She was awarded in the year 1971.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2309;&#2352;&#2381;&#2332;&#2369;&#2344; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2361;&#2354;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366; &#2361;&#2377;&#2325;&#2368; &#2326;&#2367;&#2354;&#2366;&#2337;&#2364;&#2368; &#2320;&#2344;&#2368; &#2354;&#2350;&#2381;&#2360;&#2337;&#2375;&#2344; &#2341;&#2368;&#2306;&#2404;</p><p>II. &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2357;&#2352;&#2381;&#2359; 1971 &#2350;&#2375;&#2306; &#2351;&#2361; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p> The first woman hockey player to receive this award was Anne Lumsden (also spelled Ann Lumsden) in 1961 for her outstanding contributions to Indian women's hockey.</p><p> Named after Arjuna, the main protagonist from the ancient Indian epic Mahabharata, the Arjuna Award was set up in 1961. It was India's highest sporting honour before the Khel Ratna came into being.</p><p> Given out for consistent good performance over a period of four years, the winners of the Arjuna Award receive a statuette of Arjuna, a certificate and a cash prize.</p><p> India's football Olympian PK Banerjee was among the 20 recipients of the Arjuna Award in its inaugural edition in 1961. Hockey player Anna Lumsden was the first woman to win the Arjuna Award.</p><p> As per current rules, a Khel Ratna winner cannot be nominated for the Arjuna Award. However, an Arjuna winner can be nominated for the Khel Ratna.</p>",
    "question_index": 31
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements about the Sattriya dance.</p><p>I. It was introduced by the great saint Sankaradeva.</p><p>II. Dhoti and turban are widely used Male costumes.</p><p>III. It finds mention in the Natya Shastra text.</p><p>Select the CORRECT statements using the below codes.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2340;&#2381;&#2340;&#2381;&#2352;&#2367;&#2351;&#2366; &#2344;&#2371;&#2340;&#2381;&#2351; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2311;&#2360;&#2375; &#2350;&#2361;&#2366;&#2344; &#2360;&#2306;&#2340; &#2358;&#2306;&#2325;&#2352;&#2342;&#2375;&#2357; &#2344;&#2375; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>II. &#2343;&#2379;&#2340;&#2368; &#2324;&#2352; &#2346;&#2327;&#2337;&#2364;&#2368; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2311;&#2360;&#2381;&#2340;&#2375;&#2350;&#2366;&#2354; &#2325;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2379;&#2358;&#2366;&#2325;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404;</p><p>III. &#2311;&#2360;&#2325;&#2366; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2344;&#2366;&#2335;&#2381;&#2351; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III</span><span class=\"hqt\" style=\"display:none\">II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The <b>Sattriya dance form</b> was introduced in the 15th century A.D by <b>the great Vaishnava saint</b> and reformer of Assam, <b>Sankaradeva</b> as a powerful medium for propagation of the Vaishnava faith. So, statement I is correct.</p><p>The dance form evolved and expanded as a distinctive style of dance in later period. This dance is preserved by the Sattras i.e. <b>Vaishnava maths or monasteries.</b></p><p>It finds mention in the ancient text <b>'Natya Shastra' of</b> sage <b>Bharat Muni</b>. It is inspired from Bhakti Movement. So, statement III is correct.</p><p>Costumes worn by male dancers are Dhoti and turban. Females wear traditional Assamese jewellery, <b>'Ghuri' and 'Chador' </b>made in Pat silk. Waist cloth is worn by both men and women. So, statement III is correct.</p><p>Source- CCRT website and Indian Art Culture- Nitin Singhania</p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct about 'G-20'?</p><p>1. G-20 has its secretariat at Geneva.</p><p>2. Asian countries like India, Pakistan, Japan and China are members of G20.</p><p>Which of the statements given above is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2332;&#2368;-20' &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>1. &#2332;&#2368;-20 &#2325;&#2366; &#2360;&#2330;&#2367;&#2357;&#2366;&#2354;&#2351; &#2332;&#2367;&#2344;&#2375;&#2357;&#2366; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404;</p><p>2. &#2349;&#2366;&#2352;&#2340;, &#2346;&#2366;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344;, &#2332;&#2366;&#2346;&#2366;&#2344; &#2324;&#2352; &#2330;&#2368;&#2344; &#2332;&#2376;&#2360;&#2375; &#2319;&#2358;&#2367;&#2351;&#2366;&#2312; &#2342;&#2375;&#2358; &#2332;&#2368;-20 &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">1 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">2 only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",

    "question": "<span class=\"eqt\"><p>Which of the following countries left 'ECOWAS' in 2024, effective from January 2025?</p><p>I) Mali</p><p>II) Burkina Faso</p><p>III) Niger</p><p>IV) Nigeria</p><p>Which of the following statements are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2342;&#2375;&#2358; 2024 &#2350;&#2375;&#2306; 'ECOWAS' &#2331;&#2379;&#2337;&#2364; &#2342;&#2375;&#2327;&#2366;, &#2332;&#2379; &#2332;&#2344;&#2357;&#2352;&#2368; 2025 &#2360;&#2375; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2361;&#2379;&#2327;&#2366;?</p><p>I) &#2350;&#2366;&#2354;&#2368;</p><p>II) &#2348;&#2369;&#2352;&#2381;&#2325;&#2367;&#2344;&#2366; &#2347;&#2366;&#2360;&#2379;</p><p>III) &#2344;&#2366;&#2311;&#2332;&#2352;</p><p>IV) &#2344;&#2366;&#2311;&#2332;&#2368;&#2352;&#2367;&#2351;&#2366;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only III and IV are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III &#2324;&#2352; IV &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only II and IV are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; IV &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only I, II and III are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; III &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only I and IV are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; IV &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Mali, Burkina Faso and Niger announced their withdrawal from ECOWAS (Economic Community of West African States) on January 28, 2024 which came into effect in January 2025.</p><p>ECOWAS, founded in 1975 and headquartered in Abuja, Nigeria, is a regional bloc of 12 West African nations promoting economic integration, peace, and free movement. In 2025, Mali, Burkina Faso, and Niger withdrew due to political tensions, forming the Alliance of Sahel States (AES), reducing ECOWAS membership from 15 to 12.</p><p>The current 12 ECOWAS member countries are: Benin, Cape Verde, Cte dIvoire, Gambia, Ghana, Guinea, Guinea-Bissau, Liberia, Nigeria, Senegal, Sierra Leone, and Togo.</p>",
    "question_index": 35
  },

    "question": "<span class=\"eqt\"><p>On the basis of highest population growth rate (Census, 2011), select the option that arranges the following states in descending order.</p><p>A)Bihar</p><p>B)Arunachal Pradesh</p><p>C)Meghalaya</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2352;&#2381;&#2357;&#2366;&#2343;&#2367;&#2325; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2342;&#2352; (&#2332;&#2344;&#2327;&#2339;&#2344;&#2366;, 2011) &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, &#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2379; &#2309;&#2357;&#2352;&#2379;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>A)&#2348;&#2367;&#2361;&#2366;&#2352;</p><p>B)&#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</p><p>C)&#2350;&#2375;&#2328;&#2366;&#2354;&#2351;</p></span>",
    "options": [
      "<span class=\"eqt\">C, B, A</span><span class=\"hqt\" style=\"display:none\">C, B, A</span>",
      "<span class=\"eqt\">A, B, C</span><span class=\"hqt\" style=\"display:none\">A, B, C</span>",
      "<span class=\"eqt\">C, A, B</span><span class=\"hqt\" style=\"display:none\">C, A, B</span>",
      "<span class=\"eqt\">B, C, A</span><span class=\"hqt\" style=\"display:none\">B, C, A</span>"

    "correct_option_id": 0,
    "solution": "<p> &#8203;Based on the Census 2011 data, the population growth rates for the specified states during the 2001-2011 decade are as follows:&#8203;</p><p></p><p>&#9675; Meghalaya: 27.8%&#8203;</p><p></p><p>&#9675; Arunachal Pradesh: 25.9%</p><p></p><p>&#9675; Bihar: 25.1%&#8203;</p><p></p><p> The growth rate of population is defined as the change of population expressed in percentage.</p><p></p><p> The decadal growth rate of population refers to the percentage change in a region's population over a ten-year period. It is calculated by comparing the population figures at the beginning and end of the decade, determining the absolute increase, and then expressing this increase as a percentage of the population at the start of the decade. &#8203;</p><p></p><p> India's decadal growth rate for 2001-2011 was approximately 17.68%.</p>",

    "question": "<span class=\"eqt\"><p>Identify which of the following transactions are included in India's Current Account of Balance of Payments (BoP)?</p><p>I. Export and import of goods</p><p>II. Export and import of services</p><p>III. Transfer payments</p><p>IV. Sales of assets </p><p>Answer Codes:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2358;&#2375;&#2359; (BoP) &#2325;&#2375; &#2330;&#2366;&#2354;&#2370; &#2326;&#2366;&#2340;&#2375; &#2350;&#2375;&#2306; &#2358;&#2366;&#2350;&#2367;&#2354; &#2354;&#2375;&#2344;&#2342;&#2375;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>I. &#2350;&#2366;&#2354; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2324;&#2352; &#2310;&#2351;&#2366;&#2340;</p><p>II. &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2324;&#2352; &#2310;&#2351;&#2366;&#2340;</p><p>III. &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2361;&#2360;&#2381;&#2340;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340;</p><p>IV. &#2346;&#2352;&#2367;&#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368;</p><p>&#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2379;&#2337; :</p></span>",
    "options": [
      "<span class=\"eqt\">Only I and IV</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">Only I and II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">Only I, II and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">All I, II, III and IV</span><span class=\"hqt\" style=\"display:none\">I, II, III &#2324;&#2352; IV &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Balance of Payments (BoP) records the transactions in goods, services and assets between residents of a country with the rest of the world for a specified time period typically a year. There are two main accounts in the BoP  -  the current account and the capital account. The <b>Current account</b> records <b>exports and imports in goods</b> and <b>services </b>and <b>transfer payments.</b> The <b>Capital account </b>records all international purchases and <b>sales of assets</b> such as money, stocks, bonds, etc. </p>",
    "question_index": 37
  },

    "question": "<span class=\"eqt\"><p>With reference, Pradhan Mantri Kisan Sampada Yojana (PMKSY), consider the following</p><p>Statements:</p><p>I. Its primary objective is to decrease Agri-Waste.</p><p>II. Its implementation by The Ministry of Food Processing Industries.</p><p>Which of the following statement(s) is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2367;&#2360;&#2366;&#2344; &#2360;&#2306;&#2346;&#2342;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366; (&#2346;&#2368;&#2319;&#2350;&#2325;&#2375;&#2319;&#2360;&#2357;&#2366;&#2312;) &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;</p><p>&#2325;&#2341;&#2344;:</p><p>I. &#2311;&#2360;&#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2371;&#2359;&#2367;-&#2309;&#2346;&#2358;&#2367;&#2359;&#2381;&#2335; &#2325;&#2379; &#2325;&#2350; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2326;&#2366;&#2342;&#2381;&#2351; &#2346;&#2381;&#2352;&#2360;&#2306;&#2360;&#2381;&#2325;&#2352;&#2339; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2311;&#2360;&#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2351;&#2344;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>The objective of PMKSY is to supplement agriculture, modernize processing and decrease</p><p>Agri-Waste. The implementation of PMKSY will result in the creation of modern infrastructure with efficient</p><p>Supply chain management from farm gate to a retail outlet.</p><p>The Ministry of Food Processing Industries is implementing Central Sector PRADHAN</p><p>MANTRI KISAN SAMPADA YOJANA for promotion and development of food processing</p><p>The sector in the country including Jammu &amp; Kashmir.</p><p>Impact of Pradhan Mantri Kisan Sampada Yojana (PMKSY):</p><p>&bull; it will provide a big boost to the growth of the food processing sector in the country.</p><p>&bull; it will help in providing better prices to farmers and is a big step towards doubling of</p><p>Farmers' income.</p><p>&bull; it will create huge employment opportunities, especially in rural areas.</p><p>&bull; it will also help in reducing wastage of agricultural produce, increasing the processing</p><p>Level, availability of safe and convenient processed foods at an affordable price to Consumers and enhancing the export of the processed foods.</p><p>Source: PIB</p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Urban Challenge Fund:</p><p>I. The total size of the fund announced by the government is &#8377;1 lakh crore.</p><p>II. For the fiscal year 2025-26, a proposed allocation of &#8377;5,000 crore has been made to kickstart projects.</p><p>Which of the above statements is/are correct?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2361;&#2352;&#2368; &#2330;&#2369;&#2344;&#2380;&#2340;&#2368; &#2344;&#2367;&#2343;&#2367; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2328;&#2379;&#2359;&#2367;&#2340; &#2344;&#2367;&#2343;&#2367; &#2325;&#2366; &#2325;&#2369;&#2354; &#2310;&#2325;&#2366;&#2352; 1 &#2354;&#2366;&#2326; &#2325;&#2352;&#2379;&#2337;&#2364; &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;&#2404;</p><p>II. &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2357;&#2352;&#2381;&#2359; 2025-26 &#2325;&#2375; &#2354;&#2367;&#2319;, &#2346;&#2352;&#2367;&#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2325;&#2379; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 5,000 &#2325;&#2352;&#2379;&#2337;&#2364; &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;&#2367;&#2340; &#2310;&#2357;&#2306;&#2335;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",

    "solution": "<p>Statement I is correct as the total fund size is &#8377;1 lakh crore.</p><p>Statement II is incorrect because the proposed allocation for FY 2025-26 is &#8377;10,000 crore, not &#8377;5,000 crore.</p><p></p><p>Further insights:</p><p>Urban Challenge Fund will be used to implement initiatives such as Cities as Growth Hubs, Creative Redevelopment of Cities, and Water and Sanitation reflects the governments strong commitment to fostering sustainable and inclusive urban development.</p><p>This initiative will  enhance urban resilience and advance the vision of Viksit Bharat.</p><p></p><p></p>",

    "question": "<span class=\"eqt\"><p>Which among the following fields is/are categories of Bharat Ratna Award?</p><p>I. Art and literature</p><p>II. Science</p><p>III. Public service</p><p>Select the answer using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2349;&#2366;&#2352;&#2340; &#2352;&#2340;&#2381;&#2344; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2325;&#2368; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2350;&#2375;&#2306; &#2310;&#2340;&#2366; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2325;&#2354;&#2366; &#2324;&#2352; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351;</p><p>II. &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344;</p><p>III. &#2354;&#2379;&#2325; &#2360;&#2375;&#2357;&#2366;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>All of the statements are correct.</b></p><p>Bharat Ratna Award is the highest Civilian award bestowed by the Republic of India. Bharat Ratna is awarded to exceptional individuals who have performed in the highest order.</p><p>It was first given in 1954. Although this award was originally given to those artists who had outstanding achievements in <b>art, science, literature and public service,</b> but in December 2011, the criteria was expanded to include '<b>any field of human endeavour'.</b></p><p>Source- Indian Art and Culture- Nitin Singhania and Ministry of Home Affairs</p>",
    "question_index": 40
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Tripartite Struggle for Kannauj:</p><p><b>a.</b> The struggle was primarily between the Gurjara-Pratiharas, Palas, and Cholas.</p><p><b>b.</b> Kannauj's significance lay in its strategic position on the Ganga trade route.</p><p><b>c.</b> The Tripartite Struggle ultimately weakened all three participating dynasties.</p><p>Which of the statements given above are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2344;&#2381;&#2344;&#2380;&#2332; &#2325;&#2375; &#2354;&#2367;&#2319; &#2340;&#2381;&#2352;&#2367;&#2346;&#2325;&#2381;&#2359;&#2368;&#2351; &#2360;&#2306;&#2328;&#2352;&#2381;&#2359; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p><b>a.</b> &#2360;&#2306;&#2328;&#2352;&#2381;&#2359; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2327;&#2369;&#2352;&#2381;&#2332;&#2352;-&#2346;&#2381;&#2352;&#2340;&#2367;&#2361;&#2366;&#2352;&#2379;&#2306;, &#2346;&#2366;&#2354;&#2379;&#2306; &#2324;&#2352; &#2330;&#2379;&#2354;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2341;&#2366;&#2404;</p><p><b>b.</b> &#2325;&#2344;&#2381;&#2344;&#2380;&#2332; &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2357; &#2327;&#2306;&#2327;&#2366; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2350;&#2366;&#2352;&#2381;&#2327; &#2346;&#2352; &#2311;&#2360;&#2325;&#2368; &#2352;&#2339;&#2344;&#2368;&#2340;&#2367;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2341;&#2366;&#2404;</p><p><b>c.</b> &#2340;&#2381;&#2352;&#2367;&#2346;&#2325;&#2381;&#2359;&#2368;&#2351; &#2360;&#2306;&#2328;&#2352;&#2381;&#2359; &#2344;&#2375; &#2309;&#2306;&#2340;&#2340;&#2307; &#2360;&#2349;&#2368; &#2340;&#2368;&#2344; &#2349;&#2366;&#2327; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;&#2379;&#2306; &#2325;&#2379; &#2325;&#2350;&#2332;&#2379;&#2352; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366;&#2404;</p><p>&#2314;&#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2380;&#2344; &#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The struggle was between the Gurjara-Pratiharas, Palas, and Rashtrakutas, not the Cholas.</p><p>&bull; Kannauj's location made it commercially significant.</p><p>&bull; The prolonged conflict weakened all three dynasties involved.</p><p><b>Further Insight:</b></p><p>&bull; <b>Tripartite Struggle for Kannauj Supremacy (750-1000 CE)</b></p><p>&#9675; <b>Major Empires</b>: Gurjara-Pratihara (Western India), Palas (Eastern India), Rashtrakutas (Deccan).</p><p>&#9675; <b>Cause</b>: Control over Kannauj, a commercially strategic location on the Ganga trade route and previously the capital of Harshavardhan.</p><p><img width=564 height=748 id=image4.jpg src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25852/image007.jpg\"></p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about Real GDP:</p><p>a) Real GDP is calculated using constant base year prices.</p><p>b) Real GDP adjusts for inflation to reflect the real value of goods and services.</p><p>c) Real GDP is always greater than Nominal GDP during periods of inflation.</p><p><b>Options:</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>a) &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2360;&#2381;&#2341;&#2367;&#2352; &#2310;&#2343;&#2366;&#2352; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>b) &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2379; &#2360;&#2350;&#2366;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>c) &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2368; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2361;&#2350;&#2375;&#2358;&#2366; &#2344;&#2366;&#2350;&#2350;&#2366;&#2340;&#2381;&#2352; &#2332;&#2368;&#2337;&#2368;&#2346;&#2368; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p><b>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;:</b></p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only b and c are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only a and c are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">All a, b, and c are correct</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; a, b, &#2324;&#2352; c &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Real GDP uses constant base year prices and adjusts for inflation to reflect the true value of goods and services. </b></p><p>&bull; <b>Real GDP is not necessarily greater than Nominal GDP during inflation - Nominal GDP tends to be higher during inflation </b></p><p><b>Further Insight:</b></p><p>&bull; Nominal GDP: GDP calculated at current market prices without adjusting for inflation.</p><p>&bull; Real GDP : GDP adjusted for inflation, providing a more accurate measure of economic growth.</p><p>&bull; GDP Deflator: Used to convert nominal GDP into real GDP by adjusting for price changes. </p><p>&bull; Formula: GDP Deflator = Nominal GDP/Real GDP X 100</p>",
    "question_index": 42
  },

    "question": "<span class=\"eqt\"><p>Which of the followings statements is/are true about private goods?</p><p>I. Rivalrous in consumption</p><p>II. Non-excludability</p><p>III. Negative marginal cost</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2332;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2313;&#2346;&#2349;&#2379;&#2327; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2342;&#2381;&#2357;&#2306;&#2342;&#2381;&#2357;&#2367;&#2340;&#2366;</p><p>II. &#2309;&#2357;&#2352;&#2381;&#2332;&#2344;&#2368;&#2351;&#2340;&#2366;</p><p>III. &#2315;&#2339;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2368;&#2350;&#2366;&#2306;&#2340; &#2354;&#2366;&#2327;&#2340;</p></span>",
    "options": [
      "<span class=\"eqt\">Only III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both II and III</span><span class=\"hqt\" style=\"display:none\">II &#2324;&#2352; III &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Only statement I is true about private goods.</p><p>Rivalrous in consumption: This means that one person's consumption of a good prevents another person from consuming the same unit. For example, if you eat an apple, someone else cannot eat the same apple.</p><p>Non-excludability: This is a characteristic of public goods, not private goods. It means that it is difficult or impossible to prevent someone from consuming a good.</p><p>Negative marginal cost: This is not a general characteristic of private goods. It might occur in specific cases, but it's not a defining feature.</p><p>Therefore, only the first statement is correct about private goods.</p><p></p><p></p><p></p>",
    "question_index": 43
  },

    "question": "<span class=\"eqt\"><p>Match the following Article Union Executive with their clauses:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column 1 </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column 2 </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Article 52</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Executive power of Union vested in President</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Article 74</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Appointment of Prime Minister and Ministers</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Article 76</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Attorney General of India</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Article 75</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. President of India</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2351;&#2370;&#2344;&#2367;&#2351;&#2344; &#2319;&#2327;&#2381;&#2332;&#2368;&#2325;&#2381;&#2351;&#2370;&#2335;&#2367;&#2357; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2326;&#2306;&#2337;&#2379;&#2306; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2319;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2325;&#2377;&#2354;&#2350; 1 </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2325;&#2377;&#2354;&#2350; 2 </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 52</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2360;&#2306;&#2328; &#2325;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2350;&#2375;&#2306; &#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 74</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2324;&#2352; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340;&#2367;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 76</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2361;&#2366;&#2344;&#2381;&#2351;&#2366;&#2351;&#2357;&#2366;&#2342;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 75</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i - d, ii - a, iii - c, iv - b</span><span class=\"hqt\" style=\"display:none\">i - d, ii - a, iii - c, iv - b</span>",
      "<span class=\"eqt\">i - b, ii - d, iii - a, iv - c</span><span class=\"hqt\" style=\"display:none\">i - b, ii - d, iii - a, iv - c</span>",
      "<span class=\"eqt\">i - d, ii - b, iii - c, iv - a</span><span class=\"hqt\" style=\"display:none\">i - d, ii - b, iii - c, iv - a</span>",
      "<span class=\"eqt\">i - a, ii - c, iii - d, iv - b</span><span class=\"hqt\" style=\"display:none\">i - a, ii - c, iii - d, iv - b</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Article 52  -  President of India</b>: Article 52 states that there shall be a President of India</p><p>&bull; <b>Article 74  -  Executive Power of Union Vested in President</b>: Article 74 establishes that the President shall exercise executive power based on the aid and advice of the Council of Ministers.</p><p>&bull; <b>Article 76  -  Attorney General of India</b>: Article 76 refers to the Attorney General of India, who is the chief legal advisor to the government.</p><p>&bull; <b>Article 75  -  Appointment of Prime Minister and Ministers</b>: Article 75 deals with the appointment of the Prime Minister and other Ministers by the President.</p>",

    "question": "<span class=\"eqt\"><p>Under the NIRVIK Scheme (Niryat Rin Vikas Yojana), which of the following is not a key objective? </p></span><span class=\"hqt\" style=\"display:none\"><p>NIRVIK &#2351;&#2379;&#2332;&#2344;&#2366; (&#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2315;&#2339; &#2357;&#2367;&#2325;&#2366;&#2360; &#2351;&#2379;&#2332;&#2344;&#2366;) &#2325;&#2375; &#2340;&#2361;&#2340;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Enhancing export insurance coverage</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340; &#2348;&#2368;&#2350;&#2366; &#2325;&#2357;&#2352;&#2375;&#2332; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Providing capital subsidies to exporters</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340;&#2325;&#2379;&#2306; &#2325;&#2379; &#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2360;&#2348;&#2381;&#2360;&#2367;&#2337;&#2368; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Simplifying loan procedures for small exporters</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2379;&#2335;&#2375; &#2344;&#2367;&#2352;&#2381;&#2351;&#2366;&#2340;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2315;&#2339; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2360;&#2352;&#2354; &#2348;&#2344;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Reducing insurance premiums</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;&#2350;&#2366; &#2346;&#2381;&#2352;&#2368;&#2350;&#2367;&#2351;&#2350; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; <b>The NIRVIK Scheme focuses on insurance coverage and simplifying credit, but it does not offer direct capital subsidies. </b></p><p><b>Further Insight:</b></p><p>&bull; <b>NIRVIK Scheme (Niryat Rin Vikas Yojana)</b> </p><p>&bull; <b>Launch Date:</b> February 1, 2020 </p><p>&bull; <b>Aim:</b> Improve export credit availability and provide insurance to exporters. </p><p>&bull; <b>Main Features:</b> </p><p>&#9675; Provides insurance coverage up to 90% of the loan amount. </p><p>&#9675; Reduces insurance premium rates for small exporters. </p><p>&#9675; Ensures quicker and easier loan disbursal to exporters. </p><p>&#9675; Focus on promoting Indian exports globally. </p>",
    "question_index": 45

    "question": "<span class=\"eqt\"><p>Consider the following statements.</p><p>I. The writ jurisdiction of high court is wider than Supreme Court.</p><p>II. The original jurisdiction of the High court is wider than its appellate jurisdiction.</p><p>Which of the above statement(s) is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2352;&#2367;&#2335; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2360;&#2375; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2361;&#2376;&#2404;</p><p>II. &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2366; &#2350;&#2370;&#2354; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2313;&#2360;&#2325;&#2375; &#2309;&#2346;&#2368;&#2354;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2360;&#2375; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The writ jurisdiction of the high court is wider than that of the Supreme Court. This is because, the Supreme Court can issue writs only for the enforcement of fundamental rights and not for any other purpose, that is, it does not extend to a case where the breach of an ordinary legal right is alleged.</p><p>As appellate jurisdiction of High Court involves both criminal and civil matters, it is wider than its original jurisdiction. Before 1973, the Calcutta, Bombay and Madras High Courts also had original criminal jurisdiction. This was fully abolished by the Criminal Procedure Code, 1973.</p><p>Source:</p><p>Indian Polity, M Laxmikanth.</p>",
    "question_index": 46
  },
  {
    "question": "<span class=\"eqt\"><p>The 'Kalpataru Utsav' is a significant festival celebrated in which state?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2325;&#2354;&#2381;&#2346;&#2340;&#2352;&#2369; &#2313;&#2340;&#2381;&#2360;&#2357;' &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">West Bengal</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2348;&#2306;&#2327;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Odisha</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2358;&#2366;</span>",

    "solution": "<p>The Kalpataru Utsav is celebrated in West Bengal. This festival commemorates a spiritual event in the life of Sri Ramakrishna at the Dakshineswar Kali Temple, where he is said to have attained the power to fulfill the spiritual wishes of his devotees.</p>",
    "question_index": 47
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following was the author of 'Dashakumaracharita'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; '&#2342;&#2358;&#2325;&#2369;&#2350;&#2366;&#2352;&#2330;&#2352;&#2367;&#2340;' &#2325;&#2375; &#2354;&#2375;&#2326;&#2325; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Dandin</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2339;&#2381;&#2337;&#2368;</span>",
      "<span class=\"eqt\">Harisena</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2352;&#2367;&#2360;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Kshemendra</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2359;&#2375;&#2350;&#2375;&#2306;&#2342;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Bhavabhuti</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2357;&#2349;&#2370;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Dandin (Da&#7751;&#7693;in) was a highly influential 7th-8th century Sanskrit grammarian, poet, and prose writer. His works are cornerstones of classical Sanskrit literature.</p><p>The two works most confidently attributed to him are:</p><p><b>Dashakumaracharita (The Tale of the Ten Princes)</b></p><p>Genre: Prose Romance (Gadyak&#257;vya).</p><p>Content: This is his most famous work. It's a captivating collection of adventure stories narrated by ten young princes who are separated and embark on individual journeys across India. The tales are filled with romance, magic, intrigue, and realistic depictions of urban life, including its less savory aspects.</p><p>Significance: It is celebrated for its elegant, simple prose, witty narration, and vivid portrayal of contemporary Indian society.</p><p><b>Kavyadarsha (The Mirror of Poetry)</b></p><p>Genre: Poetics / Literary Theory (Ala&#7749;k&#257;ra&#347;&#257;stra).</p><p>Content: This is a foundational treatise on the principles of poetry and literary aesthetics. Dandin defines and classifies various poetic elements, including literary styles (r&#299;ti), poetic qualities (gu&#7751;a), flaws (do&#7779;a), and dozens of figures of speech (ala&#7749;k&#257;ra).</p><p>Significance: It is one of the earliest surviving systematic works on poetics and heavily influenced subsequent literary theory in India for centuries.</p>",
    "question_index": 48
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Navroz festival:</p><p>I. The festival is celebrated as Persian new year.</p><p>II. The festival is linked to the King Jamshed.</p><p>III. It is one of UNESCO's Intangible Cultural Heritages in India.</p><p>Which of the above statements is / are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2357;&#2352;&#2379;&#2332;&#2364; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2351;&#2361; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2347;&#2366;&#2352;&#2360;&#2368; &#2344;&#2357; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2361; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2352;&#2366;&#2332;&#2366; &#2332;&#2350;&#2358;&#2375;&#2342; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;&#2404;</p><p>III. &#2351;&#2361; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2325;&#2368; &#2309;&#2350;&#2370;&#2352;&#2381;&#2340; &#2360;&#2366;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;&#2325; &#2357;&#2367;&#2352;&#2366;&#2360;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I &amp; II Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II &amp; III Only.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2319;&#2357;&#2306; III.</span>",
      "<span class=\"eqt\">I &amp; III Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II &amp; III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>All Statements are correct</p><p>Navroz is a 3,000-year-old Zoroastrian tradition, a ritual celebration that signals the start of Spring and the Persian new year. In more modern times, in A.D. 1079, a king of Iran named Jalaluddin Malekshah started observing it on March 21.</p><p>It is connected to Jamshed, the illustrious king of Iran. Thus, the day came to be known as Jamshedi Navroz.</p><p>The scriptures state that in the realm of King Jamshed, there was no excessive heat or cold, there were no premature deaths, and everyone lived happily.</p><p>It was inscribed in 2016 in Intangible cultural Heritages by UNESCO.</p><p>Source: The Hindu.</p>",
    "question_index": 49
  },
  {
    "question": "<span class=\"eqt\"><p>A vertical pole and a vertical tower stand on the same level of ground. From the top of the pole, the angle of elevation to the top of the tower is 60&deg;, and the angle of depression to the bottom of the tower is 30&deg;. Given that the height of the tower is 276 meters, determine the height of the pole. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2326;&#2306;&#2349;&#2366; &#2324;&#2352; &#2319;&#2325; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2350;&#2368;&#2344;&#2366;&#2352; &#2319;&#2325; &#2361;&#2368; &#2340;&#2354; &#2346;&#2352; &#2326;&#2337;&#2364;&#2375; &#2361;&#2376;&#2306;&#2404; &#2326;&#2306;&#2349;&#2375; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2360;&#2375; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; 60&deg; &#2361;&#2376;, &#2324;&#2352; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2375; &#2340;&#2354; &#2325;&#2366; &#2309;&#2357;&#2344;&#2350;&#2344; &#2325;&#2379;&#2339; 30&deg; &#2361;&#2376;&#2404; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2325;&#2367; &#2350;&#2368;&#2344;&#2366;&#2352; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; 276 &#2350;&#2368;&#2335;&#2352; &#2361;&#2376;, &#2326;&#2306;&#2349;&#2375; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">45</span><span class=\"hqt\" style=\"display:none\">45</span>",
      "<span class=\"eqt\">50</span><span class=\"hqt\" style=\"display:none\">50</span>",
      "<span class=\"eqt\">57</span><span class=\"hqt\" style=\"display:none\">57</span>",
      "<span class=\"eqt\">69</span><span class=\"hqt\" style=\"display:none\">69</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the height of the pole be 'H' m</p><p>Let the distance between the pole and the tower 'D' m</p><p>Tan30&deg; = H/D</p><p>1/&radic;3 = H/D</p><p>H&radic;3 = D</p><p>Tan 60&deg; = (276  -  H) /D</p><p>&radic;3 = (276  -  H) /D</p><p>&radic;3 = (276  -  H)/H&radic;3 </p><p>&radic;3  X  H&radic;3 = 276  -  H</p><p>3H + H = 276</p><p>H = 69 m </p>",
    "question_index": 50
  },
