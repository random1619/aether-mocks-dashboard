<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cgl1 - Responsive Exam Interface</title>

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">58</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'Enjoy the Game' is coded as 'ey he am' and 'Enjoy the evening' is coded as 'in ey he'. How is 'Game' coded in the given language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'Enjoy the Game' &#2325;&#2379; 'ey he am' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; 'Enjoy the evening' &#2325;&#2379; 'in ey he' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2342;&#2368; &#2327;&#2312; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'Game' &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">ey</span><span class=\"hqt\" style=\"display:none\">ey</span>",
      "<span class=\"eqt\">he<b> </b></span><span class=\"hqt\" style=\"display:none\">he<b> </b></span>",
      "<span class=\"eqt\">am</span><span class=\"hqt\" style=\"display:none\">am</span>",
      "<span class=\"eqt\">in</span><span class=\"hqt\" style=\"display:none\">in</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The code for 'enjoy/the' is 'ey/he' (in any order).</p><p>The code for 'Game' is 'am'.</p><p>The code for 'Evening' is 'in'.</p><p>So, option (c) is the correct answer. </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>How many meaningful English words can be formed with the first, third, fifth and sixth letters of the word BUTLER (when counted from left to right) using each letter only once in each word? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2348;&#2381;&#2342; BUTLER &#2325;&#2375; &#2346;&#2361;&#2354;&#2375;, &#2340;&#2368;&#2360;&#2352;&#2375;, &#2346;&#2366;&#2305;&#2330;&#2357;&#2375;&#2306; &#2324;&#2352; &#2331;&#2336;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2360;&#2375; (&#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2366;&#2319;&#2305; &#2327;&#2367;&#2344;&#2340;&#2368; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352;) &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2358;&#2348;&#2381;&#2342; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2366; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2348;&#2366;&#2352; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2352;&#2381;&#2341;&#2346;&#2370;&#2352;&#2381;&#2339; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2358;&#2348;&#2381;&#2342; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Zero</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2370;&#2344;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The given word is BUTLER.</p><p>The first, third, fifth and sixth letters from left end are B, T, E, R. </p><p>So, the no meaningful words can be formed.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If each vowel in the word 'YOGHURT' is replaced by the letter 'M' and each consonant is changed to the following letter in the English alphabetical order. How many letters are there in the English alphabetical order between the letter which is the third from the left end and the third from the right end in the group of letters thus formed? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2358;&#2348;&#2381;&#2342; 'YOGHURT' &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2381;&#2357;&#2352; &#2325;&#2379; &#2309;&#2325;&#2381;&#2359;&#2352; 'M' &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2381;&#2351;&#2306;&#2332;&#2344; &#2325;&#2379; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2309;&#2327;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2348;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2305; &#2331;&#2379;&#2352; &#2360;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2324;&#2352; &#2342;&#2366;&#2319;&#2305; &#2331;&#2379;&#2352; &#2360;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;</span>",
      "<span class=\"eqt\">One</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;</span>",
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>",
      "<span class=\"eqt\">More than four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The word is YOGHURT.</p><p>If each vowel is replaced by the letter 'M' and each consonant is changed to the following letter in the English alphabetical order, then we get: ZMHIMSU</p><p>The third letter from left end is H.</p><p>The third letter from right end is M.</p><p>So, letters between H and M are I, J, K, L. So, there are total 4 letters. </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Two orientation of the same box are shown. How will this box look when unfolded?</p><p><img width=203 height=158 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19472/image022.jpg\"></p><p><img width=623 height=222 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19472/image023.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2368; &#2342;&#2379; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2351;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2326;&#2379;&#2354;&#2375; &#2332;&#2366;&#2344;&#2375; &#2346;&#2352; &#2351;&#2361; &#2348;&#2377;&#2325;&#2381;&#2360; &#2325;&#2376;&#2360;&#2366; &#2342;&#2367;&#2326;&#2375;&#2327;&#2366;?</p><p><img width=\"203\" height=\"158\" id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19472/image022.jpg\"></p><p><img width=\"623\" height=\"222\" id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19472/image023.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">Both I and III</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; III &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In this type of format,</p><p><img width=172 height=230 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19472/image024.jpg\"></p><p>@ lies opposite $; * lies opposite to + and ! lies opposite to &amp;.</p><p><b>Figure I:</b> &gt;&gt; lies opposite **; ++ lies opposite to &lt;&lt; and !! lies opposite to {}.</p><p>Thus, &gt;&gt; is not adjacent to **, ++ is not adjacent to &lt;&lt; and !! is not adjacent to {}.</p><p>So, figure I is correct.</p><p><b>Figure II:</b> ** lies opposite {}; &lt;&lt; lies opposite to &gt;&gt; and ++ lies opposite to !!.</p><p>Thus, ** is not adjacent to {}, &lt;&lt; is not adjacent to &gt;&gt; and ++ is not adjacent to !!.</p><p>So, figure II is incorrect.</p><p><b>Figure III</b>: &gt;&gt; lies opposite **; !! lies opposite to ++ and {} lies opposite to &lt;&lt;.</p><p>Thus, &gt;&gt; is not adjacent to **, !! is not adjacent to ++ and {} is not adjacent to &lt;&lt;.</p><p>So, figure III is correct.</p><p><b>Figure IV:</b> {} lies opposite **; ++ lies opposite to !! and &lt;&lt; lies opposite to &gt;&gt;.</p><p>Thus, {} is not adjacent to **, ++ is not adjacent to !! and &lt;&lt; is not adjacent to &gt;&gt;.</p><p>So, figure IV is incorrect.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, \"Just do your best on it\" means \"424422\" and \"Just do it now\" means \"4223\". Which of the following is the code for \"You do it yourself always\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; \"Just do your best on it\" &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; \"424422\" &#2361;&#2376; &#2340;&#2341;&#2366; \"Just do it now\" &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; \"4223\" &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; \"You do it yourself always\" &#2325;&#2366; &#2325;&#2379;&#2337; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">32286</span><span class=\"hqt\" style=\"display:none\">32286</span>",
      "<span class=\"eqt\">32287</span><span class=\"hqt\" style=\"display:none\">32287</span>",
      "<span class=\"eqt\">32296</span><span class=\"hqt\" style=\"display:none\">32296</span>",
      "<span class=\"eqt\">32289</span><span class=\"hqt\" style=\"display:none\">32289</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In this code language,</p><p>The number of letters in each word is the coded number of that word.</p><p>So, the code for \"You do it yourself always\" will be \"32286\".</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Select the mirror image of the given combination when the mirror is placed at MN as shown. </p><p><img width=145 height=185 id=\"Drawing 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20577/image011.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2352;&#2381;&#2346;&#2339; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2319; &#2327;&#2319; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; MN &#2346;&#2352; &#2352;&#2326;&#2344;&#2375; &#2346;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2375; &#2348;&#2344;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2342;&#2352;&#2381;&#2346;&#2339; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"145\" height=\"185\" id=\"Drawing 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20577/image011.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Here, figure <b>(III)</b> is the correct mirror image. </p><p><img width=296 height=87 id=\"Drawing 11\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20577/image012.png\"></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Select the correct mirror image of the given figure when the mirror is placed at MN as shown below.</p><p><img width=123 height=137 id=\"Picture 28\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21020/image028.jpg\"></p><p><img width=432 height=127 id=\"Picture 31\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21020/image029.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2342;&#2352;&#2381;&#2346;&#2339; &#2325;&#2379; &#2344;&#2368;&#2330;&#2375; &#2342;&#2352;&#2381;&#2358;&#2366;&#2319; &#2327;&#2319; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; MN &#2346;&#2352; &#2352;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2375; &#2348;&#2344;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2361;&#2368; &#2342;&#2352;&#2381;&#2346;&#2339; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"123\" height=\"137\" id=\"Picture 28\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21020/image028.jpg\"></p><p><img width=\"432\" height=\"127\" id=\"Picture 31\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21020/image029.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>",
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct mirror image of the given combination when the mirror is placed at MN is: </p><p><img width=231 height=137 id=\"Picture 30\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21020/image030.jpg\"></p>",
    "question_index": 6

    "question": "<span class=\"eqt\"><p>Chandrasekhar Limit (CSL) is the largest practical unit of </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2306;&#2342;&#2381;&#2352;&#2358;&#2375;&#2326;&#2352; &#2354;&#2367;&#2350;&#2367;&#2335; (CSL) ___________&#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2357;&#2381;&#2351;&#2366;&#2357;&#2361;&#2366;&#2352;&#2367;&#2325; &#2311;&#2325;&#2366;&#2312; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">length</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2306;&#2348;&#2366;&#2312;</span>",
      "<span class=\"eqt\">pressure</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2366;&#2348;</span>",
      "<span class=\"eqt\">force</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2354;</span>",
      "<span class=\"eqt\">mass</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Chandrasekhar Limit (CSL) is the largest practical unit of <b>mass</b>.</p><p>1 CSL = 1.4 times the mass of the Sun.</p><p>The smallest practical unit of time is Shake. 1 Shake = 10<sup>&#8722;8</sup> s </p>",
    "question_index": 27
  },
  {
    "question": "<span class=\"eqt\"><p>For a wave, _____ is the distance from the centre line (or the still position) to the top of a crest or to the bottom of a trough.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2340;&#2352;&#2306;&#2327; &#2325;&#2375; &#2354;&#2367;&#2319;, _____ &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2352;&#2375;&#2326;&#2366; (&#2351;&#2366; &#2360;&#2381;&#2341;&#2367;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;) &#2360;&#2375; &#2358;&#2367;&#2326;&#2366; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2351;&#2366; &#2327;&#2352;&#2381;&#2340; &#2325;&#2375; &#2340;&#2354; &#2340;&#2325; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Phase difference</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2354;&#2366;&#2306;&#2340;&#2352;</span>",
      "<span class=\"eqt\">Frequency</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Amplitude</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Wave velocity</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2352;&#2306;&#2327; &#2357;&#2375;&#2327;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; The <b>amplitude</b> of a wave is the distance from the centre line (or the still position) to the top of a crest or to the bottom of a trough. </p><p>&#183; Amplitude is measured in metres (m). </p><p>&#183; The greater the amplitude of a wave then the more energy it is carrying.</p>",
    "question_index": 28
  },

    "question": "<span class=\"eqt\"><p>Khongjom Parva is a ballad singing tradition that has been existing over the past one hundred and twenty two years in _______</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2326;&#2379;&#2306;&#2327;&#2332;&#2379;&#2350; &#2346;&#2352;&#2381;&#2357; &#2319;&#2325; &#2327;&#2366;&#2341;&#2366;&#2327;&#2368;&#2340; &#2327;&#2366;&#2351;&#2344; &#2346;&#2352;&#2306;&#2346;&#2352;&#2366; &#2361;&#2376; &#2332;&#2379; &#2325;&#2367; &#2346;&#2367;&#2331;&#2354;&#2375; &#2319;&#2325; &#2360;&#2380; &#2348;&#2366;&#2312;&#2360; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2360;&#2375; _______ &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2350;&#2366;&#2344; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Mizoram</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2332;&#2364;&#2379;&#2352;&#2350;</span>",
      "<span class=\"eqt\">Manipur</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2339;&#2367;&#2346;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Nagaland</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2327;&#2366;&#2354;&#2376;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Tripura</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2346;&#2369;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Khongjom Parva is a ballad singing tradition that has been existing over the past one hundred and twenty two years in <b>Manipur</b>.</p><p>It emerged just after the Anglo-Manipuri War of 1891. The ballad started in praise of the great heroes of the War who sacrificed their lives for Manipur.</p><p>The founder of this singing style was one Dhobi Leinou who witnessed the war, as he led the British force.</p><p>His singing style has ever since been known as Khongjom Parva, which later on has extensively constituted among others the stories, parts or full, of the Ramayana, the Mahabharata, the heroic exploits of Manipuri kings, the legends of Moirang and more especially the Manipuri folk epic, Khamba-Thoibi.</p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>Tribes of the Nicobar Islands pay their respects to the departed soul of the head of the family during the ______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2325;&#2379;&#2348;&#2366;&#2352; &#2342;&#2381;&#2357;&#2368;&#2346; &#2360;&#2350;&#2370;&#2361; &#2325;&#2368; &#2332;&#2344;&#2332;&#2366;&#2340;&#2367;&#2351;&#2366;&#2305; ______ &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2346;&#2352;&#2367;&#2357;&#2366;&#2352; &#2325;&#2375; &#2350;&#2369;&#2326;&#2367;&#2351;&#2366; &#2325;&#2368; &#2342;&#2367;&#2357;&#2306;&#2327;&#2340; &#2310;&#2340;&#2381;&#2350;&#2366; &#2325;&#2379; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Ossuary Feast</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2358;&#2369;&#2309;&#2352;&#2368; &#2347;&#2368;&#2360;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Jagaddhatri Puja</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2327;&#2342;&#2381;&#2343;&#2366;&#2340;&#2381;&#2352;&#2368; &#2346;&#2370;&#2332;&#2366;</span>",
      "<span class=\"eqt\">Ganjan Festival</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2332;&#2344; &#2350;&#2361;&#2379;&#2340;&#2381;&#2360;&#2357;</span>",
      "<span class=\"eqt\">Kalpataru Utsav</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2354;&#2381;&#2346;&#2340;&#2352;&#2369; &#2313;&#2340;&#2381;&#2360;&#2357;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The most important festival celebrated by the Nicobarese tribe is the Ossuary Feast. At this feast, the members of the family pay homage to the soul of the departed head of the family. On this occasion, the Nicobarese Folk Dance is organized and all invitees take part in the dance.</p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>Rakhine Mountain Range historically has been a barrier between _____and the Indian subcontinent.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2326;&#2367;&#2344; &#2346;&#2352;&#2381;&#2357;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2320;&#2340;&#2367;&#2361;&#2366;&#2360;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; _____ &#2324;&#2352; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2313;&#2346;&#2350;&#2361;&#2366;&#2342;&#2381;&#2357;&#2368;&#2346; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2348;&#2366;&#2343;&#2366; &#2352;&#2361;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Nepal</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Bhutan</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2335;&#2366;&#2344;</span>",
      "<span class=\"eqt\">China</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Myanmar</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2381;&#2351;&#2366;&#2306;&#2350;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Rakhine Mountains, Burmese Rakhine Yoma, also called Arakan Mountains, mountain arc in western Myanmar (Burma) , between the Rakhine (Arakan) coast and the Irrawaddy River valley.</p><p>The arc extends northward for about 600 miles (950 km) from Cape Negrais (Myanmar) to Manipur (India) and includes the Naga, Chin, Mizo (Lushai) , and Patkai hills.</p><p>The mountain range itself is about 250 miles (400 km) long. Its highest point is Mount Victoria (3,094 m).</p><p>Dividing the Rakhine coast from the rest of Myanmar, the range historically has been a barrier between Myanmar and the Indian subcontinent.</p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following personality was associated with the formation of the Paris Indian Society in 1905?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; 1905 &#2350;&#2375;&#2306; &#2346;&#2375;&#2352;&#2367;&#2360; &#2311;&#2306;&#2337;&#2367;&#2351;&#2344; &#2360;&#2379;&#2360;&#2366;&#2311;&#2335;&#2368; &#2325;&#2375; &#2327;&#2336;&#2344; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Annie Besant</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344;&#2368; &#2348;&#2375;&#2360;&#2375;&#2306;&#2335;</span>",
      "<span class=\"eqt\">Madam Bhikaji Rustom Cama</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2337;&#2350; &#2349;&#2368;&#2325;&#2366;&#2332;&#2368; &#2352;&#2369;&#2360;&#2381;&#2340;&#2350; &#2325;&#2366;&#2350;&#2366;</span>",
      "<span class=\"eqt\">H.N. Khuzru</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2330;. &#2319;&#2344;. &#2326;&#2369;&#2332;&#2352;&#2369;</span>",
      "<span class=\"eqt\">S.A.Dange</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;. &#2319;. &#2337;&#2366;&#2306;&#2327;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Paris Indian Society was founded in 1905 at Paris by Madam Bhikaji Rustom Cama, B.H. Godrej and S. R. Rana.</p><p>The organization was started as a branch of the Indian Home Rule Society founded by Shyamji Krishna Varma in London in 1905 to secure Home Rule for India and to carry out propaganda to attain society's objectives.</p><p>Shyamji Krishna Varma had also purchased a house in 1905 in London, which became known as India House, ostensibly a residence for Indian students but used for revolutionary activities.</p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>Which section of the cerebrum integrates sensory information, specifically dealing with spatial sense and navigation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2350;&#2360;&#2381;&#2340;&#2367;&#2359;&#2381;&#2325;/&#2360;&#2375;&#2352;&#2375;&#2348;&#2381;&#2352;&#2350; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2349;&#2366;&#2327; &#2360;&#2306;&#2357;&#2375;&#2342;&#2368; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2379; &#2319;&#2325;&#2368;&#2325;&#2371;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325; &#2349;&#2366;&#2357;&#2344;&#2366; &#2324;&#2352; &#2344;&#2375;&#2357;&#2367;&#2327;&#2375;&#2358;&#2344; &#2325;&#2379; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Frontal lobe</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2354;&#2366;&#2335; &#2346;&#2366;&#2354;&#2367;/&#2347;&#2381;&#2352;&#2306;&#2335;&#2354; &#2354;&#2379;&#2348;</span>",
      "<span class=\"eqt\">Parietal lobe</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2346;&#2366;&#2354;&#2367;/&#2346;&#2376;&#2352;&#2366;&#2311;&#2335;&#2354; &#2354;&#2379;&#2348;</span>",
      "<span class=\"eqt\">Temporal lobe</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2306;&#2326; &#2346;&#2366;&#2354;&#2367;/&#2335;&#2375;&#2350;&#2381;&#2346;&#2379;&#2352;&#2354; &#2354;&#2379;&#2348;</span>",
      "<span class=\"eqt\">Occipital lobe</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2325;&#2346;&#2366;&#2354; &#2346;&#2366;&#2354;&#2367;/&#2321;&#2325;&#2381;&#2360;&#2368;&#2346;&#2367;&#2335;&#2354; &#2354;&#2379;&#2348;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cerebrum sections</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Function</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Frontal lobe</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Controls personality, decision-making and reasoning</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Parietal lobe </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Integrates sensory information, specifically dealing with spatial sense and navigation. Another function is its role in comprehending numbers and the manipulation of objects.</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Temporal lobe</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Controls, memory, speech, and sense of smell.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Occipital lobe</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Helps the brain identify colours and motion perceptions.</td></tr></table>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Articles states that the Council of Ministers shall be collectively responsible to the Lok Sabha?</p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2351;&#2361; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2346;&#2352;&#2367;&#2359;&#2342; &#2360;&#2366;&#2350;&#2370;&#2361;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2313;&#2340;&#2381;&#2340;&#2352;&#2342;&#2366;&#2351;&#2368; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 74</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 74</span>",
      "<span class=\"eqt\">Article 76</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 76</span>",
      "<span class=\"eqt\">Article 77</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 77</span>",
      "<span class=\"eqt\">Article 75</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 75</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Article 75(3) of the Indian Constitution specifies that the Council of Ministers shall be collectively responsible to the Lok Sabha.</p><p>This means the ministers must act as a team, and they remain in office as long as they enjoy the confidence of the Lok Sabha.</p><p></p><p>The other options are not related to collective responsibility:</p><p>Article 74: Deals with the Council of Ministers aiding and advising the President.</p><p>Article 76: Pertains to the appointment of the Attorney General of India.</p><p>Article 77: Deals with the conduct of government business.</p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>Vijender Singh has represented India in Olympics for how many times?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2332;&#2375;&#2306;&#2342;&#2352; &#2360;&#2367;&#2306;&#2361; &#2344;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2348;&#2366;&#2352; &#2323;&#2354;&#2306;&#2346;&#2367;&#2325; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2367;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Vijender Singh represented India in the Olympics thrice, in 2004, 2008 and 2012, winning a bronze medal in the 2008 Beijing Olympics.</p><p></p><p>2004 Athens Olympics: Vijender Singh competed as a welterweight but did not advance beyond the initial round.</p><p>2008 Beijing Olympics: He competed as a middleweight and won a bronze medal, making him the first Indian boxer to win an Olympic medal.</p><p>2012 London Olympics: He lost in the boxing quarterfinals.</p><p></p>",
    "question_index": 35
  },
  {
    "question": "<span class=\"eqt\"><p>Westerlies are: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2361;&#2357;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Permanent winds blowing from the sub polar low pressure belts to the sub tropical high pressure belts</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346; &#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344; &#2342;&#2366;&#2348; &#2346;&#2375;&#2335;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2313;&#2346;&#2379;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2313;&#2330;&#2381;&#2330; &#2342;&#2366;&#2348; &#2346;&#2375;&#2335;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2323;&#2352; &#2330;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2361;&#2357;&#2366;&#2319;&#2305;&#2404;</span>",
      "<span class=\"eqt\">Winds blowing from the equitorial low pressure belts to the sub tropical high pressure belts.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2359;&#2369;&#2357;&#2340;&#2368;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344; &#2357;&#2366;&#2351;&#2369;&#2342;&#2366;&#2348; &#2346;&#2375;&#2335;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2313;&#2346;&#2379;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2313;&#2330;&#2381;&#2330; &#2357;&#2366;&#2351;&#2369;&#2342;&#2366;&#2348; &#2346;&#2375;&#2335;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2323;&#2352; &#2348;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2361;&#2357;&#2366;&#2319;&#2305;&#2404;</span>",
      "<span class=\"eqt\">Winds blowing from the sub tropical high pressure belts to the equitorial low pressure belts.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2379;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2313;&#2330;&#2381;&#2330; &#2342;&#2348;&#2366;&#2357; &#2346;&#2375;&#2335;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2357;&#2367;&#2359;&#2369;&#2357;&#2340;&#2368;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344; &#2342;&#2348;&#2366;&#2357; &#2346;&#2375;&#2335;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2323;&#2352; &#2330;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2361;&#2357;&#2366;&#2319;&#2305;&#2404;</span>",
      "<span class=\"eqt\">Permanent winds blowing from the sub tropical high pressure belts to the sub polar low pressure belts.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2379;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2313;&#2330;&#2381;&#2330; &#2342;&#2348;&#2366;&#2357; &#2346;&#2375;&#2335;&#2367;&#2351;&#2379;&#2306; &#2360;&#2375; &#2313;&#2346; &#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344; &#2342;&#2348;&#2366;&#2357; &#2346;&#2375;&#2335;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2323;&#2352; &#2348;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2361;&#2357;&#2366;&#2319;&#2305;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Westerlies - They are the permanent winds blowing from the sub tropical high pressure belts to the sub polar low pressure belts. In the Southern hemisphere between 40&deg; to 60&deg; latitudes the winds are known as Roaring Forties, Furious Fifties, and Screaming Sixties.</p>",
    "question_index": 36
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Range comprises of Banihal Pass, Sinthal Pass, Rohtang La, Munawar Pass and Haji Pir Pass?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2350;&#2375;&#2306; &#2348;&#2344;&#2367;&#2361;&#2366;&#2354; &#2342;&#2352;&#2381;&#2352;&#2366;, &#2360;&#2367;&#2306;&#2341;&#2354; &#2342;&#2352;&#2381;&#2352;&#2366;, &#2352;&#2379;&#2361;&#2340;&#2366;&#2306;&#2327; &#2354;&#2366;, &#2350;&#2369;&#2344;&#2366;&#2357;&#2352; &#2342;&#2352;&#2381;&#2352;&#2366; &#2324;&#2352; &#2361;&#2366;&#2332;&#2368; &#2346;&#2368;&#2352; &#2342;&#2352;&#2381;&#2352;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Zanskar Range</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2364;&#2366;&#2306;&#2360;&#2381;&#2325;&#2352; &#2346;&#2352;&#2381;&#2357;&#2340; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368;</span>",
      "<span class=\"eqt\">Dhauladhar Range</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2380;&#2354;&#2366;&#2343;&#2366;&#2352; &#2346;&#2352;&#2381;&#2357;&#2340; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368;</span>",
      "<span class=\"eqt\">Pir Panjal Range</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2352; &#2346;&#2306;&#2332;&#2366;&#2354; &#2346;&#2352;&#2381;&#2357;&#2340; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368;</span>",
      "<span class=\"eqt\">East Karakoram Range</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2325;&#2366;&#2352;&#2366;&#2325;&#2379;&#2352;&#2350; &#2346;&#2352;&#2381;&#2357;&#2340; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Pir Panjal Range</b> is the largest range of the lower Himalayas and runs from the East-Southeast to west-northwest. The Pir Panjal pass lies to the west of Srinagar and comprises Banihal Pass, Sinthal Pass, Rohtang La, Munawar Pass and Haji Pir Pass.</p><p><b>Zanskar Range</b> starts from south-eastern boundaries of Kashmir and extends to the eastern limit of Baltistan. Singge La Pass, Runrang La Pass, Fotu (Fatu) La Pass, Marbal Pass and Zoji La Pass are some of the passes of this range.</p><p><b>Dhauladhar Range</b> rises from the plains of India to the north of Mandi and Kangra. Hanuman ji Ka Tiba or the 'White Mountain' is the highest peak.</p><p><b>East Karakoram Range</b> separates India from Central Asia and is also one of the larger ranges of Asia. It is home to the second highest peak of the world, K2.</p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>Damal Krishnaswamy Pattammal was a renowned Carnatic vocalist from </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;&#2368; &#2327;&#2366;&#2351;&#2367;&#2325;&#2366; &#2342;&#2350;&#2354; &#2325;&#2371;&#2359;&#2381;&#2339;&#2360;&#2381;&#2357;&#2366;&#2350;&#2368; &#2346;&#2335;&#2381;&#2335;&#2350;&#2381;&#2350;&#2366;&#2354; &#2325;&#2366; &#2332;&#2344;&#2381;&#2350; &#2325;&#2361;&#2366;&#2305; &#2361;&#2369;&#2310; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>",
      "<span class=\"eqt\">Kerala</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2352;&#2354;</span>",
      "<span class=\"eqt\">Karnataka</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;</span>",
      "<span class=\"eqt\">Andhra Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Damal Krishnaswamy Pattammal (1919-2009) was a renowned Carnatic vocalist. She was born at Kancheepuram in<b> Tamil Nadu</b>.</p><p>She received no formal training, but by the age of ten she had already given her first radio performance, followed by a public concert three years later.</p><p>Her knowledge of Muthuswami Dikshitar's compositions was considerable and she became the first woman to perform the difficult Ragam Thanam Pallavi in concerts.</p><p>She formed one-third of the 'Female trinity of Carnatic Music' along with M. S. Subbulakshmi and M. L. Vasanthakumari. These pioneering women opened doors for the initiation of women into Carnatic music.</p>",
    "question_index": 38
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is also called the industrial sector?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2349;&#2368; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Primary sector</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Secondary sector</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2343;&#2381;&#2351;&#2350;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Tertiary sector</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2371;&#2340;&#2368;&#2351;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Quaternary sector</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2340;&#2369;&#2352;&#2381;&#2341;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>secondary sector</b> covers activities in which natural products are changed into other forms through ways of manufacturing that we associate with industrial activity.</p><p>It is the next step after primary.</p><p>The product is not produced by nature but has to be made and therefore some process of manufacturing is essential.</p><p>This could be in a factory, a workshop or at home. For example, using cotton fibre from the plant, we spin yarn and weave cloth. Using sugarcane as a raw material, we make sugar or gur.</p><p>We convert earth into bricks and use bricks to make houses and buildings. Since this sector gradually became associated with the different kinds of industries that came up, it is also called the industrial sector.</p>",
    "question_index": 39
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements:</p><p>I. The word cabinet is nowhere defined in the Constitution of India.</p><p>II. Cabinet is the highest decision-making authority in India.</p><p>Which of the following statements is / are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; &#2325;&#2376;&#2348;&#2367;&#2344;&#2375;&#2335; &#2358;&#2348;&#2381;&#2342; &#2325;&#2379; &#2325;&#2361;&#2368;&#2306; &#2349;&#2368; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2376;&#2348;&#2367;&#2344;&#2375;&#2335; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366; &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I &amp; II.</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Article 352 defines the cabinet as 'the council consisting of the prime minister and other ministers of cabinet rank appointed under Article 75'.</p><p>It does not describe its powers and functions.</p><p>The role of Cabinet in our politico-administrative system is based on the conventions of parliamentary government as developed in Britain.</p><p>It is the highest decision-making authority in our politico-administrative system.</p><p>It is the chief policy formulating body of the Central government.</p><p>It is the supreme executive authority of the Central government.</p><p>Source: Skholar IAS.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>In February 2024, which state government has announced to set up a dedicated AI capital by inviting the top global and national technology companies to set up their AI Centres?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2352;&#2357;&#2352;&#2368; 2024 &#2350;&#2375;&#2306;, &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2357;&#2376;&#2358;&#2381;&#2357;&#2367;&#2325; &#2324;&#2352; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2346;&#2381;&#2352;&#2380;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2309;&#2346;&#2344;&#2375; AI &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2325;&#2375; &#2319;&#2325; &#2360;&#2350;&#2352;&#2381;&#2346;&#2367;&#2340; AI &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Karnataka</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;</span>",
      "<span class=\"eqt\">Telangana</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2375;&#2354;&#2306;&#2327;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>Telangana Government will set up a dedicated AI city in 50 acres to 100 acres.</p><p>The Government will position Hyderabad and Telangana as the AI capital of the country by inviting the top global and national technology companies to set up their AI Centres.</p>",
    "question_index": 41
  },

    "question": "<span class=\"eqt\"><p>Nuakhai is the harvest festival of Western Odisha. The festival is held the day after _________ </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2369;&#2310;&#2326;&#2366;&#2312; &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2323;&#2337;&#2367;&#2358;&#2366; &#2325;&#2366; &#2319;&#2325; &#2347;&#2360;&#2354; &#2313;&#2340;&#2381;&#2360;&#2357; &#2361;&#2376;&#2404; &#2351;&#2361; &#2340;&#2381;&#2351;&#2380;&#2361;&#2366;&#2352; _________ &#2325;&#2375; &#2309;&#2327;&#2354;&#2375; &#2342;&#2367;&#2344; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Diwali</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2357;&#2366;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Ganesh Chaturthi</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2339;&#2375;&#2358; &#2330;&#2340;&#2369;&#2352;&#2381;&#2341;&#2368;</span>",
      "<span class=\"eqt\">Krishna Janmashtami</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2381;&#2339;&#2332;&#2344;&#2381;&#2350;&#2366;&#2359;&#2381;&#2335;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Holi</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2379;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Nuakhai is the harvest festival of Western Odisha. The word nua means new and khai means food, so the name means the farmers are in possession of the newly harvested rice. The festival is seen as a new ray of hope, held the day after the Ganesh Chaturthi festival.</p>",
    "question_index": 42
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Revolt</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Personalities</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. Santhal rebellion</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Digambar Biswas and Bishnu Charan Biswas</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. Pabna revolt</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Keshab Chandra Roy</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. Indigo revolt</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Siddhu and Kanhu</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. Ulgulan revolt</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Birsa Munda</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2379; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2358;&#2326;&#2381;&#2360;&#2367;&#2351;&#2340;</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. &#2360;&#2306;&#2341;&#2366;&#2354; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2342;&#2367;&#2327;&#2306;&#2348;&#2352; &#2357;&#2367;&#2358;&#2381;&#2357;&#2366;&#2360; &#2324;&#2352; &#2357;&#2367;&#2359;&#2381;&#2339;&#2369; &#2330;&#2352;&#2339; &#2357;&#2367;&#2358;&#2381;&#2357;&#2366;&#2360;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. &#2346;&#2348;&#2344;&#2366; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2325;&#2375;&#2358;&#2348; &#2330;&#2306;&#2342;&#2381;&#2352; &#2352;&#2377;&#2351;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. &#2344;&#2368;&#2354; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2360;&#2367;&#2342;&#2381;&#2343;&#2370; &#2324;&#2352; &#2325;&#2366;&#2344;&#2381;&#2361;&#2370;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. &#2313;&#2354;&#2327;&#2369;&#2354;&#2366;&#2344; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2348;&#2367;&#2352;&#2360;&#2366; &#2350;&#2369;&#2306;&#2337;&#2366;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">I-a, II-b, III-c, IV-d</span><span class=\"hqt\" style=\"display:none\">I-a, II-b, III-c, IV-d</span>",
      "<span class=\"eqt\">I-c, II-b, III-a, IV-d</span><span class=\"hqt\" style=\"display:none\">I-c, II-b, III-a, IV-d</span>",
      "<span class=\"eqt\">I-c, II-a, III-b, IV-d</span><span class=\"hqt\" style=\"display:none\">I-c, II-a, III-b, IV-d</span>",
      "<span class=\"eqt\">I-a, II-c, III-d, IV-b</span><span class=\"hqt\" style=\"display:none\">I-a, II-c, III-d, IV-b</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>II-b: Pabna Revolt (1873-76) </p><p>Pabna Peasant Uprising was a resistance movement by the peasants against the oppression of the Zamindars by the illegal means of the forced levy, abwabs, enhanced rent and so on. It originated in the Yusufshahi pargana of Pabna in Bengal. It was led by Keshab Chandra Roy. Everywhere agrarian leagues were organized. The main form of struggle was that of legal resistance. There was very little violence.</p><p>III-a: Indigo Revolt (1859-60) </p><p>The Bengal indigo cultivators strike was the most militant and widespread peasant uprisings. The European indigo planters compelled the tenant farmers to grow indigo at terms highly disadvantageous to the farmers. The tenant farmer was forced to sell it cheap to the planter and accepted advances from the planter that benefitted the latter. Led by Digambar Biswas and Bishnu Charan Biswas, the ryots of Nadia district gave up indigo cultivation in September 1859.The Government set up an indigo commission in 1860 whose recommendations formed part of the Act VI of 1862. The newspaper, Hindu Patriot brought to light the misery of the cultivators several times. Dinabandhu Mitra wrote a drama, Nil-Darpan, in Bengali with a view to draw the attention of the people and the government towards the misery of the indigo-cultivators.</p><p>I-c: The Santhal Rebellion (1855-56) </p><p>The first revolt which can be regarded as peasants' revolt was the Santhal Rebellion in 1855-56. The land near the hills of Rajmahal in Bihar was cultivated by the Santhals. The landlords and money-lenders from the cities took advantage of their ignorance and began grabbing their lands. This created bitter resentment among them leading to their armed uprising in 1855. Consequently, under the belief of a divine order, around 10,000 Santals gathered under two Santhal brothers, Siddhu and Kanhu, to free their country of the foreign oppressors and set up a government of their own the movement was put down with a heavy hand. The government declared the Parganas inhabited by them as Santhal Parganas so that their lands and identity could be safeguarded from external encroachments.</p><p>IV-d: Munda Revolt (Ulgulan) (1899-1900)</p><p>In 1899-1900, the Mundas in the region south of Ranchi rose under Birsa Munda. The Ulgulan was one of the most significant tribal uprisings in the period 1860-1920. The rebellion which began as a religious movement gathered political force to fight against introduction of feudal, zamindari tenures, and exploitation by money-lenders and forest contractors. The Mundas claimed Chhotanagpur as their area in 1879. British armed forces were then deployed. Birsa was captured and imprisoned.</p>",
    "question_index": 43
  },
  {
    "question": "<span class=\"eqt\"><p>In July 2024, who among the following was honoured with the Gandhi Mandela Award 2020?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2369;&#2354;&#2366;&#2312; 2024 &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2327;&#2366;&#2306;&#2343;&#2368; &#2350;&#2306;&#2337;&#2375;&#2354;&#2366; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; 2020 &#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Jody Williams</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2379;&#2337;&#2368; &#2357;&#2367;&#2354;&#2367;&#2351;&#2350;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Rigoberta Menchu Tum</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2327;&#2379;&#2348;&#2352;&#2381;&#2335;&#2366; &#2350;&#2375;&#2344;&#2381;&#2330;&#2370; &#2340;&#2369;&#2350;</span>",
      "<span class=\"eqt\">Shirin Ebadi</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2352;&#2367;&#2344; &#2319;&#2348;&#2366;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Wangari Maathai</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2306;&#2327;&#2366;&#2352;&#2368; &#2350;&#2341;&#2366;&#2312;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Nobel Peace Prize laureate Rigoberta Menchu Tum has been honoured with the Gandhi Mandela Award 2020. This prestigious award was presented to her on the 106th birth anniversary of Nelson Mandela.</p><p></p><p>According to the Gandhi Mandela Foundation, this award honours individuals who advance peace, harmony, and the principles championed by both Gandhi and Mandela, including community service and social development. The Dalai Lama was honoured with this esteemed award in 2019.</p><p></p><p>Rigoberta Menchu Tum, a K'iche' Guatemalan human rights activist, feminist, and Nobel Peace Prize laureate, has dedicated her life to advocating for the rights of Indigenous peoples in Guatemala and advancing Indigenous rights on a global scale. Born on January 9, 1959, into a poor Indian peasant family within the Quiche branch of Maya culture, Rigoberta's early years were characterised by both hardship and resilience.</p>",
    "question_index": 44
  },
  {
    "question": "<span class=\"eqt\"><p>Vakpati Munja and Bhojadeva were the most famous rulers of ______ dynasty.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2325;&#2381;&#2346;&#2340;&#2367; &#2350;&#2369;&#2306;&#2332; &#2324;&#2352; &#2349;&#2379;&#2332;&#2342;&#2375;&#2357; ______ &#2357;&#2306;&#2358; &#2325;&#2375; &#2360;&#2348;&#2360;&#2375; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2358;&#2366;&#2360;&#2325; &#2341;&#2375;&#2404;</p></span>",
    "options": [

    "correct_option_id": 3,
    "solution": "<p>The Paramaras ruled over a vast territory around Malwa for 400 years from the 9th to the 13th centuries. Vakpati Munja and Bhojadeva were the most famous rulers of this dynasty.</p><p>Munja was a great general, a poet of repute and a great patron of art and literature.</p><p>His court was adorned by poets like Dhananjaya, Halayudha, Dhanika, Padmagupta, the author of Navasahasankacharita, Amitagati, etc.</p><p>He excavated the Munja Sagar at Dhar and Mandu and built beautiful temples at a number of places.</p><p></p><p></p>",

    "question": "<span class=\"eqt\"><p>De-licensing is the most important aspect of _______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2337;&#2368;-&#2354;&#2366;&#2311;&#2360;&#2375;&#2306;&#2360;&#2367;&#2306;&#2327; _______ &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2361;&#2354;&#2370; &#2361;&#2376;&#2404;</p></span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Liberalisation</b> is a process of change in economic policy. It has been the hallmark of economic policy throughout the world.</p><p>&#183; This policy deals with doing away with the earlier licensing and the registration system providing the freedom to the private sector to set up industries.</p><p>&#183; De-licensing is the most important aspect of the policy of liberalization.</p><p>&#183; The main aim of the liberalisation was to dismantle the excessive regulatory framework that curtailed the freedom of enterprise.</p><p>&#183; The major purpose of liberalisation was to free the large private corporate sector from bureaucratic controls.</p>",

    "question": "<span class=\"eqt\"><p>In the given figure, C is the centre of the circle. If &#8736;ABD = 38&deg; and &#8736;AGF = 134&deg;, then what is the value of &#8736;DEF?</p><p><img width=271 height=257 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12349/image023.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, C &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736;ABD = 38&deg; &#2324;&#2352; &#8736;AGF = 134&deg; &#2361;&#2376;, &#2340;&#2379; &#8736;DEF &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p><p><img width=\"271\" height=\"257\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12349/image023.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">40&deg;</span><span class=\"hqt\" style=\"display:none\">40&deg;</span>",
      "<span class=\"eqt\">80&deg;</span><span class=\"hqt\" style=\"display:none\">80&deg;</span>",
      "<span class=\"eqt\">50&deg;</span><span class=\"hqt\" style=\"display:none\">50&deg;</span>",
      "<span class=\"eqt\">60&deg;</span><span class=\"hqt\" style=\"display:none\">60&deg;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Given that, &#8736;ABD = 38&deg; and &#8736;AGF = 134&deg;</p><p>Since, quadrilateral AGFD is cyclic.</p><p>So, &#8736;ADF = 180&deg; - &#8736;AGF = 180&deg; - 134&deg; = 46&deg;</p><p>And in &#8710;ABD,</p><p>&#8736;BAD = 180&deg; - &#8736;ABD - &#8736;ADB = 180  -  38  -  46 = 96&deg;</p><p>So, &#8736;DFG = 180&deg; - &#8736;BAD = 180  -  96 = 84&deg;</p><p>Thus, in &#8710;DEF,</p><p>&#8736;DEF = 180 - &#8736;EFD - &#8736;FDE = 180  -  84  -  46 = 50&deg;</p>",
    "question_index": 50
  },

    "question": "<span class=\"eqt\"><p>If the ratio of an external angle and an internal angle of a regular polygon is 2:15 then the number of sides of the regular polygon is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2360;&#2350;&#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2375; &#2348;&#2366;&#2361;&#2381;&#2351; &#2325;&#2379;&#2339; &#2324;&#2352; &#2310;&#2306;&#2340;&#2352;&#2367;&#2325; &#2325;&#2379;&#2339; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2:15 &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2348;&#2361;&#2369;&#2349;&#2369;&#2332; &#2325;&#2375; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">17</span><span class=\"hqt\" style=\"display:none\">17</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>We know that the sum of an external angle and an internal angle always equals to 180&deg;.</p><p>Given,</p><p>17 units = 180&deg;</p><p>2 units = 360/17&deg;</p><p>Each external angle = 360/17&deg;</p><p>Number of sides = 360&deg;/each external angle = 360/(360/17) = 17</p><p></p>",
    "question_index": 52

    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct?</p><p>I: A ship can travel 240 km in downstream in 20 hours and it takes 21 hours to cover 168 km in upstream. The time taken by the ship to cover 150 km in still water is 16 hours.</p><p>II: A train 315 meters long crosses a cycle which is running in the opposite direction at 6 km/h in 54 seconds. The speed of the train is 16 km/h?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I: &#2319;&#2325; &#2332;&#2361;&#2366;&#2332; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 240 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 20 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 168 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2313;&#2360;&#2375; 21 &#2328;&#2306;&#2335;&#2375; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2332;&#2361;&#2366;&#2332; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 150 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 16 &#2328;&#2306;&#2335;&#2375; &#2325;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II: 315 &#2350;&#2368;&#2335;&#2352; &#2354;&#2306;&#2348;&#2368; &#2319;&#2325; &#2335;&#2381;&#2352;&#2375;&#2344; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; 6 km/h &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2330;&#2354; &#2352;&#2361;&#2368; &#2319;&#2325; &#2360;&#2366;&#2311;&#2325;&#2367;&#2354; &#2325;&#2379; 54 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2346;&#2366;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2335;&#2381;&#2352;&#2375;&#2344; &#2325;&#2368; &#2330;&#2366;&#2354; 16 km/h &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Statement I:</p><p>Downstream speed of the ship = 240/20 = 12 km/h</p><p>and upstream speed of the ship = 168/21 = 8 km/h</p><p>Speed of ship in still water = (12 + 8)/2 = 10 km/h</p><p>So, required time = 150/10 = 15 hours</p><p>Hence, statement I is not correct.</p><p>Statement II:</p><p>Speed of the cycle = 6 km/h = 6 * 5/18 = 5/3 m/s</p><p>Let speed of the train = u m/s</p><p>Length of the train = 315 meters</p><p>According to the question,</p><p>315 /(u + 5/3) = 54</p><p>=&gt; 315/54 = u + 5/3</p><p>=&gt; u = 35/6  -  5/3</p><p>=&gt; u = 25/6 m/s = 25/6 * 18/5 = 15 km/h</p><p>Hence, statement II is not correct.</p>",
