<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cgl1 - Responsive Exam Interface</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="60">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Choose the alternative which most closely resembles the water image of the given figure.</p><p><img width=374 height=47 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24748/image005.png\"></p><p><img width=458 height=219 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24748/image006.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2368; &#2332;&#2354; &#2331;&#2357;&#2367; &#2360;&#2375; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2350;&#2367;&#2354;&#2340;&#2366; &#2332;&#2369;&#2354;&#2340;&#2366; &#2361;&#2379;&#2404;</p><p><img width=374 height=47 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24748/image005.png\"></p><p><img width=458 height=219 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24748/image006.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The water image is  - </p><p><img width=433 height=123 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24748/image007.png\"></p><p>Thus, the answer is option (d).</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Select the figure from among the given options that can replace the question mark (?) in the following series.</p><p><img width=617 height=105 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26524/image011.jpg\"></p><p><img width=184 height=548 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26524/image012.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p><img width=617 height=105 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26524/image011.jpg\"></p><p><img width=184 height=548 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26524/image012.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The figure which was drawn outside in the first step is later drawn inside in the second step and then a new figure is drawn outside in the second step.</p><p>The alphabet is shifting its position in a clockwise direction from corner to corner.</p><p>Also, the logic of the alphabet-</p><p>R + 2 = T + 2 = V + 2 = X + 2 = Z + 2 = <b>B</b></p><p>So, following this logic, option figure (III) will replace the question mark-</p><p><img width=235 height=175 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26524/image013.png\"></p><p>Option figure (I) is incorrect because the position of the letter is wrong and also the letter according to the alphabetical series is wrong.</p><p>Option figure (II) is incorrect because the outside figure of the previous step is drawn outside only.</p><p>Option figure (IV) is incorrect because the outside figure of the previous step is drawn outside only and the letter according to the alphabetical series is wrong.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'PICTURE' is written as '5-9-21-3-16-18-20', 'MARKER' is written as '1-5-11-13-18-18'. How will 'JACKET' be written in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'PICTURE' &#2325;&#2379; '5-9-21-3-16-18-20' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, 'MARKER' &#2325;&#2379; '1-5-11-13-18-18' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'JACKET' &#2325;&#2379; &#2325;&#2376;&#2360;&#2375; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1-5-3-10-21-20</span><span class=\"hqt\" style=\"display:none\">1-5-3-10-21-20</span>",
      "<span class=\"eqt\">1-5-3-10-12-20<b> </b></span><span class=\"hqt\" style=\"display:none\">1-5-3-10-12-20<b> </b></span>",
      "<span class=\"eqt\">1-5-3-12-21-20</span><span class=\"hqt\" style=\"display:none\">1-5-3-12-21-20</span>",
      "<span class=\"eqt\">1-5-3-10-11-20</span><span class=\"hqt\" style=\"display:none\">1-5-3-10-11-20</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In this, the position of vowels is followed by the position of consonants according to the English alphabetical order within a word. </p><p>PICTURE ---- EIUCPRT ---- 5-9-21-3-16-18-20</p><p>MARKER ---- AEKMRR ---- 1-5-11-13-18-18</p><p>Similarly, </p><p>JACKET ---- AECJKT ---- 1-5-3-10-11-20</p><p>So, option (d) is the correct answer. </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>How many meaningful English words can be formed from A D E and R using each letter mandatorily but only once in each word?</p></span><span class=\"hqt\" style=\"display:none\"><p>ADE &#2324;&#2352; R &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2366;&#2352;&#2381;&#2341;&#2325; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2358;&#2348;&#2381;&#2342; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2366; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2354;&#2375;&#2325;&#2367;&#2344; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2358;&#2348;&#2381;&#2342; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2348;&#2366;&#2352; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2379;?</p></span>",
    "options": [
      "<span class=\"eqt\">One</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;</span>",
      "<span class=\"eqt\">Three<b> </b></span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;<b> </b></span>",
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>",
      "<span class=\"eqt\">More than three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The meaningful words formed are:</p><p>DARE: to have enough courage to do something</p><p>DEAR: used at the beginning of a letter before the name or title of the person you are writing to</p><p>READ: to look at words or symbols and understand them</p><p>So, three meaningful words are formed. </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>How many alphabet positions will not change if the letters in the word 'TAGLINE' are arranged in alphabetical order from left to right?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2358;&#2348;&#2381;&#2342; 'TAGLINE' &#2350;&#2375;&#2306; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2379; &#2348;&#2366;&#2319;&#2306; &#2360;&#2375; &#2342;&#2366;&#2319;&#2306; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2344;&#2361;&#2368;&#2306; &#2348;&#2342;&#2354;&#2375;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">None</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>",
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>",
      "<span class=\"eqt\">More than four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given word is TAGLINE.</p><p>If all letters are arranged in alphabetical order from left to right, then we get:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Original letters</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>G</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">L</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>N</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Alphabetical order</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>G</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">L</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>N</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td></tr></table><p>So, the position of 2 letters will remain not changed.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If A+B means A is the father of B, A*B means B is the brother of A, A-B means B is the son of A, A&div;B means B is the mother of A. Then in the relation \"K * J &div; A * G  -  L + I\", how is G related to I ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A+B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; A, B &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;, A*B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; B, A &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;, A-B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; B, A &#2325;&#2366; &#2348;&#2375;&#2335;&#2366; &#2361;&#2376;, A&div;B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; B, A &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;| &#2347;&#2367;&#2352; \"K * J &div; A * G - L + I\" &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, G, I &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Father</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Uncle</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2330;&#2366;/&#2350;&#2366;&#2350;&#2366;/&#2350;&#2380;&#2360;&#2366;/&#2340;&#2366;&#2314;/&#2347;&#2370;&#2347;&#2366;</span>",
      "<span class=\"eqt\">Grandfather</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2366;&#2342;&#2366;/&#2344;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Nephew</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2340;&#2368;&#2332;&#2366;/&#2349;&#2366;&#2306;&#2332;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>From the given information,</p><p>G is the grandfather of I.</p><p><img width=180 height=136 id=\"Picture 71\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p934/image040.jpg\"><b> </b><img width=240 height=177 id=\"Picture 72\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p934/image035.jpg\"></p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option figure in which the given figure is embedded. (Rotation is not allowed)</p><p><img width=624 height=304 id=\"Drawing 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19347/image011.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2309;&#2306;&#2340;&#2352;&#2381;&#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404; (&#2328;&#2370;&#2352;&#2381;&#2339;&#2344; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;)</p><p><img width=\"624\" height=\"304\" id=\"Drawing 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19347/image011.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The given figure is embedded in option figure <b>I</b>.</p><p><img width=170 height=171 id=\"Drawing 11\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19347/image012.jpg\"></p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following numbers will replace the question mark(?) in the given series?</p><p>142 146 154 170 ? 266</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344;(?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2375;&#2327;&#2368;?</p><p>142 146 154 170 ? 266</p></span>",

    "question": "<span class=\"eqt\"><p>Under which Article of the Indian Constitution is the distribution of tax revenues between the Union and the States outlined?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2375; &#2340;&#2361;&#2340; &#2360;&#2306;&#2328; &#2324;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2352; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2325;&#2366; &#2357;&#2367;&#2340;&#2352;&#2339; &#2313;&#2354;&#2381;&#2354;&#2367;&#2326;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 268</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 268</span>",
      "<span class=\"eqt\">Article 280</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 280</span>",
      "<span class=\"eqt\">Article 270</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 270</span>",
      "<span class=\"eqt\">Article 246</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 246</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; <b>Article 270 of the Constitution details the sharing of tax revenues between the Union and the States. </b></p><p>&#9675; It <b>addresses taxes that are levied by the Union but shared with the States based on the recommendations of the Finance Commission.</b></p><p>&bull; Article 268 deals with duties levied by the Union but collected and appropriated by the States.</p><p>&bull; <b>Article 280 relates to the Finance Commission,</b> which recommends the distribution of revenues.</p><p>&bull; Article 246 defines the legislative powers between the Union and State governments.</p><p><b>Further Insight:</b></p><p>Part XII of Constitution of India - Finance, Property, Contracts and Suits</p><p>&#9675; <b>Article 265 </b>- No tax shall be levied or collected except by authority of law.</p><p>&#9675; <b>Article 266</b> - Consolidated Funds and public accounts of India and of the States.</p><p>&#9675; <b>Article 267 </b>- Contingency Fund.</p><p>&bull; Distribution of Revenues between the Union and the States</p><p>&#9675; Article 268 - Duties levied by the Union but collected and appropriated by the States.</p><p>&#9675; Article 269 - Taxes levied and collected by the Union but assigned to the States.</p><p>&#9675; Article 269A - Levy and collection of goods and services tax in course of inter-State trade or commerce.</p><p>&#9675; Article 270 - Taxes levied and distributed between the Union and the States.</p><p>&#9675; Article 275 - Grants from the Union to certain States.</p><p>&#9675; Article 279A - Goods and Services Tax Council.</p><p>&#9675; Article 280 - Finance Commission.</p><p>&#9675; Article 281 - Recommendations of the Finance Commission.</p>",
    "question_index": 25
  },

    "question": "<span class=\"eqt\"><p>Which of the following awards is given by the government of Madhya Pradesh to recognize outstanding achievements in the arts?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2343;&#2381;&#2351; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2360;&#2352;&#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2354;&#2366; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2325;&#2371;&#2359;&#2381;&#2335; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The Kalidas Samman is an annual award given by the Madhya Pradesh government to recognize outstanding achievements in the arts. </p><p>&#183; It is named after the renowned Sanskrit poet Kalidasa. </p><p>&#183; The Kalidas Samman was first awarded in 1980. </p><p>&#183; It was initially conferred in alternate years in four fields: Classical Music, Classical Dance, Theatre and Plastic Arts. </p><p>&#183; From 1986-87 to 2008-09, the awards were presented in all four fields in most years, thereafter reverting to one person per year.</p>",

    ],
    "correct_option_id": 1,
    "solution": "<p>The results of the 2011 census reveal that there has been an increase in literacy in the country. The literacy rate in the country is 74.04 per cent, 82.14 for males and 65.46 for females.</p><p>Bihar with a literacy rate of 63.82 per cent ranked last in the country, preceded by Arunachal Pradesh (66.95 per cent) and Rajasthan (67.06 per cent).</p><p>Kerala retained its position by being on top with a 93.91 percent literacy rate, closely followed by Lakshadweep (92.28 per cent) and Mizoram (91.58 per cent).</p><p></p>",

    "question": "<span class=\"eqt\"><p>Which soil type is predominant in the Ganges Delta region?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2306;&#2327;&#2366; &#2337;&#2375;&#2354;&#2381;&#2335;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2368; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Alluvial soil</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2354;&#2379;&#2338;&#2364; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Black soil</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2354;&#2368; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Red soil</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368;</span>",
      "<span class=\"eqt\">Laterite soil</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2376;&#2335;&#2375;&#2352;&#2366;&#2311;&#2335; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; The Ganges Delta is formed by rich <b>alluvial deposits</b> from the Ganges and Brahmaputra rivers.</p><p>&#183; Alluvial soils here are fertile, supporting crops like rice, jute and sugarcane.</p><p>&#183; They consist of silt, sand and clay deposited over millennia.</p><p>&#183; Black soil (regur) is characteristic of the Deccan Plateau, not the delta.</p><p>&#183; Red soil occurs in parts of the peninsular plateau, not the Ganges Delta.</p><p>&#183; Laterite soils form in high-rainfall tropical regions like the Western Ghats, not in the delta plains.</p>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>In cricket, what does the term \"Duck\" refer to? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2350;&#2375;&#2306; \"&#2337;&#2325;\" &#2358;&#2348;&#2381;&#2342; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">When a batsman gets out without scoring a run</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2348; &#2325;&#2379;&#2312; &#2348;&#2354;&#2381;&#2354;&#2375;&#2348;&#2366;&#2332; &#2348;&#2367;&#2344;&#2366; &#2352;&#2344; &#2348;&#2344;&#2366;&#2319; &#2310;&#2313;&#2335; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A defensive shot played with soft hands</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2350; &#2361;&#2366;&#2341;&#2379;&#2306; &#2360;&#2375; &#2326;&#2375;&#2354;&#2366; &#2327;&#2351;&#2366; &#2352;&#2325;&#2381;&#2359;&#2366;&#2340;&#2381;&#2350;&#2325; &#2358;&#2377;&#2335;</span>",
      "<span class=\"eqt\">A delivery that hits the batsman's leg before the stumps</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2361; &#2327;&#2375;&#2306;&#2342; &#2332;&#2379; &#2360;&#2381;&#2335;&#2306;&#2346; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2348;&#2354;&#2381;&#2354;&#2375;&#2348;&#2366;&#2332; &#2325;&#2375; &#2346;&#2376;&#2352; &#2346;&#2352; &#2354;&#2327;&#2340;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A shot that crosses the boundary without touching the ground</span><span class=\"hqt\" style=\"display:none\">&#2320;&#2360;&#2366; &#2358;&#2377;&#2335; &#2332;&#2379; &#2332;&#2364;&#2350;&#2368;&#2344; &#2325;&#2379; &#2331;&#2369;&#2319; &#2348;&#2367;&#2344;&#2366; &#2360;&#2368;&#2350;&#2366; &#2346;&#2366;&#2352; &#2325;&#2352; &#2332;&#2366;&#2319;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Duck refers to when a batsman gets out without scoring any runs. </p><p>&bull; Block or defensive shot: A defensive shot played with soft hands</p><p>&bull; LBW (Leg Before Wicket): A delivery that hits the batsman's leg before the stumps </p><p>&bull; A shot crossing the boundary without touching the ground is called a \"six.\" </p><p><b>Further Insight:</b></p><p>&bull; <b>Cricket Important Terminologies:</b> </p><p>&#9675; <b>LBW (Leg Before Wicket)</b>  -  A way of getting out. </p><p>&#9675; <b>Yorker</b>  -  A ball pitched right at the batsman's feet. </p><p>&#9675; <b>Duck</b>  -  When a batsman gets out without scoring a run. </p><p>&#9675; <b>Bouncer</b>  -  A short-pitched ball that bounces at chest or head height. </p><p>&#9675; <b>Sledging</b>  -  Verbal taunting between players. </p><p>&#9675; <b>Cover Drive</b>  -  A classic shot played on the off side. </p>",
    "question_index": 34
  },

    "question": "<span class=\"eqt\"><p>Which tax replaced the central excise duty and service tax in India from July 1, 2017?</p></span><span class=\"hqt\" style=\"display:none\"><p>1 &#2332;&#2369;&#2354;&#2366;&#2312; 2017 &#2360;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2358;&#2369;&#2354;&#2381;&#2325; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366; &#2325;&#2352; &#2325;&#2368; &#2332;&#2327;&#2361; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2352; &#2354;&#2366;&#2327;&#2370; &#2361;&#2379; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Goods and Services Tax</span><span class=\"hqt\" style=\"display:none\">Goods and Services Tax</span>",
      "<span class=\"eqt\">Value Added Tax</span><span class=\"hqt\" style=\"display:none\">Value Added Tax</span>",
      "<span class=\"eqt\">Customs Duty</span><span class=\"hqt\" style=\"display:none\">Customs Duty</span>",
      "<span class=\"eqt\">Securities Transaction Tax</span><span class=\"hqt\" style=\"display:none\">Securities Transaction Tax</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Goods and Services Tax</b> is a comprehensive indirect tax levied on the supply of goods and services across India.</p><p>&#183; GST subsumed central excise duty, service tax, and several state taxes like VAT and entry tax.</p><p>&#183; It is a destination-based tax and credited to the state where consumption occurs.</p><p>&#183; GST was implemented on July 1, 2017, following the 101st Constitutional Amendment Act.</p><p>&#183; Revenue under GST is shared between the central and state governments as per GST Council decisions.</p><p>&#183; Value Added Tax (option b) was a state-level tax on the sale of goods, later subsumed by GST.</p><p>&#183; Customs Duty (option c) continues to apply to imports and exports and was not replaced by GST.</p><p>&#183; Securities Transaction Tax (option d) is levied on trading of securities and remains a separate tax.</p>",
    "question_index": 35
  },

    "question": "<span class=\"eqt\"><p>When was the PM-KUSUM scheme launched?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2368;&#2319;&#2350;-&#2325;&#2369;&#2360;&#2369;&#2350; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2348; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",

      "<span class=\"eqt\">2018</span><span class=\"hqt\" style=\"display:none\">2018</span>",
      "<span class=\"eqt\">2019</span><span class=\"hqt\" style=\"display:none\">2019</span>",
      "<span class=\"eqt\">2017</span><span class=\"hqt\" style=\"display:none\">2017</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Launched in <b>2019</b>, Pradhan Mantri Kisan Urja Suraksha evam Utthaan Mahabhiyan(PM-KUSUM) aimed at adding solar capacity of 30,800 MW by 2022 with total central financial support of Rs 34,422 crore, including service charges to the implementing agencies. Ministry of New and Renewable Energy (MNRE) has launched the PM- KUSUM Scheme</p><p>&bull; The scheme aims to add solar capacity of 30,800 MW by 2022 with total central financial support of Rs. 34,422 Crore including service charges to the implementing agencies.</p><p>&bull; The Scheme consists of three components:</p><p>&#9675; Component A: 10,000 MW of solar capacity through installation of small Solar Power Plants of individual plants of capacity upto 2 MW.</p><p>&#9675; Component B: Installation of 20 lakh standalone Solar Powered Agriculture Pumps.</p><p>&#9675; Component C: Solarisation of 15 Lakh Grid-connected Agriculture Pumps.</p>",

    "question": "<span class=\"eqt\"><p>Consider the Following Statement.</p><p>I. Joint Meeting is Conducted by President as per Article 108.</p><p>II. The Bill is deadlock after the Six Months.</p><p>III. Chairperson of the Joint Sitting is Mandatorily Deputy Chairperson of Rajya Sabha.</p><p>Which of the following is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>I. &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 108 &#2325;&#2375; &#2340;&#2361;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2348;&#2376;&#2336;&#2325; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2331;&#2361; &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2327;&#2340;&#2367;&#2352;&#2379;&#2343; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2361;&#2369;&#2310; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>III. &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2348;&#2376;&#2336;&#2325; &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2349;&#2366; &#2325;&#2375; &#2313;&#2346;&#2360;&#2349;&#2366;&#2346;&#2340;&#2367; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III</span><span class=\"hqt\" style=\"display:none\">II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In accordance with <b>Article 108 </b>of the Indian Constitution, the President of India convenes the joint session of the Parliament, <b>which is presided over by the Speaker of the Lok Sabha </b>or, in their absence, the Deputy Speaker of the Lok Sabha or, <b>in their absence, the Deputy Chairman of the Rajya Sabha.</b></p><p>Hence, it's not mandatory for the Deputy Chairperson of Rajya Sabha to chair the joint sitting.</p>",

  },

    "question": "<span class=\"eqt\"><p>Which of the following books is authored by Dr. B.R. Ambedkar and focuses on the issue of caste-based discrimination? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2337;&#2377;. &#2348;&#2368;.&#2310;&#2352;. &#2309;&#2306;&#2348;&#2375;&#2337;&#2325;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2326;&#2368; &#2327;&#2312; &#2361;&#2376; &#2324;&#2352; &#2332;&#2366;&#2340;&#2367;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2349;&#2375;&#2342;&#2349;&#2366;&#2357; &#2325;&#2375; &#2350;&#2369;&#2342;&#2381;&#2342;&#2375; &#2346;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">Hind Swaraj</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2306;&#2342; &#2360;&#2381;&#2357;&#2352;&#2366;&#2332;</span>",
      "<span class=\"eqt\">India Wins Freedom</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2379; &#2350;&#2367;&#2354;&#2368; &#2310;&#2332;&#2364;&#2366;&#2342;&#2368;</span>",
      "<span class=\"eqt\">Why I am an Atheist</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2306; &#2344;&#2366;&#2360;&#2381;&#2340;&#2367;&#2325; &#2325;&#2381;&#2351;&#2379;&#2306; &#2361;&#2370;&#2305;?</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; Annihilation of Caste was written by Dr. B.R. Ambedkar, attacking the caste system and calling for its eradication. </p><p>&bull; Hind Swaraj, was written by Mahatma Gandhi. </p><p>&bull; India Wins Freedom is authored by Maulana Abul Kalam Azad. </p><p>&bull; Why I am an Atheist was written by Bhagat Singh. </p><p><b>Further Insight:</b></p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Books</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Authors</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>War of Indian Independence</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Veer Savarkar</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Geetanjali</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rabindranath Tagore</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Home and The World</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rabindranath Tagore</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Gora</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rabindranath Tagore</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Neel Darpan</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Dinbandhu Mitra</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Karmyogi</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Swami Vivekananda</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Savitri</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sri Aurobindo</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Commonweal</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Annie Besant</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>New India</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Annie Besant</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Indian Struggle</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Subhash Chandra Bose</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Samvad Kaumudi</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Raja Ram Mohan Roy</td></tr></table>",
    "question_index": 39
  },

    "question": "<span class=\"eqt\"><p>\"Thangka\" painting is a traditional Buddhist art form primarily associated with which Indian state/region?</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2341;&#2366;&#2306;&#2327;&#2325;&#2366;\" &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2354;&#2366; &#2319;&#2325; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2348;&#2380;&#2342;&#2381;&#2343; &#2325;&#2354;&#2366; &#2352;&#2370;&#2346; &#2361;&#2376; &#2332;&#2379; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2367;&#2360; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351;/&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sikkim</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2325;&#2381;&#2325;&#2367;&#2350;</span>",
      "<span class=\"eqt\">Ladakh</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2342;&#2381;&#2342;&#2366;&#2326;</span>",
      "<span class=\"eqt\">Arunachal Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>All of the above</b> regions are associated with Thangka painting.</p><p>Thangka paintings are traditional Buddhist scroll paintings practiced in the Himalayan regions of India including Sikkim, Ladakh, and Arunachal Pradesh. These detailed paintings usually depict Buddhist deities, mandalas, or important scenes from Buddhist teachings.</p>",

  },

      "<span class=\"eqt\">Archimedes Principle</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2325;&#2367;&#2350;&#2367;&#2337;&#2368;&#2332; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; The phenomenon of scattering of light by particles in a colloid or suspension, which makes the path of the light visible is called the Tyndall effect.</p><p>Further Insight:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Name of the Law/Phenomenon</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Scientist Who Discovered</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Definition</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Tyndall Effect</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">John Tyndall</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Scattering of light by very small particles suspended in a gas or liquid.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Kepler's Law</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Johannes Kepler</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Each planet revolves around the Sun in an elliptical orbit; equal areas are swept in equal intervals; the squares of the orbital periods are proportional to the cubes of their mean distances from the Sun.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Pascal's Law</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Blaise Pascal</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">When pressure is applied to a fluid, the pressure change is transmitted throughout the fluid without loss.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Archimedes Principle</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Archimedes</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A body immersed in a fluid experiences an upward thrust equal to the weight of the fluid displaced.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5. Avogadro's Law</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Amedeo Avogadro</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Equal volumes of gases contain equal numbers of molecules at the same temperature and pressure.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6. Ohm's Law</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Georg Simon Ohm</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Current through a conductor is directly proportional to the voltage across it, assuming temperature remains constant.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7. Newton's Law of Gravitation</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Isaac Newton</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Objects attract each other with a force proportional to the product of their masses and inversely proportional to the square of the distance between them.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8. Coulomb's Law</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Charles-Augustin de Coulomb</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The force between two electric charges is inversely proportional to the square of the distance between them.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9. Bernoulli's Principle</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Daniel Bernoulli</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">As the speed of a moving fluid increases, the pressure within the fluid decreases.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">10. Hooke's Law</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Robert Hooke</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The extension of a spring is proportional to the tension applied to it, within the elastic limit.</td></tr></table>",
    "question_index": 41
  },

    "question": "<span class=\"eqt\"><p>Who was the last ruler of the Mauryan dynasty?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2380;&#2352;&#2381;&#2351; &#2357;&#2306;&#2358; &#2325;&#2366; &#2309;&#2306;&#2340;&#2367;&#2350; &#2358;&#2366;&#2360;&#2325; &#2325;&#2380;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ashoka</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2358;&#2379;&#2325;</span>",
      "<span class=\"eqt\">Bindusara</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2344;&#2381;&#2342;&#2369;&#2360;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Brihadratha</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2371;&#2361;&#2342;&#2381;&#2352;&#2341;</span>",
      "<span class=\"eqt\">Chandragupta Maurya</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2344;&#2381;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; &#2350;&#2380;&#2352;&#2381;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Option C</b> is correct because <b>Emperor Brihadratha</b> was assassinated by Pushyamitra Shunga in 185 BCE, ending Mauryan rule.</p><p>&#183; His reign saw decentralization and weakening of central authority.</p><p>&#183; His overthrow marked the transition to the Shunga dynasty.</p><p>&#183; Option A is incorrect: Ashoka was the third Mauryan emperor.</p><p>&#183; Option B is incorrect: Bindusara was the second Mauryan emperor.</p><p>&#183; Option D is incorrect: Chandragupta Maurya was the dynasty's founder.</p>",
    "question_index": 42
  },

    "question": "<span class=\"eqt\"><p>In February 2024, which state government has launched the Swayam Yojana to provide interest-free bank loans of up to Rs 1 lakh to budding entrepreneurs aged 18-35 years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2352;&#2357;&#2352;&#2368; 2024 &#2350;&#2375;&#2306;, &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; 18-35 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2375; &#2344;&#2357;&#2379;&#2342;&#2367;&#2340; &#2313;&#2342;&#2381;&#2351;&#2350;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; 1 &#2354;&#2366;&#2326; &#2352;&#2369;&#2346;&#2351;&#2375; &#2340;&#2325; &#2325;&#2366; &#2348;&#2381;&#2351;&#2366;&#2332; &#2350;&#2369;&#2325;&#2381;&#2340; &#2348;&#2376;&#2306;&#2325; &#2315;&#2339; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; '&#2360;&#2381;&#2357;&#2351;&#2306;' &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2368; &#2358;&#2369;&#2352;&#2370;&#2310;&#2340; &#2325;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bihar</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2361;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Maharashtra</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Madhya Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Odisha</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2358;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Government of Odisha has launched the Odisha Swayam Yojana 2024. The initiative provides interest-free bank loans of up to Rs 1 lakh to budding entrepreneurs aged 18-35 years (or 18-40 years for special categories) - to help them start new businesses. This is in suit with the Pradhan Mantri MUDRA Yojana (PMMY), which was launched nationally in April 2015 and allows non-corporate, non-farm small/micro enterprises to borrow up to ten lakh rupees.</p>",
    "question_index": 43

    "question": "<span class=\"eqt\"><p>In a redox reaction, oxidation involves the loss of ________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2375;&#2337;&#2377;&#2325;&#2381;&#2360; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2321;&#2325;&#2381;&#2360;&#2368;&#2325;&#2352;&#2339; &#2360;&#2375; ________ &#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Electrons</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Protons</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Neutrons</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344;</span>",
      "<span class=\"eqt\">Atoms</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2350;&#2366;&#2339;&#2369;&#2323;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Option A (electrons) correctly defines oxidation in chemical terms.</b></p><p>&#183; Loss of electrons increases the oxidation state of an element.</p><p>&#183; Oxidation and reduction always occur simultaneously in redox pairs.</p><p>&#183; Common examples include metal corrosion and combustion processes.</p><p>&#183; Option B is incorrect because protons remain within the nucleus during redox.</p><p>&#183; Option C is wrong as neutrons do not change in ordinary chemical reactions.</p><p>&#183; Option D is incorrect since whole atoms are not lost; only electrons transfer.</p>",
    "question_index": 44
  },

    "correct_option_id": 3,
    "solution": "Rashtriya Ekta Diwas or National Unity Day is observed on 31st of October. The day commemorates the birth anniversary of Sardar Vallabhbhai Patel. He is known as the Iron Man of India and as one of the founding leaders of the Republic of India.<br>Government of India introduced Rashtriya Ekta Diwas in 2014.<br>",

    "question": "<span class=\"eqt\"><p>Which Article of the Indian Constitution provides protection against double jeopardy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2342;&#2379;&#2361;&#2352;&#2375; &#2326;&#2340;&#2352;&#2375; &#2360;&#2375; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 20(1)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 20(1)</span>",
      "<span class=\"eqt\">Article 20(2)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 20(2)</span>",
      "<span class=\"eqt\">Article 21</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 21</span>",
      "<span class=\"eqt\">Article 19(1)(g)</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 19(1)(&#2332;&#2368;)</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Option B</b> is correct because <b>Article 20(2)</b> prohibits prosecution and punishment more than once for the same offence.</p><p>&#183; It ensures legal safeguards following an acquittal or conviction.</p><p>&#183; It is part of the rights against conviction for offences (Article 20).</p><p>&#183; Option A is incorrect: Article 20(1) prohibits retrospective criminal laws.</p><p>&#183; Option C is incorrect: Article 21 protects life and personal liberty.</p><p>&#183; Option D is incorrect: Article 19(1)(g) guarantees freedom to practice any profession or trade.</p>",
    "question_index": 48
  },

    "question": "<span class=\"eqt\"><p>Which festival in Kerala features a unique elephant march?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2352;&#2354; &#2325;&#2375; &#2325;&#2367;&#2360; &#2340;&#2381;&#2351;&#2380;&#2361;&#2366;&#2352; &#2350;&#2375;&#2306; &#2361;&#2366;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2379;&#2326;&#2366; &#2332;&#2369;&#2354;&#2370;&#2360; &#2344;&#2367;&#2325;&#2366;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Thrissur Pooram</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2381;&#2352;&#2367;&#2358;&#2370;&#2352; &#2346;&#2370;&#2352;&#2350;</span>",
      "<span class=\"eqt\">Onam</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2339;&#2350;</span>",
      "<span class=\"eqt\">Vishu</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2369;</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Thrissur Pooram</b> is a famous festival in Kerala, known for its grand celebrations and the unique <b>elephant march</b>. During this festival, beautifully decorated elephants are paraded, and traditional percussion ensembles (like Chenda Melam) perform. The festival is held at the Vadakkunnathan Temple in Thrissur and attracts thousands of visitors.</p><p>The other festivals mentioned are also celebrated in Kerala but do not feature an elephant march:</p><p>&#183; <b>Onam</b>: A harvest festival celebrated with boat races, feasts, and cultural performances.</p><p>&#183; <b>Vishu</b>: A New Year festival marked by the Vishu Kani (auspicious sight) and feasts.</p><p>&#183; <b>Attukal Pongala</b>: A women-centric festival where offerings are made to the goddess Attukal Amma.</p>",

  },
  {
    "question": "<span class=\"eqt\"><p>Which option with given sides forms a triangle?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2357;&#2366;&#2354;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">100, 200, 300</span><span class=\"hqt\" style=\"display:none\">100, 200, 300</span>",
      "<span class=\"eqt\">8, 22, 9</span><span class=\"hqt\" style=\"display:none\">8, 22, 9</span>",
      "<span class=\"eqt\">4, 2, 6</span><span class=\"hqt\" style=\"display:none\">4, 2, 6</span>",
      "<span class=\"eqt\">18, 16, 19</span><span class=\"hqt\" style=\"display:none\">18, 16, 19</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>We know that sum of any two sides of a triangle is always greater than the third side.</p><p>From option a, 100 + 200 = 300 (not satisfying condition)</p><p>From option b, 8 + 9 = 17 &lt; 22 (not satisfying condition)</p><p>From option c, 4 + 2 = 6 (not satisfying condition)</p><p>From option d, 18 + 16 = 34 &gt; 19</p><p>18 + 19 = 37 &gt; 16</p><p>16 + 19 = 35 &gt; 18</p><p>Satisfying the conditions.</p>",
    "question_index": 50
  },
  {
    "question": "<span class=\"eqt\"><p>A sum of Rs 4400 amounts to Rs 8593.75 in 3 years at X% p. a. interest being compounded yearly. What will be the simple interest on the same sum and for the same time at (X + 5)% per annum?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2369;. 4400 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2306;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352; 3 &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; X% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; &#2352;&#2369;. 8593.75 &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; (X + 5)% &#2346;&#2381;&#2352;&#2340;&#2367;&#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [

    "question": "<span class=\"eqt\"><p>A policeman noticed a thief from 400 m. The thief started running and the policeman was chasing him. The thief and the policeman ran at the speeds of 14 km/hr and 15 km/hr, respectively. What was the distance between them after 4 minutes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2344;&#2375; 400 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2360;&#2375; &#2319;&#2325; &#2330;&#2379;&#2352; &#2325;&#2379; &#2342;&#2375;&#2326;&#2366;&#2404; &#2330;&#2379;&#2352; &#2349;&#2366;&#2327;&#2344;&#2375; &#2354;&#2327;&#2366; &#2324;&#2352; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2313;&#2360;&#2325;&#2366; &#2346;&#2368;&#2331;&#2366; &#2325;&#2352; &#2352;&#2361;&#2366; &#2341;&#2366;&#2404; &#2330;&#2379;&#2352; &#2324;&#2352; &#2346;&#2369;&#2354;&#2367;&#2360;&#2325;&#2352;&#2381;&#2350;&#2368; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 14 km/hr &#2324;&#2352; 15 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2349;&#2366;&#2327;&#2375;&#2404; 4 &#2350;&#2367;&#2344;&#2335; &#2348;&#2366;&#2342; &#2313;&#2344;&#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2341;&#2368;?</p></span>",

    "question": "<span class=\"eqt\"><p>A group of men decided to do a job in 6 days, but 18 men dropped out every day. If the job was completed in 8 days, then how many men initially decided to do the job?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2325;&#2375; &#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2344;&#2375; 6 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2366;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2347;&#2376;&#2360;&#2354;&#2366; &#2325;&#2367;&#2351;&#2366; &#2354;&#2375;&#2325;&#2367;&#2344; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2342;&#2367;&#2344; 18 &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2344;&#2375; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2379; &#2325;&#2366;&#2350; &#2360;&#2375; &#2309;&#2354;&#2327; &#2325;&#2352; &#2354;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2325;&#2366;&#2350; 8 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359;&#2379;&#2306; &#2344;&#2375; &#2325;&#2366;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>In the given figure, K be the centre and &#8736;JHG = 30&deg; and &#8736;LGH = 32&deg;, then what is the value of &#8736;JKL?</p><p><img width=467 height=259 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er250523st140.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306;, K &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2361;&#2376; &#2324;&#2352; &#8736;JHG = 30&deg; &#2324;&#2352; &#8736;LGH = 32&deg;, &#2340;&#2379; &#8736;JKL &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306; ?</p><p><img width=467 height=259 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er250523st140.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">162&deg;</span><span class=\"hqt\" style=\"display:none\">162&deg;</span>",
      "<span class=\"eqt\">154&deg;</span><span class=\"hqt\" style=\"display:none\">154&deg;</span>",
      "<span class=\"eqt\">167&deg;</span><span class=\"hqt\" style=\"display:none\">167&deg;</span>",
      "<span class=\"eqt\">172&deg;</span><span class=\"hqt\" style=\"display:none\">172&deg;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>By the alternate segment theorem,</p><p>&#8736;LGH = &#8736;LJG = 32&deg;</p><p>In &#8710;GHL,</p><p>&#8736;GLH = 180&deg; - &#8736;LGH - &#8736;GHL</p><p>=&gt; &#8736;GLH = 180&deg;  -  32  -  30&deg;</p><p>=&gt; &#8736;GLH = 118&deg;</p><p>So, &#8736;JLG = 180&deg; - &#8736;GLH</p><p>=&gt; &#8736;JLG = 180&deg; - 118&deg;</p><p>=&gt; &#8736;JLG = 62&deg;</p><p>In &#8710;JGL,</p><p>&#8736;JGL = 180&deg; - &#8736;LJG - &#8736;JLG</p><p>=&gt; &#8736;JGL = 180&deg;  -  32&deg;  -  62&deg;</p><p>=&gt; &#8736;JGL = 86&deg;</p><p>Thus, &#8736;JKL = 2 * &#8736;JGL</p><p>=&gt; &#8736;JKL = 2 * 86&deg; = 172&deg;</p>",
    "question_index": 63
  },

    "question": "<span class=\"eqt\"><p><b>Directions:</b>   The following pie charts show the amount of money spent by two brothers - Nishu and Aman on purchasing five different books.</p><p><img width=366 height=323 id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15969/image001.png\"><img width=371 height=325 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15969/image002.png\"></p><p>Let total amount of money spent by Nishu is Rs. X and by Aman is Rs. Y. The difference between the amount spent by Nishu on Mathematics and spent by Aman on Science is Rs.30. Find the value of Y, if amount spent by Nishu on Science is Rs.60.</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358; :</b> &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2342;&#2379; &#2349;&#2366;&#2311;&#2351;&#2379;&#2306; - &#2344;&#2367;&#2358;&#2369; &#2324;&#2352; &#2309;&#2350;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2366;&#2305;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2375;&#2306; &#2326;&#2352;&#2368;&#2342;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2381;&#2351;&#2351; &#2325;&#2368; &#2327;&#2312; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p><img width=\"366\" height=\"323\" id=\"Chart 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15969/image001.png\"><img width=\"371\" height=\"325\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15969/image002.png\"></p><p>&#2350;&#2366;&#2344;&#2366; &#2325;&#2367; &#2344;&#2367;&#2358;&#2369; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2381;&#2351;&#2351; &#2325;&#2368; &#2327;&#2312; &#2325;&#2369;&#2354; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2352;&#2369;.X &#2361;&#2376; &#2324;&#2352; &#2309;&#2350;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2381;&#2351;&#2351; &#2325;&#2368; &#2327;&#2312; &#2325;&#2369;&#2354; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2352;&#2369;.Y &#2361;&#2376;&#2404; &#2344;&#2367;&#2358;&#2369; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2327;&#2339;&#2367;&#2340; &#2346;&#2352; &#2357;&#2381;&#2351;&#2351; &#2325;&#2368; &#2327;&#2312; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2324;&#2352; &#2309;&#2350;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2346;&#2352; &#2357;&#2381;&#2351;&#2351; &#2325;&#2368; &#2327;&#2312; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2352;&#2369;.30 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2344;&#2367;&#2358;&#2369; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2346;&#2352; &#2357;&#2381;&#2351;&#2351; &#2325;&#2368; &#2327;&#2312; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2352;&#2369;.60 &#2361;&#2376;, &#2340;&#2379; Y &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",

    "solution": "<p>Amount spent by Nishu on Science = Rs.60</p><p>So, 45&deg; = Rs.60</p><p>1&deg; = Rs.4/3</p><p>360&deg; = Rs.480</p><p>So, X = Rs.480</p><p>Amount spent by Nishu on Mathematics = 480 * 110/360 = Rs.440/3</p><p>Amount spent by Aman on Science = Y * 70/360 = Rs.7Y/36</p><p>ATQ,</p><p>(440/3)  -  (7Y/36) = 30</p><p>(7Y/36) = 350/3</p><p>Y = 12 * 50</p><p>Y = Rs.600</p>",

    "question": "<span class=\"eqt\"><p>The average of 13 numbers is 57. The average of the first 6 numbers is 55, and the average of the next 4 numbers is 62. If the 11<sup>th</sup> number is 20 less than the 12<sup>th</sup> number and is 10 more than the 13<sup>th</sup> number, then what is the average value of the 12<sup>th</sup> and 13<sup>th</sup> numbers?</p></span><span class=\"hqt\" style=\"display:none\"><p>13 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 57 &#2361;&#2376;&#2404; &#2346;&#2361;&#2354;&#2368; 6 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 55 &#2361;&#2376; &#2324;&#2352; &#2309;&#2327;&#2354;&#2368; 4 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; 62 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 11&#2357;&#2368;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 12&#2357;&#2368;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 20 &#2325;&#2350; &#2361;&#2376; &#2324;&#2352; 13&#2357;&#2368;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 10 &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; 12&#2357;&#2368;&#2306; &#2324;&#2352; 13&#2357;&#2368;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>Sum of all 13 numbers = 13 x 57 = 741</p><p>Sum of first 6 numbers = 6 x 55 = 330</p><p>Sum of next 4 numbers = 4 x 62 = 248</p><p>Sum of 11<sup>th</sup>, 12<sup>th</sup>, and 13<sup>th</sup> number = 741  -  (330 + 248) = 163</p><p>Let 11<sup>th</sup> number be X.</p><p>Then,</p><p>12<sup>th</sup> number = X + 20</p><p>And</p><p>13<sup>th</sup> number = X  -  10</p><p>Therefore,</p><p>X + X + 20 + X  -  10 = 163</p><p>3X + 10 = 163</p><p>3X = 153</p><p>X = 51</p><p>Average value of the 12<sup>th</sup> and 13<sup>th</sup> numbers = [(51 + 20) + (51  -  10)]/2 = 56</p>",

    "question": "<p>Select the sentence in which the '-ing' form of verb expresses the continuity of an action/event.</p>",
    "options": [
      "She was working late into the night to meet her project deadline.",
      "The frustrating delays caused everyone to lose patience during the meeting.",
      "The thrilling game captivated the audience from beginning to end.",
      "The rising sun filled the sky with hues of orange and pink."
    ],
    "correct_option_id": 0,
    "solution": "<p>The correct answer is: a) She was working late into the night to meet her project deadline.</p><p>In this sentence, \"was working\" is in the past continuous tense. The \"-ing\" form \"working,\" used with the auxiliary verb \"was,\" indicates that the action was in progress over a period of time in the past, clearly expressing continuity.</p><p>In option b), \"frustrating\" is a participial adjective describing the noun \"delays.\"</p><p>In option c), \"thrilling\" is also a participial adjective describing \"game.\"</p><p>In option d), \"rising\" describes the sun and functions as a participial adjective, not as part of a verb phrase indicating ongoing action.</p><p>Only option a) uses the \"-ing\" form to express the continuity of an action or event.</p><p><b>Note: Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p><b>Dancing </b>at the party, the women fell on the ground.</p><p><b>Encouraged</b> by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.</p>",
    "question_index": 78
  },

    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Simran has had a passion for travelling, ______?</p>",

      "Hasn't she"

    "correct_option_id": 3,
    "solution": "<p>The correct option to fill in the blank is 'hasn't she'. When the main sentence/clause is positive, the question tag should be negative, and vice versa. In the given case, the main sentence/clause is positive (\"Simran has had a passion for travelling\"), therefore, the question tag should be negative. Additionally, there is an auxiliary verb 'has' in the main sentence/clause, so the question tag should also contain the same auxiliary verb. Accordingly, option (d) is correct because it maintains the opposite polarity (positive main sentence, negative question tag) and uses the same auxiliary verb (\"has\").</p><p>Option (a) is incorrect as it uses \"didn't,\" which is not consistent with the original auxiliary verb 'has'. The forms of 'do' (does, do, did) are used when there is no auxiliary verb in the main clause.</p><p>Option (b) is not correct because it does not adhere to the grammatical rule that a positive main clause should have a negative question tag (\"does he\" is an affirmative question tag).</p><p>Option (c) is incorrect as it uses \"isn't,\" which is not consistent with the original auxiliary verb 'has'.</p><p>Hence, (d) is the correct answer.</p><p>The complete sentence is: \"Simran has had a passion for travelling, hasn't she?\"</p><p>NOTE:</p><p>Auxiliary verb: A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. Auxiliary verbs help to form the various tenses, moods, and voices of other verbs. The principal ones are be, do, and have. Example: She will sing a song tomorrow. Here, 'will' is the auxiliary verb that supports the main verb 'sing'.</p><p><b>\"Clause: </b>A clause is a group of words that contains a verb (and usually other components too). A clause may form part of a sentence, or it may be a complete sentence in itself. Example: </p><p>I. \"His products weren't selling\"; this is an example of a sentence containing one clause. </p><p>II. \"After we had had dinner, we went for a walk\"; here, the sentence contains two clauses that are separated by a comma.</p><p>A clause can be categorised as: </p><p>I. Main/independent clause</p><p>II. Subordinate/dependent clause</p><p><b>Main/independent clause:</b> In the example 2 given above, the clause \"we went for a walk\" can be said as the main clause (a clause that is not dependent on any other clause for its meaning, it makes sense on its own; a sentence contains at least one main clause.) </p><p><b>Subordinate/dependent clause:</b> In example 2 given above, the clause \"After we had had dinner\" is a subordinate clause: it depends on the main clause for its meaning and cannot exist as a sentence on its own. </p>",
