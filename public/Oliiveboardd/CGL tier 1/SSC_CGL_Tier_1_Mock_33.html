<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->

                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>

                    </div>

                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Three orientations of the same cube are shown. How will this cube look when unfolded?</p><p><img width=312 height=150 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image027.png\"></p><p><img width=564 height=71 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image028.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2361;&#2368; &#2328;&#2344; &#2325;&#2375; &#2340;&#2368;&#2344; &#2309;&#2349;&#2367;&#2357;&#2367;&#2344;&#2381;&#2351;&#2366;&#2360; &#2342;&#2367;&#2326;&#2366;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2332;&#2348; &#2351;&#2361; &#2328;&#2344; &#2326;&#2369;&#2354;&#2375;&#2327;&#2366; &#2340;&#2379; &#2325;&#2376;&#2360;&#2366; &#2342;&#2367;&#2326;&#2375;&#2327;&#2366;?</p><p><img width=312 height=150 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image027.png\"></p><p><img width=564 height=71 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image028.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In this type of format,</p><p><img width=279 height=109 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22591/image029.png\"></p><p>1 lies opposite 6; 4 lies opposite to 5 and 3 lies opposite to 2.</p><p><b>Figure I</b>: K lies opposite to D; Y lies opposite to O and V lies opposite to S.</p><p>Thus, K is not adjacent to D, Y is not adjacent to O and V is not adjacent to S.</p><p>So, figure I is incorrect.</p><p><b>Figure II:</b> V lies opposite to K; D lies opposite to Y and O lies opposite to S.</p><p>Thus, V is not adjacent to K, D is not adjacent to Y and O is not adjacent to S.</p><p>So, figure II is correct.</p><p><b>Figure III:</b> S lies opposite to O; D lies opposite to V and Y lies opposite to K.</p><p>Thus, S is not adjacent to O, D is not adjacent to V and Y is not adjacent to K.</p><p>So, figure III is incorrect.</p><p><b>Figure IV:</b> D lies opposite to S; Y lies opposite to O and K lies opposite to V.</p><p>Thus, D is not adjacent to S, Y is not adjacent to O and K is not adjacent to V.</p><p>So, figure IV is incorrect.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p><b>35</b> is related to <b>10, 3 and 5</b> following a certain logic. Following the same logic, <b>20</b> is related to <b>2, 6 and 8</b>. To which of the following is <b>65</b> related following the same logic?</p><p>(NOTE: Operations should be performed on the whole numbers, without breaking down the numbers into its constituent digits. E.g. 13  -  Operations on 13 such as adding/subtracting/multiplying etc. to 13 can be performed. Breaking down 13 into 1 and 3 and then performing mathematical operations on 1 and 3 is not allowed.)</p></span><span class=\"hqt\" style=\"display:none\"><p><b>35</b> &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; <b>10, 3 &#2324;&#2352; 5</b> &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2313;&#2360;&#2368; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, <b>20</b> <b>2, 6 &#2324;&#2352; 8</b> &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2313;&#2360;&#2368; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; <b>65</b> &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p><p>(&#2344;&#2379;&#2335;: &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2346;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;, &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2328;&#2335;&#2325; &#2309;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2379;&#2337;&#2364;&#2375; &#2348;&#2367;&#2344;&#2366;&#2404; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; 13 - 13 &#2346;&#2352; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2332;&#2376;&#2360;&#2375; &#2325;&#2367; 13 &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2344;&#2366;/&#2328;&#2335;&#2366;&#2344;&#2366;/&#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2344;&#2366; &#2310;&#2342;&#2367; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; 13 &#2325;&#2379; 1 &#2324;&#2352; 3 &#2350;&#2375;&#2306; &#2340;&#2379;&#2337;&#2364;&#2344;&#2366; &#2324;&#2352; &#2347;&#2367;&#2352; 1 &#2324;&#2352; 3 &#2346;&#2352; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2352;&#2344;&#2366; &#2309;&#2344;&#2369;&#2350;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;)</p></span>",
    "options": [
      "<span class=\"eqt\">15, 2 and 10</span><span class=\"hqt\" style=\"display:none\">15, 2 &#2324;&#2352; 10</span>",
      "<span class=\"eqt\">18, 3 and 2</span><span class=\"hqt\" style=\"display:none\">18, 3 &#2324;&#2352; 2</span>",
      "<span class=\"eqt\">10, 6 and 10</span><span class=\"hqt\" style=\"display:none\">10, 6 &#2324;&#2352; 10</span>",
      "<span class=\"eqt\">16, 4 and 1</span><span class=\"hqt\" style=\"display:none\">16, 4 &#2324;&#2352; 1</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>35</b> is related to <b>10, 3 and 5</b></p><p>Here, the logic is:</p><p>10 * 3 + 5 = 35</p><p><b>20</b> is related to <b>2, 6 and 8</b></p><p>Here, the logic is:</p><p>2 * 6 + 8 = 20</p><p>Similarly,</p><p>Option (a) 15, 2 and 10: 15 * 2 + 10 = 40</p><p>Option (b) 18, 3 and 2: 18 * 3 + 2 = 56</p><p>Option (c) 10, 6 and 10: 10 * 6 + 10 = 70</p><p>Option (d) 16, 4 and 1: 16 * 4 + 1 = 65. So, option d) is correct.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language,</p><p>A &div; B means A is the son-in-law of B</p><p>A  X  B means A is the mother of B</p><p>A + B means A is the wife of B</p><p>A - B means A is the brother of B</p><p>Based on the above, how is P related to U if 'R + P &div; Q + S  -  T  X  U'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>A &div; B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2366; &#2342;&#2366;&#2350;&#2366;&#2342; &#2361;&#2376;</p><p>A X B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2368; &#2350;&#2366;&#2305; &#2361;&#2376;</p><p>A + B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;</p><p>A - B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; A, B &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, P, U &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2351;&#2342;&#2367; 'R + P &div; Q + S - T X U'?</p></span>",
    "options": [
      "<span class=\"eqt\">Brother's Son's Wife's Mother's Son</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2312; &#2325;&#2375; &#2348;&#2375;&#2335;&#2375; &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2325;&#2368; &#2350;&#2366;&#2305; &#2325;&#2366; &#2348;&#2375;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Mother's Brother's Wife's Daughter's Husband</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2305; &#2325;&#2375; &#2349;&#2366;&#2312; &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2325;&#2366; &#2346;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Sister's Husband's Father's Wife's Son</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2344; &#2325;&#2375; &#2346;&#2340;&#2367; &#2325;&#2375; &#2346;&#2367;&#2340;&#2366; &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2325;&#2366; &#2348;&#2375;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Father's Daughter's Husband's Mother's Brother</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2340;&#2366; &#2325;&#2368; &#2348;&#2375;&#2335;&#2368; &#2325;&#2375; &#2346;&#2340;&#2367; &#2325;&#2368; &#2350;&#2366;&#2305; &#2325;&#2366; &#2349;&#2366;&#2312;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>R + P &div; Q + S  -  T  X  U</p><p>R + P means R is the wife of P</p><p>P &div; Q means P is the son-in-law of Q</p><p>Q + S means Q is the wife of S</p><p>S  -  T means S is the brother of T</p><p>T  X  U means T is the mother of U</p><p><img width=364 height=113 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25407/image012.png\"></p><p>P is U's mother's brother's wife's daughter's husband.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In the following question, which one set of letters when sequentially placed at the gaps in the given letter series shall complete it?</p><p>a _ a e _ t o _ a e e _ t o a _ e t t _ o</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2350;&#2370;&#2361; &#2326;&#2366;&#2354;&#2368; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2346;&#2352; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2326;&#2344;&#2375; &#2346;&#2352; &#2342;&#2368; &#2327;&#2312; &#2309;&#2325;&#2381;&#2359;&#2352; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2375;&#2327;&#2366;?</p><p>a _ a e _ t o _ a e e _ t o a _ e t t _ o</p></span>",
    "options": [
      "<span class=\"eqt\">a, t, a, t, e, t</span><span class=\"hqt\" style=\"display:none\">a, t, a, t, e, t</span>",
      "<span class=\"eqt\">a, e, a, t, e, t<b> </b></span><span class=\"hqt\" style=\"display:none\">a, e, a, t, e, t<b> </b></span>",
      "<span class=\"eqt\">a, t, e, t, e, t</span><span class=\"hqt\" style=\"display:none\">a, t, e, t, e, t</span>",
      "<span class=\"eqt\">a, e, e, t, e, t</span><span class=\"hqt\" style=\"display:none\">a, e, e, t, e, t</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In each repetition, 'a' is eliminated and 't' is added in the sequence 'aaaeeto' </p><p>a<b> a</b> a e<b> e</b> t o <b>a</b> a e e <b>t</b> t o a <b>e</b> e t t <b>t </b>o</p><p>So, option (b) is the correct answer. </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Each of the letters in the word 'SPLENDID' is arranged in the English alphabetical order. How many letters are there in the English alphabetical series between the letter which is third from the left end and the one which is second from the right end in the new letter-cluster thus formed?</p></span><span class=\"hqt\" style=\"display:none\"><p>'SPLENDID' &#2358;&#2348;&#2381;&#2342; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2379; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2348;&#2344;&#2375; &#2344;&#2319; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2306; &#2331;&#2379;&#2352; &#2360;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2324;&#2352; &#2342;&#2366;&#2319;&#2306; &#2331;&#2379;&#2352; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Twelve</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2352;&#2361;</span>",
      "<span class=\"eqt\">Ten<b> </b></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2360;<b> </b></span>",
      "<span class=\"eqt\">Eleven</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2351;&#2366;&#2352;&#2361;</span>",
      "<span class=\"eqt\">Nine</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2380;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>SPLENDID</p><p>In English alphabetical order:</p><p>DDEILNPS</p><p>The letter which is third from the left end: E</p><p>The one which is second from the right end: P</p><p>Thus, ten letters are there in the English alphabetical series between the letter which is third from the left end and the one which is second from the right end in the new letter-cluster thus formed.</p>",
    "question_index": 4

    "question": "<span class=\"eqt\"><p>Read the given statements and conclusions carefully. Assuming that the information given in the statements is true, even if it appears to be at variance with commonly known facts, decide which of the given conclusions logically follows from the statements.</p><p><b>Statements:</b></p><p>All Note is Slip</p><p>Some Note is Chit</p><p>No Chit is Receipt</p><p><b>Conclusions:</b></p><p>I: Some Slip is Chit</p><p>II: Some Slip is not Receipt</p><p>III: No Note is Receipt</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2324;&#2352; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2346;&#2338;&#2364;&#2375;&#2306;&#2404; &#2351;&#2361; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2367; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2351;&#2361; &#2360;&#2352;&#2381;&#2357;&#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2379;&#2306;, &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2342;&#2367;&#2319; &#2327;&#2319; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366;/&#2325;&#2352;&#2340;&#2375; &#2361;&#2376;/&#2361;&#2376;&#2306;&#2404;</p><p><b>&#2325;&#2341;&#2344;:</b></p><p>&#2360;&#2349;&#2368; Note, Slip &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2369;&#2331; Note, Chit &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2379;&#2312; Chit, Receipt &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p><b>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</b></p><p>I: &#2325;&#2369;&#2331; Slip, Chit &#2361;&#2376;&#2306;&#2404;</p><p>II: &#2325;&#2369;&#2331; Slip, Receipt &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404;</p><p>III: &#2325;&#2379;&#2312; Note, Receipt &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;&#2404;</p></span>",

    "solution": "<p><b>Statements:</b></p><p>All Note is Slip</p><p>Some Note is Chit</p><p>No Chit is Receipt</p><p><b><img width=380 height=157 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23457/image004.png\"></b></p><p>Some Slip is Chit: All Note is Slip. Some Note is Chit. Thus, Some Slip is Chit. So, conclusion I is true.</p><p>Some Slip is not Receipt: Some Note is Chit. No Chit is Receipt. Thus, the Slip which is Chit is not Receipt. So, conclusion II is true.</p><p>No Note is Receipt: As there is no direct relation between Note and Receipt. So, conclusion III is false.</p><p>Hence, both conclusion I and conclusion II follow.</p>",

    "question": "<span class=\"eqt\"><p>Which numbers will replace question mark (?) in the following series?</p><p>3, 4.2, 6.6, 10.2, 15, ? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2327;&#2368;?</p><p>3, 4.2, 6.6, 10.2, 15, ?</p></span>",

    "question": "<span class=\"eqt\"><p>In a certain code language 'Back to School' is written as '1#A 9%H 7@T', 'Stay in School' is written as '6&amp;Y 7@T 2*M' and 'Stay Back in Life' is written as '9%H 6&amp;Y 2*M 0$V'. How is 'Life' written in that code?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'Back to School' &#2325;&#2379; '1#A 9%H 7@T' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, 'Stay in School' &#2325;&#2379; '6&amp;Y 7@T 2*M' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'Stay Back in Life' &#2325;&#2379; '9%H 6&amp;Y 2*M 0$V' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'Life' &#2325;&#2379; &#2325;&#2376;&#2360;&#2375; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",

    "solution": "<p>'Back to School' is written as '1#A 9%H 7@T'</p><p>'Stay in School' is written as '6&amp;Y 7@T 2*M'</p><p>'Stay Back in Life' is written as '9%H 4!Q 2*M 0$V'</p><p>Code of 'Back' = '9%H'</p><p>Code of 'In/Stay' = '2*M/6&amp;Y'</p><p>Code of 'School' = '7@T'</p><p>Code of 'To' = '1#A' </p><p>Thus,</p><p>Code of 'Life' will be '0$V'</p><p>So, the answer is option (c).</p>",

    "question": "<span class=\"eqt\"><p>Which of the following was NOT an element of Emperor Ashoka's Dhamma?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2350;&#2381;&#2352;&#2366;&#2335; &#2309;&#2358;&#2379;&#2325; &#2325;&#2375; &#2343;&#2350;&#2381;&#2350; &#2325;&#2366; &#2340;&#2340;&#2381;&#2357; &#2344;&#2361;&#2368;&#2306; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Compassion towards all beings</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2346;&#2381;&#2352;&#2366;&#2339;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2325;&#2352;&#2369;&#2339;&#2366;</span>",
      "<span class=\"eqt\">Prohibition of animal sacrifice</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2369; &#2348;&#2354;&#2367; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2306;&#2343;</span>",
      "<span class=\"eqt\">Promotion of moral and ethical behavior</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2376;&#2340;&#2367;&#2325; &#2319;&#2357;&#2306; &#2310;&#2330;&#2366;&#2352;&#2367;&#2325; &#2310;&#2330;&#2352;&#2339; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Establishment of a new monetary system</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2344;&#2312; &#2350;&#2380;&#2342;&#2381;&#2352;&#2367;&#2325; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; <b>Option D</b> is correct because Ashoka's Dhamma focused on moral and social welfare, <b>not monetary reforms.</b></p><p>&#183; Dhamma edicts emphasize non-violence, tolerance, and respect for all life.</p><p>&#183; They aimed at social harmony and ethical conduct rather than economic policy.</p><p>&#183; Option A incorrect: compassion to all beings was central to Dhamma.</p><p>&#183; Option B incorrect: he explicitly discouraged animal sacrifices.</p><p>&#183; Option C incorrect: promotion of moral values was a core principle.</p>",

    "question": "<span class=\"eqt\"><p>When the government's revenue receipts are equal to its revenue expenditure, which of the following will necessarily be zero?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2366;&#2306; &#2313;&#2360;&#2325;&#2375; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2358;&#2370;&#2344;&#2381;&#2351; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Revenue Deficit</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2328;&#2366;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Fiscal Deficit</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Primary Deficit</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2328;&#2366;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Budget Deficit</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2366;&#2335;&#2366; &#2348;&#2332;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Option A</b> is correct because <b>Revenue Deficit = Revenue Expenditure  -  Revenue Receipts</b>; equality implies zero.</p><p>&#183; It measures only the gap in revenue account, not total financing needs.</p><p>&#183; Other deficits (fiscal, primary, budget) can still be non-zero due to capital outlays or interest payments.</p><p>&#183; Option B is incorrect: fiscal deficit may persist if capital expenditure exceeds capital receipts.</p><p>&#183; Option C is incorrect: primary deficit may exist if interest payments are high.</p><p>&#183; Option D is incorrect: budget deficit is fiscal deficit minus net grants.</p>",

    "question": "<span class=\"eqt\"><p>Which vitamin is essential for blood clotting in the human body?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2344;&#2357; &#2358;&#2352;&#2368;&#2352; &#2350;&#2375;&#2306; &#2352;&#2325;&#2381;&#2340; &#2325;&#2366; &#2341;&#2325;&#2381;&#2325;&#2366; &#2332;&#2350;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Vitamin A</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; A</span>",
      "<span class=\"eqt\">Vitamin C</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; C</span>",
      "<span class=\"eqt\">Vitamin K</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; K</span>",
      "<span class=\"eqt\">Vitamin D</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; D</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Vitamin K</b> is a cofactor in the hepatic synthesis of clotting factors II, VII, IX and X.</p><p>&#183; Deficiency leads to impaired coagulation and excessive bleeding.</p><p>&#183; It occurs naturally in green leafy vegetables and is synthesised by gut flora.</p><p>&#183; Vitamin A is important for vision and immunity, not clotting.</p><p>&#183; Vitamin C aids collagen synthesis and antioxidant functions.</p><p>&#183; Vitamin D regulates calcium homeostasis and bone health.</p>",
    "question_index": 30
  },

    "question": "<span class=\"eqt\"><p>The Swadeshi Movement was sparked by the partition of Bengal in ________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; ________ &#2350;&#2375;&#2306; &#2348;&#2306;&#2327;&#2366;&#2354; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2361;&#2369;&#2310; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1893</span><span class=\"hqt\" style=\"display:none\">1893</span>",
      "<span class=\"eqt\">1905</span><span class=\"hqt\" style=\"display:none\">1905</span>",
      "<span class=\"eqt\">1911</span><span class=\"hqt\" style=\"display:none\">1911</span>",
      "<span class=\"eqt\">1920</span><span class=\"hqt\" style=\"display:none\">1920</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; The partition of Bengal in <b>October 1905</b> by Lord Curzon triggered the Swadeshi Movement.</p><p>&#183; It encouraged the boycott of British goods and revival of indigenous industries.</p><p>&#183; Mass protests, public meetings and the spread of nationalist literature characterised the movement.</p><p>&#183; The movement led to the rise of extremist leaders like Bal Gangadhar Tilak and Bipin Chandra Pal.</p><p>&#183; The 1911 reversal of the partition weakened Swadeshi activities but left a lasting nationalist legacy.</p><p>&#183; Earlier dates (1893, 1911, 1920) do not correspond to the partition event that sparked this movement.</p>",
    "question_index": 31
  },

    "correct_option_id": 1,

    "question": "<span class=\"eqt\"><p>In 1962, who published 'The History of Ocean Basins', which outlined the theory of how tectonic plates could move, later called 'sea floor spreading'?</p></span><span class=\"hqt\" style=\"display:none\"><p>1962 &#2350;&#2375;&#2306;, &#2325;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; '&#2342; &#2361;&#2367;&#2360;&#2381;&#2335;&#2381;&#2352;&#2368; &#2321;&#2347; &#2323;&#2358;&#2344; &#2348;&#2375;&#2360;&#2367;&#2344;&#2381;&#2360;' &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2311;&#2360; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2325;&#2379; &#2352;&#2375;&#2326;&#2366;&#2306;&#2325;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2367; &#2335;&#2375;&#2325;&#2381;&#2335;&#2379;&#2344;&#2367;&#2325; &#2346;&#2381;&#2354;&#2375;&#2335;&#2375;&#2306; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2328;&#2370;&#2350; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2325;&#2366;&#2354;&#2366;&#2306;&#2340;&#2352; &#2350;&#2375;&#2306; &#2311;&#2360;&#2375; '&#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352;&#2368;&#2351; &#2344;&#2367;&#2340;&#2354; &#2346;&#2381;&#2352;&#2360;&#2352;&#2339; ' &#2325;&#2361;&#2366; &#2327;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">George Edward Backus</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2377;&#2352;&#2381;&#2332; &#2319;&#2337;&#2357;&#2352;&#2381;&#2337; &#2348;&#2376;&#2325;&#2360;</span>",
      "<span class=\"eqt\">Alfred Wegener</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2347;&#2381;&#2352;&#2375;&#2337; &#2357;&#2375;&#2327;&#2375;&#2344;&#2352;</span>",
      "<span class=\"eqt\">Louis Bauer</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2369;&#2312; &#2348;&#2366;&#2313;&#2352;</span>",
      "<span class=\"eqt\">Harry Hammond Hess</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2376;&#2352;&#2368; &#2361;&#2376;&#2350;&#2306;&#2337; &#2361;&#2375;&#2360;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Harry Hess published 'The History of Ocean Basins' in 1962, outlining a theory of how tectonic plates can move which was later called 'sea floor spreading'.</p><p>Hess discovered that the oceans were shallower in the middle and identified the presence of Mid Ocean Ridges, raised above the surrounding generally flat sea floor (abyssal plain) by as much as 1.5 km.</p><p>In addition he found that the deepest parts of the oceans were very close to continental margins in the Pacific with Ocean Trenches extending down to depths of over 11 km in the case of the Marianas Trench off the coast of Japan.</p>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following have the general formula RCOOH?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2366; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2360;&#2370;&#2340;&#2381;&#2352; RCOOH &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ester</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;&#2381;&#2335;&#2352;</span>",
      "<span class=\"eqt\">Amide</span><span class=\"hqt\" style=\"display:none\">&#2320;&#2350;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">Carboxylic Acid</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2325;&#2381;&#2360;&#2367;&#2354;&#2367;&#2325; &#2309;&#2350;&#2381;&#2354;</span>",
      "<span class=\"eqt\">Ether</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2341;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Carboxylic acids</b> have the general formula, RCOOH (where R represents any group of carbon and hydrogen atoms). The old name for larger carboxylic acids is fatty acid.Some common carboxylic acids are formic acid, acetic acid, benzoic acid etc.</p><p>Ester: General formula is RCOOR', where R' is another alkyl or aryl group. This does not match RCOOH.</p><p>Amide: General formula is RCONH2 (or RCONHR'), which also does not match RCOOH.</p><p>Ether: General formula is ROR', which does not match RCOOH.</p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>The Ganga River is formed by the confluence of which two rivers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2306;&#2327;&#2366; &#2344;&#2342;&#2368; &#2325;&#2367;&#2344; &#2342;&#2379; &#2344;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2327;&#2350; &#2360;&#2375; &#2348;&#2344;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Yamuna and Son</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2350;&#2369;&#2344;&#2366; &#2324;&#2352; &#2360;&#2379;&#2344;</span>",
      "<span class=\"eqt\">Bhagirathi and Alaknanda</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327;&#2368;&#2352;&#2341;&#2368; &#2324;&#2352; &#2309;&#2354;&#2325;&#2344;&#2306;&#2342;&#2366;</span>",
      "<span class=\"eqt\">Tista and Brahmaputra</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2367;&#2360;&#2381;&#2340;&#2366; &#2324;&#2352; &#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2346;&#2369;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Kosi and Gandak</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2360;&#2368; &#2324;&#2352; &#2327;&#2306;&#2337;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Option B</b> is correct because <b>Bhagirathi and Alaknanda</b> meet at Devprayag to form the Ganga.</p><p>&#183; Devprayag is one of the five sacred Prayags in Uttarakhand.</p><p>&#183; This confluence is revered in Hindu tradition.</p><p>&#183; Option A incorrect: Yamuna joins Ganga later at Prayagraj, not at its source.</p><p>&#183; Option C incorrect: Tista and Brahmaputra meet in Bangladesh, not forming Ganga.</p><p>&#183; Option D incorrect: Kosi and Gandak join Ganga further downstream.</p>",
    "question_index": 35
  },

    "question": "<span class=\"eqt\"><p>The Fiscal Responsibility and Budget Management Act 2003 made it obligatory for the government to eliminate the revenue deficit by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2313;&#2340;&#2381;&#2340;&#2352;&#2342;&#2366;&#2351;&#2367;&#2340;&#2381;&#2357; &#2324;&#2352; &#2348;&#2332;&#2335;&#2368;&#2351; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2003 &#2344;&#2375; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2352;&#2381;&#2359; 2009 &#2340;&#2325; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2328;&#2366;&#2335;&#2375; &#2325;&#2379; &#2326;&#2340;&#2381;&#2350; &#2325;&#2352;&#2344;&#2366; &#2309;&#2344;&#2367;&#2357;&#2366;&#2352;&#2381;&#2351; &#2348;&#2344;&#2366; &#2342;&#2367;&#2351;&#2366; &#2361;&#2376;&#2404;</p></span>",

      "<span class=\"eqt\">2011</span><span class=\"hqt\" style=\"display:none\">2011</span>",
      "<span class=\"eqt\">2014</span><span class=\"hqt\" style=\"display:none\">2014</span>"

    "correct_option_id": 1,
    "solution": "<p>Through the Fiscal Responsibility and Budget Management Act 2003 (FRBMA), the Central government must ensure long term macro economical stability by pursuing a prudent fiscal policy.</p><p>This Act makes it obligatory for the government to eliminate the revenue deficit by <b>31 March 2009</b> and thereafter create a revenue surplus.</p>",

    "question": "<span class=\"eqt\"><p>The ________ Amendment Act (1976) added the words \"Socialist\" and \"Secular\" to the Preamble of the Constitution.</p></span><span class=\"hqt\" style=\"display:none\"><p>___________&#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; (1976) &#2344;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;&#2344;&#2366; &#2350;&#2375;&#2306; \"&#2360;&#2350;&#2366;&#2332;&#2357;&#2366;&#2342;&#2368;\" &#2324;&#2352; \"&#2343;&#2352;&#2381;&#2350;&#2344;&#2367;&#2352;&#2346;&#2375;&#2325;&#2381;&#2359;\" &#2358;&#2348;&#2381;&#2342; &#2332;&#2379;&#2337;&#2364;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">40th</span><span class=\"hqt\" style=\"display:none\">40 &#2357;&#2368;&#2306;</span>",
      "<span class=\"eqt\">42nd</span><span class=\"hqt\" style=\"display:none\">42 &#2357;&#2375;&#2306;</span>",
      "<span class=\"eqt\">44th</span><span class=\"hqt\" style=\"display:none\">44 &#2357;&#2375;&#2306;</span>",
      "<span class=\"eqt\">46th</span><span class=\"hqt\" style=\"display:none\">46 &#2357;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>The 42nd Amendment</b>, enacted during the Emergency period in December 1976, amended the Preamble.</p><p>&#183; It inserted \"Socialist\" after \"Sovereign\" and \"Secular\" after \"Socialist.\"</p><p>&#183; It also added \"Unity and Integrity of the Nation\" to the objectives in the Preamble.</p><p>&#183; The 44th Amendment (1978) restored certain fundamental rights curtailed earlier.</p><p>&#183; The 40th Amendment dealt with financial emergency provisions.</p><p>&#183; The 46th Amendment (1982) concerned electricity boards and fiscal matters.</p>",
    "question_index": 37
  },

    "question": "<span class=\"eqt\"><p>On which date is World Health Day observed each year?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2352;&#2381;&#2359; &#2357;&#2367;&#2358;&#2381;&#2357; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2342;&#2367;&#2357;&#2360; &#2325;&#2367;&#2360; &#2340;&#2366;&#2352;&#2368;&#2326; &#2325;&#2379; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">7 April</span><span class=\"hqt\" style=\"display:none\">7 &#2309;&#2346;&#2381;&#2352;&#2376;&#2354;</span>",
      "<span class=\"eqt\">5 June</span><span class=\"hqt\" style=\"display:none\">5 &#2332;&#2370;&#2344;</span>",
      "<span class=\"eqt\">1 May</span><span class=\"hqt\" style=\"display:none\">1 &#2350;&#2312;</span>",
      "<span class=\"eqt\">10 October</span><span class=\"hqt\" style=\"display:none\">10 &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; World Health Day is celebrated on <b>7 April</b> to mark the founding of the World Health Organization in 1948.</p><p>&#183; Each year's theme highlights a global health priority (e.g., \"Building a Fairer, Healthier World\").</p><p>&#183; Activities include awareness campaigns, policy dialogues and community health drives.</p><p>&#183; It serves as a platform for governments to strengthen health systems.</p><p>&#183; 5 June is World Environment Day; 1 May is International Labour Day.</p><p>&#183; 10 October is World Mental Health Day.</p>",
    "question_index": 38
  },

    "question": "<span class=\"eqt\"><p>Which of the following is the oldest and perhaps the grandest form of Hindustani vocal music?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2361;&#2367;&#2306;&#2342;&#2369;&#2360;&#2381;&#2340;&#2366;&#2344;&#2368; &#2327;&#2366;&#2351;&#2344; &#2360;&#2306;&#2327;&#2368;&#2340; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2346;&#2369;&#2352;&#2366;&#2344;&#2366; &#2324;&#2352; &#2360;&#2306;&#2349;&#2357;&#2340;&#2307; &#2360;&#2348;&#2360;&#2375; &#2349;&#2357;&#2381;&#2351; &#2352;&#2370;&#2346; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Dhamar</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2350;&#2352;</span>",
      "<span class=\"eqt\">Tarana</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2352;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Thumri</span><span class=\"hqt\" style=\"display:none\">&#2336;&#2369;&#2350;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Dhrupad</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2352;&#2369;&#2346;&#2342;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Dhrupad</b> is the oldest and perhaps the grandest form of Hindustani vocal music, which is believed to have originated from earlier forms like the 'Prabandha' and the 'Dhruvapada'.</p><p>Dhrupad reached its zenith of glory during the reign of the Mughal Emperor Akbar, who engaged masters like Baba Gopal Das, Swami Haridas, Tansen and Baiju Bawra to perform it.</p><p>Towards the beginning of the 13th century A. D. , Dhrupad consolidated itself as a classical form of music.</p><p>It was adapted for court performance during the reign of Raja Man Singh Tomar (1486-1517 A. D. ) of Gwalior.</p><p>Dhrupad has been in decline since the 18th century.</p>",
    "question_index": 40
  },

    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; PM-KISAN is administered by the <b>Ministry of Agriculture and Farmers Welfare, Government of India.</b></p><p>&#183; It provides direct income support to small and marginal farmers for agricultural inputs.</p><p>&#183; Policy decisions and fund allocations for PM-KISAN are overseen by this ministry.</p><p>&#183; Ministry of Finance handles budgetary provisions but does not implement the scheme.</p><p>&#183; Ministry of Rural Development focuses on rural infrastructure, not farmer income support.</p><p>&#183; Ministry of Home Affairs deals with internal security and census, not agricultural subsidies.</p>",
    "question_index": 42
  },
  {
    "question": "<span class=\"eqt\"><p>Article ___ of the Indian Constitution prescribes the procedure for the amendment of the Constitution.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; ___ &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">356</span><span class=\"hqt\" style=\"display:none\">356</span>",
      "<span class=\"eqt\">352</span><span class=\"hqt\" style=\"display:none\">352</span>",
      "<span class=\"eqt\">368</span><span class=\"hqt\" style=\"display:none\">368</span>",
      "<span class=\"eqt\">370</span><span class=\"hqt\" style=\"display:none\">370</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Option C</b> is correct because <b>Article 368</b> empowers Parliament to amend constitutional provisions.</p><p>&#183; It specifies the special majority required in both Houses and ratification by states for certain amendments.</p><p>&#183; It allows addition, variation, or repeal of any part of the Constitution.</p><p>&#183; Option A is incorrect: Article 356 deals with President's Rule in states.</p><p>&#183; Option B is incorrect: Article 352 concerns National Emergency.</p><p>&#183; Option D is incorrect: Article 370 granted special status to Jammu &amp; Kashmir (now abrogated).</p>",
    "question_index": 43
  },
  {

      "<span class=\"eqt\">Rukmini Devi Arundale - Bharatanatyam</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;&#2325;&#2381;&#2350;&#2367;&#2339;&#2368; &#2342;&#2375;&#2357;&#2368; &#2309;&#2352;&#2369;&#2306;&#2337;&#2375;&#2354; - &#2349;&#2352;&#2340;&#2344;&#2366;&#2335;&#2381;&#2351;&#2350;</span>",

      "<span class=\"eqt\">Uday Shankar - Mohiniyattam</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2342;&#2351; &#2358;&#2306;&#2325;&#2352; - &#2350;&#2379;&#2361;&#2367;&#2344;&#2368;&#2309;&#2335;&#2381;&#2335;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Rukmini Devi Arundale</b> is widely recognized for her significant contribution to the revival and popularization of <b>Bharatanatyam</b>. She established the Kalakshetra Foundation, a renowned institution dedicated to the preservation and promotion of Indian classical arts, including Bharatanatyam.</p><p>The other options are incorrect:</p><p>&bull; M.S. Subbulakshmi was a renowned Carnatic vocalist.</p><p>&bull; Birju Maharaj was a master of Kathak.</p><p>&bull; Uday Shankar was a pioneer of Indian modern dance.</p>",

    "question": "<span class=\"eqt\"><p>Who is popularly known as the \"Nightingale of India\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2349;&#2366;&#2352;&#2340; &#2325;&#2379;&#2325;&#2367;&#2354;&#2366;\" &#2325;&#2375; &#2344;&#2366;&#2350; &#2360;&#2375; &#2354;&#2379;&#2325;&#2346;&#2381;&#2352;&#2367;&#2351; &#2325;&#2380;&#2344; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Asha Bhosle</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2358;&#2366; &#2349;&#2379;&#2360;&#2354;&#2375;</span>",
      "<span class=\"eqt\">Lata Mangeshkar</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2340;&#2366; &#2350;&#2306;&#2327;&#2375;&#2358;&#2325;&#2352;</span>",
      "<span class=\"eqt\">Sunidhi Chauhan</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2344;&#2367;&#2343;&#2367; &#2330;&#2380;&#2361;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Alka Yagnik</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2325;&#2366; &#2351;&#2366;&#2327;&#2381;&#2344;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; <b>Lata Mangeshkar (1929 - 2022)</b> earned the title for her melodious voice and extensive playback-singing career.</p><p>&#183; She recorded over a thousand Hindi film songs and sang in 36 regional Indian languages.</p><p>&#183; Honoured with Bharat Ratna (2001), Dadasaheb Phalke Award (1989) and multiple Filmfare Awards.</p><p>&#183; Her rendition of \"Ayega Aane Wala\" remains a milestone in Hindi cinema.</p><p>&#183; Asha Bhosle is Lata's sister, famed for versatility across genres.</p><p>&#183; Sunidhi Chauhan and Alka Yagnik are celebrated playback singers but came into prominence decades later.</p>",
    "question_index": 45
  },
  {
    "question": "<span class=\"eqt\"><p>Which festival is associated with the Tamil month of Thai?</p><p></p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344;-&#2360;&#2366; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2340;&#2350;&#2367;&#2354; &#2350;&#2361;&#2368;&#2344;&#2375; '&#2341;&#2366;&#2312;' &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pongal</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2306;&#2327;&#2354;</span>",
      "<span class=\"eqt\">Onam</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2339;&#2350;</span>",
      "<span class=\"eqt\">Diwali</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2357;&#2366;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Holi</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2379;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Pongal is associated with the Tamil month of Thai.</p><p>Pongal is a vibrant and joyous festival celebrated over four days, each with its own significance:</p><p>1. Bhogi Pongal</p><p>Marks the beginning of the festival.</p><p>People discard old things and welcome new beginnings by lighting bonfires.</p><p>Symbolizes the burning away of negativity.</p><p>2. Surya Pongal</p><p>The main day of the festival dedicated to the Sun God.</p><p>People prepare sweet Pongal (rice pudding) and offer it to the Sun.</p><p>Kolam (decorative floor patterns) are drawn at the entrance of homes.</p><p>3. Mattu Pongal</p><p>Dedicated to cattle, especially cows and bulls, which are essential for agriculture.</p><p>Animals are decorated and worshipped.</p><p>In some regions, bullfights like Jallikattu are held.</p><p>4. Kaanum Pongal</p><p>The final day of the festival, often spent visiting relatives and friends.</p><p>People wear new clothes and exchange gifts.</p><p>Picnics and outdoor activities are common.</p>",
    "question_index": 46
  },
  {
    "question": "<span class=\"eqt\"><p>Thillana is a format associated with which classical dance form?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2341;&#2367;&#2354;&#2366;&#2344;&#2366; &#2325;&#2367;&#2360; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2344;&#2371;&#2340;&#2381;&#2351; &#2358;&#2376;&#2354;&#2368; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2366;&#2352;&#2370;&#2346; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kuchipudi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2330;&#2367;&#2346;&#2369;&#2337;&#2364;&#2368;</span>",
      "<span class=\"eqt\">Odissi</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Bharatanatyam</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2352;&#2340;&#2344;&#2366;&#2335;&#2381;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Kathak</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Tillana is a brisk and a lively number performed towards the end of a concert.</p><p>Usually a Carnatic vocal or a <b>Bharatanatyam</b> concert culminates with a Tillana.</p><p>The lyrics contain sollus like Dheem Nadir Dheem or Dheem Ta na Di tIllana.</p><p>Most of the Tillana's include the word 'Tillana' in the lyrics.</p><p>It is predominantly a rhythmic composition.</p>",
    "question_index": 47
  },
  {
    "question": "<span class=\"eqt\"><p>In March 2024, Prime Minister Narendra Modi inaugurated India's first under-river metro tunnel in which city?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2352;&#2381;&#2330; 2024 &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2344;&#2352;&#2375;&#2306;&#2342;&#2381;&#2352; &#2350;&#2379;&#2342;&#2368; &#2344;&#2375; &#2325;&#2367;&#2360; &#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2346;&#2361;&#2354;&#2368; &#2309;&#2306;&#2337;&#2352;-&#2352;&#2367;&#2357;&#2352; &#2350;&#2375;&#2335;&#2381;&#2352;&#2379; &#2360;&#2369;&#2352;&#2306;&#2327; &#2325;&#2366; &#2313;&#2342;&#2381;&#2328;&#2366;&#2335;&#2344; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [

    ],
    "correct_option_id": 1,
    "solution": "<p>Prime Minister Narendra Modi inaugurated India's first under-river metro tunnel in <b>Kolkata</b>.</p><p>The metro tunnel has been built under Kolkata's Hooghly River that will connect Howrah Maidan to Esplanade.</p><p>The 4.8 km stretch between Howrah Maidan and Esplanade is the second section of the East-West Metro corridor between Howrah Maidan and the IT hub Salt Lake Sector V.</p>",

  {
    "question": "<span class=\"eqt\"><p>Which law states that the current through a conductor between two points is directly proportional to the voltage across the two points?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2351;&#2350; &#2325;&#2361;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2342;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2330;&#2366;&#2354;&#2325; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;&#2367;&#2340; &#2343;&#2366;&#2352;&#2366; &#2342;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2346;&#2352; &#2357;&#2379;&#2354;&#2381;&#2335;&#2375;&#2332; &#2325;&#2375; &#2360;&#2368;&#2343;&#2375; &#2310;&#2344;&#2369;&#2346;&#2366;&#2340;&#2367;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ohm's Law</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2350; &#2325;&#2366;&#2344;&#2370;&#2344;</span>",
      "<span class=\"eqt\">Faraday's Law</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2376;&#2352;&#2366;&#2337;&#2375; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Amp&#232;re's Law</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;&#2381;&#2346;&#2367;&#2351;&#2352; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Kirchhoff's Law</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2352;&#2330;&#2377;&#2347; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Ohm's Law</b> is expressed as V = IR, where V is voltage, I is current and R is resistance.</p><p>&#183; It applies to ohmic conductors where resistance remains constant over a range of voltages.</p><p>&#183; Its unit of resistance (ohm) is named after Georg Simon Ohm, who formulated it in 1827.</p><p>&#183; Faraday's Law relates to electromagnetic induction, not steady currents.</p><p>&#183; Amp&#232;re's Law deals with magnetic fields around conductors carrying current.</p><p>&#183; Kirchhoff's Laws govern the sum of currents and voltages in circuit junctions and loops.</p>",
    "question_index": 49
  },
  {
    "question": "<span class=\"eqt\"><p>A rectangular prism is filled with a glittery liquid and the dimensions of the prism are 20 X 4  X 10 cm. What volume of liquid is required to fill the prism completely?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2319;&#2325; &#2330;&#2350;&#2325;&#2368;&#2354;&#2375; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351; &#2360;&#2375; &#2349;&#2352;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2375; &#2310;&#2351;&#2366;&#2350; 20 X 4 X 10 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2306;&#2404; &#2346;&#2381;&#2352;&#2367;&#2332;&#2381;&#2350; &#2325;&#2379; &#2360;&#2306;&#2346;&#2370;&#2352;&#2381;&#2339; &#2352;&#2370;&#2346; &#2360;&#2375; &#2349;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351; &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">420 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">420 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">800 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">800 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">660 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">660 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>",
      "<span class=\"eqt\">750 cm<sup>3</sup></span><span class=\"hqt\" style=\"display:none\">750 &#2360;&#2375;&#2350;&#2368;<sup>3</sup></span>"

    "correct_option_id": 1,
    "solution": "<p>A rectangular prism has dimensions similar to that of a cuboid. Hence, the formula to find the volume of a cuboid can be applied.</p> <p>Volume of a cuboid = length  X width  X height</p> <p>Volume of glittery liquid required = 20  X 4 X 10=800cm<sup>3</sup></p>",

  },

    "question": "<span class=\"eqt\"><p>The half of the length of the common chord of two intersecting circles is 16 cm. If the radii of the circles are 8&radic;5 cm and 20 cm, then the distance between the centres (in cm) is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342;&#2368; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2313;&#2349;&#2351;&#2344;&#2367;&#2359;&#2381;&#2336; &#2332;&#2368;&#2357;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2366; &#2310;&#2343;&#2366; 16 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2319;&#2305; 8&radic;5 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 20 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; (&#2360;&#2375;&#2350;&#2368; &#2350;&#2375;&#2306;) &#2361;&#2376;:</p></span>",

    "correct_option_id": 0,
    "solution": "<p><img width=199 height=129 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23304/image032.png\"></p><p>Given that MN = 16 cm, AM = 8&radic;5 cm, and BM = 20 cm</p><p>In &#916; AMN,</p><p><img width=132 height=36 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23304/image033.png\"></p><p><img width=117 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23304/image034.png\"></p><p><img width=115 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23304/image035.png\"></p><p>In &#916; BMN,</p><p><img width=121 height=31 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23304/image036.png\"></p><p><img width=117 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23304/image037.png\"></p><p><img width=129 height=21 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23304/image038.png\"></p><p><img width=288 height=17 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23304/image039.png\"></p>",

  {
    "question": "<span class=\"eqt\"><p>If 7cos x - sec x = 4&radic;3 . cos x, then find the value of (cos<sup>2</sup> x  -  7).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 7cos x - sec x = 4&radic;3 . cos x &#2361;&#2376;, &#2340;&#2379; (cos<sup>2</sup> x - 7) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2&radic;3</span><span class=\"hqt\" style=\"display:none\">2&radic;3</span>",
      "<span class=\"eqt\">&radic;3</span><span class=\"hqt\" style=\"display:none\">&radic;3</span>",
      "<span class=\"eqt\">8&radic;3</span><span class=\"hqt\" style=\"display:none\">8&radic;3</span>",
      "<span class=\"eqt\">4&radic;3</span><span class=\"hqt\" style=\"display:none\">4&radic;3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>7cos x - sec x = 4&radic;3 . cos x</p><p>=&gt; 7cos<sup>2</sup> x - 1 = 4&radic;3 cos<sup>2</sup> x</p><p>=&gt; (7  -  4&radic;3) cos<sup>2</sup> x = 1</p><p>=&gt; cos<sup>2</sup> x = 1/(7  -  4&radic;3) * (7 + 4&radic;3)/(7 + 4&radic;3)</p><p>=&gt; cos<sup>2</sup> x = 7 + 4&radic;3</p><p>=&gt; (cos<sup>2</sup> x  -  7) = 4&radic;3</p>",
    "question_index": 52

    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct?</p><p>I: If principal = Rs. 17640, amount = Rs. 38808, and time = 8 years, then at simple interest rate of interest is 10%.</p><p>II: If total amount = 16560, time = 6 years, and rate of interest = 14%, then principal is Rs. 9000 on simple interest.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I: &#2351;&#2342;&#2367; &#2350;&#2370;&#2354;&#2343;&#2344; = &#2352;&#2369;. 17640, &#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2344; = &#2352;&#2369;. 38808 &#2324;&#2352; &#2360;&#2350;&#2351; = 8 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; 10% &#2361;&#2376;&#2404;</p><p>II: &#2351;&#2342;&#2367; &#2350;&#2367;&#2358;&#2381;&#2352;&#2343;&#2344; = 16560, &#2360;&#2350;&#2351; = 6 &#2357;&#2352;&#2381;&#2359; &#2324;&#2352; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2352; = 14% &#2361;&#2376;, &#2340;&#2379; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2350;&#2370;&#2354;&#2343;&#2344; &#2352;&#2369;.9000 &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I:</p><p>Let the rate of interest be 10%.</p><p>Then,</p><p>[1 + (10*8)/100]% of principal should be equal to the amount.</p><p>Now, 180% of 17640 = Rs.31752 which is not equal to Rs.38808.</p><p>Hence, statement I is not correct.</p><p>Statement II:</p><p>Let Rs. 9000 be the principal.</p><p>[1 + (14 * 6)/100]% of 9000 should be equal to Rs.16560.</p><p>184% of 9000 = Rs.16560 which is equal to given amount.</p><p>Hence, statement II is correct.</p>",
    "question_index": 53

    "question": "<span class=\"eqt\"><p>If &#8710;XYZ is an equilateral triangle and K, L, and M are mid-points of sides XY, XZ and YZ, respectively, then which of the following option is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#8710;XYZ &#2319;&#2325; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2376; &#2324;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; K, L &#2324;&#2352; M &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; XY, XZ &#2324;&#2352; YZ &#2325;&#2375; &#2350;&#2343;&#2381;&#2351;-&#2348;&#2367;&#2306;&#2342;&#2369; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">&#8710;KLM must be an equilateral triangle.</span><span class=\"hqt\" style=\"display:none\">&#8710;KLM &#2319;&#2325; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</span>",
      "<span class=\"eqt\">KL + LM + MK = 2YZ</span><span class=\"hqt\" style=\"display:none\">KL + LM + MK = 2YZ</span>",
      "<span class=\"eqt\">KL<sup>2</sup> = LM<sup>2</sup> + MK<sup>2</sup></span><span class=\"hqt\" style=\"display:none\">KL<sup>2</sup> = LM<sup>2</sup> + MK<sup>2</sup></span>",
      "<span class=\"eqt\">&#8710;KLM must be a right-angled triangle.</span><span class=\"hqt\" style=\"display:none\">&#8710;KLM &#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2379;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=191 height=163 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23186/image003.jpg\"></p><p>If &#8710;XYZ is an equilateral triangle and K, L, and M are mid-points of sides XY, XZ and YZ, respectively, then &#8710;KLM must be an equilateral triangle.</p><p>K, L, and M are mid-points of sides XY, XZ and YZ, respectively.</p><p>So, KL = YZ/2, MK = XZ/2, and LM = XY/2</p><p>Let XY = YZ = XZ = 2a</p><p>And KL = LM = MK = a</p><p>So, KL + LM + MK = 2YZ</p><p>=&gt; a + a + a = 2 * 2a</p><p>=&gt; 3a &#8800; 4a</p><p>Which is not correct. </p><p>Hence, option a is correct. </p>",
    "question_index": 54
  },

    "question": "<span class=\"eqt\"><p>A train travelling at 91 km/hr crosses another train travelling in the same direction at 37 km/hr in 15 seconds. What is the combined length of both the trains (in m)?</p></span><span class=\"hqt\" style=\"display:none\"><p>91 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2330;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2335;&#2381;&#2352;&#2375;&#2344; &#2360;&#2350;&#2366;&#2344; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; 37 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2330;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2342;&#2370;&#2360;&#2352;&#2368; &#2335;&#2381;&#2352;&#2375;&#2344; &#2325;&#2379; 15 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2346;&#2366;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2335;&#2381;&#2352;&#2375;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2354;&#2306;&#2348;&#2366;&#2312; (m &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">250</span><span class=\"hqt\" style=\"display:none\">250</span>",

    "correct_option_id": 1,
    "solution": "<p>Relative speed = 91  -  37 = 54 km/hr = 54 * 5/18 = 15 m/sec</p><p>Time = 15 sec</p><p>Combined length of both the trains = 15 * 15 = 225 m</p>",

    "solution": "<p>Formula used,</p><p>Cos<sup>2</sup>q + sin<sup>2</sup>q = 1</p><p>(sin 18&deg; + cos 72&deg;)(cosec 18&deg; + sec 72&deg;) + [(sin<sup>2 </sup>90&deg; + cos<sup>2 </sup>90&deg;)/(sin 24&deg; sec 66&deg;)]</p><p>=&gt; {cos 72&deg; + sin(90  -  72)&deg;} {sec 72&deg; + cosec (90  -  72)&deg;} + [1/{sin 24&deg; sec (90  -  24)&deg;}]</p><p>=&gt; (cos 72&deg; + cos 72&deg;)(sec 72&deg; + sec 72&deg;) + 1/sin 24&deg; cosec 24&deg;</p><p>=&gt; (2 cos 72&deg; * 2 sec 72&deg;) + 1/1 = 4 + 1 = 5</p>",

    "question": "<span class=\"eqt\"><p>A shopkeeper allows a discount of 23% on the marked price of a chair and sold it for Rs.308. Had the discount not been given, the profit would have been 28%. What is the 12/25<sup>th</sup> of the cost price of the chair?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2319;&#2325; &#2325;&#2369;&#2352;&#2381;&#2360;&#2368; &#2325;&#2375; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 23% &#2325;&#2368; &#2331;&#2370;&#2335; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2375; 308 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2331;&#2370;&#2335; &#2344;&#2361;&#2368;&#2306; &#2342;&#2368; &#2327;&#2312; &#2361;&#2379;&#2340;&#2368;, &#2340;&#2379; &#2354;&#2366;&#2349; 28% &#2361;&#2379;&#2340;&#2366;&#2404; &#2325;&#2369;&#2352;&#2381;&#2360;&#2368; &#2325;&#2375; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2366; 12/25&#2357;&#2366;&#2305; &#2349;&#2366;&#2327; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>To a certain number of people, a work is assigned to choose between tea and coffee by voting. 5% of total number of people did not vote and 1000 votes were invalid. After result, it has been found that 400 more people voted for tea than coffee. If 45% of the total number of people voted for tea, then what is the number of people who voted?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2379; &#2357;&#2379;&#2335; &#2342;&#2375;&#2325;&#2352; &#2330;&#2366;&#2351; &#2324;&#2352; &#2325;&#2377;&#2347;&#2368; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2368; &#2319;&#2325; &#2325;&#2379; &#2330;&#2369;&#2344;&#2344;&#2375; &#2325;&#2366; &#2325;&#2366;&#2350; &#2360;&#2380;&#2306;&#2346;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; 5% &#2354;&#2379;&#2327;&#2379;&#2306; &#2344;&#2375; &#2357;&#2379;&#2335; &#2344;&#2361;&#2368;&#2306; &#2342;&#2367;&#2351;&#2366; &#2324;&#2352; 1000 &#2357;&#2379;&#2335; &#2309;&#2357;&#2376;&#2343; &#2341;&#2375;&#2404; &#2344;&#2340;&#2368;&#2332;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2340;&#2366; &#2330;&#2354;&#2366; &#2325;&#2367; 400 &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2379;&#2327;&#2379;&#2306; &#2344;&#2375; &#2325;&#2377;&#2347;&#2368; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2330;&#2366;&#2351; &#2325;&#2379; &#2357;&#2379;&#2335; &#2342;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2360;&#2375; 45% &#2354;&#2379;&#2327;&#2379;&#2306; &#2344;&#2375; &#2330;&#2366;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2379;&#2335; &#2325;&#2367;&#2351;&#2366;, &#2340;&#2379; &#2357;&#2379;&#2335; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "correct_option_id": 1,
    "solution": "<p>Let total number of people = X</p><p>Number of valid votes = 95% of X  -  1000 = 0.95X  -  1000</p><p>Number of votes tea got = 45X/100</p><p>Number of votes coffee got = (45X/100)  -  400</p><p>Also, number of votes coffee gets = (0.95X  -  1000)  -  (45X/100)</p><p>So,</p><p>(0.95X  -  1000)  -  0.45X = 0.45X  -  400</p><p>0.05X = 600</p><p>X = 12000</p><p>Number of people who voted = 12000 * 95/100 = 11400</p>",

    "question": "<span class=\"eqt\"><p>A flag 20 m high is standing on the top of a building. An angle 'a' is subtended by the height of the flag at a distance of 70m from the foot of the building, where tan a = 1/6.Then what is the height of the building?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2346;&#2352; 20 &#2350;&#2368;&#2335;&#2352; &#2314;&#2305;&#2330;&#2366; &#2319;&#2325; &#2333;&#2306;&#2337;&#2366; &#2354;&#2327;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;&#2404; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2375; &#2349;&#2370;&#2340;&#2354; &#2360;&#2375; 70 &#2350;&#2368;&#2335;&#2352; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2346;&#2352; &#2343;&#2381;&#2357;&#2332; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2360;&#2375; &#2325;&#2379;&#2339; 'a' &#2348;&#2344;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2361;&#2366;&#2306; tan a = 1/6 &#2361;&#2376;, &#2340;&#2379; &#2311;&#2350;&#2366;&#2352;&#2340; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "solution": "<p><img width=395 height=309 id=image138.png src=\"https://u1.oliveboard.in/exams/solution/customimg/trigonometry/image063.jpg\"></p> <p>We have drawn the figure as the information is provided in the question.</p> <p>QS is the flag which is standing over a building SR.</p> <p>And according to the question, tan a = 1/6 ..(1) </p> <p>And in the triangle PRS, tan b = h/70 ..(2) </p> <p>Now in triangle PQR, tan (a + b) = (20+h)/70</p><p>As we know that tan (a + b) = (tan a + tan b)/(1 - tan a.tan b)</p> <p>So, (20+h)/70 = (tan a + tan b)/(1 - tan a.tan b)</p><p>Now in this expression we will put values from equation (1) and (2) </p> <p>And after solving we will get</p> <p>&#8658; h<sup>2</sup> + 20h -3500 = 0</p> <p>&#8658; (h + 70) (h  -  50) = 0</p> <p>As h can't be negative so h = 50m</p>",

    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>Let the contract be sent to me.</p>",

      "I must be sent the contract.",
      "The contract should be sent to me."
    ],
    "correct_option_id": 1,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The removal of the helping verb and the preposition 'by' is necessary while changing the voice of the sentence from Passive to Active.</p><p>In Active voice (look at the options), it should be in <b>imperative form</b>.</p><p>An imperative sentence is used to express order, request, suggestion, etc.</p><p>In Passive voice, the sentence begins with \"Let\".</p><p>Here, the imperative sentence in Active voice is an <b>order</b>.</p><p>The format in Passive voice is: <b>Let + Subject (Objective case) + be + V3</b>.</p><p>Thus, the format in Active voice is: <b>V1 + Object</b>.</p><p>For example:</p><p>Let the match be started. (Passive)</p><p>Start the match. (Active)</p><p>The options except (b) don't follow the correct grammatical format of the Active Voice.</p><p>Therefore, the correct answer is: <b>(b) Send me the contract</b>.</p>",
    "question_index": 84
  },
