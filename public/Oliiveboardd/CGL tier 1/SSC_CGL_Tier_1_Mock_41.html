    "question": "<span class=\"eqt\"><p>In the process of division, the divisor is 15<sup>th</sup> times of quotient and 9 times the remainder. If the quotient is 36, then find the value of the dividend. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2327; &#2357;&#2367;&#2343;&#2367; &#2350;&#2375;&#2306;, &#2349;&#2366;&#2332;&#2325;, &#2349;&#2366;&#2327;&#2347;&#2354; &#2325;&#2366; 15 &#2327;&#2369;&#2344;&#2366; &#2324;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2366; 9 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2349;&#2366;&#2327;&#2347;&#2354; 36 &#2361;&#2376;, &#2340;&#2379; &#2349;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">19560</span><span class=\"hqt\" style=\"display:none\">19560</span>",
      "<span class=\"eqt\">19500</span><span class=\"hqt\" style=\"display:none\">19500</span>",
      "<span class=\"eqt\">19600</span><span class=\"hqt\" style=\"display:none\">19600</span>",
      "<span class=\"eqt\">19660</span><span class=\"hqt\" style=\"display:none\">19660</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Divisor = 15 * Quotient = 9 * Remainder </p><p>15 * 36 = 9 * Remainder </p><p>Remainder = 60</p><p>Divisor = 15 * 36 = 540 </p><p>Dividend = Divisor * Quotient + Remainder </p><p>= 540 * 36 + 60 </p><p>= 19500</p>",
    "question_index": 66
  },

    "question": "<span class=\"eqt\"><p>In the given figure C is the centre and AB is the diameter of the circle. If BC = 18 cm and DB = 30 cm, where DE &#8869; AB, find the length of EB.</p><p><img width=275 height=250 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12349/image022.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; C &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2324;&#2352; AB &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; BC = 18 cm &#2324;&#2352; DB = 30 cm &#2361;&#2376;, &#2332;&#2361;&#2366;&#2305; DE &#8869; AB &#2361;&#2376;, &#2340;&#2379; EB &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"275\" height=\"250\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12349/image022.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">32 cm</span><span class=\"hqt\" style=\"display:none\">32 cm</span>",
      "<span class=\"eqt\">25 cm</span><span class=\"hqt\" style=\"display:none\">25 cm</span>",
      "<span class=\"eqt\">24 cm</span><span class=\"hqt\" style=\"display:none\">24 cm</span>",
      "<span class=\"eqt\">42 cm</span><span class=\"hqt\" style=\"display:none\">42 cm</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In &#8710;ABD, [&#8736;ADB = 90<sup>0</sup>, as angle subtended by diameter at a point on circumference is 90<sup>0</sup>]</p><p>cos B = Base/Hypotenuse = DB/AB</p><p>And, In &#8710;BED,</p><p>cos B = Base/Hypotenuse = EB/DB</p><p>So, DB/AB = EB/DB</p><p>=&gt; DB<sup>2</sup> = AB * EB</p><p>=&gt; 30<sup>2</sup> = 2 * 18 * EB</p><p>=&gt; EB = 30 * 30/36</p><p>=&gt; EB = 25 cm</p>",
    "question_index": 67
  },

pan>",

    "question": "<span class=\"eqt\"><p>A cone is attached to a hemisphere to make an ice cream. The diameter of the cone and hemisphere is same and equal to 42mm. If the volume of the ice cream is 46.2cm<sup>3</sup> then find the height of the ice cream.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2310;&#2311;&#2360;&#2325;&#2381;&#2352;&#2368;&#2350; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2379; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2358;&#2306;&#2325;&#2369; &#2324;&#2352; &#2309;&#2352;&#2381;&#2343;&#2327;&#2379;&#2354;&#2375; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2360;&#2350;&#2366;&#2344; &#2324;&#2352; 42 mm &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2310;&#2311;&#2360;&#2325;&#2381;&#2352;&#2368;&#2350; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; 46.2cm<sup>3</sup> &#2361;&#2376;, &#2340;&#2379; &#2310;&#2311;&#2360;&#2325;&#2381;&#2352;&#2368;&#2350; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "solution": "<p><img width=118 height=168 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21205/image001.jpg\"></p><p>Let the height of the cone = h</p><p>r = 42/2 = 21mm</p><p>Volume of the ice cream = 46.2 cm<sup>3</sup> = 46200 mm<sup>3</sup></p><p>Volume of the cone + Volume of the hemisphere = 46200</p><p>&#960;r<sup>2</sup>h/3 + 2&#960;r<sup>3</sup>/3 = 46200</p><p>&#960;r<sup>2 </sup>(h + 2r) = 46200 * 3</p><p>(22/7) * 21 * 21 (h + 2*21) = 138600</p><p>h + 42 = 138600/1386</p><p>h = 100  -  42</p><p>h = 58mm</p><p>Hence, the height of the ice cream = 58 + 21 = 79mm</p>",

    "question": "<span class=\"eqt\"><p>The sum of 4 numbers is 172. The largest number is 8 more than the second largest number. The average of the largest, the second smallest and the smallest number is 40. If the difference between the second largest number and the smallest number is 29, what is the sum of the smallest number and the largest number?</p></span><span class=\"hqt\" style=\"display:none\"><p>4 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2351;&#2379;&#2327; 172 &#2361;&#2376;&#2404; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 8 &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368;, &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2324;&#2352; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2324;&#2360;&#2340; 40 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 29 &#2361;&#2376;, &#2340;&#2379; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2351;&#2379;&#2327; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>Let the numbers be A&gt;B&gt;C&gt;D.</p> <p>Given conditions:</p> <p>A+B+C+D = 172 (I)</p> <p>A = B+8 (II)</p> <p>(A+C+D)/3 = 40</p> <p>=&gt; A+C+D = 120 (III)</p> <p>B  -  D = 29 (IV)</p> <p>From (I) and (III), B = 52</p> <p>From (II), A = 60</p> <p>From (IV), D = 52  -  29 = 23</p> <p>Required sum = A+D = 83</p> <p><b> </b></p>",

    "question": "<span class=\"eqt\"><p>Sides of a scalene triangle are in the ratio of 2 : 3 : 6. If difference between longest and shortest side is 340 cm. Find the perimeter of triangle.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2367;&#2359;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366;&#2319;&#2305; 2 : 3 : 6 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2360;&#2348;&#2360;&#2375; &#2354;&#2306;&#2348;&#2368; &#2324;&#2352; &#2360;&#2348;&#2360;&#2375; &#2331;&#2379;&#2335;&#2368; &#2349;&#2369;&#2332;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 340 cm &#2361;&#2376;&#2404; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">955 cm</span><span class=\"hqt\" style=\"display:none\">955 cm</span>",

    "solution": "<p>Let sides of triangle be 2x, 3x and 6x respectively</p><p>According to question,</p><p>6x  -  2x = 340</p><p>4x = 340</p><p>x = 85</p><p>Sides are 170 cm, 255 cm and 510 cm</p><p>Perimeter = 170 + 255 + 510 = 935 cm</p><p><b>Express method:</b></p><p>Difference = 6  -  2 = 4 units &rarr; 340</p><p>Perimeter of triangle = 2 + 3 + 6 = 11 units &rarr; 935</p>",
