<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cgl1 - Responsive Exam Interface</title>
    <!-- Fonts & Icons -->

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

    <!-- Timer Config -->
    <meta name="exam-duration" content="60">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Select the option which shows the set of symbols which will fit in the equation. </p><p><b>6 __ 24 __ 4 __ 18 __ 3 __ 21</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325;&#2379;&#2306; &#2325;&#2375; &#2313;&#2360; &#2360;&#2350;&#2370;&#2361; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2361;&#2379;&#2327;&#2366;&#2404;</p><p><b>6 __ 24 __ 4 __ 18 __ 3 __ 21</b></p></span>",
    "options": [
      "<span class=\"eqt\">-, +, +, x, =</span><span class=\"hqt\" style=\"display:none\">-, +, +, x, =</span>",
      "<span class=\"eqt\">&div;, +, =, -, +</span><span class=\"hqt\" style=\"display:none\">&div;, +, =, -, +</span>",
      "<span class=\"eqt\">x, &div;, -, +, =</span><span class=\"hqt\" style=\"display:none\">x, &div;, -, +, =</span>",
      "<span class=\"eqt\">x, &div;, =, +, +</span><span class=\"hqt\" style=\"display:none\">x, &div;, =, +, +</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>From a) -</p><p>6 - 24 + 4 + 18 x 3 = 40 &#8800; 21</p><p>From b) -</p><p>6 &div; 24 + 4 = 4.25 and 18 - 3 + 21= 36</p><p>From c) -</p><p><b>6 x 24 &div; 4 - 18 + 3 = 36 - 18 + 3 = 21</b></p><p>From d) -</p><p>6 x 24 &div; 4 = 36 and 18 + 3 + 21 = 42</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Which letter cluster will replace the question mark (?) to complete the given series?</p><p>WER, UHQ, SKP, QNO, OQN, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2325;&#2381;&#2359;&#2352; &#2360;&#2350;&#2370;&#2361; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2375;&#2327;&#2366;?</p><p>WER, UHQ, SKP, QNO, OQN, ?</p></span>",

      "<span class=\"eqt\">MUM</span><span class=\"hqt\" style=\"display:none\">MUM</span>"

    "correct_option_id": 0,
    "solution": "<p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">W(23)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">U(21)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S(19)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Q(17)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O(15)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">M(13)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E(5)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">H(8)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">K(11)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N(14)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Q(17)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T(20)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R(18)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Q(17)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P(16)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O(15)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N(14)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">M(13)</td></tr></table></p><p>So, 'MTM' will complete the series.</p>",

  {
    "question": "<span class=\"eqt\"><p>Which two numbers should be interchanged to make the given equation correct?</p><p>(144 &div; 48) + 11  -  (7 x 4) + 4 x 12 = 187</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2360;&#2367;&#2342;&#2381;&#2343; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>(144 &div; 48) + 11 - (7 x 4) + 4 x 12 = 187</p></span>",
    "options": [
      "<span class=\"eqt\">11 and 7</span><span class=\"hqt\" style=\"display:none\">11 &#2324;&#2352; 7</span>",
      "<span class=\"eqt\">12 and 7</span><span class=\"hqt\" style=\"display:none\">12 &#2324;&#2352; 7</span>",
      "<span class=\"eqt\">12 and 48</span><span class=\"hqt\" style=\"display:none\">12 &#2324;&#2352; 48</span>",
      "<span class=\"eqt\">48 and 11</span><span class=\"hqt\" style=\"display:none\">48 &#2324;&#2352; 11</span>"

    "correct_option_id": 2,

    "question_index": 2
  },
  {

    "question": "<span class=\"eqt\"><p>Select the option figure which is embedded in the given figure. (Rotation is NOT allowed)</p><p><img width=502 height=359 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23529/image019.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; &#2360;&#2344;&#2381;&#2344;&#2367;&#2361;&#2367;&#2340; &#2361;&#2376;&#2404; (&#2328;&#2370;&#2352;&#2381;&#2339;&#2344; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367;<b> &#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;)</p><p><img width=\"502\" height=\"359\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23529/image019.png\"></p></span>",

      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",

    "question": "<span class=\"eqt\"><p>In a certain coding system 'HYBRID' is written as 'IAEUOE'. What is the code for 'PENCIL'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; 'HYBRID' &#2325;&#2379; 'IAEUOE' &#2325;&#2368; &#2340;&#2352;&#2361; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; 'PENCIL &#2325;&#2366; &#2325;&#2379;&#2337; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">UIOEEO</span><span class=\"hqt\" style=\"display:none\">UIOEEO</span>",

    ],
    "correct_option_id": 3,
    "solution": "<p>Here each alphabet in the given word changes to the vowel which succeeds the given alphabet.</p><p>H becomes I, Y becomes A, B becomes E and so on.</p><p>So, P becomes U, E becomes I, N becomes O, C becomes E, I becomes O, L becomes O.</p><p>So, PENCIL is written as UIOEOO.</p>",
    "question_index": 19

    "question": "<span class=\"eqt\"><p>How many meaningful four-letter English words can be formed using the second, fourth, sixth and seventh letters of the word FABRICS (when counted from left to right) using each letter only once in each word?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2348;&#2381;&#2342; FABRICS &#2325;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375;, &#2330;&#2380;&#2341;&#2375;, &#2331;&#2336;&#2375; &#2324;&#2352; &#2360;&#2366;&#2340;&#2357;&#2375;&#2306; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; (&#2348;&#2366;&#2319;&#2306; &#2360;&#2375; &#2342;&#2366;&#2319;&#2306; &#2327;&#2367;&#2344;&#2344;&#2375; &#2346;&#2352;) &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2358;&#2348;&#2381;&#2342; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2366; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2348;&#2366;&#2352; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2352;&#2381;&#2341;&#2346;&#2370;&#2352;&#2381;&#2339; &#2330;&#2366;&#2352;-&#2309;&#2325;&#2381;&#2359;&#2352; &#2357;&#2366;&#2354;&#2375; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2358;&#2348;&#2381;&#2342; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",

      "<span class=\"eqt\">None</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>",

    "solution": "<p>The given word is FABRICS. </p><p>The second, fourth, sixth and seventh letters of the word FABRICS (when counted from left to right) are A, R, C and S. </p><p>So, the meaningful word is ARCS, SCAR, CARS.</p><p>So, 3 meaningful words can be formed.</p>",

    "question": "<span class=\"eqt\"><p>Vempati Chinna Satyam is a noted exponent of which classical dance?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2375;&#2350;&#2381;&#2346;&#2340;&#2367; &#2330;&#2367;&#2344;&#2381;&#2344;&#2366; &#2360;&#2340;&#2381;&#2351;&#2350; &#2325;&#2367;&#2360; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2344;&#2371;&#2340;&#2381;&#2351; &#2325;&#2375; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2325;&#2354;&#2366;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kathakali</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2325;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Odishi</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2358;&#2368;</span>",
      "<span class=\"eqt\">Bharatanatyam</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2352;&#2340;&#2344;&#2366;&#2335;&#2381;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Kuchipudi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2330;&#2367;&#2346;&#2369;&#2337;&#2364;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Guru Vempati Chinna Satyam (1929-2012) was a noted exponent, legendary dancer, and guru of the classical dance form <b>Kuchipudi.</b></p><p>He is widely credited with systematizing the Kuchipudi repertoire, refining its technique, and popularizing it on the national and international stage.</p><p>He established the Kuchipudi Art Academy in Chennai in 1963, which has trained numerous dancers.</p><p>Further insights:</p><p>Vempati Chinna Satyam's style is known for its grace, sculptural quality, and emphasis on both technical virtuosity and expressive abhinaya.</p><p>He choreographed over 180 solo items and 15 dance dramas, enriching the Kuchipudi repertoire.</p><p>Kuchipudi, the dance form, originated in a village of the same name in the Krishna district of Andhra Pradesh.</p>",
    "question_index": 25
  },
  {
    "question": "<span class=\"eqt\"><p>The process of converting vegetable oils into fats by adding hydrogen is known as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344; &#2350;&#2367;&#2354;&#2366;&#2325;&#2352; &#2357;&#2344;&#2360;&#2381;&#2346;&#2340;&#2367; &#2340;&#2375;&#2354;&#2379;&#2306; &#2325;&#2379; &#2357;&#2360;&#2366; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Saponification</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2348;&#2369;&#2344;&#2368;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Fermentation</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2339;&#2381;&#2357;&#2344;</span>",
      "<span class=\"eqt\">Hydrogenation</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2332;&#2344;&#2368;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Oxidation</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2325;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Hydrogenation</b> is a chemical process that adds hydrogen to a substance, typically across carbon-carbon double or triple bonds.</p><p>Vegetable oils are largely composed of unsaturated fatty acids (containing double bonds), which makes them liquid at room temperature.</p><p>By adding hydrogen in the presence of a catalyst (like nickel, palladium, or platinum), these double bonds are converted into single bonds, creating saturated fats.</p><p>These saturated fats are solid or semi-solid at room temperature, like vanaspati ghee or margarine.</p><p>Explanation of Other Options:</p><p>Saponification: The process of making soap. It involves the hydrolysis of fats or oils using a strong alkali (like sodium hydroxide).</p><p>Fermentation: A metabolic process where microorganisms (like yeast or bacteria) convert substances like sugars into alcohol, acids, or gases.</p><p>Oxidation: A chemical reaction that involves the loss of electrons or an increase in oxidation state. The rancidity of fats is an example of oxidation.</p><p>Further insights:</p><p>The hydrogenation process allows for the production of fats with desired properties, such as a higher melting point and longer shelf life.</p><p>However, partial hydrogenation can create \"trans fats,\" which are associated with negative health effects.</p>",
    "question_index": 26
  },
  {
    "question": "<span class=\"eqt\"><p>In September 2024, in wrestling, ________________ clinched a gold medal in the women's 76 kg freestyle category at the U20 World Championships in Pontevedra, Spain.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2367;&#2340;&#2306;&#2348;&#2352; 2024 &#2350;&#2375;&#2306;, &#2325;&#2369;&#2358;&#2381;&#2340;&#2368; &#2350;&#2375;&#2306;, ________________ &#2344;&#2375; &#2360;&#2381;&#2346;&#2375;&#2344; &#2325;&#2375; &#2346;&#2379;&#2306;&#2335;&#2375;&#2357;&#2375;&#2342;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; U20 &#2357;&#2367;&#2358;&#2381;&#2357; &#2330;&#2376;&#2306;&#2346;&#2367;&#2351;&#2344;&#2358;&#2367;&#2346; &#2350;&#2375;&#2306; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2368; 76 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2347;&#2381;&#2352;&#2368;&#2360;&#2381;&#2335;&#2366;&#2311;&#2354; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2346;&#2342;&#2325; &#2332;&#2368;&#2340;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Kapil Parmar</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2346;&#2367;&#2354; &#2346;&#2352;&#2350;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Antim Panghal</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2367;&#2350; &#2346;&#2306;&#2328;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Aman Sehrawat</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2350;&#2344; &#2360;&#2361;&#2352;&#2366;&#2357;&#2340;</span>",
      "<span class=\"eqt\">Jyoti Berwal</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2381;&#2351;&#2379;&#2340;&#2367; &#2348;&#2375;&#2352;&#2357;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In wrestling, <b>Jyoti Berwal</b> clinched a gold medal in the women's 76 kg freestyle category at the U20 World Championships in Pontevedra, Spain.</p><p>Jyoti defeated Ukraine's Mariia Orlevych in the final without giving her a chance to score a single point, securing herself the title.</p><p>Indian grapplers won two more medals in the same category. Komal in 59 kg and Sristhi in 68 kg bagged bronze medals.</p><p>Among the few more medal matches in the women's freestyle category, India's Nitika will take on Ukrainian Iryna Bondar for a gold medal bout in the 62 kg category.</p>",
    "question_index": 27
  },
  {
    "question": "<span class=\"eqt\"><p>In which of the following Congress Session a resolution blaming the British for the famine that had devastated many parts of India was passed?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2312; &#2361;&#2367;&#2360;&#2381;&#2360;&#2379;&#2306; &#2325;&#2379; &#2340;&#2348;&#2366;&#2361; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2309;&#2325;&#2366;&#2354; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2379;&#2306; &#2325;&#2379; &#2342;&#2379;&#2359;&#2368; &#2336;&#2361;&#2352;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1891 Nagpur Session</span><span class=\"hqt\" style=\"display:none\">1891 &#2344;&#2366;&#2327;&#2346;&#2369;&#2352; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344;</span>",
      "<span class=\"eqt\">1904 Bombay Session</span><span class=\"hqt\" style=\"display:none\">1904 &#2348;&#2306;&#2348;&#2312; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344;</span>",
      "<span class=\"eqt\">1896 Calcutta Session</span><span class=\"hqt\" style=\"display:none\">1896 &#2325;&#2354;&#2325;&#2340;&#2381;&#2340;&#2366; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344;</span>",
      "<span class=\"eqt\">1907 Surat Session</span><span class=\"hqt\" style=\"display:none\">1907 &#2360;&#2370;&#2352;&#2340; &#2309;&#2343;&#2367;&#2357;&#2375;&#2358;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>1896 Calcutta Session</b> of the Indian National Congress was held during the severe Indian famine of 1896-97.</p><p>During this session, presided over by Rahimtulla M. Sayani, a resolution was passed expressing deep grief over the famine that had ravaged large parts of the country.</p><p>The resolution criticized the British government's policies, holding them responsible for the frequent famines and the impoverishment of the Indian people.</p><p>Explanation of Other Options:</p><p>1891 Nagpur Session: This session focused on demanding reforms in the legislative councils.</p><p>1904 Bombay Session: This session, under the presidency of Sir Henry Cotton, condemned Lord Curzon's policies, particularly the impending partition of Bengal.</p><p>1907 Surat Session: This session is famous for the historic split in the Congress between the Moderates and the Extremists.</p><p>Further insights:</p><p>The 1896 Calcutta session is also notable as the first occasion where \"Vande Mataram\" was sung on the Congress platform, by Rabindranath Tagore.</p><p>Early Congress leaders like Dadabhai Naoroji and R.C. Dutt systematically analyzed and exposed the economic exploitation by the British, linking it directly to events like famines through their \"Drain of Wealth\" theory.</p>",
    "question_index": 28
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following does not belong to the 'Primary sector'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; '&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;' &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Forestry</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2344;&#2367;&#2325;&#2368;</span>",
      "<span class=\"eqt\">Mining</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2344;&#2344;</span>",
      "<span class=\"eqt\">Fishing</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2340;&#2381;&#2360;&#2381;&#2351;&#2344;</span>",
      "<span class=\"eqt\">Textiles</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2360;&#2381;&#2340;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; When we produce a good by exploiting natural resources, it is an activity of the primary sector. Examples include agriculture, dairy, fishing, forestry, mining etc. </p><p>&#183; The secondary sector covers activities in which natural products are changed into other forms through ways of manufacturing that we associate with industrial activity. Examples include manufacturing, cotton mills, sugar making, <b>textiles</b> etc. </p><p>&#183; The tertiary sector covers a wide range of activities from commerce to administration, transport, financial and real estate activities etc. </p>",
    "question_index": 29
  },
  {

    "options": [
      "<span class=\"eqt\">Uttar Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Bihar</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2361;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Punjab</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2332;&#2366;&#2348;</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p><b>Uttar Pradesh</b> is the state that has the highest overall and rural population in India. It has a rural population of approximately 15.51 crores that is 18.62% of the country's total rural population.</p><p>According to the 2011 Census of India, Maharashtra had the highest urban population in India with 50.8 million people living in urban areas</p>",

  {
    "question": "<span class=\"eqt\"><p>Which of the following is true?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">GNP = GDP - Net factor income from abroad</span><span class=\"hqt\" style=\"display:none\">GNP = GDP - &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2344;&#2367;&#2357;&#2354; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351;</span>",
      "<span class=\"eqt\">NDP = GDP - Net factor income from abroad</span><span class=\"hqt\" style=\"display:none\">NDP = GDP - &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2344;&#2367;&#2357;&#2354; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351;</span>",
      "<span class=\"eqt\">GNP = GDP + Net factor income from abroad</span><span class=\"hqt\" style=\"display:none\">GNP = GDP + &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2344;&#2367;&#2357;&#2354; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351;</span>",
      "<span class=\"eqt\">NDP = GDP + Net factor income from abroad</span><span class=\"hqt\" style=\"display:none\">NDP = GDP + &#2357;&#2367;&#2342;&#2375;&#2358; &#2360;&#2375; &#2344;&#2367;&#2357;&#2354; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct relationship between Gross National Product (GNP) and Gross Domestic Product (GDP) is <b>GNP = GDP + Net Factor Income from Abroad (NFIA).</b></p><p>GDP measures the value of all final goods and services produced within the geographical boundaries of a country.</p><p>GNP measures the value of all final goods and services produced by the nationals of a country, regardless of their location.</p><p>Net Factor Income from Abroad (NFIA) is the difference between the income earned by a country's residents from foreign sources and the income paid to non-residents within the country. Adding this to the domestic product gives the total national product.</p><p>Further insights:</p><p>For a country like India, which has many citizens working abroad sending remittances, the GNP is typically higher than its GDP.</p><p>Conversely, for a country like Ireland, which hosts many multinational corporations, the GDP is significantly higher than its GNP because a large portion of the income generated domestically is sent abroad as profits.</p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>The Gandak river rises from:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2306;&#2337;&#2325; &#2344;&#2342;&#2368; &#2325;&#2361;&#2366;&#2305; &#2360;&#2375; &#2344;&#2367;&#2325;&#2354;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Nepal</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2375;&#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Bhutan</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2335;&#2366;&#2344;</span>",
      "<span class=\"eqt\">India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;</span>",
      "<span class=\"eqt\">Tibet</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2367;&#2348;&#2381;&#2348;&#2340;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Gandak River, also known as the Narayani in southern Nepal, originates from the Nhubine Himal Glacier in the Mustang region of <b>Nepal.</b></p><p>Its source is located near the border of Tibet, but it is firmly within Nepalese territory. The river then flows south through Nepal before entering India in the state of Bihar.</p><p>Explanation of Other Options:</p><p>Bhutan: Rivers like the Manas and Sankosh originate in or flow through Bhutan.</p><p>India: While the Gandak flows through India, it does not originate there.</p><p>Tibet: The source of the Gandak is near the Tibetan border, but the actual glacier is in Nepal. Major rivers like the Brahmaputra (Yarlung Tsangpo) and Indus rise in Tibet.</p><p>Further insights:</p><p>The Gandak is a major left-bank tributary of the Ganges river in India.</p><p>The river's basin is known for its rich biodiversity and is home to the Chitwan National Park in Nepal and the Valmiki National Park in India.</p><p>It is one of the major river systems of Nepal.</p>",
    "question_index": 32
  },

\" style=\"border:1px solid black;padding:5px;\">The Languages</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ninth Schedule</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Validation of Acts and Regulations</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tenth Schedule</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">\"Anti-defection\" provisions for the Members of Parliament and the Members of the State Legislatures</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Eleventh Schedule</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Panchayat Raj</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Eleventh Schedule</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Municipalities</td></tr></table>",

    "question": "<span class=\"eqt\"><p>In August 2024, which state government launched Maiya Samman Yojana to provide financial aid to women?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2327;&#2360;&#2381;&#2340; 2024 &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2379; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2376;&#2351;&#2366; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368;?</p></span>",

    "solution": "<p>The Saansad Adarsh Gram Yojana (SAGY) was launched by Prime Minister Narendra Modi on <b>11th October 2014.</b></p><p>The launch date coincides with the birth anniversary of the social reformer and political leader, Jayaprakash Narayan.</p><p>Further insights:</p><p>The primary objective of SAGY is rural development. Under this scheme, each Member of Parliament (MP) is encouraged to identify and develop one village from their constituency as a model village (Adarsh Gram) by 2016, and two more by 2019.</p><p>The scheme focuses on the holistic development of the village, covering aspects like infrastructure, health, education, sanitation, environment, and social harmony. It is a demand-driven and community-participatory program.</p>",

    "question": "<span class=\"eqt\"><p>In January 2025, Prime Minister Narendra Modi inaugurated the Z-Morh tunnel in _________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2357;&#2352;&#2368; 2025 &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2344;&#2352;&#2375;&#2306;&#2342;&#2381;&#2352; &#2350;&#2379;&#2342;&#2368; &#2344;&#2375; _________ &#2350;&#2375;&#2306; &#2332;&#2375;&#2337;-&#2350;&#2379;&#2337;&#2364; &#2360;&#2369;&#2352;&#2306;&#2327; &#2325;&#2366; &#2313;&#2342;&#2381;&#2328;&#2366;&#2335;&#2344; &#2325;&#2367;&#2351;&#2366;&#2404;</p></span>",
    "options": [

    ],
    "correct_option_id": 3,
    "solution": "<p>Prime Minister Narendra Modi inaugurated the Z-Morh tunnel in Jammu and Kashmir's Sonamarg area.</p><p>Located at an altitude of 8500 feet above the sea level, the tunnel will provide year-round connectivity between Srinagar and the famous tourist destination of Sonamarg by circumventing treacherous roads often blocked by landslides and avalanches.</p><p>The &#8377;2700 crore strategic Sonamarg tunnel project extending 12 kilometers in total, includes an egress tunnel, roads, bridges and the 6.4-kilometer Z-Morh tunnel, now renamed the Sonamarg tunnel, will connect the Valley with Ladakh.</p><p></p><p></p><p></p><p></p><p></p><p></p>",

    "question": "<span class=\"eqt\"><p>Shivaji was crowned the title of Chatrapati in which of the following years?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2367;&#2357;&#2366;&#2332;&#2368; &#2325;&#2379; &#2331;&#2340;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2360;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1674</span><span class=\"hqt\" style=\"display:none\">1674</span>",

      "<span class=\"eqt\">1708</span><span class=\"hqt\" style=\"display:none\">1708</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Shivaji Maharaj was crowned on <b>June 6, 1674,</b> in a grand ceremony at the Raigad fort.</p><p>During this coronation (Rajyabhishek), he formally adopted the title of 'Chatrapati' (sovereign emperor), establishing the Maratha Empire as a formal, independent, and sovereign state.</p><p>Further insights:</p><p>The coronation was a significant event as it legitimized Maratha rule and established a Hindu sovereign kingdom in a period dominated by Mughal and other Islamic sultanates.</p><p>The ceremony was performed by Gaga Bhatt, a renowned pandit from Varanasi.</p>",

    "question": "<span class=\"eqt\"><p>Which classical dance form includes related styles such as 'Alarippu', 'Jatiswaram', and 'Varnanritya'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2344;&#2371;&#2340;&#2381;&#2351; &#2358;&#2376;&#2354;&#2368; &#2350;&#2375;&#2306; '&#2309;&#2354;&#2366;&#2352;&#2367;&#2346;&#2381;&#2346;&#2369;', '&#2332;&#2340;&#2367;&#2360;&#2381;&#2357;&#2352;&#2350;' &#2324;&#2352; '&#2357;&#2352;&#2381;&#2339;&#2344;&#2371;&#2340;&#2381;&#2351;' &#2332;&#2376;&#2360;&#2368; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2358;&#2376;&#2354;&#2367;&#2351;&#2366;&#2305; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Odishi</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2358;&#2368;</span>",
      "<span class=\"eqt\">Bharatanatyam</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2352;&#2340;&#2344;&#2366;&#2335;&#2381;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Kuchipudi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2330;&#2367;&#2346;&#2369;&#2337;&#2364;&#2368;</span>",
      "<span class=\"eqt\">Sattriya</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2381;&#2340;&#2381;&#2352;&#2367;&#2351;&#2366; &#2344;&#2371;&#2340;&#2381;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>- These are part of the <b>Bharatanatyam</b> dance form.</p><p>&bull; <b>Alarippu</b>  -  an invocatory piece, typically the opening dance</p><p>&bull; <b>Jatiswaram</b>  -  a pure dance (nritta) sequence with rhythmic syllables</p><p>&bull; <b>Varnam</b> (not <i>Varnanritya</i>)  -  the central, most elaborate piece combining nritta and abhinaya</p><p>Explanation of Other Options:</p><p>Odishi: This classical dance from Odisha has its own distinct repertoire, including items like Mangalacharan, Batu, Pallavi, Abhinaya, and Moksha.</p><p>Kuchipudi: Originating from Andhra Pradesh, its repertoire includes items like Manduka Shabdam (story of a frog), Tarangam (dancing on the edge of a brass plate), and Jala Chitra Nrityam (drawing pictures on the floor with toes).</p><p>Sattriya: This dance form from Assam includes components like 'gayan-bayan' and various 'bhaonas' (dance-dramas).</p><p>Further insights:</p><p>Bharatanatyam is one of the oldest classical dance forms in India, originating in the temples of Tamil Nadu.</p><p>The modern repertoire of Bharatanatyam was largely codified by the Tanjore Quartet in the 19th century.</p><p>The performance sequence, known as 'margam', is designed to take the dancer and the audience on a spiritual journey.</p>",
    "question_index": 39
  },

    "question": "<span class=\"eqt\"><p>Select the<b> incorrect</b> statement regarding mountain passes of the peninsular India. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2366;&#2351;&#2342;&#2381;&#2357;&#2368;&#2346;&#2368;&#2351; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2352;&#2381;&#2357;&#2340;&#2368;&#2351; &#2342;&#2352;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; <b>&#2327;&#2354;&#2340;</b> &#2325;&#2341;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">Haldighati connects Rajasmand and Pali districts in Rajasthan.</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2354;&#2381;&#2342;&#2368;&#2328;&#2366;&#2335;&#2368; &#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2360;&#2350;&#2306;&#2342; &#2324;&#2352; &#2346;&#2366;&#2354;&#2368; &#2332;&#2367;&#2354;&#2379;&#2306; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Bhorghat joins Mumbai with Thane.</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2379;&#2352;&#2328;&#2366;&#2335; &#2350;&#2369;&#2306;&#2348;&#2312; &#2325;&#2379; &#2336;&#2366;&#2339;&#2375; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Palghat joins Coimbatore with Kochi.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2354;&#2328;&#2366;&#2335; &#2325;&#2379;&#2351;&#2306;&#2348;&#2335;&#2370;&#2352; &#2325;&#2379; &#2325;&#2379;&#2330;&#2381;&#2330;&#2367; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"

    "correct_option_id": 2,
    "solution": "<p>Passes of the peninsular India  -  </p><p>Haldighati  -  It is located in the Aravalli range. It connects Rajasmand and Pali districsts of Rajasthan.</p><p>Thalghat  -  It is located in the Sahyadri range. It connects Nashik and Mumbai.</p><p>Bhorghat  -  It is located in the western ghats. <b>It joins Mumbai with Pune</b>.</p><p>Palghat  -  It is located in the western ghats. It connects Coimbatore with Kochi and Kozhikode. </p>",

    "question": "<span class=\"eqt\"><p>The continuous clear sounding recitation aloud of the approved word 'Kabaddi' within the course of one respiration shall be called___________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2358;&#2381;&#2357;&#2366;&#2360; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2360;&#2381;&#2357;&#2368;&#2325;&#2371;&#2340; &#2358;&#2348;&#2381;&#2342; '&#2325;&#2348;&#2337;&#2381;&#2337;&#2368;' &#2325;&#2366; &#2354;&#2327;&#2366;&#2340;&#2366;&#2352; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335; &#2343;&#2381;&#2357;&#2344;&#2367; &#2357;&#2366;&#2354;&#2366; &#2313;&#2330;&#2381;&#2330;&#2366;&#2352;&#2339; _______ &#2325;&#2361;&#2354;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Cant</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2306;&#2335;</span>",
      "<span class=\"eqt\">Raid</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2376;&#2337;</span>",
      "<span class=\"eqt\">Anti Raid</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2335;&#2368; &#2352;&#2376;&#2337;</span>",
      "<span class=\"eqt\">Guilt</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2367;&#2354;&#2381;&#2335;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Terms related to Kabaddi:-</p><p>&#183; The continuous clear-sounding recitation aloud of the approved word 'Kabaddi' within the course of one respiration shall be called <b>cant.</b></p><p>&#183; One who enters the court of the opponent with the cant is known as a raider. The raider must begin his cant before he touches the opponent's court.</p><p>&#183; Every player of the party in whose court the raid is being made shall be called an anti-raider or anti.</p><p>&#183; When the raider enters the court of the opponent with cant, it is known as a raid.</p>",

  },

    "question": "<span class=\"eqt\"><p>Under which article, remedies for enforcement of rights conferred by Part III are provided?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2327; III &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2342;&#2340;&#2381;&#2340; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2354;&#2366;&#2327;&#2370; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2313;&#2346;&#2366;&#2351; &#2325;&#2367;&#2360; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 21</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 21</span>",
      "<span class=\"eqt\">Article 32</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32</span>",
      "<span class=\"eqt\">Article 226</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 226</span>",
      "<span class=\"eqt\">Article 14</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 14</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Article 32</b> of the Indian Constitution, titled \"Right to Constitutional Remedies,\" provides the mechanism for the enforcement of Fundamental Rights, which are listed in Part III of the Constitution.</p><p>This article empowers every citizen to move the Supreme Court of India directly if their Fundamental Rights are violated.</p><p>Because it makes the other rights effective, Dr. B.R. Ambedkar called Article 32 the \"heart and soul of the Constitution.\"</p><p>Explanation of Other Options:</p><p>Article 21: This is a fundamental right itself (\"Protection of life and personal liberty\"), not the remedy for its violation.</p><p>Article 226: This article empowers the High Courts to issue writs for the enforcement of Fundamental Rights and for \"any other purpose.\" While it is a crucial remedy, Article 32 is the fundamental right within Part III that guarantees the remedy.</p><p>Article 14: This is the fundamental right to \"equality before law.\"</p><p>Further insights:</p><p>Under Article 32, the Supreme Court can issue five types of writs: Habeas Corpus, Mandamus, Prohibition, Certiorari, and Quo Warranto.</p><p>The right to move the Supreme Court under Article 32 cannot be suspended except as otherwise provided for by the Constitution (e.g., during a national emergency).</p>",
    "question_index": 42
  },
  {
    "question": "<span class=\"eqt\"><p>Buiya is a folk dance of which of the following states?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2369;&#2311;&#2351;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2354;&#2379;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Himachal Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2350;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Madhya Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2381;&#2351; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Arunachal Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Andhra Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Buiya is a traditional folk dance of <b>Arunachal Pradesh.</b></p><p>It is performed by the Digaru Mishmi community, one of the major tribes of the state.</p><p>The dance is an integral part of their cultural festivities, including Duiya, Tanuya, and Tazampu festivals, which are celebrated with great fervor.</p><p>Explanation of Other Options:</p><p>Himachal Pradesh: Known for folk dances like Nati, Kharait, and Chamba.</p><p>Madhya Pradesh: Famous for folk dances such as Jawara, Matki, and Grida.</p><p>Andhra Pradesh: While Kuchipudi is its classical dance, its folk dances include Dappu, Tappeta Gullu, and Lambadi.</p><p>Further insights:</p><p>Arunachal Pradesh, known as the \"Land of the Dawn-Lit Mountains,\" has a rich tribal culture, with each tribe having its own unique set of dances, music, and traditions.</p><p>Other famous folk dances of Arunachal Pradesh include Aji Lamu, Chalo, Hiirii Khaniing, Popir, and Ponung.</p>",
    "question_index": 43
  },

    "options": [
      "<span class=\"eqt\">Times Now Group</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2366;&#2311;&#2350;&#2381;&#2360; &#2344;&#2366;&#2313; &#2327;&#2381;&#2352;&#2369;&#2346;</span>",
      "<span class=\"eqt\">The Hindu Group</span><span class=\"hqt\" style=\"display:none\">&#2342; &#2361;&#2367;&#2306;&#2342;&#2370; &#2327;&#2381;&#2352;&#2369;&#2346;</span>",

      "<span class=\"eqt\">Telegraph</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2354;&#2368;&#2327;&#2381;&#2352;&#2366;&#2347;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Sportstar is a popular Indian sports magazine published by <b>The Hindu Group.</b></p><p>It started as a weekly publication in 1978 and is one of the most respected sports journals in the country, known for its in-depth coverage of a wide range of sports.</p><p>Explanation of Other Options:</p><p>Times Now Group: This primarily refers to the broadcast arm (Times Network) of The Times Group. The Times Group's flagship print publication is The Times of India newspaper.</p><p>Indian Express: This company publishes The Indian Express, The Financial Express, and Loksatta newspapers.</p><p>Telegraph: The Telegraph newspaper is published by the Ananda Bazar Patrika (ABP) Group.</p><p>Further insights:</p><p>The Hindu Group, officially Kasturi & Sons Ltd., is a Chennai-based publishing company. Its flagship publication is the daily newspaper, The Hindu.</p><p>Other publications from The Hindu Group include The Hindu BusinessLine (a business daily), and Frontline (a fortnightly current affairs magazine).</p>",

    "question": "<span class=\"eqt\"><p>The SI unit of Impulse is given as_____</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2357;&#2375;&#2327; &#2325;&#2366; SI &#2350;&#2366;&#2340;&#2381;&#2352;&#2325; _____ &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",

      "<span class=\"eqt\">ms<sup>-1</sup></span><span class=\"hqt\" style=\"display:none\">ms<sup>-1</sup></span>",

    "question": "<span class=\"eqt\"><p>Somnath Borah Oja is an eminent musician associated with which of the following musical instruments?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2379;&#2350;&#2344;&#2366;&#2341; &#2348;&#2379;&#2352;&#2366; &#2323;&#2332;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2326;&#2381;&#2351;&#2366;&#2340; &#2360;&#2306;&#2327;&#2368;&#2340;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2306;&#2327;&#2368;&#2340; &#2357;&#2366;&#2342;&#2381;&#2351;&#2351;&#2306;&#2340;&#2381;&#2352; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sitar</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2340;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Dhol</span><span class=\"hqt\" style=\"display:none\">&#2338;&#2379;&#2354;</span>",
      "<span class=\"eqt\">Sarangi</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2306;&#2327;&#2368;</span>",
      "<span class=\"eqt\">Flute</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2306;&#2360;&#2369;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Somnath Borah Oja is an internationally acclaimed <b>dhol exponent.</b></p><p>The title \"Oja\" signifies a master or expert in a traditional art form.</p><p>He was conferred the title 'Bihu Samrat' in 2022 by the Lakhimpur district unit of Asom Jatiyatabadi Yuba Parishad (AJYP) for his relentless contribution to Bihu culture.</p><p>Further insights:</p><p>Notably, Somnath Borah managed to win first prize in dhol badan competition in 1964 when he was only three years old.</p><p>He achieved the Oja title as a dhol exponent in 1981.</p><p>Moreover, he has introduced the dhol, the unique musical instrument of the Assamese culture, on national and international platforms with his proficiency after Moghai Oja.</p><p>He has been conducting training on dhol badan, husari and Bihu dance in Lakhimpur district for six years in the Bihu workshops organized by the Lakhimpur district unit of AJYP.</p>",
    "question_index": 46
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following act was passed in 2013 in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2357;&#2352;&#2381;&#2359; 2013 &#2350;&#2375;&#2306; &#2346;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">The Maternity Benefit Act</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2360;&#2370;&#2340;&#2367; &#2346;&#2381;&#2352;&#2360;&#2369;&#2357;&#2367;&#2343;&#2366; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Muslim Women (Protection of rights on divorce) Act</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2360;&#2381;&#2340;&#2381;&#2352;&#2368; (&#2357;&#2367;&#2357;&#2366;&#2361; &#2357;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2346;&#2352; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339;) &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">The Indecent Representation of Women (Prohibition) Act</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2340;&#2381;&#2352;&#2368; &#2309;&#2358;&#2367;&#2359;&#2381;&#2335; &#2352;&#2370;&#2346;&#2339; (&#2346;&#2381;&#2352;&#2340;&#2367;&#2359;&#2375;&#2343;) &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">The Sexual Harassment of Women at Workplace (Prevention, Prohibition and Redressal) Act</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2360;&#2381;&#2341;&#2354; &#2346;&#2352; &#2354;&#2376;&#2306;&#2327;&#2367;&#2325; &#2313;&#2340;&#2381;&#2346;&#2368;&#2337;&#2364;&#2344; (&#2344;&#2367;&#2357;&#2366;&#2352;&#2339;, &#2346;&#2381;&#2352;&#2340;&#2367;&#2359;&#2375;&#2343; &#2319;&#2357;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2340;&#2379;&#2359;) &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>The Sexual Harassment of Women at Workplace (Prevention, Prohibition and Redressal) Act,</b> commonly known as the POSH Act, was passed by the Parliament of India in 2013.</p><p>This legislation was enacted to create a safe and secure working environment for women, free from sexual harassment, and to provide a mechanism for the redressal of complaints.</p><p>Explanation of Other Options:</p><p>a) The Maternity Benefit Act: This was originally enacted in 1961. It was recently amended in 2017.</p><p>b) Muslim Women (Protection of rights on divorce) Act: This was enacted in 1986.</p><p>c) The Indecent Representation of Women (Prohibition) Act: This was also enacted in 1986.</p><p>Further insights:</p><p>The POSH Act, 2013, was a culmination of a long struggle that gained momentum after the Supreme Court's landmark judgment in the Vishakha and others v. State of Rajasthan case in 1997.</p><p>The judgment laid down the \"Vishakha Guidelines,\" which were legally binding until the formal legislation was passed in 2013.</p><p>A key feature of the Act is the mandatory establishment of an Internal Complaints Committee (ICC) at every workplace with 10 or more employees.</p>",
    "question_index": 47
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following festivals means 'Merry making of the Gods'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2340;&#2381;&#2351;&#2380;&#2361;&#2366;&#2352; &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&#2342;&#2375;&#2357;&#2340;&#2366;&#2323;&#2306; &#2325;&#2366; &#2310;&#2350;&#2379;&#2342;-&#2346;&#2381;&#2352;&#2350;&#2379;&#2342;' (&#2350;&#2376;&#2352;&#2368; &#2350;&#2375;&#2325;&#2367;&#2306;&#2327; &#2321;&#2347; &#2342; &#2327;&#2377;&#2337;&#2381;&#2360;) &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Diwali</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2357;&#2366;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Lal Haraoba</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354; &#2361;&#2352;&#2379;&#2348;&#2366;</span>",
      "<span class=\"eqt\">Pongal</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2306;&#2327;&#2354;</span>",
      "<span class=\"eqt\">Makar Sankranti</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2325;&#2352; &#2360;&#2306;&#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Lai Haraoba</b> is a ritualistic festival of the Meitei people of Manipur.</p><p>The term \"Lai Haraoba\" literally translates from the Meitei language as \"Merry making of the Gods.\"</p><p>The festival is a celebration of the deities (Lai) and involves traditional music, dance, and rituals that re-enact the creation of the universe.</p><p>Explanation of Other Options:</p><p>Diwali: Known as the \"Festival of Lights,\" it symbolizes the victory of good over evil.</p><p>Pongal: A multi-day harvest festival celebrated by Tamils, particularly in Tamil Nadu. It is a form of thanksgiving to nature.</p><p>Makar Sankranti: A harvest festival that marks the sun's transit into the Capricorn (Makara) zodiac sign, signaling the arrival of longer days.</p><p>Further insights:</p><p>Lai Haraoba is a very ancient festival, deeply rooted in the pre-Vaishnavite traditions of Manipur.</p><p>The Maibis (priestesses) are the main performers who lead the rituals and dances, narrating the stories of creation and the lives of the deities.</p>",
    "question_index": 48
  },

    ],
    "correct_option_id": 1,
    "solution": "<p>To determine the change in oxidation state, we analyze hydrogen on both sides of the reaction:</p><p>Reactant (H&#8322;): Hydrogen is in its elemental, diatomic form (H&#8322;). The oxidation state of any element in its standard elemental form is 0.</p><p>Product (H&#8322;O): In the water molecule, oxygen typically has an oxidation state of -2. Since the overall charge of the H&#8322;O molecule is neutral (0), the sum of the oxidation states of its atoms must be zero. If 'x' is the oxidation state of hydrogen, then 2(x) + (-2) = 0. Solving for x, we get 2x = 2, which means x = +1.</p><p>Therefore, the oxidation state of hydrogen changes from 0 in H&#8322; to +1 in H&#8322;O.</p><p>Further insights:</p><p>This reaction is a classic example of a redox (reduction-oxidation) reaction.</p><p>Oxidation: Hydrogen is oxidized because its oxidation state increases (from 0 to +1).</p><p>Reduction: Oxygen is reduced because its oxidation state decreases (from 0 in O&#8322; to -2 in H&#8322;O).</p>",
    "question_index": 49
  },

    "question": "<span class=\"eqt\"><p> If a six-digit number 3x7z8y is divisible by 7, 11, 13, then the average value of x, y, z is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2331;&#2361; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 3x7z8y, 7, 11, 13 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; x, y, z &#2325;&#2366; &#2324;&#2360;&#2340; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",

    "solution": "<p>\"</p><p>As we know,</p><p>LCM of 7, 11 and 13 is 1001</p><p>Any number of the form abcabc is always divisible by 1001</p><p>So,</p><p>abcabc will be divisible by 7, 11 and 13.</p><p>Comparing with given number, we find</p><p>x = 8, z = 3 and y = 7</p><p>Hence,sum of x + y + z = 8 + 3 + 7 = 18</p><p></p><p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-005321.png\"/></p><p>Average of x, y and z = 18/3 = 6\"</p>",

    "question": "<span class=\"eqt\"><p>A and B together can do a piece of work in 45 hours. If B can do the same piece of work in 60 hours, then find the time taken by A alone to do the 1/6<sup>th</sup> times of the same piece of work.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; A &#2324;&#2352; B &#2319;&#2325; &#2325;&#2366;&#2350; 45 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; B &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2350; &#2325;&#2379; 60 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2325;&#2375;&#2354;&#2375; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2350; &#2325;&#2366; 1/6 &#2327;&#2369;&#2344;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">45 days</span><span class=\"hqt\" style=\"display:none\">45 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">60 days</span><span class=\"hqt\" style=\"display:none\">60 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">30 days</span><span class=\"hqt\" style=\"display:none\">30 &#2342;&#2367;&#2344;</span>",

    "correct_option_id": 2,
    "solution": "<p>Total work = L.C.M of 45 and 60 = 180</p><p>Efficiency = Total work/ Time taken</p><p>Efficiency of A and B = 180/45 = 4</p><p>Efficiency of B = 180/60 = 3</p><p>Efficiency of A = 4  -  3 = 1 </p><p>Hence, the required time = (180 * 1/6)/1 = 30 days</p>",

    "question": "<span class=\"eqt\"><p>Two pipes A and B, can fill a tank with water in 36 hours and 12 hours respectively and a third pipe C, can empty it in 4 hours. If pipe A is opened at 12 PM, pipe B is opened at 2 PM, and pipe C is opened at 4 PM, the tank will be emptied at:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2346;&#2366;&#2311;&#2346; A &#2324;&#2352; B &#2319;&#2325; &#2335;&#2306;&#2325;&#2368; &#2325;&#2379; &#2346;&#2366;&#2344;&#2368; &#2360;&#2375; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 36 &#2324;&#2352; 12 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2319;&#2325; &#2340;&#2368;&#2360;&#2352;&#2366; &#2346;&#2366;&#2311;&#2346; C &#2313;&#2360;&#2375; 4 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2366;&#2311;&#2346; A &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 12 &#2348;&#2332;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2346;&#2366;&#2311;&#2346; B &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 2 &#2348;&#2332;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2366;&#2311;&#2346; C &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 4 &#2348;&#2332;&#2375; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2306;&#2325;&#2368; &#2325;&#2367;&#2340;&#2344;&#2375; &#2348;&#2332;&#2375; &#2326;&#2366;&#2354;&#2368; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">5: 00 PM</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 5 : 00 &#2348;&#2332;&#2375;</span>",
      "<span class=\"eqt\">5: 20 PM</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 5 : 20 &#2348;&#2332;&#2375;</span>",

      "<span class=\"eqt\">6: 00 PM</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344; 6 : 00 &#2348;&#2332;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Let the capacity of tank = LCM of 36, 12, and 4 = 36 units</p><p>Efficiency of pipe A = 36/36 = 1 unit per hour</p><p>Efficiency of pipe B = 36/12 = 3 units per hour</p><p>Efficiency of pipe C = 36/4 = 9 units per hour (emptying rate)</p><p>At 4 PM: 1 * 4 + 3 * 2 = 10 units have been filled.</p><p>At 4 PM, all three pipes are open.</p><p>Hence the net rate of work after 4 PM would be = 1 + 3  -  9 = -5 units per hour (emptying at the rate of 5 units per hour)</p><p>The tank will be emptied 2 hours after 4 PM ... (since 10/5 = 2)</p><p>Hence, tank will be emptied at 6: 00 PM.</p>",

    "question": "<span class=\"eqt\"><p>If a shopkeeper sold an article at 1/2<sup>nd</sup> of its original selling price, there was a loss of 20%, then find the profit percent incurred at the original selling price of the article.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2350;&#2370;&#2354; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2375; 1/2 &#2349;&#2366;&#2327; &#2346;&#2352; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; 20% &#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2313;&#2346;&#2327;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2375; &#2350;&#2370;&#2354; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">60%</span><span class=\"hqt\" style=\"display:none\">60%</span>",
      "<span class=\"eqt\">25%</span><span class=\"hqt\" style=\"display:none\">25%</span>",
      "<span class=\"eqt\">40%</span><span class=\"hqt\" style=\"display:none\">40%</span>",
      "<span class=\"eqt\">50%</span><span class=\"hqt\" style=\"display:none\">50%</span>"

    "correct_option_id": 0,
    "solution": "<p>Let the original selling price be Rs. 'S'.</p><p>A/Q</p><p>S/2 = C.P * (100  -  20)/100</p><p>S/2 = C.P * 80/100</p><p>S/2 = C.P * 4/5</p><p>C.P = 5S/8</p><p>Hence, the required profit = (S  -  5S/8) * 100/ (5S/8)</p><p>= 3S * 100/5S</p><p>= 60%</p>",

    "question": "<span class=\"eqt\"><p>A painter agrees to paint an area of 4128 sq. m in 24 days and employs 12 men. After 14 days he finds that only 1032 sq. m of the area is finished. How many more men should he employ to finish the work on time if all are now working 7/5 as many hours as before?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2375;&#2306;&#2335;&#2352; 4128 &#2357;&#2352;&#2381;&#2327; &#2350;&#2368;&#2335;&#2352; &#2357;&#2352;&#2381;&#2327; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2379; 12 &#2310;&#2342;&#2350;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2350;&#2342;&#2342; &#2360;&#2375; 24 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2375;&#2306;&#2335; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2360;&#2361;&#2350;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; 14 &#2342;&#2367;&#2344;&#2379;&#2306; &#2348;&#2366;&#2342; &#2357;&#2361; &#2346;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2375;&#2357;&#2354; 1032 &#2357;&#2352;&#2381;&#2327; &#2350;&#2368;&#2335;&#2352; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2346;&#2370;&#2352;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;&#2404; &#2313;&#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2324;&#2352; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;&#2379;&#2306; &#2325;&#2379; &#2325;&#2366;&#2350; &#2346;&#2352; &#2354;&#2327;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; &#2325;&#2366;&#2350; &#2360;&#2350;&#2351; &#2346;&#2352; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379; &#2332;&#2366;&#2319; &#2351;&#2342;&#2367; &#2357;&#2375; &#2309;&#2348; &#2346;&#2361;&#2354;&#2375; &#2360;&#2375; 7/5 &#2327;&#2369;&#2344;&#2366; &#2309;&#2343;&#2367;&#2325; &#2328;&#2306;&#2335;&#2375; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">20 men</span><span class=\"hqt\" style=\"display:none\">20 &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;</span>",
      "<span class=\"eqt\">24 men</span><span class=\"hqt\" style=\"display:none\">24 &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;</span>",
      "<span class=\"eqt\">16 men</span><span class=\"hqt\" style=\"display:none\">16 &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;</span>",
      "<span class=\"eqt\">18 men</span><span class=\"hqt\" style=\"display:none\">18 &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Work</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Men</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Days</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hours</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1032</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">12</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">14</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">n</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3096</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">?</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">10</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7n/5</td></tr></table> <p>Work = men x hours x days x working rate</p> <p>Let k be the working rate. Hence, we have:</p> <p>1032 = 12 x 14 x n x k (1)</p> <p>3096 = m x 10 x 7n/5 x k (2)</p> <p>(1) &div; (2) =&gt; 1/3 = 12/m</p> <p>=&gt; m = 36</p> <p>Therefore, 36-12 = 24 additional men are required.</p>",
    "question_index": 61
  },

    "question": "<span class=\"eqt\"><p>The quantity of water and milk is in the ratio of 5:7. If 24 liters of water is added to the mixture, the ratio becomes 7:5. Which of the following statement/s is/are true?</p><p>A: The initial quantity of milk in the mixture is 21 L.</p><p>B: The Initial quantity of water in the mixture is 25 L</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2344;&#2368; &#2324;&#2352; &#2342;&#2370;&#2343; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; 5:7 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; 24 &#2354;&#2368;&#2335;&#2352; &#2346;&#2366;&#2344;&#2368; &#2350;&#2367;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 7:5 &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A: &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2342;&#2370;&#2343; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; 21 &#2354;&#2368;&#2335;&#2352; &#2361;&#2376;&#2404;</p><p>B: &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; 25 &#2354;&#2368;&#2335;&#2352; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the quantity of water and milk be 5m and 7m respectively.</p><p>According to the question:</p><p>(5m+24)/7m = 7/5</p><p>25m + 120 = 49m</p><p>24m = 120</p><p>m = 5</p><p>So, Initial quantity of water = 5* 5 = 25 litres</p><p>And initial quantity of milk = 7 * 5 = 35 Litres</p><p>Hence only statement B is ture.</p>",
    "question_index": 62
  },

    "question": "<span class=\"eqt\"><p><b>Direction:</b> Given here is a multiple bar diagram depicting the sales of Milk of four brands from 2011-2014. Study the diagram and answer the questions.</p><p><b><img width=576 height=336 id=\"Chart 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/63923/image017.png\"></b></p><p>In which brand was there a regular decrease in sales?</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;:</b> &#2351;&#2361;&#2366;&#2306; 2011-2014 &#2340;&#2325; &#2330;&#2366;&#2352; &#2348;&#2381;&#2352;&#2366;&#2306;&#2337;&#2379;&#2306; &#2325;&#2375; &#2342;&#2370;&#2343; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2319;&#2325;&#2366;&#2343;&#2367;&#2325; &#2342;&#2306;&#2337; &#2310;&#2352;&#2375;&#2326; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2310;&#2352;&#2375;&#2326; &#2325;&#2366; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/63923/image017.png\" style=\"font-weight: bold;\"></p><p>&#2325;&#2367;&#2360; &#2348;&#2381;&#2352;&#2366;&#2306;&#2337; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2325;&#2350;&#2368; &#2361;&#2369;&#2312;?</p></span>",

    "question": "<span class=\"eqt\"><p>If (sec<sup>2</sup> 5&#952; - 1)(1  -  tan 2&#952; tan 3&#952;) = (tan 2&#952; + tan 3&#952;) cot[2(&#952; - 25)], then find the value of &#952;.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (sec<sup>2</sup> 5&#952; - 1)(1 - tan 2&#952; tan 3&#952;) = (tan 2&#952; + tan 3&#952;) cot[2(&#952; - 25)] &#2361;&#2376;, &#2340;&#2379; &#952; &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;:</p></span>",
    "options": [

    "solution": "<p>(sec<sup>2</sup> 5&#952; - 1)(1  -  tan 2&#952; tan 3&#952;) = (tan 2&#952; + tan 3&#952;) cot[2(&#952; - 25)]</p><p>=&gt; tan<sup>2</sup> 5&#952; = [(tan 2&#952; + tan 3&#952;)/(1  -  tan 2&#952; tan 3&#952;)] tan[90  -  (2&#952; - 50)]</p><p>=&gt; tan<sup>2</sup> 5&#952; = tan (2&#952; + 3&#952;) tan[90  -  (2&#952; - 50)]</p><p>=&gt; tan 5&#952; = tan[90  -  (2&#952; - 50)]</p><p>=&gt; 5&#952; = 90 - 2&#952; + 50</p><p>=&gt; 7&#952; = 140</p><p>=&gt; &#952; = 20&deg;</p>",
    "question_index": 64

    "question": "<span class=\"eqt\"><p>In a triangle ABC, I is the incentre of the triangle and angle bisector of &#8736;BIC meets the line BC at D. If &#8736;BID = 55&deg; then find the value of &#8736;BAC.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; ABC &#2350;&#2375;&#2306;, I &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2366; &#2309;&#2344;&#2381;&#2340;&#2307;&#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352; &#2361;&#2376; &#2340;&#2341;&#2366; &#8736;BIC &#2325;&#2366; &#2325;&#2379;&#2339; &#2360;&#2350;&#2342;&#2381;&#2357;&#2367;&#2357;&#2367;&#2349;&#2366;&#2332;&#2325; &#2352;&#2375;&#2326;&#2366; BC &#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; D &#2346;&#2352; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#8736;BID = 55&deg; &#2361;&#2376;, &#2340;&#2379; &#8736;BAC &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
