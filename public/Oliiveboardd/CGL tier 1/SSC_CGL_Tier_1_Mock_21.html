    "correct_option_id": 2,
    "solution": "<p>Given:</p><p>A man walks a distance from point A to B at 18 km/h, and from point B to A at 24 km/h. He takes 7 hours to complete the journey.</p><p>Concept used:</p><p>Time = distance/speed</p><p>Calculation:</p><p>Let the distance between A to B be x km.</p><p>According to the question,</p><p>x/18 + x/24 = 7</p><p>&rarr; 7x/72 = 7</p><p>The distance between point A to B is 72 km.</p>",

    ],
    "correct_option_id": 2,
    "solution": "<p>Let total capacity of tank = LCM of 28 and 42 = 84 units</p><p>Efficiency of pipe P = 84/28 = 3 units per min</p><p>Efficiency of pipe Q = 84/42 = 2 units per min</p><p>In first 2 minutes total tank filled = 5 units</p><p>In 32 minutes, total tank filled = 80 units</p><p>In 33<sup>rd</sup> minutes, pipe P filled 3 units.</p><p>Remaining 1 unit will be filled by pipe Q in &frac12; = 0.5 min</p><p>Total time = 32 + 1 + 0.5 = 33.5 min.</p>",

    "question": "<span class=\"eqt\"><p>A took a loan of Rs. 5000 from B at 5% rate of simple interest and B give the total amount received after 2 years to C at 10% rate of simple interest for 3 years. Find the total interest amount earned by B. </p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2344;&#2375; B &#2360;&#2375; 5% &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; 5000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2315;&#2339; &#2354;&#2367;&#2351;&#2366; &#2324;&#2352; B &#2344;&#2375; 2 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2369;&#2354; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; C &#2325;&#2379; 10% &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; 3 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2375; &#2342;&#2368;&#2404; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2369;&#2354; &#2348;&#2381;&#2351;&#2366;&#2332; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

    "solution": "<p>Interest earned after 2 years = (5000 * 5 * 2)/100 = Rs. 500</p><p>Amount after 2 years = 5000 + 500 = 5500</p><p>Interest earned from C = (5500 * 10 * 3)/100 = Rs. 1650</p><p>Amount after 5 years = 5500 + 1650 = Rs. 7150</p><p>Total interest = Rs. (7150  -  5000) = Rs. 2150</p>",

    "question": "<span class=\"eqt\"><p>The base of a pyramid is an equilateral triangle of side 4&radic;3 cm. Find the lateral surface area of pyramid, if the slant edge of pyramid is 4 cm.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2366; &#2310;&#2343;&#2366;&#2352;, 4&radic;3 cm &#2349;&#2369;&#2332;&#2366; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2368; &#2340;&#2367;&#2352;&#2381;&#2351;&#2325; &#2349;&#2369;&#2332;&#2366; &#2325;&#2366; &#2350;&#2366;&#2344; 4cm &#2361;&#2376;, &#2340;&#2379; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2366; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">6&radic;3 sq. cm</span><span class=\"hqt\" style=\"display:none\">6&radic;3 sq. cm</span>",

    "question": "<span class=\"eqt\"><p>In a &#8710;ABC, lengths of sides opposite to &#8736;A, &#8736;B and &#8736;C are 'b + c', 'a + c' and 'a + b' respectively. Angle bisector of &#8736;A meets BC at D, then find the length of BD.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#8710;ABC &#2350;&#2375;&#2306;, &#8736;A, &#8736;B &#2324;&#2352; &#8736;C &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2311;&#2351;&#2366;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 'b + c', 'a + c' &#2324;&#2352; 'a + b' &#2361;&#2376;&#2306;&#2404; &#8736;A &#2325;&#2366; &#2325;&#2379;&#2339; &#2360;&#2350;&#2342;&#2381;&#2357;&#2367;&#2349;&#2366;&#2332;&#2325;, BC &#2360;&#2375; D &#2346;&#2352; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379;, BD &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">[a + b]/[a + b + c]</span><span class=\"hqt\" style=\"display:none\">[a + b]/[a + b + c]</span>",
      "<span class=\"eqt\">[a + b + c]/[2a + b + c]</span><span class=\"hqt\" style=\"display:none\">[a + b + c]/[2a + b + c]</span>",
      "<span class=\"eqt\">[(a + b) (b + c)]/[2a + b + c]</span><span class=\"hqt\" style=\"display:none\">[(a + b) (b + c)]/[2a + b + c]</span>",
      "<span class=\"eqt\">[b (b + c)]/[2a + b + c]</span><span class=\"hqt\" style=\"display:none\">[b (b + c)]/[2a + b + c]</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=232 height=162 id=\"Picture 65\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11823/image015.png\"></p><p>BC = b + c</p><p>AC = a + c</p><p>AB = a + b</p><p><b>We know that:</b> When angle bisector of &#8736;A meets BC at D, then AB: BD = AC: CD.</p><p>Let BD = x, CD = (b + c)  -  x</p><p><img width=119 height=43 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11823/image016.png\"></p><p>(a + b) (b + c)  -  x (a + b) = x (a + c)</p><p>(a + b) (b + c) = x (a + b + a + c)</p><p>(a + b) (b + c) = x (2a + b + c)</p><p><img width=149 height=41 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11823/image017.png\"></p>",

    "question": "<p>The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer.</p><p>The positivity rate is the proportion of / samples that returns positive, which is / indicative of the spread of the infection.</p>",

      "No error",
      "samples that returns positive, which is"
    ],
    "correct_option_id": 3,
    "solution": "<p>The verb that comes after the relative pronoun 'that' should be used according to the antecedent (the noun before the relative pronoun). In the given sentence, the verb should be used according to the plural noun 'samples'. Therefore, the singular verb 'returns' should be replaced with the base verb 'return' to rectify the given sentence. </p><p>Therefore, the error is in the part in option (d). </p><p>Hence, option (d) is the correct answer. </p><p><b>The correct sentence is:</b> The positivity rate is the proportion of samples that <b>return</b> positive, which is indicative of the spread of the infection.</p><p><b>Note:</b></p><p><b>Relative pronouns: </b>A relative pronoun is used to connect a clause or phrase to a noun or pronoun. The clause modifies, or describes, the noun. The most common relative pronouns are who, whom, whose, which, and that. For example: She is the girl who received the award for bravery from our Home Minister.</p><p><b>Subject-Verb Agreement:</b> Matching up singular or plural subjects with singular or plural forms of a verb is part of the process called agreement. This can be understood better by the examples given: - \"She likes cooking.\" [singular subject and verb] -- \"They like to cook vegetables.\" [plural subject and verb]</p>",
    "question_index": 78

    "question": "<p>The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer.</p><p>If you send me a letter of love, / I will give you a free painting in / the medium of yours choice.</p>",

      "the medium of yours choice",

    "correct_option_id": 2,
    "solution": "<p>'Your' is a possessive adjective that means \"relating to or belonging to you.\" 'Yours' is a possessive pronoun that means \"that which belongs to you\". The phrase 'yours choice' is incorrect as we cannot use a noun immediately after a possessive pronoun. But we can use the possessive adjective before a noun. Therefore, the phrase 'your choice' is grammatically correct. </p><p>Therefore, the error is in the part in option (c). </p><p>Hence, option (c) is the correct answer. </p><p><b>The correct sentence is:</b> If you send me a letter of love, I will give you a free painting in the medium of <b>your</b> choice.</p><p><b>Note: </b></p><p><b>Possessive Pronouns: </b>The pronouns mine, yours, hers, his, ours, and theirs are known as possessive pronouns: they refer to something owned by the speaker or by someone or something previously mentioned. For example: The pen is mine.</p><p><b>Possessive Determiners/Adjectives:</b> Words like <b><i>'my', 'our', 'your', 'his', 'her', 'its'</i></b>, and <b><i>'their'</i></b> are known as possessive adjectives (or possessive determiners). They come before nouns and <b>indicate ownership</b> of the noun. <b>Example:</b> \"The teacher asked the students to open <b><i>their</i></b> drawing books.\"</p>",

    "question": "<p>Select the option that expresses the given sentence in positive degree of comparison. </p><p>After months of dedicated training, her body had become noticeably stronger.</p>",

    "solution": "<p>To convert the given sentence into a positive degree of comparison, we need to express the idea of increased strength without using a comparative form like \"stronger.\" The key is to focus on the improvement without making a direct comparison.</p><p>Option (a)  -  This option uses the comparative form \"more strong,\" which goes against the requirement to avoid using comparatives. </p><p>Option (b)- This option removes the comparative form and uses her description as \"strong body\" to describe the improvement in strength without making a direct comparison. This matches the requirement for a positive degree of comparison. </p><p>Option (c)- This option uses the superlative form \"the strongest\". It doesn't fit the requirement for a positive degree of comparison.</p><p>Option (d) - This option introduces the comparative \"stronger\" and adds another quality \"firmer,\" which doesn't accurately reflect the original sentence's focus on increased strength alone.</p><p>Considering the analysis, option (b) is the correct answer. It rephrases the original sentence in a positive degree of comparison while maintaining the focus on the improved strength. </p><p><b>Note: </b>&#183; <b>The Positive Degree</b> is used to denote the mere existence of some quality of what we speak about. It is used when no comparison is made.</p><p>&#183; <b>The Comparative degree</b> denotes a higher degree of quality than the positive and is used when two things are compared.</p><p>&#183; <b>The Superlative degree</b> indicates the highest degree of quality and is used when more than two things (or sets of things) are compared.</p>",

  },
