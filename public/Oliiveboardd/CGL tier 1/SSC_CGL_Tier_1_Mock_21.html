<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cgl1 - Responsive Exam Interface</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="60">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Select the figure that will come in place of the question mark (?) in the following series.</p><p><img width=423 height=119 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22218/image014.jpg\"></p><p><img width=533 height=134 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22218/image015.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2351;&#2375;&#2327;&#2368;&#2404;</p><p><img width=\"423\" height=\"119\" id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22218/image014.jpg\"></p><p><img width=\"533\" height=\"134\" id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22218/image015.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>As per the observation, in each step, two ends of the figure are joined by using one inclined line. Also, is dot is placed near the inclined line. </p><p>So, figure III will be the next figure in the given series. </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Select the letter-cluster from among the given options that can replace the question mark (?) in the following series.</p><p>FGH, IKM, ?, UYC, DIN</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2309;&#2325;&#2381;&#2359;&#2352;-&#2360;&#2350;&#2370;&#2361; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>FGH, IKM, ?, UYC, DIN</p></span>",
    "options": [
      "<span class=\"eqt\">NRV</span><span class=\"hqt\" style=\"display:none\">NRV</span>",
      "<span class=\"eqt\">NPS</span><span class=\"hqt\" style=\"display:none\">NPS</span>",
      "<span class=\"eqt\">NQR</span><span class=\"hqt\" style=\"display:none\">NQR</span>",
      "<span class=\"eqt\">NQT</span><span class=\"hqt\" style=\"display:none\">NQT</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Here, the pattern is: </p><p>For the 1<sup>st</sup> term: F + 1 = G, G + 1 = H, H + 1 = I</p><p>For the 2<sup>nd</sup> term: I + 2 = K, K + 2 = M, M + 1 = N</p><p><b>For the 3<sup>rd</sup> term: N + 3 = Q, Q + 3 = T, </b>T + 1 = U</p><p>For the 4<sup>th</sup> term: U + 4 = Y, Y + 4 = C, C + 1 = D</p><p>For the 5<sup>th</sup> term: D + 5 = I, I + 5 = N</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'BEAR' is coded as '7058', 'RIDE' is coded as '8245' and 'CARD' is coded as '6478'. What will be the sum of the codes of 'E' and 'A' in the given code language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'BEAR' &#2325;&#2379; '7058' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, 'RIDE' &#2325;&#2379; '8245' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 'CARD' &#2325;&#2379; '6478' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2344; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'E' &#2324;&#2352; 'A' &#2325;&#2375; &#2325;&#2379;&#2337; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>'BEAR' is coded as '7058' ------(I)</p><p>'RIDE' is coded as '8245' ------(II)</p><p>'CARD' is coded as '6478' -----(III)</p><p>From I, II and III, R = 8</p><p>From I and II, E = 5</p><p>From II and III, D = 4</p><p>From I and III, A = 7</p><p>From I, B = 0</p><p>From II, I = 2</p><p>From III, C = 6</p><p>So, E + A = 5 + 7 = 12</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following numbers will replace the question mark (?) in the given series?</p><p>142, 285, 572, ?, 2298, 4601</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2375;&#2327;&#2368;?</p><p>142, 285, 572, ?, 2298, 4601</p></span>",
    "options": [
      "<span class=\"eqt\">1742</span><span class=\"hqt\" style=\"display:none\">1742</span>",
      "<span class=\"eqt\">1147</span><span class=\"hqt\" style=\"display:none\">1147</span>",
      "<span class=\"eqt\">1915</span><span class=\"hqt\" style=\"display:none\">1915</span>",
      "<span class=\"eqt\">2001</span><span class=\"hqt\" style=\"display:none\">2001</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>142 x 2 = 284; 284 + 1 = 285</p><p>285 x 2 = 570; 570 + 2 = 572</p><p>572 x 2 = 1144; 1144 + 3 = <b>1147</b></p><p>1147 x 2 = 2294; 2294 + 4 = 2298</p><p>2298 x 2 = 4596; 4596 + 5 = 4601</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Study the given pattern carefully and select the number that can replace the question mark (?) in it.</p><p>11 (359) 8; 7 (254) 9; 20 (527) ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2376;&#2335;&#2352;&#2381;&#2344; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2311;&#2360;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>11 (359) 8; 7 (254) 9; 20 (527) ?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>11 + 8 = 19 and 19<sup>2</sup>  -  2 = 361  -  2 = 359</p><p>7 + 9 = 16 and 16<sup>2</sup>  -  2 = 256  -  2 = 254</p><p>20 + 3 = 23 and 23<sup>2</sup>  -  2 = 529  -  2 = 527</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>&radic;256 is related to 8 following a certain logic. Following the same logic, &radic;484 is related to 11. To which of the following is &radic;196 related to, following the same logic?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2352;&#2381;&#2325; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &radic;256, 8 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2340;&#2352;&#2381;&#2325; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319;, &radic;484, 11 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2340;&#2352;&#2381;&#2325; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319;, &radic;196 &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>",
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&radic;256 is related to 8. &radic;256 = 16. So, 16 is related to 8.</p><p>&radic;484 is related to 11. &radic;484 = 22. So, 22 is related to 11.</p><p>Here, the pattern is:</p><p>16 = 8*2</p><p>22 = 11*2</p><p>Thus, &radic;196 = 14. So, 14 = 7*2</p><p>Therefore, &radic;196 is related to 7.</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Choose the alternative which most closely resembles the water image of the given figure.</p><p><img width=165 height=157 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25023/image013.png\"></p><p><img width=223 height=652 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25023/image014.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2375; &#2332;&#2354; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2306;&#2348; &#2325;&#2375; &#2360;&#2350;&#2368;&#2346;&#2360;&#2381;&#2341; &#2360;&#2342;&#2371;&#2358; &#2361;&#2379;&#2404;</p><p><img width=\"165\" height=\"157\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25023/image013.png\"></p><p><img width=\"223\" height=\"652\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25023/image014.png\"></p></span>",
    "options": [

    "correct_option_id": 1,

  {

  {
    "question": "<span class=\"eqt\"><p>In the given question, which two numbers should be interchanged to make the given equation correct? </p><p><b>7 x 11 + 18 &div; 3 - 12 x 2 + 5 = 73 </b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2325;&#2367;&#2344; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2340;&#2366;&#2325;&#2367; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2375;?</p><p><b>7 x 11 + 18 &div; 3 - 12 x 2 + 5 = 73 </b></p></span>",

    "question": "<span class=\"eqt\"><p>If 13<sup>th</sup> January 1896 was Monday, then the day on 15<sup>th</sup> January 1902 was _____. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 13 &#2332;&#2344;&#2357;&#2352;&#2368; 1896 &#2325;&#2379; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2341;&#2366;, &#2340;&#2379; 15 &#2332;&#2344;&#2357;&#2352;&#2368; 1902 &#2325;&#2379; _____ &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Tuesday</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Friday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>It is given that, 13<sup>th</sup> January 1988 was Wednesday. </p><p>We know that, year 1896 was a leap year but <b>the year 1900 was a normal year.</b> </p><p>So, period starting from 13<sup>th</sup> January 1896 to 13<sup>th</sup> January 1902, there was 1 leap year and 5 normal years.</p><p>We know that, there are 2 odd days in a leap year and 1 odd day in a normal year. So, 1 * 2 + 5 * 1 = 2 + 5 = 7. So, 7 odd days. </p><p>If we divide, 7 by 7, then remainder will be 0. So, 0 odd days.</p><p>So, 13<sup>th</sup> January 1902 = Monday. </p><p>Thus, 15<sup>th</sup> January 1902 will be Wednesday. </p>",
    "question_index": 10
  },

    "question": "<span class=\"eqt\"><p>By interchanging the given two numbers (not digits), which of the following equation will be correct?</p><p>14 and 47</p><p>I. 126 &div; 3  -  14 + 11  X  47 = 149</p><p>II. 47  X  11  -  14 + 80 &div; 16 = 112</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; (&#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2344;&#2361;&#2368;&#2306;) &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2375; &#2346;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379;&#2327;&#2366;?</p><p>14 &#2324;&#2352; 47</p><p>I. 126 &div; 3 - 14 + 11 X 47 = 149</p><p>II. 47 X 11 - 14 + 80 &div; 16 = 112</p></span>",

;padding:5px;\">Z</td></tr></table><p>PART -- 16 + 1 + 18 + 20 - 4 = 51. NOT -- 14 + 15 + 20 - 3 = 46. </p><p>Hence, LIGHT -- 12 + 9 + 7 + 8 + 20 - 5 = <b>51. </b></p>",

    "question": "<span class=\"eqt\"><p>In the question given below, some statements are given followed by some conclusions. You have to take the given statements to be true even if they seem to be at variance from the commonly known facts. Read the conclusions and decide which of the given conclusions logically follows from the given statements disregarding the commonly known facts.</p><p><b>Statements:</b></p><p>Some colours are paints.</p><p>Some tints are paints. </p><p><b>Conclusions:</b></p><p>I. No colours are tints.</p><p>II. All paints can be colours.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2325;&#2341;&#2344; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2369;&#2331; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#2361;&#2376;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2357;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2379;&#2306;&#2404; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2342;&#2367;&#2319; &#2327;&#2319; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#23     "question": "<span class=\"eqt\"><p>'A + B' means 'A is the father of B'</p><p>'A - B' means 'A is the son of B'</p><p>'A  X  B' means 'A is the wife of B'</p><p>'A &div; B' means 'A is the brother of B'</p><p>As per which of the following expressions 'Q is the daughter-in-law of T'?</p></span><span class=\"hqt\" style=\"display:none\"><p>'A + B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'</p><p>'A - B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;'</p><p>'A X B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;'</p><p>'A &div; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;'</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; 'Q, T &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2357;&#2343;&#2370; &#2361;&#2376;'?</p></span>",

      "<span class=\"eqt\">P  -  Q &div; R + S  X  T</span><span class=\"hqt\" style=\"display:none\">P - Q &div; R + S X T</span>",
      "<span class=\"eqt\">P &div; Q  X  R + S &div; T</span><span class=\"hqt\" style=\"display:none\">P &div; Q X R + S &div; T</span>",

    "solution": "<p>Option (a): P + Q  X  R &div; S  -  T</p><p>P + Q means 'P is the father of Q'</p><p>Q  X  R means 'Q is the wife of R'</p><p>R &div; S means 'R is the brother of S'</p><p>S  -  T means 'S is the son of T'</p><p><img width=289 height=128 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25407/image015.png\"></p><p>Q is the daughter-in-law of T.</p><p>Option (b): P  -  Q &div; R + S  X  T</p><p>P  -  Q means 'P is the son of Q'</p><p>Q &div; R means 'Q is the brother of R'</p><p>R + S means 'R is the father of S'</p><p>S  X  T means 'S is the wife of T'</p><p><img width=285 height=122 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25407/image016.png\"></p><p>Q is the brother of T's father-in-law.</p><p>Option (c): P &div; Q  X  R + S &div; T</p><p>P &div; Q means 'P is the brother of Q'</p><p>Q  X  R means 'Q is the wife of R'</p><p>R + S means 'R is the father of S'</p><p>S &div; T means 'S is the brother of T'</p><p><img width=286 height=93 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25407/image017.png\"></p><p>Q is the mother of T.</p><p>Option (d): P  X  Q  -  R &div; S + T</p><p>P  X  Q means 'P is the wife of Q'</p><p>Q  -  R means 'Q is the son of R'</p><p>R &div; S means 'R is the brother of S'</p><p>S + T means 'S is the father of T'</p><p><img width=308 height=100 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25407/image018.png\"></p><p>Q is the cousin of T.</p><p>Thus, the answer is option (a).</p>",

    "question": "<span class=\"eqt\"><p>Mallikarjun Mansur, who belonged to the Jaipur-Atrauli gharana, was awarded which of the following award in 1992?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2351;&#2346;&#2369;&#2352;-&#2309;&#2340;&#2352;&#2380;&#2354;&#2368; &#2328;&#2352;&#2366;&#2344;&#2375; &#2360;&#2375; &#2340;&#2366;&#2354;&#2381;&#2354;&#2369;&#2325; &#2352;&#2326;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2350;&#2354;&#2381;&#2354;&#2367;&#2325;&#2366;&#2352;&#2381;&#2332;&#2369;&#2344; &#2350;&#2306;&#2360;&#2370;&#2352; &#2325;&#2379; &#2357;&#2352;&#2381;&#2359; 1992 &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Padma Bhushan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2381;&#2350; &#2349;&#2370;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Bharat Ratna</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2352;&#2340;&#2381;&#2344;</span>",
      "<span class=\"eqt\">Padma Shri</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2381;&#2350; &#2358;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Padma Vibhushan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2342;&#2381;&#2350; &#2357;&#2367;&#2349;&#2370;&#2359;&#2339;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Pandit Mallikarjun Bheemaraayappa Mansur was a Hindustani classical singer from Karnataka. He sang in the khyal genre and belonged to the Jaipur-Atrauli gharana.</p><p>He received Padma Shri in 1970, Padma Bhushan in 1976, and Padma Vibhushan in 1992. In 1982, he was awarded the Sangeet Natak Akademi Fellowship.</p><p></p><p></p>",

    "question": "<span class=\"eqt\"><p>What was the impact of British colonialism on India's textile industry? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2346;&#2337;&#2364;&#2366; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2346;&#2352; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2313;&#2346;&#2344;&#2367;&#2357;&#2375;&#2358;&#2357;&#2366;&#2342; &#2325;&#2366; &#2325;&#2381;&#2351;&#2366; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2346;&#2337;&#2364;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Growth and modernization</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2325;&#2366;&#2360; &#2324;&#2352; &#2310;&#2343;&#2369;&#2344;&#2367;&#2325;&#2368;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Decline and deindustrialization</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2367;&#2352;&#2366;&#2357;&#2335; &#2324;&#2352; &#2357;&#2367;&#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2368;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">No significant change</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2357;&#2367;&#2358;&#2375;&#2359; &#2348;&#2342;&#2354;&#2366;&#2357; &#2344;&#2361;&#2368;&#2306;</span>",
      "<span class=\"eqt\">Increased competition</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2346;&#2352;&#2381;&#2343;&#2366; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>British colonial policies severely impacted India's textile industry.</p><p>The imposition of heavy tariffs, restrictions on Indian textile exports, and the flooding of cheap British textiles led to the decline and deindustrialization of India's once-thriving textile sector.</p><p>Indian weavers lost their livelihoods, and India transformed from a major textile exporter to a supplier of raw materials for British industries.</p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>______ is expenditure incurred for purposes other than the creation of physical or financial assets of the central government.</p></span><span class=\"hqt\" style=\"display:none\"><p>______ &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2349;&#2380;&#2340;&#2367;&#2325; &#2351;&#2366; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2360;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2375; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2309;&#2344;&#2381;&#2351; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2357;&#2381;&#2351;&#2351; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Capital Expenditure</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351;</span>",
      "<span class=\"eqt\">Revenue Expenditure</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351;</span>",
      "<span class=\"eqt\">Plan Expenditure</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2379;&#2332;&#2344;&#2366;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351;</span>",
      "<span class=\"eqt\">Non-plan Expenditure</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2379;&#2332;&#2344;&#2375;&#2340;&#2352; &#2357;&#2381;&#2351;&#2351;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Revenue Expenditure</b> is expenditure incurred for purposes other than the creation of physical or financial assets of the central government.</p><p>It relates to those expenses incurred for the normal functioning of the government departments and various services, interest payments on debt incurred by the government, and grants given to state governments and other parties (even though some of the grants may be meant for creation of assets).</p><p></p><p>Further insights:</p><p>Capital Expenditure: This is spent on creating physical or financial assets, such as infrastructure development, building construction, or purchasing machinery.</p><p>Plan Expenditure: This refers to spending outlined in the government's five-year plans, which can include both capital and revenue expenditures.</p><p>Non-plan Expenditure: This includes expenses that are not part of the five-year plans, such as interest payments, pensions, and subsidies, but it is a broader term and not specifically defined by the absence of asset creation.</p><p></p>",
    "question_index": 28
  },
  {
    "question": "<span class=\"eqt\"><p>What is the name of the scheme launched by the Haryana Cabinet to provide jobs to 5,000 youths in the first phase?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2352;&#2367;&#2351;&#2366;&#2339;&#2366; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2350;&#2306;&#2337;&#2354; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2361;&#2354;&#2375; &#2330;&#2352;&#2339; &#2350;&#2375;&#2306; 5,000 &#2351;&#2369;&#2357;&#2366;&#2323;&#2306; &#2325;&#2379; &#2344;&#2380;&#2325;&#2352;&#2368; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2366; &#2344;&#2366;&#2350; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Haryana Youth Employment Scheme</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2367;&#2351;&#2366;&#2339;&#2366; &#2351;&#2369;&#2357;&#2366; &#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2351;&#2379;&#2332;&#2344;&#2366;</span>",
      "<span class=\"eqt\">IT Employment Initiative</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;&#2335;&#2368; &#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2346;&#2361;&#2354;</span>",
      "<span class=\"eqt\">Haryana Skill Development Program</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2367;&#2351;&#2366;&#2339;&#2366; &#2325;&#2380;&#2358;&#2354; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350;</span>",
      "<span class=\"eqt\">IT Saksham Yuva Scheme</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;&#2335;&#2368; &#2360;&#2325;&#2381;&#2359;&#2350; &#2351;&#2369;&#2357;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Haryana Cabinet gave nod to launch the IT Saksham Yuva Scheme, 2024, the target of which is to give jobs to 5,000 youths in the first phase.</p><p>Under this scheme, employment will be provided to the youths who are graduate or postgraduate applicants from IT backgrounds.</p><p>The aspirants will have to undertake the Haryana IT programme (specially designed short-term courses) for a minimum of three months after which they will be deployed in various departments, boards, corporations, districts, registered societies, etc., in Haryana or private entities.</p><p>The IT saksham yuva will be given '20,000, per month remuneration in the first six months and thereafter '25,000,' an official spokesperson said, adding in case any IT saksham yuva is not deployed, the state government will pay an unemployment allowance of '10,000 per month.</p><p>The scheme has been designed in accordance with the 'Mission 60,000' announced while presenting the 2024-25 budget proposals aiming to give employment to at least 60,000 young individuals from poor families.</p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>The Marmagao Port is situated in which estuary of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2352;&#2381;&#2350;&#2327;&#2366;&#2323; &#2348;&#2306;&#2342;&#2352;&#2327;&#2366;&#2361; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2367;&#2360; &#2332;&#2381;&#2357;&#2366;&#2352;&#2344;&#2342;&#2350;&#2369;&#2326; (&#2319;&#2360;&#2381;&#2330;&#2369;&#2319;&#2352;&#2368;) &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ambica</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2348;&#2367;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Madhuvanti</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2369;&#2357;&#2306;&#2340;&#2368;</span>",
      "<span class=\"eqt\">Tapi</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2366;&#2346;&#2368;</span>",
      "<span class=\"eqt\">Zuari</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2369;&#2310;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; Marmagao Port, situated at the entrance of the Zuari estuary, is a natural harbour in Goa. </p><p>&#183; It gained significance after its remodelling in 1961 to handle iron-ore exports to Japan. </p><p>&#183; Construction of Konkan railway has considerably extended the hinterland of this port. </p><p>&#183; Karnataka, Goa, Southern Maharashtra constitute its hinterland.</p>",
    "question_index": 30
  },

    "question": "<span class=\"eqt\"><p>Which is a slow cooking process that begins around 320&deg;F, removes water from a sugar and breaks down the sugar into complex polymers with a sweet, nutty, or bitter taste and thus produces a golden-brown to dark brown colour?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2319;&#2325; &#2343;&#2368;&#2350;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2326;&#2366;&#2344;&#2366; &#2346;&#2325;&#2366;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2361;&#2376; &#2332;&#2379; &#2354;&#2327;&#2349;&#2327; 320&deg;F &#2360;&#2375; &#2358;&#2369;&#2352;&#2370; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2358;&#2352;&#2381;&#2325;&#2352;&#2366; &#2360;&#2375; &#2346;&#2366;&#2344;&#2368; &#2344;&#2367;&#2325;&#2366;&#2354;&#2340;&#2368; &#2361;&#2376; &#2358;&#2352;&#2381;&#2325;&#2352;&#2366; &#2325;&#2379; &#2319;&#2325; &#2350;&#2368;&#2336;&#2375;,&#2330;&#2352;&#2346;&#2352;&#2375; (&#2344;&#2335;&#2381;&#2335;&#2368;) &#2351;&#2366; &#2325;&#2337;&#2364;&#2357;&#2375; &#2360;&#2381;&#2357;&#2366;&#2342; &#2357;&#2366;&#2354;&#2375; &#2332;&#2335;&#2367;&#2354; &#2348;&#2361;&#2369;&#2354;&#2325; (&#2346;&#2377;&#2354;&#2367;&#2350;&#2352;) &#2350;&#2375;&#2306; &#2357;&#2367;&#2328;&#2335;&#2367;&#2340; &#2325;&#2352; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2319;&#2325; &#2360;&#2369;&#2344;&#2361;&#2352;&#2375;-&#2349;&#2370;&#2352;&#2375; &#2360;&#2375; &#2327;&#2361;&#2352;&#2366; &#2349;&#2370;&#2352;&#2366; &#2352;&#2306;&#2327; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Gelatinisation</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2367;&#2354;&#2375;&#2335;&#2367;&#2344;&#2344; (Gelatinisation)</span>",
      "<span class=\"eqt\">Dextrinisation</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2376;&#2325;&#2381;&#2360;&#2335;&#2381;&#2352;&#2367;&#2344;&#2368;&#2325;&#2352;&#2339; (Dextrinisation)</span>",
      "<span class=\"eqt\">Caramelisation</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2381;&#2325;&#2352;&#2366;&#2342;&#2361;&#2344; (Caramelisation)</span>",
      "<span class=\"eqt\">Maillard reaction</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2376;&#2354;&#2366;&#2352;&#2381;&#2337; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; (Maillard reaction)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Caramelisation</b> is the oxidation of sugar, a process used extensively in cooking for the resulting nutty flavor and brown color.</p><p>Caramelization is a type of non-enzymatic browning reaction. As the process occurs, volatile chemicals are released producing the characteristic caramel flavor.</p><p>The reaction involves the removal of water (as steam) and the breakdown of the sugar. The caramelization reaction depends on the type of sugar.</p><p>Sucrose and glucose caramelize around 160C (320F) and fructose caramelizes at 110C (230F).</p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following performance begins with the kelikottu, calling the audience to attention followed by the todayam?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2344;&#2371;&#2340;&#2381;&#2351; &#2358;&#2376;&#2354;&#2368; &#2325;&#2366; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2375;&#2354;&#2367;&#2325;&#2379;&#2335;&#2335;&#2381; &#2360;&#2375; &#2310;&#2352;&#2350;&#2381;&#8205;&#2349; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2352;&#2381;&#2358;&#2325;&#2379;&#2306; &#2325;&#2379; &#2310;&#2325;&#2352;&#2381;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2340;&#2379;&#2337;&#2351;&#2350;&#2381; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bharatanatyam</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2352;&#2340;&#2344;&#2366;&#2335;&#2381;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Kathakali</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2325;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Kathak</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2325;</span>",
      "<span class=\"eqt\">Odissi</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2360;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A Kathakali performance begins with the kelikottu, calling the audience to attention followed by the todayam.</p><p>It is a devotional number performed where one or two characters invoke the blessings of the gods.</p><p>Kelikottu is the formal announcement of the performance done in the evening when drums and cymbals are played for a while in the courtyard.</p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>Who is the author of the book 'The Prisoner of Bhopal'?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2342; &#2346;&#2381;&#2352;&#2367;&#2332;&#2344;&#2352; &#2321;&#2347; &#2349;&#2379;&#2346;&#2366;&#2354;' &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2325;&#2375; &#2354;&#2375;&#2326;&#2325; &#2325;&#2380;&#2344; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tim Walker</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2367;&#2350; &#2357;&#2377;&#2325;&#2352;</span>",
      "<span class=\"eqt\">Vikram Seth</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2325;&#2381;&#2352;&#2350; &#2360;&#2375;&#2336;</span>",
      "<span class=\"eqt\">Arundhati Roy</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2352;&#2369;&#2306;&#2343;&#2340;&#2367; &#2352;&#2377;&#2351;</span>",
      "<span class=\"eqt\">Salman Rushdie</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2354;&#2350;&#2366;&#2344; &#2352;&#2369;&#2358;&#2381;&#2342;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In July 2024, renowned author Tim Walker released a novel titled 'The Prisoner of Bhopal' to mark the 40th anniversary of the Bhopal Gas Tragedy. The catastrophic event shook the world on the night of December 2-3, 1984.</p><p></p><p>Tim Walker took to writing children's novels at the age of 45 and became popular with his series of action-adventure stories published as a trilogy in 2007. The books -- Shipley Manor, The Flying Fizzler and Rise of the Rattler - unbottled his thoughts on everything, from corporate greed to religious extremism.</p><p></p><p>The award winning designer-turned author has now published his second book, which has a link with one of India's worst catastrophes, the Bhopal gas tragedy. Tim's book titled The Prisoner of Bhopal is a historical fiction novel based on the real incident, which he says he wrote for children of the present generation who were not a witness to the tragedy.</p>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>The First Meeting of All India Women's conference was held at______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2326;&#2367;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2361;&#2367;&#2354;&#2366; &#2360;&#2350;&#2381;&#2350;&#2375;&#2354;&#2344; &#2325;&#2368; &#2346;&#2361;&#2354;&#2368; &#2348;&#2376;&#2336;&#2325; ______ &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Lucknow</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2326;&#2344;&#2314;</span>",
      "<span class=\"eqt\">Pune</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2339;&#2375;</span>",
      "<span class=\"eqt\">Chennai</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2344;&#2381;&#2344;&#2312;</span>",
      "<span class=\"eqt\">Prayagraj</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2351;&#2366;&#2327;&#2352;&#2366;&#2332;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In January 1927 the delegates from the regional meetings gathered in <b>Poona (Pune)</b> at the first official meeting of the AIWC. The initial conference and the participation of women from a range of communities and backgrounds signified an important chapter in the development of the women's movement in India.</p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following about soil formation.</p><p></p><p>I. Soils don't contain the organic matter at all.</p><p></p><p>II. Dissimilar bedrocks may have similar soils.</p><p></p><p>Which of the above statements is/are incorrect?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2371;&#2342;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>I. &#2350;&#2371;&#2342;&#2366; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2348;&#2344;&#2367;&#2325; &#2346;&#2342;&#2366;&#2352;&#2381;&#2341; &#2348;&#2367;&#2354;&#2381;&#2325;&#2369;&#2354; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2310;&#2343;&#2366;&#2352; &#2358;&#2376;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2350;&#2371;&#2342;&#2366; &#2361;&#2379; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Statement I is incorrect and II is correct: Soil is a mixture of organic matter, minerals, gases, liquids, and organisms that together support life. There can be differences in soil over similar bedrock and dissimilar bedrocks may have similar soils above them.</p><p></p><p>Nature of weathering, rate and depth of weathering, parent materials are important factors in soil formation, which affects the soils over the bedrocks.</p>",
    "question_index": 35
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following folk dance is related to the state of Odisha?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2354;&#2379;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351; &#2323;&#2337;&#2367;&#2358;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Koli</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Ghumara</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2370;&#2350;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Damali</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2350;&#2366;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Dangi</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2366;&#2306;&#2327;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The folk dance related to the state of Odisha is Ghumara.</p><p>Ghumara is a traditional folk-dance form that originates from the Kalahandi district of Odisha, India. The dance involves a group of male dancers who form a circle and perform rhythmic steps and movements accompanied by drum beats and traditional musical instruments like the Ghumura, a percussion instrument shaped like a pot.</p>",
    "question_index": 36
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is a synthetic radioactive element in Group 15 of the periodic table and whose chemistry is yet to be established due to its very short half life and availability in very little amount?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2340;&#2340;&#2381;&#2357; &#2310;&#2357;&#2352;&#2381;&#2340; &#2360;&#2366;&#2352;&#2339;&#2368; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; 15 &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2367;&#2306;&#2341;&#2375;&#2335;&#2367;&#2325; (&#2325;&#2371;&#2340;&#2381;&#2352;&#2367;&#2350;) &#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2343;&#2352;&#2381;&#2350;&#2368; &#2340;&#2340;&#2381;&#2357; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344; &#2309;&#2352;&#2381;&#2343; &#2310;&#2351;&#2369; (&#2361;&#2366;&#2347; - &#2354;&#2366;&#2311;&#2347;) &#2324;&#2352; &#2309;&#2354;&#2381;&#2346; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2350;&#2375;&#2306; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2340;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2309;&#2349;&#2368; &#2340;&#2325; &#2311;&#2360;&#2325;&#2366; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2327;&#2369;&#2339;&#2343;&#2352;&#2381;&#2350; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2369;&#2310; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Bismuth</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2360;&#2381;&#2350;&#2341;</span>",
      "<span class=\"eqt\">Radium</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2337;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Iridium</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2352;&#2367;&#2337;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Moscovium</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2360;&#2381;&#2325;&#2379;&#2357;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Moscovium </b>is a synthetic radioactive element in Group 15 of the periodic table. Its symbol is Mc, atomic number 115, atomic mass 289 and electronic configuration [Rn] 5f 146d107s27p3. Due to very short half life and availability in very little amount, its chemistry is yet to be established.</p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are true about public goods?</p><p>I. Non-rivalrous in consumption </p><p>II. Excludable </p><p>III. Positive externalities</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2313;&#2346;&#2349;&#2379;&#2327; &#2350;&#2375;&#2306; &#2327;&#2376;&#2352;-&#2346;&#2381;&#2352;&#2340;&#2367;&#2342;&#2381;&#2357;&#2306;&#2342;&#2381;&#2357;&#2368;</p><p>II. &#2309;&#2346;&#2357;&#2352;&#2381;&#2332;&#2344;-&#2351;&#2379;&#2327;&#2381;&#2351;</p><p>III. &#2360;&#2325;&#2366;&#2352;&#2366;&#2340;&#2381;&#2350;&#2325; &#2348;&#2366;&#2361;&#2381;&#2351;&#2340;&#2366;&#2319;&#2305;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">I and III</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III</span><span class=\"hqt\" style=\"display:none\">II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Public goods</b> are characterized by two main properties: Non-rivalrous consumption and positive externalities.</p><p><b>Non-rivalrous in consumption:</b> This means that one person's consumption of a public good does not prevent others from also consuming it. For example, national defense benefits everyone simultaneously.</p><p><b>Excludability:</b> This characteristic is associated with private goods, not public goods. It means it's possible to prevent people from using a good.</p><p><b>Positive externalities:</b> Public goods often generate benefits for people who don't directly pay for them. For example, clean air and streetlights benefit everyone in a community.</p>",
    "question_index": 38
  },
  {
    "question": "<span class=\"eqt\"><p>All Asset Management Companies (AMCs) are regulated by which of the following bodies?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2349;&#2368; &#2360;&#2306;&#2346;&#2340;&#2381;&#2340;&#2367; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2366;&#2306; (AMCs) &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2344;&#2367;&#2325;&#2366;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">State Bank of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2381;&#2335;&#2375;&#2335; &#2348;&#2376;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Securities &amp; Exchange Board of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2381;&#2352;&#2340;&#2367;&#2349;&#2370;&#2340;&#2367; &#2324;&#2352; &#2357;&#2367;&#2344;&#2367;&#2350;&#2351; &#2348;&#2379;&#2352;&#2381;&#2337;</span>",
      "<span class=\"eqt\">National Stock Exchange</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2381;&#2335;&#2377;&#2325; &#2319;&#2325;&#2381;&#2360;&#2381;&#2330;&#2375;&#2306;&#2332;</span>",
      "<span class=\"eqt\">Insurance Regulatory and Development Authority</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;&#2350;&#2366; &#2357;&#2367;&#2325;&#2366;&#2360; &#2319;&#2357;&#2306; &#2344;&#2367;&#2351;&#2350;&#2344; &#2346;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>All Asset Management Companies (AMCs) are regulated by SEBI and the RBI (in case the AMC is promoted by a bank).</p><p>In addition, every mutual fund has a board of directors that represents the unit holder's interests in the mutual fund.</p><p>Asset management companies in India are broadly categorised into three types; bank-sponsored mutual funds, mutual fund institutions, and the private sector mutual funds. There are total 44 asset management companies in India.</p><p>35 of these AMCs are part of the private sector. All the asset management companies are part of Association of Mutual Funds in India (AMFI).</p><p>AMFI was incorporated in 1995 as a non-profit organisation of all the registered AMCs in India.</p>",
    "question_index": 39
  },
  {
    "question": "<span class=\"eqt\"><p>The Governor of an Indian state before entering upon his office takes an oath or affirmation before ________</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354; &#2309;&#2346;&#2344;&#2366; &#2346;&#2342;&#2349;&#2366;&#2352; &#2327;&#2381;&#2352;&#2361;&#2339; &#2325;&#2352;&#2344;&#2375; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; ________ &#2325;&#2375; &#2360;&#2350;&#2325;&#2381;&#2359; &#2358;&#2346;&#2341; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376; &#2351;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">the Chief Justice of the High Court exercising jurisdiction in relation to the State</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358;</span>",
      "<span class=\"eqt\">the President of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;</span>",
      "<span class=\"eqt\">the Chief Minister of the concerned state</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">the Prime Minister of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>According to the Constitution of India, the Governor of a state must take an oath or affirmation before the Chief Justice of the High Court exercising jurisdiction in relation to that state before entering upon their office. This oath ensures that the Governor will faithfully execute the office and uphold the Constitution.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>Which trophy is given to the winner of the Tour de France cycling race?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2335;&#2370;&#2352; &#2337;&#2368; &#2347;&#2381;&#2352;&#2366;&#2306;&#2360; &#2360;&#2366;&#2311;&#2325;&#2354;&#2367;&#2306;&#2327; &#2352;&#2375;&#2360; &#2325;&#2375; &#2357;&#2367;&#2332;&#2375;&#2340;&#2366; &#2325;&#2379; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2335;&#2381;&#2352;&#2377;&#2347;&#2368; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Yellow Jersey</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2354;&#2368; &#2332;&#2352;&#2381;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Green Jersey</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2368; &#2332;&#2352;&#2381;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Polka Dot Jersey</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2354;&#2381;&#2325;&#2366; &#2337;&#2377;&#2335; &#2332;&#2352;&#2381;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Rainbow Jersey</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2342;&#2381;&#2352;&#2343;&#2344;&#2369;&#2359; &#2332;&#2352;&#2381;&#2360;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Yellow Jersey is awarded to the overall leader in the general classification of the Tour de France, recognizing the rider with the lowest cumulative time. The general classification of the Tour de France is the most important classification of the race and determines the winner of the race. Since 1919, the leader of the general classification wears the yellow jersey.</p>",
    "question_index": 41
  },
  {
    "question": "<span class=\"eqt\"><p>Pandit Swapan Chaudhuri is associated with ___________ instrument.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2306;&#2337;&#2367;&#2340; &#2360;&#2381;&#2357;&#2346;&#2344; &#2330;&#2380;&#2343;&#2352;&#2368; &#2357;&#2366;&#2342;&#2381;&#2351; &#2351;&#2306;&#2340;&#2381;&#2352; ___________ &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Veena</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2368;&#2339;&#2366;</span>",

    "correct_option_id": 2,
    "solution": "<p>Pandit Swapan Chaudhuri, is an <b>Indian tabla player. </b>He has accompanied several musicians of Indian classical music, including, Pandit Ravi Shankar, Ustad Ali Akbar Khan, Ustad Vilayat Khan, Pandit Bhimshen Joshi, Pandit Jasraj., Ustad Amjad Ali Khan and many more.</p>",
    "question_index": 42
  },
  {
    "question": "<span class=\"eqt\"><p>As per Census 2011, what is the percentage growth of male population from 2001 to 2011?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2327;&#2339;&#2344;&#2366; 2011 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; 2001 &#2360;&#2375; 2011 &#2340;&#2325; &#2346;&#2369;&#2352;&#2369;&#2359; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2369;&#2312; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">16.68</span><span class=\"hqt\" style=\"display:none\">16.68</span>",
      "<span class=\"eqt\">18.12</span><span class=\"hqt\" style=\"display:none\">18.12</span>",
      "<span class=\"eqt\">17.19</span><span class=\"hqt\" style=\"display:none\">17.19</span>",
      "<span class=\"eqt\">19.25</span><span class=\"hqt\" style=\"display:none\">19.25</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The major highlights of the Census 2011 (Provisional figures) are as under:</p><p>- The population of India has increased by more than 181 million during the decade 2001-2011.</p><p>- Percentage growth in 2001-2011 is 17.64; males 17.19 and females 18.12.</p><p>- 2001-2011 is the first decade (with the exception of 1911-1921) which has actually added lesser population compared to the previous decade.</p><p>- Uttar Pradesh (199.5 million) is the most populous State in the country  followed by Maharashtra with 112 million.</p><p></p>",
    "question_index": 43
  },
  {
    "question": "<span class=\"eqt\"><p>The act of summoning a joint sitting of both the houses of parliament, which is headed by the speaker of Lok Sabha comes under the_____________ powers of the President of India.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2360;&#2342; &#2325;&#2375; &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2342;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2348;&#2376;&#2336;&#2325; &#2325;&#2379; &#2348;&#2369;&#2354;&#2366;&#2319; &#2332;&#2366;&#2344;&#2375; &#2324;&#2352; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2360;&#2325;&#2368; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;&#2340;&#2366; &#2325;&#2367;&#2351;&#2375; &#2332;&#2366;&#2344;&#2375; &#2325;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; _____________ &#2358;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2340;&#2361;&#2340; &#2310;&#2340;&#2366; &#2361;&#2376;|</p></span>",
    "options": [
      "<span class=\"eqt\">Legislative</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2343;&#2366;&#2351;&#2368;</span>",
      "<span class=\"eqt\">Financial</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Diplomatic</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2370;&#2335;&#2344;&#2368;&#2340;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Emergency</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2346;&#2366;&#2340;&#2325;&#2366;&#2354;&#2368;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>President is not a member of either House of the Parliament. But he is an integral part of the legislative process. He plays an important role in the making of laws. Legislative Powers of president are as follows-</p><p>(a) Summoning the House-The President can summon joint sitting of both Houses of Parliament. If there are differences between the two Houses, he can ask them to sit together to resolve those differences.</p><p>(b) Addressing the Houses-The President may address each House separately or he may address them jointly</p><p>(c) Sending Message-The President has the power to send messages to either House of Parliament either regarding any pending bill or any other matter.</p><p>(d) Nomination-The President nominates 12 members to the Rajya Sabha from among those who are eminently known in the fields of Literature, Science, Art or Social Services. He also nominates two members to the Lok Sabha from the Anglo-Indian community, if it is not properly represented in that House.</p><p>(e) Giving Assent to the Bill-No bill passed by the Parliament can become a law without the assent of the President. There are certain bills which cannot be introduced in the Parliament without the permission of the President</p><p>(f) Ordinance-The President has the power to promulgate ordinance during the recess of Parliament.</p><p>(g) Regulation of Union Territories-The President has the power to make regulations for the administration of Union Territories.</p>",
    "question_index": 44
  },
  {
    "question": "<span class=\"eqt\"><p>Playing against which country did Sachin Tendulkar score the hundredth hundred of international cricket?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2330;&#2367;&#2344; &#2340;&#2375;&#2306;&#2342;&#2369;&#2354;&#2325;&#2352; &#2344;&#2375; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2326;&#2375;&#2354;&#2340;&#2375; &#2361;&#2369;&#2319; &#2309;&#2306;&#2340;&#2352;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2325;&#2366; &#2360;&#2380;&#2357;&#2366;&#2306; &#2358;&#2340;&#2325; &#2348;&#2344;&#2366;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pakistan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2325;&#2367;&#2360;&#2381;&#2340;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Sri Lanka</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2368;&#2354;&#2306;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Bangladesh</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2306;&#2327;&#2381;&#2354;&#2366;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">England</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2327;&#2354;&#2376;&#2306;&#2337;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sachin Tendulkar scored his 100th international century against <b>Bangladesh</b> on March 16, 2012, during the Asia Cup in Mirpur, Dhaka. It was a milestone achievement in cricket history, making him the first player to score 100 international centuries (combined Test and ODI centuries).</p><p></p><p></p>",
    "question_index": 45
  },
  {
    "question": "<span class=\"eqt\"><p>Who published the logistic equation model of population growth in 1838?</p></span><span class=\"hqt\" style=\"display:none\"><p>1838 &#2350;&#2375;&#2306; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2366; &#2354;&#2377;&#2332;&#2367;&#2360;&#2381;&#2335;&#2367;&#2325; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2350;&#2377;&#2337;&#2354; &#2325;&#2367;&#2360;&#2344;&#2375; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Howard Thomas Odum</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2357;&#2352;&#2381;&#2337; &#2341;&#2377;&#2350;&#2360; &#2323;&#2337;&#2350;</span>",
      "<span class=\"eqt\">Alfred Russel Wallace</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2347;&#2381;&#2352;&#2375;&#2337; &#2352;&#2360;&#2375;&#2354; &#2357;&#2366;&#2354;&#2375;&#2360;</span>",
      "<span class=\"eqt\">George Evelyn Hutchinson</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2377;&#2352;&#2381;&#2332; &#2319;&#2357;&#2354;&#2367;&#2344; &#2361;&#2330;&#2367;&#2306;&#2360;&#2344;</span>",
      "<span class=\"eqt\">Pierre Franois Verhulst</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2351;&#2352;&#2375; &#2347;&#2381;&#2352;&#2366;&#2344;&#2379;&#2311;&#2360; &#2357;&#2352;&#2381;&#2361;&#2369;&#2354;&#2381;&#2360;&#2381;&#2335;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The logistic equation model of population growth was published by Pierre Franois Verhulst in 1838.</p><p>Verhulst, a Belgian mathematician, introduced this model to describe how populations grow more slowly as they approach a maximum limit, known as the carrying capacity.</p><p>The logistic equation is a refinement of the exponential growth model and is widely used in ecology and population biology.</p><p></p><p></p>",
    "question_index": 46
  },

    "question": "<span class=\"eqt\"><p>Match the Laws in List I with their applications in List II and select the correct answer from the codes given below.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List I (Laws)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">List II (Applications)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A. Pascal Laws</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Designing ships and submarines</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Archimedes' principle</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Hydraulic Brakes</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Bernoulli's principle</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. To fill bike's tires with air</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Boyle's Law</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. To calculate lift force on an aerofoil</td></tr></table><p>Codes:</p><p>A, B, C, D</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2330;&#2368; I &#2325;&#2375; &#2344;&#2367;&#2351;&#2350;&#2379;&#2306; &#2325;&#2379; &#2360;&#2370;&#2330;&#2368; II &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2381;&#2352;&#2351;&#2379;&#2327;&#2379;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2370;&#2335; &#2360;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\     "question": "<span class=\"eqt\"><p>Machine A can print a book in 24 min, machine B is 25% less efficient than A. With the help of machine C, all the three machines together can print that book in 8 min. Find the time taken by machine C alone to print that book.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2358;&#2368;&#2344; A &#2319;&#2325; &#2325;&#2367;&#2340;&#2366;&#2348; &#2325;&#2379; 24 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;, &#2350;&#2358;&#2368;&#2344; B, A &#2360;&#2375; 25% &#2325;&#2350; &#2325;&#2369;&#2358;&#2354; &#2361;&#2376;&#2404; &#2350;&#2358;&#2368;&#2344; C &#2325;&#2368; &#2350;&#2342;&#2342; &#2360;&#2375; &#2319;&#2325; &#2360;&#2366;&#2341; &#2340;&#2368;&#2344;&#2379;&#2306; &#2350;&#2358;&#2368;&#2344;&#2375;&#2306; &#2313;&#2360; &#2325;&#2367;&#2340;&#2366;&#2348; &#2325;&#2379; 8 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; &#2313;&#2360; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325; &#2325;&#2379; &#2346;&#2381;&#2352;&#2367;&#2306;&#2335; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2325;&#2375;&#2354;&#2375; &#2350;&#2358;&#2368;&#2344; C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

      "<span class=\"eqt\">16.2 min</span><span class=\"hqt\" style=\"display:none\">16.2 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">18.4 min</span><span class=\"hqt\" style=\"display:none\">18.4 &#2350;&#2367;&#2344;&#2335;</span>",

    "solution": "<p><img width=250 height=182 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21442/image002.jpg\"></p><p>In &#8710;ABD-</p><p>tan30&#730; = AD/BD</p><p>AD = y/&radic;3 ------(1)</p><p>In &#8710;ACD-</p><p>tan60&#730; = AD/CD</p><p>AD = (60-y)&radic;3 -----(2)</p><p>From equation (1) and (2)  - </p><p>y/&radic;3 = (60-y)&radic;3</p><p>y = 180  -  3y</p><p>y = 45</p><p>AD = 45/&radic;3 = 15&radic;3m</p>",

    "question": "<span class=\"eqt\"><p>A man walks a distance from point A to B at 18 km/h, and from point B to A at 24 km/h. If he takes 7 hours to complete the journey, then what is the distance from point A to B?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2367;&#2306;&#2342;&#2369; A &#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; B &#2340;&#2325; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 18 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2324;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; B &#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; A &#2340;&#2325; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 24 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2346;&#2376;&#2342;&#2354; &#2340;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2313;&#2360;&#2375; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 7 &#2328;&#2306;&#2335;&#2375; &#2325;&#2366; &#2360;&#2350;&#2351; &#2354;&#2327;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; A &#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; B &#2340;&#2325; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">72 km</span><span class=\"hqt\" style=\"display:none\">72 km</span>",
      "<span class=\"eqt\">15 km</span><span class=\"hqt\" style=\"display:none\">15 km</span>"
