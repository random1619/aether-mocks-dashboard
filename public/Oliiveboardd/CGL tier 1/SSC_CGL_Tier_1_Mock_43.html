  {
    "question": "<span class=\"eqt\"><p>We want to support the creation of a compelling experience hosted in the Gallery's innovation space, National Gallery X (NGX). Based around the National Gallery's collection and stories, we want the experience to go beyond the Gallery's walls and ignite wider media and public interest in climate change and household emissions, contributing to a popular movement to create cleaner, greener homes.</p><p>In light of the scenario mentioned above, what key decision should the project team of the Gallery emphasize to effectively engage both the media and the public, catalysing a more extensive movement towards environmentally conscious homes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2350; &#2327;&#2376;&#2354;&#2352;&#2368; &#2325;&#2375; &#2344;&#2357;&#2366;&#2330;&#2366;&#2352; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;, &#2344;&#2375;&#2358;&#2344;&#2354; &#2327;&#2376;&#2354;&#2352;&#2368; X (NGX) &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2319;&#2325; &#2310;&#2325;&#2352;&#2381;&#2359;&#2325; &#2309;&#2344;&#2369;&#2349;&#2357; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2350;&#2375;&#2306; &#2360;&#2361;&#2351;&#2379;&#2327; &#2325;&#2352;&#2344;&#2366; &#2330;&#2366;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2344;&#2375;&#2358;&#2344;&#2354; &#2327;&#2376;&#2354;&#2352;&#2368; &#2325;&#2375; &#2360;&#2306;&#2327;&#2381;&#2352;&#2361; &#2324;&#2352; &#2325;&#2361;&#2366;&#2344;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340;, &#2361;&#2350; &#2330;&#2366;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367; &#2351;&#2361; &#2309;&#2344;&#2369;&#2349;&#2357; &#2327;&#2376;&#2354;&#2352;&#2368; &#2325;&#2368; &#2342;&#2368;&#2357;&#2366;&#2352;&#2379;&#2306; &#2360;&#2375; &#2310;&#2327;&#2375; &#2348;&#2338;&#2364;&#2375; &#2324;&#2352; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2340;&#2341;&#2366; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2360;&#2352;&#2381;&#2332;&#2344; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2368;&#2337;&#2367;&#2351;&#2366; &#2324;&#2352; &#2332;&#2344;&#2361;&#2367;&#2340; &#2325;&#2379; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2360;&#2381;&#2357;&#2330;&#2381;&#2331; &#2324;&#2352; &#2361;&#2352;&#2367;&#2340; &#2328;&#2352; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2319;&#2325; &#2354;&#2379;&#2325;&#2346;&#2381;&#2352;&#2367;&#2351; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2379; &#2327;&#2340;&#2367; &#2350;&#2367;&#2354;&#2375;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2346;&#2352;&#2367;&#2342;&#2371;&#2358;&#2381;&#2351; &#2325;&#2375; &#2310;&#2354;&#2379;&#2325; &#2350;&#2375;&#2306;, &#2327;&#2376;&#2354;&#2352;&#2368; &#2325;&#2368; &#2346;&#2352;&#2367;&#2351;&#2379;&#2332;&#2344;&#2366; &#2335;&#2368;&#2350; &#2325;&#2379; &#2350;&#2368;&#2337;&#2367;&#2351;&#2366; &#2324;&#2352; &#2332;&#2344;&#2340;&#2366;, &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2368; &#2338;&#2306;&#2327; &#2360;&#2375; &#2358;&#2366;&#2350;&#2367;&#2354; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2332;&#2366;&#2327;&#2352;&#2370;&#2325; &#2328;&#2352;&#2379;&#2306; &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2350;&#2375;&#2306; &#2319;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2325;&#2379; &#2327;&#2340;&#2367; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2346;&#2352; &#2332;&#2364;&#2379;&#2352; &#2342;&#2375;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">Focus on informational content rather than visual aspects.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2371;&#2358;&#2381;&#2351; &#2346;&#2361;&#2354;&#2369;&#2323;&#2306; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2360;&#2370;&#2330;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2366;&#2350;&#2327;&#2381;&#2352;&#2368; &#2346;&#2352; &#2343;&#2381;&#2351;&#2366;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Utilize social media campaigns and influencers to ensure wide coverage.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2325;&#2357;&#2352;&#2375;&#2332; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2379;&#2358;&#2354; &#2350;&#2368;&#2337;&#2367;&#2351;&#2366; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344;&#2379;&#2306; &#2324;&#2352; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2358;&#2366;&#2354;&#2368; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Prioritize the installation of VR (Virtual Reality) to engage the audience.</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2352;&#2381;&#2358;&#2325;&#2379;&#2306; &#2325;&#2379; &#2310;&#2325;&#2352;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2357;&#2368;&#2310;&#2352; (&#2357;&#2352;&#2381;&#2330;&#2369;&#2309;&#2354; &#2352;&#2367;&#2351;&#2354;&#2367;&#2335;&#2368;) &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366; &#2342;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Exclude the public from the execution process to have a curated experience.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2369;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2309;&#2344;&#2369;&#2349;&#2357; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2359;&#2381;&#2346;&#2366;&#2342;&#2344; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2360;&#2375; &#2332;&#2344;&#2340;&#2366; &#2325;&#2379; &#2348;&#2366;&#2361;&#2352; &#2352;&#2326;&#2375;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Social media is a powerful tool for spreading awareness and encouraging public participation in such initiatives. Leveraging social media campaigns and influencers is a key decision that the project team should emphasize to effectively engage both the media and the public. This strategy ensures wide-reaching coverage and engagement, using the influence of social media platforms and influencers to amplify the project's message.</p><p>Let's analyse why the other options are incorrect:</p><p>Option (a): This option may hinder the effectiveness of the project. While informational content is important, a focus solely on information without considering visual aspects could result in a less engaging experience.</p><p>Option (c): While VR can be a valuable tool for engagement, prioritizing it without considering the broader context and potential accessibility issues may limit the reach of the initiative. VR experiences might not be universally accessible or preferred by all audience segments.</p><p>Option (d): Excluding the public from the execution process contradicts the goal of fostering a movement. Engaging the public in the process can create a sense of ownership and involvement, contributing to a more inclusive and impactful initiative. A curated experience without public participation may miss the opportunity to resonate with a broader audience.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Read the given scenario and answer the question that follows:</p><p>You are a Chartered Accountant at a big firm. A client proposes an aggressive accounting approach that maximizes short-term profit but raises ethical concerns and potential legal risks. You must decide whether to approve the approach considering the professional code of conduct, long-term client reputation, and potential consequences. Which option should you as the Chartered Accountant (CA) choose, taking into account legal regulations, industry standards, ethical codes, client needs, potential consequences, and the long-term impact on reputation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2352;&#2367;&#2342;&#2371;&#2358;&#2381;&#2351; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;:</p><p>&#2310;&#2346; &#2319;&#2325; &#2348;&#2337;&#2364;&#2368; &#2325;&#2306;&#2346;&#2344;&#2368; &#2350;&#2375;&#2306; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352;&#2381;&#2337; &#2309;&#2325;&#2366;&#2313;&#2306;&#2335;&#2375;&#2306;&#2335; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2325;&#2381;&#2354;&#2366;&#2311;&#2306;&#2335; &#2319;&#2325; &#2310;&#2325;&#2381;&#2352;&#2366;&#2350;&#2325; &#2354;&#2375;&#2326;&#2366; &#2346;&#2342;&#2381;&#2343;&#2340;&#2367; &#2325;&#2366; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357; &#2352;&#2326;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2309;&#2354;&#2381;&#2346;&#2325;&#2366;&#2354;&#2367;&#2325; &#2354;&#2366;&#2349; &#2325;&#2379; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2344;&#2376;&#2340;&#2367;&#2325; &#2330;&#2367;&#2306;&#2340;&#2366;&#2323;&#2306; &#2324;&#2352; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2332;&#2379;&#2326;&#2367;&#2350;&#2379;&#2306; &#2325;&#2379; &#2332;&#2344;&#2381;&#2350; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;&#2404; &#2310;&#2346;&#2325;&#2379; &#2346;&#2375;&#2358;&#2375;&#2357;&#2352; &#2310;&#2330;&#2366;&#2352; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;, &#2342;&#2368;&#2352;&#2381;&#2328;&#2325;&#2366;&#2354;&#2367;&#2325; &#2325;&#2381;&#2354;&#2366;&#2311;&#2306;&#2335; &#2346;&#2381;&#2352;&#2340;&#2367;&#2359;&#2381;&#2336;&#2366; &#2324;&#2352; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344; &#2350;&#2375;&#2306; &#2352;&#2326;&#2340;&#2375; &#2361;&#2369;&#2319; &#2351;&#2361; &#2340;&#2351; &#2325;&#2352;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366; &#2325;&#2367; &#2311;&#2360; &#2346;&#2342;&#2381;&#2343;&#2340;&#2367; &#2325;&#2379; &#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2351;&#2366; &#2344;&#2361;&#2368;&#2306;&#2404; &#2319;&#2325; &#2330;&#2366;&#2352;&#2381;&#2335;&#2352;&#2381;&#2337; &#2309;&#2325;&#2366;&#2313;&#2306;&#2335;&#2375;&#2306;&#2335; (&#2360;&#2368;&#2319;) &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306;, &#2310;&#2346;&#2325;&#2379; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2344;&#2367;&#2351;&#2350;&#2379;&#2306;, &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2350;&#2366;&#2344;&#2325;&#2379;&#2306;, &#2344;&#2376;&#2340;&#2367;&#2325; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366;&#2323;&#2306;, &#2325;&#2381;&#2354;&#2366;&#2311;&#2306;&#2335; &#2325;&#2368; &#2332;&#2364;&#2352;&#2370;&#2352;&#2340;&#2379;&#2306;, &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2379;&#2306; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2359;&#2381;&#2336;&#2366; &#2346;&#2352; &#2342;&#2368;&#2352;&#2381;&#2328;&#2325;&#2366;&#2354;&#2367;&#2325; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344; &#2350;&#2375;&#2306; &#2352;&#2326;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">Approve the Aggressive Accounting Approach.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2325;&#2381;&#2352;&#2366;&#2350;&#2325; &#2354;&#2375;&#2326;&#2366;&#2306;&#2325;&#2344; &#2342;&#2371;&#2359;&#2381;&#2335;&#2367;&#2325;&#2379;&#2339; &#2325;&#2379; &#2350;&#2306;&#2332;&#2370;&#2352;&#2368; &#2342;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Modify the Accounting Approach to Align with Ethical Standards.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2376;&#2340;&#2367;&#2325; &#2350;&#2366;&#2344;&#2325;&#2379;&#2306; &#2325;&#2375; &#2309;&#2344;&#2369;&#2352;&#2370;&#2346; &#2354;&#2375;&#2326;&#2366;&#2306;&#2325;&#2344; &#2342;&#2371;&#2359;&#2381;&#2335;&#2367;&#2325;&#2379;&#2339; &#2325;&#2379; &#2360;&#2306;&#2358;&#2379;&#2343;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Decline the Aggressive Accounting Approach, recommending ethical alternatives.</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2325;&#2381;&#2352;&#2366;&#2350;&#2325; &#2354;&#2375;&#2326;&#2366;&#2306;&#2325;&#2344; &#2342;&#2371;&#2359;&#2381;&#2335;&#2367;&#2325;&#2379;&#2339; &#2325;&#2379; &#2309;&#2360;&#2381;&#2357;&#2368;&#2325;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;, &#2344;&#2376;&#2340;&#2367;&#2325; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2325;&#2368; &#2360;&#2367;&#2347;&#2366;&#2352;&#2367;&#2358; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Delay the decision-making process till you find a loophole.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2375;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; &#2340;&#2348; &#2340;&#2325; &#2335;&#2366;&#2354;&#2340;&#2375; &#2352;&#2361;&#2375;&#2306; &#2332;&#2348; &#2340;&#2325; &#2310;&#2346;&#2325;&#2379; &#2325;&#2379;&#2312; &#2352;&#2366;&#2360;&#2381;&#2340;&#2366; &#2344; &#2350;&#2367;&#2354; &#2332;&#2366;&#2319;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>As a Chartered Accountant (CA), the most ethical and responsible course of action would be to modify the accounting approach to align with ethical standards. This decision is based on a commitment to uphold professional integrity, legal regulations, industry standards, and the long-term reputation of both the client and the accounting firm. CAs are bound by a code of conduct that emphasizes integrity, objectivity, professional competence, and confidentiality. Choosing an accounting approach that raises ethical concerns contradicts these principles. Ethical behaviour builds trust with clients, stakeholders, and regulatory bodies. Upholding ethical standards is crucial for the credibility and reputation of both the CA and the client. Hence, (b) is the correct answer.</p><p>Option (a)  -  Ethical and legal risks increase, potentially leading to severe consequences. Client reputation may suffer in the long run, impacting future business prospects.</p><p>Option (c)  -  While declining the approach is a positive step, simply recommending ethical alternatives may not be sufficient. Actively modifying the accounting approach ensures compliance with ethical standards.</p><p>Option (d)  -  Delays may create uncertainty and erode trust with the client. Seeking loopholes contradicts the professional duty to comply with the spirit and intent of accounting standards and legal regulations.</p>",
    "question_index": 1

    "question": "<span class=\"eqt\"><p>A cube is made by folding the given sheet. Which of the following cubes can be formed by using the given sheet?</p><p><img width=154 height=123 id=\"Picture 38\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24854/image047.jpg\"></p><p><img width=418 height=121 id=\"Picture 39\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24854/image048.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2358;&#2368;&#2335; &#2325;&#2379; &#2350;&#2379;&#2337;&#2364;&#2325;&#2352; &#2319;&#2325; &#2328;&#2344; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2342;&#2368; &#2327;&#2312; &#2358;&#2368;&#2335; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2328;&#2344; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p><p><img width=\"154\" height=\"123\" id=\"Picture 38\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24854/image047.jpg\"></p><p><img width=\"418\" height=\"121\" id=\"Picture 39\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24854/image048.jpg\"></p></span>",

    "question": "<span class=\"eqt\"><p>In a certain code language,</p><p>A + B means 'A is the father of B'</p><p>A $ B means 'A is the wife of B'</p><p>A  X  B means 'A is the brother of B'</p><p>A * B means 'A is the daughter of B'</p><p>Based on the above, how is T related to L if 'S * T $ U  X  Z * I + L'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>A + B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'</p><p>A $ B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;'</p><p>A X B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;'</p><p>A * B &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;'</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352;, &#2351;&#2342;&#2367; 'S * T $ U X Z * I + L' &#2361;&#2376;, &#2340;&#2379; T, L &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>In this question, a statement is followed by two courses of action, numbered I and II. You must assume everything in the statement to be true and on the basis of the information given in the statement, decide which course of action/s logically follows for pursuing.</p><p>Statement: Students of college X have reported a complaint that some professors of college X have opened their private tuitions and they are forcing the students to enroll in their tuitions. </p><p>Course of action: </p><p>I. All such professors should be immediately suspended from their official positions and new professors should be recruited. </p><p>II. The board of directors as well as the principal should take immediate action to stop this behaviour of professors towards students.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2325;&#2341;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2325;&#2366;&#2352;&#2381;&#2352;&#2357;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; I &#2324;&#2352; II &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2360;&#2349;&#2368; &#2348;&#2366;&#2340;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#2361;&#2376; &#2324;&#2352; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2360;&#2379;&#2330;&#2344;&#2366; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2352;&#2357;&#2366;&#2312; &#2309;&#2344;&#2369;&#2325;&#2352;&#2339; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344;: &#2325;&#2377;&#2354;&#2375;&#2332; X &#2325;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2344;&#2375; &#2351;&#2361; &#2358;&#2367;&#2325;&#2366;&#2351;&#2340; &#2342;&#2352;&#2381;&#2332; &#2325;&#2368; &#2361;&#2376; &#2325;&#2367; &#2325;&#2377;&#2354;&#2375;&#2332; X &#2325;&#2375; &#2325;&#2369;&#2331; &#2346;&#2381;&#2352;&#2379;&#2347;&#2375;&#2360;&#2352;&#2379;&#2306; &#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2344;&#2367;&#2332;&#2368; &#2335;&#2381;&#2351;&#2370;&#2358;&#2344; &#2326;&#2379;&#2354; &#2354;&#2368; &#2361;&#2376; &#2324;&#2352; &#2357;&#2375; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2309;&#2346;&#2344;&#2368; &#2335;&#2381;&#2351;&#2370;&#2358;&#2344; &#2350;&#2375;&#2306; &#2342;&#2366;&#2326;&#2367;&#2354;&#2366; &#2354;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2332;&#2348;&#2370;&#2352; &#2325;&#2352; &#2352;&#2361;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2366;&#2352;&#2381;&#2352;&#2357;&#2366;&#2312;:</p><p>I. &#2320;&#2360;&#2375; &#2360;&#2349;&#2368; &#2346;&#2381;&#2352;&#2379;&#2347;&#2375;&#2360;&#2352;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; &#2346;&#2342;&#2379;&#2306; &#2360;&#2375; &#2340;&#2369;&#2352;&#2306;&#2340; &#2344;&#2367;&#2354;&#2306;&#2348;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2324;&#2352; &#2344;&#2319; &#2346;&#2381;&#2352;&#2379;&#2347;&#2375;&#2360;&#2352;&#2379;&#2306; &#2325;&#2368; &#2349;&#2352;&#2381;&#2340;&#2368; &#2325;&#2368; &#2332;&#2366;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p><p>II. &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2346;&#2381;&#2352;&#2379;&#2347;&#2375;&#2360;&#2352;&#2379;&#2306; &#2325;&#2375; &#2311;&#2360; &#2357;&#2381;&#2351;&#2357;&#2361;&#2366;&#2352; &#2325;&#2379; &#2352;&#2379;&#2325;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2342;&#2375;&#2358;&#2325; &#2350;&#2306;&#2337;&#2354; &#2325;&#2375; &#2360;&#2366;&#2341;-&#2360;&#2366;&#2341; &#2346;&#2381;&#2352;&#2366;&#2330;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2349;&#2368; &#2340;&#2340;&#2381;&#2325;&#2366;&#2354; &#2325;&#2366;&#2352;&#2381;&#2352;&#2357;&#2366;&#2312; &#2325;&#2352;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Which two signs should be interchanged to make the given equation correct?</p><p>240  -  48  X  12 &div; 6 + 36 = 90</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2360;&#2367;&#2342;&#2381;&#2343; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>240 - 48 X 12 &div; 6 + 36 = 90</p></span>",

    "question": "<span class=\"eqt\"><p>A situation is given followed by two conclusions I and II. Read the situation and both conclusions carefully and select the correct answer.</p><p><b>Situation:</b></p><p>The state has approved Road X as a state highway. If the road is going through your land, then you will get compensation, as per state policy for the measure of land being acquired for the purpose. Compensation for non-agricultural land will be three times the value of the acquired land while compensation for agricultural land will be equivalent to the value of the acquired land.</p><p><b>Conclusions:</b></p><p>I. Commercial land is more valuable than agricultural land.</p><p>II. Agricultural land lost its value as the road is now sanctioned as a state highway.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2342;&#2368; &#2327;&#2312; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2361;&#2376;&#2306;&#2404; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2324;&#2352; &#2342;&#2379;&#2344;&#2379;&#2306; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p><b>&#2325;&#2341;&#2344; :</b></p><p>&#2352;&#2366;&#2332;&#2381;&#2351; &#2344;&#2375; &#2352;&#2379;&#2337; X &#2325;&#2379; &#2352;&#2366;&#2332;&#2381;&#2351; &#2352;&#2366;&#2332;&#2350;&#2366;&#2352;&#2381;&#2327; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2350;&#2306;&#2332;&#2370;&#2352;&#2368; &#2342;&#2375; &#2342;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2337;&#2364;  &#2349;&#2370;&#2350;&#2367; &#2325;&#2366; &#2309;&#2357;&#2350;&#2370;&#2354;&#2381;&#2351;&#2344; &#2361;&#2379; &#2327;&#2351;&#2366; &#2332;&#2376;&#2360;&#2366; &#2325;&#2367; &#2360;&#2337;&#2364;&#2325; &#2325;&#2379; &#2309;&#2348; &#2352;&#2366;&#2332;&#2381;&#2351; &#2352;&#2366;&#2332;&#2350;&#2366;&#2352;&#2381;&#2327; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2368;&#2325;&#2371;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p></span>",

    "correct_option_id": 0,
    "solution": "<p>The situation states that,</p><p>The state has approved Road X as a state highway. By state regulation, you will receive compensation for the amount of land being acquired for the purpose of building a road if it passes through your property. Non-agricultural land will be compensated three times its value and agricultural land will be compensated according to the land's worth.</p><p>I. Commercial land is more valuable than agricultural land: As compensation for non-agricultural/commercial land will be thrice of land's value. It means commercial land are more valuable than agricultural land. So, (I) can be concluded.</p><p>II. Agricultural land lost its value as the road is now sanctioned as a state highway: This statement is vague in the context of the given situation. So, (II) cannot be concluded.</p>",

    "question": "<span class=\"eqt\"><p>Select the correct combination of numbers to sequentially replace the * signs and balance the given equation.</p><p><b>*</b> + <b>*</b> x <b>*</b>  -  <b>*</b> &div; <b>*</b> = 85</p></span><span class=\"hqt\" style=\"display:none\"><p>* &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2348;&#2342;&#2354;&#2344;&#2375; &#2324;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2361;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><b>*</b> + <b>*</b> x <b>*</b> - <b>*</b> &div; <b>*</b> = 85</p></span>",

    "solution": "<p>The given equation is </p><p>Option (a) If * signs are replaced by 15, 14, 10, 3, 7, then the equation will be</p><p>15 + 14 x 10  -  3 &div; 7</p><p>= 15 + 140  -  0.42</p><p>= 155  -  0.42 </p><p>= 154.8 </p><p>So, option (a) is incorrect.</p><p>Option (b) If * signs are replaced by 57, 2, 20, 10, 5, then the equation will be</p><p>57 + 2 x 20  -  10 &div; 5 </p><p>= 57 + 40  -  2</p><p>= 97  -  2</p><p>= 95 </p><p>So, option (b) is incorrect.</p><p>Option (c) If * signs are replaced by 50, 19, 2, 27, 9, then the equation will be</p><p>50 + 19 x 2  -  27 &div; 9</p><p>= 50 + 38  -  3</p><p>= 88  -  3</p><p>= 85 </p><p>So, option (c) is correct.</p><p>Option (d) If * signs are replaced by 12, 3, 8, 24, 2, then the equation will be</p><p>12 + 3 x 8  -  24 &div; 2</p><p>= 12 + 24  -  12</p><p>= 24 </p><p>So, option (d) is incorrect.</p>",

    "question": "<span class=\"eqt\"><p>In a certain code language, 'MAGNETIC' is written as OIPVE3, 'ALRIGHT' is written as NTIJV2. How will 'FAMOUS' be written in that code?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'MAGNETIC' &#2325;&#2379; OIPVE3 &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, 'ALRIGHT' &#2325;&#2379; NTIJV2 &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'FAMOUS' &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [

      "<span class=\"eqt\">MOU3</span><span class=\"hqt\" style=\"display:none\">MOU3</span>",
      "<span class=\"eqt\">HOU3</span><span class=\"hqt\" style=\"display:none\">HOU3</span>",
      "<span class=\"eqt\">KOL2</span><span class=\"hqt\" style=\"display:none\">KOL2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>'MAGNETIC' is written as OIPVE3, 'ALRIGHT' is written as NTIJV2.</p><p>Here, the pattern is:</p><p>For numbers: </p><p>The number represents the total number of vowel present in the word. </p><p>For consonants:</p><p>Each consonant is replaced by the 2<sup>nd</sup> next alphabet as per the English alphabetical series. </p><p>So, </p><p>M+2=O; G+2=I; N+2= P; T+2= V; C+2= E. And there are 3 vowels. </p><p>L+2= N; R+2= T; G+2= I; H+2= J; T+2= V. And there are 2 vowels.</p><p>Similarly, </p><p>F+2= H; M+2= O; S+2= U. And there are 3 vowels. </p>",

    "question": "<span class=\"eqt\"><p><b>6</b> is related to <b>15</b> following a certain logic. Following the same logic, <b>10</b> is related to <b>35</b>. To which of the following is <b>99</b> related following the same logic?</p><p>(NOTE: Operations should be performed on the whole numbers, without breaking down the numbers into its constituent digits. E.g. 13  -  Operations on 13 such as adding/subtracting/multiplying etc. to 13 can be performed. Breaking down 13 into 1 and 3 and then performing mathematical operations on 1 and 3 is not allowed.)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; <b>6, 15</b> &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; <b>10, 35</b> &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; <b>99</b>, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2379;&#2327;&#2366;?</p><p>(<b>&#2344;&#2379;&#2335;</b>: &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305;, &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2328;&#2335;&#2325; &#2309;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2319; &#2348;&#2367;&#2344;&#2366;, &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2346;&#2352; &#2325;&#2368; &#2332;&#2366;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; 13 - 13 &#2346;&#2352; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2306; &#2332;&#2376;&#2360;&#2375; 13 &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2344;&#2366;/&#2328;&#2335;&#2366;&#2344;&#2366;/&#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2344;&#2366; &#2310;&#2342;&#2367; &#2325;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; 13 &#2325;&#2379; 1 &#2324;&#2352; 3 &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2347;&#2367;&#2352; 1 &#2324;&#2352; 3 &#2346;&#2352; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;)&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>In a certain code language, 'CARROT' is coded as 9-3-36-36-45-40 and 'TOMATO' is coded as 40-45-39-3-40-45. How will 'LEMON' be coded in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'CARROT' &#2325;&#2379; 9-3-36-36-45-40 &#2325;&#2375; &#2352;&#2370;&#2346; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; 'TOMATO' &#2325;&#2379; 40-45-39-3-40-45 &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'LEMON' &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">26-15-18-45-28</span><span class=\"hqt\" style=\"display:none\">26-15-18-45-28</span>",
      "<span class=\"eqt\">15-18-24-36-45</span><span class=\"hqt\" style=\"display:none\">15-18-24-36-45</span>",
      "<span class=\"eqt\">18-15-39-45-28</span><span class=\"hqt\" style=\"display:none\">18-15-39-45-28</span>",
      "<span class=\"eqt\">24-15-39-45-28</span><span class=\"hqt\" style=\"display:none\">24-15-39-45-28</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>CARROT' is coded as 9-3-36-36-45-40 and 'TOMATO' is coded as 40-45-39-3-40-45.</p><p>The pattern is:</p><p>&#183; The place values of the letters are considered.</p><p>&#183; If the place value of a letter is an even digit/number, then the place value is multiplied by 2</p><p>&#183; If the place value of a letter is an odd digit/number, then the place value is multiplied by 3</p><p>So, the place values if L, E, M, O, N are 12, 5, 13, 15, 14.</p><p>Thus, the LEMON is converted into: 24-15-39-45-28.</p><p>So, option (d) is correct.</p>",
    "question_index": 20
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the figure given in the options which when put in the place of the question mark (?) will logically complete the series.</p><p><img width=606 height=126 id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24662/image018.jpg\"></p><p><img width=592 height=148 id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24662/image019.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2379; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306; &#2332;&#2367;&#2360;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2352;&#2326;&#2344;&#2375; &#2346;&#2352; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;&#2404;</p><p><img width=\"606\" height=\"126\" id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24662/image018.jpg\"></p><p><img width=\"592\" height=\"148\" id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24662/image019.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Here, the pattern is:</p><p>'T' moves towards the left corner and then in the next step 'T' moves towards right corner.</p><p>Similarly, in the next step, 'T' will move towards the left corner.</p><p>'W' moves towards the right corner and then in the next step 'W' moves towards left corner.</p><p>Similarly, in the next step, 'W' will move towards the right corner.</p><p>'D' moves downwards and then in the next step 'D' moves upwards.</p><p>Similarly, in the next step, 'D' will move towards downwards.</p><p>'V' moves upwards and then in the next step 'V' moves downwards.</p><p>Similarly, in the next step, 'V' will move towards upwards.</p><p>For middle alphabets:</p><p>L+2= N; N+2= P; P+2= R. So, R+2= T.</p><p>So, option figure (I) will replace the question mark.</p>",
    "question_index": 21

    "question": "<span class=\"eqt\"><p>In a row all are facing north, Heera is 19<sup>th</sup> from the left end. Kavita is third to the right of Heera. If the total number of persons in a row is a perfect square between 20 and 30, then how many persons are present to the right of Kavita? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2367;&#2358;&#2366; &#2325;&#2368; &#2323;&#2352; &#2350;&#2369;&#2326;&#2352;&#2367;&#2340; &#2361;&#2376;&#2306; &#2324;&#2352; &#2361;&#2368;&#2352;&#2366; &#2348;&#2366;&#2319;&#2305; &#2331;&#2379;&#2352; &#2360;&#2375; 19&#2357;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2361;&#2376;&#2404; &#2325;&#2357;&#2367;&#2340;&#2366;, &#2361;&#2368;&#2352;&#2366; &#2325;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2360;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2326;&#2396;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 20 &#2324;&#2352; 30 &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339; &#2357;&#2352;&#2381;&#2327; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2357;&#2367;&#2340;&#2366; &#2325;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2325;&#2367;&#2340;&#2344;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2350;&#2380;&#2332;&#2370;&#2342; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>",
      "<span class=\"eqt\">Four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Five</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2305;&#2330;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In a row, Heera is 19<sup>th</sup> from the left end. Kavita is third to the right of Heera. </p><p>Heera (19<sup>th</sup> from left end)  -  2 persons  -  Kavita </p><p>The total number of persons in a row is a perfect square between 20 and 30 i.e., 25 persons. </p><p>So, </p><p>Heera (19<sup>th</sup> from left end)  -  2 persons  -  Kavita  -  3 persons.</p><p>So, 19 persons + 2 persons + Kavita + 3 persons = 25 persons. </p><p>Thus, 3 persons are present to the right of Kavita. </p>",
    "question_index": 22
  },

    "question": "<span class=\"eqt\"><p>Each of the letters of the word 'CASTLE' are replaced by immediate next alphabet as per the English alphabetical series. How many letters are there in the English alphabetical series between the letter which is third from the left and the one which is second from the right end?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2348;&#2381;&#2342; 'CASTLE' &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2379; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2336;&#2368;&#2325; &#2309;&#2327;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2348;&#2366;&#2319;&#2305; &#2331;&#2379;&#2352; &#2360;&#2375; &#2340;&#2368;&#2360;&#2352;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2324;&#2352; &#2342;&#2366;&#2319;&#2305; &#2331;&#2379;&#2352; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2361;&#2376;&#2306;?</p></span>",

    "solution": "<p>Each of the letters of the word 'CASTLE' are replaced by immediate next alphabet as per the English alphabetical series.</p><p>So, we get: DBTUMF</p><p>The third letter from the left end and the second letter from the right end are 'T' and 'M', respectively.</p><p>Letters in the English alphabetical series between T and M are:</p><p>ABCDEFGHIJKLM<b>NOPQRS</b>TUVWXYZ</p>",

    "question": "<span class=\"eqt\"><p>Select the option that is related to the fourth number in the same way as the second number is related to the first number and the sixth number is related to the fifth number.</p><p>18 : 171 :: ? : 300 :: 32 : 528</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2330;&#2380;&#2341;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2346;&#2361;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2331;&#2336;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2346;&#2366;&#2305;&#2330;&#2357;&#2368;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>18 : 171 :: ? : 300 :: 32 : 528</p></span>",

    "solution": "<p>18  X  (18&div;2) + (18&div;2)</p><p>18  X  9 + 9 = 162 + 9 = 171</p><p>32  X  (32&div;2) + (32&div;2)</p><p>32  X  16 + 16 = 512 + 16 = 528</p><p>Similarly  -</p><p>Option (a)  -</p><p>22  X  (22&div;2) + (22&div;2)</p><p>22  X  11 + 11 = 242 + 11 = 253</p><p>Option (b)  -</p><p>36  X  (36&div;2) + (36&div;2)</p><p>=666</p><p>option (c) 24  X  (24&div;2) + (24&div;2) = 300</p><p>Option (d)  -</p><p>16  X  (16&div;2) + (16&div;2)</p><p>16  X  8 + 8 = 128 + 8 = 136</p><p>Thus, the answer is option (c).</p>",

    "question": "<span class=\"eqt\"><p>Which of the following incidents is/are associated with the formation of the 'Indian National Congress'?</p><p>I. First meeting was convened at Poona, Maharashtra.</p><p>II. It was founded by W.C. Banerjee</p><p>III. First meeting was presided over by Allen Hume.</p><p>Select the correct code.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2368; &#2328;&#2335;&#2344;&#2366; '&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360;' &#2325;&#2375; &#2327;&#2336;&#2344; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2368; &#2361;&#2376;?</p><p>I. &#2346;&#2361;&#2354;&#2368; &#2348;&#2376;&#2336;&#2325; &#2346;&#2370;&#2344;&#2366;, &#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2350;&#2375;&#2306; &#2348;&#2369;&#2354;&#2366;&#2312; &#2327;&#2312; &#2341;&#2368;&#2404;</p><p>II. &#2311;&#2360;&#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2337;&#2348;&#2381;&#2354;&#2381;&#2351;&#2370;.&#2360;&#2368;. &#2348;&#2344;&#2352;&#2381;&#2332;&#2368; &#2344;&#2375; &#2325;&#2368; &#2341;&#2368;&#2404;</p><p>III. &#2346;&#2361;&#2354;&#2368; &#2348;&#2376;&#2336;&#2325; &#2325;&#2368; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;&#2340;&#2366; &#2319;&#2354;&#2344; &#2361;&#2381;&#2351;&#2370;&#2350; &#2344;&#2375; &#2325;&#2368; &#2341;&#2368;&#2404;</p><p>&#2360;&#2361;&#2368; &#2325;&#2379;&#2337; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">I and III</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375; &#2360;&#2375; &#2325;&#2379;&#2312; &#2349;&#2368; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Indian National Congress</b> was founded by <b>Allen O. Hume</b> after consultations with <b>Lord Dufferin</b>. He was a retired Government servant who had chosen to stay back in India after retirement. <b>So, statement II is not correct.</b></p><p>In March 1885, it was decided that a conference of the <b>Indian National Union (old name of INC)</b> would be convened <b>at Poona</b> during December month of the year. However, fate deprived Poona of the opportunity to host the first session of the Indian National Congress. The venue had to be shifted to Bombay because of the <b>outbreak of cholera</b> in Poona. <b>So, statement I is not correct.</b></p><p>The first meeting was held on Monday, 28 December 1885 in <b>Gokaldas Tejpal Sanskrit College, Bombay</b>. The honour of being the first ever Congress President belonged to <b>W.C. Banerjee of Bengal.</b> He was one of the first four Indian Barristers and one of the foremost legal luminaries in his day. <b>So, statement III is not correct.</b></p>",
    "question_index": 25
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements: </p><p>I. There is no legal sanction behind Fundamental Duties.</p><p>II. Fundamental duties are in the nature of a code of conduct.</p><p>Which of the above statements is / are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2346;&#2368;&#2331;&#2375; &#2325;&#2379;&#2312; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2360;&#2381;&#2357;&#2368;&#2325;&#2371;&#2340;&#2367; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p>II. &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351; &#2310;&#2330;&#2366;&#2352; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366; &#2325;&#2368; &#2346;&#2381;&#2352;&#2325;&#2371;&#2340;&#2367; &#2325;&#2375; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I &amp; II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I: There is no legal sanction behind Fundamental Duties.</p><p>This statement is correct in its essence. Like the Directive Principles of State Policy, the Fundamental Duties are non-justiciable. This means that they are not directly enforceable by the courts. A citizen cannot be taken to court solely for violating a Fundamental Duty.</p><p>Nuance: While the duties themselves are not directly enforceable, the Parliament is free to enact laws to implement them. For instance, the Prevention of Insults to National Honour Act, 1971, which penalizes disrespect to the National Flag and National Anthem, enforces the duty mentioned in Article 51A(a). However, the statement refers to the duties as they stand in the Constitution, which do not carry an inherent legal penalty for non-compliance.</p><p>Statement II: Fundamental duties are in the nature of a code of conduct.</p><p>This statement is also correct. The Fundamental Duties are a set of eleven moral and civic obligations for the citizens of India. They are intended to serve as a constant reminder to every citizen that while the Constitution confers upon them certain Fundamental Rights, it also requires them to observe basic norms of democratic conduct and behavior.</p><p>They aim to promote patriotism, a sense of discipline, and commitment towards the nation. In this sense, they act as a \"code of conduct\" that guides citizens in their actions and strengthens the fabric of the nation.</p><p>Conclusion:</p><p>Both statements accurately describe key characteristics of the Fundamental Duties as enshrined in the Indian Constitution. Therefore, both I and II are correct.</p>",
    "question_index": 26
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following.</p><p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Season </td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Month according to Indian calendar</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A.Vasanta </td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. Chaitra-Vaisakha </td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. Grishma </td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. Asvina-Kartika </td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. Varsha</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. Sravana-Bhadra </td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. Sharada</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV.Jyaistha-Asadha</td></tr></table></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2379; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2315;&#2340;&#2369; </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2306;&#2330;&#2366;&#2306;&#2327; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2350;&#2366;&#2361;</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A.&#2357;&#2360;&#2306;&#2340;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. &#2330;&#2376;&#2340;&#2381;&#2352;-&#2357;&#2376;&#2358;&#2366;&#2326;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">B. &#2327;&#2381;&#2352;&#2368;&#2359;&#2381;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. &#2309;&#2358;&#2381;&#2357;&#2367;&#2344;-&#2325;&#2366;&#2352;&#2381;&#2340;&#2367;&#2325;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C. &#2357;&#2352;&#2381;&#2359;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. &#2358;&#2381;&#2352;&#2366;&#2357;&#2339;-&#2349;&#2366;&#2342;&#2381;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">D. &#2358;&#2352;&#2342;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. &#2332;&#2381;&#2351;&#2375;&#2359;&#2381;&#2336;-&#2310;&#2359;&#2366;&#2338;&#2364;</td></tr></table></span>",

    "question": "<span class=\"eqt\"><p>Which of the following is/are considered as Revenue Expenditure?</p><p>i. Salaries and Pensions </p><p>ii. Subsidies</p><p>iii. Grant-in-aid</p><p>iv. Infrastructure development</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p><p>i. &#2357;&#2375;&#2340;&#2344; &#2324;&#2352; &#2346;&#2375;&#2306;&#2358;&#2344;</p><p>ii. &#2360;&#2348;&#2381;&#2360;&#2367;&#2337;&#2368;</p><p>iii. &#2309;&#2344;&#2369;&#2342;&#2366;&#2344; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366;</p><p>iv. &#2309;&#2357;&#2360;&#2306;&#2352;&#2330;&#2344;&#2366; &#2357;&#2367;&#2325;&#2366;&#2360;</p></span>",
    "options": [
      "<span class=\"eqt\">Only i, ii and iv</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i, ii &#2324;&#2352; iv</span>",
      "<span class=\"eqt\">Only ii, iii and iv</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; ii, iii &#2324;&#2352; iv</span>",
      "<span class=\"eqt\">Only i, ii and iii</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; i, ii &#2324;&#2352; iii</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Article 112: Annual Financial Statement </b></p><p>&#183; Union budget is categories into two main component (Revenue Budget and Capital Budget) and each of them further classified into two subcomponents. (Revenue Receipts + Revenue Expenditure and Capital Receipts + Capital Expenditure respectively)</p><p><b>Revenue Receipts</b></p><p>&bull; It estimates the amount or revenue government expects to receive form the citizens through Tax Revenue (Income tax, corporate tax etc.) and Non-tax Revenue (such as Interest received, profits, Penalties etc.)</p><p><b>Revenue Expenditure</b></p><p>&bull; <b>These are the expenses incur by the government for their daily function. </b></p><p>&bull; <b>It includes salaries and pension of their employees, subsidies to the citizens and expenses on providing essential public services and facilities. </b></p><p><b>Capital Receipts</b></p><p>&bull; This is the money government acquire via loans from public, Banks, Central Bank and other countries </p><p>&bull; These are liabilities government received and had to return one day</p><p><b>Capital Expenditure</b></p><p>&bull; These are the expenses the government incurs to create long-term asset and expect to receive returns from it in future. And to provide welfare facilities to the citizens</p><p>&bull; It includes constructing road, constructing schools and colleges, hospital and granting loans to states and union territories.</p><p><img width=446 height=230 id=image1.png src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25697/image001.png\" ></p>",
    "question_index": 28
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is correct about Net National Product?</p><p>a) NNP calculated by adding depreciation from GNP.</p><p>b) NNP is same as the National Income.</p><p>c) NNP accounts for factor income from abroad.</p><p>Choose the correct option</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2375; &#2325;&#2341;&#2344; &#2344;&#2367;&#2357;&#2354;/&#2344;&#2375;&#2335; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;?</p><p>a) NNP &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; GNP &#2360;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351;&#2361;&#2381;&#2352;&#2366;&#2360; &#2332;&#2379;&#2337;&#2364;&#2325;&#2352; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>b) NNP &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2404;</p><p>c) NNP &#2357;&#2367;&#2342;&#2375;&#2358;&#2379;&#2306; &#2360;&#2375; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2367;&#2350;&#2381;&#2350;&#2375;&#2342;&#2366;&#2352; &#2361;&#2376;&#2404;</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; NNP is calculated by subtracting depreciation from GNP</p><p>&bull; NNP at factor cost is equivalent to National Income.</p><p>&bull; NNP refers to net domestic and foreign production but not in the same terms as factor income.</p><p>Further Insight:</p><p>&bull; GNP = GDP + Net factor income from abroad</p><p>&bull; NNP (Net National Product): GNP (Gross National Product) adjusted for depreciation.</p><p>&#9675; Formula: NNP=GNP&#8722;Depreciation</p><p>&bull; Gross National Income (GNI)at market prices = GDP at market prices + taxes less subsidies on production and imports (Net receivable from abroad) + Compensation of Employees (Net receivable from abroad) + property income (Net receivable from abroad)</p><p>&bull; Net National Income (NNI) at market prices = GNI at market prices - consumption of fixed capital</p><p>&bull; Net National Disposable Income(NNDI) = NNI + net taxes on income and wealth receivable from abroad + net social contributions and benefits receivable from abroad.</p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true about Prime Minister Dhan-Dhaanya Krishi Yojana?</p><p>a. The Prime Minister Dhan-Dhaanya Krishi Yojana aims to enhance agricultural productivity, increase adoption of crop diversification and sustainable agricultural practices, augment post-harvest storage at the panchayat and block levels, improve irrigation facilities and facilitate availability of long-term and short-term credit.</p><p>b. It was announced in Budget 2025-26 and the aim is to develop 100 districts under \"Prime Minister Dhan-Dhaanya Krishi Yojana\".</p><p>c. Prime Minister Dhan-Dhaanya Krishi Yojana draws inspiration from NITI Aayog's Aspirational District Programme and first of its kind focusing exclusively on agriculture and allied sectors.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2343;&#2344;-&#2343;&#2366;&#2344;&#2381;&#2351; &#2325;&#2371;&#2359;&#2367; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>a. &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2343;&#2344;-&#2343;&#2366;&#2344;&#2381;&#2351; &#2325;&#2371;&#2359;&#2367; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2325;&#2371;&#2359;&#2367; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2344;&#2366;, &#2347;&#2360;&#2354; &#2357;&#2367;&#2357;&#2367;&#2343;&#2368;&#2325;&#2352;&#2339; &#2324;&#2352; &#2335;&#2367;&#2325;&#2366;&#2314; &#2325;&#2371;&#2359;&#2367; &#2346;&#2342;&#2381;&#2343;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2309;&#2346;&#2344;&#2366;&#2344;&#2366;, &#2346;&#2306;&#2330;&#2366;&#2351;&#2340; &#2324;&#2352; &#2348;&#2381;&#2354;&#2377;&#2325; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2325;&#2335;&#2366;&#2312; &#2325;&#2375; &#2348;&#2366;&#2342; &#2349;&#2306;&#2337;&#2366;&#2352;&#2339; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2344;&#2366;, &#2360;&#2367;&#2306;&#2330;&#2366;&#2312; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2342;&#2368;&#2352;&#2381;&#2328;&#2325;&#2366;&#2354;&#2367;&#2325; &#2324;&#2352; &#2309;&#2354;&#2381;&#2346;&#2325;&#2366;&#2354;&#2367;&#2325; &#2315;&#2339; &#2325;&#2368; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343;&#2340;&#2366; &#2325;&#2379; &#2360;&#2369;&#2357;&#2367;&#2343;&#2366;&#2332;&#2344;&#2325; &#2348;&#2344;&#2366;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>b. &#2311;&#2360;&#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2348;&#2332;&#2335; 2025-26 &#2350;&#2375;&#2306; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368; &#2324;&#2352; &#2311;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; \"&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2343;&#2344;-&#2343;&#2366;&#2344;&#2381;&#2351; &#2325;&#2371;&#2359;&#2367; &#2351;&#2379;&#2332;&#2344;&#2366;\" &#2325;&#2375; &#2340;&#2361;&#2340; 100 &#2332;&#2367;&#2354;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2325;&#2366;&#2360; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>c. &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2343;&#2344;-&#2343;&#2366;&#2344;&#2381;&#2351; &#2325;&#2371;&#2359;&#2367; &#2351;&#2379;&#2332;&#2344;&#2366; &#2344;&#2368;&#2340;&#2367; &#2310;&#2351;&#2379;&#2327; &#2325;&#2375; &#2310;&#2325;&#2366;&#2306;&#2325;&#2381;&#2359;&#2368; &#2332;&#2367;&#2354;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2360;&#2375; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2325;&#2371;&#2359;&#2367; &#2324;&#2352; &#2360;&#2306;&#2348;&#2342;&#2381;&#2343; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2358;&#2375;&#2359; &#2352;&#2370;&#2346; &#2360;&#2375; &#2343;&#2381;&#2351;&#2366;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2309;&#2346;&#2344;&#2368; &#2340;&#2352;&#2361; &#2325;&#2368; &#2346;&#2361;&#2354;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">a, b and c</span><span class=\"hqt\" style=\"display:none\">a, b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; c</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Prime Minister Dhan-Dhaanya Krishi Yojana aims to enhance agricultural productivity, increase adoption of crop diversification and sustainable agricultural practices, augment post-harvest storage at the panchayat and block levels, improve irrigation facilities and facilitate availability of long-term and short-term credit.</p><p>It is in pursuance of Budget announcement for 2025-26 to develop 100 districts under \"Prime Minister Dhan-Dhaanya Krishi Yojana\".</p><p>The Scheme will be implemented through convergence of 36 existing schemes across 11 Departments, other State schemes and local partnerships with the private sector. 100 districts will be identified based on three key indicators of low productivity, low cropping intensity, and less credit disbursement.</p><p>The number of districts in each state/UT will be based on the share of Net Cropped Area and operational holdings. However, a minimum of 1 district will be selected from each state.</p><p>In news:</p><p>The Union Cabinet chaired by the Prime Minister Shri Narendra Modi approved the Prime Minister Dhan-Dhaanya Krishi Yojana for a period of six years, beginning with 2025-26 to cover 100 districts.</p><p>Prime Minister Dhan-Dhaanya Krishi Yojana draws inspiration from NITI Aayogs Aspirational District Programme and first of its kind focusing exclusively on agriculture and allied sectors.</p>",
    "question_index": 30
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding sports trophies: </p><p>(A) The Thomas Cup is associated with badminton. </p><p>(B) The Davis Cup is a prominent football tournament. </p><p>(C) The Ranji Trophy is related to Indian domestic cricket. </p><p>Which of the above statements is/are correct? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2326;&#2375;&#2354; &#2335;&#2381;&#2352;&#2377;&#2347;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>(A) &#2341;&#2377;&#2350;&#2360; &#2325;&#2346; &#2348;&#2376;&#2337;&#2350;&#2367;&#2306;&#2335;&#2344; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>(B) &#2337;&#2375;&#2357;&#2367;&#2360; &#2325;&#2346; &#2319;&#2325; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2347;&#2369;&#2335;&#2348;&#2377;&#2354; &#2335;&#2370;&#2352;&#2381;&#2344;&#2366;&#2350;&#2375;&#2306;&#2335; &#2361;&#2376;&#2404;</p><p>(C) &#2352;&#2339;&#2332;&#2368; &#2335;&#2381;&#2352;&#2377;&#2347;&#2368; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2328;&#2352;&#2375;&#2354;&#2370; &#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only A and C</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2324;&#2352; C</span>",
      "<span class=\"eqt\">Only B and C</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B &#2324;&#2352; C</span>",
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",

;\">Santosh Trophy, Durand Cup, Federation Cup, IFA Shield, Nehru Cup</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Basketball</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Federation Cup, William Jones Cup, Senior National Basketball Championship</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Athletics</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Federation Cup, National Open Athletics Championships, Diamond League</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Chess</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">World Chess Championship, Tata Steel Chess India, Chess Olympiad</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Swimming</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">National Aquatic Championships, Asian Swimming Championships</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">10</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Boxing</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Muhammad Ali Trophy, AIBA World Championships, Indian Open Boxing</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">11</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Volleyball</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Federation Cup, National Volleyball Championship, FIVB World Cup</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">12</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Table Tennis</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">National Table Tennis Championships, Commonwealth Table Tennis Championship, World Table Tennis Championships</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">13</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Golf</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Indian Open, Hero Women's Indian Open, Royal Calcutta Golf Club Trophy</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">14</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cycling</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">National Track Cycling Championships, Commonwealth Games Cycling Events</td></tr></table>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about Dhrupad style.</p><p>I. It is a famous form of Carnatic classical music.</p><p>II. Instruments like tanpura and Pakhawaj are widely used.</p><p>Which of the following statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2343;&#2381;&#2352;&#2369;&#2346;&#2342; &#2358;&#2376;&#2354;&#2368; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2351;&#2361; &#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2360;&#2306;&#2327;&#2368;&#2340; &#2325;&#2366; &#2319;&#2325; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2352;&#2370;&#2346; &#2361;&#2376;&#2404;</p><p>II. &#2340;&#2366;&#2344;&#2346;&#2369;&#2352;&#2366; &#2324;&#2352; &#2346;&#2326;&#2366;&#2357;&#2332; &#2332;&#2376;&#2360;&#2375; &#2357;&#2366;&#2342;&#2381;&#2351;&#2351;&#2306;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>There are ten main styles of singing in <b>Hindustani music</b> - <b>'Dhrupad'</b>, 'Dhamar', 'Hori', 'Khayal', 'Tappa', 'Chaturang', 'Ragasagar', 'Tarana', 'Sargam' and 'Thumri'.</p><p><u>Dhrupad</u></p><p>a) It is one of the oldest and grandest forms of <b>Hindustani classical music. So, the statement I is incorrect.</b></p><p>b) The name is derived from 'Dhruva' and 'pada'. It denotes both verse form of the poetry and the style in which it is sung.</p><p>c) Dhrupad is essentially a poetic form that is incorporated into an extended presentation style that is marked by precise and overt elaboration of a raga.</p><p>d) Dhrupad starts with '<b>Alap</b>' which is sung without words. The tempo rises gradually.</p><p>e) Dhrupad includes use of Sanskrit syllables and is of temple origin. Dhrupad compositions usually have 4 to 5 stanzas and are performed by a duo.</p><p>f) Generally, two male vocalists perform Dhrupad style of performances. <b>Tanpura and Pakhawaj</b> usually accompany them. <b>So, statement II is correct.</b></p><p>Source- Indian Art and Culture- Nitin Singhania</p>",
    "question_index": 32
  },
