    "question": "<span class=\"eqt\"><p>Which of the following statements about QS Asia University Rankings 2025 is/are correct?</p><p>I. A total of seven Indian universities featured in the top 100 institutes in Asia.</p><p>II. IIT Delhi secured 44th place and emerged as the highest-ranking Indian institution in Asia and India this year.</p><p>III. This report was created on the basis of 11 performance indicators.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2351;&#2370;&#2319;&#2360; &#2319;&#2358;&#2367;&#2351;&#2366; &#2351;&#2370;&#2344;&#2367;&#2357;&#2352;&#2381;&#2360;&#2367;&#2335;&#2368; &#2352;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; 2025 &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2319;&#2358;&#2367;&#2351;&#2366; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; 100 &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2360;&#2366;&#2340; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;&#2404;</p><p>II. &#2310;&#2312;&#2310;&#2312;&#2335;&#2368; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2344;&#2375; 44&#2357;&#2366;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2361;&#2366;&#2360;&#2367;&#2354; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2311;&#2360; &#2357;&#2352;&#2381;&#2359; &#2319;&#2358;&#2367;&#2351;&#2366; &#2324;&#2352; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2352;&#2376;&#2306;&#2325;&#2367;&#2306;&#2327; &#2357;&#2366;&#2354;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344; &#2348;&#2344;&#2325;&#2352; &#2313;&#2349;&#2352;&#2366;&#2404;</p><p>III. &#2351;&#2361; &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; 11 &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2360;&#2306;&#2325;&#2375;&#2340;&#2325;&#2379;&#2306; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2340;&#2376;&#2351;&#2366;&#2352; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>India boasts two institutions within the top 50 and seven in the top 100 of the QS Asia Rankings 2025, with the Indian Institute of Technology Delhi (IITD) leading at 44th place.</p><p>This ranking assesses 984 institutions covering 25 countries in Eastern, Southern, South-Eastern and Central Asia. It has 11 ranking metrics.</p><p>Top 50: India features two institutions - IIT Delhi (44th) and IIT Bombay (48th).</p><p>Top 100: Five institutions, including IIT Madras (56), IIT Kharagpur (60), Indian Institute of Science (62), IIT Kanpur (67), and University of Delhi (81), showcase India's robust academic standing.</p><p>Top 150: Institutions such as IIT Guwahati, IIT Roorkee, Jawaharlal Nehru University, Chandigarh University (120), UPES (148), and Vellore Institute of Technology (150) highlight the depth of quality education.</p><p>Indian Institute of Technology Delhi (IITD) has achieved the highest ranking for India, moving up to 44th place from 46th last year, with an impressive employer reputation score of 99%.</p>",
    "question_index": 33
  },

    "question": "<span class=\"eqt\"><p><b>Choose the correct option.</b></p><p><b>Assertion (A):</b> Sound waves are called mechanical waves. </p><p><b>Reason (R):</b> Sound waves require a medium for propagation. </p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</b></p><p><b>&#2309;&#2349;&#2367;&#2325;&#2341;&#2344; (A):</b> &#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2379; &#2351;&#2366;&#2306;&#2340;&#2381;&#2352;&#2367;&#2325; &#2340;&#2352;&#2306;&#2327;&#2375;&#2306; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><b>&#2325;&#2366;&#2352;&#2339; (R):</b> &#2343;&#2381;&#2357;&#2344;&#2367; &#2340;&#2352;&#2306;&#2327;&#2379;&#2306; &#2325;&#2379; &#2360;&#2306;&#2330;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and R are true and R is the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2324;&#2352; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both A and R are true but R is not the correct explanation of A</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; R &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; R, A &#2325;&#2366; &#2360;&#2361;&#2368; &#2360;&#2381;&#2346;&#2359;&#2381;&#2335;&#2368;&#2325;&#2352;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is true but R is false</span><span class=\"hqt\" style=\"display:none\">A &#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>",
      "<span class=\"eqt\">A is false but R is true</span><span class=\"hqt\" style=\"display:none\">A &#2309;&#2360;&#2340;&#2381;&#2351; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; R &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Assertion (A): Sound waves are called mechanical waves.</p><p>This statement is true. Waves are broadly classified into two types: mechanical and electromagnetic. Mechanical waves are disturbances that travel through a medium by causing the particles of the medium to oscillate. Sound is a prime example, as it propagates by vibrating particles in a solid, liquid, or gas.</p><p>Reason (R): Sound waves require a medium for propagation.</p><p>This statement is also true. This is a fundamental property of sound. Sound cannot travel through a vacuum because there are no particles to carry the vibration. This is why there is no sound in space.</p><p>Evaluate the link between Assertion (A) and Reason (R):</p><p>The Assertion states that sound waves are classified as mechanical waves.</p><p>The Reason states that sound waves need a medium to travel.</p><p>The very definition of a mechanical wave is one that requires a material medium for its propagation.</p><p>Therefore, the fact that sound requires a medium (Reason) is precisely why it is categorized as a mechanical wave (Assertion). The Reason provides the correct and fundamental explanation for the Assertion.</p><p>Conclusion:</p><p>Since both statements are true, and the Reason correctly explains the Assertion, option (a) is the correct choice.</p>",
    "question_index": 34
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements about the Green Revolution in India are correct?</p><p>I. The Green Revolution refers to a period of agricultural transformation that began in the 1960s.</p><p>II. It primarily focused on the introduction of high-yielding varieties (HYVs) of wheat and rice.</p><p>III. The Green Revolution resulted in a significant decrease in the use of fertilizers and pesticides</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2361;&#2352;&#2367;&#2340; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>I. &#2361;&#2352;&#2367;&#2340; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; 1960 &#2325;&#2375; &#2342;&#2358;&#2325; &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2370; &#2361;&#2369;&#2312; &#2325;&#2371;&#2359;&#2367; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2325;&#2368; &#2309;&#2357;&#2343;&#2367; &#2325;&#2379; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349;&#2367;&#2340; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2361; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375; &#2327;&#2375;&#2361;&#2370;&#2306; &#2324;&#2352; &#2330;&#2366;&#2357;&#2354; &#2325;&#2368; &#2313;&#2330;&#2381;&#2330; &#2313;&#2346;&#2332; &#2357;&#2366;&#2354;&#2368; &#2325;&#2367;&#2360;&#2381;&#2350;&#2379;&#2306; (HYV) &#2325;&#2368; &#2358;&#2369;&#2352;&#2370;&#2310;&#2340; &#2346;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2341;&#2368;&#2404;</p><p>III. &#2361;&#2352;&#2367;&#2340; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2313;&#2352;&#2381;&#2357;&#2352;&#2325;&#2379;&#2306; &#2324;&#2352; &#2325;&#2368;&#2335;&#2344;&#2366;&#2358;&#2325;&#2379;&#2306; &#2325;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327; &#2350;&#2375;&#2306; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326;&#2344;&#2368;&#2351; &#2325;&#2350;&#2368; &#2310;&#2312;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I,II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Green Revolution in India was initiated in the 1960s by introducing high-yielding varieties of rice and wheat to increase food production. </p><p>&bull; The main development was higher-yielding varieties of wheat, for developing rust resistant strains of wheat. The introduction of high-yielding varieties (HYV) of seeds and the improved quality of fertilizers and irrigation techniques led to the increase in the production to make the country self-sufficient in food grains, thus improving agriculture in India. </p><p>&bull; The other practices include high-yielding varieties (HYVs) of seeds, Irrigation infrastructure, use of pesticides, insecticides and herbicides, consolidation of holdings, land reforms, improved rural infrastructure, supply of agricultural credit, use of chemical or synthetic fertilizers, use of sprinklers or drip irrigation systems, and use of advanced machinery.</p><p><b>There was an increased use of pesticides and fertilizers, hence Statement III is incorrect. </b></p>",
    "question_index": 35
  },

    "question": "<span class=\"eqt\"><p>Who was the first recipient of the prestigious Saraswati Samman when it was instituted in 1991?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2340;&#2367;&#2359;&#2381;&#2336;&#2367;&#2340; &#2360;&#2352;&#2360;&#2381;&#2357;&#2340;&#2368; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;, &#2332;&#2348; 1991 &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;, &#2325;&#2375; &#2346;&#2381;&#2352;&#2341;&#2350; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2380;&#2344; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ramakant Rath</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2350;&#2366;&#2325;&#2366;&#2306;&#2340; &#2352;&#2341;</span>",
      "<span class=\"eqt\">Vijay Tendulkar</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2332;&#2351; &#2340;&#2375;&#2306;&#2342;&#2369;&#2354;&#2325;&#2352;</span>",
      "<span class=\"eqt\">Harivansh Rai Bachchan</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2352;&#2367;&#2357;&#2306;&#2358;&#2352;&#2366;&#2351; &#2348;&#2330;&#2381;&#2330;&#2344;</span>",
      "<span class=\"eqt\">Balamani Amma</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2354;&#2350;&#2339;&#2367; &#2309;&#2350;&#2381;&#2350;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The very first Saraswati Samman in 1991 was awarded to the eminent Hindi poet and writer Harivansh Rai Bachchan. He received the honour for his four-volume autobiography.</p><p>This award recognized his immense contribution to Hindi literature over several decades.</p>",

4;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2346;&#2369;&#2354;&#2367;&#2325;&#2335; &#2333;&#2368;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2323;&#2337;&#2367;&#2358;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2360;&#2366;&#2306;&#2349;&#2352; &#2333;&#2368;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2324;&#2352; &#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2354;&#2379;&#2325;&#2340;&#2325; &#2333;&#2368;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2350;&#2339;&#2367;&#2346;&#2369;&#2352;</td></tr></table></span>",

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding Yakshagana.</p><p>I. It is a dance drama art form from Uttar Pradesh</p><p>II. In this art form, the proponent uses only oratory skills</p><p>Which of the above statement(s) is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2325;&#2381;&#2359;&#2327;&#2366;&#2344; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2351;&#2361; &#2313;&#2340;&#2381;&#2340;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2325;&#2366; &#2319;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351; &#2344;&#2366;&#2335;&#2367;&#2325;&#2366; &#2325;&#2354;&#2366; &#2352;&#2370;&#2346; &#2361;&#2376;&#2404;</p><p>II. &#2311;&#2360; &#2325;&#2354;&#2366; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;&#2325; &#2325;&#2375;&#2357;&#2354; &#2357;&#2325;&#2381;&#2340;&#2371;&#2340;&#2381;&#2357; &#2325;&#2380;&#2358;&#2354; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>It is a dance-drama of Karnataka, it comprises of elaborate costumes, make ups and masks. Traditionally it is performed in open air by all male troupe while women also started taking part since 1970s.</p><p>The narratives are drawn primarily from the Hindu epics like Ramayana, Mahabharata, youthful tales of Krishna as depicted in Bhagavata  -  purana.</p><p>Talamaddale, a variant of Yakshagana is similar to Yakshagana without the costumes, dance.</p><p>Source: The Hindu</p>",
    "question_index": 38
  },

    "question": "<span class=\"eqt\"><p>Read the following statements and choose the correct option. </p><p>Statement I: Tropical Deciduous Forests are the most widespread forests of India.</p><p>Statement II: Tropical Evergreen Forests are also called the monsoon forests.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p><b>&#2325;&#2341;&#2344; I:</b> &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2346;&#2352;&#2381;&#2339;&#2346;&#2366;&#2340;&#2368; &#2357;&#2344; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2348;&#2360;&#2375; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2357;&#2344; &#2361;&#2376;&#2306;&#2404;</p><p><b>&#2325;&#2341;&#2344; II:</b> &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2360;&#2342;&#2366;&#2348;&#2361;&#2366;&#2352; &#2357;&#2344;&#2379;&#2306; &#2325;&#2379; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2357;&#2344; &#2349;&#2368; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",

      "<span class=\"eqt\">Statement I: FALSE, Statement II: TRUE</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I: <b>&#2309;&#2360;&#2340;&#2381;&#2351;</b>, &#2325;&#2341;&#2344; II: <b>&#2360;&#2340;&#2381;&#2351;</b></span>",

      "<span class=\"eqt\">Statement I: TRUE, Statement II: FALSE</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I: <b>&#2360;&#2340;&#2381;&#2351;</b>, &#2325;&#2341;&#2344; II: <b>&#2309;&#2360;&#2340;&#2381;&#2351;</b></span>",
      "<span class=\"eqt\">Statement I: TRUE, Statement II: TRUE</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I: <b>&#2360;&#2340;&#2381;&#2351;</b>, &#2325;&#2341;&#2344; II: <b>&#2360;&#2340;&#2381;&#2351;</b></span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; <b>Tropical Deciduous Forests are the most widespread forests of India</b> with around 65.6% of the total forest area coverage. </p><p>&#183; <b>They are also called the monsoon forests</b> and spread over the region receiving rainfall between 200 cm and 70 cm. </p><p>&#183; Trees of this forest type shed their leaves for about six to eight weeks in dry summer. </p><p>&#183; On the basis of the availability of water, these forests are further divided into moist and dry deciduous.</p>",

    "question": "<span class=\"eqt\"><p>The \"Rajatarangini,\" a historical chronicle of Kashmir, was written by:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2358;&#2381;&#2350;&#2368;&#2352; &#2325;&#2366; &#2320;&#2340;&#2367;&#2361;&#2366;&#2360;&#2367;&#2325; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360; \"&#2352;&#2366;&#2332;&#2340;&#2352;&#2306;&#2327;&#2367;&#2344;&#2368;\" &#2325;&#2367;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2367;&#2326;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;:</p></span>",
    "options": [
      "<span class=\"eqt\">Kalhana</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2354;&#2381;&#2361;&#2344;</span>",
      "<span class=\"eqt\">Bana Bhatt</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2344;&#2366; &#2349;&#2335;&#2381;&#2335;</span>",

    "question": "<span class=\"eqt\"><p>Which of the following is/are not the member countries of the BRICS Grouping?</p><p>I) Ethiopia</p><p>II) United Arab Emirates</p><p>III) Bangladesh</p><p>IV) Iran</p><p>V) Egypt</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2342;&#2375;&#2358; &#2348;&#2381;&#2352;&#2367;&#2325;&#2381;&#2360; &#2360;&#2350;&#2370;&#2361; &#2325;&#2366;/&#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351; &#2342;&#2375;&#2358; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I) &#2311;&#2341;&#2367;&#2351;&#2379;&#2346;&#2367;&#2351;&#2366; II) &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2309;&#2352;&#2348; &#2309;&#2350;&#2368;&#2352;&#2366;&#2340; III) &#2348;&#2366;&#2306;&#2327;&#2381;&#2354;&#2366;&#2342;&#2375;&#2358; IV) &#2312;&#2352;&#2366;&#2344; V) &#2350;&#2367;&#2360;&#2381;&#2352;</p></span>",
    "options": [
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Only I and V</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; V</span>",
      "<span class=\"eqt\">Only II and IV</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">Only III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Original Members: The group was initially known as BRIC, consisting of Brazil, Russia, India, and China. It became BRICS with the addition of South Africa in 2010.</p><p>2024 Expansion: On January 1, 2024, the BRICS group officially expanded by inviting six new countries. Of these, five accepted and joined:</p><p>Egypt</p><p>Ethiopia</p><p>Iran</p><p>Saudi Arabia</p><p>United Arab Emirates</p><p>(Note: Argentina was also invited but declined membership.)</p><p>Based on the current membership, the only country on the list that is not a member of the BRICS grouping is Bangladesh. Therefore, statement III is the correct identification of a non-member.</p><p></p>",

    "question": "<span class=\"eqt\"><p>Consider the following statements about UNHRC (United Nations Human Rights Council)</p><p>I. USA is a member of this council</p><p>II. It is headquartered in New York</p><p>Which of the above statement(s) is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2350;&#2366;&#2344;&#2357;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2346;&#2352;&#2367;&#2359;&#2342; (UNHRC) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;</p><p>I. &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2309;&#2350;&#2375;&#2352;&#2367;&#2325;&#2366; &#2311;&#2360; &#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2366; &#2360;&#2342;&#2360;&#2381;&#2351; &#2361;&#2376;</p><p>II. &#2311;&#2360;&#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351;&#2366;&#2354;&#2351; &#2344;&#2381;&#2351;&#2370;&#2351;&#2377;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2361;&#2376;</p><p>&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>UNHRC is an intergovernmental body under the United Nations for strengthening the promotion and protection of human rights across the globe.</p><p>The council is made up of 47 member states who are elected by the United Nations General Assembly. The member countries are elected for a 3-year term. The council is headquartered at Geneva, Switzerland.</p><p>Recently, USA withdrew its membership from this council citing bias against Israel.</p><p>Source: Livemint</p>",
    "question_index": 42
  },

    "question": "<span class=\"eqt\"><p>Below are a few statements given about 'Group of Forty' (Turkan-i-Chahalgani).</p><p>A.Iltutmish established the 'Group of Forty' (Turkan-i-Chahalgani)</p><p>B.The group was finally eliminated by Raziya Sultana.</p><p>Which of the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; '&#2327;&#2381;&#2352;&#2369;&#2346; &#2321;&#2347; &#2347;&#2379;&#2352;&#2381;&#2335;&#2368;' (&#2340;&#2369;&#2352;&#2381;&#2325;&#2344;-&#2319;-&#2330;&#2361;&#2354;&#2327;&#2366;&#2344;&#2368;) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2325;&#2369;&#2331; &#2325;&#2341;&#2344; &#2342;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>A. &#2311;&#2354;&#2381;&#2340;&#2369;&#2340;&#2350;&#2367;&#2358; &#2344;&#2375; '&#2327;&#2381;&#2352;&#2369;&#2346; &#2321;&#2347;&#2364; &#2347;&#2379;&#2352;&#2381;&#2335;&#2368;' (&#2340;&#2369;&#2352;&#2381;&#2325;&#2366;&#2344;-&#2319;-&#2330;&#2361;&#2354;&#2327;&#2366;&#2344;&#2368;) &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368; &#2341;&#2368;&#2404;</p><p>B. &#2309;&#2306;&#2340;&#2340;&#2307; &#2352;&#2332;&#2367;&#2351;&#2366; &#2360;&#2369;&#2354;&#2381;&#2340;&#2366;&#2344;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2311;&#2360; &#2360;&#2350;&#2370;&#2361; &#2325;&#2379; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and B are incorrect</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">Both A and B are correct</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Iltutmish established the 'Group of Forty' (Turkan-i-Chahalgani). These were Turkish amirs (nobles) who advised and helped the Sultan in administering the Sultanate. After the death of Iltutmish, this group assumed great power in its hands. For a few years they decided on the selection of Sultans one after the other. The group was finally eliminated by Balban.</p>",

    "question": "<span class=\"eqt\"><p>Match the columns.</p><p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Slash and burn agriculture</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Associated country</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(A)Ray </td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(I)Brazil</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(B)Conuco</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(II)Venezuela</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(C)Roca</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(III)Central Africa</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(D)Masole</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(IV)Vietnam</td></tr></table></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2377;&#2354;&#2350; &#2325;&#2379; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2325;&#2366;&#2335; &#2340;&#2341;&#2366; &#2342;&#2361;&#2344; &#2325;&#2371;&#2359;&#2367; </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2342;&#2375;&#2358; </b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(A) &#2352;&#2375;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(I) &#2348;&#2381;&#2352;&#2366;&#2395;&#2368;&#2354;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(B) &#2325;&#2377;&#2344;&#2369;&#2325;&#2379;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(II) &#2357;&#2375;&#2344;&#2375;&#2332;&#2364;&#2369;&#2319;&#2354;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(C) &#2352;&#2379;&#2325;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(III) &#2350;&#2343;&#2381;&#2351; &#2309;&#2347;&#2381;&#2352;&#2368;&#2325;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(D) &#2350;&#2360;&#2379;&#2354;&#2375;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(IV) &#2357;&#2367;&#2351;&#2340;&#2344;&#2366;&#2350;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">A-IV, B-II, C-I, D-III</span><span class=\"hqt\" style=\"display:none\">A-IV, B-II, C-I, D-III</span>",
      "<span class=\"eqt\">A-IV, B-III, C-I, D-II</span><span class=\"hqt\" style=\"display:none\">A-IV, B-III, C-I, D-II</span>",
      "<span class=\"eqt\">A-IV, B-I, C-II, D-III</span><span class=\"hqt\" style=\"display:none\">A-IV, B-I, C-II, D-III</span>",
      "<span class=\"eqt\">A-III, B-I, C-II, D-IV</span><span class=\"hqt\" style=\"display:none\">A-III, B-I, C-II, D-IV</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Ray: This is the term for slash-and-burn agriculture practiced in (IV) Vietnam.</p><p>Conuco: This is the term used in (II) Venezuela.</p><p>Roca: This is the name given to shifting cultivation in (I) Brazil.</p><p>Masole: This term is used for this type of agriculture in (III) Central Africa, particularly in the Congo basin.</p><p></p>",
    "question_index": 44
  },

    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the PM KISAN scheme?</p><p>I. It is a Centrally Sponsored Scheme.</p><p>II. It provides income support of Rs.6000/-per year to farmers irrespective of their land holdings.</p><p>Identify the correct statements:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2368;&#2319;&#2350; &#2325;&#2367;&#2360;&#2366;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;?</p><p>I. &#2351;&#2361; &#2319;&#2325; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2366;&#2351;&#2379;&#2332;&#2367;&#2340; &#2351;&#2379;&#2332;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2351;&#2361; &#2325;&#2367;&#2360;&#2366;&#2344;&#2379;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2368; &#2349;&#2370;&#2350;&#2367; &#2332;&#2379;&#2340; &#2325;&#2375; &#2348;&#2366;&#2357;&#2332;&#2370;&#2342; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; 6000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2310;&#2351; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p>&#2360;&#2361;&#2368; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">I Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I &amp; II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II.</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II.</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b><u>Pradhan Mantri Kisan Samman Nidhi:</u></b></p><p>To provide income support to all land holding farmer families having cultivable land and to provide investment for inputs, the government of India launched Pradhan Mantri Kisan Samman Nidhi scheme.</p><p>&#8226; It is a Central sector scheme meaning the scheme is 100% funded by the central Government.</p><p>&#8226; It provides income support of Rs.6000/-per year is provided to all land holding farmer families across the country, irrespective of land size, in three equal instalments of Rs.2000/-every four months.</p><p>&#8226; The entire identification of the family rests with the state and Union Territory governments.</p><p>&#8226; To enrol for the scheme, the farmer has to approach the local revenue officer or PM-KISAN Nodal Officer nominated by the state government. Self registration on the PM-Kisan website is also available. Common Service Centers have also been opened.</p><p>&#8226; Certain sections of people who hold any constitutional position or are the Members of the Parliament or the Legislative Assembly, Central and state government employees cannot avail the benefits of the scheme.</p>",
    "question_index": 45
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements are correct?</p><p>Statement I. President of India gives the resignation to the Chief Justice of India.</p><p>Statement II. Vice President gives the resignation to the President of India.</p><p>Statement III. Governor gives the resignation to the Chief Minister of the respective State.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;</p><p>&#2325;&#2341;&#2344; I. &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2343;&#2368;&#2358; &#2325;&#2379; &#2311;&#2360;&#2381;&#2340;&#2368;&#2347;&#2366; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; II. &#2313;&#2346;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2379; &#2311;&#2360;&#2381;&#2340;&#2368;&#2347;&#2366; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2325;&#2341;&#2344; III. &#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354;, &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2379; &#2311;&#2360;&#2381;&#2340;&#2368;&#2347;&#2366; &#2342;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Statement I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I</span>",
      "<span class=\"eqt\">Statement II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II</span>",
      "<span class=\"eqt\">Statement III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; III</span>",
      "<span class=\"eqt\">Statement II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Statement I: President of India gives the resignation to the Chief Justice of India.</p><p>This statement is incorrect.</p><p>According to Article 56(1)(a) of the Indian Constitution, the President addresses his resignation letter to the Vice-President of India. The Vice-President then communicates this to the Speaker of the Lok Sabha. The Chief Justice of India administers the oath of office to the President but does not receive the President's resignation.</p><p>Statement II: Vice President gives the resignation to the President of India.</p><p>This statement is correct.</p><p>According to Article 67(a) of the Constitution, the Vice-President may resign from his office by submitting a resignation letter addressed to the President of India.</p><p>Statement III: Governor gives the resignation to the Chief Minister of the respective State.</p><p>This statement is incorrect.</p><p>The Governor of a state is appointed by the President and holds office during the pleasure of the President. According to Article 156(2) of the Constitution, a Governor submits his resignation letter to the President of India, not the Chief Minister.</p><p>Conclusion:</p><p>Since only Statement II is correct, the correct option is (b).</p>",
    "question_index": 46
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following projects are incorporated under PM Gati-Shakti Plan?</p><p>a) Bharatmala</p><p>b) Sagarmala</p><p>c) UDAN</p><p>Choose the correct option</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2346;&#2352;&#2367;&#2351;&#2379;&#2332;&#2344;&#2366;&#2319;&#2305; &#2346;&#2368;&#2319;&#2350; &#2327;&#2340;&#2367;-&#2358;&#2325;&#2381;&#2340;&#2367; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2306;?</p><p>a) &#2349;&#2366;&#2352;&#2340;&#2350;&#2366;&#2354;&#2366;</p><p>b) &#2360;&#2366;&#2327;&#2352;&#2350;&#2366;&#2354;&#2366;</p><p>c) &#2313;&#2337;&#2364;&#2366;&#2344;</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>",
      "<span class=\"eqt\">Only c and a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c &#2324;&#2352; a</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The PM Gati Shakti National Master Plan includes a number of projects to improve India's infrastructure</p><p>&bull; It includes projects such as Bharatmala, Sagarmala, inland waterways, dry/land ports, and UDAN.</p><p>Further Insight:</p><p>&bull; PM Gati Shakti - National Master Plan for Multi-modal Connectivity</p><p>&#9675; Launched by the Prime Minister to streamline infrastructure connectivity.</p><p>&#9675; A digital platform integrating 16 Ministries, including Railways and Roadways, for cohesive planning and implementation.</p><p>&#9675; Key Objectives</p><p>&#9632; Multi-modal Connectivity:</p><p>&bull; Provides integrated, seamless movement for people, goods, and services across various modes of transport.</p><p>&#9632; Infrastructure Enhancement:</p><p>&bull; Facilitates last-mile connectivity and reduces travel time.</p><p>&bull; Improves the coordination and efficiency of infrastructure projects.</p><p>&#9675; Vision of PM Gati Shakti</p><p>&#9632; Incorporates Infrastructure Schemes:</p><p>&bull; Includes national and state projects like Bharatmala, Sagarmala, inland waterways, dry/land ports, UDAN, etc.</p><p>&#9632; Enhanced Economic Zones:</p><p>&bull; Aims to boost connectivity in economic zones such as textile and pharmaceutical clusters, defense corridors, electronic parks, industrial and fishing clusters, and agricultural zones.</p><p>&bull; Promotes competitiveness of Indian businesses.</p><p>&#9632; Technology Integration:</p><p>&bull; Leverages spatial planning tools using ISRO imagery developed by BiSAG-N (Bhaskaracharya National Institute for Space Applications and Geoinformatics) for advanced planning and monitoring.</p>",
    "question_index": 47
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the correct statement about the Prahdhan Mantri Shram Yogi Maan Dhan Yojana.</p><p>A. Age group should be of 18-40 years</p><p>B. After attaining the age of 60 yrs, beneficiaries are entitled to receive minimum monthly assured pension of Rs.5000/-.</p><p>C. On death of the beneficiary, spouse is eligible for 50% monthly pension.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2358;&#2381;&#2352;&#2350; &#2351;&#2379;&#2327;&#2368; &#2350;&#2366;&#2344;-&#2343;&#2344; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p>A. &#2310;&#2351;&#2369; &#2357;&#2352;&#2381;&#2327; 18-40 &#2340;&#2325; &#2357;&#2352;&#2381;&#2359; &#2361;&#2379;&#2344;&#2375; &#2330;&#2366;&#2361;&#2367;&#2319;</p><p>B. 60 &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2310;&#2351;&#2369; &#2346;&#2370;&#2352;&#2368; &#2361;&#2379;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2354;&#2366;&#2349;&#2366;&#2352;&#2381;&#2341;&#2368; &#2352;&#2369;.5000/- &#2325;&#2368; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2350;&#2366;&#2360;&#2367;&#2325; &#2360;&#2369;&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2346;&#2375;&#2306;&#2358;&#2344; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2361;&#2325;&#2342;&#2366;&#2352; &#2361;&#2376;&#2306;&#2404;</p><p>C. &#2354;&#2366;&#2349;&#2366;&#2352;&#2381;&#2341;&#2368; &#2325;&#2368; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2346;&#2352;, &#2313;&#2360;&#2325;&#2375; &#2346;&#2340;&#2367; &#2351;&#2366; &#2346;&#2340;&#2381;&#2344;&#2368; 50% &#2350;&#2366;&#2360;&#2367;&#2325; &#2346;&#2375;&#2306;&#2358;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2366;&#2340;&#2381;&#2352; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only A is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only B and C are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B &#2324;&#2352; C &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">A, B and C are Correct</span><span class=\"hqt\" style=\"display:none\">A, B &#2324;&#2352; C &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only A and C are correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2324;&#2352; C &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A. Age group should be of 18-40 years</p><p>This statement is CORRECT. The Pradhan Mantri Shram Yogi Maan-Dhan (PM-SYM) is a voluntary and contributory pension scheme for unorganized sector workers. The entry age for subscribing to the scheme is between 18 and 40 years.</p><p>B. After attaining the age of 60 yrs, beneficiaries are entitled to receive minimum monthly assured pension of Rs.5000/-.</p><p>This statement is INCORRECT. While beneficiaries are entitled to a pension after attaining the age of 60, the minimum assured monthly pension amount is &#8377;3,000, not &#8377;5,000.</p><p>C. On death of the beneficiary, spouse is eligible for 50% monthly pension.</p><p>This statement is CORRECT. This refers to the family pension benefit. If the beneficiary dies after the pension has started (i.e., after age 60), their spouse is entitled to receive 50% of the beneficiary's pension as a family pension for the rest of their life.</p>",
    "question_index": 48
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct about the Dravida style of Temple architecture?</p><p>I. It has curvilinear top or Shikhara.</p><p>II. This type of temples are found in Thanjavur and Kanchipuram.</p><p>Select the correct answer using the code given below:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2306;&#2342;&#2367;&#2352; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2354;&#2366; &#2325;&#2368; &#2342;&#2381;&#2352;&#2357;&#2367;&#2337;&#2364; &#2358;&#2376;&#2354;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2311;&#2360;&#2325;&#2366; &#2358;&#2368;&#2352;&#2381;&#2359; &#2351;&#2366; &#2358;&#2367;&#2326;&#2352; &#2357;&#2325;&#2381;&#2352;&#2368;&#2351; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2350;&#2306;&#2342;&#2367;&#2352; &#2340;&#2306;&#2332;&#2366;&#2357;&#2369;&#2352; &#2324;&#2352; &#2325;&#2366;&#2306;&#2330;&#2368;&#2346;&#2369;&#2352;&#2350; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;:</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I is INCORRECT. Dravida style temples have <b>Pyramidal top</b>. Nagara style temples have a curvilinear top.</p><p>Statement II is correct. This type of temples were built by <b>Chola &amp; Pallava Kings</b>.</p><p>Dravida temples have huge Gopuram or gate. Each main temple has many subsidiary temples; this style is known as <b>Panchayatana.</b> <b> The temples of Thanjavur and Kanchipuram are built in the Dravida style.</b></p><p>Source: NCERT- Introduction to Fine Arts Class XI</p>",
    "question_index": 49
  },
  {
    "question": "<span class=\"eqt\"><p>During a certain time of the day, the sun is 60&deg; above the horizontal. What is difference between the heights (in metres) of two building that cast shadows of 17 m and 15 m respectively during that time?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2344; &#2325;&#2375; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2360;&#2350;&#2351; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;, &#2360;&#2370;&#2352;&#2381;&#2351; &#2325;&#2381;&#2359;&#2376;&#2340;&#2367;&#2332; &#2360;&#2375; 60&deg; &#2314;&#2346;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2360;&#2350;&#2351; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 17 m &#2324;&#2352; 15 m &#2325;&#2368; &#2331;&#2366;&#2351;&#2366; &#2337;&#2366;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2342;&#2379; &#2311;&#2350;&#2366;&#2352;&#2340;&#2379;&#2306; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2311;&#2351;&#2379;&#2306; (&#2350;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306;) &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">32&radic;3</span><span class=\"hqt\" style=\"display:none\">32&radic;3</span>",

    "solution": "<p><img width=183 height=184 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p8370/image094.jpg\"></p><p>Angle of elevation and depression are always measured from the horizontal. This means that, a point at the end of the buildings shadow there is an angle of 60&deg; between the ground and a line to the top of the building. Let AB be the building and BC be its shadow.</p><p>For the first building:</p><p>AB/BC = tan 60&deg;</p><p>AB = 17 * &radic;3 = 17&radic;3 metres</p><p>For the second building:</p><p>AB/BC = tan 60&deg;</p><p>AB = 15 * &radic;3 = 15&radic;3 metres</p><p>So, difference = 17&radic;3  -  15&radic;3 = 2&radic;3 metres</p>",

    "question": "<span class=\"eqt\"><p>A set of observations is given below: 24, 20, 44, 36, 12, 14, 30, 72, 56, 40 and 48. If mean and Median of the set of observations are a and b, respectively, then what is the value of (7a + 5b)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;&#2379;&#2306; &#2325;&#2366; &#2319;&#2325; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;:</p><p>24, 20, 44, 36, 12, 14, 30, 72, 56, 40 &#2324;&#2352; 48</p><p>&#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2375;&#2325;&#2381;&#2359;&#2339;&#2379;&#2306; &#2325;&#2375; &#2360;&#2350;&#2369;&#2330;&#2381;&#2330;&#2351; &#2325;&#2366; &#2350;&#2366;&#2343;&#2381;&#2351; &#2324;&#2352; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; a &#2324;&#2352; b &#2361;&#2376;&#2306;, &#2340;&#2379; (7a + 5b) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">456</span><span class=\"hqt\" style=\"display:none\">456</span>",
      "<span class=\"eqt\">464</span><span class=\"hqt\" style=\"display:none\">464</span>",
      "<span class=\"eqt\">412</span><span class=\"hqt\" style=\"display:none\">412</span>",
      "<span class=\"eqt\">432</span><span class=\"hqt\" style=\"display:none\">432</span>"

    "correct_option_id": 3,
    "solution": "<p>Mean = a = (24 + 20 + 44 + 36 + 12 + 14 + 30 + 72 + 56 + 40 + 48)/11 = 36</p><p>Arranging data in ascending order = {12, 14, 20, 24, 30, 36, 40, 44, 48, 56, 72}</p><p>Median = b = 6<sup>th</sup> term = 36</p><p>Hence, (7a + 5b) = 7 * 36 + 5 * 36 = 432</p>",

    "question": "<span class=\"eqt\"><p>In a &#8710;STU, the median TW intersects SU at W and the median SV intersects TU at V, if TY = 18 cm and SY = 12 cm, where Y is centroid, then what is the difference between SV and TW?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#8710;STU &#2350;&#2375;&#2306;, &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; TW, SU &#2325;&#2379; W &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; SV, TU &#2325;&#2379; V &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2351;&#2342;&#2367; TY = 18 cm &#2324;&#2352; SY = 12 cm &#2361;&#2376;, &#2332;&#2361;&#2366;&#2305; Y &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2325; &#2361;&#2376;, &#2340;&#2379; SV &#2324;&#2352; TW &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">1842&radic;7</span><span class=\"hqt\" style=\"display:none\">1842&radic;7</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Given, x<sup>2</sup>  -  2&radic;7x  -  1 = 0</p><p>=&gt; x<sup>2</sup>  -  1 = 2&radic;7x</p><p>=&gt; x  -  1/x = 2&radic;7 ---(1)</p><p>Squaring both sides, we get.</p><p>(x  -  1/x)<sup>2</sup> = (2&radic;7)<sup>2</sup></p><p>=&gt; x<sup>2</sup> + 1/x<sup>2</sup>  -  2 = 28</p><p>=&gt; x<sup>2</sup> + 1/x<sup>2</sup> = 30 ---(2)</p><p>Taking cube of eqn(1), we get.</p><p>(x  -  1/x)<sup>3</sup> = (2&radic;7)<sup>3</sup></p><p>=&gt; x<sup>3</sup>  -  3(x  -  1/x)  -  1/x<sup>3</sup> = 56&radic;7</p><p>=&gt; x<sup>3</sup>  -  1/x<sup>3</sup> = 56&radic;7 + 3 * 2&radic;7</p><p>=&gt; x<sup>3</sup>  -  1/x<sup>3</sup> = 62&radic;7 ---(3)</p><p>Multiplying eqs (2) and (3), we get.</p><p>(x<sup>2</sup> + 1/x<sup>2</sup>)( x<sup>3</sup>  -  1/x<sup>3</sup>) = 30 * 62&radic;7</p><p>=&gt; x<sup>5</sup> - 1/x<sup>5</sup> + (x  -  1/x) = 1860&radic;7</p><p>=&gt; x<sup>5</sup> - 1/x<sup>5</sup> = 1860&radic;7  -  2&radic;7</p><p>=&gt; x<sup>5</sup> - 1/x<sup>5</sup> = 1858&radic;7</p>",
    "question_index": 59
  },

    "question": "<span class=\"eqt\"><p>Five branches of a publishing company have sold books in 2010 and 2011 (in thousand).</p><p>Find out the total sales (in thousand) of the company's branches C1, C3 and C5 in both years.</p><p><img width=541 height=319 id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25158/image044.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2344; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2368; &#2346;&#2366;&#2306;&#2330; &#2358;&#2366;&#2326;&#2366;&#2323;&#2306; &#2344;&#2375; 2010 &#2324;&#2352; 2011 &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2366;&#2348;&#2375;&#2306; &#2348;&#2375;&#2330;&#2368;&#2306; (&#2361;&#2332;&#2366;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306;)&#2404;</p><p>&#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2368; &#2358;&#2366;&#2326;&#2366;&#2323;&#2306; C1, C3 &#2324;&#2352; C5 &#2325;&#2368; &#2325;&#2369;&#2354; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; (&#2361;&#2332;&#2366;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=541 height=319 id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25158/image044.png\"></p></span>",
    "options": [

    "solution": "<p>Total sale in C1 = 68 + 74 = 142</p><p>Total sale in C3 = 84 + 77 = 161</p><p>Total sale in C5 = 85 + 72 = 157</p><p>Total sales (in thousand) of the company's branches C1, C3 and C5 in both years = 142 + 161 + 157</p><p>= 460</p>",

    "question": "<span class=\"eqt\"><p>In a circle with center O and diameter 58 cm, MN and PQ are two parallel chords of lengths 40 cm and K cm respectively and the chords are on the opposite side of the centre O. The distance between the chords is 41 cm. Find the value of K.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2324;&#2352; 58 cm &#2357;&#2381;&#2351;&#2366;&#2360; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2350;&#2375;&#2306;, MN &#2324;&#2352; PQ &#2342;&#2379; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2332;&#2368;&#2357;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 40 cm &#2324;&#2352; K cm &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2332;&#2368;&#2357;&#2366;&#2319;&#2305; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2346;&#2325;&#2381;&#2359; &#2346;&#2352; &#2361;&#2376;&#2306;&#2404; &#2332;&#2368;&#2357;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 41 cm &#2361;&#2376;&#2404; K &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",
      "<span class=\"eqt\">56</span><span class=\"hqt\" style=\"display:none\">56</span>",
      "<span class=\"eqt\">40</span><span class=\"hqt\" style=\"display:none\">40</span>",
      "<span class=\"eqt\">42</span><span class=\"hqt\" style=\"display:none\">42</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=268 height=229 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16873/image037.jpg\" ></p><p>In &#916; OMX,</p><p>OM<sup>2</sup> = OX<sup>2</sup> + MX<sup>2</sup></p><p>29<sup>2</sup> = OX<sup>2</sup> + 20<sup>2</sup></p><p>OX<sup>2</sup> = 841  -  400</p><p>OX<sup>2</sup> = 441</p><p>OX = 21 cm</p><p>Given, XY = 41 cm</p><p>Therefore, OY = 41  -  21 = 20 cm</p><p>In &#916; OPY,</p><p>OP<sup>2</sup> = OY<sup>2</sup> + PY<sup>2</sup></p><p>29<sup>2</sup> = 20<sup>2</sup> + (K/2)<sup>2</sup></p><p>841  -  400 = (K/2)<sup>2</sup></p><p>(K/2) = &radic;441</p><p>K = 21 * 2 = 42</p>",
    "question_index": 61
  },
  {
    "question": "<span class=\"eqt\"><p>The ratio of the volume of a cylinder to the volume of a cone is 27/16. If the height of a cone is equal to the height of a cylinder which is equal to 16 cm and the radius of a cone is 7 more than the radius of a cylinder, then find the radius of a cone.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2324;&#2352; &#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 27/16 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;, &#2332;&#2379; 16 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376; &#2324;&#2352; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2360;&#2375; 7 &#2360;&#2375;&#2350;&#2368; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">21 cm</span><span class=\"hqt\" style=\"display:none\">21 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">28 cm</span><span class=\"hqt\" style=\"display:none\">28 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">35 cm</span><span class=\"hqt\" style=\"display:none\">35 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">14 cm</span><span class=\"hqt\" style=\"display:none\">14 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The volume of a cylinder = &#960; r<sup>2</sup> h</p><p>The volume of a cone = 1/3 * &#960; r<sup>2</sup> h</p><p>Let the radius of a cone be 'r' cm.</p><p>{&#960; (r  -  7)<sup>2</sup> *16}/{1/3 * &#960; r<sup>2</sup> * 16 = 27/16</p><p>(r  -  7)<sup>2</sup>/ r<sup>2</sup> = 9/16 </p><p>(r  -  7)/ r = 3/4</p><p>4r  -  28 = 3r </p><p>r = 28 cm</p>",
    "question_index": 62
  },

    "question": "<span class=\"eqt\"><p>In an election between P and Q, every fourth vote polled was marked as invalid by the machine. In the remaining votes, P wins the election with a margin of 6000 votes or 15% of the total votes polled, over Q. If 80% of the invalid votes would have been in favour of Q, then which of the following would have been the result of the election?</p></span><span class=\"hqt\" style=\"display:none\"><p>P &#2324;&#2352; Q &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2330;&#2369;&#2344;&#2366;&#2357; &#2350;&#2375;&#2306;, &#2337;&#2366;&#2354;&#2375; &#2327;&#2319; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2330;&#2380;&#2341;&#2375; &#2350;&#2340; &#2325;&#2379; &#2350;&#2358;&#2368;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2357;&#2376;&#2343; &#2328;&#2379;&#2359;&#2367;&#2340; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404; &#2358;&#2375;&#2359; &#2350;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306;, P, Q &#2360;&#2375; 6000 &#2350;&#2340;&#2379;&#2306; &#2351;&#2366; &#2337;&#2366;&#2354;&#2375; &#2327;&#2319; &#2325;&#2369;&#2354; &#2350;&#2340;&#2379;&#2306; &#2325;&#2375; 15% &#2325;&#2375; &#2309;&#2306;&#2340;&#2352; &#2360;&#2375; &#2330;&#2369;&#2344;&#2366;&#2357; &#2332;&#2368;&#2340;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 80% &#2309;&#2357;&#2376;&#2343; &#2350;&#2340; Q &#2325;&#2375; &#2346;&#2325;&#2381;&#2359; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2330;&#2369;&#2344;&#2366;&#2357; &#2325;&#2366; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Q would have won by 5%</span><span class=\"hqt\" style=\"display:none\">Q, 5% &#2360;&#2375; &#2330;&#2369;&#2344;&#2366;&#2357; &#2332;&#2368;&#2340;&#2375;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Q would have won by 10%</span><span class=\"hqt\" style=\"display:none\">Q, 10% &#2360;&#2375; &#2330;&#2369;&#2344;&#2366;&#2357; &#2332;&#2368;&#2340;&#2375;&#2327;&#2366;</span>",
      "<span class=\"eqt\">P would have won by 3%</span><span class=\"hqt\" style=\"display:none\">P, 3% &#2360;&#2375; &#2330;&#2369;&#2344;&#2366;&#2357; &#2332;&#2368;&#2340;&#2375;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Both will get equal votes</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2379; &#2348;&#2352;&#2366;&#2348;&#2352; &#2350;&#2340; &#2350;&#2367;&#2354;&#2375;&#2306;&#2327;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Given,</p><p>15% of total votes polled = 6000</p><p>100% of total votes polled = 6000 x 100/15 = 40000</p><p>Number of invalid votes = 40000/4 = 10000</p><p>Number of valid votes = 30000</p><p>Given, P wins with a margin of 6000 votes, so the number of votes P gets = 18000, and the number of votes Q gets = 12000</p><p>Now, 80% of 10000 = 8000</p><p>So, the number of votes Q gets = 8000 + 12000 = 20000</p><p>So, Q would have won the election with a margin of 20000 - 18000 = 2000 votes.</p><p>Required percentage = 2000 x 100/40000 = 5%</p>",
    "question_index": 63
  },

    "question": "<span class=\"eqt\"><p>If the intersection point of the equations 4x  -  7y  -  60 = 0 and 5x + 12y + 8 = 0 on the graph is (x, y), then the value of (7x + 2y) is equal to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2327;&#2381;&#2352;&#2366;&#2347; &#2346;&#2352; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339;&#2379;&#2306; 4x - 7y - 60 = 0 &#2324;&#2352; 5x + 12y + 8 = 0 &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2348;&#2367;&#2306;&#2342;&#2369; (x, y) &#2361;&#2376;, &#2340;&#2379; (7x + 2y) &#2325;&#2366; &#2350;&#2366;&#2344; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">48</span><span class=\"hqt\" style=\"display:none\">48</span>",

      "<span class=\"eqt\">60</span><span class=\"hqt\" style=\"display:none\">60</span>",
      "<span class=\"eqt\">52</span><span class=\"hqt\" style=\"display:none\">52</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>4x  -  7y  -  60 = 0 .... (i)</p><p>5x + 12y + 8 = 0 .... (ii)</p><p>Multiply (i) by -5 and (ii) by 4</p><p>-20x + 35y = -300 .. (iii)</p><p>20x + 48y = -32 ... (iv)</p><p>From (iii) and (iv)</p><p>y = -4, x = 8</p><p>Hence, 7 * 8 + 2 * (-4) = 48</p>",

    "question": "<span class=\"eqt\"><p>The average marks of 27 students (student A and student B included) are 47. The ratio of marks obtained by student A to that of student B is 41: 32. If the marks of student A and B are excluded, the average marks of the remaining 25 students is 42. Find the marks obtained by student A.</p></span><span class=\"hqt\" style=\"display:none\"><p>27 &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; (&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2368; A &#2324;&#2352; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2368; B &#2360;&#2361;&#2367;&#2340;) &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; 47 &#2361;&#2376;&#2306;&#2404; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2368; A &#2324;&#2352; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2368; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 41: 32 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2368; A &#2324;&#2352; B &#2325;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2361;&#2335;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359; 25 &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2309;&#2306;&#2325; 42 &#2361;&#2376;&#2306;&#2404; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2368; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2309;&#2306;&#2325; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">82</span><span class=\"hqt\" style=\"display:none\">82</span>",
      "<span class=\"eqt\">123</span><span class=\"hqt\" style=\"display:none\">123</span>",
      "<span class=\"eqt\">164</span><span class=\"hqt\" style=\"display:none\">164</span>",
      "<span class=\"eqt\">41</span><span class=\"hqt\" style=\"display:none\">41</span>"

    "correct_option_id": 1,
    "solution": "<p>Total marks obtained by 27 students = 27 * 47 = 1269</p><p>Total marks obtained by 25 students = 25 * 42 = 1050</p><p>Sum of marks obtained by student A and student B = 1269  -  1050 = 219</p><p>According to the question,</p><p>41 + 32 = 73 units = 219 marks</p><p>1 unit = 3 marks</p><p>41 units = 41 * 3 = 123.</p>",

  },

    "question": "<span class=\"eqt\"><p>An article with a marked price of Rs.9137 was sold for Rs.7826, after a discount of X% was offered. What was the value of X (Up to two decimal places)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2369;. 9137 &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; X% &#2325;&#2368; &#2331;&#2370;&#2335; &#2325;&#2375; &#2348;&#2366;&#2342; &#2352;&#2369;. 7826 &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; X &#2325;&#2366; &#2350;&#2366;&#2344; (&#2342;&#2379; &#2342;&#2358;&#2350;&#2354;&#2357; &#2309;&#2306;&#2325; &#2340;&#2325;) &#2325;&#2381;&#2351;&#2366; &#2361;&#2376; ?</p></span>",

    "question": "<span class=\"eqt\"><p>A candidate misinterpreted the timings of an interview and reached the venue 35 minutes before the scheduled time. After 25 minutes, he presumed that the interview might have been cancelled and so he started walking back home at the speed of 1 kmph. But then he realized that he had left his bag there. So he comes back with the same speed and enters the office along with the interviewer, who is 5 minutes late. How much distance had he moved away from the office?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352; &#2344;&#2375; &#2319;&#2325; &#2360;&#2366;&#2325;&#2381;&#2359;&#2366;&#2340;&#2381;&#2325;&#2366;&#2352; &#2325;&#2375; &#2360;&#2350;&#2351; &#2325;&#2366; &#2327;&#2354;&#2340; &#2309;&#2352;&#2381;&#2341; &#2354;&#2327;&#2366;&#2351;&#2366; &#2324;&#2352; &#2357;&#2361; &#2360;&#2366;&#2325;&#2381;&#2359;&#2366;&#2340;&#2381;&#2325;&#2366;&#2352; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2360;&#2350;&#2351; &#2360;&#2375; 35 &#2350;&#2367;&#2344;&#2335; &#2346;&#2361;&#2354;&#2375; &#2346;&#2361;&#2369;&#2305;&#2330; &#2327;&#2351;&#2366;&#2404; 25 &#2350;&#2367;&#2344;&#2335; &#2348;&#2366;&#2342;, &#2313;&#2360;&#2344;&#2375; &#2351;&#2361; &#2350;&#2366;&#2344; &#2354;&#2367;&#2351;&#2366; &#2325;&#2367; &#2360;&#2366;&#2325;&#2381;&#2359;&#2366;&#2340;&#2381;&#2325;&#2366;&#2352; &#2352;&#2342;&#2381;&#2342; &#2361;&#2379; &#2327;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366; &#2324;&#2352; &#2311;&#2360;&#2354;&#2367;&#2319; &#2357;&#2361; 1 &#2325;&#2367;&#2350;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2352;&#2347;&#2381;&#2340;&#2366;&#2352; &#2360;&#2375; &#2346;&#2376;&#2342;&#2354; &#2357;&#2366;&#2346;&#2360; &#2330;&#2354;&#2344;&#2375; &#2354;&#2327;&#2366;&#2404; &#2354;&#2375;&#2325;&#2367;&#2344; &#2347;&#2367;&#2352; &#2313;&#2360;&#2375; &#2351;&#2366;&#2342; &#2310;&#2351;&#2366; &#2325;&#2367; &#2313;&#2360;&#2344;&#2375; &#2309;&#2346;&#2344;&#2368; &#2348;&#2376;&#2327; &#2357;&#2361;&#2368;&#2306; &#2331;&#2379;&#2337;&#2364; &#2342;&#2367;&#2351;&#2366; &#2361;&#2376;&#2404; &#2340;&#2379; &#2357;&#2361; &#2313;&#2360;&#2368; &#2352;&#2347;&#2381;&#2340;&#2366;&#2352; &#2360;&#2375; &#2357;&#2366;&#2346;&#2360; &#2310;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2360;&#2366;&#2325;&#2381;&#2359;&#2366;&#2340;&#2381;&#2325;&#2366;&#2352;&#2325;&#2352;&#2381;&#2340;&#2366; &#2325;&#2375; &#2360;&#2366;&#2341; &#2321;&#2347;&#2367;&#2360; &#2350;&#2375;&#2306; &#2342;&#2366;&#2326;&#2367;&#2354; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2360;&#2381;&#2357;&#2351;&#2306; 5 &#2350;&#2367;&#2344;&#2335; &#2354;&#2375;&#2335; &#2361;&#2376;&#2404; &#2313;&#2360;&#2344;&#2375; &#2321;&#2347;&#2367;&#2360; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2368; &#2341;&#2368;?</p></span>",

    "question": "<span class=\"eqt\"><p>N is a positive integer. If N is divided by 7 then it gives remainder as 4, and when (N + 5) is divided by 9, the remainder is 2. Which of the following possible value of N is:</p></span><span class=\"hqt\" style=\"display:none\"><p>N &#2319;&#2325; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; N &#2325;&#2379; 7 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2311;&#2360;&#2325;&#2366; &#2358;&#2375;&#2359;&#2347;&#2354; 4 &#2348;&#2330;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2332;&#2348; (N + 5) &#2325;&#2379; 9 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; 2 &#2348;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; N &#2325;&#2366; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2350;&#2366;&#2344; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">127</span><span class=\"hqt\" style=\"display:none\">127</span>",
      "<span class=\"eqt\">123</span><span class=\"hqt\" style=\"display:none\">123</span>",
      "<span class=\"eqt\">121</span><span class=\"hqt\" style=\"display:none\">121</span>",

    "correct_option_id": 1,
    "solution": "<p>By solving this question with option:</p><p>Option (a): 127/7 it gives remainder as 1 and when (127 + 5)/9 it gives remainder as 6.</p><p>It does not satisfy the above conditions.</p><p>Option (b): 123/7 it gives remainder as 4 and when (123 + 5)/9 it gives remainder as 2.</p><p>It satisfies the above conditions.</p><p>Option (c): 121/7 it gives remainder as 2 and when (121 + 5)/9 it gives remainder as 0.</p><p>It does not satisfy the above conditions.</p><p>Option (d): 122/7 it gives remainder as 3 and when (122 + 5)/9 it gives remainder as 1.</p><p>It does not satisfy the above conditions.</p><p>Therefore, option (2) is correct.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following is/are correct? </p><p>I: Ratio of the volume of two cylinders is equal to the ratio of square of their respective radius. </p><p>II: Ratio of the curved surface area of two cylinders is equal to the ratio of product of their respective radius and height. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I: &#2342;&#2379; &#2348;&#2375;&#2354;&#2344;&#2379;&#2306; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340;, &#2313;&#2344;&#2325;&#2368; &#2360;&#2350;&#2381;&#2348;&#2306;&#2343;&#2367;&#2340; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2375; &#2357;&#2352;&#2381;&#2327; &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404;</p><p>II: &#2342;&#2379; &#2348;&#2375;&#2354;&#2344;&#2379;&#2306; &#2325;&#2375; &#2357;&#2325;&#2381;&#2352; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340;, &#2313;&#2344;&#2325;&#2368; &#2360;&#2350;&#2381;&#2348;&#2306;&#2343;&#2367;&#2340; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2340;&#2341;&#2366; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2375; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let radius of two cylinders are r<sub>1</sub> and r<sub>2</sub> respectively while their heights are h<sub>1</sub> and h<sub>2</sub> respectively. </p><p>Ratio of volume of both cylinders = &#960;r<sub>1</sub><sup>2</sup>h<sub>1</sub> = &#960;r<sub>2</sub><sup>2</sup>h<sub>2</sub></p><p>Ratio of curved surface area of both cylinders = 2&#960;r<sub>1</sub>h<sub>1</sub> = 2&#960;r<sub>2</sub>h<sub>2</sub></p><p>We can clearly see that \"Ratio of the volume of two cylinders is equal to the ratio of product of their height and square of radius.\" Also \"Ratio of the curved surface area of two cylinders is equal to the ratio of product of their respective radius and height\". </p><p>Hence, only II is correct. </p>",
    "question_index": 69

    "question": "<p>Select the option that expresses the given sentence in passive voice.</p><p>The teacher looks after the students during the school trip. The students smile at the beautiful scenery they encounter.</p>",
    "options": [
      "The students are looked after by the teacher during the school trip. The beautiful scenery they encounter is smiled at by the students.",
      "The students were looked after by the teacher during the school trip. The beautiful scenery they encounter was smiled at by the students.",

      "The students were looked after by the teacher during the school trip. The beautiful scenery they encounter is smiled by the students."
    ],
    "correct_option_id": 0,
    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of the verbs ['are' and 'is'] is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>In such questions, the preposition is kept intact with the verb while transforming the sentence into Passive Voice.</p><p>The Active form of the sentence is: Subject + V1/V4 + Preposition + Object.</p><p>The Passive form of the sentence is: Object of the active voice (Subjective case) + 'to be' + V3 + Preposition + by + Object.</p><p>Some verbs that have their prepositions intact in Passive voice: <b>Look at, look down upon, look after, laugh at, smile at, enquired into, ignorant of</b>.</p><p>Also, the sentence is in the Present Indefinite tense in the Active voice. So, in the Passive voice, Present indefinite tense should be used.</p><p>For example:</p><p>The detective enquires into the case. (Active)</p><p>The case is enquired into by the detective.</p><p>The options except (a) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is <b>option a)</b>: The students are looked after by the teacher during the school trip. The beautiful scenery they encounter is smiled at by the students.</p>",
    "question_index": 79
  },

    "question": "<p>Select the most appropriate option to fill in the blank.</p><p>Although North Korea had harsh words for South Korea, its statement stayed away from the kind of belligerent attacks on the United States that have ___________ past announcements.</p>",
