    "question": "<span class=\"eqt\"><p>A and B together can finish a task in 66 minutes. B and C together can finish the same task in 44 minutes. If A and C can finish the same task in 88 minutes, then what part of the task will be finished by A, B and C together in 22 minutes?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 66 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; B &#2324;&#2352; C &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 44 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; A &#2324;&#2352; C &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 88 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; A, B &#2324;&#2352; C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2306;&#2351;&#2369;&#2325;&#2381;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2366;&#2327; 22 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">13/12 part</span><span class=\"hqt\" style=\"display:none\">13/12 &#2349;&#2366;&#2327;</span>",
      "<span class=\"eqt\">1/8 part</span><span class=\"hqt\" style=\"display:none\">1/8 &#2349;&#2366;&#2327;</span>",
      "<span class=\"eqt\">13/24 part</span><span class=\"hqt\" style=\"display:none\">13/24 &#2349;&#2366;&#2327;</span>",
      "<span class=\"eqt\">3/8 part</span><span class=\"hqt\" style=\"display:none\">3/8 &#2349;&#2366;&#2327;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>1/A + 1/B = 1/66..(i)</p><p>1/B + 1/C = 1/44..(ii)</p><p>1/A + 1/C = 1/88..(ii)</p><p>By adding (i), (ii) and (iii), we get</p><p>2 * (1/A + 1/B + 1/C) = 1/66 + 1/44 + 1/88</p><p>1/A + 1/B + 1/C = 13/528</p><p>Therefore, part of the task finished by A, B, and C together in 22 minutes</p><p>= 22 * 13/528</p><p>= <b>13/24</b></p><p></p><p><b>Alternate method:</b></p><p>Let total work = LCM of 44, 66, and 88 = 264 units</p><p>A + B = 264/66 = 4 units/min</p><p>B + C = 264/44 = 6 units/min</p><p>C + A = 264/88 = 3 units/min</p><p>So, 2 * (A + B + C) = 13</p><p>A + B + C = 13/2</p><p>Part of task done by A, B, and C together in 22 min = (22 * 13/2)/264 = 13/24</p>",
    "question_index": 69
  },

    "question": "<span class=\"eqt\"><p><b>Study the following information carefully and answer the related question.</b></p><p>Following line-graph represents the data regarding number of paintings made by two painters during different years.</p><p><img width=576 height=273 id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p10549/image007.png\"></p><p>What is the respective ratio of total number of paintings made by A in 2001 and 2004 together to the total number of paintings made by B in 2003 and 2004 together?</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404;</b></p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2375;&#2326;&#2368;&#2351;-&#2310;&#2352;&#2375;&#2326; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2342;&#2379; &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2366;&#2352;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2344;&#2366;&#2312; &#2327;&#2312; &#2330;&#2367;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2310;&#2325;&#2396;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"273\" id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p10549/image007.png\"></p><p>&#2319;&#2325;-&#2360;     "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Year</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Number of paintings made by A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Number of paintings made by B</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2001</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">110</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">75</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2002</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">90</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">165</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2003</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">125</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">80</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2004</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">130</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">100</td></tr></table><p>Number of paintings made by A in 2001 and 2004 together = 110 + 130 = 240</p><p>And, number of paintings made by B in 2003 and 2004 together = 80 + 100 = 180</p><p>Therefore, required ratio = 240: 180 = <b>4: 3</b></p>",

    "question": "<span class=\"eqt\"><p>In an election between two candidates, 18% of voters did not cast their votes. If 240 votes are declared invalid and the winner gets 60% votes of the total of votes cast and wins by 1060 votes, then find the total number of voters in the voter list. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2330;&#2369;&#2344;&#2366;&#2357; &#2350;&#2375;&#2306;, 18% &#2350;&#2340;&#2342;&#2366;&#2340;&#2366;&#2323;&#2306; &#2344;&#2375; &#2309;&#2346;&#2344;&#2366; &#2350;&#2340;&#2342;&#2366;&#2344; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; 240 &#2350;&#2340; &#2309;&#2357;&#2376;&#2343; &#2328;&#2379;&#2359;&#2367;&#2340; &#2325;&#2367;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2357;&#2367;&#2332;&#2375;&#2340;&#2366; &#2325;&#2379; &#2337;&#2366;&#2354;&#2375; &#2327;&#2319; &#2325;&#2369;&#2354; &#2350;&#2340;&#2379;&#2306; &#2325;&#2366; 60% &#2350;&#2340; &#2350;&#2367;&#2354;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2357;&#2361; 1060 &#2350;&#2340;&#2379;&#2306; &#2360;&#2375; &#2332;&#2368;&#2340; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2350;&#2340;&#2342;&#2366;&#2340;&#2366; &#2360;&#2370;&#2330;&#2368; &#2350;&#2375;&#2306; &#2350;&#2340;&#2342;&#2366;&#2340;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">8000</span><span class=\"hqt\" style=\"display:none\">8000</span>",
      "<span class=\"eqt\">5000</span><span class=\"hqt\" style=\"display:none\">5000</span>",
      "<span class=\"eqt\">4500</span><span class=\"hqt\" style=\"display:none\">4500</span>",
      "<span class=\"eqt\">7500</span><span class=\"hqt\" style=\"display:none\">7500</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the total voters be '100X'</p><p>Votes cast = 100X * (100 - 18)</p><p>= 82X</p><p>Invalid votes = 240</p><p>votes given to winner = 82X * 60/100</p><p>= 246X/5</p><p>Votes given to loser = 82X * 40/100 - 240</p><p>= 164X/5 - 240</p><p>A/Q</p><p>246X/5 - (164X/5 - 240) = 1060</p><p>246X/5 - (164X - 1200)/5 = 1060</p><p>246X - 164X + 1200 = 5300</p><p>82X = 4100</p><p>X = 50</p><p>Hence, the total voters = 50 * 100 = 5000</p><p></p>",
    "question_index": 74
  },
  {
    "question": "<p>Select the option that expresses the given sentence in active voice.</p><p>I was surprised at the cross-section of people there. </p>",
    "options": [
      "The cross-section of people there surprised at me.",
      "The cross-section of people there surprises me.",
      "The cross-section of people there surprised me.",
      "The cross-section of people here surprised at me."
    ],
    "correct_option_id": 2,
    "solution": "<p>The subject of the Passive Voice is changed into the object of the Active Voice. Also, the object of the Passive Voice is changed into the subject of the Active Voice.</p><p>The sentence in the Passive voice is in Simple Past tense. So, the sentence in the Active voice should be in Simple Past tense.</p><p>There are certain verbs that don't agree with the preposition \"by\" in Passive form.</p><p>They take the preposition which is appropriate to them in Passive voice. In Active voice, the preposition is sometimes removed.</p><p>Some of the verbs along with the prepositions (in Passive voice) are given in the table below:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Verb</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Preposition</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Known</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">to</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Surprised</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">at</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Amazed</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">at</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Annoyed (somebody)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">with</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Annoyed (something)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">at</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Included</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">in</td></tr></table></p><p>For example:</p><p>I was annoyed with her. (Passive)</p><p>She annoyed me. (Active)</p><p>So, options (a) and (d) are eliminated because of the usage of the preposition 'at'.</p><p>Option (b) is eliminated because it is in the present tense.</p><p>The options except (c) don't follow the correct grammatical format of the Active Voice for Simple past tense, i.e., 'Subject + V2 + Object'.</p><p>Therefore, the correct answer is option (c): <b>The cross-section of people there surprised me.</b></p>",
    "question_index": 75
  },

    "solution": "<p>The grammatically correct sentence is D. The error in sentence A is related to the verb form. The modal verb \"must\" requires the base form of the verb that follows it. But \"prioritised\" (the past tense form) is incorrect. The correct base form is \"prioritise\". The error in sentence B is related to article usage. The article \"a\" should be replaced with the article \"an\" because \"effective\" starts with a vowel sound. The article \"an\" is used before the words that begin with vowel sounds and 'a' is used before the words that begin with consonant sounds. The error in sentence C is related to article usage and verb form. The article \"a\" should be replaced with \"an\" because \"effective\" starts with a vowel sound. Also, the verb \"prioritised\" is incorrect because \"must\" requires the base form of the verb. Hence, (d) is the correct answer. </p><p><b>NOTE:</b></p><p><b>Modal verb: </b>A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p><p><b>Definite and indefinite articles:</b> In the English language, we have one definite article 'the'; it refers to or introduces, a particular, specific noun. 'An' and 'a' are indefinite articles; they refer to, or introduce, an unspecified noun.</p>",
