<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cgl1 - Responsive Exam Interface</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="60">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Point P lies between points A and F. Point L lies to the north of Point F and northwest of A. Point Y is to the east of Point A and south of Point K. Point H lies between points K and L. What is the direction of Point H with respect to Point P?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2367;&#2306;&#2342;&#2369; P, &#2348;&#2367;&#2306;&#2342;&#2369; A &#2324;&#2352; F &#2325;&#2375; &#2348;&#2368;&#2330; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404; &#2348;&#2367;&#2306;&#2342;&#2369; L, &#2348;&#2367;&#2306;&#2342;&#2369; F &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; &#2324;&#2352; A &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404; &#2348;&#2367;&#2306;&#2342;&#2369; Y, &#2348;&#2367;&#2306;&#2342;&#2369; A &#2325;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357; &#2350;&#2375;&#2306; &#2324;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; K &#2325;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306; &#2361;&#2376;&#2404; &#2348;&#2367;&#2306;&#2342;&#2369; H, &#2348;&#2367;&#2306;&#2342;&#2369; K &#2324;&#2352; L &#2325;&#2375; &#2348;&#2368;&#2330; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404; &#2348;&#2367;&#2306;&#2342;&#2369; P &#2325;&#2375; &#2360;&#2344;&#2381;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2348;&#2367;&#2306;&#2342;&#2369; H &#2325;&#2368; &#2342;&#2367;&#2358;&#2366; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Northeast</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2370;&#2352;&#2381;&#2357;</span>",
      "<span class=\"eqt\">North</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;</span>",
      "<span class=\"eqt\">Northwest</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;</span>",
      "<span class=\"eqt\">Cannot be determined</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Point P lies between points A and F. Point L lies to the north of Point F and northwest of A.</p><p><img width=309 height=162 id=\"Picture 10\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24632/image009.jpg\"></p><p>Point Y is to the east of Point A and south of Point K. Point H lies between points K and L. What is the direction of Point H with respect to Point P?</p><p><img width=409 height=157 id=\"Picture 11\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24632/image010.jpg\"></p><p>Here, the position of H is not fixed.</p><p>So, Point H is towards northeast or northwest or north of Point P.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Choose the figure that is different from the rest.</p><p><img width=227 height=697 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26746/image020.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2358;&#2375;&#2359; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2376;&#2404;</p><p><img width=\"227\" height=\"697\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26746/image020.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Except figure (IV) in all other options the arrow is pointing towards the circle figure.</p><p><img width=221 height=163 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26746/image021.png\"></p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In the question, two statements are given, followed by two conclusions, I and II. You have to consider the statements to be true even if they seems to be at variance from commonly known facts. You have to decide which of the given conclusions, if any, follow(s) from the given statements.</p><p><b>Statements:</b></p><p>Some Paint is Dye</p><p>Some Dye is Shade</p><p><b>Conclusions:</b></p><p>I. Some Paint can be Shade</p><p>II. No Dye is Paint</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2342;&#2379; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2342;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#8203;&#8203;&#2361;&#2376;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2357;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2379;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2342;&#2367;&#2319; &#2327;&#2319; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375;, &#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2361;&#2376;, &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;/&#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p><b>&#2325;&#2341;&#2344;:</b></p><p>&#2325;&#2369;&#2331; &#2346;&#2375;&#2306;&#2335;, &#2337;&#2366;&#2312; &#2361;&#2376;</p><p>&#2325;&#2369;&#2331; &#2337;&#2366;&#2312;, &#2358;&#2375;&#2337; &#2361;&#2376;</p><p><b>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</b></p><p>I. &#2325;&#2369;&#2331; &#2346;&#2375;&#2306;&#2335;, &#2358;&#2375;&#2337; &#2361;&#2379; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;</p><p>II. &#2325;&#2379;&#2312; &#2337;&#2366;&#2312;, &#2346;&#2375;&#2306;&#2335; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</p></span>",
    "options": [
      "<span class=\"eqt\">Only conclusion I follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both conclusions I and II follow</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only conclusion II follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Neither conclusion I nor II follows</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; &#2344; &#2361;&#2368; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img width=284 height=124 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26746/image024.png\"></p><p>Some Paint can be Shade: There is no direct relation between Paint and Shade. Thus, there is a possibility of some Paint being Shade. So, conclusion I follows.</p><p>No Dye is Paint: From the given Venn diagram, some dye is definitely paint. So, conclusion II does not follows. </p><p>Hence, only conclusion I follows.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>How many triangles are there in the given figure?</p><p><img width=197 height=159 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27419/image005.png\" ></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2376;&#2306;?</p><p><img width=\"197\" height=\"159\" id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27419/image005.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">Fourteen</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2342;&#2361;</span>",
      "<span class=\"eqt\">Eleven<b> </b></span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2351;&#2366;&#2352;&#2361;</span>",
      "<span class=\"eqt\">Fifteen</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2342;&#2381;&#2352;&#2361;</span>",
      "<span class=\"eqt\">Nine</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2380;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=192 height=195 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27419/image006.png\" ></p><p>1) AGH</p><p>2) AGB</p><p>3) AGF</p><p>4) AFB</p><p>5) EFH</p><p>6) EDI</p><p>7) DIC</p><p>8) DEC</p><p>9) BIC</p><p>10) BIG</p><p>11) ABI</p><p>12) AFH</p><p>13) AED</p><p>14) AEF</p><p>15) AEI</p><p>So, there are Fifteen triangles.</p>",

  {
    "question": "<span class=\"eqt\"><p>The position of how many letters will remain unchanged if each of the letters in the word ZYMURGY is arranged in reverse alphabetical order from left to right (i.e., Z to A)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2358;&#2348;&#2381;&#2342; ZYMURGY &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2379; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2366;&#2319;&#2305; (&#2309;&#2352;&#2381;&#2341;&#2366;&#2340; Z &#2360;&#2375; A &#2340;&#2325;) &#2313;&#2354;&#2381;&#2335;&#2375; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2309;&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2352;&#2361;&#2375;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Four<b> </b></span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;</span>",
      "<span class=\"eqt\">More than four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>"

    "correct_option_id": 1,
    "solution": "<p>ZYMURGY</p><p>Reverse - alphabetical order:</p><p><b>ZY</b>Y<b>UR</b>MG</p><p>So, the position of four letters will remain unchanged. </p>",

  },
  {
    "question": "<span class=\"eqt\"><p>Select the option that is related to the fifth number in the same way as the second number is related to the first number and the fourth number is related to the third number</p><p>65 : 117 :: 85 : 153 :: 105 : ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2379; &#2346;&#2366;&#2305;&#2330;&#2357;&#2368;&#2306; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2346;&#2361;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2324;&#2352; &#2330;&#2380;&#2341;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2340;&#2368;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>65 : 117 :: 85 : 153 :: 105 : ?</p></span>",
    "options": [
      "<span class=\"eqt\">193</span><span class=\"hqt\" style=\"display:none\">193</span>",
      "<span class=\"eqt\">207</span><span class=\"hqt\" style=\"display:none\">207</span>",
      "<span class=\"eqt\">171</span><span class=\"hqt\" style=\"display:none\">171</span>",
      "<span class=\"eqt\">189</span><span class=\"hqt\" style=\"display:none\">189</span>"

    "correct_option_id": 3,
    "solution": "<p>13  X  5 = 65 : 13  X  9 = 117</p><p>17  X  5 = 85 : 17  X  9 = 153</p><p>21  X  5 = 105 : 21  X  9 = <b>189</b></p><p>Thus, the answer is option (d).</p>",

    "options": [
      "<span class=\"eqt\">Calcium Sulphate + H<sub>2</sub>O</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2376;&#2354;&#2381;&#2358;&#2367;&#2351;&#2350; &#2360;&#2354;&#2381;&#2347;&#2375;&#2335; + H<sub>2</sub>O</span>",

    "solution": "<p>Carbon dioxide (CO<sub>2</sub>) + Lime water [Ca(OH)<sub>2 </sub>] &rarr; <b>Calcium Carbonate (CaCO<sub>3 </sub>) + Water (H<sub>2</sub>O).</b> When carbon dioxide is passed through lime water, calcium carbonate is formed, which makes lime water milky. The turning of lime water into milky is a standard test of carbon dioxide. </p>",

    "question": "<span class=\"eqt\"><p>Identity the incorrectly matched pair. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2354;&#2340; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Village headman - Grama Bhojaka</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2366;&#2350; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; - &#2327;&#2381;&#2352;&#2366;&#2350; &#2349;&#2379;&#2332;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Grihapatis - Independent farmers</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2371;&#2361;&#2346;&#2340;&#2367; - &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2367;&#2360;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Karmakara - Landless workers</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2350;&#2325;&#2366;&#2352; - &#2349;&#2370;&#2350;&#2367;&#2361;&#2368;&#2344; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Shrenis - Blacksmiths</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2375;&#2339;&#2367;&#2360; - &#2354;&#2379;&#2361;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In the northern part of the country, the village headman was known as the grama bhojaka. Usually, men from the same family held the position for generations. </p><p>Apart from the gramabhojaka, there were other independent farmers, known as grihapatis, most of whom were smaller landowners. And then there were men and women such as the dasa karmakara, who did not own land, and had to earn a living working on the fields owned by others. </p><p>In most villages there were also some crafts persons such as the blacksmith, potter, carpenter and weaver. </p><p>Many crafts persons and merchants now formed associations known as shrenis. These shrenis of crafts persons provided training, procured raw material, and distributed the finished product. </p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>Which of the following economic curve gives the relationship between tax rates and the amount of tax revenue collected by governments?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2357;&#2325;&#2381;&#2352; &#2325;&#2352; &#2342;&#2352;&#2379;&#2306; &#2324;&#2352; &#2360;&#2352;&#2325;&#2366;&#2352;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2306;&#2330;&#2367;&#2340; &#2325;&#2352; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2325;&#2368; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Philips Curve</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2367;&#2354;&#2367;&#2346;&#2381;&#2360; &#2357;&#2325;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Lorenz Curve</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2352;&#2375;&#2344;&#2381;&#2332;&#2364; &#2357;&#2325;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Laffer Curve</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2347;&#2364;&#2352; &#2357;&#2325;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Engel Curve</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2306;&#2332;&#2375;&#2354; &#2357;&#2325;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Laffer Curve</b> is a theory developed by supply-side economist Arthur Laffer to show the relationship between tax rates and the amount of tax revenue collected by governments. If taxes are too high along the Laffer Curve, then they will discourage the taxed activities, such as work and investment, enough to actually reduce total tax revenue. In this case, cutting tax rates will both stimulate economic incentives and increase tax revenue.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Philips Curve</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The Phillips curve states that inflation and unemployment have an inverse relationship.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lorenz Curve</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The Lorenz curve shows the cumulative share of income from different sections of the population.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Engel Curve</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">The Engel Curve tracks the consumption of a Good X as an individual's income changes.</td></tr></table>",
    "question_index": 27
  },

    "question": "<span class=\"eqt\"><p>Domestic Systemically Important Banks (D-SIBs) are the ______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2328;&#2352;&#2375;&#2354;&#2370; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2352;&#2370;&#2346; &#2360;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2348;&#2376;&#2306;&#2325; (D-SIB) ______ &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Banks with large assets.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2337;&#2364;&#2368; &#2310;&#2360;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2357;&#2366;&#2354;&#2375; &#2348;&#2376;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Banks with high NPAs</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; NPA &#2357;&#2366;&#2354;&#2375; &#2348;&#2376;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Banks with less cross-jurisdictional activities.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2350; &#2309;&#2306;&#2340;&#2352;-&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2357;&#2366;&#2354;&#2375; &#2348;&#2376;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Banks with large loan accounts of the government.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2348;&#2337;&#2364;&#2375; &#2315;&#2339; &#2326;&#2366;&#2340;&#2379;&#2306; &#2357;&#2366;&#2354;&#2375; &#2348;&#2376;&#2306;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Domestic Systemically Important Banks (D-SIB) means that the bank is too big to fail. According to the RBI, some banks become systemically important due to their size, cross-jurisdictional activities, complexity and lack of substitute and interconnection.</p><p><b>Banks whose assets exceed 2% of GDP are considered part of this group.</b> As per the RBI, if such a bank fails, there would be significant disruption to the essential services they provide to the banking system and the overall economy. Therefore, the government is expected to support these banks in case of any disruption.</p>",
    "question_index": 28
  },

    ],

    "solution": "<p></p><p>Article 61: Procedure for impeachment of the president</p><p>- When a President is to be impeached for violation of the Constitution, the charge shall be preferred by either House of Parliament. </p><p>- No such charge shall be preferred unless -  </p><p>[a] the proposal to prefer such charge is contained in a resolution which has been moved after at least fourteen days' notice in writing signed by not less than one-fourth of the total number of members of the House has been given of their intention to move the resolution, and </p><p>[b] such resolution has been passed by a majority of not less than two-thirds of the total membership of the House. </p><p>- When a charge has been so preferred by either House of Parliament, the other House shall investigate the charge or cause the charge to be investigated and the President shall have the right to appear and to be represented at such investigation. </p><p>- If as a result of the investigation a resolution is passed by a majority of not less than two-thirds of the total membership of the House by which the charge was investigated or caused to be investigated, declaring that the charge preferred against the President has been sustained, such resolution shall have the effect of removing the President from his office as from the date on which the resolution is so passed.</p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following ruler acquired the title of \"Dakshinapatheshvara\" (lord of the south)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2358;&#2366;&#2360;&#2325; &#2344;&#2375; \"&#2342;&#2325;&#2381;&#2359;&#2367;&#2339;&#2346;&#2341;&#2375;&#2358;&#2381;&#2357;&#2352;\" (&#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2325;&#2366; &#2360;&#2381;&#2357;&#2366;&#2350;&#2368;) &#2325;&#2368; &#2313;&#2346;&#2366;&#2343;&#2367; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2368; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Samudragupta</span><span class=\"hqt\" style=\"display:none\">1. &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340;</span>",
      "<span class=\"eqt\">Pulakesin II</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2354;&#2325;&#2375;&#2358;&#2367;&#2344; &#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;</span>",
      "<span class=\"eqt\">Chandragupta II</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2342;&#2381;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340; II</span>",
      "<span class=\"eqt\">Kumaragupta</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2350;&#2366;&#2352;&#2327;&#2369;&#2346;&#2381;&#2340;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Chalukyas played a prominent role in the history of Deccan and south India for about two hundred years from the beginning of sixth century A.D. </p><p>&#183; They set up their kingdom in western Deccan with capital at Vatapi (modern Badami in Karnataka). </p><p>&#183; The kingdom rapidly rose to prominence during the reign of <b>Pulakesin II</b> (AD 610 - 642). He was the greatest ruler of the Chalukyas. He consolidated his authority in Maharashtra and conquered large parts of Deccan. </p><p>&#183; He defeated Harshavardhana in circa AD 630 and acquired the title of \"<b>Dakshinapatheshvara\" (lord of the south).</b></p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following committee is NOT related to poverty estimation in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2350;&#2367;&#2340;&#2367; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2327;&#2352;&#2368;&#2348;&#2368; &#2310;&#2325;&#2354;&#2344; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; <b>&#2344;&#2361;&#2368;&#2306; </b>&#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Alagh Committee</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2328; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Tendulkar Committee</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2375;&#2306;&#2342;&#2369;&#2354;&#2325;&#2352; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Narasimham Committee</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2360;&#2367;&#2350;&#2381;&#2361;&#2350; &#2360;&#2350;&#2367;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Rangarajan Committe</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2306;&#2327;&#2352;&#2366;&#2332;&#2344; &#2360;&#2350;&#2367;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; As per Alagh Committee (1979), poverty line is based on minimum daily requirement of 2400 and 2100 calories for an adult in rural and urban areas respectively. </p><p>&#183; Teldulkar Committee (2009) poverty line is computed as &#8377;446.68 &amp; &#8377;578.80 per capita/ month in rural and urban areas respectively. </p><p>&#183; Rangarajan Committee's poverty line is based on calories requirement of 2090 kcal in urban areas and 2155 Kcal in rural areas. </p><p>&#183; <b>Narasimham Committee</b> is related to banking reforms.</p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>The Constitution of India provides for a Finance Commission as a quasi-judicial body, constituted by the president of India every ________ year or at such earlier time as he considers necessary.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2319;&#2325; &#2309;&#2352;&#2381;&#2343;-&#2344;&#2381;&#2351;&#2366;&#2351;&#2367;&#2325; &#2344;&#2367;&#2325;&#2366;&#2351; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2319;&#2325; &#2357;&#2367;&#2340;&#2381;&#2340; &#2310;&#2351;&#2379;&#2327; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2327;&#2336;&#2344; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; ________ &#2357;&#2352;&#2381;&#2359; &#2351;&#2366; &#2313;&#2360;&#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2332;&#2348; &#2349;&#2368; &#2357;&#2361; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2360;&#2350;&#2333;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Five</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2305;&#2330;</span>",
      "<span class=\"eqt\">Six</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2361;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Article 280 of the Constitution of India provides for a Finance Commission as a quasi-judicial body. It is constituted by the president of India every fifth year or at such an earlier time as he considers necessary.</p><p>It is constituted mainly to give its recommendations on distribution of tax revenues between the Union and the States and amongst the States themselves. Two distinctive features of the Commission's work involve redressing the vertical imbalances between the taxation powers and expenditure responsibilities of the centre and the States respectively and equalization of all public services across the States.</p><p>The First Finance Commission was constituted vide Presidential Order dated 22.11.1951 under the chairmanship of Shri K.C. Neogy on 6th April, 1952.</p><p>The current Finance Commission of India is the Sixteenth Finance Commission, which was constituted on December 31, 2023. Chairman: Dr. Arvind Panagariya, former Vice Chairman of NITI Aayog.</p>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>The source of river Alaknanda is: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2354;&#2325;&#2344;&#2306;&#2342;&#2366; &#2344;&#2342;&#2368; &#2325;&#2366; &#2313;&#2342;&#2381;&#2327;&#2350; &#2360;&#2381;&#2341;&#2354; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Satopanth glacier, Badrinath</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2379;&#2346;&#2306;&#2341; &#2361;&#2367;&#2350;&#2344;&#2342; , &#2348;&#2342;&#2381;&#2352;&#2368;&#2344;&#2366;&#2341;</span>",
      "<span class=\"eqt\">Gangotri glacier, Uttarkashi</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2327;&#2379;&#2340;&#2381;&#2352;&#2368; &#2361;&#2367;&#2350;&#2344;&#2342; , &#2313;&#2340;&#2381;&#2340;&#2352;&#2325;&#2366;&#2358;&#2368;</span>",
      "<span class=\"eqt\">Pindari glacier, Nanda Devi</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2367;&#2306;&#2337;&#2366;&#2352;&#2368; &#2361;&#2367;&#2350;&#2344;&#2342; , &#2344;&#2306;&#2342;&#2366; &#2342;&#2375;&#2357;&#2368;</span>",
      "<span class=\"eqt\">Milam glacier, Pithoragarh</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2354;&#2350; &#2361;&#2367;&#2350;&#2344;&#2342; , &#2346;&#2367;&#2341;&#2379;&#2352;&#2366;&#2327;&#2338;&#2364;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Alaknanda has its source in the <b>Satopanth glacier above Badrinath</b>.</p><p>The Alaknanda consists of the Dhauli and the Vishnu Ganga which meet at Joshimath or Vishnu Prayag.</p><p>The other tributaries of Alaknanda such as the Pindar join it at Karna Prayag while Mandakini or Kali Ganga meets it at Rudra Prayag.</p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>Who founded the Lucknow gharana of Kathak?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2341;&#2325; &#2325;&#2375; &#2354;&#2326;&#2344;&#2314; &#2328;&#2352;&#2366;&#2344;&#2375; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ishwari Prasad</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2358;&#2381;&#2357;&#2352;&#2368; &#2346;&#2381;&#2352;&#2360;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Sitara Devi</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2340;&#2366;&#2352;&#2366; &#2342;&#2375;&#2357;&#2368;</span>",
      "<span class=\"eqt\">Birju Maharaj</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2352;&#2332;&#2370; &#2350;&#2361;&#2366;&#2352;&#2366;&#2332;</span>",
      "<span class=\"eqt\">Rukmini Devi</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;&#2325;&#2381;&#2350;&#2367;&#2339;&#2368; &#2342;&#2375;&#2357;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Shri Ishwari Prasad is considered the founder of the Lucknow gharana of Kathak.</p><p>He blended the traditional Kathak style with elements of Persian and Urdu culture to create the Lucknow gharana.</p><p>The Lucknow Gharana has its origins in the northern Indian city of Lucknow, which was once the seat of the Nawabs of Awadh. The Nawabs were Muslim rulers who were known for their patronage of the arts, and their court was a hub of cultural activity in the 18th and 19th centuries.</p><p></p><p></p><p></p><p></p><p></p><p></p>",
    "question_index": 35
  },
  {
    "question": "<span class=\"eqt\"><p>Who is the current Comptroller and Auditor General of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2344;&#2367;&#2351;&#2306;&#2340;&#2381;&#2352;&#2325; &#2319;&#2357;&#2306; &#2350;&#2361;&#2366;&#2354;&#2375;&#2326;&#2366; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2325; &#2325;&#2380;&#2344; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sanjeev Mishra</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2332;&#2368;&#2357; &#2350;&#2367;&#2358;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">K Sanjay Murthy</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;. &#2360;&#2306;&#2332;&#2351; &#2350;&#2370;&#2352;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Sandeep Murthy</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2342;&#2368;&#2346; &#2350;&#2370;&#2352;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Abhishek Mehta</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2349;&#2367;&#2359;&#2375;&#2325; &#2350;&#2375;&#2361;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>K. Sanjay Murthy was sworn in as the Comptroller and Auditor General of India on 21st November 2024 by the President of India and he assumed office on the same day. He is the 15th CAG of India.</p><p>Before his appointment as CAG, K. Sanjay Murthy, an IAS Officer of 1989 batch, served as the Secretary in the Department of Higher Education, Ministry of Education, a position he held from 1st October, 2021 to 20th November, 2024. In this role, he played a pivotal role in implementation of the transformational National Education Policy 2020.</p><p>The Comptroller and Auditor General of India is the supreme audit institution of India, established under Article 148 of the Constitution of India.</p><p></p><p></p><p></p><p></p>",
    "question_index": 36
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following is an exponent of the classical instrument, sarangi?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2357;&#2366;&#2342;&#2381;&#2351; &#2360;&#2366;&#2352;&#2306;&#2327;&#2368; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2346;&#2366;&#2342;&#2325; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pandit Hariprasad Chaurasia</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2337;&#2367;&#2340; &#2361;&#2352;&#2367;&#2346;&#2381;&#2352;&#2360;&#2366;&#2342; &#2330;&#2380;&#2352;&#2360;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Pandit Ram Narayan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2337;&#2367;&#2340; &#2352;&#2366;&#2350; &#2344;&#2366;&#2352;&#2366;&#2351;&#2339;</span>",
      "<span class=\"eqt\">Palghat Mani Iyer</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2354;&#2328;&#2366;&#2335; &#2350;&#2339;&#2367; &#2309;&#2351;&#2381;&#2351;&#2352;</span>",
      "<span class=\"eqt\">Pandit Nikhil Banerjee</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2337;&#2367;&#2340; &#2344;&#2367;&#2326;&#2367;&#2354; &#2348;&#2344;&#2352;&#2381;&#2332;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Ram Narayan often referred to with the title Pandit, popularised the bowed instrument sarangi as a solo concert instrument in Hindustani classical music and became the first internationally successful sarangi player.</p><p>He was awarded India's second highest civilian honour, the Padma Vibhushan, in 2005.</p><p></p><p>Pandit Nikhil Banerjee: Known for his technical brilliance and expressive playing, Nikhil Banerjee was a master of the sitar.</p><p>Pandit Hariprasad Chaurasia: A world-renowned bansuri player.</p><p>Palghat Mani Iyer: A legendary mridangam player, known for his complex rhythms and intricate patterns.</p><p></p><p></p><p></p><p></p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct:</p><p>I. The Constitution of India provides for a bicameral legislature at the central level.</p><p>II. The Rajya Sabha represents the states and union territories of India in the Parliament.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;:</p><p>I. &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2342;&#2381;&#2357;&#2367;&#2360;&#2342;&#2344;&#2368;&#2351; &#2357;&#2367;&#2343;&#2366;&#2351;&#2367;&#2325;&#2366; &#2325;&#2366; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2352;&#2366;&#2332;&#2381;&#2351;&#2360;&#2349;&#2366; &#2360;&#2306;&#2360;&#2342; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2324;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2358;&#2366;&#2360;&#2367;&#2340; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only Statement I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I</span>",
      "<span class=\"eqt\">Only Statement II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II</span>",
      "<span class=\"eqt\">Both Statement I and II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2344; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither Statement I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; &#2325;&#2341;&#2344; I &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Constitution of India provides for a bicameral legislature at the central level. The Parliament of India consists of two houses, namely the Rajya Sabha (Upper House) and the Lok Sabha (Lower House). The bicameral setup ensures a checks-and-balances system and allows for representation of different sections of society.</p><p>The Rajya Sabha represents the states and union territories of India in the Parliament. Members of the Rajya Sabha are elected by the members of the State Legislative Assemblies and Union Territory Legislatures. It serves as a forum for the representation of the regional interests and acts as a platform for states to voice their concerns and opinions.</p>",
    "question_index": 38
  },
  {
    "question": "<span class=\"eqt\"><p>Guru Kelucharan Mohapatra is associated with which of these dance forms?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2352;&#2369; &#2325;&#2375;&#2354;&#2369;&#2330;&#2352;&#2339; &#2350;&#2361;&#2366;&#2346;&#2366;&#2340;&#2381;&#2352;&#2366; &#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2344;&#2371;&#2340;&#2381;&#2351; &#2358;&#2376;&#2354;&#2368; &#2360;&#2375; &#2332;&#2369;&#2396;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Odissi</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Bharatanatyam</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2352;&#2340;&#2344;&#2366;&#2335;&#2381;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Kathak</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2325;</span>",
      "<span class=\"eqt\">Kuchipudi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2330;&#2367;&#2346;&#2369;&#2337;&#2364;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Guru Kelucharan Mohapatra was a renowned Odissi dancer and choreographer. He is credited with revitalizing the Odissi dance form and making it internationally recognized.</p><p>He is the first person to receive the Padma Vibhushan(2000) from Odisha.</p><p>Other awards won:</p><p>Sangeet Natak Akademi Award, 1966</p><p>Padma Shri, 1974</p><p>Padma Bhushan, 1988</p><p>Sangeet Natak Akademi Fellowship, 1991</p>",
    "question_index": 39
  },
  {
    "question": "<span class=\"eqt\"><p>In January 2024, which among the following state Chief Minister launched the 'Yuva Nidhi' scheme, which offers unemployment monthly stipend of &#8377;3,000 to graduates and &#8377;1,500 to diploma holders?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2357;&#2352;&#2368; 2024 &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2344;&#2375; '&#2351;&#2369;&#2357;&#2366; &#2344;&#2367;&#2343;&#2367;' &#2351;&#2379;&#2332;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368;, &#2332;&#2379; &#2360;&#2381;&#2344;&#2366;&#2340;&#2325;&#2379;&#2306; &#2325;&#2379; &#8377;3,000 &#2324;&#2352; &#2337;&#2367;&#2346;&#2381;&#2354;&#2379;&#2350;&#2366; &#2343;&#2366;&#2352;&#2325;&#2379;&#2306; &#2325;&#2379; &#8377;1,500 &#2325;&#2366; &#2348;&#2375;&#2352;&#2379;&#2332;&#2327;&#2366;&#2352;&#2368; &#2350;&#2366;&#2360;&#2367;&#2325; &#2357;&#2332;&#2368;&#2347;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Jharkhand</span><span class=\"hqt\" style=\"display:none\">&#2333;&#2366;&#2352;&#2326;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Bihar</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2361;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Karnataka</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;</span>",
      "<span class=\"eqt\">Maharashtra</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Karnataka Chief Minister Siddaramaiah launched the fifth and final poll guarantee of the Congress--'Yuva Nidhi' scheme--at Freedom Park in Shivamogga. The scheme offers unemployment assistance to graduates and diploma holders who got their degrees in the academic year 2022-23.</p><p>The government has promised to give Rs 3,000 per month to degree holders and Rs 1,500 per month to diploma holders who were unable to get a job in the past six months and are not pursuing higher studies.</p><p>The ruling government has already launched four of the five guarantees, which are 'Shakti', providing free rides to Karnataka women in non-luxury government buses, 'Anna Bhagya' offering 10 kg rice to BPL families, 'Gruha Jyoti' giving free electricity up to 200 units to household users, and 'Gruha Lakshmi' promising Rs 2,000 a month to women heads of families having APL/BPL ration cards.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was accelerated in the post 1991 economic reform period?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2352;&#2381;&#2359; 1991 &#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2375; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352; &#2325;&#2366;&#2354; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2350;&#2375;&#2306; &#2340;&#2375;&#2332;&#2368; &#2310;&#2312;?</p></span>",
    "options": [
      "<span class=\"eqt\">Growing share of the service sector</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2357;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375;&#2342;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Growing share of the agriculture sector</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375;&#2342;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Growing share of the manufacturing sector</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375;&#2342;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Growing share of the agriculture and manufacturing sector</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2324;&#2352; &#2357;&#2367;&#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2325;&#2368; &#2348;&#2338;&#2364;&#2340;&#2368; &#2361;&#2367;&#2360;&#2381;&#2360;&#2375;&#2342;&#2366;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>As a country develops, it undergoes 'structural change'. In the case of India, the structural change is peculiar. Usually, with development, the share of agriculture declines and the share of industry becomes dominant. At higher levels of development, the service sector contributes more to the GDP than the other two sectors. In India, the share of agriculture in the GDP was more than 50 per cent - as we would expect for a poor country. But by 1990 the share of the service sector was 40.59 per cent, more than that of agriculture or industry, like what we find in developed nations. This phenomenon of growing share of the service sector was accelerated in the post 1991 period.</p>",
    "question_index": 41
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following joint allows for flexion, extension, and other movements, but no rotation?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2343;&#2367; &#2354;&#2330;&#2368;&#2354;&#2375;&#2346;&#2344;, &#2357;&#2367;&#2360;&#2381;&#2340;&#2366;&#2352; &#2324;&#2352; &#2309;&#2344;&#2381;&#2351; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2328;&#2370;&#2352;&#2381;&#2339;&#2344; &#2325;&#2368; &#2344;&#2361;&#2368;&#2306; &#2342;&#2375;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Hinge joint</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2367;&#2306;&#2332; &#2360;&#2306;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Ball-and-socket</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2377;&#2354; &#2319;&#2306;&#2337; &#2360;&#2377;&#2325;&#2375;&#2335; &#2360;&#2306;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Pivot joint</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2369;&#2352;&#2366;&#2327;&#2381;&#2352; &#2360;&#2306;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Saddle joint</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2376;&#2337;&#2354; &#2360;&#2306;&#2343;&#2367;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A <b>saddle joint </b>allows for flexion, extension, and other movements, but no rotation. In the hand, the thumb's saddle joint (between the first metacarpal and the trapezium) lets the thumb cross over the palm, making it opposable.</p>",
    "question_index": 42
  },
  {

      "<span class=\"eqt\">Khelo India University Games</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2375;&#2354;&#2379; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2351;&#2370;&#2344;&#2367;&#2357;&#2352;&#2381;&#2360;&#2367;&#2335;&#2368; &#2327;&#2375;&#2350;&#2381;&#2360;</span>"

    "correct_option_id": 0,
    "solution": "<p>The Raja Bhalindra Singh Trophy is associated with the National Games of India.</p><p>It is awarded to the state or team that secures the highest number of points in the National Games, which is a multi-sport event held in India.</p><p>The trophy is named after Raja Bhalindra Singh, a former member of the International Olympic Committee and a prominent sports administrator in India.</p><p></p><p></p>",

  },

;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;?</p></span>",

    "solution": "<p>Bhasha Sangam programme has been held on 1st November, 2021, through launch of a mobile app and 22 booklets (QR coded with audio and Indian Sign Language) with the aim of learning of 100 sentences in the 22 scheduled Indian languages to facilitate listening, comprehension and practice speaking of these languages. Around 6 Lakh Students of KVS and JNV took Sankalp to learn 100 sentences in the 22 scheduled Indian languages</p><p></p>",

    "question": "<span class=\"eqt\"><p>When temperature is increased in a thermometer, mercury present in the meter expands and increased height implies changes in temperature. Which law support this statement?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2341;&#2352;&#2381;&#2350;&#2366;&#2350;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2348;&#2338;&#2364;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2350;&#2368;&#2335;&#2352; &#2350;&#2375;&#2306; &#2350;&#2380;&#2332;&#2370;&#2342; &#2346;&#2366;&#2352;&#2366; &#2347;&#2376;&#2354;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2366;&#2357; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2344;&#2367;&#2351;&#2350; &#2311;&#2360; &#2325;&#2341;&#2344; &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Third law of thermodynamics</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2359;&#2381;&#2350;&#2366;&#2327;&#2340;&#2367;&#2325;&#2368; &#2325;&#2366; &#2340;&#2368;&#2360;&#2352;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Second law of thermodynamics</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2359;&#2381;&#2350;&#2366;&#2327;&#2340;&#2367;&#2325;&#2368; &#2325;&#2366; &#2342;&#2370;&#2360;&#2352;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Zeroth law of thermodynamics</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2359;&#2381;&#2350;&#2366;&#2327;&#2340;&#2367;&#2325;&#2368; &#2325;&#2366; &#2358;&#2370;&#2344;&#2381;&#2351; &#2325;&#2379;&#2335;&#2367; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">First law of thermodynamics</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2359;&#2381;&#2350;&#2366;&#2327;&#2340;&#2367;&#2325;&#2368; &#2325;&#2366; &#2346;&#2381;&#2352;&#2341;&#2350; &#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>When a body 'A' is in thermal equilibrium with another body 'b', and also separately in thermal equilibrium with a body 'C', then body 'B' and 'C' will also be in thermal equilibrium with each other. This statement defines the <b>zeroth law of thermodynamics.</b></p><p>Thermomoters are common examples of zeroth law of thermodynamics. As the temperature is increased this mercury expands since the area of the tube is constant. Due to this expansion, the height is increased. Now, the increase in the height of the mercury label shows the changes in temperature and basically helps us to measure it.</p>",
    "question_index": 45
  },

    "options": [
      "<span class=\"eqt\">9th</span><span class=\"hqt\" style=\"display:none\">9 &#2357;&#2368;&#2306;</span>",
      "<span class=\"eqt\">10th</span><span class=\"hqt\" style=\"display:none\">10 &#2357;&#2368;&#2306;</span>",
      "<span class=\"eqt\">11th</span><span class=\"hqt\" style=\"display:none\">11 &#2357;&#2368;&#2306;</span>",
      "<span class=\"eqt\">12th</span><span class=\"hqt\" style=\"display:none\">12 &#2357;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The 10th Schedule of the constitution has Provisions relating to disqualification of the members of Parliament and State Legislatures on the ground of defection. This schedule was added by the 52nd Amendment Act of 1985, also known as the Anti-defection law.</p>",

    "question": "<span class=\"eqt\"><p>'Ghoomar' is a folk-dance form from the state of ______.</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2328;&#2370;&#2350;&#2352;' ______ &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2319;&#2325; &#2354;&#2379;&#2325;-&#2344;&#2371;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rajasthan</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Sikkim</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2325;&#2381;&#2325;&#2367;&#2350;</span>",
      "<span class=\"eqt\">Uttarakhand</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2326;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Kerala</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2352;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; Ghoomar or ghumar is a traditional folk dance of <b>Rajasthan</b>. </p><p>&#183; It was the Bhil tribe who performed it to worship Goddess Sarasvati which was later embraced by other Rajasthani communities. </p><p>&#183; The dance is chiefly performed by veiled women who wear flowing dresses called ghaghara. </p><p>&#183; The dance typically involves performers pirouetting while moving in and out of a wide circle. </p><p>&#183; The word ghoomna describes the twirling movement of the dancers and is the basis of the word ghoomar.</p>",
    "question_index": 47
  },

    "question": "<span class=\"eqt\"><p>Match the following leaders of the Indian freedom struggle with the political associations or movements they were associated with:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. Subhas Chandra Bose</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Indian National Congress (INC)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. Bhagat Singh</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Hindustan Socialist Republican Association (HSRA)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. Annie Besant</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. All India Women's Conference (AIWC)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. Lala Lajpat Rai</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. All India Home Rule League</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366; &#2360;&#2306;&#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2344;&#2375;&#2340;&#2366;&#2323;&#2306; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2360;&#2306;&#2328;&#2379;&#2306; &#2351;&#2366; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344;&#2379;&#2306; &#2360;&#2375; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">I. &#2360;&#2369;&#2349;&#2366;&#2359; &#2330;&#2306;&#2342;&#2381;&#2352; &#2348;&#2379;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; (INC)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II. &#2349;&#2327;&#2340; &#2360;&#2367;&#2306;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2361;&#2367;&#2306;&#2342;&#2369;&#2360;&#2381;&#2340;&#2366;&#2344; &#2360;&#2379;&#2358;&#2354;&#2367;&#2360;&#2381;&#2335; &#2352;&#2367;&#2346;&#2348;&#2381;&#2354;&#2367;&#2325;&#2344; &#2319;&#2360;&#2379;&#2360;&#2367;&#2319;&#2358;&#2344; (HSRA)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III. &#2319;&#2344;&#2368; &#2348;&#2375;&#2360;&#2375;&#2306;&#2335;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2309;&#2326;&#2367;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2361;&#2367;&#2354;&#2366; &#2360;&#2350;&#2381;&#2350;&#2375;&#2354;&#2344; (AIWC)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV. &#2354;&#2366;&#2354;&#2366; &#2354;&#2366;&#2332;&#2346;&#2340; &#2352;&#2366;&#2351;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. &#2309;&#2326;&#2367;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2361;&#2379;&#2350;&#2352;&#2370;&#2354; &#2354;&#2368;&#2327;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">I  -  d, II  -  b, III  -  c, IV - a</span><span class=\"hqt\" style=\"display:none\">I - d, II - b, III - c, IV - a</span>",
      "<span class=\"eqt\">I  -  d, II  -  b, III  -  a, IV - c</span><span class=\"hqt\" style=\"display:none\">I - d, II - b, III - a, IV - c</span>",
      "<span class=\"eqt\">I  -  a, II  -  b, III  -  d, IV - c</span><span class=\"hqt\" style=\"display:none\">I - a, II - b, III - d, IV - c</span>",
      "<span class=\"eqt\">I  -  a, II  -  b, III  -  c, IV  -  d</span><span class=\"hqt\" style=\"display:none\">I - a, II - b, III - c, IV - d</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Subhas Chandra Bose was associated with the Indian National Congress (INC) and played a significant role in the struggle for India's independence.</p><p>Bhagat Singh was a prominent member of the Hindustan Socialist Republican Association (HSRA) and was involved in revolutionary activities against British rule.</p><p>Annie Besant was associated with the All-India Home Rule League and played a key role in advocating for home rule and self-governance within the British Empire.</p><p>Lala Lajpat Rai was associated with the All-India Women's Conference (AIWC), which focused on women's rights and social reform during the freedom struggle.</p>",
    "question_index": 48
  },
  {
    "question": "<span class=\"eqt\"><p>Nowruz, the Persian New Year, is celebrated in which month every year?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2347;&#2366;&#2352;&#2360;&#2368; &#2344;&#2357; &#2357;&#2352;&#2381;&#2359; &#2344;&#2380;&#2352;&#2379;&#2332;&#2364; (&#2344;&#2357;&#2352;&#2379;&#2332;&#2364;) &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2352;&#2381;&#2359; &#2325;&#2367;&#2360; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Which triangle is formed using the following co-ordinates: (5,-2), (6,4) and (7,-2)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2366;&#2306;&#2325; : (5, -2), (6,4) &#2324;&#2352; (7, -2) &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; ?</p></span>",
    "options": [
      "<span class=\"eqt\">Scalene triangle</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2359;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332;</span>",
      "<span class=\"eqt\">Right angle triangle</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332;</span>",
      "<span class=\"eqt\">Isosceles triangle</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2342;&#2381;&#2357;&#2367;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332;</span>",
      "<span class=\"eqt\">Equilateral triangle</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2349;&#2369;&#2332; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let A(5,-2), B(6,4), and C(7,-2) be the co-ordinates of the triangle.</p> \n<p>Distance between co-ordinates A(5,-2) and B(6,4) = AB = &radic;((x<sub>2</sub>-x<sub>1</sub>)<sup>2</sup> +(y<sub>2</sub>-y<sub>1</sub>)<sup>2</sup>)</p> \n<p>AB = &radic;((6-5)<sup>2</sup> + (4+2)<sup>2</sup>)= &radic;((1)<sup>2</sup> + (6)<sup>2</sup>)=&radic;37</p> \n<p>Distance between co-ordinates B(6,4) and C(7,-2) = BC = &radic;((x<sub>3</sub>-x<sub>2</sub>)<sup>2</sup> + (y<sub>3</sub>-y<sub>2</sub>)<sup>2</sup>)</p> \n<p>BC = &radic;((7-6)<sup>2</sup> + (-2-4)<sup>2</sup>)= &radic;((1)<sup>2</sup> + -6<sup>2</sup>)=&radic;37</p> \n<p>Distance between co-ordinates A(5,-2) and C(7,-2) = AC = &radic;((x<sub>3</sub>-x<sub>1</sub>)<sup>2</sup> + (y<sub>3</sub>-y<sub>1</sub>)<sup>2</sup>)</p> \n<p>AC = &radic;((7-5)<sup>2</sup> + (-2+2)<sup>2</sup>)= &radic;(2)<sup>2</sup>)=2</p> \n<p>Therefore, AB=BC&#8800;AC, hence the triangle is a an isosceles triangle.</p>",
    "question_index": 52
  },

    "question": "<span class=\"eqt\"><p>Two goods trains of length (X  -  13) m and (X + 13) m are running with speed of 47 km/hr and 43 km/hr respectively towards each other on parallel tracks, Find the value of X, if they cross each other in 24 sec.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2354;&#2306;&#2348;&#2366;&#2312; (X - 13) m &#2324;&#2352; (X + 13) m &#2325;&#2368; &#2342;&#2379; &#2350;&#2366;&#2354;&#2327;&#2366;&#2337;&#2364;&#2367;&#2351;&#2366;&#2305; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2346;&#2335;&#2352;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 47 km/hr &#2324;&#2352; 43 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2319;&#2325;-&#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2368; &#2323;&#2352; &#2310; &#2352;&#2361;&#2368; &#2361;&#2376;&#2306;, &#2351;&#2342;&#2367; &#2357;&#2375; &#2319;&#2325;-&#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; 24 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2346;&#2366;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2340;&#2379; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">300 m</span><span class=\"hqt\" style=\"display:none\">300 m</span>",
      "<span class=\"eqt\">270 m</span><span class=\"hqt\" style=\"display:none\">270 m</span>",
      "<span class=\"eqt\">240 m</span><span class=\"hqt\" style=\"display:none\">240 m</span>",
      "<span class=\"eqt\">320 m</span><span class=\"hqt\" style=\"display:none\">320 m</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Relative speeds of two trains = 47 + 43 = 90 km/hr = 90 * 5/18 = 25 m/sec</p><p>Relative distance to be covered = X  -  13 + X + 13 = 2X m</p><p>According to the question,</p><p>2X/25 = 24</p><p>X = 25 * 12</p><p>X = 300 m</p>",

    "question": "<span class=\"eqt\"><p>To a circle with center O, LM and LN are two tangents from a point L at M and N respectively such that OM = (3/7)ML and radius of circle is 24 cm. What is the length of OL?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2346;&#2352;, &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; L &#2360;&#2375; &#2342;&#2379; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305; LM &#2324;&#2352; LN &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; M &#2324;&#2352; N &#2346;&#2352; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306; &#2325;&#2367; OM = (3/7)ML &#2324;&#2352; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 24 cm &#2361;&#2376;&#2404; OL &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">8&radic;58 cm</span><span class=\"hqt\" style=\"display:none\">8&radic;58 cm</span>",
      "<span class=\"eqt\">16&radic;29 cm</span><span class=\"hqt\" style=\"display:none\">16&radic;29 cm</span>",
      "<span class=\"eqt\">8&radic;29 cm</span><span class=\"hqt\" style=\"display:none\">8&radic;29 cm</span>",
      "<span class=\"eqt\">4&radic;58 cm</span><span class=\"hqt\" style=\"display:none\">4&radic;58 cm</span>"

    "question": "<span class=\"eqt\"><p>If the circumradius of an equilateral triangle PQR be 8&radic;2 cm, then the height of the triangle is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2350;&#2348;&#2366;&#2361;&#2369; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; PQR &#2325;&#2368; &#2346;&#2352;&#2367;&#2343;&#2367; 8&radic;2 cm &#2361;&#2376;, &#2340;&#2379; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; &#2361;&#2376;:</p></span>",

      "<span class=\"eqt\">12&radic;2 cm</span><span class=\"hqt\" style=\"display:none\">12&radic;2 cm</span>",

    "question": "<span class=\"eqt\"><p>How many numbers are there between 1 and 800 which are divisible by 3 and 7 but not divisible by 9?</p></span><span class=\"hqt\" style=\"display:none\"><p>1 &#2324;&#2352; 800 &#2325;&#2375; &#2348;&#2368;&#2330; &#2320;&#2360;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2306; &#2361;&#2376;&#2306;, &#2332;&#2379; 3 &#2324;&#2352; 7 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; 9 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>",
      "<span class=\"eqt\">24</span><span class=\"hqt\" style=\"display:none\">24</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">26</span><span class=\"hqt\" style=\"display:none\">26</span>"

    "correct_option_id": 3,
    "solution": "<p>Numbers between 1 and 800 which are divisible by 3 and 7 are divisible by 21(LCM of 3 and 7)</p><p>Total numbers between 1 and 800 which are divisible by 21 = Quotient (800/21) = 38</p><p>Total numbers between 1 and 800 which are divisible by 3,7 and 9 are divisible by 63</p><p>Total numbers between 1 and 800 which are divisible by 63 = Quotient (800/63) = 12</p><p>Total numbers between 1 and 800 which are divisible by 3 and 7 but not divisible by 9 = 38 -12 = 26</p>",
    "question_index": 63

    "question": "<span class=\"eqt\"><p>If A + B = 75&deg;, and tanB = &radic;3, the find the value of sinA.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; A + B = 75&deg; &#2361;&#2376; &#2324;&#2352; tanB = &radic;3 &#2361;&#2376;, &#2340;&#2379; sinA &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">(&radic;3 - 1)/2&radic;2</span><span class=\"hqt\" style=\"display:none\">(&radic;3 - 1)/2&radic;2</span>",
      "<span class=\"eqt\">(&radic;3 + 1)/2&radic;2</span><span class=\"hqt\" style=\"display:none\">(&radic;3 + 1)/2&radic;2</span>",
      "<span class=\"eqt\">(&radic;3 - 1)/&radic;2</span><span class=\"hqt\" style=\"display:none\">(&radic;3 - 1)/&radic;2</span>",
      "<span class=\"eqt\">(&radic;3 + 1)/&radic;2</span><span class=\"hqt\" style=\"display:none\">(&radic;3 + 1)/&radic;2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>tanB = &radic;3</p><p>tanB = tan60&deg;</p><p>So, B = 60&deg;</p><p>Given that A + B = 75&deg;</p><p>So, A = 15&deg;</p><p>Now, sin15 = sin (45  -  30)</p><p>= sin 45 cos 30  -  sin 30 cos 45</p><p>= (1/&radic;2) * (&radic;3/2)  -  (1/2) * (1/&radic;2)</p><p>= (&radic;3 - 1)/2&radic;2</p>",
    "question_index": 68
  },
