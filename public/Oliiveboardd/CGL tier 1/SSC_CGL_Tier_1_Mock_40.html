    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>How many squares are there in the given figure? </p><p><img width=276 height=126 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25017/image011.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2357;&#2352;&#2381;&#2327; &#2361;&#2376;&#2306;?</p><p><img width=276 height=126 id=\"Picture 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25017/image011.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">34</span><span class=\"hqt\" style=\"display:none\">34</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">36</span><span class=\"hqt\" style=\"display:none\">36</span>",
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=302 height=158 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25017/image012.jpg\"></p><p>The squares are ABGF, BCHG, CDIH, DEJI, FGLK, GHML, HIMN, IJON, PKSR, KLTS, LMUT, MNVU, NOWX, OQXW, ACMK, BDNL, CEOM, FHUS, GIVT, HJWU, ADVS, BEWT. </p><p>So, there are 22 squares. </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>How many meaningful English words can be formed with the first, sixth, seventh and ninth letters of the word VENTILATOR (when counted from left to right) using each letter only once in each word? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2348;&#2381;&#2342; VENTILATOR &#2325;&#2375; &#2346;&#2361;&#2354;&#2375;, &#2331;&#2336;&#2375;, &#2360;&#2366;&#2340;&#2357;&#2375;&#2306; &#2324;&#2352; &#2344;&#2380;&#2357;&#2375;&#2306; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2360;&#2375; (&#2348;&#2366;&#2319;&#2306; &#2360;&#2375; &#2342;&#2366;&#2319;&#2306; &#2327;&#2367;&#2344;&#2344;&#2375; &#2346;&#2352;) &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2358;&#2348;&#2381;&#2342; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2366; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2348;&#2366;&#2352; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2366;&#2352;&#2381;&#2341;&#2325; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2358;&#2348;&#2381;&#2342; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">One</span><span class=\"hqt\" style=\"display:none\">One</span>",
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">Three</span>",
      "<span class=\"eqt\">Four</span><span class=\"hqt\" style=\"display:none\">Four</span>",
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">Two</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The given word is VENTILATOR.</p><p>The first, sixth, seventh and ninth letters from left end V, L, A and O.</p><p>So, the meaningful word is OVAL.</p><p>OVAL means shaped like an egg. </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>How many alphabet positions will not change if the letters in the word 'ENROUGHS' are arranged in alphabetical order from left to right?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2358;&#2348;&#2381;&#2342; 'ENROUGHS' &#2350;&#2375;&#2306; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2379; &#2348;&#2366;&#2319;&#2306; &#2360;&#2375; &#2342;&#2366;&#2319;&#2306; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2344;&#2361;&#2368;&#2306; &#2348;&#2342;&#2354;&#2375;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">More than two</span><span class=\"hqt\" style=\"display:none\">More than two</span>",
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">Two</span>",
      "<span class=\"eqt\">One</span><span class=\"hqt\" style=\"display:none\">One</span>",
      "<span class=\"eqt\">None</span><span class=\"hqt\" style=\"display:none\">None</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The given word is ENROUGHS.</p><p>If all letters are arranged in alphabetical order from left to right, then we get:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Original letters</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>E</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">U</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">G</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">H</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Alphabetical order</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>E</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">G</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">H</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">U</td></tr></table><p>So, the position of 1 letter will remain not changed.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Select the correct combination of mathematical signs to sequentially place from left to right in the blanks below to balance the given equation.</p><p>19<b>_</b>5<b>_</b>18<b>_</b>2<b>_</b>4 = 90</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2366;&#2319;&#2305; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2326;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2361;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>19<b>_</b>5<b>_</b>18<b>_</b>2<b>_</b>4 = 90</p></span>",
    "options": [
      "<span class=\"eqt\">x,  - , &div;, +</span><span class=\"hqt\" style=\"display:none\">x, - , &div;, +</span>",
      "<span class=\"eqt\">+,  - , +, &div;</span><span class=\"hqt\" style=\"display:none\">+, - , +, &div;</span>",
      "<span class=\"eqt\">- , +, x, &div;</span><span class=\"hqt\" style=\"display:none\">- , +, x, &div;</span>",
      "<span class=\"eqt\">- ,  - , +, x</span><span class=\"hqt\" style=\"display:none\">- , - , +, x</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>If the signs are sequentially place from left to right in the blanks, then the equations will be: </p><p>Option (a) 19 x 5  -  18 &div; 2 + 4 = 90</p><p>So, 95  -  9 + 4 = 90</p><p>So, 99  -  9 = 90</p><p>So, 90 = 90</p><p>So, option (a) is correct. </p><p>Option (b) 19 + 5  -  18 + 2 &div; 4 = 90</p><p>So, 19 + 5  -  18 + 0.5 = 90</p><p>So, 25.4  -  18 = 90</p><p>So, 6.5 &#8800; 90</p><p>So, option (b) is incorrect. </p><p>Option (c) 19  -  5 + 18 x 2 &div; 4 = 90</p><p>So, 19  -  5 + 9 = 90</p><p>So, 28  -  5 = 9</p><p>So, 23 &#8800; 9</p><p>So, option (d) is incorrect. </p><p>Option (d) 19  -  5  -  18 + 2 x 4 = 90</p><p>So, 19  -  5  -  18 + 8 = 90</p><p>So, 27  -  23 = 90</p><p>So, 4 &#8800; 90</p><p>So, option (d) is incorrect. </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>B is the father-in-law of H. A is the son of K. H is the mother of C. G is the wife of B. D is the brother of K. C is the sister of A. How K is related to G?</p></span><span class=\"hqt\" style=\"display:none\"><p>B, H &#2325;&#2366; &#2360;&#2360;&#2369;&#2352; &#2361;&#2376;&#2404; A, K &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;&#2404; H, C &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; G, B &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;&#2404; D, K &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;&#2404; C, A &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;&#2404; K, G &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Daughter-in-law</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2370;</span>",
      "<span class=\"eqt\">Son</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Brother-in-law</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2342;&#2352;-&#2311;&#2344;-&#2354;&#2377;</span>",
      "<span class=\"eqt\">Uncle</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2325;&#2354;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>B is the father-in-law of H. A is the son of K. H is the mother of C. G is the wife of B. D is the brother of K. C is the sister of A.</p><p><b><img width=280 height=150 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22012/image007.png\"></b></p><p>K is the son of G.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Four letter pairs have been given, out of which three are alike in some manner and one is different. Select the letter pair that is different.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2366;&#2352; &#2309;&#2325;&#2381;&#2359;&#2352; &#2351;&#2369;&#2327;&#2381;&#2350; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2340;&#2368;&#2344; &#2325;&#2367;&#2360;&#2368; &#2344; &#2325;&#2367;&#2360;&#2368; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306; &#2324;&#2352; &#2319;&#2325; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2376;&#2404; &#2313;&#2360; &#2309;&#2325;&#2381;&#2359;&#2352; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">PRUV</span><span class=\"hqt\" style=\"display:none\">PRUV</span>",
      "<span class=\"eqt\">CEHI</span><span class=\"hqt\" style=\"display:none\">CEHI</span>",
      "<span class=\"eqt\">MORS</span><span class=\"hqt\" style=\"display:none\">MORS</span>",
      "<span class=\"eqt\">KMPR</span><span class=\"hqt\" style=\"display:none\">KMPR</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>P +2 = R, R + 3 = U, U +1 = V</p><p>C +2 = E, E + 3 = H, H +1 = I</p><p>M +2 = O, O + 3 = R, R +1 = S</p><p>K +2 = M, M + 3 = P, P + 1 = Q</p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Select the term from the given options that can replace the question mark (?) in the following series.</p><p>K<b>9</b>I, L<b>64</b>L, M<b>25</b>O, N<b>216</b>R, ?, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2346;&#2342; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>K<b>9</b>I, L<b>64</b>L, M<b>25</b>O, N<b>216</b>R, ?, ?</p></span>",
    "options": [
      "<span class=\"eqt\">O<b>36</b>Z, Q<b>49</b>W</span><span class=\"hqt\" style=\"display:none\">O<b>36</b>Z, Q<b>49</b>W</span>",
      "<span class=\"eqt\">O<b>16</b>Q, P<b>125</b>V</span><span class=\"hqt\" style=\"display:none\">O<b>16</b>Q, P<b>125</b>V</span>",
      "<span class=\"eqt\">O<b>30</b>R, S<b>49</b>W</span><span class=\"hqt\" style=\"display:none\">O<b>30</b>R, S<b>49</b>W</span>",
      "<span class=\"eqt\">O<b>49</b>U, P<b>512</b>X</span><span class=\"hqt\" style=\"display:none\">O<b>49</b>U, P<b>512</b>X</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Here, the pattern is:</p><p>K+1=L; L+1=M; M+1=N; N+1=O; O+1=P.</p><p>I+3= L; L+3=O; O+3=R; R+3= U; U+3= X.</p><p>3<sup>2</sup>=9; 4<sup>3</sup>=64; 5<sup>2</sup>=25; 6<sup>3</sup>=216; 7<sup>2</sup>=49.</p>",

    "solution": "<p><b>Statements:</b></p><p>All Sweet is Sugary</p><p>Some Sweet is Syrupy</p><p>No Syrupy is Bitter</p><p><img width=498 height=188 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23916/image022.png\"></p><p>Some Bitter is Sugary: As there is no direct relation between Bitter and Sugary. So, conclusion I is false.</p><p>Some Sugary is Syrupy: All Sweet is Sugary. Some Sweet is Syrupy. Thus, Some Sugary is Syrupy. So, conclusion II is true.</p><p>Some Sweet is not Bitter: Some Sweet is Syrupy. No Syrupy is Bitter. Thus, Some Sweet is not Bitter. So, conclusion III is true.</p><p>Hence, only conclusions II and III follow.</p>",

    "question": "<span class=\"eqt\"><p>In the question, below are three statements followed by four conclusions numbered I, II, III and IV. You have to consider the statements to be true even if it seems to be at variance from commonly known facts. You have to decide which of the given conclusions, if any, follows from the given statements.</p><p><b>Statements:</b></p><p>All Rose are Lotus</p><p>Some Rose are Lily</p><p>Some Lily are Daisy</p><p><b>Conclusions:</b></p><p>I: Some Lotus are Lily</p><p>II: All Lily are Rose</p><p>III: Some Rose can be Daisy</p><p>IV: Some Lotus are not Daisy</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2344;&#2368;&#2330;&#2375; &#2340;&#2368;&#2344; &#2325;&#2341;&#2344; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2330;&#2366;&#2352; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; I, II, III &#2324;&#2352; IV &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#2361;&#2376;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2357;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2379;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2342;&#2367;&#2319; &#2327;&#2319; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#238     "solution": "<p><b>Statements:</b></p><p>All Rose are Lotus</p><p>Some Rose are Lily</p><p>Some Lily are Daisy</p><p><img width=378 height=187 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23763/image023.png\"></p><p>Some Lotus are Lily: All Rose are Lotus. Some Rose are Lily. Thus, Some Lotus are Lily. So, conclusion I is true.</p><p>All Lily are Rose: Some Rose are Lily. Thus, Some Lily are Rose. So, conclusion II is false.</p><p>Some Rose can be Daisy: As there is no direct relation between Rose and Daisy. Thus, Some Rose can be Daisy. So, conclusion III is true.</p><p>Some Lotus are not Daisy: As there is no direct relation between Lotus and Daisy. So, conclusion IV is false.</p><p>Hence, only conclusions I and III follow.</p>",

    "question": "<span class=\"eqt\"><p>Tarikh-I Firozshahi and the Fatwa-I Jahandari are important works of ____</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2366;&#2352;&#2367;&#2326;-&#2319; &#2347;&#2364;&#2367;&#2352;&#2379;&#2332;&#2364;&#2358;&#2366;&#2361;&#2368; &#2324;&#2352; &#2347;&#2340;&#2357;&#2366;-&#2319; &#2332;&#2361;&#2366;&#2305;&#2342;&#2366;&#2352;&#2368; ____ &#2325;&#2375; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2325;&#2366;&#2352;&#2381;&#2351; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Ziauddin Barani</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2367;&#2351;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2348;&#2352;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Minaj-us Siraj</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2344;&#2366;&#2332;-&#2313;&#2360; &#2360;&#2367;&#2352;&#2366;&#2332;</span>",
      "<span class=\"eqt\">Abu Malik Isami</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2348;&#2369; &#2350;&#2354;&#2367;&#2325; &#2311;&#2360;&#2366;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Feroz Shah Tughluq</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2367;&#2352;&#2379;&#2332;&#2364; &#2358;&#2366;&#2361; &#2340;&#2369;&#2327;&#2354;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>\"Tarikh-i-Firoz Shahi\" and \"Fatwa-i-Jahandari\" are two important historical and political works written by <b>Ziauddin Barani,</b> a Muslim political thinker and historian who lived in the Delhi Sultanate during the reigns of Muhammad bin Tughlaq and Firuz Shah Tughlaq in the 14th century.</p><p>Explanation of Other Options:</p><p>(b) Minhaj-us-Siraj: A 13th-century historian who wrote the \"Tabaqat-i-Nasiri,\" a history of the Islamic world written during the reign of Nasir-ud-din Mahmud of the Mamluk Sultanate.</p><p>(c) Abu Malik Isami: A 14th-century historian and poet who wrote the \"Futuh-us-Salatin,\" a history of Muslim rule in India in verse.</p><p>(d) Feroz Shah Tughluq: The Sultan of Delhi from 1351 to 1388. He is credited with writing his own autobiography, the \"Futuhat-i-Firoz Shahi.\"</p><p>Further insights:</p><p>\"Tarikh-i-Firoz Shahi\": This is a major historical work that covers the history of the Delhi Sultanate from the reign of Ghiyas ud din Balban to the early years of Firuz Shah Tughlaq's reign. It is a crucial source for the history of the Tughlaq dynasty.</p><p>\"Fatwa-i-Jahandari\": This work is a treatise on political philosophy and statecraft, outlining Barani's ideas on kingship, justice, and the ideal duties of a Muslim ruler.</p>",
    "question_index": 25
  },

    "question": "<span class=\"eqt\"><p>The Mahalanobis strategy of planning gave emphasis to the growth of</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2361;&#2366;&#2354;&#2344;&#2379;&#2348;&#2367;&#2360; &#2352;&#2339;&#2344;&#2368;&#2340;&#2367; &#2325;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2344;&#2375; &#2325;&#2367;&#2360;&#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2346;&#2352; &#2348;&#2354; &#2342;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Poverty Management</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2352;&#2368;&#2348;&#2368; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344;</span>",
      "<span class=\"eqt\">Heavy Industries</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2368; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327;</span>",
      "<span class=\"eqt\">Unemployment</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2352;&#2379;&#2332;&#2327;&#2366;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Agricultural Policy</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2344;&#2368;&#2340;&#2367;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Mahalanobis strategy of planning, which formed the basis of India's Second Five-Year Plan (1956-1961), gave strong emphasis to the growth of <b>Heavy Industries.</b></p><p>This strategy, developed by Professor P.C. Mahalanobis, advocated for rapid industrialization by focusing investment on the capital goods sector (industries that produce machinery and equipment for other industries) to build a self-reliant and strong industrial base for the country.</p><p>Further insights:</p><p>The Mahalanobis model is a two-sector (later expanded to four-sector) growth model that analyzes the allocation of investment between the capital goods sector and the consumer goods sector.</p><p>This strategy led to the establishment of major public sector enterprises in steel, heavy engineering, machinery, etc., during the Second Plan period.</p><p>The goal was to achieve long-term economic growth and self-sufficiency through import-substitution industrialization.</p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>In August 2023, who became the first Indian woman wrestler to win two U20 Wrestling World Titles?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2327;&#2360;&#2381;&#2340; 2023 &#2350;&#2375;&#2306;, &#2342;&#2379; U20 &#2325;&#2369;&#2358;&#2381;&#2340;&#2368; &#2357;&#2367;&#2358;&#2381;&#2357; &#2326;&#2367;&#2340;&#2366;&#2348; &#2332;&#2368;&#2340;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2361;&#2354;&#2368; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2361;&#2367;&#2354;&#2366; &#2346;&#2361;&#2354;&#2357;&#2366;&#2344; &#2325;&#2380;&#2344; &#2348;&#2344;&#2368;?</p></span>",
    "options": [

      "<span class=\"eqt\">Antim Panghal</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2367;&#2350; &#2346;&#2306;&#2328;&#2366;&#2354;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Indian wrestler <b>Antim Panghal</b> won her back-to-back women's U20 world titles, successfully defending her 53kg crown and became the first Indian woman to do so.</p><p>Panghal, who hails from Hisar in Haryana, dominated Ukrainian Mariia Yefremova in a facile 4-0. In the 62kg final, Savita defeated Venezuela's A Paola Montero Chirinos. Priya Malik had won the 76kg title earlier.</p><p>In a phenomenal result for Indian wrestling, seven wrestlers from the country won medals, including three gold medals, one silver through Antim Kundu (65kg) and three bronze via Reena (57kg), Arju (68kg) and Harshita (72kg).</p>",

    "question": "<span class=\"eqt\"><p>Which is the SI unit for measuring the momentum of a moving body?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2340;&#2367;&#2350;&#2366;&#2344; &#2346;&#2367;&#2306;&#2337; &#2325;&#2375; &#2360;&#2306;&#2357;&#2375;&#2327; &#2325;&#2379; &#2350;&#2366;&#2346;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; SI &#2350;&#2366;&#2340;&#2381;&#2352;&#2325; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">m/s</span><span class=\"hqt\" style=\"display:none\">m/s</span>",
      "<span class=\"eqt\">Kg.m/s</span><span class=\"hqt\" style=\"display:none\">Kg.m/s</span>",
      "<span class=\"eqt\">Kg.m/s2</span><span class=\"hqt\" style=\"display:none\">Kg.m/s2</span>",
      "<span class=\"eqt\">N.m/s2</span><span class=\"hqt\" style=\"display:none\">N.m/s2</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The SI unit for measuring the momentum of a moving body is <b>Kg.m/s (kilogram-meter per second).</b></p><p>Momentum (p) is a vector quantity defined as the product of an object's mass (m) and its velocity (v):</p><p>p = m  v</p><p>- The SI unit for mass (m) is the kilogram (Kg).</p><p>- The SI unit for velocity (v) is meters per second (m/s).</p><p>Therefore, the SI unit for momentum (p) is Kg  m/s, or Kg.m/s.</p><p>Explanation of Other Options:</p><p>(a) m/s: This is the SI unit for speed or velocity.</p><p>(c) Kg.m/s: This is the SI unit for force (mass  acceleration), also known as a Newton (N).</p><p>(d) N.m/s: This combination of units does not represent a standard physical quantity in this context. (N.m is a Joule, so this would be J/s, which is rate of change of power).</p><p>Further insights:</p><p>Momentum is a measure of the \"quantity of motion\" of an object.</p><p>The principle of conservation of momentum states that in an isolated system, the total momentum remains constant. This is a fundamental principle in physics.</p><p>Momentum is also sometimes expressed in Newton-seconds (Ns), which is dimensionally equivalent to Kg.m/s (since 1 N = 1 Kg.m/s, so 1 Ns = 1 Kg.m/s  s = 1 Kg.m/s).</p><p></p>",
    "question_index": 28
  },
  {
    "question": "<span class=\"eqt\"><p>Which article of the Indian constitution deals with the President's special address?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2357;&#2367;&#2358;&#2375;&#2359; &#2309;&#2349;&#2367;&#2349;&#2366;&#2359;&#2339; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 87</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 87</span>",
      "<span class=\"eqt\">Article 60</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 60</span>",
      "<span class=\"eqt\">Article 178</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 178</span>",
      "<span class=\"eqt\">Article 56</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 56</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Article 87</b> of the Indian Constitution deals with the President's special address. This article mandates that the President must address both Houses of Parliament assembled together at the commencement of two specific occasions:</p><p>- The first session after each general election to the Lok Sabha.</p><p>- The first session of each year.</p><p>In this address, the President outlines the policies and programs of the government for the ensuing year.</p><p>Explanation of Other Options:</p><p>(b) Article 60: This article pertains to the Oath or affirmation by the President.</p><p>(c) Article 178: This article deals with the Speaker and Deputy Speaker of the Legislative Assembly of a State.</p><p>(d) Article 56: This article deals with the term of office of the President.</p><p>Further insights:</p><p>The President's special address is similar to the \"Speech from the Throne\" in other parliamentary democracies like the United Kingdom.</p><p>The address is prepared by the government and provides an overview of its legislative and policy agenda.</p><p>Following the address, a \"Motion of Thanks\" is moved in both Houses, which is then debated and put to a vote.</p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>Match the following : </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. Pitts India Act</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. 1773</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. Simon Commission</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. 1784</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. Regulating Act</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. 1942</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. Cripps Mission</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. 1927</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2379; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1. &#2346;&#2367;&#2335;&#2381;&#2360; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2319;&#2325;&#2381;&#2335;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. 1773</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2. &#2360;&#2366;&#2311;&#2350;&#2344; &#2325;&#2350;&#2368;&#2358;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. 1784</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3. &#2352;&#2375;&#2327;&#2369;&#2354;&#2375;&#2335;&#2367;&#2306;&#2327; &#2319;&#2325;&#2381;&#2335;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. 1942</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4. &#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2360; &#2350;&#2367;&#2358;&#2344;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. 1927</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">1-c, 2-b, 3-a, 4-d</span><span class=\"hqt\" style=\"display:none\">1-c, 2-b, 3-a, 4-d</span>",
      "<span class=\"eqt\">1-a, 2-c, 3-d, 4-b</span><span class=\"hqt\" style=\"display:none\">1-a, 2-c, 3-d, 4-b</span>",
      "<span class=\"eqt\">1-b, 2-d, 3-a, 4-c</span><span class=\"hqt\" style=\"display:none\">1-b, 2-d, 3-a, 4-c</span>",
      "<span class=\"eqt\">1-d, 2-a, 3-b, 4-c</span><span class=\"hqt\" style=\"display:none\">1-d, 2-a, 3-b, 4-c</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Pitts India Act - b. 1784: Pitt's India Act was passed by the British Parliament in 1784 to bring the East India Company's rule in India under greater control of the British government.</p><p>Simon Commission - d. 1927: The Simon Commission, a group of seven British Members of Parliament, was appointed in 1927 to study constitutional reform in British India.</p><p>Regulating Act - a. 1773: The Regulating Act of 1773 was an act of the Parliament of Great Britain intended to overhaul the management of the East India Company's rule in India.</p><p>Cripps Mission - c. 1942: The Cripps Mission was an attempt in March 1942 by the British government to secure full Indian cooperation and support for their efforts in World War II.</p><p>Therefore, the correct combination is (c) 1-b, 2-d, 3-a, 4-c.</p><p>Further insights:</p><p>Each of these acts and commissions represents a significant milestone in the history of British rule in India and the Indian independence movement.</p><p>The Regulating Act and Pitt's India Act were early attempts to assert British parliamentary control over the East India Company.</p><p>The Simon Commission was met with widespread protests in India (\"Go Back Simon\") because it included no Indian members.</p><p>The Cripps Mission's proposals were ultimately rejected by the Indian National Congress and other political parties for various reasons, including the offer of dominion status instead of complete independence.</p>",
    "question_index": 30
  },

    "question": "<span class=\"eqt\"><p>Pandit Swapan Chaudhuri, a recipient of Padma Shri in 2019, is a renowned ______ player.</p></span><span class=\"hqt\" style=\"display:none\"><p>2019 &#2350;&#2375;&#2306; &#2346;&#2342;&#2381;&#2350; &#2358;&#2381;&#2352;&#2368; &#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2346;&#2306;&#2337;&#2367;&#2340; &#2360;&#2381;&#2357;&#2346;&#2344; &#2330;&#2380;&#2343;&#2352;&#2368; &#2319;&#2325; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; _______ &#2357;&#2366;&#2342;&#2325; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">sitar</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2340;&#2366;&#2352;</span>",
      "<span class=\"eqt\">tabla</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2348;&#2354;&#2366;</span>",
      "<span class=\"eqt\">santoor</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2340;&#2370;&#2352;</span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>Pandit Swapan Chaudhuri is a renowned <b>tabla</b> player in the field of Hindustani classical music.</p><p>He is a celebrated exponent of the Lucknow Gharana of tabla and is known for his technical prowess, intricate rhythmic compositions, and sensitive accompaniment.</p><p>He was awarded the Padma Shri by the Government of India in 2019 for his contributions to music.</p><p>Further insights:</p><p>The tabla is a pair of small hand drums from the Indian subcontinent, the principal percussion instrument in Hindustani classical music.</p><p>Pandit Swapan Chaudhuri has performed with many leading musicians of Indian classical music, including Ustad Ali Akbar Khan and Pandit Ravi Shankar.</p><p>He is also a highly respected teacher (guru) and has served as the Director of Percussion at the Ali Akbar College of Music in California for many years.</p>",
    "question_index": 31
  },

    "question": "<span class=\"eqt\"><p>The Ratha Yatra of Lord Jagannath takes place once a year at NeelachalSrikshetra in</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2327;&#2357;&#2366;&#2344; &#2332;&#2327;&#2344;&#2381;&#2344;&#2366;&#2341; &#2325;&#2368; &#2352;&#2341; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2360;&#2366;&#2354; &#2350;&#2375;&#2306; &#2319;&#2325; &#2348;&#2366;&#2352; ________ &#2325;&#2375; &#2344;&#2368;&#2354;&#2366;&#2330;&#2354; &#2358;&#2381;&#2352;&#2368;&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rajasthan</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2341;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Uttar Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Maharashtra</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Odisha</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2358;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The famous Ratha Yatra (Chariot Festival) of Lord Jagannath takes place once a year at Neelachal Srikhetra, which is another name for Puri in the state of <b>Odisha.</b></p><p>During this festival, the deities of Lord Jagannath, his elder brother Lord Balabhadra, and his sister Goddess Subhadra are taken out in a grand procession in three massive, elaborately decorated wooden chariots.</p><p>Further insights:</p><p>The Ratha Yatra in Puri is a major Hindu festival that attracts millions of devotees and tourists from all over the world.</p><p>The festival commemorates Lord Jagannath's annual visit to his aunt's temple, the Gundicha Temple, via the Mausi Maa Temple (maternal aunt's home).</p><p>\"Neelachal\" refers to the \"Blue Mountain,\" a name for Puri in religious texts, and \"Srikhetra\" means the \"holy field\" or \"abode of wealth/Lakshmi.\"</p>",
    "question_index": 32
  },

    "question": "<span class=\"eqt\"><p>Which of the following is the correct chemical representation of Butane?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2348;&#2381;&#2351;&#2370;&#2335;&#2375;&#2344; (Butane) &#2325;&#2366; &#2360;&#2361;&#2368; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2344;&#2367;&#2352;&#2370;&#2346;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">C<sub>2</sub>H<sub>5</sub></span><span class=\"hqt\" style=\"display:none\">C<sub>2</sub>H<sub>5</sub></span>",
      "<span class=\"eqt\">C&#8324;H&#8321;&#8320;</span><span class=\"hqt\" style=\"display:none\">C&#8324;H&#8321;&#8320;</span>",
      "<span class=\"eqt\">C<sub>3</sub>H<sub>6</sub></span><span class=\"hqt\" style=\"display:none\">C<sub>3</sub>H<sub>6</sub></span>",
      "<span class=\"eqt\">C<sub>6</sub>H<sub>10</sub></span><span class=\"hqt\" style=\"display:none\">C<sub>6</sub>H<sub>10</sub></span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Butane or n-butane is an alkane with the formula <b>C&#8324;H&#8321;&#8320;</b>. Butane is a gas at room temperature and atmospheric pressure. Butane is a highly flammable, colourless, easily liquefied gas that quickly evaporates at room temperature.</p><p>Explanation of Other Options:</p><p>(a) C&#8322;H&#8325;: This is the formula for the ethyl group (an alkyl radical), not a stable molecule. Ethane is C&#8322;H&#8326;.</p><p>(c) C&#8323;H&#8326;: This is the molecular formula for Propene (an alkene) or Cyclopropane (a cycloalkane). Propane (alkane) is C&#8323;H&#8328;.</p><p>(d) C&#8326;H&#8321;&#8320;: This molecular formula could represent various unsaturated hydrocarbons like Hexyne (an alkyne) or cyclic compounds like Cyclohexene. Hexane (alkane) is C&#8326;H&#8321;&#8324;.</p><p>Further insights:</p><p>Butane has two isomers: n-butane (a straight-chain alkane) and isobutane (2-methylpropane, a branched-chain alkane). Both have the same molecular formula C&#8324;H&#8321;&#8320;.</p><p>Butane is a highly flammable gas commonly used as a fuel, particularly in lighters, portable stoves, and as a propellant in aerosol sprays.</p>",
    "question_index": 34
  },

    "question": "<span class=\"eqt\"><p>Which of the following is not a characteristic of peninsular rivers?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2381;&#2351;&#2366; &#2346;&#2381;&#2352;&#2366;&#2351;&#2342;&#2381;&#2357;&#2368;&#2346;&#2368;&#2351; &#2344;&#2342;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Meandering tendency</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2306;&#2342;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Seasonal flow</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2380;&#2360;&#2350;&#2368; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;</span>",
      "<span class=\"eqt\">Little erosional activity</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2379;&#2337;&#2364;&#2368; &#2325;&#2381;&#2359;&#2339;&#2367;&#2325; &#2327;&#2340;&#2367;&#2357;&#2367;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Flow through shadow valleys</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2366;&#2351;&#2366; &#2328;&#2366;&#2335;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2346;&#2381;&#2352;&#2357;&#2366;&#2361;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>A <b>meandering tendency</b> is generally NOT a characteristic of peninsular rivers.</p><p>Peninsular rivers typically flow through hard, rocky terrain of the peninsular plateau, which restricts their ability to carve wide S-shaped bends (meanders) like the Himalayan rivers that flow through soft alluvial plains.</p><p>Peninsular rivers usually follow a more or less straight course through well-defined, graded valleys.</p><p>Explanation of Other Options (which are characteristics of peninsular rivers):</p><p>(b) Seasonal flow: Peninsular rivers are mostly rain-fed and are not sourced from glaciers. Their flow is highly dependent on monsoon rainfall, making them largely seasonal or non-perennial, with significant reduction in water volume during the dry season.</p><p>(c) Little erosional activity: As these rivers have reached a mature stage and flow through hard, resistant rock beds, their vertical downcutting (erosional activity) is limited compared to the younger, more vigorous Himalayan rivers.</p><p>(d) Flow through shallow valleys: Having reached their base level of erosion, the valleys of peninsular rivers are generally shallower and have a gentler gradient compared to the deep gorges and V-shaped valleys of Himalayan rivers.</p><p>Further insights:</p><p>Himalayan rivers (like the Ganga, Indus, Brahmaputra) are perennial as they are fed by both snowmelt from glaciers and monsoon rains. They have long courses, large basins, and are known for their extensive meandering and formation of ox-bow lakes in their plain stages.</p><p>Peninsular rivers (like Godavari, Krishna, Kaveri, Mahanadi, Narmada, Tapti) are older rivers with shorter courses and smaller basins compared to Himalayan rivers.</p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>In which part of the Indian Constitution we find the provisions relating to The Scheduled and Tribal areas?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2375; &#2325;&#2367;&#2360; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; &#2361;&#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2324;&#2352; &#2332;&#2344;&#2332;&#2366;&#2340;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2366;&#2357;&#2343;&#2366;&#2344; &#2350;&#2367;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Part IX</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; IX</span>",
      "<span class=\"eqt\">Part X</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; X</span>",
      "<span class=\"eqt\">Part XI</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; XI</span>",
      "<span class=\"eqt\">Part XII</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; XII</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Provisions relating to The Scheduled and Tribal Areas are found in <b>Part X</b> of the Indian Constitution. This part contains Article 244, which deals with the administration of Scheduled Areas and Tribal Areas.</p><p>- Article 244(1) states that the provisions of the Fifth Schedule shall apply to the administration and control of the Scheduled Areas and Scheduled Tribes in any State other than the states of Assam, Meghalaya, Tripura and Mizoram.</p><p>- Article 244(2) states that the provisions of the Sixth Schedule shall apply to the administration of the tribal areas in the states of Assam, Meghalaya, Tripura and Mizoram.</p><p>Explanation of Other Options:</p><p>(a) Part IX: This part deals with \"The Panchayats.\"</p><p>(c) Part XI: This part deals with \"Relations between the Union and the States.\"</p><p>(d) Part XII: This part deals with \"Finance, Property, Contracts and Suits.\"</p><p>Further insights:</p><p>The Fifth and Sixth Schedules of the Constitution contain special provisions for the administration and protection of the interests of the Scheduled Tribes in these designated areas.</p><p>These provisions aim to safeguard the land, culture, and autonomy of the tribal communities.</p>",
    "question_index": 38
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was the last dynasty that ruled Delhi Sultanate? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2360;&#2354;&#2381;&#2340;&#2344;&#2340; &#2346;&#2352; &#2358;&#2366;&#2360;&#2344; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2306;&#2358; &#2325;&#2380;&#2344;- &#2360;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mamluk dynasty</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2350;&#2354;&#2369;&#2325; &#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Tughlaq dynasty</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2369;&#2327;&#2354;&#2325; &#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Lodhi dynasty</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2343;&#2368; &#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Sayyid dynasty</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2376;&#2351;&#2381;&#2351;&#2342; &#2357;&#2306;&#2358;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Delhi Sultanates ruled India between 1206 and 1526. </p><p>&#183; Five dynasties ruled over Delhi Sultanate. </p><p>&#183; They were:</p><p>o Mamluk / Slave dynasty (1206-1290), </p><p>o Khalji dynasty (1290-1320), </p><p>o Tughluq dynasty (1320-1414), </p><p>o Sayyid dynasty (1414-1451) and </p><p>o Lodi dynasty (1451-1526). </p><p>&#183; <b>Lodi dynasty</b> was the last dynasty of Delhi Sultanates. </p>",
    "question_index": 39
  },
  {
    "question": "<span class=\"eqt\"><p>Which among the following works is NOT considered in calculating national income?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; &#2325;&#2368; &#2327;&#2339;&#2344;&#2366; &#2350;&#2375;&#2306; &#2357;&#2367;&#2330;&#2366;&#2352; <u>&#2344;&#2361;&#2368;&#2306;</u> &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Selling of agricultural produce</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Working in Education Institutions</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2367;&#2325;&#2381;&#2359;&#2339; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2352;&#2340; &#2361;&#2379;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Household work by women</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2328;&#2352;&#2375;&#2354;&#2370; &#2325;&#2366;&#2352;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Working in Information Technology Industry</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2370;&#2330;&#2344;&#2366; &#2346;&#2381;&#2352;&#2379;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325;&#2368; &#2313;&#2342;&#2381;&#2351;&#2379;&#2327; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351;&#2352;&#2340; &#2361;&#2379;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Household work by women (and other non-marketed domestic services performed by family members for their own consumption)</b> is NOT considered in the calculation of national income (like GDP).</p><p>National income accounting measures the market value of final goods and services produced in an economy.</p><p>Since household work (such as cooking, cleaning, childcare) is a non-market activity and does not have an explicit market transaction or price, it is excluded from these calculations, even though it contributes significantly to well-being.</p><p>Explanation of Other Options:</p><p>(a) Selling of agricultural produce: The value of agricultural produce sold in the market is a part of the agricultural sector's contribution to national income.</p><p>(b) Working in Education Institutions: The services provided by teachers, administrators, and other staff in educational institutions have a market value (salaries, fees) and are included in the services sector's contribution to national income.</p><p>(d) Working in Information Technology Industry: The services provided by the IT industry (software development, IT services, etc.) are a major component of the services sector and are included in the calculation of national income.</p><p>Further insights:</p><p>The exclusion of non-market activities like household work is a well-known limitation of national income measures like GDP, as it leads to an underestimation of the total economic activity and contribution to welfare.</p><p>Other activities not included in national income calculations include illegal activities (the \"black economy\") and purely financial transactions (like the buying and selling of stocks, which represent a transfer of ownership, not new production).</p><p>The value of intermediate goods is also excluded to avoid double-counting, as their value is already embedded in the price of the final goods.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>Select the complex plant tissue from the following?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2332;&#2335;&#2367;&#2354; &#2346;&#2366;&#2342;&#2346; &#2314;&#2340;&#2325; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",
    "options": [
      "<span class=\"eqt\">Parenchyma</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2376;&#2352;&#2375;&#2344;&#2381;&#2325;&#2366;&#2311;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Collenchyma</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2377;&#2354;&#2375;&#2344;&#2381;&#2325;&#2366;&#2311;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Sclerenchyma</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2325;&#2381;&#2354;&#2375;&#2352;&#2375;&#2344;&#2381;&#2325;&#2366;&#2311;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Xylem</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2311;&#2354;&#2350;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Xylem</b> is a complex plant tissue. Complex tissues in plants are those that are made up of more than one type of cell, working together as a unit.</p><p>Xylem is composed of four different kinds of elements: tracheids, vessels, xylem parenchyma, and xylem fibers.</p><p>Its primary function is the conduction of water and minerals from the roots to the rest of the plant, and it also provides mechanical support.</p><p>Explanation of Other Options:</p><p>Options (a), (b), and (c) are all types of simple permanent tissues, meaning they are each made up of only one type of cell.</p><p>(a) Parenchyma: A simple tissue composed of living, thin-walled cells, involved in functions like photosynthesis, storage, and secretion.</p><p>(b) Collenchyma: A simple tissue composed of living cells with unevenly thickened walls, providing mechanical support to growing parts of the plant like young stems and petioles.</p><p>(c) Sclerenchyma: A simple tissue composed of dead cells with very thick, lignified walls, providing strong mechanical support to the plant.</p><p>Further insights:</p><p>The other major complex plant tissue is Phloem, which is responsible for transporting food (sugars produced during photosynthesis) from the leaves to other parts of the plant. Phloem is also composed of multiple cell types (sieve tube elements, companion cells, phloem parenchyma, and phloem fibers).</p><p>Simple tissues and complex tissues together make up the tissue systems of a plant (dermal, ground, and vascular). Xylem and phloem together form the vascular tissue system.</p>",
    "question_index": 41
  },

    "correct_option_id": 3,
    "solution": "<p>In cricket, the fielding position on the <b>off side</b> that is closest to the bowler is called <b>Mid off.</b></p><p>It is positioned on the off side of the pitch, roughly halfway between the bowler's end and the batsman's end, a short distance away from the pitch.</p><p>Explanation of Other Options:</p><p>(a) Back-wicket: This is not a standard fielding position name. The position behind the batsman's wicket is wicket-keeper.</p><p>(b) First slip: This is a close catching position on the off side, but it is located behind the batsman's wicket, not close to the bowler's end of the pitch.</p><p>(c) Cover: This is a fielding position on the off side, but it is located further away from the pitch than mid off, covering a wider area.</p><p>Further insights:</p><p>The \"off side\" is the half of the field that the batsman is not facing with their body (for a right-handed batsman, this is the right side of the pitch). The other half is the \"on side\" or \"leg side.\"</p><p>Mid off is a key position for stopping drives from the batsman and can be either an attacking or defensive position depending on how close to the batsman the fielder stands.</p><p>The corresponding position on the on side is \"Mid on.\"</p>",

    "question": "<span class=\"eqt\"><p>Green revolution refers to the large increase in production of food grains resulting from the use of:</p><p>I. High yielding variety (HYV) seeds</p><p>II. Fertilizers and pesticides</p><p>III. Regular supply of water</p><p>Select the correct answer using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2352;&#2367;&#2340; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; &#2325;&#2366; &#2340;&#2366;&#2340;&#2381;&#2346;&#2352;&#2381;&#2351; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2325;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327; &#2360;&#2375; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2326;&#2366;&#2342;&#2381;&#2351;&#2366;&#2344;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2350;&#2375;&#2306; &#2348;&#2337;&#2364;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2360;&#2375; &#2361;&#2376;:</p><p>I. &#2309;&#2343;&#2367;&#2325; &#2313;&#2346;&#2332; &#2342;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2325;&#2367;&#2360;&#2381;&#2350; (HYV) &#2348;&#2368;&#2332;</p><p>II. &#2313;&#2352;&#2381;&#2357;&#2352;&#2325; &#2324;&#2352; &#2325;&#2368;&#2335;&#2344;&#2366;&#2358;&#2325;</p><p>III. &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2344;&#2367;&#2351;&#2350;&#2367;&#2340; &#2310;&#2346;&#2370;&#2352;&#2381;&#2340;&#2367;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2352; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Which of the following is also known as the 'Product method' of measuring GDP?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; GDP &#2350;&#2366;&#2346;&#2344;&#2375; &#2325;&#2368; '&#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2357;&#2367;&#2343;&#2367;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2368; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Income method</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351; &#2357;&#2367;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Expenditure method</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2351; &#2357;&#2367;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Value Added method</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2370;&#2354;&#2381;&#2351;&#2357;&#2352;&#2381;&#2343;&#2367;&#8205;&#2340; &#2357;&#2367;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Growth method</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2357;&#2367;&#2343;&#2367;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Value Added method</b> is also known as the 'Product method' or 'Output method' of measuring Gross Domestic Product (GDP).</p><p>This method calculates GDP by summing up the value added at each stage of production across all sectors of the economy (primary, secondary, and tertiary).</p><p>Value added is defined as the value of output minus the value of intermediate consumption (the cost of goods and services used up in the production process).</p><p>Explanation of Other Options:</p><p>(a) Income method: This method measures GDP by summing up all the incomes earned by the factors of production (land, labor, capital, entrepreneurship) within a country. This includes wages, salaries, profits, interest, and rent.</p><p>(b) Expenditure method: This method measures GDP by summing up all the final expenditure in the economy. This includes consumption expenditure (C), investment expenditure (I), government expenditure (G), and net exports (X - M).</p><p>(d) Growth method: This is not a standard term for a method of measuring GDP itself, but rather refers to the calculation of the rate of change (growth) of GDP over time.</p><p>Further insights:</p><p>In theory, all three methods of measuring GDP (Product/Value Added, Income, and Expenditure) should yield the same result, as the total value of what is produced must be equal to the total income earned from that production, which in turn must be equal to the total expenditure on those final goods and services.</p><p>The Value Added method is particularly useful for avoiding the problem of double-counting, where the value of intermediate goods is counted multiple times as they move through the production chain. By summing only the value added at each stage, we arrive at the value of the final product.</p>",
    "question_index": 48
  },
  {
    "question": "<span class=\"eqt\"><p>Which among the following event was not held in 1916?</p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2328;&#2335;&#2344;&#2366; 1916 &#2350;&#2375;&#2306; &#2344;&#2361;&#2368;&#2306; &#2361;&#2369;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Formation of Home Rule Leagues</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2379;&#2350; &#2352;&#2370;&#2354; &#2354;&#2368;&#2327; &#2325;&#2366; &#2327;&#2336;&#2344;</span>",
      "<span class=\"eqt\">Rowlatt Act</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2377;&#2354;&#2375;&#2335; &#2319;&#2325;&#2381;&#2335;</span>",
      "<span class=\"eqt\">Lucknow pact between the Congress and Muslim League</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2324;&#2352; &#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2354;&#2368;&#2327; &#2325;&#2375; &#2348;&#2368;&#2330; &#2354;&#2326;&#2344;&#2314; &#2360;&#2350;&#2333;&#2380;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Foundation of Banaras Hindu University</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2344;&#2366;&#2352;&#2360; &#2361;&#2367;&#2306;&#2342;&#2370; &#2357;&#2367;&#2358;&#2381;&#2357;&#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The <b>Rowlatt Act</b> was NOT passed in 1916. The Rowlatt Act (Anarchical and Revolutionary Crimes Act of 1919) was passed by the Imperial Legislative Council in Delhi in March 1919.</p><p>This act gave the British government enormous powers to repress political activities and allowed for the detention of political prisoners without trial for two years.</p><p>Explanation of Other Options (Events that occurred in 1916):</p><p>(a) Formation of Home Rule Leagues: This is correct. Two Home Rule Leagues were launched in 1916 to demand self-government for India within the British Empire. One was started by Bal Gangadhar Tilak in April 1916, and the other by Annie Besant in September 1916.</p><p>(c) Lucknow pact between the Congress and Muslim League: This is correct. In the annual session of the Indian National Congress and the Muslim League held at Lucknow in December 1916, the two parties signed the historic Lucknow Pact, where they agreed on a common set of demands to present to the British government and also agreed on a scheme for representation of minorities in provincial legislatures.</p><p>(d) Foundation of Banaras Hindu University: This is correct. Banaras Hindu University (BHU) was founded by Pandit Madan Mohan Malaviya in 1916, with the foundation stone being laid by the then Viceroy, Lord Hardinge.</p><p>Further insights:</p><p>The Rowlatt Act was deeply unpopular in India and led to widespread protests, including the nationwide hartal (strike) called by Mahatma Gandhi.</p><p>The protests against the Rowlatt Act culminated in the tragic Jallianwala Bagh massacre in Amritsar on April 13, 1919.</p>",
    "question_index": 49
  },
  {
    "question": "<span class=\"eqt\"><p>A person bought an article for Rs. 8000 and marked the price up by 20%. If he allows some discount on the marked price and sold at Rs. 7200. Find the discount %.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; 8000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2326;&#2352;&#2368;&#2342;&#2368; &#2324;&#2352; &#2313;&#2360; &#2346;&#2352; 20% &#2309;&#2343;&#2367;&#2325; &#2350;&#2370;&#2354;&#2381;&#2351; &#2309;&#2306;&#2325;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2325;&#2369;&#2331; &#2331;&#2370;&#2335; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 7200 &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2331;&#2370;&#2335; % &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">10%</span><span class=\"hqt\" style=\"display:none\">10%</span>",
      "<span class=\"eqt\">20%</span><span class=\"hqt\" style=\"display:none\">20%</span>",
      "<span class=\"eqt\">25%</span><span class=\"hqt\" style=\"display:none\">25%</span>",
      "<span class=\"eqt\">30%</span><span class=\"hqt\" style=\"display:none\">30%</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Marked price of the article = 8000 * 120/100 = Rs. 9600</p><p>Let the discount given = x%</p><p>According to question,</p><p>9600 * (100  -  x)/100 = 7200</p><p>100  -  x = 75</p><p>x = 25%</p>",
    "question_index": 50

    "question": "<span class=\"eqt\"><p>If n is a positive integer and (11n + 120) is divisible by n, then how many values are possible for n? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; n &#2319;&#2325; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325; &#2361;&#2376; &#2324;&#2352; (11n + 120), n &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; n &#2325;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2350;&#2366;&#2344; &#2361;&#2379; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",

    "question": "<span class=\"eqt\"><p>A certain sum becomes 2.2 times of itself after 10 years at certain rate of SI, then after how much time it becomes 3.16 times of itself at same rate of interest?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2343;&#2344; &#2352;&#2366;&#2358;&#2367; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 10 &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2368; 2.2 &#2327;&#2369;&#2344;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2360;&#2350;&#2366;&#2344; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; &#2357;&#2361; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2348;&#2366;&#2342; &#2360;&#2381;&#2357;&#2351;&#2306; &#2325;&#2368; 3.16 &#2327;&#2369;&#2344;&#2366; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">16 years</span><span class=\"hqt\" style=\"display:none\">16 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">18 years</span><span class=\"hqt\" style=\"display:none\">18 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">20 years</span><span class=\"hqt\" style=\"display:none\">20 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">24 years</span><span class=\"hqt\" style=\"display:none\">24 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let sum = Rs P</p><p>Let rate of interest = R % per annum</p><p>Now,</p><p><img width=139 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12338/image009.png\"></p><p>R = 12</p><p>Let required time = 't' years</p><p><img width=140 height=37 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12338/image010.png\"></p><p>t = 2.16 * (100/12)</p><p>t = 216/12</p><p>t = 18 years</p><p></p><p><b>Alternate Method</b></p><p>If a certain sum of money becomes m times in t years then required time in which it will be n times = (n - 1) x t/(m - 1)</p><p>Here, t = 10, n = 3.16, m = 2.2</p><p>Required time = (3.16 - 1) x 10/1.2 = 18 years</p>",

    "question": "<span class=\"eqt\"><p>A number X is such that it is the product of three consecutive positive integers and M = N + X, where N is an odd number, then which of the following option will be true for the value of M?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; X &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376; &#2325;&#2367; &#2351;&#2361; &#2340;&#2368;&#2344; &#2325;&#2381;&#2352;&#2350;&#2366;&#2327;&#2340; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; &#2327;&#2369;&#2339;&#2344;&#2347;&#2354; &#2361;&#2376; &#2324;&#2352; M = N + X &#2361;&#2376;, &#2332;&#2361;&#2366;&#2305; N &#2319;&#2325; &#2357;&#2367;&#2359;&#2350; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; M &#2325;&#2375; &#2350;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2340;&#2381;&#2351; &#2361;&#2379;&#2327;&#2366;?</p></span>",

      "<span class=\"eqt\">None of these.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;&#2404;</span>",

    "question": "<span class=\"eqt\"><p>The number of students in college K is twice of that in college M. The average weight of all the students of college K is 49 kg while the average weight of all the students of college M is 58 kg. If the total number of students in college M is 75% more than the average weight (in kg) of all the students of both the colleges together, then what is the total number of students in college K?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2377;&#2354;&#2375;&#2332; K &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2325;&#2377;&#2354;&#2375;&#2332; M &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; &#2342;&#2379;&#2327;&#2369;&#2344;&#2368; &#2361;&#2376;&#2404; &#2325;&#2377;&#2354;&#2375;&#2332; K &#2325;&#2375; &#2360;&#2349;&#2368; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2357;&#2332;&#2344; 49 kg &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2325;&#2377;&#2354;&#2375;&#2332; M &#2325;&#2375; &#2360;&#2349;&#2368; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2357;&#2332;&#2344; 58 kg &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2377;&#2354;&#2375;&#2332; M &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2377;&#2354;&#2375;&#2332;&#2379;&#2306; &#2325;&#2375; &#2360;&#2349;&#2368; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2324;&#2360;&#2340; &#2357;&#2332;&#2344; (kg &#2350;&#2375;&#2306;) &#2360;&#2375; 75% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2377;&#2354;&#2375;&#2332; K &#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">216</span><span class=\"hqt\" style=\"display:none\">216</span>",
      "<span class=\"eqt\">182</span><span class=\"hqt\" style=\"display:none\">182</span>",
      "<span class=\"eqt\">248</span><span class=\"hqt\" style=\"display:none\">248</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Let the average weight of all the students of both the colleges together be q.</p><p>Also, ratio of number of students in K to that in M = 2:1</p><p>By the rule of alligation,</p><p><img width=183 height=200 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p12148/image003.jpg\"></p><p>(q  -  49)/(58  -  q) = 1/2</p><p>2q  -  98 = 58  -  q</p><p>3q = 156</p><p>q = 52</p><p>Now, no. of students in M = 1.75 * 52 = 91</p><p>Hence, no. of students in K = 2 * 91 = 182</p>",
    "question_index": 59

    "question": "<span class=\"eqt\"><p>The sum of the present ages of A and B is 78 years, and the sum of the present ages of B and C is 90 years. If C is 6 years older than B, then find the present age of A. </p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; 78 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376; &#2340;&#2341;&#2366; B &#2324;&#2352; C &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2366; &#2351;&#2379;&#2327;&#2347;&#2354; 90 &#2357;&#2352;&#2381;&#2359; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; C, B &#2360;&#2375; 6 &#2357;&#2352;&#2381;&#2359; &#2348;&#2337;&#2364;&#2366; &#2361;&#2376;, &#2340;&#2379; A &#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A and B together can complete a work in 5 days, B and C together can complete it in 10 days and C and A together can complete it in 20 days. Find the time taken by B alone to complete the work.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; A &#2324;&#2352; B &#2319;&#2325; &#2325;&#2366;&#2350; &#2325;&#2379; 5 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2319;&#2325; &#2360;&#2366;&#2341; B &#2324;&#2352; C &#2311;&#2360;&#2375; 10 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2319;&#2325; &#2360;&#2366;&#2341; C &#2324;&#2352; A &#2311;&#2360;&#2375; 20 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2309;&#2325;&#2375;&#2354;&#2375; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2366;&#2350; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

      "<span class=\"eqt\">8 days</span><span class=\"hqt\" style=\"display:none\">8 &#2342;&#2367;&#2344;</span>",

    "solution": "<p>Total work = LCM of 5, 10 and 20 = 20 units</p><p>Efficiency of (A + B) = 20/5 = 4 units</p><p>Efficiency of (B + C) = 20/10 = 2 units</p><p>Efficiency of (C + A) = 20/20 = 1 unit</p><p>Efficiency of 2(A + B + C) = 7 units</p><p>Efficiency of (A + B + C) = 3.5 units</p><p>Subtracting efficiency of A and C together from efficiency of A, B and C together, we get -</p><p>3.5  -  1 = 2.5 unit </p><p>Required time = 20/2.5 = 8 days</p>",

    "question": "<span class=\"eqt\"><p>A container having volume 2310 cm<sup>3</sup> is in the shape of a cone standing on one end of the cylinder. If the radius and height of the cylinder are 7cm and 12cm respectively then find the height of the cone.</p></span><span class=\"hqt\" style=\"display:none\"><p>2310 cm<sup>3 </sup>&#2310;&#2351;&#2340;&#2344; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2348;&#2375;&#2354;&#2344; &#2325;&#2375; &#2319;&#2325; &#2360;&#2367;&#2352;&#2375; &#2346;&#2352; &#2326;&#2337;&#2364;&#2375; &#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2325;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2324;&#2352; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 7cm &#2324;&#2352; 12 cm &#2361;&#2376;, &#2340;&#2379; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A circle is inscribed in &#916;ABC  which touches sides - AB, BC and AC at the points - P, R and Q, respectively. If AB  -  BC = 4 cm, AB  -  AC = 2 cm, and the perimeter of &#916;ABC = 32 cm then AC (in cm) = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#916;ABC &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2332;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; P, R &#2324;&#2352; Q &#2346;&#2352; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; AB, BC &#2324;&#2352; AC &#2325;&#2379; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; AB - BC = 4 cm, AB - AC = 2 cm &#2324;&#2352; &#916;ABC &#2325;&#2366; &#2346;&#2352;&#2367;&#2350;&#2366;&#2346; = 32 cm &#2361;&#2376;, &#2340;&#2379; AC (cm &#2350;&#2375;&#2306;)= ?</p></span>",
    "options": [
      "<span class=\"eqt\">35/3</span><span class=\"hqt\" style=\"display:none\">35/3</span>",
      "<span class=\"eqt\">38/3</span><span class=\"hqt\" style=\"display:none\">38/3</span>",
      "<span class=\"eqt\">32/3</span><span class=\"hqt\" style=\"display:none\">32/3</span>",
      "<span class=\"eqt\">26/3</span><span class=\"hqt\" style=\"display:none\">26/3</span>"

    "correct_option_id": 2,
    "solution": "<p><img width=228 height=183 id=\"Picture 29\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19993/image052.jpg\"></p><p>AB  -  BC = 4</p><p>BC = AB  -  4</p><p>and AB  -  AC = 2</p><p>AC = AB - 2</p><p>Since perimeter of &#916;ABC = 32 cm</p><p>AB + BC + CA = 32</p><p>AB + AB  -  4 + AB  -  2 = 32</p><p>3AB - 6 = 32</p><p>3AB = 32 + 6 = 38</p><p>AB = 38/3 cm</p><p>AC = 38/3  -  2 = (38-6)/3 = 32/3 cm</p>",

    "solution": "<p>The subject of the Active Voice (\"These construction workers\") is changed into the object of the Passive Voice (\"by these construction workers\"). Also, the object of the Active Voice (\"a new bridge\") is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form ['being'] of verb is necessary while changing the voice of the sentence from Active to Passive.</p><p>The Active voice in this question is in <b>Present Continuous</b>. Thus, the Passive voice will also be in Present Continuous.</p><p>The format of Active voice is: Subject + am/is/are + V1 + ing + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + am/is/are + being + V3 + by + Subject of the active voice (Objective case) + Prepositional phrase.</p><p>For example:</p><p><i>Arnab is typing a document.</i> (Active Voice)</p><p><i>A document is being typed by Arnab.</i> (Passive Voice)</p><p>The options except (b) don't follow the correct grammatical format of the Passive Voice:</p><p>&#183; (a) uses simple present (\"is built\")</p><p>&#183; (c) uses simple past (\"was built\")</p><p>&#183; (d) uses present perfect (\"has been built\")</p><p>Therefore, the correct answer is <b>(b):</b> <i>A new bridge is being built by these construction workers across the river.</i></p><p><b>Note: V1 -&gt;</b> Base form/simple form of verb, <b>V2 -&gt;</b> Past form of verb (-ed form or irregular verb), <b>V3 -&gt;</b> Past participle form of verb (-ed, -d, -t, -en, or -n), <b>V4 -&gt;</b> Continuous form of verb / Present participle form of verb (-ing form), <b>V5 -&gt;</b> Third person singular (V1+ -es or -s).</p>",

    "solution": "<p>The error in the bracketed segment \"Him and I went to\" is the use of the objective case pronoun \"Him\" as one of the subjects of the verb \"went.\" When a pronoun acts as a subject, it must be in the subjective case.</p><p>a) \"Him and me went to\"  -  Both \"Him\" and \"me\" are objective case pronouns. When pronouns are subjects, they must be subjective (he, I).</p><p>b) \"Us went to the\"  -  \"Us\" is an objective case pronoun; the subjective case \"We\" should be used if it were the subject. Also, \"the\" is an extraneous word in this option compared to the original segment.</p><p>c) \"He and I went to\"  -  This option correctly uses the subjective case pronouns \"He\" and \"I\" as the subjects of the verb \"went.\" This is the grammatically correct form.</p><p>d) \"Himself and I going to\"  -  \"Himself\" is a reflexive or intensive pronoun and cannot be used as a simple subject here. Additionally, \"going\" is a present participle and requires an auxiliary verb (like \"were going\") to form a complete verb phrase for a past action.</p><p>The correct sentence is: <b>He and I</b> went to the library to borrow some interesting new books.</p><p>Hence, the most appropriate choice is option c).</p><p><b>Note: Subjective Pronouns:</b> The pronouns I, you, we, he, she, it, and they are known as subjective pronouns because they act as the subjects of verbs: We went to the party.</p><p><b>Objective Pronouns:</b> The pronouns me, you, us, him, her, it, and them are called objective pronouns because they act as the objects of verbs and prepositions: Anjali drove us home.</p><p><b>Reflexive Pronouns: </b>Reflexive pronouns include myself, himself, herself, itself, ourselves, yourselves, and themselves. These are used to refer back to the subject of the clause in which they are used: She hurt herself in the eye.</p>",
