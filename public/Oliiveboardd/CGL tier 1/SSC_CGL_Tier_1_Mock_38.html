<body>
    <!-- Welcome Screen -->

                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>

                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

            </div>

                    </div>
                    <div class="stat-item">

                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

  {
    "question": "<span class=\"eqt\"><p>Which of the following alphanumeric terms will replace the question mark (?) in the given series?</p><p>WI8, UJ4, SK6, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2354;&#2381;&#2347;&#2364;&#2366;&#2344;&#2381;&#2351;&#2370;&#2350;&#2375;&#2352;&#2367;&#2325; &#2346;&#2342; &#2342;&#2368; &#2327;&#2312; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2375;&#2327;&#2366;?</p><p>WI8, UJ4, SK6, ?</p></span>",

  {

    "question": "<span class=\"eqt\"><p>Which two signs should be interchanged to make the given equation correct?</p><p>343 &div; 49  -  576 + 72  X  24 = 200</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2360;&#2367;&#2342;&#2381;&#2343; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2344; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2351;&#2375;?</p><p>343 &div; 49 - 576 + 72 X 24 = 200</p></span>",

    "question_index": 14

    "question": "<span class=\"eqt\"><p>Three different positions of the same dice are shown, the six faces of which have numbers 1, 2, 3, 4, 5 and 6. Select the number that will be on the face opposite to the one having number '1'.</p><p><img width=295 height=167 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23069/image016.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2340;&#2368;&#2344; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2325;&#2375; &#2331;&#2361; &#2347;&#2354;&#2325;&#2379;&#2306; &#2346;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; 1, 2, 3, 4, 5 &#2324;&#2352; 6 &#2309;&#2306;&#2325;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404; &#2313;&#2360; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; '1' &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2310;&#2319;&#2327;&#2368;&#2404;</p><p><img width=\"295\" height=\"167\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23069/image016.png\"></p></span>",

      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",

    "solution": "<p>From the above given three different positions of the same dice, it can be concluded that,</p><p>&#183; Face having number '2' is not opposite to the face with numbers 1, 4, 3 and 6 because these numbers are adjacent to the face with number '2'.</p><p>So, the face having number '2' is opposite to the face having number '5'.</p><p>&#183; Face having number '6' is not opposite to the face with numbers 4, 5, 3 and 2 because these numbers are adjacent to the face with number '6'.</p><p>So, the face having number '6' is opposite to the face having number '1'.</p><p>Thus, the answer is option (b).</p>",

    "question": "<span class=\"eqt\"><p>144 is related to 24 following a certain logic. Following the same logic, 576 is related to 48. To which of the following is 361 related to, following the same logic?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2352;&#2381;&#2325; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; 144, 24 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2340;&#2352;&#2381;&#2325; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; 576, 48 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2340;&#2352;&#2381;&#2325; &#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; 361 &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">26</span><span class=\"hqt\" style=\"display:none\">26</span>",
      "<span class=\"eqt\">42</span><span class=\"hqt\" style=\"display:none\">42</span>",
      "<span class=\"eqt\">18</span><span class=\"hqt\" style=\"display:none\">18</span>",
      "<span class=\"eqt\">38</span><span class=\"hqt\" style=\"display:none\">38</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>144 is related to 24 following a certain logic. Following the same logic, 576 is related to 48.</p><p>Here, the pattern is:</p><p>24 &div; 2 = 12 and 12<sup>2</sup> = 144</p><p>48 &div; 2 = 24 and 24<sup>2</sup> = 576</p><p>Similarly,</p><p>&radic;361 = 19. So, 19*2 = 38.</p>",
    "question_index": 23
  },

    "question": "<span class=\"eqt\"><p>Select the correct combination of mathematical signs to sequentially replace the * signs and balance the given equation.</p><p>13 * 9 * 2 * 114 * 3 * 7</p></span><span class=\"hqt\" style=\"display:none\"><p>* &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2348;&#2342;&#2354;&#2344;&#2375; &#2324;&#2352; &#2342;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2361;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p>13 * 9 * 2 * 114 * 3 * 7</p></span>",
    "options": [
      "<span class=\"eqt\">+,  - , x, &div;, =</span><span class=\"hqt\" style=\"display:none\">+, - , x, &div;, =</span>",
      "<span class=\"eqt\">&div;, x, =,  - , +</span><span class=\"hqt\" style=\"display:none\">&div;, x, =, - , +</span>",
      "<span class=\"eqt\">=, +, x, &div;,  -</span><span class=\"hqt\" style=\"display:none\">=, +, x, &div;, -</span>",
      "<span class=\"eqt\">+, x, =, &div;,  -</span><span class=\"hqt\" style=\"display:none\">+, x, =, &div;, -</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option (a) If * signs are replaced by +,  - , x, &div;, = sequentially, then the equation will be: 13 + 9  -  2 x 114 &div; 3 = 7</p><p>13 + 9  -  2 x 114 &div; 3 = 7</p><p>13 + 9  -  2 x 38 = 7</p><p>13 + 9  -  76 = 7</p><p>22  -  76 = 7</p><p>-54 &#8800; 7</p><p>So, option (a) is invalid. </p><p>Option (b) If * signs are replaced by &div;, x, =,  - , + sequentially, then the equation will be: 13 &div; 9 x 2 = 114  -  3 + 7</p><p>13 &div; 9 x 2 = 114  -  3 + 7</p><p>1.44 x 2 = 114  -  3 + 7</p><p>2.88 = 121  -  3</p><p>2.88 &#8800; 118</p><p>So, option (b) is invalid. </p><p>Option (c) If * signs are replaced by =, +, x, &div;,  -  sequentially, then the equation will be: 13 = 9 + 2 x 114 &div; 3  -  7</p><p>13 = 9 + 2 x 114 &div; 3  -  7</p><p>13 = 9 + 2 x 38  -  7</p><p>13 = 9 + 76  -  7</p><p>13 = 85  -  7</p><p>13 &#8800; 78</p><p>So, option (c) is invalid. </p><p>Option (d) If * signs are replaced by +, x, =, &div;,  -  sequentially, then the equation will be: 13 + 9 x 2 = 114 &div; 3  -  7</p><p>13 + 9 x 2 = 114 &div; 3  -  7</p><p>13 + 18 = 38  -  7</p><p>31 = 31</p><p>So, option (d) is valid. </p>",
    "question_index": 24
  },
  {
    "question": "<span class=\"eqt\"><p>The term Scrum is associated with which of the following sports?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2325;&#2381;&#2352;&#2350; &#2358;&#2348;&#2381;&#2342; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2326;&#2375;&#2354; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Soccer</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2369;&#2335;&#2348;&#2377;&#2354; (&#2360;&#2377;&#2325;&#2352;)</span>",
      "<span class=\"eqt\">Basketball</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2360;&#2381;&#2325;&#2375;&#2335;&#2348;&#2377;&#2354;</span>",
      "<span class=\"eqt\">Rugby</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2327;&#2381;&#2348;&#2368;</span>",
      "<span class=\"eqt\">Golf</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2354;&#2381;&#2347;&#2364;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Some important terms used in Rugby are -</p><p>Scrum: A method of restarting play, where players pack together and contest for the ball.</p><p>Ruck: A phase of play where one or more players from each team, who are on their feet, close around the ball on the ground.</p><p>Maul: Similar to a ruck, but with the ball carrier and at least one defender from each team on their feet and in contact, forming a rolling contest for possession.</p>",
    "question_index": 25
  },

    "question": "<span class=\"eqt\"><p>What is the minimum age for a candidate to be elected as the President of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2330;&#2351;&#2344;&#2367;&#2340; &#2325;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352; &#2325;&#2368; &#2344;&#2381;&#2351;&#2370;&#2344;&#2340;&#2350; &#2310;&#2351;&#2369; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">30 years</span><span class=\"hqt\" style=\"display:none\">30 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">25 years</span><span class=\"hqt\" style=\"display:none\">25 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">35 years</span><span class=\"hqt\" style=\"display:none\">35 &#2357;&#2352;&#2381;&#2359;</span>",
      "<span class=\"eqt\">40 years</span><span class=\"hqt\" style=\"display:none\">40 &#2357;&#2352;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>According to Article 58(1)(b) of the Constitution of India, one of the qualifications for election as President is that the candidate must have completed the age of thirty-five years.</p><p>Explanation of Other Options:</p><p> 30 years: Minimum age for membership of the Rajya Sabha (Council of States).</p><p> 25 years: Minimum age for membership of the Lok Sabha (House of the People) and State Legislative Assemblies.</p><p> 40 years: Not a specified minimum age for any major constitutional office in this context.</p><p>Further insights:</p><p> Other qualifications for the office of President include being a citizen of India and being qualified for election as a member of the Lok Sabha.</p><p> The President must not hold any office of profit under the Government of India or any State government.</p>",
    "question_index": 26
  },
  {
    "question": "<span class=\"eqt\"><p>Who was the Governors-General of India during the abolition of Sati in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2340;&#2368; &#2346;&#2381;&#2352;&#2341;&#2366; &#2325;&#2375; &#2313;&#2344;&#2381;&#2350;&#2370;&#2354;&#2344; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352;-&#2332;&#2344;&#2352;&#2354; &#2325;&#2380;&#2344; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lord Canning</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2376;&#2344;&#2367;&#2306;&#2327;</span>",
      "<span class=\"eqt\">Lord Curzon</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2352;&#2381;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Lord William Bentinck</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2357;&#2367;&#2354;&#2367;&#2351;&#2350; &#2348;&#2375;&#2306;&#2335;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Lord Dalhousie</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2377;&#2352;&#2381;&#2337; &#2337;&#2354;&#2361;&#2380;&#2332;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The practice of Sati (widow burning) was formally abolished in British India by the Bengal Sati Regulation, 1829 (Regulation XVII). This was enacted during the tenure of Lord William Bentinck, who served as the Governor-General of Bengal from 1828 to 1833 and then as the first Governor-General of India from 1833 to 1835.</p><p>Explanation of Other Options:</p><p> Lord Canning: Governor-General and first Viceroy of India during the Indian Mutiny of 1857 and its aftermath (1856-1862).</p><p> Lord Curzon: Viceroy of India from 1899 to 1905, known for the Partition of Bengal.</p><p> Lord Dalhousie: Governor-General of India from 1848 to 1856, known for the Doctrine of Lapse and introduction of railways, telegraph, and postal system.</p><p>Further insights:</p><p> The abolition of Sati was a significant social reform measure, strongly advocated by Indian reformers like Raja Ram Mohan Roy.</p><p> Lord William Bentinck is also known for other social reforms, including the suppression of Thuggee.</p>",
    "question_index": 27
  },
  {
    "question": "<span class=\"eqt\"><p>MS Swaminathan is known as father of Green Revolution in India. Who is known as the father of Green Revolution in the world?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2319;&#2360; &#2360;&#2381;&#2357;&#2366;&#2350;&#2368;&#2344;&#2366;&#2341;&#2344; &#2325;&#2379; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2361;&#2352;&#2367;&#2340; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; &#2325;&#2375; &#2332;&#2344;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2367;&#2358;&#2381;&#2357; &#2350;&#2375;&#2306; &#2361;&#2352;&#2367;&#2340; &#2325;&#2381;&#2352;&#2366;&#2306;&#2340;&#2367; &#2325;&#2375; &#2332;&#2344;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2375; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Eduard Buchner</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2337;&#2357;&#2352;&#2381;&#2337; &#2348;&#2369;&#2330;&#2344;&#2352;</span>",
      "<span class=\"eqt\">Stephen Hales</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2335;&#2368;&#2347;&#2344; &#2361;&#2375;&#2354;&#2381;&#2360;</span>",
      "<span class=\"eqt\">N E Borlaugh</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2344; &#2312; &#2348;&#2379;&#2352;&#2354;&#2377;</span>",
      "<span class=\"eqt\">Robert Brown</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2377;&#2348;&#2352;&#2381;&#2335; &#2348;&#2381;&#2352;&#2366;&#2313;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Green Revolution - Great increase in production of food grains, especially Wheat and Rice. High yielding varieties of grains were used to get the maximum output. </p><p>Norman E Borlaugh is known as father of Green Revolution in the world and M S Swaminathan is known as father of Green Revolution in India.</p>",
    "question_index": 28
  },
  {
    "question": "<span class=\"eqt\"><p>The concept of \"Single Citizenship\" in the Indian Constitution was borrowed from which country's constitution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; \"&#2319;&#2325;&#2354; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2340;&#2366;\" &#2325;&#2368; &#2309;&#2357;&#2343;&#2366;&#2352;&#2339;&#2366; &#2325;&#2367;&#2360; &#2342;&#2375;&#2358; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Canada</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2344;&#2366;&#2337;&#2366;</span>",
      "<span class=\"eqt\">UK</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2325;&#2375;</span>",
      "<span class=\"eqt\">USA</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2370;&#2319;&#2360;&#2319;</span>",
      "<span class=\"eqt\">Australia</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2360;&#2381;&#2335;&#2381;&#2352;&#2375;&#2354;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The concept of \"Single Citizenship\" was borrowed from the United Kingdom's constitutional system.</p><p>&bull; Unlike the dual citizenship system in federal countries like the USA, India has a single citizenship for all its citizens.</p><p>&bull; This concept promotes national unity and integrity by treating all citizens equally, irrespective of their state of residence.</p><p>&bull; The Indian Constitution does not provide for state citizenship, unlike some federal countries.</p><p>&bull; Single citizenship ensures uniformity in the rights and duties of citizens across the country.</p><p><b>Additional details:</b></p><p>&bull; The idea of the Federal system and the protection of human rights are inspired from Canada.</p><p>&bull; We got Fundamental Rights, Judicial Review, Post of President, Vice President etc. from the U.S.</p><p>&bull; We took Freedom of trade, commerce and intercourse, Joint sitting of two houses of Parliament, Cooperative Federalism, Centre-State relation, Concurrent list from Australia.</p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following dance is associated with eastern India:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2344;&#2371;&#2340;&#2381;&#2351; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2349;&#2366;&#2352;&#2340; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mohiniyattam</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2361;&#2367;&#2344;&#2368;&#2309;&#2335;&#2381;&#2335;&#2350;</span>",
      "<span class=\"eqt\">Garba</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2352;&#2348;&#2366;</span>",

      "<span class=\"eqt\">Chhau</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2314;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Chhau</b> is a semi-classical Indian dance with martial, tribal, and folk origins, found in Eastern India. There are three main styles: Seraikella Chhau (Jharkhand), Mayurbhanj Chhau (Odisha), and Purulia Chhau (West Bengal).</p><p>Other options:</p><p>Mohiniyattam: A classical dance form from Kerala (South India).</p><p>Garba: A folk dance form from Gujarat (Western India), performed especially during Navaratri.</p><p>Lavani: A traditional folk dance form from Maharashtra (Western India), known for its powerful rhythm and erotic sentiment.</p>",

    "options": [

    "question": "<span class=\"eqt\"><p>The 'Bendur' or 'Pola' festival celebrated in Maharashtra is dedicated to which animals?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; '&#2348;&#2375;&#2306;&#2342;&#2370;&#2352;' &#2351;&#2366; '&#2346;&#2379;&#2354;&#2366;' &#2340;&#2381;&#2351;&#2380;&#2361;&#2366;&#2352; &#2325;&#2367;&#2360; &#2332;&#2366;&#2344;&#2357;&#2352; &#2325;&#2379; &#2360;&#2350;&#2352;&#2381;&#2346;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Elephants</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2341;&#2367;&#2351;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Cows</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2351;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Bulls</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2354;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Camels</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2306;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The 'Bendur' or 'Pola' festival, celebrated predominantly by farmers in Maharashtra (and also in parts of Chhattisgarh, Madhya Pradesh, and Telangana), is dedicated to Bulls (and oxen). This festival acknowledges the crucial role of bullocks in agriculture and expresses gratitude towards them for their hard work in ploughing fields and other farming activities.</p><p>Explanation of Other Options:</p><p> Elephants: While elephants are revered in some Indian traditions and festivals (e.g., Thrissur Pooram in Kerala), Bendur/Pola is not dedicated to them.</p><p> Cows: Cows are considered sacred in Hinduism and are worshipped, especially during festivals like Gopashtami, but Bendur/Pola specifically focuses on bulls and oxen used in agriculture.</p><p> Camels: Camels are important in desert regions like Rajasthan and are featured in festivals like the Pushkar Camel Fair, but not in Bendur/Pola.</p><p>Further insights:</p><p> Pola is typically celebrated on the new moon day (Amavasya) of the Shravana month (or Bhadrapada month in some regions) of the Hindu calendar.</p><p> On this day, bulls are given a rest from work, bathed, decorated with ornaments and colorful shawls, and offered special food.</p><p> Processions of decorated bulls are often taken out, and various rituals are performed to honor them.</p><p> The festival highlights the deep connection between farmers and their cattle, recognizing their contribution to agricultural livelihoods.</p>",
    "question_index": 32
  },

    "question": "<span class=\"eqt\"><p>As of 20th December 2023, approximately 28.45 Crore Ayushman Cards have been created since the inception of the AB PM-JAY scheme, out of which, approximately 9.38 crore Ayushman Cards have been created during the current year 2023 (Jan -Dec 2023). What is the full form of AB PM-JAY?</p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>20 &#2342;&#2367;&#2360;&#2306;&#2348;&#2352; 2023 &#2340;&#2325; AB PM-JAY &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2360;&#2375; &#2354;&#2375;&#2325;&#2352; &#2309;&#2348; &#2340;&#2325; &#2354;&#2327;&#2349;&#2327; 28.45 &#2325;&#2352;&#2379;&#2337;&#2364; &#2310;&#2351;&#2369;&#2359;&#2381;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2337; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366; &#2330;&#2369;&#2325;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2354;&#2327;&#2349;&#2327; 9.38 &#2325;&#2352;&#2379;&#2337;&#2364; &#2310;&#2351;&#2369;&#2359;&#2381;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2337; &#2330;&#2366;&#2354;&#2370; &#2357;&#2352;&#2381;&#2359; 2023 (&#2332;&#2344;&#2357;&#2352;&#2368;-&#2342;&#2367;&#2360;&#2306;&#2348;&#2352; 2023) &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2348;&#2344;&#2366;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; AB PM-JAY &#2325;&#2366; &#2346;&#2370;&#2352;&#2366; &#2344;&#2366;&#2350; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ayushman Bharat - Pradhan Mantri Jeevan Aadhar Yojana</span><span class=\"hqt\" style=\"display:none\">Ayushman Bharat - Pradhan Mantri Jeevan Aadhar Yojana</span>",
      "<span class=\"eqt\">Ayushman Bharat - Pradhan Mantri Jana Aushadhi Yojana</span><span class=\"hqt\" style=\"display:none\">Ayushman Bharat - Pradhan Mantri Jana Aushadhi Yojana</span>",
      "<span class=\"eqt\">Ayushman Bharat - Pradhan Mantri Jan Arogya Yojana</span><span class=\"hqt\" style=\"display:none\">Ayushman Bharat - Pradhan Mantri Jan Arogya Yojana</span>",
      "<span class=\"eqt\">Ayushman Bharat - Pradhan Mantri Jal Arogya Yojana</span><span class=\"hqt\" style=\"display:none\">Ayushman Bharat - Pradhan Mantri Jal Arogya Yojana</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Ayushman Bharat Pradhan Mantri - Jan Arogya Yojana (AB PM-JAY) is the largest publicly funded health assurance scheme in the world which provides health cover of Rs. 5 lakhs per family per year for secondary and tertiary care hospitalization.</p><p>Currently(December 2023), 55 Crore individuals corresponding to 12 Crore families are covered under the scheme. Many States/UTs implementing AB PM-JAY have further expanded the beneficiary base, at their own cost.</p><p>As of 20th December 2023, approximately 28.45 Crore Ayushman Cards have been created since the inception of the scheme, out of which, approximately 9.38 crore Ayushman Cards have been created during the current year 2023 (Jan -Dec 2023).</p><p>A total of 6.11 crore hospital admissions amounting to Rs. 78,188 crores have been authorized under the scheme, of which 1.7 crore hospitals admissions worth over Rs. 25,000 crores have been authorized during the year 2023 (Jan-Dec 2023).</p><p>A total of 26,901 hospitals including 11,813 private hospitals have been empanelled under AB PM-JAY to provide healthcare services to scheme beneficiaries.</p><p>AB PM-JAY has ensured gender equity in access to healthcare services.</p><p>Women account for approximately 49% of the total Ayushman cards created and approximately 48% of total authorized hospital admissions.</p><p>Ayushman Bhava initiative was launched by MoHFW for ensuring the saturation of various healthcare schemes at the village level, ultimately reaching the last mile beneficiaries. It was launched by Honble President Smt. Droupadi Murmu on 13th September 2023.</p><p>This initiative encompasses a series of interventions, including 'Aapke Dwar Ayushman 3.0', 'Ayushman Sabhas', 'Ayushman Melas', and the ultimate goal of elevating villages to the status of 'Ayushman Gram'.</p><p>NHA launched 'Aapke Dwar Ayushman' (ADA 3.0) campaign on 17th September 2023 as part of Ayushman Bhava campaign.</p>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following was the Prime Minister of India, without being Chief Minister of any state?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2325;&#2367;&#2360;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2361;&#2369;&#2319; &#2348;&#2367;&#2344;&#2366; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">VP Singh</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2368;&#2346;&#2368; &#2360;&#2367;&#2306;&#2361;</span>",
      "<span class=\"eqt\">IK Gujral</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2312;&#2325;&#2375; &#2327;&#2369;&#2332;&#2352;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Morarji Desai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2352;&#2366;&#2352;&#2332;&#2368; &#2342;&#2375;&#2360;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Charan Singh</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2352;&#2339; &#2360;&#2367;&#2306;&#2361;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let's examine the political careers of the individuals listed:</p><p>- VP Singh: Served as the Chief Minister of Uttar Pradesh (1980-1982) before becoming Prime Minister of India (1989-1990).</p><p>- <b>IK Gujral (Inder Kumar Gujral)</b>: Served as the Prime Minister of India (1997-1998). He held various ministerial positions at the Union level, including Minister of External Affairs, but he was never a Chief Minister of any state.</p><p>- Morarji Desai: Served as the Chief Minister of Bombay State (1952-1956) before becoming Prime Minister of India (1977-1979).</p><p>- Charan Singh (Chaudhary Charan Singh): Served as the Chief Minister of Uttar Pradesh (twice, 1967-1968 and 1970) before becoming Prime Minister of India (1979-1980).</p><p>Therefore, IK Gujral was a Prime Minister of India who had not previously served as a Chief Minister of any state.</p><p>Further insights:</p><p> Other Prime Ministers who were not Chief Ministers include Jawaharlal Nehru, Lal Bahadur Shastri, Indira Gandhi, Rajiv Gandhi, Chandra Shekhar, and Atal Bihari Vajpayee (though Vajpayee was a Member of Parliament representing Lucknow, Uttar Pradesh, for a long time, he was never CM). Dr. Manmohan Singh was also not a CM.</p>",
    "question_index": 34
  },

    "question": "<span class=\"eqt\"><p>Air transport in India made its beginning in 1911 with an airmail operation between:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2361;&#2357;&#2366;&#2312; &#2346;&#2352;&#2367;&#2357;&#2361;&#2344; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; 1911 &#2350;&#2375;&#2306; &#2361;&#2357;&#2366;&#2312; &#2337;&#2366;&#2325; &#2346;&#2352;&#2367;&#2330;&#2366;&#2354;&#2344; &#2360;&#2375; &#2361;&#2369;&#2312;:</p></span>",
    "options": [
      "<span class=\"eqt\">Delhi and Mumbai</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2354;&#2381;&#2354;&#2368; &#2324;&#2352; &#2350;&#2369;&#2306;&#2348;&#2312;</span>",
      "<span class=\"eqt\">Kolkata and Delhi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2354;&#2325;&#2366;&#2340;&#2366; &#2324;&#2352; &#2342;&#2367;&#2354;&#2381;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Allahabad and Naini</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342; &#2324;&#2352; &#2344;&#2376;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Chennai and Bengaluru</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2375;&#2344;&#2381;&#2344;&#2312; &#2324;&#2352; &#2348;&#2375;&#2306;&#2327;&#2354;&#2369;&#2352;&#2369;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The beginning of civil aviation and air transport in India is marked by the first airmail service, which took place on February 18, 1911. This historic flight operated between Allahabad and Naini (a short distance across the Yamuna river, about 10 kilometers or 6 miles). French pilot Henri Pequet flew a Humber biplane carrying about 6,500 letters.</p><p>Explanation of Other Options:</p><p>The other routes listed became important later in the development of Indian aviation but were not the site of the very first airmail operation in 1911.</p><p>Further insights:</p><p> This event is considered the world's first official airmail service.</p><p> It was part of the United Provinces Exhibition, and the mail was destined for delivery across India and abroad.</p><p> This pioneering flight paved the way for the development of commercial air services in India in the subsequent decades.</p><p></p>",
    "question_index": 35
  },
  {
    "question": "<span class=\"eqt\"><p>Which among the following compound is an acid?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2351;&#2380;&#2327;&#2367;&#2325; &#2319;&#2325; &#2309;&#2350;&#2381;&#2354; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">HCl gas</span><span class=\"hqt\" style=\"display:none\">HCl &#2327;&#2376;&#2360;</span>",
      "<span class=\"eqt\">HCl solution</span><span class=\"hqt\" style=\"display:none\">HCl &#2357;&#2367;&#2354;&#2351;&#2344;</span>",
      "<span class=\"eqt\">NH4OH solution</span><span class=\"hqt\" style=\"display:none\">NH4OH &#2357;&#2367;&#2354;&#2351;&#2344;</span>",
      "<span class=\"eqt\">NH3 gas</span><span class=\"hqt\" style=\"display:none\">NH3 &#2327;&#2376;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to the Arrhenius theory, an acid is a substance that ionizes in water to produce hydrogen ions (H&#8314;) or hydronium ions (H&#8323;O&#8314;).</p><p>- HCl gas: Hydrogen chloride (HCl) in its gaseous state is a covalent molecule. It does not exhibit acidic properties until it is dissolved in water or another suitable solvent.</p><p>- HCl solution (Hydrochloric acid): When gaseous HCl is dissolved in water, it ionizes to form H&#8314; (or H&#8323;O&#8314;) and Cl&#8315; ions. This aqueous solution of HCl is known as hydrochloric acid and is a strong acid.</p><p>- NH&#8324;OH solution (Ammonium hydroxide): Ammonium hydroxide is formed when ammonia (NH&#8323;) dissolves in water. It is a weak base because it partially ionizes to produce hydroxide ions (OH&#8315;).</p><p>- NH&#8323; gas (Ammonia): Ammonia gas itself is a weak base (according to Brnsted-Lowry and Lewis theories, it can accept a proton or donate an electron pair). When dissolved in water, it forms ammonium hydroxide.</p><p>Therefore, HCl solution is an acid.</p>",
    "question_index": 36
  },
  {
    "question": "<span class=\"eqt\"><p>According to the<i> </i>Ashtapradhan of the Maratha empire, which of the following designation is related to 'Sari-i-Naubat'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2352;&#2366;&#2336;&#2366; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2309;&#2359;&#2381;&#2335;&#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2342; '&#2360;&#2352; - &#2319; - &#2344;&#2380;&#2348;&#2340;' (Sari-i-Naubat) &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Finance minister</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2340;&#2381;&#2340; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Member of Religious matters</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2325;&#2375; &#2360;&#2342;&#2360;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Commander in Chief</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2325;&#2350;&#2366;&#2306;&#2337;&#2352;</span>",
      "<span class=\"eqt\">Tax Collector</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352; &#2360;&#2306;&#2327;&#2381;&#2352;&#2366;&#2361;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Ashta Pradhan</b>, ( \"Council of Eight\"):- Administrative and advisory council set up by the Indian Hindu Maratha leader Shivaji (died 1680), which contributed to his successful military attacks on the Muslim Mughal Empire and to the good government of the territory over which he established his rule.</p><p>The council's senior member, the <i>peshwa</i>, or mukhya pradhan, was in charge of general administration and held the state seal. The amatya, or mazumdar, and the pant sachir dealt with finance, the sumanta with foreign affairs, and the mantri or <i>wanqenavis</i> with intelligence and police reports.</p><p>The <b>commander in chief</b> (senapati or Sari-i-Naubat-) together with a legal member (nyayadhisha) and a member for religious matters (pandit rao) completed the council. All except the last two held military commands, their civil duties often being performed by deputies. These deputies, along with a staff of secretaries, formed the nucleus of the peshwa's bureaucracy.</p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following river doesn't flow through the state of Arunachal Pradesh?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2344;&#2342;&#2368; &#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2375; &#2361;&#2379;&#2325;&#2352; &#2344;&#2361;&#2368;&#2306; &#2348;&#2361;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Barak</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2352;&#2366;&#2325;</span>",
      "<span class=\"eqt\">Lohit</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2361;&#2367;&#2340;</span>",
      "<span class=\"eqt\">Subansiri</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2348;&#2344;&#2360;&#2367;&#2352;&#2368;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Barak river</b> rises in the Manipur Hills in northern Manipur state, India and flows west and then southwest into Mizoram state. There it veers north into Assam state and flows west past the town of Silchar.</p><p>Rivers that flow through the state of Arunachal Pradesh: The Kameng, the Subansiri, the Siang, the Lohit and the Tirap.</p><p>Further insights:</p><p>Lohit River: The Lohit River is a major tributary of the Brahmaputra River. It originates in Tibet, enters India in Arunachal Pradesh, and flows through it before joining the Brahmaputra in Assam. (Flows through Arunachal Pradesh)</p><p>Subansiri River: The Subansiri River is another major tributary of the Brahmaputra. It also originates in Tibet, enters India in Arunachal Pradesh, and flows through it before joining the Brahmaputra in Assam. (Flows through Arunachal Pradesh)</p>",
    "question_index": 38
  },
  {
    "question": "<span class=\"eqt\"><p>Which renowned Hindustani classical vocalist from Karnataka was posthumously awarded the Bharat Ratna in 2009?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325; &#2325;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2367;&#2306;&#2342;&#2369;&#2360;&#2381;&#2340;&#2366;&#2344;&#2368; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2327;&#2366;&#2351;&#2325; &#2325;&#2379; 2009 &#2350;&#2375;&#2306; &#2350;&#2352;&#2339;&#2379;&#2346;&#2352;&#2366;&#2306;&#2340; &#2349;&#2366;&#2352;&#2340; &#2352;&#2340;&#2381;&#2344; &#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Gangubai Hangal</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2327;&#2370;&#2348;&#2366;&#2312; &#2361;&#2306;&#2327;&#2354;</span>",
      "<span class=\"eqt\">Bhimsen Joshi</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2368;&#2350;&#2360;&#2375;&#2344; &#2332;&#2379;&#2358;&#2368;</span>",
      "<span class=\"eqt\">Mallikarjun Mansur</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2354;&#2381;&#2354;&#2367;&#2325;&#2366;&#2352;&#2381;&#2332;&#2369;&#2344; &#2350;&#2306;&#2360;&#2370;&#2352;</span>",
      "<span class=\"eqt\">Kumar Gandharva</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2350;&#2366;&#2352; &#2327;&#2306;&#2343;&#2352;&#2381;&#2357;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Bharat Ratna, India's highest civilian honor, was posthumously awarded to Bhimsen Joshi in 2009. He was a legendary Hindustani classical vocalist from Karnataka, renowned for his exceptional musical talent and contribution to Indian classical music.</p><p>Other awards won by him:</p><p>&#183; Padma Shri (1972)</p><p>&#183; Padma Bhushan (1985)</p><p>&#183; Sangeet Natak Akademi Fellowship (1998)</p><p>&#183; Padma Vibhushan (1999)</p><p>&#183; Maharashtra Bhushan (2002)</p><p>&#183; Karnataka Ratna (2005)</p><p>Further insights:</p><p>&#183; Gangubai Hangal was an Indian singer of the khayal genre of Hindustani classical music from Karnataka, who was known for her deep and powerful voice. Hangal belonged to the Kirana gharana. </p><p>o She was awarded the Padma Vibhushan, India's second highest civilian honour in 2002 and Sangeet Natak Akademi Fellowship, the highest award of Sangeet Natak Akademi, India's National Academy for Music and Performing Arts in 1996.</p><p>&#183; Pandit Mallikarjun Bheemaraayappa Mansur, was a Hindustani classical singer from Karnataka. He sang in the khyal genre and belonged to the Jaipur-Atrauli gharana.</p><p>o He received all three national Padma Awards: Padma Shri in 1970, Padma Bhushan in 1976 and Padma Vibhushan in 1992.</p><p>o In 1982, he was awarded the Sangeet Natak Akademi Fellowship. </p><p>o Kalidas Samman Award by the Government of Madhya Pradesh</p><p>&#183; Pandit Kumar Gandharva originally known as Shivaputra Siddharamayya Komkalimath was an Indian classical singer, well known for his unique vocal style and for his refusal to be bound by the tradition of any gharana. </p><p>o The name, Kumar Gandharva, is a title given to him when he was a child prodigy; a Gandharva is a musical spirit in Hindu mythology.</p><p>o Gandharva was awarded the Padma Bhushan in 1977 and India's second-highest civilian honour, the Padma Vibhushan in 1990.</p>",
    "question_index": 39
  },

    "question": "<span class=\"eqt\"><p>Two-chambered heart is found in:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379;-&#2325;&#2325;&#2381;&#2359;&#2368;&#2351; &#2361;&#2371;&#2342;&#2351; &#2346;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Crocodiles</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2327;&#2352;&#2350;&#2330;&#2381;&#2331;</span>",
      "<span class=\"eqt\">Birds</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2325;&#2381;&#2359;&#2368;</span>",
      "<span class=\"eqt\">Fishes</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2340;&#2381;&#2360;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Reptiles</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2368;&#2360;&#2371;&#2346;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Fishes have a two-chambered heart, consisting of one atrium (auricle) and one ventricle. This type of heart pumps deoxygenated blood to the gills for oxygenation, and then the oxygenated blood is circulated to the rest of the body directly from the gills (single circulation).</p><p>Explanation of Other Options:</p><p> Crocodiles: Crocodiles, though reptiles, are unique in having a nearly completely four-chambered heart (two atria and two ventricles with a small opening, the Foramen of Panizza, connecting the two aortic arches).</p><p> Birds: Birds have a fully four-chambered heart (two atria and two ventricles), similar to mammals, which allows for complete separation of oxygenated and deoxygenated blood and efficient double circulation.</p><p> Reptiles (excluding crocodiles): Most other reptiles (like lizards, snakes, turtles) have a three-chambered heart, consisting of two atria and one partially divided ventricle. This results in some mixing of oxygenated and deoxygenated blood.</p><p>Further insights:</p><p> The number of heart chambers reflects the evolutionary development and metabolic needs of different animal groups.</p><p> Two-chambered heart (Fishes): Single circulation.</p><p> Three-chambered heart (Amphibians, most Reptiles): Incomplete double circulation.</p><p> Four-chambered heart (Birds, Mammals, Crocodiles): Complete double circulation, which is more efficient for supporting higher metabolic rates.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following laws states that the mass of reactants in a chemical reaction is always equal to the mass of products? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2344;&#2367;&#2351;&#2350; &#2348;&#2340;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2309;&#2349;&#2367;&#2325;&#2366;&#2352;&#2325;&#2379;&#2306; &#2325;&#2366; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2361;&#2350;&#2375;&#2358;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2379;&#2306; &#2325;&#2375; &#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Law of Definite Proportions</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Law of Conservation of Mass</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2352;&#2357;&#2381;&#2351;&#2350;&#2366;&#2344; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Law of Multiple Proportions</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2339;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Gay-Lussac's Law</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2375;-&#2354;&#2369;&#2360;&#2366;&#2325; &#2325;&#2366; &#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Law of Conservation of Mass states that mass is neither created nor destroyed in a chemical reaction.</p><p>This law states that in a chemical reaction, the total mass of the reactants is always equal to the total mass of the products, meaning mass is neither created nor destroyed in a chemical reaction.</p><p>Further information:</p><p>&#183; <b>Gay-Lussac's Law</b>  -  This law applies to gases and states that the volumes of gases involved in a chemical reaction, when measured at the same temperature and pressure, are in simple whole number ratios. </p>",
    "question_index": 41
  },

    "question": "<span class=\"eqt\"><p>Ustad Rashid Khan, who received the Padma Shri Award 2006 , belongs to which Gharana?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360;&#2381;&#2340;&#2366;&#2342; &#2352;&#2366;&#2358;&#2367;&#2342; &#2326;&#2366;&#2344;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; 2006 &#2350;&#2375;&#2306; &#2346;&#2342;&#2381;&#2350; &#2358;&#2381;&#2352;&#2368; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2350;&#2367;&#2354;&#2366;, &#2325;&#2367;&#2360; &#2328;&#2352;&#2366;&#2344;&#2375; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;?</p></span>",
    "options": [

      "<span class=\"eqt\">Jaipur-Atrauli</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2351;&#2346;&#2369;&#2352;-&#2309;&#2340;&#2352;&#2380;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Rampur-Sahaswan</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2350;&#2346;&#2369;&#2352;-&#2360;&#2361;&#2360;&#2357;&#2366;&#2344;</span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>Ustad Rashid Khan (1 July 1968  -  9 January 2024) was an Indian classical musician in the Hindustani tradition. </p><p>He belonged to the Rampur-Sahaswan gharana and was the great-grandson of gharana founder Inayat Hussain Khan.</p><p>He was awarded the Padma Shri, as well as the Sangeet Natak Akademi Award in 2006. He was awarded the Padma Bhushan, India's third highest civilian award, in 2022 by the Indian Government in the field of Art.</p>",

    "question": "<span class=\"eqt\"><p>Which article of the Indian Constitution guarantees protection of the rights of minorities related to educational institutions?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2358;&#2376;&#2325;&#2381;&#2359;&#2339;&#2367;&#2325; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2354;&#2381;&#2346;&#2360;&#2306;&#2326;&#2381;&#2351;&#2325;&#2379;&#2306; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2368; &#2327;&#2366;&#2352;&#2306;&#2335;&#2368; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 29</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 29</span>",
      "<span class=\"eqt\">Article 30</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 30</span>",
      "<span class=\"eqt\">Article 31</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 31</span>",
      "<span class=\"eqt\">Article 32</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 32</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Article 30 of the Indian Constitution specifically deals with the \"Right of minorities to establish and administer educational institutions.\"</p><p>Article 30(1) states: \"All minorities, whether based on religion or language, shall have the right to establish and administer educational institutions of their choice.\"</p><p>Article 30(2) states: \"The State shall not, in granting aid to educational institutions, discriminate against any educational institution on the ground that it is under the management of a minority, whether based on religion or language.\"</p><p>Explanation of Other Options:</p><p> Article 29: Deals with the \"Protection of interests of minorities.\"</p><p>* Article 29(1) guarantees any section of citizens having a distinct language, script, or culture the right to conserve the same.</p><p>* Article 29(2) states that no citizen shall be denied admission into any educational institution maintained by the State or receiving aid out of State funds on grounds only of religion, race, caste, language, or any of them. While related to education, Article 30 is more specific to the rights of minorities to establish and administer their own institutions.</p><p> Article 31: Originally dealt with the Right to Property, but it was repealed by the 44th Amendment Act, 1978, and is no longer a Fundamental Right (now a legal right under Article 300A).</p><p> Article 32: Deals with the \"Right to Constitutional Remedies,\" empowering citizens to move the Supreme Court for the enforcement of Fundamental Rights.</p>",
    "question_index": 43
  },

    "question": "<span class=\"eqt\"><p>Match the following types of deficits with their descriptions:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column 1</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Column 2</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. Revenue Deficit</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. Difference between total expenditure and total receipts excluding borrowings</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. Fiscal Deficit</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. Excess of revenue expenditure over revenue receipts</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. Primary Deficit</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. Fiscal deficit minus interest payments</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. Budget Deficit</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">d. Shortfall in the total budget receipts compared to the total budget expenditures</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2328;&#2366;&#2335;&#2375; &#2325;&#2366; &#2313;&#2344;&#2325;&#2375; &#2357;&#2367;&#2357;&#2352;&#2339; &#2360;&#2375; &#2350;&#2367;&#2354;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2381;&#2340;&#2306;&#2349; 1</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>&#2360;&#2381;&#2340;&#2306;&#2349; 2</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i. &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2328;&#2366;&#2335;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">a. &#2325;&#2369;&#2354; &#2357;&#2381;&#2351;&#2351; &#2324;&#2352; &#2313;&#2343;&#2366;&#2352; &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352; &#2325;&#2369;&#2354; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2340;&#2352;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii. &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">b. &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; &#2325;&#2366; &#2310;&#2343;&#2367;&#2325;&#2381;&#2351;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii. &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2328;&#2366;&#2335;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">c. &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2366; &#2350;&#2366;&#2311;&#2344;&#2360; &#2348;&#2381;&#2351;&#2366;&#2332; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv. &#2348;&#2332;&#2335; &#2328;&#2366;&#2335;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2328;. &#2325;&#2369;&#2354; &#2348;&#2332;&#2335; &#2357;&#2381;&#2351;&#2351; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; &#2348;&#2332;&#2335; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;</td></tr></table></span>",
    "options": [
      "<span class=\"eqt\">i-b, ii-a, iii-c, iv-d</span><span class=\"hqt\" style=\"display:none\">i-b, ii-a, iii-c, iv-d</span>",
      "<span class=\"eqt\">i-d, ii-b, iii-a, iv-c</span><span class=\"hqt\" style=\"display:none\">i-d, ii-b, iii-a, iv-c</span>",
      "<span class=\"eqt\">i-a, ii-d, iii-b, iv-c</span><span class=\"hqt\" style=\"display:none\">i-a, ii-d, iii-b, iv-c</span>",
      "<span class=\"eqt\">i-c, ii-a, iii-d, iv-b</span><span class=\"hqt\" style=\"display:none\">i-c, ii-a, iii-d, iv-b</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; <b>Revenue Deficit </b>occurs when the government's revenue expenditure exceeds its revenue receipts, indicating a shortfall in the income generated from taxes and non-tax revenues.</p><p>&bull; <b>Fiscal Deficit </b>is the difference between the government's total expenditure (including capital and revenue expenditure) and total receipts (excluding borrowings). It reflects the overall gap the government needs to borrow.</p><p>&bull; <b>Primary Deficit </b>is derived from fiscal deficit after subtracting interest payments. It represents the government's deficit excluding the burden of interest payments on past loans.</p><p>&bull; <b>Budget Deficit</b> refers to when the total receipts of the government are less than the total expenditures, leading to an overall shortfall.</p>",
    "question_index": 45
  },

    "question": "<span class=\"eqt\"><p>In which of the following year the General Agreement for Tariffs and Trade (GATT) was formed?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2369;&#2354;&#2381;&#2325; &#2319;&#2357;&#2306; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2346;&#2352; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2360;&#2350;&#2333;&#2380;&#2340;&#2366; (GATT) &#2325;&#2366; &#2327;&#2336;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">1944</span><span class=\"hqt\" style=\"display:none\">1944</span>",
      "<span class=\"eqt\">1948</span><span class=\"hqt\" style=\"display:none\">1948</span>",
      "<span class=\"eqt\">1978</span><span class=\"hqt\" style=\"display:none\">1978</span>",
      "<span class=\"eqt\">1991</span><span class=\"hqt\" style=\"display:none\">1991</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The General Agreement on Tariffs and Trade (GATT) was signed by 23 countries in Geneva on October 30, 1947, and it came into effect on January 1, 1948.</p><p>Explanation of Other Options:</p><p> 1944: This year is associated with the Bretton Woods Conference, which led to the establishment of the International Monetary Fund (IMF) and the World Bank. An International Trade Organization (ITO) was also envisioned but never came into being; GATT was established as an interim agreement.</p><p> 1978: Various rounds of GATT negotiations occurred over the decades, but its formation was in 1947/1948.</p><p> 1991: This year is associated with major economic reforms in India, not the formation of GATT.</p><p>Further insights:</p><p> GATT was a multilateral agreement regulating international trade. Its main objective was to reduce barriers to international trade through the reduction of tariffs, quotas, and subsidies.</p><p> GATT provided the rules for much of world trade for 47 years and was the precursor to the World Trade Organization (WTO).</p><p> The WTO was established on January 1, 1995, as a result of the Uruguay Round of GATT negotiations, and it superseded GATT as the primary international organization dealing with the global rules of trade between nations.</p>",
    "question_index": 49
  },

    "question": "<span class=\"eqt\"><p>A dishonest merchant incurs a 17.5% loss on the cost price while selling rice. However, by using a false weight instead of the standard 1000 grams, he secures an overall profit of 10%. Find the actual weight used by the seller.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2375;&#2312;&#2350;&#2366;&#2344; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352;&#2368; &#2325;&#2379; &#2330;&#2366;&#2357;&#2354; &#2348;&#2375;&#2330;&#2340;&#2375; &#2360;&#2350;&#2351; &#2354;&#2366;&#2327;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 17.5% &#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; &#2361;&#2366;&#2354;&#2366;&#2305;&#2325;&#2367;, &#2350;&#2366;&#2344;&#2325; 1000 &#2327;&#2381;&#2352;&#2366;&#2350; &#2325;&#2375; &#2348;&#2332;&#2366;&#2351; &#2327;&#2354;&#2340; &#2357;&#2332;&#2344; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375;, &#2357;&#2361; 10% &#2325;&#2366; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2357;&#2332;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Eight years ago, Mahin was half as old as Nitu. If the respective ratio of their present ages is 3:5, then what will be the ratio of their ages four years later?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2336; &#2357;&#2352;&#2381;&#2359; &#2346;&#2361;&#2354;&#2375;, &#2350;&#2366;&#2361;&#2367;&#2344; &#2325;&#2368; &#2310;&#2351;&#2369; &#2344;&#2368;&#2340;&#2370; &#2325;&#2368; &#2310;&#2351;&#2369; &#2360;&#2375; &#2310;&#2343;&#2368; &#2341;&#2368;&#2404; &#2351;&#2342;&#2367; &#2313;&#2344;&#2325;&#2368; &#2357;&#2352;&#2381;&#2340;&#2350;&#2366;&#2344; &#2310;&#2351;&#2369; &#2325;&#2366; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3:5 &#2361;&#2376;, &#2340;&#2379; &#2330;&#2366;&#2352; &#2357;&#2352;&#2381;&#2359; &#2348;&#2366;&#2342; &#2313;&#2344;&#2325;&#2368; &#2310;&#2351;&#2369; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">7:11</span><span class=\"hqt\" style=\"display:none\">7:11</span>",
      "<span class=\"eqt\">2:3</span><span class=\"hqt\" style=\"display:none\">2:3</span>",
      "<span class=\"eqt\">8:13</span><span class=\"hqt\" style=\"display:none\">8:13</span>",
      "<span class=\"eqt\">5:12</span><span class=\"hqt\" style=\"display:none\">5:12</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the present ages of Mahin and Nitu be 3n and 5n respectively.</p><p>So, 3n - 8 = &frac12; * (5n - 8)</p><p>3n - 8 = 5n/2 - 4</p><p>n/2 = 4</p><p>n = 8</p><p>Hence, present ages of Mahin and Nitu are 24 and 40 respectively.</p><p>So, required ratio = (24 + 4):(40 + 4) = 7:11</p>",
    "question_index": 54
  },

    "question": "<span class=\"eqt\"><p>If (x + 1) and (x  -  2) are the factors of 4x<sup>2</sup> + Ax + B = 0, then:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (x + 1) &#2324;&#2352; (x - 2) 4x<sup>2</sup> + Ax + B = 0 &#2325;&#2375; &#2327;&#2369;&#2339;&#2344;&#2326;&#2306;&#2337; &#2361;&#2376;&#2306;, &#2340;&#2379;:</p></span>",

    "correct_option_id": 1,
    "solution": "<p>Given that (x + 1) and (x  -  2) are the factor of 4x<sup>2</sup> + Ax + B = 0.</p><p>(x + 1) = 0 or x = -1</p><p>And</p><p>(x  -  2) = 0 or x = 2</p><p>Put x = -1 in the expression: 4  -  A + B = 0</p><p>A  -  B = 4 ... (1)</p><p>Put x = 2 in the expression: 16 + 2A + B = 0</p><p>2A + B = -16 ... (2)</p><p>By solving equations (1) and (2),</p><p>A = -4 and B = -8</p><p>Therefore, B = 2A.</p>",

    "question": "<span class=\"eqt\"><p>If a 5-digit number 145ab is divisible by 3, 7 and 11, then find the value of (a<sup>2</sup> + b<sup>2</sup>  -  3ab)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; 5-&#2309;&#2306;&#2325;&#2368;&#2351; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 145ab, 3, 7 &#2324;&#2352; 11 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2376;, &#2340;&#2379; (a<sup>2</sup> + b<sup>2</sup> - 3ab) &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",

    "question": "<span class=\"eqt\"><p>A person travels 192 km of distance by car at the speed of 32 km/hr, 243 km of distance by bus at the speed of 27 km/hr, and 215 km of distance by train at the speed of 43 km/hr. Find the average speed for the total distance covered.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; 192 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 32 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375;, 243 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2348;&#2360; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 27 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2324;&#2352; 215 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2335;&#2381;&#2352;&#2375;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 43 km/hr &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2340;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2340;&#2351; &#2325;&#2368; &#2327;&#2312; &#2325;&#2369;&#2354; &#2342;&#2370;&#2352;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2324;&#2360;&#2340; &#2330;&#2366;&#2354; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Working together A and B would finish a task in 48 minutes. A alone would finish the task in 120 minutes. In How many minutes can B finish half of the task? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; A &#2324;&#2352; B &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 48 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2309;&#2325;&#2375;&#2354;&#2375; A, 120 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2340;&#2379;, B &#2310;&#2343;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">60</span><span class=\"hqt\" style=\"display:none\">60</span>",
      "<span class=\"eqt\">40</span><span class=\"hqt\" style=\"display:none\">40</span>",

    "correct_option_id": 2,
    "solution": "<p>Let, total work be 240 units (LCM of 48, 120).</p><p>then, A's 1 min work = 240/120 = 2 units</p><p>and (A+B)'s 1 min work = 240/48 = 5 units</p><p>B's 1 min work = 5-2 = 3 units</p><p>So, B will complete half the task in = 120/3 = 40 minutes</p>",

    "question": "<span class=\"eqt\"><p>The radius of a circle is R/2 cm. A chord KL in this circle subtends an angle on the circumference that is 90&deg;. Find the length of KL.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; R/2 cm &#2361;&#2376;&#2404; &#2311;&#2360; &#2357;&#2371;&#2340;&#2381;&#2340; &#2350;&#2375;&#2306; &#2319;&#2325; &#2332;&#2368;&#2357;&#2366; KL &#2346;&#2352;&#2367;&#2343;&#2367; &#2346;&#2352; 90&deg; &#2325;&#2366; &#2325;&#2379;&#2339; &#2348;&#2344;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; KL &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Pipe Q can fill the tank in 4 hours while pipe R can empty the tank in 10 hours. First pipe Q is opened for 3 hours then it was closed and after that pipe R is opened for 2 hours, then what part of the tank will be filled?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2366;&#2311;&#2346; Q &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 4 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2349;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2311;&#2346; R &#2335;&#2376;&#2306;&#2325; &#2325;&#2379; 10 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2326;&#2366;&#2354;&#2368; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2346;&#2361;&#2354;&#2375; &#2346;&#2366;&#2311;&#2346; Q &#2325;&#2379; 3 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2347;&#2367;&#2352; &#2313;&#2360;&#2375; &#2348;&#2306;&#2342; &#2325;&#2352; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2346;&#2366;&#2311;&#2346; R &#2325;&#2379; 2 &#2328;&#2306;&#2335;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2379;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2335;&#2376;&#2306;&#2325; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2349;&#2352; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
