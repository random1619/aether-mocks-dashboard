<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cgl1 - Responsive Exam Interface</title>
    <!-- Fonts & Icons -->

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">

    <meta name="exam-duration" content="60">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>62 persons are standing in a queue, the position of Suhana is 27<sup>th</sup> from the front side of the row. Eleven persons are standing between Suhana and Megha. Megha stand behind Suhana. How many persons are standing behind Megha?</p></span><span class=\"hqt\" style=\"display:none\"><p>62 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2319;&#2325; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2326;&#2337;&#2364;&#2375; &#2361;&#2376;&#2306;, &#2360;&#2369;&#2361;&#2366;&#2344;&#2366; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2310;&#2327;&#2375; &#2360;&#2375; 27&#2357;&#2366;&#2305; &#2361;&#2376;&#2404; &#2360;&#2369;&#2361;&#2366;&#2344;&#2366; &#2324;&#2352; &#2350;&#2375;&#2328;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2327;&#2381;&#2351;&#2366;&#2352;&#2361; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2326;&#2337;&#2364;&#2375; &#2361;&#2376;&#2306;&#2404; &#2350;&#2375;&#2328;&#2366;, &#2360;&#2369;&#2361;&#2366;&#2344;&#2366; &#2325;&#2375; &#2346;&#2368;&#2331;&#2375; &#2326;&#2337;&#2364;&#2368; &#2361;&#2376;&#2404; &#2350;&#2375;&#2328;&#2366; &#2325;&#2375; &#2346;&#2368;&#2331;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2326;&#2337;&#2364;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">31</span><span class=\"hqt\" style=\"display:none\">31</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">28</span><span class=\"hqt\" style=\"display:none\">28</span>",
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>62 persons are standing in a queue, the position of Suhana is 27<sup>th</sup> from the front side of the row. Eleven persons are standing between Suhana and Megha. Megha stand behind Suhana.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">26 persons</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Suhana</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">27<sup>th</sup> from the front side</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">11 persons</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Megha</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">'N'</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table><p>62 = 26 + 1 (Suhana) + 11 + 1 (Megha) + N</p><p>62 = 26 + 1 + 11 + 1 + N</p><p>62 = 39 + N</p><p>N = 23</p><p>23 persons are standing behind Megha.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>How many alphabet positions will not change if the letters in the word \"RAILWAY\" are placed from left to right in alphabetical order?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2358;&#2348;&#2381;&#2342; \"RAILWAY\" &#2325;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2379; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2366;&#2319;&#2305; &#2352;&#2326;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2344;&#2361;&#2368;&#2306; &#2348;&#2342;&#2354;&#2375;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>",
      "<span class=\"eqt\">More than four<b> </b></span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>A</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>L</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">W</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Y</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>A</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>I</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>L</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">W</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Y</b></td></tr></table><p>So, the position of the four letters will not change. </p><p>Thus, option (d) is the correct answer. </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Introducing his wife to a boy, Gukesh said, \"Her father is the husband of your mother's husband's mother-in-law.\" How is that boy related to Gukesh?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2325;&#2375;&#2358; &#2344;&#2375; &#2319;&#2325; &#2354;&#2337;&#2364;&#2325;&#2375; &#2360;&#2375; &#2309;&#2346;&#2344;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2325;&#2366; &#2346;&#2352;&#2367;&#2330;&#2351; &#2325;&#2352;&#2366;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2361;&#2366;, \"&#2313;&#2360;&#2325;&#2375; &#2346;&#2367;&#2340;&#2366; &#2340;&#2369;&#2350;&#2381;&#2361;&#2366;&#2352;&#2368; &#2350;&#2366;&#2340;&#2366; &#2325;&#2375; &#2346;&#2340;&#2367; &#2325;&#2368; &#2360;&#2366;&#2360; &#2325;&#2375; &#2346;&#2340;&#2367; &#2361;&#2376;&#2306;&#2404;\" &#2357;&#2361; &#2354;&#2337;&#2364;&#2325;&#2366; &#2327;&#2369;&#2325;&#2375;&#2358; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Brother</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Son</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Brother-in-law</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2342;&#2352;-&#2311;&#2344;-&#2354;&#2377;</span>",
      "<span class=\"eqt\">Grandson</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2340;&#2366;/&#2344;&#2366;&#2340;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Introducing his wife to a boy, Gukesh said, \"Her father is the husband of your mother's husband's mother-in-law.\"</p><p><img width=444 height=210 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26786/image014.png\"></p><p>That boy is the son of Gukesh.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>The second number in the given number-pairs is obtained by performing certain mathematical operation(s) on the first number. The same operation(s) is/are followed in all the number-pairs except one. Find that odd number-pair.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;-&#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2370;&#2360;&#2352;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2346;&#2361;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2346;&#2352; &#2325;&#2369;&#2331; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2352;&#2325;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2368; &#2327;&#2312; &#2361;&#2376;&#2404; &#2319;&#2325; &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352; &#2360;&#2349;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;-&#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2350;&#2366;&#2344; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2309;&#2346;&#2344;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2404; &#2357;&#2361; &#2309;&#2360;&#2306;&#2327;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;-&#2351;&#2369;&#2327;&#2381;&#2350; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">(13, 91)</span><span class=\"hqt\" style=\"display:none\">(13, 91)</span>",
      "<span class=\"eqt\">(25, 175)<b> </b></span><span class=\"hqt\" style=\"display:none\">(25, 175)<b> </b></span>",
      "<span class=\"eqt\">(17, 136)</span><span class=\"hqt\" style=\"display:none\">(17, 136)</span>",
      "<span class=\"eqt\">(22, 154)</span><span class=\"hqt\" style=\"display:none\">(22, 154)</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Option (a): 13, 13 x 7 = 91</p><p>Option (b): 25, 25 x 7 = 175</p><p>Option (c): 17, 17 x 7 = 119 NOT 136</p><p>Option (d): 22, 22 x 7 = 154</p><p>So, option (c) is the odd one.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>56 is related to 116 following a certain logic. Following the same logic, 189 is related to 382. To which of the following is 149 related to, following the same logic?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; 56, 116 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; 189, 382 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; 149 &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">302</span><span class=\"hqt\" style=\"display:none\">302</span>",
      "<span class=\"eqt\">298<b> </b></span><span class=\"hqt\" style=\"display:none\">298<b> </b></span>",
      "<span class=\"eqt\">306</span><span class=\"hqt\" style=\"display:none\">306</span>",
      "<span class=\"eqt\">294</span><span class=\"hqt\" style=\"display:none\">294</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>56 x 2 + 4 = 116</p><p>189 x 2 + 4 = 382</p><p>Similarly, </p><p>149 x 2 + 4 = 302</p><p>So, '149' is coded as '302'.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>Select the combination of letters that when sequentially placed in the blanks of the given series will complete the series.</p><p>e_w_s_em_h_k_mw_sk</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2375; &#2313;&#2360; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2375; &#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2326;&#2344;&#2375; &#2346;&#2352; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2375;&#2327;&#2366;&#2404;</p><p>e_w_s_em_h_k_mw_sk</p></span>",
    "options": [
      "<span class=\"eqt\">m, h, k, w, s, e, h</span><span class=\"hqt\" style=\"display:none\">m, h, k, w, s, e, h</span>",
      "<span class=\"eqt\">m, h, s, w, s, e, h</span><span class=\"hqt\" style=\"display:none\">m, h, s, w, s, e, h</span>",
      "<span class=\"eqt\">m, h, k, s, w, e, h</span><span class=\"hqt\" style=\"display:none\">m, h, k, s, w, e, h</span>",
      "<span class=\"eqt\">m, h, s, w, e, s, h</span><span class=\"hqt\" style=\"display:none\">m, h, s, w, e, s, h</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Firstly, divide the given series into 3 parts and in each part there are 6 letters. </p><p>Then the pattern will be as follows:</p><p>e<b>m</b>w<b>h</b>s<b>k</b>em<b>w</b>h<b>s</b>k<b>e</b>mw<b>h</b>sk</p><p>So, option (a) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>By interchanging the given two numbers which of the following equation will be correct?</p><p>2 and 16</p><p>I. 2  -  64 &div; 4 + 8 x 16 &div; 32 = 0.5</p><p>II. 8 x 16  -  27 + 5 &div; 2 = 19</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354;&#2344;&#2375; &#2346;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379;&#2327;&#2366;?</p><p>2 &#2324;&#2352; 16</p><p>I. 2 - 64 &div; 4 + 8 x 16 &div; 32 = 0.5</p><p>II. 8 x 16 - 27 + 5 &div; 2 = 19</p></span>",
    "options": [
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>If the numbers 2 and 16 are interchanged, then the equations will be:</p><p>Equation I: 16  -  64 &div; 4 + 8 x 2 &div; 32</p><p>= 16  -  16 + 0.5</p><p>= 16.5  -  16</p><p>= 0.5</p><p>So, equation I will be correct.</p><p>Equation II: 8 x 2  -  27 + 5 &div; 16</p><p>= 16  -  27 + 0.31</p><p>= 16.31  -  27</p><p>= -10.69</p><p>So, equation II will be incorrect.</p>",
    "question_index": 6

    "question": "<span class=\"eqt\"><p>The Nobel Prize in Physics ______ was awarded to Joseph John Thomson in recognition of the great merits of his theoretical and experimental investigations on the conduction of electricity by gases.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2380;&#2340;&#2367;&#2325;&#2368; &#2350;&#2375;&#2306; &#2344;&#2379;&#2348;&#2375;&#2354; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; ______ &#2350;&#2375;&#2306; &#2332;&#2379;&#2360;&#2375;&#2347; &#2332;&#2377;&#2344; &#2341;&#2377;&#2350;&#2360;&#2344; &#2325;&#2379; &#2327;&#2376;&#2360;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2367;&#2332;&#2354;&#2368; &#2325;&#2375; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2346;&#2352; &#2313;&#2344;&#2325;&#2368; &#2360;&#2376;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;&#2367;&#2325; &#2324;&#2352; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327;&#2366;&#2340;&#2381;&#2350;&#2325; &#2332;&#2366;&#2306;&#2330; &#2325;&#2375; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2350;&#2361;&#2340;&#2381;&#2357; &#2325;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1902</span><span class=\"hqt\" style=\"display:none\">1902</span>",
      "<span class=\"eqt\">1906</span><span class=\"hqt\" style=\"display:none\">1906</span>",
      "<span class=\"eqt\">1909</span><span class=\"hqt\" style=\"display:none\">1909</span>",
      "<span class=\"eqt\">1912</span><span class=\"hqt\" style=\"display:none\">1912</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Joseph John Thomson was a British physicist and Nobel Laureate in Physics, credited with the discovery of the electron, the first subatomic particle to be found. Thomson was awarded the <b>1906</b> Nobel Prize in Physics for his work on the conduction of electricity in gases.</p>",
    "question_index": 27

    "question": "<span class=\"eqt\"><p>Apple turns brown due to chemical reaction with _____in air.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2366;&#2351;&#2369; &#2350;&#2375;&#2306; _____ &#2325;&#2375; &#2360;&#2366;&#2341; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2360;&#2375;&#2348; &#2349;&#2370;&#2352;&#2366; &#2352;&#2306;&#2327; &#2325;&#2366; &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">oxygen</span><span class=\"hqt\" style=\"display:none\">&#2321;&#2325;&#2381;&#2360;&#2368;&#2332;&#2344;</span>",
      "<span class=\"eqt\">carbon dioxide</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2352;&#2381;&#2348;&#2344; &#2337;&#2366;&#2312;&#2321;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337;</span>",
      "<span class=\"eqt\">nitrogen</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344;</span>",
      "<span class=\"eqt\">argon</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2327;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Apples and some fruits turn brown due to chemical reaction with <b>oxygen</b> in air. This chemical reaction is called browning.</p><p>The cells of apples, fruits and other vegetables contain an enzyme called polyphenol oxidase or tyrosinase.</p><p>When in contact with oxygen it catalyses a biochemical reaction in which the phenolic compounds present in plants become a brown pigment known as melanins.</p>",
    "question_index": 28
  },

    "question": "<span class=\"eqt\"><p>If we have to pay Rs.80 for $1 then the forex rate is ________</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2361;&#2350;&#2375;&#2306; $1 &#2325;&#2375; &#2354;&#2367;&#2319; &#2352;&#2369;.80 &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2344;&#2366; &#2346;&#2396;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2342;&#2352; ________ &#2361;&#2376;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">Rs 100 per dollar.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;. 100 &#2346;&#2381;&#2352;&#2340;&#2367; &#2337;&#2377;&#2354;&#2352;</span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>Foreign Exchange Rate (also called Forex Rate) is the price of one currency in terms of another. It links the currencies of different countries and enables comparison of international costs and prices. For example, if we have to pay Rs 80 for $1 then the exchange rate is Rs 80 per dollar.</p>",

  },

    "question": "<span class=\"eqt\"><p>___________ is defined as the number of vibrations completed by a particle in one second.</p></span><span class=\"hqt\" style=\"display:none\"><p>___________ &#2325;&#2379; &#2319;&#2325; &#2325;&#2339; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2381;&#2339; &#2325;&#2367;&#2319; &#2327;&#2319; &#2325;&#2306;&#2346;&#2344; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Amplitude</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2366;&#2350;</span>",
      "<span class=\"eqt\">Resonance</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2344;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Frequency</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2357;&#2371;&#2340;&#2381;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Quanta</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2357;&#2366;&#2306;&#2335;&#2350;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>In Physics, <b>Frequency </b>of a wave is described by the number of waves that passes a fixed place in a given amount of time.</p><p>Frequency is measured in Hertz (Hz).</p><p></p><p>Further insights:</p><p>Amplitude: Refers to the maximum displacement of a particle from its equilibrium position during vibration.</p><p>Resonance: Occurs when an external force matches the natural frequency of a system, causing increased amplitude.</p><p>Quanta: Refers to discrete packets of energy, particularly in quantum mechanics, and is not related to vibrations or oscillations.</p>",
    "question_index": 30
  },
  {

    "options": [

    ],
    "correct_option_id": 1,
    "solution": "<p>Fifth Five-Year Plan (1974 - 1978) put stress on employment, poverty alleviation (Garibi Hatao), and justice. The plan also focused on self-reliance in agricultural production and defence sector. Morarji Desai Government rejected this plan.</p>",

  {
    "question": "<span class=\"eqt\"><p>Namdhari Guru Ram Singh is associated with which of the following anti-colonial movement?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2366;&#2350;&#2343;&#2366;&#2352;&#2368; &#2327;&#2369;&#2352;&#2369; &#2352;&#2366;&#2350; &#2360;&#2367;&#2306;&#2361; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2313;&#2346;&#2344;&#2367;&#2357;&#2375;&#2358; &#2357;&#2367;&#2352;&#2379;&#2343;&#2368; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; &#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rampa</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2350;&#2381;&#2346;&#2366;</span>",
      "<span class=\"eqt\">Paika</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2311;&#2325;&#2366;</span>",
      "<span class=\"eqt\">Kol</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2354;</span>",
      "<span class=\"eqt\">Kuka</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2370;&#2325;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#8226; The Namdhari Movement was founded by Baba Ram Singh. His followers wore white clothes and gave up eating meat.</p><p>&#8226; Namadhari Guru Ram Singh was the first charismatic leader who launched an anti-colonial movement in Punjab, known as the <b>Kuka Movement</b> on 12 April 1857 which synchronized with the uprising of 1857, the first war of Independence.</p><p>&#8226; Namdhari Guru Ram Singh was also a social reformer.</p><p></p><p>Others:</p><p>Rampa: Refers to the Rampa Rebellion (19221924) in Andhra Pradesh, led by Alluri Sitarama Raju against British rule.</p><p>Paika: Refers to the Paika Rebellion (1817) in Odisha, led by Bakshi Jagabandhu against British colonial rule.</p><p>Kol: Refers to the Kol Rebellion (18311832) in Chota Nagpur, led by tribal communities against British exploitation.</p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>Ustad Bade Ghulam Ali Khan was a legendary Hindustani classical singer from ________ gharana.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360;&#2381;&#2340;&#2366;&#2342; &#2348;&#2337;&#2364;&#2375; &#2327;&#2369;&#2354;&#2366;&#2350; &#2309;&#2354;&#2368; &#2326;&#2366;&#2344; ________ &#2328;&#2352;&#2366;&#2344;&#2375; &#2325;&#2375; &#2319;&#2325; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2367;&#2306;&#2342;&#2369;&#2360;&#2381;&#2340;&#2366;&#2344;&#2368; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2327;&#2366;&#2351;&#2325; &#2341;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rampur</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2350;&#2346;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Agra</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2327;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Patiala</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2335;&#2367;&#2351;&#2366;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Gwalior</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2357;&#2366;&#2354;&#2367;&#2351;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Ustad Bade Ghulam Ali Khan was a legendary Hindustani classical singer from the Kasur-Patiala Gharana.</p><p>The Patiala gharana was inspired from and influenced by four musical gharanas - Delhi, Gwalior, Riva, and Jaipur, and it is particularly noted for its ghazal, thumri, and khayal styles of singing.</p><p>Although the Patiala gharana was originally founded by Mian Kallu, it is widely acknowledged that it was Ali Baksh Khan and Fateh Ali Khan who popularised the Patiala tradition of singing.</p>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>After Tamil Nadu, In October 2023, which of the following state government launched the 'Chief Minister's Breakfast Scheme' for all school children studying in government schools besides, those being run by the Panchayati Raj Institutions (PRIs)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2325;&#2375; &#2348;&#2366;&#2342; &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2023 &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; &#2346;&#2306;&#2330;&#2366;&#2351;&#2340;&#2368; &#2352;&#2366;&#2332; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; (PRI) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2330;&#2354;&#2366;&#2319; &#2332;&#2366; &#2352;&#2361;&#2375; &#2360;&#2381;&#2325;&#2370;&#2354;&#2379;&#2306; &#2325;&#2375; &#2309;&#2354;&#2366;&#2357;&#2366; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2360;&#2381;&#2325;&#2370;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2338;&#2364;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2349;&#2368; &#2360;&#2381;&#2325;&#2370;&#2354;&#2368; &#2348;&#2330;&#2381;&#2330;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; '&#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2344;&#2366;&#2358;&#2381;&#2340;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366;' &#2358;&#2369;&#2352;&#2370; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kerala</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2352;&#2354;</span>",
      "<span class=\"eqt\">Telangana</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2375;&#2354;&#2306;&#2327;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Andhra Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",

    "question": "<span class=\"eqt\"><p>Ashoka was the ______- emperor of Maurya Dynasty. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2358;&#2379;&#2325; &#2350;&#2380;&#2352;&#2381;&#2351; &#2357;&#2306;&#2358; &#2325;&#2375; ____ &#2360;&#2350;&#2381;&#2352;&#2366;&#2335; &#2341;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2<sup>nd</sup></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2370;&#2360;&#2352;&#2375;</span>",
      "<span class=\"eqt\">4<sup>th</sup></span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2341;&#2375;</span>",
      "<span class=\"eqt\">1<sup>st</sup></span><span class=\"hqt\" style=\"display:none\">&#2346;&#2361;&#2354;&#2375;</span>",
      "<span class=\"eqt\">3<sup>rd</sup></span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2360;&#2352;&#2375;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Ashoka was the third emperor of the Mauryan dynasty,</b> grandson of its founder Chandragupta and son of the second emperor, Bindusara.</p><p>Ashoka was the last major emperor of the Mauryan dynasty of India. His vigorous patronage of Buddhism during his reign (c. 265 - 238 BCE; also given as c. 273 - 232 BCE) furthered the expansion of that religion throughout India</p><p></p>",
    "question_index": 35
  },
  {
    "question": "<span class=\"eqt\"><p>Identify the correct option regarding the Vijayanagara empire during medieval times. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2343;&#2381;&#2351;&#2325;&#2366;&#2354; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rayas were the rulers and Nayakas were the priestly class.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2351;&#2366; &#2358;&#2366;&#2360;&#2325; &#2341;&#2375; &#2324;&#2352; &#2344;&#2366;&#2351;&#2325; &#2346;&#2369;&#2352;&#2379;&#2361;&#2367;&#2340; &#2357;&#2352;&#2381;&#2327; &#2341;&#2375;&#2404;</span>",
      "<span class=\"eqt\">Rayas were the rulers and Nayakas were military chiefs.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2351;&#2366; &#2358;&#2366;&#2360;&#2325; &#2341;&#2375; &#2324;&#2352; &#2344;&#2366;&#2351;&#2325; &#2360;&#2376;&#2344;&#2381;&#2351; &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2341;&#2375;&#2404;</span>",
      "<span class=\"eqt\">Rayas were treasurers and Nayakas were court historians.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2351;&#2366; &#2325;&#2379;&#2359;&#2366;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2341;&#2375; &#2324;&#2352; &#2344;&#2366;&#2351;&#2325; &#2342;&#2352;&#2348;&#2366;&#2352;&#2368; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360;&#2325;&#2366;&#2352; &#2341;&#2375;&#2404;</span>",
      "<span class=\"eqt\">Rayas were court historians and Nayakas were treasurers.</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2351;&#2366; &#2342;&#2352;&#2348;&#2366;&#2352;&#2368; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360;&#2325;&#2366;&#2352; &#2341;&#2375; &#2324;&#2352; &#2344;&#2366;&#2351;&#2325; &#2325;&#2379;&#2359;&#2366;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359; &#2341;&#2375;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>According to tradition and epigraphic evidence two brothers, Harihara and Bukka, founded the Vijayanagara Empire in 1336. This empire included within its fluctuating frontiers peoples who spoke different languages and followed different religious traditions. <b>The rulers of Vijayanagara called themselves Rayas.</b></p><p>Among those who exercised power in the empire were <b>military chiefs </b>who usually controlled forts and had armed supporters. These chiefs often moved from one area to another, and in many cases were accompanied by peasants looking for fertile land on which to settle. <b>These chiefs were known as Nayakas,</b> and they usually spoke Telugu or Kannada. Many Nayakas submitted to the authority of the kings of Vijayanagara but they often rebelled and had to be subdued by military action. </p>",
    "question_index": 36
  },
  {

      "<span class=\"eqt\">Khordad Sal</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2379;&#2352;&#2342;&#2366;&#2342; &#2360;&#2366;&#2354;</span>",

    ],
    "correct_option_id": 3,
    "solution": "<p><b>Gahambars / gahanbars</b> are six seasonal festivals or high feasts when Zoroastrians assemble to eat and share food communally.</p><p>They are joyous occasions at which rich and poor meet together, new friendships are formed and old disputes resolved.</p><p>While each gahambar traditionally spans five days, nowadays it is the last day that is usually observed.</p><p>The Gahambars are the only festivals mentioned in the Zoroastrian scriptures, the Avesta.</p><p></p><p><b>Further insights:</b></p><p>Sadeh: A mid-winter festival celebrating fire and the defeat of darkness, but not one of the six Gahambars.</p><p>Tirangan: Not a Zoroastrian festival; it is associated with Sikhism (celebrating the adoption of the Sikh flag).</p><p>Khordad Sal: A Zoroastrian festival celebrating the birth anniversary of Prophet Zarathustra, but not part of the six Gahambars.</p>",
    "question_index": 37
  },

    "question": "<span class=\"eqt\"><p>Who lead the Indian delegation at the 19th Summit of the Non-Aligned Movement (NAM) held in Kampala, Uganda on 19-20 January 2024?</p></span><span class=\"hqt\" style=\"display:none\"><p>19-20 &#2332;&#2344;&#2357;&#2352;&#2368; 2024 &#2325;&#2379; &#2351;&#2369;&#2327;&#2366;&#2306;&#2337;&#2366; &#2325;&#2375; &#2325;&#2306;&#2346;&#2366;&#2354;&#2366; &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2327;&#2369;&#2335;&#2344;&#2367;&#2352;&#2346;&#2375;&#2325;&#2381;&#2359; &#2310;&#2306;&#2342;&#2379;&#2354;&#2344; (NAM) &#2325;&#2375; 19&#2357;&#2375;&#2306; &#2358;&#2367;&#2326;&#2352; &#2360;&#2350;&#2381;&#2350;&#2375;&#2354;&#2344; &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2350;&#2306;&#2337;&#2354; &#2325;&#2366; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2325;&#2380;&#2344; &#2325;&#2352;&#2375;&#2327;&#2366;?</p></span>",

    ],
    "correct_option_id": 0,
    "solution": "<p>External Affairs Minister (EAM), Dr. S. Jaishankar lead the Indian delegation at the 19th Summit of the Non-Aligned Movement (NAM) held in Kampala, Uganda on 19-20 January 2024.</p><p>The Summit was preceded by deliberations at the Ministerial and Senior Officials levels. Minister of State for External Affairs, Dr. Rajkumar Ranjan Singh represented India at the NAM Foreign Ministers' meeting which preceded the NAM Summit.</p><p>Minister of State for External Affairs, Shri V. Muraleedharan represented India at the G-77 Third South Summit which was held in Kampala on 21-22 January 2024.</p><p>The 19th NAM Summit under the leadership of Uganda was held under the theme 'Deepening Cooperation for Shared Global Affluence'.</p><p></p>",

    "solution": "<p>&#183; Article 198 of the Indian Constitution deals with the procedure for passing a money bill by a state legislature. </p><p>&#183; A money bill shall not be introduced in a Legislative Council. </p><p>&#183; Whether a bill is money bill or not is decided by the <b>speaker of legislative assembly</b>. </p>",

    "question": "<span class=\"eqt\"><p>Which one of the following types of ecological pyramid is never inverted?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2325;&#2349;&#2368; &#2313;&#2354;&#2381;&#2335;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pyramid of numbers</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337;</span>",
      "<span class=\"eqt\">Pyramid of biomass</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2351;&#2379;&#2350;&#2366;&#2360; &#2325;&#2366; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337;</span>",
      "<span class=\"eqt\">Pyramid of energy</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2352;&#2381;&#2332;&#2366; &#2325;&#2366; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&#183; Pyramid of energy represents the total amount of energy at each trophic level. <b>Energy pyramids are never inverted. </b>Because only 10 percent of energy is because energy flows from a particular trophic level to the next trophic level.</p><p>&#183; Pyramid of Energy:</p><p>&#183; PP: Primary producers, PC: Primary consumers, SC: Secondary Consumers, TC: Tertiary consumers.</p><p>&#183; <img width=418 height=219 id=\"Picture 12\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p16293/image001.jpg\" ></p><p>&#183; Source: NCERT</p>",
    "question_index": 41
  },

    "question": "<span class=\"eqt\"><p>Match the following column. </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Group  -  A   (Cricket Ground)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Group  -  B    (Location)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) The Gabba</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) London</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) Eden Gardens</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) Mumbai</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) Wankhede Stadium</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) Kolkata</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) The Oval</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) Brisbane</td></tr></table></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2377;&#2354;&#2350; &#2325;&#2379; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2350;&#2370;&#2361; - A (<b>&#2325;&#2381;&#2352;&#2367;&#2325;&#2375;&#2335; &#2350;&#2376;&#2342;&#2366;&#2344;</b>)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#2360;&#2350;&#2370;&#2361; - B (<b>&#2309;&#2357;&#2360;&#2381;&#2341;&#2340;&#2367;</b>)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(i) &#2327;&#2366;&#2348;&#2366;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) &#2354;&#2306;&#2342;&#2344;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2312;&#2337;&#2344; &#2327;&#2366;&#2352;&#2381;&#2337;&#2344;&#2381;&#2360;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) &#2350;&#2369;&#2306;&#2348;&#2312;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2357;&#2366;&#2344;&#2326;&#2375;&#2337;&#2364;&#2375; &#2360;&#2381;&#2335;&#2375;&#2337;&#2367;&#2351;&#2350;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) &#2325;&#2379;&#2354;&#2325;&#2366;&#2340;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2323;&#2357;&#2354;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) &#2348;&#2381;&#2352;&#2367;&#2360;&#2381;&#2348;&#2375;&#2344;</td></tr></table></span>",

      "<span class=\"eqt\">(i)-c, (ii)-d, (iii)-b, (iv)-a</span><span class=\"hqt\" style=\"display:none\">(i)-c, (ii)-d, (iii)-b, (iv)-a</span>",
      "<span class=\"eqt\">(i)-d, (ii)-c, (iii)-b, (iv)-a</span><span class=\"hqt\" style=\"display:none\">(i)-d, (ii)-c, (iii)-b, (iv)-a</span>",
      "<span class=\"eqt\">(i)-c, (ii)-d, (iii)-a, (iv)-b</span><span class=\"hqt\" style=\"display:none\">(i)-c, (ii)-d, (iii)-a, (iv)-b</span>",
      "<span class=\"eqt\">(i)-b, (ii)-d, (iii)-a, (iv)-c</span><span class=\"hqt\" style=\"display:none\">(i)-b, (ii)-d, (iii)-a, (iv)-c</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#61623; The Brisbane Cricket Ground, commonly known as the <b>Gabba</b>, is a major sports stadium in Brisbane, the capital of Queensland, Australia. </p><p>&#61623; Eden Gardens: Situated in Kolkata, India (Option c), Eden Gardens is one of the oldest and most iconic cricket stadiums in the world. It has a rich cricketing history and has hosted numerous memorable matches.</p><p>&#61623; Wankhede Stadium: Located in Mumbai, India (Option d), Wankhede Stadium is another prominent cricket venue. It gained worldwide recognition for hosting the final match of the 2011 ICC Cricket World Cup, won by India.</p><p>&#61623; The Oval: Found in London, England (Option e), The Oval is an esteemed cricket ground that has witnessed many historic matches. It serves as the home ground for Surrey County Cricket Club and has hosted numerous Test matches.</p>",
    "question_index": 42
  },
  {
    "question": "<span class=\"eqt\"><p>Tarikh-I Firozshahi and the Fatwa-I Jahandari are important works of ____</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2366;&#2352;&#2368;&#2326;&#2364;-&#2319; &#2347;&#2364;&#2367;&#2352;&#2379;&#2332;&#2364;&#2358;&#2366;&#2361;&#2368; &#2324;&#2352; &#2347;&#2364;&#2340;&#2357;&#2366;-&#2319; &#2332;&#2361;&#2366;&#2305;&#2342;&#2366;&#2352;&#2368; ____ &#2325;&#2368; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2325;&#2371;&#2340;&#2367;&#2351;&#2366;&#2305; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Ziauddin Barani</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2367;&#2351;&#2366;&#2313;&#2342;&#2381;&#2342;&#2368;&#2344; &#2348;&#2352;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Minaj-us Siraj</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2367;&#2344;&#2366;&#2332;-&#2313;&#2360; &#2360;&#2367;&#2352;&#2366;&#2332;</span>",
      "<span class=\"eqt\">Abu Malik Isami</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2348;&#2369; &#2350;&#2354;&#2367;&#2325; &#2311;&#2360;&#2366;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Feroz Shah Tughluq</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2364;&#2367;&#2352;&#2379;&#2332;&#2364; &#2358;&#2366;&#2361; &#2340;&#2369;&#2327;&#2354;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The court chronicles were an important feature of the literature during the period of the Delhi Sultanate.</p><p><b>Ziauddin Barani</b> made the most important contribution to Persian literature during this period.</p><p>The Tarikh-I Firozshahi and the Fatwa-I Jahandari are his important works.</p><p>Some other important of chronicles were, the Tabaqat-I-Nasiri by Minaj-us Siraj, Futuh-us Salatin by Isami and the Futuhat-I Firozshahi by Feroz Shah Tughluq.</p>",
    "question_index": 43

    "solution": "<p>Article 213 of the Constitution of India grants the Governor of a state the power to promulgate ordinances when the state legislature is not in session. This power is similar to the President's ordinance-making power under Article 123 but is exercised at the state level.</p><p></p><p>Article 123: Grants the President of India the power to promulgate ordinances when Parliament is not in session.</p><p></p><p>Article 313: Deals with transitional provisions related to the continuation of existing laws until altered or repealed.</p><p></p><p>Article 143: Pertains to the power of the President to seek the opinion of the Supreme Court on questions of law or fact.</p>",

    "question": "<span class=\"eqt\"><p>If 0&#730; &lt; x &lt; 90&#730; and 5sin&#952;  -  4cos<sup>2</sup>&#952; + 2sin<sup>2</sup>&#952; = 0, then find (sec<sup>2</sup>2&#952;  -  cos<sup>2</sup>2&#952;)/(tan<sup>2</sup>2&#952;).</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 0&#730; &lt; x &lt; 90&#730; &#2324;&#2352; 5sin&#952; - 4cos<sup>2</sup>&#952; + 2sin<sup>2</sup>&#952; = 0 &#2361;&#2376;, &#2340;&#2379; (sec<sup>2</sup>2&#952; - cos<sup>2</sup>2&#952;)/(tan<sup>2</sup>2&#952;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3/2</span><span class=\"hqt\" style=\"display:none\">3/2</span>",
      "<span class=\"eqt\">7/5</span><span class=\"hqt\" style=\"display:none\">7/5</span>",
      "<span class=\"eqt\">8/7</span><span class=\"hqt\" style=\"display:none\">8/7</span>",
      "<span class=\"eqt\">5/4</span><span class=\"hqt\" style=\"display:none\">5/4</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Here, 5sin&#952;  -  4cos<sup>2</sup>&#952; + 2sin<sup>2</sup>&#952; = 0</p><p>5sin&#952;  -  4 + 4 sin<sup>2</sup>&#952; + 2sin<sup>2</sup>&#952; = 0</p><p>6sin<sup>2</sup> &#952; + 5sin&#952;  -  4 = 0</p><p>(2sin&#952;  -  1)(3sin&#952; + 4) = 0</p><p>sin&#952; = 1/2 =&gt; &#952; = 30&#730;</p><p>Therefore, (sec<sup>2</sup>2&#952;  -  cos<sup>2</sup>2&#952;)/(tan<sup>2</sup>2&#952;)</p><p>= (sec<sup>2</sup>(2 * 30&#730;)  -  cos<sup>2</sup>(2 * 30&#730;))/(tan<sup>2</sup>(2 * 30&#730;))</p><p>= (2<sup>2</sup>  -  (1/2)<sup>2</sup>)/(&radic;3)<sup>2</sup></p><p>= <b>5/4</b></p>",

    "question": "<span class=\"eqt\"><p>In a circle with centre O, KL is the diameter which divides the circle into two equal parts. PQ is a chord in one part such that KL || PQ and point M is other part such that &#8736;PML = 72&deg;. What is the measure of &#8736;LPQ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2357;&#2366;&#2354;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2350;&#2375;&#2306;, KL &#2357;&#2361; &#2357;&#2381;&#2351;&#2366;&#2360; &#2361;&#2376; &#2332;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2379; &#2342;&#2379; &#2348;&#2352;&#2366;&#2348;&#2352; &#2349;&#2366;&#2327;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2319;&#2325; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; PQ &#2319;&#2325; &#2332;&#2368;&#2357;&#2366; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376; &#2325;&#2368; KL || PQ &#2361;&#2376; &#2324;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; M &#2342;&#2370;&#2360;&#2352;&#2366; &#2349;&#2366;&#2327; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376; &#2325;&#2367; &#8736;PML = 72&deg; &#2361;&#2376;&#2404; &#8736;LPQ &#2325;&#2366; &#2350;&#2366;&#2346; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">22&deg;</span><span class=\"hqt\" style=\"display:none\">22&deg;</span>",
      "<span class=\"eqt\">18&deg;</span><span class=\"hqt\" style=\"display:none\">18&deg;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=278 height=234 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23079/image011.jpg\"></p><p>Given, &#8736;PML = 72&deg;</p><p>Since, the angles subtended by the same arc are equal.</p><p>So, &#8736;PML = &#8736;PKL = 72&deg;</p><p>And angle inscribed in a semicircle is 90&deg;.</p><p>Thus, &#8736;KPL = 90&deg;</p><p>So, in &#8710;KPL,</p><p>&#8736;KLP = 180  -  72  -  90 = 18&deg;</p><p>KL || PQ</p><p>So, &#8736;KLP = &#8736;LPQ (Alternate angles)</p><p>So, &#8736;LPQ = 18&deg;</p>",

    "question": "<span class=\"eqt\"><p>If (a/cosA) + (b/sinA) = 2 and (a/sinA)  -  (b/cosA) = 1, then find a/b.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; (a/cosA) + (b/sinA) = 2 &#2324;&#2352; (a/sinA) - (b/cosA) = 1 &#2361;&#2376;, &#2340;&#2379; a/b &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">sinA + cosA</span><span class=\"hqt\" style=\"display:none\">sinA + cosA</span>",
      "<span class=\"eqt\">(2 tan A + 1)/(2  -  tan A)</span><span class=\"hqt\" style=\"display:none\">(2 tan A + 1)/(2 - tan A)</span>",
      "<span class=\"eqt\">(1  -  2cotA)/cotA</span><span class=\"hqt\" style=\"display:none\">(1 - 2cotA)/cotA</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Here, (a/cosA) + (b/sinA) = 2</p><p>a sinA + b cosA = 2 sinA cos A ...(i)</p><p>And, (a/sinA)  -  (b/cosA) = 1</p><p>a cosA  -  b sinA = sinA cosA ...(ii)</p><p>Taking sinA (i) + cosA (ii), we get</p><p>a sin<sup>2</sup>A + b sinA cosA + a cos<sup>2</sup>A  -  b sin A cos A = 2 sin<sup>2</sup>A cos A + sinA cos<sup>2</sup>A</p><p>a = sinA cosA (2 sinA + cosA)</p><p>And, (sinA cosA (2 sinA + cosA)) sinA + b cosA = 2 sinA cos A</p><p>b = sinA cosA (2 cosA  -  sinA)</p><p>Therefore, a/b = (sinA cosA (2 sinA + cosA))/ (sinA cosA (2 cosA  -  sinA))</p><p>= cos A (2sinA/cosA + 1)/((cos A (2  -  sinA/cosA))</p><p>= (2 tan A + 1)/(2  -  tan A)</p><p><b> Express Method </b></p><p>Here, (a/cosA) + (b/sinA) = 2</p><p>a sinA + b cosA = 2 sinA cos A ...(i)</p><p>And, (a/sinA)  -  (b/cosA) = 1</p><p>a cosA  -  b sinA = sinA cosA ...(ii)</p><p>Substituting (ii) in (i) we get</p><p>a sinA + b cosA = 2(a cosA  -  b sinA)</p><p>a/b = (2sinA + cosA)/(2cosA-sinA)</p><p>Dividing numerator and denominator with cosA we get,</p><p>a/b = (2 tan A + 1)/(2  -  tan A)</p>",
    "question_index": 54
  },

    "question": "<span class=\"eqt\"><p>A can do a job in 30 days, B in 45 days, and C in 90 days. If A was helped on every 3<sup>rd</sup> day by B and C, then in how many days will the job be finished?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; A 30 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; B, 45 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2324;&#2352; C, 90 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2340;&#2368;&#2360;&#2352;&#2375; &#2342;&#2367;&#2344; &#2346;&#2352; B &#2324;&#2352; C, &#2325;&#2366;&#2352;&#2381;&#2351; &#2350;&#2375;&#2306; A &#2325;&#2368; &#2350;&#2342;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">27 days</span><span class=\"hqt\" style=\"display:none\">27 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">23 days</span><span class=\"hqt\" style=\"display:none\">23 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">34 days</span><span class=\"hqt\" style=\"display:none\">34 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">19 days</span><span class=\"hqt\" style=\"display:none\">19 &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A is helped by B and C on every 3<sup>rd</sup> day.</p><p>That means A works for 3 days and B and C work for one day.</p><p>So (3/30 + 1/45 +1/90) = 1/10 + 1/45 + 1/90 = (9+2+1)/90 = 12/90 = 2/15</p><p>So in every 3 days they do 2/15<sup>th</sup> part of work.</p><p>2/15 + 2/15 + 2/15 + 2/15 + 2/15 + 2/15 + 2/15 = 14/15</p><p>So in 3*7 = 21 days they do 14/15 work</p><p>Therefore remaining work 1 - (14/15) = 1/15</p><p>A's 1 day's work = 1/30</p><p>A's 2 day's work = 2/30 = 1/15</p><p>Therefore remaining work completed by A in 2 days.</p><p>Hence total days required to complete the work = 21 + 2 = 23 days</p><p><b> Express Method</b></p><p>Let total work = LCM of 30, 45, and 90 = 90 units</p><p>Efficiency of A = 90/30 = 3 units per day</p><p>Efficiency of B = 90/45 = 2 units per day</p><p>Efficiency of C = 90/90 = 1 unit per day</p><p>Work done by B and C in 2 days = 2 x (2 + 1) = 6 units</p><p>Work done by A, B, and C on 3rd day = 3 + 2 + 1 = 6 units</p><p>In 3 days, total work completed = 6 + 6 = 12 units</p><p>in 21 days, total work completed = 12 x 7 = 84 units</p><p>The remaining work = 90 - 84 = 6 units, which will be done by B and C in the next 2 days.</p><p>Total number of days required to complete the work = 21 + 2 = 23 days</p><p></p>",
    "question_index": 66
  },

    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of verb is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in Present Indefinite tense. Thus, the Passive voice will also be in Present Indefinite tense.</p><p>The format of Active voice is: Subject + V1/V5 + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + am/is/are + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>She likes you. (Active Voice)</p><p>You are liked by her. (Passive Voice)</p><p>The options except (d) don't follow the correct grammatical format of the Passive Voice. Hence, (d) is the correct answer. </p>",
