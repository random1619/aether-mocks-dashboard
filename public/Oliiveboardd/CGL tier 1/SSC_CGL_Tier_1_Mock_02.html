    "question": "<span class=\"eqt\"><p>Find the range of the values of l, if the length of the sides of the triangle are 2l, (l-2) and 7 respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>l &#2325;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2352;&#2375;&#2306;&#2332; &#2325;&#2366; &#2346;&#2340;&#2366; &#2354;&#2327;&#2366;&#2319;&#2305;, &#2351;&#2342;&#2367; &#2340;&#2381;&#2352;&#2367;&#2325;&#2379;&#2339; &#2325;&#2375; &#2325;&#2367;&#2344;&#2366;&#2352;&#2379;&#2306; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 2l, (l-2) &#2324;&#2352; 7 &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">3 &lt; l &lt; 5</span><span class=\"hqt\" style=\"display:none\">3 &lt; l &lt; 5</span>",
      "<span class=\"eqt\">3 &lt; l &lt; 4</span><span class=\"hqt\" style=\"display:none\">3 &lt; l &lt; 4</span>",
      "<span class=\"eqt\">2 &lt; l &lt; 4</span><span class=\"hqt\" style=\"display:none\">2 &lt; l &lt; 4</span>",
      "<span class=\"eqt\">2 &lt; l &lt; 3</span><span class=\"hqt\" style=\"display:none\">2 &lt; l &lt; 3</span>"
    ],
    "solution": "<p>The sum of two sides of triangle is always greater than the 3<sup>rd</sup> side.</p> <p>2l + l  -  2 &gt; 7</p> <p>=&gt; 3l &gt; 9</p> <p>Or l &gt; 3</p> <p>Also, l  -  2 + 7 &gt; 2l</p> <p>=&gt; 2l  -  l &lt; -2 + 7</p> <p>=&gt; l &lt; 5</p> <p>Thus, 3 &lt; l &lt; 5.</p>",
    "question_index": 57
  },

    "question": "<span class=\"eqt\"><p>Study the given graph carefully and answer the question that follow.</p><p><img width=576 height=336 id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p17963/image011.png\"></p><p>The number of students of height 125 cm or more but less than 145 cm exceeds the number of students of height 150 cm or more but less than 165 cm by X. The value of 10% of X is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2310;&#2352;&#2375;&#2326; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2313;&#2360;&#2325;&#2366; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p17963/image011.png\"></p><p>125 cm &#2351;&#2366; &#2313;&#2360;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2375;&#2325;&#2367;&#2344; 145 cm &#2360;&#2375; &#2325;&#2350; &#2314;&#2305;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, 150 cm &#2351;&#2366; &#2313;&#2360;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2354;&#2375;&#2325;&#2367;&#2344; 165 cm &#2360;&#2375; &#2325;&#2350; &#2314;&#2305;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; X &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; X &#2325;&#2375; 10% &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">2.5</span><span class=\"hqt\" style=\"display:none\">2.5</span>",

      "<span class=\"eqt\">2.7</span><span class=\"hqt\" style=\"display:none\">2.7</span>",
      "<span class=\"eqt\">2.6</span><span class=\"hqt\" style=\"display:none\">2.6</span>"

    "question": "<span class=\"eqt\"><p>Simplify the following expression:</p><p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">&radic;(1 - sin A)</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&radic;(1 + sin A)</span></div></div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div><div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">&radic;(1 - sin A)</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&radic;(1 + sin A)</span></div></div></p><p></p></span>",
    "options": [
      "<span class=\"eqt\">tanA</span><span class=\"hqt\" style=\"display:none\">tanA</span>",
      "<span class=\"eqt\">secA</span><span class=\"hqt\" style=\"display:none\">secA</span>",
      "<span class=\"eqt\">secA + tanA</span><span class=\"hqt\" style=\"display:none\">secA + tanA</span>",
      "<span class=\"eqt\">secA - tanA</span><span class=\"hqt\" style=\"display:none\">secA - tanA</span>"
    ],
    "solution": "<p>&radic;[(1 - sinA)/(1 + sinA)]</p><p>=&radic;[(1- sinA)<sup>2</sup>/(1 - sin<sup>2</sup>A)]</p><p>= (1 - sinA)/cosA</p><p>= secA - tanA</p>",
    "question_index": 59
  },
  {
    "question": "<span class=\"eqt\"><p>The center and radius of a circle is O and 15 cm. KL is a chord of length 18 cm. From points K and L two tangents intersect at point M. What is the length of MK?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366;/&#2325;&#2368; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; O &#2324;&#2352; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 15 cm &#2361;&#2376;&#2404; KL, 18 cm &#2354;&#2306;&#2348;&#2366;&#2312; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2332;&#2368;&#2357;&#2366; &#2361;&#2376;&#2404; &#2348;&#2367;&#2306;&#2342;&#2369; K &#2324;&#2352; L &#2360;&#2375; &#2342;&#2379; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358; &#2352;&#2375;&#2326;&#2366;&#2319;&#2305; &#2348;&#2367;&#2306;&#2342;&#2369; M &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; MK &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">10.5 cm</span><span class=\"hqt\" style=\"display:none\">10.5 cm</span>",
      "<span class=\"eqt\">11.25 cm</span><span class=\"hqt\" style=\"display:none\">11.25 cm</span>",
      "<span class=\"eqt\">12.5 cm</span><span class=\"hqt\" style=\"display:none\">12.5 cm</span>",
      "<span class=\"eqt\">11.5 cm</span><span class=\"hqt\" style=\"display:none\">11.5 cm</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=337 height=179 id=\"Picture 6\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18756/image006.jpg\"> </p><p>KL = 18 cm.</p><p>ON is perpendicular to KL so KN = NL = 9 cm</p><p>In &#916; ONK,</p><p>ON<sup>2</sup> = OK<sup>2</sup>  -  KN<sup>2</sup> = 15<sup>2</sup>  -  9<sup>2</sup></p><p>ON = &radic;144 = 12 cm</p><p>&#916; ONK and &#916; OKM,</p><p>&#8736; O is common.</p><p>&#8736; ONK = &#8736; OKM = 90&deg;</p><p>So, &#916; ONK ~ &#916; OKM by AA theorem,</p><p>ON/OK = NK/KM</p><p>12/15 = 9/KM</p><p>KM = 45/4 = 11.25 cm</p>",
    "question_index": 60
  },
  {
    "question": "<span class=\"eqt\"><p>Aditi and Vicky can do a piece of work in 72 and 108 hours respectively. Vicky and Neha together can do the same work in 48 hours, then find the time taken by Aditi and Neha together to do the work. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2342;&#2367;&#2340;&#2367; &#2324;&#2352; &#2357;&#2367;&#2325;&#2381;&#2325;&#2368; &#2319;&#2325; &#2325;&#2366;&#2350; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 72 &#2324;&#2352; 108 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2319;&#2325; &#2360;&#2366;&#2341; &#2357;&#2367;&#2325;&#2381;&#2325;&#2368; &#2324;&#2352; &#2344;&#2375;&#2361;&#2366; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2350; &#2325;&#2379; 48 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; &#2309;&#2342;&#2367;&#2340;&#2367; &#2324;&#2352; &#2344;&#2375;&#2361;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2366;&#2350; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2354;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">432/11</span><span class=\"hqt\" style=\"display:none\">432/11</span>",
      "<span class=\"eqt\">432/13</span><span class=\"hqt\" style=\"display:none\">432/13</span>",
      "<span class=\"eqt\">432/7</span><span class=\"hqt\" style=\"display:none\">432/7</span>",
      "<span class=\"eqt\">432/5</span><span class=\"hqt\" style=\"display:none\">432/5</span>"
    ],
    "solution": "<p>Total work = L.C.M of 72, 108, and 48 = 432</p><p>Efficiency = total work/ Time taken</p><p>Efficiency of Aditi = 6</p><p>Efficiency of Vicky = 4</p><p>Efficiency of Neha = 9  -  4 = 5 </p><p>Hence, the required time = 432/11 </p>",
    "question_index": 61

    "question": "<span class=\"eqt\"><p>Shanthanu borrowed &#8377;30000 from two moneylenders. He pays interest at the rate of 12% per annum for one loan and 14% per annum for the other. The total interest he pays for the entire year is &#8377;3720. How much did he borrow at the rate of 12% if both the amounts were borrowed at simple interest?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2366;&#2306;&#2340;&#2344;&#2369; &#2342;&#2379; &#2360;&#2366;&#2361;&#2370;&#2325;&#2366;&#2352; &#2360;&#2375; 30000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2313;&#2343;&#2366;&#2352; &#2354;&#2375;&#2340;&#2366; &#2361;&#2376;| &#2357;&#2361; &#2319;&#2325; &#2315;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; 12% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2324;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; 14% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2342;&#2352; &#2360;&#2375; &#2348;&#2381;&#2351;&#2366;&#2332; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;| &#2346;&#2370;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2313;&#2360;&#2325;&#2375; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2369;&#2354; &#2348;&#2381;&#2351;&#2366;&#2332; 3720 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;| &#2351;&#2342;&#2367; &#2342;&#2379;&#2344;&#2379;&#2306; &#2352;&#2366;&#2358;&#2367; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368; &#2327;&#2312; &#2340;&#2379; 12% &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2313;&#2360;&#2344;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2352;&#2366;&#2358;&#2367; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368; &#2341;&#2368; ?</p></span>",

    "question": "<span class=\"eqt\"><p>A quadrilateral ABCD circumscribes a circle. If AB = 8cm and CD = 5AB/4, then the value of BC + AD is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; ABCD &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2346;&#2352;&#2367;&#2327;&#2340; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; AB = 8 cm &#2324;&#2352; CD = 5AB/4 &#2361;&#2376;, &#2340;&#2379; BC + AD &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p><img width=244 height=255 id=\"Picture 22\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p11924/image021.png\"></p><p>We know that,</p><p>AE = AH</p><p>BE = BF</p><p>CG = CF</p><p>DG = DH (tangents from common point are equal)</p><p>Adding all</p><p>AB + CD = BC + AD</p><p>AB + 5AB/4 = BC + AD</p><p>8 + 10 = BC + AD</p><p>BC + AD = 18cm</p>",
