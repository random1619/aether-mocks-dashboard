<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="60">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>The position of how many letters will remain unchanged if each of the letters in the word 'IMPORTANT' is rearranged in the English alphabetical order from left to right?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2358;&#2348;&#2381;&#2342; 'IMPORTANT' &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2379; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2366;&#2319;&#2305; &#2346;&#2369;&#2344;&#2352;&#2381;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2309;&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2352;&#2361;&#2375;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "solution": "<p>Original word: I, M, P, O, R, T, A, N, T</p><p>Alphabetical order: A, I, M, N, O, P, R, T, T</p><p>Only the letter T in position 9 remains unchanged.</p><p>So, there is 1 letter whose position remains unchanged.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Each of the consonants of the word 'VIBRANT' are arranged in the alphabetical. How many letter/s is/are there in the English alphabetical series between the consonant which is fifth from left and the one which is second from the right end?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2348;&#2381;&#2342; 'VIBRANT' &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2381;&#2351;&#2306;&#2332;&#2344; &#2325;&#2379; &#2357;&#2352;&#2381;&#2339;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2346;&#2366;&#2305;&#2330;&#2357;&#2375;&#2306; &#2357;&#2381;&#2351;&#2306;&#2332;&#2344; &#2324;&#2352; &#2342;&#2366;&#2319;&#2305; &#2331;&#2379;&#2352; &#2360;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2381;&#2351;&#2306;&#2332;&#2344; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>",
      "<span class=\"eqt\">Six</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2307;</span>",
      "<span class=\"eqt\">Eight</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2336;</span>",
      "<span class=\"eqt\">One</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;</span>"
    ],
    "solution": "<p>Each of the consonants of the word 'VIBRANT' are arranged in the alphabetical order.</p><p>So, we get: BNRTV</p><p>The fifth consonant from the left end is 'V' and the second consonant from the right end is 'T'.</p><p>Letters in the English alphabetical series between V and T are:</p><p>ABCDEFGHIJKLMNOPQRST<b>U</b>VWXYZ</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Select the figure that will replace the question mark (?) in the following figure series.</p><p><img width=624 height=116 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23580/image023.jpg\" ></p><p><img width=170 height=378 id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23580/image024.jpg\" ></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2325;&#2371;&#2340;&#2367; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><img width=\"624\" height=\"116\" id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23580/image023.jpg\"></p><p><img width=\"170\" height=\"378\" id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23580/image024.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>"
    ],
    "solution": "<p>In this series new shape is added at every step. </p><p>The shapes are filled with colours diagonally. </p><p><img width=624 height=115 id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p23580/image025.jpg\" ></p><p>Thus, option figure (III) is correct.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following numbers will replace the question mark (?) in the given series?</p><p>368, 315, 256, 195, ?, 57</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2319;&#2327;&#2368;?</p><p>368, 315, 256, 195, ?, 57</p></span>",
    "options": [
      "<span class=\"eqt\">124</span><span class=\"hqt\" style=\"display:none\">124</span>",
      "<span class=\"eqt\">130</span><span class=\"hqt\" style=\"display:none\">130</span>",
      "<span class=\"eqt\">128</span><span class=\"hqt\" style=\"display:none\">128</span>",
      "<span class=\"eqt\">132</span><span class=\"hqt\" style=\"display:none\">132</span>"
    ],
    "solution": "<p>Logic the above series is:</p><p>368  -  53 = 315</p><p>315  -  59 = 256</p><p>256  -  61 = 195</p><p>195  -  67 = <b>128</b></p><p>128  -  71 = 57</p><p>Hence, 128 will replace the question mark.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Choose the Venn diagram which best illustrates the three given classes in each of the following questions.</p><p>Furniture, Chair, Bed</p><p><img width=331 height=499 id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25637/image001.png\" ></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2342;&#2367;&#2319; &#2327;&#2319; &#2340;&#2368;&#2344; &#2357;&#2352;&#2381;&#2327;&#2379;&#2306; &#2325;&#2379; &#2360;&#2352;&#2381;&#2357;&#2379;&#2340;&#2381;&#2340;&#2350; &#2352;&#2370;&#2346; &#2360;&#2375; &#2342;&#2352;&#2381;&#2358;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2357;&#2375;&#2344; &#2310;&#2352;&#2375;&#2326; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>&#2347;&#2352;&#2381;&#2344;&#2368;&#2330;&#2352; (Furniture), &#2325;&#2369;&#2352;&#2381;&#2360;&#2368; (Chair), &#2348;&#2367;&#2360;&#2381;&#2340;&#2352; (Bed)</p><p><img width=\"331\" height=\"499\" id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25637/image001.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>",
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The correct Venn diagram is :</p><p><img width=292 height=120 id=\"Picture 14\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25637/image002.png\" ></p><p>So, option (c) is the correct answer. </p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>What will come in the place of the question mark (?) in the following equation of '&div;' and 'x' are interchanged and '+' and '-' are interchanged?</p><p>9963 x 9  -  63 + 52 &div; 11 = ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2350;&#2375;&#2306;, &#2351;&#2342;&#2367; '&div;' &#2324;&#2352; 'x' &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2341;&#2366; '+' &#2324;&#2352; '-' &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2325;&#2381;&#2351;&#2366; &#2310;&#2319;&#2327;&#2366;?</p><p>9963 x 9 - 63 + 52 &div; 11 = ?</p></span>",
    "options": [
      "<span class=\"eqt\">598</span><span class=\"hqt\" style=\"display:none\">598</span>",
      "<span class=\"eqt\">588<b> </b></span><span class=\"hqt\" style=\"display:none\">588<b> </b></span>",
      "<span class=\"eqt\">589</span><span class=\"hqt\" style=\"display:none\">589</span>",
      "<span class=\"eqt\">548</span><span class=\"hqt\" style=\"display:none\">548</span>"
    ],
    "solution": "<p>9963 x 9  -  63 + 52 &div; 11 = ?</p><p>After the interchange of signs:</p><p>9963 &div; 9 + 63 - 52 x 11 = ?</p><p>1107 + 63  -  572 = ?</p><p>? = 1170  -  572 </p><p>? = 598</p><p>So, option (a) is the correct answer. </p>",
    "question_index": 5
  },
  {
    "question": "<span class=\"eqt\"><p>Select the combination of letters that when sequentially placed in the blanks of the given series will make it logically complete.</p><p>RS<b>_ _</b>TTUV<b>_ _</b>WW<b>_</b>YY<b>_</b>ZZ</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2375; &#2313;&#2360; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2342;&#2368; &#2327;&#2312; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2325;&#2375; &#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2326;&#2344;&#2375; &#2346;&#2352; &#2313;&#2360;&#2375; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2339; &#2348;&#2344;&#2366; &#2342;&#2375;&#2327;&#2366;&#2404;</p><p>RS<b>_ _</b>TTUV<b>_ _</b>WW<b>_</b>YY<b>_</b>ZZ</p></span>",
    "options": [
      "<span class=\"eqt\">TSXZZW</span><span class=\"hqt\" style=\"display:none\">TSXZZW</span>",
      "<span class=\"eqt\">TTSVWZ</span><span class=\"hqt\" style=\"display:none\">TTSVWZ</span>",
      "<span class=\"eqt\">VSTWXV</span><span class=\"hqt\" style=\"display:none\">VSTWXV</span>",
      "<span class=\"eqt\">STVWXZ</span><span class=\"hqt\" style=\"display:none\">STVWXZ</span>"
    ],
    "solution": "<p>If the combination of letters when sequentially placed in the blanks of the given series, then the series will be:</p><p><b>Option (a) </b>RS<b>TS</b>TTUV<b>XZ</b>WW<b>Z</b>YY<b>W</b>ZZ</p><p>Here, no definite pattern can be established. So, option (a) is incorrect.</p><p><b>Option (b) </b>RS<b>TT</b>TTUV<b>SV</b>WW<b>W</b>YY<b>Z</b>ZZ</p><p>Here, no definite pattern can be established. So, option (b) is incorrect.</p><p><b>Option (c) </b>RS<b>VS</b>TTUV<b>TW</b>WW<b>X</b>YY<b>V</b>ZZ</p><p>Here, no definite pattern can be established. So, option (c) is incorrect.</p><p><b>Option (d) </b>RS<b>ST</b>TTUV<b>VW</b>WW<b>X</b>YY<b>Z</b>ZZ</p><p>Here, the pattern is: </p><p>R, SS, TTT, U, VV, WWW, X, YY, ZZZ.</p>",
    "question_index": 6
  },
  {
    "question": "<span class=\"eqt\"><p>By interchanging the given numbers (not digits). Which of the following equations will be correct?</p><p>2 and 12</p><p>I. 164 + 12  -  118 x 6 &div; 2 = 107</p><p>II. 53 x 12 + 60 &div; 2  -  47 = 64</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; (&#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2344;&#2361;&#2368;&#2306;) &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2375; &#2346;&#2352;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379;&#2327;&#2366;?</p><p>2 &#2324;&#2352; 12</p><p>I. 164 + 12 - 118 x 6 &div; 2 = 107</p><p>II. 53 x 12 + 60 &div; 2 - 47 = 64</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "solution": "<p>If the numbers 2 and 12 (not digits) are interchanged, then the equation will be: </p><p>Equation I: 164 + 2  -  118 x 6 &div; 12 = 107</p><p>So, 164 + 2  -  59 = 107</p><p>So, 166  -  59 = 107</p><p>So, 107 = 107</p><p>So, equation I is correct. </p><p>Equation II: 53 x 2 + 60 &div; 12  -  47 = 64</p><p>So, 106 + 5  -  47 = 64</p><p>So, 111  -  47 = 64</p><p>So, 64 = 64</p><p>So, equation II is correct. </p>",
    "question_index": 7

    "question": "<span class=\"eqt\"><p>A cube is made by folding the given sheet. Which of the following alphabet will appear at the top side, if 'A' appears at the left side and 'B' appears at the front side of the cube?</p><p><img width=143 height=106 id=\"Picture 20\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26338/image018.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2358;&#2368;&#2335; &#2325;&#2379; &#2350;&#2379;&#2337;&#2364;&#2325;&#2352; &#2319;&#2325; &#2328;&#2344; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 'A' &#2328;&#2344; &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2349;&#2369;&#2332;&#2366; &#2346;&#2352; &#2324;&#2352; 'B' &#2328;&#2344; &#2325;&#2375; &#2360;&#2366;&#2350;&#2344;&#2375; &#2325;&#2368; &#2349;&#2369;&#2332;&#2366; &#2346;&#2352; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2325;&#2381;&#2359;&#2352; &#2358;&#2368;&#2352;&#2381;&#2359; &#2346;&#2352; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2367;&#2340; &#2361;&#2379;&#2327;&#2366;?</p><p><img width=\"143\" height=\"106\" id=\"Picture 20\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26338/image018.jpg\"></p></span>",

    "question": "<span class=\"eqt\"><p>If G + H means G is the daughter of H, G &div; H means G is the husband of H, G  X  H means G is the daughter-in-law of H, G  -  H means G is the mother of H, which of the following shows that B is the father of N?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; G + H &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; G, H &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;, G &div; H &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; G, H &#2325;&#2366; &#2346;&#2340;&#2367; &#2361;&#2376;, G X H &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; G, H &#2325;&#2368; &#2348;&#2361;&#2370; &#2361;&#2376;, G - H &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2325;&#2367; G, H &#2325;&#2368; &#2350;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2351;&#2361; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; B, N &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">N &div; T  X  Q  -  C + B</span><span class=\"hqt\" style=\"display:none\">N &div; T X Q - C + B</span>",
      "<span class=\"eqt\">B  -  L  -  R &div; D + N</span><span class=\"hqt\" style=\"display:none\">B - L - R &div; D + N</span>",
      "<span class=\"eqt\">N  X  Q &div; V + S  -  B</span><span class=\"hqt\" style=\"display:none\">N X Q &div; V + S - B</span>",
      "<span class=\"eqt\">B &div; D  -  J &div; R + N</span><span class=\"hqt\" style=\"display:none\">B &div; D - J &div; R + N</span>"
    ],
    "solution": "<p>Option (a): N &div; T  X  Q  -  C + B</p><p>N &div; T means N is the husband of T</p><p>T  X  Q means T is the daughter-in-law of Q</p><p>Q  -  C means Q is the mother of C</p><p>C + B means C is the daughter of B</p><p><img width=268 height=105 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26471/image005.png\"></p><p><b>B is the father of N.</b></p><p>So, <b>option (a)</b> is correct.</p><p>Option (b): B  -  L - R &div; D + N</p><p>B  -  L means B is the mother of L</p><p>L - R means L is the mother of R</p><p>R &div; D means R is the husband of D</p><p>D + N means D is the daughter of N</p><p><img width=171 height=178 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26471/image006.png\"></p><p>B is the mother of N's daughter's mother-in-law.</p><p>So, option (b) is incorrect.</p><p>Option (c): N  X  Q &div; V + S  -  B</p><p>N  X  Q means N is the daughter-in-law of Q</p><p>Q &div; V means Q is the husband of V</p><p>V + S means V is the daughter of S</p><p>S  -  B means S is the mother of B</p><p><img width=314 height=173 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26471/image007.png\"></p><p>B is the sibling of N's mother-in-law.</p><p>So, option (c) is incorrect.</p><p>Option (d): B &div; D  -  J &div; R + N</p><p>B &div; D means B is the husband of D</p><p>D  -  J means D is the mother of J</p><p>J &div; R means J is the husband of R</p><p>R + N means R is the daughter of N</p><p><img width=231 height=120 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26471/image008.png\"></p><p>B is the father-in-law of N's daughter.</p><p>So, option (d) is incorrect.</p>",
    "question_index": 16
  },

    "question": "<span class=\"eqt\"><p>Select the set of numbers from the options which is similar to the following set of numbers.</p><p>(47, 12, 62)</p><p>(18, 7, 14)</p><p>(NOTE: Operations should be performed on the whole numbers, without breaking down the numbers into its constituent digits. E.g. 13 Operations on 13 such as adding /deleting /multiplying etc. to 13 can be performed. Breaking down 13 into 1 and 3 and then performing mathematical operations on 1 and 3 is not allowed)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2313;&#2360; &#2360;&#2350;&#2370;&#2361; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2404;</p><p>(47, 12, 62)</p><p>(18, 7, 14)</p><p>(&#2344;&#2379;&#2335;: &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2328;&#2335;&#2325; &#2309;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2319; &#2348;&#2367;&#2344;&#2366;, &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2346;&#2352; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2325;&#2368; &#2332;&#2366;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; 13 - 13 &#2346;&#2352; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2332;&#2376;&#2360;&#2375; &#2325;&#2367; 13 &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2344;&#2366;/&#2328;&#2335;&#2366;&#2344;&#2366;/&#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2344;&#2366; &#2310;&#2342;&#2367; &#2325;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; 13 &#2325;&#2379; 1 &#2324;&#2352; 3 &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2347;&#2367;&#2352; 1 &#2324;&#2352; 3 &#2346;&#2352; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;)</p></span>",

    "question": "<span class=\"eqt\"><p>In January 2024, Prominent Indian musicians Shankar Mahadevan and Zakir Hussain's fusion band Shakti bagged the Grammy award for which of the following albums?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2357;&#2352;&#2368; 2024 &#2350;&#2375;&#2306;, &#2346;&#2381;&#2352;&#2350;&#2369;&#2326; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2327;&#2368;&#2340;&#2325;&#2366;&#2352; &#2358;&#2306;&#2325;&#2352; &#2350;&#2361;&#2366;&#2342;&#2375;&#2357;&#2344; &#2324;&#2352; &#2332;&#2366;&#2325;&#2367;&#2352; &#2361;&#2369;&#2360;&#2376;&#2344; &#2325;&#2375; &#2347;&#2381;&#2351;&#2370;&#2332;&#2344; &#2348;&#2376;&#2306;&#2337; &#2358;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2319;&#2354;&#2381;&#2348;&#2350; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2381;&#2352;&#2376;&#2350;&#2368; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2350;&#2367;&#2354;&#2366;?</p></span>",

      "<span class=\"eqt\">Bending the Rules</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2375;&#2306;&#2337;&#2367;&#2306;&#2327; &#2342; &#2352;&#2370;&#2354;&#2381;&#2360;</span>"
    ],
    "solution": "<p>Prominent Indian musicians Shankar Mahadevan and Zakir Hussain's fusion band Shakti bagged the prestigious Grammy award. They clinched the award in Best Global Music Album category for their latest album <b>This Moment.</b></p><p>&#183; The album This Moment was released in June last year. The album consisted of eight songs by John McLaughlin, Zakir Khan, Shankar Mahadevan, V Selvaganesh and Ganesh Rajagopalan.</p><p>&#183; Meanwhile, Zakir Hussain also bagged the Grammy in Best Global Music Performance category for his contribution to Pashto alongside Bela Fleck and Edgar Meyer, featuring Rakesh Chaurasia.</p><p>&#183; Moreover, Veteran Indian classical flute artist Rakesh Chaurasia managed to win dual Grammy for his collaborative album As We Speak in the Best Contemporary Instrumental and Best Global Music Performance categories.</p><p>&#183; The 66th Annual Grammy Awards 2024 are being held at Crypto.com Arena in Los Angeles.</p><p>&#183; 'Pop powerhouse'<i>Taylor Swift</i>'made'<i>Grammy</i>'history by winning her fourth Album of the Year'<i>award</i>'for Midnights ' the most ever by any artiste.'</p>",

    "question": "<span class=\"eqt\"><p>What is the SI unit of luminous intensity?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2351;&#2369;&#2325;&#2381;&#2340; &#2340;&#2368;&#2357;&#2381;&#2352;&#2340;&#2366; (luminous intensity) &#2325;&#2368; SI &#2311;&#2325;&#2366;&#2312; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>Which of the following is considered as the National Income?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2351; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">Gross Domestic Product at Market Price</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2360;&#2325;&#2354; &#2328;&#2352;&#2375;&#2354;&#2370; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;</span>"

      "<span class=\"eqt\">British architecture</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Rajputana architecture</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2346;&#2369;&#2340;&#2366;&#2344;&#2366; (&#2352;&#2366;&#2332;&#2346;&#2370;&#2340;) &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Persian architecture</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2366;&#2352;&#2360;&#2368; &#2357;&#2366;&#2360;&#2381;&#2340;&#2369;&#2325;&#2354;&#2366;</span>"
    ],
    "solution": "<p>&#8226; Situated at Badi Choupad, Pink City of Jaipur, Hawa Mahal was built in 1799.</p><p>&#8226; <b>Hawa Mahal stands testimony to the rich Rajputana architecture.</b></p><p>&#8226; In 1799, the Kachhwaha Rajput ruler, Sawai Pratap Singh, grandson of Maharaja Sawai Jai Singh ordered Lal Chand Usta to construct an extension to the Royal City Palace. </p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>What is the total population of India according to the 2011 Census?</p></span><span class=\"hqt\" style=\"display:none\"><p>2011 &#2325;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2325;&#2369;&#2354; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">0.12 billion</span><span class=\"hqt\" style=\"display:none\">0.12 &#2348;&#2367;&#2354;&#2367;&#2351;&#2344;</span>",
      "<span class=\"eqt\">1.06 billion</span><span class=\"hqt\" style=\"display:none\">1.06 &#2348;&#2367;&#2354;&#2367;&#2351;&#2344;</span>",
      "<span class=\"eqt\">1.21 billion</span><span class=\"hqt\" style=\"display:none\">1.21 &#2348;&#2367;&#2354;&#2367;&#2351;&#2344;</span>",
      "<span class=\"eqt\">2.12 billion</span><span class=\"hqt\" style=\"display:none\">2.12 &#2348;&#2367;&#2354;&#2367;&#2351;&#2344;</span>"
    ],
    "solution": "<p>India's total population stood at <b>1.21 billion</b> or 121 crores, which is an increase of 17.7 per cent as compared to 2001.</p><p>&#8226; The growth in the population of females was higher than that of males.</p><p>&#8226; There was an increase of 90.97 million Males and an increase of 90.99 million Females.</p><p>&#8226; The growth rate of Females was 18.3% which was higher than males (17.1%).</p><p>&#8226; Population in India grew by 17.7% for the decade of 2001-2011, as against 21.5% in the previous decade (1991-2001).</p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>In November 2023, Heeralal Samariya was appointed as ____________</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2357;&#2306;&#2348;&#2352; 2023 &#2350;&#2375;&#2306;, &#2361;&#2368;&#2352;&#2366;&#2354;&#2366;&#2354; &#2360;&#2366;&#2350;&#2352;&#2367;&#2351;&#2366; &#2325;&#2379; ____________ &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2344;&#2367;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Chief Information Commissioner of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351; &#2360;&#2370;&#2330;&#2344;&#2366; &#2310;&#2351;&#2369;&#2325;&#2381;&#2340;</span>",
      "<span class=\"eqt\">Executive Director of IBBI</span><span class=\"hqt\" style=\"display:none\">IBBI &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2366;&#2352;&#2368; &#2344;&#2367;&#2342;&#2375;&#2358;&#2325;</span>",
      "<span class=\"eqt\">Director of CBI</span><span class=\"hqt\" style=\"display:none\">CBI &#2325;&#2375; &#2344;&#2367;&#2342;&#2375;&#2358;&#2325;</span>",
      "<span class=\"eqt\">Chairman of LIC</span><span class=\"hqt\" style=\"display:none\">LIC &#2325;&#2375; &#2309;&#2343;&#2381;&#2351;&#2325;&#2381;&#2359;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Information Commissioner Heeralal Samariya was sworn in as the Chief Information Commissioner (CIC) by President Droupadi Murmu. He is the first person from the Dalit community to hold the post.</p><p></p><p>The Commission is headed by the Chief Information Commissioner and can have a maximum of 10 Information Commissioners.</p>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>Who was the legendary Rajput warrior known for his resistance against the Mughal Empire?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2369;&#2327;&#2354; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2379;&#2343; &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2375; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2350;&#2361;&#2366;&#2344; &#2352;&#2366;&#2332;&#2346;&#2370;&#2340; &#2351;&#2379;&#2342;&#2381;&#2343;&#2366; &#2325;&#2380;&#2344; &#2341;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Maharana Pratap</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2352;&#2366;&#2339;&#2366; &#2346;&#2381;&#2352;&#2340;&#2366;&#2346;</span>",
      "<span class=\"eqt\">Rana Sanga</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2339;&#2366; &#2360;&#2366;&#2306;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Prithviraj Chauhan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368;&#2352;&#2366;&#2332; &#2330;&#2380;&#2361;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Hemu</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2350;&#2370;</span>"
    ],
    "solution": "<p>Maharana Pratap is considered one of the most iconic Rajput warriors who fiercely resisted Mughal domination during the 16th century.</p><p>Maharana Pratap was a king of Mewar, a region in north-western India in the present-day state of Rajasthan. He is notable for leading the Rajput resistance against the expansionist policy of the Mughal Emperor Akbar including the Battle of Haldighati and Battle of Dewair which have turned him into a folk hero.</p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is correct about Vector quantities?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2342;&#2367;&#2358; &#2352;&#2366;&#2358;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Vector quantities have only magnitude.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2342;&#2367;&#2358; &#2352;&#2366;&#2358;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2346;&#2352;&#2367;&#2350;&#2366;&#2339; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Vector quantities have only direction.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2342;&#2367;&#2358; &#2352;&#2366;&#2358;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2342;&#2367;&#2358;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Vector quantities have no direction and magnitude</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2342;&#2367;&#2358; &#2352;&#2366;&#2358;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2379;&#2312; &#2342;&#2367;&#2358;&#2366; &#2324;&#2352; &#2346;&#2352;&#2367;&#2350;&#2366;&#2339; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2340;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Vector quantities have both magnitude and direction</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2342;&#2367;&#2358; &#2352;&#2366;&#2358;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2350;&#2366;&#2339; &#2324;&#2352; &#2342;&#2367;&#2358;&#2366; &#2342;&#2379;&#2344;&#2379;&#2306; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "solution": "<p>Vector quantities have both magnitude and direction.</p><p>Vector quantities: - The physical quantities that have both magnitude and direction and also obey the triangle law of vector addition is known as Vector Quantities. For ex- Velocity, force, etc.</p><p>Scalar quantities have only magnitude and no direction.</p>",
    "question_index": 35
  },
  {
    "question": "<span class=\"eqt\"><p>Which part of the Indian constitution deals with fundamental duties?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2349;&#2366;&#2327; &#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Part III</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; III</span>",
      "<span class=\"eqt\">Part IV A</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; IV A</span>",
      "<span class=\"eqt\">Part V</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; V</span>",
      "<span class=\"eqt\">Part II</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2327; II</span>"
    ],
    "solution": "<p><b>PART IVA of the constitution deals with FUNDAMENTAL DUTIES</b></p><p>51A. Fundamental duties. - It shall be the duty of every citizen of India - </p><p>&#183; to abide by the Constitution and respect its ideals and institutions, the National Flag and the National Anthem;</p><p>&#183; to cherish and follow the noble ideals which inspired our national struggle for freedom;</p><p>&#183; to uphold and protect the sovereignty, unity and integrity of India;</p><p>&#183; to defend the country and render national service when called upon to do so;</p><p>&#183; to promote harmony and the spirit of common brotherhood amongst all the people of India transcending religious, linguistic and regional or sectional diversities; to renounce practices derogatory to the dignity of women;</p><p>&#183; to value and preserve the rich heritage of our composite culture;</p><p>&#183; to protect and improve the natural environment including forests, lakes, rivers and wild life, and to have compassion for living creatures;</p><p>&#183; to develop the scientific temper, humanism and the spirit of inquiry and reform;</p><p>&#183; to safeguard public property and to abjure violence;</p><p>&#183; to strive towards excellence in all spheres of individual and collective activity so that the nation constantly rises to higher levels of endeavour and achievement;</p><p>&#183; who is a parent or guardian to provide opportunities for education to his child or, as the case may be, ward between the age of six and fourteen years.</p>",
    "question_index": 36
  },
  {
    "question": "<span class=\"eqt\"><p>Pandit Shivkumar Sharma was a renowned player of __</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2306;&#2337;&#2367;&#2340; &#2358;&#2367;&#2357;&#2325;&#2369;&#2350;&#2366;&#2352; &#2358;&#2352;&#2381;&#2350;&#2366; __ &#2325;&#2375; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2357;&#2366;&#2342;&#2325; &#2341;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Santoor</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2340;&#2370;&#2352;</span>",
      "<span class=\"eqt\">Harmonium</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2366;&#2352;&#2350;&#2379;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">Sarangi</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2306;&#2327;&#2368;</span>",
      "<span class=\"eqt\">Veena</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2368;&#2339;&#2366;</span>"
    ],
    "solution": "<p>&#183; Pt Shivkumar Sharma was a renowned <b>santoor player</b>.</p><p></p><p>&#183; A Padma Vibhushan recipient, Shivkumar Sharma was born in Jammu in 1938 and is believed to be the first musician to have played Indian classical music on the santoor, a folk instrument from Jammu and Kashmir.</p><p>&#183; As one half of musician duo Shiv-Hari, he composed music with flute legend Pt Hari Prasad Chaurasia for an array of films such as \"<i>Silsila</i>\", \"<i>Lamhe</i>\", \"<i>Chandni</i>\" and \"<i>Darr</i>\".</p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>_____________ means generating funds to finance the gap which results from excess of expenditure over revenue.</p></span><span class=\"hqt\" style=\"display:none\"><p>____________ &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2351; &#2325;&#2368; &#2309;&#2343;&#2367;&#2325;&#2340;&#2366; &#2360;&#2375; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2309;&#2306;&#2340;&#2352; &#2325;&#2379; &#2357;&#2367;&#2340;&#2381;&#2340;&#2346;&#2379;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2343;&#2344; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2344;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Budget Financing</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2332;&#2335; &#2357;&#2367;&#2340;&#2381;&#2340;&#2346;&#2379;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Alternative Financing</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2376;&#2325;&#2354;&#2381;&#2346;&#2367;&#2325; &#2357;&#2367;&#2340;&#2381;&#2340;&#2346;&#2379;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Deficit Financing</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2366;&#2335;&#2375; &#2325;&#2366; &#2357;&#2367;&#2340;&#2381;&#2340;&#2346;&#2379;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Mean Financing</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2360;&#2340; &#2357;&#2367;&#2340;&#2381;&#2340;&#2346;&#2379;&#2359;&#2339;</span>"
    ],
    "solution": "<p><b>Deficit financing</b> means generating funds to finance the deficit which results from excess of expenditure over revenue. The gap being covered by borrowing from the public by the sale of bonds or by printing new money.</p><p>For developing countries like India, higher economic growth is a priority. A higher economic growth requires finances. With the private sector being shy of making huge expenditure, the responsibility of drawing financial resources rests on the government.</p>",
    "question_index": 38
  },
  {
    "question": "<span class=\"eqt\"><p>MANAS app is associated with which of the following?</p></span><span class=\"hqt\" style=\"display:none\"><p>MANAS &#2320;&#2346; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Mental health and awareness</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2344;&#2360;&#2367;&#2325; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2324;&#2352; &#2332;&#2366;&#2327;&#2352;&#2370;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Food security</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2366;&#2342;&#2381;&#2351; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366;</span>",
      "<span class=\"eqt\">Environmental protection</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2381;&#2351;&#2366;&#2357;&#2352;&#2339; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339;</span>",
      "<span class=\"eqt\">Tax benefits</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352; &#2354;&#2366;&#2349;</span>"
    ],
    "solution": "<p>The MANAS app is a digital platform that provides age-appropriate methods for mental health and wellness for people of all ages.</p><p>The MANAS app was virtually launched by Prof. K. Vijay Raghavan, the former Principal Scientific Adviser to the Government of India, on April 13, 2021. The app is part of the Mental Health and Normalcy Augmentation System (MANAS), a national program that aims to improve the mental well-being of Indian citizens.</p><p></p>",
    "question_index": 39
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is the cremation site of Mahatma Gandhi?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; &#2325;&#2366; &#2360;&#2350;&#2366;&#2343;&#2367; &#2360;&#2381;&#2341;&#2354; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Raj Ghat</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2328;&#2366;&#2335;</span>",
      "<span class=\"eqt\">Vijay Ghat</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2332;&#2351; &#2328;&#2366;&#2335;</span>",
      "<span class=\"eqt\">Veer Bhumi</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2368;&#2352; &#2349;&#2370;&#2350;&#2367;</span>",
      "<span class=\"eqt\">Shanti Van</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2306;&#2340;&#2367; &#2357;&#2344;</span>"
    ],
    "solution": "<p>Raj Ghat is the crematorium of Mahatma Gandhi situated in Delhi. Mahatma Gandhi was assassinated by Nathuram Godse on 30 January, 1948 in New Delhi.</p><p>Vijay Ghat - Lal Bahadur Shastri.</p><p>Veer Bhumi - Rajiv Gandhi.</p><p>Shanti Van - Pandit Jawaharlal Nehru.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>The winds that blow from sub-tropical High Pressure Belt to the Equatorial low pressure belt are called_____</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2346; &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2313;&#2330;&#2381;&#2330; &#2342;&#2366;&#2348; &#2348;&#2375;&#2354;&#2381;&#2335; &#2360;&#2375; &#2311;&#2325;&#2381;&#2357;&#2375;&#2335;&#2379;&#2352;&#2367;&#2351;&#2354; &#2325;&#2350; &#2342;&#2348;&#2366;&#2357; &#2348;&#2375;&#2354;&#2381;&#2335; &#2325;&#2368; &#2323;&#2352; &#2348;&#2361;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2361;&#2357;&#2366;&#2323;&#2306; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Westerlies</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2360;&#2381;&#2335;&#2352;&#2354;&#2368;&#2332;(&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2361;&#2357;&#2366;&#2319;&#2305;)</span>",
      "<span class=\"eqt\">Trade winds</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2381;&#2352;&#2375;&#2337; &#2357;&#2367;&#2306;&#2337; (&#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2361;&#2357;&#2366;&#2319;&#2305;)</span>",
      "<span class=\"eqt\">Easterlies</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2360;&#2381;&#2335;&#2352;&#2381;&#2354;&#2368;&#2360; (&#2346;&#2369;&#2352;&#2357;&#2366;&#2312;)</span>",
      "<span class=\"eqt\">Monsoon winds</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2344;&#2360;&#2370;&#2344;&#2368; &#2361;&#2357;&#2366;</span>"
    ],
    "solution": "<p><b>Trade winds</b> are winds blowing steadily towards the equator from the north-east in the northern hemisphere or the south-east in the southern hemisphere, especially at sea. Two belts of trade winds encircle the earth, <b>blowing from the tropical high-pressure belts to the low-pressure zone at the equator</b>.</p>",
    "question_index": 41
  },
  {
    "question": "<span class=\"eqt\"><p>Who was the leader of the Indian National Army (INA)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2360;&#2375;&#2344;&#2366; (INA) &#2325;&#2366; &#2344;&#2375;&#2340;&#2366; &#2325;&#2380;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Subhas Chandra Bose</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2369;&#2349;&#2366;&#2359; &#2330;&#2306;&#2342;&#2381;&#2352; &#2348;&#2379;&#2360;</span>",
      "<span class=\"eqt\">Bhagat Singh</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2327;&#2340; &#2360;&#2367;&#2306;&#2361;</span>",
      "<span class=\"eqt\">Jawaharlal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352;&#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>",
      "<span class=\"eqt\">Bal Gangadhar Tilak</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2354; &#2327;&#2306;&#2327;&#2366;&#2343;&#2352; &#2340;&#2367;&#2354;&#2325;</span>"
    ],
    "solution": "<p>Subhas Chandra Bose, popularly known as Netaji, was the leader of the Indian National Army (INA). He played a crucial role in organizing and leading the INA, which fought against British forces alongside the Axis powers during World War II.</p><p>The INA was formed in Southeast Asia in August 1942 with the help of the Japanese Empire. The INA was also known as Azad Hind Fauj.</p><p></p>",
    "question_index": 42
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following amendment acts added the term 'secular' the Preamble of the Indian Constitution?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2368; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2366;&#2357;&#2344;&#2366; &#2350;&#2375;&#2306; '&#2343;&#2352;&#2381;&#2350;&#2344;&#2367;&#2352;&#2346;&#2375;&#2325;&#2381;&#2359;' &#2358;&#2348;&#2381;&#2342; &#2332;&#2379;&#2337;&#2364;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">42<sup>nd</sup> Constitutional Amendment Act</span><span class=\"hqt\" style=\"display:none\">42&#2357;&#2366;&#2305; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">43<sup>rd</sup> Constitutional Amendment Act</span><span class=\"hqt\" style=\"display:none\">43&#2357;&#2366;&#2305; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">44<sup>th</sup> Constitutional Amendment Act</span><span class=\"hqt\" style=\"display:none\">44&#2357;&#2366;&#2305; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>",
      "<span class=\"eqt\">45<sup>th</sup> Constitutional Amendment Act</span><span class=\"hqt\" style=\"display:none\">45&#2357;&#2366;&#2305; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;</span>"
    ],
    "solution": "<p>The term 'secular' was added to the Preamble of the Indian Constitution by the <b>42<sup>nd</sup> Constitutional Amendment Act of 1976</b>. The Constitution of India stands for a Secular State. Hence, it does not uphold any particular religion as the official religion of the Indian State.</p>",
    "question_index": 43
  },

    "question": "<span class=\"eqt\"><p>Which of the following is one of the examples of terrestrial ecosystems?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2381;&#2341;&#2354;&#2368;&#2351; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2340;&#2306;&#2340;&#2381;&#2352; &#2325;&#2366; &#2319;&#2325; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Desert ecosystem</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2352;&#2370;&#2360;&#2381;&#2341;&#2354; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2340;&#2306;&#2340;&#2381;&#2352;</span>",

      "<span class=\"eqt\">Wetland ecosystem</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2342;&#2381;&#2352; &#2349;&#2370;&#2350;&#2367; &#2346;&#2366;&#2352;&#2367;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2325; &#2340;&#2306;&#2340;&#2381;&#2352;</span>"

    "solution": "<p>&#183; Ecosystem can be divided into two basic categories, namely the terrestrial and the aquatic.</p><p>&#183; Forest, grassland and <b>desert</b> are some examples of terrestrial ecosystems; pond, lake, wetland, river and estuary are some examples of aquatic ecosystems.</p>",

    "question": "<span class=\"eqt\"><p>Who among the following introduced the Mansabdar system in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2344;&#2360;&#2348;&#2342;&#2366;&#2352; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Babur</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2348;&#2352;</span>",
      "<span class=\"eqt\">Akbar</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2348;&#2352;</span>",
      "<span class=\"eqt\">Jahangir</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2361;&#2366;&#2306;&#2327;&#2368;&#2352;</span>",
      "<span class=\"eqt\">Aurangzeb</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2352;&#2306;&#2327;&#2332;&#2375;&#2348;</span>"
    ],
    "solution": "<p>- The Mansabdar was a military unit within the administrative system of the Mughal Empire introduced by <b>Akbar</b>.</p><p>- The word mansab is of Arabic origin meaning rank or position. The system determined the rank and status of a government official and military generals.Every civil and military officer was given a mansab, which determined their salaries &amp; allowances.</p><p>- The term manasabadar means a person having a mansab(which means a role).</p><p>- In the mansabdari system founded by Akbar, the mansabdars were military commanders, high civil and military officers, and provincial governors. Those mansabdars whose rank was one thousand or below were called Amir, while those above 1,000 were called Amir-al Kabir (Great Amir). Some great Amirs whose ranks were above 5,000 were also given the title of Amir-al Umara (Amir of Amirs).</p>",
    "question_index": 46
  },
  {

  {
    "question": "<span class=\"eqt\"><p>If it's Aug-10 11:15am in Lucknow India, what is the time in Tokyo Japan?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; 10 &#2309;&#2327;&#2360;&#2381;&#2340; &#2325;&#2379; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2354;&#2326;&#2344;&#2314; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344; 11:15 &#2348;&#2332;&#2375; &#2361;&#2376;, &#2340;&#2379; &#2332;&#2366;&#2346;&#2366;&#2344; &#2325;&#2375; &#2335;&#2379;&#2325;&#2381;&#2351;&#2379; &#2350;&#2375;&#2306; &#2325;&#2381;&#2351;&#2366; &#2360;&#2350;&#2351; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Aug 10, 11:15 pm</span><span class=\"hqt\" style=\"display:none\">10 &#2309;&#2327;&#2360;&#2381;&#2340;, 11:15 &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344;</span>",
      "<span class=\"eqt\">Aug 11, 2:45 am</span><span class=\"hqt\" style=\"display:none\">11 &#2309;&#2327;&#2360;&#2381;&#2340;, 2:45 &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344;</span>",
      "<span class=\"eqt\">Aug 10, 2:45 pm</span><span class=\"hqt\" style=\"display:none\">10 &#2309;&#2327;&#2360;&#2381;&#2340;, 2:45 &#2309;&#2346;&#2352;&#2366;&#2361;&#2381;&#2344;</span>",
      "<span class=\"eqt\">Aug 11,11:00 am</span><span class=\"hqt\" style=\"display:none\">11 &#2309;&#2327;&#2360;&#2381;&#2340;, 11:00 &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>IST (Indian Standard Time) is 5 hours and 30 minutes ahead of GMT. So, 11:15 AM IST is 5:45 AM GMT.</p><p>JST (Japan Standard Time) is 9 hours ahead of GMT. So, 5:45 AM GMT is 2:45 PM JST.</p><p>Greenwich Mean Time (GMT) is the name for mean solar time of the longitude (0&deg;) of the Royal Greenwich Observatory in England. The meridian at this longitude is called the prime meridian or Greenwich meridian. Greenwich Mean Time has been used to clearly designate epoch by avoiding confusing references to local time systems.</p>",
    "question_index": 48
  },
  {
    "question": "<span class=\"eqt\"><p>It is difficult to cook at high altitudes because</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2343;&#2367;&#2325; &#2314;&#2306;&#2330;&#2366;&#2312; &#2346;&#2352; &#2326;&#2366;&#2344;&#2366; &#2348;&#2344;&#2366;&#2344;&#2366; &#2350;&#2369;&#2358;&#2381;&#2325;&#2367;&#2354; &#2361;&#2376; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367;</p></span>",
    "options": [
      "<span class=\"eqt\">Of high moisture content present</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354; &#2350;&#2375;&#2306; &#2313;&#2330;&#2381;&#2330; &#2344;&#2350;&#2368; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Due to decrease in atmospheric pressure, the boiling point of water increases</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354;&#2368;&#2351; &#2342;&#2348;&#2366;&#2357; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339;, &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2325;&#2381;&#2357;&#2341;&#2344;&#2366;&#2306;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2348;&#2338;&#2364; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Due to decrease in atmospheric pressure, the boiling point of water decreases</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354;&#2368;&#2351; &#2342;&#2348;&#2366;&#2357; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339;, &#2346;&#2366;&#2344;&#2368; &#2325;&#2366; &#2325;&#2381;&#2357;&#2341;&#2344;&#2366;&#2306;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2328;&#2335; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Due to falling temperature more heat is required</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2367;&#2352;&#2340;&#2375; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2309;&#2343;&#2367;&#2325; &#2314;&#2359;&#2381;&#2350;&#2366; &#2325;&#2368; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325;&#2340;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;</span>"
    ],
    "solution": "<p>At higher altitudes, the atmospheric pressure becomes less because of less amount of air is present over that region and hence less weight and so less pressure. Boiling point of a liquid is the temperature at which the saturated vapour pressure of the liquid becomes equal to the outside atmospheric pressure. As the pressure at higher altitudes is less, the liquid starts boiling at lower temperature. Hence water would boil at a temperature less than 100 C. As temperature becomes less than the heat content would become less for every unit mass of water. So transferring heat to the food materials would take a longer time and hence cooking becomes difficult.</p>",
    "question_index": 49
  },

    "question": "<span class=\"eqt\"><p>Study the data carefully and answer the following questions:</p><p>Below pie chart shows the percentage distribution of people who like playing five different musical instruments:</p><p><img width=576 height=336 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p14931/image015.png\"></p><p>What is the ratio of the number of people who like playing Piano to the number of people who like playing Sarod?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2306;&#2325;&#2396;&#2379;&#2306; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;:</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2313;&#2344; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2332;&#2379; &#2346;&#2366;&#2305;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2306;&#2327;&#2368;&#2340; &#2357;&#2366;&#2342;&#2381;&#2351;&#2351;&#2306;&#2340;&#2381;&#2352; &#2348;&#2332;&#2366;&#2344;&#2366; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;:</p><p><img width=\"576\" height=\"336\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p14931/image015.png\"></p><p>&#2346;&#2367;&#2351;&#2366;&#2344;&#2379; &#2348;&#2332;&#2366;&#2344;&#2366; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2360;&#2352;&#2379;&#2342; &#2348;&#2332;&#2366;&#2344;&#2366; &#2346;&#2360;&#2306;&#2342; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2354;&#2379;&#2327;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">5: 6</span><span class=\"hqt\" style=\"display:none\">5: 6</span>",
      "<span class=\"eqt\">6: 5</span><span class=\"hqt\" style=\"display:none\">6: 5</span>",
      "<span class=\"eqt\">5: 4</span><span class=\"hqt\" style=\"display:none\">5: 4</span>",
      "<span class=\"eqt\">4: 3</span><span class=\"hqt\" style=\"display:none\">4: 3</span>"

    "solution": "<p>the percentage of people who like playing piano = 15%</p><p>the percentage of people who like playing sarod = 12%</p><p>Required ratio = 15/100: 12/100 = 15 : 12 = 5: 4</p>",

  },

    "question": "<span class=\"eqt\"><p>The solution of the following equations is:</p><p>9x + y - 2z = 12</p><p>5x + 3y - z = 9</p><p>x - y - 2z = 2</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2366; &#2361;&#2354; &#2361;&#2376;:</p><p>9x + y - 2z = 12</p><p>5x + 3y - z = 9</p><p>x - y - 2z = 2</p></span>",
    "options": [
      "<span class=\"eqt\">x = -1, y = 1, z = 1</span><span class=\"hqt\" style=\"display:none\">x = -1, y = 1, z = 1</span>",
      "<span class=\"eqt\">x = 1, y = 1, z = -1</span><span class=\"hqt\" style=\"display:none\">x = 1, y = 1, z = -1</span>",
      "<span class=\"eqt\">x = 1, y = -1, z = 1</span><span class=\"hqt\" style=\"display:none\">x = 1, y = -1, z = 1</span>",
      "<span class=\"eqt\">x = -1, y = -1, z = 1</span><span class=\"hqt\" style=\"display:none\">x = -1, y = -1, z = 1</span>"
    ],
    "solution": "<p>Instead of solving these equations, we may check the option which satisfies them.</p><p>Option a:</p><p>9 x (-1) + 1 - 2 x 1 = -9 + 1 - 2 = -10 [Not equal to 10]</p><p>Option b:</p><p>-->9 x 1 + 1 - 2 x (-1) = 12</p><p>-->5 x 1 + 3 x 1 - (-1) = 9</p><p>-->1 - 1 - 2 x (-1) = 2</p><p>All three equations are satisfied.</p><p>Hence option b is correct.</p><p></p>",
    "question_index": 51
  },
  {
    "question": "<span class=\"eqt\"><p>In a company, there are total 1200 employees and ratio of male to female employees is 7: 5. If 70% of the employees like chocolate and 40% of total female like chocolate, then how many male employees like chocolate?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2350;&#2375;&#2306; &#2325;&#2369;&#2354; 1200 &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2368; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2346;&#2369;&#2352;&#2369;&#2359; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 7: 5 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 70% &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2330;&#2377;&#2325;&#2354;&#2375;&#2335; &#2346;&#2360;&#2306;&#2342; &#2361;&#2376; &#2324;&#2352; &#2325;&#2369;&#2354; &#2350;&#2361;&#2367;&#2354;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; 40% &#2325;&#2379; &#2330;&#2377;&#2325;&#2354;&#2375;&#2335; &#2346;&#2360;&#2306;&#2342; &#2361;&#2376;, &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359; &#2325;&#2352;&#2381;&#2350;&#2330;&#2366;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2330;&#2377;&#2325;&#2354;&#2375;&#2335; &#2346;&#2360;&#2306;&#2342; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">620</span><span class=\"hqt\" style=\"display:none\">620</span>",
      "<span class=\"eqt\">680</span><span class=\"hqt\" style=\"display:none\">680</span>",
      "<span class=\"eqt\">640</span><span class=\"hqt\" style=\"display:none\">640</span>",
      "<span class=\"eqt\">320</span><span class=\"hqt\" style=\"display:none\">320</span>"
    ],
    "solution": "<p>Total employees who like chocolate = 1200 * 70/100 = 840</p><p>Total female employees = 1200 * 5/12 = 500</p><p>Total female employees who like chocolate = 500 * 40/100 = 200</p><p>Thus, male employees who like chocolate = 840  -  200 = 640</p>",

    "question": "<span class=\"eqt\"><p>A dishonest shopkeeper claims to sell salt at a rate of Rs.41/kg. The cost price of the salt is Rs.41/kg. Not satisfied with this, he tries to make a profit by removing 120 gm from each kg. What is the shopkeeper's gain percentage to the nearest whole number?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2375;&#2312;&#2350;&#2366;&#2344; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; 41 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; kg &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; &#2344;&#2350;&#2325; &#2348;&#2375;&#2330;&#2344;&#2375; &#2325;&#2366; &#2342;&#2366;&#2357;&#2366; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2350;&#2325; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; 41 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; kg &#2361;&#2376;&#2404; &#2311;&#2360;&#2360;&#2375; &#2360;&#2306;&#2340;&#2369;&#2359;&#2381;&#2335; &#2344; &#2361;&#2379;&#2344;&#2375; &#2346;&#2352;, &#2357;&#2361; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; kg &#2360;&#2375; 120 gm &#2344;&#2367;&#2325;&#2366;&#2354;&#2325;&#2352; &#2354;&#2366;&#2349; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2325;&#2379;&#2358;&#2367;&#2358; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2325;&#2366; &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">14%</span><span class=\"hqt\" style=\"display:none\">14%</span>",
      "<span class=\"eqt\">12%</span><span class=\"hqt\" style=\"display:none\">12%</span>",
      "<span class=\"eqt\">15%</span><span class=\"hqt\" style=\"display:none\">15%</span>",
      "<span class=\"eqt\">10%</span><span class=\"hqt\" style=\"display:none\">10%</span>"

    "solution": "<p>Gain% = (faulty weight - actual weight) x 100/actual weight</p><p>Gain% = (1000 - 880) x 100/880 = 1200/88 = 300/22 = 13.6 = 14%</p><p></p>",
    "question_index": 54

    "question": "<span class=\"eqt\"><p><b>Directions:</b>       The following pie charts shows the distribution (percentage wise) of number of table fans sold by five different companies in 2015 and 2016.</p><p>Total number of table fans sold by all companies together in 2015 and 2016 are 3600 and 4000 respectively.</p><p><img width=288 height=336 id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19101/image006.png\"><img width=317 height=336 id=\"Chart 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19101/image007.png\"></p><p>What is the percentage decrease in sales of table fans from 2015 to 2016 for company E?</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;:</b> &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; 2015 &#2324;&#2352; 2016 &#2350;&#2375;&#2306; &#2346;&#2366;&#2305;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2335;&#2375;&#2348;&#2354; &#2347;&#2376;&#2344; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2357;&#2367;&#2340;&#2352;&#2339; (&#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2366;&#2352;) &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>2015 &#2324;&#2352; 2016 &#2350;&#2375;&#2306; &#2319;&#2325; &#2360;&#2366;&#2341; &#2360;&#2349;&#2368; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2335;&#2375;&#2348;&#2354; &#2347;&#2376;&#2344; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 3600 &#2324;&#2352; 4000 &#2361;&#2376;&#2404;</p><p><img width=\"288\" height=\"336\" id=\"Chart 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19101/image006.png\"><img width=\"317\" height=\"336\" id=\"Chart 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19101/image007.png\"></p><p>&#2325;&#2306;&#2346;&#2344;&#2368; E &#2325;&#2375; &#2354;&#2367;&#2319; 2015 &#2360;&#2375; 2016 &#2340;&#2325; &#2335;&#2375;&#2348;&#2354; &#2347;&#2376;&#2344; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2368; &#2325;&#2350;&#2368; &#2361;&#2369;&#2312;?</p></span>",

    "question": "<span class=\"eqt\"><p>To fill a bottle with mineral water, it costs Rs. 0.2 per ml. Find the cost of filling 22 bottles each of 150 ml capacity.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2379;&#2340;&#2354; &#2325;&#2379; &#2350;&#2367;&#2344;&#2352;&#2354; &#2357;&#2366;&#2335;&#2352; &#2360;&#2375; &#2349;&#2352;&#2344;&#2375; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; 0.2 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; ml &#2361;&#2376;&#2404; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; 150 ml &#2343;&#2366;&#2352;&#2367;&#2340;&#2366; &#2357;&#2366;&#2354;&#2368; 22 &#2348;&#2379;&#2340;&#2354;&#2379;&#2306; &#2325;&#2379; &#2349;&#2352;&#2344;&#2375; &#2325;&#2368; &#2354;&#2366;&#2327;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs. 330</span><span class=\"hqt\" style=\"display:none\">330 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
