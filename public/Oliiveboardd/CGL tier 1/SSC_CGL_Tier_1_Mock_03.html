    "solution": "<p>Ratio of number of red marbles to that of blue marbles in jar B = 1.3 or 13: 10</p><p>Given,</p><p>(13 + 10)/2 units = 69</p><p>1 unit = 69 * 2/23 = 6</p><p>Number of red marbles in jar B = 13 * 6 = 78</p><p>Number of blue marbles in jar B = 10 * 6 = 60</p><p>Number of red marbles in jar E = 78 * 7/6 = 91 [50/3% = 1/6]</p><p>Ratio of number of red marbles to that of blue marbles in jar E = 1.4 or 7: 5</p><p>So, 7 units = 91</p><p>1 unit = 13</p><p>5 units = 13 * 5 = 65</p>",

    "question": "<span class=\"eqt\"><p>A shopkeeper gains 33% in place of 17% loss if the selling price of an article is increased by Rs.650. The cost price of the article is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2375; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2350;&#2375;&#2306; &#2352;&#2369;.650 &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2325;&#2379; 17% &#2361;&#2366;&#2344;&#2367; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; 33% &#2325;&#2366; &#2354;&#2366;&#2349; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2361;&#2376;:</p></span>",

      "<span class=\"eqt\">Rs.1250</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.1250</span>",

    "question": "<span class=\"eqt\"><p>Find the value of tan 10&deg; x tan 50&deg; x tan 70&deg;.</p></span><span class=\"hqt\" style=\"display:none\"><p>tan 10&deg; * tan 50&deg; * tan 70&deg; &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">1/&radic;3</span><span class=\"hqt\" style=\"display:none\">1/&radic;3</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>tan 10&deg; * tan 50&deg; * tan 70&deg;</p><p>= tan 10&deg; * tan (60  -  10)&deg; * tan (60 + 10)&deg;</p><p>We know that:</p><p>tan A tan (60&deg;  -  A) tan (60&deg; + A) = tan 3A</p><p>So,</p><p>tan 10&deg; * tan (60  -  10)&deg; * tan (60 + 10)&deg;</p><p>= tan (3 * 10&deg;)</p><p>= tan 30&deg;</p><p>= 1/&radic;3</p>",
    "question_index": 67
  },

    "question": "<span class=\"eqt\"><p>At a movie night, Asha bought snacks for her 7 friends for a total of &#8377;240. Some of them wanted popcorn, while others wanted nachos. A regular tub of popcorn cost &#8377;40 and a regular serving of nachos cost &#8377;30. How many servings of nachos did she purchase?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2350;&#2370;&#2357;&#2368; &#2344;&#2366;&#2311;&#2335; &#2350;&#2375;&#2306;, &#2310;&#2358;&#2366; &#2344;&#2375; &#2309;&#2346;&#2344;&#2375; 7 &#2342;&#2379;&#2360;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2369;&#2354; &#8377;240 &#2325;&#2366; &#2344;&#2366;&#2358;&#2381;&#2340;&#2366; &#2326;&#2352;&#2368;&#2342;&#2366;&#2404; &#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2369;&#2331; &#2325;&#2379; &#2346;&#2377;&#2346;&#2325;&#2377;&#2352;&#2381;&#2344; &#2330;&#2366;&#2361;&#2367;&#2319; &#2341;&#2366;, &#2332;&#2348;&#2325;&#2367; &#2309;&#2344;&#2381;&#2351; &#2325;&#2379; &#2344;&#2366;&#2330;&#2379;&#2360; &#2330;&#2366;&#2361;&#2367;&#2319; &#2341;&#2366;&#2404; &#2346;&#2377;&#2346;&#2325;&#2377;&#2352;&#2381;&#2344; &#2325;&#2375; &#2319;&#2325; &#2352;&#2375;&#2327;&#2369;&#2354;&#2352; &#2335;&#2348; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#8377;40 &#2341;&#2368; &#2324;&#2352; &#2344;&#2366;&#2330;&#2379;&#2360; &#2325;&#2368; &#2319;&#2325; &#2352;&#2375;&#2327;&#2369;&#2354;&#2352; &#2360;&#2352;&#2381;&#2357;&#2367;&#2306;&#2327; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340; &#8377;30 &#2341;&#2368;&#2404; &#2313;&#2360;&#2344;&#2375; &#2344;&#2366;&#2330;&#2379;&#2360; &#2325;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2360;&#2352;&#2381;&#2357;&#2367;&#2306;&#2327; &#2326;&#2352;&#2368;&#2342;&#2368;?</p></span>",

    "question": "<p><b> </b>Select the option that expresses the given sentence in passive voice.</p><p>The marketing team is analysing the customer feedback.</p>",

    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive Voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of the verb [being] is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in <b>Present Continuous</b>. Thus, the Passive voice will also be in Present Continuous.</p><p>The format of Active voice is: Subject + am/is/are + V1 + ing + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + am/is/are + being + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>Arnab is typing a document. (Active Voice)</p><p>A document is being typed by Arnab. (Passive Voice)</p><p>The options except (b) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is: \"The customer feedback is being analysed by the marketing team.\"</p><p>Hence, option (b) is correct. </p>",

    "question": "<p>The following sentence has been split into three segments. Identify the segment that contains a grammatical error. If the sentence is error free, mark 'No error' as your answer.</p><p>They should considered/ the long-term effects/ of their decision.</p>",

    "question": "<p>Select the option that will improve the underlined part of the given sentence. In case no improvement is needed, select 'No improvement required'.</p><p>Coastal areas are home to <u>much animals and plants</u> that live together in a delicate balance.</p>",
