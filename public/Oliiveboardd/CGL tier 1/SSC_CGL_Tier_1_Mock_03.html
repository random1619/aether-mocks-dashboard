<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveboard Quiz</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="60">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Oliveboard Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Oliveboard Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>How many triangles are there in the given figure? </p><p><img width=151 height=148 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26206/image007.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2310;&#2325;&#2371;&#2340;&#2367; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2361;&#2376;&#2306;?</p><p><img width=\"151\" height=\"148\" id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26206/image007.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">22</span><span class=\"hqt\" style=\"display:none\">22</span>",
      "<span class=\"eqt\">25</span><span class=\"hqt\" style=\"display:none\">25</span>",
      "<span class=\"eqt\">23</span><span class=\"hqt\" style=\"display:none\">23</span>"
    ],
    "solution": "<p><img width=191 height=175 id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26206/image008.jpg\"></p><p>The triangles are FAD, BAD, FAB, JAH, HAC, JAC, FGJ, JGK, JFK, JHM, AJM, KLM, MLI, KMI, CHM, JMC, BEC, CEI, BCI, ACM. </p><p>So, there are 20 triangles. </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Select the correct combination of mathematical signs to sequentially replace the * signs and balance the given equation.</p><p>140 * 28 * 7 * 56 * 14 = 77</p></span><span class=\"hqt\" style=\"display:none\"><p>* &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2361;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>140 * 28 * 7 * 56 * 14 = 77</p></span>",
    "options": [
      "<span class=\"eqt\">&div;,  X , +,  -</span><span class=\"hqt\" style=\"display:none\">&div;, X , +, -</span>",
      "<span class=\"eqt\">+,  - ,  X , &div;</span><span class=\"hqt\" style=\"display:none\">+, - , X , &div;</span>",
      "<span class=\"eqt\">- , &div;,  X , +</span><span class=\"hqt\" style=\"display:none\">- , &div;, X , +</span>",
      "<span class=\"eqt\">&div;,  - , +,  X</span><span class=\"hqt\" style=\"display:none\">&div;, - , +, X</span>"
    ],
    "solution": "<p>Option (a): &div;,  X , +,  - </p><p>140 &div; 28  X  7 + 56  -  14 = 77</p><p>35 + 56  -  14 = 77</p><p>91  -  14 = 77</p><p><b>77 = 77</b></p><p>LHS is equal to RHS.</p><p>Thus, <b>option (a) is</b> correct.</p><p>Option (b): +,  - ,  X , &div;</p><p>140 + 28  -  7  X  56 &div; 14 = 77</p><p>140 + 28  -  7  X  4 = 77</p><p>140 + 28  -  28 = 77</p><p>140 &#8800; 77</p><p>LHS is not equal to RHS.</p><p>Thus, option (b) is incorrect.</p><p>Option (c):  - , &div;,  X , +</p><p>140  -  28 &div; 7  X  56 + 14 = 77</p><p>140  -  224 + 14 = 77</p><p>140  -  210 = 77</p><p>-70 &#8800; 77</p><p>LHS is not equal to RHS.</p><p>Thus, option (c) is incorrect.</p><p>Option (d): &div;,  - , +,  X </p><p>140 &div; 28  -  7 + 56  X  14 = 77</p><p>5  -  7 + 56  X  14 = 77</p><p>5  -  7 + 784 = 77</p><p>782 &#8800; 77</p><p>LHS is not equal to RHS.</p><p>Thus, option (d) is incorrect.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In the following question, three statements are given and three conclusions are given below these statements. Choose the option which shows the conclusions which logically follow from the given statements, disregarding the commonly known facts.</p><p><b>Statements:</b></p><p>Some Bulbs are Lights</p><p>No Chrome is Light</p><p>All Sunny are Chrome</p><p><b>Conclusions:</b></p><p>I. Some Bulbs are not Chrome</p><p>II. No Sunny is Light</p><p>III. Some Lights are Chrome</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306; &#2324;&#2352; &#2311;&#2344; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2375; &#2344;&#2368;&#2330;&#2375; &#2340;&#2368;&#2344; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2379; &#2330;&#2369;&#2344;&#2375;&#2306; &#2332;&#2379; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2309;&#2357;&#2361;&#2375;&#2354;&#2344;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;/&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><b>&#2325;&#2341;&#2344;:</b></p><p>&#2325;&#2369;&#2331; &#2348;&#2354;&#2381;&#2348;, &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2361;&#2376;&#2306;</p><p>&#2325;&#2379;&#2312; &#2325;&#2381;&#2352;&#2379;&#2350;, &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</p><p>&#2360;&#2349;&#2368; &#2360;&#2344;&#2368;, &#2325;&#2381;&#2352;&#2379;&#2350; &#2361;&#2376;&#2306;</p><p><b>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</b></p><p>I. &#2325;&#2369;&#2331; &#2348;&#2354;&#2381;&#2348;, &#2325;&#2381;&#2352;&#2379;&#2350; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;</p><p>II. &#2325;&#2379;&#2312; &#2360;&#2344;&#2368;, &#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</p><p>III. &#2325;&#2369;&#2331; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;, &#2325;&#2381;&#2352;&#2379;&#2350; &#2361;&#2376;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">Only conclusion I follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both conclusions I and II follow</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only conclusion III follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; III &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both conclusions II and III follow</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2324;&#2352; III &#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"
    ],
    "solution": "<p><b>Statements:</b></p><p>Some Bulbs are Lights</p><p>No Chrome is Light</p><p>All Sunny are Chrome</p><p><img width=411 height=173 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26589/image006.png\"></p><p>Some Bulbs are not Chrome: Some Bulbs are Lights. No Chrome is Lights. Thus, the Bulbs which is Lights are not Chrome. So, conclusion I follows.</p><p>No Sunny is Light: No Chrome is Lights. All Sunny are Chrome. Thus, No Sunny is Light. So, conclusion II follows.</p><p>Some Lights are Chrome: No Chrome is Lights. So, conclusion III does not follows.</p><p>Hence, Both conclusions I and II follow.</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>Which two signs should be interchanged to make the given equation correct?</p><p>92 &div; 23  -  46  X  2 + 30 = 66</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344;-&#2360;&#2375; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2346;&#2352;&#2360;&#2381;&#2346;&#2352; &#2348;&#2342;&#2354;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;?</p><p>92 &div; 23 - 46 X 2 + 30 = 66</p></span>",
    "options": [
      "<span class=\"eqt\">&div; and  -</span><span class=\"hqt\" style=\"display:none\">&div; &#2324;&#2352; -</span>",
      "<span class=\"eqt\">+ and  X</span><span class=\"hqt\" style=\"display:none\">+ &#2324;&#2352; X</span>",
      "<span class=\"eqt\">-  and +</span><span class=\"hqt\" style=\"display:none\">- &#2324;&#2352; +</span>",
      "<span class=\"eqt\">&div; and  X</span><span class=\"hqt\" style=\"display:none\">&div; &#2324;&#2352; X</span>"
    ],
    "solution": "<p>Option (a): &div; and  - </p><p>After interchanging-</p><p>92  -  23 &div; 46  X  2 + 30 = 66</p><p>92  -  1 + 30 = 66</p><p>92 + 29 = 66</p><p>121 &#8800; 66</p><p>LHS is not equal to RHS.</p><p>Thus, option (a) is incorrect.</p><p>Option (b): + and  X </p><p>After interchanging-</p><p>92 &div; 23  -  46 + 2  X  30 = 66</p><p>4  -  46 + 60 = 66</p><p>4 + 14 = 66</p><p>18 &#8800; 66</p><p>LHS is not equal to RHS.</p><p>Thus, option (b) is incorrect.</p><p>Option (c):  -  and +</p><p>After interchanging-</p><p>92 &div; 23 + 46  X  2  -  30 = 66</p><p>4 + 92  -  30 = 66</p><p>96  -  30 = 66</p><p><b>66 = 66</b></p><p>LHS is equal to RHS.</p><p>Thus, <b>option (c) is</b> correct.</p><p>Option (d): &div; and  X </p><p>After interchanging-</p><p>92  X  23  -  46 &div; 2 + 30 = 66</p><p>2116  -  23 + 30 = 66</p><p>2116 + 7 = 66</p><p>2123 &#8800; 66</p><p>LHS is not equal to RHS.</p><p>Thus, option (d) is incorrect.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option that represents the letters which, when sequentially placed from left to right in the blanks below, will complete the letter series.</p><p>H _ J K _ _ I _ K _ H I _ K L </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2313;&#2344; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2352;&#2367;&#2325;&#2381;&#2340; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2366;&#2319;&#2305; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2352;&#2326;&#2344;&#2375; &#2346;&#2352; &#2309;&#2325;&#2381;&#2359;&#2352; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2346;&#2370;&#2352;&#2368; &#2361;&#2379; &#2332;&#2366;&#2319;&#2327;&#2368;&#2404;</p><p>H _ J K _ _ I _ K _ H I _ K L</p></span>",
    "options": [
      "<span class=\"eqt\">ILHJLJ</span><span class=\"hqt\" style=\"display:none\">ILHJLJ</span>",
      "<span class=\"eqt\">HJLIJL</span><span class=\"hqt\" style=\"display:none\">HJLIJL</span>",
      "<span class=\"eqt\">IJLHIJ</span><span class=\"hqt\" style=\"display:none\">IJLHIJ</span>",
      "<span class=\"eqt\">HILJIH</span><span class=\"hqt\" style=\"display:none\">HILJIH</span>"
    ],
    "solution": "<p>Option (a): ILHJLJ</p><p>H <b>I</b> J K <b>L H</b> I <b>J </b>K <b>L</b> H I <b>J</b> K L </p><p>Thus, the series is 'HIJKL' is repeated 3 times.</p><p>So<b>, option (a) is</b> correct.</p><p>Option (b): HJLIJL</p><p>H <b>H</b> J K <b>J L</b> I <b>I</b> K <b>J</b> H I <b>L</b> K L </p><p>There is no pattern. So, option (b) is incorrect.</p><p>Option (c): IJLHIJ</p><p>H <b>I</b> J K <b>J L</b> I <b>H</b> K <b>I</b> H I <b>J</b> K L </p><p>There is no pattern. So, option (c) is incorrect.</p><p>Option (d): HILJIH</p><p>H <b>H</b> J K <b>I L</b> I <b>J</b> K <b>I</b> H I <b>H</b> K L </p><p>There is no pattern. So, option (d) is incorrect.</p><p>Thus, the answer is option (a).</p>",
    "question_index": 4

    "question": "<span class=\"eqt\"><p>Three of the following four number-pairs are alike in a certain way and thus form a group. Which of the pair that does not belong to that group?</p><p>(NOTE: Operations should be performed on the whole numbers, without breaking down the numbers into its constituent digits. E.g. 13  -  Operations on 13 such as adding/ subtracting/ multiplying etc. to 13 can be performed. Breaking down 13 into 1 and 3 and then performing mathematical operations on 1 and 3 is not allowed.)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2330;&#2366;&#2352; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;-&#2351;&#2369;&#2327;&#2381;&#2350; &#2350;&#2375;&#2306; &#2360;&#2375; &#2340;&#2368;&#2344; &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2352;&#2368;&#2325;&#2375; &#2360;&#2375; &#2319;&#2325; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306; &#2324;&#2352; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2348;&#2344;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2313;&#2360; &#2360;&#2350;&#2370;&#2361; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p><p>(<b>&#2344;&#2379;&#2335;:</b> &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2379; &#2313;&#2344;&#2325;&#2375; &#2328;&#2335;&#2325; &#2309;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2319; &#2348;&#2367;&#2344;&#2366;, &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2346;&#2352; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2325;&#2368; &#2332;&#2366;&#2344;&#2368; &#2330;&#2366;&#2361;&#2367;&#2319;&#2404; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; 13 - 13 &#2346;&#2352; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2332;&#2376;&#2360;&#2375; 13 &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2344;&#2366;/&#2328;&#2335;&#2366;&#2344;&#2366;/&#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2344;&#2366; &#2310;&#2342;&#2367; &#2325;&#2368; &#2332;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404; 13 &#2325;&#2379; 1 &#2324;&#2352; 3 &#2350;&#2375;&#2306; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2324;&#2352; &#2347;&#2367;&#2352; 1 &#2324;&#2352; 3 &#2346;&#2352; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2306;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2319;&#2305; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2309;&#2344;&#2369;&#2350;&#2340;&#2367; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;)</p></span>",

    "question": "<span class=\"eqt\"><p>How many letters are there in the English alphabetical series between the lowest and the highest alphabet as per the English alphabetical series used in the word 'DECIDE'?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2348;&#2381;&#2342; 'DECIDE' &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2351;&#2369;&#2325;&#2381;&#2340; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2379;&#2306; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2340;&#2350; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330;&#2340;&#2350; &#2357;&#2352;&#2381;&#2339; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2361;&#2376;&#2306;?</p></span>",

    "solution": "<p>The given word is DECIDE.</p><p>The lowest alphabet used is <b>C</b> and the highest alphabet used is<b> I</b> as per the English alphabetical series.</p><p>Thus, letters between C and I in the English alphabetical series are D, E, F, G, H.</p><p>So, there are 5 such letters.</p>",

    "question": "<span class=\"eqt\"><p>'1 &#8368; 2' means '1 is the daughter of 2'</p><p>'1 &#8776; 2' means '1 is the son of 2'</p><p>'1 &#8706; 2' means '1 is the brother of 2'</p><p>'1 &#8710; 2' means '1 is the wife of 2'</p><p>As per which of the following expressions 'Z is the grandfather of U'?</p></span><span class=\"hqt\" style=\"display:none\"><p>'1 &#8368; 2' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '1, 2 &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;'</p><p>'1 &#8776; 2' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '1, 2 &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;'</p><p>'1 &#8706; 2' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '1, 2 &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;'</p><p>'1 &#8710; 2' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '1, 2 &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;'</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; 'Z, U &#2325;&#2366; &#2342;&#2366;&#2342;&#2366;/&#2344;&#2366;&#2344;&#2366; &#2361;&#2376;'?</p></span>",
    "options": [
      "<span class=\"eqt\">W &#8706; U &#8368; Y &#8776; Z</span><span class=\"hqt\" style=\"display:none\">W &#8706; U &#8368; Y &#8776; Z</span>",
      "<span class=\"eqt\">U &#8368; W &#8776; X &#8710; Z</span><span class=\"hqt\" style=\"display:none\">U &#8368; W &#8776; X &#8710; Z</span>",
      "<span class=\"eqt\">Z &#8710; T &#8706; W &#8710; U</span><span class=\"hqt\" style=\"display:none\">Z &#8710; T &#8706; W &#8710; U</span>",
      "<span class=\"eqt\">U &#8368; V &#8710; X &#8776; Z</span><span class=\"hqt\" style=\"display:none\">U &#8368; V &#8710; X &#8776; Z</span>"
    ],
    "solution": "<p>Option (a): W &#8706; U &#8368; Y &#8776; Z</p><p>W &#8706; U means 'W is the brother of U'</p><p>U &#8368; Y means 'U is the daughter of Y'</p><p>Y &#8776; Z means 'Y is the son of Z'</p><p><img width=184 height=162 id=\"Picture 13\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25407/image023.png\"></p><p>Z is either the grandfather or grandmother of U.</p><p>Option (b): U &#8368; W &#8776; X &#8710; Z</p><p>U &#8368; W means 'U is the daughter of W'</p><p>W &#8776; X means 'W is the son of X'</p><p>X &#8710; Z means 'X is the wife of Z'</p><p><img width=170 height=178 id=\"Picture 15\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25407/image024.png\"></p><p>Z is the grandfather of U.</p><p>Option (c): Z &#8710; T &#8706; W &#8710; U</p><p>Z &#8710; T means 'Z is the wife of T'</p><p>T &#8706; W means 'T is the brother of W'</p><p>W &#8710; U means 'W is the wife of U'</p><p><img width=361 height=40 id=\"Picture 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25407/image025.png\"></p><p>Z is the sister-in-law of U.</p><p>Option (d): U &#8368; V &#8710; X &#8776; Z</p><p>U &#8368; V means 'U is the daughter of V'</p><p>V &#8710; X means 'V is the wife of X'</p><p>X &#8776; Z means 'X is the son of Z'</p><p><img width=170 height=169 id=\"Picture 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25407/image026.png\"></p><p>Z is either the grandfather or grandmother of U.</p><p>Thus, the answer is option (b).</p>",
    "question_index": 21
  },

    "question": "<span class=\"eqt\"><p>Select the figure from among the given options that can replace the question mark (?) in the following series.</p><p><img width=629 height=264 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22066/image018.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376; &#2404;</p><p><img width=\"629\" height=\"264\" id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22066/image018.jpg\"></p></span>",

    "solution": "<p>Petals of middle flower is increasing in each step.</p><p>For letters  - </p><p>C + 3 = F</p><p>F + 3 = I</p><p>I + 3 = L</p><p>L + 3 = O</p><p>O + 3 = R</p><p>For numbers  - </p><p>2  X  2 = 4</p><p>4  X  3 = 12</p><p>12  X  2 = 24</p><p>24  X  3 = 72</p><p>72  X  2 = 144</p><p>Also number is shifting its position in anticlockwise direction in each step.</p><p>Arrow figure is rotating 45<img width=9 height=15 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22066/image019.png\"> anticlockwise in each step and also changing its position alternately from corner to corner.</p><p>Thus, we get option figure (II) as answer  - </p><p><img width=183 height=205 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22066/image020.png\"></p>",

    "question": "<span class=\"eqt\"><p>Select the set in which the numbers are related in the same way as are the numbers of the following sets.</p><p>In a certain code language, 'all about yesterday' is written as 'as of if', and 'about yesterday weather' is written as 'if so as'. How will 'weather' be coded in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'all about yesterday' &#2325;&#2379; 'as of if' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2340;&#2341;&#2366; 'about yesterday weather' &#2325;&#2379; 'if so as' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'weather' &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>In March 1919, the Khilafat committee was formed in which city?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2366;&#2352;&#2381;&#2330; 1919 &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2358;&#2361;&#2352; &#2350;&#2375;&#2306; &#2326;&#2367;&#2354;&#2366;&#2347;&#2340; &#2360;&#2350;&#2367;&#2340;&#2367; &#2325;&#2366; &#2327;&#2336;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Calcutta</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2354;&#2325;&#2340;&#2381;&#2340;&#2366;</span>",

    "question": "<span class=\"eqt\"><p>According to the census 2011, which is the second most densely populated state in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>2011 &#2325;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2349;&#2366;&#2352;&#2340; &#2325;&#2366; &#2342;&#2370;&#2360;&#2352;&#2366; &#2360;&#2348;&#2360;&#2375; &#2328;&#2344;&#2368; &#2310;&#2348;&#2366;&#2342;&#2368; &#2357;&#2366;&#2354;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kerala</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2352;&#2354;</span>",

      "<span class=\"eqt\">West Bengal</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2348;&#2306;&#2327;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Assam</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2350;</span>"
    ],
    "solution": "<p>The ratio of people to units of the land area is generally known as the 'Density of Population'. It is calculated on the basis of the total population of a country divided by the total area of the country. According to the census 2011, Bihar is the most thickly populated state (1106 persons/sq km.) followed by <b>West Bengal (1028)</b> and Kerala (860).</p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>Under Article 111, which veto is not enjoyed by the President of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 111 &#2325;&#2375; &#2340;&#2361;&#2340;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2346;&#2366;&#2360; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2368;&#2335;&#2379; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Absolute Veto</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2340;&#2381;&#2351;&#2306;&#2340;&#2367;&#2325; &#2357;&#2368;&#2335;&#2379;</span>",
      "<span class=\"eqt\">Suspensive Veto</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2354;&#2306;&#2348;&#2344;&#2325;&#2366;&#2352;&#2368; &#2357;&#2368;&#2335;&#2379;</span>",
      "<span class=\"eqt\">Pocket Veto</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2377;&#2325;&#2375;&#2335; &#2357;&#2368;&#2335;&#2379;</span>",
      "<span class=\"eqt\">Qualified Veto</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2379;&#2327;&#2381;&#2351; &#2357;&#2368;&#2335;&#2379;</span>"
    ],
    "solution": "<p>The types of vetoes are: </p><p>1) Absolute Veto The power of the President to withhold assent to the bill is termed as his absolute veto. </p><p>2) Suspensive Veto The power of the President to return the bill to the Parliament with or without consideration is called a suspensive veto. </p><p>3) Pocket Veto The power of the President to not act upon the bill is termed as a pocket veto.</p><p>4) Qualified Veto: This can be overridden by the legislature with a higher majority. This is not enjoyed by the President of India.</p>",
    "question_index": 27
  },
  {
    "question": "<span class=\"eqt\"><p>Velocity of sound in moist air is greater than that in dry air. This is because__________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2352;&#2381;&#2342;&#2381;&#2352; &#2357;&#2366;&#2351;&#2369; &#2350;&#2375;&#2306; &#2343;&#2381;&#2357;&#2344;&#2367; &#2325;&#2366; &#2357;&#2375;&#2327; &#2358;&#2369;&#2359;&#2381;&#2325; &#2357;&#2366;&#2351;&#2369; &#2325;&#2368; &#2309;&#2346;&#2375;&#2325;&#2381;&#2359;&#2366; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2320;&#2360;&#2366; &#2311;&#2360;&#2354;&#2367;&#2319; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367;__________&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Density of moist air is higher than dry air</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2342;&#2381;&#2352; &#2357;&#2366;&#2351;&#2369; &#2325;&#2366; &#2328;&#2344;&#2340;&#2381;&#2357; &#2358;&#2369;&#2359;&#2381;&#2325; &#2357;&#2366;&#2351;&#2369; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Density of moist air is less than dry air</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2342;&#2381;&#2352; &#2357;&#2366;&#2351;&#2369; &#2325;&#2366; &#2328;&#2344;&#2340;&#2381;&#2357; &#2358;&#2369;&#2359;&#2381;&#2325; &#2357;&#2366;&#2351;&#2369; &#2360;&#2375; &#2325;&#2350; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Pressure of moist air is less than dry air</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2342;&#2381;&#2352; &#2357;&#2366;&#2351;&#2369; &#2325;&#2366; &#2342;&#2348;&#2366;&#2357; &#2358;&#2369;&#2359;&#2381;&#2325; &#2357;&#2366;&#2351;&#2369; &#2360;&#2375; &#2325;&#2350; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Temperature of moist air is less than dry air</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2342;&#2381;&#2352; &#2357;&#2366;&#2351;&#2369; &#2325;&#2366; &#2340;&#2366;&#2346;&#2350;&#2366;&#2344; &#2358;&#2369;&#2359;&#2381;&#2325; &#2357;&#2366;&#2351;&#2369; &#2360;&#2375; &#2325;&#2350; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "solution": "<p>- The velocity of sound in a solid the depends on the Young's modulus of the medium and the density.</p><p>- Velocity is <b>inversely proportional to the density</b> of the medium.</p><p>- With all factors equal, moist air is less dense than dry air because water has a lower molecular weight than nitrogen and oxygen.</p><p>- As a result, sound travels faster in moist air than it does in dry air.</p>",
    "question_index": 28
  },
  {
    "question": "<span class=\"eqt\"><p>In the Directive Principles of State Policy, which article was inserted through the 97th Amendment Act of 2011?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2344;&#2368;&#2340;&#2367; &#2344;&#2367;&#2342;&#2375;&#2358;&#2325; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306;, 2011 &#2325;&#2375; 97&#2357;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2358;&#2366;&#2350;&#2367;&#2354; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 39A</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 39A</span>",
      "<span class=\"eqt\">Article 43A</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 43A</span>",
      "<span class=\"eqt\">Article 48A</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 48A</span>",
      "<span class=\"eqt\">Article 43B</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 43B</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The 97th Amendment Act of 2011 added a new Directive Principle relating to co-operative societies. It requires the state to promote voluntary formation, autonomous functioning, democratic control and professional management of co-operative societies (Article 43B).</p><p></p><p></p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>After the 1991 Economic reforms, growth is mainly driven by the growth in the _________</p></span><span class=\"hqt\" style=\"display:none\"><p>1991 &#2325;&#2375; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2360;&#2369;&#2343;&#2366;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342;, &#2357;&#2367;&#2325;&#2366;&#2360; &#2350;&#2369;&#2326;&#2381;&#2351; &#2352;&#2370;&#2346; &#2360;&#2375;_____ &#2325;&#2375; &#2357;&#2367;&#2325;&#2366;&#2360; &#2360;&#2375; &#2346;&#2381;&#2352;&#2375;&#2352;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Agriculture sector</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Industrial sector</span><span class=\"hqt\" style=\"display:none\">&#2324;&#2342;&#2381;&#2351;&#2379;&#2327;&#2367;&#2325; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Service sector</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2375;&#2357;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">External sector</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2361;&#2381;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;</span>"
    ],
    "solution": "<p>The growth of GDP increased from 5.6 per cent during 1980-91 to 6.4 per cent during 1992-2001. This shows that there has been an increase in the overall GDP growth in the reform period. During the reform period, the growth of agriculture and industrial sectors has declined whereas the growth of service sector has gone up. This indicates that the growth is mainly driven by the growth in the service sector.</p><p>Source: NCERT- Indian Economic Development</p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following pairs is NOT correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2360;&#2361;&#2368; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ganga : Son</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2327;&#2366; : &#2360;&#2379;&#2344;</span>",
      "<span class=\"eqt\">Godavari : Manjira</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2342;&#2366;&#2357;&#2352;&#2368; : &#2350;&#2306;&#2332;&#2368;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Narmada : Sabari</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2352;&#2381;&#2350;&#2342;&#2366; : &#2360;&#2348;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Kaveri : Arkavathi</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2357;&#2375;&#2352;&#2368; : &#2309;&#2352;&#2381;&#2325;&#2366;&#2357;&#2340;&#2368;</span>"
    ],
    "solution": "<p>Sabari is a tributary of river Godavari.</p><p></p><p>The major tributaries of the given rivers are:</p><p>Narmada river :Banjar River, Barna River, Hiran River and Tawa River.</p><p>Ganga : The Yamuna, the Ramaganga, the Gomti, the Ghagra, the Son, the Gandak, the Burhi Gandak, the Kosi and the Mahananda.</p><p>Godavari : Pravara, Purna, Manjra, Penganga, Wardha, Wainganga, Pranhita, Indravati, Maner and the Sabari.</p><p>Kaveri : Harangi, Hemavati, Arkavathi, Lakshmana Tirtha, Kabini, Bhavani, Noyyal, Amaravati, and Moyar</p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>In which month of Hindu calendar is Holi celebrated?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2379;&#2354;&#2368; &#2361;&#2367;&#2306;&#2342;&#2370; &#2325;&#2376;&#2354;&#2375;&#2306;&#2337;&#2352; &#2325;&#2375; &#2325;&#2367;&#2360; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2312; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Chaitra</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2376;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Ashvina</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2358;&#2381;&#2357;&#2367;&#2344;</span>",
      "<span class=\"eqt\">Phalguna</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2366;&#2354;&#2381;&#2327;&#2369;&#2344;</span>",
      "<span class=\"eqt\">Shravana</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2366;&#2357;&#2339;</span>"
    ],
    "solution": "<p>Traditionally celebrated in late February or early March in the Gregorian calendar, Holi marks the arrival of spring and the end of winter, coinciding with the full moon or Purnima on the evening of the Hindu month of <b>Phalguna.</b></p><p>Holi is one of the most popular Hindu festivals celebrated with much enthusiasm and fanfare across the country. Also known as Festival of colours, in West Bengal, Assam and Tripura, it is also known as the 'Dol jatra' or 'Basanta Utsav'.</p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following festivals is NOT associated with Uttarakhand?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2326;&#2306;&#2337; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; <b>&#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ghughutia</span><span class=\"hqt\" style=\"display:none\">&#2328;&#2369;&#2328;&#2369;&#2340;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Dumboor</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2306;&#2348;&#2370;&#2352;</span>",
      "<span class=\"eqt\">Kandali</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2306;&#2337;&#2366;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Bhitauli</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2367;&#2340;&#2366;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Dumboor is a festival of Tripura.</p><p>Some of the festivals of Uttarakhand are: Haridwar Kumbh Mela, Khatarua, Janopunya, Hilljatra, Ghughutia, Harela, Egaas, Chhipla Jaat, Bhitauli, Anduri Utsav,  Nanda Devi fair, Kanwar Yatra, Kandali Festival, Bissu Mela, Magh Mela, Purnagiri Mela, Syalde Bikhauti Mela, Haatkalika Fair, Jauljibi and Thal fairs and Nanda Devi Raj Jat Mela also take place here, Bat Savitri, Kumaoni Holi (Baithki, Khari and Mahila holi), Ganga Dussehra, International Yoga festival at Rishikesh, Basant Panchami, Makar Sankranti, Ghee Sankranti and Phul Dei, etc.</p>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>Sponges are example of phylum _________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2381;&#2346;&#2306;&#2332;, &#2360;&#2306;&#2328; _________ &#2325;&#2375; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Porifera</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2379;&#2352;&#2367;&#2347;&#2375;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Coelenterata (Cnidaria)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2354;&#2375;&#2344;&#2381;&#2335;&#2375;&#2352;&#2375;&#2335;&#2366; (&#2344;&#2366;&#2311;&#2337;&#2375;&#2352;&#2367;&#2351;&#2366;)</span>",
      "<span class=\"eqt\">Ctenophora</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2368;&#2344;&#2379;&#2347;&#2379;&#2352;&#2366;</span>",
      "<span class=\"eqt\">Platyhelminthes</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2354;&#2375;&#2335;&#2368;&#2361;&#2375;&#2354;&#2381;&#2350;&#2367;&#2341;&#2368;&#2332;</span>"
    ],
    "solution": "<p>The phylum <b>Porifera</b> comprises the sponges. Sponges are simple invertebrate animals that live in aquatic habitats. Although the majority of sponges are marine, some species live in freshwater lakes and streams. They are found in shallow ocean environments to depths as great as five kilometers (km).</p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>In May 2023, which of the following has become the first state government to have launched a welfare fund for Mahatma Gandhi Rural Employment Guarantee Scheme workers in the State?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2312; 2023 &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2360;&#2352;&#2325;&#2366;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2350;&#2361;&#2366;&#2340;&#2381;&#2350;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2327;&#2366;&#2352;&#2306;&#2335;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2358;&#2381;&#2352;&#2350;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2325;&#2379;&#2359; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2346;&#2361;&#2354;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2348;&#2344; &#2327;&#2312; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kerala</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2352;&#2354;</span>",
      "<span class=\"eqt\">Karnataka</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;</span>",
      "<span class=\"eqt\">Maharashtra</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Gujarat</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2332;&#2352;&#2366;&#2340;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In a first in the country, the Kerala government launched a welfare fund for Mahatma Gandhi Rural Employment Guarantee Scheme workers in the State. Launching the initiative, Chief Minister Pinarayi Vijayan said the workers who have completed the age of 60 will be entitled for pension under the fund which will also provide financial assistance for medical, education etc.</p><p>&#183; The welfare fund has been formed as per the Kerala Employment Guarantee Workers' Welfare Fund Act, 2021.</p>",
    "question_index": 35
  },
  {
    "question": "<span class=\"eqt\"><p>Fundamental duties are ___________ and not enforceable by law but are taken into account by the courts while adjudicating any matter.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2380;&#2354;&#2367;&#2325; &#2325;&#2352;&#2381;&#2340;&#2357;&#2381;&#2351; ___________ &#2361;&#2376;&#2306; &#2324;&#2352; &#2357;&#2367;&#2343;&#2367; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2366;&#2327;&#2370; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2319; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2350;&#2366;&#2350;&#2354;&#2375; &#2346;&#2352; &#2347;&#2376;&#2360;&#2354;&#2366; &#2325;&#2352;&#2340;&#2375; &#2360;&#2350;&#2351; &#2309;&#2342;&#2366;&#2354;&#2340;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2311;&#2344;&#2381;&#2361;&#2375;&#2306; &#2343;&#2381;&#2351;&#2366;&#2344; &#2350;&#2375;&#2306; &#2352;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">regulatory</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2351;&#2366;&#2350;&#2325;</span>",
      "<span class=\"eqt\">non-statutory</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2366;&#2306;&#2357;&#2367;&#2343;&#2367;&#2325;</span>",
      "<span class=\"eqt\">statutory</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2306;&#2357;&#2367;&#2343;&#2367;&#2325;</span>",
      "<span class=\"eqt\">common</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;</span>"
    ],
    "solution": "<p>Fundamental duties are statutory duties, not enforceable by law, but a court may take them into account while adjudicating on a matter. The idea behind their incorporation was to emphasize the moral obligation of the citizen in exchange for the Fundamental Rights that he or she enjoys. The concept of Fundamental Duties is taken from the Constitution of the USSR.</p>",
    "question_index": 36
  },
  {
    "question": "<span class=\"eqt\"><p>The Hurka Baul dance is performed during the _____________:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2369;&#2352;&#2325;&#2366; &#2348;&#2366;&#2313;&#2354; &#2344;&#2371;&#2340;&#2381;&#2351; _________ &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Celebration Of Lord Rama Birth</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2327;&#2357;&#2366;&#2344; &#2352;&#2366;&#2350; &#2325;&#2375; &#2332;&#2344;&#2381;&#2350; &#2325;&#2366; &#2313;&#2340;&#2381;&#2360;&#2357;</span>",
      "<span class=\"eqt\">Cultivation of Paddy</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2366;&#2344; &#2325;&#2368; &#2326;&#2375;&#2340;&#2368;</span>",
      "<span class=\"eqt\">During Dussehra</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2358;&#2361;&#2352;&#2366; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;</span>",
      "<span class=\"eqt\">During Kumbh Mela</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2369;&#2306;&#2349; &#2350;&#2375;&#2354;&#2375; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Hurka Baul dance is performed during the cultivation of paddy and maize. The name of the dance is derived from Hurka, the drum which is the only musical accompaniment, and baul, the song. In the Hurka Baul dance, the singer narrates the story of battles and heroic deeds, while the performers enter from two opposite sides and enact the stories in a series of crisp movements.</p>",
    "question_index": 37
  },
  {

  },
  {
    "question": "<span class=\"eqt\"><p>_______ is a symbiotic relationship in which both species benefit.</p></span><span class=\"hqt\" style=\"display:none\"><p>_______ &#2319;&#2325; &#2360;&#2361;&#2332;&#2368;&#2357;&#2368; &#2360;&#2306;&#2348;&#2306;&#2343; &#2361;&#2376; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2342;&#2379;&#2344;&#2379;&#2306; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2354;&#2366;&#2349; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Mutualism</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2361;&#2379;&#2346;&#2325;&#2366;&#2352;&#2367;&#2340;&#2366; (&#2350;&#2381;&#2351;&#2370;&#2330;&#2381;&#2351;&#2370;&#2309;&#2354;&#2367;&#2332;&#2381;&#2350;)</span>",
      "<span class=\"eqt\">Commensalism</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2361;&#2349;&#2379;&#2332;&#2367;&#2340;&#2366; (&#2325;&#2350;&#2375;&#2306;&#2360;&#2354;&#2367;&#2332;&#2381;&#2350;)</span>",
      "<span class=\"eqt\">Parasitism</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2332;&#2368;&#2357;&#2367;&#2340;&#2366; (&#2346;&#2376;&#2352;&#2366;&#2360;&#2367;&#2335;&#2367;&#2395;&#2381;&#2350;)</span>",
      "<span class=\"eqt\">Amensalism</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2361;&#2349;&#2379;&#2332;&#2367;&#2340;&#2366; (&#2319;&#2350;&#2375;&#2344;&#2381;&#2360;&#2354;&#2367;&#2332;&#2364;&#2381;&#2350;)</span>"
    ],
    "solution": "<p><b>Mutualism</b> is a symbiotic relationship in which both species benefit. An example of mutualism involves goby fish and shrimp. The nearly blind shrimp and the fish spend most of their time together. The shrimp maintains a burrow in the sand in which both the fish and shrimp live. When a predator comes near, the fish touches the shrimp with its tail as a warning. Then, both fish and shrimp retreat to the burrow until the predator is gone. From their relationship, the shrimp gets a warning of approaching danger. The fish gets a safe retreat and a place to lay its eggs.</p>",
    "question_index": 39
  },

    "question": "<span class=\"eqt\"><p>When was NABARD established?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2366;&#2348;&#2366;&#2352;&#2381;&#2337; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2348; &#2361;&#2369;&#2312; &#2341;&#2368;?</p></span>",

      "<span class=\"eqt\">2005</span><span class=\"hqt\" style=\"display:none\">2005</span>",
      "<span class=\"eqt\">1995</span><span class=\"hqt\" style=\"display:none\">1995</span>"
    ],
    "solution": "<p>National Bank for Agriculture and Rural Development (NABARD) is India's apex development bank, established in 1982 under an Act of Parliament to promote sustainable and equitable agriculture and rural development.</p><p></p><p>- The recognition of the importance of institutional credit in boosting rural economy by the Government of India led to the inception of a Committee to review the Arrangements for Institutional Credit for Agriculture and Rural Development (CRAFICARD). This was established under the able Chairmanship of Shri B. Sivaraman, former Member of Planning Commission on 30 March 1979.</p><p></p><p>- Based on the Committee's interim report recommendation, the creation of National Bank for Agriculture and Rural Development (NABARD) was approved by the Parliament through Act 61 of 1981.</p>",
    "question_index": 42
  },

    "question": "<span class=\"eqt\"><p>Qutb al-Din Aibak founded the Slave dynasty. He was a general of which king?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2364;&#2369;&#2340;&#2369;&#2348;&#2369;&#2342;&#2381;&#2342;&#2368;&#2344; &#2320;&#2348;&#2325; &#2344;&#2375; &#2327;&#2369;&#2354;&#2366;&#2350; &#2357;&#2306;&#2358; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;&#2404; &#2357;&#2361; &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2366; &#2325;&#2375; &#2360;&#2375;&#2344;&#2366;&#2346;&#2340;&#2367; &#2341;&#2375;?</p></span>",

      "<span class=\"eqt\">Baha al-Din Sam III</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2361;&#2366; &#2309;&#2354;-&#2342;&#2368;&#2344; &#2360;&#2376;&#2350; III</span>"

    "solution": "<p>- Qutubuddin Aibak, a ruler of medieval India, was the first ruler of the Delhi Sultanate and also the founder of the Slave dynasty.</p><p>- He was captured in his childhood and sold as a slave to the chief Qazi of Nishapur, a town situated in the northeastern Iran.</p><p>- He was purchased by the ruler of Ghor in central Afghanistan, Sultan <b>Muhammad Ghori</b>. Qutubuddin Aibak, gradually rose to the rank of General and became one of the most trusted nobles of Sultan Ghori</p>",

    "correct_option_id": 1,

    "question": "<span class=\"eqt\"><p>In August 2024, the Lok Sabha saw the introduction of the Railways (Amendment) Bill 2024 by Railways Minister Ashwini Vaishnaw. The bill aims to amend the Railways Act of _______.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2327;&#2360;&#2381;&#2340; 2024 &#2350;&#2375;&#2306;, &#2352;&#2375;&#2354; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2309;&#2358;&#2381;&#2357;&#2367;&#2344;&#2368; &#2357;&#2376;&#2359;&#2381;&#2339;&#2357; &#2344;&#2375; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2352;&#2375;&#2354;&#2357;&#2375; (&#2360;&#2306;&#2358;&#2379;&#2343;&#2344;) &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; 2024 &#2346;&#2375;&#2358; &#2325;&#2367;&#2351;&#2366;&#2404; &#2311;&#2360; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; _______ &#2325;&#2375; &#2352;&#2375;&#2354;&#2357;&#2375; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2350;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1985</span><span class=\"hqt\" style=\"display:none\">1985</span>",
      "<span class=\"eqt\">1989</span><span class=\"hqt\" style=\"display:none\">1989</span>",
      "<span class=\"eqt\">1993</span><span class=\"hqt\" style=\"display:none\">1993</span>",

    "correct_option_id": 1,
    "solution": "<p>The Lok Sabha saw the introduction of the Railways (Amendment) Bill 2024 by Railways Minister Ashwini Vaishnaw. The bill aims to amend the Railways Act of 1989 to enhance the powers of the Railways Board and improve operational efficiency.</p><p>Key provisions of the bill include the integration of the Indian Railway Board Act, of 1905 into the Railways Act, of 1989. This move seeks to simplify the legal framework governing Indian Railways by repealing the Indian Railway Board Act, of 1905 and incorporating its provisions into the Railways Act. The changes are intended to streamline the constitution and composition of the Railway Board, thereby boosting the overall efficiency of railway operations.</p><p></p><p></p>",

    "question": "<span class=\"eqt\"><p>Kirtivarman II was the last of the rulers of the Chalukyas. He was defeated by _____.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2368;&#2352;&#2381;&#2340;&#2367;&#2357;&#2352;&#2381;&#2350;&#2344; II &#2330;&#2366;&#2354;&#2369;&#2325;&#2381;&#2351; &#2358;&#2366;&#2360;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2367;&#2350; &#2358;&#2366;&#2360;&#2325; &#2341;&#2366;&#2404; &#2357;&#2361; _____ &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2352;&#2366;&#2332;&#2367;&#2340; &#2361;&#2369;&#2310; &#2341;&#2366;&#2404;</p></span>",

    "correct_option_id": 1,
    "solution": "<p>The most important ruler of the Chalukya dynasty was Pulakesin II. The Aihole inscription issued by him gives the details of his reign. </p><p>The successor of Pulakesin II was Vikramaditya. He once again consolidated the Chalukya kingdom and plundered the Pallava capital, Kanchi. Thus he had avenged his father's defeat and death at the hands of the Pallavas. Kirtivarman II was the last of the rulers of the Chalukyas. He was defeated by <b>Dantidurga</b>, the founder of the Rashtrakuta dynasty. </p>",

    "question": "<span class=\"eqt\"><p>A train with speed 99 km/h crosses a platform and a person standing on the platform in 20 seconds and 8 seconds respectively. Find the length of the platform.</p></span><span class=\"hqt\" style=\"display:none\"><p>99 km/h &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2330;&#2354;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2352;&#2375;&#2354;&#2327;&#2366;&#2337;&#2364;&#2368; &#2319;&#2325; &#2346;&#2381;&#2354;&#2375;&#2335;&#2347;&#2377;&#2352;&#2381;&#2350; &#2324;&#2352; &#2313;&#2360; &#2346;&#2352; &#2326;&#2337;&#2364;&#2375; &#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 20 &#2360;&#2375;&#2325;&#2306;&#2337; &#2324;&#2352; 8 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2346;&#2366;&#2352; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2346;&#2381;&#2354;&#2375;&#2335;&#2347;&#2377;&#2352;&#2381;&#2350; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">400 m</span><span class=\"hqt\" style=\"display:none\">400 m</span>",
      "<span class=\"eqt\">310 m</span><span class=\"hqt\" style=\"display:none\">310 m</span>",
      "<span class=\"eqt\">330 m</span><span class=\"hqt\" style=\"display:none\">330 m</span>",
      "<span class=\"eqt\">420 m</span><span class=\"hqt\" style=\"display:none\">420 m</span>"
    ],
    "solution": "<p>Since, the train crosses a person in 8 second.</p><p>Length of the train = 8*99*5/18 = 220 m</p><p>Length of the platform = 20*99*5/18  -  220 = 330 m</p>",
    "question_index": 50

    "question": "<span class=\"eqt\"><p><b>Directions:</b>   The following graph shows the number of laptops of two different models X and Y sold by five different showrooms of a company in a year.</p><p><img width=576 height=336 id=\"Chart 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18876/image037.png\"></p><p>The number of laptops of model X sold by B is what percentage of number of laptops of model Y sold by D?</p></span><span class=\"hqt\" style=\"display:none\"><p><b>&#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;:</b> &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2310;&#2352;&#2375;&#2326; &#2319;&#2325; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2375; &#2346;&#2366;&#2305;&#2330; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2358;&#2379;&#2352;&#2370;&#2350; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2342;&#2379; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2350;&#2377;&#2337;&#2354; X &#2324;&#2352; Y &#2325;&#2375; &#2354;&#2376;&#2346;&#2335;&#2377;&#2346; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 5\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18876/image037.png\"></p><p>B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2350;&#2377;&#2337;&#2354; X &#2325;&#2375; &#2354;&#2376;&#2346;&#2335;&#2377;&#2346;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, D &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2350;&#2377;&#2337;&#2354; Y &#2325;&#2375; &#2354;&#2376;&#2346;&#2335;&#2377;&#2346;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>The difference between parallel sides of a trapezium is 7 cm and its height is 13 cm. If the area of trapezium is 292.5 cm<sup>2</sup>, then what is the length of long parallel side?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2354;&#2306;&#2348; &#2325;&#2368; &#2360;&#2350;&#2366;&#2306;&#2340;&#2352; &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 7 cm &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2368; &#2314;&#2306;&#2330;&#2366;&#2312; 13 cm &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2350;&#2354;&#2350;&#2381;&#2348; &#2330;&#2340;&#2369;&#2352;&#2381;&#2349;&#2369;&#2332; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 292.5 cm<sup>2</sup> &#2361;&#2376;, &#2340;&#2379; &#2354;&#2306;&#2348;&#2368; &#2360;&#2350;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352; &#2349;&#2369;&#2332;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">20 cm</span><span class=\"hqt\" style=\"display:none\">20 cm</span>",
      "<span class=\"eqt\">22 cm</span><span class=\"hqt\" style=\"display:none\">22 cm</span>",
      "<span class=\"eqt\">24 cm</span><span class=\"hqt\" style=\"display:none\">24 cm</span>",
      "<span class=\"eqt\">26 cm</span><span class=\"hqt\" style=\"display:none\">26 cm</span>"
    ],
    "solution": "<p>Let longer parallel side of trapezium = a cm</p><p>Then, shorter parallel side of trapezium = (a  -  7) cm</p><p>Height of trapezium = 13 cm</p><p>Area of trapezium = 292.5 = (1/2)* (a + a  -  7) * 13</p><p><b>a = 26 cm</b></p>",
    "question_index": 52

    "question": "<span class=\"eqt\"><p>A chord of the larger among two concentric circles is of length 30 cm and it is tangent to the smaller circle. What is the area (in sq. cm) of the annular portion between the two circles?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2348;&#2337;&#2364;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2319;&#2325; &#2332;&#2368;&#2357;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 30 cm &#2361;&#2376; &#2324;&#2352; &#2351;&#2361; &#2331;&#2379;&#2335;&#2375; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366; &#2361;&#2376;&#2404; &#2342;&#2379;&#2344;&#2379;&#2306; &#2357;&#2371;&#2340;&#2381;&#2340;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2375; &#2357;&#2354;&#2351;&#2366;&#2325;&#2366;&#2352; &#2349;&#2366;&#2327; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (sq. cm &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p><img width=228 height=163 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26626/image014.png\" ></p><p>Let Radius of larger circle be R cm and that of smaller circle be r cm.</p><p>Here AB = 30/2 = 15 cm</p><p>Area of Annular portion = Area of larger circle  -  Area of smaller circle</p><p>= &#960; R<sup>2</sup> - &#960; r<sup>2</sup></p><p>= &#960; (R<sup>2</sup> - r<sup>2</sup>) ....(1)</p><p>In triangle AOB,</p><p>R<sup>2</sup> = 15<sup>2</sup> + r<sup>2</sup></p><p>R<sup>2</sup> - r<sup>2</sup> = 225</p><p>Now, eq (1),</p><p>Area of annular portion = 225 &#960; cm<sup>2</sup></p><p></p>",

    "question": "<span class=\"eqt\"><p>Emma borrows &#8377;72,000 for 4 years at an interest rate of 6% p.a. simple interest. Olivia borrows the same amount at simple interest of 8% for the first year, 7% for the second year, 6% for the third year, and 5% for the fourth year. What is the total simple interest (in &#8377;) paid by Emma and Olivia?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2350;&#2381;&#2350;&#2366; &#2344;&#2375; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; 6% &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; 4 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#8377;72,000 &#2325;&#2368; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368;&#2404; &#2323;&#2354;&#2367;&#2357;&#2367;&#2351;&#2366; &#2344;&#2375; &#2346;&#2361;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; 8%, &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; 7%, &#2340;&#2368;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; 6% &#2324;&#2352; &#2330;&#2380;&#2341;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; 5% &#2325;&#2368; &#2342;&#2352; &#2346;&#2352; &#2360;&#2350;&#2366;&#2344; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2313;&#2343;&#2366;&#2352; &#2354;&#2368;&#2404; &#2319;&#2350;&#2381;&#2350;&#2366; &#2324;&#2352; &#2323;&#2354;&#2367;&#2357;&#2367;&#2351;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2369;&#2354; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; (&#8377; &#2350;&#2375;&#2306;) &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.40000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.40000</span>",
      "<span class=\"eqt\">Rs.36000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.36000</span>",

      "<span class=\"eqt\">Rs.48000</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.48000</span>"
    ],
    "solution": "<p>For Emma, SI will be 4 x 6% = 24% of 72000</p><p>For Olivia, SI will be 1 x (8 + 7 + 6 + 5) % = 26% of 72000</p><p>Total SI = (26 + 24) % of 72000 = Rs.36000</p>",

    "question": "<span class=\"eqt\"><p>The ratio of the speed of A to that of B is 14: 11. If B covers 100 km in 125 minutes, then what distance (in km) will A cover in 110 minutes?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2325;&#2368; &#2330;&#2366;&#2354; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 14:11 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; B, 125 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; 100 km &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; A 110 &#2350;&#2367;&#2344;&#2335; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352;&#2368; (km &#2350;&#2375;&#2306;) &#2340;&#2351; &#2325;&#2352;&#2375;&#2327;&#2366;?</p></span>",

      "<span class=\"eqt\">108</span><span class=\"hqt\" style=\"display:none\">108</span>",

    "question": "<span class=\"eqt\"><p>Angle made by a 16 cm long chord PQ at the centre of a circle is 60&deg;. Find the diameter of the circle.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; 16 cm &#2354;&#2306;&#2348;&#2368; &#2332;&#2368;&#2357;&#2366; PQ &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2346;&#2352; &#2309;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2379;&#2339; 60&deg; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2357;&#2381;&#2351;&#2366;&#2360; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

    "solution": "<p><img width=179 height=161 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21678/image014.png\"></p><p>PQ = 16 cm</p><p>&#8736; POQ = 60&deg;</p><p>Since OP = OQ so &#8736; OPQ = &#8736; OQP = X (let)</p><p>In &#916; POQ,</p><p>60 + X + X = 180</p><p>X = 60&deg;</p><p>Therefore, &#916; POQ is an equilateral triangle.</p><p>So, OP = PQ = 16 cm</p><p>Diameter of circle = 16 * 2 = 32 cm</p>",

    "question": "<span class=\"eqt\"><p>A piece of rectangular sheet of length 7.2 cm and width 4.4 cm is used to construct a cylinder such that height of the cylinder is equal to the length of rectangle. Find the volume (in cm<sup>3</sup>) of cylinder such formed. (Up to one correct decimal)</p></span><span class=\"hqt\" style=\"display:none\"><p>7.2 cm &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; 4.4 cm &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2319;&#2325; &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2358;&#2368;&#2335; &#2325;&#2375; &#2319;&#2325; &#2335;&#2369;&#2325;&#2396;&#2375; &#2360;&#2375; &#2319;&#2325; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312;, &#2310;&#2351;&#2340;&#2366;&#2325;&#2366;&#2352; &#2358;&#2368;&#2335; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2348;&#2375;&#2354;&#2344; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; (cm<sup>3</sup> &#2350;&#2375;&#2306;) (&#2342;&#2358;&#2350;&#2354;&#2357; &#2325;&#2375; &#2319;&#2325; &#2360;&#2381;&#2341;&#2366;&#2344; &#2340;&#2325; &#2360;&#2361;&#2368;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">11.4</span><span class=\"hqt\" style=\"display:none\">11.4</span>",
      "<span class=\"eqt\">10.8</span><span class=\"hqt\" style=\"display:none\">10.8</span>",
      "<span class=\"eqt\">11.1</span><span class=\"hqt\" style=\"display:none\">11.1</span>",
      "<span class=\"eqt\">12.2</span><span class=\"hqt\" style=\"display:none\">12.2</span>"
    ],
    "solution": "<p>Let base radius of cylinder = r cm</p><p>Circumference of the base of cylinder = width of rectangle</p><p>2 * &#960; * r = 4.4</p><p>r = 4.4 * 7/44</p><p>r = 0.7 cm</p><p>Height of cylinder = 7.2 cm</p><p>Volume of cylinder = &#960; * 0.7 * 0.7 * 7.2</p><p>= (22/7) * (49/100) * (36/5)</p><p>= 77 * 18/125</p><p>= 11.088 = 11.1 cm<sup>3</sup></p>",
    "question_index": 58

    "question": "<span class=\"eqt\"><p>A, B and C are working on a task. it is known that the work done by A in 5 days is equal to work done by B in 6 days and work done by B in 4 days is equal to work done by C in 9 days. If A while working alone took 20 days to finish the work then how many days A, B and C together will take to finish the same work?</p></span><span class=\"hqt\" style=\"display:none\"><p>A, B &#2324;&#2352; C &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2346;&#2352; &#2325;&#2366;&#2350; &#2325;&#2352; &#2352;&#2361;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2361; &#2332;&#2381;&#2334;&#2366;&#2340; &#2361;&#2376; &#2325;&#2367; A &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 5 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;, B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 6 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2319; &#2327;&#2319; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376; &#2324;&#2352; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 4 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; C &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 9 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2367;&#2319; &#2327;&#2319; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; A &#2325;&#2379; &#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 20 &#2342;&#2367;&#2344; &#2354;&#2327;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2319;&#2325; &#2360;&#2366;&#2341; A, B &#2324;&#2352; C &#2325;&#2379; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344; &#2354;&#2327;&#2375;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">9(18/119) days</span><span class=\"hqt\" style=\"display:none\">9(18/119) &#2342;&#2367;&#2344;</span>",

    "solution": "<p>Let's assume A, B and C can complete a, b and c unit of work daily.</p><p>Now according to the question; 5a = 6b</p><p>=&gt; a : b = 6 : 5.. (1)</p><p>Also; 4b = 9c</p><p>=&gt; b : c = 9 : 4 .. (2)</p><p>From (1) and (2) we will get; a : b : c = 54 : 45 : 20</p><p>Now total amount of work done by A in 20 days = (54  X  20)n units = 1080n units</p><p>The total amount of work done by A, B, and C in one day = (54 + 45 + 20)n units = 119n units</p><p>Therefore, the time taken by all three to finish the work = 1080n/119n = 9(9/119) days</p>",

;&#2348;&#2354; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
