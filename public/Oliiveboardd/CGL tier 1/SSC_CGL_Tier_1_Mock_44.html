<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>

                    </div>
                    <div class="stat-item">

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Select the term from among the given options that can replace the question mark (?) in the following series.</p><p>200E8, 151J27, 115O65, 90T122, 74Y198, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2357;&#2361; &#2346;&#2342; &#2330;&#2369;&#2344;&#2367;&#2319; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2357;&#2366;&#2330;&#2325; &#2330;&#2367;&#2344;&#2381;&#2361; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310;&#2319;&#2327;&#2366;&#2404;</p><p>200E8, 151J27, 115O65, 90T122, 74Y198, ?</p></span>",
    "options": [
      "<span class=\"eqt\">65D293</span><span class=\"hqt\" style=\"display:none\">65D293</span>",
      "<span class=\"eqt\">71E302</span><span class=\"hqt\" style=\"display:none\">71E302</span>",
      "<span class=\"eqt\">60C281</span><span class=\"hqt\" style=\"display:none\">60C281</span>",
      "<span class=\"eqt\">79D326</span><span class=\"hqt\" style=\"display:none\">79D326</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>200 - 49 = 151</p><p>151 - 36 = 115</p><p>115 - 25 = 90</p><p>90 - 16 = 74</p><p>74 - 9 = <b>65</b></p><p>E + 5 = J</p><p>J + 5 = O</p><p>O + 5 = T</p><p>T + 5 = Y</p><p>Y + 5 = <b>D</b></p><p>8 + (19  1) = 27</p><p>27 + (19  2) = 65</p><p>65 + (19  3) = 122</p><p>122 + (19  4) = 198</p><p>198 + (19  5) = <b>293</b></p><p>Hence, 65D293 is the missing term.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>Select the alphabets from among the given options that can replace the question mark (?) in the following series.</p><p>MOQ, RU, VXZ, AD, EGI, ?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2357;&#2361; &#2309;&#2325;&#2381;&#2359;&#2352; &#2330;&#2369;&#2344;&#2367;&#2319; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2357;&#2366;&#2330;&#2325; &#2330;&#2367;&#2344;&#2381;&#2361; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>MOQ, RU, VXZ, AD, EGI, ?</p></span>",
    "options": [
      "<span class=\"eqt\">JN</span><span class=\"hqt\" style=\"display:none\">JN</span>",
      "<span class=\"eqt\">JM</span><span class=\"hqt\" style=\"display:none\">JM</span>",
      "<span class=\"eqt\">JP</span><span class=\"hqt\" style=\"display:none\">JP</span>",
      "<span class=\"eqt\">JT</span><span class=\"hqt\" style=\"display:none\">JT</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Here, the pattern is:</p><p>M+2 = O; O+2 = Q; Q+1 = R</p><p>R+3 = U; U+1 = V.</p><p>V+2 = X; X+2 = Z; Z+1 = A</p><p>A+3 = D; D+1 = E.</p><p>E+2 = G; G+2 = I; I+1 = J</p><p>J+3 = M</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Read the following scenario and answer the question that follows:</p><p>A film production faces budget constraints and a looming deadline. The producer must decide whether to cut a crucial scene to save money, potentially affecting storyline and audience reception, or seek additional funding with potential delays. Given the challenges faced by the film production, the producer must make a critical decision.</p><p>Which option aligns best with the overall goals and priorities of the project, taking into account script integrity, audience expectations, budget limitations, funding options, potential impact on quality and release date, creative vision, and team morale?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2352;&#2367;&#2342;&#2371;&#2358;&#2381;&#2351; &#2325;&#2379; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;:</p><p>&#2319;&#2325; &#2347;&#2367;&#2354;&#2381;&#2350; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2348;&#2332;&#2335; &#2325;&#2368; &#2325;&#2350;&#2368; &#2324;&#2352; &#2319;&#2325; &#2310;&#2360;&#2344;&#2381;&#2344; &#2360;&#2350;&#2351; &#2360;&#2368;&#2350;&#2366; &#2325;&#2366; &#2360;&#2366;&#2350;&#2344;&#2366; &#2325;&#2352; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2340;&#2366; &#2325;&#2379; &#2351;&#2361; &#2340;&#2351; &#2325;&#2352;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366; &#2325;&#2367; &#2325;&#2381;&#2351;&#2366; &#2346;&#2376;&#2360;&#2375; &#2348;&#2330;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2342;&#2371;&#2358;&#2381;&#2351; &#2325;&#2379; &#2325;&#2366;&#2335;&#2366; &#2332;&#2366;&#2319;, &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2361;&#2366;&#2344;&#2368; &#2324;&#2352; &#2342;&#2352;&#2381;&#2358;&#2325;&#2379;&#2306; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2361;&#2379; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;, &#2351;&#2366; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2342;&#2375;&#2352;&#2368; &#2325;&#2375; &#2360;&#2366;&#2341; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2343;&#2344; &#2325;&#2368; &#2340;&#2354;&#2366;&#2358; &#2325;&#2368; &#2332;&#2366;&#2319;&#2404; &#2347;&#2367;&#2354;&#2381;&#2350; &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2339; &#2325;&#2375; &#2360;&#2366;&#2350;&#2344;&#2375; &#2310;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2330;&#2369;&#2344;&#2380;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2342;&#2375;&#2326;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2340;&#2366; &#2325;&#2379; &#2319;&#2325; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2344;&#2367;&#2352;&#2381;&#2339;&#2351; &#2354;&#2375;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;&#2404;</p><p>&#2346;&#2335;&#2325;&#2341;&#2366; &#2325;&#2368; &#2309;&#2326;&#2306;&#2337;&#2340;&#2366;, &#2342;&#2352;&#2381;&#2358;&#2325;&#2379;&#2306; &#2325;&#2368; &#2309;&#2346;&#2375;&#2325;&#2381;&#2359;&#2366;&#2323;&#2306;, &#2348;&#2332;&#2335; &#2360;&#2368;&#2350;&#2366;&#2323;&#2306;, &#2357;&#2367;&#2340;&#2381;&#2340;&#2346;&#2379;&#2359;&#2339; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306;, &#2327;&#2369;&#2339;&#2357;&#2340;&#2381;&#2340;&#2366; &#2324;&#2352; &#2352;&#2367;&#2354;&#2368;&#2332;&#2364; &#2325;&#2368; &#2340;&#2366;&#2352;&#2368;&#2326; &#2346;&#2352; &#2360;&#2306;&#2349;&#2366;&#2357;&#2367;&#2340; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;, &#2352;&#2330;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2342;&#2371;&#2359;&#2381;&#2335;&#2367; &#2324;&#2352; &#2335;&#2368;&#2350; &#2325;&#2375; &#2350;&#2344;&#2379;&#2348;&#2354; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344; &#2350;&#2375;&#2306; &#2352;&#2326;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2346;&#2352;&#2367;&#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2360;&#2350;&#2327;&#2381;&#2352; &#2354;&#2325;&#2381;&#2359;&#2381;&#2351;&#2379;&#2306; &#2324;&#2352; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2348;&#2360;&#2375; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cut the crucial scene to meet the budget constraints and deadline.</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2332;&#2335; &#2325;&#2368; &#2325;&#2350;&#2368; &#2324;&#2352; &#2360;&#2350;&#2351; &#2360;&#2368;&#2350;&#2366; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2342;&#2371;&#2358;&#2381;&#2351; &#2325;&#2379; &#2325;&#2366;&#2335; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Seek additional funding to maintain the integrity of the script.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2325;&#2381;&#2352;&#2367;&#2346;&#2381;&#2335; &#2325;&#2368; &#2309;&#2326;&#2306;&#2337;&#2340;&#2366; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2343;&#2344; &#2325;&#2368; &#2350;&#2366;&#2306;&#2327; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Explore a compromise solution that involves modifying the scene to reduce costs.</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325; &#2360;&#2350;&#2333;&#2380;&#2340;&#2366; &#2360;&#2350;&#2366;&#2343;&#2366;&#2344; &#2325;&#2368; &#2340;&#2354;&#2366;&#2358; &#2325;&#2352;&#2375;&#2306; &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2354;&#2366;&#2327;&#2340; &#2325;&#2350; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2371;&#2358;&#2381;&#2351; &#2325;&#2379; &#2360;&#2306;&#2358;&#2379;&#2343;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2379;&#2404;</span>",
      "<span class=\"eqt\">Engage in a strategic reassessment of the entire project, exploring alternative creative approaches.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2346;&#2370;&#2352;&#2381;&#2339; &#2346;&#2352;&#2367;&#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2366; &#2352;&#2339;&#2344;&#2368;&#2340;&#2367;&#2325; &#2346;&#2369;&#2344;&#2352;&#2381;&#2350;&#2370;&#2354;&#2381;&#2351;&#2366;&#2306;&#2325;&#2344; &#2325;&#2352;&#2375;&#2306;, &#2340;&#2341;&#2366; &#2357;&#2376;&#2325;&#2354;&#2381;&#2346;&#2367;&#2325; &#2352;&#2330;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2342;&#2371;&#2359;&#2381;&#2335;&#2367;&#2325;&#2379;&#2339;&#2379;&#2306; &#2325;&#2368; &#2326;&#2379;&#2332; &#2325;&#2352;&#2375;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In a situation where film production is facing budget constraints and a looming deadline, engaging in a strategic reassessment of the entire project offers a comprehensive and forward-thinking approach. This option involves taking a step back to evaluate the project from various angles, considering script integrity, audience expectations, budget limitations, funding options, potential impact on quality and release date, creative vision, and team morale. Reevaluating the budget to identify areas where costs can be trimmed without compromising essential elements and prioritizing spending on elements crucial to the film's success and audience satisfaction can be beneficial. Hence, option (d) is the correct answer.</p><p>Option (a)  -  It risks compromising the overall coherence and impact of the film and may lead to a negative reception from audiences who anticipated the scene.</p><p>Option (b)  -  It is time-consuming and may not guarantee success. Also, it may introduce external pressures and compromises on creative control.</p><p>Option (c)  -  It could result in a compromised version of the crucial scene and may not sufficiently address budget constraints or meet the deadline.</p>",
    "question_index": 2
  },

    "question": "<span class=\"eqt\"><p>Jasmine, an English teacher, has started online English classes. She wants to buy an internet plan for the duration of a month. She is considering three internet plans:</p><p>A: Monthly internet plan priced at Rs. 1100 with an extra charge of Rs. 300/month for higher speed.</p><p>B: Monthly internet plan available at a fixed rate of Rs. 900 with standard speed and no extra charges.</p><p>C: Monthly internet plan at Rs. 1000 with an option to pay an additional Rs. 500/month for higher speed.</p><p></p><p>Which plan would be the most economical for Jasmine if she wants to opt for the higher speed?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2376;&#2360;&#2381;&#2350;&#2368;&#2344;, &#2319;&#2325; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2364;&#2368; &#2358;&#2367;&#2325;&#2381;&#2359;&#2367;&#2325;&#2366;, &#2344;&#2375; &#2321;&#2344;&#2354;&#2366;&#2311;&#2344; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2364;&#2368; &#2325;&#2325;&#2381;&#2359;&#2366;&#2319;&#2306; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2361;&#2376;&#2306;&#2404; &#2357;&#2361; &#2319;&#2325; &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2368; &#2309;&#2357;&#2343;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2346;&#2381;&#2354;&#2366;&#2344; &#2326;&#2352;&#2368;&#2342;&#2344;&#2366; &#2330;&#2366;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404; &#2357;&#2361; &#2340;&#2368;&#2344; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2346;&#2381;&#2354;&#2366;&#2344; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352; &#2352;&#2361;&#2368; &#2361;&#2376;:</p><p>A: 1100 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2350;&#2366;&#2360;&#2367;&#2325; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2346;&#2381;&#2354;&#2366;&#2344;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2332;&#2364;&#2381;&#2351;&#2366;&#2342;&#2366; &#2360;&#2381;&#2346;&#2368;&#2337; &#2325;&#2375; &#2354;&#2367;&#2319; 300 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2366;&#2361; &#2325;&#2366; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2358;&#2369;&#2354;&#2381;&#2325; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</p><p>B: 900 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2342;&#2352; &#2346;&#2352; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2350;&#2366;&#2360;&#2367;&#2325; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2346;&#2381;&#2354;&#2366;&#2344;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2350;&#2366;&#2344;&#2325; &#2360;&#2381;&#2346;&#2368;&#2337; &#2361;&#2376; &#2324;&#2352; &#2325;&#2379;&#2312; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2358;&#2369;&#2354;&#2381;&#2325; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p>C: 1000 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2350;&#2366;&#2360;&#2367;&#2325; &#2311;&#2306;&#2335;&#2352;&#2344;&#2375;&#2335; &#2346;&#2381;&#2354;&#2366;&#2344;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2332;&#2364;&#2381;&#2351;&#2366;&#2342;&#2366; &#2360;&#2381;&#2346;&#2368;&#2337; &#2325;&#2375; &#2354;&#2367;&#2319; 500 &#2352;&#2369;&#2346;&#2351;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367; &#2350;&#2366;&#2361; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2349;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</p><p>&#2309;&#2327;&#2352; &#2332;&#2376;&#2360;&#2381;&#2350;&#2368;&#2344; &#2332;&#2364;&#2381;&#2351;&#2366;&#2342;&#2366; &#2360;&#2381;&#2346;&#2368;&#2337; &#2330;&#2369;&#2344;&#2344;&#2366; &#2330;&#2366;&#2361;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2360;&#2366; &#2346;&#2381;&#2354;&     "solution": "<p>Plan A: Monthly internet plan priced at Rs. 1100 with an extra charge of Rs. 300/month for higher speed.</p><p>Total cost for higher speed = Rs. 1100 + Rs. 300 = Rs. 1400 per month</p><p>Plan B: Monthly internet plan available at a fixed rate of Rs. 900 with standard speed and no extra charges. As this plan doesn't offer higher speed, it's not relevant for Jasmine's requirement.</p><p>Plan C: Monthly internet plan at Rs. 1000 with an option to pay an additional Rs. 500/month for higher speed.</p><p>Total cost for higher speed = Rs. 1000 + Rs. 500 = Rs. 1500 per month</p><p>Comparing the costs for higher speed, Plan A offers the most economical option for Jasmine as it would cost her Rs. 1400 per month for the higher speed internet.</p><p>Hence, option (a) is the correct answer.</p>",

    "question": "<span class=\"eqt\"><p>In a certain code language, </p><p>'F A S H I O N' is written as '=+? &amp;&gt;&lt; !&gt;+ +@# *#? %$@ $!@'</p><p>'I C O N' is written as '*#? $!@ !&gt;+ *?&amp;'</p><p>'S H O W' is written as '&amp;&gt;&lt; $!@ &amp;$@ +@#'</p><p>Which of the following can be the way in which 'F A W N' is written in that code language? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;,</p><p>'F A S H I O N' &#2325;&#2379; '=+? &amp;&gt;&lt; !&gt;+ +@# *#? %$@ $!@' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>'I C O N' &#2325;&#2379; '*#? $!@ !&gt;+ *?&amp;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>'S H O W' &#2325;&#2379; '&amp;&gt;&lt; $!@ &amp;$@ +@#' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</p><p>&#2313;&#2360; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'F A W N' &#2325;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>In a row of people all facing north, Irfan is 21<sup>st</sup> from the left end and 18<sup>th</sup> to the left of Yasmin.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20 persons</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Irfan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">17 persons</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Yasmin</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">21<sup>st</sup> from left end</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table><p>Tasha is exactly between Yasmin and Irfan. If Tasha is 15<sup>th</sup> from the right end of the line.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20 persons</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Irfan</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8 persons</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tasha</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8 persons</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Yasmin</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5 persons</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">21<sup>st</sup> from left end</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15<sup>th</sup> from right end</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table><p>Total persons = 20 + 1 (Irfan) + 8 + 1 (Tasha) + 8 + 1 (Yasmin) + 5</p><p>= 20 + 1 + 8 + 1 + 8 + 1 + 5 = 44</p><p>44 people are there in the row.</p>",

    "question": "<span class=\"eqt\"><p>By interchanging the given two numbers(not digits), which of the following equations will be correct?</p><p>9 and 12</p><p>I. 36 &div; 9  X  6 + 48  -  12 = 57</p><p>II. 63 + 12  X  3  -  72 &div; 9 = 91</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; (&#2309;&#2306;&#2325; &#2344;&#2361;&#2368;&#2306;) &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2375; &#2346;&#2352;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379;&#2327;&#2366;/&#2361;&#2379;&#2306;&#2327;&#2375;?</p><p>9 &#2324;&#2352; 12</p><p>I. 36 &div; 9 X 6 + 48 - 12 = 57</p><p>II. 63 + 12 X 3 - 72 &div; 9 = 91</p></span>",

    "question": "<span class=\"eqt\"><p>In this question, a statement is followed by two courses of action, numbered I and II. You must assume everything in the statement to be true and on the basis of the information given in the statement, decide which courses of action/s logically follows for pursuing.</p><p><b>Statement: </b>Many companies have owners who either don't create invoices or create bogus bills because they don't want to pay taxes. </p><p><b>Courses of action:</b></p><p>I. Tax authorities should conduct investigations to verify if taxes have been properly reported and paid.</p><p>II. Authorities should implement preventive measures such as mandatory reporting requirements, more frequent audits for high-risk entities, or stricter penalties for non-compliance.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306;, &#2319;&#2325; &#2325;&#2341;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; I &#2324;&#2352; II &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; &#2342;&#2379; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2312; &#2342;&#2368; &#2327;&#2312; &#2361;&#2376;&#2306;&#2404; &#2310;&#2346;&#2325;&#2379; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2360;&#2349;&#2368; &#2348;&#2366;&#2340;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2344;&#2366; &#8203;&#8203;&#2361;&#2376; &#2324;&#2352; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2342;&#2368; &#2327;&#2312; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366; &#2361;&#2376; &#2325;&#2367; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351;&#2357;&#2366;&#2312;/&#2325;&#2366;&#2352;&#2381;&#2     "solution": "<p>Option (a):</p><p>H $ N: H is the husband of N</p><p>N &amp; D: N is the mother of D</p><p>D $ Q: D is the husband of Q </p><p>Q &amp; K: Q is the mother of K</p><p><img width=516 height=226 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26066/image001.png\" ></p><p>D is the grandfather of K is not true here, D is the father of K. </p><p>So, this option is incorrect. </p><p>Option (b):</p><p>D ? K: D is the wife of K</p><p>K # Q: K is the brother of Q</p><p>Q % N: Q is the daughter of N</p><p><img width=609 height=230 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26066/image002.png\" ></p><p>D is the grandfather of K is not true here, D is the husband of K. </p><p>So, this option is incorrect.</p><p>Option (c):</p><p>D @ H : D is the father of H</p><p>H $ Q: H is the husband of Q</p><p>Q &amp; K: Q is the mother of K</p><p>K $ N: K is the husband of N</p><p><img width=501 height=229 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26066/image003.png\" ></p><p>Here, D is the grandfather of K is true.</p><p>So, this option is correct.</p><p>Option (d):</p><p>H ? N: H is the wife of N</p><p>N @ K: N is the father of K</p><p>K # Q: K is the brother of Q</p><p><img width=474 height=227 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26066/image004.png\" ></p><p>Here, D is the grandfather of K is not true. </p><p>So, this option is incorrect.</p><p>Thus, option (c) is the correct answer. </p>",
    "question_index": 21
  },

    "question": "<span class=\"eqt\"><p>By interchanging the given two signs, which of the following equations will be correct?</p><p>(225 &div; 15) - (48 x 2) + 36 = 75</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2342;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2375; &#2346;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379;&#2327;&#2366;?</p><p>(225 &div; 15) - (48 x 2) + 36 = 75</p></span>",
    "options": [
      "<span class=\"eqt\">x and +</span><span class=\"hqt\" style=\"display:none\">x &#2324;&#2352; +</span>",
      "<span class=\"eqt\">-  and x<b> </b></span><span class=\"hqt\" style=\"display:none\">- &#2324;&#2352; x<b></b></span>",
      "<span class=\"eqt\">+ and -</span><span class=\"hqt\" style=\"display:none\">+ &#2324;&#2352; -</span>",
      "<span class=\"eqt\">&div; and x</span><span class=\"hqt\" style=\"display:none\">&div; &#2324;&#2352; x</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Option (a):</p><p>(225 &div; 15) - (48 x 2) + 36 = 75</p><p>After the interchange of signs:</p><p>(225 &div; 15) - (48 + 2) x 36 = 75</p><p>15  -  50 x 36 = 75</p><p>15  -  1800 = 75</p><p>- 1785 is not equal to 75</p><p>Option (b):</p><p>(225 &div; 15) - (48 x 2) + 36 = 75</p><p>After the interchange of signs:</p><p>(225 &div; 15) x (48 - 2) + 36 = 75</p><p>15 x 46 + 36 = 75</p><p>690 + 36 = 75</p><p>726 is not equal to 75</p><p>Option (c):</p><p>(225 &div; 15) - (48 x 2) + 36 = 75</p><p>After the interchange of signs:</p><p>(225 &div; 15) + (48 x 2) - 36 = 75</p><p>15 + 96  -  36 = 75</p><p>75 is equal to 75</p><p>Option (d):</p><p>(225 &div; 15) - (48 x 2) + 36 = 75</p><p>After the interchange of signs:</p><p>(225 x 15) - (48 &div; 2) + 36 = 75</p><p>3375  -  24 + 36 = 75</p><p>3387 is not equal to 75</p><p>So, option (c) is the correct answer. </p>",
    "question_index": 22
  },

    "question": "<span class=\"eqt\"><p>In this question, four statements are given, followed by three conclusions numbered I and II. Assuming the statements to be true, even if they seem to be at variance with commonly known facts, decide which of the conclusions logically follows/follow from the statements.</p><p><b>Statements:</b></p><p>Some Music is Melody</p><p>All Music is Song</p><p>No Song is Theme</p><p>Some Theme is Topic</p><p><b>Conclusions:</b></p><p>I. No Music is Theme</p><p>II. Some Topic is not Song</p><p>III. Some Song is Melody</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2360; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2330;&#2366;&#2352; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; &#2340;&#2368;&#2344; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2357;&#2375; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2379;&#2306;, &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;/&#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p><b>&#2325;&#2341;&#2344;:</b></p><p>&#2325;&#2369;&#2331; &#2360;&#2306;&#2327;&#2368;&#2340;, &#2352;&#2366;&#2327; &#2361;&#2376;&#2306;</p><p>&#2360;&#2349;&#2368; &#2360;&#2306;&#2327;&#2368;&#2340;, &#2327;&#2368;&#2340; &#2361;&#2376;&#2306;</p><p>&#2325;&#2379;&#2312; &#2327;&#2368;&#2340;, &#2341;&#2368;&#2350; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</p><p>&#2325;&#2369;&#2331; &#2341;&#2368;&#2350;, &#2357;&#2367;&#2359;&#2351; &#2361;&#2376;&#2306;</p><p><b>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</b></p><p>I. &#2325;&#2379;&#2312; &#2360;&#2306;&#2327;&#2368;&#2340;, &#2341;&#2368;&#2350; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</p><p>II. &#2325;&#2369;&#2331; &#2357;&#2367;&#2359;&#2351;, &#2327;&#2368;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;</p><p>III. &#2325;&#2369;&#2331; &#2327;&#2368;&#2340;, &#2352;&#2366;&#2327; &#2361;&#2376;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">Only conclusion I follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both conclusions II and III follow</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2324;&#2352; III &#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only conclusion III follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; III &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">All conclusions I, II and III follow</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I, II &#2324;&#2352; III &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Statements:</b></p><p>Some Music is Melody</p><p>All Music is Song</p><p>No Song is Theme</p><p>Some Theme is Topic</p><p><img width=463 height=154 id=\"Picture 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26668/image021.png\"></p><p>No Music is Theme: All Music is Song. No Song is Theme. Thus, No Music is Theme. So, conclusion I follows.</p><p>Some Topic is not Song: No Song is Theme. Some Theme is Topic. Thus, the Topic which is Theme is not Song. So, conclusion II follows.</p><p>Some Song is Melody: Some Music is Melody. All Music is Song. Thus, Some Song is Melody. So, conclusion III follows.</p><p>Hence, all conclusions I, II and III follow.</p>",
    "question_index": 24
  },

    "question": "<span class=\"eqt\"><p>Which of the following is NOT a tool of Fiscal Policy?</p><p>a. Repo Rate</p><p>b. Taxation</p><p>c. Public Expenditure</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2344;&#2368;&#2340;&#2367; &#2325;&#2366; &#2313;&#2346;&#2325;&#2352;&#2339; <b>&#2344;&#2361;&#2368;&#2306;</b> &#2361;&#2376;?</p><p>a. &#2352;&#2375;&#2346;&#2379; &#2342;&#2352;</p><p>b. &#2325;&#2352;&#2366;&#2343;&#2366;&#2344;</p><p>c. &#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2357;&#2381;&#2351;&#2351;</p></span>",
    "options": [
      "<span class=\"eqt\">Only (a)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (a)</span>",
      "<span class=\"eqt\">Only (b)</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; (b)</span>",
      "<span class=\"eqt\">Both (b) &amp; (c)</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; (b) &#2324;&#2352; (c)</span>",
      "<span class=\"eqt\">All of (a), (b) &amp; (c)</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; (a), (b) &#2324;&#2352; (c)</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The tools of fiscal policy are taxes, expenditure, public debt and a nation's budget. They consist of changes in government revenues or rates of the tax structure so as to encourage or restrict private expenditures on consumption and investment.</p><p><b>Repo Rate is a monetary policy tool used by RBI.</b></p>",
    "question_index": 25
  },
  {
    "question": "<span class=\"eqt\"><p>The SWAMITVA scheme is implemented by which of the following ministries?</p></span><span class=\"hqt\" style=\"display:none\"><p>SWAMITVA &#2351;&#2379;&#2332;&#2344;&#2366; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2367;&#2340; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ministry of Panchayati Raj</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2330;&#2366;&#2351;&#2340;&#2368; &#2352;&#2366;&#2332; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Ministry of Agriculture and Farmers' Welfare</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2319;&#2357;&#2306; &#2325;&#2367;&#2360;&#2366;&#2344; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Ministry of Tribal Affairs</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2332;&#2366;&#2340;&#2368;&#2351; &#2325;&#2366;&#2352;&#2381;&#2351; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Ministry of Culture</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>SVAMITVA, a Central Sector Scheme of the Ministry of Panchayati Raj was nationally launched by the Prime Minister on the occasion of National Panchayati Raj Day on 24<sup>th</sup> April 2021 after successful completion of the pilot phase of the Scheme in 9 States. SVAMITVA Scheme aims to provide property rights to the residents of rural inhabited areas in India by using Drone survey and CORS Networks which provides mapping accuracy of 5 cm.</p><p>The Ministry of Panchayati Raj (MoPR) is the Nodal Ministry for implementation of the SVAMITVA scheme. In the States, the Revenue Department/Land Records Department will be the Nodal Department and shall carry out the scheme with the support of State Panchayati Raj Departments.</p><p>Source: PIB</p>",
    "question_index": 26
  },
  {
    "question": "<span class=\"eqt\"><p>Identify whether the following statements are correct or incorrect.</p><p>Statement 1: According to the Census of India-2011, among the Seven Sister States, Mizoram has the highest literacy rate.</p><p>Statement 2: According to the Census of India-2011, Bihar has the lowest literacy rate</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306; &#2325;&#2367; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306; &#2351;&#2366; &#2327;&#2354;&#2340;&#2404;</p><p>&#2325;&#2341;&#2344; 1: &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366;-2011 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2360;&#2375;&#2357;&#2344; &#2360;&#2367;&#2360;&#2381;&#2335;&#2352; &#2352;&#2366;&#2332;&#2381;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306;, &#2350;&#2367;&#2332;&#2379;&#2352;&#2350; &#2325;&#2368; &#2360;&#2366;&#2325;&#2381;&#2359;&#2352;&#2340;&#2366; &#2342;&#2352; &#2360;&#2348;&#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404;</p><p>&#2325;&#2341;&#2344; 2: &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366;-2011 &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2348;&#2367;&#2361;&#2366;&#2352; &#2325;&#2368; &#2360;&#2366;&#2325;&#2381;&#2359;&#2352;&#2340;&#2366; &#2342;&#2352; &#2360;&#2348;&#2360;&#2375; &#2325;&#2350; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only statement 2 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 2 &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both the statements are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Both the statements are correct</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only statement 1 is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; 1 &#2360;&#2361;&#2368; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement 1 is correct. According to the Census of India 2011, Mizoram had the highest literacy rate among the Seven Sister States of northeastern India. The literacy rate in Mizoram was recorded at around 91.3%, which was higher than that of other states in the region.</p><p></p><p>Statement 2 is correct. Bihar had the lowest literacy rate among all Indian states according to the 2011 Census. The literacy rate in Bihar was about 61.8%, which was the lowest in the country.</p><p></p><p>2011 literacy rates of seven sister states:</p><p></p><p>Arunachal Pradesh - 65.4%</p><p>Assam - 72.2%</p><p>Manipur - 76.9%</p><p>Meghalaya - 74.4%</p><p>Nagaland - 79.6%</p><p>Tripura - 87.2%</p><p></p>",
    "question_index": 27
  },

) &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; A</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(a) &#2360;&#2381;&#2325;&#2352;&#2381;&#2357;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(ii) &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(b) &#2352;&#2340;&#2380;&#2306;&#2343;&#2368;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iii) &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(c) &#2352;&#2366;&#2311;&#2348;&#2379;&#2347;&#2381;&#2354;&#2375;&#2357;&#2367;&#2344; &#2361;&#2368;&#2344;&#2340;&#2366;</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(iv) &#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; B2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">(d) &#2360;&#2370;&#2326;&#2366; &#2352;&#2379;&#2327; (&#2352;&#2367;&#2325;&#2375;&#2335;&#2381;&#2360;)</td></tr></table></span>",

    "solution": "<p>&#61623; Vitamin A - Night Blindness Vitamin A deficiency can lead to night blindness, a condition in which the affected person has difficulty seeing in low light or at night.</p><p>&#61623; Vitamin C - Scurvy Vitamin C deficiency can cause scurvy, a disease characterized by weakness, fatigue, bleeding gums, impaired wound healing, and joint pain.</p><p>&#61623; Vitamin D - Rickets Vitamin D deficiency can lead to rickets, a condition primarily affecting children, characterized by weak and soft bones, skeletal deformities, and impaired growth.</p><p>&#61623; Vitamin B2 - Ariboflavinosis Vitamin B2 deficiency can result in ariboflavinosis, which can cause skin disorders, inflammation of the mouth and throat, and sensitivity to light.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following statement(s) is/are correct about Atmiya Sabha?</p><p>a) It was founded by Raja Ram Mohan Roy in 1814</p><p>b) It aimed to purge Hinduism by removing caste system and superstitions.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2340;&#2381;&#2350;&#2368;&#2351; &#2360;&#2349;&#2366; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>a) &#2311;&#2360;&#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2352;&#2366;&#2332;&#2366; &#2352;&#2366;&#2350; &#2350;&#2379;&#2361;&#2344; &#2352;&#2366;&#2351; &#2344;&#2375; 1814 &#2350;&#2375;&#2306; &#2325;&#2368; &#2341;&#2368;&#2404;</p><p>b) &#2311;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2332;&#2366;&#2340;&#2367; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2324;&#2352; &#2309;&#2306;&#2343;&#2357;&#2367;&#2358;&#2381;&#2357;&#2366;&#2360; &#2325;&#2379; &#2361;&#2335;&#2366;&#2325;&#2352; &#2361;&#2367;&#2306;&#2342;&#2370; &#2343;&#2352;&#2381;&#2350; &#2325;&#2379; &#2358;&#2369;&#2342;&#2381;&#2343; &#2325;&#2352;&#2344;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>",
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p></p><p>&bull; Atmiya Sabha (1814)</p><p>&#9675; Founded by Raja Ram Mohan Roy in 1814 in Bengal.</p><p>&#9675; Served as a platform for addressing significant socio-religious issues.</p><p>&#9675; Objectives:</p><p>&#9675; Social Reform:</p><p>&#9632; Focused on eliminating idolatry, caste discrimination, and child marriage.</p><p>&#9632; Aimed to eradicate the caste system and eliminate superstitions from Hinduism.</p><p>&#9675; Religious Purification:</p><p>&#9632; Advocated for monotheistic principles within Hinduism.</p><p>Further Insight:</p><p>&bull; Raja Ram Mohan Roy - A Visionary Thinker and Reformer</p><p>&#9675; Known as the \"Father of Indian Renaissance\" and \"Maker of Modern India.\"</p><p>&#9675; Born in 1772 in Bengal; conferred the title 'Raja' by Mughal Emperor Akbar II.</p><p>&#9675; Advocated rationalism, equality, and modern scientific thinking.</p><p>&#9675; Major Contributions</p><p>&#9632; Promoted monotheism through translations of the Vedas and Upanishads (1809).</p><p>&#9632; Opposed superstitions, idol worship, and caste hierarchies.</p><p>&#9632; Founded Atmiya Sabha (1814) and Brahmo Samaj (1828) to reform Hinduism.</p><p>&#9632; Advocated women's rights, opposing sati, child marriage, and widow oppression.</p><p>&#9632; Played a pivotal role in criminalizing sati under the Bengal Sati Regulation, 1829.</p><p>&#9632; Established Hindu College (1817), Anglo-Hindu School (1822), and Vedanta College (1826).</p><p>&#9632; ublished Sambad kaumudi to campaign for the abolition of Sati Pratha</p><p>&#9632; Authored works like <i>Tuhfat-ul-Muwahhidin</i> (1803) and <i>Precepts of Jesus</i> (1820).</p>",
    "question_index": 29
  },

    "question": "<span class=\"eqt\"><p>Which of the following statement(s) about the Union Council of Ministers is true?</p><p>A. Article 74 of the Constitution states that there shall be a Council of Ministers with the Prime Minister at the head to aid and advise the President.</p><p>B. The total number of Ministers, including the Prime Minister, in the Council of Ministers shall not exceed 10 per cent of the total strength of the Lok Sabha.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2346;&#2352;&#2367;&#2359;&#2342; &#2325;&#2375; &#2360;&#2350;&#2381;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p><p>A. &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 74 &#2325;&#2361;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2368; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2324;&#2352; &#2360;&#2354;&#2366;&#2361; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2325;&#2375; &#2360;&#2366;&#2341; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2346;&#2352;&#2367;&#2359;&#2342; &#2361;&#2379;&#2327;&#2368;&#2404;</p><p>B. &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2346;&#2352;&#2367;&#2359;&#2342; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2360;&#2361;&#2367;&#2340; &#2325;&#2369;&#2354; &#2350;&#2306;&#2340;&#2381;&#2352;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; 10 &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2327;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Clause 1 to Article 74 of the Constitution states that there shall be a Council of Ministers with the Prime Minister at the head to aid and advise the President who shall, in the exercise of his functions, act in accordance with such advice.</p><p>Clause 1A to Article 75 of the Constitution which was inserted by the 91<sup>st</sup> Constitutional Amendment Act of 2003 states that the total number of Ministers, including the Prime Minister, in the Council of Ministers shall not exceed fifteen per cent of the total number of members of the House of the People.</p>",
    "question_index": 31
  },

    "question": "<span class=\"eqt\"><p>Identify the incorrect statement.</p><p>I. In August 2024, Assam Chief Minister Himanta Biswa Sarma launched the Nijut Moina Scheme.</p><p>II. It is a monthly financial assistance scheme to increase girls enrolment in higher education and fight against child marriage.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2354;&#2340; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2309;&#2327;&#2360;&#2381;&#2340; 2024 &#2350;&#2375;&#2306;, &#2309;&#2360;&#2350; &#2325;&#2375; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2361;&#2367;&#2350;&#2306;&#2340; &#2348;&#2367;&#2360;&#2381;&#2357;&#2366; &#2360;&#2352;&#2350;&#2366; &#2344;&#2375; &#2344;&#2367;&#2332;&#2369;&#2340; &#2350;&#2379;&#2311;&#2344;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366; &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2368;&#2404;</p><p>II. &#2351;&#2361; &#2313;&#2330;&#2381;&#2330; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2354;&#2337;&#2364;&#2325;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2344;&#2366;&#2350;&#2366;&#2306;&#2325;&#2344; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2324;&#2352; &#2348;&#2366;&#2354; &#2357;&#2367;&#2357;&#2366;&#2361; &#2325;&#2375; &#2326;&#2367;&#2354;&#2366;&#2347; &#2354;&#2337;&#2364;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2350;&#2366;&#2360;&#2367;&#2325; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2351;&#2379;&#2332;&#2344;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both I and II are correct</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2364;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Assam Chief Minister Himanta Biswa Sarma launched the 'Nijut Moina Scheme'- a monthly financial assistance scheme to increase girls' enrolment in higher education and fight against child marriage. It may be noted that the scheme has been envisaged to encourage the girl students to pursue their higher studies. The scheme will also complement the already ongoing 'free admission' scheme of the government. As a part of the scheme, monthly financial assistance for girl students from HS to PG level in government and government-aided educational institutions will be given. Financial support is to be given 10 months in an academic year. The Rs.1500 crore scheme will benefit 10 lakh girls in four years.A student in HS First year will be entitled to Rs. 10 thousand that is Rs. 1 thousand every month for 10 months. A student at graduate level will be entitled to Rs. 12,500 that is Rs. 1250 for every month and PG level student will be entitled to 25,000 that is Rs. 2500 for every month for 10 months in a year.</p>",

  },

    "question": "<span class=\"eqt\"><p>In India, which of the following statements is true about the Consolidated fund of India?</p><p>a) It is mentioned under Article 266.</p><p>b) All government revenues such as tax, fees, duties etc kept under this fund</p><p>c) Government is incharge of the fund and Parliament can't interfere in use of its fund.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2360;&#2306;&#2330;&#2367;&#2340; &#2344;&#2367;&#2343;&#2367; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;?</p><p>a) &#2311;&#2360;&#2325;&#2366; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 266 &#2325;&#2375; &#2340;&#2361;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404;</p><p>b) &#2360;&#2349;&#2368; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2332;&#2376;&#2360;&#2375; &#2325;&#2352;, &#2358;&#2369;&#2354;&#2381;&#2325;, &#2358;&#2369;&#2354;&#2381;&#2325; &#2310;&#2342;&#2367; &#2311;&#2360; &#2344;&#2367;&#2343;&#2367; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2352;&#2326;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p>c) &#2360;&#2352;&#2325;&#2366;&#2352; &#2311;&#2360; &#2344;&#2367;&#2343;&#2367; &#2325;&#2368; &#2346;&#2381;&#2352;&#2349;&#2366;&#2352;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2360;&#2306;&#2360;&#2342; &#2311;&#2360;&#2325;&#2375; &#2344;&#2367;&#2343;&#2367; &#2325;&#2375; &#2313;&#2346;&#2351;&#2379;&#2327; &#2350;&#2375;&#2306; &#2361;&#2360;&#2381;&#2340;&#2325;&#2381;&#2359;&#2375;&#2346; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only c and a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c &#2324;&#2352; a</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; It is mentioned under Article 266 under clause 1.</p><p>&bull; All government revenues such as tax, fees, duties etc kept under this fund</p><p>&bull; Government is incharge of the fund and Parliament must approve the use of the fund</p><p>Further Insight:</p><p>&bull; Article 266: Consolidated Funds and Public Accounts</p><p>&#9675; Consolidated Fund:</p><p>&#9632; All revenues, loans, and repayments of the Government of India form the Consolidated Fund of India.</p><p>&#9632; Revenues, loans, and repayments of State Governments form the Consolidated Fund of the State.</p><p>&#9675; Public Accounts:</p><p>&#9632; Other public monies are credited to the Public Account of India or the State.</p><p>&#9675; Appropriation:</p><p>&#9632; No money from the Consolidated Fund can be spent unless authorized by law and in accordance with the Constitution.</p><p>&bull; Article 267: Contingency Fund</p><p>&#9675; Purpose:</p><p>&#9632; A Contingency Fund is established to meet unforeseen expenses.</p><p>&#9675; Fund Administration:</p><p>&#9632; The Contingency Fund of India is administered by the President of India, and the Contingency Fund of the State is administered by the State Governor.</p><p>&#9675; Utilization:</p><p>&#9632; Advances from the Fund can be made to meet urgent expenditures before legislative approval..</p>",
    "question_index": 33

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true about the Samudrayaan Mission ?</p><p>A. It was approved by the Ministry of Earth Sciences in 2021.</p><p>B. At the heart of the Samudrayaan mission is the development of Matsya-6000, an indigenously designed manned submersible vehicle.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2351;&#2366;&#2344; &#2350;&#2367;&#2358;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A. &#2311;&#2360;&#2375; 2021 &#2350;&#2375;&#2306; &#2346;&#2371;&#2341;&#2381;&#2357;&#2368; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2344;&#2369;&#2350;&#2379;&#2342;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>B. &#2360;&#2350;&#2369;&#2342;&#2381;&#2352;&#2351;&#2366;&#2344; &#2350;&#2367;&#2358;&#2344; &#2325;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2350;&#2375;&#2306; &#2350;&#2340;&#2381;&#2360;&#2381;&#2351;-6000 &#2325;&#2366; &#2357;&#2367;&#2325;&#2366;&#2360; &#2361;&#2376;, &#2332;&#2379; &#2319;&#2325; &#2360;&#2381;&#2357;&#2342;&#2375;&#2358;&#2368; &#2352;&#2370;&#2346; &#2360;&#2375; &#2337;&#2367;&#2332;&#2366;&#2311;&#2344; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2350;&#2366;&#2344;&#2357;&#2351;&#2369;&#2325;&#2381;&#2340; &#2346;&#2344;&#2337;&#2369;&#2348;&#2381;&#2348;&#2368; &#2357;&#2366;&#2361;&#2344; &#2361;&#2376;&#2404;</p></span>",

    ],

    "solution": "<p>&bull; Statement I: True. The scheme was indeed launched in 2016.</p><p>&bull; Statement II: False. It provides coverage for various crops, not just wheat and rice.</p><p>&bull; Statement III: True. The scheme aims to support farmers in case of crop failure.</p><p></p><p>The Pradhan Mantri Fasal Bima Yojana(PMFBY) launched on 18 February 2016 is an insurance service for farmers for their yields. The PMFBY works on the One Nation, One Crop, One Premium. To provide insurance coverage and financial support to the farmers in the event of failure of any of the notified crops as a result of natural calamities, pests & diseases.</p><p>The benefits of this scheme are mentioned as under:</p><p>- Comprehensive insurance coverage for Kharif and Rabi crops.</p><p>- Add on the coverage available for specific circumstances.</p><p>- Optional for farmers, both loanee and non-loanee.</p><p>- Stability in the income of farmers so that they can continue farming.</p><p></p>",
    "question_index": 39
  },
  {
    "question": "<span class=\"eqt\"><p>Arrange the following Governor generals of India in Chronological order:</p><p>I. Lord Wellesley</p><p>II. Lord Cornwallis</p><p>III. Lord Minto I</p><p>IV. Lord Hastings.</p><p>Select the correct answer from the code given below:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352; &#2332;&#2344;&#2352;&#2354;&#2379;&#2306; &#2325;&#2379; &#2325;&#2366;&#2354;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2354;&#2377;&#2352;&#2381;&#2337; &#2357;&#2375;&#2354;&#2375;&#2332;&#2354;&#2368;</p><p>II. &#2354;&#2377;&#2352;&#2381;&#2337; &#2325;&#2366;&#2352;&#2381;&#2344;&#2357;&#2366;&#2354;&#2367;&#2360;</p><p>III. &#2354;&#2377;&#2352;&#2381;&#2337; &#2350;&#2367;&#2306;&#2335;&#2379; I</p><p>IV. &#2354;&#2377;&#2352;&#2381;&#2337; &#2361;&#2375;&#2360;&#2381;&#2335;&#2367;&#2306;&#2327;&#2381;&#2360;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2360;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",
    "options": [
      "<span class=\"eqt\">II, I, III, IV</span><span class=\"hqt\" style=\"display:none\">II, I, III, IV</span>",
      "<span class=\"eqt\">II, I, IV, III.</span><span class=\"hqt\" style=\"display:none\">II, I, IV, III.</span>",
      "<span class=\"eqt\">II, III, I, IV</span><span class=\"hqt\" style=\"display:none\">II, III, I, IV</span>",
      "<span class=\"eqt\">I, III, IV, II</span><span class=\"hqt\" style=\"display:none\">I, III, IV, II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Warren Hastings 1773-1785</p><p>Lord Cornwallis 1786-1793</p><p>Sir John Shore 1793-1798</p><p>Lord Wellesley 1798-1805</p><p>Sir George Barlow 1805-1807</p><p>Lord Minto I 1807-1813</p><p>Lord Hastings 1813-1823</p><p>Lord Amherst 1823-1828</p><p>Lord William Bentinck 1828-1835</p><p>Lord Metcalfe 1835-1836</p><p>Lord Auckland 1836-1842</p><p>Lord Ellenborough 1842-1844</p><p>Lord Hardinge I 1844-1848</p><p>Lord Dalhousie 1848-1856</p><p>Lord Canning 1856-1857</p><p>Source: A Brief History of Modern India, Rajiv Ahir.</p>",

    "question": "<span class=\"eqt\"><p>Which dynasty was the successor of the Tughlaq Dynasty?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2369;&#2327;&#2354;&#2325; &#2357;&#2306;&#2358; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352;&#2368; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2306;&#2358; &#2341;&#2366; ?</p></span>",
    "options": [
      "<span class=\"eqt\">Mughal Empire</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2327;&#2354; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Lodhi Dynasty</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2343;&#2368; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">Sayyid Dynasty</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2376;&#2351;&#2381;&#2351;&#2342; &#2352;&#2366;&#2332;&#2357;&#2306;&#2358;</span>",
      "<span class=\"eqt\">None of these</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sayyid dynasty was the successor of the Tughlaq Dynasty.</p><p>Sayyid Dynasty - It was founded by Khizr khan in 1414 A. D. The reign ended in 1451 A. D.</p><p>Tughlaq Dynasty - Ghyasuddin Tughlaq, who was the Governor of Punjab during the reign of Ala-ud-din Khilji, ascended the throne in 1320 A. D. and founded the Tughlaq dynasty.</p>",
    "question_index": 41
  },

    "question": "<span class=\"eqt\"><p>With reference to 'Cheraw dance' consider the following statements and select the correct option.</p><p>a) The Cheraw or Bamboo Dance is a traditional dance of Mizoram.</p><p>b) The male dancers move the bamboos to a rhythmic beat while the female dancers move gracefully while stepping in and out of the bamboo formations.</p><p>c) The dancers are attired in colourful traditional costumes like the thihna, vakiria, kawrchei and puanchei.</p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2330;&#2375;&#2352;&#2366;&#2357; &#2344;&#2371;&#2340;&#2381;&#2351;' &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>a) &#2330;&#2375;&#2352;&#2366;&#2357; &#2351;&#2366; &#2348;&#2366;&#2306;&#2360; &#2344;&#2371;&#2340;&#2381;&#2351; &#2350;&#2367;&#2332;&#2379;&#2352;&#2350; &#2325;&#2366; &#2319;&#2325; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</p><p>b) &#2346;&#2369;&#2352;&#2369;&#2359; &#2344;&#2352;&#2381;&#2340;&#2325; &#2348;&#2366;&#2306;&#2360; &#2325;&#2379; &#2354;&#2351;&#2348;&#2342;&#2381;&#2343; &#2340;&#2366;&#2354; &#2346;&#2352; &#2361;&#2367;&#2354;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2348;&#2325;&#2367; &#2350;&#2361;&#2367;&#2354;&#2366; &#2344;&#2352;&#2381;&#2340;&#2325; &#2348;&#2366;&#2306;&#2360; &#2325;&#2368; &#2360;&#2306;&#2352;&#2330;&#2344;&#2366;&#2323;&#2306; &#2325;&#2375; &#2309;&#2306;&#2342;&#2352; &#2324;&#2352; &#2348;&#2366;&#2361;&#2352; &#2325;&#2342;&#2350; &#2352;&#2326;&#2340;&#2375; &#2361;&#2369;&#2319; &#2360;&#2369;&#2306;&#2342;&#2352; &#2338;&#2306;&#2327; &#2360;&#2375; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p><p>c) &#2344;&#2352;&#2381;&#2340;&#2325; &#2341;&#2367;&#2361;&#2344;&#2366;, &#2357;&#2325;&#2367;&#2352;&#2367;&#2351;&#2366;, &#2325;&#2366;&#2357;&#2352;&#2330;&#2375;&#2312; &#2324;&#2352; &#2346;&#2369;&#2310;&#2306;&#2330;&#2375;&#2312; &#2332;&#2376;&#2360;&#2368; &#2352;&#2306;&#2327;&#2368;&#2344; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2357;&#2375;&#2358;&#2349;&#2370;&#2359;&#2366; &#2346;&#2361;&#2344;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both b and c</span><span class=\"hqt\" style=\"display:none\">b &#2324;&#2352; c &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">a, b, c</span><span class=\"hqt\" style=\"display:none\">a, b, c</span>",
      "<span class=\"eqt\">Both a and c</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; c &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b &#2342;&#2379;&#2344;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Cheraw or Bamboo Dance is a traditional dance of Mizoram. It is considered to be one of the oldest dances of Mizoram.</p><p>The dance is believed to have emerged out of a ritual. In this dance form, bamboos are kept in horizontal or cross formation on the ground. Pairs of these bamboo staffs are held by six to eight people.</p><p>The male dancers move these bamboos to a rhythmic beat while the female dancers move gracefully while stepping in and out of the bamboo formations.</p><p>The bamboos are clapped together by the male dancers to a specific beat. The clapping produces a sharp sound which is used as a marker to maintain rhythm and timing of steps.</p><p>The dancers are attired in colourful traditional costumes like the thihna, vakiria, kawrchei and puanchei.</p>",
    "question_index": 42
  },
  {
    "question": "<span class=\"eqt\"><p>\"Thodu Bommalata\" (String Puppet) is a traditional art form of which state?</p></span><span class=\"hqt\" style=\"display:none\"><p>\"&#2341;&#2379;&#2337;&#2370; &#2348;&#2379;&#2350;&#2381;&#2350;&#2366;&#2354;&#2340;&#2366;\" (&#2360;&#2381;&#2335;&#2381;&#2352;&#2367;&#2306;&#2327; &#2325;&#2336;&#2346;&#2369;&#2340;&#2354;&#2368;) &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2325;&#2354;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Andhra Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Kerala</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2352;&#2354;</span>",
      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>",
      "<span class=\"eqt\">Karnataka</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Andhra Pradesh</b> is the state associated with Thodu Bommalata.</p><p>Thodu Bommalata, also known as String Puppet theatre, is a traditional puppet art form from Andhra Pradesh. The puppets are controlled by strings and narrate stories primarily from Hindu epics like Ramayana and Mahabharata.</p>",
    "question_index": 43
  },
