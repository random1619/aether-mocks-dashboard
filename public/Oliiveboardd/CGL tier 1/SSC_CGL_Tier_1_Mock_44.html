    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true?</p><p>A. In 2023 Usha Barle received Padma Shri for her contributions to Pandwani singing.</p><p>B. Pandwani is a popular form of entertainment and includes songs, improvisations and narration of stories from the Ramayana.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A. 2023 &#2350;&#2375;&#2306; &#2313;&#2359;&#2366; &#2348;&#2366;&#2352;&#2354;&#2375; &#2325;&#2379; &#2346;&#2306;&#2337;&#2357;&#2366;&#2344;&#2368; &#2327;&#2366;&#2351;&#2344; &#2350;&#2375;&#2306; &#2313;&#2344;&#2325;&#2375; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2342;&#2381;&#2350; &#2358;&#2381;&#2352;&#2368; &#2350;&#2367;&#2354;&#2366;&#2404;</p><p>B. &#2346;&#2306;&#2337;&#2357;&#2366;&#2344;&#2368; &#2350;&#2344;&#2379;&#2352;&#2306;&#2332;&#2344; &#2325;&#2366; &#2319;&#2325; &#2354;&#2379;&#2325;&#2346;&#2381;&#2352;&#2367;&#2351; &#2352;&#2370;&#2346; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2350;&#2375;&#2306; &#2327;&#2368;&#2340;, &#2340;&#2366;&#2340;&#2381;&#2325;&#2366;&#2354;&#2367;&#2325; &#2352;&#2330;&#2344;&#2366;&#2319;&#2305; &#2324;&#2352; &#2352;&#2366;&#2350;&#2366;&#2351;&#2339; &#2325;&#2368; &#2325;&#2361;&#2366;&#2344;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Both A and B</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">Neither A nor B</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; A &#2324;&#2352; &#2344; &#2361;&#2368; B</span>",
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Usha Barle is a Pandwani singer hailing from the state of Chhattisgarh, India.</p><p>In 2023 she received fourth highest civilian award in India the Padma Shri for her contributions to Pandwani singing, by Indian president Droupadi Murmu.</p><p>Pandavani is a narrative art form of the tribal areas of Chhattisgarh and its neighbouring states. Pandavani is a popular form of entertainment and includes songs, improvisations and narration of stories from the Mahabharata.</p><p>The performer enacts and sings with an ektara or tambura and sometimes a kartal.</p><p>Born on May 2, 1968, in Bhilai, Usha Barle started learning Pandwani at the young age of seven. Her journey into this traditional art form began with training from the renowned Pandwani singer and Padma Vibhushan awardee Teejan Bai.</p><p>Teejan Bai (1956-) was born in the remote village of Ganiyari in Chhatisgarh to the Pardhi tribe. She was trained in the art of Pandavani by her maternal grandfather. Her debut performance was at the neighbouring village of Chandrakhuri at the age of thirteen.</p><p>She sang in the Kapalik style which was considered to be a male bastion.</p><p>Her performance stood out as she performed standing up in her characteristic gravelly voice. Since her debut she has travelled widely and received many honours like the Padma Bhushan in 2003.</p>",
    "question_index": 44
  },
  {
    "question": "<span class=\"eqt\"><p>According to the Koppen's scheme of climatic classification, which among the following statements is/are correct?</p><p>I. North-Western Gujarat is part of Semi-arid steppe climate.</p><p>II. Most of peninsular India south of Tropic of cancer has tropical savannah climate.</p><p>III. Any region of India doesn't have a polar type climate.</p><p>Select the answer using the codes below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2379;&#2346;&#2375;&#2344; &#2325;&#2368; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2357;&#2352;&#2381;&#2327;&#2368;&#2325;&#2352;&#2339; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2313;&#2340;&#2381;&#2340;&#2352;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2309;&#2352;&#2381;&#2343;-&#2358;&#2369;&#2359;&#2381;&#2325; &#2350;&#2376;&#2342;&#2366;&#2344;&#2368; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2325;&#2352;&#2381;&#2325; &#2352;&#2375;&#2326;&#2366; &#2325;&#2375; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2351;&#2342;&#2381;&#2357;&#2368;&#2346;&#2368;&#2351; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; &#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2360;&#2357;&#2366;&#2344;&#2366; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2361;&#2376;&#2404;</p><p>III. &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2343;&#2381;&#2352;&#2369;&#2357;&#2368;&#2351; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2332;&#2354;&#2357;&#2366;&#2351;&#2369; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er241205imgst2.png\"></p><p>Koppen's scheme of climatic classification uses letter symbols to denote climatic types.</p><p>Each type is further sub-divided into sub-types on the basis of seasonal variations in the distributional pattern of rainfall and temperature.</p><p>It uses S for semi-arid and W for arid and the following small letters to define sub-types: f (sufficient precipitation), m (rain forest despite a dry monsoon season), w (dry season in winter), h (dry and hot), c (less than four months with mean temperature over 10&deg;C), and g (Gangetic plain).</p><p>Based on this classification Indian climate can be divided into following types:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Type of Climate</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Areas</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Amw Monsoon with short dry season</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">West coast of India south of Go.</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>As  -  Monsoon with dry summer</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Coromandel coast of Tamil Nadu</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Aw  -  Tropical savannah</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Most of the Peninsular plateaus, south of the Tropic of Cancer<b>. (Statement II is correct)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Bwhw  -  Semi-arid steppe climate</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">North-western Gujarat, some parts of western Rajasthan and Punjab<b>. <i>(Statement I is correct)</i></b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Bwhw  -  Hot desert</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Extreme western Rajasthan</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Cwg  -  Monsoon with dry winter</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ganga plain, eastern Rajasthan, northern Madhya Pradesh, most of North-east India</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Dfc  -  Cold humid winter with short summer</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Arunachal Pradesh</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>E  -  Polar type</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Jammu and Kashmir, Himachal Pradesh and Uttarakhand. (<b>Statement III is incorrect)</b></td></tr></table></p><p>Source: NCERT</p>",
    "question_index": 45
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements regarding the Deccan Plateau-</p><p>1) The highest peak of peninsular plateau is Anaimudi which is located on Nilgiri Hills.</p><p>2) Western Ghats are comparatively lower in elevation and more discontinuous than the Eastern Ghats.</p><p>Select the correct answer using the codes given below-</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2325;&#2381;&#2325;&#2344; &#2325;&#2375; &#2346;&#2336;&#2366;&#2352; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;-</p><p>1) &#2346;&#2381;&#2352;&#2366;&#2351;&#2342;&#2381;&#2357;&#2368;&#2346;&#2368;&#2351; &#2346;&#2336;&#2366;&#2352; &#2325;&#2368; &#2360;&#2348;&#2360;&#2375; &#2314;&#2305;&#2330;&#2368; &#2330;&#2379;&#2335;&#2368; &#2309;&#2344;&#2366;&#2312;&#2350;&#2369;&#2337;&#2368; &#2361;&#2376; &#2332;&#2379; &#2344;&#2368;&#2354;&#2327;&#2367;&#2352;&#2367; &#2346;&#2361;&#2366;&#2337;&#2364;&#2367;&#2351;&#2379;&#2306; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>2) &#2346;&#2358;&#2381;&#2330;&#2367;&#2350;&#2368; &#2328;&#2366;&#2335; &#2346;&#2370;&#2352;&#2381;&#2357;&#2368; &#2328;&#2366;&#2335; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2340;&#2369;&#2354;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2325;&#2350; &#2314;&#2305;&#2330;&#2366;&#2312; &#2357;&#2366;&#2354;&#2375; &#2324;&#2352; &#2309;&#2343;&#2367;&#2325; &#2309;&#2360;&#2306;&#2340;&#2340; &#2361;&#2376;&#2306;&#2404;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2360;&#2361;&#2368; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;-</p></span>",
    "options": [
      "<span class=\"eqt\">Only 1</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 1</span>",
      "<span class=\"eqt\">Only 2</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; 2</span>",
      "<span class=\"eqt\">Both 1 and 2</span><span class=\"hqt\" style=\"display:none\">1 &#2324;&#2352; 2 &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The highest peak of peninsular plateau is Anaimudi (2695 mtr) which is <u>located on Anaimalai hills</u> of the Western Ghats, followed by Dodabetta (2637 mtr) on the Nilgiri Hills.</p><p>Western Ghats are comparatively <u>higher in elevation and more continuous</u> than the Eastern Ghats. Their average elevation is about 1500 m with the height increasing from North to South.</p><p>Eastern ghats comprising the discontinuous and low hills are highly eroded by the rivers such as the Mahanadi, the Godavari, the Krishna, the Kavari etc.</p>",
    "question_index": 46
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following comes under the Revenue Expenditure?</p><p>a) Payment of interest</p><p>b) Grant and Subsidies</p><p>c) Health Services</p><p>Choose the correct option</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2357;&#2381;&#2351;&#2351; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352;&#2381;&#2327;&#2340; &#2310;&#2340;&#2366; &#2361;&#2376;?</p><p>a) &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344;</p><p>b) &#2309;&#2344;&#2369;&#2342;&#2366;&#2344; &#2324;&#2352; &#2360;&#2348;&#2381;&#2360;&#2367;&#2337;&#2368;</p><p>c) &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2360;&#2375;&#2357;&#2366;&#2319;&#2305;</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">Only c and a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c &#2324;&#2352; a</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2314;&#2346;&#2352; &#2325;&#2375; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Revenue Expenditure are those expenditures which neither creates assets not reduces liabilities.</p><p>&bull; Revenue Expenditure includes routine expenses such as salaries and pensions.</p><p>&bull; And other expenses such as Payment of Interest, Grant and subsidies, Health Services etc.</p><p>Further Insight:</p><p>&bull; </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Budget Expenditure</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Revenue Expenditure (Components)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Capital Expenditure (Components)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b> </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(Expenditure which neither creates assets nor reduces liabilities)</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(Expenditure which creates assets or reduces liabilities)</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Examples</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Examples</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Examples</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b> </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(i) Payment of interest</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(i) Construction of roads, bridges, buildings</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b> </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(ii) Payment of salaries and pensions</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(ii) Purchase of land and machinery</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b> </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(iii) Grants and subsidies</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(iii) Investment in shares</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b> </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(iv) Education and health services</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(iv) Loans to states and foreign government</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b> </b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(v) Defence services</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>(v) Repayment of loans</b></td></tr></table>",
    "question_index": 47
  },

    "question": "<span class=\"eqt\"><p>Gross National Product at Market Price is defined as:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2360;&#2325;&#2354; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342; &#2325;&#2379; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2346;&#2352;&#2367;&#2349;&#2366;&#2359;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">The market value of all final goods and services produced in an economy taking into account net factor income from abroad</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2360;&#2349;&#2368; &#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351;, &#2332;&#2367;&#2360;&#2350;&#2375;&#2306; &#2357;&#2367;&#2342;&#2375;&#2358;&#2379;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2358;&#2369;&#2342;&#2381;&#2343; &#2325;&#2366;&#2352;&#2325; &#2310;&#2351; &#2325;&#2379; &#2349;&#2368; &#2358;&#2366;&#2350;&#2367;&#2354; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">The market value of all final goods and services produced in an economy</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2360;&#2349;&#2368; &#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351;</span>",
      "<span class=\"eqt\">The market value of all final goods and services produced in an economy plus indirect taxes</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2360;&#2349;&#2368; &#2309;&#2306;&#2340;&#2367;&#2350; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; + &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352;</span>",
      "<span class=\"eqt\">The market value of all goods and services produced in an economy plus indirect taxes minus subsidies</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2360;&#2368; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2360;&#2349;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2366; &#2348;&#2366;&#2332;&#2366;&#2352; &#2350;&#2370;&#2354;&#2381;&#2351; + &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352; - &#2360;&#2348;&#2381;&#2360;&#2367;&#2337;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b><img width=672 height=262 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p1203/image001.jpg\"></b></p><p>GNP at MP = GDP at MP + Net Factor Income from Abroad. Hence answer is option A</p><p><b>Source:</b> Introductory Macroeconomics  -  Class XII</p>",
    "question_index": 48
  },

    "question": "<span class=\"eqt\"><p>Identify the incorrect statement.</p><p>A. Keremane Idagunji Mahaganapati Yakshagana Mandali founded in 1934 was accredited by 2003 Convention for Safeguarding of the Intangible Cultural Heritage of UNESCO in June, 2024.</p><p>B. It is located in Kasaragod, Kerala.</p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2354;&#2340; &#2325;&#2341;&#2344; &#2325;&#2379; &#2346;&#2361;&#2330;&#2366;&#2344;&#2375;&#2306;&#2404;</p><p>A. 1934 &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2375;&#2352;&#2375;&#2350;&#2366;&#2344;&#2375; &#2311;&#2342;&#2366;&#2327;&#2369;&#2306;&#2332;&#2368; &#2350;&#2361;&#2366;&#2327;&#2339;&#2346;&#2340;&#2367; &#2351;&#2325;&#2381;&#2359;&#2327;&#2339; &#2350;&#2306;&#2337;&#2354;&#2368; &#2325;&#2379; &#2332;&#2370;&#2344;, 2024 &#2350;&#2375;&#2306; &#2351;&#2370;&#2344;&#2375;&#2360;&#2381;&#2325;&#2379; &#2325;&#2375; &#2309;&#2350;&#2370;&#2352;&#2381;&#2340; &#2360;&#2366;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;&#2325; &#2357;&#2367;&#2352;&#2366;&#2360;&#2340; &#2325;&#2368; &#2360;&#2369;&#2352;&#2325;&#2381;&#2359;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; 2003 &#2325;&#2344;&#2381;&#2357;&#2375;&#2306;&#2358;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2366; &#2342;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p><p>B. &#2351;&#2361; &#2325;&#2375;&#2352;&#2354; &#2325;&#2375; &#2325;&#2366;&#2360;&#2352;&#2327;&#2379;&#2337; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">A and B are incorrect</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">A only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">A and B are correct</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Keremane Idagunji Mahaganapati Yakshagana Mandali (located in Honnavar, Uttara Kannada, Karnataka) founded in 1934 by Late Keremane Shivarama Hegde, was taken forward by his son Late Keremane Shambhu Hegde and is presently led by Keremane Shivananda Hegde, is accredited by 2003 Convention for Safeguarding of the Intangible Cultural Heritage of UNESCO to provide advisory services during its 10th session at UNESCO headquarters from June 11 to 12, 2024.</p><p></p><p></p>",
    "question_index": 49
  },
  {
    "question": "<span class=\"eqt\"><p>Below bar graphs show the number of mobiles of two different models (X and Y) manufactured by two companies (Samsung and Motorola) over five years:</p><p><img width=576 height=336 id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er221028st2npm8-004.png\"></p><p><img width=576 height=336 id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er221028st2npm8-005.png\"></p><p></p><p>What is the difference between the average of number of mobiles of model X manufactured by Samsung from 2012 to 2014 and the average of number of mobiles of model Y manufactured by Motorola from 2014 to 2016?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2342;&#2306;&#2337; &#2310;&#2352;&#2375;&#2326; &#2346;&#2366;&#2305;&#2330; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2379; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; (&#2360;&#2376;&#2350;&#2360;&#2306;&#2327; &#2324;&#2352; &#2350;&#2379;&#2335;&#2379;&#2352;&#2379;&#2354;&#2366;) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2342;&#2379; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2350;&#2377;&#2337;&#2354;&#2379;&#2306; (X &#2324;&#2352; Y) &#2325;&#2375; &#2350;&#2379;&#2348;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;:</p><p><img width=\"576\" height=\"336\" id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er221028st2npm8-004.png\"></p><p><img width=\"576\" height=\"336\" id=\"Chart 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/other/er221028st2npm8-005.png\"></p><p>2012 &#2360;&#2375; 2014 &#2340;&#2325; &#2360;&#2376;&#2350;&#2360;&#2306;&#2327; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2350;&#2377;&#2337;&#2354; X &#2325;&#2375; &#2350;&#2379;&#2348;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; 2014 &#2360;&#2375; 2016 &#2340;&#2325; &#2350;&#2379;&#2335;&#2379;&#2352;&#2379;&#2354;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2350;&#2377;&#2337;&#2354; Y &#2325;&#2375; &#2350;&#2379;&#2348;&#2366;&#2311;&#2354;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">40</span><span class=\"hqt\" style=\"display:none\">40</span>",
      "<span class=\"eqt\">90</span><span class=\"hqt\" style=\"display:none\">90</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">0</span><span class=\"hqt\" style=\"display:none\">0</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The average of number of mobiles of model X manufactured by Samsung from 2012 to 2014 = (240 + 180 + 300)/3 = 240</p><p>The average of number of mobiles of model Y manufactured by Motorola from 2014 to 2016 = (180 + 220 + 320)/3 = 240</p><p>So, required difference = 240  -  240 = 0</p>",
    "question_index": 50
  },

    "question": "<span class=\"eqt\"><p>The average height of 12 students is 160 cm while the average height of 10 of them is 157 cm. If one of the remaining students contributes to 60% of the height in the total height of two students, then what are the heights of the remaining two students?</p></span><span class=\"hqt\" style=\"display:none\"><p>12 &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2314;&#2306;&#2330;&#2366;&#2312; 160 &#2360;&#2375;&#2350;&#2368;. &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; 10 &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2314;&#2306;&#2330;&#2366;&#2312; 157 &#2360;&#2375;&#2350;&#2368;. &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2358;&#2375;&#2359; &#2348;&#2330;&#2375; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2319;&#2325; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2368; &#2325;&#2366; &#2342;&#2379; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2314;&#2305;&#2330;&#2366;&#2312; &#2350;&#2375;&#2306; 60% &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2366; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359; &#2342;&#2379; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2352;&#2381;&#2341;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312;&#2351;&#2366;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">204 cm and 136 cm</span><span class=\"hqt\" style=\"display:none\">204 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 136 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">225 cm and 150 cm</span><span class=\"hqt\" style=\"display:none\">225 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 150 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">210 cm and 140 cm</span><span class=\"hqt\" style=\"display:none\">210 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 140 &#2360;&#2375;&#2350;&#2368;</span>",
      "<span class=\"eqt\">222 cm and 148 cm</span><span class=\"hqt\" style=\"display:none\">222 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; 148 &#2360;&#2375;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Sum of height of 12 students = 12  X  160 cm = 1920 cm</p><p>Similarly, sum of heights of 10 students = 10  X  157 cm = 1570 cm</p><p>Sum of heights of the remaining two students = 1920  -  1570 = 350 cm</p><p>Height of one out of remaining 2 students = 60/100  X  350 = 210 cm</p><p>Height of the other student = 350 - 210 = 140 cm</p>",
    "question_index": 51

    "question": "<span class=\"eqt\"><p>There are 2 buildings of equal height of 240 m, separated by some distance. From a point between the buildings, the angle of elevation of the top of the towers are 45&deg; and 60&deg; respectively. What is the separation between the buildings?</p></span><span class=\"hqt\" style=\"display:none\"><p>240 m &#2325;&#2368; &#2360;&#2350;&#2366;&#2344; &#2314;&#2306;&#2330;&#2366;&#2312; &#2325;&#2368; 2 &#2311;&#2350;&#2366;&#2352;&#2340;&#2375;&#2306; &#2361;&#2376;&#2306;, &#2332;&#2379; &#2325;&#2369;&#2331; &#2342;&#2370;&#2352;&#2368; &#2360;&#2375; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2375; &#2342;&#2370;&#2352; &#2361;&#2376;&#2306;&#2404; &#2311;&#2350;&#2366;&#2352;&#2340;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2360;&#2375;, &#2335;&#2366;&#2357;&#2352;&#2379;&#2306; &#2325;&#2375; &#2358;&#2368;&#2352;&#2381;&#2359; &#2325;&#2366; &#2313;&#2344;&#2381;&#2344;&#2351;&#2344; &#2325;&#2379;&#2339; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 45&deg; &#2324;&#2352; 60&deg; &#2361;&#2376;&#2404; &#2311;&#2350;&#2366;&#2352;&#2340;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352;&#2368; &#2361;&#2376;?</p></span>",

    "solution": "<p>Diagram not drawn to scale.</p><p><img width=348 height=187 id=\"Picture 4\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p5702/image004.jpg\"></p><p>AB and CD are the buildings of height 240 m.</p><p>BC is the separation between them.</p><p>In triangle ABE,</p><p>tan 45&deg; = 240/BE</p><p>=&gt; BE = 240 m</p><p>In triangle CED,</p><p>tan 60&deg; = 240/EC</p><p>=&gt; EC = 240/&radic;3 = 80&radic;3 m</p><p>&#8756; BC = BE + EC = 240 + 80&radic;3 = 80(3 + &radic;3) m</p>",

    "question": "<span class=\"eqt\"><p>M and N can do a piece of work in 11.2 days, N and O in 9.6 days, and O and M in 80 days, they all worked together for 8 days. Then what percentage (correct to two decimal places) of the work would be left to be done?</p></span><span class=\"hqt\" style=\"display:none\"><p>M &#2324;&#2352; N &#2319;&#2325; &#2325;&#2366;&#2350; &#2325;&#2379; 11.2 &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, N &#2324;&#2352; O, 9.6 &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; O &#2324;&#2352; M, 80 &#2342;&#2367;&#2344; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2357;&#2375; &#2360;&#2349;&#2368; 8 &#2342;&#2367;&#2344; &#2340;&#2325; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2350; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2340;&#2379; &#2325;&#2366;&#2350; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; (&#2342;&#2379; &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2340;&#2325;) &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2366; &#2358;&#2375;&#2359; &#2352;&#2361; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",

    "solution": "<p>Let the total work = LCM of 11.2, 9.6, and 80 = 336 units</p><p>Efficiency of M and N = 336/11.2 = 30 units per day</p><p>Efficiency of N and O = 336/9.6 = 35 units per day</p><p>Efficiency of O and M = 336/80 = 4.2 units per day</p><p>2 * (M + N + O) = 69.2</p><p>M + N + O = 34.6</p><p>Work done by all three in 8 days = 34.6 * 8 = 276.8 units</p><p>Amount of work left = 336  -  276.8 = 59.2 units</p><p>Required percentage = 59.2 * 100/336 = 17.62%</p>",

    "question": "<span class=\"eqt\"><p>A boat covers a distance of 528 km downstream and then returns to the mid-point of the journey in a total of 25.2 hours. The ratio of the speed of the boat in still water to the downstream speed is 8 : 11. In how much time will it cover 105 km in upstream?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2366;&#2357; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 528 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2340;&#2351; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; &#2325;&#2369;&#2354; 25.2 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2375; &#2350;&#2343;&#2381;&#2351; &#2348;&#2367;&#2306;&#2342;&#2369; &#2346;&#2352; &#2357;&#2366;&#2346;&#2360; &#2310; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2344;&#2366;&#2357; &#2325;&#2368; &#2327;&#2340;&#2367; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; &#2327;&#2340;&#2367; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 8 : 11 &#2361;&#2376;&#2404; &#2351;&#2361; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 105 &#2325;&#2367;&#2350;&#2368; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; &#2325;&#2367;&#2340;&#2344;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2352;&#2375;&#2327;&#2368;?</p></span>",
    "options": [

    "solution": "<p>Let, speed of boat in still water = 8x km/h and downstream speed = 11x km/h</p><p>Stream speed = 3x km/h</p><p>Upstream speed = 8x - 3x = 5x km/h</p><p>Downstream time = 528 / 11x = 48/x hours</p><p>Return time = 264 / 5x = 52.8/x hours</p><p>Total time = 100.8/x = 25.2 hours</p><p>So, x = 4 km/h</p><p>Upstream speed = 5x = 20 km/h</p><p>Required time = 105 / 20 = 5.25 hours</p>",
    "question_index": 56

    "question": "<span class=\"eqt\"><p>The lines 3x + 7y = -2 and 4x  -  y = 18 have a unique solution. Find the distance (in units) between the unique solution and the point of intersection of the line 4x  -  y = 18 and the y  -  axis.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2375;&#2326;&#2366;&#2319;&#2305; 3x + 7y = -2 &#2324;&#2352; 4x - y = 18 &#2325;&#2366; &#2319;&#2325; &#2309;&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2361;&#2354; &#2361;&#2376;&#2404; &#2309;&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351; &#2361;&#2354; &#2324;&#2352; &#2352;&#2375;&#2326;&#2366; 4x - y = 18 &#2324;&#2352; y - &#2309;&#2325;&#2381;&#2359; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2348;&#2367;&#2306;&#2342;&#2369; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; (&#2311;&#2325;&#2366;&#2311;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

    "correct_option_id": 3,
    "solution": "<p>Since, the lines 3x + 7y = -2 and 4x  -  y = 18 have a unique solution.</p><p>4x  -  y = 18 =&gt; y = 4x  -  18</p><p>3x + 7y = -2</p><p>3x + 7(4x  -  18) = -2</p><p>3x + 28x  -  126 = -2</p><p>31x = 124</p><p>x = 4</p><p>y = -2</p><p>(x<sub>1</sub>, y<sub>1</sub>) = (4, -2)</p><p>Since, the point where line cut y-axis is the point where x = 0</p><p>4*0  -  y = 18</p><p>Y = -18</p><p>Point = (x<sub>2</sub>, y<sub>2</sub>) = (0, -18)</p><p>Distance = &radic;[(x<sub>2</sub>  -  x<sub>1</sub>)<sup>2</sup> + (y<sub>2</sub>  -  y<sub>1</sub>)<sup>2</sup>]</p><p>= &radic;[(0  -  4)<sup>2</sup> + {-18  -  (-2)}<sup>2</sup>]</p><p>= &radic;(16 + 256)</p><p>= &radic;272</p><p>= 4&radic;17 units</p>",
    "question_index": 57

    "question": "<span class=\"eqt\"><p>A sector of a circular sheet of radius 29 cm has an arc length of 132 cm. This sector is rolled to form a right circular cone by joining its straight edges. What is the volume of the cone?</p></span><span class=\"hqt\" style=\"display:none\"><p>29 &#2360;&#2375;&#2350;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2358;&#2368;&#2335; &#2325;&#2375; &#2319;&#2325; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2326;&#2306;&#2337; &#2325;&#2368; &#2330;&#2366;&#2346; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 132 &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2326;&#2306;&#2337; &#2325;&#2375; &#2360;&#2368;&#2343;&#2375; &#2325;&#2367;&#2344;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2332;&#2379;&#2337;&#2364;&#2325;&#2352; &#2319;&#2325; &#2354;&#2350;&#2381;&#2348;&#2357;&#2371;&#2340;&#2381;&#2340;&#2368;&#2351; &#2358;&#2306;&#2325;&#2369; &#2348;&#2344;&#2366;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366; &#2310;&#2351;&#2340;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

    "correct_option_id": 0,
    "solution": "<p>Let,</p><p>r cm = base radius of cone</p><p>h cm = height of cone</p><p>l cm = slant height of cone</p><p>Slant height, l = radius of sector = 29 cm</p><p>Circumference of base = arc length = 132 cm</p><p>So, 2&#960;r = 132</p><p>&#8658; 2  (22/7)  r = 132</p><p>&#8658; r = (132  7)/(2  22) = 924/44 = 21 cm</p><p>Now,</p><p>h = &#8730;(l - r)</p><p>= &#8730;(29 - 21)</p><p>= &#8730;(841 - 441)</p><p>= &#8730;400 = 20 cm</p><p>Volume of cone = (1/3)&#960;rh</p><p>= (1/3)  (22/7)  (21)  20</p><p>= (1/3)  (22/7)  441  20</p><p>= (22/7)  147  20</p><p>= (22  2940)/7 = 64680/7 = 9240 cm</p>",

    "question": "<span class=\"eqt\"><p>Production of items in a company is 50% more than its sale in 2000. If in next year, the sale of items is increased by 40% and the number of items that remain unsold in the company is 20% less than that of previous year, then find the percentage change in the production of items.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2352;&#2381;&#2359; 2000 &#2350;&#2375;&#2306; &#2319;&#2325; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344;, &#2313;&#2360;&#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2360;&#2375; 50% &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2309;&#2327;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359;, &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2368; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2350;&#2375;&#2306; 40% &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2368; &#2348;&#2367;&#2344;&#2366; &#2348;&#2367;&#2325;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;, &#2346;&#2367;&#2331;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2368; &#2348;&#2367;&#2344;&#2366; &#2348;&#2367;&#2325;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 20% &#2325;&#2350; &#2361;&#2376;, &#2340;&#2379; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2350;&#2375;&#2306; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A solid spherical ball of radius 84 cm is melted and recast into 66 identical cuboids. If the length of the cuboid is 42 cm and the height of the cuboid is 7/8 of breadth of the cuboid, then find the breadth of the cuboid. </p></span><span class=\"hqt\" style=\"display:none\"><p>84 cm &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2336;&#2379;&#2360; &#2327;&#2379;&#2354;&#2366;&#2325;&#2366;&#2352; &#2327;&#2375;&#2306;&#2342; &#2325;&#2379; &#2346;&#2367;&#2328;&#2354;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; 66 &#2360;&#2350;&#2366;&#2344; &#2328;&#2344;&#2366;&#2349; &#2350;&#2375;&#2306; &#2346;&#2369;&#2344;&#2307; &#2338;&#2366;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2328;&#2344;&#2366;&#2349; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 42 cm &#2361;&#2376; &#2324;&#2352; &#2328;&#2344;&#2366;&#2349; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312;, &#2328;&#2344;&#2366;&#2349; &#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2366; 7/8 &#2349;&#2366;&#2327; &#2361;&#2376;, &#2340;&#2379; &#2328;&#2344;&#2366;&#2349; &#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">81 cm</span><span class=\"hqt\" style=\"display:none\">81 cm</span>",

    "solution": "<p>Radius of solid spherical ball = 84 cm</p><p>Let the breadth of cuboid = 'b' cm</p><p>Height of cuboid = 7b/8 cm</p><p>Length of cuboid = 42 cm</p><p>Volume of spherical ball = 66* Volume of cuboid</p><p>4/3*22/7*84*84*84 = 66* 42 * b * 7b/8</p><p>b<sup>2</sup> = 1024</p><p>b = 32 cm</p>",

    "question": "<span class=\"eqt\"><p>Median of 16 numbers is 24. When each of first 8 numbers is decreased by 3 and each of last 8 numbers is increased by 11, then their median becomes how much more or less than the original median?</p></span><span class=\"hqt\" style=\"display:none\"><p>16 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2368; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; 24 &#2361;&#2376;&#2404; &#2332;&#2348; &#2346;&#2361;&#2354;&#2368; 8 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2350;&#2375;&#2306; 3 &#2325;&#2368; &#2325;&#2350;&#2368; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2309;&#2306;&#2340;&#2367;&#2350; 8 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2350;&#2375;&#2306; 11 &#2325;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2344;&#2325;&#2368; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; &#2350;&#2370;&#2354; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; &#2360;&#2375; &#2325;&#2367;&#2340;&#2344;&#2368; &#2309;&#2343;&#2367;&#2325; &#2351;&#2366; &#2325;&#2350; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">4 more</span><span class=\"hqt\" style=\"display:none\">4 &#2309;&#2343;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Remains same as the actual median</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2368; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">8 more</span><span class=\"hqt\" style=\"display:none\">8 &#2309;&#2343;&#2367;&#2325;</span>",
      "<span class=\"eqt\">7 more</span><span class=\"hqt\" style=\"display:none\">7 &#2309;&#2343;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Total numbers = 16 (even)</p><p>So, median = ((16/2)<sup>th</sup> term + (16/2 + 1)<sup>th</sup> term)/2 = (8<sup>th</sup> term + 9<sup>th</sup> term)/2</p><p>Let 8<sup>th</sup> and 9<sup>th</sup> term are a and b respectively.</p><p>Then, median = 24 = (a + b)/2</p><p>When each of first 8 numbers is decreased by 3 and each of last 8 numbers is increased by 11, then order of numbers will be same as smaller numbers (from 1<sup>st</sup> to 8<sup>th</sup>) are decreasing and larger numbers (from 9<sup>th</sup> to 16<sup>th</sup>) are increasing.</p><p>8<sup>th</sup> number = a  -  3</p><p>9<sup>th</sup> number = b + 11</p><p>So, new median = (a  -  3 + b + 11)/2 = (a + b)/2 + 4 <b>(which is 4 more than the original median)</b></p>",
    "question_index": 61
  },

    "question": "<span class=\"eqt\"><p>If the slope of a line passing through points P(2, -5) and Q(x, 4) respectively is (-2/3), then what is the value of (2x + 7)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; P(2, -5) &#2324;&#2352; Q(x, 4) &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2352;&#2375;&#2326;&#2366; &#2325;&#2366; &#2338;&#2354;&#2366;&#2344;/&#2346;&#2381;&#2352;&#2357;&#2339;&#2340;&#2366; (-2/3) &#2361;&#2376;, &#2340;&#2379; (2x + 7) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">-18</span><span class=\"hqt\" style=\"display:none\">-18</span>",
      "<span class=\"eqt\">-12</span><span class=\"hqt\" style=\"display:none\">-12</span>",
      "<span class=\"eqt\">-14</span><span class=\"hqt\" style=\"display:none\">-14</span>",
      "<span class=\"eqt\">-16</span><span class=\"hqt\" style=\"display:none\">-16</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>According to the question:</p><p>(-2/3) = (4  -  (-5))/(x  -  2)</p><p>x = -23/2</p><p>Therefore, (2x + 7) = 2 * (-23/2) + 7 = <b>-16</b></p>",

    "question": "<span class=\"eqt\"><p>Manoj sells a shirt at some loss on Monday. On Tuesday, if he reduces the selling price of the shirt by 8%, his loss becomes 5% more than that of on Monday. At what loss percent does he sell his shirt on Monday? (Correct up to two decimals)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2344;&#2379;&#2332; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2325;&#2379; &#2325;&#2369;&#2331; &#2361;&#2366;&#2344;&#2367; &#2346;&#2352; &#2319;&#2325; &#2358;&#2352;&#2381;&#2335; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;&#2404; &#2350;&#2306;&#2327;&#2354;&#2357;&#2366;&#2352; &#2325;&#2379; &#2351;&#2342;&#2367; &#2357;&#2361; &#2358;&#2352;&#2381;&#2335; &#2325;&#2375; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2350;&#2375;&#2306; 8% &#2325;&#2368; &#2325;&#2350;&#2368; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360;&#2325;&#2368; &#2361;&#2366;&#2344;&#2367; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; 5% &#2309;&#2343;&#2367;&#2325; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2357;&#2361; &#2360;&#2379;&#2350;&#2357;&#2366;&#2352; &#2325;&#2379; &#2309;&#2346;&#2344;&#2368; &#2358;&#2352;&#2381;&#2335; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2366;&#2344;&#2367; &#2346;&#2352; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;? (&#2342;&#2358;&#2350;&#2354;&#2357; &#2325;&#2375; &#2342;&#2379; &#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2340;&#2325;)</p></span>",
    "options": [
      "<span class=\"eqt\">59.24%</span><span class=\"hqt\" style=\"display:none\">59.24%</span>",
      "<span class=\"eqt\">63.11%</span><span class=\"hqt\" style=\"display:none\">63.11%</span>",
      "<span class=\"eqt\">61.54%</span><span class=\"hqt\" style=\"display:none\">61.54%</span>",
      "<span class=\"eqt\">54.37%</span><span class=\"hqt\" style=\"display:none\">54.37%</span>"

    "correct_option_id": 2,
    "solution": "<p>We know that,</p><p>Amount by which selling price is reduced = Amount by which loss in increased</p><p>Selling price * 8% = Loss * 5%</p><p>Selling price/Loss = 5/8</p><p>Then,</p><p>Cost price of shirt = 5 + 8 = 13 units</p><p>Loss% = (8/13) * 100 = 61.54%</p>",

    "question": "<span class=\"eqt\"><p>The simple interest rate offered by a union bank is 4% in the first year. Starting from the second year, the simple interest rate offered by the bank is 1% more than the simple interest rate offered by the bank in the previous year. After how many years will the total simple interest earned on the deposit be 30% more than the initial amount deposited?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2370;&#2344;&#2367;&#2351;&#2344; &#2348;&#2376;&#2306;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2361;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2342;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; 4% &#2361;&#2376;&#2404; &#2342;&#2370;&#2360;&#2352;&#2375; &#2357;&#2352;&#2381;&#2359; &#2360;&#2375; &#2310;&#2352;&#2306;&#2349; &#2361;&#2379;&#2325;&#2352;, &#2348;&#2376;&#2306;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2346;&#2367;&#2331;&#2354;&#2375; &#2357;&#2352;&#2381;&#2359; &#2350;&#2375;&#2306; &#2348;&#2376;&#2306;&#2325; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2342;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2325;&#2368; &#2342;&#2352; &#2360;&#2375; 1% &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404; &#2325;&#2367;&#2340;&#2344;&#2375; &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2348;&#2366;&#2342; &#2332;&#2350;&#2366; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2346;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2325;&#2369;&#2354; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2332;&#2350;&#2366; &#2325;&#2368; &#2327;&#2312; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2360;&#2375; 30% &#2309;&#2343;&#2367;&#2325; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Interest earned in the first year = Rs.4</p><p>Interest earned in the second year = Rs.5</p><p>And interest earned in the nth year = Rs.130</p><p>So,</p><p>4 + 5 + 6 + ....... + n = 130</p><p>1 + 2 + 3 + 4 + 5 + 6 + ..... + n = 130 + 6</p><p>n x (n + 1)/2 = 136</p><p>n x (n + 1) = 272</p><p>Therefore, the value of n is 16.</p><p>Number of years = 16 - 3 = 13</p>",

    "question": "<span class=\"eqt\"><p>A general store offers 20% discount at marked price on the purchase of sugar for whole seller while 10% discount for others. Mr. Mishra purchased 15 kg of sugar as whole seller and 10 kg as normal customer. Mr. Mishra now sold whole amount of sugar and gains 25% on total transaction. Find that selling price of sugar decided by Mr. Mishra is what percent of original marked price of sugar for general store?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2332;&#2344;&#2352;&#2354; &#2360;&#2381;&#2335;&#2379;&#2352; &#2341;&#2379;&#2325; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2325;&#2375; &#2354;&#2367;&#2319; &#2330;&#2368;&#2344;&#2368; &#2325;&#2368; &#2326;&#2352;&#2368;&#2342; &#2346;&#2352; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 20% &#2325;&#2368; &#2331;&#2370;&#2335; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2309;&#2344;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; 10% &#2325;&#2368; &#2331;&#2370;&#2335; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2350;&#2367;&#2360;&#2381;&#2335;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2366; &#2344;&#2375; &#2341;&#2379;&#2325; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; 15 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2330;&#2368;&#2344;&#2368; &#2324;&#2352; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; 10 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2330;&#2368;&#2344;&#2368; &#2326;&#2352;&#2368;&#2342;&#2368;&#2404; &#2350;&#2367;&#2360;&#2381;&#2335;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2366; &#2344;&#2375; &#2309;&#2348; &#2330;&#2368;&#2344;&#2368; &#2325;&#2368; &#2360;&#2350;&#2381;&#2346;&#2370;&#2352;&#2381;&#2339; &#2350;&#2366;&#2340;&#2381;&#2352;&#2366; &#2348;&#2375;&#2330; &#2342;&#2367;&#2351;&#2366; &#2324;&#2352; &#2325;&#2369;&#2354; &#2354;&#2375;&#2344;-&#2342;&#2375;&#2344; &#2346;&#2352; 25% &#2354;&#2366;&#2349; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404; &#2350;&#2367;&#2360;&#2381;&#2335;&#2352; &#2350;&#2367;&#2358;&#2381;&#2352;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2330;&#2368;&#2344;&#2368; &#2325;&#2366; &#2357;&#2367;&#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351;, &#2332;&#2344;&#2352;&#2354; &#2360;&#2381;&#2335;&#2379;&#2352; &#2325;&#2375; &#2354;&#2367;&#2319; &#2330;&#2368;&#2344;&#2368; &#2325;&#2375; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">125%</span><span class=\"hqt\" style=\"display:none\">125%</span>",
      "<span class=\"eqt\">105%</span><span class=\"hqt\" style=\"display:none\">105%</span>",
      "<span class=\"eqt\">115%</span><span class=\"hqt\" style=\"display:none\">115%</span>",
      "<span class=\"eqt\">85%</span><span class=\"hqt\" style=\"display:none\">85%</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let marked price of 1 kg of sugar for general store = 100M.</p><p>CP of 15 kg of sugar for Mr. Mishra = 15 * (80% of 100M) = 1200M</p><p>CP of 10 kg of sugar for Mr. Mishra = 10 * (90% of 100M) = 900M</p><p>Total CP for Mr. Mishra = 1200M + 900M = 2100M</p><p>Total SP for Mr. Mishra after 25% profit = 125% of 2100M = 2625M</p><p>SP of 1 kg of sugar for Mr. Mishra = 2625M/25 = 105M</p><p>Required per cent = (105M/100M) * 100 = 105%</p>",
    "question_index": 65

    "question": "<span class=\"eqt\"><p>The distance between Goa and Bengaluru is 675 km. A passenger train starts from Goa at 6:20 am and travels towards Bengaluru at 90 km/h. Another passenger train starts from Bengaluru at 7:50 am and travels towards Goa at 135 km/hr. At what time do they meet?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2379;&#2357;&#2366; &#2324;&#2352; &#2348;&#2376;&#2306;&#2327;&#2354;&#2379;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 675 &#2325;&#2367;&#2350;&#2368; &#2361;&#2376;&#2404; &#2319;&#2325; &#2351;&#2366;&#2340;&#2381;&#2352;&#2368; &#2352;&#2375;&#2354;&#2327;&#2366;&#2337;&#2364;&#2368; &#2327;&#2379;&#2357;&#2366; &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344; 6 : 20 &#2360;&#2375; &#2352;&#2357;&#2366;&#2344;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; 90 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2348;&#2376;&#2306;&#2327;&#2354;&#2379;&#2352; &#2325;&#2368; &#2323;&#2352; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2319;&#2325; &#2309;&#2344;&#2381;&#2351; &#2351;&#2366;&#2340;&#2381;&#2352;&#2368; &#2352;&#2375;&#2354;&#2327;&#2366;&#2337;&#2364;&#2368; &#2348;&#2376;&#2306;&#2327;&#2354;&#2379;&#2352; &#2360;&#2375; &#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344; 7 : 50 &#2348;&#2332;&#2375; &#2352;&#2357;&#2366;&#2344;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; 135 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2327;&#2379;&#2357;&#2366; &#2325;&#2368; &#2323;&#2352; &#2351;&#2366;&#2340;&#2381;&#2352;&#2366; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;&#2404; &#2357;&#2361; &#2325;&#2367;&#2340;&#2344;&#2375; &#2348;&#2332;&#2375; &#2350;&#2367;&#2354;&#2375;&#2306;&#2327;&#2368;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">10:06 am</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344; 10:06</span>",
      "<span class=\"eqt\">9:44 am</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344; 9:44</span>",
      "<span class=\"eqt\">9:56 am</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344; 9:56</span>",
      "<span class=\"eqt\">10:14 am</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2370;&#2352;&#2381;&#2357;&#2366;&#2361;&#2381;&#2344; 10:14</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Suppose they meet x hrs after 6:20 am</p><p>Then, (Distance moved by first train in x hrs) + [Distance moved by second train in (x  -  1.5) hrs] = 675</p><p>=&gt; 90x + 135(x  -  1.5) = 675</p><p>=&gt; x = 3.9 hours = 3 hours 54 minutes</p><p>So, they meet at = 6:20 am + 3 hours 54 minutes = 10:14 am</p><p><b>Express Method</b></p><p>Distance covered by passenger train in 1.5 hours = 90 x 1.5 = 135 km</p><p>Remaining distance = 675 - 135 = 540 km</p><p>Relative speed = 135 + 90 = 225 km/hr</p><p>Time taken by them to meet = 540/225 = 2.4 hours = 2 hours 24 minutes</p><p>Required time = 7: 50 am + 2 hours 24 minutes = 10: 14 am</p>",
    "question_index": 66

    "question": "<span class=\"eqt\"><p>The probability of Prashant, Qamar and Rajat finishing their projects is 1/2, 1/3 and 2/3. What is the probability that at least 2 of them complete their projects?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2358;&#2366;&#2306;&#2340;, &#2325;&#2364;&#2350;&#2352; &#2324;&#2352; &#2352;&#2332;&#2340; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2346;&#2344;&#2368; &#2346;&#2352;&#2367;&#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; 1/2, 1/3 &#2324;&#2352; 2/3 &#2361;&#2376;&#2404; &#2313;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2350; &#2360;&#2375; &#2325;&#2350; 2 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2309;&#2346;&#2344;&#2368; &#2346;&#2352;&#2367;&#2351;&#2379;&#2332;&#2344;&#2366;&#2323;&#2306; &#2325;&#2379; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2325;&#2367;&#2340;&#2344;&#2368; &#2361;&#2376;?</p></span>",

    "question": "<span class=\"eqt\"><p>In an election, the ratio of votes received by two candidates is 29: 21. If 12% of the total number of votes polled were invalid and the difference between the votes received was 704, then find the total votes polled. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2330;&#2369;&#2344;&#2366;&#2357; &#2350;&#2375;&#2306; &#2342;&#2379; &#2313;&#2350;&#2381;&#2350;&#2368;&#2342;&#2357;&#2366;&#2352;&#2379;&#2306; &#2325;&#2379; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2350;&#2340;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 29: 21 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2337;&#2366;&#2354;&#2375; &#2327;&#2319; &#2325;&#2369;&#2354; &#2350;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; 12% &#2309;&#2357;&#2376;&#2343; &#2341;&#2375; &#2324;&#2352; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2350;&#2340;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 704 &#2341;&#2366;, &#2340;&#2379; &#2337;&#2366;&#2354;&#2375; &#2327;&#2319; &#2325;&#2369;&#2354; &#2350;&#2340;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>In &#8710;PQR, if RM and QN are perpendiculars on side PQ and PR at M and N, respectively such that they intersect at point B, bisectors of &#8736;BQR and &#8736;BRQ intersect at A and &#8736;QAR = 164&deg;, then &#8736;QPR is equal to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#8710;PQR &#2350;&#2375;&#2306;, &#2351;&#2342;&#2367; RM &#2324;&#2352; QN &#2349;&#2369;&#2332;&#2366; PQ &#2324;&#2352; PR &#2346;&#2352; &#2325;&#2381;&#2352;&#2350;&#2358;: &#2348;&#2367;&#2306;&#2342;&#2369; M &#2324;&#2352; N &#2346;&#2352; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2354;&#2306;&#2348; &#2361;&#2376;&#2306; &#2325;&#2367; &#2357;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; B &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#8736;BQR &#2324;&#2352; &#8736;BRQ &#2325;&#2375; &#2360;&#2350;&#2342;&#2381;&#2357;&#2367;&#2357;&#2367;&#2349;&#2366;&#2332;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; A &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#8736;QAR = 164&deg; &#2361;&#2376;, &#2340;&#2379; &#8736;QPR &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</p></span>",

      "<span class=\"eqt\">64&deg;</span><span class=\"hqt\" style=\"display:none\">64&deg;</span>",
      "<span class=\"eqt\">48&deg;</span><span class=\"hqt\" style=\"display:none\">48&deg;</span>"

    "correct_option_id": 0,
    "solution": "<p><img width=318 height=188 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19844/image003.jpg\"></p><p>Let &#8736;BQR = x&deg; and &#8736;BRQ = y&deg;</p><p>So, &#8736;AQR = x&deg;/2 and &#8736;ARQ = y&deg;/2</p><p>Given, &#8736;QAR = 164&deg;,</p><p>So, in &#8710;QRA,</p><p>&#8736;AQR + &#8736;ARQ + &#8736;QAR = 180</p><p>=&gt; (x&deg; + y&deg;)/2 + 164&deg; = 180&deg;</p><p>=&gt; (x&deg; + y&deg;) = 2 * 16&deg;</p><p>=&gt; (x&deg; + y&deg;) = 32&deg;</p><p>In &#8710;BQR,</p><p>x&deg; + y&deg; + &#8736;QBR = 180&deg;</p><p>=&gt; &#8736;QBR = 180&deg;  -  32&deg; = 148&deg;</p><p>So, &#8736;MBN = 148&deg;</p><p>In quadrilateral PMBN,</p><p>&#8736;P + &#8736;M + &#8736;B + &#8736;N = 360&deg;</p><p>=&gt; &#8736;MPN + 90&deg; + 148&deg; + 90&deg; = 360&deg;</p><p>=&gt; &#8736;QPR = 360&deg;  -  328&deg;</p><p>=&gt; &#8736;QPR = 32&deg;</p>",

    "question": "<p><b> </b>Select the option that expresses the given sentence in direct speech.</p><p>She said that she had been planning to visit her parents that weekend, but then that the weather forecast predicted heavy rain, she might have to postpone the trip until the next week.</p>",

    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence in the Indirect Speech is in <b>Past Perfect Continuous Tense</b>.</p><p>There are two cases when the Indirect Speech is in Past Perfect Continuous Tense.</p><p>&#183; Past Perfect Continuous changes to Past Continuous</p><p>&#183; Past Perfect Continuous changes to Present Perfect Continuous</p><p><b>Case 1: </b>Past Perfect Continuous (Subject + had + been + V1 + ing + Object) will be converted into Past Continuous (Subject + was/were + V1 + ing + Object).</p><p>For example:</p><p>He said that he had been watching television the previous night. (Indirect Speech)</p><p>He said, 'I was watching television last night' (Direct Speech)</p><p><b>Case 2: </b>Past Perfect Continuous (Subject + had + been + V1 + ing + Object) will be converted into Present Perfect Continuous (Subject + has/have + been + V1 + ing + Object).</p><p>For example:</p><p>He said that they had been waiting for hours. (Indirect Speech)</p><p>He said, 'We have been waiting for hours' (Direct Speech)</p><p>Here, case 1 applies.</p><p>The following things in the sentence will change when changed from Indirect speech to Direct Speech:</p><p>'had been planning' changes to 'was planning'.</p><p>'she' changes to 'I'.</p><p>'her parents' changes to 'my parents'.</p><p>'then' changes to 'now'.</p><p>'that weekend' changes to 'this weekend'.</p><p>'might' changes to 'may'.</p><p>'predicted' changes to 'predicts'. [Simple Past tense will be changed to Simple present tense]</p><p>Therefore, the correct answer is: She said, 'I was planning to visit my parents this weekend, but now that the weather forecast predicts heavy rain, I may have to postpone the trip until next week.'</p><p>Hence, option (a) is correct.</p>",
