    "correct_option_id": 1,
    "solution": "<p>= (cot<sup>2</sup>A + cos<sup>2</sup>A)</p><p>= [(cos<sup>2</sup>A/sin<sup>2</sup>A) + cos<sup>2</sup>A]</p><p>= [(cos<sup>2</sup>A + sin<sup>2</sup>A.cos<sup>2</sup>A)/sin<sup>2</sup>A]</p><p>= [cos<sup>2</sup>A(1 + sin<sup>2</sup>A)]/sin<sup>2</sup>A</p><p>= [(1  -  sin<sup>2</sup>A)(1 + sin<sup>2</sup>A)]/sin<sup>2</sup>A</p><p>= [(1  -  sin<sup>2</sup>A)/sinA] * [(1 + sin<sup>2</sup>A)/sinA]</p><p>= [(1/sinA)  -  sinA] * [(1/sinA) + sinA]</p><p>= (cosecA  -  sinA)(cosecA + sinA)</p><p>= (cosec<sup>2</sup>A  -  sin<sup>2</sup>A)</p>",

    "question": "<span class=\"eqt\"><p>Worker A can complete a work in '2Y' number of days and worker B can complete the same work in '3Y' number of days while worker A, B, and C together can do it in 'Y' number of days. If for the whole work they get Rs.120Y, and the share of C in it is Rs.160, then find the value of Y.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2332;&#2364;&#2342;&#2370;&#2352; A &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; '2Y' &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2350;&#2332;&#2364;&#2342;&#2370;&#2352; B &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; '3Y' &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2332;&#2348;&#2325;&#2367; &#2319;&#2325; &#2360;&#2366;&#2341; &#2350;&#2332;&#2364;&#2342;&#2370;&#2352; A, B &#2324;&#2352; C &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 'Y' &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; &#2360;&#2350;&#2381;&#2346;&#2370;&#2352;&#2381;&#2339; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2375; &#2354;&#2367;&#2319; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; 120Y &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2367;&#2354;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2311;&#2360;&#2350;&#2375;&#2306; C &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; 160 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;, &#2340;&#2379; Y &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let total work = LCM of 2Y, 3Y, and Y = 6Y units</p><p>Efficiency of worker A = 6Y/2Y = 3 units per day</p><p>Efficiency of worker B = 6Y/3Y = 2 units per day</p><p>Efficiency of worker A + B + C = 6Y/Y = 6 units per day</p><p>Efficiency of worker C = 6  -  5 = 1 unit per day</p><p>Given,</p><p>Share of C = Rs.160</p><p>120Y * 1/6 = 160</p><p>Y = 960/120</p><p>Y = 8.</p>",

    "question": "<span class=\"eqt\"><p>A vessel is filled with liquid, 12 parts of which are water and 13 parts are syrup. How much of the mixture must be drawn off and replaced with water so that the mixture may be half water and half syrup?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2348;&#2352;&#2381;&#2340;&#2344; &#2340;&#2352;&#2354; &#2360;&#2375; &#2349;&#2352;&#2366; &#2361;&#2369;&#2310; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2325;&#2366; 12 &#2349;&#2366;&#2327; &#2346;&#2366;&#2344;&#2368; &#2361;&#2376; &#2324;&#2352; 13 &#2349;&#2366;&#2327; &#2360;&#2367;&#2352;&#2346; &#2361;&#2376;&#2404; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2349;&#2366;&#2327; &#2344;&#2367;&#2325;&#2366;&#2354;&#2366; &#2332;&#2366;&#2344;&#2366; &#2324;&#2352; &#2346;&#2366;&#2344;&#2368; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2332;&#2367;&#2360;&#2360;&#2375; &#2325;&#2367; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2310;&#2343;&#2366; &#2346;&#2366;&#2344;&#2368; &#2324;&#2352; &#2310;&#2343;&#2366; &#2360;&#2367;&#2352;&#2346; &#2361;&#2379;?</p></span>",

      "<span class=\"eqt\">1/27</span><span class=\"hqt\" style=\"display:none\">1/27</span>"

    "solution": "<p>Let the vessel contains 25 litres of liquid.</p><p>Let x litres of the liquid be replaced with water.</p><p>Quantity of water in new mixture = [12  -  (12x/25) + x] litres</p><p>Quantity of syrup in new mixture = [13  -  13x/25] litres</p><p>[12  -  (12x/25) + x] = [13  -  13x/25]</p><p>300  -  12x + 25x = 325  -  13x</p><p>26x = 25</p><p>x = 25/26</p><p>So, part of mixture replaced = (25/26) / 25 = 1/26</p>",

    "solution": "<p>(Diagram is not drawn to scale)</p><p><img width=228 height=260 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p5702/image003.jpg\"></p><p>CD is the non-extended ladder of length 'l' units.</p><p>AB is the wall and AC is the extended form of the ladder.</p><p>in triangle BCD,</p><p>sin 30&deg; = BD/CD</p><p>=&gt; BD = l/2</p><p>BD = (1/2)*AB</p><p>So, AB = l</p><p>Also, cos 30&deg; = BC/l</p><p>=&gt; BC = l&radic;3/2</p><p>By Pythagoras' theorem,</p><p>AC = &radic;(l<sup>2</sup> + (l&radic;3/2)<sup>2</sup> = l&radic;7/2</p><p>Required ratio = l&radic;7/2 : l = &radic;7:2</p>",

    "question": "<span class=\"eqt\"><p>Cost price of an article is Rs. 2000. Shopkeeper marked the price at 40% above the cost price and allows a discount of 10% on marked price. If he sells the article for Rs. 2268 after allowing another discount of Y%. Find the value of Y.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2352;&#2369;.2000 &#2361;&#2376;&#2404; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2344;&#2375; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2375; 40% &#2309;&#2343;&#2367;&#2325; &#2350;&#2370;&#2354;&#2381;&#2351; &#2309;&#2306;&#2325;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2324;&#2352; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 10% &#2325;&#2368; &#2331;&#2370;&#2335; &#2342;&#2368;&#2404; &#2351;&#2342;&#2367; &#2357;&#2361; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; Y% &#2325;&#2368; &#2319;&#2325; &#2309;&#2344;&#2381;&#2351; &#2331;&#2370;&#2335; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342; &#2352;&#2369;.2268 &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; Y &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>According to question,</p><p>Marked price of the article = 2000 * 140/100 = Rs. 2800</p><p>Selling price of the article = 2800 * 90/100 * (100  -  Y)/100</p><p>28 * 9 * (100  -  Y)/10 = 2268</p><p>100  -  Y = (2268 * 10)/(28 * 9)</p><p>100  -  Y = 90</p><p>Y = 10</p>",

    "question": "<span class=\"eqt\"><p>In a triangle ABC, AB = 33 cm, AC = 56 cm, and BC = 65 cm. From vertex A, a median AD is drawn that meets BC at point D. If G is the point on AD that denotes centroid, then find the length of AG.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; ABC &#2350;&#2375;&#2306;, AB = 33 cm, AC = 56 cm &#2324;&#2352; BC = 65 cm &#2361;&#2376;&#2404; &#2358;&#2368;&#2352;&#2381;&#2359; A &#2360;&#2375;, &#2319;&#2325; &#2350;&#2366;&#2343;&#2381;&#2351;&#2367;&#2325;&#2366; AD &#2326;&#2368;&#2306;&#2330;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2332;&#2379; BC &#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; D &#2346;&#2352; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; AD &#2346;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; G &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2325; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; AG &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">21.66 cm</span><span class=\"hqt\" style=\"display:none\">21.66 cm</span>",
      "<span class=\"eqt\">23.33 cm</span><span class=\"hqt\" style=\"display:none\">23.33 cm</span>",
      "<span class=\"eqt\">19.22 cm</span><span class=\"hqt\" style=\"display:none\">19.22 cm</span>",
      "<span class=\"eqt\">24.11 cm</span><span class=\"hqt\" style=\"display:none\">24.11 cm</span>"

    "correct_option_id": 0,
    "solution": "<p>Sides of the triangle are 33 cm, 56 cm, and 65 cm.</p><p>We know that (33, 56, 65) is a Pythagorean triplet.</p><p>Therefore, ABC is a right triangle.</p><p>Median (AD) = Hypotenuse/2 = 65/2 cm</p><p>We know that centroid divides the median in the ratio of 2: 1.</p><p>So, AG = AD * 2/3 = (65/2) * (2/3) = 21.66 cm</p>",

    "question": "<span class=\"eqt\"><div>&nbsp;If (tan<sup>2</sup> A + 1) ((&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cosecA</span></div>&nbsp;)  -  1) (1 + (&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cosecA</span></div>&nbsp;)) = 2X, then the value of X is&#58;&nbsp;</div></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; (tan<sup>2</sup> A + 1) ((<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cosecA</span></div>&nbsp;)  -  1) (1 + (&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">cosecA</span></div> )) = 2X &#2361;&#2376;, &#2340;&#2379; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</div></p></span>",
    "options": [

      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">-1/2</span><span class=\"hqt\" style=\"display:none\">-1/2</span>",
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>(tan<sup>2</sup> A + 1) ((1/cosecA)  -  1) (1 + (1/cosecA)) = 2X</p><p>Sec<sup>2</sup>A (sinA  -  1) (1 + sinA) = 2X</p><p>Sec<sup>2</sup>A (-cos<sup>2</sup> A) = 2X</p><p>2X = -1</p><p>X = -1/2</p>",
    "question_index": 71
