<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cgl1 - Responsive Exam Interface</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

    <!-- Timer Config -->
    <meta name="exam-duration" content="60">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Select the alphabets from among the given options that can replace the question mark (?) in the following series.</p><p>X, WTR, Q, PMK, ?, IFD</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2357;&#2361; &#2309;&#2325;&#2381;&#2359;&#2352; &#2330;&#2369;&#2344;&#2367;&#2319; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2310; &#2360;&#2325;&#2375;&#2404;</p><p>X, WTR, Q, PMK, ?, IFD</p></span>",
    "options": [
      "<span class=\"eqt\">G</span><span class=\"hqt\" style=\"display:none\">G</span>",
      "<span class=\"eqt\">H</span><span class=\"hqt\" style=\"display:none\">H</span>",
      "<span class=\"eqt\">N</span><span class=\"hqt\" style=\"display:none\">N</span>",

    ],
    "correct_option_id": 3,
    "solution": "<p>Here, the pattern is:</p><p>X-1= W.</p><p>W-2= T; T-2= R.</p><p>R-1= Q; Q-1= P.</p><p>P-2= M; M-2= K. </p><p><b>K-1= J; J-1= I</b>.</p><p>I-2= F; F-2= D. </p>",
    "question_index": 0
  },
  {

    "options": [

      "<span class=\"eqt\">41215131626</span><span class=\"hqt\" style=\"display:none\">41215131626</span>",
      "<span class=\"eqt\">41131215626</span><span class=\"hqt\" style=\"display:none\">41131215626</span>",
      "<span class=\"eqt\">41365131626</span><span class=\"hqt\" style=\"display:none\">41365131626</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>BUDGET is coded as 12038621.</p><p>Here, the pattern is:</p><p>B  -  1 = 2  -  1 = 1</p><p>U  -  1 = 21  -  1 = 20</p><p>D  -  1 = 4  -  1 = 3</p><p>G + 1 = 7 + 1 = 8</p><p>E + 1 = 5 + 1 = 6 </p><p>T + 1 = 20 + 1 = 21</p><p>Similarly, </p><p>E  -  1 = 5  -  1 = 4</p><p>M  -  1 = 13  -  1 = 12 </p><p>P  -  1 = 16  -  1 = 15</p><p>L + 1 = 12 + 1 = 13</p><p>O + 1 = 15 + 1 = 16</p><p>Y + 1 = 25 + 1 = 26</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain code language, 'SIT UP' is written as '11' and 'CLOSE IT' is written as '25'. How will 'FILL IN' be written in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'SIT UP' &#2325;&#2379; '11' &#2324;&#2352; 'CLOSE IT' &#2325;&#2379; '25' &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2313;&#2360; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'FILL IN' &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2354;&#2367;&#2326;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [

      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>",

lign=\"left\" style=\"border:1px solid black;padding:5px;\">12</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">13</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Z</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Y</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">X</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">W</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">V</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">U</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Q</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">N</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">26</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">25</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">24</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">23</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">22</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">21</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">19</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">18</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">17</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">16</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">14</td></tr></table>",

      "<span class=\"eqt\">5, 1, 9, 3, 6, 8, 1, 6</span><span class=\"hqt\" style=\"display:none\">5, 1, 9, 3, 6, 8, 1, 6</span>",

    "correct_option_id": 1,

  {

    "options": [

    "question": "<span class=\"eqt\"><p>If '+' means 'minus', ' - ' means 'divided by', '=' means 'multiplied by', '&div;' means 'add' and 'x' means 'equals to', then find the value of 'k' in the expression given below.</p><p>47 + [(12 = 5 + 36) &div; k] x 16  -  4 = 3</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; '+' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&#2328;&#2335;&#2366;&#2344;&#2366;' &#2361;&#2376;, '-' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340;', '=' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&#2327;&#2369;&#2339;&#2366;', '&div;' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&#2332;&#2379;&#2337;&#2364;&#2344;&#2366;' &#2324;&#2352; 'x' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; '&#2348;&#2352;&#2366;&#2348;&#2352;' &#2361;&#2376;, &#2340;&#2379; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2350;&#2375;&#2306; 'k' &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>47 + [(12 = 5 + 36) &div; k] x 16 - 4 = 3</p></span>",
    "options": [
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">13</span><span class=\"hqt\" style=\"display:none\">13</span>",
      "<span class=\"eqt\">7</span><span class=\"hqt\" style=\"display:none\">7</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>+ means  -</p><p>-  means &div;</p><p>= means x</p><p>&div; means +</p><p>x means =</p><p>Then, 47 + [(12 = 5 + 36) &div; k] x 16  -  4 = 3</p><p>47  -  [(12 x 5  -  36) + k] = 16 &div; 4 x 3</p><p>47  -  [(60  -  36) + k] = 4 x 3</p><p>47  -  [24 + k] = 12</p><p>47  -  24  -  k = 12</p><p>23  -  k = 12</p><p><b>k = 11</b></p>",

    "correct_option_id": 1,
    "solution": "<p>Face having symbol '&#8486;' is adjacent to face having symbols '', '&#8267;', '&#8734;' and '&#9834;'. Thus, face having symbol '&#8486;' cannot be opposite to face having symbols '&le;', '&#8267;', '&#8734;' and '&#9834;'. So, face having symbol '&#8486;' is opposite to the facing having symbol '&#934;'.</p><p>Face having symbol '' is adjacent to face having symbols '&#8486;', '&#8267;', '&#934;' and '&#9834;'. Thus, face having symbol '' cannot be opposite to face having symbols '&#8486;', '&#8267;', '&#934;' and '&#9834;'. So, face having symbol '' is opposite to the facing having symbol '&#8734;'.</p><p>Face having symbol '&#9834;' is adjacent to face having symbols '&#8486;', '', '&#8734;' and '&#934;'. Thus, face having symbol '&#9834;' cannot be opposite to face having symbols '&#8486;', '', '&#8734;' and '&#934;'. So, face having symbol '&#9834;' is opposite to the facing having symbol '&#8267;'.</p><p>Hence, only II and III are correct.</p>",

    "question": "<span class=\"eqt\"><p>When did disinvestment start in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2367;&#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2348; &#2361;&#2369;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">1994-98</span><span class=\"hqt\" style=\"display:none\">1994-98</span>",
      "<span class=\"eqt\">1991-92</span><span class=\"hqt\" style=\"display:none\">1991-92</span>",
      "<span class=\"eqt\">1983-89</span><span class=\"hqt\" style=\"display:none\">1983-89</span>",
      "<span class=\"eqt\">1974-76</span><span class=\"hqt\" style=\"display:none\">1974-76</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Disinvestment in India, referring to the process of the government selling its equity stake in Public Sector Undertakings (PSUs), formally and significantly started in the fiscal year <b>1991-92.</b></p><p>This was a key component of the economic liberalization and reform program initiated in 1991 in response to a severe balance of payments crisis.</p><p>Further insights:</p><p>The objectives of disinvestment include raising resources for the government, improving the efficiency and performance of PSUs by bringing in private sector participation and management, promoting wider public ownership, and reducing the government's financial burden.</p><p>The methods of disinvestment have varied over the years, including minority stake sales, strategic sales (transfer of management control), and public offerings.</p><p>The policy of disinvestment has been a subject of political and economic debate in India.</p><p>A formal institutional mechanism, like the Disinvestment Commission (first set up in 1996), and later departments within the Ministry of Finance (like DIPAM - Department of Investment and Public Asset Management), have been involved in formulating and implementing disinvestment policies.</p>",
    "question_index": 25
  },
  {
    "question": "<span class=\"eqt\"><p>When was Bal Sahitya Puraskar instituted?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2366;&#2354; &#2360;&#2366;&#2361;&#2367;&#2340;&#2381;&#2351; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2348; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">2005</span><span class=\"hqt\" style=\"display:none\">2005</span>",
      "<span class=\"eqt\">2010</span><span class=\"hqt\" style=\"display:none\">2010</span>",
      "<span class=\"eqt\">2000</span><span class=\"hqt\" style=\"display:none\">2000</span>",
      "<span class=\"eqt\">1995</span><span class=\"hqt\" style=\"display:none\">1995</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Bal Sahitya Puraskar was instituted by the Sahitya Akademi (India's National Academy of Letters) in the year <b>2010.</b></p><p>This annual award is given to authors for their outstanding contribution to children's literature in any of the 24 languages recognized by the Sahitya Akademi (22 Eighth Schedule languages + English and Rajasthani).</p><p>Further insights:</p><p>The Bal Sahitya Puraskar aims to encourage and promote literature for children in Indian languages.</p><p>The award consists of a casket containing an engraved copper-plaque and a cheque of &#8377;50,000.</p><p>Sahitya Akademi also confers other prestigious literary awards like the Sahitya Akademi Award (for adult literature) and the Yuva Puraskar (for young writers).</p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>What is the SI unit of electrical conductance?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2330;&#2366;&#2354;&#2325;&#2340;&#2366; &#2325;&#2368; SI &#2351;&#2370;&#2344;&#2367;&#2335; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Siemens</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;&#2350;&#2375;&#2306;&#2360;</span>",
      "<span class=\"eqt\">Weber</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375;&#2348;&#2352;</span>",
      "<span class=\"eqt\">Tesla</span><span class=\"hqt\" style=\"display:none\">&#2335;&#2375;&#2360;&#2381;&#2354;&#2366;</span>",
      "<span class=\"eqt\">Henry</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;&#2344;&#2352;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The <b>siemens (S) </b>is the Standard International (SI) unit of electrical conductance. Electrical conductance or electrical conductivity is the ability of a solution to conduct an electrical current. Conductance is defined as the reciprocal of resistance.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Quantity</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Unit</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">SI derived unit of magnetic flux</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Weber</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">SI unit of magnetic induction or magnetic flux density</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tesla</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">SI derived unit of electrical inductance</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Henry</td></tr></table>",
    "question_index": 27
  },

    "question": "<span class=\"eqt\"><p>e-NAM portal operated by Union Ministry of ________.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2312;-&#2344;&#2366;&#2350; &#2346;&#2379;&#2352;&#2381;&#2335;&#2354; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; ________ &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2360;&#2306;&#2330;&#2366;&#2354;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Home Affairs</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2371;&#2361; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351;</span>",
      "<span class=\"eqt\">Economics</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;&#2381;&#2341;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Panchayati Raj</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2330;&#2366;&#2351;&#2340;&#2368; &#2352;&#2366;&#2332;</span>",
      "<span class=\"eqt\">Agriculture and Farmers' welfare</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2371;&#2359;&#2367; &#2319;&#2357;&#2306; &#2325;&#2367;&#2360;&#2366;&#2344; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; e-Nam portal is operated by the Union Ministry of Agriculture and Farmers' welfare.</p><p>&bull; The lead agency under the Union Ministry of Agriculture and Farmers' Welfare responsible for implementing eNAM is the Small Farmers Agribusiness Consortium (SFAC).</p><p>Further Insight:</p><p>&bull; eNAM</p><p>&#9675; eNAM (Electronic National Agriculture Market) is an online trading platform for agricultural commodities in India.</p><p>&#9675; Launched on April 14, 2016, fully funded by the Government of India.</p><p>&#9675; Implemented by Small Farmers Agribusiness Consortium (SFAC) under the Ministry of Agriculture and Farmer's Welfare.</p><p>&#9675; Objective:</p><p>&#9632; To provide better marketing opportunities for farmers through a transparent price discovery system and online payment facility.</p><p>&#9632; Unifies APMC (Agriculture Produce Marketing Committee) markets across India via a central online platform.</p><p>&#9675; Features:</p><p>&#9632; Facilitates farmers to showcase products and traders to quote prices online.</p><p>&#9632; Offers single-window services for APMC-related functions like arrivals, quality, prices, and e-payment settlements.</p><p>&#9632; Enables licenses for traders without physical presence in market yards.</p><p>&#9632; Includes quality standards, testing infrastructure, and soil testing labs in selected mandis.</p><p>&#9675; Benefits to Stakeholders:</p><p>&#9632; Transparent and real-time price discovery.</p><p>&#9632; Reduced transaction costs for buyers.</p><p>&#9632; Efficient supply chain with warehouse-based sales.</p><p>&#9632; Online payments directly to farmers' accounts.</p><p>&#9632; Mobile app provides real-time commodity prices and updates.</p>",
    "question_index": 28
  },
  {
    "question": "<span class=\"eqt\"><p>In Rutherford's gold foil experiment, a beam of ____________ was bombarded on the thin gold foil.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2342;&#2352;&#2347;&#2379;&#2352;&#2381;&#2337; &#2325;&#2375; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2346;&#2352;&#2381;&#2339; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2350;&#2375;&#2306;, ____________ &#2325;&#2368; &#2348;&#2368;&#2350; &#2346;&#2340;&#2354;&#2375; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2346;&#2352;&#2381;&#2339; &#2346;&#2352; &#2348;&#2350;&#2348;&#2366;&#2352;&#2368;</p><p>&#2325;&#2368; &#2327;&#2351;&#2368; &#2341;&#2368; &#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Gamma rays</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2366;&#2350;&#2366; &#2325;&#2367;&#2352;&#2339;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Beta rays</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368;&#2335;&#2366; &#2325;&#2367;&#2352;&#2339;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Theta rays</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2375;&#2335;&#2366; &#2325;&#2367;&#2352;&#2339;&#2375;&#2306;</span>",
      "<span class=\"eqt\">Alpha rays</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2354;&#2381;&#2347;&#2366; &#2325;&#2367;&#2352;&#2339;&#2375;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>In Rutherford's famous gold foil experiment (also known as the Geiger-Marsden experiment), conducted around 1909-1911, a beam of <b>(d) Alpha rays (alpha particles)</b> was bombarded on a very thin sheet of gold foil.</p><p>Alpha particles are positively charged particles consisting of two protons and two neutrons (identical to a helium nucleus).</p><p>Explanation of Other Options:</p><p>(a) Gamma rays: These are high-energy electromagnetic radiation (photons) with no charge. While they can interact with matter, the scattering patterns observed by Rutherford were characteristic of charged particles.</p><p>(b) Beta rays: These are high-energy electrons or positrons emitted during radioactive beta decay. They are charged but much lighter than alpha particles.</p><p>(c) Theta rays: This is not a standard term for a type of particle or radiation used in this context of atomic physics experiments.</p><p>Further insights:</p><p>The observations from the gold foil experiment were crucial in disproving the then-prevalent \"plum pudding model\" of the atom (proposed by J.J. Thomson) and led Rutherford to propose the nuclear model of the atom.</p><p>Key observations:</p><p>Most alpha particles passed straight through the gold foil with little or no deflection, suggesting that most of the atom is empty space.</p><p>A small fraction of alpha particles were deflected by large angles.</p><p>A very few alpha particles (about 1 in 8000) were deflected back by more than 90 degrees (some even nearly 180 degrees).</p><p>Rutherford concluded that the atom has a tiny, dense, positively charged nucleus at its center, where most of the atom's mass is concentrated, and that electrons orbit this nucleus. The large deflections occurred when alpha particles passed close to this nucleus.</p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>Who was the leader of Bharatiya Lok Dal, a political party in India, formed at the end of 1974 through the fusion of seven parties opposed to the rule of Indira Gandhi?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2319;&#2325; &#2352;&#2366;&#2332;&#2344;&#2368;&#2340;&#2367;&#2325; &#2342;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2354;&#2379;&#2325; &#2342;&#2354; &#2325;&#2366; &#2344;&#2375;&#2340;&#2366; &#2325;&#2380;&#2344; &#2341;&#2366;, &#2332;&#2367;&#2360;&#2325;&#2366; &#2327;&#2336;&#2344; 1974 &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306; &#2311;&#2306;&#2342;&#2367;&#2352;&#2366; &#2327;&#2366;&#2306;&#2343;&#2368; &#2325;&#2375; &#2358;&#2366;&#2360;&#2344; &#2325;&#2366; &#2357;&#2367;&#2352;&#2379;&#2343; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2360;&#2366;&#2340; &#2342;&#2354;&#2379;&#2306; &#2325;&#2375; &#2357;&#2367;&#2354;&#2351; &#2360;&#2375; &#2361;&#2369;&#2310; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Jayaprakash Narayan</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2351;&#2346;&#2381;&#2352;&#2325;&#2366;&#2358; &#2344;&#2366;&#2352;&#2366;&#2351;&#2339;</span>",
      "<span class=\"eqt\">Moraji Desai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2352;&#2366;&#2332;&#2368; &#2342;&#2375;&#2360;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Jivatram Kripalani</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2357;&#2340;&#2381;&#2352;&#2350; &#2325;&#2371;&#2346;&#2354;&#2366;&#2344;&#2368;</span>",
      "<span class=\"eqt\">Chaudhary Charan Singh</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2380;&#2343;&#2352;&#2368; &#2330;&#2352;&#2339; &#2360;&#2367;&#2306;&#2361;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The leader of the Bharatiya Lok Dal (BLD), which was formed in 1974 by the merger of seven opposition parties, was <b>Chaudhary Charan Singh.</b></p><p>The BLD was a significant constituent of the Janata Party coalition that came to power after the Emergency in 1977.</p><p>Chaudhary Charan Singh later served as the Prime Minister of India.</p><p>Explanation of Other Options:</p><p>(a) Jayaprakash Narayan (JP): A prominent Gandhian leader and social reformer who spearheaded the \"Total Revolution\" movement against Indira Gandhi's government in the mid-1970s. While he was the guiding spirit and moral force behind the opposition unity, he did not lead the BLD as its formal party leader in the organizational sense; he was more of a non-party movement leader.</p><p>(b) Morarji Desai: A senior political leader who became the Prime Minister of India in 1977, leading the Janata Party government. He was part of the broader opposition front but not specifically the leader of the BLD formation.</p><p>(c) Jivatram Kripalani (Acharya Kripalani): A veteran Gandhian leader, freedom fighter, and parliamentarian. He was a prominent opposition figure but not the leader of the BLD.</p><p>Further insights:</p><p>The seven parties that merged to form the Bharatiya Lok Dal included Charan Singh's Bharatiya Kranti Dal (BKD), Swatantra Party, Samyukta Socialist Party, Utkal Congress, and others.</p><p>The formation of BLD and later the Janata Party was a major step towards consolidating opposition forces against the then Prime Minister Indira Gandhi.</p><p>Chaudhary Charan Singh was a prominent leader representing agrarian interests.</p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>Yumlembam Gambhini Devi, a Manipuri artist, was awarded Padma Shri in 2005. She is related to which form of singing?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2339;&#2367;&#2346;&#2369;&#2352;&#2368; &#2325;&#2354;&#2366;&#2325;&#2366;&#2352; &#2351;&#2369;&#2350;&#2354;&#2375;&#2350;&#2381;&#2348;&#2350; &#2327;&#2350;&#2381;&#2349;&#2367;&#2344;&#2368; &#2342;&#2375;&#2357;&#2368; &#2325;&#2379; 2005 &#2350;&#2375;&#2306; &#2346;&#2342;&#2381;&#2350; &#2358;&#2381;&#2352;&#2368; &#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404; &#2357;&#2361; &#2327;&#2366;&#2351;&#2344; &#2325;&#2368; &#2325;&#2367;&#2360; &#2358;&#2376;&#2354;&#2368; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Pung Cholom</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2369;&#2306;&#2327; &#2330;&#2379;&#2354;&#2379;&#2350;</span>",
      "<span class=\"eqt\">Lai Haraoba</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2312; &#2361;&#2352;&#2366;&#2323;&#2348;&#2366;</span>",
      "<span class=\"eqt\">Khamba Thoibi</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2350;&#2381;&#2348;&#2366; &#2341;&#2379;&#2311;&#2348;&#2368;</span>",
      "<span class=\"eqt\">Nata Sankirtana</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2335; &#2360;&#2306;&#2325;&#2368;&#2352;&#2381;&#2340;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Yumlembam Gambhini Devi is an Indian singer of Nata Sankirtana and dancer of Manipuri Raas. She is a member of faculty at Jawaharlal Nehru Manipur Dance Academy (JNMDA) and a recipient of the 1988 Sangeet Natak Akademi Award.</p><p>The Government of India awarded her the fourth highest civilian honour of the Padma Shri, in 2005, for her contributions to Manipuri dance and music.</p>",

  },

    "question": "<span class=\"eqt\"><p>National Rural Health Mission was launched in which of the following year?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2350;&#2367;&#2358;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2357;&#2352;&#2381;&#2359; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">2006</span><span class=\"hqt\" style=\"display:none\">2006</span>",
      "<span class=\"eqt\">2005</span><span class=\"hqt\" style=\"display:none\">2005</span>",
      "<span class=\"eqt\">2004</span><span class=\"hqt\" style=\"display:none\">2004</span>",
      "<span class=\"eqt\">2008</span><span class=\"hqt\" style=\"display:none\">2008</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>On 12 April 2005, the Government of India took a major welfare initiative by launching National Rural Health Mission (NRHM) in 18 states with weak public health indicators and infrastructure and extended it across the entire country. </p><p>The NRHM employed five main approaches while addressing these issues  -  communitization, flexible financing, improved management through capacity building, monitoring progress against standards, and innovations in human resource management.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following statement is correct about Isotope?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Isotopes have the same physical properties</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2349;&#2380;&#2340;&#2367;&#2325; &#2327;&#2369;&#2339; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Isotopes have the same chemical properties</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2352;&#2366;&#2360;&#2366;&#2351;&#2344;&#2367;&#2325; &#2327;&#2369;&#2339; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Isotopes have the same number of Neutrons</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2381;&#2351;&#2370;&#2335;&#2381;&#2352;&#2377;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2350;&#2366;&#2344; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Isotopes have different atomic numbers.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2360;&#2381;&#2341;&#2366;&#2344;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2346;&#2352;&#2350;&#2366;&#2339;&#2369; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct statement about isotopes is: <b>(b) Isotopes have the same chemical properties.</b></p><p>Isotopes are atoms of the same chemical element that have the same number of protons (same atomic number, Z) but different numbers of neutrons, and therefore different mass numbers (A). Since the number of protons (and thus electrons in a neutral atom) determines the chemical behavior of an element (as chemical properties depend on electron configuration), isotopes of an element generally exhibit the same chemical properties.</p><p>Explanation of Other Options:</p><p>(a) Isotopes have the same physical properties: This is generally incorrect. Isotopes have different masses due to the different number of neutrons. This difference in mass can lead to slight variations in physical properties such as density, melting point, boiling point, and rate of diffusion (e.g., kinetic isotope effect).</p><p>(c) Isotopes have the same number of Neutrons: This is incorrect. The defining characteristic of isotopes is that they have different numbers of neutrons (while having the same number of protons).</p><p>(d) Isotopes have different atomic numbers: This is incorrect. Isotopes of the same element have the same atomic number (number of protons). If the atomic number were different, they would be different elements.</p><p>Further insights:</p><p>For example, Carbon-12 (&#8310;C: 6 protons, 6 neutrons) and Carbon-14 (&#8310;C&#8308;: 6 protons, 8 neutrons) are isotopes of carbon. Both have 6 protons and thus similar chemical properties (e.g., forming similar compounds like CO&#8322;), but C-14 is heavier and radioactive, while C-12 is stable.</p><p>The slight differences in physical properties due to mass differences are utilized in isotope separation techniques.</p><p>Radioactive isotopes (radioisotopes) have unstable nuclei and undergo radioactive decay, making them useful in various applications like medical imaging, radiometric dating, and research.</p><p></p>",
    "question_index": 33
  },

    "question": "<span class=\"eqt\"><p>'Golden duck' and 'Hook' are related to which sports?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2327;&#2379;&#2354;&#2381;&#2337;&#2344; &#2337;&#2325;' &#2324;&#2352; '&#2361;&#2369;&#2325;' &#2325;&#2367;&#2360; &#2326;&#2375;&#2354; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;?</p></span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>Some terms related to <b>cricket</b> are:</p><p><b>Golden duck:</b> When a batsman is out first ball.</p><p>Maiden: When a bowler delivers an entire over without the batsman managing to score a run.</p><p>Yorker: A delivery that is intended to pitch directly underneath a batsman's bat or on his toes.</p><p><b>Hook</b>: A hook is a shot taken when the ball is pitched outside the leg stump and the ball comes up to the batsman at shoulder height. </p>",

  },

      "<span class=\"eqt\">Vitamin B12</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; B12</span>",

    ],

black;padding:5px;\">Anemia, Peripheral neuropathy</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vitamin B7</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Biotin</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Dermatitis, Hair loss</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vitamin B9</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Folic acid</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Megaloblastic anemia, Birth defects</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vitamin B12</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cobalamin</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Pernicious anemia, Neurological issues</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vitamin C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ascorbic acid</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Scurvy</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vitamin D</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Cholecalciferol (D3) / Ergocalciferol (D2)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rickets (children), Osteomalacia (adults)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vitamin E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tocopherol</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hemolytic anemia, Nerve damage</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Vitamin K</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Phylloquinone (K1) / Menaquinone (K2)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bleeding disorders, Poor clotting</td></tr></table>",

    "question": "<span class=\"eqt\"><p>Who is first Indian rower to win a gold at the Asian Games in the year 2010?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2352;&#2381;&#2359; 2010 &#2350;&#2375;&#2306; &#2319;&#2358;&#2367;&#2351;&#2366;&#2312; &#2326;&#2375;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2381;&#2357;&#2352;&#2381;&#2339; &#2332;&#2368;&#2340;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2361;&#2354;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2379;&#2357;&#2352; (&#2344;&#2380;&#2325;&#2366; &#2330;&#2366;&#2354;&#2325;) &#2325;&#2380;&#2344; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sawarn Singh</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2357;&#2352;&#2381;&#2339; &#2360;&#2367;&#2306;&#2361;</span>",
      "<span class=\"eqt\">Bajrang Lal Takhar</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2332;&#2352;&#2306;&#2327; &#2354;&#2366;&#2354; &#2340;&#2366;&#2326;&#2352;</span>",
      "<span class=\"eqt\">Dattu Baban Bhokanal</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2340;&#2381;&#2340;&#2370; &#2348;&#2348;&#2344; &#2349;&#2379;&#2325;&#2366;&#2344;&#2354;</span>",
      "<span class=\"eqt\">Dushyant Chauhan</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2369;&#2359;&#2381;&#2351;&#2306;&#2340; &#2330;&#2380;&#2361;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Bajrang Lal Takhar</b> was the first Indian rower to win an individual gold medal at the Asian Games. He achieved this feat in the Men's Single Sculls event at the 2010 Asian Games held in Guangzhou, China.</p><p>Explanation of Other Options:</p><p>(a) Sawarn Singh: An Indian rower who has won medals at the Asian Games (e.g., bronze in single sculls in 2014, gold in quadruple sculls in 2018), but Bajrang Lal Takhar was the first to win an individual gold in 2010.</p><p>(c) Dattu Baban Bhokanal: An Indian rower who has represented India in the Olympics and won medals at Asian Championships and Asian Games (e.g., gold in quadruple sculls in 2018).</p><p>(d) Dushyant Chauhan (often just Dushyant): An Indian rower who has won medals at the Asian Games (e.g., bronze in lightweight single sculls in 2014 and 2018).</p><p>Further insights:</p><p>Bajrang Lal Takhar's gold medal in 2010 was a landmark achievement for Indian rowing.</p><p>He had previously won a silver medal in the same event at the 2006 Asian Games in Doha.</p><p>Rowing has been a discipline in which Indian athletes have consistently performed well at the Asian Games.</p>",
    "question_index": 36
  },

    "question": "<span class=\"eqt\"><p>What is the molecular formula of Benzene?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2351;&#2370;&#2352;&#2379;&#2346; &#2325;&#2368; &#2350;&#2369;&#2326;&#2381;&#2351; &#2349;&#2370;&#2350;&#2367; &#2350;&#2375;&#2306; &#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2360;&#2325;&#2381;&#2352;&#2367;&#2351; &#2332;&#2381;&#2357;&#2366;&#2354;&#2366;&#2350;&#2369;&#2326;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">CH</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2313;&#2306;&#2335; &#2325;&#2381;&#2352;&#2366;&#2325;&#2366;&#2335;&#2379;&#2310;</span>",
      "<span class=\"eqt\">C<sub>2</sub>H<sub>4</sub></span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2313;&#2306;&#2335; &#2357;&#2367;&#2360;&#2369;&#2357;&#2367;&#2351;&#2360;</span>",
      "<span class=\"eqt\">C<sub>6</sub>H<sub>6</sub></span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2313;&#2306;&#2335; &#2346;&#2368;&#2354;&#2368;</span>",
      "<span class=\"eqt\">C<sub>3</sub>H<sub>3</sub></span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2313;&#2306;&#2335; &#2350;&#2375;&#2352;&#2366;&#2346;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The molecular formula of Benzene is <b>(c) C&#8326;H&#8326;.</b></p><p>Benzene is an aromatic hydrocarbon consisting of a ring of six carbon atoms, with each carbon atom bonded to one hydrogen atom.</p><p>It has a cyclic, planar structure with delocalized pi electrons, which give it unique stability and chemical properties (aromaticity).</p><p>Explanation of Other Options:</p><p>(a) CH: This is the empirical formula for benzene (the simplest whole-number ratio of atoms), but not its molecular formula, which shows the actual number of atoms of each element in a molecule.</p><p>(b) C&#8322;H&#8324;: This is the molecular formula for Ethene (Ethylene), an alkene.</p><p>(d) C&#8323;H&#8323;: This formula does not correspond to a common stable hydrocarbon. Cyclopropenyl cation (C&#8323;H&#8323;&#8314;) is an aromatic species, but C&#8323;H&#8323; itself is a radical.</p><p>Further insights:</p><p>Benzene was discovered by Michael Faraday in 1825.</p><p>Its structure, often depicted as a hexagon with alternating double bonds (Kekul structure) or a hexagon with an inscribed circle (representing delocalized pi electrons), was a subject of much research.</p><p>Benzene is an important industrial solvent and a precursor for the synthesis of many organic chemicals, including plastics, synthetic rubber, dyes, and detergents.</p><p>It is a carcinogen, and its use is regulated.</p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>What was the former name of the State Bank of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2381;&#2335;&#2375;&#2335; &#2348;&#2376;&#2306;&#2325; &#2325;&#2366; &#2346;&#2370;&#2352;&#2381;&#2357; &#2344;&#2366;&#2350; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Madras Bank of India</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2342;&#2381;&#2352;&#2366;&#2360; &#2348;&#2376;&#2306;&#2325; &#2321;&#2347; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Britain Central Bank</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2381;&#2352;&#2367;&#2335;&#2375;&#2344; &#2360;&#2375;&#2306;&#2335;&#2381;&#2352;&#2354; &#2348;&#2376;&#2306;&#2325;</span>",
      "<span class=\"eqt\">Imperial Bank of India</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2346;&#2368;&#2352;&#2367;&#2351;&#2354; &#2348;&#2376;&#2306;&#2325; &#2321;&#2347; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">East India Bank</span><span class=\"hqt\" style=\"display:none\">&#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2348;&#2376;&#2306;&#2325;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The former name of the State Bank of India (SBI) was the <b>Imperial Bank of India.</b> The Imperial Bank of India was formed in 1921 by the amalgamation of three Presidency Banks: the Bank of Bengal, the Bank of Bombay, and the Bank of Madras. In 1955, the Imperial Bank of India was nationalized and renamed the State Bank of India through the State Bank of India Act, 1955.</p><p>Further insights:</p><p>The Presidency Banks were established in the early 19th century and performed some functions of a central bank before the establishment of the Reserve Bank of India in 1935.</p><p>The State Bank of India is the largest public sector bank in India.</p><p>The nationalization of the Imperial Bank of India aimed to expand banking services to rural areas and support the government's economic development plans.</p>",
    "question_index": 38
  },
  {
    "question": "<span class=\"eqt\"><p>Which school of painting is known for the famous work \"Bani Thani\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2380;&#2344; &#2360;&#2366; &#2330;&#2367;&#2340;&#2381;&#2352;&#2325;&#2354;&#2366; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2325;&#2371;&#2340;&#2367; \"&#2348;&#2366;&#2344;&#2368; &#2336;&#2344;&#2368;\" &#2325;&#2375; &#2354;&#2367;&#2319; &#2332;&#2366;&#2344;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kishangarh School</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2367;&#2358;&#2344;&#2327;&#2338;&#2364; &#2360;&#2381;&#2325;&#2370;&#2354;</span>",
      "<span class=\"eqt\">Marwar School</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2352;&#2357;&#2366;&#2337;&#2364; &#2360;&#2381;&#2325;&#2370;&#2354;</span>",
      "<span class=\"eqt\">Kangra School</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2306;&#2327;&#2337;&#2364;&#2366; &#2360;&#2381;&#2325;&#2370;&#2354;</span>",
      "<span class=\"eqt\">Mewar School</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2357;&#2366;&#2337;&#2364; &#2360;&#2381;&#2325;&#2370;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The famous painting \"Bani Thani\" is a hallmark of the <b>Kishangarh School</b> of Rajasthani painting.</p><p>This iconic artwork, created in the mid-18th century by the artist Nihal Chand, depicts a woman (believed to be a singer and poet in the court of Raja Savant Singh of Kishangarh) with idealized features such as arched eyebrows, lotus-shaped eyes elongated to the temples, a sharp nose, and a pointed chin.</p><p>She is often compared to Radha.</p><p>Explanation of Other Options:</p><p>(b) Marwar School: A major school of Rajasthani painting with several sub-schools (like Jodhpur, Bikaner, Kishangarh itself is sometimes considered part of broader Marwar but developed a distinct style). While related, Bani Thani is specifically the pinnacle of the Kishangarh style.</p><p>(c) Kangra School: A prominent school of Pahari painting (from the hill states), known for its lyrical and delicate style, often depicting themes of Radha and Krishna, but distinct from the Kishangarh style of Bani Thani.</p><p>(d) Mewar School: Another important school of Rajasthani painting, known for its bold colors and direct narrative style, different from the refined elegance of Bani Thani.</p><p>Further insights:</p><p>The Kishangarh School flourished under the patronage of Raja Savant Singh (who also wrote devotional poetry under the name Nagari Das) in the 18th century.</p><p>The \"Bani Thani\" style is characterized by its elongated figures, delicate features, and romantic and devotional themes, often centered around the love of Radha and Krishna.</p><p>The painting has become an icon of Indian art and is often referred to as the \"Indian Mona Lisa.\"</p>",
    "question_index": 39
  },
  {
    "question": "<span class=\"eqt\"><p>What is the time difference between Sunrise in Arunachal Pradesh and Gujarat?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2324;&#2352; &#2327;&#2369;&#2332;&#2352;&#2366;&#2340; &#2350;&#2375;&#2306; &#2360;&#2370;&#2352;&#2381;&#2351;&#2379;&#2342;&#2351; &#2325;&#2375; &#2360;&#2350;&#2351; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">2 hours</span><span class=\"hqt\" style=\"display:none\">2 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">3 hours</span><span class=\"hqt\" style=\"display:none\">3 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">1.5 hours</span><span class=\"hqt\" style=\"display:none\">1.5 &#2328;&#2306;&#2335;&#2375;</span>",
      "<span class=\"eqt\">2.5 hours</span><span class=\"hqt\" style=\"display:none\">2.5 &#2328;&#2306;&#2335;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The time difference between sunrise in Arunachal Pradesh (in the easternmost part of India) and Gujarat (in the westernmost part of India) is approximately <b>(a) 2 hours.</b></p><p>India extends over a large longitudinal expanse, from about 687' E (Gujarat) to 9725' E (Arunachal Pradesh). This is a longitudinal difference of approximately 29 degrees.</p><p>The Earth rotates 360 degrees in 24 hours, which means it rotates 15 degrees in 1 hour (360/24 = 15), or 1 degree in 4 minutes (60/15 = 4).</p><p>So, a longitudinal difference of about 29 degrees (approximately 30 degrees for ease of calculation) would correspond to a time difference of roughly 30 degrees * 4 minutes/degree = 120 minutes, which is 2 hours.</p><p>Because the sun rises in the east, Arunachal Pradesh experiences sunrise about two hours earlier than Gujarat.</p><p>Further insights:</p><p>Despite this significant east-west time difference in actual solar time, India follows a single standard time zone, Indian Standard Time (IST), which is based on the longitude 82.5 E, passing near Mirzapur in Uttar Pradesh. IST is UTC+05:30.</p><p>The adoption of a single time zone aims to maintain uniformity and avoid confusion in railway timings, communication, and other national activities.</p><p>There have been occasional discussions and proposals for having two time zones in India to better align working hours with daylight in different parts of the country, particularly in the Northeast, but a single time zone remains in effect.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following act led to the establishment of the high courts at Bombay, Calcutta and Madras?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350; &#2344;&#2375; &#2348;&#2377;&#2350;&#2381;&#2348;&#2375;, &#2325;&#2354;&#2325;&#2340;&#2381;&#2340;&#2366; &#2324;&#2352; &#2350;&#2342;&#2381;&#2352;&#2366;&#2360; &#2350;&#2375;&#2306; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2366; &#2350;&#2366;&#2352;&#2381;&#2327; &#2346;&#2381;&#2352;&#2358;&#2360;&#2381;&#2340; &#2325;&#2367;&#2351;&#2366; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Indian Divisional Courts Act, 1865</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2349;&#2366;&#2327;&#2368;&#2351; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1865</span>",
      "<span class=\"eqt\">Indian High Courts Act, 1861</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2313;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1861</span>",
      "<span class=\"eqt\">Government of India Act, 1858</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 1858</span>",
      "<span class=\"eqt\">Charter Act,1853</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;&#2381;&#2335;&#2352; &#2319;&#2325;&#2381;&#2335;, 1853</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The establishment of High Courts at Calcutta (now Kolkata), Madras (now Chennai), and Bombay (now Mumbai) was authorized by the <b>Indian High Courts Act, 1861.</b></p><p>This Act, passed by the British Parliament, empowered the Crown to establish High Courts of Judicature in these three Presidency towns by Letters Patent.</p><p>These High Courts replaced the existing Supreme Courts (in Presidency towns) and the Sadar Adalats (highest courts of appeal of the East India Company in civil and criminal matters).</p><p>Explanation of Other Options:</p><p>(a) Indian Divisional Courts Act, 1865: This is not the act responsible for establishing the High Courts in Presidency towns.</p><p>(c) Government of India Act, 1858: This Act transferred the governance of India from the East India Company to the British Crown. While it marked a significant constitutional change, the specific establishment of High Courts came under the 1861 Act.</p><p>(d) Charter Act, 1853: This Act renewed the East India Company's charter and introduced changes in the legislative council, but it did not establish these High Courts.</p><p>Further insights:</p><p>The High Courts established under the Act of 1861 were vested with original and appellate jurisdiction.</p><p>The Calcutta High Court was established in 1862, followed by the Bombay High Court and Madras High Court in the same year.</p><p>This Act was a significant step in the organization and modernization of the judicial system in British India.</p><p>Subsequently, High Courts were established in other provinces as well.</p>",
    "question_index": 41
  },
  {
    "question": "<span class=\"eqt\">A substantial increase in capital expenditure or revenue deficit leads to ______.</span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2370;&#2306;&#2332;&#2368;&#2327;&#2340; &#2357;&#2381;&#2351;&#2351; &#2351;&#2366; &#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2328;&#2366;&#2335;&#2375; &#2350;&#2375;&#2306; &#2346;&#2352;&#2381;&#2351;&#2366;&#2346;&#2381;&#2340; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2360;&#2375; ____________ &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Budgetary Deficit</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2332;&#2335; &#2328;&#2366;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Revenue Deficit</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2360;&#2381;&#2357; &#2328;&#2366;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Primary Deficit</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#8205;&#2325; &#2328;&#2366;&#2335;&#2366;</span>",
      "<span class=\"eqt\">Fiscal Deficit</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2328;&#2366;&#2335;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A substantial increase in either capital expenditure or revenue deficit (which contributes to total expenditure) will lead to an increase in the <b>(d) Fiscal Deficit,</b> assuming other factors remain constant.</p><p>Fiscal Deficit = Total Expenditure - Total Receipts (excluding borrowings)</p><p>If capital expenditure increases, total expenditure increases.</p><p>If revenue deficit increases (meaning revenue expenditure is much higher than revenue receipts), this also increases total expenditure or reduces the non-borrowing receipts available to finance total expenditure. Both scenarios widen the gap between total expenditure and total non-borrowing receipts, thus increasing the fiscal deficit, which represents the government's total borrowing requirement.</p><p>Explanation of Other Options:</p><p>(a) Budgetary Deficit: In older terminology, budgetary deficit referred to the difference between total expenditure and total receipts (both revenue and capital). Modern fiscal analysis primarily uses the concept of fiscal deficit. If revenue deficit increases, and this is not offset by a capital surplus, the overall deficit (fiscal deficit) would increase.</p><p>(b) Revenue Deficit: An increase in capital expenditure does not directly lead to an increase in revenue deficit (Revenue Deficit = Revenue Expenditure - Revenue Receipts). However, an increase in revenue deficit itself is one of the conditions mentioned.</p><p>(c) Primary Deficit: Primary Deficit = Fiscal Deficit - Interest Payments. While an increase in fiscal deficit will likely increase the primary deficit (unless interest payments decrease proportionally, which is unlikely if the fiscal deficit is rising due to increased expenditure), the direct and encompassing consequence of increased capital expenditure or revenue deficit is an increase in the fiscal deficit.</p><p>Further insights:</p><p>Capital Expenditure: Spending on creation of assets like infrastructure, machinery, etc.</p><p>Revenue Deficit: Occurs when revenue expenditure exceeds revenue receipts.</p><p>A high fiscal deficit implies a greater need for the government to borrow, which can lead to increased public debt, higher interest payments in the future, and potential inflationary pressures.</p><p>Managing the fiscal deficit is a key objective of government fiscal policy.</p>",
    "question_index": 42
  },

    "question": "<span class=\"eqt\"><p>'Ali-Aye-Ligang', a spring festival, is associated with which state?</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2309;&#2354;&#2368;-&#2310;&#2319;-&#2354;&#2367;&#2327;&#2366;&#2306;&#2327;' &#2357;&#2360;&#2306;&#2340; &#2313;&#2340;&#2381;&#2360;&#2357;, &#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2375; &#2360;&#2350;&#2381;&#2348;&#2344;&#2381;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sikkim</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2325;&#2381;&#2325;&#2367;&#2350;</span>",
      "<span class=\"eqt\">Odisha</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2358;&#2366;</span>",
      "<span class=\"eqt\">Assam</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2360;&#2350;</span>",
      "<span class=\"eqt\">Bihar</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2361;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>'Ali-Aye-Ligang' is a spring festival associated with the state of <b>Assam.</b></p><p>It is primarily celebrated by the Mising (or Mishing) community, an indigenous tribal group of Assam and parts of Arunachal Pradesh.</p><p>The festival marks the beginning of the Ahu paddy (a type of rice) cultivation season. \"Ali\" means root or seed, \"Aye\" means fruit, and \"Ligang\" means to sow.</p><p>Explanation of Other Options:</p><p>(a) Sikkim: Known for festivals like Saga Dawa, Losar, Pang Lhabsol.</p><p>(b) Odisha: Known for festivals like Rath Yatra, Nuakhai, Raja Parba.</p><p>(d) Bihar: Known for festivals like Chhath Puja, Sama Chakeva, Bihula.</p><p>Further insights:</p><p>Ali-Aye-Ligang is typically celebrated on the first Wednesday of the month of 'Gimur Polo' (February-March) in the Mising calendar.</p><p>The festival involves various rituals, community feasting (with special dishes like 'Poro Apong' - rice beer, and pork), traditional Mising dances (like Gumrag Soman), and songs.</p><p>It is a vibrant agricultural festival reflecting the Mising community's close connection with nature and their agricultural practices.</p>",
    "question_index": 43
  },

    "question": "<span class=\"eqt\"><p>Which state recorded a significant improvement in literacy rate from the 2001 Census to the 2011 Census?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360; &#2352;&#2366;&#2332;&#2381;&#2351; &#2344;&#2375; 2001 &#2325;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2360;&#2375; 2011 &#2325;&#2368; &#2332;&#2344;&#2327;&#2339;&#2344;&#2366; &#2340;&#2325; &#2360;&#2366;&#2325;&#2381;&#2359;&#2352;&#2340;&#2366; &#2342;&#2352; &#2350;&#2375;&#2306; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326;&#2344;&#2368;&#2351; &#2360;&#2369;&#2343;&#2366;&#2352; &#2342;&#2352;&#2381;&#2332; &#2325;&#2367;&#2351;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Uttar Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2340;&#2381;&#2340;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",
      "<span class=\"eqt\">Bihar</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2361;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Maharashtra</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2361;&#2366;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Andhra Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Among the given options, <b>Bihar</b> recorded a very significant improvement (in terms of percentage point increase) in its literacy rate from the 2001 Census to the 2011 Census.</p><p>Bihar's literacy rate in 2001 was 47.00%.</p><p>In 2011, Bihar's literacy rate increased to 61.80%.</p><p>This represents an improvement of 14.80 percentage points, which was one of the highest decadal increases among Indian states, even though its overall literacy rate remained one of the lowest.</p><p>Explanation of Other Options (Approximate increases):</p><p>(a) Uttar Pradesh: Literacy rate improved from 56.27% (2001) to 67.68% (2011), an increase of about 11.41 percentage points.</p><p>(c) Maharashtra: Literacy rate improved from 76.88% (2001) to 82.34% (2011), an increase of about 5.46 percentage points.</p><p>(d) Andhra Pradesh (undivided): Literacy rate improved from 60.47% (2001) to 67.02% (2011), an increase of about 6.55 percentage points.</p><p>While all states showed improvement, Bihar's jump in percentage points was particularly notable among these options.</p><p>Further insights:</p><p>The overall literacy rate in India increased from 64.84% in 2001 to 74.04% in 2011 (often rounded to 73% in general discussions after final adjustments for population aged 7+).</p><p>Various government schemes and efforts like Sarva Shiksha Abhiyan (SSA) and adult literacy programs contributed to these improvements.</p><p>Despite significant improvements, regional and gender disparities in literacy persist in India.</p>",
    "question_index": 44
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following article deals with the protection against arrest and detention in certain areas?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2325;&#2369;&#2331; &#2342;&#2358;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2327;&#2367;&#2352;&#2347;&#2381;&#2340;&#2366;&#2352;&#2368; &#2324;&#2352; &#2344;&#2367;&#2352;&#2379;&#2343; &#2360;&#2375; &#2360;&#2306;&#2352;&#2325;&#2381;&#2359;&#2339; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 21</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 21</span>",
      "<span class=\"eqt\">Article 21A</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 21A</span>",
      "<span class=\"eqt\">Article 22</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 22</span>",
      "<span class=\"eqt\">Article 19</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 19</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Article 22</b> of the Indian Constitution deals with protection against arrest and detention in certain cases. It provides for certain rights for individuals who are arrested or detained.</p><p>These include:</p><p>The right to be informed of the grounds of arrest.</p><p>The right to consult and be defended by a legal practitioner of one's choice.</p><p>The right to be produced before the nearest magistrate within 24 hours of arrest (excluding journey time).</p><p>The right not to be detained in custody beyond the said period without the authority of a magistrate.</p><p>Article 22 also deals with preventive detention, laying down certain safeguards for persons detained under preventive detention laws.</p><p>Explanation of Other Options:</p><p>(a) Article 21: Guarantees the Protection of Life and Personal Liberty. It states that \"No person shall be deprived of his life or personal liberty except according to procedure established by law.\"</p><p>(b) Article 21A: Guarantees the Right to Education. It states that \"The State shall provide free and compulsory education to all children of the age of six to fourteen years in such manner as the State may, by law, determine.\" (Added by the 86th Amendment Act, 2002).</p><p>(d) Article 19: Guarantees six fundamental freedoms: (a) freedom of speech and expression, (b) freedom to assemble peaceably and without arms, (c) freedom to form associations or unions or co-operative societies, (d) freedom to move freely throughout the territory of India, (e) freedom to reside and settle in any part of the territory of India, and (g) freedom to practise any profession, or to carry on any occupation, trade or business. (Clause (f) regarding right to property was omitted).</p><p>Further insights:</p><p>The safeguards provided under Article 22 are not available to an enemy alien or to a person arrested or detained under a law providing for preventive detention (though separate safeguards apply for preventive detention cases).</p><p>Preventive detention means detention of a person without trial and conviction by a court, on the mere suspicion that they might commit some wrongful act. Article 22(4) to (7) lay down the procedural safeguards against arbitrary preventive detention.</p>",
    "question_index": 45
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following funds are at the disposal of the President of India?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2375; &#2347;&#2306;&#2337; &#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2346;&#2340;&#2367; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2375; &#2340;&#2361;&#2340; &#2310;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Public Account</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2379;&#2325; &#2354;&#2375;&#2326;&#2366;</span>",
      "<span class=\"eqt\">National Disaster Recovery fund</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2310;&#2346;&#2342;&#2366; &#2352;&#2367;&#2325;&#2357;&#2352;&#2368; &#2347;&#2306;&#2337;</span>",
      "<span class=\"eqt\">Contingency fund</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2325;&#2360;&#2381;&#2350;&#2367;&#2325;&#2340;&#2366; &#2344;&#2367;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Consolidated fund of India</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340; &#2325;&#2368; &#2360;&#2306;&#2330;&#2367;&#2340; &#2344;&#2367;&#2343;&#2367;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The <b>Contingency Fund of India</b> is at the disposal of the President of India.</p><p>This fund is established under Article 267(1) of the Constitution to enable the President to make advances out of it for the purpose of meeting unforeseen expenditure pending authorization of such expenditure by Parliament by law.</p><p>It is an imprest fund held by the Finance Secretary on behalf of the President.</p><p>Explanation of Other Options:</p><p>(a) Public Account of India: This account (Article 266(2)) holds other public moneys received by or on behalf of the Government of India (e.g., provident funds, small savings). Disbursements from this account do not require prior parliamentary appropriation in the same way as the Consolidated Fund, but it is not \"at the disposal of the President\" for unforeseen expenditure in the manner of the Contingency Fund.</p><p>(b) National Disaster Recovery fund (National Disaster Response Fund - NDRF): The NDRF is a fund managed by the Central Government for meeting the expenses for emergency response, relief, and rehabilitation due to disasters. While the President might be involved in declaring national disasters, the fund's operational control for disbursements lies with the executive government mechanisms.</p><p>(d) Consolidated Fund of India: This is the main government account (Article 266(1)) into which all revenues received by the government, loans raised by it, and receipts from recoveries of loans are credited. All legally authorized payments on behalf of the Government of India are made out of this fund. No money can be withdrawn from this fund except under appropriation made by law passed by Parliament. It is not at the direct \"disposal\" of the President for unforeseen expenditure.</p><p>Further insights:</p><p>The Contingency Fund acts as a reserve to meet urgent and unexpected expenditure when Parliament is not in session or when obtaining parliamentary approval would cause delay.</p><p>Any expenditure incurred from the Contingency Fund must subsequently be authorized by Parliament through an Appropriation Act, and the amount withdrawn is recouped to the Fund.</p><p>The corpus of the Contingency Fund is determined by Parliament from time to time.</p>",
    "question_index": 46
  },
  {
    "question": "<span class=\"eqt\"><p>What season follows the southwest monsoon in India? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339;-&#2346;&#2358;&#2381;&#2330;&#2367;&#2350; &#2350;&#2366;&#2344;&#2360;&#2370;&#2344; &#2325;&#2375; &#2348;&#2366;&#2342; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2315;&#2340;&#2369; &#2310;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Summer</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2368;&#2359;&#2381;&#2350;</span>",
      "<span class=\"eqt\">Autumn</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2352;&#2342;</span>",
      "<span class=\"eqt\">Winter</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2368;&#2340;</span>",
      "<span class=\"eqt\">Spring</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2360;&#2306;&#2340;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In India, the season that follows the southwest monsoon is the <b>autumn</b> season, also known as the post-monsoon season. This period typically features a transition from the rainy weather to cooler temperatures leading into winter.</p><p>These are the four seasons in India:</p><p>&bull; Winter: December to February, with cooler temperatures</p><p>&bull; Summer: March to May, with soaring temperatures</p><p>&bull; Southwest Monsoon: June to September, with refreshing showers</p><p>&bull; Autumn: October to November, with comfortable temperatures and clear skies</p>",
    "question_index": 47
  },
  {

      "<span class=\"eqt\">Andhra Pradesh</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2306;&#2343;&#2381;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</span>",

    "correct_option_id": 2,
    "solution": "<p>Shim Lam (Fly Dance) is a traditional folk dance of the Rongmei Naga tribe, who primarily reside in the state of <b>Manipur</b> in Northeast India. The dance often depicts the movements and characteristics of flies and is performed during community festivals and celebrations.</p><p>While some tribal communities might span across state borders, the primary and most recognized association of Shim Lam is with the Rongmei Naga community of Manipur.</p><p>Explanation of Other Options:</p><p>West Bengal: Has its own rich traditions of folk dances like Chhau, Gambhira, Baul, Brita, etc.</p><p>Andhra Pradesh: Known for classical dance Kuchipudi and various folk dances like Dappu, Tappeta Gullu, Lambadi, etc.</p><p>Assam: Famous for Bihu dance, Sattriya (classical), Bagurumba, Ojapali, etc. While there might be overlapping cultural elements with Manipur due to proximity, Thabal Chongba is distinctly Manipuri.</p>",
    "question_index": 48

    "solution": "<p>The Mukteswar Dance Festival, an annual festival dedicated primarily to Odissi dance, was first held in <b>1984</b> in Bhubaneswar, Odisha.</p><p>The festival is held in the courtyard of the magnificent Mukteswar Temple, a 10th-century Shiva temple known for its exquisite architecture and intricate carvings, which provides a stunning backdrop for the dance performances.</p><p>Further insights:</p><p>The Mukteswar Dance Festival is organized by the Odisha Tourism Department in collaboration with the Odisha Sangeet Natak Akademi.</p><p>It typically takes place in January each year.</p><p>The festival showcases performances by renowned Odissi dancers as well as promising young artists.</p><p>It aims to promote Odissi dance, highlight the cultural heritage of Odisha, and attract tourists.</p><p>The Mukteswar Temple itself is considered a gem of Kalinga architecture and is often referred to as the \"Gem of Odisha.\"</p><p></p><p></p>",

    "question": "<span class=\"eqt\"><p>Two circles of same radius R cm, intersect each other at X and Y. If XY = 20 cm and distance between their centres is 4&radic;11 cm, then find the value of R.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; R cm &#2357;&#2366;&#2354;&#2375; &#2342;&#2379; &#2357;&#2371;&#2340;&#2381;&#2340; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2348;&#2367;&#2306;&#2342;&#2369; X &#2324;&#2352; Y &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2367;&#2330;&#2381;&#2331;&#2375;&#2342;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; XY = 20 cm &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2325;&#2375; &#2325;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2368; &#2342;&#2370;&#2352;&#2368; 4&radic;11 cm &#2361;&#2376;, &#2340;&#2379; R &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
