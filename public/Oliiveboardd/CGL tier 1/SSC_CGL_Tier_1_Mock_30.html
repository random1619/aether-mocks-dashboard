    "question": "<span class=\"eqt\"><p>Identify the correct pairs from the following.</p><p><b>Pass State/Union Territory</b></p><p>I. Nathu-La Sikkim</p><p>II. Burzil Pass Jammu and Kashmir</p><p>III. Shipki-La Himachal Pradesh</p><p>IV. Zoji-La Arunachal Pradesh</p><p>Answer Codes:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2361;&#2368; &#2351;&#2369;&#2327;&#2381;&#2350; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p><b>&#2346;&#2366;&#2360; - &#2352;&#2366;&#2332;&#2381;&#2351;/&#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2358;&#2366;&#2360;&#2367;&#2340; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</b></p><p>I. &#2344;&#2366;&#2341;&#2370;-&#2354;&#2366; - &#2360;&#2367;&#2325;&#2381;&#2325;&#2367;&#2350;</p><p>II. &#2348;&#2369;&#2352;&#2381;&#2332;&#2367;&#2354; &#2342;&#2352;&#2381;&#2352;&#2366; - &#2332;&#2350;&#2381;&#2350;&#2370; &#2324;&#2352; &#2325;&#2358;&#2381;&#2350;&#2368;&#2352;</p><p>III. &#2358;&#2367;&#2346;&#2325;&#2368;-&#2354;&#2366; - &#2361;&#2367;&#2350;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</p><p>IV. &#2332;&#2364;&#2379;&#2332;&#2368;-&#2354;&#2366; - &#2309;&#2352;&#2369;&#2339;&#2366;&#2330;&#2354; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358;</p><p>&#2313;&#2340;&#2381;&#2340;&#2352; &#2325;&#2379;&#2337;:</p></span>",
    "options": [
      "<span class=\"eqt\">I, II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, III and IV</span><span class=\"hqt\" style=\"display:none\">I, III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">II, III and IV</span><span class=\"hqt\" style=\"display:none\">II, III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>Pair I is correct: Nathu La is a mountain pass in the Himalayas connecting Sikkim </b>with the Chumbi Valley of the Tibetan Plateau in China. It is one of the three operational trading border posts between India and China; the others being Lipulekh in Uttarakhand and Shipkila in Himachal Pradesh</p><p><b>Pair II is correct: </b>The <b>Burzil Pass is an ancient pass and caravan route between Srinagar (Kashmir) and Gilgit.</b></p><p><b>Pair III is correct: Shipki-La is situated in the Kinnaur district of Himachal Pradesh,</b> India, and Ngari Prefecture in Tibet, China. The pass is one of India's border posts for trade with Tibet along with Nathu La in Sikkim and Lipulekh in Uttarakhand.</p><p><b>Pair 4 is not correct</b>: <b>Zoji La is in the Union Territory of Ladakh</b>. This pass is located on the road route from Srinagar to Leh. It has been created by the Indus River.</p>",
    "question_index": 48
  },
  {
    "question": "<span class=\"eqt\"><p>Vertical distribution of different species occupying different levels is called as</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2360;&#2381;&#2340;&#2352;&#2379;&#2306; &#2346;&#2352; &#2346;&#2366;&#2312; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; &#2314;&#2352;&#2381;&#2343;&#2381;&#2357;&#2366;&#2343;&#2352; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2379; &#2325;&#2381;&#2351;&#2366; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Arrangements</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366;</span>",
      "<span class=\"eqt\">Stratification</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2340;&#2352;&#2368;&#2325;&#2352;&#2339;</span>",
      "<span class=\"eqt\">Compartmentalisation</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2349;&#2366;&#2332;&#2344;</span>",
      "<span class=\"eqt\">Divergence</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2330;&#2354;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Option 'b' is correct: Vertical distribution of different species occupying different levels is called stratification. For example, trees occupy top vertical strata or layer of a forest, shrubs the second and herbs and grasses occupy the bottom layers.</p><p>Compartmentalization: When trees are wounded, many organisms including fungi, infect the wood at different times and in different ways; trees respond to these infections with both chemical and physical changes resulting in discolored and decayed wood. The spread of the disease in trees is limited by compartmentalization of the specific region.</p><p>Source: XIIth Biology NCERT</p>",
    "question_index": 49
  },

    "question": "<span class=\"eqt\"><p>A can complete a certain work in 12 days. B and C can complete the same work in 10 days working together while A and C take 8 days together to complete the work. A, B and C worked together for the first three days after which C leaves the job. On the last two days of the work, A works alone. Which of the following is the respective number of days for which A and B worked?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 12 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; B &#2324;&#2352; C &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2360;&#2350;&#2366;&#2344; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 10 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2332;&#2348;&#2325;&#2367; &#2319;&#2325; &#2360;&#2366;&#2341; A &#2324;&#2352; C &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352;&#2344;&#2375; &#2350;&#2375;&#2306; 8 &#2342;&#2367;&#2344; &#2325;&#2366; &#2360;&#2350;&#2351; &#2354;&#2375;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; A, B &#2324;&#2352; C &#2344;&#2375; &#2346;&#2361;&#2354;&#2375; &#2340;&#2368;&#2344; &#2342;&#2367;&#2344;&#2379;&#2306; &#2340;&#2325; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2351;&#2366; &#2332;&#2367;&#2360;&#2325;&#2375; &#2348;&#2366;&#2342; C &#2344;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2331;&#2379;&#2337;&#2364; &#2342;&#2367;&#2351;&#2366;&#2404; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2375; &#2309;&#2306;&#2340;&#2367;&#2350; &#2342;&#2379; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306;, A &#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2375; A &#2324;&#2352; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2319; &#2327;&#2319; &#2342;&#2367;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [

      "<span class=\"eqt\">5, 3</span><span class=\"hqt\" style=\"display:none\">5, 3</span>",
      "<span class=\"eqt\">8, 6</span><span class=\"hqt\" style=\"display:none\">8, 6</span>",
      "<span class=\"eqt\">6, 4</span><span class=\"hqt\" style=\"display:none\">6, 4</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let the total work be 120 units (LCM of 12, 10 and 8).</p><p>Then, A can do 10 units/day.</p><p>A and C together can do 15 units/day.</p><p>C can do 5 units/day.</p><p>Also, B and C together can do 12 units/day.</p><p>B can do 7 units/day.</p><p>A, B and C work together for the first three days.</p><p>So, work done in the first three days = 3 * (15 + 7) = 66 units</p><p>On the last two days, A works alone, so, work done on the last two days = 2 * 10 = 20 units</p><p>Hence, remaining amount of work = 120  -  66  -  20 = 34 units</p><p>A and B worked together in between so that the work is completed.</p><p>No. of days for which only A and B together worked = 34/(10 + 7) = 2 days</p><p>Hence, A worked for 7 days, B worked for 5 days and C worked for 3 days.</p>",

    "question": "<span class=\"eqt\"><p><div>&nbsp;If &radic;p -&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&radic;p</span></div>&nbsp;= 4, then what is the value of p(18 - p)?&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p><div>&#2351;&#2342;&#2367; &radic;p - <div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">&radic;p</span></div> = 4 &#2361;&#2376;, &#2340;&#2379; p(18 - p) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</div></p></span>",
    "options": [

      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",

    "correct_option_id": 3,
    "solution": "<p>&radic;p  -  1/&radic;p = 4</p><p>(&radic;p  -  1/&radic;p)<sup>2</sup> = 4<sup>2</sup></p><p>p + 1/p  -  2 = 16</p><p>p + 1/p = 18</p><p>p<sup>2</sup> + 1 = 18p</p><p>p (18 - p) = 1</p>",

    "question": "<span class=\"eqt\"><p>There are four distinct numbers 17, A, B and C, and the HCF of each pair of numbers (17, A), (17, B), (17, C) is 17, where A, B, C are each less than 70 and A&lt;B&lt;C. What is the value of (C  -  A)/B?</p></span><span class=\"hqt\" style=\"display:none\"><p>17, A, B &#2324;&#2352; C &#2330;&#2366;&#2352; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; (17, A), (17, B) &#2324;&#2352; (17, C) &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2366; &#2350;&#2361;&#2340;&#2381;&#2340;&#2350; &#2360;&#2350;&#2366;&#2346;&#2357;&#2352;&#2381;&#2340;&#2325; (HCF) 17 &#2361;&#2376;, &#2332;&#2361;&#2366;&#2305; A, B &#2324;&#2352; C &#2350;&#2375;&#2306; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 70 &#2360;&#2375; &#2325;&#2350; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; A&lt;B&lt;C &#2361;&#2376;, &#2340;&#2379; (C - A)/B &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">1/3</span><span class=\"hqt\" style=\"display:none\">1/3</span>",
      "<span class=\"eqt\">2/3</span><span class=\"hqt\" style=\"display:none\">2/3</span>",
      "<span class=\"eqt\">1/2</span><span class=\"hqt\" style=\"display:none\">1/2</span>",
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Given that each pair of numbers (17, A), (17, B) and (17, C) is 17. So, A, B and C each will be a multiple of 17. </p><p>Since A, B, C are each less than 70 so A, B and C will be 34, 51 and 68 respectively. [A&lt;B&lt;C]</p><p>Value of (C  -  A)/B = (68  -  34)/51 = 34/51 = 2/3</p>",

    "solution": "<p><img width=187 height=141 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p24196/image002.png\"></p><p>tanQ = &frac34;</p><p>PR/QR = &frac34;</p><p>PR = 3x and QR = 4x</p><p>PR<sup>2</sup> + QR<sup>2</sup> = PQ<sup>2</sup></p><p>9x<sup>2</sup> + 16x<sup>2</sup> = 45<sup>2</sup></p><p>x<sup>2</sup> = 81</p><p>x = 9</p><p>QR + PR = (4+3)*9 = 63 cm</p>",

    "question": "<span class=\"eqt\"><p>Ashu purchased three Jeans at same price from whole sale, and he sold first Jeans at 8% loss, second Jeans at 10% loss and third Jeans at 12.5% of profit, then what is profit or loss incurred in whole transaction?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2358;&#2370; &#2344;&#2375; &#2341;&#2379;&#2325; &#2348;&#2367;&#2325;&#2381;&#2352;&#2368; &#2360;&#2375; &#2360;&#2350;&#2366;&#2344; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; &#2340;&#2368;&#2344; &#2332;&#2368;&#2344;&#2381;&#2360;&#2375;&#2306; &#2326;&#2352;&#2368;&#2342;&#2368; &#2324;&#2352; &#2313;&#2360;&#2344;&#2375; &#2346;&#2361;&#2354;&#2368; &#2332;&#2368;&#2344;&#2381;&#2360; 8% &#2328;&#2366;&#2335;&#2375; &#2346;&#2352; &#2348;&#2375;&#2330;&#2368;, &#2342;&#2370;&#2360;&#2352;&#2368; &#2332;&#2368;&#2344;&#2381;&#2360; 10% &#2328;&#2366;&#2335;&#2375; &#2346;&#2352; &#2348;&#2375;&#2330;&#2368; &#2324;&#2352; &#2340;&#2368;&#2360;&#2352;&#2368; &#2332;&#2368;&#2344;&#2381;&#2360; 12.5% &#2354;&#2366;&#2349; &#2346;&#2352; &#2348;&#2375;&#2330;&#2368;, &#2340;&#2379; &#2360;&#2306;&#2346;&#2370;&#2352;&#2381;&#2339; &#2354;&#2375;&#2344;-&#2342;&#2375;&#2344; &#2350;&#2375;&#2306; &#2361;&#2369;&#2312; &#2354;&#2366;&#2349; &#2351;&#2366; &#2361;&#2366;&#2344;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;?</p></span>",

    "correct_option_id": 0,
    "solution": "<p>Let cost price of each Jeans is Rs. 100x</p><p>And SP of 1st Jeans = Rs. 92x</p><p>SP of 2nd Jeans = Rs. 90x</p><p>SP of 3rd Jeans = Rs. 112.5x</p><p>Total SP = 92x + 90x + 112.5x = Rs. 294.5x</p><p>So, loss % = [(300  -  294.5)/300] * 100 = 1.83%</p>",

    "question": "<span class=\"eqt\"><p>R is the centre of a circle, and a cord AB is extended to a point C. If CE is tangent of the circle at the point D on it such that &#8736;DCB = 20&deg; and &#8736;BDC = 50&deg; and &#8736;ADC is an obtuse angle, then find the difference between &#8736; RAB and &#8736;RBD is equal to.</p></span><span class=\"hqt\" style=\"display:none\"><p>R &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2366; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2361;&#2376; &#2324;&#2352; &#2319;&#2325; &#2332;&#2368;&#2357;&#2366; AB &#2325;&#2379; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; C &#2340;&#2325; &#2348;&#2338;&#2364;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; CE &#2348;&#2367;&#2306;&#2342;&#2369; D &#2346;&#2352; &#2357;&#2371;&#2340;&#2381;&#2340; &#2325;&#2368; &#2360;&#2381;&#2346;&#2352;&#2381;&#2358;&#2352;&#2375;&#2326;&#2366; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376; &#2325;&#2367; &#8736;DCB = 20&deg; &#2324;&#2352; &#8736;BDC = 50&deg; &#2324;&#2352; &#8736;ADC &#2319;&#2325; &#2309;&#2343;&#2367;&#2325; &#2325;&#2379;&#2339; &#2361;&#2376;, &#2340;&#2379; &#8736; RAB &#2324;&#2352; &#8736; RBD &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">20&deg;</span><span class=\"hqt\" style=\"display:none\">20&deg;</span>",
      "<span class=\"eqt\">10&deg;</span><span class=\"hqt\" style=\"display:none\">10&deg;</span>",
      "<span class=\"eqt\">30&deg;</span><span class=\"hqt\" style=\"display:none\">30&deg;</span>",
      "<span class=\"eqt\">40&deg;</span><span class=\"hqt\" style=\"display:none\">40&deg;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><img width=349 height=252 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19877/image001.jpg\"></p><p>Given, &#8736;DCB = 20&deg; and &#8736;BDC = 50&deg;</p><p>By the alternate segment theorem,</p><p>An angle between a tangent and a chord through the point of contact is equal to the angle in the alternate segment.</p><p>&#8736;BDC = &#8736;DAB = 50&deg;</p><p>In &#8710;ACD,</p><p>&#8736;ACD + &#8736;CDA + &#8736;DAC = 180</p><p>=&gt; 20 + &#8736;CDA + 50 = 180</p><p>=&gt; &#8736;CDA = 110&deg;</p><p>So, &#8736;ADB = 110  -  50 = 60&deg;</p><p>The angle subtended by an arc of a circle at its centre is twice the angle it subtends anywhere on the circle's circumference.</p><p>So, &#8736;ARB = 2 * 60 = 120&deg;</p><p>AR = BR = radius</p><p>So, &#8736;RAB = &#8736;ABR = x&deg;</p><p>In &#8710;RAB,</p><p>&#8736;RAB + &#8736;ABR + &#8736;ARB = 180</p><p>=&gt; 2x&deg; = 180  -  120</p><p>=&gt; x = 30&deg;</p><p>In &#8710;BCD,</p><p>&#8736;CBD = 180 - &#8736;BCD - &#8736;CDB</p><p>=&gt; &#8736;CBD = 180  -  50 - 20</p><p>=&gt; &#8736;CBD = 110&deg;</p><p>So, &#8736;RBD = 180 - &#8736;ABR - &#8736;CBD = 180  -  30  -  110 = 40&deg;</p><p>Hence, &#8736; RAB - &#8736;RBD = 40  -  30 = 10&deg;</p>",
    "question_index": 64
  },

    "solution": "<p>Let the cost of 1 pen be Rs. P and cost of one book be Rs. B.</p><p>According to the question,</p><p>24P + 12B = 1584... (1)</p><p>P + (B/2) = 2Y... (2)</p><p>Multiply equation 2 by 24,</p><p>24P + 12B = 48Y</p><p>From equation (1),</p><p>1584 = 48Y</p><p>Y = 33.</p>",

    "solution": "<p>The subject of the Active Voice is changed into the object of the Passive voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" [been] form of the verb is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in this question is in Future Perfect. Thus, the Passive voice will also be in Future Perfect.</p><p>The format of Active voice is: Subject + will/shall + have + V3 + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + will/shall + have been + V3 + by + Subject of the active voice (Objective case)</p><p>For example:</p><p>She will have bought the gold. (Active Voice)</p><p>The gold will have been bought by her. (Passive Voice)</p><p>The options except (c) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is option (c): The renovation will have been completed by them by next week. Also, the estimate report will have been written by him tomorrow.</p>",

    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>Not getting enough sleep can / lead to many negative outcomes / that in turn can making it hard to / juggle work and life effectively.</p>",
    "options": [
      "juggle work and life effectively",
      "that in turn can making it hard to",
      "Not getting enough sleep can",
      "lead to many negative outcomes"
    ],
    "correct_option_id": 1,
    "solution": "<p>The third part of the sentence has an error. The modal auxiliary 'can' must be followed by the base form of the verb, which is not the case here. 'Making' (a present participle- <i>verb+ing</i>) must be replaced by the base verb 'make' to rectify the error. Hence, b) is the correct answer indicating part C has an error.</p><p>Note:</p><p>Modal verb: A verb used with another verb to express an idea such as possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here can expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb speak.</p><p>Auxiliary verb: A verb that gives grammatical information that is not given by the main verb of a sentence. It supports the main verb. Auxiliary verbs help to form the various tenses, moods, and voices of other verbs. The principal ones are be, do, and have. Example: She will sing a song tomorrow. Here, will is the auxiliary verb that supports the main verb sing.</p><p>\"Participle: A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p>Dancing at the party, the women fell on the ground.</p><p>Encouraged by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p></p><p>One should take great care and never get confused between a gerund and a  present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective.\"</p>",
    "question_index": 84
  },
