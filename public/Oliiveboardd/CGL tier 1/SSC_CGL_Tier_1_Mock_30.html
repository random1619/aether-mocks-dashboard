    "question": "<span class=\"eqt\"><p>In each of the following questions, four words have been given out of which three are alike in some manner, while the fourth one is different. Choose out the odd one.</p><p>(The words must be considered as meaningful English word and must not be related to each other based on the number of letter/consonants/vowels in the word).</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2330;&#2366;&#2352; &#2358;&#2348;&#2381;&#2342; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2360;&#2375; &#2340;&#2368;&#2344; &#2325;&#2367;&#2360;&#2368; &#2344; &#2325;&#2367;&#2360;&#2368; &#2340;&#2352;&#2361; &#2360;&#2375; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376;&#2306;, &#2332;&#2348;&#2325;&#2367; &#2330;&#2380;&#2341;&#2366; &#2349;&#2367;&#2344;&#2381;&#2344; &#2361;&#2376;&#2404; &#2348;&#2375;&#2332;&#2379;&#2337;&#2364; &#2358;&#2348;&#2381;&#2342; &#2325;&#2379; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>(&#2358;&#2348;&#2381;&#2342;&#2379;&#2306; &#2325;&#2379; &#2360;&#2366;&#2352;&#2381;&#2341;&#2325; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2358;&#2348;&#2381;&#2342; &#2350;&#2366;&#2344;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319; &#2324;&#2352; &#2358;&#2348;&#2381;&#2342; &#2350;&#2375;&#2306; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306;/&#2357;&#2381;&#2351;&#2306;&#2332;&#2344;/&#2360;&#2381;&#2357;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2379;&#2344;&#2366; &#2330;&#23   {
    "question": "<span class=\"eqt\"><p>Seven people, namely M, N, O, P, Q, R and S sit in a linear row. They all face in the south direction. O sits at one of the extreme ends of the row. Two people sit between O and S. Q sits immediately to the left of S. P sits second to the left of Q. R sits immediately to the right of M. Two people sit between M and N. Then who among the following sits fifth to the right of N?</p></span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2340; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;, &#2309;&#2352;&#2381;&#2341;&#2366;&#2340;&#2381; M, N, O, P, Q, R &#2324;&#2352; S &#2319;&#2325; &#2352;&#2375;&#2326;&#2368;&#2351; &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2350;&#2375;&#2306; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; &#2357;&#2375; &#2360;&#2349;&#2368; &#2342;&#2325;&#2381;&#2359;&#2367;&#2339; &#2342;&#2367;&#2358;&#2366; &#2325;&#2368; &#2323;&#2352; &#2350;&#2369;&#2326; &#2325;&#2352;&#2325;&#2375; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; O &#2346;&#2306;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2319;&#2325; &#2331;&#2379;&#2352; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; O &#2324;&#2352; S &#2325;&#2375; &#2348;&#2368;&#2330; &#2342;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; Q, S &#2325;&#2375; &#2336;&#2368;&#2325; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; P, Q &#2325;&#2375; &#2348;&#2366;&#2312;&#2306; &#2323;&#2352; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; R, M &#2325;&#2375; &#2336;&#2368;&#2325; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;&#2404; M &#2324;&#2352; N &#2325;&#2375; &#2348;&#2368;&#2330; &#2342;&#2379; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2348;&#2376;&#2336;&#2375; &#2361;&#2376;&#2306;&#2404; &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; N &#2325;&#2375; &#2342;&#2366;&#2312;&#2306; &#2323;&#2352; &#2346;&#2366;&#2305;&#2330;&#2357;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2348;&#2376;&#2336;&#2366; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">O</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2375;</span>",
      "<span class=\"eqt\">R</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;</span>",
      "<span class=\"eqt\">S</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2360;</span>",
      "<span class=\"eqt\">Q</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2351;&#2370;</span>"

    "correct_option_id": 0,
    "solution": "<p>Seven people, namely M, N, O, P, Q, R and S sit in a linear row. They all face in the south direction. O sits at one of the extreme ends of the row. Two people sit between O and S. Q sits immediately to the left of S. So, there are two possible cases i.e., Case 1 and Case 2.</p><p><img width=283 height=175 id=\"Picture 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26906/image015.png\" ></p><p>P sits second to the left of Q. R sits immediately to the right of M. So, Case 2 will be invalid. </p><p><img width=400 height=107 id=\"Picture 17\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26906/image016.png\" ></p><p>So, O sits fifth to the right of N. </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>The position of how many letters will remain unchanged if each of the letters in the word QUIXOTIC is arranged in alphabetical order?</p></span><span class=\"hqt\" style=\"display:none\">&#2351;&#2342;&#2367; &#2358;&#2348;&#2381;&#2342; QUIXOTIC &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2379; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2309;&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2352;&#2361;&#2375;&#2327;&#2368;?</span>",
    "options": [

    "correct_option_id": 2,
    "solution": "<p>QUIXOTIC</p><p>in alphabetical order</p><p>CI<b>I</b>OQ<b>T</b>UX</p><p>The position of two letters will remain unchanged if each of the letters in the word QUIXOTIC is arranged in alphabetical order.</p><p>So, option (c) is the correct answer. </p>",

  {
    "question": "<span class=\"eqt\"><p>On 26<sup>th</sup> March 2025 it was Wednesday. What was the day of the week on 2<sup>nd</sup> April 2026?</p></span><span class=\"hqt\" style=\"display:none\">26 &#2350;&#2366;&#2352;&#2381;&#2330; 2025 &#2325;&#2379; &#2348;&#2369;&#2343;&#2357;&#2366;&#2352; &#2341;&#2366;&#2404; 2 &#2309;&#2346;&#2381;&#2352;&#2376;&#2354; 2026 &#2325;&#2379; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2342;&#2367;&#2344; &#2341;&#2366;?</span>",
    "options": [
      "<span class=\"eqt\">Thursday</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2369;&#2352;&#2369;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Friday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>We get the number of odd days in a month when the number of days of a month is divided by 7.</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Month</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Odd no of Days</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Months having 31 days (Jan, March, May, July, Aug, Oct, Dec)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Months having 30 days (April, June, Sept, Nov)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">February (if ordinary year/If leap year)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">0/1</td></tr></table><p>Here, in the given question, consider the time from 26<sup>th</sup> March 2025 to 31<sup>st</sup> December 2025.</p><p>No. of odd days till 31<sup>st</sup> December 2025 = 5 + 2+3+2+3+3+2+3+2+3 = 28 (0 odd days)</p><p>Hence, the number of odd days from 26<sup>th</sup> March 2025 to 31<sup>st</sup> December 2024= <b>0.</b> -------- (1)</p><p>Additionally, the number of days between 1<sup>st</sup> January, 2026 to 2<sup>nd</sup> April 2026.</p><p>No. of odd days till 2<sup>nd</sup> April 2026= 3+0(2025 being a non-leap year)+3+2= 8(1week 1 days)</p><p>Hence, the number of odd days till 2<sup>nd</sup> April 2026= <b>1.</b> -------- (2)</p><p>Adding (1) and (2) we get,</p><p>Total odd days = 0 + 1 = 1 (1 day)</p><p>Hence, we get 1 odd days.</p><p>Wednesday + 1 = Thursday</p><p>Hence, it was <b>Thursday</b> on 2<sup>nd</sup> April 2026.</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>5 is related to -120 by certain logic. Following the same logic, 10 is related to -990. To which if the following is 9 related, following the same logic. </p><p>(NOTE: Operations should be performed on the whole number, without breaking down the number into its constituent digits. E.g. 13  -  Operations on 13 such as adding/deleting/multiplying etc., to 13 can be performed. Breaking 13 into 1 and 3 and then performing mathematical operations on 1 ad 3 is not allowed.)</p></span><span class=\"hqt\" style=\"display:none\">5 &#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; -120 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2311;&#2360;&#2368; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352;, 10 -990 &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; 9 &#2361;&#2376;, &#2340;&#2379; &#2351;&#2361; &#2313;&#2360;&#2368; &#2340;&#2352;&#2381;&#2325; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p>(&#2344;&#2379;&#2335;: &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2346;&#2352; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2366; &#2330;&#2366;&#2361;&#2367;&#2319;, &#2348;&#2367;&#2344;&#2366; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2328;&#2335;&#2325; &#2309;&#2306;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2340;&#2379;&#2337;&#2364;&#2375;&#2404; &#2313;&#2342;&#2366;&#2361;&#2352;&#2339; &#2325;&#2375; &#2354;&#2367;&#2319; 13 - 13 &#2346;&#2352; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2332;&#2376;&#2360;&#2375; &#2325;&#2367; 13 &#2350;&#2375;&#2306; &#2332;&#2379;&#2337;&#2364;&#2344;&#2366;/&#2361;&#2335;&#2366;&#2344;&#2366;/&#2327;&#2369;&#2339;&#2366; &#2325;&#2352;&#2344;&#2366; &#2310;&#2342;&#2367; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; 13 &#2325;&#2379; 1 &#2324;&#2352; 3 &#2350;&#2375;&#2306; &#2340;&#2379;&#2337;&#2364;&#2344;&#2366; &#2324;&#2352; &#2347;&#2367;&#2352; 1 &#2324;&#2352; 3 &#2346;&#2352; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2360;&#2306;&#2330;&#2366;&#2354;&#2344; &#2325;&#2352;&#2344;&#2366; &#2309;&#2344;&#2369;&#2350;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2404;)</span>",
    "options": [
      "<span class=\"eqt\">-783</span><span class=\"hqt\" style=\"display:none\">-783</span>",
      "<span class=\"eqt\">-810</span><span class=\"hqt\" style=\"display:none\">-810</span>",
      "<span class=\"eqt\">-652</span><span class=\"hqt\" style=\"display:none\">-652</span>",
      "<span class=\"eqt\">-720</span><span class=\"hqt\" style=\"display:none\">-720</span>"

    "correct_option_id": 3,
    "solution": "<p>Here, the logic is: </p><p>5 is related to -120.</p><p>5  -  5<sup>3 </sup>= 5  -  125 = -120.</p><p>10 is related to -990. </p><p>10  -  10<sup>3 </sup>= 10  -  1000 = -900</p><p>Similarly, </p><p>9  -  9<sup>3 </sup>= 9  -  729 = -720.</p>",
    "question_index": 4

    "question": "<span class=\"eqt\"><p>Study the information carefully and answer the following question.</p><p>'A # B' means 'A is the sister of B but B is not sister of A'</p><p>'A % B' means 'A is the father-in-law of B'</p><p>'A $ B' means 'A is the child of B'</p><p>'A &amp; B' means 'A is the maternal grandfather of B'</p><p>If <b>'R &amp; G # M $ K % P # N'</b>, which of the option is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2370;&#2330;&#2344;&#2366; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2368;&#2332;&#2367;&#2319;&#2404;</p><p>'A # B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376; &#2354;&#2375;&#2325;&#2367;&#2344; B, A &#2325;&#2368; &#2348;&#2361;&#2344; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;'</p><p>'A % B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2360;&#2360;&#2369;&#2352; &#2361;&#2376;'</p><p>'A $ B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2368; &#2360;&#2306;&#2340;&#2366;&#2344; &#2361;&#2376;'</p><p>'A &amp; B' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'A, B &#2325;&#2366; &#2344;&#2366;&#2344;&#2366; (&#2350;&#2376;&#2335;&#2352;&#2344;&#2354; &#2327;&#2381;&#2352;&#2376;&#2306;&#2337;&#2347;&#2366;&#2342;&#2352;) &#2361;&#2376;'</p><p>&#2351;&#2342;&#2367; <b>'</b><b>R &amp; G # M $ K % P # N</b><b>' </b>&#2361;&#2376;, &#2340;&#2379; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",

      "<span class=\"eqt\">R is the father-in-law of K</span><span class=\"hqt\" style=\"display:none\">R, K &#2325;&#2366; &#2360;&#2360;&#2369;&#2352; &#2361;&#2376;</span>",

    "correct_option_id": 1,
    "solution": "<p>It is given that:</p><p>'A # B' means 'A is the sister of B but B is not sister of A' </p><p>'A % B' means 'A is the father-in-law of B'</p><p>'A $ B' means 'A is the child of B'</p><p>'A &amp; B' means 'A is the maternal grandfather of B'</p><p>After decoding the expression, 'R &amp; G # M $ K % P # N' we get: </p><p>R is the maternal grandfather of G. </p><p>G is the sister of M but M is not sister of G. </p><p>M is the child of K. </p><p>K is the father-in-law of P. </p><p>P is the sister of N but N is not sister of P. </p><p><img width=311 height=151 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19983/image001.jpg\"></p><p>Only option (b) is correct. </p>",

    "question": "<span class=\"eqt\"><p>Select the correct combination of mathematical signs to sequentially replace the * signs and balance the given equation. </p><p>34 * 12 * 6 * 14 * 90 = 93</p></span><span class=\"hqt\" style=\"display:none\"><p>* &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2379; &#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2324;&#2352; &#2342;&#2367;&#2351;&#2375; &#2327;&#2351;&#2375; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2306;&#2340;&#2369;&#2354;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2327;&#2339;&#2367;&#2340;&#2368;&#2351; &#2330;&#2367;&#2361;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2360;&#2361;&#2368; &#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p>34 * 12 * 6 * 14 * 90 = 93</p></span>",
    "options": [
      "<span class=\"eqt\">&div;, x, +,  -</span><span class=\"hqt\" style=\"display:none\">&div;, x, +, -</span>",
      "<span class=\"eqt\">&div;, x,  - , +</span><span class=\"hqt\" style=\"display:none\">&div;, x, - , +</span>",
      "<span class=\"eqt\">+, x,  - , &div;</span><span class=\"hqt\" style=\"display:none\">+, x, - , &div;</span>",
      "<span class=\"eqt\">+,  - , &div;, x</span><span class=\"hqt\" style=\"display:none\">+, - , &div;, x</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given equation is 34 * 12 * 6 * 14 * 90 = 93</p><p>Option (a) If * signs are replaced by &div;, x, +,  -  then the equation will be </p><p>34 &div; 12 x 6 + 14  -  90</p><p>= 17 + 14  -  90</p><p>= 31  -  90</p><p>= -59</p><p>So, option (a) is incorrect. </p><p>Option (b) If * signs are replaced by &div;, x,  - , + then the equation will be </p><p>34 &div; 12 x 6  -  14 + 90</p><p>= 17  -  14 + 90</p><p>= 107  -  14</p><p>= 93</p><p>So, option (b) is correct. </p><p>Option (c) If * signs are replaced by +, x,  - , &div; then the equation will be </p><p>34 + 12 x 6  -  14 &div; 90</p><p>= 34 + 12 x 6  -  0.155</p><p>= 34 + 72  -  0.155</p><p>= 106  -  0.155</p><p>= 105.845</p><p>So, option (c) is incorrect. </p><p>Option (d) If * signs are replaced by +,  - , &div;, x then the equation will be </p><p>34 + 12  -  6 &div; 14 x 90</p><p>= 34 + 12  -  38.57</p><p>= 46  -  38.57</p><p>=7.43</p><p>So, option (d) is incorrect. </p>",
    "question_index": 23
  },

    "question": "<span class=\"eqt\"><p>In a certain language, ABLE is coded as EDNA and CUTE is coded as EEVU. How will FAIR be coded in the same language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, ABLE &#2325;&#2379; EDNA &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; CUTE &#2325;&#2379; EEVU &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; FAIR &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">GEUT</span><span class=\"hqt\" style=\"display:none\">GEUT</span>",

      "<span class=\"eqt\">HIAT</span><span class=\"hqt\" style=\"display:none\">HIAT</span>",
      "<span class=\"eqt\">GUET</span><span class=\"hqt\" style=\"display:none\">GUET</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Here, the pattern is: </p><p>Vowels present in the word are interchanged and each consonant is replaced by second next alphabet as per the English alphabetical series. </p><p>ABLE is coded as EDNA. </p><p>Thus, A and E ate interchanged. B+2 = D, L+2= N. </p><p>CUTE is coded as EEVU.</p><p>Thus, U and E are interchanged. C+2= E, T+2= V. </p><p>Similarly, </p><p>A and I are interchanged. F+2= H, R+2= T. </p>",

52;&#2379;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">i- 1778</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">II- &#2360;&#2306;&#2341;&#2366;&#2354; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">ii- 1817</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">III- &#2346;&#2361;&#2366;&#2337;&#2364;&#2367;&#2351;&#2366; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iii- 1921</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">IV- &#2346;&#2366;&#2311;&#2325;&#2366; &#2357;&#2367;&#2342;&#2381;&#2352;&#2379;&#2361;</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">iv- 1855-56</td></tr></table></span>",

    "solution": "<p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Rebellion</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Year (A.D.)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Pahariyas' Rebellion</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1778</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Paika Rebellion</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1817</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Santhal Rebellion</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1855-56</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Moplah rebellion</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1921</td></tr></table></p><p></p><p>Further insights:</p><p>Moplah Rebellion (1921)</p><p>- Took place in Malabar region (Kerala).</p><p>- Led by the Moplah (Mappila) Muslims, primarily against British rule and Hindu landlords (jenmis).</p><p>- Part of the Khilafat Movement and Non-Cooperation Movement.</p><p>- Turned violent and resulted in massive casualties and suppression by the British.</p><p></p><p>Santhal Rebellion (185556)</p><p>- Led by Sidhu and Kanhu Murmu, it was a tribal uprising by the Santhals in present-day Jharkhand, Bihar, and West Bengal.</p><p>- Against the exploitative zamindari system, moneylenders, and British colonial authorities.</p><p>- The Santhals created their own rule and waged a war-like campaign before being suppressed.</p><p></p><p>Pahariyas' Rebellion (1778)</p><p>- One of the earliest tribal revolts in India.</p><p>- Took place in the Rajmahal Hills (now in Jharkhand).</p><p>- The Pahariya tribes resisted the encroachment of British revenue officials and settlers into their land.</p><p>- It was mainly a reaction to the disruption of traditional livelihoods and forest rights.</p><p></p><p>Paika Rebellion (1817)</p><p>- Led by Bakshi Jagabandhu in Odisha.</p><p>- The Paikas (warrior class) rose against the British East India Company due to loss of land and hereditary rights.</p><p>- Considered by many historians as one of the first major revolts against British rule, even before 1857.</p>",

    "options": [
      "<span class=\"eqt\">Digital India Mission</span><span class=\"hqt\" style=\"display:none\">&#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2350;&#2367;&#2358;&#2344;</span>",
      "<span class=\"eqt\">Pradhan Mantri Gramin Digital Saksharta Abhiyaan (PMGDISHA)</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2360;&#2366;&#2325;&#2381;&#2359;&#2352;&#2340;&#2366; &#2309;&#2349;&#2367;&#2351;&#2366;&#2344; (&#2346;&#2368;&#2319;&#2350;&#2332;&#2368;&#2342;&#2367;&#2358;&#2366;)</span>",
      "<span class=\"eqt\">National Digital Education Programme</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2337;&#2367;&#2332;&#2367;&#2335;&#2354; &#2358;&#2367;&#2325;&#2381;&#2359;&#2366; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350;</span>",
      "<span class=\"eqt\">BharatNet Yojana</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2344;&#2375;&#2335; &#2351;&#2379;&#2332;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Pradhan Mantri Gramin Digital Saksharta Abhiyaan (PMGDISHA) is a Digital Literacy Scheme by the Ministry of Electronics and Information Technology (MeitY), to make six crore persons in rural areas, across States/UTs, are digitally literate, reaching around 40% of rural households by covering one member from every eligible household. It was launched in February 2017.</p><p>The Scheme is applicable only to rural areas of the country. Only one person (14 - 60 years of age) per eligible household would be considered for training. Priority would be given to Non-smartphone users, Antyodaya households, college drop-outs, and Participants of the adult literacy mission; Digitally illiterate school students from class 9th to 12th, provided facility of Computer/ICT Training is not available in their schools. Preference would be given to SC, ST, BPL, women, differently-abled persons, and minorities.</p>",
    "question_index": 28
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following leaders believed that the 'Safety-Valve' theory was behind the formation of the Indian National Congress?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2344;&#2375;&#2340;&#2366; &#2325;&#2366; &#2351;&#2361; &#2350;&#2366;&#2344;&#2344;&#2366; &#2341;&#2366; &#2325;&#2367; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2375; &#2327;&#2336;&#2344; &#2325;&#2366; &#2325;&#2366;&#2352;&#2339; '&#2360;&#2375;&#2347;&#2381;&#2335;&#2368;-&#2357;&#2366;&#2354;&#2381;&#2357;' &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Lala Lajpat Rai</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2366;&#2354;&#2366; &#2354;&#2366;&#2332;&#2346;&#2340; &#2352;&#2366;&#2351;</span>",
      "<span class=\"eqt\">Jawahar Lal Nehru</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2357;&#2366;&#2361;&#2352; &#2354;&#2366;&#2354; &#2344;&#2375;&#2361;&#2352;&#2370;</span>",
      "<span class=\"eqt\">Rajendra Prasad</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2375;&#2344;&#2381;&#2342;&#2381;&#2352; &#2346;&#2381;&#2352;&#2360;&#2366;&#2342;</span>",
      "<span class=\"eqt\">Kadambini Ganguly</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2342;&#2350;&#2381;&#2348;&#2367;&#2344;&#2368; &#2327;&#2366;&#2306;&#2327;&#2369;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p><b>According to 'Safety- Valve' theory, A. O. Hume formed the Congress with the idea that it would prove to be a 'safety valve'</b> for releasing the growing discontent of the Indians.</p><p>To this end, he convinced Lord Dufferin not to obstruct the formation of the Congress. <b>The extremist leaders like Lala Lajpat Rai believed in the 'Safety-Valve' theory.</b></p><p>Even the Marxist historian's 'conspiracy theory' was an offspring of the 'safety valve' notion.</p><p>For example, R. P. Dutt opined that the Indian National Congress was born out of a conspiracy to abort a popular uprising in India, and the bourgeois leaders were a party to it.</p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>Melatonin encodes proteins in cells to prevent ______ entry.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2375;&#2354;&#2366;&#2335;&#2379;&#2344;&#2367;&#2344;, ______ &#2325;&#2375; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2379; &#2352;&#2379;&#2325;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2325;&#2379; &#2319;&#2344;&#2381;&#2325;&#2379;&#2337; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">virus</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2359;&#2366;&#2339;&#2369;</span>",
      "<span class=\"eqt\">bacterium</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2368;&#2357;&#2366;&#2339;&#2369;</span>",
      "<span class=\"eqt\">fungus</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2357;&#2325;</span>",
      "<span class=\"eqt\">protozoan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2379;&#2335;&#2379;&#2332;&#2379;&#2310;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Melatonin encodes proteins in cells to prevent viral entry.</p><p>Melatonin is a hormone primarily known for regulating sleep-wake cycles, but it also has immunomodulatory and antioxidant properties.</p><p>Recent studies have shown that melatonin can upregulate certain protective proteins that inhibit the entry of viruses into host cells.</p><p>It helps strengthen the cell membrane integrity and supports the body's antiviral defense mechanisms.</p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following is in geographical proximity to Sri Lanka?</p></span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2358;&#2381;&#2352;&#2368;&#2354;&#2306;&#2325;&#2366; &#2325;&#2375; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2344;&#2367;&#2325;&#2335;&#2340;&#2366; &#2350;&#2375;&#2306; &#2361;&#2376;?</span>",
    "options": [
      "<span class=\"eqt\">Only Karaikal</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2352;&#2366;&#2312;&#2325;&#2354;</span>",
      "<span class=\"eqt\">Karaikal and Yanam</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2366;&#2312;&#2325;&#2354; &#2324;&#2352; &#2351;&#2366;&#2344;&#2350;</span>",
      "<span class=\"eqt\">Mahe</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2366;&#2361;&#2375;</span>",
      "<span class=\"eqt\">Only Yanam</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2351;&#2366;&#2344;&#2350;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Karaikal is part of the Union Territory of Puducherry, located on the southeastern coast of India, in Tamil Nadu, relatively close to Sri Lanka.</p><p>Yanam is located in Andhra Pradesh, Mahe is in Kerala, both of which are farther from Sri Lanka.</p><p>Hence, Only Karaikal is in geographical proximity to Sri Lanka.</p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>What is the primary difference between the Wholesale Price Index (WPI) and the Consumer Price Index (CPI) in economics?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2352;&#2381;&#2341;&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2341;&#2379;&#2325; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; (WPI) &#2324;&#2352; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; (CPI) &#2325;&#2375; &#2348;&#2368;&#2330; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2309;&#2306;&#2340;&#2352; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">WPI measures the change in prices of goods and services consumed by the average consumer, while CPI measures the change in prices of goods and services purchased by businesses.</span><span class=\"hqt\" style=\"display:none\">WPI &#2324;&#2360;&#2340; &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2346;&#2349;&#2379;&#2327; &#2325;&#2368; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2366;&#2357; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; CPI &#2357;&#2381;&#2351;&#2357;&#2360;&#2366;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2326;&#2352;&#2368;&#2342;&#2368; &#2327;&#2312; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2366;&#2357; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">WPI measures the change in prices of goods and services at the wholesale level, while CPI measures the change in prices of goods and services at the retail level for consumers.</span><span class=\"hqt\" style=\"display:none\">WPI &#2341;&#2379;&#2325; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2366;&#2357; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; CPI &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2326;&#2369;&#2342;&#2352;&#2366; &#2360;&#2381;&#2340;&#2352; &#2346;&#2352; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2324;&#2352; &#2360;&#2375;&#2357;&#2366;&#2323;&#2306; &#2325;&#2368; &#2325;&#2368;&#2350;&#2340;&#2379;&#2306; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2366;&#2357; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">WPI and CPI are two different terms for the same index that tracks inflation.</span><span class=\"hqt\" style=\"display:none\">WPI &#2324;&#2352; CPI &#2319;&#2325; &#2361;&#2368; &#2360;&#2370;&#2330;&#2325;&#2366;&#2306;&#2325; &#2325;&#2375; &#2354;&#2367;&#2319; &#2342;&#2379; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2346;&#2342; &#2361;&#2376;&#2306; &#2332;&#2379; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2379; &#2335;&#2381;&#2352;&#2376;&#2325; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">WPI measures inflation in urban areas, while CPI measures inflation in rural areas.</span><span class=\"hqt\" style=\"display:none\">WPI &#2358;&#2361;&#2352;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; CPI &#2327;&#2381;&#2352;&#2366;&#2350;&#2368;&#2339; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366;&#2360;&#2381;&#2347;&#2368;&#2340;&#2367; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The primary difference between the Wholesale Price Index (WPI) and the Consumer Price Index (CPI) is their focus.</p><p>WPI measures changes in the prices of goods and services at the wholesale level, which means it tracks price movements before they reach the retail market. CPI, on the other hand, measures changes in the prices of goods and services at the retail level, reflecting the prices paid by consumers.</p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following is a noted odissi dancer who founded the 'Kalinga Kalakshetra' with the objective of imparting training in Odissi dance and promoting performing arts?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2319;&#2325; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2323;&#2337;&#2367;&#2360;&#2368; &#2344;&#2352;&#2381;&#2340;&#2325; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; &#2323;&#2337;&#2367;&#2360;&#2368; &#2344;&#2371;&#2340;&#2381;&#2351; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2367;&#2325;&#2381;&#2359;&#2339; &#2342;&#2375;&#2344;&#2375; &#2324;&#2352; &#2346;&#2381;&#2352;&#2342;&#2352;&#2381;&#2358;&#2344; &#2325;&#2354;&#2366;&#2323;&#2306; &#2325;&#2379; &#2348;&#2338;&#2364;&#2366;&#2357;&#2366; &#2342;&#2375;&#2344;&#2375; &#2325;&#2375; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2360;&#2375; '&#2325;&#2354;&#2367;&#2306;&#2327; &#2325;&#2354;&#2366;&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;' &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sitara Devi</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2340;&#2366;&#2352;&#2366; &#2342;&#2375;&#2357;&#2368;</span>",
      "<span class=\"eqt\">Mallika Sarabhai</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2354;&#2381;&#2354;&#2367;&#2325;&#2366; &#2360;&#2366;&#2352;&#2366;&#2349;&#2366;&#2312;</span>",
      "<span class=\"eqt\">Indrani Rehman &#8203;</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2306;&#2342;&#2381;&#2352;&#2366;&#2339;&#2368; &#2352;&#2361;&#2350;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Sanjukhta Panigrahi</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2332;&#2369;&#2325;&#2381;&#2340;&#2366; &#2346;&#2366;&#2339;&#2367;&#2327;&#2381;&#2352;&#2361;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Sanjukhta Panigrahi</b> (1994-1997) was the noted Odissi danseuse who started performing Odissi at the age of six under the guidance of Guru Kelu Charan Mahapatra. She is credited with the resurrection of Odissi and its popularisation globally. She founded the 'Kalinga Kalakshetra' with the objective of imparting training in Odissi dance and promoting performing arts. Sanjukta experimented with several non-traditional lyrics in Odissi such as the Surdas Padmavalli, Tagore songs, Bhagwad Geeta and Tulsi Ramayan. She was awarded Padma Shri (1975) and Sangeet Natak Akademi Award (1976).</p>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>Select the musician who is associated with  Wind instruments.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2360;&#2306;&#2327;&#2368;&#2340;&#2325;&#2366;&#2352; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2332;&#2379; &#2360;&#2369;&#2359;&#2367;&#2352; (&#2357;&#2366;&#2351;&#2369;) &#2357;&#2366;&#2342;&#2381;&#2351; &#2351;&#2306;&#2340;&#2381;&#2352;&#2379;&#2306; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Pandit Ravi Shankar</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;&#2337;&#2367;&#2340; &#2352;&#2357;&#2367;&#2358;&#2306;&#2325;&#2352;</span>",
      "<span class=\"eqt\">Ustad Bismillah Khan</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2360;&#2381;&#2340;&#2366;&#2342; &#2348;&#2367;&#2360;&#2381;&#2350;&#2367;&#2354;&#2381;&#2354;&#2366;&#2361; &#2326;&#2366;&#2344;</span>",
      "<span class=\"eqt\">Pt. Shivkumar Sharma</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2306;. &#2358;&#2367;&#2357;&#2325;&#2369;&#2350;&#2366;&#2352; &#2358;&#2352;&#2381;&#2350;&#2366;</span>",
      "<span class=\"eqt\">Zakir Hussain</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2366;&#2325;&#2367;&#2352; &#2361;&#2369;&#2360;&#2376;&#2344;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Ustad Bismillah Khan is the correct answer.</p><p></p><p>Ustad Bismillah Khan is renowned for his mastery of the shehnai, a wind instrument. His contributions to Indian classical music, particularly the development of the shehnai as a solo instrument, are immense.</p><p></p><p>Let's briefly look at the other options:</p><p></p><p>Pandit Ravi Shankar: Primarily associated with the sitar, a stringed instrument.</p><p>Pt. Shivkumar Sharma: Known for his expertise in the santoor, a percussion instrument.</p><p>Zakir Hussain: Primarily a tabla player, a percussion instrument.</p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>What is the formula for Pressure?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2366;&#2348; &#2325;&#2366; &#2360;&#2370;&#2340;&#2381;&#2352; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Force/Area</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2354;/&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;</span>",
      "<span class=\"eqt\">Area/Force</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;/&#2348;&#2354;</span>",
      "<span class=\"eqt\">Force x Area</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2354; x &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;</span>",
      "<span class=\"eqt\">Volume x Area</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2351;&#2340;&#2344; x &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Pressure is the force per unit perpendicular area over which the force is applied, <b>Pressure(P)=Force(F)/Area(A)</b>,in symbols P = F/A.</p><p>P = Pressure</p><p>F = Force (in Newtons, N)</p><p>A = Area (in square meters, m)</p><p>Unit of Pressure:</p><p>The SI unit of pressure is the Pascal (Pa), where</p><p>1&#8201;Pa = 1 N/m<sup>2</sup></p>",
    "question_index": 35
  },
  {
    "question": "<span class=\"eqt\"><p>Rhizobium cannot make its own food. So it often lives in the ___of gram, peas, moong, beans and other legumes and provides them with nitrogen. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2311;&#2395;&#2379;&#2348;&#2367;&#2351;&#2350; &#2309;&#2346;&#2344;&#2366; &#2349;&#2379;&#2332;&#2344; &#2360;&#2381;&#2357;&#2351;&#2306; &#2344;&#2361;&#2368;&#2306; &#2348;&#2344;&#2366; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360;&#2354;&#2367;&#2319; &#2351;&#2361; &#2309;&#2325;&#2381;&#2360;&#2352; &#2330;&#2344;&#2366;, &#2350;&#2335;&#2352;, &#2350;&#2370;&#2306;&#2327;, &#2348;&#2368;&#2344;&#2381;&#2360; &#2324;&#2352; &#2309;&#2344;&#2381;&#2351; &#2347;&#2354;&#2367;&#2351;&#2379;&#2306; &#2325;&#2375; _____ &#2350;&#2375;&#2306; &#2352;&#2361;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2313;&#2344;&#2381;&#2361;&#2375;&#2306; &#2344;&#2366;&#2311;&#2335;&#2381;&#2352;&#2379;&#2332;&#2344; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">stems</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2344;&#2366;</span>",
      "<span class=\"eqt\">roots</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2396;</span>",
      "<span class=\"eqt\">fruits</span><span class=\"hqt\" style=\"display:none\">&#2347;&#2354;</span>",
      "<span class=\"eqt\">leaves</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2340;&#2381;&#2340;&#2367;&#2351;&#2366;&#2305;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The bacterium called Rhizobium can take atmospheric nitrogen and convert it into a usable form. But Rhizobium cannot make its own food. So it often lives in the <b>roots</b> of gram, peas, moong, beans and other legumes and provides them with nitrogen. In return, the plants provide food and shelter to the bacteria. They, thus, have a symbiotic relationship </p>",
    "question_index": 36
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following is not associated with Buddhism?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2348;&#2380;&#2342;&#2381;&#2343; &#2343;&#2352;&#2381;&#2350; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Vasumitra</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2360;&#2369;&#2350;&#2367;&#2340;&#2381;&#2352;</span>",
      "<span class=\"eqt\">Lakulisha</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2325;&#2369;&#2354;&#2368;&#2358;</span>",
      "<span class=\"eqt\">Vishvabhu</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2381;&#2357;&#2349;&#2370;</span>",
      "<span class=\"eqt\">All are associated with Buddhism</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2348;&#2380;&#2342;&#2381;&#2343; &#2343;&#2352;&#2381;&#2350; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; Vasumitra was a Buddhist Monk - related to Kanishka. He presided over the 4th Buddhist council.</p><p>&bull; Vishvabhu - also associated with Buddhism-part of Manushi Buddha- related to Mahayana form of Buddhism.</p><p>&bull; <b>Lakulisha</b>- He gave the doctrine of the Pashupatas. He was a Shaivite reformist and revivalist saint who was later deified as the twenty-eighth and the last incarnation of Lord Shiva.</p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>'Ujjwala', a _____, is the official mascot of Khelo India - Para Games.</p></span><span class=\"hqt\" style=\"display:none\">'&#2313;&#2332;&#2381;&#2332;&#2357;&#2354;&#2366;', &#2319;&#2325; _____, &#2326;&#2375;&#2354;&#2379; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; - &#2346;&#2376;&#2352;&#2366; &#2327;&#2375;&#2350;&#2381;&#2360; &#2325;&#2366; &#2310;&#2343;&#2367;&#2325;&#2366;&#2352;&#2367;&#2325; &#2358;&#2369;&#2349;&#2306;&#2325;&#2352; &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">butterfly</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2367;&#2340;&#2354;&#2368;</span>",
      "<span class=\"eqt\">peacock</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2379;&#2352;</span>",
      "<span class=\"eqt\">tiger</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2368;&#2340;&#2366;</span>",
      "<span class=\"eqt\">sparrow</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2380;&#2352;&#2376;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Official Mascot of the 2nd Khelo India Para Games 2025 is Ujjwala, a sparrow.</p><p>It was the mascot in 2023 edition as well.</p><p>The design of 'Ujjwala' is inspired by the house sparrow of Delhi symbolising the pride and fighting spirit of the city.</p><p>Much like the bird that was on the verge of extinction, 'Ujjwala' symbolises the para-athletes, who are also a beacon of resilience and perseverance.</p><p>The second edition of the para games were held at three venues in the capital from March 20-27, 2025.</p>",
    "question_index": 38
  },
  {
    "question": "<span class=\"eqt\"><p>A bell-shaped population pyramid that is tapered towards the top shows:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2306;&#2335;&#2368; &#2325;&#2375; &#2310;&#2325;&#2366;&#2352; &#2325;&#2366; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2346;&#2367;&#2352;&#2366;&#2350;&#2367;&#2337; &#2358;&#2368;&#2352;&#2381;&#2359; &#2358;&#2379; &#2325;&#2368; &#2323;&#2352; &#2358;&#2369;&#2306;&#2337;&#2366;&#2325;&#2366;&#2352; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2361; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; ________</p></span>",
    "options": [
      "<span class=\"eqt\">birth rate is greater than death rate leading to overpopulation</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">birth and death rates are almost equal leading to a near constant population</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352; &#2354;&#2327;&#2349;&#2327; &#2360;&#2350;&#2366;&#2344; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2381;&#2341;&#2367;&#2352; &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">birth rate is less than death rate leading to decreasing population</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352; &#2360;&#2375; &#2325;&#2350; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">birth rate is greater than death rate leading to increasing population</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>A population pyramid is used to show the age-sex structure of the population. The shape of the population pyramid reflects the characteristics of the population. The left side shows the percentage of males while the right side shows the percentage of women in each age group.</p><p>An age-sex pyramid that is bell shaped and tapered towards the top shows that <b>birth and death rates are almost equal leading to a near constant population</b>.</p><p><img width=315 height=239 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18636/image001.png\"></p><p>Source: NCERT</p>",
    "question_index": 39
  },

    "question": "<span class=\"eqt\"><p>How do Newton's three laws of motion collectively explain the behaviour of objects in the presence of forces?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2381;&#2351;&#2370;&#2335;&#2344; &#2325;&#2375; &#2327;&#2340;&#2367; &#2325;&#2375; &#2340;&#2368;&#2344; &#2344;&#2367;&#2351;&#2350; &#2360;&#2366;&#2350;&#2370;&#2361;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2348;&#2354;&#2379;&#2306; &#2325;&#2368; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2350;&#2375;&#2306; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2357;&#2381;&#2351;&#2357;&#2361;&#2366;&#2352; &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Newton's laws explain the forces acting on an object but do not predict its motion.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2335;&#2344; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2325;&#2367;&#2360;&#2368; &#2357;&#2360;&#2381;&#2340;&#2369; &#2346;&#2352; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2348;&#2354;&#2379;&#2306; &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; &#2313;&#2360;&#2325;&#2368; &#2327;&#2340;&#2367; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Newton's laws describe the motion of objects but do not consider the forces acting on them.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2335;&#2344; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2366; &#2357;&#2352;&#2381;&#2339;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; &#2313;&#2344; &#2346;&#2352; &#2354;&#2327;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2348;&#2354;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Newton's laws provide a comprehensive framework to understand how forces influence the motion of objects, from their initial state to changes in velocity and equilibrium.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2335;&#2344; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2351;&#2361; &#2360;&#2350;&#2333;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2325; &#2352;&#2370;&#2346;&#2352;&#2375;&#2326;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306; &#2325;&#2367; &#2348;&#2354; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2379; &#2313;&#2344;&#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349;&#2367;&#2325; &#2309;&#2357;&#2360;&#2381;&#2341;&#2366; &#2360;&#2375; &#2354;&#2375;&#2325;&#2352; &#2357;&#2375;&#2327; &#2324;&#2352; &#2360;&#2306;&#2340;&#2369;&#2354;&#2344; &#2350;&#2375;&#2306; &#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2340;&#2325; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;&#2367;&#2340; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Newton's laws are limited to explaining the behaviour of objects in a vacuum, excluding real-world scenarios.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2381;&#2351;&#2370;&#2335;&#2344; &#2325;&#2375; &#2344;&#2367;&#2351;&#2350; &#2357;&#2366;&#2360;&#2381;&#2340;&#2357;&#2367;&#2325; &#2342;&#2369;&#2344;&#2367;&#2351;&#2366; &#2325;&#2375; &#2346;&#2352;&#2367;&#2342;&#2371;&#2358;&#2381;&#2351;&#2379;&#2306; &#2325;&#2375; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; (&#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352;), &#2344;&#2367;&#2352;&#2381;&#2357;&#2366;&#2340; &#2350;&#2375;&#2306; &#2357;&#2360;&#2381;&#2340;&#2369;&#2323;&#2306; &#2325;&#2375; &#2357;&#2381;&#2351;&#2357;&#2361;&#2366;&#2352; &#2325;&#2379; &#2360;&#2350;&#2333;&#2366;&#2344;&#2375; &#2340;&#2325; &#2360;&#2368;&#2350;&#2367;&#2340; &#2361;&#2376;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Newton's three laws of motion collectively provide a comprehensive framework to understand the behaviour of objects in the presence of forces:</p><p><b>Newton's First Law</b> (Law of Inertia) explains that an object will remain at rest or in uniform motion unless acted upon by an external force, emphasizing the concept of inertia.</p><p><b>Newton's Second Law</b> describes the relationship between force, mass, and acceleration, explaining how the net force acting on an object influences its acceleration and change in velocity.</p><p><b>Newton's Third Law</b> states that for every action, there is an equal and opposite reaction, addressing how forces occur in pairs and influence the motion of interacting objects.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the Fundamental Rights are available to both citizens and foreigners (except enemy aliens)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2379;&#2306; &#2324;&#2352; &#2357;&#2367;&#2342;&#2375;&#2358;&#2367;&#2351;&#2379;&#2306; &#2342;&#2379;&#2344;&#2379;&#2306; (&#2342;&#2369;&#2358;&#2381;&#2350;&#2344; &#2319;&#2354;&#2367;&#2351;&#2306;&#2360;/&#2357;&#2367;&#2342;&#2375;&#2358;&#2367;&#2351;&#2379;&#2306; &#2325;&#2379; &#2331;&#2379;&#2337;&#2364;&#2325;&#2352;) &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344; &#2360;&#2375; &#2350;&#2380;&#2354;&#2367;&#2325; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Equality of opportunity in matters of public employment</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2344;&#2367;&#2325; &#2352;&#2379;&#2332;&#2327;&#2366;&#2352; &#2325;&#2375; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2350;&#2375;&#2306; &#2309;&#2357;&#2360;&#2352; &#2325;&#2368; &#2360;&#2350;&#2366;&#2344;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Right of minorities to establish and administer educational institutions</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2376;&#2325;&#2381;&#2359;&#2367;&#2325; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2344;&#2379;&#2306; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2324;&#2352; &#2346;&#2381;&#2352;&#2358;&#2366;&#2360;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2354;&#2381;&#2346;&#2360;&#2306;&#2326;&#2381;&#2351;&#2325;&#2379;&#2306; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Freedom of conscience and free profession, practice and propagation of religion</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2357;&#2375;&#2325; &#2324;&#2352; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352; &#2346;&#2375;&#2358;&#2375; &#2325;&#2368; &#2360;&#2381;&#2357;&#2340;&#2306;&#2340;&#2381;&#2352;&#2340;&#2366;, &#2343;&#2352;&#2381;&#2350; &#2325;&#2375; &#2309;&#2349;&#2381;&#2351;&#2366;&#2360; &#2324;&#2352; &#2346;&#2381;&#2352;&#2330;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Prohibition of discrimination on grounds of religion, race, caste, sex or place of birth</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2352;&#2381;&#2350;, &#2360;&#2350;&#2381;&#2346;&#2381;&#2352;&#2342;&#2366;&#2351;, &#2332;&#2366;&#2340;-&#2346;&#2366;&#2305;&#2340;, &#2354;&#2367;&#2306;&#2327; &#2351;&#2366; &#2332;&#2344;&#2381;&#2350; &#2360;&#2381;&#2341;&#2366;&#2344; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2346;&#2352; &#2349;&#2375;&#2342;&#2349;&#2366;&#2357; &#2325;&#2366; &#2344;&#2367;&#2359;&#2375;&#2343;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>FR available only to citizens and not to foreigners:</b></p><p>&bull; Prohibition of discrimination on grounds of religion, race, caste, sex or place of birth (Article 15).</p><p>&bull; Equality of opportunity in matters of public employment (Article 16).</p><p>&bull; Protection of six rights regarding freedom of : (i) speech and expression, (ii) assembly, (iii) association, (iv) movement, (v) residence, and (vi) profession (Article 19).</p><p>&bull; Protection of language, script and culture of minorities (Article 29).</p><p>&bull; Right of minorities to establish and administer educational institutions (Article 30).</p><p><b>FR available to both citizens and foreigners (except enemy aliens):</b></p><p>&bull; Freedom of conscience and free profession, practice and propagation of religion (Article 25).</p><p>&bull; Freedom to manage religious affairs (Article 26).</p><p>&bull; Right to elementary education (Article 21A), etc.</p>",
    "question_index": 41
  },

    "question": "<span class=\"eqt\"><p>Identify the correct statement regarding Luguburu Ghantabari Fair.</p><p>A. The Luguburu Ghantabari Fair is an annual religious event held in Jharkhand.</p><p>B. The two-day event takes place every year during Kartik Purnima and is centered around the Luguburu Ghantabari Dharamgarh, a revered religious site dedicated to Lugu Baba.</p><p>C. It is a Santhali traditional festival.</p></span><span class=\"hqt\" style=\"display:none\">&#2354;&#2369;&#2327;&#2369;&#2348;&#2369;&#2352;&#2369; &#2328;&#2306;&#2335;&#2366;&#2348;&#2366;&#2337;&#2364;&#2368; &#2350;&#2375;&#2354;&#2375; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>A. &#2354;&#2369;&#2327;&#2369;&#2348;&#2369;&#2352;&#2369; &#2328;&#2306;&#2335;&#2366;&#2348;&#2366;&#2337;&#2364;&#2368; &#2350;&#2375;&#2354;&#2366; &#2333;&#2366;&#2352;&#2326;&#2306;&#2337; &#2350;&#2375;&#2306; &#2310;&#2351;&#2379;&#2332;&#2367;&#2340; &#2361;&#2379;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325; &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2310;&#2351;&#2379;&#2332;&#2344; &#2361;&#2376;&#2404;</p><p>B. &#2342;&#2379; &#2342;&#2367;&#2357;&#2360;&#2368;&#2351; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2361;&#2352; &#2360;&#2366;&#2354; &#2325;&#2366;&#2352;&#2381;&#2340;&#2367;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2367;&#2350;&#2366; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2354;&#2369;&#2327;&#2369; &#2348;&#2366;&#2348;&#2366; &#2325;&#2379; &#2360;&#2350;&#2352;&#2381;&#2346;&#2367;&#2340; &#2319;&#2325; &#2346;&#2381;&#2352;&#2340;&#2367;&#2359;&#2381;&#2336;&#2367;&#2340; &#2343;&#2366;&#2352;&#2381;&#2350;&#2367;&#2325; &#2360;&#2381;&#2341;&#2354; &#2354;&#2369;&#2327;&#2369;&#2348;&#2369;&#2352;&#2369; &#2328;&#2306;&#2335;&#2366;&#2348;&#2366;&#2337;&#2364;&#2368; &#2343;&#2352;&#2350;&#2327;&#2338;&#2364; &#2325;&#2375; &#2310;&#2360;&#2346;&#2366;&#2360; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2367;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>C. &#2351;&#2361; &#2319;&#2325; &#2360;&#2306;&#2341;&#2366;&#2354;&#2368; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2340;&#2381;&#2351;&#2379;&#2361;&#2366;&#2352; &#2361;&#2376;&#2404;</span>",
    "options": [
      "<span class=\"eqt\">A,B and C</span><span class=\"hqt\" style=\"display:none\">&#2319;, &#2348;&#2368; &#2324;&#2352; &#2360;&#2368;</span>",
      "<span class=\"eqt\">B and C</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2368; &#2324;&#2352; &#2360;&#2368;</span>",
      "<span class=\"eqt\">A only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2348;&#2368;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Luguburu Ghantabari Fair, a two day event, is held annually in Jharkhand, particularly in Bokaro district.</p><p>Celebrated during Kartik Purnima, it honors Lugu Baba, a revered spiritual figure among the Santhal tribal community.</p><p>It is one of the largest tribal religious gatherings in eastern India and reflects Santhali traditions and spirituality.</p>",
    "question_index": 42

    ],
    "correct_option_id": 1,
    "solution": "<p>&#61623; Industrial Development bank of India (IDBI) was constituted under Industrial Development bank of India Act, 1964 as a Development Financial Institution (DFI) and came into being as on July 01, <b>1964</b>. </p><p>&#61623; It was regarded as a Public Financial Institution in terms of the provisions of Section 4A of the Companies Act, 1956. It continued to serve as a DFI for 40 years till the year 2004 when it was transformed into a Bank. </p><p>&#61623; On October 1, 2004, the erstwhile IDBI was converted into a banking company IDBI Ltd. - to undertake the entire gamut of banking activities while continuing to play its secular DFI role. </p><p>&#61623; Desirous of fuelling its business growth, IDBI Ltd. merged its subsidiaries - the erstwhile IDBI Bank, IDBI Home Finance Ltd., IDBI Gilts, the erstwhile United Western Bank Ltd., with itself over a period of time. IDBI Ltd. also changed its name to IDBI Bank Ltd. to reflect its widened business functions.</p>",
    "question_index": 43
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following Statements:</p><p>I. Congress and All India Muslim League signed the historic Lucknow Pact.</p><p>II. Lucknow Pact was signed in 1916.</p><p>Which of the following is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2368;&#2332;&#2367;&#2319;:</p><p>I. &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2324;&#2352; &#2309;&#2326;&#2367;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2354;&#2368;&#2327; &#2344;&#2375; &#2320;&#2340;&#2367;&#2361;&#2366;&#2360;&#2367;&#2325; &#2354;&#2326;&#2344;&#2314; &#2360;&#2350;&#2333;&#2380;&#2340;&#2375; &#2346;&#2352; &#2361;&#2360;&#2381;&#2340;&#2366;&#2325;&#2381;&#2359;&#2352; &#2325;&#2367;&#2319;&#2404;</p><p>II. &#2357;&#2352;&#2381;&#2359; 1916 &#2350;&#2375;&#2306; &#2354;&#2326;&#2344;&#2314; &#2360;&#2350;&#2333;&#2380;&#2340;&#2366; &#2361;&#2369;&#2310;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Only I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">I and II Both</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Both are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The Lucknow Session 1916 was special in many respects.</p><p>This session brought the moderates and extremists in Congress on common platform again after nearly a decade.</p><p>Congress and All India Muslim League signed the historic Lucknow Pact.</p><p>Muslim League sought for a sort of joint platformwith the congress to put constitutional pressure on the British Government towards making reforms. <b>The idea was that such joint demand would give an impression of Hindu-Muslim unity. </b></p>",
    "question_index": 44
  },
  {
    "question": "<span class=\"eqt\"><p>The first battle of Tarain was fought in 1191 between Muhammad Ghori and ______.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2352;&#2366;&#2311;&#2344; &#2325;&#2366; &#2346;&#2361;&#2354;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343; 1191 &#2350;&#2375;&#2306; &#2350;&#2369;&#2361;&#2350;&#2381;&#2350;&#2342; &#2327;&#2379;&#2352;&#2368; &#2324;&#2352; ______ &#2325;&#2375; &#2348;&#2368;&#2330; &#2354;&#2337;&#2364;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rajyapala</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2366;&#2332;&#2381;&#2351;&#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Anandapala</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2344;&#2344;&#2381;&#2342;&#2346;&#2366;&#2354;</span>",
      "<span class=\"eqt\">Khusru Malik</span><span class=\"hqt\" style=\"display:none\">&#2326;&#2369;&#2360;&#2352;&#2370; &#2350;&#2354;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Prithviraj Chauhan</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2371;&#2341;&#2381;&#2357;&#2368;&#2352;&#2366;&#2332; &#2330;&#2380;&#2361;&#2366;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; The first battle of Tarain was fought in 1191 between Muhammad Ghori and <b>Prithviraj Chauhan</b>.</p><p>&#183; Prithviraj rose to the occasion, and defeated Ghori in the battle of Tarain near Delhi in 1191 A.D. Muhammad Ghori felt greatly humiliated by this defeat. </p><p>&#183; To avenge this defeat he made serious preparations and gathered an army of 1,20,000 men. </p><p>&#183; He came with this large force to Lahore via Peshawar and Multan. </p><p>&#183; He sent a message to Prithviraj asking him to acknowledge his supremacy and become a Muslim. Prithviraj rejected this proposal and prepared to meet the invader.</p>",
    "question_index": 45
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following is renowned for his unique style of dance, which he called \"Creative Dance.\"?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2309;&#2346;&#2344;&#2368; &#2309;&#2344;&#2370;&#2336;&#2368; &#2344;&#2371;&#2340;&#2381;&#2351; &#2358;&#2376;&#2354;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2376;, &#2332;&#2367;&#2360;&#2375; &#2313;&#2344;&#2381;&#2361;&#2379;&#2306;&#2344;&#2375; \"&#2352;&#2330;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2344;&#2371;&#2340;&#2381;&#2351;\" &#2325;&#2361;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ravi Shankar</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2358;&#2306;&#2325;&#2352;</span>",
      "<span class=\"eqt\">Birju Maharaj</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2367;&#2352;&#2332;&#2370; &#2350;&#2361;&#2366;&#2352;&#2366;&#2332;</span>",
      "<span class=\"eqt\">Chandralekha</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2342;&#2381;&#2352;&#2354;&#2375;&#2326;&#2366;</span>",
      "<span class=\"eqt\">Uday Shankar</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2342;&#2351; &#2358;&#2306;&#2325;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Uday Shankar is renowned for his unique style of dance, which he called \"Creative Dance.\" He combined elements of Indian classical, folk, and tribal dances with Western theatrical techniques to create this innovative approach to dance. He was a pioneer of modern dance in India.</p><p>In 1962, he was awarded by Sangeet Natak Akademi, India's The National Academy for Music, Dance and Drama, with its highest award, the Sangeet Natak Akademi Fellowship for lifetime achievement, and in 1971, the Govt. of India, awarded him its second highest civilian award the Padma Vibhushan.</p>",
    "question_index": 46
  },
  {
    "question": "<span class=\"eqt\"><p>\"Rainfall less than 50cm, and plants remain leafless for most part of the year\" the mentioned characteristic explains which type of forest in India?</p></span><span class=\"hqt\" style=\"display:none\"><p>\"50 &#2360;&#2375;&#2350;&#2368; &#2360;&#2375; &#2325;&#2350; &#2357;&#2352;&#2381;&#2359;&#2366; &#2324;&#2352; &#2346;&#2380;&#2343;&#2375; &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2309;&#2343;&#2367;&#2325;&#2366;&#2306;&#2358; &#2349;&#2366;&#2327; &#2350;&#2375;&#2306; &#2346;&#2340;&#2381;&#2340;&#2375; &#2352;&#2361;&#2367;&#2340; &#2352;&#2361;&#2340;&#2375; &#2361;&#2376;&#2306;\" &#2313;&#2354;&#2381;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2367;&#2358;&#2375;&#2359;&#2340;&#2366; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2357;&#2344; &#2325;&#2368; &#2357;&#2381;&#2351;&#2366;&#2326;&#2381;&#2351;&#2366; &#2325;&#2352;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Tropical deciduous forest</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2346;&#2352;&#2381;&#2339;&#2346;&#2366;&#2340;&#2368; &#2357;&#2344;</span>",
      "<span class=\"eqt\">Montane forest</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2352;&#2381;&#2357;&#2340;&#2368;&#2351;/&#2350;&#2379;&#2306;&#2335;&#2366;&#2344;&#2375; &#2357;&#2344;</span>",
      "<span class=\"eqt\">Littoral and swamp forest</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2335;&#2368;&#2351; &#2324;&#2352; &#2342;&#2354;&#2342;&#2354;&#2368; &#2357;&#2344;</span>",
      "<span class=\"eqt\">Tropical thorn forest.</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2359;&#2381;&#2339;&#2325;&#2335;&#2367;&#2348;&#2306;&#2343;&#2368;&#2351; &#2325;&#2366;&#2306;&#2335;&#2375;&#2342;&#2366;&#2352; &#2357;&#2344;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Tropical thorn forests occur </b><b>in areas that receive rainfall less than 50 cm</b>. These consist of a variety of grasses and shrubs. It includes semi-arid areas of south west Punjab, Haryana, Rajasthan, Gujarat, Madhya Pradesh and Uttar Pradesh.</p><p>In these forests, plants remain leafless for most part of the year and give an expression of scrub vegetation.</p><p>Important species found are babool, ber, and wild date palm, khair, neem, etc. Tussocky grass grows upto a height of 2 m as the undergrowth.</p><p></p><p>Why not the others?</p><p>Tropical deciduous forests: Receive 100200 cm rainfall, and trees shed leaves seasonally.</p><p>Montane forests: Found in hilly/mountainous regions, not characterized by low rainfall.</p><p>Littoral and swamp forests: Found in coastal and delta regions, with abundant water.</p>",
    "question_index": 47
  },
