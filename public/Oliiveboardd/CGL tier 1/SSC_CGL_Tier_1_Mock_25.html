    "question": "<span class=\"eqt\"><p>The following line graph shows the total number of Pens and Pencils sold by a shopkeeper in the month of June, July, August, September, October, November and December.</p><p><img width=576 height=336 id=\"Chart 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20812/image010.png\"></p><p>Select the incorrect statement from the following options-</p><p>I. Total number of Pens and Pencils sold by a shopkeeper in the months of June and August is 2885.</p><p>II. Difference between total number of Pens sold in the month of December and total number of Pencils sold in the month of September is 950.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2352;&#2375;&#2326;&#2366; &#2310;&#2352;&#2375;&#2326; &#2332;&#2370;&#2344;, &#2332;&#2369;&#2354;&#2366;&#2312;, &#2309;&#2327;&#2360;&#2381;&#2340;, &#2360;&#2367;&#2340;&#2306;&#2348;&#2352;, &#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;, &#2344;&#2357;&#2306;&#2348;&#2352; &#2324;&#2352; &#2342;&#2367;&#2360;&#2306;&#2348;&#2352; &#2325;&#2375; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2346;&#2375;&#2344; &#2324;&#2352; &#2346;&#2375;&#2306;&#2360;&#2367;&#2354; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=\"576\" height=\"336\" id=\"Chart 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20812/image010.png\"></p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2327;&#2354;&#2340; &#2325;&#2341;&#2344; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319;-</p><p>I. &#2332;&#2370;&#2344; &#2324;&#2352; &#2309;&#2327;&#2360;&#2381;&#2340; &#2325;&#2375; &#2350;&#2361;&#2368;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2319;&#2325; &#2342;&#2369;&#2325;&#2366;&#2344;&#2342;&#2366;&#2352; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2346;&#2375;&#2344; &#2324;&#2352; &#2346;&#2375;&#2306;&#2360;&#2367;&#2354; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 2885 &#2361;&#2376;&#2404;</p><p>II. &#2342;&#2367;&#2360;&#2306;&#2348;&#2352; &#2325;&#2375; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2375; &#2327;&#2319; &#2346;&#2375;&#2344; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2324;&#2352; &#2360;&#2367;&#2340;&#2306;&#2348;&#2352; &#2325;&#2375; &#2350;&#2361;&#2368;&#2344;&#2375; &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2368; &#2327;&#2312; &#2346;&#2375;&#2306;&#2360;&#2367;&#2354; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; 950 &#2361;&#2376;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>Two numbers P and Q are in the ratio of 22: 25. If four-fifth of the value of P is 227 more than the one-fourth of the value of Q, then what is the value of (3Q  -  2P)?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; P &#2324;&#2352; Q, 22: 25 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; P &#2325;&#2375; &#2350;&#2366;&#2344; &#2325;&#2366; 4/5 &#2349;&#2366;&#2327;, Q &#2325;&#2375; &#2350;&#2366;&#2344; &#2325;&#2375; 1/4 &#2349;&#2366;&#2327; &#2360;&#2375; 227 &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;, &#2340;&#2379; (3Q - 2P) &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">600</span><span class=\"hqt\" style=\"display:none\">600</span>",
      "<span class=\"eqt\">540</span><span class=\"hqt\" style=\"display:none\">540</span>",
      "<span class=\"eqt\">620</span><span class=\"hqt\" style=\"display:none\">620</span>",
      "<span class=\"eqt\">640</span><span class=\"hqt\" style=\"display:none\">640</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>According to the question,</p><p>P/Q = 22/25</p><p>Let P = 22a and Q = 25a</p><p>And 4P/5 = Q/4 + 227</p><p>=&gt; 4 * 22a/5 = 25a/4 + 227</p><p>=&gt; a = 20</p><p>So, (3Q  -  2P) = 3 * 25 * 20  -  2 * 22 * 20 = 620</p>",
    "question_index": 56
  },

    "question": "<span class=\"eqt\"><p>If the area swept by minute hand of a clock is 616/3 cm<sup>2</sup>, and length of the minute hand of the clock is 28 cm, then how many minutes it swept?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2328;&#2337;&#2364;&#2368; &#2325;&#2368; &#2350;&#2367;&#2344;&#2335; &#2325;&#2368; &#2360;&#2369;&#2312; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2325;&#2357;&#2352; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; 616/3 cm<sup>2</sup> &#2361;&#2376; &#2324;&#2352; &#2328;&#2337;&#2364;&#2368; &#2325;&#2368; &#2350;&#2367;&#2344;&#2335; &#2325;&#2368; &#2360;&#2370;&#2312; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 28 cm &#2361;&#2376;, &#2340;&#2379; &#2351;&#2361; &#2325;&#2367;&#2340;&#2344;&#2375; &#2350;&#2367;&#2344;&#2335; &#2325;&#2366; &#2360;&#2350;&#2351; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">10 minutes</span><span class=\"hqt\" style=\"display:none\">10 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">15 minutes</span><span class=\"hqt\" style=\"display:none\">15 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">5 minutes</span><span class=\"hqt\" style=\"display:none\">5 &#2350;&#2367;&#2344;&#2335;</span>",
      "<span class=\"eqt\">20 minutes</span><span class=\"hqt\" style=\"display:none\">20 &#2350;&#2367;&#2344;&#2335;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Area swept by minute hand = &#952;/360 * &#960;r<sup>2</sup></p><p>=&gt; 616/3 = &#952;/360 * 22/7 * 28<sup>2</sup></p><p>=&gt; &#952; = 616/3 * 360 * 7/22 * 1/(28 * 28)</p><p>=&gt; &#952; = 30&deg;</p><p>Minute hand completes full circle in one hour.</p><p>360&deg; angle made by minute hand in = 60 minutes</p><p>=&gt; 30&deg; angle made by minute hand in = 60/360 * 30 = 5 minutes</p>",
    "question_index": 57
  },

    "options": [
      "<span class=\"eqt\">160</span><span class=\"hqt\" style=\"display:none\">160</span>",

      "<span class=\"eqt\">200</span><span class=\"hqt\" style=\"display:none\">200</span>",

    "correct_option_id": 3,
    "solution": "<p>Simple interest = sum * rate * time/100</p><p>Now, ((3y  -  100) * rate * time/100): ((5y + 300) * rate * time/100) = 1: 3</p><p>3 * (3y  -  100) = 5y + 300</p><p>9y  -  300 = 5y + 300</p><p>4y = 600</p><p><b>y = 150</b></p>",

    "question": "<span class=\"eqt\"><p>There are a total of 30 jars marked from 1 to 30, such that jar1 has 3 marbles, jar2 has 6 marbles, jar3 has 9 marbles and so on. The total number of marbles in all 30 jars is X, then X is divisible by ___.</p></span><span class=\"hqt\" style=\"display:none\"><p>1 &#2360;&#2375; 30 &#2340;&#2325; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2369;&#2354; 30 &#2332;&#2366;&#2352; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376;&#2306; &#2325;&#2367; &#2332;&#2366;&#2352;1 &#2350;&#2375;&#2306; 3 &#2325;&#2306;&#2330;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2366;&#2352;2 &#2350;&#2375;&#2306; 6 &#2325;&#2306;&#2330;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2366;&#2352;3 &#2350;&#2375;&#2306; 9 &#2325;&#2306;&#2330;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2311;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2310;&#2327;&#2375; &#2349;&#2368;&#2404; &#2360;&#2349;&#2368; 30 &#2332;&#2366;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2306;&#2330;&#2379;&#2306; &#2325;&#2368; &#2325;&#2369;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; X &#2361;&#2376;, &#2340;&#2379; X, ___ &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2381;&#2351; &#2361;&#2379;&#2327;&#2366;&#2404;</p></span>",

    "question": "<span class=\"eqt\"><p>A and B enter a partnership with investments in the ratio 4: 3 respectively. After 10 months, A left. At the end of 2 years partnership, total profit earned is Rs.9800. What is the share of B in profit? </p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2324;&#2352; B &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 4: 3 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2344;&#2367;&#2357;&#2375;&#2358; &#2325;&#2375; &#2360;&#2366;&#2341; &#2319;&#2325; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2357;&#2375;&#2358; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; 10 &#2350;&#2361;&#2368;&#2344;&#2375; &#2325;&#2375; &#2348;&#2366;&#2342;, A &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2331;&#2379;&#2396; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; 2 &#2357;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2368; &#2360;&#2366;&#2333;&#2375;&#2342;&#2366;&#2352;&#2368; &#2325;&#2375; &#2309;&#2306;&#2340; &#2350;&#2375;&#2306;, &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2369;&#2354; &#2354;&#2366;&#2349; &#2352;&#2369;.9800 &#2361;&#2376;&#2404; &#2354;&#2366;&#2349; &#2350;&#2375;&#2306; B &#2325;&#2366; &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.6300</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.6300</span>",

    "correct_option_id": 0,

    "question": "<span class=\"eqt\"><p>In a 200 m race, M completes the race in 30.8 sec and N in 29.7 seconds. The distance (to the nearest whole number) by which N beats M is:</p></span><span class=\"hqt\" style=\"display:none\"><p>200 m &#2325;&#2368; &#2342;&#2380;&#2337;&#2364; &#2350;&#2375;&#2306;, M, 30.8 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2342;&#2380;&#2337;&#2364; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; N, 29.7 &#2360;&#2375;&#2325;&#2306;&#2337; &#2350;&#2375;&#2306; &#2342;&#2380;&#2337;&#2364; &#2346;&#2370;&#2352;&#2368; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; N, M &#2325;&#2379; &#2325;&#2367;&#2340;&#2344;&#2368; &#2342;&#2370;&#2352;&#2368; &#2360;&#2375; (&#2344;&#2367;&#2325;&#2335;&#2340;&#2350; &#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2340;&#2325;) &#2361;&#2352;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">12 m</span><span class=\"hqt\" style=\"display:none\">12 m</span>",
      "<span class=\"eqt\">5 m</span><span class=\"hqt\" style=\"display:none\">5 m</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Difference between the times taken = 30.8  -  29.7 = 1.1 sec</p><p>So, the required answer will be the distance cover by M in 1.1 sec.</p><p>Given,</p><p>200 m covered by M in 30.8 sec.</p><p>So, in 1.1 sec M will cover = 200 x 1.1/30.8 = 7 m</p>",

    "question": "<span class=\"eqt\"><p>In &#916; ABC, AB = BC = CA and O is a point in the interior of &#916; ABC such that OD &#8869; AB, OE &#8869; BC, and OF &#8869; AC. If OD = 2&radic;3 cm, OE = 3&radic;3 cm, and OF = 4&radic;3 cm, then find the value of AB + BC + CA.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#916; ABC &#2350;&#2375;&#2306;, AB = BC = CA &#2324;&#2352; &#2348;&#2367;&#2306;&#2342;&#2369; O, &#916; ABC &#2325;&#2375; &#2309;&#2349;&#2381;&#2351;&#2306;&#2340;&#2352; &#2350;&#2375;&#2306; &#2319;&#2325; &#2348;&#2367;&#2306;&#2342;&#2369; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2361;&#2376; &#2325;&#2367; OD &#8869; AB, OE &#8869; BC &#2324;&#2352; OF &#8869; AC &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; OD = 2&radic;3 cm, OE = 3&radic;3 cm &#2324;&#2352; OF = 4&radic;3 cm &#2361;&#2376;, &#2340;&#2379; AB + BC + CA &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">54 cm</span><span class=\"hqt\" style=\"display:none\">54 cm</span>",
      "<span class=\"eqt\">72 cm</span><span class=\"hqt\" style=\"display:none\">72 cm</span>",
      "<span class=\"eqt\">48 cm</span><span class=\"hqt\" style=\"display:none\">48 cm</span>",
      "<span class=\"eqt\">64 cm</span><span class=\"hqt\" style=\"display:none\">64 cm</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>In an equilateral triangle, from the interior point O, if the perpendicular distance to sides are a, b, and c cm, then,</p><p>(a + b + c) = (&radic;3/2) * Side of equilateral triangle</p><p>Now,</p><p>(2&radic;3 + 3&radic;3 + 4&radic;3) = (&radic;3/2) * side of equilateral triangle</p><p>9&radic;3 = (&radic;3/2) * side of equilateral triangle</p><p>Side of equilateral triangle = 18 cm</p><p>So, AB + BC + CA = 18 + 18 + 18 = 54 cm</p>",

    "question": "<span class=\"eqt\"><p>The average number of marbles in three jars named as A, B, and C is 80. From jar A, X number of marbles, from B, 2X number of marbles, and from C, 3X number of marbles are taken out and thus the average number of remaining marbles in three jars become 60. Find the value of X.</p></span><span class=\"hqt\" style=\"display:none\"><p>A, B, &#2324;&#2352; C &#2344;&#2366;&#2350;&#2367;&#2340; &#2340;&#2368;&#2344; &#2332;&#2366;&#2352; &#2350;&#2375;&#2306; &#2325;&#2306;&#2330;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 80 &#2361;&#2376;&#2404; &#2332;&#2366;&#2352; A &#2360;&#2375; X &#2325;&#2306;&#2330;&#2375;, &#2332;&#2366;&#2352; B &#2360;&#2375; 2X &#2325;&#2306;&#2330;&#2375; &#2324;&#2352; &#2332;&#2366;&#2352; C &#2360;&#2375; 3X &#2325;&#2306;&#2330;&#2375; &#2344;&#2367;&#2325;&#2366;&#2354;&#2375; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306; &#2340;&#2341;&#2366; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2340;&#2368;&#2344; &#2332;&#2366;&#2352; &#2350;&#2375;&#2306; &#2358;&#2375;&#2359; &#2325;&#2306;&#2330;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 60 &#2361;&#2379; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">20</span><span class=\"hqt\" style=\"display:none\">20</span>",
      "<span class=\"eqt\">30</span><span class=\"hqt\" style=\"display:none\">30</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>"

    "correct_option_id": 0,
    "solution": "<p>Total number of marbles in all three jars = 80 * 3 = 240</p><p>Total number of remaining marbles in all three jars = 60 * 3 = 180</p><p>Total number of marbles taken out = 240  -  180 = 60</p><p>ATQ,</p><p>X + 2X + 3X = 60</p><p>6X = 60</p><p>X = 10</p>",

    "question": "<span class=\"eqt\"><p><div>&nbsp;A man earned&nbsp;<div style=\"display: inline-block;position: relative;vertical-align: middle;\"><span style=\"text-align:center;display: block; padding: 0;\">1</span><span style=\"display: block; padding: 0;position: absolute; top: 0em; display: none;letter-spacing: -0.1em;\">_________</span><span style=\"display: block; padding: 0;border-top: thin solid black; text-align:center\">10</span></div>&nbsp;of the cost price of a fan by selling it for Rs. 891. Find the cost price of the fan.&nbsp;</div></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2344;&#2375; &#2319;&#2325; &#2346;&#2306;&#2326;&#2375; &#2325;&#2379; &#2352;&#2369;.891 &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2344;&#2375; &#2346;&#2352; &#2346;&#2306;&#2326;&#2375;&#2306; &#2325;&#2375; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2366; 1/10 &#2349;&#2366;&#2327; &#2354;&#2366;&#2349; &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2309;&#2352;&#2381;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;, &#2340;&#2379; &#2346;&#2306;&#2326;&#2375; &#2325;&#2366; &#2325;&#2381;&#2352;&#2351; &#2350;&#2370;&#2354;&#2381;&#2351; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.850</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.850</span>",
      "<span class=\"eqt\">Rs.800</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.800</span>",
      "<span class=\"eqt\">Rs.810</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2369;.810</span>",

    "correct_option_id": 2,
    "solution": "<p>\"</p><p><span>Let Cost Price(C.P.) of fan =Rs.&nbsp;</span><span><i>x</i></span></p><p>Selling Price(S.P.) of fan =Rs. 891</p><p>Profit = Selling Price(S.P.) &#8211; Cost Price(C.P.)</p><p>(x/10) = 891 - x</p><p>11x/10 = 891</p><p>x = Rs.810</p><p></p><p><b> Express Method </b></p><p>Profit = 1/10 of cost price</p><p>Let CP = 10 then SP = 11</p><p>Given,</p><p>11 units = Rs.891</p><p>10 units = 891 x 10/11 = Rs.810</p><p>Cost price = Rs.810</p>",

    "question": "<p>The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</p><p>The survival of political machines usually rests itself on the amenability of federal supervisors.</p>",
    "options": [
      "The survival of political machines",
      "usually rests itself",
      "on the amenability of",
      "federal supervisors."
    ],
    "correct_option_id": 1,
    "solution": "<p>The error lies in <b>option (b)</b>.</p><p>'Itself' after 'rests' is a <b>reflexive pronoun</b>. 'Rests' can <b>never </b>be followed by a reflexive pronoun.</p><p>Hence, 'itself' after 'rests' must be removed.</p><p>Thus, the error is in <b>option (b) </b>usually rests itself.</p><p>Therefore, the corrected form of the sentence is: The survival of political machines usually rests on the amenability of federal supervisors.</p><p>Additional Information:</p><p>Reflexive pronouns are words like myself, yourself, himself, herself, itself, ourselves, yourselves and themselves. They refer back to a person or thing. We often use reflexive pronouns when the subject and the object of a verb are the same. I cut myself when I was making dinner last night.</p><p><b>Don't</b> use reflexive pronouns with these words:<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Hide</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Move</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Bathe</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Rest</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Turn</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Stop</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Keep</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Qualify</td></tr></table></p>",

    "question": "<p>Describe how you will inform your parents that the school will host a science fair in passive voice. </p>",
    "options": [
      "A science fair will be hosted by the school.",
      "The school will be hosting a science fair.",
      "A science fair is hosting by the school.",
      "A science fair will be hosting by the school."
    ],
    "correct_option_id": 0,
    "solution": "<p>The sentence that needs to be changed into passive voice is: The school will host a science fair (active voice).</p><p>Following rules are applied when converting a sentence into passive voice:</p><p>The subject of the Active Voice is changed into the object of the Passive voice. Also, the object of the Active Voice is changed into the subject of the Passive Voice.</p><p>The usage of a \"to be\" form of verb [be] is necessary while changing the voice of the sentence from Active to Passive.</p><p>In Passive Voice, the preposition \"by\" is used before the object. However, it is optional in some cases.</p><p>The Active voice in the given question is in Future Indefinite. Thus, the Passive voice will also be in the Future Indefinite.</p><p>The format of Active voice is: Subject + shall/will + V1 + Object.</p><p>Thus, in Passive voice, the format will be: Object of the active voice (Subjective case) + shall/will + be + V3 + by + Subject of the active voice (Objective case).</p><p>For example:</p><p>He will complete the assignment. (Active Voice)</p><p>The assignment will be completed by him. (Passive Voice)</p><p>The options except (a) don't follow the correct grammatical format of the Passive Voice.</p><p>Therefore, the correct answer is: A science fair will be hosted by the school.</p><p>Hence, (a) is the correct answer. </p>",
    "question_index": 81
  },
