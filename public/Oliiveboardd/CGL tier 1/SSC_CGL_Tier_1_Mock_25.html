<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>

                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->

                    </div>
                    <div class="stat-item">

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>Each of the digits in the number '854203641' is arranged in ascending order from left to right. The position of how many digits will remain unchanged as compared to that in the original number? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; '854203641' &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2306;&#2325; &#2325;&#2379; &#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2366;&#2319;&#2305; &#2310;&#2352;&#2379;&#2361;&#2368; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2350;&#2370;&#2354; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344; &#2309;&#2346;&#2352;&#2367;&#2357;&#2352;&#2381;&#2340;&#2367;&#2340; &#2352;&#2361;&#2375;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">More than three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</span>",
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>",
      "<span class=\"eqt\">One</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;</span>",
      "<span class=\"eqt\">None</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The given number is 854203641.</p><p>If each of the digits in the number is arranged in ascending order from left to right, then we get: </p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Original number</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">0</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ascending order</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">0</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">4</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">8</td></tr></table><p>So, the positions of none of the digits remain unchanged. </p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>How many meaningful English words can be formed using second, fourth, sixth and eighth letters of the word 'BRISKEST' (when counted from left to right) using each letter only once in each word?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2358;&#2348;&#2381;&#2342; 'BRISKEST' &#2325;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375;, &#2330;&#2380;&#2341;&#2375;, &#2331;&#2336;&#2375; &#2324;&#2352; &#2310;&#2336;&#2357;&#2375;&#2306; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; (&#2348;&#2366;&#2319;&#2305; &#2360;&#2375; &#2342;&#2366;&#2319;&#2305; &#2327;&#2339;&#2344;&#2366; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352;) &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2352;&#2381;&#2341;&#2346;&#2370;&#2352;&#2381;&#2339; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2358;&#2348;&#2381;&#2342; &#2348;&#2344;&#2366;&#2319; &#2332;&#2366; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2332;&#2367;&#2344;&#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2358;&#2348;&#2381;&#2342; &#2350;&#2375;&#2306; &#2325;&#2375;&#2357;&#2354; &#2319;&#2325; &#2348;&#2366;&#2352; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2379;?</p></span>",
    "options": [
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Two<b> </b></span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>",
      "<span class=\"eqt\">One</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;</span>",
      "<span class=\"eqt\">More than three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344; &#2360;&#2375; &#2309;&#2343;&#2367;&#2325;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>BRISKEST</p><p>second, fourth, sixth and eighth letters of the word 'BRISKEST' (when counted from left to right): RSET</p><p>Words formed are </p><p>ERST: long ago</p><p>REST: to relax</p><p>STER: one that does or handles or operates</p><p>Thus, three words are formed.</p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>If today is Saturday, then which day will fall on (2<sup>3</sup>)<sup>3</sup>th day after today? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2310;&#2332; &#2358;&#2344;&#2367;&#2357;&#2366;&#2352; &#2361;&#2376;, &#2340;&#2379; &#2310;&#2332; &#2325;&#2375; &#2348;&#2366;&#2342; (2<sup>3</sup>)<sup>3</sup>&#2357;&#2375;&#2306; &#2342;&#2367;&#2344; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2342;&#2367;&#2344; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Monday</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2350;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Friday</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2325;&#2381;&#2352;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Wednesday</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2369;&#2343;&#2357;&#2366;&#2352;</span>",
      "<span class=\"eqt\">Sunday</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2357;&#2367;&#2357;&#2366;&#2352;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Today is Saturday. </p><p>(2<sup>3</sup>)<sup>3</sup>th day = (2)<sup>3x3</sup> = 2<sup>9</sup>th day.</p><p>So, 2<sup>9</sup> = 2*2*2*2*2*2*2*2*2 = 512</p><p>If we divide 512 by 7, then the remainder will be 1.</p><p>So, 1 odd day.</p><p>Thus, </p><p>(2<sup>3</sup>)<sup>3</sup>th day after today = Saturday + 1 odd day = Sunday. </p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In the following question, three statements are given and three conclusions are given below these statements. Choose the option which shows the conclusions which logically follow from the given statements, disregarding commonly known facts.</p><p><b>Statements: </b></p><p>All caps are kits. </p><p>Some kits are shorts. </p><p>All shirts are kits.</p><p><b>Conclusions: </b></p><p>I. Some caps can be shirts. </p><p>II. All caps are shorts. </p><p>III. Some shirts can be shorts. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2350;&#2375;&#2306; &#2340;&#2368;&#2344; &#2325;&#2341;&#2344; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306; &#2324;&#2352; &#2311;&#2344; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2375; &#2344;&#2368;&#2330;&#2375; &#2340;&#2368;&#2344; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2360;&#2352;&#2381;&#2357;&#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2325;&#2368; &#2309;&#2357;&#2361;&#2375;&#2354;&#2344;&#2366; &#2325;&#2352;&#2340;&#2375; &#2361;&#2369;&#2319; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;/&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;&#2379;&#2306; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><b>&#2325;&#2341;&#2344; : </b></p><p>&#2360;&#2349;&#2368; caps, kits &#2361;&#2376;&#2306;</p><p>&#2325;&#2369;&#2331; kits, shorts &#2361;&#2376;&#2306;</p><p>&#2360;&#2349;&#2368; shirts, kits &#2361;&#2376;&#2306;</p><p><b>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; : </b></p><p>I. &#2325;&#2369;&#2331; caps, shirts &#2361;&#2379; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;</p><p>II. &#2360;&#2349;&#2368; caps, shorts &#2361;&#2376;&#2306;</p><p>III. &#2325;&#2369;&#2331; shirts, shorts &#2361;&#2379; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I and III follow</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only III follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only II follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only III and II follow</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III &#2324;&#2352; II &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The given statements are, </p><p>All caps are kits. Some kits are shorts. All shirts are kits.</p><p>The basic minimum overlapping diagram and another possible diagram are, </p><p><img width=391 height=200 id=\"Drawing 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20980/image010.png\"></p><p>Here, some caps can be shirts, there is no direct relationship between caps and shorts, some shirts can be shorts. </p><p>Hence, conclusions I and III follow. </p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Select the option which is related to the fourth term in the same way as the first term is related to the second term. </p><p><b>147 : 189 : : ? : 153</b></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2360; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2330;&#2380;&#2341;&#2375; &#2346;&#2342; &#2360;&#2375; &#2313;&#2360;&#2368; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376; &#2332;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2346;&#2361;&#2354;&#2366; &#2346;&#2342;, &#2342;&#2370;&#2360;&#2352;&#2375; &#2346;&#2342; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2404;</p><p><b>147 : 189 : : ? : 153</b></p></span>",
    "options": [
      "<span class=\"eqt\">119</span><span class=\"hqt\" style=\"display:none\">119</span>",
      "<span class=\"eqt\">121</span><span class=\"hqt\" style=\"display:none\">121</span>",
      "<span class=\"eqt\">113</span><span class=\"hqt\" style=\"display:none\">113</span>",
      "<span class=\"eqt\">117</span><span class=\"hqt\" style=\"display:none\">117</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>147/189 = 7/9</p><p>Similarly, <b>119/153 = 7/9</b></p>",

  },
  {
    "question": "<span class=\"eqt\"><p>Select the correct set of symbols, such that the given equation becomes correct.</p><p><img width=601 height=72 id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p14901/image001.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2340;&#2368;&#2325;&#2379;&#2306; &#2325;&#2375; &#2313;&#2360; &#2360;&#2361;&#2368; &#2360;&#2350;&#2370;&#2361; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2367;&#2360;&#2360;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379; &#2332;&#2366;&#2319;&#2404;</p><p><img width=\"601\" height=\"72\" id=\"Picture 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p14901/image001.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">+, -, = , x, &div;</span><span class=\"hqt\" style=\"display:none\">+, -, = , x, &div;</span>",
      "<span class=\"eqt\">+, -, +, x, =</span><span class=\"hqt\" style=\"display:none\">+, -, +, x, =</span>",
      "<span class=\"eqt\">+, x, -, &div;, =</span><span class=\"hqt\" style=\"display:none\">+, x, -, &div;, =</span>",
      "<span class=\"eqt\">+, -, &div;, x, =</span><span class=\"hqt\" style=\"display:none\">+, -, &div;, x, =</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>We have:</p><p>From a:</p><p>16 + 18  -  10 = 2 x 3 &div; 19</p><p>So, LHS is not equal to RHS</p><p>From b:</p><p>16 + 18  -  10 + 2 x 3 = 19</p><p>24 + 6 = 19</p><p>So, LHS is not equal to RHS</p><p>From c:</p><p>16 + 18 x 10 - 2 x 3 = 19</p><p>So, LHS is not equal to RHS</p><p>From d:</p><p>16 + 18  -  10 &div; 2 x 3 = 19</p><p>16 + 18  -  15 = 19</p><p>19 = 19</p><p>LHS = RHS</p>",
    "question_index": 5

    "question": "<span class=\"eqt\"><p>Three different positions of the same dice are shown, the six faces of which are consisted of symbols $, !, &amp;, @, # and %. Select the symbol that will be on the face opposite to the one having the symbol '&amp;'.</p><p><img width=270 height=153 id=\"Picture 47\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19864/image046.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2350;&#2366;&#2344; &#2346;&#2366;&#2360;&#2375; &#2325;&#2368; &#2340;&#2368;&#2344; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2351;&#2366;&#2305; &#2342;&#2352;&#2381;&#2358;&#2366;&#2312; &#2327;&#2312; &#2361;&#2376;&#2306;, &#2346;&#2366;&#2360;&#2375; &#2325;&#2375; &#2331;&#2361; &#2347;&#2354;&#2325;&#2379;&#2306; &#2346;&#2352; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; $, !, &amp;, @, # &#2324;&#2352; % &#2361;&#2376;&#2306;&#2404; &#2313;&#2360; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; '&amp;' &#2357;&#2366;&#2354;&#2375; &#2347;&#2354;&#2325; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2347;&#2354;&#2325; &#2346;&#2352; &#2361;&#2379;&#2327;&#2366;&#2404;</p><p><img width=\"270\" height=\"153\" id=\"Picture 47\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19864/image046.jpg\"></p></span>",

    "question": "<span class=\"eqt\"><p>Select the figure from among the given options that can replace the question mark (?) in the following series.</p><p><img width=636 height=164 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image025.png\"></p><p><img width=265 height=719 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image026.png\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2313;&#2360; &#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2319; &#2332;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2358;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2330;&#2367;&#2361;&#2381;&#2344; (?) &#2325;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2352; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2404;</p><p><img width=\"636\" height=\"164\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image025.png\"></p><p><img width=\"265\" height=\"719\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image026.png\"></p></span>",
    "options": [
      "<span class=\"eqt\">I</span><span class=\"hqt\" style=\"display:none\">I</span>",
      "<span class=\"eqt\">II</span><span class=\"hqt\" style=\"display:none\">II</span>",
      "<span class=\"eqt\">III</span><span class=\"hqt\" style=\"display:none\">III</span>",
      "<span class=\"eqt\">IV</span><span class=\"hqt\" style=\"display:none\">IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><img width=636 height=164 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image025.png\"></p><p>Here the interchange of elements is as given below alternately in each step  - </p><p><img width=397 height=164 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image027.png\"></p><p>Also,</p><p>The logic for the capital letter at the top left corner is-</p><p>B+2 =D</p><p>D+2=F</p><p>F+2=<b>H</b></p><p>The logic for the capital letter at the bottom right corner is-</p><p>N+2=P</p><p>P+2=R</p><p>R+2=<b>T</b></p><p>The logic for the small letter at the top right corner is-</p><p>k+3=n</p><p>n+3=q</p><p>q+3=<b>t</b></p><p>The logic for the small letter at the bottom left corner is-</p><p>p+3=s</p><p>s+3=v</p><p>v+3=<b>y</b></p><p>For numbers, the logic is  - </p><p>1<sup>st</sup> number=2<img width=12 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image028.png\">3=6<img width=12 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image028.png\">3=18<img width=12 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image028.png\">3=<b>54</b></p><p>2<sup>nd</sup> number=9<img width=12 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image028.png\">2=18<img width=12 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image028.png\">2=36<img width=12 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image028.png\">2=<b>72</b></p><p>3<sup>rd</sup> number=7<img width=12 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image028.png\">2=14<img width=12 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image028.png\">2=28<img width=12 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image028.png\">2=<b>56</b></p><p>4<sup>th</sup> number=4<img width=12 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image028.png\">3=12<img width=12 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image028.png\">3=36<img width=12 height=12 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image028.png\">3=<b>108</b></p><p>Thus, the answer is option figure (III)  - </p><p><img width=254 height=167 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25664/image029.png\"></p>",

    "question": "<span class=\"eqt\"><p>A cube is made by folding the given sheet. In the cube so formed, which of the following pairs of letters would be opposite to each other?</p><p><img width=170 height=135 id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21115/image007.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2358;&#2368;&#2335; &#2325;&#2379; &#2350;&#2379;&#2337;&#2364;&#2325;&#2352; &#2319;&#2325; &#2328;&#2344; &#2348;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2348;&#2344;&#2375; &#2328;&#2344; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; &#2319;&#2325; &#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2361;&#2379;&#2327;&#2366;?</p><p><img width=\"170\" height=\"135\" id=\"Picture 7\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21115/image007.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">A and Z</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; Z</span>",
      "<span class=\"eqt\">O and I</span><span class=\"hqt\" style=\"display:none\">O &#2324;&#2352; I</span>",
      "<span class=\"eqt\">P and G</span><span class=\"hqt\" style=\"display:none\">P &#2324;&#2352; G</span>",
      "<span class=\"eqt\">All of these</span><span class=\"hqt\" style=\"display:none\">&#2351;&#2375; &#2360;&#2349;&#2368;</span>"

    "correct_option_id": 3,
    "solution": "<p>In thus format, </p><p><img width=165 height=125 id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p21115/image008.jpg\"></p><p>Face having number 1 lies opposite to the face having number 3. Face having number 2 lies opposite to the face having number 4. Face having number 5 lies opposite to the face having number 6.</p><p>Thus, the face having A lies opposite to the face having Z; the face having G lies opposite to the face having P and the face having O lies opposite to the face having I.</p>",
    "question_index": 18

  {
    "question": "<span class=\"eqt\"><p>'J = K' means 'J is the daughter of K'.</p><p>'J + K' means 'J is the wife of K'. </p><p>'J  -  K' means 'J is the son of K'.</p><p>'J * K' means 'J is the grandfather of K.</p><p>'J &gt; K' means 'J is the brother of K'. </p><p>'J $ K' means 'J is the father of K'. </p><p>Which of the following statement is correct regarding the given expression? </p><p>D &gt; H + U  -  P $ S = Z</p></span><span class=\"hqt\" style=\"display:none\"><p>'J = K' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'J, K &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;'&#2404;</p><p>'J + K' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'J, K &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;'&#2404;</p><p>'J - K' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'J, K &#2325;&#2366; &#2346;&#2369;&#2340;&#2381;&#2352; &#2361;&#2376;'&#2404;</p><p>'J * K' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'J, K &#2325;&#2366; &#2342;&#2366;&#2342;&#2366;/&#2344;&#2366;&#2344;&#2366; &#2361;&#2376;&#2404;</p><p>'J &gt; K' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'J, K &#2325;&#2366; &#2349;&#2366;&#2312; &#2361;&#2376;'&#2404;</p><p>'J $ K' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; 'J, K &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;'&#2404;</p><p>&#2342;&#2367;&#2319; &#2327;&#2319; &#2357;&#2381;&#2351;&#2306;&#2332;&#2325; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p><p>D &gt; H + U - P $ S = Z</p></span>",
    "options": [
      "<span class=\"eqt\">H is the sister of S.</span><span class=\"hqt\" style=\"display:none\">H, S &#2325;&#2368; &#2348;&#2361;&#2344; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">P is the father of D.</span><span class=\"hqt\" style=\"display:none\">P, D &#2325;&#2366; &#2346;&#2367;&#2340;&#2366; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">Z is the wife of P.</span><span class=\"hqt\" style=\"display:none\">Z, P &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">S is the daughter of D.</span><span class=\"hqt\" style=\"display:none\">S, D &#2325;&#2368; &#2346;&#2369;&#2340;&#2381;&#2352;&#2368; &#2361;&#2376;&#2404;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>It is given that;</p><p>'J = K' means 'J is the daughter of K'.</p><p>'J + K' means 'J is the wife of K'. </p><p>'J  -  K' means 'J is the son of K'.</p><p>'J * K' means 'J is the grandfather of K.</p><p>'J &gt; K' means 'J is the brother of K'. </p><p>'J $ K' means 'J is the father of K'. </p><p>After decoding the expression D &gt; H + U  -  P $ S = Z, we get:</p><p>D is the brother of H.</p><p>H is the wife of U.</p><p>U is the son of P. </p><p>P is the father of S. </p><p>S is the daughter of Z. </p><p><img width=246 height=63 id=\"Picture 9\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p22334/image009.jpg\"></p><p>So, only option (c) is correct. </p>",
    "question_index": 19
  },

    "question": "<span class=\"eqt\"><p>Sadashiva Pradhan is associated with which of the following dance forms?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2342;&#2366;&#2358;&#2367;&#2357; &#2346;&#2381;&#2352;&#2343;&#2366;&#2344; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2344;&#2371;&#2340;&#2381;&#2351; &#2358;&#2376;&#2354;&#2368; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Odissi</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Sattriya</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2340;&#2381;&#2340;&#2381;&#2352;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Chhau</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2366;&#2314;</span>",

    "correct_option_id": 2,
    "solution": "<p>Sadashiva Pradhan from Odisha is an exponent of Chhau dance of Mayurbhanj.</p><p>For his contribution in the field of Chhau dance, Shri Sadashiva Pradhan has been honoured with the</p><p>Prajatantra Samman conferred by the Prajatantra Prachar Samiti in 2010; and the Guru Lingaraj Acharya Memorial Award conferred by the Acharya Chhau Nrutya Bichitra in 2014.</p><p>Shri Sadashiva Pradhan received the 2015 Sangeet Natak Akademi Award for his contribution to the Chhau dance of Mayurbhanj.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following groups consists of elements that are non-reactive, monoatomic elements with extremely low boiling points?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2350;&#2370;&#2361; &#2309;&#2340;&#2381;&#2351;&#2343;&#2367;&#2325; &#2325;&#2350; &#2325;&#2381;&#2357;&#2341;&#2344;&#2366;&#2306;&#2325; &#2357;&#2366;&#2354;&#2375; &#2309;&#2344;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2358;&#2368;&#2354;, &#2319;&#2325;&#2346;&#2352;&#2350;&#2366;&#2339;&#2381;&#2357;&#2367;&#2325; &#2340;&#2340;&#2381;&#2357;&#2379;&#2306; &#2360;&#2375; &#2351;&#2369;&#2325;&#2381;&#2340; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Group 18</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 18</span>",
      "<span class=\"eqt\">Group 16</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 16</span>",
      "<span class=\"eqt\">Group 15</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 15</span>",
      "<span class=\"eqt\">Group 13</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2370;&#2361; 13</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The noble gases (<b>Group 18</b>) are located in the far right of the periodic table and were previously referred to as the \"inert gases\" due to the fact that their filled valence shells (octets) make them extremely nonreactive. </p><p>The noble gases were characterized relatively late compared to other element groups. </p><p>They are all monotomic gases under standard conditions.</p><p>Overall, noble gases have weak interatomic forces, and therefore very low boiling and melting points compared with elements of other groups.</p>",
    "question_index": 26
  },

    "question": "<span class=\"eqt\"><p>Ali Akbar Khan,who was awarded the second highest civilian award in India, Padma Vibhushan, in 1989, was a notable_______ musician.</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2354;&#2368; &#2309;&#2325;&#2348;&#2352; &#2326;&#2366;&#2344; &#2325;&#2379; 1989 &#2350;&#2375;&#2306; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2342;&#2370;&#2360;&#2352;&#2375; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352;, &#2346;&#2342;&#2381;&#2350; &#2357;&#2367;&#2349;&#2370;&#2359;&#2339; &#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;, &#2357;&#2361; &#2319;&#2325; &#2313;&#2354;&#2381;&#2354;&#2375;&#2326;&#2344;&#2368;&#2351; _______ &#2360;&#2306;&#2327;&#2368;&#2340;&#2325;&#2366;&#2352; &#2341;&#2375;&#2404;</p></span>",

      "<span class=\"eqt\">sitar</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2367;&#2340;&#2366;&#2352;</span>",
      "<span class=\"eqt\">sarod</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2379;&#2342;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Ali Akbar Khan was a  Hindustani classical musician of the Maihar gharana, known for his virtuosity in playing the sarod.</p><p>In 1985, he founded another branch of the Ali Akbar College of Music in Basel, Switzerland, which is still run by his disciple Ken Zuckerman, and in 1989, he was awarded the second highest civilian award in India: Padma Vibhushan.</p><p>He is the son of Allauddin Khan, a notable sarod musician himself and guru of Pandit Ravi Shankar.</p><p></p>",

    ],
    "correct_option_id": 3,
    "solution": "<p>The Ghadr Party was a revolutionary group organised around a weekly newspaper The Ghadr with its headquarters at San Francisco and branches along the US coast and in the Far East. These revolutionaries included mainly ex-soldiers and peasants who had migrated from the Punjab to the USA and Canada in search of better employment opportunities.</p><p>The moving spirits behind the Ghadr Party were Lala Hardayal, Ramchandra, Bhagwan Singh, Kartar Singh Saraba, Barkatullah, and Bhai Parmanand.</p>",

    "solution": "<p>In 1991, as an immediate measure to resolve the balance of payments crisis, the rupee was <b>devalued</b> against foreign currencies.</p><p>This led to an increase in the inflow of foreign exchange. It also set the tone to free the determination of rupee value in the foreign exchange market from government control.</p><p>Now, more often than not, markets determine exchange rates based on the demand and supply of foreign exchange.</p>",

    "question": "<span class=\"eqt\"><p>The Hyderabad Liberation Day, marks the integration of Hyderabad state to the Indian Union in the year _____</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2361;&#2376;&#2342;&#2352;&#2366;&#2348;&#2366;&#2342; &#2350;&#2369;&#2325;&#2381;&#2340;&#2367; &#2342;&#2367;&#2357;&#2360;, &#2357;&#2352;&#2381;&#2359; _____ &#2350;&#2375;&#2306; &#2361;&#2376;&#2342;&#2352;&#2366;&#2348;&#2366;&#2342; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2328; &#2350;&#2375;&#2306; &#2319;&#2325;&#2368;&#2325;&#2352;&#2339; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2368;&#2325; &#2361;&#2376;&#2404;</p></span>",
    "options": [

      "<span class=\"eqt\">1945</span><span class=\"hqt\" style=\"display:none\">1945</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>September 17 is commemorated by the Union government as 'Hyderabad Liberation Day' and by the government of Telangana as 'National Integration Day'.</p><p>On September 17, 1948, the Nizam of Hyderabad Mir Osman Ali Khan, the seventh in the line of the Asaf Jahi dynasty, had surrendered in the wake of Operation Polo, the military invasion of Hyderabad by Indian forces.</p>",

    "question": "<span class=\"eqt\"><p>Global Gender Gap report is published by ______________</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2376;&#2358;&#2381;&#2357;&#2367;&#2325; &#2354;&#2376;&#2306;&#2327;&#2367;&#2325; &#2309;&#2344;&#2381;&#2340;&#2352;&#2366;&#2354; &#2352;&#2367;&#2346;&#2379;&#2352;&#2381;&#2335; (Global Gender Gap report)______________ &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">WEF</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2381;&#2357; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2350;&#2306;&#2330; (WEF)</span>",
      "<span class=\"eqt\">WHO</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2381;&#2357; &#2360;&#2381;&#2357;&#2366;&#2360;&#2381;&#2341;&#2381;&#2351; &#2360;&#2306;&#2327;&#2336;&#2344; (WHO)</span>",
      "<span class=\"eqt\">World Bank</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2358;&#2381;&#2357; &#2348;&#2376;&#2306;&#2325; (WB)</span>",
      "<span class=\"eqt\">IMF</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2306;&#2340;&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2350;&#2369;&#2342;&#2381;&#2352;&#2366; &#2325;&#2379;&#2359; (IMF)</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Global Gender Gap report is published by World Economic Forum (WEF) annually to measure gender equality.</p><p>In the World Economic Forum's 2024 Global Gender Gap Report, India slipped two places to rank 129th out of 146 countries, marking a marginal decrease from its 2023 position of 127th.</p><p></p><p>The Global Gender Gap Report is an annual publication that measures gender equality across four key areas:</p><p>1.Economic Participation and Opportunity</p><p>2.Educational Attainment</p><p>3.Health and Survival</p><p>4.Political Empowerment</p><p>The report ranks countries based on their progress toward closing the gender gap and provides insights into global trends in gender equality.</p><p>The World Economic Forum (WEF) is an international organization that focuses on improving the state of the world through public-private cooperation.</p>",
    "question_index": 33
  },

    "question": "<span class=\"eqt\"><p>Who was the only Mughal king to ascend to the throne without the customary war of succession?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2340;&#2381;&#2340;&#2352;&#2366;&#2343;&#2367;&#2325;&#2366;&#2352; &#2325;&#2375; &#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2351;&#2369;&#2342;&#2381;&#2343; &#2325;&#2375; &#2348;&#2367;&#2344;&#2366; &#2360;&#2367;&#2306;&#2361;&#2366;&#2360;&#2344; &#2346;&#2352; &#2346;&#2361;&#2369;&#2306;&#2330;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2319;&#2325;&#2350;&#2366;&#2340;&#2381;&#2352; &#2350;&#2369;&#2327;&#2354; &#2352;&#2366;&#2332;&#2366; &#2325;&#2380;&#2344; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Humayun</span><span class=\"hqt\" style=\"display:none\">&#2361;&#2369;&#2350;&#2366;&#2351;&#2370;&#2306;</span>",
      "<span class=\"eqt\">Jahangir</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2361;&#2366;&#2306;&#2327;&#2368;&#2352;</span>",
      "<span class=\"eqt\">Akbar</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2325;&#2348;&#2352;</span>",
      "<span class=\"eqt\">Shahjahan</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2361;&#2332;&#2361;&#2366;&#2305;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Akbar was only 13 years old at the time of Humayun's death. When his father died, Akbar was at Kalanaur in Punjab and therefore his coronation took place in Kalanaur itself in 1556. Akbar was the only Mughal king to ascend to the throne without the customary war of succession.</p><p>Akbars reign began in 1556, when he was just 13 years old. Under the regency of Bairam Khan, Akbar defeated Hemu at the Second Battle of Panipat and went on to expand the empire beyond the Indian subcontinent. Akbar was known for his innovative administrative policies, religious tolerance, and patronage of arts and culture. His rule is often considered to be the pinnacle of the Mughal dynasty.</p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>Who received Nobel prize in 1936 for his work on X-ray diffraction and dipole moments?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325;&#2381;&#2360;-&#2352;&#2375; &#2357;&#2367;&#2357;&#2352;&#2381;&#2340;&#2344; &#2324;&#2352; &#2342;&#2381;&#2357;&#2367;&#2343;&#2381;&#2352;&#2369;&#2357; &#2310;&#2328;&#2370;&#2352;&#2381;&#2339; &#2346;&#2352; &#2309;&#2346;&#2344;&#2375; &#2325;&#2366;&#2350; &#2325;&#2375; &#2354;&#2367;&#2319; 1936 &#2350;&#2375;&#2306; &#2344;&#2379;&#2348;&#2375;&#2354; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; &#2325;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2310; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">R.S. Mulliken</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2352;.&#2319;&#2360;. &#2350;&#2369;&#2354;&#2381;&#2354;&#2367;&#2325;&#2375;&#2344;</span>",
      "<span class=\"eqt\">Peter Debye</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2335;&#2352; &#2337;&#2375;&#2348;&#2368;</span>",
      "<span class=\"eqt\">Kossel</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2360;&#2354;</span>",
      "<span class=\"eqt\">Lewis</span><span class=\"hqt\" style=\"display:none\">&#2354;&#2375;&#2357;&#2367;&#2360;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Nobel Prize in Chemistry in 1936 was awarded to Peter Debye for his work on X-ray diffraction and dipole moments.</p><p>Peter Debye was a Dutch-American physicist and physical chemist.</p><p>He was recognized for his contributions to the understanding of molecular structures through his studies on X-ray diffraction and dipole moments.</p><p>His work laid the foundation for modern techniques in the analysis of molecular structures and properties.</p><p></p><p></p><p></p><p></p>",
    "question_index": 35
  },

      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"

    "correct_option_id": 1,
    "solution": "<p>The <b>Jain scripture</b> is known by different names like 'Ganipidaga', 'Shrutagyana', 'Siddhantas' and 'Agamas'.</p><p>Written in Prakrit it is a compilation of the tenets of the religion and the various rules and teachings of the 'Tirthankaras' and has forty five sections.</p>",

    "solution": "<p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Kings</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Dynasty</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#183; Ashoka</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#183; Maurya</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#183; Rajendra I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#183; Cholas</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#183; Pulakesin II</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#183; Chalukyas</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#183; Narasimhavarman I</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">&#183; Pallavas</td></tr></table></p><p></p><p>Ashoka was a prominent ruler of the Maurya Dynasty (322-185 BCE), known for his role in spreading Buddhism.</p><p>Rajendra I was a powerful king of the Chola Dynasty (9th-13th century CE), known for his naval expeditions and territorial expansion.</p><p>Pulakesin II was a famous ruler of the Chalukya Dynasty (6th-12th century CE), known for his military campaigns and patronage of art and architecture.</p><p>Narasimhavarman I was a ruler of the Pallava Dynasty (3rd-9th century CE), known for his victory over the Chalukyas and the construction of the Shore Temple at Mahabalipuram.</p>",
    "question_index": 38
  },

    "question": "<span class=\"eqt\"><p>In August 2024, the Ministry of Statistics and Programme Implementation (MoSPI) has made a stride in the realm of data management with the launch of the ___________________ portal.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2327;&#2360;&#2381;&#2340; 2024 &#2350;&#2375;&#2306;, &#2360;&#2366;&#2306;&#2326;&#2381;&#2351;&#2367;&#2325;&#2368; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2351;&#2344; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; (MoSPI) &#2344;&#2375; ___________________ &#2346;&#2379;&#2352;&#2381;&#2335;&#2354; &#2325;&#2375; &#2358;&#2369;&#2349;&#2366;&#2352;&#2306;&#2349; &#2325;&#2375; &#2360;&#2366;&#2341; &#2337;&#2375;&#2335;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2325;&#2375; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2319;&#2325; &#2348;&#2337;&#2364;&#2368; &#2346;&#2381;&#2352;&#2327;&#2340;&#2367; &#2325;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">e-Sankalp</span><span class=\"hqt\" style=\"display:none\">&#2312;-&#2360;&#2306;&#2325;&#2354;&#2381;&#2346;</span>",
      "<span class=\"eqt\">e-Sakhi</span><span class=\"hqt\" style=\"display:none\">&#2312;-&#2360;&#2326;&#2368;</span>",
      "<span class=\"eqt\">e-Sumitra</span><span class=\"hqt\" style=\"display:none\">&#2312;-&#2360;&#2369;&#2350;&#2367;&#2340;&#2381;&#2352;&#2366;</span>",
      "<span class=\"eqt\">e-Sankhyiki</span><span class=\"hqt\" style=\"display:none\">&#2312;-&#2360;&#2366;&#2306;&#2326;&#2381;&#2351;&#2367;&#2325;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The Ministry of Statistics and Programme Implementation (MoSPI) has made a stride in the realm of data management with the launch of the e-Sankhyiki portal.</p><p>This initiative aims to establish a comprehensive data management and sharing system, significantly enhancing the ease of dissemination of official statistics in India.</p><p>The Ministry of Statistics and Programme Implementation (MoSPI) has made a stride in the realm of data management with the launch of the e-Sankhyiki portal.</p><p>This initiative aims to establish a comprehensive data management and sharing system, significantly enhancing the ease of dissemination of official statistics in India.</p><p>The e-Sankhyiki portal is designed with two key modules- the Data Catalogue and Macro Indicators. The Data Catalogue Module offers a detailed listing of the major data assets of the Ministry, providing users with the ability to search and download data effortlessly.</p><p>Meanwhile, the Macro Indicators module provides time series data of macroeconomic indicators of four key products of the Ministry.</p><p>This module is equipped with features for filtering and visualizing data, along with metadata to aid in comprehensive data analysis.</p>",
    "question_index": 39
  },
  {
    "question": "<span class=\"eqt\"><p>Gravitational Force is maximum at ______</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; ______ &#2346;&#2352; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Line of Capricorn</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2325;&#2352; &#2352;&#2375;&#2326;&#2366;</span>",
      "<span class=\"eqt\">The Equator</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2370;&#2350;&#2343;&#2381;&#2351;&#2352;&#2375;&#2326;&#2366;</span>",
      "<span class=\"eqt\">Bermuda Triangle</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2352;&#2350;&#2370;&#2337;&#2366; &#2335;&#2381;&#2352;&#2366;&#2351;&#2306;&#2327;&#2354;</span>",
      "<span class=\"eqt\">The Poles</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2381;&#2352;&#2369;&#2357;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Due to the rotation of the earth, the weight of a body is<b> maximum at the poles</b> and minimum at the equator.</p><p>The Earth is not a perfect sphere; it is slightly flattened at the poles and bulging at the equator due to its rotation. This shape is called an oblate spheroid.</p><p>As a result, the distance from the Earth's center to the surface is shorter at the poles compared to the equator.</p><p>Since gravitational force is inversely proportional to the square of the distance (F&#8733;1/r<sup>2</sup>), the force is stronger at the poles where the distance (r) to the Earth's center is the smallest.</p>",
    "question_index": 40
  },
  {
    "question": "<span class=\"eqt\"><p>Select the correct option about Interferons.</p><p>Statement A:Interferons are natural proteins.</p><p>Statement B: They are produced by the cells of immune system in response to foreign agents such as viruses, tumor cells and parasites and protect non-infected cells from further infection.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2311;&#2306;&#2335;&#2352;&#2347;&#2375;&#2352;&#2377;&#2344; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p><p><b>&#2325;&#2341;&#2344; A :</b> &#2311;&#2306;&#2335;&#2352;&#2347;&#2375;&#2352;&#2377;&#2344; &#2346;&#2381;&#2352;&#2366;&#2325;&#2371;&#2340;&#2367;&#2325; &#2346;&#2381;&#2352;&#2379;&#2335;&#2368;&#2344; &#2361;&#2376;&#2306;&#2404;</p><p><b>&#2325;&#2341;&#2344; B:</b> &#2357;&#2375; &#2357;&#2366;&#2351;&#2352;&#2360;, &#2335;&#2381;&#2351;&#2370;&#2350;&#2352; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2324;&#2352; &#2346;&#2352;&#2332;&#2368;&#2357;&#2367;&#2351;&#2379;&#2306; &#2332;&#2376;&#2360;&#2375; &#2348;&#2366;&#2361;&#2381;&#2351; &#2319;&#2332;&#2375;&#2306;&#2335;&#2379;&#2306; &#2325;&#2368; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2367;&#2352;&#2325;&#2381;&#2359;&#2366; &#2346;&#2381;&#2352;&#2339;&#2366;&#2354;&#2368; &#2325;&#2368; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2327;&#2376;&#2352;-&#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2367;&#2340; &#2325;&#2379;&#2358;&#2367;&#2325;&#2366;&#2323;&#2306; &#2325;&#2379; &#2349;&#2357;&#2367;&#2359;&#2381;&#2351; &#2350;&#2375;&#2306; &#2360;&#2306;&#2325;&#2381;&#2352;&#2350;&#2339; &#2360;&#2375; &#2348;&#2330;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only statement B is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; B &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Only statement A is correct</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; A &#2360;&#2361;&#2368; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both statements A and B are correct</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Both statements A and B are incorrect</span><span class=\"hqt\" style=\"display:none\">A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2341;&#2344; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Interferons are natural proteins produced by the cells of immune system in response to foreign agents such as viruses, tumor cells and parasites and protect non-infected cells from further infection.</p><p>Interferons inhibit the viral replication within host cells, activate natural killer cells and macrophages, increases antigen presentation to lymphocytes, and induce the resistance of host cells to viral infection.</p><p>When the antigen is presented to matching T-cells and B-cells, these cells multiply and remove the foreign substance.</p>",
    "question_index": 41
  },

    "question": "<span class=\"eqt\"><p>Which of the following is NOT correctly matched?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2361;&#2368; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; <b>&#2344;&#2361;&#2368;&#2306; </b>&#2361;&#2376;?</p></span>",

    ],
    "correct_option_id": 1,
    "solution": "<p>Fourth Schedule: Allocation of seats in the Rajya Sabha to the states and the union territories. </p><p>Fifth Schedule: Provisions relating to the administration and control of scheduled areas and scheduled tribes. </p><p>Sixth Schedule: Provisions relating to the administration of tribal areas in the states of Assam, Meghalaya, Tripura and Mizoram. </p><p>Seventh Schedule: Division of powers between the Union and the States in terms of List I (Union List), List II (State List) and List III (Concurrent List).</p><p>Tenth Schedule: Provisions relating to disqualification of the members of Parliament and State Legislatures on the ground of defection. This schedule was added by the 52<sup>nd</sup> Amendment Act of 1985, also known as Anti-defection Law.</p>",

    "question": "<span class=\"eqt\"><p>Tocopherol is the name of ____</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2335;&#2379;&#2325;&#2379;&#2347;&#2375;&#2352;&#2377;&#2354; ____ &#2325;&#2366; &#2344;&#2366;&#2350; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Vitamin A</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; A</span>",
      "<span class=\"eqt\">Vitamin D</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; D</span>",
      "<span class=\"eqt\">Vitamin K</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; K</span>",
      "<span class=\"eqt\">Vitamin E</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2335;&#2366;&#2350;&#2367;&#2344; E</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Tocopherol is the name of <b>Vitamin E.</b></p><p>Vitamin E is a fat-soluble antioxidant that plays a crucial role in protecting cell membranes from oxidative damage.</p><p>It is commonly found in foods like nuts, seeds, vegetable oils, and green leafy vegetables.</p><p></p><p>Further insights:</p><p>Vitamin A chemical name: Retinol, Retinal, and Carotenoids (e.g., beta-carotene).</p><p>Vitamin D chemical Name: Calciferol (includes Vitamin D2 (ergocalciferol) and Vitamin D3 (cholecalciferol)).</p><p>Vitamin K chemical Name: Phylloquinone (Vitamin K1) and Menaquinone (Vitamin K2).</p><p></p><p></p><p></p><p></p><p></p>",
    "question_index": 43
  },

    "question": "<span class=\"eqt\"><p>Which of the following statement regarding alluvial soil is correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2354;&#2379;&#2338;&#2364; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">They occur all along the Indo-Gangetic-Brahmaputra plains.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2360;&#2367;&#2306;&#2343;&#2369;-&#2327;&#2306;&#2327;&#2366;-&#2348;&#2381;&#2352;&#2361;&#2381;&#2350;&#2346;&#2369;&#2340;&#2381;&#2352; &#2325;&#2375; &#2350;&#2376;&#2342;&#2366;&#2344;&#2368; &#2311;&#2354;&#2366;&#2325;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2366;&#2319; &#2332;&#2366;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">They are best suited for agriculture.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2375; &#2325;&#2371;&#2359;&#2367; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2348;&#2360;&#2375; &#2313;&#2346;&#2351;&#2369;&#2325;&#2381;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Bhangar is a type of alluvial soil</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2306;&#2327;&#2352; &#2319;&#2325; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2332;&#2354;&#2379;&#2338;&#2364; &#2350;&#2367;&#2335;&#2381;&#2335;&#2368; &#2361;&#2376;&#2404;</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&bull; Alluvial soil occurs along the Indo-Gangetic-Brahmaputra plains. They also occur in deltas of the Mahanadi, the Godavari, the Krishna and the Cauvery, where they are called deltaic alluvium (coastal alluvium).</p><p>&bull; They are best suited for agriculture. They yield good crop productivity. </p><p>&bull; The Bhangar is the older alluvium along the river beds forming terraces higher than the flood plain. Khadar is also another type of new alluvial soil.</p>",
    "question_index": 44
  },

    "solution": "<p>Some festivals of Tripura: Garia Puja, Kharchi festival, Pilak festival, Asokastami festival, Neermahal festival, Pous Sankranti fair etc. </p><p>Some festivals of Mizoram: Chapchar Kut, Mim Kut, Pawl Kut, Lyuva Khutla, Anthurium festival, Khuado Kut, Hlukhla Kut etc</p><p>Some festivals of Nagaland: Hornbill festival, Luira Phanit festival, Aoleang festival, Sekrenyi festival, Hega festival etc</p><p>Some festivals of Arunachal Pradesh: Solung, Losar, Torgya, Dree, Murung, Mopin, Chalo Loku, Si-donyi, Nyokum, Reh of Idu Mishmis etc</p>",

      "<span class=\"eqt\">A, B and C</span><span class=\"hqt\" style=\"display:none\">A, B &#2324;&#2352; C</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The Constitution does not specify the strength of a high court and leaves it to the discretion of the president. The chief justice is appointed by the President after consultation with the chief justice of India and the governor of the state concerned. The Constitution does not prescribe a minimum age for the appointment of a judge of a high court.</p>",
    "question_index": 46
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following pair is INCORRECT?</p><p></p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2351;&#2369;&#2327;&#2381;&#2350; <b>&#2327;&#2354;&#2340;</b> &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Sodium Carbonate - Used for removing permanent hardness of water</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2344;&#2375;&#2335; - &#2332;&#2354; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2351;&#2368; &#2325;&#2336;&#2379;&#2352;&#2340;&#2366; &#2325;&#2379; &#2342;&#2370;&#2352; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Sodium Bi-carbonate - Used for making baking powder</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2348;&#2366;&#2311;&#2325;&#2366;&#2352;&#2381;&#2348;&#2379;&#2344;&#2375;&#2335; - &#2348;&#2375;&#2325;&#2367;&#2306;&#2327; &#2346;&#2366;&#2313;&#2337;&#2352; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Sodium Hydroxide - Used for making soap and detergent</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2361;&#2366;&#2311;&#2337;&#2381;&#2352;&#2379;&#2325;&#2381;&#2360;&#2366;&#2311;&#2337; - &#2360;&#2366;&#2348;&#2369;&#2344; &#2324;&#2352; &#2337;&#2367;&#2335;&#2352;&#2381;&#2332;&#2375;&#2306;&#2335; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Sodium Chloride - Used for making rayon</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2379;&#2337;&#2367;&#2351;&#2350; &#2325;&#2381;&#2354;&#2379;&#2352;&#2366;&#2311;&#2337; - &#2352;&#2375;&#2351;&#2377;&#2344; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Sodium Chloride or Common Salt (NaCl): Used in cooking food as well as for cooking gas. Used as a preservative in pickles and in curing meat and fish.</p><p></p><p>Sodium Hydroxide (NaOH): Used for making soap and detergent. Used for making artificial textile fibre (rayon)</p><p></p><p>Sodium Carbonate or Washing Soda (Na2CO3.10H2O): Used as cleansing agent. Used for removing permanent hardness of water</p><p></p><p>Baking Soda or Sodium Bicarbonate (NaHCO3): Used as neutralising agent (antacid). Used for making baking powder.</p>",
    "question_index": 47
  },
  {
    "question": "<span class=\"eqt\"><p>Prachi Yadav is associated with which of the following sport?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2366;&#2330;&#2368; &#2351;&#2366;&#2342;&#2357; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2326;&#2375;&#2354; &#2360;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Para archery</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2376;&#2352;&#2366; &#2340;&#2368;&#2352;&#2306;&#2342;&#2366;&#2332;&#2368;</span>",
      "<span class=\"eqt\">Para athletics</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2376;&#2352;&#2366; &#2319;&#2341;&#2354;&#2375;&#2335;&#2367;&#2325;&#2381;&#2360;</span>",
      "<span class=\"eqt\">Para equestrian</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2376;&#2352;&#2366; &#2309;&#2358;&#2381;&#2357;&#2366;&#2352;&#2379;&#2361;&#2368;</span>",
      "<span class=\"eqt\">Para canoe</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2376;&#2352;&#2366; &#2325;&#2376;&#2344;&#2379;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Prachi Yadav is a para canoer.</p><p>Prachi Yadav from Madhya Pradesh's Gwalior is the first Indian to win a para canoe gold in the Asian Para Games.</p><p>She participated in 2020 Tokyo Paralympics. She became the first Paracanoeist to represent India at the Paralympic Games when she competed at Tokyo 2020, finishing eighth in the VL2.</p><p>She was also the first Asian champion in the sport at the Hangzhou 2022 Asian Para Games.</p><p>Before competing in Kayaking and Canoeing, Prachi used to be a champion para-swimmer for India.</p>",
    "question_index": 48
  },
  {
    "question": "<span class=\"eqt\"><p>Quartzite, slate, marble belong to which type of rock? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2381;&#2357;&#2366;&#2352;&#2381;&#2335;&#2332;&#2366;&#2311;&#2335;, &#2360;&#2381;&#2354;&#2375;&#2335;, &#2350;&#2366;&#2352;&#2381;&#2348;&#2354; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2375; &#2330;&#2335;&#2381;&#2335;&#2366;&#2344;&#2379;&#2306; &#2325;&#2368; &#2358;&#2381;&#2352;&#2375;&#2339;&#2368; &#2350;&#2375;&#2306; &#2310;&#2340;&#2375; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Igneous rock</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2327;&#2381;&#2344;&#2375;&#2351; &#2358;&#2376;&#2354;</span>",
      "<span class=\"eqt\">Metamorphic rock</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2366;&#2351;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2358;&#2376;&#2354;</span>",
      "<span class=\"eqt\">Sedimentary rock</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2360;&#2366;&#2342;&#2368;/&#2340;&#2354;&#2331;&#2335;&#2368; &#2358;&#2376;&#2354;</span>",
      "<span class=\"eqt\">None of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2379;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2379;&#2312; &#2344;&#2361;&#2368;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Quartzite, Slate and Marble all are type of Metamorphic Rock.</p><p>These rocks are formed when Pressure of Energy is supplied to Igneous or Sedimentary rocks.</p><p>Slate is formed from Shale.</p><p>Quartzite is formed from silicon.</p><p>Marble is formed from limestone</p>",
    "question_index": 49
  },
  {
    "question": "<span class=\"eqt\"><p>X number of people can complete a work in 15 days but Y number of people (out of X) cannot cooperate with them due to some reason and the work is now completed in 25 days by 6 people. Which of the following is true for the value of (X + Y)?</p></span><span class=\"hqt\" style=\"display:none\"><p>X &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2319;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 15 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2354;&#2375;&#2325;&#2367;&#2344; Y &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; (X &#2350;&#2375;&#2306; &#2360;&#2375;) &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2352;&#2339; &#2360;&#2375; &#2313;&#2344;&#2325;&#2375; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2350;&#2375;&#2306; &#2360;&#2361;&#2351;&#2379;&#2327; &#2344;&#2361;&#2368;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2375; &#2361;&#2376;&#2306; &#2324;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2309;&#2348; 6 &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367;&#2351;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; 25 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; (X + Y) &#2325;&#2375; &#2350;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>",
      "<span class=\"eqt\">14</span><span class=\"hqt\" style=\"display:none\">14</span>",
      "<span class=\"eqt\">15</span><span class=\"hqt\" style=\"display:none\">15</span>",
      "<span class=\"eqt\">16</span><span class=\"hqt\" style=\"display:none\">16</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Using the MDH formula,</p><p>X * 15 = 6 * 25</p><p>X = 150/15</p><p>X = 10</p><p>Initial number of people = 10</p><p>Therefore, the value of Y = 10  -  6 = 4</p><p>Hence the value of (X + Y) = (10 + 4) = 14.</p>",
    "question_index": 50
  },
  {
    "question": "<span class=\"eqt\"><p>The lateral surface areas of the two circular cones are in the ratio of 3: 5. If the ratio between their slant heights is 1: 2 respectively, then find the ratio between their radius respectively.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2357;&#2352;&#2381;&#2340;&#2381;&#2340;&#2369;&#2354; &#2358;&#2306;&#2325;&#2369;&#2323;&#2306; &#2325;&#2375; &#2346;&#2366;&#2352;&#2381;&#2358;&#2381;&#2357; &#2346;&#2371;&#2359;&#2381;&#2336;&#2368;&#2351; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3: 5 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2313;&#2344;&#2325;&#2368; &#2340;&#2367;&#2352;&#2381;&#2351;&#2325; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 1: 2 &#2361;&#2376;, &#2340;&#2379; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2313;&#2344;&#2325;&#2368; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">6: 5</span><span class=\"hqt\" style=\"display:none\">6: 5</span>",
      "<span class=\"eqt\">5: 1</span><span class=\"hqt\" style=\"display:none\">5: 1</span>",
      "<span class=\"eqt\">10: 3</span><span class=\"hqt\" style=\"display:none\">10: 3</span>",
      "<span class=\"eqt\">5: 3</span><span class=\"hqt\" style=\"display:none\">5: 3</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Given,</p><p>(&#960; r x l)/(&#960; x R x L) = 3/5</p><p>(r/R) x (1/2) = (3/5)</p><p>(r/R) = 6/5 = 6 : 5</p>",
    "question_index": 51
  },

    "question": "<span class=\"eqt\"><p>Read the data carefully and answer the following questions:</p><p>Below pie chart shows the percentage distribution of blankets manufactured in five companies:</p><p><img width=576 height=336 id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20860/image006.png\"></p><p>If average number of blankets manufactured in companies P and O together is 160, then what is the difference between the number of blankets manufactured by company T and that of by company U?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2305;&#2325;&#2396;&#2379;&#2306; &#2325;&#2379; &#2343;&#2381;&#2351;&#2366;&#2344; &#2360;&#2375; &#2346;&#2338;&#2364;&#2375;&#2306; &#2324;&#2352; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;&#2379;&#2306; &#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;:</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2357;&#2371;&#2340;&#2368;&#2351; &#2310;&#2352;&#2375;&#2326; &#2346;&#2366;&#2305;&#2330; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2325;&#2306;&#2348;&#2354;&#2379;&#2306; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2340;&#2352;&#2339; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;:</p><p><img width=\"576\" height=\"336\" id=\"Chart 2\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p20860/image006.png\"></p><p>&#2351;&#2342;&#2367; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2306;&#2346;&#2344;&#2367;&#2351;&#2379;&#2306; P &#2324;&#2352; O &#2350;&#2375;&#2306; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2325;&#2306;&#2348;&#2354;&#2379;&#2306; &#2325;&#2368; &#2324;&#2360;&#2340; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 160 &#2361;&#2376;, &#2340;&#2379; &#2325;&#2306;&#2346;&#2344;&#2368; T &#2324;&#2352; &#2325;&#2306;&#2346;&#2344;&#2368; U &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2344;&#2367;&#2352;&#2381;&#2350;&#2367;&#2340; &#2325;&#2306;&#2348;&#2354;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">162</span><span class=\"hqt\" style=\"display:none\">162</span>",
      "<span class=\"eqt\">168</span><span class=\"hqt\" style=\"display:none\">168</span>",
      "<span class=\"eqt\">126</span><span class=\"hqt\" style=\"display:none\">126</span>",
      "<span class=\"eqt\">147</span><span class=\"hqt\" style=\"display:none\">147</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The total number of blankets manufactured in companies P and O together = 160 * 2 = 320</p><p>So, difference between the number of blankets manufactured by company T and that of by company U = 320 * (33  -  12)/(23 + 17) = 168</p>",
    "question_index": 52
  },
  {
    "question": "<span class=\"eqt\"><p>In a right triangle, the length of circumradius is always:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2360;&#2350;&#2325;&#2379;&#2339; &#2340;&#2381;&#2352;&#2367;&#2349;&#2369;&#2332; &#2350;&#2375;&#2306;, &#2346;&#2352;&#2367;&#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2361;&#2350;&#2375;&#2358;&#2366; &#2361;&#2379;&#2340;&#2368; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Equal to the length of the hypotenuse.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2339; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352;&#2404;</span>",
      "<span class=\"eqt\">Half of the length of the hypotenuse.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2339; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2368; &#2310;&#2343;&#2368;&#2404;</span>",
      "<span class=\"eqt\">Twice the length of the hypotenuse.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2339; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2368; &#2342;&#2379;&#2327;&#2369;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">One-third of the length of the hypotenuse.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2352;&#2381;&#2339; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2325;&#2368; &#2319;&#2325; &#2340;&#2367;&#2361;&#2366;&#2312;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>In a right triangle, the length of the circumradius is always equal to half of the length of hypotenuse.</p>",
    "question_index": 53
  },

    "question": "<span class=\"eqt\"><p>An item with a marked price of &#8377;4200 was sold for &#8377;3800 after a discount of y% was offered. What was the value of y? (Rounded off to one decimal place)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#8377;4200 &#2325;&#2375; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2357;&#2366;&#2354;&#2368; &#2319;&#2325; &#2357;&#2360;&#2381;&#2340;&#2369; &#2325;&#2379; y% &#2325;&#2368; &#2331;&#2370;&#2335; &#2325;&#2375; &#2348;&#2366;&#2342; &#8377;3800 &#2350;&#2375;&#2306; &#2348;&#2375;&#2330;&#2366; &#2327;&#2351;&#2366;&#2404; y &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;? (&#2342;&#2358;&#2350;&#2354;&#2357; &#2325;&#2375; &#2319;&#2325; &#2309;&#2306;&#2325; &#2340;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;&#2367;&#2340;)</p></span>",
    "options": [
      "<span class=\"eqt\">9.5</span><span class=\"hqt\" style=\"display:none\">9.5</span>",
      "<span class=\"eqt\">9.2</span><span class=\"hqt\" style=\"display:none\">9.2</span>",
      "<span class=\"eqt\">9.7</span><span class=\"hqt\" style=\"display:none\">9.7</span>",
      "<span class=\"eqt\">9.1</span><span class=\"hqt\" style=\"display:none\">9.1</span>"

    "correct_option_id": 0,
