    "question": "<span class=\"eqt\"><p>The hour hand moves through 6 hours and has a length of 12 cm. Find the area (in sq. cm, rounded off to one decimal place) of the sector covered by the hour hand.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2360;&#2369;&#2312; 6 &#2328;&#2306;&#2335;&#2375; &#2330;&#2354;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2311;&#2360;&#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; 12 cm &#2361;&#2376;&#2404; &#2328;&#2306;&#2335;&#2375; &#2325;&#2368; &#2360;&#2370;&#2312; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2340;&#2351; &#2325;&#2367;&#2319; &#2327;&#2319; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2326;&#2306;&#2337; &#2325;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2347;&#2354; (sq. cm &#2350;&#2375;&#2306;, &#2319;&#2325; &#2342;&#2358;&#2350;&#2354;&#2357; &#2360;&#2381;&#2341;&#2366;&#2344; &#2340;&#2325; &#2346;&#2370;&#2352;&#2381;&#2339;&#2366;&#2306;&#2325;&#2367;&#2340;) &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">226.3</span><span class=\"hqt\" style=\"display:none\">226.3</span>",
      "<span class=\"eqt\">221.5</span><span class=\"hqt\" style=\"display:none\">221.5</span>",
      "<span class=\"eqt\">229.1</span><span class=\"hqt\" style=\"display:none\">229.1</span>",
      "<span class=\"eqt\">232.6</span><span class=\"hqt\" style=\"display:none\">232.6</span>"

    "correct_option_id": 0,
    "solution": "<p>We know that one hour of time rotates hour hand by 30&deg;.</p><p>Area covered by the sector = (30* 6/360) * &#960; * (length of hour hand)<sup>2</sup></p><p>= (1/2) * (22/7) * 144</p><p>= 1584/7</p><p>= 226.3 sq. cm</p>",

    "question": "<span class=\"eqt\"><p>If x = 5  -  y, y = x  -  3 and x<sup>4</sup>  -  255 = y<sup>4</sup>, then the value of x<sup>2</sup> + y<sup>2</sup> is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; x = 5 - y, y = x - 3 &#2324;&#2352; x<sup>4</sup> - 255 = y<sup>4</sup>, &#2340;&#2379; x<sup>2</sup> + y<sup>2</sup> &#2325;&#2366; &#2350;&#2366;&#2344; &#2361;&#2376;:</p></span>",

    "question": "<span class=\"eqt\"><p>In &#916; ABC, AB = 7 cm, BC = 13 cm, and CA = X cm. Which of the following option is correct for the value of X?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#916; ABC &#2350;&#2375;&#2306;, AB = 7 &#2360;&#2375;&#2350;&#2368;, BC = 13 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; CA = X &#2360;&#2375;&#2350;&#2368; &#2361;&#2376;, &#2340;&#2379; X &#2325;&#2375; &#2350;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2360;&#2361;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">6 &lt; X &le; 20</span><span class=\"hqt\" style=\"display:none\">6 &lt; X &le; 20</span>",

      "<span class=\"eqt\">6 &le; X &le; 20</span><span class=\"hqt\" style=\"display:none\">6 &le; X &le; 20</span>",
      "<span class=\"eqt\">6 &lt; X &lt; 20</span><span class=\"hqt\" style=\"display:none\">6 &lt; X &lt; 20</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>We know that third side of the triangle is always greater than the difference between the other two sides and less than the sum of length of other two sides.</p><p>Therefore, X will always greater than 13  -  7 = 6 cm</p><p>And X will always less than 13 + 7 = 20 cm</p><p>So, 6 &lt; X &lt; 20.</p>",

    "question": "<span class=\"eqt\"><p>A toy is marked for Rs. 3200. A customer pays Rs. 1904. If the customer got a series of two discounts and the rate of the first discount is 15%, then the rate of the second discount is:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2326;&#2367;&#2354;&#2380;&#2344;&#2375; &#2325;&#2366; &#2350;&#2370;&#2354;&#2381;&#2351; 3200 &#2352;&#2369;&#2346;&#2351;&#2375; &#2361;&#2376;&#2404; &#2319;&#2325; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325; 1904 &#2352;&#2369;&#2346;&#2351;&#2375; &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325; &#2325;&#2379; &#2342;&#2379; &#2331;&#2370;&#2335; &#2325;&#2368; &#2358;&#2381;&#2352;&#2371;&#2306;&#2326;&#2354;&#2366; &#2350;&#2367;&#2354;&#2340;&#2368; &#2361;&#2376; &#2324;&#2352; &#2346;&#2361;&#2354;&#2368; &#2331;&#2370;&#2335; &#2325;&#2368; &#2342;&#2352; 15% &#2361;&#2376;, &#2340;&#2379; &#2342;&#2370;&#2360;&#2352;&#2368; &#2331;&#2370;&#2335; &#2325;&#2368; &#2342;&#2352; &#2361;&#2376;:</p></span>",

    "solution": "<p>S.P = C.P * (100  -  Discount)/100</p><p>1904 = 3200 * (100  -  Discount)/100</p><p>100  -  Discount = 59.5</p><p>Discount = 40.5</p><p>Effective discount = X + Y  -  (X * Y)/100</p><p>40.5 = 15 + Y  -  (15 * Y)/100</p><p>0.85Y = 25.5</p><p>Y = 30%</p><p><b>Express Method </b></p><p>SP = MP x (100 - 15)/100 x (100 - second discount)/100</p><p>1904 = 3200 x (85/100) x (100 - second discount)/100</p><p>112 = 32 x 5 x (100 - second discount)/100</p><p>70 = 100 - second discount</p><p>Second discount = 30%</p>",
