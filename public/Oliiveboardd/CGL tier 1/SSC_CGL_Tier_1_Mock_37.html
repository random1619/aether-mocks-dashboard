<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cgl1 - Responsive Exam Interface</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../css/mock-main.css">
    
    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Timer Config -->
    <meta name="exam-duration" content="60">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><p>How many alphabet positions will change if the letters in the word 'SUSPECT' are arranged in alphabetical order from left to right?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2358;&#2348;&#2381;&#2342; 'SUSPECT' &#2325;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2379; &#2348;&#2366;&#2319;&#2306; &#2360;&#2375; &#2342;&#2366;&#2319;&#2306; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319; &#2340;&#2379; &#2325;&#2367;&#2340;&#2344;&#2375; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2348;&#2342;&#2354; &#2332;&#2366;&#2319;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">Six</span><span class=\"hqt\" style=\"display:none\">&#2331;&#2361;</span>",
      "<span class=\"eqt\">Seven</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2340;</span>",
      "<span class=\"eqt\">One</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;</span>",
      "<span class=\"eqt\">Two</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The given word is SUSPECT.</p><p>If all letters are arranged in alphabetical order from left to right, then we get:</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Original letters</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">U</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Alphabetical order</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">E</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">P</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">S</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">T</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">U</td></tr></table><p>So, the position of 7 letters will be changed.</p>",
    "question_index": 0
  },
  {
    "question": "<span class=\"eqt\"><p>If each vowel in the word 'VOLUNTARY' is changed to the fourth following letter in the English alphabetical order and each consonant is changed to the fourth preceding letter in the English alphabetical order. How many letters are there in the English alphabetical order between the letter which is the fourth from the left end and the first from the right end in the group of letters thus formed? </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; &#2358;&#2348;&#2381;&#2342; 'VOLUNTARY' &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2360;&#2381;&#2357;&#2352; &#2325;&#2379; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2330;&#2380;&#2341;&#2375; &#2309;&#2327;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2375;&#2325; &#2357;&#2381;&#2351;&#2306;&#2332;&#2344; &#2325;&#2379; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2330;&#2380;&#2341;&#2375; &#2346;&#2367;&#2331;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2360;&#2375; &#2348;&#2342;&#2354; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2348;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352;&#2379;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2348;&#2366;&#2319;&#2306; &#2331;&#2379;&#2352; &#2360;&#2375; &#2330;&#2380;&#2341;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2324;&#2352; &#2342;&#2366;&#2319;&#2306; &#2331;&#2379;&#2352; &#2360;&#2375; &#2346;&#2361;&#2354;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2325;&#2375; &#2348;&#2368;&#2330; &#2309;&#2306;&#2327;&#2381;&#2352;&#2375;&#2332;&#2368; &#2357;&#2352;&#2381;&#2339;&#2350;&#2366;&#2354;&#2366; &#2325;&#2381;&#2352;&#2350; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2325;&#2381;&#2359;&#2352; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">Four</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2366;&#2352;</span>",
      "<span class=\"eqt\">One</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2325;</span>",
      "<span class=\"eqt\">Three</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2344;</span>",
      "<span class=\"eqt\">Five</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2305;&#2330;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The word is VOLUNTARY. </p><p>If each vowel in the word 'VOLUNTARY' is changed to the fourth following letter in the English alphabetical order and each consonant is changed to the fourth preceding letter in the English alphabetical order: </p><p>V  -  4 = R</p><p>O + 4 = S</p><p>L  -  4 = H</p><p>U + 4 = Y</p><p>N  -  4 = J</p><p>T  -  4 = P</p><p>A + 4 = E</p><p>R  -  4 = N</p><p>Y  -  4 = U</p><p>Then we get: RSHYJPENU</p><p>The fourth letter from left end is Y.</p><p>The first letter from right end is U.</p><p>So, letters between Y and U are V, W, X. So, there are total 3 letters. </p>",
    "question_index": 1
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following will be the mirror image of the given question figure, if a mirror is placed along the line MN.</p><p></p><p><img width=155 height=155 id=\"Picture 23\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3137/image021.jpg\"></p><p>a)</p><p><img width=140 height=123 id=\"Picture 24\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3137/image022.jpg\"></p><p>b)</p><p><img width=136 height=117 id=\"Picture 25\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3137/image023.jpg\"></p><p>c)</p><p><img width=133 height=116 id=\"Picture 26\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3137/image024.jpg\"></p><p>d)</p><p><img width=130 height=115 id=\"Picture 27\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3137/image025.jpg\"></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; MN &#2352;&#2375;&#2326;&#2366; &#2346;&#2352; &#2342;&#2352;&#2381;&#2346;&#2339; &#2325;&#2379; &#2352;&#2326;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2342;&#2367;&#2319; &#2327;&#2351;&#2375; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344;-&#2310;&#2325;&#2371;&#2340;&#2367; &#2325;&#2368; &#2342;&#2352;&#2381;&#2346;&#2339; &#2346;&#2381;&#2352;&#2340;&#2367;&#2348;&#2367;&#2350;&#2381;&#2348; &#2361;&#2379;&#2327;&#2368;|</p><p><img width=\"155\" height=\"155\" id=\"Picture 23\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3137/image021.jpg\"></p><p>a)</p><p><img width=\"140\" height=\"123\" id=\"Picture 24\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3137/image022.jpg\"></p><p>b)</p><p><img width=\"136\" height=\"117\" id=\"Picture 25\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3137/image023.jpg\"></p><p>c)</p><p><img width=\"133\" height=\"116\" id=\"Picture 26\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3137/image024.jpg\"></p><p>d)</p><p><img width=\"130\" height=\"115\" id=\"Picture 27\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p3137/image025.jpg\"></p></span>",
    "options": [
      "<span class=\"eqt\">A</span><span class=\"hqt\" style=\"display:none\">A</span>",
      "<span class=\"eqt\">B</span><span class=\"hqt\" style=\"display:none\">B</span>",
      "<span class=\"eqt\">C</span><span class=\"hqt\" style=\"display:none\">C</span>",
      "<span class=\"eqt\">D</span><span class=\"hqt\" style=\"display:none\">D</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The figure given in option b is the correct mirror image</p>",
    "question_index": 2
  },
  {
    "question": "<span class=\"eqt\"><p>In a certain language, 'AE PJ RE' means 'go to school'; 'RE HI WO' means 'school is good'; and, 'TP RE HI AE WO' means 'good school is nearby to'. How is 'go' coded in that language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2325;&#2379;&#2337; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, 'AE PJ RE' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'go to school' &#2361;&#2376;; 'RE HI WO' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'school is good' &#2361;&#2376;; &#2324;&#2352; 'TP RE HI AE WO' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'good school is nearby to' &#2361;&#2376;, &#2340;&#2379; &#2313;&#2360; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; 'go' &#2325;&#2379; &#2325;&#2376;&#2360;&#2375; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Cannot be determined</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2344;&#2361;&#2368;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366; &#2360;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">AE</span><span class=\"hqt\" style=\"display:none\">AE</span>",
      "<span class=\"eqt\">PJ</span><span class=\"hqt\" style=\"display:none\">PJ</span>",
      "<span class=\"eqt\">RE</span><span class=\"hqt\" style=\"display:none\">RE</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>'AE PJ RE' means 'go to school' ....... (i)</p><p>'RE HI WO' means 'school is good' ....... (ii)</p><p>'TP RE HI AE WO' means 'good school is nearby to' ....... (iii)</p><p>From (i) and (ii) we get,</p><p>School  -  RE</p><p>From (ii) and (iii) we get,</p><p>Good/is  -  HI/WO</p><p>From (i) and (iii) we get,</p><p>To  -  AE</p><p>Go  -  PJ</p>",
    "question_index": 3
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following order of numbers will make the equation below correct?</p><p>81 &div; 4 x 9 + 8  -  54 = 97</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2381;&#2352;&#2350; &#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2325;&#2379; &#2360;&#2361;&#2368; &#2325;&#2352;&#2375;&#2327;&#2366;?</p><p>81 &div; 4 x 9 + 8 - 54 = 97</p></span>",
    "options": [
      "<span class=\"eqt\">81 &div; 9 x 4 + 8  -  54</span><span class=\"hqt\" style=\"display:none\">81 &div; 9 x 4 + 8 - 54</span>",
      "<span class=\"eqt\">8 &div; 4 x 81 + 54  -  9</span><span class=\"hqt\" style=\"display:none\">8 &div; 4 x 81 + 54 - 9</span>",
      "<span class=\"eqt\">54 &div; 9 x 4 + 81  -  8</span><span class=\"hqt\" style=\"display:none\">54 &div; 9 x 4 + 81 - 8</span>",
      "<span class=\"eqt\">81 &div; 9 x 4 + 54  -  8</span><span class=\"hqt\" style=\"display:none\">81 &div; 9 x 4 + 54 - 8</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Checking the interchanges by each option:</p><p>LHS = 81 &div; 9 x 4 + 8  -  54 = 9 x 4 + 8  -  54 = 36 + 8  -  54 =  - 10</p><p>So, (a) is not correct.</p><p>LHS = 8 &div; 4 x 81 + 54  -  9 = 2 x 81 + 54  -  9 = 162 + 54  -  9 = 207</p><p>So, (b) is not correct.</p><p>LHS = 54 &div; 9 x 4 + 81  -  8 = 6 x 4 + 81  -  8 = 24 + 81  -  8 = 97</p><p>So, (c) is correct.</p><p>LHS = 81 &div; 9 x 4 + 54  -  8 = 9 x 4 + 54  -  8 = 36 + 54  -  8 = 82</p><p>So, (d) is not correct.</p>",
    "question_index": 4
  },
  {
    "question": "<span class=\"eqt\"><p>If ASK=30 and BUT=61 then what will be the value of CAR?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2351;&#2342;&#2367; ASK=30 &#2324;&#2352; BUT=61 &#2361;&#2376;, &#2340;&#2379; CAR &#2325;&#2366; &#2350;&#2366;&#2344; &#2325;&#2381;&#2351;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">46</span><span class=\"hqt\" style=\"display:none\">46</span>",
      "<span class=\"eqt\">63</span><span class=\"hqt\" style=\"display:none\">63</span>",
      "<span class=\"eqt\">54</span><span class=\"hqt\" style=\"display:none\">54</span>",
      "<span class=\"eqt\">55</span><span class=\"hqt\" style=\"display:none\">55</span>"

    "solution": "<p>The position values of the alphabets are taken, where A=1, B=2...Z=26</p><p>A(1) x K(11)+ S(19)= 30</p><p>B(2) x T(20)+ U21= 61</p><p>C(3) x R(18)+A(1)= 55</p>",

    "question": "<span class=\"eqt\"><p>'P ! Q' means 'P is the husband of Q'</p><p>'P ~ Q' means 'P is the sister of Q'</p><p>'P &lt; Q' means 'P is the daughter-in-law of Q'</p><p>'P &gt; Q' means 'P is the mother of Q'</p><p>As per which of the following expressions 'A is the brother's wife of E'?</p></span><span class=\"hqt\" style=\"display:none\"><p>'P ! Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'P, Q &#2325;&#2366; &#2346;&#2340;&#2367;' &#2361;&#2376;&#2404;</p><p>'P ~ Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'P, Q &#2325;&#2368; &#2348;&#2361;&#2344;' &#2361;&#2376;&#2404;</p><p>'P &lt; Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'P, Q &#2325;&#2368; &#2348;&#2361;&#2370;' &#2361;&#2376;&#2404;</p><p>'P &gt; Q' &#2325;&#2366; &#2309;&#2352;&#2381;&#2341; 'P, Q &#2325;&#2368; &#2350;&#2366;&#2340;&#2366;' &#2361;&#2376;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360; &#2309;&#2349;&#2367;&#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2325;&#2375; &#2309;&#2344;&#2369;&#2360;&#2366;&#2352; 'A, E &#2325;&#2375; &#2349;&#2366;&#2312; &#2325;&#2368; &#2346;&#2340;&#2381;&#2344;&#2368; &#2361;&#2376;'?</p></span>",
    "options": [
      "<span class=\"eqt\">A ~ D &lt; C ! E</span><span class=\"hqt\" style=\"display:none\">A ~ D &lt; C ! E</span>",
      "<span class=\"eqt\">E ! B ~ D &lt; A</span><span class=\"hqt\" style=\"display:none\">E ! B ~ D &lt; A</span>",
      "<span class=\"eqt\">A ! D &lt; C ~ E</span><span class=\"hqt\" style=\"display:none\">A ! D &lt; C ~ E</span>",
      "<span class=\"eqt\">D ! A &lt; B &gt; E</span><span class=\"hqt\" style=\"display:none\">D ! A &lt; B &gt; E</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Option (a): A ~ D &lt; C ! E</p><p>A ~ D means 'A is the sister of D'</p><p>D &lt; C means 'D is the daughter-in-law of C'</p><p>C ! E means 'C is the husband of E'</p><p><img width=342 height=110 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25407/image019.png\"></p><p>A is E's daughter-in-law's sister.</p><p>Option (b): E ! B ~ D &lt; A</p><p>E ! B means 'E is the husband of B'</p><p>B ~ D means 'B is the sister of D'</p><p>D &lt; A means 'D is the daughter-in-law of A'</p><p><img width=342 height=90 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25407/image020.png\"></p><p>E is the brother-in-law of A's daughter-in-law.</p><p>Option (c): A ! D &lt; C ~ E</p><p>A ! D means 'A is the husband of D'</p><p>D &lt; C means 'D is the daughter-in-law of C'</p><p>C ~ E means 'C is the sister of E'</p><p><img width=230 height=100 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25407/image021.png\"></p><p>A is the nephew of E.</p><p>Option (d): D ! A &lt; B &gt; E</p><p>D ! A means 'D is the husband of A'</p><p>A &lt; B means 'A is the daughter-in-law of B'</p><p>B &gt; E means 'B is the mother of E'</p><p><img width=227 height=108 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p25407/image022.png\"></p><p>A is the brother's wife of E.</p><p>Thus, the answer is option (d).</p>",
    "question_index": 15
  },

    "question": "<span class=\"eqt\"><p>In 2024, Ravichandran Ashwin became the second Indian to take _____wickets in Test history.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2357;&#2367;&#2330;&#2306;&#2342;&#2381;&#2352;&#2344; &#2309;&#2358;&#2381;&#2357;&#2367;&#2344; &#2335;&#2375;&#2360;&#2381;&#2335; &#2311;&#2340;&#2367;&#2361;&#2366;&#2360; &#2350;&#2375;&#2306; _____&#2357;&#2367;&#2325;&#2375;&#2335; &#2354;&#2375;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2342;&#2370;&#2360;&#2352;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2348;&#2344; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">300</span><span class=\"hqt\" style=\"display:none\">300</span>",
      "<span class=\"eqt\">400</span><span class=\"hqt\" style=\"display:none\">400</span>",
      "<span class=\"eqt\">500</span><span class=\"hqt\" style=\"display:none\">500</span>",
      "<span class=\"eqt\">600</span><span class=\"hqt\" style=\"display:none\">600</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Indian off-spinner Ravichandran Ashwin claimed his 500th Test wicket in the first innings of the third Test match against England at the Niranjan Shah Stadium in Rajkot.</p><p>The 37-year-old achieved this monumental feat in his 98th Test Match. Ashwin dismissed Zak Crawley in the second day to join Anil Kumble as the second Indian to take 500 wickets in Test history.</p><p>Ashwin is the ninth bowler in Test history to reach 500 wickets and Muttiah Muralitharan, Shane Warne, Anil Kumble, and Nathan Lyon are the only spinners who have taken more wickets than him in Test history. Ashwin joins fellow spinners Muttiah Muralitharan (Sri Lanka - 800), the late Shane Warne (Australia - 708), Kumble and Nathan Lyon (Australia - 517) in the club.</p>",
    "question_index": 25
  },
  {
    "question": "<span class=\"eqt\"><p>In electrochemistry, what type of reactions are used to generate electricity?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2357;&#2376;&#2342;&#2381;&#2351;&#2369;&#2340; &#2352;&#2360;&#2366;&#2351;&#2344;/&#2311;&#2354;&#2375;&#2325;&#2381;&#2335;&#2381;&#2352;&#2379;&#2325;&#2376;&#2350;&#2367;&#2360;&#2381;&#2335;&#2381;&#2352;&#2368; &#2350;&#2375;&#2306;, &#2357;&#2367;&#2342;&#2381;&#2351;&#2369;&#2340; &#2313;&#2340;&#2381;&#2346;&#2344;&#2381;&#2344; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2368; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Combination reaction</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2351;&#2379;&#2332;&#2344; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Displacement reaction</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2360;&#2381;&#2341;&#2366;&#2346;&#2344; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Precipitation reaction</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2357;&#2325;&#2381;&#2359;&#2375;&#2346;&#2339; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</span>",
      "<span class=\"eqt\">Redox reaction</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2330;&#2351;&#2379;&#2346;&#2330;&#2351;/&#2352;&#2375;&#2337;&#2377;&#2325;&#2381;&#2360; &#2309;&#2349;&#2367;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>&#183; Electrochemistry is the study of electricity and how it relates to chemical reactions.</p><p>&#183; In electrochemistry, electricity can be generated by movements of electrons from one element to another in a reaction known as <b>redox or oxidation-reduction reaction.</b></p><p>&#183; In these reactions, the oxidation number of a molecule, atom, or ion change by gaining or losing an electron.</p><p>&#183; Redox reactions are common and vital to some of the basic functions of life, including photosynthesis, respiration, combustion, and corrosion or rusting.</p><p>Redox (reduction-oxidation) reactions involve the transfer of electrons between chemical species.</p><p>How They Generate Electricity:</p><p>- In galvanic/voltaic cells, spontaneous redox reactions (e.g., Zn &#8594; Zn&#8314; + 2e&#8315; and Cu&#8314; + 2e&#8315; &#8594; Cu) produce electric current.</p><p>- In electrolytic cells, external electricity drives non-spontaneous redox reactions.</p><p>Examples: Batteries (like Li-ion), fuel cells, and corrosion processes.</p><p></p><p>Why Not Other Options?</p><p>(a) Combination: Merging reactants (A + B &#8594; AB) without electron transfer.</p><p>(b) Displacement: One element replaces another (e.g., Fe + CuSO&#8324; &#8594; FeSO&#8324; + Cu), but electricity generation requires redox.</p><p>(c) Precipitation: Formation of solids (e.g., Ag&#8314; + Cl&#8315; &#8594; AgCl&#8595;), no electron flow.</p>",
    "question_index": 26
  },
  {
    "question": "<span class=\"eqt\"><p>In January 2024, Who among the following has been honored with Assam's highest civilian award 'Assam Baibhav'?</p><p></p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2357;&#2352;&#2368; 2024 &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; &#2309;&#2360;&#2350; &#2325;&#2375; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352; '&#2309;&#2360;&#2350; &#2357;&#2376;&#2349;&#2357;' &#2360;&#2375; &#2360;&#2350;&#2381;&#2350;&#2366;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Nadiram Deuri</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2342;&#2368;&#2352;&#2366;&#2350; &#2342;&#2375;&#2313;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Parvati Barua</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2366;&#2352;&#2381;&#2357;&#2340;&#2368; &#2348;&#2352;&#2369;&#2310;</span>",
      "<span class=\"eqt\">Debojit Changami</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2375;&#2348;&#2379;&#2332;&#2368;&#2340; &#2330;&#2306;&#2327;&#2366;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Ranjan Gogoi</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2306;&#2332;&#2344; &#2327;&#2379;&#2327;&#2379;&#2312;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Former Chief Justice of India (CJI) Ranjan Gogoi was honored with Assam's highest civilian award 'Assam Baibhav'.</p><p>Ranjan Gogoi was the 46th CJI of India and the first judge from the Northeast to hold the post. During his tenure, the Supreme Court had given a historic verdict on the decade old Ram Janmabhoomi-Babri Masjid case. It is one of the highest civilian awards given by the state of Assam. As an award, Gogoi will be given a citation, certificate, medal and a cash prize of Rs 5 lakh. While athlete Hima Das will be awarded the Assam Saurav Samman.</p>",
    "question_index": 27
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following suggests that any increase in government borrowing will be offset by additional private saving?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2351;&#2361; &#2360;&#2369;&#2333;&#2366;&#2357; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376; &#2325;&#2367; &#2360;&#2352;&#2325;&#2366;&#2352;&#2368; &#2313;&#2343;&#2366;&#2352;&#2368; &#2350;&#2375;&#2306; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2325;&#2368; &#2349;&#2352;&#2346;&#2366;&#2312; &#2309;&#2340;&#2367;&#2352;&#2367;&#2325;&#2381;&#2340; &#2344;&#2367;&#2332;&#2368; &#2348;&#2330;&#2340; &#2360;&#2375; &#2325;&#2368; &#2332;&#2366;&#2319;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Ricardian equivalence</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2367;&#2325;&#2366;&#2352;&#2381;&#2337;&#2367;&#2351;&#2344; &#2340;&#2369;&#2354;&#2381;&#2351;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Automatic stabiliser effect</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2357;&#2330;&#2366;&#2354;&#2367;&#2340; &#2360;&#2381;&#2335;&#2375;&#2348;&#2354;&#2366;&#2311;&#2332;&#2352; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357;</span>",
      "<span class=\"eqt\">Discretionary fiscal policy</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2357;&#2375;&#2325;&#2366;&#2343;&#2368;&#2344; &#2352;&#2366;&#2332;&#2325;&#2379;&#2359;&#2368;&#2351; &#2344;&#2368;&#2340;&#2367;</span>",
      "<span class=\"eqt\">Public conscious spending</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2352;&#2381;&#2357;&#2332;&#2366;&#2344;&#2367;&#2325; &#2332;&#2366;&#2327;&#2352;&#2370;&#2325; &#2357;&#2381;&#2351;&#2351;/&#2346;&#2348;&#2381;&#2354;&#2367;&#2325; &#2325;&#2377;&#2344;&#2381;&#2358;&#2367;&#2351;&#2360; &#2360;&#2381;&#2346;&#2375;&#2306;&#2337;&#2367;&#2306;&#2327;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Ricardian equivalence is an economic theory proposed by David Ricardo and later refined by Robert Barro. It suggests that when a government increases borrowing (deficit spending) to fund current expenditures, rational households anticipate future tax hikes to repay the debt.</p><p>As a result, they increase private savings to offset future tax burdens, leaving aggregate demand unchanged.</p><p>Key Implications:</p><p>- Government borrowing does not stimulate the economy in the long run, as private savings adjust to neutralize the effect.</p><p>- Challenges Keynesian fiscal policy effectiveness.</p><p></p><p>Why Not Other Options?</p><p>(b) Automatic stabilizer effect: Refers to built-in policies (e.g., unemployment benefits) that stabilize the economy without legislative action.</p><p>(c) Discretionary fiscal policy: Deliberate government spending/tax changes to influence the economy (e.g., stimulus packages).</p><p>(d) Public conscious spending: Not a formal economic theory.</p>",
    "question_index": 28
  },
  {
    "question": "<span class=\"eqt\"><p>____________ is a condition where household income is below a necessary level to maintain basic living standards.</p></span><span class=\"hqt\" style=\"display:none\"><p>__________ &#2319;&#2325; &#2320;&#2360;&#2368; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2361;&#2376; &#2332;&#2361;&#2366;&#2305; &#2348;&#2369;&#2344;&#2367;&#2351;&#2366;&#2342;&#2368; &#2332;&#2368;&#2357;&#2344; &#2360;&#2381;&#2340;&#2352; &#2325;&#2379; &#2348;&#2344;&#2366;&#2319; &#2352;&#2326;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2328;&#2352;&#2375;&#2354;&#2370; (&#2346;&#2366;&#2352;&#2367;&#2357;&#2366;&#2352;&#2367;&#2325;) &#2310;&#2351; &#2319;&#2325; &#2310;&#2357;&#2358;&#2381;&#2351;&#2325; &#2360;&#2381;&#2340;&#2352; &#2360;&#2375; &#2344;&#2368;&#2330;&#2375; &#2352;&#2361;&#2340;&#2368; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Absolute Poverty</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2352;&#2346;&#2375;&#2325;&#2381;&#2359; &#2344;&#2367;&#2352;&#2381;&#2343;&#2344;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Relative Poverty</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2366;&#2346;&#2375;&#2325;&#2381;&#2359; &#2344;&#2367;&#2352;&#2381;&#2343;&#2344;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Situational Poverty</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2381;&#2341;&#2367;&#2340;&#2367;&#2332;&#2344;&#2381;&#2351; &#2344;&#2367;&#2352;&#2381;&#2343;&#2344;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Generational Poverty</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2368;&#2338;&#2364;&#2368;&#2327;&#2340; (&#2332;&#2344;&#2352;&#2375;&#2358;&#2381;&#2344;&#2354;) &#2344;&#2367;&#2352;&#2381;&#2343;&#2344;&#2340;&#2366;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&#183; <b>Absolute poverty  -  is a condition where household income is below a necessary level to maintain basic living standards (food, shelter, housing). This condition makes it possible to compare between different countries and also over time</b>.</p><p>&#183; Relative poverty  -  A condition where household income is a certain percentage below median income. For example, the threshold for relative poverty could be set at 50% of median incomes (or 60%).</p>",
    "question_index": 29
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements.</p><p></p><p>I. The periodic rise and fall of sea level due to gravitational force of sun and moon is called as tide.</p><p></p><p>II. Movement of water caused by the wind and atmospheric pressure are called as surges.</p><p></p><p>Which among the above statements is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>I. &#2360;&#2370;&#2352;&#2381;&#2351; &#2324;&#2352; &#2330;&#2306;&#2342;&#2381;&#2352;&#2350;&#2366; &#2325;&#2375; &#2327;&#2369;&#2352;&#2369;&#2340;&#2381;&#2357;&#2366;&#2325;&#2352;&#2381;&#2359;&#2339; &#2348;&#2354; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2360;&#2350;&#2369;&#2342;&#2381;&#2352; &#2325;&#2375; &#2360;&#2381;&#2340;&#2352; &#2350;&#2375;&#2306; &#2310;&#2357;&#2343;&#2367;&#2325; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367; &#2324;&#2352; &#2327;&#2367;&#2352;&#2366;&#2357;&#2335; &#2325;&#2379; &#2332;&#2381;&#2357;&#2366;&#2352; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. &#2357;&#2366;&#2351;&#2369; &#2324;&#2352; &#2357;&#2366;&#2351;&#2369;&#2350;&#2306;&#2337;&#2354;&#2368;&#2351; &#2342;&#2366;&#2348; &#2325;&#2375; &#2325;&#2366;&#2352;&#2339; &#2346;&#2366;&#2344;&#2368; &#2325;&#2368; &#2327;&#2340;&#2367; &#2325;&#2379; &#2346;&#2381;&#2352;&#2379;&#2340;&#2381;&#2325;&#2352;&#2381;&#2359; &#2325;&#2361;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Statement I is correct: The periodical rise and fall of the sea level, once or twice a day, mainly due to the attraction of the sun and the moon, is called a tide.</p><p></p><p>The moon's gravitational pull to a great extent and to a lesser extent the sun's gravitational pull, are the major causes for the occurrence of tides. Another factor is centrifugal force, which is the force that acts to counterbalance the gravity.</p><p></p><p>Statement II is correct: Movement of water caused by meteorological effects such as winds and atmospheric pressure changes, are called surges. Surges are not regular like tides.</p>",
    "question_index": 30
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following Wildlife Sanctuaries is located in the state of Karnataka?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2357;&#2344;&#2381;&#2351;&#2332;&#2368;&#2357; &#2309;&#2349;&#2351;&#2366;&#2352;&#2339;&#2381;&#2351; &#2325;&#2352;&#2381;&#2344;&#2366;&#2335;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Periyar Wildlife Sanctuary</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2375;&#2352;&#2367;&#2351;&#2366;&#2352; &#2357;&#2344;&#2381;&#2351;&#2332;&#2368;&#2357; &#2309;&#2349;&#2351;&#2366;&#2352;&#2339;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Mudumalai Wildlife Sanctuary</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2342;&#2369;&#2350;&#2354;&#2366;&#2312; &#2357;&#2344;&#2381;&#2351;&#2332;&#2368;&#2357; &#2309;&#2349;&#2351;&#2366;&#2352;&#2339;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Thattekad Bird Sanctuary</span><span class=\"hqt\" style=\"display:none\">&#2341;&#2366;&#2335;&#2381;&#2335;&#2375;&#2325;&#2337;&#2364; &#2346;&#2325;&#2381;&#2359;&#2368; &#2309;&#2349;&#2351;&#2366;&#2352;&#2339;&#2381;&#2351;</span>",
      "<span class=\"eqt\">Bhadra Wildlife Sanctuary</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2342;&#2381;&#2352;&#2366; &#2357;&#2344;&#2381;&#2351;&#2332;&#2368;&#2357; &#2309;&#2349;&#2351;&#2366;&#2352;&#2339;&#2381;&#2351;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><b>Bhadra Wildlife Sanctuary</b> is located in the <b>Western Ghats of Karnataka</b>, known for <b>tigers, leopards, elephants</b>, and rich biodiversity.</p><p>The other sanctuaries are in different states:</p><p>&#183; <b>Periyar</b>  -  Kerala</p><p>&#183; <b>Mudumalai</b>  -  Tamil Nadu</p><p>&#183; <b>Thattekad</b>  -  Kerala</p>",
    "question_index": 31
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following was a trade centre established in India by the British?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2319;&#2325; &#2357;&#2381;&#2351;&#2366;&#2346;&#2366;&#2352; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352; &#2341;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">Madras</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2342;&#2381;&#2352;&#2366;&#2360;</span>",
      "<span class=\"eqt\">Serampore</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2368;&#2352;&#2366;&#2350;&#2346;&#2369;&#2352;</span>",
      "<span class=\"eqt\">Chandernagore</span><span class=\"hqt\" style=\"display:none\">&#2330;&#2306;&#2342;&#2381;&#2352;&#2344;&#2327;&#2352;</span>",
      "<span class=\"eqt\">Cochin</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2379;&#2330;&#2368;&#2344;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Madras (now Chennai) was established as a major trade center by the British East India Company in 1639. It became a pivotal hub for cotton, spices, and textiles under British colonial rule.</p><p>Key Fact: The British built Fort St. George in Madras, which served as their administrative and commercial headquarters in South India.</p><p></p><p>Why Not Other Options?</p><p>(b) Serampore & (c) Chandernagore: These were Danish and French trading posts, respectively, not British.</p><p>(d) Cochin (Kochi): Initially a Portuguese and later Dutch stronghold; the British gained control only in the late 18th century.</p><p><img width=423 height=537 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19524/image001.jpg\"></p>",
    "question_index": 32
  },
  {
    "question": "<span class=\"eqt\"><p>Thrombus in a coronary artery results in ___________</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2379;&#2352;&#2379;&#2344;&#2352;&#2368; &#2343;&#2350;&#2344;&#2368; &#2350;&#2375;&#2306; &#2341;&#2381;&#2352;&#2377;&#2350;&#2381;&#2348;&#2360; &#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; ___________ &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">hypertension</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2330;&#2381;&#2330; &#2352;&#2325;&#2381;&#2340;&#2330;&#2366;&#2346;</span>",
      "<span class=\"eqt\">stroke</span><span class=\"hqt\" style=\"display:none\">&#2310;&#2328;&#2366;&#2340;</span>",
      "<span class=\"eqt\">diabetes</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2343;&#2369;&#2350;&#2375;&#2361;</span>",
      "<span class=\"eqt\">heart attack</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2367;&#2354; &#2325;&#2366; &#2342;&#2380;&#2352;&#2366;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>A thrombus (blood clot) in a coronary artery blocks blood flow to the heart muscle, leading to ischemia (oxygen deprivation) and myocardial infarction, commonly known as a heart attack.</p><p>Key Symptoms: Chest pain, shortness of breath, and potential cardiac tissue death.</p><p></p><p>Why Not Other Options?</p><p>(a) Hypertension: High blood pressure, unrelated to arterial clots.</p><p>(b) Stroke: Caused by a blocked artery in the brain, not the heart.</p><p>(c) Diabetes: A metabolic disorder, not directly caused by thrombosis.</p>",
    "question_index": 33
  },
  {
    "question": "<span class=\"eqt\"><p>_____________ is a financial instrument through which Indian entities can raise money from overseas markets in the rupee.</p></span><span class=\"hqt\" style=\"display:none\"><p>_________ &#2319;&#2325; &#2357;&#2367;&#2340;&#2381;&#2340;&#2368;&#2351; &#2360;&#2366;&#2343;&#2344; &#2361;&#2376; &#2332;&#2367;&#2360;&#2325;&#2375; &#2350;&#2366;&#2343;&#2381;&#2351;&#2350; &#2360;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2360;&#2381;&#2341;&#2366;&#2319;&#2306; &#2357;&#2367;&#2342;&#2375;&#2358;&#2368; &#2348;&#2366;&#2332;&#2366;&#2352;&#2379;&#2306; &#2360;&#2375; &#2352;&#2369;&#2346;&#2351;&#2375; &#2350;&#2375;&#2306; &#2343;&#2344; &#2332;&#2369;&#2335;&#2366; &#2360;&#2325;&#2340;&#2368; &#2361;&#2376;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Credit default swap</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2381;&#2352;&#2375;&#2337;&#2367;&#2335; &#2337;&#2367;&#2347;&#2377;&#2354;&#2381;&#2335; &#2360;&#2381;&#2357;&#2376;&#2346;</span>",
      "<span class=\"eqt\">Masala Bond</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2360;&#2366;&#2354;&#2366; &#2348;&#2377;&#2339;&#2381;&#2337;</span>",
      "<span class=\"eqt\">Green Bond</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2381;&#2352;&#2368;&#2344; &#2348;&#2377;&#2339;&#2381;&#2337;</span>",
      "<span class=\"eqt\">Certified Bond</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2352;&#2381;&#2335;&#2367;&#2347;&#2366;&#2311;&#2337; &#2348;&#2377;&#2339;&#2381;&#2337;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Masala bond</b> is a financial instrument through which Indian entities can raise money from overseas markets in the rupee. These bonds are issued in offshore capital markets.</p><p>The bonds are issued in rupee terms and the interest and principal repayment happens in dollar terms.</p><p>Masala bond is an attempt to shield issuers from currency risk and instead transfer the risk to investors buying these bonds. Kerala is the First Indian State to Issue Masala Bond.</p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>Who emerged victorious in the Battle of Khanwa in 1527?</p></span><span class=\"hqt\" style=\"display:none\"><p>1527 &#2350;&#2375;&#2306; &#2326;&#2366;&#2344;&#2357;&#2366; &#2325;&#2375; &#2351;&#2369;&#2342;&#2381;&#2343; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2357;&#2367;&#2332;&#2351;&#2368; &#2361;&#2369;&#2310;?</p></span>",
    "options": [
      "<span class=\"eqt\">Rana Sanga of Mewar</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2375;&#2357;&#2366;&#2337;&#2364; &#2325;&#2375; &#2352;&#2366;&#2339;&#2366; &#2360;&#2366;&#2306;&#2327;&#2366;</span>",
      "<span class=\"eqt\">Babur</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2348;&#2352;</span>",
      "<span class=\"eqt\">Sher Shah Suri</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2375;&#2352;&#2358;&#2366;&#2361; &#2360;&#2370;&#2352;&#2368;</span>",
      "<span class=\"eqt\">Ibrahim Lodhi</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2348;&#2381;&#2352;&#2366;&#2361;&#2367;&#2350; &#2354;&#2379;&#2342;&#2368;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The Battle of Khanwa, fought in 1527, was a pivotal clash between the Mughal forces led by Babur and a Rajput alliance led by Rana Sanga of Mewar. Babur emerged victorious.</p><p>Despite having a larger army, the Rajputs suffered a decisive defeat due to Babur's superior tactics and the Rajputs' internal conflicts. This victory solidified Babur's rule in North India and laid the foundation for the Mughal Empire.</p><p></p>",
    "question_index": 35
  },
  {
    "question": "<span class=\"eqt\"><p>Which female vocalist is renowned for her unique style in the Jaipur-Atrauli gharana?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2351;&#2346;&#2369;&#2352;-&#2309;&#2340;&#2352;&#2380;&#2354;&#2368; &#2328;&#2352;&#2366;&#2344;&#2375; &#2350;&#2375;&#2306; &#2325;&#2380;&#2344; &#2360;&#2368; &#2350;&#2361;&#2367;&#2354;&#2366; &#2327;&#2366;&#2351;&#2367;&#2325;&#2366; &#2309;&#2346;&#2344;&#2368; &#2309;&#2344;&#2370;&#2336;&#2368; &#2358;&#2376;&#2354;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kesarbai Kerkar</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2360;&#2352;&#2348;&#2366;&#2312; &#2325;&#2375;&#2352;&#2325;&#2352;</span>",
      "<span class=\"eqt\">M.S. Subbulakshmi</span><span class=\"hqt\" style=\"display:none\">&#2319;&#2350;.&#2319;&#2360;. &#2360;&#2369;&#2348;&#2381;&#2348;&#2369;&#2354;&#2325;&#2381;&#2359;&#2381;&#2350;&#2368;</span>",
      "<span class=\"eqt\">Gangubai Hangal</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2306;&#2327;&#2370;&#2348;&#2366;&#2312; &#2361;&#2306;&#2327;&#2354;</span>",
      "<span class=\"eqt\">Prabha Atre</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2349;&#2366; &#2309;&#2340;&#2381;&#2352;&#2375;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Kesarbai Kerkar (1892-1977) was a renowned Indian classical vocalist of the Jaipur-Atrauli gharana. </p><p>A protege of Ustad Alladiya Khan (1855 - 1946), the founder of the gharana, from age sixteen, she went on to become one of the most noted khayal singers of the second half of the 20th century.</p><p>Awards won: Sangeet Natak Akademi Award (1953) and Padma Bhushan (1969). </p><p>Further insights:</p><p>&#8226; Madurai Shanmukhavadivu Subbulakshmi (16 September 1916  -  11 December 2004) was an Indian Carnatic singer. She was the first musician ever to be awarded the Bharat Ratna, India's highest civilian honour and also the first Indian musician to receive the Ramon Magsaysay award in 1974.</p><p>&#8226; Gangubai Hangal (05 March 1913  -  21 July 2009) was an Indian singer of the khayal genre of Hindustani classical music from Karnataka.</p><p>&#8226; Prabha Atre (13 September 1932  -  13 January 2024) was an Indian classical vocalist from the Kirana gharana.</p>",
    "question_index": 36
  },
  {
    "question": "<span class=\"eqt\"><p>Chindu Bhagavatham, a performance similar to Yakshagana, is performed in the state of _____ </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2330;&#2367;&#2339;&#2381;&#2337;&#2370; &#2349;&#2366;&#2327;&#2357;&#2340;&#2350;, &#2351;&#2325;&#2381;&#2359;&#2327;&#2366;&#2344; &#2325;&#2375; &#2360;&#2350;&#2366;&#2344; &#2319;&#2325; &#2346;&#2381;&#2352;&#2360;&#2367;&#2342;&#2381;&#2343; &#2344;&#2366;&#2335;&#2381;&#2351; &#2325;&#2354;&#2366; &#2361;&#2376;, &#2311;&#2360;&#2325;&#2366; &#2350;&#2306;&#2330;&#2344; _____ &#2352;&#2366;&#2332;&#2381;&#2351; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Telangana</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2375;&#2354;&#2306;&#2327;&#2366;&#2344;&#2366;</span>",
      "<span class=\"eqt\">Goa</span><span class=\"hqt\" style=\"display:none\">&#2327;&#2379;&#2357;&#2366;</span>",
      "<span class=\"eqt\">Kerala</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2352;&#2354;</span>",
      "<span class=\"eqt\">Tamil Nadu</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Chindu Bhagavatham is performed widely across <b>Telangana</b>. It is similar to Yakshagana.</p><p>It is a unique theatre art form that combines many elements such as dance, music, dialogue, costume, make-up and stage techniques.</p><p>The word 'Chindu' in Telugu means 'jump'. As the presentation is interspersed with leaps and jumps by the performers, it gained the name of Chindu Bhagavatam. Most of the stories are from 'Bhagavatam'.</p>",
    "question_index": 37
  },
  {
    "question": "<span class=\"eqt\"><p>Which architectural style is represented by the Gol Gumbad in Bijapur?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2368;&#2332;&#2366;&#2346;&#2369;&#2352; &#2350;&#2375;&#2306; &#2327;&#2379;&#2354; &#2327;&#2369;&#2350;&#2381;&#2348;&#2342; &#2325;&#2367;&#2360; &#2360;&#2381;&#2341;&#2366;&#2346;&#2340;&#2381;&#2351; &#2358;&#2376;&#2354;&#2368; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2344;&#2367;&#2343;&#2367;&#2340;&#2381;&#2357; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Imperial Style</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2366;&#2361;&#2368; &#2358;&#2376;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Provincial Style</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2306;&#2340;&#2368;&#2351; &#2358;&#2376;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Mughal Style</span><span class=\"hqt\" style=\"display:none\">&#2350;&#2369;&#2327;&#2354; &#2358;&#2376;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Deccani Style</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2325;&#2381;&#2325;&#2344;&#2368; &#2358;&#2376;&#2354;&#2368;</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Gol Gumbad is located in Bijapur, which falls under the Deccani Style of Indo-Islamic architecture</p><p>The study of Indo-Islamic architecture is conventionally categorised into the Imperial Style (Delhi Sultanate), the Provincial Style (Mandu, Gujarat, Bengal, and Jaunpur), the Mughal Style (Delhi, Agra, and Lahore) and the Deccani Style (Bijapur, Golconda).</p>",
    "question_index": 38
  },
  {
    "question": "<span class=\"eqt\"><p>In October 2023, Government of India has launched which scheme to advance and uplift the socio economic status of scheduled castes?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352; 2023 &#2350;&#2375;&#2306;, &#2349;&#2366;&#2352;&#2340; &#2360;&#2352;&#2325;&#2366;&#2352; &#2344;&#2375; &#2309;&#2344;&#2369;&#2360;&#2370;&#2330;&#2367;&#2340; &#2332;&#2366;&#2340;&#2367;&#2351;&#2379;&#2306; &#2325;&#2368; &#2360;&#2366;&#2350;&#2366;&#2332;&#2367;&#2325; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2360;&#2381;&#2341;&#2367;&#2340;&#2367; &#2325;&#2379; &#2310;&#2327;&#2375; &#2348;&#2338;&#2364;&#2366;&#2344;&#2375; &#2324;&#2352; &#2313;&#2360;&#2325;&#2375; &#2313;&#2340;&#2381;&#2341;&#2366;&#2344; &#2325;&#2375; &#2354;&#2367;&#2319; &#2325;&#2380;&#2344;-&#2360;&#2368; &#2351;&#2379;&#2332;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">SAKSHAM</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2325;&#2381;&#2359;&#2350;</span>",
      "<span class=\"eqt\">SHRESHTA</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2381;&#2352;&#2375;&#2359;&#2381;&#2336;</span>",
      "<span class=\"eqt\">PRAGATI</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2327;&#2340;&#2367;</span>",
      "<span class=\"eqt\">DIKSHA</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2368;&#2325;&#2381;&#2359;&#2366;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The SHRESHTA (Scheme for Residential Education for Students in High Schools in Targeted Areas) was launched by the Government of India in October 2023 to uplift the socio-economic status of Scheduled Castes (SCs).</p><p>Key Features:</p><p>- Provides quality residential education to SC students from grades 9 to 12 in top-tier private schools.</p><p>- Aims to reduce educational inequality and empower SC communities.</p><p>Why Not Other Options?</p><p>(a) SAKSHAM: A skill development scheme, not specific to SCs.</p><p>(c) PRAGATI: Scholarship scheme for girls, not SC-focused.</p><p>(d) DIKSHA: National digital education platform, unrelated to socio-economic upliftment.</p>",
    "question_index": 39
  },
  {
    "question": "<span class=\"eqt\"><p>Who among the following founded the Nyaya School of Indian Philosophy?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2367;&#2360;&#2344;&#2375; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2342;&#2352;&#2381;&#2358;&#2344;&#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352; &#2325;&#2368; &#2344;&#2381;&#2351;&#2366;&#2351; &#2357;&#2367;&#2330;&#2366;&#2352;&#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2325;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kapila</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2346;&#2367;&#2354;&#2366;</span>",

    "solution": "<p>The Nyaya School of Indian philosophy, which focuses on logic, epistemology, and debate, was founded by Akshapada Gautama (also known as Gautama Rishi).</p><p>Key Text: Nyaya Sutras, a foundational work on systematic reasoning and critical analysis.</p><p></p><p>Why Not Other Options?</p><p>(a) Kapila: Founder of the Sankhya School (metaphysical dualism).</p><p>(b) Patanjali: Founder of the Yoga School (compiler of Yoga Sutras).</p><p>(c) Kanada: Founder of the Vaisheshika School (atomism and natural philosophy).</p>",

    "question": "<span class=\"eqt\"><p>A high birth rate and a high death rate generally result in: </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2313;&#2330;&#2381;&#2330; &#2332;&#2344;&#2381;&#2350; &#2342;&#2352; &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2350;&#2371;&#2340;&#2381;&#2351;&#2369; &#2342;&#2352; &#2325;&#2366; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350; &#2360;&#2366;&#2350;&#2366;&#2344;&#2381;&#2351;&#2340;&#2307; &#2351;&#2361; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;: </p></span>",
    "options": [
      "<span class=\"eqt\">Rapid population increase</span><span class=\"hqt\" style=\"display:none\">&#2340;&#2368;&#2357;&#2381;&#2352; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Population explosion</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2367;&#2360;&#2381;&#2347;&#2379;&#2335;</span>",
      "<span class=\"eqt\">Slow population growth</span><span class=\"hqt\" style=\"display:none\">&#2343;&#2368;&#2350;&#2368; &#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2357;&#2371;&#2342;&#2381;&#2343;&#2367;</span>",
      "<span class=\"eqt\">Population decrease</span><span class=\"hqt\" style=\"display:none\">&#2332;&#2344;&#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2350;&#2375;&#2306; &#2325;&#2350;&#2368;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>When both birth rates and death rates are high, the net population growth tends to be <b>slow</b>. </p><p>This demographic pattern is characteristic of the first stage of demographic transition, often seen in pre-industrial societies. In this scenario, while many children are born (high birth rate), many people also die (high death rate), resulting in only a small difference between births and deaths. </p><p>This small difference translates to <b>slow population growth</b>. </p><p>Option (A) is incorrect because rapid population increase occurs when birth rates are high but death rates are low. </p><p>Option (B) is incorrect as population explosion specifically refers to a sudden, rapid increase in population, which doesn't occur when death rates match high birth rates. </p><p>Option (D) is incorrect because population decrease would occur if death rates exceeded birth rates, not when they're both similarly high. </p>",
    "question_index": 44
  },

    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; A Money Bill has to be introduced in the Lok Sabha as per Section 110 of the Constitution. Then, it is transmitted to the Rajya Sabha for its recommendations. The Rajya Sabha has to return the Bill with recommendations in <b>14 days</b>. However, the Lok Sabha can reject all or some of the recommendations. </p><p>&bull; The Speaker of the Lok Sabha is authorised to decide whether the Bill is a Money Bill or not. Also, the Speaker's decision shall be deemed to be final. </p>",

      "<span class=\"eqt\">Sangita Kalanidhi</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2306;&#2327;&#2368;&#2340;&#2366; &#2325;&#2354;&#2366;&#2344;&#2367;&#2343;&#2367;</span>"

    "correct_option_id": 0,
    "solution": "<p>Thodur Madabusi Krishna is an Indian Carnatic vocalist, writer, activist, author and Ramon Magsaysay awardee. </p><p>In the year 2016 he was awarded with the Ramon Magsaysay Award for \"his forceful commitment as artist and advocate to art's power to heal India's deep social divisions, breaking barriers of caste and class to unleash what music has to offer not just for some but for all\".</p><p>Krishna was conferred the Sangita Kalanidhi award for 2024 by the Madras Music Academy.</p>",
    "question_index": 47
  },

    "question": "<span class=\"eqt\"><p>National Science Day is celebrated to mark:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2342;&#2367;&#2357;&#2360; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2375; &#2313;&#2346;&#2354;&#2325;&#2381;&#2359;&#2381;&#2351; &#2350;&#2375;&#2306; &#2350;&#2344;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">The discovery of Radioactivity</span><span class=\"hqt\" style=\"display:none\">&#2352;&#2375;&#2337;&#2367;&#2351;&#2379;&#2343;&#2352;&#2381;&#2350;&#2367;&#2340;&#2366; &#2325;&#2368; &#2326;&#2379;&#2332;</span>",
      "<span class=\"eqt\">The birth anniversary of CV Raman</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;.&#2357;&#2368;. &#2352;&#2350;&#2344; &#2325;&#2368; &#2332;&#2351;&#2306;&#2340;&#2368;</span>",
      "<span class=\"eqt\">The discovery of the Raman Effect by CV Raman</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2368;.&#2357;&#2368;. &#2352;&#2350;&#2344; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2352;&#2350;&#2344; &#2346;&#2381;&#2352;&#2349;&#2366;&#2357; &#2325;&#2368; &#2326;&#2379;&#2332;</span>",
      "<span class=\"eqt\">The establishment of the Indian Space Research Organisation</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2309;&#2306;&#2340;&#2352;&#2367;&#2325;&#2381;&#2359; &#2309;&#2344;&#2369;&#2360;&#2306;&#2343;&#2366;&#2344; &#2360;&#2306;&#2327;&#2336;&#2344; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>National Science Day</b> is celebrated on <b>February 28th</b> to mark the discovery of the <b>Raman Effect</b> by <b>Sir C.V. Raman</b> in <b>1928</b>.</p><p>For this discovery, he was awarded the <b>Nobel Prize in Physics</b> in <b>1930</b>. The day aims to promote scientific temper and innovation in India.</p>",
    "question_index": 48
  },
  {
    "question": "<span class=\"eqt\"><p>Gross primary productivity (GPP) minus respiration losses (R) is equal to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2360;&#2325;&#2354; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366; (GPP) &#2328;&#2335;&#2366; &#2358;&#2381;&#2357;&#2360;&#2344; &#2361;&#2366;&#2344;&#2367; (R) &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;:</p></span>",
    "options": [
      "<span class=\"eqt\">Secondary productivity</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2381;&#2357;&#2367;&#2340;&#2368;&#2351;&#2325; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366;</span>",
      "<span class=\"eqt\">Net primary productivity (NPP)</span><span class=\"hqt\" style=\"display:none\">&#2358;&#2369;&#2342;&#2381;&#2343; &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366; (NPP)</span>",
      "<span class=\"eqt\">Biomass production</span><span class=\"hqt\" style=\"display:none\">&#2348;&#2366;&#2351;&#2379;&#2350;&#2366;&#2360; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344;</span>",
      "<span class=\"eqt\">Decomposition rate</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2346;&#2328;&#2335;&#2344; &#2342;&#2352;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&#183; Gross Primary Productivity (GPP): Total amount of energy (biomass) produced by plants through photosynthesis.</p><p>&#183; Respiration Losses (R): Energy expended by plants for their own metabolic activities.</p><p>&#183; Net Primary Productivity (NPP): The usable energy/biomass available for herbivores and higher trophic levels after accounting for plant respiration.</p><p>Formula:</p><p>NPP=GPP&#8722;R</p>",
    "question_index": 49
  },
  {
    "question": "<span class=\"eqt\"><p>A sum is lent for 4 years at A% per annum simple interest. If the sum is lent at (A + 1.5)%, then it earns Rs.120 more. Find the sum.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; 4 &#2357;&#2352;&#2381;&#2359; &#2325;&#2375; &#2354;&#2367;&#2319; A% &#2357;&#2366;&#2352;&#2381;&#2359;&#2367;&#2325; &#2360;&#2366;&#2343;&#2366;&#2352;&#2339; &#2348;&#2381;&#2351;&#2366;&#2332; &#2346;&#2352; &#2313;&#2343;&#2366;&#2352; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; (A + 1.5)% &#2346;&#2352; &#2313;&#2343;&#2366;&#2352; &#2342;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; 120 &#2352;&#2369;&#2346;&#2351;&#2375; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2343;&#2344;&#2352;&#2366;&#2358;&#2367; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2351;&#2375;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Rs.2400</span><span class=\"hqt\" style=\"display:none\">2400 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs.2000</span><span class=\"hqt\" style=\"display:none\">2000 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs.2100</span><span class=\"hqt\" style=\"display:none\">2100 &#2352;&#2369;&#2346;&#2351;&#2375;</span>",
      "<span class=\"eqt\">Rs.2500</span><span class=\"hqt\" style=\"display:none\">2500 &#2352;&#2369;&#2346;&#2351;&#2375;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Let the sum be Rs. P.</p><p>According to the question,</p><p>P * (A + 1.5  -  A) * 4 = 120 * 100</p><p>P * 6 = 12000</p><p>P = Rs.2000</p>",
    "question_index": 50
  },

    "question": "<span class=\"eqt\"><p>How many two-digit numbers are there that gives a remainder of 5 when divided by 8?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2368; &#2320;&#2360;&#2368; &#2325;&#2367;&#2340;&#2344;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; &#2361;&#2376;&#2306; &#2332;&#2367;&#2344;&#2381;&#2361;&#2375;&#2306; 8 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; 5 &#2310;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">10</span><span class=\"hqt\" style=\"display:none\">10</span>",
      "<span class=\"eqt\">12</span><span class=\"hqt\" style=\"display:none\">12</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Two-digit numbers that gives a remainder of 5 when divided by 8 are:</p><p>13, 21, 29, ...,</p><p>The above series is in A.P. where,</p><p>First term = 13, common difference = 8, last term = 93</p><p>Then, total numbers = (last term  -  first term)/common difference + 1</p><p>= (93  -  13)/8 + 1</p><p>= 10 + 1</p><p>= <b>11</b></p>",
    "question_index": 51
  },

    "question": "<span class=\"eqt\"><p>The average of the 2-digit numbers 65, 86, 9X, and 45 is 72. Find the value of X.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2309;&#2306;&#2325;&#2379;&#2306; &#2357;&#2366;&#2354;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; 65, 86, 9X &#2324;&#2352; 45 &#2325;&#2366; &#2324;&#2360;&#2340; 72 &#2361;&#2376;&#2404; X &#2325;&#2366; &#2350;&#2366;&#2344; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">1</span><span class=\"hqt\" style=\"display:none\">1</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Sum of unit digits of given numbers = 5+6+X+5= 16+X</p><p>Given average = 72</p><p>So,</p><p>16+X = 72/4</p><p>X = 18-16</p><p>X = 2</p>",
    "question_index": 52
  },

    "question": "<span class=\"eqt\"><p>A alone can do a piece of work in 20 days, B alone in 40 days and C alone in 60 days. Everyone begin to do the work together, but A leaves after 4 days and B leaves 6 days before the completion of the work. How many days did the work last?</p></span><span class=\"hqt\" style=\"display:none\"><p>A &#2309;&#2325;&#2375;&#2354;&#2375; &#2325;&#2367;&#2360;&#2368; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2379; 20 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;, B &#2309;&#2325;&#2375;&#2354;&#2375; 40 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; C &#2309;&#2325;&#2375;&#2354;&#2375; 60 &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2325;&#2352; &#2360;&#2325;&#2340;&#2366; &#2361;&#2376;&#2404; &#2357;&#2375; &#2360;&#2349;&#2368; &#2319;&#2325; &#2360;&#2366;&#2341; &#2325;&#2366;&#2352;&#2381;&#2351; &#2346;&#2381;&#2352;&#2366;&#2352;&#2306;&#2349; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;, &#2354;&#2375;&#2325;&#2367;&#2344; A, 4 &#2342;&#2367;&#2344; &#2348;&#2366;&#2342; &#2325;&#2366;&#2352;&#2381;&#2351; &#2331;&#2379;&#2337;&#2364; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; B &#2325;&#2366;&#2352;&#2381;&#2351; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379;&#2344;&#2375; &#2360;&#2375; 6 &#2342;&#2367;&#2344; &#2346;&#2361;&#2354;&#2375; &#2331;&#2379;&#2337;&#2364; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2366;&#2352;&#2381;&#2351; &#2325;&#2367;&#2340;&#2344;&#2375; &#2342;&#2367;&#2344;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">22 days</span><span class=\"hqt\" style=\"display:none\">22 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">24 days</span><span class=\"hqt\" style=\"display:none\">24 &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">22(4/5) days</span><span class=\"hqt\" style=\"display:none\">22(4/5) &#2342;&#2367;&#2344;</span>",
      "<span class=\"eqt\">25 days</span><span class=\"hqt\" style=\"display:none\">25 &#2342;&#2367;&#2344;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Total work in 1 day by A, B and C = 1/20 + 1/40 + 1/60 = 11/120</p><p>In 4 days = 44/120</p><p>By C in last 6 days = 6/60 = 1/10</p><p>Total = 44/120 + 1/10 = 56/120</p><p>Work left = 1  -  56/120 = 64/120</p><p>Work done by B and C in one day = 1/40 + 1/60 = 5/120</p><p>Work left is done by B and C. Number of days it takes = (64/120)*(120/5) = 64/5</p><p>Total time = 10 + 64/5 = 22(4/5) days</p><p><b>Express Method </b></p><p>Let total work be LCM of 20, 40, and 60 = 120 units</p><p>Efficiencies of A, B, and C are 120/20 = 6 units per day, 120/40 = 3 units per day, and 120/60 = 2 units per day.</p><p>Work done by A, B, and C in 4 days = 4 x (6 + 3 + 2) = 44 units</p><p>Work done by C in 6 days = 2 x 6 = 12 units</p><p>Remaining work = 120 - (44 + 12) = 64 units</p><p>B and C will complete the remaining work in 64/5 = 12(4/5) days</p><p>Total number of days = 10 + 12(4/5) = 22(4/5) days</p>",
    "question_index": 53
  },

    "question": "<span class=\"eqt\"><p>Two runners started running on a circular track simultaneously with speeds of 24 m/sec and 16 m/sec in opposite directions. If the circumference of the circular track is 1200 m, then find at how many distinct points they will cross each other?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2343;&#2366;&#2357;&#2325;&#2379;&#2306; &#2344;&#2375; &#2319;&#2325; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2335;&#2381;&#2352;&#2376;&#2325; &#2346;&#2352; &#2319;&#2325; &#2360;&#2366;&#2341; 24 m/sec &#2324;&#2352; 16 m/sec &#2325;&#2368; &#2330;&#2366;&#2354; &#2360;&#2375; &#2357;&#2367;&#2346;&#2352;&#2368;&#2340; &#2342;&#2367;&#2358;&#2366;&#2323;&#2306; &#2350;&#2375;&#2306; &#2342;&#2380;&#2337;&#2364;&#2344;&#2366; &#2358;&#2369;&#2352;&#2370; &#2325;&#2367;&#2351;&#2366;&#2404; &#2351;&#2342;&#2367; &#2357;&#2371;&#2340;&#2381;&#2340;&#2366;&#2325;&#2366;&#2352; &#2335;&#2381;&#2352;&#2376;&#2325; &#2325;&#2368; &#2346;&#2352;&#2367;&#2343;&#2367; 1200 m &#2361;&#2376;, &#2340;&#2379; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319; &#2325;&#2367; &#2357;&#2375; &#2325;&#2367;&#2340;&#2344;&#2375; &#2309;&#2354;&#2327;-&#2309;&#2354;&#2327; &#2348;&#2367;&#2306;&#2342;&#2369;&#2323;&#2306; &#2346;&#2352; &#2319;&#2325;-&#2342;&#2370;&#2360;&#2352;&#2375; &#2325;&#2379; &#2346;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2327;&#2375;?</p></span>",
    "options": [
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">4</span><span class=\"hqt\" style=\"display:none\">4</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">2</span><span class=\"hqt\" style=\"display:none\">2</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>For this type, find the ratio of given speeds, if runners are running in opposite directions, then sum of the ratio of speeds will be the answer and if runners are running in same direction, then difference of the ratio of speeds will be the answer.</p><p>Ratio of speeds = 24: 16 = 3: 2</p><p>Runners are running in opposite directions. Therefore,</p><p>Required answer = 3 + 2 = 5</p>",
    "question_index": 55
  },

    "question": "<span class=\"eqt\"><p>The line graph given below represents the data regarding the number of books published by two publications in different weeks.</p><p><img width=576 height=336 id=\"Chart 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27764/image016.png\"></p><p>What is the difference between the sum of number of books published by publications A and B in all weeks together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2352;&#2375;&#2326;&#2366; &#2327;&#2381;&#2352;&#2366;&#2347; &#2357;&#2367;&#2349;&#2367;&#2344;&#2381;&#2344; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361;&#2379;&#2306; &#2350;&#2375;&#2306; &#2342;&#2379; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2344;&#2379;&#2306; &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2337;&#2375;&#2335;&#2366; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=576 height=336 id=\"Chart 16\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27764/image016.png\"></p><p>&#2360;&#2349;&#2368; &#2360;&#2346;&#2381;&#2340;&#2366;&#2361;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2344; A &#2324;&#2352; B &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2346;&#2381;&#2352;&#2325;&#2366;&#2358;&#2367;&#2340; &#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2351;&#2379;&#2327; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2381;&#2351;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;?</p></span>",

    "correct_option_id": 2,
    "solution": "<p>Sum of number of books published by publication A in all weeks together = 140 + 110 + 60 + 135 + 227 + 81 = 753</p><p>Sum of number of books published by publication B in all weeks together = 180 + 90 + 96 + 124 + 118 + 123 = 731</p><p>Required difference = 753  -  731 = 22</p>",
