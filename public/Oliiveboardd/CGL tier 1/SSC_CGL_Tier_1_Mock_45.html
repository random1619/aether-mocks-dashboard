    "solution": "<p>Total amount Nishu lends = Rs.12000</p><p>Amount Nishu lends to Arun = 12000* 17/24 = Rs.8500</p><p>Amount Nishu lends to Sanam = 12000  -  8500 = Rs.3500</p><p>Total amount Nishu gets from Arun after 2 years = 8500 + (8500* 12* 2)/100</p><p>= 8500 + 2040 = Rs.10540</p><p>Total amount Nishu gets from Sanam after 2 years = 3500 + (3500* 9* 2)/100</p><p>= 3500 + 630 = Rs.4130</p><p>Required difference = 10540  -  4130 = Rs.6410</p>",

    "question": "<span class=\"eqt\"><p>When positive numbers x, y and z are divided by 11, the remainders are 2, 7 and 9 respectively. What will be the remainder when (2x - 3y + 4z) is divided by 11?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2348; &#2343;&#2344;&#2366;&#2340;&#2381;&#2350;&#2325; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2319;&#2305; x, y &#2324;&#2352; z &#2325;&#2379; 11 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 2, 7 &#2324;&#2352; 9 &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; (2x - 3y + 4z) &#2325;&#2379; 11 &#2360;&#2375; &#2357;&#2367;&#2349;&#2366;&#2332;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2346;&#2352; &#2358;&#2375;&#2359;&#2347;&#2354; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">5</span><span class=\"hqt\" style=\"display:none\">5</span>",
      "<span class=\"eqt\">8</span><span class=\"hqt\" style=\"display:none\">8</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>The required remainder will be the value of the number when x, y and z are replaced with the respective remainders when each is divided by 11.</p><p>Hence, (2x - 3y + 4z)/11 = (2*2 - 3*7 + 4*9)/11 = 19/11</p><p>Remainder = 8</p>",
    "question_index": 51

    "question": "<span class=\"eqt\"><p>A furniture retailer offers a 20% discount on the marked price of a dining table. On the discounted price, a shipping charge of 5% is added, and then 10% GST is applied. If a customer pays &#8377;9240, what was the original marked price?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2347;&#2364;&#2352;&#2381;&#2344;&#2368;&#2330;&#2352; &#2357;&#2367;&#2325;&#2381;&#2352;&#2375;&#2340;&#2366; &#2319;&#2325; &#2337;&#2366;&#2311;&#2344;&#2367;&#2306;&#2327; &#2335;&#2375;&#2348;&#2354; &#2325;&#2375; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 20% &#2325;&#2368; &#2331;&#2370;&#2335; &#2342;&#2375; &#2352;&#2361;&#2366; &#2361;&#2376;&#2404; &#2331;&#2370;&#2335; &#2357;&#2366;&#2354;&#2375; &#2350;&#2370;&#2354;&#2381;&#2351; &#2346;&#2352; 5% &#2358;&#2367;&#2346;&#2367;&#2306;&#2327; &#2358;&#2369;&#2354;&#2381;&#2325; &#2332;&#2379;&#2337;&#2364;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2347;&#2367;&#2352; 10% GST &#2354;&#2327;&#2366;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2325;&#2379;&#2312; &#2327;&#2381;&#2352;&#2366;&#2361;&#2325; &#8377;9240 &#2325;&#2366; &#2349;&#2369;&#2327;&#2340;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2350;&#2370;&#2354; &#2309;&#2306;&#2325;&#2367;&#2340; &#2350;&#2370;&#2354;&#2381;&#2351; &#2325;&#2381;&#2351;&#2366; &#2341;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>The average of all the numbers of a set of 18 numbers is 125 more than the average of that of another set of 26 numbers. If the highest number of the set of 18 numbers is removed, then the new average of all the numbers of this set becomes 235. If the highest number in the set of 18 numbers is 379, then what is the average of all the numbers of the set of 26 numbers?</p></span><span class=\"hqt\" style=\"display:none\"><p>18 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2319;&#2325; &#2360;&#2350;&#2370;&#2361; &#2325;&#2368; &#2360;&#2349;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340;, 26 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2319;&#2325; &#2309;&#2344;&#2381;&#2351; &#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2324;&#2360;&#2340; &#2360;&#2375; 125 &#2309;&#2343;&#2367;&#2325; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 18 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2360;&#2375; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2379; &#2361;&#2335;&#2366; &#2342;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;, &#2340;&#2379; &#2311;&#2360; &#2360;&#2350;&#2370;&#2361; &#2325;&#2375; &#2360;&#2349;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2344;&#2351;&#2366; &#2324;&#2360;&#2340; 235 &#2361;&#2379; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 18 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2350;&#2375;&#2306; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; 379 &#2361;&#2376;, &#2340;&#2379; 26 &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2375; &#2360;&#2350;&#2370;&#2361; &#2325;&#2368; &#2360;&#2349;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; &#2325;&#2366; &#2324;&#2360;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2376;?</p></span>",

      "<span class=\"eqt\">118</span><span class=\"hqt\" style=\"display:none\">118</span>"

    "correct_option_id": 3,
    "solution": "<p>Let the average of all the numbers of the set of 18 numbers be 'a' and that of set of 26 numbers be 'b'.</p><p>a  -  b = 125 .. (i)</p><p>Also, sum of all the numbers of the set of 18 numbers = 18a</p><p>The highest number in the set of 18 numbers is 379.</p><p>(18a  -  379)/17 = 235</p><p>18a = 3995 + 379 = 4374</p><p>a = 4374/18 = 243</p><p>From (i),</p><p>b = a  -  125 = 243  -  125 = 118</p><p>So, the average of all the numbers of the set of 26 numbers is 118</p>",

    "solution": "\"<p> <img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/cbc385da378bb095af718b8bbc4c25b7.png\" /> </p><p> Let the length of line AD be ' <i>x</i> ' cm</p><p> \r<img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-005070.png\"/>\r Length of tangent AB = (15 &#8211; <i>x</i> ) cm</p><p>Line AD is a secant to the circle as it intersects the circle at two points C and D,</p><p>As we know, when a secant and a tangent are drawn to a circle from the same exterior point, then the square of the length of the tangent is equal to the product of the length of the external segment of the secant and the total length of the secant</p><p> \r<img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-005070.png\"/>\r AB <sup>2</sup> &#160;= AC &#215; AD ----(1)</p><p>Given, CD = 5 cm,</p><p> \r<img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-005070.png\"/>\r AC = AD &#8211; CD = ( <i>x</i> &#8211; 5) cm</p><p>Substituting in (1), we get,</p><p> \r<img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-005070.png\"/>\r (15 &#8211; <i>x</i> ) <sup>2</sup> &#160;= ( <i>x</i> &#8211; 5) &#215; <i>x</i></p><p> \r<img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-005070.png\"/>\r 225 + <i>x</i> <sup>2</sup> &#160; &#8211; 30 <i>x</i> = <i>x</i> <sup>2</sup> &#160;&#8211; 5 <i>x</i></p><p> &#8658; 25 <i>x</i> = 225</p><p> \r<img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-005070.png\"/>\r <i>x</i> = \r<img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-001528.png\"/>\r = 9 cm</p><p> \r<img src=\"https://u1.oliveboard.in/exams/solution/oliveimg/stubeimg/SSCT-MML-005321.png\"/>\r Length of line AD = 9 cm</p><p> </p>\"",

    "question": "<span class=\"eqt\"><p>Find the equation of a line passing through point P(-2, 3) and perpendicular to the line x + 2y  -  3 = 0.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2367;&#2306;&#2342;&#2369; P(-2, 3) &#2324;&#2352; &#2352;&#2375;&#2326;&#2366; x + 2y - 3 = 0 &#2360;&#2375; &#2354;&#2306;&#2348;&#2357;&#2340; &#2360;&#2375; &#2327;&#2369;&#2332;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2368; &#2352;&#2375;&#2326;&#2366; &#2325;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">y + 2x + 7 = 0</span><span class=\"hqt\" style=\"display:none\">y + 2x + 7 = 0</span>",

      "<span class=\"eqt\">y  -  2x  -  7 = 0</span><span class=\"hqt\" style=\"display:none\">y - 2x - 7 = 0</span>"

    "correct_option_id": 3,
    "solution": "<p>In the given equation of line: x + 2y  -  3 = 0</p><p>y = (-x/2) + 3/2</p><p>Slope for perpendicular line to this line= 2</p><p>Therefore, equation of line passing through point P(-2, 3) and slope 2 is:</p><p>(y  -  3) = 2 * (x  -  (-2))</p><p><b>y  -  2x  -  7 = 0</b></p>",

d black;padding:5px;\">900</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">25%</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">2: 3</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>C</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1500</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">20%</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3: 2</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>D</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1100</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15%</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">5: 6</td></tr></table><p>&#2360;&#2381;&#2325;&#2370;&#2354; B &#2324;&#2352; C &#2350;&#2375;&#2306; &#2327;&#2339;&#2367;&#2340; &#2357;&#2367;&#2359;&#2351; &#2330;&#2369;&#2344;&#2344;&#2375; &#2357;&#2366;&#2354;&#2375; &#2346;&#2369;&#2352;&#2369;&#2359; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",

    "solution": "<p>Number of students who opted for maths in school B = 900  X  25% = 225</p><p>Male students opted for maths in school B = 225  X  2/5 = 90</p><p>Female students opted for maths in school B = 225  -  90 = 135</p><p>Number of students who opted for maths in school C = 1500  X  20% = 300</p><p>Male students opted for maths in school C = 300  X  3/5 = 180</p><p>Female students opted for maths in school C = 300  -  180 = 120</p><p>Total male = 90 + 180 = 270</p><p>Total female = 135 + 120 = 255</p><p>Hence, the required ratio = 270: 255 = 18:17</p>",

    "question": "<span class=\"eqt\"><p>In &#8710;XYZ, S and T are points on sides XZ and YZ respectively such that ST &#8869; YZ. If ST = 24 cm, ZT = 5 cm and tan &#8736;XYZ = 4.8, then XZ: SZ is equal to:</p></span><span class=\"hqt\" style=\"display:none\"><p>&#8710;XYZ &#2350;&#2375;&#2306;, S &#2324;&#2352; T &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; XZ &#2324;&#2352; YZ &#2349;&#2369;&#2332;&#2366;&#2323;&#2306; &#2346;&#2352; &#2320;&#2360;&#2375; &#2348;&#2367;&#2306;&#2342;&#2369; &#2361;&#2376;&#2306; &#2325;&#2367; ST &#8869; YZ &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; ST = 24 cm, ZT = 5 cm &#2324;&#2352; tan &#8736;XYZ = 4.8 &#2361;&#2376;, &#2340;&#2379; XZ: SZ &#2325;&#2367;&#2360;&#2325;&#2375; &#2348;&#2352;&#2366;&#2348;&#2352; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">3YZ: 2TZ</span><span class=\"hqt\" style=\"display:none\">3YZ: 2TZ</span>",
      "<span class=\"eqt\">2YZ: TZ</span><span class=\"hqt\" style=\"display:none\">2YZ: TZ</span>",
      "<span class=\"eqt\">YZ: TZ</span><span class=\"hqt\" style=\"display:none\">YZ: TZ</span>",
      "<span class=\"eqt\">YZ: 2TZ</span><span class=\"hqt\" style=\"display:none\">YZ: 2TZ</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p><img width=239 height=207 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p18894/image017.jpg\"></p><p>In &#8710;STZ, </p><p>tan &#8736;SZT = 24/5 </p><p>=&gt; tan &#8736;SZT = 4.8</p><p>=&gt; tan &#8736;SZT = tan &#8736;XYZ</p><p>=&gt; &#8736;XZY = &#8736;XYZ</p><p>So, XY = XZ</p><p>Now drawn a line XU perpendicular to line YZ. </p><p>So, YU = UZ</p><p>&#8710;XUZ and &#8710;STZ are similar triangles. </p><p>So, XZ/SZ = UZ/TZ</p><p>=&gt; XZ/SZ = (YZ/2)/TZ</p><p>=&gt; XZ: SZ = YZ: 2TZ</p>",

    "question": "<span class=\"eqt\"><p>A container contains 14.4 kg mixture of rice flour and wheat flour in the ratio of 1: 1. If 4.8 kg of mixture is replaced by wheat flour followed by 2.4 kg of mixture again replaced by wheat flour, then what will be the ratio of wheat flour to rice flour in the final mixture?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2325;&#2306;&#2335;&#2375;&#2344;&#2352; &#2350;&#2375;&#2306; 1: 1 &#2325;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2350;&#2375;&#2306; &#2330;&#2366;&#2357;&#2354; &#2325;&#2375; &#2310;&#2335;&#2375; &#2324;&#2352; &#2327;&#2375;&#2361;&#2370;&#2306; &#2325;&#2375; &#2310;&#2335;&#2375; &#2325;&#2366; 14.4 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; 4.8 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2379; &#2327;&#2375;&#2361;&#2370;&#2306; &#2325;&#2375; &#2310;&#2335;&#2375; &#2360;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376; &#2324;&#2352; &#2346;&#2369;&#2344;&#2307; 2.4 &#2325;&#2367;&#2354;&#2379;&#2327;&#2381;&#2352;&#2366;&#2350; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2325;&#2379; &#2327;&#2375;&#2361;&#2370;&#2306; &#2325;&#2375; &#2310;&#2335;&#2375; &#2360;&#2375; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2340;&#2379; &#2309;&#2306;&#2340;&#2367;&#2350; &#2350;&#2367;&#2358;&#2381;&#2352;&#2339; &#2350;&#2375;&#2306; &#2327;&#2375;&#2361;&#2370;&#2306; &#2325;&#2375; &#2310;&#2335;&#2375; &#2324;&#2352; &#2330;&#2366;&#2357;&#2354; &#2325;&#2375; &#2310;&#2335;&#2375; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2367;&#2340;&#2344;&#2366; &#2361;&#2379;&#2327;&#2366;?</p></span>",
    "options": [
      "<span class=\"eqt\">4: 9</span><span class=\"hqt\" style=\"display:none\">4: 9</span>",
      "<span class=\"eqt\">13: 5</span><span class=\"hqt\" style=\"display:none\">13: 5</span>",
      "<span class=\"eqt\">5: 11</span><span class=\"hqt\" style=\"display:none\">5: 11</span>",
      "<span class=\"eqt\">11: 4</span><span class=\"hqt\" style=\"display:none\">11: 4</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Initially, Quantity of rice flour = 14.4 * 1/2 = 7.2 kg and Quantity of wheat flour 14.4 * 1/2 = 7.2 kg</p><p>After 1st operation,</p><p>Quantity of rice flour = 7.2  -  2.4 = 4.8 kg and Quantity of wheat flour = 7.2  -  2.4 + 4.8 = 9.6 kg</p><p>After 2nd operation,</p><p>Quantity of rice flour = 4.8  -  2.4 * 1/3 = 4.0 kg and Quantity of wheat flour 9.6  -  2.4 * 2/3 + 2.4 = 10.4 kg</p><p>So, required ratio = 104: 40 = 13: 5</p>",
    "question_index": 61
  },

    "question": "<span class=\"eqt\"><p>Two boats, M and N, travel with still water speeds of 18 km/h and 24 km/h, respectively, and the stream speed is 6 km/h. What is the ratio of distances covered by Boat M in 3 hours upstream and 2 hours downstream together, to that covered by Boat N in 4 hours downstream and 2 hours upstream together?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2344;&#2366;&#2357;&#2375;&#2306;, M &#2324;&#2352; N, &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 18 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2324;&#2352; 24 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; &#2360;&#2375; &#2360;&#2381;&#2341;&#2367;&#2352; &#2332;&#2354; &#2350;&#2375;&#2306; &#2330;&#2354; &#2352;&#2361;&#2368; &#2361;&#2376;&#2306;, &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2368; &#2327;&#2340;&#2367; 6 &#2325;&#2367;&#2350;&#2368;/&#2328;&#2306;&#2335;&#2366; &#2361;&#2376;&#2404; &#2344;&#2366;&#2357; M &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 3 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 2 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2368; &#2327;&#2312; &#2342;&#2370;&#2352;&#2368; &#2325;&#2366;, &#2344;&#2366;&#2357; N &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2309;&#2344;&#2369;&#2325;&#2370;&#2354; 4 &#2328;&#2306;&#2335;&#2375; &#2324;&#2352; &#2343;&#2366;&#2352;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2325;&#2370;&#2354; 2 &#2328;&#2306;&#2335;&#2375; &#2350;&#2375;&#2306; &#2340;&#2351; &#2325;&#2368; &#2327;&#2312; &#2342;&#2370;&#2352;&#2368; &#2360;&#2375; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2325;&#2381;&#2351;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">13: 7</span><span class=\"hqt\" style=\"display:none\">13: 7</span>",
      "<span class=\"eqt\">5: 2</span><span class=\"hqt\" style=\"display:none\">5: 2</span>",
      "<span class=\"eqt\">2: 5</span><span class=\"hqt\" style=\"display:none\">2: 5</span>",
      "<span class=\"eqt\">7: 13</span><span class=\"hqt\" style=\"display:none\">7: 13</span>"

    "correct_option_id": 3,
    "solution": "<p>Boat M:</p><p>Upstream speed = 18 &#8722; 6 = 12 km/h</p><p>Downstream speed = 18 + 6 = 24 km/h</p><p>Distance covered by boat M = 3  X  12 + 2  X  24 = 36 + 48 = 84 km</p><p>Boat N:</p><p>Upstream speed = 24 &#8722; 6 = 18 km/h</p><p>Downstream speed = 24 + 6 = 30 km/h</p><p>Distance N = 2  X  18 + 4  X  30 = 36 + 120 = 156 km</p><p>Hence, the required ratio = 84:156 = 7:13</p>",

    "question": "<span class=\"eqt\"><p>Peter got 35% of the maximum marks in an examination and failed by 12 marks. However, Paul got 45% of the total marks and scored 18 marks more than the passing marks. What were the passing marks in the examination?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2368;&#2335;&#2352; &#2325;&#2379; &#2319;&#2325; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2309;&#2343;&#2367;&#2325;&#2340;&#2350; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; 35% &#2309;&#2306;&#2325; &#2350;&#2367;&#2354;&#2366; &#2324;&#2352; &#2357;&#2361; 12 &#2309;&#2306;&#2325;&#2379;&#2306; &#2360;&#2375; &#2309;&#2344;&#2369;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2361;&#2379; &#2327;&#2351;&#2366;&#2404; &#2332;&#2348;&#2325;&#2367; &#2346;&#2377;&#2354; &#2325;&#2379; &#2325;&#2369;&#2354; &#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2366; 45% &#2309;&#2306;&#2325; &#2350;&#2367;&#2354;&#2366; &#2324;&#2352; &#2313;&#2360;&#2344;&#2375; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2309;&#2306;&#2325;&#2379;&#2306; &#2360;&#2375; 18 &#2309;&#2306;&#2325; &#2309;&#2343;&#2367;&#2325; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2325;&#2367;&#2319;&#2404; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2309;&#2306;&#2325; &#2325;&#2367;&#2340;&#2344;&#2375; &#2341;&#2375;?</p></span>",

    "solution": "<p>Logic: let maximum = x; passing = P.</p><p>Peter: (35/100)x + 12 = P</p><p>Paul: (45/100)x &#8722; 18 = P</p><p>0.35x + 12 = 0.45x &#8722; 18</p><p>0.10x = 30</p><p>x = 300</p><p>Passing = 0.35 X 300 + 12 = 105 + 12 = 117</p>",

    "question": "<span class=\"eqt\"><p>Two drone pilots, stationed at points C and D, are observing the top of a tall radio tower. Pilot C is just 6 meters away from the base of the tower, while Pilot D is much farther back at 96 meters from the base of the tower  -  both on the same straight runway. Pilot C tilts their drone camera upward at an angle of 54&deg; to capture the top of the tower, while Pilot D does the same but at an angle of 36&deg;. Find the height of the tower.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2348;&#2367;&#2306;&#2342;&#2369; C &#2324;&#2352; D &#2346;&#2352; &#2340;&#2376;&#2344;&#2366;&#2340; &#2342;&#2379; &#2337;&#2381;&#2352;&#2379;&#2344; &#2346;&#2366;&#2351;&#2354;&#2335; &#2319;&#2325; &#2314;&#2305;&#2330;&#2375; &#2352;&#2375;&#2337;&#2367;&#2351;&#2379; &#2335;&#2366;&#2357;&#2352; &#2325;&#2375; &#2358;&#2367;&#2326;&#2352; &#2325;&#2366; &#2344;&#2367;&#2352;&#2368;&#2325;&#2381;&#2359;&#2339; &#2325;&#2352; &#2352;&#2361;&#2375; &#2361;&#2376;&#2306;&#2404; &#2346;&#2366;&#2351;&#2354;&#2335; C &#2335;&#2366;&#2357;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2360;&#2375; &#2325;&#2375;&#2357;&#2354; 6 &#2350;&#2368;&#2335;&#2352; &#2342;&#2370;&#2352; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2351;&#2354;&#2335; D &#2335;&#2366;&#2357;&#2352; &#2325;&#2375; &#2310;&#2343;&#2366;&#2352; &#2360;&#2375; 96 &#2350;&#2368;&#2335;&#2352; &#2346;&#2368;&#2331;&#2375; &#2361;&#2376; - &#2342;&#2379;&#2344;&#2379;&#2306; &#2319;&#2325; &#2361;&#2368; &#2360;&#2368;&#2343;&#2375; &#2352;&#2344;&#2357;&#2375; &#2346;&#2352; &#2361;&#2376;&#2306;&#2404; &#2346;&#2366;&#2351;&#2354;&#2335; C &#2335;&#2366;&#2357;&#2352; &#2325;&#2375; &#2358;&#2367;&#2326;&#2352; &#2325;&#2379; &#2325;&#2376;&#2342; &#2325;&#2352;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2309;&#2346;&#2344;&#2375; &#2337;&#2381;&#2352;&#2379;&#2344; &#2325;&#2376;&#2350;&#2352;&#2375; &#2325;&#2379; 54&deg; &#2325;&#2375; &#2325;&#2379;&#2339; &#2346;&#2352; &#2314;&#2346;&#2352; &#2325;&#2368; &#2323;&#2352; &#2333;&#2369;&#2325;&#2366;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2348;&#2325;&#2367; &#2346;&#2366;&#2351;&#2354;&#2335; D &#2349;&#2368; &#2320;&#2360;&#2366; &#2361;&#2368; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;, &#2354;&#2375;&#2325;&#2367;&#2344; 36&deg; &#2325;&#2375; &#2325;&#2379;&#2339; &#2346;&#2352;&#2404; &#2335;&#2366;&#2357;&#2352; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">24 m</span><span class=\"hqt\" style=\"display:none\">24 &#2350;&#2368;&#2335;&#2352;</span>",

    "correct_option_id": 0,
    "solution": "<p>Let height of tower = H m</p><p><img width=486 height=243 id=\"Picture 8\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p27673/image006.jpg\" ></p><p>In &#916; ABC,</p><p>Tan54&deg; = H/6</p><p>H = 6 * tan54&deg;... (1)</p><p>In &#916; ABD,</p><p>Tan36&deg; = H/96</p><p>H = 96 * tan36&deg;... (2)</p><p>From equation (1) and (2),</p><p>H<sup>2</sup> = 96 * 6 * tan54 * tan36</p><p>H<sup>2</sup> = 576 * tan54 * cot54</p><p>H = &radic;576</p><p>H = 24 m</p>",

    "question": "<span class=\"eqt\"><p>The length and height of a cuboid are 2 times and 1.5 times of its breadth respectively. If breadth, length and height are decreased by 40%, 20% and 30% respectively, then by what percentage the volume of the cuboid will be decreased?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2319;&#2325; &#2328;&#2344;&#2366;&#2349; &#2325;&#2368; &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; &#2313;&#2360;&#2325;&#2368; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312; &#2325;&#2368; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 2 &#2327;&#2369;&#2344;&#2366; &#2324;&#2352; 1.5 &#2327;&#2369;&#2344;&#2366; &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2330;&#2380;&#2337;&#2364;&#2366;&#2312;, &#2354;&#2306;&#2348;&#2366;&#2312; &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; &#2350;&#2375;&#2306; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 40%, 20% &#2324;&#2352; 30% &#2325;&#2368; &#2325;&#2350;&#2368; &#2325;&#2368; &#2332;&#2366;&#2340;&#2368; &#2361;&#2376;, &#2340;&#2379; &#2328;&#2344;&#2366;&#2349; &#2325;&#2375; &#2310;&#2351;&#2340;&#2344; &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2325;&#2368; &#2325;&#2350;&#2368; &#2361;&#2379;&#2327;&#2368;?</p></span>",
    "options": [
      "<span class=\"eqt\">66.4%</span><span class=\"hqt\" style=\"display:none\">66.4%</span>",
      "<span class=\"eqt\">48.5%</span><span class=\"hqt\" style=\"display:none\">48.5%</span>",
      "<span class=\"eqt\">98.2%</span><span class=\"hqt\" style=\"display:none\">98.2%</span>",
      "<span class=\"eqt\">72.4%</span><span class=\"hqt\" style=\"display:none\">72.4%</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Let initial breadth = 100x cm, initial length = 200x cm and initial height = 150x cm</p><p>So, initial volume = 100x * 200x * 150x = 3000000x<sup>3</sup> cm<sup>3</sup></p><p>Now, decreased breadth = 60x cm</p><p>Decreased length = 200x * 80/100 = 160x cm</p><p>And decreased height = 150x * 70/100 = 105x cm</p><p>Thus, decreased volume = 60x * 160x * 105x = 1008000x<sup>3</sup> cm<sup>3</sup></p><p>So, % decrease in volume = (3000000x<sup>3</sup>  -  1008000x<sup>3</sup>)/3000000x<sup>3</sup> * 100 = 1992000/3000000 * 100 = 66.4%</p><p></p><p>Alternate method:</p><p>Let length, breadth and height of the cuboid be l, b and h respectively.</p><p>Initial volume of cuboid = lbh</p><p>Decreased volume = 0.8l * 0.6b * 0.7h = 0.336 * lbh</p><p>So, % decrease in volume = (1 - 0.336)lbh/(lbh) * 100 = 66.4%</p>",
    "question_index": 66
  },
  {
    "question": "<span class=\"eqt\"><p>Two candidates A and B appear for an exam. If the probability of A and B are 1/6 and 3/8 respectively for getting passed in the exam, then find the probability that both A and B will fail in the exam. </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2379; &#2309;&#2349;&#2381;&#2351;&#2352;&#2381;&#2341;&#2368; A &#2324;&#2352; B &#2319;&#2325; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2313;&#2346;&#2360;&#2381;&#2341;&#2367;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404; &#2351;&#2342;&#2367; A &#2324;&#2352; B &#2325;&#2375; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; 1/6 &#2324;&#2352; 3/8 &#2361;&#2376;, &#2340;&#2379; A &#2324;&#2352; B &#2342;&#2379;&#2344;&#2379;&#2306; &#2325;&#2375; &#2346;&#2352;&#2368;&#2325;&#2381;&#2359;&#2366; &#2350;&#2375;&#2306; &#2309;&#2344;&#2369;&#2340;&#2381;&#2340;&#2368;&#2352;&#2381;&#2339; &#2361;&#2379;&#2344;&#2375; &#2325;&#2368; &#2346;&#2381;&#2352;&#2366;&#2351;&#2367;&#2325;&#2340;&#2366; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">25/48</span><span class=\"hqt\" style=\"display:none\">25/48</span>",
      "<span class=\"eqt\">5/24</span><span class=\"hqt\" style=\"display:none\">5/24</span>",
      "<span class=\"eqt\">5/48</span><span class=\"hqt\" style=\"display:none\">5/48</span>",
      "<span class=\"eqt\">13/24</span><span class=\"hqt\" style=\"display:none\">13/24</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>The probability of A to fail in the exam = 1  -  1/6 = 5/6</p><p>The probability of B to fail in the exam = 1  -  3/8 = 5/8</p><p>So, the required probability = 5/6 * 5/8 = 25/48</p>",
    "question_index": 67
  },

    "solution": "<p>When 7 men and 12 women work together for 3 hrs/day for 5 days:</p><p>Let the total work be 3 * 5 = 15 units.</p><p>So, work done per day = 15/5 = 3 units</p><p>And work done per hour = 3/3 = 1 units</p><p>Let 1 woman does w units/hr and 1 man does m units/hr.</p><p>So, from the first case:</p><p>12w + 7m = 1 .. (i)</p><p>From the second case, total work done by the women = 3 * 5 * 8 * w = 120w units</p><p>And the total work done by the men = 5 * 4 * 7 * m = 140m units</p><p>120w + 140m = 15</p><p>8w + 28m/3 = 1</p><p>24w + 28m = 3 .. (ii)</p><p>From (i) and (ii),</p><p>w = 1/24 and m = 1/14</p><p>So, when 2 women and 3 men work together, work done per hour = 2 * (1/24) + 3 * (1/14) = 1/12 + 3/14 = 25/84 units</p><p>When they work for 3(3/5) = 18/5 days, no. of hours required = 15/{(25/84) * (18/5)} = 14 hrs</p><p>So, they worked for 14 hrs per day.</p>",
    "question_index": 69
  },

    "question": "<span class=\"eqt\"><p>Study the following information carefully and answer the related question.</p><p>The following pie-chart represents the percentage break-up of the number of teachers in schools A, B, C, D, and E.</p><p><img width=431 height=282 id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15270/image003.png\"></p><p>Female teachers in school B are 12 more than the number of male teachers in the same school and the respective ratio of male to female teachers in school B is 3: 7. If the respective ratio of male teachers in schools A, B, and D is 2: 3: 5 respectively, then how many more female teachers are in school A as compared to that in school D?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2332;&#2366;&#2344;&#2325;&#2366;&#2352;&#2368; &#2325;&#2366; &#2343;&#2381;&#2351;&#2366;&#2344;&#2346;&#2370;&#2352;&#2381;&#2357;&#2325; &#2309;&#2343;&#2381;&#2351;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2306;&#2348;&#2306;&#2343;&#2367;&#2340; &#2346;&#2381;&#2352;&#2358;&#2381;&#2344; &#2325;&#2366; &#2313;&#2340;&#2381;&#2340;&#2352; &#2342;&#2375;&#2306;&#2404;</p><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2346;&#2366;&#2312;-&#2330;&#2366;&#2352;&#2381;&#2335; &#2360;&#2381;&#2325;&#2370;&#2354; A, B, C, D &#2324;&#2352; E &#2350;&#2375;&#2306; &#2358;&#2367;&#2325;&#2381;&#2359;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2325;&#2375; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2357;&#2367;&#2349;&#2366;&#2332;&#2344; &#2325;&#2379; &#2342;&#2352;&#2381;&#2358;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p><img width=431 height=282 id=\"Chart 3\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p15270/image003.png\"></p><p>&#2360;&#2381;&#2325;&#2370;&#2354; B &#2350;&#2375;&#2306; &#2350;&#2361;&#2367;&#2354;&#2366; &#2358;&#2367;&#2325;&#2381;&#2359;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2313;&#2360;&#2368; &#2360;&#2381;&#2325;&#2370;&#2354; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359; &#2358;&#2367;&#2325;&#2381;&#2359;&#2325;&#2379;&#2306; &#2325;&#2368; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366; &#2360;&#2375; 12 &#2309;&#2343;&#2367;&#2325; &#2361;&#2376; &#2324;&#2352; &#2360;&#2381;&#2325;&#2370;&#2354; B &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359; &#2324;&#2352; &#2350;&#2361;&#2367;&#2354;&#2366; &#2358;&#2367;&#2325;&#2381;&#2359;&#2325;&#2379;&#2306; &#2325;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 3: 7 &#2361;&#2376;&#2404; &#2351;&#2342;&#2367; &#2360;&#2381;&#2325;&#2370;&#2354; A, B &#2324;&#2352; D &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2369;&#2359; &#2358;&#2367;&#2325;&#2381;&#2359;&#2325;&#2379;&#2306; &#2325;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; 2: 3: 5 &#2361;&#2376;, &#2340;&#2379; &#2360;&#2381;&#2325;&#2370;&#2354; D &#2325;&#2368; &#2340;&#2369;&#2354;&#2344;&#2366; &#2350;&#2375;&#2306; &#2360;&#2381;&#2325;&#2370;&#2354; A &#2350;&#2375;&#2306; &#2325;&#2367;&#2340;&#2344;&#2368; &#2309;&#2343;&#2367;&#2325; &#2350;&#2361;&#2367;&#2354;&#2366; &#2358;&#2367;&#2325;&#2381;&#2359;&#2325; &#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">6</span><span class=\"hqt\" style=\"display:none\">6</span>",
      "<span class=\"eqt\">11</span><span class=\"hqt\" style=\"display:none\">11</span>",
      "<span class=\"eqt\">9</span><span class=\"hqt\" style=\"display:none\">9</span>",
      "<span class=\"eqt\">3</span><span class=\"hqt\" style=\"display:none\">3</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Female teachers in school B are 12 more than the number of male teachers in the same school and the respective ratio of male to female teachers in school B is 3: 7. </p><p>Number of male teachers in school B = 12 * 3/(7  -  3) = 9</p><p>Number of female teachers in school B = 9 + 12 = 21</p><p>Number of teachers in school B = 9 + 21 = 30</p><p>Total number of teachers in all given schools = 30 * 100/15 = 200</p><p>Number of teachers in school A = 13% of 200 = 26</p><p>Number of teachers in school D = 19% of 200 = 38</p><p>The respective ratio of male teachers in schools A, B, and D is 2: 3: 5 respectively. Then, </p><p>Number of male teachers in school A = 9 * 2/3 = 6 </p><p>Number of male teachers in school D = 9 * 5/3 = 15</p><p>Now, number of female teachers in school A = 26  -  6 = 20</p><p>Number of female teachers in school D = 38  -  15 = 23</p><p>Therefore, difference = 23  -  20 = <b>3</b></p>",
    "question_index": 71

></div> &#2361;&#2376;, &#2340;&#2379; A &#2325;&#2375; &#2350;&#2366;&#2344; &#2340;&#2341;&#2366; A &#2324;&#2352; B &#2325;&#2375; &#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2375; &#2309;&#2306;&#2340;&#2352; &#2325;&#2366; &#2309;&#2344;&#2369;&#2346;&#2366;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404;</div></p></span>",

    "question": "<span class=\"eqt\"><p>From a wooden solid cylinder of base radius 7 cm and height 14 cm, a cone is cut. The height and base radius of cone are half of height and half of base radius of cylinder respectively. Find the percentage of wood wasted in the process. (upto two decimal)</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2343;&#2366;&#2352; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; 7 &#2360;&#2375;&#2350;&#2368; &#2324;&#2352; &#2314;&#2306;&#2330;&#2366;&#2312; 14 &#2360;&#2375;&#2350;&#2368; &#2325;&#2375; &#2354;&#2325;&#2337;&#2364;&#2368; &#2325;&#2375; &#2336;&#2379;&#2360; &#2348;&#2375;&#2354;&#2344; &#2360;&#2375; &#2319;&#2325; &#2358;&#2306;&#2325;&#2369; &#2325;&#2366;&#2335;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404; &#2358;&#2306;&#2325;&#2369; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2324;&#2352; &#2310;&#2343;&#2366;&#2352; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2381;&#2352;&#2350;&#2358;&#2307; &#2348;&#2375;&#2354;&#2344; &#2325;&#2368; &#2314;&#2305;&#2330;&#2366;&#2312; &#2325;&#2368; &#2310;&#2343;&#2368; &#2324;&#2352; &#2310;&#2343;&#2366;&#2352; &#2340;&#2381;&#2352;&#2367;&#2332;&#2381;&#2351;&#2366; &#2325;&#2368; &#2310;&#2343;&#2368; &#2361;&#2376;&#2404; &#2311;&#2360; &#2346;&#2381;&#2352;&#2325;&#2381;&#2352;&#2367;&#2351;&#2366; &#2350;&#2375;&#2306; &#2326;&#2352;&#2366;&#2348; &#2361;&#2369;&#2312; &#2354;&#2325;&#2337;&#2364;&#2368; &#2325;&#2366; &#2346;&#2381;&#2352;&#2340;&#2367;&#2358;&#2340; &#2332;&#2381;&#2334;&#2366;&#2340; &#2325;&#2368;&#2332;&#2367;&#2319;&#2404; (&#2342;&#2358;&#2350;&#2354;&#2357; &#2325;&#2375; &#2342;&#2379; &#2360;&#2381;&#2341;&#2366;&#2344; &#2340;&#2325;)</p></span>",
    "options": [
      "<span class=\"eqt\">90.24%</span><span class=\"hqt\" style=\"display:none\">90.24%</span>",

      "<span class=\"eqt\">88.27%</span><span class=\"hqt\" style=\"display:none\">88.27%</span>",
      "<span class=\"eqt\">78.16%</span><span class=\"hqt\" style=\"display:none\">78.16%</span>"

    "correct_option_id": 1,
    "solution": "<p>Volume of cylinder = &#960;r<sup>2</sup>h = &#960;*7*7*14 cubic cm</p><p>Volume of cone = 1/3* &#960;*r<sup>2</sup>*h = 1/3* &#960;* (7/2)* (7/2)* 7 cubic cm</p><p>Amount of wood wasted = Volume of cylinder  -  Volume of cone</p><p>= &#960;*7*7*14 - 1/3* &#960;* (7/2)* (7/2)* 7</p><p>= 49&#960;* (14  -  7/12)</p><p>= 49&#960;* 161/12 cubic cm</p><p>Required Percentage = [(49&#960;* 161/12)/ (&#960;*7*7*14)]* 100</p><p>= 161* 25/42 = 95.83%</p><p>Short method:</p><p>Volume of cylinder = &#960;r<sup>2</sup>h</p><p>Volume of cone = 1/3 * &#960;(r/2)<sup>2</sup>(h/2) = 1/24 * &#960;r<sup>2</sup>h</p><p>Amount of wood wasted = Volume of cylinder  -  Volume of cone = 23/24 * &#960;r<sup>2</sup>h</p><p>Required percentage = (23/24 * &#960;r<sup>2</sup>h)/( &#960;r<sup>2</sup>h) * 100 = 95.83%</p>",

    "question": "<p>Select the word from the sentence below, which is an antonym for the word 'zeal'.</p><p>A noticeable sense of apathy spread through the voters, who felt their concerns were being completely ignored by all politicians.</p>",
    "options": [
      "Apathy",
      "Voters",
      "Concerns",
      "Ignored"
    ],
    "correct_option_id": 0,
    "solution": "<p>The word \"zeal\" means great energy, enthusiasm, or passion in pursuit of a cause or an objective. We are looking for a word from the sentence that means the opposite.</p><p>&#183; a) Apathy  -  means a lack of interest, enthusiasm, or concern. This is the direct antonym of \"zeal\".</p><p>&#183; b) Voters  -  people who vote, especially in an election. This is a noun referring to people, not a state of being.</p><p>&#183; c) Concerns  -  matters of interest or importance to someone. These might cause zeal or apathy, but are not opposites of the given word.</p><p>&#183; d) Ignored  -  a verb meaning to fail to consider something. This is an action, not the quality of apathy.</p><p>Hence, option (a) is the correct answer.</p>",
    "question_index": 75
  },

  {
    "question": "<p>Select the option that expresses the given sentence in indirect speech.</p><p>My grandfather said to me, \"I bought this antique wooden grandfather clock from a small shop in Switzerland.\"</p>",
    "options": [
      "My grandfather told me that he bought that antique wooden grandfather clock from a small shop in Switzerland.",
      "My grandfather told me that he had bought that antique wooden grandfather clock from a small shop in Switzerland.",
      "My grandfather told me that I had bought that antique wooden grandfather clock from a small shop in Switzerland.",
      "My grandfather told me that he had bought this antique wooden grandfather clock from a small shop in Switzerland."
    ],
    "correct_option_id": 1,
    "solution": "<p>The sentence in the Direct Speech is in <b>Past Simple Tense</b>. Therefore, the sentence in the Indirect Speech should be in <b>Past Perfect Tense</b>.</p><p>Past Simple (Subject + V2 + Object) should be converted into Past Perfect (Subject + had + V3 + Object).</p><p>For example:</p><p>He said, \"Arya sent me a book.\" (Direct Speech)</p><p>He said that Arya had sent him a book. (Indirect Speech)</p><p>The following things in the sentence should change when changed from Direct speech to Indirect Speech:</p><p>\"Said to\" changes to \"told\".</p><p>\"I\" changes to \"he\".</p><p>\"Bought\" (Past Simple) changes to \"had bought\" (Past Perfect).</p><p>\"This\" changes to \"that\".</p><p>Therefore, the correct answer is: \"My grandfather told me that he had bought that antique wooden grandfather clock from a small shop in Switzerland.\"</p><p>Hence, option (b) is correct.</p>",
    "question_index": 77
  },

    "question": "<p>Parts of the following sentence have been underlined and given as options. Select the option that contains an error.</p><p>Despite being offered <u>a significant promotion</u> and <u>a higher salary</u>, <u>the employee chosen to</u> remain <u>in his current role</u>.</p>",
    "options": [
      "a significant promotion",
      "a higher salary",
      "the employee chosen to",
      "in his current role"
    ],
    "correct_option_id": 2,
    "solution": "<p>The error is in the segment \"the employee chosen to\". The sentence requires a main verb in the simple past tense to indicate the action the employee took. \"Chosen\" is the past participle (V3) form of the verb \"choose\", and it would require an auxiliary verb before it, which is not present in the given statement. It cannot function as the main verb of a simple past tense clause on its own. The simple past tense (V2) form is \"chose\".</p><p>Correct sentence: Despite being offered a significant promotion and a higher salary, the employee <b>chose</b> to remain in his current role.</p><p>Hence, option (c) is the correct answer.</p><p><b>Note:</b></p><p>&#183; <b>V2 -&gt; Past form of verb (-ed form or irregular verb):</b> This is the simple past tense form, e.g., \"chose\".</p><p>&#183; <b>V3 -&gt; Past participle form of verb (-ed, -d, -t, -en, or -n):</b> This form is used in perfect tenses (e.g., \"has chosen\") or passive voice (e.g., \"was chosen\"), not as a standalone simple past verb.</p><p>&#183; <b>Participle:</b> A word formed from a verb (e.g. going, gone, being, been) and used as an adjective (e.g. working woman, burnt toast) or a noun (e.g. good breeding). In English, participles are also used to make compound verb forms (e.g. is going, has been). Consider the sentences given below:</p><p>Dancing at the party, the women fell on the ground.</p><p>Encouraged by her parents, Rita went on to pursue her passion.</p><p>The highlighted word in the first sentence is of the form Verb + ing and is used as a present participle. It is used to denote an action that is going on or incomplete or imperfect.</p><p>The highlighted word in the second sentence is of the form verb + ed. It is used as a past participle. It denotes the completed action or state of the thing spoken of.</p><p>A past participle ends with the following: -ed, -d, -t, -en, or -n.</p><p>One should take great care and never get confused between a gerund and a present participle. They use the same forms but perform different functions: a gerund is a verbal noun, while a present participle is a verbal adjective. (In \"Despite being offered...\", \"being offered\" involves a present participle \"being\" and a past participle \"offered\" used in a passive construction.)</p>",
    "question_index": 85
  },

    "question": "<p>Select the option that will improve the given sentence by using the most appropriate verb.</p><p>You must to wear a helmet when you ride a motorcycle.</p>",
    "options": [
      "You must wore a helmet when you ride a motorcycle.",
      "You must be wear a helmet when you ride a motorcycle.",
      "You must wearing a helmet when you ride a motorcycle.",
      "You must wear a helmet when you ride a motorcycle."
    ],
    "correct_option_id": 3,
    "solution": "<p>The sentence uses the modal verb \"<b>must</b>.\" Modal verbs (like <i>can, could, will, should, may, might, must</i>) express necessity, possibility, permission, or ability.</p><p>The fundamental rule for modal verbs is: <b>subject + modal verb + base form of the verb (without \"to\" preceding it)</b></p><p>The original sentence, \"You must <b>to wear</b>...\", is incorrect because it includes \"to\" after the modal verb \"must\" and before the main verb \"wear\".</p><p>Option (d) correctly follows the rule by using the base form of the verb, <b>\"wear,\"</b> directly after \"must\" without \"to\".</p><p><b>Hence, option (d) is the correct answer. </b></p><p>Option a): \"Wore\" is the simple past tense of the verb \"wear.\" Modal verbs must be followed by the base form, not a past tense form.</p><p>Option b): The verb combination \"must be wear\" is not grammatically correct. While we can say \"must be wearing\" (future continuous) or \"must be worn\" (passive voice), we cannot follow \"must be\" with a base verb like \"wear.\"</p><p>Option c): \"Wearing\" is the -ing form of the verb. Modal verbs must be followed by the base form, not the -ing form.</p><p><b>Note: Modal verb:</b> A verb used with another verb to express an idea, such as the possibility that is not expressed by the main verb. The modal verbs in English are \"can,\" \"could,\" \"may,\" \"might,\" \"must,\" \"ought,\" \"shall,\" \"should,\" \"will,\" and \"would.\" They do not change their form (spelling) and they have no infinitive or participle (past/present). Example: I can speak Spanish. Here 'can' expresses the ability of the person to speak (main verb) Spanish. This ability cannot be expressed by the main verb 'speak'.</p><p>Passive voice is a grammatical construction where the subject of the sentence is acted upon rather than performing the action. In passive voice, the focus is on the action or the recipient of the action rather than the doer.</p><p>Examples:</p><p>Active Voice: \"The chef cooked the meal.\"</p><p>Passive Voice: \"The meal was cooked by the chef.\"</p>",

    "solution": "<p>The subject of the Passive Voice (\"The symphony\") is changed into the object of the Active Voice. Also, the object of the Passive Voice (\"the nation's most prestigious orchestra\") is changed into the subject of the Active Voice.</p><p>The usage of a \"to be\" form of the verb (\"was\" in the original sentence) is characteristic of the Passive Voice. To convert to Active Voice, this helping verb is removed, and the main verb is changed to its simple past form.</p><p>In the Passive Voice, the preposition \"by\" is used before the agent (the one performing the action). This preposition is removed when converting to the Active Voice.</p><p>The Passive Voice in this question is in the <b>Simple Past Tense</b>. Thus, the Active voice must also be in the <b>Simple Past Tense</b> to retain the original meaning.</p><p>The format of the Simple Past Passive is: <b>Subject + was/were + V3 + by + Object.</b></p><p>&#183; \"The symphony (Subject) + was + performed (V3) + by + the nation's most prestigious orchestra (Object).\"</p><p>Thus, in the Active Voice, the format will be: <b>Object of the passive (as Subject) + V2 + Subject of the passive (as Object).</b></p><p>&#183; \"The nation's most prestigious orchestra (Subject) + performed (V2) + the symphony (Object).\"</p><p>For example:</p><p>The novel was written by the author. (Passive Voice)</p><p>The author wrote the novel. (Active Voice)</p><p>The options except (a) do not follow the correct grammatical transformation.</p><p>&#183; Option (b) is still in the passive voice, merely reordering the clauses.</p><p>&#183; Option (c) changes the sentence structure to a causative form (\"had his symphony performed\"), which is not a direct active conversion.</p><p>&#183; Option (d) incorrectly changes the tense to the Present Continuous (\"is performing\").</p><p>Therefore, the correct answer is <b>option (a): The nation's most prestigious orchestra performed the symphony, composed by a virtually unknown musician from a small village, for the first time.</b></p>",
