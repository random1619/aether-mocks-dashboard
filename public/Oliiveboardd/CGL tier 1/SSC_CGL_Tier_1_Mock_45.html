<!DOCTYPE html>
<html lang="en">
<head>

    <title>cgl1 - Responsive Exam Interface</title>

<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> cgl1 - Responsive Exam Interface</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">cgl1 - Responsive Exam Interface</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>

                    </div>

                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

ing:5px;\"></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"></td></tr></table><p>Similarly,</p><table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">C (3)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">O (15)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">R (18)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">A (1)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">L (12)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">CORAL</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">3 X 2=6</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">15 X 3=45</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">18 X 2=36</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">1 X 3=3</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">12 X 2=24</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>6-45-36-3-24</b></td></tr></table><p>Thus, the answer is option (d).</p>",

    "options": [
      "<span class=\"eqt\">Develop and distribute new science textbooks and laboratory equipment.</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2312; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2346;&#2366;&#2336;&#2381;&#2351;&#2346;&#2369;&#2360;&#2381;&#2340;&#2325;&#2379;&#2306; &#2324;&#2352; &#2346;&#2381;&#2352;&#2351;&#2379;&#2327;&#2358;&#2366;&#2354;&#2366; &#2313;&#2346;&#2325;&#2352;&#2339;&#2379;&#2306; &#2325;&#2366; &#2357;&#2367;&#2325;&#2366;&#2360; &#2324;&#2352; &#2357;&#2367;&#2340;&#2352;&#2339; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Train primary school teachers in innovative science teaching methods.</span><span class=\"hqt\" style=\"display:none\">&#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351; &#2325;&#2375; &#2358;&#2367;&#2325;&#2381;&#2359;&#2325;&#2379;&#2306; &#2325;&#2379; &#2344;&#2357;&#2368;&#2344; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2358;&#2367;&#2325;&#2381;&#2359;&#2339; &#2357;&#2367;&#2343;&#2367;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2358;&#2367;&#2325;&#2381;&#2359;&#2367;&#2340; &#2325;&#2352;&#2344;&#2366;&#2404;</span>",
      "<span class=\"eqt\">Launch a community-based science outreach program.</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2350;&#2369;&#2342;&#2366;&#2351;-&#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2310;&#2313;&#2335;&#2352;&#2368;&#2330; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350; &#2358;&#2369;&#2352;&#2370; &#2325;&#2352;&#2375;&#2306;&#2404;</span>",
      "<span class=\"eqt\">Give students a stipend amount for taking an interest in science.</span><span class=\"hqt\" style=\"display:none\">&#2357;&#2367;&#2332;&#2381;&#2334;&#2366;&#2344; &#2350;&#2375;&#2306; &#2352;&#2369;&#2330;&#2367; &#2354;&#2375;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2331;&#2366;&#2340;&#2381;&#2352;&#2379;&#2306; &#2325;&#2379; &#2357;&#2332;&#2368;&#2347;&#2366; &#2352;&#2366;&#2358;&#2367; &#2342;&#2375;&#2306;&#2404;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>Training primary school teachers in innovative science teaching methods is a strategic and effective approach to improving science education in primary schools. Teachers are the key influencers in students' learning experiences. By providing training in innovative science teaching methods, we enhance teachers' capacity to make science more engaging and comprehensible for students. The training can cover modern pedagogical techniques, hands-on learning strategies, and the integration of technology in science education. Moreover, investing in teacher training has a lasting impact on the education system. Teachers, once trained, can continue to apply and adapt their knowledge over the years, positively influencing multiple cohorts of students. Hence, (b) is the correct answer. </p><p>Option (a)  -  Textbooks and equipment may become outdated quickly, requiring frequent updates and additional costs. The mere provision of material does not guarantee effective teaching; teachers need training to maximize the use of resources.</p><p>Option (c)  -  Outreach programs may have limited reach and impact, as not all students may have access to these activities. Sustainability could be a concern, as community programs may be dependent on external funding.</p><p>Option (d)  -  Providing stipends may not directly address the quality of science education; students need effective teaching methods to develop a genuine interest in the subject. There's a risk that students may be motivated by the stipend rather than a true passion for science, leading to superficial engagement.</p>",

    "question": "<span class=\"eqt\"><p>By interchanging the given two numbers (not digits), which of the following equations will be correct?</p><p>9 and 14</p><p>I. (- 14) + 12 x 8 + 9 - 851 &div; 23 = 64</p><p>II. 22 &div; 2 + 8 + 2 x 9 = 56 - 14</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2342;&#2368; &#2327;&#2312; &#2342;&#2379; &#2360;&#2306;&#2326;&#2381;&#2351;&#2366;&#2323;&#2306; (&#2309;&#2306;&#2325;&#2379;&#2306; &#2325;&#2379; &#2344;&#2361;&#2368;&#2306;) &#2325;&#2379; &#2310;&#2346;&#2360; &#2350;&#2375;&#2306; &#2348;&#2342;&#2354;&#2344;&#2375; &#2346;&#2352;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2360;&#2350;&#2368;&#2325;&#2352;&#2339; &#2360;&#2361;&#2368; &#2361;&#2379;&#2327;&#2366;?</p><p>9 &#2324;&#2352; 14</p><p>I. (- 14) + 12 x 8 + 9 - 851 &div; 23 = 64</p><p>II. 22 &div; 2 + 8 + 2 x 9 = 56 - 14</p></span>",

    "solution": "<p>In this type of format,</p><p><img width=154 height=204 id=\"Picture 25\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p19838/image030.jpg\"></p><p>@ lies opposite $; * lies opposite to + and ! lies opposite to &amp;.</p><p>&#183; Figure I: XII lies opposite XV; XVI lies opposite to XIII and XI lies opposite to XIV. Thus, XII is not adjacent to XV, XVI is not adjacent to XIII and XI is not adjacent to XIV. So, figure I is correct.</p><p>&#183; Figure II: XV lies opposite XIV; XI lies opposite to XIII and XII lies opposite to XVI. Thus, XV is not adjacent to XIV, XI is not adjacent to XIII and XII is not adjacent to XVI. So, figure II is incorrect.</p><p>&#183; Figure III: XIII lies opposite XVI; XII lies opposite to XI and XV lies opposite to XIV. Thus, XIII is not adjacent to XVI, XII is not adjacent to XI and XV is not adjacent to XIV. So, figure III is incorrect.</p><p>&#183; Figure IV: XII lies opposite XIV; XVI lies opposite to XIII and XI lies opposite to XV. Thus, XII is not adjacent to XIV, XVI is not adjacent to XIII and XI is not adjacent to XV. So, figure IV is incorrect.</p>",

    "question": "<span class=\"eqt\"><p>In a certain language, BEHALF is coded as AEFBIR and FABLED is coded as EAZXBL. How will MICKLE be coded in the same language?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2325;&#2367;&#2360;&#2368; &#2344;&#2367;&#2358;&#2381;&#2330;&#2367;&#2340; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306;, BEHALF &#2325;&#2379; AEFBIR &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376; &#2324;&#2352; FABLED &#2325;&#2379; EAZXBL &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2361;&#2376;&#2404; &#2360;&#2350;&#2366;&#2344; &#2349;&#2366;&#2359;&#2366; &#2350;&#2375;&#2306; MICKLE &#2325;&#2379; &#2325;&#2367;&#2360; &#2346;&#2381;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379;&#2337;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2319;&#2327;&#2366;?</p></span>",

    "question": "<span class=\"eqt\"><p>Three Statements are given followed by Three conclusions numbered I, II and III. Assuming the statements to be true, even if they seem to be at variance with commonly known facts, decide which of the conclusions logically follow(s) from the statements.</p><p><b>Statements:</b></p><p>Some Wheels are Rolls</p><p>All Rolls are Circle</p><p>No Rolls is Swing</p><p><b>Conclusions:</b></p><p>I. All Wheels are Circle</p><p>II. Some Wheels are Circle</p><p>III. Some Circle are not Swing</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2340;&#2368;&#2344; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2342; &#2340;&#2368;&#2344; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2325;&#2381;&#2352;&#2350;&#2366;&#2306;&#2325;&#2367;&#2340; I, II &#2324;&#2352; III &#2342;&#2367;&#2319; &#2327;&#2319; &#2361;&#2376;&#2306;&#2404; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2379; &#2360;&#2340;&#2381;&#2351; &#2350;&#2366;&#2344;&#2340;&#2375; &#2361;&#2369;&#2319;, &#2349;&#2354;&#2375; &#2361;&#2368; &#2357;&#2375; &#2310;&#2350; &#2340;&#2380;&#2352; &#2346;&#2352; &#2332;&#2381;&#2334;&#2366;&#2340; &#2340;&#2341;&#2381;&#2351;&#2379;&#2306; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2346;&#2381;&#2352;&#2340;&#2368;&#2340; &#2361;&#2379;&#2340;&#2375; &#2361;&#2379;&#2306;, &#2351;&#2361; &#2344;&#2367;&#2352;&#2381;&#2343;&#2366;&#2352;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306; &#2325;&#2367; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; &#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2340;&#2366;&#2352;&#2381;&#2325;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;/&#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;&#2404;</p><p><b>&#2325;&#2341;&#2344;:</b></p><p>&#2325;&#2369;&#2331; &#2346;&#2361;&#2367;&#2319;, &#2352;&#2379;&#2354; &#2361;&#2376;&#2306;</p><p>&#2360;&#2349;&#2368; &#2352;&#2379;&#2354;, &#2357;&#2371;&#2340;&#2381;&#2340; &#2361;&#2376;&#2306;</p><p>&#2325;&#2379;&#2312; &#2352;&#2379;&#2354;, &#2333;&#2370;&#2354;&#2366; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;</p><p><b>&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359;:</b></p><p>I. &#2360;&#2349;&#2368; &#2346;&#2361;&#2367;&#2319;, &#2357;&#2371;&#2340;&#2381;&#2340; &#2361;&#2376;&#2306;</p><p>II. &#2325;&#2369;&#2331; &#2346;&#2361;&#2367;&#2319;, &#2357;&#2371;&#2340;&#2381;&#2340; &#2361;&#2376;&#2306;</p><p>III. &#2325;&#2369;&#2331; &#2357;&#2371;&#2340;&#2381;&#2340;, &#2333;&#2370;&#2354;&#2375; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;&#2306;</p></span>",
    "options": [
      "<span class=\"eqt\">Only conclusion I follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both conclusions II and III follow</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; II &#2324;&#2352; III &#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Only conclusions III follows</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; III &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;</span>",
      "<span class=\"eqt\">Both conclusions I and II follow</span><span class=\"hqt\" style=\"display:none\">&#2344;&#2367;&#2359;&#2381;&#2325;&#2352;&#2381;&#2359; I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306; &#2309;&#2344;&#2369;&#2360;&#2352;&#2339; &#2325;&#2352;&#2340;&#2375; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p><b>Statements:</b></p><p>Some Wheels are Rolls</p><p>All Rolls are Circle</p><p>No Rolls is Swing</p><p><b><img width=371 height=161 src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p26508/image036.png\"></b></p><p>All Wheels are Circle: Some Wheels are Rolls. All Rolls are Circle. Thus, Some Wheels are Circle. So, conclusion I does not follows.</p><p>Some Wheels are Circle: Some Wheels are Rolls. All Rolls are Circle. Thus, Some Wheels are Circle. So, conclusion II follows.</p><p>Some Circle are not Swing: All Rolls are Circle. No Rolls is Swing. Thus, the Circle which are Rolls are not Swing. So, conclusion III follows.</p><p>Hence, Both conclusions II and III follow.</p>",

    "question": "<span class=\"eqt\"><p>Which of the following statements is/are true?</p><p>A. Finance Minister Nirmala Sitharaman announced the creation of Makhana Board in Bihar in the Union Budget 2025.</p><p>B. Bihar accounts for 90% of the makhana produced in the country, producing 10,000 tonnes of makhana per annum.</p><p>C. Makhana received the Geographical Indication (GI) tag as 'Mithila Makhana' in April 2022.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A. &#2357;&#2367;&#2340;&#2381;&#2340; &#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2344;&#2367;&#2352;&#2381;&#2350;&#2354;&#2366; &#2360;&#2368;&#2340;&#2366;&#2352;&#2350;&#2339; &#2344;&#2375; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2348;&#2332;&#2335; 2025 &#2350;&#2375;&#2306; &#2348;&#2367;&#2361;&#2366;&#2352; &#2350;&#2375;&#2306; &#2350;&#2326;&#2366;&#2344;&#2366; &#2348;&#2379;&#2352;&#2381;&#2337; &#2348;&#2344;&#2366;&#2344;&#2375; &#2325;&#2368; &#2328;&#2379;&#2359;&#2339;&#2366; &#2325;&#2368;&#2404;</p><p>B. &#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2367;&#2340; &#2350;&#2326;&#2366;&#2344;&#2366; &#2325;&#2366; 90% &#2361;&#2367;&#2360;&#2381;&#2360;&#2366; &#2348;&#2367;&#2361;&#2366;&#2352; &#2350;&#2375;&#2306; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;, &#2332;&#2379; &#2346;&#2381;&#2352;&#2340;&#2367; &#2357;&#2352;&#2381;&#2359; 10,000 &#2335;&#2344; &#2350;&#2326;&#2366;&#2344;&#2366; &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>C. &#2350;&#2326;&#2366;&#2344;&#2366; &#2325;&#2379; &#2309;&#2346;&#2381;&#2352;&#2376;&#2354; 2022 &#2350;&#2375;&#2306; '&#2350;&#2367;&#2341;&#2367;&#2354;&#2366; &#2350;&#2326;&#2366;&#2344;&#2366;' &#2325;&#2375; &#2352;&#2370;&#2346; &#2350;&#2375;&#2306; &#2349;&#2380;&#2327;&#2379;&#2354;&#2367;&#2325; &#2360;&#2306;&#2325;&#2375;&#2340; (&#2332;&#2368;&#2310;&#2312;) &#2335;&#2376;&#2327; &#2346;&#2381;&#2352;&#2366;&#2346;&#2381;&#2340; &#2361;&#2369;&#2310;&#2404;</p></span>",

    "solution": "<p>Finance Minister Nirmala Sitharaman announced the creation of Makhana Board in Bihar in the Union Budget 2025.</p><p>Makhana Board will be established in Bihar to improve processing, value addition.</p><p>The board will provide handholding and trade related technologies. It will also work to ensure farmers receive benefits of all relevant government schemes.</p><p>Makhana received the Geographical Indication (GI) tag as 'Mithila Makhana' in April 2022, which further skyrocketed its popularity.</p><p>Reports suggest, the prices rose from just Rs 1000 a kilo 10 years ago to as high as Rs 8,000 per kg. Bihar accounts for 90% of the makhana produced in the country, producing 10,000 tonnes of makhana per annum.</p>",

    "question": "<span class=\"eqt\"><p>Consider the following events:</p><p>I. Communal Award</p><p>II. Formation of the All India Muslim League</p><p>III. Observance of Day of deliverance.</p><p>Arrange the above-mentioned events chronologically.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2328;&#2335;&#2344;&#2366;&#2323;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2360;&#2366;&#2306;&#2346;&#2381;&#2352;&#2342;&#2366;&#2351;&#2367;&#2325; &#2346;&#2369;&#2352;&#2360;&#2381;&#2325;&#2366;&#2352;</p><p>II. &#2309;&#2326;&#2367;&#2354; &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2350;&#2369;&#2360;&#2381;&#2354;&#2367;&#2350; &#2354;&#2368;&#2327; &#2325;&#2366; &#2327;&#2336;&#2344;</p><p>III. &#2350;&#2369;&#2325;&#2381;&#2340;&#2367; &#2342;&#2367;&#2357;&#2360; &#2325;&#2366; &#2346;&#2366;&#2354;&#2344;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2328;&#2335;&#2344;&#2366;&#2323;&#2306; &#2325;&#2379; &#2325;&#2366;&#2354;&#2366;&#2344;&#2369;&#2325;&#2381;&#2352;&#2350;&#2367;&#2325; &#2352;&#2370;&#2346; &#2360;&#2375; &#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2367;&#2340; &#2325;&#2352;&#2375;&#2306;&#2404;</p></span>",

      "<span class=\"eqt\">II- III- I</span><span class=\"hqt\" style=\"display:none\">II- III- I</span>",
      "<span class=\"eqt\">I- II- III</span><span class=\"hqt\" style=\"display:none\">I- II- III</span>"

    "correct_option_id": 1,
    "solution": "<p><b>All India Muslim League was formally inaugurated in 1906</b>. The league aims to protect the interests of the Muslims in the country and promote the feelings of loyalty towards the British Government.</p><p><b>Communal Award (1932)</b> widened the gap between the Hindus and Muslims. It was announced by the British prime minister Ramsay MacDonald to grant the separate electorates in India for the Forward Caste, Scheduled Caste, Muslims, Buddhists, Sikhs, Indian Christians, Anglo-Indians, Europeans and Depressed Classes.</p><p>The Muslim League observed a '<b>Day of Deliverance and Thanks-giving'</b> when the congress ministries resigned in <b>October 1939</b> over the war issue.</p>",

    "question": "<span class=\"eqt\"><p>With reference to 'Khuallam dance' consider the following statements and select the correct option.</p><p>a) Khuallam literary means 'Dance of the Guests'.</p><p>b) It is a dance usually performed in the ceremony called 'Khuangchawi'.</p><p>c) It is performed during significant cultural events to celebrate fellowship and unity.</p></span><span class=\"hqt\" style=\"display:none\"><p>'&#2326;&#2369;&#2309;&#2354;&#2381;&#2354;&#2350; &#2344;&#2371;&#2340;&#2381;&#2351;' &#2325;&#2375; &#2360;&#2306;&#2342;&#2352;&#2381;&#2349; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306; &#2324;&#2352; &#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p><p>a) &#2326;&#2369;&#2354;&#2381;&#2354;&#2350; &#2325;&#2366; &#2358;&#2366;&#2348;&#2381;&#2342;&#2367;&#2325; &#2309;&#2352;&#2381;&#2341; &#2361;&#2376; '&#2350;&#2375;&#2361;&#2350;&#2366;&#2344;&#2379;&#2306; &#2325;&#2366; &#2344;&#2371;&#2340;&#2381;&#2351;'&#2404;</p><p>b) &#2351;&#2361; &#2310;&#2350;&#2340;&#2380;&#2352; &#2346;&#2352; '&#2326;&#2369;&#2310;&#2306;&#2327;&#2330;&#2357;&#2368;' &#2344;&#2366;&#2350;&#2325; &#2360;&#2350;&#2366;&#2352;&#2379;&#2361; &#2350;&#2375;&#2306; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2344;&#2371;&#2340;&#2381;&#2351; &#2361;&#2376;&#2404;</p><p>c) &#2351;&#2361; &#2349;&#2366;&#2312;&#2330;&#2366;&#2352;&#2375; &#2324;&#2352; &#2319;&#2325;&#2340;&#2366; &#2325;&#2366; &#2332;&#2358;&#2381;&#2344; &#2350;&#2344;&#2366;&#2344;&#2375; &#2325;&#2375; &#2354;&#2367;&#2319; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2360;&#2366;&#2306;&#2360;&#2381;&#2325;&#2371;&#2340;&#2367;&#2325; &#2325;&#2366;&#2352;&#2381;&#2351;&#2325;&#2381;&#2352;&#2350;&#2379;&#2306; &#2325;&#2375; &#2342;&#2380;&#2352;&#2366;&#2344; &#2325;&#2367;&#2351;&#2366; &#2332;&#2366;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">a, b, c</span><span class=\"hqt\" style=\"display:none\">a, b, c</span>",
      "<span class=\"eqt\">Both b and c</span><span class=\"hqt\" style=\"display:none\">b &#2324;&#2352; c &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Both a and c</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; c &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Both a and b</span><span class=\"hqt\" style=\"display:none\">a &#2324;&#2352; b &#2342;&#2379;&#2344;&#2379;&#2306;</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Khuallam is a traditional dance of the Mizo community. It is performed during significant cultural events to celebrate fellowship and unity.</p><p>Khuallam literary means 'Dance of the Guests'.</p><p>It is a dance usually performed in the ceremony called 'Khuangchawi'.</p><p>In order to claim a distinguished place in the society and to have a place in paradise or Pialral one has to attain the coveted title of 'Thangchhuah'.</p><p>There are two ways of attaining this title. Firstly one could attain the title Thangchhuah by proving one's mettle in war or in hunting by killing many animals which should include animals like barking,deer, wild boar, bear, wild gayal, viper, hawk etc.</p><p>Secondly one could also get the title of Thangchhuah by performing feats and dances. Thangchhuah therefore could be attained only by the brave or by the rich. The ceremonies performed in the second method are known as Khuangchawi.</p><p></p>",

  },

    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct regarding the Disaster Management (Amendment) Bill, 2024?</p><p>A.The Disaster Management (Amendment) Bill, 2024 was introduced in Lok Sabha on August 1, 2024. The Bill amends the Disaster Management Act, 2005.</p><p>B.The Bill empowers the state government to constitute a separate Urban Disaster Management Authority for state capitals and cities with a municipal corporation. </p><p>C.The Bill provides statutory status to existing bodies such as the National Crisis Management Committee (NCMC) and the High Level Committee (HLC). </p></span><span class=\"hqt\" style=\"display:none\"><p>&#2310;&#2346;&#2342;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; (&#2360;&#2306;&#2358;&#2379;&#2343;&#2344;) &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;, 2024 &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A.&#2310;&#2346;&#2342;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; (&#2360;&#2306;&#2358;&#2379;&#2343;&#2344;) &#2357;&#2367;&#2343;&#2375;&#2351;&#2325;, 2024 1 &#2309;&#2327;&#2360;&#2381;&#2340;, 2024 &#2325;&#2379; &#2354;&#2379;&#2325;&#2360;&#2349;&#2366; &#2350;&#2375;&#2306; &#2346;&#2381;&#2352;&#2360;&#2381;&#2340;&#2369;&#2340; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404; &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2310;&#2346;&#2342;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2309;&#2343;&#2367;&#2344;&#2367;&#2351;&#2350;, 2005 &#2350;&#2375;&#2306; &#2360;&#2306;&#2358;&#2379;&#2343;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>B. &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2352;&#2366;&#2332;&#2381;&#2351; &#2360;&#2352;&#2325;&#2366;&#2352; &#2325;&#2379; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2368; &#2352;&#2366;&#2332;&#2343;&#2366;&#2344;&#2367;&#2351;&#2379;&#2306; &#2324;&#2352; &#2344;&#2327;&#2352; &#2344;&#2367;&#2327;&#2350; &#2357;&#2366;&#2354;&#2375; &#2358;&#2361;&#2352;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2319;&#2325; &#2309;&#2354;&#2327; &#2358;&#2361;&#2352;&#2368; &#2310;&#2346;&#2342;&#2366; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2346;&#2381;&#2352;&#2366;&#2343;&#2367;&#2325;&#2352;&#2339; &#2327;&#2336;&#2367;&#2340; &#2325;&#2352;&#2344;&#2375; &#2325;&#2366; &#2309;&#2343;&#2367;&#2325;&#2366;&#2352; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>C. &#2357;&#2367;&#2343;&#2375;&#2351;&#2325; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2360;&#2306;&#2325;&#2335; &#2346;&#2381;&#2352;&#2348;&#2306;&#2343;&#2344; &#2360;&#2350;&#2367;&#2340;&#2367; (NCMC) &#2324;&#2352; &#2313;&#2330;&#2381;&#2330; &#2360;&#2381;&#2340;&#2352;&#2368;&#2351; &#2360;&#2350;&#2367;&#2340;&#2367; (HLC) &#2332;&#2376;&#2360;&#2375; &#2350;&#2380;&#2332;&#2370;&#2342;&#2366; &#2344;&#2367;&#2325;&#2366;&#2351;&#2379;&#2306; &#2325;&#2379; &#2357;&#2376;&#2343;&#2366;&#2344;&#2367;&#2325; &#2342;&#2352;&#2381;&#2332;&#2366; &#2346;&#2381;&#2352;&#2342;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">A and B only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2324;&#2352; B</span>",
      "<span class=\"eqt\">B and C only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B &#2324;&#2352; C</span>",
      "<span class=\"eqt\">A, B and C</span><span class=\"hqt\" style=\"display:none\">A, B &#2324;&#2352; C</span>",
      "<span class=\"eqt\">A and C only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2324;&#2352; C</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; The Disaster Management (Amendment) Bill, 2024 was introduced in Lok Sabha on August 1, 2024. The Bill amends the Disaster Management Act, 2005. The Act establishes: (i) National Disaster Management Authority (NDMA), (ii) State Disaster Management Authority (SDMA), and (iii) District Disaster Management Authority. These authorities are responsible for disaster management at the national, state, and district level, respectively. </p><p>&bull; <b>Urban Disaster Management Authorities: </b>The Bill empowers the state government to constitute a separate Urban Disaster Management Authority for state capitals and cities with a municipal corporation. The Urban Authority will comprise the Municipal Commissioner as the chairperson, the District Collector as the vice chairperson, and other members specified by the state government. It will prepare and implement the disaster management plan for the area under it.</p><p>&bull; <b>Statutory status to existing committees:</b> The Bill provides statutory status to existing bodies such as the National Crisis Management Committee (NCMC) and the High Level Committee (HLC). The NCMC will function as the nodal body for dealing with major disasters with serious or national ramifications. The HLC will provide financial assistance to state governments during disasters. It will approve financial assistance from the National Disaster Mitigation Fund. The Cabinet Secretary will serve as the chairperson of NCMC. Minister of the department with administrative control over disaster management will serve as chairperson of the HLC.</p><p>&bull; <b>Preparation of disaster management plans: </b>The Act provides for the constitution of a National Executive Committee and a State Executive Committee to assist NDMA and SDMA in performing their functions. A key function of these Committees is preparing national and state disaster management plans, respectively. NDMA and SDMA approve the respective plans and coordinate their implementation. The Bill instead provides that NDMA and SDMA will prepare disaster management plans.</p><p>&bull; <b>Functions of NDMA and SDMA:</b> Under the Act, key functions of NDMA and SDMA at their respective levels include: (i) reviewing the disaster management plans of government departments, (ii) setting guidelines for preparation of disaster management plans for authorities below them, and (iii) recommending provision of funds for disaster mitigation. The Bill adds certain functions for these authorities at their respective levels. These include: (i) taking periodic stock of disaster risks, including emerging risks from extreme climate events, (ii) providing technical assistance to authorities below them, (iii) recommending guidelines for minimum standards of relief, and (iv) preparing national and state disaster databases, respectively. The databases will contain information on: (i) the type and severity of disaster risks, (ii) allocation of funds and expenditure, and (iii) disaster preparedness and mitigation plans. Functions of NDMA will also include: (i) assessing disaster preparedness of states, and (ii) undertaking post-disaster audit of preparedness and response.</p><p>&bull; The Bill also empowers NDMA to make regulations under the Act with prior approval of the central government.</p><p>&bull; <b>Formation of State Disaster Response Force: </b>The Act provides for the constitution of a National Disaster Response Force for specialist response to disaster situations. The Bill empowers the state government to constitute a State Disaster Response Force (SDRF). The state government will define the functions of SDRF and prescribe the terms of service for its members.</p><p>&bull; <b>Appointments to NDMA:</b> The Act provides that the central government will provide NDMA with officers, consultants, and employees, as it considers necessary. The Bill instead empowers NDMA to specify the number and category of officers and employees, with previous approval of the central government. NDMA may also appoint experts and consultants as necessary.</p>",
    "question_index": 29
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements are Correct?</p><p>I. National Waterway-2 : Connects Allahabad to Haldia</p><p>II. National Waterway-3 : Connects Kottapuram to Kollam</p><p>III. National Waterway-4 : Connects Kakinada to Puducherry</p><p>Choose the Correct option</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2332;&#2354;&#2350;&#2366;&#2352;&#2381;&#2327;-2: &#2311;&#2354;&#2366;&#2361;&#2366;&#2348;&#2366;&#2342; &#2325;&#2379; &#2361;&#2354;&#2381;&#2342;&#2367;&#2351;&#2366; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;</p><p>II. &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2332;&#2354;&#2350;&#2366;&#2352;&#2381;&#2327;-3: &#2325;&#2379;&#2335;&#2381;&#2335;&#2366;&#2346;&#2369;&#2352;&#2350; &#2325;&#2379; &#2325;&#2379;&#2354;&#2381;&#2354;&#2350; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;</p><p>III. &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2332;&#2354;&#2350;&#2366;&#2352;&#2381;&#2327;-4: &#2325;&#2366;&#2325;&#2368;&#2344;&#2366;&#2337;&#2366; &#2325;&#2379; &#2346;&#2369;&#2337;&#2369;&#2330;&#2375;&#2352;&#2368; &#2360;&#2375; &#2332;&#2379;&#2337;&#2364;&#2340;&#2366; &#2361;&#2376;</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;</p></span>",

      "<span class=\"eqt\">II &amp; III Only.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I, II &amp; III.</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">I &amp; III Only.</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>"

    "correct_option_id": 1,
    "solution": "<p>Details on National Waterways:</p><p>National waterway 1: Ganga-Bhagirathi-Hooghly River System (Haldia - Allahabad)</p><p>National waterway 2: Brahmaputra River (Dhubri - Sadiya)</p><p>National Waterway 3: West Coast Canal (Kottapuram - Kollam), Champakara and Udyogmandal Canals</p><p>National Waterway 4: Krishna River (Vijayawada - Muktyala), connects Kakinada to Puducherry</p><p>National Waterway 5: Dhamra-Paradio via Mangalagadi to Pankopal</p><p>National Waterway 8: Alappuzha- Changanassery Canal</p><p>National Waterway 9: Alappuzha-Kottayam  Athirampuzha Canal</p>",

    "question": "<span class=\"eqt\"><p>Important sub-tributaries of the river Ganga is/are</p><p>I. Chambal</p><p>II. Betwa</p><p>III. Ramganga</p><p>IV. Kosi</p><p>Select the answer using the codes given below.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2327;&#2306;&#2327;&#2366; &#2344;&#2342;&#2368; &#2325;&#2368; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2313;&#2346;-&#2360;&#2361;&#2366;&#2351;&#2325; &#2344;&#2342;&#2368;/&#2344;&#2342;&#2367;&#2351;&#2366;&#2305; &#2361;&#2376;/&#2361;&#2376;&#2306;:</p><p>I. &#2330;&#2306;&#2348;&#2354;</p><p>II. &#2348;&#2375;&#2340;&#2357;&#2366;</p><p>III. &#2352;&#2366;&#2350;&#2327;&#2306;&#2327;&#2366;</p><p>IV. &#2325;&#2379;&#2360;&#2368;</p><p>&#2344;&#2368;&#2330;&#2375; &#2342;&#2367;&#2319; &#2327;&#2319; &#2325;&#2379;&#2337; &#2325;&#2366; &#2313;&#2346;&#2351;&#2379;&#2327; &#2325;&#2352;&#2325;&#2375; &#2313;&#2340;&#2381;&#2340;&#2352; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">I, II, III and IV</span><span class=\"hqt\" style=\"display:none\">I, II, III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">II, III and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II, III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I and II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">II only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>Ganga is one of the important rivers of the country. It traverses through states Uttarakhand, Uttar Pradesh, Bihar and West Bengal.</p><p><b>Sub tributary of river</b> is tributary of important tributaries of main river. The Yamuna, the Ramganga, the Ghaghara, the Gandak, the Kosi, the Mahananda and the Sone are the important tributaries of the Ganga.</p><p><b>Rivers Chambal and Betwa</b> are the important sub-tributaries, which join the Yamuna before it meets the Ganga.</p><p>Source- India Yearbook</p>",
    "question_index": 31
  },

    "question": "<span class=\"eqt\"><p>Select the incorrect statement(s) regarding first five year plan:</p><p>I. It was for the years 1951-1956.</p><p>II. It was based on the Harrod Domar Model.</p><p>III. It stressed more on agriculture.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2341;&#2350; &#2346;&#2306;&#2330;&#2357;&#2352;&#2381;&#2359;&#2368;&#2351; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2327;&#2354;&#2340; &#2325;&#2341;&#2344;/&#2325;&#2341;&#2344;&#2379;&#2306; &#2325;&#2366; &#2330;&#2351;&#2344; &#2325;&#2352;&#2375;&#2306; :</p><p>I. &#2351;&#2361; &#2357;&#2352;&#2381;&#2359; 1951-1956 &#2340;&#2325; &#2325;&#2375; &#2354;&#2367;&#2319; &#2341;&#2368;&#2404;</p><p>II. &#2351;&#2361; &#2361;&#2366;&#2352;&#2381;&#2352;&#2337;-&#2337;&#2379;&#2350;&#2352; &#2350;&#2377;&#2337;&#2354; &#2346;&#2352; &#2310;&#2343;&#2366;&#2352;&#2367;&#2340; &#2341;&#2368;&#2404;</p><p>III. &#2311;&#2360;&#2350;&#2375;&#2306; &#2325;&#2371;&#2359;&#2367; &#2346;&#2352; &#2309;&#2343;&#2367;&#2325; &#2348;&#2354; &#2342;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">ONLY I and II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">ONLY I and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",

    "question": "<span class=\"eqt\"><p>Which of the following statement is/are true regarding Pradhan Mantri Awas Yojana-Urban?</p><p>A. It was launched on June 25, 2015.</p><p>B. It was launched by the Ministry of Housing and Urban Affairs (MoHUA).</p><p>C. It intended to provide housing for all in urban areas by year 2022.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2346;&#2381;&#2352;&#2343;&#2366;&#2344;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2310;&#2357;&#2366;&#2360; &#2351;&#2379;&#2332;&#2344;&#2366;-&#2358;&#2361;&#2352;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>A. &#2311;&#2360;&#2375; 25 &#2332;&#2370;&#2344; 2015 &#2325;&#2379; &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>B. &#2311;&#2360;&#2375; &#2310;&#2357;&#2366;&#2360; &#2324;&#2352; &#2358;&#2361;&#2352;&#2368; &#2350;&#2366;&#2350;&#2354;&#2379;&#2306; &#2325;&#2375; &#2350;&#2306;&#2340;&#2381;&#2352;&#2366;&#2354;&#2351; (MoHUA) &#2342;&#2381;&#2357;&#2366;&#2352;&#2366; &#2354;&#2377;&#2344;&#2381;&#2330; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>C. &#2311;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2357;&#2352;&#2381;&#2359; 2022 &#2340;&#2325; &#2358;&#2361;&#2352;&#2368; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352;&#2379;&#2306; &#2350;&#2375;&#2306; &#2360;&#2349;&#2368; &#2325;&#2375; &#2354;&#2367;&#2319; &#2310;&#2357;&#2366;&#2360; &#2313;&#2346;&#2354;&#2348;&#2381;&#2343; &#2325;&#2352;&#2366;&#2344;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">Only B and C</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B &#2324;&#2352; C</span>",
      "<span class=\"eqt\">Only A and B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A &#2324;&#2352; B</span>",
      "<span class=\"eqt\">A, B and C</span><span class=\"hqt\" style=\"display:none\">A, B, C</span>"
    ],
    "correct_option_id": 3,
    "solution": "<p>Pradhan Mantri Awas Yojana - Urban (PMAY-U)(74) a flagship Mission of Government of India being implemented by Ministry of Housing and Urban Affairs (MoHUA), was launched on 25th June 2015.</p><p>The Mission addresses urban housing shortage among the EWS/LIG and MIG categories including the slum dwellers by ensuring a pucca house to all eligible urban households by the year 2022.</p><p></p>",
    "question_index": 34
  },
  {
    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct?</p><p>I. Gross value added (GVA) is an economic productivity metric that measures the contribution of a corporate subsidiary, company, or municipality to an economy, producer, sector, or region.</p><p>II.GVA is the output of the country less the intermediate consumption, which is the difference between gross output and net output.</p><p>III.GVA gives the picture from the consumers' side or demand perspective.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p><p>I. &#2360;&#2325;&#2354; &#2350;&#2370;&#2354;&#2381;&#2351; &#2357;&#2352;&#2381;&#2343;&#2367;&#2340; (GVA) &#2319;&#2325; &#2310;&#2352;&#2381;&#2341;&#2367;&#2325; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2325;&#2340;&#2366; &#2350;&#2368;&#2335;&#2381;&#2352;&#2367;&#2325; &#2361;&#2376; &#2332;&#2379; &#2325;&#2367;&#2360;&#2368; &#2309;&#2352;&#2381;&#2341;&#2357;&#2381;&#2351;&#2357;&#2360;&#2381;&#2341;&#2366;, &#2344;&#2367;&#2352;&#2381;&#2350;&#2366;&#2340;&#2366;, &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2351;&#2366; &#2325;&#2381;&#2359;&#2375;&#2340;&#2381;&#2352; &#2350;&#2375;&#2306; &#2325;&#2377;&#2352;&#2381;&#2346;&#2379;&#2352;&#2375;&#2335; &#2360;&#2361;&#2366;&#2351;&#2325;, &#2325;&#2306;&#2346;&#2344;&#2368; &#2351;&#2366; &#2344;&#2327;&#2352;&#2346;&#2366;&#2354;&#2367;&#2325;&#2366; &#2325;&#2375; &#2351;&#2379;&#2327;&#2342;&#2366;&#2344; &#2325;&#2379; &#2350;&#2366;&#2346;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>II. GVA &#2342;&#2375;&#2358; &#2325;&#2366; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2350; &#2350;&#2343;&#2381;&#2351;&#2357;&#2352;&#2381;&#2340;&#2368; &#2326;&#2346;&#2340; &#2361;&#2376;, &#2332;&#2379; &#2360;&#2325;&#2354; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2324;&#2352; &#2358;&#2369;&#2342;&#2381;&#2343; &#2313;&#2340;&#2381;&#2346;&#2366;&#2342;&#2344; &#2325;&#2375; &#2348;&#2368;&#2330; &#2325;&#2366; &#2309;&#2306;&#2340;&#2352; &#2361;&#2376;&#2404;</p><p>III.GVA &#2313;&#2346;&#2349;&#2379;&#2325;&#2381;&#2340;&#2366;&#2323;&#2306; &#2325;&#2375; &#2346;&#2325;&#2381;&#2359; &#2351;&#2366; &#2350;&#2366;&#2306;&#2327; &#2325;&#2375; &#2344;&#2332;&#2352;&#2367;&#2319; &#2360;&#2375; &#2331;&#2357;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only I and II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; II</span>",
      "<span class=\"eqt\">I,II and III</span><span class=\"hqt\" style=\"display:none\">I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only I and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">Only II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>Gross value added (GVA) is an economic productivity metric that measures the contribution of a corporate subsidiary, company, or municipality to an economy, producer, sector, or region.</p><p>GVA is the output of the country less the intermediate consumption, which is the difference between gross output and net output.</p><p>GVA is a measure of total output and income in the economy. It provides the rupee value for the amount of goods and services produced in an economy after deducting the cost of inputs and raw materials that have gone into the production of those goods and services. GVA gives a picture of the state of economic activity from the producers' side or supply side, the GDP model gives the picture from the consumers' side or demand perspective.</p>",
    "question_index": 35
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following pairs.</p><p><b>Traditional seasons  : Months</b></p><p>I. Vasanta    :           January-February</p><p>II. Shishira   :          March-April</p><p>III. Hemanta    :         November-December</p><p>IV. Sharad       :        September-October</p><p>Which of the above pairs is/are correctly matched?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2351;&#2369;&#2327;&#2381;&#2350;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p><b>&#2346;&#2366;&#2352;&#2306;&#2346;&#2352;&#2367;&#2325; &#2350;&#2380;&#2360;&#2350;: &#2350;&#2361;&#2368;&#2344;&#2375;</b></p><p>I. &#2357;&#2360;&#2306;&#2340;: &#2332;&#2344;&#2357;&#2352;&#2368;-&#2347;&#2364;&#2352;&#2357;&#2352;&#2368;</p><p>II. &#2358;&#2367;&#2358;&#2367;&#2352;: &#2350;&#2366;&#2352;&#2381;&#2330;-&#2309;&#2346;&#2381;&#2352;&#2376;&#2354;</p><p>III. &#2361;&#2375;&#2350;&#2306;&#2340;: &#2344;&#2357;&#2306;&#2348;&#2352;-&#2342;&#2367;&#2360;&#2306;&#2348;&#2352;</p><p>IV. &#2358;&#2352;&#2342;: &#2360;&#2367;&#2340;&#2306;&#2348;&#2352;-&#2309;&#2325;&#2381;&#2335;&#2370;&#2348;&#2352;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2351;&#2369;&#2327;&#2381;&#2350; &#2360;&#2361;&#2368; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I, II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I, II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">II and III only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II &#2324;&#2352; III</span>",
      "<span class=\"eqt\">III and IV only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; III &#2324;&#2352; IV</span>",
      "<span class=\"eqt\">I, II, III and IV</span><span class=\"hqt\" style=\"display:none\">I, II, III &#2324;&#2352; IV</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Pairs I and II are incorrectly matched. Pairs III and IV are correctly matched.</b></p><p>In the Indian tradition, a year is divided into six two-monthly seasons. This cycle of seasons, which the common people in north and central India follow is based on their practical experience and age-old perception of weather phenomena.</p><p>However, this system does not match with the seasons of south India where there is little variation in the seasons.</p><p><img width=498 height=238 id=\"Picture 1\" src=\"https://u1.oliveboard.in/exams/solution/oliveimg/p7842/image002.jpg\"></p><p>Source: 11<sup>th</sup> std.- NCERT</p>",
    "question_index": 36
  },
  {
    "question": "<span class=\"eqt\"><p>Consider the following statements about Directive Principles of State Policy in the Constitution of India. Which of the following statements are true?</p><p>a) It consists the idea of welfare state</p><p>b) Article 39A calls for Equal Justice and Free legal aid</p><p>c) Article 45 calls for Uniform Civil code of Citizen</p><p>Choose the correct option.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2350;&#2375;&#2306; &#2352;&#2366;&#2332;&#2381;&#2351; &#2344;&#2368;&#2340;&#2367; &#2325;&#2375; &#2344;&#2367;&#2352;&#2381;&#2342;&#2375;&#2358;&#2325; &#2360;&#2367;&#2342;&#2381;&#2343;&#2366;&#2306;&#2340;&#2379;&#2306; &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;&#2404; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p><p>a) &#2311;&#2360;&#2350;&#2375;&#2306; &#2325;&#2354;&#2381;&#2351;&#2366;&#2339;&#2325;&#2366;&#2352;&#2368; &#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2357;&#2367;&#2330;&#2366;&#2352; &#2358;&#2366;&#2350;&#2367;&#2354; &#2361;&#2376;&#2404;</p><p>b) &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 39A &#2360;&#2350;&#2366;&#2344; &#2344;&#2381;&#2351;&#2366;&#2351; &#2324;&#2352; &#2350;&#2369;&#2347;&#2381;&#2340; &#2325;&#2366;&#2344;&#2370;&#2344;&#2368; &#2360;&#2361;&#2366;&#2351;&#2340;&#2366; &#2325;&#2366; &#2310;&#2361;&#2381;&#2357;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>c) &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 45 &#2344;&#2366;&#2327;&#2352;&#2367;&#2325;&#2379;&#2306; &#2325;&#2375; &#2354;&#2367;&#2319; &#2360;&#2350;&#2366;&#2344; &#2344;&#2366;&#2327;&#2352;&#2367;&#2325; &#2360;&#2306;&#2361;&#2367;&#2340;&#2366; &#2325;&#2366; &#2310;&#2361;&#2381;&#2357;&#2366;&#2344; &#2325;&#2352;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only a and b</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; a &#2324;&#2352; b</span>",
      "<span class=\"eqt\">Only b and c</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; b &#2324;&#2352; c</span>",
      "<span class=\"eqt\">All of the above</span><span class=\"hqt\" style=\"display:none\">&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2360;&#2349;&#2368;</span>",
      "<span class=\"eqt\">Only c and a</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; c &#2324;&#2352; a</span>"
    ],
    "correct_option_id": 0,
    "solution": "<p>&bull; DPSP consist the idea of welfare state</p><p>&bull; Article 39A calls for Equal Justice and Free Legal aid</p><p>&bull; Article 44 calls for Uniform Civil code of Citizen</p><p>Further Insight:</p><p>&bull; Directive Principles of State Policy (DPSPs) with Articles</p><p>&#9675; Promotion of welfare of people - Article 38</p><p>&#9675; Securing a uniform civil code - Article 44</p><p>&#9675; Adequate livelihood for all - Article 39(a)</p><p>&#9675; Equal pay for equal work - Article 39(d)</p><p>&#9675; Provision for childhood and youth protection - Article 39(e) &amp; (f)</p><p>&#9675; Promotion of education and economic interests of weaker sections - Article 45 &amp; 46</p><p>&#9675; Right to adequate nutrition and public health - Article 47</p><p>&#9675; Environmental protection and improvement - Article 48A</p><p>&#9675; Protection and improvement of forests and wildlife - Article 48A</p><p>&#9675; Promotion of international peace and security - Article 51</p><p>&#9675; Participation of workers in management of industries - Article 43A</p><p>&#9675; Provision of a just and humane condition of work and maternity relief - Article 42</p><p>&#9675; Promotion of village panchayats - Article 40</p><p>&#9675; Ensuring the right to work, education, and public assistance - Article 41</p><p>&#9675; Organizing agriculture and animal husbandry - Article 48</p><p>&#9675; Duties of the state to secure a living wage, decent standard of living, and leisure - Article 43</p>",
    "question_index": 37
  },

    "question": "<span class=\"eqt\"><p>The Battle of Diu in 1509 was significant because:</p></span><span class=\"hqt\" style=\"display:none\"><p>1509 &#2350;&#2375;&#2306; &#2342;&#2368;&#2357; &#2325;&#2366; &#2351;&#2369;&#2342;&#2381;&#2343; &#2350;&#2361;&#2340;&#2381;&#2357;&#2346;&#2370;&#2352;&#2381;&#2339; &#2341;&#2366; &#2325;&#2381;&#2351;&#2379;&#2306;&#2325;&#2367;:</p></span>",
    "options": [
      "<span class=\"eqt\">It marked the beginning of Mughal rule in India.&#8203;</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2344;&#2375; &#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2350;&#2369;&#2327;&#2354; &#2358;&#2366;&#2360;&#2344; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2379; &#2330;&#2367;&#2361;&#2381;&#2344;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">It established Portuguese naval dominance in the Indian Ocean.</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2344;&#2375; &#2361;&#2367;&#2306;&#2342; &#2350;&#2361;&#2366;&#2360;&#2366;&#2327;&#2352; &#2350;&#2375;&#2306; &#2346;&#2369;&#2352;&#2381;&#2340;&#2327;&#2366;&#2354;&#2368; &#2344;&#2380;&#2360;&#2376;&#2344;&#2367;&#2325; &#2346;&#2381;&#2352;&#2349;&#2369;&#2340;&#2381;&#2357; &#2360;&#2381;&#2341;&#2366;&#2346;&#2367;&#2340; &#2325;&#2367;&#2351;&#2366;&#2404;</span>",
      "<span class=\"eqt\">It led to the foundation of the British East India Company.&#8203;</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2312;&#2360;&#2381;&#2335; &#2311;&#2306;&#2337;&#2367;&#2351;&#2366; &#2325;&#2306;&#2346;&#2344;&#2368; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; &#2361;&#2369;&#2312;&#2404;</span>",
      "<span class=\"eqt\">It resulted in the decline of the Vijayanagara Empire.&#8203;</span><span class=\"hqt\" style=\"display:none\">&#2311;&#2360;&#2325;&#2375; &#2346;&#2352;&#2367;&#2339;&#2366;&#2350;&#2360;&#2381;&#2357;&#2352;&#2370;&#2346; &#2357;&#2367;&#2332;&#2351;&#2344;&#2327;&#2352; &#2360;&#2366;&#2350;&#2381;&#2352;&#2366;&#2332;&#2381;&#2351; &#2325;&#2366; &#2346;&#2340;&#2344; &#2361;&#2379; &#2327;&#2351;&#2366;&#2404;&#8203;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>&bull; The Battle of Diu in 1509 was a pivotal naval engagement where the Portuguese defeated a joint fleet of the Zamorin of Calicut, the Sultan of Gujarat, and the Mamluk Sultanate of Egypt, establishing Portuguese naval supremacy in the Indian Ocean.&#8203;</p><p>&bull; Mughal rule began with Babur's victory in the First Battle of Panipat in 1526.&#8203;</p><p>&bull; The British East India Company was founded in 1600</p><p>&bull; The decline of the Vijayanagara Empire occurred after the Battle of Talikota in 1565.</p>",
    "question_index": 38
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements is true about the Goods and Services Tax (GST) in India?</p><p>I. It was implemented on July 1, 2017.</p><p>II. GST replaced only central indirect taxes.</p><p>III. It aims to create a unified national market.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2350;&#2375;&#2306; &#2357;&#2360;&#2381;&#2340;&#2369; &#2319;&#2357;&#2306; &#2360;&#2375;&#2357;&#2366; &#2325;&#2352; (GST) &#2325;&#2375; &#2348;&#2366;&#2352;&#2375; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;?</p><p>I. &#2311;&#2360;&#2375; 1 &#2332;&#2369;&#2354;&#2366;&#2312;, 2017 &#2325;&#2379; &#2354;&#2366;&#2327;&#2370; &#2325;&#2367;&#2351;&#2366; &#2327;&#2351;&#2366; &#2341;&#2366;&#2404;</p><p>II. GST &#2344;&#2375; &#2325;&#2375;&#2357;&#2354; &#2325;&#2375;&#2306;&#2342;&#2381;&#2352;&#2368;&#2351; &#2309;&#2346;&#2381;&#2352;&#2340;&#2381;&#2351;&#2325;&#2381;&#2359; &#2325;&#2352;&#2379;&#2306; &#2325;&#2366; &#2360;&#2381;&#2341;&#2366;&#2344; &#2354;&#2367;&#2351;&#2366;&#2404;</p><p>III. &#2311;&#2360;&#2325;&#2366; &#2313;&#2342;&#2381;&#2342;&#2375;&#2358;&#2381;&#2351; &#2319;&#2325; &#2319;&#2325;&#2368;&#2325;&#2371;&#2340; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2348;&#2366;&#2332;&#2366;&#2352; &#2348;&#2344;&#2366;&#2344;&#2366; &#2361;&#2376;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only statement I</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I</span>",
      "<span class=\"eqt\">Only statement II</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; II</span>",
      "<span class=\"eqt\">Only statements I and III</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; &#2325;&#2341;&#2344; I &#2324;&#2352; III</span>",
      "<span class=\"eqt\">All statements are true</span><span class=\"hqt\" style=\"display:none\">&#2360;&#2349;&#2368; &#2325;&#2341;&#2344; &#2360;&#2340;&#2381;&#2351; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p><b>Statement I:</b> True. GST was implemented on July 1, 2017.</p><p><b>Statement II:</b> False. GST replaced multiple indirect taxes, including state and central taxes.</p><p><b>Statement III:</b> True. One of the main objectives of GST is to create a unified national market.</p><p></p><p>GST is known as the Goods and Services Tax. It is an indirect tax which has replaced many indirect taxes in India such as the excise duty, VAT, services tax, etc. The Goods and Service Tax Act was passed in the Parliament on 29th March 2017 and came into effect on 1st July 2017.</p><p>Under the GST regime, the tax is levied at every point of sale. In the case of intra-state sales, Central GST and State GST are charged. All the inter-state sales are chargeable to the Integrated GST.</p><p></p><p>India had several erstwhile indirect taxes such as service tax, Value Added Tax (VAT), Central Excise, etc., which used to be levied at multiple supply chain stages. Some taxes were governed by the states and some by the Centre. There was no unified and centralised tax on both goods and services. Hence, GST was introduced.</p><p></p><p></p>",
    "question_index": 39
  },

    "question": "<span class=\"eqt\"><p>Which of the following statements is/are correct regarding the Theosophical society?</p><p>a) It was founded by Annie Besant in New York in 1875</p><p>b) Its Headquarters shifted in 1882 to Adyar near Madras</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2341;&#2367;&#2351;&#2379;&#2360;&#2379;&#2347;&#2367;&#2325;&#2354; &#2360;&#2379;&#2360;&#2366;&#2311;&#2335;&#2368; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376; / &#2361;&#2376;&#2306;?</p><p>a) &#2311;&#2360;&#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366; 1875 &#2350;&#2375;&#2306; &#2319;&#2344;&#2368; &#2348;&#2375;&#2360;&#2375;&#2306;&#2335; &#2344;&#2375; &#2344;&#2381;&#2351;&#2370;&#2351;&#2377;&#2352;&#2381;&#2325; &#2350;&#2375;&#2306; &#2325;&#2368; &#2341;&#2368;</p><p>b) &#2311;&#2360;&#2325;&#2366; &#2350;&#2369;&#2326;&#2381;&#2351;&#2366;&#2354;&#2351; 1882 &#2350;&#2375;&#2306; &#2350;&#2342;&#2381;&#2352;&#2366;&#2360; &#2325;&#2375; &#2346;&#2366;&#2360; &#2309;&#2337;&#2381;&#2351;&#2366;&#2352; &#2350;&#2375;&#2306; &#2360;&#2381;&#2341;&#2366;&#2344;&#2366;&#2306;&#2340;&#2352;&#2367;&#2340; &#2361;&#2379; &#2327;&#2351;&#2366; &#2341;&#2366;</p></span>",

    "correct_option_id": 2,

ding:5px;\">Madam H.P. Blavatsky and Col. H.S. Olcott</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Servants of India Society</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Gopal Krishna Gokhale</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Ezhava Movement</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Sri Narayana Guru</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Wahabi Movement</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Syed Ahmed Barelvi</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Deoband Movement</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Muhammad Qasim Nanotavi and Rashid Ahmad Gangohi</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Tebhaga Movement</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Initiated by Bengal farmers and supported by Kisan Sabha</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Chipko Movement</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Initiated by local villagers (prominent leader: Sunderlal Bahuguna)</td></tr></table>",

    "question": "<span class=\"eqt\"><p>Identify the correctly matched pair(s) of the British Governor-Generals of India and the events with which they are associated.</p><p>a) Lord William Bentinck - Abolition Sati System</p><p>b) Lord Lytton - The Vernacular Press Act</p><p>c) Lord Dufferin - Establishment of the Indian National Congress</p><p>Choose the correct options</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340; &#2325;&#2375; &#2348;&#2381;&#2352;&#2367;&#2335;&#2367;&#2358; &#2327;&#2357;&#2352;&#2381;&#2344;&#2352;-&#2332;&#2344;&#2352;&#2354;&#2379;&#2306; &#2324;&#2352; &#2313;&#2344;&#2360;&#2375; &#2332;&#2369;&#2337;&#2364;&#2368; &#2328;&#2335;&#2344;&#2366;&#2323;&#2306; &#2325;&#2368; &#2360;&#2361;&#2368; &#2360;&#2369;&#2350;&#2375;&#2354;&#2367;&#2340; &#2351;&#2369;&#2327;&#2381;&#2350; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>a) &#2354;&#2377;&#2352;&#2381;&#2337; &#2357;&#2367;&#2354;&#2367;&#2351;&#2350; &#2348;&#2375;&#2306;&#2335;&#2367;&#2325; - &#2360;&#2340;&#2368; &#2346;&#2381;&#2352;&#2341;&#2366; &#2325;&#2366; &#2313;&#2344;&#2381;&#2350;&#2370;&#2354;&#2344;</p><p>b) &#2354;&#2377;&#2352;&#2381;&#2337; &#2354;&#2367;&#2335;&#2344; - &#2357;&#2352;&#2381;&#2344;&#2366;&#2325;&#2381;&#2351;&#2370;&#2354;&#2352; &#2346;&#2381;&#2352;&#2375;&#2360; &#2319;&#2325;&#2381;&#2335;</p><p>c) &#2354;&#2377;&#2352;&#2381;&#2337; &#2337;&#2347;&#2352;&#2367;&#2344; - &#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2352;&#2366;&#2359;&#2381;&#2335;&#2381;&#2352;&#2368;&#2351; &#2325;&#2366;&#2306;&#2327;&#2381;&#2352;&#2375;&#2360; &#2325;&#2368; &#2360;&#2381;&#2341;&#2366;&#2346;&#2344;&#2366;</p><p>&#2360;&#2361;&#2368; &#2357;&#2367;&#2325;&#2354;&#2381;&#2346; &#2330;&#2369;&#2344;&#2375;&#2306;:</p></span>",

    "solution": "<table style=\"border-collapse:collapse;\"><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Name of Governor-General</b></td><td align=\"left\" style=\"border:1px solid black;padding:5px;\"><b>Important Achievements</b></td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lord William Bentinck (1828-1835)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Abolition of Sati System (1829)   - Charter Act of 1833</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lord Lytton (1876-1880)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Vernacular Press Act (1878)   - Arms Act (1878)   - Second Afghan War (1878-80)   - Queen Victoria assumed the title 'Kaiser-i-Hind' or Queen Empress of India</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lord Ripon (1880-1884)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Repeal of Vernacular Press Act (1882)   - First Factory Act (1881)   - Government resolution on local self-government (1882)   - Ilbert Bill controversy (1883-84)   - Hunter Commission on Education (1882)</td></tr><tr><td align=\"left\" style=\"border:1px solid black;padding:5px;\">Lord Dufferin (1884-1888)</td><td align=\"left\" style=\"border:1px solid black;padding:5px;\">- Third Burmese War (1885-86)   - Establishment of the Indian National Congress (1885)</td></tr></table>",

    "question": "<span class=\"eqt\"><p>Identify the incorrect statement regarding Mid-day Meal scheme.</p><p>A. The state that initiated the implementation of the Mid-day Meal scheme in elementary schools is Tamil Nadu.</p><p>B. The scheme was launched in Tamil Nadu in 1982 under the leadership of then Chief Minister M. Karunanidhi.</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2350;&#2367;&#2337;-&#2337;&#2375; &#2350;&#2368;&#2354; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306; &#2327;&#2354;&#2340; &#2325;&#2341;&#2344; &#2325;&#2368; &#2346;&#2361;&#2330;&#2366;&#2344; &#2325;&#2352;&#2375;&#2306;&#2404;</p><p>A. &#2346;&#2381;&#2352;&#2366;&#2341;&#2350;&#2367;&#2325; &#2357;&#2367;&#2342;&#2381;&#2351;&#2366;&#2354;&#2351;&#2379;&#2306; &#2350;&#2375;&#2306; &#2350;&#2367;&#2337;-&#2337;&#2375; &#2350;&#2368;&#2354; &#2351;&#2379;&#2332;&#2344;&#2366; &#2325;&#2375; &#2325;&#2366;&#2352;&#2381;&#2351;&#2366;&#2344;&#2381;&#2357;&#2351;&#2344; &#2325;&#2368; &#2358;&#2369;&#2352;&#2369;&#2310;&#2340; &#2325;&#2352;&#2344;&#2375; &#2357;&#2366;&#2354;&#2366; &#2352;&#2366;&#2332;&#2381;&#2351; &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2361;&#2376;&#2404;</p><p>B. &#2351;&#2361; &#2351;&#2379;&#2332;&#2344;&#2366; 1982 &#2350;&#2375;&#2306; &#2340;&#2340;&#2381;&#2325;&#2366;&#2354;&#2368;&#2344; &#2350;&#2369;&#2326;&#2381;&#2351;&#2350;&#2306;&#2340;&#2381;&#2352;&#2368; &#2319;&#2350;. &#2325;&#2352;&#2369;&#2339;&#2366;&#2344;&#2367;&#2343;&#2367; &#2325;&#2375; &#2344;&#2375;&#2340;&#2371;&#2340;&#2381;&#2357; &#2350;&#2375;&#2306; &#2340;&#2350;&#2367;&#2354;&#2344;&#2366;&#2337;&#2369; &#2350;&#2375;&#2306; &#2358;&#2369;&#2352;&#2370; &#2325;&#2368; &#2327;&#2312; &#2341;&#2368;&#2404;</p></span>",
    "options": [
      "<span class=\"eqt\">Only A</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; A</span>",
      "<span class=\"eqt\">Only B</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; B</span>",
      "<span class=\"eqt\">Both are correct</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2360;&#2361;&#2368; &#2361;&#2376;&#2306;</span>",
      "<span class=\"eqt\">Both are incorrect</span><span class=\"hqt\" style=\"display:none\">&#2342;&#2379;&#2344;&#2379;&#2306; &#2327;&#2354;&#2340; &#2361;&#2376;&#2306;</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>The state that initiated the implementation of the Mid-day Meal scheme in elementary schools is Tamil Nadu.</p><p>The scheme was launched in Tamil Nadu in 1982 under the leadership of then Chief Minister M. Karunanidhi.</p><p>It aimed to improve the nutritional status of children and increase school enrollment, retention, and attendance.</p><p>The success of this scheme in Tamil Nadu led to its expansion across the country later on.</p>",
    "question_index": 42
  },
  {
    "question": "<span class=\"eqt\"><p>With respect to Census 2011, consider the following statements:</p><p>I. Uttar Pradesh had the largest source of inter-state migrants.</p><p>II. A person located at a place different from the place of birth is a migrant.</p><p>Which of the above statement(s) is/are correct?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2332;&#2344;&#2327;&#2339;&#2344;&#2366; 2011 &#2325;&#2375; &#2360;&#2306;&#2348;&#2306;&#2343; &#2350;&#2375;&#2306;, &#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2325;&#2341;&#2344;&#2379;&#2306; &#2346;&#2352; &#2357;&#2367;&#2330;&#2366;&#2352; &#2325;&#2352;&#2375;&#2306;:</p><p>I. &#2313;&#2340;&#2381;&#2340;&#2352; &#2346;&#2381;&#2352;&#2342;&#2375;&#2358; &#2350;&#2375;&#2306; &#2309;&#2306;&#2340;&#2352;-&#2352;&#2366;&#2332;&#2381;&#2351;&#2368;&#2351; &#2346;&#2381;&#2352;&#2357;&#2366;&#2360;&#2367;&#2351;&#2379;&#2306; &#2325;&#2366; &#2360;&#2348;&#2360;&#2375; &#2348;&#2337;&#2364;&#2366; &#2360;&#2381;&#2352;&#2379;&#2340; &#2341;&#2366;&#2404;</p><p>II. &#2332;&#2344;&#2381;&#2350; &#2360;&#2381;&#2341;&#2366;&#2344; &#2360;&#2375; &#2349;&#2367;&#2344;&#2381;&#2344; &#2360;&#2381;&#2341;&#2366;&#2344; &#2346;&#2352; &#2360;&#2381;&#2341;&#2367;&#2340; &#2357;&#2381;&#2351;&#2325;&#2381;&#2340;&#2367; &#2346;&#2381;&#2352;&#2357;&#2366;&#2360;&#2368; &#2361;&#2379;&#2340;&#2366; &#2361;&#2376;&#2404;</p><p>&#2313;&#2346;&#2352;&#2381;&#2351;&#2369;&#2325;&#2381;&#2340; &#2325;&#2341;&#2344; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344;-&#2360;&#2366;/&#2360;&#2375; &#2325;&#2341;&#2344; &#2360;&#2361;&#2368; &#2361;&#2376;/&#2361;&#2376;&#2306;?</p></span>",
    "options": [
      "<span class=\"eqt\">I Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; I</span>",
      "<span class=\"eqt\">II Only</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2375;&#2357;&#2354; II</span>",
      "<span class=\"eqt\">Both I and II</span><span class=\"hqt\" style=\"display:none\">I &#2324;&#2352; II &#2342;&#2379;&#2344;&#2379;&#2306;</span>",
      "<span class=\"eqt\">Neither I nor II</span><span class=\"hqt\" style=\"display:none\">&#2344; &#2340;&#2379; I &#2324;&#2352; &#2344; &#2361;&#2368; II</span>"
    ],
    "correct_option_id": 2,
    "solution": "<p>As of 2011, Uttar Pradesh and Bihar were the largest source of inter-state migrants while Maharashtra and Delhi were the largest receiver states.  Around 83 lakh residents of Uttar Pradesh and 63 lakh residents of Bihar had moved either temporarily or permanently to other states.  Around 60 lakh people from across India had migrated to Maharashtra by 2011.</p><p></p><p></p><p>According to the website of the Registrar General &amp; Census Commissioner, India, \"When a person is enumerated in Census at a different place than his/her place of birth, she/he is considered a 'migrant'.\" Migration data began to be collected with the Census of 1872, but was not very detailed until 1961. Changes introduced in 1961 continued until 2001; in the Census of 2011, a more detailed format for collecting information on migrants was adopted.</p><p>Source: Indian Express</p>",
    "question_index": 43

    "question": "<span class=\"eqt\"><p>Which of the following is NOT a classical dance form?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2344;&#2367;&#2350;&#2381;&#2344;&#2354;&#2367;&#2326;&#2367;&#2340; &#2350;&#2375;&#2306; &#2360;&#2375; &#2325;&#2380;&#2344; &#2360;&#2366; &#2358;&#2366;&#2360;&#2381;&#2340;&#2381;&#2352;&#2368;&#2351; &#2344;&#2371;&#2340;&#2381;&#2351; &#2344;&#2361;&#2368;&#2306; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Kathakali</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2325;&#2354;&#2368;</span>",
      "<span class=\"eqt\">Bhangra</span><span class=\"hqt\" style=\"display:none\">&#2349;&#2366;&#2306;&#2327;&#2337;&#2364;&#2366;</span>",
      "<span class=\"eqt\">Odissi</span><span class=\"hqt\" style=\"display:none\">&#2323;&#2337;&#2367;&#2360;&#2368;</span>",
      "<span class=\"eqt\">Kathak</span><span class=\"hqt\" style=\"display:none\">&#2325;&#2341;&#2325;</span>"
    ],
    "correct_option_id": 1,
    "solution": "<p>The correct option is <b>Bhangra</b> because it is a folk dance from Punjab; Kathakali, Odissi, and Kathak are all recognized classical dance forms of India.</p><p><b>Explanation of Other Options:</b></p><p>&#183; Kathakali: A classical dance from Kerala, distinguished by elaborate makeup, costumes, and storytelling based on Hindu epics.</p><p>&#183; Odissi: A classical dance from Odisha featuring tribhangi posture and expressive gestures to narrate mythological themes.</p><p>&#183; Kathak: A classical dance from North India known for intricate footwork, spins, and expressive storytelling through facial movements.</p><p><b>Further insights:</b></p><p>&#183; Bhangra originated as a harvest folk dance in Punjab, performed during Vaisakhi, accompanied by dhol music.</p><p>&#183; Classical dances are codified with strict grammar (nritta, nritya, natya), whereas folk dances are community-based.</p>",

    "question": "<span class=\"eqt\"><p>Which Article of the Constitution of India gives the Supreme Court power to give complete Justice to any cause or matter pending before it?</p></span><span class=\"hqt\" style=\"display:none\"><p>&#2349;&#2366;&#2352;&#2340;&#2368;&#2351; &#2360;&#2306;&#2357;&#2367;&#2343;&#2366;&#2344; &#2325;&#2366; &#2325;&#2380;&#2344; &#2360;&#2366; &#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; &#2360;&#2352;&#2381;&#2357;&#2379;&#2330;&#2381;&#2330; &#2344;&#2381;&#2351;&#2366;&#2351;&#2366;&#2354;&#2351; &#2325;&#2379; &#2313;&#2360;&#2325;&#2375; &#2360;&#2350;&#2325;&#2381;&#2359; &#2354;&#2306;&#2348;&#2367;&#2340; &#2325;&#2367;&#2360;&#2368; &#2349;&#2368; &#2350;&#2366;&#2350;&#2354;&#2375; &#2351;&#2366; &#2350;&#2366;&#2350;&#2354;&#2375; &#2350;&#2375;&#2306; &#2346;&#2370;&#2352;&#2381;&#2339; &#2344;&#2381;&#2351;&#2366;&#2351; &#2342;&#2375;&#2344;&#2375; &#2325;&#2368; &#2358;&#2325;&#2381;&#2340;&#2367; &#2342;&#2375;&#2340;&#2366; &#2361;&#2376;?</p></span>",
    "options": [
      "<span class=\"eqt\">Article 124</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 124</span>",
      "<span class=\"eqt\">Article 143</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 143</span>",
      "<span class=\"eqt\">Article 142</span><span class=\"hqt\" style=\"display:none\">&#2309;&#2344;&#2369;&#2330;&#2381;&#2331;&#2375;&#2342; 142</span>",

    ],
    "correct_option_id": 2,
    "solution": "<p>&bull; Article 142 of the Constitution of India gives the Supreme Court Power to give Complete Justice to any cause or matter pending before it.</p><p>&bull; Article 124: Establishment and constitution of the Supreme Court.</p><p>&bull; Article 130: Seat of the Supreme Court</p><p>&bull; Article 143L Power of President to consult the Supreme Court.</p><p>Further Insight:</p><p>&bull; Article 142: Enforcement of decrees and orders of the Supreme Court and orders as to discovery, etc.</p><p>&#9675; (1) <b>The Supreme Court in the exercise of its jurisdiction may pass such decree or make such order as is necessary for doing complete justice in any cause or matter pending before it</b>, and any decree so passed or order so made shall be enforceable throughout the territory of India in such manner as may be prescribed by or under any law made by Parliament and, until provision in that behalf is so made, in such manner as the President may by order1 prescribe.</p><p>&#9675; (2) Subject to the provisions of any law made in this behalf by Parliament, the Supreme Court shall, as respects the whole of the territory of India, have all and every power to make any order for the purpose of securing the attendance of any person, the discovery or production of any documents, or the investigation or punishment of any contempt of itself.</p>",
