    "question": "<span class=\"eqt\"><p>Which of the following addresses are identical to each other:</p>\r\n\r\n<p>1. Rahul K 45/18 Block-C, Rajendra Nagar, Kanpur, 208005<br />\r\n2. Rahul K. 45/18 Block-C, Rajendra Nagar, Kanpur, 208005<br />\r\n3. Rahul K. 45/18 Block-C, Rajendra Nagar, Kanpur, 208005<br />\r\n4. Rahul K. 45/18 Block C, Rajendra Nagar, Kanpur, 208005&nbsp;</p>\r\n</span><span class=\"hqt\"><p>निम्नलिखित में से कौन से पते एक दूसरे के समान हैं:</p>\r\n\r\n<p>1. Rahul K 45/18 Block-C, Rajendra Nagar, Kanpur, 208005<br />\r\n2. Rahul K. 45/18 Block-C, Rajendra Nagar, Kanpur, 208005<br />\r\n3. Rahul K. 45/18 Block-C, Rajendra Nagar, Kanpur, 208005<br />\r\n4. Rahul K. 45/18 Block C, Rajendra Nagar, Kanpur, 208005&nbsp;</p>\r\n</span>",

    "solution": "<span class=\"eqt\"><p>The correct answer is <strong>option 2</strong>&nbsp;i.e. <strong>2 &amp; 3</strong>.</p>\r\n\r\n<p>The addresses of 2 and 3 are identical.</p>\r\n</span><span class=\"hqt\"><div style=\"position:relative\"><!--<div contenteditable=\"true\" style=\"position: relative;\">-->\r\n<p>सही उत्तर <strong>विकल्प 2</strong>&nbsp;अर्थात <strong>2 &amp; 3</strong> है।</p>\r\n\r\n<div style=\"position:relative\">2 और 3 के पते एक जैसे हैं।</div>\r\n</div>\r\n</span>",

    "question": "<span class=\"eqt\"><p>Select the correct combination of mathematical signs that can sequentially replace * signs from left to right to balance the following equation.&nbsp;&nbsp; &nbsp;</p>\r\n\r\n<p>72 * 88 * 8 * 23 * 8 * 245</p>\r\n</span><span class=\"hqt\"><p>निम्नलिखित समीकरण को संतुलित करने के लिए, बाएँ से दाएँ क्रमानुसार * चिह्नों को प्रतिस्थापित करने वाले गणितीय चिह्नों का सही संयोजन चुनें।</p>\r\n\r\n<p>72 * 88 * 8 * 23 * 8 * 245</p>\r\n</span>",
    "comp": "",

    "solution": "<span class=\"eqt\"><p>The correct answer is <strong>option 3</strong>&nbsp;i.e. <strong>-, &divide;, +, &times;, =</strong>.</p>\r\n\r\n<p>72 - (88 &divide; 8) + (23 &times; 8) = 245</p>\r\n\r\n<p>72 - 11 + 184 = 245&nbsp;</p>\r\n\r\n<p>256 - 11 = 245&nbsp;</p>\r\n\r\n<p>245 = 245</p>\r\n</span><span class=\"hqt\"><div style=\"position:relative\"><!--<div contenteditable=\"true\" style=\"position: relative;\">--><!--<div contenteditable=\"true\" style=\"position: relative;\">-->\r\n<p>सही उत्तर <strong>विकल्प 3</strong>&nbsp;अर्थात <strong>-, &divide;, +, &times;, =</strong>&nbsp;है।</p>\r\n\r\n<p>72 - (88 &divide; 8) + (23 &times; 8) = 245</p>\r\n\r\n<p>72 - 11 + 184 = 245&nbsp;</p>\r\n\r\n<p>256 - 11 = 245&nbsp;</p>\r\n\r\n<p>245 = 245</p>\r\n</div>\r\n</span>",

  {
    "question": "<span class=\"eqt\"><p>Which of the following letter-clusters should replace # and % so that the pattern and relationship followed between the letter-cluster pair on the left side of :: is the same as that on the right side of :: ?</p>\r\n\r\n<p># : AKG :: PTS : %</p>\r\n</span><span class=\"hqt\"><p>निम्नलिखित में से कौन सा अक्षर समूह # और % के स्थान पर प्रयोग किया जाना चाहिए ताकि :: के बाईं ओर स्थित अक्षर समूह युग्म और :: के दाईं ओर स्थित अक्षर समूह युग्म के बीच का पैटर्न और संबंध समान हो?</p>\r\n\r\n<p># : AKG :: PTS : %</p>\r\n</span>",

    "solution": "<span class=\"eqt\"><p>The correct answer is <strong>option 2</strong>&nbsp;i.e. <strong># = CHK, % = NWO</strong>.</p>\r\n\r\n<p>Option 2: # = CHK, % = NWO&nbsp;</p>\r\n\r\n<p><strong>CHK</strong> : AKG&nbsp;&rarr; C - 2 = A, H + 3 = K, K - 4 = G</p>\r\n\r\n<p>PTS : <strong>NWO&nbsp;</strong>&rarr;&nbsp;P - 2 = N, T + 3 = W, S - 4 = O</p>\r\n</span><span class=\"hqt\"><div style=\"position:relative\"><!--<div contenteditable=\"true\" style=\"position: relative;\">-->\r\n<p>सही उत्तर <strong>विकल्प 2</strong>&nbsp;अर्थात <strong># = CHK, % = NWO </strong>है।</p>\r\n\r\n<p>विकल्प 2: # = CHK, % = NWO&nbsp;</p>\r\n\r\n<div style=\"position:relative\">\r\n<p><strong>CHK</strong> : AKG&nbsp;&rarr; C - 2 = A, H + 3 = K, K - 4 = G</p>\r\n\r\n<p>PTS : <strong>NWO&nbsp;</strong>&rarr;&nbsp;P - 2 = N, T + 3 = W, S - 4 = O</p>\r\n</div>\r\n</div>\r\n</span>",

  {
    "question": "<span class=\"eqt\"><p>The second number in the given number- pairs is obtained by performing certain mathematical operation(s) on the first number. The same operation(s) is/are followed in all the number-pairs except one. Find that odd number-pair.</p>\r\n</span><span class=\"hqt\"><p>दी गई संख्याओं के युग्मों में दूसरी संख्या पहली संख्या पर कुछ गणितीय संक्रियाएँ करके प्राप्त की जाती है। एक को छोड़कर बाकी सभी युग्मों पर समान संक्रियाएँ की जाती हैं। वह विषम संख्या युग्म ज्ञात कीजिए।</p>\r\n</span>",

    "correct_option_id": 0,
    "solution": "<span class=\"eqt\"><p>The correct answer is <strong>option 1</strong> i.e. <strong>14 : 441</strong>.</p>\r\n\r\n<p>(a) 14 + 5 = (19)<sup>2</sup> = <strong>361 &ne; 441&nbsp;</strong></p>\r\n\r\n<p>(b) 13 + 5 = (18)<sup>2&nbsp;</sup>= 324</p>\r\n\r\n<p>(c) 15 + 5 = (20)<sup>2&nbsp;</sup>= 400</p>\r\n\r\n<p>(d) 11 + 5 = (16)<sup>2&nbsp;</sup>= 256</p>\r\n</span><span class=\"hqt\"><div style=\"position:relative\"><!--<div contenteditable=\"true\" style=\"position: relative;\">-->\r\n<p>सही उत्तर <strong>विकल्प 1</strong> अर्थात <strong>14 : 441</strong>&nbsp;है।</p>\r\n\r\n<p>(a) 14 + 5 = (19)<sup>2</sup> = <strong>361 &ne; 441&nbsp;</strong></p>\r\n\r\n<p>(b) 13 + 5 = (18)<sup>2&nbsp;</sup>= 324</p>\r\n\r\n<p>(c) 15 + 5 = (20)<sup>2&nbsp;</sup>= 400</p>\r\n\r\n<p>(d) 11 + 5 = (16)<sup>2&nbsp;</sup>= 256</p>\r\n</div>\r\n</span>",

    "question": "<span class=\"eqt\"><p>Which element is fourth to the left of 71 in step III?</p>\r\n</span><span class=\"hqt\"><p>चरण III में 71 के बाईं ओर चौथा तत्व कौन सा है?</p>\r\n</span>",
    "comp": "<span class=\"eqt\"><p>A word and number arrangement machine, when given an input line of words and numbers, rearranges them following a particular pattern in each step. The following is an illustration of an input and rearrangement.</p>\r\n\r\n<p><strong>Input: Dump 63 Bold 83 21 Triangle.</strong></p>\r\n\r\n<p>Step I: Bold dump 63 21 Triangle 83</p>\r\n\r\n<p>Step II: Dump Bold 21 Triangle 83 63</p>\r\n\r\n<p>Step III: Triangle Dump Bold 83 63 21&nbsp;</p>\r\n\r\n<p>Step III is the last step of the rearrangement of the above input.</p>\r\n\r\n<p>As per the pattern followed in the above steps, find the output for the given input:</p>\r\n\r\n<p>Input: 71 Eat Gold 63 93 Asics</p>\r\n</span><span class=\"hqt\"><p>एक शब्द और संख्या व्यवस्था मशीन को जब शब्दों और संख्याओं की एक इनपुट पंक्ति दी जाती है, तो वह प्रत्येक चरण में एक विशेष पैटर्न का पालन करते हुए उन्हें पुनर्व्यवस्थित करती है। निम्नलिखित इनपुट और पुनर्व्यवस्था का एक उदाहरण है।</p>\r\n\r\n<p><strong>इनपुट: Dump 63 Bold 83 21 Triangle</strong></p>\r\n\r\n<p>चरण I: Bold dump 63 21 Triangle 83</p>\r\n\r\n<p>चरण II: Dump Bold 21 Triangle 83 63</p>\r\n\r\n<p>चरण III: Triangle Dump Bold 83 63 21</p>\r\n\r\n<p>चरण III उपरोक्त इनपुट की पुनर्व्यवस्था का अंतिम चरण है।</p>\r\n\r\n<p>उपरोक्त चरणों में अपनाए गए पैटर्न के अनुसार, दिए गए इनपुट के लिए आउटपुट ज्ञात कीजिए:</p>\r\n\r\n<p>इनपुट: 71 Eat Gold 63 93 Asics<br />\r\n&nbsp;</p>\r\n</span>",

    "solution": "<span class=\"eqt\"><p>The correct answer is <strong>option 2</strong>&nbsp;i.e. <strong>Gold</strong>.</p>\r\n\r\n<p>The words are arranged in alphabetical order. The order is Asics, Eat and Gold.</p>\r\n\r\n<p>The numbers are arranged in descending order. The order is 93, 71, 63</p>\r\n\r\n<p>By following the same logical pattern, we get,</p>\r\n\r\n<p>Input:- 71 Eat Gold 63 93 Asics</p>\r\n\r\n<p>Step I:- Asics Eat Gold&nbsp; 63 &nbsp;93 &nbsp;71</p>\r\n\r\n<p>Step II:- Eat Asics Gold &nbsp;93 &nbsp;71 &nbsp;63</p>\r\n\r\n<p>Step III:- Gold Eat Asics &nbsp;93 &nbsp;71 &nbsp;63</p>\r\n\r\n<p>Here, the word &lsquo;Gold&rsquo; is fourth to the left of 71 in step III.</p>\r\n</span><span class=\"hqt\"><div style=\"position:relative\"><!--<div contenteditable=\"true\" style=\"position: relative;\">-->\r\n<div style=\"position:relative\">\r\n<p>सही उत्तर <strong>विकल्प 2</strong>&nbsp;अर्थात <strong>Gold </strong>है।</p>\r\n\r\n<p>शब्दों को वर्णमाला क्रम में व्यवस्थित किया गया है। क्रम है: Asics, Eat and Gold.</p>\r\n\r\n<p>संख्याओं को अवरोही क्रम में व्यवस्थित किया गया है। क्रम है: 93, 71, 63।</p>\r\n\r\n<p>इसी तार्किक पैटर्न का पालन करते हुए, हमें प्राप्त होता है:</p>\r\n\r\n<p>इनपुट:- 71 Eat Gold 63 93 Asics</p>\r\n\r\n<p>चरण I:- Asics Eat Gold &nbsp; 63 &nbsp;93 &nbsp;71</p>\r\n\r\n<p>चरण II:- Eat Asics Gold &nbsp;93 &nbsp;71 &nbsp;63</p>\r\n\r\n<p>चरण III:- Gold Eat Asics &nbsp;93 &nbsp;71 &nbsp;63</p>\r\n\r\n<p>यहाँ, चरण III में Gold शब्द 71 के बाईं ओर से चौथा है।</p>\r\n</div>\r\n</div>\r\n</span>",
    "marks": 2,
    "section": "Logical Reasoning",
    "series_name": "ProMocks PAID 1 by THE PUNDITS Pre 2026"
