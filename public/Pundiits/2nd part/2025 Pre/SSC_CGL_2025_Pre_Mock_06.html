                </div>
            </div>
            
            <div class="welcome-actions">

                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->

                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <div class="mock-container">

            </div>

                    </div>

                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>

        </div>

    "solution": "<span class=\"eqt\"><p><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> Chipko movement was a forest conservation movement in India. The movement started in 1973 at Rani Village in tha chamoli district of the Garhwal region in Uttrakhand, then a part of Uttar Pradesh. </span></span></span> <br /><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">The Mappila Rebellion, also known as the Malabar Rebellion or Moplah Rebellion, was a significant uprising that took place in the Malabar region of Kerala in 1921. This revolt was primarily led by the Mappila Muslims against the British colonial rule and the local Hindu landlords.</span></span><br /><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Paharia Revolt [1776-1824 AD]: Paharia tribe was settled in Rajmahal, Godda and Pakur regions. Their revolt against the British is considered as the first major revolt in the history of tribal revolts against the British under the leadership of Ramna Aahdi.</span></span></p></span><span class=\"hqt\"><p><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"color: #001d35;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">चिपको आंदोलन भारत में वन संरक्षण आंदोलन था। यह आंदोलन </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">1973 </span></span><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">में उत्तराखंड के गढ़वाल क्षेत्र के चमोली जिले के रानी गांव में शुरू हुआ जो उस समय उत्तर प्रदेश का हिस्सा था। </span></span></span></span></span> <br /><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"color: #001d35;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">मप्पिला विद्रोह</span></span></span></spa     "solution": "<span class=\"eqt\"><p><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Saturn&nbsp;is the second largest planet in our solar system.&nbsp;It's a gas giant with an equatorial diameter of about 74,898 miles </span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">[</span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">120,536 kilometers].</span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> Saturn is the sixth planet from the Sun,</span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> It's about nine times wider than Earth. </span></span></span> <br /><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Mars is the fourth planet from the sun and </span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">has two moons, Phobos and Deimos.</span></span></span> <span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">The surface temperature of Mars ranges from -153&deg;C to 20&deg;C. </span></span></span> <br /><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Jupiter is the largest planet in our solar system.&nbsp;It's a gas giant made up of mostly hydrogen and helium.</span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> Jupiter is more than twice as massive as all the other planets in our solar system combined. Eleven Ear : 19px;\">a nitrogenous substance essential for life]. </span></span></span> <br /><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Joseph John Thomson </span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">[</span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">1856-1940] discovered the electron and proposed a model for the structure of the atom.</span></span></span><br /><br /></p></span><span class=\"hqt\"><p><span style=\"color: #001d35;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">1928 </span></span><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">में</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">अलेक्जेंडर फ्लेमिंग ने पेनिसिलिन की खोज की। इस खोज से एंटीबायोटिक्स की शुरुआत हुई जिससे संक्रमण से होने वाली मौतों की संख्या में काफी कमी आई। </span></span></span></span></span> <br /><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"color: #001d35;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">माइकल फैराडे </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">19</span></span><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">वीं सदी के अंग्रेजी वैज्ञानिक थे जिन्होंने बिजली और इलेक्ट्रोकैमिस्ट्री के क्षेत्र में कई महत्वपूर्ण खोजें कीं। फैराडे को विद्युत मोटर</span></span></span></span><span style=\"font-family: 'Nirmal     "solution": "<span class=\"eqt\"><p><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">The Beighton Cup is&nbsp;considered the oldest field hockey tournament in India, established in 1895, and is named after its British donor, Judge Thomas Durant Beighton, who was part of the Indian Civil Service during British rule;&nbsp;it is organized by Hockey Bengal </span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">[</span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">previously known as the Bengal Hockey Association] and is held annually in Kolkata, India.</span></span></span> <span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Dhyan Chand, an Indian field hockey player</span></span></span> <span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">known as father of hockey in India.</span></span></span></p></span><span class=\"hqt\"><p><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"color: #001d35;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">बेटन </span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">कप को भारत में सबसे पुराना फील्ड हॉकी टूर्नामेंट माना जाता है</span></span></span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">जिसे </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">1895 </span></span><span     "solution": "<span class=\"eqt\"><p><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> Article 109 of the Constitution of India outlines the special procedure for passing money bills.&nbsp;It covers how money bills are introduced, reviewed, and passed by both houses of parliament.</span></span></span> <span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">A money Bill can only be introduced in the House of the People </span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">[</span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Lok Sabha]. The Rajya Sabha only suggests amendments to a money bill, not reject it.</span></span></span><br /><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Article 112 of the Constitution of India is about the annual financial statement of the Government of India.&nbsp;This statement is also known as the Union Budget. </span></span></span> <br /><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Article 107 of the Constitution of India deals with the introduction and passing of bills in Parliament.&nbsp;</span></span></span> <br /><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Article 108 of the Constitution of India allows for joint sittings of both Houses of Parliament in certain circumstances. The President can call for a joint sitting. &nbsp;&nbsp;</span></span></span></p></span><span class=\"hqt\"><p><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"color: #001d35;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">भारत के संविधान का अनुच्छेद </span></span></span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">109 </span></span></span><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"color: #001d35;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">धन विधेयक पारित करने की विशेष प्रक्रिया की रूपरेखा बताता है। इसमें बताया गया है कि संसद के दोनों सदनों में धन विधेयक कैसे पेश किए जाते हैं</span></span></span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"color: #001d35;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">समीक्षा की जाती है और पारित किया जाता है। धन विधेयक केवल लोकसभा में पेश किया जा सकता है। राज्यसभा केवल धन विधेयक में संशोधनों का सुझाव देती है</span></span></span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"color: #001d35;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">इसे अस्वीकार नहीं करती है।</span></span></span></span></span><br /><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"color: #001d35;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">भारत के संविधान का अनुच्छेद </span></span></span></span></span><span style=\"color: #001d35;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">112 </span></span></span><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"color: #001d35;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">भारत सरकार के वार्षिक वित्तीय विवरण के बारे मे
