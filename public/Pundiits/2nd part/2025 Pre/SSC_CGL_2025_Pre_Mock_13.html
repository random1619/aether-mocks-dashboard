<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Central Stylesheet -->

</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Pundits Quiz</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">100</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Pundits Quiz</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>
    
    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<span class=\"eqt\"><a name=\"_Hlk198245269\"/>\n<span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nWhat was the day of the week on 23</span></span></span><span style=\"color: #000000\"><sup><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">rd</span></span></sup></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nFebruary 1995?</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">23\n</span></span><span style=\"font-family: Mangal\"><span lang=\"hi-IN\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">फरवरी\n</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1995\n</span></span><span style=\"font-family: Mangal\"><span lang=\"hi-IN\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">को\nसप्ताह का कौन\nसा दिन था</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">?</span></span></span><br/></span>",
    "comp": "",
    "options": [
      "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThursday</span></span></span></span><span class=\"hqt\"><span style=\"font-family: Mangal\"><span lang=\"hi-IN\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">गुरूवार</span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span></span>",
      "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nFriday</span></span></span></span><span class=\"hqt\"><span style=\"font-family: Mangal\"><span lang=\"hi-IN\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">शुक्रवार</span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span></span>",
      "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nSaturday</span></span></span></span><span class=\"hqt\"><span style=\"font-family: Mangal\"><span lang=\"hi-IN\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">शनिवार</span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span></span>",
      "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nWednesday</span></span></span></span><span class=\"hqt\"><span style=\"font-family: Mangal\"><span lang=\"hi-IN\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">बुधवार</span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span></span>"
    ],
    "correct_option_id": 0,
    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nRemember the code –></span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">1\n4 4 0 2 5 0 3 6 1 4 6 </span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nfor Non-Leap Year</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">J\nF M A M J J A S O N D </span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nAll months of the year</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Now,\n</span></span></span>\n<br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Add\nthe date, month code, last 2 digits of the year and the no. of leap\nyears.</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Date\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\n23</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Month\ncode </span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\n4</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Last\n2 digits of the year {1995}</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\n95</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">No.\nof leap years </span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\n23 {Just divide the Last 2 digits of the year by 4 and write the\nquotient}</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Now,\n23 + 4 + 95 + 23 = 145</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Now\njust find the no. of odd days = 145/7 = 5 {Remainder}</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">If\nNo. of odd days comes out to be </span></span></span>\n<br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">01\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nSunday</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">02\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nMonday</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">03\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nTuesday</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">04\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nWednesday</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">05\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThursday</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">06\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nFriday</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">00\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nSaturday</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Here\nin this case, the odd no. comes out to be 5</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">So,\nthe day of the week on 23</span></span></span><span style=\"color: #000000\"><sup><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">rd</span></span></sup></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nFebruary 1995 was Thursday.</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Note:-\nThe trick changed a little bit for leap years and other centuries\ni.e., 1800s, 2000s, etc. </span></span></span>\n<br/></span><span class=\"hqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: Mangal\"><span lang=\"hi-IN\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">कोड\nयाद रखें </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">-></span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1\n4 4 0 2 5 0 3 6 1 4 6 </span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">\n</span></span><span style=\"font-family: Mangal\"><span lang=\"hi-IN\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">गैर</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">-</span></span><span style=\"font-family: Mangal\"><span lang=\"hi-IN\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">लीप\nवर्ष के लिए</span></span></span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">J\nF M A M J J A S O N D </span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">\n</span></span><span style=\"font-family: Mangal\"><span lang=\"hi-IN\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">वर्ष\nके सभी महीने</span></span></span></span></span><br/><span style=\"font-family: Mangal\"><span lang=\"hi-IN\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">अब</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,</span></span></span><br/><span style=\"font-family: Mangal\"><span lang=\"hi-IN\"><span style=\"color: #000000\"><span style=\"f     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nIgneous rocks form when hot molten rock crystallizes and soldifies.\nIgneous rocks are divided into two groups, intrusive or extrusive,\ndepending upon where the molten rock solidifies. Granite is a\ncoarse-grained rock composed predominantly of feldspar and quarts, is\nan intrusive rock.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">आग्नेय\nचट्टानें तब\nबनती हैं जब\nगर्म पिघली हुई\nचट्टान क्रिस्टलीकृत\nहोकर ठोस हो\nजाती है। आग्नेय\nचट्टानों को\nदो समूहों में\nविभाजित किया\nजाता है</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">,\n</span></span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">घुसपैठ\nया बहिर्मुखी</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">,\n</span></span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">यह\nइस बात पर निर्भर\nकरता है कि पिघली\nहुई चट्टान कहाँ\nजमती है। ग्रेनाइट\nएक मोटे दाने\nवाली चट्टान\nहै जो मुख्य रूप\nसे फेल्डस्पार\nऔर क्वार्ट्स\nसे बनी होती है</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">, yle=\"font-size: 19px\">Used\nto indicate inclusion or location within something.<br>\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><i><b>Example</b></i></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><i>:\n\"She is in the room.\"</i></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><br>\n[Incorrect,\nbecause \"divided in\" is not used when referring to\nopinions.]</span></span></span><br/><span style=\"color: #000000\">•\n</span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><b>On</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\">\n– </span></span></span><span style=\"font-family: Mangal\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">पर</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n– </span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\">Used\nwhen referring to a specific subject or topic.<br>\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><i><b>Example</b></i></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><i>:\n\"The lecture was on climate change.\"</i></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><br>\n[Incorrect,\nbecause \"divided on\" is less common than \"divided\nover\" in this context.]</span></span></span><br/><span style=\"color: #000000\">•\n</span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><b>Over</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\">\n– </span></span></span><span style=\"font-family: Mangal\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">पर</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\">/\n</span></span></span><span style=\"font-family: Mangal\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">को</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">लेकर</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n– </span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\">Used\nto indicate disagreement or dispute about a topic.<br>\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><i><b>Example</b></i></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><i>:\n\"They were divided over the decision to increase\ntaxes.\"</i></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><br>\n[Correct,\nbecause \"divided over\" is the appropriate phrase for\ndebates or disagreements.]</span></span></span><br/><span style=\"color: #000000\">•\n</span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><b>Between</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\">\n– </span></span></span><span style=\"font-family: Mangal\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">के</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">बीच</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n– </span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\">Used\nwhen referring to two distinct people or things.<br>\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><i><b>Example</b></i></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><i>:\n\"The secret was shared between two friends.\"</i></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><br>\n[Incorrect,\nbecause \"divided between\" is used for physical division,\nnot opinions.]</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><b>Corrected\nSentence:</b></span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><b>\"The\ncommittee was divided </b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><u><b>over</b></u></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><b>\nthe proposal, leading to a heated debate.\"</b></span></span></span><br/></span><span class=\"hqt\"><p><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Explanation:</strong></span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">The correct preposition to use with \"</span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>divided</strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">\" when referring to differing opinions or disagreements is \"</span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>over.</strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">\"</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">Meanings and Examples of All Options:</span></span></span><br /><span style=\"color: #000000;\">&bull; </span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>In</strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><sp
