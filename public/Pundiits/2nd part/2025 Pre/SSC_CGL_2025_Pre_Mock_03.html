                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">

            </div>
        </div>
    </div>

            </div>
        </div>

la UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\"><strong>भारतीय</strong></span></span></span></span> <span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\"><strong>कला</strong></span></span></span></span> <span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\"><strong>प्रचलित</strong></span></span></span></span> <span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\"><strong>है</strong></span></span></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">?</span></span></span></p></span>",

    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nMadhubani Painting is practiced in the Mithila region of Bihar and\nNepal.</span></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nIt is known for its intricate patterns, vibrant colours, and\ndepiction of nature, folklore, and religious themes.</span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Kalamezhuthu</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nis an ancient art woven into the ritualistic mores of Bhagavati, Naga\nand Ayyappa temples in Kerala. </span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Thanjavur\npainting</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nis a classical South Indian painting style. </span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Pattachitra\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">is\na general term for traditional, cloth-based scroll painting, based in\nthe eastern Indian states of Odisha.</span></span></span><br/></span><span class=\"hqt\"><p><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">मधुबनी पेंटिंग बिहार और नेपाल के मिथिला क्षेत्र में प्रचलित है।</span></span></span></span> <span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">यह अपनी जटिल डिजाइनों</span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">जीवंतरंगों और प्रकृति</span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">लोककथाओं और धार्मिक विषयों को चित्रित करने के लिए जानी जाती है। </span></span></span> <br /><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">कालमेझुथु एक प्राचीन कला है जो केरल में भगवती</span></span></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">नागा और अयप्पा मंदिरों के अनुष्ठानिक रीति</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">-</span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">रिवाजों में बुनी गई है। तंजावुर पेंटिंग एक शास्त्रीय दक्षिण भारतीय चित्रकला शैली है। पट्टचित्र पूर्वी भारतीय राज्यों ओडिशा में आधारित पारंपरिक</span></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">कपड़ा</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">-</span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lan line-height: normal; font-family: 'Times New Roman';\">&nbsp;&nbsp;&nbsp;&nbsp; </span></span><!--[endif]--><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Cambria Math','serif'; mso-fareast-font-family: 'Times New Roman'; mso-bidi-font-family: Mangal; mso-fareast-language: EN-IN; mso-bidi-font-weight: bold;\">Milpa Farming</span></strong><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Cambria Math','serif'; mso-fareast-font-family: 'Times New Roman'; mso-bidi-font-family: Mangal; mso-fareast-language: EN-IN;\"><strong>:</strong> A term used in Central America, especially in Mexico, referring to the traditional slash-and-burn farming method.<o:p></o:p></span></p>\n<p></p>\n<p class=\"MsoNormal\" style=\"mso-margin-top-alt: auto; mso-margin-bottom-alt: auto; margin-left: .5in; text-indent: -.25in; mso-list: l0 level1 lfo1; tab-stops: list .5in;\"><!-- [if !supportLists]--><strong><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Cambria Math','serif'; mso-fareast-font-family: 'Cambria Math'; mso-bidi-font-family: 'Cambria Math'; mso-fareast-language: EN-IN;\">5.<span style=\"font-variant-numeric: normal; font-variant-east-asian: normal; font-variant-alternates: normal; font-size-adjust: none; font-kerning: auto; font-optical-sizing: auto; font-feature-settings: normal; font-variation-settings: normal; font-variant-position: normal; font-variant-emoji: normal; font-stretch: normal; font-size: 7pt; line-height: normal; font-family: 'Times New Roman';\">&nbsp;&nbsp;&nbsp;&nbsp; </span></span><!--[endif]--><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Cambria Math','serif'; mso-fareast-font-family: 'Times New Roman'; mso-bidi-font-family: Mangal; mso-fareast-language: EN-IN; mso-bidi-font-weight: bold;\">Kaingin Farming</span></strong><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Cambria Math','serif'; mso-fareast-font-family: 'Times New Roman'; mso-bidi-font-family: Mangal; mso-fareast-language: EN- nt-size: 19px;\">नागालैंड और मिजोरम में प्रयुक्त होता है।</span></span></span></p>\n<p></p>\n<p><span lang=\"ar-SA\" style=\"font-family: var(--font-family);\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><strong>4. मिलपा खेती</strong></span></span> </span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\"><strong>[Milpa Farming]:</strong> </span></span><span lang=\"ar-SA\" style=\"font-family: var(--font-family);\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">मध्य अमेरिका</span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\" style=\"font-family: var(--font-family);\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">विशेष रूप से मेक्सिको में इस विधि को कहा जाता है।</span></span></span></p>\n<p></p>\n<p><span lang=\"ar-SA\" style=\"font-family: var(--font-family);\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><strong>5. काईनगिन खेती</strong></span></span> </span><strong style=\"font-family: var(--font-family);\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">[Kaingin Farming]: </span></span></strong><span lang=\"ar-SA\" style=\"font-family: var(--font-family);\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">यह शब्द फिलीपींस में स्लैश और बर्न तकनीक के लिए प्रयुक्त होता है।</span></span></span></p>\n<p></p></span>",

    "solution": "<span class=\"eqt\"><p><span style=\"font-family: 'Times New Roman',serif;\"> <span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">The </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">alimentary canal</span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, also known as the </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">digestive tract</span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, is a long tube that runs from the mouth to the anus. It includes several organs that help in the process of digestion and absorption of nutrients. The organs that are </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">part of the alimentary canal</span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> include:</span></span></span></p>\n<p></p>\n<p><span style=\"font-size: 19px; font-family: 'Cambria Math', serif;\">a) Mouth</span></p>\n<p><span style=\"font-size: 19px; font-family: 'Cambria Math', serif;\">b) Esophagus</span></p>\n<p><span style=\"font-size: 19px; font-family: 'Cambria Math', serif;\">c) Stomach</span></p>\n<p><span style=\"font-size: 19px; font-family: 'Cambria Math', serif;\">d) Small intestine</span></p>\n<p><span style=\"font-size: 19px; font-family: 'Cambria Math', serif;\">e) Large intestine [colon]</span></p>\n<p><span style=\"font-size: 19px; font-family: 'Cambria Math', serif;\">f) Rectum</span></p>\n<p><span style=\"font-size: 19px; font-family: 'Cambria Math', serif;\">g) Anus</span></p>\n<p><br /><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">These organs form the pathway through which food travels, and digestion occurs.</span></span><br /><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">However, </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">accessory organs</span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> of digestion, like the </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">liver</span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">pancreas</span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, and </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">gallbladder</span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, are </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">not</span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> part of the alimentary canal, although they aid in digestion by secreting digestive enzymes and bile.</span></span></p></span><span class=\"hqt\"><p><span style=\"font-family: 'Times New Roman';\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">आहार नलिका</span></span></span></span><span style=\"font-family: 'Times New Roman',serif;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span style=\"font-family: 'Times New Roman';\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">जिसे </span></span><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">पाचन नलिका </span></span><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">भी कहा जाता है</span></span></span></span><span style=\"font-family: 'Times New Roman',serif;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span style=\"font-family: 'Times New Roman';\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">एक लंबी नलिका है जो मुंह से लेकर गुदा तक फैलती है।</span></span> <span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">इसमें कई अंग होते हैं जो पाचन प्रक्रिया और पोषक तत्वों के अवशोषण में मदद करते हैं।</span></span> <span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">आहार नलिका के अंगों में शामिल हैं</span></span></span></span><span style=\"font-family: 'Times New Roman',serif;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">:</span></span></span></p>\n<p></p>\n<p><span style=\"font-size: 19px; font-family: 'Nirmala UI';\">a) मुंह</span></p>\n<p><span lang=\"ar-SA\" style=\"font-family: var(--font-family);\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">b) गले</span></span> </span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">[</span></span><span lang=\"ar-SA\" style=\"font-family: var(--font-family);\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">एसोफेगस</span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">]</span></span></p>\n<p><span style=\"font-size: 19px; font-family: 'Nirmala UI';\">c) पेट</span></p>\n<p><span lang=\"ar-SA\" style=\"font-family: var(--font-family);\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">d) आंत</span></span> </span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">[</span></span><span lang=\"ar-SA\" style=\"font-family: var(--font-family);\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">छोटीआंत</span></span></span><span style=\"font-family: '     "solution": "<span class=\"eqt\"><p><span style=\"color: #000000;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> The common name of the compound </span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">𝑁𝑎𝐻𝐶𝑂</span></span></span><span style=\"color: #000000;\"><sub><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">3</span></span></sub></span><span style=\"color: #000000;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> is Baking Soda. </span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">Baking soda</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, also known as </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">sodium bicarbonate [NaHCO</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">₃]</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, is a white, crystalline powder commonly used in baking as a leavening agent. It releases carbon dioxide gas when mixed with an acid, causing dough or batter to rise. Apart from its culinary uses, baking soda is also used for cleaning, deodorizing, and as a mild antacid.</span></span><br /><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">Na</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">₂</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">CO</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">₃</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> is the chemical formula for </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">sodium carbonate</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, which is commonly known as </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">soda ash</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> or </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">washing soda</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">. It is a white, odourless, water-soluble salt that is widely used in various industries such as glass manufacturing, detergents, and chemicals.</span></span><br /><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">Bleaching powder</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, also known as </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">calcium hypochlorite</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, has the chemical formula </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">Ca[OCl]</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">₂</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">. It is a chemical compound commonly used for disinfecting, bleaching, and purifying water. It is a white, granular powder with a strong odour of chlorine and is widely used in the textile, paper, and cleaning industries, as well as for water treatment.</span></span><br /><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">Caustic soda</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, also known as </span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"><span style=\"font-weight: normal;\">sodium hydroxide [NaOH]</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, is a highly caustic and alkaline compound. It is a white, odourless solid that is highly soluble in water, releasing heat in the process. Caustic soda is widely used in industries such as soap manufacturing, water treatment, paper production, and chemical processing. It is also used as a drain cleaner and in various chemical reactions.</span></span></p></span><span class=\"hqt\"><p><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">बेकिंग सोडा </span></span><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">का सामान्य नाम </span></span><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">सोडियम बाइकार्बोनेट</span></span> </span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">[NaHCO</span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">₃] </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">है</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">जो एक सफेद</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">क्रिस्टलीय पाउडर होता है।</span></span> <span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">इसे आमतौर पर बेकिंग में खमीर उठाने वाले एजेंट के रूप में उपयोग किया जाता है।</span></span> <span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">यह किसी अम्ल के साथ मिलकर कार्बन डाइऑक्साइड गैस छोड़ता है</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">जिससे आटा या घोल फूलता है।</span></span> <span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">इसके अतिरिक्त</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">बेकिंग सोडा का उपयोग सफाई</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">दुर्गंध निवारण</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">और हल्के एंटासिड के रूप में भी किया जाता है।</span></span></span><br /><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Na</span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">₂</span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">CO</span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">₃ </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">का रासायनिक सूत्र </span></span><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">सोडियम कार्बोनेट </span></span><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">है</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">जिसे सामान्यत</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">: </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">सोडा ऐश </span></span><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">या </span></span><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">वॉशिंग सोडा </span></span><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">कहा जाता है।</span></span> <span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">यह एक सफेद</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">गंधहीन</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">जल में घुलन शील नमक है जो विभिन्न उद्योगों जैसे कांच निर्माण</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">डिटर्जेंट और रसायन में व्यापक रूप से उपयोग किया जाता है।</span></span></span><br /><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">ब्लीचिंग पाउडर</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">जिसे </span></span><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">कैल्शियम हाइपोच्लोराइट</span></span> </span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">[Ca[OCl]</span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">₂]</span></span> <span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">भी कहा जाता है</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">एक रासायनिक यौगिक है जिसे सामान्यत</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">: </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">कीटाणु शोधन</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">धुलाई और पानी को शुद्ध करने के लिए प्रयोग किया जाता है।</span></span> <span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">यह एक सफेद</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">दानेदार पाउडर है जिसमें क्लोरीन की तीव्र गंध होती है और यह कपड़ा</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">कागज</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">सफाई उद्योगों और जल उपचार में व्यापक रूप से उपयोग किया जाता है।</span></span></span><br /><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">कास्टिक सोडा</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">जिसे </span></span><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">सोडियम हाइड्रॉक्साइड</span></span> </span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">[NaOH] </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">भी कहा जाता है</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">एक अत्यधिक संक्षारक और क्षारीय यौगिक है।</span></span> <span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">यह एक सफेद</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">गंध हीन ठोस पदार्थ होता है जो पानी में अत्यधिक घुलनशील होता है</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">और इस प्रक्रिया में गर्मी उत्पन्न करता है।</span></span> <span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">कास्टिक सोडा का उपयोग साबुन निर्माण</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">जल उपचार</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">कागज उत्पादन</span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">और रासायनिक प्रसंस्करण जैसे उद्योगों में किया जाता है।</span></span> <span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">इसे नलिका क्लीनर के रूप में भी प्रयोग किया जाता है और विभिन्न रासायनिक प्रतिक्रियाओं में इसका उपयोग होता है।</span></span></span></p></span>",

    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"/></span></span>\n<span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><b>SILVER\nBULLET - </b></span></span></span><span style=\"font-family: Mangal\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><b>एक</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\"><b>\n</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><b>जादुई</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\"><b>\n</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><b>समाधान</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><b>-\n</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\">refers\nto a simple and magical solution to a complex or difficult problem.\nIt suggests that certain problems are too intricate to be solved with\na single, effortless method.<br>\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><b>Origin\nof this Idiom</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\">:\nThe phrase \"silver bullet\" originates from folklore, where\nit was believed that only a silver bullet could kill mythical\ncreatures like werewolves. This made it a symbol of a perfect and\nunique solution.<br>\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><b>Example</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\">:\n\"There is no silver bullet to improve the economy; it requires\nstructural reforms and consistent efforts.\"<br>\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><b>Explanation</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\">:\nThis means that improving the economy is a complex process that\ncannot be achieved with one simple action but requires sustained,\ncollective efforts over time.<br>\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><b>Hindi\ntranslation: \"</b></span></span></span><span style=\"font-family: Mangal\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">अर्थव्यवस्था</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">को</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">सुधारने</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">के</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">लिए</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">कोई</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">जादुई</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">समाधान</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">नहीं</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">है</span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><b>;\n</b></span></span></span><span style=\"font-family: Mangal\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">इसके</span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font
