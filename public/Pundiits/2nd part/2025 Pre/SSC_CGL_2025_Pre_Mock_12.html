                </div>
            </div>

        </div>

    "solution": "<span class=\"eqt\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe Indian Association, founded in 1876 by Surendranath Banerjee and\nAnanda Mohan Bose, was the first recognised nationalist organisation\nin British India and a precursor to the Indian National Congress. In\ncontrast, the Indian League was a UK-based organization that aimed to\ncampaign for full independence and self-government for India.</span></span><br/></span><span class=\"hqt\"><p><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">1876 ​​</span></span><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">में सुरेन्द्रनाथ बनर्जी और आनंद मोहन बोस द्वारा स्थापित इंडियन एसोसिएशन</span></span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">ब्रिटिश भारत में पहला मान्यता प्राप्त राष्ट्रवादी संगठन था और भारतीय राष्ट्रीय कांग्रेस की पूर्वगामी संस्था थी। इसके विपरीत</span></span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">, </span></span><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">इंडियन लीग एक यूके</span></span></span></span><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">-</span></span><span style=\"font-family: Calibri;\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">आधारित संगठन था जिसका उद्देश्य भारत के लिए पूर्ण स्वतंत्रता और स्वशासन के लिए अभियान चलाना था।</span></span></span></span></p></span>",
