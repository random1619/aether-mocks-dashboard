iation-settings: normal; font-variant-position: normal; font-variant-emoji: normal; font-stretch: normal; font-size: 7pt; line-height: normal; font-family: 'Times New Roman';\">&nbsp;&nbsp;&nbsp;&nbsp; </span></span><!--[endif]--><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Nirmala UI','sans-serif'; mso-fareast-font-family: 'Nirmala UI'; color: black;\">मधुबनी: मिथिला पेंटिंग के रूप में भी जाना जाता है, यह लोक कला बिहार से है।<o:p></o:p></span></p>\n<p class=\"normal\" style=\"text-indent: -.25in; mso-list: l0 level1 lfo1; margin: 0in 0in 10.0pt .5in;\"><!-- [if !supportLists]--><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Nirmala UI','sans-serif'; mso-fareast-font-family: 'Nirmala UI'; color: black;\">3.<span style=\"font-variant-numeric: normal; font-variant-east-asian: normal; font-variant-alternates: normal; font-size-adjust: none; font-kerning: auto; font-optical-sizing: auto; font-feature-settings: normal; font-variation-settings: normal; font-variant-position: normal; font-variant-emoji: normal; font-stretch: normal; font-size: 7pt; line-height: normal; font-family: 'Times New Roman';\">&nbsp;&nbsp;&nbsp;&nbsp; </span></span><!--[endif]--><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Nirmala UI','sans-serif'; mso-fareast-font-family: 'Nirmala UI'; color: black;\">वारली: यह मोनोक्रोमैटिक कला शैली महाराष्ट्र के ठाणे और नासिक के ग्रामीण जिलों से है। <o:p></o:p></span></p>\n<p class=\"normal\" style=\"text-indent: -.25in; mso-list: l0 level1 lfo1; margin: 0in 0in 10.0pt .5in;\"><!-- [if !supportLists]--><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Nirmala UI','sans-serif'; mso-fareast-font-family: 'Nirmala UI'; color: black;\">4.<span style=\"font-variant-numeric: normal; font-variant-east-asian: normal; font-variant-alternates: normal; font-size-adjust: none; font-kerning: auto; font-optical-sizing: auto; font-feature-settings: normal; font-variation-settings: normal; font-variant-position: norma     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe layer of the Earth responsible for its magnetic field is the\nouter core. The Earth’s magnetic field is generated by the\nmovement of molten iron in the outer core, which creates electric\ncurrents that produce the magnetic field. The Earth is made up of\nfour main layers: the crust, mantle, outer core, and inner core.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">पृथ्वी\nके चुंबकीय\nक्षेत्र के लिए\nजिम्मेदार\nपृथ्वी की परत\nबाहरी कोर है।\nपृथ्वी का चुंबकीय\nक्षेत्र बाहरी\nकोर में पिघले\nहुए लोहे की गति\nसे उत्पन्न होता\nहै</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">जो\nचुंबकीय क्षेत्र\nका उत्पादन करने\nवाली विद्युत\nधाराएं बनाता\nहै। पृथ्वी चार\nमुख्य परतों\nसे बनी है</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">:\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">क्रस्ट</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">मेंटल</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nTemperate evergreen forests are found in the mid-latitudinal coastal\nregions. They are located on the eastern margins of continents, such\nas in the south-eastern United States, southeast Brazil, and\nsoutheast China. </span></span></span>\n<br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">There\nare five categories of forests in India. These are Tropical evergreen\nforests, Tropical deciduous forests, Tropical thorn forests, Mountain\nforests, Swamp forests.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">शीतोष्ण\nसदाबहार वन मध्य\nअक्षांशीय तटीय\nक्षेत्रों में\nपाए जाते हैं।\nवे महाद्वीपों\nके पूर्वी छोरों\nपर स्थित हैं</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">जैसे\nदक्षिण</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">-</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">पूर्वी\nसंयुक्त राज्य\nअमेरिका</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">दक्षिण</span></span></span></span><span sty     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe feature of prerogative writs in the Indian Constitution was\nborrowed from England</span></span></span><span style=\"color: #000000\"><span style=\"font-size: 19px\">\n</span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">[UK].\nPrerogative writs are a legal remedy that allows people to seek\njudicial intervention when their rights are violated are used to\nsafeguard fundamental rights. The Supreme Court and high courts in\nIndia can issue writs of habeas corpus, mandamus, prohibition,\ncertiorari, and quo-warranto. These writs are incorporated in\nArticles 32 and 226 of the Indian Constitution respectively. </span></span></span>\n<br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">भारतीय\nसंविधान में\nविशेषाधिकार\nरिटों की विशेषता\nइंग्लैंड </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">[</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">यूके</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">]\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">से\nउधार ली गई थी।\nविशेषाधिकार\nरिट एक कानूनी\nउपाय है जो लोगों\nको न्यायिक\nहस्तक्षेप की\nतलाश करने की\nअनुमति देता\nहै जब उनके अधिकारों\nका उल्लंघन किया\nजाता है तो मौलिक\nअधिकारों की\nरक्षा के लिए\nउपयोग किया जाता\nहै। भारत मे     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nMetabolic reactions in the body are carried out by proteins called\nenzymes. These proteins act as catalysts, which mean they speed up\nchemical reactions without being used up.</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Metabolism\nis the process of converting food into energy through chemical\nreactions in the body’s cells. Metabolic reactions can be\ncatabolic or anabolic. </span></span></span>\n<br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Catabolic\nreactions: Break down large molecules into smaller ones, releasing\nenergy. </span></span></span>\n<br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Anabolic\nreactions: Build smaller molecules into larger ones. </span></span></span>\n<br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">शरीर\nमें चयापचय\nप्रतिक्रियाएं\nएंजाइम नामक\nप्रोटीन द्वारा\nकी जाती हैं।\nये प्रोटीन\nउत्प्रेरक के\nरूप में कार्य\nकरते हैं</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">जिसका\nअर्थ है कि वे\nउपयोग किए बिना\nरासायनिक\nप्रतिक्रियाओं\nको गति देते\nहैं। </span></span></span></span></span>\n<br/><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">चयापचय\nशरीर की कोशिकाओं\nमें रासायनिक\nप्रतिक्रियाओं\nके माध्यम से\nभोजन को ऊर्जा\nमें परिवर्तित\nकरने की प्रक्रिया\nहै। मेटाबोलिक\nप्रतिक्रियाएं\nअपचय या उपचय\nहो सकती हैं।\n</span></span></span></span></span>\n<br/><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">अपचयात्मक\nअभिक्रियाएँ</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">:\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">बड़े\nअणुओं को छोटे\nअणुओं में तोड़कर\nऊर्जा मुक्त\nकरना।</span></span></span></span></span><br/><span style=\"color: #000000\">\n<span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">एनाबॉलिक\nप्रतिक्रियाएं</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">:\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">छोटे\nअणुओं को बड़े\nअणुओं में बनाती\nहै।</span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><br/></span>",

    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nPlan revenue expenditure relates to Five-year plans so only I is\nright answer.</span></span></span><br/><span style=\"color: #000000\">\n“<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Plan\nexpenditure” refers to government spending specifically\nallocated for projects outlined in the country’s current [five\nyear] Plans that add to the countries productive capacity and this\nexpenditure is further classified in two types revenue and capital\nexpenditure.</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Examples:-Energy,\nwater, communication, transportation and agricultural expenditures\netc.</span></span></span><br/><span style=\"color: #000000\">“<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Non-plan\nexpenditure” refers to Regular government spending not part of\nthe Five-Year Plan, which usually includes salaries and pensions.&nbsp;&nbsp;&nbsp;&nbsp;</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">योजनागत\nराजस्व व्यय\nपंचवर्षीय\nयोजनाओं से\nसंबंधित है</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">इसलिए\nकेवल </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">I\n</span></span><span style=\"font-famil     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe headquarters of Allahabad Bank was in Kolkata, India. The bank\nwas founded in Allahabad in 1865 and merged with Indian Bank in 2020.</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">The\nheadquarters of the Reserve Bank of India [RBI] is in Mumbai,\nMaharashtra. The RBI was established in 1935 and its headquarters\nwere originally in Kolkata, but were moved to Mumbai in 1937. The RBI\nwas originally privately owned, but was nationalized in 1949. </span></span></span>\n<br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">इलाहाबाद\nबैंक का मुख्यालय\nकोलकाता</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">भारत\nमें था। बैंक\nकी स्थापना </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1865\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">में\nइलाहाबाद में\nहुई थी और </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">2020\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">में\nइसका इंडियन\nबैंक में विलय\nकर दिया गया था।\n</span></span></span></span></span     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nChlorine gas is used to make bleaching powder. Chlorine gas reacts\nwith dry slaked lime (Ca(OH)2) to create bleaching powder. </span></span></span>\n<br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">The\nchemical reaction is: 2 Ca(OH)2 + 2 Cl2 → Ca(OCl)2 + CaCl2 + 2\nH2O. </span></span></span>\n<br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Bleaching\npowder is represented as CaOCl2, though its actual composition is\ncomplex. Bleaching powder is used as an oxidizing agent in chemical\nindustries. It is used to remove colour from fabric or fiber. It is\nused to disinfect after cleaning. It is used in swimming pool\nsanitation etc.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">ब्लीचिंग\nपाउडर बनाने\nके लिए क्लोरीन\nगैस का इस्तेमाल\nकिया जाता है।\nक्लोरीन गैस\nब्लीचिंग पाउडर\nबनाने के लिए\nसूखे स्लेक्ड\nलाइम </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">CaOH2\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">के\nसाथ प्रतिक्रिया\nकरती है। </span></span></span></span></span>\n<br/><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">रासायनिक\nप्रतिक्रिया\nहै</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">:\n2 CaOH2 + 2 Cl2 </span></span></span><span style=\"color: #000000\"><span style=\"font-family: Arial,serif\"><span style=\"font-size: 19px\">→</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">\nCaOCl2 + CaCl2 + 2 H2O</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">।\n</span></span></span></span></span>\n<br/><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">ब्लीचिंग\nपाउडर को </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">CaOCl2\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">के\nरूप में दर्शाया\nजाता है</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">हालांकि\nइसकी वास्तविक\nसंरचना जटिल\nहै। ब्लीचिंग\nपाउडर का उपयोग\nरासायनिक उद्योगों\nमें ऑक्सीकरण\nएजेंट के रूप\nमें किया जाता\nहै। इसका उपयोग\nकपड़े या फाइबर\nसे रंग निकालने\nके लिए किया\nजाता है। इसका\nउपयोग सफाई के\nबाद कीटाणुरहित\nकरने के लिए\nकिया जाता है।\nइसका उपयोग\nस्विमिंग पूल</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">स्वच्छता\nआदि में किया\nजाता है।</span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><br/></span>",

    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe liquid that can dissolve noble metals like gold and platinum is\naqua regia.  Aqua regia is a mixture of concentrated nitric acid and\nhydrochloric acid in a specific ratio of 1:3, and is often called\n“royal water” because of its ability to dissolve precious\nmetals like gold and platinum. </span></span></span>\n<br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">तरल\nजो सोने और प्लैटिनम\nजैसी महान धातुओं\nको भंग कर सकता\nहै वह एक्वा\nरेजिया है।\nएक्वा रेजिया\n</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1:\n3 </span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">के\nविशिष्ट अनुपात\nमें सांद्रित\nनाइट्रिक एसिड\nऔर हाइड्रोक्लोरिक\nएसिड का मिश्रण\nहै</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">और\nसोने और प्लैटिनम\nजैसी कीमती\nधातुओं को भंग\nकरने की क्षमता\nके कारण इसे\n</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">\"</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">शाही\nपानी</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">\"\n</span></span><span style=\"font-family: Calib     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe Twin Paradox is associated with the theory of special relativity,\nspecifically the concept of time dilation, where a moving object\nexperiences time passing slower than for a stationary observer,\nresulting in the “paradox” of one twin aging less than\nthe other if one travels at near-light speeds and returns to Earth.\nThe theory of relativity is a set of theories proposed and published\nin 1905 and 1915, respectively by Albert Einstein that explains how\nspace, time, mass, and energy relate to each other. The theory\nincludes special relativity and general relativity. </span></span></span>\n<br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">जुड़वां\nविरोधाभास विशेष\nसापेक्षता के\nसिद्धांत से\nजुड़ा हुआ है</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">विशेष\nरूप से समय फैलाव\nकी अवधारणा</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">जहां\nएक चलती हुई\nवस्तु एक स्थिर\nपर्यवेक्षक\nकी तुलना में\nधीमी गति से\nगुजरने वाले\nसमय का अनुभव\nकरती है</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">जिसके\nपरिणामस्वरूप\nएक जुड़वां उम्र\nबढ़ने का </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">\"</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">विरोधाभास</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">\"\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">दूसरे\nकी तुलना में\nकम होता है यदि\nकोई निकट</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">-</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">प्रकाश\nगति से यात्रा\nकरता है और पृथ्वी\nपर लौटता है।\nसापेक्षता का\nसिद्धांत अल्बर्ट\nआइंस्टीन द्वारा\nक्रमशः </span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">1905\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">और\n</span></span></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">1915</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">में\nप्रस्तावित\nऔर प्रकाशित\nसिद्धांतों\nका एक समूह है\nजो बताता है कि\nअंतरिक्ष</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">समय</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">द्रव्यमान\nऔर ऊर्जा एक\nदूसरे से कैसे\nसंबंधित हैं।\nसिद्धांत में\nविशेष सापेक्षता\nऔर सामान्य\nसापेक्षता शामिल\nहै।</span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><br/></span>",

    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nDhruv Sitwala won the 2024 Asian Billiards Championship by defeating\nPankaj Advani in Riyadh, Saudi Arabia. The tournament was held from\nJune 27 to July 5, 2024. This was Dhruv’s third Asian Billiards\ntitle, having previously won in 2015 and 2016. The Asian\nConfederation of Billiard Sports [ACBS] organized the Asian Billiards\nChampionship.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">ध्रुव\nसितवाला ने सऊदी\nअरब के रियाद\nमें पंकज आडवाणी\nको हराकर </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">2024\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">एशियाई\nबिलियर्ड्स\nचैंपियनशिप\nजीती। टूर्नामेंट\n</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">27\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">जून\nसे </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">5\n</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">जुलाई</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n2024 </span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size:     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe E-Daakhil portal is an online platform for filing consumer\ncomplaints.  The e-Daakhil portal was first launched on 7</span></span></span><span style=\"color: #000000\"><sup><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">th</span></span></sup></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nSeptember 2020 by the National Consumer Dispute Redressal Commission.\nBy the end of 2023, it was launched in 35 States/UTs except Ladakh.\nNow, as the Hon’ble Lieutenant Governor of Ladakh, Brig. B.D.\nMishra launched the e-Daakhil Portal in Ladakh Consumer Commission on\n22</span></span></span><span style=\"color: #000000\"><sup><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">nd</span></span></sup></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nNovember 2024, the platform is accessible to consumers across all\nregions of India, from metropolitan cities to remote areas.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">ई</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">-</span></span><span style=\"font-family: Calibri\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">दाखिल\nपोर्टल उपभोक्ता\nशिकायतों को\nदर्ज करने के\nलिए एक ऑनलाइन\nमंच है।  ई</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span     "solution": "<span class=\"eqt\">\n<span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">\n</span></span></span><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\"><b>Explanation\n- </b></span></span></span><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">\n</span></span></span><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">The\ncontext suggests that Zepto is trying to separate or dissociate\nitself from the workers' issues by claiming it's just a technology\nplatform and not responsible for their employment conditions.\n\"</span></span></span><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\"><b>Distancing</b></span></span></span><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">\"\nfits perfectly in this context, as it implies creating a separation\nor detachment.</span></span></span><br/>\n<span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\"><b>The\nother options don't fit as well:</b></span></span></span><br/>\n<span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">-\n</span></span></span><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\"><b>Forwarding</b></span></span></span><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">\nimplies moving something ahead or sending it forward, which doesn't\nfit the context.</span></span></span><br/>\n<span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">-\n</span></span></span><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\"><b>Alleging</b></span></span></span><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">\nimplies making a claim or assertion, which doesn't fit the context of\nZepto's response.</span></span></span><br/>\n<span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">-\n</span></span></span><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\"><b>Condemning</b></span></span></span><span style=\"font-family: Cambria,serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">\nimplies strongly criticizing or disapproving, which is the opposite\nof what Zepto is doing in this context.</span></span></span><br/></span><span class=\"hqt\"><p><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><span lang=\"en-US\"><strong>Explanation - </strong></span></span></span><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><span lang=\"en-US\">The context suggests that Zepto is trying to separate or dissociate itself from the workers' issues by claiming it's just a technology platform and not responsible for their employment conditions. \"</span></span></span><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><span lang=\"en-US\"><strong>Distancing</strong></span></span></span><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><span lang=\"en-US\">\" fits perfectly in this context, as it implies creating a separation or detachment.</span></span></span><br /><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><span lang=\"en-US\"><strong>The other options don't fit as well:</strong></span></span></span><br /><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><span lang=\"en-US\">- </span></span></span><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><span lang=\"en-US\"><strong>Forwarding</strong></span></span></span><span style=\"font-family: Cambria,
