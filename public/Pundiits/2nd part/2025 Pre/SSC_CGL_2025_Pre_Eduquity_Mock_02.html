    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe Fifth Amendment Act of 1955 amended Article 3 of the Indian\nConstitution, which deals with the formation of new states and\nchanges to existing state boundaries. This amendment introduced a\nprovision requiring the President to seek the opinion of the\nconcerned state legislature before introducing any bill in Parliament\nrelated to altering state boundaries. However, the opinion of the\nstate legislature was not binding on Parliament. This change ensured\nthat states had a consultative role in territorial changes while\nmaintaining Parliament’s authority over reorganization matters.</span></span></span><br/></span><span class=\"hqt\"><p><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">1955 </span></span></span><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">के पांचवें संशोधन अधिनियम ने भारतीय संविधान के अनुच्छेद </span></span></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">3 </span></span></span><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">में संशोधन किया</span></span></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">जो नए राज्यों के गठन और मौजूदा राज्य की सीमाओं में बदलाव से संबंधित है। इस संशोधन ने एक प्रावधान पेश किया जिसके अनुसार राष्ट्रपति को राज्य की सीमाओं में बदलाव से संबंधित कोई भी विधेयक संसद में पेश करने से पहले संबंधित राज्य विधानमंडल की राय लेनी होगी। हालाँकि</span></span></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">राज्य विधानमंडल की राय संसद के लिए बाध्यकारी नहीं थी। इस बदलाव ने यह सुनिश्चित किया कि पुनर्गठन के मामलों पर संसद के अधिकार को बनाए रखते हुए राज्यों की क्षेत्रीय परिवर्तनों में सलाहकार भूमिका होगी।</span></span></span></span></span></p></span>",

    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe book \"Chanakya’s Chant\" was written by Ashwin\nSanghi.  Published in 2010, Chanakya’s Chant is a historical\nfiction novel that intertwines two parallel stories—one set in\nancient India during the time of Chanakya, and the other in modern\nIndia, following a shrewd political strategist. The book highlights\npolitical manoeuvring, strategy, and power dynamics, drawing\nparallels between the two timelines. Ashwin Sanghi is known for\nblending history with contemporary fiction, making complex subjects\nengaging for readers.</span></span></span><br/></span><span class=\"hqt\"><p><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">\"</span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">चाणक्य का मंत्र</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">\" </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">पुस्तक अश्विन सांघी द्वारा लिखी गई थी। </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">2010 </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">में प्रकाशित</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">चाणक्य का मंत्र एक ऐतिहासिक काल्पनिक उपन्यास है जो दो समानांतर कहानियों को आपस में जोड़ता है </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">- </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">एक चाणक्य के समय के प्राचीन भारत में और दूसरी आधुनिक भारत में</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">एक चतुर राजनीतिक रणनीतिकार का अनुसरण करते हुए। पुस्तक राजनीतिक पैंतरेबाजी</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">रणनीति और सत्ता की गतिशीलता पर प्रकाश डालती है</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">दो समयसीमाओं के बीच समानताएं खींचती है। अश्विन सांघी इतिहास को समकालीन कथा साहित्य के साथ मिलाने के लिए जाने जाते हैं</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">जिससे जटिल विषय पाठकों के लिए दिलचस्प बन जाते हैं।</span></span></span></span></span></p></span>",

    "solution": "<span class=\"eqt\"><p><span style=\"color: #000000;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Article 47 of the Directive Principles of State Policy underscores that it is the duty of the State to raise the level of nutrition and the standard of living and to improve public health. The State shall endeavour to bring about prohibition on the consumption except for medicinal purposes of intoxicating drinks and of drugs which are injurious to health, whereas prohibition of employment of children in factories or mines, prohibition of beggar or forced labour, and prohibition of untouchability are mentioned under Article 24, 23 and 17 respectively of Fundamental rights. </span></span></span> </p></span><span class=\"hqt\"><p><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">राज्य</span></span></span> <span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">नीति</span></span></span> <span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">के</span></span></span> <span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">निर्देशक</span></span></span> <span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">सिद्धांतों</span></span></span> <span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">के</span></span></span> <span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\">अनुच्छेद</span></span></span> </span><span style=\"color: #000000;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">47 </span></span></span><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI'     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe Second Anglo-Afghan War [1878–1880] was fought between\nBritish India and Afghanistan, as Britain aimed to counter Russian\ninfluence in the region. During this period, Indian newspapers became\nhighly critical of British actions, prompting Lord Lytton to\nintroduce the Vernacular Press Act of 1878 to curb dissent. This act\nallowed the government to censor vernacular newspapers that\ncriticized British rule, significantly restricting freedom of the\npress in India.</span></span></span><br/></span><span class=\"hqt\"><p><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">दूसरा एंग्लो</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">-</span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">अफ़गान युद्ध </span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">[1878-1880</span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\"><span lang=\"en-US\">]</span></span></span></span><span style=\"color: #000000;\"> <span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">ब्रिटिश भारत और अफ़गानिस्तान के बीच लड़ा गया था</span></span></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">क्योंकि ब्रिटेन का उद्देश्य इस क्षेत्र में रूसी प्रभाव का मुकाबला करना था। इस अवधि के दौरान</span></span></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">भारतीय समाचार</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">-</span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">पत्र ब्रिटिश कार्यों के अत्यधिक आलोचक बन गए</span></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">जिससे लॉर्ड लिटन को असहमति को रोकने के लिए </span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">1878 </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">का वर्नाक्यूलर प्रेस एक्ट लागू करना पड़ा। इस अधिनियम ने सरकार को ब्रिटिश शासन की आलोचना करने वाले स्थानीय समाचार</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">-</span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">पत्रों को सेंसर करने की अनुमति दी</span></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">जिससे भारत में प्रेस की स्वतंत्रता पर काफ     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe Age of Consent Act, 1891, was associated with B.M. Malabari, a\nsocial reformer and journalist. He played a key role in advocating\nagainst child marriage and for raising the minimum age of consent.\nHis efforts influenced the British government to pass this law, which\nmade it illegal for a girl under 12 years to be married or have\nmarital relations.</span></span></span><br/></span><span class=\"hqt\"><p><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">सहमति की आयु अधिनियम</span></span></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">1891</span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">समाज सुधारक और पत्रकार बी</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">.</span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">एम</span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">. </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">मालाबारी से जुड़ा था। उन्होंने बाल विवाह के खिलाफ़ वकालत करने और सहमति की न्यूनतम आयु बढ़ाने में महत्वपूर्ण भूमिका निभाई। उनके प्रयासों से ब्रिटि     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nA centriole is a paired, barrel-shaped organelle located in the\ncytoplasm of animal cells near the nuclear envelope.</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Centrioles\nplay a crucial role in cell division by organizing the mitotic\nspindle and are involved in the formation of cilia and flagella. They\nare composed of microtubules arranged in a 9+0 structure and are\ntypically found in animal cells but not in most plant cells. During\ncell division, centrioles help in the proper segregation of\nchromosomes.</span></span></span><br/></span><span class=\"hqt\"><p><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">सेंट्रीओल एक युग्मित</span></span></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">, </span></span></span><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">बैरल के आकार का अंग है जो परमाणु लिफाफे के पास पशु कोशिकाओं के कोशिका द्रव्य में स्थित होता है। </span></span></span></span></span> <br /><span lang=\"ar-SA\"><span style=\"color: #000000;\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">सेंट्रीओल माइटोटिक स्पिंडल को व्यवस्थित करके कोशिका विभाजन में महत्वपूर्ण भूमिका निभाते हैं और सिलिया और फ्लैगेला के निर्माण में शामिल होते हैं। वे </span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif;\"><span style=\"font-size: 19px;\">9+0 </span></span><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI';\"><span style=\"font-size: 19px;\"><span lang=\"hi-IN\">     "solution": "<span class=\"eqt\"><p><span style=\"color: #000000;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> To calculate this probability, we need to find the probability of getting the same number on each dice and exactly 1 head on the coin, and then multiply these probabilities together.</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">There are 6 possible outcomes where all three dice show the same number {1,1,1}, {2,2,2}, ..., {6,6,6}.</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Total possible outcomes for three dice = 6</span></span></span><span style=\"color: #000000;\"><sup><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">3</span></span></sup></span><span style=\"color: #000000;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> = 216.</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Probability = 6/216 = 1/36.</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">And, there are 3 possible outcomes with exactly 1 head [HTT, THT, TTH].</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">Total possible outcomes for three coins = 2</span></span></span><span style=\"color: #000000;\"><sup><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\">3</span></span></sup></span><span style=\"color: #000000;\"><span style=\"font-family: 'Cambria Math',serif;\"><span style=\"font-size: 19px;\"> = 8.</span></span></span><br /><span style=\"color: #000000;\"><span style=\"fon     "solution": "<span class=\"eqt\"><p class=\"MsoNormal\" style=\"margin-bottom: 11.0pt;\"><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Cambria Math',serif;\">4x - 3y + 9 = 0</span><o:p></o:p></p>\n<p class=\"MsoNormal\" style=\"margin-bottom: 11.0pt;\"><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Cambria Math',serif;\">5x + 2y - 29 = 0<o:p></o:p></span></p>\n<p class=\"MsoNormal\" style=\"margin-bottom: 11.0pt;\"><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Cambria Math',serif;\">On solving these two equations, we get x = 3 and y = 7<o:p></o:p></span></p>\n<p class=\"MsoNormal\" style=\"margin-bottom: 11.0pt;\"><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Cambria Math',serif;\">Intersection points of above lines are (3, 7).<o:p></o:p></span></p>\n<p class=\"MsoNormal\" style=\"margin-bottom: 11.0pt;\"><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Cambria Math',serif;\">Also, it is given that (3, 7) lies on y = Mx + 16<o:p></o:p></span></p>\n<p class=\"MsoNormal\" style=\"margin-bottom: 11.0pt;\"><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Cambria Math',serif;\">Put, x = 3 and y = 7 in the given equation,<o:p></o:p></span></p>\n<p class=\"MsoNormal\" style=\"margin-bottom: 11.0pt;\"><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Cambria Math',serif;\">7 = 3M + 16<o:p></o:p></span></p>\n<p class=\"MsoNormal\" style=\"margin-bottom: 11.0pt;\"><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Cambria Math',serif;\">3M = -9<o:p></o:p></span></p>\n<p><span lang=\"EN-IN\" style=\"font-size: 14.0pt; font-family: 'Cambria Math',serif; mso-fareast-font-family: 'Times New Roman'; mso-bidi-font-family: Calibri; mso-ansi-language: EN-IN; mso-fareast-language: EN-IN; mso-bidi-language: AR-SA;\">M = -3</span></p></span><span class=\"hqt\"><p><span style=\"font-family: Cambria Math, serif;\"><span style=\"font-size: 19px;\">4x - 3y + 9 = 0</span></span     "question": "<span class=\"eqt\"><p style=\"text-align: justify;\"><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"> India&nbsp;will keep purchasing oil from Russia despite U.S. President Donald Trump's threats of penalties, two&nbsp;Indian government sources told Reuters on Saturday, not wishing to be identified due to the sensitivity of the matter. On top of a new 25% tariff on&nbsp;India's exports to the U.S., Trump indicated in a Truth Social post last month that&nbsp;India&nbsp;would face additional penalties for purchases of Russian arms and oil. On Friday, Trump told reporters he had heard that&nbsp;India&nbsp;would no longer be buying oil from Russia. But the sources said there would be no immediate changes. \"These are long-term oil contracts,\" one of the sources said. \"It is not so simple to just stop buying overnight.\" Justifying&nbsp;India's oil purchases from Russia, a second source said&nbsp;India's imports of Russian grades had helped avoid a global surge in oil prices, which have remained subdued despite Western curbs on the Russian oil sector. </span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">Unlike Iranian and Venezuelan oil, Russian crude is not subject to direct sanctions, and&nbsp;India&nbsp;is buying it below the current price cap fixed by the European Union, the source said. The New York Times also quoted two unnamed senior&nbsp;Indian officials on Saturday as saying there had been no change in&nbsp;Indian government policy. Indian government authorities did not respond to Reuters' request for official comment on its oil purchasing intentions. However, during a regular press briefing on Friday, foreign ministry spokesperson Randhir Jaiswal said&nbsp;India&nbsp;has a \"steady and time-tested partnership\" with Russia. \"On our energy sourcing requirements ... we look at what is there available in the markets, what is there on offer, and also what is the prevailing global situation or circumstances,\" he said. The White House did not immediately respond to requests for comment. Trump, who has made ending Russia's war in Ukraine a priority of his administration since returning to office this year, has expressed growing impatience with Russian President Vladimir Putin in recent weeks. He has threatened 100% tariffs on U.S. imports from countries that buy Russian oil unless Moscow reaches a major peace deal with Ukraine. Russia is the leading supplier to&nbsp;India, the world's third-largest oil importer and consumer, accounting for about 35% of its overall supplies. India&nbsp;imported about 1.75 million barrels per day of Russian oil from January to June this year, up 1% from a year ago, according to data provided to Reuters by sources. But while the&nbsp;Indian government may not be deterred by Trump's threats, sources told Reuters this week that&nbsp;Indian state refiners stopped buying Russian oil after July discounts narrowed to their lowest since 2022 - when sanctions were first imposed on Moscow - due to lower Russian exports and steady demand. Indian Oil Corp, Hindustan Petroleum Corp, Bharat Petroleum Corp and Mangalore Refinery Petrochemical Ltd have not sought Russian crude in the past week or so, four sources told Reuters. Nayara Energy - a refinery majority-owned by Russian entities, including oil major Rosneft, and major buyer of Russian oil - was recently sanctioned by the EU. Nayara's chief executive resigned following the sanctions, and three vessels laden with oil products from Nayara Energy have yet to discharge their cargoes, hindered by the new EU sanctions, Reuters reported last week.</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Which of the following is the most appropriate title for the passage?</strong></span></span></span></p></span><span cla rship\" with Russia. \"On our energy sourcing requirements ... we look at what is there available in the markets, what is there on offer, and also what is the prevailing global situation or circumstances,\" he said. The White House did not immediately respond to requests for comment. Trump, who has made ending Russia's war in Ukraine a priority of his administration since returning to office this year, has expressed growing impatience with Russian President Vladimir Putin in recent weeks. He has threatened 100% tariffs on U.S. imports from countries that buy Russian oil unless Moscow reaches a major peace deal with Ukraine. Russia is the leading supplier to&nbsp;India, the world's third-largest oil importer and consumer, accounting for about 35% of its overall supplies. India&nbsp;imported about 1.75 million barrels per day of Russian oil from January to June this year, up 1% from a year ago, according to data provided to Reuters by sources. But while the&nbsp;Indian government may not be deterred by Trump's threats, sources told Reuters this week that&nbsp;Indian state refiners stopped buying Russian oil after July discounts narrowed to their lowest since 2022 - when sanctions were first imposed on Moscow - due to lower Russian exports and steady demand. Indian Oil Corp, Hindustan Petroleum Corp, Bharat Petroleum Corp and Mangalore Refinery Petrochemical Ltd have not sought Russian crude in the past week or so, four sources told Reuters. Nayara Energy - a refinery majority-owned by Russian entities, including oil major Rosneft, and major buyer of Russian oil - was recently sanctioned by the EU. Nayara's chief executive resigned following the sanctions, and three vessels laden with oil products from Nayara Energy have yet to discharge their cargoes, hindered by the new EU sanctions, Reuters reported last week.</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Sentence: </str     "solution": "<span class=\"eqt\"><p><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>What is a Clause? - </strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">A clause is a group of words that contains a subject and a verb. There are two types of clause - </span></span></span> </p>\n<ul>\n<li>\n<p align=\"justify\" style=\"margin-bottom: 0px; line-height: 115%;\"><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Independent clause</strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">: Makes complete sense on its own.</span></span></span></p>\n</li>\n</ul>\n<p><span style=\"color: #000000;\">👉</span><span style=\"color: #000000;\"> <span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">\"India is buying oil.\"</span></span></span></p>\n<ul>\n<li>\n<p align=\"justify\" style=\"margin-bottom: 0px; line-height: 115%;\"><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Dependent clause</strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">: Has a subject and verb but cannot stand alone.</span></span></span></p>\n</li>\n</ul>\n<p align=\"justify\" style=\"margin-bottom: 0px; line-height: 115%;\"><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>What is a Relative Clause?</strong></span></span></span></p>\n<p><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">A Relative Clause is a type of dependent clause. It begins with a relative pronoun like who, whom, whose, that, which. It describes or gives more information about a noun in the main sentence (just like an adjective does).</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Back to the Sentence: \"Which have remained subdued despite Western curbs on the Russian oil sector.\"</strong></span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">The clause: \"</span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Which have remained subdued</strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">...\" is giving extra info about oil prices. This makes it a Relative Clause that modifies the noun \"oil prices\".</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Let&rsquo;s visit other options:&nbsp;</strong></span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>A. Noun Clause </strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Segoe UI Emoji',serif;\"><span style=\"font-size: 19px;\">❌</span></span></span> <br /><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">A noun clause acts as a subject or object (e.g., \"What you said was true.\"). </span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">But this clause describes &ldquo;oil prices,&rdquo; not acting as subject/object.</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>B. Adverbial Clause </strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Segoe UI Emoji',serif;\"><span style=\"font-size: 19px;\">❌</span></span></span> <br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">Adverbial clauses explain when, where, why, how about a verb. This clause is not modifying a verb, it&rsquo;s modifying a noun (oil prices).</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>D. Participial Phrase </strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Segoe UI Emoji',serif;\"><span style=\"font-size: 19px;\">❌</span></span></span> <br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">That would look like: \"Remaining subdued, oil prices...\" But here we have a full clause i.e. subject = which, verb = have remained, not just a phrase.</span></span></span></p></span><span class=\"hqt\"><p><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>What is a Clause? -&nbsp;</strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">A clause is a group of words that contains a subject and a verb. There are two types of clause -</span></span></span></p>\n<ul>\n<li>\n<p align=\"justify\" style=\"margin-bottom: 0px; line-height: 115%;\"><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Independent clause</strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">: Makes complete sense on its own.</span></span></span></p>\n</li>\n</ul>\n<p><span style=\"color: #000000;\">👉</span><span style=\"color: #000000;\">&nbsp;<span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">\"India is buying oil.\"</span></span></span></p>\n<ul>\n<li>\n<p align=\"justify\" style=\"margin-bottom: 0px; line-height: 115%;\"><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Dependent clause</strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">: Has a subject and verb but cannot stand alone.</span></span></span></p>\n</li>\n</ul>\n<p align=\"justify\" style=\"margin-bottom: 0px; line-height: 115%;\"><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>What is a Relative Clause?</strong></span></span></span></p>\n<p><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">A Relative Clause is a type of dependent clause. It begins with a relative pronoun like who, whom, whose, that, which. It describes or gives more information about a noun in the main sentence (just like an adjective does).</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Back to the Sentence: \"Which have remained subdued despite Western curbs on the Russian oil sector.\"</strong></span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">The clause: \"</span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Which have remained subdued</strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">...\" is giving extra info about oil prices. This makes it a Relative Clause that modifies the noun \"oil prices\".</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Let&rsquo;s visit other options:&nbsp;</strong></span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>A. Noun Clause&nbsp;</strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Segoe UI Emoji',serif;\"><span style=\"font-size: 19px;\">❌</span></span></span><br /><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">A noun clause acts as a subject or object (e.g., \"What you said was true.\").&nbsp;</span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">But this clause describes &ldquo;oil prices,&rdquo; not acting as subject/object.</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>B. Adverbial Clause&nbsp;</strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Segoe UI Emoji',serif;\"><span style=\"font-size: 19px;\">❌</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">Adverbial clauses explain when, where, why, how about a verb. This clause is not modifying a verb, it&rsquo;s modifying a noun (oil prices).</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>D. Participial Phrase&nbsp;</strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: 'Segoe UI Emoji',serif;\"><span style=\"font-size: 19px;\">❌</span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\">That would look like: \"Remaining subdued, oil prices...\" But here we have a full clause i.e. subject = which, verb = have remained, not just a phrase.</span></span></span></p></span>",

000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Sentence from the passage: </strong></span></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><em>\"Three vessels laden with oil products from Nayara Energy have yet to discharge their cargoes.\"</em></span></span></span><br /><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><span style=\"font-size: 19px;\"><strong>Which of the following best explains the role of \"laden with oil products from Nayara Energy\"?</strong></span></span></span></p></span>",

    "solution": "<span class=\"eqt\"><p data-start=\"578\" data-end=\"628\"><span style=\"font-size: 12pt;\">A&nbsp;<strong data-start=\"580\" data-end=\"602\">Participial Phrase</strong>&nbsp;is a group of words that:</span></p>\n<ul data-start=\"630\" data-end=\"807\">\n<li data-start=\"630\" data-end=\"678\">\n<p data-start=\"632\" data-end=\"678\"><span style=\"font-size: 12pt;\">Begins with a&nbsp;<strong data-start=\"646\" data-end=\"660\">participle</strong>&nbsp;(present or past)</span></p>\n</li>\n<li data-start=\"679\" data-end=\"742\">\n<p data-start=\"681\" data-end=\"742\"><span style=\"font-size: 12pt;\">Functions like an&nbsp;<strong data-start=\"699\" data-end=\"712\">adjective</strong>&nbsp;(describes a noun or pronoun)</span></p>\n</li>\n<li data-start=\"743\" data-end=\"807\">\n<p data-start=\"745\" data-end=\"807\"><span style=\"font-size: 12pt;\">May include&nbsp;<strong data-start=\"757\" data-end=\"781\">objects or modifiers</strong>&nbsp;along with the participle</span></p>\n</li>\n</ul>\n<h3 data-start=\"814\" data-end=\"836\"><span style=\"font-size: 12pt;\">✅&nbsp;<strong data-start=\"820\" data-end=\"834\">Structure:&nbsp;</strong><strong data-start=\"837\" data-end=\"874\">[Participle] + [Object/Modifiers]</strong></span></h3>\n<h3 data-start=\"814\" data-end=\"836\"><span style=\"font-size: 12pt;\">✅&nbsp;<strong data-start=\"882\" data-end=\"895\">Function:&nbsp;</strong>Describes or gives more info about a&nbsp;<strong data-start=\"935\" data-end=\"943\">noun</strong></span></h3>\n<h3 data-start=\"950\" data-end=\"970\"><span style=\"font-size: 12pt;\">🔸&nbsp;<strong data-start=\"957\" data-end=\"970\">Examples:&nbsp;</strong></span></h3>\n<h4 data-start=\"972\" data-end=\"1012\"><span style=\"font-size: 12pt;\">1.&nbsp;<strong data-start=\"980\" data-end=\"1010\">Present participial phrase -&nbsp;</strong></span><span style=\"font-size: 12pt;\">👉&nbsp;<em data-start=\"1016\" data-end=\"1070\">&ldquo;Running down the street, the boy tripped and fell.&rdquo;</em></span></h4>\n<ul data-start=\"1072\" data-end=\"1212\">\n<li data-start=\"1072\" data-end=\"1126\">\n<p data-start=\"1074\" data-end=\"1126\"><span style=\"font-size: 12pt;\"><strong data-start=\"1074\" data-end=\"1103\">&ldquo;Running down the street&rdquo;</strong>&nbsp;= participial phrase</span></p>\n</li>\n<li data-start=\"1127\" data-end=\"1154\">\n<p data-start=\"1129\" data-end=\"1154\"><span style=\"font-size: 12pt;\">Describes&nbsp;<strong data-start=\"1139\" data-end=\"1152\">&ldquo;the boy&rdquo;</strong></span></p>\n</li>\n<li data-start=\"1155\" data-end=\"1181\">\n<p data-start=\"1157\" data-end=\"1181\"><span style=\"font-size: 12pt;\">\"Running\" = participle</span></p>\n</li>\n<li data-start=\"1182\" data-end=\"1212\">\n<p data-start=\"1184\" data-end=\"1212\"><span style=\"font-size: 12pt;\">\"down the street\" = modifier</span></p>\n</li>\n</ul>\n<h4 data-start=\"1214\" data-end=\"1251\"><span style=\"font-size: 12pt;\">2.&nbsp;<strong data-start=\"1222\" data-end=\"1249\">Past participial phrase -&nbsp;</strong></span><span style=\"font-size: 12pt;\">👉&nbsp;<em data-start=\"1255\" data-end=\"1299\">&ldquo;Shocked by the news, she couldn&rsquo;t speak.&rdquo;</em></span></h4>\n<p></p>\n<ul data-start=\"1301\" data-end=\"1429\">\n<li data-start=\"1301\" data-end=\"1351\">\n<p data-start=\"1303\" data-end=\"1351\"><span style=\"font-size: 12pt;\"><strong data-start=\"1303\" data-end=\"1328\">&ldquo;Shocked by the news&rdquo;</strong>&nbsp;= participial phrase</span></p>\n</li>\n<li data-start=\"1352\" data-end=\"1375\">\n<p data-start=\"1354\" data-end=\"1375\"><span style=\"font-size: 12pt;\">Describes&nbsp;<strong data-start=\"1364\" data-end=\"1373\">&ldquo;she&rdquo;</strong></span></p>\n</li>\n<li data-start=\"1376\" data-end=\"1402\">\n<p data-start=\"1378\" data-end=\"1402\"><span style=\"font-size: 12pt;\">\"Shocked\" = participle</span></p>\n</li>\n<li data-start=\"1403\" data-end=\"1429\">\n<p data-start=\"1405\" data-end=\"1429\"><span style=\"font-size: 12pt;\">\"by the news\" = modifier</span></p>\n</li>\n</ul>\n<p><span style=\"font-size: 14pt;\"><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><strong>Back to our Question -&nbsp; &ldquo;</strong>Laden with oil products from Nayara Energy&rdquo; is a&nbsp;</span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><strong>past participial phrase</strong></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\">&nbsp;that describes &ldquo;vessels.&rdquo;</span></span></span></p>\n<p><span style=\"font-size: 14pt;\"><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\">It acts as an&nbsp;</span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><strong>adjective</strong></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\">, answering:&nbsp;</span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><em>What kind of vessels?</em></span></span></span></p>\n<p><span style=\"font-size: 14pt;\"><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\">It doesn&rsquo;t describe the verb &ldquo;discharge&rdquo; so not adverbial, nor is it a clause - no subject + verb.</span></span></span></p></span><span class=\"hqt\"><p data-start=\"578\" data-end=\"628\"><span style=\"font-size: 12pt;\">A <strong data-start=\"580\" data-end=\"602\">Participial Phrase</strong> is a group of words that:</span></p>\n<ul data-start=\"630\" data-end=\"807\">\n<li data-start=\"630\" data-end=\"678\">\n<p data-start=\"632\" data-end=\"678\"><span style=\"font-size: 12pt;\">Begins with a <strong data-start=\"646\" data-end=\"660\">participle</strong> (present or past)</span></p>\n</li>\n<li data-start=\"679\" data-end=\"742\">\n<p data-start=\"681\" data-end=\"742\"><span style=\"font-size: 12pt;\">Functions like an <strong data-start=\"699\" data-end=\"712\">adjective</strong> (describes a noun or pronoun)</span></p>\n</li>\n<li data-start=\"743\" data-end=\"807\">\n<p data-start=\"745\" data-end=\"807\"><span style=\"font-size: 12pt;\">May include <strong data-start=\"757\" data-end=\"781\">objects or modifiers</strong> along with the participle</span></p>\n</li>\n</ul>\n<h3 data-start=\"814\" data-end=\"836\"><span style=\"font-size: 12pt;\">✅ <strong data-start=\"820\" data-end=\"834\">Structure:&nbsp;</strong><strong data-start=\"837\" data-end=\"874\">[Participle] + [Object/Modifiers]</strong></span></h3>\n<h3 data-start=\"814\" data-end=\"836\"><span style=\"font-size: 12pt;\">✅ <strong data-start=\"882\" data-end=\"895\">Function:&nbsp;</strong>Describes or gives more info about a <strong data-start=\"935\" data-end=\"943\">noun</strong></span></h3>\n<h3 data-start=\"950\" data-end=\"970\"><span style=\"font-size: 12pt;\">🔸 <strong data-start=\"957\" data-end=\"970\">Examples:&nbsp;</strong></span></h3>\n<h4 data-start=\"972\" data-end=\"1012\"><span style=\"font-size: 12pt;\">1. <strong data-start=\"980\" data-end=\"1010\">Present participial phrase -&nbsp;</strong></span><span style=\"font-size: 12pt;\">👉 <em data-start=\"1016\" data-end=\"1070\">&ldquo;Running down the street, the boy tripped and fell.&rdquo;</em></span></h4>\n<ul data-start=\"1072\" data-end=\"1212\">\n<li data-start=\"1072\" data-end=\"1126\">\n<p data-start=\"1074\" data-end=\"1126\"><span style=\"font-size: 12pt;\"><strong data-start=\"1074\" data-end=\"1103\">&ldquo;Running down the street&rdquo;</strong> = participial phrase</span></p>\n</li>\n<li data-start=\"1127\" data-end=\"1154\">\n<p data-start=\"1129\" data-end=\"1154\"><span style=\"font-size: 12pt;\">Describes <strong data-start=\"1139\" data-end=\"1152\">&ldquo;the boy&rdquo;</strong></span></p>\n</li>\n<li data-start=\"1155\" data-end=\"1181\">\n<p data-start=\"1157\" data-end=\"1181\"><span style=\"font-size: 12pt;\">\"Running\" = participle</span></p>\n</li>\n<li data-start=\"1182\" data-end=\"1212\">\n<p data-start=\"1184\" data-end=\"1212\"><span style=\"font-size: 12pt;\">\"down the street\" = modifier</span></p>\n</li>\n</ul>\n<h4 data-start=\"1214\" data-end=\"1251\"><span style=\"font-size: 12pt;\">2. <strong data-start=\"1222\" data-end=\"1249\">Past participial phrase -&nbsp;</strong></span><span style=\"font-size: 12pt;\">👉 <em data-start=\"1255\" data-end=\"1299\">&ldquo;Shocked by the news, she couldn&rsquo;t speak.&rdquo;</em></span></h4>\n<p></p>\n<ul data-start=\"1301\" data-end=\"1429\">\n<li data-start=\"1301\" data-end=\"1351\">\n<p data-start=\"1303\" data-end=\"1351\"><span style=\"font-size: 12pt;\"><strong data-start=\"1303\" data-end=\"1328\">&ldquo;Shocked by the news&rdquo;</strong> = participial phrase</span></p>\n</li>\n<li data-start=\"1352\" data-end=\"1375\">\n<p data-start=\"1354\" data-end=\"1375\"><span style=\"font-size: 12pt;\">Describes <strong data-start=\"1364\" data-end=\"1373\">&ldquo;she&rdquo;</strong></span></p>\n</li>\n<li data-start=\"1376\" data-end=\"1402\">\n<p data-start=\"1378\" data-end=\"1402\"><span style=\"font-size: 12pt;\">\"Shocked\" = participle</span></p>\n</li>\n<li data-start=\"1403\" data-end=\"1429\">\n<p data-start=\"1405\" data-end=\"1429\"><span style=\"font-size: 12pt;\">\"by the news\" = modifier</span></p>\n</li>\n</ul>\n<p><span style=\"font-size: 14pt;\"><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><strong>Back to our Question -&nbsp; &ldquo;</strong>Laden with oil products from Nayara Energy&rdquo; is a </span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><strong>past participial phrase</strong></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"> that describes &ldquo;vessels.&rdquo; </span></span></span></p>\n<p><span style=\"font-size: 14pt;\"><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\">It acts as an </span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><strong>adjective</strong></span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\">, answering: </span></span><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"><em>What kind of vessels?</em></span></span></span></p>\n<p><span style=\"font-size: 14pt;\"><span style=\"color: #000000;\"><span style=\"font-family: Cambria,serif;\"> It doesn&rsquo;t describe the verb &ldquo;discharge&rdquo; so not adverbial, nor is it a clause - no subject + verb. </span></span></span></p></span>",
