    "solution": "<span class=\"eqt\"><p style=\"margin-left: 0.07in; margin-bottom: 0.14in\">\t\t\t<font face=\"Cambria Math, serif\"><font size=\"4\" style=\"font-size: 14pt\"><span lang=\"en-IN\">A)\t\t\t\"The Hazara Rama temple was a public temple for\t\t\tcommoners.\"<br>The Hazara Rama Temple was a royal temple,\t\t\tprimarily used by the king and the royal family, not a public\t\t\tshrine for commoners.</span></font></font></p>\t\t\t<p style=\"margin-left: 0.07in; margin-bottom: 0.14in\"><font face=\"Cambria Math, serif\"><font size=\"4\" style=\"font-size: 14pt\"><span lang=\"en-IN\">B)\t\t\t\"The Lotus Mahal shows clear Persian architectural\t\t\tinfluence.\"<br>The Lotus Mahal displays Indo-Islamic\t\t\t(Persian) features such as arches, domes, and symmetry, blended\t\t\twith local architectural traditions.</span></font></font></p>\t\t\t<p style=\"margin-left: 0.07in; margin-bottom: 0.14in\"><font face=\"Cambria Math, serif\"><font size=\"4\" style=\"font-size: 14pt\"><span lang=\"en-IN\">C)\t\t\t\"The Mahanavmi Dibba is topped by a temporary wooden\t\t\tsuper-structure.\" <br>The Mahanavami Dibba is a stone\t\t\tplatform that once supported a temporary wooden pavilion, used\t\t\tduring ceremonial occasions like the Mahanavami (Dasara) festival.</span></font></font></p>\t\t\t<p style=\"margin-left: 0.07in\"><font face=\"Cambria Math, serif\"><font size=\"4\" style=\"font-size: 14pt\"><span lang=\"en-IN\">D)\t\t\t\"The city's sacred centre lay north of the Tungabhadra.\"\t\t\t<br>The sacred centre of Vijayanagara was located south of the\t\t\tTungabhadra River, while the urban/royal areas lay mainly to the\t\t\tsouth and southeast.</span></font></font></p>\t\t</span><span class=\"hqt\"><p style=\"margin-bottom: 0.14in\">\t\t\t<font face=\"Nirmala UI, serif\"><font size=\"4\" style=\"font-size: 14pt\"><span lang=\"en-IN\">A)\t\t\t\"</span></font></font><font face=\"Mangal\"><span lang=\"ar-SA\"><font face=\"Nirmala UI\"><font size=\"4\" style=\"font-size: 14p
