<!DOCTYPE html>

<body>

                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>

            </div>

        </div>
    </div>

            </div>
        </div>
    </div>

ि को तेज़ करना/बनाए रखना पहला कर्तव्य है, जिसका उद्देश्य उत्पादकता बढ़ाना, प्रतिस्पर्धात्मकता सुदृढ़ करना और वैश्विक परिस्थितियों के प्रति लचीलापन विकसित करना है।</p>\r\n\r\n<p><strong>आकांक्षाओं की पूर्ति और क्षमता निर्माण:</strong> आकांक्षाओं की पूर्ति एवं क्षमता निर्माण दूसरा कर्तव्य है, जिसका लक्ष्य युवाओं और नागरिकों की क्षमता का निर्माण करना है ताकि वे भारत की समृद्धि में भागीदार बन सकें।</p>\r\n\r\n<p><strong>समावेशी विकास (सबका साथ, सबका विकास):</strong> समावेशी विकास (या सबका साथ, सबका विकास) तीसरा कर्तव्य है, जो यह सुनिश्चित करता है कि प्रत्येक परिवार, समुदाय और क्षेत्र को संसाधनों और अवसरों तक समान पहुँच प्राप्त हो।</p>\r\n</div>\r\n</span>",

    "solution": "<span class=\"eqt\"><p>The correct answer is <strong>Option 2</strong>&nbsp;i.e.&nbsp;<strong>fell by the workers.</strong></p>\r\n\r\n<p><strong>❌ Error Concept: </strong>Incorrect Verb Usage [from the chapter: Transitive and Intransitive Verbs &ndash; Fall vs. Fell]<br />\r\n<strong>🔍 Grammatical Concept:</strong><br />\r\nThe verb <strong>&quot;fall&quot; </strong>is <strong>intransitive</strong>, meaning it does <strong>not </strong>take a direct object [e.g., The tree fell].<br />\r\nThe verb &quot;<strong>fell</strong>&quot; [as a transitive verb] means<strong> to cut down</strong> and <strong>requires a direct object </strong>[e.g., The workers felled the tree].<br />\r\nIn this sentence, the action was <strong>done by workers</strong>, so the verb must be <strong>transitive</strong>, which means &quot;<strong>fell</strong>&quot; is incorrect here&mdash;it should be &quot;<strong>felled</strong>.&quot;<br />\r\n<strong>🔧 How to correct it:</strong><br />\r\nReplace &ldquo;<strong>fell</strong>&rdquo; with &ldquo;<strong>was felled</strong>&rdquo; to form the correct passive voice with the transitive verb.<br />\r\n<strong>✔ Correct Sentence:<br />\r\nThe old oak tree was felled by the workers during the storm last night.</strong><br />\r\nIt can be said that <strong>option 2</strong>&nbsp;is the correct answer.<br />\r\n&nbsp;</p>\r\n</span><span class=\"hqt\"><div style=\"position:relative\">\r\n<p>The correct answer is <strong>Option 2</strong>&nbsp;i.e.&nbsp;<strong>fell by the workers.</strong></p>\r\n\r\n<p><strong>❌ Error Concept: </strong>Incorrect Verb Usage [from the chapter: Transitive and Intransitive Verbs &ndash; Fall vs. Fell]<br />\r\n<strong>🔍 Grammatical Concept:</strong><br />\r\nThe verb <strong>&quot;fall&quot; </strong>is <strong>intransitive</strong>, meaning it does <strong>not </strong>take a direct object [e.g., The tree fell].<br />\r\nThe verb &quot;<strong>fell</strong>&quot; [as a transitive verb] means<strong> to cut down</strong> and <strong>requires a direct object </strong>[e.g., The workers felled the tree].<br />\r\nIn this sentence, the action was <strong>done by workers</strong>, so the verb must be <strong>transitive</strong>, which means &quot;<strong>fell</strong>&quot; is incorrect here&mdash;it should be &quot;<strong>felled</strong>.&quot;<br />\r\n<strong>🔧 How to correct it:</strong><br />\r\nReplace &ldquo;<strong>fell</strong>&rdquo; with &ldquo;<strong>was felled</strong>&rdquo; to form the correct passive voice with the transitive verb.<br />\r\n<strong>✔ Correct Sentence:<br />\r\nThe old oak tree was felled by the workers during the storm last night.</strong><br />\r\nIt can be said that <strong>option 2</strong>&nbsp;is the correct answer.<br />\r\n&nbsp;</p>\r\n</div>\r\n</span>",

    "solution": "<span class=\"eqt\"><p>The correct answer is <strong>Option 4</strong>&nbsp;i.e.<strong>&nbsp;</strong>The candidate must <strong>carry </strong>a valid identity proof.</p>\r\n\r\n<ul>\r\n\t<li><strong>CONCEPT &ndash; Use of Modal Verb &ldquo;Must&rdquo; (Base Verb Rule)</strong> ✅\r\n\r\n\t<ul>\r\n\t\t<li><strong>&ldquo;Must&rdquo;</strong> is a modal verb which is used to express <strong>compulsion, necessity, obligation or strong requirement.</strong></li>\r\n\t\t<li>All <strong>modal verbs (must, can, could, should, may, might, will, would, shall)</strong> are always followed by the<strong> base form (V1) of the verb.</strong></li>\r\n\t\t<li>After a modal verb, we <strong>never use &ldquo;to + verb&rdquo;,</strong> and we also n<strong>ever use verb forms ending in -s / -es / -ing / -ed.</strong></li>\r\n\t</ul>\r\n\t</li>\r\n\t<li>The basic structure remains:</li>\r\n\t<li><strong>Subject + modal verb + base verb (V1).</strong></li>\r\n\t<li>✔ <strong>Hence, only the sentence that correctly follows</strong></li>\r\n\t<li><strong>Subject + must + base verb (V1)</strong></li>\r\n\t<li><strong>without any grammatical violation is Option (4).</strong></li>\r\n</ul>\r\n\r\n<p><strong>Correct Sentence &ndash;</strong></p>\r\n\r\n<p><strong>&ldquo;The candidate must carry a valid identity proof.&rdquo; ✅<br />\r\nWHY OTHER OPTIONS ARE WRONG</strong><br />\r\n❌ <strong>Option (1) i</strong>s incorrect because the modal verb <strong>must </strong>is wrongly followed by <strong>&ldquo;to follow&rdquo;</strong>.<br />\r\nAfter any modal verb, the verb should appear only in its base form (follow), not in the infinitive form.<br />\r\n❌<strong> Option (2) </strong>is incorrect because &ldquo;<strong>submits</strong>&rdquo; is the third-person singular form of the verb.<br />\r\nAfter a modal verb, the main verb never takes<strong> -s / -es</strong>, therefore the correct form should be <strong>submit</strong>.<br />\r\n❌ <strong>Option (3) </strong>is inco n (1) i</strong>s incorrect because the modal verb <strong>must </strong>is wrongly followed by <strong>&ldquo;to follow&rdquo;</strong>.<br />\r\nAfter any modal verb, the verb should appear only in its base form (follow), not in the infinitive form.<br />\r\n❌<strong> Option (2) </strong>is incorrect because &ldquo;<strong>submits</strong>&rdquo; is the third-person singular form of the verb.<br />\r\nAfter a modal verb, the main verb never takes<strong> -s / -es</strong>, therefore the correct form should be <strong>submit</strong>.<br />\r\n❌ <strong>Option (3) </strong>is incorrect because <strong>&ldquo;following&rdquo;</strong> is the present participle (-ing form).<br />\r\nModal verbs cannot be followed by<strong> -ing form</strong> directly; they must be followed by the <strong>base verb</strong>.<br />\r\nExam Tip 📝<br />\r\nIn SSC exams, questions based on modal verbs mainly test whether the candidate knows that <strong>modal verbs always take base form of the verb.</strong><br />\r\nIf you eliminate options containing<strong> to + verb, -s/-es, or -ing, </strong>you will usually reach the correct answer quickly</p>\r\n</div>\r\n</span>",
