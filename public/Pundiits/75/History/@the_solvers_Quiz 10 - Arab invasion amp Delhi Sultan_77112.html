<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pundits Quiz</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../../css/mock-main.css">

    <!-- Timer Config -->
    <meta name="exam-duration" content="60">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Pundits Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">25</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Pundits Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nMuhammad bin Tughlaq shifted his capital from Delhi to Daultabad\n[Devagiri] in 1327. There were two reasons for shifting the capital\nfirst one is his desire to have a centrally located capital and\nsecond one is to the fear of invasion by Mongols. However, the plan\nproved to be a failure and the capital was transferred back to Delhi.\nMuhammad bin Tughluq was the Sultan of Delhi from 1325 to 1351. He\nwas the eldest son of Ghiyas-ud-Din Tugluq. He established a\ndepartment called 'Dewan-e-Amir Kohi for the Department of\nAgriculture.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">मुहम्मद\nबिन तुगलक ने\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1327\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">में\nअपनी राजधानी\nदिल्ली से दौलताबाद\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"/></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">देवगिरी</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">स्थानांतरित\nकी। राजधानी\n     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nIbn Battuta [1333-1347 AD] was a Moroccan traveller who visited India\nin 1334 during the reign of Muhammad bin Tughlaq. His book Rihla [The\nTravelogue] throws a lot of light on the reign of Muhammad\nBin–Tughlaq and the geographical, economic and social\nconditions in India. He was appointed as the Chief Qazi of Delhi by\nthe Muhammad–bin–Tughluq for 8 years.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">इब्न\nबतूता </span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">[</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1333-1347\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">ई</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">.</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">]</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">एक\nमोरक्को यात्री\nथा जो मुहम्मद\nबिन     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe Sayyid Dynasty was founded by Khizr Khan who was the governor of\nMultan and Timur's deputy in India. This dynasty ruled for 37 years\nfrom 1414 to 1451 AD by four rulers Khizr Khan, Mubarak Shah,\nMuhammad, Alam Shah. Khizr Khan did not hold the title of Sultan and\nassumed the title of Raiyat - e- Ala. He died on 20th May 1421 AD.\nThe last sultan of the Sayyid dynasty was Alauddin Alam Shah.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">सैय्यद\nराजवंश की स्थापना\nखिज्र खान ने\nकी थी जो मुल्तान\nका गवर्नर और\nभारत में तैमूर\nका डिप्टी था।\nइस राजवंश ने\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1414\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">से\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1451\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">ई</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">.\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">तक\nचार शासकों\nखिज्र खान</span></span></span></span></span></span><span style=\"color: #000000\"><s     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nSikandar Lodi was the ruler of the Lodi Dynasty. He founded the city\nof Agra in 1504 AD with aim of serving his authority and establishing\ncontrol over trade routes. Sikandar Lodi moved his capital from Delhi\nto Agra in year 1506. He started a new scale Gazi-Sikandari. He has\nstopped evacuating Moharram and Tajya. He translated the Ayurvedic\ntreatise as Farhangi-Sikandari. Sikandar Lodi also wrote Persian\npoems by the name of Gulrukhi. His theory of Kingship was a mixture\nof hard and restraint along with strengthening the Lodi regime. He\nmade a special contribution to the development of arts and culture.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">सिकंदर\nलोदी लोदी वंश\nका शासक था।\nउसने अपने अधिकार\nकी सेवा करने\nऔर व्यापार\nमार्गों पर\nनियंत्रण स्थापित\nकरने के उद्देश्य\nसे </span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1504\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">ई</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">.\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">में\nआगरा शहर की\nस्थापना की।\nसिकंदर लोदी\nने वर्ष </span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size:     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nMuqtis were commanders of military and administrative blocks known as\nlqta. The Iqtadari was a unique type of land distribution and\nadministrative system evolved during the sultanate of Iltutmish under\nthe Iqta system. The land of the empire was divided into several\nlarge and small tracts called Iqta.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">मुक्ती\nसैन्य और प्रशासनिक\nब्लॉकों के\nकमांडर थे जिन्हें\nइक्ता के रूप\nमें जाना जाता\nथा। इक्तादारी\nएक अनूठी प्रकार\nकी भूमि वितरण\nऔर प्रशासनिक\nप्रणाली थी जो\nइक्ता प्रणाली\nके तहत इल्तुतमिश\nकी सल्तनत के\nदौरान विकसित\nहुई थी। साम्राज्य\nकी भूमि को कई\nबड़े और छोटे\nइलाकों में\nविभाजित किया\nगया था जिन्हें\nइक्ता कहा जाता\nथा।</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><br/></span>",

    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nIltutmish was the third king of Slave Dynasty of Delhi Sultanate. He\nwas the first Muslim sovereign to rule from Delhi, and is thus\nconsidered the effective founder of Delhi Sultanate. He introduced\nBandagan system. Bandagan is a Persian term used for special slaves\nwho are purchased for military service. He also introduced Iqtadari\nsystem which was a unique type of land distribution in lieu of\nsalary.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">इल्तुतमिश\nदिल्ली सल्तनत\nके गुलाम वंश\nका तीसरा राजा\nथा। वह दिल्ली\nसे शासन करने\nवाला पहला मुस्लिम\nशासक था</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">,\n</span></span></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">और\nइस प्रकार उसे\nदिल्ली सल्तनत\nका प्रभावी\nसंस्थापक माना\nजाता है। उसने\nबंदगान प्रणाली\nकी शुरुआत की।\nबंदगान एक फ़ारसी\nशब्द है जिसका\nइस्तेमाल विशेष\nदासों के लिए\nकिया जाता है\nजिन्हें सैन्य\nसेवा के लिए\nखरीदा जाता है।\nउन्होंने इक्तादारी\nप्रणाली भी शुरू\nकी जो वेतन के\nबदले में भूमि\nवितरण का एक\nअनूठा प्रकार\nथा।</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><br/></span>",

    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nRazia Sultan’s tomb at Kaithal Haryana is primarily constructed\nusing fired bricks. </span></span></span>\n<br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Radhiyah\nbint Iltutmish or popularly known as Razia Sultan was the ruler of\nDelhi from 1236 to 1240. </span></span></span>\n<br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">She\nsucceeded her father Iltutmish and became the Sultanate of Delhi in\n1236. </span></span></span>\n<br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">She\nrefused to be addressed as a Sultana but claimed herself the title\n“Sultan”.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">कैथल\nहरियाणा में\nरजिया सुल्तान\nका मकबरा मुख्य\nरूप से पकी ईंटों\nका उपयोग करके\nबनाया गया है।</span></span></span></span></span></span><br/><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">रदिया\nबिन्त इल्तुतमिश\nया रजिया सुल्तान\nके नाम से लोकप्रिय</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">,\n</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1236\n<     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe Alai Darwaza is a square domed gatehouse with arched entrances in\nQutub complex, Delhi. It is made of red sandstone and it was built by\nSultan Alauddin Khilji of the Khilji dynasty in 1311. It was a part\nof his plan to extend the Quwwat-ul-Islam Mosque on four sides.\nAlthough he planned to construct four gates, only the Alai Darwaza\ncould be completed as he died in 1316. Other famous monuments built\nby him are the Siri Fort, Hauz Khas and the Jamat Khana Masjid in\nDelhi.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">अलाई\nदरवाज़ा दिल्ली\nके कुतुब परिसर\nमें मेहराबदार\nप्रवेश द्वारों\nवाला एक चौकोर\nगुंबददार गेटहाउस\nहै। यह लाल बलुआ\nपत्थर से बना\nहै और इसे खिलजी\nवंश के सुल्तान\nअलाउद्दीन खिलजी\nने </span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1311\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">में\nबनवाया था। यह\nकुव्वत</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">-</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">उल</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">-</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family:     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nMoth ki Masjid is heritage building located in Delhi, and was built\nin 1505 by Wazir Miya Bhoiya, Prime Minister during the reign of\nSikandar Lodi of the Lodi dynasty. The foundation stone of the mosque\nwas laid by Sikandar Lodi himself and the mosque is believed to be\nMiyan Bhuiya's Private Mosque but now remains a monument. The masjid\nis known for its Indo-Islamic architecture. Made in red stone and the\nintricate floral designs are a beautiful right to cherish.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">मोठ\nकी मस्जिद दिल्ली\nमें स्थित एक\nविरासत इमारत\nहै</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">,\n</span></span></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">और\nइसका निर्माण\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1505\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">में\nलोदी वंश के\nसिकंदर लोदी\nके शासनकाल के\nदौरान प्रधानमंत्री\nवज़ीर मिया\nभोइया ने करवाया\nथा। मस्जिद की\nआधारशिला खुद\nसिकंदर लोदी\nने रखी थी और\nमाना जाता है\nकि यह मस्जिद\nमियाँ भुइया\nकी निजी मस्जिद\nहै</span></span></span></span></span></span><span style     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nTarikh-i-FirozShahi was written by Ziauddin Barani is the most\nimportant history of India's Delhi Sultanate, which was founded by\nTurkish invaders in the thirteenth century. It covers the high point\nof the Sultanate from the beginning of the reign of Balban in 1266\nthrough to the sixth year of Firoz Shah Tughluq in 1357. Barani was\nthe first Muslim to write about the history of India.\n'Fatwa-i-Jahandari' is one of Barani's famous works.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">तारीख</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">-</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">ए</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">-</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">फिरोजशाही\nजियाउद्दीन\nबरनी द्वारा\nलिखी गई थी जो\nभारत की दिल्ली\nसल्तनत का सबसे\nमहत्वपूर्ण\nइतिहास है</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">,\n</span></span></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">जिसकी\nस्थापना तेरहवीं\nशताब्दी में\nतुर्की आक्रमणकारियों\nने की थी। यह\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1266\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">में\nबलबन के शासनकाल\nकी शुरुआत से\nलेकर </span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1357\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">में\nफिरोज शाह तुगलक\nके छठे वर्ष तक\nसल्तनत के उच्च\nबिंदु को कवर\nकरता है। बरनी\nभारत के इतिहास\nके बारे में\nलिखने वाले पहले\nमुस्लिम थे।\n</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">'</span></span></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">फतवा</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">-</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">ए</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">-</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">जहाँदारी</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">'\n</sp     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nAmir Khusrau was a sufi mystic and a spiritual disciple of Nizamuddin\nAuliya. He lived for 72 years; out of which 60 years he lived in the\ncourts of as many as 7 different rulers of the Delhi Sultanate. He\noften described his poems as \"Pearls'' spilling from his lips\nand - invoking the bird that symbolized eloquence in the Indo-Persian\ntradition-referred to himself as the \"Parrot of India.\" He\nis also known as 'Father of Urdu Literature and Khariboli and 'Father\nof Qawwali'. It is believed that Tabla was also invented by him.\nExcerpts of the works done by him are TughlaqNama, Wast-ul-Hayat,\nNuhSipihr, Ashiqa, Khamsah, Bagia-Nagia, etc.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">अमीर\nखुसरो एक सूफी\nफकीर और निजामुद्दीन\nऔलिया के आध्यात्मिक\nशिष्य थे। वे\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">72\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">वर्षों\nतक जीवित रहे</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">,\n</span></span></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">जिनमें\nसे </span></span></span></span></span><span style     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nIbrahim Lodi became the Sultan of Delhi in 1517 after the death of\nhis father Sikandar Lodi. He was the last ruler of the Lodi dynasty,\nreigning for nine years between 1517-1526 until being defeated and\nkilled at the Battle of Panipat by Babur's invading army in 1526,\ngiving way to the emergence of the Mughal Empire in India.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">इब्राहिम\nलोदी अपने पिता\nसिकंदर लोदी\nकी मृत्यु के\nबाद </span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1517\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">में\nदिल्ली के सुल्तान\nबने। वे लोदी\nवंश के अंतिम\nशासक थे</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">,\n</span></span></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">जिन्होंने\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1517-1526\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">के\nबीच नौ वर्षों\nतक शासन किया</span></span></span></spa
