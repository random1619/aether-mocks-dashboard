9px\"><span lang=\"hi-IN\">सिकंदर\nमहान</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">मैसेडोन\nके राजा।</span></span></span></span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">2.\n</span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">राजा\nपोरस </span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">[</span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">पुरु</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">],\n</span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">पंजाब\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">[</span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">वर्तमान\nपाकिस्तान में</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">]\n</span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">के\nएक क्षेत्र के\nशासक।</span></span></span></span></span></span><br/><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI
