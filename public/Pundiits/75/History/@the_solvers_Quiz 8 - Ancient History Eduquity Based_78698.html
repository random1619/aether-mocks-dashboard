    "solution": "<span class=\"eqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 1</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The Cholas, particularly under Rajendra Chola I, developed a powerful navy. They launched naval expeditions against the Srivijaya Empire in Southeast Asia to protect trade interests and assert dominance over maritime routes.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 2</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Maritime trade strengthened economic and cultural links between South India and Southeast Asia. Indian scripts, religion (Hinduism &amp; Buddhism), temple architecture, and administrative models influenced Southeast Asian kingdoms.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span></p><p>&nbsp;</p><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 3</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The Pallavas actively participated in maritime trade. Their coastal location and ports facilitated overseas commercial contacts, contributing to </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">economic growth.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is incorrect.</span></p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> 1</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirma ;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">से</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">स्थानीय</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">स्वशासन</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">की</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">एक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">उन्नत</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">प्रणाली</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">विकसित</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">की।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">2. </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">उत्तरमेरूर</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">शिलालेख</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">ग्राम</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">प्रशासन</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कामकाज</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">बारे</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">में</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">विस्तृत</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जानकारी</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">प्रदान</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">करता</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">है।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">3. </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">चोल</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">साम्राज्य</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अत्यधिक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">केंद्रीकृत</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; f       "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1 and </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">3</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> only</span></p></span><span class=\"hqt\"><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">केवल</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> 1 </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">और</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span lang=\"en-GB\" style=\"font-family: 'Cambria Math'; font-size: 14pt;\">3</span></p></span>",

    "solution": "<span class=\"eqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 1</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The Cholas established one of the most sophisticated systems of local self-government in medieval India. Village assemblies (</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Sabha</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">, Ur, and </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Nagaram</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">) managed local administration, irrigation, taxation, and justice, demonstrating </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">decentralised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> governance.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 2</span></p><p>&nbsp;</p><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Uttaramerur</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> inscription (10th century CE) provides detailed guidelines about election procedures, qualifications, disqualifications, and responsibilities of village assembly members. It is a key epigraphic source for understanding Chola administration.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 3</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Although the Cholas maintained imperial authority, they did not eliminate local institutions. Instead, they strengthened village self-government while retaining overall control.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is incorrect.</span></p><p>&nbsp;</p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> 1</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">चोलों</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">ने</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मध्यकालीन</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">भारत</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">में</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">स्थानीय</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">स्वशासन</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">की</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सबसे</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">परिष्कृत</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">प्रणालियों</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">में</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">से</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">एक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">की</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">स्थापना</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">की।</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">ग्राम</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सभाएँ</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> (</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सभा</span><span lang=\"en-IN\" style=\"font-family: 'Cambria Math'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">उर</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">और</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">नगरम</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">) </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">स्थानीय</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI';     "question": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">With reference to law and justice during the Harsha Period, consider the following statements</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">:</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1. Punishments during Harsha’s reign were generally severe and uniformly enforced across the empire.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">2. </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Harsha</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">emphasised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> charity, public welfare, and relief measures as part of governance.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">3. Judicial authority was exercised exclusively by centrally appointed judges.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Which of the statements given above is/are correct?</span></p></span><span class=\"hqt\"><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">हर्ष</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">काल</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">में</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कानून</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">और</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">न '; font-size: 14pt;\">/</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">हैं</span><span lang=\"en-IN\" style=\"font-family: 'Cambria Math'; font-size: 14pt;\">?</span></p></span>",

    "solution": "<span class=\"eqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 1</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Accounts of the period indicate that punishments were </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">not uniformly harsh</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">; rather, justice varied across regions and was often mediated by local authorities. The absence of a rigid central judiciary meant inconsistency in legal practice.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is incorrect.</span><br></p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 2</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Harsha is repeatedly described as a </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">benevolent and welfare-oriented ruler</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">. He devoted substantial resources to charity, </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">organised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> relief for the poor, supported hospitals and rest houses, and distributed wealth during religious assemblies.</span></p><p>&nbsp;</p><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 3</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Judicial authority was not </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">monopolised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> by centrally appointed judges. Local rulers, feudatories, and village bodies played a significant role in administering justice, reflecting </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">decentralisation</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is incorrect.</span></p><p>&nbsp;</p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> 1</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">इस</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">काल</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">विवरण</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">से</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">पता</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">चलता</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">है</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कि</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span st pt;\">देखरेख</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">करते</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">थे।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">3. </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">शुआनज़ैंग</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">विवरण</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">में</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">हर्ष</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">को</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">एक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">ऐसे</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">शासक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">रूप</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirm     "solution": "<span class=\"eqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 1</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Xuanzang visited India during Harsha’s reign and spent several years at his court. His travel account offers valuable insights into Harsha’s political authority, administrative practices, economic conditions, religious tolerance, and social life, making it a crucial contemporary source.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 2</span></p><p>&nbsp;</p><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Xuanzang describes Harsha as a compassionate and charitable ruler who donated a significant portion of state revenue for welfare purposes. Harsha personally participated in relief work, supported monks, scholars, and the poor, and promoted moral governance.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 3</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Xuanzang’s account does not portray Harsha’s administration as rigidly </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">centralised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">. Instead, it highlights dependence on local rulers and feudatories, indicating a relatively </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">decentralised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> political structure.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-we     "solution": "<span class=\"eqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 1</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">During the Gupta Period, the varna system became increasingly rigid and hereditary. Social mobility declined as caste identities hardened, and occupational roles became closely tied to birth rather than merit.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br></p><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">2</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The overall status of women declined during the Gupta Period. Practices such as child marriage and restrictions on education became more common, and women’s participation in public and religious life reduced compared to earlier periods.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is incorrect.</span></p><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">3</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Land grants to Brahmins and religious institutions not only gave them economic power but also enhanced their social prestige. These grants often included administrative rights, placing Brahmins in a dominant socio-economic position.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span></p><p>&nbsp;</p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-siz     "solution": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 1</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">After the Buddha’s death, the Sangha emerged as the most important institution for preserving, </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">practising</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">, and disseminating Buddhist teachings. Monks travelled extensively, preaching the Dhamma to people across different regions. The Sangha thus became the institutional backbone of Buddhism.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 2</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The Buddha did not restrict entry into the Sangha on the basis of birth or varna. People from all </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">sections of society, including Shudras and even former outcastes, were admitted. This was a radical departure from the rigid social hierarchy of the time.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is incorrect.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 3</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The Buddhist Sangha was governed by a well-defined code of conduct known as the *Vinaya Pitaka*. Decisions were taken collectively in assemblies of monks, and discipline was maintained through mutual consent rather than authoritarian control.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span></p></span><span clas
