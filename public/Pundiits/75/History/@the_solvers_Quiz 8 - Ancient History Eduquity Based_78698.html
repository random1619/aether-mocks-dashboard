\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">प्रशासनिक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">योजना</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">का</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">संकेत</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">देती</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">है।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">3. </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सिंधु</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">घाटी</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">प्रमुख</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">स्थलों</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">पर</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">विशाल</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: pan><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">से</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सही</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">है</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">/</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">हैं</span><span lang=\"en-IN\" style=\"font-family: 'Cambria Math'; font-size: 14pt;\">?</span></p></span>",

    "question": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">With reference to the economic life during the Vedic Period, consider the following statements</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">:</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1. The Early Vedic economy was primarily pastoral, while agriculture became dominant in the Later Vedic Period.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">2. The Later Vedic Period witnessed the emergence of </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">specialized</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> crafts and trade.</span><br></p><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">3. The use of iron tools in the Later Vedic Period helped expand agriculture.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Which of the statements given above is/are </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">correct?</span></p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">वैदिक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">काल</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">आर्थिक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जीवन</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"fo       "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1 and 3 only</span></p></span><span class=\"hqt\"><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">केवल</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> 1 </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">और</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> 3</span></p></span>",

    "solution": "<span class=\"eqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 1</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">During the Early Vedic Period, cattle rearing dominated economic life, while agriculture played a secondary role. In the Later Vedic Period, with settlement in the fertile Gangetic plains, agriculture became the primary occupation.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 2</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The Later Vedic Period saw the growth of </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">specialised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> crafts such as pottery, carpentry, weaving, and metalwork. Surplus agricultural production supported artisans and encouraged trade and exchange.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br></p><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 3</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The introduction of iron tools during the Later Vedic Period improved agricultural efficiency by enabling forest clearance and deeper ploughing. This technological advancement supported agricultural expansion and settlement growth.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span></p><p>&nbsp;</p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> 1</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">प्रारंभिक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">वैदिक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">काल</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">में</span><span lang=\"en-IN\" style=\"font-family: 'Cambria Math'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">पशुपालन</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">आर्थिक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जीवन</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">का</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">प्रमुख</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">आधार</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">था</span><span lang=\"en-IN\" style=\"font-family: 'Cambria Math'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जबकि</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कृषि</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-s     "solution": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 1</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The Tripitaka, meaning “Three Baskets”, represents the earliest and most authoritative compilation of Buddhist teachings. It was </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">organised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> after the Buddha’s death to preserve his teachings in a systematic manner, initially through oral tradition.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 2</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The Vinaya Pitaka deals with rules and regulations governing the conduct of monks and nuns, not with philosophical doctrines. Philosophical discussions are mainly contained in the Abhidhamma Pitaka.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is incorrect.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 3</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Buddhist Councils were </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">organised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> to resolve doctrinal disputes, preserve teachings, and ensure uniformity in monastic practices. These councils played a crucial role in shaping different Buddhist schools over time.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span></p><p>&nbsp;</p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन </span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">1</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">त्रिपिटक</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जिसका अर्थ है \"तीन टोकरियाँ\"</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">बौद्ध शिक्षाओं का सबसे प्राचीन और सबसे प्रामाणिक संकलन है। बुद्ध की मृत्यु के बाद उनकी शिक्षाओं को व्यवस्थित रूप से संरक्षित करने के लिए</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">प्रारंभ में मौखिक परंपरा के माध्यम से</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">इसका आयोजन किया गया था।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन सही है।</span></p><p>&nbsp;</p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 2</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">विनय पिटक भिक्षुओं और भिक्षुणियों के आचरण को नियंत्रित करने वाले नियमों और विनियमों से संबंधित है</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">न कि दार्शनिक सिद्धांतों से। दार्शनिक चर्चाएँ मुख्य रूप से अभिधम्म पिटक में निहित हैं।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन गलत है।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 3</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">बौद्ध परिषदों का आयोजन सैद्धांतिक विवादों को सुलझाने</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">शिक्षाओं को संरक्षित करने और मठवासी प्रथाओं में एकरूपता सुनिश्चित करने के लिए किया गया था। इन परिषदों ने समय के साथ विभिन्न बौद्ध संप्रदायों को आकार देने में महत्वपूर्ण भूमिका निभाई।</span></p><p>&nbsp;</p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन सही है।</span></p></span>",

    "solution": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 1</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The Mauryan Empire was administratively divided into provinces to ensure effective governance over its vast territory. These provinces were usually placed under royal princes (Kumaras) or trusted officials, ensuring loyalty to the central authority.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 2</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Although provincial governors managed day-to-day administration, they did not function independently. They were accountable to the central government and worked under strict supervision to prevent misuse of power.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is incorrect.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 3</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Mauryan cities had a well-</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">organized</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> municipal </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">administration. Officials were appointed to manage sanitation, trade regulation, price control, public order, and infrastructure, reflecting a high degree of urban planning and civic administration.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span></p><p>&nbsp;</p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 1</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मौर्य साम्राज्य को अपने विशाल क्षेत्र पर प्रभावी शासन सुनिश्चित करने के लिए प्रशासनिक रूप से प्रांतों में विभाजित किया गया था। ये प्रांत आमतौर पर राजराजों (कुमारों) या विश्वसनीय अधिकारियों के अधीन रखे जाते थे</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जिससे केंद्रीय सत्ता के प्रति निष्ठा सुनिश्चित होती थी।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन सही है।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 2</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यद्यपि प्रांतीय राज्यपाल दैनिक प्रशासन का प्रबंधन करते थे</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">वे स्वतंत्र रूप से कार्य नहीं करते थे। वे केंद्र सरकार के प्रति जवाबदेह थे और सत्ता के दुरुपयोग को रोकने के लिए कड़ी निगरानी में काम करते थे।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन गलत है।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 3</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मौर्य नगरों में सुव्यवस्थित नगरपालिका प्रशासन था। स्वच्छता</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">व्यापार नियमन</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मूल्य नियंत्रण</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सार्वजनिक व्यवस्था और अवसंरचना के प्रबंधन के लिए अधिकारियों की नियुक्ति की गई थी</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जो उच्च स्तरीय शहरी नियोजन और नागरिक प्रशासन को दर्शाती है।</span></p><p>&nbsp;</p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन सही है।</span></p></span>",

    "question": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">With reference to the military </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">organisation</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\"> of the </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Mauryan</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\"> Empire, consider the following statements</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">:</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1. The Mauryan army was one of the largest standing armies in the ancient world.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">2. The state maintained separate wings for infantry, cavalry, chariots, and elephants.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">3. Espionage was used only during wartime and had no role in civil administration.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Which of the statements given above is/are correct?</span></p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मौर्य साम्राज्य की सैन्य संरचना के संदर्भ में</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">निम्नलिखित कथनों पर विचार कीजिए:</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">1. मौर्य सेना प्राचीन विश्व की सबसे बड़ी स्थायी सेनाओं में से एक थी।</span></p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">2. राज्य में पैदल सेना</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">घुड़सवार सेना</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">रथ सेना और हाथियों के लिए अलग-अलग विभाग थे।</span></p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">3. जासूसी का प्रयोग केवल युद्धकाल में होता था और नागरिक प्रशासन में इसकी कोई भूमिका नहीं थी।</span></p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">ऊपर दिए गए कथनों में से कौन सा/से सही है/हैं</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">?</span></p></span>",

    "solution": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 1</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Mauryan</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> Empire maintained a massive standing army to protect its vast territory and suppress internal revolts. Greek accounts, particularly those of </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Megasthenes</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">, describe the </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Mauryan</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> military as one of the largest and most </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">organised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> forces of its time, reflecting the empire’s emphasis on strength and security.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 2</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The Mauryan military was systematically </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">organised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> into different divisions. </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Megasthenes</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> refers to six military committees, which managed infantry, cavalry, chariots, elephants, transport, and navy, indicating a highly structured </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">defence</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> system.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 3</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Espionage was not limited to warfare. The </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Arthashastra</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> describes an extensive spy network used to monitor officials, detect corruption, assess public opinion, and maintain law and order, making espionage a core element of governance.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is incorrect.</span></p><p>&nbsp;</p></span><span class=\"hqt\"><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 1</span></p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मौर्य साम्राज्य ने अपने विशाल क्षेत्र की रक्षा और आंतरिक विद्रोहों को दबाने के लिए एक विशाल स्थायी सेना रखी थी। यूनानी वृत्तांत</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">विशेष रूप से मेगास्थनीज के वृत्तांत</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मौर्य सेना को अपने समय की सबसे बड़ी और सबसे संगठित सेनाओं में से एक बताते हैं</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जो साम्राज्य की शक्ति और सुरक्षा पर जोर को दर्शाते हैं।</span></p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन सही है।</span></p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 2</span></p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मौर्य सेना को व्यवस्थित रूप से विभिन्न विभागों में संगठित किया गया था। मेगास्थनीज ने छह सैन्य समितियों का उल्लेख किया है</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जो पैदल सेना</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">घुड़सवार सेना</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">रथ</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">हाथी</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">परिवहन और नौसेना का प्रबंधन करती थीं</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जो एक अत्यधिक संरचित रक्षा प्रणाली का संकेत देती हैं।</span></p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन सही है।</span></p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 3</span></p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जासूसी केवल युद्ध तक सीमित नहीं थी। अर्थशास्त्र में </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अधिकारियों की निगरानी करने</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">भ्रष्टाचार का पता लगाने</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जनमत का आकलन करने और कानून व्यवस्था बनाए रखने के लिए इस्तेमाल किए जाने वाले एक व्यापक जासूसी नेटवर्क का वर्णन है</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जो जासूसी को शासन का एक प्रमुख तत्व बनाता है।</span></p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन गलत है।</span></p></span>",

    "solution": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 1</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The Gupta administrative system was less </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">centralised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> than that of the </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Mauryas</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">. While the Mauryan state exercised strict control over officials and economic life, the Guptas allowed considerable autonomy to provincial and local </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">authorities. This </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">decentralisation</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> reflected a shift towards a feudal-like structure, especially in later Gupta times.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br></p><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">2</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Although provincial governors exercised administrative authority, they were not independent rulers. They were appointed by the king and remained accountable to the central authority, especially in matters of revenue and military support.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is incorrect.</span></p><p><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">3</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Gupta rulers used exalted titles such as </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Maharajadhiraja</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">, </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Paramabhattaraka</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> and </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Parameshwara</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> to project their imperial authority. These titles </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">symbolised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> political supremacy as well as divine sanction, strengthening the king’s position.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span></p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 1</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">गुप्त प्रशासनिक प्रणाली मौर्यों की तुलना में कम केंद्रीकृत थी। जबकि मौर्य राज्य ने अधिकारियों और आर्थिक जीवन पर कड़ा नियंत्रण रखा</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">गुप्तों ने प्रांतीय और स्थानीय अधिकारियों को काफी स्वायत्तता प्रदान की। यह विकेंद्रीकरण</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">विशेष रूप से उत्तरकालीन गुप्त काल में</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सामंती संरचना की ओर एक बदलाव के लिए किया। ये उपाधियाँ राजनीतिक सर्वोच्चता के साथ-साथ दैवीय स्वीकृति का प्रतीक थीं</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जिससे राजा की स्थिति मजबूत होती थी।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन सही है।</span></p></span>",

    "question": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">With reference to art and architecture during the Gupta Period, consider the following statements</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">:</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1. The Gupta Period witnessed the development of classical Indian art forms </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">characterised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> by balance, proportion and refinement.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">2. Structural temples built of stone and brick became an important feature of Gupta architecture.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">3. Buddhist art completely disappeared during the Gupta Period due to increased royal patronage of Brahmanism.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Which of the statements given above is/are correct?</span></p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">गुप्त काल की कला और वास्तुकला के संदर्भ में</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">निम्नलिखित कथनों पर विचार कीजिए:</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">1. गुप्त काल में संतुलन</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अनुपात और परिष्कार से युक्त शास्त्रीय भारतीय कला रूपों का विकास हुआ।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">2. पत्थर और ईंट से निर्मित संरचनात्मक मंदिर गुप्त वास्तुकला की एक महत्वपूर्ण विशेषता बन गए।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">3. ब्राह्मणवाद को बढ़ते शाही संरक्षण के कारण गुप्त काल में बौद्ध कला पूरी तरह लुप्त हो गई।</span></p><p>&nbsp;</p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">उपरोक्त कथनों में से कौन सा/से सही है/हैं</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">?</span></p></span>",

astic institutions.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is incorrect.</span></p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 1</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">गुप्त काल को भारतीय कला का स्वर्ण युग माना जाता है </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">क्योंकि इस काल में सामंजस्य</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सुंदरता और आदर्श मानव आकृतियों से युक्त शास्त्रीय कला रूपों का उदय हुआ। इस काल की मूर्तियां शांत भाव</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">चिकनी सतह और संतुलित अनुपात दर्शाती हैं</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जो कठोरता के बजाय कलात्मक परिपक्वता को प्रतिबिंबित करती हैं।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन सही है।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 2</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">गुप्त काल में शिलाखंड काटकर बनाई गई वास्तुकला से पत्थर और ईंट से बने स्वतंत्र रूप से खड़े मंदिरों की वास्तुकला में परिवर्तन हुआ। इन मंदिरों ने उत्तर भारत में बाद में नागर शैली की मंदिर वास्तुकला की नींव रखी।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन सही है।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 3</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">गुप्त काल में बौद्ध कला लुप्त नहीं हुई। यद्यपि ब्राह्मणवाद को राजशाही संरक्षण प्राप्त था</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">फिर भी बौद्ध धर्म फलता-फूलता रहा</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">विशेषकर मूर्तिकला और मठों के क्षेत्र में।</span></p><p>&nbsp;</p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन गलत है।</span></p></span>",

    "question": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">With reference to the Mesolithic Age, consider the following statements</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">:</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1. The Mesolithic Age shows increasing human adaptation to diverse ecological niches such as riverine and forest environments.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">2. The Mesolithic Age represents a complete shift from hunting–gathering to agriculture-based economy.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">3. The use of microliths reflects a strategic </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">change in hunting practices rather than merely a change in tool size.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Which of the statements given above is/are </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">in</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">correct?</span></p></span><span class=\"hqt\"><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मध्यपाषाण युग के संदर्भ में</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">निम्नलिखित कथनों पर विचार करें:</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">1. मध्यपाषाण युग में मानव का नदी घाटियों और वन जैसे विविध पारिस्थितिक क्षेत्रों के अनुकूलन में वृद्धि देखी गई।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">2. मध्यपाषाण युग शिकार-संग्रह से कृषि-आधारित अर्थव्यवस्था की ओर पूर्णतः परिवर्तन का प्रतीक है।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">3. सूक्ष्म पत्थरों का उपयोग केवल औजारों के आकार में परिवर्तन नहीं</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">बल्कि शिकार प्रथाओं में एक रणनीतिक परिवर्तन को दर्शाता है।</span></p><p>&nbsp;</p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">ऊपर</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">दिए</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">गए</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथनों</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">में</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">से</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कौन</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सा</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">/</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">से</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">गलत</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">है</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">/</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">हैं</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">?</span></p></span>",

    "solution": "<span class=\"eqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 1</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">During the Mesolithic Age, humans increasingly adapted to varied ecological zones such as river valleys, forests, and grasslands. This period coincided with post-Ice Age climatic changes, which altered animal </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">behaviour</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> and vegetation patterns. Human groups responded by diversifying food sources, including fishing, hunting smaller animals, and gathering plant resources from different environments.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span></p><p>&nbsp;</p><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 2</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Although the Mesolithic Age shows some early experimentation with plant use and animal control, it does not represent a complete shift to agriculture. Systematic farming and full domestication of plants and animals appear only in the Neolithic Age. Mesolithic communities continued to rely predominantly on hunting, fishing, and gathering.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is incorrect.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 3</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Microliths were not merely smaller versions of Paleolithic tools but represented a strategic shift </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">in hunting techniques. These tools were often mounted on wooden or bone shafts to create composite weapons such as arrows and spears, improving hunting efficiency and flexibility.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span></p><p>&nbsp;</p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 1</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मध्यपाषाण युग के दौरान</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मनुष्य नदी घाटियों</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">वनों और घास के मैदानों जैसे विभिन्न पारिस्थितिक क्षेत्रों के अनुकूलन में तेजी से अग्रसर हुए। यह काल हिमयुग के बाद के जलवायु परिवर्तनों के साथ मेल खाता है</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जिसने पशु व्यवहार और वनस्पति पैटर्न को बदल दिया। मानव समूहों ने भोजन के स्रोतों में विविधता लाकर प्रतिक्रिया दी</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जिसमें मछली पकड़ना</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">छोटे जानवरों का शिकार करना और विभिन्न वातावरणों से वनस्पति संसाधनों का संग्रहण करना शामिल था।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन सही है।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 2</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यद्यपि मध्यपाषाण युग में पौधों के उपयोग और पशु नियंत्रण के कुछ प्रारंभिक प्रयोग दिखाई देते हैं</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कृषि की ओर पूर्णतः परिवर्तन का प्रतिनिधित्व नहीं करता है। व्यवस्थित कृषि और पौधों और जानवरों का पूर्ण पालतूकरण केवल नवपाषाण युग में ही दिखाई देता है। मध्यपाषाण समुदाय मुख्य रूप से शिकार</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मछली पकड़ने और संग्रहण पर निर्भर रहे।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन गलत है।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 3</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सूक्ष्मपाषाण काल ​​के औजारों के केवल छोटे संस्करण ही </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">नहीं थे</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">बल्कि शिकार तकनीकों में एक रणनीतिक परिवर्तन का प्रतिनिधित्व करते थे। इन औजारों को अक्सर लकड़ी या हड्डी के डंडों पर लगाया जाता था ताकि तीर और भाले जैसे मिश्रित हथियार बनाए जा सकें</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जिससे शिकार की दक्षता और लचीलापन में सुधार होता था।</span></p><p>&nbsp;</p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन सही है।</span></p></span>",

    "question": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">With reference to the economy of the Indus Valley Civilization, consider the following statements</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">:</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1. Agriculture formed the economic base of the Indus Valley Civilization, supported by fertile river plains.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">2. Evidence of dockyard structures indicates that maritime trade was an important component of Harappan economy.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">3. The Indus Valley people used iron tools extensively for agricultural and craft activities.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Which of the statements given above is/are correct?</span></p></span><span class=\"hqt\"><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सिंधु घाटी सभ्यता की अर्थव्यवस्था के संदर्भ में</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">निम्नलिखित कथनों पर विचार कीजिए:</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">1. उपजाऊ नदी मैदानों द्वारा समर्थित कृषि</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सिंधु घाटी सभ्यता का आर्थिक आधार थी।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">2. गोदी-कुंड संरचनाओं के साक्ष्य बताते हैं कि समुद्री व्यापार हड़प्पा अर्थव्यवस्था का एक महत्वपूर्ण घटक था।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">3. सिंधु घाटी के लोग कृषि और शिल्प गतिविधियों के लिए लोहे के औजारों का व्यापक रूप से उपयोग करते </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">थे।</span></p><p>&nbsp;</p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">उपरोक्त कथनों में से कौन सा/से सही है/हैं</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">?</span></p></span>",
    "comp": "",
    "options": [
      "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1 and 2 only</span></p></span><span class=\"hqt\"><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">केवल 1 और 2</span></p></span>",
      "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">2 only</span></p></span><span class=\"hqt\"><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">केवल</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">2</span></p></span>",
      "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1 and 3 only</span></p></span><span class=\"hqt\"><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">केवल 1 और 3</span></p></span>",
      "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1, 2 and 3</span></p></span><span class=\"hqt\"><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">1</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">2 और 3</span></p></span>"
    ],
    "correct_option_id": 0,
    "solution": "<span class=\"eqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 1</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The Indus Valley Civilization was primarily agrarian, with agriculture forming the backbone of its economy. Fertile alluvial plains of the Indus and its tributaries supported the cultivation of crops such as wheat and barley. Irrigation facilities and surplus production helped sustain large urban populations.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br></p><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 2</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">The discovery of a dockyard-like structure at </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Lothal</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> indicates </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">organised</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> maritime trade. Harappans traded both internally and externally, exchanging goods such as beads, pottery, and metals with regions like Mesopotamia.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is correct.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">3</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Iron technology</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> had not yet developed during the Indus Valley Civilization. Harappans used bronze and copper tools, while iron came into use much later during the later Vedic period.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, this statement is incorrect.</span></p><p>&nbsp;</p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 1</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सिंधु घाटी सभ्यता मुख्य रूप से कृषि प्रधान थी</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जिसमें कृषि इसकी अर्थव्यवस्था की रीढ़ थी। सिंधु नदी और उसकी सहायक नदियों के उपजाऊ जलोढ़ मैदानों ने गेहूं और जौ जैसी फसलों की खेती को बढ़ावा दिया। सिंचाई सुविधाओं और अधिशेष उत्पादन ने बड़ी शहरी आबादी के भरण-पोषण में सहायता की।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन सही है।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन 2</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">लोथल में गोदी जैसी संरचना की खोज संगठित समुद्री व्यापार का संकेत देती है। हड़प्पावासी आंतरिक और </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">बाह्य दोनों प्रकार का व्यापार करते थे</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मेसोपोटामिया जैसे क्षेत्रों के साथ मनके</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मिट्टी के बर्तन और धातुओं जैसी वस्तुओं का आदान-प्रदान करते थे।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-GB\" style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह कथन सही है।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> 3</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सिंधु</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">घाटी</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सभ्यता</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">दौरान</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">लौह</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">प्रौद्योगिकी</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">का</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">विकास</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">नहीं</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">हुआ</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">था।</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">हड़प्पावासी</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कांसे</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">और</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">तांबे</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">औजारों</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">का</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">उपयोग</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">करते</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">थे</span><span lang=\"en-IN\" style=\"font-family: 'Cambria Math'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">जबकि</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">लोहे</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">का</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">उपयोग</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">बहुत</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">बाद</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">में</span><span lang=\"en-IN\" style=\"font-family: 'Cambria Math'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">उत्तर</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">वैदिक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">काल</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">में</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">शुरू</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">हुआ।</span></p><p>&nbsp;</p><p><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अतः</span><span lang=\"en-IN\" style=\"font-family: 'Cambria Math'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">यह</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">गलत</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> <     "question": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">With reference to the </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Vajji</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\"> </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Mahajanapada</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">, consider the following statements</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">:</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1. The </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Vajji</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> confederacy included the </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Licchavis</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> and functioned through an oligarchic assembly.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">2. The head of the </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Vajji</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> state was elected through universal suffrage.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">3. </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Vajji</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> was annexed by Magadha under Ajatashatru.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Which of the statements given above is/are correct?</span></p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">वज्जी</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirma     "question": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">With reference to the republican states during the </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Mahajanapada</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\"> period, consider the following statements</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">:</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1. In </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Gana-Sanghas</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">, power was exercised by assemblies of elders or clan chiefs.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">2. These republics followed universal adult franchise in selecting leaders.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Which of the statements given above is/are </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">correct?</span></p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">महाजनपद</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">काल</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">गणतांत्रिक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">राज्यों</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">संदर्भ</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">में</span><span lang=\"en-IN\" style=\"font-family: 'Cambria Math'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">निम्नलिखित</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथनों</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">पर</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">विचार</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कीजिए</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">:</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1. </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">गण</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">-</span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">संघों</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">में</span><span lang=\"en-IN\" style=\"font-family: 'Cambria Math'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सत्ता</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">बुजुर्गों</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">की</span><span style=\"font-     "question": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">With reference to the rise of Magadha, consider the following statements</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">:</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1. The availability of iron ore deposits strengthened Magadha militarily.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">2. Control over river routes enhanced trade and communication.</span><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">3. Magadha lacked natural defensive features compared to other </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Mahajanapadas</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">Which of the statements given above is/are </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">correct?</span></p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मगध</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">उदय</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">संदर्भ</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">में</span><span lang=\"en-IN\" style=\"font-family: 'Cambria Math'; font-size: 14pt;\">, </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">निम्नलिखित</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथनों</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">पर</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">विचार</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कीजिए</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">:</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">1. </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">लौह</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अयस्क</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">भंडारों</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">की</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">उपलब्धता</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">ने</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मगध</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">को</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सैन्य</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">रूप</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">से</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मजबूत</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">किया।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">2. </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">नदी</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मार्गों</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">पर</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">नियंत्रण</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">ने</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">व्यापार</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">और</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">संचार</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">को</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">बढ़ावा</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">दिया।</span></p><p>&nbsp;</p><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\">3. </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अन्य</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">महाजनपदों</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">की</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">तुलना</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">में</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">मगध</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">में</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">प्राकृतिक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">रक्षात्मक</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">विशेषताओं</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">का</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">अभाव</span><span style=\"font-family: 'Cambria Math'; font-size: 14p     "solution": "<span class=\"eqt\"><p><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 1 is correct.</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> The iron deposits of south Bihar enabled production of superior weapons and tools, enhancing agricultural and military strength.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 2 is correct. </span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> Magadha controlled strategic river systems like the Ganga and Son, facilitating trade, troop movement, and economic growth.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Statement 3 is incorrect.</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> Magadha had strong natural defenses — hills, rivers, and forests — which enhanced its security.</span><br><br><span style=\"font-family: 'Cambria Math'; font-size: 14pt; font-weight: bold;\">Therefore, statements 1 and 2 are correct.</span></p></span><span class=\"hqt\"><p style=\"margin-bottom: 0pt;\"><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">कथन</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> 1 </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">सही</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">है।</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">दक्षिण</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">बिहार</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><span style=\"font-family: 'Nirmala UI'; font-size: 14pt;\">के</span><span style=\"font-family: 'Cambria Math'; font-size: 14pt;\"> </span><spa
