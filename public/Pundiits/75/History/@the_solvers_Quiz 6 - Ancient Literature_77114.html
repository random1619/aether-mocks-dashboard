    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">The\ntripitaka of Buddhism consists of </span></span>\n<br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"><b>Vinaya\nPitaka:</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThis section contains the monastic rules and regulations, governing\nthe lives of monks and nuns.</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"><b>Sutta\nPitaka:</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThis section is a collection of the Buddha's discourses and\nteachings.</span></span></span><br/><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"><b>Abhidhamma\nPitaka:</b></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThis section delves into philosophical and psychological analyses of\nBuddhist concepts.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">बौद्ध</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nJataka stories are related to sculptures. Painting of Ajanta Cave\n[Aurangabad, Maharashtra] and Jataka tales are the stories of the\nprevious births of Lord Buddha. In these stories, an attempt has been\nmade to explain policy and religion through entertainment. Jataka is\nthe tenth famous text of Khuddak Nikaya. It was included in the\nUNESCO World Heritage List in 1983. There are 30 caves in the Ajanta\ncaves. </span></span></span>\n<br/></span><span class=\"hqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">जातक</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">कथाएँ</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">मूर्तियों</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">से</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI
