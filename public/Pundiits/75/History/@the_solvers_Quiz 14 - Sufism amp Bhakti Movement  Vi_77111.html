    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe Iqtadari system of the Delhi Sultanate influenced the\nadministrative systems of the Vijayanagar and Bahmani kingdoms. There\nwere well-established trade and commerce networks, and regular\nmigration of artisans occurred from one region to another, as evident\nin the migration of the silk weavers — Pattanulkars —\nfrom the Gujarat region to the Vijayanagar state in the 15th century.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">दिल्ली\nसल्तनत की इक्तादारी\nप्रणाली ने\nविजयनगर और\nबहमनी राज्यों\nकी प्रशासनिक\nप्रणालियों\nको प्रभावित\nकिया। वहाँ\nसुस्थापित\nव्यापार और\nवाणिज्य नेटवर्क\nथे</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">और\nकारीगरों का\nएक क्षेत्र से\nदूसरे क्षेत्र\nमें नियमित\nप्रवास होता\nथा</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">जैसा\nकि </span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">15</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nKrishnadevaraya, the most famous ruler of Vijayanagara, composed a\nwork on statecraft in Telugu known as the Amuktamalyada.\nAmuktamalyada describes the story of the wedding of the Hindu Lord\nRanganayaka an avatar of Vishnu and Goda Devi aka Andal the Tamil\nAlvar poet and daughter of Periyalvar, at Srirangam. Krishnadevaraya\nwas the king of the Vijayanagara Empire reigning between 1509–1530.\nHe was the third ruler of the Tuluva Dynasty and presided over the\nVijayanagara empire at its zenith. Krishnadevaraya built huge\nirrigation tanks and reservoirs for harvesting rainwater</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">विजयनगर\nके सबसे प्रसिद्ध\nशासक कृष्णदेवराय\nने तेलुगु में\nराज्य शिल्प\nपर एक कार्य की\nरचना की</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">,\n</span></span></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">जिसे\nअमुक्तमाल्यद\nके रूप में जाना\nजाता है। अमुक्तमाल्यद\nमें श्रीरंगम\nमें हिंदू भगवान\nरंगनायक जो\nविष्णु के अवतार\nथे और गोदा देवी\nउर्फ ​​अंडाल\nजो तमिल अलवर\nकवि और पेरियालवार\nकी बेटी थीं</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">,\n</span></span></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">के\nविवाह की कहानी\nका वर्णन है।\nकृष्णदेवराय\nविजयनगर साम्राज्य\nके राजा थे जिन्होंने\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1509-1530\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">के\nबीच शासन किया।\nवह तुलुवा राजवंश\nके तीसरे शासक\nथे और अपने चरम\nपर विजयनगर\nसाम्राज्य की\nअध्यक्षता की\nथी</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><br/></span>",

    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nVijayanagara kingdom and the city were founded by Harihar and Bukka\n[sons of Sangama] who were feudatories of kakatiyas and later became\na minister in the court of Kampili. It was established in 1336 by the\nbrothers Harihara-I and Bukka Raya-I of the Sangama dynasty, members\nof a pastoralist cowherd community that claimed Yadava lineage.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">विजयनगर\nसाम्राज्य और\nशहर की स्थापना\nहरिहर और बुक्का\n</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">[</span></span></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">संगम\nके पुत्र</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">]</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">ने\nकी थी</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">,\n</span></span><     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nVijayanagara or 'City of Victory' was the name of both a city and an\nempire. The empire was founded in the fourteenth century. Harihara\nand Bukka were the founders of the Vijayanagara Empire in 1336 A.D.\non the southern banks of Tungabhadra. They made Hampi as the capital\ncity. They served under the administration of Kakatiya and Kampili\nkingdoms before establishing Vijaynagara.</span></span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">विजयनगर\nया </span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">'</span></span></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">विजय\nका शहर</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">'\n</span></span></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">एक\nशहर और एक साम्राज्य\nदोनों का नाम\nथा। साम्राज्य\nकी स्थापना\nचौदहवीं शताब्दी\nमें हुई थी।\nहरिहर और बुक्का\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1336\n</span></span><span style=\"font-family: SimSun\"><span lang=\"a
