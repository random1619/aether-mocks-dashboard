<!DOCTYPE html>

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../../../css/mock-main.css">

<body>
    <!-- Welcome Screen -->

            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Pundits Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">25</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">10 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Pundits Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">

                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>

                    </div>

                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">The\nbattle of Chandawar took place between Muhammad Ghori and King\nJaichand of Kannauj of the Gahadwal dynasty. In 1194 AD, Muhammad\nGhori came to India to attack Jaichand, the ruler of Kannauj. The\nKingdom of Kannauj was considered very powerful in North India. King\nJaichand had enmity with Prithviraj. For this reason he did not help\nPrithiviraj against Ghori. On this occasion he also had to fight\nalone with Ghori. Hence Jaichand was defeated in this war.</span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">चंदावर\nका युद्ध मुहम्मद\nगौरी और गहड़वाल\nवंश के कन्नौज\nके राजा जयचंद\nके बीच हुआ था।\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">1194\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">ई</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">.\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">में\nमुहम्मद गौरी\nकन्नौज के शासक\nजयचंद पर आक्रमण\nकरने के लिए\nभारत आया था।\nकन्नौज का राज्य\nउत्तर भारत में\nबहुत शक्तिशाली\nमाना जाता था।\nराजा जयचंद की\nपृथ्वीराज से\nदुश्मनी थी।\nइस कारण उसने\nगौरी के विरुद्ध\nपृथ्वीराज की\nसहायता नहीं\nकी। इस अवसर पर\     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">The\nSecond Battle of Tarian [Taraori] was again fought between the Ghurid\narmy of Mohammed Ghori and the Rajput army of Prithviraj Chauhan. The\nbattle took place in 1192 A.D near Tarain. In this battle, Prithviraj\nChauhan was defeated by Mohammed Ghori. </span></span>\n<br/><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">The\nSecond Battle of Tarain is regarded as a turning point in the history\nof India as it resulted in Muslim conquest of India. Muhammad Ghori\nappointed Qutub-ud-din Aibak as his viceroy of his territories in\nIndia. </span></span>\n<br/>•\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">First\nBattle of Tarain was fought between the Ghurids [Muzz-Ad-din Mohammad\nGhori] against the Chahamanas on 13th November 1191. The Ghurids were\ndefeated by the Chahamanas in the First Battle of Tarain.</span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">तराइन\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">[</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">तरौरी</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">]\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Balban\nserved as the Naib [deputy] to Nasiruddin Mahmud, who was one of the\nSultans of Delhi. Balban later became the Sultan himself after the\ndeath of Nasiruddin Mahmud. Nasiruddin Mahmud was a Sultan of Delhi\nwho ruled from 1246 to 1266. He was the eighth ruler of the Slave\nDynasty. His reign faced challenges, including conflicts with Mongols\nand internal issues. Mahmud’s rule is often characterized by\npolitical instability and the emergence of power struggles among the\nnobility.</span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">बलबन\nने नसीरुद्दीन\nमहमूद के नायब\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">[</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">डिप्टी</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">]\n</span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">के\nरूप में कार्य\nकिया</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\"><span lang=\"en-US\">,\n</span></span></span></span><span style=\"font-family: SimSun\"><span lang=\"ar-SA\"
