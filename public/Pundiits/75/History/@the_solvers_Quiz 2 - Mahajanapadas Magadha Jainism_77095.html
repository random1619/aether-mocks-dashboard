<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container" style="max-width: 600px; margin: 100px auto; padding: 40px; background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: #0f172a; margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: #3b82f6;"></i> Pundits Quiz</h1>
                <p style="color: #64748b;">Computer Based Test Portal</p>
            </div>
            
            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">25</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <div class="detail-label" style="font-size: 0.8rem; color: #64748b;">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: #0f172a;">60 mins</div>
                </div>
            </div>
            
            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>
    
    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Pundits Quiz</div>
            <div class="timer-box" id="mainTimer">
                <i class="far fa-clock"></i>
                <span class="timer-val">00:00</span>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>
                
                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>
            
            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: #10b981;">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: #f59e0b;">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: #64748b;">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: #94a3b8;">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>
                
                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Bimbisara\n[544 BCE-492 BCE] also called \"Shrenika\" founded the\nHaryanka dynasty in Magadha. He expanded his kingdom by conquering\nthe Anga Kingdom and this very expansion also became the base for the\nexpansion of the Mauryan Empire. Bimbisara greatly enhanced the fame\nand honour of Magadha through matrimonial treaties and victories. One\nof his queen was the sister of Koshal king Prasenjit. </span></span>\n<br/><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"><b>Mauryan\nDynasty–</b></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nThe Maurya dynasty [322-185 BCE] was a powerful and great dynasty of\nancient India and ruled India for 138 years. The credit of its\nestablishment goes to Chandragupta Maurya with the help of his mentor\nKautilya/Chanakya. </span></span>\n<br/><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"><b>Sunga\nDynasty–</b></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">The\nSunga dynasty was a ruling dynasty of ancient India that ruled after\nthe Mauryan dynasty. It ruled in Northern India from 185-149 BCE. </span></span>\n<br/><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"><b>Nanda\nDynasty</b></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nwas a dynasty of ancient India that ruled over a vast area of\nNorthern India from 345-321 BCE.</span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: \"><span lang     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Ajatashatru\nwas the son of Bimbisara, the royal ruler of Magadha and a great king\nof the Haryanka Dynasty. He gained the throne by killing his father.\nAjatashatru expanded his empire significantly by conquering the\nMahajanapadas of Anga, Licchavi, Vajji, Kosala, and Kashi. The most\nsignificant event during his reign was the Mahaparinirvana [final\npassing] of Buddha. He also held the title of Kunika.</span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\n</span></span></span>\n<br/></span><span class=\"hqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">अजातशत्रु\nमगध के शाही\nशासक और हर्यंक\nराजवंश के महान\nराजा बिम्बिसार\nके पुत्र थे।\nउन्होंने अपने\nपिता की हत्या\nकरके सिंहासन\nप्राप्त किया।\nअजातशत्रु ने\nअंग</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">लिच्छवी</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">वज्जि</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">,\n</span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">कोसल\nऔर काशी के महाजनपदों\nपर विजय प्राप्त\nकरके अपने साम्राज्य\nका काफी विस्तार\nकिया। उनके\nशासनकाल के\nदौरान सबसे\nमहत्वपूर्ण\nघटना बुद्ध का\nमहापरिनिर्वाण\n</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">[</span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">अंतिम\nपरिनिर्वाण</span></span></span></span></span><span style=\"font-family: 'Nirmala UI',serif\"><span style=\"font-size: 19px\">]\n</span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">थी।\nउन्होंने कुनिका\nकी उपाधि भी\nधारण की थी।</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><br/></span>",

    "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">There\nare 24 Tirthankaras in Jainism. The first among them was Risabhdeva\nand the 24th and the last tirthankar was Mahavir Swami. The\ntirthankara was the tittle of its founder and Jitendriya and\nenlightened Mahatmas in Jainism. Mahavir is believed to be the real\nfounder of Jainism. The historicity of the preceding Tirthankaras is\ndoubtful except for the 23rd Tirthankara Parshvanath. The period of\nParshvanath is considered as 250 BCE before Mahavir Swami. His\nfollowers are called as Nirgranth. Jainism believes in rebirth and\nKarmwad [Karmism]. According to him Karma is the cause of birth and\ndeath. In Jainism 'Sanlekhna' means to sacrifice the body by fasting.</span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">जैन</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">धर्म</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">में</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span>     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">The\nmost important sources of Buddhism are Tripitakas. Tripitakas are\nwritten in Pali language. They are:– [i] Sutta Pitaka [ii]\nVinaya Pitaka &amp; [iii] Abhidhamma Pitaka. </span></span>\n<br/><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">The</span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"><b>\nVinay Pitaka</b></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nconsists of rules of conduct &amp; discipline applicable to the\nmonastic life of monks &amp; nuns. </span></span>\n<br/><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"><b>Sutta\nPitaka</b></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nconsists of the main teaching or Dhamma of Buddha. It is divided into\n5 Nikayas: – Digha Nikaya, Majjhima Nikaya, Samyutta Nikaya,\nAnguttara Nikaya &amp; Khuddaka Nikaya. The </span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"><b>Abhidamma\nPitaka</b></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\nis a Philosophical analysis and systematization of the teaching of\nMonks.</span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">बौद्ध\nधर्म के सबसे\nमहत्वपूर्ण\nस्रोत त्रिपिटक\nहैं। त्रिपिटक\nपाली भाषा में\nलिखे गए हैं।\nवे हैं</spa     "solution": "<span class=\"eqt\"><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">Gautam\nBuddha, a Shakya prince delivered his first sermon at Sarnath, near\nVaranasi. Buddha taught four noble truths:</span></span><br/>•\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">The\nworld is full of suffering. </span></span>\n<br/>•\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">The\nmain cause of suffering is desire. </span></span>\n<br/>•\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">To\novercome the suffering one must give desire. </span></span>\n<br/>•\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">One\nwill attain nirvana if disires are given up. The first sermon is\ncalled Dhamm Chakraparvatan. The Buddhist literature includes Jataka\ntales and Tripitaka that were written in Pali.</span></span><br/></span><span class=\"hqt\"><span style=\"color: #000000\">\n<span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\"/></span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">गौतम</span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: Calibri\"><span style=\"font-size: 19px\">\n</span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Nirmala UI'\"><span style=\"font-size: 19px\"><span lang=\"hi-IN\">बुद्ध</span></span></span></span></span></span><span style=\"color: #000000\"><span style=\"font-family: 'Cambria Math',serif\"><span style=\"font-size: 19px\">,\n</span></span></span><span style=\"font-family: \"><span lang=\"ar-SA\"><span style=\"color: #0000
