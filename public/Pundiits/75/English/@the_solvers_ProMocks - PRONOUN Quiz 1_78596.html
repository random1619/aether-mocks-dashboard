onoun.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">The \"s\" Factor:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> Except for \"mine,\" most possessive pronouns end in \"s\" (ours, yours, hers, theirs).</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Avoid the Apostrophe:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> Never use an apostrophe with possessive pronouns (theirs, NOT their's).</span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">The Correct Ans is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Option (C)</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">.</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Replace “their” with “theirs”</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Rule / Concept</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">: Possessive Adjectives vs. Possessive Pronouns</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Possessive Adjectives (</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">my, our, your, his, her, its, their</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">) must always be followed by a noun bec ign: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">In sentences where you are picking \"one out of many,\" the number mentioned is the deciding factor.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Application to the Given Question</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> - </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">\"You may take </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">any of the three routes</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> to reach the destination...\"</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">In this sentence:</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">The total number of options is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">three</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Since the number exceeds two, the distributive pronoun \"</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">any</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">\" is grammatically perfect. If the sentence had said \"two routes,\" then \"any\" would have been an error, and we would have needed to change it to \"either.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: ont-weight: bold;\">Each other:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> Used when referring to </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">two</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> persons or things.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">One another:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> Used when referring to </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">more than two</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> persons or things.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Application to the Given Question</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> - </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">In this sentence, the subject is \"all the department members.\" In a professional or organizational context, a \"department\" implies a group of multiple people (more than two) unless specified otherwise. Furthermore, the use of \"all\" and \"collective\" strongly indicates a plural group exceeding two. Therefore, the reciprocal pronoun must be </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"one another\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> instead of \"each other.\"</span></p></span>",

    "solution": "<span class=\"eqt\"><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">The Correct Ans is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Option (C) </span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Replace “than the old” with “than that of the old”.</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">📌</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Rule / Concept: Illogical Comparison (That of / Those of) </span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">In English, comparisons must be made between </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">comparable entities</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">. You cannot compare an attribute of one thing (e.g., the infrastructure) directly to the thing itself (e.g., the township). To avoid this \"illogical comparison,\" we use the demonstrative pronouns </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"that </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">of\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> (for singular nouns) or </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"those of\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> (for plural nouns) to refer back to the attribute being compared.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">  </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Application to the Given Question</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> - </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">In this sentence, the subject is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"The infrastructure\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> (of the new smart city). As the sentence currently stands in Part C, it compares the \"infrastructure\" to the \"old industrial township\" itself. This is logically incorrect; we must compare the </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-style: italic;\">infrastructure</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> of the new city with the </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-style: italic;\">infrastructure</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> of the old township. Since \"infrastructure\" is singular, we must use </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"that of\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> to represent it in the second half of the comparison.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Corrected Sentence</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> –</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">The infrastructure of the new smart city is significantly more advanced and sustainable than </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">that of</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> the old industrial township.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">More Examples for Clarity</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> -</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 1 : The climate of Hyderabad is better than </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">that of</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> Chennai. (Comparing climate to climate). </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 2 : The streets of London are wider than </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">those of</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> Mumbai. (Comparing plural streets to streets). </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 3 : Her performance in the mock test was superior to </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">that of</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> any other student. </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">The Correct Ans is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Option (C) </span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria' : 14pt;\">check )</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Application to the Given Question</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">\"had tracked him across several international borders\"</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">In this sentence, </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"whom\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> is the relative pronoun acting as the object of the verb </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"tracked.\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> By including the pronoun </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"him,\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> the sentence effectively provides two objects for the same verb. To correct this, the redundant pronoun \"him\" must be removed.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Corrected Sentence</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> - </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">The high-profile fugitive, whom the special forces had tracked across several international borders, was finally apprehended at a remote safehouse.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">More Examples for Clarity</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span st     "solution": "<span class=\"eqt\"><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">The Correct Ans is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Option (B)  </span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Replace “which” with “that”.</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">📌</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> Rule / Concept: Relative Pronouns for Mixed Antecedents</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">When a sentence has two antecedents joined by \"and\"—where one is a </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">human being</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> (person) and the other is an </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">animal or a non-living thing</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">—we cannot use \"who\" (reserved for humans) or \"which\" (reserved for things/animals). In such specific cases, the relative pronoun </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"that\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> must be used as a neutral coordinator to refer to both simultaneously.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">In this sentence, the relative pronoun refers to two distinct subjects: </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"The elderly gentleman\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> (a person) and </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"the vintage car\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> (an object). Using \"which\" incorrectly excludes the gentleman, and using \"who\" would incorrectly include the car. Therefore, </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"that\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> is the only grammatically correct option to represent both antecedents.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">More Examples for Clarity</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 1 </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">: The </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">farmer and his ox that</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> were working in the field were struck by lightning.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 2 </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">: We saw the </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">actress and her jewelry that</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> were the talk of the town.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 3 </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">: The </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">pilot and the aircraft that</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> went missing have finally been located.</span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">The Correct Ans is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Option (B)  </span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Replace “which” with “that”.</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">📌</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> Rule / Concept: Relative Pronouns for Mixed Antecedents</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">When a sentence has two antecedents joined by \"and\"—where one is a </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">human being</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> (person) and the other is an </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">animal or a non-living thing</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">—we cannot use \"who\" (reserved for humans) or \"which\" (reserved for things/animals). In such specific cases, the relative pronoun </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"that\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> must be used as a neutral coordinator to refer to both simultaneously.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">In this sentence, the relative pronoun refers to two distinct subjects: </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"The elderly gentleman\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> (a person) and </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"the vintage car\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> (an object). Using \"which\" incorrectly excludes the gentleman, and using \"who\" would incorrectly include the car. Therefore, </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"that\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> is the only grammatically correct option to represent both </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">antecedents.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">More Examples for Clarity</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 1 </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">: The </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">farmer and his ox that</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> were working in the field were struck by lightning.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 2 </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">: We saw the </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">actress and her jewelry that</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> were the talk of the town.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 3 </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">: The </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">pilot and the aircraft that</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> went missing have finally been located.</span></p></span>",

    "solution": "<span class=\"eqt\"><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">The Correct Ans is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Option (B</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">)</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">. </span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Replace “himself” with “oneself”.</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">📌</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> Rule / Concept: </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Pronoun Consistency with \"One\"</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">When the indefinite pronoun </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"One\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> is used as the subject of a sentence to refer to people in general, it must maintain consistency in its reflexive and possessive forms.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Subject:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> One</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Object:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> One</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Possessive:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> One's</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Reflexive:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> Oneself</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">In formal English (especially SSC/Banking exams), you cannot switch from \"One\" to \"he,\" \"him,\" \"his,\" or \"himself\" within the same logical context.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Application to the Given Questio</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">n - </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">In this sentence, the subject is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"One.\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> Therefore, the reflexive pronoun used later in the sentence must correspond to \"One.\" The word </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"himself\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> is the reflexive form of \"He,\" which creates a pronoun-antecedent disagreement. To correct this, \"himself\" must be changed to </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"oneself.\"</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">More Examples for Clarity</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> - </span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 1 : </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">One</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> should take care of </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">one's</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> health. </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 2 : </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">One</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> must finish </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">one's</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> work on time. </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 3 : It is difficult for </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">one</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> to keep </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">oneself</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> calm under pressure. </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Incorrect Usage</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> - </span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Wrong example 1 : </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">One</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> should respect </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">his</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> elders. </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">❌</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Wrong example 2 : If </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">one</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> works hard, </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">he</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> will definitely succeed. </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">❌</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt; font-weight: bold;\">🧠</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> Things to Remember / Exam Tips</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">The Apostrophe Trap:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> Be careful with the possessive form. It is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">one's</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> (with an apostrophe). SSC often gives \"ones\" (plural) to trick you.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">The \"He/She\" Temptation:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> In casual speaking, we often switch to \"him\" or \"his\" for convenience, but the exam strictly follows the \"One-One's-Oneself\" chain</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">. </span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">The Correct Ans is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Option (B</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">)</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">. </span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Replace “himself” with “oneself”.</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">📌</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> Rule / Concept: </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Pronoun Consistency with \"One\"</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">When the indefinite pronoun </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"One\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> is used as the subject of a sentence to refer to people in general, it must maintain consistency in its reflexive and possessive forms.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Subject:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> One</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Object:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> One</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Possessive:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> One's</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Reflexive:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> Oneself</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">In formal English (especially SSC/Banking exams), you </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">cannot switch from \"One\" to \"he,\" \"him,\" \"his,\" or \"himself\" within the same logical context.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Application to the Given Questio</span><span style=\"font-family: 'Cambria'; font-size: 14pt; f an style=\"font-family: 'Cambria'; font-size: 14pt;\"> work on time. </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 3 : It is difficult for </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">one</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> to keep </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">oneself</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> calm under pressure. </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Incorrect Usage</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> - </span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Wrong example 1 : </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">One</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> should respect </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">his</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> elders. </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">❌</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Wrong example 2 : If </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">one</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> works hard, </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">he</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> will definitely succeed. </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">❌</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt; font-weight: bold;\">🧠</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> Things to Remember / Exam Tips</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">The Apostrophe Trap:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> Be careful with the possessive form. It is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">one's</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> (with an apostrophe). SSC often gives \"ones\" (plural) to trick you.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">The \"He/She\" Temptation:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> In casual speaking, we often switch to \"him\" or \"his\" for convenience, but the exam strictly follows the \"One-One's-Oneself\" chain</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">. </span></p></span>",

e=\"font-family: 'Cambria'; font-size: 14pt;\">In this  sentence, the relative pronoun </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"who\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> refers to the plural antecedent </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"athletes.\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> Even though the sentence begins by focusing on \"She,\" the clause introduced by \"who\" is describing the entire group of elite athletes she belongs to. Therefore, the singular verb </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"has\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> is grammatically incorrect and must be replaced with the plural verb </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"have.\"</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">More Examples for Clarity</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> - </span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 1 : He is one of those </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">leaders who inspire</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> everyone around them.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 2 : This is one of the </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">innovations that have</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> changed the world forever.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 3 : It was one of the </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">scams which were</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> exposed by the media last month.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt; font-weight: bold;\">🧠</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> Things to Remember / Exam Tips</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">The \"Only\" Trap:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> If the sentence had said \"She is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">the only one</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> of the athletes...\", then the verb would be singular (</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">has</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">). Without \"the only,\" the verb is always plural.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Identify the Antecedent:</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> Always ignore the \"One of\" and look at the noun right before \"who/which/that.\" That noun dictates the verb's number.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-fa tyle=\"font-family: 'Cambria'; font-size: 14pt;\"> already includes the \"thing,\" it is grammatically incorrect to place a noun (antecedent) immediately before it. If a specific noun like </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-style: italic;\">resources, books, or information</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> is mentioned, you must use </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"that\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> or </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"which\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">.</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">KEY RULE: WHAT is used when there is no antecedent.</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">  </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> it is used to make noun clause. </span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Example;</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">I appreciate what you did for us.  </span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Here, “what you did for us “acts as noun clause </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">and object of the verb appreciate. And there is no antecedent present so what is used.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Application to the Given Question</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> - </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">In this sentence, the noun </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"resources\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> is the explicit antecedent. By using </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"what,\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> the sentence becomes redundant (it effectively says: </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-style: italic;\">the resources the things that you need</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">). Since \"resources\" is already present, the relative pronoun must be changed to </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"that\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> to correctly </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">refer back</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> to it.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">More Examples for Clarity</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> - </span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 1 : Please listen to </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">what</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> I am saying. (No noun before 'what') </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\" -top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">The Correct Ans is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Option (B)   </span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Replace “what” with “that”.</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">📌</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Rule / Concept</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">: The \"Condensed\" Relative Pronoun (What)</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">The relative pronoun </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"what\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> is unique because it is a </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">compound/condensed</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> relative pronoun. This means it contains its own antecedent within itself. It is mathematically equivalent to </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"the thing + that\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> or </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"the stuff + which.\"</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Because </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"what\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> already includes the \"thing,\" it is grammatically incorrect to place a noun (antecedent) </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">immediately before it. If a specific noun like </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-style: italic;\">resources, books, or information</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> is mentioned, you must use </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"that\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> or </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"which\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">.</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">KEY RULE: WHAT is used when there is no antecedent.   it is used to make noun clause. </span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Example;</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">I appreciate what you did for us.  </span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Here, “what you did for us “acts as noun clause and object of the verb appreciate. And there is no antecedent present so what is used.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">Application to the Given Question</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> - </span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">In this sentence, the noun </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"resources\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> is the explicit antecedent. By using </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"what,\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> the sentence becomes redundant (it effectively says: </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-style: italic;\">the resources the things that you need</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\">). Since \"resources\" is already present, the relative pronoun must be changed to </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">\"that\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> to correctly refer back to it.</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">More Examples for Clarity</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> - </span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 1 : Please listen to </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">what</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> I am saying. (No noun before 'what') </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 2 : Please listen to the </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">advice that</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> I am giving. (Noun 'advice' is present) </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Example 3 : </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">What</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> he promised was never delivered. (No noun before 'what') </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">✅</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">I</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">ncorrect Usage</span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\"> -</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Wrong example 1 : I don't like the </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">food what</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> they serve here. </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">❌</span></p><p style=\"text-align: justify; margin-top: 12pt; margin-bottom: 12pt;\"><span style=\"font-family: 'Cambria'; font-size: 14pt;\">Wrong example 2 : This is the </span><span style=\"font-family: 'Cambria'; font-size: 14pt; font-weight: bold;\">car what</span><span style=\"font-family: 'Cambria'; font-size: 14pt;\"> I was talking about. </span><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt;\">❌</span></p></span>",
    "marks": 2,
    "section": "Pronoun",
    "series_name": "ProMocks - PRONOUN Quiz 1"
  }
