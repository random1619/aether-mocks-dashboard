    "correct_option_id": 1,
    "solution": "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is </span><span style=\"font-size: 14pt;\">- </span><span style=\"font-size: 14pt; font-weight: bold;\">Option </span><span style=\"font-size: 14pt; font-weight: bold;\">(</span><span style=\"font-size: 14pt; font-weight: bold;\">B</span><span style=\"font-size: 14pt; font-weight: bold;\">).</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Replace “</span><span style=\"font-size: 14pt;\">more</span><span style=\"font-size: 14pt;\">” with </span><span style=\"font-size: 14pt; font-weight: bold;\">“</span><span style=\"font-size: 14pt; font-weight: bold;\">THE </span><span style=\"font-size: 14pt; font-weight: bold;\">more”.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Rule/Concept</span><span style=\"font-size: 14pt;\">: </span><span style=\"font-size: 14pt; font-weight: bold;\">Use of ‘</span><span style=\"font-size: 14pt; font-weight: bold;\">THE’ </span><span style=\"font-size: 14pt; font-weight: bold;\">before comparative degree when one of two is specified</span><span style=\"font-size: 14pt; font-weight: bold;\">. </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">When a comparison is made between exactly two persons, things, or ideas, and one of them is shown to be superior, ‘</span><span style=\"font-size: 14pt; font-weight: bold;\">THE’</span><span style=\"font-size: 14pt;\"> </span><span style=\"font-size: 14pt;\">must precede the comparative degree to convey a specific and definite sense.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Application to the Given Question</span><span style=\"font-size: 14pt;\"> -</span><span style=\"font-size: 14pt;\"> </span><span style=\"font-size: 14pt;\">Here, the phrase “</span><span style=\"font-size: 14pt; font-weight: bold;\">of the two </span><span style=\"font-size: 14pt; font-weight: bold;\">explanations</span><span style=\"font-size: 14pt;\">” clearly restricts the comparison to two only. Therefore, the accepted explanation must be identified as </span><span style=\"font-size: 14pt; font-weight: bold;\">the more plausible</span><span style=\"font-size: 14pt;\"> one</span><span style=\"font-size: 14pt;\">. </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity </span><span style=\"font-size: 14pt; font-weight: bold;\">–</span></p><p style=\"margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">1.</span><span style=\"font-size: 14pt;\"> </span><span style=\"font-size: 14pt;\">Between the two routes, </span><span style=\"font-size: 14pt; font-weight: bold;\">the shorter</span><span style=\"font-size: 14pt;\"> is preferred. </span><img border=\"0\" style=\"width: 100px; height: 100px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068926.png\"><br><span style=\"font-size: 14pt;\">2. </span><span style=\"font-size: 14pt;\">Of the two candidates, </span><span style=\"font-size: 14pt; font-weight: bold;\">the more</span><span style=\"font-size: 14pt;\"> qualified was selected.&nbsp;</span><img border=\"0\" style=\"width: 21px; height: 21px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068929.png\"><br><span style=\"font-size: 14pt;\">3. </span><span style=\"font-size: 14pt;\">Between the two answers, </span><span style=\"font-size: 14pt; font-weight: bold;\">the better</span><span style=\"font-size: 14pt;\"> deserves full marks. </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068929.png\"></p><p>&nbsp;</p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Things to Remember / Exam Tips</span><span style=\"font-size: 14pt;\">&nbsp;</span><span style=\"font-size: 14pt;\">–</span><span style=\"font-size: 14pt;\"> </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Always look for phrases like </span><span style=\"font-size: 14pt; font-weight: bold;\">between the two / of the two.</span><br><span style=\"font-size: 14pt;\">These phrases force the use of ‘the + comparative’. Absence of ‘the’ is a very common SSC trap. Never use comparative without ‘the’ when the choice is limited to two.</span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is </span><span style=\"font-size: 14pt;\">- </span><span style=\"font-size: 14pt; font-weight: bold;\">Option (B).</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Replace “</span><span style=\"font-size: 14pt;\">more</span><span style=\"font-size: 14pt;\">” with </span><span style=\"font-size: 14pt; font-weight: bold;\">“THE more”.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Rule/Concept</span><span style=\"font-size: 14pt;\">: </span><span style=\"font-size: 14pt; font-weight: bold;\">Use of ‘THE’ before comparative degree when one of two is specified. </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">When a comparison is made between exactly two persons, things, or ideas, and one of them is shown to be superior, ‘</span><span style=\"font-size: 14pt; font-weight: bold;\">THE’</span><span style=\"font-size: 14pt;\"> must precede the comparative degree to convey a specific and definite sense.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Application to the Given Question</span><span style=\"font-size: 14pt;\"> -</span><span style=\"font-size: 14pt;\"> </span><span style=\"font-size: 14pt;\">Here, the phrase “</span><span style=\"font-size: 14pt; font-weight: bold;\">of the two explanations</span><span style=\"font-size: 14pt;\">” clearly restricts the comparison to two only. Therefore, the accepted explanation must be identified as </span><span style=\"font-size: 14pt; font-weight: bold;\">the more plausible</span><span style=\"font-size: 14pt;\"> one</span><span style=\"font-size: 14pt;\">. </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity </span><span style=\"font-size: 14pt; font-weight: bold;\">–</span></p><p style=\"margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">1.</span><span style=\"font-size: 14pt;\"> </span><span style=\"font-size: 14pt;\">Between the two routes, </span><span style=\"font-size: 14pt; font-weight: bold;\">the shorter</span><span style=\"font-size: 14pt;\"> is preferred. </span><img border=\"0\" style=\"width: 100px; height: 100px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068931.png\"><br><span style=\"font-size: 14pt;\">2. </span><span style=\"font-size: 14pt;\">Of the two candidates, </span><span style=\"font-size: 14pt; font-weight: bold;\">the more</span><span style=\"font-size: 14pt;\"> qualified was selected.&nbsp;</span><img border=\"0\" style=\"width: 21px; height: 21px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068931.png\"><br><span style=\"font-size: 14pt;\">3. </span><span style=\"font-size: 14pt;\">Between the two answers, </span><span style=\"font-size: 14pt; font-weight: bold;\">the better</span><span style=\"font-size: 14pt;\"> deserves full marks. </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068932.png\"></p><p>&nbsp;</p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Things to Remember / Exam Tips</span><span style=\"font-size: 14pt;\">&nbsp;</span><span style=\"font-size: 14pt;\">–</span><span style=\"font-size: 14pt;\"> </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Always look for phrases like </span><span style=\"font-size: 14pt; font-weight: bold;\">between the two / of the two.</span><br><span style=\"font-size: 14pt;\">These phrases force the use of ‘the + comparative’. Absence of ‘the’ is a very common SSC trap. Never use comparative without ‘the’ when the choice is limited to two.</span></p></span>",

  {
    "question": "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-family: 'Times New Roman'; font-size: 14pt; color: #000000; font-weight: bold;\">The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-family: 'Times New Roman'; font-size: 14pt; color: #000000; font-weight: bold;\">The following sentence has been split into four segments. Identify the segment that contains a grammatical error.</span></p></span>",
    "comp": "",
    "options": [
      "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The review panel observed that nobody </span><span style=\"font-size: 14pt;\">present</span><span style=\"font-size: 14pt;\"> in </span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The review panel observed that nobody </span><span style=\"font-size: 14pt;\">present</span><span style=\"font-size: 14pt;\"> in </span></p></span>",
      "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">the briefing was less confused than the junior officers</span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">the briefing </span><span style=\"font-size: 14pt;\">was less confused than the junior officers</span></p></span>",
      "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">after the complex operational plan was explained.</span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">after the complex operational plan was explained.</span></p></span>",
      "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">No Error</span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">No Error</span></p></span>"
    ],
    "correct_option_id": 1,
    "solution": "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is </span><span style=\"font-size: 14pt;\">- </span><span style=\"font-size: 14pt; font-weight: bold;\">Option (B)</span><span style=\"font-size: 14pt; font-weight: bold;\">.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Replace “than the junior officers” with </span><span style=\"font-size: 14pt; font-weight: bold;\">“than the junior officers </span><span style=\"font-size: 14pt; font-weight: bold;\">else”.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Rule/Concept:</span><span style=\"font-size: 14pt;\"> </span><span style=\"font-size: 14pt; font-weight: bold;\">Use of “else” after an indefinite pronoun in comparative degree</span><span style=\"font-size: 14pt; font-weight: bold;\">. </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">When a sentence begins with an indefinite pronoun like </span><span style=\"font-size: 14pt; font-weight: bold;\">nobody, no one, nothing, anyone, and a comparative degree is used, “else” is mandatory </span><span style=\"font-size: 14pt;\">to exclude the person or group already mentioned and to avoid self-comparison.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Application to the Given Question</span><span style=\"font-size: 14pt; font-weight: bold;\"> -</span><span style=\"font-size: 14pt; font-weight: bold;\"> </span><span style=\"font-size: 14pt;\">“The review panel observed that nobody present in the briefing was less confused than the junior officers …”</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Here, “</span><span style=\"font-size: 14pt; font-weight: bold;\">nobody</span><span style=\"font-size: 14pt;\ pt;\"><span style=\"font-size: 14pt;\">Nobody else was braver than the soldier during the mission.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068935.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Things to Remember / Exam Tips</span><span style=\"font-size: 14pt; font-weight: bold;\"> -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Indefinite pronoun + comparative → ELSE is compulsory</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Look for words like </span><span style=\"font-size: 14pt; font-weight: bold;\">nobody, no one, nothing, anyone</span><span style=\"font-size: 14pt;\">. </span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is </span><span style=\"font-size: 14pt;\">- </span><span style=\"font-size: 14pt; font-weight: bold;\">Option (B)</span><span style=\"font-size: 14pt; font-weight: bold;\">.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Replace “than the junior officers” with </span><span style=\"font-size: 14pt; font-weight: bold;\">“than the junior officers else”.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Rule/Concept:</span><span style=\"font-size: 14pt;\"> </span><span style=\"font-size: 14pt; font-weight: bold;\">Use of “else” after an indefinite pronoun in comparative degree. </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">When a sentence begins with an indefinite pronoun like </span><span style=\"font-size: 14pt; font-weight: bold;\">nobody, no one, nothing, anyone, and a comparative     "solution": "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is </span><span style=\"font-size: 14pt; font-weight: bold;\">Option (B)</span><span style=\"font-size: 14pt; font-weight: bold;\">. </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Replace “are expected” with </span><span style=\"font-size: 14pt; font-weight: bold;\">“is expected”.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Rule / Concept: Each vs Every</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Each</span><span style=\"font-size: 14pt;\"> is used for individual items in a group (2 or more) and always takes a singular verb.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Every</span><span style=\"font-size: 14pt;\"> is used for all items collectively (more than two) and also takes a singular verb.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Plural verbs with “Each” or “Every” are </span><span style=\"font-size: 14pt; font-weight: bold;\">incorrect</span><span style=\"font-size: 14pt;\">.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Application to the Given Question -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">“Each employee … are expected to attend…”</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Each employee → refers to individual employees one by one.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Therefore, the verb must be singular: “is expected” instead of “are expected”.</span></p><p style= </span><span style=\"font-size: 14pt;\">.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Application to the Given Question -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">“Each employee … are expected to attend…”</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Each employee → refers to individual employees one by one.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Therefore, the verb must be singular: “is expected” instead of “are expected”.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Corrected Sentence -</span><span style=\"font-size: 14pt; font-weight: bold;\"> </span><span style=\"font-size: 14pt;\">Each employee working across the departments of finance, audit, and regulatory compliance </span><span style=\"font-size: 14pt; font-weight: bold;\">is</span><span style=\"font-size: 14pt;\"> expected to attend the mandatory briefing scheduled before the commencement of the annual inspection and external review process.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068955.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Each student in the class is required to submit the assignment by Monday.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068955.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"fo e: 14pt;\">Correct order: two fifth outstanding performers</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Corrected Sentence </span><span style=\"font-size: 14pt; font-weight: bold;\">-</span><span style=\"font-size: 14pt; font-weight: bold;\"> </span><span style=\"font-size: 14pt;\"> In</span><span style=\"font-size: 14pt;\"> the prestigious annual awards ceremony organized by the corporation, the management committee recognized two fifth outstanding performers across departments.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068959.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The first three chapters of the book are essential for understanding the theory.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068965.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The second five contestants were asked to present their solutions.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068965.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The third seven participants will proceed to the final round.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068966.png\"></p><p style=\"text-align: ju rformers”</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">fifth → </span><span style=\"font-size: 14pt; font-weight: bold;\">Ordinal</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">two → </span><span style=\"font-size: 14pt; font-weight: bold;\">Cardinal</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Correct order: two fifth outstanding performers</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Corrected Sentence -</span><span style=\"font-size: 14pt; font-weight: bold;\"> </span><span style=\"font-size: 14pt;\">In the prestigious annual awards ceremony organized by the corporation, the management committee recognized two fifth outstanding performers across departments.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068966.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The first three chapters of the book are essential for understanding the theory.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068967.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The second five contestants were asked to present their solutions.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068967.png\"></p><p style=\"text-align: justify; marg     "solution": "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is </span><span style=\"font-size: 14pt; font-weight: bold;\">Option D</span><span style=\"font-size: 14pt; font-weight: bold;\"> - </span><span style=\"font-size: 14pt; font-weight: bold;\">No Error</span><span style=\"font-size: 14pt; font-weight: bold;\">.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Rule / Concept: Little / A Little / The Little</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Little</span><span style=\"font-size: 14pt;\"> → almost nothing, used in a negative sense.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">A little</span><span style=\"font-size: 14pt;\"> → some, positive sense.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">The little</span><span style=\"font-size: 14pt;\"> → all that is available, specific context.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">In sentences describing scarcity or limitation without suggesting total absence, “little” is correct.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Application to the Given Question:</span><span style=\"font-size: 14pt; font-weight: bold;\"> </span><span style=\"font-size: 14pt;\">\"The manager, despite having little experience in international negotiations, confidently led the delegation through the complex trade discussions…\"</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Here, “little experience” correctly indicates that the manager has almost no prior experience, which fits the sentence context.</span> ont-size: 14pt;\">He relied on little support of strangers randomly met on the road.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068983.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Example 3</span><span style=\"font-size: 14pt; font-weight: bold;\"> - </span><span style=\"font-size: 14pt;\">They made a little progress despite adverse weather.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068984.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">They made little progress despite adverse weather.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068984.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Things to Remember / Exam Tips -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Use little for negative/insufficient sense.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Use a little when implying some positive quantity.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Use the little only when referring to all that is available.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Watch out for “despite” or “but” clauses – they usually signal negative context → “little” is correct.</span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14 pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068985.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Example 3</span><span style=\"font-size: 14pt; font-weight: bold;\"> - </span><span style=\"font-size: 14pt;\">They made a little progress despite adverse weather.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068985.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">They made little progress despite adverse weather.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068985.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Things to Remember / Exam Tips -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Use little for negative/insufficient sense.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Use a little when implying some positive quantity.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Use the little only when referring to all that is available.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Watch out for “despite” or “but” clauses – they usually signal negative context → “little” is correct.</span></p></span>",

st be plural → \"have\" instead of \"has\".</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Corrected Sentence:</span><span style=\"font-size: 14pt; font-weight: bold;\"> </span><span style=\"font-size: 14pt;\">but some sick </span><span style=\"font-size: 14pt;\">have</span><span style=\"font-size: 14pt;\"> not been attended properly </span><span style=\"font-size: 14pt;\">due to shortage of staff.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity:</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The poor have been given relief during the flood.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068988.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The blind are often ignored in public transport.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068988.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The young aspire to excel in competitive exams.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473068988.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Incorrect Usage:</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The rich </span><span style=\"font-size: 14pt;\">has</span><span style=\"font-size: 14pt;\"> donated money for charity.</span><span style=\"font-     "solution": "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is </span><span style=\"font-size: 14pt; font-weight: bold;\">Option (B)</span><span style=\"font-size: 14pt;\"> – replace “much faster than China” with </span><span style=\"font-size: 14pt; font-weight: bold;\">“much faster than that of China”</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Rule/Concept: Incorrect Comparison (Faulty Comparison)</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">A faulty comparison occurs when two non-comparable things are compared.</span><span style=\"font-size: 14pt;\"> </span><span style=\"font-size: 14pt; font-weight: bold;\">Only like things (same category) should be compared</span><span style=\"font-size: 14pt;\">. Here, GDP growth of India (a quantity) is being compared to China (a country), which is incorrect. Both sides of the comparison must refer to the same type of entity, i.e., GDP growth of India vs GDP growth of China.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Application to the Given Question -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The error lies in part B because the phrasing “according to the latest report…” separates the comparison improperly, making it seem as if India’s GDP growth is being compared directly to a country, rather than to China’s GDP growth.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The literacy rate of Kerala is higher than the literacy rate of Tamil Nadu.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" st     "solution": "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is Option (C) – </span><span style=\"font-size: 14pt;\">R</span><span style=\"font-size: 14pt;\">eplace “feeling inspired” with “felt inspired”.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Rule / Concept: Participial Adjectives: “-</span><span style=\"font-size: 14pt; font-weight: bold;\">ing</span><span style=\"font-size: 14pt; font-weight: bold;\">” vs “-ed”</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Present Participle</span><span style=\"font-size: 14pt;\"> (-</span><span style=\"font-size: 14pt;\">ing</span><span style=\"font-size: 14pt;\">): Describes the cause of a feeling (active).</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Past Participle</span><span style=\"font-size: 14pt;\"> (-ed): Describes the receiver of a feeling (passive/state).</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Using the wrong participle creates a grammatical error and changes the meaning of the sentence.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Application to the Given Question -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Here, “who feeling inspired” is in the wrong form. The recruits are the receiver of inspiration, so the past participle “felt inspired” must be used.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Corrected Sentence -</span><span style=\"font-size: 14pt; font-weight: bold;\"> </span><span style=\"font-size: 14pt;\">The motivational workshop conducted by the senior manager l     "solution": "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is </span><span style=\"font-size: 14pt; font-weight: bold;\">Option (B)</span><span style=\"font-size: 14pt;\"> – replace “more and more severe” with “</span><span style=\"font-size: 14pt; font-weight: bold;\">worse and worse</span><span style=\"font-size: 14pt;\">”.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Rule/Concept: Graduation of Comparison (Double Comparison Logic):</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">When a quality increases continuously, use the structure: Comparative + and + Comparative.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Do not use “more and more + adjective” with a positive form (e.g., “more and more severe”) when a comparative form exists.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Corrected Sentence -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The inflation rate over the past few months has been growing worse and worse, making it difficult for common people to manage household expenses.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The weather is getting hotter and hotter as summer progresses.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069002.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The students’ anxiety about e ht: bold;\">Rule/Concept: Graduation of Comparison (Double Comparison </span><span style=\"font-size: 14pt; font-weight: bold;\">Logic):</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">When a quality increases continuously, use the structure: Comparative + and + Comparative.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Do not use “more and more + adjective” with a positive form (e.g., “more and more severe”) when a comparative form exists.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Corrected Sentence -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The inflation rate over the past few months has been growing worse and worse, making it difficult for common people to manage household expenses.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The weather is getting hotter and hotter as summer progresses.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069003.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The students’ anxiety about exams is becoming greater and greater each day.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069004.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Traffic congestion in the city is becoming worse and worse despite new measures.</span><span style=\"font-size: 14pt;\"     "solution": "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is </span><span style=\"font-size: 14pt; font-weight: bold;\">Option (D) – No error.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Rule / Concept: Incorrect Comparison (Faulty Comparison)</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">A faulty comparison occurs when two non-comparable things are compared.</span><span style=\"font-size: 14pt;\"> </span><span style=\"font-size: 14pt;\">Only like things (same category) should be compared. Here, literacy rate of Kerala (a quantity) is correctly compared to Tamil Nadu (a state). Both sides of the comparison must refer to the same type of entity, i.e., literacy rate of Kerala vs literacy rate of Tamil Nadu.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity</span><span style=\"font-size: 14pt; font-weight: bold;\"> -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The GDP growth of India is higher than the GDP growth of China this year.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069006.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The unemployment rate in Maharashtra is worse than the unemployment rate in Gujarat.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069006.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The rainfall in Bihar is lower than the rainf pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The GDP growth of India is higher than the GDP growth of China this year.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069007.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The unemployment rate in Maharashtra is worse than the unemployment rate in Gujarat.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069007.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The rainfall in Bihar is lower than the rainfall in Uttar Pradesh this monsoon.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069007.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Incorrect Usage -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">My height is more than India.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069008.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The price of gold is higher than Delhi.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069008.png\"></p></span>",

      "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">highly informative, and most of the class benefited</span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">highly informative, and most of the class benefited</span></p></span>",

    "solution": "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is </span><span style=\"font-size: 14pt; font-weight: bold;\">Option (B)</span><span style=\"font-size: 14pt;\"> – replace “most of the class benefited” with </span><span style=\"font-size: 14pt; font-weight: bold;\">“only they benefited”.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Concept: Few / A Few / The Few </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Few → Almost none; emphasizes scarcity (negative sense)</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">A few → Some; emphasizes presence (positive sense)</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The few → A specific small group; emphasizes a definite limited number</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">When the few is used, it refers only to that small, specific group. Saying “most of the class benefited” incorrectly extends the scope </span><span style=\"font-size: 14pt;\">beyond the few.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Application to the Given Question -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Here, “the few students” is a specific small group.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Saying “most of the class benefited” contradicts the meaning, because only the few students attended and benefited.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Corrected Sentence -</span><span style=\"font-size: 14pt; font-weight: bold;\"> </span><span style=\"font-size: 14pt;\">The few students who attended the special lecture found it highly informative, and only they benefited from the additional insights shared by the professor.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The few employees who worked overtime received appreciation.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069009.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The few people present at the meeting understood the changes.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069009.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The few volunteers who arrived early helped organize the event.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069010.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Incorrect Usage -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The few students attended, but everyone in the class passed.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069010.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The few workers completed the task, and all employees praised them.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069010.png\"></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is </span><span style=\"font-size: 14pt; font-weight: bold;\">Option (B)</span><span style=\"font-size: 14pt;\"> – replace “most of the class benefited” with </span><span style=\"font-size: 14pt; font-weight: bold;\">“only they benefited”.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Concept: Few / A Few / The Few </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Few → Almost none; emphasizes scarcity (negative sense)</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">A few → Some; emphasizes presence (positive sense)</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The few → A specific small group; emphasizes a definite limited number</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">When the few is used, it refers only to that small, specific group. Saying “most of the class benefited” incorrectly extends the scope beyond the few.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Application to the Given Question -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Here, “the few students” is a specific small group.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Saying “most of the class benefited” contradicts the meaning, because only the few students attended and benefited.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Corrected Sentence -</span><span style=\"font-size: 14pt; font-weight: bold;\"> </span><span style=\"font-size: 14pt;\">The few students who attended the special lecture found it highly informative, and only they benefited from the additional insights shared by the professor.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The few employees who worked overtime received appreciation.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069010.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The few people present at the meeting understood the changes.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069011.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The few volunteers who arrived early helped organize the event.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069011.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Incorrect Usage -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The few students attended, but everyone in the class passed.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l     "solution": "<span class=\"eqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is </span><span style=\"font-size: 14pt; font-weight: bold;\">Option (B</span><span style=\"font-size: 14pt;\">)</span><span style=\"font-size: 14pt;\">. </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">R</span><span style=\"font-size: 14pt;\">eplace “comprehensive plan” with </span><span style=\"font-size: 14pt;\">“</span><span style=\"font-size: 14pt;\">plan comprehensive.</span><span style=\"font-size: 14pt;\">”</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Rule/Concept:</span><span style=\"font-size: 14pt;\"> </span><span style=\"font-size: 14pt; font-weight: bold;\">Adjective after Noun when Preposition Follows</span><span style=\"font-size: 14pt;\"> -</span><span style=\"font-size: 14pt;\"> </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">When a noun is immediately followed by a prepositional phrase, any adjective describing that noun must come after the noun, not before.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Placing the adjective before the noun in such cases is considered grammatically incorrect in SSC CGL standards.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Application to the Given Question </span><span style=\"font-size: 14pt; font-weight: bold;\">- </span><span style=\"font-size: 14pt;\">Here, the noun “plan” is followed by the prepositional phrase “for the development of infrastructure…”.</span><span style=\"font-size: 14pt;\"> </span><span style=\"font-size: 14pt;\">The adjective “comprehensive” is incorrectly placed before the noun. According to Rule, it must come after the noun.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Corrected Sentence -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\"> The minister, after consulting various experts and reviewing multiple reports on regional development, presented a plan comprehensive for the development of infrastructure in rural </span><span style=\"font-size: 14pt;\">districts, including roads, healthcare facilities, and educational institutions.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">A report detailed on environmental impacts → a report detailed on environmental impacts.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069013.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">A strategy effective for improving literacy → a strategy effective for improving literacy.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069013.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">A solution innovative for reducing pollution → a solution innovative for reducing pollution.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069013.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Incorrect Usage -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">A plan comprehensive for urban development. (Incorrect placement in SSC trap style).</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069013.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">An initiative important for social welfare. (Adjective before noun, preposition follows).</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069013.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Things to Remember / Exam Tips -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Always check if a prepositional phrase follows a noun; if yes, place the adjective after the noun.</span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is </span><span style=\"font-size: 14pt; font-weight: bold;\">Option (B</span><span style=\"font-size: 14pt;\">)</span><span style=\"font-size: 14pt;\">. </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">R</span><span style=\"font-size: 14pt;\">eplace “comprehensive plan” with </span><span style=\"font-size: 14pt;\">“</span><span style=\"font-size: 14pt;\">plan comprehensive.</span><span style=\"font-size: 14pt;\">”</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Rule/Concept:</span><span style=\"font-size: 14pt;\"> </span><span style=\"font-size: 14pt; font-weight: bold;\">Adjective after Noun when Preposition Follows</span><span style=\"font-size: 14pt;\"> -</span><span style=\"font-size: 14pt;\"> </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">When a noun is immediately followed by a prepositional phrase, any adjective describing that noun must come after the noun, not before.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Placing the adjective before the noun in such cases is considered grammatically incorrect in SSC CGL standards.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Application to the Given Question </span><span style=\"font-size: 14pt; font-weight: bold;\">- </span><span style=\"font-size: 14pt;\">Here, the noun “plan” is followed by the prepositional phrase “for the development of infrastructure…”.</span><span style=\"font-size: 14pt;\"> </span><span style=\"font-size: 14pt;\">The adjective “comprehensive” is incorrectly placed before the noun. According to Rule, it must come after the </span><span style=\"font-size: 14pt;\">noun.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Corrected Sentence -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\"> The minister, after consulting various experts and reviewing multiple reports on regional development, presented a plan comprehensive for the development of infrastructure in rural districts, including roads, healthcare facilities, and educational institutions.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">More Examples for Clarity -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">A report detailed on environmental impacts → a report detailed on environmental impacts.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069014.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">A strategy effective for improving literacy → a strategy effective for improving literacy.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069014.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">A solution innovative for reducing pollution → a solution innovative for reducing pollution.</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069014.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Incorrect Usage -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">A plan comprehensive for urban development. (Incorrect placement in SSC trap style).</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069014.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">An initiative important for social welfare. (Adjective before noun, preposition follows).</span><span style=\"font-size: 14pt;\"> </span><img border=\"0\" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069014.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Things to Remember / Exam Tips -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Always check if a prepositional phrase follows a noun; if yes, place the adjective \" style=\"width: 64px; height: 64px;\" src=\"https://www.thepunditsofficial.in/admin/assets/uploads/ckeditor/l7iiE1772473069021.png\"></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Things to Remember / Exam Tips -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Check the adjective: if it’s a comparative, never use “very”.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">Intensify comparatives with much or far only.</span></p></span><span class=\"hqt\"><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">The Correct Ans is Option (B)</span><span style=\"font-size: 14pt;\">. </span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">R</span><span style=\"font-size: 14pt;\">eplace “very heavier” with much heavier or far heavier.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Rule / Concept:</span><span style=\"font-size: 14pt;\"> </span><span style=\"font-size: 14pt; font-weight: bold;\">Modification of Comparatives</span><span style=\"font-size: 14pt; font-weight: bold;\"> -</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">You cannot use “very” with comparative adjectives.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">To intensify comparatives, use “much” or “far” instead of “very.”</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt;\">SSC CGL often traps candidates by combining “very” with comparatives in long, complex sentences.</span></p><p style=\"text-align: justify; margin-bottom: 0pt;\"><span style=\"font-size: 14pt; font-weight: bold;\">Application to the Given Question -</span><span style=\"font-size: 14pt; font-weight: bo
