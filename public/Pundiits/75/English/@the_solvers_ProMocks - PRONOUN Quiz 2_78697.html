    "solution": "<span class=\"eqt\"><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\">The Correct Ans is Option </span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000; font-weight: bold;\">(A)</span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000; font-weight: bold;\">. </span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\">Replace </span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000; font-weight: bold;\">“is”</span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\"> with </span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000; font-weight: bold;\">“am”</span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\">.</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Segoe UI Emoji'; font-size: 14pt; color: #000000;\">📌</span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\"> </span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000; font-weight: bold;\">Rule / Concept</span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\">: </span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000; font-weight: bold;\">Relative Pronoun Antecedent Agreement</span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\">  </span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\">-</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\">When a sentence follows the structure </span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000; font-weight: bold;\">\"It is [Pronoun] + who/that,\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\"> the verb in the relative clause must agree with the </span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000; font-weight: bold;\">antecedent</span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\"> (the noun or pronoun that comes immediately before </span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000; font-style: italic;\">who/that</span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\">).</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\">Even though \"It\" is the subject of the first part of the sentence, the word </span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000; font-weight: bold;\">\"who\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\"> is actually acting as the subject for the second part. Since \"who\" is representing </span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000; font-weight: bold;\">\"I\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\">, it must take the verb form that \"I\" would naturally take.</span></p><p style=\"text-align: justify; margin-top: 0; margin-bottom: 0;\"><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\"> </span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000; font-weight: bold;\">Application to the Given Question</span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000; font-weight: bold;\"> - </span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\">In this sentence, the relative pronoun is </span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000; font-weight: bold;\">\"who.\"</span><span style=\"font-family: 'Cambria'; font-size: 14pt; color: #000000;\"> Its     "solution": "<span class=\"eqt\"><p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><span style=\"font-size:14.0pt\"><span style=\"color:black\">The Correct Ans is <strong>Option (B).</strong></span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><span style=\"font-size:14.0pt\"><span style=\"color:black\">Replace &ldquo;him&rdquo; with <strong>&ldquo;he&rdquo;</strong>.</span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><strong><span style=\"font-size:14.0pt\"><span style=\"color:black\">Rule / Concept:</span></span></strong><span style=\"font-size:14.0pt\"><span style=\"color:black\"> <strong>Subjective Case in Comparisons</strong> - </span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><span style=\"font-size:14.0pt\"><span style=\"color:black\">When we compare two subjects using <strong>&quot;than&quot;</strong> or <strong>&quot;as...as&quot;</strong>, the pronoun following the comparison should be in the <strong>Subjective Case</strong> (<em>I, he, she, we, they</em>).</span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><span style=\"font-size:14.0pt\"><span style=\"color:black\">The logic is that the sentence is actually a condensed version of a longer sentence where the verb is &quot;understood.&quot; Even if you don&#39;t write the verb, the pronoun must remain a subject</span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><span style=\"font-size:14.0pt\"><span style=\"color:black\">In this sentence, we are comparing two people who &quot;need&quot; the seat:</span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><span style=\"font-size:14.0pt\"><span style=\"color:black\">Subject 1: <strong>She</strong> (needs the seat)</span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><span style=\"font-size:14.0pt\"><span style=\"color:black\">Subject 2: <strong>He</strong> (needs the seat)</span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><span style=\"font-size:14.0pt\"><span style=\"color:black\">If you complete the sentence mentally, it becomes: &quot;She needs the seat more than <strong>he</strong> (does).&quot; You would never say &quot;than <strong>him</strong> does.&quot; Therefore, &quot;him&quot; (objective) must be changed to &quot;he&quot; (subjective).</span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><strong><span style=\"font-size:14.0pt\"><span style=\"color:black\">Corrected Sentence</span></span></strong><span style=\"font-size:14.0pt\"><span style=\"color:black\"> - She needs this seat much more than <strong>he</strong> because she is carrying a baby.</span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><strong><span style=\"font-size:14.0pt\"><span style=\"color:black\">More Examples for Clarity</span></span></strong></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><strong><span style=\"font-size:14.0pt\"><span style=\"color:black\">Example 1:</span></span></strong><span style=\"font-size:14.0pt\"><span style=\"color:black\"> My brother is taller than <strong>I</strong>. (Meaning: than I <strong>am</strong>).</span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><strong><span style=\"font-size:14.0pt\"><span style=\"color:black\">Example 2:</span></span></strong><span style=\"font-size:14.0pt\"><span style=\"color:black\"> You are as talented as <strong>she</strong>. (Meaning: as she <strong>is</strong>).</span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><strong><span style=\"font-size:14.0pt\"><span style=\"font-family:&quot;Cambria&quot;,serif\"><span style=\"color:black\">Example 3:</span></span></span></strong><span style=\"font-size:14.0pt\"><span style=\"font-family:&quot;Cambria&quot;,serif\"><span style=\"color:black\"> They work harder than <strong>we</strong>. (Meaning: than we <strong>do</strong>).</span></span></span></p>\r\n</span><span class=\"hqt\"><p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><span style=\"font-size:14.0pt\"><span style=\"color:black\">The Correct Ans is <strong>Option (B).</strong></span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><span style=\"font-size:14.0pt\"><span style=\"color:black\">Replace &ldquo;him&rdquo; with <strong>&ldquo;he&rdquo;</strong>.</span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><strong><span style=\"font-size:14.0pt\"><span style=\"color:black\">Rule / Concept:</span></span></strong><span style=\"font-size:14.0pt\"><span style=\"color:black\"> <strong>Subjective Case in Comparisons</strong> - </span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><span style=\"font-size:14.0pt\"><span style=\"color:black\">When we compare two subjects us ia,serif\"><strong><span style=\"font-size:14.0pt\"><span style=\"color:black\">Corrected Sentence</span></span></strong><span style=\"font-size:14.0pt\"><span style=\"color:black\"> - She needs this seat much more than <strong>he</strong> because she is carrying a baby.</span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><strong><span style=\"font-size:14.0pt\"><span style=\"color:black\">More Examples for Clarity</span></span></strong></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><strong><span style=\"font-size:14.0pt\"><span style=\"color:black\">Example 1:</span></span></strong><span style=\"font-size:14.0pt\"><span style=\"color:black\"> My brother is taller than <strong>I</strong>. (Meaning: than I <strong>am</strong>).</span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><span style=\"font-size:11pt\"><span style=\"font-family:Cambria,serif\"><strong><span style=\"font-size:14.0pt\"><span style=\"color:black\">Example 2:</span></span></strong><span style=\"font-size:14.0pt\"><span style=\"color:black\"> You are as talented as <strong>she</strong>. (Meaning: as she <strong>is</strong>).</span></span></span></span></p>\r\n\r\n<p style=\"text-align:justify\"><strong><span style=\"font-size:14.0pt\"><span style=\"font-family:&quot;Cambria&quot;,serif\"><span style=\"color:black\">Example 3:</span></span></span></strong><span style=\"font-size:14.0pt\"><span style=\"font-family:&quot;Cambria&quot;,serif\"><span style=\"color:black\"> They work harder than <strong>we</strong>. (Meaning: than we <strong>do</strong>).</span></span></span></p>\r\n</span>",
