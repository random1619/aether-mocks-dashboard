            </div>

 </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">साधारण</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">आटा</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">मंगवाया।प्रीमियम</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">आटे</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">का</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">प्रति</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">किलोग्राम</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">मूल्य</span><span style=\"font-family:'Cambria Math'; font-size:14pt\">, </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">साधारण</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">आटे</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">के</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">प्रति</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">किलोग्राम</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">मूल्य</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">का</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">दोगुना</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">था।ऑर्डर</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">देने</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">में</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">गलती</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">के</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">कारण</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">दोनों</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">प्रकार</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">के</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">आटे</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">की</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">मात्राएँ</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">आपस</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:1 bria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">आटे</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">और</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">साधारण</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">आटे</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">की</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">मात्रा</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">का</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">अनुपात</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">ज्ञात</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">कीजिए</span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">।</span></p>\r\n</span>",

    "solution": "<span class=\"eqt\"><p><span style=\"font-family:'Cambria Math'; font-size:14pt\">Let the price of standard flour per kg be ₹1.</span></p>\r\n\r\n<p><span style=\"font-family:'Cambria Math'; font-size:14pt\">So, price of premium flour</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">= ₹ 2.</span></p>\r\n\r\n<p><span style=\"font-family:'Cambria Math'; font-size:14pt\">Let x</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">kg of standard flour be used.</span></p>\r\n\r\n<p><span style=\"font-family:'Cambria Math'; font-size:14pt\">Cost = Price &times; Quantity</span></p>\r\n\r\n<p><span style=\"font-family:'Cambria Math'; font-size:14pt\">Total cost =</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">12&times;2</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">+</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">x&times;1</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">=</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">24+x</span></p>\r\n\r\n<p><span style=\"font-family:'Cambria Math'; font-size:14pt\">Total cost after interchanging =</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">x&times;2+12&times;1</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">=</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">2x+12</span></p>\r\n\r\n<p><span style=\"font-family:'Cambria Math'; font-size:14pt\">A&sdot;T&sdot;</span><span style=\"font-family:'Cambria Math'; font-size:14pt\">Q, </span></p>\r\n\r\n<p><span style=\"font-family:'Cambria Math'; font-size:14pt\">2x+12</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">=</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> {</span><span style=\"font-family:'Cambria Math'; font-size:14pt\">80(24+x)</span><span style=\"font-family:'Cambria Math'; font-size:14pt\">}</span><span style=\"font-family:'Cambria Math'; font-size:14pt\">/100</span></p>\r\n\r\n<p><span style=\"font-family:'Cambria Math'; font-size:14pt\">&there4;</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">x</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">=</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">6</span></p>\r\n\r\n<p><span style=\"font-family:'Cambria Math'; font-size:14pt\">Premium</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">:</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> Standard</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> = </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">12:6</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Cambria Math'; font-size:14pt\">&rArr; 2:1</span></p>\r\n</span><span class=\"hqt\"><div style=\"position:relative\">\r\n<p><span style=\"font-family:'Nirmala UI'; font-size:14pt\">मान</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">लें</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">कि</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">साधारण</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">आटे</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">का</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">मूल्य</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> ₹1 </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">प्रति</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">किलोग्राम</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">है</span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">।</span><br />\r\n<span style=\"font-family:'Nirmala UI'; font-size:14pt\">तो</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">प्रीमियम</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">आटे</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">का</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">मूल्य</span><span style=\"font-family:'Cambria Math'; font-size:14pt\"> ₹2 </span><span style=\"font-family:'Nirmala UI'; font-size:14pt\">प्रति</span><span st
