<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">1. \\'</span><span style=\\\"font-family: Cambria Math;\\\">India\\'s Struggle for Independence\\' is one of the notable books written by ___</span><span style=\\\"font-family: Cambria Math;\\\">_ .</span></p>\\n",
    "options": [

      "R.C. Majumdar",

    "question_index": 0
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Who among the following was awarded the Bharat Ratna in 2001 and has been credited with taking the shehnai from the marriage mandap to the concert hall?</span></p>\n",
    "options": [

    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">2.(</span><span style=\"font-family: Cambria Math;\">d) <strong>Bismillah Khan (Ustad). Awards:</strong> </span><span style=\"font-family: Cambria Math;\">Bharat Ratna (2001), Padma Vibhushan (1980), Padma Bhushan (1968), Padma Shri (1961), Sangeet Natak </span><span style=\"font-family: Cambria Math;\">Akademi</span><span style=\"font-family: Cambria Math;\"> Award (1956), Sangeet Natak </span><span style=\"font-family: Cambria Math;\">Akademi</span><span style=\"font-family: Cambria Math;\"> Fellowship (1994), Swathi Sangeetha </span><span style=\"font-family: Cambria Math;\">Puraskaram</span><span style=\"font-family: Cambria Math;\"> (1998) by Government of Kerala, T </span><span style=\"font-family: Cambria Math;\">Choudayya</span><span style=\"font-family: Cambria Math;\"> National Award (1995) by Government of Karnataka, Tahar </span><span style=\"font-family: Cambria Math;\">Mausique</span><span style=\"font-family: Cambria Math;\"> from the Republic of Iran (1992), Tansen Award by Govt. of Madhya Pradesh. </span></p>\n",
    "question_index": 1
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Padma Subrahmanyam is a well-known dancer of which of the following dance forms?</span></p>\n",
    "options": [
      "Bharatnatyam",
      "Manipuri",
      "Odissi",
      "Kuchipudi"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">3.(</span><span style=\"font-family: Cambria Math;\">a) <strong>Bharatnatyam:</strong>-</span><span style=\"font-family: Cambria Math;\"> An Indian classical dance form that originated in Tamil Nadu. It is one of eight Indian classical dance forms recognized by the Sangeet Natak </span><span style=\"font-family: Cambria Math;\">Akademi</span><span style=\"font-family: Cambria Math;\">. Padma Subrahmanyam is well known as the developer and founder of the dance form Bharata </span><span style=\"font-family: Cambria Math;\">Nrithyam</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> <strong>Awards won</strong> - </span><span style=\"font-family: Cambria Math;\">Sangeet Natak </span><span style=\"font-family: Cambria Math;\">Akademi</span><span style=\"font-family: Cambria Math;\"> Award (1983), Padma Bhushan (2003), Padma Shri (1981). </span></p>\n",
    "question_index": 2
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">Who among the following was known as the \\'Queen of Thumri</span><span style=\\\"font-family: Cambria Math;\\\">\\' ?</span></p>\\n",
    "options": [
      "Siddheswari Devi ",
      "Girija Devi",
      "Gangubai Hangal ",
      "Begum Parveen Sultana\\r\\n "
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">4.(</span><span style=\"font-family: Cambria Math;\">b)</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"><strong>Girija Devi. Awards </strong>- </span><span style=\"font-family: Cambria Math;\">Padma Shri (1972), Padma Bhushan (1989), Padma Vibhushan (2016), Sangeet </span><span style=\"font-family: Cambria Math;\">Natak </span><span style=\"font-family: Cambria Math;\">Akademi</span><span style=\"font-family: Cambria Math;\"> Award (1977), Sangeet Natak </span><span style=\"font-family: Cambria Math;\">Akademi</span><span style=\"font-family: Cambria Math;\"> Fellowship (2010).</span><span style=\"font-family: Cambria Math;\"> </span><strong><span style=\"font-family: Cambria Math;\">Siddheswari</span></strong><span style=\"font-family: Cambria Math;\"><strong> Devi </strong>- </span><span style=\"font-family: Cambria Math;\">She was a legendary Hindustani singer from Varanasi, India, known as &lsquo;Maa&rsquo; (mother). </span><strong><span style=\"font-family: Cambria Math;\">Gangubai</span></strong><span style=\"font-family: Cambria Math;\"><strong> Hangal </strong>- </span><span style=\"font-family: Cambria Math;\">She was an Indian singer of the khayal genre of </span><span style=\"font-family: Cambria Math;\">Hindustani classical music from Karnataka. </span><span style=\"font-family: Cambria Math;\"><strong>Begum Parveen Sultana </strong>- </span><span style=\"font-family: Cambria Math;\">She is an Indian Hindustani classical singer of the Patiala Gharana. She was awarded the Padma Shri in 1976 and the Padma Bhushan in 2014.</span></p>\n",
    "question_index": 3
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Which among the following dance forms was originally performed in the temples of Tamil Nadu, by the Devadasis and therefore it is also known as </span><span style=\"font-family: Cambria Math;\">Dasiattam</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
    "options": [
      "Kuchipudi",
      "Bharatnatyam",
      "Odissi",
      "Manipuri"

    "question_index": 4
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Pradhan Mantri </span><span style=\"font-family: Cambria Math;\">Gramodaya</span><span style=\"font-family: Cambria Math;\"> Yojana was launched in ___________.</span></p>\n",
    "options": [
      "2000",
      "2010",
      "2005",
      "1998"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">6.(</span><span style=\"font-family: Cambria Math;\">a) <strong>2000.</strong></span><strong><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Pradhan Mantri </span><span style=\"font-family: Cambria Math;\">Gramodaya</span><span style=\"font-family: Cambria Math;\"> Yojana</span></strong><span style=\"font-family: Cambria Math;\"> - It was started to improve the lives of the rural poor population. </span><strong><span style=\"font-family: Cambria Math;\">Other important government scheme: </span></strong><span style=\"font-family: Cambria Math;\">National Social Assistance </span><span style=\"font-family: Cambria Math;\">Programme</span><span style=\"font-family: Cambria Math;\"> (Launched on 15th August, 1995). Pradhan Mantri Gram Sadak Yojana (Launched on 25th December, 2000). </span><span style=\"font-family: Cambria Math;\">Saansad</span><span style=\"font-family: Cambria Math;\"> Adarsh Gram Yojana</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">(October 2014).</span></p>\n",
    "question_index": 5
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">A biopic on legendary Sitara Devi has been announced on her 101st birth anniversary by producer Raj C Anand. Sitara Devi was a recognized ___________ dancer.</span></p>\n",
    "options": [

    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">7.</span><span style=\"font-family: Cambria Math;\">(</span><span style=\"font-family: Cambria Math;\">a) <strong>Kathak. Sitara Devi:</strong></span><strong><span style=\"font-family: Cambria Math;\"> </span></strong><span style=\"font-family: Cambria Math;\"><strong>Awards</strong> -</span><span style=\"font-family: Cambria Math;\"> Sangeet Natak </span><span style=\"font-family: Cambria Math;\">Akademi</span><span style=\"font-family: Cambria Math;\"> Award (1969), Padma Shri (1973), Kalidas </span><span style=\"font-family: Cambria Math;\">Samman (</span><span style=\"font-family: Cambria Math;\">1995). </span><span style=\"font-family: Cambria Math;\"><strong>Famous dancers: Kathak</strong> </span><span style=\"font-family: Cambria Math;\">(Uttar Pradesh) </span><span style=\"font-family: Cambria Math;\">- </span><span style=\"font-family: Cambria Math;\">Birju Maharaj, Shambhu Maharaj, Gopi Krishna, Damayanti Joshi, </span><span style=\"font-family: Cambria Math;\">Lachhu</span><span style=\"font-family: Cambria Math;\"> Maharaj. </span><span style=\"font-family: Cambria Math;\">Odissi</span><span style=\"font-family: Cambria Math;\"> (<strong>Odisha</strong>) - Sonal Mansingh, </span><span style=\"font-family: Cambria Math;\">Kelucharan</span><span style=\"font-family: Cambria Math;\"> Mohapatra, Madhavi Mudgal. </span><strong><span style=\"font-family: Cambria Math;\">Kathakali </span></strong><span style=\"font-family: Cambria Math;\">(Kerala) - </span><span style=\"font-family: Cambria Math;\">Kalamandalam</span><span style=\"font-family: Cambria Math;\"> Gopi, </span><span style=\"font-family: Cambria Math;\">Ramankutty</span><span style=\"font-family: Cambria Math;\"> Nair, Milena Salvini. </span></p>\n",
    "question_index": 6
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> The </span><span style=\"font-family: Cambria Math;\">Ugadi</span><span style=\"font-family: Cambria Math;\"> festival in India celebrates the __________.</span></p>\n",
    "options": [
      "first rainfall",
      "commencement of new year",

    ],
    "correct_option_id": 1,

    "question_index": 7

  {

    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">9.</span><span style=\"font-family: Cambria Math;\">(</span><span style=\"font-family: Cambria Math;\">d) <strong>Chitra Banerjee Divakaruni. </strong></span><span style=\"font-family: Cambria Math;\"><strong>Books</strong> </span><span style=\"font-family: Cambria Math;\"> -</span><span style=\"font-family: Cambria Math;\"> &ldquo;Black Candle&rdquo;, &ldquo;Leaving Yuba City&rdquo;. </span><strong><span style=\"font-family: Cambria Math;\">Amish Tripathi</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Books </span></strong><span style=\"font-family: Cambria Math;\">- &ldquo;Sita&rdquo;, &ldquo;Nagas&rdquo;, &ldquo;</span><span style=\"font-family: Cambria Math;\">Suheldev</span><span style=\"font-family: Cambria Math;\">&rdquo;, &ldquo;Raavan&rdquo;. </span><strong><span style=\"font-family: Cambria Math;\">Indu Sundaresan</span><span style=\"font-family: Cambria Math;\"> </span></strong><span style=\"font-family: Cambria Math;\"><strong>Books</strong> </span><span style=\"font-family: Cambria Math;\">- &ldquo;The Mountain of Light&rdquo;, &ldquo;The splendor of silence&rdquo;, &ldquo;Shadow of princess&rdquo;. </span><strong><span style=\"font-family: Cambria Math;\">Kiran Desai</span><span style=\"font-family: Cambria Math;\"> </span></strong><span style=\"font-family: Cambria Math;\"><strong>Books</strong> </span><span style=\"font-family: Cambria Math;\">- &ldquo;The Inheritance of Loss&rdquo;.</span></p>\n",

  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\"> Which folk dance of Rajasthan is also known as \\'Sapera dance\\'?</span></p>\\n",

    "solution": "<p><span style=\"font-family: Cambria Math;\">10.(</span><span style=\"font-family: Cambria Math;\">b) </span><strong><span style=\"font-family: Cambria Math;\">Kalbelia</span></strong><span style=\"font-family: Cambria Math;\"><strong> dance</strong> </span><span style=\"font-family: Cambria Math;\">(Snake Charmer Dance). It is mainly performed by the </span><span style=\"font-family: Cambria Math;\">Kalbelia</span><span style=\"font-family: Cambria Math;\"> Community in Rajasthan. </span><strong><span style=\"font-family: Cambria Math;\">Gair</span></strong><span style=\"font-family: Cambria Math;\"> dance is one of the popular, famous folk dances from Rajasthan in India which is mostly performed by the Bhil community. </span><strong><span style=\"font-family: Cambria Math;\">Ghoomar</span></strong><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">(</span><span style=\"font-family: Cambria Math;\">ghumar</span><span style=\"font-family: Cambria Math;\">) is a traditional folk dance of Rajasthan.</span><span style=\"font-family: Cambria Math;\"> <strong>Chari</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>dance is prominent in the Gujjar and Saini community in Rajasthan.</span></p>\n",

  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">Who among the following was revered as the \\'Queen of Thumri\\'?</span></p>\\n",

    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">11.(</span><span style=\"font-family: Cambria Math;\">c) <strong>Girija Devi. </strong></span><span style=\"font-family: Cambria Math;\">She was an Indian classical singer of the Seniya and Banaras gharanas. </span><span style=\"font-family: Cambria Math;\"><strong>Awards</strong> </span><span style=\"font-family: Cambria Math;\">- Padma Shri (1972), Padma Bhushan (1989), Padma Vibhushan (2016), Sangeet Natak </span><span style=\"font-family: Cambria Math;\">Akademi</span><span style=\"font-family: Cambria Math;\"> Award (1977), Sangeet Natak </span><span style=\"font-family: Cambria Math;\">Akademi</span><span style=\"font-family: Cambria Math;\"> Fellowship (2010). </span><span style=\"font-family: Cambria Math;\"><strong>Thumri</strong> </span><span style=\"font-family: Cambria Math;\">is a vocal genre of Indian music. </span><strong><span style=\"font-family: Cambria Math;\">Famous Singers of Thumri</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- </span><span style=\"font-family: Cambria Math;\">Gauhar</span><span style=\"font-family: Cambria Math;\"> Jan, Begum Akhtar, Shobha </span><span style=\"font-family: Cambria Math;\">Gurtu</span><span style=\"font-family: Cambria Math;\">, Noor Jehan.</span></p>\n",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">The Ravan Phadi cave in</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">is an example of the early </span><span style=\"font-family: Cambria Math;\">Chalukya</span><span style=\"font-family: Cambria Math;\"> style architecture which is known for its distinct sculptural style.</span></p>\n",
