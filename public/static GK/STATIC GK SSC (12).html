<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">1</span><span style=\"font-family: Cambria Math;\">. In which year did India make its One-Day International (ODI) debut?</span></p>\n",
    "options": [
      "1971",
      "1974",
      "1975",
      "1972"
    ],
    "correct_option_id": 1,
    "solution": "<p>1.(b) <strong>1974</strong>.<span style=\\\"font-family: Cambria Math;\\\"> India played its first men\\'s ODI against England at Leeds under the captaincy of Ajit Wadekar. First Ever ODI Match was played between - Australia and England in 1971 at the Melbourne cricket ground (MCG). </span><span style=\\\"font-family: Cambria Math;\\\"><strong>Indian Cricketers and</strong> <strong>his</strong></span><span style=\\\"font-family: Cambria Math;\\\"><strong> achievements </strong>: </span><span style=\\\"font-family: Cambria Math;\\\">Kapil Dev (The Haryana Hurricane) - Captain and won the Cricket World Cup (1983).</span><span style=\\\"font-family: Cambria Math;\\\"> </span><span style=\\\"font-family: Cambria Math;\\\">Sourav Ganguly (Dada) - Captain of Indian cricket team and Served as a BCCI president. Sachin Tendulkar (Master Blaster) - Bharat Ratna (2014), Padma Vibhusha</span><span style=\\\"font-family: Cambria Math;\\\">n (2008), Padma Shri (1999), Arjuna Award (1994), Khel Ratna (1997). </span></p>\\n",
    "question_index": 0
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Which of the following institution has been accredited as National Implementing Entity for Adaptation Fund under United Nations Framework Conv</span><span style=\"font-family: Cambria Math;\">ention on Climate Change (UNFCCC) in India?</span></p>\n",
    "options": [
      "ICAR",
      "NIRD",
      "NABARD",
      "RBI"
    ],
    "correct_option_id": 2,
    "solution": "<p>2.(c) <strong>NABARD </strong><span style=\"font-family: Cambria Math;\">(National Bank for Agriculture and Rural Development): A Statutory body. Established - July 12, 1982. Role - Development of agriculture, small-scale industries and other al</span><span style=\"font-family: Cambria Math;\">lied economic activities in rural areas. Other Institutions Establishment Year and Headquarters: Indian Council of Agricultural Research (ICAR) 1929 - New Delhi. The National Institute for Rural Development (NIRD) - Hyderabad. Reserve Bank of India (RBI)</span><span style=\"font-family: Cambria Math;\"> April 1, 1935 - Mumbai. </span></p>\n",
    "question_index": 1
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Hariprasad Chaurasia plays which of the following musical instruments?</span></p>\n",
    "options": [
      "Flute",
      "Trumpet",
      "Tabla",
      "Drum"
    ],
    "correct_option_id": 0,
    "solution": "<p>3.(a) <strong>Flute</strong>.<span style=\"font-family: Cambria Math;\"> Awards of Hariprasad Chaurasia: Padma Bhushan (1992), Padma Vibhushan (2000). Famous titles - Bansuri guru, Bansuri samrat, Breath of gold. </span><span style=\"font-family: Cambria Math;\"><strong>Instruments and Musicians</strong>: </span><span style=\"font-family: Cambria Math;\"> Trumpet- Kishore Sodha; Tabla - Zakkir hussain; Drum - Sivamani; Shehnai - Bismillah kh</span><span style=\"font-family: Cambria Math;\">an; Sarod - Amjad Ali Khan. </span></p>\n",
    "question_index": 2
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Who among the following personalities won the Sangeet Natak Akademi Award 2021 for contribution to Manipuri Dance?</span></p>\n",
    "options": [
      "Bhuvan Kumar",
      "Thokchom Ibemubi Devi",
      "Sruti Bandopadhyay",
      "Kumkum Dhar"
    ],
    "correct_option_id": 1,
    "solution": "<p>4.(b) <strong>Thokchom Ibemubi Devi.</strong> <span style=\"font-family: Cambria Math;\">The Manipuri Dance, also referred to as the Manipuri Raas Leela, is anchored in the Vaishnava faith of the Meiteis. The four Jhaveri sisters (Nayana, Ranjana, Suverna and Darshana) are classi</span><span style=\"font-family: Cambria Math;\">cal Manipuri dancers. Father of Manipuri Dance - Guru Bipin Singh. </span><span style=\"font-family: Cambria Math;\"><strong>Classical Dances</strong>: </span><span style=\"font-family: Cambria Math;\">Bharatanatyam, Kathak, Kathakali,Kuchipudi, Manipuri, Odissi, Mohiniattam, Sattariya.</span></p>\n",
    "question_index": 3
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Which of the following dance forms originating in Kerala, is a solo recital by women?</span></p>\n",
    "options": [
      "Mohiniyattam",
      "Odissi",
      "Kathakali",
      "Kuchipudi"
    ],
    "correct_option_id": 0,
    "solution": "<p>5.(a) <strong>Mohiniattam</strong>.<span style=\"font-family: Cambria Math;\"> It is one of the eight Indian classical dance form</span><span style=\"font-family: Cambria Math;\">s recognized by the Sangeet Natak Akademi. Other classical dances: Bharatanatyam (Tamil Nadu), Kathak (Uttar Pradesh), Kathakali (Kerala), Kuchipudi (Andhra Pradesh), Manipuri (Manipur), Odissi (Odisha), Sattariya (Assam).</span></p>\n",
    "question_index": 4
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Gugga Naumi f</span><span style=\"font-family: Cambria Math;\">estival is celebrated in which of the following states?</span></p>\n",
    "options": [
      "Gujarat",
      "Uttarakhand",
      "Himachal Pradesh",
      "Haryana"
    ],
    "correct_option_id": 3,
    "solution": "<p>6.(d)<strong> Haryana. Other festivals </strong>- <span style=\"font-family: Cambria Math;\">Gangore, Nirjala Akadshi, Kartik Cultural Festival, Geeta Jayanti, Basoda.<strong> </strong></span><strong><span style=\"font-family: Cambria Math;\">Festival of Other States:</span></strong><span style=\"font-family: Cambria Math;\"> Gujarat - Navratri, Rann Utsav, Uttarayan, Shamlaji Fair, Vautha Mela. Uttarakhand - Harela, Bhitauli, Phooldei, Ghughutia. Himachal Pradesh - Kullu Dussehra, Halda. Bihar - Chhath Puja, Bihula.</span></p>\n",
    "question_index": 5
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">The term \\'Dressage\\' is associate with:</span></p>\\n",
    "options": [
      "equestrian",
      "polo",
      "rugby",
      "water polo\\r\\n "
    ],
    "correct_option_id": 0,
    "solution": "<p>7.(a) <strong>Equestrian </strong>- <span style=\"font-family: Cambria Math;\">Sport related to horse riding. Indian Equestrians: Fouaad Mirza, Imtiaaz Anees, Indrajit Lamba, Darya Singh, Jitendarjit Singh Ahluwalia. </span><span style=\"font-family: Cambria Math;\"><strong>Terminology related to Sports</strong>:</span><span style=\"font-family: Cambria Math;\"> Equestrian - Amble, Bascule, Buck, Eventing, Forging, Gait and </span><span style=\"font-family: Cambria Math;\">Gallop. Polo - Neck Shot, Bump, Chukka, Bowl-in. Rugby - Drop Goal, Ankle tap, Advantage line, Ball back, Blitz defense. Water Polo - Dead Time, Double post, Dry Pass.</span></p>\n",
    "question_index": 6
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">8</span><span style=\"font-family: Cambria Math;\">. Shovana Narayan, a famous Kathak dancer, received the __________ in 1992 </span></p>\n",
    "options": [
      "Padam Bhushan",
      "Kalidad Samman",
      "Kabir Puraskar",
      "Padma shri"
    ],
    "correct_option_id": 3,
    "solution": "<p>8.(d) <strong>Padma Shri. Other awards of Shovana Narayan: </strong><span style=\"font-family: Cambria Math;\">Sangeet Natak Akademi Award (1999 - 2000), OISCA Award of Japan (1990&ndash;91), Rajiv Gandhi Award for Excellence (1992). Other Kathak dancers: Pandit Birju Maharaj, Shambhu Maharaj, Lachu Maharaj, Kumari Kamala, Sunanya Hazarilal Agarwal, Pandit Durgalal and S</span><span style=\"font-family: Cambria Math;\">itara Devi.</span></p>\n",
    "question_index": 7
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">Which of the following airports is India\\'s first to be completely powered by solar energy?</span></p>\\n",
    "options": [
      "Kempe Gowda International Airport (KIA), Bangalore",
      "Indira Gandhi International Airport (IGIA), Delhi",
      "Cochin International Airport Limited (CIAL), Kerala",
      "Chhatrapati Shivaji Maharaj International Airport (CSMIA), Mumbai"
    ],
    "correct_option_id": 2,
    "solution": "<p>9.(c)<strong> Cochin International Airport (CIAL), Kerala. Other Indian Airports :</strong> <span style=\\\"font-family: Cambria Math;\\\">Indira Gandhi International Airport (Delhi), Chhatrapati Shivaji Maharaj International Airport (Mumbai), Kempegowda International Airport (Bengaluru), Rajiv Gandhi Internationa</span><span style=\\\"font-family: Cambria Math;\\\">l Airport (Hyderabad). World\\'s busiest airport (in passenger terms) - Atlanta\\'s Hartsfield-Jackson international airport.</span></p>\\n",
    "question_index": 8
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Asghari Bai is primarily remembered for her contribution to which of the following genres of music?</span></p>\n",
    "options": [
      "Folk",
      "Carnatic",
      "Dhrupad",
      "Ghazal"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">10</span><span style=\"font-family: Cambria Math;\">.(c)<strong> Dhrupad. Awards of Asghari Bai - </strong></span><span style=\"font-family: Cambria Math;\">Padma Shri (1990)</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Sangeet Natak Ak</span><span style=\"font-family: Cambria Math;\">ademi (1986). Other Dhrupad Artists: Ramakant Gundecha, Umakant Gundecha, Zia Fariddudin Dagar, Pelva Naik, Pandit Ram Kumar Mallick, Mukund Dev Sahoo, Uday Bhawalkar. </span></p>\n",
    "question_index": 9
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">The book &lsquo;Rajatarangini\\' is about the history of which state written in 12</span><span style=\\\"font-family: Cambria Math;\\\">th</span><span style=\\\"font-family: Cambria Math;\\\"> century CE?</span></p>\\n",
    "options": [
      "Bengal",
      "Kashmir",
      "Sindh",
      "Assam"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\">.(b)<strong> Kashmir. Ancient Texts and Authors:</strong></span><span style=\"font-family: Cambria Math;\"> Rajatarangini (River </span><span style=\"font-family: Cambria Math;\">of Kings) - Kalhana, Harsha Charita - Bana Bhatta, Akbar-Nama - Abul Fazl, Prithviraj Raso - Chand Bardai, Humayun Nama - Gulbadan Begum, Meghdoot - Kalidasa, Arthashastra - Kautilya, Geet Govinda - Jaya Deva, Ratnavali - Harshavardhana. </span></p>\n",
    "question_index": 10
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Chhau is a popular folk dance of which state-pair from the following?</span></p>\n",
    "options": [
      "Assam and Bihar",
      "Odisha and Bihar",
      "Bihar and West Bengal",
      "Odisha and West bengal"
    ],
    "correct_option_id": 3,
    "solution": "<p>12.(d) <strong>Odisha and West Bengal.</strong> <span style=\"font-family: Cambria Math;\">Types of Chhau Dance</span><span style=\"font-family: Cambria Math;\">: </span><span style=\"font-family: Cambria Math;\">Purulia (West Bengal), Seraikella (Jharkhand), Mayurbhanj (Odisha). </span><strong><span style=\"font-family: Cambria Math;\">States and Dances</span></strong><span style=\"font-family: Cambria Math;\"><strong>:</strong> </span><span style=\"font-family: Cambria Math;\">Odisha - Chaiti Ghoda, Danda Nata, Medha Nacha, Odissi Dance. West Bengal - Santhali, Brita, Gambhira. Bihar - Jhijhiya, Kajri, Jat Jatin. Assam - Bihu, Bagurumba, </span><span style=\"font-family: Cambria Math;\">Gumrag. </span></p>\n",
    "question_index": 11
  },
  {
    "question": "<p>13. <span style=\"font-family: Cambria Math;\">Kajari festival is celebrated in which of the following states ?</span></p>\n",
    "options": [
      "Punjab",
      "Jharkhand",
      "Chhattisgarh",
      "Karnataka"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">13</span><span style=\"font-family: Cambria Math;\">.(c) <strong>Chhattisgarh</strong>.</span><span style=\"font-family: Cambria Math;\"> Kajari Festival - Celebrated by farmers. Time - Beginning of sowing season for wheat and barley.</span><span style=\"font-family: Cambria Math;\"> <strong>Harvest Festivals and States</strong></span><span style=\"font-family: Cambria Math;\"> - Lohri (Punjab), Bohag Bihu (Assam), Nuakhai (Odisha), Pongal (Tamil Nadu), Vishu (Kerala), Nabanna (We</span><span style=\"font-family: Cambria Math;\">st Bengal).</span></p>\n",
    "question_index": 12
  },
  {
    "question": "<p>14. <span style=\"font-family: Cambria Math;\">Who among the following personalities was awarded the Sangeet Natak Akademi Award 2020 for his/her contribution to contemporary dance?</span></p>\n",
    "options": [
      "Bhushan Lakandri",
      "Sruti Bandopadhyay",
      "Bickram Ghosh",
      "Sumitra Guha"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">14</span><span style=\"font-family: Cambria Math;\">.(a) <strong>Bhushan Lakandri</strong></span><span style=\"font-family: Cambria Math;\">. <strong>Sangeet </strong>Natak Akademi Award: First Awarded - 1952. Awarded for - Performing arts in India. Organizer - Ministry of Culture, Government of India. Headquarters - New Delhi.</span></p>\n",
    "question_index": 13
  },
  {
    "question": "<p>15. <span style=\"font-family: Cambria Math;\">The first Indian woman powerlifter who participated in the Tok</span><span style=\"font-family: Cambria Math;\">yo Paralympics 2020 was ________ .</span></p>\n",
    "options": [
      "Arifa Bilal",
      "Sakina Khatun",
      "Manpreet Kaur",
      "Kunjrani Devi"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">15</span><span style=\"font-family: Cambria Math;\">.(b) <strong>Sakina Khatun. </strong></span><span style=\"font-family: Cambria Math;\">The </span><span style=\"font-family: Cambria Math;\"><strong>Paralympic Games</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>(the Games of the Paralympiad) is an international multi-sport event for athletes with a range of disabilities. </span><span style=\"font-family: Cambria Math;\"><strong>International Olympic Committee</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>(IO</span><span style=\"font-family: Cambria Math;\">C) - The governing body of the National Olympic Committees (NOCs). Formation - 23 June 1894. Founder - Pierre de Coubertin, Demetrios Vikelas. Headquarters - Lausanne (Switzerland).</span></p>\n",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
