<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="28">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">14</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">28 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">1</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">The ______ in China is the world</span><span style=\"font-family: Cambria Math;\">&rsquo;</span><span style=\"font-family: Cambria Math;\">s longest man-made waterway.</span></p>",
    "options": [
      "Corinth Canal",
      "Kiel Canal",
      "Suzhou Canal",
      "Grand Canal"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">1</span><span style=\\\"font-family: Cambria Math;\\\">.</span><span style=\\\"font-family: Cambria Math;\\\">(d)</span><span style=\\\"font-family: Cambria Math;\\\"> The Grand Canal of China is the world\\'s longest man-made waterway. The waterway is the link of the Yellow river and Yangtze River.</span></p>",
    "question_index": 0
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">2</span><span style=\\\"font-family: Cambria Math;\\\">.</span><span style=\\\"font-family: Cambria Math;\\\"> What does \\'T\\' stand for in ATM ?</span></p>",
    "options": [
      "Teller",
      "Trunk",
      "Translation",
      "Transfer"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">2</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\">(a) </span><span style=\"font-family: Cambria Math;\">The full form of ATM is Automated Teller Machine. An ATM is an electro-mechanical machine that is used for making financial transactions from a bank account. These machines are used to withdraw money from personal bank accounts.</span></p>",
    "question_index": 1
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">3</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> The Biraja Temple, the Rajarani&nbsp; </span><span style=\"font-family: Cambria Math;\">Temple and the Samaleswari Temple are </span><span style=\"font-family: Cambria Math;\">all located in ?</span></p>",
    "options": [
      "Odisha",
      "Tamil Nadu",
      "Assam",
      "Kerala"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">3</span><span style=\"font-family: Cambria Math;\">.(a)</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Biraja Temple, Rajarani temple, Samaleswari Temple are the famous temples situated in Odisha. Biraja Temple is a historic hindu temple situated in the jajpur Odisha. </span><span style=\"font-family: Cambria Math;\">Rajarani Temple is an </span><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\">th-century Hindu temple located in Bhubaneswar, the capital city of Odisha. </span><span style=\"font-family: Cambria Math;\">Samaleswari Temple is a Hindu temple in Sambalpur, Western Odisha. </span></p>",
    "question_index": 2
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">4</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">&lsquo;</span><span style=\"font-family: Cambria Math;\">Dharmaraja (Yudhishthir) Ratha</span><span style=\"font-family: Cambria Math;\">&rsquo;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">&lsquo;</span><span style=\"font-family: Cambria Math;\">Bhima Ratha</span><span style=\"font-family: Cambria Math;\">&rsquo;</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">&lsquo;</span><span style=\"font-family: Cambria Math;\">Arjuna Ratha</span><span style=\"font-family: Cambria Math;\">&rsquo; </span><span style=\"font-family: Cambria Math;\">and </span><span style=\"font-family: Cambria Math;\">&lsquo;</span><span style=\"font-family: Cambria Math;\">Nakula Sahadeva Ratha</span><span style=\"font-family: Cambria Math;\">&rsquo; </span><span style=\"font-family: Cambria Math;\">are four of the Panch Rathas at Mahabalipuram. What is the name of the fifth Ratha?</span></p>",
    "options": [
      "Draupadi Ratha",
      "Bhishma Ratha",
      "Krishna Ratha",
      "KarnaRatha"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">4</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\">(a)</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">The names of the five Rathas are Dharmaraja Ratha, Bhima Ratha, Arjuna Ratha, Nakula Sahadeva Ratha, and Draupadi Ratha.</span></p>",
    "question_index": 3
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">5</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> Which of the following monasteries is located in Sikkim?</span></p>",
    "options": [
      "Kye",
      "Hemis",
      "Tabo",
      "Rumtek"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">5</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\">(d) </span><span style=\"font-family: Cambria Math;\">Rumtek Monastery, also called the Dharmachakra Centre, is a gompa located in the Indian state of Sikkim near the capital Gangtok. It is a focal point for the sectarian tensions within the Karma Kagyu school of Tibetan Buddhism that characterize the Karmapa controversy. </span></p>",
    "question_index": 4
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">6</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> Which tales are related with the painting and sculptures of the Ajanta caves?</span></p>",
    "options": [
      "Hitopadesha Tales",
      "Panchatantra Tales",
      "Pentamerone Tales",
      "Jataka Tales"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">6</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\">(d)</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">The paintings in the Ajanta caves predominantly narrate the Jataka tales. These are Buddhist legends describing the previous births of the Buddha. These fables embed ancient morals and cultural lores that are also found in the fables and legends of Hindu and Jain texts.&nbsp;</span></p>",
    "question_index": 5
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">7</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> The Padma Awards are announced around ______ every year.&nbsp;</span></p>",
    "options": [
      "Republic Day",
      "Hindi Diwas",
      "Sadbhavana Diwas",
      "Independence Day"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">7</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\">(a) </span><span style=\"font-family: Cambria Math;\">The Padma award is one of the highest awards in India. It is given by the president once a year.</span></p>",
    "question_index": 6
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">8</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> The SASTRA - Ramanujan Prize is awarded in the field of:&nbsp;</span></p>",
    "options": [
      "Literature",
      "Dance",
      "Mathematics",
      "Chemistry"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">8</span><span style=\"font-family: Cambria Math;\">.(c)</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">SASTRA Ramanujan Prize was established in </span><span style=\"font-family: Cambria Math;\">2005 </span><span style=\"font-family: Cambria Math;\">and is awarded annually for outstanding contributions by young mathematicians to areas influenced by Srinivasa Ramanujan.&nbsp;</span><br><span style=\"font-family: Cambria Math;\">The SASTRA Ramanujan prize for&nbsp;</span><span style=\"font-family: Cambria Math;\">2019 </span><span style=\"font-family: Cambria Math;\">was awarded to mathematician Adam Harper, Assistant Professor with the University of Warwick. </span></p>",
    "question_index": 7
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">9</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> The Pritzker prize is an international award given to recognise contribution in the field of_____.</span></p>",
    "options": [
      "literature",
      "mathematics",
      "architecture",
      "medicine"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">9</span><span style=\"font-family: Cambria Math;\">.(c)</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Pritzker Architecture Prize, international award given annually to recognize the contributions of a living architect. It has often been called the Nobel Prize of architecture.</span></p>",
    "question_index": 8
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">10</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> Name the first actor to win the Oscar Awards?</span></p>",
    "options": [
      "Warner Baxter",
      "Emil Jannings",
      "Lionel Barrymore",
      "Charlie Chaplin"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">10</span><span style=\"font-family: Cambria Math;\">.(b)</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">The first Academy Awards ceremony was held in Hollywood on May </span><span style=\"font-family: Cambria Math;\">16</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">1929</span><span style=\"font-family: Cambria Math;\">. The name Oscar was not used for another few years. Emil Jannings was the first Best Actor and Janet Gaynor Best Actress.</span></p>",
    "question_index": 9
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">In which year was the foundation stone for the Gateway of India laid in Bombay (now Mumbai) ?</span></p>",
    "options": [
      "1913",
      "1915",
      "1905",
      "1920"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\">.(a)</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">The foundation stone for the gateway was laid on </span><span style=\"font-family: Cambria Math;\">31 </span><span style=\"font-family: Cambria Math;\">March </span><span style=\"font-family: Cambria Math;\">1913 </span><span style=\"font-family: Cambria Math;\">by then governor of Bombay, Sir George Sydenham Clarke.</span><span style=\"font-family: Cambria Math;\"> It was built in greeting the arrival of King-Emperor George V and Queen Empress Mary, the first British monarch to visit India</span></p>\n<p><span style=\"font-family: Cambria Math;\">.</span></p>",
    "question_index": 10
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">12</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> In which period was the legendary Victoria Terminus Station (currently Chhtarpati Shivaji Maharaj Terminus), Mumbai built?</span></p>",
    "options": [
      "1878 to 1883",
      "1843 to 1853",
      "1933 to 1943",
      "1911 to 1921"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">12</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\">(a) </span><span style=\"font-family: Cambria Math;\">The Chhatrapati Shivaji station, formerly known as Victoria Terminus, began to be built in </span><span style=\"font-family: Cambria Math;\">1878 </span><span style=\"font-family: Cambria Math;\">and completed in </span><span style=\"font-family: Cambria Math;\">1888</span><span style=\"font-family: Cambria Math;\">. It is designed by the British architect F.W. Stevens.</span></p>",
    "question_index": 11
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">13</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">In which year was the Currency Building in the BBD Bagh or Dalhousie area of Kolkata constructed ?</span></p>",
    "options": [
      "1900",
      "1833",
      "1850",
      "1910"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">13</span><span style=\\\"font-family: Cambria Math;\\\">.(b)</span><span style=\\\"font-family: Cambria Math;\\\"> </span><span style=\\\"font-family: Cambria Math;\\\">The Currency Building in Kolkata was built in the year </span><span style=\\\"font-family: Cambria Math;\\\">1833 </span><span style=\\\"font-family: Cambria Math;\\\">which lies in the city\\'s Dalhousie region. The beautiful colonial building was designed in Italian style with Venetian windows. This building was the office of the Reserve Bank of India till the year&nbsp;</span><span style=\\\"font-family: Cambria Math;\\\">1937</span><span style=\\\"font-family: Cambria Math;\\\">.</span></p>",
    "question_index": 12
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">14</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> In which year did D.C. Sircar publishes Indian Epigraphy and Indian Epigraphical Glossary ?</span></p>",
    "options": [
      "1965-66",
      "1967-68",
      "1966-67",
      "1964-65"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">14</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\">(a)</span><span style=\"font-family: Cambria Math;\"> D.C.Sircar published Indian epigraphy and Indian epigraphical glossary in </span><span style=\"font-family: Cambria Math;\">1965-66</span><span style=\"font-family: Cambria Math;\">. This book is useful to people interested in ancient Indian history in general, and Indian inscriptions in particular.</span></p>",
    "question_index": 13
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
