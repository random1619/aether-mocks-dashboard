<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Kathak is the principal dance of which part of India?</span></p>\n",
    "options": [
      "Northern India",
      "Eastern India",
      "North-Eastern India",
      "Southern India"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">1.(</span><span style=\"font-family: Cambria Math;\">a)&nbsp;</span><strong>Northern India. Kathak </strong><span style=\"font-weight: 400;\">(Uttar pradesh) :- Classical dance of Northern India,</span><strong> Odissi (</strong><span style=\"font-weight: 400;\">Odisha</span><strong>):- </strong><span style=\"font-weight: 400;\">Classical dance of Eastern India, </span><strong>Sattriya </strong><span style=\"font-weight: 400;\">(Assam)</span><strong> </strong><span style=\"font-weight: 400;\">and </span><strong>Manipuri </strong><span style=\"font-weight: 400;\">(Manipur)</span><strong> </strong><span style=\"font-weight: 400;\">:- Classical dance of North-East India, </span><strong>Bharatanatyam </strong><span style=\"font-weight: 400;\">(Tamil Nadu), </span><strong>Kathakali </strong><span style=\"font-weight: 400;\">and </span><strong>Mohiniyattam </strong><span style=\"font-weight: 400;\">(Kerala), </span><strong>Kuchipudi </strong><span style=\"font-weight: 400;\">(Andhra Pradesh) : Classical dance of Southern India.</span><strong> Chhau</strong><span style=\"font-weight: 400;\"> dance (Eastern India).</span></p>\n",
    "question_index": 0
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Mohiniyattam belongs to ________ in India, takes its name from the celestial enchantress Mohini.</span></p>\n",
    "options": [
      "Kerala",
      "Madhya Pradesh",
      "Maharashtra",
      "Odisha"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">2.(</span><span style=\\\"font-family: Cambria Math;\\\">a) <strong>Kerala. Mohiniyattam </strong><span style=\\\"font-weight: 400;\\\">literally interpreted as the dance of \\'Mohini\\', avatar of the Hindu God Vishnu. </span><strong>Mohiniyattam Dancers -</strong><span style=\\\"font-weight: 400;\\\"> {Kalamandalam Kalyanikutty Amma (Mother of Mohiniyattam)}, Jayaprabha Menon,</span><strong> </strong><span style=\\\"font-weight: 400;\\\">Sunanda Nair. </span><strong>Folk dance of Madhya pradesh - </strong><span style=\\\"font-weight: 400;\\\">Jawara, Matki, Aada, Khada Nach, Phulpati, Grida Dance, Selalarki, Selabhadoni, Maanch. </span><strong>Folk dances of Maharashtra -</strong><span style=\\\"font-weight: 400;\\\"> Lavani, Dhangari Gaja, Lezim, Koli, Gondhal and Tamasha dance. </span><strong>Popular Dances of Odisha -</strong><span style=\\\"font-weight: 400;\\\"> Chhau, Chaiti Ghoda, Danda Nata, Medha Nacha, Changu, Karma, Odissi.</span></span></p>\\n",
    "question_index": 1
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Who</span><span style=\"font-family: Cambria Math;\"> received a Nobel Peace Prize for dismantling apartheid in South Africa?</span></p>\n",
    "options": [
      "Nelson Mandela",
      "Rabindranath Tagore",
      "Mahatma Gandhi",
      "Albert John Lutuli"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">3.(</span><span style=\"font-family: Cambria Math;\">a) <strong>Nelson Mandela </strong><span style=\"font-weight: 400;\">and </span><strong>Frederik Willem de Klerk</strong><span style=\"font-weight: 400;\"> received the Nobel Peace Prize in 1993. </span><strong>Mahatma Gandhi</strong><span style=\"font-weight: 400;\"> (Symbol of non violence): Nominated for Nobel Peace Prize in </span><strong>1937</strong><span style=\"font-weight: 400;\">, </span>1938<span style=\"font-weight: 400;\">, </span>1939<span style=\"font-weight: 400;\">, </span>1947<span style=\"font-weight: 400;\"> and </span>1948<strong> </strong><span style=\"font-weight: 400;\">but never awarded the prize. </span><strong>Rabindranath Tagore</strong><span style=\"font-weight: 400;\">: First Indian and Asian to win a Nobel Prize awarded in 1913 for literature </span>(Gitanjali)<strong>. </strong><strong>Albert John Lutuli</strong><span style=\"font-weight: 400;\">: Awarded the </span><strong>1960</strong><span style=\"font-weight: 400;\"> </span><strong>Nobel Peace Prize</strong><span style=\"font-weight: 400;\"> for his role in leading the </span>non-violent anti-apartheid movement<span style=\"font-weight: 400;\">.</span></span></p>\n",
    "question_index": 2
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Shri Mani Prasad is associated with which form of music?</span></p>\n",
    "options": [
      "Fusion Music",
      "Folk Music",
      "Carnatic vocal music",
      "Hindustani vocal music"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">4.(</span><span style=\"font-family: Cambria Math;\">d) <strong>Hindustani vocal music.</strong> </span><span style=\"font-family: Cambria Math;\">Pandit Mani Prasad (1929 - 2023) was an Indian classical vocalist from the </span><strong><span style=\"font-family: Cambria Math;\">Kirana gharana</span></strong><span style=\"font-family: Cambria Math;\"> (singing style). He was</span><span style=\"font-family: Cambria Math;\"> awarded Sangeet Natak Akademi Award in </span><span style=\"font-family: Cambria Math;\">2019 .</span><span style=\"font-family: Cambria Math;\"> </span><strong><span style=\"font-family: Cambria Math;\">Hindustani music</span></strong><span style=\"font-family: Cambria Math;\"> is the classical music of the Northern parts of the Indian subcontinent. </span><strong><span style=\"font-family: Cambria Math;\">Carnatic Music</span></strong><span style=\"font-family: Cambria Math;\"> originated from Southern India, the city of Hyderabad and other Dravidian-speaking regions of India.</span></p>\n",
    "question_index": 3
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Who among the following was the architect of the Integrated Guided Missile Development Program (IGMDP) in India?</span></p>\n",
    "options": [
      "Har Gobind Khorana",
      "Vikram Sarabhai",
      "A. P. J. Abdul Kalam",
      "Homi J. Bhabha"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">5.(</span><span style=\"font-family: Cambria Math;\">c) <strong>A. P. J. Abdul Kalam</strong>.</span><span style=\"font-family: Cambria Math;\"> IGMDP was an Indian Ministry of Defence programme to research and develop a comprehensive range of missiles. The project started in </span><strong><span style=\"font-family: Cambria Math;\">1982 - </span><span style=\"font-family: Cambria Math;\">1983</span></strong><span style=\"font-family: Cambria Math;\"> (</span><span style=\"font-family: Cambria Math;\">complete in </span><span style=\"font-family: Cambria Math;\">2008</span><span style=\"font-family: Cambria Math;\">) under the leadership of Dr APJ Abdul Kalam (</span><strong><span style=\"font-family: Cambria Math;\">missile man of India</span></strong><span style=\"font-family: Cambria Math;\">). Prithvi, Agni, Trishul, Akash, Nag missiles have been developed under this.</span></p>\n",
    "question_index": 4
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Aga Khan Palace is located in_______city of Maharashtra.</span></p>\n",
    "options": [
      "Pune",
      "Aurangabad",
      "Ahmednagar",
      "Mumbai"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">6.</span><span style=\"font-family: Cambria Math;\">(</span><span style=\"font-family: Cambria Math;\">a) <strong>Pune. </strong><span style=\"font-weight: 400;\">This Palace was built in </span><strong>1892</strong><span style=\"font-weight: 400;\"> by </span><strong>Sultan Muhammed Shah Aga Khan III</strong><span style=\"font-weight: 400;\"> in the district of Pune (Maharashtra). Famous Historical Places in India -&nbsp; Qutub Minar ( Delhi), Sanchi Stupa ( Madhya Pradesh), Rani ki Vav (Gujarat), Victoria Memorial( Kolkata), Mehrangarh Fort (Jodhpur), Chola Temples (Tamil Nadu).</span></span></p>\n",
    "question_index": 5
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">7</span><span style=\"font-family: Cambria Math;\">. _________ is an ancient martial art that originated in peninsular India as a part of military training for warriors.</span></p>\n",
    "options": [
      "Gatka",
      "Muay Thai",
      "Kalaripayattu",
      "Karate"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">7.(</span><span style=\\\"font-family: Cambria Math;\\\">c) <strong>Kalaripayattu </strong></span><span style=\\\"font-family: Cambria Math;\\\">is a martial art based on the ancient knowledge of the human body. It originated in Kerala during 3nd century BC to the 2nd century AD. It is now practiced in Kerala and in some parts of Tamil Nadu. The place where this martial art is practiced is called a</span><span style=\\\"font-family: Cambria Math;\\\"> </span><span style=\\\"font-family: Cambria Math;\\\">\\'<strong>Kalari</strong>\\' </span><span style=\\\"font-family: Cambria Math;\\\">(threshing floor or battlefield). It is also considered as the father of modern Kung - Fu.</span></p>\\n",
    "question_index": 6
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Davis Cup is related w</span><span style=\"font-family: Cambria Math;\">ith which of the following sports?</span></p>\n",
    "options": [
      "Table Tennis",
      "Cricket",
      "Basketball",
      "Tennis"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">8.(</span><span style=\"font-family: Cambria Math;\">d) <strong>Tennis (Men)</strong></span><strong><span style=\"font-family: Cambria Math;\">. </span></strong><span style=\"font-family: Cambria Math;\"><strong>Davis Cup </strong>-</span><span style=\"font-family: Cambria Math;\"> It is run by the International Tennis Federation (ITF) and is contested annually between teams from over 140 competing countries. It is described by the organizers as the \"World Cup of Tennis\", and the winners are refer</span><span style=\"font-family: Cambria Math;\">red to as the World Champions. </span><span style=\"font-family: Cambria Math;\">Davis Cup 2022 winner -<strong> </strong></span><strong><span style=\"font-family: Cambria Math;\">Canada</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Other Cups</span></strong><span style=\"font-family: Cambria Math;\"> related to Tennis: Wimbledon Trophy, Wightman Cup (Women), Thant Cup, Ramanujan Trophy, Rajendra Prasad Cup, Barna Bellack Cup, Jaylaxmi Cup (Women&rsquo;s), Rajkumari Cup (Junior girls), </span><span style=\"font-family: Cambria Math;\">Travancore Cup (Women&rsquo;s). </span></p>\n",
    "question_index": 7
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Who wrote the famous novel \"Durgeshnandini\"?</span></p>\n",
    "options": [
      "Rabindranath Tagore",
      "Ishwar Chandra Vidyasagar",
      "Bankim Chandra Chatterjee",
      "Sarat Chandra Chattopadhyay\\r\\n "
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">9.(</span><span style=\\\"font-family: Cambria Math;\\\">c) <strong>Bankim Chandra Chatterjee\\'s</strong><span style=\\\"font-weight: 400;\\\"> first Bengali novel Durgeshnandini revolutionized Bengali prose writing. </span><strong>His</strong><span style=\\\"font-weight: 400;\\\"> </span><strong>other books</strong><span style=\\\"font-weight: 400;\\\">: &ldquo;Anandamath&rdquo; (National Song </span><strong>&lsquo;Vande Matram&rsquo;</strong><span style=\\\"font-weight: 400;\\\"> is a part of it), &ldquo;Kapalkundala&rdquo;, &ldquo;Mrinalini&rdquo;, &ldquo;Vishabriksha&rdquo; (The Poison Tree), &ldquo;Indira&rdquo;, &ldquo;Chandrasekhar&rdquo;, &ldquo;Devi Chaudhurani&rdquo;. </span><strong>Rabindranath Tagore</strong><span style=\\\"font-weight: 400;\\\"> (wrote the National Anthem) - &ldquo;Gitanjali&rdquo;, &ldquo;The Postmaster&rdquo;, &ldquo;Gora&rdquo;, &ldquo;Kabuliwala&rdquo;.&nbsp; </span><strong>Ishwar Chandra Vidyasagar</strong><span style=\\\"font-weight: 400;\\\"> - &ldquo;Betaal Panchavinsati&rdquo;, &ldquo;Banglar Itihas&rdquo;, &ldquo;Jivan Charitra&rdquo;. </span><strong>Sarat Chandra Chattopadhyay - &ldquo;</strong><span style=\\\"font-weight: 400;\\\">Parineeta&rdquo;, &ldquo;Choritrohin&rdquo;, &ldquo;Devdas&rdquo;, &ldquo;Pather Dabi\\\", &ldquo;Srikanta&rdquo;, &ldquo;Datta&rdquo;</span></span></p>\\n",
    "question_index": 8
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">10</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Neelima performs Kalbeliya dance form. Which state does this dance form belong to?</span></p>\n",
    "options": [
      "Punjab",
      "Rajasthan",
      "Uttarakhand",
      "Odisha"
    ],
    "correct_option_id": 1,
    "solution": "<p>10<span style=\\\"font-family: Cambria Math;\\\">.(b) <strong>Rajasthan</strong>. </span><span style=\\\"font-family: Cambria Math;\\\">Kalbelia is a folk dance mainly performed by the Kalbelia Community in </span><strong><span style=\\\"font-family: Cambria Math;\\\">Rajasthan</span></strong><span style=\\\"font-family: Cambria Math;\\\">. It is also known by other names \\'Sapera Dance\\' or \\'Snake Charmer Dance\\'. It was included in UNESCO\\'s representative list of the Intangible Cultural Heritage of Humanity from the year 2010. </span><strong><span style=\\\"font-family: Cambria Math;\\\">Punjab</span></strong><span style=\\\"font-family: Cambria Math;\\\"><strong> </strong>- Bhangra (Men), Gidda (Females).</span><span style=\\\"font-family: Cambria Math;\\\"> </span><strong><span style=\\\"font-family: Cambria Math;\\\">Uttarakhand</span></strong><span style=\\\"font-family: Cambria Math;\\\"><strong> </strong>- Choliya, J</span><span style=\\\"font-family: Cambria Math;\\\">hora, Mukhota, Bhota.</span><span style=\\\"font-family: Cambria Math;\\\"> </span><span style=\\\"font-family: Cambria Math;\\\">Odisha</span><span style=\\\"font-family: Cambria Math;\\\"> - Chhau, <strong>Odissi</strong>, Medha Nacha, Chaiti Ghoda.</span></p>\\n",
    "question_index": 9
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Which of the fol</span><span style=\"font-family: Cambria Math;\">lowing music instruments are solid instruments?</span></p>\n",
    "options": [
      "Tata Vadya",
      "Ghana Vadya",
      "Avanaddha Vadya",
      "Sushira Vadya"
    ],
    "correct_option_id": 1,
    "solution": "<p>11<span style=\"font-family: Cambria Math;\">.(b) <strong>&nbsp;Ghana Vadya. Solid instruments</strong><span style=\"font-weight: 400;\"> are usually played with a striker or hammer. These instruments are not capable of producing definite pitches that are required for creating a melody. That is why their use is limited in classical music. </span><strong>Tata Vadya</strong><span style=\"font-weight: 400;\"> - These are Stringed instruments. </span><strong>Avanaddha Vadya - </strong><span style=\"font-weight: 400;\">These are percussion instruments. </span><strong>Sushira Vadya - </strong><span style=\"font-weight: 400;\">These are wind instruments. The Shehnai is a popular wind instrument in India.</span></span></p>\n",
    "question_index": 10
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">12</span><span style=\\\"font-family: Cambria Math;\\\">.</span><span style=\\\"font-family: Cambria Math;\\\"> Which among the following has written the book \\'The Pregnancy Bible\\'?</span></p>\\n",
    "options": [
      "Vidhya Balan",
      "Shilpa Shetty",
      "Rani Mukherjee",
      "Kareena Kapoor"
    ],
    "correct_option_id": 3,
    "solution": "<p>12<span style=\"font-family: Cambria Math;\">.(d) <strong>Kareena Kapoor</strong></span><span style=\"font-family: Cambria Math;\"><strong>. </strong>Shilpa Shetty - The Great Indian Diet, and Diary </span><span style=\"font-family: Cambria Math;\">Of</span><span style=\"font-family: Cambria Math;\"> A Domestic Diva. </span><span style=\"font-family: Cambria Math;\">Priyanka Chopr</span><span style=\"font-family: Cambria Math;\">a - Unfinished.</span><span style=\"font-family: Cambria Math;\"> Michael Jackson &ndash; MoonWalk. Shashi Kapoor &ndash; the Householder.</span></p>\n",
    "question_index": 11
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Which</span><span style=\"font-family: Cambria Math;\"> of the following pairs of \"tournament -format\" is correct? </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">I. Syed Mushtaq Ali Trophy - T20 </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">II. Vijay Hazare Trophy - 50 overs</span></p>\n",
    "options": [
      "Only I",
      "Neither I nor II",
      "Only II",
      "Both I and II"
    ],
    "correct_option_id": 3,
    "solution": "<p>13<span style=\"font-family: Cambria Math;\">.(d) <strong>Both I and II</strong></span><span style=\"font-family: Cambria Math;\">. Syed Mushtaq Ali Trophy - T20 (20 overs), Vijay Hazare Trophy - One day (50 overs), </span><span style=\"font-family: Cambria Math;\"><strong>Vijay Hazare Trophy</strong> </span><span style=\"font-family: Cambria Math;\">(Ranji One Day Trophy): It was started in 2002-03 as a limited-overs cricket domestic competition involving state teams from the Ranji Trophy plates. </span><span style=\"font-family: Cambria Math;\">It is named after the famous Indian cricketer Vijay Hazare. </span></p>\n",
    "question_index": 12
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">14</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">In India, National Statistics Day is celebrated on</span></p>\n",
    "options": [
      "22nd June",
      "15th June",
      "28th June",
      "29th June"
