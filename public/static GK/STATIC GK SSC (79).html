<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1.<span style=\\\"font-family: Cambria Math;\\\"> Which famous Indian Kathak dancer received the Padma Vibhushan, India\\'s second highest civilian award, in 1986?</span></p>\\n",
    "options": [
      "Manjari Chaturvedi",
      "Madhavi Mudgal",
      "Mallika Sarabhai",
      "Birju Maharaj"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">1.(</span><span style=\"font-family: Cambria Math;\">d) <strong>Birju Maharaj. </strong><span style=\"font-weight: 400;\">He belongs to the Kalka-Bindadin Gharana of Lucknow. </span><strong>Awards -</strong><span style=\"font-weight: 400;\"> Sangeet Natak Akademi Award (1964), Padma Vibhushan (1986), Kalidas Samman (1987). </span><strong>Films Choreography by him :-</strong><span style=\"font-weight: 400;\"> 2012 - National Film Award for Best Choreography for Unnai Kaanaathu (Vishwaroopam), 2016 - Filmfare Award for Best Choreography for Mohe Rang Do Laal (Bajirao Mastani).</span></span></p>\n",
    "question_index": 0
  },
  {
    "question": "<p>2. <span style=\"font-family: Cambria Math;\">One of the major hubs of information technol</span><span style=\"font-family: Cambria Math;\">ogy is the Silicon valley which is situated in __________</span><span style=\"font-family: Cambria Math;\">_ .</span></p>\n",
    "options": [
      "Tokyo",
      "London",
      "New york",
      "California"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">2.(</span><span style=\"font-family: Cambria Math;\">d) <strong>California. </strong><span style=\"font-weight: 400;\">Silicon Valley is the biggest hub of the IT industry in the world (Presence of Biggest Technology companies Headquarters - Apple, Google, Meta, Intel, Cisco, Adobe, Linkedin, PayPal). </span><strong>Tokyo</strong><span style=\"font-weight: 400;\"> is the capital city of Japan and famous for heavy Industries. </span><strong>London</strong><span style=\"font-weight: 400;\"> is the capital city of Britain and famous for finance related services. </span><strong>New York</strong><span style=\"font-weight: 400;\"> is an American city famous for its mass media industries. Silicon valley of India - </span><strong>Bengaluru</strong><span style=\"font-weight: 400;\">.</span></span></p>\n",
    "question_index": 1
  },
  {
    "question": "<p>3.<span style=\"font-family: Cambria Math;\"> Lovlina Borgohain is associated with which sports?</span></p>\n",
    "options": [
      "Chess",
      "Table Tennis",
      "Boxing",
      "Swimming"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">3.(</span><span style=\\\"font-family: Cambria Math;\\\">c) <strong>Boxing. </strong><span style=\\\"font-weight: 400;\\\">Lovlina Borgohain is an Indian boxer who plays in the 69Kg category. She is 23 years old and hails from the Golaghat district of Assam.&nbsp; She won a bronze medal in the women\\'s welterweight category at Tokyo Olympics 2020. Other&nbsp; Famous Athletes - Boxing - Nikhat Zahreen, MC Marry Kom, Sweety Boora. Chess - Vishwanath Aanand, Koneru Humpy. Table Tennis - Manika Batra, Neha Agarwal, Ankita Das.&nbsp; Swimming - Arati Saha, Bhakti Sharma, Shikha Tandon.</span></span></p>\\n",
    "question_index": 2
  },
  {
    "question": "<p>4. <span style=\"font-family: Cambria Math;\">Which of the following dances is a popular folk dance of Maharashtra?</span></p>\n",
    "options": [
      "Lavani",
      "Bihu",
      "Jhumar",
      "Giddha"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">4.(</span><span style=\"font-family: Cambria Math;\">a) <strong>Lavani.</strong><span style=\"font-weight: 400;\"> It is a combination of traditional song and dance, which is particularly performed to the beats of </span><strong>Dholki</strong><span style=\"font-weight: 400;\">, a percussion instrument.</span><strong> </strong><span style=\"font-weight: 400;\">Other Folk dances of</span><strong> Maharashtra - </strong><span style=\"font-weight: 400;\">Dhangari Gaja, Koli Dance, Povadas Dance, Tamasha.</span><strong> </strong><span style=\"font-weight: 400;\">Other Dances and their respective states -: </span><strong>Assam - </strong><span style=\"font-weight: 400;\">Bihu, Bichhua, Kaligopal, Bagurumba, Naga dance. </span><strong>Jharkhand - </strong><span style=\"font-weight: 400;\">Alkap, Karma Munda, Agni, Jhumar, Janani Jhumar. </span><strong>Punjab - </strong><span style=\"font-weight: 400;\">Bhangra, Giddha.</span></span></p>\n",
    "question_index": 3
  },
  {
    "question": "<p>5.<span style=\\\"font-family: Cambria Math;\\\"> \\'In The Afternoon of Time\\' is an autobiographical book by __________.</span></p>\\n",
    "options": [
      "Satyajit Ray",
      "Sam Pitroda",
      "Harivansh Rai Bachchan",
      "P.T. Usha"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">5</span><span style=\\\"font-family: Cambria Math;\\\">.(</span><span style=\\\"font-family: Cambria Math;\\\">c) <strong>Harivansh Rai Bachchan. </strong><span style=\\\"font-weight: 400;\\\">He is best known for his early work </span><strong>Madhushala</strong><span style=\\\"font-weight: 400;\\\">. In 1976, he received the Padma Bhushan for his service to Hindi literature. Other writings by Harivansh Rai Bachchan - Nisha Nimantran, Need Ka Nirman Phir, Milan Yamini. </span><strong>Other Famous Personalities</strong><span style=\\\"font-weight: 400;\\\"> : </span><strong>Satyajit Ray </strong><span style=\\\"font-weight: 400;\\\">- He is a director famous for his film &lsquo;Pather Panchali&rsquo;. </span><strong>Sam Pitroda</strong><span style=\\\"font-weight: 400;\\\"> is a telecom inventor, entrepreneur. </span><strong>PT Usha</strong><span style=\\\"font-weight: 400;\\\"> - one of India\\'s greatest athletes, often called the country\\'s \\\"queen of track and field\\\".</span></span></p>\\n",
    "question_index": 4
  },
  {
    "question": "<p>6. <span style=\"font-family: Cambria Math;\">Saswati Sen is the proud recipient of the Sangeet Natak Akademi Award for 2004-2005. She is recognized for which dance form?</span></p>\n",
    "options": [
      "Kathak",
      "Kuchipudi",
      "Manipuri",
      "Mohiniyattam"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">6.(</span><span style=\"font-family: Cambria Math;\">a) <strong>Kathak. Saswati Sen</strong><span style=\"font-weight: 400;\"> was a senior disciple of Pandit Birju Maharaj. </span><strong>Other famous dancers</strong><span style=\"font-weight: 400;\"> - </span><strong>Kathak</strong><span style=\"font-weight: 400;\"> - Sonal Mansingh, Shovna Narayan. </span><strong>Kuchipudi</strong><span style=\"font-weight: 400;\"> - Raja and Radha Reddy, their daughters Yamini Reddy and Bhavana Reddy. </span><strong>Manipuri</strong><span style=\"font-weight: 400;\"> - Yumlembam Gambhini Devi, Guru Bipin Sinha, Darshana Jhaveri, Nirmala Mehta. </span><strong>Mohiniyattam</strong><span style=\"font-weight: 400;\"> - Sunanda Nair, Kalamandalam Kalyanikutty Amma, Jayaprabha Menon, Pallavi Krishnan, Gopika Varma.</span></span></p>\n",
    "question_index": 5
  },
  {
    "question": "<p>7.<span style=\"font-family: Cambria Math;\"> Late Jagjit Singh was a popular composer and a ______ singer.</span></p>\n",
    "options": [
      "Opera",
      "Ghazal",
      "Rock",
      "Pop"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">7.(</span><span style=\\\"font-family: Cambria Math;\\\">b) <strong>Ghazal. </strong><span style=\\\"font-weight: 400;\\\">Jagjit Singh was an Indian composer, singer, and musician.&nbsp; He composed and sang in numerous languages and is credited for the revival and popularity of ghazal. Jagjit Singh was born as Jagmohan Singh in Rajasthan\\'s Sri Ganganagar. </span><strong>Opera</strong><span style=\\\"font-weight: 400;\\\"> is a dramatic story told through song. </span><strong>Rock</strong><span style=\\\"font-weight: 400;\\\"> - A form of music with a strong beat. </span><strong>Pop</strong><span style=\\\"font-weight: 400;\\\"> - It is a genre that encompasses popular songs with catchy hooks and widespread commercial success.</span></span></p>\\n",
    "question_index": 6
  },
  {
    "question": "<p>8. <span style=\"font-family: Cambria Math;\">Magha Saaji is celebrated as Makar Sankranti in which of the following states?</span></p>\n",
    "options": [
      "Madhya Pradesh",
      "Gujarat",
      "Himachal Pradesh",
      "Goa"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">8.(</span><span style=\\\"font-family: Cambria Math;\\\">c) <strong>Himachal Pradesh. </strong><span style=\\\"font-weight: 400;\\\">Sankranti is known locally as Saaji, and the month is called Magha. People visit the temples on this day to seek the Lord\\'s blessings and take a plunge into the area\\'s sacred rivers. </span><strong>Other Festivals of Himachal Pradesh</strong><span style=\\\"font-weight: 400;\\\"> - Kullu Dussehra, Losar, Halda, Sazo Festival, Doongri Fair, Mandi Shivratri Fair, and Kasol Music Festival.</span></span></p>\\n",
    "question_index": 7
  },
  {
    "question": "<p>9. <span style=\"font-family: Cambria Math;\">How many tax slabs are classified in the GST Bill?</span></p>\n",
    "options": [
      "Seven",
      "Three",
      "Eight",
      "Four"
    ],
    "correct_option_id": 3,
    "solution": "<p>9. (<span style=\"font-family: Cambria Math;\">d</span><span style=\"font-family: Cambria Math;\">) <strong>Four. GST rates in 2023:</strong><span style=\"font-weight: 400;\"> Slabs for any regular taxpayers are presently pegged at 0% (nil-rate), </span><strong>5%, 12%, 18% &amp; 28%. </strong><span style=\"font-weight: 400;\">GST laws were implemented on 1st July, 2017 (replaced Central and State taxes). GST has been implemented under Article </span><strong>279A</strong><span style=\"font-weight: 400;\"> of the Indian constitution. GST has been implemented by </span><strong>101st</strong><span style=\"font-weight: 400;\"> Constitutional Amendment Act, 2016.</span></span></p>\n",
    "question_index": 8
  },
  {
    "question": "<p>10<span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> Who among the following was the first musician ever to be awarded the Bharat Ratna?</span></p>\n",
    "options": [
      "Semmangudi Srinivasa Iyer",
      "Girija Devi",
      "Siddheswari Devi",
      "M.S. Subbulakshmi"
    ],
    "correct_option_id": 3,
    "solution": "<p>10<span style=\"font-family: Cambria Math;\">.(d) <strong>M.S. Subbulakshmi</strong><span style=\"font-weight: 400;\">. She is famous for carnatic music and was the first Indian classical musician to perform at the United Nations General Assembly in 1966</span><strong>. Awards:</strong><span style=\"font-weight: 400;\"> Bharat Ratna (1998), Ramon Magsaysay Award (1974), Sangeet Natak Akademi Award (1956). </span><strong>Semmangudi Srinivasa Iyer:</strong><span style=\"font-weight: 400;\"> A Carnatic vocalist and was the youngest recipient of the Sangeetha Kalanidhi award (1947). </span><strong>Girija Devi:</strong><span style=\"font-weight: 400;\"> a classical singer awarded Padma Vibhushan (2016), Padma Bhushan (1989), Padma Shri (1972) etc. </span><strong>Siddheswari Devi</strong><span style=\"font-weight: 400;\"> (hindustani singer) honoured by Padma Shri by the Government of India (1966).</span></span></p>\n",
    "question_index": 9
  },
  {
    "question": "<p>11<span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Who wrote the treatise on politics, \"Arthashastra\"?</span></p>\n",
    "options": [
      "Kautilya",
      "Kalidas",
      "Raghuvansham",
      "Kadambari"
    ],
    "correct_option_id": 0,
    "solution": "<p>11<span style=\"font-family: Cambria Math;\">.(a) <strong>Kautilya </strong><span style=\"font-weight: 400;\">(Chanakya or Vishnugupta) was an advisor and prime minister under the reign of Chandragupta Maurya (founder of the Mauryan Empire). </span><strong>Books:</strong><span style=\"font-weight: 400;\"> &ldquo;Chanakya-Niti Shastra&rdquo;.</span><strong> Famous books by : Kalidas- </strong><span style=\"font-weight: 400;\">&ldquo;Meghaduta&rdquo;, &ldquo;Raghuvamsa&rdquo;, &ldquo;Kumarasambhava&rdquo;, &ldquo;The loom of time&rdquo;, &ldquo;Uttara Kalamrita&rdquo;, &ldquo;The Seasons&rdquo;, &ldquo;Malavikagnimitra&rdquo;, &ldquo;The dynasty of Raghu&rdquo;, &ldquo;The birth of the War-God&rdquo;.</span><strong> Banabhatta</strong><span style=\"font-weight: 400;\"> - &ldquo;Kadambari&rdquo;, &ldquo; Harshacharita&rdquo;.</span></span></p>\n",
    "question_index": 10
  },
  {
    "question": "<p>12<span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Pandit Birju Maharaj was conferred with which of the following awards? </span></p>\n",
    "options": [
      "Shaurya Chakra",
      "Padma Vibhushan",
      "Padma Bhushan",
      "Padma Shri"
    ],
    "correct_option_id": 1,
    "solution": "<p>12<span style=\\\"font-family: Cambria Math;\\\">.(b) <strong>Padma Vibhushan (1986).</strong><span style=\\\"font-weight: 400;\\\"> </span><strong>Birju Maharaj</strong><span style=\\\"font-weight: 400;\\\"> -&nbsp; An Indian dancer, composer, singer, and exponent of the Lucknow &ldquo;Kalka-Bindadin\\'\\' Gharana of </span><strong>Kathak dance</strong><span style=\\\"font-weight: 400;\\\"> in India. </span><strong>Awards - </strong><span style=\\\"font-weight: 400;\\\">Sangeet Natak Akademi Award (1964), Nritya Choodamani Award (1986), Kalidas Samman (1987), Lata Mangeshkar Puraskar (2002). National Film Award for Best Choreography for Unnai Kaanaathu (Vishwaroopam) (2012).</span></span></p>\\n",
    "question_index": 11
  },
  {
    "question": "<p>13<span style=\\\"font-family: Cambria Math;\\\">.</span><span style=\\\"font-family: Cambria Math;\\\"> In MUDRA Yojana, what does \\'M\\' stand for?</span></p>\\n",
    "options": [
      "Macro",
      "Money",
      "Micro",
      "Multi"
    ],
    "correct_option_id": 2,
    "solution": "<p>13<span style=\"font-family: Cambria Math;\">.(c) <strong>Micro. MUDRA </strong><span style=\"font-weight: 400;\">(Micro Units Development and&nbsp; Refinance Agency) - Pradhan Mantri MUDRA Yojana (PMMY) is a scheme launched by the Hon&rsquo;ble Prime Minister on </span><strong>April 8, 2015</strong><span style=\"font-weight: 400;\"> for providing loans up to 10 lakh to the non-corporate, non-farm small or micro enterprises. </span><strong>Three types of mudra loan products </strong><span style=\"font-weight: 400;\">- Tarun (above Rs 5 lakh and up to Rs10 lakh), Kishor (above Rs 50,000 and up to Rs 5 lakh) , and Shishu (covering loans up to Rs 50,000).</span></span></p>\n",
    "question_index": 12
  },
  {
    "question": "<p>14<span style=\\\"font-family: Cambria Math;\\\">. </span><span style=\\\"font-family: Cambria Math;\\\">Jhijhiya is a famous folk dance of Bihar and is performed in th</span><span style=\\\"font-family: Cambria Math;\\\">e mythological town of Mithila. This dance is performed by women only. The whole Navaratri \\\"nine nights\\' festival is celebrated to worship the three forms of Lord___________</span><span style=\\\"font-family: Cambria Math;\\\">_ .</span></p>\\n",
    "options": [
      "Kali, Lakshmi, Durga",
      "Sita, Durga, Laxmi",
      "Lakshmi, Parvati, Saraswati.",
      "Sita, Kali, Parvati"
    ],
    "correct_option_id": 2,
    "solution": "<p>14<span style=\"font-family: Cambria Math;\">.(c) <strong>Lakshmi, Parvati, Saraswati</strong><span style=\"font-weight: 400;\">. Jhijhiya is a cultural folk dance of Mithila and Bhojpur regions of Bihar and Madhesh province of Nepal. It is performed in the Hindu month of</span><strong> Ashwin </strong><span style=\"font-weight: 400;\">(September/October). It has its own types of songs either in Maithili or Bhojpuri language.</span><strong> </strong><span style=\"font-weight: 400;\">Famous folk dances of</span><strong> Bihar :</strong><span style=\"font-weight: 400;\"> Jat -Jatin,&nbsp; Bidesiya, Domkach, Fagua.</span></span></p>\n",
    "question_index": 13

  {
    "question": "<p>15<span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> The Central Government has recently launched the YUVA 2.0 Scheme. It is a mentoring programme for young and budding authors below </span><span style=\"font-family: Cambria Math;\">the age of__________</span><span style=\"font-family: Cambria Math;\">_ .</span></p>\n",
    "options": [
      "45",
      "40",
      "35",
      "30"

    "correct_option_id": 3,
    "solution": "<p>15<span style=\"font-family: Cambria Math;\">.(d) <strong>30. YUVA 2.0 </strong><span style=\"font-weight: 400;\">(Young, Upcoming and Versatile Authors) - It is the Part of India 75 Project (Azadi Ka Amrit Mahotsav) to promote reading, writing and book culture in the country. It was announced on </span><strong>2nd October 2022 </strong><span style=\"font-weight: 400;\">under The Ministry of Education, Department of Higher Education. </span><strong>Theme </strong><span style=\"font-weight: 400;\">- Democracy (Institutions, Events, People, and Constitutional Values-past, present, future)</span></span></p>\n",
    "question_index": 14
  }
];
    </script>
