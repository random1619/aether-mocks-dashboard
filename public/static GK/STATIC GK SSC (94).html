<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. What is the colour of the sending off card in football?</p>",
    "options": [
      "Yellow",
      "Black",
      "Red",
      "Blue"
    ],
    "correct_option_id": 2,
    "solution": "<p>1.(c) <strong>Red.</strong> Yellow colour Card - A card used to warn a player in Football. In football, there are 11 players on each side. A standard football match is 90 minutes made up of two 45-minute halves. FIFA recommendations for field dimensions in professional football are 105 metres in length and 68 metres in width.</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. Fighting in the upright position in judo is called _____.</p>",
    "options": [
      "ne-waza",
      "tachi-waza",
      "koshi-waza",
      "ashi-waza"
    ],
    "correct_option_id": 1,
    "solution": "<p>2.(b) <strong>tachi-waza.</strong> Judo has its origin in the ancient Japanese art of Ju-jitsu. Kano Jigoro invented Judo in 1882. It was used in war and practiced in full body armor. Other Terminology: Kumi Kata - a gripping pattern. Shintai - forwards, sideways and backward movement of the body during Judo. Ukemi - Breakfall techniques.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. Muharram is the _____ month of the Islamic Calendar and is considered a holy month.</p>",
    "options": [
      "fourth",
      "second",
      "first",
      "third"
    ],
    "correct_option_id": 2,
    "solution": "<p>3.(c) <strong>first.</strong> Muharram : It is a sacred festival that commemorates the martyrdom of Hazrat Imam Hussein. During this occasion, a relic called Alam is taken out as a procession. This festival is known as Peerla Panduga in Telangana. Other festivals of Muslims : Id-ul-Zuha, Shab-e-Barat, Milad-un-Nabi, Ramadan, Eid al-Adha.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. Which of the following is the maximum file size that can be attached to an email message in Gmail?</p>",
    "options": [
      "100 MB",
      "200 MB",
      "25 MB",
      "50 MB"
    ],
    "correct_option_id": 2,
    "solution": "<p>4.(c) <strong>25 MB.</strong> Email (electronic mail) is the exchange of computer-stored messages from one user to one or more recipients via the internet. An email message consists of two main components: header and body. Each email message comes with a header that\\'s structured into various fields. These fields contain important information regarding the sender and the recipient(s).</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. To enhance the interoperability between the Indian and Russian Armies, a joint training exercise called ____ commenced at Prudboy Ranges, Volgograd in the year 2021.</p>",
    "options": [
      "INDRA 2021",
      "SURYA KIRAN 2021",
      "VARUNA 2021",
      "SHAKTI 2021"
    ],
    "correct_option_id": 0,
    "solution": "<p>5.(a) <strong>INDRA 2021. </strong>12th Edition of Indo-Russia Joint Military Exercise INDRA 2021 : Objective - Conduct counter-terror operations under UN mandate. Participation - 250 personnel from India and Russia. Indian Army Contingent - Mechanised Infantry Battalion. The 13th edition of the Indra naval exercise was hosted by India in the Bay of Bengal in November 2023.</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. The famous folk music &lsquo;Hekialeu&rsquo; has its origin in which state?</p>",
    "options": [
      "Assam",
      "Goa",
      "Nagaland",
      "Tami Nadu"
    ],
    "correct_option_id": 2,
    "solution": "<p>6.(c) <strong>Nagaland.</strong> The Hekialeu song is known as the war song of Nagaland. This is because the aged people of Nagaland narrate their achievements in past battles through this form of music. Folk music in India : Baul (West Bengal), Mando (Goa), Sohar (Uttar Pradesh and Bihar), Chhakri (Jammu and Kashmir), and Powada (Maharashtra).</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. Gugga is the famous ritualistic dance of _____, which is performed in the procession taken out in memory of Gugga Pir.</p>",
    "options": [
      "Uttar Pradesh",
      "Jammu &amp; Kashmir",
      "Haryana",
      "Puducherry"
    ],
    "correct_option_id": 2,
    "solution": "<p>7.(c) <strong>Haryana.</strong> Gugga dance - It is a religious dance (in the month of Bhadon) performed by men. Dancers carry instruments such as Thali, Chimta, Deru. Folk dances of Haryana - Phalgun dance, Loor dance, Daph dance, Khoria dance, Saang dance, Dhamal dance, Jhumar dance.</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. At which place was the magnificent temple of Saiva constructed by the great Rashtrakuta King &lsquo;Krishna I&rsquo;?</p>",
    "options": [
      "Badami",
      "Kanchi",
      "Kannauj",
      "Ellora"
    ],
    "correct_option_id": 3,
    "solution": "<p>8.(d) <strong>Ellora.</strong> The temples at Ellora Caves (Maharashtra) were built by the Rashtrakuta and Yadava dynasties. Rashtrakuta dynasty built the Hindu and Buddhist caves during their reign. The Kailasa Temple (dedicated to Lord Shiva) was built by Krishna I of the Rashtrakuta dynasty. The Kailasa Temple is the largest single-rock excavation in the world. Yadava dynasty built many of the Jain caves. The Ellora Caves are a UNESCO World Heritage Site. The caves include 12 Buddhist caves, 17 Hindu caves, and 5 Jain caves.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. Khubakeshei is a kind of song accompanied by clapping, sung in the state of _____.</p>",
    "options": [
      "Bihar",
      "Karnataka",
      "Manipur",
      "Odisha"
    ],
    "correct_option_id": 2,
    "solution": "<p>9.(c) <strong>Manipur.</strong> Khubakeshei is a traditional folk song from Manipur, typically sung with clapping and accompanied by traditional instruments like the Pena (a stringed instrument) or the Khartal (a pair of cymbals). Popular folk songs of Manipur : Pena Khongba, Khulang Eshei, Lai Haraoba Eshei.</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. What takes place when you click the Save button or press Ctrl + S in Microsoft Word?</p>",
    "options": [
      "The document is printed.",
      "The document is copied to the clipboard.",
      "The document is closed.",
      "The document is saved in a disk file."
    ],
    "correct_option_id": 3,
    "solution": "<p>10.(d) <strong>The document is saved in a disk file. </strong>Shortcut keys in MS world: Ctrl + C - Copy, Ctrl + X - Cut, Ctrl + V - Paste, Ctrl + Z - Undo, Ctrl + A - Select all, Ctrl + B - Bold, Ctrl + I - Italic, Ctrl + U - Underline, Ctrl + Shift + &gt; - Increase font size, Ctrl + Shift + &lt; - Decrease font size.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. Which of the following musical forms in Carnatic Classical is the simplest composition of raga?</p>",
    "options": [
      "Kirtnam",
      "Varnam",
      "Gitam",
      "Pada"
    ],
    "correct_option_id": 2,
    "solution": "<p>11.(c) <strong>Gitam.</strong> The main traditional forms of improvisation in Carnatic music consist of the following: Alapana, Niraval, Pallavi, Ragam, Swarakalpana, Tanam, Tani, Avartanam. Varnam - A type of composition in Carnatic music that captures the essence of a raga, or scale, in a short piece of music. Padas are scholarly compositions in Telegu and Tamil.</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. Bali Yatra, is a traditional cultural festival of which state?</p>",
    "options": [
      "Odisha",
      "Bihar",
      "West Bengal",
      "Assam"
    ],
    "correct_option_id": 0,
    "solution": "<p>12.(a) <strong>Odisha.</strong> Bali Jatra is the major Boita Bandana festival held at Cuttack on Kartik Purnima and lasts for 7 days or more. It is considered to be one of Asia\\'s largest open trade fair. Other Festivals of Odisha: Kalipuja, Dola Purnima (Holi), Chandan Yatra, Snana Yatra, Ratha Yatra, Kalinga Mahotsav, Konark Dance Festival, Ekamra Utsav, etc.</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. Lakshmibai National Institute of Physical Education (LNIPE) is located at _____.</p>",
    "options": [
      "Uttar Pradesh",
      "Haryana",
      "Madhya Pradesh",
      "Punjab"
    ],
    "correct_option_id": 2,
    "solution": "<p>13.(c) <strong>Madhya Pradesh.</strong> LNIPE (located in Gwalior) is a higher education institute deemed-to-be-university, under the aegis of the Ministry of Youth Affairs and Sports. It is committed to excelling in physical education, coaching and sports in the country. Former names - Lakshmibai College of Physical Education. Established - 1957. Campus - Shaktinagar.</p>",
    "question_index": 12
  },
  {
    "question": "How many countries participated in the first Asian Games held in 1951?",
    "options": [
      "16",
      "11",
      "20",
      "24"
    ],
    "correct_option_id": 1,
    "solution": "<p>14.(b) <strong>11. </strong>The 1951 Asian Games, officially known as the First Asian Games, was a multi-sport event celebrated in New Delhi, India from 4 to 11 March 1951. Motto - Play the game in the spirit of the game. Opened by - Rajendra Prasad (President of India). Main venue - National Stadium (Major Dhyan Chand National Stadium). 1st Rank - Japan (Gold-24, Silver-21, Bronze-15). 2nd Rank - India (Gold-15, Silver-16, Bronze-20).</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. _____ was an Indian dancer and choreographer best known for creating a fusion style of dance adapting European theatrical techniques to Indian classical and folk - dance forms.</p>",
    "options": [
      "Smita Nagdev",
      "Ravi Shankar",
      "Shovana Narayan",
      "Uday Shankar"
    ],
    "correct_option_id": 3,
    "solution": "<p>15.(d) <strong>Uday Shankar. </strong>Awards - Padma Vibhushan (1971), Sangeet Natak Akademi Fellowship (1962). Shovana Narayan is a recognised Indian Kathak dancer. Her Award - Padma Shri (1992). Pandit Ravi Shankar was an Indian sitarist and composer. Award - Bharat Ratna (1999). Smita Nagdev - Sitar player.</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
