<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. Chittani Ramachandra Hegde was associated with which of the following dances?</p>",
    "options": [
      "Chhau dance",
      "Chappeli dance",
      "Yakshagana dance",
      "Huttari dance"
    ],
    "correct_option_id": 2,
    "solution": "<p>1.(c) <strong>Yakshagana dance</strong> is a traditional folk dance form popular in Coastal Karnataka districts. Chittani Ramachandra Hegde was awarded the Padma Shri award in 2012. Some exponents of Yakshagana : Kuriya Vithala Shastry, Soorikumeru Govinda Bhat, Narayana Hasyagar.</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. The idols of which three Gods are installed in Jagannath Temple, Puri?</p>",
    "options": [
      "Brahma, Vishnu and Mahesh",
      "Radha, Krishna and Balram",
      "Jagannath, Balabhadra and Subhadra",
      "Ram, Lakshman and Janaki"
    ],
    "correct_option_id": 2,
    "solution": "<p>2.(c) <strong>Jagannath, Balabhadra and Subhadra. </strong>These three deities are known as the Trimurti, or trinity. They are carved from sacred neem logs, called daru, and sit on a bejewelled platform called the ratnabedi. The idols are different colors, with Lord Jagannath being black, Balabhadra white, and Subhadra yellow.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. Anna Chandy, the first Indian woman to serve as a judge at a high court was appointed in which High Court?</p>",
    "options": [
      "West Bengal",
      "Kerala",
      "Tamil Nadu",
      "Andhra Pradesh"
    ],
    "correct_option_id": 1,
    "solution": "<p>3.(b) <strong>Kerala</strong>. She was the first female judge in India, the first woman to become a judge of a High Court. She became the founder and editor of the journal (Shreemati) in which she supported women\\'s rights. Justice Leila Seth was the first woman to be Chief Justice of a High Court. Fathima Beevi is the first female judge of the Supreme Court of India.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. Which of the following schemes enables students mobility across Higher Education Institutions?</p>",
    "options": [
      "National Educational Technology Forum",
      "PM Umeed scheme",
      "Structured Assessment for Analysing Learning Levels (SAFAL)",
      "Academic Bank of Credits"
    ],
    "correct_option_id": 3,
    "solution": "<p>4.(d) <strong>Academic Bank of Credits </strong>(ABC) is the initiative of the Ministry of Electronics and Information Technology (MeitY) and Ministry of Education (MoE) respectively. It was launched in July 2021, aimed at facilitating the academic mobility of students, giving them the freedom to study across the higher educational institutions in India with the help of a \\'credit scheme\\' mechanism.</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. How many players are there on each side of the Kabaddi Team in the field?</p>",
    "options": [
      "9",
      "7",
      "8",
      "10"
    ],
    "correct_option_id": 1,
    "solution": "<p>5.(b) <strong>7</strong>. Sports and Number of Players in Each Team: Cricket (11), Hockey (11), Football (11), Basketball (5), Volleyball (6), Water Polo (7), Kho-Kho (9), Rugby (15).</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. Lata Mangeshkar was honoured with the Bharat Ratna in the year ____.</p>",
    "options": [
      "2001",
      "2003",
      "2004",
      "2002"
    ],
    "correct_option_id": 0,
    "solution": "<p>6.(a) <strong>2001</strong>. Lata Mangeshkar was an Indian playback singer, born in Indore, Madhya Pradesh. Awards: Padma Bhushan (1969), Padma Vibhushan (1999), Maharashtra Bhushan Award (1997), Dadasaheb Phalke Award (1989), Bharat Ratna (2001). Titles: \"Queen of Melody&rdquo; and \"Voice of the Millennium&rdquo;.</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. At which Olympic games did Abhinav Bindra win the gold medal?</p>",
    "options": [
      "Athens 2004",
      "Rio 2016",
      "Beijing 2008",
      "London 2012"
    ],
    "correct_option_id": 2,
    "solution": "<p>7.(c) <strong>Beijing 2008.</strong> Abhinav Bindra won the gold medal in the men\\'s 10-meter air rifle event, becoming the first Indian to win an individual Olympic gold. KD Jadhav was the first Indian to win an Olympic medal for independent India. Karnam Malleswari became the first Indian woman to win an Olympic medal at the 2000 Sydney Games.</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. When was the Jawaharlal Nehru Manipur Dance Academy established?</p>",
    "options": [
      "1951",
      "1953",
      "1954",
      "1952"
    ],
    "correct_option_id": 2,
    "solution": "<p>8.(c) <strong>1954</strong>. Other renowned Dance Institutes: National Institute of Kathak Dance (1964) - New Delhi. Nalanda Nritya Kala Mahavidyalaya (1973) - Mumbai. National Ballet Academy of India (2002). Sri Thyagaraja Government College of Music &amp; Dance (1952) - Hyderabad. Nrityanjali (1963) - Mumbai.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. &rsquo;Poush Mela&rsquo; is a unique festival celebrated in which of the following Indian states?</p>",
    "options": [
      "Uttar Pradesh",
      "Himachal Pradesh",
      "West Bengal",
      "Madhya Pradesh"
    ],
    "correct_option_id": 2,
    "solution": "<p>9.(c) <strong>West Bengal. </strong>Poush Mela is an annual fair and festival that takes place in Santiniketan, in Birbhum District, marking the harvest season. Other Fairs of West Bengal - Kenduli Mela, Bhim Mela, Rash Mela, Ganga Sagar Mela, Jalpesh Mela, Kolkata Book Fair.</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. Hariprasad Chaurasia, an Indian flutist in the Hindustani classical tradition, was awarded with which of the following awards in 2000?</p>",
    "options": [
      "Padma Shri",
      "Padma Vibhushan",
      "Bharat Ratna",
      "Padma Bhushan"
    ],
    "correct_option_id": 1,
    "solution": "<p>10.(b) <strong>Padma Vibhushan.</strong> Pandit Hariprasad Chaurasia belonged to the Senia gharana. Awards: Sangeet Natak Academy (1983), Konark Samman (1992), Padma Bhushan (1992). Other Flute Players: Devendra Murdeshwar, Raghunath Seth, Nityanand Haldipur, Ronu Majumdar, Pt. Rajendra Prasanna, and Chetan Joshi.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. Which of the following terms is NOT related to cricket?</p>",
    "options": [
      "Wide Ball",
      "Wicket",
      "No Ball",
      "Deuce"
    ],
    "correct_option_id": 3,
    "solution": "<p>11.(d) <strong>Deuce </strong>is associated with Tennis and ​Badminton. Cricket Terminologies: Off break, Follow-on, Fine leg, Mid Wicket, Gully, Third-man, Googly, Short-pitched, Full toss, Square, Square leg, Square leg umpire, Yorker, Wicket, Timed out, Pitch, Stump, Bail, Beamer, Seamer, Hit wicket, Sawn off, Pavilion, Toss, Maiden over, No ball, Caught, Bowled, Leg Before Wicket, Stumped, Run-out.</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. Who among the following is the world renowned exponent of the bamboo flute?</p>",
    "options": [
      "MS Subbulakshmi",
      "Ravi Shankar",
      "Hariprasad Chaurasia",
      "Bismillah Khan"
    ],
    "correct_option_id": 2,
    "solution": "<p>12.(c) <strong>Hariprasad Chaurasia. </strong>His Awards : Sangeet Natak Academy award (1984), Padma Bhushan (1992), Padma Vibhushan (2000). Musical Instruments and exponents: Flute - Pannalal Ghosh, T.R. Mahalingam, N. Ramani. Sitar - Pt Ravi Shankar, Shahid Parvez Khan, Budhaditya Mukherjee. Shehnai - Bismillah Khan, Krishna Ram Chaudhary, Ali Ahmad Hussain.</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. India won the ICC Men Cricket World Cup for the first time in which of the following years?</p>",
    "options": [
      "1996",
      "1992",
      "1987",
      "1983"
    ],
    "correct_option_id": 3,
    "solution": "<p>13.(d) <strong>1983</strong>. Cricket World Cup was held in England and Wales, India defeated the West Indies in the final under the captaincy of Kapil Dev. Roger Binny was the highest wicket-taker with 18 wickets. Mohinder Amarnath was \\'Man of the Match\\' in both the semi-final and final. India won their second World Cup in 2011, after defeating Sri Lanka in the final at Wankhede Stadium in Mumbai.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. Kathakali, one of the classical dances of India, is predominantly performed in which of the following states of India?</p>",
    "options": [
      "Assam",
      "Manipur",
      "Uttar Pradesh",
      "Kerala"
    ],
    "correct_option_id": 3,
    "solution": "<p>14.(d) <strong>Kerala</strong>. Kathakali, a classical Indian dance form, blends storytelling with expressive costumes.The characters in a Kathakali performance are broadly divided into satvika, rajasika and tamasika types. The performance is accompanied by traditional drums such as Maddalam, Chenda, and Idakka.</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. In which state/UT is the Hemis festival celebrated?</p>",
    "options": [
      "Punjab",
      "Sikkim",
      "Lakshadweep",
      "Ladakh"
    ],
    "correct_option_id": 3,
    "solution": "<p>15.(d) <strong>Ladakh</strong>. Hemis festival is celebrated to mark the birth anniversary of Guru Padmasambhava. Festivals in India: Ladakh: Sindhu Darshan Festival, Losar Festival, Tak-Thok, Matho Nagrang. Punjab: Lohri, Baisakhi, Hola Mohalla, Gurupurab. Sikkim: Loosong/Namsoong, Sonam Lochhar, Losar (Tibetan New Year), Bumchu.</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
