<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. <span style=\"font-family: Cambria Math;\">How many points are there in the 4th set in volleyball?</span></p>\n",
    "options": [
      "15",
      "16",
      "25",
      "8"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">1</span><span style=\\\"font-family: Cambria Math;\\\">.(c) <strong>25. Volleyball:</strong> </span><span style=\\\"font-family: Cambria Math;\\\">Number of players - 6, Court - 18 meters long and 9 wide. The net is 2.43 meters high for men\\'s games and 2.24 meters high for women\\'s games. Other games: Tennis - The first point is &ldquo;15&rdquo;. The second is &ldquo;30. The third point is &ldquo;40&rdquo;. Badminton: The best of</span><span style=\\\"font-family: Cambria Math;\\\"> 3 games of 21 points. Terminologies (Volleyball) :- block, decoy, dig, dump, pancake, tandem, Stuff etc.</span></p>\\n",
    "question_index": 0
  },
  {
    "question": "<p>2. <span style=\"font-family: Cambria Math;\">Maximum how many </span><span style=\"font-family: Cambria Math;\">overs can a bowler bowl in ODI cricket matches?</span></p>\n",
    "options": [
      "11",
      "9",
      "10",
      "8"
    ],
    "correct_option_id": 2,
    "solution": "<p>2.(c) <strong>10</strong>. <span style=\"font-family: Cambria Math;\">The minimum number of bowlers in a 50 over ODI match has to be 5. The maximum number of overs per bowler in T20 Cricket is 4. Breaks between sessions (test cricket match) - 40 minutes for Lunch, and 20 minutes for Tea. The first ODI was played on </span><strong><span style=\"font-family: Cambria Math;\">5 January</span></strong><span style=\"font-family: Cambria Math;\"><strong> 1971</strong> </span><span style=\"font-family: Cambria Math;\">between Australia and England at the Melbourne Cricket Ground.</span></p>\n",
    "question_index": 1
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Sports Authority of India, the apex body for sports promotion, was set up in the year ________.</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
    "options": [
      "1990",
      "1961",
      "1984",
      "1982"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">3</span><span style=\"font-family: Cambria Math;\">.(c) <strong>1984</strong>.</span><span style=\"font-family: Cambria Math;\"> Sports Authority of India (SAI): Headquarters - New Delhi. Associated Ministry - Ministry of Youth Affairs and Sports. </span><strong><span style=\"font-family: Cambria Math;\">Sports Organization and Headquarters :</span></strong><span style=\"font-family: Cambria Math;\"> Board of Control for Cricket in India (Mumbai) - 1928. Indian Olympic Association (New Delhi) - </span><span style=\"font-family: Cambria Math;\">1927, All India Football Federation (New Delhi) - 1937. All India Council of Sports (AICS) established in 1950.</span></p>\n",
    "question_index": 2
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">&lsquo;Wings&rsquo; is associated with which of the following sports events?</span></p>\n",
    "options": [
      "Paralympic 2020",
      "Olympic 2016",
      "Olympic 2020",
      "Winter Olympic 2020"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">4</span><span style=\"font-family: Cambria Math;\">.(a) <strong>Paralympic 2020.</strong> </span><span style=\"font-family: Cambria Math;\">The first-ever Paralympics Games was held in 1960. Although the ancient Games were staged in Olympia, Greece, from 776 BC. The first modern Olympics were held in Athens, Greece, in 1896. Baron Pierre de Coubertin was the founder of the modern Olympic Games</span><span style=\"font-family: Cambria Math;\">.</span></p>\n",
    "question_index": 3
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Match the following neighboring countries of India with their official languages. </span></p>\r\n<p><img src=\"https://ssccglpinnacle.com/images/mceu_9326405611697867231443.png\"></p>\n",
    "options": [
      "1-a, 2-c, 3-b",
      "1-a, 2-b, 3-c",
      "1-c, 2-a, 3-b",
      "1-b, 2-a, 3-c"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">5</span><span style=\"font-family: Cambria Math;\">.(c) <strong>1-c, 2-a, 3-b.</strong> </span><span style=\"font-family: Cambria Math;\">Countries and their Language: Laos - Lao, Thailand - Thai, Afghanistan- Dari/Pashto, Cambodia - Khmer, Iran - Persian, Maldives - Dhivehi, Pakistan - Urdu, Yemen, Lebanon, UAE - Arabic, Israel - Hebrew.</span></p>\n",
    "question_index": 4
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Thabal Chongba is a folk dance of which Indian state?</span></p>\n",
    "options": [
      "Goa",
      "Mizoram ",
      "Manipur",
      "West Bengal"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">6</span><span style=\"font-family: Cambria Math;\">.(c) <strong>Manipur</strong>. </span><span style=\"font-family: Cambria Math;\">Folk dances : Goa - Ghode Modni, Dhangar Dance, Goff Talgadi, Shigmo and Mussel khel. Mi</span><span style=\"font-family: Cambria Math;\">zoram - Chailam, Cheraw, Khuallam, Bamboo dance. </span><span style=\"font-family: Cambria Math;\"><strong>West Bengal</strong> -</span><span style=\"font-family: Cambria Math;\"> Chhau dance. Manipur - Cheraw dance, Rasa lila, Goura Lila, Pung Cholom.</span></p>\n",
    "question_index": 5
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Diwali falls in which of the following months of the</span><span style=\"font-family: Cambria Math;\"> Hindu calendar? </span></p>\n",
    "options": [
      "Ashadha",
      "Bhadrapada",
      "Jyeshtha",
      "Kartika"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">7</span><span style=\"font-family: Cambria Math;\">.(d) <strong>Kartika</strong>. </span><span style=\"font-family: Cambria Math;\">Festivals following Hind</span><span style=\"font-family: Cambria Math;\">u calendar: Chaitra - Ugadi, Gudi Padwa, Ram Navami; Vaishakha - Parashurama Jayanti, Akshaya Tritiya, Mohini Ekadashi; Jyeshtha - Ganga Dussehra; Ashadha - Jagannath Rath Yatra, Guru Purnima; Shavana - Raksha Bandhan, Nag Panchmi; Bhadrapada - Janmashtami</span><span style=\"font-family: Cambria Math;\">, Hartalika Teej, Ganesh Chaturthi; Ashwin - Durga Puja; Kartika - Dhanteras, Diwali, Bhai Dooj, Karwa Chauth.</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\n",
    "question_index": 6
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Select the correct sequence of the musical instruments according to the given sequence of their associated personalities : </span></p>\r\n<p><span style=\"font-family: Cambria Math;\">Ustad Allah Rakha, Totaram Sharma, TH Vinayakam.</span></p>\n",
    "options": [
      "Tabla, Ghatam, Pakhawaj",
      "Ghatam, Pakhawaj, Tabla",
      "Tabla, Pakhawaj, Ghatam",
      "Pakhawaj, Tabla, Ghatam"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">8</span><span style=\"font-family: Cambria Math;\">.(c) <strong>Tabla, Pakhawaj, Ghatam.</strong></span><span style=\"font-family: Cambria Math;\"> Musical Instruments and associated personalities: Tabla - Zakir Hussain, Kishan Maharaj, Jnan Prakash Ghosh. Pakhawaj - Bhavani Shankar, Ayodhya Prasad. Ghatam - E.M. Subramaniam. Flute - H</span><span style=\"font-family: Cambria Math;\">ari Prasad Chaurasia, Pannalal Ghosh, Palladam Sanjiv Rao. Guitar - Braj Bhushan Kabra. Karthal - Gazi Khan Barna. Santoor - Shiv Kumar Sharma, Bhajan Sopori, Tarun Bhattacharya. Sarod - Allauddin Khan, Ali Akbar Khan, Amjad Ali Khan, Tejendra Majumdar. </span></p>\n",
    "question_index": 7
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">In which state is the Chithirai festival celebrated?</span></p>\n",
    "options": [
      "Punjab",
      "Tamil Nadu",
      "Rajasthan",
      "Meghalaya"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">9</span><span style=\"font-family: Cambria Math;\">.(b)<strong> Tamil Nadu.</strong></span><strong><span style=\"font-family: Cambria Math;\"> </span></strong><span style=\"font-family: Cambria Math;\"><strong>Chithirai Festival </strong>-</span><span style=\"font-family: Cambria Math;\"> celebrates the celestial union of Lord Sunderswarar (Lord </span><span style=\"font-family: Cambria Math;\">Shiva) and Goddess Meenakshi, considered to be Lord Vishnu&rsquo;s sister. Celebrated in Madurai. Other Festivals - Pongal, Thiruvaiyaru Festival, Thaipusam, Natyanjali Dance Festival, Mahamaham, Tamil New Year&rsquo;s Day, Karthigai Deepam. </span><strong><span style=\"font-family: Cambria Math;\">Punjab</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Baisakhi, Hola M</span><span style=\"font-family: Cambria Math;\">ohalla, Lohri, Chappar Mela. </span><strong><span style=\"font-family: Cambria Math;\">Rajasthan</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Teej Festival, Momasar Utsav, Pushkar Fair, Desert Festival, Jaisalmer. </span><strong><span style=\"font-family: Cambria Math;\">Meghalaya</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Shad Suk Mynsiem, Nongkrem Festival, Behdienkhlam Festival, Shad Sukra, Wangala Festival. </span></p>\n",
    "question_index": 8
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Kalbelia dance is generally performed in which of the following states of India?</span></p>\n",
    "options": [
      "Tamil Nadu",
      "Punjab",
      "Rajasthan",
      "Assam"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">10</span><span style=\"font-family: Cambria Math;\">.(c) <strong>Rajasthan</strong>.</span><span style=\"font-family: Cambria Math;\"> Kalbelia Dance</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">(Sapera Dance) is performed by women while males play various traditional instruments. It was included in the United Nations Educational, Scientific and Cultural Organizations (UNESCO) list of Intangible Cultural Heritage (ICH) in 2010. </span><span style=\"font-family: Cambria Math;\"><strong>Other Dance</strong> - </span><span style=\"font-family: Cambria Math;\">Ghoom</span><span style=\"font-family: Cambria Math;\">ar, Bhawai, Kachhi Ghodi, Chari. </span><strong><span style=\"font-family: Cambria Math;\">Tamil Nadu</span></strong><span style=\"font-family: Cambria Math;\"> - Bharatanatyam (Classical dance), Karakattam, Pulliyattam.</span><span style=\"font-family: Cambria Math;\"> <strong>Punjab</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>- Bhangra, Giddha, Luddi, Gatka. </span><strong><span style=\"font-family: Cambria Math;\">Assam</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Bagurumba Dance, Sattriya Dance (Classical dance), Deodhani, Ali-Ai-Ligang (Mishing tribe).</span></p>\n",
    "question_index": 9
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">What is the full form of IADP?</span></p>\n",
    "options": [
      "Intensive Agricultural District Programme",
      "India Agricultural Development Programme",
      "Integrated Agricultural District plan",
      "Intensive Agricultural Development Project"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\">.(a) <strong>Intensive Agricultural District Programme</strong></span><span style=\"font-family: Cambria Math;\"> (Launched in 1960) </span><span style=\"font-family: Cambria Math;\">-</span><span style=\"font-family: Cambria Math;\"> Also known as a &ldquo;package program&rdquo;; </span><strong><span style=\"font-family: Cambria Math;\">Aim</span><span style=\"font-family: Cambria Math;\"> </span></strong><span style=\"font-family: Cambria Math;\">-</span><span style=\"font-family: Cambria Math;\"> To provide loans for seeds and fertilisers to farmers. It was launched in district of 7 states at that time : Thanjavur (Tamil Nadu), West Godavari (Andhra Pradesh), Shahabad (Bihar), Raipur (M</span><span style=\"font-family: Cambria Math;\">adhya Pradesh), Aligarh (Uttar Pradesh), Ludhiana (Punjab), Pali (Rajasthan).</span></p>\n",
    "question_index": 10
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Tansen, who was included in the Na</span><span style=\"font-family: Cambria Math;\">varatnas of Akbar, was an expert in playing which of the following musical instruments?</span></p>\n",
    "options": [
      "Nagada",
      "Veena",
      "Sarangi",
      "Rabab"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">12</span><span style=\"font-family: Cambria Math;\">.(d) <strong>Rabab</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>(String instrument)</span><span style=\"font-family: Cambria Math;\">. <strong>Tansen </strong></span><span style=\"font-family: Cambria Math;\">(Ramtanu Pandey) - A Hindustani classical musician also Known as Sangeeth Samrat or Mian (</span><span style=\"font-family: Cambria Math;\">Learned One</span><span style=\"font-family: Cambria Math;\">)</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Tansen Samaroh is celebrated every year in the month of December</span><span style=\"font-family: Cambria Math;\"> in Gwalior district. The National Tansen Samman is a musical award conferred to the exponents.</span><span style=\"font-family: Cambria Math;\"> <strong>Navratna of Akbar</strong> </span><span style=\"font-family: Cambria Math;\">- Raja Todar Mal (finance minister), Mullah Do Piaza, Fakir Aziao-Din, Abdul Rahim Khan-I-Khana, Abul Fazl (Wrote Ain-i-Akbari), Raja Birbal, </span><span style=\"font-family: Cambria Math;\">Faizi, Raja Man Singh, MiyanTansen. </span></p>\n",
    "question_index": 11
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Which of the following states recognise the Dahi Handi as a sports event?</span></p>\n",
    "options": [
      "Maharashtra",
      "Bihar",
      "Madhya Pradesh",
      "Uttar Pradesh"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">13</span><span style=\"font-family: Cambria Math;\">.(a) <strong>Maharashtra</strong>. </span><span style=\"font-family: Cambria Math;\">Dahi Handi (Gopal kala) is celebrated during the Krishna Janmashtami. Other</span><span style=\"font-family: Cambria Math;\"> festivals : </span><strong><span style=\"font-family: Cambria Math;\">Maharashtra</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Ganesh Chaturthi, Gudi Padwa or Chaitra Pratipada, Narali Purnima. </span><strong><span style=\"font-family: Cambria Math;\">Bihar</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Chhath Puja, Pitrapaksha Mela, Bihula. </span><strong><span style=\"font-family: Cambria Math;\">Madhya Pradesh</span></strong><span style=\"font-family: Cambria Math;\"> - Lokrang Festival, Khajuraho Festival, Bhagoria Haat Festival, Malwa Utsav. </span><strong><span style=\"font-family: Cambria Math;\">Uttar Pradesh</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Ganga D</span><span style=\"font-family: Cambria Math;\">ussehra, Lathmar Holi, Taj Mahotsav. </span></p>\n",
    "question_index": 12
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Who among the following advocated the ideology of \"oru jati, oru matam, oru daivam manushyanu\" (one caste, one re</span><span style=\"font-family: Cambria Math;\">ligion, one god for humankind)?</span></p>\n",
    "options": [
      "Birsa Munda",
      "Narayana Guru",
      "Swami Shradhanand",
      "Keshub Chunder Sen"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">14</span><span style=\"font-family: Cambria Math;\">.(b) <strong>Narayana Guru.</strong></span><span style=\"font-family: Cambria Math;\"> He belongs to Ezhava caste and was considered &lsquo;avarna&rsquo;. He built a temple dedicated to Lord Shiva at Aruvippuram which was against the caste based restrictions of the time. He established the Sree Narayana Dharma Paripalana Yogam (SNDP), a charitable soci</span><span style=\"font-family: Cambria Math;\">ety. </span><span style=\"font-family: Cambria Math;\">His Books:</span><span style=\"font-family: Cambria Math;\"> &ldquo;Advaitha Deepika&rdquo;, &ldquo;Asrama&rdquo;and &ldquo;Thevarappathinkangal&rdquo;. He became the proponent of Advaita Vedanta (Principle of non-duality) put forward by Adi Shankara.</span></p>\n",
    "question_index": 13
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">The activity of making a human pyramid and putting efforts to break an earthen pot filled with buttermilk is associated with which festival?</span></p>\n",
    "options": [
      "Holi",
      "Janmashtami",
      "Dushara",
      "Mahashivaratri\\r\\n "
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">15</span><span style=\"font-family: Cambria Math;\">.(b) <strong>Janmashtami</strong>.</span><span style=\"font-family: Cambria Math;\"> It is a Hindu festival celebrating the birth of god Krishna on the eighth (ashtami) day of the dark fortnight of the month of Bhadrapada. Dahi handi is a popular festival in Maharashtra. Famous festivals related to <strong>Lord Krishna:</strong> Govardhan Puja, Holi. </span><span style=\"font-family: Cambria Math;\">Lord</span><span style=\"font-family: Cambria Math;\"> Krishna </span><span style=\"font-family: Cambria Math;\">temples in India:- Jagannath Temple (Puri, Odisha), Dwarkadhish (Gujarat), Guruvayur (Kerala), Udupi Sri Krishna Matha (Karnataka). Temples in </span><strong><span style=\"font-family: Cambria Math;\">Vrindavan </span></strong><span style=\"font-family: Cambria Math;\">(Uttar Pradesh)- Sri Sri Radha Madan Mohan Mandir, Banke Bihari, Jugal Kishore, Radha Raman, P</span><span style=\"font-family: Cambria Math;\">rem Mandir. </span></p>\n",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
