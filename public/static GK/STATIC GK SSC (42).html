<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. Saikhom Mirabai Chanu is an ______ .</p>",
    "options": [
      "Indian Boxer",

    "correct_option_id": 2,
    "solution": "<p>1.(c) <strong>Indian weightlifter.</strong> Saikhom Mirabai Chanu won the silver medal at the 2020 Tokyo Olympics in the Women\\'s 49 kg event. She has won gold medals at the World Championships and Commonwealth Games. She was awarded the Padma Shri and Major Dhyan Chand Khel Ratna by the Government of India in 2018.</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. Which album earned Ricky Kej his third Grammy Award?</p>",
    "options": [
      "Harmony of Elements",
      "Divine Tides",
      "Melodies of the Universe",
      "Nature\\'s Symphony"
    ],
    "correct_option_id": 1,
    "solution": "<p>2.(b) <strong>Divine Tides.</strong> Ram Gyan \"Ricky\" Kej is an Indian-American music composer and environmentalist of Indian descent and a three-time Grammy Award winner. The Grammy Awards: Awarded for - Outstanding achievements in the music industry, Country - United States, Presented by - The Recording Academy, First awarded - May 4, 1959.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. In which type of shooting sport do athletes shoot at targets from a distance of 10 meters, 25 meters, and 50 meters?</p>",
    "options": [
      "Archery",
      "Rifle shooting",
      "Skeet shooting",
      "Biathlon"
    ],
    "correct_option_id": 1,
    "solution": "<p>3.(b) <strong>Rifle shooting.</strong> Shooting is an important Olympic sport in India. Of India\\'s 35 Olympic medals, four have been awarded in shooting, including a gold medal won by Abhinav Bindra at the 2008 Olympics. The highest governing body of shooting sports in India is National Rifle Association of India (NRAI), which was established on 17 April 1951.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. ___________ dance form originates from the southern Indian state of Kerala.</p>",
    "options": [
      "Only Mohiniyattam",

      "Only Kathak"
    ],
    "correct_option_id": 1,
    "solution": "<p>4.(b) <strong>Kathakali and Mohiniyattam.</strong> Classical Dances and Originating State : Bharatanatyam (Tamil Nadu), Kathak (Uttar Pradesh), Kuchipudi (Andhra Pradesh), Manipuri (Manipur), Odissi (Odisha), Sattriya (Assam).</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. Who hosted the 2011 ODI cricket world cup?</p>",

    ],
    "correct_option_id": 2,
    "solution": "<p>5.(c) <strong>India, Sri Lanka, Bangladesh.</strong> ODI cricket world cup (2011): Administrator(s) - International Cricket Council, Champions - India (2nd title), Runners-up - Sri Lanka, Player of the series - Yuvraj Singh, Most runs (Tillakaratne Dilshan, Sri Lanka, 500), Most wickets - Shahid Afridi (21), Zaheer Khan (21).</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. Fatorpa Zatra and Mando festivals are related to which of the following states?</p>",
    "options": [
      "Kerala",
      "Karnataka",
      "Madhya Pradesh",
      "Goa"
    ],
    "correct_option_id": 3,
    "solution": "<p>6.(d) <strong>Goa.</strong> Fatorpa Zatra is celebrated at the temple of Shantadurga Kuncolienkarinat Fatorpa in quepem taluka. The Mando festival is a celebration of a traditional Goan song-dance performance that combines Indian and Western traditions. Popular festivals of Goa : Shigmo, Goa Carnival, Bonderam, Three Kings Feast, Grape Escapade.</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. Which of the following sports does Indian player Shafali Verma play ?</p>",
    "options": [
      "Badminton",
      "Cricket",
      "Volleyball",
      "Hockey"
    ],
    "correct_option_id": 1,
    "solution": "<p>7.(b) <strong>Cricket.</strong> Shafali Verma became the youngest Indian to play a T20 at the age of 15 in 2019. Other Indian female Cricket players: Harmanpreet Kaur, Smriti Mandhana, Deepti Sharma, Jemimah Rodrigues, Yastika Bhatia.</p>",
    "question_index": 6
  },
  {

      "Chhau",

      "Dollu kunitha"
    ],
    "correct_option_id": 3,
    "solution": "<p>8.(d) <strong>Dollu kunitha.</strong> It is associated with the worship of Sree Beeralingeshwara (Lord Shiva), originated in the rituals of the Kuruba Gowda community of North Karnataka. State and their folk dances: Karnataka - Kamsale Nrutya, Gaarudi Gombe, Veeragase. Assam - Bagurumba, Odisha - Chhau, Goa - Fugdi.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. The 2010 Commonwealth Games in India were held in ___________.</p>",
    "options": [

      "Mumbai"

    "correct_option_id": 1,
    "solution": "<p>9.(b) <strong>New Delhi.</strong> This was the first time India has hosted the Games and only the second time the event has been held in Asia (Kuala Lumpur in 1998 was the first). The event was first held in 1930. 22<sup>nd</sup> (2022) - Birmingham (England). 23<sup>rd</sup> (2026) - Victoria (Australia).</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. Which Indian dance artist won the Sangeet Natak Akademi Award in 2018 for String puppetry ?</p>",
    "options": [
      "Anupama Hoskere",

    ],
    "correct_option_id": 0,

    "question_index": 9
  },
  {
    "question": "<p>11. Rann Utsav promotes the natural beauty of the wonderful region of __________ and other famous tourist places. During the full moon night in the winter season, the white sand desert looks even more enchanting.</p>",
    "options": [
      "Kutch",
      "Andaman",
      "Malabar",
      "Odisha"
    ],
    "correct_option_id": 0,
    "solution": "<p>11.(a) <strong>Kutch.</strong> Other fairs and festivals of Gujarat: International Kite Festival (Celebrated during Makar Sankranti), Vathua Mela (animal trading festival), Tarnetar fair (Based on the legend of Draupadi\\'s Swayamvara), Megh Malhar Parv Saputara (Beginning of Monsoon), Dang Darbar Fair (by Dangs tribe).</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. Who among the following is famous for playing percussion instrument tabla ?</p>",
    "options": [
      "Bismillah Khan",
      "Ali Ahmed Hussain",

      "Ayodhya Prasad"
    ],
    "correct_option_id": 2,
    "solution": "<p>12.(c)<strong> Allah Rakha. </strong>Award : Padma Shri (1977), Sangeet Natak Akademi Awards (1982). Gharana - Punjab . Other maestro: Tabla - Zakir Hussain, ​Anindo Chatterjee, ​Pt. Kishan Maharaj , Pt. Swapan Chaudhuri. Shehnai - Ali Ahmed Hussain, Bismillah Khan. Pakhawaj - Ayodhya Prasad.</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. During which religious event in India do devotees take a holy dip in the Ganges River, believing it washes away their sins, and perform various rituals at the riverbanks ?</p>",
    "options": [
      "Diwali",
      "Kumbh Mela",
      "Eid al-Fitr",
      "Navratri"
    ],
    "correct_option_id": 1,
    "solution": "<p>13.(b) <strong>Kumbh Mela.</strong> The world\\'s biggest festival by attendance is often considered to be the Kumbh Mela in India. It is a major Hindu pilgrimage that occurs every 12 years, rotating among four locations (Allahabad, Haridwar, Nashik, and Ujjain). It is held on the banks of rivers Ganga, Yamuna, Godavari and Shipra.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. Which sport is played by the Indian sportsperson Janet Vidhi ?</p>",
    "options": [
      "Cricket",
      "Squash",
      "Archery",
      "Boxing"
    ],
    "correct_option_id": 1,
    "solution": "<p>14.(b) <strong>Squash. </strong>Other Sports Personalities : Squash - Ritwick Bhattacharya, Saurav Ghosal, Dipika Pallikal, and Joshna Chinappa; Archery - Pravin Jadhav, Tarundeep Rai, and Jyothi Surekha Vennam; Boxing - Mary Kom, Vijender Singh, and Lovlina Borgohain.</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. Which of the following classical dance form is associated with Kerala ?</p>",
    "options": [
      "Kathak",

    "correct_option_id": 2,

    "question_index": 14

    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
