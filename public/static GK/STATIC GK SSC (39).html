<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. Which of the following are needed for Skype to function on a computer?<br>1) A web cam<br>2) A microphone<br>3) A speaker</p>",
    "options": [
      "Only 1 and 2",
      "Only 2 and 3",
      "1, 2 and 3",
      "Only 1 and 3"
    ],
    "correct_option_id": 2,
    "solution": "<p>1.(c) <strong>1, 2 and 3.</strong> Skype is a communication platform that allows users to make voice and video calls, send instant messages, and share files over the internet. A web camera (for video calls and seeing the other person). A microphone (for speaking and transmitting your voice). A speaker (for hearing the other person).</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. The default width of a column in MS-Excel is:</p>",
    "options": [
      "6 characters",
      "7 characters",
      "9 characters",
      "8 characters"
    ],
    "correct_option_id": 3,
    "solution": "<p>2.(d) <strong>8 characters.</strong> In Microsoft Excel, the default width of a column is set to accommodate 8.43 characters, which is approximately 64 pixels. Here are some of the default settings in Microsoft Excel: Row Height: 15 points (or about 20 pixels). Font: Calibri, Font Size: 11. Cell Alignment: Horizontal Alignment- General , Vertical Alignment- Bottom. Cell Fill Color: No fill (white background). Page Margins: 1 inch (2.54 cm) on all sides. Zoom Level: 100%.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. The song &lsquo;Teri mitti&rsquo; is from which of the following movies?</p>",
    "options": [
      "Jai Ho",
      "Kesari",
      "Satya Mev Jayte",
      "Rajniti"
    ],
    "correct_option_id": 1,
    "solution": "<p>3.(b) <strong>Kesari. </strong>It is based on the true story of the Battle of Saragarhi in 1897. The film was directed by Anurag Singh. &lsquo;Teri mitti&rsquo; song : Writer - Manoj Muntashir. Composer - Arko Pravo Mukherjee. Singer - B Praak.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. Nehru Institute of Mountaineering is located at ________.</p>",
    "options": [
      "Jammu and Kashmir",
      "Himachal Pradesh",
      "Uttarakhand",
      "Leh"
    ],
    "correct_option_id": 2,
    "solution": "<p>4.(c) <strong>Uttarakhand</strong>. The Nehru Institute of Mountaineering (NIM) was founded in 1965. The Himalayan Mountaineering Institute, located in Darjeeling, West Bengal. It was founded on November 4, 1954, by Pandit Jawaharlal Nehru to commemorate the first successful ascent of Mount Everest by Tenzing Norgay Sherpa and Sir Edmund Hillary.</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. Which folk music is based on the Mahabharata with Bhima portrayed as hero?</p>",
    "options": [
      "Dandiya",
      "Pandavani",
      "Alha",
      "Mando"
    ],
    "correct_option_id": 1,
    "solution": "<p>5.(b) <strong>Pandavani.</strong> It is a folk music tradition from Chhattisgarh. It narrates the story of the five Pandava brothers (protagonists of the epic Mahabharata). This age-old musical form was kept alive by performers like Teejan Bai, Jhaduram Devangan, Ritu Verma, Usha Barle and Shantibai Chelak. Folk songs of Chhattisgarh : Fag, Karma songs, Danda songs, Sawnahi, Kau-Mau, Sua songs, Chau-Mau Dewar songs, Cher-Chera songs, Sohar song, Khuduwa, Dhankul songs, Bhojali songs, Dandi Pouha, Loriya, Goura songs, Fugdi etc.</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. The Indian festival of Holi comes every year in the season of:</p>",
    "options": [
      "spring",
      "autumn",
      "summer",
      "winter"
    ],
    "correct_option_id": 0,
    "solution": "<p>6.(a) <strong>Spring</strong>. Holi, also known as the Festival of Colors, is celebrated on the full moon day of the Phalguna month in the Hindu calendar. Other notable festivals and their seasons include: Diwali, celebrated in autumn (usually October or November); Makar Sankranti, observed in winter (January); Pongal, also in winter (January); and Ganesh Chaturthi, celebrated during the monsoon season (August or September).</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. Who is the author of Natyashastra?</p>",
    "options": [
      "Prabhupada",
      "Patanjali",
      "Bharatmuni",
      "Panini"
    ],
    "correct_option_id": 2,
    "solution": "<p>7.(c) <strong>Bharatmuni,</strong> an ancient Indian sage, is known for writing the Natya Shastra, a major text on Indian dance, drama, poetry, and music. Prabhupada founded the International Society for Krishna Consciousness (ISKCON), while Patanjali authored the Yoga Sutras, a key text on yoga. Panini, another ancient scholar, is renowned for his work on Sanskrit grammar, particularly the Ashtadhyayi.</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. How might ICT enhance the openness of e-land records?</p>",
    "options": [
      "Enabling quick search and retrieval of land records",
      "Facilitating manual record updates and amendments",
      "Enforcing strict regulations on land transactions",
      "Reducing the need for land surveys and assessments"
    ],
    "correct_option_id": 0,
    "solution": "<p>8.(a) Information and Communication Technology (ICT) facilitates the digitization and online availability of land records, making it easier for stakeholders to access information efficiently. ICT systems can provide real-time updates and tracking of land records, reducing delays and increasing the reliability of information. Digital India Land Records Modernization Programme was launched in 2008 by the Ministry of Rural Development to digitize and modernize land records and develop a centralized land record management system.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. In field hockey, ________ occurs when a player pushes the ball and raises it off the&nbsp;ground.</p>",
    "options": [
      "bully",
      "slap",
      "flick",
      "centre pass"
    ],
    "correct_option_id": 2,
    "solution": "<p>9.(c) <strong>flick.</strong> During a penalty corner, the attacker must use a push, scoop, or flick shot to avoid fouls. Internationally, the \"drag flick\" is the most popular lifted shot in penalty corners. Terms Used in Field Hockey: Free hits - Awarded for general offenses by either team during play. Dribbling : Keeping the ball under close control. Flagposts : Placed at each corner of the field. Foot foul : In field hockey, players cannot use their feet or body to control the ball.</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. Which of the following states launched the first Migration Monitoring System in the&nbsp;year 2022?</p>",
    "options": [
      "Maharashtra",
      "Karnataka",
      "Kerala",
      "Goa"
    ],
    "correct_option_id": 0,
    "solution": "<p>10.(a) <strong>Maharashtra.</strong> Migration Monitoring System provides updated information on migrant pregnant women, lactating mothers, and children. It is developed by the Department of Women and Child Development. Some schemes of the Maharashtra government : State Agriculture Mechanization Scheme, Mahatma Jyotirao Phule Jan Arogya Yojana (MJPJAY), Government Vidyaniketan Scholarship.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. Who is known as the &lsquo;Father of Carnatic Music&rsquo;?</p>",
    "options": [
      "Vidyaranya",
      "Purandara Dasa",
      "Thirunal Rama Varma",
      "Vishwanath Iyer"
    ],
    "correct_option_id": 1,
    "solution": "<p>11.(b) <strong>Purandara Dasa.</strong> Tamil Nadu is famous for Carnatic music, based on ragas (melodies) and talas (rhythms). Purandara Dasa has contributed significantly to its codification and giving it a clear format for its teaching and performance. The devotional songs composed by Shyama Shastri, Tyagaraja and Muthuswami Dikshitar are very popular. These songs are accompanied by instruments like the mridangam, veena, nadaswaram, and flute. In recognition of its musical heritage, Chennai was included in the UNESCO Creative Cities Network in 2017.</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. Which country do the &lsquo;Veddas&rsquo; traditional forest dwellers who foraged, hunted and&nbsp;lived in close-knit groups in caves in the dense jungles?</p>",
    "options": [
      "Sri Lanka",
      "Nepal",
      "Myanmar",
      "Bhutan"
    ],
    "correct_option_id": 0,
    "solution": "<p>12.(a) <strong>Sri Lanka.</strong> Some tribes from different countries : Nepal - Tamang, Newar, Tharu, Rai, Limbu, and Bhutia. Myanmar - Burmese, Rakhine, Kachin, Danu, Lisu. Bhutan - Monpa, Brokpa, Bumthangpa, Tibetans. Pakistan - Pashtuns, Sindhis, Muhajirs.</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. How is the structure of health infrastructure and health care system in India?</p>",
    "options": [
      "Three-tier system",
      "Five-tier system",
      "Two-tier system",
      "Four-tier system"
    ],
    "correct_option_id": 0,
    "solution": "<p>13.(a) <strong>Three-tier system.</strong> The healthcare system in India is a three-tier structure, with Sub Health Centres, Primary Health Centres, and Community Health Centres, both in urban and rural areas, serving as the pillars of the primary health care system. As per established norms, Sub Health Centre: Serves 5,000 people in plains and 3,000 in hilly/tribal areas. Primary Health Centre (PHC): Serves 30,000 people in plains and 20,000 in hilly/tribal areas. Community Health Centre (CHC): Serves 1,20,000 people in plains and 80,000 in hilly/tribal areas.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. Which language is known as &lsquo;Italian of the East&rsquo;?</p>",
    "options": [
      "Telugu",
      "Malayalam",
      "Marathi",
      "Kannada"
    ],
    "correct_option_id": 0,
    "solution": "<p>14.(a) <strong>Telugu.</strong> Telugu Language Day is celebrated every year on August 29. In 2008, Telugu was granted the status of a classical language. Nicolo di Conti, who visited the Vijayanagara Empire, found that the words in the Telugu language end with vowels, just like those in Italian, and hence referred to it as \"The Italian of the East&rdquo;.</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. In which year did Indian archers participate in the Olympics for the first time?</p>",
    "options": [
      "1980",
      "1973",
      "1988",
      "1975"
    ],
    "correct_option_id": 2,
    "solution": "<p>15.(c) <strong>1988.</strong> India competed in 7 events at the 1988 Summer Olympic Games held in Seoul, South Korea with a contingent of about 20 athletes participating in sports disciplines including Archery for the first time, Athletics, Boxing, Hockey, Swimming, Table Tennis and Tennis.</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
