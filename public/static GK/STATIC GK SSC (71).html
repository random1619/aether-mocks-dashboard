<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->

    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\"> \\'Dalkhai\\' is a folk dance of which of the following states of India?</span></p>\\n",

      "Kerala",
      "Odisha",
      "Karnataka"

    "correct_option_id": 2,

    "question_index": 0
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Which of the following countries never hosted the Paralympic games ?</span></p>\n",
    "options": [
      "Israel",
      "Japan",
      "South Korea",
      "India"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">2</span><span style=\"font-family: Cambria Math;\">.(d) <strong>India</strong>. </span><span style=\"font-family: Cambria Math;\">Paralympic Games 2020 (Tokyo) : India won 19 medals at the Tokyo Paralympics -- 5 gold, 8 silver, 6 bronze. Shooter Avani Lekhara became the first Indian woman to win two Paralympics medals. </span></p>\n",
    "question_index": 1
  },
  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">The \\'Right to Work\\' plan, under the National Rural Employment Guarantee Act, 2005, was implemented in how many distric</span><span style=\\\"font-family: Cambria Math;\\\">ts in the first phase?</span></p>\\n",
    "options": [
      "150",

      "100",
      "120"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">3</span><span style=\"font-family: Cambria Math;\">.(b) <strong>200</strong>. </span><span style=\"font-family: Cambria Math;\">National Rural Employment Guarantee Act, 2005 (NREGA) : One of the largest work guarantee programmes in the world. It is under the Ministry of Rural development. In (2009), the NREGA scheme was renamed as the Mahatma Gandhi National Rural Employment Guaran</span><span style=\"font-family: Cambria Math;\">tee Act (MGNREGA) scheme. Aim - to ensure that if any adult member of a rural household is willing to do unskilled manual work, that household gets at least 100 days of jobs in a financial year. </span></p>\n",
    "question_index": 2
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">4</span><span style=\"font-family: Cambria Math;\">. Who was hailed as a resident dancer of Tirumala Tirupati Devasthanam for her unique contributio</span><span style=\"font-family: Cambria Math;\">n to the promotion of classical dance forms?</span></p>\n",
    "options": [
      "Uma Sharma",
      "Rukmini Devi",
      "Yamini Krishnamurthy",
      "Ragini Devi\\r\\n "
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">4</span><span style=\"font-family: Cambria Math;\">.(c) <strong>Yam</strong></span><span style=\"font-family: Cambria Math;\"><strong>ini Krishnamurthy.</strong> </span><span style=\"font-family: Cambria Math;\">She is an Indian dancer of Bharatanatyam and Kuchipudi, recognised as &ldquo;Asthana Nartaki&rdquo; of the Tirumala Tirupati Devasthanam </span><span style=\"font-family: Cambria Math;\"><strong>Awards </strong>- </span><span style=\"font-family: Cambria Math;\">Padma Shri (1968), Padma Bhushan (2001) and Padma Vibhushan (2016). </span><strong><span style=\"font-family: Cambria Math;\">Uma Sharma</span></strong><span style=\"font-family: Cambria Math;\"> (Kathak): Awards - Padma Shri (1973), Padma Bhushan (2001). </span><strong><span style=\"font-family: Cambria Math;\">Rukmini Devi </span></strong><span style=\"font-family: Cambria Math;\">(Bharatanatyam):</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Awards - Padma Bhushan (1956), Sangeet Natak Akademi Award (1957). </span><span style=\"font-family: Cambria Math;\"><strong>Ragini Devi</strong> </span><span style=\"font-family: Cambria Math;\">( Kathakali). </span></p>\n",
    "question_index": 3
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Which of the following countries has hosted the three Asian Games?</span></p>\n",
    "options": [
      "South Korea",
      "Philippines",
      "Japan",
      "India\\r\\n "
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">5</span><span style=\"font-family: Cambria Math;\">.(a) <strong>South Korea</strong> </span><span style=\"font-family: Cambria Math;\">(1986, 2002 and 2014)</span><span style=\"font-family: Cambria Math;\">. <strong>Asian Games:</strong></span><span style=\"font-family: Cambria Math;\"> Organised by the Olympic Council of Asia (OCA) after every 4 years. Headquarters - Kuwait. New Delhi, India, hosted the first Asian Games in 1951 and the second time in 1982. 20th <strong>Asian Games</strong> (2026) will be held in Nagoya (Japan). </span><strong><span style=\"font-family: Cambria Math;\">Sprinter Kamaljeet Sandh</span><span style=\"font-family: Cambria Math;\">u</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- First Indian woman to win an individual Asian Games gold medal (400 m race) at the Asian Games 1970 in Bangkok (Thailand). </span><span style=\"font-family: Cambria Math;\">Thailand </span><span style=\"font-family: Cambria Math;\">(Bangkok)</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">- Hosted the most number of Asian Games (1966, 1970, 1978 and 1998).</span></p>\n",
    "question_index": 4
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Chang</span><span style=\"font-family: Cambria Math;\">ai dance is associated with which Indian state?</span></p>\n",
    "options": [
      "Madhya Pradesh",
      "Maharashtra",
      "Nagaland",
      "Jharkhand"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">6</span><span style=\"font-family: Cambria Math;\">.(c) <strong>Nagaland</strong>. </span><span style=\"font-family: Cambria Math;\">Changai Dance: Performed by the Chang tribe during the Naknyulum festival, which lasts for three days. </span><strong><span style=\"font-family: Cambria Math;\">Folk Dances of Nagaland:</span></strong><span style=\"font-family: Cambria Math;\"> Aaluyattu (Konyak tribe), Agurshikukula (war dance), Butterfly Dance (Zeliang tribe), Khamba Lim, Kuki Dance, Les</span><span style=\"font-family: Cambria Math;\">halaptu, Mayur Dance (Animal dance). Modse (Ao tribe), Monyu Asho, Sadal Kekai (Kuki tribe), Seecha &amp; Kukui Kucho (Angami tribe), Rengma.</span></p>\n",
    "question_index": 5
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Which is the national fruit of Bangladesh?</span></p>\n",

      "Pomegranate",
      "Mango",

      "Jackfruit"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">7</span><span style=\"font-family: Cambria Math;\">.(d) <strong>Jackfruit. National fruits and Countries:</strong> </span><span style=\"font-family: Cambria Math;\">India (Mango), Nepal (Raspberry), Saudi Arabia (Dates), Serbia (Plum), Singapore (Durian), Ukraine (cherry), Vietnam (Dragon fruit), Canada - (Blueberries), Afghanistan (Pomegranate), New Zealand (Kiwifruit),</span><span style=\"font-family: Cambria Math;\"> Pakistan (Mango - Summer and Guava - Winter).</span></p>\n",
    "question_index": 6
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Which of the following pairs of musicians and their instruments is INCORRECT?</span></p>\n",
    "options": [
      "Bismillah Khan - Shehnai",
      "Pt. Ram Narayan - Sarod",
      "N Rajam - Violin",
      "Pt. Ravi Shankar - Sitar\\r\\n "
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">8</span><span style=\"font-family: Cambria Math;\">.(b) <strong>Pt. Ram Narayan - </strong></span><span style=\"font-family: Cambria Math;\"><strong>Sarod.</strong> </span><span style=\"font-family: Cambria Math;\">He is a Sarangi Player. </span><strong><span style=\"font-family: Cambria Math;\">Instruments and Musicians</span><span style=\"font-family: Cambria Math;\">: </span><span style=\"font-family: Cambria Math;\">Sarangi</span></strong><span style=\"font-family: Cambria Math;\"> - Shakoor Khan, Ramesh Mishra, Sultan Khan, Ustad Binda Khan. </span><strong><span style=\"font-family: Cambria Math;\">Sarod</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Buddhadev Dasgupta, Allauddin Khan, Ali Akbar Khan, Amjad Ali Khan, Sharan Rani, Zarin S Sharma. </span><strong><span style=\"font-family: Cambria Math;\">Violin</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- VG Jog, MS Go</span><span style=\"font-family: Cambria Math;\">palakrishnan, NR Muralidharan, M Chandrasekharan. </span><strong><span style=\"font-family: Cambria Math;\">Shehnai</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Krishna Ram Chaudhary, Ali Ahmad Hussain. </span><strong><span style=\"font-family: Cambria Math;\">Sitar</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Shahid Parvez Khan, Budhaditya Mukherjee, Anushka Shankar, Hara Shankar Bhattacharya, Nikhil Banerjee.</span></p>\n",
    "question_index": 7
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">This event is celebrated to mark the resurrection of</span><span style=\"font-family: Cambria Math;\"> Christ. Identify the event.</span></p>\n",
    "options": [
      "Easter",
      "Christmas",
      "Holy Thursday",
      "Good Friday\\r\\n "
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">9</span><span style=\"font-family: Cambria Math;\">.(a) <strong>Easter. Important Christian days and festivals:</strong> </span><span style=\"font-family: Cambria Math;\">Christmas day - Birth of Jesus Christ.</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Good Friday - Jesus was crucified. Holy Thursday or Maundy Thursday - refers to the Thursday before Easter in the Christian calendar. It commemor</span><span style=\"font-family: Cambria Math;\">ates the Last Supper of Jesus Christ with his apostles. Epiphany (Twelfth Night) - Christian feast day celebrated on January 6th, twelve days after Christmas, commemorating the visit of the Magi (Wise Men or Three Kings) to the infant Jesus in Bethlehem.</span></p>\n",
    "question_index": 8
  },
  {
    "question": "<p>10.<span style=\"font-family: Cambria Math;\"> The folk dance of Kummi is performed by the women of which Indian state?</span></p>\n",
    "options": [
      "Rajasthan",
      "Madhya Pradesh",
      "Tamil Nadu",
      "Jharkhand "
    ],
    "correct_option_id": 2,
    "solution": "<p>10.(c) <strong>Tamil Nadu.</strong><span style=\"font-family: Cambria Math;\"> States and Folk Dances:</span><span style=\"font-family: Cambria Math;\"> <strong>Tamil Nadu</strong> </span><span style=\"font-family: Cambria Math;\">- Chakkai Attam, Karakattam, Ottan Koothu, Shattam. </span><strong><span style=\"font-family: Cambria Math;\">Rajasthan</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Bhavai, Chari, Chakri, Ghoomar, Kachchhi Ghodi, Terah Taali. </span><span style=\"font-family: Cambria Math;\"><strong>Madhya Pradesh</strong> </span><span style=\"font-family: Cambria Math;\">- Jawara, Matki, Phulpati, Grida Dance, Selalarki, Selabhadoni. </span><strong><span style=\"font-family: Cambria Math;\">Jharkhand</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Karma Munda, Jhumar, Mundari</span><span style=\"font-family: Cambria Math;\"> Dance, Sarhul. </span><strong><span style=\"font-family: Cambria Math;\">Nagaland</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Rangma, Gethinglim, Zeliang. </span><span style=\"font-family: Cambria Math;\">Lakshadweep</span><span style=\"font-family: Cambria Math;\"> - Lava, Kolkali, Parichakali.</span></p>\n",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">What is the priority zone of the AMRUT (Atal Mission fo</span><span style=\"font-family: Cambria Math;\">r Rejuvenation and Urban Transformation) mission, which was launched by the Government of India in 2015?</span></p>\n",

      "Water supply followed by sewerage",

      "Primary education for all",

    "correct_option_id": 0,
    "solution": "<p>11.(a) <strong>Water supply followed by sewerage.<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">AMRUT</span></strong><span style=\"font-family: Cambria Math;\"><strong>:</strong> Launched on 25th June 2015 and selected 500 cities and towns to focus on development of basic infrastructure. National Heritage City Development And Augmentation Yojana (HRIDAY)</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">started on 21 J</span><span style=\"font-family: Cambria Math;\">anuary 2015, Aim - Conservation of heritage, urban planning and increasing the economic growth of the heritage cities. Pilgrimage Rejuvenation and Spiritual Heritage Augmentation Drive (PRASHAD): Launched 2014 - 2015, Focuses on developing pilgrimage sites</span><span style=\"font-family: Cambria Math;\">. Ude Desh ka Aam Nagarik (UDAN): Launched in 2016, Aim - to make air travel more affordable and widespread.</span></p>\n",
    "question_index": 10
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">12</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Shahid Parvez Khan, Budhaditya Mukherjee and Anoushka Shankar are associated with which of the following musical instruments?</span></p>\n",

    "question_index": 11
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">One of the important institutes associated with the green revolution is the Indian Agriculture Research Institute. Where is it located?</span></p>\n",
    "options": [
      "Mumbai",
      "Ludhiana",

      "Patna"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">13</span><span style=\"font-family: Cambria Math;\">.(c) <strong>New Delhi.</strong> </span><span style=\"font-family: Cambria Math;\">The Green revolution started in the 1960s, using high yielding variety (HYV) seeds, mechanised farm tools, irrigation facilities, pesticides, and fertilisers. M S Swaminathan - Father of the Green Revolution in India. Norman Borlaug - Father of the Green R</span><span style=\"font-family: Cambria Math;\">evolution in the world. Agricultural Institute - National Academy of Agricultural Research Management (NAARM) - Hyderabad. Established - 1976. Central Potato Research Institute (CPRI) - Shimla. Indian Institute of Horticultural Research - Bangalore, Est</span><span style=\"font-family: Cambria Math;\">ablished - 1967, Indian Agricultural Research Institute (IARI): Establishment - 1 April 1905. </span></p>\n",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">14</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Satyaram Reang received the Padma Shri for promoting the Hojagiri dance form. He belongs to which of the following states?</span></p>\n",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> In the Olympic flag, the total number of rings are _________.</span></p>\n",

      "5",
