<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {

    "question_index": 0
  },
  {

    "options": [
      "V.V Giri",
      "Mary Kom",
      "Sania Mirza",

    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">2.(</span><span style=\"font-family: Cambria Math;\">c) <strong>Sania Mirza</strong></span><span style=\"font-family: Cambria Math;\"> (Tennis Player). </span><strong><span style=\"font-family: Cambria Math;\">Awards</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Major Dhyan Chand Khel Ratna (2015); Padma Bhushan (2016).</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Autobiographies of some famous personalities</span><span style=\"font-family: Cambria Math;\">:</span><span style=\"font-family: Cambria Math;\"> &ldquo;Unbreakable&rdquo;</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">- MC </span><span style=\"font-family: Cambria Math;\">Marykom</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> &ldquo;</span><span style=\"font-family: Cambria Math;\">Playing It My Way&rdquo; - Sachin Tendulkar. &ldquo;The Test of My Life&rdquo; - Yuvraj Singh. &ldquo;A Shot at History&rdquo; - Abhinav Bindra. &ldquo;Believe &ndash; What Life and Cricket Taught Me&rdquo; - Suresh Raina. &ldquo;281 and Beyond&rdquo; - VVS Laxman. &ldquo;Goal&rdquo; - Major Dhyan Chand. </span></p>\n",
    "question_index": 1
  },
  {
    "question": "<p>3. <span style=\"font-family: Cambria Math;\">Who among the following was the first Indian musician to receive the Grammy </span><span style=\"font-family: Cambria Math;\">LifeTime</span><span style=\"font-family: Cambria Math;\"> Achievement Award? </span></p>\n",
    "options": [
      "Nucleya ",
      "Pandit Ravi Shankar",

    "correct_option_id": 1,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">3.(</span><span style=\\\"font-family: Cambria Math;\\\">b) <strong>Pandit Ravi Shankar</strong> </span><span style=\\\"font-family: Cambria Math;\\\">(Bharat Ratna in 1999)</span><span style=\\\"font-family: Cambria Math;\\\">. </span><span style=\\\"font-family: Cambria Math;\\\"> He</span><span style=\\\"font-family: Cambria Math;\\\"> </span><span style=\\\"font-family: Cambria Math;\\\">won Best Chamber Music Performance for \\'West Meets East\\' in 1967.</span><span style=\\\"font-family: Cambria Math;\\\"> </span><span style=\\\"font-family: Cambria Math;\\\">The </span><strong><span style=\\\"font-family: Cambria Math;\\\">Grammy Awards </span></strong><span style=\\\"font-family: Cambria Math;\\\">are presented annually by the Recording Academy of the </span><strong><span style=\\\"font-family: Cambria Math;\\\">United States</span></strong><span style=\\\"font-family: Cambria Math;\\\"><strong>.</strong> The first Grammy Awards ceremony - May 4, 1959.</span><span style=\\\"font-family: Cambria Math;\\\"> <strong>Other Indian Grammy winners</strong> -</span><span style=\\\"font-family: Cambria Math;\\\"> Zubin Mehta (1981, Best Classical Performance), T. H. </span><span style=\\\"font-family: Cambria Math;\\\">Vinayakram</span><span style=\\\"font-family: Cambria Math;\\\"> and Zakir Hussain (1991, Best World Music Album), Vishwa Mohan Bhatt (1993, Best World Music Album). </span></p>\\n",
    "question_index": 2
  },
  {
    "question": "<p>4. <span style=\"font-family: Cambria Math;\">The Medical Termination of Pregnancy (MTP) Amendment Act, 2021 increases the upper limit for termination from 20 to ______ weeks for certain categories of women. </span></p>\n",

  {
    "question": "<p>5. <span style=\"font-family: Cambria Math;\">Renowned Rajasthani folk dancer </span><span style=\"font-family: Cambria Math;\">Gulabo</span><span style=\"font-family: Cambria Math;\"> Sapera is recognized for ______ dance.</span></p>\n",

    "question_index": 4
  },
  {
    "question": "<p>6. <span style=\"font-family: Cambria Math;\">Which God is worshipped during the festival of Chhath Puja? </span></p>\n",
    "options": [
      "Surya",
      "Agni",
      "Indra",
      "Vishnu"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">6.(</span><span style=\"font-family: Cambria Math;\">a) </span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"><strong>Surya</strong>.</span><span style=\"font-family: Cambria Math;\"> Chhath is derived from the Sanskrit word </span><span style=\"font-family: Cambria Math;\">Shashthi</span><span style=\"font-family: Cambria Math;\">, which means the sixth. It is celebrated in the month of Kartik to thank the Sun god for bestowing the bounties of life on Earth. </span><span style=\"font-family: Cambria Math;\"><strong>Other festivals of Bihar</strong> -</span><span style=\"font-family: Cambria Math;\"> Buddha Jayanti, </span><span style=\"font-family: Cambria Math;\">Sonepur</span><span style=\"font-family: Cambria Math;\"> Cattle Fair, </span><span style=\"font-family: Cambria Math;\">Rajgir</span><span style=\"font-family: Cambria Math;\"> Mahotsav, Sama-</span><span style=\"font-family: Cambria Math;\">Chakeva</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Bihula</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Madhushravani</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Pitrapaksha</span><span style=\"font-family: Cambria Math;\"> Mela, </span><span style=\"font-family: Cambria Math;\">Malmas</span><span style=\"font-family: Cambria Math;\"> Mela. </span></p>\n",
    "question_index": 5
  },
  {
    "question": "<p>7. <span style=\"font-family: Cambria Math;\">Which famous Indian dancer is associated with the </span><span style=\"font-family: Cambria Math;\">Pandavani</span><span style=\"font-family: Cambria Math;\"> dance form?</span></p>\n",

    "solution": "<p><span style=\"font-family: Cambria Math;\">7.(</span><span style=\"font-family: Cambria Math;\">d) </span><strong><span style=\"font-family: Cambria Math;\">Teejan</span></strong><span style=\"font-family: Cambria Math;\"><strong> Bai</strong>. </span><span style=\"font-family: Cambria Math;\">She Awarded Padma Vibhushan in 2019, Padma Bhushan in 2003. </span><span style=\"font-family: Cambria Math;\">Pandavani</span><span style=\"font-family: Cambria Math;\"> is a style of singing in which narration of tales from the Mahabharata is performed. It is performed in Chhattisgarh. </span><span style=\"font-family: Cambria Math;\">Famous <strong>exponents of </strong></span><strong><span style=\"font-family: Cambria Math;\">pandavani</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- </span><span style=\"font-family: Cambria Math;\">Jhaduram</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Devangan</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Punaram</span><span style=\"font-family: Cambria Math;\"> Nishad, Ritu Verma, Chetan </span><span style=\"font-family: Cambria Math;\">Dewangan</span><span style=\"font-family: Cambria Math;\">, </span><span style=\"font-family: Cambria Math;\">Shantibai</span><span style=\"font-family: Cambria Math;\"> Chelak and Usha Barle.</span><span style=\"font-family: Cambria Math;\"> <strong>Other artists and art forms</strong></span><span style=\"font-family: Cambria Math;\">: Pandit Birju Maharaj (kathak), </span><span style=\"font-family: Cambria Math;\">Vyjayanthimala</span><span style=\"font-family: Cambria Math;\"> (Bharatanatyam), Vempati Chinna Satyam (Kuchipudi).</span></p>\n",

    "question": "<p>8. <span style=\"font-family: Cambria Math;\">The famous </span><span style=\"font-family: Cambria Math;\">Dhamek</span><span style=\"font-family: Cambria Math;\"> Stupa is located in which of the following states?</span></p>\n",

  {
    "question": "<p>9. <span style=\"font-family: Cambria Math;\">Meri Policy Mere </span><span style=\"font-family: Cambria Math;\">Haath</span><span style=\"font-family: Cambria Math;\"> scheme was launched by ______ Ministry of India in 2022.</span></p>\n",

    "question_index": 8
  },
  {
    "question": "<p>10. <span style=\"font-family: Cambria Math;\">The </span><span style=\"font-family: Cambria Math;\">Rampurva</span><span style=\"font-family: Cambria Math;\"> bull that was part of a Mauryan pillar found in </span><span style=\"font-family: Cambria Math;\">Rampurwa</span><span style=\"font-family: Cambria Math;\">, Bihar is now placed at _______.</span></p>\n",

  {
    "question": "<p>11. <span style=\"font-family: Cambria Math;\">Which of these is the title of the first novel of Anand Neelakantan?</span></p>\n",
    "options": [
