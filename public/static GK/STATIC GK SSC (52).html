<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. <span style=\"font-family: Cambria Math;\">Pandit Shivkumar Sharma is remembered for his mastery in playing _________ .</span></p>\n",

      "Santoor\\r\\n "

    "correct_option_id": 3,
    "solution": "<p><strong>1.(d) Santoor</strong><span style=\"font-family: Cambria Math;\"> (a stringed percussion instrument)</span><span style=\"font-family: Cambria Math;\">.<strong> Pandit Shivkumar Sharma</strong></span><span style=\"font-family: Cambria Math;\"><strong> -</strong> Awards - Padma Shri (1991), Padma Vibhushan (2001), Sangeet Natak Akademi Award (1986), Global Indian Music Academy Awards (2010). Other Santoor Players -</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Tarun Bhattacharya, Rijram Desad, Rahul Sharma, Abhay Sopori. </span></p>\n",
    "question_index": 0
  },
  {
    "question": "<p>2. <span style=\"font-family: Cambria Math;\">Mundari dance is associated with the tribal community of which Indian state?</span></p>\n",
    "options": [
      "Mizoram",
      "Karnataka",
      "Arunachal Pradesh",
      "Jharkhand"
    ],
    "correct_option_id": 3,
    "solution": "<p><strong>2.(d)</strong> <strong>Jharkhand</strong>. <span style=\"font-family: Cambria Math;\">Mundari dance - Community - Munda Tribe. Time - During Harvest Season accompanied by musical Instrument Madal, Nagara and Bansi. Other Tribe Dances: </span><span style=\"font-family: Cambria Math;\">Santhali Dance - Santhal (West Bengal, Jharkhand). Bamboo Dance - Mizoram. Kalbelia Dance - Kalbelia Commu</span><span style=\"font-family: Cambria Math;\">nity (Rajasthan). Bhagoria Dance - Bhils (Madhya Pradesh). Dhimsa Dance - Porja Tribe (Andhra Pradesh).</span></p>\r\n<p><span style=\"font-family: Cambria Math;\"> </span></p>\n",
    "question_index": 1
  },
  {
    "question": "<p>3. <span style=\"font-family: Cambria Math;\">What is the width of the court for double matches in Lawn Tennis?</span></p>\n",
    "options": [
      "38 feet",

    "question_index": 2
  },

    "options": [
      "a-iv, b-iii, c-i, d-ii",
      "a-iii, b-i, c- iv, d-ii",
      "a-iv, b- ii, c- i, d-iii",
      "a-iv, b-i, c-ii, d-iii"
    ],
    "correct_option_id": 3,
    "solution": "<p><strong>4.(d) a-iv, b-i, c-ii, d-iii.</strong><span style=\"font-family: Cambria Math;\"> Champakkulam boat race. Held in the Pampa River in the month of June or July. It is the oldest snake boat race in Kerala state. Somnath fair - Celebrated on the day of the full moon of Kartik Purnima. God - Month - November-December. Surajkund fair </span><span style=\"font-family: Cambria Math;\">- In</span><span style=\"font-family: Cambria Math;\">itiate - 1987. God - Surya. It is held during the first half of the month of February. Baneshwar fair - It is held in the month of January or February.</span></p>\n",
    "question_index": 3
  },
  {
    "question": "<p>5. <span style=\"font-family: Cambria Math;\">In 1956, which of the following awards did Rukmini Devi Arundale, an eminent Bharatanatyam dancer, receive?</span></p>\n",
    "options": [
      "Jnanpith Award",
      "Saraswati Samman",
      "Kabir Puraskar",

    "correct_option_id": 3,

    "question_index": 4

    "question_index": 5
  },
  {

    "options": [
      "11 yards",

    "correct_option_id": 1,

    "question_index": 6
  },
  {
    "question": "<p>8. <span style=\"font-family: Cambria Math;\">Who among the following is not a professional Indian Classical Dancer?</span></p>\n",

      "Mallika Sarabahi",

      "Shreya Ghoshal ",
      "Shovana Narayanan "
    ],
    "correct_option_id": 2,
    "solution": "<p><strong>8.(c)<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Shreya Ghoshal </span></strong><span style=\"font-family: Cambria Math;\">(A singer)</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> </span><strong><span style=\"font-family: Cambria Math;\">Indian Classical Dance: </span></strong><span style=\"font-family: Cambria Math;\">Bharatnatyam (Tamil Nadu), Kathak (</span><span style=\"font-family: Cambria Math;\">North India), Kathakali (Kerala), Kuchipudi (Andhra Pradesh), Mohiniyattam (Kerala), Odissi (Odisha), Sattriya (Assam), Manipuri (Manipur). </span><span style=\"font-family: Cambria Math;\"><strong>Bharatanatyam dancers:</strong> </span><span style=\"font-family: Cambria Math;\">Rukmini Devi Arundale, Alarmel Valli, Yamini Krishnamurthy, Mallika Sarabhai, T. Bala Saraswati, Vasundhara Doraswamy. </span><span style=\"font-family: Cambria Math;\"><strong>Kathak dancers </strong>-</span><span style=\"font-family: Cambria Math;\"> Birju Maharaj, Shovana Narayan, Saswati Sen, Sitara Devi, Urmila Nagar. </span></p>\n",
    "question_index": 7
  },
  {
    "question": "<p>9. <span style=\"font-family: Cambria Math;\">In which of the following years was the first radio show broadcast in India?</span></p>\n",
    "options": [
      "1923",
      "1936",
      "1911",
      "1927"
    ],
    "correct_option_id": 0,
    "solution": "<p><strong>9.(a) 1923. </strong><span style=\"font-family: Cambria Math;\">The Radio Club of Bombay made the first-ever broadcast in the country in June 1923. Broadcasting in India actually be</span><span style=\"font-family: Cambria Math;\">gan about 13 years before AIR came into existence. The Indian Broadcasting Company (IBC) came into being on 23 July 1927. </span><strong><span style=\"font-family: Cambria Math;\">All India Radio: </span></strong><span style=\"font-family: Cambria Math;\">Founded - 1936, Headquarters - Akashvani Bhavan building in New Delhi. </span><span style=\"font-family: Cambria Math;\"><strong>Prasar Bharti:</strong> </span><span style=\"font-family: Cambria Math;\">Founded - 23 November 1997, Hea</span><span style=\"font-family: Cambria Math;\">dquarters - New Delhi. </span></p>\n",
    "question_index": 8
  },
  {
    "question": "<p>10. <span style=\"font-family: Cambria Math;\">Ustad Akbar Ali Khan is remembered for his contribution to which of the following musical instruments?</span></p>\n",
    "options": [
      "Tabla",

    "question_index": 9
  },
  {
    "question": "<p>11. <span style=\"font-family: Cambria Math;\">RK Bijapure played which of the following musical instruments?</span></p>\n",
    "options": [
      "Harmonium",
      "Tabla",
      "Ravanahatha",
      "Sitar"
    ],
    "correct_option_id": 0,
