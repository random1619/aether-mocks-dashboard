<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {

  },
  {

    "question_index": 1
  },
  {
    "question": "<p>3. <span style=\"font-family: Cambria Math;\">Which of the following is NOT the first day event in the decathlon?</span></p>\n",
    "options": [
      "Discus throw ",
      "Shot put",
      "100 metre dash",
      "400 metre dash"
    ],
    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">3.(</span><span style=\"font-family: Cambria Math;\">a) <strong>Discus throw. Men&rsquo;s decathlon:</strong> </span><span style=\"font-family: Cambria Math;\">Day 1 - 100 meters running, Long jump, Shot put, High jump, 400 meters running. Day 2 - 110 meters hurdles, Discus throw, Pole vault, Javelin throw, 1500 meters running.<strong> </strong></span><span style=\"font-family: Cambria Math;\"><strong>Women&rsquo;s decathlon</strong>: </span><span style=\"font-family: Cambria Math;\">Day 1 - 100 meters running, Discus throw, Pole vault, Javelin throw, 400 meters running. Day 2 - 100 meters hurdles, Long jump, Short put, High jump, 1500 meters running.</span></p>\n",

  {

    "question_index": 3

  {

    "question_index": 4

  {

    "question_index": 5
  },
  {
    "question": "<p>7. <span style=\"font-family: Cambria Math;\">Who among the following personalities is associated </span><span style=\"font-family: Cambria Math;\">with synthesising classical and modern Indian dance through a theatre group called Ranga Sri Little Ballet </span><span style=\"font-family: Cambria Math;\">Troupe ?</span></p>\n",

    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">7.(</span><span style=\"font-family: Cambria Math;\">c) <strong>Shanti Bardhan - </strong></span><span style=\"font-family: Cambria Math;\">A junior colleague of Uday Shankar, produced some of the most imaginative dance-dramas of the 20th century. He produced Ramayana, in which the actors moved and danced like puppets. </span><span style=\"font-family: Cambria Math;\"><strong>Guru Bipin</strong> <strong>Singh</strong></span><span style=\"font-family: Cambria Math;\"><strong> </strong>- A director, choreographer, and teacher of Manipuri dance</span><span style=\"font-family: Cambria Math;\">, awarded with Sangeet Natak Akademi Award in 1966. </span><strong><span style=\"font-family: Cambria Math;\">Pandit Birju Maharaj</span></strong><span style=\"font-family: Cambria Math;\"><strong> -</strong> The world famous Kathak dancer and was the face of the Kalka-Bindadin Gharana of Lucknow.</span><span style=\"font-family: Cambria Math;\"> <strong>Remo Fernandes</strong></span><span style=\"font-family: Cambria Math;\"><strong> -</strong> A well known Indian Musician Playback Singer, who was honoured with Padma </span><span style=\"font-family: Cambria Math;\">Shri in 2007.</span></p>\n",
    "question_index": 6

    "question": "<p>8. <span style=\"font-family: Cambria Math;\">Who among the following singers became the first Indian folk artist to attend the Cannes Film Festival </span><span style=\"font-family: Cambria Math;\">2022 ?</span></p>\n",

    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">8.(</span><span style=\"font-family: Cambria Math;\">d) <strong>Mame Khan </strong></span><span style=\"font-family: Cambria Math;\">- An Indian Rajasthani folk singer who is known for his Sufi and folk musi</span><span style=\"font-family: Cambria Math;\">c performances. </span><strong><span style=\"font-family: Cambria Math;\">Cannes Film Festival</span></strong><span style=\"font-family: Cambria Math;\"> (Festival de Cannes) - A film festival held annually in Cannes (France). </span><span style=\"font-family: Cambria Math;\">First held - 1946.</span><span style=\"font-family: Cambria Math;\"> The festival came to provide a rendezvous for those interested in the art and influence of the movies.</span></p>\n",
    "question_index": 7

  {
    "question": "<p>9. <span style=\\\"font-family: Cambria Math;\\\">What is the distance between the h</span><span style=\\\"font-family: Cambria Math;\\\">urdles in 100 m women\\'s hurdles in </span><span style=\\\"font-family: Cambria Math;\\\">metres ?</span></p>\\n",

  {
    "question": "<p>11<span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Which of the following personalities is a well-known Indian plant physiologist and </span><span style=\"font-family: Cambria Math;\">physicist ?</span></p>\n",

    "question": "<p>14<span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">In November 2022, Manika Batra created</span><span style=\"font-family: Cambria Math;\"> history by becoming the first Indian woman paddler to win a bronze medal in which </span><span style=\"font-family: Cambria Math;\">event ?</span></p>\n",

    "solution": "<p><span style=\"font-family: Cambria Math;\">14</span><span style=\"font-family: Cambria Math;\">.(c) <strong>ITTF-AATU Asian Cup. Manika Batra</strong></span><span style=\"font-family: Cambria Math;\"><strong> - </strong>Indian table tennis player. She is currently World number 39 in the International Table Tennis Federation (as of May 2023). </span><span style=\"font-family: Cambria Math;\"><strong>Awarded </strong>:</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Major Dhyan Chand Khel Ratna (2020), Arjuna Award (2018), The Breakthrough Star Award by ITTF (2018). Table tennis players (India</span><span style=\"font-family: Cambria Math;\">) :</span><span style=\"font-family: Cambria Math;\"> Achanta Sharath Kamal, Kamlesh Mehta, Mouma Das, Sathiyan Gnanasekaran. </span></p>\n",
