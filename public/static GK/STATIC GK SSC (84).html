<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p><span style=\"font-family: Cambria Math;\"> Padma Subrahmanyam received Padma Bhushan Award for her contribution to Indian Classical dance form in</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">.</span></p>\n",
    "options": [
      "1998",
      "2003",
      "2001",
      "2010"
    ],
    "correct_option_id": 1,
    "solution": "<p>1.(b)<strong> 2003.</strong> <span style=\"font-family: Cambria Math;\">Dr. Padma Subrahmanyam is a leading figure in Indian </span><span style=\"font-family: Cambria Math;\"><strong>BharataNatyam</strong> </span><span style=\"font-family: Cambria Math;\">classical dance.<strong> </strong></span><span style=\"font-family: Cambria Math;\"><strong>Awards</strong> </span><span style=\"font-family: Cambria Math;\">- Sangeet Natak Akademi Award (1983), Padma Shri (1981), Nehru Award (1983), Kerala Nishagandhi Puraskaram (2015). </span></p>\n",
    "question_index": 0
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Simone Biles is associated with which sports?</span></p>\n",
    "options": [
      "Swimming",
      "Badminton",
      "Gymnastics",
      "Table tennis"
    ],
    "correct_option_id": 2,
    "solution": "<p>2.(c) <strong>Gymnastics</strong>. <span style=\"font-family: Cambria Math;\">Simone Biles (USA) holds the record for winning the most medals (25 total) at the World Championship and 4 Gold medals in 2016 Olympics. </span><strong><span style=\"font-family: Cambria Math;\">Famous Sports Players</span><span style=\"font-family: Cambria Math;\"> - </span></strong><span style=\"font-family: Cambria Math;\"><strong>Swimming</strong> - </span><span style=\"font-family: Cambria Math;\">Michael Phelps, Arati Saha, Bhakti Sharma</span><span style=\"font-family: Cambria Math;\">. <strong>Badminton</strong> - </span><span style=\"font-family: Cambria Math;\">PV Sindhu, Saina Nehwal, Lin Dan. </span><span style=\"font-family: Cambria Math;\"><strong>Table tennis</strong> - </span><span style=\"font-family: Cambria Math;\">Manika Batra, Neha Aggarwal, Zhang Jike.</span></p>\n",
    "question_index": 1
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Mallika Sarabhai received the prestigious_________award by Government of India in the year 2010.</span></p>\n",
    "options": [
      "Padma Bhushan",
      "Padma Vibhushan",
      "Jnanpith",
      "Bharat Ratna"
    ],
    "correct_option_id": 0,
    "solution": "<p>3.(a) <strong>Padma Bhushan. Mallika Sarabhai</strong> <span style=\\\"font-family: Cambria Math;\\\">(Kuchipudi and Bharatanatyam dancer)</span><span style=\\\"font-family: Cambria Math;\\\">: <strong>Honour </strong>- </span><span style=\\\"font-family: Cambria Math;\\\">Government of Gujarat awarded her with \\'Gaurav Puraskar\\' for her contribution in the field of drama and dance. The French Government awarded her with a knight\\'s rank in the Order of Academic Palms in 2005. </span><strong><span style=\\\"font-family: Cambria Math;\\\">Famous Bharatanatyam dancers </span></strong><span style=\\\"font-family: Cambria Math;\\\">- Yamini Krishnamurthy, Padma Subrahmanyam, Mrinalini Sarabhai, Balasaraswati.</span></p>\\n",
    "question_index": 2
  },
  {
    "question": " <p><span style=\"font-family:Cambria Math\">4. </span><span style=\"font-family:Cambria Math\">Pandit Kishan Maharaj was a famous Indian __________player.</span></p>",
    "options": [
      "Sitar",
      "Sarangi",
      "Flute",
      "Tabla"
    ],
    "correct_option_id": 3,
    "solution": " <p>4.(d) Tabla. Pandit Kishan Maharaj - </span><span style=\"font-family:Cambria Math\">belonged to the Benares gharana of Hindustani classical music. </span><span style=\"font-family:Cambria Math\">Awards </span><span style=\"font-family:Cambria Math\">-  Padma Shri in 1973 and the Padma Vibhushan in 2002. Famous Players </span><span style=\"font-family:Cambria Math\">: Tabla </span><span style=\"font-family:Cambria Math\"> - Zakir Hussain, Trilok Gurtu, Talvin Singh, Anindo Chatterjee. </span><span style=\"font-family:Cambria Math\">Sitar </span><span style=\"font-family:Cambria Math\">- Ravi Shankar, Anoushka Shankar, Annapurna Devi. </span><span style=\"font-family:Cambria Math\">Flute </span><span style=\"font-family:Cambria Math\">- Hariprasad Chaurasia, Pravin Godkhindi, Ronu Majumdar. </span><span style=\"font-family:Cambria Math\">Sarangi </span><span style=\"font-family:Cambria Math\">- Abdul Latif Khan, Ustad Faiyaz Khan.</span></p>",
    "question_index": 3
  },
  {
    "question": "<p>5.<span style=\"font-family: Cambria Math;\"> Which of the following is not a valid stroke in a swimming competition?</span></p>\n",
    "options": [
      "Breast stroke",
      "Front stroke",
      "Leg stroke",
      "Backstroke"
    ],
    "correct_option_id": 2,
    "solution": "<p>5.(c)<strong> Leg stroke. Breaststroke </strong><span style=\"font-family: Cambria Math;\">- A swimming style in which the swimmer is on their chest and the torso does not rotate. </span><strong><span style=\"font-family: Cambria Math;\">Freestyle (Front stroke):</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>The swimmer may swim any style, except that in individual medley or medley relay events, freestyle means any style other than backstroke, breaststroke or butterfly. </span><span style=\"font-family: Cambria Math;\"><strong>Backstroke</strong> </span><span style=\"font-family: Cambria Math;\">- the swimmer lies on their back in the water and moves their arms and legs in a coordinated manner to propel themselves forward.</span></p>\n",
    "question_index": 4
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Nati is a folk dance of which of the following states?</span></p>\n",
    "options": [
      "Himachal Pradesh",
      "Madhya Pradesh",
      "Arunachal Pradesh",
      "Andhra Pradesh"
    ],
    "correct_option_id": 0,
    "solution": "<p>6.(a) <strong>Himachal Pradesh. Nati </strong><span style=\"font-family: Cambria Math;\">- It was listed in the Guinness Book of World Records as the largest folk dance in the world. It is known as Tandi in upper districts of Garhwal. Other folk dances : </span><span style=\"font-family: Cambria Math;\"><strong>Himachal Pradesh -</strong> </span><span style=\"font-family: Cambria Math;\">Rakshasa (demon), Kayang, Bakayang, the Bnayangchu, the Jataru Kayang, Chohara, Shand and Shabu, Lang-dar-ma, Jhanjhar, Jhoor, Gi, and Rasa;<strong> </strong></span><strong><span style=\"font-family: Cambria Math;\">MadhyaPradesh</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- Jawara, Matki, Aada, Khada Nach; </span><span style=\"font-family: Cambria Math;\"><strong>AndhraPradesh</strong> </span><span style=\"font-family: Cambria Math;\">- Bhamakalapam, Veeranatyam, Dappu; </span><span style=\"font-family: Cambria Math;\"><strong>Arunachal Pradesh</strong> </span><span style=\"font-family: Cambria Math;\">- Bhuiya, Chalo, Wancho.</span></p>\n",
    "question_index": 5
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">In Badminton, the length and width of the doubles court shall be of________.</span></p>\n",
    "options": [
      "12.20 m &times; 6.20 m",
      "13.40 m x 6.10 m",
      "13.40 m x 5.20 m",
      "13.20 m &times; 6.50 m"
    ],
    "correct_option_id": 1,
    "solution": "<p>7.(b) <strong>13.40 m x 6.10 m</strong>. <span style=\"font-family: Cambria Math;\">For singles the court is marked</span><span style=\"font-family: Cambria Math;\"> <strong>5.18m wide</strong></span><span style=\"font-family: Cambria Math;\"><strong>.</strong> The lines marking out the court are easily distinguishable and coloured white or yellow. The lines are 40mm wide. </span><strong><span style=\"font-family: Cambria Math;\">The back boundary lines</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>- become the long service lines and the posts or the strips of material representing them are placed on the side lines. The diagonal full length of the full court is 14.366m.<strong> </strong></span><strong><span style=\"font-family: Cambria Math;\">Basketball court</span></strong><span style=\"font-family: Cambria Math;\"> - 91.86 ft long and 49.21ft wide. </span><span style=\"font-family: Cambria Math;\"><strong>Table tennis </strong>- </span><span style=\"font-family: Cambria Math;\">dimension of 274 cm long and 152.5 cm wide.</span></p>\n",
    "question_index": 6
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">Which among the famous novels written by Indian author R. K. Narayan?</span></p>\n",
    "options": [
      "The dark room",
      "The Suitable boy",
      "Unaccustomed Earth",
      "Half Girlfriend"
    ],
    "correct_option_id": 0,
    "solution": "<p>8.(a) <strong>The dark room. R. K. Narayan: </strong><span style=\"font-weight: 400;\">Novels - &ldquo;Swami and Friends&rdquo;, &ldquo;The Bachelor of Arts&rdquo;, &ldquo;The Dark Room&rdquo;, &ldquo;The English Teacher&rdquo; , &ldquo;Mr. Sampath&rdquo;. </span><strong>Awards </strong><span style=\"font-weight: 400;\">- Sahitya Akademi Award (1960),&nbsp; Padma Bhushan (1964), AC Benson Medal by the (British) Royal Society of Literature (1980), Rajyotsava Prashasti&nbsp; (1986).&nbsp; Famous Books - </span><strong>&lsquo;&rsquo;The Suitable Boy&rsquo;&rsquo;</strong><span style=\"font-weight: 400;\"> - Vikram Seth, &lsquo;&rsquo;</span><strong>Unaccustomed Earth&rsquo;&rsquo;</strong><span style=\"font-weight: 400;\"> - Jhumpa Lahiri, &lsquo;&rsquo;</span><strong>Half Girlfriend&rsquo;&rsquo;</strong><span style=\"font-weight: 400;\"> - Chetan Bhagat.</span></p>\n",
    "question_index": 7
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">The festival of Navroz or Nowroj is celebrated as the new year of which community?</span></p>\n",
    "options": [
      "Buddhist",
      "Parsi",
      "Sindhi",
      "Jainism"
    ],
    "correct_option_id": 1,
    "solution": "<p>9.(b) <strong>Parsi. Navroz Festival </strong>- <span style=\"font-family: Cambria Math;\">celebrated in the first month of the Iranian calendar, usually beginning on 21 March. The day is also known as Jamshed-i-Nowruz after the Persian King, Jamshed, who introduced the Parsi calendar.<strong> </strong></span><span style=\"font-family: Cambria Math;\"><strong>Balban</strong> </span><span style=\"font-family: Cambria Math;\">introduced the famous Persian Festival of Nauroz.<strong> </strong></span><strong><span style=\"font-family: Cambria Math;\">Other festivals</span></strong><span style=\"font-family: Cambria Math;\"> - Zarthost No Deeso, Khordad Sal and Pateti.</span></p>\n",
    "question_index": 8
  },
  {
    "question": "<p>10. <span style=\"font-family: Cambria Math;\">The Board of Control for Cricket in India (BCCI) was established in ___________</span></p>\n",
    "options": [
      "1928",
      "1924",
      "1922",
      "1926"
    ],
    "correct_option_id": 0,
    "solution": "<p>10.(a) <strong>1928. BCCI</strong> - <span style=\"font-family: Cambria Math;\">The wealthiest governing body of cricket in the world.</span><span style=\"font-family: Cambria Math;\"><strong> Headquarters -</strong> </span><span style=\"font-family: Cambria Math;\">Wankhede Stadium (Mumbai). </span><strong><span style=\"font-family: Cambria Math;\">Important Domestic Cricket Tournaments</span></strong><span style=\"font-family: Cambria Math;\"><strong>: </strong>Ranji Trophy, Syed Mushtaq Ali Trophy, Irani Cup, Deodhar Trophy, Vijay Hazare Trophy, Duleep Trophy.</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">ICC (International Cricket Council) - Founded - 15 June 1909, Headquarters - Dubai.</span></p>\n",
    "question_index": 9
  },
  {
    "question": "<p>11. <span style=\"font-family: Cambria Math;\">Ustaad Allauddin Khan, a famous Indian musician is associated with __________ musical instrument.</span></p>\n",
    "options": [
      "Surbahar",
      "Santoor",
      "Sarod",
      "Sitar"
    ],
    "correct_option_id": 2,
    "solution": "<p>11.(c) <strong>Sarod. Ustaad Allauddin Khan: Awards</strong> <span style=\"font-family: Cambria Math;\">- Padma Bhusan (1958), Padma Vibhusan (1971), Sangeet Natak Akademi (1954).</span><span style=\"font-family: Cambria Math;\"> <strong>Other players of Sarod</strong></span><span style=\"font-family: Cambria Math;\"><strong>: </strong>Amjad Ali Khan, Ali Akbar Khan, Brij Narayan, Hafiz Ali Khan, Arnab Chakrabarty, and Partho Sarothy.</span></p>\n",
    "question_index": 10
  },
  {
    "question": "<p>12. <span style=\\\"font-family: Cambria Math;\\\">Rani - Ki - Vav (the Queen\\'s stepwell) is situated on the banks of which river?</span></p>\\n",
    "options": [
      "Ganga",
      "Yamuna",
      "Krishna",
      "Saraswati"
    ],
    "correct_option_id": 3,
    "solution": "<p>12.(d) <strong>Saraswati. Rani-ki-Vav</strong> <span style=\"font-family: Cambria Math;\">(UNESCO World Heritage Site)</span><span style=\"font-family: Cambria Math;\"> - </span><span style=\"font-family: Cambria Math;\">Its construction is attributed to Udayamati (the spouse of the 11th-century Chaulukya king Bhima - 1) in Patan (Gujarat). It is on the new 100 rupee note (coloured Lavender). </span><span style=\"font-family: Cambria Math;\"><strong>The Saraswati River</strong> </span><span style=\"font-family: Cambria Math;\">is a deified river first mentioned in the Rigveda and later in Vedic and post-Vedic texts. </span></p>\n",
    "question_index": 11
  },
  {
    "question": "<p>13.<span style=\\\"font-family: Cambria Math;\\\"> &lsquo;I2U2\\' initiative is also referred as _________ .</span></p>\\n",
    "options": [
      "East European Quad",
      "West European Quad",
      "West Asian Quad",
      "East Asian Quad"
    ],
    "correct_option_id": 2,
    "solution": "<p>13.(c) <strong>West Asian Quad. I2U2</strong> <span style=\"font-family: Cambria Math;\">(India, Israel, United States and United Arab Emirates) : </span><span style=\"font-family: Cambria Math;\">Formed </span><span style=\"font-family: Cambria Math;\">- October 2021, First summit - July 14, 2022. </span><span style=\"font-family: Cambria Math;\">Objective </span><span style=\"font-family: Cambria Math;\">- Six areas of cooperation have been identified by the countries mutually to encourage joint investments in water, energy, transportation, space, health, and food security.</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
    "question_index": 12
  },
  {
    "question": "<p>14. <span style=\"font-family: Cambria Math;\">Navreh is the lunar new year that is celebrated in which of the following states/union territories?</span></p>\n",
    "options": [
      "Sikkim",
      "Assam",
      "Manipur",
      "Jammu and Kashmir"
    ],
    "correct_option_id": 3,
    "solution": "<p>14.(d) <strong>Jammu and Kashmir. Navreh </strong>-<span style=\"font-family: Cambria Math;\"> It falls on the first day of the Chaitra Navratri. On this day Kashmiri pandits look at a bowl of rice which is considered as a symbol of riches and fertility. </span><strong><span style=\"font-family: Cambria Math;\">Traditional New Year Festivals:</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>Puthandu (Tamil Nadu), Bihu (Assam), Vishu (Kerala, Karnataka and Pondicherry).</span></p>\n",
    "question_index": 13
  },
  {
    "question": "<p>15. <span style=\"font-family: Cambria Math;\">Roger Federer is a famous player of __________ sport.</span></p>\n",
    "options": [
      "Rugby",
      "Lawn Bowls",
      "Football",
      "Lawn Tennis"
    ],
    "correct_option_id": 3,
    "solution": "<p>15.(d) <strong>Lawn Tennis.</strong> <span style=\"font-family: Cambria Math;\">Highest governing body - </span><strong><span style=\"font-family: Cambria Math;\">International Tennis Federation (1913)</span></strong><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\">Famous Players : </span><span style=\"font-family: Cambria Math;\"><strong>Tennis</strong> - </span><span style=\"font-family: Cambria Math;\">Rafael Nadal, Novak Djokovic, Serena Williams, Sania Mirza, Leander Paes, Rohan Bopanna. </span><span style=\"font-family: Cambria Math;\"><strong>Rugby</strong> -</span><span style=\"font-family: Cambria Math;\"> Jonah Lomu, Dan Carter, Richie McCaw, Gautam Dagar.</span><span style=\"font-family: Cambria Math;\"> <strong>Football </strong>- </span><span style=\"font-family: Cambria Math;\">Lionel Messi, Cristiano Ronaldo, Johan Cruyff, Neymar.<strong> </strong></span><span style=\"font-family: Cambria Math;\"><strong>Lawn Bowls</strong> -</span><span style=\"font-family: Cambria Math;\"> Jason Greenslade, Willie Wood.</span></p>\n",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
