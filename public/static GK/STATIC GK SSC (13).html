<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">28</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">56 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>

                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">

                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>

                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->

  {

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">2</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> The female devotee, Andal belonged to which part of India?&nbsp;</span></p>",

    "question_index": 1

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">3</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> Swami Vivekananda championed the supremacy of Vedantic philosophy in the Chicago (The US) Conference of World Religions held in the year ______.&nbsp;</span></p>",

    "question_index": 2

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">4</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">The Ramon Magsaysay Award was established in the year ______.&nbsp;</span></p>",

    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">4</span><span style=\\\"font-family: Cambria Math;\\\">.(a) </span><span style=\\\"font-family: Cambria Math;\\\">The Ramon Magsaysay Award was established in </span><span style=\\\"font-family: Cambria Math;\\\">1957</span><span style=\\\"font-family: Cambria Math;\\\">. </span><span style=\\\"font-family: Cambria Math;\\\">It is an annual award established to perpetuate former Philippine President Ramon Magsaysay\\'s example of integrity in governance, courageous service to the people, and pragmatic idealism within a democratic society.</span></p>",
    "question_index": 3
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">5</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">The ICTP Ramanujan Prize is awarded annually for excellence in ______.&nbsp;</span></p>",
    "options": [

    "question_index": 4

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">6</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Which of the following is an award for contribution in the field of science and technology?&nbsp;</span></p>",

    "question_index": 5
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">7</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">The Arjuna Awards are given by the Ministry of Youth Affairs and Sports to recognise outstanding achievement in sports and games. It was instituted in ______. </span></p>",

    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">7</span><span style=\"font-family: Cambria Math;\">.(c) </span><span style=\"font-family: Cambria Math;\">The&nbsp;Arjuna Awards&nbsp;are given by the Ministry of Youth Affairs and Sports to recognize outstanding achievements in sports and games. It was instituted&nbsp;in </span><span style=\"font-family: Cambria Math;\">1961</span><span style=\"font-family: Cambria Math;\">.</span></p>",
    "question_index": 6
  },
  {
    "question": "<p><span style=\"font-family: Cambria Math;\">8</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Who among the following Sikh Gurus founded the Tarn Taran Sahib?&nbsp;</span></p>",

    "question_index": 7

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">9</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Who among the following developed the Polio vaccine?&nbsp;</span></p>",

    "question_index": 8

  {

    "question_index": 9

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">11</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">&lsquo;</span><span style=\"font-family: Cambria Math;\">Swasthya Sathi</span><span style=\"font-family: Cambria Math;\">&rsquo; </span><span style=\"font-family: Cambria Math;\">scheme is the health insurance scheme that covers the entire population of which of the following states?&nbsp;</span></p>",

    "question_index": 10

  {
    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">12</span><span style=\\\"font-family: Cambria Math;\\\">.</span><span style=\\\"font-family: Cambria Math;\\\"> In connection with the issue of adoption of villages by parliamentarians, a scheme named </span><span style=\\\"font-family: Cambria Math;\\\">&lsquo;</span><span style=\\\"font-family: Cambria Math;\\\">SAGY</span><span style=\\\"font-family: Cambria Math;\\\">&rsquo; </span><span style=\\\"font-family: Cambria Math;\\\">was launched. What does the \\'A\\' in SAGY stand for?&nbsp;</span></p>",

    "question_index": 11

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">13</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">AMRUT scheme was launched under the sanitation programme in </span><span style=\"font-family: Cambria Math;\">2015</span><span style=\"font-family: Cambria Math;\">. What is the full form of AMRUT?&nbsp;</span></p>",

    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">13</span><span style=\"font-family: Cambria Math;\">.(a)</span><span style=\"font-family: Cambria Math;\"> The full form of AMRUT is Atal Mission for Rejuvenation and Urban Transformation. Jawaharlal Nehru National Urban Renewal Mission was renamed as AMRUT scheme in </span><span style=\"font-family: Cambria Math;\">2015 </span><span style=\"font-family: Cambria Math;\">with the focus to establish an infrastructure that could ensure adequate robust sewage networks and water supply for urban transformation by implementing urban revival projects.</span></p>",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">14</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> When was the flagship scheme of Skill India Mission launched in India?&nbsp;</span></p>",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">16</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> Unique Transaction Reference number is a ______ character code used to uniquely identify a transaction in the RTGS system.&nbsp;</span></p>",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">17</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> Which of the following is the application of sciences such as physics, chemistry, biology, computer science and engineering to matters of law and to the identification of various facts of civilian investigation?&nbsp;</span></p>",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">18</span><span style=\"font-family: Cambria Math;\">. </span><span style=\"font-family: Cambria Math;\">Who among the following was the founder of Homeopathy?&nbsp;</span></p>",

    "correct_option_id": 0,
    "solution": "<p><span style=\"font-family: Cambria Math;\">18</span><span style=\"font-family: Cambria Math;\">.(a)</span><span style=\"font-family: Cambria Math;\"> Samuel Hahnemann was the founder of Homeopathy. </span><span style=\"font-family: Cambria Math;\">Dr Hahnemann espoused the law of cure known as \"Similia Similibus Curentur\", or \"Like Cures Like\". It means that a remedy that produces symptoms in a healthy person will cure those with the same symptoms when manifested by a person in a diseased state.</span></p>",

  {
    "question": "<p><span style=\"font-family: Cambria Math;\">19</span><span style=\"font-family: Cambria Math;\">.</span><span style=\"font-family: Cambria Math;\"> Where is the famous pilgrim spot of Sikhs, Sri Harmandir Sahib located?&nbsp;</span></p>",

    "correct_option_id": 3,
    "solution": "<p><span style=\"font-family: Cambria Math;\">19</span><span style=\"font-family: Cambria Math;\">.(d)</span><span style=\"font-family: Cambria Math;\"> The famous pilgrim spot of Sikhs, Sri Harmandir Sahib (Golden Temple), is located in Amritsar. The gurdwara was built by the fourth Sikh Guru, Guru Ram Das, in </span><span style=\"font-family: Cambria Math;\">1577</span><span style=\"font-family: Cambria Math;\">. In </span><span style=\"font-family: Cambria Math;\">1604</span><span style=\"font-family: Cambria Math;\">, Guru Arjan placed a copy of the Adi Granth in Harmandir Sahib.</span></p>",
