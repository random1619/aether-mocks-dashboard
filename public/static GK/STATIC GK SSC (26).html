<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>

    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {

  {

    "question_index": 2

  {

    "options": [

  {
    "question": "<p>8. <span style=\"font-family: Cambria Math;\">Who among the following was a Padma Bhushan awardee, legendary Bharatanatyam exponent, theosophist and founder of the Kalaksh</span><span style=\"font-family: Cambria Math;\">etra Dance School?</span></p>\n",

    "solution": "<p><span style=\"font-family: Cambria Math;\">8</span><span style=\"font-family: Cambria Math;\">.(</span><span style=\"font-family: Cambria Math;\">c) <strong>Rukmani Devi Arundale: Awards</strong> - </span><span style=\"font-family: Cambria Math;\">Padma Bhushan (1956), Sangeet Natak Akademi Award (1957), She was nominated in 1952 by the President to be a member of the Rajya Sabha. </span><strong><span style=\"font-family: Cambria Math;\">Sonal Mansingh</span></strong><span style=\"font-family: Cambria Math;\"> (Bharatnatyam and Odissi): Award - Padma Bhusan (1992), Padma Vibhusan (2003), Sangeet Natak Akademi Awar</span><span style=\"font-family: Cambria Math;\">d (1987), founder of Centre for Indian Classical Dances (CICD) in New Delhi. </span><strong><span style=\"font-family: Cambria Math;\">Malika Sarabhai</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>(Bharatnatyam and Kuchipudi): Award - Padma Bhusan (2010), Sangeet natak Akademi award (1999- 2000). </span><strong><span style=\"font-family: Cambria Math;\">Saroja Vaidyanathan</span></strong><span style=\"font-family: Cambria Math;\"> (Bharatnatyam Dancer)</span><span style=\"font-family: Cambria Math;\">:</span><span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"><strong>Awards </strong>-</span><span style=\"font-family: Cambria Math;\"> Padma Shri</span><span style=\"font-family: Cambria Math;\"> (2002), Padma Bhushan (2013).</span></p>\n",

    "question": "<p><span style=\\\"font-family: Cambria Math;\\\">13</span><span style=\\\"font-family: Cambria Math;\\\">. </span><span style=\\\"font-family: Cambria Math;\\\">The \\'Kambala\\' fest</span><span style=\\\"font-family: Cambria Math;\\\">ival is organised by farming communities in the state of ________.</span></p>\\n",

    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">14</span><span style=\"font-family: Cambria Math;\">.(b) <strong>2020</strong>. </span><span style=\"font-family: Cambria Math;\">The first Khelo India Winter Games were held in two legs at two different venues: Leh (Ladakh), Gulmarg (Jammu and Kashmir). </span><strong><span style=\"font-family: Cambria Math;\">Events</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>include: Skiing, alpine skiing, Nordic skiing, Snow rugby, Ice Stock sport, Snow baseball, Mountaineering, Snowshoe running, Ice hockey, Figure skating, and Speed skating. 3</span><span style=\"font-family: Cambria Math;\">rd</span><span style=\"font-family: Cambria Math;\"> Khelo India Winter Game 2023: Mascot - The Snow Leopard. </span><strong><span style=\"font-family: Cambria Math;\">Winner</span></strong><span style=\"font-family: Cambria Math;\"><strong> </strong>:</span><span style=\"font-family: Cambria Math;\"> 1</span><span style=\"font-family: Cambria Math;\">st</span><span style=\"font-family: Cambria Math;\">- Jammu an</span><span style=\"font-family: Cambria Math;\">d Kashmir (26 Gold, 25 Silver, 25 Bronze). 2</span><span style=\"font-family: Cambria Math;\">nd</span><span style=\"font-family: Cambria Math;\">- Maharashtra (</span><span style=\"font-family: Cambria Math;\">13 Gold</span><span style=\"font-family: Cambria Math;\">, 8 Silver, 6 Bronze).</span></p>\n",
