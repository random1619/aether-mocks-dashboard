<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. Chariot festival is dedicated to Lord Jagannath along with Subhadra and _________ .</p>",
    "options": [
      "Balabhadra",
      "Sudama",
      "Hanuman",
      "Arjuna"
    ],
    "correct_option_id": 0,
    "solution": "<p>1.(a) <strong>Balabhadra</strong>. Lord Jagannath, his brother Balabhadra, and his sister Subhadra are a trio of deities worshiped at the Jagannath temple (Puri, Odisha). It is one of the Char Dham pilgrimage sites. The temple was built on the basis of Kalinga architecture. Jagannath temple\\'s main shrine was built by Anantavarman of the Chodaganga dynasty in the tenth century. Chariots are constructed every year with wood of specified trees like Phassi, Dhausa, etc.</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. Sports Authority of India comes under which ministry?</p>",
    "options": [
      "Ministry of Education",
      "Ministry of Social Justice",
      "Ministry of Health and Family Welfare",
      "Ministry of Youth Affairs and Sports"
    ],
    "correct_option_id": 3,
    "solution": "<p>2.(d) <strong>Ministry of Youth Affairs and Sports. </strong>Sports Authority of India : Formed in - 1984. Headquarters - Jawaharlal Nehru Stadium, Lodhi Road, Delhi. Ministry of Education - Department of School Education &amp; Literacy, Department of Higher Education. Ministry of Health and Family welfare - Department of Health &amp; Family welfare, and Department of Health Research.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. Harivarasanam award is given in the field of music by which of the following state governments?</p>",
    "options": [
      "Kerala",
      "Karnataka",
      "Maharashtra",
      "Himachal Pradesh"
    ],
    "correct_option_id": 0,
    "solution": "<p>3.(a) <strong>Kerala</strong>. The Harivarasanam Award is a music honor created by Kerala\\'s government and the Travancore Devaswom Board. It recognizes artists who use music to promote the values of Sabarimala, such as unity and equality. The award, which includes ₹1 lakh, a citation, and a plaque, is announced yearly before Sabarimala\\'s Makaravilakku festival.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. Easter festival is celebrated by which community?</p>",
    "options": [
      "Christian",
      "Parsi",
      "Hindu",
      "Sikh"
    ],
    "correct_option_id": 0,
    "solution": "<p>4.(a) <strong>Christian</strong>. Easter commemorates the resurrection of Jesus Christ and is a central celebration in Christianity. It follows the period of Lent and culminates in Holy Week, which includes Maundy Thursday, Good Friday, and Easter Sunday. Other religious communitie&rsquo;s festivals: The Parsi community celebrates events like Nowruz (New Year). Sikhs observe festivals such as Guru Nanak Jayanti (Gurpurab), and Baisakhi.</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. Ranjana Prakash Desai who became the first woman chairperson of the Press Council of India originally worked in which of the following organs of the government?</p>",
    "options": [
      "Legislature",
      "Judiciary",
      "Vigilance",
      "Executive"
    ],
    "correct_option_id": 1,
    "solution": "<p>5.(b) <strong>Judiciary</strong>. Ranjana Prakash Desai was a retired Judge of the Supreme Court of India and the head of the Delimitation Commission of India. Press Council of India (PCI): It is a statutory body created by the Press Council Act of 1978. It acts as an apex body for regulation of the press in the country.</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. With which of the following dances is Yamini Krishnamurthy associated?</p>",
    "options": [
      "Bharatanatyam",
      "Mohiniyattam",
      "Odissi",
      "Sattriya"
    ],
    "correct_option_id": 0,
    "solution": "<p>6.(a) <strong>Bharatanatyam</strong>. It is an Indian classical dance that originated in the Hindu temples of Tamil Nadu. In Bharatnatyam dance, one dancer plays various characters in a single performance, a technique known as &ldquo;ekaharya&rdquo;.<br>Yamini Krishnamurthy was an Indian classical dancer recognized for her contributions to Bharatanatyam and Kuchipudi. Her Awards: Padma Vibhushan (2016), Padma Bhushan (2001), Padma Shri (1968), and Sangeet Natak Akademi Award (1977).</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. Who among the following is the first vocalist to receive the Bharat Ratna in 2008 and is also credited to have popularised \\'Khyal Gayaki\\'?</p>",
    "options": [
      "Pandit Bhimsen Joshi",
      "Begum Akhtar",
      "Vishnu Digambar Palushkar",
      "Gangubai Hangal"
    ],
    "correct_option_id": 0,
    "solution": "<p>7.(a) <strong>Pandit Bhimsen Joshi</strong> is celebrated for his khayal singing and popular devotional music renditions, including bhajans and abhangs. He was associated with the Kirana gharana tradition of Hindustani Classical Music. His Awards: Padma Vibhushan (1999), Padma Bhushan (1985), and Sangeet Natak Akademi Fellowship (1998).</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. Pandit Omkar Nath Thakur was a student of ____________.</p>",
    "options": [
      "Ustad Abdul Karim Khan",
      "Pandit Vishnu Digambar Paluskar",
      "Pandit Gopal Shankar Mishra",
      "Pandit Vishnu Narayan Bhatkhande"
    ],
    "correct_option_id": 1,
    "solution": "<p>8.(b)<strong> Pandit Vishnu Digambar Paluskar.</strong> He was a Hindustani musician, known for singing the original version of the bhajan \"Raghupati Raghava Raja Ram\" and founded the Gandharva Mahavidyalaya in 1901. Pandit Omkarnath Thakur, a noted music teacher, musicologist, and Hindustani classical singer, was associated with the Gwalior Gharana, the oldest Khayal Gayaki style.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. Navratri festival is dedicated to which of the following Goddesses?</p>",
    "options": [
      "Jawala",
      "Laxmi",
      "Durga",
      "Saraswati"
    ],
    "correct_option_id": 2,
    "solution": "<p>9.(c) <strong>Durga</strong>. Navratri, meaning &lsquo;nine nights&rsquo; in Sanskrit, is a festival where people fast and pray to the nine forms of Goddess Durga, an incarnation of Parvati, who defeated Mahishasura. The two popular folk dances of Gujarat, the Garba and Dandia are performed by both men and women during this occasion on every night.</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. Vijender Singh has represented India in Olympics for how many times?</p>",
    "options": [
      "4",
      "5",
      "3",
      "2"
    ],
    "correct_option_id": 2,
    "solution": "<p>10.(c) <strong>3.</strong> Vijender Singh, an Indian professional boxer, made history as the first Indian boxer to win an Olympic medal, earning bronze at the 2008 Beijing Olympics. He also won bronze at the 2009 World Championships and 2010 Commonwealth Games, along with silver at the 2006 and 2014 Commonwealth Games, all in the middleweight category.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. In which sport did India win its first individual Olympic medal?</p>",
    "options": [
      "Swimming",
      "Judo",
      "Wrestling",
      "Shooting"
    ],
    "correct_option_id": 2,
    "solution": "<p>11.(c) <strong>Wrestling</strong>. K.D. Jadhav was India&rsquo;s first athlete from independent India to win an individual Olympic medal, securing bronze in wrestling at the 1952 Helsinki Olympics. India sent its first team to the Summer Olympic Games in 1920 and won its first gold medal in 1928 in field hockey (team event). The first Indian to win an individual gold medal at the Olympic Games was Abhinav Bindra.</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. Who among the following classical dancers is NOT related to Odissi?</p>",
    "options": [
      "Geetanjali Lal",
      "Mayadhar Raut",
      "Kiran Segal",
      "Kumkum Mohanty"
    ],
    "correct_option_id": 0,
    "solution": "<p>12.(a) <strong>Geetanjali Lal.</strong> She is an Indian Kathak dancer and choreographer. Indian classical dance (Shastriya Nritya) includes various regionally specific traditions rooted in Hindu musical theatre, tracing back to the Sanskrit text Natya Shastra. Odissi, also known as Orissi in older literature, is a major classical dance that originated in the temples of Odisha, an eastern coastal state of India. Notable Odissi dancers include Kelucharan Mohapatra, Deba Prasad Das, Madhavi Mudgal, Sonal Mansingh, Pankaj Charan Das, Aruna Mohanty, and Ileana Citaristi.</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. Tarun Bhattacharya, who was awarded the Sangeet Natak Akademi Award in 2018, is known for playing which musical instrument?</p>",
    "options": [
      "Santoor",
      "Violin",
      "Tabla",
      "Sitar"
    ],
    "correct_option_id": 0,
    "solution": "<p>13.(a) <strong>Santoor</strong>. The Indian santoor is a trapezoid-shaped hammered dulcimer, a variation of the Iranian santoor. Notable Indian santoor players include Pandit Shivkumar Sharma, Pandit Bhajan Sopori, and Pandit Ulhas Bapat. The Sangeet Natak Akademi Award, or Akademi Puraskar, is the highest Indian honor for performing arts, conferred by the Sangeet Natak Akademi, India\\'s National Academy of Music, Dance, and Drama.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. Agricultural shot is a term used in which of the following sports?</p>",
    "options": [
      "Lawn Tennis",
      "Cricket",
      "Football",
      "Table Tennis"
    ],
    "correct_option_id": 1,
    "solution": "<p>14.(b) <strong>Cricket</strong>. An \\\"agricultural shot\\\" in cricket refers to a poorly played shot by a batsman. It is usually a risky shot that doesn\\'t make the most of the chance to score runs. Other terms in cricket: Bowled, LBW (Leg Before Wicket), Duck, Yorker, Chinaman, Cover drive, and Square-Cut.</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. Pandwani singer Usha Barle was conferred with which of the following awards by the Government of India in 2023?</p>",
    "options": [
      "Padma Vibhushan",
      "Bharat Ratna",
      "Padma Bhushan",
      "Padma Shri"
    ],
    "correct_option_id": 3,
    "solution": "<p>15.(d) <strong>Padma Shri. </strong>Usha Barle is an Indian Pandavani folk singer, of a traditional performing folk art from Chhattisgarh. She is known for her performances in the Kapalik style. Pandavani is a folk singing style that involves the narration of tales from the ancient Indian epic Mahabharata. Some artists who perform Pandavani: Teejan Bai, <br>Jhaduram Devangan, Ritu Verma, and Shantibai Chelak.</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
