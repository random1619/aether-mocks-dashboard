<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. Giddha dance is a folk dance of which of the following states?</p>",
    "options": [
      "Manipur",
      "Punjab",
      "Nagaland",
      "Odisha"
    ],
    "correct_option_id": 1,
    "solution": "<p>1.(b) <strong>Punjab.</strong> Gidda is performed by women during social gatherings. Other folk dances of Punjab : Bhangra, Daff, Luddi, Jaago, Dhamal. Manipur - Khamba Thoibi, Pung Cholom, Nupa Pala. Nagaland - Kuki, Rengma Naga, Konyak. Odisha - Ghumura, Sambalpuri, Ranappa, Gotipua.</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. Which of the following occupies less memory when saving an MS-Word file?</p>",
    "options": [
      ".docx",
      ".docm",
      ".doc",
      ".docc"
    ],
    "correct_option_id": 0,
    "solution": "<p>2.(a) <strong>.docx</strong> file is a Microsoft Word document saved in the Open XML format. The .docx file extension is a combination of the words \"doc\" and \"xml\" and is an evolution of the older .doc format.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. According to the International Football Association Board (IFAB), which colour must the football goal post be?</p>",
    "options": [
      "Blue",
      "White",
      "Red",
      "Black"
    ],
    "correct_option_id": 1,
    "solution": "<p>3.(b) <strong>White.</strong> Goal-posts and cross-bars must be made of wood, metal or other approved materials. They may be square, rectangular, round, half-round or elliptical in shape. The International Football Association Board (IFAB) is an international self-regulatory body of association football that is known for determining the Laws of the Game, the regulations for the gameplay of football.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. Who is the Indian batsman after whom the Ranji Trophy is named?</p>",
    "options": [
      "Ranjit Singh Bedi",
      "Ranjit Sinhji",
      "Ranjit Patel",
      "Ranjit Wadekar"
    ],
    "correct_option_id": 1,
    "solution": "<p>4.(b) <strong>Ranjit Sinhji.</strong> He was ruler of the princely state of Nawanagar (Gujarat) from 1907 to 1933. Ranji Trophy was started by the Board of Control for Cricket in India (BCCI) in 1934 after his death in 1933. The Ranji Trophy is a premier domestic first-class cricket championship played in India and organized annually by the BCCI (Headquarters - Mumbai).</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. Where is the ITC Sangeet Research Academy located?</p>",
    "options": [
      "Kolkata",
      "Delhi",
      "Bengaluru",
      "Indore"
    ],
    "correct_option_id": 0,
    "solution": "<p>5.(a) <strong>Kolkata.</strong> ITC Sangeet Research Academy (ITCSRA) is a Hindustani classical music academy run by the corporate house, ITC Limited. Formation - 1978. Objective - The creation of an effective training system, to rationalise traditional data with the help of modern research methods.</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. What is the minimum over rate per hour in a test match?</p>",
    "options": [
      "17 overs per hour",
      "13 overs per hour",
      "15 over per hour",
      "10 overs per hour"
    ],
    "correct_option_id": 2,
    "solution": "<p>6.(c) <strong>15 over per hour.</strong> In ODIs, bowling teams must complete the required 50 overs in 3.5 hours, or a minimum of 14.28 overs per hour. For T20s, the requirement is 14.11 overs per hour, according to ICC&rsquo;s rules.</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. Bharat Muni, in his Natya Shastra, categorises musical instruments into four different&nbsp;parts. What is the categorisation of musical instruments by Bharat Muni based on?</p>",
    "options": [
      "Different sounds of the musical instruments",
      "The shape of the musical instruments",
      "Different materials used in the musical instruments",
      "The uses of the musical instruments in different occasions, such as wedding, festivals and public gathering"
    ],
    "correct_option_id": 0,
    "solution": "<p>7.(a) <strong>Different sounds of the musical instruments.</strong> Musical Instruments were categorised into four groups in Bharat Muni\\'s Natya Shastra (written between 200 BC and 200 AD): Avanaddha Vadya (membranophones or percussion instruments), Ghan Vadya (idiophones or solid instruments), Sushir Vadya (aerophones or wind instruments), and Tat Vadya (chordophones or stringed instruments).</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. Which was the first programmable general purpose computer in the world?</p>",
    "options": [
      "ENIAC",
      "Mark I",
      "Napier\\'s bones",
      "Pascaline"
    ],
    "correct_option_id": 0,
    "solution": "<p>8.(a) <strong>ENIAC.</strong> Designed by John Mauchly and J. Presper Eckert. Mark I was designed in 1937 by Harvard graduate student Howard H. Aiken to solve advanced mathematical physics problems. Napier\\'s bones is a manually-operated calculating device created by John Napier. Pascaline world\\'s first calculator invented by mathematician Pascal.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. Which classical dance was introduced by the great Vaishnava saint and reformer of Assam?</p>",
    "options": [
      "Kathak",
      "Kuchipudi",
      "Sattriya",
      "Odissi"
    ],
    "correct_option_id": 2,
    "solution": "<p>9.(c) <strong>Sattriya.</strong> The Sattriya dance form was introduced in the 15th century A.D by Mahapurusha Sankaradeva. It became popular as a part of the Vaishnava Bhakti Movement in Sattra (Hindu monasteries). Famous Sattriya Dancers: Late Pradip Chaliha, Jatin Goswami, Anita Sharma, Guru Indira P.P Bora. Costumes used in Sattriya: The male dancer wears a dhoti, chadar, and pagri (turban). The female dancer wears white flowers, chadar, ghuri, kanchi (waist cloth).</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. Which country&rsquo;s national game is Chinlone (Caneball)?</p>",
    "options": [
      "Myanmar",
      "China",
      "Afghanistan",
      "Bhutan"
    ],
    "correct_option_id": 0,
    "solution": "<p>10.(a) <strong>Myanmar.</strong> The Chinlone game is non-competitive, with typically six people playing together as one team. Other countries\\' National Game : China - Table tennis; Afghanistan - Buzkashi; Bhutan - Archery; Pakistan - Field Hockey; Bangladesh - Kabaddi; Nepal - Volleyball. India had not declared any sport or game as the national sport.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. Which feature in MS Word allows you to see a document\\'s layout and formatting as it will appear when printed?</p>",
    "options": [
      "Screen View",
      "Draft View",
      "Print Preview",
      "Reading View"
    ],
    "correct_option_id": 2,
    "solution": "<p>11.(c) <strong>Print Preview. </strong>Draft View: Simplified view for editing, without layout details. Reading View: Optimized for on-screen reading, not editing. Shortcut Keys : Open a document - Ctrl+O ; Create a new document - Ctrl+N ; Save the document - Ctrl+S ; Close the document - Ctrl+W.</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. On 12 September 2002, ISRO launched the Kalpana-1 satellite using the Polar Satellite Launch Vehicle. What is the application of this satellite?</p>",
    "options": [
      "Earth observation",
      "Planetary observation",
      "Climate &amp; environment communication",
      "Disaster management system"
    ],
    "correct_option_id": 2,
    "solution": "<p>12.(c) <strong>Climate &amp; environment communication. </strong>Kalpana-1 satellite was originally known as MetSat-1. Launched by vehicle PSLV - C4. On February 5, 2003 it was renamed to Kalpana-1 by the Indian Prime Minister Atal Bihari Vajpayee in memory of Kalpana Chawla (NASA astronaut who perished in the Space Shuttle Columbia disaster).</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. What is the standard weight of hammer for women in the hammer throw event?</p>",
    "options": [
      "5 kg",
      "4 kg",
      "8 kg",
      "6 kg"
    ],
    "correct_option_id": 1,
    "solution": "<p>13.(b) <strong>4 kg.</strong> The hammer throw is one of the four throwing events in track and field, along with the discus throw, shot put, and javelin. The hammer consists of a metal ball attached to a grip by a steel wire, with the throw taking place within a 2.135-meter diameter circle. For the throw to be valid, the hammer must land within a 35-degree sector. The standard weight of hammer for men athletes is 7.26kg.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. What does SAARC stand for?</p>",
    "options": [
      "South Asian Association of Regional Climate change",
      "South Asian Association for Regional Cooperation",
      "South Asian Association of Regional Cartography",
      "South Asian Association of Regional Corporation"
    ],
    "correct_option_id": 1,
    "solution": "<p>14.(b) <strong>South Asian Association for Regional Cooperation </strong>- Established in Dhaka on 8 December 1985. Afghanistan became the newest member of SAARC at the 13th annual summit in 2005. Headquarters - Kathmandu, Nepal. Eight member States : Afghanistan, Bangladesh, Bhutan, India, Maldives, Nepal, Pakistan, Sri Lanka.</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. Dussehra festival is celebrated in which of the following Hindu months?</p>",
    "options": [
      "Vaisakha",
      "Ashwin",
      "Ashadha",
      "Chaitra"
    ],
    "correct_option_id": 1,
    "solution": "<p>15.(b) <strong>Ashwin.</strong> Other Hindu festivals according to the Hindu calendar : Holi is celebrated in the Phalguna month (February - March). Makar Sankranti is celebrated in the month of Magh (January). Raksha Bandhan is celebrated on the full moon day (Purnima) of the Shravana month (July - August). Deepawali is celebrated every year on the 15th lunar day of the Kartik month (October - November).</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
