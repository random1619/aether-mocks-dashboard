<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. When was the Rajiv Gandhi Khel Ratna Award renamed as the Major Dhyan Chand Khel Ratna Award?</p>",
    "options": [
      "6th August 2022",
      "5th January 2022",
      "6th August 2021",
      "5th January 2021"
    ],
    "correct_option_id": 2,
    "solution": "<p>1.(c) <strong>6th August 2021. </strong>The Rajiv Gandhi Khel Ratna Award, established in 1992, is presented annually by the Ministry of Youth Affairs and Sports, Government of India, to recognize exceptional achievements by Indian athletes globally. The award consists of a medal, certificate, and a cash prize of ₹25 lakh. National Sports Day is observed every year on August 29th to commemorate the birth anniversary of Major Dhyan Chand, a legendary hockey player.</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. Where was the first women&rsquo;s international test cricket match hosted in India in 1976?</p>",
    "options": [
      "New Delhi",
      "Bangalore",
      "Mumbai",
      "Kolkata"
    ],
    "correct_option_id": 1,
    "solution": "<p>2.(b) <strong>Bangalore.</strong> India hosted its first women\\'s international Test cricket match against the West Indies on October 31, 1976, at M. Chinnaswamy Stadium in Bangalore. The Six-test series ended in a 1&ndash;1 draw. India secured its first Test victory in the fourth match in Patna on November 19, led by Shantha Rangaswamy, the first women\\'s cricket captain of India. The inaugural Women\\'s Cricket World Cup was held in England in 1973.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. Kajari Mahotsav is primarily celebrated in which of the following districts of Uttar Pradesh?</p>",
    "options": [
      "Mirzapur",
      "Gorakhpur",
      "Kushi Nagar",
      "Jhansi"
    ],
    "correct_option_id": 0,
    "solution": "<p>3.(a) <strong>Mirzapur. </strong>The festival is celebrated in honor of King Kantit Naresh\\'s daughter, Kajali, renowned for her melodious love songs. Other major festivals in Uttar Pradesh include Ganga Mahotsav in Varanasi and Taj Mahotsav in Agra.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. Matki dance is the famous folk dance associated with which of the following states?</p>",
    "options": [
      "Punjab",
      "Gujarat",
      "Madhya Pradesh",
      "Maharashtra"
    ],
    "correct_option_id": 2,
    "solution": "<p>4.(c) <strong>Madhya Pradesh.</strong> The \"Matki Dance,\" performed using a small pitcher, is particularly popular in the Malwa region of Madhya Pradesh. Other traditional dances of Madhya Pradesh include Jawara, Grida, Chaitra, Kaksar, Karma, Maanch, Tertali, Pardhoni, and Kanara.</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. Annapurna Devi is associated with which of the following musical instruments?</p>",
    "options": [
      "Rudra Veena",
      "Taal",
      "Ektara",
      "Surbahar"
    ],
    "correct_option_id": 3,
    "solution": "<p>5.(d) <strong>Surbahar.</strong> The surbahar, often called the bass sitar, is a stringed instrument used in Hindustani classical music with a lower pitch than the sitar. Annapurna Devi, a notable musician of the Maihar gharana, was honored with the Padma Bhushan in 1977, Sangeet Natak Akademi Award in 1991. Other Surbahar Exponents - Ustad Imrat Khan, Buddhaditya Mukherjee, Pushparaj Koshti, Kushal Das.</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. Under Pradhan Mantri Fasal Bima Yojana, the maximum premium payable by the farmers will be _________ for all kharif food and oilseeds crops.</p>",
    "options": [
      "4%",
      "2%",
      "6%",
      "8%"
    ],
    "correct_option_id": 1,
    "solution": "<p>6.(b) <strong>2%.</strong> The Pradhan Mantri Fasal Bima Yojana (PMFBY), launched on 18 February 2016 by Prime Minister Narendra Modi, is an insurance service for farmers\\' crops. It follows the \\\"One Nation&ndash;One Scheme\\\" concept, replacing the earlier National Agriculture Insurance Scheme and Modified National Agricultural Insurance Scheme.</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. What is the primary objective of the \\'Standup India\\' initiative?</p>",
    "options": [
      "To boost the manufacturing sector",
      "To promote digital transactions nationwide",
      "To facilitate bank loans for SC/ST and women entrepreneurs",
      "To support all types of startups"
    ],
    "correct_option_id": 2,
    "solution": "<p>7.(c) Stand-Up India, launched on April 5, 2016, promotes entrepreneurship among women and SC/ST communities. It offers bank loans from ₹10 lakh to ₹1 crore for setting up greenfield enterprises in manufacturing, trading, or services sectors. The initiative aims to foster economic growth and create jobs by supporting marginalized groups in business ventures.</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. Who among the following is/was a famous sitarist?</p>",
    "options": [
      "Ravi Shankar",
      "Ustad Bismillah Khan",
      "Pandit Bhimsen Joshi",
      "Zakir Hussain"
    ],
    "correct_option_id": 0,
    "solution": "<p>8.(a) <strong>Ravi Shankar.</strong> He was an Indian musician and founder of the National Orchestra of India, who was influential in stimulating Western appreciation of Indian music. His Awards: Bharat Ratna (1999), Padma Vibhushan (1981), Padma Bhushan (1967), and Grammy Award (1968) for Best Chamber Music Performance for his work \"West Meets East.\"</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. Indian classical violinist Annavarapu Rama Swamy was awarded with the _____________ in 2021.</p>",
    "options": [
      "Padma Shri",
      "Sangeet Natak Akademi",
      "Padma Vibhushan",
      "Padma Bhushan"
    ],
    "correct_option_id": 0,
    "solution": "<p>9.(a)<strong> Padma Shri (2021).</strong> Dr. Annavarapu Ramaswamy, a renowned Indian classical violinist from Andhra Pradesh, is noted for his contributions to music, including the invention of new Ragas and Talas such as Vandana Raga, Sri Durga Raga, Tinetradi Tala, and Vedadi Tala.</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. Which of the following states was the overall champion in both men and women categories in the first Janjatiya Khel Mahotsav?</p>",
    "options": [
      "Maharashtra",
      "Chhattisgarh",
      "Jharkhand",
      "Odisha"
    ],
    "correct_option_id": 3,
    "solution": "<p>10.(d) <strong>Odisha.</strong> The first Janjatiya Khel Mahotsav, a grand sporting event jointly hosted by the Ministry of Culture, the Odisha Government, and KIIT University, concluded in Bhubaneswar. The first edition attracted the participation of 5,000 tribal athletes and 1,000 officials from 26 states.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. Who was the first Indian woman wrestler to represent the country at the 2012 London Olympic Games?</p>",
    "options": [
      "Babita Phogat",
      "Sakshi Malik",
      "Vinesh Phogat",
      "Geeta Phogat"
    ],
    "correct_option_id": 3,
    "solution": "<p>11.(d) <strong>Geeta Phogat.</strong> She is a freestyle wrestler who won India\\'s first-ever gold medal in wrestling in the 55kg freestyle category at the 2010 Commonwealth Games for India. Her Award: Arjuna Award (2012).</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. Padayani&rsquo;, a local dance form primarily performed in ________ to please Goddess Bhadrakali.</p>",
    "options": [
      "Assam",
      "Kerala",
      "Odisha",
      "West Bengal"
    ],
    "correct_option_id": 1,
    "solution": "<p>12.(b) <strong>Kerala.</strong> Padayani literally means &ldquo;row of warriors&rdquo; is a dance. It is regarded as a remnant of the Dravidian forms of worship that existed before the advent of Brahmanism. The percussion instruments used are padayani thappu, chenda, para and kumbham. Other dances of Kerala : Mudiyettu, Thiruvathirakali, Kolkali, Oppana, Kummattikali, Chavittu Natakam.</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. Which Indian musician from Maharashtra received the Padma Vibhushan 2023 ?</p>",
    "options": [
      "Ramdas Palsule",
      "Bharat Kamat",
      "Zakir Hussain",
      "Milind Date"
    ],
    "correct_option_id": 2,
    "solution": "<p>13.(c) <strong>Zakir Hussain </strong>(tabla player). Awards - Padma Shri (1988), Padma Bhushan (2002), Sangeet Natak Akademi Award (1991), Kalidas Samman (2006). Other Maestro Of Tabla: Pandit Ramdas Palsule, Bharat Kamat, AllaRakha Khan. Flautist - Milind Date, Hariprasad Chaurasi, Pandit Ronu Majumdar.</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. Raja Bhalindra Singh trophy is associated with which of the following national sports events?</p>",
    "options": [
      "Khelo India Youth Games",
      "Khelo India Winter Games",
      "Khelo India University Games",
      "National Games"
    ],
    "correct_option_id": 3,
    "solution": "<p>14.(d) <strong>National Games.</strong> The National Games are organized by the Indian Olympic Association (IOA). The IOA is responsible for the regulations of the games. IOA: Founded - 1927, Headquarter - New Delhi. First National Games organised in Lahore (1924). First Modern National Games - New Delhi (1985). 37th National Games - Goa ( October 2023).</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. The renowned ghazal singer Girija Devi was born in ________.</p>",
    "options": [
      "Karnataka",
      "Bihar",
      "Uttar Pradesh",
      "Punjab"
    ],
    "correct_option_id": 2,
    "solution": "<p>15.(c) <strong>Uttar Pradesh.</strong> Girija Devi was a Thumri singer of the Senia and Banaras gharanas. She was dubbed as the \\'Queen of Thumri\\' for her contribution in the genre. Awards : Padma Shri (1972), Padma Bhushan (1989), Padma Vibhushan (2016), Sangeet Natak Akademi Award (1977), Sangeet Natak Akademi Fellowship (2010).</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
