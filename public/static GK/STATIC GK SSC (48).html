<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1.<span style=\"font-family: Cambria Math;\"> &lsquo;Mudiyettu&rsquo; is a traditional folk theatre form of which Indian state?</span></p>\n",
    "options": [
      "Manipur",
      "Kerala",
      "Jharkhand",
      "Assam"
    ],
    "correct_option_id": 1,
    "solution": "<p>1.(b) Kerala Folk theater &rArr; <span style=\"font-family: Cambria Math;\">Mudiyettu, Bhagavati Pattu, Tolpavakoothu, Pavakathakali, Chavittu Nadakam, Oppana, Kathakali, Margamkali, Duffmuttu, Koodiyattam, Kolkali, Parichamuttukali, Chakyarkoothu, Krishnanattam, Mohiniyaattam, Kummattikali. </span></p>\n",
    "question_index": 0
  },
  {
    "question": "<p>2.<span style=\"font-family: Cambria Math;\"> Rohini Bhate, recipient of Kalidas Samman was ass</span><span style=\"font-family: Cambria Math;\">ociated with which classical dance </span><span style=\"font-family: Cambria Math;\">of</span><span style=\"font-family: Cambria Math;\"> India?</span></p>\n",
    "options": [
      "Odissi",
      "Manipuri",
      "Sattriya",
      "Kathak"
    ],
    "correct_option_id": 3,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">2.(</span><span style=\\\"font-family: Cambria Math;\\\">d) Rohini Bhate</span><span style=\\\"font-family: Cambria Math;\\\">, recipient of Kalidas Samman (2001) was associated with Kathak classical dance of India. Her Awards &rArr; </span><span style=\\\"font-family: Cambria Math;\\\">1977: State government\\'s Maharashtra Rajya Puraskar, 1979: Sangeet Natak Akademi Award, 1990: Maharashtra Gaurav Puraskar.</span></p>\\n",
    "question_index": 1
  },
  {
    "question": "<p>3.<span style=\"font-family: Cambria Math;\"> What was the former n</span><span style=\"font-family: Cambria Math;\">ame of the Yamuna Expressway Project constructed in </span><span style=\"font-family: Cambria Math;\">Uttar </span><span style=\"font-family: Cambria Math;\">Pradesh, India?</span></p>\n",
    "options": [
      "Purvanchal Expressway",
      "Taj Expressway",
      "Noida-Agra Expressway",
      "Kennedy Expressway"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">3.(</span><span style=\\\"font-family: Cambria Math;\\\">b) </span><span style=\\\"font-family: Cambria Math;\\\">Taj Expressway was the former name of Yamuna Expressway. It is presently India\\'s 3rd longest expressway since February 2017. Purvan</span><span style=\\\"font-family: Cambria Math;\\\">chal Expressway is the longest expressway in India.</span></p>\\n",
    "question_index": 2
  },
  {
    "question": "<p>4.<span style=\"font-family: Cambria Math;\"> &lsquo;Straight from the Heart&rsquo; is the autobiography of which of the following famous </span><span style=\"font-family: Cambria Math;\">personalities</span><span style=\"font-family: Cambria Math;\">?</span></p>\n",
    "options": [
      "Sachin Tendulkar",
      "Rahul Dravid",
      "Kapil Dev",
      "Sunil Gavaskar"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\"font-family: Cambria Math;\">4.(</span><span style=\"font-family: Cambria Math;\">c) Kapil Dev</span><span style=\"font-family: Cambria Math;\">- &lsquo;Straight from the Heart&rsquo;,</span><span style=\"font-family: Cambria Math;\"> Sachin Tendulkar</span><span style=\"font-family: Cambria Math;\">- &lsquo; Playing it my Way&rsquo;,</span><span style=\"font-family: Cambria Math;\"> Rahul Dravid</span><span style=\"font-family: Cambria Math;\">- &lsquo;The Nice Guy Who Finished First&rsquo;, </span><span style=\"font-family: Cambria Math;\">Sunil Gavaskar</span><span style=\"font-family: Cambria Math;\"> - &lsquo;Sunny Days&rsquo;. </span></p>\n",
    "question_index": 3
  },
  {
    "question": "<p>5.<span style=\"font-family: Cambria Math;\"> Which of the following is a work by famous Indian author Khushwant Singh?</span></p>\n",
    "options": [
      "A Suitable Boy",
      "Train to Pakistan",
      "The Guide",
      "Sacred Games"
    ],
    "correct_option_id": 1,
    "solution": "<p><span style=\"font-family: Cambria Math;\">5.(</span><span style=\"font-family: Cambria Math;\">b) Khushwant Singh </span><span style=\"font-family: Cambria Math;\">- Train to Pakistan, </span><span style=\"font-family: Cambria Math;\">Vikram Seth</span><span style=\"font-family: Cambria Math;\"> - A Suitable Boy, </span><span style=\"font-family: Cambria Math;\">R. K Narayan</span><span style=\"font-family: Cambria Math;\">- The Guide,&nbsp; </span><span style=\"font-family: Cambria Math;\">Vikram Chandra</span><span style=\"font-family: Cambria Math;\">- Sacred Games.</span><span style=\"font-family: Cambria Math;\"> </span></p>\n",
    "question_index": 4
  },
  {
    "question": " <p>6. </span><span style=\"font-family:Cambria Math\">As per the 2011 census, what was the percentage of the urban population in India?</span></p>",
    "options": [
      "Between 30% and 35%",
      "Between 40% and 45%",
      "Between 10% and 15%",
      "Between 20% and 25%"
    ],
    "correct_option_id": 0,
    "solution": " <p><span style=\"font-family:Cambria Math\">6.(</span><span style=\"font-family:Cambria Math\">a)</span><span style=\"font-family:Cambria Math\"> As per the 2011 census, the percentage of the urban population in India was between 30% and 35 %. Of the 1.21 billion Indians, 833 million (68.84%) live in rural areas while 377 million stay in urban areas.</span></p>",
    "question_index": 5
  },
  {
    "question": " <p>7. </span><span style=\"font-family:Cambria Math\">The Chera Panhara ritual is associated with:</span></p>",
    "options": [
      "Baisakhi in Punjab",
      "Durga Puja in West Bengal",
      "Navratri in Gujarat",
      "Rath Yatra in Odisha"
    ],
    "correct_option_id": 3,
    "solution": " <p><span style=\"font-family:Cambria Math\">7.(</span><span style=\"font-family:Cambria Math\">d)</span><span style=\"font-family:Cambria Math\">  The Chera Panhara ritual  is the most famous ritual associated with the Jagannath Puri Rath Yatra. The Gajapati Maharaja </span><span style=\"font-family:Cambria Math\">perform</span><span style=\"font-family:Cambria Math\"> the Chhera Pahanra, which involves sweeping of the decks of the chariots with a gold-plated broomstick on Rath Yatr</span><span style=\"font-family:Cambria Math\">a.</span></p>",
    "question_index": 6
  },
  {
    "question": "<p>8.<span style=\"font-family: Cambria Math;\"> &lsquo;Elelakkaradi&rsquo; is a tribal dance f</span><span style=\"font-family: Cambria Math;\">orm of which Indian state?</span></p>\n",
    "options": [
      "Goa",
      "Kerala",
      "Rajasthan",
      "Jharkhand"
    ],
    "correct_option_id": 1,
    "solution": "<p>8.(b) Eight Tribal Dances of India &rArr;<span style=\"font-family: Cambria Math;\"> </span><span style=\"font-family: Cambria Math;\"> Ele</span><span style=\"font-family: Cambria Math;\">lakkaradi Dance &rarr;&nbsp;</span><span style=\"font-family: Cambria Math;\"> Kerala, Santhali Dance &rarr; </span><span style=\"font-family: Cambria Math;\">West Bengal, Jharkhand &amp; Odisha, Bamboo Dance</span><span style=\"font-family: Cambria Math;\"> &rarr; Mizoram, Kalbelia Dance &rarr;</span><span style=\"font-family: Cambria Math;\"> Rajasthan, Bhagoria Dance &rarr;</span><span style=\"font-family: Cambria Math;\"> Madhya Pradesh, Chhau Dance &rarr;&nbsp;</span><span style=\"font-family: Cambria Math;\"> West Bengal, Jharkhand &amp; Odisha, Dhimsa Dance &rarr;&nbsp;</span><span style=\"font-family: Cambria Math;\"> Andhra Pradesh, Shad Suk Mynsiem &rarr;&nbsp;</span><span style=\"font-family: Cambria Math;\"> Meghalaya.</span></p>\n",
    "question_index": 7
  },
  {
    "question": "<p>9. <span style=\\\"font-family: Cambria Math;\\\">What is the stone-like disc seen at the top of the temple in Odisha and nearby </span><span style=\\\"font-family: Cambria Math;\\\">district\\'s </span><span style=\\\"font-family: Cambria Math;\\\">Temple architecture called?</span></p>\\n",
    "options": [
      "Kalasha",
      "Antarala",
      "Amalaka",
      "Jagati"
    ],
    "correct_option_id": 2,
    "solution": "<p><span style=\\\"font-family: Cambria Math;\\\">9.(</span><span style=\\\"font-family: Cambria Math;\\\">c) </span><span style=\\\"font-family: Cambria Math;\\\">&lsquo;</span><span style=\\\"font-family: Cambria Math;\\\">Amalaka</span><span style=\\\"font-family: Cambria Math;\\\">&rsquo; is one of the important elements of Temple Shikha</span><span style=\\\"font-family: Cambria Math;\\\">ra (Tower) in Nagara Shaili usually found in Uttara Bharatha. A mandir &lsquo;</span><span style=\\\"font-family: Cambria Math;\\\">kalash</span><span style=\\\"font-family: Cambria Math;\\\">&rsquo; is a metal or stone spire used to top the domes of Hindu temples. &lsquo;</span><span style=\\\"font-family: Cambria Math;\\\">Antarala&rsquo; </span><span style=\\\"font-family: Cambria Math;\\\">is a small antechamber or foyer between the garbhagriha (shrine) and the mandapa, more typical of n</span><span style=\\\"font-family: Cambria Math;\\\">orth Indian temples. In Hindu temple architecture, the </span><span style=\\\"font-family: Cambria Math;\\\">&lsquo;jagati\\' </span><span style=\\\"font-family: Cambria Math;\\\">is the raised surface of the platform or terrace upon which some Buddhist or Hindu temples are built.</span></p>\\n",
    "question_index": 8
  },
  {
    "question": " <p>10</span><span style=\"font-family:Cambria Math\">. </span><span style=\"font-family:Cambria Math\">Who among the following has sung the famous Bollywood song ‘Chan</span><span style=\"font-family:Cambria Math\">na Mereya’?</span></p>",
    "options": [
      "Neeti Mohan",
      "Arijit Singh",
      "Shreya Ghoshal",
      "Sukhbir"
    ],
    "correct_option_id": 1,
    "solution": " <p>10</span><span style=\"font-family:Cambria Math\">.(b) </span><span style=\"font-family:Cambria Math\">Channa Mereya was sung by Arijit Singh. </span></p>",
    "question_index": 9
  },
  {
    "question": " <p>11</span><span style=\"font-family:Cambria Math\">. </span><span style=\"font-family:Cambria Math\">Who among the following is the co-founder of Darpana Academy of Performing Arts?</span></p>",
    "options": [
      "Pt. Birju Maharaj",
      "Uday Shankar",
      "Mallika Sarabhai",
      "Mrinalini Sarabhai"
    ],
    "correct_option_id": 3,
    "solution": " <p>11</span><span style=\"font-family:Cambria Math\">.(d) Mrinalini Sarabhai </span><span style=\"font-family:Cambria Math\">(Bharatnatyam) is the co-founder of Darpana Academy of Performing Arts. </span><span style=\"font-family:Cambria Math\">Birju Maharaj</span><span style=\"font-family:Cambria Math\"> is the Father of Kathak and exponent of the Lucknow \"Kalka-Bindadin\" Gharana.</span><span style=\"font-family:Cambria Math\"> Uday Shankar</span><span style=\"font-family:Cambria Math\"> is known as the Father of Dance </span><span style=\"font-family:Cambria Math\">In</span><span style=\"font-family:Cambria Math\"> India. </span><span style=\"font-family:Cambria Math\">Mallika Sarabhai</span><span style=\"font-family:Cambria Math\"> is a noted Kuchipudi</span><span style=\"font-family:Cambria Math\"> and Bharatanatyam dancer.</span></p>",
    "question_index": 10
  },
  {
    "question": " <p>12</span><span style=\"font-family:Cambria Math\">.</span><span style=\"font-family:Cambria Math\"> Sonal Mansingh was awarded the Sangeet Natak Akademi Award in 1987. She is a trained ______ dancer.</span></p>",
    "options": [
      "Manipuri",
      "Kuchipudi",
      "Odissi",
      "Bihu"
    ],
    "correct_option_id": 2,
    "solution": " <p>12</span><span style=\\\"font-family:Cambria Math\\\">.(c)</span><span style=\\\"font-family:Cambria Math\\\"> Sonal Mansingh → Famous Odissi Dancer. Guru Pankaj Charan Das is known</span><span style=\\\"font-family:Cambria Math\\\"> as the \\'Father of Odissi dance\\'. Some more famous Odissi dancers </span><span style=\\\"font-family:Cambria Math\\\">are  →</span><span style=\\\"font-family:Cambria Math\\\"> Jhelum Paranjape,Mayadhar Raut, Gangadhar Pradhan, Leana Citaristi, Leena Mohanty, Chitra Krishnamurti, Bijayini Satpathy, Madhavi Mudgal etc.</span></p>",
    "question_index": 11
  },
  {
    "question": " <p>13</span><span style=\"font-family:Cambria Math\">.</span><span style=\"font-family:Cambria Math\"> As per Ce</span><span style=\"font-family:Cambria Math\">nsus 2011, what is the female literacy rate of India (provide an approximate range)?</span></p>",
    "options": [
      "80-89%",
      "70-79%",
      "60-69%",
      "50-59%"
    ],
    "correct_option_id": 2,
    "solution": " <p>13</span><span style=\"font-family:Cambria Math\">.(c) </span><span style=\"font-family:Cambria Math\">As per census 2011, The literacy rate in the country is 74.04 per cent, 82.14 for males and 65.46 for females. Kerala has the highest total literacy rate and female literacy rate whereas Lakshadweep has the highest male literacy rate. Andhra Pradesh has th</span><span style=\"font-family:Cambria Math\">e lowest overall literacy rate. Rajasthan has the lowest male literacy rate, while Bihar has the lowest female literacy rate.</span></p>",
    "question_index": 12
  },
  {
    "question": " <p>14</span><span style=\"font-family:Cambria Math\">. </span><span style=\"font-family:Cambria Math\">Which an</span><span style=\"font-family:Cambria Math\">cient Indian sport pits crowds of brave young men against angry bulls?</span></p>",
    "options": [
      "Kho-Kho",
      "Jallikattu",
      "Kabaddi",
      "Mallakhamb"
    ],
    "correct_option_id": 1,
    "solution": " <p>14</span><span style=\"font-family:Cambria Math\">.(b) </span><span style=\"font-family:Cambria Math\">Jallikattu is typically practiced in the Indian state of Tamil Nadu as a part of Pongal celebrations on Mattu Pongal day, which occurs annually in January. </span></p>",
    "question_index": 13
  },
  {
    "question": " <p>15</span><span style=\"font-family:Cambria Math\">.</span><span style=\"font-family:Cambria Math\"> In which year was the Border Roads Organisation established?</span></p>",
    "options": [
      "1954",
      "1966",
      "1960",
      "1958"
    ],
    "correct_option_id": 2,
    "solution": " <p>15</span><span style=\\\"font-family:Cambria Math\\\">.(c) </span><span style=\\\"font-family:Cambria Math\\\">The Border Roads Organisation  was formed on 7 May 1960 to secure India\\'s borders and develop infrastructure in remote areas of the north and north-east states of the country. Headquarters is in New Delhi. </span></p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
