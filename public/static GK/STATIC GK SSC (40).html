<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mocks Wallah</title>
    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Central Stylesheet -->
    <link rel="stylesheet" href="../css/mock-main.css">

    <!-- Math Formula Rendering (KaTeX/MathJax) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Timer Config -->
    <meta name="exam-duration" content="30">
</head>
<body>
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-container">
            <div class="welcome-header" style="margin-bottom: 24px;">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px;"><i class="fas fa-graduation-cap" style="color: var(--primary);"></i> Mocks Wallah</h1>
                <p style="color: var(--text-muted);">Computer Based Test Portal</p>
            </div>

            <div class="test-details" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 32px; text-align: left;">
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Total Questions</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">15</div>
                </div>
                <div class="detail-item" style="padding: 12px; background: var(--bg-color); border-radius: 8px; border: 1px solid var(--border-color);">
                    <div class="detail-label" style="font-size: 0.8rem; color: var(--text-muted);">Duration</div>
                    <div class="detail-value" style="font-size: 1.1rem; font-weight: 600; color: var(--text-main);">30 mins</div>
                </div>
            </div>

            <div class="welcome-actions">
                <button class="btn btn-primary" id="startBtn" onclick="document.getElementById('welcomeScreen').style.display='none'; document.getElementById('examContainer').style.display='flex';" style="font-size: 1.1rem; padding: 12px 32px; width: 100%;">
                    <i class="fas fa-play" style="margin-right: 8px;"></i> Start Test
                </button>
            </div>
        </div>
    </div>

    <!-- Main Exam Interface -->
    <div class="exam-container" id="examContainer" style="display: none; height: 100vh; flex-direction: column;">
        <!-- Top Header -->
        <div class="exam-header">
            <div class="exam-title">Mocks Wallah</div>
            <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                <button class="btn-icon" id="themeToggleBtn" title="Switch to Dark Mode"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" id="fullscreenToggleBtn" title="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                <div class="timer-box" id="mainTimer">
                    <i class="far fa-clock"></i>
                    <span class="timer-val">00:00</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="mock-container">
            <!-- Question Area -->
            <div class="question-view">
                <!-- Dynamically populated question container -->
                <div id="questionContainer" style="flex: 1; display: flex; flex-direction: column; gap: 24px;"></div>

                <!-- Controls -->
                <div class="nav-controls">
                    <button class="btn btn-secondary btn-prev"><i class="fas fa-chevron-left" style="margin-right: 8px;"></i> Previous</button>
                    <button class="btn btn-warning btn-flag"><i class="far fa-flag" style="margin-right: 8px;"></i> Flag Question</button>
                    <button class="btn btn-secondary btn-clear"><i class="fas fa-eraser" style="margin-right: 8px;"></i> Clear Selection</button>
                    <button class="btn btn-primary btn-submit">Submit Exam <i class="fas fa-paper-plane" style="margin-left: 8px;"></i></button>
                    <button class="btn btn-primary btn-next">Next <i class="fas fa-chevron-right" style="margin-left: 8px;"></i></button>
                </div>
            </div>

            <!-- Desktop Navigator Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section-title">Summary Status</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-count" id="stat-answered" style="color: var(--success);">0</div>
                        <div class="stat-name">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-flagged" style="color: var(--warning);">0</div>
                        <div class="stat-name">Flagged</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-answered" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Unanswered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-count" id="stat-not-visited" style="color: var(--text-muted);">0</div>
                        <div class="stat-name">Not Visited</div>
                    </div>
                </div>

                <div class="sidebar-section-title" style="margin-top: 16px;">Question Navigator</div>
                <div class="questions-grid"></div>
            </div>
        </div>
    </div>

    <!-- Inject Question Data -->
    <script>
        const questions = [
  {
    "question": "<p>1. Which of the following awards was won by Lata Mangeshkar in the year 2001 ?</p>",
    "options": [
      "Filmfare Lifetime Achievement Award",
      "Padma Vibhushan",
      "Dadasaheb Phalke Award",
      "Bharat Ratna"
    ],
    "correct_option_id": 3,
    "solution": "<p>1.(d) <strong>Bharat Ratna.</strong> Lata Mangeshkar was an Indian playback singer born in Indore. She received the Padma Bhushan in 1969, the Padma Vibhushan in 1999, the Dadasaheb Phalke Award in 1989, and the \\'Officier de la Legion d\\'Honneur,\\' France\\'s highest civilian award, in 2009. She is also renowned for singing the famous song \\'Aye mere watan ke logo&rsquo;.</p>",
    "question_index": 0
  },
  {
    "question": "<p>2. In which city was the first golf club of India situated ?</p>",
    "options": [
      "Shimla",
      "Gulmarg",
      "Mysore",
      "Kolkata"
    ],
    "correct_option_id": 3,
    "solution": "<p>2.(d)<strong> Kolkata. </strong>The Royal Calcutta Golf Club, established in 1829, is the oldest golf club in India and the first outside Great Britain. Other Golf Clubs in India : Bombay Presidency Golf Club (1927), Patna Golf Club (1916), Coimbatore Golf Club (1985), Chandigarh Golf Club (1962). Golf terminologies : Ace, Break, Par, Fade, Slice, Hook.</p>",
    "question_index": 1
  },
  {
    "question": "<p>3. Lathmar Holi is primarily celebrated in the state of:</p>",
    "options": [
      "Karnataka",
      "Arunachal Pradesh",
      "Uttar Pradesh",
      "Himachal Pradesh"
    ],
    "correct_option_id": 2,
    "solution": "<p>3.(c) <strong>Uttar Pradesh.</strong> Lathmar Holi is celebrated in the twin towns of Barsana and Nandgaon, also known as the towns of Radha and Krishna respectively. Famous festivals of Uttar Pradesh - Gaurav Mahotsav, Ramotsav, Taj Mahotsav, Ayodhya Deepotsav, Ganga Mahotsav. Arunachal Pradesh - Sangken, Mopin, Pongtu. Himachal Pradesh - Halda, Doongri, Chet Festival, Kullu Dussehra. Karnataka - Ugadi, Mysuru Dasara, Kambala, Gowri Habba.</p>",
    "question_index": 2
  },
  {
    "question": "<p>4. Mohan Veena player, Pandit Vishwa Mohan Bhatt won the _____Award in the year 1994.</p>",
    "options": [
      "Sangita Kalanidhi",
      "Oscar",
      "Grammy",
      "Sangeet Natak Akademi"
    ],
    "correct_option_id": 2,
    "solution": "<p>4.(c) <strong>Grammy.</strong> His music album with Ry Cooder, A Meeting by the River, won him a Grammy Award. He also received the Sangeet Natak Akademi Award in 1998, the Padma Shri in 2002, and the Padma Bhushan in 2017. Famous Mohan Veena players: Pandit Joydeep Mukherjee, Poly Varghese.</p>",
    "question_index": 3
  },
  {
    "question": "<p>5. The head office of Board of Control for Cricket in India (BCCI) is located in _____.</p>",
    "options": [
      "Mumbai",
      "Kolkata",
      "New Delhi",
      "Chennai"
    ],
    "correct_option_id": 0,
    "solution": "<p>5.(a) <strong>Mumbai. </strong>BCCI is the principal national governing body of the sport of cricket in India established in 1928. RE Grant Govan was the first president and De Mello was the first Secretary of the BCCI. International Cricket Council (ICC) - Headquarters (Dubai, United Arab Emirates).</p>",
    "question_index": 4
  },
  {
    "question": "<p>6. In which of the following states is Govindji Nartanalaya located ?</p>",
    "options": [
      "Manipur",
      "Assam",
      "Nagaland",
      "Tripura"
    ],
    "correct_option_id": 0,
    "solution": "<p>6.(a)<strong> Manipur. </strong>Govindji Nartanalaya is a well-known cultural institution dedicated to promoting Manipuri classical dance and other traditional art forms. This institute was founded by Manipuri dancer and choreographer Guru Bipin Singh. Some notable dance institutions established by famous dancers : Kalakshetra Foundation (Tamil Nadu) - Rukmini Devi Arundale; Shri Ram Bharatiya Kala Kendra (New Delhi) - Sumitra Charat Ram; Nrityabharti Kathak Dance Academy (Maharashtra) - Rohini Bhate.</p>",
    "question_index": 5
  },
  {
    "question": "<p>7. Which of the following celebrations is dedicated to Sun God and his wife Usha to thank them for sustaining life on earth and for granting wishes ?</p>",
    "options": [
      "Madai Festival",
      "Chhath Puja",
      "Vishwakarma Puja",
      "Sorath Sabha"
    ],
    "correct_option_id": 1,
    "solution": "<p>7.(b) <strong>Chhath Puja </strong>is a four-day long strict and spiritual observance. The first day of the Chhath Puja includes taking a dip in the holy river/any water body. The second day of Chhath, also known as Kharna, involves devotees observing a day-long fast. The third day of Chhath goes in the preparation of the prasad (offerings) for the evening offerings, also known as Sanjhiya Arghya. On the fourth and final day of Chhath, family members and friends go to the banks of rivers before sunrise and make offerings (Arghya) to the rising sun.</p>",
    "question_index": 6
  },
  {
    "question": "<p>8. In the year 1952, who among the following lent his voice for the film &lsquo;Amar Bhupali&rsquo;, which was being produced in two languages simultaneously and he sang in both Bengali and Marathi ?</p>",
    "options": [
      "Kishore Kumar",
      "Hemanta Mukherjee",
      "Debabrata Biswas",
      "Manna Dey"
    ],
    "correct_option_id": 3,
    "solution": "<p>8.(d) <strong>Manna Dey</strong> was a renowned Indian playback singer, music director, and musician. He had a classical music background, being part of the Bhendibazaar Gharana. He received Padma Shri in 1971, Padma Bhushan in 2005 and Dadasaheb Phalke award in 2007.</p>",
    "question_index": 7
  },
  {
    "question": "<p>9. At which Olympics did Gagan Narang win a bronze medal ?</p>",
    "options": [
      "London 2012",
      "Rio 2016",
      "Athens 2004",
      "Beijing 2008"
    ],
    "correct_option_id": 0,
    "solution": "<p>9.(a) <strong>London 2012. </strong>Gagan Narang is an Indian sports shooter and is associated with air rifle shooting. He won the bronze medal in the Men&rsquo;s 10 meter air rifle event. He received the Arjuna award in 2005. Indian Shooters : Abhinav Bindra, Rajyavardhan Singh Rathore, Vijay Kumar, Manu Bhaker, Swapnil Kusale.</p>",
    "question_index": 8
  },
  {
    "question": "<p>10. At which Olympics was Kho-Kho featured in an exhibition in the main stadium ?</p>",
    "options": [
      "1936",
      "1932",
      "2008",
      "2016"
    ],
    "correct_option_id": 0,
    "solution": "<p>10.(a) <strong>1936. </strong>The Olympics were held in Berlin. The Kho-Kho team consists of 12 players, but only 9 players take the field for a contest. Key Milestones in Kho-Kho : The first-ever All India Kho Kho Championship took place in Vijayawada, Andhra Pradesh, during the 1959-60 season. The National Championship for Women was held in Kolhapur, Maharashtra, in the 1960-61 season. Kho-Kho was demonstrated during the 1982 Asian Games, held in New Delhi. The first-ever Asian Kho-Kho Championship was organized in Kolkata in 1996.</p>",
    "question_index": 9
  },
  {
    "question": "<p>11. &lsquo;Nuakhai&rsquo; is the state festival of:</p>",
    "options": [
      "Meghalaya",
      "Odisha",
      "Tamil Nadu",
      "Bihar"
    ],
    "correct_option_id": 1,
    "solution": "<p>11.(b) <strong>Odisha. </strong>Nuakhai is an annual harvest, marking the arrival of the new rice season. Other festivals: Odisha - Ratha Yatra, Raja Parba, Chandan Yatra, Bali Jatra. Meghalaya - Wangala, Behdienkhlam, Nongkrem, Shad Suk Mynsiem. Tamil Nadu - Pongal, Thaipusam, Puthandu. Bihar - Chhath Puja, Rajgir Mahotsav, Bihula.</p>",
    "question_index": 10
  },
  {
    "question": "<p>12. In Pradhan Mantri Gramin Awaas yojana, the cost of unit assistance is shared between Central and State Governments in the ratio _____ in plain areas.</p>",
    "options": [
      "60 : 40",
      "40 : 60",
      "90 : 10",
      "30 : 70"
    ],
    "correct_option_id": 0,
    "solution": "<p>12.(a) <strong>60 : 40. </strong>The Pradhan Mantri Awas Yojana - Gramin (PMAY-G) : Launched on November 20, 2016. It aims to provide housing with basic amenities to houseless families and those living in dilapidated or kutcha houses. Targeting 2.95 crore houses by March 2024. In the Northeastern and Himalayan States, the cost-sharing ratio is 90 : 10. This scheme restructured the Indira Awas Yojana (IAY) from 1985.</p>",
    "question_index": 11
  },
  {
    "question": "<p>13. Which of the following personalities is a Padma Shri awardee folk singer from the state of Uttar Pradesh ?</p>",
    "options": [
      "Ila Arun",
      "Ajita Srivastava",
      "Gurmeet Bawa",
      "Teejan Bai"
    ],
    "correct_option_id": 1,
    "solution": "<p>13.(b) <strong>Ajita Srivastava. </strong>She received Padma Shri in 2022 for promoting the Kajari folk songs. She has completed her Sangeet Prabhakar from Prayag Sangeet Samiti in Prayagraj. Ms. Gurmeet Bawa (Posthumous) - Padma Bhushan (2022). Teejan Bai - Padma Shri (1988), Padma Vibhushan (2019), Padma Bhushan (2003).</p>",
    "question_index": 12
  },
  {
    "question": "<p>14. Which of the following countries won the first men&rsquo;s Asian Hockey Championship trophy ?</p>",
    "options": [
      "Japan",
      "China",
      "India",
      "Pakistan"
    ],
    "correct_option_id": 2,
    "solution": "<p>14.(c) <strong>India </strong>is the most successful team in the men&rsquo;s Asian Champions Trophy with five titles. The tournament was held annually from 2011 to 2013 and has been conducted every two years since 2016. Hockey winners : 2011 - India, Runner up - Pakistan. 2016 - India, Runner up - Pakistan, 2018 - India and Pakistan (joint winners). 2023 - India, Runner up - Malaysia. 2024 - India, Runner up - China.</p>",
    "question_index": 13
  },
  {
    "question": "<p>15. In which of the following states is the Nrityagram, an Odissi dance institution, located ?</p>",
    "options": [
      "Kerala",
      "Karnataka",
      "Tamil Nadu",
      "Maharashtra"
    ],
    "correct_option_id": 1,
    "solution": "<p>15.(b) <strong>Karnataka. </strong>The Nrityagram : Established - 1990; Founder - Protima Gauri. Odissi dance (Odisha) deals with the love theme of Radha and Krishna. The carvings found at the Udayagiri Monastery denote that Odissi was patronised as early as the 2nd Century BCE and the trend continued unabated until about the 16th Century AD. Other dance Academy: Bhartendu Natya Academy (Lucknow), National Dance Academy (Delhi).</p>",
    "question_index": 14
  }
];
    </script>

    <!-- Central JS Controller -->
    <script src="../js/mock-core.js"></script>
</body>
</html>
